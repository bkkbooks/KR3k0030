body:
  text: 古今合璧事類備要外集卷六十三宋謝維新撰財用門琉璃附水精碼碯玻瓈琥珀車渠珊瑚財貨源流琉璃本質是石出大秦國赤白黒黃青緑紺縹紅紫凡十種為器者以自然灰冶之近世又有火成者光澤盖不减也水精琉璃之類入火不焚玻瓈本草作頗梨水玉或云是千嵗水化為之車渠亦玉石類形似蚌蛤有文理碼碯非玉非石自是一類似馬腦然故以為名亦云碼碯珠也或云馬口中吐出恐胡人謬言以貴之耳有紅白黒三種亦有紋似纒絲者砑本不熱琥珀松脂淪入地千年所化多偽惟以色如血熟於布上拭吸得芥子者真也珊瑚似玉紅潤中多有孔亦有無孔者有縱紋者有紅油色細縱紋者有如鉛丹色無縱紋者有兩枝直上分十餘岐將至其末交合連理者初生水底磐石上白如􅌲一嵗黃三歲赤海人付欲取之先作鐵網沈水底珊瑚貫中而生嵗高三二尺有枝無葉因絞網出之或摧折在網中故難得完者然失時不取亦腐大抵以樹高而枝柯多者為勝事類琉璃扉漢武帝拜方士欒大為五利將軍起九間神宫欲以下神云云曰丨丨為丨眞珠為簾漢武故事琉璃殿魏太武時大月氏國人商販至京師自云能鑄丨丨既成光澤美於西來者乃詔為行丨容百餘人光色映徹見者震駭以為神明自此中國丨丨甚賤人不復珍之琉璃牕滿奮畏風在武帝丨丨丨内坐實密似踈奮有疑帝問之荅曰臣猶吳牛見光而喘世説琉璃盃晉崔洪良伯手不執珠玉汝南王亮燕公卿以丨丨丨行酒酒至洪洪不執白氏帖琉璃椀王敦初尚主如厠見金盤盛水丨丨丨盛澡豆困倒著水中飲之世説琉璃盤同昌公主以紅丨丨丨盛夜光珠立堂中光如晝杜陽編又元載代宗曰平嶺南進丨丨丨面闊九寸朕以為寶及破載家得一尺面者鄴侯家乗琉璃帳黄偃設紫丨丨丨東方十洲記琉璃瓶唐貞元中揚州市坊有丐者自稱媚兒姓胡懷中出丨丨丨可受半升表裏通明如不隔物曰施滿此聖瓶子則足矣瓶項如葦管人與之百錢投之琤然有聲見瓶間大如粟粒衆異之復與千錢亦如此以至萬錢亦然好事者以驢與之入瓶如蠅大動行如故俄有度支綱至數十車綱人駐車觀之綱主戯曰爾能令諸車入瓶中乎媚兒曰可乃微側瓶口令車悉入歴歴如行蟻然有頃漸不見媚兒即跳入瓶綱官大驚以梃撲瓶破一無所有從此失媚兒所在後月餘有人於清河北逢媚兒部領車乗趨東平而去太平廣記又見薔薇花注又盧文紀廢帝悉書清望官姓名投於丨丨丨中命相中夜焚香祝天以筯挾之首得文紀欣然相之五代琉璃釵唐末世俗尚以丨丨為丨釧近服妖也流離播遷之兆五行志水精玉晶盤董偃常卧延清之室以丨丨為丨貯氷於膝前丨丨與氷同潔侍者謂氷無丨必融濕席乃拂玉盤墜氷玉俱碎丨丨千塗國所貢也武帝以此賜偃三輔黃圖水精屏詳見屏風注水精户魏明帝時昆明國貢嗽金鳥飫以真珠飲以龜腦常吐金屑如粟鳥性畏寒處之小屋丨丨為丨内外通光名辟寒臺拾遺記水精杯西域罽賔武德二年遣使者獻玻瓈丨丨丨水精瓶蜀閩王宗銖有海客鬻龍腦蜀中貯以丨丨丨殿直李葩示之海客邀善價比數倍葩造宗銖曰丨丨丨為爾取之翌日至其所令持錦衾至若貨者宗銖索衾與海客共觀嘆其纎織久之因目從者挈瓶去九國志水精如意孫和月下舞丨丨丨丨誤傷鄧夫人同上水精燈籠本朝劉隨待制為通判嚴明通達謂之丨丨丨丨東齋記事玻瓈玻瓈杯見前水晶注車渠西國重寶車渠是玉石類丨丨丨丨形似蚌蛤有文理集韻西域重堂丨丨丨丨殿梁檐皆以七寶飾之注車渠其一也西域記碎蜀溺器乾德四年上遣神將蜀圖書法物所上法物見孟昶七寶溺器曰自奉如此欲無亡得乎遽命丨之長編碼碯鬼血化丹邱之野多丨丨丨為丹石則碼碯也丹邱千年一燒拾遺記龜兹進唐開元丨丨國丨一枕其色如碼碯枕之則十洲三島盡在夢中帝號游仙枕遺事碼碯甕黄帝時丨丨丨堯時猶存甘露在其中盈而不竭謂之寶露頒賜羣臣至舜時露漸減時淳則露滿時澆則露竭十洲記碼碯櫃武宗㑹昌元年渤海貢丨丨丨方三尺深茜色工巧無比碼碯盤裴行儉有丨丨丨廣二尺文采粲然軍吏趨趺盤碎惶懼叩頭流血行儉曰爾非故也何至是色不少吝琥珀江珠琥珀一名丨丨博物志松脂丨丨入地千年為琥珀本草碎之為藥宋武帝時献琥珀枕丨丨以丨刀瘡丨白氏帖屑以滅㾗孫和月下舞水晶如意誤傷鄧夫人頰太醫曰得白獺髓雜玉與琥珀丨當丨丨丨然琥珀太多及瘥又有赤㸃更益其妍諸嬖人更以丹脂㸃額以要寵拾遺記用以為杓石虎為浴堂碔砆為堤琥珀為杓珊瑚高一丈二漢積翠池中有珊瑚丨丨丨丨尺一本三柯上有四百六十三條云是南越王趙佗所獻號烽火樹夜有光影三輔黃圖高二尺許王愷武帝嘗以珊瑚樹賜之丨丨丨丨枝柯扶疎世所罕比愷以示石崇崇便以鐵如意擊之應手而碎愷既惋惜崇曰不必多恨今還卿乃命左右悉取珊瑚有高三四尺者六七株條榦絶俗光彩耀日如愷比者甚衆愷恍然自失矣本傳珊瑚筆格錢思公性儉約子弟非時不能取一錢公有丨丨丨丨平生珍惜子弟有欲錢即竊之公乃榜家庭以十千購之子弟作為求得以獻公欣然以十千與之一嵗中率五七如此歸田録孫樵與賈秀才書物之精華天地所秘惜故蒙金以沙錮玉以璞珊瑚之叢必茂重溟夜光之珍以頷驪龍文章亦然詩集琉璃鍾丨丨丨琥珀濃小槽酒滴眞珠紅李賀将進酒琉璃剪丨丨丨木一府傳看丨丨丨丨黃琉璃韓水精簾外水精丨丨轉逶迤宋之問盤行水晶之丨丨素鱗杜𤓰寒丨嚼水晶丨荷露丨丨水晶圓碼碯盤承碼碯丨丨金縷盃坡惜花玻瓈敲日聲羲和丨丨玻瓈丨李賀琥珀琥珀濃詳見前琉璃注珊瑚闕采丨丨珊瑚鉤杜反掛晨光未出簾影黒至今丨丨珊瑚鈎元稹連昌宫詞珠附瑟瑟璣貨財源流珠生於大海中乃蚌蛤胎也海濵之人採而鬻之以共衣食間之採珠者珠不易得也必賫糧篝火不免或底取之而出至麻繩自縋其身落於海岸害則不惟不收其利也故世間之人寶之然小大者目為至寶瑟瑟珠之種不圓九品徑寸者曰璣琲百枝而為一貫事類水圓丨丨折者有珠尸子川媚水懷珠而丨丨選徑寸丨丨明月之珠不能度寸良珠丨丨雖有百仞水不能掩其輝韓詩之索珠黃帝遊乎赤水之北登乎崑崙之邱遺其𤣥珠使智丨之而不得使離朱索之而不得使契溝索之而不得乃使象罔象罔得之黃帝曰異哉象罔乃可以得之乎莊子懷珠鳯凰銜珠於庭少吳拾而丨之拾遺記積珠舜葬蒼梧有鳥吐五色氣名曰憑霄銜玉成墳丨丨成壟拾遺記貢珠禹任土作貢徐州厥丨蠙丨注蠙蚌書共珠周禮玉府丨王丨玉注佩玉以納蠙珠其間又若命諸侯則丨丨槃注槃以珠飾燭室隋侯見傷蛇以藥封之蛇銜明珠徑寸純白夜光丨丨以報隋侯白氏帖照乘魏文侯曰寡人有徑寸之珠丨車前後十二丨者十枚通鑑鶴報有𤣥丨為弋人所射窮而歸噲參參牧飬療治瘡愈而放之後鶴夜到門外參執燭視之鶴雌雄雙至各銜明珠以丨參焉搜神記魚報昆明池昔有人釣魚綸絶而去遂通夢於漢武帝求去鈎帝明日戯於池見大魚銜索帝曰豈夢所見邪取而放之間三日池邊得明珠一雙帝曰豈非丨之丨耶三秦記江妃解丨丨二女佩兩明珠大如卵遊江漢之濵逢鄭交甫説之不知其神也曰願請子之佩二女丨與交甫去數十步二女忽不見佩亦失之列仙淵客泣鮫人水底居出向人間寄住積日賣綃臨去從主人索器泣而出珠以與主人博物志丨丨慷慨而丨珠注丨丨鮫人也左思呉都賦宋公求太叔疾出奔宋衛人立其弟遺使室孔姞疾臣向魋納美珠焉與之城鉏丨丨丨珠魋不與由是得罪左哀公十年呉王與丨丨丨楚隆一簟珠使問趙孟左哀二十楚人賣丨丨丨珠於鄭為木蘭之櫃薫以桂椒綴以珠玉飾以瑰玉緝以翡翠鄭人買其櫃還其珠可謂善買櫃不可謂善鬻珠也韓子棄珠礫秦阿房宫金瑰珠礫丨擲迤邐秦人視之亦不甚惜杜牧之賦垂珠璣漢武帝宫人丨丨丨飾文采樷珍怪東方朔化民對千金珠河上翁家貧持緯蕭而食者其子投川得丨丨之丨謂其子取石來鍛之曰夫珠必在驪龍頷下子遭其睡也使其寤子當為虀粉尚奚珠之有哉七彩珠高祖斬白蛇劍上有丨丨丨為飾西京雜記薏苡謗馬援載丨丨一車人有丨之者以為文犀明珠本傳贓穢物交趾太守坐贓詔以頒賜羣臣鍾離意得珠璣委地不拜曰此丨丨之丨誠不足拜帝乃别賜錢二十萬東觀漢記聚以為殿南漢劉襲丨南海珍寶丨丨珠丨舞罷覆地曹確時帝昵優人李可及教舞者數百丨丨珠寶丨丨馬吐以獻太和九年易定丨飲水因丨珠一丨丨唐五行志龍化而去順宗即位嵗拘弭國貢履水珠色黒類鐵大如雞卵其上鱗皺其中有竅云持入江海中可行於洪波之上上始不為之寶遂命善浮者以五色絲貫之繫於左臂遣入龍池其人則步驟於波上若在平地亦潜於水中良久復出而徧身若無沾濕上奇因以御饌賜使人焉至長慶中嬪御試弄於海池遂化為黒丨入于池内俄而雲煙暴起不復追討黒色有光馮翊嚴生家於漢南遊峴山得一珠如彈丸丨丨而丨丨視之瑩徹如氷焉以示西國胡人然曰此是清水珠也即命注濁水於缶以珠投之俄而淡清徹矣胡人以三十萬貨之宣室志紺色有光開元中張説為相有人惠一珠丨丨丨丨名記事珠或有遺忘即玩此珠心神頓悟開元遺事以珠易餅賀知章嘗謁賣藥王老問黃白術持一大珠遺之老人得珠即令易餅與賀食賀心念寶珠何以市餅口不敢言老叟乃曰慳吝未除術何由成原化記種珠若蔬陳繼善拜少傅致仕富於資産自荷一鋤以理小圃成畦以眞珠千餘顆若丨蔬狀土壊之間記顆俯拾南唐近事以珠為飾慶歴中廣州有蕃商死珍珠没官上命取珠出禁中錢易之以賜張貴妃時禁中同列因是於上前乞旨和買縁此京師價騰踊上頗知之上於别殿賞牡丹妃嬪畢集貴妃最後至乃丨前日珍丨丨首丨以誇同輩至上前上望見以袖掩面曰滿頭白紛紛地更没些忌諱妃慙赧起易之乃大恱自是禁中更不戴珍珠價大減鳴道集以珠撒殿熙寧中駐輦國使人入貢乞依本國撒殿詔從之使人以金盤貯珠跪捧於殿檻之側以金蓮花酌珠向御座撒之謂之丨丨乃其國至敬之禮也朝退有司掃殿得珠十餘兩分賜筆談關吏所搜唐質肅公玠謫潭州一戶民私藏蚌胎為丨丨丨丨太侍以下輕其估悉自售焉分珠事發奏方入仁宗謂近曰唐玠必不肯買案具奏覆覧之果然湘山野録童子撲火縻竺家有伏屍夜間涕泣竺命為棺以青布衣置塜中後見一婦人曰君有火厄今以青蘆杖報君竺財貨如山大珠如卵謂之寶庭後火起見數十青衣丨丨丨丨火滅丨丨云多聚鸛鳥禳火鸛能吐水於巢上東方朔十洲記大珠魏帝求魏徴曰丨文卻郤丨市西域大珠蘇則以為惠及四海則不求自至求而得之不足貴也西域獻丨丨師子天寶初王户罷迷迦再遣使丨大珠眞珠記顆俯拾陳繼善事見前得雙者吉洛陽人有妓樂者四時則撒眞珠厚盈數寸以班螺令妓女酌之仍各具數丨丨丨為丨妓乃作雙珠宴以勞主人粧樓記無跡者賜石季倫妾名翔風妙别玉聲善觀金色美容相類者十人服飾一等屑沈香為塵布象席上踐之丨丨丨丨眞珠百琲有跡者節其飲食閨中戯曰爾非痩骨輕軀安得百琲眞珠及翔風色衰退為房老晉王子嘉拾遺記擲地皆成王遠字方平麻姑求米少許丨丨丨丨眞珠方平笑曰姑年少作此變化吾已年老不喜為之矣王氏神仙傳炒麥圓成見釜門注寶珠大如雞卵楚州獻寶十三二曰如意寶珠丨丨丨丨火珠艾藉火出南蠻多利火珠大者如雞卵圓白照數尺日中以丨丨珠輒丨丨孔氏帖水珠履水珠見前龍化而去注清水珠見前黒色有光注採珠合浦採丨丨人丨珠以易米而食時二千石貪穢珠徙去而餓死者盈路及孟嘗行化一年其去珠復還交州採晉陶璜為丨丨百姓無農唯以丨珠為業以珠易米呉時慮百姓私散好珠絶商旅人飢上請乃制自十月至二月非採上珠時聴往來瑟瑟瑟瑟琲貴妃楊氏十月帝幸華清宫五家車騎皆從丨丨璣丨狼藉于道瑟瑟枕盧簡辭盧昂坐贓辭窮按得丨丨丨大如斗貯瑟瑟虢國夫人恩傾一時所居本韋嗣立宅創堂成以金盆丨丨丨二斗以賞匠者明皇雜録戴瑟瑟五代吐蕃婦人丨丨丨云珠之好者一珠易一良馬璣珠鏡神靈滋液百寶用則璣鏡出注宋均曰大丨冇光可以為丨孝經援神契玉衡舜在璿璣丨丨舜典篚貢禹荆州底貢厥名厥丨𤣥纁璣組注璣珠類説文珠不圓書贓穢之物見前珠注詳狼籍于道見前瑟瑟注崔伯易珠賦高郵西北有湖曰甓社近嵗夜見大珠其光燭天嘗問諸漁者言或遇於他湖中有竊謀之者則風輒引舡而去終莫能至賦曰鑠高郵之舊治裂揚州之故部有湖𨽻旁將三十所大或萬頃小亦千畝穹山大野溪谷郊藪晝夜走險越千里而來赴者莽不知其幾千百處壓東南之湠漫勢膠轕而無涯溉灌乎民田漕引乎國家間乃省貢書考圖編所陳者特盤飡之微固不聞有把握之貴為當世之所傳發詠乎川珍翺翔乎水邊爰有蘆人漁子相語而來前曰先生之念者貨也若夫川澤之精理則不然不寶於人獨寶於天今此有夜光之珠産於深淵其始也天和景晴湖波夜平煙冉冉以四收萬籟息而無聲則如珠也凜氣將之若海月之升含彩吐曜周隅皆明呀紺石而為宫被緑苔以垂纓挹奔星之光芒吸沆瀣之精英木㪚景兮扶疎草露實兮紅青林鳥驚而移枝羣大愕兮争鳴於是卭人徐乎上流俱走撫鴻鶩以先趨領罾筍之已試連徽挺扠灑網持紲嗟雖鑑其眉睫猶未曉其機器方詭置之漸張東造形而已逝而况伏見靡時倐彼倐此與蛟龍之為朋曽風雨而作衛彼能三足而在籞鱉九助而充饋漢蛟蚱之青骨鄭黿羔之異味勍牛悦水而黃奪澤馬玩繩而足躓犀狎偶而解角翠因媒而折翅江使被執於行役巨魚為腊於貪餌文貝瑇瑁出禍其腸腹金華玉英坐窮於淘縋蛤蜃胎寒熠燿自喜非絶意於遐引適足䘮其軀而已矣是故數者我固謂之貨也能不為珠之笑耶予曰嗚呼噫嘻信子言也既明且哲則大雅君子者耶不常所居擇利害而去就者邪用以晦明知在己者耶色斯舉矣學孔子之徒者耶薄泥塗而不辱不恥貧賤者耶川不涸岸不枯有德鄉里者耶乆而不聞其遯世者耶既而復曰嗚呼噫嘻照魏王之乘耶燭隋侯之室耶講上幣耶飾冠冕而佩耶客有聞者亦矍然而興曰嗚呼噫嘻吾聞諸石室之書曰王者得之長有天下四夷賔服然則得之者或非其心獨王者之心耶詩集收珠自平宫中吕太一丨丨南海千餘日遺珠客從南溟來丨我泉客丨珠中有隠字欲辨不成書並杜採珠越客丨明丨提携出南隅清輝照海月美價傾鳴都連城雙珠出海底俱是丨丨珍並李白明月婆娑海水南簸弄丨丨珠韓珠被丨壓腰丨穩稱身杜麗人行珠翠樓上樓前盡丨丨眩將瑩瑝照天地元稹連昌宫詞眞珠眞珠紅小槽酒滴丨丨丨李賀眞珠絡丨丨丨臂韝杜璣鬪草贏丨丨丨珠璣鬪草擷丨丨丨璣珵古今合璧事類備要外集卷六十三
