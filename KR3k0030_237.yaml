body:
  text: 古今合璧事類備要别集卷三十一宋謝維新撰花卉門酴醿花格物總論酴醿花藤身青莖多刺每一穎著三葉品字樣葉面光緑背翠多缺刻青跗紅蕚及開時花變白帶淺碧多葉其香微而青種之者用大髙架引之盤曲而上二三月間爛熳可觀也又一種黃花同時而開字本作稌縻後加酉或又曰酴醿酒名世以所開花顔色似之故取名焉事類用酴醿酒唐寒食宴宰相丨丨丨丨飲酴醿酒唐召侍臣學士食櫻桃丨丨丨丨並以琉璃盤和以香酩景龍文館記作詩寄意王荆公薦進一二寒士位侍從初無意於大用公去位後遂參政柄因丨此丨丨丨云故作酴醿架金沙祗謾栽似矜顔色好飛度雪前開髙齊詩話調笑取友曽端伯丨丨令丨丨於十花韻友酴醿也云云仍有玉友來奉佳賔酒也詞詁詩集嫩葉倡女卷春裾迎風戲玉除近叢看影密隔樹望叉踈橫枝斜綰袖丨丨下牽裾墻髙攀不及花新摘未舒莫疑插鬢少及人猶有餘梁元帝好枝新花臨曲池佳麗復相隨鮮紅同映水輕香共逐吹繞架尋多處窺叢見丨丨今新猶限少將故復嫌萎叉邉爛熳插無處不相宜梁劉瑗翠條風動翠條腰嫋娜白居易粉蘂煙條塗石緑丨丨撲鵝黃根動彤雲湧枝搖赤羽翔前人藝蘭遜乍見疑回面遙觀誤斷腸風朝舞飛燕雨夜泣蕭娘桃李慙無語丨丨丨不芳山榴何細碎石竹苦尋常蕙慘偎欄避蓮羞映浦藏怯教蕉葉顫妬得栁花狂豈可輕嘲咏應須痛此芳白樂天荆棘滿鑿斷千家作一池不栽桃李種荼䕷莫教葉落秋風後丨丨丨庭君始知賈島畫屏風丨丨丨自展樂天啼珠露曉丨丨丨渾無力繡簇羅裙不著行若綴壽陽公主額六宫爭肯學梅粧李嶠韻自天無華真國色有丨丨丨香宋景文公名因酒梅殘紅藥遲此物共春暉丨字丨壷丨風流比枕幃墜鈿香經草飄香淨㸃衣玉氣晴虹發沉材鋸屑飛且知多可壓可忍摘令稀常恨金沙學顰時正可揮山谷折霜㽔長憶故山寒食夜野荼䕷發暗香來分無素手簮螺髻且丨丨丨浸玉醅坡舞霓裳漢宫嬌額半塗黃肌骨濃薰班馬香日色漸遲風力細倚欄偷丨白丨丨山谷樂府貯向鴛鴦枕紅葉飄零緑滿城春風於此獨留情誰將十幅吳綾被撲向熏籠一夜明丨風不定雨初晴曉來苔上拾殘英速教丨丨丨丨猶有餘香入夢清鷓鴣天朝以膺香泛玉流酥鶯喚屛山驚睡覺嬌羞須索郎扶荼䕷斗帳冷熏爐翠穿珠落索丨丨丨丨丨長記枕㾗消醉色日髙猶倦粧梳一枝春瘦想如初夢迷芳草路望斷素鱗書臨江仙張仲宗木蘭花格物總論木蘭花樹髙八九尺葉氣味辛經寒不凋花粉紅色香不及桂二三月間開也事類芝生孝哀帝元年丨丨後庭木蘭樹上古今注花盛張摶為蘇州刺史植木蘭花於堂前嘗盛時燕客命即席賦之陸龜蒙後至張連酌浮之徑醉强索筆題兩句云洞庭波浪渺無津日月征帆送逺人頽然醉倒客續之皆莫詳其意既而龜蒙稍醒續曰幾度木蘭船上望不知元是此花身遂為絶唱嵐齊録授素書北海于君病癩見市有賣藥姓公孫帛因問之公曰明日木蘭樹下授卿明日往丨丨丨二卷以消災救病無不愈者神仙傳成公綏賦元𡨕授節猛寒嚴烈峩峩堅氷霏霏白雪木應霜而枯零草隨風而摧折蓊青翠之茂葉繁旖旎之弱條諒抗節而矯時獨滋茂而不雕詩集㺯粉二月二十三木蘭開折初初當新病酒復似久離居悲絶更傾國驚心聞逺書紫紗何日障油壁幾時車丨丨知傷重調紅或有餘波痕空映禨烟態不勝裾桂嶺含芳逺蓮塘屬意踈瑤姬與神女長短定何如李義山洗粧未識春風靣先聞樂府名丨丨濃出塞進艇客登瀛鄭毅夫隱君子曉來隨手抹新粧半額蛾眉宫樣黃緋衣染盡薔薇露觸處聞香不炷香君不見同時素馨與茉莉究竟帶些脂粉氣又不見錢塘欲語嬌荷花粗枝大葉忒鉛華何如個樣丨丨丨色氣不俗真有味根苖在處傲炎凉敢與松柏爭雪霜菽桂荑蕕君雜處小忩相對毋相忘劉招山作女郎紫房日照胭脂拆素艷風吹膩粉開悟得獨饒脂粉態木蘭曽丨丨丨來白樂天辛夷花格物總論辛夷花木髙數尺葉似柿而長初出如筆正二月開花花既落無子夏秋再著花如蓮花而小紫苞紅熖人家園林多種之一名候桃一名木筆或以為子如相思子離騷經所謂辛夷者即此事類李衛公莊見後詩曽手植注諱員外家見後詩開時乞取注呼為木筆北人丨丨丨丨本草注衛公懷嵩樓記剪密條而對嘉樹注辛夷也詩集花發谷口春殘黃鳥稀辛夷丨丨杏花飛花落辛夷始丨亦已丨况我與子非壯年杜甫胭脂染紫粉筆含尖火艷紅丨丨丨小蓮花芳情香思知多少惱得山僧悔出家白樂天芙蓉亂緣堤春草合王孫自留玩况有辛夷花色與丨丨丨崔迪幾日對昔年將出谷丨丨丨辛夷倚樹憐芳意攀條惜嵗滋清音須暫憩秀色正堪思只待揮金日殷勤泛羽觴李衛公曽手植辛夷吐髙花衛公丨丨丨根洗今已非不改舊時色平泉幾昜主况乃刺史宅韓忠獻開時乞取問君辛夷花君言已斑駁不畏辛夷不爛開顧我筋駭官束縳縳遣推囚名刺史狼籍因徒滿田地明日不推緣國忌依然不得花前醉韓員外家好辛夷丨丨丨丨三兩枝折枝為贈君莫惜縱君不折風亦吹元徽之麗春花格物總論麗春花鶯粟花别種也叢生柔幹多葉有刺數種紅紫白三色而於三色之中又多變態今江浙間多此惟金陵産獨勝耳事類游默齊花譜淳熙甲辰客金陵得異草曰麗春罌粟别種也罌粟其子可食故無佳花麗春太華實遂無取徇外則耗內信乎物皆然幹柔葉冗又不逮罌粟出衆草下唯花有殊相姿狀葱秀色澤鮮明回出葩花精華之上遇風和晴晝標吐倍妍昔人命名亦善矣根苖止一類而具數種之色有紅者紫者白者傅粉之紅者丹杏之黃者而紅復數品有徹紅者半紅者白膚而絳唇者丹衣而素純者又有殷者如染茜下為黑趺之端加白章焉餘不盡名蓋紅之類變態尤多也紫二品深者鬚青淡者鬚黃白亦二品葉大者微碧葉細者竊黃而竊黃尤竒素衣黃裏芳秀茸茸若新鵝之毳風致髙淡紅紫其退舍歟唯竊紅者居衆花下似芍藥中粉紅樓特差小視凡花之粉紅猶十倍也其大概如此今江浙有之獨金陵産殊異耳余嘗謂一元之氣變化萬物迭生互滅未可以常理拘姑言草木一端如桃梅李瓜野菊山櫻之屬略以見於詩書三代之前而辛夷杜若幽蘭諸草入見楚人騷辭者皆天地常産固不廢於世其山顛水涯喬林大澤耳目不接何限烏知一氣之化古所無者今不新出而昔常見者後不變此哉牡丹唐武后時樵夫採山得耳昔固未顯及至本朝而紫黃丹白標目鼎盛是比唐又一變矣楊貴妃嗜荔枝取之瀘戎而閩産未竒也今閩品精絶視瀘戎僅可輿臺耳藉曰巴渝去長安近閩以遐嶠罕聞而明皇之世非不寶逺物豈不求佳者媚閨闥耶則知一氣埏埴孰測端倪人生須㬰即以耳目之常者拘議造物亦陋矣聞者哂之余自負以為至論今麗春者疑亦若是而已不然唐以來詩人吟咏草木殆遍豈其略不及哉自余携歸親朋無不愛玩又知天下之固相似非余獨見然也因思歐陽公為牡丹譜蔡君謨為荔枝譜其巨麗珍絶足稱兩公筆力然微兩公二物自足為華實冠冕無譜固可也麗春者纎草耳又不幸余始知之種微筆弱負二者之細顧何自著名是其重不遭然一世巨材大厦風雨之須瀹葉何限况葩花微草寧暇多嘆乎姑述其名數以示愛花者詩集應最勝百草競春華麗春丨丨丨少須好顔色多漫枝條剩紛紛桃李枝處處總能移如何此貴重却怕有人知杜甫早自薰梁苑花銷去黃臺丨丨丨不同鶯子粟别是石榴裙婀娜才勝掌參差莫夢雲王郎尋水竹駐履幾殷勤潘柳出刺自衛蓬蒿眼已熟收拾到阿麗徒分色紅白未害格奴婢爭妍知不足丨丨以丨丨上有寒梅枝春霜正憔悴張右吏滿頭空插塵壓鴛鴦廢錦機丨丨丨丨麗春枝名賢集白榆開處素奈發時俱比麗丨丨丨丨欲爭妍晏元獻牡丹缺香嬌困扶頭憐半醉淡濃宜靣鬬新裝並肩鶯粟獨多怨具體丨丨惟丨丨徐月溪薄命易飄零照眼裝新就扶頭酒半醒妖姿隨變化丨丨丨丨丨徐月溪夜合花格物總論夜合花亦名合歡或亦名合昏按圖經安和五藏利心志令人歡樂無憂大家多植於庭除樹似梧桐枝甚柔弱葉似皂莢槐等細而密互相交結風來一似相解不相牽綴其葉至暮而合五月花發紅白色瓣上若絲茸至秋而實作莢子極薄細惟益州及近洛等處為得其土性之正也事類蠲忿晉稽康種之舍前嘗曰合歡丨丨本草欲丨人之丨則贈以青棠合歡也合昏心胸填錯是為肺灌取夜合皮掌大一枝水煮服之故後山詩云探囊一試丨丨湯詩話詩集朱柯南鄰有竒樹承春挺素華豐翹被長條緑葉蔽丨丨因風吐微音芳氣入紫霞我心羡此本願徙著余家夕得游其下朝得弄其葩晉楊方綺樹丨丨滿朝陽融融有露光雨多疑濯錦風散似分粧葉密煙蒙火枝低繡拂墻更憐當署見留詠日偏長元微之尚知時合歡丨丨丨鴛鴦不獨宿杜甫欲昏天栘晚較一月花遲過半年紅開杪秋日翠合丨丨丨白露滴不死凉風吹更鮮後時誰肯顧惟我起君憐白樂天贈合歡消忿丨丨丨古詩紅白姿俗人云愛花重色不重香吾今得真想似矯時之常所愛夜合花清馥踰衆芳葉葉自相對開斂隨隂陽不慙歷草滋獨擅堯階祥得此合歡名憂忿誠可忘茸茸丨歇丨百和從風揚沉水繚庭檻薰陸芬繻裳彌月固未况兹夏景長凡目不我貴馥烈徒自將仲尼失滅眀史遷疑子房以貌不以行舉世同悲傷豫欲先馨德羣艷孰可方直饒妖牡丹須遜花中王韓忠獻紅白暈合昏枝老拂簷牙丨丨開成蘸丨花最是清香合蠲忿纍句風送入忩紗同前人散紅茸青枝丨丨丨坡百合花格物總論百合花春生苗髙數尺幹粗如箭四靣有葉如雞距又似桞葉青色葉近莖微紫莖端碧白四五月開紅白花如石榴觜而大根如胡蒜重疊生二三十瓣人蒸食之益氣此花是也事類闕詩集無異色接葉有多重開花丨丨丨含露忽低垂從風時偃仰梁宣帝當重肉少陵晚﨑嶇託命在黃獨天隨自寂寞療飢帷杞菊古來淪落人餘葉被草木我客漢東城鄰曲見木􅌻不知惱鵝鴨更忍纍口腹過從首三張伯仲肩二陸頳膚分子薑雲茁餽萌竹冥摉到百合真使丨丨丨軟溫甚鴟蹲瑩淨豈鴻鵠食之儻有助蓋昔先所服詩腸貯微甘茗􅀢爭餘馥果堪止淚無欲縱望鄉目王右丞紫薇花格物總論紫薇花俗名怕癢花樹身光滑俗因號為猴刺脫髙者丈餘花瓣紫皺蠟跗茸蕚赤莖葉對生每一枝數穎一穎數花四五月始華開謝接續可至六七月山谷間多有之省中亦多植此花者取其花耐久及爛熳可愛也事類姚崇為令唐制中書舍人知制誥丨丨丨徽丨開元改紫薇舍人又曰紫薇省唐書樂天所種虛白臺前有紫薇兩株俗云是丨丨丨丨賜御書詩哲宗朝邇英閣講論語終篇賜執政講讀官史官宴遣中使頒丨丨丨丨各一首東坡得樂天紫薇花絶句坡集詩集鋒頴幾年丹霄上出入金華省暫别萬年枝看花桂陽嶺南方足竒木公府成佳境紫茸垂組綬金樓攢丨丨露溽暗傳香風輕徐就影興生紅藥後愛與甘棠並不學妖桃姿浮榮在俄頃劉禹鍚綬花明麗碧天霞丰茸紫丨丨香聞荀令宅艷入孝王家幾嵗自榮辱髙情方歎嗟有人移上苑猶足占年華同上休更開不先搖落應為有己欲别離丨丨丨李義山誰是伴絲綸閣下文章靜鐘鼓樓中刻漏長坐對黃昏丨丨丨紫薇花對紫薇郎白香山凝瑞枝新曉丨丨露一丨丨不占圉林最上春桃李無言又何在向風偏笑艷陽人杜牧之草詔花旁人言清禁紫薇郎丨丨紫薇丨影丨山木不知官况别也隨紅日上東廊陶弼一叢暗淡丨丨丨丨將何比淺碧籠裙襯紫巾除却徽之見應愛人間少有别花人香山一樹穠姿丨丨丨丨獨看來秋庭暮雨洗塵埃天涯地角同榮謝豈要移根上苑栽李義山幽姿如自喜亭亭紫薇花向我如有意髙煙晚冥濛清露最㸃綴豈無陽春月所得時節異靜女不爭寵幽丨丨丨丨歐陽公薄膚不勝瓜丨丨癢丨丨輕丨嫩幹生宜近禁廬梅聖俞古今合璧事類備要别集卷三十一
