body:
  text: 古今合璧事類備要别集卷三十七宋謝維新撰花卉門芙蓉花格物叢話芙蓉之名二出於水者謂之草芙蓉荷花是也出於陸者謂之木芙蓉此花是也此花叢髙丈餘葉大盈尺枝幹交加冬凋夏茂及秋半始著花花時枝頭蓓蕾不計其數朝開暮謝後先陸續頗與牡丹芍藥相類但牡丹芍藥之花不如是之夥且繁也然此花以色取而無香有紅者有黃者有白者有先紅而後白者又有千葉者非一種而已况此花又最耐寒八九月餘天髙氣肅春意自如故亦有拒霜之名世俗多於近水處栽插而茂或者因號曰木蓮審然矣事類芙蓉苑開元二十年築夾城入芙蓉園唐地理志六蜚南幸丨丨丨十里香飄入夾城杜牧長安雜題芙蓉園丨丨丨魏文帝所開云云出於陸者曰木芙蓉杜詩注如錦相照孟後主於成都四十里羅城上種此花每至秋四十里皆丨丨繡高下丨丨因名錦城成都記麗服靚粧慶厯中有一朝士將曉赴朝見美女三十餘人丨丨丨丨兩兩並馬而行觀文丁度按轡於其後朝士驚丁素儉約何姫之衆邪有一人最後行朝士問曰觀文將宅眷何往曰非也諸女御迎芙蓉館主爾俄聞丁卒石林燕語欲呼故人遊石曼卿去世後其故人有見之者云我今為仙主芙蓉城丨丨丨丨共丨不諾忿然騎一素驢而去歐公歸田録獨向君猷開東坡云九月十日猷之置酒秋香亭有拒霜丨丨丨丨丨坐客善笑以為非使君莫可當此作此詞以記之詞集詩集艷色誰開寒露叢逺比水邊紅丨丨寧相妬嘉名偶自同採江秋節晚搴木古祠空須勸勤來看無令便逐風昌黎集濃芳有美不自蔽安能守孤根盈盈湘西岸秋至風露繁麗景别寒水丨丨委前軒芰荷諒難比反此生高原柳子厚湘岸移木芙蓉植龍興精舍伴醉物晚凉思飲兩三杯召得江頭酒客來莫怕秋無丨丨丨水蓮花盡木蓮開白樂天木芙蓉下招客飲多異容新亭俯朱檻嘉木開芙蓉清香晨風逺縟綵寒露濃瀟灑出人世低昂丨丨丨嘗聞色空喻造物難為工留連秋月宴迢遞來山中柳宗元芙蓉亭織出錦窠種處雪消春始動開時霜落鴈初過誰裁金菊叢相近丨丨新開蜀丨丨歐陽公木芙蓉強擡青鏡水邊無數木芙蓉露滴胭脂色未濃正似美人初醉著丨丨丨丨照粧慵王介甫木芙蓉莫笑黃菊芳菲能幾時顔色如自愛鮮鮮弄霜曉裊裊含風態蕙蘭殞秋香桃李嬌春醉時節雖不同盛衰終一致丨丨丨丨花籬根守憔悴歐陽公拒霜花喚作拒霜千枝掃作一畨黃只有芙蓉獨自芳丨丨丨丨知未稱看來却是最宜霜東坡和陳述古拒霜花宇不凄凉拒霜花已吐吾丨丨丨丨天地雖肅殺草木亦芬芳道人宴坐處侍女古時裝濃霜濕丹臉西風吹緑裳陳去非拒霜溪上春酣人間八月秋霜嚴芙蓉丨丨丨丨酣二南變盡魯叟筆七國破後鄒軻談人間三月春光好溪上芙蓉跡如掃周家盛處伯夷枯漢室隆時賈生老小兒造化誰能窮幾回枯枿還芳叢只應人老不復少有酒且發衰顔紅唐子西芙蓉溪朝開暮落悲水南芙蓉秋已衰繁枝倒是著花時平明露滴垂紅臉似有丨丨丨丨丨李嘉運秋朝木芙蓉樂府秋艷胭脂霜華滿樹蘭凋蕙慘丨丨入芙蓉丨丨嫩臉黃金輕蘂猶自怨春風前歡往事當歌對酒無限到心中更憑朱檻憶芳蓉䁑斷一枝紅小年遊晏元獻月色赭黃魚藻池邊射鴨芙蓉苑裏看花丨丨丨丨相似不著紅鸞扇遮明池北池南水緑殿前殿後花紅天子千秋萬嵗未央月清風三臺令柳耆卿低昂煙雨裏兩兩輕紅半暈腮依依獨為使君回若道使君無此意何為雙花不向别人開狂但有丨丨丨丨丨不已勸君休訴十分杯更問樽前副使來嵗花開時節與誰來定風波坡殷勤霜露中氷明玉潤天然色拚作西風客不肯嫁東風丨丨丨丨丨緑窗梳洗晚罰飲琉璃盞斜日上粧臺酒紅和困來菩薩蠻范石湖葵花附一丈紅格物叢話葵之種多矣有蜀葵有蒲葵有菜葵其名不一而足蓋取其可食名葵菜取其葉名蒲葵取其花可玩名蜀葵今取其花者而評之花五色或白或黃或紅又或紫黃色紫黃色者莖大而葉小紅者不多見浙人種之俗號一丈紅惟黃者雖所在而有亦不一種叢高四五尺春生苖葉葉尖小而多缺刻夏末開花花如木槿又或檀心與姚黃蘂相類此蜀葵也又别有一種花之小者葉圓名錦葵又名戎葵又一種其叢低者名錢葵猶未也其間又一種千葉花者千葉尤可愛也世俗之人惟知蜀葵所在而有而不之辨將以一概目之可乎事類傾日黃葵常丨葉向丨不令照其根說文承露葵丨丨也大莖小葉華紫黃色出爾雅如木槿菺戎葵今蜀葵丨丨丨花晉傳元蜀葵賦序曰其苖似瓜瓠既大而潔鮮黃色耀日爾雅如牡丹蜀葵有檀心色丨丨丨姚黃蘂本草以上並只蜀葵花虞繁賦惟兹珍草懷芬吐榮挺河渭之膏壤吸昴井之元精繞銅雀而疏植映昆明而羅生作妙觀於神州扇令名於東京馳驛命而逺致攢華林而麗庭申修翹之冉冉播圓葉之青青韓渥賦蝶翅堪憎蜂鬚可妬幾多之金粉遭竊一㸃之檀心被汚梁王均賦布護交加蓊茸分葩疏莖密葉翠蕚丹華詩集豐條丨丨併春盛落葉後秋衰慶彼晚凋福忘此孤生悲陸機生理翩翩晚凋葵孤生寄此蕃被䝉覆露恩微軀後時殘庇足同一智丨丨各萬端不若聞道易但傷知命難同上朝榮種葵北園中葵生鬱萎萎丨丨東西傾夕穎西南晞零露垂澤鮮明日耀其輝同上日開昨夜一花開今丨一花丨今日花正好昨日花已老人生不得長少年莫惜床頭沽酒錢請君有錢向酒家君不見戎葵花唐岑參八葉名花丨丨嫩黃金色㸃書窗透竹林無奈美人間把嗅直疑檀口印中心張祐數窠眼前無奈蜀葵何淺紫深紅丨白丨能共牡丹成幾許得人輕處祗緣多陳標香亦淺紅紫相嗣繁色鈍丨丨丨相對庭戶間俗尚焉能免宋景文公顔欲酡白若繒初斷紅如丨丨丨坐令仙駕儼幢節紛駢羅物性有常妍人情輕所多菖蒲儻自秀棄擲不吾過溫公向太陽白露清風催八月紫蘭紅藥共凄凉黃花冷淡無人看獨自傾心丨丨丨劉原父不禁秋開時間淡斂時愁蘭菊應容預勝流剩欲持杯相領略一庭風露丨丨丨范蜀公金丹術秋風似學丨丨丨戲把硫黃製酒杯陳司封鵝黃色此花莫遣俗人看新染丨丨丨未乾好逐秋風天上去紫陽宫裏要頭冠李涉不入眼炎天花盡歇錦繡獨成林丨丨當時丨其如向日心寶叉知見棄幽蝶或來尋誰許清風下芳醪對一斟韓忠獻也傾心人笑戎葵定自癡不愁䂀景蚤和遲便令隔霧光難到丨則丨丨苦為誰衛足平生非我志向陽一㸃只天知話頭試問程休父休父丹𠂻便是葵楊誠齊寄程山父道家裝束嬌黃初綻欲題詩今日含毫有所思記得玉人春病較丨丨丨丨厭禳時薛能黼座朦朧黃葵貴麗不天饒一朵新晴松外高還似邇英臨丨丨丨丨曉日照天袍宋景文公一丈紅弄淺深紅白青黃丨丨丨旌分幢别自成隂但疑承露矜殊色誰識傾陽無二心楊巽齊初咫尺花生丨丨丨意思已尋丈一日復一日看看衆花上吳荆溪換紫翻紅恐是牡丹重丨丨又疑芍藥再丨丨嬌嬈不辨桑間女蔽芾深迷苧下翁陳石齊樂府天然嫩態秋花最是黃花好丨丨丨丨迎秋早染得道家衣淡粧梳洗時晚來清露滴一一金杯側插向緑雲鬟便隨王母仙菩薩蠻晏元獻古今合璧事類備要别要卷三十七
