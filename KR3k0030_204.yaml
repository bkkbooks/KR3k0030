body:
  text: 古今合璧事類備要續集巻五十四宋謝維新撰恩讎門報怨附不修怨事理發揮與報讎同事類以怨報丨丨丨怨則民有所懲表記以直報子曰何以報德丨丨丨怨以德報德語置莝豆魏相魏齊笞擊范雎雎佯死即巻以簀置厠中范雎得出遂相秦號曰張禄而魏不知以為范雎死矣魏聞秦且東伐韓魏魏使須賈於秦范雎聞之為微行敝衣閒歩之邸見須賈須賈見之驚曰范叔無恙乎曰為人庸賃須賈哀之畱與坐飲食乃取其一綈袍賜之因問秦相張君雎曰主人翁願為君借大車駟馬於主人翁范睢歸取大車駟馬為須賈御之入秦相府須賈立門下待睢良久問門下曰范叔不出何也門下曰乃吾相張君也須賈大驚自知見賣乃肉袒膝行因門下人謝罪范睢曰汝罪有三所以得無死者以綈袍戀戀有故人之意故釋公入言之昭王罷歸范雎大供具盡請諸侯使坐堂上飲食甚設而坐須賈於堂下丨丨丨其前令兩黥徒夾而馬食之又曰范睢眦睚之怨必報本傳封羮頡漢髙祖怨丘嫂之轑崟丨其子為丨丨侯楚元王傳毋效丁丁公為項羽將嘗窘髙祖於彭城西及項氏㓕丁公謁見高祖以丁公徇軍中曰丁公為項王臣不忠使項氏失天下遂斬之曰使後為人臣者丨丨丨公也季布傳請斬錯晁錯為御史大夫使吏按袁盎受呉王財物言呉楚不反抵罪及呉楚果反錯欲治盎盎恐夜見竇嬰為言呉所以反願至上前口對狀嬰入言上乃召盎盎對曰方今計獨有斬錯發使赦呉楚三國復其故地上曰吾不愛一人以謝天下乃召錯斬東市斬醉尉漢李廣以將軍擊匈奴坐亡失多與故頴隂侯屏居藍田南山中射獵嘗從一騎出從人田間飲還至覇陵尉醉呵止廣廣騎曰故李將軍尉曰今將軍尚不得夜行何故也廣宿亭下居無何武帝召廣為右北平太守廣請覇陵尉與俱至軍斬之上書謝罪上報曰報忿除害捐殘去殺朕之所圖於將軍也若廼免冠徒跣稽顙請罪豈朕之指哉將軍其率師東轅以臨右北於盛秋斬掾吏漢張敞事見後集京尹門毋入偃門元朔中徐偃言齊王有淫泆之行上拜偃為齊相至齊徧召昆弟賔客㪚五百金與之數曰吾始貧時昆弟不我衣食賔客不我内門今吾相齊諸君迎我或千里吾與諸君絶矣丨復丨丨丨乃使人告王與姊奸事動王王自殺上大怒以為偃刼其主令自殺偃方貴幸時客以千數及族死無一人視獨孔車收葬焉上聞以車為長者本傳陳㓕囂計馬援上書曰夫居前不能令人輊居後不能令人軒與人怨而不能為人患臣所恥也願詣行在所丨丨隗丨丨加享杖罰晉何曽位太宰性華侈都官從事劉享嘗奏曾以銅鈎黻紖車塋牛蹄角後曽辟享為掾或勸勿應享謂至公之體不以私憾遂應辟曽因小事丨丨丨丨外寛内忌如此加吏鞭箠梁沈瑀為餘姚令始至富吏皆鮮衣羙服自别瑀怒悉令着芒屩麄布侍立終日足有蹉跌輙丨鞭箠瑀微時嘗至餘姚鬻瓦器為富吏所辱故報之操所不樂許收恃功驕慢嘗於衆坐呼曹操小字曰某甲卿非我不得冀州也操笑曰汝言是也然内不樂後竟殺之漢獻紀導所甚㗸周顗曰今年殺賊奴取金印如斗大繋肘王導甚㗸之顗為王敦所害本傳孫秀宿恨孫秀旣恨石崇不與緑珠又憾潘岳昔遇之不以禮後秀為中書令岳省内見之因喚曰孫令憶疇昔周旋否秀曰中心藏之何日忘之岳父文德為瑯琊太守孫秀為小吏給使岳數踧踏不以人遇之後收石崇及岳石先送市亦不相知潘後至石謂潘曰安仁卿亦復爾耶潘曰可謂白首同所歸潘金谷詩云投分寄石友白首同所歸乃成其䜟世說右軍嫌隙王右軍素輕藍田述藍田晩節論譽輕重右軍尤不平藍田於㑹稽丁艱停山隂治喪右軍代為郡佯言出弔連日不果後詣門自通主人既哭不前而去以陵辱之於是嫌隙大搆後藍田臨楊州右軍尚在郡初得消息遣一參軍詣朝廷求分㑹稽為越州使人受意失㫖大為時賢所笑藍田宻使從事數其在郡不法以先有隙令自為其宜右軍遂稱疾去郡以憤慨致終延賞宿憾張丨丨與李晟有丨丨及俱入朝韓滉從容邀晟平憾且使薦延賞於帝復拜平章事旣而宴禁中帝出瑞錦一端以示和解因為子求婚延賞不許晟曰吾武夫雖有舊惡盃酒即解儒者難犯外睦而内含怒今未許婚釁未忘也本傳貶晏忠州楊炎為吏部侍郎劉晏為尚書盛氣不相下晏治元載罪而坐貶及炎執政衘宿怒將為載報仇遂罷丨丨丨丨刺史炎必欲𫝊其罪知庾凖與晏素憾乃擢為荆南節度使凖即奏晏與朱泚書語言怨望又葱卒擅取官物脅詔使謀作亂炎證成之建中元年詔中人賜晏死天下以為寃出逢巴州李吉甫為相多修舊怨唐憲宗通鑑薛逄與劉瑑相善瑑詞藝不逮逢逢毎侮之後瑑作相逢為郎官有薦薛逢知制誥者瑑以故事給含須歴郡縣丨丨為丨丨刺史又見同年門恩怨必報李訓鄭注平生絲髪恩怨無不報者唐文宗紀恩讎皆報桑維翰拜相故人韓魚通謁公黙不語魚退曰桑公吾故人今見之有不可犯之色翌日告别公曰吾奏子姓名授子學士俄有二人持箱中有黄詔及袍笏之類公置酒開懷曰未炳秀才安乎頃取相愛爲吾召來一如魚禮他日又曰羗岵秀才何在最相鄙薄君子不念舊惡為吾作書召之當與一官岵至怱有數人執岵云羗岵謀反罪當處斬岵大呌曰韓魚召我來受官我何罪乃斬之魚乃告疾還鄉一日公坐小軒見岵來曰相公生殺在已岵昔日同場屋閑相諧謔乃戲笑耳相公何報之深也吾上訢於天帝矣公曰吾為子飯僧誦佛書可乎岵曰得君之命而已公不久果死青鎻出普河陽竇儀開寳中為翰林學士時趙普專政帝患之欲聞其過一日召儀語及普所為多不法且譽儀早負才望之意儀盛言普開國勲臣公忠直亮社稷之鎮帝不悦儀歸言於諸弟張酒引滿語其故曰我必不作宰相然亦不詣朱崖吾門可保矣旣而召學士盧多遜多遜嘗有憾於普又喜其進用遂攻普之短出鎮河陽普之罷甚危賴以舊勲脫禍多遜遂參知政事作相太平興國七年普復入相多遜有崖州之行是其言之騐也貶盧崖州見上造成案底富鄭公與韓公議不合富恨之至不弔魏公喪富公守某州魯直為尉久未之任在路遷延富有所聞大怒及到遂不與交代後幕幹勸之方肯及魯直在史館修韓魏公傳使人問富曽弔韓喪否知其不曽遂以此事送下案中丨丨丨丨後人雖修去此事而有案底竟不可去魯直也可謂乖但魏公年年却使人去鄭公家上壽恁地便是富不如韓較寛朱語録不修怨不宿怨萬章曰象日以殺舜為事云云封之有庳有􅋻之人奚罪焉仁人之於弟也不藏怒焉丨丨丨焉親愛之而已矣孟子不含怒周公曰嗚呼自殷王中宗及高宗及祖甲及我周文王玆四人廸哲厥或告之曰小人怨汝詈汝則皇自敬德厥愆曰朕之愆允若時不啻不敢丨丨丨不念舊惡子曰伯夷叔齊丨丨丨丨怨是用希語亦恥匿怨子曰匿怨而友其人左丘明耻之丘亦耻之得仁何怨冉有入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而丨丨又丨丨在邦無怨仲弓問仁云云已所不欲勿施於人丨丨丨丨在家無怨並同上竊灌楚𤓰梁大夫宋就為邊縣令與楚隣界梁楚邊亭皆種𤓰梁亭劬力數灌其𤓰羙楚人窊而希灌其𤓰惡楚令以梁𤓰之羙怒因徃夜竊搔梁𤓰梁覺之欲徃報搔楚𤓰宋就曰是搆怨之道也乃令夜徃丨為楚丨𤓰楚且徃則已灌𤓰伺而察之則梁亭為也楚令大恱因具告楚王楚王乃謝以重幣故梁楚之讙由宋就也賈誼新書又餼晉粟僖十五年初晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉戰於韓原獲晉侯是嵗晉又饑秦丨丨之粟曰吾怨其君而矜其民姑樹德焉左卒相管仲鮑叔帥師來言曰子紏親也請君討之管召讎也請受而甘心焉乃殺子紏於生竇召忽死之歸而以告曰管夷吾治於高傒使相可也公從之左莊九卒見寺披晉文公入寺人披請見公使讓之且辭焉曰蒲城之役君命女一宿女即至其後余從狄君以田渭濵女為惠公來求殺余命女三宿女中宿至雖有君命何其速也夫袪猶在女其行乎對曰臣謂君之入也其知之矣若猶未也又將及難君命無二古之制也除君之惡唯力是視蒲人狄人余何有焉今君即位其無蒲狄乎齊桓公置射鈎而使管仲相君若易之何辱命馬行者甚衆豈惟刑臣公見之以難告左僖二十四遽見頭須晉侯之豎頭須守藏者也其出也竊藏以逃盡用以求納之及入求見公辭焉以沭謂僕人曰沭則心覆心覆則圖反宜吾不得見也居者為社稷之守行者為羈絏之僕其亦可也何必罪居者國君而讎匹夫懼者甚衆矣僕人以告公丨丨之左僖二十四卒用孟明晉敗秦師於殽獲孟明視以歸文嬴請之使歸公許之秦伯素服郊次鄉師而哭曰孤違蹇叔以辱二三子孤之罪也不替孟明孤之過也大夫何罪且吾不以一𤯝掩大德左僖三十三因赦季布見前解紛注卒善田甲漢韓安國為梁中大夫坐法抵罪獄吏田甲辱之安國曰死灰獨不復然乎甲曰然即溺之居無幾漢拜安國為梁内史起徒中為二千石田甲亡安國曰甲不就官我㓕而宗甲肉袒謝安國笑曰公等足與治乎卒善遇之至門謝罪周赧王三十六年趙以藺相如為上卿位在亷頗之右頗曰我為趙將有功相如徒以口舌而位居上吾羞不忍為之下宣言曰我見相如必辱之相如聞之毎朝嘗稱病不欲爭列出而望見輒引車避匿其舍人皆以為恥相如曰子視亷將軍孰與秦王曰不若相如曰夫以秦王之威而相如廷叱之辱其羣臣相如雖駑獨畏亷將軍哉顧吾念之强秦之所以不敢加兵於趙者以吾兩人在也今兩虎方鬬勢不俱生吾所以為此者先國家之急而後私讎也亷頗聞之肉袒負荆丨丨丨丨遂為刎頸交同車共出漢光武二年賈復部將殺人頴川太守冦恂捕而戮之復以為恥謀殺恂恂知其謀不欲與相見姊子谷崇曰崇將也得帶劒侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於亷頗者為國也乃敕屬縣盛供具儲酒醪執金吾軍入界一人兼二人之饌恂出迎於道稱疾而還復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徴恂至引見時賈復先在坐欲起相避帝曰天下未定兩虎安得私鬬今日朕分之於是並坐極歡遂丨丨丨丨結友而去通鑑不忘上壽見前造成案底註何暇恤私趙清獻為御史力攻陳恭公范文正公范蜀公知諫院獨救之清獻遂併劾蜀公黨宰相懐其私㤙蜀公復論御史以隂事誣人是妄加人以死罪請下詔斬之以示天下熈寧初蜀公與時論不合求致仕或欲遂謫之清獻不從或曰彼不嘗欲斬公者耶清獻曰吾方論國事丨丨丨丨怨方蜀公辨恭公時世固不以為過至清獻之言聞者尤嘆服云石林燕語不省前言孫文懿公眉州人少時家貧欲典田赴試京師自經縣判狀尉李昭言戲之云似君人物求試京師有幾文懿以第三登第後判審官院李昭言者赴調見公恐甚意公不忘前日之言也公特差昭言知眉州又公嘗聚徒榮州得束修之物持歸為一村鎮將悉稅之至公任監左藏庫鎮將者部川絹綱至見公愧懼公慰藉之贈黄金一兩其盛德如此聞見録不怨䑓劾文潞公以太尉畱守西京唐介參政之子義問為轉運判官文潞公謂曰仁宗朝先參政為䑓諫以言某謫官某亦罷相判潭州未幾某復召還相位某上言唐某所言正中臣罪召臣未召唐某臣不敢行仁宗用某言起參政通判潭州尋至大用與某同執政相知為深聞見録不易臺記陳希亮字公弼剛正人也嘉祐中知鳯翔府東坡初擢制科簽書判官事吏呼蘓賢良公怒曰府判官何賢良也杖其吏不顧或謁入不得見故東坡客次假寐詩云雖無性命憂且復忍斯須後九日獨不預府宴登真興寺閣詩云憶弟恨如雲不㪚望鄉心似雨難開其不堪如此又詩案云任鳯翔府僉判為中元節不過府㕔罰銅八斤亦公弼案也坡作齋醮禱祈諸神文公弼必塗墨改定數徃返至為公弼作凌虚䑓記曰東則秦穆公祈年槖泉南則漢武帝長楊五柞北則隋之仁壽唐之九成計一時之盛宏傑詭麗堅固而不可動者豈特百倍於䑓而已哉然數世之後欲求其髣髴破瓦頽垣無復存者旣已化為禾黍荆棘丘墟壠畝矣而况於此䑓歟夫䑓不足恃於久長而况於人事之得喪忽徃而忽來者歟或者欲以夸世而自足則過矣公弼覧之笑曰吾視蘓明允猶子也某猶孫子也平日不以辭色假之者以其年少暴得大名懼夫滿而不勝也乃不吾樂耶不易一字亟命刻之石朱語録快怨佳人怨劉禹鍚桞子厚與武元衡素不協二人之貶元衡為相時也禹鍚為靖共丨丨丨以悼元衡之死其實快之子厚古東門行亦然朱語録東門行見上注詩集中道絶棄捐篋笥中恩情丨丨丨班媫妤怨歌行多容忤希怨猶􅑮怒丨丨竟丨强桞冩餘恨怨句丨丨丨坡不修怨聊相贖德怨丨丨丨前人常自嗟紅顔勝人多薄命莫怨春風丨丨丨歐公明妃曲古今合璧事類備要續集卷五十四
