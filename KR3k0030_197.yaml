body:
  text: 古今合璧事類備要續集卷四十七宋謝維新撰事為門還歸事理發揮還歸可樂之事也故久客之樂不如歸早之樂錦城之樂不如還家之樂蓋父母有倚閭之望婦女有幽閨之夢而朋友亦且有抱橋之約昔年之間闊而此時之合并幾載之分離而一旦之檀欒樂乎不樂乎然富貴而歸故鄉邦人且榮之况家人乎茍困躓不偶而後告歸焉則兄弟妻妾曽不免於竊笑其於里閭之人可知已謂豫不信請詳春秋書至之義事類言還薄丨丨歸詩出車言歸言還丨丨詩遄歸式丨其丨豫還曷月丨丨歸哉揚之水來自東東山周公東征也周公東征三年而歸勞歸士大夫美之故作是詩也云云我徂東山慆慆不歸我丨丨丨零雨其濛詩來自鎬薄伐玁狁至于太原文武吉甫萬邦為憲吉甫燕喜既多受祉丨歸丨丨我行永久畢禮而歸秦王請以十五城易趙璧秦既得璧無意償趙城藺相如使人懷璧歸趙卒廷見相如丨丨丨丨之相如既歸趙王以為賢拜為上大夫史本傳大困而歸蘇秦東周雒陽人東師事於齊而習之於鬼谷先生出遊數嵗丨丨丨丨兄弟嫂妹妻妾竊皆笑之史本傳馬角乃歸燕太子丹為質於秦秦不禮乃求歸秦曰待烏白頭馬生角當放子歸太子仰天哭感得烏頭白丨丨生秦王大驚丨遣丹丨遊歷紀聞羝乳乃歸蘇武以中郎將使持節使胸奴單于益驕欲降之乃幽武置大窖中絶不飲食後又徙北海上無人處使牧羝丨丨丨得丨後又數年胸奴和親漢求武等常惠教漢使者謂單于言漢天子射上林中得雁足有繫帛書言武在某澤中使者如惠語單于驚謝隨武還者九人漢本傳命駕而歸張翰字季膺吳郡人齊王冏辟為大司馬東曹掾翰因見秋風起乃思吳中菰菜蓴羮鱸魚鱠曰人生貴得適志何能羈宦數千里以要名爵乎遂丨丨丨丨俄而冏敗人謂之見機晉本傳解印乃歸陶潛字元亮以親老家貧為鎮軍建威參軍事謂親朋曰聊欲絃歌以為三徑之資可乎執事者聞之以為彭澤令在縣公田悉種秫穀妻子固請五十𤱔種粳郡遣督郵至縣吏白應束帶見之潛歎曰吾不能為五斗米折腰拳拳事鄉里小人邪丨丨去縣丨賦丨去來本傳角巾還第有往來者言庾公有東下意或謂王公可潛稍嚴以備不虞王公曰我與元規雖俱王臣本懷布衣之好若其欲來吾丨丨徑丨烏衣何所稍嚴角巾歸里羊祜與從弟琇曰既定邊事當丨丨東路丨故丨為容棺之墟以白士而居重位何能不以盛滿受責乎見本傳置軟腳局郭子儀自同州歸詔大臣就宅丨丨丨丨人率三百千作軟腳會出有賜曰餞路反有勞曰軟腳楊國忠傳淵明歸來辭歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟已往之不諫知來者之可追實迷途之未逺覺今是而昨非舟搖搖以輕揚風飄飄而吹衣問征夫以前路恨晨光之熹微乃瞻衡宇載欣載奔僮僕歡迎稚子候門三徑就荒松菊猶存攜幼入室有酒盈樽引壺觴以自酌眄庭柯以怡顔倚南窗以寄傲審容膝之易安園日涉以成趣門雖設而常關策扶老以流憩時矯首而遐觀雲無心以出岫鳥倦飛而知還景翳翳以將入撫孤松而盤桓歸去來兮請息交以絶遊世與我而相違復駕言兮焉求恱親戚之情話樂琴書以消憂農人告余以春及將有事乎西疇或命巾車或棹孤舟既窈窕以尋壑亦﨑嶇而經丘木欣欣以向榮泉涓涓而始流善萬物之得時感吾生之行休已矣乎寓形宇內復幾時曷不委心任去留胡為皇皇欲何之富貴非吾願帝鄉不可期懷良辰以孤往或植杖而耘耔登東臯以舒嘯臨清流而賦詩聊乘化以歸盡樂夫天命復奚疑東坡黃泥坂詞出臨臯而丨騖兮並藂祠而北轉走雪堂之丨陀兮歷丨丨之長丨大江洶以左繚兮渺雲濤之舒卷草木層纍而右附兮蔚柯丘之蔥蒨余旦往而夕還兮涉徙倚而盤桓雖信美不可居兮茍娛余於一盻余幼好此竒服兮襲前人之詭幻老更變而自哂兮悟驚俗之來患釋寶璐而被繒絮兮雜市人而無辨路悠悠而莫來往兮守一席而窮年時遊步而逺覽兮路窮盡而旋返朝嬉黃泥之白雲兮莫宿雪堂之青煙喜魚鳥之莫余猜兮幸樵蘇之我嫚初被酒以行歌兮忽放杖而醉偃草為茵而塊為枕兮穆華堂之清晏紛墜露之濕衣兮升素月之團團感父老之呼覺兮恐牛羊之豫踐於是蹶然而起起而歌曰月明兮星稀迎余往兮餞余歸嵗既晏兮草木腓歸來歸來兮黃泥不可以久嬉陳瓘和去來辭歸去來兮人生之樂無如歸捨軀命而不保茲明哲之所悲悼前言於既往舌駟馬兮焉追持孤願以取戮叢一身之百非心耿耿兮如醉淚浪浪兮霑衣情犬馬兮恩厚命螻蟻兮力微乃瞻帝闕夢馳心奔俯步駑蹇曽嘶君門筋力已竭皮骨空存煙不染突酒釃空尊縱傷戚之盈抱遣飢渴而違顔先衆餒以獨飽非素懷之所安偶隻影而南騖度桂嶺之遙關賴皇州之獨照邁羲娥而監觀逸二句稽白刃於稿頸察忠精之枅木淵明此句云撫孤松而盤桓歸去來兮息心猿之外遊覓波鏡而不得奚泡像之可求聽自他之可幻寂間忙之兩憂吾既知之矣又將以告乎羽儔事海無際身如輕舟葵轉動以傾日狐終盡而首丘首去聲見檀弓金百死而不化水萬折而東流荀子宥坐篇審物性之莫奪戒餘習之未休已矣乎岫雲舒卷各有時出者自出留者自留誰能比迹而同之華胥非一途遊寢不可期列子黃帝篇諒飢穰之莫易聊致力於耘耔感子牟之昨夢莊子遜王篇繼天保而成詩雖死生之事大矣安之若命復何疑詩集反柴荆俶裝丨丨丨陶入桑梓謝病始告歸依依丨丨丨家人相佇立相候衡門裏時輩今長年成人舊童子上堂嘉慶畢顧與姻親齒論舊忽餘悲自存且相喜田園轉蕪沒但有寒泉水衰柳日蕭條秋光清邑里入門乍如客歸騎非便止中飲顧王程離憂從此始王維休假還舊業便使歸舊廬杜門不欲出久與世情踈以此為長策勸君丨丨丨醉歌田舍酒笑讀古人書好是一生事無勞獻子虛王維送孟六歸襄陽問來人近家心轉切不敢丨丨丨獨孤遐且慰意新歸丨丨丨生理焉足説杜北征不是夢去逺即相忘歸近不可忍兒女已在眼眉目略不省喜極不得語淚盡方一哂了知丨丨丨忽忽心未穩陳無已示二子乍歸猶似客馬首曽行處連嘶渡晚河忽驚鄉樹出漸識路人多細徑穿禾黍頽園壓薜蘿丨丨丨丨丨鄰叟亦相過李昌符秋晚歸故居薄宦等飛蓬三十餘年西復東勞生丨丨丨丨丨所存舊業唯清白不負明時有朴忠早避喧煩真得策未逢危辱好收功太平觸處農桑滿贏取閭閻鶴髮翁司馬君實歸洛言懷人事半消磨離别家鄉嵗月多歸來丨丨丨丨丨惟有門前鑑湖水春風不減舊時波黃拱還鄉偶書歸計又蹉跎住山人少説山多空只年年憶薜蘿不是自心應不信眼前丨丨丨丨丨沈存中歸計兒童不相識少小離家老大回鄉音難改鬢毛總丨丨相見丨丨丨却問客從何處來黃拱閭里喜我來曠士愛吾廬遊子悲故鄉慷慨四方志老衰但悲傷虛名自成誤失得略相當莫年還家樂未覺道路長丨丨丨丨丨車馬塞康莊爭前借言色草木亦晶光向來千人聚一老獨徜徉手開南陽阡松柏鬱蒼蒼永願守一丘脫身萬里航平生功名念倒海浣我腸尚恐北山南有文移路傍陳無已還里合并事理發揮人生不相見動如參與商甚矣合并之難也一堂魚水千載雲龍君臣之遇合也家庭唯諾詩禮問酬父子之會合也閨門肅睦琴瑟倡隨夫婦之和合也塤箎唱應棣蕚輝煌金蘭氣味膠漆情况兄弟朋友之投合也然時與事乖迹多願違每每交相悖而不相值者是豈人情之所不欲哉乃人道之不能齊也故一日之合并一日之樂也一時之合并一時之樂也一嵗之合并一嵗之樂也無爭競陵犯之風有雍容輯睦之氣無扞格齟齬之習有樂易愷悌之心易曰勿疑朋盍簪書曰汝有合哉詩曰會辨如星政此謂也然有以仁義而合者有以財利而合者以仁義而合君子之合也以財利而合市井之合也人而不為君子之合而為市井之合安恬而不知怪是誠可鄙耳事類勿疑丨丨朋盍簪注丨丨則朋合簪也易豫卦適願邂逅相遇丨我丨兮詩野有蔓草班荆而食楚伍舉將奔晉聲子遇之於鄭郊丨丨相與食而言注布荆坐也左襄二十六傾蓋而語孔子之郯遇程子於塗丨丨丨丨終日甚相親家語何自從兒商山四皓從太子鬚眉皓白衣冠甚偉上怪問曰何為者四人各言姓名上驚曰吾求公逃避我今公丨丨丨吾丨遊乎云云故臣等來漢張良傳與上會留漢髙帝使張良自擇齊三萬戶良曰始臣起下邳丨丨丨丨此天以臣授陛下同上吾久不見文帝思賈誼召之至入見上方受釐宣室上因感鬼神之事而問鬼神之本誼具道所以然之故至夜半文帝前席既罷曰丨丨丨丨賈生自以為過之今不及也乃拜梁大傅賈誼傳公皆安在主父偃徐樂嚴安俱上書言世務書奏上召見三人謂曰丨丨丨丨何相見之晚也乃皆拜郎中主父傳留宿間語光武安集河北即杖策北渡追及於鄴光武見之甚歡謂曰我得専封拜生逺來寧欲仕乎禹曰不願光武曰即如是何欲為禹曰但願明公威德加於四海禹得效尺寸垂功名於竹帛耳光武因丨丨丨丨注間私也鄧禹傳每接宴語隗囂使馬援奉書洛陽援至光武引見於宣德殿世祖迎笑云云及歸囂問援曰前到朝廷上引見數十丨丨丨丨援傳恨相得晚太宗鋭於立事馬周所建皆切一時以明佐聖故君宰間不膠漆而固丨丨丨丨宜矣唐史本贊至即召見玄宗講武新豐帝密召姚崇崇丨帝方獵渭濵丨丨丨帝悅與俱馳逐見本傳揚州江中崔信明嘗矜其文丨丨録事參軍鄭世翼遇信明丨丨謂曰聞公有楓落吳江冷之句願見其餘信明欣然多出衆篇世翼覽未終曰所見不逮所聞投諸水引舟去本傳飯顆山頭丨丨丨丨逢杜甫頭戴笠子日卓午為問緣何太瘦生只為從來作詩苦李白叩門大呼張乖崖少與逸人傅霖同學公既顯達求霖三十年不可得作憶霖詩云寄語曹由莫相笑此生終不羡輕肥晚年守宛丘有被褐騎驢丨丨丨丨曰語尚書青州傅霖閽吏走白公曰傅先生天下士汝何人敢呼姓名霖笑曰别子一世尚爾童心是豈知世間有我哉公問昔何隱今何出霖曰子將亡矣來報子公曰詠亦自知之霖曰知復何言後一月公薨朱元晦聚星亭畫屏贊按世説陳太丘詣荀朗陵貧儉無僕役乃使元方將車季方持杖從後長丈尚少載著車中既至荀使叔慈應門慈明行酒餘六龍下食文若一小坐著膝前於時太史奏真人東行考亭陳氏故有離榭名以聚星蓋取續陽秋語中更廢壞近始作新適邇敝廬因得相其役事既又為之本原事迹畫著屏上并為之贊以視來者云猗歟陳子神嶽鍾英文淵懿範道廣心平危孫汚隆卷舒自我是曰庶幾無可不可獻身安衆弔孺全邦炯然方寸秋月寒江願言懷人曰我同志故朗陵君荀季和氏連峯對起麗澤潛滋僾而不見有黯其思薄言造之顧無僕役獨呼二兒駕豫以出青芻黃犢布幰柴車策紀前衛杖諶後趨所造伊何髙陽之里維時荀君聞至而喜顧謂汝靖往應於門七龍矯矯布席開尊靖肅而前翁拜其辱何悟斯晨得見清穆命爽行觴旅饋次陳獻酬交錯禮度情親載笑載言罔非德義益邁乃猷以輔斯世髧髦兩稚亦置膝前源深本固莫出匪賢維此慈明特謝儔匹晚際國屯敢憚濡迹贅旒之命恃以少延邦朋之最孰與為先郁乃附曹羣亦忘漢嗣守之難古今共歎崇臺回極於以占天猶曰兹野德星萃焉我寓有亭舊蒙斯號今刺前聞象儀以告髙山景行好德所同課忠責孝獨槩余衷百爾窺臨鏡考毋怠死國承家永奉明戒詩集會面人生不相見動如參與商今夕復何夕共此燈燭光少壯能幾時鬢髮各已蒼訪舊半為鬼驚呼熱中腸焉知二十載重上君子堂昔别君未婚兒女忽成行怡然敬父執問我來何方問答未及已兒女羅酒漿夜雨剪春韭新炊問黃粱主稱丨丨難一舉纍十觴十觴亦不醉感子故意長明日隔山嶽世事兩茫茫杜甫贈衛八處士握手故人阻千里會面非别期丨丨於此地當歡返成悲念離宛猶昨俄已經於期疇昔皆少年别來髮如絲不通舊姓名相逢知是誰曩遊盡騫翥與君仍布衣豈曰無其才命理應有時别路漸欲少不覺生涕洟沈千運贈史修文識平生元稹為御史奉使東川於褒城贈黃明府詩其序云昔年曽於解縣飲酒余為觥録事嘗於竇明府廳有一人至頻犯語令連飛十數觥不勝因逃去醒後問人前虞卿黃丞也此後絶不復知元祐四年三月奉使東川十六日至褒城馹逡巡有黃明府見迎瞻其形容髣佛似識問其前銜即曩日逃席黃丞也説向前事黃生惘然而悟因饋酒一樽􅋈舟請余同載余不欲孤其意與之盡歡遍問褒陽山水則褒氏所奔褒城在其左諸葛所征之路次其右感今懷古作贈黃明府詩曰昔年曽痛飲黃令困飛觥席上當時走馬前今日迎依稀迷姓字積漸丨丨丨故友身皆逺他鄉眼暫明便邀連榻坐兼共刺船行酒思涼風亂霜陵拂地平不看深淺酌貪愴古今情迤邐七盤路坡陀數大城花疑褒女笑棧息武侯征一種埋幽石空聞千載名迭嗟吟憶昔初及第各以少年稱君頤始生鬚我齒清如水爾時心氣壯百事謂已能一别詎幾何忽如隔晨興我齒豁可鄙君顔老可憎相逢風塵中相視丨丨丨幸同學省官末路再得朋東司絶教授逰宴以為恆秋漁蔭密樹夜博然燈明雪徑抵樵叟風廊折談僧韓送侯參謀赴河中幕恍如夢廣陵會三同舍各以其字為韻仍邀同賦云去年送劉郎醉語已驚衆如今各漂泊筆硯誰能弄我命不在天羿彀未必中云云廣陵三日飲相對丨丨丨况逢賢主人白酒潑春甕竹西已揮手灣口猶屢送羡子去安間吾邦正喧閧注劉貢父餘二首不再録坡集明窗一榻東坡過泗上喜見張嘉父詩云空翠娛人意自還丨丨丨丨共秋間坡集我輩一樽又與秦太虛參寥會於松江而關彥長徐安中適至分韻得風字云人笑年來三黜慣天教丨丨丨丨同知君欲寫長相憶更送銀盤尾鬛紅同上春風一杯桃李丨丨丨丨酒江湖夜雨十年燈山谷詩江山千里丨丨丨丨俱頭白骨肉十年終眼青同上古今合璧事類備要續集卷四十七
