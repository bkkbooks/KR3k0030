王處家何等最樂王言丨丨丨丨其言甚大各令朝謁魏明帝詔曰先帝著令不欲使諸王在京都者防微以漸關諸盛衰也朕惟不見諸王十有二載悠悠之懷能不興思其令諸王及宗室公侯各將適子一人朝魏志當别親疏唐髙祖武德間務廣宗支藩鎮天下故從昆弟子自勝衣以上皆爵郡王太宗即位舉屬籍問大臣曰盡王宗子於天下可乎封德彜曰漢所封惟帝子若親兄弟其屬逺非大功不王如周郇滕漢賈澤尚不得茒土所以别親疏也先帝封之爵命崇而力役多以天下為私奉非所以示至公於是疏屬王者皆降為公唯嘗有功者不降膠東王傳建花蕚樓唐元宗友愛初即位為長枕大衾與諸王同寢又丨丨丨相輝之丨唐書給雲母輦晉武帝丨安平王孚以丨丨丨青蓋車晉書詩集霜蹄特進羣公表天人夙德升丨丨千里駿風翮九霄鵬服禮求毫髮推忠忘寢興聖情常有眷朝退若無憑學業醇儒富辭華哲匠能招要恩屢至崇重力難勝鴻寶寧全祕丹梯庶可陵淮王門有客終不愧孫登杜甫贈汝陽王風翮注見上宗子事類同姓天子丨丨謂之伯父叔父曲禮豈無他人不如我丨丨枤杜綿綿葛藟在河之滸注葛生於河之涯得其潤澤喻王之丨丨得王之恩施以生長其子孫詩天揖同姓禮大宗丨丨維翰詩公族春秋諸侯之子稱公子公子之子稱公孫公孫之子稱公族杜牧書宗子詩云懷德惟寧丨丨維城君其修德而固宗子何城如之左傳本支文王孫子丨丨百世詩枝葉公族蕃滋支葉碩茂敘傳公族公室之丨丨若去之則本根無所庇廕矣左傳振振公族麟之趾關雎之應也關雎之化行則天下無犯非禮雖衰世之公子謂紂世皆信厚如麟趾之時也麟之趾振振公子麟之定振振公姓麟之角丨丨公族詩翩翩公子平原丨丨濁世之佳丨丨也史記朝長宗盟滕侯薛侯來朝爭長公使羽父請于薛侯曰周之宗盟異姓為後君若辱貺寡人則願以滕君為請薛侯許之乃長滕侯左傳心居魏闕中山公子年曰身於江湖之上丨丨丨丨之下莊子以忠見黜屈原名平與楚同姓仕於懷王為三閭大夫三閭之職掌王三族屈原入則與王圖議政事决定嫌疑出則監察羣下應對諸侯謀行職修王甚珍之原同列上官大夫及用事臣靳尚妬害其能共譛毀之王疏屈原原心煩亂遂赴汨羅自沉而死以親廣封諸侯王自丨骨肉至丨先帝所以丨丨連城為磐石之宗也中山靖王傳召見甘泉河間獻王德修學好古被服儒者山東諸儒多從之遊武帝時來朝獻雅樂丨丨丨丨宫帝謂之千里駒以宗正命之校書天祿劉向丨丨丨丨閣夜有老人著黃衣植青藜杖授向五行洪範云我是太乙之精天帝聞卯金之子有博學者下而勸焉出懷中玉牒有天文地圖之書拾遺記以書自娛辟彊好讀書能屬文武帝時以宗室子隨二千石議論冠諸宗室清靜少欲常丨丨丨丨本傳明經有行劉向字更生通達能屬文辭獻賦頌凡數千篇蕭望之周堪薦更生宗室忠直丨丨丨丨擢為散騎宗正本傳宗室遺老劉向云吾身為丨丨丨丨厯事三主遂上封事極諫同上肺附近親臣幸得託肺附注劉向自言如肝肺相附著也本傳齊於編人光武自宗室諸侯王外家后親皆奉遵繩墨無黨親之名至或乘牛車丨丨丨丨斯固法令整齊下無作威者也朱浮傳咨以疑政東平王蒼肅宗即位朝廷每有疑政輒驛使咨問蒼悉心以對皆見納用文辭敏捷魏陳思王植字子建年十嵗餘誦讀詩論及詞賦十萬言善屬文太祖嘗視其文謂植曰汝倩人耶植跪曰言出為論下筆成章顧當面試奈何倩人時鄴建銅雀臺新成太祖悉將諸子登臺使各為賦植援筆立成風神吐發北魏宗室澄少好學文明太后曰此兒丨丨丨丨當為宗室領袖本傳呼為宗老梁蕭琛為侍中武帝丨丨丨丨南史可謂標的景元子孫當草昧之初乘運而奮力髙祖禳除四方所以宣力皆顯顯為世豪至河間之初江夏之略丨丨宗室丨丨者也唐宗室贊為宗臣表李勉少喜學內沉雅外清整其在朝廷鯁亮廉介丨丨丨丨本傳擢進士科李程丨丨丨宏辭賦日五色造語警拔士流推之本傳八磚學士李程入學士院日過八磚乃至時號丨丨丨丨本傳千里名駒李皓少孤事母孝張東之曰帝宗千里駒本傳又見前召見甘泉注背古錦囊李賀每旦日出騎弱馬從小奚奴丨丨丨丨遇所得書投囊中對金鑾殿賀知章言李白於元宗召見金鑾殿論當世事奏頌一篇帝賜食親為調羮有詔供奉翰林白猶與飲徒醉于市召入為樂章而白已醉左右以水頮面稍解援筆成文宗室宫院唐元宗諸子同為大宅分院居為十王宅又致百孫院於宫側宫人每院四百餘百孫院亦三四十人六帖宗室宰相唐丨丨以丨丨進者九人林甫奸諛幾亡天下程知柔在位無所發明林甫在奸臣傳知柔相昭宣附宣惠太子輩傳後止敘七人然李麟乃懿祖後李逢吉李蔚俱隴西同系李宗閔出鄭王房李揆亦出隴西宰相共十三人不作傳唐宗室傳敘第一登科英宗在濮邸與燕王宫族人世雄厚善兩家各生子同年月日時是為神宗而世雄之子令鑠也神宗後即帝位令鑠進士及第為宗室登科第一七遷節度故事宗子無遷官法惟遇稀曠大慶則普遷一官景祐中南郊遂以南班近屬自初除少將軍凡丨丨為丨丨使遂為定制筆談古今合璧事類備要前集卷二十二
