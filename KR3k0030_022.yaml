body:
  text: 古今合璧事類備要前集卷二十二宋謝維新撰帝屬門太子事類元良一有丨丨萬國以正文王世子儲副天子之元子注丨君丨王郊特牲冡子太子奉冡祀社稷之粢盛以朝夕視君膳者也故曰丨丨君行則守有守則從從曰撫軍守曰監國古之制也左傳世子丨丨貴也丨丨猶世世子也公羊王丨丨云者唯王之二也天子丨丨世天下也穀梁重離離重明以麗乎正乃化成天下大人以繼明照于四方易主震丨器莫若長子故受之以丨序卦震為長子說卦東宫正體育德於少陽注育德於丨丨丨丨少陽也顔延年曲水詩注離位合洊雷之象居明丨之丨繼正體以為大本育明惠而居少陽文選前星心三星丨丨為太子晉天文志丨丨位定拱宸極以昭彰蒼震氣宣與天地而長久劉禹錫表少海無臯之山南望幼海注幼海即丨丨也山海經龍樓丨丨肇建展嘉禮於三朝鳯厯延長固本枝於萬葉劉禹錫表鸞駕儲駕戾止和鸞有聲徐伯陽頌朱輪皇太子皇子皆安車丨班丨青蓋金華蚤黑􅏹文畫幡文輈金塗五采皇子為王錫以乘之故曰青蓋車輿服志青宫東方東明山有宫青石為牆有銀榜以丨石碧鏤題曰天地長男之丨神異經主鬯丨丨春宫韓集守器二體宸極丨丨宗祧沈約表朝覲願歸禹薦益於天七年禹崩益避禹之子於箕山之陰丨丨訟獄者不之益而之啓曰吾君之子也謳歌者不謳歌益而謳歌啓曰吾君之子也寢膳必問文王為世子朝於王季日三雞初鳴而衣服至於丨門之外問內竪曰今日安否何如內竪曰安文王乃喜其有不安節則內竪以告文王文王色憂行不能正履王季復丨然後亦復初武王帥而行之不敢有加焉文王有疾武王不說冠帶而養文王一飯亦一飯文王再飯亦再飯文王世子燕居游習成王始為太子也太公為師周公為傅召公為保伯禽唐叔與游目不閲淫艷耳不聞優笑居不近庸邪及為君也血氣既定游習既成雖有放心不能奪已成之性元禎書鶴駕飛升周靈王太子晉七月七日乘白鶴駐山巔謝時人而去後世稱太子之駕曰丨丨禁曰鶴禁劉向列女傳調護太子漢髙祖欲以趙王如意易太子叔孫通諫曰太子天下本本一搖天下震動留侯諫不聽及宴置酒太子侍園公甪里先生綺里季夏黃公從太子皆八十餘鬚眉皓白上怪之四人前對各言姓名上大驚曰煩公等卒丨丨丨丨漢史請建太子文帝元年有司丨蚤丨丨丨所以尊宗廟也詔曰今縱不能博求天下賢聖而嬗天下而曰豫定太子是重吾不德也有司固請曰子啓最長丨丨以為丨丨博局召釁孝文時吳太子入見得侍皇太子飲博太子引丨丨提吳太子殺之吳主由是怨望智囊得幸朝錯拜太子家令以其辨得幸太子太子家號曰丨丨立苑通賔武帝年二十九乃得太子甚喜少壯詔受公羊春秋及冠就宫上為丨博望丨使丨丨客從其所好故多以異端進者納史良娣産子男進號曰史皇孫武帝末衛后寵衰江充用事充與太子及衛氏有隙會巫蠱事充因此為奸白言宫中有蠱氣遂至太子宫掘蠱得桐木人太子急具白皇后發中廄車載射士出武庫兵斬充以徇與丞相劉屈氂等戰長安中擾亂言太子反捕圍太子太子自經與皇孫二人皆遇害久之巫蠱事多不信上遂族滅江充家上憐太子無辜乃作思子宫為歸來望思之臺於湖天下聞而悲之受詔立幼武帝時寵姬趙婕妤有男上心欲為嗣命大臣輔之察羣臣唯霍光可屬社稷上乃使黃門畫者畫周公輔成王朝諸侯以賜光上病篤光泣問曰如有不諱誰當嗣者上曰君未諭前畫意耳立少子君行周公之事上以光為大將軍受遺詔輔少子昭帝崩霍光奏議曰武帝曹孫病已有詔掖庭養視至今年十八師受詩論語孝經操行節儉慈仁愛人可以嗣考昭皇帝奏可生甲觀堂元帝在太子宫丨丨丨畫丨如淳曰甲觀觀名畫堂堂名師古曰甲者甲乙丙丁之次也應劭曰甲觀在太子宫甲地出龍樓道成帝為太子初居桂宮上嘗急召太子丨丨丨門不敢絶馳道西至直城門得絶乃度還入作室門上遲之問其故以狀對上大恱乃著令云太子得絶馳道注門樓上有銅龍樂歌四章漢明帝作太子丨人以丨丨丨贊大子之德一曰日重光二曰月重輪三曰星重暉四曰海重潤古今注周衛交㦸舊制太子湯沐十縣設丨丨丨丨五日一朝班彪傳坐氊著針晉隱懷太子傳舍人杜錫每以忠規勸太子太子怒使人以針著錫所丨丨中而刺之進食去蒿邢峙為博士授太子經厨人進食有菜曰邪蒿峙命去之曰此菜有不正之名非殿下所食北史雙符給賜唐髙祖皇太子監國給丨龍符左右皆十兩唐車服志雙陸不勝唐武后欲以武三思為太子以問宰相狄仁傑曰臣觀天下未厭唐德云云今欲繼統非廬陵不可后怒罷議久之召謂曰朕夢丨丨丨丨何也對曰丨丨丨丨無子也天其以警陛下乎后感悟即日遣徐彥伯迎王於房州狄本傳不好遊射太宗嘗命太子遊觀習射太子辭以非所好願得奉至尊居膝下本紀幾諫荒樂順宗侍宴魚藻宫德宗顧太子曰今日何如太子誦詩好樂元荒為對同上抗章請建仁宗朝宰相韓琦等與同列奏事垂拱殿讀司馬光吕晦二章未及有所啓上曰朕有此意多時矣但未得人因左右顧曰宗室中誰可者琦曰此事非臣下敢言當出自聖擇上曰宫中養子二人小者不惠大者可也明日奏事又啓之上曰决無疑也時宗實猶居父喪乃議起復泰州防禦使知宗正寺至和末上得疾文彥博等勸上早立嗣會疾愈寢其奏既而范鎮司馬光言尤激切包拯為御史中丞乂力言之上卒未許如是五六年言者頗怠一日琦取孔光傳懷之以進曰漢成帝即位二十五年無嗣立弟之子定陶王為太子成帝中才之主猶能之以陛下之聖何難哉願陛下以太祖之心為心則無不可者司馬又面奏曰唐自文宗以後立嗣皆出於左右之意至有稱定䇿國老門生天子者此禍可勝言哉上大感悟遂送中書光至中書見琦等曰諸公不及今議異日禁中出寸紙以某人為嗣則天下莫敢違琦等唯唯長編入宫備選紹興壬子詔知太宗正事安定郡王令畤訪求宗室伯字號七嵗以下者十人丨丨丨丨十人中又擇二人焉一肥一癯乃留肥而遣癯賜銀三百兩以謝之未出思陵忽云更子細觀乃令二人義手並立忽一猫走前肥者以足僦之上曰猫偶然而過何為遽踢之輕易如此安能任重耶遂留癯而遣肥者癯乃阜陵肥者名伯浩後終於溫州都監揮麈録皇子附誕皇子皇孫事類君王子孫千億穆穆皇皇宜丨宜丨假樂王公丨孫丨子不鏤自雕非鸞則鳯分枝若木疏𣲖天潢魏王固表玉葉金枝丨丨六帖璇源同上注得賜旌旗漢梁孝王太后少子愛之丨丨天子丨丨從千乘萬騎出稱警入言蹕擬於天子府庫金錢且至巨萬珠玉寶器多於京師䇿受封土武帝時齊懷王閎與燕王旦廣陵王胥同日立皆賜䇿懷王丨曰嗚呼小子丨兹青社丨于東丨世為藩輔燕王丨曰丨兹元社建爾國家丨于北丨廣陵王丨曰丨兹赤土建爾國家丨于南丨武帝五子傳請定位號光武建武十五年吳漢上書請封皇子詔羣臣議奏曰今皇子賴天能勝衣趍拜宜定位號以廣藩輔制曰可賜封茅土漢興惟皇子封為王者得茅土其他功臣不受茅土不立社也禮儀志僅食數縣明帝案地圖將封皇子悉半諸國馬后見而言曰諸子食數縣於制不亦儉乎帝曰我子豈宜與先帝子等乎嵗給千緡足矣馬后紀並任刺史唐太宗時皇子雖幼皆外任都督刺史禇遂良諫曰今州縣悉倣秦法而皇子孺年丨丨丨丨陛下誠以至親扞四方臣謂皇子未冠者可且留京師教以經學養成德器審堪臨州然後遣褚傳分朋角勝唐髙宗上元元年上御翔鸞閣觀大酺分音樂為東西朋使雍王賢主東朋周王顯主西朋角勝為樂郝處俊諫曰二王尚少當推梨讓棗相親如一今分二朋遞相夸視非所以勸敦睦也上遽止之作歌寤意建寧王倓為李輔國所譛賜死廣平王收二京使李泌獻捷從容語倓事帝泣下曰事已爾奈何泌曰陛下嘗聞黃臺瓜乎髙宗八子天后所生者四人長曰𢎞為太子后圖臨朝鴆殺之而立次子賢賢作樂章使工歌之以感悟上及后其辭曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚云可四摘抱蔓歸而賢終斥死陛下今一摘矣謹無再帝愕然廣平遂安通鑑正士檢束兖王宫翊善姚坦好直諫王每有過失坦必規正宫中皆不喜左右乃教王稱疾不朝太宗日使視之逾月不瘳上甚憂召王乳母問王疾增損乳母曰本無疾徒以翊善姚坦檢束王不得自便王不樂故成疾耳上怒曰吾選善士輔佐王為善事今王不能用規諫而詐疾欲使朕逐去正人以自便何可得也王年少未知出此此必爾輩為之謀耳因命捽至後園杖之數十召坦慰諭之聖政録中丞彈奏許王為丨丨丨丨太宗劾之許王奏曰臣為天子兒今犯中丞而被推掬上曰朝廷之制孰敢違之朕有過羣臣當糾摘汝為開封尹豈可不舉劾卒罰之誕皇子瑶光貫月丨丨如霓丨丨正白感女樞於幽房之宫生黑帝顓頊河圖著命論大電繞樞神農氏之末少典氏娶附寶見丨丨光丨北斗丨星照郊感附寶孕二十月生黃帝于夀邱世紀虹流華渚大星如丨下丨丨丨女節感而生白帝金天氏感應録龍合三河堯母慶都出觀三河奄然陰風赤龍與慶都合而生堯春秋合誠圖堯在孕十四月生略論履迹而生燧人之世有大迹出雷澤華胥履之生庖犧氏於成紀世紀帝嚳元妃姜嫄以春分𤣥鳥至之日從祀髙禖見大迹履之而生后稷世紀吞乙而孕帝嚳少妃有娀氏女簡狄以春分𤣥鳥至之日祀于髙禖有𤣥鳥遺卵簡狄吞之孕生契史感星而生舜母丨樞丨之精丨丨舜尚書帝命驗見虹而産握登丨丨意感而生舜詩含神霧流星貫昴修巳山行見丨丨丨丨意感栗然胸折而生禹墨子白氣貫月湯母扶都見丨丨丨丨意感而生湯詩含神霧溲于豕牢大任丨丨丨丨而生文王國語大任有身目不視惡色耳不聽惡聲口不出放言文王生而明聖君子謂能胎教詩疏夢於龍澤髙祖母媪長息大澤之陂夢與神遇時雷電晦冥父太公往視見交龍于上已而有娠遂産髙祖夢龍據胸漢虜魏王豹薄姬輸織室漢王詔納後宫嵗餘召幸之對曰昨丨丨丨妾丨上曰是貴徴也吾為汝成之遂幸生文帝夢日入懷景帝母王皇后丨丨丨丨以七月七日生武帝於猗蘭殿武帝故事赤光照室光武以建平元年十二月甲子夜生於濟陽縣舍有丨丨丨丨東觀漢紀光武生時有嘉禾一莖九穗縣境大熟因名秀同上慶雲屬天唐太宗生於武功之别館時有慶雲見瀰漫數里上屬於天二龍戲於館門之外水中經三日乃去有光照室太祖母昭憲皇后嘗夢日入懷而娠生之夕光照室中又嘗夢神人捧日置于懷遂有娠生太室赤光滿室有星聚奎真宗開寶元年十二月初二日生先是乾德六年五星如連珠聚于奎當魯分從鎮星晨見東方占曰有德受慶大人奄有四方子孫蕃昌從鎮星王者能致天下重福明年真宗生夢日墜裾仁宗皇帝母章懿皇后李嘗丨二丨在天其一忽丨以丨承之夢仙投孕章懿李后忽夢一羽衣之士跣足從空而下云來為汝子時上未有嗣聞之大喜云當為汝成之是夕召幸有娠明年誕育昭陵而幼年每穿履襪即亟令脫去常徒步禁中皆呼為赤腳仙人赤腳仙人蓋古之得道李君也赤光照天秀州外醫張浩自云少𨽻軍籍嘗為德清閘官一日晚出郊過嘉興縣忽覩丞㕔丨丨丨丨疑為回祿亟入視之乃趙縣丞之室適免娠得雄是誕育孝宗也揮麈録皇孫緑車丨丨皇孫之車王莽傳注緑蓋王青蓋車皇孫丨丨車並駕三左右騑晉書為嫡皇孫元帝為太子王政君生成帝於甲觀畫