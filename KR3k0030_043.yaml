筆從王重榮為書記時車駕在蜀賊據京師軍書奏請堆積巨川文思丨丨翰動丨丨唐史沐浴乃見李迪為舉子時從种放明逸先生學將試京師携明逸書見栁開仲塗以文卷為贄與謁俱入久之仲塗出曰讀君之文須丨丨丨敢丨因留之門下一日仲塗自出題令迪與諸子門下客同賦賦成驚曰君必魁天下為宰相令門下客與諸子拜之聞見録羞稱曹陸閻士和事蕭穎士穎士死著論稱穎士所長以為聞蕭氏風者五尺童子丨丨丨丨唐文藝傳耻後王楊王勃與楊炯盧照鄰駱賓王皆以文章齊名天下稱王楊盧駱號四傑炯嘗曰吾愧在盧前耻居王後議者信然唐文藝傳衙官屈宋杜審言云吾之文可使屈宋作衙官本傳奴僕命騷使賀未死少加以理丨丨丨丨可也杜牧李賀集序孫樵真訣丨丨與王霖書曰嘗得為文丨丨於來無擇無擇得於皇甫持正持正得於韓退之然樵未嘗與人言及文章懼得罪於時本傳彥伯澀體唐徐丨丨為文多求新竒以鳳閣為鶠閣龍門為虬户金谷為銑溪玉山為瓊嶽以芻狗為卉犬以竹馬為篠驂後進效之謂丨丨朝野僉載君苖焚硯晉陸雲與兄機書曰有丨丨見兄文欲丨筆硯本傳鍾繇閣筆魏王粲才高丨丨王朗等丨丨不敢措手魏志孫帳下兒劉表自作書與孫伯符以示禰衡衡嗤之曰如是之作欲使丨郎丨丨丨看之耶將使張子布見之耶魏典略黃絹幼婦會稽上虞長尚度使邯鄲淳作曹娥碑其背蔡雍題八字曰丨丨丨丨外孫韲臼楊修見曰黃絹為色絲絶字也幼婦為少女妙字也外孫為女子好字也韲臼為受辛辭字也乃絶妙好辭後漢怪怪竒竒不專一能丨丨丨丨不可時施秪以自娛韓送窮文炳炳烈烈韓愈神道碑七嵗屬文悅古學業孔子孟軻而後其文秀人偉生多從之遊俗遂化服丨丨丨丨為唐之章皇甫湜作與時高下八音與政通而文章丨丨丨丨三代之文至戰國而病涉秦漢復起漢之文至列國而病唐興復起夫政龎而土裂三光五嶽之氣分大音不完故也混一而後大振劉禹錫栁文序為文竒古李商隱初丨丨丨丨及在令狐楚府楚本工章奏因授其學商隱儷偶而繁縟過之時溫庭筠段成式俱用是相誇號三十六體本傳漢士文章昔有論相如子雲不是正氣以為譎諫之文賈誼鋪陳帝王之道以為化成之文司馬遷為財成之文董仲舒劉向之徒為通儒之文文藝傳唐人文章唐有天下文章無慮三變髙祖太宗沿江左餘風絺章繪句揣合低昂故王楊為之伯玄宗好經術羣臣稍厭雕琢崇雅黜浮氣益雄渾則燕許擅其宗大厯正元間美才輩出嚅嚌道真涵泳聖涯於是韓愈倡之栁宗元李翺皇甫湜和之排逐百家法度整嚴抵轢晉魏上軋漢周唐之文完然為一王法此其極也唐文藝序論唐人文張説與徐堅論近世文章説曰李嶠無施薛稷崔融宋之問之文如良金美玉不可富嘉謀如孤峰絶岸壁立萬仭濃雲鬱興震雷具發誠可畏也若施之廊廟駭矣閻朝隱如麗服靚粧燕歌趙舞觀者忘疲若類之風雅則罪人矣堅問今世説曰韓休之文如太羔元酒有典則而薄滋味許景先如豐肌膩體雖濃華可愛而乏風骨張九齡如輕縑素練實濟時用而窘邊幅王翰如瓊杯玉斚雖爛然可珍而多玷缺堅謂篤論王勃又許景先能文張説曰許舍人文雖乏峻峯激流而詞旨豐美得中和之氣論韓愈文孫覺謂涯西碑序如書銘如詩秦少遊謂退之元和聖德詩與淮西碑如兩手蘇子由云退之作元和聖德詩哀劉闢之死曰婉婉子赤豆立傴僂牽頭曵足先斷腰膂次及其徒體骸撑拄末及取闢駭汗如雨揮刀紛紜爭切膾脯此李斯頌秦所不忍言何其陋也論子厚文桞文如峻峯絶壁壁立千仭間見層出森望於時蒼煙查靄之外望之者不能躋躋之者不能踰老泉韓文擬體祭竹林神文其體疑出於書祈太湖神文其體疑出於國語吊武侍御文其體疑出於離騷其哀歐陽詹獨孤申叔之文疑合於莊子內篇賈誼鵬賦之體韓文桞文擬體天對則祖屈平之天問其乞巧之文則擬揚雄之逐貧先友記則法家語七十二子解栁文論韓歐文孟子之文語約而意深不為巉刻斬絶之言而鋒不可犯韓子之文如長江大河渾浩流轉魚黿蛟龍萬怪皇惑而栁絶蔽掩不使自露而人望見其淵然之光蒼然之色亦自畏避不敢迫視歐陽之文紆餘委備往復萬折而條達疏暢無所間斷氣盡語極急言竭論而容與間易無艱難辛苦之態此三者皆斷然自為一家之文也惟李翺之文其味黯然而長其原油然而幽俯仰揖遜有執事之態陸贄之文遣言指意切近的當有執事之意蓋贄之文非孟子韓子之文乃歐陽之文老泉論李韓文侯希聲以謂李觀之文詞勝理韓愈之文理勝詞出李觀傳論歐蘇文歐公之文和氣多英氣少蘇公之文英氣多和氣少詩話論魯直文東坡嘗言魯直雜文多法蘭亭文集蘇東坡文坡云吾之文如萬斛泉源不擇地而出在平地滔滔汨汩雖一日千里無難及其與石曲折隨物賦形而不可知也所可知者常行於所當行常止於所可止如是而已矣坡文東坡中制科王荆公問吕申公曰見蘇軾制䇿否申公稱之荆公曰全類戰國文章若安石為考官必黜之故荆公後修英宗實録謂蘇明允有戰國縱橫之學邵氏後録東坡作表忠觀碑荆公置坐隅葉致逺楊德逄在坐公曰斯作絶似西漢坐客歎譽不已公曰西漢誰人可擬德逄曰王褒蓋易之也公曰不可草草德逄復曰司馬相如揚雄之流乎公曰相如子雲未見其敘事典贍若此也直須與子長馳騁上下坐客悚然曰畢竟似子長何語公徐曰楚漢以來諸侯王年表也潘子嶽詩話曾南豐文南豐文章之標鷙奔放雄渾瓌偉若三軍之期猛獸之扶江湖之波濤煙雲之姿狀一何竒也王震南豐文序夏楊之文夏英公言楊文公之文如錦繡屏公但無骨耳議者謂英公之文如泉水迅急至於汪洋則不及文公也東齋記陳無已擬䇿山谷高吟交臂老杜至古文每推無已無已親炙南豐擬試二䇿正似董辭嚴過公孫秦會之書宋景文修史丨丨丨公丨唐丨好以艱深之辭文淺易之説歐公思有以諷之一日大書其壁曰宵寐匪貞札闥洪休宋見之曰非夜夢不祥題門大吉耶何必求異如此歐公曰李靜傳云震雷無暇掩聰亦是類也宋公慙而退今所謂震霆不及掩耳者係再改詩集熖長李杜文章在光丨萬文丨平生千萬篇金薤垂琳琅山官勑六丁雷電下取將流落人間者太上一毫芒邵氏後録星破似開孤月口説破落星心孟郊詩説破星心如雞鳴東坡詩扛龍鼎文章日娛戲金石日擊撞龍文百斛鼎筆力可獨扛韓文造鳳樓韓浦韓泊能為古文泊常輕浦語人曰吾兄為文譬如繩縳草舍庇風雨而已豫之文丨五丨丨手浦聞其言作詩與泊曰十樣蠻箋出益州寄來新自浣溪頭老兄得此全無用助爾添修五鳳樓談苑古今合璧事類備要前集卷四十三
