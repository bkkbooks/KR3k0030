body:
  text: 古今合璧事類備要前集卷四十三宋謝維新撰儒業門習學事類就將日丨月丨學有緝熙於光明詩周頌聚辨君子學以丨之問以丨之乾卦夜不寢吾嘗終日不食終丨丨丨以思無益不如學也論語月無忘日知其所亡月丨丨其所能可謂好學也已同上學無所息子貢倦於丨告於仲尼曰願有所息仲尼白生丨丨丨望其壙睪如也宰如也墳如也鬲如也則知所息矣列子學當其可大學之法禁於未發之謂豫丨丨丨之謂時不陵節而施之謂遜相觀而善之謂摩此四者教之所由興也記大學藏修逰息丨焉丨焉丨焉丨焉夫然故安其學而親其師樂其友而信其道記學記切磋琢磨詩云如丨如丨如丨如丨道學也記大學三年通一古之學者耕且養三年通一經今之學者非獨為其華藻也又從而繡其鞶悅揚子九年大成古者比年入學七年視論學取友謂之小成丨丨知類通逹強立而不反謂之大成孟母徙舍丨軻丨其丨近墓孟子少嬉逰於墓間為其事孟母曰此非吾所以處子也乃去舍市旁乃為賈人衒賣之事又曰此非吾所以處子也復徙舍學宫之傍其嬉戲乃設爼豆揖遜進退孟母曰此真可以居吾子遂居焉列女傳樂妻斷織後丨羊子尋師學一年而歸妻跪問其故樂羊子曰久行懷思丨乃引刀趨機而言曰此織生自蠶繭成於機杼一絲而纍至於丈匹若斷斯機也則無成功夫子積學中道而歸何異丨斯丨乎羊子感其言七嵗不反本傳康成經袖漢鄭丨丨人以為丨丨晉王嘉拾遺記竇威書癡丨丨家世貴子弟皆喜武力獨威尚文諸兄詆為丨丨本傳維翰鐵硯桑維翰初舉進士主司惡其姓以為桑與喪同音人有勸其不必舉進士可以從他求仕丨丨乃著日出扶桑賦以見志又鑄丨丨以示人曰硯弊則改卒以進士及第五代史本傳充宗文石五鹿丨丨受學於𢎞成子成子少時嘗有人授以文石大如燕卵成子吞之遂為通儒後成子病吐出文石以授充宗又為名學西京雜記荀子寒冰學不可以已青出於藍而青於藍冰水為之而寒於水荀子李謐青藍李謐初事小學博士龍蟠後蟠遂就謐請業門生為之語曰丨成丨藍謝青師何常在明經北史禇不觀龍禇無量家濱臨平湖有龍出人皆走觀無量尚幼讀書若不聞衆異之長成名本傳裴不食鹿裴休方兒講經著書經年不出户有饋鹿者諸生共薦之休曰不食猶不足今一啖肉後何以繼本傳董子下帷前漢董仲舒下帷發憤潛心大業三年不窺園圃本傳劉晝閉户丨丨愛學服膺無倦常丨丨讀書北史本傳又孫敬閉戶讀書本傳截蒲書字前路溫舒牧羊於大澤中截蒲以書太守見而竒之本傳編栁寫經孫敬字文寶入學丨丨為簡以丨丨史本傳護雞漂麥後髙鳳自旦讀書至夜不息妻曝麥於庭令鳳丨丨時暴雨鳳讀書不覺水丨其丨史本傳囊螢照書晉車武子精勤不倦博覽多通家貧無油夏月練丨盛數十丨火以丨丨本傳穿壁引光前康衡勤學家貧無燭鄰舍有燭而不逮乃丨丨丨其丨而讀之西京記然薪不寐晉畢諴夜丨丨讀書母恤其疲奪火使寐不肯息又侯瑾家貧曉薪柴以讀書並本傳隨月握卷江泌少貧夜讀書丨丨光光斜丨丨升屋本傳映雪讀書孫康家貧無油常冬月丨丨丨丨孫氏世録帶經而鋤兒寬丨丨丨丨休息輒讀誦本傳滅火而誦沈約家貧篤志學書一夜必十卷母恐其勞生疾常遣減油丨丨而晝之所讀夜輒丨之遂博通諸史本傳不窺家園後漢桓榮少學長安精力不倦十五年丨丨丨丨本傳不事盥櫛唐虞世南與兄世基同受學于顧野王餘十年精思不懈至纍旬不盥櫛唐史至老不厭唐蔣乂結髮志學丨丨丨丨雖甚寒暑卷不釋手唐史雖夜不寐劉向專精思於京術晝讀書傳夜觀星宿或不寐漢史求免貧賤寧越少時苦耕友人謂曰君學十五年可免貧賤越曰它食吾不食它寢吾不寢如此十五年可以成矣遂學成吕氏春秋冀取青紫前夏侯勝謂諸生曰士病不明經術經術苟明取青紫如拾地芥耳學經不明不如歸耕漢書本傳引錐刺股蘇秦讀書欲睡丨丨自丨其丨血流至踝史夢鑿破心尹知章少年未通丨人持巨丨丨其心若丙劑焉驚悟志思開敏遂明六經唐本傳吞易三友吳虞翻立易法奏曰郡史陳桃夢臣與道士布易六爻撓其三以飲臣臣乞盡丨之道士言丨道在天丨丨足矣得書十車晉束晢博學多文汲郡人盜發魏襄王墓或言安釐王家丨竹丨數丨丨漆書皆科斗字而晳隨宜分釋皆有義證晉本傳書牛背字陸羽潛以竹畫牛背為字得張衡南都賦不能讀危坐效羣兒囁嚅若誦狀師拘之令剃草當其記文字懵懵若有過因歎田嵗月往矣奈何不知因亡去本傳咀熊膽兒栁仲郢幼嗜學母嘗和熊膽丸使夜咀咽以助勤焉唐本傳取瓜鎮心鄭灼苦心熱瓜時輒偃丨丨以丨丨起便誦讀篤志如此南史本傳圓木警枕司馬溫公以丨丨為丨丨少睡則枕轉而覺乃起讀書范祖禹集唯好讀書錢思公言一生丨丨丨丨坐則讀經史卧則讀小説上厠則閲小辭未嘗頂刻釋卷歸田録唯勤讀書頃嵗孫莘識歐陽文忠公嘗乘間以文字問之曰無他術丨丨丨丨而多為文自工世患作文少又懶讀書每一篇出即求過人如此鮮有至者疵病不必待人指摘多作自能見之公以其嘗試者告人故知有味蘇東坡雜記未嘗釋卷范質自從仕丨丨丨丨人或勉之質曰昔嘗有異人與吾言它日必當大用茍如是言無學術何以處之本朝蒙求坐不讀書王荆公初參政下視廟堂如無人一旦行新法怒目諸公曰此輩丨丨丨丨耳趙清簡公同參知政事獨折之曰君言失矣如臯夔稷契之時有何書可讀荆公默然邵氏後録詩集簡編燈火稍可親丨丨可卷舒韓文詩書語及君臣際丨丨滿腹中杜甫丨丨勤乃有不勤腹空虛韓文公讀五車富貴必從勤苦得男兒須丨丨丨書杜甫破萬卷讀書丨丨丨下筆如有神同上讀書眼丨丨丨如月罅隙靡不照東坡請天還我讀書眼願載軒轅望鼎湖山谷博學事類經笥許懋號丨史丨又後漢邊詔云腹便便五千卷並本傳書厨齊陸澄博覽王儉曰陸公丨丨也南史五史朱遵度博學號幕府丨丨也十國紀年書麓李雍淹貫古今然不能屬文故時號丨丨本傳武庫晉杜預朝野號曰杜丨丨本傳學府傅昭博及今古世稱為丨丨本傳書倉曹曽積石為倉以藏書號曹氏丨丨拾遺記五總龜唐商踐猷號丨丨丨龜一千年五聚問無不知本傳九經庫唐谷律那號丨丨丨儒林傳隋房暉逺號五經庫隋本傳寫屏風虞世南太宗嘗命丨烈女傳於丨丨於時無本世南暗疏之無一字謬識錞于北史斛斯徴博覽樂有錞于者近代絶無此器有自蜀得之莫丨斯徵見之曰此錞于也遂依干寶周禮注為芒筒振之其聲極清衆乃歎服按南齊王鑑為益州刺史廣漢人段祖以錞于獻鑑錞于者古禮器也髙三尺六寸六分圍三尺四寸圎如筒色黑如漆甚薄上有銅馬以繩懸焉令去地尺餘灌之以水又以器盛水於下芒莖當心跪柱以手振芒則聲如雷良久乃絶古以節樂也職官分紀辨中山銘梁任昉大同四年七月於中山得銘曰龜言土筮言水甸服黃鍾啓靈祉瘞在三上庚墮遇七中巳六千三百浹辰交二九重三四百圮當時莫能辨因戒諸子世世訪人五世孫升之寫以授鄭欽説行三十里語曰甸服五百者黃鍾十一也由大同四年却數漢建武四年凡五百一十一年葬以三月十日庚寅三上庚也圮於七月十二日己巳七中巳也浹辰交二建武四年至大同四年七月十六日六千三百一十二日故曰六百三十浹辰交二九十八重三六也建武四年三月十日距大同四年七月十二日十八萬六千四百日故曰二九重三四百圯升之大驚唐本傳驗古鼎銘五代張同居洛陽浚井得古鼎銘曰魏黃初元年春二月同以為竒其子䇿年十三啓曰漢建安二十五年曹公薨改元建康是嵗十月文帝受禪又改黃初元年無二月銘何謬耶同大異之五代史張策傳石函金簡吳王伐石治宫室於合石之中得紫文金簡之書不能讀使使者問仲尼而欺仲尼曰吳王間居有赤雀衡書以置殿上不知其義故逺咨呈仲尼曰此乃靈寶之方長生之法禹之所服隱在水邦年齊天地朝於紫庭者也禹將仙化封之名山石函之中今乃赤雀銜之殆天授也抱朴子鼠獄雞碑丁用晦序云學慚丨丨智乏丨丨芝田録覽袐閣書唐李雍願一見袐書李嶠曰祕閣萬卷書豈時日能習耶雍固請乃假直袐書未幾辭去嶠驚試問奧篇隱帙了辨如響本傳閲市肆書王充家貧常於洛陽市肆閲所賣書一見輒能誦憶遂博通諸家本傳門庭著紙左思博覽欲作三都賦遂搆思十稔丨丨墻溷皆丨丨筆遇得一句便書記之晉書本傳戶牖置筆王充著論衡閉户潛思丨丨牆壁各丨刀丨遇得即書後本傳桞璨篋子唐丨丨遷左拾遺公卿朝野託為箋奏時譽日洽以其摶目為桞丨丨職官分紀楊公衲被丨文丨億為文章所用故事常令子姪檢出處每假用小片紙録之綴粘所録而蓄之時人謂之衲被焉吕氏家孰記安世三篋漢武帝幸河東亡書三篋詔問知者唯張安世識之具得其事後得亡書校無所遺上竒之本傳張華十卷丨丨讀三十車書作博物志四百卷武帝以為繁只作丨丨殷文圭啓注夜遇太乙劉向校書天祿閣夜暗獨坐誦書有老人黃衣植青藜杖叩問而進乃吹杖端煙火因以見向説開闢以前向因受五行洪範之文至曙而去向請問其姓名曰我乃太乙之精天帝閵卯金之子博學下而觀焉乃出懷中竹牒有天文地圖之書悉以授之漢本傳夜視鎮星劉原父學問廣博無書不通自浮屠老子以及山經地志隂陽卜筮醫藥天文略皆究知嘗與吕臻濟叔同在禮部丨丨丨丨指曰於漢當得上不乃得女居數日使者言宫中兩夫人當就館數日果生兩公主劉原父行狀𨽻事奪物陸澄好學博覽王儉在尚書省出巾箱几案雜物澄服色令學士丨丨事多者與之人人各得一兩後來更出諸人所不知事名數條并舊物奪去南史玩物喪志謝顯道云嘗録古人善行别作一册明道先生曰是丨丨丨丨胡安國云謝先生初以記問為學自負該博對明道舉史書成篇不遺一字明道曰賢却記得許多可謂丨丨丨丨謝聞此語汗流浹背及看明道讀史又却逐行看過謝甚不服後來省悟却將此事作話頭接引博學之士近思録誤行黃道江南陳彭年禮文詳練歸朝列於侍從朝廷郊廟禮儀多委彭年援引故事頗為該洽嘗攝太常卿導駕丨丨丨丨上有司止之彭年正色回顧曰自有典故禮曹素畏其該洽不敢詰問筆談奉還束帛夏英公鎮襄陽遇赦賜致仕高年束帛時胡太監且瞽廢在襄英公選縑十匹贈之胡得縑以手捫之曰寄語舍人何寡聞如此奉還五匹請檢韓詩外傳及服虔賈誼諸侯所解束帛自可見證英公檢之果見三代束帛束修之制十挺之脯其實一束也束帛則卷其帛為二端五匹遂見十端夏少沮湘山野録詩集青藜不知太乙遊何處定把丨丨獨照空王介甫戲劉貢父詩幼悟事類國器房元齡幼警敏髙孝基謂裴矩曰僕觀人多矣未有如此郎者當為國器但恨不見其聳壑昂霄耳本傳竒童李泌七嵗知為文玄宗禁中有員俶者九嵗升坐詞辨注射坐人皆驚帝異之曰半千孫固當然因問童子豈有類若者俶跪曰臣舅子李泌帝即馳召之泌既至帝方與張説觀奕因使説試其能請賦方圓動靜泌曰願聞其略説曰方若碁局圓若碁子動若碁生靜若棊死泌即答曰方若行義圓若用智動若騁材靜若得意説因賀得竒童李泌傳山東英妙漢終軍年十八號終童西征賦云終童丨丨之丨丨漢書洛陽年少賈誼洛陽人以能誦詩書屬文稱於一郡河南守吳公言誼年少頗通諸家之書文帝召為博士