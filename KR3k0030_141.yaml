式顧況湖州刺史㕔壁記江表大郡呉興為一夏屬揚州秦屬㑹稽漢屬吳都吳為吳興郡其野星紀其藪具區其貢橘柚纖縞茶紵其英靈所誕山澤所通舟車所㑹物土所産雄於楚越雖臨淄之富不若也其冠簮之盛漢晉以來敵天下三分之一其刺史沿革不同或稱太守或稱内史或稱都督他州或否如魯史晉乘侯牧一也鴻名大徳其在晉則顧府君秘秘子衆陸玩陸納謝安謝萬王羲之坦之獻之在宋則謝莊張永褚彦回在齊則僧䖍在梁則柳惲張謖在陳則吳明徹在隋則李徳林國朝則周擇從令聞也顔魯公忠烈也袁紷事髙讜正也劉員外全白文翰也洎于頔大夫作塘貯水溉田三千頃今使君辭也唐景皇帝七代之孫先公尚書先公大夫奕葉之勲有功于民民實祀之孔悝銘鼎天下重器天王褒援于公襄陽節度李公涉當逍觀察統諸道鹽鐡轉運二牧既陟惟公盤桓鴻鵠不飛飛即摩漢其逋者復其危者安其憂者泰所謂善緝於是拓郛耰萊就便除害政之餘力作消暑樓於南端復亭署於白蘋洲聿興廢土光明敞豁湧出谿谷其舊記吏部李侍郎紓撰其圖經竟陵陸鴻漸撰使者命況總兩家之說俶落晉宋訖于我唐凡一百九十七年及歴代良二千石儀形畧也鋪張屋壁設作存勸竦神告民春秋不朽之義也貞元十有五年十二月哉生魄華陽山顧況述詩集清髙丨丨金莖露正直朱絲絃昔在堯四岳今之黄潁川杜甫贈李勉詩清香燕寢凝丨丨兵衞森畫㦸唐韋蘇州詩重寄六代帝王國三吳佳麗城賢人當丨丨天子惜髙名李白贈昇守詩髙標韶陽李太守髙步凌雲煙得客輒忘食開囊乞贈錢手持南曹敘文重青瑶編古氣參彖繫丨丨揖太𤣥韓愈送靈帥詩文星斧鉞下青㝠樓船過洞庭北風隨爽氣南斗避丨丨杜送李廣州詩列宿郎官丨丨應詳見後剖竹我家小阮賢丨丨赤城邊詩人多見重官燭未曽燃李白贈台守詩吟詩郡齋當夜靜不卧獨丨丨把燭迎幽客昇堂戴接䍦于鵠宿太守李公詩紫馬使君騎丨丨捧擁從西來注謝靈運出守永嘉人曰騎丨丨者太守也杜甫詩朱輪歌舞向丨丨詳見後小蓬萊我是玉皇香案吏謫居猶得丨丨丨白樂天紹興詩獨桂林五嶺皆炎熱宜人丨丨丨梅花萬里外雪片一冬深對此須相憶為邦復好音江邊送孫楚逺寄白頭吟杜牧寄楊桂州詩元道州粲粲丨丨丨詞氣浩縱横致君唐虞際純朴憶大庭何時降璽書用爾為丹青杜和元使君舂陵行衡陽守湘竹班班湘水春丨丨太丨虎符新唐韓翊詩賜魚書新丨丨丨墨未乾賢人暫屈逺人安劉禹錫寄澧州守詩擁雙節坐移丞相閣春入廣陵城紅斾丨丨丨白鬚無一莖白居易送牛僧孺鎮揚州詩升金掌卿月丨丨丨陽春度玉墀薰風行應律湛露即歌詩杜江陵送馬大卿赴闕詩持金印貴丨丨丨出咸城瀟洒江城兩度春云云望崇早合歸黄閣詩好何妨戀白蘋羅隠贈湖守詩辭聖主文石陛前丨丨丨碧雲天外作㝠鴻杜牧寄宣守詩擁使車鶴髮州民丨丨丨人人盡說受恩初權徳輿撫州詩煩良守海國甌鄉浙水東暫丨丨丨此憑熊宋綬詩用詞人王室比多難髙官皆武臣幽燕通使者岳牧丨丨丨杜送陵州路使君詩金章紫綬淮海維揚一俊人丨丨丨丨照青春杜甫寄章梓州詩冰壺玉衡廊廟之具裴施州宿昔一逢無此流金鐘大鏞在東序丨丨丨丨懸清秋堯有四岳明至理漢二千石真分憂韓文公寄裴施州詩暫辭鳳闕為郡丨丨雙丨丨全家逺過九龍灘張籍送汀州无使君自請左符曽主虞曹輕刺史今朝丨丨丨丨來青雲直上無多路卻要斜飛取勢回楊虞卿知常州劉禹錫寄詩人生五馬貴西掖梧桐樹空留一院隂艱難歸故里去住損春心宫殿青門隔雲山紫邏深丨丨丨丨丨莫受二毛侵杜送賈至出守汝州刺史諸侯貴丨丨丨丨丨郎官列宿應杜甫寄劉峽州貴臣持牙璋前年初闕守慎簡由衮扆臨軒弄郡章得人方付此是時左馮翊天下第一理丨丨丨丨丨優詔𤼵青紙遡風奸吏免先令疲人喜何武劾腐儒陳蕃禮髙士劉禹錫寄江西裴中丞大夫應絶席地壓坤方重官兼憲府雄桂林無瘴氣栢署有清風山水衙門外旌旗艛艓中丨丨丨丨丨詩酒與誰同白居易送嚴大夫赴桂州詩英英桂林伯丨丨丨丨丨實維文武特韓愈詩風流漢署郎炎海韶州牧丨丨丨丨丨分符新令尹同舍有輝光杜甫送韋韶州詩朱旗入楚城緹騎丨丨丨丨丨士林皆賀振家聲兒童但喜迎新守故吏猶應記小名劉禹錫送李楚州詩紅旗入夀春風獵丨丨丨丨丨滿城歌舞向朱輪八公山下清淮水千騎塵中白面人同上送楊夀州公來雪山重諸葛蜀人愛文翁儒化成丨丨丨丨丨公去雪山輕杜甫成都詩家似野人居柳岸風來影漸疎使君丨丨丨丨丨杜牧齊安詩天子命惟良祖逖方城鎮安仁外氏鄉從來二千石丨丨丨丨丨盧藏用餞潭守髙使君赴任詩朝廷偏注意京兆先時傑琳琅照一門丨丨丨丨丨接近典名藩云云看君妙為政他日有殊恩杜甫送鮮于萬州遷巴州守詩秉鈞方咫尺丨丨丨丨丨鍛翮再聫翩再入福蒼生久鎮鵷行重無嫌虎節輕終當持大筆丨丨丨丨丨劉禹錫送令狐相公鎮南梁詩和風滿豫章峻節臨衡嘱丨丨丨丨丨人歸父母育郡得股肱艮柳子厚賀𢎞農公詩能名自潁川籍甚黄丞相丨丨丨丨丨杜甫送梓州李使君詩古今合璧事類備要後集卷七十二
