body:
  text: 古今合璧事類備要後集卷七十二宋謝維新撰守臣門太守上餘並見刺史此所載只郡守事歴代沿革古州收之任也秦罷侯置守分天下為三十六郡郡置守守尉監掌理其郡秩二千石秦滅諸侯以其地為郡置守丞尉各一人守治民丞佐之尉典兵漢景帝中元二年更名太守王莽改曰太尹中興仍西漢三國及南朝因之晉郡守皆加將軍後魏初郡置三太守太和中太守内史相縣令並以六年為限北齊制郡為上中下三等每等又有上中下之差自上上郡至下下郡凡九等後周郡太守各以户多少定品命隋因北齊九等之制開皇三年罷天下諸郡以州繞縣大業三年又改為郡唐武徳元年改為州刺史加號持節實無節但頒銅魚符而已天寳元年改為郡太守自是州郡刺史更相為名其實一也並見通典開元中定天下州府自京都及都督都䕶府之外以近畿為四輔餘為六雄十望十緊及上中下之差至徳後州縣凋弊刺史之任大為精選諸州始各有兵鎮刺史皆加團練使故其任重矣通典五代仍刺史之號事類州牧外有丨丨侯伯書刺史丨丨古諸侯白六帖外臺漢書列郡丨岳刺丨同上師帥今之郡守縣令民之丨丨所使承流而宣化也董仲舒䇿郡將前嚴延年𫝊注謂丨丨以兼領武事符守累政臺郎遂分丨丨唐大詔令于頔制州長愈承朝命為此丨丨韓文黄堂吳郡太守所居之堂春申君之子假君之殿也因數火塗以雌黄故曰丨丨吳郡國志皂蓋二千石丨丨朱轓續漢志侯伯今之郡守古丨丨也於吏有君臣之義焉於人有父母之道焉白集殷彪制府公今丨丨西掖才傑歴典吾土胡文恭制典城蔡邕上章曰初由宰府備數丨丨後漢律歴制大府郅都為濟南太守族滅癎氏餘皆股慄路不拾遺旁十餘郡守畏都如丨丨宰郡丨丨晉范甯傳分符丨丨出守封侯表共理漢宣曰與我丨丨者其惟二千石乎卧治前汲黯為淮陽太守閉閣丨丨黯願為中郎出入禁闥補過拾遺帝曰君薄淮陽邪吾今任君矣顧淮陽吏民不相得徒得君丨而丨之耳朱轓前景帝詔曰史者民之師也車駕衣服宜稱令長吏二千石車丨兩丨見前書又續漢志皂蓋丨丨彤襜丨丨皂蓋朱轓白帖虎符漢文帝制郡守置銅丨丨竹使符發兵遣至郡合符符合乃聽𤼵兵以代古之珪璋從簡易也史記隼旟丨丨熊軾白帖竹符剖丨分丨同上竹馬郭伋字細侯在并州素結恩徳及後入界兒童數百各騎丨丨迎於道路五馬禮天子六馬左右驂三公九卿駟馬左驂漢制九卿則二千石以右驂太守駟馬而已其加秩中二千石乃右驂故以五馬為太守美稱遁齋閒覽與學林雲漢時朝臣出使為太守増一馬故為丨丨潘子真詩話千騎東方丨丨長人注謂諸侯也漢書拔薤後龎參為漢陽守郡人任棠有志節參到後先候之棠不與言但以薤盂置屏前抱孫兒伏户下參思其微旨曰水欲吾清丨丨欲吾擊強宗抱孫兒當户下欲吾開門恤孤率而行之漢陽大治後漢書饋魚羊續字興祖為廬江太守府丞丨丨受而不食挂之後復進魚續出前魚示之府丞慙而止同上班春前崔篆王莽時為新大尹稱疾不視事三年不行縣門下掾諫篆乃强起丨丨又續㑹志太守常以春行縣勸課農桑賑救乏絶聽事後宋均為九江守丨丨時冬以日中夏以平旦虎渡江去去思前何武為兖州守徙京兆所居無赫赫之名丨後人常見丨之遁去孟嘗為合浦守當還吏人攀車請之不得進乃附商人船夜丨丨萬石前石奮長子石建一門四子皆二千石號丨丨君四龍後李元禮祖父修安帝時生子亮叔訓秀號丨丨皆為牧守衣錦前上謂朱買臣曰丨丨還鄉遂除㑹稽太守解榻後陳蕃字仲舉為豫章守徐孺子至輒丨丨去則懸之雙旌丨丨五馬記室新書六條政有丨丨白六帖徵黄宣帝丨丨霸借宼後宼恂字子翼為潁川守徵為執金吾從上過潁川百姓遮道願丨丨恂一年上乃留拜之召父前召信臣字翁歸為河南守躬勸耕桑出入阡陌開通溝瀆嵗増三萬頃吏人親愛號曰丨丨杜母後杜詩字君公南陽太守性節儉而政治清平南陽為之語曰前有召父後有丨丨畫鹿後鄭𢎞為淮隂太守政不煩苛行春大旱隨車雨至白鹿方道夾轂而行主簿董國賀曰聞三公車轓丨作丨明府必為宰相夢刀晉王濬為廣漢太守夜丨三丨懸於卧屋梁上須臾又夢一刀主簿李毅曰三刀為州字人益一刀者明府其臨益州乎果然畫象魏蒼慈孝仁為燉煌守卒官吏如喪親戚圖丨其丨思其遺愛制服張綱字文紀為廣陵太守卒張英等五百餘人丨丨立祠晉祖逖為豫州守行恩徳及卒人為丨生丨又王堂字敬伯已巴郡太守吏民為丨生丨罷市羊祐卒人出為巷哭丨丨四時置祭於峴山之陽改户曹為辭曹同上葦杖昭王碑南陽丨丨未足比其仁皮鞭崔伯謙為北地太守改用丨丨鞭之不忍見血示恥而已北史蒲鞭後劉寛為南陽太守用丨丨示辱而已葦車𡊮忠乘丨丨不上計秦昭使王稽為河東守三年丨丨丨史記不行縣漢韓延夀為東都守丨肯出丨丨丞及掾數請之延夀曰恐無益重為煩也再為州魏相丨丨河内黄霸再為潁川陳審再為樂安陶侃再為荆丨寇恂再為河内郭伋再為并州白帖比三輔漢膠東盗賊起山陽守張敞請治之乃拜膠東相敞曰理劇郡非賞罰無以勸懲吏追捕有功者願賞罰得丨丨丨尤異由是盜賊散宿鄉亭前郭欽奏鮑宣行去法駕駕三馬丨丨丨為衆所非置伍長韓延夀為東都守丨正丨丨相率以孝悌不得舎奸人閭里有非常事輒聞知始若煩後吏無追捕之苦皆便安同上不拾遺漢任浦為武都守路丨丨丨又嚴延年涿郡太守郡中震恐道丨丨丨又范曄天水太守道丨丨丨又後宋登字叔陽為潁川守市無二價道丨丨丨不發書魏陳泰為并州太守懷柔民夷京邑貴人多寄寶貨因泰市奴婢泰皆挂於壁丨丨其丨及徵為尚書乃悉還之賜車馬漢韓崇為汝南守丨丨丨賜車劒謝希吾字堯卿為鉅鹿守制臨𤼵上特丨丨丨選一錢後劉寵為㑹稽守徵入山隂有五叟皆龎睂皓齒人齎百錢送寵曰山谷人未嘗識郡政化他守徵求民間至夜不絶自明府來狗不夜吠人不識吏寵為丨丨大丨受之而去贈一扇晉袁宏為東陽郡守謝安丨丨柄丨宏曰敢奉揚仁風以慰黎庶畏四知楊震為東萊太守昌邑王密夜半懷金獻曰無人知囊曰天知神知爾知我知是謂四知何無人知也清徹底朱世良為清河太守有老人曰府君非惟政善丨亦丨丨清獨立裴俠守河北入周太祖命獨立曰裴俠丨慎奉公為天下最有如俠者與之俱立衆黙然朝野嘆服號丨丨使君清白吏楊震為涿郡太守性廉或勸開産業震不肯曰使後世稱為丨丨丨子孫以此遺之不亦厚乎清冰雪魏令狐邵字孔叔為洪農太守所在丨如丨丨虎渡江後宋均字叔庠為九江守多暴虎先是設檻捕之猶多傷害均下記曰虎豹在山去檻穽人人相𫝊丨東丨丨而去龍望府沈曹為巴陵守有三黄丨丨丨中鹿夾轂事見前畫鹿注蝗去界宋均為九江太守山陽楚沛多丨其飛至者輒東西散丨丨外麥兩岐後張堪為漁陽太守擊匈奴開稻田千萬頃勸耕以致殷富百姓歌曰桑無附枝丨秀丨丨張君為政樂不可支禾同穎梁柳渾字文暢為吳興太守嘉丨丨丨十郡最魏顔裴字文林治為雍州丨丨之丨三河表魏朗字少英為河内太守政稱為丨丨丨宜置兵魏司馬芝伯達請州郡丨丨丨外備四夷内威不軌不去武晉自平吳後罷軍役山濤以丨丨州郡丨備後宼賊起以無備遂大亂送到界种暠為梁州守被徵吏召詣關乞留一年遷漢陽守夷狄男女丨丨漢陽丨嵩與相揖十里不絶挽不來鄧攸為吳郡守不受祿載米來食唯飲郡中水而已去郡數千人挽船進不得公少停夜中遁去人歌曰紞如打五鼓雞鳴天欲曙鄧侯丨丨丨謝令推不去玉麟符隋樊子蓋守東都有功煬帝勞曰今為公别造丨丨丨以代銅獸銅魚符武徳元年領丨丨丨鬼揶揄載羅友家貧乞祿於桓溫曰臣昨中路見一丨丨丨曰我只見汝送人作郡不見人送汝作郡温笑以友為襄陽太守世説號屠伯嚴延年為河南太守丨曰丨丨其母從東海來適見報囚不肯入府因數延年曰幸備郡守不聞仁愛教化顧多殺人豈為民父母意哉驅蚊扇袁光庭典名藩有異政明皇謂宰輔曰光庭性逐惡如扇丨丨䖟記惡碑盧奐累任大郡治有異績人畏之如神凡治奸惡既斷其罪又以其所犯刻石立門再犯必致之死籍時謂之丨丨丨天下長者前漢文帝謂田叔曰公知丨丨丨丨乎故雲中太守孟舒是也良二千石宣帝詔太守吏民之本政平訟理與我共理唯丨丨丨丨乎公卿治郡古者郎官出宰丨丨丨丨所以重親人之官急為政之本宣宗太元元年制郡守宣化今之丨丨縣令民之師帥所以承流而丨丨也故師帥不賢則主徳不宣恩澤不流董仲舒䇿南陽畫諾後宗資為汝南太守任功曹范滂時人語曰丨丨宗資主丨丨河西改俗鄧訓字平叔為張掖太守臨州丨丨丨丨請治一郡耿純丨丨丨丨盡力自効上笑曰卿乃欲以治民自効拜東郡太守再臨東郡拜東郡太守去職丨丨丨丨人百其歡同上所居有迹蕭成治郡有聲蕭田忠信慈惠黄霸丨丨之長丨丨之師賜車蓋髙一丈威信素著蕭望之起學受業文翁為蜀郡守選郡縣小吏丨丨官使弟子丨丨遂變成都舊風天下郡國並立學校自文翁始勸人採木孫叔敖為楚相秋冬丨丨入山丨丨春夏乘水多時而出材民皆樂業史賣劒買牛龔遂為渤海守令人種榆百本薤五十本葱一畦韭三畝彘五雞五又郡人好帶劒佩刀遂令丨丨丨丨賣刀買犢曰何為帶牛而佩犢無襦有袴後廉范為蜀郡太守先是蜀郡有火災禁人夜作以防災范乃嚴儲水而已歌曰廉叔度來何暮不禁火民安堵昔丨丨今丨丨畜養種樹黄霸字次公為潁川使郵亭鄉官畜雞豚以贍鰥寡為條教務耕桑丨丨丨丨而已禮義條教以丨丨丨丨諭告之犯法曉令自殺同上米鹽精力始若煩碎其政丨丨唯霸丨丨行之又米鹽言至細同上置正伍長韓延夀為東都守丨丨丨丨相率以孝悌不得舍奸人閭里有非常事輒聞知始若煩後吏無追捕之苦皆便安無拘文法龔遂為渤海守奏曰治亂人猶治亂繩不可急願勑丞相御史且丨丨臣以丨丨得一切便宜從事道不拾遺嚴延年為涿郡太守郡中震恐丨丨丨丨又范曄為天水太守丨丨丨丨狗不夜吠見前選大錢注治有異等漢王成丨丨丨丨治為第一潁川太守黄霸河南太守吳公北海太守朱邑皆丨丨天下丨丨奏課第一李忠字仲都為丹陽太守三公丨丨為天下丨丨不遽臣妾黨秦之惡丨肯丨丨丨如三川之守由南陽之守齮泗州之守壯亦徒驅欲潰之兵終為降虜而已陳君舉集入為公卿漢制郡守課最者丨丨丨丨諌官補郡漢元帝選博士諫大夫補郡國守相蕭望之為平原守上䟽曰陛下哀愍百姓悉出丨丨以丨丨吏所謂憂其末而忘其本也令僕出守尚書丨丨丨為郡丨郡守人為三公後漢書璽書勉勵宣帝時二千石有治效輒以丨丨丨丨増秩賜金或爵至關内侯公卿缺則選諸所表用之前循吏𫝊序手跡賜札光武長於民間頗達情偽以丨丨丨方國者皆一丨十行細書成文勤約之風行于上下後漢循吏傳序東海大治前尹翁歸為東海太守好清靜嵗餘丨丨丨丨又汲黯為東海太守好清靜病卧閣内不出嵗餘丨丨丨丨郡中愈治黄霸為潁川太守外寬内明户口嵗増召守京兆尹復有詔歸潁川太守官前後八年丨丨丨丨教以禮遜前韓延夀治潁川丨丨丨丨勉以孝悌劉寬字文饒為南陽太守每行縣慰父老以農里之言丨少年丨丨丨之訓摧折豪强嚴延年為河南太守豪强屏息野無欺盜其為政務在丨丨丨丨