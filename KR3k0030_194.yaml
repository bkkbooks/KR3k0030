body:
  text: 古今合璧事類備要續集卷四十四宋謝維新撰事為門慕名附辭名事理發揮君子疾沒世而名不稱焉四十五十無聞斯亦不足畏也已然則名者士君子之所尚也然名者實之賔也名不副其實古之人深恥之是以名下無虛士而大名之下難居日中而必昃月盈而必虧功成而身退是亦天之道也事類山仰髙丨丨止景行行止詩車牽圭如如丨丨璋令聞令望詩卷阿譽處是以有丨丨兮蓼蕭譽髦丨丨斯士棫朴景行丨丨先哲孝經序廣譽令聞丨丨施於身所以不願人之文繡也孟貴名君子務積於身則丨丨起之如日月荀儒效德輿令名丨之丨左宣公器名丨丨也不可多取莊子學孔乃所願則丨丨子孟希顔希驥之馬亦驥之乘也丨丨之人亦顔之徒也楊學行邯鄲步夀陵餘子學行於丨丨也失其故行匍匐而歸荀西施顰師金曰丨丨病心而丨其里之醜人見而美之歸亦捧心而顰其里之富人見之堅閉門而不出貧人見之挈妻子而去之莊子慕相如司馬相如丨藺丨丨之為人更名相如漢本傳放屈平賈誼既適長沙意不自得及渡湘水為賦以弔屈原云云因以自喻賈誼傳季布一諾曹丘生曰楚諺曰得黃金百斤不如丨丨丨丨足下何以得此聲於梁楚之間哉暴公威名暴勝之為直指使素聞嶲不疑賢至渤海遣吏請與相見不疑冠進賢冠帶櫑具劔珮環玦褒衣博帶盛服至門上謁勝之開閣延請望見不疑容貌尊嚴衣冠甚偉勝之屣履起迎登堂坐定不疑據地曰竊伏海濵聞丨丨子丨丨舊矣今乃承顔接詞凡為吏太剛則折太柔則廢威之以刑施之以恩然後立功揚名永終天祿勝之敬納其戒講聞髙誼丨丨丨丨之日久矣漢武制策竊髙下風丨丨丨丨之行鄒陽書不見黃生黃憲字叔度同郡陳蕃周舉謂曰時月之間丨丨丨丨則鄙吝之萌復存乎心得御李君李膺性簡亢無所交接南陽樊陵求為門徒膺謝不受荀爽嘗謁膺因為其御既還喜曰今日丨丨丨丨矣其見慕如此登李膺門李膺獨持風裁以聲名自髙士有被其容接者名為登龍門為林宗巾郭林宗遇雨巾一角墊時人乃故折一角以丨丨丨丨其見慕如此曹劉沈謝徐陵多忘人多怨之曰若丨丨丨丨輩暗中摸索亦合認得南史陳華趙孔陳矯李弼謂陳登曰逺近之論謂明府驕而自矜登曰夫閨門雍穆有德有行吾敬丨元方兄弟淵源玉潔有禮有法吾敬丨子魚清修疾惡有識有義吾敬丨元達博聞強記竒材卓犖吾敬丨文舉雄姿傑出有王霸之略吾敬劉玄德餘子瑣瑣焉足録所敬如此何驕之有呂布傳齎酒致邀陶潛江州刺史王𢎞欲識之不能致潛常往廬山𢎞令潛故人寵通之齎酒於半道邀之及至欣然共飲若水歸海劉豫州士慕仰丨丨丨丨通監漢獻帝紀披雲覩天衛瓘見樂廣而竒之曰此人之水鏡見之瑩然若丨丨霧而丨青丨也掩鼻效詠謝安本能為洛下書生詠有鼻疾故其音濁名流愛其詠而弗能及或掩鼻以效之荀鶴大才晉荀鳴鶴陸士龍二人未相識因會張華華以其並丨丨謂曰今日相見可勿作常語陸舉首曰雲間陸士龍荀答曰日下荀鳴鶴陸曰既開青雲覩白雉何不張爾弓挾爾矢張曰荀何遲荀曰本謂是雲龍騤騤今乃山鹿野麋獸微弩強是以發遲一坐撫掌宋纎逺操丨丨有丨丨不與世交馬岌髙尚之士具威儀造焉纎拒而不見岌歎曰名可聞而身不可見德可仰而形不可覩吾今而後知先生人中龍也周顗雅望丨丨以丨丨獲海內盛名後頗以酒失庾亮曰周侯末年所謂鳳德之衰也願出其門韓愈上宰相書惴惴焉惟恐不得出大賢之門欲出其門柳子厚名聲大振一時皆莫與之交諸公要人爭丨令丨丨丨下交口稱譽之墓志草木知名德宗徙張萬福為豫州刺史曰先帝改爾名正者所以褒也朕謂江淮丨丨亦丨爾威丨後復賜舊名本傳文章齊名王勃與楊盈川盧照鄰駱賔王皆以丨丨丨丨天下稱王楊盧駱盈川嘗曰吾愧在盧前恥居王後泰山北斗自韓愈沒其言盛行學者仰之如丨丨丨丨本贊景星鳳凰韓愈與李渤書朝廷之士引領東望若丨丨丨丨之始見爭先覩之為快想聞風采政自已出天下丨丨其丨丨霍光傳定無虛士閻立本見張孫繇舊畫曰名下丨丨丨丨國史察異之先生廬本朝邵康節居洛士人之道洛者有不入公府而必丨丨丨之丨鐫元祐碑常安民長安當立石召常安民者刋之安民辭曰元祐大臣如司馬光者天下謂之正直今謂之姦邪安民不忍丨也府官欲罪之安民曰被役不敢辭乞不刻安民字於碑後世并以安民為罪也婦孺知名司馬公光上疏論新法逆陳其利害曰後當如是行之十餘年無一不如公言者天下傳誦以公為真相雖田父野老皆號司馬公而丨人丨子丨其為君實也行狀坡詩云兒童誦君實走卒知司馬宫禁知名王樞密疇之夫人梅鼎臣之女也景德初樞密副使梅夫人入謝慈夀宫太后問夫人誰家子對曰梅鼎臣女太后笑曰是聖俞家乎由是始知聖俞名聞於宫禁也歸田録不如聞名見面丨丨丨丨傳燈録退誇於人天下之士得一識面者丨丨丨丨以為榮至於遊談布衣之賤往往竊庇門下之名歐集辭名以綿上田晉侯賞從亡者介之推不言祿祿亦不及云云其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之若何對曰言身之文也身將隱焉用文之是求顯也其母曰能如是乎與女偕隱晉侯求之不獲丨丨丨而為之丨曰以志吾過且旌善人左僖二十年表會稽山范蠡與勾踐既滅吳以大名之下難以久居為書辭王曰主憂臣勞主辱臣死昔君辱於會稽所以不死為此事也今既雪恥請從會稽之誅勾踐曰孤將與子分國而有之不然將加誅於子蠡曰君行令臣行意乃裝其輕寶珠玉乘舟浮海終不反勾踐丨丨丨丨為蠡奉邑范浮海出齊變姓名鴟夷子皮耕於海畔父子治産居無幾何致産數千金齊人聞其賢以為相曰居家則致千金居官則致卿相布衣之極也久受尊名不祥乃歸相印間行以去止於陶云云隱身遁命後漢薑肱字伯淮桓帝嘗徴不至中常侍曹節專執朝事徴為太守私告友曰吾以虛獲實遂藉聲價今政在一豎夫何為哉乃丨丨丨丨逺浮江海賣卜給食本傳賣藥避名後漢韓康字伯休丨丨長安市時有女子從康買藥康守價不移女子怒曰公是韓伯休耶乃不二價乎康歎曰我本欲避名今小女子皆知我何用藥為逸民傳恐名太盛王儉幼篤學手不釋卷賔客或相稱美僧虔曰此兒不患無名政丨丨丨丨耳盛名難居唐名儒多言房琯德器有王佐材而史載行事亦少貶矣一舉喪師訖不復振原琯以忠義自奮片言悟主而取宰相必有以過人者用違所長遂無成功然丨丨之下為丨丨矣夫名盛則責望備實不副則訾咎深使琯遭時承平從容帷幄不失為名宰而倉卒濟難事敗隙生陷於浮虛比周之罪名之為纍也戒哉本贊名者公器白居易云古人云丨丨丨丨不可以多取僕是何者竊時之名已多又欲竊時之富貴為造物者肯兼與之乎况詩人命蹇如陳子昂杜甫各授一拾遺而已名者美器陳摶隱華山幼時戲渭水一青衣媪抱置懷中乳之曰令汝更無嗜欲聰悟過人先生嘗戒門人种放曰子他日遭逢明主名動天闕丨丨古今丨丨造物者深忌之天地間無完名子名將有物敗之放晚節侈飾過度營産滿雍鎬間遂喪清節玉壺清話不為人識蘇軾曰得罪以來深自關塞扁舟草屨放浪山水間與漁樵雜處往往為醉人所推罵輒自喜漸丨丨丨丨平生親友無一字見及有書與之亦不答自謂庶幾免矣東坡回李端叔書李白與韓荆州書白聞天下談士相聚而言曰生不用萬戶侯但願一識韓荆州何令人之景慕一至於此耶豈不以有周公之風躬吐握之事使海內豪俊奔走而歸之一登龍門則聲價十倍所以龍盤鳳逸之士皆欲收名定價於君侯願君侯不以富貴而驕之寒賤而忽之則三千賔中有毛遂使白得脫穎而出即其人焉今天下以君侯為文章之司命人物之權衡一經品題便作佳士而君侯何惜階前盈尺之地不使白揚眉吐氣激昻青雲耶白謀猷籌畫安能盡矜至於制作積成卷軸則欲塵穢視聼恐雕蟲小技不合大人若賜觀芻蕘請給以紙墨兼人書之然後退歸間軒繕寫呈上庶青萍結緑長價於薛卞之門韓愈著王仲舒碑仲舒字𢎞中少奉母夫人家江南讀書著文其譽藹鬱當時名公皆折官位輩行願為交貞元初射策拜左拾遺與陽城合遏裴延齡不得為相德宗初怏怏無奈久而嘉之其後入閣德宗顧列謂宰相曰第幾人必王某也果然月餘特改右補闕遷禮部考功吏部三貟外郎在禮部奏議詳雅省中伏其能在考功吏部提編約故吏無以欺同列有恃恩負勢者衆皆媚承公嫉其為人不直視由此貶連州司戶移夔又司馬文移荆南因佐其節度事為參謀得五品服放迹在外積四年元和初收拾俊賢徴拜吏部員外郎未幾為職方郎中知制誥友人得罪斥逐後其家親知過門縮頸不敢視公獨省問為計度論議直其寃由是出為峽州刺史轉廬州未至丁母夫人憂服除又為婺州時疫旱甚人死亡且盡公至多方救活天遂雨疫定比數年里閭完復制便出巡人填道迎顯公德事具聞就加金紫轉蘇州變其屋居以絶火延隄松江路害絶阻滯秋夏賦調自為書與人以期吏無及門而集政成為天下守之最天子曰王某之文可思最宜為誥有古風豈可久以吏事役之復拜中書舍人韓文詩集仰昭回所恨不見之猶女丨丨丨李白齊嶺岑誰能丨丨丨揖君山嶽德孟見顔色落月滿屋梁猶疑丨丨丨杜想風采吾友柳子厚其人藝且賢吾未識子時已覽贈子篇寤寐丨丨丨於今已三年云云嶷嶷桂林伯矯矯義勇身生平所未識待我逾交親韓退之贈元十八協律未識面甫昔少年日早充觀國賔李雍丨丨丨王翰願卜鄰杜盡開顔清如氷玉重如山百辟巖趨禮絶攀強虜外聞須破膽平人長説丨丨丨朝廷有道青春好公館無私白日間致却垂衣更何事幾多詩句詠關關薛能傳語元龍丨丨丨丨要相識江湖春動有來鴻陳后山敬為南豐向來一瓣香丨丨曾丨丨同上辭名不用漸喜交遊絶幽居丨丨名杜何須丨丨身後千載名李休占直以踈慵招物議丨將文字丨時名苦藏丨丨難沒是詩名坡寧要白頭丨復丨時名古今合璧事類備要續集卷四十四
