body:
  text: 古今合璧事類備要前集卷十一宋謝維新撰氣候門寒暑事類往來暑丨則寒丨寒丨則暑丨寒暑相推而嵗成焉係辭燥濕丨丨寒暑以節至淮南子祭坎壇相近于坎壇祭寒暑也注相近音禳祈禳郤也祈求也寒暑不時則或禳之或祈之寒于坎暑于壇記祭法擊土鼓春官籥章中春晝丨丨丨歙豳雅以逆署中秋夜迎寒亦如之注豳七月詩也逆暑以晝求諸陽迎寒以夜求諸隂周禮五榖熟寒暑和節而丨丨時丨荀子富國篇四時成一寒一暑丨丨備丨後律厯志大火中丨丨寒暑之候也火星丨而寒暑退豳七月注張躍曰火中寒暑乃退左昭公三年小民咨夏暑雨丨丨惟曰怨丨冬祁寒丨丨亦惟曰怨丨書君牙周景短長地官大司徒以上圭之法正日景以求地中日南則景短多暑日北則景長多寒周禮箕疇休咎八庶證曰燠曰寒休證曰哲時燠若曰謀時寒若咎證曰豫常燠若曰急常寒若尚書洪範暑又詳見夏類伏日類事類赤帝炎風之野丨丨祝融之所司淮南子火精夏則丨旺其丨在天濕暖之氣養生百木荀爽傳二七為火為南方為夏太元熱風西域大流沙多丨丨觸人及六畜皆迷仆孔帖多雨牂柯無城郭土熱丨霖丨稻粟再熟同上土潤月令丨丨溽暑注溽濕暑也說文金流大旱丨石丨土山焦莊子十日並出流金爍石楚詞如熏旱既太甚藴隆蟲蟲赫赫炎炎云我無所旱既太甚滌滌山川旱冦為虐如惔如焚我心憚暑憂心丨丨毛詩雲漢若燎方大暑火烘爆霣赤壤若墜于爐丨丨于原舌呀而不能持攴墜而不自運方千里竹室記雲車有丨大如丨蓋十餘此陽水之氣必暑有暍者京房易飛候氷室指丨丨不能起暍子之熱抱朴子露臺桂館一名甘泉迎風觀寒丨丨以避暑潘嶽關中記氷井石李龍于丨丨臺藏氷三伏之日以氷賜大臣陸􅞪鄴中記澄水帛同昌公主一日大㑹暑氣將盛公主命取丨丨丨以蘸之挂于內軒滿座皆思挾纊丨丨丨長八九尺似布細明薄可鍳云其中有龍涎故能消暑杜陽雜編洞光珠燕昭王登握日之臺得神鳥所銜丨丨之丨以消煩暑謂之招凉珠廣記飛雪散元帝被病廣求方士漢中逸人王仲都者詔問所能為對曰但能忍寒暑耳因為待詔至夏大暑月使暴坐又環以十爐火不熱而身汗不出或問不熱之道曰服𤣥氷元丨丨丨王仲都並用此方也抱朴子辟暑犀唐文宗延學士講易賜丨丨丨杜陽雜編迎凉草李輔國夏于堂中設丨丨丨其色類碧而幹似苦竹葉細于杉盛暑刺之窗户間凉自至同上鎮心瓜後漢鄭均嘗讀書時大熱以瓜鎮心欲凉故也賜冷蛇明皇以申王畏署丨之丨丨白色而不傷人冷如氷雪玩之不復冇煩熱也酉陽雜徂浸白龍李德裕嘗因暇日逰宴時畏景赫㬢咸有欎蒸之苦既延入小齊列坐開樽煩暑都盡如涉髙秋及昏而罷出户則熇然焦灼有好事者求親信問之云此日以金盆貯水漬白龍皮置于坐末龍皮者新羅僧得自海中劇談録積氷成山𤣥宗起凉殿陳知節上疏極諫上令力士召對時毒暑方盛在凉殿水激扇車風獵衣于石榻隂溜仰不見日四隅丨丨丨丨復賜氷消麻飲陳躰生栗腹中雷鳴再三請起方許上猶拭汗陳才及門遺泄狼藉復召謂曰卿論事宜審勿以己妨萬乘也廬陵官下記穿岸為室馬援征五漢㑹暑盛乃丨丨丨丨以避炎氣本傳乘駟林中𤣥宗幸洛至繡嶺宫時屬炎暑上曰姚崇多計令力士探回奏曰崇方縝絺丨小丨按轡木隂下乃命小駟頓忘煩溽開元引水屋上拂菻國盛暑之節乃丨丨潛流上遍于屋宇機制巧密人莫之知觀者惟聞丨丨泉鳴俄見四簷飛溜懸波如瀑布激氣成凉風唐入水避暑洪從祖仙公每大醉及夏天盛熱輒入深水底八口乃出者正以能閉氣胎息故耳出抱朴子尉石取凉劉真長見王公王公了不與語時大熱以腹丨丨棋局凉棚避暑長安冨人每至署伏中各于林亭內植畫柱以錦結為丨丨設坐具召名妹間坐遞請為丨丨㑹間元遺事出征冒暑王承宗叛詔吐突承璀出討兵老不决白居易上言今暑濕暴露兵氣薰蒸雖不顧死孰堪其苦白居易罽賓道厯小大頭痛之山赤土自熱反令人身熱頭痛嘔逆漢書西域傳重裘纍茵汲桑六月盛暑丨丨丨丨使人扇之患無清涼斬扇者趙書深宫廣厦唐莊宗使人問郭崇韜曰使吾與梁對壘于河上雖祁寒盛暑披甲跨馬不以為勞今居丨丨䕃丨丨不勝其熱何也崇韜對曰陛下昔以天下為心今以一身為心艱難逸豫為慮不同勢自然也願陛下無忘創業之難常如河上則可使煩暑坐變清凉莊宗默然出五代史武王䕃暍丨丨丨丨乙曷反著暑熱死也人於栁下而天下懷出淮南子又武王見暍人王自左擁而右扇之世說太宗走凉太宗欲幸九成宫馬周上疏謂上皇留熱處陛下走凉處溫清之義臣所未安太宗善其言本記童子參見岑文本避暑山亭忽有報上清丨丨丨衣淺服青衣曰此上清五銖服出門不丨文本掘古錢一枚後致暴富本傳酋長遣侍北衣丨丨丨子入丨當秋來春去以避中國之熱號曰鴈臣伽藍記云詩集沸海燭龍銜火飛天地平陸無風海波沸彤雲疊掛竒峯長熖熖流光爇凝翠煙島摶鵬嚲雙翅羲和赫怒强總轡飲流夸父斃長途始見當中印王字明明夜西朝乂東古來冇道仍再中扶桑老葉蔽不得輝華直上凌蒼空萬人揮汗翻成雨口燥喉乾隘塵土西郊雲色畫冥冥如何不救生靈苦何山怪木藏蛟龍縮鱗卷鬛為乖慵不發滂澤注天下欲使風雲何所從旱苖原上枯成熖嶽靈徒祝無神驗豪家簾外喚清風水紋明角鋪長簟玉扇畫堂凝夜秋歌艷繞梁催莫愁陽烏落盡酒不醒扶上西圍當月樓廢田暍死非吾屬庫有黃金倉有粟僧鸞苦熱行燒空火輪迸熖丨長丨浮埃撲靣愁濛濛嬴童走馬喘不進忽逢碧樹含清風清風留我移時住滿地濃隂懶前去却歎人無及物功不似團團道邉樹王轂題道邉樹火旗祝融南來鞭火龍丨丨熖熖燒天紅日輪當午凝不去萬國如在洪爐中五嶽翠乾雲彩滅陽侯海底愁波竭何當一夕金風發為我掃却天下熱王轂苦熱湯井六龍銜火燒寰宇魏王氷井如湯煮松枝桂葉凝若癡喘殺溪頭嘯風虎北溟融却萬丈氷千斤凍鼠忙如蒸我聞胡土長飛雪此時日㬠地皮裂仙芝瑶草不敢茁湘川竹焦琅玕折西郊雲好而不垂堆青疊碧徒爾為梅聖俞呼風大熱曝萬物萬物不可逃燥者欲出火液者欲流膏飛鳥厭其羽走獸厭其毛人亦畏絺綌况乃服冠袍廣厦雖云託丨丨不動毫未知林泉間何以異我曹蠅蚊更晝夜膚體困爬搔四序茍迭代㑹有秋氣髙梅聖俞苦熱詩思露昔聞草木焦今覩沙石爛曀曀風逾靜曈曈日漸旰習靜悶衣襟讀書煩几案卧丨清丨浥坐待高星燦蝙蝠户中飛蠛蠓窗間亂實無河朔飲空有臨淄汗遺金自不拾惡木寧無幹願以三伏辰催促九秋換梁何遜苦熱詩低垂雷霆空霹靂雲雨竟虛無炎赫衣流汗丨丨氣不蘇乞為寒水玉願作冷秋菰何似兒童嵗風凉出舞雩杜甫愁暍松篁不動翠相重日射流塵四散空地上行人丨丨死那知高處有清風王介甫興國樓上作坐甑法曹貧賤衆所易腰腹空大何能為自從五月困暑濕如丨深丨遭蒸炊退之詩透裳山木無隂驛路長海水吹熱丨蕉裳渴思西漢金莖露困憶南朝石步廊江上綸竿輸散誕林間冠褐負清凉下程欲選披襟處滿眼赭桐兼佛桑丁公言途中盛暑炎天矮屋丨丨不可居高亭爽氣亦元旡小風不被蟬餐却合有些凉到老夫楊廷秀登多稼亭炎風御風不必問雌雄只冇丨丨最不中却是竹君殊解事丨丨篩道作清風同上深院别院深深夏簟清石榴花遍透簾明樹隂滿地日亭午夢覺流鶯啼一聲蘇子美虛閣千竿竹翠數蓮紅氷閣虛凉玉簟空琥珀盞烘疑漏酒水精簾瑩更通風賜氷滿碗況朱實法饌盈盤覆碧籠盡日逍遙却煩暑再三珍重主人翁劉禹錫避暑烘窰惜昔堯為天下十日燒九州金爍水銀流玉熠丹砂焦六合丨為卜盧同月蝕詩沸鼎執熱乃丨丨纎絺成緼袍杜甫汗漿老少多暍死丨踰水丨翻杜贈栁少府肥者不禁熱喘息丨流丨白居易白丨翻丨午景長東坡肌血晝蠅食案繁宵蚋丨丨渥韓納凉聫句弱紈丨丨猶覺重纎絺尚少凉劉孝威重簟丨丨無冷氣挾石似懷溫任昉脫巾丨丨挂石碧露頂灑松風出李白詩汲井探湯丨隂丨出栁宗元詩寒事類栗烈豳七月一之日觱發二之日丨丨注云觱發風寒也丨丨寒氣也涸沍山谷丨隂而丨寒左傳祁寒冬丨丨小民亦曰怨咨書竒寒魏使崔劼曰今嵗丨丨江淮亦氷酉陽雜徂索衣大寒然後丨衣裘不亦晚乎揚襲裘丨孤丨之暖者不憂至寒之慘愴王褒賢臣論暏瓶知寒丨丨中而丨天下之丨淮南子擊鼓迎寒中秋丨土丨歙豳雅以丨丨禮松柏後凋嵗寒然後知丨丨之丨丨也論語黍稷不生燕有寒谷不生丨丨鄒衍吹律暖氣乃至草木乃生劉向别録牛馬蝟縮漢元封中大雪深一丈丨丨毛寒縮如蝟出西京雜記士卒膚裂突厥掠凉州元澄令軍持滿注㑹大寒裂膚士卒不能張弓矢孔氏六帖漢士墮指髙祖聞韓王信降胸奴上自將擊之連戰乘勝逐北至樓煩㑹天皸寒士卒墮指者十二三同上趙充國傳將軍士寒手足瘃皸車運反瘃裂也楚師挾纊丨莊王圍蕭申公巫臣曰丨人多寒王巡三軍撫而勉之士皆如丨丨左衛靈鑿池丨丨公天寒丨丨苑春曰天寒恐傷民公曰寒哉春曰公衣狐裘坐熊席四陬有火是以不寒民衣弊不補履决不苴君則不寒民則寒矣公曰善命罷役吕氏春秋齊景築臺景公起大臺嵗寒役之凍餒者有焉公延晏子坐飲酒樂晏子歌曰庶民之凍我若之何奉上靡弊我若之何歌終喟然流涕公止之曰子殆為大臺之役夫寡人將罷莊王賑寒雨雪楚莊王披裘當户曰我猶寒彼百姓賓客甚矣乃使巡國中求百姓賓客之無居宿絶糧者賑之國人大悅尸子景公發粟齊丨丨時雨雪三日公衣狐白之裘謂晏子曰天下不寒何也晏子曰賢君飽知人飢溫知人寒公曰善遂出衣丨丨以與飢貧者范叔綈􅀈范雎相秦魏須賈使秦睢微行弊衣間出賈曰丨丨一寒如此哉乃取丨丨以賜之史記藥嵩帷被後漢丨丨嘗直南宫家貧無被明帝間而嘉之詔大官賜尚書郎以下食并給丨丨設玳瑁簾同昌宫主堂中設却寒簾類玳瑁班有紫色名却寒鳥骨所為也杜陽編出玉龍膏以暖金合盛玉龍膏寒時但出此合則一室暄熱不假爐炭傳竒集貯辟寒香同昌公主七寶步輦綴五色玉香囊丨丨丨丨杜陽雜編辟寒香丹國所出述異記刻常春木李輔國嚴凝之時置鳯首木於髙堂大厦中其木髙一尺而雕丨如鸞鳯之形和煦之氣如三二月故别名曰丨丨丨同上交株進犀丨丨丨丨角一株色如金置于殿中暖氣襲人上問其故使者對曰此辟寒犀也開元遺事昆明貢鳥魏時丨丨國丨辟寒丨暖手妓圍岐王每天寒手丨不近火惟于妙妓懷中揣其肌膚稱為丨丨申王每苦寒使宫丨密丨以禦寒氣呼為妓圍開元遺事遮風肉障楊國忠冬月選婢肥大者行列于前令丨丨謂之丨丨並同前周臺棄褥丨靈王起昆昭之丨設狐腋素裘紫羅大褥一人以指彈席上而暄風入席裘褥皆棄臺下拾遺僧舍暖香寶雲溪丨丨盛冬客至丨丨一炷滿室如春詩集壯隂天色寒青蒼北風呌枯桑厚氷無裂文短日有冷光𫾣石不得火丨丨正奪陽調苦竟何言凍吟成此章孟郊苦寒吟方冬殊俗還多事丨丨變所為破相霜落瓜嘗稻雪翻匙巫峽寒都薄黔溪障逺隨終然灘瀨减暫喜息蛟螭同上入懷漢時長安雪一丈牛馬毛寒縮如蝟楚江巫峽氷丨丨虎豹哀號乂堪記秦城老翁荆揚客慣習炎蒸嵗絺綌𤣥冥祝融氣或交手持白羽未敢釋杜苦寒行刮膚去年白帝雪在山今年白帝雪在地凍埋蛟龍南浦縮寒丨肌膚北風利楚人四時皆麻衣楚天萬里無晶輝三足之鳥足恐斷羲和迭送將安歸同上生鱗四時各平分一氣不可兼隆寒奪春序顓頊固不廉凶颷攬宇宙鋩刃甚割砭肌膚丨丨甲衣被如刀鎌氣寒鼻莫嗅血指凍不拈侵爐不覺暖熾炭屢以添探湯無所益何况纊與縑韓愈起粟凍合玉樓將丨丨光搖銀海眩生花東坡折天闕蠻夷長老怨苦寒崑崙天闕凍應折杜甫動坤軸殺氣南行丨丨丨不爾苦寒何太酷杜甫袖如氷長風入短丨納手丨懷丨李白衾無暖重丨丨丨氣挾纊如懷氷張茂先風氷酒霜威能折綿丨力欲丨丨山谷寒折綿徑氣方凝酒丨威正丨丨肩吾晴霽事類霓收收降霓于漢隂潘尼苦雨賦虹銷丨丨雨霽滕王閣序隂解公遂升舟風雨少弛櫂夫奏功雲丨丨駁日光穿漏波伏不興韓文暘升如新霽清丨丨天光入隙中發明空中諸冇塵相楞嚴經燕石還零陵山冇丨丨遇雨則飛如生燕雨止則丨為石湘州記牛泥盡欎林郡山東南冇池池冇石牛嵗旱百姓殺牛祈雨以牛血和泥泥石牛背祠畢天雨洗牛背泥盡即晴見廣州記鞭陽石宜都郡有二大石一為陽一為隂鞭隂石則雨丨丨丨則晴闕閉北門董仲舒求雨閉諸陽縱諸隂止雨反是音義云祈雨閉陽門止雨丨丨丨漢書魏主受祚延康元年大霖雨五十餘日魏有天下乃霽將受大祚之應也魏略文䖍獲夢丨丨字仲孺時霖雨廢農業太守憂色䖍補户曹掾䖍奉教齊戒在社三日夜夢見白頭翁謂曰爾來何遲䖍具白所夢太守曰昔禹夢繡衣男子稱滄水使者禹知水脉當通若掾此夢將可比也明日果大霽長沙耆舊傳作祈晴文幽明失序就隂則滯連雨霖淫注而不替潤既違時澤而非惠幸輟霖而吐景權停風而斂翳昭鸞輅于天郊光龍旗于田際耒耨得施禾黍獲藝增髙廩于嘉年登十千于兹嵗宋孝武著喜霽賦清屏翳之洪隧戢太上之觸石凌風絶而謐寧歸雲反而徽霍改望舒之離畢耀六龍于紫閣于是朱明啓候凱風來南復火正之權司兮黜后土于重隂夷中原之多潦兮反髙岸于嵩岑萎禾竦而振穎兮偃木竪而為林隂陽交泰萬物方道炎神送署素靈迎秋四時逝而代謝大火忽其西流年冉冉而易頽時靡靡而難留晉陸雲詩集雲斂濕花飛未逺隂丨丨尚低燕燥還為石龍殘便是泥周庾信初晴詩靄凝連山卷簇雲長林息衆籟密樹含緑滋遙峯凝翠靄梁詩夕霽丨丨風氣凉間房有餘清開軒滅華燭月露皓已盈宋謝瞻答康樂秋霽詩朝晴峽天長夜雨江檻亦丨丨杜既雨丨丨晴亦佳杜好晴今朝丨丨景古今合璧事類備要前集卷十一
