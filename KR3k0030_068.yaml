body:
  text: 古今合璧事類備要前集卷六十八宋謝維新撰哀挽門挽章事類紼謳丨丨所生必於斥苦注紼引柩索也斥疏緩也苦用力也引紼所以有謳歌者為人有用力不齊故促急之也莊子喪樂㧪歌者丨家之丨執紼者相和之吉搜神記歌虞殯公㑹吳子伐齊將戰公孫夏命其徒丨丨丨注送葬歌曲元必死左傳寄哀音今有挽歌者髙帝召田橫至千戶鄉自斃奉首從者挽至宫不敢哭故為之歌以丨丨丨譙周法訓漢高帝時田橫死吏不敢哭但隨柩叙哀後代相承以為挽歌通典延年二曲漢武時李丨丨分為丨丨薤露送王公貴人以蒿里送士大夫庶人亦曰挽歌事物紀原思道八美文宣帝喪朝士多作挽歌十首擇其善者用之魏收陽休之等不過一二篇唯盧思道得八篇故時號八美盧郎北史搖鈴自歌武陵王晞未敗四五年中喜為挽歌自丨大丨使左右倡和續陽秋道上行殯晉袁嵩少有才名善音樂舊歌有行路難曲辭踈質嵩好之乃文其辭句婉其節奏每因酣醉繼歌之聽者流涕初羊曇善唱桓伊能挽歌及嵩行路難繼之時謂之三絶時張湛好於齊前種松柏而嵩出遊好作挽歌人謂湛屋下陳尸嵩丨丨丨丨裴啓語林挽士唱詞承天皇帝倓追號迎喪既至李泌為挽詞二解述倓志命丨丨丨之州人歌挽公之薨也汴州人歌之曰濁流洋洋有關其乳闐道歡呼公來之初令公之歸公在喪車韓文董公行狀自製挽歌衛國文懿公主薨帝素所愛丨丨丨丨羣臣畢和令歌挽詞代宗皇后獨孤以薨詔羣臣為挽詞帝擇其尤悲者令歌之詩集薤露丨上朝丨何易晞露晞明朝更復落人死一去何時歸蒿里丨丨誰家地聚斂精魄無賢愚鬼伯一何相催促人命不得少踟蹶干寶搜神記右二章皆田橫門人作長夜卜擇考休貞嘉命咸在兹夙駕警徒御結轡頓重基龍􅀢被廣桞前驅矯輕旗殯宫何嘈嘈哀響沸中闈中闈且勿歡聽我薤露詩死生各異倫祖載當有時舍爵兩極位啓殯進靈輀飲餞觴莫舉出宿歸無期惟衽曠遺影棟宇與子辭周親咸奔湊朋友自逺來翼翼飛輕軒駸駸䇿素騏按㘘遵長薄送于丨丨臺呼子子不聞泣于子不知歎息重櫬側念我疇昔時三秋猶足收萬世安可思殆沒身易忘救子非所能含言言咽揮涕涕流離陸士衡大暮闕惺人往有反歲卧觀天井懸廣霄何寥廓丨丨安可我行無歸年昔居四民宅今託萬鬼鄰昔為七尺軀今成灰與塵金玉素所佩鴻毛今不振豐肌饗螻蟻妍骸求夷泯壽藏延魑魅虛無自相賔猿蟻爾何怨魑魅我何親拊心痛茶毒永嘆莫為陳同上丹旐寒日蒿土明凄凄郭東路素車誰家子丨丨引得去原下荆棘叢叢邉有新墓人間痛傷别此是長别處曠野何蕭條青松白楊桞趙微詩黃泉生時遊國都死沒棄中野朝發高堂上暮宿黃泉下白日入虞淵懸車息泗馬造化雖神明安能復存我形容稍歇滅齒髮行當隨自古皆有然誰能離此者繆熙伯窮泉萬里誰家地松門何代丘百年三萬日一别九千秋返照寒無影窮泉東不流居然周物化何處欲藏舟駱賔王裴大夫挽歌孤壠日夜役神多損壽先生下世未中年撰碑縱託登仙伴營奠應支賣鶴錢丨丨隂風吹細草空窗濕氣漬殘篇人間别更無寬事此事誰能與問天與于笑喻亮雕玉芝一夜清風丨丨丨蒼生絶望士林悲空懷濟世安民䇿不見男婚女嫁時劉禹錫摧搖樹王家碧瑶樹一樹忽先摧海外故人泣天涯弔鶴來未成霖雨用先失濟川材一罷廣陵散鳴琴終不開李太白聲名在身死丨丨丨多應萬古傳寡妻無子息破宅帶林泉塜近登山道詩隨過海船故人相弔後斜日正寒天賈島哭孟郊賢豪歿四海齊名白與劉百年交分兩綢繆同貧同病退間日一死一生臨老頭杯酒英雄今與操文章微婉我知丘丨丨雖丨精靈在應共微之地下遊白居易哭劉夢得埋寶玉今日哭君吾道孤寢門淚滿白髭鬚不知箭折弓何用兼恐唇亡齒亦枯窅窅窮泉丨丨丨駸駸落景挂桑榆夜臺暮齒期非逺但問前頭相見無同上葬薜蘿交朋來哭我來歌喜傍山河丨丨丨四海十年人殺盡似君埋少不埋多見鶴哭目録故人弔揚子津頭昔共迷一為京兆隔雲泥故人昨日同時弔舊馬今朝别處嘶向壁愁眉無復盡扶床稚齒已能啼也知世路多堪嘆誰信莊周論物齊張祐路人悲京口年來耆舊衰高人淪喪丨丨丨空開韋叟一經在不見恬侯萬石時貧病只知為善樂逍遙却恨棄官遲七年一别真如夢猶記蕭然瘦鶴姿東坡挑姚莊田墨池荒談柄寂寥塵久暗丨丨丨廢草空青三昭不見山巾濕擬盡軒昂大白星林通佳城閉小堰門頭柳繫卿吳山堂上月侵筵潮聲半夜于門響詩句明朝萬口傳豈意日斜庚子後忽驚嵗在己辰年丨丨一丨無窮事南望題詩淚灑箋東坡挽孔長源鄰笛悲昨夜舟還浙水湄今朝丹旗欲何為才收北浦一竿釣未了西齊半局棊洛下已傳平子賦臨川爭寫謝公詩不堪舊里經行處風木蕭蕭丨丨丨郡雅談塵榻掛布衣馳譽入京都丹旐俄聞反舊閭諸老誰能先賈誼君王猶未識相如三年弟子行喪禮千里鄉人㑹葬車獨我空齊掛丨丨遺編時閲子云書歐陽公挽老泉絶來詩天喪我良知無言雙淚垂唯求相見夢永丨寄丨丨應有異人弔從兹雅道衰春風古原上新冡草離離潘若中翻遺藁天上新除黃紙詔人間已度白難年赤虬控御迎長吉明月心胸洗謫仙他日西州難重過只今北院已蕭然相思甲乙丨丨丨萬斛珠璣得貫穿李彭年一場夢軍門半掩槐花宅每過猶聞哭臨聲漸窮老僕慵看馬著慘佳人懶按筝詩侣酒徒消散盡丨丨春丨越王城盧多遜兩行淚高才本出朝庭右能事方推德業餘每見便申曹植句至今傳寶魏華書濟南名士新凋喪劒外生祠已潔除欲寄西風丨丨丨依然喬木鄭公廬坡挽張文潛追思遺像挺然直節庇峨岷謀道從來不計身屬纊家無十金産過車巷哭六州民塵埃輦寺三年别樽酒岐陽一夢新他日丨賢見丨丨不才寧不更沾巾東坡拜新阡衣冠南渡塞螺川始識蓬萊主自然舌捲風雷翻海嶽學窮精祲出人夭歸來元亮荒三徑老去揚雄有一㕓斗酒隻雞思欲弔無因下馬丨丨丨爐溪賈島墳一簇草平秋欲白數聲鴉噪日將曛終煩取去仙靈骨葬近司蒼丨丨丨潘問滕公室早扈六飛依日月曉辭三事作神仙馬啼忽記丨丨丨雞夢那逢謝傳年一品直王封異雜功名今不數凌煙江彥章蔡雍碑周南留滯登封日魯國逍遙曵杖時海內時流今略盡不知誰作丨丨丨李彭安仁誄上帝深居閉九閣巫咸不下問御寃廣陵别後春濤隔湓浦書來秋雨翻只有丨丨能作丨何曽宋玉解招魂平生風義兼師友不敢同君哭寢門李又川吳劉蕡奠生芻欎鬱高陽里生才世不孤八龍歸月旦三鳯繼大衢詔瓌吾安屈人亡道固􅋯空舍湖海士愁絶丨丨丨魯直挽椊璛送靈輀心期自與衆人殊骨相知非淺丈夫獨幹斗杓環帝座親扶日轂上天衢鋤耰萬里山無盜衮繡三朝國有儒爽氣匆隨秋露盡慢慿陳近在龜跌兩朝身與國安危典䇿哀榮此一時木稼早聞達宜怕山頺果見哲人萎英姿爽氣歸圖畫茂德元勳在鼎彛幕府少年今白髮傷心無路丨丨丨士介甫挽忠獻空畫像功名烜赫在三朝經術從容輔漢條儒術早紆丞相紱戎冠再插侍中貂開倉六塔流民復出甲甘陵叛黨銷東第秪今丨丨丨當時於此識風標王介甫挽賈魏公慟佳城元祐開皇極功歸用老成推深萬物表不命四時行日者傾三接天乎奠兩楹堂堂寧復有埋玉丨丨丨接司馬公擬作挽詩有生必有死早終非命促昨暮同為人今且在鬼録魂氣散何之枯形寄空木嬌兒索父啼良友撫我哭得失不復知是非安能覺千秋萬嵗後誰知榮與辱但恨在世時飲酒不得足陶潛在昔無酒飲今但湛空觴春醑生浮蟻何時更能嘗肴案盈我前親舊哭我傍欲語口無音欲視眼無光昔在高堂寢今宿荒草鄉一朝出門去歸來夜未央荒草何杳杳白楊亦蕭蕭嚴霜九月中送我出逺郊回靣無人居高墳正嶣嶤馬為仰天鳴風為目蕭條幽室一以間千年不復朝千年不復朝賢達無奈何而來相送久各自還其家親戚或餘悲他人亦已歌死去何能道託體同山阿並同上自製挽詞嬰釁徒荒域茹哀與世辭官來録我槖吏來驗我尸藤束木皮棺藁葬路傍陂孤魂不敢歸惴惴㦅猶兹家鄉在萬里妻子天一涯弱孤東堪事歸骨走何時昔忝柱下史通籍黃金閨一朝竒禍發飄流至干斯修塗繚山海未免從閣維荼毒復荼毒彼蒼焉得知秋晚瘴江急鳥獸鳴聲悲宫生蒼蘚紙錢掛枯枝濛濛寒雨零慘慘隂風吹無人致薄奠誰與飯黃緇更無挽歌者但有挽歌詞秦觀自作挽詞東坡云嵗在庚辰六月二十五日豫與秦少遊相别於海康意邑白若與平日不少異但自作挽詞一篇人或怪之豫以謂少游齊生死了于我戲出此語其言過矣此言惟淵明可以當之少游因遷漏而作此詞豈真若是乎婦人月留歌扇海鵾三山路香輪足不歸帳添間翡翠佩冷失珠璣明丨丨丨丨殘雲散舞衣都門送車返宿草自春菲御製塵入羅衣春風寒魯服明月斷秦簫丨丨丨丨暗香隨玉篆消歌鍾雖不館桃李不成春水折空遷沚樓高亦隔秦神考挽公主霜飄寒菊奔月嫦娥魂已清錦暑空貯誥封榮穆家酥酪盈門貴謝氏芝蘭滿砌生風散采雲吹碧落丨丨丨丨墜紅英佳城萬古凄凉地瓏水東流猿作聲瀘溪風吹棘薪柏舟高節冠卿鄰絳帳清風聳縉紳豈似凡人但慈母能令孝子作忠臣當年織屨隨方進晚節稱觴見伯仁回首悲凉便陳迹凱丨丨盡丨成丨東坡賦愴板輿壽母膺芝誥召節戲綵衣凱風方欲報朝露忽先晞仙行三千滿人生七十稀間居他日丨應丨丨丨非汪彥章隂夷房櫳結褵記初歡同穴欺晚嵗擇夫得和嶠生子勝王濟高風雙賔友古義仍兄弟從君吏隱中窮達初不計云何抱水疾俯仰便一世幽丨丨丨丨苦澤在巾袂百年縱得滿此路行亦逝那將有限身長㵼亦益涕君文照今古不比山石脆當觀千字誄寧用百金瘞東坡挽毅文妻哀歌丹旐剪髻賔筵盛齊眉婦禮闌謂冝俱白髮忽去作青山大夢驚胡蝶何時識佩環丨丨行欲絶丨丨雨斑斑山谷淚灑萊裾閨庭蘭玉照鄉閭自昔雖貧樂有餘豈獨佳人在中饋却因麟趾賦關雎雲駢忽已歸仙府喬木依然擁舊廬忽把還鄉千斛丨一時丨向老丨丨東坡夢作挽歌沈亞之夢為秦公幼女弄玉壻公主死作挽歌應教曰泣葬一枝紅生同死不同金鈿墜芳草香繡滿春風舊日聞簫處高樓明月中黎花寒日夜深閉翠微宫姚合謂沈亞之曰吾玉女生者元和初夕夢逰吳侍吳王久聞宫中出輦鳴笳簫擊鼓言葬西施王悲悼不止立詔問客作挽歌詞生應教為詞曰西望吳王闕雲書鳯字牌連江起珠帳擇地葬金叉滿地紅心草三層碧玉階春風無處所悽恨不勝懷詞進王甚嘉之及寐能記其事廣異記代賦挽辭主象十二樓一身當五千古來妾命薄事主不盡年起舞為主壽相送南陽阡忍著主衣裳為人作春奸有聲當徹天有淚當徹泉死者恐無知妾身長自憐葉落風何厲山空花自紅捐世不待老惠妾無其終一死尚可忍百嵗何當窮天地豈不寬妾身自不容死者如有知殺身以相復向來歌舞地夜雨鳴寒蛩後山為南豐作銘志附行狀碑碣事類論德著功銘之義稱美而不稱惡此孝子孝孫之心也銘者論著其先祖之有德善功烈勳勞慶賞聲名於天下禮記繫世傳名銘丨丨丨其丨也荀子禮論石槨得銘衛靈公死卜葬沙丘掘數仭得丨丨洗視之有銘焉莊子佳城留篆見葬及墳墓類滕公沈彬事題季札墓昔季札葬孔子題其墓曰嗚呼延陵季子之墓又有吳季子墓銘自前世相傳以為孔子所書挍之從紳記云舊石堙滅開元中𤣥宗命殷仲容模搨其書以傳然則開元之前已有本矣至大厯中蕭定又刋其石則轉相傳模失其真逺矣按孔子平生未嘗至吳以史記世家考之其歷聘諸侯而不逾楚推其嵗月蹤跡未嘗過吳不得親銘季子之墓又諸字特大非古簡牘所容第以其名傳之久不少遂廢故鋟之以俟慱識君子集占録跋識孔子喪孔子之喪公西赤為識焉子張之喪公明儀為識焉注識名志也六帖求公權書桞公權書書當時大臣家碑志非其筆人以為不孝外夷入貢皆别署貨具曰此購桞書唐書需張說文姚崇張說同位宰輔崇病戒諸子曰張相與吾相忌甚深然其人稍奢侈吾沒後同僚當來弔汝盛陳服玩寶器於帳前若張不顧舉族危矣彼若寓目當致此玩以神道碑請得其文即時録進仍先礱石使速鐫刻張料事遲我數日後必追悔姚沒張果至目其服玩者數四諸子悉依教戒碑文時謂梧筆曰八柱承天高明之位列四時成嵗亭毒之功存後數日果取其本欲重刪改諸子引使者視之碑已攻畢說悔恨曰死姚崇猶算生張說明皇雜録必求韓記張季友曰薄而不得韓君記猶不葬也韓愈作張府君銘必須孫文溫郊王庾諸公之薨丨丨丨綽為碑丨然後刋石焉崔氏能任史孝章妻博陵崔氏僕射之喪自沒竟至葬當門戶備祭祀建碑表皆崔氏之能且命其家老具事功來乞辭劉禹鍚集女奴請銘有丨丨抱嬰兒來致其主夫人之語曰妾張圎之妻劉氏也妾夫嘗語妾云吾嘗獲私交於夫子恐死遂泯敢以稚兒汴兒見先生賜之銘韓文張法曹碑自為墓志傳奕嘗醉卧蹶然起曰吾其死矣因丨丨丨丨曰傳奕青山白雲文人也因酒醉死嗚呼哀哉李栖筠杜牧丨丨丨丨自撰墓銘桞子華預知其終丨丨丨丨裴度臨終自為銘志白樂天自作醉吟先生墓銘令刻姓名後漢趙岐曰吾死後立一圓石於墓側刻曰漢有逸人姓趙名嘉有志無時命也奈何本傳戒著日月盧水慶臨終戒其子曰碑志著官號日月無用虛文諛墓得金劉義持韓愈金數斤去曰此諛墓中人得耳不若與劉君為壽愈不能止本傳請志留琴崔元亮晦叔遺誡云吾玉磬琴留别樂天請為墓志持縑為贈唐韋貫之裴均子嘗丨萬丨請貫之撰先銘貫之曰吾寧餓死豈能為是哉齎金往請李華晚不甚著書惟天下士大夫家傳墓版及州縣碑頌時時丨丨帛丨丨乃强為應帖六銘無愧色蔡雍謂盧植曰吾為碑丨多矣皆銘有慙色唯郭有道丨丨丨丨耳傳有遺恨韓愈與吳郡張籍閲家中舊書得李翰所為張巡傳不載翰以文章自名為此傳頗詳密然不為許逺立傳又雷萬春事首尾逺與巡俱守死先後異耳兩家子弟材智下不能通知二父志以為巡死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之土食其所愛之肉以與賊抗而不降乎韓文夢為墓銘太和初沈亞之之邠出長安城客櫜泉邸舍春時晝夢秦穆公曰寡人有愛女容而仁欲與大夫備灑􅀈可乎後一年春公主如平居時忽無疾卒公追傷不已使亞之作墓志獨憶其銘曰白楊風哭兮石甃髯莎雜英滿地兮春色煙加朱愁粉瘦分不至綺羅深深埋玉兮其恨如何異夢録購求志文作文受謝自晉以來有之至唐始盛李雍傳雍尤長碑頌中朝衣冠及天下寺觀多齎特金帛往來其文前後所製凡數百首受納匱遺亦至巨萬時議以為自古鬻文獲財未有如雍者故杜詩云于謁滿其門碑版照四裔豐屋珊瑚鉤麒麟織成罽紫騮隨劒几義取無虛嵗又有送斛六判官詩云故人南郡去去索作碑身本賣文為活翻今室倒懸蓋笑之也韓愈撰淮西碑憲宗以石本賜韓𢎞𢎞寄絹五百匹作主用碟用男寄鞍馬非白玉巡劉義持愈金數斤去曰比諛墓中人得耳不若與劉君為夀愈不能止劉禹鍚祭愈又云公鼎候碑志隧來阡一字之價輦金如山皇甫湜為裴度作福先寺碑度贈以車馬繒綵甚厚湜大恕曰碑三千字字三縑何遇我薄耶度笑酬以絹九千匹穆宗詔蕭悗撰成德王十真碑俯辭曰王承宗事先可書義撰進之後例得貺遺若黽勉受之則非平生之志帝從具請文宗時長安中爭為碑志若市買然大官卒其門如市至有喧競爭致不由喪家裴均之子持方縑詣韋貫之來移貫之曰吾寧餓死豈忍為此哉白居易修香山寺記曰豫與示微之定交於生死之間徵之恃薨以墓志文見託既而元氏之老狀其藏獲輿馬絞帛泊銀鞍玉帶之物價六七十萬謝文為之當贄豫念平生分贄不當納往反再三訖不得已回施兹寺凡此利益功應㱕微之栁玭善書自御史大夫貶瀘州刺史東川節德度使顧彥暉請書德政碑玭曰若以潤筆為贈即不敢從命容齊隨筆志文本始齊太子穆妃將葬議立石志王儉曰石志不出禮經起顔廷之為王彌作墓志以其素􅀈無銘誄故也遂相祖習魏侍中繆襲埋文父母墓下將以千載之後陵谷遷變欲後人行封但記姓名歷官祖父姻婭而已若有德業則為銘文王戎墓銘有數百字然則魏晉以來有墓志也漢社子反子夏臨終伯文妲刋石埋墳前厥後墓志恐因此志文體製前輩云銘婦人墓當詳於家世議行取法於韓退之退之所作蓋出於碩人之詩觀至銘元積妻韋夫人墓可見矣魏志韓退之作墓志多篇篇各有體製未嘗相襲迃齊文訣韓文千變化無心變歐陽有心萬變杜祁公墓志一件才說未只了又一件韓董晉行狀尚稍長權德輿作宰相神道碑一板許歐蘇便長了宋語録不忍辭責富韓公之薨也訃聞神宗對輔臣甚悼惜之曰富某平生强項死矣志其墓亦必强項人也卿等試揣之已而自曰方今强項者莫如韓維必維為之矣時持國方知汝州而其弟玉汝丞相以同知樞密院預奏事具聞此語汗浹背於是亟遣介走報持國於汝州曰雖其家以是相囑謹勿許之不然且獲罪先是書未到冨果以墓志事囑持國既諾之矣乃復書曰吾平生受冨公厚思嘗恨未有以報今其家見託義無以辭且業已許之不可食言雖因此獲罪所甘心也卒為之初持國年幾四十猶未出仕㑹冨公鎮井州以帥幕辟之遂起其相知如此却掃編更相為傳熙寧元豐間士大夫於天下賢者必曰君實景仁其道德風流足以師表當世其議論可否足以榮辱天下二公蓋相得歡甚皆自以為莫及曰吾與子生同志死當同傳而天下之人亦無敢優劣之者二公既約丨丨丨丨而後死者則志其墓故君實為景仁傳其略曰吕獻可之先見景仁勇决皆豫所不及之也墓志不顧時忌神宗即位擢呂誨至諫院一日早朝獻可待對於崇政殿司馬溫公為翰林學士侍讀延英閣亦趨贊善堂待詔相遇朝路並行而北溫公密耳曰今贊請對所言獻可舉手曰䄂中彈文乃新參也溫公曰王介甫素有學行君何劾之獻可正色曰安石好執偏見輕信姦回置之宰輔天下必受至禍及安石變祖宗舊法天下騷然溫公退居於洛常慨然曰吕獻可之先見吾不及也獻可病溫公康節曰就卧內問疾獻可所言皆國家之事未嘗一語及其私一日手書託溫公以董志溫公亟省之已瞑目矣溫公呼之曰更有以見囑乎獻可復張目曰天下事尚可為君實勉之故溫公董河南志獻可為中丞時有侍臣棄官家居者朝野稱其才天子引大政獻可抗章條其過失曰誤天下蒼生者必此人也志未成河南監牧使劉航仲通自請書石既見至文仲通復遲回不敢書時安石在相位也仲通之子安世曰成吾父之美可乎代書之仲通又隂祝獻可諸子勿摹本恐非三家之福時用小人蔡天申為京而察訪置司西都天申厚賂鐫工得書以獻安石天申初欲中溫公安石得之掛壁間謂其門下士曰君實之文西漢之文也開見録不懷舊怨歐陽公初以希文事得罪於吕相坐黨人逺貶三峽淪落纍年比吕公罷相公始被進擢及後為范公作神道碑言西事時吕公丨丨丨文盛稱公之賢屏釋私憾而共戮力於國家希文子純仁大以為不然刻古則輒削去此一節云我父至死未嘗解仇公嘆曰我亦得罪於吕丞相者惟其言公取信於後世也吾嘗聞范公自言平生無怨惡於人兼與吕公解仇書見在范集中豈有父自言無怨惡於人而其子不使解仇於地下父子之性相逺如此遺事范文正為開封府作百官圖以獻因指其遷進遲速次序曰某為超遷其為左遷如是而為公如是而為私意頗在丞相吕夷簡夷節不樂由是落聀出知饒州未幾吕亦罷後吕公再入元昊方犯邉乃以范為經略西事公亦樂為之用嘗奏記吕公云相公有汾陽之心之德某無臨淮之才之力後歐陽公為范公神道碑有歡然志相得戮力平賊之語公之子堯夫不以為然乃刋去之歐公見之甚不樂也范公平日胸襟豁達毅然以天下國家為己任既為吕公而出豈復更有匿怨之意况公嘗自謂平生無怨惡於人此言尤可驗忠宣固是賢者然其規模廣狹與乃翁不能無間朱語録文不妄稱歐陽公作尹師魯銘文不深辨其獲罪之寃但稱其為文章簡而有法或以為不盡公怒至詒書他人深數責之曰簡而有法惟春秋可當之修相師魯之文不薄矣又過其譽曰通知古今此語若求其可當者惟孔孟也而世之無識者乃云此文所以慰吾亡友爾豈恤小子輩哉聞見録文不可改王荆公為前輔銘母夫人蔣氏墓不稱公輔甲科但云子右于朝豐顯矣里巷之士以為太君榮後云孫人皆幼不書其名公輔意不滿以書言之公復書曰比蒙以銘文見屬輒為之而不辭不圖乃猶未副所欲以有所增損鄙文自有意義不可改也宜以見還而求能如足下意者為之如得甲科人為通判何足為太夫人之榮哉故銘以謂閭巷之士以為太夫人榮明天下有同者不以置榮辱也至於諸孫亦不足列孰有五子而無一孫者乎同上却饋不受范文正公為人作銘文未嘗受遺後作范忠獻銘其子欲以金帛謝拒之乃獻以所藏書蓋公悉不收獨留道德經而還書戒之曰此先君所藏世之所寶仲淹竊為宗家措之毋為人得之得金以賵梅聖俞堯臣與劉公敞親且舊既卒其家不能自存公哀之未有以助也聖俞嘗許書程丞相神道碑病不果劉公為成之程氏喜餉白金五百兩公發封盡以賻梅氏行狀不苟為文東坡祭張文定文云軾於天下未嘗銘墓獨銘五人皆盛德故以文集者今凡一篇若冨韓公司馬溫公趙清獻公范蜀公併張公坡所自作此外趙康靖滕元發二志乃代張公者故不列於五人之數眉州小集有元祐中奏藁云臣近凖勑差撰故同知樞密院事趙贍神道碑并書者臣平生為撰行埋銘墓碑士大夫所共知因近日撰司馬光行狀蓋為光曽與臣云毋撰碑銘又為范鎮撰墓志蓋為范與先臣某平生交契至深不可不撰及奉詔撰司馬光冨弼等墓碑不可固辭然終非本志况臣老病廢學文詞鄙陋不稱人子所欲顯揚其親之意伏望聖慈别擇能者特許辭免觀此一奏可印心迹公杭本奏議十五卷中不載容齊隨筆因發巳意坡公作溫公神道碑叙事甚略其作冨公碑甚詳溫公是他己為行狀若冨公則異是冨公在朝不甚喜坡公其子弟求為此文恐未必得而坡鋭然許之自今觀之蓋坡公欲得此題目以發明己意耳其首論冨公使虜豈苟然哉蓋坡公因熙寧元豐間用得兵卒狼狽故假此說以發明其議論耳朱語録行狀指事說實凡人之事迹非大善大惡則衆人無由知也故舊例皆訪問於人取行狀以為依據今之作行狀者非其門生而即其故吏莫不虛加仁義禮智妄言忠肅惠和或言盛德大業遠而愈光或云正道直言殁而不朽曽不能直叙其事故善惡混然不可相至如許敬宗李義府李林甫國之姦臣也其使門生故吏行狀既不指其事實虛稱道忠信以加之則可以侈於𤣥齡魏徵裴炎徐有功矣此不惟其虛心不實苟欲虛美於所受恩之地而已由是事失其本文害於理而行狀不足以取信若使指事書實不飾虗言則又有人知其真僞不然者縱使門生故吏為之亦不可以謬使德善之事而加之矣今請作行狀者不要虛說仁義禮智忠肅惠和盛德大業正言直道蕪穢簡冊不可取信但丨丨丨丨直載其詞則善惡功跡皆據事足以自見矣假令傳魏徵但記其諫諍之辭自足以為正直矣如傳假秀實但記其倒用司農寺印以追逆兵又以象笏擊朱泚自足以為忠烈矣今之為行狀者都不指其事率以虛詞稱之故無魏徵之諫諍而加之以正直無秀實之義勇而加之以忠烈者皆是也其何足以為據李翶百官行狀奉以弟狀兄程伊川先生文集序云先生既沒昔之門人高弟多已先亡無有能形容其德者然先生嘗謂張繹曰我昔狀明道先生之行我之道蓋與明道同異時欲知我者求之於此文可也于端中作序碑碣立碑穿隧丨丨丨丨以彰盛美楊集作石表碣乃丨丨以丨丨桞文碑有圓孔古丨皆丨丨丨蓋碑者悲也本虛墓間者每墓有四初葬穿繩相孔以下棺乃古懸空之禮禮曰公室裾豐碑三家視桓楹因紀其德遂有碑表後世德政碑亦說圎孔不知根本甚矣尚書收實形如大楹公室視豐碑三家視桓楹注斫大木為之形如石碑於槨前後四角柱穿之中為轆轤下棺以䌇天子四碑諸侯士二士無桓楹者言僣諸侯也斫之形如大楹耳四植謂之桓楹檀弓龜趺之制唐葬令五品以上螭首丨丨降五品為碣方趺圓首其髙四尺桞文鹿牲之碑以志官業書于丨丨丨丨白居易作李公家廟碑讀曹娥碑後漢楊修字德祖太尉震之元孫好學有俊才為丞相曹操主薄語林曰修至江南丨丨丨丨碑背上有八字曰黃絹幼婦外孫韲臼操不解問修曰卿知否修曰知之操曰且勿言待朕思之行三十里乃得之令修解修曰黃絹色絲絶字幼婦少女妙字外孫女子好字韲臼受辛辭字操曰一如朕意俗云有智無智較三十里記蔡雍碑禰衡與貫祖子射共讀蔡雍所作碑曰吾雖一覽猶能識之惟其中石蝧二字更不明耳因書之射寫碑校不差莫不歎服王粲讀道邉碑與人同行使百誦之不失一字元凱二碑杜丨丨好為身後名嘗言高岸為谷深谷為陵刻丨丨紀平吳功一況峴山江下一建立峴山上魯山四絶元丨丨墓有碑唐建中立李華文顔真卿書李陽水篆額時人謂之丨丨望碑墜淚晉羊祐守襄陽後百姓於其平生逰憩處建碑立廟丨其丨者莫不流涕因名為丨丨碑晉書見碑下拜扶風王駿西士為樹碑長老丨丨無不丨丨其遺愛如此刻碑紀功郭知運卒帝詔中書令張說紀其功於墓碑立碑表行晉庾衮叔褒清白異行不降志及卒宗族鄉閭莫不崇重門人感慕為丨丨丨天子立碑魏證薨晉王奉詔致祭帝作文子碑遂出之後人言證嘗録前後諫諍語證若在吾無此行命復立碑唐史天子題墓韓思復卒丨丨親丨其丨曰有唐忠孝韓長山墓張說嘗自為其父碑𤣥宗書其額曰嗚呼積善之墓帝為製碑張說卒丨丨丨丨官為立碑廬懷謹帝經其墓碑表未立停蹕臨視泫然流涕詔丨丨丨丨令中書侍郎蘇頲為文帝自書金生於碑郭璞謂庾翼曰碑生金庾氏大忌後碑果生金晉永嘉五年賈達碑生金所謂金不從革羣盜起也鵲巢其碑黃晉卿自為父碑文有丨丨丨丨徒作鎮石隋秦王俊薨王府僚位請立碑文帝曰欲求名一卷史書足矣何用碑為若子孫不能保家丨與人丨丨丨耳妄認古冡後周熊安生學為儒宗在山東時或誑之曰生村古冡是晉河南將熊光去熊安生七十二世舊有碑為村人埋匿安生掘地求之不得連年訟焉冀州刺史鄭歡判曰七十二世乃是羲皇上人河南將軍晉無此號安生猶率族人向墓而哭諡事類已死而諡幼名冠字死諡周道也禮將葬請諡衛公叔文子卒具子戍請諡於君曰日月有時將葬矣請以易其名曰昔衛國凶饑夫子為粥與國之餓者不亦惠乎昔者衛國有難夫子以死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四鄰交衛國社稷不辱不亦文乎故謂之貞惠文子以善為號先王諡以尊名節以一惠耻名之浮於行也注惠善也節以一善言取其一大善以為諡號也並同上因行受名諡法云大行受大名小行受小名行生於已名生於人六帖無爵不諡古者生丨丨死旡諡暴貴不諡君子己貴不便名己孤丨丨丨為父作丨同上諡在美惡永秦中嚴郢以吕倕故吏請為諡有司持之獨孤及詢曰肅郢以故事宰相諡皆兩不說詢曰忠肅及執奏謂丨丨義丨丨不在多名諡為褒貶唐制凡王公以上丨皆迹其功德而丨之丨丨無爵稱子卷德丘圍聲實名著則諡曰先生割六典昭夷先生趙元卒其友魏元忠宋之問崔壉等共諡為丨丨丨丨孝友先生朱仁軌卒郭山惲員半千魏知古共諡為丨丨丨丨文行先生元德秀卒李華諡曰丨丨丨丨文元先生蕭穎士死門人共諡曰丨丨丨丨貞文孝父崔元翰卒門人共諡曰丨丨丨丨青陽孝子何澄粹池州人親殁以毁卒當時號丨丨丨丨士為誄者正衆無愧美諡裴子餘卒諡曰孝時程行諡曰貞中書令張說歎曰二諡可丨丨矣不當醜諡宋慶禮卒太常博張星以好巧自是諡曰専禮部員外郎張九齡申駮曰慶禮以武功在邉垂三十年邉亭晏然至功可推丨丨丨丨改諡敬古今合璧事類備要前集卷六十八
