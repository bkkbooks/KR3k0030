罪也翌日折簡追還留連彌月毛澤民因此得名本事曲不識一面晁詠之字之道補之從弟也為揚州司法㕘軍未上蘇軾知揚州補之以詠之詩文獻軾軾曰有才如此獨丨丨丨丨耶乆之詠之具叅軍禮入謁軾下堂挽而上之顧謂坐客曰此竒才也事畧見而竒之曽鞏游太學歐陽丨丨丨丨自是名聞天下調太平司法㕘軍召入修史館書籍上同參法律曹丨丨丨丨胡文恭行朱逵制往司三尺丨丨丨丨之律初有半通之論同上行陳元良制羅疇老蘭堂記元祐四年予出而仕司法於滁五年季春作堂於廨宇之東南堂之前植蘭數十本㣲風飄至庭檻馥然予方休乎堂上欣然笑曰猗與蘭哉是可以名吾堂蘭之為物幽而芳者也云云予之病於世乆矣而聞道晩世念一至往往顧影自笑噫由斯以往朝於是焉襲蘭之馨莫於是焉擷蘭之英攜書就觀引酒對酌庶幾乆與之俱化韓愈為法曹上書李侍郎愈少性喜文字究窮經𫝊史記百家之説沉潜乎義訓反覆乎句讀磨乎事業而𤼵揮乎文章惟是鄙鈍不通曉世事學成而道益窮年老而志益困詩集逸興椽曹乗丨丨鞍馬去相尋注漢制以曹官為椽如屋之椽言有所負荷杜陳九法曹石門宴集坐曹休沐猶丨丨伏日不歸廨平生熟太𤣥餘事工小楷自稱霹靂手作縣真癬疥鮑宣雖強項臨事中實駭二十罸自視此理須少戒唐子西送趙司法詩不枯槁海陵㕘軍丨丨丨醉意梅花愁絶倒秦少游和黄法曹梅陵梅花詩事畢諏此府雄且大騰凌盡戈矛棲棲法曹椽何處丨丨丨韓赴江陵寄三翰林詩老胥忌吾友黄升卿乃是天下士一官法曹椽整整丨丨丨張于湖贈黄法曹詩衆所易法曹貧賤丨丨丨腰腹空大何能為韓退之囘鄭羣贈簟移病滿百日逃秦盧博士讀書不讀律江陵法曹椽丨丨丨丨丨張于湖贈盧司法詩詩句多夏景遥知謝法曹丨丨丨丨丨黄山谷詩忘情任卷舒君子從遊宦丨丨丨丨丨楊炯酬號州李司法詩青衫向白頭北岳仙人汗漫游斯文曽到海邊州誰怜詩禮甘公子牢落丨丨丨丨丨于湖贈甘法曹詩歸來印幾窠袁州司法多兼局日暮丨丨丨丨丨山谷詩幕下風流法曹椽楊誠齋詩東閣觀梅動詩興丨丨丨丨丨丨丨還如何遜在揚州師去何遜梁時人何遜作揚州法曹廨舍有梅花盛開遜吟詠其下後居洛思梅花再讀其任從之扺州梅花方盛遜對花彷徨終日見東坡次韻王定國倅揚州詩司户歴代沿革漢魏以下有户曹椽主民户北齊以下與功曹同隋有户曹㕘軍文帝時為司户㕘軍煬帝為司户書佐唐開元復為户曹㕘軍掌户口籍帳婚姻田宅雜徭道路之事在府為曹在州為司梁開平省六曹椽屬留户曹一員通判六曹國朝沿唐制諸州置司户㕘軍掌户籍賦税倉庫交納通典分紀聖朝職畧四朝志元祐令中州從八品下州從九品乾道六年汪大猷乞令司户專主倉庫見中興㑹要事類祠曹丨丨賦籍之要司白集行李玘京兆府户曹制户曹韋昭釋名曹羣也丨丨民所聚也清吏張元素仕隋為景城縣户曹竇建德陷景城執將殺之邑人千餘號令請代曰此丨丨殺之則無天也要官李素髙祖令授七品清丨丨所司授雍州司户上曰此官要而不清三絶唐徐彦伯改蒲州司兵時司戸韋嵩善判司士李亘工於翰禮而彦伯以文詞推美時人謂之河東丨丨三語以丨丨自試白集行李玘制仁愛裴守真父謹隋大業中為淮安司户㕘軍郡人楊琳田瓉等亂刧吏多死惟謹以丨丨故賊約其屬無敢害䕶送還鄉罵賊邕州司户宗旦常白知郡陳珙言農志髙必叛珙不聴及城陷宗旦嫚丨丨被殺念珠曹京兆户曹月俸一百八索人號為丨丨丨南部新書七品官唐伐職任煩重目為丨丨要丨袁州司户㕔壁記霹靂手唐裴琰之為州同司户年少刺史李崇義輕之州中積年舊案數百道崇義促剡之判琰之命書吏數人連紙筆須臾剖斷並畢崇義大驚曰公何忍藏鋒以成鄙夫之過由是大知名謂之丨丨丨南山判李元絃遷雍州司户時太平公主與僧爭碾磑公主方承恩用事百官皆希其㫖意元絃遂判還僧寺長史竇懐真大懼勢促令元絃改判元絃大著判後曰丨丨可移此判終無揺動歡喜詩杜審言為吉州司户武后召見將加擢用問曰卿歡喜否審言蹈舞謝恩因作丨丨丨甚見稱賞分紀措大官蜀王宗銖責授雍州司户㕘軍問吏曰㕘軍何官衣何服吏曰下州判司緑衫槐笏而已宗銖大笑絶倒曰若頭便斬去吾何能作丨丨丨耶九國志官至司空後漢陸績李郃皆仕郡為户曹史邵丨丨丨丨詔為御史韓思彦為州司户上召問不見卿乆今何官思彦始道所以然上謂宰相曰此亦大屈丨丨丨丨不行鞭罸韓思復改汴州司户仁恕丨丨丨丨不事儀矩李之才字挺之任孟州司户挺之坦率丨丨丨丨時范忠獻頗不悦挺之自若也後忠獻建節移鎮郡寮送至境外挺之但别于近郊未幾忠獻謫守安陸過洛故吏無一往者獨挺之㳂檄往省之忠獻始稱嘆遂受知焉言行録商確古今洪文惠公守徽州時范石湖為户㕘洪公博洽精明公由此究心吏事洪公喜日與公丨丨丨丨常曰吾視君齒必至兩地君其自愛共稱文章曽鞏初為太平州司户守張伯玉前輩人也歐陽公王荆公丨丨子固丨丨伯玉殊不顧問語子固吾方為六經閣其為之記子固凡謄藁六七終不當伯玉之意謂子固曰吾自為之則曰六經閣者諸子百家之書皆在焉不盡尊經也子固始大畏服益自勵於學矣同上試為校理晁補之字無咎王安國一見而竒之為澶州司户㕘軍召丨丨祕閣丨丨東都事畧除大學正蔡肇字天啟長於歌詩為明州户椽丨丨丨丨事畧詩集詩人吉州司户官雖小曽屈丨丨杜審言今日宣城讀書客還移手板傍轅門山谷古氣夏氣凉生土囊口周鼎湯盤見科斗清風丨丨滿眼前乃是户曹報章還只今書生無此語已在貞和元和間同上