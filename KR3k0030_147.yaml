body:
  text: 古今合璧事類備要後集卷七十八宋謝維新撰州官門總諸曹凡曹官㕘軍皆可通用餘各見後逐官下歴代沿革各見後逐官下事類府掾官惟丨丨署列州司白帖郡掾丨丨府察同上曹事陳遵為公府掾吏日出醉歸丨丨數廢西曹以故事論之府曹詣寺舍白蓮曰陳卿今日以某事論遵曰滿百乃相聞故事滿百則斥後滿百西曹請斥司徒官優容之冗員丨丨散軄白帖公府掾漢有丨丨丨殺公掾晋周振頻為三公府辟辟書下公輒亡時人號為丨丨丨莫有辟者魏舒楊源為司徒遂辟之竟無他事為師友漢嚴詡為穎州守政清簡常謂掾吏丨丨丨善丹青晉顧愷之丨丨丨與殷仲堪為㕘軍徒勞人漢梁竦曰州縣之職丨丨丨耳作蠻語郝隆為南蠻㕘軍三月三日作詩曰娵隅濯清池桓公問何物答曰名魚為娵隅桓公曰何為丨丨丨隆曰千里投公始得一蠻府㕘軍何為不作蠻語也世説假日曹漢薛宣為翊城曹掾張扶至丨丨獨不肯休坐丨治事宣出教曰曹雖有公事家亦望私恩扶慙之三語掾陳留阮千里有令望太尉王君見而問之曰老莊與聖教同異答曰將無同太尉善其言辟為掾人號丨丨丨孫楚長揖丨丨字子荆為揚州㕘軍至州丨丨刺史石苞曰天子命我㕘卿軍事郄超多髯晉桓温辟王恂為主簿丨丨為㕘軍超丨鬚丨恂短小時人語曰髯㕘軍短主簿能令公喜能令公怒稚圭管簫唐張文灌補并州㕘軍時李勣為長史嘗歎曰丨丨令之丨丨吾所不及杜暹清吏丨丨補婺州㕘軍秩滿歸吏以紙萬畨贐之暹為受百番衆歎曰昔丨丨受一大錢何異哉軍事偉辯盧承慶為秦州叅軍入奏丨丨太宗丨其丨部人稱頌尹思真調隆州㕘軍事屬邑豪蒲氏驁肆不法州檄思真接之摘其姦贓萬計卒論死丨丨丨慶刻石致丨署列六聨丨丨丨丨白帖名列府寮丨丨丨丨職叅軍事同上作櫻桃賦蕭穎士調廣陵㕘軍事穎士褊急中不能堪丨伐丨丨丨擢無庸之𤨏質䝉本枝以自庇雖先寢而或薦非和羮之正味以譏杜甫君子恨其褊賦歡喜詩杜審言餘見司户門詩集府中趨冉冉丨丨丨古詩知録即漢功曹之官也今取功曹事並附通用歴代沿革後漢有郡主簿官在漢魏間及江左為督郵主簿皆太守自辟除晉置本為公府官非州郡職也掌總録衆曹文簿舉彈善惡後代刺史有軍而開府者並置之後魏洎隋皆有録事㕘軍及罷郡以州統縣皆吏部選除煬帝置郡有東西曹掾及主簿唐武徳復為録事㕘軍開元改司録㕘軍掌正違失蒞符邙後唐應順間州置録事㕘軍三考者主劇縣以上定格滯壅故也國朝沿唐制州有録事㕘軍然不盡置也諸府為司𨽻諸州為録事乾興元年丁度申請諸州始各置録事㕘軍慶歴二年河西河東陜西諸州權令京官知録事㕘軍熙寧三年詔繁難去處録事㕘軍並差職官知縣及奏舉縣令人充㑹要政和三年尚書省言州建六曹㕘軍㕘軍之稱起於行軍之際恐不當襲録事㕘軍欲改為司𨽻奉聖㫖㕘軍改為掾職畧建炎初復舊名録不兼他中興㑹要職從之孝宗㑹要事類紏職周禮紏司白六帖紏繩丨丨大郡管轄外臺勾稽並同上廊廟才孫邵北海人為孔融功曹融曰丨丨丨也後為呉丞相呉録御史材喬録歴果綿遂懐四州刺史嘗謂録事㕘軍任紹業曰子紀綱一州能劾刺史乎紹業出條所失示之驚曰能知吾失丨丨丨也喬録千里駒韋康成字元將年十五身長八尺為郡主簿郡尹楊彪竒之曰韋主簿昻昻丨丨丨乎三輔實録一府望士東亭為桓武主簿既承籍有美譽丨丨之丨世説糾愆謬閻用之初為彭州㕘軍嘗攝録事一日丨丨丨不法數十事太守以為材舉綱目顔杲卿為魏州録事㕘軍振丨丨丨政稱第一舊史郡督郵州主簿丨丨丨並今録事㕘軍白帖州主簿事見沿革舉公過韓紳卿為揚州録事㕘軍事故相崔圓乆狎愛州民丁某至顧省其家後大衙㑹曰司録君趍以前曰請丨丨丨公興小民狎至其家害於政圓驚謝曰録事言是圓實過乃自罰韓文韓紳卿墓誌與府政公為京兆府司録㕘軍丨一丨丨韓愈誌董府君墓典簿書白帖掌符印丨丨丨提舉列曹紏察羣吏同上郡之極位漢官儀督郵丨丨丨丨樞相由斯為丨為丨何莫丨丨權集王渙簡核益郡太守陳寵以功曹丨丨丨丨舉為主簿𤣥明政理劉聰字𤣥明年十四究通經史時有太守郭頥辟為郡主簿吏歌曰我有賢后能任丨丨丨丨人殷前趙録宗資畫喏後漢宗資為南陽太守委任功曹范滂人歌曰汝南太守范孟摶南陽大丨主丨丨成瑨坐嘯成瑨為南陽太守任功曹岑眰人語曰南陽太守岑公孝𢎞農丨丨但丨丨同上來特設榻徐穉時陳蕃為太守以禮請為功曹蕃在郡不接賔客惟穉丨時丨丨丨去則懸之置標府椽丨丨丨丨任重功曹白六帖皓薦陳寔漢鍾丨穎川人為郡功曹命辟司徒府臨去辟太守丨丨丨為功曹璨舉謝譚呉丨為會稽守丨丨丨為功曹呉志接以友禮虞翻字仲翔㑹稽人太守王朗命為功曹丨丨交丨之丨魏志驁倨忤物崔信明揚州録事㕘軍鄭世翼丨丨數輕恌丨丨唐史湘中琳琅羅含字君章太守謝仁祖一見稱為丨丨之丨丨自江下從事轉主簿列郡管轄丨肱肱之丨居丨丨之司白帖紀綱一郡太和七年中書門下奏録事㕘軍紏察屬縣課責下寮丨丨丨丨籍其提舉焉續通典紀綱大府常集總録衆曹録事㕘軍之職掌丨丨丨丨管其文案自上佐以意違失者彈正以法掌凡諸司察之事平寳司徒儀舉善彈非劉洪教云録事㕘軍務丨丨丨丨令史亦各隨事修習也北堂書殿最升降齊映劉滋執政戴叔倫勸以天下尤切者縣令録事㕘軍此二者宜出中書門下無計資序限逺近髙下一一以丨丨丨丨則人人知勸映等重其言書録事考李詳為鹽亭尉令考為録事所擠詳諳丨丨丨丨刺史許之即書曰怯斷大案好勾小稽自隠不清言他總濁堦前競鬬鬬用方休獄裏囚徒非赦不出天下笑之御史臺記六聨之首茍非三語之才則忝丨丨丨丨白帖府聨之職宜列丨丨丨丨俾展官常之效常集提舉列曹丨丨丨丨紏察羣吏職源名列府寮丨丨丨丨職㕘軍事白帖通才條理大府要㑹六聨紀綱當務之委積擇丨丨丨丨而利可析滯明可照姦常集除京兆府司録制都録能名往參丨丨雅有丨丨錄參制意與天通杜景佺性嚴正為益州録參逆析房司馬之不視事吏歌之曰録事丨丨丨丨州司馬折威風由是寢知名事以幹治君為京兆司録諸曹白事不敢平面視揖起趨去無敢間語縣令丞尉如嚴京兆丨丨丨丨韓愈銘張署墓職事績成稱其丨則丨舉丨丨非其材則官邪政廢白帖六曹表則一郡紀綱丨丨丨丨同上羣轄載孚君轉隴州録事參軍時劉仁軌以宰相之貴持節此州坐帷中主諾責下君提綱未幾丨丨丨丨劉君坐嘯以為能也陳子昻集王府君墓誌異禮尊任縣令判司與録事丨丨丨其丨也通典寳元制置之賔席裴澥為陜府冬李勉除觀察召澥曰素聞公名朝中親友話公美事丨丨丨丨馴置州綱丨丨丨丨胡文恭行張日嚴制充近上曹政和尚書省言録參丨丨丨丨官續會要督郵綱椽丨丨丨丨之峻胡文恭行間仲宣制少負英才𫝊忠肅公察李權丨丨丨丨時為青州司録公掾職事往來淄青相與琢磨士論稱美言行録寮有詩人張乖崖在蜀有録事㕘軍老病廢事公責之曰胡不歸明日㕘軍求去且以詩留别曰秋光都似宦情薄山色不如歸興濃公驚謝之曰我遇矣同丨丨丨丨而吾不知因留而薦之東坡集問以邊策胡則字正調憲州録事㕘軍時靈夏用兵轉運使索湘遣則入奏太宗因丨丨丨丨對稱㫖帝顧左右曰州縣豈乏人遂令記姓名中書仁宗實録陳當世務杜祁公知永興軍辟孫甫之翰林録猥事一以委之公嘆曰待我以此可以去矣祁公為謝之乃從容丨丨丨之丨祁曰喜得友矣言行録脱伸無告黄裳字文叔為興元府録㕘能以情求獄丨寃死丨丨丨甚衆終任不訊一囚樓攻媿集理獄有能陳堯佐字希元諡文惠知開封府録事㕘軍用丨丨丨丨績遷府推官事畧賜錢五萬邵曄字日華為連州録事㕘軍州將楊全誣部為刼盜意欲寘之死曄察其枉不肯書牘白全劾實再按驗得實民由是獲免曄代還引對太宗曰爾能活吾平民深可嘉也丨丨丨丨召為校勘李垂字舜工自湖州録事㕘軍丨丨崇文丨丨並同上以重名調補王勃年未及冠丨丨丨丨丨號任州㕘軍才大官小佛衣而遊天下職源有㣲恩舉沼道州録事㕘軍王沼與楊炎丨丨丨及炎入相丨丨拜為監察御史始講公議南部新書訴者屬葉椽葉顒諡正簡調建州録事㕘軍建俗狠而喜訟或積年官不能决部使者賀允中多以屬公原情諏律必得平亭旁部民闈之有丨于漕臺丨輒請以丨丨丨用薦者改宣教郎誠齊集與宰相爭事陳希亮字公弼為開封府司録青州男子趙字上書言元昊反宰相以為狂言徒建州而元昊果反字至京師自訟宰相怒下字開封獄希亮奏乞以字所上封字付所司其驗不當加責丨丨丨丨丨不已字由此得釋東都事畧秉一州之綱郡督郵丨丨丨丨丨胡文恭行陸降等制紀綱於州曹任丨丨丨丨丨同上行尹立制天下推蕭功曹蕭穎士授揚州功曹丨丨丨知人稱丨丨丨詩集糾郡丨丨南海湄韋應物詩專法為吏丨文丨陳后山别叔公録曹詩俊逸蕭蕭細雨鎻柴門喜見風流二使君丨丨萬春猶録事清新子建尚㕘軍胡致隆喜曹劉二從事見過詩才業程侯晩相遇與語丨丨立薰然耳目開頗覺聰明入意鍾老相青義動修蛇蟄杜甫送知録循良吏李侯江南英身老自藏器讀書盡百紙落筆必千字况兼熊豹姿特負縱横志凄其望髙躅異世猶一致大名國北門自昔雄元帥名賢慎柬拔薦引必同類操持紀綱地實藉丨丨丨要成百鍊剛小大須歴試葉集之送李道父辟大名司録詩寄廉平能吏于今少春風及此行英雄餘戰伐犴獄丨丨丨陳后山送澶州録曹宋叅軍朱絲直韋生富春秋洞徹有清識操持紀綱地喜見丨丨丨行往樹佳政慰我深相憶杜甫送韋諷閬州録參助清威八詠遺風資逸興二溪寒色丨丨丨曙星没盡持綱去瞑角吹殘鎻邙歸方干送知録郡内政無雙夫子方寸裏清秋澄霽江闗西望第一丨丨丨丨丨岑參送楊禄事充使英椽柳家郎丨丨丨丨丨離亭酒甕香岑參送柳録事赴梁州捶楚塵埃間州家申明使家抑坎軻祇得移荆蠻判司卑官不堪説未免丨丨丨丨丨退之贈張功曹詩期聴勞者歌之官逢計吏風土問如何損益闗事從丨丨丨丨丨耿緯送海州盧録事司理歴代沿革五代以來諸州皆有馬步獄以牙校充馬步都虞侯掌刑法謂之馬步院太祖慮其任私髙下其手開寳六年始置諸州司寇㕘軍以新進士及選人為之後改為司理掌獄訟勘鞫之事不兼他職元祐定令上州從八品中下州從九品事類折獄丨丨之司宋廣平集賜福州司理勑掠囚自端拱淳化以來諸州司理㕘軍皆上躬自選擇仍詔丨丨皆依律令聖朝職畧氣節錢忠定公即授安州司理㕘軍吏有誣服自盜抵死邑具獄上於郡公明其寃狀守將謂曰劾縣獄當得賞答曰治獄得情乃其職擠人以論功非吾志也聞者歎服章敏滕公甫力薦之稱其有丨丨楊龜山集明敏孫沔字元規補趙州司理㕘軍為人丨丨果敢有材稍遷監察御史衷行東都事畧選明敏國朝别置以專鞫獄事劇者置二人太平興國九年詔曰司理㕘軍專於推獄研覈情實由在得人宜令本州於見任簿尉判司内丨丨丨有官業者充秩滿當與升資罷軟不任其職可以選官代選強明天聖七年以司理㕘軍並丨丨丨兩任以上判司簿尉充並分紀治獄稱職柳開字仲塗為宋州司冦丨丨丨丨遷録事㕘軍事畧上書論事張唐英為歸州理椽數丨丨