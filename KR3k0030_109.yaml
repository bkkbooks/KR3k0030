body:
  text: 古今合璧事類備要後集卷四十宋謝維新撰三學門國子監丞歷代㳂革隋置三人唐一人掌判監事凡六學生每嵗有業成土于監者以其業與司業祭酒試之登第者曰祭酒上于尚書禮部六典于國朝景祐二年孫祖德請于直講京官內差一員充監丞詔學官兼領掌錢榖出納之事兩朝志元豐定制置祭酒司業掌三學之教法政令而監之事則丞與焉續㑹要建炎三年省紹興十二年復置中興㑹要事類彯纓徙國子監丞東朝束帶銀榜增華西序丨丨環林益潤唐張燕公集奉職當文治之朝丨成均之丨唐制白六帖掌出納見㳂革注參事務設屬成均丨釐政令庶丨之丨惟丞是司初寮除胡端平制丞於太學丨丨丨丨胡文恭行李克明制丞以膠庠丨丨丨丨劉煒明制進丞學省丨丨丨丨胡文恭行張太一制上庠丞秩丨丨丨丨同上行謝元振制丞庠學之榮用丨丨丨丨丨同上行鄭有斐制秩學省之丞丨以丨丨丨丨公是行錢茂先制上書八千言趙忠簡公鼎先是國子監丞張戒丨丨幾丨丨丨自謂恐聖意上謂宰執曰朕熟覽之其憂國愛君之心誠可嘉朕大開言路以防壅蔽自欲賞之趙鼎不答沈與求曰陛下如此何患不聞盡言言行録唐王履貞丞㕔連理樹賦靈臺崇崇兮洞膠轕以綿延中有珍才兮鬱森森以芉芉且學為教原丞為糾局生於學者表王化之大同植於㕔者知宦政之無曲亦所以據於德而逺於俗也樂我皇道彰我聖年依君仁義之圃對君翰墨之筵俾為我師者如斯木之一德為程曹者如斯木之相全故端不虛然後化而已化不在逺行之在逺有善必應故得託根講𨽻之宇垂隂夫子之牆雜庭槐以為列偶仙杏而成行逢聖而生匪由乎日月以兾取瑞為寶孰尚夫金石其相國子博士歷代㳂革六國時有博士掌通古今又曰博士秦官漢因之漢多至數十人武帝初置五經博士宣帝成帝時五經家法稍增置博士一人博士選有三科髙第為尚書次為刺史其不通政事以久次補諸侯太傅元始四年改博士為博士師至後漢兼而存之博士凡十四人易施孟梁丘京氏尚書歐陽大小夏侯詩齊魯韓毛禮大小戴春秋嚴顔各一博士華嶠漢書曰初欲立左氏傳博士范升以為左氏淺末不宜立陳氏乃詣闕上疏爭之更如辨對帝卒立左氏學命掌以五經教子弟國有疑事掌丞問對安帝以博士多非其人詔命三公將軍中二千石舉博士各一人務得經明行髙卓爾茂異晉咸寧四年初置國子博士一人皆取復行清淳通明典義若散騎常侍中書侍郎太子中庶子以上乃得召試梁置五經博士各一人魏晉宋齊並不置五經博士至此始置隋省國子博士至大業復置唐增置二人國子博士五人正五品上掌教文武官三品以上及國公子孫曽孫為生者五分其經以為業周禮儀禮禮記毛詩春秋左氏傳各六十人服暇則習𨽻書國語說文字林二倉爾雅每嵗通兩經來仕者上於監秀才進士亦如之學生以長幼為序習正業之外教吉凶之禮公私有事則相議龍朔改為司成宣業咸亨初復諸州府亦有經學博士一人通典廣文館博士四人掌領國子學生業進士者天寶九載置廣文館百官志至國朝國子監無博士有直講八人熙寧改為太學博士元豐定制亦無國子博士大觀元年薛昂乞置國子博士四貟國子正録各二員與太學官分掌教導從之建炎併國子監於禮部紹興三年詔駐蹕所在因國子監量養生徒置博士二員中興㑹要餘學猶未置也事類制禮叔孫通為博士初丨漢丨通書賈誼頗丨諸家之丨召為博士漢史講誦董仲仲舒為景帝時博士下帷丨丨三年不窺園非禮不行盡對漢賈誼年二十餘文帝召為博士年最少有詔議諸老生未能言誼丨為丨人人各如其意所出諸生於是以為能文帝恱之超遷一嵗至太中大夫歷官見後經學尤明下注八世漢歐陽歙自歐陽生𫝊伏生尚書至歙丨丨皆為博士宗師後漢朱浮以國學既興宜廣博士之選上書曰博士之官為天下丨丨使孔聖之言𫝊而不絶世表晉元帝時荀嵩上疏曰昔咸寧太康永嘉之中侍中常侍黃門通洽古今行為丨丨領國子博士醖藉東漢桓榮拜博士車駕幸太學㑹博士論難於前榮溫恭丨丨每能以禮遜相厭不以辭長勝人特命後魏崔逸為國子博士每公事逸常被詔獨進博士丨丨自逸始保舉東漢中興舉博士科督郢板狀曰生事愛敬喪沒如禮兼崇載籍窮微闡奧則丨丨通博唐房昭逺為國子博士㑹上令國子生通一經者並悉薦舉將擢用之既䇿問訖博士不能時定臧否祭酒元善因令昭逺考定之昭逺覽筆便下初無疑滯或有不服者昭逺問其所傳義疏輒為始末誦之然後出其所短自是無敢飾非者所試四五百人數日便决儒者莫不推其丨丨廣文唐鄭䖍元宗愛其才為置廣文館以䖍為博士䖍不知丨丨曹司何在訴於宰相宰相曰上置廣文館以居賢者令後世言丨丨博士自君始不亦美乎䖍乃就職師屬博士丨丨也韓文倚席唐李絳請崇國學上疏曰博士有丨丨之譏見治韓愈既才髙數黜官又下遷乃作進學解以自論國子先生晨入太學招諸生立館下誨之曰二年博士冗不丨丨命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼飢頭童齒豁競死何禆不知慮此而反教人為本𫝊為詩宗博士江公丨魯丨丨推易意韓嬰燕人也孝文時為博士景帝時為常山王大𫝊嬰推詩人之意而作外𫝊數萬言其語頗與齊魯間殊然其歸一也而燕趙間言詩者由韓生韓生亦以易授人丨丨丨而為之𫝊燕趙好詩故其易微惟韓氏自𫝊之孝宣時涿郡韓生其後也以易徴待詔殿中其所授易即先太𫝊所𫝊嘗受韓詩不如韓氏易深太傅故専傳之治尚書孔子之後孔忠生武及安國武生延年延年生霸安國延年皆為武帝博士霸亦昭帝末為博士霸生光成帝初舉為博士對論語張禹甘露中諸儒薦之有詔太子太傅蕭望之問禹丨易及丨丨大義望之奏禹精習有師法久之乃試為博士申公詩漢文帝時丨丨為丨最精以為博士申公為詩𫝊號曰魯詩京氏易京房受易梁人焦延夀房授東海殷喜河東姚平河南𢎞乘皆為郎由是易有京氏之學魯國先賢𫝊章甫冠漢文帝時博士朝服𤣥端丨丨丨通典大夫冕博士秩卑以其𫝊先王之訓故尊而異之令服丨丨丨荀綽晉百官表注金馬門漢公孫𢎞對策擢為第一入見拜為博士待詔丨丨丨九經庫谷那正觀中纍遷國子博士淹識羣書禇遂良稱為丨丨丨唐書令說書東漢柏榮年六十餘世祖召丨丨丨甚善之每朝㑹令榮於公卿前敷奏經書帝稱善曰得生幾晚拜博士撰義訓孔頴達遷國子博士丨五經丨丨百餘篇詔改為正義通五經博者博丨丨丨士者辨於義否漢官義隆風俗詔曰教學以導世治性為時養器其置學立五經博士以崇王化丨丨丨吳志著易論王昭素博通九經丨丨丨三十三篇太祖召命講易訪以民事昭素所言誠實無隱太祖嘉之又問治世養身之術昭素曰治世莫若愛民養身莫若寡欲太祖重其言書于屏風拜國子博士東都事略講泰卦李覺字仲明遷國子博士太宗幸國子監詔覺丨易丨丨覺因述天地感通君臣相應之㫖太宗甚悅改判國子監同上𫝊業寖盛武帝立五經博士迄于元始百有餘年丨丨者丨丨經學尤明孔霸以治尚書事太傅夏侯勝昭帝末年為博士霸生孔光丨丨丨丨成帝初即位舉為博士歷官至丞相小戴說禮孟卿東海人也事蕭奮以授后蒼魯閭丘卿蒼說禮數百言號曰后氏曲臺記授沛聞人通漢子方梁戴德延君戴聖次君沛慶普孝公德號大戴為信都太𫝊聖號小戴以博士論石渠由是禮有大戴小戴慶氏之學施讎論經甘露中丨丨以易拜博士與諸儒丨五丨同異於石渠閣康衡解頤丨丨好學家貧傭作以供資用精力絶人諸儒語曰無說詩康鼎來康說詩丨人丨元帝時為博士朱雲折角朱雲授易頗有師道是時少府五鹿充宗貴幸為梁丘易自宣帝時善梁丘氏說元帝好之欲考其異同令充宗與諸易家論充宗乘貴辨口諸儒莫能與抗有薦雲者召入攝齊升堂抗首而請音動左右既論難連柱五鹿君故諸儒論曰五鹿嶽嶽丨丨丨其丨拜為博士戴憑重席丨丨習京氏易年十六郡學明經徴試博士帝召上殿令與諸儒難說多所解釋帝善之拜為侍中後正旦百僚畢集帝令羣臣能說經者更相詰難義有不同輒奪其席以益通者憑遂丨坐五士餘丨京師語曰解經不窮戴侍中殷亮賜席丨丨建武中徴拜博士遷講學大夫諸儒論勝者丨丨至八九重帝嘉之曰學不當如是耶仲舒文辭董仲舒景帝時為博士西漢伏生經學伏生濟南人為秦博士六帖令論石渠歐陽髙為博士髙孫地餘以尚書授太子為博士論石渠張山柎事小夏侯建為博士論石渠周堪與孔霸俱事大夏侯霸為博士堪譯官丨丨於丨丨草創廟禮後漢董均為博士時丨丨郊天祭祀及宗丨丨樂威儀並令鈞參易有施孟前漢施仇字長卿從田王孫受易召為博士甘露中與五經諸儒雜論同異於石渠閣初丁寬從田何授易寬授田王孫王孫授施囚孟喜梁丘賀繇是丨丨丨丨梁丘之學春秋嚴顔前嚴彭祖與顔安樂俱事眭孟孟曰春秋之意在二子矣孟死彭祖安樂各顓門教授由是公羊丨丨有丨丨之學彭祖為宣帝博士韋賢大儒丨丨號稱鄒魯丨丨吕為博士廣德經行漢薛廣德以魯詩教楚國龔勝師事焉蕭望之為御史大夫除廣德為屬數與論議器之薦丨丨丨丨宜比博士儒之淵源漢成帝遣博士使關東不稱詔曰丨林丨官學海丨丨宜皆通達國體故謂之博士否則學者無述焉非所以尊道德也道之淵藪魏文帝即位髙柔上書曰博士丨丨丨丨魏志出安社稷前漢元鼎中徐偃為博士使行風俗偃矯制使膠東魯國鼓鑄鹽鐡還奏事張湯劾偃矯制法死偃以為春秋之義大夫丨疆有可以丨丨丨利萬民可専也湯不能屈使行風俗前漢成帝初即位孔光為博士數使録寃獄行風俗振瞻流民奉使稱㫖由是知名以髙第為尚書五經並授于時太學初立博士十餘人其學多偏不敢親授偹員而已惟祥丨丨業丨丨孝經論難王頗授著作郎尋令於國子講授㑹髙祖親授釋奠國子祭酒元善講丨丨與髙祖丨丨詞議風起髙祖大竒之超授國子博士介幘服佩晉置國子學博士一人丨丨兩梁冠丨丨同司馬彪百官志端委佩玉博士之職丨丨丨丨朝之大典必詢度之晉中興書得人致敬唐蓋文懿武德初歷國子助教時髙祖引於祕書省學教授王公之子時文懿為博士文懿嘗開講發毛詩題公卿咸更相問難文懿發揚風雅甚丨丨之丨丨得人為慶唐貞觀八年以前江西府監察御史召拜博士朝士以丨丨丨丨韓愈為權德輿墓碑一時之最唐大厯初禮部侍郎許善心舉徐文逺與包愷禇徽陸德明魯達為學館遂擢文逺國子博士愷等並為太學博士皆丨丨丨丨諸生之蓍唐皮日休移成均博士書云足下由文閫為丨丨丨丨範作後來之綿蕝得不思居其位者不愧其道處于職者不墮其業乎否則市大易負乘之譏招詩人伐檀之刺矣端師老德唐儒林傳云召丨丨丨丨以為學官行潔文正唐歸崇敬請德丨純丨丨詞雅丨形容莊重可為師表者委四品以上各舉所知在外敦遣為博士學生朝晡請益師二時堂上訓授道義示以文行忠信孝悌睦友旬有月試貢視生徒及第多少為博士考課委諉太學除國博韓愈為員外郎以愈之丨丨丨丨宜序天臺之屬元和制誥紬經訓胄丨丨丨丨鄭補之擬制名重朝廷誠齊楊萬里召為國子博士上疏乞留左司員外郎張栻黜軍器少監韓玉二罷由是丨丨丨丨四朝言行録博通儒林丨丨領於丨丨胡文恭行李希逸制宜擇賢繫天下史越王浩為國子博士轉