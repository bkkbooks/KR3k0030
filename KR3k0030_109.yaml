古為國子監直講太宗幸監詔奭緋服講說命偓佺說尚書崔偓佺𫝊李至奏為直講真宗幸國子監召丨丨丨丨丨帝善之東都事略大臨通六經吕丨丨字與叔丨丨丨尤詳於禮元祐中為太學博士汝礪著詩書彭丨丨字器質王安石得所丨丨丨善之以為國子監直講以師道自居石介字守道召為國子監直講介在太學丨丨丨丨丨弟子從之者甚衆太學之興自介始並同上以師儒自處胡安國遷太學博士學生以文自名每一篇成置錦囊中游公卿間轉囑公處之職事乃袖刺至博士舍公問所為文其人曰比為肇明取去肇明者祭酒薛昂也他日又問之對曰近置公達所公達者中書侍郎劉逵也於是公鄙其為人公為師儒謹所好惡如此季常言養士鄭丨丨作太學博士言丨丨之道當先養其心今殊失此意使荆公當此職不知如何曰荆公為相其道蓋行乎當年今日學法荆公之法也已不能善之矣楊龜山語録安石薦其才劉涇字臣濟王丨丨丨丨丨召見除經義所檢討久之為太學博士東都事略奏琴瑟之聲胡安定瑗為國子監直講每公私試罷掌儀率諸生㑹于首善堂合雅樂歌詩一夜乃散諸齊亦歌詩丨丨丨丨丨言行録明繼述之義陳忠肅公瓘字瑩中為太學博士被㫖奏對論稽古之言遂丨丨丨丨丨泰陵喜所未聞反復詰問語遂移時公乃引退上意感悟約公再見有變更時事之意泰陵聖顔英睿臣下奏對往往懾於天威少或契合公召見遽以人所難言逆意開陳辭達義明使人主豁然感悟由是縉紳士夫罔不欽服蘇黃門聞之撫凡歎曰吾兄東坡最善論士然亦不知出此以書抵公歎譽甚至同上韓愈為博士作進學解國子先生晨入太學招諸生立館下誨之曰業精于勤荒于嬉行成于思毁于隨先生口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鈎其𤣥貪多務得細大不捐焚膏油以繼晷常矻矻而窮年先生之業可謂勤矣抵排異端攘斥佛老補苴罅漏張皇幽眇尋墜緒之茫茫獨旁搜而逺紹障百川而東之回狂瀾於既倒先生之於儒可謂勞矣沉浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣少始知學勇於敢為長通於方左右其宜先生之於為人可謂成矣詩集餘見國子博士類無氊才名十四年坐客寒丨丨賴有蘇司業時時遺酒錢杜甫贈廣文先生鄭䖍詩如鋒飄飄凌雲意强禦莫能懾辟雍海環流用汝作舟楫開胸出眇義可發矇起魘詞丨太阿丨誰敢觸其鋏王荆公贈葉直講冗不治先生萬古名何用博士三年丨丨丨蔡天啓為博士三年不遷詩慚被嘲平生擾擾復膠膠學省重來嵗又交騎馬醉遭官長罵讀書丨丨學生嘲何為眷戀米五斗便可經營把一茅好買江干千箇竹待看煙雨長春梢同上再至學省詩浪說書名半生湖海看青山價佩笭箵攬轡艱曉起初馳朱雀路露華慙綴紫宸班百僚卑處贍丹陛五色光中望玉顔丨丨丨丨落人世非公那解徹天關米元章除書學博士初朝謁拜時宰詩從容學海仁義途中馳騁詩書府裏丨丨頭角驚殺蝦蟹丨丨波中老龍爪距逐出狐兔聖人門前大蟲推倒楊朱墨翟扶起仲尼周公杜牧送石守道赴太學直講詩國子正附國録歷代沿革北齊國子寺有正録員隋一人唐因之本朝國初闕元豐定制亦不置大觀元年薛昂乞置國子博士國子正録與太學官分掌教導從之自是始置正録凡二員學正掌行學規凡諸生之戾規者待以五等之罰學録掌佐學正糾不如規者續㑹要建炎三年國子監併歸禮部官省紹興十三年詔置國子監正録各一員二十九年詔國子監太學正録以四員為額中興㑹要隆興元年詔國子監正録二員併太學正二員依舊兼領二年詔國子正録今後正行差官更不兼權孝宗㑹要事類糾正爾司丨丨初寮擬制分録丨丨學政四朝國史任解傳任學職宜丨丨丨初寮除張矩制除助教本朝邢惇以布衣召對真宗東封還雍丘問以治道惇曰陛下東封西祝皆已畢矣臣復何言上悅丨四門丨丨遣歸既卒人見敕牒與廢紙同束置梁間栁子厚凌助教蓬屋詩序儒有逢户甕牖而自立者河間凌士燮窮討六藉皆著作而尤邃春秋為儒官守道端莊植志不回家本吳也遂搆蓬室以備揖遜之位所謂求仁而得斯固然歟夫厚人倫懷舊俗固六義之本羣公有發德之什余收而引之栁子厚四門助教㕔記周人置虞庠于四郊以養國老教胄子祭統曰天子該曰學蓋其制也易𫝊太初有曰天子旦入東學晝入南學夕入西學暮入北學蔡雍引之以定明堂之位焉大戴禮保𫝊篇曰帝入東學以貴仁入南學以貴信入西學以貴德入北學以尊爵賈生述之以明太子之教焉後魏太和中立學于四門置助教二十人隋氏始𨽻于國子而降置五人皇朝始合于太學又省至三人員彌簡官尤難非儒之通不列也四門學之制掌國之上士中士下士凡三等侯伯子男凡四等其子孫之為胄子者多庶人庶人之子為俊士者使執其業就師儒之官而考正焉助教之職佐博士以掌鼓篋擾楚之政令分其人而教育之其有通經力學者必於嵗之抄升於禮部聽簡試焉故有去而升于朝者賀祕書由是為博士歸散騎由是為左拾遺正元中王化既成經籍少間有司命太學之官頗以為易専名譽好文章者咸恥為學官至是河東栁立始以前進士求署兹職文水武儒衡閩中歐陽詹又繼之是嵗為四門助教凡三人皆文士京師以為異余故為之記而由夫三子者始詩集清儀禁掖人知連狀薦國庠官滿一家貧丨丨都道蓬瀛客直氣堪為諫諍臣釋無可贈敬睦助教太學正歷代沿革北齊國子寺有録事員隋一人唐因之六典國朝仁宗朝胡瑗掌太學其正録第補諸生熙寧末興三舍始選官為正録如學官之制聖朝職略學正五人掌行學規凡諸生之戾規矩者待以五等之罰學録五人掌佐學正糾不如規者元祐三年罰命官正録以上舍內舍充後復置命官學正二員紹聖復元豐制悉仍舊建炎三年省紹興十二年復置各一員隆興元年詔國子監正録二員併太學正録二員依舊兼領乾道二年復置太學正一員四年詔太學生黃倫除學録十二月詔復置學録一員以魏掞之填闕孝宗㑹要事類進位丨丨成鈞往助其長樂城除陸得制獻賦周美成性落魄不羈涉獵書史元豐中丨汴都丨神宗異之自諸生命為太學正東都事略職成均凡有丨於丨丨皆士之秀欒城除游酢制帥學者位于成均以丨丨丨曲阜除吳師仁制博學能詩正震字東卿開封人大觀三年登進士第丨丨丨丨宣和中為太學官張于湖上胡國正啓髙文華國谹論濟時璧水之除此其漸耳瑣闥之拜衆且遲之詩集領儒流重登太學丨丨丨學海詞鋒壓充州王建上韓愈詩太學録歷代沿革互見太學學正類事類名儒陳𫝊良授泰州教授未赴㑹太學録闕參政龔茂良行宰相事奏曰太學録一闕睥睨者衆臣欲擇取丨丨為士林所推者上問為誰以公對上曰是朕所素知者命下果無異詞樓攻愧集髙選周益公之子望字瞻叔太學成丨丨學官以公為録即兼博士每值談經同僚往往避席英俊作成為多其傑然如王詹事十朋皆是也周益公集行規胡定國除太學録學生劉觀石公揆輕俊有名試選屢居上游一旦觀代筆事覺公揆薄游成訟逾告期不歸為之游說者甚衆公曰録以丨丨矩為職二不能守奚以録為三人果佳士而所為如此亦何足恤竟致之法淵源録進誨魏掞之號艮齊守太學録既就職日丨諸生而丨之視其居有壞者請于朝得緍四十萬以葺之宋晦菴文佐糾規熙寧選官為正録學録五人掌丨學正丨不如丨者國史録學正熙寧大學成分丨丨丨四朝國史汪澥𫝊為文汪洋張耒字文潜幼頴異能丨丨蘇軾稱其文丨丨淡泊有一唱三歎之聲召為太學録東都事略紀事本末袁樞宇機仲上曰史書編年事多間斷莫詳始末龔公對曰近有太學録袁某嘗取資治通鑑各分條目輯為一書謂之通鑑丨丨丨丨上曰可速進入遂塵睿覽遊洚撰袁樞行狀請廢安石祀魏掞為太學録釋奠先聖當分獻從事則先事白宰相王安石父子以邪說亂天下河南程氏兄弟唱明絶學以幸方來其功為大丨於上丨丨丨父子勿丨而追爵程氏兄弟使從食朱文公集特補承務郎紹興四年詔太學生黃倫升補上等上舍丨與丨左丨丨丨除太學録中興㑹要詩集有詔追邵子坐學宫今日丨丨丨道山翠竹帛武庫森戈旗六武要兩有腐儒不足為張子湖同郡懷英分韻詩國子監簿歷代沿革北齊國子寺置主簿隋一人唐因之掌印勾檢監事凡六學生有不率師教者則舉而免之六典國朝國子監主簿一人以京官或選人充掌文簿或勾考其出入焉兩朝志元豐元年詔省主簿三年罷書庫官復置主簿續㑹要事類刋書郭忠恕太宗聞其名召為國子監主簿令丨定字丨東都事略好學韓維仁宗患縉紳奔競諭近臣曰恬退者旌擢則躁求者自知恥宰相文彥博宋庠等言公丨丨嗜古安於靜退乞甄録以厚俗除國子監主簿言行録列屬成均丨丨丨丨典司簿最初寮除徐永制設官司最監學丨丨往丨簿丨初寮除俞皓制與時相不合王庭圭號瀘溪先生除國子監主簿論事丨丨丨丨丨乞去主管崇道觀令所在常加存問胡淡庵集詩集領簿書忽丨丨丨游太學時楊出為國子主簿也劉賔客外集寄楊八拾遺詩國子監書庫官厯代沿革國朝淳化五年判國子學李至言監中印書亦至掌錢物凡有公文其所司止以印書錢物所名稍為近俗今乞改為國子監庫官從之太宗實録書庫監初以京朝官充掌印經史羣書以備朝廷宣索賜豫之用及出鬻而收其直以上於官元豐三年省續㑹要建炎三年併國子監歸禮部管紹興十三年詔復置一員三十一年减罷中興㑹要隆興元年詔主簿兼書庫乾道七年復置一員孝宗㑹要事類乃儒者幸真宗幸國子監厯覽書庫祭酒邢昺曰國初印板止及四千今至十萬經史義疏悉備曩儒生中能具書疏者百無一二縱得本而力不能繕寫今士庶家藏書籍者多矣丨丨丨逄時之丨㑹要與豪俊游許份字子大監書庫謂所親曰可以傅觀書史且獲丨太學丨丨丨張守撰許份墓志局籍之華入階丨丨丨丨宋景文集唐太學壁經賦國家誕敷嘉命建學崇政置六經于屋壁作羣儒之龜鑑剪遺文以辨謬伴雅誥以詳正教學既闡廊宇斯分飾素壁而照月構舟梁而結靈於是集青矜之侣延鴻鶴之羣正八索起三墳採典謨之淪翳次編簡之繽紛於是博考羣臣宣明舊典既科斗之互缺亦魚魯之相舛依馬迹而難從訪蛇形而莫辨定兹金簡規陳邈之𨽻書遵彼古文參史籀之太篆然後命鍾張之藝詔文學之官界四壁以繩直揮五色之毫端唐太學石經賦我國家學校崇崇創石經于其中既而詔學苑之徒命他人之役陳滿笥之文雅結峻天之逺碧且曰道自人𢎞教由時易若不考深㫖勒貞石則何以表吾道之不騫見伊唐之有赫由是鏤鎪之功備矣文質之義昭然玉色參差夫子之文章盡在丹㨕俯瞰聖人之閫閾斯存陳後山國子賣書狀臣伏見國子監所賣書向用越紙而價小今用襄紙而價髙紙既不逮而價增於舊甚非聖朝章明古訓以教後學之意臣愚欲乞計工紙之費而務廣其𫝊不以求利亦聖教之一助臣惟諸州學所買監書係用官錢買充官物價之髙下何所損益而外學常苦無錢而書價貴以是在所不能具有國子之書而學者見聞亦寡今如難於遽改即乞外學所賣書止計工紙别為之價所兾學者益廣見聞以稱朝廷教養之意及乞依公使庫例量差兵士般取詩集儒道廣聖唐復古制德義功無贊奧㫖悅詩書遺文分篆𨽻銀鈎互交映石壁靡塵翳丨林丨益丨學者心彌鋭從此理化成恩光遍遐裔馮涯太學創置石經詩古今合璧事類備要後集卷四十
