body:
  text: 古今合璧事類備要前集卷二十八宋謝維新撰親屬門公姑姑婦事類尊章歌曰背丨丨嫖以忽顔師古曰丨丨猶言尊姑也廣川王傳慈聽姑丨而從婦丨而婉禮之善物也左傳稱舅姑婦丨夫之父曰丨丨夫之母曰丨在則曰君舅君姑沒則曰先舅先姑爾雅如父母婦事舅姑丨事丨丨下氣怡聲問衣燠寒疾痛疴癢而敬抑搔之出入則或先或後而敬扶持之內則子婦佐餕凡朝夕恆食丨丨丨丨婦盥饋舅姑食卒婦餕餘私之也郊特牲子婦嘗食若飲食雖不嗜必嘗而待加之衣服雖不欲必服而待記大小必請婦將有事丨丨丨丨於舅姑婦所祭祀賔客每事必請於姑不敢專擅也同上旦夕在側古者子婦供事舅姑丨丨丨丨與男女無異顔氏家訓有命敬對舅姑之所丨丨之應唯丨丨進退周旋慎齋出入揖遊不敢噦噫嚏咳欠伸跛倚睇視不敢唾洟寒不敢襲癢不敢搔不敢袒裼內則不命不退凡婦丨丨適私室丨敢丨待之以誨也傳舅姑事舅沒則姑老介婦必請於冢婦內則遵舅姑言禮送女父誡之曰謹丨汝丨之言母誡之曰謹丨汝丨之言榖梁行舅姑禮王圭子敬直尚南平公主是時諸主下嫁以帝女貴未嘗丨見丨丨丨圭曰主上循法度吾當受公主謁見豈為身榮將以成國家之美於是與夫人坐堂下主執笲盥饋乃退其後公主降有舅姑者備婦禮本於圭六帖以父母事襄城公主下嫁有司告營别第辭曰婦事舅姑如事父母異宫則定省六帖姑婦姑留其婦鄒孟軻既娶將入室其婦袒於內孟子不悅遂去不入婦辭母求去丨召丨丨謂之曰夫禮將上堂聲必揚所以戒人也將入户視必下視瞻毋回今子察於禮而責於妻不亦逺乎孟子遂丨丨丨謝之君子謂孟母知禮而明姑婦之道列女傳婦悟其姑樂羊子妻不知何氏女嘗有他舍雞謬入園內姑盜殺食之妻對不食而泣怪問之妻曰自傷居貧使食他肉姑竟棄之臨危請姑見故妻類冒刃救姑見烈婦類為姑嘗藥莊叔公主事舅姑以禮聞姑寢疾不解衣藥糜不嘗不進出六帖鞭婦至死栁公綽為刑部尚書京兆獄有姑丨丨丨丨者府欲殺之公綽曰尊毆卑非鬬也且子在以妻而戮其母不順遂減論同上婦姑勃蹊室無空虛丨丨丨丨莊外物婦姑反唇丨丨不相悅則丨丨而相稽注計也賈誼傳子婦事類善事子不宜其妻父母曰是丨丨我內則順備禮曰婦丨丨而后內可和理內和理然後家長久也無私蓄子婦無私貨丨丨丨無私器不敢私假不敢私與家事統於尊也不敢退凡婦不命適私室丨丨丨同上修行婦道鮑宣妻桓氏與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲丨丨丨丨鄉里稱之列女撰集遺令班昭年七十餘卒上疏遺令凡十六篇子婦丁氏為撰集之人作大家讚焉同上叱狗見逐見後出妻類遺食得還同見後類注婦不告勞班昭女誡曰賴母師之典訓年十有四執箕帚於曹氏於今四十餘載矣戰戰兢兢常懼黜辱以增父母之羞以益中外之纍夙夜劬心勤不告勞姴傳婦死於義真宗朝有士人其母死乃號慟拾母尸而死其妻見夫死乃抱夫尸而哭亦丨死曰此家人子死於孝丨丨丨丨也夫妻附夫妻相敬慢夫夫妻反目畏妻敬夫薄妻事類一體夫婦丨丨也儀禮同庖惟夫妻為丨丨列女傳和柔夫丨而義妻丨而正左傳禮義夫婦以禮義合顔色相親亦不可以顔色衰棄其相與之禮邶谷風注尊貴夫丨於朝妻丨於室儀禮造端君子之道丨丨乎夫婦及其至也察乎天地中庸與齊一丨之丨終身不改記偕老與子丨丨詩相須日之與月隂之與陽丨丨而後成也昏義有别夫婦丨丨孟子無間夫婦之禮唯及七十同藏丨丨內則正位女丨丨乎內男丨丨乎外父父子子兄兄弟弟夫夫婦婦而家道正矣家人卦大倫易基乾坤詩始關雎夫婦之際人道之丨丨也史男女居室人之丨丨也孟子肥家夫婦和家之肥也記從夫婦人從人者也幼從父兄嫁丨丨夫死從子故婦人無爵丨丨之爵坐以夫之齒郊特牲同尊卑共牢而食合卺而酳所以合體丨丨丨以親之也昏義配隂陽夫婦之道參丨丨丨通逹神明夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢婦不事夫則義理墮夫婦之好終身不離列女傳為婦畫眉張敞為京兆丨丨丨丨長安中傳張京兆眉嫵有司奏敞上問之對曰臣聞閨房之內夫婦之私有過於畫眉者上愛其能弗責也割肉遺妻東方朔事詳見社類注常卿其夫晉王渾妻鍾氏丨丨渾渾曰詎可爾妻曰憐卿愛卿是以卿卿我不卿卿誰當卿卿世説篤愛其妻魏荀奉倩粲與婦至篤冬月婦病熱乃出庭中自取冷還以身尉之婦亡奉倩後少時亦卒勸妻忍貧山濤初為布衣家貧謂其妻韓曰忍飢寒我後當作三公但不知卿堪作夫人否耳及居榮貴貞慎儉約雖爵及千乘而無嬪疾妻好貪王衍字夷甫常疾其婦貪口未嘗言錢防妻過甚李益與李賀齊名然少有癡病而多猜忌防間妻妾過為苛酷而有散灰扄户之談時謂妬癡縱妻通姦紀處訥妻武三思婦姊也縱使通三思由是為太府卿常共對飲齊沈文季飲酒五斗妻王氏亦至三斗為吳興太守常對飲竟日而視事不廢與同營已周彬不治財産服膺儒學其妻嘗讓之曰汝家兄弟能力稼穡營已囊箱豐溢汝之不調無思悔畢向何如答曰卿嘗與吾市油數金是亦力穡營已但嵗晚必得力及聞先主鎮金陵囊文以往鍚賚頗厚以所賜金帛陳列於庭謂婦曰吾昔與卿同營已者今已一成矣比諸伯叔何箇為勝耶妻曰男子之事非女子所能知江南野史悅採桑婦晉文公出會欲伐衛公子鋤仰而笑公問何笑曰臣之鄰人有送其妻適私家者道見桑婦悅而與言然顧視其妻亦有招之者臣竊笑之公悟其言乃引師還未至而有伐其北鄙者矣列子歸賣餅妻唐寧王獻宅左有賣餅者妻纎白明媚一見囑意因厚遺其夫取之寵愛踰等環嵗嘗問之曰汝復憶餅師否默然不對王召餅師使見之其妻注視雙淚垂頰王乃歸之夢孕生男楊國忠出使江浙其妻思念至深忽夜夢與國忠交而有孕後生男名朏至國忠歸具述夢中之事國忠曰此夫妻相念情感所致時人莫不譏笑天寶遺事河魁在房李戴仁性迂緩非禮勿動娶閻氏年甚少與之異室私約曰有興則見忽一夕聞扣户聲小豎報云縣君欲見大監戴仁遽取百忌歷燈下看之大驚曰今夜丨丨丨丨不宜行事傳語縣君謝到閻氏慙怒而去荆湖近事夫妻相敬相敬如賔臼季使過冀見冀缺耨其妻饁之敬相待如賔與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之僖三十二相對如賔常林好學漢末為諸生帶經耕鋤妻自餉之雖在田野丨丨丨丨三國志許州富人有玉帶萇從簡欲之而不可得遣二卒夜入其家殺而取之卒夜踰垣隱木間見其夫婦相待如賔二卒嘆曰吾今欲奪其寶而害斯人吾必不免因躍出而告之使其速以帶獻踰垣而去不知所之五代史遇若嚴君後漢張湛字子孝矜嚴好禮居處必自修整雖丨妻子丨丨丨遇如君臣後漢馮良字君卿志行髙整非禮不動丨妻子丨丨丨鄉里以為儀表下牀答拜後漢樊英有疾妻使婢拜問英丨丨丨丨陳實怪問之英曰妻者齊也供奉祭祀禮無不答正冠相見晉何曽閨門整肅自少及長無聲樂嬖幸之好與妻相見丨衣丨相待如賔已南向妻丨丨再拜上酒酬酢既畢便出一嵗不過再三夫妻反目不能正室輿脫輻夫妻反目丨丨丨丨也小畜卦不能刑妻齊謝眺為王敬則壻曾告敬則其女常懷刃欲報眺眺不敢相見及當拜吏部謙挹尤甚尚書郎范鎮嘲曰卿人才旡慙小選但恨不可刑于寡妻眺有愧色及臨誅歎曰天道其不可昧乎我雖不殺王公王公因我而死夫死不哀子産晨出聞婦人哭撫其御手而聽之有間使執而問焉則手殺其夫者御問何以知之曰凡人於其所親愛也始疾而憂臨死而懼巳死而哀今丨巳丨丨丨而懼是以知其姦也韓子妻罵不平孫秀降晉晉武帝厚寵之妻以姨妹蒯氏丨嘗妬乃丨秀為絡子秀大丨丨遂不復入蒯氏大自悔責請救於帝時大赦群臣咸見既出帝獨留秀從容謂曰天下曠蕩夫人可從其例秀免冠謝遂為夫婦如初世説敬夫舉案齊眉孟光字德耀壯肥而黑擇對不嫁父母問故曰欲得賢如梁鴻者鴻字伯鸞聞遂娶之鴻貧賃舂於皋伯通廡下妻每饋食不敢仰視丨丨丨丨後隱逸傳下庭謝過後漢仇覽雖在燕居必以禮自整妻子有過免冠自責妻子庭謝俟覽冠乃敢升堂嫚夫庸奴其夫張耳亡命遊外黃富人女甚美丨丨丨丨去投父客父客素知張耳遂嫁之離棄其夫朱買臣會稽人賣柴以給食行且誦書妻亦負載相隨數止買臣毋謳歌道中買臣愈疾歌妻羞之求去買臣曰我年五十當富貴今已四十矣待我富貴當報汝曰如公等終餓死溝中耳何能富貴聽去後買臣獨行歌道中故妻與夫家上墳見買臣飢寒呼飯食之及買臣為會稽太守入吳界見其故妻夫妻治道買臣駐車呼令後車載其夫妻到太守舍置園中給食居一月妻自經死賈妻不言叔向曰昔丨大夫惡娶妻而美三年丨丨不笑御以如臯射雉獲之其妻始笑而言左傳道韞不樂王凝之妻謝丨丨奕之女也初適凝之還甚丨丨奕之曰王郎逸少子不惡汝何恨也答曰一門叔父則有阿大中郎群從兄弟則封胡羯末不意天壤之中乃有此王郎晉史畏妻侍婢執刀孫權以妹妻先主妹才捷剛猛有諸兄之風丨丨百餘人皆執刀侍立先主每入中心常凜凜蜀志别館處妾王導為丞相妻曹氏性妬導甚憚之乃密營丨丨以丨衆丨曹氏知而將往焉導恐妾被辱遽命駕晉書薄妻殺妻求將齊伐魯魯欲將吳起起妻齊女也起殺之明不與齊及為將大破齊軍通鑑殺妻逃難朱浮字叔元為彭寵所攻道走恐不脫乃下馬刺其妻僅以身免漢史干齋送獄後漢周澤字雅卿為太常卧疾齋宫其妻哀澤老病窺問所苦澤大怒以為丨犯丨禁收丨詔丨有過立捶晉劉毅散齋妻子丨丨丨加杖以丨之六帖以履搏妻蜀劉琰妻胡氏入賀太后太后特留胡氏經明乃出胡氏有美色琰疑其與後主有私呼卒五百撾胡至以履搏面而後棄遣胡具以告琰坐下獄有司議曰卒非撾妻之人面非受履之地琰竟棄市自是大臣妻母朝慶遂絶以刀擊妻桓範為冀州牧屬鎮北將軍吕昭昭才名過於範範後謂妻曰我寧作卿向三公長跪不能為吕子受屈妻曰君前在東座欲擅斬徐州衆人謂君難為下今羞為吕屈難為上也範怒丨丨環丨丨妻傷胎死範稱疾不就州魏略詩集纒錦君為女蘿草妾作兔絲花百丈托遠松丨丨成一家李白貧素生為同室親死為同穴塵他人尚相勉而况我與君黔婁固窮士妻賢忘其貧冀缺一農夫妻敬儼如賔陶潛不營生翟氏自㸑薪梁鴻不肯仕孟光甘布裙君雖不讀書此事耳亦聞至此千載後傳是何如人人生未死間不能忘其身所須者飲食不過飽與溫蔬食足充飽何必膏粱珍繒絮足禦寒何必錦繡文君家有遺訓清白傳子孫我亦苦貧士與君新結婚庶得丨與丨偕老同欣欣白居易贈內太行路丨丨之丨能摧車若比君心是坦途巫峽之水能覆舟若比君心是安流君心好惡苦不常好生毛羽惡生瘡與君結髮未五載豈期牛女為參商古稱色衰相棄背當時美人猶怨悔何况如今鸞鏡中妾顔未改君心改為君薰衣裳君聞蘭麝不聞香為君盛容飾君看珠翠無顔色行路難難重陳人生莫作婦人身百年苦樂由他人行路難難於山險於水不獨人間夫與妻近代君臣亦如此君不見左納言右納史朝承恩暮賜死行路雞行路難不在水不在山只在人情反覆間白樂天陌上桑崔豹古今注曰丨丨丨者出秦氏女邯鄲人有女名羅敷邑人千乘王仁後為趙王家令羅敷出採桑於陌上王登臺見而悅之因飲酒欲奪焉羅敷乃彈筝作陌上之歌以自明焉日出東南隅照我秦氏樓秦氏有好女自名為羅敷羅敷善蠶丨採桑城南隅青絲為籠繩桂枝為籠鈎觀者見羅敷下擔將髭鬚少年見羅敷脫巾著帩頭耕者忘其耕鋤者忘其鋤使君從南來五馬立踟蹰羅敷年幾何二十尚未滿十五頗有餘使君謝羅敷寧可共載否羅敷前致辭使君一何愚使君自有婦羅敷自有夫東方千餘騎夫壻居上頭何以識夫壻白馬從驪駒青絲繫馬尾黃金絡馬頭要中湛盧劒可直千萬餘十五府小吏二十朝大夫三十侍中郎四十專城居為人潔白晳鬑鬑頗有鬚盈盈公相步冉冉府中趨坐中𢾗千人皆言夫壻姝扊扅歌百里奚為秦相上作樂所賃浣婦自言知音呼之援琴撫弦而歌此因尋問之乃其妻云百里奚五羊皮臨别時烹雌雞炊扊扅今富貴忘我為風俗通白頭吟司馬相如將聘茂陵女子為妾卓文君作丨丨丨以自絶詩曰皓好山上雪皎若雲間月良人有兩意故與相訣别又云今日斗酒間明日溝水頭蹀躞向溝上溝水東西流又云凄凄重凄凄嫁娶不須啼願得一心人白頭不相離相如感之乃止西京雜記别內赴徵出門妻子強牽衣問我西行幾日歸來時儻佩黃金印莫學蘇秦不下機李白慶妻受命𢎞農舊縣受新封細軸金泥告一通我轉官階常自悅君加邑號有何功花箋印了排窠濕錦牒粧來耀手紅倚得聲名便慵墮日髙猶睡緑窗中白居易妻初受邑繡龜請夫唐會昌中有邊將張揆防邊僅十年其妻侯氏丨回文作丨形詩詣闕進曰暌離已是十年強對鏡那堪更理粧聞鴈幾回修尺素見霜先為製衣裳開箱疊綀先垂淚拂杵調砧更斷腸繡作龜形獻天子願教行客早還鄉賣鏡得妻陳太子舍人徐德言尚叔寶妹樂昌公主陳政衰謂妻曰國破必入權豪家儻情緣未斷尚冀相見乃破鏡人分其半約他日以正月望日賣於都市及陳亡其妻果為楊越公得之徐乃為詩曰鏡與人俱去鏡歸人未歸無復姮娥影空留明月輝樂昌得詩悲泣不已越公知之愴然召德言還其妻古今詩話戲詠寄夫王稚川既得官都下有所盻未歸山谷丨代乃妻林夫人作欵乃歌二章與之云卧氷泣竹慰母飢天吳紫鳯補兒衣花上盈盈人不歸桑下纂纂實已垂臘雪在時聽馬嘶長安城中花片飛從師學道魚千里蓋世功名黍一炊日日倚門人不見看盡林烏反哺兒詩諷畏妻東坡謫黃州與陳慥季常遊季常自以飽禪學而妻栁氏頗悍季常畏之至或詬罵未巳聲逹於外東坡因以詩戲云誰似龍丘居士賢談空説有夜不眠忽聞河東獅子吼拄杖落手心茫然河東桞郡望蓋借用傳燈録河東獅子吼之語妻附賢妻事類親主妻也者丨之丨也敢不敬與哀公問夫隂妻者丨之丨杜欽傳內子夫人丨丨注適妻也記曽子問叔向對齊晏嬰曰撫有晉國賜之內主左細君東方朔割名於丨丨注師古曰以肉歸遺丨丨是損割其名揚雄解嘲娶感知巳王義方魏證異之欲妻以夫人之姪辭不敢俄而證薨乃丨人問其故曰初不附宰相今丨丨丨也唐史娶曾罵已人有挑其鄰之妻者其長者罵之其少者報之後其夫死而娶其長者或曰夫非罵爾者耶曰在人欲其報我在我欲其罵人後馮衍傳不易貧妻宋𢎞為太尉時帝妹湖陽公主新寡帝與共論群臣以微觀其意主曰宋𢎞威容群臣莫及帝曰試圖之主坐於屏風召𢎞問曰貴昜交貧易妻人情乎𢎞曰貧賤之交不可忘糟粳之妻不下堂帝回謂主曰事不諧矣唐太宗嘗謂尉遲敬德曰朕欲以女妻卿何如敬德叩頭謝曰臣妻雖鄙陋相與共貧賤臣雖不學聞古人貧不易妻復得幼妻唐劉震之女無雙幼時許其甥王仙客未成婚朱泚之亂震夫妻死無雙沒入掖庭仙客後二年入京遇舊蒼頭塞鴻又得無雙婢採蘋與居後為縣尉至長安驛忽有中使押內家三十人往元陵灑掃塞鴻烹茗於簾外夜深忽聞簾下語曰塞鴻郎健否明日去我後園中取書送郎書後云嘗見敇使説富平縣古押衙有心今能求之否後仙客尋古押衙結以寶玉半歲古押衙求茅山道士藥令採蘋假作中使賜無雙死三日後以親屬贖尸以與仙客救療得愈押衙自盡仙客與無雙偕老襄鄧間太平廣記身娶兩妻王毛仲有兩妻一上所賜皆有國色五代安重榮娶二妻髙祖因之並加封爵六帖妻有三畏中宗朝裴談崇奉釋氏妻悍妬談畏之嘗云妻有可畏者三少之時視之如生菩薩安有人不畏生菩薩及男女滿前視之如九子魔母安有人不畏九子魔母至五六十薄施粧粉或青或黑視之如鳩盤荼安有人不畏鳩盤荼本事記賢妻妻羞其夫齊人有一妻一妾而處室者其良人出則必饜酒肉而後反其妻問所與飲食者則盡富貴也其妻告其妾施從良人之所之遍國中無與立談者卒之東郭墦間之祭者乞其餘不足又顧而之他此其為饜足之道也其妻歸告其妾曰良人者所仰望而終身也今若此與其妾訕其良人而相泣於中庭孟子妻遣其夫晉公子重耳過齊桓公妻之公子安之從者謀於桑下蠶妾聞之以告薑氏薑氏殺之而告公子曰子有四方之志其聞之者吾殺之矣乃與子犯謀醉而遣之左傳妻戒直言伯宗每朝其妻必告之曰盜憎主人民惡其上子好直言必及於難伯宗不從故及同上妻戒拾遺樂羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食况拾遺求利以汚其行乎羊子大慙乃捐金於野妻戒失學樂羊子遠尋師學一年來歸妻跪問故羊子曰久行懷思無它異也妻乃引刀趨機而言曰此織生於蠶繭成於機杼一絲之纍以至於寸纍寸不已遂成丈匹今若斷斯織也則捐失成功稽廢時月夫子積學當日知其所亡以就懿德若中道而歸何異斷斯織也羊子感其言復往終業七年不返妻勸修學吳許升妻吕氏之女升少為博徒不理操行丨嘗丨升丨丨每有不善輒流涕進規升感激自厲乃尋師遠學遂以成名東漢列女傳妻勸結交晉公子過曹僖負羈之妻曰吾觀晉公子之從者皆足以相國夫子必反其國必得志於諸侯得志於諸侯而誅無禮曹其首也豫盍蚤自二焉左傳妻請窺友山公與嵇阮契合金蘭山妻韓氏覺公與二人異於常交謂公曰負羈之妻亦親觀狐趙意欲窺之可乎他日二人來妻勸公留之宿具酒食夜穿墉以視之逹旦忘返公入曰二人何如妻曰君才殊不如正當以度量相勝耳公曰伊輩亦嘗以我度為勝妻勸辭聘楚莊王聘北郭先生先生曰臣有箕帚之使願入計之即謂婦楚欲以我為相如何婦曰結駟列騎所安不過容膝食前方丈所甘不過一臠之味而殉楚國之憂其可乎於是遂不應聘韓詩外傳妻勸隱居老萊子逃世耕於蒙山之陽楚王駕至其門曰守國之孤願見先生老萊曰諾妻曰妾聞之居亂世為人所制能免於患乎妾不能為人所制者委畚而去老萊乃隨而隱列女傳妻戒驕矜晏嬰相齊出其御之妻從門間窺其夫其夫擁大蓋䇿駟馬意氣揚揚甚自得也既而歸妻請去夫問故妻曰晏子相齊名顯諸侯今觀其出志念深矣常有以自下者今子為人僕御然子之意自以為足是以求去其夫後自抑損晏子怪而問之以實對薦為大夫妻戒富盛陶大夫治陶三年名譽不興家富三倍妻怒曰子能薄而官大是謂蒙害無功而家昌是謂積殃昔楚令尹治國家貧而國富君敬之民戴之故福祿終其子孫名垂後世今子貪富務大不顧後害請去列女傳妻勸出仕謝安妻劉琰妹也既見家門富貴而安獨靜退乃謂安曰丈夫不如此也安掩鼻曰恐不免耳妻勸立功唐薛仁貴妻栁氏曰夫有髙世之材要須遇時乃發今天子自征遼東求猛將此難得之時盍圖功名以自顯史妻勸自陳初丹陽太守李衡數以事侵琅琊王其妻習氏誎之衡不聽及琅琊王即位衡憂懼謂妻曰不用卿言以至於此吾欲奔魏何如妻曰不可琅琊王素好善慕名方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄表列前失顯求受罪如此乃當逆見優饒非但直活而已衡從之詔曰丹陽太守李衡以往事之嫌自居司敗其遣還郡通鑑妻戒免禍上林令侯敏素諂事來俊臣其妻董氏戒之曰俊臣國賊指日將敗君宜遠之敏從之俊臣怒出為武龍令敏欲不往妻曰速去勿留俊臣敗其黨皆流敏獨得免同上妻訶其泣漢王章與妻冬無被卧牛衣中涕泣妻怒訶曰京師尊貴者誰如仲卿不自憤激乃反涕泣後章至京兆尹欲上封事妻止曰人當知止不從竟死獄中妻勸其守建中末李希烈謀襲陳州李侃為項城令以城小欲逃歸楊氏曰縣不守則他賊地也倉廩府庫皆其積也百姓皆其戰士也請募死士賊遂去縣卒完遷侃為太平令妻解夫圍劉遐妻邵續女驍果有父風遐為石季倫所圍妻單將數騎拔出遐於衆人之中六帖妻贖夫罪晉平公使工為弓三年乃成射不穿一札公怒將殺工其妻見公曰妾之夫造此弓亦已勞矣而不穿一札是君不能射也妾聞射之道左手如拒石手如附枝右手放發左手不知公以言為儀而穿七札工得賜金三鎰列女傳蔡琰重嫁於董祀祀犯法當死琰詣曹操蓬首徒行請罪音辭清辨旨甚哀痛操乃出祀罪妻自負薪吳隱之為晉陵太守丨丨丨丨入為左衛將軍冬月無被嘗浣衣乃披絮動苦同於士庶妻自執㸑初晉司馬懿辭仕以風痺不能起居曝書遇雨懿起收書家唯一婢見之妻張后懼言泄乃手殺之而丨丨丨焉晉書妻進新衣桓車騎沖不好著新衣浴後婦故送新衣與車騎大怒催使持去婦更馳還傳語云衣不經新何由而故桓公大笑著之妻贈錦字晉竇滔妻蘇氏名蕙字若蘭滔符堅時為秦州刺史被徙流沙蕙思之織錦為回文旋圖書以贈滔宛轉循環以讀之辭甚悽惋凡八百四十字更著布裳鮑宣妻桓氏裝送甚盛宣曰少君生富驕習美飾而吾貧賤不敢當禮乃悉歸侍御服飾丨丨短丨丨與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道漢史記更為椎髻東漢梁鴻妻孟光裝飾入門七日而鴻不答乃跪牀下請罪鴻曰吾欲裘褐之人可與俱隱深山者今乃衣綺縞傅粉墨豈鴻所願哉妻曰妾自有隱居之服乃丨丨丨丨著布衣操作而前本傳勸夫輸稅周行逢妻鄖國夫人鄧氏曰稅官物也公為節度使不先輸稅何以率下且獨不記為里正代人輸稅以免楚撻時耶通鑑周世宗問夫與飲國朝歐公為梅聖俞謝氏撰墓銘云使吾不以貧賤富貴纍其心者吾妻之助也吾嘗與士大夫語謝氏多從户屏竊聽之間則能盡商榷其人才能賢否及時事之得失皆有條理吾官吳興自外歸必問曰今日孰與飲而樂乎聞其賢者之則悅否則歎曰君所交皆一時賢雋今與是人飲而歡耶歐集詩集守空牀青青河畔草鬱鬱園中栁盈盈樓上女皎皎當窗牖峩峩紅粉粧纎纎出素手昔為娼家女今為蕩子婦蕩子行不歸空牀難獨守古樂府作嫁衣隈他門户傍他墻年去年來來去忙採得百花成蜜後為他人作嫁衣裳后山詩話夀之老醫娶少婦或集句嘲之未第寄詩毛友龍達可丨丨時其內以一詩丨之剔燭親封錦字書擬憑歸鴈寄天隅經年未報干秦䇿不識如今舌在無齋録下第寄詩杜羔妻劉氏善為詩羔纍舉不第將至家妻即先寄詩曰良人的的有竒才何事年年被放回如今妾面羞君面君到來時近夜來羔見詩即時回去尋登第妻又寄詩云長安此去無多地鬱鬱䓤蔥佳氣浮良人得意正年少今夜醉眠何處樓可謂能勉其君子以正矣寄詩勸戒昔有居上庠者妻以詩寄鞋襪云細襪宫鞋巧樣新殷勤寄與讀書人好將穩步青雲上莫向平康漫惹塵作詩餞行真宗東封訪天下隱者得杞人楊璞能為詩召對自言不能上問臨行有人作詩送君否璞曰獨臣妻有詩一首云更休落魄貪杯酒亦莫猖狂愛詠詩今日捉將官衷去這回斷送老頭皮上大笑放還山東坡云吾頃在湖州坐作詩追赴詔獄妻子送出門背哭無以語之顧老妻曰獨不能如楊處士妻作詩送我乎老妻不覺大笑而止侯鯖録夢歸見詩有書生娶後遊太學久不歸一夕夢返其家見妻秉筆寫詩云數日相望極須知意思迷夢魂不愧險飛過大江西書生怪而記之後家書至中有詩一首如夢中所見無殊夢之夕乃發書之日圖形寄詩南楚材旋遊似無返舊之意其妻薛媛微知其意乃對鏡自丨其丨并詩以寄之曰欲下丹青筆先拈寶鏡寒已驚顔索寞漸覺鬢凋殘淚眼描來易愁腸寫出難恐君渾忘却時展畫圖看楚材遂歸如初雲溪友議後妻人詳見婚姻門再嫁娶注事類妻姪繼室臧宣叔娶於鑄生賈及為而死繼室以其姪穆薑之姨子左傳嬖妾繼室許敬宗嬖其婢因以繼室假姓虞六帖繼納乳媪竇懷貞會嵗除中宗夜宴近臣謂曰聞君喪妻今欲繼室可乎懷貞唯唯俄而禁中寶扇鄣衛有衣翟衣出者已乃韋后乳媪王所謂莒國夫人者故蠻婢也懷貞納之不辭世謂媪壻為阿㸙懷貞每謁見奏請輒自署皇后阿㸙而人或謂為國㸙軒然不慙以自媚於后六帖再遣後妻李德武妻裴氏以孝聞鄉黨德武坐事徙嶺南時嫁方踰嵗父矩表離婚德武謂裴曰我方貶無還理君必儷它族於此長決矣答曰夫天也可背乎願死無他後十年德武未還矩決欲嫁之裴斷髮不食矩知不能奪聽之德武娶爾朱氏赦還聞其全節乃遣後妻與裴為夫婦如初同上出妻附故妻事類怨耦丨丨曰仇左傳失儷儷偶也鳥獸猶不丨丨左傳仳離有女丨丨啜其泣矣遇人之艱難矣詩棄背華落色衰復相丨丨喪其妃耦焉同上不説子甚宜其妻父母丨丨出內則不表禮曰舅姑怒則子放妻出而不表禮焉注丨丨謂不明言其過六帖三出士丨丨妻逐於境外言二三其德也管子七出婦有丨丨不順父母者無子者淫辟者嫉妬者惡疾者多口舌者竊盜者三不去謂有所取無所歸也與其三年之喪也先貧賤後富貴也家語孔氏出妻自叔梁紇始出妻及伯魚亦出妻子思又出妻故稱丨丨三世丨丨家語後序孟子出妻見舅姑類無子出妻梁叔魚三十無子欲出其妻商瞿曰吾年四十有子五人恐子晚出耳非妻之過也六帖違姑去妻李逈秀妻罵㜢婢母聞不樂逈秀即出其妻或問之答曰娶婦要欲事姑茍違顔色何可留蒸梨出妻曾參後母遇之無恩供養不衰其妻以蒸梨不熟因出之人曰非七出也參曰蒸梨小物耳吾欲使熟而不用吾命况大事乎家語取棗去婦王吉妻丨東家丨啖吉乃丨丨蕩舟歸妻齊侯與蔡姬乘舟於囿蕩公公懼變色禁之不可公怒歸之未絶之也蔡人嫁之左取水遣妻薑詩事母至孝好飲江水妻嘗泝流而汲值風不得還母渴詩責而遣之妻乃寄止鄰舍盡夜紡績市珍羞使鄰母以意自遺其姑久之姑怪問鄰母告其故姑感慚呼還薑詩傳叱狗去妻鮑永養後母至孝妻嘗於母前丨丨永即丨其丨薑詩出婦蓋為小瑕鮑永去妻亦非大過白集判分財出妻後漢李充貧兄弟六人同衣遞食妻竊謂充曰妾有私財願分異充曰醖酒具會鄉里共議及賔至充從座中跪白母曰此婦無狀教充離異充母兄弟不可承宗事遂呵叱妻出門離婦成仇晉王珣及珉皆謝氏壻太傅安死既與珣絶婚又離珉妻遂為仇怨遣妻遭詈後漢郭林宗見黃允以俊才知名謂曰卿守道不篤將失之矣後司徒袁隗為從女求婚見允歎曰得壻如此足矣允聞乃遣其妻夏侯氏婦謂姑曰今當見棄與黃氏長辭乞一會親屬於是大集賔客三百餘人婦中坐攘袂數黃允隱匿穢惡十五事言畢登車而去允以此廢於時與夫告絶晉謝邈為吳興太守邈妻郤氏妬以邈娶妾怨懟與書告絶邈疑門下生仇玄達為妻作斥玄逹逹達投孫思害邈誣妻以姦令狐建擢左神武大將軍其妻成德軍節度使李寶臣女也建將棄之誣與門下客郭士倫通榜殺士倫而棄其妻寶臣請案劾無狀六帖故妻車載故妻朱買臣嘗賣薪行且誦書妻羞之求去其後買臣獨行歌道中故妻與夫家上墳見買臣飢寒呼飲食之及買臣為會稽太守入吳界見其故妻夫妻治道買臣駐車呼令後車載其夫妻到太守舍置園中給食居一月妻自經死館處故妻晉賈充前妻李氏坐徙後娶郭氏以大赦得還詔充置左右夫人郭氏怒乃為李築館舍於外晉史故妻復會後漢黃昌會稽餘姚人為蜀郡太守初昌為州書佐其婦歸寧遇賊被獲流轉入蜀為人妻其子犯事乃詣昌自訟疑母不類蜀人因問所由對曰妾本會稽餘姚戴次公女州佐黃昌妻妾嘗歸家為賊所掠遂至此昌驚曰何以識黃昌耶對曰昌左足心有黑子嘗自言當為二千石昌出足示之相持悲泣還為夫婦晉李繁姊先適陳詵生四子遭亂詣賊請活姑命賊遂掠去詵更娶嚴氏生子暉繁後得姊歸詵詵藉注二妻及李亡詵疑制服以言於庾亮司馬王愆期議曰案禮不二嫡故惠公元妃卒繼室以聲子諸侯猶然况庶人乎為詵也妻則為暉也母士喪禮曰繼室故稱繼母事之如嫡故先嫡後繼亮從之故妻來奔王肅在江南娶謝氏女為妻及至京師復尚公主其後謝氏為尼亦來奔肅作詩贈肅曰本為箔上蠶今作機上絲得絡逐勝去頗憶纒錦時公主代肅謝曰針是貫紳物目中常絍絲得帛縫新去何能衲故時肅甚恨遂造正覺寺憩之伽藍記詩集故夫上山採蘼蕪下山逢丨丨長跪問故夫新人復何如新人雖云好未若故人姝其色似相類手爪不相如新人從門入故人從閣去新人工織縑故人工織素織縑日一匹織素五丈餘持縑將比素新人不如故古樂府棄婦古人雖丨丨棄婦有歸處今日妾辭君辭君欲何去本家零落盡慟哭來時路憶昔未嫁君聞君甚周旋及與同結髮值君適幽燕孤魂䚰飛鳥兩眼如流泉流泉咽不燥萬里關山道及至見君歸君歸妾已老物情棄衰賤新寵方妍好拭淚出故房傷心劇秋草妾以憔悴捐羞將舊物還餘生欲有寄誰肯相留連空牀對虛牖不覺塵埃厚寒水落芙蓉秋風墮楊栁記得初嫁君小姑始扶床今日君棄妾小姑如妾長回頭語小姑莫嫁似兄夫顧况棄妻詞分張錦水東北流波蕩雙鴛鴦雄巢漢宫月雌弄秦章芳寧同萬死碎綺翼不忍雲間兩分張此時阿嬌正嬌妬獨坐長門愁日暮但願君恩顧妾深豈憚黃金買詞賦相如作賦得黃金丈夫好新多異心一朝將聘茂陵女文君因贈白頭吟東流不作西歸水落花殘條羞故林兔絲本無情隨風任傾倒誰使女蘿枝而來強縈抱兩草猶一心人心不如草莫捲龍鬚席從他生網絲且留琥珀枕會有夢來時覆水再收豈滿杯棄妾已去難重回古來得意不相負只今惟有青陵臺李白白頭吟離别出户不敢啼風悲日凄凄心知恩義絶誰忍分丨丨下坡車轔轔畏逢鄉里親空持床前幔却見家中人忽辭王吉去為是秋胡死欲比今日情煩寃不相似戴叔倫去婦怨鏡破絲斷君心匣中鏡一破不復全妾心藕中絲雖斷猶牽連安知御輪去今日畨回轅一女事一夫安可再移天君聽去鶴言哀哀七絲絃怨孟郊去婦雨散雲收嚴灌夫娶慎氏十年無嗣乃出之妻乃為詩以别曰當時心事已相關丨丨丨丨一餉間便是孤鶴從此去不堪重過望夫山遂如初寡婦附喪夫又互見烈婦類事類孀婦以養孤孀注丨寡丨淮南子嫠婦莒婦人莒子殺其夫已為丨丨六帖嫠不恤緯而憂周宗之隕左傳無告老而無夫曰寡天下之窮民而丨丨者孟子不改一與之齊終身丨丨故夫死不嫁記未亡人禮婦人喪夫自稱丨丨丨後魏書內私壻子曰昔東夷之子慕諸夏之禮有女而早寡為丨丨丨終身不嫁嫁則不嫁矣亦非清節之義也家語託空堂日黃昏而望絶兮悵獨丨於丨丨懸明月以自照兮徂清夜於洞房忽寢寐而夢寐兮魂若君之在旁愓寐覺而無見兮魂廷廷兮若有忘長日賦歸空館易錦茵以苫席兮代羅幬以素帷愁煩寃以誰告兮提孤孩於坐側丨丨丨而自憐兮撫衾裯以歎息耳傾想於疇昔兮目倣佛乎平素雖冥冥以罔覿兮猶依依以憑附願假寐以通靈兮目炯炯而不寢如涉川兮元梁若凌虛兮失翼廓獨立兮顧影塊獨言兮聽響顧影兮傷摧聽響兮增哀四節流兮忽代序嵗云暮兮日西頽霜被庭兮風入室夜既分兮星漢回夢良人兮來遊若閶闔兮洞開坦驚悟兮無聞超惝恍兮慟懷慟懷兮奈何言陟兮山阿墓門兮肅肅修壠兮峩峩孤鳥嚶嚶兮悲鳴長松萋萋兮振柯哀鬱結兮交集淚橫流兮滂沱蹈共薑兮明誓詠柏舟兮清歌終歸骨兮山足存憑託兮餘華要吾君兮同穴之死矢兮靡他潘安仁寡婦賦共薑守義柏舟丨丨自誓也衛世子共伯早死其妻丨丨父母欲奪而嫁之誓而不許故作是詩以絶之泛彼柏舟在彼中阿髧彼兩髦實惟我儀之死矢靡他母也天只不諒人只詩夏姬得道夏姬內俠伎術蓋老而復壯者三三為皇后七為夫人凡九為寡婦當之者輒死左氏所載當之者已八人矣宇文士及粧臺記序云春秋之初有晉楚之諺曰丨丨丨丨雞皮三少列女傳求娶嫠婦齊棠公之妻東郭偃之妹棠公死偃御崔子弔之見棠妻美使偃娶之偃曰同宗也君出自桓我出自丁又筮之不吉曰嫠婦也何害前夫當之矣左不納嫠婦魯人有獨處室者鄰之嫠婦亦獨處一室夜暴風雨至嫠婦室壞趍而託焉魯人閉户而不納嫠婦自牖與之言子何不仁而不納我乎子不如栁下惠然嫗不逮門之女國人不稱其亂魯人曰栁下惠則可吾固不可吾將以吾之不可學栁下惠之可孔子聞之曰善哉欲學下惠者未有似於此者家語就飲寡婦陳遵字孟公為河南太守弟級為荆州牧當之官俱過長安富人故淮陽王外家左氏飲食作樂司直陳崇劾奏遵過寡婦左阿君置酒謳歌醉宿免歸逼取寡婦丹陽大都督媯覽殺太守孫翊欲丨丨翊妻徐氏徐紿之曰乞須晦日設祭除服然後聽命覽許之徐氏潛使所親語翊親近舊將孫髙傳嬰與共圖覽剄晦日設祭徐氏哭泣盡哀畢乃除服薰香沐浴吉笑歡悅大小悽愴怪其如此覽密覘無復疑意徐氏呼髙嬰置户內使人召覽入徐氏出户拜覽適得一拜徐大呼二君可起髙嬰俱出共殺覽通鑑漢獻帝紀寡婦擅財巴丨丨清其先得丹穴而擅其利數世家亦不資清能守其業用財自衛人不敢犯始皇以為貞婦而容之為築懷清臺寡婦當家史孝章妻博陵崔氏僕射之喪自沒至葬當門户備祭祀建碑表皆崔氏之能劉禹錫撰史僕射神道碑作黃鵠歌烈女陶嬰夫死守義丨丨丨丨曰黃鵠早寡兮七年不雙飛宛頸獨宿兮想其故雄其命早寡兮獨宿何傷念此寡婦兮泣下數行死不忘兮烏將然以冇賢雄兮終不重行魯人聞之遂不復求列女傳吟孤燕詩南史衛敬瑜妻年十六而夫亡父母舅姑欲嫁之乃截耳為誓不許户有燕巢常雙飛後忽孤飛女感其偏栖乃以縷繫腳為志後嵗此燕果復來猶帶前縷女為詩曰昔年無偶去今春猶獨歸故人恩義重不忍更雙飛張景仁傳刑耳自誓劉長卿妻桓鸞女生一男五嵗長卿卒遠嫌不歸寧男十五而夭乃丨其丨丨丨宗婦愍之曰若家無他意何貴義輕身曰先君五更尊為帝師男以忠孝女以貞順稱是以豫刑以明我情沛相王吉上奏題其門號景行義桓邑有祀六帖斷臂長慟王凝為虢州司户卒於官凝家貧一子尚幼妻李氏携其子歸過開封府旅舍主人見其婦人獨携一子而疑之不許其宿李氏顧天已暮不肯去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執耶不可以一手并汙吾身即引斧自斷其臂路人見者環聚而嗟之開封府聞之白其事於朝官賜藥封瘡厚恤李氏而笞其主人五代史以粉書扇後漢隂喻妻荀爽女名采早寡父母強嫁與郭奕爽以詐疾召采采歸而懷白刃爽執奪不得已到郭氏偽為歡建四燈以共談奕敬憚之及曙奕出采叱左右辦浴既入室丨丨丨丨曰尸還隂氏字未成恐人來乃以衣帶自縊死感笳作詩蔡琰夫亡無子歸寧漢末為胡騎所獲在左賢部中春月登胡殿丨丨音丨丨曰胡笳動兮邊馬鳴蔡琰别傳喪夫揮淚城崩祀梁死其妻無子哭求夫尸於城下聞之者皆揮淚十日而城崩而死湘川記染淚竹班舜巡狩蒼梧而崩二妃不從以淚染竹竹盡成班哭夫以禮穆伯之喪敬伯晝哭孔子曰知禮矣記納夫於正黔婁先生卒覆以布被覆頭則足見覆足則頭見曾西曰斜其被則斂矣妻曰斜之有餘不若正之不足先生生而不斜死而斜之非先生之意髙士傳善哭其夫華周杞梁之妻丨丨丨丨而變國俗孟子文誄其夫栁下惠妻誄其夫門人不能竄一字其誄曰夫子之信誠與無害兮嗚呼哀哉魂神泄兮夫子之諡宜為惠兮列女傳不受郊弔齊侯伐莒莒獲杞梁齊侯歸遇杞梁妻於郊使人弔之對曰植之有罪何辱命焉若免於罪猶有先人之弊廬在下妾不敢與郊弔齊侯遂弔於室辭却羽儀魏證薨命百官九品以上皆赴喪給羽葆鼓吹陪葬昭陵其妻裴氏曰證平生儉素今葬以一品羽儀非亡者之志悉辭不受以布車載柩而葬詩集哭夫昨日南鄰哭哭聲一何苦問之身丨丨夫年二十五嶽氏聞哭守子蟬鬢加意梳蛾眉用心掃幾度曉粧為君看不言好妾身重同穴君意輕偕老惆悵去年來心知未信道今朝一開口語少意何深願引他時事移君此日心人言夫婦親義合如一身及至死生際何曾苦樂均婦人一喪夫以身丨孤丨有如林中竹忽被風吹折一折不重生枯死猶抱節寡兒若喪婦能不慙傷情應似門前栁逢春易發榮風吹一枝折還有一枝生為君委曲言願君再三聽須知婦人苦從此莫相輕樂天婦人苦征夫馬雙鬤初合便分離萬里丨丨不肯隨今日軍回身獨沒去時鞍丨别人騎張藉鄰婦哭征夫寡婦船范文正公鎮越民曹孫居中卒子幼家貧公助之以俸錢百緡治巨舟差老衙校送歸作詩一絶戒其吏曰過關津但以吾詩示之詩云十口相將泛巨川來時暖熱去凄然關津若要知名姓便是孤兒丨丨丨喪妻事類曰鰥老而無妻丨丨孟梁惠王喪耦丨其配丨詩序失良佐長孫后薨太宗曰內丨一丨丨以此益令人哀耳唐書不更娶曾參喪妻丨丨丨人問之曰以華元善也漢王駿為少府妻死因不復娶或問之駿曰德非曾參子非華元亦何敢娶管寧妻卒知故勸再娶寧曰每省曾子王駿之言意常嘉之豈違本心德宫之喪潘嶽誄楊仲武曰丨丨丨丨謂妻喪也六帖廬杖之制晉劉實字子真喪妻為丨丨丨丨終喪不御肉輕薄笑之實不以為意王龔妻亡與諸子並枝行服時人譏之鼓盆而歌莊子妻死惠子弔之則方箕踞鼓盆惠子曰與人居長子老身死不哭亦足矣又丨丨丨丨不已甚乎莊子曰不然是其始死我獨何能無概察其始而本無生非徒無生而本無形非徒無形而本無氣人且偃然寢於巨室而我噭噭隨而哭之自以為不通乎命故止買道而葬季子羔葬妻犯人之禾申祥以告請更之子羔曰以吾為邑長於斯也丨丨丨丨後難繼也葬妻行志後漢符融貧妻亡無以殯斂鄉人欲為備棺服融不受曰古之丨者棄之中野唯丨子可以丨其丨但即土埋藏而已喪妻傷神魏荀粲字奉倩常以婦人才智不足論宜以色為主聘曹洪女有色專房歡宴後婦病亡未殯傳嘏往唁粲不哭而神傷嘏曰子之娶也遺才而好色此自易遇今何哀之甚粲曰佳人難再得顧逝者有傾城之色未可謂之易遇痛悼不已嵗餘亦卒祥服作詩孫楚妻亡至丨丨丨丨示王武子王武子曰未知文於情生情於文生覽之悽然增伉儷之重世説慢服會宴廬江太守周龕明日當除婦服今日請客奏伎丞相長史周顗等三十餘人同會隗奏曰天嫡妻長子皆杖居廬故周景王有三年之喪既除而宴春秋猶譏况龕匹夫暮宴朝祥慢服之愆難逭請免龕官顗等知龕有喪吉會非禮各奪俸一月侍母不憂李畬妻亡時母病恐悲傷約家人無以哭聞母所朝夕省侍無憂色六帖抱兒以泣唐武侍御喪其配斂其遺服櫛珥鞶悅於亡月日十五日出陳之丨嬰丨丨丨有浮屠者諭之曰是豈有益耶吾師云人死則為鬼鬼且復為人隨所積善惡受報環復不窮也西方有佛焉其土大樂能啚是佛而禮之往生莫不如意韓愈聞而弔之曰啚西方兮道之勤以妄塞悲兮慰新魂韓弔武侍御畫佛文夢臼無釜江淮王生善卜有賈客張贍將歸丨炊丨中問王生生曰君歸不見妻矣臼中炊丨丨也賈客歸妻已卒酉陽雜爼葬玉埋香孟蜀時秦州節度使王承儉築城獲瓦棺中有石刻曰隋渭州刺史張崇妻王氏銘文云深深丨丨鬱鬱丨丨喪妻不服漢魏陳蕃丨丨還葬鄉里人畢至唯許劭不往或問之曰仲舉性峻峻則少通不可造又時人多丨行妻丨六帖哀妻不衰劉庭式未第時議娶既第而妻瞽卒娶之後庭式倅密州而妻死庭式喪之踰年而哀不衰不肯復娶軾問之曰哀生於愛愛生於色今君愛何從生哀何從出乎庭式曰吾知喪吾妻而已吾若緣色而生愛緣愛而生哀色衰愛弛吾哀亦忘則凡揚袂倚市目招而心挑者皆可以為妻耶軾深感其言坡集作傷往賦人之所以取貴於奔走者情也而誕者以遺情為智豈至言耶豫授室九年而鰥痛若人之天閼弗遂也作賦以傷之冀夫覽者有以增伉儷之重云歎重處之邑邑兮憤伊人之我遺情可殺而猶毒境當歡而復悲我今怨夫若人兮曽旭旦而潛暉飄零偏反之蕚倐忽蜉蝣之衣川走下而不還露迎湯而昜晞恩已甚兮難絶見無期兮永思我行其野農民桑耉舉按來饁亦在林下我觀於途禆販之夫同荷均潔荆叉布襦物莫失儷以孤處我方踽踽而焉如我復虛室自凄涼兮心伊鬱心伊鬱兮將語誰坐匡牀兮撫嬰兒何所丐沐兮何從仰飴襦袴在身兮首圍蹉跌鞶囊附臂兮餘馥葳㽔誠天性之潛感顧童心兮如癡嘵然有難狀之慕漠然減好弄之姿指遺挂兮能認遡空帷兮欲歸我入寢宫痛人亡兮物改其容寶叉墜兮絃柱純瑶臺傾兮鏡奩空寒爐委灰虛幌多風隙駒晨轉窗蟾夜通步搖昏兮網粘翡翠芳褥掩兮塵化蚷蛩閲刀尺之餘澤見巾箱之故封玩服儼兮猶具繁華謝兮焉從已焉哉冉冉生死悠悠古今乘彼一氣兮聚散相尋或鼓而興或罷而沉以無涯之情愛悼不駐之光隂諒自迷其有分徒終怨於匪忱彼蒙莊兮何人獨纍歎而長吟劉禹錫著悼往賦西風悲兮敗葉索索照陳根兮秋日將落倣佛兮夢與神遇顧瞻九原兮豈其可作我有悲秋之羽蟲兮自傷時去物改擁舊柯而孤吟四郊莽蒼聲斷裂兮久而不勝其歎音生平之梗槩兮欲蕭蕭而去眼將絶之言語兮忽歷歷而經心謂逝者有知兮何喜而棄此去也謂逝者無知兮誰職為此夢也憑須臾之不再得兮哀此言之不豫聽迥回廊窈窕月皓白兮無復曩時之履聲攬平生之餘製兮香澤其尤未沫雖飄飄其日敗兮吾不忍改其此佩愁薨薨其中豫兮如醳酒之不化歘别離之幾時兮誰與夏日冬夜自我先兮一無窮在我後兮亦一無窮六七十便了一生兮何異木末之有狂風待外物而造適兮固不若放之自得之場彼莊生之一缶兮亦何異荀氏之神傷固吾知藏於天者至精交於物者甚粗飲泣為昏瞳之媒幽憂為白髮之母憂來泣下不可安排兮如孟泮之捧土彼寒暑之寖化兮天地尚不能以朝暮目熒熒而不寐兮夜亹舋而過中雖來者猶不可待兮恐不及當時之從容山谷詩集思人荏苒冬春謝寒暑忽流易之子歸窮泉重壞永幽隔私懷誰克從淹留亦何益僶俯恭朝命回心返初役望廬丨其丨入室想所歷幃屏無倣佛翰墨有餘迹流芳未及歇遺挂猶在壁悵恍如或存周遑中驚惕如彼翰林鳥雙栖一朝隻如彼遊川魚比目中驚拆春風緣隙來晨霤承簷滴寢息何時忘沉憂日盈積庶幾有時衰莊缶猶可擊潘嶽悼亡感月存亡丨丨一潛然月色今宵似往年何處曽經同望月櫻桃樹下後堂前樂天悲逝者院房空半死梧桐老病身重泉一念一傷神手携稚子夜歸丨月冷丨丨不見人樂天悼亡簾旌斷繞壁秋聲蟲絡絲入簷新影月低眉牀帷半故丨丨丨仍是初寒欲夜時樂天舊房古今合璧事類備要前集卷二十八
