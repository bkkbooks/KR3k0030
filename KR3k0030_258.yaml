body:
  text: 古今合璧事類備要别集卷五十二宋謝維新撰衆木門栁附楊格物總論見前栁花兹不贄具事類樊圃折栁丨丨狂夫瞿瞿詩取火春丨榆栁之丨周禮眠三起漢畹中有桞狀如人形號曰人桞一日三丨丨丨三輔故事又溫叟詩話注驅百邪正月旦取桞枝著戶以丨丨丨齊民要術號桞下展禽之家植栁行德惠因丨丨丨惠一曰邑名淮南子伏栁下有革子尹文子叔儋子相與為友聞楚成王賢俱往見之至嶔巖之間卒逢飄風暴雨共丨於空丨之丨衣寒糧乏自度不能俱活以革子為賢乃併以衣糧與之二子遂凍革䬫而死革子見楚王王知其賢陳酒設鐘鼓而樂之子操琴而作别離之音楚王賜以百金使葬二子亞夫屯漢周丨丨丨軍細栁本傳張敞街丨丨為京兆尹走馬丨有栁終唐時曰章臺栁故杜詩云京兆空栁市杜詩注宅邉五栁陶潛丨丨有丨丨樹因以為號陶集家有一栁晉嵇康性絶巧能鍛丨丨丨丨乃激水以圜之夏月甚涼居其下游戲以煅晉文士傳何故盜種陶侃鎮武昌性纎密好問類趙廣漢在武昌嘗課諸營種栁都尉夏施盜種於己門後侃過見之問曰武昌西門栁丨丨丨丨于此施服其罪晉書少時所種桓溫自江陵北行往觀丨丨丨丨栁處皆十圍慨然歎曰木猶如此人何以堪攀枝執條泫然流涕同上王恭美姿丨丨丨丨容人多悅之或目之曰濯濯如春月之栁其為人所慕愛如此丨丨張緒當年齊劉俊之為益州刺史獻蜀栁數株枝條甚長狀如絲縷武帝植之於大昌靈和殿前賞玩歎曰楊栁風流可愛似丨丨丨丨其見賞如此齊桞質秋零見前相門注栁葉蟬翳顧愷之字長康癡信小術桓𤣥以一葉栁給之曰此蟬翳葉也由是俗號之有三絶晉書栁木尺許隋高潁孩㹘時家有丨丨高丨丨亭亭如蓋里中父老曰此家當出貴隋書御道樹栁隋煬帝自板渚引河達于淮海謂之丨河河畔築丨丨丨名曰隋堤同上中書怪栁吕渭遷禮部侍郎始丨丨省有古丨丨建中末枯死德宗自梁還復榮茂人以為瑞栁渭令貢士賦之帝聞不以為喜君豈堪折天寶中韓翊將妓栁氏歸置之都下三嵗不迓詩曰章臺栁章臺栁昔日青青今在否縱使長條似舊垂也應攀折他人手答曰楊栁枝芳菲節所恨年年贈離别一葉隨風忽報秋縱使丨來丨丨丨詳見前集妓女門人遂以名白樂天有寵姬名小蠻善唱楊栁枝丨丨丨曲丨之古今詩噭媧陵湧出虢州刺史王竒大奏女丨丨云天寶十三載大雨晦冥忽沉一夜河上有人覺風雷聲曉見其墳丨丨上主雙栁樹高丈餘下有巨石兼畫圖進酉陽雜爼永豐移植宣宗聞樂府唱白居易栁枝詞云丨丨南角荒園裏盡日無人屬阿誰奉敕丨丨坊中用汁染衣李固言未第時行古栁下聞有彈指聲者固問之曰吾栁神九烈君也丨栁丨丨子丨矣科第無疑果得藍袍當以棗糕祀我固因許之未久及第三峯集結帶乞詩栁枝乃洛中里娘也聞誦義山燕臺詩乃折栁丨丨贈義山丨丨麗情集賜圈辟癘李適天子春幸梨園并渭水祓除則丨細栁丨丨丨孔六帖對栁斂容韋虛心維子初維為郎蒔栁于庭及虛心兄弟居郎省丨之輒丨丨孔六帖蒔栁成隂范希朝遷振武節度使初單于城池不樹希朝命丨丨數嵗丨丨别墅栁浪王維有丨丨在輞川有丨丨並同上古宅栁怪有人於丨丨遇丨將軍者驗之乃一株枯栁爾宣室志楊生稊枯楊丨丨老夫得其女妻生華枯楊丨丨老婦得其士夫並易大過葉百步楚養由基善射去楊丨丨丨百發百中戰國策栁數株見前栁注更植以桐梁修仁監造蓬萊宫種白楊丨丨丨丨詳見桐門移植于禁見前栁注事類鬱鬱丨丨園中栁文選嫋嫋隔户楊栁弱丨丨恰似十五女兒腰誰謂朝來不作意狂風挽斷最長條杜䕃修衢弱栁丨丨丨潘嶽隂半路垂丨上丨丨結草早知音梁簡文簡樹依樓楊栁非花丨丨丨自覺春枝邉通粉色葉裏映朱輪帶日交簾影因吹掃席塵梁元帝枝到地只道梅花發那知栁亦新枝丨總丨丨葉葉自開春紫燕時翻羽黃鸝不露身漢南因老盡灞上遠愁人杜甫泄春光漏丨丨丨有栁條杜甫撓春風明年更有新條在丨亂丨丨卒未休羅隱宫前枝莫折丨丨楊栁丨元宗曽向笛中吹張祐檻前梢青栁丨丨丨杜一把絲丨丨栁丨收不得和風搭在玉欄干古詩千條金御栁青青拂地垂丨丨丨縷萬條絲如今挽作同心結將贈行人知不知劉夢得長拂馬已帶黃金縷仍殘白玉花丨時須丨丨密處共藏鴉眉細從他斂腰輕莫亂斜李義山不勝鶯緑絲條弱丨丨丨蘇家小女共知名楊栁風前别有情剝條盤作銀環樣捲葉吹為玊笛聲白樂天三兩株隋堤栁嵗久年深盡衰朽風飄飄兮雨蕭蕭丨株丨丨汴河口老枝病葉愁殺人曽經大業年中春事起蕭牆禍生人事變晏駕不得歸秦中土墳數尺何處葬吳宫臺下多悲風二百年來汴河路莎草和烟朝復暮後王何以鑒前王請看隋堤亡國樹百千條陶令門前四五樹亞夫營裏丨丨丨何似東都正二月黃金枝映洛陽橋並前人覆宫牆露井夭桃春未至遲日猶寒栁開早高枝低枝飛鸝黃千條萬條丨丨丨幾回離别折欲盡一夜東風吹又長毿毿拂人行不進依依送君無遠近青春去住隨栁條却寄來人以為信劉商出軍營高丨丨丨遠映橋曽逢兵火一時燒風流性格終難挫暖日還生萬萬條薛逢拂欄干金縷毿毿碧瓦溝六宫眉黛惹春愁晚來更帶龍池雨半丨丨丨半在樓溫飛卿緑絲縧碧玉裝成一樹高萬條垂下丨丨丨不知細葉誰裁出二月春風似剪刀賀知章黃金縷見前又陌頭楊栁丨丨色花飄雪栁掛九衢絲丨丨萬家丨如何憔悴人對此芳菲節武元衡枝嫋風葉含濃露如啼眼丨丨輕丨似舞腰白樂天青青色渭城朝雨浥輕塵客舍丨丨栁丨新勸君更盡一杯酒西出陽關無故人王維依依恨丨丨故國樊川丨半掩村橋半掩溪杜牧之半書蟲栁老丨丨丨坡密藏鴉隄邉楊栁丨丨丨隄上遊人雨髻丫于湖永豐坊裏丨丨丨丨舊腰肢曾見青青初種時看盡道傍離别恨爭教風絮不狂飛張文潜灞水橋邉章臺街裏翻輕吹丨丨丨丨送落暉錢思公終日似忘情白雲溪畔種還生風擺長條拂水輕應為繁華厭金谷依依丨丨丨丨丨种明逸當年成底事含煙帶雨過平橋嫋嫋千緑復萬條張令丨丨丨丨丨風流才似女兒腰吕居仁園林俱不及揚子江頭流水浸長安陌上暖風吹黃金瓔珞雪晴後碧玉瓏璁春盡時端的丨丨丨丨丨等閒臺榭便相宜思量也是多情物慣與人間贈别離陶弼煙雨弄輕柔絲絲丨丨丨丨丨偏稱黃鳥與白鷗才著一蟬嘶晚日西風容易梗成秋朱正父飛花入禁牆破篋猶存舊賜香輕將魂夢别昭陽只知鏡裏春難駐不信人間夜更長父母家貧容不得君王恩重死難忘東風二月垂楊栁猶解丨丨丨丨丨陸雲西䕃碧海長栁丨丨丨夾廣津修楊丨丨丨並文選䕃御溝垂楊丨丨丨謝元暉宜同折巫山巫峽長垂栁復垂楊同日丨丨丨故人還故鄉梁元帝不及栽白頭種松桂他日見成林丨丨丨楊桞明年即有隂白樂天初生時白楊丨丨丨乃在豫章山上葉拂青雲下根通黃泉古詩多悲風白楊丨丨丨蕭蕭愁殺人古詩樂府絲絲弄碧栁隂直煙裏丨丨丨丨隋堤上曾見幾畨拂水飄綿弄行色登臨望故國誰識京華倦客長亭路年去嵗來因折柔條過千尺食閒尋舊踪跡又酒聽哀絃燈照離席梨花榆火催寒愁一箭風快半篙波暖回頭迢遞使數驛望人在天北悽惻恨堆積漸别浦縈回津堠岑寂斜陽冉冉春旡極記月榭携手露橋聞笛沉思前事似夢裏淚暗滴蘭陵王淺淺柔黃愛日輕明新雪後媚眼星星漸欲穿窗牖不待長條傾别酒一枝已入離人手丨丨丨丨輕臘透過盡氷霜便與春爭秀强對青銅簪白首老來風味難依舊初小閣隂隂人寂後翠幕褰風燭影搖疏牖夜半霜寒索酒金刀正在柔荑手絲薄粉香光欲透小葉尖新未放雙眉秀記得長條垂鷁首别離情味還依舊偏近遊人手桃蕚新香梅落後暗葉藏鴉冉冉垂亭牖舞团低迷如著酒輕絲丨丨丨丨丨雨過朧朧斜日透客舍青青特地添明秀停話揚鞭回别首渭城荒遠無交舊賀方回並周美成曾為繫歸舟西城楊栁弄春柔動離憂淚難收猶記多情丨丨丨丨丨碧野畫橋當日事人不見水空留韶華不為少年留根悠悠幾時休飛絮落花時候一登樓便傷春江都是淚流不盡許多愁楓格物總論楓樹似白楊大數圍高亦數丈枝幹修聳葉圓而岐分三角有脂而香每至秋抄其葉皆赤簇簇如錦爛然可觀在在有之事類聶天風楓丨丨則鳴故曰丨聶爾雅至霜後漢宫殿中多植之丨丨丨葉丹可愛故騷人多稱之同上子如鴨卵楓香樹似白楊葉圓而岐分有脂而香其丨又丨丨丨二月花發著實九月熟曝乾可燒嵇含記老化羽人丨楓丨為丨丨宋齊丘化書械化楓林黃帝殺蚩尤於黎山之丘擲其丨於宋山之上丨為丨木之丨王瓘廣軒轅本記鳯集楓上後周武帝梁州上書丨丨于丨丨羣鳥列侍以萬數本史詩集楓樹湛湛長江水上有丨丨林阮籍楓葉曉霜丨丨丹謝靈運楓林雲帆丨樹林杜青楓丨丨滿瀟湘李白赤楓丨葉丨林百舌呼杜雙楓掇棹青楓浦丨丨舊已摧多楓回首過津口而丨丨樹林並同上萬木稠背日丹楓丨丨丨千林墜一夕起霜風丨丨丨曉紅無端逐流水流向武林東名賢集紅灑舟萎緑映葮青疏丨分浪白落葉丨行丨仍持送遠客魏簡文帝赤愁客江頭丨葉楓丨丨嚴武楓林晚遠上寒山石徑斜白雲深處有人家停車坐愛丨丨丨霜葉紅於二月花杜煙樹深千里楓林丨丨丨無朝無暮有猿吟元次山玉露凋丨丨丨傷楓樹林杜輦路暗丨丨江楓丨司空文明一張紅錦山寒江冷丹楓落爭渡行人簇晚沙菰葉蘋花飛白鳥丨丨丨丨夕陽斜山谷一林蜀錦丨鴻藏深丨楓葉翻丨丨寄語别家人路遙霜霰凜郭功古今合璧事類備要别集卷五十二
