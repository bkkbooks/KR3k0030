body:
  text: 古今合璧事類備要前集卷五宋謝維新撰地理門地事類統形地者丨元丨焉非止邱陵山川之謂也文中子積塊杞國有憂天地崩者曉之曰天積氣耳亡處亡氣地丨丨耳充塞四海奈何憂其壞列子秉隂地丨丨竅於山川記成形山嶽河海此積形成乎地者也列子在天成象在地丨丨易石骨地以丨為丨川為脉草木為毛土為肉博物志地肺金陵者洞墟之膏腴勾曲之丨丨注其地肥良曰膏腴水至則浮曰丨丨棊局陽動而隂靜天回而地逰地若浮舟方如丨丨楊炯渾天賦雞黃天如雞子地如丨子中丨居于天內天大而地小表裏有水四海之表浮于元氣之上天地者乘元氣載水而行晉志彈丸為國家言不足廣土宇奈何以丨丨地而困太平之民哉高適疏運軸地有三千六百軸春秋括地象方輿圓天為蓋丨地為丨宋玉大言賦以天為蓋則無不覆也以地為輿則無不載也淮南子行舟地常動而不止譬如人在舟中閉牖而坐舟行而人不知河圖一撮今夫地丨丨土之多及其廣厚載華嶽而不重振河海而不泄萬物載焉中庸五地司徒以土會之法辨丨丨之物一曰山林二曰川澤三曰邱陵四曰墳衍五曰原隰周禮上中下謂之三壤山林川澤邱陵墳衍原隰謂之五土纂要九地一為沙泥二澤池三沚崖四下田五中田六上田七下山八中山九上山揚子太𤣥注四極東至于泰邊西至于邠國南至于濮鉛北至于祝栗爾雅八柱天有八部九紀地有九州丨丨淮南子按河圖括地象云崑崙山為柱氣上通天崑崙者地之中也地下有丨丨柱廣十萬里有三千六百軸互相牽制名山大川孔穴相通八埏九州之外有丨丨東方曰沙海東南方曰沅澤南方曰丹澤西南方曰水澤西方曰泉澤西北方曰海澤北方曰塞澤東北方曰通澤此丨丨也淮南子八紘八埏之外有丨丨東北方之紘曰荒土東方之紘曰桑野東南方之紘曰衆安南方之紘曰反户西南方之紘曰炎土西方之紘曰沃野西北方之紘曰沙所北方之紘曰委羽同上八極八紘之外有丨丨東北方曰方土之山曰蒼門東方曰東極之山曰開明門東南方曰波母之山曰陽門南方曰南極之山曰暑門西南方曰編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都門北方曰北極之山曰寒門同上八極之廣東西南北相去各二億三萬餘里自地至天半八極之數晉地理志皇地祇地者其卦曰坤其神曰祇亦曰媪大而名之曰丨丨丨小而名之曰神州亦名后土物理論輿地圖丨丨之有丨古也自成周大司徒掌天下土地之圖以周知廣輪之數而職方氏之圖復加詳焉逮漢滅秦蕭何先收圖書始具知天下厄塞户口多少之差武帝元狩六年將立三子為王御史大夫奏丨丨丨請所立國乃開齊燕廣陵之封丨丨丨之名至是始見光武徇河北登城樓披丨丨丨指示鄧禹吕伯恭漢輿地圖序經緯高下地東西為緯南北為經山為積德川為積刑高者為生下者為死邱陵為牡溪谷為牝家語交易變化地者易也言養物懷任丨丨丨丨含吐應節故其立字土力於乙者為地春秋元命苞道里步數土有九山山有九塞澤有九藪風有八等水有六品合四海之內東西二萬八千里南北二萬六千里水道八千里通合真名川六百陸徑三千里禹使太章步自東極至于西極二億二萬三千五百里七十五步使竪亥自北極至于南極二億三萬三千五百里七十五步淮南子星辰分野秦地于天官東井與鬼之分野魏地觜觹參之分野周地柳七星張之分野韓地角亢氐之分野趙地昴畢之分野燕地尾箕之分野齊地虛危之分野魯地奎婁之分野宋地房心之分野衛地營室東璧之分野楚地翼軫之分野吳地斗女之分野前地理志渾沌鑿竅倏與忽時相遇於丨丨之地渾沌待之甚善倏與忽謀報渾沌氏之德曰人皆有七竅此獨無有嘗試鑿之七日而渾沌死應帝王篇蒙叟遺意曰上帝既剖渾沌氏以支節為山嶽以腸胃為江河一旦慮其掀然而興則下無生類矣于是孕銅於山澤滓魚鹽於江河俾後人攻取將有以苦渾沌之靈而致其不起也嗚呼渾沌氏則不起而人力殫焉羅隱女媧立極丨丨氏斷鼇足以丨四丨列子共工折柱丨丨氏與顓頊爭為帝怒而觸不周之山天柱折地維絶故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉列子康回憑怒地何故以東南傾楚辭康回共工名非堯時共工壺公縮脉費長房遇丨丨有神術能丨地丨千里聚在目前放之復如舊神仙傳車轍遍遊周穆王少好神仙常欲使丨丨馬跡丨於天下以倣黃帝焉乃乘八駿之馬奔戎為右造父為御又觴西王母于瑶池之上太平廣記金甌無缺梁武初議納侯景而未決夜出視事至武德殿猶言我國家猶若丨丨丨一傷丨今使受地詎是所宜史山事類産物山産也言丨萬丨釋名布氣山之為言宣也含澤丨丨調五神也春秋說題辭卷石今夫山一丨丨之多及其廣大草木生之禽獸居之寶藏興焉中庸積土丨丨成山風雨興焉荀勸學篇千巖晉顧愷之逰會稽人問山川之美答曰丨丨競秀萬壑爭流一簣譬如為山未成丨丨止吾止也論語子罕邱陵丨丨學山而不至於山是故惡夫畫也揚子土壤太山不辭丨丨故能成其大李斯書山名山頂曰冡亦曰巔亦曰椒山脊曰岡山大而高曰嵩小而高曰岑鋭而高曰嶠卑而大曰扈小而衆曰巋上大下小曰巘山有草木曰岵無草木曰峐石載土曰岨土載石曰崔嵬山東曰朝陽山西曰夕陽山足曰麓山穴曰岫山邊曰崖崖之高曰巖上秀者曰峯陬隅高者曰岊山坡曰坂山三襲曰陟山再成曰坯山中絶曰陘未及上曰翠微山屬曰嶧山狹而高曰巒巒山曰嶞土山曰阜曲阜曰阿大阜曰陵小陵曰邱說文釋名爾雅山鎮揚州其丨丨曰會稽荆州其丨丨曰衡山豫州其丨丨曰華山青州其丨丨曰沂山兖州其丨丨曰岱宗雍州其丨丨曰嶽山幽州其丨丨曰醫無閭冀州其丨丨曰霍山并州其丨丨曰常山職方氏鼇山渤海之東有大壑中有五山岱輿員嶠方壺瀛洲蓬萊臺觀皆金玉所居之人皆仙聖之種五山之根無所連著常隨潮波上下往來不得暫峙帝恐流于西極命䇿疆使巨鼇十五舉首而戴之始峙而不動湯問禹穴丨巡狩至㑹稽而崩因葬焉上有孔穴民間云禹入此穴馬遷傳秦始皇上會稽祭大禹望于南海而立石刻頌秦德史廬山周威王時生而靈神丨此丨世稱廬君故山取號焉丨丨者江陽之名嶽其形大背岷流靣彭蠡蟠根數百里東南有香爐山孤峯秀起游氣籠其上則氛氤若煙西南有石門山其狀似雙闕壁立千仞而瀑布流焉丨丨上天將雨則有白雲冠峯巖或亘崖中謂之山帶不出三日必雨神仙董奉曾種杏于此山白居易居丨丨二林間香爐峯下立草堂前有喬木修竹六帖鍾山建康東北十里有丨丨舊名金山漢末金陵尉蔣子文討賊戰亡靈發于山因立蔣侯祠焉號曰蔣山六帖終南山丨丨丨一名中南言在天中居都之南一名地胏可避洪水俗云上有神人乘船行追之不可及一名太乙東接驪山太華西連太白至于隴山北至長安城八十里南楚塞西有石室靈芝南有玉堂陽官丨丨丨有旱藕餌之延年狀類葛粉四皓綺里季等共入商洛漢高徴之不來共隱此山崔咸游丨丨丨乘月吟嘯至感慨淚下同上崑崙山丨丨之墟在西北方去嵩高五萬里地之中其高萬一千里出五色雲氣五色流水東南流黃水入中國為河一曰𤣥圃臺一曰積瑶房一曰閬風臺一曰華蓋一曰天柱皆仙人所居十洲記云丨有三角一角正北名閬風巔一角正西名𤣥圃臺一角正東名崑崙宫王母居焉仙傳拾遺西王母所居崑崙之圃閬風之苑有城三千里玉樓十二左帶瑶池右環翠水太行山丨丨之丨其首曰歸山其上有金玉下有碧泉穆天子命駕八駿之乘赤驥之駟南征朔行徑絶雀道升太行南濟于河王烈嘗入丨丨聞雷聲往視之見丨石上破數百丈石中有一孔尺餘中有青泥流出烈取摶之隨手堅凝氣味如粳米飯按仙經云此石髓服之夀與天地齊狄仁傑親在河陽仁傑登丨丨丨反顧見白雲孤飛謂左右曰吾親舍其下同上羅浮山丨丨乃羅山浮山二山合體謂之羅浮在曾城博羅二縣之境高三千六百丈七十石室七十長溪周回三百三十七里浮山本蓬萊之一峯昔時洪水泛海斯來博于羅山崕巘皆合故合名之峯嶺秀拔四百餘里峯巒掩映三十二所上披雲霄下有深洞幽邃旁達約數十里號朱明曜真洞天有大小石樓相去五里皆孤高峻秀邈出雲表重簷四柱宛如樓閣樓間有石如鞍望之高五十餘步謂之鐵橋又有瑶石臺綵綺錯爛如霞錦迢迢獨出勢若削成絶頂有聚霞峯高三百丈周回二十餘里常有紫霞在于峯上洞中常有五百花首真人逰㑹開元二十六年奉勑建花首臺第三峯有竹大徑七尺圍節長丈二謂龍公竹常有鸞鳳棲宿山東有溪曰羅陽永泰中暑雨漲有青竹葉若芭蕉葉大隨水出須臾一竹闊二尺餘長丈二乃龍公竹也山有碧雞羣飛于絶巘或獨鳴于空林可見不可取天寶初詔道士申太芝祭山欲尋朱明洞時邑簿任知宣領耆舊尋見一洞以藤儋籠石斛垂一人下洞約五丈餘却出云下視無底日月星辰無不備初有白雲須臾散漫五色唐顔真卿早年典郡江南遇道士陶八八授與一刀圭碧霞丹令服之約他日相待于羅浮山後顔真卿為盧杞所陷令單車問罪于李希烈至汜水忽逢陶笑謂曰吉吉遂指嵩少而去真卿去汴州希烈僭號使人害公于近郊及希烈敗詔得歸葬偃師北山後有商人至羅浮忽見兩道人樹下圍棊一道士笑謂商人曰奉寄一書達吾家立札一封題寄偃師北山顔家商人至詢所居則塋莊也守塜老蒼頭得書大驚曰先太師親翰也因以藏于室子孫擇日發塜即已空矣徑往羅浮尋之竟無跡六帖九疑山蒼梧之川其中有丨丨丨在營道縣北九山相似行者疑惑故名之舜所葬在零陵縣界漢武帝南巡狩至于盛唐祀虞舜于九疑漢末有張禮正魏時有治明期南逰九疑俱遇西城君受虹景方乘雲上升唐明皇時道士申太芝遇異人告以丨丨丨舊有天樂一部嵗久化五野猪郡人部之化為五古器太芝往來果得之扣之音律相和杜陟常見江淮市人以桃核扇量米止容一升言于丨丨丨中得之同上九華山青陽縣南有九子山高數千丈有九峯如蓮花按圖徴名無所依據豫乃削其舊號加以丨丨之目傳之將來李白集天台山丨丨丨在剡即衆聖所降葛仙公山也漢明帝時劉晨阮肇入丨丨丨採藥失道食盡見桃實食之覺身輕行數里至溪滸持杯取水見一杯流出有胡麻飯溪邊二女子笑曰劉阮二郎捉向所失流杯來便迎歸作食既出無復相識至家子孫已十世矣蓬萊山丨丨丨海中之神山非有道者不至山海經自威宣燕昭使人入海求丨丨方丈瀛洲此三神丨諸仙人及不死之藥皆在焉黃金銀為宫闕未至望之如雲及到三山反居水下臨之風輒引船而去終莫能至封禪書秦始皇時齊人徐市等言海中有神山曰蓬萊方丈瀛洲仙人居之請發童男女數千人入海求神仙漢武帝遣方士入海求蓬萊峴山碑羊祜與從事鄒潤甫登丨丨垂泣曰自有宇宙便有此山由來賢達勝士登此遠望者多矣皆湮滅無聞潤甫對曰明公德冠四海道嗣前哲令聞令望當與此山俱傳後人為立廟及碑天山箭高宗時九姓衆十餘萬驍騎數十來挑戰薛仁貴發三矢輒殺三人於是狄氣懾降軍中歌曰將軍三箭定天山壯士長歌入漢關薛仁貴傳雍州山湧垂拱二年九月丨丨新豐縣露臺鄉大風雨震電有丨丨出高二十丈有池周三百畝池中有龍鳳之形禾麥之異武后以為休應名曰慶山唐五行志華州山移永昌中丨丨赤