body:
  text: 古今合璧事類備要外集卷七宋謝維新撰祭祀門祖宗配饗附功臣配饗儒先配饗禮經考索祖宗配饗之說有三有以郊祀而配饗者有以明堂而配饗者有以禘祫而配饗者周人郊祀后稷以配天是郊祀之配饗也周公宗祀文王於明堂以配上帝是明堂之配饗也虞夏禘黃帝祖顓帝而宗堯禹殷周禘嚳祖契而宗湯祖文王而宗武王是禘祫之配饗也是禮也雖用之於配饗也有不同而其所以為尊祖敬宗之意則一而已矣自時厥後如用之於郊而以始祖配用之於明堂而以嚴父配用之於禘祫則禘其祖之所自出而以其祖配皆是也其它如人臣配食於祖宗則以其有功於國家也賢人配食於先聖則以其有功於斯道也因以附見於其末云事類殷薦丨丨之上帝以配祖考易以侑以妥丨丨詩必祭郊則曷為丨丨稷王者必以其祖配王者曷為必以其祖配自內出者無匹不行自外至者無主不止公羊春秋郊嚳有虞氏禘黃帝而丨丨祖顓而宗堯郊鯀夏后氏禘黃帝而丨丨祖顓而宗禹郊冥殷人禘嚳而丨丨祖契而宗湯郊稷周人禘嚳而丨丨祖文王而宗武王記祭法后稷配思文丨丨丨天也詩又郊祀丨丨以丨天孝經又魯君孟春乘大路載弧韣旗十有二旒日月之章祀帝於郊配以丨丨天子之禮也記明堂位文王配宗祀丨丨於明堂以丨上帝孝經尊祖配生民丨丨也后稷生于姜嫄文武之功起於后稷故惟以丨天焉詩嚴父配孝莫大於丨丨嚴父莫大於丨天則周公其人也孝經我將我享丨丨丨丨維羊維牛維天其右之儀式刑文王之典日靖四方伊嘏文王既右饗之詩是饗是宜皇皇后帝皇祖后稷享以騂犧丨丨丨丨降福孔多周公皇祖亦其福女詩用高祖配漢武帝乾封元年修封祠太一五帝於明堂上坐合高皇帝祠坐對之注是時未以高皇配天光武以來乃配之劉原父云彼王莽奏事文帝祠泰一已丨丨丨丨矣何謂未乎郊祀志祀五帝配章帝元和二年宗丨丨丨於孝武所作汶上明堂以光武丨祀皇天配魏明年丨皇帝丨丨於圓丘以始祖虞舜配文皇帝配晉武帝祀丨丨丨於明堂以丨上帝元皇帝配孟春辛日祈穀祀感生帝於南郊以丨丨丨丨武德正觀之制大享之外每歲立春立夏季夏立秋立冬郊祀並依周禮其配食及星辰從祀亦然正觀中奉高祖配圓丘丨丨丨丨感帝餘依武德制景皇帝配大唐武德初定令每歲冬至祀昊天上帝於圓丘以丨丨丨丨五方上帝注永泰二年杜鴻漸奏冬至祀昊天上帝夏至祀皇地祇請以太祖丨丨丨丨享又夏至祭皇地祇於宮城之北郊十四里為方丘壇因隋制以丨丨丨丨牲用黃犢二奉高祖配貞觀中丨丨丨丨地祇並通典以神堯配冬至祀昊天上帝於圓丘丨高祖丨丨皇帝丨唐禮樂志郊丘並配丨丨諸祠常以高祖太宗丨丨至開元十二年蕭嵩始定禮而祖宗之配定矣六帖帝祇請配永泰二年杜鴻漸奏冬至祀昊天上丨夏至祀皇地丨丨以太祖景皇帝丨享孔帖祭南郊配本朝乾德元年正月甲子合丨天地於丨丨以宣祖丨初有司議以僖祖升配張昭獻議曰宣祖積纍勳伐肇基王業請奉以配饗從之長編祭圓丘配真宗咸平二年十二月合丨天地于丨丨以太祖太宗配又神宗熙寧元年十一月丨昊天上帝于丨丨以太祖丨罷合享也藝祖文考仁宗康定二年南郊改元制皇穹后祇勔瞻嘉享之厚丨丨丨丨毖陳升侑之嚴藝祖神宗慶厯四年制皇穹厚地之合丨丨丨丨之配有事明堂仁宗皇祐二年丨丨丨丨合祭天地奉太祖太宗真宗並配將來明堂徽宗政和七年詔丨丨丨丨專以配帝嚴父餘悉移於大慶文德殿以伸昭事至孝之心侑神作主仁宗景祐二年詔禋天祀地則有丨丨丨丨之尊審禘合食則有百世不遷之主嚴父配天仁宗景祐二年詔昔商周之際長發大禘丨丨丨丨逮於漢氏亦能尊二宗立廟樂朕甚慕之我藝祖之受天命建大業可謂有功二聖繼統重熙纍洽可謂有德其令禮官稽案典籍辨崇配之序定二祧之位用元豐禮自元豐分南北郊至政和乃克行之建炎二年上祀圜丘獨祭上帝而配以太祖丨丨丨丨也用元祐禮紹興十三年郊祀始設大神大示及太祖太宗配位自天地至從祀諸神凡七百七十有一蓋丨丨丨丨云禮官所請今歲時常祀則以太祖配冬至圜丘太宗配祈穀大雩髙宗配明堂宗祀蓋尤延之為丨丨時丨丨云朝野雜記王臨川郊宗議詳見前明堂類功臣配享龍配古者官有大功則配食其神故勾丨丨食於社棄配丨丨食於稷並後祭祀志與享盤庚曰古我先王暨乃祖乃父胥及逸勤豫敢動用非罰世選爾勞豫不掩爾善兹豫大享於先王爾祖其從丨丨之注古者祿功臣配食於廟大享蒸嘗也所以不掩汝善書作祀成王時周公曰王肇稱殷禮祀於新邑咸秩無文豫齊百工從王於周豫惟曰庶有事今王即命曰記功宗以功丨元丨惟命曰汝受命篤弼丕視功載乃汝其悉自教工注今王就行王命於洛邑曰當記人之功尊人亦當用功大小為序有大功則列大祀謂功施於民者惟天命我周邦汝受天命厚矣當輔大天命視羣臣有功者記載之乃汝新即政其當盡自教衆官躬化之書祭大蒸周禮司勳凡有功者銘書於王之太常丨於丨丨司勳詔之注生則書於王旌以識其人與其功死則於蒸先王祭之詔謂告其神以辭也大司勳登明堂戰於殽也明日晉襄公使萊駒以戈斬之囚呼駒失戈狼曋取戈以斬囚禽之以從公乘遂以為右箕之役先軫黜之而立續簡伯狼曋怒其友曰盍死之曋曰吾未獲死所也其友曰吾與女為難曋曰周志有之勇則害上而不丨於丨丨云云注明堂祖廟所以策功序德不義之士不得升左文二祀安于趙簡子丨丨丨於廟智伯請彊簡子殺安于安于曰我死國安趙氏定矣乃縊而死趙氏祀之左祀曹真魏丨丨丨於太祖廟本志祭功臣今漢丨丨丨於廟庭周禮注祀功臣魏祫太祖廟丨丨丨二十九人魏志配武成周播上元中詔擇古名將十人丨享丨丨廟侑孔子播奏太公古賢今其下稱亞聖孔子十哲皆當時弟子今所配年世不同請罷之詔可配宗廟屈突通房𤣥齡丨享太丨丨庭李績馬周高宗廟劉幽求蘇瓌睿宗廟張說元宗廟郭子儀代宗廟苗晉卿裴冕肅宗廟李晟德宗廟裴度憲宗廟並孔六帖答舊勳真宗咸平二年趙普配享太祖廟庭制識冠人彞才高王佐翊戴興運光啓鴻圖雖吕望四伐之勳蕭何指蹤之效無以過輔弼兩間周旋三紀茂巖廊之碩望分屏翰之劇權正直不阿始終無玷宜預享於大蒸永同休於宗祏於為茂典以丨丨丨答元勳神宗熙寧八年韓琦配享英宗制功懋者賞惟其稱德厚者報不可忘命冊褒崇舊史有追封之典祝嘏躋配前書存與享之文惟時故老翼我前朝才資沈偉宇量恢宏勇義出於至誠朴忠可以大受盡瘁於國利無知而不為任重於時事雖難而必濟惠澤有加於四海謀猷實紀於三朝是用進於列考之清祏俾序功臣於大蒸上以慰祖宗之靈下以為忠義之勸惟兹盛美以丨丨丨太祖廟庭趙忠獻王名普字則平幽州人位至中書令曹武惠王名彬字國華真州人位至樞密使並配享丨丨丨丨真宗廟庭李文靖公名沆字太初洺州人擢進士甲科位至丞相王文正公名旦字子明魏州人中進士第位至太尉曹武穆公名瑋字寶臣武惠王之子至樞密並配享丨丨丨丨仁宗廟庭呂文靖公夷簡字坦夫壽州人進士及第位至丞相以太尉致仕配享丨丨丨丨韓琦嘗言仁廟議配享清議皆與沂公不與申公誠意不可欺如此英宗廟庭韓忠獻王名琦字稚圭相州人中進士第二人位至丞相贈尚書令配享丨丨丨丨神宗廟庭富文忠公名弼字彥國河南人舉茂才異等位至丞相拜司徒配享丨丨丨丨英宗廟庭曾宣靖公名公亮字明仲泉州人中進士第位至丞相以太傅兼侍中致仕配享丨丨丨丨哲宗廟庭司馬文正公名光字君實陜州人舉進士甲科位至丞相贈太師配享丨丨丨丨孝宗廟庭陳文正公名康伯字長卿信州人中進士丙科位至丞相贈太師配享丨丨丨丨並言行録高宗廟庭祖宗故事大臣配享皆祔廟後議之若趙韓王曹秦王之配享太祖蓋真宗咸平時而韓魏王曾魯公之配享英宗皆其身薨日降制亦在祔廟十數年後永思陵復土翰林學士洪邁言聖神武文憲孝皇帝祔廟有期所有配食臣寮先期議定臣兩蒙宣諭欲用文武臣各兩人文臣故宰相贈太師秦國公諡忠穆呂頤浩特進觀文殿大學士諡忠簡趙鼎武臣太師蘄王諡忠武韓世忠太師魯王諡忠烈張俊此四人皆一時名將相合于天下公論望付侍臣詳議以聞議者皆以為宜從之祕書少監楊萬里獨謂張丞相浚不與配食為非宜爭之不能因補外去國焉寶文閣待制吳揔上疏請以其父璘配享廟庭不報朝野雜記韋挺等議正觀十六年有司言禮功臣配享於廟庭禘享則不配依令禘祫之日功臣並得配享太常丨丨丨丨曰古者臣有大功享祿其後子孫率禮潔粢豐盛礿祀蒸嘗四時不輟國家大祫又得配焉所以昭明其勳尊崇其德以勸嗣臣也其禘及時享功臣皆不應享通典杜甫朝饗太廟賦生𢎞佐命之道死配鬼神之列則殷劉房魏之勳是可以中摩伊呂上冠巙卨代天之工為人之傑丹青滿地松竹高節向不遇反正撥亂之主曾何以措其筋力與韜鈐載其刀筆與喉舌使祭則與食則配若斯之盛也柳宗元監察使壁記事所有功烈者示報德也不肅則無以勸善先儒配饗孔子配唐武德二年始詔國子學立周公孔子廟七年高祖釋奠焉以周公為先聖丨丨丨注配從食也顏回配太祖正觀二年太宗罷周公升孔子為先聖以丨丨丨丘明配正觀四年詔州縣學皆作孔子廟二十一年詔左丨丨等二十二人皆丨享之注左丨丨卜子夏公羊高穀梁赤伏勝高堂生戴勝毛萇孔安國劉向鄭衆賈逵杜子春馬融盧植鄭康成伏䖍何休王肅王弼杜預范寧𤣥宗開元二十八年詔春秋二仲上丁祭之張良配開元十九年始置太公尚父廟以留侯丨丨丨中春中秋上戊祭之牲樂之祭如文宣出師命將發日引辭於廟仍以古名將十人為十哲配享享留侯關播正元中奏太公稱大賢下乃置亞聖義有未安而仲尼十哲皆當時弟子今以異時名將列之弟子非類也請但用古今名將配享去亞聖十哲之名自是惟丨武成王及丨丨而諸將不復祭矣並唐禮樂志指白起本朝太祖幸武成王廟厯觀兩廊所畫名將以杖丨丨丨曰起殺已降不武之甚胡為受享於此命去之太祖詔吏部尚書張昭工部尚書竇儀别加裁定取功業始終無瑕者癸巳昭等與儀請升漢晉宋後魏北齊後周書凡二十三人退魏漢後議晉北齊隋唐凡二十二人詔升退如昭等議長編孔子祝文惟夫子固天攸縱誕降生知經緯禮樂闡揚文教餘烈遺風千載是仰俾兹來學依仁游藝謹以制幣犧齊粢盛庶品祇奉舊章式陳明薦以先師顏子配顏子祝文敢昭告於先師顏子爰以仲春率遵故實敬修釋奠於先師顏子惟子庶幾具體德冠四科服道聖門實致壼奧式陳明獻從祀配神並通典韓愈孔子廟碑自天子至郡邑守長通得祀而遍天下者唯社稷與孔子為然而社祭土稷祭榖句龍與棄乃其佐享非其專主又其位所不屋而壇豈如孔子用王者事巍然當座以門人為配自天子而下北面跪祭進退誠敬禮如親弟子者句龍棄以功孔子以德固自有次第哉自古多有以功德得其位者不得常祀句龍棄孔子皆不得位而得常祀然其祀事皆不如孔子之盛所謂生人以來未有如孔子者其賢過於堯舜逺者此其效歟郡邑皆有孔子廟或不能修事雖設博士弟子或役於有司名存實亡失其所業獨處州刺史鄴侯李繁至官能以為先既新作孔子廟又令工改為顔子至子夏十人像其餘六十子及後大儒公羊高左丘明孟軻荀况伏生毛公韓生董生高堂生揚雄鄭𤣥等數十人皆圖之壁選博士弟子必皆其人又為置講堂教之行禮肄習其中置本錢廩米令可繼處以守廟成躬率吏及博士弟子入學行釋菜禮耆老嗟嘆其子弟皆興於學鄴侯尚文其於古記無不貫達故其為政知所先後可歌也已乃作詩曰惟此廟學鄴侯所作厥初庳下神不以宇先師所處亦窘寒暑乃新斯宮神降其獻講讀有常不誡用勸揭揭元哲有師之尊羣聖嚴嚴大法以存像圖孔肖咸在斯堂以瞻以儀俾不惑忘後之君子無廢成美琢詞碑石以贊幽始司馬光通鑑論斷自孫吳以降皆以勇力相勝狙詐相高豈足數於聖人之門而謂之武哉乃復詔引以偶十哲之目為後世學者之師使太公有神必羞與之同食矣古今合璧事類備要外集卷七
