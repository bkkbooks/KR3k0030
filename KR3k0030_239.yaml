  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_239-1a, image: WYG0941/WYG0941-0212c.png}
body:
  text: 古今合璧事類備要别集卷三十三宋謝維新撰花卉門朱槿花格物總論朱槿花莖葉皆如桑葉光而厚樹髙止四五尺而枝葉婆娑自二月開花至中冬即歇其花深紅色五出大如蜀葵有蘂一條長於花葉上綴金屑日光所鑠疑若熖生一叢之上日開數百朵朝開暮落插枝即活一名赤槿一名日及千葉者尤佳詩所謂蕣華正謂此也事類莊子悲丨丨貴支離丨朱槿淮南子王璡簮汝陽丨丨嘗戴砑硝帽打曲上自摘紅槿丨置帽上極滑久而方安曲終花不墜以為能曰花奴資質明瑩必是神仙中謫墜來也開元遺事詩集朝榮丨丨殊可惜暮落實堪嗟白樂天秋開風露雖已冷天色已黃昏中庭有槿花榮春向一晨丨丨已寂寞夕隕何紛紛正憐少顔色復嘆不逡巡男兒老富貴女子晚昏姻頭白始得志色衰方事人後時不獲已安得如青春白樂天向殘照回頭向丨丨殘照更虛空李義山無宿花槿枝丨丨丨白樂天目自榮槿花一丨丨為丨前人夕不存君子芳桂性春濃秋更繁小人槿花心朝在丨丨丨文粹秋景繁風露凄凄丨丨丨可憐榮落在朝昏未央宫裏三千女但保紅顔莫保恩李義山夕陽愁籬外涓涓澗水流槿花半照丨丨丨欲題名字知相訪又恐芭蕉不耐秋竇鞏照日紅槿艷繁開丨丨丨陳草閣無時歇甲子雖推小雪天刺桐猶緑槿花然陽和長養丨丨丨却是炎州雨露偏張登槿籬護藥丨丨丨丨才通徑秦少游花中長命夾路疏籬錦作堆朝開暮落復朝開抽苞粔􅀈輕拖糝近蒂胭脂釅抹腮占破半年猶道少何曾一日不芳來丨丨却是渠丨丨換舊添新底用催楊誠齊黃槿花似去年赤板橋西小竹籬槿丨還丨丨丨時白槿英無艷色秋蕣晚丨丨丨丨何因栽種在人家使君只别羅敷靣爭解回頭愛白花白樂天柳花格物總論柳花樹高二三尺許裊娜枝條葉細而長三月結花如綿白飄落時輕狂撩亂漫空如雪彼楊花頗相類然樹低枝立葉亦短小不可以一槩論事類絮因風謝安姪女道韞乃謝奕之女雪下叔父安曰何所似也安兒子曰撒鹽空中差可擬道韞曰未若柳丨丨丨起晉書花入水楊丨丨丨經宿化為浮萍東坡詩注詩集蜂粘仰丨丨落絮杜雀啄丨丨江頭黃柳花度竹柳花間丨丨韓飛綿丨丨亂上空陳祖孫春隂妨丨丨丨柳絮白樂天春風吹丨丨丨柳絮賈島隨風起顛狂柳絮丨丨丨杜隨風去輕盈裊娜占年華舞榭裝樓處處遮春盡絮飛留不得丨丨好丨落誰家劉禹錫春風多寒食少天氣丨丨丨柳花杜晴天黯丨丨丨黯雪來送青春暮無意似多情千家萬家去劉夢得舞晴空輕飛不假風輕落不委地撩亂丨丨丨發人無限思前人㸃人衣輕輕栁絮丨丨丨杜玉關雪垂楊拂緑水搖艷東風前花開丨丨丨葉暖金窗煙李白汴水春煬帝行宫丨丨濱數株殘栁不勝丨晚來風起花如雪飛入宫墻不見人劉夢得飛無定灞岸晴來送别頻相偎相倚不勝春自家丨絮猶丨丨爭把長條絆得人羅隱飄揚起丨丨南海丨東鄰漠漠濛濛暗度春劉夢得楊柳糝徑丨丨楊花鋪白氊杜漫天楊花榆莢無才思祗解漫丨作雪飛韓愈絆惹風憑鶯說向楊花道丨丨春丨莫放歸白樂天獨愛風百花長恨風吹落惟有楊花丨丨丨古風愁殺人楊子江頭楊柳春楊花丨丨渡江丨鄭谷覆白蘋楊花丨丨丨杜麗人行欄乳燕楊花三月暮撩亂送春歸盡日間相逐無風亦自飛輕輕丨丨丨故故撲征衣莫上高樓望徘徊滿落暉蔡確浮蹤無拘束只道垂楊管别離楊花一去不思歸丨丨浪跡丨丨丨飛到蛛絲也不飛楊誠齊飛跡恣中間寒勒花遲却速殘暖將絮過忽吹還雪翻霽日光風急毬衮回廊曲榭間萬里雲天皆去處羣丨踪丨丨丨丨道渠催得春蘭著春不緣渠獨不闌前人樂府遺蹤何在似花還似飛花也無人惜從教墜拋家傍路思量却是無情有思縈損柔腸困酣嬌眼欲開還閉夢隨風萬里尋郎去處又還被鶯呼起不恨此花飛盡恨西園落紅難綴曉來雨過丨丨丨丨一池萍碎春色三分二分塵土一分流水細看來不是楊花㸃㸃是離人淚水龍吟坡飛綿取次蠢蠢黃金初脫後暖日丨丨丨丨粘窗牖不見長條低拂酒贈行應已輸先手鶯擲金梭飛不透小榭危樓處處添竒秀何日隋堤縈馬首路長人倦空思舊蝶戀花周美成桐花格物總論桐花樹生樹髙一二丈許中空枝幹扶疏葉大尺餘花數色有白者有紫者有紅者紅者謂之赬桐各有一種又謂之刺桐皆夏初始花也事類蕚深紅赬桐花嶺南處處有之自夏初生至秋蓋草也葉如桐其花連枝丨皆丨丨俗呼為赬桐花南方草木狀花鮮紅刺桐花溫陵城留從效重加板築植桐環繞其樹高大而枝葉蔚茂初夏開丨極丨丨如葉先萌芽而其花後發則五榖豐熟郡志詩集清明發春令有常候丨丨桐始丨何此巴蜀中桐花開十月白樂天緑雲委一株青玉立千葉丨丨丨亭亭五丈餘高意猶未已山僧年九十清淨老不死自云手種時一顆青桐子劉原父猶有花春色來時物喜初春光歸日興來餘更無人餞春行色丨丨桐丨管領渠楊誠齊壓尾花老去能逄幾箇春今年春事不開人紅千紫百何曾夢丨丨桐丨也俗塵前人白桐花春光到梅葉隂隂桃李畫丨丨已丨白桐花鼎臠集春氣生丨隨井丨丨白花飛濛濛曉枝滴甘露味落寒泉中梅聖俞紫桐花隔江樹誰與深春共憔悴丨丨一丨紫桐花徐抱獨在人世隴月山上館紫桐垂好隂可憐黯淡色無人知此心舜沒蒼梧野鳯歸丹穴吟遺落丨丨丨光華那復尋年年怨春意不競桃李林惟占清明後牡丹還復侵况此空館閉云誰恣幽深徒煩烏噪集不語山嶔岑滿院青苔地一樹蓮花簮自開還自落暗芳終暗沉爾生不得所我願裁為琴元徽之赬桐花見紅蕉喚起十年閩嶺夢赬桐花畔丨丨丨蘇子美刺桐花著朱欄雨著猩袍茜晴烘鶴頂丹因人顔色好護惜丨丨丨嵗寒集夾通衢猗猗小艷丨丨丨晴日薰風笑越姝只是紅芳移不得刺桐屏障滿中都陳陶聞得鄉人說丨丨丨丨丨刺桐花如後發始年豐我今至此憂民切只愛青青不愛紅丁謂古今合璧事類備要别集卷三十三
