body:
  text: 古今合璧事類備要續集卷二十七宋謝維新撰類姓門匡晉陽商音古今姓纂左傳魯匡邑宰匡句須之後廬山記威王時有匡裕先生事類詩解人頥史記匡衡東海人從博士受詩數射䇿不中至九乃中丙科又漢書字稚圭諸儒為之語曰無說詩匡鼎來匡說丨丨丨丨世為博士匡衡子咸亦明經歴位九卿家丨多丨丨丨者國下邳角音古今姓纂左傳齊卿族國氏代為上卿又鄭穆公子發字子國生輙字子耳生僑字子産以王父字為氏亦為國氏焉事類公朝直言魏國淵字子尼曹操辟為司空掾屬每於丨丨議論常丨丨正色退無私焉屯田豐實使典丨丨事倉庫丨丨同上文雁門商音古今姓纂風俗通周文王支孫以謚為氏事類蜀民立祠漢文翁盧江舒人為蜀郡守修起學官丨地大化吏丨為丨丨堂名震敵國魏文聘字仲業太祖曰卿真忠臣也為江夏太守有威恩丨丨丨丨賊不敢侵忠貞清實晋文立字廣休拜濟隂太守入為太子中庶子丨丨丨丨有思理器幹前在濟隂政事修明後事東宫盡輔導之節得人相慶皇朝文彦博字寛夫汾州介休人富弼同拜宣麻之日仁宗遣小黄門覘於庭士大夫皆以丨丨丨丨而天下謂之文富平章重事元祐初司馬光拜相起彦博為丨丨軍國丨丨六日一朝一月兩赴經筵邊事河防及朝廷大政令即與輔臣共議恩遇甚渥期年求去詔曰昔西伯善養老而太公自至魯穆公無人子思之側則長老去之公自為謀則善矣獨不為朝廷惜乎又曰唐太宗以干戈之事尚能起李靖於既老而穆宗文宗以晏安之際不能用裴度於未病治亂之效於斯可見彦博讀詔聳然不敢言去葢復留四年彦博請去不已復以太師河東節度使開府儀同三司致仕太師致仕彦博凝簡莊重有大臣體位將相者五十餘年徧歴公孤兩以丨丨丨丨雖位望隆貴而平居接物謙抑尊徳樂善如恐不及邵雍程顥程頥以道學名世居洛陽而彦博與之遊洛陽耆英元豐中與富弼及當時老成而有賢徳者十一人用白居易故事就弼地置酒相樂尚齒不尚官已而圖形妙覺僧舍謂之丨丨丨丨㑹司馬光為文序其事王拱辰守北都以書來諗曰拱辰亦家洛位與年不居數客後顧以官守不得執巵酒在坐席願預名其間幸無我遺其為時所嘉羨如此並同上文學知名文同字與可梓州梓潼人以丨丨丨丨操韻髙潔畫筆尤妙同既死蘇軾以文哭之曰孰能敦徳秉義如與可之和而正乎孰能養民厚俗如與可之寛而明乎孰能為詩與楚詞如與可之婉而清乎孰能齊寵辱得喪如與可之安而輕乎曾慥云與可下世潁濱作祭文云世在熈寜士銳而翾利誘于旁奔走傾旋公居其間澹乎忘言二蘇稱許如此不問可知㓂上谷宫音古今姓纂周冇蘇忿生為司冦子孫以官氏一云衞康叔為周司㓂支孫以官氏焉秦滅衞角家于上谷八代孫恂事類文武備足漢㓂恂字子翼上谷人丨丨丨丨有牧人御衆之才拜河内太守以輦車驪馬轉輸軍食前後不絶盜賊清淨拜汝南太守丨丨丨丨郡中無事恂素好學乃修鄉校敎生徒光武南征恂從至潁川百姓遮道曰願從陛下復借冦君一年同上庠序耕桑北史㓂雋字祖雋寛雅有識量不以財利為心後為梁州刺史令郡縣立丨丨勸丨丨敦禮讓數年之中風俗頓革野水孤舟皇朝㓂凖字平仲華州下邽人為巴東令巴東有秋風亭準析韋應物一言為一句有丨丨無人渡丨丨盡日横之句識者知其必大用例簿不視冦準除官同列目吏持丨丨以進準曰宰相所以器百官用例非所謂進賢退不肖因却而丨丨謂冦公竹㓂準至雷州吏以圖經獻視其四至云東南至海十里準怳然曰吾少時有到海只十里過山應萬重之句人生得喪豈偶然哉卒年六十三詔許歸𦵏西京過公安民擁道設祭立竹焚幣月餘竹皆自生邑民嗟嘆即生竹地立祠嵗時享之丨其竹曰丨丨丨嵗久成林人不忍伐廣丹陽宫音古今姓纂風俗通云廣成子之後事類闕祿扶風徵音古今姓纂風俗通云殷紂子武庚字祿父之後以王父字為氏事類闕闕下邳宫音古今姓纂風俗通云闕黨童子之後事類闕東平原徵音古今姓纂舜七友東不訾之後事類闕歐平陽商音古今姓纂歐冶子吳人善鑄劒事類闕殳武陵羽音古今姓纂尚書殳斨舜臣咎繇所讓二十二人南朝有殳嘉興殳季真事類闕沃太原羽音古今姓纂風俗通云殷王沃丁之後吳郡神仙傳沃焦吳人事類闕利河南徵音古今姓纂漢有利幾又仙人利真源漢陽人又利乾為中山相事類闕蔚琅琊羽音古今姓纂左傳鄭大夫蔚翩之後事類闕越晉陽羽音古今姓纂夏少康之後姒姓越王勾踐裔孫無疆為楚所滅子孫以國為氏河南官氏志越疆氏改為越氏事類闕䕫京兆羽音古今姓纂芊姓楚君熊摰之後為䕫子孫以國為氏石趙有太保䕫安本天竺人遼東䕫安寓居遼東𤣥孫逸姚秦司空後燕有遼東䕫騰事類闕隆南陽宫音古今姓纂闕事類闕師太原徵音古今姓纂風俗通師樂人瞽者之稱晉有師曠魯有師乙晉有師悝師觸師蠲也又師服晉大夫也事類三良為政左管仲曰鄭有叔詹堵叔師叔丨丨丨丨未可間也歌北南風師曠字子野晉樂師也驟丨丨風又歌丨丨又孟師曠之聰不以六律不能正五音子野君子石言於晉晉侯問師曠曰石何故言對曰石不能言民聽濫也叔向曰丨丨之言丨丨哉並同上儒宗黄耇漢師丹字仲公琅邪東武人治詩經為世丨丨徳為國丨丨可謂社稷之臣鞏山陽宫音古今姓纂左傳周卿士鞏簡公甸内侯也晉有鞏朔漢有侍中鞏攸陽瞿皇户部郎中鞏𢎞武事類闕庫内黄商音古今姓纂風俗通古守庫大夫因官命氏後漢竇融𫝊輔義侯庫鈞事類闕聶山東徵音古今姓纂衞大夫食采於聶因氏焉史記刺客聶政軹人漢有潁川太守聶良䕶羌校尉聶尚又有聶壹吳志有將軍聶支石趙錄有中書令聶熊皇朝忠義聶昌事類闕晁京兆角音古今姓纂左傳周景王子王子朝之後亦作晁字或云衞大夫史晁之後事類智囊史記晁錯潁川人學申商刑名以文學為太常掌故為人峭直刻深太常遣錯受尚書伏生召為太子舍人家令號曰丨丨文帝竒其材遷為中大夫景帝時為内史言事輒聽寵幸傾公卿法令多所更定學行皇朝晁迥字明逺澶州清豐人真宗在東宮諭徳楊礪稱其丨丨燕遇為榮以太子少保致仕召丨太清樓仁宗寵丨甚渥其子宗慤知制誥亦與人以丨丨好學長者真宗稱迥為丨丨丨丨楊億嘗謂迥所作書命無過褒而得代言之體並同上有雞肋集晁補之字无咎宗慤之曽孫也七嵗能屬文王安國一見而竒之卒丨丨丨丨一百卷勾平陽宫音古今姓纂勾芒氏之𦙍史記有勾强事類闕敖譙國宫音古今姓纂顓頊師大敖之後事類闕融南康宫音古今姓纂世本云祝融之後事類闕冷又音零京兆徵音古今姓纂泠淪氏之後音訛為冷氏事類闕訾渤海徵音古今姓纂風俗通帝嚳妃訾陬氏女姓苑云今齊人漢功臣表有樓虚侯訾順事類闕辛隴西徵音古今姓纂姒姓夏后啟别封支子於莘子孫去草為辛遂為辛氏左傳周太史辛甲辛俞羌為昭王友秦有將軍辛騰家中山苦陘曽孫蒲漢有辛武賢事類父子虎臣前漢辛慶忌字子真破羌將軍辛武賢之子後拜為將軍武賢丨丨丨丨之俊諌隨引裾魏辛毗字佐治遷侍中丨文帝徙民實河南帝不荅起入内毗丨而丨其丨嘉其貞節晋忠義辛勉字伯力劉聦將署為光祿大夫固辭曰大丈夫豈以數年之命而虧髙節事二姓哉聦丨丨丨丨為築室於平陽西山不為賊臣辛恭靖為河南太守為姚興所執恭靖厲色曰我寧為國家鬼丨丨羌丨丨枕籍六經北史辛徳源字孝基劉逖薦之云隋丨丨丨丨漁獵百氏除散騎侍郎初不得調隠林慮山著幽居賦以自寄井邑從化辛昻字進君行成都令謂諸生曰子孝臣忠師嚴友信立身之要諸生感悟歸告父老曰辛君教誡如此不可違之丨丨肅然咸丨其丨侈費疏諌唐辛替否字恊時京兆人為左拾遺時置公主府官屬而安樂府補授尤濫築第丨丨又盛興佛寺替否上丨丨闗張之流辛京杲從李光弼戰尤力肅宗異之召見曰其黔彭丨丨丨丨乎謂補闕柳皇朝辛仲甫字之翰汾州孝義人知光州移彭州課種柳䕃行路郡人丨之丨丨丨文武兼資太祖問趙普羣臣丨丨丨丨者普以仲甫對太平興國初遷起居舍人奉使契丹同上闞古今姓纂齊卿闞止之後事類好學通數吳闞澤字徳潤㑹稽山隂人家世農夫至澤丨丨究羣籍兼丨厯丨侍訪政事北史闞駰字𤣥隂燉煌人博通經𫝊沮渠蒙遜重之常丨左右丨以丨丨善用拍刀唐闞稜貌魁雄丨丨兩刃刀長丈名曰丨丨揮殺數人前無堅對從杜伏威入朝拜為越州都督郍音那天水商音古今姓纂風俗通朝郍東夷也其後單姓郍氏後燕錄遼西太守郍頡西魏有揚州刺史郍春事類闕簡范陽宫音古今姓纂左傳晉大夫狐鞫居食采續邑因號續簡伯漢有簡卿事類往來使命蜀簡雍字憲和為從事中郎常為談客丨丨丨丨拜為昭徳將軍饒平陽羽音古今姓纂臨川漢有魯隂太守饒威又漁陽太守饒斌永安吳志襄安長饒助事類闕古今合璧事類備要續集卷二十七
