body:
  text: 古今合璧事類備要别集卷七十二宋謝維新撰飛禽門烏格物總論烏鴉别名種類亦繁彼有小而多羣腹下白者名鴉烏有小觜而白比他烏微小長而反哺其母者名慈烏另有一種大啄及白頸而不能反哺者非慈烏南人謂之鬼雀鳴則凶咎是也然北人聞其鳴則喜南人反是亦善避矰弋彈射事類火精生熒惑丨丨丨朱鳥古今注所謂赤烏也抱朴子陽數竒日中三足烏丨丨丨也同上日中踆丨丨冇丨烏注踆獨蹲止不行謂三足也淮南子羿仰射堯時十日並出堯命丨丨丨十日中其九烏皆死墮其羽翼同上舜孝感丨至丨丨三足烏集其庭抱朴子流為烏武王渡河既渡有火自上復於下至于王屋丨丨丨其色赤其聲魄史記愛及烏武王登夏臺以臨殷民周公旦曰臣聞之丨其人丨其屋上丨憎其人者憎其除胥太公六韜城有烏叔向曰丨上丨丨齊師其遁幕有烏楚師夜遁諜告曰丨丨丨矣烏聲樂師曠曰烏丨之丨丨齊師其遁並左烏頭白秦止燕太子丹為質丹不聽曰丨丨丨乃可歸丹仰天嘆烏乃白頭遂歸史記老萊弄丨丨子行年七十或丨烏於親側欲其喜焉孝子傳宋得夢丨公子丨丨已為烏喙加於南門尾加於桐門曰子夢美必立也後為昭公左哀公棲其冠曾子至孝三足烏丨丨丨家語集其府朱博為御史大夫先時御史府有松柏樹常有烏數千丨丨上朝去暮來號朝夕烏數月不來本傳烏銜鼓東陽顔烏純孝後有羣丨丨丨集顔所居之村烏口皆傷一境皆以為顔至孝即於鼓處立縣名為烏傷王莽改為丨孝異苑烏攫肉黃霸使吏出小吏食道傍丨丨其丨還霸迎謂曰甚苦食於道傍乃為丨丨丨吏大驚以為霸盡知其啓居本傳烏洞腋武帝時御幕上有烏命虎賁中郎將王吉射之吉祝曰矢一發丨丨丨至尊夀萬嵗臣夀二千石遂中之晉書尾畢逋桓帝時童謡曰城上烏丨丨丨一年生九雛公為吏兒為徒一徒死百乘車續漢書頭有角章帝元和三年代郡髙栁烏生子三足大如雞赤色丨丨丨寸餘東觀漢記飾烏鏡丨丨鶻丨白氏帖著鴉經世有傳隂陽局鴉經謂東方所丨大略先數其聲第一聲即是甲聲以十干數之辨其急緩以定吉凶赤烏見晉武帝元年有丨丨丨白氏帖白烏集晉虞傅為鄱陽令丨丨羣丨其庭樹三足烏漢獻帝延康元年丨丨丨見乂西王母以丨丨丨為使白氏帖二慈烏北齊蕭倣字希然居喪廬前有丨丨丨各集一樹自午以前循庭飲啄自午以後不下樹每到臨時舒翼悲鳴有似助哀家人見之未嘗闕時以為孝感也烏相風長安靈臺上有相風銅丨有千里風則動白氏帖烏接丸彭澤有丨能丨丨行者丸飯投之髙下無失吳録烏巢門吳順至孝養母有赤丨丨丨烏羣噪李敬業蘇孝祥率騎兵五千夜度擊敬業孝祥死有丨丨丨敬業營上烏聲悲韓偓崔胤請以渾王為元帥帝問偓他日纍吾兒否偓曰陛下在東內時天隂雺王聞烏聲曰上與后幽困丨鵲丨亦丨陛下聞之惻然有是否帝曰然是兒天生忠孝與人異意遂決偓附胤類此集戟架栁仲郢為諫議大夫每遷必烏丨升平第庭樹丨丨皆滿五日乃散及是不復集卒於鎮巢所居宋敬則兄仁軌隱居養親常誨子弟曰終身讓路不枉百步終身讓畔不失一段有赤烏丨丨丨樹嗛柴為城貞元十八年六月烏集徐州之滕縣丨丨丨丨中有白烏一碧烏一也五行志來巢孕卵崔希喬以仁孝稱其在并州廳前叢葦上有小烏如鷦鷯丨丨丨丨五色如雞子雛見月餘五色成文大如鵝馴擾間暇頃之飛翔時歸舊所號來巢烏北夢瑣言目薄地鴉五代蜀吕彥德驍勇善騎射嘗從王宗播宗儔征討冠牛革帽披漆甲跨烏馬執斫刺刀軍中丨為丨丨丨十國紀年號李鴉兒李克用少驍勇軍中丨曰丨丨丨威名蓋於代北五代史唐莊宗紀鴉噪殿樹韓全誨初帝至鳳翔有丨數萬丨丨丨謂之神鴉俄而鴉不來人以為恐本傳鴉噪庭樹劉漢宏丨丨諸丨命斫丨孔氏帖全樹借棲李義父始召見太宗令詠烏云日影揚朝彩琴中聞夜啼上林多少樹不借一枝棲帝曰吾將丨丨丨汝豈惟一枝本傅作賦見責范文正公始以獻百官圖譏切吕申公坐貶饒州梅聖俞時官旁郡作靈烏賦以寄所謂事將兆而獻忠人反謂爾多凶蓋為范公設也故公亦作賦報之有云知我者謂吉之先不知我者謂凶之類及公秉政聖俞久困意公必援己而漠然無意所薦乃孫明復李泰伯聖俞有怨言遂丨靈烏後丨以丨丨之世頗以聖俞為隘石林燕語成公綏孝烏賦序有孝烏集子之蘆乃喟然而嘆曰余無仁惠之德祥禽曷為而至哉夫烏之為瑞久矣以其反哺識養故為吉烏是以周書神其流變詩人瞻其所集望室者瞻其爰止愛屋者及其增嘆兹蓋古人所以為稱若乃三足德靈國有道則見國無道則隱斯乃鳳鳥之德何以加焉鵩惡鳥而賈生懼之烏善禽而吾嘉焉懼惡而作歌嘉善而賦之不亦可乎梅聖俞靈烏賦烏之為靈者何噫豈獨是烏也夫人之靈大者賢小者智獸之靈大者麟小者駒蟲之靈大者龍小者龜鳥之靈大者鳳小者烏賢不時而用智給給兮為世所趍麟不時而出駒流汗兮擾擾於修途龍不時而見龜七十二鑽兮寧自保其堅軀鳳不時而見烏啞啞兮招唾罵於里閭烏兮來前事將兆而獻忠人反謂爾多凶凶不本於爾爾又安能凶凶人自凶爾告之凶是以為凶爾之不告兮凶豈能吉告而先知兮謂凶從爾出胡不若鳳之時鳴人不怪兮不驚龜自神而刳殼駒負駿而死行知鶩能而日役體劬劬兮喪精烏兮爾靈吾今語汝庶或汝聽結爾舌兮勿睥睨往來城頭無爾纍范希文靈烏賦梅君聖俞作是賦曾不我鄙而寄以為好因勉而和之庶幾感物之意殊塗而同歸矣於靈烏靈烏爾之為禽兮何不髙翔而逺翥何為號呼人兮告吉凶而逢怒方將拆爾翅而烹爾軀徒悔焉而忘路彼啞啞兮如訴請臆對而心諭我有生兮纍隂陽之含育我有質兮處天地之覆露長慈母之危巢託主人之佳樹斤不我伐彈不我仆母之鞠兮孔艱主之仁兮則安度春風兮既成我以羽翰眷庭柯兮欲去君而盤桓思報之意厥聲或異警於未形恐於未熾知我者謂吉之先不知我者謂凶之類故告之則反災於身不告之則稔禍於人主恩或忘我懷靡臧雖死而告為凶之防亦由桑拱於庭懼而修德俾王之興雉雊于鼎懼而修德俾王之盛天聽甚邇人言曷病彼希聲之鳳凰亦見譏於楚狂彼不世之麒麟亦見傷於魯人鳳凰豈以譏而不靈麟豈以傷而不仁故割而可卷孰為神兵焚而可變孰為英瓊寧鳴而死不默而生胡不學太倉之鼠兮何必仁為豐食而肥倉茍竭兮吾將安歸又不學荒城之狐兮何必義為深穴而威城茍圯兮吾將疇依寧驥子之困於馳鶩兮鴑駘泰於芻養寧鴛雛之飢於雲霄兮鴟鳶飫乎草莽君不見仲尼之云兮豫欲無言纍纍四方曽不得已焉又不見孟軻之志兮養其浩然皇皇三月曾何敢以休焉此小者優優而大者乾乾我烏也勤於母兮自天愛於主兮自天人有言兮是然人無言兮是然詩集啞啞慈烏失其母丨丨吐哀音晝夜不飛去經年守故林夜夜夜半啼聞者為沾襟聲中如告訴未盡反哺心百鳥豈無母爾獨哀怨深應是母慈重使爾悲不任昔有吳起者母殁喪不臨嗟哉斯徒輩其心不如禽慈烏復慈烏烏中之曾參白居易憧憧青青窗前栁鬱鬱井上桐貪烏占棲息慈烏獨不容慈烏爾奚何來往何丨丨曉去先晨鼓暮歸後昏鐘辛苦塵土間飛啄禾黍叢得食將哺母飢腸不自充主人憎慈烏命豫削彈弓絃續會稽竹丸鑄金山銅慈烏求母食飛下爾庭中數粒未入口一丸已中胸仰天號一聲似欲訴蒼穹反哺日未足非是惜微躬誰能持此寃一為問化工胡然大觜烏反得天年終白居易和大觜烏生雛城上烏一年丨九丨氄毛不自暖張翼強相呼羽成翮備各西東丁年賦命有窮通不見髙飛帝輦側逺託日輪中尚逢王吉箭猶嬰唐羿弓豈知變采救燕質入夢祚昭公流聲表師遁集幕示營空靈臺已鑄象流蘇時候風梁劉孝威反哺鳥啼東南林危巢雛五六心在安巢枝一日千往復脫網得羣食入口不入腹窮生俾丨丨豈能報成育文監夜半啼庭樹烏爾何不向别處栖夜夜丨丨當户丨家人把燭出洞户驚栖出羣飛落樹一飛直欲飛上天回回不離舊栖處未明重繞主人屋欲下空中黑相觸風飄雨濕亦不移君家樹頭多好枝李白枝上啼黃雲城邊烏欲棲歸飛啞啞丨丨丨機中織婦秦川女碧紗如煙隔窗語停梭悵然憶故人獨宿孤房淚如雨李白團飯喚百年曾泛馬當灣丨丨丨鴉篙楫間今日江邊飛不下應知人世足機關余安道踏稍墮已是霜林葉爛紅那禁動地曉來風寒鴉可是矜渠黠丨折枯丨不丨空楊廷秀鵲格物總論鵲一名飛駮形類於鴉而差小觜尖足爪白黑頸項背深緑色臆腹脅白翮與尾毛黑相間善為巢開口背太嵗此非才智任自然也其聲楂楂然南人聞其噪則喜北人聞其噪則悲未必鵲之能知吉凶蓋人自為之悲喜然耳事類飛􅭙鵲鵙醜其丨丨爾雅始巢季冬之月鵲丨丨記月令知嵗鵲巢開口背太嵗博物志又鵲丨太丨所在説文知風鵲巢丨丨之所起又乾鵲知來而不知往丨來嵗多丨則巢於下枝而不知童子探其卵淮南子填河烏鵲丨丨成橋而渡織女同上銜火鳴鵲丨丨洞冥記抵玉崑崙之下以丨璞丨鵲鹽鐡論圓嶠多丨丨山丨太鵲髙一丈羣飛採不周之粟於其上拾遺記塗循獻周成王時丨丨國丨丹鵲一雌一雄同上削木為公輸子竹丨丨鵲鵲成飛三日不下自以為巧墨子執彈留莊子遊雕陵之樊見異鵲翼廣七尺目大徑寸撼周之顙而集於栗林莊周褰裳躍步丨丨而留之立枯枝孝武帝燕坐未央前殿新雨止東方朔執戟在階傍屈指獨語上問之對曰殿後柏樹上有鵲丨丨丨上東向而鳴視之果然朔曰以人事言之風從東方來鵲尾長傍風則傾背風則蹶必當順風而立是以知也别傳化圓石張皓為梁州有山鵲飛翔丨丨丨皓椎破之得一金印文曰忠孝侯印占鵲言魏管輅見安德令劉長仁丨有鳴鵲來在閣屋上其聲甚急輅曰丨丨東北一婦昨殺夫牽引西家至時果有東北同伍氏東告鄰婦手殺其夫詐言西家人與夫有嫌殺我壻也又奚永洛與張子信對坐有鵲正鳴於庭樹間子信曰鵲言不善當有口舌事今夜有喚必不得往子信去後是夜琅琊王五使召之且以刺喚永洛詐稱墮馬遂免於難焉北齊書探鵲􅑹晉王澄為荆州將之鎮送者傾朝澄見樹上鵲巢便脫衣上樹丨􅑹而弄之神氣肅然旁若無人巢發石車唐髙祖圍堯君素於蒲州糧盡人相食有烏鵲丨其丨丨丨車心遂離官軍斬其首送之京師舊唐書噪獄屋樓貞觀中黎景逸居空青山有鵲巢其庭每以餘食飯之甚馴熟後景逸出仕被誣下獄一日有鵲於獄樓上下向景逸喜噪久之已而赦果下官詰其由云路遙見玄衣素襟人説三日赦必至乃鵲傳之也朝野僉載巢寢殿前貞觀中忽有白鵲營丨於丨丨丨槐上其巢合歡如腰鼓左右拜舞稱賀上曰我常笑隋煬帝好祥瑞祥瑞在得賢此何足賀乃命毁巢鵲放於野外通鑑太宗紀鵲巢轍中天寶十三載葉縣有丨丨于車丨丨不巢木而巢地失其所也鵲巢碑上苗晉卿嘗自為父碑文有丨丨丨丨㗸木安梁崔圓相公妻在家時與姊妹戲於後園見二鵲營巢共丨一丨如筆管長尺餘丨巢中衆悉不見俗言見鵲上丨必貴酉陽雜俎㗸柴補隙大厯八年乾陵上仙觀天尊殿有雙鵲丨丨及泥丨葺丨壞一十五處宰臣上表賀同上兆曰靈鵲時人之家聞鵲聲皆為喜丨丨丨丨報喜天寶遺事目為喜鵲竇參申其族子也為給事中參親愛每除吏多訪申申因得招賂漏禁密語故申所至人丨丨丨丨孔氏帖巢梧樹上貞元三年中書省梧桐樹上有鵲以泥為丨焚其巢可禳狐魅酉陽雜俎巢麥田中王處直野鵲數百丨丨丨丨人皆知其不祥五代史鵲送柯侯熙寧中柯侯仲常通守漳州以救飢得民有二鵲棲其廳事訖侯之去丨亦丨之漳人異焉蘇子瞻為賦詩魏武帝短歌行月明星稀烏鵲南飛繞樹三匝無枝可依陳無己鷙鵲詩辛巳夏四月庚戌日將宴與客追涼露坐有雀引雛二三集垣下行且哺俄有鵲至自北俯啄雀間初循循少焉就雀間遽攫一雛而升於垣出雀不意悲鳴啾啾奮身抵鵲再三欲奪鵲竟磔雛以食不顧如得計然坐客嘆息余感之賦是詩若奚不鸇吾知避而遷汝胡不貍吾知逺而馳宵通吾巢晨並吾枝懷毒妊凶初不汝期莽恭拳拳甫笑嬉嬉情貌深厚孰從而追詩集楂楂丨丨鵲鳴聲韓愈雜詩喃喃丹鵲車飛來丨丨送君札杜牧送孟先輩來搖尾棄羶在庭際雙鵲丨丨丨欲啄怕人驚喜語晴花裏何况佞幸人微禽解如此皮日休未安巢還聞月下鵲三繞丨丨丨李白贈郤圓兩度填河繞樹無依月正髙鄴城新淚濺雲袍幾年始得逢秋丨丨丨丨莫告勞髙處營巢偏承雨露潤毛衣黑白分明衆所知丨丨丨丨親鳳闕靜時間語上龍墀化為金印新祥瑞飛向銀河舊路岐莫怪天涯棲不穩託身須是萬年枝韓渥詩仁格異族昔我先君子仁孝行於家家有五畝園么鳳集桐花是時烏與鵲巢􅑹可俯拏憶我與諸兒飼食觀羣呀里人驚瑞異野老笑而嗟云此方乳哺甚畏鳶與蛇手足之所及二物不敢加至人若可信衆鳥不可遐故知中孚化可及魚與蝦柯侯古循吏悃愊真無華臨漳所全活數等江干沙丨心丨丨丨兩鵲巢其衙但恨不能言相對空楂楂善意以類應古語良非誇君看彼酷吏所至號鬼車坡喜報主人鮮鮮毛羽耀朝輝紅粉墻頭緑樹枝日暖風輕言語軟應將丨丨丨丨知歐陽永叔幾度送非才見離巢羽翼開盡能輕揚出塵埃人間樹好紛紛占天上橋成草草回丨丨丨丨臨玉户一時傳喜到粧臺若教顔色如霜雪應與清平作瑞來古今合璧事類備要别集卷七十二
