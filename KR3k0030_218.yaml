body:
  text: 古今合璧事類偹要别集卷十二宋謝維新撰鄉里門比鄰輿地提綱予讀周禮至大司徒有曰五家為比遂人又曰五家為隣比與隣皆五家之積是何實同而名之異也夷而考之則在郊内者謂之比在郊外者謂之隣釋文皆訓為近而鄭𤣥曰異其名者示相變耳此則比隣之無異義也然古者比隣之制必使之相保相愛而又相和親或有罪竒衺則不無相及也故宅之卜不如隣之卜百萬買屋千萬買鄰非故輕此而重彼也誠以隣有不善則所居雖華美非所以為安且利也然則士君子之將定其居其可不先定其隣乎得其隣則出入相友守望相助疾病相扶持而親睦之風於是乎在矣事類洽比丨丨其隣詩正月善隣親仁丨丨國之寳也左隐六為閭五比丨丨使之相受禮大司馬為里五隣丨丨云云皆有地域溝樹之禮遂人比長比長各長其丨之治五家相受相和親有罪竒衰則相及徙于國中及郊則從而授之若徙于他則為之旌節而行之若無授無節則唯圜土内之禮隣長丨丨掌相糾相受凡邑中之政相賛徙于他邑則從而授之救菑恤丨丨丨隣天之道也左僖棄信背丨丨丨隣患孰恤之仝上舂不相隣有䘮丨丨丨記居必擇君子丨丨丨隣可以避患晏子隣殺牛東丨丨丨不如西隣之禴祭易既濟隣為壑以丨國丨丨孟隣之厚晉侯秦伯圍鄭鄭使燭之武見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益于君敢以煩執事越國以鄙逺君知其難也焉用亡鄭以倍隣丨丨丨君之薄也若舍鄭以為東道主行李之往來共其乏困君亦無所害左襄三十一隣是卜晏子見先盧門以與爾隣原思為之宰與之粟九百辭子曰毋丨丨丨丨里鄉黨乎語六乞諸其隣微生髙或乞醯焉丨丨丨丨而與之語五近學可居孟母其舍近墓孟子之少也嬉戲為墓間之事踴躍築埋孟母曰此非所以居處子也乃去舍市傍其子嬉戲為賈又曰此非所以居處子也乃舍學舍之傍其子遊戲乃設爼豆揖譲進退曰此丨以丨子遂居及孟子長學六藝卒成大儒列女傳連墻不謁列子與南郭子丨丨二十年丨相請丨秉燭避嫌昔顔叔子嘗獨處於室隣之婺矛牙婦又獨處於室夜暴風雨至室壊婦人趨而至顔叔子納之使秉燭放乎旦而薫盡束薪而繼之自以為丨丨之不審若其審者宜若魯人有男子獨處於室隣之婺矛牙婦人又獨處乎室夜暴風雨至而室壊婦人趨而託之閉户不納束緼請火里婦夜亡肉姑以為盗遣之里母即丨丨丨丨亡肉家曰昨夜犬得肉鬬相殺請火埋之姑遂還婦伐樹還婦東家棗垂吉庭吉妻取棗吉乃去婦隣人欲丨丨吉乃丨丨里語曰東家棗完去婦復還王吉傳穿壁引光匡衡勤學而無燭隣舍干不得乃丨丨丨其丨以書映而讀之西京雜記祭竈請隣漢御史大夫張忠署孫寳主簿寳徙入舍丨丨丨比丨得酒從隣陶侃家貧有友人過侃侃無以致誠其隣人謂侃曰子門有長者軒車何不延之論當世事侃曰貧不能備禮餌隣人宻于墻頭送以濁醪隻雞遂成終日之歡挑女折齒謝鯤隣家髙氏女有美色鯤嘗丨之丨投梭丨其兩丨時人語曰任逹不已幼輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌厭卿老拳石勒與李陽争漚麻池日相毆擊及貴乃召陽與酣謔引陽臂笑曰孤曩日丨丨丨丨卿亦飽孤毒手百萬買隣梁吕僧珍字元瑜為南兖州刺史初宋季雅罷南康郡市宅居僧珍宅側僧珍問宅價曰一千一百萬恠其貴季雅曰一千萬買宅一丨丨丨丨及僧珍生子季雅往賀函曰錢一千閽人少之不為通季雅强進僧珍疑其故自發之乃金錢也僧珍言於武帝拜衞州刺史一丈益隣陳囂與民紀伯為隣伯夜切藩囂地自益囂見之伺伯去後宻㧞其藩丨丨以地丨伯伯覺之慙懼既還所侵又却一丈太守周府君髙囂徳義刻石旌表其閭號曰義里㑹稽典録隣居呌呼宋張鏡與顔延之丨丨顔談義飲酒丨丨不絶而鏡静嘿後鏡與客談延之從籬邉取胡床坐聽辭義清𤣥延之曰彼有人焉由是不復酣呼隣里侵占楊玢仕蜀至顯官隨王衍歸後唐以老致仕歸長安舊第多為丨丨丨丨子弟欲詣府訴玢批狀尾四隣侵我我猶伊畢竟須思未有時試上含元殿基望秋風秋草正離離子弟不敢言可時相招富韓公自汝州得請歸洛養疾築地與康節天津隐居相近公曰自此丨丨丨丨矣康節曰雍冬夏不出春秋時間過親舊間相招未必來不召或自至公謝客戒其子曰先生來必以時見康節一日過之公贈以詩韓愈寄盧仝古風玉川先生洛城裏破屋數間而已矣云云昨晩長鬚來下狀隔墻惡少惡難似每騎屋山下窺闞渾舍驚怕走折趾慿依婚媾欺官吏不信令行能禁止先生受屈未曽語忽此來告良有以嗟乎身為赤縣令操權不用欲何俟立召賊曹呼五伯盡取䑕輩尸諸市先生又遣長鬚來如此處置非所喜况又時當長養節都邑未可猛政理先生固是余所畏度量不敢窺涯涘放縱是誰之過歟效尤戮僕愧前史買羊沽酒謝不敏偶逢明月曜桃李先生有意許降臨更遣長鬚致雙鯉詩集斟酒聚丨丨丨比隣陶淵明生女嫁丨丨猶是丨比隣杜兵車行王翰卜丨丨願丨隣孟母芳芬芳丨丨隣隔屋喚傍舍頗淳朴所願亦易求丨丨丨西家借問有酒不墻頭過濁醪展席俯長流仝上還家驚醜女來效顰丨丨丨四隣李白卜居為比丨丨乃此地井井丨丨隣仝上任屋連墻丨丨住丨丨往來故莫間韓見擬移居丨丨丨丨作隣里不論時節請開關劉禹錫若許歸田皇恩丨丨丨丨去晩嵗當為隣舍翁桞子厚劉禹錫此里中人寄居延夀里為與延康隣不愛延康里愛丨丨丨丨人非十年故人非九族親人有不朽語得之煙山春賈島錦里先生丨丨丨丨烏角巾園收芋粟不全貧慣看賔客兒童喜得食階除鳥雀馴秋水纔深四五尺野航恰受両三人白沙翠竹江村暮相送柴門月色新杜南隣澆薤同渠僻巷隣家少茅簷喜並居蒸棃常共竈丨丨亦丨丨傳屐朝尋藥分燈夜讀書雖然在城市還得似樵漁于鵠題隣居幽花滿樹相近竹參差相過人不知丨丨欹丨丨山水細通池歸客村非逺殘樽席更移看君多道氣從此數追隨杜過南隣朱山人水亭宜作兩家春明月好從三徑夜緑楊丨丨丨丨丨白居易與元八卜隣相看萬事休耦耕若便遺身去黄髪丨丨丨丨丨劉和壁隙透燈光丨丨丨丨丨籬根分井口梅堯臣贈隣居井泉分地派丨丨丨丨丨砧杵共秋聲徐鎧喜李少保卜隣索居今日鬢宜斑杜齒相知約嵗寒丨丨丨丨丨丨丨拂衣已解虞卿印築室何須謝傅山許下田園雖有素洛中花卉足供閒他年決意歸何處便見交情厚薄間司馬君實和景仁卜居許下景仁頃見許居洛今而背之故詩頗致其怨獨堪窮巷寂無依先生自衞客西畿樂道安閒絶世機再命初筵終不起丨丨丨丨丨丨丨貫穿百代常探古吟咏千篇亦造微珍重相知忽相訪醉和風雨夜深歸富彦國謝堯夫見訪竹柏相望數十楹丨丨丨丨丨丨丨藕花多處復閑亭如何更欲通南埭割我鍾山一半青荊州古今合璧事類備要别集卷十二
