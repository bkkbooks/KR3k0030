body:
  text: 古今合璧事類備要别集卷十四宋謝維新撰宫室門舘驛宫室緫論按説文舘客舍也古者國野之道十里有廬廬有飲食三十里有宿宿有洛室洛室有委五十里有市市有候舘候舘有積皆所以待朝聘之官驛者又言置騎將以備送迎也四馬髙足為直傳四馬中足為馳傳四馬下足為乗傳一馬二馬為軺傳急者乗一馬曰乗一乗傳然古者以車故曰傳車其後又單置馬則謂之驛騎此舘驛之説不可不辨也是以古之人完客所舘无為客使憂而設有擅乗驛馬者或者得以奏聞无他皆所以嚴賔禮重迎接也孟子曰舍舘定而後求見長者乎而彭更亦曰後車數十乗從者數百人以傳食於諸侯其皆以此歟事類入王凡諸侯丨丨則逆勞于畿及郊勞視舘致舘禮司宼告功克勝則使傳遽丨丨於王釋文云以車曰傳以馬曰遽江漢詩注籧廬仁義先王之丨丨舍一宿而去莊置郵徳之流行速於丨丨而傳命注傳書今之驛也孟三日榖晉師三日舘丨注舘舍也食楚軍榖丨丨左僖廿八中宿至晉文公入寺人披請見公使譲之且辭焉曰蒲城之役君命一宿女即至其後余從狄君以田渭濵女為恵公來求殺余命女三宿女丨丨丨雖有君命何其速也左僖廿四適子之舘緇衣美武公也緇衣之宜兮敝予又改為兮丨丨丨丨兮還予授子之粲兮詩𨽻人之垣見前公廨内司里不授單㐮公至陳膳宰不致餼丨丨丨丨舘國語重人曰㨗梁山崩晉侯以傳召伯宗伯宗辟重曰辟傳丨丨丨待我不如丨之速也注傳驛重載之車㨗邪出左成五假舘願畱曹交曰吾得見於鄒君可以丨丨丨丨而受業於門孟舍舘未定樂正子從於子敖之齊樂正子見孟子孟子曰子亦來見我乎曰先生何為出此言也曰子來幾日矣曰昔者曰昔者則我出此言也不亦宜乎曰丨丨丨丨曰子聞之也舍舘定然然求見長者乎曰克有罪仝上改舘晉侯秦伯丨丨丨丨饋七牢焉左僖十五乃舘叔孫叔孫婼如晉晉人執之書曰晉人執我行人叔孫婼言使人也云云士伯曰以芻蕘之難從者之病將舘子於都叔孫旦而立期焉丨丨諸箕舍子服昭伯於他邑云云丨丨所舘者雖一日必葺其墻屋去之日如始至左昭二十三馬給傳置漢文帝詔太僕見馬遺財足餘皆丨丨丨注遺畱也財與纔同傳置驛也本紀馬賦縣傳省廐丨以丨丨丨賈山至言驛馬迎賔鄭當時置丨丨日郊丨丨客縣次與續食注云路次也本傳私馬奏事王温舒為河内守其丨丨五十疋自河内至長安以丨丨仝上詐乗御傳魏相字弱翁為茂陵令御史大夫桑𢎞羊客丨丨丨丨傳縣相疑有奸案致其罪不修郵驛薛宣之子恵為彭城令宣過之橋梁郵驛丨丨知其不能整頓以待劉寵免太尉歸清儉出京師欲息亭舍亭吏止之曰丨丨丨丨劉公寵不言而去時人稱其長者歩擔欲止趙孝長平王莽時父為田禾將軍以父任為郎嘗告歸丨丨丨丨郵亭亭長不納問曰聞田禾將軍子當過何時至孝曰尋將到傳詣雒陽田横懼乗丨丨丨丨髙祖紀舘延賢人公孫𢎞既相於是起客丨開東閣以丨丨丨一曰欽賢舘以待大賢次曰翹材舘以待大才次曰㳺士舘以待國士躬自菲薄俸禄皆以給之西京雜記肥牛亭地漢張禹年老自起冡塋好平陵丨丨丨部處丨又近延陵奏請求之上以賜禹詔平陵徙亭他所曲陽侯王根聞而争之曰此地當平陵寢廟衣冠出遊道禹為師傅不遵謙譲至求衣冠所游之道又徙壊舊亭非所宜孔子稱賜女愛其羊我愛其禮宜賜他地上卒以丨丨丨丨賜之為馬廐庫公孫𢎞起徒歩數十年至宰相封侯於是起客舘開東閣以延賢人闕至賀屈氂時壊以丨丨丨丨奴婢客矣而已飾傳取譽漢宣帝元康詔吏或丨厨丨稱遇使客以丨名丨注韋昭曰厨謂飲食傳謂舍言修丨意氣以稱過使而已師古曰使人及賔客來者稱其意而遣之令過去也本紀代郵行書謫震諸子丨丨丨丨注説文云丨境上丨丨舍楊震傳女子稱寃東漢王忳除鄖令到官至漦音古亭亭長曰亭有鬼數殺過客不可宿忳曰仁勝凶邪徳除不祥何鬼之避即入亭上宿夜半聞丨丨丨丨為亭長所殺明旦召游檄詰問其服罪即收繫本傳傖父來寄禇公裒為章安令遷太尉記室叅軍名字已顯而位微人多未識公乗估舡送故吏數人投錢塘亭住爾時呉興沈縣令嘗送客至浙江客至亭吏驅公移牛屋下潮水至沈令起傍徨問牛屋下是何牧人吏云昨有一丨丨丨丨亭中有尊貴客權移之令有酒色因遥問傖父欲食餅不姓何等可共語褚因舉手答曰河南褚季野逺近久承名令於是大懼不敢移公便於牛屋下修刺詣公更宰殺為饌具於公前鞭撻亭吏欲以謝慙公與之宴酌言色無異狀如不覺公送至界空舘女歌竟陵掾劉諷夜投丨丨有三丨郎至丨曰明月清風良宵㑹同星河易翻歡娯不終緑尊翠杓為君斟酌今夕不飲何時歡樂忽有黄衣人曰婆提王屈娘子速來女郎皆起明旦拾得翠釵數隻幽恠録楹間鬼題劉元方嘗宿湖岸驛中夜聞歌聲朝閲丨丨有題云爹娘送我青楓根不記青楓幾囘落當時手刺衣上花今日為灰不堪著院募駃足劉晏諸道巡丨皆丨丨丨置驛相望驛市健馬盧鈞拜華州刺史關輔丨馬疲耗鈞為丨丨丨率三嵗一易自是無乏事馳馹入奏温造使幽州還詔丨丨丨丨孔帖乗傳過家仲子陵蜀人典黔中選補丨丨丨丨西人以為榮仝上不讓中人唐元稹為御史自東都召還次敷水驛中人仇士良夜至稹丨丨丨丨怒擊稹敗囬宰相以稹年少輕樹威失憲臣體貶江陵叅軍擅乗驛馬髙元裕以右補闕召道商州㑹方士趙歸真丨丨丨丨元裕詆曰天子置驛亦敢疾馳邪命左右奪之還具以聞見美婦人廣州押衙崔慶成嘗轄香藥綱詣内庫抵皇華驛夜丨丨丨丨曰今日見君必有疑俟君囘轅别圗後㑹擲書云川中狗百姓眼馬撲兒御厨飯丁晉公曰此乃獨眠孤舘四字也犯謹獨戒陶榖使江南以假書為名實使覘之丞相李獻以書抵韓熙載曰五桞公驕甚其善待之穀至則果如李所言熙載謂所親曰陶委實非端介者其守可隳當使諸君一笑因令宿驛舍竢謄六朝書半年乃畢熙載使歌姬秦蒻蘭衣弊為驛卒女榖見之而喜遂丨丨丨之丨作長短句贈之云好因縁惡因縁柰何天秪得郵亭一夜眠别神仙琵琶撥盡相思調知音少待得鸞膠續斷弦是何年明日中主燕客榖凛然不可犯中主持觥立使蒻蘭出歌續斷弦之曲侑觴榖大慚而罷泠齋夜話李白姑熟亭記通驛公舘南有水亭焉四甍翬飛巉絶浦嶼盖前有攝令河東薛公棟而宇之今宰隴西李公明化開物成務又横其梁而閣之晝鳴閒琴夕釣㳙月盖為接輶軒祖逺客之佳境也製置既久莫知何名司馬武公長材博古獨映方外因據胡床岸幘嘯詠而謂前長史李公及諸公曰此亭跨姑熟之水可稱為姑熟亭焉嘉名勝槩自我作也且夫曹官紱冕者大賢處之若遊青山卧白雲逍遥偃傲何適不可小才居之窘而自拘悄若桎梏則清風朗月河英岳秀皆為棄物安得稱焉所以司馬南隣當文章之旗鼔翰林客卿揮辭鋒以戰勝名教樂地无非得俊之場也千載一時言詩紀志孫樵褒城驛記褒城驛號天下第一及得寓目視其沼則淺混而茅視其舟則離敗而膠庭除甚蕪堂廡甚淺焉覩其所謂宏麗者訊於驛吏則曰忠穆公嘗牧梁州以褒城控二節度治所龍節虎旗馳馹奔軺以去以來轂交蹄劘由是崇侈其驛以示雄大盖當時視他驛為壯且一嵗賔至者不下數百輩茍夕得其庇飢得其飽皆暮至朝去者寧有顧惜心耶至如掉舟則必折篙破舷碎鷁而後止釣魚則必枯泉汨泥盡魚而後止至有飼馬於軒宿隼於堂凡所以汙敗室廬縻毁器用官小者其下雖氣猛可制官大者其下益暴横難禁由是日益碎敗不與曩類某曹八九輩雖以供饋之隙一二力治之其能補數十百人殘暴乎語未既有老甿笑於傍且曰舉今州縣皆驛也吾聞開元中天下無金革之聲而户口日益破疆埸無侵削之虞埸音亦而墾田者益寡生民日益困財力日益竭其故何哉凡與天子共治天下者刺史縣令而已以耳目接於民而政令速於行也今朝廷命官既已輕任刺史縣令而又促數於變易且刺史縣令逺者三嵗再更故州縣之政茍有不利於民可以出意革去者其在刺史縣令則曰我即去何用如此當愁醉醲當飢飽味囊帛懐金笑與秩終嗚呼州縣者真驛也矧更代之隙黔吏因縁恣為奸欺以賣州縣者乎如此而欲望生民不困財力不竭户口不破墾田不寡難哉予既揖退老甿條其言書于褒城驛壁屋桞子厚舘驛壁記凡萬國之㑹四夷之來天下之道塗畢出於邦畿之内奉貢輸賦修職於王都者入於近關則皆重足錯轂以聽有司之命徴令賜予布政于下國者出於甸服而後按行成列以就諸侯之舘故舘驛之制於千里之内尤重自萬年至于渭南其驛六其蔽曰華州其關曰潼關自華而北界於櫟陽其蔽曰同州其關曰蒲津自灞而南至于藍田其驛六其蔽曰商州其關曰武關自長安至于盭厔音輈窒其驛十有一其蔽曰洋州其關曰華陽自武功西至好畤其驛有三其蔽曰鳯翔府其關曰隴關自渭而北至于華原其驛九其蔽曰方州自咸陽而西至于奉天其驛六其蔽曰邠州由四海之内摠而合之以至于關由關之内束而㑹之以至于王都華人夷人往復而授舘者旁午而至傳吏奉符至閲其數縣吏執牘而書其物告至告去之役不絶於道寓望迎勞之禮無曠于日而春秋朝陵之邑皆有傳舘傳音轉其飲飫餼饋咸出於豐給繕完築復必歸於整頓列其田租布其貨利權其入而用其積於是有出納竒贏之數勾㑹考校之政大歴十四年始命御史為之使俾考其成以質於尚書季月之晦必合其簿書以視其等列而校其信宿必稱其制有不當者反之於官尸其事者有勞焉則復于天子而優升之勞大者増其官次者降其調之數又其次猶異其考績官有不職則以告而罪之故月受俸二萬於太府史五人承符者二人皆有食焉先是假廢官之印而用之貞元十九年南陽韓泰告於上始鑄使印而正其名然其嗣當斯職未嘗有記之者追而求之盖數嵗而往則失之矣今余為之記遂以韓氏為首且曰修其職故首之也劉禹錫管城驛記勞迎展蠲潔之敬餞别起登臨之思詩集羣烏巢晨及河曲驛凄然自傷情丨丨丨庭樹乳燕飛簷楹韓小猿啼大猿呌罷丨丨丨箐裏行人白晝迷惡籐牽頭石齧足嫗牽兒隨涙陸續我亦下行莫啼哭黄知命題小猿呌驛濃花發野舘丨丨丨杜送司馬衰桞側驛樓丨丨丨縣郭輕烟畔一望何綺麗盡日窮壯觀杜煙滿嵐溪驛舊名杉丨光丨翠丨須知今夜好宿處是江南鮑昭宿杉嶺驛泉入户野竹通溪泠丨聲丨丨鳴往來人不到寒草上階生錢起宿洞口驛嶺頭梅陽月南飛雁傳聞至此廻我行殊未已何日復歸來江静潮初落林昏瘴不開明朝望鄉處應見丨丨丨驛前池嚴秦修此驛兼漲丨丨丨已種萬竿竹又栽千樹梨四年三月半新笋晩花時悵望東山去等閒題作詩元稹題褒城驛同魚鱗府西三百里候舘丨丨丨韓酬裴十六隣蛟室逆旅相逢處江村日暮時衆山遥把酒孤嶼共題詩㿍院丨丨丨人煙接島夷鄉關萬餘里失路一相悲孟浩然永嘉上浦舘送張容卿萬古戍丨丨巴丘丨平湖北望長問人何淼淼愁莫更蒼蒼叠浪浮元氣中流没太陽孤舟有歸客早晩逹瀟湘岳陽舘中望洞庭湖千峯裹驛在丨丨丨寒宵獨此身古墳時見火荒壁悄无隣月白翻驚鳥雲閒欲就人祗應将白鬂更與老相親張濵宿山驛簷楹飛舞丨丨丨丨垣墻外桑柘蕭條斤斧餘盡賜昆邪作奴婢不知償得此人无然元豐七年有詔京東淮南築髙䴡亭舘宻海二州騷有逃亡者明年軾過之歎其壯麗畱一絶云