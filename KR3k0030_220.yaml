癖敢希仁智居清泉繞舍下脩竹䕃庭除幽逕松盖宻小池蓮葉初從來有好鳥近復躍鯈魚少室映川陸鳴臯丨丨丨張何舊僚采予與吏部乃金門僚故也相勉在懸輿常恐似伯玉瞻前愧魏舒李徳裕贈沈吏部八九間少無適俗韻性本愛丘山誤落塵網中一去三十年覊鳥戀舊林池魚思故淵開荒南野際守拙歸田園方宅十餘畆草屋丨丨丨榆桞䕃後園桃李羅堂前曖曖逺人村依依墟里煙狗吠深巷中雞鳴桑樹巔户庭無塵雜虛室有餘閒久在樊籠裏復得返自然陶潛四五主長安多大宅列在街西東往往朱門内房廊相對空前主為將相得罪竄巴庸後主為公卿寢疾歿其中連延丨丨丨殃禍繼相踵自從十年來不利主人翁風雨壊簷隙蛇䑕穿墻墉人疑不敢買日毁土木功嗟嗟俗人心甚矣其愚蒙但恐災將至不思禍所從我今題此詩欲悟迷者胷凡為大官人年禄多髙崇權重持難久位髙勢易窮驕者物之盈老者數之終四者如宼盗日夜來相攻假使居吉士孰能保其躬因小以明大借家可諭邦周秦宅崤函其宅非不同一興八百年一死望夷宫寄語家與國人凶非宅凶白居易凶宅起甲第誰家丨丨丨朱門大道邊豐屋中櫛比髙墉外回環纍纍六七堂棟宇相勾連一堂費百萬鬰鬰起青煙洞房温且清寒暑不能干髙堂虛且逈坐卧見南山繞廊紫藤架夾砌紅藥欄攀枝摘夭桃𢃄花移牡丹主人此中坐十載為大官厨有臭敗肉庫有朽貫錢誰能將我語問爾骨肉間豈無貧賤者忍不救飢寒如何奉一身直欲保千年不見馬家宅今作奉城園白居易傷宅營菟裘無似老且病唯恐歸園遲一旦得引年九天還聽卑為霑二品禄俾盡百年期恩深淪骨髓感極横涕洟始丨丨丨地來向濉水湄城隅㝡窮僻匠者寧求竒丨築悉由已軒牖亦隨宜外以庇風雨内以安妻兒燕雀莫羣噪鷦鷯纔一枝因念古聖賢名為千古垂何嘗廣居室儉為後人師亞聖樂簞食寢丘無立錐文終防世奪景相取家為文圍四壁立鄭公小殿移伊余臭貟者適㑹承平時無術毗萬務無才抗四夷為郡亦齪齪勞心徒孜孜保身已天幸拊已宜自知開卷顔間厚復懼來者嗤朂哉知止足清白猶可追杜世昌心是客杏為梁桂為柱何人堂室李開府碧砌紅軒色未乾去年身歿今栘主髙其墻大其門誰家第宅盧將軍素泥朱板光未滅今嵗官收别賜人開府之堂將軍宅未造成時頭已白逆旅重居逆旅中身是主人丨丨丨更有愚夫念身後心雖甚長計非久窮奢極麗越規模付子傳孫令保守莫教門外過客聞撫掌廻頭笑殺君君不見馬家宅尚猶存宅門題作奉城園君不見魏家宅屬他人詔贖賜還五代孫儉存奢失今在目安用髙墻圍臣門白居易手可熱長安甲第髙入雲誰家居住霍將軍日晩朝回擁賔從路旁拜揖何紛紛莫言炙手丨丨丨須臾火盡灰亦滅莫言貧賤即可欺人生富貴自有時一朝天子賜顔色世上悠悠應始知崔顥少隣並閒居丨丨丨草徑入荒村鳥宿池中樹僧敲月下門過橋分野色移石動雲根暫去還來此幽期不負言賈島歸敝廬北闕休上書南山丨丨丨不才明主棄多病故人疎白髪催年老青陽逼嵗除永懐愁不寐松月夜窗虛孟浩然種茶巖丨丨丨接紅霞塢灌稻泉生白石根皤腹老翁頭似雪海棠花底戲兒孫滕白浣花水丨丨流丨水西頭主人上卜林塘幽已知出廓少塵事更有澄江銷客愁無數蜻蜓齊上下一雙鸂鶒對沈浮東行萬里堪乗興須向山隂上小舟杜卜居池草侵沙古巷棘門誰舊宅早曽聞説屬官家更無新燕來巢屋自有閒人寄看花荒廐欲摧塵滿櫪小丨初涸丨丨丨榮華事歇多如此立馬踟蹰到日斜朱餘慶廢宅野蒿生瓦碑字依稀廟已荒猶聞耆舊説賢王林園一半為他主山水虛言是故鄉㦸户丨丨丨翠丨舞樓棲鷂汙雕梁柱天功業縁何事不得終身似霍光皮日休題漢州漢陽王故宅莫嫌地窄丨丨丨丨林亭小莫厭貧家活計微大有髙門鎻空宅主人到了不曽歸白居易履道居敢辭湫隘遊宦京都二十春貧中無處可安貧長羡蝸牛猶有舍不如碩䑕解藏身且求容立錐頭地免似漂流木偶人但道吾廬心便足丨丨丨丨與囂塵何上卜居閒花含笑舉目淒涼入破閒鮫人一飯尚知恩丨丨舊識猶丨丨恠石無情更不言樵叟和巢伐樹李牧童兼草刈蘭蓀壺觴笑詠隨風去唯有聲聲蜀帝魂方于題故人廢宅朽樹經隂當道朱門白晝扄髙堂歌吹乆無聲古窗積雨昏殘晝丨丨丨丨長寄生門下老人時洒掃舊時來客歎平生艶姬驕馬知何處獨有庭花春自榮張文潛京師故宅楊棟榆楹予因卞氏故居改築新宅其㕔事陋甚有柴氏㕔三間求售三百餘萬錢力不能致子遲曰因卞之舊而易其尤亦可子孫若賢當師公儉予愧其言從之作因舊詩君不見林上鵲冬深始營巢及春巢已成又不見梁上燕春深初作窠及夏雛已生我今一區屋三年費經營紛紛伐梧楸日厭斧斤聲老境能幾何何日安餘齡一言愧吾兒事忌與力争青丨易三丨赤丨換雙丨指顧行即具構築役已輕酇侯念子孫不處髙閈閎吾今何人斯此則座右銘竹落荆扉從官三十載故山凡幾歸昔歸尚有屋再歸已傾欹今歸但喬木丨丨丨薪丨上為鸛鳥都下為雞犬棲相彼東西隅三畆以為基積塊與運甓實窪而培庳成兹道旁舍空我槖中資堂室取即安牖户適所宜嘉樹三四株當窗發華姿馨花入懐袖似與僊人期我今六十老豈不知前非骨相自不媚况復筋力微收此衰病身與汝長相依松楸幸在望隣曲不見遺葛巾隨里社庶以保期頥供王父遷居窗響瀍澗嘉祐壬寅嵗新巢始孱功正分道徳里更近帝王宫檻仰端門峻軒迎兩觀雄丨虛丨丨丨臺逈粲伊嵩好景尤難得昌辰豈易逢無才濟天下有分樂年豐水竹腹心裏鶯花淵藪中老來歡不已端節歎何窮嘯嗷陪真侣經營荷府公丹誠徒自寫匪報自恩隆聞見録邵堯夫謝王栱辰園占林泉重謝諸公為買園買丨城東丨丨丨十千來歩平流水二十餘家争出錢嘉祐卜居終是僦熈寧出劵誰能專鳯凰樓下新閒客道徳坊中舊散仙洛浦清風朝滿袖嵩岑皓月夜盈軒接籬倒戴芰荷畔談塵輕揺楊桞邊陌徹銅駝花爛熳隄邉金谷草芊綿青春未老尚猶可紅日已髙猶自眠洞號長生宜有主窩名安樂豈無權敢於世上開明眼㑹向人間别有天盡送光隂歸酒盞都移造化入詩篇也知此片好田地消得堯夫筆似椽今宅契司馬温公户名園契富鄭公户名庄契主郎中户名康節初不改也仝前全勝賀監家楊監丨丨丨丨丨賜湖豈比賜書華回環自闢三三徑頃刻常開七七花門外有田聊伏臈望中無處不烟霞却慙下客非摩詰無畫無詩可得誇周子充訪楊少監來臨處士家相國丨丨丨丨丨山間草木也光華髙軒行李能過李小隊尋花到浣花留贈新詩光奪月端令老子氣成霞無論藏去傳詒厥拈向田夫野老誇楊廷秀和謝卜居屏山下丨丨丨丨丨俯仰三十秋終焉村墟近未愜心期幽近聞西山南深谷開平疇茆茨十數家清川可行舟風俗頗淳厚曠土非難求誓捐三徑貲往遂丘壑謀伐木南山巔結廬北山頭耕田東漢岸濯足曲溪流朋來即共懽客去成孤遊静有山水樂而無身世憂著書俟來哲補過希前修兹焉畢暮景何必營菟裘朱元晦卜居先廬風雨荒舊宅去鄉三十年丨丨丨丨丨坡風雨傾舊廬江湖𦕈故國丨丨丨丨丨喬木依然擁丨丨丨丨丨舊廬仝上古今合璧事類備要别集卷十四
