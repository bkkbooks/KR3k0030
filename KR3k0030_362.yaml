body:
  text: 古今合璧事類備要外集卷六十二宋謝維新撰財用門玉附璧玕琅財貨源流玉天地之精也有山𤣥文者有水蒼文者有白如截肪者有赤如雞冠者有黒若純漆者有黃譬蒸栗者色各有不同焉生於山而木潤産於水而流方藏於埃也而文采露於外自然之美莫容揜者如此然君子所貴乎玉者非寶其物德其物也温潤而澤仁也縝密以栗智也廉而不劌義也垂之以墜禮也叩之其聲清越以長其終詘然樂也瑕不揜瑜瑜不揜瑕忠也孚尹旁達信也氣如白虹天也精神見於山川地也圭璋特達德也天下莫不貴者道也此君子之所貴者也按俗相傳玉出藍田等處然今所用皆外國來也于闐産玉處其南千三百里曰玉州多玉者此山也其河源所出至于闐分為三東曰白玉河西曰緑玉河又西曰烏玉河三河皆有玉而色異每嵗秋水涸國王撈玉于河然後國人得撈玉中國所用盖出諸此璧盈尺許形圓有肉好琅玕生蜀郡平濁數種色琉璃之類火齊珠也青者為佳或又云出雟州以西烏曰蠻中及于闐國或又云生海中海人於海底以網掛得之初出水時紅色久而青黒枝柯似珊瑚而上有孔竅如蟲蛀然擊之琅然有金石之聲與珊瑚相類或又云出崑山云事類石錯他山之丨可以為丨注錯攻玉詩木垂山有寶玉丨旁枝皆下丨酉陽雜俎山耀石藴玉而丨丨陸機賦木潤玉在山而丨丨大戴禮韞櫝有美玉於斯丨丨而藏諸求善價而沽諸語掲璽周禮職金凡金玉錫石丹青之戒令受其入征者辨其物之美惡與其數量丨而丨五德玉有丨丨五經通義盈尺聖人不貴丨丨之璧白帖崑山火炎丨岡玉石俱焚注丨脊曰岡丨丨出玉言火逸而害玉書荆山丨丨之下以玉璞抵鳥鵲鹽鐵論又丨丨之玉潛光荆石之中雖有千仞之土不能揜其光抱朴子歸山太行之山其首曰丨丨其上有金玉下有碧山海經瑶琨揚州厥貢丨丨注丨丨美玉球琳雍州厥貢惟丨丨琅玕注丨丨皆美玉修玉舜丨五丨贄書舜典俘玉湯伐三朡丨厥寳丨書共玉周禮玉府丨王之服丨佩玉珠玉五齊則丨丨食禮受球湯丨小丨大球詩陳寶康王越玉五重丨丨𢎞璧琬琰在西序大玉夷玉天球在東序書釣玉文王至磻溪吕尚釣玉趨稱曰望公七年今見玉景荅曰望丨得丨璜刻曰姬受命吕佐檢尚書中侯切玉周穆王征西戎西戎獻昆吾之劍赤刀丨丨如切泥列子田父怖魏之丨丨有耕於野者得玉徑尺不知其玉也以告鄰人曰此怪石也蓄之不利其家田父雖疑猶取以歸置於廡下其玉明照一室大丨返而棄之於野鄰人取之以獻魏王魏王召玉工相之玉工望之再拜賀曰大王得天下之寶臣所未嘗見王問其價玉工曰此無價以當之五城之都僅可一觀魏王賜獻玉者千金長食上大夫之禄尹文子卞和泣丨丨者楚野民得玉獻懷王使樂正子占之言玉王以為欺謾斬其一足懷王死子平王立和復獻之平王又以為欺斬其一足平王死子立為荆王和復欲獻之恐復見害乃抱其玉而哭晝夜不止涕盡續之以血荆王遣問之於是和隨使獻玉王使剖之中果有玉乃封和為陵陽侯卞和辭不就而去燕石為寶宋之愚人得丨丨於梧臺之側藏以丨大丨革匱十重巾十襲視之者皆掩口盧胡而笑鼠腊為璞見投贄門以玉為寶宋人或得玉獻之子罕子罕弗受獻玉者曰以示玉人玉人以為寶也故敢獻之子罕曰我以不貪為寶爾丨丨丨丨若以與我皆䘮寶也不若人有其寶稽首而告曰小人懷璧不可以越鄉納此以請死也子罕寘諸其里使玉人為之攻之富而後使復其所左襄十五以玉為楮宋人有為其君丨丨丨丨葉者三年而成遂以巧食宋國列子求旃弗獻初虞叔有玉虞公丨丨丨丨既而悔之曰匹夫無罪懐璧其罪吾焉用此其以賈害也乃獻左桓十年命宥皆賜虢公晉侯朝王王饗醴丨之丨丨丨玉五㲄注雙玉為㲄莊十五津人得寶王子朝以成周之寶珪沈于河丨丨丨之河上自浮水出將賣之則化為石左昭二十河神謂已楚子玉自為瓊弁玉纓未之服也先戰夢丨丨丨丨曰畀余余賜汝孟諸之麋弗致也左僖二十八亞父撞斗范増字丨丨漢王使人獻玉斗范増怒丨其斗漢高帝紀太子報書魏鍾繇元常有玉玦丨丨欲得之而難公密使臨菑侯因人説之繇送太子丨其云云白氏帖碎之乃受王莽就國南陽守選椽孔休守新都相休候莽疾瘢莽遺休玉休不受莽曰君面有瘢美玉可以滅瘢休猶不受莽曰君嫌其價邪遂推丨自裹進休休乃受掘之來獻晉新蔡王騰字元邁次眞定大雪平地數尺營門前方數丈雪融不積丨丨得玉馬高尺餘丨丨之月光處得西域于闐有玉河國人夜視丨丨盛丨必丨美玉孔帖端午日取于闐國玉池每以丨丨丨王親往丨玉自王而下至庶人皆取之每取一圓玉以一圓石投之西域記夫餘火玉武宗㑹昌九年丨丨國貢丨丨三斗色赤長半寸上尖下圓光照數十歩積之可以燃鼎寘之室内則不復挾纊興國軟玉天寶中丨丨献丨丨鞭屈之則首尾相就舒之則勁直如繩杜陽編安西求玉初德宗即位遣内給事朱如玉之丨丨丨丨於于闐得珪一珂珮五枕一帶胯三百簮四十奩三十釧十杵三瑟二百斤并他寶等及還詐言假道回紇為所奪久之事泄得所市流死恩州孔帖楚州獻玉上元二年丨丨丨寶丨十三曰𤣥黃天符形如笏長八寸有孔云辟兵疫同前曰鞨靺寶李章武與王倡往來死後李經所居見王來司寢將曙取一物紺碧似玉而冷狀如檞葉贈曰西岳玉京夫人所遺丨丨丨也異聞集云于闐物唐修行楊相公每朝常弄一小玉婆羅門子高數寸瑩潔精巧可愛丨是丨丨王内庫之丨雞跖集煖玉為鞍寧王有丨丨鞍天寶遺事紅玉為紐元載紫龍髯拂刻丨丨以丨環丨杜陽編玉辟邪香肅宗賜李輔國丨丨丨二各長一尺五寸奇巧非人間所有其玉之丨可聞於數百步雖鏁於金函石匱終不能掩其氣或以衣𥚑誤拂則芬馥經年縱幹濯數四亦不消歇孔六帖玉眞人像寧州眞寧本羅川天寶元年獲丨丨丨丨二十七因更名唐地理志夢擲於門李盛作安南太守丨人丨玉丨丨盛曰門玉閏字也必有榮潤果暴富貴玉箱雜記璧懷璧其罪見前玉注當璧而拜楚共王無冡適有寵子五人乃有事於羣望請神擇於五人者使主社稷乃遍以璧見於羣望曰丨丨丨丨神所立也乃埋璧於太室之庭康王跨之靈王肘加焉平王抱而入再拜皆壓紐左昭十三年以璧假道晉荀息請丨垂棘之丨丨丨於虞以伐虢公曰是吾寶也左僖二年投璧于河晉公子重耳丨其丨丨丨左氏公子反璧晉丨丨重耳之曹僖負羈饋盤飱寘璧焉公子受飱丨丨左僖卄三成子反璧魯卻丨丨過衛右宰榖臣觴之送之以璧丨丨曰觴我以酒懽我也送我以璧寄託之也衛其有亂乎背衛三十里聞崔殖之難作榖臣死之乃使人迎其妻子隔宅居之分禄食之其子長而丨其丨吕氏春秋澹臺毁璧丨丨滅明字子羽齎千金之璧渡河河伯欲之至陽侯波起兩蛟夾船子羽左操璧右操劍擊蛟皆死既渡投璧于河河伯躍而歸之子羽丨而去博物志亡璧意儀張儀嘗從楚相飲已而楚相丨丨門下丨丨掠笞不服儀謂妻曰視吾舌存否妻曰存曰足矣詳見報仇全璧歸趙趙惠王得楚和氏璧秦昭王聞之使人遺王書曰願以十五城請易璧王召見藺相如遂遣奉璧西入秦秦王大喜相如視秦王無意償趙城乃前曰璧有瑕請指示王王授璧相如因持璧却立傍柱怒髪上衝冠謂秦王曰趙王齋戒五日使臣奉璧今大王見臣甚倨得璧傳之美人以為戯弄無意償趙王城邑故臣復取璧王必欲急臣臣願與璧俱屈於柱矣王恐其破璧乃辭謝請舎相如廣成傳舎相如使人從他道以丨丨丨丨張伯懷一後漢鍾離意為魯相出私錢萬三千修夫子車身入廟拭几席劍履男子丨丨除堂下草土中得玉璧七枚伯丨其丨以六枚瘞孔子教授堂下林首有懸甕意問户曹曰此何甕也曰夫子甕也皆有丹書人勿敢發意乃發之得素書文曰後世修吾書董仲舒護吾車拭吾履發吾笥㑹稽鍾離意璧有七張伯藏其一意即召問伯果服焉羊公得五丨丨雍伯雒陽人性篤孝父母終葬無終山遂居焉山八十里上無水公汲水作義漿於坂頭行者皆飲之三年有一人就飲飲訖出石子一升與之使至高平好地有石處種曰種此可生好玉又得好婦語畢不見後種其石數嵗時時往視玉子生人不知有徐氏北平著姓女甚有名時人求多不許公乃試求徐氏徐氏以為狂乃戯云以白璧一雙來當聴為婚公至所種石中丨丨雙白璧以贄徐氏徐氏大驚遂以女妻之天子異之名其地曰玉田搜神記賜虞卿璧丨丨躡蹻擔簦一見趙王丨白丨一雙史取隂就璧朱椽名曜詐丨丨丨丨奉東平王以朝白氏帖符載説玉贈蕭易簡游三峽玉在寶族拔乎其萃者也濡天地之冲和納隂陽之粹精堅剛濕潤配德君子故為璉為瑚為珪為璋以奉乎神祇人鬼以飾乎車服冕弁非是則禮樂之道有墜於地焉當其沈耀隱樸墜汨沙泥中枯槁闇藹光明不發庸工睨之譬頑塊意方捨之惑而復投此卞氏所以喑嗚珉壖所以長王去聲也及其逢值英匠識密鍳洞掇於瓦礫而不疑扣之鏗然琢之爛然如蒸栗截昉氣吞蛇文珍貫魚目是時也即趙不得私受秦不得暴取坐齋宫而後見籍綈繡而後執委連城如脫屣割土地如裂帛以償其價猶恐其不直玉則尚矣人豈無之士君子含畧藴器困於側陋塵垢被身體蓬茨没四壁智不贍饘褐道不信妻子闒茸視之猶聲一作贅夫也及其乗時運之㑹遭知己之顧欝起耕釣作時功勲上以戴大君下以福生人澤流萬世聲塞九㝢是時也一言受卿相再詞啓茅社以厚其禮猶謂之不重於戯有至物必有至人有盛才必有大用歷觀前代不知則已茍或知之則古獄之劍不為朽鐵也鹽車之馬不為病駒也爨下之桐不為樵薪也磻溪之士不為憊叟也蘭陵蕭易簡韜沈邃之識抱宏偉之才業巨命隘與時濩落若嚮者之事尚或不冺則道必有所明志必有所行指顧樹勲績呼嘯取金紫是夫人也肯昧兹數而隕穫於此際哉人謂甚病余固知甚泰矣然三峽孱顔驚波觸天行客易愁無聞哀猿茍有鍾粟尺帛之可共則寧使賢者栖栖㳂沂其間去矣自愛余一歎矣且玉有甚美可以况德亦感乎和璞之事故為説玉以餞之琅玕青珠丨丨琅玕文選蜀都賦注大丹琅玕丨丨名九真經崑山有丨崙丨丨琅玕樹山海經又西北之美者有崑崙之璆琳琅玕焉爾雅雍州貢丨丨厥丨惟琅玕書禹貢丹柯碧葉謝𤣥卿遇神仙見丨丨丨丨微風時叩五音相節云琅玕樹也沈玢續仙傳詩集獻君朅來荆山客誰為琅玉分良寶絶見棄虚持三丨丨李白煖老丨丨湏燕玉杜甫玉山丨丨紅葉稀王維又丨丨醉倒非人推李白玉水丨丨記方流選清輝符彩照滄海丨丨凌白虹李白小疵美玉丨瑕丨國工猶珍之大賢小玷缺良友豈其絶丨丨可磨琢小缺可補磨不補亦不磨人為交工何王安石囊中法未試丨丨飱玉丨明朝且入藍田山杜璧天下珍宋國吳臺東野人得燕石誇作丨丨丨却哂趙王璧李白璧難儲金丨雖重寶費用丨貯丨韓璧死懷黃琮白丨天不惜但恐貪夫丨丨璧坡趙氏璧秦欺丨丨丨却入邯鄲宫本是楚家玉還來荆山中李白將游衡岳琅玕美人報丨丨貽我錦綉團何以丨之青琅玕古詩金薤垂丨丨丨琳琅韓夏簟清丨丨丨琅玕杜識介圭琳琅丨丨丨杜古今合璧事類備要外集卷六十二
