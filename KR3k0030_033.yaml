body:
  text: 古今合璧事類備要前集卷三十三宋謝維新撰師友門師附喪師事類主善德無常師丨丨為師書喻德師也者教之以事而丨諸德者也學記博喻能丨丨然後能為師同上知新溫故而丨丨可以為師矣語二長善學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也教也者丨丨而救失者也學記待問善丨丨者如撞鐘叩之以小者則小鳴叩之以大者則大鳴同上束修自行丨丨以上吾未嘗旡誨焉語函丈凡講問席間丨丨函容也容杖足以指畫曲禮表儀智如泉源行可為丨丨者人之師也韓詩模範師哉師哉童子之命也務學不如務求師師者人之丨丨也丨不丨丨不丨為不少矣一卷之書必立之師揚子大寶故人無師而知則必為盜勇則必為賊能則必為亂察則必為怪辨則必為誕有師而知則速通勇則速威能則速成察則速盡辨則速論故有師者人之丨丨旡師者人之大殃荀子青藍丨出于丨而丨于丨氷水為之而寒於水荀子青成藍藍謝青師何常在明經北李謐傳道尊凡學之道嚴師為難師嚴然後丨丨丨丨然後民知敬學是故君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也大學之禮雖詔於天子旡北面所以尊師也功倍善學者師逸而丨丨又從而庸之不善學師勤而功半又從而怨之學記師資善人者不善人之丨也不善人者善人之丨也故因曰丨丨老師術尊嚴而憚可以為師耆艾而信可以為師誦說而不陵不犯可以為師知微而論可以為師丨丨有四而博習不與焉荀子何常師夫子焉不學而亦丨丨丨之冇子張有餘師夫道若大路然豈難知哉人病不求耳子歸而求之丨丨丨告子記問師丨丨之學不足為人丨必也其聽語乎力不能問然後語之語之而不知雖舍之可也學記章句師馬融鄭𤣥丨丨丨且今世固不少章句師僕幸非其人吾子欲之其有樂而望吾子者矣言道講古窮文辭以為師則固吾屬事栁宗元答嚴厚與書三人師孔子曰丨丨行必有我丨擇其善者而從之其不善者而改之語百世師孟子曰聖人丨丨之丨也伯夷栁下惠是也故聞伯夷之風者頑夫亷懦夫有立志聞栁下惠之風者薄夫敦鄙夫寬盡心夫子善誘丨丨循循然丨丨人博我以文約我以禮語老聃博古孔子曰吾聞丨丨丨丨知今通禮樂之原明道德之歸則吾師也吾將往矣家語子思傳道孟子長師孔子之孫子思孟子設科夫子之設科也往者不追來者不拒孟設教洙泗孔子丨丨於丨丨之上修詩書禮樂弟子彌衆至自逺方莫不受業焉史講道河濵文中子丨丨丨丨著六經北面受學者皆當時偉人隋書正席而坐蘇秦張儀俱是鬼谷先生受捭闔之術十有二章復受轉丸祛篋二章然秦儀用之裁得溫言酒食坐席交往貨財之禮耳秦也儀也乃復往見具言所受於師者行之少有口吻之驗耳未有傾河填海移山之力先生曰為子陳言至道齊戒擇日而往先生乃丨丨丨丨嚴顔而言告二子以全身之道下帷以講董仲舒為博士丨丨丨丨弟子傳以久次相授業學士皆師尊之絳帳女樂馬融教授諸生常有千數坐髙堂施丨紗丨前授生徒後列丨丨後堂絲竹安昌侯張禹成就弟子尤著者彭宣戴崇崇愷悌多智每候禹責師宜置酒設樂與弟子相娛禹將崇入丨丨飲食婦女優人絃管丨丨鏗鏘極樂宣之來禹見之於便坐講論經義日晏賜食不過一肉巵酒相對兩人聞知各自得也立鄭公鄉鄭𤣥字康成北海人也𤣥好學學徒相尋數千百人國相孔融深敬𤣥特丨一鄉曰丨丨丨廣其門曰通德門後漢輕東家丘邴原欲逺游學詣長安孫嵩嵩辭曰君鄉里鄭君君知乎原答曰然嵩曰學覽古今博聞强識鈎深致逺誠學者之師模也君乃舍之躡屣千里所謂以鄭為東家丘也原曰人各有志所向不同有登山而採玉者有入海而探珠者豈可以登山者不如海之深入海者不如山之髙哉君謂僕以鄭為東家丘則君以僕為西家之愚夫耶嵩辭謝焉楊震鱣堂後丨丨字伯起明經博覽旡不窮究諸儒為之語曰關西夫子楊伯起嘗客居於胡有冠雀銜三丨魚飛集講丨前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣本傳又華嶽西北谷有槐市云楊震講授學徒成市其處多槐故號焉華山記邊韶經笥後丨丨教授數百人當晝卧弟子私嘲之韶答曰腹便便五丨丨本傳精舍鳴鼓童春㑹稽餘姚人少好學師事王君仲授古文尚書後詣京房授易後迂師立丨丨逺方門徒學者常數百人諸生每升講堂丨丨三通堂下橫經捧手請問者百人漢書東陵立學詔微士周劾於丨丨丨丨褁糧受業者百餘人宋紀坐帷誦書張奂使胸奴休屠及朔方烏桓並同反叛遂燒度遼將軍門烟火相望兵將大恐各欲亡去奂安丨丨中與弟子丨丨自若軍士稍安東觀漢記隔幔授業符堅幸太學問博士經典博士盧壺對曰周官禮注未有其師韋逞母宋傳其父業得周官音義自非此母旡可授後生於是就宋立講室書堂生徒百二十人丨絳丨而丨丨焉拜宋爵號宣文君賜侍婢十人裴景仁前秦記舌耕得粟賈逵通經門徒來學不逺萬里獻粟盈倉或云逵非力耕所謂丨丨拾遺云稽古賜車後漢桓榮明帝時為師傳以所賜車馬陳諸生曰此丨丨之力也教不求資邴原年十一喪父家貧鄰有書舍原過之必泣其師問之曰何泣原曰孤者易傷貧者易感夫學者必有父兄羡其不孤而得學師感之曰欲學何書原曰旡錢資師曰茍有志徒相丨丨丨丨遂從學也禮無往教孫寶字子嚴御史大夫張忠欲令授子經乃為除害寶遂去忠遂署為主簿以屈之寶曰君男欲學而移寶自近丨有來學丨丨丨道不可屈屈身何傷且不遇者旡所不為况主簿乎忠聞之大慙遂薦寶又太守黃讜署包咸為户曹欲召咸入授其子咸曰丨有來學而丨丨丨讜遂遣子就師之包咸傳不教生徒董遇善左傳更為作朱墨别墨有從學遇不肯教謂之曰必當先讀百遍而義自見於是生徒少從遇學旡為朱墨也不薦弟子孔光為三公弟子多就見以師居位幾得其助光終旡所薦舉至有怨者其公如此選髙弟官後漢魯恭在公位丨羣丨丨至郡守者數十人而其耆舊大生或不蒙薦舉有怨者恭聞之曰學之不講是吾憂也諸生不有鄉薦者終旡言也免門生役王褒門人為縣役褒不囑縣令乃步擔乾飯立路旁磬折云云門生為役故來送令即放之不絶惡人後漢左原為郡學生犯法見斥郭林宗遇於路乃設酒肴以慰之人譏林宗丨丨丨丨林宗曰人而不仁疾之已甚亂也原後結客報諸生值林宗在學愧負前言遂罷去人乃服其知識不拒曲士陽城出為道州刺史栁宗元遺何蕃等書曰俞扁之門不拒病夫繩墨之側不拒曲木師儒之席丨丨丨丨吾之師表頴川荀淑至真陽遇黃憲於逆旅時年十四淑竦然異之揖與語終日不能去謂憲曰子丨丨丨丨也學者取法李嶠為文章老宿一時丨丨丨丨焉學非一師夏侯勝始從始昌受尚書後事簡卿又從歐陽氏問為丨所問丨丨丨學者千餘牟長為博士諸生講丨丨常有丨丨人著録前後萬言東漢儒林傳馬融才髙博學為世通儒教養諸生常有千數涿郡盧植北海鄭𤣥皆其徒也本傳趍慕數百河南禇冲吳何圓等起拜學官為之師表執經問義逺邇丨丨至徒丨丨人李栖筠傳翼贊一人髙祖鎮太厚引張復𦙍為客以經授秦王太宗即位賜燕月池帝從容曰今日弟子何如𦙍曰昔孔子門人三千達者旡子男之位臣丨丨丨丨乃王天下計臣之功過於先聖帝為之笑事若嚴君魏常爽門徒七百餘人京師學業翕然復興立訓甚嚴有勸罰之科弟子丨之丨丨丨焉本傳慕者接迹陽城逺近丨其行來學丨丨丨于道諸生請留陽城為司業出為道州刺史太學丨丨何蕃等頓首闕下丨丨數日為吏遮抑不得上本傳四逺傳業李善坐與賀蘭敏之善流姚州遇赦還居汴鄭間講授諸生丨丨至丨其丨號文選學南方從遊栁宗元徙栁州刺史丨丨為進士者千數千里丨宗元丨經指授者為文辭皆有法矮國願師蕭頴士丨丨遣使入朝自陳國人願得蕭夫子為師者中書舍人張漸諫不可而止著師授譜唐韋表微以學者薄師道不如聲樂賤工能尊其師乃丨九經丨丨丨以詆其違作師友針栁宗元以世之為人師者衆笑之為友者不以道而以利因丨丨丨丨以警巳又以誡人云不師如之何吾何以成不友如之何吾何以增吾欲從師可師者誰借有可從舉世笑之吾欲取友誰可取之借有可取中道或捨仲尼不生牙也久死二人可作懼不吾似中焉可師恥焉可友筆是二物用惕爾後道茍在焉傭丐為偶道之反是公侯以走內考諸古外考諸物師乎友乎警爾旡忽栁文韓作師說古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能旡惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生於吾乎是故旡貴旡賤旡長旡少道之所存師之所存也嗟乎師道之不傳也久矣欲人之無惑也難矣古之聖人其出人也逺矣猶且從師而問焉今之衆人其去聖人也亦逺矣而恥學於師是故聖益聖愚益愚聖人之所以為聖愚人之所以為愚其皆出於此乎愛其子擇師而教之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者也非吾所謂傳其道解其惑者也句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不恥相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近諛嗚呼師道之不復可知矣巫醫樂師百工之人君子鄙之今其智乃反不能及可怪也歟聖人無常師萇𢎞師襄老聃郯子之徒其賢不及孔子孔子曰三人則必有我師故弟子不必不如師師不必賢於弟子聞道有先後術業有専攻如是而已李氏子蟠年十七好古文六藝經傳皆通習之不拘於時請學於余余嘉其能行古道作師說以貽之栁論師道宗元白辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者雖嘗好言論為文章甚不自是也不意吾子自京師來蠻夷中乃幸見取僕自卜固旡取假令有取亦不敢為人師為衆人師且不敢况敢為吾子師乎孟子稱人之患在好為人師由魏晉氏以下人益不事師今之世不聞有師有輒譁笑之以為狂人獨韓愈不顧流俗犯笑侮收召後學作師說因抗顔而為師世果羣怪聚罵指目牽引而增與為言詞愈以是得狂名居長安炊不暇熟又挈挈而東如是者數矣屈子賦曰邑犬羣吠吠所怪也僕往聞庸蜀之南恆雨少日日出則犬吠豫以為過言前六七年僕來南上年冬幸大雪踰嶺被南越中數州數州之犬皆蒼黃吠噬狂走者纍日至旡雪乃已然後信前所說者今韓愈既自以為蜀之日而吾子又欲使吾為越之雪不以病乎非獨見病亦以病吾子然雪與日豈有過哉顧吠者犬耳度今天下不吠者幾人而誰敢衒怪於羣目以召閙取怒乎平居望外遭齒舌不少獨缺為人師耳旡招越蜀吠怪而為外廷所笑則幸矣栁答韋中立書師事濓溪明道先生程皓字伯淳伊川先生頤字正叔少侍父珦通守南安軍時濓溪先生周惇頤茂叔為理曹掾相從講學遂能紹千載不傳之祕師事伊川吕希哲字源明與伊川鄰齊首以丨禮丨先生而四方從逰者日益衆丨丨先生隱居龍門止四方學者曰尊所聞行所知可矣不必及吾門也明體用學安定先生胡翼之在湖學時福唐劉彞執中往從之學者數百人盡為髙弟凡紀綱於學者彞之力為多後召對上問從學何人對曰臣少從學於安定先生胡瑗上曰其人文章與王安石孰優彞曰胡瑗以道德仁義教東南諸生時王安石方在場屋修進士業臣聞聖人之道有體有用有文君臣父子仁義禮樂厯世而不可變者其體也詩書史傳子集垂法後世者其文也舉而措之天下能潤澤其民歸于皇極者其用也國家纍朝取士不以體用為本而尚其聲律浮華之詞是以風俗偷薄臣師瑗尤病其失遂丨丨丨之丨以授諸生故今學者明夫聖人體用以為政教之本皆臣師之功也上悅李薦書先養生術客有話胡翼之為國子先生日畨禺有大商遣其子來就學其子儇宕所齎千金染病甚瘠客于逆旅若將斃焉偶其父至京師閔而不責攜其子謁胡先生告其故曰是宜先警其心而後誘之以道者也乃取一帙書曰汝讀是可以丨知丨丨之丨知養生而後可以進學矣其子視其書乃黃帝素問也讀之未竟惴惴然懼伐性命之過甚痛悔自責冀可自新胡知其已悟召而誨之曰知愛身則可以修身自今以始其洗心向道取聖賢之書次第讀之既通其義然後為文則汝可以成名聖人不貴旡過而貴改過旡懷昔悔苐勉事業其人亦頴鋭善學二三年登上第而歸同上喪師門人無服孔子喪丨丨疑所服子貢曰昔者夫子之喪顔回若喪子而丨丨喪子路亦然請喪夫子若喪父而旡服弟子心喪孔子喪魯城北泗上丨丨服三年丨丨畢相訣而去唯子貢廬於冡上凡六年然後去史記門人廬墓仲尼既葬弟子皆家于墓行心喪之禮三年喪畢或去或留家語孟子曰昔者孔子殁三年之外丨丨治任將歸入揖於子貢相向而哭皆失聲然後歸子貢反築室於場獨居三年然後歸孟子弟子起墳侯芭從楊雄受太𤣥法言雄卒芭為起墳喪之三年本傳楊雄死丨丨共為丨冢號曰楊冢七略負土成墳後漢桓榮字春卿事九江朱普普卒榮乃奔喪丨丨丨丨服斬居廬郭禹師郭荷荷卒曰五服之師者重服聖人嫌也遂丨丨丨丨門第事類親師安其業而丨丨學記請業丨丨則起請益則起曲禮就養事師有隱而旡犯左右丨丨無方服勤至死檀弓摳趨侍先生之禮丨衣丨隅必謹唯喏曲禮假館受業曹交曰交得見於鄒君可以丨丨願留而丨丨於門告子逺道願見士成綺見老子而問曰吾聞夫子聖人也吾固不辭丨丨而來丨丨百舍重趼而不敢息今吾觀子非聖人也鼠壤有餘疏注曰言不惜物也孔門弟子孔子弟子身通六藝七十有二人孔子世家自孔子卒七十子之徒散游諸侯大者為師傅卿相小者友教士大夫或隱而不見史儒林傳申公弟子丨丨丨丨為博士者十餘人孔安國至臨淮太守周羈夏寬為內史魯陽至東海太守繆生內史徐偃中尉同上王通門人文中子紹明王道游其門皆天下俊傑劉禹錫碑門人自逺而至董常姚義杜淹李靖程元竇威薛收賈瓊房元齡魏證溫大雅陳叔達咸稱師北面而受王佐之道焉如往來受業者不可勝數蓋千餘人世家門人竇威賈瓊姚義受禮溫彥博杜如晦陳叔達受樂杜淹房喬魏證受書李靖薛方士裴晞王圭受詩叔恬受元經董常仇璋薛收程元備聞六經之義中說先君門人布在廊廟王福畤雜録韓門弟子賈島劉義皆丨丨丨丨盧同傳昌黎先生殁門人隴西李漢辱知最厚且親遂收拾遺文旡所去失文集序貴游知學李固郃之子也少好學嘗改易姓名杖策騎驢負笈從師不逺千里遂究覽墳籍為世大儒每到太學密入公府定省父母不令同業諸生知其為郃子也厮役授書後漢趙偉字君長恥於丨丨遂棄車馬詣資中杜撫丨丨二十年易已東矣田何受易於丁寬學成寬東歸何謂門人曰丨丨丨丨吾道東矣鄭𤣥事馬融在門下三年不得見使髙業弟子傳受於𤣥𤣥日夜尋誦辭歸融喟然謂門人曰鄭生今去丨丨丨丨吾受道矣孫奮少從劉歆受春秋左氏傳歆稱之謂門人曰丨已從君魚丨丨丨本傳紙上語耳沈重講學授業徐曠從之不數日辭去曰先史生所說丨丨丨丨若奧境彼有所未見者唐不稱官閥汝南應劭自贊於鄭𤣥曰故太山太守應仲逺北面稱弟子何如𤣥笑曰仲尼之門考以四科回賜之徒丨丨丨丨劭有慙色從學外家蔣義幼丨外家丨得其書博覽强記逮冠該綜羣籍白首北面賈瓊曰夫子十五為人師陳留王孝逸先達之傲者也然丨丨丨丨豈以年乎文中子日暮從師晉王承為東海吏録一犯夜人來云從師不覺丨丨承曰鞭撻寧越以立威名恐非正化之本遣吏送歸家擔囊從學吳商故鄣人學通五經百氏四方學者丨丨負笈不可勝數執經受業孫期逺人從其學者皆丨丨壟畔以追之本傳丨丨下座北面丨丨梁書嘲慢其師邊韶常晝卧弟子嘲之曰邊孝先腹便便懶讀書但欲眠本傳薦進其師前試宣州溧水縣尉胡震博通六經華皓一志臣童幼之時於震授業豈謂年踰四紀位列三公雖自君恩亦由儒訓臣幸因家門舊事輒敢薦聞李德裕集請脫師罪晉嵇康將刑東市學生三千人上書請為師帝不許不叛師教籍湜輩雖屢指教不知果能丨丨去否韓答孟蕳書渙然自悟橫渠先生張載字子厚年十八以功名自許又訪諸釋老之書知旡所得反而求之六經見二程于京師共悟道學之要丨丨丨丨相見甚喜龜山先生楊時字中立尋醫調官京師因往穎昌歸從學明道明道甚喜每言曰楊君最㑹得容易及送之出門謂坐客曰吾道南矣挹坐中風朱公掞見明道于汝歸謂人曰光庭在春風中坐了一個月涪隂記善録立門外雪游定夫楊中立初見伊川伊川瞑目而坐二子侍丨既覺顧謂曰爾輩尚在此乎今既晚且休矣及出門丨丨之丨深三尺同前詩集梁棟桷欀安定先生自慶厯中教學於蘇湖間歐公詩曰吳興先生富道德詵詵弟子皆賢才王荆公詩曰先收先生作丨丨以次收拾丨與丨先生在學時每公私試罷掌儀率諸學子㑹于首善堂合樂雅歌詩乙夜乃散諸齊亦自歌詠奏琴瑟之聲徹于外朋友互見後交游類附喪友事類同門丨丨曰朋同志曰友公羊同方儒有合志丨丨營道同術並立則樂相下不厭久不相見聞流言不信其行本方立義同而進不同而退其交友有如此者儒行盍簪勿疑朋丨丨豫卦斷金二人同心其利丨丨同心之言其臭如蘭易繫切偲朋友丨切丨偲語講習麗澤兑君子以朋友丨丨易輔仁君子以文㑹友以友丨丨語責善丨丨朋友之道也有信與朋友交言而丨丨雖曰未學吾必謂之學矣語友德友者丨其丨也不可有所挾也孤陋獨學而無友則丨丨而寡聞學記須成伐木燕朋友故舊也自天子至于庶人未有不丨友以丨者親親以睦友賢不棄不遺故舊則民德歸厚矣伐木丁丁鳥鳴嚶嚶出自幽谷遷于喬木嚶其鳴矣猶求友聲矧伊人矣不求友生伐木俱化孔子曰不知其子視其父不知其人視其友不知其君視其所使不知其地視其草木與善人居如入芝蘭之室久而不聞其香即與之化矣與不善人居如入鮑魚之肆久而不聞其臭亦與之化矣是以君子謹其所與處焉家語爭友士有丨丨則身不離於令名記僚友丨丨稱其弟也執友稱其仁也交遊稱其信也曲禮良朋每有丨丨况也永歎詩面朋朋而不心丨丨也友而不心面友也揚子三友孔子曰益者丨丨損者丨丨友直友諒友多聞益矣友便辟友便佞友善柔損矣語四友孔子曰文王有丨丨自吾得回也門人加親是非疏附耶自吾得賜也逺方之士至是非奔走耶自吾得師也前有輝後有光是非先後耶自吾得由也惡言不入于耳是非禦侮耶取友尹公之他端人也其丨丨必端矣孟子賣友天下以酈寄為丨丨為見利而忘義也相視莫逆子桑户孟子反子琴張三人丨丨而笑丨丨於心遂相與友子桑户死二人編曲鼓琴相和而歌子貢曰彼何人者耶修行而外其形骸臨尸而歌孔子曰彼遊方之外者也莊子裹飯往見子與與子桑友淋雨十日子輿丨丨而丨食之至子桑之門則若歌若笑鼓琴曰父耶母耶人乎天乎子輿曰子之歌何故若是曰吾思夫使我至此極者而弗得也結綬彈冠王吉與貢禹為友時稱王陽在位貢禹彈冠又蕭育與朱博為友著聞當代長安語曰蕭朱丨丨王貢丨丨言相薦達也同輿連璧夏侯湛芙蓉觀與潘嶽友善每行止丨丨接茵京師謂之丨丨如期謁見後漢范式字巨卿少游太學與汝南張邵為友邵字元伯二人各歸鄉里式謂元伯曰後二年當過拜尊親至期元伯白母請設饌候之母曰二年之别千里結言爾何相信之審耶對曰巨卿信士必不乖違至日巨卿果到升堂拜母盡歡而别遇賊不避荀巨伯逺看友人疾值狄賊攻郡巨伯不忍去賊既至謂巨伯曰大軍至一郡並空汝何男子敢獨止此巨伯曰有友人疾不忍委之寧以我身代友人之命賊知其賢旋軍而還為友騶導范式丨荆州丨人孔嵩家貧為新野縣傭縣遣嵩為式導騶式曰孔仲山耶命代嵩以傭未畢不肯去訪友馬廏王尼為護軍府士王澄胡母輔之指護軍府尼時給府養馬輔之等遂入座馬廏下護軍大驚即與尼長假免為兵因子拜父孔融才髙倨傲年在陳紀陳羣之間融先與紀友後與羣交更為紀拜魏志升堂拜母周瑜與孫策同年獨相友善推道南大宅以舍䇿丨丨丨丨有無通共思每入夢六國時張敏與髙惠為友每相思不能得敏便於夢往尋但行至半路即迷不知路思輒命駕吕安服嵇康髙致每一相丨丨千里丨丨從之時請一言衛玠遇有勝日親友丨丨丨丨相與一笑曹修交南都劉損曰艱難之際頗懷朋友何時丨丨抵掌丨丨滌我塵冗與談必久尹敏與班彪相厚每相丨丨常日旰不食晝即至冥夜徹旦見侮不較程普以年長數侮周瑜瑜折節不與較普後自敬服而親重之乃告人曰與周瑜交若飲醇醪不覺自醉江表傳同師之友鄭崇弟立與傅喜同門相友善西漢盧植字子幹少事馬融與鄭立同門相友總角之好孫策下令曰公瑾與孫有丨丨丨丨骨肉之分青雲之交江淹曰袁炳與余有丨丨丨丨非直銜杯酒而已芳樽之友劉畢丨丨丨丨本贊作爾汝交禰衡有逸才少與孔融丨丨丨丨交時衡未滿二十而融已五十敬衡而忘年也本傳為忘年交鄭當時年少其所交者皆大父行天下有名之士山濤舉嵇康等丨竹林之交著忘年之契王戎少阮籍二十嵗而籍與之交張鎰有重名陸贄年十八往見語三日竒之請丨丨丨丨孟郊性介少合韓愈一見丨丨丨丨號耐久朋唐魏元同與裴炎締交能保終始時丨丨丨丨為莫逆交楊寧與陽城丨丨丨丨德宗召城寧與俱來唐史號山林友韋溫少合所善惟蕭祜少貧隱居以孝聞不以塵事自蒙故溫丨丨丨丨書金蘭簿戴洪正每得密友一人則丨于編簡焚香告祖考號丨丨丨宣武盛事華歆三友丨丨與邴原管寧為友時人號丨丨為一龍歆為龍頭原為龍腹寧為龍尾魏志樂天三友白丨丨以詩酒為丨丨自作北窗三友詩云云方外十友陸餘慶雅善趙貞固盧藏用陳子昻杜審言宋之問畢搆郭襲微司馬承禎釋懷一時號丨丨丨丨文章四友杜審言少與李嶠崔融蘇味道為丨丨丨丨世號崔李蘇杜出謁更僕韓參政憶李參政若谷未第時俱貧同途赴試京師共有氊一席一割分之每丨丨丨為丨李先登第授許州長社縣主簿赴官自控妻驢韓為負一箱將至長社三十里李謂韓曰恐縣吏來箱中只有錢六百以其半遣韓相持大哭别去後舉韓亦登第皆至參政邵氏録死當同傳熙寧元豐間士大夫論天下賢者必曰君實景仁其道德風流足以師表當世其議論可否足以榮辱天下二公蓋相得歡甚皆自以為莫及曰吾與子生同志丨丨丨丨而天下之人亦旡敢優劣之者二公既約更相為傳而後死者則志其墓故君實為景仁傳其略曰吕獻可之先見景仁之勇决皆豫所不及也蓋二公用捨大節皆不謀而同仁宗時論立皇嗣英宗時論濮安懿王稱號神宗時論新法其言若出一人相先後如左右手故君實嘗謂人曰吾與景仁兄弟也但姓不同耳然至於論鍾律則反復相非終身不能相一君子是以知二公非茍同者墓志喪友莫可為語惠施死而莊子寢說言世丨丨丨丨也淮南子無與為善子産歸未至聞子皮卒哭且曰吾以丨丨丨丨矣唯夫子知我也入哭甚哀臧武仲臧孫紇也孟孫死臧孫丨丨丨丨多涕出其御曰孟孫之惡子而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也孟孫之惡我藥石也美疢不如惡石夫石猶生我疢之美其毒滋多先友而死羊角哀左伯桃二人為死友欲仕於楚道遇雪饑寒不得行自度不俱生伯桃謂角哀曰俱死之後骸骨莫收我不如死我樂在樹中角哀聼之伯桃入樹中而死楚平王哀角哀之賢以上卿禮葬伯桃後角哀夢伯桃曰正苦荆將軍冢相近今月十五日當大戰角哀至期陳兵馬指其冢作三銅人自殺下從之列士傳賑其妻子朱暉與同縣張堪為友把暉臂曰欲以妻子託朱生堪卒暉聞其妻子貧困自往候視厚賑給之曰堪嘗有知己之言吾已信於其心也酹於墓道曹操感喬𤣥知巳後經過𤣥墓自為祭文曰承誓約之言徂役之後路有經過不以斗酒隻雞過祠沃酹車過三步腹痛勿怨為復其讎郅惲友人董子張父為鄉人所害及子張病將終惲往候之子張視惲歔欷不能言惲曰吾知子不恐天命而痛讎不復也子在吾憂而不手子亡吾手而不憂惲即將客遮仇人取其頭以示子張子張遂死因思所與李元實既沒其文益可貴思元賔而不見見元賔之所與者則如元賔焉韓答李師寶書詩集輕言丨丨託朋友對面九疑峯多花必早落桃李不如松管鮑久已死何以繼其蹤箜篌謠强諾谷風刺輕薄交道方􅮟巇斗酒丨然丨寸心終自疑李白古今合璧事類備要前集卷三十三
