body:
  text: 古今合璧事類備要前集卷九宋謝維新撰地理門溪事類注川水丨丨曰溪注溪曰谷爾雅赴溪東流之水不息流行丨百仞之丨也家語為牝溪谷丨丨同上守雌知其雄丨其丨為天下溪老子黄溪環末之治百里至于浯溪西至于相之源南至于瀧泉東至于丨丨東屯其間名山水而村者以百數黄溪最善黄溪距州治七十里栁宗元記青溪田㳺岩愛夷陵丨丨止廬其側六帖愚溪灌水之陽有溪焉東流入于瀟氷或曰冉氏常居也故姓是溪為冉溪余以愚觸罪謫瀟水上愛是溪故更名之為丨丨云云水智者樂也今是溪獨辱于愚何哉其流甚下不可以溉灌又峻急多坻石大舟不可入也幽邃淺狹蛟龍不屑不能興雲雨無以利世而適類于余然則雖辱而愚之可也栁子愚溪序蒙溪陸希聲居當溪之居名其溪曰丨丨將以䝉昧也酌而飲䝉溪曰吾所以命夫谿之為䝉者勉子以決也子其決于夷壤而發其源決于塞垣以通其流决于腴畆以施其潤决于涸澤以博其恵决于廣陂使介鱗蕃育决于巨浸使蚪龍變化陸遁叟山居詩序靈溪過丨丨而一濯文好溪處州東十里有惡溪多水怪宣宗時刺史叚成式有善政水怪潜去民謂之丨丨地理志竹溪六逸李白與孔巢父韓凖裴政張叔明陶沔居徂徠山日沈飲號丨丨丨丨桃源二仙劉晨阮肇採藥天台迷道溪行見水中流胡麻飯誤入桃源遇仙釣溪得璜吕望丨磻丨于魚腹中丨玉丨尚書大傳鑿石引泉丨丨丨丨釃其流以為溪溪不袤數丈趣侔江海獨孤及瑯琊溪述序詩集岸平積水涵虚上下清㡬家門静丨㾗丨浮萍破處見山影小艇歸時聞草聲入郭僧尋塵裏去過橋人似鑑中行已憑暫雨天秋色莫放修蘆礙目生張子野題无相院西溪石淺溪水碧于草潺潺花底流沙平堪濯足丨丨不勝舟洗藥朝與暮釣魚春復秋興來從所適還欲向滄州岑参東溪書淵事類水塞丨通之斯為川丨之斯為淵李蕭逺運命論時出博博淵泉而丨丨之溥博如天淵泉如淵中庸不流水出地而丨丨者命之曰淵管子若隕慄慄危懼若将丨于深淵書周池呀丨丨而成淵選西都賦靈湖曽潭之府丨丨之淵郭景純江賦魚潛丨在在藻或丨在淵詩龍躍見丨在田或丨在淵易乾卦魚躍鳶飛戻天丨丨于淵龍生積水成淵而蛟丨丨焉荀勸學羡魚臨淵丨丨不如退而結網董䇿育鱗佇重淵以丨丨陸士衡賦生珠淵丨丨而崖不枯為善不積耶安有不聞乎荀勸學沉玉淵者衆物之所生也能深而不能涸則丨丨至管子納景丨丨于虞淵文選琴賦取日丨丨虞淵狄仁傑賛泉事類水源丨本曰丨源曰泉正直上出曰檻泉從上溜下曰下泉湧出曰濆泉側出曰汍泉泉所出同所歸異曰肥泉異出同流曰瀵泉見尔雅及詩注天澤泉之源曰丨丨之源出髙而施下也韓愈宴喜亭記一勺源泉所出也委流所聚也始出丨丨卒成不測記學記注盈科源泉混混不舍晝夜丨丨而後進放乎四海冇本者如是孟離婁上出泉山下丨丨䝉易及泉有為者辟若掘井掘井九仞而不丨丨猶為棄井也孟盡心上氿泉有冽丨丨无浸穫薪詩檻泉觱沸丨丨采觱沸出貌詩菽寒泉爰有丨丨在浚之下詩凱風井冽丨丨易井卦温泉見後靈池泉注白泉泉色丨自出山澤得禮制則澤谷之泉出飲之使人長夀瑞應圖紅泉飄丹砂于丨丨謝靈運賦又謝靈運題華子岡冇石磴㵼丨丨之句醴泉美泉也水之精也崑崙山有丨丨華池君乗土而王其政太平則丨丨出湧其政和平則丨丨瀌神靈滋液百珍實用則丨丨出黄帝時以丨丨為漿堯之世徳茂清平則丨丨出夏后時俊又在官則丨丨出漢宣帝三年丨丨流滂枯槁榮茂後漢世祖中元元年夏丨丨出飲之者疾病皆愈六帖瀑泉司空圖舊隠三峯泉石之美冠于一山北岩之上有丨丨流注谷中灌良田數十頃至今子孫猶為司空南部新書靈泉沉精䧏液下為丨丨清徳之鑑柔道之軆張曲江龍池頌噴若玉竇泄為瑶池浄如醍醐瑩若琉璃權徳輿靈泉記貪泉吴隠之性亷操為廣州刺史界上一水謂之丨丨古老云飲此水者亷士皆貪隠之至酌而飲之賦詩云古人言此水一飲懐千金試使夷齊飲終當不易心清操愈厲晉史馮立受廣門都督嘗見丨丨曰此豈隠之所酌邪吾雖日汲庸易吾性哉遂極飲而去本傳上善泉坊州州郭无水東北七里有丨丨丨開成二年刺史張怡架水入城以紓逺汲四年刺史崔駢復増修之民獲其利後思之為立祠唐地理志應聖泉楊師晟師次方渠水乏有青蛇降下走視其跡水從而流使築防環之遂為停淵士飲仰足有詔置祠命泉曰丨丨本傳白雲泉丨丨丨在吴縣天平山白樂天題以絶句范文正繼作名遂著圖經玉漿泉鳥䑕山俗呼為髙武隴其下渭水所出絶璧千仞本之諸羗馬足所踐忽飛泉湧出人為之謡因號為丨丨丨隋史靈池泉丨丨山在翁源縣上有八泉曰湧泉甘泉温泉震泉龍泉玉泉靈丨水衡記蘆葭泉玉門軍有丨丨丨周二丈深一丈駞馬千頭飲之不竭酉陽雜俎石臼泉施州南寨丨丨溪旁其丨源有七眼圖經天齊泉齊地泉中或出瓦上有丨丨字晏子曰吾聞江深五里海深十里此丨與天齊也齊記撫掌泉在餘杭洞霄宫相傳錢武肅王至宫丨丨而丨湧因以為名圖經卓錫泉唐子西逰羅浮至寳積寺飲泉而丼寺僧曰此丨丨丨也昔梁景泰禪師始居此山其徒以无水難之師笑而不答已而庵成師卓錫于地泉湧數尺自是得井山中迨今頼之子西卓錫泉記滄州緑渠丨丨乆視山下出澄緑水其泉一百歩亦謂之流丨丨投之金石終不沉沒唐杜陽編房陵粉水房陵有清泉土人以為粉則膏澤芳潤貢京師因名丨丨丨丨地理志泉如盤龍元街縣有丨丨眼中水交泉丨丨丨或試撓破之尋手成龍状驢馬飲之皆驚走酉陽雜俎渠降青蛇見上應聖泉注拜井泉出後漢耿恭于城中穿井十五丈不得泉乃向井再拜為吏士禱有頃水泉奔出刺山泉湧漢李廣利為貳師将軍拔佩刀丨丨飛丨丨出翻車轉水後漢張讓趙忠説靈帝鑄天祿蝦蟇吐水于平門外橋東轉水入宫又作丨丨渇烏施于橋南用洒南北郊路並本傳營墳湧泉安金蔵京兆萬年人神龍母䘮𦵏南闕口丨石丨晝夜不息地本栝燥泉忽湧流孔帖孝感泉出姜詩至孝有泉出味如江水以養其母憂禱泉出孝友宋思禮蕭縣簿㑹大旱井池涸母羸疾非泉水不適口思禮丨懼且丨忽有丨丨諸庭味甘寒日不乏汲縣人異之引泉激膚王鉷以寳鈿為井榦丨丨丨丨號自雨亭通脉入井李徳裕任中書常飲常州恵山泉自毗陵至京置遞鋪號水遞有僧謁見曰所謁相公者為相公通常州水脉京都一眼井與恵山寺泉脉相通徳裕大笑其荒唐僧曰相公但取此井水在昊天觀常住庫後也徳裕乃以恵山一甖昊天一甖雜以八瓶都十瓶暗記出處遣僧辨析僧因啜甞取恵山寺與昊天餘八乃同味徳裕大竒之即停其人遞人不告勞浮議遂弭芝田録不飲盗泉孔子過于盗泉渇矣而不飲尸子所湏清泉唐潘師正居逍遥谷髙宗召問所湏對茂松清泉臣所湏也㳺巖膏肓唐田丨丨入太白山髙宗幸其門謂曰先生此佳否答曰臣所謂泉石丨丨煙霞痼疾者元結水樂丨丨于山中尤所耽愛者有丨丨是南磳之懸水淙淙然聞于耳尤便不至南磳即懸庭前之水取欹曲竇缺之石髙下承之水聲少似聴之亦便蘇頲湧泉李嶠謂丨丨曰舍人思若丨丨吾所不及徐浩奔泉丨丨善書世狀其法曰渇驥丨丨冷泉亭記東南山川餘杭郡為最由郡言靈隠為尤由寺觀冷泉亭為甲亭在山下水中央寺西南隅髙不倍尋廣不累丈而撮竒得要地捜勝槩物无遯形春之日吾愛其草薫薫木欣欣可以導和納粹暢人血氣夏之夜吾愛其泉淳淳風泠泠可以蠲煩析酲起人心情山樹為怪岩石為屏雲從棟生水與階平坐而玩之者可濯足于床下卧而狎之者可垂釣于枕上矧又潺湲潔澈粹泠柔滑若俗士若道士眼耳之塵心舌之垢不待盥滌見輙除去潜利隂益可勝言哉斯所以最餘杭而甲靈隠也白樂天龍井泉記丨丨舊名龍泓吴赤烏中方士葛洪嘗煉丹于此事見圖經其西當西湖之西浙江之北風篁嶺之上深山亂石之水泉也每嵗旱禱雨于他祠不獲則禱于此輙應故老相傳以為有龍居之然泉者山之精氣所發也西湖深靚空濶納光景而涵煙霏菱芡荷花之所附麗龜魚鳥蟲之所依慿漫衍而不廹紆餘而成文隂晴之中各冇意態而不可以言盡也故岸湖之山為所誘而不克以為泉浙江介於吴越之間一夜一晝濤頭自海而上者再疾擊而逺馳兕虎駭而風雨作過者摧當者壊乗髙而望之使人毛髪盡立心掉而不禁故岸江之山多為所脅而不睱以為泉惟此地盤幽而踞阻内无靡麗之誘以散越其精外無豪悍之脅以虧損其氣故嶺之左右大率多泉龍井其尤者也嘗有大魚自泉中躍出然後知井之有龍不謬秦少游詩集石脉丨丨綻寒光松花噴曉霜注瓶雲毋滑潄齒伏苓香野客偷煎茗山僧惜浄床参禪不要問孤月在中央章孝標方山寺泉泉眼丨丨髙千丈山僧取得歸架空横竹引鑿石透渠飛洗藥溪流濁澆花雨氣㣲朝昬長逺看䕶惜似傳衣姚合僧院泉懸泉絶頂有丨丨喧喧出煙杪不知㡬時嵗但見无昬曉閃閃青崖落鮮鮮白日皎洒流濕行雲濺沬驚飛鳥雷吼何噴薄箭馳入窈窕吾聞山下䝉今乃林巒表物性有詭激坤元曷紛矯黙然置此去變化誰能了張九齡望瀑布飛流洞門千尺掛丨丨玉碎珠聮冷噴秋今古不知誰捲得緑羅為帶月為鈎畢田題朱陵洞水簾開玉峽高岩下赤日深谷來悲風擘丨青丨丨飛出兩白龍亂沫散霜雪古潭搖青空餘流滑無聲快㵼雙石谼我來不忍去月出飛橋東蕩蕩白銀闕沉沉水晶宫願從琴髙生脚踏赤鯶公手亭扶白芙蕖跳下清冷中東波潄玉落明鏡竒哉康山陽雙劔屹對起上有横飛雲下有瀑布水崩騰復璀璨佳麗更雄偉勢從三梁外影丨丨丨裏平生兩仙句歎詠深仰止三年落星灣悵望眼空眯今朝隨枤屦得此弄清泚更誦玉虹篇塵㯲諒昭洗朱元晦漱玉亭落飛狖吾聞大山石積日穿綫溜况此百雷霆萬世與石闘深行九地底險出三峽右長輸不盡溪欲滿无底竇跳波翻潜魚震響丨丨丨清寒入山骨草木盡堅痩空濛煙雨間澒洞金石奏彎彎飛橋出㶑㶑半月彀玉淵神龍近雲雨亂晴晝垂瓶得清甘可嚥不可𠻳東坡三峽橋走長蛇兩岸蒼璧對直下成斗絶一水從中來蕩潏知㡬折石梁㨿其㑹迎望逺眀㓕倐至丨丨丨㨗來翻素雪聲雄萬霹靂势倒千嵲嵽足掉不自持魂驚詎堪説老仙有妙句千古擅竒崛尚想化鶴來乗流畀明月朱元晦三峽橋挹北斗靈源何太髙北斗想可挹凌日五光直逗雲千仭急白虹下澗飲寒劍倚天立閃電不得瞬長雷無敢蟄萬丈岩崖拆一道林巒濕險逼飛鳥墜泠洒山鬼泣湏當截海去濁海不相入范希文廬山瀑布㵼銀河銀河瀉落翠光泠一𣲖囘環湛晚輝㡬恨却為頑石礙琉璃滑處玉花飛陳搏題名水澗玉虹垂地飛勢挂岳頂无時向此傾丨丨丨丨色銀漢落天聲萬丈寒雲濕千岩暑氣清滄浪不足羡就此丨丨纓石曼卿瀑布銀河落天日照香爐生紫烟遥看瀑布掛長川飛流直下三千尺疑是丨丨丨九丨李白望廬山瀑布掛流噴壑西登香爐峯南看瀑布水丨丨三百丈丨丨數千里歘如飛電來隠若白虹起初驚河漢落半在雲天裏仰觀勢轉雄壯哉造化功海風吹不斷江月照還空空中亂潨射左右洗青璧飛珠散輕霞流沬洗穹石而我逰名山對之心益閑無論漱瓊液且得洗塵顔但諧宿所好永願辭人間李白望庐山瀑布掛壁穿林逺出白雲中長年聴不窮細聲縈石亂寒色入潭空丨丨聊成雨丨丨别起風温泉非爾類源發在深