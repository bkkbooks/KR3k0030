為晉陵内史時所部四縣並以旱失田闓乃立曲阿丨丨丨溉田八百餘頃每嵗豐稔葛洪為之頌句城塘唐正觀十八年李襲譽為揚州大都督府長史乃引雷陂水又築丨丨丨以溉田八百餘畆百姓獲其利並同堰埭流菜堰傳祗為榮陽守造丨丨丨至今寛豫无水患晉史蒲葦澤晉武帝時杜元凱言頃來戸口日増而陂堰嵗決良田變生丨丨人居沮丨之際水陸失宜崇頥堰唐賈丨丨為􅘵州刺史州瀕滹沱􅋤永嵗丨溢壞室廬浸洳數百里崇順為立丨庸水不復暴百姓利之召伯埭謝安至新城築埭于城北後人追思之名為丨丨丨詩集渼陂岑参兄弟皆好竒携我逺來逰丨丨天地黤惨忽異色濤波萬頃堆琉璃琉璃汗漫泛舟入事殊興極憂思集鼉作鯨吞不復知惡風白浪何嗟及主人錦帆相為開舟子喜甚无氛埃鳬鷖散亂棹歌發絲管啁啾空翠來沉竿續蔓深莫測菱葉荷花静如拭宛在中流渤澥清下歸無極終南黒半陂已南純浸山動影裊窕冲融間船舷暝戞雲際寺水靣月出藍田闗此時驪龍亦吐珠馮夷擊鼔羣龍趍湘妃漢女出歌舞金支樂上衆飾翠旗光有无咫尺但愁雷雨至蒼茫不曉神靈意少壯㡬時柰老何向來哀樂何其多杜甫渼陂行渠事類十二渠西門豹為鄴令鑿開丨丨丨引河水灌田當時人苦役豹曰百嵗後父老子孫思我至今得水利民富足漢長史以丨丨丨橋絶馳道相近欲合二渠為一橋父老不肯曰賢君之法式不可改也史記六輔渠元鼎六年兒寛為左内史奏請穿鑿丨丨丨以益溉鄭國傍髙仰之田前溝洫志千金渠張掖郡冇丨丨丨漢書十石渠河中府龍門東南二十三里冇丨丨壚丨縣令長孫恕鑿溉田良沃畆收丨丨唐地理志浪蕩渠榮陽丨丨丨前地理志豐兖渠晉薛胄為兖州刺史城東沂泗二水合而南流胄决令西注陂澤盡為良田號丨丨丨舊沈渠延擕為幽州刺史范陽郡有丨丨丨徑五十里廢毁莫能修水旱不調人多飢餒延携自度水形營造未㡬而就溉田萬餘頃通典無棣渠薛大鼎迁滄州刺史丨丨丨乆廞廢大鼎浚治屬之海民歌曰新溝通舟楫利屬滄海漁塩至昔徒行今騁駟美哉薛公徳旁被平虜渠姜師度為易州刺史並海鑿丨丨丨以通餉路罷海運又魏祖以袁尚歸單于将征鑿渠自滹沱入汾水名丨丨丨富人渠隋郭衍開皇中為開漕渠闗中頼之名丨丨丨龍首渠莊熊羆言臨晉民願穿洛以溉重泉以東萬餘頃于是為發卒萬人穿渠洛水至商顔下岸岸崩往往為井井渠之生自此始穿渠得龍首骨故名丨丨丨前溝洫志龍口渠翰林有丨丨丨通内苑大雨後必飄諸花蘂經由而出有百種香色名不可盡春月尤妙金鑾宻記右史渠唐温造開化鄉渠溉田二千頃民獲其利號丨丨丨光禄渠李聴徙靈壇節度部有丨丨丨聴即引渠溉塞下田千頃通典鄭國渠韓聞秦好興事欲罷之無令東伐廼使水工丨丨間説秦令鑿涇水為丨東注洛欲以溉田作而覺秦欲殺鄭國國曰臣為韓延數年之命然渠成亦秦萬世之利也卒使成之於是闗中為沃野秦以冨强卒并諸候因命曰丨丨丨漢書白公渠趙中大夫丨丨奏穿丨引涇水經渭中袤三百里溉田四千五百餘頃因名曰白渠民得其饒歌曰田于何所池陽谷口鄭國在前白公起後舉臿成雲决渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口同上賈侯渠魏丨丨為豫州通運渠二百里所謂丨丨丨魏志强公渠强秦迁雍州司士参軍華原无泉人多渇死循教人渠水以浸田一方利之號丨丨丨唐本傳翟王渠趙珝封天水郡公按鄧艾故蹟決丨丨丨溉稻以利農六帖史公渠魏㐮公以史起為鄴令遂引漳水溉鄴以富魏河内民歌之曰鄴有䝨令兮為丨丨决漳水兮灌鄴房終古舄鹵兮生稻梁前溝洫志當時引渭鄭當時為大司農言異時闗東漕粟從渭上而渭水道九百餘里時有難處引渭穿渠起長安旁南山下至河三百餘里徑易渠下民田萬餘頃又可得以溉上以為然同上刀雍鑿河後魏丨丨為薄骨律鎮将上表請于河西髙渠之北丨渠髙十五歩深五尺還入古之髙渠即修髙渠合百二十里溉官私田四萬餘頃從之公私獲其利杜亞治渠丨丨拜淮南節度使至則治漕渠引湖陂築防庸入之渠中以通大舟夾隄髙卭田因得溉灌人皆悦頼孔帖馬援穿渠丨丨所過郡縣為丨丨溉灌以利民栖筠拆磑李丨丨傳闗中仰鄭白二渠溉田而豪戚壅上㳺取磑利且百所奪農田十七栖筠請皆毁撤路應通舟丨丨為虔州刺史鑿贛石根險以丨丨道漕渠􅔓船黎幹迁京兆尹京師苦樵薪乏幹度開丨丨興南山谷口尾入于苑以便運載帝為御安福門以觀之幹宻具丨丨作倡優水嬉兾以媚帝久之渠不就孔帖石渠民橋袁家渇自西南行不能十歩得丨丨丨丨其上有泉幽幽然而其鳴乍大乍細渠之廣或咫尺或倍尺其長可十歩許其流扺大石伏出其下踰石而往有石臥菖蒲被之青鮮環周栁宗元石渠古今合璧事類備要前集卷九
