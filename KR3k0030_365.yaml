千五百事送鑄錢司遂大斂民間銅器並長編私鑄令民鑄漢興以秦錢重難用至丨丨丨莢錢注如榆莢使民鑄孝文五年為錢益多而輕乃更鑄四銖錢其文為半兩除盜鑄令丨丨放丨注恣其私鑄並食貨志沈郎錢見前注私用轉甚梁初唯京師及三吳荆郢江湘梁益用錢其餘州郡則雜以榖帛交易交廣之間全以金銀為貨武帝乃鑄錢肉好周郭文曰五銖重如其文而又别鑄除其肉好謂之女錢太定百錢定平一百五銖雉錢五銖對又等錢輕重不一天子頻下詔書非新鑄二種之錢並不許用而趨利之徒丨丨丨丨私鑄不計普通中乃議盡罷銅錢更鑄鐵錢詳見鐵錢注間以錫鐵陳而承梁喪亂之後鐵錢不行始梁末又有兩柱錢及鵝眼錢于時人雜用其價同但兩柱重而鵝眼輕私家多鎔錢又丨丨丨丨兼以粟帛為貨雜用皮紙隋大業後王綱弛紊巨姦大猾遂多私鑄錢轉惡初每千猶重二斤後漸輕至一斤或剪鐵鍱裁皮糊紙以為錢相丨丨之貨賤物貴以至於亡隋食貨志又唐志姦僞競起齊神武霸政之初承魏猶用永安五銖遷鄴已後百姓私鑄遂各以為名有雍州青赤梁州生厚緊錢吉錢河陽生澀天柱赤牽之稱兾州之北錢皆不行交貿者皆以絹布神武帝乃收境內之銅及錢仍舊文更鑄流之四境未幾之間漸復細薄丨丨丨丨輩類各殊文宣受禪除永安之錢改鑄常平五銖重如其文其錢甚貴且制造甚精至乾明皇建之間往往私鑄鄴中用錢有赤熟青熟細眉赤生之異河南所用有青薄鉛錫之别青齊徐兖梁豫州丨丨丨丨武平已後私鑄轉甚或以生鐵和銅至于齊亡卒不能禁並隋惰游之民嘉熙七年祕閣校理蔡抗為廣東轉運使先是岑水銅冶大發官市諸民止給空文積逋巨萬姦民無所取資羣聚私鑄與江西鹽盜合郡縣患之督捕甚急抗曰採銅皆丨丨丨丨銅悉入官不卑其直非私鑄衣食安所給又從而誅之是豈但民犯法也因命銅入門給直民盡樂輸私鑄遂絶長編盜鑄除盜鑄令見前私鑄詳犯盜鑄罪武帝建元以來縣官多即銅山而鑄錢民亦盜鑄不可勝數錢益多而輕物益少而貴乃造銀錫白金盜鑄諸金錢罪死而丨者不可勝數並食貨志人多盜鑄後周之初尚用魏錢及武帝保定元年乃更鑄布泉之錢以一當五與五銖並行時梁益之境及雜用古錢交易河西諸郡或用西域金錢之錢而官不禁建德三年又更鑄五行大布錢以一當十大收商賈之利與布衆錢並行四年又以邊境之上丨丨丨丨又禁五行大布不得出入四關布泉之錢聽入而不聽出五年以布泉漸賤而人不用遂廢之隋食貨志人無盜鑄唐李德為蔚州刺史州有銅冶自天寶後廢不治民盜鑄不禁德乃開五爐官鑄錢日五萬丨丨犯者盜鑄乃止嘉祐四年詔聞陜西民間多濫鑄大錢以至市易不通其以見行當三大鐵錢並當小鐵錢之二先是議者欲變大鐵錢當一集賢校理陸詵言民間貴小銅錢而賤大鐵錢他日一當三猶輕之今令與小錢均直則大錢必廢請以一當二則公私所損無幾而商賈可以通行兼盜鑄計其物直無嬴則必自止詔行之自是丨丨丨丨長編盜鑄者衆初陜西軍興移用不足知商州皮仲容始獻議采洛南縣紅崖山虢州青水冶青銅置阜民朱陽二監以鑄錢既而陜西都運使張奎知永興軍范雍請鑄大錢與小錢兼行大錢一當小錢十及奎徙河東又鑄大鐵錢亦以一當十以助關中軍費未幾三月奏罷河東鑄鐵錢此陜西復采儀州竹尖黃銅置傅濟監鑄大錢朝廷因敕江南鑄大銅錢而江池號饒州又鑄小鐵錢悉輦致關中數州錢雜行大約小銅錢三十鑄當十大銅錢一以民間丨丨丨丨錢文大亂物價翔踊公私患之於是奎復奏晉澤石三州及威勝軍日鑄小鐵錢獨留用河東而河東鐵錢既行盜鑄錢者獲利十之六錢輕貨重其患如陜西言者皆以為不便知并州鄭戩請河東鐵錢且以一當銅錢一行一年又以三當一或以五當一翰林學士張方平宋祁御史中丞楊察與三司使葉清臣先上陜西錢議曰關中用大錢本以縣官取利太多致姦人盜鑄其用日輕救弊不先自損則法未易行請以江南議商州大銅錢一當小錢三又言姦人所以不鑄小鐵錢者以鑄大銅錢得利厚而官不必禁若鑄大銅錢無利又將鑄小鐵錢以亂法請以小鐵錢三當銅錢一既而又以河東小鐵錢如陜西亦以三當一且罷官所置罏朝廷皆施用其言自是姦人稍無利猶未能絶濫錢也其後詔商州罷鑄青黃銅錢又令陜西大銅錢大鐵錢皆一當二盜鑄乃止然令數變邱民耗于資用類多咨怨久之始定長編慶歷八年楮錢瘞紙錢唐王璵專以祠神位宰相漢以來喪葬用丨錢後世里俗稍以丨寓丨為鬼事至是璵乃用之焚紙錢五代晉出帝八年三月寒食望祭顯陵于南莊丨御衣丨丨本紀爇紙幣王嗣宗為節度使性剛正當卧病家人私丨丨丨以祈福嗣宗大呼而止之曰神茍有知豈枉法而受賄耶聖宋掇遺明器之類邵康節春秋祭祀約古今禮行之亦燔楮錢程伊川怪問之則曰丨丨丨丨也脫有一非豈孝子慈孫之心乎晉魯褒錢神論有司空公子富貴不侈盛服而游京邑駐駕乎市里顧見綦母先生班白而徒行公子曰嘻子年已長矣徒行空手將何之乎先生曰欲之貴人公子曰學詩乎曰學矣學禮乎曰學矣學易乎曰學矣公子曰詩不云乎幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心禮不云乎男贄玉帛禽鳥女贄榛栗棗修易不云乎隨時之義大矣哉吾視子所以觀子所由豈隨世哉雖曰已學吾必謂之未也先生曰吾將以清談為筐篚以機神為幣帛所謂禮云禮云玉帛云乎哉者已公子拊髀大笑曰固哉子之云既不知古又不知今當今之急何用清談時易世變古今異俗冨者榮貴貧者賤辱而子尚質而子守實無異於遺劍刻船膠柱調瑟貧不離於身名譽不出乎家室固其宜也昔神農氏沒黃帝堯舜教民農桑以幣帛為本上智先覺變通之乃掘銅山俯視仰觀鑄而為錢故使內方象地外圓象天錢之為體有乾有坤其積如山其流如川動靜有時行藏有節市井便易不患耗折難朽象壽不遺象道故能長久為世神寶親愛如兄字曰孔方失之則貧弱得之則冨强無翼而飛無足而走解嚴毅之顔開難發之口錢多者處前錢少者居後詩云哿矣富人哀此㷀獨豈是之謂乎錢之為言泉也百姓日用其源不匱無逺不往無深不至京邑衣冠疲勞講肆厭聞清談對之睡寐見我家兄莫不驚視錢之所祐吉旡不利何必讀書然後富貴由是論之可謂神物無位而尊無勢而熱排朱門入紫闥錢之所在危可使安死可使活錢之所去貴可使賤生可使殺是故忿爭辨訟非錢不勝孤弱幽滯非錢不拔怨仇嫌恨非錢不解令問笑談非錢不發諺曰錢無耳可暗使豈虛也哉又曰有錢可使鬼而况於人乎子夏云死生有命富貴在天吾以死生無命富貴在錢何以明之錢能轉禍為福因敗為成危者得安死者得生性命長短爵祿貴賤皆在乎錢天何與焉天有所短錢有所長四時行焉萬物生焉錢不如天窮達開塞振貧濟乏天不如錢若臧武仲之智卞莊子之勇冉求之藝文之以成人矣今之成人者何必然唯孔方而已夫錢窮者能使通達富者能使溫暖貧者能使悍勇故曰君無財則士不來君無賞則士不往諺曰官無中人不如歸田雖有中人而無家兄何異無足而欲行無翼而欲翔使才如顔子容如子張空手掉臂何所希望不如早歸廣修農商舟車上下役使孔方凡百君子同塵和光上下交接名譽益彰錢鄧州不燒楮鏹頌嗚呼士知修耶內不欺諸已外不欺諸人可謂修己已嗚呼士誠有立耶上不愧於天下不怍於地中不負於神可謂士君子已凡唯知修至於可立而不欺不愧者其備如此雖天地神明我新天地神明已豈又恤恤於諸餘哉世衰道隱士心險惑稔匿自危則區區於禍福以壯其毒聞古之用幣以禮神祗後之罪士為多則假之以請禱禳祈假之不已則翻楮代焉而弗支是故罪者滿世而莫救其非肅肅鄧州唯道之繇識獨超於衆謬行不徇於時流孰巫祝之足因而禧祥之茍求蓋清修之不愧則萬福之來酬是何楮錢之不然而名位之優優嗚呼豈弟君子求福不回誰其嗣之宋有人猗詩集爭一巢許蔑四海商賈丨丨錢曹植樂府留一囊空恐羞澀丨得丨文錢杜甫風榆落丨丨丨小錢杜荷葉疊丨丨丨青錢杜五銖九府漢日丨丨建姬年丨丨流天龍帶泉寶地馬列金溝趙一囊初定何曽箸欲收金門應八論玉井兾來求李嶠九府五銖丨丨丨丨世上珍魯褒曾詠道通神勸君覔得須知足雖解榮人也辱人同前王老何恐元來丨丨又丨丨簡齊孔方絶交丨丨兄有丨丨書山谷許和青銅往日用錢捉私鑄今丨鉛錫丨丨丨刻泥為之最易得好惡不合長相蒙杜恰有青銅朅來相聚飲一斗丨丨三百丨丨錢杜風月不論丨丨丨丨錢杜風月不用清丨明丨丨丨一錢買玉山自倒非人推李白得錢沽酒丨丨即相覔丨丨不復疑杜無錢對花每恨陶彭澤丨丨丨菊丨如今九日至自覺酒須賖杜半輪殘月丨丨丨丨掩塵埃依稀猶有開元字想得清先未破時買盡人間不平事毗陵女子年十六詠破錢見沈存中筆談楮錢拜掃情紙錢飛急人歸後腹斷雲楸丨丨丨招山劉叔擬豫韋清明郊行古今合璧事類備要外集卷六十五
