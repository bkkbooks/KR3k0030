body:
  text: 古今合璧事類備要外集卷六十五宋謝維新撰財用門銅錢附鐵錢鉟銅鐵相權泄銷私鑄銅楮相權錢漏盜鑄楮財貨源流錢之為幣以銅為之體圓孔方背面肉好皆有周郭周流四方之象也唐虞以前無聞爰自禹湯始用金鑄幣周立九府圜法輕重以銖所從來遠矣然嘗論之錢之為物寒不可衣飢不可食而公私上下之間皆不容以一日闕其故何也豈非以其資世之寶所以流通百貨使之無所偏壅者藉此乎方其未鑄錢之時民各以其所有者易其所無者然較纎悉析毫芒猶恐有所未便貨物且有時而不通矣及其已鑄錢之後取某貨者惟錢不必曰以此易彼也市某物者惟錢不必曰移甲換乙也以錢之多寡財物之多寡因物之繁省酬錢之繁省雖毫芒纎悉使之聽命於錢無一而不得其分是則錢之用其利也亦甚博矣然使官民之間一日而無是藉使交易而退不滯於此亦必有困於彼者矣豈能使之一一如其分欲哉然則錢固不可一日闕如此也鐵錢止用於邊地所以防漏泄楮錢亦明器之類事類鏹物孟康曰丨錢貫字亦作鏹漢書注泉布錢丨也其藏曰泉其行曰丨取名流行無不遍也周禮注剛堅黃金為父白銀為母鉛為長男錫為適婦天性丨丨須火終始體圓應乾孔方效地綦母氏錢神論撲滿丨丨者以土為竅為畜錢具有入竅而無出竅滿則丨之金品虞夏商幣丨為三丨或黃或白或亦或錢或布或刀或龜貝通典金鑄禹九年水湯七年旱人無糧有賣子者湯以莊山之丨丨幣以贖之禹以歷山之丨丨幣以救人之困管子散與民武王入殷丨鹿臺之金錢以丨殷丨六韜流於泉周武王時太公為周立九府圜法黃金方寸為重一斤錢圜函方輕重以銖布帛廣二尺二寸為幅長四丈為匹故貨寶於金利於刀丨丨丨布於布束於帛前食貨志鑄錢蒙利周景王患錢輕將丨大丨單穆公曰不可古者量資幣權輕重以救民民患輕則為之作重幣以行之於是乎有母權子而行民皆得焉若不堪重則作輕以行之亦不廢重於是乎子權母而大小利之王弗聽卒鑄大錢文曰寶貨肉好皆有周郭百姓丨丨焉同上出錢取息孟嘗君相齊食客三千人邑入不足以奉使人丨丨於薛貸錢者多不能與息馮歡行至薛召丨錢者皆㑹得丨十萬乃多釀酒買肥羊召諸取錢者能與息者皆來不能與息者亦來能與息者為期不能與息者取其券而燒之曰孟嘗貸者為民之無者以為本業也所以求息為無以奉客也今富給者以要期貧者燔劵書以捐之有君如此豈可負哉貸錢為資初蘇秦之燕丨百丨丨丨及貴以百金償之遍報諸所嘗見德者其從者一人獨未得報乃前自言蘇秦曰我非忘子子之與我至燕再三欲去我易水之上方是時我困故望子深是以後子今亦得矣秦鑄半兩秦兼天下銅錢質如周錢文曰半兩重如其文漢食貨志漢行八銖丨高祖丨丨丨錢奉獨贏二高祖以吏繇咸陽吏皆送丨錢三蕭何獨以五侯益封二千户以丨丨丨錢賀不持一單父人吕公善沛令避仇從之客因家焉沛中豪傑吏聞令有客皆往賀蕭何為主吏主進令諸大夫曰不滿千錢坐之堂下高祖為亭長素易諸吏乃始為謁者曰丨錢萬實丨丨丨錢謁入吕公大驚起迎之門吕公者好相人見高祖狀貌因重嘉之引入座蕭何曰劉季故多大言者矣造四銖錢文帝丨丨丨丨造五銖錢武帝丨丨丨丨或造半兩賜山鑄錢鄧通漢文帝使善相者相通曰當貧餓死文帝曰能富通者在我何為貧於是丨通蜀嚴道銅丨得自丨丨號鄧氏錢布天下即山鑄錢吳王濞有豫章郡銅山即招致亡命者盜鑄錢景帝即位朝錯說曰吳王公丨丨丨丨謀作亂逆本傳貫朽不校漢興七十餘年之間國家無事廩庾皆滿而庫府餘貨財京師之錢纍百巨萬丨丨而丨可丨環循無已漢時南方有蟲其形如蟬而大其子著草葉如蠶種得子以歸則母飛來就之殺其母以血塗八十一文又以其子塗八十一文凡市物或先用子皆復飛歸丨丨丨丨故淮南子術以之還錢名曰青蚨于寶搜神録方朔飢死東丨丨云侏儒長尺餘奉一囊粟錢二百三十臣朔長九尺餘亦一囊粟錢二百四十侏儒飽死臣丨飢欲丨安世無名張安世父子封侯在位太盛乃辭不受祿詔都內别藏張氏丨丨錢以百萬計公卿議更武帝與丨丨丨丨造錢幣以贍用而摧浮徭兼并之徒中家遇告武帝時公卿言異時算軺車賈人之緡錢皆有差丨丨如故然令既下百姓終莫分財佐縣官於是告緡錢縱矣楊可告緡遍天下中家以上大抵皆丨丨乃分遣御史廷尉正監分曹即治郡國緡錢食貨志赤側當五武帝時公卿請令京師鑄官錢丨丨以一丨丨官用非丨丨不得行貨泉直一王莽改貨而異作泉布多至十品今存於民間多者有貨布大泉貨泉貨布長二尺五寸廣寸首長八分有奇廣八分其圜好徑二分半足枝長八分其右文曰貨其左文曰布重二十五銖直貨泉二十五大泉徑一寸二分重十二銖文曰大泉直十五丨丨貨泉徑一寸重五銖右文曰貨左曰泉直一也周禮注不如一囊東漢趙一曰文籍雖滿腹丨丨丨丨錢今奉五萬光祿勳杜林與馬援鄉里親厚援南方還時林馬適死援遣子持一匹馬遺林曰朋友有車馬之饋數月林遣子奉書曰將軍內施九族外有賔客望恩者多林父子食祿祿出常有盈丨丨錢丨丨援受之謂兒曰當以此為法林所以勝我者也財貴能施馬援曰凡殖丨丨丨賑丨否則守錢虜耳盡可復得鄭均兄為縣游擊受禮遺均數諌止不聽即脫身出作嵗餘得數萬錢盡以與兄曰錢丨丨丨丨為吏坐贓終身損棄兄感其語遂有廉潔稱崔烈銅臭靈帝開鴻都門賣官爵丨丨因傅母入錢五百萬為司徒嘗問其子鈞曰告君三公於議者何如鈞曰大人少有英稱論者嫌其丨丨武子金埒王濟丨丨布錢滿地為埒時人謂之丨錢丨世說孫氏舊錢晉元帝過江用丨丨丨丨輕重雜行大者謂之比輪中者謂之四文沈充小錢吳興丨丨又鑄丨丨謂之沈郎錢錢既不多由是稍貴並晉食貨志見之盡還平輿闞敞為郡五官掾太守第五常病以俸錢百三十萬寄敞敞埋置堂上後常舉家患死唯有孤孫九嵗臨死語云吾有錢三十萬寄掾闞敞孫長火來求敞敞丨丨悲喜取錢丨丨之孫曰祖惟言三十萬爾今乃百三十萬誠不敢當敞曰府君疾困謬言爾郎君無疑汝南先賢傳飢者與分劉凝之隱居荆州年飢衡陽王義季慮凝之餒斃餉錢十萬凝之大喜將錢至市門觀有丨色丨悉丨丨之俄頃而盡舉阿堵物晉王衍妻郭氏藉賈后之親貪戾剛愎好干預人事衍患之而不能禁時鄉人幽州刺史李陽京師大俠郭氏素憚之衍謂郭曰非但我言卿不可李陽亦言卿不可郭為之小損衍疾郭貪鄙口未嘗言錢郭欲試之令婢以錢繞床使不得行衍晨起見錢謂婢曰丨丨丨丨耶其措意如此呼為王老王元寶富厚人以錢文有元寶字因丨錢丨丨丨南部新書和嶠錢癖丨丨富擬王者而至吝人謂之丨丨蕭宏錢愚梁武帝弟丨丨錢百萬一聚黃榜標之千萬一庫掛一紫標如此三十餘間武帝見之計錢三億餘萬武帝少子綬作丨丨論譏之三品竝用北朝後用宣帝大象元年又鑄永通萬國錢以一當十與五行大布及五銖丨丨丨丨百錢為樣隋高祖受周禪以天下錢貨輕重不等乃更鑄新錢背面肉好又有周郭文曰五銖而重如其文是時錢既新出百姓或私有鎔鑄三年詔四面諸關各付丨丨丨丨從關外來勘樣相似然後得過樣不同者即壞以為銅入官詔行新錢已復用舊錢貨易不止四年詔仍依舊不禁者縣令奪半年祿然百姓習用既久尚猶不絶五年詔又嚴其制自是錢貨始一所在流布百姓便之十年下惡錢之禁京師及諸州邸肆之上皆令立榜置樣為凖不中樣者不入於市隋志飲馬投錢郝廉丨丨丨丨白氏六帖作牛還錢永徽中涿州人路伯達負同縣人錢一千後與錢主佛前誓曰若我未還公願死為公家牛逾年而死錢主家特牛産一赤犢子額上白毛為路伯達三字治牆得錢李景讓母鄭治家嚴身訓勒諸子始貧之時丨丨丨積丨僮婢奔告母曰士不勤而祿猶菑其身况無妄而得我何取亟使閉坎搘甕取錢建安有村人小舟建溪往來採薪為業山上忽有數錢流下尋至山半樹下有大甕錢滿其中而甕少欹故錢流出於是推正以石丨之取五百餘金歸率家人往將盡取之而忘其所徘徊數日不忍去夜夢人曰錢有主不可取向丨欹以五百雇爾正之耳徐鉉稽神録足錢便可南史周文育詣卜者卜者曰君北下不過作令長南入則為公侯周曰丨丨丨丨望誰封侯質錢不可梁謝舉兄子僑素貴嘗一朝無食其子啓以班史丨丨答曰寧餓死豈可以此充食乎往賀一千梁吕僧珍生子宋季雅丨丨署函曰錢丨丨閽人少之不為通强之乃進僧珍疑其故親自發乃金錢不得一文隋鄭澤自隆州徴還帝令內史李德林立作詔書復爵國公位上柱國高穎戲謂曰筆乾答曰出為方嶽策杖言歸丨丨丨丨何以潤筆上大笑金甲神人隋末一書生居太原苦於貧所居抵官庫因穴而見有錢數萬貫遂欲携挈見一丨丨丨丨持戈曰汝要錢可取尉遲公帖來此尉遲公錢也書生訪求至鐵冶處有尉遲敬德者方袒露蓬首鍛煉之次乃前拜之公問曰何故曰乞錢五百貫以濟貧困尉遲怒曰打鐵人安得錢乃侮我耳生曰足下他日富貴若能哀憫但乞一帖公不得已令生執筆曰錢付某乙五百貫月日署名書生携去公與其徒大笑以其妄也書生却至庫復見丨丨丨丨令繫於梁上高處書生取錢止五百貫後敬德佐神堯立殊功敕賜錢一庫開庫缺五百貫欲罪主者忽於梁上得帖子視之乃打鐵時書帖纍日驚嘆求書生具陳所見厚遣之逸史上清童子岑文本山亭避暑忽有人叩門云丨丨丨丨元寶參奉冠青圓角冠衣淺青衣自言由漢得果成仙語以漢魏間事了如目睹岑因問其冠帔答曰僕外服圓而心方正此是上清五銖服也又天衣六銖尤細五銖也言訖送出門而去行數步至牆下忽不見文本使人掘之乃一古墓其中唯得一古錢文本方悟丨丨丨丨者謂青銅也名元寶者錢之文也外圓心方正錢之狀也青衣者銅衣也五銖者亦錢文也此乃漢朝所鑄也文本自是錢帛日盛至中書令忽失古錢岑遂亡矣飛錢致冨海陵黃尋家先貧困大風雨散丨丨至其家觸籬園誤落無數隨處皆拾得後冨至數千萬擅名江北幽冥録飛錢致遠德宗正元初駱谷散關禁行人以一錢出者憲宗時商賈至京師委錢諸道進奏院及諸軍諸使冨家以輕裝趣四方合券乃取之號丨丨食貨志十萬通神張延賞聞度支有一寃獄久不决及公判度支期以旬日平反視事日案上一帖云奉錢二萬貫乞不問其獄公怒悉收吏禁之次日於盥洗處又一帖奉錢丨丨公嘆曰錢至十萬可以丨丨矣無不可回之事吾懼禍及不得不止幽間鼓吹百萬為費陸贄調鄭尉張鎰有重名贄往見語三日竒之請為忘年交既行餉錢丨丨曰請丨母夫人一日丨贄不納止受茶一串送光院錢唐陸扆自翰林拜相故事自三省得相有光署錢留為宴資學士院未始有扆丨丨丨丨五十萬以榮近司輸光學錢唐劉元章為國子祭酒建言羣臣丨丨丨丨自宰相方鎮刺史各有差以金為錢廢王悰即位丨黃丨一鎰命近侍袁文昌鑄丨臣丨文昌意有所求䜟且懼不就乃宿謀於匠者别鑄一以為備翌日以所授鑄之廢王臨視果不就因潜以宿鑄者獻之吳越備史以銀為錢驃國丨金丨丨丨形如半月孔氏帖有蛇舉首元和初洛陽村百姓王清傭力得錢五環因買田畔一枯栗樹將為薪以求利經宿為鄰人盜砍創及腹忽丨黑丨丨丨如臂語人曰我王清本也汝勿斫其人驚懼失斤而走及明王清率子孫薪之