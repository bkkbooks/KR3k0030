body:
  text: 古今合璧事類備要前集卷十八宋謝維新撰節序門立冬事類房度立冬丨四丨律厯志亥辰孟冬日月會析木之津而斗建丨之丨月令注迎北郊先立冬三日太史謁之天子曰某日立冬盛德在水天子乃齋帥三公九卿大夫丨冬于丨丨月今祭黑帝立冬之日迎冬于北郊丨丨丨元冥車旗服飾皆黑歌元冥八佾舞育命之舞後祭祀志詩集東壁孟冬寒風起丨丨正中昏文選清臺十月嚴隂盛霜氣下丨丨郭元振下元事類水神校籍下元日九江丨帝十二河源溪谷大丨與暘谷神王水府靈官同下人間丨定生人罪福正一旨要水官解厄下元三品解厄丨丨主録百司檢察人間善惡上詣天闕進呈同上御東華門太宗時王元不禁夜下元丨丨丨丨詳見上元門祀靈女廟漢代十月十五日以豚酒入靈女廟擊築奏曲連臂踏地歌赤鳳來乃巫俗也搜神記冬至事類一陽反復其道七日來復天行也疏陽氣始於剝盡之後至陽氣來復時凡經七日如褚氏莊氏並云五月一隂生至十一月丨丨生凡七月而云七日不云月者欲見陽長須速故變月言日易復卦一陽為復二陽為臨三陽為泰同上三至斗指子為冬至至有丨義一者隂極之丨二者陽氣始至三者日行南至故謂之至出孝經説三極月令章句曰有丨丨晝漏極短去極極逺晷景極長後漢律厯志注八風冬至則丨丨之序立萬物之性成前魏相傳白虎日短星昴以正仲冬注冬至之日昴丨丨之甲星書堯典黃鍾冬至進物狀云建子實三微之宗丨丨為六律之本冬氣方至壁星正中首出三統之正始生一陽之數令狐楚陽升丨丨於下日永於天長履景福至于億年崔駰襪銘日逺丨道發南去極彌丨其景彌長冬乃至焉後律厯志月璧桓談新論曰從天元以來訖十一月朔朝冬至日丨若連丨星珠武帝元封元年十一月甲子朔旦冬至五丨如連丨注應劭曰七曜皆會牽牛前律厯志履長十一月建子周之正月冬至日南至景極長隂陽日月萬物之始律當黃鍾其管最長故有丨丨之賀玉燭寶典迎至冬至始人主與羣臣左右從樂五日天下亦家家從五日以丨日丨之禮易通卦驗閉關象曰雷在地中復先王以至日丨丨易復卦調律冬至始人主合八能之士或調黃鍾或丨六丨或調五行或調律厯或調隂陽或調正德立日表冬至之日丨八尺之表丨中視其晷晷如度者其嵗美不如度者則嵗惡晷進則水晷退則旱進一尺則日食退一尺則月食後律厯志注垂土炭先冬至三日丨丨丨於衡兩端輕重適均冬至日陽氣至則炭重史天官書小朝會魏晉冬至受萬國及百寮稱賀因小會其儀亞於嵗朝也沈約宋書冬至陽氣起君道長故賀漢書大郊祭郊之祭迎長日之至也丨報天而主日也丨丨用辛也周之始郊日以至也記郊特牲獻履襪近古婦人常以冬至日上履襪於舅姑踐長至之義也後漢崔浩女儀曹植表云伏見舊儀國家冬至丨丨貢丨所以迎福踐長先臣或為之頌臣既玩其嘉藻願述朝慶千載昌期一陽嘉節四方交泰萬彚昭蘇亞嵗迎祥履長納慶添宫線晉魏間宮中以紅線量日影冬至後日添長一線嵗時記唐宫中以女功揆日之長短冬至後比常日增一線之功雜録迎日推䇿黃帝得寶鼎神䇿是嵗己酉朔旦冬至得天之紀終而復始於是黃帝丨丨丨丨後率二十嵗復朔旦冬至史封禪書以管候氣候氣之法為室三重户閉塗釁周密布緹幔室中以木為案每律各如之內卑外髙從其方位加律其上以葭莩灰抑其兩端按厯而候之氣至者灰去律厯志惟二至乃候後律厯志觀臺書雲僖公五年辛亥朔日南至公既視朔遂登丨丨以望而書禮也凡分至啓閉必丨丨物為備故也左傳圜丘奏樂周大司樂凡樂靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之丨丨丨之出天官舉觴賜子晉周顗母李氏字絡秀生顗及嵩謨元帝時並列顯位嘗冬至丨丨丨三丨曰爾等並貴列吾復何憂嵩曰恐不如尊旨顗志大才短非自全之道嵩性直不容於世唯阿奴碌碌當在母目下耳阿奴謨小字也後皆如其言本傳作粥禳鬼共工氏有不才之子以冬至死為疫鬼畏赤小豆故冬至日丨赤豆丨以丨之荆楚嵗時記盛吉斷獄後漢丨丨為廷尉每至冬節獄囚當丨妻夜秉燭吉持丹筆夫妻相對垂泣出本傳席闡放囚梁丨丨出為東陽太守在郡有能名冬至悉丨獄中丨依期而至貴妃氷筋唐開元冬至大雪簷溜皆為冰條妃子使侍兒敲二枝看玩帝問何物妃子笑曰妾所玩者氷筯也托遺宰相火城冬至元日百官已集丨丨列燭多至數百炬謂之丨丨至則衆燭皆滅國史補詳見元日詩集日至景移風度改丨丨晷遷換眇眇負霜鶴皎皎帶雲鴈長河夜闌干層氷如玉岸哀哀故老容慘慘愁嵗晏宋鮑昭陽生都城開博路佳節一丨丨喜見兒童色歡傳市井聲幽間亦聚集彌麗各携擎却憶他年事關商閉不行王安石陽德比君子初生甚微茫排隂出九地萬物隨開張杜牧之寄姪日短辛苦望丹枝區區九陌時事多嫌丨丨歸速恨驢遲嶽影橫寒翠河聲結夜澌哀吟敵猿􅀈唯欲至公知杜荀鶴夜長去去襟懷常濩落病來鬚鬢轉滄浪心灰不似爐中火鬢雪過於砌下霜三峽南賓城最逺一年冬至丨偏丨今宵始覺房櫳冷坐索琴衣泥孟光白居易冬至夜線長去嵗兹辰捧御床五更三點入鵷行何人錯憶窮愁日愁日愁隨一丨丨出杜甫詩灰動中宵忽見動葭丨料得南枝有早梅四海便應枯草緑九重先覺凍雲開隂氛莫向河源塞陽氣今從地底回不道慘書無定分都憂蚊響却成雷韓漽天宮初動磬緹室已飛灰暮風吹竹起陽雲覆石來拆氷開荔色除雪出蘭裁慙無宋玉辨濫吹楚王臺蕭慤淺著梅東君意丨丨寒丨十朵深紅未暇裁安得道人殷七七不論時節遣花開東坡將舒柳天時人事日相催冬至陽生春又來刺繡五紋添弱線吹葭六管動飛灰岸容待臘丨丨丨山意衝寒欲放梅雲物不殊鄉國異教兒且覆掌中杯杜甫臘日事類薦獸按月令孟冬十月臘先祖五祀謂丨田獵所得之禽丨謂之臘魏臺訪議磔雞季冬大儺旁磔出土牛以送寒氣即今臘除遂疫丨丨葦絞桃梗之屬王肅議禮隂陽交季冬之月星回嵗終丨丨已丨勞農夫享臘以送續漢書新故接臘接也丨丨交丨謂之臘大祭以報功也風俗通晉博士張亮議曰臘接也祭宜在丨丨交丨也俗謂之臘隋禮儀志開皇四年詔古稱臘者接也取丨丨交丨可以十二月為臘報鬼神臘者丨諸丨丨古聖賢有功於氏者也漢舊儀祠社稷髙祖十年有司請令縣常以春二月及臘丨丨丨以羊彘前郊祀志祭先祖臘者丨丨丨蠟者報百神同日異祭也玉燭寶典祭百神冬至後三戍為臘臘丨丨丨許慎説文報神農蠟之義自伊耆氏之代而有其禮古之君子使之必報之是丨田之祭也其神丨丨初為田事故以報之杜氏通典祠黃石詳見伏類息老物國祭蠟則吹豳頌擊土鼓以丨丨丨周禮賀初嵗俗謂臘之明日為初嵗自漢以來有賀晉張亮議徐爰家儀蠟明日為小嵗丨稱丨丨福始罄無不宜勞農休息子貢觀於蠟孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蠟一日之澤非爾所知也蠟之祭丨丨以丨丨之言民勤稼穡有一日之勞今日飲食燕樂君之思澤也非爾所知其義大也家語縱民宴飲臘者嵗終大祭丨吏丨丨丨非但迎氣故但送不迎蔡雍獨斷王者五行髙堂隆曰丨丨各以其行之盛祖以其終臘水始於申盛於子終於辰故水行之君以子祖辰臘火始於寅盛於午終於戌故火行之君以午祖戌臘木始於亥盛於卯終於未故木行之君以卯祖未臘金始於巳盛於酉終於丑故金行之君以酉祖丑臘土始於未盛於戌終於辰故土行之君以戌祖辰臘魏土德也宜以戌祖辰臘後漢禮儀志天子八蠟丨丨大蠟八伊耆氏始為蠟蠟也者索也嵗十二月合聚萬物而索享之也注丨丨者一先嗇二司嗇三農四郵表畷五貓虎六防七水庸八昆蟲禮記從嘉平謡秦惠王十二年初為臘至始皇改名嘉平時茅濛修道升天先是其邑謡曰神仙得者茅初成帝若學之臘嘉平始皇聞之遂改此名神仙傳用伏臘字唐户部侍郎蕭炅嘗與嚴浚言蒸嘗伏臘乃使伏獵字浚曰省中而有伏獵侍郎乎乃出炅為岐州刺史嚴浚傳孔子與蠟昔者仲尼與於蠟賔喟然而歎釋文周祭名禮記陳咸守臘丨丨為廷尉監至王莽篡位還家杜門莽後改漢法令及臘日咸嘗曰我之先祖何知王氏之臘也卒用漢臘後漢書內椒井中十二月臘夜令人持椒卧井旁無與人言丨丨丨丨除瘟病養生要論懸葦門上度朔山上有桃樹神荼鬱壘常簡閲百鬼無道理者持以葦索執以飼虎故縣官常以臘祭夕飾桃人垂葦索畫虎於門以禦凶也風俗通賜博士羊甄宇北海人建武中青州從事徵拜博士每臘詔丨丨丨丨人一頭羊有大小肥瘦時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鉤宇復恥之宇因先自取其最瘦者復召問瘦羊博士所在京師因以為號東觀漢記賜學士脂臘日丨北門丨丨口丨臘脂盛以碧縷牙筒酉陽雜俎竊食祭先韓卓字子助陳留人臘日奴丨丨丨其丨人卓義其心即白免之袁山松後漢書以羊祀竈隂子方臘日晨炊而竈神形見子方再拜受慶家有黃羊因以祀之自是已後暴至巨富後漢今吳中以臘月二十四夜祀竈共謂竈神翌日朝天白一嵗事故前期禱之風土記遣囚暫歸後漢虞延為細陽令每至嵗時伏臘輒休丨丨徒各使歸家並感其恩應期而還逐邪為戲梁景宗為領軍性好樂臘月使人丨丨遍往人家乞酒食本以丨丨而部下多剽輕弄人婦女奪人財物武帝知之景宗懼而止鳴鼓草生村民臘日打細腰鼓而宴諺云臘鼓鳴春草生嵗時記傳詔花發詳見春類造脂花餤洛陽人家臘日丨丨丨丨金門嵗節作赤豆粥吳中二十五日煮赤豆作糜暮夜闔家同享云能辟瘟氣雖逺出未歸者亦留貯口分至襁褓小兒及僮僕皆預故名口數粥豆粥本上月望日祭門故事流傳於此風土記舂經年米吳中臘日丨米為一嵗計多聚舂曰盡臘中畢事藏之土瓦倉中丨丨不壞謂之冬舂丨賣上元燈吳中風俗尤競上元一月前己丨燈謂之燈市價貴者數人聚博勝則得之喧盛不減燈夕並同上厯代臘日禮傳曰夏曰嘉平殷曰清祀周曰大蠟漢改曰臘臘者獵也因獵取獸以祭先祖魏臺訪議日王者各以其行盛日為祖衰日為臘漢火德火衰於戌故以戌日為臘魏土德土衰於辰故以辰日為臘晉金德金衰於丑故以丑為臘國朝博士和峴奏唐以前寅日蠟百神卯日祭社官辰日臘享宗廟開元定禮三祭皆以臘辰以應土德道家臘名丨丨有五丨正月一日為天臘五月五日為地臘七月七日為道德臘十月一日為民嵗臘十二月正臘日為王侯臘氣王侯臘五帝校定生人處所分野降注三萬六千神其日可謝罪祈求延年益壽道書辛卯日蠟國朝建隆四年太常博士和峴奏聖朝火德合以戌日為臘而以前七日丨丨便行蠟禮恐未為宜太常議而請蠟百神祀社稷享宗廟同用戌臘丨國史十一月臘國朝用漢臘盡冬至後第三戌大墓日也是為臘己酉年閏八月冬第三戌乃在十一月末太史局著厯以丨丨丨第三戍為丨識者云古法遇閏嵗即以第四戌為臘不可在十一月也叢語詩集臘前漢家戌曰看看近雲景蒼蒼已嵗昏欲驗方書治百藥預調飛走獵平原土人薰肉經春美宫女藏鈎舊戲存獨把凍醪驚節物革芽微動見庭萱梅聖俞臘日丨丨常年暖尚遙今年丨丨凍全消侵陵雪色還萱草漏泄春先有柳條縱酒欲謀良夜醉還家初散紫宸朝口脂面藥隨思澤翠管銀罌下九霄杜甫唐制丨丨賜口脂面藥臘殘殘丨泛舟何處好最多吟興是瀟湘就船買得魚偏美踏雪沽來酒倍香猿到夜深啼嶽麓鴈知春過别衡陽與君剩採江山景裁取新詩入醉鄉杜茍鶴冬末日友人泛瀟湘除夕事類月窮日窮于次丨丨于紀星回于天嵗且更始月令嵗莫日月其除丨聿云丨出毛詩去故留宿飯棄之街衢以為丨丨納新風土記迎新嵗暮家家具殽蔌備宿嵗之儲以丨丨年風土記祝頌除夜祭其先竣事長幼聚飲丨丨而散謂之分嵗風土記餽問蜀風俗晚嵗相與丨丨謂之餽嵗同上燃炬嵗除太常卿領官屬樂吏併護童侲子千人晚入內至夜於寢殿前儺蠟燎沉檀熒煌如晝其夕賞賜多南部新書爆竹往年李畋鄰人有仲叟家為山魈所祟擲瓦石開户牖叟求報謝而妖祟彌盛畋謂叟曰公旦夜於庭落中若除夕丨丨數十竿叟然其言丨丨至曉寂然安帖遂止該聞集藏鉤臘日以後叟嫗各隨其儕為丨彄分為二曹以較勝負風土記嵗前為丨丨之戲始於鈎弋夫人按漢武故事云上巡守河間見清光自地屬天望氣者云下有貴子上求之見一女子在空室中姿色殊絶而手皆拳數百人孹之莫舒上旬披即舒號拳夫人即鈎弋也後人見其手拳而有國色故因之而為丨丨之戲火山隋主每除夜殿前諸院設丨丨數十盡沉香木根每一山焚沉香數車丨丨暗則甲煎沃之熖起數丈香間數十里一夜之間用沉香二百餘乘甲煎過二百石紀聞水燈洛陽人家除夜銅刀刻門埋小兒硯點丨盆丨醉司命都人至年夜請僧道看經備酒果送神帖竈馬於竈上以酒糟塗抹竈門之上丨丨丨夜於竈裏點燈謂之照虛耗夢華録驅厲鬼前嵗一日擊鼓丨疫丨之丨謂之逐除亦曰儺吕氏春秋注嵗除日儺皆作鬼神狀二老人為儺翁儺母泰中記嵗除大儺選中黃門子弟十嵗以上十二嵗以下百二十人為侲子皆赤幘皂衣執靴而行東漢后紀儺逐鬼疫也為隂陽之氣不節癘鬼從而為禍故天子使方相氏黃金為四目熊皮為帽口作儺儺之聲以丨鬼疫一年三度為之故月令季春命國儺季秋天子乃儺季冬命有司大儺旁磔注此月有丨丨將隨強隂出害人故旁磔於四方之門磔攘也論語注然火盆爆竹之夕人家各於門首燃薪滿盆無貧富皆爾謂之相暖熱吳中風俗打灰堆除夜將曉雞且鳴婢獲持杖擊糞壤致詞以致利市謂之丨丨丨此本彭蠡清湖君廟中如願故事惟吳下至今不廢祈絲穀吳中村落以秃帚若麻黯竹枝輩燃火炬縛長竿之杪以照田爛然遍野以丨丨丨賣癡呆吳俗分嵗罷小兒繞街呼呌云丨汝丨賣汝丨世傳吳人多呆故兒輩諱之欲賣其餘並同上懷貞娶婦唐竇懷貞會嵗除中宗宴近臣謂懷貞曰聞卿喪妻今欲繼室可乎懷貞唯唯俄而禁中寶扇障衛有衣翟衣出者已乃衛后乳媪所謂莒國夫人者故蠻婢也懷貞納之不辭世謂媪壻為阿㸙懷貞每奏事輒自署皇后阿㸙而或謂國㸙軒然不慚本傳賈島祭詩丨丨常以嵗除取一年所得詩丨以酒脯曰勞吾精神以是補之金門嵗節詩集臘盡舊厯不足卷東風還坐聞一宵猶幾刻兩嵗欲平分丨丨傾時斗春通綻處雲明朝遙捧酒先合祝吾君曹松春來今嵗今宵盡明年明日催寒隨一夜去丨逐五更丨氣色空中改容顔暗裏摧風光人不覺已著後園梅王諲斗回緹室重飛玉琯灰物華全為丨杓丨依依殘臘無情别厯厯新春滿眼來強取酒巵浮翠柏慵開醉葉覔新梅男兒努力平生志肯使功名落草萊司馬光年别殷勤惜此夜光景在逡巡燭盡丨還丨雞鳴老更新儺聲方去病酒色又迎春明日持杯處誰為最後人方干異鄉我昔今朝促君愁玉漏頻豈知新嵗酒猶作丨丨身雪向寅前凍花從子後春到明追此會俱是隔年人韋莊南北遊萍迹年華又暗催殘燈和臘盡曉角帶春來鬢欲漸催雪心仍未肯灰金門舊知已誰為脫塵埃髙蟾逆旅永夜誰能守羈心不放眠挑燈猶故嵗聽角已新年出谷空嗟晚銜燈尚愧先晚來辭丨丨雪拂野槐天皮日休旅館寒燈獨不眠客心何事轉凄然故鄉今夜思千里愁鬢明朝又一年髙適餽嵗天功各已收嵗事得相佐為歡恐無具假物不論貨山川隨處産貧富稱小大置盤巨鯉橫發籠雙兔卧富人事華靡珠繡光翻坐貧者愧不能微摯出舂磨官居故人少里巷佳節過亦欲舉鄉風獨倡無人和東坡别嵗故人適千里臨丨尚遲遲人行那可復丨行那可知問嵗安所之逺在天一涯已逐東流水赴海歸無時東鄰酒初熟西舍彘方除上下皆和平却拾焦頭疊床底猶有餘威可驅癘屏藥裹添酒杯晝日嬉遊夜濃睡范至能燒火盆春前五日初更後排門燃火如晴晝大家薪乾勝豆秸小家帶葉燒生柴青煙滿城天半白栖鳥驚啼飛格磔兒孫圍坐犬雞忙鄰曲歡笑遙相望黃宫氣應才兩月嵗隂猶驕風栗烈將迎陽艷作好春政要火盆生暖熱同上打掃堆除夜將殘曉星爛糞掃堆頭打如願杖敲灰起飛撲籬不嫌灰涴新節衣老媪當前再三祝只要我家長富足輕舟作商重船歸大悖引犢雞哺兒野繭可繅麥兩岐短衲換著長衫衣當年婢子挽不住有耳猶能聞我語但如我願不汝呼一任汝歸彭蠡湖同上呌癡呆除夕更闌人不睡厭穰鈍滯迎新嵗小兒呼丨走長街云有丨丨召人買二物於人誰獨無就中吳儂仍有餘卷南巷北賣不得相逢大笑相揶揄櫟翁塊坐重簾下獨要買添今問價兒云翁買不須錢奉賖癡呆千百年古今合璧事類備要前集卷十八
