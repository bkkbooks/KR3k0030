body:
  text: 古今合璧事類備要别集卷七十一宋謝維新撰飛禽門鳩附鴶鵴鴿格物總論鳩類不一按左傳五鳩曰祝鳩曰雎鳩曰鳴鳩曰雞鳩曰鶻鳩鶻鳩鶻雕也鳩鷹也鳴鳩鴶鵴也亦名布穀牝牡似鷂而長尾飛鳴以翼相擊雎鳩王雎也祝鳩鷦鳩也鷦鳩一名鵓鳩一名斑鳩一名斑鷦一名斑佳有斑者有無斑者有灰色者有小者有大者春分化黃褐候秋分化斑鷦或有養之數年亦不見春秋分能化者鴿亦鳩類數種青有白鴿黑鴿或白與黑二色相雜亦間有紫色者有灰色者皆兩兩相匹不雜交人家多畜之翔集屋間又一種野鴿色純青不可馴狎人多捕而食之事類名官郯子曰我髙祖少皥摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名祝鳩氏司徒也雎鳩氏司馬也鳴鳩氏司空也爽鳩氏司冦也鶻鳩氏司事也五鳩鳩民者也左昭十刻杖老人丨丨為鳩形取其不咽白氏帖正旦獻邯鄲人丨丨丨鳩於趙簡子厚賞之客曰丨丨放鳩厚恩也得賞競捕之不如勿賞簡子曰善孔叢子正旦放滎陽有厄井沛公避項羽處時雙鳩集井上故漢世丨丨丨之漢地理志巢家樹張九齡母喪有白鳩丨丨丨孔帖巢户側鄭𢎞遷臨淮太守郡民徐憲在喪致哀白鳩丨丨丨𢎞舉為孝廉朝廷稱白鳩郎會稽典録集鳳池唐王及善才行庸猥風神鈍濁為內史時人號為鳩丨丨丨朝野僉載集庭樹鎮州王庭溱始生嘗有鳩十數雙朝丨丨丨暮集簷下唐語集廳事景毅為白水令有異政鳩丨其丨丨偶出之籠傅咸曰余舍傍種楸成林間居斑鳩聲音可悅於是捕而畜之既而馴擾丨丨丨丨無何失之其後時時一來飛翔聊為之賦鳩賦序乃探之懷京兆長安有張氏獨處室有鳩自外入止於床張氏患之祝曰鳩來為我禍耶飛上承塵為我福耶來入我懷鳩飛入懷以手探之則不知鳩之所在得一金帶鈎焉是後子孫昌盛蜀客聞之厚賂婢婢竊鈎以與張既失鈎漸漸衰耗蜀客亦窮厄或告之曰天命也不可以力求於是賫鈎以反張氏張氏復昌故關西稱張氏鈎亡云搜神記送十二籃毛傳好食鳩人與已相得必以鳩贈之一日李翺丨丨丨丨好事集鴶鵴居巢鵲巢夫人之德也國君積行纍功以致爵位夫人起家而居有之德如鳲鳩乃可以配焉維鵲有巢維鳩居之注鳴鳩秸鞠也不自為巢居鵲之成巢詩在桑鳲鳩刺不一也在位無君子用心之不一也鳲鳩丨丨其子七兮云云其子在梅其子在棘其子在榛云云注鳲鳩食其子旦從上而下暮從下而上平均如一詩鷹化丨丨為鳩然後設罻羅記又驚蟄後五日丨丨為鳩草木蔬鸇為見前鷂鸇門雀生永微五年七月辛巳萬年宫有小鳥如丨丨子大如鳲鳩五行志鷂化鷙擊之鳥通呼曰隼一曰丨春丨為布穀文選秋興賦李善注老僧食鄧州有丨丨日丨二鳲鳩俗共非之丨丨終不避當饌之際貧士求食分其二足而丨食訖丨丨盥漱雙鳩從口而出一則能行一則匍匐在地貧士驚愕亦吐其飯其二腳亦出號曰南陽鳲鳩和尚雲溪友議鴿目為飛奴張九齡少年時養羣鴿每與親知書繫鴿足上依所教飛往投之丨之丨丨丨詩集癭頸丨丨閙鳩鴿韓愈城南聨句錦翼斑然丨丨花簇簇雌雄相隨樂不足抱雛生卵翅羽成豈料一朝還反目人言嫁雞逐雞飛安知嫁鳩被鳩逐古來有盛必冇衰富貴莫忘貧賤時女棄父母嫁曰歸中道捨君何所之天生萬物各有類誰謂鳥獸為無知雖無仁義有情愛茍聞此語安不悲歐陽文忠鳴何處微兩歇芳園春鳩丨丨丨韋應物鳴中林天將隂鳲鳩逐婦丨丨丨鳩婦怒啼無好音天雨止鳩呼婦歸鳴且喜婦不亟還呼不已逐之其去恨不早呼不肯來固其理吾老病骨知隂晴每愁天隂聞此聲日長思睡不可得遭爾聒聒何時停衆鳥笑鳲鳩爾拙固無匹不能取巧婦以共營家室寄巢生子四散飛一身有婦長相失夫婦之恩重太山背恩棄義須臾間心非無情不得已物有至拙誠可憐君不見人心百態巧且艱臨危利害兩相關朝為親戚暮仇敵自古常嗟交道難韋應物暮求羣鳩鳴丨丨丨韓愈隂逐婦見前注雌逐雄鳲鳩識隂晦聒聒丨丨丨鵲巢汝得共可蔽雨與風云云梅聖俞雄逐雌天欲隂鵓鴣怒鳲鳩出林婦去髙飛如失音雨欲止鵓鴣鳴婦婦不喜不喜初遭棄終已恃丨丨丨實由己託姑為辭何有理楚人因此卜隂晴隂逐晴呼無定聲晴林有枝可並宿雨巢何處能相停計以利害忘匹配愚婦宜然難保室鳩離鳩合固莫問委質從夫尤易失蘼蕪舊詩歌上山下山逢夫山路間古人苦吟豈無謂生為訣别堪哀憐嗟哉世情常險艱鳩鳥何怪鳴關閛徒知出拙不知巧終始相守誠為難梅聖俞勤捕雛不如作繭依蠶族以絲自褁還自足與爾為婦過一生怒即分飛同轉目辛丨丨丨寄鵲巢子母生雛因爾逐羽毛曾未顔色衰飲啄不計豐儉時天隂輒遣呼輒歸恩情紙薄誰信之朝為夫婦夕行路世間反覆那能知伋妻白母非美事後代效此誠堪悲梅代鳩婦言歡求雌晴鳩丨丨丨雨鳩閙逐婦天地有隂晴嗟爾何欣復何怒柔桑如雲春暮時吳蠶半眠紫椹肥食不過數粒寢不過一枝婦子相隨可以老何用汲汲合且離雷公號呼風伯舞天借之權作霖雨可憐汝愚終不省反室相怒誰哀汝昔人忘爾巧今人笑汝拙巧不得近瑶臺拙不能保家室爾巧爾拙非汝情天機回闔難自平世人假爾推隂晴劉原父與鵲爭一世為巢拙長年丨丨丨欲知雲腳兩先向屋頭鳴頸上玉花碎臆前檀粉輕何時將刻杖扶助老夫行梅鴶鵴撥穀飛丨丨丨鳴奈妾何格絲憶君頭緒多李白荆州撥穀鳴日暖丨丨李白鷹鸇化丨丨丨為鳩元稹催春種布榖處處丨丨丨青春深鳲鳩乳燕丨丨丨杜脫布袴勸我脫袴南山昨夜雨西溪不可渡溪邊布穀思丨丨丨布丨不辭脫袴溪水寒水中照見催租瘢蘇子瞻催人脫袴南村北村雨一犁新婦餉姑翁哺兒田中啼鳥自四時丨丨丨丨著新衣著新替舊亦不惡去年租重無袴著黃魯直脫却不辭脫袴脫袴桑葉隂隂墻下路回頭忽憶舍中妻去年已逐他人去舊袴丨了丨丨丨新袴知教阿誰做朱元晦鴿癭頸閙鳩丨丨丨丨鴿見前觜眼肖鳩孤來有野鴿丨丨丨春丨飢腸欲得食立我南屋頭我見如不見夜去向何求一日偶出羣盤空恣嬉逰誰借風鈴響朝朝聲不休飢色猶未改翻翅如我仇炳哉有靈鳳天折為爾儔翕翼處其間顧我獨遲留鳳至吾道行鳳去吾道休鴿乎何所為勿汚吾鐺甌梅聖俞啄木格物總論啄木鳥爾雅鴷也數種有大有小冇褐有斑褐者是雌斑者是雄剛爪利觜舌長寸杪有刺針穿木食蠧又有青黑者頭上有紅毛生山中土人呼為山啄木其大如鵲云事類雷公採藥吏啄木本丨丨丨丨丨化為此鳥古今異傳歐陽修啄木賦木皇司春兮物熙以春芽者斯勾兮甲者斯萌物賴皇兮榮以欣翳有蟲兮甚不仁穴皇木兮羣以聚穴不已兮又加咀皇木病兮寲將深皇心測兮傷爾蝎彼鴷兮善啄吾利汝啄兮飢汝腹飛以鳴兮啄且食蠱不盡兮啄莫息山之麓兮水之濱皮堅節癭兮龍甲蛇鱗節流膏兮吻流血百不一兮徒飢渴蠧日滋兮鴷日苦哀謁皇兮披雲路雲之際兮不可見託歸風兮仰訴古初三皇兮甚仁惠憐民愛物使兩遂穴民處兮鮮民食穴不棟梁兮鮮不薪米其求甚少兮給之孔易野鬱鬱兮山蒼蒼土有毛髮兮山有衣裳金不鞴治兮器創不芒木至老朽兮不見災殃聖萌機兮五財利贍有足兮生不匱蔽風避濕兮修容威廟祭室寢兮猶無異為帝何思之不熟兮忽生般而與倕丹髹之不已兮又以雕幾斜鈎曲鬪兮華照欄梯髙構險兮目精眩地秃而赭兮山褋而寒材者傷死兮生者力殫一躬之庇兮一林夷族偶龍木馬兮重閽隂屋皇民暴嗇兮驅之以朴噫智巧兮誰為是既紛紛而不止工蠧則大兮蟲蠧則小補小縱大兮將何謂皇惜木兮雖甚恩臣利食兮啄徒勤蠧未入口兮工至其根與其啄蠧能盡死不如得啄匠乎使不堪於斧斤詩集緶緣樹間啄木髙翔鳴喈喈飄飄林薄著桑槐丨丨丨丨啄如佳嚶喔嚶喔聲正悲専為萬物作倡徘當此之時樂不可回晉傳玄啄遍庭前丁丁向晚急還啼丨丨丨丨未肯歸終日與君徐蠧害莫嫌無事不平飛標受命鳳凰淮南啄木如大鴉頂似仙鶴堆丹砂觜長數寸徑如鐵丁丁亂鑿乾枯查黃柑紅桃多有蠧丨丨丨丨須破柱何當更與繡衣裳羽旗橫飛作持斧王元之豈同燕雀爪利觜還剛殘陽啄更忙千林蠧如盡一腹餧何妨形小過槐陌聲髙近草堂丨能丨丨丨惟解占髙梁魏野髙枝礪觜紅錦長絛當背垂紫檀標穩橫朱絲美人停停面如雪纎手當絃金暗撥彈成丁丁啄木聲春林蔽日春晝晴徘徊深枝穿翠葉玉啄勞時還暫歇深園斷嶺人不知中有槎丫風兩枝蠧多蟲老飽可樂山靜花深終日啄雌雄相求飛且鳴丨丨丨丨枝有聲無功忍使飢腸飽有意却教枯樹青疾彈如歌細如語曲欲終時情更駐一聲穿樹忽驚飛葉動枝搖不知處張文潛古今合璧事類備要别集卷七十一
