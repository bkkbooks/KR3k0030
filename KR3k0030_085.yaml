去惟薦此人朕豈可違言行録以轉運擢沈義倫為隨軍轉運使入成都獨居僧寺蔬食僞蜀有以珍寶為獻者皆却之東歸才圖書數卷上問其清亷擢為樞密副使長編辨轉運誅李繼隆與轉運使盧之翰有隙遂奏轉運乏軍興太宗怒召中使付三函令取之翰及某人首丞相吕端不敢言樞密副使錢若水爭之請先驗有狀然後行法上大怒拂衣起入禁中二府皆罷若水獨留廷中上既食久之使人偵視廷中有何人報云有細瘦而長者尚立焉上出詰之曰朕所以擢任以爾為賢爾乃不材如是耶尚留此安俟對曰陛下不知臣無狀使得待罪二府臣當不避死亡以報厚恩李繼隆外戚貴重莫比今陛下據其一幅奏書誅三轉運使雖有罪天下何由知之鞫驗事狀明白加誅何晚馬上意解乃召吕端等奏請如若水議先令責狀三人皆黜為行軍副使言行録宣徽使兼建隆三年以丨丨北院使李處耘為南北丨丨樞密副使會要檢校官充自五代以來凡樞密院官皆文武參用大中祥符七年以王嗣宗曹利用並為丨丨太保充樞密副使亦不帶正官同上士民相慶吕正獻公公著拜樞密副使初自河陽入朝都人環觀相謂曰此公還朝百姓之幸也至是丨丨丨丨既受命出殿門武夫衛卒皆歡抃咨嘆言行録衛卒歡抃見上注宰相兼樞使事類帶印自始樞密使丨相丨為樞相丨後唐丨國朝會要兼相自始大中祥符五年以王欽若陳堯叟檢校太傅同中書門下平章事充樞密使充樞密使丨使丨丨王欽若丨同上國初始兼丨丨魏仁浦以宰相兼樞密使後罷會要慶歷復改丨丨二年二邊用兵富文忠公言遲事係國安危國初范質王溥以宰相兼參知樞密事今兵興宜令宰相兼領仁宗然之令中書同議樞密院事吕許公時為首相以內降納上前曰恐樞密院謂臣奪權時諫官亦論宰相宜知兵事遂降制以宰相兼樞密或曰二府體均判字太重於是復改為樞密使揮塵録建炎末兼丨丨四年以宰相范宗尹兼知樞密院罷御營以其事歸宜得魁竒英偉之人以居其任同上典佐邦治樞使知院典機務掌兵政出納密命以佐邦冶績會要掌佐天子知院掌佐天子統兵政而同知為之二同上同知事類范王並參周顯德六年命司徒平章范質禮部尚書王溥丨丨知樞密院五代史溫寇始名國初闕淳化二年王顯出鎮張士遜知樞密院事始以丨仲舒丨凖同知院同知之名自此始也會要元豐獨存丨丨官制行廢使副存同知職源紹興並除丨丨中髙宗以掌兵之地事權宜重依祖宗故事置樞密使而知院同知院亦仍舊由是丨丨朝野雜記專主謀議向文簡公敏中同知樞密院明辨有才略處事敏速樞密之任丨丨丨丨時西北用兵至於二邊道路斥候走集之所莫不周知事略可託腹心吕公著復同知樞密院事神宗手詔曰顧在廷之人有丨以丨中外丨丨之寄均皇家休戚之重無逾卿者可亟起視事同上收自閫外吕公著傳拜同知樞密院事公著謝因奏曰臣老於閫外䝉陛下收之桑榆唯知拳拳納忠以報恩遇同上起自貟外向敏中自貟外郎為諫議知樞密院止百餘日歸田録衡稱人材命端明殿學士吕公著同知樞密院事公著好士出於天性士大夫有以人物為意者必問其所知所聞參核以待上求上嘗謂輔臣曰公著之於人材其言不欺如權衡之於稱物焉通略筆識諸將劉忠肅公珙字共父乾道三年擢同知樞密院公以本兵柄於諸將之能否不可以不周知乃自諸管軍統制官下至禆佐日召三數人與語得其村用所宜輒筆識之以待選用晦庵文集宗室除用趙丞相汝愚始除同知院力辭引高宗聖訓丨丨用至侍從即止之語夀皇石學士答辭諭以紹興聖訓用折秦檜陰謀蓋有為而言也實録樞密院機連房自慶歷中宰相不兼樞密者八十餘年其復兼自此始紹興七年令宰臣張浚兼樞密使趙彜秦檜亦以左右僕射兼中興會要紹興中罷丨丨二十五年檜薨明年詔曰比緣軍興令宰相兼樞密使典掌機務今邊事已定可依祖宗故事更不兼領同上同中書議慶歷二年上曰樞密非古官未欲遽改止令中書同議密院事長編同平章事仁宗親政拜晏殊樞密使加丨丨丨丨自殊復召用而趙元昊反師出陜西天下弊於兵殊數建利害請罷監軍兼以陳圖示諸將使得應敵為攻守及制財用為出入之要皆有法仁宗悉施行之事略詩集長兵政惟仲淹弼一䕫一契天實賚豫豫其敢忽曰衍汝來汝豫黃髮汝丨樞府丨丨無蹶石介慶歷聖德詩屬大事豫早識琦琦有竒骨可丨丨丨重厚如勃同上知樞密院事類天福始名晉丨丨初桑維翰以翰林學士尚書禮部侍郎知樞密院事知院之名始此分紀淳化始置國初不置淳化二年樞使王顯出鎮始以張遜知樞密院事續會要元豐間罷丨丨官制行廢樞密使副會要政和末重丨丨丨鄧莘公官至少保猶止為知院焉同上並正二品知樞密院同知院丨丨丨丨知院掌佐天子執兵政而同知院為之副凡邊防軍務常與三首分班禀奏事干體要則宰相執政官合奏神宗正始聀官志分班三省見上注周知世務李咨字仲詢諡憲成為知樞密院事咨性明逹丨丨丨丨處劇若閒暇在樞府抑僥幸號為稱職東都事略專掌兵籍李綱除知樞密院奏云祖宗之法樞密院事掌兵籍虎符三衙管軍諸路帥臣主兵梱各有分守所以維持軍政萬世不易之法也傳信録又李綱以右丞被命樞管奏云伏䝉聖恩除知樞密院事以被命鴻樞專統兵機士夫相賀慶歷初元昊納欵遂召韓琦范仲淹為樞密副使天下聞之丨丨皆酌酒丨丨曰上用韓琦范仲淹非惟社稷乃天下生民之幸長編問為治要張忠定公燾字子公孝宗受襌召除同知樞密院事丨丨丨之丨公言內治乃可外攘願詔百執事赴都省給札條具上大喜於是士大夫欲言不能自逹者纎悉聞矣言行録修時政記樞密院時政記編修官剛潤同知院事修孝宗會要叶宣機政腸程戡詔丨丨丨丨六一文集預議樞衡賜同知樞密院趙瞻批答丨丨丨丨蘇魏公集就翊洪樞元祐中趙瞻拜同知院事制贊一人之休必資耆德握萬兵之本爰賴舊臣蓋知其要者可以應務而不窮久於事者可以臨機而無惑云云宜煩故老丨丨丨丨會要自聨機密賜趙瞻批答丨丨丨丨屢告謀猷魏公集簽書事類無正貟簽書丨丨丨為使之二續會要不次用王岩叟元祐六年拜簽書樞密院事曲謝延和太皇太后諭曰知君材望故丨丨進丨公遜謝而退曰願陛下用人之際更加審察邪正難辨辨之少差治亂所係正人在朝則朝廷安邪人一進則朝廷便有不安之象二聖深然之言行録名自此始太平興國四年石熙載元懿公以樞密直學士簽書院事簽書之丨丨丨丨也聀源兼自此始景德三年韓崇訓檢校太傅馬知節為檢校太保並簽書樞密院事天禧四年以華州觀察使曹瑋為宣徽北院使鎮國軍留後簽書樞密院事簽書丨藩鎮丨丨丨也會要復置簽書元復官制行使副簽書悉罷元祐初丨丨丨丨樞密院事神宗正史聀官志初帶密直丨除皆丨丨丨及罷政乃拜端明殿學士王彥霽劉仲馮靖康初李回首拜延康殿學士簽書延康今為端明自是遂為故事朝野雜記備邊事馮極簽書樞密院真宗丨以邊事極以謂丨丨之要當須扼禖喉據險隘以制敵之衝若於保州威虜間依徐河以布陳睘糧其勢足以决勝事略建中興議權邦彥字朝美紹興間公在樞管知無不言言無不盡謂宜乘機者三又丨丨丨之丨言行録以密學充太平興國四年石元懿始以樞密直學士簽書院事春明退朝録以檢校為景德三年馬正惠丨丨丨太傳韓公崇訓以檢校太保並簽書樞密院事又王德用字元輔纍任拜檢校太保簽書樞密院事會要諫議簽書太平興國八年張齊賢王沔並以右丨丨大夫丨丨樞密院事同上宣徽簽書端拱元年以內客省使楊守一為丨丨北院使丨丨蜜院事同上同簽事類治平始有樞密院舊制無同簽書樞密院事者丨丨中丨以郭逵為之神宗正史職官志元豐並罷丨丨官制行使副簽書丨丨惟存同知職源處資淺人簽書大抵以丨丨丨之丨若簽書一經親祠方進同知及樞副若武臣擢願國政只除同簽書同上除武臣例見上注以諫議同太平興國八年張司空齊賢王公沔並丨丨丨大夫丨簽書樞密院事春明退朝録以宣徽為治平二年令郭逵丨丨丨使丨同簽書樞密院事長編古今合璧事類備要後集卷十六
