front:
  text: 欽定四庫全書古今合璧事類備要後集卷十六
  hash: sha256:c672a3fbe225119810efcdd5d13b5efac0c7cb9173e6b9707da4b4a3cae4845c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_085-1a, image: WYG0939/WYG0939-0689c.png}
body:
  text: 宋謝維新撰執政門樞密院樞使同知副使簽書使相同簽知院歷代㳂革唐代宗永泰中置內樞密使馮鑑續事始以宦官為之初不置司局但有屋三楹貯文書而已其職掌惟承受表奏於內中進呈若人主有所處分則宣付中書門下施行而已吕原明家孰廉梁永泰中宦官董廷秀參掌樞密事元和中劉光崎守謙為樞密使長慶中王守澄知樞密事舊左右軍容多入為樞密亦無視事之㕔後僖昭時楊復恭西門季𤣥欲奪宰相權乃於堂狀後帖黃指揮公事此其始也續通典後梁革唐世宦官之弊開平元年改樞密院為崇政院命敬翔為使始更用士人五代會要分紀其備顧問參謀議於中則有之未始專行事於外也五代史唐莊宗同光元年復以崇政院為樞密院命宰臣郭崇韜兼使又置院使一人然權侔宰相矣五代會要晉天福中以桑維翰知樞密院事四年廢樞密院以劉處謙兼樞密奏議多不稱㫖及處謙丁內憂遂廢其院開運元年復置以宰臣桑維翰兼使周顯德六年范質王漙並參知樞密院事五代會要本朝樞密院與中書對持文武二柄號為二府建隆元年以宰相魏仁浦吳延祚為樞密使趙普為副使周末闕副使至是始置太平興國四年以石熙載為樞密直學士以簽書院事簽書之名始此大中祥符五年以知樞密院王欽若陳堯叟同中書門下平章事充樞密使儒臣為使兼使相自此始淳化三年以張遜知院事溫仲舒冦準同知院事同知院之名始此治平中以郭逵同簽書院事同簽書之名始此舊制樞密院有使則置副使有知院則置同知會要如置知院則當為副使者皆改同知若置使則同知復改為副使慶歷二年西方用兵富弼言邉事係國安危不當專委樞密宜使宰相兼領於是以宰相吕夷簡判院事或言判名太重改夷簡兼樞密使熙寧元年文彥博吕公弼為使韓絳邵亢為副使時陳升之三至樞府神宗欲稍異其禮乃以為知院於是知院與使副並置矣元豐改官制議者欲廢密院歸兵部神宗曰祖宗不以兵柄歸有司故專命官統之互相維制不從然以樞密聨職輔弼非出使之名乃定置知院同知院二人餘悉置職事亦多所釐正細務分𨽻六曹專以邊機軍政為職而丹契國信民兵牧馬猶總領焉續會要中興初有知院同知書簽樞同簽樞不置樞密使副使中興會要建炎四年以宰相范宗尹兼知樞密院自慶歷後宰相不兼樞密者八十年復兼自此始紹興初宰相張浚兼使趙鼎秦檜亦以左右僕射兼自此魏公既薦秦相未欲其共已並又以故相不可除宅官乃先白髙宗降㫖以本兵之地事權宜重特除樞密使朝野雜記後秦檜首復除樞使王敏節副之既而張劉二將並除樞密使嶽飛副之合典故矣近歲張浚汪徹虞允文王炎王淮周必大王藺趙汝愚繼除同上樞使其副止稱同知蓋相承之誤事類天樞春秋運斗樞北斗第一丨丨第二璇第三璣後漢紀西樞熙寧三年詔曰國朝以丨丨內輔翊贊本兵任為重矣會要樞省曾公亮除樞密院詔曰宜冠聮於丨丨王歧公集溫省王疇除樞密封妻制曰朕用禁林之老典丨丨之務甫參壽於帷幄承班秩於室家胡文恭行中樞文彥博除樞密制曰仍冠丨丨溫公集上樞擢從外關入贊丨丨王歧公回蔡樞密書用宣頭子郭崇韜安重誨為樞密使始分領政事不由中書直行下者謂之宣如中書之勑小事則發頭子擬掌帖也至今樞密院丨丨及丨丨吕源明家孰廣記掌機政令樞密院丨天子之丨務及天下邉境軍馬之丨丨會要文武參用自五代以樞密院丨丨丨丨祥符七年王嗣宗曹利用並為檢校太保充副使同上朝廷大體施大資㸃與樞密周公呈本院事上曰適來一二事卿等各陳所見甚關丨丨丨丨公復奏曰臣䝉陛下權用日愧素餐疊䝉聖訓敢不竭股肱之力言行録三省同議神宗改官制大事丨丨共密院丨丨進呈畫㫖稱三省樞密院同奉聖㫖三省官皆同簽付樞密院行之小事獨取有行訖關三省每朝三省樞密院先同對樞密退待於殿廬三省始留進呈三一事退樞密院再上進呈獨取㫖遂為定制吕源明家孰記三省聚議常事密院自行至涉邉則丨丨丨丨謂之開南㕔同上在中書西國初循唐制即中書之北置樞密院元豐改制遂變於中書西置續會要如中書勑見前用宣頭子注西府爭事韓魏公曰慶歷中興希文彥國同在丨丨上前丨議論各别下殿各不失和氣如未嘗爭也當時相善三人正如推車子其心一主於車可行而已不為己也魏公别録二府持柄國朝樞密院與中書對持文武二柄號為二府會要樞要之司歐陽文公集密勿之司楊文公集神兵會府天極環樞丨丨丨丨王歧公除文彥傳制神務枋府北樞之躔管于丨丨二丨之丨倚以老成賜張耆詔樞謨靖密丨丨丨丨王禹稱行王曾制神機聽解丨丨丨丨之劇王禹稱集老泉上韓樞密太尉執事洵著書無他長及言兵事論古今形勢至自比賈誼所獻權書雖古人已往成敗之迹茍深曉其義施之於今無所不可昨因請見求進末議太尉許諾謹撰其說言語朴直非有驚世絶俗之談甚髙難行之論太尉取其大綱而無責其􅊏悉蓋古者非用兵决勝之為難而養兵不用之可畏今夫水激之山放之海决之為溝塍壅之為沼沚是天下之人能之委江河注淮泗滙為洪波瀦為太湖萬世之不溢者自禹之後未之見也夫兵者聚天下不義之徒挍之以不仁之器而教之以殺人之事夫惟天下之未安盜賊之未殄然後有以施其不義之心用其不仁之器而試其殺人之事當是之時勇者無餘力智者無餘謀巧者無餘技故其不義之心變而為忠不仁之器加之於不仁而殺人之事施之於當殺及夫天下既平盜賊既殄不義之徒聚而不散勇者有餘力則思以為亂智者有餘謀則思以為奸巧者有餘伎則思以為詐於是天下之患雜然出矣蓋虎豹終日而不殺則跳踉大呌以發其怒蝮蝎終日而不螫則噬囓草木以致其毒其理固然無足怪者昔者劉項奮臂於草莽之間秦楚無賴子弟千百為輩爭起而應者不可勝數轉鬪五六年天下厭兵項藉死而髙祖亦已老矣方是時分王諸將改定律令與天下休息而韓信黥布之徒相繼而起者七國髙祖死於介胄之間而莫能止也連延及於吕氏之禍訖孝文而後定是何起之易而收之難也劉項之勢初若決河順流而下誠有可喜及其崩潰四出放乎數百里之間拱手而莫能救也嗚呼不有聖人何以善其後哉我太祖太宗躬環甲胄跋涉險阻以斬刈四方之蓬蒿用兵數十年謀臣猛將滿天下一旦卷甲而休之傳四世而天下無變此何術也荆楚九江之地不分於諸將而韓信黥布之徒無以啓其心也雖然天下無變而兵久不用則其不義之心蓄而無所發飽食優游求逞於良民觀其平居無事出怨言以邀其上一旦有急是非人得千金不可使也往年詔天下繕完城地西川之事洵實親見凡郡縣之富民舉而籍其名得錢數百萬以為酒食餽餉之費柝聲未絶城輒隨壞如此者數年而後定卒事官吏相賀卒徒相矜吉戰勝凱旋而待賞者比來京師逰阡陌間其書往偶語無所諱忌聞之士人方春時尤不忍聞蓋時五六月矣會京師憂大水鋤犂畚築列于兩河之壖縣官日費千萬傳呼勞問之聲不絶者數十里猶且睊睊狼顧莫肯效用且夫內之如京師之所聞外之如西川之所親見天下之勢今如何也御將者天子之事也御兵者將之職也天子者養尊而處優植思而取名與天下為喜樂者也故其道不可以御兵人臣執法而不求情盡心而不求名出死力以捍社稷使天下之心繫於一人而已不與焉故御兵者人臣之事不可以纍天子也今之所患大臣好名而懼謗好名則多植私恩懼謗則執法不堅是以天下之兵豪縱至此而莫之或制也項者狄公在樞府號為寬厚愛人狎昵士卒得其權心而太尉適承其厚彼狄公者知御外之術而不知治內之道此邊將材也古者兵在外愛將軍而忘天子在內愛天子而忘將軍愛將軍所以戰愛天子所以守狄公以其御外之心而施諸其內太尉不反其道而何以為治或者以為兵久驕不治一旦繩以法恐因以生亂昔者郭子儀云河南李光弼實代之將至之日張用濟斬於轅門三軍股慓夫以臨淮之悍而代汾陽之長者三軍之士竦然如赤子之脫慈母之懷而立乎嚴師之側何亂之敢生且夫天子者天下之父母也將相者天下之師也師雖嚴赤子不敢以怨其父母將相雖厲天下不敢以咎其君其勢然也天子者可以生人可以殺人故天下望其生及其殺之也天下曰是天子殺之故天子不可以多殺人人臣奉天子之法雖多殺天下無以歸怨此先王所以威懷天下之術也伏惟太尉思天下所以長久之道而無務一時之名盡至公之心而無恤三軍之多言夫天子惟深仁以結其心太尉厲武威以振其墮彼其思天子之深仁則而不至於怨思太尉之威武則愛而不至於驕君臣之體順而畏愛之道立非太尉吾誰望耶老蘇文晦庵上黃樞密竊聞狄酋隕命種人遁走淮北遺民悉降我師此蓋天命眷顧宗廟社稷之靈肅清中原以全畀付莫大之慶海內同之然熹之愚慮獨不勝私憂過計敢以布於下執事蓋自戊午講和以至于今二十餘年朝政不綱兵備弛廢國勢衰弱內外空虗近歲以來天啓聖心稍加振理時復漸有條緒然宿弊已深非得同心同德之臣素為海內所屬望者為之輔佐進賢退姦修滯補弊要之以盡而持之已久使其勢翕然而大變則未可以有為也前日不量事勢亟下親征之詔則既失之易矣然理宜言順庶幾有成事同發機有進無退而曠日引日不聞進發之期任國政者不聞有冦忠愍之謀典宿衛者不聞有髙武烈之請使諸將惰心六軍解體狄騎橫突深入兩淮兵少而敵益强事急而糧已匱於是解嚴未及兩月而募兵科借之禍已及民矣向非天佑皇家降罰于彼則勝負之决蓋未可知今日之事其不可謂諸公謀於廟堂之效羣帥攻城野戰之功亦已明矣愚謂君臣相戒兢慎祗肅改圖柄任益修政理以答揚上天眷顧之命不宜坐虞鄰國之難以幸為利而遽自以為安也抑今中原之地幅貟萬里狄人奔走震駭之餘力未能爭朝廷坐視而不取非以計取之則功緒廣而勞費多此正安危得失之機差之毫釐繆以千里不可以不審也熹切以為必能因其人以守因其糧以食使東南之力不困然後根本固而不搖必有以大慰其來蘇之望而深結其同濟之心使西北之情益堅然後藩籬密而可恃必使狄人他日痛定力全之後不能復窺吾盧龍之塞然後朝謁陵廟還反舊京之事乃可言也不然今日朝廷之上侍從之列誰為能辦此者獨舊人之賢起而未用者一二公使之出則重於今日視師之人授之政則賢於今日秉鈞之士獨恐朝廷終不聼用則無如之何耳失今不早為計北人士馬精强固未有損今茲所失獨完顔亮一夫耳萬一旬月之間復悉其衆挾其喪君之耻以來修怨于我不知朝廷之議復以何計禦之斂民則民憔悴而不堪募兵則兵脆弱而無用將據中原而與之爭則形勢未習將棄中原而守淮泗則恢復無期不知議者何以處此茍處之未審而曰姑又以待天幸之來則非愚之所敢知者是以私憂過計夙夜拳拳而不能已也顧衰病之餘氣短辭拙不能言利害之實然其大勢不逺是矣閣下以道學履踐致身廟堂在諸公間最有人望故熹敢以此言進觸冒威尊皇恐無地狂妄之罪惟左右者裁之朱文公集樞密使事類機任安重誨為樞密使在位六年以佐命功臣處丨密之丨事無大小皆所參决孔白帖密地後唐張居翰為樞密使云云時居翰在丨丨五代史位極人臣莊宗朝郭崇韜為樞密使崇韜既丨丨丨丨權兼內外謀猷獻納必盡忠規士