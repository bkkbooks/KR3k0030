body:
  text: 古今合璧事類備要别集卷十五宋謝維新撰宫室門門户宫室舉要夫門之設所以限内外通往來畿出入而時啟閉者也故髙其閈閎固其扄鐍謹其管鑰關鍵必宻樞機必周棖闑必牢闕一而不可也在國曰公門在軍曰壁門在民亦莫不容自私立門户世禄之家朱門貧賤之家蓽門衡門此其大槩也惟君子之於是門也由必以禮行必以義將入户也視則必下將出門也如見大賔立不中門為近中而尊也行不履閾為近上而髙也外有二屨言聞則入不掩人之私也户開亦開户闔亦闔不以後來變先也有後入者闔而勿遂示不以已拒人也凡與客入每門必遜示不以已先人也凡一企踵一動容之間無不率由於斯道而况於公卿之門而况於王侯之門而况於天子之門哉彼有踦閭以始禍旅植以僭禮斬關以出奔超乗以示勇者何足知此事類乾闢闔户謂之丨丨户謂之坤易係艮為丨丨門闕易説卦鼔用牲丨丨丨于社于門左莊二十五祭先肝孟春之月云云其祀户祭先脾孟秋之月云云其祀門丨丨丨記月令雀㗸書有赤丨丨丹丨止於昌户帝王録蛇鬭死内丨與外丨丨於鄭南門中内蛇丨左莊十四王居門太史閏月詔丨丨丨終月注月令十二月分在青陽明堂緫章元堂之位唯閏月無所居居於門故於文王在門謂之閏禮春官君入門禮丨丨丨介拂闑大夫中棖與闑之間介植棖凡入門近中為尊白六帖作銅户吳王闔閭畏王僚之子慶忌丨石室丨丨以備之列士傳樹塞門管仲亦丨丨丨語免胄而下秦師過周北門左右丨丨丨丨超乗者三百人注王城之北門胄兠鍪兵車非大將御者在中故左右下御不下左僖三十三年踦閭而語晉三大夫相與丨丨丨丨注閭當道門閉一扇一人在内一人在外曰踦公羊傳宣十七年與衞門材齊侯使公子无虧戍曹丨門材注門材使先立門户左閔二掌鄭門管杞子自鄭使告於秦曰鄭人使我丨其北門之管注管鑰也左僖三十二過孔氏門子擊磬於衞有荷蕢而丨丨丨之丨者語式干木閭魏文侯過段干木之閭而丨其僕曰君胡式曰丨丨賢者也吾安敢不式吕氏春秋踵門而告有為神農之言者許行丨丨丨丨文公曰聞君行聖人之政願為聖人氓孟滕文公上閉門不納公孫丑問曰不見諸侯何義孟子曰古者不為臣不見段干木踰垣而辟之泄桞丨丨而丨丨是皆已甚迫斯可以見矣生子及户薛静郭居曰嬰嬖妾五月五日生子文俗云此日丨丨丨丨損其父妾匿養之文長曰受命於天受命於户何不髙其户春秋後論使人開户燕王在明光宫欲入所卧處三户盡閉丨二十丨丨不得入王充論衡待子而大吕不韋往見子楚説曰吾能大子之門子楚笑曰且自大君之門而乃大吾門不韋曰子不知也吾門丨丨丨丨史本傳有使者出衞蒯瞶入輙出奔季子將入遇子羔將出曰門已閉矣季子曰吾姑至焉子羔曰弗及不踐其難季子曰食焉不辟其難子羔遂出季子入及門公孫敢門焉曰無入為也季子曰是公孫也求利焉而逃其難由不然利其禄必救其患丨丨丨丨乃入曰太子焉用孔悝雖殺之必或繼之且曰太子無勇若燔臺半必舍孔叔太子聞之懼下石乞孟黶敵子路以戈擊之斷纓子路結纓而死孔悝立莊公左哀十五令容駟馬于定國父于公其門閭壊父老方共治之于公曰少髙大閭門丨丨丨丨髙葢車我治獄多隂徳未嘗有寃子孫必有興者至定國為丞相永為御史大夫封侯世傳云漢本傳令容髙車後漢孔融告高宻縣特為鄭𤣥立一鄉曰鄭公鄉曰昔東海于公僅有一節猶或戒鄉人侈其門閭矧乃鄭公之徳而無駟牡之路可開廣門衢丨丨丨丨號曰通徳門門可曵裾鄒陽諫吳王曰飾固陋之心則何王之丨不丨丨長丨乎門可張羅崔公為廷尉賔客填門及廢丨外丨丨雀丨前當容馬車晉陳頵父訢立宅起問曰丨使丨丨丨訢笑從之後州辟部從事乗馬車還家宗黨榮之仕至梁州刺史欲容旛旗晉王濬當起宅開門前路人或謂之太過濬曰吾丨使丨長㦸丨丨衆咸笑之濬曰陳勝有言燕雀安知鴻鵠之志後夢三刀遷益州刺史閉户讀書孫敬丨丨丨丨閉門掃軌劉勝丨丨丨丨無所干杜宻傳隘不容車太平公主假萬年縣為婚舘門丨丨能丨翟丨有司廢垣以入孔帖隘為買地張志和築室越州東郭觀察使陳少游往見為終日畱以門丨丨丨丨大其閎仝上吾不復入田頵已平馮𢎞鐸至揚州謝行宻又求池歙為屬州行宻不許頵始怨将還指府門曰丨丨丨丨此孔帖賊不能入髙固為渾瑊童奴字黄岑徳宗在奉天固仍從瑊賊突入東壅門固引鋭士長刀殺賊數十人曵車塞闔丨丨丨丨封渤海郡王天子書門田游巖見宅門注羣司走門李林甫改右相或帝不朝丨丨要官悉丨其丨臺省為空車馬填門王暕子承性簡貴有風格右衛朱异當權每休暇丨丨丨丨有田英好危言忤權右嘗指异門曰此中輻輳能不至者大小王東陽耳小東陽即承幼弟也為東陽太守往來有簿姚珽書其主曰前世東宫門閤丨丨皆丨丨籍殿下時有所須惟閽司宣令姦偽乗之並請内即畫署冀免詐謬孔帖出入其籍司門郎中員外郎各一人掌門關丨丨之籍凡閳遺之物凡丨召者降墨勅勘銅魚木然後入監門校尉巡日送平安凡奏事遣官送之晝題時刻夜題更籌唐史百官志晨昏擊鼓城門郎掌京城皇城宫殿諸門開闔之節奉其管鑰而出納之開則先外而後内闔則先内而後外所以重内禁尊帝居也候其丨丨丨丨之節而啟閉之唐大典多出其門劉晏任職久勢軋宰相要官華使丨丨丨丨争趨其門唐大厯中楊綰為相徳望日崇天下雅正之士丨丨丨丨門當列㦸韓滉丨丨丨丨以父時第門不忍壊乃不請門植六闕楊炎孝著三代表其門閭丨丨丨丨門若市然𤣥宗貴妃楊氏四方獻餉結納丨丨丨丨門如湯沸李義府母妻諸子賣官市獄丨丨丨丨闔門著書陸羽丨丨丨丨塞門示尊常衮同平章事政事堂北門異時宰相過舍人院咨逮政事至衮乃丨之以示尊大並孔帖摯虞門銘禄無常家福無定門人謀鬼謀道在則尊韓愈剝啄行剝剝啄啄有客至門我不出應客去而嗔從者語我子胡為然我不厭客困于語言欲不出納以堙其源空堂幽幽有秸有莞門以兩板叢書於間窅窅深塹其墉甚完彼寧可隳此不可干從者語我嗟子誠難子雖云耳其口益蕃我為子謀有萬其全凡今之人急名與官子不引去與為波瀾雖不開口雖不開關變化咀嚼有鬼有神令去不勇其如後艱我謝再拜汝无復云徃追不及来不有年韓愈水門記貞元十四年正月戊予隴西公命作東西水門越三月辛巳朔水門成三日癸未大合樂設水嬉會監軍軍司馬賔佐僚属將校熊羆之士肅四方之賔客以落之士女龢㑹闐郭溢郛即卒事其從事昌黎韓愈請紀成績其詞曰維汴州河水自中注厥初距河為城其不合者誕置聨鎻於河宵浮晝湛舟不潛通然其襟抱虧疏風氣宣洩邑居弗寧訛言屢騰歴載以來孰究孰思皇帝御天下十有八載此邦之人遭逢疾威嚚童噭嘑刼衆阻兵懔懔栗栗若墜若覆時維隴西公受命作藩爰自洛京單車來臨遂拯其危遂去其疵弗肅弗厲薫為太和神應祥福五榖穰熟既庶而豐人力有餘監軍是咨司馬是謀乃作水門為邦之郛以固風氣以閈㓂偷黄流渾渾飛閣渠渠因而飾之匪為觀遊天子之武維隴西公是布天子之文維隴西公是宣河之沄沄源於崑崙天子萬祀公多受祉乃伐山石刻之日月尚俾來者知作之所始桞宗元北門記賢者之興而愚者之廢廢而復之為是習而循之為非恒人且猶知之不足乎列也然而復其事必由乎賢者推是類以從於政其事可少哉賢莫大於成功愚莫大於恡且誣桂之中嶺而邑者曰全義衞公城之南越以平盧遵為全義視其城塞北門鑿他雉以出問之其門人曰餘百年矣或曰巫言是不利於令故塞之或曰以賔旅之多有懼竭其餼饋者欲迴其途故塞之遵曰是非恡且誣歟賢者之作思利乎人反是罪也余其復之詢于羣吏羣吏叶厥謀上於大府大府以俞邑人便焉讙舞里閭居者思止其家行者樂出其塗由是道以廢邪用賢棄愚推以革物宜民之蘇若是而不列殆非孔子徒也為之記云詩集朝叩丨丨富兒門杜晝睡敲門驚丨丨問報睦州吏韓蒼岑疎丨丨丨秋門李賀到洛輕縠籠雕玉押簾上丨丨丨虚門李賀緑槐夾丨丨丨門植潘岳懐縣作碧桞垂門垂丨丨似陶潛李白窮乃叩途丨丨丨閽杜出復入丨門丨丨門兩脚但如舊杜九日寄岑參髙議排幾時丨丨丨金門客使蒼生有環堵杜軍將叩日髙丈五睡正濃丨丨丨門驚周公韓剥剥至丨丨啄啄有客至丁丁啄丨丨丨門如啄木仝上人呌閶闔排雲丨丨丨韓開閶闔九天宫殿丨丨丨注閶闔天門杜黄團繫丨丨丨門衡注黄團𤓰蔞也衡門上木韓城南聨句喬木映森森丨丨丨朱門荊公無卿相輿寂寂揚子宅門丨丨丨丨左太冲多長者車門丨丨丨丨穆穆無凶樞動本為榮辱主長因外户細推尋乾坤出入无窮象夷狄關防有限心揜到善人非逺大開當古道自髙深九成載舞簫韶奏丨丨丨丨合在今龍曷期詠門古今合璧事類備要别集卷十五
