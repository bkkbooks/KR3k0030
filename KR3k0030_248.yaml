body:
  text: 古今合璧事類備要别集卷四十二宋謝維新撰菓門桃實格物總論桃實大如小兒拳小者如雞卵形圓稍匾起尖有毛夏五六月方熟淡黄色間出斑斑紅㸃臙脂様核大如拇指有自然刻紋毎一枝或三五顆味甘香不酸澁亦果中之珍也事類有蕡丨丨其實詩桃夭投我丨丨以木桃木𤓰玉衡星丨丨丨散為桃春秋運斗樞度索山東海有山名丨丨上有大桃屈蟠三千里名曰蟠桃吴都賦注仁甘美波斯國有波淡樹長五六丈圍四五尺似桃三月開花白色花落結實狀如桃子而形偏故謂之偏桃其肉苦澁不堪啖核中丨子丨丨西域諸國共珍之南蠻志果為下孔子侍坐於魯哀公哀公賜之桃與黍公曰以黍雪桃也對曰黍五穀之長丨六而桃丨丨君子以貴雪賤家語二桃殺士公孫接田開疆古冶子事景公勇而無禮公患之晏子言於公請公饋之二桃曰三子計功而食公孫接田開疆先言功援桃而起古冶子又言其功令二子反桃二子慙而自殺古冶子曰恥人以言夸其聲不義也亦反其桃契領而死故曰丨丨丨三丨晏春秋餘桃啖我昔彌子瑕有寵於衞君食桃而甘以其半啖君君曰愛我哉忌其口而啖寡人及彌子瑕得罪於君曰是固啖我以餘桃韓子盜食御桃秦吏趙凱私恨吿國民吳且生丨丨宗廟丨丨且生對曰民不敢食也王曰剖其腹取其桃史記惡而書之曰食桃之肉當有遺核不知此而剖人腹以求桃非理也周書共食碧桃老子西遊省太真王母丨丨丨丨紫梨尹喜内傳方朔三偷東都獻短人帝呼東丨丨朔至短人謂上曰王母種桃三千嵗一結子此兒不良已丨過丨之矣後西王母以七月七日降帝宫命侍女索桃須臾盤盛七枚母自噉二以五枚與帝帝留核著前母曰用此何為上欲種之母笑曰此桃三千年一著子非下土所植漢武故事亘元就求亘崖在京下有好桃丨丨丨丨不得佳者元曰德之休明則肅慎貢其􅀈夫如其不然籬碧間物亦不可得也世說噉桃止饑漢永平中劉晨阮肇入天台迷不得返經十三日飢甚遥望山上有桃遂躋險援葛至其下噉數枚飢止躰充下山取水見一杯流下有胡麻焉乃相謂此近人矣遂度山見大溪溪邊有二女子色甚美見二人持杯便笑曰劉阮二郎投向懐來劉阮驚二女欣然曰來何晚邪因邀至家十日求還苦留半年女遂相送指示還路鄉邑零落已七世矣摻神記取桃滿懷張陵沛人也弟子趙升就陵受學陵已七嵗試之第七試者陵與諸弟子登雲臺山絶巖上有一桃樹旁生巖上石壁下臨不測去三四丈有大桃實陵謂諸弟子曰得此桃者當告之以道弟子皆流汗无敢視者升曰神人所䕶何􅕑之有乃從上自擲正投桃樹上丨丨丨丨而石壁峭峻不能得還乃擲百枚於陵分命賜諸弟子餘二枚陵自食一留一以待升陵乃伸手引升升忽已還乃以向一桃與升神仙傳桃便相擊樊夫人與劉綱俱有道術各自言惡中庭有大桃樹夫妻各呪其一丨丨闘丨丨良久所呪桃走出籬外同前桃我所種譙郡夏侯文規亡後見形還家經庭前桃樹邊過曰此丨丨昔丨丨子乃美好其婦曰人言亡者畏桃君何不畏邪荅曰桃東南枝二尺八寸向日者憎之或亦不畏也甄異傳形如括蔞洛城華林園内有冬桃十月始熟丨丨丨丨食之解勞亦名西王母桃酉陽雜爼核如雞卵史論在齊州時出獵至一縣界憇蘭若中覺桃香異常訪其僧僧不及𨼆言近有人施二桃從經案下取出獻論大如飯碗論時飢盡食之丨大丨丨丨論因詰其所自僧道論比去上山越澗至一處竒泉怪石非人境也有桃數百株榦掃地向二三尺其香破鼻論與僧各食一蔕腹果然矣論亦疑僧非常取兩箇而返孔六帖食桃得仙葛由羗人好刻木作羊賣之騎羊入蜀蜀中王侯貴人追之上綏山丨丨丨丨故里諺曰得綏山一桃雖不能仙亦足以豪列仙傳見桃思戒莊宗年邁多疾馮道奏曰臣願陛下寢膳之間動思調衛因指御前果實曰如食桃不康翊日丨丨而丨丨可也五代史傅𤣥桃賦有東園之珍果兮承陰陽之靈山結柔根以列樹兮艷長畝而駢羅夏日先熟而進廟堂辛氏踐秋厥味益長亦有冬桃冷伴氷霜放神適意恣口所嘗華升御於内庭飾佳人之令顔實充虚而療飢兮信功烈之難原嘉牛放於斯林兮悦萬國之乂安望海島而慷慨兮懷度索之靈山何茲樹之獨茂兮條枝紛而麗閑根龍虬而雲結兮彌千里而屈盤禦百鬼之妖慝兮列神荼以司姦辟凶邪而濟正兮豈惟榮美之足言牟輯之桃賦嗟王母之竒果特實兮兼副既陶照而夏成又凌寒而冬就嗟異植兮難㧞亦晩枯兮先茂農黄品其味漢帝驚其珍林休反耕之牛宅樹司惡之神雖無言兮成蹊叵充有於魏君詩集鸚鵡啄丨丨丨金桃杜王母獻丨丨丨金桃同上縹肌細肉要待花餘見秋實丨丨丨丨薦盤珍宋景文丹砂為骨雨染烟蒸萬實垂丨丨丨丨玉為衣客疑麗水新淘得人向瑶池舊帶歸只恐壓枝星欲落最憐和蘂露初稀文與可楊梅格物總論楊梅其子如彈丸五月中熟時似梅子其味酸酣然有紅白紫三種紅者味勝於白紫者又勝於紅顆大而核細尤天下之竒也事類呼為聖僧揚州人丨白楊梅丨丨丨坡詩注此實君果楊氏子年九嵗孔君平詣其父設果有楊梅孔指示兒曰丨丨禽丨家丨兒應聲荅曰未聞孔雀是孔子家江淹賦鏡日綉壑照霞綺蠻詩集龍睛顆顆丨丨濕深深映石門自憐非荔子不得薦堯閽郭功父驪珠綠陰翳翳連山市丹實纍纍照路隅未愛滿盤堆火齊先驚探頷得丨丨斜簪寶髻看遊舫細織筠籠入上都醉裏自矜豪氣在欲乗風露摘千株陸放翁火齊堆梅出稽山世少雙清知風味勝他楊玉肌半醉生紅粟黒暈㣲深染紫囊丨丨丨盤珠徑寸醴泉繞齒柘為漿故人解寄吾家果未變蓬萊閣下香楊廷香紅實綴丨丨丨青枝爛熳照前塢不及杏繁時林間有仙虎郭功父枇杷格物總論枇杷樹高丈餘枝肥葉大有毛冬華夏實大如雞子小者如梅子味甜酢黄熟方可喫核如指頭大事類嵗貢建中元年詔山南之枇杷云云丨為次第丨者取一次以供廟饗唐史周祗賦枇杷寒署無變負雪揚華余植之庭圃遂賦之云名同音器質異貞松四序一采素華冬馥詩集樹樹香枇杷丨丨丨杜攅金圃丨丨盧橘丨坡覺猶香夣繞呉山歸月廊楊梅盧橘丨丨丨坡尚帶酸客來茶罷空無有盧橘楊梅丨丨丨前人果産西蜀有丨丨丨丨作花凌早寒樹繁碧玉葉柯疊黄金丸上都不可寄咀味獨長嘆宋景文名著上林五月枇杷黄似橘誰思荔支同此時嘉丨已丨丨丨賦却恨紅梅未有詩梅聖俞二梢滿盤大葉聳長耳丨丨堪丨丨荔支多與核金橘却无酸雨壓低枝重漿流氷齒寒長卿今在否莫遣作園官楊誠齋萬顆綴木丨丨金丸丨丨稠遺根漢苑識風流也知不作清朝瑞朽腐聊闗聖主憂劉屏山石榴格物總論石榴包如杯大赤色黒斑㸃中如蜂窠窠數子如人齒帶淡紅色光皎琥珀然又有潔白如雪者有甜酢二種甜者為佳熟時其苞自烈名果也事類醖成美酒頓孫國有安石榴取汁停盃中數日成美酒扶南傳盛送碼碯李漢碎胡瑪瑙丨丨王莒曰安石榴奉送莒見之不疑食之乃覺楊事迹武陵獻六晉安帝時丨丨臨沅丨安石榴一蔕丨實宗氏薦二齊安德王延宗納趙郡李祖收女為妃母丨丨丨丨石榴於帝莫知其意帝問魏収荅曰石榴房多子王新昬妃欲子孫衆多帝大喜北史潘岳賦若榴者天下之竒樹九州之名果也千房同膜十子如一禦飢療渴解酲止醉張載賦紫房獨熟赬膚自拆剖之則珠㪚含之則氷釋詩集珠實庭榴剖丨江總絳實潛苞丨丨拆韓蔗為漿味美丨丨丨前人蜂釀蜜滿房丨丨丨一腹蚌含珠古詩水晶粒蟬噪秋枝槐葉黄石榴香老愁寒霜流霞包染紫鸎粟黄蠟紙裹紅瓠房玉刻氷壺含露濕爛斑似帶湘娥泣蕭娘欲嫁嗜甘酸嚼破丨丨千萬丨皮日休玳瑁殻丨丨丨㕙枝婀娜馬牙硝骨綿數褁霜風擊破錦香囊鸚鵡啄殘紅豆顆美人擎在金盤腹錯認海螺斑碌碌滿口嘗含瓊液甘一堂齒冷敲寒玉莊布膜輕明榴枝婀娜榴實繁榴丨丨丨榴子鮮可羡瑶池碧桃樹碧桃紅頰一千年李商隠子同包庭榴結實壓芳叢一夜飛霜染茜容萬丨丨丨無異質金房玉隔謾重重劉屏山丹砂粒安榴若拳石中藴丨丨丨剖之珠滿盤不待鮫人泣梅聖俞紅玉珠高枝重欲折霜老拆丹膚試剖紫金椀滿堆丨丨丨根雖傳大厦種必近仙都題作江南信人應賤橘奴鄭解古今合璧事類備要别集卷四十二
