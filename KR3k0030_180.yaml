body:
  text: 古今合璧事類備要續集卷三十宋謝維新撰類姓門公孫髙陽宫音古今姓纂黃帝姓公子孫因以為姓事類能舉善左公孫枝字子桑秦大夫穆公用百里奚孟明子桑之舉也君子以為丨丨丨善辭令子羽鄭行人公孫揮丨丨丨織屨而食公孫嬰齊字聲伯魯大夫丨丨丨丨終身不食宣公之食不毁鄉校子産鄭卿公孫僑也一字子美氏曰國丨丨丨丨古之遺愛並同上堅白同異史記公孫龍字子石楚人孔子弟子善為丨丨丨丨之辨三說前席公孫鞅衛之諸庶孽公子也少好學刑名之事入秦見孝公丨見而丨以伯道公與語不自知膝之丨於丨也語數日不厭詐為布被公孫𢎞齊菑川國薛縣人字季習文法吏事又緣飾以儒術汲黯庭詰𢎞曰齊人多丨而無情實丨丨丨食不重肉徒步至相公孫𢎞為御史大夫位丞相封平津侯起丨丨丨丞丨開東閣延賢人與參謀議鞍騎官材公孫賀字子叔北地義渠人後拜丞相不受印綬頓首泣涕曰臣本邊鄙以丨馬丨射為丨丨誠不任宰相井蛙自大後公孫述字子陽陛㦸而見馬援丨底丨妄丨尊丨馬援𫝊琴詠自得晉公孫鳳字子鸞隱于昌黎之九城山谷彈丨吟丨陶然丨丨諡曰崇虛公孫永字子陽隱於平郭南山吟詠巖間欣然自得年踰九十操尚不虧丨丨丨丨先生時稱書庫北史公孫景茂字元蔚在魏察孝亷射䇿甲科遷太常博士丨丨為丨丨東方平原宫音古今姓纂風俗通伏羲氏之後帝出于震位生東方子孫因以為氏焉事類三冬足用前東方朔字曼倩平原人十三學書丨丨文史丨丨目若懸珠齒若編貝勇若孟賁捷若慶忌亷若鮑叔信若尾生肉遺細君東方朔文辭不遜髙自稱譽上偉之令待詔公車善射覆伏日割丨歸丨丨丨閭丘頓丘宫音古今姓纂即吾丘氏也吕氏春秋中山有力者吾丘象事類議汾隂鼎前吾丘壽王字子贛趙人徵為光祿大夫侍中丨丨丨丨為漢寶第五隴西宫音古今姓纂出自齊諸田之後田氏漢初徙園陵者多故以其次第為氏事類俸餘貿民後第五倫字伯魚其先諸田之後拜㑹稽大守受丨裁留一月糧丨皆賤丨與丨之貧羸者嵗饑賑給第五訪字仲謀遷張掖太守丨丨乃開倉丨丨吏懼譴爭言訪曰太守樂以一身救百姓遂出穀賦人璽書嘉之桴鼓不鳴第五種字興先倫曽孫拜高密侯相盜賊憚之丨丨丨丨流民歸者嵗中至數千家清髙直士後坐徙朔方臧旻上書言其在鄉曲無苞苴之嫌步朝堂無擇言之闕故論者說丨丨以種為上序丨丨以種為首同上鹽鐵名使唐第五琦字禹圭京兆人拜監察御史勾當江淮租庸使兼諸道鹽鐵鑄錢使丨丨丨丨自琦始當軍興隨事輒辦人不益賦而用以饒水丘吳興宫音古今姓纂闕事類闕歐陽渤海宫音古今姓纂越王勾踐之後支孫封烏程歐陽亭因氏焉事類尚書世學前歐陽生字和伯千乘人事伏生受尚書子世傳至曽孫髙為博士髙孫地餘亦為博士論石渠由是丨丨丨有歐陽氏丨八世博士後歐陽歙字王思自歐陽生至歙丨丨皆為丨丨才贍北州晉歐陽建字堅石丨藻美丨擅名丨丨語曰渤海赫赫歐陽堅石顯貴南土南史歐陽頠字靖世為郡豪族遷廣州刺史合門丨丨威振丨丨書尺為法唐歐陽詢字信本潭州人博貫經史初倣王羲之丨後險徑過之丨牘所𫝊人以丨丨髙麗求之書亞於詢歐陽通詢之子蚤孤母徐教以父書懼其惰嘗遺錢使市父遺跡刻意臨倣數年丨丨丨丨父子齊名號大小歐陽體晚自矜重以狸毛為筆覆以毫管皆象犀非是未嘗書稱龍虎榜歐陽詹字行周泉州人舉進士與韓愈等聨第時丨丨丨丨閩人第進士自詹始文冠天下皇朝歐陽修字永叔吉州廬陵人從尹洙遊為古文議論當世事迭相師友與梅堯臣遊為歌詩相倡和遂以丨章名丨丨丨自號醉翁修昔守潁樂其風土因卜居焉及歸而居室未備處之怡然不以為意修之在滁也丨丨丨丨作亭琅邪山以醉翁名之同上自號六一晚年又丨丨丨丨居士曰吾集古録一千卷藏書一萬卷有琴一張有棊一局而嘗置酒一壺吾老於其間是為六一自為傳刻石居潁一年而卒諡文忠同上文學世家歐陽棐字叔弼以父修廕守祕書省正字修以道德文章為三朝所知天下學士大夫皆師尊之而棐亦能以丨丨丨其丨諸葛琅琊徵音古今姓纂本葛氏夏殷侯國葛伯之後英賢傳云舊居琅琊諸縣後徙陽都先有葛時人謂之諸葛氏因以為氏焉風俗通云葛嬰為陳涉將軍有功非罪而誅漢文追封其孫為諸縣侯因以為氏代本云有熊氏之後為詹葛氏齊人語訛以詹葛為諸葛事類特立剛直前諸葛豐字少季琅邪人以明經為郡文學丨丨丨丨擢司隸校尉刺舉無所避京師為之語曰間何闊逢諸葛上嘉其節加秩光祿大夫為梁父吟蜀諸葛亮字孔明躬耕隴畝好丨丨丨丨卧龍魚水徐庶目為丨丨先主曰孤之有孔明猶丨之有丨也木牛流馬率軍攻祁山關中響震以丨丨丨丨運糧並同上善政佳事諸葛瞻字思逺蜀人咸愛其才敏每朝廷有一丨丨丨丨雖非瞻所建倡百姓皆𫝊相告曰葛侯之所為也𢎞雅規檢吳諸葛瑾字子瑜為人有容貌思度于時服其丨丨以德度丨丨見器當世藍田生玉諸葛恪字元遜少有才名孫權見而奇之曰丨丨丨丨真不虛也為黑頭公晉諸葛恢字道明王導嘗曰明府當丨丨丨丨作雲中賦南史諸葛朂為國子生丨丨丨丨又作東冶徒賦悅禮敦詩諸葛璩字幼玫安貧守道丨丨丨丨俗如其簡退可揚清厲名理英華北史諸葛穎煬帝時為著作帝嘗賜詩有曰參翰長洲苑侍講肅成門丨丨窮研核丨丨恣討論西門晉陽徵音古今姓纂鄭大夫居西門因氏焉列子有門子魏文侯時西門豹為鄴令事類河伯娶婦魏西門豹為鄴令鄴之三老常嵗為丨丨丨丨巫行視人家女好者云是當為河伯婦即聘取洗沐為治齊宮河上張絳帷女居其中浮之河中數十里乃沒人多持女逺遁豹至期往㑹之父老皆㑹豹曰是女不好煩大巫嫗入報河伯投之河凡三立待良久不來復欲使廷掾及豪長者趣之皆叩頭流血久之罷去自後不敢復言詳見河門獨孤髙平徵音古今姓纂其先本姓劉氏當後漢北蕃有右賢王劉去卑之先尚漢公主因從母姓劉氏後魏在北有三十六部有伏留屯為部落大人居於雲中事類號獨孤郎北史獨孤信美容儀善騎射軍中丨為丨丨丨信著賜名仕魏除隴右大都督秦州刺史在州事無壅滯示以禮教勸以耕桑流人願附者數萬家周文以其丨丨遐邇故丨丨為信同上慕信側帽嘗馳馬入城其帽微側詰旦而吏人有戴帽者咸丨丨而丨丨焉同上道舉髙第唐獨孤及字至之河南人為兒時讀孝經父試之曰兒志何語對曰立身行道揚名於後世天寶末以丨丨丨丨德輿佳壻獨孤郁字古風及之子擢進士第最為權德輿所稱以女妻之擢翰林學士憲宗歎丨丨乃有丨丨詔宰相髙選世族故杜悰尚岐陽公主然帝猶謂不如德輿之得郁也司空頓丘徵音古今姓纂禹為堯司空支孫氏焉帝堯後有隰叔孫士蒍為晉司空亦因氏事類名亭休休唐司空圖字表聖河中人咸通末擢進士王凝辟置幕府召為殿中侍御史盧攜屬於盧渥曰司空御史髙士也渥表為僚佐景福中拜諫議大夫不赴圖本居中條山王官谷有先人田遂隱不出作亭觀素室悉圖唐興節士文人丨丨曰丨丨作文以見志自目為耐辱居士司馬河內徵音古今姓纂重黎之後唐虞夏商代掌天地周宣王時休父為司馬堯平徐方錫以官族為司馬氏在趙者曰凱以𫝊劒論知名蒯瞶其後也在秦者司馬錯孫蘄孫昌生無懌生喜生談太史公生遷漢中書令事類慕藺更名前司馬相如字長卿蜀郡成都人既學丨丨相如之為人丨丨相如客於臨卭家徒四壁立琴桃文君滌器長安著子虛賦太守郊迎相如奉使至蜀丨丨以下丨丨縣令負弩矢先驅賦有凌雲相如奏大人丨天子大悅飄飄丨丨丨氣遊天地之間意賦以風諫相如奏封禪書為游獵丨因丨丨丨賦奏天子以為郎㑹稽禹冗司馬遷字子長父談為太史公遷南遊江淮上丨丨探丨丨窺九疑浮沅湘北涉汶泗講業齊魯之都石室金匱遷為太史令紬史記丨丨丨丨之書網羅天下放失舊聞為太史公書序略有良史之材文直事核謂之實録作續漢書晉司馬彪字紹統不交人事博覽羣籍為祕書丞丨丨丨丨博通三禮南史司馬筠字貞素丨丨經術尤明丨丨貞一先生唐司馬承禎字子微事潘師正傳辟榖導引之術無不通師正異之卒諡丨丨丨丨池獨耆退皇朝司馬池字和申陜州夏縣人召知諫院表懇免仁宗曰人皆耆進丨丨丨丨何也衛士加額司馬光字君實神宗崩光赴闕臨丨丨見光入皆以手丨丨曰此司馬相公也民遮道呼曰公無歸洛留相天子活百姓所在數萬人聚觀之學無不通光忠信孝友恭儉正直出於天性自少及老語未嘗妄其好學如飢之嗜食於財利紛華如惡惡臭誠心自然天下信之於丨丨所丨丨音樂律厯天文書數皆極其妙晚節為冠昏喪祭法適古今之宜資治通鑑初光患歷代史繁重學者不能綜况於人主遂約戰國至秦二世如左氏體為通志以進英宗命光續其書置局祕閣以其所素賢者劉攽劉恕范祖禹為屬凡十九年而成神宗尤重其書以為賢於荀恱親為製叙賜名丨丨丨丨詔邇英讀其書云並同上上官天水商音古今姓纂楚王子蘭為上官邑大夫因氏焉漢有上官桀事類接武夔龍唐上官儀字游韶陜州人工文詞涉貫墳典貞觀初擢進士第遷祕書郎太宗每屬文遣儀視藁髙宗即位進西臺侍郎以雍州司士參軍韋絢為殿中侍御史或疑非遷儀曰此野人語耳御史供奉赤墀下丨丨丨丨簉羽鵷鷺豈雍州判佐比乎時以為清言令狐太原商音古今姓纂周文王子畢公髙之後有畢萬仕晉孫魏犨武子生顆别封令狐因氏焉事類西土冠冕北史令狐整字延保為丨丨丨丨曽祖嗣祖紹安咸為良二千石父虯早以名德著聞郢州刺史整深沉有識量學藝騎射並為河右所推撰定史書唐令狐德棻宜州人時大亂後經籍亡散祕書湮缺德棻始請帝求天下遺書置吏補録不數年圖典略備詔丨丨丨丨修撰自德棻發之箋奏𫝊諷令狐楚字殼士德棻之裔知制誥其為文於丨丨制令尤善每一篇成人皆丨丨嚴重寬厚楚外丨丨不可犯而中丨丨待士有禮為政善撫御治有績人人得所宜同上金鏡舉要令狐綯字子真楚之子召知制誥入翰林為學士夜召與論人間疾苦帝出丨丨書曰太宗所著也卿為我丨其丨綯摘語曰至治未嘗任不肖至亂未嘗任賢帝曰三復乃已綯再拜陛下必欲興王業捨此孰先詩曰惟其有之是以似之金蓮炬送為翰林承㫖夜對禁中燭盡帝以乘車丨丨華丨丨還同上白衣宰相令狐滈綯之子及第遷右拾遺當時謂之丨丨丨丨公羊頓丘商音古今姓纂齊有公羊髙子夏弟子𫝊春秋事類闕皇甫績添古今姓纂子姓宋戴公之子充石字皇父子孫以王父字為氏漢興改父為甫後漢安定都尉皇甫攜生稜始居安定稜子彪有八子號八祖皇甫氏為著姓事類西州豪傑後皇甫規字威明舉賢良為中郎將討諸羌慕其威信相勸降者十餘萬黨事起天下名賢多見染逮規雖為名將素譽不髙自以丨丨丨丨恥不得與時人以規為賢博綜經籍晉皇甫謐字士安丨丨丨丨百家之言自號𤣥晏先生時人謂之書淫竟不仕深沈雅量北史皇甫和字長諧丨丨有丨丨尤明禮儀為濟隂太守子聿道以幹局知名位廣平令不羈之才唐皇甫湜字持正睦州人擢進士第裴度辟為判官度修福先寺將立碑求文於白居易湜怒曰近捨湜而逺取居易請從此辭度謝之湜請斗酒飲酣援筆立就度贈以車馬繒綵甚厚湜大怒曰自吾為顧况集序未嘗許人今碑字三千字三縑何遇我薄耶度笑曰丨丨丨丨也從而又酬之鮮于古今姓纂子姓殷後周武王封箕子於朝鮮支子仲食采於于子孫因以鮮于為氏事類忠節北史鮮于世榮漁陽人立忠節福星皇朝鮮于侁字子駿閬州人為東京轉運使所代吳居厚以掊斂虐下侁繼之務行寬大司馬光嘗謂蘇軾曰子駿丨丨也京東人困甚且令子駿救之然安得百子駿布之天下乎三難東坡先生云自朝廷更法以來奉法之吏尤難其人刻急則傷人寬厚則廢法二者其理難通而山峽地瘠民貧役重其推行為尤難子駿世家南隆親族故人散處所部以親則壞法以法則傷恩二者其勢難全是丨丨者萃於子駿而子駿為之九年其聲藹然聞之四方上不害法下不傷民中不立親自講議措置至於立法定制皆成於其手吏民舉欣欣焉而子駿亦自治園囿亭榭賦詩飲酒雍容有餘如異時為監司者君子以是知其賢万俟古今姓纂後魏獻帝季弟之後為十姓官氏志稱万俟氏中間失譜本朝髙宗朝有万俟卨為執政事類雄果武力北史万俟普字普撥其先胸奴之别也丨丨冇丨丨歸魏遷第二鎮人酋長慷慨氣節万俟洛字受洛干隨孝武入關除左僕射丨丨有丨丨勇鋭冠世同上聞人古今姓纂風俗通少正卯魯之聞人其後遂以聞人為氏漢有太子舍人聞人通沛人治后氏禮事類闕已上覆姓一十八姓皆目今之顯姓並作俗本書市百家姓類次編葺其餘僻姓姑且略去觀者幸鑒古今合璧事類備要續集卷三十
