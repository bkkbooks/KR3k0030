body:
  text: 古今合璧事類備要前集卷四十八宋謝維新撰釋教門禪法事類見性禪者定慧之通稱明心達理之趨也達麼觀此上機緣繁紊乃曰不立文字者恐其執文滯相也直指人心乃丨丨成佛者明其頓了無生也要覽因心無有可捨是達本原無空可住是知空本在百法而無得周萬物而不殆則知法本不生丨丨起見見無可取法則常如有證於此得無漏不盡漏度有為非無為者其曹溪乎文粹清淨自白馬東來而人知象教佛衣始傳而人知心法味真實即丨丨以觀空存想好者怖感神而遷善厚於求者植因以覬福罹於苦者證業以消寃隂助教化總持人天所謂生成之外别有陶冶刑政不及曲為調柔其方可言其㫖不可得而言也劉禹鍚記神妙以五藴九識十八界皆空猶鏡之明也雖萬物畢呈而光性無纍心之虛也雖三際不住而覺觀湛然得此者即凡成聖不然則一塵瞥起六入膠固循環回伏於生死之中風濤火輪迷妄不息心本清淨而無境也非遣境以㑹心非去垢以取淨丨丨獨立而與物俱能悟斯者不為習氣生死幻藴之所纍也文粹權德輿文解脫以寂照妙用攝羣品流注生滅觀四維上下不見法不見身不見心乃至心離名字身等空界法同夢幻無得無證然後謂之丨丨文粹獨孤及文真如馬師云丨丨有變易豈不聞善知識者能回三毒為三聚淨戒回六賊為六神通回煩惱作菩提回無明作大智若丨丨無變易是外道也傳燈録宗教宗鏡録融會丨丨之言曰不離筌蹄而求解脫不執文字而迷本空依教則華嚴即示一心廣大之文依宗則達麼直顯衆生心性之㫖則知與禪體一而名二圭峯曰經是佛語禪是佛意諸佛心口必不相違陳了翁記心法古禪師云三界惟心萬法惟識又云世間所冇法一切惟心造一切因果世界微塵因心成體又云法不孤起伏竟方生乂云心從境起境逐心生又云心生則種種法生心滅則種種法滅又云心如攻畫佛能畫諸世界本語録聲塵佛語阿難聲銷無響汝說無聞若實無聞聞性已滅同於枯大鐘聲更擊汝云何知知有知無自是丨丨或無或有豈彼聞性為汝有無聞實云無誰知無者楞嚴經法喜慧海日迷徇六根者號為六師心外求佛名為外道有物可施不名福田生心不受供養墮三惡道汝若能謗於佛者是不著佛求毁於法者是不著法求不入衆數者是不著僧求終不得滅度者智用現前著有如是解者便得丨丨禪悅之食諸方廣語三句法門益州無住禪師嘗務宴寂杜鴻漸問無憶無念莫妄丨丨丨丨是一是三曰無憶名戒無念名定無妄名慧一心不生具戒定慧非一非三也自心澄停識浪水清影見悟無全體寂滅傳燈録一味禪學有僧辭歸宗云往諸方學五味禪歸宗云我這裏有丨丨丨為甚不丨僧云如何是一味禪宗便打廣語常定大定智隍禪師庵居二十年元䇿禪師知其所得未真往問曰汝在此作麼隍日入定策曰汝入定有心邪無心邪若有心一切蠢動皆應得走若無心一切草木亦皆得定隍曰我入定時不見有無之心䇿曰既不見有無之心即是丨丨何有出入若有出入則非丨丨傳燈録大乘小乘禪有淺深階級殊等謂帶異計欣上厭下而修者是外道禪正信因果亦以欣厭而修者是凡夫禪悟我空偏真之理而修者是小乘禪悟我法二空所顯真理而修者是大乘禪若頓悟自心本來清淨元無煩惱無漏智性本自具足此心即佛依此而修者是最上乘禪亦名如來清淨禪宗密禪傳燈録無住無生智隍問六祖以何為禪定𤣥䇿曰我師云妙湛貟寂體用如如五隂本空六塵非有不出不入不定不亂禪性丨丨離住禪寂禪性丨丨離生禪想心如空虛亦無空虛之量出傳燈録不生不滅杜鴻漸問無住禪師云何丨丨云何丨丨如何得解脫師曰見境心不起名丨丨不生即丨丨既無生滅即不被前塵所縛當處解脫也同上大乘見解唐中宗遣內侍薛簡迎六祖能師簡問曰人不以智慧照破煩惱憑何出離祖曰若以智慧照破煩惱便為二乘小兒羊鹿等機上智大根悉不如是簡曰如何是丨丨丨丨曰明與無明其性無二無二之性即是實性處凡愚而不減在聖賢而不增住喧煩而不亂居禪定而不寂不斷不常不來不去性相如如常住不遷名之曰道傳燈録如來如見大通和尚謂智常曰汝之本性猶如虛空返觀自性了無一物可知是名真知無有青黃長短但見本源清淨覺體貟明即名見性成佛亦名極樂世界亦名丨丨丨丨同上究竟淨名講維摩經問曰菩薩各入不二法門維摩默然是究竟否師曰諸菩薩各說入不二法門以言顯於無言文殊以無言顯於無言維摩不以言不以無言默然但會淨名兩字便得淨者本體也名者迹用也從本體起迹用從迹用歸本體體用不二本迹非殊若識淨名兩字假號更說什麼竟究與不竟究傳燈録悟解邪見有一種人得少省悟只認得昭昭靈靈以為極則既無正見人我轉高不復決擇邪正一向事筆硯廣學多知答對則機鋒迅捷語句尖新說禪則義理聮環文詞綺美行捧下喝祖佛不存橫談豎抹誰敢當鋒說教則五性三乘教果行果論理則人天天趣凡聖超然論空則法本不有空亦非存說漸則作四諦緣生之觀成四果緣覺之乘或發心於十信之前或成佛於三祇劫後論頓則悟而成佛不勞修證說圎則衆生本來是佛神通智用皆齊芥納須彌毛吞巨海若論大用則無邊剎境攝在一毫之端十世古今不出剎那之際展無為之化開方便之門謂之海印三昧亦名普現色身此人所說如此若無道眼爭知不實昭昭靈靈徒自勞耳古禪師語録無漏智果天竺婆修盤頭陀一食坐禪不卧六時禮佛清淨無欲二十祖闍夜多欲度之問其徒曰此頭陀能修梵行可得成佛耶曰我師精進何不可夜多曰汝師與道逺矣設若苦行厯於塵劫皆虛妄之本也其徒作色曰尊者藴何德行而譏我師夜多曰我不求道亦不顛倒我不禮佛亦不輕慢我不長坐亦不懈怠我不一食亦不雜食心無所希名之曰道婆修便於言下知歸發丨丨丨丨傳燈録不斷續相僧那禪師謂門人曰祖師心印非専苦行若唯務苦行不明本心則如黑月夜履嶮如欲明本心當審諦推測遇聲遇色未起覺觀時心何所之是無邪是有邪既不墮有無處所則心珠獨明常照世間而無一塵間隔丨見丨丨之丨傳燈録無情說法洞山良價禪師初問溈山曰頃聞忠國師有丨丨丨丨良價未究其㫖溈山曰這裏亦有只是難得其人此去有雲岩道人若能撥草瞻風必為子之所重洞山到雲岩問丨丨丨丨什麼人得聞曰無情說法無情得聞傳燈録住心觀靜志誠禪師自神秀處往曹溪六祖曰汝師若何示衆對曰常丨丨丨丨長坐不卧六祖曰是病非禪於理何益聽吾偈曰生來坐不卧死去卧不坐元是臭骨頭何為立功過同上即心是佛馬祖既住上藍每示衆云丨丨丨丨僧問為甚麼即心是佛祖云止小兒啼僧云啼止後如何祖云非心非佛同上非心非佛有僧問大挴和尚見馬祖得個甚麼便住此山大梅曰馬祖向我道即心是佛僧曰馬祖近日佛法大别大梅曰作麼生别僧云近日又道丨丨丨丨大梅曰這老漢惑亂人未有了日任汝丨丨丨丨我只管即心是佛其僧回舉似馬祖馬祖謂大衆曰梅子熟也傳燈録即心即佛伏牛山自在禪師至長安謁忠國師國師問自何來曰自江西來國師曰馬大師以何示衆對曰丨丨丨丨國師曰是什麼語話此外有甚麼言語對曰非心非佛或云不是心不是佛不是物國師曰此猶較些子傳燈録心不是佛馬祖初示衆曰即心即佛祖既寂滅束寺如㑹禪師患門人以即心即佛之語誦憶不已且謂佛於何住而云即心心如畫師而云即佛遂示衆曰丨丨丨丨智不是道劒去逺矣爾方刻舟時號東寺為禪窟傳燈録自心佛法北宗神秀禪師有偈曰一切佛法自心本有若去外求捨父逃走傳燈録自心三寶慧海禪師觀察丨丨一體丨丨僧問云是何一體三寶師曰心是佛佛是法佛法無二和合為僧即是一體三寶諸方廣語身與空等嵩山元圭禪師習毗尼無解一日嶽神謁師曰我能生死人師曰吾本不生汝焉能死吾視丨丨丨丨視吾與汝等汝能壞空與汝乎神遂稽首受戒傳燈録身如雲影北齊惠思禪師攝心坐夏尋有瘴起四肢緩弱不能行步自念曰病從業生業由心起心源無起外境何來病業與丨都丨丨丨如是觀已顛倒想滅病安如故即便起行傳燈録真實道場惠忠禪師有安心偈曰人法雙淨善惡相忘直心丨丨菩提丨丨菩提日月卧輪禪師偈云卧輪有伎倆能斷百思想對境心不起丨丨丨丨長六祖曰此偈未明心地因作偈曰慧能沒伎倆不斷百思想對境心數起菩提作麼長唱誰家曲首山省念禪師有僧問師丨丨丨丨宗風嗣阿誰師曰少室岩前親掌視僧曰更請洪音和一聲師曰如今要得大家知往選佛場丹霞天然禪師初習儒將應舉道遇一禪客問仁者何往日選官去禪客曰選官何如選佛曰選佛當往何所曰江西馬太師出世此選佛場也師往見馬祖乃令參南嶽石頭傳燈録翠竹黃花迷人不知此身無象應物現形遂喚青青翠竹總是法身鬱鬱黃花無非般若黃花若是般若般若即同無情翠竹若是法身法身即同草木如此之言寧堪齒録傳燈録寒灰死火古禪師曰無心即是道若得無心輪回未斷但學休心如癡如愚似胞胎中出來第一莫記一個字在心一向如丨丨丨丨枯木石頭又似一個無孔鐵椎始得莫學佛法但自休心利根者畫時解脫鈍根者三五年幾十年得一悟古師語録禪版蒲團龍牙禪師問翠微如何是祖師意翠微曰與我過丨丨來師遂過禪版翠微接得便打又問臨濟如何是祖師意臨濟曰與我過丨丨來師過蒲團臨濟接得蒲團便打傳燈録合盤埦子石室善道和尚見杏山僧衆相隨善道潜往碓米杏山曰貧道難消曰無心埦子盛將來無縫合盤合將去說什麼難消同上喫百頓棒洛浦在夾山做典座三年丨丨丨丨洛浦後來大悟云斬新日月特地乾坤傳燈録雕兩行字百丈恆和尚有時上堂衆才集云喫茶去便下座有時上堂衆才集云珍重便下坐有時上堂衆才集云歇便下座衆人罔測百丈作一頌頌此下轉語云百丈有三訣喫茶珍重歇直下便承當敢保君未徹古禪師云據他三度上堂恰似個好人後作此頌恰如面上丨丨丨丨老僧與汝注出百丈有三訣賊身已露喫茶珍重歇贓物出來直下便承當敢保君未徹抱贓斷事也住薦福寺古禪師語録好箇佛殿古靈行腳回受業師遣執役一日澡浴命靈去垢靈乃撫背曰丨丨丨丨而佛不靈其師回視之靈曰佛雖不靈且能放光師曰汝行腳遇何人發言異常靈曰蒙百丈和尚指個歇處今欲報慈德爾乃舉唱門風曰靈光獨耀迥脫塵根體露真常不拘文字心惟無染本自圎成但離妄緣即如如佛其師於言下頓悟傳燈録有箇斧子石頭和尚希遷初參青原行思大師師令持書與南嶽讓和尚曰汝達書速回吾丨丨丨丨與汝住山希遷至彼未呈書便回見青原云信亦不通書亦不達發時蒙和尚許斧子今便請師垂一足遷禮拜往住石頭同上來見大聖文殊問無著離甚處無著云南方殊云南方佛法如何多少無著云或三百或五百無著問此間住持如何文殊云凡聖同居龍蛇混雜無著云多少文殊曰前三三後三三傳燈録無著童子云適來大聖道前三三後三三是多少師代曰九九八十一佛印語録去禮文殊杜順問一僧汝云什麼處僧云去五臺山又問去五臺山作什麼僧云丨丨丨丨順曰文殊不在五臺山僧罔測再問在什麼處順以頌答曰游子漫波波尋山禮上坡文殊只這是何用覔彌陀傳燈録日影透忩有老宿見丨丨丨丨因問百丈惟政師曰為復忩就日耶日就忩耶