取舍利禁中度問寶寺地造浮屠十一級以藏舍利上謂近臣曰我曩世嘗親佛坐但未通宿命不能了了見之矣談苑佛初出家佛初為太子年十四出遊柬城門天帝化為病兒乃回車又出南門天帝化為老人復愍生壯不久又出西門天帝化為死人復念人有三苦又出北門天帝化為沙門太子曰善哉唯是為快乃念道清淨不欲在家居佛入中國漢驃騎將軍霍去病出隴西過焉耆山得休屠王祭天金人顔師古曰今佛像是其遺法也初帝聞西城有神其名曰佛因遣蔡愔等之天竺求其道得其書及沙門以來其書以虛無為宗貴慈悲不殺以為人死不滅復受形生時所行善惡皆有報應故所貴修鍊精神以至為佛善為𢎞濶勝大之言以勸誘愚俗精於其道號曰沙門於是中國始傳其術圖其形像而王公貴鑑人獨楚王英最先好之通漢迎佛像後漢孝明帝永平二年偶夢金人巍巍丈六飛至殿庭光明炳耀問群臣通事舍人傳毅對曰臣聞西域有得道者其名曰佛陛下所見得無是乎帝遣博士王遵等十八人同往西域求迎佛法至月支國遇迦葉摩騰竺法蘭一梵僧帶白㲲書釋迦像四十二章經白馬䭾之邀至洛陽此中土有三寶之始也大藏一覽魏作佛像魏作永寧寺有金像高丈八尺者一如中人者十玉像二為九層浮屠掘地築基下及黃泉浮屠高九十丈上剎復高十丈每夜靜鈴鐸聲十里梁紀募造佛像唐武后欲造大像使天下僧尼日出一錢以助其功通監諌迎佛骨唐韓愈遷刑部侍郎憲宗遣使者往鳳翔迎佛骨上迎入禁中三日乃送佛祠王公大人奔走諷唄至為夷法灼體膚委珍貝騰踏於路愈聞惡之乃上表諫唐史梁武溺佛丨丨帝晚丨信丨道凡三捨身日止一食膳無鮮腴唯豆羮糲飯而已身衣布衣侯景之亂以所求不供憂憤寢疾崩干淨居殿本紀後主信佛李丨丨酷丨浮屠朝退與后頂僧伽帽衣袈裟誦丨書拜跪頓顙至為瘤贅親為桑門削作厠簡子試之腮頰少有澀滯者再為治之其手不扠學佛握印而行僧犯姦有司具牘還俗後主令禮佛三百拜免刑王師尅池州令僧俗兵十念救苦觀世音菩薩江南野録晚事浮屠白居易暮節惑浮屠尤甚至經月不食葷及致仕與香山僧如滿結香火社每肩輿往來白衣鳩杖自稱香山居士本傳演繹佛教宣宗嘗曰裴林真儒者然嗜浮屠法居常不御酒肉講求其說演繹數萬言當世嘲薄之而所好不衰唐本傳斧碎佛牙五代時有僧遊西域得佛牙以獻明宗以示大臣趙鳳言世傳佛水火不能傷請驗其真僞因以斧斫之應手而碎方是時宫中施物已及數千因鳳碎之乃止趙鳳傳詔毁佛像後魏太后七年丨諸州縣沙門丨丨丨至文帝興安元年始復佛法後周武帝建德三年毁經像沙門道士並令還俗至靜帝大像二年始復佛道二教唐武宗會昌三年大毁佛寺令僧尼為民至宣宗太中元年始復佛寺學林五代周世宗即位之明年中國乏錢乃悉丨丨二寺銅丨丨以鑄錢嘗曰吾聞佛說身世為妄以利人為急使其真身尚在猶欲割截況此銅像豈其所惜哉由是羣臣皆不敢言五代史論佛骨表佛者夷狄之一法耳上古天下太平百姓安樂夀考此時中國未有佛也漢明帝時始有佛法明帝在位才十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏以下事佛漸謹年代尤促惟梁武帝在位四十九年前後三度捨身施佛宗廟之祭不用牲牢盡日一食止於菜果其後竟為侯景所逼餓死臺城國亦尋滅事佛求福反更得禍由此觀之佛不足信事亦可知矣夫佛本夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣之義父子之情假如其身至今尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賔一設賜衣一襲衛而出境不令惑衆也況其身死已久枯朽之骨凶穢之餘豈宜令入宫禁孔子曰敬鬼神而逺之古之諸侯行弔於其國尚令巫祝先以桃栵袚除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃栵不用羣臣不言其非御史不舉其失臣實恥之乞以此骨付有司投諸水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉豈不快哉佛如有靈能作禍福凡有殃咎宜加臣身上天監臨臣不怨悔昌黎文記大悲閣大悲者觀世音之變也觀世音由聞而覺始於聞而能無所聞始於無所聞而能無所不聞能無所聞雖無身可也能無所不能雖千萬億身可也而況於手與目乎雖然非無身無以舉千萬億身之衆非千萬億身無以示無身之至故散而為千萬億身聚而為八萬四千母陀羅臂八萬四千清淨寶目其道一爾昔吾嘗勸於此吾頭髮不可勝數而身毛孔亦不可勝數牽一髮而頭為之動拔一毛而身為之變然則髮皆吾頭而毛皆吾身也彼皆吾頭而不能為吾頭之用彼皆吾身而不能具身之智則物有以亂之矣吾將使世人左手運斤而右手執削目數飛鴻而耳節鳴鼓首肯旁人而足識梯級雖有智者有所不暇矣而況千手異執而千目各視乎及吾宴坐寂然心念凝默湛然如大明鏡人鬼鳥獸雜陳乎吾前色聲香味交搆乎吾體心雖不起而物無不接必有道邪千手之出千目之運雖未可得見而理則具矣彼佛菩薩亦然雖一身不成二佛而一佛能遍河沙諸國非有他也觸而不亂至而能應理有必至而何獨疑於大悲乎頌之曰吾觀世間人兩目兩手臂物至不能應狂惑失其措其有欲應者顛倒作思慮思慮作真實無異無手目菩薩千手目與一手目同物至心亦至曽不作思慮隨其所當應無不得其當引弓挾白羽劍盾諸械器經卷及香花盂水青楊枝珊瑚大寶炬白拂朱藤杖所遇無不執所執無有疑緣何得無疑以我無心故若猶有心者千手當千心一人而千心內自相攫攘何暇能應物千手無一心手之得其處稽首大悲尊願度一切衆皆證無心法皆具千手目東坡文詩集畫像西方真人誰所見衣被七寶從雙狻當時修道頗辛苦柏生兩肘烏巢肩初如濛濛隱山玉漸如濯濯出水蓮道成一旦就空滅奔會四海悲人天翔禽哀響動林谷獸鬼躑躅淚迸泉龎眉深目彼誰子繞林彈指性自圎隱如寒月墮清晝空有孤光留故躔春遊古寺拂塵壁遺象久此霾香煙畫師不復罵名姓皆云道子口所傳縱橫固已蔑孫鄧有如巨鰐吞小鮮來詩所誇孰與此安得携掛其傍觀東坡感興西方論緣業卑卑喻羣愚流傳世代久梯接凌空虛顧盼指心性名言超有無捷徑一以開靡然世爭趍號空不踐實躓彼榛棘途誰哉繼三聖為我焚其書晦菴釋迦舍利銘如來法身無有邊化為丈六示人天偉哉有形斯有年紫金光聚飛為煙惟有堅固百億千輪王阿育願力堅役使空界鬼與仙分置衆剎奠山川棺槨十襲閟精圜神光晝夜發層巔誰其取此智且權佛身普現衆目前昏者坐受逺近遷冥行黑月墮坎泉分身來化會有緣流轉至此誰使然并包齊魯窮海壖獷悍柔淑冥愚賢願持此福逮我先生生世世離垢纒東坡天堂地獄偈釋迦生中國設教如周孔周孔生西方設教如釋迦丨丨無則已有則君子登丨丨無則已有則小人入李丹祖師事類初祖達麼達麼南天竺國人得般若多羅傳正法眼藏曰當往震旦設大法樂師遂泛重溟凡三周寒暑達于南海實梁普通八年也梁武帝詔至今陵問曰朕造寺寫經不可勝紀有何功德師曰並無功德此但小果有漏之因如影隨形雖有非實師知不契潜回江北止于嵩山少林寺面壁九年人莫之測時魏氏律師流支三藏每與師議論是非蜂起競有害心數加毒藥至第六度以緣化既畢傳法得人遂不復究端坐而逝傳燈録傳汝心印達麼至少林寺面壁九年不立文字以袈裟授慧可曰昔如來以正法眼藏付迦葉展轉至我我今付汝內傳心印以契澄心外傳袈裟以定宗㫖汝受此衣用以表明其法無礙至吾滅後二百年衣止不傳聽吾偈口吾本來兹土傳法救迷情一花開五葉結果自然成慧可即二祖同上得吾骨髓達麼將滅命門人各言所得道副曰如我所見不執文字不離文字而為道用師曰汝得吾皮尼總持曰我今一見更不再見師曰汝得吾肉道育曰四大本空五隂非有而我所見無一法可得師曰汝得吾骨最後慧可禮拜依位而立師曰汝得吾髓同上二祖慧可慧可初名神光既事達麼即與改名嘗夜大雪侍立不動念曰昔人求道敲骨取髓刺血濟飢布髮掩泥投崖飼虎古尚如此我又何人遲明積雪過膝曰願和尚開甘露門廣度羣品遂濳取利刀斷左臂于前師知是法器告之曰昔如來以正法眼藏付迦葉以至我我今付汝慧可初宴坐香山八載有神人曰將欲受果何滯此耶翊日頭痛如刺其師欲治之空中曰此乃換骨非常痛也其師視頂其骨如五峯秀出同上外息諸緣二祖初時將平生所悟舉似達麼麼皆云是知見不是道汝但丨丨丨丨內心無喘心如牆壁可以入道注云八萬法門百千三昧十方世界萬象森羅皆是外緣內心無喘謂念不起也二祖從此皆息萬緣心如枯木忽然大省同上往酬宿纍二祖既傳衣法博求法嗣至北齊得僧璨密付衣法云吾亦有宿纍今將酬之即往鄴都及管城縣隨宜說法有辨和法師興謗於邑宰翟仲侃仲侃加師以非法師怡然委順同上三祖璨師璨北齊人年踰四十設禮而問二祖曰弟子身纒風恙請和尚懴罪師曰將罪來與汝懴璨曰不見罪了不可得師曰我與汝無罪竟謂曰是心是佛是心是法佛法無二僧寶亦然璨曰今日始知罪性不在內不在外不在中間如其心然二祖即為剃頭髮告曰達麼以正法藏眼密付於吾吾今付汝璨既受度隱于舒州皖公山後得道信乃付衣法合掌而終同上四祖道信道信蘄州廣濟縣人年十四禮三祖曰願和尚慈悲乞與解脫法門師曰誰縛汝曰無人縛師曰何更求解脫乎信於言下大悟後於吉州受戒師乃付衣法信既嗣祖風脅不至席者六十年却返蘄州住破頭山唐太宗赴赴京師前後三返以疾辭第四度命使曰如不赴即受首來使至山諭師乃引頭就刃使異之以狀聞師先已付法傳衣與𢎞忍至高宗時坐逝初四祖一日告衆曰吾遊廬山登絶頂望破頭山見紫氣如蓋下有白氣橫分六道汝等會否忍曰莫是和尚化後橫出一枝傳法否祖曰善果得法嗣化於破頭山同上五祖𢎞忍𢎞忍蘄州黃梅人四祖一日往黃梅路逢一小兒骨相奇秀祖曰子何姓答曰姓即有不是常姓祖曰何姓答曰佛姓師曰汝無姓耶答曰姓空祖默識其法器至其家乞令出家以至付法傳衣後得盧能嗣法復經四載坐逝建塔於黃梅之東山同上六祖惠能丨丨丨丨姓盧廣南人初尋師至韶州尼無盡藏讀涅槃經偈即為解說尼因問字師曰字即不識義即請問尼曰字尚不識安能會義師曰諸佛妙理非關文字同上菩提心鏡能聞五祖在黃梅乃入黃梅任役五祖欲求法嗣令寺僧各述偈上坐神秀偈曰身是丨丨樹丨如明丨臺時時勤拂拭莫遣有塵埃能時為行者在碓坊杵臼之間聞之乃曰美則美矣了則未了夜請同侣書一偈于秀偈傍曰丨丨本非樹丨丨亦非臺本來無一物何假拂塵埃五祖聞之來觀心契法嗣遂定同上衣鉢法寶能既題頌五祖乃夜召盧行者告曰佛以無上微妙祕密圎明真實正法眼藏付迦葉尊者輾轉至達麼以至於吾今以法寶及所傳袈裟付於汝有偈曰有情來下種因地果還生無情既無種無性亦無生遂與丨丨丨丨地州使君問五祖曰會中有五百僧不付衣鉢為甚却付與行者五祖曰會中雖有五百人四百九十九人會佛法唯有盧行者一人不會佛法他則悟道謂之過量人方傳得衣鉢古禪師語録舉衣不動能曉得衣鉢即夜走南奔嶺外有明上座即率十人躡迹追至大庾嶺能見明上座奔至乃擲衣鉢於石上曰此衣信可爭耶任君將去明舉之不動踟蹰悚栗乃曰我乃來求法非為衣也願行者開示於我六祖曰不思善不思惡正恁麼時那個是明上座本來面目明大悟遍體流汗泣禮而去傳燈録濳刃無傷六祖得法住曹溪神秀亦襲五祖居荆州有南北宗之號徒侣競起愛憎忌能師傳衣為天下所聞有張行昌受囑濳懷刃入六祖室將欲加害六祖預知其事置金十兩於方丈行昌揮刀者三都無所損祖曰正劍不邪邪劍不正只負汝金不負汝命行昌驚仆久乃蘇求哀祖遂與金令去同上七祖行思行思禪師姓劉本安城人往參曹溪六祖欲傳與法謂曰從上衣法雙行衣以表信法乃印心吾受衣以來遭此多難況乎後代爭趍必多衣即留鎮山門汝當以法分化一方無令斷絶思既得法乃住青原同上伏䭾密多九祖丨丨丨丨有長者攜一子來曰此子處胎六十嵗因號難生傳燈録馬鳴大士十二祖丨丨丨丨忽見女子說偈曰稽首長老尊當受如來記今於此地上宣通第一義師曰將有魔來即一金龍震動山嶽師儼然於坐魔事隨滅遂復本形曰我名迦毗魔羅化巨海極為小事師曰汝化性海得否曰吾未嘗知師云山河大地俱來剃度師乃付法同上迦毗摩羅十三祖丨丨丨丨入山逢大蟒盤繞師身師授三歸依蟒化為素服老人曰我昔為比丘有初學數來請益我煩於應答起嗔恨想命終墮為蟒身住是石窟千載適聞戒法故來謝耳又曰北有大樹䕃覆五百大龍樹王名龍樹為龍衆施法尊者即與度脫同上婆修盤頭二十一祖丨丨丨丨其母初夢吞明暗二珠而孕有一羅漢曰汝當生二子一即祖師二即芻尼昔如來在雪山修道芻尼巢於頂上佛既成道芻尼受報為那提國王佛記云汝後與聖同脫今無爽矣芻尼野鵲子師子比丘二十四祖丨丨丨丨有長者引一子見師曰此子當生便拳左手今既長矣終未能舒願聞宿因師即以手接曰還我珠來童子遽開手奉珠師曰吾前為僧有童子婆舍吾付西海齊受襯珠付之今見還矣遂為去嗣傳燈録古今合璧事類備要前集卷四十八
