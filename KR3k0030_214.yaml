body:
  text: 古今合璧事類備要别集卷八宋謝維新撰關津門關隘輿地提綱古者門關所以譏禁非常也故控扼嶮要束制咽喉者關也緘縢甸服扄鐍王畿者關也周置司關漢置都尉至于唐亦置吏守關周漢之制掌出入者以節傳唐制有上中下之差度者本司給過其文書出塞踰月者給行牒獵手給長籍蕃客閲其裝重然入一關者餘關不譏此設關之法也然在境上者為關在關內者為門在門內者為市周制自外來者按其節而書其貨之多少通之國門國門通之司市自內出者司市為之璽節通之國門國門通之司關參相聮以檢姦猾也後世非不防姦盜也而姦盜愈生非不察偽遊也而偽遊者滋至此犯門斬關之徒雞鳴狗盜之輩詐刻符傳之流如出入於蕩然無限之地而關之為關非復周制之舊矣不寧惟是禁民為暴者古之關也取民為暴豈古之關乎古者關譏而不征自什一之外他無問焉後世逼介之關暴征其稅耐門之賞使食其征門關之法至是壞矣孟子曰古之為關也將以禦暴今之為關也將以為暴哀今之人思古之人安得不為之長太息事類謹關丨丨梁月令孟冬閉關先王以至日丨丨商旅不行易易關丨丨市來商旅月令孟冬復關乘彼垝垣以望丨丨不見復關泣涕漣漣既見復關載笑載言注復關君子所近詩氓待暴客重門擊柝以丨丨丨蓋取諸豫易繫辭禁異服關丨丨丨識異言記王制司貨賄司關掌國貨之節以聮門市丨丨丨之出入者掌其治禁與其征㕓凡貨不出於關者舉其貨罰其人凡所達貨賄者則以節傳出之禮地官用符節門關丨丨丨云云皆有期以反節禮地官符節孟夏無索丨丨關市丨丨順陽敷教不難物也月令凶年不租年不順成關梁不租禮執禁以譏關丨丨丨丨注譏呵察也記王制無征猶幾國凶禮則丨關門之征禮司關謁關以對丨丨丨從者數丨禮叩關則告凡四方之賓客丨丨丨為之丨禮司關譏而不征關丨丨丨丨孟荒則無征國凶丨丨丨關市之丨禮司關文仲廢關臧丨丨丨六丨孔子曰不仁也注塞關陽關之屬凡六關所以禁絶末遊而廢之塞悉再反左文三臧紇斬關季孫攻臧氏丨丨丨鹿門之丨以出奔邾左襄二十三自徐關入師從齊師于莘丁酉陳于鞍齊師敗績齊侯免云云遂丨丨丨丨齊侯見保者曰勉之齊師敗矣左成三自陽關逆齊侯伐我北鄙關桃髙原圍臧紇于防師丨丨丨丨減孫至于旅松注陽關在泰山巨平縣東左襄十七公孫白馬丨丨龍常爭論曰丨丨非白人不能屈後乘白馬無符傳欲出關關吏不聽此虛言難於奪實也桓談新論老子青牛關令尹喜周大夫也善內學丨丨西遊先見其氣當遇聖人老子果乘丨丨薄板車過授喜三千言俱之流沙列仙傳雞鳴得出秦昭王囚孟嘗君乃改姓易名夜半至函谷關關法雞鳴出客恐追至客居下座者能為丨丨衆雞皆鳴遂丨丨關史記雞鳴逃去燕太子丹質於秦秦王不禮丹怒亡歸夜至關關門未開丹為丨丨衆雞皆鳴遂得丨丨史記為法自敝商君亡至關不得舍曰商君令舍人無驗者坐之商君曰丨丨丨丨史記詐傳亡歸寧成為中尉抵罪髠鉗乃解脫囚丨刻丨出關丨丨漢本傳叩而攻秦九國常以十倍之地丨關丨丨丨開而延敵秦人丨關丨丨丨九國之師逡巡而不敢進並賈誼過秦論閉備他盜楚漢旦日合戰力不敵會羽季父項伯素善張良良與俱見沛公公曰吾入關秋毫無所取籍吏民封府庫待將軍所以丨關者丨丨丨也豈敢反耶願伯明言髙祖紀先入者王懷王與諸將約丨丨定關中丨丨之是時秦兵強諸將莫利西入關獨羽怨秦破項梁奮勢願與沛公西入關諸老將皆曰云云卒不與羽而遣沛公同上燒函谷關沛公西入武關居於霸上遣將軍閉函谷關無內項王項王大將亞夫至關不得入怒曰沛公欲反耶即令家發薪一束欲丨關門關門乃開徙函谷關漢武時楊僕征南越有功恥為關外人帝為丨丨丨丨於新安三百里本傳置關用傳景帝四年復丨諸丨丨丨出入注師古曰古者或棨刻木為合符或用繒帛張晏曰傳信也兩行書繒帛分持其一出入關合之乃得過謂之傳釋名曰過所至關津以示之寫一通付關吏本紀除關無傳漢文帝丨丨丨用丨本紀詔罷馬弩漢丨丨丨丨關舊征馬髙五尺六寸齒未平弩十石已上皆不得出關令不禁故曰罷白六帖詔內粟車宣丨人以車載粟入關得無用傳同上傳察偽遊丨今之過所也漢興置關都尉以丨丨丨丨用傳出入白六帖籍內流民漢詔流民欲入關者丨之注為籍內之也棄繻而去終軍初從濟南當詣博士步入關關吏與軍繻軍問以此何為吏曰為復還當以合符軍曰大丈夫西遊終不復傳還丨丨丨丨軍為謁者行郡國建節東出關關吏識之曰此使者乃前棄繻生漢本傳買符以入郭丹初之長安過宛從宛人陳兆丨入關丨丨丨函谷關既入封符語人曰不乘使車不出關丹自入關後十二年不歸後如關竟如本志東觀漢記請為東封隗囂將王元謂囂曰丨一丸泥丨大王丨丨函谷關此萬世一時也同上但願生入班超在絶域年老思歸乃上書曰不敢望到酒泉郡丨丨丨丨玉門關後漢本傳西入秦關馬周丨丨丨丨入新豐逆旅主人不之顧本傳急守潼關封常謂安祿山度河後必奔陜語髙仙芝曰賊鋭甚難與爭鋒潼關無兵一夫奔突則京師危矣不如丨丨丨丨仙芝從之謁歸壺關苗晉卿潞州壺關人充河北採訪使嘗入計丨丨丨丨望縣門趣步吏諫止晉卿以公門當下况父母之邦乎乃為閉梁韓滉為浙東西觀察使聞京師未平丨丨丨關丨不足駐師孔緯既及行在緯策攻必反建言關邑厄狹丨丨丨丨請奉梁州即日去陳倉而攻兵至燕有三關北戎入丨燕丨丨之限曰松亭曰古北曰居庸而平州之東有榆關實金人入冦之路凡此數關可以限蕃漢也而一夫守之可以當百宣和姦臣知取燕而不知取燕之險燕之重以有關限之蔽也得燕而無險之可守與不得燕何異况平州與燕山異路當時金人但來歸燕東六州耳即未嘗盡解關內之地而金人自平州而入冦此乃議割燕山不明地理之故也秦有三關大散關仙人關箭筈關此敵人入寇之路也自失此三關而蜀之門户撤矣崔融徙關疏唐武后時有司議關市行人盡征之融上疏其略曰周官九賦其七曰關市以市多淫巧而關通末遊欲止抑之故加稅耳然雖斂工商而不及往來且天下之關必險道市必要津豪宗惡少在焉聞一旦變法或致騷動恐南走蠻北走狄有如師興費廣雖倍算商旅加斂齊人可也后納之唐史本傳朱朴遷都議古王者不常厥居皆觀天地興衰隨時制事關中我實因之凡三百嵗廣明巨盜陷覆宫闕比幸石門華隂十二之中又亡八九髙祖太宗之制蕩然矣夫襄鄧之西夷漫數百里其東漢與鳳林為之關南菊潭環屈而流屬於漢西有上洛重山之險北有白崖乃形勝之地沃衍之墟若廣浚漕渠運天下之財可使大集自古中興之君去已衰之哀就未王而王今南陽漢光武雖起而未王也臣視山河壯麗處多故都已盛而衰亂可興也本傳詩集預雞鳴髙談先馬渡偽曉丨丨丨唐太宗入潼關詩掃蜂蟻近靜潼關丨丨丨杜青絲詩又士卒何草草築城潼關道杜潼關史萬丈餘大城鐵不如小城丨丨丨百二重休道秦關丨丨丨杜列戰格連雲丨丨丨飛鳥不能踰艱難奮長戟千古用一夫借問潼關吏修關還避胡杜為要樞萬古丨丨丨往來何時息韋應物不可援天關悠悠丨丨丨韓和皇甫湜未可傍一夫怒臨關百萬丨丨丨杜劒門河曲繞城霜峰直臨道冰丨丨丨丨唐太宗入潼關時清失險丨丨關丨丨杜峽口鐵鎖欲開石城除擊柝丨丨丨丨關杜玉門吹度長風幾萬里丨丨丨丨關李白劒門天下壯惟天有設嶮丨丨丨丨丨杜劒門延州城北户丨丨丨丨丨關防猶可倚杜西出無故人勸君更盡一杯酒丨丨陽關丨丨丨王維陽關三疊留滯更解鞍晨雞三叫未開關丨丨行人丨丨丨却上月明髙處立曉風吹面作清寒劉季孫守關古今合璧事類備要别集卷八
