body:
  text: 古今合璧事類備要别集卷八宋謝維新撰闗津門闗隘輿地提綱古者門闗所以譏禁非常也故控扼嶮要束制咽喉者闗也緘縢甸服扄鐍王畿者闗也周置司闗漢置都尉至于唐亦置吏守闗周漢之制掌出入者以節傳唐制有上中下之差度者本司給過其文書出塞踰月者給行牒獵手給長籍蕃客閲其装重然入一闗者餘闗不譏此設闗之法也然在境上者為闗在闗内者為門在門内者為市周制自外來者按其節而書其貨之多少通之國門國門通之司市自内出者司市為之璽節通之國門國門通之司闗叅相聮以檢姦猾也後世非不防姦盜也而姦盜愈生非不察偽游也而偽游者滋至此犯門斬闗之徒雞鳴狗盜之輩詐刻符傳之流如出入於蕩然無限之地而闗之為闗非復周制之舊矣不寧惟是禁民為暴者古之闗也取民為暴豈古之闗乎古者闗譏而不征自什一之外他無問焉後世偪介之闗暴征其税耏門之賞使食其征門闗之法至是壊矣孟子曰古之為闗也将以禦暴今之為闗也将以為暴哀今之人思古之人安得不為之長太息事類謹闗丨丨梁月令孟冬閉闗先王以至日丨丨商旅不行易易闗丨丨市來商旅月令孟冬復闗乗彼垝垣以望丨丨不見復闗泣涕漣漣既見復闗載笑載言注復闗君子所近詩氓待暴客重門擊柝以丨丨丨蓋取諸豫易繫辭禁異服闗丨丨丨識異言記王制司貨賄司闗掌國貨之節以聮門市丨丨丨之出入者掌其治禁與其征㕓凡貨不出於闗者舉其貨罰其人凡所達貨賄者則以節傳出之禮地官用符節門闗丨丨丨云云皆有期以反節禮地官符節孟夏無索丨丨闗市丨丨順陽敷教不難物也月令凶年不租年不順成闗梁不租禮執禁以譏闗丨丨丨丨注譏呵察也記王制無征猶幾國凶禮則丨闗門之征禮司闗謁闗以對丨丨丨從者數丨禮敂闗則告凡四方之賓客丨丨丨為之丨禮司闗譏而不征闗丨丨丨丨孟荒則無征國凶丨丨丨闗市之丨禮司闗文仲廢闗臧丨丨丨六丨孔子曰不仁也注塞闗陽闗之屬凡六闗所以禁絶末游而廢之塞悉再反左文三臧紇斬闗季孫攻臧氏丨丨丨鹿門之丨以出奔邾左襄二十三自徐闗入師從齊師于莘丁酉陳于鞌齊師敗績齊侯免云云遂丨丨丨丨齊侯見保者曰勉之齊師敗矣左成三自陽闗逆齊侯伐我北鄙闗桃髙原圍臧紇于防師丨丨丨丨减孫至于旅松注陽闗在泰山鉅平縣東左襄十七公孫白馬丨丨龍常争論曰丨丨非白人不能屈後乗白馬無符傳欲出闗闗吏不聴此虚言難於奪實也桓譚新論老子青牛闗令尹喜周大夫也善内學丨丨西游先見其氣當遇聖人老子果乗丨丨薄板車過授喜三千言俱之流沙列仙傳雞鳴得出秦昭王囚孟嘗君乃改姓易名夜半至函谷闗闗法雞鳴出客恐追至客居下座者能為丨丨衆雞皆鳴遂丨丨闗史記雞鳴逃去燕太子丹質於秦秦王不禮丹怒亡歸夜至闗闗門未開丹為丨丨衆雞皆鳴遂得丨丨史記為法自敝商君亡至闗不得舍曰商君令舍人無驗者坐之商君曰丨丨丨丨史記詐傳亡歸甯成為中尉抵罪髠鉗乃解脱囚丨刻丨出闗丨丨漢本傳叩而攻秦九國常以十倍之地丨闗丨丨丨開而延敵秦人丨闗丨丨丨九國之師逡巡而不敢進並賈誼過秦論閉備他盜楚漢旦日合戰力不敵㑹羽季父項伯素善張良良與俱見沛公公曰吾入闗秋毫無所取籍吏民封府庫待将軍所以丨闗者丨丨丨也豈敢反耶願伯明言髙祖紀先入者王懐王與諸将約丨丨定闗中丨丨之是時秦兵彊諸将莫利西入闗獨羽怨秦破項梁奮勢願與沛公西入闗諸老将皆曰云云卒不與羽而遣沛公同上燒函谷闗沛公西入武闗居於霸上遣将軍閉函谷闗無内項王項王大将亞夫至闗不得入怒曰沛公欲反耶即令家發薪一束欲丨闗門闗門乃開徙函谷闗漢武時楊僕征南越有功恥為闗外人帝為丨丨丨丨於新安三百里本傳置闗用傳景帝四年復丨諸丨丨丨出入注師古曰古者或棨刻木為合符或用繒帛張晏曰傳信也兩行書繒帛分持其一出入闗合之乃得過謂之傳釋名曰過所至闗津以示之寫一通付闗吏本紀除闗無傳漢文帝丨丨丨用丨本紀詔罷馬弩漢丨丨丨丨闗舊征馬髙五尺六寸齒未平弩十石已上皆不得出闗令不禁故曰罷白六帖詔内粟車宣丨人以車載粟入闗得無用傳同上傳察偽游丨今之過所也漢興置闗都尉以丨丨丨丨用傳出入白六帖籍内流民漢詔流民欲入闗者丨之注為籍内之也棄繻而去終軍初從濟南當詣博士步入闗闗吏與軍繻軍問以此何為吏曰為復還當以合符軍曰大丈夫西遊終不復傳還丨丨丨丨軍為謁者行郡國建節東出闗闗吏識之曰此使者乃前棄繻生漢本傳買符以入郭丹初之長安過宛從宛人陳兆丨入闗丨丨丨函谷闗既入封符語人曰不乗使車不出闗丹自入闗後十二年不歸後如闗竟如本志東觀漢記請為東封隗囂将王元謂囂曰丨一丸泥丨大王丨丨函谷闗此萬世一時也同上但願生入班超在絶域年老思歸乃上書曰不敢望到酒泉郡丨丨丨丨玉門闗後漢本傳西入秦闗馬周丨丨丨丨入新豐逆旅主人不之顧本傳急守潼闗封常謂安祿山度河後必奔陜語髙仙芝曰賊鋭甚難與争鋒潼闗無兵一夫奔突則京師危矣不如丨丨丨丨仙芝從之謁歸壺闗苗晉卿潞州壺闗人充河北採訪使嘗入計丨丨丨丨望縣門趣步吏諫止晉卿以公門當下况父母之邦乎乃為閉梁韓滉為浙東西觀察使聞京師未平丨丨丨闗丨不足駐師孔緯既及行在緯策攻必反建言闗邑阸狹丨丨丨丨請奉梁州即日去陳倉而攻兵至燕有三闗北戎入丨燕丨丨之限曰松亭曰古北曰居庸而平州之東有榆闗實金人入冦之路凡此數闗可以限蕃漢也而一夫守之可以當百宣和奸臣知取燕而不知取燕之險燕之重以有闗限之蔽也得燕而無險之可守與不得燕何異况平州與燕山異路當時金人但來歸燕東六州耳即未嘗盡解闗内之地而金人自平州而入冦此乃議割燕山不明地理之故也秦有三闗大散闗仙人闗箭筈闗此敵人入寇之路也自失此三闗而蜀之門户撤矣崔融徙闗疏唐武后時有司議闗市行人盡征之融上疏其畧曰周官九賦其七曰闗市以市多淫巧而闗通末游欲止抑之故加税耳然雖斂工商而不及往來且天下之闗必險道市必要津豪宗惡少在焉聞一旦變法或致騷動恐南走蠻北走狄有如師興費廣雖倍算商旅加斂齊人可也后納之唐史本傳朱朴遷都議古王者不常厥居皆觀天地興衰随時制事闗中我實因之凡三百嵗廣明巨盜陷覆宫闕比幸石門華隂十二之中又亡八九髙祖太宗之制蕩然矣夫襄鄧之西夷漫數百里其東漢與鳳林為之闗南菊潭環屈而流屬於漢西有上洛重山之險北有白崖乃形勝之地沃衍之墟若廣浚漕渠運天下之財可使大集自古中興之君去已衰之哀就未王而王今南陽漢光武雖起而未王也臣視山河壯麗處多故都已盛而衰亂可興也本傳詩集預雞鳴髙談先馬渡偽曉丨丨丨唐太宗入潼闗詩掃蜂蟻近静潼闗丨丨丨杜青絲詩又士卒何草草築城潼闗道杜潼闗史萬丈餘大城鐵不如小城丨丨丨百二重休道秦闗丨丨丨杜列戰格連雲丨丨丨飛鳥不能踰艱難奮長㦸千古用一夫借問潼闗吏修闗還避胡杜為要樞萬古丨丨丨往來何時息韋應物不可援天闗悠悠丨丨丨韓和皇甫湜未可傍一夫怒臨闗百萬丨丨丨杜劒門河曲遶城霜峰直臨道冰丨丨丨丨唐太宗入潼闗時清失險丨丨闗丨丨杜峽口鐵鎖欲開石城除擊柝丨丨丨丨闗杜玉門吹度長風幾萬里丨丨丨丨闗李白劒門天下壯惟天有設嶮丨丨丨丨丨杜劒門延州城北户丨丨丨丨丨闗防猶可倚杜西出無故人勸君更盡一杯酒丨丨陽闗丨丨丨王維陽闗三疊留滯更解鞍晨雞三叫未開闗丨丨行人丨丨丨却上月明髙處立曉風吹面作清寒劉季孫守闗古今合璧事類備要别集卷八
