body:
  text: 古今合璧事類備要前集卷六十二宋謝維新撰喪禮門國哀事類曰崩天子死丨丨記曲禮大行周書曰諡者行之迹是以丨丨下孟反受大名細行受細名李善文選注皇帝新崩未有定諡故揔其名曰丨丨皇帝風裕通登霞告喪曰天王登假音霞措之廟立之主曰帝同上其死登假三年而形遁莊子楚辭逺逰云載營魄而丨丨兮掩浮雲而上征朱氏注曰霞與遐同猶曰適逺云爾曲禮告喪之辭乃又借以為死之美稱莊子作登假蓋亦此例但此篇注者遂解為赤黃之氣釋莊音又讀假為格而訓至焉則其誤愈逺矣辨證乘雲千嵗厭世而去丨彼白丨遊于帝鄉莊子晏駕宫車丨丨注天子當晨起早作而方崩殞故稱晏駕者凡臣子之心猶謂宫車晚出也漢天文志委裘賈誼疏曰朝丨丨而天下不亂孟康曰丨丨若容衣天子未坐朝事先帝衣裘也漢書髯龍下迎黃帝采首陽山銅鑄鼎於荆山下鼎既成有龍垂胡髯下迎黃帝黃帝上騎羣臣後宫從上龍七十餘人龍乃上去餘小臣不得已乃悉持龍髯拔墮黃帝弓百姓仰望黃帝既上天乃抱其弓與龍髯號故後世名其處曰鼎湖其弓曰烏號漢郊祀志放勳殂落二十有八載丨丨乃丨丨百姓如喪考妣三年四海過密八音降割我家武王崩周公相成王作大誥王若曰猷大誥爾多邦越爾御事弗弔天丨丨千丨丨不少延洪惟我幼沖人嗣無疆大歷服己豫惟小子若涉淵水豫惟往求朕攸濟書未堪多難訪落嗣王謀於廟也訪豫落止率時昭考於乎悠哉朕未有艾豫將就之繼猶判渙維豫小子丨丨家丨丨紹庭上下陟降厥家休我皇考以保明其身家遭不造閔豫小子嗣王謀於廟也閔豫小子遭家不造嬛嬛在疚於乎皇考永世克孝念茲皇祖陟降庭止維豫小子夙夜敬止於乎皇王繼序思不忘病既彌留成王將崩命召公畢公率諸侯相康王作顧命王曰嗚呼疾大漸惟幾丨日臻丨丨丨恐不獲誓言嗣茲豫審訓命汝用敬保元子釗𢎞濟于艱難茲既受命還出綴衣于庭越翼日乙丑王崩三年亮隂髙宗亮隂三年不言語五月居廬滕定公薨世子使然友之問於孟子孟子曰三年之喪齊疏之服飦粥之食自天子逹於庶人三代共之然友定為三年之喪父兄百官皆不欲然友復之鄒問於孟子孟子曰然不可以他求者也孔子曰君薨聽於冡宰啜粥靣深墨即位而哭百官有司莫敢不哀先之也上有好者下必有甚焉者也是在世子然友反命世子曰然是誠在我丨丨丨丨未有命戒百官族人可謂曰知及至葬四方來觀之顔色之戚哭泣之哀弔者大悅報祖龍死秦使者從關東夜過華隂平舒道有人持璧遮使者曰為吾滈池君水神也秦以水德始皇將終故其水神自相告因言曰今年祖龍死祖始也龍人君象謂始皇也使者奉璧具以聞始皇默然曰山鬼不過知一歲事也載鮑魚還秦始皇崩於沙上李斯以上崩在外不發喪載輼車中輼車臭詔從官令丨丨丨一石亂其臭誣以飾粉順帝朝有希梁兾旨共作飛章虛誣李固罪曰大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿後兾畏固名德更奏前事遂誅之相與簪花晉杜皇后預之曾孫先是三吳女子丨丨丨白丨望之如素奈傳言天公織女死為之著服至是而后崩卞太后誄率土噴薄三光改度陵頽谷踊五行牙錯皇室蕭條羽檄四布百姓戲欷嬰兒號慕若喪考妣天下縞素聖者知命殉道寶名義之攸在亦棄厥生敢揚后德表之旐旌光垂罔極以慰我情乃作誄曰我皇之生神靈是輔作合於魏亦光聖武篤生帝文紹堯之緒龍飛紫宸奄有九五詳惟聖善岐嶷秀出德配薑嫄不忝先哲玄覽萬機兼才備藝泛納容衆含垢藏疾仰奉諸姑降接儔列隂處陽觀潛明內察及踐大位母養萬國溫溫其仁不替明德悼彼邊氓未遑宴息恆勞庶事兢兢翼翼親桑蠶館為天下式樊姬霸楚書載其庸武王有亂孔歎其功我后齊聖克暢丹聰不出房闥心照萬邦踰年耳順乾乾匪倦珠玉不玩躬御綈練日具忘飢臨樂勿聽去奢即儉曠世作顯慎終如始蹈和履貞恭事神祗昭奉百靈局天蹐地祗畏神明敬微慎獨執禮幽𡨕虔肅宗廟蠲薦三牲降福無疆祝云其誠宜享斯祜蒙祉自天何圖凶咎不勉斯年嘗禱盡禮有篤無痊豈命有終神食其言遺誥在疚承諱東藩劈踴郊畛灑淚中原追號皇妣棄我何遷昔垂顧復今何不然空吕廖廓棟宇無煙巡省階途髣佛櫺軒仰瞻幃幄俯察几筵物不毁故而人不存痛莫酷斯彼蒼者天遂臻魏都遊魂舊邑大隧開塗靈將斯楫歎息霧興揮淚雨集徘徊輀柩號咷弗及神光既幽佇立以泣曹植敬皇后䇿維永泰元年秋九月朔日丨丨丨梓宫啓自先塋將祔于某陵其日至尊親奉奠某皇帝乃使兼太尉某設祖於行宫禮也翠帟舒阜玄堂啓扉爼徹三獻筵卷六衣哀子嗣皇帝懷蜃衛而延首想鷖輅而撫心痛椒塗之先廓哀長信之莫臨身隔兩赴時無二展省視地旋詔左言先敷聖善其辭曰帝唐逺胄御龍遙緒在秦作劉在漢開楚肇惟淑聖克柔克令清漢表靈曽髙也沙膺慶爰定厥辟微音允穆光華沼沚榮耀中谷敬始紘綖教先穜稑睿問川流神襟蘭郁先德韜光君道方被于佐求賢在謁無詖顧史𢎞式陳詩展義厚下曰仁藏性伊智十亂斯俟四教罔忒思媚諸姑貽我嬪則化自公宫逺被南國軒曜軒轅星女上星也懷光素舒佇德閔豫不祐慈訓早違方年沖藐懷袖靡依家臻寶業身嗣昌輝夀宫寂逺清廟虛歸嗚呼哀哉帝遷明命民神胥恱乾景外臨隂儀內缺空慙故劍徒嗟金冗璋瓉奚獻禕䄖罔設嗚呼哀哉馮相告祲宸駕長往貽厥逺圖末命是奬懷豐沛之綢繆兮背神京之𢎞敞陋蒼梧之不從兮遵鮒隅以同壤嗚呼哀哉陳象設於園寢兮映輿於松楸望承明而不入兮度清洛而南遊繼池綍於通軌兮接龍帷於造舟回塘寂其已暮兮東川淡而不流嗚呼哀哉藉閟宫之逺烈兮聞纘女之遐慶始協德於蘋蘩兮終配祀而表命慕方纒於賜衣兮哀日隆於撫鏡思寒泉之罔極兮託彤管於遺詠嗚呼哀哉謝玄暉昭明太子哀册蜃輅峩峩龍驂局步羽翹前驅雲旗比傃皇帝哀繼明之寢曜痛嗣德之徂芳御武帳而悽慟臨甲觀而增傷式稽令典載揚鴻烈詔撰德於銘旌永傳徽於舞綴其辭曰式載明兩實惟少陽儀天比峻儷景騰光睿哲膺期旦暮斯在識洞機深景包瀛海立德不器至功弗宰寬綽居心溫恭成性修襟孝友率由嚴敬咸有種德惠和齊聖括囊流略包舉藝文遍該緗素殫極丘墳騰褰充積儒墨區分瞻河闡訓望魯揚芬雲物告徴祲沴褰象星霾恆曜山頽朽壤威儀上賓德音長往具僚無蔭咨承安仰嗚呼哀哉首夏司開麥秋紀節容衛徒警青華萎絶書幌空張談筵罷設虗饋饛饛孤燈翳翳嗚呼哀哉簡辰請日筮合龜貞幽􅓨夙啓玄宫獻成武􅀈齊列文物增明昔遊漳水賔從無聲今歸郊郭徒御相驚嗚呼哀哉背綘闕以逺徂轥青門而徐轉顧馳道而詎前望國都而不踐渡修坂之威夷遡平原之悠緬驥蹀足以酸嘶挽悽鏘而流泫嗚呼哀哉混哀音於蕭籟變愁容於天日雖夏木之森隂乃寒林之蕭瑟既將反而復疑如有求而遂失謂天地其無心遽永潛於哀質嗚呼哀哉梁王均憲宗皇帝哀册維元和十五年歲次庚子正月甲戌朔二十七日庚子移殯於大內太極殿之西階粵五月十五日庚申遷座於景陵禮也玉衡南指金波西落皓雪集其麻衣素雲褰其綃幕栁宫龍動竹池魚躍兆庶雨泣於浩穰萬靈風號於寥廓哀子嗣皇帝仰攀雕輦殷奠瓊筵哀無容以觸地痛不返而終天仙仗徐進宸儀永隔降睿旨於鸞臺揚聖功於鳯册其詞曰配天惟唐伊祁同光應道為帝玄元之系聖人有作孝子善繼顯赫十朝總齊四裔執其大象司彼左契武烈誕敷文明下濟出潛離隱或躍未融親則磐石封殊剪桐承祧黃屋主鬯青宫禮樂盡在謳歌薦至軒皇倦勤傳付神器太母侍飬親臨寶位怡聲下色先意承志家令敢言天子屛貴明明出震業業承乾其仁如山其智如泉理析堅白學探幽玄揮毫霧動掞藻霞鮮所持者儉所寶者賢刑靡不省賞無不延冕旒迎日圭璧祈年涕謁宗廟臣朝昊天天縱神聖日躋孝敬鴻名既加寶𩔶一定窮人屢賑名士交聘獸愛觸邪草憐指佞梯航修貢鱗羽遂性河色呈符山聲告慶編書辨謗創殿思政甘節必稱苦言終聽稜威之逺德政之盛霜雪憲章雷風號令夏臺齒劍上黨納穽趙際宅心鄴中聽命誰能去兵王者有征玉壘霧廓金陵鏡清狐鳴上蔡蟻聚東平伏鑕就戮迥戈受烹始以上殺歸於好生恢恢不識蕩蕩難名信及隱微道存溥博走馬斯却昆蟲咸若調其玉燭徇以木鐸混同車書逺頒正朔範金合土大興太學清蹕鳴鑾將登髙嶽四維既張五刃已藏蠻夷戎羌敢不來王天下清靜朝廷樂康會冠劍以髙宴戲魚龍於廣場有嚴有翼無怠無荒俗皆臻於庶域人自為於犧皇日出入兮安窮極雲飛揚兮無處所瑞方瞻乎鳯來災忽聞於鸛語謂百年之可卜嗟九齡之不與當凝旒而下臨奄脫屣以輕舉萬姓哀其考喪千官壞其后撫封人獨祝於南山帝子已號于北渚嗚呼哀哉披靈衣兮如在委仙佩兮若休遺環海以靜寐謝鼎湖而逺遊桂華朗兮髙殿寂梧葉暗兮深宫愁驚同軌之遽至咽長川而不流嗚呼哀哉威儀肅設文物前列酌玉斚以宵奠駕金根而曉發出朱雀之正門皆青鸞之逈闕逶迤原野蒼茫日月去復去兮降堯階悲莫悲兮臨禹穴嗚呼哀哉地開蒼谷天作豐山江海自流於泉下城郭取象于人間髙封馬鬛永祕龍顔龍有逆兮會觸髯欲升兮上攀朝百靈以肅肅遺八駿以間間陵植柏兮未拱閣生苔兮已斑嚴日宫而深閉藹雲幄以空還興衆感於萬井結宸悲于九閽嗚呼哀哉神行無方乾健不息物皆被於聖澤人自遂於帝力巍乎髙代之行至矣動天之德後玄壤以長存冠蒼穹而罔極嗚呼哀哉令狐楚詩集太宗挽歌卜世知無極上仙安可尋祝堯違衆望傳啓合天心陵柏蕭騷韻階茅寂寞隂何人開殿閣塵暗九絃琴舜化無偏黨堯年欠耄期世間人自哭天上事難知終遜東封禮遂興南狩悲金鑾舊學士頭白涕漣洏日到虞泉路天從杞國崩去年燾寧節今夕永熙陵薤露悲風起松阡苦霧凝龍髯攀不及千古限難勝王元之仁宗挽詞去序三朝聖行崩萬國天憂勤無曠古治洽最長年仁育齋髙厚哀思罄幅貟欲知千載美道德冠遺編憑几微言絶羣臣涕淚揮哀號三級陛縞素九重圍天上仙遊逺宫中御座非最悲帷幄待不復未明衣厭代人間世收神天上遊遽然虛玉座不復望珠旒待旦移巾幘饔人改膳羞尋常飛白几寂寞暗塵浮同軌羣方至因山七日催永違天日表空有肺肝摧帳殿流蘇捲鈴歌薤露哀宫中垂曉軔西去不更回王安石王者居尊夲無外由來天下以為家六龍白日乘雲去何待金錢買道車苦霧霏霏著彩旗酒排吉仗雜凶儀常時鳯輦嬉遊處今日龍慟哭隨都人擾擾塞康莊西送靈車過苑墻金鼎藥成龍已去人間惟有鼠拖腸素幕悠悠逗曉風行隨哀挽出深宮妃嬪莫向蒼梧望雲覆昭陵洛水東叨陪法從最多年慣聽梨園奏管絃從此無因瞻黼座帷應魂夢到鈞天歐陽修神宗挽詞文思昭日月神武用雷霆制作深垂統憂勤減夢齡孫謀開二葉末命對三靈今代誰班馬能書汗簡青釣築收賢輔天人與聖能輝光唐六典度越漢中興百世神宗廟千秋永裕陵帝鄉無馬迹空望白雲乘昔在基皇極師臣論九疇丘陵忽為谷天地不藏丹河洛功無憾幽燕䇿未收嗣皇朝萬國任姒正興周黃庭堅髙宗挽詞何止超前代功隆道更尊幾同造區夏還復整乾坤黃屋堯年度青山禹穴昏遺民猶望幸淚血灑中原河濟初開府江淮晚視師纘戎由子聖永命獨天知鶴唳空虛警雲生仗自移厭代之夕都下相傳有彩雲翔鶴之異上哀何以稱卒伐繼周詩葉適孝宗挽章精一傳心妙文明撫運昌乾坤歸獨御日月要重光不值亡戎歲何由復漢疆遽移丹極仗更上白雲鄉九有哀同切孤臣淚特滂詎因逢舜日曽得厠周行但憶丹墀引頻瞻黼扆傍衮華叨假寵縞素識周喪似有鹽梅契還嗟貝錦傷戴盆驚委照增秩侍行香手疏攄井悃衡程發皂囊神心應斗轉巽令亟風揚未答隆儒厚俄聞脫屣忙此生知永已沒世恨空長內難開新主遄歸立右廂因山方慘淡去國又愴惶疾病今如此形骸可自量報恩寧復日忍死續殘章朱熹寧宗挽詞我宋書開洛炎圖統得天年推仁祖久厯至紹興綿孝廟鴻謨永光皇寶祚延四朝各三紀盛德洽民編沖淡疑金汞憂勤失寶丹講餘曦已午班促漏方殘濟野雲生暗蒼梧日轉寒列朝從藝祖天闕會金鑾挽歌媯幄柔明訓堯闈保護賢别居長樂寢讓給水衡錢謹疾方加膳收神亟去仙宸襟增服紀追報煥終天昔帝推嬪則吾君賴母慈陪陵漢家葬異室閟宫祠霧暗星軒隱天愁月御移翟車參享路無復廟中期宋庠應制挽莊惠后太后挽詞寶慈垂母訓一紀御璿除地有占沙舊天仍補石餘軒星淪夕緯翟輅去宸居異詔日金縢啓方知復辟書太后上仙後於巾箱中得復辟章旰昃身無憚寒暄疾有加災生織女奈魂斷濯龍車廞翣浮晨旭邊蕭咽暝霞唯留長樂注刋美在皇家宋庠應制挽莊獻太后四紀居坤極三朝賴母臨德齊先后懿恩及聖君深册寶追崇德衰麻欲報心哀榮千古事誰復嗣徽音慶源由魏國奉事及宣仁盛德儀中壺私恩絶外親長秋期不老厚夜忽無晨來歲柔桑緑誰臨繭館春朔漠遐征後南州俶擾時人心憂社稷天意屬簾帷擁佑千齡主圖回萬世基中興能事倐與帝鄉期汪藻挽隆祐太后太子挽歌竹馬書薨嵗銅龍表葬時永言窀穸事全用少陽儀夀夭由天命哀榮出聖慈恭聞褒贈詔軫念在輿夷剪葉藩封早承華册命尊笙歌辭洛苑風雪蔽梁園鹵簿凌霜宿銘旌向月翻宫察不逮事哭送出都門白居易挽悼懷太子山陵事類蜃車遂師大喪共丨或作摶或作輇並市㙛反丨之役柩路載栁四輪迫地而行有似於蜃因取名焉行至壙乃説更載以龍輴地官龍輴天子之殯也菆塗丨丨以棺加斧於槨上畢塗屋天子之禮也檀弓顔桞曰天子龍輴而槨懤同上慕丨丨而不駐贍鳯綍以方遙敬方實録鳯翣丨丨啓行龍輼在御晏類要鸞車巾車掌大喪飾遣車遂廞之行注廞興也謂陳駕之行之使人以次舉之以如墓也遣車一曰丨丨春官宸駕馮相告祲丨丨長往謝晀册文宫車擁馳道兮皆往獨丨丨兮不歸元宗哀册壞土假令愚民取長陵一丨丨何以加其法乎張釋之傳新宫下蘭臯兮背芷闕野蒼蒼帶白花兮掩淚闕日逺兮斷腸當盛明兮共樂忽幽處兮獨傷去故庭兮即新宫兮夜長德宗皇后册文因山而墳故聖人取薄葬去厚送驪山之銀海魚燈虎丘之金精龍劍錮之其內散之其間適為大盜之守未足藏身之固彼橋山帝丘九疑會稽皆丨丨丨丨未聞其過者喬潭女媧陵記發石於墳很石蒼蒼驪山之傍鑱朴礲瘢嶷然西方昔秦皇帝謀之不臧七十萬人茲焉惶惶丨丨此山言礎丨丨若有慿依屹桂中逵淫刑蹴迫人力無施故老相傳以很名之自昔太古不封不樹有葛於溝有薪於野後聖有作緣情不忍為之棺槨其在唐虞則維窽木噫嘻暴秦虐用其人墳而象山下錮三泉窮珍揔竒力瘁財殫驅之而前如刈草菅天毒其𠂻神憤其凶謫戍一呼九州風從白挺荆棘指麾淆潼險阻不闔干戈倒鋒尸露于劫隧燔于童蓬顆無依不十年中禹葬會稽不改其行聖德洋洋厥響久長至于漢劉釋之有言中如可欲猶隙南山矧私其身以盡其人刻詞很石炯戒千春皇甫湜很山銘橋山劍舄黃帝葬於丨丨南空棺無尸唯丨丨在史記漢武帝因巡朔方還祭黃帝于橋山上曰吾聞黃帝不死有冡何也公孫卿對曰黃帝已仙上天羣臣葬其衣冠同上梧野沙珠舜葬蒼丨之丨有鳥如丹雀名曰慿霄自丹洲而來銜青丨丨積成壠阜名曰珠丘拾遺記欒水衝嚙惠子曰滕文公卒葬有日矣天大雨雪至半月群臣請弛期太子不許惠子諫曰肯王季葬渦水之尾丨丨嚙其墓見棺前和文王曰先君殆見羣臣百姓矣乃出其棺三日而後葬今太子亦宜曰先君欲少留而撫社稷故使雪甚弛期而更為曰此文王義也太子曰善吕氏春秋金精蹲踞吳王闔閭葬虎丘山下發吳都之士十萬人共治葬穿土為川積壤為丘池廣六十步水深一丈五尺銅棺三重澒池六尺黃金珠玉為鳬鴈扁諸之劍魚腸之干在焉葬三日丨丨上騰而虎丨丨于上因名虎丘越絶書葬近舊陵秦夏太后卜葬曰東望吳子莊襄王葬正陽西望吾夫孝文王葬壽陽墓起寢殿古不祭丨始皇丨丨丨於墓側漢因不改四時上飯漢官儀驪山崇侈始皇葬于丨丨吏徒數十萬人曠日十年下徹三以泉合采金石冶銅銅其內漆塗其外被以珠玉飾翡翠中成遊觀上成山陵為葬埋之侈至於此使其後世曽不得蓬顆蔽冡而託葬焉灞陵從儉漢文帝治丨丨皆以瓦器不得以金銀銅鍚為之因其山不起墳本紀灞陵不起山陵稠種柏樹三輔王圗將兵護諸陵漢官儀張釋之從文帝行至灞陵上使慎夫人鼓瑟上自倚瑟而歌悽然悲懷顧謂羣臣曰嗟乎以北山石為墎用紵絮斫陳漆其間豈可動哉左右皆曰善釋之前曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石墎又何戚焉文帝稱善補食官令馮參昭儀少弟以嚴見憚不得親近侍帷幄以王舅出丨渭陵丨丨丨以數病徙為寢中郎注食官令給陵上祭祀之事復土將軍文帝遺詔曰郎中令張武為丨丨丨丨發近縣卒萬六千藏槨穿復土屬將軍武注主穿壙填瘞事金箱貯書武帝崩遺詔以雜道書三十卷致於棺中貯之丨丨卷後題東宫臣名年月河東太守張純以書進宣帝帝示左右時有武帝典書中郎冉登見書及箱流涕曰此先皇殯時物臣此時著棺中因何得出宣帝愴然驚愕以書付武帝廟中其茂陵宛然如故庾信賦云茂陵之書空聚即此也內傳玉匣鏤象漢帝及侯王送葬者皆珠襦丨丨形如鎧甲連以金丨上皆鏤以蛟龍鸞鳯龜鱗之象時謂蛟龍玉匣西京雜記九竅加以黃金則死者不朽晏類要赤眉賊帥樊宗陷長安發掘諸陵取其寶貨凡所發冇匝殮者皆如生故赤眉多行淫穢唯灞陵杜陵完裁令流水光武初作夀陵自文帝以後皆預作陵將作大匠竇融上言園陵廣邪旡所用帝曰古者帝王之葬皆陶人瓦器木車茅馬使後代之人不知其處今所制不過二三頃旡為山陵陂池丨丨丨丨而已無起寢廟明帝遺詔丨丨丨丨園陵掃地露祭率天下以儉葬卜吉凶隋文帝仁壽二年皇后獨孤氏崩上令儀同三司蕭吉為皇后擇葬地得吉處云卜年二千卜世二百上曰丨丨由人不在於地髙緯葬父豈不卜乎俄而國亡正如我家墓田若云不吉朕不當為天子若云不凶我弟不當戰沒然竟從吉言吉退告族人蕭平仲曰後四載太子御天下若太子得政隋其亡乎吾前紿之云卜世二千者二十字也卜世二百者取世二傳也汝識之葬從儉約唐太宗貞觀十一年詔恐身後子孫習於流俗加四重之櫬伐百祀之木崇厚墳陵今頒此制務從儉約於九嵕之山足容一棺而已木馬塗車由桴葦籥事合古典不為時用臺望昭陵長孫皇后既葬太宗即苑中升作層丨以丨丨丨引魏徴同徴視曰臣􅀈昏不能見帝指示之徴曰此昭陵耶帝曰然徵曰臣以為陛下望獻陵若昭陵臣固見之帝泣為毁臺縣奉八陵寶歷元年勑奉先一丨獨丨丨丨供辦支措實為繁併宜委京兆府減一半租并雜色役令諸縣均出敬宗實録盜發金寶五代溫韜在梁為耀州節度唐諸陵在境內者悉發之取所藏金寶而昭陵最固悉藏前世圖書鍾王紙墨筆迹如新莊宗滅梁韜來朝郭崇韜曰此劫陵賊罪不可赦韜納賂劉后遽遣還鎮明宗朝賜死戒用瓦紙五代周太祖屢戒晉王曰昔吾西征見唐十八陵無不發掘多藏金寶故也我死當衣以紙斂以瓦棺勿作石羊虎疏諌厚葬棺槨之作自黃帝始黃帝葬於橋山堯葬濟隂丘壠皆小葬具甚微舜葬蒼梧二妃不從禹葬會稽不改其列殷湯無葬處文武周公葬於畢在鄗東南無墳壠逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭宣五王皆大作丘壠多其瘞藏咸盡發掘暴露甚足悲也始皇葬于驪山之阿下錮三泉上崇三墳其髙十丈周回五里有餘石槨為遊館人膏為燈燭水銀為江海黃金為鳬鴈珍寶之藏機械之變棺槨之麗宫館之盛不可勝原又多殺宫人生埋工匠計以萬數驪山之作未成而周章百萬之師至其下矣項籍燔其宫室塋宇往往咸見發掘其後牧兒亡羊入其鑿牧者持火照求羊失火燒其藏椁自古及今葬未有盛如始皇者也數年之間外被項籍之災內罹牧豎之禍豈不哀哉劉向書請薄葬臣聞古之聖帝明王所以薄葬者非不欲崇髙光飾珍寶貝物以厚其親然審而言之髙墳厚壠珍物畢備此適所以為親之纍非曰孝也昔漢成帝造延昌二陵制度甚厚功費甚多諫大夫劉向上書孝成寤而遂以薄葬又漢氏之法人君在位三分天下貢賦以一分入山陵武帝厯年長久比葬陵中不復容物霍光暗於大體奢侈過度其後至更始之敗赤眉賊入長安破茂陵取物猶不能盡無故聚斂百姓為盜之用甚無謂也魏文帝於首陽東為夀陵作終制其略曰昔堯舜夀陵因山為體無封無樹無立寢殿園邑為棺槨足以藏骨為衣裳足以朽肉吾勞心不食之地欲使易代之後不知其處旡藏金銀銅鐵一以瓦器自古及今未有不亡之國旡不掘之墓喪亂以來漢氏諸陵旡不發掘及至燒取玉匣金縷骸骨并盡乃不重痛哉若違詔妄有變改吾為戮尸於地下死而重死不忠不孝使魂而有知將不福汝以為永制藏之宗廟魏文之制可謂逹於制矣伏願陛下深覽古今為長久之慮臣之赤心惟願萬歲之後神道常安陛下名揚於宗廟耳書奏不報虞世南漢世葬儀天子葬幕中黃門虎賁各二十人執紼司空擇土造穿太史卜日將作黃腸題湊便房如禮大駕太僕御方相氏黃金四目蒙玄衣熊皮朱裳執戈揚楯立乘四馬朱貙旗長三仞十有二旒曵地畫日月升龍書旐曰天子之柩謁者二人立乘六馬為次太常跪哭曰十五舉音止哭晝漏上請發司徒河南尹先引車騎太常曰請拜送車著白絲三紏紼長三十丈圍七寸六行行五十人公卿以下子弟凡三百人皆素幘委貌冠衣素裳挽校尉三百人皆赤幘不冠持幡幢皆銜枚羽林孤兒巴俞嬥徒了切歌者六十人為六列司馬八人執鐸至陵南羡門司徒跪請就下房都導東園武士奉入房執事下明器太祝進醴獻司空將校復土續漢書後漢靈帝時鑄天祿蝦蟆吐水於平門外注今鄧州南陽縣北宗資碑旁有兩石獸鐫其膞一曰天祿一曰辟邪據此即天祿辟邪並獸名漢天祿閭亦因獸以立名右漢天祿辟邪四字在宗資墓前石獸膞上按後漢書宗資南陽安衆人也今墓在鄧州南陽界中墓前有二石獸刻其膊上曰一曰天祿一曰辟邪余自天聖中舉進士往來襄鄧間見之道側逮今三十餘年矣其後集録古文思得此字屢求於人不能致尚書職方貟外郎謝景初家於鄧為余模得之字或訛缺不若余見時完也歐文本朝陵名太祖昌陵太宗熙陵真宗定陵仁宗昭陵英宗厚陵神宗裕陵哲宗泰陵徽宗佑陵欽宗寧陵髙宗思陵孝宗阜陵光宗獻陵寧宗茂陵紹興己未春徽宗梓宫歸宰臣上陵名永固有王銍者言犯後魏明帝後周文宣二后陵名下祕書省參考如銍言遂改名永祐然漢平帝後漢殤帝十國劉龔同曰康陵本朝順祖亦曰康陵後魏明帝後周宣帝唐中宗同曰定陵本朝翼祖亦曰定陵前漢惠帝唐懿宗王后同曰安陵本朝宣祖亦曰安陵唐太宗曰昭陵本朝仁宗曰永昭陵後魏宣武后曰永泰陵唐元宗曰泰陵本朝哲宗亦曰永泰陵蓋本朝陵名犯前代陵名者不一祖宗以來不避也聞見録議易皇堂仁宗永昭葬且有日忽傳皇帝棟損時諸使皆欲不問而掩之韓公崎正色曰不可果損當易之若違葬期侈所費此責猶可當若茍且掩之後有壞而致人主疑心臣下何以當責遺事擅移山陵入內押班雷允恭丨丨永定陵皇帝而丁謂芘之朝廷命吕許公與魯肅公乘傳按視盡得其迹及允恭等盜沒方中金寶以萬計狀聞抵允恭罪而謂罷相護送命宰執韓魏公嘉祐末以翊戴功輔英宗既為永昭山陵使事畢而上不豫矣不敢辭位越四日而永厚鼎成以元宰復護葬于洛魏公先自上疏云自冇唐至于五代山園使事訖求去今先帝已附廟而臣時為山陵使事恬然不能援故事去位則是不知典故何以勝天下之責雖陛下欲以私恩留臣顧中外公議且謂臣何神宗再三留之卧家不出遂以司徒兩鎮節度使判鄉郡相州元祐末章子厚為永泰山陵使子厚專權人情欎陶冇曾誕敷文者作詞略云草草山陵職事厭厭罷相情懷謂故事也紹興間會稽因山秦會之為固位之計乃除孟仁仲為樞密使以代其行仁仲不悟其機事畢猶入國門會之怒諷言路引以論列出典金陵揮塵録永祐之權􅑼也宰相秦檜之不欲行乃命信安孟王忠厚以樞密使為之及營思陵備置五使遂命右相周益公掩􅑼宫從所請也時左相王季海以母老惡凶事故不欲行然陵成而王卒罷永阜之役既命左相留仲至未葬而仲至遂右相趙子直亦不欲行乃以少傅保寧軍節度使郭師禹為總護使而命參知政事余處恭持節導拜梓宫既葬師禹封永寧郡王子直遂得罪慶元末永崇陵將復土右相謝子肅亦不行乃命平原王韓托胄焉山陵非宰相護送遂為故事朝野雜記權名為􅑼宫紹興初昭慈聖獻皇后升遐欲建山陵外祖曽公議以謂帝后陵寢今存伊洛不日復中原即歸祔矣宜以􅑼宫為名僉以為當用之揮塵録詩集過橋陵先帝昔晏駕兹山朝百靈崇岡擁象設沃野開大庭即事壯重險論功超五丁坡陀困厚地却略羅峻屏雲門虛冉冉風松肅冷冷石門霜露白玉殿莓苔青宫女曉知署祠官朝見星空梁簇盡戟隂井敲銀瓶中使日夜繼惟王心不寧豈徒恤備享尚謂求無形孝理敦國政神凝推道經瑞芝産廟柱好鳥宿巖扁髙嶽前嵂崒洪河左瀅濙金城蓄峻趾沙苑交回汀永與奧區固川原紛渺𡨕居然赤縣立臺榭爭岧亭官屬果稱是聲華真可聽王劉美竹潤裴李春蘭馨鄭氏才振古啖侯筆不停遣辭必中律利物當發硎綺繡相展轉琳琅愈青熒側聞魯恭化秉德崔瑗銘太史候鳬影王喬隨鶴翎朝儀限霄漢客思回林垌轗軻辭下杜飄颻凌濁涇諸生舊短褐旋泛一浮萍荒嵗兒女瘦暮途涕泗零主人念老馬廨宇容秋螢流寓理豈愜窮愁醉未醒何當擺俗纍浩蕩乘滄溟杜甫三十韻次昭陵舊俗疲庸主羣雄問獨夫讖歸龍鳯質威定虎狼都天屬尊堯典神功叶禹謨風雲隨逸足月月繼髙衢文物多師古朝廷半老儒直詞寧戮辱賢路不崎嶇往者災猶降蒼生喘未蘇指麾安率土蕩滌撫洪爐壯士悲陵邑幽人拜鼎湖玉衣晨自舉石馬汗嘗趍松柏瞻靈殿塵沙立暝途寂寥開國日流恨滿山隅前人北邙陵丨丨何纍纍髙丨有四五借問誰家墳皆云漢世主恭文遙相望原陵欎膴膴季世喪亂起盜賊如豺虎毁壤過一杯便房啓幽户珠柙離玉體珍寶見剽虜園寢化為墟周墉無遺堵蒙籠荒荆棘蹊徑登童豎狐兔窟其中荒穢不復掃頽壟并墾發萌𨽻營農圃昔為萬乘君今為一丘土感彼雍門言悽愴哀往古張孟陽七哀詩奉先寺荒涼城南丨丨丨後宫美人皆葬此角樓相望髙起墳草間柏下多石人佚卑焚骨不作塜青石屠當丘壠家家墳上作享享朱門相向無人聲樹頭上梟作人語月黑風悲鬼搖樹宫女養女作子孫年年犢車來作主廢后園林宫路側家破無人掃墳域官家嵗給半千錢街頭買餅作寒食麒麟樹宫車晚出向南山仙衛逶迤去不還朝脯泣對丨丨丨樹下蒼苔日漸班王翰古蛾眉怨述漢武事金粟岡舊唐紀明皇朝拜五陵至橋陵見丨丨山丨有龍盤鳯翥之勢復近先塋謂侍臣曰吾千秋萬嵗後宜葬此地得奉先陵故杜甫曹將軍畫馬圖引曰自從獻寶河朝宗無復射蛟江水中君不見金粟堆前松柏裏龍媒去盡鳥呼風鎖金扉玉宸朝晚忽掩赭黃衣愁露丨丨丨蓬萊待得仙丹至人世已成非龍軒長仗轉西畿旌斾入雲飛望陵宫女垂紅淚不見翠輿歸昭陵發引王禹玉作清平調二曲催仙馭上林春晚曽奉玉宸遊水殿戲龍舟玉簫聲斷丨丨丨一去隔千秋處遊人重到曲江頭事往涕難收空餘御幄傳香依舊水東流同上古今合璧事類備要前集卷六十二
