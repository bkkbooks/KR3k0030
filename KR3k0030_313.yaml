body:
  text: 古今合璧事類備要外集卷十三宋謝維新撰樂器門樂器樂器㫖歸樂之有器所以為懸樂之具也三代之制其備見於詩人之所詠六典之所載皆是也然樂之為器有堂上下之分金石堂上之樂也故有器以懸之絲竹革木堂下之樂也故有器以展之古人之制大略如此後有作者茍能用古人之樂則必不能遺乎古人之器矣事類為銘鬻子曰昔大禹治天下也以五聲聽治丨丨於筍簴曰教寡人以道者擊鼓教寡人以義者擊鍾教寡人以事者振鐸語寡人以憂者擊磬語寡人以獄者揮鞞有瞽丨丨有瞽在周之庭設業設簴崇牙樹羽注捷業如鋸齒或曰畫之詩懸位周樂官小胥正丨樂之丨王宫懸四面諸侯軒懸去南面卿大夫判懸去兩宫士特懸一面辨其聲凡懸鍾磬半為堵全為肆禮懸器梓人為筍簴注樂器所丨橫曰筍植曰簴異名夏后氏龍簨簴殷之崇牙周之璧翣皆以懸鍾鼓三代丨丨也同上陳數大胥掌比樂官展樂器注比猶校也次比樂官展謂丨丨之禮蕃不舉周禮荒政九曰丨樂謂凶年而閉樂器而丨丨也抱而奔周衰掌制之官丨其器丨丨河海漢志仲叔請新築人丨丨于奚救孫桓子桓子是以免既衛人賞之以邑辭丨曲懸許之注軒懸也周禮天子樂宫懸四面諸侯軒懸闕南方左成公二年鄭人賂丨丨丨晉侯以歌鍾二肆注肆列也垂鍾十六為肆二肆三十二枚左襄公十一年三丈之簴秦始皇造簴丨丨鍾皆千石也三輔黃圖萬石之簴立丨丨丨丨注簴獸名立百二十萬斤之簴以垂鍾司馬相如賦樂器有數丨丨丨丨其餘皆略不著而其物各具在八音一曰金為鎛鍾為編鍾為歌鍾為錞為鐃為鐲為鐸二曰石為大磬為編磬為歌磬三曰土為塤為嘂嘂大塤也四曰革為雷鼓為靈鼓為路鼓皆植之為建鼓為鼗鼓為懸鼓為節鼓為打為相五曰絲為琴為瑟為頌瑟頌瑟箏也為阮咸為筑六曰木為柷為敔為雅為應七曰匏為笙為竿為巢巢大笙也為和和小笙也八曰竹為簫為管為箎為笛為舂牘此其樂器也樂器塵蠧肅宗皇后吳氏上在東宫𤣥宗因幸其室顧庭宇不汛掃丨丨丨丨左右無嬪侍帝愀然太常丞展李嗣真擢丨丨丨嘗引工丨器於庭后竒其風度左校署供丨丨丨令二人丞一人掌梓匠之事樂懸簨簴皆丨焉唐百官志珍物雜飾上造簨簴流蘇之屬皆以金玉珠翠丨怪之丨丨丨之開元紀萊宫增用凡植者為簨橫者為簴簴以懸鍾磬皆有十六周人謂之一堵而唐人謂之一簴自隋以前宫懸二十簴及隋平陳得梁故事用三十六簴遂用之唐初因隋舊用三十六簴高宗蓬丨丨成丨丨七十二簴至武后時堵之開元定禮依古著為二十簴唐樂志三十六簴本朝真宗大中祥符七年詔簨簴之數尚闕雜論爰命禮官博詳典故廣以郊廟之制備兹鍾磬之俗儼金石之九成庶諧雅奏竦熊羆之四列永煥明禋自今玉清昭應景靈宫架並用丨丨丨丨杜甫朝享太廟賦初高祖太宗之櫛風沐雨勞身焦思用黃鉞白旗者五年而天下始一歷三朝而戮力今庶績之大備上方采龎俗之謡稽正統之類蓋王者盛事臣聞之於里曰昔武德已前黔黎蕭條無復生意遭鯨鯢之蕩汨荒歲月而沸渭衮服紛紛朝廷多閏者仍亘乎晉魏臣竊以自赤精之衰歇曠千載而無真人及黃圖之經綸息五行而歸厚地則知至數不可以久缺凡材不可以長寄故高下相形而尊卑必異惟神斷繫之於是本先帝取之以義壬辰既格于道祖乘輿即以是日致齊于九室所以昭達孝之誠所以明經天之質具禮有素六宫咸秩大輅每出或黎元不知豐年則多而筐筥甚實既而太尉參乘司僕扈蹕望重禋以肅恭順法駕之徐疾公卿淳古士卒精一默宗廟之愈深抵職司之所密宿翠華於外戶曙黃屋於通術音遂氣悽悽於前旒光靡靡於嘉栗階有賓阼帳有甲乙升降之際見玉柱生芝擊拊之初覺鈞天合律簨簴仡以碣磍干戚宛而婆娑鞉鼓塤箎為之主鍾磬竿瑟以之和雲門咸池取之至空桑孤竹貴之多八音循通既比乎旭日升而氛埃滅萬舞陵亂又似乎春風壯而江海波鳥不敢飛而𤣥羽􅝧嵺以嶽峙象不敢去而鳴珮剡爚以星羅已而上乾豆以登歌美休成之既享璧玉儲精以稠疊門闌洞豁而森爽黑帝歸寒而激昂蒼靈戒曉而來往熙事莽而充塞羣心麌以振蕩桐花未吐孫枝之鸞鳳相鮮雲氣何多宫井之蛟龍亂上若夫生𢎞佐命之道死配貴神之列則殷劉房魏之勳是可以中摩伊吕上冠䕫卨代天之工為人之傑丹青滿地松竹高節自唐興以來若此時哲皆朝有數四名垂卓絶向不遇撥亂反正之主君臣父子之别奕葉文武之雄注意生靈之切雖前輩之溫良寬大豪俊果决曾何以措其筋力與韜鈐載其刀筆與喉舌使祭則與食則血若斯之盛而已爾乃直于主索于祊警幽全之物散純道之精蓋我后常用惟時克貞膋以蕭合酌以茅明嘏以慈告祝以孝成故天意張皇不敢殄其瑞神奸妥帖不敢祕其精而撫絶軌享鴻名者矣於以奏永安於以奏王夏福禳禳於絳闕芳霏霏於玉斚沛枯骨而破聾盲施夭胎而逮鰥寡園陵動色躍在藻之泉魚弓劒皆鳴汗鑄鍾之風馬霜露堪吸禎祥可挹曾宫歔欷陰事儼雅薄清輝於鼎湖之上靜餘響於蒼梧之下窅然漠漠惕然兢兢紛益所慕若不自勝瞰牙旗而獨立吟翠駮而未乘五老侍祠而精駭千官逖聽以思凝於是二丞相進曰陛下應道而作惟天與能澆訛散淳朴登尚猶日慎業業孝思蒸蒸恐一物之失所懼先王之咎徵如此之勤恤匪懈是百姓何以報夫元首在臣等何以充其股肱且如周宣之教親不暇孝武之淫祀相仍諸侯敢於迫脅方士奮其威稜一則以微言勸內一則以輕舉虛憑又非陛下恢廓緒業其瑣細亦曷足稱丞相退上局天蹐地授綏登車伊澒洞搶櫐先出為儲胥本枝根株乎萬代睿想經緯乎六虛甲午方有事於綵壇紺席宿夫行所如初詩集蛟螭露丨丨丨簨簴韓鐘音樂㫖歸樂有八音金石絲竹匏土草木以之被於音則各隨其器而見之曰鐘則金為之器也曰磬則石為之器也後世則又就是而制為方響之器焉琴瑟則絲為之器也後世則廣為琵琶箜篌之器焉曰簫曰管曰箎曰簧曰籥則竹為之器也後世則廣為笛為篳篥之屬焉曰笙曰竿則匏為之器也至後世則廣以笳角之類曰塤則土為之器也曰鼓則革為之器也曰祝敔則木為之器也若羯鼓拍板之屬是又就革木之中而轉為後世之戲諧者也今特用金石絲竹匏土革木之正音叙而編之其後世推廣之制則各附正音之次以見古今推廣之制也事類兌音鐘丨丨秋音丨分之丨並五經義尚羽鐘丨丨國語奏夏凡樂事以鐘鼓丨九丨周禮叩之大善待問者如撞鐘丨丨丨者大鳴丨丨小者小鳴鏗以立鐘聲鏗丨丨丨號號以立橫橫以立武君子聽鐘聲則思武臣並記岐伯為炎帝之孫丨丨因鼓伶倫造黃帝命丨丨丨十二鐘吕氏春秋后䕫間丨丨曰笙鏞以間注鏞大鍾間迭也書禹銘鐘丨以五聲聽治丨筍簴曰教寡人以義者擊丨淮南子倕作鐘丨丨丨世本鳬氏作丨丨丨鐘薄厚之震動清濁之所由出侈奄之所由興也鐘已厚則石已薄則播侈則柞奄則鬱鐘大而短則其聲疾而短聞鐘小而長則其聲舒而逺聞磬師掌丨丨丨擊編鐘周禮周景王鑄丨丨丨將丨無射泠州鳩曰王其以心疾死乎夫音樂之輿也而鐘音之器也器以鐘之小者不窕大者不摦則和於物物和嘉成故和聲入於耳而藏於心心億則樂窕則不咸摦則不容心是以感感則生疾左氏魯莊公鑄丨丨丨丨鐘大曹劌入見曰今國小鐘大國語齊景公鑄丨丨丨丨大鐘將懸之晏子曰鐘大不以禮遂毁之晏子春秋郤至驚走晉丨丨如楚聘饗之子反相為地室而懸焉郤至將登金奏作於下丨而丨出左成十二杜蕢來聞晉知悼子卒未葬平公飲酒師曠李調侍鼓鐘丨丨自外丨丨鐘聲曰安在曰在寢丨丨入寢歷階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出平公呼而進之曰蕢襄者爾心或開豫是以不與爾言爾飲曠何也曰子卯不樂知悼子在堂斯其為子卯也大矣檀弓每食擊鐘宋左師向巢丨丨丨丨飲酒擊鐘鄭伯有於窟室夜丨丨丨丨並左異哉吾聞吳季札自衛如晉宿將於戚聞鐘聲焉曰丨丨丨丨之也辨而不德必加於戮夫子獲罪於君以在此懼猶不足而又何樂遂去之文子聞之終身不聽琴瑟左襄二十九年何以為銘季武子以所得於齊之兵作林鍾而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令德諸侯言時計功大夫稱伐今稱伐則下等也計功則借人也言時則妨民多矣丨丨丨丨且夫大伐小取其所得以作彛器銘其功烈以示子孫昭明德而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國而昭所獲焉以怒之亡之道也注林鍾律名鑄鐘聲應林鍾因以為名左襄十九年魏顆銘鐘丨丨以身退秦師于輔氏親獲杜回其勳丨于景丨國語夙繇迎鐘中山之君有丨丨者知伯欲攻之而無道也為大鐘方車二軌以遺之夙繇之君塹岸堙谷以丨丨吕氏春秋撞之雉鳴齊景公族鑄大鐘丨丨庭下郊丨皆丨注族聚也鐘聲似雷雷震則雉雊淮南子鈕也蠡絶高子曰禹之聲尚文王之聲孟子曰何以言之曰以追蠡注禹時鐘在者追鐘丨丨丨欲丨之貌孟盡心小皆千石秦始皇造簴三丈鐘丨者丨丨丨也三輔黃圖自鳴三日漢武帝時未央宫殿前鐘無故丨丨丨丨三夜詔問朔朔曰銅者土之子以類言之子母感而相應山恐有崩移者故鐘先鳴三日蜀郡太守上言山崩上大笑東方朔傳漢靈帝鑄丨丨丨丨鐘四皆受二千斛懸於玉堂及雲臺殿前魏太祖試杜夔字公良以知音為雅樂郎參大樂事善鐘律事聰慧過人紹復先代古樂皆䕫始也初漢鑄銅工柴玉巧有意思夔令鑄鐘其聲鈞清濁多不如法數改作玉甚厭之謂䕫清濁任意頗相短夔玉更相白丨丨丨取所鑄鐘錯雜更丨然後知䕫之精而玉之妄於是罪玉空地掘得李嗣真太常缺黃鍾鑄不能成嗣真疑土中有之道上逢車鐸聲甚厲曰此宫聲也市以歸振於丨丨若有應者丨之丨鐘衆樂遂和本傳閣皂掘得孫智諒開元中內殿修齊奉詔投龍於吉州玉笥山泊舟江側有異氣在東川之中疑有古跡乃於丨丨山丨丨鐘一枚重百餘斤鐘下得玉象三身因置丨丨觀南部新書作大儀理則天斂天下黃金丨丨丨丨不就孔氏帖此姑洗角楊牧涔陽耕得古鐘高尺餘收扣之曰丨丨丨丨既劀拭有刻在兩欒果然喬潭霜鐘賦寧失制於侈靡豈遺音於窊摦乍浮空以紆餘更觸物而瀏亮發越林巒周流井邑詩集南鄰擊丨丨丨鐘磬左思寸莛撞有如丨丨鉏鐘動不知曉猿鳴鐘丨丨丨丨並韓歌樂未休丨鐘丨丨丨雙娥獻歌笑三千丨丨丨丨丨撾鐘考鼓宫殿傾並李白鼓音樂㫖歸鼓革音也建鼓夏后氏加四足名足鼓殷人柱貫之名楹鼓周人懸之名懸鼓近代相承植而貫之謂之建鼓蓋殷所作也又棲翔鷺於其上不知何代所加或曰鵠也取其聲揚而逺聞或曰鷺鼓精越王勾踐擊大鼓於雷門以厭吳晉時移於建康有雙鷺哾鼓而飛入雲或曰皆非也詩云振振鷺鷺于飛鼓咽咽醉言歸古之君子悲周道之衰頌聲之輟飾鼓以鷺存其風流未知其孰是靈鼓靈鼗八面雷鼓雷鼗六面路鼓路鼗四面鼓以桴擊鼗貫其中而手搖之又有節鼓不知誰所造也事類春分鼓者丨丨之音以助萬物發生風俗通啓蟄韗人凡冒鼓必以丨丨之日注象雷之發聲也以革䝉鼓曰冒禮鼓郭丨者丨也風俗通鼓咢徒擊丨謂之丨爾雅聲歡鼙鼓之丨丨歡以立動動以進衆聲和鼓者當於五聲五聲不得不丨注當主也並禮布鼓無持丨丨過雷門漢書玉鼓有人扣金與擊丨丨駕六龍也春秋孔演圖鼓篋入學丨丨以遜其業記學記鼓盆丨丨而歌莊子土鼓伊蓍氏蕢桴丨丨記䕫鼓黃帝殺丨以其皮為丨帝王世紀又黃帝與蚩尤戰𤣥女為帝製丨丨以當雷霆黃帝內傳堯有丨丨敢諫之鼓夷作丨丨鼓蓋起于伊蓍氏世本禹聽治丨以五聲丨丨曰教寡人以道者擊鼓鬻子文代搜密須之鼓所以丨丨也左鼓人教丨丨掌丨六鼓四金之音聲以節聲樂以和軍旅以正田役教為鼓而辨其聲用以雷鼓鼓神祀以靈鼓鼓神祭以路鼓鼓鬼享以鼖鼓鼓軍事以鼛鼓鼓役事以晉鼓鼓金奏以金錞和鼓以金鐲節鼓以金鐃止鼓以金鐸通鼓凡祭祀百物之神鼓兵舞帗舞者凡軍旅夜鼓鼜千厯反軍動則鼓其衆田役亦如之救日月則詔王鼓大喪則詔太僕鼓禮鉦人伐宣王丨丨丨鼓陳師鞠旅詩鼓聲氣宋襄公及楚人戰于泓公子魚曰三軍以利用也金丨以丨丨也利而用之阻隘可也聲盛致志鼓儳可也注丨以佐士衆之丨丨左鼓作氣魯桓公及齊戰于長勺公將鼓之曹劌曰未可齊人三鼓劌曰可矣齊師敗績云云公問其故劌對曰夫戰勇氣也一丨丨丨再而衰三而竭彼竭我盈故克之左莊公十年旝動鼓周桓王以諸侯伐鄭戰于繻葛鄭命二拒曰丨丨而丨蔡衛陳皆奔王卒亂大敗左桓公五年枹而鼓齊晉戰于鞍邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合茍有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也吾子勉之左并轡右援丨丨丨馬逸不能止師從之齊師敗績左成公二年白鷺飛詳見鷺門白鶴來㑹稽雷門鼓有丨丨丨飛入於是鳴洛陽聞其聲人或去之鶴還飛去白氏帖銅鼓記建武二十四年南康郡男子獻丨丨有丨云虞喜志林銅鼓鑄馬援好騎名馬交趾得駱越丨丨乃丨為馬式范曄後漢書洛陽聞會稽城門有大鼓名雷門越擊此鼓聲間丨丨前王尊傳注漁陽撾後禰衡善擊鼓曹操召為雷史因大㑹試音節衡參丨丨丨蹀𨄌而前鼓無聲晉武帝得吳郡臨正岸崩出一石丨打之丨丨以問張華華云可以蜀中桐木刻作魚形扣之則鳴如言果聞數十里劉敬叔異苑鼓名聖秦鑿桂陽縣閣下丨自奔逸於臨武遂之洛陽因丨丨鼓今臨武有聖鼓城地王韶之始興記又始興郡桂陽縣有豫章木徑可長二丈作丨丨丨鼓秦時伐此木果忽自奔洛陽白氏六帖太常禁鄭餘慶兼判太常卿事自朱泚亂都輦數驚丨丨𨽻樂丨用鼓餘慶以時久平奏復舊制宫中奏五代張薦明為道士高祖召見延入內殿薦明聞丨丨丨時鼓曰陛下聞鼓乎其聲一而已五音十二律鼓無一焉然和之者鼓也善羯鼓詞宋璟尤丨丨丨丨云南山起雲北山起雨者宋所作也持羯鼓來上嘗聽琴未終遽止之曰速令花奴丨丨丨丨為我解穢南卓羯鼓録泗州重修鼓樓記烈而悲者角之聲歡而壯者鼓之聲烈與悲似義歡與壯似勇夫軍以義集以勇進故軍城例建樓鼓角於正門以嚴暮警夜二物用固均凡發語雖先鼓而後奏角先鳴者蓋欲勇生於義柳宗元記里鼓賦異哉鼓之設也恢制度於天邑佐大理於時行即行贊盛容而立之斯立觀其象可以守威儀之三千節其音可以表吉行之五十配和鸞以入用並司南而為急朱文公鼓銘擊之鏜兮朝既陽兮巧趨蹌兮詩集時時急村鼓丨丨丨杜鼕鼕打丨丨丨五更李鼓報新不勞鐘丨丨丨丨杜鼓聲不起雲重丨丨寒丨丨李賀百面如雷腰鼓丨丨丨春丨坡古今合璧事類備要外集卷十三
