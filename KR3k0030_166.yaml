body:
  text: 古今合璧事類備要續集卷十六宋謝維新撰類姓門樂南陽角音古今姓纂宋微子之後戴公生公子衎字樂父子孫以王父字為氏事類昌國君樂毅合連四國之兵以伐齊大破之遂屠七十餘城封為丨丨丨新序武襄君樂乘樂間之宗也仕趙封為丨丨丨人水鏡晉樂廣文彥輔衛瓘曰此丨之丨丨見之瑩然若披雲霧而覩青天國士風樂道融少有志好學不倦與朋友有信每約己而務周急有丨丨之丨嘉其清節樂法才字元備幼有美名沈約曰法才實才子為建康令不受俸秩比去將至百金縣曹啓輸臺庫梁武丨丨丨丨曰可以為百城表矣號稱彊直樂運字承業抑挫豪右丨丨丨丨為露門學士北史願處諫官樂運嘗丨丨一丨丨從容諷議發憤録夏商以來諫諍事集而部之名曰諫苑奏上隋文帝嘉焉召為編修皇朝樂史字子正撫州宜春人也母夢異人令吞五色珠而生史獻金明池賦丨丨三館丨丨于河內羽音古今姓纂周武王第二子邘叔子孫以國為氏其後去邑單為于氏東海漢有于公生丞相西平公定國生永御史大夫事類陰德前漢于公其閭門壞父老方共治之公謂曰少髙大令容駟馬髙蓋車我治獄多丨丨未嘗有所寃子孫必有興者至定國為丞相永為御史大夫封侯𫝊世云生祠于定國字曼倩東海郯人父于公為縣獄吏郡法曹决獄平郡中立丨丨號曰于公祠西平侯于定國學法于父超為廷尉朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉民自以不寃遷御史大夫為丞相封丨丨丨古名將魏于禁字文則攻張繡禽吕布圍張超攻眭周皆被斬之太祖曰將軍在亂能整討暴堅壘有不可動之節雖丨丨丨何以加之耆年歌功于謹字思敬負佐時之略逢周文興運之期為大厦之棟梁擬巨川之舟楫卒以丨丨碩德譽髙望重禮備上庠丨丨司樂賜杖延年于謹為三公丨丨丨丨武帝幸太學以食之作平梁歌于謹既平梁周文令司樂丨常山公丨丨丨十首使工人歌之著述志賦于宣敏字仲達年十一詣周趙王招命之賦詩詩甚有幽貞之志坐客莫不嗟賞常以盛滿之誡昔賢所重每懷靜退丨丨丨丨以見志焉世執貞節于忠字思賢宣武賜之劒杖舉酒屬忠曰卿丨丨丨丨故恆以禁衛相委昔以卿行忠賜名曰忠今以卿才堪禦侮以所御劒杖相錫書題黑矟于栗磾少習武藝材力過人劉裕嘗遺其丨丨曰丨丨公麾下栗磾好持黑矟故有其號明元因授為黑矟將軍纍世貴盛于徑字鍾葵自栗磾至徑丨丨丨丨一皇后四贈公三領軍二尚書令三開國公明斷無雙于仲文字次武為安固太守州刺史屈突尚坐事下獄無敢繩者仲文窮之遂竟其獄蜀中語曰丨丨丨丨有于公不避彊禦有次武扞城衛難于翼字文若為渭州刺史宴先蒞此州翼又推誠布信事存寬簡夷夏感悅比之大小馮君後為安州幽州總管翼兼文武之寄受丨丨之託智能足以丨丨勢力足以勤王曽無釋位之心但務隨時之義𢎞名節以髙貴豈所望於斯人並同上樂賢下善唐于休烈志寧曾孫歷清要不治産性恭儉仁愛丨丨丨丨推轂士甚衆年老嗜學不厭湖陂修復于頔字允元後周太師謹七世孫為湖州刺史有丨丨久廢命丨丨歲穫粳稻無慮萬計掌書露布于公異李晟辟為丨丨記朱泚平丨丨於德宗曰臣既肅清宫禁祗奉寢園鍾簴不移廟貌如故帝咨嘆一再時隴西徴音古今姓纂齊有賢人時子著書見孟子新論有時農巨鹿魏有夀春令時苗後趙有謁者僕射時軌姓苑云並巨鹿人也事類檢校太尉五代時溥徐州人為州牙將黃巢亂京師節度使支詳遣溥與陳蕃率兵五千西討至萊蕪大破之諸將皆有功惟溥功第一加檢校司徒同中書門下平章事進丨丨丨丨兼中書令巨鹿郡王彭城大族時氏丨丨丨丨度江而南一居秀之崇德一居吳興一居廬陵居崇德則某之外王父也嘗為登聞檢院通判吉州知雷州卒葬崇德兩子伯舅諱歈不及仕死亦兩子長嘉之迪功郎其季三嵗隨母適廬陵伍姓從伍姓今年三十三矣某守臨川同舍郎王宣子守廬陵遣人訪尋得之告以世家為更其名曰起之而字之曰子家仲舅名檄居官廉正惠愛辨治今為朝散郎新通判汀州子男四人勝之恭之文之惠之未艾也居吳興曰衍之卒官朝請大夫成都運判子五人雋登進士科傑侃佐行以任入官居廬陵曰開之兩子佑倚某於時氏既外諸孫因書遺子家使概知其生出本末云張于凱贈時起之序傅清河商音古今姓纂殷相說之後築於傅巖因以為姓北地人漢末傅氏居南陽事類刺樓蘭王傅介子北地人以從軍為官求使大宛斬胸奴使丨丨丨丨封義陽侯蘭臺令史後傅殷字武仲作迪志詩為丨丨丨丨捧簡整帶晉傅𤣥字休奕為御史中丞每有奏劾或值日暮丨白丨丨簪丨竦踊不寐坐而待旦於是貴游懾伏臺閣生風摩鱗觸鬚傅咸字長虞剛簡有大節為御史中丞丨天子逆丨丨猛獸之丨同上皆謂傅聖傅琰字季圭父僧祐山陰令有能名琰仕宋為武康令遷山隂令並著能名二縣丨丨之丨丨稱為學府傅昭字茂逺虞通之貽其詩曰英妙擅山東才子傾洛陽清塵誰能嗣及爾遘遺芳仕梁歷位左戶尚書博極古今世丨丨丨丨専典詔命傅亮字季友咸之𤣥孫入直中書省丨丨丨丨南史有理縣譜傅琰父子並著竒績時云諸傅丨丨丨丨子孫相傳不以示人同上下馬露布傅永字修期拜安逺將軍魏帝每歎曰上馬能擊賊丨丨作丨丨唯傅修期耳北史改刻定軍唐傅奕善數自言其學不可𫝊又注老子集晉魏以來與佛議駮者為髙識篇武德時所丨漏丨丨十二丨號皆詔奕云青山白雲傅奕相州人卒自諡曰傅奕丨丨丨丨人也以醉死堯俞諡獻可皇朝傅堯俞字欽之鄆州項城人元裕四年拜中書侍郎在位三年卒丨丨丨元通金石人傅楫字元通嘗從學於陳襄襄稱之曰傅丨丨丨丨丨也以其女妻之使金不肯拜傅察字公晦孟州濟原人宣和七年接伴金丨時金人已渝盟察至燕山聞幹離不入寇或勸其毋遽行察曰銜命以出聞難而止若君命何遂行至境上遇斡離不領兵至斡離不怒曰爾乃丨丨我耶麾令去察知不免謂其下曰彼脅我以拜我義不辱我必死矣贈徽猷閣待制皮天水徴音古今姓纂風俗通周卿士樊仲皮之後後漢有諫議大夫皮究下敕後漢上計掾秦嘉集序皮仲固撰晉有尚書郎事類勳貴子弟皮子信機悟有風神位儀同三司於丨丨丨丨中稱其識鑒北史唐之文士皮日休丨丨丨丨所著請韓文配享書桃花賦九諷七愛悼賈諸篇見之文粹卞清陽羽音古今姓纂曹叔振鐸之後支庶食采於卞因以氏焉魯有卞莊子楚有卞和事類成人子路問丨丨子曰若卞莊子之勇文之以語禮樂亦可以為丨丨矣注莊子卞邑大夫泣玉卞和楚人得玉璞於楚山獻武王使人相之曰非也王怒刖其右足成王即位和抱玉泣於楚山下淚盡繼之以血成王使玉人理之乃得寶名曰卞氏之璧卞氏六龍晉卞壼字望之父粹字𤣥仁兄弟六人並登宰府世稱丨丨丨丨遍習五經卞華字昭雅丨丨丨丨仕梁兼五經博士說經析理為當時之冠南史不仕賦枯魚卞彬字士蔚險拔有才在齊丨得丨進為丨丨丨以喻意齊汝南徴音古今姓纂炎帝姜姓之後太公望姜子牙受封營丘為齊國因氏焉又衛大夫齊德齊豹戰國時齊時周人也春秋書齊豹曰盜三叛人名以懲不義事類稱王佐才唐齊浣字洗心定州人少開敏年十四見李嶠嶠丨有丨丨丨善風教職齊浣景雲初姚崇取為監察御史凡劾奏常先風教號善職解事舍人齊浣開元初姚崇復相用為給事中中書舍人論駁及詔誥皆援準古誼朝廷大政必咨之時號丨丨丨丨清毅頌美齊浣為汴州刺史以丨丨聞吏民丨丨世謂臺選齊浣李元紘當國表宋璟為吏部尚書浣為侍郎丨丨丨丨嘗奏事帝指政事堂曰非卿尚誰居者康京兆商音古今姓纂衛康叔支孫以諡為姓也事類嚴整長厚康絢字長明少倜儻有志氣仕齊為華山太守推誠撫循荒餘恱服領安陸大守大修城隍號為丨丨寬和少喜懼在朝見人如不能言號為丨丨南史上疏詔奬康澄唐明宗時為大理少卿嘗丨丨曰臣聞童謡非禍福之本祅祥豈隆替之源夫雊雉升鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長是知國家有不足懼者五有深可畏者六陰陽不調不足懼三辰失行不足懼小人訛言不足懼山崩川涸不足懼蟊賊傷稼不足懼賢人藏匿深可畏四民遷業深可畏上下相狥深可畏廉恥道消深可畏毁譽亂真深可畏直言蔑聞深可畏不足懼者願陛下存而勿論深可畏者願陛下修而靡忒丨丨之解御衣帶賜五代康延孝代北人見末帝任用羣小知其必亡乃以百騎奔莊宗莊宗丨丨丨金丨以丨之為小馬坊使康福蔚州人世為軍校以騎射事晉王為偏將莊宗嘗曰吾家以羊馬為生福狀貌類胡人而豐厚胡宜羊馬乃令福牧馬於相州丨丨丨丨丨逾年馬大蕃滋明宗自魏反兵過相州福以小坊馬二千匹歸命明宗軍勢由是益甚伍安定羽音古今姓纂楚大夫伍參生舉生晉奢生尚員員字子胥奔吳其子又為王孫氏適齊事類胥山伍子胥楚人吳王賜以屬鏤之劒以鴟夷革盛尸浮之江中吳人憐之為立祠江上因命曰丨丨史記椒舉伍舉楚大夫邑於椒故曰丨丨英雋為冠前伍被楚人以材能稱為淮南中郎淮南王安招致丨丨以百數被丨丨首守靜衡門晉伍朝字世明游心物外丨丨丨丨余下邳商音古今姓纂新安風俗通云田余之後代居歙州事類改孝義里孝義余齊人少有學行父亡號呌而絶有司丨其里為丨丨丨南史論貶仲淹皇朝余靖字安道韶州曲江人舉進士遷祕書丞集賢校理范仲淹以言事忤意貶饒州諫官御史不敢言靖上疏丨仲淹不當丨且言陛下親政以來屢逐言者恐鉗天下口不可坐落職知秦州以母憂去官遷知制誥余靖慶厯中除右正言方是時仁宗勵精政事增諫官貟將有所為靖數言事合意丨丨丨丨三使北戎余靖丨丨丨丨時相忌之出知吉州坐習蕃語奪官嘉祐六年起知處州帥潭移青卒諡襄元河南商音古今姓纂衛大夫元咺之後其先食采於元因氏焉今元城是也其後子孫無聞河陽洛陽縣後魏書官氏志曰拓跋氏改為元氏自云黃帝子昌意之後居北土代為鮮卑君長宋書云李陵之後昌意三十九代至昭成帝什翼犍始號代王都雲中道武改號魏即尊號孝文帝都洛陽改為元氏十一代十五帝一百六十一年事類奏議元巖字君山剛鯁有器局以名節自許仕隋拜兵部尚書每有丨丨侃然正色廷爭面折無所回避上及公卿皆敬憚之時議唐元結後魏常山王遵十五代孫蘇源明見肅宗薦結可用召詣京師上丨丨三篇帝悅曰卿能破朕憂著元子代宗立固辭丐侍親歸樊上授著作郎益著書作自釋曰河南元氏望也結元子名也次山結字也世業載國史世系在家牒少居商餘山丨丨丨十篇故以元子為篇同上猗玗子唐元結天下兵興逃亂入猗玗洞始稱丨丨丨稱浪士元結後家瀼濵乃自丨丨丨呼漫郎元結及有官人以為浪者亦漫為官乎丨為丨丨更聱叟元結既客樊上漫遂顯樊左右皆漁者少長相戲丨曰丨丨彼誚以聱者為其不相從聽不相鉤加帶笭箵而盡船獨聱齖而揮車酒徒得此又曰公之漫其猶聱乎公守著作不帶笭箵乎又漫浪於人間得非聱齖乎公漫久矣可以漫為叟北門學士元萬頃諸儒論撰楚中萬頃與選凡撰列女傳臣軌百寮新戒樂書等九十餘篇至朝廷疑議表疏皆密使參處以分宰相權故時謂丨丨丨丨呼元才子元稹字微之河南人長於詩與白居易名相埒天下𫝊諷號元和體宫中丨為丨丨丨詩號絶唱元稹在越時辟竇鞏鞏工為