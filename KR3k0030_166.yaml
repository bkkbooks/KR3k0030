宣帝察其材任宰相欲詳試其政事復以為左馮翊結綬相薦蕭育字次君以父任為太子庶子少與朱博為友長安語曰蕭朱丨丨言其丨丨達也大事先訪齊蕭介字茂鏡㑹侍中闕帝曰我門中久無此職宜用蕭介為之應對左右多所匡正遷都官尚書每軍國丨丨必丨丨介帝謂朱异曰端右材也臨戎奮發梁蕭摩訶字元𦙍驍勇有名訥於言恂恂長者至丨丨對寇志氣丨丨所向無前到縣挂冠蕭視素梁天監中位丹陽尹丞武帝賜錢八萬一朝散之親友榮利不關於中喜怒不形於色後為諸暨令丨丨十餘日丨衣丨於縣門而去諡曰貞文先生號曰卧虎蕭惠開遷御史中丞百寮憚之拜益州刺史嚴用威刑蜀人丨丨丨丨呼為宗老蕭琛字彥瑜惠開從子仕梁嘗預御筵醉伏武帝以棗投之琛取栗擲中正中面曰陛下投臣以赤心臣敢不報以戰栗上每丨丨丨丨筆趣欲飛蕭引字叔休善書為當時所重陳宣帝嘗披奏事指引署名曰此字丨丨翩翩似鳥之丨丨引謝曰此乃陛下假其毛羽耳上封建議唐蕭瑀字時文梁明帝子太宗時丨丨丨丨謂社稷臣蕭瑀上嘗丨瑀不可以利怵死懼丨丨丨也賜詩曰疾風知徑草版蕩識忠臣又曰公守道耿介古無以過上言賜金蕭瑀每丨使宜上詔曰得公丨社稷所賴朕既寶之丨黃丨一函蕭鈞真諫議丨丨有才譽為諫議大夫盧文操盜庫財髙宗以自盜論死鈞曰若是則天下謂陛下重貨輕法帝曰丨丨丨也詔原死姚崇稱逺到蕭嵩丨丨丨其丨丨十七年兼中書令在公謹密人莫見其際以王佐自任蕭遘字得聖負大節丨丨丨丨丨既當國風采峭整天子器之自瑀逮遘凡八葉宰相為天子耳目蕭至忠沂州人遷監察御史劾奏蘇味道贓貪曰故事臺無長官御史丨丨丨丨也其所請當專執禮號夫子蕭頴士字茂挺四嵗屬文十嵗補太學生觀書一覽朗誦通百家譜系書籕學舉進士對䇿第一補祕書正字名播天下盧異等皆丨弟子丨丨蕭丨丨倭國入朝自陳國人願得蕭夫子為師者齊名號蕭李李華與穎士丨丨世丨丨丨同上歌唱可以娛神後周蕭大圜字仁顯四嵗能誦三都賦及孝經論語心安閒放嘗云閭閻有優游之美朝廷有簪佩之纍北山之北棄絶人間南山之南超踰世網藉纎草以䕃長松結幽蘭而援芳桂丨纂纂丨烏烏丨丨丨丨可以散慮淹雅敏而好學蕭圓肅字明恭風度丨丨丨丨丨丨周明帝時改太子少傅作少傅針太子見而悅之尹天水徴音古今姓纂少昊之子封於尹城因氏焉風俗通云師尹也以官也於官為姓周有尹吉甫事類不可干私前漢尹翁歸字子兄河東平陽人拜東海太守于定國欲屬託邑子兩人與語終曰不敢見其邑子既去謂曰此賢將丨丨丨以丨為三輔最尹翁歸入守右扶風緩於小弱急於豪强京師畏其威嚴課常丨丨丨丨髙第選守前尹賞字子心巨鹿人以三輔丨丨丨丨長安為虎穴以大石覆其口收捕奸猾以次內其中百人為輩覆以大石數日一發視皆相枕藉死三輔吏民甚畏之佐命元功晉尹緯字景亮少有大志不營産業每覽書傳至宰相立勳之際常輟書而嘆姚萇起為丨丨丨丨坎地獲㦸尹思貞其家丨丨丨古丨十二俄而門樹㦸時人異焉遍明六經尹知章絳州少學忽夢人持巨鑿破其心納若劑焉驚悟志思開徹遂丨丨丨丨畏尹卿筆唐尹思貞京兆人弱冠以明經第授司府少卿時卿侯知一亦厲威嚴吏為語曰不畏侯卿杖祗丨丨丨丨北京三傑唐尹元凱坐事免栖遲不出者三十年又有富嘉謨吳少微等並負文辭時稱丨丨丨丨靜退為樂本朝尹元字師魯河南人沈存中筆談云師魯與一節者談師魯自言以丨丨丨丨其人曰此猶有所繫不若進退兩忘師魯頓若有所得隱几之日文正來哭之師魯忽舉頭曰己與公别安用復來死生常理也希文豈不達此乃揖而逝俄頃又舉頭曰亦無鬼神亦無驚怖言訖長往師魯所養至此可謂有力矣尚未能脫有無之見得非進退兩忘猶存於胸中與以文學老尹焞字彥明以丨丨行義丨於山林古今合璧事類備要續集卷十六
