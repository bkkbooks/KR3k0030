body:
  text: 古今合璧事類備要别集卷五宋謝維新撰都邑門嶮要輿地提綱天下之嶮要不勝言也善用嶮者常使嶮在我而不使在敵嶮在我則敵不容窺嶮在敵則我反制於敵矣試相與論天下之嶮要可乎夫左崤函右隴蜀秦關之險也西有濁河之限北有勃海之利齊國之嶮也鄭之嶮在虎牢蜀之嶮在劒閣吳之嶮襟三江而帶五湖楚之嶮城方城而池漢水趙不據井陘使信得之故趙為信虜陳豨不據邯鄲使漢有之故豨為漢擒自古嶮要之地當使在我而不當使在敵嶮要不在我而在敵則敵得以用之而制我矣或者猶曰四嶽三塗陽城太室荆山終南非不嶮也而所厯非一姓三苗氏以洞庭彭蠡為嶮夏桀之居以伊闕羊腸為嶮商受之國以孟門太行為嶮嶮則嶮矣而今安在哉抑豈知嶮不可失亦烏可恃故魏文侯寶山河之固而吳起以為在德不在嶮晉平公恃其國之嶮而司馬侯乃以不可為固言之然則彼特徒嶮而已矣徒嶮而無德未有不亡者也後之立國者慎毋以嶮為可恃而反求諸其德則亦庶幾矣事類地險天嶮不可升也丨丨山川丘陵也王公設險以守其國險之時義大矣哉易坎卦要塞孟夏之月命司徒循行積聚無有不斂壞城郭戒門閭修鍵閉慎管籥固封疆備邊竟完丨丨謹關梁塞溪徑注丨丨邊城要害處記月令阻路司險掌九州之圖以周知其山林川澤之丨而達其道丨設國之五溝五凃而樹之林以為阻固皆有守禁而達其道丨國有故則藩塞丨丨而止行者以其屬守之唯有節者達之禮夏官巖邑鄭莊公即位薑氏為叔段請制公曰制丨丨也虢叔死焉他邑唯命注虢叔東國君恃制巖嶮而不修德鄭滅之左隱傳秦殽陵秦伐鄭召孟明西乞白乞使出師於東門之外蹇叔哭之曰孟子吾見師之出而不見其入也公使謂之曰爾何知中夀爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉其南陵夏后臯之墓也其北陵文王之所辟風雨也必死是間余收爾骨焉注此道在二殽之間南谷中谷深委曲兩山相嶔故可以避風雨古道由此魏武帝西討巴蜀惡其嶮而更開北山髙道又以其深嶮故左僖三十二楚方城諸侯遂伐楚楚子使屈完如師齊侯陳諸侯之師與屈完乘而觀之齊侯曰以此衆戰誰能禦之以此攻城何城不克對曰君若以德綏諸侯誰敢不服君若以力丨國丨丨以為城漢水以為池雖衆無所用之屈完及諸侯盟注方城山在南陽華縣南言竟土之逺漢水出武都至江夏南入江言其險固以當城池齊平隂諸侯會于魯濟同伐齊丨侯禦諸丨丨塹防門而守之廣里夙沙衛曰不能戰莫如守險弗聽諸侯之士門焉齊人多死云云齊侯登巫山以望晉師晉人使司馬斥山澤之險難所不至必斾而疏陳之齊侯見之畏其衆也乃脫歸左襄十八年鄭虎牢諸侯會于戚孟獻子請城虎牢以逼丨年注丨丨舊鄭地今屬晉襄二魯武城吳伐魯子泄率故道或嶮從武城初武城人有因於吳竟田焉拘鄫人之漚菅者曰何故使吾水滋及吳師至拘者道之以伐武城克之左襄八孟氏保障魯將墮成公斂處父謂孟孫墮成齊人必至於北門且成丨丨之丨丨也無成是無孟氏也子偽不知我將不墮冬十二月公圍成弗克左定十二趙氏保障趙簡子以尹鐸為晉陽請曰以為繭絲乎抑為保障乎簡子曰保障哉後智伯攻丨丨襄子乃走晉陽三家以國人圍而灌之城不沒者三板沈竈産蛙民無叛意通鑑周威烈紀晉國河山晉侯宋公齊國歸父崔夭秦小子憗次于城濮楚師背酅而舍晉侯患之子犯曰戰也戰而捷必得諸侯若其不捷表裏山河必無害也注丨丨外丨而使丨左僖二十八魏國山河魏武侯浮西河而下中流顧謂吳起曰美哉山河之固此魏國之寶也通鑑周安王紀巴蜀道狹丨丨相攻秦惠王欲伐蜀以為丨嶮丨難至命司馬錯伐取之通鑑周慎靚王紀巴蜀道嶮項與范增隂謀曰丨丨丨丨秦之遷人皆居之乃曰巴蜀亦關中地也故立沛公為漢王王丨丨漢中都南鄭而三分關中三秦降將章邯等三人以距塞漢路通鑑漢髙帝紀燒絶棧道漢王之國張良送至漢中漢王遣良歸韓良因説漢王丨丨所過丨丨以備諸侯盜兵注棧棚也架木為之亦名閣道史張良傳築為甬道漢擊楚於滎陽大破之楚以故不能過滎陽而西漢王軍滎陽丨丨丨丨屬之河以取敖倉粟通鑑髙帝紀車不得方韓信張耳以兵數萬東擊趙二王及成安君陳餘聞之聚兵井陘口號二十萬廣武君李左車説成安君曰韓信張耳乘勝逺鬬其鋒不可當云云今井陘之道丨丨丨丨軌騎不得成列數百里其勢糧食必在後願足下假臣竒兵三萬人從間道絶其輜重足下深溝髙壘勿與戰不十日而兩將之頭可致於麾下否則必為二子擒矣成安君常自稱義兵不用詐謀竒計韓信使人間視知其不用廣武君策大喜乃敢引兵遂下未至井陘三十里止舍平旦鼓行出井陘口大戰破趙軍韓信傳軍不得渡齊楚與漢夾濉水而陳韓信夜令人為萬餘囊盛沙壅水上流引軍半渡擊龍且佯不勝還走龍且果喜曰固知信怯遂追之信使人決壅囊水大至龍且軍大半丨丨丨即急擊殺龍且虜齊王同上船不得去公孫述遣田戎等據荆門虎牙橫江水起浮橋關樓主攢柱以絶水道結營跨山以塞陸路拒漢兵漢遣岑彭攻田戎不克彭令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時東風狂急魯竒船逆流而上直衝浮橋而攢柱有反杷鈎竒丨丨丨丨竒等乘勢殊死戰因飛炬焚之風怒火盛橋欄崩燒彭長驅入江關後光武紀依洛陽阻來歙得二千餘人伐山開道從番須回中徑襲略陽斬隗囂守將金梁囂大驚曰何其神也帝聞得略陽喜曰略陽囂所依阻心腹已壞則制其支體易矣來歙傳拒浩亹隘馬成等破河池遂平武都先零諸種羌數萬人屯聚冦鈔丨丨丨丨成與馬援深入討擊大破之注浩音誥亹音門金城邑舋者水流峽山間兩岸深若門焉俗呼閣門河馬成傳氊裹推轉晉鄧艾伐蜀進至隂平鑿山通道造作樓閣山髙谷深至為艱嶮又糧運將匱瀕於危殆艾以丨自丨丨丨而下將士皆攀木緣崖魚貫而進先登至江油長驅而前三國志鐵鎖橫截吳人於江磧要害處丨丨丨丨之又作鐵錐長丈餘暗置江中以逆拒舟艦晉王濬作大筏數十方百餘步縛草為人被甲持斧令善水者以筏先行遇鐵錐處輒著筏而去又作火炬長十餘丈大數十圍灌以麻油在船前遇鎖燃炬燒之須臾融液斷絶於是船無所礙克金陵晉史濬傳長江天塹隋伐陳陳後主謂建康王氣在北來者無不摧敗孔範曰丨丨丨丨古以為限虜軍豈能飛渡通鑑長誠闕雍州天府唐髙祖都長安至代宗時吐蕃犯京代宗幸陜程元振請正都洛陽郭子儀曰丨丨古稱丨丨之國右隴蜀左殽函地方數千里帶甲十餘萬真用武之國秦漢所以成帝業也洛陽地陜幸厄才數百里險不足以為防適為關場惟及時亟還以天下帝遂還京師唐子儀傳重在關隘攻燕山之地北戎入燕有三關之限曰松亭曰古北曰居庸而平州之東有榆關實金人入寇之路凡此數關可以限蕃漢一夫守之可以當百宣和姦臣知取燕而不知取燕之險蓋燕之重以有關限之蔽也得燕而無險與不得燕何異况平州與燕山異路當時金人但未歸燕京六州耳即未嘗盡得關內之地而金人自平州而入冦此乃議割燕山不明地理之故也金在沙漠神宗元豐五年种諤上言厯觀前世本路敵人與中國隔限者利害丨丨丨丨若彼率衆度漠入攻彼先困我渡漠往攻則我先困然而西戎常能為邊患者以漠南有山界之粟可食山界之民可使有山界之要害險固可守若能使漠南無此則彼之贏糧罷師自可以開關延敵以待勞聖政江南七渡左司諫吳表臣言大江之南上自荆鄂下至常潤十郡之間其要緊處不過七渡上流最急者三荆南之公安石首嶽之北津中流最緊者二鄂之武昌太平之采石下流最緊者二建康之宣化鎮江之瓜州是也惟此七渡當擇官兵修器械其餘略為之防足矣詔以付沿江守師長編淮南三口嘉定七年七月真德秀直前奏言今淮東要害在清河之口敵之糧道實出於兹而淮隂無尋丈之城無尺寸之兵徒以山陽可恃而已然山陽雖大前無淮陽之蔽後無寶應之援若敵以軍兵遮前竒兵斷後則髙郵淮陽之路絶而山陽之形孤山陽不守則通泰危而江浙震矣淮西糧道在渦潁之口敵之糧道亦自此而出而濠梁安豐城則單薄地則堙狹兵則單虛徒有廬和可恃而已然有安豐之屏扞則敵始不得以犯合肥有濠梁之蔽則敵始不得以走厯陽借有他徑可由而吾以廬和當前而濠夀斷後則彼有腹背之虞我有掎角之助其能深入乎欲固兩淮須防三口此非臣之臆説也李白蜀道難嗟吁􅐵危乎髙哉蜀道之難難於上青天蠶叢及魚鳬開國何茫然爾來四萬八千嵗不與秦塞通人煙西當太白有鳥道可以橫絶峩眉巔地崩山摧壯士死然後天梯石棧相鈎連上有六龍回日之髙標下有衝波逆折之回川黃鶴之飛尚不得過猿猱欲渡愁攀援青泥何盤盤百步九折縈巖巒捫參厯井仰脅息以手撫膺坐長歎問君西遊何當還畏途巉巖不可攀但見悲烏號古木雄飛呼雌繞林間又聞子規啼夜月愁空山蜀道之難難於上青天使人聽此凋朱顔連峯去天不盈尺枯松倒挂倚絶壁飛湍瀑流爭喧豗砅崖轉石萬壑雷其嶮也如此嗟爾逺道之人胡為乎來哉劒閣峥嶸而崔嵬一夫當關萬人莫開所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家蜀道之難難於上青天側身西望長咨嗟華翠徵讜議臣聞屯守之地當其衝要則一人之力可以敵萬矣非其衝要則萬夫之勇不足以敵一人故秦人守要害之地而并吞六國司馬仲達據四達之衝而吳蜀不敢爭齊人之守渤海鄭人之戍虎牢孔明之屯渭南孫權之塢濡須皆是道也然一國有一國之衝要天下有天下之衝要不知重守其所謂要害之區而一切泛然於賊人不由之道則兵旅日增費用日廣吾見其勞師匱財於非所用力之地彼間之可乘隙之可伺固亦自若而堂堂之中國將為無人之境矣今日之形勢閩蜀之外莫淮漢急也故淮東之地屯儀真維揚以當漣泗海亳之衝屯合肥南巢以當渦濠汝潁之衝漢中之地屯黃岡漢陽以斷安復之衝屯襄陽樊城以斷唐鄧之衝此其選擇形勢精據利便固無可議然地之相去千有餘里其間小徑間道姑置不論通都天驛平原曠野類皆屯戍遺闕臣竊憂之取淮而言自柘臯南巢草鞋嶺野父山廬江至瓦隔河固足以入江自安豐桃城金牛航步沙湖版橋羅場鎮至盤小寨亦足以入江矣然算陂巢口之水峻如瀉油鐵腳楊梅之峭如立壁敵雖雲蒸霧集倍道而至中間險阻﨑嶇林木茅塞未足深畏至若自濠梁升髙山麗山大青山韭山定逺黃蓮皇甫山梁縣望桑根山宣宗而至項亭則東西數舍南北一望髙則平岡小坡不過尋丈卑則淺溝狹澗不過數步既無關隘可以遏其鋒復無屯戍可以絶其後賊若徑從此徑突入和州屯兵楊林梁山白山等處控扼大江東浚柵江裕溪以造舟楫比浚東關肥水以通漕運借曰未能涉我風濤之險所謂國家湖南江西嵗計米麥之運不敢東下則版曹告匱而骨髓先枯浙西淮東按月茶鹽榷貨之商不敢西上則諸路總司無措而肝腦先潰此濠梁厯陽之虛實江淮之勝負係焉可無重兵以守之耶取漢而言自長樂平林新店陽城石井河步石河而入安河固足以入漢自桐柏范莊馬岡補口勸羊湖營河而入隨河亦足以入漢矣然應山大靖尚有鄉兵圍結土門九里尚有舊關故壘敵雖越險而來亦不足畏至若自唐州湖陽分界山至棗陽自車橋湯川至郢州自湖窊走馬岡道入林上石至隨州則北自唐鄧南至漢水無林可依無澗可隔雖有兖河守把之卒而地無關隘不足以扼其衝雖有華陽棗林義勇之兵而勢非險阻不足以抗其鋭賊若徑從此徑突入漢右復取樊城栁林山谷石堰長蘭白本等處直渡漢水北據荆門虎牙斑竹馬梁諸關以為自固之策南據江陵建陽潛江以為屯守之計置襄陽於不攻而前襲荆南則襄陽已在其圈圓之中棄光化於不爭而逺憑巫峽則光化已居其囊括之內借曰未能舳艫千里以爭我東下之勢所謂三巴之險已塞而吳蜀有離析之憂荆襄之區不全而江淮無掎角之勢此隨州棗陽之虛實荆襄之得失係焉是豈可以不問耶近日諸將惟知以重兵固守渦口南巢而濠梁定逺反視為間慢之地故賊兵大入於環滁厯陽之郊惟以重兵固守神馬坡樊城而車橋胡窊上石反視為不急之所故賊兵大入於安復郢隨之境此其衝要自今宜令行下淮漢帥臣搜尋前件險隘分兵固守差官節制明立斥堠近置策應吾軍進取留此以為徑捷之道而避取其有先入之便賊軍入冦則設此以為掩襲之所而其有闞我之謀則三邊之形勢可全而淮漢之津可無濟涉之憂矣是謂屯要詩集崆洞薄塞外苦厭山南行道彌惡岡巒相纒亘雲水氣參錯材逈硤角來天窄壁面削磎西五里石奮怒向我落仰看日車側俯恐地軸弱魑魅哭有風霜霰浩漠漠昨憶踰隴坂髙秋視吳嶽東笑蓮花卑北知丨丨丨超然侔壯觀已謂隱寥廓突兀猶趁人及兹嘆冥漠杜青陽峽棧道濕細泉兼輕冰沮洳丨丨丨不辭辛苦行迫此短亭急石門雲雷隘古鎮峯巒集旌竿暮慘淡風水白刃澀胡馬毛成單防虞此何及嗟爾逺戍人山寒夜中泣杜龍門鎮玄自兹晨發赤谷岸險難丨丨丨亂石無改轍我車已載脂山深苦多風落日童稚飢杜赤谷不可度行邁日悄悄山谷勢多端雲門轉絶岸積阻霾天寒寒峽丨丨丨我實衣裳單况當仲冬交泝沿增波瀾野人尋煙語行子傍水餐此生免荷殳未敢辭路難社寒峽不易論道路栗亭西上想鳳凰村季冬攜童稚辛苦赴蜀門南登木皮嶺艱嶮丨丨丨汗流被我體祁寒為之暄逺岫爭輔佐千巖自崩奔始知五嶽外别有他山尊仰干塞天明俯入裂厚坤云云髙有廢閣道摧折如短轅杜木皮嶺未可傍惟天有設嶮劒閣天下壯連山抱西南石角皆北向兩崖崇墉倚刻畫城郭狀一夫怒臨關百萬丨丨丨珠玉走中原岷峩氣悽愴三皇五帝前雞犬莫相放後王尚柔逺職貢道已喪至今英雄人髙視見霸王并吞與割據極力不相讓吾將罪真宰意欲鏟疊嶂恐此復偶然臨風默惆悵杜劒門大雞斷十月隂風盛北風無時休茫茫洞庭岸與子維雙舟霧雨晦爭枻波濤怒相投丨丨丨四德糧絶誰與媒相去不容步嶮如礙山丘云云能令暫開霽過是吾無求韓洞庭湖阻風贈張十一著驛馬隤念昔從君渡湘水大帆夜劃窮髙桅陽山鳥路出臨武丨丨摳地驅頻丨踐蛇茹蠱不擇死忽有飛詔從天來韓憶昨行車輪摧羊腸路詰曲丨丨為之丨如馬戒舟巨石水中央江寒出水長沈牛答雲雨丨丨丨丨航天意存傾覆神功接混茫干戈連解纜行止憶垂堂杜灔澦堆射工伺影瘴江南去入雲煙望盡黃茆是海邊山腹雨晴添象迹潭心月暖長蛟涎丨丨巧丨遊人丨颶母偏驚旅客船從此憂來非一事豈容華髮待流年杜嶺南江行瞿塘誰敢過白帝城邊足風波丨丨夜月丨丨丨李白荆州歌北上何所苦丨丨丨丨丨北上緣太行磴道盤且峻巉巖淩穹蒼馬足蹶側石車輪榷高岡沙塵接幽州烽火連朔風殺氣毒劍戟嚴風烈衣裳奔鯨夾黃河鑿齒屯洛陽前行無歸日返顧君舊鄉云云汲水澗谷阻採薪隴坂長猛虎又掉尾磨牙皓秋霜云云嘆此北上苦停驂為之傷何日王道平開顔覩天光李白北上行濤浪相衝撞廬山高哉幾千仞兮根盤幾百里截然屹立乎長江長江西來走其下是為楊瀾萬里兮洪濤巨浪日夕相卷撞上磨青蒼以黯靄下壓厚土之洪厖歐陽廬山髙江山昔最雄平時都邑今為陋敵國丨丨丨丨丨荆楚先賢多勝迹不辭攜酒問鄰翁歐陽公夷陵嵗暮書事呈元珍表臣古今合璧事類備要别集卷五
