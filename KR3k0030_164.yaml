body:
  text: 古今合璧事類備要續集卷十四宋謝維新撰類姓門雲邳琊徵音古今姓纂雲之姓有三其見於祝融之後封於羅號妘子見於國語又云作鄖者是也其見於春秋之晉大夫有所謂藝質其見於西漢有所謂云敞字幼孺者是也又見於河南後魏書官氏志宥連氏改為雲氏者是也要之妘云雲下皆從云四姓相通在春秋則從女而為云或從草而為云在漢則單出而為云在北朝則從雲而為云其實一也今自大河以北如雲中人多此姓故罕見於江南今特敘四姓相通以為之類事類縉雲丨丨氏左又雲姓乃丨丨氏之後雲師少昊氏以雲紀故為丨丨而雲名同上志節前漢云敞字幼孺平陵人師事吳章及王莽斬章禁錮弟子不得仕官門人盡更名它師敞時為大司徒掾自劾吳章弟子收章葬之京師稱焉將軍王舜髙其丨丨比之欒布薦為中郎諫大夫器仗雲定興善製丨丨在隋擢少府丞纍遷屯衛大將軍北史蘇武功羽音古今姓纂顓頊祝融之後陸終生昆吾封蘇鄴西蘇城是也蘇忿生為周司冦居河內也扶風武功漢蘇建自河內徙扶風平陵事類敬獄立政周公若曰太史司冦蘇公式丨爾由丨以長我王國書忿生為武王司冦封蘇佩印蘇秦東周雒陽人説六國合從丨六國相丨史記膚使張騫蘇武之奉使也執節沒身不屈王命雖古之丨丨其猶劣諸楊子杖節蘇武字子卿不降胸奴齧雪咽旃丨漢丨牧羊在胸奴凡十九嵗及還拜為典屬國圖形蘇武甘露元年上思股肱之美乃丨畫其丨於麒麟閣遊擊前蘇建杜陵人以校尉從衛青有功為平陵侯後為丨丨將軍出朔方為右將軍出定襄按事後漢蘇章字孺文為冀州刺史故人為清河太守行部按其姦贓為設酒肴章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史丨丨者公法也遂舉正其罪州境畏肅詳見刺史門有人譽蘇淑字仲和除樂陵內史在郡綏撫甚丨丨丨厯滎陽中山二郡太守清心愛下為吏人所思稱為良二千石北史典機密蘇綽字令綽纍世二千石綽有王佐才對周文指陳帝王之道周文不覺膝之前席曰綽真竒士即拜行臺左丞參丨丨丨舉三秀蘇亮字景順綽從兄亮與弟湛皆著名西土一家丨丨丨才同上稱所舉隋蘇夔字伯尼威之子博覽群言尤以鍾律自命隋詔天下舉達禮樂源者晉王昭舉夔帝曰惟此一人丨吾丨丨戎服獻功唐蘇烈字定方冀州人正觀初從李靖襲頡利於磧口討髙麗拜右屯衛將軍擢定方伊麗道行軍大總管縛賀魯以還由是修亭障列蹊隧定疆畛唐之州縣極四海矣高宗臨軒定方丨丨奉賀魯以丨䇿丨拜邢國公侍宴進言蘇世長京兆人丨丨披香殿酒酣進曰此煬帝作邪帝曰卿好諫似直然詐也此殿我所營乃詭云煬帝邪對曰臣但見傾宫鹿臺非受命聖人所為者今乃即隋之宫加雕飾焉欲易其亂得乎帝咨重其言以文翰顯蘇味道趙州人九嵗能屬辭與李嶠丨丨丨丨時號蘇李練臺閣事蘇味道裴居道倩味道作章攬筆而具間徹清密當時盛傳丨丨丨故丨善占對一攬千言唐蘇頲字廷碩瓌之子弱敏悟丨丨至丨丨輒覆誦第進士武后封嵩髙舉賢良方正異等為載曰古稱一日千里蘇生是己號大手筆蘇頲與張説以文章顯稱望略等故時丨燕許丨丨丨帝愛其文曰卿所為文章朕當留中李德裕著論曰近世詔誥惟頲敘事外自為文章云思若湧泉蘇頲玄宗平內難書詔填委獨頲在太極後閣口所占授功狀百緒輕重無所差李嶠曰舍人丨丨丨丨吾所不及何愧前人時李乂掌書命帝曰前世李嶠蘇味道文擅當時號蘇李及朕得頲與乂丨丨丨丨制誥給食蘇頲起為工部侍郎辭不拜帝問宰相有自工部侍郎得中書侍郎乎對曰陛下用賢何資之計乃詔以頲為中書侍郎頲頓首謝明日加知丨丨事制誥給食自頲始召見延英蘇辨字元容良嗣從孫擢進士纍倉部郎中判度支案裴延齡死帝丨辨丨丨丨賜紫衣金魚副知度支事位郎中上度攴有副自辨始聽事公坐蘇珦雍州人調鄠尉時李美琰為長史多訟珦裁決明辨自是無訴者美琰異之顧丨丨曰此丨丨也後來王粲蘇晉珦之子數嵗知為文作八卦論房頴叔王紹宗歎曰丨丨之丨丨也不敢燒尾蘇瓌字昌容雍州人拜尚書右僕射同中書門下三品進封許國公時大臣初拜官獻食天子名曰燒尾瓌獨不進臣誠不稱職丨丨丨丨進左僕射以上並唐事翰林美事皇朝蘇易簡字大簡梓州銅山人為翰林學士淳化中充承旨易簡多振舉翰林故事太宗為飛白書院額曰玉堂及以詩賜之太宗曰此永為丨丨中一丨丨易簡曰自有翰林未有如今日之榮也欹器進戒太宗又草書宋玉大言賦賜易簡易簡因擬賦以獻一日易簡當禁直以水試丨丨太宗曰聞卿所玩非欹器耶易簡曰然乃進曰日中則妟月滿則虧器盈則覆物盛則衰願陛下持盈守成固萬世之基業天下幸甚行草墨寶蘇舜卿字子美易簡之孫耆之子長於古文歌詩丨丨士大夫收之以為丨丨作亭自適蘇舜欽數上書言朝廷之事范仲淹薦其才得集賢校理監進奏院用故紙祠神會賔客為御史所紏坐除名舜欽既廢居蘇州買水石丨滄浪丨以丨丨眉山老蘇蘇洵字明允眉州丨丨人屢舉進士賢良不中至和嘉祐間與其二子軾轍至京師歐陽修得洵書二十篇大愛其文辭以為賈誼劉向不過也以其書獻諸朝名動京師蘇氏文章遂擅天下一時學者以其父子俱知名號為丨丨在藩聞軾名蘇軾字子瞻神宗因丨丨丨丨丨欲以唐故事召入翰林宰相韓琦曰蘇軾之才逺大之器也天下之士莫不畏慕降伏皆欲其進用然不若朝廷培養之而後用也金蓮送歸院蘇軾嘗鎖宿禁中中使宣召入對便殿宣仁曰先帝每誦卿文章必嘆曰竒材竒材但未及進用卿上仙耳命坐賜茶徹御前丨丨燭丨丨丨潘榮陽羽音古今姓纂周文王後畢公之子季孫食采於潘因氏焉事類掌環列楚穆王立以其為太公之室與潘崇使為大師且丨丨丨之尹蹲甲射潘黨與養由基丨丨而丨徹七札焉以示楚王曰君有二臣如此何憂於戰左號為竒童晉潘嶽字士安鄉邑丨丨丨丨籍田間居潘嶽作丨丨賦仕官不達乃作丨丨賦如江濯錦潘嶽思緒雲騫辭鋒景煥嶽藻丨丨丨美丨而增絢御輿乘軒潘嶽太夫人丨版丨丨輕丨逺覽王畿近周家園一代談宗潘京字世長樂廣與之共談曰君天才過人恨不學耳若學必為丨丨丨丨以上並晉事茂松清泉唐潘師正居逍遙谷髙宗幸東都召見問所須對曰丨丨丨丨臣所須也既不乏矣帝尊異之詔即其廬作崇唐觀殫費飲遊潘孟陽憲宗立詔孟陽馳驛江淮加鹽鐵轉運孟陽從者數百人所至會賔客留連倡樂譽望大損其後左司鄭敬宣慰江淮帝誡曰朕宫中用尺寸物皆有籍唯賑民無所計卿是行毋若潘孟陽丨財丨酣丨丨山寺而已詩多犯杜本朝潘大臨字邠老江西人專學山谷為詩謝無逸嘗以書問有新詩否答曰秋來景物件件是佳句恨為俗氣蔽翳昨日得句云滿城風雨近重陽忽催租人至遂敗人意止一句奉寄王直方云邠老丨丨丨老丨為之不已老杜亦難為存活老杜復生則須與潘十厮炒葛河南商音古今姓纂風俗通葛天氏之胤子孫氏焉夏時葛伯嬴姓國也亦為葛氏河南官氏志賀葛氏改為葛氏事類慷慨過人後漢葛龔字元甫和帝時以善文記知名丨丨壯烈勇力丨丨博聞深洽晉葛洪字稚川以儒學知名究覽典籍尤好神仙導養之法從祖玄學道得仙號曰葛仙翁洪聞交趾出丹求為勾漏令丨丨丨丨江左絶倫自號抱朴子因以名書後尸解得仙而去奚譙國商音古今姓纂夏車正奚仲之後事類作誥湯歸自夏至于大坰仲虺丨丨仲虺臣名奚仲之後書為相奚仲居薛丨湯左丨左仲兄奚牧重厚有智謀魏道武寵遇之稱曰丨丨北史賢臣唐奚陟病危帝遣醫療視敇曰陟丨丨為我善治之文辭清麗奚陟字尹卿京兆人少篤志通羣書大厯末擢進士丨丨丨丨科授洪文館校書郎砥礪名節奚陟少自丨丨著丨丨嘗薦權德輿為起居舍人知制誥使表自副崔河圖丨吐蕃丨陟丨丨水詔勞問崔河圖江南淮西大丨丨陟丨丨所至人人便安范髙平宫音古今姓纂帝堯劉纍之後在周為唐杜氏周宣王滅杜杜伯之子隰叔奔晉為士師曽孫士會食采於范遂為范氏魏有范座項羽謀臣范增居巢人事類世祿穆叔如晉范宣子逆之問焉曰古之人死而不朽何謂也丐之祖自虞以上為陶唐氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂丨丨非不朽也左祈福晉范文子反自鄢陵使其祝宗丨死曰君驕侈而克敵難將作矣使我速死無及於難范氏之丨也家事治子木問於趙孟曰范武子之德如何對曰夫子之丨丨丨言於晉國無隱情諸侯選韓起之下魏舒范鞅皆丨丨丨也綈袍故人范雎字叔魏人事須賈使齊襄王賜金及牛酒須賈知之以告相魏齊齊笞擊雎折脅摺齒雎佯死得出入秦説昭王後拜相須賈使秦雎聞之敝衣微行之邸見賈賈驚曰范叔固無恙乎留與坐飲食乃取一丨丨賜之雎歸取大車駟馬為賈御入秦相府賈待門下良久問門下曰范叔不出何也門下曰乃吾相君也賈大驚肉袒膝行謝罪曰不意君能自致青雲之上雎曰汝所以得無死者以綈􅀈戀戀有丨丨之意故釋公扁舟江河范蠡師事計然蠡用於越既雪會稽之恥乃乘丨丨浮於丨丨變名易姓適齊為鴟夷子皮之陶為朱公乃治産積居與時逐十九年之中三致千金再分散與貧交疏昆弟故言冨者皆稱陶朱公贓汙解去後漢范滂字孟博汝南人少厲清節為州里所服冀州飢荒以為清詔使按察之及至州境守令丨丨望風丨丨詳見刺史門甑塵釡魚范冉或作丹字史雲好違時絶俗為激詭之行為萊蕪長後辟太尉府以狷急不能從俗常佩韋於朝閭里歌曰丨中生丨范史雲丨中生丨范萊蕪人士並化晉范宣字宣子十嵗能誦詩書常以講誦為業皆聞風宗仰自逺而至諷讀之聲有若齊魯曰是江州丨丨丨好經學丨其風也郡稱神明范雲字彥龍善屬文下筆輒成為始興內史郡多盜賊雲撫以恩德商賈露宿丨中丨為丨丨南史居亷讓間范柏年初見宋明帝言次及廣州貪泉因問御史復有此水不答曰梁州惟有文川武鄉亷泉讓水又問鄉宅在何處曰臣所丨丨丨之丨帝嗟其善答因見知將命著名范縝字子真齊永明中簡才學之士以為行人使魏縝丨丨丨丨鄰國夢筆善屬文皇朝范質字文素大名宗城人母張氏丨人授五色丨而質生九嵗丨丨丨愛文傳衣鉢范質初和凝知貢舉丨質所試丨自以中試在第十三故亦以處質其後質官及封國皆與凝同當時謂之丨丨丨廉節無與比范質太宗嘗言近世輔弼循規矩惜名器持丨丨丨丨質丨者但欠世宗一死為可惜爾入蜀得偉人范鎮字景仁成都華陽人薛奎守蜀還朝或問奎丨丨所得曰丨一丨丨當以文學名於世謂鎮也奏名居第一范鎮舉進士禮部丨丨丨丨故事殿廷唱第過三人則禮部第一人者必越次抗聲自陳因擢置上第鎮不肯自言至第七十九人乃出拜退就列無一言廷中皆異之先天下而憂范仲淹字希文唐相履氷之後其先邠州人後徙蘇州少有大志於富貴貧賤毁譽歡戚一不動其心而慨然有志於天下嘗自誦曰士當丨丨丨之憂丨丨後天下之樂而樂此其志也負將相器業范仲淹少作金在鎔賦云如令區别妍媸願為軒鑑若使削平禍亂請就干將則自丨丨丨丨丨文武全材槩可見矣西賊驚破膽范仲淹有威名軍中為之語曰軍中有一范丨丨聞之丨丨丨修通鑑十五年范祖禹字淳父司馬光辟同編丨資治丨丨凡丨丨丨書成光上章稱薦曰臣誠不及也進唐鑑十二卷范祖禹丨丨丨丨