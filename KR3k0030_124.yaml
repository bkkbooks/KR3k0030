body:
  text: 古今合璧事類備要後集卷五十五宋謝維新撰閣舍門知閣門事歷代沿革即古者擯相之職也周禮大行人掌九儀及賓客之位漢有通事舍人聖朝橫班有內客省使崇政殿受朝則升東階侍立掌四方進奉及四夷朝貢牧伯朝覲酒饌饔餼宰相近臣禁衛將校節儀諸州進奉使賜物回詔之事引進使四方館使唐四方館以通事舍人判𨽻中書省石晉始有為卿監專掌判館者皇朝初以檢校官判館淳熙四年改置使名掌文武官正謝辭國忌賜香諸道月旦正至章表郊禮朝蕃官貢舉人進奉使京官閣任官道釋父老陪位之事會要東上閣門使西上門使凡取稟旨命供奉乘輿朝會遊宴及贊導三公羣臣蕃國朝見辭謝紏彈失儀之事使副専之舍人以下但通班贊君而已會要其供職于內者多用國戚世族號為華要禮均侍從政和官制橫班使副之名既改為大夫而其職任則命內外官知焉職略其後所除總名知閣門事仍兼客省四方館之職焉紹興三年詔客省四方館並隸臺察先是御史臺六察所𨽻官司有因一時申明免𨽻臺察去處至是殿中侍御史常同乞依舊制施行所貴百司庶務有所按察不敢違戾故也中興會要四年詔依祖宗舊制𨽻中書省不𨽻臺察中興會要五年詔右武大夫以上並稱知閣門事兼客省四方館事若官未至右武大夫者即稱同知同兼序在知閣門之下同上事類三揖丨丨而進記九􅉔辨丨丨周禮館主宋永初置南北賓客館主四方賓客之事因改為四方館舊儀於通事舍人中以宿長一人總知館事謂之丨丨凡四方貢納及章表皆受之類要宿長見上注館老咸平四年故事閣門長一人判四方館謂之丨丨長編又續通典以為唐故事上閣見官制熟於宣導晉天福二年檢校兵部尚書陳瓚守衛尉卿兼通事舍人判館事以其丨丨丨丨故雖位三品猶總管事續通典謂之喚仗國朝承五代之弊文德殿東西有上閣門而無上閣按唐宣政殿門之中朝也是為正衙紫宸直其北是謂上閣蓋自晉太極有東西閣天子間以聽政閣之名起於此方唐盛時立仗於宣政天子坐紫宸而金吾殿中細仗自東西閣門入丨丨丨丨今文德殿唐宣政正衙也而垂拱直其北紫宸乃在東偏文德殿東西但有上閣二門未審以何處為上閣直參詳典故正上閣之名復有唐盛事馬文昌雜録皆聳儕輩太祖朝客省使張保續為衛尉卿判客省閣門事保績在閣門前後四十年宣贊詞令聽者丨丨丨丨推其能故特寵之長編一沮宦官仁宗時殿內崇班錢晦纍遷閣門使宦官王守忠領節度觀察留後牒閣門定朝位燕坐晦因對言天子大朝令宦官坐殿上必為四夷所笑守忠又欲以禮服進酒晦以為不可禮官議與晦同而言事官亦有言守忠由是丨丨丨丨東上西閣天祐二年勑東上西上閣門制置各别至於常事則以丨丨居先或大忌進名遂用丨丨非便頃緣閹豎擅權以陰陽敘立不思南面但啓西門詳其稱禮似爽規儀自今定依舊制續通典橫行知閣紹興元年詔主管閣門宋籛孫轉行橫行一官落權字上曰籛孫乃藩邸內知客稍習閣門儀注而法非丨丨不許丨丨門故與進橫行一官中興會要上閣之闈丨丨丨丨政和制禁閽之謁主丨丨丨丨胡文恭行向傳範制擯相之職見沿革賓贊之寮思得戎班之俊長吾丨丨丨丨其服端闈統司謁者肅等威於表著之位傳臚句於陛廉之間同上贊相上下內朝之使若朱華二閣丨丨丨丨時為榮近政和制練習朝章丨丨丨丨曲阜四方館使曹誘制崇三揖之儀唐張方云既丨丨丨丨丨設九賓之禮愛丨丨丨丨丨同上詩集登黃閣扈從丨丨丨明公獨妙年蛟龍得雲雨雕鶚在秋天杜甫贈嚴閣老詩同知閣門事歷代沿革國朝東西上閣門副使雖無定員然選任不及疏逺而所置常少於正使之數政和官制以左武右武郎易二閣副使而閣門事乃命橫行知焉則同知之職乃昔時之所謂副使也職略事類朱華惟丨丨之上閣當太微之法宫胡文公行馬懷德制副介置丨丨之名用承諸使同上閣門宣贊舍人歷代沿革故事閣門無通事舍人而通事舍人沿唐制自𨽻中書省如抽赴閣門並稱閣門祗候其後直授閣門通事舍人非舊制也天禧中去閣門二字政和六年改為宣贊舍人政和六年御筆閣門通事舍人名行鄙俗可改為宣贊舍人詔旨事類行人周禮有大丨丨小行人謁者漢丨丨隨行通事孫處約曰得為丨丨舍人在殿中周施吐納可也識儀唐宗室李復從父若水為金吾大將軍兼通事舍人容貌瓌偉在陽廷三十年多丨舊丨每宣勞揖贊進止間華有可觀者相導丨丨通贊之節宣揚起拜之儀引而導之不聞失禮白集李晟制宣揚見上注升降揖遜管仲曰丨丨丨丨進退間習臣不如隰朋今之通事舍人近此選也進退間習見上注辭令進止唐崔崇禮字安上涉書傳以節義自將武德中官通事舍人其丨丨觀者皆竦職林忠孝勤謹國朝仁宗時李惟賢為通事舍人在閣門習朝儀制數奏事稱旨仁宗賞忠信李惟賢五字又賜以李惟賢丨丨丨丨七字束𢃄曵裙丨丨丨丨為吾謁者白集李成制束𢃄贊謁丨丨丨丨出入省户以與賓客言公是行夏伸制贊命上閣丨丨丨丨舒信道除周士謹制出入省户丨丨丨丨贊相朝命公是行除夏伸制宣納禁職丨丨丨丨於上閣而轉清胡文恭行曹修制參典中涓特丨丨於丨丨柴貽範制典謁天墀丨丨丨丨之華制胡文恭行王恭特升宣納丨丨丨丨之名同上宣傳辭令丨丨丨丨相導儀規間於其事必得其人曲阜行髙世賞通事舍人制相導儀規丨丨丨丨同上升贊殿中特丨丨於丨丨柴貽範制宣傳中制丨丨丨丨江從可並同上制館職清流見閣門祇候門武烈髙選上閣贊導之官丨丨之丨丨曲阜賈祐制賓贊選髙宸闈二閣處天下户班之俊而輝制丨丨之職其丨尤丨龍溪除甘赤墀久立再𨽻朱華之閣久待赤塗之墀胡文恭柴貽範制建官朱閣舊典通事本𨽻西臺近制丨丨則領丨丨非善音吐有姿範者不得與選胡文恭行李推寶制典司中謁丨丨丨丨同上行李繼明制贊導左右之任辨色而朝百辟輯瑞以會萬方正錯立族談之儀宣注意登庸之命鏘鏘濟濟進退以時名為侍臣丨丨吾丨丨者通事舍人丨丨唐元微之行盧均制音吐姿範者選見上建官朱閣注閣門舍人歷代沿革國朝乾道中孝宗始倣儒臣館閣之制增置閣門舍人以待武舉之入官者先詔試而後命又許轉對如職事官供職滿二年與邊郡遂為戎帥部刺史之選云近嵗熊提刑飛雄知閣熙載薑節使特立之進皆自此階故武臣以舍人為清要紹熙初蔣介有召試之命葛楚轉丞相言介武舉第一人乞免試上從之朝野雜記事類視館職淳熙中孝宗幸祕書省丞相史浩奏閣門舍人陛下方以丨丨丨亦各參與坐於西廊見浩行狀待武舉見上沿革閣門祇候歷代沿革國朝舊以閣門通事舍人閣門祇候二等謂之門職蓋武臣之清選也閣門通事舍人閣門祗候二等比館職清流為進取之基非熟於朝儀不在此選又有看班祇候以命世家親進及擢閣門點檢使臣為之而點檢官乃知班使之長者二年無過遂改看班政和間改通事作宣贊且不復選人才而監處不知其數人不以為貴也官制舊典舊止三五員天禧初上與輔臣語及減吏員向敏中曰太祖太宗朝閣門祗候不過三五員宣導贊謁而已今踰數百而除授未已上曰此蓋相承為例當漸省之熙寧四年閣門請擇武臣子弟六人前後殿日祇應以閣門看班祇候為名候五年熟識儀數乃除閣門祗候事類贊導置之上閣往參丨丨曲阜姚師望閣門制祗事丨丨上閣爾實宜之向子華除閣門制同上聨班選上閣丨丨維時髙選初寮除杜宰制立員額神宗即位之初用宫邸直省官郭昭選為閣門祗候司馬光言此祖宗蓄養賢才在文臣為館職其重如此今豈可責以求財乞賜裁省故詔閣門並丨丨丨武臣清選見官制館職清流同上非以恩授真宗時王夫人恩聖節乞補閣門帝曰此職丨可丨丨澤授也不許掌在上閣朝廷之客丨丨丨丨初寮除曹俊制古今合璧事類備要後集卷五十五
