  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_124-1a, image: WYG0940/WYG0940-0210a.png}
body:
  text: 古今合璧事類備要後集卷五十五宋謝維新撰閣舎門知閣門事歴代㳂革即古者擯相之職也周禮大行人掌九儀及賓客之位漢有通事舎人聖朝横班有内客省使崇政殿受朝則升東階侍立掌四方進奉及四夷朝貢牧伯朝覲酒饌饔餼宰相近臣禁衞将校節儀諸州進奉使賜物回詔之事引進使四方館使唐四方館以通事舎人判𨽻中書省石晉始有為卿監專掌判館者皇朝初以檢校官判館淳熙四年改置使名掌文武官正謝辭國忌賜香諸道月旦正至章表郊禮朝蕃官貢舉人進奉使京官閣任官道釋父老陪位之事㑹要東上閣門使西上門使凡取禀㫖命供奉乗輿朝㑹游宴及贊導三公羣臣蕃國朝見辭謝紏彈失儀之事使副専之舎人以下但通班贊君而已㑹要其供職于内者多用國戚世族號為華要禮均侍從政和官制横班使副之名既改為大夫而其職任則命内外官知焉職畧其後所除總名知閣門事仍兼客省四方館之職焉紹興三年詔客省四方館並隸臺察先是御史臺六察所𨽻官司有因一時申明免𨽻臺察去處至是殿中侍御史常同乞依舊制施行所貴百司庶務有所按察不敢違戾故也中興㑹要四年詔依祖宗舊制𨽻中書省不𨽻䑓察中興㑹要五年詔右武大夫以上並稱知閣門事兼客省四方館事若官未至右武大夫者即稱同知同兼序在知閣門之下同上事類三揖丨丨而進記九􅉔辨丨丨周禮館主宋永初置南北賓客館主四方賓客之事因改為四方館舊儀於通事舎人中以宿長一人緫知館事謂之丨丨凡四方貢納及章表皆受之類要宿長見上注館老咸平四年故事閣門長一人判四方館謂之丨丨長編又續通典以為唐故事上閣見官制熟於宣導晉天福二年檢校兵部尚書陳瓚守衞尉卿兼通事舎人判館事以其丨丨丨丨故雖位三品猶緫管事續通典謂之喚仗國朝承五代之弊文徳殿東西有上閣門而無上閣按唐宣政殿門之中朝也是為正衙紫宸直其北是謂上閣葢自晉太極有東西閣天子間以聴政閤之名起於此方唐盛時立仗於宣政天子坐紫宸而金吾殿中細仗自東西閤門入丨丨丨丨今文徳殿唐宣政正衙也而垂拱直其北紫宸乃在東偏文徳殿東西但有上閤二門未審以何處為上閤直參詳典故正上閤之名復有唐盛事馬文昌雜錄皆聳儕輩太祖朝客省使張保續為衞尉卿判客省閤門事保績在閤門前後四十年宣贊詞令聴者丨丨丨丨推其能故特寵之長編一沮宦官仁宗時殿内崇班錢晦累遷閤門使宦官王守忠領節度觀察留後牒閤門定朝位燕坐晦因對言天子大朝令宦官坐殿上必為四夷所笑守忠又欲以禮服進酒晦以為不可禮官議與晦同而言事官亦有言守忠由是丨丨丨丨東上西閣天祐二年勑東上西上閤門制置各别至於常事則以丨丨居先或大忌進名遂用丨丨非便頃緣閹䜿擅權以陰陽叙立不思南面但啟西門詳其稱禮似爽規儀自今定依舊制續通典横行知閣紹興元年詔主管閣門宋籛孫轉行横行一官落權字上曰籛孫乃藩邸内知客稍習閤門儀注而法非丨丨不許丨丨門故與進横行一官中興㑹要上閤之闈丨丨丨丨政和制禁閽之謁主丨丨丨丨胡文恭行向𫝊範制擯相之職見㳂革賓贊之寮思得戎班之俊長吾丨丨丨丨其服端闈統司謁者肅等威於表著之位𫝊臚句於陛廉之間同上贊相上下内朝之使若朱華二閤丨丨丨丨時為榮近政和制練習朝章丨丨丨丨曲阜四方館使曹誘制崇三揖之儀唐張方云既丨丨丨丨丨設九賓之禮愛丨丨丨丨丨同上詩集登黄閣扈從丨丨丨明公獨妙年蛟龍得雲雨鵰鶚在秋天杜甫贈嚴閤老詩同知閣門事歴代㳂革國朝東西上閤門副使雖無定員然選任不及疎逺而所置常少於正使之數政和官制以左武右武郎易二閤副使而閣門事乃命横行知焉則同知之職乃昔時之所謂副使也職畧事類朱華惟丨丨之上閤當太微之法宫胡文公行馬懐徳制副介置丨丨之名用承諸使同上閣門宣贊舎人歴代㳂革故事閤門無通事舎人而通事舎人㳂唐制自𨽻中書省如抽赴閤門並稱閤門祗候其後直授閤門通事舎人非舊制也天禧中去閤門二字政和六年改為宣贊舎人政和六年御筆閤門通事舎人名行鄙俗可改為宣贊舎人詔㫖事類行人周禮有大丨丨小行人謁者漢丨丨隨行通事孫處約曰得為丨丨舎人在殿中周施吐納可也識儀唐宗室李復從父若水為金吾大将軍兼通事舎人容貎瓌偉在陽廷三十年多丨舊丨毎宣勞揖贊進止閑華有可觀者相導丨丨通贊之節宣揚起拜之儀引而導之不聞失禮白集李晟制宣揚見上注升降揖遜管仲曰丨丨丨丨進退閑習臣不如隰朋今之通事舎人近此選也進退閑習見上注辭令進止唐崔崇禮字安上渉書傳以節義自将武徳中官通事舎人其丨丨觀者皆竦職林忠孝勤謹國朝仁宗時李惟賢為通事舎人在閤門習朝儀制數奏事稱㫖仁宗賞忠信李惟賢五字又賜以李惟賢丨丨丨丨七字束𢃄曵裙丨丨丨丨為吾謁者白集李成制束𢃄贊謁丨丨丨丨出入省户以與賓客言公是行夏伸制贊命上閣丨丨丨丨舒信道除周士謹制出入省户丨丨丨丨贊相朝命公是行除夏伸制宣納禁職丨丨丨丨於上閤而轉清胡文恭行曹修制參典中涓特丨丨於丨丨柴貽範制典謁天墀丨丨丨丨之華制胡文恭行王恭特陞宣納丨丨丨丨之名同上宣𫝊辭令丨丨丨丨相導儀規閑於其事必得其人曲阜行髙世賞通事舎人制相導儀規丨丨丨丨同上升贊殿中特丨丨於丨丨柴貽範制宣𫝊中制丨丨丨丨江從可並同上制館職清流見閤門祇候門武烈髙選上閤贊導之官丨丨之丨丨曲阜賈祐制賓贊選髙宸闈二閤處天下户班之俊而輝制丨丨之職其丨尤丨龍溪除甘赤墀乆立再𨽻朱華之閣乆待赤塗之墀胡文恭柴貽範制建官朱閣舊典通事本𨽻西臺近制丨丨則領丨丨非善音吐有姿範者不得與選胡文恭行李推寳制典司中謁丨丨丨丨同上行李繼明制贊導左右之任辨色而朝百辟輯瑞以㑹萬方正錯立族談之儀宣注意登庸之命鏘鏘濟濟進退以時名為侍臣丨丨吾丨丨者通事舎人丨丨唐元微之行盧均制音吐姿範者選見上建官朱閣注閣門舎人歴代㳂革國朝乾道中孝宗始倣儒臣館閤之制増置閤門舎人以待武舉之入官者先詔試而後命又許轉對如職事官供職滿二年與邊郡遂為戎帥部刺史之選云近嵗熊提刑飛䧺知閤熙載姜節使特立之進皆自此階故武臣以舎人為清要紹熙初蒋介有召試之命葛楚轉丞相言介武舉第一人乞免試上從之朝野雜記事類視館職淳熙中孝宗幸祕書省丞相史浩奏閤門舎人陛下方以丨丨丨亦各參與坐於西廊見浩行狀待武舉見上㳂革閣門祇候歴代㳂革國朝舊以閤門通事舎人閤門祇候二等謂之門職葢武臣之清選也閤門通事舎人閤門祗候二等比館職清流為進取之基非熟於朝儀不在此選又有看班祇候以命世家親進及擢閤門點檢使臣為之而㸃檢官乃知班使之長者二年无過遂改看班政和間改通事作宣贊且不復選人才而監處不知其數人不以為貴也官制舊典舊止三五員天禧初上與輔臣語及减吏員向敏中曰太祖太宗朝閤門祗候不過三五員宣導贊謁而已今踰數百而除授未已上曰此葢相承為例當漸省之熙寜四年閤門請擇武臣子弟六人前後殿日祇應以閤門看班祇候為名候五年熟識儀數乃除閤門祗候事類贊導寘之上閣徃參丨丨曲阜姚師望閤門制祗事丨丨上閤爾實宜之向子華除閤門制同上聨班選上閤丨丨維時髙選初寮除杜宰制立員額神宗即位之初用宫邸直省官郭昭選為閤門祗候司馬光言此祖宗蓄養賢才在文臣為館職其重如此今豈可責以求財乞賜裁省故詔閤門並丨丨丨武臣清選見官制館職清流同上非以恩授真宗時王夫人恩聖節乞補閤門帝曰此職丨可丨丨澤授也不許掌在上閣朝廷之客丨丨丨丨初寮除曹俊制古今合璧事類備要後集卷五十五
