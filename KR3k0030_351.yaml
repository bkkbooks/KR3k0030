body:
  text: 古今合璧事類備要外集卷五十一宋謝維新撰床簀門床附榻胡床繩床器物叢談床簀也亦曰第寢具按釋名所以自裝載長八尺許榻又狹而卑者言其榻然近地也胡床即今之交床又名繩床蓋胡人偃坐而睡故名焉事類裝也床丨丨釋名輚也床身之安也簀床丨丨說文在床或息偃丨丨詩寢床載丨之丨詩剝床丨丨及膚易巽床丨在丨下易在床舜丨丨琴孟華元登宋丨丨丨子反之床季孫賜曾子寢疾病童子曰華而晥大夫之簀與曽子曰然斯丨丨之丨也我未之能易起易簀注簀床第華畫也晥文記獻象牙孟嘗君出行五國至楚丨丨丨床戰國策用龜搘見龜門注踞我床孔子將死遺祕書曰不知何一男子自稱秦始皇上我堂丨丨丨顛倒我衣裳至沙丘而亡後始皇至魯觀孔子宅至沙丘而崩論衡移公床齊徐孝嗣初在率府晝臥齊北壁下夢兩童子遽云丨丨丨孝嗣驚起聞壁有聲行數步壁崩踞床洗漢高祖酈食其求見方丨丨使兩女子丨前本傳坐床穿管寧家貧丨藜丨欲丨為學不倦拂床去唐虞願除後軍將軍禇彥回詣願不在見其眠床上積塵埃有書數卷彥回歎曰虞君之清乃至此令人掃地丨丨而丨懸一食床年公華隂山峯中人丨丨丨丨列仙傳臥六尺床宋賀革家貧躬耕供養年二十始輟來就父受業有六尺方床思義未達則橫丨其上不盡其義終不肯食終當坐此李靖左僕射楊素拊其床謂曰卿丨丨丨丨床終當據此封倫內史令楊素每撫其床曰封丨丨丨丨杜甫醉登丨丨嘗丨丨嚴武床瞪視曰嚴挺之乃有此兒武亦暴猛中銜之浩然懼匿孟丨丨王維私邀入內署俄而元宗至浩然匿床下維以實對帝喜曰朕聞其人而未見也何丨而丨詔浩然出堂有巨床李吉甫初政事丨㑹食丨丨丨相傳徙者宰相輒罷不敢遷吉甫笑曰世俗禁忌何足疑邪徹而新之軍不設床馮道丨中丨丨丨席卧一束芻而已五代史榻設一榻陳蕃為豫章太守不接賔唯徐孺子來特丨丨丨去則懸之擅一榻簡雍性簡傲自諸葛亮以下則獨丨丨丨須枕卧語無所為屈坐一榻管寧字幼安自丨丨木丨積五十年當膝處皆穿高士傳引僧同顔延之為祕書監光祿太常時沙門釋惠林以才學為文帝所賞朝廷政事多與之謀上每引見常升獨榻延之甚嫉焉因醉曰昔同子驂乘袁絲正色此三台之座豈可使刑餘居之上變色敕吏撤李峴同平章事故政事堂不接客自元載為相中人傳詔㫖者置榻待之峴至即丨丨丨榻同榻坐李勉父擇言張嘉正為益州都督性簡貴接部刺史倨甚擇言守漢州獨引丨丨丨連榻坐王毛仲與諸主及姜魄等侍禁中至丨丨而丨施特榻崔渙起家亳州司功參軍還調於是入判者千餘吏部侍郎嚴挺之丨丨丨胡床據胡床曬頭謝萬嘗詣王恬既坐少時王便入內謝殊有喜色謂必厚供待良久沐頭散髮而出亦復不坐乃丨丨丨在中庭丨丨神氣慨然了無相酬對據胡床談詠庾亮在武昌諸佐吏乘秋夜往共登南樓不覺亮至亮曰老子於此興復不淺便丨丨丨與浩等丨丨丨踞胡床奏笛桓伊善音樂畜一蔡雍柯亭笛嘗自吹之王徽之泊舟青溪側不相識伊於岸上過客稱伊小字曰此桓野王也徽之便令人謂曰試為我奏伊時貴顯素聞徽之名便下車丨丨丨而作三調弄畢便上車去客主不交一言留胡床掛拄魏裴潛為兖州刺史嘗作一胡床及去官留以掛拄據胡床安坐吐谷渾党項寇邉敕紹討之虜据高射紹軍兩矢士失色紹丨丨丨丨丨遣人彈琵琶使二女子舞虜疑之休射紹伺其解以精騎從後掩擊虜大潰唐本傳改名為交床隋以䜟有胡丨丨丨丨丨改名為繩床唐穆宗長慶二年十二月見羣臣紫宸殿御大繩床詩集白玉為丨丨丨君床選錦石支支床丨丨圓杜季秋江行茅棟蓋丨丨丨一床柴門風展卷丨床丨書丨杜水閣月照我明丨皎皎丨丨床選書連屋床上丨丨丨何氏山林只藜床衰病丨丨丨杜就匡床甘寢丨丨丨后山西齊有丨丨深且明中丨六尺床坡榻設華裀連榻丨丨丨謝靈運有清簟華榻丨丨丨韓陪杜侍御遊胡床淄館下傳名乃外域入用信中京足歌形已正文斜體自平臨堂對逺客命旅誓初征何如丨丨丨淹留奉盛明梁庾肩吾乘月坐丨丨丨胡床杜繩床獨坐翁繩床丨丨丨孟郊竒觀繞自許丨丨丨繩床山谷枕席門枕附裾席簟裀褥氊竹夫人湯婆器物叢談枕卧所以薦首社席坐卧所以藉身皆所以求安也簟又竹席裀褥氊竹夫人竹几也又曰青奴湯婆暖足缺亦多腳婆無非養體之具併及之事類角枕丨丨粲兮詩肱枕曲丨而丨之語高枕卧薛公曰使黥布出下計陛下丨丨而丨高枕王丨丨丨千里酈寄說吕祿吕産道士教泰山父者時漢武東巡見父鉏於道頭上白光高數尺呼問之對曰有丨丨丨臣作枕枕有三十二物二十四物應二十四氣八物應八風臣年轉少齒生淮南書漢丨丨王有枕鴻丨書中有神仙為金術暑則扇枕黃香字文儒丨月丨丨丨寒則身溫枕席東觀漢記寒則溫枕見上碎琥珀枕宋武帝時獻琥珀枕碎之為刀瘡藥漆龍頭枕太子納妃有丨丨丨支結丨東宮故事劾盜得枕合浦公主御史丨丨丨丨浮屠辨機金寶神枕自言王所賜按贓得枕盧簡辭盧昻坐贓簡辭窮丨得瑟瑟枕大如斗枕之遊仙龜茲國進枕一其色若碼瑙溫潤如玉製作甚工丨丨而寐則十洲三島盡在夢中帝因號丨丨枕後賜楊國忠唐開元遺事枕此如願開元中吕翁經邯鄲有盧生同止於邸主人方蒸黃梁翁取囊中枕以授盧曰丨丨當榮適丨丨生但記身適枕穴中未幾登第出入將相五十年榮盛無比其夕卒遂寤吕翁在旁黃梁尚未熟沈存中枕中記紅光照室虢國夫人有夜明枕置於堂中丨丨丨丨不假燭燈遺事紅紋如粟韋弇遇玉清之女持寶以贈出一枕似玉微丨有丨丨丨竒光炳然曰紅麩枕也唐張續宣室志潔如水晶元和八年大軫國貢重明枕長一尺二寸高六寸丨白丨丨丨中有樓臺之狀四方中有十道持香執簡循環不已謂之行道真人其瓦木丹青衣服簪紱纎悉備具通瑩如水覩物唐杜陽編理如綾紋臺山有色綾木丨丨丨丨窠百姓取為枕呼色綾枕雜俎名曰警枕武肅王錢鏐在軍中未嘗安寢每用圓木作枕睡熟則欹由是得晤丨丨丨丨及鎮撫二國至於末年每夕列侍女戒之曰外有報事當震聲以為警自是聞報即時而遣吳越備史為此拗枕崔謹由以元和元年登第至開成已入翰林因偶止之夕二更以來中使宣召引入數重門至一處堂宇華煥簾幕俱垂見左右二閹然蠟而坐謂謹由曰上不豫已數曰奉太后㫖命學士草廢立謹由大驚曰某有中外親族數千口列在縉紳長行兄弟甥姪三百人一日聞此覆族之言寧死不敢承命况聖上高明之德覆乎八方豈可輕議二閹默然良久引謹由至一小閣文宗坐於殿上二閹徑厯階而疏上唯俯首又曰不丨丨丨木丨措大更不復在此坐矣仍戒謹由曰事泄即是此措大也皮光業見聞録蔡雍枕銘應龍蟠蟄潛德保靈制器象物示有其形哲人降鑒居安慮傾羅衮枕銘或枕或欹有安有危勿邪其思崔駰六安枕銘枕有規矩恭一其德承元寧躬終始不忒六安枕言六靣安也蘇彥楠榴枕銘珍木之竒文鬱理鮮廉稜方正密滑真堅席清裾丨丨卧席也記曰請衽何趾白氏帖汚席虛坐盡後食坐盡前注嫌丨丨也長者異羣居五人則丨丨必丨人子坐為丨丨者丨不中席席如橋衡奉丨丨丨丨請席何鄉請衽何趾席南鄉北鄉以西方為上東鄉西鄉以南方為上席間函丈丨丨丨丨主人跪正席客跪撫席而辭客撤重席主人固辭客踐席乃坐以上並曲禮我心匪石丨丨丨丨不可卷也詩大路越席丨丨丨丨昭其儉也左可卷可舒席釋也丨丨丨丨釋名不正不坐席丨丨丨丨語十底席綴純丨丨丨丨注底蒻也綴雜綵也純緣也豐席畫純丨丨丨丨注豐完席也並天子朝燕之席書顧命哀公命席丨丨丨丨孔子曰儒有席上之珍以待聘衛侯坐席丨靈公天寒鑿池宛春諫曰天寒起土恐傷民公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒孔子坐席丨丨困於陳蔡之間居環堵之內丨三經之丨談苑曾子避席丨丨丨丨孝經舍者爭席楊朱南之沛至梁而遇老子曰而睢睢而盱䏏而誰與居大白若辱盛德若不足楊朱曰敬聞命矣其往也舍者迎將家公執席妻執巾櫛舍者避席煬者避竈其反也丨丨與之丨丨列黃帝家人販席臧文仲不仁者三妾織蒲丨丨丨丨與民爭利坐不重席孟懿伯相魯丨丨丨丨而登席褚師聲子事見􅀈注詳織席為食許行事見僂門注弊席為門陳平以丨丨丨丨前本傳夜半前席文帝思賈誼召至宣室丨丨丨丨餘半膝席漢相田蚡為夀坐者避席及竇嬰為夀故人避席丨丨丨丨専席獨坐武帝持詔御史中丞與司𨽻校尉尚書令㑹同並丨丨而坐故京師號曰三丨丨奪席重坐戴慿徴博士詔公卿大㑹羣臣皆就席慿獨立世祖問其意對曰博士說經皆不如臣而坐居臣上是以不得就席帝令與諸儒難說帝善之後正旦朝賀令臣說經更相難詰義有不通輒奪其席以益通者慿遂重坐五十餘席詔與絶席張禹為大傅尚書鄧太后以殤帝初育欲令重臣居禁內乃詔禹與三公絶席不與同席許敬字鴻卿其吏有誣君者㑹於縣令坐敬拔刀斷其席曰敬丨忍丨惡人丨丨以莞為席孝文丨丨丨丨東方朔以葮為席鄭敬丨茅丨丨丨先賢傳揖遜而坐吳議郎張純詣鎮南將軍朱據據曰為賦一物然後乃坐純賦曰席為冬設簟為夏施揖讓而坐君子攸宜世記半分而坐魏管寧與華歆讀書有乘軒冕者過門歆出看寧曰富貴須自致窺他人乎遂割席丨丨丨丨曰子非吾友也織席自給李恂為武成太守步歸結茅屋與諸生丨丨丨丨舉席自障盧懷慎門不施箔風雨至丨丨丨丨武王席銘丨丨踐阼席前左端之銘曰安樂必敬前右端之銘曰民一反一側爾不可不念後右端之銘曰所鑒不逺視爾之所代大戴禮簟篾席丨丨黼純注篾桃竹筍席丨丨𤣥紛純注筍弱竹並天子朝燕之簟書顧命莞上下丨丨簟詩席上丨丨之管簟淮南子籧篨宋魏間謂之笙或謂之籧曲自關之東謂之簟其粗者謂之丨丨直文而粗筕篖自關而東周楚魏之間謂之倚伴自關而西謂之丨丨方言桃笙丨丨象簟而於筒中左三都竹席簟丨丨也說文象牙車永為廣州刺史子溢多使工作丨丨細簟工甚患之王隱晉書賜一具晉公卿禮秩太宰何曾遜位丨簟䅶各丨丨無長物王恱見王恭六尺簟謂有餘求之恭即送後恱見恭更無簟恭曰平生丨丨丨賞花簟宋尚書令王儉嘗集才學之士總校虛實類物以𨽻之謂之麗事多者賞之惟盧江何憲為勝乃丨以五丨丨白團扇坐簟執扇容氣甚自得秣稜令王摛後至儉以所𨽻示之摛操筆便成舉坐賞擊摛乃命左右抽憲簟自製取扇登車而去坐竹簟房䅯六月召客丨丨丨雲仙散録叩頭録梁簡文答餉簟書筠簟多品篠簜雜名三伏餘炎九折成用劉孝儀謝賜簟啓麗並桃象周洽昏明便覺虛室以寒狐裘可襲雖九曰煎沙香粉不棄三旬沸海圓扇可捐裀褥文茵丨丨愓轂詩纍茵丨丨而坐子路未嘗敢均汲黯與周陽游同車丨丨丨丨裀褥醉不覺汚邴吉日馭吏丨丨丨丨丞相車裀慈明皮褥後漢荀爽丨丨為三公食不過一肉脫粟飯坐丨丨張昭氊褥吳丨丨非魯肅孫權不以介意賜肅母幃帳丨丨質無有緣上儉率茵褥取丨丨丨丨飾魏帝本紀體宜有常晉武帝年十二四時冬天晝日不著復衣夜則纍茵褥謝公曰丨丨令丨丨陛下晝過冷夜過熱世說賜以素褥魏徴帝賜素褥以從其尚贈以芳裀丨汝陽王永懷侍芳裀杜集却塵所為元載寵姬薛瑤英載為處却塵褥其褥出自句驪國一云是丨丨之獸毛丨丨也其色殷鮮光軟無比唐杜陽編落花鋪坐學士許謹選放曠不拘小節多為親友結宴花圃中未嘗具幄設坐只使僮僕輩聚丨丨丨丨下曰吾自有花裀開元遺事滿室清凉唐老子嘗披一舊錦袍有波斯見之乃曰此氷蠶繭絲所織暑月陳於坐丨丨丨丨樂府雜録氊置針坐處杜錫遷太子中舍屢諫愍懷太子言辭懇切太子患之後丨丨著錫常所丨丨氊中刺之流血我家舊物王子敬卧齊中盜取物敬曰青氊丨丨丨丨裹氊墜崖魏鄧艾由隂平道伐蜀行無人之境七百餘里山高谷深瀕於危殆艾以氊自裹推轉而下將士攀木緣崖魚貫而進敗氊弊席李愚渤海無棣人遇有疾明宗遣宦官視之見其丨丨丨丨四壁蕭然明宗嗟嘆命以供帳物賜之五代史許乘狨毛狨坐不知始何時唐以前猶未施用太平興國中詔工啇庶人丨丨烏漆素鞍不得用丨丨暖坐則當時蓋通上下用之矣天禧元年始定兩省五品宗室將軍以上丨丨丨丨暖坐餘悉禁遂為定制令文臣自中書舍人以上武臣節度使以上方許用而宗室將軍之制亦不行矣石林燕語撤去虎皮尹彥明云橫渠昔在京師坐虎皮說周易聽從甚衆一夕二程先生至論易次日橫渠丨丨丨丨曰吾平日為諸公說者皆亂世耳二程近至深明易道吾所弗及汝輩可師之故朱文公作橫渠贊云勇撤臯比竹夫人張文潛竹夫人傳夫人竹氏其族本出於渭上往往散居南山中後見滅於匠氏武帝時因緣得食上林中以高節聞元狩中上避暑甘泉宫自衛皇后已下後宫美人千餘人從上謂皇后等曰吾非不愛若等顧無以益我思得踈通而善良有節而不隱者親焉於是皇后等謝曰妾得與陛下親沾渥多矣而不隱有以風陛下罪萬死於是薦竹氏上使將作大匠銛拜竹氏職為夫人既進見夫人衣緑衣黃中單上笑曰所謂緑衣黃裏者初夫人家久見滅上曰爾滅亡之餘也夫人謝曰妾之滅亦大矣然夫人未嘗自屈體就帝帝每左右擁持之上有所感時召幸後宫寵姬而夫人常在側若無見焉而諸幸姬等皆相謂曰是所謂善良者安能閒吾寵由是莫有妬之者是時上方郊五畤祠太一以致神仙率常齊戒自袚除而每召夫人有所游幸諸將軍幸臣等更為帝擕抱夫人以從帝亦不疑也上幸汾隂祠后土濟汾水飲羣臣作秋風辭歸未央坐溫室夫人自此寵少衰上謂夫人曰而第歸善自安明年夏吾召君矣明年夏果復召夫人夫人見上中不能無小妬由是罷之而遣將作大匠選於他竹氏使加職焉夫人居後宫至孝成皇帝時猶無恙是時班婕妤失寵作紈扇詩見怨夫人讀之曰吾與若類也然爾猶得居篋笥乎至王莽敗漢軍焚未央夫人猶自力出然遂焚詩集睡愛丨丨珊瑚枕上凹古詩夢來且留琥珀枕還有丨丨時李白乃吾廬高枕丨丨丨杜逺江聲高枕丨丨丨夜中冷丨丨枕簟冷陶淵明堂中設丨丨特丨夜明枕銀燭不施光鑒帷鄭愚津陽門詩虛眠晝高枕丨丨丨笑平生是非何處有高枕丨丨丨並杜通明不假雕表裏丨丨丨丨丨冷如春雪白如瑤胡來送在京床上只怕風吹日炙銷薛逢寒氣此中凝千年積雪萬年氷掌上初擎力不勝南國舊知何處得北方丨丨丨丨丨黃昏轉燭螢飛沼白日搴亷水在升蘄簟蜀琴相對好裁詩乞與滌煩襟崔席玉床魯國寒事早初霜刈渚蒲此草最可珍何必青龍鬚織作丨丨席欣承清夜娛李白觀刈江樓丨丨枕席清杜燕席心懷平生友莫一在丨丨韓霑席雨來丨丨上杜簟鄭君所寶蘄州笛竹天下知丨丨丨丨尤瓌竒擕來當晝不得卧一府傳看黃琉璃體堅色净又藏節滿眼凝滑無瑕疵法曹貧賤衆所易腰腹空大何能為自從五月困暑濕如坐深甑遭蒸炊手磨神怫心語口曼膚多汗真相宜日暮歸來獨怊悵有賣直欲傾家資誰謂故人知我意卷送八尺含風漪呼奴掃地鋪未了光彩照耀驚童兒青蠅側翅蚤虱避蕭蕭疑有清飈吹倒身酣寢百疾愈却顧天日常炎曦明珠青玉不足報贈子相好無時衰翰林所寶溪端琢枕緑玉色蘄水織簟黃金紋丨丨丨丨此兩物笑視金玉如浮雲都城六月招客語地上赤日流黃塵燭龍中天進無力客主歊然各疲劇形骸直欲坐棄忘冠帶安能强修飾恃公寬貸更不疑箕踞豈復論官職笛材平瑩家故藏硯璞坳清此新得掃除當屋就隂翳公不自眠分與客知公用意每如此真能與物同其適豈比法曹空自私却顧天日長炎赫公材卓犖人所驚久矣四海流聲名天方選取欲扶世豈特使以文章嗚深探力取嘗不寐思以正議排縱橫奈何甘心一榻上欲卧穎尾為潔清賢愚勞佚非一軌顧我病昏惟未死心於萬事久蕭然身寄一官真偶爾便當買宅歸偃休白髮溪山如顧始看公戮力就太平却上青天跨箕尾王介甫次韻歐陽公端溪石枕笛竹簟琉璃緑玉潤端溪琢出缺月樣蘄州織成雙水紋呼兒置枕展方簟赤日正午天無雲丨丨光丨丨丨瑩净冷滑無埃塵憶昨開封暫陳力伏乞殘骸避煩劇聖君矜憐大臣憫察見衰病非虛飾猶蒙不使加罪去特許遷官還舊職選材任事不堪用見利無慙惟茍宜一從住屋居城南官不坐曹門少客自然惟與睡相以懶遭間何愜適從來羸爾苦疲固況此煩歊正炎赫少壯喘息人莫聼中年鼻鼾尤惡聲癡兒掩耳謂雷作竈婦驚窺疑釡嗚蒼蠅蠛蠓任緣撲蠧書懶架拋縱橫神昏氣濁一如此言語思慮何由清昔時李白愛飲酒欲與鐺杓同生死我今好睡又過之身與二物為三爾江西得請在旦暮收拾歸裝從此始終當卷簟擕枕去築室買田清穎尾歐陽水叔有客贈子以石枕者與家所藏笛竹簟皆佳物也余既喜睡因甚愛之輒為掘句奉呈原甫晉俞二君子緑玉琉璃清溪上枕剖龍卵石蘄匠單裂蛇皮紋客從東方一持贈竹色蒸青石抱雲磨沙斫骨自合潤飽霜弔節無留塵京師毫貴空有力六月奈此炎蒸劇旱風赤日吹熱來大厦高簷任雕飾頭臚汗匝無冨貧雖有頒氷論官職官高職重氷則多日水氷銷難更得唯公掃室施枕簟迎凉自感東方客東方客應非俗昏能使賢人心體適賢人何以偏伏人天下才名方赫赫我吟窮困不可聽晝夜蚊蚋蒼蠅聲蠅如逺雞耳初感蚊若隱雷空際鳴葛厨頂綻屋蝎墜管席中裂麻經橫平生賦分只煎炒安有丨丨丨丨丨猶勝昔年杜子美老走耒陽牛䏑死因思楊惲廢時言但願人生行樂耳公今事業在朝廷去就尤當慎終始待公睡足秋風來去奉高談揮麈尾梅聖俞次韻碧天無㸃翳細皮重疊織霜紋滑膩鋪床勝錦茵八尺丨丨丨丨丨一方青玉絶纎麈蠅行只恐烟黏足客卧渾疑水浸身五月不教炎氣入滿堂秋色冷龍鱗曹松碧角寒水不教流角簟工夫已到頭夏來全占滿林秋若言保惜歸華屋秖合封題寄列侯學卷曉氷常怕解鋪張丨丨丨丨丨蒲桃錦是瀟湘底曽得王孫價倍酬曹松繡芙蓉褥隱丨丨丨杜氊坐客無才名三十年丨丨寒丨氊杜遙憶舊丨丨丨青氊杜竹夫人合在禪床青奴元不解梳粧丨丨丨齊夢蝶丨公自有人同枕簟肌膚氷雪助清凉黃魯直時趙子充示竹夫人詩蓋原寢竹器憩臂休膝似非夫人之職冬夏青二竹之所長子為名曰青奴并以小詩取之嘗侍君子愛憎情易遷感物思鬱結念昔未弃捐丨丨丨丨居煩襟一披豁雅抱何清虛蹉跎怨時暮凉德竟見踈飛霜皓中庭枵然委墻隅的皪珠幃深熒煌錦茵鋪豈不懷舊恩君心已非初當年紈扇謡抱恨同區區劉子翬弃竹夫人贈君無語丨丨丨丨竹夫人送竹几與謝秀才為我周旋丨丨丨丨寧作我並坡因郎憔悴丨丨丨丨却羞郎王平甫青奴一味凉穠李四弦風拂席昭華三弄月侵床我無紅袖堪娛夜正要丨丨丨丨丨山谷弟二首西風一夜凉與君宿昔尚同床正坐丨丨丨丨丨便學短檠墻角弃不如圓扇篋中藏人情易變恆如此世事多虞只自傷却笑班姬與陳后一生辛苦為専房吕居仁應不解卿卿聞道枕頭惟竹几夫人丨丨丨丨丨坡寄柳子玉湯婆纒裹一衲足小姬暖足卧或能起心兵千金買腳婆夜夜睡天明腳婆元不食丨丨丨丨丨天明更傾瀉頮首有餘燠山谷戲詩暖足鉼古今合璧事類備要外集卷五十一
