body:
  text: 古今合璧事類備要外集卷三十三宋謝維新撰服飾門衣服附天子服服后妃服服戎褻服朝服服野服士儒道士方服僧尼服儉婦人服怪小兒服奢美敝奇洗澣胡服補綴製造贈遺賜子服色身章撮要衣服身之章也人無毛羽莫克自奉自衛不能無資於物故古者雖未有絲麻而不免衣鳥獸之羽皮爰自羲黄而䧏人文浸盛而衣裳之制興然聖人創物取義乾坤莫不有制度寓乎其閒貴賤有等也尊卑有辨也吉凶有差而男女有别也皆非一概而施也奈何世降俗薄不知乾坤之義不過為儉陋則流為奢僭踰禮越法一切不顧夫豈識聖人製造之初意哉然人而衣服則不可以不知為人之道夫不知制度之宜者固不可而又不知為人之道其可乎彼有貌雖人也而心實禽獸者亦且襲我之衣裳則與馬牛而襟裾何以異然則名為士君子者當有以自别於禽獸慎毋蹈服美于人之戒也事類身章衣丨之丨也左禮文裼襲丨之丨也注衣服或裼或襲之文以為禮也蓋形聖人衣足以丨丨以禦風寒在躬衣服丨丨而不得其名為罔罔然無知之貌禮好潔羔裘君不用道丨丨其衣服無常都人士刺衣服丨丨也詩異宜衣服丨丨禮有别衣服丨丨同上有量衣服丨禮在笥惟衣裳丨丨書天子服垂衣黃帝堯舜丨丨裳而天下治昜繫作服帝曰予欲觀古人之象日月星辰山龍華蟲作繪宗彛藻火粉米黼黻絺繡以五采彰施于五色丨丨汝明書葛衣堯之有天下也冬日鹿裘夏日丨丨韓子紾衣舜被丨丨鼓琴孟子微服堯乃丨丨遊于康衢莊惡服禹丨衣丨而致美乎黻冕語卑服文王丨丨即康功田功書襁褓昔者成王幼在丨丨之中賈誼策衮職宣王丨丨有闕惟仲山甫補之詩弋綈漢文帝身衣丨丨絳衣漢光武丨丨大冠被縹綾楊阜嘗見明帝着􅀈丨丨丨不襃袖阜問帝曰此於禮何去服也帝黙然不答自是不法服不以見阜魏志制衮服唐閻立德遷尚衣奉御丨丨冕六丨咸有典法孔六帖進潔衣帝總飛騎入臨渝闗皇太子迎道左初帝與太子别御褐袍曰俟見爾乃更袍歴二時弗易新服邪及是太子丨丨丨乃御黃袍加藝祖皇帝將士環列待旦太祖醉卧初不省甲辰黎明四面呌呼而起聲震原野普與匡義入白太祖諸將已擐甲執兵直扣寢門曰諸將無主願策太尉為天子太祖驚起披衣未及酬應則相與扶出聽事或以丨丨丨太祖身且羅拜庭下稱萬歲太祖固拒之衆不可續通鑑后妃服不曵地漢文帝所幸慎夫人衣丨丨丨文帝贊衣大練後漢明帝馬后年十三選入宫及為后身丨丨丨列女傳望若仙前蜀王衍嘗與太后大妃遊青城山宫人衣服皆盡雲霞丨之丨丨孔帖變若神𤣥宗貴妃楊氏奇服丨化丨丨同上鳥毛裙安樂公主使尚方合百丨丨織二丨正視為一色旁視為一色日中為一色影中為一色而百鳥之狀皆見以其一獻韋后五行志鳥錦袍文宗曰吾聞禁中有金丨丨丨昔𤣥宗幸温泉與貴妃衣之金富人時時有之李石傳朝服盛服趙宣子丨丨將朝尚早坐而假寐左宣二年澣衣晏平仲丨丨濯冠以朝君子以為隘記拖紳孔子加朝服丨丨鄉黨束帶公西赤丨丨而立於朝可使與賓客言也公冶長羔裘丨丨刺朝也言古之君子以風其朝焉注丨丨緇衣諸侯之朝服狐裘羔裘逍遙丨丨以朝箋諸侯之朝服緇衣羔裘大蜡而息民則有黃衣丨丨詩檜風禰衡解魏武使丨丨擊鼔衡先丨朝衣曰不敢以先王法服為伶人衣孔氏六帖劉悟擅賈直言始丨丨子從父貴甚見直言輒衣紫擁笏以兵自衛直言諫悟曰郎少年無使襲山東態朝服可丨着耶同上臺官彈一朝士五月起居衣紗公服為臺官所彈三司使包拯亦衣紗公服閣門使白易之詰曰有何條例答曰不見舊例只見至尊御批爾遂乃從而易之百官從今云朝服乃戎服盖自隋煬帝數出幸因令百官以戎服從一品紫宋次青皂鞋乃馬鞋也後世循襲遂為朝服然唐人朝服猶著禮服幞頭軟脚今之吏人所冠者是也桶頂帽子乃隱士之服京師士人行道間猶着衫帽至渡江戎馬乃變為白凉衫紹興二十年間士人猶是曰凉衫至後來軍興又變為紫衫皆戎服也朱語錄野服織布許子必丨丨而後衣乎曰許子衣褐孟製芰丨丨荷以為衣兮芙蓉為裳楚辭衣鹿見杜詩轉輪懸閣地漢世鹿皮翁註又見杜詩田翁號鹿皮註披羊嚴光變姓名隱身不見漢光武思其賢乃令以物色訪之後齊國上言有一男子丨丨裘釣澤中帝疑其光乃備安車𤣥纁遣使聘之三反而後至本傳衣帛婁敬脱輓輅見齊人虞將軍曰臣願見上言便宜虞將軍欲與鮮衣敬曰臣衣帛衣帛見衣褐衣褐見不敢易衣虞將軍入言上召見本傳裘褐梁鴻歸鄉里勢家慕其髙節多欲女之鴻並絶不娶同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁年至三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女求布衣麻縷織作筐緝績之具及嫁始以裝飾入門七日而鴻不答妻乃跪牀下請曰竊聞夫子髙誼簡斥數歸妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲丨丨之入可與俱隱深山者爾今而衣綺縞傳粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃更為椎髻晉布衣操作而前鴻大喜曰此真梁鴻妻也能奉我矣本傳著短布周黨字伯況建武中被召不得已乃丨丨丨單衣縠布綃頭待見尚書注以縠樹皮為綃頭本傳著越布陸閎美姿貌喜丨丨丨單衣世祖見而好之自後常勑㑹稽郡獻越布後漢本傳詣軍門王猛隱于筆山懷佐世之志希龍顔之主歛翼待時候風雲而動桓温入闗猛被褐而丨之一面談當世之事捫蝨而言旁若無人温察而異之本傳到闕下陽城徳宗召拜諫議大夫遣長安尉楊寧齎束帛詣其家城褐衣丨丨丨辭讓帝遣中人持緋衣衣之孔氏帖烏帽縮褐康節先生嘉祐中朝廷以遺逸命官辭不從河南尹遣官就第送告勑朝章康節服以謝即褐衣如初熙寧初再命官辭又不從再辭朝章謝曰吾不復仕矣始為隱者服丨丨丨丨見卿相不易也幅巾縉帶司馬公依禮記作深衣簪丨丨丨丨毎出朝服乗馬用皮匣貯深衣隨後入獨樂園則衣之嘗謂康節曰先生亦可依此乎康節曰某為今人當服今時之衣温公歎息其言合理並聞見錄璽袍髙帽伊川常服丨丨丨丨簷劣半寸置繫修曰此野人之服也外書儒服逢掖魯哀公問孔子曰夫子之服其儒服與恠與士之異也孔子曰丘少居魯衣丨丨之衣長居宋冠章甫之冠丘聞君子之學也博其服也鄉丘也不知儒服記深衣古者深衣盖有制度以應規矩繩權衡短毋見膚長毋被土子衿丨丨刺學校廢也亂世則學校不修焉青青子衿悠悠我心縱我不往子寧不嗣音詩鄭風孫通服叔丨丨儒服嘗見漢王王憎之乃變其服服短衣楚制食其衣酈丨丨踵軍門上謁丨儒衣冠沛公使人謝曰方以天下為事未暇見儒人食其按劒叱使者曰吾髙陽酒徒非儒也沛公遽延曵長裾鄒陽上呉王書曰云云飾固陋之心則何王之門不可丨丨丨乎衣介幘劉允章咸通中為禮部侍郎請諸生及進士第並謁先師丨青衿丨丨孔帖戎服涖事司馬宣王戎服丨丨見後中詳聽講元帝為周師所圍從講老子百官戎服以丨丨通鑑太宗紀正觀二從幸隋煬帝事見朝服注軍校袍開元中賜邊衣製自宫中有丨丨丨中得一詩云留意多添線含情更着綿今生已過了重結後身縁持詩白帥帥以聞明皇問之有一宫人自言萬死即以嫁得詩者與汝結今生緣本事詩戰士衣肅宗廢后張氏駐靈武産子三日起縫丨丨丨太子敕止對曰今豈自養時邪褻服短右袂孔子褻裘長丨丨丨儉敝布衣衛文公大丨之丨左閔二敝袴韓昭侯有丨丨命藏之侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一笑嚬有為嚬笑有為笑今袴豈特嚬笑哉吾必待有功者通鑑不恥子曰衣敝緼袍與衣狐貉者立而丨丨者其由也與無裏孔伋緼袍丨丨孔叢子藍縷若敖蚡冒蓽路丨丨以啓山林注丨丨敝衣左懸鶉子夏家貧衣若丨丨婦無禪衣范宣潔行亷約韓豫章遺絹百疋不受減半不受減至一疋終不受韓裂二丈與之云人寧可使丨丨丨丨邪范笑而受之世説父作衲衣宋徐湛之武帝長女會稽公主之子也武帝微時貧甚有衲布衣襖皆敬皇后手自作帝既貴以此衣付公主曰後世有驕奢者以此示之及文帝欲殺湛之主以錦囊盛衲衣擲示上曰此我母為汝丨丨此丨丨今日有一頓飽飯便欲殺我兒子遂免以衣敝惡張仲武范陽人子直方時鄭畋輔政頗言仲武㑹昌中功第一今直方百口不自存毎内燕丨丨丨丨辭不赴陛下録功念舊宜少優假常衣垢弊蕭復丨丨丨丨本傳紙衣自蔽周智光先是淮西李忠臣入朝次潼闗聞智光反率兵討之㑹敗忠臣因入華大掠自赤水至潼闗畜産財物皆盡官吏至丨丨丨丨累日不食敗服上謁武儒衡宰相鄭餘慶不事華潔門下客多垢衣丨丨獨儒衡丨丨未嘗有所易羸衣冒出朱泚賊敗莊何諸門士人丨丨丨丨穿履破衣劉义嘗丨丨丨丨危帽散衣李紳河南惡少丨丨丨丨寒不假衣陳無已趙挺之邢和叔皆郭大夫壻陳在館職當侍祠郊丘非重裘不能禦寒氣無已止有其一其内子為於挺之家假以衣之無已詰所從來内以實告無已曰汝豈不知我不着渠衣邪却之既而遂以凍病而死謝克家作其文集序中有云篋無副裘又云此豈易衣食者盖指此事朱語錄奇恠裘帶索朱桃推澹泊絶俗被丨丨丨人莫能測及為長史竇軌見之遺以衣服鹿幘麂鞾逼署鄉正委之地不肯服錦半臂來子珣迁游擊將軍衣丨丨丨自異花為之服酉舍利以丨丨丨丨孔六帖洗澣澣衣支離䟽治繲繲丨丨莊子濯冠晏平仲澣衣丨丨以朝君子以為隘布火浣梁冀衣布有垢則浣之於火一日對客坐或誤汚其衣佯怒投丨丨中及火滅而色愈鮮明袂三澣公權嘗與六學士對便殿帝稱漢文帝恭儉因舉袂曰此丨丨矣補綴遺衣楊行密嘗過楚州臺濛盛供帳之行密一夕去丨丨卧内皆經補浣濛還之行密曰吾興細微不敢忘本君笑我邪濛大慙補衮衮職有闕惟仲山甫丨之詩挫鍼支離疏丨丨注丨丨縫衣也莊子紉䘺裳和政公主代宗以主貧詔諸節度餉億主一不受親丨丨丨衣諸子不敢服紈絺紉絶帶孫孝哲契丹部人禄山對側門俟召衣帶以絶不知所為孝哲箴縷素具徐為丨綻禄山大悦贈遺縞帶季札與子産丨丨子産獻紵衣焉綈袍須賈以范叔寒贈一丨丨曰戀戀有故人之意貂裘蘇秦説趙相李兑兌送以黒丨之丨解衣衣韓信曰漢王丨丨丨我本傳解衣贈夏侯端夀春人王世充遣人以淮南郡公尚書少吏部印綬召端丨丨服以丨端端曰吾天子使寧汚賊官邪非持首去不可見即焚書及衣覆以妃袍韋綬德宗時為翰林學士帝嘗幸其院韋妃從會綬方寢學士鄭絪欲馳告之帝不許時大寒以妃蜀襭袍丨之而去其待遇如此覆以已袍安禄山林甫稍厚之引至中書丨丨丨丨遺以鹿幘見前奇怪類賜予賜緋温造為宣諭使丨丨衣賜錦劉幽求復舊官丨丨衣一襲賜金紫李泌肅宗即位欲授以官固辭願以客從入議國事出陪輿輦衆指曰着黄者聖人着白者山人帝聞因丨丨丨賜銀魚王繇尚永穆公主生子潛生三日丨緋衣丨丨隱居服盧鴻還山賜丨丨丨宦官服昭宗既誅丨丨第五可範等凖國故事量留三十人各賜黄絹衫一領以備宮中指使仍不得輒有養男其左右神策軍諸道監並令停廢服色品官舊服馬周先是丨丨丨丨止黄紫於是三品服紫四品五品朱六品七品綠八品九品青百寮新服上元元年勑三品以上服紫四品深緋五品淺緋六品深綠七品淺綠八品深青九品淺青庶人服黃一品以上文官並帶手巾等袋刀子礪石武官欲帶聽之九月丨丨具丨丨宴之舊紀四時仕宦傅游藝起一嵗賜袍自青及紫人號丨丨丨丨二人主事楊國忠侍郎韋見素張倚與本曹郎趨走堂下抱案牘國忠顧女弟曰紫袍二主事何如皆大噱婦人從夫正觀四年制丨丨皆丨丨色舊志魏相月令奏天子之義必純取法天地而觀於先聖髙皇帝詔長樂宫曰令羣臣議天子所服以安治天下相國臣何等議春夏秋冬天子所服當法天地之數中得人和故自天子王侯有土之君下及兆民能法天地順四時以治國家身亡禍殃年夀永究是奉宗廟安天下之大禮也臣請法之中謁者趙堯主春服曰主一時衣服禮物朝祭之事李舜舉夏兒湯舉秋貢禹舉冬四人各一時奏制曰事贊皇正服箴聖人作服法象可觀雖在宴游尚不懷安汲黯莊色能正不冠楊阜慨然亦譏縹紈四時所御各有其官非此勿服惟辭惟難詩集被恩榮宫衣亦有名端午丨丨丨細葛含風軟香羅疊雪輕自天題處濕當暑着來清意内稱長短終身荷聖情杜照暮春三月三日天氣新長安水邊多麗人態濃意逺淑且眞肌理細膩骨肉勻繡羅衣裳丨丨丨蹙金孔雀銀麒麟頭上何所有翠微㔩柔垂鬂脣背後何所見珠壓腰衱穩稱身就中雲幕椒房親賜名大國虢與秦紫駞之峯出翠釜水精之盤行素鱗犀筯厭飫久未下鑾刀縷切空紛綸黃門飛鞚不動塵御㕑絲絡送八珍簫鼓衷吟感鬼神賔從雜遝實要津後來鞍馬何逡巡當軒下馬入錦茵楊花雪落覆白蘋青鳥飛去銜紅巾炙年可熱勢絶倫慎莫近前丞相嗔杜麗人行試寛窄深閨乍冷聞香篋玉筯微微濕紅頰一陣霜風殺柳條濃煙半夜成黃葉重重白練明如雪獨下閒堦轉淒切祇知抱杵搗秋砧不覺髙樓已無月時聞塞鴈聲相喚紗窻只有燈相伴幾展齊紈又懶栽離腸恐逐金刀斷細想儀形執牙尺囘刀剪破澄江色愁捻銀針信手縫惆悵無人丨丨丨時時舉手揮殘淚紅牋謾有千行字書中不書心中事一半殷勤托邊使裴詩可邊衣異裝束辛有歎被髮趙雲喜胡服遂成陸渾戎終有沙丘辱用夷反變夏亡禮以從俗先王仁義術詎用此求福齊桓九合功不以兵車轂仲尼歎微管幾為左衽屬爾來豪俠兒往往丨丨丨耀武何必然禦戎有前躅余敢告司闗異服宜禁肅王陶異服古今合璧事類備要外集卷三十三
