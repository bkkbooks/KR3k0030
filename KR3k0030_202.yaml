body:
  text: 古今合璧事類備要續集卷五十二宋謝維新撰恩讎門施恩附報恩負恩感恩事理發揮孔子曰以德報德以直報怨此恩讎説也夫人以國士待我我其不可以國士報乎以衆人待我我其不可以衆人報乎施有豐約故報亦有厚薄非特人道為然也為善者報以福為惡者報以禍或者亦天之道歟事類謂之惠分人以財丨丨丨孟滕文可以與丨丨丨可以無與與傷惠孟尚往來其次務施報禮丨丨丨記曲禮恥積藏樂分施而丨丨丨荀大略與爾鄉黨原思為之宰與之粟九百辭子曰毋以丨丨鄰里丨丨乎語六救其親戚孟嘗君招致諸侯遊士及有罪亡人皆舍業厚遇之存丨丨丨丨由是名重天下通鑑周顯王紀家量獲民昭公三年叔向問曰齊其何如晏子曰其為陳氏矣齊舊四量豆區釡鐘四升為豆各自其四以登於釡釡十則鐘陳氏三量皆登一焉鐘乃大矣以丨丨貸而以公量收之云云欲無丨丨將焉辟之左焚劵市義馮歡貧乏為孟嘗君客為君收債於薛將行問市何物曰吾家寡有者市之歡至薛諸負債者悉來合券訖悉焚之皆稱萬嵗還問何市而返歡曰奉君之命市君家寡有者君之府藏盈積惟欠義耳臣召諸債者合券而焚之市義而歸矣君為之喜語林散與貧疏范蠡之陶為朱公十九年之中三致千金丨丨丨丨兄弟賑施貧窮原結身衣服車馬才具妻子內困專以丨丨丨丨務起人之急分給租奉梁啇常曰多藏厚已為子孫纍每租奉則及兩宮賞賜便置中門外未嘗入藏悉分與昆弟中外因年穀貴多有飢者輒令蒼頭以牛車致米鹽菜錢於四城門外乞貧民不告其姓名漢記共饗賜贈疏廣兄子受上疏乞骸骨上許之加賜黃金二十斤皇太子贈以五十斤既歸鄉里樂與鄉黨宗族丨丨其丨丨以盡吾餘日以與邑里張儉資計差溫初百姓飢荒乃傾竭財産與邑里共之賴其存者以百數以朌兄弟馬援扶風茂陵人轉遊隴漢間謂賔客曰丈夫為志窮當益堅老當益壯因處田牧有牛馬羊數千頭穀數萬斛既而歎曰凡殖財貨貴能施賑也否則守錢虜耳敢盡丨丨丨丨故舊身衣羊裘皮袴乞人填門後漢尚書令符稚為人樂施丨丨丨丨嘗曰天下物何常吾今日富後日貧耳忽一日不施則意不泰債家從赦樊重假貸人間數百萬臨終遺令焚削文契丨丨皆慙爭往償之諸子丨丨竟不受晉陽秋與米一囷魯肅以賑窮士為務甚得邑人歡心周瑜為居巢長將數百人故過候魯肅并告資糧肅家有囷米三千斛乃指一囷與瑜益知其奇也遂相親結定僑札之分散米千斛吳全琮父柔為桂陽守使琮齎米數千斛至吳交易琮皆賑給士大夫空船而還父竒之報恩報以瓊琚木瓜美齊桓公也衛國有狄人之敗出處於漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也投我以木瓜丨之丨丨丨匪報也永以為好也報以臣禮晉人歸楚公子穀臣與連尹襄老之尸以求知罃楚人許之王送知罃曰子其怨我乎對曰二國治戎臣不才不勝其任以為俘馘執事不以釁鼓使歸即戮君之惠也又誰敢怨王曰然則德我乎對曰二國圖其社稷而求紓其民各懲其忿以相宥也兩釋纍囚以成其好臣不與及其誰敢德王曰子歸何以報我對曰臣不任受怨君亦不任受德王曰必告不榖對曰以君之惠纍臣得歸骨於晉寡君之以為戮死且不朽若從君之惠而免之以賜君之外臣首首其請於寡君而以戮於宗亦死且不朽若不獲命而使嗣宗職次及於事而帥偏師以修封疆雖遇執事其弗敢違其竭力致死無有二心以盡臣禮所以報也左成三年施者報者丨丨倦矣丨丨未厭左昭二十四年出爾反爾丨乎丨者丨乎丨者也孟子結草亢敵見勇力門倒戟禦徒宣子田於首山舍於翳桑見靈輒餓問其病曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簟食與肉置諸槖以與既而與為公介丨丨以丨公丨而免之問何故對曰翳桑之餓人也問其名居不告而退遂自亡宣二年推鋒爭死秦繆公亡善馬岐下野人共得而食之者三百餘人吏欲法之公曰君子不以畜産害人吾聞食善馬肉者不飲酒傷人皆賜酒而赦之後秦擊晉三百人求從公為晉軍所圍皆丨丨丨丨遂脫繆公反生得晉惠公史記退舍報惠子犯曰微楚之惠不及此丨三丨避之所以丨也僖二十六年故來死君中山君饗都大夫司馬子期在焉羊羹不遍子期怒而走於楚以伐中山君中山君亡走有挈戈隨其後者顧謂二人子奚為對曰臣父嘗餓且死君下壺餐脯臣父臣父且死曰中山有事汝必死之丨丨丨丨也中山君慨然曰吾以一杯羊羹亡國以一壺飱得二人戰國䇿常願湔敵楚莊王賜羣臣酒日暮燈燭滅有人引美人衣美人援絶其冠纓告王曰有引妾衣者妾絶其纓取持火來視絶纓者王曰今已飲不絶纓者不歡君臣百官皆絶冠纓乃出火居二年晉與楚戰有一人常在前五合五獲首怪而問之對曰臣乃夜絶纓者也王隱忍不㩧而誅丨丨肝腦塗地頸血丨丨久矣遂平晉每食必祝楚欲殺伍胥胥走幾不得脫追者在後至江江上有一漁父乘船知伍胥意乃渡伍胥伍胥既渡解其劒曰此劒直千金以豫父父曰楚賞五城金千鎰以求子吾尚不取何用劒乎胥後丨丨丨丨之曰祝江上丈人視如國人孟子曰君之視臣如土芥則臣丨君丨丨丨報以衆人豫讓曰范中行衆人遇我我以衆人報之智伯國士遇我我以國士報之戰國䇿一飯必償范雎丨丨之德丨丨本傳百錢必償蘇秦之燕貸丨丨為資及佩六國相印得富貴以百金償之德者遍報蘇秦遍報諸所嘗見丨丨一人猶未得報乃前自言秦曰我非忘子子之與我至燕再三欲去我易水之上方是時我固望子深是以後子恩者皆報朱買臣為會稽太守悉召見故人與飲食嘗有丨丨丨丨復焉鄼侯錢二漢蕭何為沛主吏髙祖為布衣時數以吏事護髙祖髙祖以吏繇咸陽吏皆送奉錢三何獨以五及髙祖即帝位何為丞相封丨丨食邑八千戶乃益封二千戶以嘗繇咸陽時何送我獨嬴丨丨也亭長錢百韓信從下鄉南昌亭長食亭長妻苦之乃晨炊蓐食信往不為具食自絶去至城下釣有一漂母哀之飯信信曰吾必重報母母怒曰大丈夫不能自食吾哀王孫而進食豈望報乎項羽死髙祖襲奪信軍徙為楚王都下邳信至國召所從食漂母賜千金及下鄉丨丨丨丨曰公小人為德不竟召辱已少年以為中尉告諸將相曰此壯士也方辱我時寧不能殺殺之無名故忍而就此本傳盜妾者報盎袁盎為吳相時有從史盜盎所愛侍兒盎知之不泄遇之如初人有告從史言君知爾與侍者通乃亡歸盎驅自追遂以侍者賜之復為從史及袁盎使吳見守從史適為校司馬中夜引盎起曰君可以去矣吳王期旦日斬君盎謝之而去執炙者報榮顧榮與同僚宴飲見執炙者狀貌不凡有欲炙之色榮割啖之坐者問其故榮曰豈有終日執之而不知其味者乎及趙王倫篡位以榮為長史倫敗榮被執將誅而丨丨丨者為督率救之而免行觴者報鏗隂鏗為湘東王參軍與賔客宴飲丨丨丨因回酒炙授之坐客皆笑鏗曰吾儕終日酣酒而執爵者不知其味非人情也及侯景亂鏗為賊擒或救之得免鏗問之乃前行觴者凡微時一飱初范逵過侃逵因薦侃於廬江太守張夔後侃都督江州移鎮武昌侃命張夔子隱為參軍范逵子珧為湘東太守丨丨丨所荷丨丨咸報陶侃傳感恩何日忘之中心藏之丨丨丨丨詩隰桑夫人及此微丨丨之力不丨丨左襄七年生死骨肉所謂丨丨而丨丨也襄十二尸祝社稷相與丨而丨之丨而丨之莊子解衣衣我武涉説韓信曰足下何不反漢與楚信謝曰臣得事項王數年官不過郎中言不聼䇿不用故背楚歸漢漢王授我上將軍印數萬之衆丨丨丨丨推食食我言聼計用背之不祥造門謝恩何武每奏事京師戴聖未嘗不丨丨丨丨負恩忘我大德丨丨丨丨思我小怨詩谷風不念昔者有洸有潰既詒我肄丨丨丨丨伊余來墍詩晉閉秦糴晉飢秦輸之粟秦飢丨丨之糴左僖十三莾負漢恩王莾使安陽舜見太后后曰而屬父子宗族蒙漢家力富貴恩義纍世既無以報受人孤寄乘便利時奪取其國不復顧人如此者狗豬不食其餘天下豈有而兄弟耶通鑑漢明帝紀白敏中負李德裕白敏中用李德裕薦入翰林為學士及德裕貶敏中為相詆之甚力或曰人臣事君公義而已何以私恩為乎敏中之事未足深咎也愚竊以為不然人臣能盡私恩然後能盡公義敏中之罪不容誅矣孔子曰事親孝故忠可移於君事兄悌故順可移於長推此言之則背師賣友之人必不能以忠許國何者於所厚者薄則所施無不薄也昔呂布為丁原主簿為董卓而殺原又為王允而殺卓及兵敗被執魏祖欲生之劉先主曰明公不見布之事丁建陽董太師乎於是殺布漢封陳平辭曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知其後誅呂氏而安劉氏者平與周勃也夫以布之不忠於丁董也其肯忠於曹氏乎以陳平之不負魏無知也其肯負於劉氏乎此魏所以誅布漢所以屬平者也然則敏中之事蓋可見矣雖然敏中所以負德裕也亦有繇焉傳曰盜憎主人主人何負於盜而盜憎之乎蓋自度其事必為主人所惡故也白氏系與楊虞卿姻家居昜又與李宗閔牛僧孺厚若敏中本無英氣雖緣德裕以進而不能無意於僧孺宗閔虞卿之徒自度其事必為德裕惡也故因其勢力以擠之耳夫德裕忠臣也非罪而被斥天下皆知其寃矣使敏中素與仇猶當為社稷而救之况因之而進耶然則敏中豈惟不忠於德裕亦不忠於唐也愚故曰人臣能盡私恩然後能盡公義敏中之罪不容誅矣然則公義私恩適不兩全則如之何以道權之而已義重而恩輕則不以私害公若河曲之役趙宣子使人以其乘車於韓厥執而戮之是也恩重而義輕則不以公廢私若庾公之斯追子濯孺子抽矢扣輪去其鏃發乘矢而後反是也夫公義私恩不兩全猶當以道權其輕重奈何無故而廢之哉雖然逄蒙殺羿孟子以為是亦羿有罪焉以此言之德裕之薦敏中亦不得為無罪也詩集感君恩重燕南壯士吳門豪築中置鉛魚隱刀丨丨丨丨許君命泰山一擲輕鴻毛結襪子出君焦灼咫尺炎涼變四時丨丨丨丨君詎知韋應物寸心銘佩丨丨丨丨牢杜主人覆護丨丨丨丨恩豈啻一綈袍臨川吞炭難酬馮京當世少嘗薄遊為街卒所繫鄭守王公素釋之及使關中王方帥渭與宴集甚歡貽之詩曰丨丨丨丨當日事積薪深愧後來恩古今合璧事類備要續集卷五十二
