body:
  text: 古今合璧事類備要前集卷三十四宋謝維新撰賓主門賓主事類肅入主人丨客而丨主人入門而右客入門而左主人就東階客就西階曲禮先拜主人敬客則丨丨客客敬主人則先拜主人同上有禮賓丨丨主則擇之左傳相得魚川泳而鳥雲飛是賓主之相得也韓文東道主燭之武曰若舍鄭以為丨丨丨行李之往來供其乏用僖三十主人翁魏使須賈於秦范睢聞之為微行敝衣間步之邸見須賈賈驚問曰秦相張君公聞之乎范睢曰丨丨丨願為君借大車駟馬於丨丨丨范睢為御之入秦相府須賈待門下良久問門下曰范叔不出何也門下曰乃吾相張君賈大驚乃肉袒膝行謝罪東都主人丨丨丨丨問於西都之賓東都賦北道主人常山太守鄧晨㑹光武於鉅鹿請從擊邯鄲光武曰偉卿以一身從我不如以一郡為我丨丨丨丨又光武至薊將欲南歸耿弇以為不可官屬腹心皆不肯光武指弇曰是我丨丨丨丨也又彭寵將反光武問朱浮浮曰大王倚寵為丨丨丨丨今既不然所以失望賓主失歡翁思召王式為博士既至諸博士持酒肉勞之博士江公心嫉式謂歌吹諸生曰歌驪駒式曰聞之師客歌驪駒主人歌客旡庸歸今日諸君為主人曰尚早未可也江公曰經何以言之式曰在曲禮江公曰何狗曲也式恥為竪子所辱遂免歸賓主相忘諸葛孔明每至龐徳公獨拜牀下徳公初不令止司馬徳操嘗詣徳公值其上冢徳操徑入其室呼徳公妻子使速作黍徐元直當來就我與徳公談妻子皆羅拜堂下奔走供設須臾徳公還直入相就不知何者是客也無主客禮許汜曰昔遭亂過下邳見陳元龍元龍丨丨丨之丨久不相與語自上大床卧使客卧下床劉備聞此語謂汜曰今天下大亂帝王失所望君憂國忘家有救世之意而君求田問舍言旡可采如小人欲卧百尺樓上卧君於地何但上下床之間耶魏志無賓主意王恬傲誕不拘禮節謝安造之坐少頃恬便入内安以為必厚待已久之沐頭散髮而去竟丨丨丨之丨晉史作生死别李勝出為荆州刺史往辭司馬懿懿陽為昏謬錯亂其詞因欲自力設薄主人生死共别曹爽傳無迎送禮五代桑維翰已作相嘗過裴皥皥不迎不送或問之皥曰我見桑公於中書庶僚也桑公見我於私第門生也何迎送之有賓客附延遇賓客謝絶賓客薄待賓客賓客謁見事類尊客丨丨之前不叱狗曲禮嘉賓鹿鳴燕丨丨也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心矣呦呦鹿鳴食野之苹我有丨丨鼓瑟鼓琴我有㫖酒以宴樂丨丨之心詩出門丨丨如見大賓詩布席若非飲食之客則丨丨席間函丈曲禮就館叔弓如晉晉人曰子姑丨丨叔弓辭曰敢辱大館左傳壞垣子産如晉丨其館之丨而納車馬士文伯曰繕完葺牆以待賓客今吾子壊垣其若異客何同上狗盜獻裘秦昭王囚孟嘗君欲殺之客下坐有能為丨丨者夜入秦宫藏中取所丨狐白丨以獻幸姬為言昭王孟嘗君得出即馳去變姓名夜半出函谷闗闗法雞鳴而出客孟嘗君恐追至客之居下坐有能為雞鳴而雞盡鳴遂發傳出囊錐脱頴秦圍邯鄲趙使平原君趙勝求救合從於楚約與食客有勇力文武者二十人得十九人餘無可取者門下有毛遂者自贊曰臣得如錐之處囊中乃脱頴而出毛遂行左手持盤血而右手招十九人曰公相與㰱此血於堂下公等碌碌所謂因人成事者也客皆珠履趙平原君使人於春申君瑇瑁簪舍之於上舍趙使欲夸楚刀劒室以珠玉飾之請命春申君春申君客三千餘人其上客皆躡珠履以見趙使趙使大慙史記客皆冠帶雋不疑曼倩冠進賢冠帶礧具劒上謁暴勝之掃舍人門魏勃欲見曹參早丨齊相丨丨丨以自達曳王門裾鄒陽上書曰臣飾庸陋則何王之門不可曳長裾乎此客噉名右軍指晉簡文顧語孫興公曰此噉名客簡文曰天下自有利齒兒世説此客逼人謝安弱冠詣王濛濛曰丨丨亹亹為來丨丨我有此客謝安造桓温温甚喜言平生歡笑竟日既出温問左右頗嘗見丨丨丨丨不門無雜客袁燦丨丨丨丨文士見遇不過一兩人宋書得此竒客崔𢎞禮過武宣從劉𤣥佐獵酒酣顧曰崔生不知此樂耶𢎞禮笑曰我固喜武請為公歡𤣥佐臂鷹與𢎞禮馳逐急緩在手一軍驚曰安丨丨丨丨以為惡客元次山丨不飲者丨丨丨本集延遇賓客食客三千魏公子無忌封信陵君仁而下士致丨丨丨丨人諸侯以公子賢多賓不敢加兵謀魏食客數千孟嘗君田文在薛丨丨嘗丨丨人旡貴賤一與文等人人自以為親已史厨有三列上客食肉中客食魚下客食菜列女傳彈鋏而歌馮驩聞孟嘗君好客躡屩而見之置傳舍十日間傳舍長曰客何為曰馮先生甚貧猶有一劒耳又蒯茅之類可為䋲緱把劍之處彈其劒而歌曰長鋏歸來乎食無魚孟嘗君遷之幸舍食有魚矣復彈劒而歌曰長鋏歸來兮出無車遷之代舍出入乗輿車矣又彈劒而歌長鋏歸來乎無以為家孟嘗不悦脱頴而出見毛遂事置驛請客漢鄭當時為太子舍人五日一洗沐常丨丨馬長安諸郊丨謝賓丨夜以繼日至明旦常恐不徧開館延賢公孫𢎞為相起客館開東閣以延賢人𢎞身食一肉脱粟飯故人賓客仰衣食奉禄皆給之其後李蔡為相客館丘墟而已倒屣迎賓蔡邕見王粲而竒之時邕才學顯著貴重朝廷常車騎填巷賓客盈坐聞粲在門丨丨丨之後漢投轄留客陳遵大飲酒賓客滿座取客車轄投井中雖有急不得出本傳連榻坐客晉杜預拜鎮南將軍朝士皆畢賀乃連榻而坐羊琇與裴楷後至曰杜元凱乃復以丨丨而丨丨客遂不坐而去掃徑接賓王仁裕每大雪則自所居至坊巷口丨雪開丨迎丨丨客至所居處飲宴謂之煖寒㑹天寶遺事且留東閤薛宣為丞相朱雲徃見之宣謂曰在田野無事丨丨我丨丨可以觀四方竒士雲曰小生乃欲相吏耳雲傳常滿座上北海孔融性寛容好士及退閑職賓客日盈其門常歎曰座上客常滿尊中酒不空吾無憂矣盛修肴膳崔瑗字子玉愛士好賓客丨丨丨丨或言其太奢瑗聞之怒勑妻子曰吾并日而食以供賓客而反以獲譏士大夫不足養如此後勿過以菜具無為諸子所嗤也華嶠書别進異饌長孫澄好賔客接引忘倦雖不飲而好觀人酣興常恐賔客請歸每勒厨丨丨丨丨留之後周書日夜劇飲陽城拜右諫議大夫與二弟延賓客丨丨丨丨終日獻酬羊侃不飲酒而好賓遊丨丨丨丨同其醉醒南史不計有無畢埛喜賓客家未嘗以有無計新唐書相與娛樂牛僧孺治第洛之歸仁里多致嘉石美木與賔客娛樂李日知既罷不治田園唯飾臺池與賔客娛樂薄待賓客飯以脱粟公孫𢎞食故人髙賀以脱粟覆以布被賀曰何用故人丨貴為脱粟布被我自有之怒而去語人曰𢎞内厨五鼎外膳一肴其儉詐也𢎞聞之慚曰寧逢惡客不逢故人待以粗食宗慤任氣好武不為鄉曲所知鄉人庾業家富與賓客相對必方丈而為慤設粟米菜葅謂客曰宗軍人串噉粗食慤致飽而退它日為豫州刺史業為慤長史待之甚厚不以昔事為嫌不與共席步騭避難江東與廣陵衞旌俱以種𤓰自給㑹稽焦征羌名矯郡之豪族懼其見侵乃共修刺奉𤓰以獻征羌作食身享大案殽膳重沓設席置地坐騭旌於牖外以小盤飯與之惟菜茹而已旌不能食騭取致飽乃出旌怒曰何能忍此騭曰吾等貧賤主人以貧賤遇之宜也當何所恥不與交言嵇康夏月於大樹下鍜向子期佐之鍾㑹結客同造之康視鍜如舊傍若無人良久不交一言㑹去康曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去大恥之遂深怨恨與吏論錢布衣張汾無紹而于邢君牙軒然坐客上㑹吏擿簿書以盜没宴錢五萬君牙怒吏之欺汾不謝去曰吾在京師聞邢君牙豪傑今丨丨丨丨云何君牙慙遽釋吏引為上客據案引見栁冕辟薛戎佐其府先是馬揔位鄭滑府監軍宦人誣劾之貶泉州别駕欲除揔以附倖家即使戎攝刺史按其辠戎不肯還白其狀冕怒丨丨丨戎入丨戎叱引者曰見賓客乃爾乎由東廂進冕度不可屈揖而去之謝絶賓客秦王下令李斯上丨丨書曰臣聞吏議逐客切以為過矣昔繆公取由余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晉此五子者不産於秦而繆公用之孝公用商鞅惠王用張儀昭王得范睢此四君者皆以客之功客何負於秦哉今逐客以資敵國求國旡危不可得也秦王乃除逐客之令翟公書門鄭當時始與汲黯列為九卿内行脩兩人中廢賓客益落先是下邽翟公為廷尉賓客亦填門及廢門外可設雀羅後復為廷尉客欲往翟公大署其門曰一死一生迺知交情一貧一富迺知交態一貴一賤交情乃見鄭傳杜復至者亷頗失勢客盡去及復用客又復至頗曰客退矣詳見後市交門擯棄去者魏其侯灌夫俱失勢賓客盡衰二人相引重排丨生平慕之後丨之而丨丨不納賓客主父偃為齊相至齊散五百金與昆弟賓客數之曰吾貧時昆弟不我衣食賓客不我内今吾與諸君絶矣旡復入偃之門謝退賓客唐蕭俛位宰相性簡潔以聲利為汚既老家於洛嵗時賓客請謝以為煩乃舍濟源墅自放山野優游窮年謝不與通尉遲恭晚節丨賓客丨丨丨避不出見李景懷清素寡欲門無雜賓李涿罷浙西以同里訪之丨丨見及責之劚其騙石焉本傳賓客謁見書刺進謁有謁者自丨丨言爵里髙帝紀六帖云若今之通名也懷刺漫滅禰衡來游許下隂丨一丨既旡所適於是刺字丨丨入堂舉哭後漢趙壹為郡計吏到京師造河南尹羊陟不得見壹以非陟無託名者乃日到門陟許通尚卧未起壹徑丨上丨曰切伏西州承髙風久矣乃今方遇而忽然命也因丨丨聲陟知非常人乃起延話大竒之壹既為陟所稱名動京師而還過𢎞農候太守皇甫規門者即不通壹遂遁規知是壹大驚進之壹不顧而去上牀就卧蜀彭羨見龎統統非羨故舊又值有賓客羨徑上統牀卧曰須賓客罷與卿談賔罷請食然後語統大竒之並六帖詩集費招呼俗子推不去可人丨丨丨世事每如此我生亦何娛陳師道寄黄充期不來書當快意讀易盡客有可人丨丨丨世事相逢每如此好懐百嵗㡬時開前人絶句賓客世情唐李適之在相位每退朝則邀丨丨諧謔賦詩曽不避李林甫之害嘗為詩曰朱門長不閉親友恣相過年今將半百不樂待如何及罷相又為詩曰避權仍罷相樂聖且衘盃借問門前客今朝㡬個來及死非其罪時人寃之館賓事類辟為僚屬漢孫寶御史大夫張忠辟寶為屬欲令授子經更為館舍儲峙館以下客謝方明為㑹稽太守靈運造方明遇惠連大相知賞謂時何長瑜教惠連讀書亦在郡内靈運又以為絶倫方明曰阿連才悟如此而尊作常兒遇之長瑜當今仲宣而丨丨丨丨之食尊既不能禮賢宜以長瑜還靈運載之而去子陪太祝富鄭公之父甚貧客吕文穆公門下一日白公曰有子十嵗許欲令入書院事廷評太祝公許之其子鄭公也文穆公見之驚曰此兒他日名位與吾相似公供給甚厚後鄭公兩入相聞見録女嫁門賓孫賁公素昔為程宣徽門賓後娶程公之女又見婚姻門事類教訓嚴毅吕正獻公通判頴州歐陽文忠公適知州事焦先生千之伯强客文忠所嚴毅方正正獻公招延之使教諸子諸生小有過差先生端坐召與相對終日竟夕不與之語諸生恐懼畏伏先生方畧降詞色時滎陽公方十餘嵗内則正獻公與申國夫人教訓之嚴外則焦先生化導之篤故公徳器成就大畏衆人公嘗言人生内旡賢父兄外旡嚴師友而能有成者鮮矣家傳狎遊縱飲滕龍圖達道布衣時嘗為范文正公門客時范公尹京而滕方年少頗不羈往往潛出丨丨丨丨范公病之一夕至書室中滕已出矣因明燭觀書以俟意將媿之至夜分乃大醉而歸范文陽不視以觀其所為滕畧旡慚懼長揖而問曰公所讀者何書也公曰漢書也復問漢髙祖何如人公逡巡而入洎宅編得一偉人薛簡肅公知成都范蜀公方為舉子一見愛之館於府第俾與子弟講學每曰范君廊廟人也公益自謙退乗小駟至銅壺閣下即步行趍府門踰年人不知為帥客也簡肅公還朝載蜀公以去或問簡肅曰自成見都歸得何竒物曰蜀珍産不足道吾歸丨丨丨丨耳聞録得一人才蔡京晚嵗漸覺事勢狼狽亦有隠憂其從子應之自興化來因訪問近日有甚人才應之曰福州有張觷字柔直者抱負不茍時適到部京遂賓致之為塾客然亦未暇與之相接柔直以師道自居待諸生嚴厲諸生已不能堪一日呼之來前曰汝曹曽學走乎諸生曰某等嘗聞先生長者之教但令緩行柔直曰天下被汝翁作壞了非晩賊發首先到汝家汝曹若學得走緩急可以逃死諸子大驚走告京曰先生忽心恙如此京聞之矍然曰此非汝所知也即入書院與柔直傾倒因訪策焉柔直曰今日救時已是遲了只有收拾人才是第一義京因扣其所知遂以楊龜山為對龜山自是有詔命朱子語録詩集詩諷館賓韓魏公出鎮中山有門客夜踰牆出娼家公知作種竹詩以警之曰慇懃洗濯加培埴莫遣狂枝亂出牆門客自愧作詩云主人若也憐髙節莫為狂枝贈斧斤公置一女奴贈之青𤨏集詩戲館賓山谷戲答史應之云嵗晩亦旡雞可割庖蛙煎鱔薦香醪以應之嘗授館於人為童子師故云爾前輩嘗有詩曰來朝為送先生飯一夜㳂溪捉鱔魚館賓為守趙平叔客漣水軍郡守召置門下數年平叔以館職守漣水後守以所居為豹隠堂石曼卿有詩云熊飛清渭逢何暮龍卧南陽去不還年少客遊今郡守蔚然今在立談間館賓遭遇王竒漢謀有聲埸屋有李文定客文定薨乃章聖臨奠見屏間有詩云鴈聲不到歌樓上秋色偏欺客路中愛之即召見占對稱㫖特許赴殿試謝詩曰不拜春官為座主親逢天子作門生交游附締交擇交事類不諂上交丨丨下交不凟易有信與朋友交言而丨丨語全交君子不盡人之歡不竭人之忠以丨丨也記定交君子丨其丨而後求易淡如水君子之交丨丨丨小人之交甘如醴表記臭如蘭同心之言其丨丨丨易繫交未易言丨道之難丨丨丨也世稱管鮑次則王貢張陳凶其終蕭朱隙其末故知全之者鮮矣後漢王吉傳交深易怨褚遂良以為朋友丨丨者丨丨唐史交久而敬子曰晏平仲善與人丨丨丨丨之語交推其長孔子曰與丨丨丨丨者違其短者故能久也為刎頸交亷頗與藺相如丨丨丨丨丨西漢張耳陳餘相與丨丨丨與金石交漢王丨信為丨丨丨漢書結奔走交何顒與蕃膺袁紹丨為丨丨之丨同上為雲霞交謝瞻范秦丨丨丨之丨南本傳恨相見晚魏其灌夫兩人相引重相得甚驩無厭丨丨丨丨也如平生歡馬援見公孫述以為當握手歡丨丨丨堅如膠漆雷義舉茂才讓於陳重刺史不聴義遂陽狂被髮走不聴命鄉里為之語膠漆自謂堅不如雷與陳契若金蘭山濤與阮籍嵇康皆一面丨丨丨丨嵇阮神交丨康丨籍山濤一見便為丨丨魏裴久交見朋友類注貴客與游王珪與房元齡杜如晦善母窺見大驚曰二客皆公輔才汝貴不疑詳見母子類注名公為交韓愈家江南讀書者文其譽藹鬰當時丨丨皆折官位輩行願丨丨蕭嵩為洛陽尉名士爭往交之締交縞帶紵衣吳季札見鄭子産如舊相識與之丨丨子産獻丨丨左傳魯肅指囷米與周瑜瑜益知其竒遂定僑札之分謂季札與子産也本傳白犬丹雞越人每相能交於山下作壇祭以丨丨丨丨盟曰甲與乙為友上下四旁莫不並見卿若乗車我戴笠後日相逢下車揖我若步行君乗馬後日相逢君當下段公路北户録傾蓋相顧子華子程本反自郯遭孔子於塗丨丨而顧丨語終日甚相親也子華子賃舂與語後漢公沙穆來遊太學旡資糧乃變服客傭為吳祐丨丨丨丨大驚遂共定交於杵臼之間擇交交可與者子夏之門人問交於子張子張曰子夏云何對曰子夏曰可者與之其不可者拒之子張曰異乎吾所聞君子尊賢而容衆嘉善而矜我不能我之大賢與於人何所不容我之不賢與人將拒如之何其拒人也友勝巳者賜也好丨丨丨丨商也好丨不丨丨丨家語非徳不交趙典閉門却埽丨丨丨丨續漢書非儒不游蕭復丨名士夙丨丨與丨以清澡顯無所交接李膺性簡亢丨丨丨丨惟以同郡荀淑陳寔為師友續漢書不妄交游常衮丨丨丨丨王珪恬於所遇交不茍合所至擇交邴原至陳則師韓子助頴川則宗陳仲弓汝南則交范孟博涿郡則親盧士幹魏志郭泰傳適陳留則友符偉明遊太學則師仇季智之陳國則親龎徳公入汝南則交黄叔度與名者游孔緯多丨有丨丨丨交皆名士鄭絪善屬文所丨丨天下丨丨孔述睿少修潔能交當時豪傑豪韓滉幼有善名所游皆天下傑交必長者張廵所丨丨大人丨丨不與庸俗合不妄通賓袁紹居洛陽丨丨丨丨客非海内知名不得見英雄傳不妄與語楊仁辟司徒桓虞府府掾朱章貪奢不法仁終不與交言同席六帖劉巴不與張飛語諸葛亮問之巴曰大丈夫處世當交四海英雄如何與兵卒共語海録不交權利崔從丨喜丨丨丨不交流俗陸龜䝉不喜與流俗交雖造門不肯見詩集審交種樹須擇地惡土變木根結交若失人中道生謗言君子芳桂性春濃寒更繁小人槿花心朝在夕不存莫躡冬氷堅中有潛浪翻唯當金石交可與賢達論孟郊審交擇交獸中有人性形異遭人隔人中有獸心㡬人能真識古人形似獸皆有大聖徳今人表以人獸心安可測雖笑未必和雖哭未必戚面結口頭交肚裏生荆棘好人常直道不順世間逆惡人巧諂多非義茍且得若是傚直人堅心如鐵石不諂亦不欺不奢復不溺面無恡色容心旡詐憂愓君子大道人朝夕常的的孟郊擇友市交事類轉棄將恐將懼惟予與汝將安將樂汝丨丨予谷風終背初則許之以死狥體面俱柔丨乃丨之而飽飛身名已遂張九齡書心面朋而不丨丨朋也友而不丨丨友也揚子顔膝有交際曰以奴丨婢丨為曉解岳峙獨立為澁吝抱朴子勢利以丨交者勢傾則絶以丨交者利窮則散文中子權貨魯連曰丨交者不久丨交者不親誡子拾遺貌親君子不以色親人情疎而貌親在小人則穿窬之盜也與表記面交有丨丨如攜手見利即解攜而去也顔堯誌文爭門而入孟嘗君廢諸客皆去馮驩曰富貴多士貧賤寡交君獨不見夫朝趨市者乎明旦側肩丨丨丨丨日暮之後過市朝者掉臂而不顧非好朝而惡暮所期物亡其中今君失位而賓客皆去事之固然也無勢則去亷頗免長平歸故里故客盡去及復用為將客又復至頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢則我從君丨丨丨丨此固其理也有何怒乎貴賤交情見前謝絶賓客類翟公事利害反眼子厚召至京師而復為刺史也中山劉夢得亦在選中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請于朝將拜疏願以栁易播雖重得罪死不恨遇有以夢得事上白者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕悦酒食游戲相征遂詡詡强笑語以相取下握手出肺肝相示指天日涕泣誓生死不相負背真若可信一旦臨小丨丨僅如毛髪比丨丨若不相識落陷穽不一引手救擠之而又下石焉者皆是也此宜禽獸夷狄所不忍為而其人自視以為得計聞子厚之風亦可少媿矣韓愈栁子厚墓誌始附終叛王荆公薦吕惠卿為參知政事既得位遂叛荆公聞見録易恩為隙曽布以翰林學士權三司使坐言市易事落職知饒州舍人許將當制頗多斥詞制將下往見曽曰始得詞頭深欲繳納又思之釁隙如此不過同貶耳於公旡益也遂黽勉為之然其中語言頗經改易公它日當自知之曽曰君不聞宋子京之事乎昔晏元獻當國子京為翰苑晏愛宋之才雅欲旦夕相見遂税一第於旁近延居之其親宻如此遇中秋啟晏召宋出妓飲酒賦詩達旦方罷翌日罷相宋當草詞頗極詆斥至有廣營産以殖私多役兵而規利之語方子京揮毫之際餘酲猶在觀者亦駭嘆蓋此事由來久矣何足較耶許亦憮然而去東軒筆録詩集翻覆丨手作雲丨手雨紛紛輕薄何須數君不見管鮑貧時交此道今人棄如土杜甫貧交行浮薄勿去草草無惡若比世俗俗丨丨君不見長安公卿家公卿盛時客如麻公卿去後門無車又不見千里萬里江湖濱觸目悽悽旡故人唯有芳草隨車輪一日還舊居門前草先鋤草於主人實旡負主人於草宜何如勿去草草旡惡若比世俗俗丨丨楊次公勿去草行方寸山海攀天草登龍走山草騎虎貴賤結交心不移惟有嚴陵及光武周公稱大聖管蔡寧相容漢謠一斗粟不與淮南舂兄弟尚路人吾心安所從他人丨丨間丨丨㡬千重重言託朋友對面九疑峯多花必早落桃李不如松管鮑久已死何人繼其蹤李白箜篌謠肚裏荆棘見交游類詩集絶交事類故事互見前謝絶賓客類谷風道絶丨丨天下俗薄朋友丨丨焉詩伐木道缺丨丨廢則朋友缺矣同上著絶交論後漢朱穆字公叔丨丨丨丨亦矯時而作注穆與劉伯宗書曰昔我為豐令足下不遭母憂乎親解縗絰衣入豐寺及我為侍書御史足下親來入臺足下今為二千石我下為郎乃反因計吏以謁足下相與豈丞掾之徒我豈下部欲以此謁為榮乎咄劉伯宗以此三義道何其薄哉其詩曰北山有鴟不潔其翼飛不正向寢不定息饑則木攬飽則泥伏饕饕貪汚臭腐是食填腸滿嗉嗜欲旡極長嗚呼鳯謂鳳與徳鳳之所趣與子異域永從此訣各自努力蓋因此而著論也廣絶交論任昉子四人東里西華南客北叟皆旡術業兄弟流離不能自振生平舊交莫與相䘏道逢劉孝標泫然驚曰我當為汝作計乃著丨丨丨丨譏其舊友云若其寵均董石㩲壓梁竇雕刻百工鑪錘萬物九域從其風塵四海疊其燻灼靡不望影星奔藉響川騖雞人始唱鶴蓋蓋如飛鶴成隂髙門旦開流水馬后車如流水接軫皆願摩頂至踵隳膽抽腸約同要離焚妻子誓殉荆卿湛七族是曰勢交其流一也富埒陶白貲巨程羅山擅銅陵家藏金冗出平原而聨騎居里閈而鳴鐘則有窮巷之賓繩樞之士冀宵燭之末光邀潤屋之微澤魚貫鳬躍䬃沓鱗萃分鴈鶩之稻粱霑玉斚之餘瀝䘖恩遇進欵誠援青松以示心指白水而旌信是曰賄交其流二也陸大夫宴喜西都郭有道人倫東國公卿貴其籍甚搢紳羨其登仙加以顩頤蹙頞涕唾流沬騁黄馬之劇談縱碧雞之雄辦叙温郁則寒谷成暄論嚴苦則春叢零葉公升沉出其顧指榮辱定其一言於是有弱冠王孫綺紈子道不挂於通人聲未遒於雲閣攀其鱗翼丐其餘論附駔驥之旄端軼歸鴻於碣石言託附而聲名逺也是曰談交其流三也陽舒隂慘生民大情憂合歡離品物恒性故魚以泉涸而煦沬鳥因將死而鳴哀同病相憐綴河上之悲曲恐懼寘懐昭谷風之盛典斯則斷金由於秋隘刎頸起於苫蓋言貧賤時也是以伍員濯漑於宰嚭張王撫翼於陳相言相杭持翼佐而致榮貴是曰窮交其流四也馳騖之俗澆薄之倫旡不操權衡秉纎纊衡所以量其輕重纊所以屬其鼻息若衡不能舉纊不能飛雖顔冉龍翰鳳雛曽史蘭薫雪白舒向金玉淵海卿雲黼黻河漢視若游塵遇如斷梗莫肯費其半菽罕有落其一毛若衡重錙銖纊微彯撇雖共工之蒐慝驩兠之掩義南荆之跋扈東陵之巨猾皆為匍匐委蛇折支䑛痔金膏翠羽將其意脂韋便辟導其誠故輪蓋所游必非夷惠之室苞苴所入實行張霍之家謀而後動芒毫寡忒是曰量交其流五也凡斯五交義均賈鬻故桓談譬之於闤闠林回喻之於甘醴夫寒暑逓進盛衰相襲或前榮而後悴或始富而終貧或初存而末亡或古約而今泰循環翻覆迅若波瀾此則殉利之情未嘗異變化之道不得一由是觀之張陳所以凶終蕭朱所以隙末斷焉可知矣而翟公方規規然勒門以箴客何所見之晚乎然因此五交是生三釁敗徳殄義禽獸相若一釁也難固易攜讐訟所聚二釁也名陷饕䬸貞介所羞三釁也古人知三釁之為梗懼五交之速尤故王丹威子以檟楚朱穆昌言而示絶有㫖哉有㫖哉古今合璧事類備要前集卷三十四
