body:
  text: 古今合璧事類備要别集卷四十宋謝維新撰菓門荔枝格物總論荔枝樹髙五六丈大如桂樹緑葉蓬蓬冬夏榮茂青華朱實大如鷄子核黄黒似熟蓮子肉白如肪甘而多汁似安石榴有酸甜者至日將中翕然俱赤則可食也一樹下子數斛性熱有人日噉千顆未嘗作疾即少熱以蜜漿解之民間以塩梅鹵浸佛桑花為紅漿荔枝淡乾曝之色紅而甘酸可三四年不蛀南人多以核之細者為珍謂之焦核然此樹最忌麝香或遇之花實落盡也事類交趾移植漢武帝破南越於上林苑中起扶荔宫以植所得龍眼茘枝菖蒲皆百餘本土産南北異冝時多有枯悴者荔枝自丨丨丨丨于庭者無一生焉猶移而不息偶一株稍茂終無華實三輔黄圖嶺南生獻漢永元間丨丨丨丨茘枝十里一置五里一堠晝夜傳送唐羗上書云云詔敕大官勿復受獻後漢本紀南方珍果魏文帝詔曰南方有龍眼茘枝盖丨丨果之珍異者令嵗貢焉魏史閩中紅錦唐𤣥宗正月十五夜於殿中撒出丨丨丨丨茘枝令宫人拾之開元遺事呼丁香子明皇命方士以藥傅茘枝根得核小宫人丨為丨丨丨同上進新曲名貴妃生日長生殿新曲未有名㑹南海進荔枝因名茘枝香外傳涪州進入唐天寳中取丨丨荔枝自子午谷路丨丨蜀志南海飛馳楊妃生於蜀好荔枝丨丨荔枝勝蜀者故毎嵗丨丨以進然方暑而熟經宿輙敗唐書樂天圖寄白丨丨在忠州為荔枝丨丨朝士劉崇姻舊或干以財率不荅但畫荔枝圖與之杜陽編文惠手植本朝胡相陳丨丨公祠堂下有丨丨茘枝郡人謂之將軍樹坡詩序張九齡荔枝賦南海郡出茘枝焉毎至季夏其實乃熟狀甚瓌詭味特甘滋百果之中無一可比余往在西掖嘗盛稱之諸公莫之知固未之信唯舍人彭城劉侯弱年累迁經于南海一聞斯談倍復嘉歎以為甘美之極也又謂龍眼凢果而與茘枝齊名魏文帝方引蒲萄及龍眼相比是時二方不通傳聞之大謬也毎相顧閒議欲為賦述世務卒卒此志莫就及理郡暇日追叙往心夫物以不知為輕味以无味而疑逺不可騐終焉永屈况士有未效之用而身在無譽之間茍無深知與彼亦何以異也因導揚其實遂作此賦云果之羙者厥有茘枝雖受氣於震方實禀精於火離乃作酸於此裔爰負陽以從宜蒙休和之所播渉寒署而匪虧下合圍以擢犀傍䕃畆而抱規紫文紺理黛葉緗枝蓊茸霮䨴環合棼纚如蓋之張如帷之垂雲烟沃若孔翠于斯靈根所盤不髙不卑陋下澤之沮洳惡層崖之險􅥤彼前志之或妄何側生之見疵尔其勾芒在辰凱風入律肇氣含滋芬敷謐溢緑穗靡靡青英苾苾不豊其花但苞其實如有意乎端本故㣲文而妙質蔕葯房而捽萃皮龍鱗以駢比膚玉英而含澤色江䓑以吐日朱苞剖明璫出冏然数寸猶不可匹未玉齒而殆銷雖瓊漿而可軼彼衆味而有五此甘滋之不一伊醇淑之無筭非精言之能悉聞者歡而竦企見者訝而驚仡心恚可以蠲忿口爽可以忘疾且欲神於醴露何比数於甘橘援蒲萄以見擬亦古人之深失若乃華軒洞開嘉賔四㑹時當燠煜客或煩憒而斯果在焉莫不心侈而体泰信琱盤之仙液實玳筵之綺繢有終食於累百愈益氣而理内故無厭於所甘雖不貪而必愛沉美李而莫取浮甘瓜而自退豈一座之所榮冠四時而為最夫其貴可以薦宗廟珍可以羞王公亭十里兮莫致門九重兮曷通山五嶠兮白雲江千里兮青楓何斯美之獨逺嗟爾命之不逄毎被銷於凢口罕獲知於貴躬柿何稱乎梁侯梨何幸乎張公亦因地之所遇熟能辨乎其中哉白樂天茘枝圖序茘枝生巴峽間形狀團團如帷蓋葉如冬青花如橘春榮實如丹夏熟朶如蒲桃核如枇杷殻如紅繒膜如紫綃瓤肉潔白如氷雪漿液甘如醴酪大畧如彼其實過之若離本枝一日而色変二日而香変三日而味変四五日外色香味盡去矣元和十五年夏南賀守樂天命工圖而書之蓋為不識者與識而不及一二者設云蔡君謨荔枝譜論茘枝之於天下惟閩粤南粤巴蜀有之漢初南粤王尉佗以之備方物於是始通中國司馬相如賦上林云答還離支蓋夸言無有是也東京交趾七郡貢生茘枝十里一置五里一堠晝夜奔騰有毒蠱猛獸之害臨武昌唐羗上書言狀詔大官省之魏文帝有西域蒲桃之比世譏其繆論豈當時南北斷隔所擬出於傳聞耶唐天寳中妃子尤愛嗜涪州嵗命驛致時之詞人多所稱詠張九齡賦之以託意白居易刺忠州旣形於詩圖而序之雖髣髴顔色而甘滋之勝莫能著也洛陽取於嶺南長安來於巴蜀雖曰鮮獻而傳置之速腐爛之餘色香味之存者亡幾矣是生茘枝中國未始見之也九齡居昜雖見新實騐今之廣南州郡與䕫梓之間所出大率早熟肌肉薄而味甘酸其精好者僅比東閩之下等是二人者亦末遇真茘枝也閩中惟四郡有之福州最多而興化軍最為竒特泉漳時亦知名列品雖髙而寂寥無紀將尤異之物昔所未有乎蓋亦有之而未始遇乎人也予家莆陽再臨泉福二郡十年往還道由郷國毎得其尤者命工冩生稡集既多因而題目以為倡始夫以一木之實生於海濵嵓險之逺而能名徹上京外被夷狄重於當世是亦有足貴者其於果品卓然第一然性最髙寒不堪移植而又道理遼絶雖不得班盧橘江橙之右少發光彩此所以為之歎惜而不可不述也興化軍風俗園池勝處惟種荔枝當其熟時雖有它果不復見省大重陳紫富室大家嵗或不嘗雖别品千計不為滿意陳氏欲採摘必先閉户隔墻入錢度錢與之得者自以為幸不敢較其直之多少也今列陳紫之所長以例衆品其樹晩熟其實廣上而圓下大可徑寸有五分香氣清逺色澤鮮紫殻薄而子瓤厚而瑩膜如桃花紅核如丁香毋剥之凝如水晶食之消如絳雪其味之至不可得而狀也荔枝以甘為味雖百千株莫有同者過甘與淡失味之中惟陳紫之於色香味自㧞其類此所以為天下第一也凢荔枝皮膜形色一有類陳紫則已為中品若夫厚皮尖刺肌理黄色附核而赤食之有查食已而澁雖無酢味亦自下等矣之福州種植最多延貤原野洪塘水西尤其盛處一家有至於萬株城中越山當州署前欝為林麓暑雨初霽晩日照耀絳囊翠葉鮮明蔽映數里之間焜如火星非名畫之可傳而精思之可述也觀覧之勝無與為比初着花時商人計林斷之以立劵若後豊寡商人知之不計美惡悉為紅塩去聲水浮陸轉以入京師外至北戎西夏其東南舟行新羅日本琉球大食之属莫不愛好重利以酬之故商人販益廣而郷人種益多一嵗之出不知幾千萬億而郷人得飲食者蓋鮮以其斷林鬻之也品目總三十有三惟江家緑為州之最江家緑小陳紫陳紫興化方家紅泉州游家紫興化宋公荔藍家紅周家紅何家紅漳州法石白泉州玳緑核虎皮牛心瑁硫圓丁香黄朱柿福州蒲萄枝水荔枝蜜荔蚶殻荔丁香龍牙香大丁雙髻顆釵頭眞珠粉紅十八娘中元紅將軍荔出廣南大山本以上計三十三品言姓氏尤其著者言州郡記所出也不言姓氏州郡四郡皆或有之歐陽公荔枝譜後序牡丹花之絶而無甘實荔枝果之絶而無名花昔樂天有感於二物矣然斯二者惟不兼萬物之美故各得其精造化之理冝如此也余少游洛陽花之盛處也因為牡丹作記君謨閩人也故能識荔枝而譜之因念昔人嘗有感於二物而二人者適末各得其一之詳故書其所以然而附於君謨之譜詩集南海獻憶昔丨丨使奔騰丨荔枝杜中庭種十年結子知誰在自向丨丨丨茘枝白樂天武仲稱叔師貴其珍丨丨丨斯美良由自逺致含滋不留齒梁劉齋妃子笑長安囘首綉成堆山頂千門次第開一騎紅塵丨丨丨無人知是茘枝來杜牧燕支顆竒異標南土芳林對北堂素華春漠漠丹實夏煌煌葉捧低垂户枝擎重壓墻始因風弄色漸與日爭光夕訝脩懸火朝疑樹㸃粧深於紅躑躅大校白㯽榔星綴連心朶珠排耀眼房紫羅裁襯榖白玉裹填囊早嵗曾聞說今朝始摘嘗嚼疑天上味嗅異世間香潤勝蓮生水鮮逾橘得霜丨丨掌中丨甘露舌頭漿多少尤珍重天髙苦𣺌茫已教生暑月又使阻遐方粹液靈難駐妍姿嫰易傷近南光景熱向北道途長不得充王賦無由寄帝郷唯君堪摘贈靣白似潘郎白樂天鶴頂鮮封開玉籠雞冠澁葉襯金盤丨丨丨想得佳人㣲露齒翠釵先取一枝懸韓偓貢珍竒遐方不許丨丨丨宻詔惟教進茘枝漢武碧桃爭比得枉令方朔號偷兒同上顆酸甜憶昔瀘戎摘茘枝青楓隱映石逶迤杜甫京華應見無顔色紅丨丨丨只自知本芳菲二京曽見畫圗中数丨丨丨色不同鄭谷紅釘密莆陽荔子乾皺殻丨丨丨梅聖俞赤蚌遺五月南遊渇欣逄荔子丹殻勻仙鶴頂肉露水晶丸色應離為火甘殊木作酸枝繁恐相染樹重欲成團丨丨丨珠顆紅犀露角端爽能消内熱潤可濯中乾桂嶺無霜處海天暴雨殘云云一簇氷蠶繭千苞火鳯冠隔瓤銀葉嫩透膜玉漿寒陶弼瑩寒玉南州積炎德嘉樹凌冬緑薰風海上來丹茘迎夏熟煌煌錦綉林亭亭翡翠屋鵠頭爛晨霞天酒丨丨丨流聲感華夏採掇如不足開元百馬死漢堠五里促君王玉食間此薦知不辱迨今糟粕餘猶足驚凢目憶初成上林四方㑹竒木使臣得安榴天馬來苜蓿擢身自幽遐託地幸㵕漉我欲咎真宰謂兹限荒服將非名實雄百菓為羞縮區區化工意聊尔存衆族劉貢父駢火實丞相祠堂下將軍大樹傍炎雲丨丨丨瑞露酌天漿蘭紫垂先熟髙紅掛逺揚分甘徧鈴下也到黒衣郎坡赬虬珠南村渚北村盧白衣青葉冬不枯垂黄綴紫煙雨裏時與荔枝為先驅海山仙人絳羅襦紅紗中單白玉膚不湏更待妃子笑風骨自是傾城姝不知天公有意無遣此尤物生海隅雲山得伴松檜老霜雪自困楂梨麄先生洗琖酌佳醑氷盤薦此丨丨丨似開江鰩斫玊柱更洗河豚烹腹腴我生渉世本為口一官久矣輕蓴鱸人間何者非夢幻南來萬國真良圗坡水晶丸錦筵火齊堆金盤五月甘漿破齒寒南國已随朱夏熱北人猶指畫圖㸔烟嵐不續丹櫻献玉座空悲羯鼓殘相見任誇雙蒂美多情莫唱丨丨丨劉貢父絳紗苞名園競摘丨丨丨蜜漬瓊膚甘且滑壯游京洛墮紅塵箬籠白曬脯最珍頴濵紅錦包粤犬吠雪非差事粤人語氷夏虫似北人氷雪作生涯氷雪一窖活一家帝城六月日卓午市人如炊汗如雨賣氷一聲隔水來行人未喫心眼開甘霜甜雪如壓蔗年年窨子南山下去年藏氷試工夫山鬼失守嬉西湖北風一夜動地惡盡吹北氷作南雹飛來嶺外荔枝梢絳衣朱裳丨丨丨三色露珠凍寒泚火傘燒林不成水比人藏氷天奪之却與南人消暑氣楊誠齋歌樂府絳紗嚢裹水晶五嶺麥秋殘茘子初丹丨丨丨丨丨丨丸可惜天教生處逺不近長安有往事憶開元妃子偏怜一從䰟散馬嵬関只紅塵無驛使滿眼驪山浪淘沙歐陽公香玉滿包仙液多與牡丹聨譜南珍獨北江揺閩山入貢冠前朝露葉風枝裊裊丨丨丨丨丨丨縐紅圓蹙鮫綃華清宫殿蜀山遥一騎紅塵失笑西江月康伯可雅稱佳人纎手擘閩溪珍獻過海雲㠶來似箭玉座金盤不貢竒葩四百年八輕紅釅白丨丨丨丨丨丨丨骨細肌香恰似當年十娘减字木蘭花東坡曾得眞妃笑臉㸔青幄髙張瓊枝綴巧萬顆香染紅殷絳羅衣潤疑是火然山白玉釵頭試篸黄金帯竒巧工鑚題評處仙家異種分付在人間年年輸帝里歡呼内監粧㸃金盤况丨丨丨丨丨丨頻丨炎嶺當時奏曲風流命樂府名傳慿誰道移歸禁苑長使近天顔蒲庭芳古詞龍眼格物總論龍眼一名龍目一名比目樹如茘枝但枝葉稍小殻青黄色形如弹丸核如木梡子不堅肉白而帯漿其甘如蜜一朶動五六十顆作一穗如蒲萄然荔枝過即龍眼熟故號曰荔枝奴事類南越所得前茘枝注南方所貢同上漢賜單于丨單于來朝丨橙橘龍眼荔枝東觀漢記山谷辨蜀都賦左思蜀都賦卭竹縁嶺囷桂臨崖旁挺龍目側生荔枝布緑葉之萋萋結朱實之離離故張九齡賦荔枝云雖觀上國之光而被側生之誚老杜亦云側生野岸及江浦不熟丹宫滿玉壷雲壑布衣駘背死盖言臨武長唐羌勞人害馬翠眉湏也龍眼惟閩中及南越有之大冲自言十年作賦三都所有皆責土物之貢至於稱龍目亦不自知其失也又元三大是􅂒人字也誤轉為生詩集流膏液龍眼與茘枝異出同父祖端如柑與橘未易相可否異哉西海瀕琪樹羅𤣥圃累累似桃李一一丨丨丨坐疑星殞空又恐珠還浦圖經未嘗說玉食逺莫数獨使皺皮生弄色映琱爼蛮荒非汝辱幸免妃子汚坡廉州眼可敵荔枝割蜜脾幽株旁挺緑婆娑啄咂雖㣲柰美何秀丨丨丨知韻勝價輕魚目為生多左思賦詠名初出玉局揄揚論豈頗地極海南秋更暑登盤猶足洗沉痾劉彦冲古今合璧事類備要别集卷四十
