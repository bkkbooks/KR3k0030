body:
  text: 古今合璧事類備要前集卷二十四宋謝維新撰親屬門祖父母事類鼻祖丨丨始祖也獸之初生謂之鼻人之初生謂之首梁益謂丨為丨或謂之丨丨楊子雲方言家祖潘尼稱祖曰丨丨顔氏家訓王父母逮事父母則諱丨丨丨不逮事父母則不諱丨丨丨曲禮大父行鄭當時知友皆丨丨丨預知為將賈逵自為兒戲弄常設部伍祖父習異之曰汝大必為將魏志預憂及亂晉何曹侍武帝宴退告其子道曰國家應天受命創業垂統吾每侍宴未嘗聞經國逺圖唯說平生常事非貽厥孫謀之兆也後嗣其殆乎此吾子孫之憂汝等猶可沒指孫曰此輩必遭亂亡及遵之子綏死兄嵩哭之曰吾祖其殆聖乎留硯與孫晉范喬年二歲時祖馨臨終撫喬首曰恨不見汝成人因以所用硯與之至五歲祖母以告喬喬執硯涕泣畫像於壁魏曹休祖父嘗為吳郡太守休後至吳郡太守含見壁上祖父丨丨乃下榻涕泣祖父命名鄭𤣥之子益恩赴黃巾之難隕身有遺腹子𤣥以其手文似己名之曰小同後鄭𤣥傳祖母命名李百藥為童兒時多疾病丨丨趙氏故以百藥為名念祖母病齊宗元卿早孤為祖母所養祖母病元卿在逺輒心痛大病則大痛小病則小痛以此為常鄉里號宗曾子侍祖母病晉李密字令伯父早亡母改醮祖母劉撫養密後徵為太子洗馬以祖母年老無人丨養乃上表陳情臣以險釁夙遭閔凶生孩六月慈父見背行年四嵗舅奪母志丨丨劉愍臣孤弱躬親撫養零丁孤苦至于成立外無朞功强近之親內無應門五尺之僮㷀㷀孑立形影相吊臣無祖母無以至今日祖母無臣無以終餘年母孫二人更相為命是以區區不能至逺臣密今年四十有四祖母劉年九十有六是臣盡節於陛下之日長報劉之日短也烏鳥私情願乞終養庶劉僥幸保卒餘年臣生當隕首死當結草臣不勝犬馬怖懼之情表得芹歸獻劉殷祖母王氏盛冬思芹而不言殷知之時年九歲乃於澤中慟哭忽有芹生於地丨斛餘至丨生乃盡煮藥侍奉劉審禮少喪母為祖母元所養隋末大亂道不通審禮尚少自鄉里負祖母度江轉側避地及天下平西入長安元每疾必親丨丨嘗而進元曰兒孝通幽顯吾一顧念間病輒間父母孝養同事類尊親父丨而不親母丨而不尊表記愛惡父母丨之喜而不忘父母丨之懼而無怨記嚴君家人有丨丨焉父母之謂也家人遺體身者父母之丨丨可不敬乎祭義不逆父母有過諫而丨丨記不忘一舉足而丨敢丨父母一出言而丨敢丨父母可謂孝矣同上不怨事父母幾諫見志不從又敬不違勞而丨丨里仁以養故親生之膝下丨丨父母孝經全歸父母全而生之子丨而丨之記不毁身體髮膚受之父母丨敢丨傷孝經喜懼父母之年不可不知也一則以丨一則以丨語為政揚顯立身行道丨名於後世以丨父母孝經皆有父母之心人丨丨之孟俱存君子有三樂而王天下不與存馬父母丨丨兄弟無故一樂也盡心生養父能丨之不能養之母能丨之不能教誨之荀禮論劬勞蓼莪孝子不得終養爾蓼蓼者莪匪莪伊蒿哀哀父母生我丨丨詩怙恃無父何丨無母何丨出則銜恤入則廢至同上長育父兮生我母兮鞠我拊我畜我丨我丨我顧我復我出入腹我欲報之德昊天罔極蓼莪幹蠱初六丨父之丨九二丨母之丨易蠱竭力事父母能丨其力語陟岵丨丨孝子行役思念父母也丨彼丨兮瞻望父兮陟彼屺兮瞻望母兮詩魏風循陔南陔孝子相戒以養也丨彼南丨言採其蘭眷戀庭闈心不遑安束晳補詩不逺遊父母在丨丨丨遊必有方語不顧養世俗所謂不孝者五惰其四支丨丨父母之丨一不孝也博奕好飲酒丨丨父母之丨二不孝也好貨財私妻子丨丨父母之勇丨三不孝也從耳目之欲以為父母戮四不孝也好鬬狠以危父母五不孝也孟離婁菽水盡歡子路曰傷哉貧也生無以為養死無以為禮子曰啜丨飲丨丨其丨斯之謂孝禮風木思養孔子出行聞有哭聲甚悲至則臯魚也被褐擁劒哭於路左孔子下車而問其故對曰吾少好學周流天下而吾親死遊一失也髙尚其志不事庸君而晚無成二失也少失交寡於親友而老無所託三失也夫樹欲靜而風不止子欲養而親不待往而不可返者年也逝而不可追者親也吾於是辭矣立哭而死於是孔子之門人歸養親者一十二人韓詩外傳三釡養親曾子曰吾及親仕三釜而心樂後三千鍾而不洎吾心悲莊子曾子曰往而不可還者親也故孝欲養而親不待是故椎牛而葬不如雞豚之逮親存也初吾為吏祿不及釡尚欣欣而喜者非以為多也樂其逮親也既沒之後吾嘗南遊於楚得尊官焉堂髙九尺傳嘗百乘然猶北向而涕泣者非為賤也悲不逮吾親也故家貧親老不擇官而仕韓詩外傳百里負米子路曰家貧親老不擇祿而仕昔者由也為親丨丨丨丨親沒南游於楚從車百乘纍茵而坐列鼎而食願負米百里豈可得乎木欲靜而風不停子欲養而親不逮枯魚銜索幾何不蠧二親之壽忽如過隙悲哉家語帝舜大孝嶽曰瞽子父頑母嚚象傲克諧以孝堯典大孝終身慕父母五十而慕者豫於大舜見之矣孟武王達孝孔子曰丨丨周公其丨丨矣乎夫孝者善繼人之志善述人之事者也閔不間言孔子曰孝哉丨子騫人丨丨於其父母昆弟之丨語曾能養志孟子曰曾子養曾晢必有酒肉將徹必請所與問有餘必曰有曾晢死曾元養曾子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也若曾子則可謂養志也事親若曾子者可也曾子受箠丨丨嘗冇為不中曾晢怒援木擊之曾子有頃乃蘇退鼓瑟而歌孔子聞之告門人曰參來勿內也背舜事瞽叟索而使之未嘗不在側索而殺之未嘗可得而小箠則受大箠則走今參也委身待暴怒以陷父不義不孝孰大乎說苑伯瑜泣杖韓丨丨有過其母笞之泣母曰他日未嘗泣今何泣對曰他日得笞常痛今母之力不能痛是以泣也同上仁傑望雲唐狄仁傑授并州司法參軍親在河陽丨丨登太山反顧見白雲孤飛謂左右曰吾親舍其下顧丨久之丨移乃去本傳王陽畏坂王尊遷益州刺史先是丨丨為益州至卭崍九折坂歎曰奉先人遺體奈何數乘此險後以疾去及尊至此問吏曰此非王陽所丨道耶吏曰是尊叱其馭曰驅之世以王陽為孝子王尊為忠臣老萊戲綵丨丨子者養二親行年七十嬰兒自娛著五色米衣嘗取漿上堂跌仆因卧地為小兒啼或弄烏鳥於親側列女傳黃香扇枕丨丨躬執勤苦盡心供養暑則丨床丨寒即以身溫席關中曾子唐賈㑹有髙節里中號一龍親死負土成墳廬其左手蒔松柏號丨丨丨丨張氏曾子後張霸年數歲而知孝遜出入飲食自然合禮人號張曾子讀詩廢講顧歡隱天台山開館聚徒早孤丨丨哀哀父母輒丨書慟泣由是受學者廢蓼莪篇不復講南史誦詩慨歎後周磐養母嘗丨丨至汝墳未章丨然而丨乃解韋帶就孝廉之舉及母歿公府三辟遂不應本傳休沐謁親石慶為內史建老白首萬石君尚無恙每五日洗沐歸謁親入子舍竊問侍者取親中裙厠牏身自浣灑以為常奉檄養親毛義家貧以孝行稱府檄以為郡守義以手丨丨而入喜動顔色張奉薄之後義母亡遂不仕奉歎曰往日之喜乃為親也捨養入京歐陽詹閩人也父母老矣丨朝夕之丨以來京師其心將必有得而歸為父母榮也雖其父母之心亦皆然詹在側雖無離憂其志不樂也詹在京師雖冇離憂其志樂也若詹者所謂以志養志者歟韓文辭學歸養陽城為國子司業引諸生告之曰學者所以學為忠與孝也諸生有久不歸省親者乎明日謁城歸養者二十輩有三年不歸侍者斥之秦人誶語丨丨借父耰鉏慮有德色母取箕帚立而丨丨賈誼策鄠人剔股鄠有以孝為旌門者乃本其自於丨丨曰彼自丨丨以奉母疾瘳大夫以聞其令尹令尹以聞其上上俾聚土以旌門使勿輸賦欲為後勸鄠大夫常曰他邑有是人乎愈曰母疾則於烹粉藥石以為是未聞毁傷支體以為養在教未聞有如此者茍不傷於義則聖賢當先衆而為之也是不幸因而且致死則毁傷滅絶之罪有歸矣其為不孝得無甚乎韓文作相親存唐宰相二親存者唯元振一人李雍撰邪元振行狀國朝宰相最少者帷王溥罷相時父母皆在人以為榮今富丞相入中書時年五十二太夫人在堂康强後三年太夫人薨有司議贈恤典云無見任宰相丁憂例是嵗三月春宴百司已其前一夕有㫖富弼母喪在殯特罷宴此亦世未有歸田録侍養不仕包孝肅公拯始及第以親老丨丨丨丨宦且十年人稱其孝言行録及貴思養范文正公為參政時告諸子曰吾貧時與汝母養吾親汝母躬執爨而吾親甘㫖未嘗充也今而得厚祿欲以養親親不在矣汝母亦已蚤世吾所恨者忍令若曹享富貴之樂於是俸賜常均於族人并置義田宅云刲股和藥張密學奎性篤孝為御史時母病乃齊戒丨丨肉丨丨進之遂愈行狀刲股進糜雷孝子者名天錫年十一父疾甚天錫從母奩中竊鬚刀剔股縷切置糜中以進父飲下咽輒蘇病良已范石湖作傳詩集壽酒詔許辭中禁慈顔赴北堂聖朝新孝理祖席倍恩光內帛擎偏重宫衣著更香淮隂清夜驛京口渡江航春隔雞人畫秋期燕子凉賜書誇父老丨丨樂城隍看畫曾饑渴追蹤恨渺范虎頭金粟影神妙獨難忘甫昔時於許生處乞瓦棺寺維摩啚樣杜甫送許拾遺歸覲省板輿連持使節歷専城獨賀崔侯最慶榮烏府一拋霜簡去朱輪四從丨丨行發時正許沙鷗送到日方兼竹馬迎惟慮郡齊賔友少一杯春酒共誰傾白居易送崔使君侍親赴任父子父子相反父子齊名子能承父父子並仕子過於父父子繼美父子連禍假父假子事類天性父子之道丨丨也孝經家道父父子子兄兄弟弟夫夫婦婦而丨丨正正家而天下定矣家人孝慈為人子止於丨為人父止於丨大學作述父丨之子丨之中庸幹蠱丨父之丨有子考無咎易蠱卦肯堂若考作室厥子乃弗丨丨矧肯構厥父菑厥子乃弗肯播矧肯獲書問安文王為世子朝于王季日三雞初鳴而至寢門丨內竪曰丨否何如內竪曰安文王喜日中又至亦如之及暮又至其有不安內竪以告文王文王色憂文王有疾武王不說冠帶而養文王一飯武王亦一飯文王再飯武王亦再飯記養志前父母類橋梓伯禽與康叔見周公三見三笞之二子乃問商子商子曰南山之陽有木名丨南山之隂有木名丨何不往觀之二子往見丨木髙而仰丨木實而俯還告商子商子曰丨者父道丨者子道也世說楂梨張敷小名丨父劭小名丨宋文帝嘗戲之曰丨何如丨敷曰梨是百果之宗楂何敢比也碎事父不教子古者易子而教之丨子之間丨責善責善則離離則不祥莫大馬孟離婁上父不傳子輪扁日臣也斫輪得之於手應之於心臣不能以喻臣之子臣之子亦不能受之於臣天運烹子遺羮文王長子曰伯邑考紂􅀢以為羮以賜文王曰聖人不食其子羮文王得而食之紂曰誰謂西伯聖者與食其羮而不知世紀樂羊為魏將而攻中山中山之君丨其丨而丨之丨樂羊坐於幕下而啜之盡一杯文侯謂褚師贊曰樂羊以我故而食其子之肉答曰烹其子而食之且誰不食樂羊罷中山文侯賞其功而疑其心韓非子殺翁分羮項羽聞成臯破亦軍廣武與漢相守楚軍食少項王患之乃為髙俎置太公其上告漢王曰今不急下吾烹太公漢王曰吾與若俱北面受命懷王約為兄弟吾翁即若翁必欲烹而翁幸分我一杯羮項王怒欲殺之項伯曰且為天下者不顧家雖殺之無益也漢史子雖至親西伯食其肉不然則死於羑里也父雖至尊沛公索其羮不然則臣於項籍也文粹馮用之權論證父攘羊葉公問孔子曰吾黨有直躬者其父攘羊而子丨之孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣語譏父銅臭崔烈嘗問其子鈞曰吾居三公於議者何如鈞曰大人少有英稱歷位卿守論者不謂當為三公而今登其位天下失望烈曰何為然也鈞曰論者嫌其銅臭烈怒舉杖擊之鈞狼狽而走烈罵曰死卒父檛而走豈孝乎鈞曰舜之事父也小杖受大杖走此恐陷父於不義非不孝也烈慙而讓官諫父飲酒曹參代蕭何為相國日夜飲酒子窋為中大夫惠帝怪之令窋言曰無以請事何以憂天下窋洗沐歸具言參怒之乃笞二百口趣入侍天下事非汝所當言漢史諫父寫書後漢吳祐父恢為南海太守祐年十二隨父到官恢欲殺青簡竹以寫書祐諫曰今大人踰越五嶺逺在海濵其俗誠陋舊多珍怪上為國家所疑下為威權所望此書若成即載之兼兩昔馬援以薏苡興謗王陽以衣囊徼名嫌疑之間先賢所慎恢奇之乃撫其首曰吳氏世不乏季子矣不書官紙阮孝緒十餘歲隨父為相州行事丨丨丨丨以成親之清白善呼幕賔柳公綽居外藩其子每入境郡邑未嘗知既至每出入常於㦸門外下馬呼幕賔為文皆許納拜未嘗笑語欵密炊飯延客陳太丘有子元方季方有客詣太丘談鋒甚敵太丘令二子丨丨丨丨二子委甑竊聽客語飯落釡成麋而進客去太丘責之二子言其故且誦客語無遺太丘曰但麋自可何必飯商藝小說散財施親郤愔好聚斂積錢數十萬嘗開庫任其子超所取超性好施一日中散與親故都盡出入隨侍陳太丘詣荀朗陵貧儉無僕役乃使元方將車季方持杖從後長文尚少載著車中既至荀使叔慈應門慈明行酒餘六龍下食文若亦小坐著膝前于時太史奏五百里內賢人聚世說交游推重唐郤士美好學善記覽父友顔真卿蕭頴士輩嘗與討論經傳應對如流既而相謂曰吾曹兾日當交二郤之間矣本傳朔望歸省唐王起子龜性髙簡無貴胄氣以光福第賔客多更住永達里林木窮僻構半隱亭以自適侍父河中廬中條山丨丨一丨丨州人號為郎君谷歲節上壽張酺為太尉父在田里每有遷職輒一詣京師適㑹丨丨公卿詣酺府奉酒丨丨極歡人皆慶羡之閨門整肅魏司馬朗父防丨丨自守諸子雖冠成人不命進則不敢進不命坐則不敢坐不指所問不敢言父子之間丨丨如此車馬就養陸賈為大中大夫吕太后欲王諸吕賈自度不能爭之乃病免以好畤田地善往家焉有五男乃出所使越槖中裝賣千金分其子子二百金令為生産賈常乘安丨駟丨從歌鼓瑟侍者十人寶劒直百金謂其子曰與汝約過汝汝給人馬酒食極歡而更所死家得寶劒車騎侍從者一歲中往來遇它客率不過再過數擊鮮無久溷汝為也責子不賢王述蒙顯授義之恥為之下遣使詣朝廷求分會稽為越州行人失辭大為時貴所笑既而內懷愧歎謂諸子曰吾不作懷祖而位遇懸邈當由汝等不及坦之故耶責子貴重宋顔延之子竣貴重延之謂曰平生不喜見惡人今不幸見汝不私其子姚崇二子在洛通賔客饋遺憑舊請托魏知古歸悉以聞他日帝召崇曰卿子才乎皆安在崇揣知帝意曰臣二子分司東都為人多欲而寡謀是必以事干魏知古帝始以崇私其子微言動之及聞乃大喜問安從得之對曰知古臣所薦也臣子必謂見德而請之帝於是愛崇而薄知古欲斥之崇曰臣子無狀撓陛下法而逐知古外必謂陛下私臣取決於子令孤綯為相每朝廷大事一丨丨丨丨滈如元載之伯和李吉甫之德裕滈頗招權受賄言事者攻其短綯為其子訟寃晚歲識父霍去病父仲孺以縣吏給事平陽侯家與侯侍者衛少兒私通生去病仲孺吏畢歸家娶婦生子不相聞久之去病為驃騎將軍擊胸奴道出河東至平陽傳舍遣迎仲孺趍入拜謁將軍迎拜因跪曰去病不早自知為大人之遺體也仲孺扶服叩頭曰臣得託命將軍此天力也去病大買田宅奴婢而去道間得父吕向之生父岌客逺方不還後有傳父猶在者訪索纍年不獲它日自朝還丨見一老人物色丨之果父也下馬抱父足號慟行人為流涕忍傷父名田叔為魯相卒魯人以百金祠少子仁不受曰無以百金傷父名拜讀父書吳顧愷每得父書常掃灑几筵舒書於上拜跪讀之每句應諾閲畢再拜若父有疾耗之問則臨書垂泣語聲哽咽六帖求顯父名甄逢常以父不得在國史而逢與元稹善稹移書於史館修撰韓愈愈答逢得能行身幸於方州大臣以標目其先人事載之天下耳目徹之天子追爵其父第四品赫然驚人違與其父俱當得書矣由是父子俱顯名羞掩父德袁宏遷桓溫記室後為東征賦末列稱過江諸名德而獨不載桓彝溫知之復游青山飲歸命宏同載問宏云聞君作東征賦多稱先賢何故不及家君宏曰尊君稱謂非下官敢専既不遑啓不敢請之耳溫曰君欲為何辭宏即答曰風鑒散朗或搜或引身雖可亡道不可殞宣城之節信義為先溫泫然而止宏賦又不及陶侃侃子胡奴嘗於曲室抽刃問宏曰家公勳跡如此君賦日何相忽宏窘急答曰我已盛述尊公何乃言無因曰功以濟時職思靜亂長沙之勳為史所贊胡奴乃止哀父不出韋陟以父不得不歿與斌杜門不出八年親友更相敦晚乃强調洛陽令宋璟見陟曰盛德遺範盡在是矣傷父被刑吳郡陸襄父間被刑襄終身布衣蔬飯雖姜菜有切割皆不忍食居家惟以搯摘供厨江陵姚于篤母以燒死終身不忍噉炙豫章熊康父以醉而為奴所殺終身不復嘗酒然禮緣人情恩由義斷親以噎死亦不可絶食也顔氏家訓舁輿傳代原榖者不知何許人祖年老父母厭患之意欲弃之穀年十五涕泣苦諫父母不從乃作輿舁弃之穀乃隨收輿歸父謂之曰爾焉用此凶具曰穀乃後父老不能更作得是以收之耳父感悟愧懼乃載祖歸侍養尅巳自責更成純孝穀為純孫孝子傳見太平御覽父子相反善惡不同犂牛之子騂且角雖欲勿用山川其舍諸注父雖惡不害子善語賢否不類堯之子丹朱不肖舜之子商均亦不肖以瞽叟為父而有舜孟子父子相夷公孫丑曰君子不教子何也孟子曰勢不行也教者必以正以正不行繼之以怒繼之以怒則反夷矣夫子教我以正夫子未出於正則是丨丨丨丨也丨丨丨丨則惡矣父子責善公都子曰匡章通國皆稱不孝焉夫子與之遊又從而禮貌之敢問何也孟子曰夫章子子父責善而不相遇也責善朋友之道也丨丨丨丨賊恩之大者夫章子豈不欲有夫妻子母之屬哉為得罪於父不得近出妻屏子終身不養焉其設心以為不若是是則罪之大者是則章子巳矣離婁下不從父請唐崔湜為兵部侍郎父挹性貪數為人請托以干湜湜多丨丨由是丨子相失素違父命前漢有俍子者家資萬金自小不從父語臨亡欲葬山上恐兒不從倒言葬我著渚下石磧上俍子曰一我由來不奉教令當從此一語盡散家財積土繞之成洲長數百步元康中始為水所壞太平御覽子能承父詳見役有子門綽有父風柳仲郢牛僧孺辟武昌幕府有父風矩僧孺歎曰非積習名教安及此耶本傳崔謹由有父風采士李昭德彊幹有父風鄭裔淖峭立有父風蕭頴子有亮直有父風能為吾賦歐陽公為鳴蟬賦他兒皆一視而過獨小子柴守之不去公曰此兒必丨丨丨此丨因以豫之歐集子過於父從仲舉遊薛勤仕郡為功曹陳仲舉年十五為父齎書詣勤勤顧而察之明日造焉仲舉父出迓勤勤曰足下有不凡子吾來侯之不從卿也言議盡日汝南先賢傳共阿戎談阮籍素與王渾為友渾子戎字濬仲年十五少籍二十歲而籍與之交籍每遇渾俄頃輒去過視戎良久然後出謂渾曰濬仲清爽非卿倫也共卿言不如丨丨丨丨老蚌雙珠韋康元將弟誔仲將孔融與其父書曰前日元將來淵才亮茂雅度𢎞毅偉世之器也昨日仲將來文敏篤誠保家之主也不意雙珠近出老蚌後漢雞羣野鶴嵇紹始入洛或謂王戎曰昨於稠人中始見嵇紹昂昂然如野鶴之在丨丨戎曰君復未見其父耳父則中散嵇叔夜也撞破煙樓王魏郎雜針云家人有嚴君焉井竈之謂也是以父喻井竈東坡答陳季常云在定日作松醪賦一首今寫岢擇等庶以發後生妙思著鞭一躍當丨丨丨丨也父子齊名互見世家趙氏二日趙衰冬日之日趙盾夏日之日冬日可愛夏日可畏左傳陳氏三君陳元方弟諶季方與父實齊德同行號三君父子之美石奮石建丨丨丨丨也無是父無是子無是子無是父楊子父子俱清胡質仕魏為荆州刺史子威自京師省父留十數日告歸父賜縑一匹曰吾俸祿之餘也及威為徐州刺史武帝問卿清孰如父對曰臣父清畏人知臣清畏人不知得父一絶宋之問父令文富文辭且工書有力絶人世謂之三絶都下有牛善觸人莫敢攖令文直往拔取角折其頸殺之後之問以文章起弟之悌以驍勇聞之遜精草𨽻世謂皆丨丨之丨丨與父齊名王羲之有子七人其知名者五人曰𤣥之凝之徽之操之獻之孟郊詩曰羲之生五子羲之又有之書羲之善書子獻之亦能書謝安問獻之君何如君家君答曰固當不同晉書父子驍勇連奚震驍勇走及奔馬周文曰非此父不生此子北史父子勳名國朝韓忠憲億子獻肅綘門下侍郎維尚書右僕射縝韓忠獻琦子門下侍郎忠彥范文正仲俺子忠宣純仁並以勳業著曹武惠彬子武穆寶臣並髙武烈瓊子穆武繼勳以武功著父子文章蘇洵嘉祐間與其二子軾轍至京師歐陽修得洵書二十篇大愛其文辭以賈誼劉向不能過也以其書獻諸朝其二子同舉進士又同登制科一日丨丨隱然名動京師而蘇氏丨丨遂擅天下父子並仕互見世家同在禁管蘇瓌子頲遷給事中拜中書舍人時瓌同中書門下三品父子丨丨丨丨朝廷榮之唐書對管華近溫大雅遷黃門侍郎而彥博亦為中書侍郎丨丨丨丨帝常從容謂曰我起晉陽為卿一門耳父子學士蔣乂丨丨為丨丨儒者榮之父子侍郎唐崔挹子湜景龍二年遷兵部侍郎而挹為禮部侍郎父子同拜李宗閔進中書舍人父䎖為華州刺史丨丨丨丨世以為寵父子討賊吳元濟叛皇帝君曰韓𢎞汝以卒萬二千屬而子公武往討之曰𢎞汝其以節度都統討軍平淮碑門生出迎楊嗣復父於陵嗣復領貢舉時於陵自洛入朝乃率丨丨丨丨置酒第中於陵坐堂上嗣復與諸生坐兩序世以為美六帖參軍在逺王方變為相時子為眉州司士丨丨武后曰君在相位何子之逺對曰廬陵陛下愛子今尚在逺臣之子庸敢相近公庭展敬楊𤣥感與父素俱為柱國朝㑹則齊列隋文帝命𤣥感降一等謝曰不意陛下寵臣之甚許以丨丨丨私丨隋史屏風隔坐吳紀亮為尚書令子隲為中書令每朝㑹詔以御丨丨丨丨為父增秩孫逖遷中書舍人父嘉之且八十猶為令逖求降外官增父秩帝嘉納拜嘉之宋州司馬聽致仕請息補外源乾曜進侍中建言大臣子並求京職俊乂率任外官非平施之道臣三息俱任京師丨二丨丨丨以示自近始詔可乃以子河南參軍弼為綘州司功太祝潔為鄭尉諸子侍立竇儀尚書本燕人性嚴重家法整肅尚書每對客坐即二侍郎三起居四參政五補闕皆侍立三子列侍陳省華蜀人堯叟堯佐堯咨皆進士及第而伯仲為天下第一晚年其燕國夫人馮氏俱康寧堯叟知樞密院次子直史館少子知制誥每對客丨丨丨丨客不自安省華曰學士列侍常也士大大以為榮澠水燕談朝服侍立王溥拜相年三十二其父祚纍遷防禦使每見客溥常丨丨丨丨客不安求去祚曰學生勞賢者起避耶歸田録朝班在前吳正肅公育在二府太保公以列卿奉朝請父子在廷士大夫以為榮而公踧踖不安自言子班父前非所以示人以法顧不敢以人子私亂朝廷之制願得罷去不聽父子同命王荆公及子雱同修經義經成加荆公左僕射雱龍圖閣直學士同日受命元綘賀詩曰陳前輿服同桓傅拜後金珠有魯公東軒筆録父子主法荆公置條例司用程伯淳為屬一日盛暑荆公與伯淳對語公子雱囚首跣足㩦婦人冠以出問荆公曰所言何事荆公曰新法數為人沮方與程君議雱箕踞以坐大言曰梟韓琦富弼之首於市則新法行矣荆公遽曰貌誤矣伯淳正色曰方與參政論國事子弟不可預姑退雱不樂去伯淳自此與公不合父子繼美互見世家魯公拜後見世家類西平有子李晟傳帝狩梁州晟泣曰國家多難乘輿播遷見危死節自吾之分乃自東渭橋以精騎萬人破賊朱泚率殘卒萬人西走餘黨悉降帝曰天生晟為社稷萬人豈獨朕哉乃拜晟行營副元帥徙王西平郡子訴字元直以䕃補憲宗討吳元濟以訴為節度會大雨雪行七千里夜半至懸弧城雪甚城旁皆鵝鶩池訴今擊之以亂軍聲訴入城擒吳元濟柳子厚平淮雅曰惟丨丨丨丨惟我有臣俱至宰相漢韋賢字長孺子𤣥成字少翁丨以明經丨丨丨繼為宰相蘇廷碩與宋璟同當國璟嘗曰吾與蘇氏父子同為宰相僕射長厚自是國器獻可替否事至即斷公不顧私則今丞相過之竇至德父子丨丨丨丨世詫其榮代為太僕漢公孫賀自太僕卿遷丞相其子敬聲丨丨丨丨卿代為刺史韋康將丨父端丨荆州丨丨父老止傳舍康入舍時人榮之代為衛卿魏辛眦為衛尉卿子敞亦為衛尉卿繼為太守劉馥為楊州太守恩化大行子靜為廬江守詔曰卿父昔為彼郡可謂克負荷也繼掌誥命明皇幸蜀傳位賈至撰冊進藁上曰昔先天誥命乃父為之今兹辭命乃爾為之兩朝盛典出卿家父子可謂繼美矣至頓首流涕代有文辭謝鳯子超宗有文辭作殷淑妃誄帝大嗟賞謝莊曰超宗殊有鳯毛宋書坐卧易處漢杜延年為御史大夫以居父官不敢當父舊位丨丨皆丨其丨文書著姓世祖令鮑昱封降戎檄問有所怪否昱曰通官丨丨不丨丨怪司𨽻下著姓世祖曰吾欲令天下知忠臣子復為司𨽻也手植三槐王晉公祐太祖朝為知制誥使魏州太祖曰使還與卿王溥官職時王溥為相使還帝怒安置華州七年不召初祐赴貶時親朋送祐竊意公作王溥官職矣祐笑曰某不做兒子二郎必做二郎者文正公旦也祜丨丨丨丨于庭曰吾子孫必有為三公者已而果然天下謂之三槐王氏邵氏録人比八龍國朝韓億忠獻公八子曰綱綜綘繹緯縝維􅒺多為聞人詩注綘縝皆為宰相維為門下侍郎丨以丨荀氏丨丨黃父子同戮父子伏誅漢周紓字文通為沛郡守為人酷虐後坐事丨丨皆丨丨父子連罪漢公孫賀為丞相子敬聲為太僕卿敬聲有罪賀請捕朱安世以贖子罪安世曰丞相禍及宗矣子代父死史石奢相楚行縣有殺人者追之乃其父也縱其父還而自拘曰殺父立政非孝也廢法縱罪非忠也臣當死乃自刎而死假父假子秦室假父秦太后與嫪毒通始皇惡之車裂假父以徇史魏宫假子丨太祖納何晏收養丨中服飾擬太子文帝憎之謂之丨丨魏略納其母子秦朗父為張飛所殺魏太祖丨丨丨而愛朗謂人曰豈有愛假丨如孤者合為父子世道衰人倫壞而親疏之理反其常干戈起於骨肉異類丨丨丨丨開平顯德五十年間天下五代而實八姓其三出於丐養蓋其大者取天下其次立功名位將相豈非因時之隙以利合而相資者耶五代史義兒傳詩集郎罷囝囝哀閩也囝生閩方閩吏得之乃絶其陽為臧為獲致金滿屋為髠為鉗如視草木天道無知我罹其毒神道無知彼受其福丨丨别丨吾悔生汝及汝既生人勸不舉不從人言果獲是苦囝别郎罷心摧血下隔地絶天及至黃泉不得在郎罷前顧况斑衣兒啼真自樂從師學道也不惡伹得新年勝舊年即如常在郎罷前黃山谷送秦少游從東坡學名父子代北有稿鷹生子毛盡赤渥窪騏驥兒尤異是龍脊李舟丨丨丨清峻流輩伯人間好妙年不必須白晢十五富文史十八足賔客十九受校書二十聲輝赫衆中每一見使我潜動魄自恐二男兒辛勤養無益乾元元年春萬姓始安宅舟也衣綵衣告我欲逺適倚門固有望斂袵就行役南登吟白華已見楚山碧杜送李校書生有種鳯雛驥子丨丨丨毛骨往往傳諸郎坡汗血固應丨丨丨同上生何用殺翁分我一杯羮龍種由來事杳𡨕何用生兒作劉季暮年無骨葬昭陵何正平髙帝詩相公才子鄭生涵始以長安尉選為校理人皆曰是宰相子能恭儉守教訓好古義施於文辭者如是而在選公卿大夫家選之子弟其勸耳矣今生始進士獲重語於天下而慊慊若不足真能守其家法矣其在門下者可進賀也來告來寧朝夕侍側東都士大夫不得見其面於其行日分司郎吏與留守之從事竊載酒殽席定鼎門外盛賔客以餞之既醉各為詩五韻且屬愈為序丨丨倦台鼎分政新邑洛丨丨富文華校讎天祿閣壽觴嘉節過歸騎春衫薄鳥哢正交加楊花共紛洎交親誰不羡去去翔寥廓韓愈送鄭校理甘棠子孫廖齊父爽直嘗為永州刺史齊後遊零陵於民間見父題壁感而成詩曰下馬連聲叩竹門主人何事感遺恩回頭泣向兒童道重見丨丨舊丨丨青瑣後集辭學省親餘杭洪浩熙寧間遊太學十年不歸父已七十寄浩詩曰太學何蕃久不歸十年甘㫖誤庭闌休辭客路三千逺須念人生七十稀腰下雖無蘇子印篋中幸有老萊衣歸期定約春前後免使髙堂賦式微浩得詩南歸因而去者十有三馬詩史入蜀迎父番陽張吉父介方娠時父去客東西川不還張君自為兒時與尚書彭器資同學作詩云應是子規啼不到致令我父未歸家聞者憐之既長走蜀父初無還意乃還省母復至涪關往返者三其父遂以熙寧十年二月至自蜀鄉人迎謁歎息器資贈以詩略云河可以竭山可徙我翁不歸行不已三往三復翁歸止翁行尚壯今老矣兒昔未生今壯齒郭功父詩略曰父昔離家子方孕子得其父今壯年胡弗歸兮死敢請慰我慈母心懸懸三往三復又十載孝子執鞭方言還復齊謾録古今合璧事類備要前集卷二十四
