body:
  text: 古今合璧事類備要外集卷二十九宋謝維新撰賦役門徭役附董役規避寬役不均隱匿賦役總論征役古也古人不得已而用民之力焉易之兑曰說以先民民忘其勞說以犯難民忘其死說之大民勸矣哉解之者曰先以說豫撫民然後使之從事則民皆竭力而忘勞先以說豫勞民然後使之犯難則民皆授命而忘死豈非說義之大能使民勸勉矣哉然則得民之心者能得民之力也古者畫為井田之法井九百􅒪中為公田八家皆私百畝民一夫受百畝而耕同出力以養公田公事畢然後敢治私事莫不先公而後私也然聖人者知夫天下之民各竭其力以奉乎我故於是乎推其不忍人之心非甚有所不得已蓋不忍用其力也然有所不得已而用其力亦歲不過三日蓋惟恐窮天下之力而非所以為民父母意也此民之所以不困於征役也蓋三代以上皆然矣自春秋戰國以來暴君汙吏代作賦煩政重使斯民終歲勤動不得以養其父母卒之土地不關田萊多荒雖有此生不如無生而斯民始大不幸矣蓋惟民不得養其身而徒欲以窮其力不得瞻其家而徒欲以勞其生民之憔悴已甚而國之騷動未已此後世之所以亂亡相尋而時君世主之所以不悟也然則如之何民之情莫不惡勞而喜佚上之人能以佚道使之則民雖勞而不以為怨也謀國者其思所以佚民歟事類忘勞說以先民民忘其勞說以犯難民丨其死易侯以侯强丨丨注以用也强謂力有餘而相助小賢天下有道小德役大德丨丨役大賢天下無道小役大弱役强小人君子勞心丨丨勞力勞心者治人勞力者治於人人役不仁不智無禮無義丨丨也人役而恥為役力役有丨丨之征注丨丨民負荷厮養之役也並孟民時使丨以丨語農隙春搜夏苗秋獮冬狩皆於丨丨以舉事也注各隨時事之間三日凡均力征以歲上下豐年公旬用丨丨中年二日無年一日注旬均也三科為力不同科注科役也上中下丨丨白帖僝功共工方鳩丨丨堯典起徒周禮凡丨丨役無過家一人以其餘為羡唯畋與追胥竭作注追逐冦胥伺捕盜賊竭作盡行小司徒臯門古公亶父來朝走馬率西水滸至于歧下爰及姜女聿來胥宇周原膴膴董荼如飴爰始爰謀爰契我龜曰止曰時築室于兹乃慰乃止乃左乃右乃疆乃理乃宣乃畝自西徂東周爰執事乃召司空乃召司徒俾立室家其繩則直縮版以載作廟翼翼救之陾陾度之薨薨築之登登削屢馮馮百堵皆興鼛鼓弗勝乃立丨丨臯門有伉乃立應門應門將將乃立冡土戎醜攸行注皆于周執事競出力也靈臺丨丨民始附也經始丨丨經之營之庶民攻之不日成之經始勿亟庶民子來注民悅其德自勸其事並詩新邑周公初基作丨大丨于東國洛四方民大和㑹侯甸男郊采衛百工播民和見士于周周公咸勤乃洪大誥治注初造基建作王城大都邑於東國洛汭居天下土中四方之民大和悅而集㑹五服之百官播率其民並見即事於周書除役太宰治官之屬府六人史十二人注府治府藏史掌文書皆官長所自辟除給役胥十有二人徒百有二十人注此民丨徭丨者若今衛士也胥謂其有才智屬什長徒給使役故一胥十徒也並周禮戎事魯莊公二十九年冬十二月城諸及防書時也凡土功龍見而畢務丨丨也火見而致用水昏正而栽日至而畢罷民初梁伯好土功亟城而伯處民罷而弗堪則曰某冦將至乃構公宫曰秦將襲我民懼而憒秦遂取梁巡功宣二年宋城華元為植丨丨城者謳曰睅其目皤其腹弃甲而復于思于思弃甲復來使其驂乘謂之曰牛則有皮犀兕尚多弃甲則那役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡量功宣十一年令尹蒍艾獵城沂使封人慮事以授司徒丨丨命日分財用平板幹稱畚築程土物議逺邇略基趾具餱糧度有司事三旬而成不愆于素與而役襄七年南遺為費宰叔仲昭伯為隧正欲善季氏而求媚於南遺謂遺請城費吾多丨丨丨故季氏城費入其役襄十一年李氏使其乘之人以其役邑入者無征不入者倍征興我役宋皇國父為太宰為平公築臺妨於農收子罕請俟農功之畢公弗許築者謳曰澤門之晳實丨丨丨邑中之黔實慰我心子罕聞之親執撲以行築者而抶其不勉者曰吾儕小人皆有闔廬以辟燥濕寒暑今君為一臺而不速成何以為役謳者乃止或問其故子罕曰宋國區區而有詛有祝禍之本也左襄十八服政役齊景公縣鄙之人入從其政注邊鄙既入丨丨丨昭二十彌牟令役晉士丨丨營成周云云計徒庸以丨丨於諸侯屬役賦處注知用幾人功左昭三十二年魏舒屬役晉丨丨合諸侯之大夫于狄泉將以城成周丨丨於韓簡子及原壽過而田於大陸左定公元年夷儀得尸齊侯伐晉丨丨敝無存先登死焉齊侯謂丨丨人曰得敝無存者以五家免乃丨其丨左定九年絳老與食晉悼夫人食輿人之城杞者絳縣人或年長矣無子而往與於食有與疑年使之年曰臣小人也不知紀年臣生之歲正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰云云七十三年矣趙孟問其縣大夫則其屬也召之而謝過焉曰武不才任君之大事以晉國之多虞不能由吾子使吾子辱在泥塗久矣武之罪也敢謝不才遂仕之辭以老以為絳縣師而廢其輿尉注以役孤老故左襄三十年支離攘臂丨丨疏肩高於頂播精求食足以數人齊有徵役則丨丨疏丨丨遊其間所言以疾免役無懼也莊子踦跂畢行發卒賦丨丨丨丨注踦丘知跋丘氏反國語二十而傅蕭何發關中丨丨者詣軍注古者丨丨丨丨一歲為衛士一歲為材官習射御馳射二十而役五十六而老傳謂著名籍公徭役者也二十始傅景詔男子丨丨丨丨平買賤更吳王濞以銅鹽利百姓無賦卒踐更輒丨丨之不囑縣令王褒門人為縣役褒丨丨丨丨乃步擔乾飯立路旁磬折云云門生為役故來送令即放之常自戍邉蓋寬饒次公為司𨽻子丨步行丨丨丨公廉如此常自護軍晉王尼為護軍兵士胡母輔之輩訪之廄下相率私還魏司馬郎伯達為棠陽長民有徙居都內者後縣調船徒恐不辦丨丨丨丨助役見愛如此正丁充役戶部式諸正丁充夫四十日免七十日并免租百日已上課役俱免中男充夫滿四十日以上免戶內地租無它稅折戶內一丁無丁聽傍折近親户內丁六十免役唐制凡民始生為黃四歲為小十六為中二十一為丁六十為老見丁亡幾太宗將修雒陽宫戴胄上疏曰九成之役又興司農將作丨丨丨丨大亂之後戶口單破一人就役舉室捐某役丁數萬來濟帝嘗從容問馭下所宜濟曰昔齊威公出遊見老人命之食曰請遺天下食遺之衣曰請遺天時下衣公曰吾府庫有限安得而給老人曰春不奪農即有食夏不奪蠶工即有衣由是言之省徭役馭下之宜也於是山東役丁歲别數萬人又議取庸以償雇紛然煩擾故濟及之籍戶蠲徭李抱真為懷澤潞觀察留後凡八年策山東有變澤潞兵所走集乘戰伐後賦重人困軍伍雕刓乃丨丨三丁擇一丨其丨賦給弓矢令間月得曹偶習射歲終大校天下稱昭義步兵檢籍差徭李遜纍為池州刺史鉤檢戶籍所以差量徭賦者皆有科品程章吏不得私常曰沈約年八十手寫簿書蓋為此云稅錢為率唐王江淮調兵興役皆以丨丨丨丨至今用之團置耆長周世宗詔諸州併鄉村率以百户為團丨丨丨丨三人思作戶長五代周行逢民過無小大皆死夫人嚴氏諫曰人情有善惡安得一槩殺之乎行逢怒曰此外事婦人何知嚴氏不悅紿曰家田佃戶以公貴頗不力農多恃勢以侵民請往視之至則營居以老歲時衣青裙押佃戶送租入城行逢往就見之勞曰吾貴矣夫人何自苦耶嚴氏曰公丨丨丨丨時乎民租後時常苦鞭撲今貴矣宜先期以率衆安得遂忘壠畝間乎董役為植巡功宋華元事執撲行築宋子罕事並見前耀卿護役裴耀卿徙宣州刺史前此大水河坊壞諸州下不敢擅興役耀卿曰非至公也乃躬護作役未訖有詔徙官耀卿恐功不成弗即宣而撫處巡飭厲愈急隄成發詔而去濟人立碑頌德元陽董役孟丨丨丨作西華屯盛夏屩而立于塗丨休乃就舍後田輒歲稔寬役弛力周禮荒政十有二四曰丨丨注寬徭役也復二歲漢高祖二年蜀漢民給軍事勞苦復勿租稅二歲復一歲關中卒從軍者丨家丨丨復勿繇戍舉民年五十以上有修行能率衆為善置以為三老鄉一人擇鄉三老一人為縣三老與縣令丞縣以事相教丨丨丨丨復勿算事宣詔流人還歸者輒假公田貸種且勿丨丨注事謂始徭役也復徭六歲光武二十年丨濟陽縣丨役丨丨復增一歲幸南陽進幸汝南蝢縣舍置酒會賜吏民復南蝢田一歲父老前叩頭言皇考居此日久陛下識知寺舍每來輒加厚恩願賜復十年帝曰天下重器常恐不任日復一日安敢逺期十歲乎吏民又言陛下實惜之何言謙也帝大笑丨丨丨丨中試給復魏氏武卒衣三屬甲操十二石弩負矢五十置戈其上冒帶嬴三日糧日中而趍百里中試者復其戶刑法志讀書為免白履忠拜朝散大夫吳兢其理人謂曰子素貧不霑斗米匹帛雖得五品亦何益履忠曰往契丹入冦家取排門夫吾以丨丨縣丨丨今終身高卧寬徭役豈易得哉李渤廢役丨丨為䖍州刺史丨冗丨千六百人元結免役丨丨拜道州刺史為民營舍給田丨徭丨流亡歸者萬餘人韋宙罷役丨丨為永州刺史丨冗丨九百九十四貟蘇辨綬役丨丨副知度支可承裴延齡後平賦緩丨略煩苛人賴其寬令任其勞何易于為益昌令刺史崔朴嘗乘春與賓屬泛舟出益昌旁索民挽綷易干身引舟朴驚問狀易干曰方春百姓耕且惟丨不事可丨丨丨朴愧與賓客疾驅去禁止非徭李升薄征輕賦丨丨丨丨江南野史規避脫卒漢武欲作通天臺未有人王溫舒為中尉覆丨丨得數百人作土拜少府注隱漏未有卒也脫更郭解出人皆避有一人獨箕踞視之客欲殺之解曰居邑屋不見敬是吾德不修也彼何罪乃隂請尉史曰是人吾所重至踐更時丨之箕踞者乃肉袒謝罪租牛客晉王恂字良夫為河南尹魏時公卿以下丨丨丨戶有差自後小人憚役多樂為之貴勢之門動有百數椎氷人魏祖時人丨丨時渠水凍使人椎以通船道人憚役而亡防客隱長城公至德時民間多妄稱老小以免賦役山東丞北齊之弊政户口租調奸僞尤多隋王命州縣大索貌閲戶口不實者里正黨長逺配大功以下皆令析籍以丨丨丨於是計帳得新附一百六十四萬餘口度僧尼姚崇中宗時近戚奏丨丨丨溫戶强丁囚避賦役至是崇建言折支體隋末賦役重數人往往自丨丨丨謂之福手福足至唐太宗正觀十六年七月制自今有自傷殘者據法加罪仍從賦役至是遺風猶存故禁之豪姓徙貫李栖筠奏部丨丨多丨丨京兆河南規脫徭役姦人羼名薛存誠遷給事中瓊林庫廣籍工役存誠曰此丨丨丨丨以避征役不可許隱匿無名戶多晉邊郡新附多丨丨丨魏朝欲加隱實天子以問宣帝帝曰賊以密網束下故下弃之宜𢎞大網則自然安樂著籍者少諸萬亮曰荆州非少人也而丨丨丨丨焉平居調發則不稅可謂鎮而南今國中凡有游戶皆使自實目録以益衆可也人皆去本宇文融時天下户版刓隱丨丨丨丨籍浮食閭里詭脫繇賦豪弱相并州縣莫能制融由監察御史陳便宜請校天下籍云云帝以融為覆田勸農使鈎檢符帳得僞勳亡丁甚衆兵悉入道武后崇寺觀功費浩廣嶠恐結怨三靈謗蒙四海今道人私度幾數十萬國計軍防並仰丁口今丁皆出家丨丨丨丨征行租賦何以備之願許十道使括取使姦猾不得而隱不均北山丨丨大夫刺幽王也役使不均已勞於從事而不得養其父母焉陟彼丨丨言采其杞偕偕士子朝夕從事東國大東刺亂也丨丨困於役而傷於財談大夫作是詩以告病焉云云東人之子聀勞不來西人之子粲粲衣服舟人之子熊羆是裘私人之子百僚是試年老與食見前注年老持更晉劉𢎞為荆州嘗夜起聞城上持更者嘆甚苦呼之蓋一兵丨丨羸疾無𥜗及謫主者遂給韋袍復帽陸龜蒙送雞山樵人序小雞山在震澤西出吳胥門背朝日行四十里得野步市曰光福光福西五里得土山山土多石寡無大林木率生小櫟朴樕皆薪材直吳之㸑此為助焉連延廣袤不一其主為書畫疆𤣥以相授自冡至麓凡二百弓東北倍高而加半焉余所置多少如此余家大小之口二十月費米十斛飯成理魚蔌輩十斛薪然後四時賔祭沐浴瀚濯疾病湯藥糜粥在外歲入五千束足矣其掌而供事者顧及小雞之樵氓也乾符六年春弗雨夏支流將絶八月暴雨而巨艑可實而行之矣九月朔方置薪二百五十於門召而責之曰吾一夏來撤敗屋拔庭草以炊雨之明日望爾來矣何數廉而至晚得非赭吾山而為汝之利耶老而欺如名惡何及笑曰吾年餘八十矣元和中嘗從吏部遊京師人言國家用兵帑金窖粟不足用當時江南之賦已重矣殆今盈六十年賦數倍於前不足之聲聞於天下得非專地者之欺甚乎吾有丈夫五人諸孫亦有丁壯者自盜興已來百役皆在亡無所容又水早更害吾稼未即死不忍見兒孫寒餒之色雖盡售小雞之木不足以濡吾家矧一二買名為偷乎今子一煬竈不給而責吾之深吾將欲移其責於天下之守則吾死不恨矣余歎之曰汝之言信也然不當發於豫汝姑歸與之酒繼之以歌云長其船兮利其斧輸其薪兮勿豫侮田豫登兮榖豫庾突晨煙兮蓬縷縷窗有明兮編有古飽而安兮惟編是伍時不用兮吾無撫汝蘇東坡上皇帝萬言書今遂欲於兩稅之外别立一科謂之庸錢以備官雇則雇人之責官所自任矣自唐楊炎廢租庸調以為兩稅取大曆十四年應十賦斂之數以定兩稅之額則是租調與庸兩稅既兼之矣兩稅如故奈何復欲取庸聖人之立法必慮後世豈可於兩稅之外生出科名萬一不幸後世有多欲之君輔之以聚斂之臣庸錢不除差役仍舊使天下怨毒推所從來則必有任其咎者矣又欲使城郭等第之民與鄉戶均役品官形勢之家與齊民並事其說曰周禮田不耕者出屋粟宅不毛者有里布而漢世宰相之子不免戍邊此其所以藉口也古者官養民今者民養官給之以田而不耕勸之以農而不力於是有里布屋粟夫家之征而民無所為生去為商賈事勢當爾何名役之且一歲之戍不過三日三日之雇其直三百今世三大戶之役自公卿以降毋得免者其費豈特三百而已大抵事若可行不必皆有故事若民所不悅俗所不安總有經典明文無補於怨蘇頴濱制置三司論事狀徭役之事議者甚多或欲使鄉戶助錢而官自雇人或欲使城郭邸第之民與鄉戶均役或欲使品官之家與齊民並事此三者皆見其利不見其害者也役人之不可不用鄉戶猶官吏之不可不用士人也有田以為生故無逃亡之憂朴魯而少詐故無欺謾之患今乃捨此而不用而用浮浪不根之人轍恐掌財者必有盜用之姦捕盜者必有竄逸之弊今者國家設捕盜之吏有巡檢有縣尉然較其所獲縣尉常密巡檢常疏非巡檢則愚縣尉則智蓋弓手鄉戶之人與屯駐客軍異耳今將使雇人捕盜則與獨任巡檢不殊盜賊縱放必自此始天下郡縣上戶常少下戶常多少者徭役頻多者徭役簡是以中下之戶每得休簡今不問戶之高低例使出錢助役上戶則便下戶實難顛倒失宜未見其可然議者皆謂助役之法要使農夫專利於耕轍觀三代之間務農最切而戰陳田獵皆出於農茍以徭役較之則輕重可見矣城郭人戶雖號兼并然而緩急之際郡縣所賴飢饉之歲將勸之分以助民盜賊之歲將借其力以捍敵故財之在城郭者與在官府無異也方今雖天下無事而三路芻粟之費多取京師銀絹之餘配賣之民皆在城郭茍復充役將何以濟故不如稍加寬假使得休息此誠為國家之利非民之利也品官之家復役已久議者不究本末徒聞漢世宰相之子不免戍邊遂欲使衣冠之人與編戶齊役夫一歲之更不過三日三日之雇不過三百今世三大戶之役自公卿以下無得免者以三大户之役而較之三日之更則今世既已重矣安可復加哉蓋自古太平之世國子俊造將用其才者皆復其身胥史賤吏既用其力者皆復其家聖人舊法良有深意以為責之以學而奪其力用之於公而病其私人所難兼是以不取奈何至於官戶而又將役之且用縣差役之法皆以丁口為之高下今既已去鄉從官則丁口登降其勢難詳將使差役之際以何為據必用丁則州縣有不能知必不用丁則官戶之役比民為重今日朝廷所以條約官戶如租佃田宅斷買坊場廢舉貨財與衆爭利比於貧民皆有常禁茍使之與民皆役則昔之所禁皆當廢罷罷之則其弊必甚不罷則不如為民此徭役之說轍所以未諭也蘇頴濱論州縣役吏之弊大人之道行之而可名名之而可言布之天下而無疑施之後世而無愧堂堂乎立於四海雖一介之事而無所不安此其所以為大人之道歟今夫天下之人天子誰不役其力者而天下皆不敢以為非此誠得其可役之名而役之是以天子安坐于上而士大夫為之奔走於下大者為之運籌畫策治百官以濟其大事而小者為之按米鹽視鞭笞以奉其小聀文吏為之簿書會計詳其出納取豫之數而使天下不敢欺武吏為之猿金被革習其戰陳攻鬬之事而使天下不敢犯勞苦其筋力而竭其思慮甚者捐首領暴骨於原野而不知避何者食其祿也至于田野之民耕田而食或生而不至市井然及其有稅而可役趍走於縣吏之前謹恭有禮不教而自習而其尢難者至使之斬捕盜賊挽弓巡檄疲弊而不敢求免此豈非食其地之故歟故夫天下之人凡天子之所得而使令者皆可得而名也而臣切怪府史胥徒古未皆有祿以食其家而其不足者皆得計口而受田以補其不足夫是以能使之盡力於公事而不恤其私計蓋周之所謂官田者府史胥徒之田也而今世之法收市人而補以為吏無祿以養其身而無田以畜其妻子又有鞭撲戮辱之患而天下之人皆喜為之其所以責之者甚煩且難而其所以使之者無名而可言而其甚者又使之入錢而後補雖得復役而其所免不足以償其終身之勞此獨何也天子以無名使之而天下之人亦肯以無名而為之此豈可不求其情哉夫天子舉四海而寄之其臣郡縣之官又舉而寄之其郡縣之小吏刑法之重輕財用之多少無所不在是以掌倉庫者得以為盜而治獄訟者得以為奸之利上足以養父母而下足以畜妻子其所以無故而安為之者為此之故也是以雖無爵祿之勸而可得而使雖有刑戮恥辱之患而不肯捨而去而其雖之人驅其無祿之身而遇之以有祿之法恬不為怪此乃公使之為奸以當其所得之祿而遂以為可得而使之也如此則尚何以視天下詩集敢伸恨車驎驎馬蕭蕭行人弓箭各在腰爺娘妻子走相送塵埃不見咸陽橋牽衣頓足攔道哭哭聲直上干雲霄道旁過者問行人行人但云點行頻或從十五北防河便至四十西營田去時里正與裹頭歸來頭白還戍邊邊庭流血成海水武皇開邊意未已君不聞漢家山東二百州千村萬落生荆杞縱有健婦把犂鋤禾生隴畝無東西況復秦兵耐苦戰被驅不異犬與雞長者雖有問役夫丨丨丨且如今年冬未休關西卒縣官急索租租稅從何出信知生男惡反是生女好生女猶是嫁比鄰生男埋沒隨百草君不見青海頭古來白骨無人收新鬼煩寃舊鬼哭天隂雨濕聲啾啾杜甫兵車行勿泣血客行新安道喧呼聞㸃兵借問新安吏縣小更無丁府帖昨夜下次選中男行中男絶短小何以守玉城肥男有母送瘦男獨伶俜云云送行丨丨丨僕射如父兄新安吏河陽役暮投石壕村有吏夜捉人老翁踰墻走老婦出門看吏呼一何怒婦啼一何苦聽婦前致詞三男鄴城戍一男附書至二男新戰死存者且偷生死者長已矣室中更無人惟有乳下孫孫有母未去出入無完裙老嫗力雖衰請從吏夜歸急應丨丨丨猶得備晨炊夜久語聲絶如聞泣幽咽天明登前途獨與老翁别石壕村本州役寂寞天寶後園廬但蒿藜我里百餘家世亂各東西存者無消息死者為塵泥賤子因陳敗歸來尋舊蹊久行見空巷日瘦氣慘悽但對狐與狸四鄰何所有一二老寡妻宿鳥戀本枝安辭且窮棲云云縣吏知我至召令習鼓鞞雖從丨丨丨內顧無所携近行止一身逺去終轉迷家鄉既蕩盡逺近理亦齊永痛長病母五年委溝溪生我不得力終身兩酸嘶人生無家别何以為蒸黎杜甫無家别吞聲行負戈戚戚去故里悠悠赴交河公家有程期亡命嬰禍羅君已富土境開邊一何多弃絶父母恩丨丨丨丨丨送徒既有長丨丨丨丨丨逺戍亦有身生死向前去不勞吏怒嗔路逢相識人附書與六親哀哉兩決絶不復同苦辛杜甫前出塞召募赴薊門男兒生世間及壯當封侯戰伐有功業焉能守舊丘丨丨丨丨丨軍動不可留千金買馬鞭百金裝刀頭閭里送我行親戚擁道周斑白居上列酒酣進庶羞少年别有贈含笑看吳鉤朝進東門營暮上河陽橋落日照大旗馬鳴風簫簫平沙列萬幕部伍各見招中天懸明月令嚴夜寂寥悲笳數聲動壯士慘不驕借問大將誰恐是霍嫖姚杜後出塞古今合璧事類備要外集卷二十九
