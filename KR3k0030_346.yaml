body:
  text: 古今合璧事類備要外集卷四十六宋謝維新撰餅餌門餅附胡餅環餅蒸餅不托湯餅裹蒸麵淘冷餅餌閑談餅麫餈捜麥麫使合并為之也然其狀不一入爐熬者名熬餅亦曰燒餅入籠蒸者名蒸餅亦曰饅頭入湯烹之名湯餅亦曰濕麺曰不托今曰餺飥入胡麻着之名胡餌又曰麻餅其他餲餅䭉餅乳餅環餅名不可數計大抵皆麫食也䭉餅豆屑雜糖為之環餅所謂寒具是也宜未詳至如餕饀俊叨薄持起溲牢九其類也然亦不知何物裹蒸冷淘附事類買餅大售漢宣帝㣲時每丨丨所從賣者輒丨丨饋餅不忘樊曄與世祖少游舊徴遷河東都尉引見雲臺世祖㣲時嘗以事拘新野曄為市吏丨丨一笥帝丨丨乃賜御服及乗輿衣物因戯之曰一笥餅得都尉何如曄頓首辭謝後本傳長房進餅壺公者從逺方來賣藥嘗懸一壺於市上每日入後跳入壺中費丨丨於樓上見之知非常也身為埽除并丨丨公令長房共跳入壺神仙傳趙岐買餅丨丨中常侍唐衡兄玹為京兆尹進不由徳岐及從兄襲數為貶議玹深毒恨復収岐岐逃難四方自匿姓名丨丨北海市中本傳印綬易餅太祖啁丁斐曰丨丨何在曰丨丨耳魏畧畫地為餅盧毓言有名士如丨丨丨丨不可啖食貸錢賣餅見商賈門怒裂餅縁後周王罷鎮河東日嘗有臺使至為設食使乃使裂去薄餅緣羆丨曰耕種收𫉬其功已深春㸑造成用力不少爾之選擇當是未飢命左右撤之使者大慙責去餅縁李英公為相有鄉人過宅為設食客去餅縁公丨之客大慙並南部新書封餅以聞髙元裕兄少逸出為陜虢觀察使中人責峽石驛使供餅惡鞭之少逸丨丨丨丨宣帝怒召使者責曰山谷間是餅豈易具邪謫𨽻陵中人皆歛手孔帖袖餅而食于琮班中有時丨丨丨丨或遺國列常朝記以餅拭手宇文士及嘗割肉丨丨丨丨孔帖以餅拭刀肅宗為太子上使割羊臑丨丨丨丨徐噉之上喜曰保福禄當如是愛惜眀皇十七事以珠易餅賀知章嘗謁賣藥王老問黄白術持一大珠遺之老人得珠即令易餅與賀食賀心念寳珠何以市餅口不敢言老叟曰慳吝未除術何由成原化記當罏鬻餅劉伯芻巷口有鬻餅者每丨丨謳歌一旦劉憐其貧貸以萬錢自是不聞歌聲心計轉麄不暇唱渭城矣糅米為餅王世充秦王傳城塹而守之世充粮且盡人相食至以水汨泥去礫取浮土丨丨屑為丨棄餅稱亷楊瑶光厯沔綏二州刺史姆饋孺子以餅妻偽受而弃之垣外人稱其亷賣餌自業黄巢復入京師於時畿民栅山谷自保不得耕士人或丨丨丨丨雖㣲物也許康年謁劉遊贈鳴牙餅十枚丨丨丨丨助厨中兩日之費退耕傳頗憶師否寜王宅畔有賣餅者妻甚美王厚遺其夫而取之經嵗問曰丨丨餅丨丨召見之淚下如雨本事集一錢數對開元中長安物價大减兩市賣二儀餅丨丨丨丨豐年録胡餅食餅成䜟漢靈帝好胡餅京師皆丨胡丨後董卓擁胡兵破京師之騐續漢書嚙餅自若王羲之幼冇風操郄虞卿選壻見羲之坦腹東床丨胡丨神色丨丨石季龍諱丨丨丨丨胡改故餅曰麻餅崔鳴前趙録楊國忠盛丨丨丨自入市衣袖中丨胡餅張齊賢食丨僕射丨丨每嗜肥猪肉數斤天夀院風藥黒神丸常人不過服一彈丸公以五十両為一大劑夾以胡餅丨之晏元獻折丨丨清瘦如削每丨半餅以筯卷之抽筯丨就内捻頭一莖食之此亦異於人歸田録蒸餅或恵一顆王勸眈學貧窶丨人丨蒸餅丨丨以充一日妻子嘗有菜色不拆十字晉何曽位太常性豪奢厨饌滋味過於王者毎醼見不食太官所設帝輒命取其食蒸餅丨丨作丨丨不食去皮後食鄭澣以儉素自居尹河南召甥姪與之㑹食有蒸餅鄭孫丨其丨而丨丨之澣大嗟怒謂曰皮之與中何以異也僕常病澆俗驕侈自奉奈何以蒸浮甚於五侯家綺丸乳臭兒也邪因引手取所棄者鄭孫錯愕失據器而奉之澣盡食去以袖包㗖劉晏五鼓入朝時寒中路見賣蒸胡餅處熱氣騰輝使人買丨袍丨丨裙褐底丨謂同列曰美不可言隋唐嘉話縮葱加肉侯思止食籠餅必令丨丨丨丨號丨丨侍郎即今饅頭湯餅今麫服之羽化道士持湯餅請人云玉英粉丨丨七日必丨丨廣異記噉之汗出何晏字平叔美姿儀面絶白魏文帝疑其着粉後正夏月喚來與湯餅丨丨大丨丨隨以朱衣自拭色轉皎白帝始信之語林脫半臂易𤣥宗皇后王氏始后以愛㢮不自安乗間泣曰陛下獨不念阿忠丨紫丨丨丨斗麫為生日湯餅邪帝憫然改容阿忠后呼其父仁皎云麫剪刀麫柳公權以隔風紗作龍城記及入朝名品號錦樣書以進上方御丨丨丨月兒羮即命分賜公權雲仙散録字錦蓬子麫寵勛反自闗東至海大旱冬蔬皆盡以丨丨為丨以槐葉為韲唐食貨志環餅食寒具者元人飲食中有寒具者乃今環餅也栢𤣥以書畫聚人觀之有丨丨丨丨不濯手執書畫汚之自是不設雞跖録吳均餅說細如華山玊屑白似梁甫銀泥既聞香而口問亦見色而心迷束晢餅賦禮仲春之月天子食麥而朝事之籩煮麥麥為麫内則諸饌不說餅然則雖云食而未有餅餅之作也其來近矣若夫安麥粔籹之倫糺耳闕后之闕帯案成饍飳髓燭或名生於里巷或法出乎殊俗三春之初隂陽交際寒氣既消温不至熱于時享宴則曼頭宜設炎律方回大大西移烏獸氄毛樹木䟽柭肴饌尚温則起溲可施𤣥冬猛寒清晨之㑹涕凍鼻中霜成口外充虛解戰湯餅為最然皆用之有時所適者茍錯其次則不能斯善其可以適冬達夏終嵗常施四時從用無所不宜唯牢九乎爾乃重羅之麩丘興反塵飛雪白黏􅀈筋䐧溔柔澤肉則羊膀豕脅脂膚相半臠若繩首珠連礫散薑株葱本莑縷切判剉末俶蘭是伴和鹽漉豉攬合摎亂於是火盛湯涌猛氣蒸作攘衣服振掌握搦俯摶趐彌離於指端手榮廻而交錯紛紛􅀈􅀈星分雹落籠无遺肉餅无流麫妹媮洌刺薄而不錠巂巂和和䑋色外見柔如春綿白若秋練氣勃鬰以揚布香飛散而逺遍行人失誕於下風童僕空爵而斜盻擎器者䑛脣立侍者乾咽爾乃濯以𤣥醢鈔以象箸槃案纔投而輒盡庖人參潭而促遽三籠之後轉更有次木托與六宫食李茂貞昭宗幸鳯翔梁軍圍之中人人相與邀遮茂貞來路以為生昭宗謂茂貞曰朕丨丨丨皆一日丨粥一日食木托安能不與梁和乎五代史裹蒸餘充晩食齊眀帝即位約太官進食有裹蒸帝曰我食此不盡可四片破之丨丨丨丨唐書冷淘切以呉刀野狐泉一姥善製水花冷淘丨丨丨丨淘以洛酒潦葉於鐺耳中過投於湯中其疾徐鳴掌趂之不及富子擕金就食之入洛苑淘以洛酒河東并代人苦於嗜麫切以吳刀丨丨丨丨潦斗貯之撃鼔集老㓜自以多寡取之至飽河東偹録詩集經齒冷欲雪青青髙槐葉采掇付中厨薪麫來近市汁滓宛相俱入鼎資過熟加飡愁砍无碧鮮俱照箸香飯兼苞蘆丨丨丨丨丨勸人投此珠願隨金騕褭走置錦屠蘇路逺思恐泥興深終不渝獻芹則小小薦藻明區區萬里露寒殿開氷清玉壺君生納凉晩此味亦何須湯餅我欲去為丨丨丨丨湯餅客坡古今合璧事類備要外集卷四十六
