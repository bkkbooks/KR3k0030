body:
  text: 古今合璧事類備要後集卷三十宋謝維新撰六部門兵部尚書外侍郎駕郎中附貟郎部歷代㳂革漢置五曹未有主兵之任六典魏始置五兵尚書謂中兵外兵別兵都兵也晉有五兵尚書而又分中外兵各為左右按晉雖中外兵與舊五兵為志曹然尚書惟置五兵無七兵尚書之名至後魏始有七兵尚書今諸家著述或謂晉太康中置七兵尚書誤矣後魏為七兵尚書後周置大司馬其屬又有兵部中大夫小兵部下大夫其職並闕至隋乃有兵部尚書統兵部職方駕部庫部四曹唐因之龍朔二年改司戎太常伯咸亨元年復舊光宅元年改夏官尚書神龍元年復故天寶十一載改武部至德二載復舊通典選舉亦為三銓制如吏部通典本朝尚書兵部掌武舉民兵廂土軍鹵簿及蕃夷官貟承襲之事凡聯其什伍而教之戰兵部武選之制效貢舉法若遣將出兵露布奏捷必告於廟其屬有三曰職方郡縣地啚蕃夷歸附之事𨽻焉曰駕部輦輅車乘廄收驛𫝊之事𨽻焉曰庫部軍器儀仗鹵簿供帳之事𨽻焉神宗正史職官志正名之初尚書猶未除人職略元豐五年九月詔應㳂邉義勇保甲事並𨽻樞密院其餘民兵悉𨽻兵部續㑹要建炎三年併衛尉寺歸兵部中興㑹要事類夏官四曰丨丨其屬六十掌邦政周禮又丨丨大司馬之職掌以九伐之法正邦國制軍誥禁以紏邦國領校人牧師職方司兵之屬即今兵部之任也通典司馬丨丨掌邦政統六師平邦國禮春官又乃立夏官丨丨使帥其屬而掌邦政以佐王平邦國禮夏官圻父矧惟若疇丨丨薄違書酒誥注丨丨司馬也上注夏卿尚書大司馬亦曰丨丨職林又兵部尚書丨官丨也通典武部唐天寶改丨丨至德復舊通典武官大司馬者丨丨也大揔武事訓馬為武者取其健行釋名西曹崔融吏部兵部選人議曰伏望詔東丨二丨兩都分簡東謂吏部西謂兵部文苑英華南省李輔國為兵部尚書丨丨視事使武士戎裝夾道唐書數訪時政王起字舉之為兵部尚書文宗丨丨逮丨丨起因積雨願寬逐臣唐職林自得岐路朱崔為兵部尚書丨丨丨丨必當大用封川多方沮之同上為宰相兼姚崇三丨丨丨丨兵部尚書屯戍斥堠士馬儲械無不暗記知五品選廬承慶檢校兵部尚書丨丨丨丨辭曰選事在尚書臣掌之為出位帝曰朕信卿卿何不自信並唐書居位簡率唐李懷逺除兵部尚書雖久丨榮丨而彌尚丨丨常乘欵假馬左僕射豆盧欽望曰公榮貴如此何不買駿馬乘之答曰此馬幸免驚蹶無假别求聞者嘆美通典掌武選授丨天下兵衛丨官丨丨之政令凡軍師戍卒之藉山川要害之圖廄牧甲仗之數六典恭守戎曹丨丨丨丨訓齊武部簡稽之務軍國是殷許公集實掌戎政惟茲夏官丨丨丨丨白居易行柳公綽制董正六師緝熙九法丨丨丨丨孫逖授李林甫兵部尚書制歷用九法周之九法歷代用焉故夏官之重髙位久虛錢翊授陸扆兵部尚書制疏劾亂行上祀南郊蘇軾以兵部尚書為鹵簿使上因太廟宿齊行禮畢特至青城忽有赭傘犢車并青蓋犢車百餘乘衝突而來公呼御營巡檢使立車前曰西來誰何敢爾亂行曰皇后并某國大夫人某大長公主也公即於青城上疏劾之明日中使𫝊命申勑有司嚴整仗衛言行録召入坐語黃中諡簡肅公為兵部尚書兼侍讀每當入直上常先遣人侯視至則亟丨丨丨丨從容月必一再見公知無不言朱文公撰黃端明碑論制狄道兵部尚書王庶丨丨丨之丨在于民周文王問太公以為國太公曰愛民而已兵書無不本諸愛民者上嘆曰大臣才也遂拜樞密副使中興繫年録掌武舉政尚書丨丨丨地圖車輦甲械之丨令而侍郎為之二凡軍民以民籍統𨽻者閲習按試選募遷補續㑹要司馬之任中臺政事所出兵部丨丨丨丨南豐擬制中臺之秩掌國五兵叨進丨丨丨丨歐陽公制獨省文書武選𨽻于天官兵政總于樞輔故司馬之職丨丨丨丨東坡表超進崇資夏官掌武丨丨丨丨楊億代表周禮命卿丨丨丨丨司馬掌國征之事箋表類夏官古卿丨丨丨丨歐公謝表七兵之秩文昌丨丨丨丨楊億代表歐陽修青州謝上表臣某言伏蒙聖慈特授臣兵部尚書依前觀文殿學士知青州軍州事充京東東路安撫使臣已于今月二十七日赴上訖掌國五兵叨進中臺之秩宣風一面俾綏東土之人祗荷寵靈徒知殞越臣某中謝伏念臣學非通敏材實空踈幸逄千載之休明誤被三朝之奬擢久陪法從常與政機國恩未報而身已先衰世塗可畏而命亦多蹇頃緣災疾遂决退休敢上惻于皇慈未忍遽捐于舊物而復過推優渥以慰癃殘惟孤拙之無堪蹈艱危而已甚世之所榮者臣之所懼人以為寵者臣以為憂是故輒殫悃愊之誠纍黷髙明之聽迫于危慮罔避煩辭而聖度并容寬其罪戾恩言屢降譬以丁寧知成命之難回勉靦顔而祗受而况全齊舊壤負海奧區民俗富完而鑿井耕田各安其業詔條寬大而奉法守職足以修官內省庸虛奚朌忝幸此蓋伏遇皇帝陛下日新求治天䙳淮仁謂簮履雖為于賤微尚堪收録而犬馬苟豐于豢養猶可使令臣敢不䇿勵疲嬴勤思夙夜庶期盡瘁少答鴻私兵部侍郎歷代㳂革隋置兵部侍郎唐因之龍朔為司戎少常伯光宅中為夏官侍郎後復故唐職林舊制一貟總章元年加一員通典掌武選地圖車馬甲械之政唐職林詳見前兵部尚書門本朝官制元豐正名詳見前兵部尚書門元豐五年四月二十日隨許將試兵部侍郎除侍郎自此始也事類小司馬兵部侍郎夏官丨丨丨中大夫之任也六典又丨丨丨之職周禮闕少常伯見官制有文武材唐太宗以楊洪禮丨丨丨丨擢為兵部侍郎唐本𫝊有大臣器韓臯資質重厚丨丨丨丨為兵部侍郎號稱職朕今信卿盧承慶遷民部侍郎太宗尋令檢校兵部侍郎仍知選事承慶辭曰選事職在尚書臣今掌之便是越局太宗不許曰丨丨丨丨卿何不自信也帝笑不罪楊宏武為司戎少常伯遷西臺帝嘗誚曰爾在戎司授官多非其才何耶宏武曰臣妻剛悍此其所屬不敢違以諷帝周后言丨丨丨丨召詢時政唐韋澳遷兵部侍郎與同寮蕭置深為宣宗所遇每二人同直無不丨見丨訪丨丨有邦國政刑大事中使𫝊宣草詞澳心欲論諫却曰此一事須降御札方敢施行遲留至旦必論其可否上㫖多從之見咨天下唐蔣伸字大直為兵部侍郎宣宗雅信愛伸每丨必丨丨丨得失伸三起三留曰他日不復對卿矣伸不喻未幾拜相云能紹祖奕盧元輔簡潔貞方丨丨其丨丨故有家風楊洪禮為兵侍入參機務出統衆政太宗曰越公兒郎丨丨丨丨矣並同上父子同省唐崔湜為兵部侍郎父挹為兵部侍郎丨丨丨為南丨副二有唐未有祖先有勳唐衛次公為兵部侍郎選人李績徐有功之孫名在黜中次公召而謂曰子之丨丨丨在王府豈限常格並優秩而遣之並唐書掌凡軍戍尚書侍郎丨天下軍衛武官選授之政令丨丨師卒丨之籍山川要害之圖廄牧甲仗之數六典佐平邦國惟兹夏官實掌戎政簡稽調補今方其時司馬二卿丨丨丨丨白集桞公綽兵部侍郎制夏卿之亞兵部侍郎祈父之二丨丨丨丨在而舉者悉以咨之張九齡為裴光庭碑司馬之法入亞六卿并行丨丨丨丨出膺九命俱受元戎之算伯樂川記條奏八事許將入為兵部侍郎丨丨丨丨以為兵之事有三曰禁兵曰廂兵曰民兵馬之事有三曰養馬曰市馬曰牧馬兵器之事有二曰繕作曰給用東都事略首奏四事周文忠公權兵部侍郎丨丨丨丨曰重侍從增臺諫擇監司郡守久任監司郡守上曰皆今日要務也言行録手畫形勝王敏節庶為兵部侍郎對便殿口陳丨丨秦隴丨丨利害上大喜即日遷兵部尚書北盟㑹編密言恢復周簡惠公葵除兵部侍郎元顔亮斃張公自督府來朝丨丨丨丨公請對謂不可輕舉纍數千言上唯唯五月敗書聞上思公言以左中大夫參知政事平園集力詆和議兵部侍郎張燾丨丨拜詔之議秦檜患之燾託疾在告檜使樓照諭之曰北扉闕人上欲以公為直院宜早出燾大駭曰愈不敢出矣若使草國書豈能曲狥意㫖哉燾嘗思之不過一去檜不能奪遂止中興繫年録氣折羣醜李文敏公邴召為兵部侍郎苗劉反露刃宫門上登樓撫諭公亟趨前叱苖劉等凶焰稍息公扣宰相朱勝非問計䇿𫝊等皆在公反覆鐫詰人為公危公無懼色太后垂簾勝非奏變故以來能助朝廷者惟李邴鄭㲄乃除公翰林學士上賜親札略曰卿毅然正辭丨丨丨丨萬衆動色具臣靦顔周益公集願佐司馬王居正字剛中遷兵部侍郎兼直學士院公辭曰臣愚不足以任二事丨盡力丨丨丨不受直院東萊集還二祈父六卿之亞皆髙選也而夏官實主武事丨丨丨丨用均爾勞曲阜除陳塤制韓愈上兵部李侍郎書伏以閣下內仁而外義行髙而德巨尚賢而與能哀窮而悖屈自江而西既化而行矣今者入守內職為朝廷大臣當天子新即位汲汲於理化之日出言舉事宜必施設既有聽之之明又有振之之力寧戚之歌鬷明之言不發於左右則後而失其時矣兵部郎中附貟外郎歷代㳂革魏有五兵晉有七兵皆置郎中歷代或單為郎或為郎中隋初為兵部侍郎焬帝除侍字又改為兵曹郎唐初皆因隋制武德三年改兵部郎中龍朔改司戎大夫咸亨光宅神龍隨曹改復二貟一貟掌判帳及天下武官之階品衛府之名數一貟掌判簿以總軍戎差遣之名數通典六典唐職官志及本朝官制元豐正名並見前尚書類初除潘良器職略本曹所治之事郎中貟外郎參掌之續㑹要建炎三年併省冗職以兵部郎中兼職方中興題名事類下大夫兵部郎中周大司馬屬官軍司馬丨丨丨之任也唐職林又中兵丨丨丨權德輿兵部郎中楊凝集序兵曹郎隋煬帝改丨丨丨唐武德改兵部郎中通典掌武階兵部郎中二貟一貟丨判帳及天下丨官之丨品衛府之名數一貟掌判簿以揔軍戎差遣之名數唐官志掌勳簿丨武職丨官三衙及兵士丨書朝集祿賜假告差發武職告身之事職貟令奏决若流姚崇為夏官郎中契丹擾河北兵檄叢進崇丨丨丨丨武后賢之拜侍郎所歷有聲唐盧奕懷愼之子與其兄渙齊名開示中任京兆司録參軍天寶初為鄠縣令兵部郎中丨丨丨丨皆如渙之所治也公務修整唐裴光庭轉兵部郎中既歷清要人未之許及在職丨丨丨丨衆皆嘆服吏幹有稱唐李憕驟歷兵部郎中憕有丨丨明於几案甚丨當言之丨並唐書本𫝊夏官之屬既忝丨丨丨丨元和制誥司武之屬丨丨丨丨重于文昌同上不居外省兵部郎中二貟一在侍從丨丨丨丨元微之行楊嗣復制併兼職方國朝建炎中丨省冗職以兵部郎中丨丨丨中興題名一臺之華姑寵七兵之秩用服丨丨丨丨胡文恭行吕公弼制五兵之屬往踐丨丨丨丨公是行周思永制郎選甚寵七兵之曹丨吏之丨丨丨南豐潘良器制中臺妙選夏卿首曹丨丨丨丨張朂制韓愈撰兵部郎中楊君墓碣為尚書司封貟外郎革正封邑申明嫡庶事連權右斥退勿憚直聲彰聞仍參選部仍一本作乃選去聲謂為吏部員外郎以馭羣吏姦臣席勢成福自己他人求附離而不可得者公則却之私以胥吏求署一皆罷遣曰吾不以三尺法為己利害云云為右司郎中危言直已以致其誠然卒中於疲辭不得朝請以檢校吏部郎中為宣武軍節度判官臺人缺守往蒞其政孤老撫安强猾戮死墾鑿墝鹵芟艾榛荒作爰田以贍人食濬决潢汙築復堤防為洛渠以定水禍理不半嵗利垂千祀㑹朝復命次于汴郊師喪卒亂不可以入遂西走闕下璽書迎門勞徠甚備以疾居家三年復登于朝十八年凝起家為兵部郎中遐邇詠歌貟外郎能益百姓魏徴薦杜正倫為兵部貟外郎太宗勞之曰朕舉賢者非朕獨私以丨丨丨丨也杜正倫𫝊分掌二人貟外郎二人一人掌貢舉及雜請之事凡應舉之人有謀略才藝平射筒射皆待命以舉若州府嵗貢皆勘貢文狀而引試焉一人掌選院謂之南選曹每嵗選人有解狀簿書資歷考課必由之以核其實乃上三銓進甲則書焉六典處不閲旬唐張嘉貞為兵部貟外郎時功狀盈凡郎吏不能决嘉貞為詳丨丨丨丨廷無稽牒本𫝊參所治事國朝兵部本曹所治之事郎中貟外郎參掌之續㑹要駕部郎中附貟外郎歷代㳂革周夏官之屬有輿司馬有校人主馬之官有牧師掌牧放布巾車掌公車之政及王之五輅皆駕部之本也魏晉尚書有駕部郎宋駕部屬左民尚書齊有之後魏與北齊並曰駕部郎中隋曰侍郎屬兵部焬帝除侍字唐武德加中字龍朔改司輿大夫咸亨復故天寶中改司駕至德復故通典本朝駕部司事一人以無職事朝官充輿輦車乘𨽻於太僕𫝊驛給受一出於樞密院廄牧之政總於羣牧司本司無所掌元豐改制郎中貟外郎始實行本司事續㑹要初除王欽職略參掌輿輦車馬驛置廄牧之事大禮則戒有司具五輅凡奉使之官赴闕視其官職及所沼事給馬如格官文書則量其遲速附馬步急遽應內外監牧租入多寡孶産登耗皆檢察焉神宗正史職方志建炎三年以駕部兼庫部復併太僕寺歸駕部本朝㑹要紹興元年復裁內外官於是駕部又當省而郎適贊讀王府而詔聽留需其遷勿補厥後間或一置而一貟之制定矣題名兵部四曹而止一貟事類孝昭閲簿北齊馮子琮為駕部郎中攝庫部丨丨帝曽丨丨領試令口陳子琮暗對無有遺失職官分紀楊素拊床李靖在隋為駕部貟外郎左㒒射丨丨丨丨謂曰卿終當坐此公義奉國隋辛公義為駕部郎勾檢馬牧所獲十餘萬匹帝嘉曰唯我丨丨丨丨竭忠通典如處美官唐畢諴字存之為駕部貟外郎故事要家勢人以倉駕二曹為辱諴沛然丨丨丨丨本傳不博前行中行刑户丨丨丨丨駕軍唐國史補清謹介特崔元亮字晦叔為駕部貟外郎丨丨丨丨淡如也本𫝊輦乘之奉輿馬丨丨丨丨郵驛圉牧之治中臺要務主以郎官南豐擬制輿馬之政擢司丨丨丨丨初寮除季倫制鹵簿之式甲胄弓矢之器乘輿丨丨丨丨武藏之任郎選甚髙南豐駕部兼庫部判詩集南宫老庫幽閒靜境別無事惟有丨丨丨丨兄白居易贈駕部吳郎中古今合璧事類備要後集卷三十
