body:
  text: 古今合璧事類備要續集卷五十宋謝維新撰事為門知人附不知人不見知知己己求知事理發揮甚矣知人之為難也亦甚矣知己者之不易得也惟其知人則施于人者不悖惟其知己則伸于巳者不少人之知己與己之知人一也自非氣類相求肝膽相照又安得有真相知者哉此管鮑之賢所以不世有也然人不已知非所患也已不知人其可乎故君子必以知人為急事類則哲臯陶曰在知人禹曰咸若時惟帝其難之知人丨丨能官人書唯賢丨丨知賢患不知子曰不患人之不已知丨丨丨人也為政未易知人固丨丨丨知人亦未易范滂傳知下惠臧文仲魯大夫臧孫辰也時栁下惠為士師文仲知其賢而不進達之孔子曰臧文仲其竊位者與丨栁丨丨之賢而不與立也史知子産鄭人遊于鄉校然明謂子産曰毁鄉校如何子産曰何為云云然明曰蔑也今而後知吾子之信可事也左襄二十一年知􅎦蔑叔向適鄭鬷蔑欲觀叔向使之從收器者而往立于堂下一言而善叔向將飲酒問之曰必鬷明也下執其手以上曰昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫今子少不揚子若無言吾幾失子矣言之不可以已也如是遂如故知左昭二十八年足知雅曲曹公使蔣斡説周瑜瑜先覺之謂幹曰吾雖不及夔曠聞絃賞音丨丨丨丨也號為氷鑑司馬徽清雅有知人之鑒龎德公嘗謂德操為氷鑑此是君座何充嘗詣王導導以塵尾指床呼充共坐曰丨丨丨丨也及導薨充參録尚書事作黑頭公王詢與謝玄為桓溫掾溫嘗謂之曰謝椽年四十必擁旄杖節王掾當丨丨丨丨並本傳誤蒼生者王衍嘗造山濤濤嗟歎良久既去目而送之曰何物老嫗生寧馨兒然丨天下丨丨丨未必非此人也當為冠冕龎統字士元少時朴鈍未有識者頴川司馬徽清雅有知人鑒往見徽稱統丨丨南州士之丨丨由是漸顯當為棟梁吏部侍郎高孝基稱知人見房喬曰當為偉器恨不見其聳壑昻霄見杜如晦曰公有應變之才丨丨丨丨之用必為後患張九齡曰祿山失律喪師于法不可不誅且臣觀其貌有反相不殺丨丨丨丨上曰卿勿似王夷甫識石勒枉害忠良竟赦之本傳使後得權郭子儀病雖百官造省不屛姬侍及盧杞至則屏之隱几而待家人怪問其故曰彼外陋內險左右見必笑丨丨丨丨吾族無類矣勉旃自愛蘇子容丞相始為南都從事時杜正獻公方致仕居南都見蘇公大器之為道其平生出處本末甚詳曰子異時所至亦如老夫願丨丨丨丨蘇公唯唯謝之徐度却掃恍然大驚熙寧間蘇公頌以集賢院學士守杭州梁况之以朝官通判明州之官道出錢塘公一見異之留連數月待遇甚厚既别復遣介至津亭手簡問勞且以一硯遺之曰石硯一枚留為異日玉堂之用梁公姑謝而留之元祐六年梁公在翰苑一夕宣召甚急將行而嘗所用硯誤墜地碎倉卒取他硯以行既至則靣受旨尚書左丞蘇某拜右僕射梁公受命退歸玉堂方抒思命詞涉筆之際視所携硯則頃年錢塘蘇公所贈也因丨丨丨丨是夕梁公亦有左丞之命他日會政事堂語及之蘇公一笑而已却掃録如文靖言寇萊公與丁晉公始甚相善李文靖公為相丁公尚為兩制萊公屢以丁薦而公不用何也文靖答曰今已為兩禁矣稍進則當國如斯人者果可當國乎寇曰如丁之才相公自度終能抑之否文靖曰唯行且用之然他日勿悔也既而二公秉政果傾軋竟丨丨丨之丨倦逰雜録識夷簡否王沂公知制誥一日至中書見王文正公問君丨一呂丨丨丨沂公曰不識也退而訪諸人呂公方為太常博士倅濵州文正曰此人異日與舍人對秉鈞軸沂公曰何以知之曰吾亦不識但以其奏請得之如不稅農器之類沂公姑應之及丁晉公敗沂公引為執政卒與沂公並相沂公從容道文正語皆嗟歎以為非所及龍川志不可大用韓魏公嘗云吳長文奎有識方天下盛推王安石以為必可致太平唯長文獨語曰王安石心強性狠丨丨丨丨魏公别録後當如是王安石始為政司馬溫公上疏逆陳其利害曰丨丨丨丨及二十餘年無一不如公言行狀必受其弊呂獻可將彈新參溫公愕然獻可曰王安石雖有時名好執偏見侍從猶可置諸宰府丨丨丨丨詳見官制門必亂天下神宗將召用介甫訪于大臣爭稱舉之張安道時為承旨獨言安石言偽而辨行愎而堅用之丨丨丨丨記聞不知人以言舉君子不丨丨丨人以容取子路曰淡臺子羽有君子之容而行不勝其貌宰我有文雅之辭而智不充其辨相馬以車相士以居丨丨丨人則失之子羽以言取人則失之宰豫家語知巳為知巳用列子曰管夷吾與叔牙二人相友管仲曰吾與鮑叔賈分財多自與鮑叔不以我為貪知吾有親也吾嘗與鮑叔謀事大窮困鮑叔不以我為愚知時有不利也吾嘗三仕三見逐鮑叔不以我為不肖知不遭時也知我者鮑叔生我者父母昔鮑叔有疾管仲為之不食不內漿寧戚患之管仲曰生我者父母知我者鮑子士丨丨丨者丨馬為知己者良鮑子死天下莫知安用水漿雖為之死亦何傷哉韓詩外傳為知己死趙襄子滅智伯其臣豫讓逃遁山中曰嗟乎士丨丨丨者丨女為悅己者容今智伯知我我必為報讎而死以報智伯則吾魂魄不愧矣史記以為知己晏嬰之晉至中牟見弊冠反裘負芻息于道側者嬰問曰吾子何為者對曰我越石父者為人臣僕于中牟見使將歸嬰曰何為僕對曰吾身不免凍餓之地吾是以為僕也嬰曰可得而贖乎對曰可遂解左驂而贖之因載而與之俱歸至舍不辭而入越石父立而請絶晏嬰使人應之曰子何絶我之暴也越石父曰臣聞士者屈于不知巳而伸于知巳吾三年為臣僕人莫吾知也今子贖我吾丨丨丨丨矣今不辭而入是與臣我者同矣晏子出見之曰向也見客之容今也見客之意遂以為上客且曰知我子産聞子皮卒哭丨丨吾已無與為善矣惟夫子丨丨左昭十三立不失容莊子送葬過惠子之墓謂從者曰郢人堊墁其鼻端若蠅翼使匠石斫之匠石運斤成風斫之盡堊而鼻不傷郢人丨丨丨丨宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣能斫之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與言也莊子仰而長鳴驥服鹽車而上太行遷延負轅不能上伯樂遭之下車攀而哭之驥于是俯而噴丨丨丨丨聲聞于天下若出金石者何也彼見伯樂之知己也戰國䇿林宗見竒茅容與等輩避雨樹下衆皆夷踞相對容獨危坐愈恭郭丨丨丨而丨其異遂與共言謝安所知羊曇為丨丨丨丨安薨後徹樂彌年行不由西州路宣武所器習鑿齒有才桓丨丨器之未三十用為荆州治中謝箋曰不遇明公荆州老從事耳世説若遇知己吉溫常曰丨丨丨丨南山白額虎不難縛也唐元紀不知己莫知我艱詩莫知我勩同上知我者天子曰莫我知也夫不怨天不尤人下學而上達丨丨丨其丨乎語十四知我者希丨丨丨丨則為貴矣老子斯巳而已子擊磬于衛有荷蕢而過孔氏之門者曰莫已知也丨丨丨丨矣深則厲淺則揭伯牙絶絃伯牙鼓琴意在泰山鍾子期曰善哉巍巍若泰山俄而志在流水子期曰善哉湯湯乎若流波子期死丨丨破琴丨丨終身不復鼓琴以為世無賞音者説苑卞和泣玉應劭曰丨丨得玉璞獻之武王武王示玉人玉人曰石刖其右足武王沒復獻文王玉人復曰石也刖其左足至成王時卞和抱璞哭于郊乃使玉尹攻之果得寶玉史記束之高閣殷浩才名冠世庾翼弗之重也每語人曰此輩宜丨丨丨丨俟天下太平然後議其任耳庾傳遇以海客牛僧孺詣襄陽于頔求知頔以海客遇之牛怒而去後匆問牛秀才發未曰已去立命小將賫書絹五百匹追之僧孺不啓封揖回幽間鼓吹以為輕已韓魏公知揚州王介甫以新進士簽書判官事魏公雖重其文學而不以吏事許之介甫數引古義爭公事其言迂闊魏公多不從介甫秩滿去會有上韓公書者多用古字韓公笑而謂僚屬曰惜王介甫不在此其人頗識難字介甫聞丨丨韓公丨丨由是怨之記聞謂非知我韓魏公知揚州王荆公為僉判每讀書達旦略假寐日已高亟上府多不及盥漱魏公見荆公年少意其夜飲放逸一日從容丨荆公曰君年少母廢書不可自棄荆公不答退而言曰魏公丨丨丨者魏公後知荆公之賢欲收之門下荆公終不屈如召館職不就之類是也故荆公熙寧日録中短魏公為多每曰韓形相好耳作畫虎圖詩詆之及魏公薨荆公有挽詩云幕府少年今白髮傷心無路送靈輀猶不忘魏公少年之語也又入瓜步望揚州詩云白頭追想當年事幕府青衫最少年同上求知己求為可知子曰不患無位患所以立不患莫已知丨丨丨丨也語患其不能子曰不患人之不已知丨丨丨丨也語憲問上書自鬻東方朔丨丨丨丨曰臣朔勇若孟賁捷若慶忌亷若鮑叔信若尾生若此可以為天子大臣矣本傳於路自陳魏愷自散騎常侍遷青州刺史固辭文宣大怒曰何物漢子與官不就由是積年沉廢後遇愔丨丨丨丨愔曰咸由中旨愷曰雖復零雨自天終待雲興四嶽愔欣然數日除霍州刺史本傳上書求薦先生云一日程頤與韓持國范夷叟泛舟于頴昌西湖須臾官將云有一官員丨丨謁大資乃是求知己頤曰大資居位却不求人乃人倒來求已是甚道理夷叟曰丨丨章常事也頤云不然只為曾有不求者不與求者與之遂致人如此持國便服程氏遺書勤職求知滎陽公呂希哲與諸人云自少官守處未嘗干人舉薦以為後生之戒仲父常從守官會稽人或議其不求知者仲父對云丨于丨事乃所以丨丨也童蒙訓韓愈與馮宿書昔揚子雲著太玄人皆笑之子雲之言曰世不我知無害也後世復有揚子雲必好之矣子雲死近千載竟未有揚子雲可歎也其時桓談亦以雄書勝老子老子未足道也子雲豈止于老子爭強而已乎此誠未必為知雄者其弟子侯芭頗知之以為其師之書勝周易然侯芭之他文不見于世不知其人果何如耳以此而言作者不祈人之知也明矣直百世以俟聖人而不惑質諸鬼神而不疑耳足下豈不謂然乎韓愈與陳商書辱惠書語高而旨深三四讀尚不能通曉茫然增愧赧又不以其淺弊無過人智識且喻以所守幸甚敢不吐情實然自識其不足補吾子所須也齊王好竽有求仕于齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下為鼓瑟合軒轅氏之律呂客罵之曰王好竽而子鼓瑟瑟雖工如王不好何是所謂工于瑟而不工于求齊也今舉進士于此世也求祿利行道于此世而為文必使一世人不好得無與操瑟立齊門者比歟文誠工不利于求求不得則怒且怨不知君子必爾不為也故區區之心每有來訪者皆有意于不肖者也略不辭讓遂盡言惟吾子諒察韓愈薦侯喜狀右其人為文甚古立志甚堅行止取舍有士君子之操家貧親老無援于朝在舉場十餘年意無知遇愈嘗慕其才而恨其屈與之還往歲月已多嘗欲薦之于主司言之于上位名卑官賤其路無由觀其所為文未嘗不掩卷長歎去年愈從調選本欲擕持同行適遇其人自有家事迍邅坎軻又廢一年及春末自京還怪其久絶消息五月初至此自言為閣下所知辭氣激揚靣有矜色曰侯喜死不恨矣喜辭親入關羇旅道路見王公數百未嘗有如盧公之知我也比者分將委棄泥塗老死草野今胸中之氣勃勃然復有仕進之路矣愈感其言賀之以酒謂之曰盧公天下之賢刺史也未聞有所推引蓋難其人而重其事今子鬱為選首言其死不恨固宜也古所謂知己者正如此耳身在貧賤為天下所不知獨見遇于大賢乃可貴耳若自有名聲又託形勢此乃市道之事又何足貴乎子之遇知于盧公真所謂知己者也士之修身立節而竟不遇知己前古已來不可勝數或日接膝而不相知或異世而相慕以其遭逢之難故曰士為知己者死不其然乎不其然乎閣下既已知侯生而愈復以侯生言于閣下者非為侯生謀也感知己之難遇大閣下之德而憐侯生之心故因其行而獻于左右焉韓愈上張僕射書執事之擇于愈者非為其能晨入而夜歸也必將有以取之苟有以取之雖不晨入而夜歸其所取者猶在也下之事上不一其事上之使下不一其事量力而任之度才而處之其所不能不強使為是故為下者不獲罪于上為上者不得怨于下矣孟子有云今之諸侯無大相過者以其皆好臣其所教而不好臣其所受教今之時與孟子之時又加逺矣皆好其聞命而奔走者不好其直已而行道者聞命而奔走者好利者也直已而行道者好義者也未有好利而愛其君者未有好義而忘其君者今之王公大人惟執事可以聞此言惟愈于執事也可以此言進愈蒙幸于執事其所從舊矣若寬假之使不失其信加待之使足以為名天下之人聞執事之于愈如是必皆曰執事之好士也如此執事之待士以禮如此執事之使人不枉其性而能有容如此執事之欲成人之名如此執事之厚于故舊如此又將曰韓愈之識其所依歸也又如此韓愈之不諂屈于富貴之人如此韓愈之賢能使其主待之以禮如此則死于執事之門無悔若使隨行而入逐隊而趨言不敢盡其誠道有所屈于巳天下之人聞執事之于愈如此皆曰執事之用韓愈哀其窮收之而已耳韓愈之事執事不以道利之而已耳苟如是雖日受千金之賜一歲九遷其官感恩則有之矣將以稱于天下曰知己知己則未也栁子厚送苑論詩序八年冬余與馬邑苑言揚聯貢于京師自時而後車必挂轊席必交衽量其志知其達于昭代究其文辨其勝于太常探而討之則明韜于朴厚之質行浮于幽顯之間逰公卿之間質直而不犯恪謹而不懾交同列之羣以誠信聞余拜而兄之以為執誼而固臨節不奪在兄而已是歲小司徒顧公守春官之缺而權擇士之柄明年春同趨權衡之下並就重輕之試觀其掉鞅于術藝之場逰刃乎文翰之林風雨生于筆札雲霞發于簡牘左右圜視朋儕拱手甚可壯也二月丙子有司題甲乙之科揭于南宮余與兄又聮登焉余不厚顔懷愧而陪其遊久矣夏四月告歸荆衡拜手行邁輪移都門之轍轅指秦嶺之路方將高堂稱慶里閈更賀曳裾峨冠榮向諸侯之邦遐登王粲之樓高視劉表之榻桂枝片玉光生于家是宜砥商雒之阻艱帶江漢之浩蕩以談笑顧聁超越千里而無倦極也然而景熾氣燠往即南方乘陵炎雲呼吸溫風可無敬乎慎進藥石保安其躬是亦非兄之所宜私也羣公追餞于霸陵列筵而觴送逺之賦圭璋交映或授首簡于余曰子得非知言揚者乎安而默耶余受而書之編于羣玉之右非不知讓貴傳信焉爾皇甫湜送丘儒序吾居河隂丘生敲門請曰儒貴求知余謹自露願以是非賜決語其學如猗頓之富聽其音如清廟之樂觀其刻意勵行如奉商鞅之法而懼秦刑吾驚而與之遊踰年將鬭其藝于洛下吾逺來洛下喻之曰子知市乎懷貝玉以之名都之肆未有不售者也挈而之三家之墅未有不為盜困幸矣子將安置哉京師賢才市也一人不知子也他人知子一門不容子也他門容子子謹持其所有以往未有不成者也今子之類固少勢能移事者稀為一不知為一相移白變而復黑倒上而為下吾未如之何矣生不信而試果困而見吾酌酒而賀之曰謹持貝玉以往之都市可矣曰諾乃敘其行詩集無知者仲蔚愛窮居繞舍生蒿蓬翳然絶交逰賦詩頗能工舉世丨丨丨止有一劉龔此士胡獨然實由罕所同介然安其業所樂非窮通人事固已拙聊得長相從陶潛詠貧士無知己鄉曲丨丨丨朝端乏親故伊誰為揚雄一薦甘泉賦孟浩然桐遇知音馬因回首雖增價丨丨丨丨已半燋白侍郎圭璧無人知丨丨丨丨丨甘與頑石列舜禹無陶堯名聲隨腐滅唐文粹期君蟠桃枝丨丨丨丨丨千歲終一嘗山谷古今合璧事類備要續集卷五十
