body:
  text: 古今合璧事類備要外集巻八宋謝維新撰祭祀門祫禘附太廟四時祭禮經考索祫禘之祭亦嘗原其所以乎禘者禘其祖之所自出而謂之追饗祫者自即位朝廟始而謂之朝饗王者饗及七世推親以及祖推祖以及始祖四時各於其廟祭之於是有祠禴嘗烝既有祠禴嘗烝矣而毁廟之主不及猶以為未也縁生有合族綴食之恩乃於始祖之廟合毁廟親廟之主而祭之故於是乎有祫祭焉既祫矣而逺祖又有所未及猶以為未也又推其上而各禘其祖之所自出者而祭之故於是乎又有禘祭焉至此則仁之至義之盡也然禘之所自以其祖配若舜禹祖高陽高陽世系出自黃帝則虞夏禘黃帝以高陽氏配商祖契出自帝嚳則商人禘嚳以契配周祖文王亦出自嚳故周人禘嚳以文王配四代世系所出者明故追祭所及者逺也漢魏以來世系不明漢自上皇以前無聞故自高祖以上唯見太上皇一世而已魏自處士君而上亦無聞故明帝上事高祖之父處士以下五世而已劉氏出於劉系而漢不禘堯曹氏出於陸終之子安而魏不禘漢良以譜牒不明故也恭惟藝祖踵漢唐故事祭四親廟惟僖祖而上所自出者譜失其傳有司因仍舊說三年一祫五年一禘以與祫皆合羣廟之主綴食於始祖禘祫之時不同而禮實無異訛舛莫甚焉國家世系與虞夏商周不同既求其祖之所自出而不得則禘禮當廢此元絳所以言之於先朝而先朝所以從其言矣惟四時之祭僅行於原廟君子思古安得不歎息於斯云事類禘諟禘之言諦丨丨昭穆尊卑之義以夏四月陽氣在上陰氣在下故正尊卑之義後祭祀志次第宗廟之祭夏曰禘注禘者丨丨也夏時雖未成宜依時次第而祭之王制大祭丨丨曰禘大祭其先祖所由生謂郊祀天也記大傳又王者禘其祖之所由出注禘大祭也喪服小記全烝郊禘之事則有丨丨國周語順陽夏祭曰禘二陽義也禘者陽之盛也古者於禘發爵賜服丨丨義也祭統合天君子丨諸丨道春禘祭義灌而往禘自既丨丨丨者吾不欲觀之矣知其說或問禘之說子曰不知也丨丨丨者之於天下也其如示諸斯乎指其掌並語禘祖宗祭法有虞氏禘黄帝夏亦禘黃帝殷周禘嚳注丨郊丨丨謂祭祀以配食也此禘謂祭昊天於圜丘記禘感帝長發大禘也濬哲維商長發其祥洪水茫茫禹敷下土方外大國是疆幅隕既長有娀方將帝立子生商𤣥王桓撥受小國是達受大國是達率履不越遂視既發相土烈烈海外有截帝命不違至于湯齊疏長發詩者大禘之樂歌也禘者祭天之名謂殷王高宗之時以正歲之正月祭其所感之帝於南郊詩人因其祭也而歌此詩焉經云帝立子生商謂感生之帝非天皇大帝也詩禘太祖雝丨丨丨也有來雝雝至止肅肅相維辟公天子穆穆於薦廣牡相予肆祀假哉皇考綏予孝子云云注禘大祭也大於四時而小於祫太祖謂文王為殷祭天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰烝注此葢夏殷之祭名周則改之春曰祠夏曰礿以禘丨丨丨再殷祭武王以周十二月崩其明年周公攝政稱元年十二月小祥二年十二月大祥三年二月禫四年春禘云云故鄭云五年丨丨丨殷大也謂禘祫二者俱為大祭也雝詩注祀太廟魯君季夏六月以禘禮丨周公於丨丨牲用白牡尊用犧象山罍鬱尊用黄目灌用玉瓚大圭薦用玉豆雕篹爵用玉琖仍雕加以璧散璧角俎用梡嶡升歌清廟下管象朱干玉戚冕而舞大武皮弁素積裼而舞大夏昧東夷之樂也納夷蠻之樂於太廟言廣魯於天下也注魯公伯禽季夏建巳之月記明堂位于太廟魯僖公八年禘丨丨丨用致夫人注哀姜左告莊公閔公二年夏五月乙酉丨禘于丨丨注三年喪畢致新死者之主於廟廟之逺主當遷入祧因是大祭以審昭穆謂之禘莊公喪制於闋時别立廟廟成而告祭又不於太廟故詳書左致哀姜僖八年秋禘於太廟而用丨丨丨焉非禮也凡夫人不薨于寢不赴于同不祔于姑則弗致注夫人淫而與殺不薨于寢於禮不應禘故僖公疑其禮厯三禘今果行之嫌異常故書之殺音試左戒百官魯昭公十五年春將禘於武公丨丨丨梓慎曰禘之日其有咎乎吾見赤黑之祲非祭祥也喪氛也其在涖事乎二月癸酉禘叔弓涖事籥入而卒去樂卒事禮也戒都車陽虎欲去三桓以季寤更季氏以叔孫輒更叔孫氏己更孟氏冬十月順祀先公而祈焉辛卯禘於僖公壬辰將享季氏於蒲圃而殺之丨丨丨曰癸巳至成宰公斂處父告孟孫曰季氏戒都車何故孟孫曰吾弗聞處父曰然則亂也七年禘後章帝建初丨丨秋丨祭光武明帝詔仰惟先帝烝烝之情前終禘祭以盡孝敬朕得識昭穆之序寄逺祖之思本紀五歲禘天子親祠者二十有四三歲一祫丨丨一丨當其歲則舉唐禮樂志尊僖祖國朝自太祖追王四親以來毎遇禘祫祖宗以昭穆相對而東丨丨丨位王介甫用事以為僖祖以上世次不可知則僖祖之有廟與后稷無以異當時諸儒韓持國輩辨之不從熙寧八年夏禘於太廟以丨丨丨自是無敢議者雜記奉僖祖熙寧八年夏四月詔禘祫丨丨丨東嚮義諭祫祭大事諸侯及其太祖大夫士有丨丨省於其君于祫及其高祖注于猶空也空裕謂無廟祭於壇墠記大傳大饗丨丨之禮尚𤣥酒而俎腥魚大羮不和有遺味者矣注丨丨祭先王記樂記天子禘丨丨犆礿祫丨祫嘗祫烝王制諸侯嘗丨丨丨禘一犆一祫嘗祫烝祫同上無常貨大饗其王事與三牲魚腊四海九州之美味也籩豆之薦四時之和氣也内金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘丨丨丨各以其國之所有則致逺物也其出也肆夏而送之葢重禮也注盛其饌與貢請祫祭先王禮器十二獻天子大祫丨丨丨周禮孟秋月凡樂圜鍾為宮黄鍾為角大簇為徵姑洗為羽靁鼓靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宮太簇為角姑洗為徵南呂為羽靈鼓靈鼗絲竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣凡樂黄鍾為宫大吕為角太簇為徵應鍾為羽路鼓路鼗陰竹之管龍門之琴瑟九德之歌九㲈之舞於宗廟之中奏之若樂九變則人鬼可得而禮矣疏此宗廟祫祭也但商人祫於二時周禮惟用丨丨之丨為之大司樂四廟主祫祭於祖則祝迎丨丨之丨主出廟入廟必蹕老耼云曾子問祀高宗𤣥鳥丨丨丨也天命𤣥鳥降而生商宅殷土芒芒古帝命武湯正域彼四方方命厥后奄有九有商之先后受命不殆在武丁孫子武丁孫子武王靡不勝云云禮當作祫疏高宗喪畢祫於太祖廟故詩人因此祫祭之後乃述序其事而歌作詩焉詩事太廟魯文二年八月丁卯大丨于丨丨大事者何大祫也大祫者何合祭也其合祭謂何毁廟之主陳於太祖未毁廟之主皆升合食於太祖五年而再盛祭公羊明堂助祭前平帝元始五年正月祫祭丨丨諸侯王列侯宗室丨丨本紀祖宗盛祭祫者合也冬十月穀成故骨肉合飲食於丨丨謂之丨丨後章帝紀注别設牙盤本朝太祖建隆元年有司請立宗廟二年聶崇義定郊廟開寳元年上入太廟見籩豆簠簋問曰此何等物左右以禮器對上曰祖宗寧識此亟去之詔自今親享太廟丨丨丨丨禘祫時享同之親薦嘉籩仁宗嘉祐四年孟冬詣太廟祫享御批云惟祫享之義著禮經之文大祭先王合食祖廟感迪嘗之薦深肅僾之懷追孝奉先莫斯為重有司所存出於假攝卜以孟冬備兹法駕欵於太室丨丨丨丨朕取今年十一月擇日親詣太廟行祫享之禮所有合行諸般恩賞並特就祫享禮畢依南郊例施行用為次序真宗祥符六年詔顧復之恩增悲於罔極烝嘗之典期叶於大中祇循奏對肇偕升侑采儀坤之舊章著昭成之先食惟以祔廟之歲時丨丨合享之丨丨恭以允德皇后神主祔於明德皇后之次差秩位序仁宗嘉祐四年祫享太廟赦文云欽念宗祊之嚴古稱合食之重禮久不講心焉靡遑㳂酌情文審稽義訓肇迎寒律時及孟冬前詣琳宫奉鍳而祇欵還升閟室祼瓚以㑹祠儼然軒楹丨丨丨丨八簋豐靖三牲具純音容悅瞻氣象歆格于以答神明之孚佑于以示子道之恪恭不序昭穆祫事太廟並為一列丨丨丨丨謂之隨宜設位以廟之前楹狹故也國朝偹要太祖東嚮紹興五年八月董舍人弅為吏部員外郎始請正丨丨丨丨之位上命於秋後議之明年春王侍郎普為太常丞復以為請趙元鎮為相白行之下侍從臺諫禮官集議上謂元鎮曰丨丨開基創業始受天命祫享居丨丨之位合於禮經必無異議而諫官趙霈者乃謂上皇在逺宗廟之事未容輕議事遂止淳熙末尤延之尚書為江西提刑復建此議紹熙初入為宗伯遂申言之詔侍從臺諫兩省與禮官同議其事亦不行時丘宗卿侍郎在奉常亦以為言而議終格逮趙子直得政遂决行之朱文公侍講獨言僖祖皇家始祖不當一旦併行祧毁不從故昌陵祔廟踰二百年而後正太祖之位葢自紹熙五年冬始而别建一殿以奉祧主於大殿之西今謂四祖殿者是也雜記禘祫廣孝道祭宗廟所以禘祫何尊人君貴功德丨丨丨位仁德盛所及彌逺白虎通思親志三年一祫五年一禘以衣服想見其顔色三日齋丨丨丨意想見所好意喜然後入廟禮稽命耀祫禘之時後光武建武三年立親廟雒陽時冦賊未平祀儀未設至十九年盜賊討除戎事差息於是張純朱俘奏議禮詔孝宣帝有功德其上尊號曰中宗遂以合祭高廟為常後以三年冬祫五年夏禘丨丨但就陳祭毁廟主而已謂之殷太祖東面惠文武元帝為昭景宣帝為穆惠景昭三帝非殷祭時不祭後祭祀志禘祫於堂肅宗初有司奏言孝明劬勞云云宜尊廟曰顯宗其四時丨丨丨光武之丨間祀共進武德之舞制曰可本紀君臣並列後張純奏今祫禘高廟陳序昭穆而春陵四世丨丨丨丨以卑厠尊本傳祖宗失位祫以昭穆合食於太廟而禘以審諦其尊卑此禘祫之義而古禮者失之至於年數不同丨丨丨丨議者莫知所從唐禮志五年再祭高祖上元三年十月當祫而有司疑其年數史元燦等議以為新君喪畢而祫明年而禘自是之後丨丨而丨丨葢後禘去前祫五年而祫常在禘後三年禘常在祫後二年魯宣公八年禘僖公葢二年喪畢而祫明年而禘至八年而再禘昭公二十年禘至二十五年又禘此可知也議者以元璨等言有經據從之五年再殷唐睿宗崩喪畢凡七祫七禘至二十七年禘祫並在一歲有司議之以為一禘一祫丨丨丨丨宜通數而禘後置祫歲數逺近二者不同鄭𤣥用高堂隆先三而後二徐邈先二而後三而邈以謂三禘相去為月六十中分三十置一祫焉此最為得遂用其說由是一禘一祫在丨丨之間合於丨丨之義同上昭穆合食書曰七世之廟可以觀德而禮家之說世數不同然記禮大儒荀卿劉歆班固王肅以為七廟者多葢自漢魏以來創業之君特起其上世微又無功德以備祖宗故其初皆不能立七廟唐武德始立四廟曰宣簡公懿王景皇帝元皇帝正觀元年高祖崩太宗詔有司定議朱子奢請立七廟虚太祖之室以待於是尚書八座議禮曰天子三昭三穆與太祖之廟而七晉宋齊梁皆立親廟六此故事也制曰可於是祔𢎞農府君及高祖為六室中宗神龍元年立始祖為七廟議者欲以凉武昭王為始祖張齊賢曰古者有天下者事七世而始封之君謂之太祖太祖之廟百世不遷至祫祭則毁皆以丨丨丨丨於太祖商祖𤣥王周祖后稷其世數逺而遷廟之主皆出太祖後故合食之序尊卑不差漢以高皇為太祖而太上皇不在合食之列為其尊於太祖故也唐受天命景皇帝始封之君太祖也以其世近而在三昭三穆之内而元皇帝以上皆以屬尊不列合食今宜以景皇帝為太祖博士劉承慶尹知章議曰三昭三穆與太祖為七廟者禮也而王跡有淺深太祖有逺近太祖以功建昭穆以親崇有功者不遷親盡者則毁今以太祖近而廟數不備乃欲於昭穆之外逺立當遷之主以足七廟而乖迭毁之議不可天子下其議祝欽明兩用其言尊卑不差見前注議升祔禮仁宗乾興元年禮官議升配三后詔朕有事於太廟恪於奉慈每懷保育之仁僾若見乎其位惟時禘祫之饗未升昭穆之序禮久不講心靡遑寧章憲皇后輔祐先帝母儀道備章懿皇太后徽柔惠迪法度惟允章惠太后肅雍思齊閫掖依憲三后厭代多厯年所肆饋合食猶隔閟宫其令禮官爰稽故籍丨丨丨之丨議求舊章同上年章憲明肅祔章穆皇后之次詔朕以奉慈三室未登禘祫之位故命奉常議求舊章卿等奏章來上乃曰縁人情而制禮則切而有實奉先訓以作古則顯而易遵祇覽祥符之詔深原文考之方極意尊親之際重興升降之辭上承奉先之順下成繼志之美永修明祀冀享靈心韓昌黎禘祫議右今月十六日勅㫖宜令百僚議限五日内聞奏者將仕郎守國子監四門博士韓愈謹獻議曰伏以陛下追孝祖宗肅敬祀事凡有擬議不敢自專聿求厥中誕訪羣下然而禮文繁漫所執各殊自建中之初迄至今歲屢經禘祫未合適從臣生遭聖明涵泳恩澤雖賤不及議而志切效忠今輒先舉衆議之非然後用明其說一曰獻懿廟主宜永藏之夾室臣以為不可夫祫者合也毁廟之主皆當合食於太祖獻懿二祖即毁廟主也今雖藏於夾室至禘祫之時豈得不食於太廟乎名曰合祭而二祖不得祭焉不可謂之合矣二曰獻懿廟主宜毁之瘞之臣又以為不可謹按禮祀天子立七廟一壇一墠其毁廟之主皆藏於祧廟雖百代不毁祫則陳於太廟而饗焉自魏晉以降始有毁瘞之議事非經據竟不可施行今國家德厚流光創立九廟以周制推之獻懿二祖猶在壇墠之位况於毁瘞而不禘祫乎三曰獻懿廟主宜各遷其陵所臣又以為不可二祖之祭於京師列於太廟也二百年矣今一朝遷之豈惟人聽疑惑抑恐二祖之靈眷顧依遲不即饗於下國也四曰獻懿廟主宜祔於興聖廟而不禘祫臣又以為不可傳曰祭如在景皇帝雖太祖其於屬乃獻懿之子孫也今欲正其子東嚮之位廢其父之大祭固不可為典矣五曰獻懿二祖宜别立廟於京師臣又以為不可夫禮有所降情有所殺是故去廟為祧去祧為壇去壇為墠去墠為鬼漸而之逺其祭益稀昔者魯立煬宫春秋非之以為不當取已毁之廟既藏之主而復築宫以祭今之所議與此正同又雖違禮立廟至於禘祫也合食則禘無其所廢祭則於義不通此五說者皆所不可故臣博采前聞求其折中以為殷祖𤣥王周祖后稷太祖之上皆自為禘又其代數已逺不復祭之故太祖得正東向之位子孫從昭穆之列禮所稱者葢以紀一時之宜非傳於後代之法也傳曰子雖齊聖不先父食葢言子為父屈也景皇帝雖太祖也其於獻懿則子孫也當禘祫之時獻祖宜居東向之位景皇帝宜從昭穆之列祖以孫尊孫以祖屈求之神道豈逺人情又常祭甚衆合祭甚寡則是太祖所屈之祭至少所伸之祭至多比於伸孫之尊廢祖之祭不亦順乎事異殷周禮從而變非所失禮也臣伏聞制禮作樂者天子之職也陛下以臣議有可采粗合天心斷而行之是則為禮如以為猶或可疑乞召臣對面陳得失庶有發明謹議朱文公禘祫議王制天子七廟三昭三穆與太祖之廟而七諸侯大夫降殺以兩而祭法又有適士二廟官師一廟之文大抵士無太祖而皆及其祖考也其制皆在中門外之左外為都宫内各有寢廟别有門垣太祖在北左昭右穆以次而南天子太祖百世不遷一昭一穆為宗亦百世不遷二昭二穆為四親廟高祖以上親盡則毁而遞遷昭常為昭穆常為穆諸侯則無二宗大夫又無二廟其遷毁之次則與天子同儀禮所謂以其班祔檀弓所謂祔於祖父者也三代之制其詳雖不得聞然其大畧不過如此漢承秦弊不能深考古制諸帝之廟各在一處不容合為都宫以序昭穆貢禹韋元成康衡之徒雖欲正之而終不能盡合古制旋亦廢罷後漢明帝又欲遵儉自抑遺詔無起寢廟但藏其主於光武廟中更衣别室其後章帝又復如之後世遂不敢加而公私之廟皆為同堂異室之制自是以來更厯魏晉下及隋唐其間非無奉先思孝之君據經守禮之臣而皆不能有所裁正其弊至使太祖之位下同孫子而更僻處於一隅既無以見其為七廟之尊羣廟之臣則又上厭祖考而不得自為一廟之主以人情而論之則生居九重窮極壯麗而没祭一室不過㝷丈之間甚或無地以容鼎俎而陰損其數孝子順孫之心於此宜亦有所不安矣肆我神祖始獨慨然深詔儒臣討論舊典葢將以逺迹三代之隆一正千古之繆甚盛舉也不幸未及營表世莫得聞秉筆之士又復不能特書其事以詔萬世今獨其見於陸氏之文者為可考耳然其所論昭穆之說亦未有定論獨原廟之制外為都宫而各為寢廟門垣乃為近古但其禮本不經儀亦非古故儒者得以議之如李清臣所謂畧於七廟之室而為祠於佛老之側不為木主而為之象不為禘祫烝嘗之祀而行一酌奠之禮楊時所謂舍二帝三王之正禮而從一繆妄之叔孫通者其言皆是也然不知其所以致此則由於宗廟不立而人心有所不安也不議復此而徒欲廢彼亦安得為至當之論哉四時祭陽義凡祭有四時春祭曰礿夏曰禘礿禘丨丨也記祭統祭首萃六二孚利用禴注禴商春祭名四時丨之丨也釋文夏祭名易吉蠲禴祠烝嘗于公先王丨丨為饎是用孝享詩踐獻春官司尊彞春祠夏禴祼用雞彞鳥彞皆有舟其朝丨用兩犧尊再丨用兩象尊皆有罍禮見厥祖太甲元年伊尹祠于先王奉嗣王祇丨丨丨書伊訓受其福既濟九五東鄰殺牛不如西鄰之禴祭實受其福易合天道君子丨諸丨丨春禘秋嘗注春禘夏商禮也周以禘為盛祭更名春祭曰祠記祭義養陽氣享禘有樂而食嘗無樂陰陽之義也凡飲養陽氣也凡食養陰氣也故春禘而秋嘗記郊特牲天子祭夏礿秋嘗冬烝春社秋省而遂大蜡天丨之丨也注不言春祠魯在東方主東巡狩以眷或闕之記明堂位諸侯犆天子犆礿祫禘祫嘗祫烝諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿丨丨礿丨禘一犆一祫嘗祫烝祫王制享先王兹予大丨于丨丨注大享烝嘗也書盤庚于先王見前注物未成後漢明帝永平六年詔太常其以礿祭之日陳鼎於廟以備器用注夏祭曰礿薄也夏丨丨丨祭尚薄本紀物始生春曰祠夏曰礿注祠祭尚韭卯祠猶食也猶繼嗣也春丨丨丨孝子思親繼嗣而食之故曰祠因以别死生礿薦尚魚麥始熟可礿故曰礿麥可礿見上注菜可礿春祭曰祠夏祭曰礿注祠之曰食新丨丨丨爾雅文公家禮時祭用仲月前旬卜日前期三日齋戒前期一日設位陳祭省牲滌器具饌厥明夙興設蔬果酒饌質明奉主就位參神降神進饌初獻亞獻終獻侑食啓門受胙辭神納主徹餕凡祭主於盡愛敬而已貧則稱家之有無疾則量筋力而行之財可及者自當如儀烝嘗無二上嘗禘尊丨丨丨又天子嘗祭簠簋既陳而日食如之何孔子曰受祭之而已矣曽子問有二祧逺廟為祧丨丨丨享嘗乃止祭法天子祭秋嘗冬烝丨丨之丨也記明堂位諸侯祭諸侯禘則嘗嘗則不烝注丨丨歲朝廢一時祭疏嘗則不烝北方諸侯冬來朝也行秋祭竟而冬來朝故廢烝也王制大飲烝孟冬之月丨丨丨注十月農功畢天子諸侯與羣臣飲酒於太學以正齒位謂之飲烝月令大享嘗注詳見前發公室凡祭有四時春曰礿夏曰禘秋曰嘗冬曰烝云云古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順陰義也故記曰嘗之日丨丨丨示賞也祭統仁昭穆嘗禘之禮所以丨丨丨也記仲尼燕居絜牛往丨爾丨羊以丨烝嘗詩楚茨獻禽享大司徒仲冬敎大閱遂以狩田致禽饁獸于郊入丨丨以丨烝禮射人贊秋官丨丨祭祀則丨牲注烝嘗之禮有射豕者禮豐年報丨丨秋冬丨也注烝與嘗也詩康周公内祭則大嘗禘是也丨丨丨故以賜魯也記祭統告周公王在新邑烝祭歳文王騂牛一武王騂牛一王命作冊逸祝冊惟丨丨丨其後注明月夏之仲冬始於新邑烝祭故曰烝祭歳古者褒德賞功必於祭日示不專也特加文武各一牛告曰尊周公立其後為魯侯書洛誥于先王禴祠烝嘗丨公丨丨詳見前休農夫曹劌曰收攟而烝納要也丨攟拾也冬祭曰烝因祭禮以納五穀之要丨丨也國魯語乙亥嘗魯威公十四年御廩災丨丨丨書不害也左何以書譏嘗也曰猶嘗乎御廩災不如勿嘗而已矣公羊甸粟而内之三宫三宫而藏之御廩夫嘗必有兼甸之事注甸師掌甸之官三宫三夫人也夫人親舂是兼甸之事甲辰烝昭元年十二月晉既烝趙孟適南陽丨丨朔丨于温烝其家廟左己卯烝威八年春正月丨丨丨烝冬事也春興之志不時也公羊又丨丨丨烝者何冬祭也秋曰嘗冬曰烝常事不書譏何譏爾譏亟也亟則黷黷則不敬故君子之祭也敬而不黷穀梁丁丑烝威八年夏五月丨丨丨何以書亟也或剥或享以往烝嘗丨丨丨丨或肆或將詩楚茨故薦故祭魯威公五年凡祀始穀而嘗閉蟄而烝過則書注孟秋之月陰氣始殺嘉穀始熟故薦嘗於宗廟孟冬之月昆螽閉户萬物皆成可薦者衆故烝祭宗廟祭光武廟後明帝永平三年十月烝丨丨丨丨初奏文始五行武德之舞本紀古今合璧事類備要外集卷八
