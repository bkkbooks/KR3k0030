body:
  text: 古今合璧事類備要别集卷二十四宋謝維新撰花門牡丹花格物藂話牡丹花之富貴者也按本草一名鹿韭一名鼠姑論者以為花王考之前史無説自謝康樂集中始言水間竹際多有之而北齊楊子華有牡丹畫極佳則知此花之來久矣但隋文士集中無歌詩是隋朝花藥中所無者隋種法七十卷亦無其名開元宋裴士淹得之汾州天寶中又為都城竒賞元和物猶少至正元中已多漸與戎葵同矣然其圡産又有可言者或出於丹州或出於延州東則出青州南亦出越州惟出於洛陽者為天下第一是何造化之巧獨私於洛陽而它方則不然也然其品類尤為不一不紅則紫不黃則白如此之色或深而或淺其名稱亦各不同如姚黃如魏紫如朱砂紅玉版白如此之名字有高而有下前賢雖有譜之者恐此花之變態不常有非耳目之所能遍君子亦姑言大略爾惟夫出於洛陽者樹大而花亦大出於江南者樹小而花亦小花之小者姑置勿論花之大者盈尺許面也亦不可以一槩觀焉事類四香閣楊國忠為丨丨丨每於春時本芍藥盛開之際聚賔於此閣上賞花焉百寶欄明皇時沉香亭前木芍藥一枝二頭朝則深碧暮則深黃夜則粉白晝夜之內香艷各異帝曰此花木之妖也賜楊國忠木芍藥國忠以丨丨為丨開元遺事種藝術宋單父有丨丨丨牡丹變易千種上皇召至驪山種花萬本色樣各不同內人呼為花神又曰花師異人録頃刻花韓湘乃韓愈之姪孫自言解造逡巡酒能開丨丨丨愈曰子豈能奪造化而開花乎湘乃聚土以盆覆之俄而舉盆有碧牡丹二朵葉有小金字云雲橫秦嶺家何在雪擁藍關馬不前愈後謫潮州至藍關遇雪乃悟湘又言染花紅者可使碧獻於退之後堂之前染白牡丹一叢云來春為作金稜碧色明年花開果然太平廣記艷誰得似開元中禁中初重本芍藥即今之牡丹也植於興慶池東沉香亭前會花繁開明皇乘月夜召太真妃以步輦從之詔選梨園弟子中尤者有樂工李龜年以歌擅一時之名手捧檀板押衆樂將歌明皇曰賞名花對妃子焉用舊詞遽命李龜年持金花箋宣賜翰林李白進清平調詞三章白欣承詔旨猶苦宿酲未解援筆賦曰雲想衣裳花想容春風拂檻露花濃若非羣玉山頭見會向瑶臺月下逢一枝紅丨露凝香雲雨巫山枉斷腸借問漢宫丨丨丨可憐飛燕倚新粧名花傾國兩相歡長得君王帶笑看解識春風無限意沉香亭北倚闌干龜年遽以詞進上令梨園弟子調撫絲竹促龜年以歌聲震梁木太真妃持玻璃七寶盞酌涼州蒲萄酒笑領歌意飲罷重拜太平廣記詩誰為好明皇賞牡丹問侍臣曰牡丹丨丨丨丨奏云李正封詩曰國色朝酣酒天香夜染衣帝謂妃子曰粧臺前飲一紫金盞酒則正封之詩可見矣松窗録染白牡丹見前頃刻花注斸去牡丹唐元和中韓𢎞罷宣武節制始至長安私第有花命丨丨之曰吾豈效兒女輩耶當時為牡丹包羞之不暇藝苑雌黃牛酥煎食孟蜀時禮部尚書李昊每將牡丹花數枝分遺朋友以興平酥同贈且曰俟花凋謝即以丨丨丨丨之無棄禯艷其風流貴重如此復齋謾録牛酥煎落荀蘇詩口脂迎迹明皇時有獻牡丹者謂之楊家紅乃楊勉家花也蓋貴妃勻靣口脂在手印於花上詔於仙春館栽來嵗花開上有指印紅迹帝名為一捻紅青瑣高議野鹿銜去明皇時民間貢牡丹花靣一尺高數寸帝未及賞為丨丨丨丨有佞人奏云釋氏有鹿銜花以獻金仙帝私曰野鹿遊宫中得佳兆也殊不知應祿山之亂青瑣高議廄馬奔出富鄭公留守西京因夜園牡丹盛開召文潞公司馬端明楚建中劉几邵先生是時牡丹一欄凡數百木坐客曰此花有數乎且請先生筮之既畢曰凡若干朵使人數之如先生言又問曰此花幾時開盡請再筮之先生再探蓍良久曰此花盡來日午時坐客皆不答鄭公因曰來日食後可會於此以驗先生之言坐客曰諾次日食畢花尚無恙洎烹茶匆羣馬丨中逸出與坐客丨相踶囓丨丨花叢中既定花盡毁折矣於是洛中愈服先生之言評花寓諷邵康節訪商守趙郎中與章子厚同會議論縱橫不知敬康節語中因及洛中牡丹之盛趙謂章曰先生洛人也知花為甚詳康節因言洛人以見根撥而知花之高下者上也見枝葉而知花之高下者次也見蓓蕾而知高下者下也章默然童蒙訓取花以獻宋景文公祁帥蜀彭州守朱君綽始丨楊氏園丨十品丨丨公公在蜀四年每花時按其名往取彭州送花遂為故事云此十品花尤愛重錦被堆嘗以之為賦蜀志蜀花接頭范景仁入洛有獻黃花乞名者潞公名之曰女真黃又有獻淺紅乞名者鎮名之曰洗粧紅二花者洛人盛傳然此花樣差小間就洛陽求之乃得二種在其間甚善李才元寄示蜀中花啚洛花進御丨陽至東京六驛舊不進丨目今徐州李相迪留守時始丨丨嵗差衙校一員乘驛馬一日一夕至京師所進不過姚黃魏紫三四朵用菜葉實竹籠子藉覆之使馬上不動搖以蠟封花蒂乃數日不落歐陽洛陽風土記舒元輿牡丹賦蓋遁乎深山自幽而芳以為貴重所知花則何遇焉天后之鄊西河也精舍下有牡丹其花特異天后歎上苑之有闕因命移植焉由此京國牡丹日月寖盛今則自禁闥洎官署外延士庶之家瀰漫如四瀆之流不知其止息之地每莫春之月遨遊之士亦上國繁華之一事也近代文士為歌詩以詠其形容未有能賦之者余獨賦之以極其美或曰子常以丈夫功業自持今則肆情於一花無乃有兒女之心乎余應之曰吾子獨不見張荆州之為人乎斯人信丈夫也然吾觀其文集之首有荔枝賦焉荔枝信美矣然亦不出一果所與牡丹何異哉但問其所賦之旨何如吾賦牡丹何傷焉或者不能對余遂賦以示之圓玄瑞精有星而景有雲而卿其光下垂遇物流形草木得之發為紅英英之甚紅鍾乎牡丹枝類邁倫國香斯蘭我研物情次第而觀暮春氣極緑苞如珠清露宵偃韶光曉驅動蕩支節如解凝結百脈融暢氣不可遏兀然盛怒如將憤泄淑色披開照耀酷烈美膚膩體萬狀皆絶赤者如日白者如月淡者如赫殷者如血向者如迎背者如訣折者如語含者如咽俯者如愁仰者如悅裏者如舞側者如跌亞者如醉曲者如折密者如織踈者如缺鮮者如濯慘者如别初朧朧而下上次鱗鱗而重疊錦衾相覆繡帳連接晴籠晝薰宿霧宵裛或灼灼騰秀或亭亭露竒或點然如招或儼然如思或𢃄風如吟或泣露如悲或重然如縋或爛然如披或迎日擁砌或照水臨池或山雞已馴或威鳯將飛其態萬萬胡可立辨不窺天府孰得而見乍疑孫武來此教戰其戰謂何搖搖纎柯王欄風滿流霞成波歷階重臺萬朵千柯西子南威洛神湘娥或倚或扶朱顔色酡各昡紅缸爭顰翠蛾灼灼夭夭逶逶迤迤漢宫三千艷列星河我見其少孰云其多弄彩呈妍壓景駢肩席發銀燭爐升絳煙洞府真人會于羣仙晶熒往來金缸列錢凝睇相看曽不晤言未及行雨先驚旱芽公室侯家列之如麻咳唾萬金買此繁華遑恤終日一言相夸列幄庭中步障開霞曲廡重梁松篁交加如貯深閨似隔窗紗髣佛息媯依稀館娃我來觀之如乘仙槎脈脈如語遲遲日斜四衢遊人駿馬香車有酒如澠萬坐笙歌一醉是競孰知其他我按花品此華第一脫落羣類獨占春日其大盈尺其香滿室葉如翠羽擁抱比櫛蘂如金屑粧飾淑質玫瑰羞死芍藥自失夭桃斂迹穠李慙出躑躅宵潰木蘭潛逸朱槿灰心紫薇屈抑皆讓其先敢懷憤嫉煥乎美乎后土之産物也使其花之如木之偉乎何前則寂寞而不聞今則昌然而大來豈草命果有時而塞亦有時而開吾欲問汝曷為乎生哉汝且不言徒留玩以徘徊歐陽公牡丹譜闕丹出州延州東出青州南亦出越州而出洛陽者今為天下第一洛陽所謂丹州花延州紅青州紅者皆彼土之尤傑者獨立洛陽才得備衆花之一種列第不出三已下不能與敵而越之花以逺罕識不見齒然雖越人亦不敢自譽以與洛陽爭高下是洛陽者為天下之第一也洛陽亦有黃芍藥千葉白蓮千葉李紅郁李之類皆不減他出者而洛陽人不甚惜謂之果子花曰某花云云至牡丹則不名直曰花其謂天下真花獨牡丹其名之著不假曰牡丹而可知也其愛重之如此説者多言洛陽於三河間古善地昔周公以尺寸考日出沒測知寒暑風雨乖與順於此此蓋天地之中草木之華得中氣之和者多故獨與他方異豫甚以為不然夫洛陽於周所有之土四方入貢道理均乃九州之中在天地崑菕旁礴之間未必中也又况天地之和氣宜遍四方上下不宜限其中以自私夫中與和者有常之氣其推於物者亦宜為有常之形物之常者不甚美亦不甚惡及元氣之病也美惡隔并而不相和入故物有極美與極惡者皆得於氣之偏也花之鍾其美與夫癭木擁腫之鍾其惡醜好雖異而得一氣之偏病則均洛陽城圍數十里而諸縣之花莫及城中者出其境則不可植焉豈又偏氣之美者獨聚此數十里之地乎此又天地之大不可考也已凡物不常有而為害乎人者曰災不常有而徒可怪駭不為害者曰妖語曰天反時為災地反物為妖此亦草木之妖而萬物之一怪也然比夫癭木擁腫者切獨鍾其美而見幸於人焉余在洛陽四見春天聖九年三月始至洛其至也晚見其晚者明年會與友人梅聖俞遊嵩山少室緱代嶺石唐山紫雲洞既還不及見又明年有悼亡之戚不暇見又明年以留守推官嵗晚解去只見其蚤者是未嘗見其極盛時然目之所矚已不勝其麗焉余居府中時嘗謁錢思公於雙桂樓下見一小屏立坐後細書字滿其上思公指之曰欲作花品此是牡丹名凡九十餘種余時不暇讀之然余所經見而今人多稱者才三十許種不知思公何從而得之多也計其餘有名而不著未必佳也故今所録但取其特著者而次第之姚黃黃牛家魏紫緋潛溪細葉夀安左花鞓紅亦名青州紅獻來紅葉底紫朱砂紅鶴翎紅珠九蘂真添色紅延州紅倒暈檀心多葉紫粗葉夀紅鹿胎紫丹州紅甘草黃蓮花蕚一捻紅一百五玉版白右牡丹之名或以民或以氏或以州或以地或以色或旌其所異者而志之牡丹初不載文字唯以藥載本草然於花中不為高第大抵丹延已西及褒斜道中尤多與荆棘無異土人皆取以為薪自唐則天以後洛陽牡丹始盛然未聞有以名著者如沈宋元白之流皆善詠花草計有若今之異者彼必形於篇詠而寂無傳焉唯劉夢得有詠魚朝恩宅牡丹詩但云一藂千萬朵而已亦不云其美且麗也謝靈運言永嘉竹間水際多牡丹而今越花不及洛陽甚逺是洛花自古未有若今之盛也歐公洛陽風土記洛陽之俗大抵好花春時城中無貴賤插花雖負擔者亦然花開時士庶競為遨遊往往於古寺廢宅有池臺處為市井張幕帟笙歌之聲相聞最盛於月坡隄張家園棠棣坊長夀寺東街與郭令宅至花落乃罷洛陽至東京六驛舊不進花自今徐州李相迪留守時始進御嵗差衙校一員乘驛馬一日一夕至京師所進不過姚黃魏紫三四朵用菜葉實竹籠子藉覆之使馬上不動搖以蠟封花蒂乃數日不落大抵洛人家家有花而少大樹者蓋其不接則不佳春初時洛人於夀安山中斫小栽子賣城中謂之箟子人家治地多畦塍種之至秋乃接接花尤工者謂之門園子蓋本姓東門氏豪家無不邀之姚黃一接頭直五千秋時立契買之至春花乃歸其洛陽人甚惜此花不敢傳有權貴求其接頭者或以湯中醮殺與之魏花初出時接頭亦直五千今尚直一千接時須用社後重陽前過此不佳也花之本去地五七寸許截之乃接以泥封裹用軟土擁之以蒻葉作菴子罩之不令見風日惟南向留一小户以逹氣至春乃去其覆此接花之法也用瓦亦可種花必擇善地去舊土以細土用白斂末一斤和之蓋牡丹根甜多引蟲食白斂能殺蟲此種花之法也澆花亦自有時或用日西或用日未出秋時旬日乃澆十月十一月三二日一澆此澆花之法也一本發數朵者擇其小者去之止留一二朵謂之打剝懼分其脈也花才落便剪其枝勿令結子懼其易老也春初既去蒻菴便以棘數枝置花叢上棘氣暖可以避霜不損花芽此養花之法也開漸小於舊者蓋蠧蟲損之必尋其穴以硫黃簮之其旁又有小穴如針孔乃蟲所聚處花工謂之氣窗以大針點硫黃未針之蟲乃死花復盛此醫花之法也烏賊魚骨用以針花樹入其皮花必死此花之忌也歐公題洛陽牡丹圖洛陽地脈花最冝牡丹尤為天下竒我昔所記數十種于今十年皆忘之開圖又見故人靣其間數種昔未窺客言近嵗又特異往往變出呈新枝洛人驚誇立名字買種不復論家資論新較舊難優劣爭光擅價各一時當時絶品可數者魏紅窈窕姚黃肥夀安細葉開尚少朱砂玉版人未知傳聞千葉昔未有只從左紫名初馳四十年間花百變最後最好潛溪緋今花爭新我未識未信與舊誰妍媸當時所見已云絶豈有更妍此可疑古稱天下無正色但恐世好隨時移鞓紅鶴翎豈不美斂色如避新來姬何况逺説蘇與賀有類異世誇嬙施造化無情祗一槩偏此著意何其私又疑人心愈巧偽天欲鬪巧窮精微不然元化朴散久豈特近嵗尤澆漓爭新鬪麗若不已更後百年知何為但應新花日日好惟有我老年已衰詩集帶花移丨丨丨牡丹白樂天得花饒賃宅丨丨丨初開恐是妖粉光深紫膩肉色退紅嬌且願風流著惟愁日炙消可憐零落片留取作香燒王建愁花語今日花前飲甘心飲百杯但丨丨有丨不為世人開劉禹鍚十户賦帝城春欲暮喧喧車馬度共道牡丹時相隨買花去家家習為俗人人迷不悟有一田舍翁偶來買花處低頭獨長歎此歎無人諭一叢深色花丨丨中人丨白樂天十千錢近來無奈牡丹何數丨丨丨買一窠今朝始得分明見也共戎葵不校多栁渾三見開前年題名處今日看花來一作藝香吏丨丨牡丹丨豈獨花堪惜方知老更催何况尋花伴東都去未回誰知紅芳側春盡思悠哉白樂天一賞後傾國姿容别多開富貴家臨妍丨丨丨輕薄萬千花古詩蓬蒿力亂前看不見亂後眼偏明却得丨丨丨遮藏見太平鄭谷蘭麝囊牡丹芳牡丹芳黃金蕊紅土房千片赤英霞爛爛百枝綘艷燈煌煌照地初開錦繡假當風不結丨丨丨仙人琪樹白無色王母桃花紅不香宿霧輕盈泛紫艷朝陽照耀生紅光紅紫二色間深淺向背萬能隨低昂映葉多情隱羞靣卧叢無力含醉粧低嬌笑容疑掩口凝思怨人如斷腸穠姿貴彩信竒絶雜卉亂花無比芳李白琉璃地花向丨丨丨上生光風宛轉紫雲霙自從天女盤中見直至今朝眼更明元微之雨後看花時何處偏相憶寥落衰紅丨丨丨同上人月中看長安豪貴惜春殘爭賞新開紫牡丹别有玉盤承露冷無人肯向丨丨丨裴璘金錢買丨丨丨得牡丹栽何處辭叢别主來紅芳堪惜還堪恨百處移將百處開白居易歌鍾賞香勝燒蘭紅勝霞開時比屋事豪奢買栽池館恐無地看到子孫能幾家門倚長安聨繡軛幄籠輕日護香紗丨丨只解貪歡丨豈信流年鬢易華羅鄴幄幕芘貴賤無常價酬直看花數灼灼千朵紅戔戔五采素上張丨丨丨旁織芭籬護水灑復泥封移來色如故白繡被堆錦圍初卷衛夫人丨丨猶丨越郡君垂手亂翻雕玉珮細腰頻換欎金裙石家蠟燭何曾剪荀令香爐可待薰我是夢中傳彩筆欲書花片寄朝雲李商隱霧不勝葉薄風才倚枝輕丨丨丨同上人風頻壞簇葉丨丨丨裁紅雨更新元徽之國色酣丨丨朝丨酒天香夜染衣李正封蟾魂孕氷肌玉骨鍾瓊蕚雪魄丨丨丨秀根白氏集疑無價數孕欲傾城安同桃李榮未嘗貧處見不似地中生比物丨丨丨當春獨有名遊蜂與戲蝶來往自多情不語情幸自同開俱隱約何煩相倚鬪輕盈凌晨併作新粧靣對客偏含丨丨丨雙燕無情還拂掠遊蜂多思正經營長年是事皆拋盡今日欄邉暫眼明昌黎三春力牡丹極用丨丨丨開得方知不是花司空圖百花王既全國色與天香底用人家紫與黃却喜騷人稱第一至今喚作丨丨丨北山集亂人心牡丹妖艷丨丨丨一國如狂不惜金曷若東園桃與李果然無語自成隂炙轂子真國色庭前芍藥妖無格地上芙蓉爭臥情惟有牡丹丨丨丨花開時節動京城劉禹錫平章宅丨丨丨裏一欄花臨到開時不在家莫道兩京非逺别春明門外即天涯張籍富貴家傾國姿容别多聞丨丨丨紅衣淺緑艷間且靜丨丨丨復深花心愁欲斷春色豈知心王維紅珠瑩壓砌錦地鋪當霞日輪映蝶舞香暫飄蜂牽蘂難正籠處彩雲合露澀丨丨丨結葉影交加搖風光不定元徽之艷蘂仙房曲水亭西杏園比穠芳深院紅顔色擢秀全勝珠樹林結根幸在青蓮城丨丨丨丨次第開含煙洗露照蒼碧權德輿瓊液玉容露重不勝丨丨冷雨餘惟見丨丨低白集枝頭玉瑰宿露丨丨藏丨丨暖風庭靣倒銀杯歐陽永叔葉底錦囊丨丨風吹紫丨丨宫爐應近更添香梅聖俞瑞羽仙杯金衣丨丨迎風展琮粟丨丨壓露斜宋景文玉盤繡轂盡日丨丨堆秀色滿城丨丨走香風司馬溫公徑圓三尺自古成都勝開花不似今丨丨丨丨大顔色幾重深未放香噴雪仍藏蕊散金要知空相諭聊見主人心范景仁寫費千金牡丹開蜀國盈尺莫如今妍麗色殊衆栽培功倍深矜誇傳萬里圖丨丨丨丨難就朱欄賞徒搖逺客心范堯夫仙娥裁樣丨丨丨丨巧彩筆費功深白豈容施粉紅須漏間金韓持國西子讒魂楊妃歇舞態丨丨巧丨丨利劒斬不斷餘妖鍾此根光華日已盛欄檻豈長存寄語尋芳者須知松桂尊楊軒數種昔未窺洛陽地脈花最宜牡丹尤為天下竒我昔所記數十種于今十年皆忘之開圖若見故人靣其間丨丨丨丨丨客言近嵗花特異往往變出呈新枝洛人矜誇立名字買種不復論家資當時絶品可數者魏紅窈窕姚黃肥夀安細葉開尚少朱砂玉版人未知傳聞千葉昔未有只從左紫名初馳四十手間花百變最後最好潛溪緋今花雖新我未識未信與舊雖妍媸當時所見已云絶豈有更妍此可疑古稱天下無正色似恐世好隨時移鞋紅鶴翎豈不美飲色如避新來姬何况逺誣蘇與賀有類異世誇嬙施造化無情疑一概偏此著意何其私又疑人心愈巧偽天欲鬪巧窮精微不然元化朴散久豈特久嵗尤澆漓爭新鬪麗若不已更後百載知何為但應新花日愈好惟有我老年之衰歐陽公一叢何所似古祥寺中錦千堆前年買花真盛哉道人勸我清風來腰鼓百靣如春雷打徹涼州花自開沙河塘上戴花回醉倒不覺吳兒咍豈知如今雙鬢催城西古寺沒蒿萊有僧閉門手自栽千枝萬葉巧剪裁就中丨丨丨丨丨碼腦盤承金縷杯向我食菜方清齋對花不飲花應猜夜來雨雹如李梅紅殘緑暗吁可哀坡相公新移洛裔君不見沉香亭北轉東風謫仙作頌天無功君不見君王殿後春第一領袖羣芳捧堯日此花司春轉花鈞一風一雨萬物春十分整頃春光了收黃拾紫歸江表天香染就山龍裳餘芬却染山水鄉青原白露萬松竹被渠染作天上香人間何曾識姚魏丨丨丨丨丨中丨呼酒先招野客看不醉花前為誰醉楊誠齋題周益公天香堂東皇封作花王丨丨丨丨萬丨丨更賜珍華出尚方白玉杯將青玉緣碧羅領襯翠羅裳古來洛口元無種今去天心别得香塗改歐家記文看此花未出説姚黃誠齋詠白花青緣樂府天葩秀出百紫千紅占春多少共推絶世花王西都萬家俱好不為姚黃謾腸斷巫陽對沉香亭北新粧記清平調詞成進了一夢仙鄉丨丨丨丨無雙倚朝輝半如酣酒成狂無言自有檀心一點偷芳念往事情傷又新艷曽説滁陽縱歸來晚君王醒後别是風光朝無咎和李季良夜合花化工新巧雪弄輕隂榖雨乾半垂雲幕護殘寒丨丨著意呈丨丨剪刻朝霞飣露盤輝錦繡掩芝蘭開元天寶盛長安沉香亭子鈎欄畔偏得三郎帶笑看剪朝霞賀方回真香解語雲橫水繞芳塵陌一萬重花春拍拍籃橋仙路不﨑嶇醉舞狂歌容倦客丨丨丨丨人傾國知是紫雲誰敢覔滿蹊桃李不能言分付仙家君莫惜玉樓春范石湖一朵傾城翠蓋牙籖幾百株楊家姊妹夜遊初五花結隊香如霧丨丨丨丨醉未蘇間小立困相扶夜來風雨有情無愁紅慘緑今宵看却似吳宫教陳圖鷓鴣天稼軒詠主人以謗花賦解嘲古今合璧事類備要别集卷二十四
