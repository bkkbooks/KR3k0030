body:
  text: 古今合璧事類備要别集卷五十三宋謝維新撰衆木門榆格物總論榆曰枌生山中葉圓厚三月莢落如小錢剝取皮合漬之味辛苦所謂蕪夷者即此事類鵲巢丨上高城之危而丨於高城之巔城壞巢折凌風而起故君子之居世也得時則義行失時則鵲起莊子蟬鳴楚莊王將伐晉敢諫者死叔敖進諫曰臣園中有榆栁上有丨丨方奮翼悲鳴飲清露不知螳蜋之在其後也韓詩外傳取榆火四時變國火春秋丨丨栁之丨周禮禱榆社高祖丨豐枌丨丨在豐東北十五里漢郊祀志勸民種龔遂為渤海太守丨丨農桑丨榆一口一樹循吏傳夾道種襄國鄴路千里之中丨丨丨榆盛暑之下人便之石虎鄴中記有司蒔見槐門旱食榆皮成帝時丨傷麥民丨丨丨天文志課植榆籬鄭渾為魏郡太守丨百姓丨丨為丨魏志詩集改火春榆初丨丨古詩拋錢榆葉丨丨栁展眉白樂天不知數榆莢相催丨丨丨李賀也解飛楊花榆莢無才思丨丨漫天作雪丨韓愈穿短貫錢丨丨丨榆白樂天撒青錢隔牆榆葉丨丨丨同上蠧皮漓秋雨我行汴隄上厭見榆隂緑千株不盈畝斬伐同一束及居幽囚中亦復見此木丨丨丨丨丨病葉理牆曲誰言霜雪苦生意殊未足坐待秋風至飛英覆空屋東坡御史臺榆老枿千雲霓修柯遇雲日丨丨丨丨丨嗟爾擁腫材大匠何見遺張右史桐附梧桐梓格物總論桐樹大者數圍空中枝幹森竦葉大圓而尖梧桐樹葉大如掌所謂椅者是也梓爾雅梗鼠梓也其材皆中琴瑟此美木也事類中瑟嶧陽孤桐注嶧山之陽特生桐丨琴丨禹貢剪圭成王唐叔虞燕居援桐葉丨丨以告曰以此封汝虞喜以告周公周公請封虞王曰余與虞戲周公曰臣聞之天子無戲言於是遂封叔虞於晉吕氏春秋削為琴吳人見有燒桐以爨者雍聞火烈之聲因請丨而丨丨頗有美音故時人號為焦尾琴焉蔡雍傳刻作魚晉武帝時吳郡臨平岸出一石打之無聲以問張華華曰取蜀中桐材丨丨丨形扣之則鳴矣於是如其言音聞數里異苑園中枝歷城房家丨齊博陵君豹之山也其丨雜樹森竦或有人折其桐丨者君曰何為傷吾鳯條自是人不敢復折其枝雜爼空中歌吳平州門外忽生一株青桐上有歌謡之聲平惡而伐之平隨軍北虜三載忽丨丨似丨曰死樹今更青吳平尋當歸適聞殺此樹已復有光輝平尋歸異苑御溝流葉顧况嘗於丨丨丨水上得桐丨有詩云一入深宫裏年年不見春聊題一片葉寄與有情人况復題葉於流泛之後十餘日况又得一詩其詩若答况者搢紳挫説寺樓飄葉蜀侯繼圖倚大慈丨丨丨大桐丨上有詩曰拭翠斂娥眉為鬱心中事搦管下庭除書作相思字此字不書名此字不書紙書向秋葉上願逐秋風起天下有心人盡解相思死天下負心人不識相思意有心與負心不知落何地後數年繼圖卜任氏為婚焉本事詩召主酬直王義方初拜御史置宅酬直訖數日忽對賔朋指庭中青桐一雙曰此忘酬直召宅主付錢四千北窗瑣言附使以進德宗在奉天召李泌赴行在時李懷光叛嵗又旱蝗議者欲赦懷光帝博問羣臣泌破一桐葉丨丨丨丨曰陛下與懷光君臣之分不可復合如此葉由是不赦唐史梧榮桐丨丨木梧桐也襯梧也爾雅椅桐丨丨梓漆爰伐琴瑟梧梓實桐皮曰椅即今之桐也詩定之方中鳯凰鳴丨丨丨矣于彼高岡梧桐生矣于彼朝陽卷阿鵷雛棲丨丨非梧桐不丨莊子據梧而瞑平子之神勞平子之精倚樹而吟丨丨丨丨同上梓樹之丨丨榛栗椅桐梓漆爰伐琴瑟詩敬止維桑與梓必恭丨丨小辨二子往觀伯禽康叔見周公三見而三答商子曰南山之陽有木名喬北山之隂有木名梓丨丨盍丨丨焉二子往觀見喬木高而仰梓木實而俯反以告商子曰喬父道也梓子道也尚書太傅子胥必植丨丨將死告其舍人曰丨丨吾墓上以梓令可以為器史記斬以為箏丨泗濵之梓丨丨丨文選種之得用後漢樊宏父重嘗欲作器物先種梓漆詳見漆門詩集同散木方丨丨丨爨清響竟誰知梁王筠無附枝四面丨丨丨中心有通理李白生空井孤桐丨丨丨枝葉自相加通泉溉其根玄雨潤其柯魏文帝帶晨霞桐林丨丨丨謝靈運一剪圭秋還遽已落春曉猶未荑緑葉雖可賤丨丨或成丨梁沈約一般弦老桐休學為琴瑟胡部新翻格調清試聽琵琶採蓮曲丨丨丨上數般聲陶弼梧桐拂曙烏曉葉藏棲鳯朝花丨丨丨梁簡文帝棲霜鳯井梧丨丨丨古詩秋色早丨丨丨梧桐杜霜風侵丨丨丨梧桐衆葉著樹乾空階一片下錚若摧琅玕韓千葉委一株青玉立丨丨緑雲丨白樂天一葉飛梧桐落金井丨丨丨銀牀李白得琴瑟苕苕梧桐樹寄生於南嶽上凌青雲霄下臨千仭谷處身孤且危於何托余足昔也植朝陽傾枝俟鸞鷟今者絶世用倥偬見得束班匠不我顧牙曠不我録焉丨丨丨成何由揚妙曲司馬彪蔭軒楹山木多蓊鬱梧桐獨亭亭葉重碧雲片花簇紫霞英是時三月天春暖山雨晴無人解愛賞有客還屏營生憐不得所死欲揚其聲裁為天子琴薦之於穆清誠是君子心恐非草木情老龜被刳腸不如無神靈雄雞自斷尾不願為犧牲况此好顏色花紫葉青青宜遂天地性忍加斧斤刑我思五丁力拔入九重城當君正殿栽花葉生光晶上對月中桂下覆階前蓂泛拂香爐煙隱映斧藻屛為君布緑隂當暑蔭軒楹為君發清韻風來如扣瓊受君陽和德不待含芽榮戒君無戲言剪桐封弟兄受君嵗月功不獨資生成為君長高枝鳯凰上頭鳴一鳴君萬嵗夀如山不傾再鳴萬人泰泰階為之平如何有此用幽滯在巖扄待余有勢力移爾獻丹庭白居易棕櫚格物總論棕櫚一名栟櫚高一二丈無枝幹葉長而大岐生枝頭狀如車輪皮相重裹一行一皮各有節皮可為索也事類棕拂杜甫以朝廷以李林甫瑣瑣之材代張九齡為相作丨櫚丨詩以寓意杜詩注棕笋丨丨狀如魚子味如苦笋而加甘芳蜀人以饌佛僧甚貴之而南方不知也笋生膚毳中蓋花之方孕者正二月間可剝而取過此苦澀不可食矣取之無害於木而宜於飲食法當蒸熟所施客與竹笋同蜜煮醋浸可致千里外坡詩注梁江淹頌異木之生疑竹疑草攢叢石徑森嵸山道煙岫相珍雲壑共寶不錦不縟何遜工巧詩集鑿井交丨丨丨棕葉杜戰風涼栟櫚葉丨水丨丨白樂天集斧斤蜀門多棕櫚高者十八九其皮剝割甚雖衆亦易朽徒布如雲葉青青嵗寒後交橫丨丨丨凋落先蒲栁傷時苦軍乏一物官盡取念爾形影乾摧殘沒藜莠杜子美如車輪青青栟櫚樹散葉丨丨丨擁籜交紫髯嵗剝豈非仁用以覆雕輿何憚尅厥身梅聖俞夜義頭棕櫚葉散丨丨丨李羣王王璘聮句仙人掌砍破夜義頭取出丨丨丨鮫人滿腹珠鮰魚新出輞唐庚贈木魚丨君丨丨三百尾中有鵝黃子魚子夜義剖癭欲分甘籜龍藏頭敢言美願隨蔬果得自用勿使山林空老死問君何事食木魚烹不能鳴固其理玻送竹笋與殊長老披孔雀舊脫敗蓑亂新添華節高肅容春尚靜俠氣夜方豪黃孕子魚腹青丨丨丨尻豐撞如可製雷動景鐘號洪舜俞荆格物總論荆小木叢生枝莖婆娑葉刻缺粗澀荒坂洲渚間多有之彼又有所謂牡荆杜荆山荆等名不一而足然非博物君子不能遍識也事類班荆伍舉入鄭聲子將如晉遇之郊丨丨相與食而言復故左傳負荆亷頗肉袒丨丨史宫中生淮南王安謀逆伍被諫曰昔子胥諫吳王云臣今見麋鹿遊姑蘇之臺臣今亦將見丨丨丨荆棘露沾衣也漢書車中生徐隨居丹徒左慈過隨門下有宿客車六七乘欺慈云徐公不在慈客皆見在楊樹杪丨轂丨皆丨荆棘客懼入報隨隨曰此左公遣追之客逐慈叩頭謝客還見牛在地無復荆棘也門中生尹勤治韓詩事薛漢身牧豕事親至孝無有交遊丨丨丨荆棘東觀漢記指病自愈寧浦有三種金荆可以作枕紫荆可以作牀白荆可以作履與他處牡荆全異又彼境有杜荆丨丨丨丨節不相當者月暈時刻之與病身等置林下雖危困亦愈也郡志議斫分取田真田慶田廣兄弟欲分財惟堂前紫荆花葉盛茂夜丨丨丨丨為三曉欲伐即憔悴真歎曰樹本同株聞得分斫所以憔悴人何不如兄弟由是不復分焉吳筠齊諧記詩集歡同株三荆丨丨丨晉陸機辭故枝風吹紫荆樹色與春庭暮花落丨丨丨風回返元處杜甫庭中栽得丨丨丨丨紅荆樹十月花開不待春直到孩提盡驚怪一家同是北來人元微之古今合璧事類備要别集卷五十三
