body:
  text: 古今合璧事類備要别集卷六十一宋謝維新撰蔬門枸杞格物總論枸杞叢生枝莖髙三四尺許葉春生可作羮茹子秋熟正赤色葉㣲苦及子服之輕身益氣然最多名一名杞根一名地骨一名枸忌一名地輔一名枸欄一名仙人杖皆此物也事類形如二丈朱孺子幼事道士王元正居大若巖一日汲于溪見一花犬逐之入於枸杞叢下掘之根丨丨丨丨烹而食忽覺身輕飛于峯上續仙傳陸龜䝉杞菊賦見前菊門蘇子瞻後杞菊賦天隨生自言常食杞菊及夏五月枝葉老硬氣味苦澁猶食不已因作賦以自廣始余疑之以為士不遇窮約可也至于饑餓嚼嚙草木則過矣而余士宦十有九年家日益貧衣食之奉殆不如昔者及移守膠西意且一飽而齋厨索然不堪其憂日與通守劉君循古城廢圃求杞菊食之捫腹而笑然後知天隨之言可信不繆作後杞菊賦以自嘲且解云掾吁嗟先生誰使汝坐堂上稱太守前賓客之造請後屬之趍走朝衙達午夕坐過酉曾杯酒之不設攬草木以誰口對案顰蹙舉箸咽嘔昔隂将軍設麥飯與蔥葉井丹推去而不嗅怪先生之眷眷豈故山之無有先生欣然而笑曰人生一世如屈伸肘何者為貧何者為富何者為美何者為陋或糠覈而瓠肥或粱肉而黑瘦何侯方丈庾郎三韭較豐約於夢寐卒同歸於一朽吾方以杞為梁以菊為糗春食苗夏食葉秋食花實而冬食根尚庶幾乎河西南陽之夀張南軒續杞菊賦張子為江陵之數月時方仲春草木敷榮經行郡圃意有所欣爰命採掇付之庖人汲清泉以細烹屏五味而不親甘脆可口蔚其芬馨盖日為之加飯而他物不足以前陳客有問者曰異哉先生之嗜此也昔蘇子之在膠西值黨禁之方興歎濟厨之蕭條乃覽乎草木之英今先生當無事之時據方伯之位校吏奔走頤指如意廣厦延賓毬場享士清酒百壺鼎臑爼胾宰夫奏刀各獻其技顧何求而弗獲雖醉飽其何忌而乃樂從夫野叟之餐豈亦下取乎葑菲不然得無近于矯激有同於脫粟布被者乎張子應之曰天壤之間孰為正味厚或腊毒淡乃其至猩唇豹胎徒取詭異山鮮海錯紛糾莫計茍滋味之或偏在臓腑而成贅惟杞與菊㣲勁不苦滑甘靡滯非若他蔬善嘔走水既暸目而安神復沃煩而滌穢驕南陽于西河又頽齡之可制此其為功曷可殫紀況於膏粱之習貧賤則廢雋永之求不得其恚玆隨寓之必冇雖約居而足恃殆将與之終身又可貽夫同志子獨不見吾納湖之隂乎雪銷壌肥其茸葳蕤與子婆娑薄言掇之石銚瓦盆啜汁咀虀髙論唐虞詠歌書詩嗟乎㣲斯物熟同先生之歸於是相屬而歌殆目晏以忘饑詩集根成狗不知靈性丨丨丨怪得時聞夜犬聲李白根埋玉杞笋傍丨丨紫丨楊誠齋詳見甘菊新芽摘丨丨丨杞叢坡餘滋發江皋春氣足佳杞蕃新苗老枿飽霜露丨丨丨柯條神農不吾欺誇譽何忉忉堅筋及奔馬瑩目察秋毫張文潜千嵗根吠雲丨丨丨坡九節杖養成丨丨丨持獻西王母谷靈厖吠神藥不自閟羅生滿山澤目有牛羊憂嵗有野火厄越俗不好事過服等茨棘實荑春自長絳珠爛莫摘短籬䕶新垣索笋生臥節根莖與花實收拾無華物大将立吾鬚少則餉我客似聞朱明洞中有千嵗質丨丨或夜丨可見不可索仙人倘許我借杖扶衰疾坡瑞犬形僧房藥樹生寒井井有香泉樹有靈翠黛葉生籠石甃殷紅子熟照銅瓶枝繁本是仙人杖根茂新成丨丨丨上品功能甘露味還知一勺可延齡劉夢得雨餘芽甲丨丨丨丨翠光勻杞菊成蹊亦自春骨相定知非食肉可能長伴箇中人朱文公夜吠仙苗芥花松莟餞春忙丨丨丨丨喜晚甞味飽雨膏甘復脆氣含風露咽猶香作虀淡着㣲施酪芼酪臨時莫過湯却憶荆溪古城上翠條紅乳摘盈箱誠齋甘菊格物總論廿菊莖紫氣香而味甘可作羮春月採之為佳亦有花甚小重陽可採以泛酒事類供左右杯天隨生宅荒少牆屋多隙地著圖書於前後皆植以杞菊春苗恣肥得以採擷丨丨丨丨案及夏五月枝葉老硬氣味苦澁旦暮猶貴兒童輩掇拾不已陸龜蒙杞菊賦換六班茶白樂天方齋劉禹錫正病酒禹錫乃饋菊苗虀蘆菔鮓丨取樂天丨丨丨三囊以自醒酒蠻甌志詩集移來晩簷前甘菊丨丨丨細蘂重陽不堪摘杜蔚已滿越山春始寒霜菊晩逾好朝來出細蘂稍覺芳嵗老孤根䕃長松獨秀無衆草晨光雖照耀秋雨半摧倒先生卧不出黄葉紛可掃無人送酒壺空腸嚼珠寶香風入牙頰楚些發天藻新荑丨丨丨宿根寒不槁揚揚弄芳蝶生死何足道頗訝昌黎公恨爾生不早坡配緑葵金菊香宜丨丨丨杜寒緑萌菊芽復土糁青粟杞笋傍根埋紫玉雷聲一夜雨一朝森然迸出如蕨苗先生饑腸詩作梗小摘珍芽汲水井風爐蟹眼候松聲罩籬親捞㣲帶生爛炊雕胡浙青精芼以天隨丨丨丨饑時作虀仍作羮飽後龍鳳同庖烹大官蒸羊壓花片宰夫胹蹯削瓊軟豹胎熬出禍胎來貴人有眼何曾見天隨尚有愁作魔枸杞作棘菊作莎君不見黄金錢照紅王豆秋髙更覺風味多先生釀金煉紅玉自莎自棘如予何金空玉盡苗復出喫苗喫花并喫實天隨白眼屠活兒不道有人頭上立楊誠齋芋附藷格物總論芋數種叢生有君子芋大如斗魁又有青邊芋淡善芋大如瓶葉如盖緗色紫莖春二月畦而種之秋末冬初可掘取而食也蒸不及煨為妙藷之類亦多與芋同時採之事類食芋徐无鬼見魏武侯曰先生居山林丨丨栗厭蔥韭以賓寡人乆矣夫荘子羮芋汝南有鴻隙陂郡以為饒翟方進為相奏罷之王莽時亢旱郡中追怨乃作童謡曰壤陂誰翟子威飯我豆食丨丨魁言不生稻梁惟生豆芋本傳蹲鴟蜀卓氏曰吾聞岷山之下沃野有丨丨顔師古曰芋也前食貨志土芝芋丨丨本草左思蜀賦瓜疇芋區詩集味如牛乳香似龍涎仍釅白丨丨丨丨更全清莫将南海金虀膾輕比東坡玉糝羮坡作山芋羮炊粘玉糁分得蹲鴟種連招古地腴曉丨丨丨丨深椀啖模糊劉屏山煨奉朝食沃野无凶年正得蹲鴟力區種萬葉青深丨丨丨丨朱文公藷霜晚餐珠實隨竹縈廻翠蔓延土藷名翼出前編㑹須丨丨丨丨丨可挹浮丘作地仙笋附猫笋苦笋笋脯格物總論笋竹牙也數種各以時而生而其滋味亦各有不同者然皆以鮮而嫩者為佳日乾甚耐乆藏野人致滋味煮成䜴以備蔬食尤妙者也事類其䔩維何尹吉甫作韓奕詩以美宣王以錫命諸侯其三章云韓侯出祖顯父餞之清酒百壺丨丨丨丨維笋及蒲詩入林哀泣孟宗性至孝母卒冬節将至宗乃丨丨丨丨笋為之生得以供祭本傳泣而獲饋晉劉殷年九嵗為曾祖母冬思笋殷丨丨丨供丨本傳惜欲成林宋沈道䖍隠居武康人有拔屋後笋令人止之曰丨此笋丨丨丨更有佳者相與乃令人買大笋送與之盗者慙不取使置其門内而還本傳恐盜者見何隨人有盜其園笋隨見挈屐而歸丨丨丨丨也華陽國志與盜者過范元琰家有竹圃毎見人盜笋苦于過溝元琰伐木為橋丨丨丨丨盜感琰情而息意不盜本傳問是何物漢人冇適吳吳人設笋丨丨丨丨曰竹也歸煮其床簀而不熟乃謂其妻曰吳人轣轆欺我如此笑林問曰幾錢唐夏侯彪之上新繁令丨里胥丨笋一莖丨丨曰一錢五莖取十千買之萬莖謂之曰吾未要且寄林中養之至秋竹成一竿千文遂成五十萬貪猥不道皆此類本傳游篔簹谷東坡云文與可甞令予作篔簹谷詩予詩云漢川修木賤如蓬斤斧何曽赦籜龍料得清貧餞太食發川千畆在胷中與可是日與其妻㳺谷中燒笋晩函得詩失笑噴飯滿案篔簹谷記参玉版師東坡甞邀劉器之同丨丨丨丨器之毎倦山行聞丨丨丨丨欣然從之至㢘景寺燒笋而食器之覺笋味勝問何名也東坡曰名玉版也此老師善説法要能令君得禪悦之味於是器之乃悟其戲為之大笑冷齋夜話僧贊寧笋譜麻油薑皆殺笋毒凡食筍之要譬若治藥修煉得法則益人反是則損採笋之法可避露日出後掘深土取之半折取鞭根旋得投宻竹器中以油单覆之勿令見風風吹旋堅以巾帉拭土又不宜見水含殻沸湯瀹之煮宜乆生必損人苦笋最宜乆甘笋出湯後去殻澄煮笋汁為羮茹味全嘉美不然蒸最美味全爐灰中煨後入五味尤佳採笋一日曰蔫二日曰箊見風則觸本堅入水則侵肉硬脱殻煮則失味生着刀則失柔採而停乆非鮮也盛而苦風非藏也揀之脱殻非治也淨之入水非洗也蒸煮不乆非食也如此然後可與語食笋矣此外不足筭也詩集滿山谷此州乃竹鄉春笋丨丨丨山天折盈把抱來早市鬻物以多為賤雙錢易一束置之炊甑中與飯同時熟紫籜拆故錦素肌擘新玉每日遂加餐經時不思肉乆為京洛客此味常不足且食勿踟蹰南風吹作竹白樂天溢林藪竹林吾最惜新笋好看守方籜包龍兒攢迸丨丨丨吾眼恨不見心腸痛如搊宅錢都未還債利日日厚籜龍正稱寃莫殺入汝口丁寧囑託汝汝活籜龍否盧仝寄男抱孫苦見疎韭黄照春盤菰白媚春菜惟此蒼竹苗市上三時賣江南家家竹剪伐誰主宰半以丨丨丨不言甘易壞葛陂雕龍睡未索兒孫僓獺膽能分盃虎魄好拾芥此物於食殽如客得儐价思入帝鼎烹忍遭飢涎嘬懶材供翰墨砧􅴘風號噫毎下嘆枯株焚如落樵採山谷甘不壊飽食有殘肉飢有無餘菜紛然生喜怒似被相公賣邇來誰獨覺凜凜白下宰一飯在家僧至樂丨丨丨書生未蠧簡食笋乃餘債蕭然映樽爼未肯雜菘芥君看霜雪姿童稚已耿介胡為遭暴横三嗅不忍嘬朝來忽解籜勢迫風雷噫尚可餉三閭飯筒纒五采坡就根煨北饌厭羊酪南庖豐笋菜自北初落南幾為兒所賣習知價廉平百態事烹宰鹽稀楛腊瘐蜜漬真味壞丨丨丨茁美豈念炮烙債咀吞千畆餘胷次不蠆芥二妙各能詩才名動江介論詩多佳句膾炙甘我嘬恩君思養竹萬籟聽我噫從此繕藩籬下令禁漁采山谷入市賣人笑庾郎貧滿腹飯寒菜春盤食指動笋出丨丨丨回首萬錢厨不羡廊廟宰民生暫神竒胞攜伐性壞忍持芭蕉身多負牛羊債籜龍不稱寃易致等拾芥蕭蕭烟雨姿壯士持戈介駢頭沸鼎烹可口垂涎嘬霜叢負後凋玉食香餘噫續詩無全功對時儻可采山谷寄竹萌久客厭虜饌枵然恩南烹故人知我意千里丨丨丨駢頭玉嬰兒一一脱錦䙀庖人應未識旅人眼先明我家拙厨膳彘肉芼蕪菁送與江南客燒煮配香梗坡送與公擇食竹債洛下花竹笋花時壓鮭菜一束醻千金掉頭不肯賣我來白下聚此族當庖宰蠒栗戴地翻觳􅑌觸牆壞􅋾􅋾入中厨如償丨丨丨甘葅和菌耳辛膳胹薑芥烹鵞雜股掌炮鼈亂裙介小兒哇不美䑕壤有餘嘬可貴主於少古來食共噫尚想髙将軍五溪無人采谷猫笋猫笋新甜江西丨丨未出尖雪中土膏養丨丨先先別得煮簀法丁寧勿用醯與鹽巖下清泉須旋汲熬出霜汁生蜜汁寒芽嚼作冰片聲餘瀝仍和月光汲菘羔楮雞浪得名不如來参玉版僧醉裏何須酒解酲此羮一椀爽然醒大都煮菜皆如此淡處當知有真味先生此法未要傳為公作經藏名山誠齋笋經猫頭突兀長沙一月煨鞭笋鸚鵡洲前人未知走送煩公助湯餅丨丨丨丨想穿籬谷苦笋蒼玉束南園苦笋味勝肉籜龍稱寃莫採録煩君更致丨丨丨明日風雨吹成竹谷乞苦笋白玉嬰藜藿盤中忽眼明駢頭脱襁丨丨丨極知耿介種性别苦節乃與生俱生我兒魏證殊媚嫵約束兒童勿多取人才自古要養成放使干霄戰風雨陸放翁篁笋短萌登爼梅雨冥冥稻已齊連雲篁竹暗蠻溪丨齊丨解籜丨雕丨錯落黄金么裊蹏禾掌笋脯味勝肉使君喜食笋笋脯丨丨丨祕法不肯傳閉門課私僕君不見金谷饌客本萍虀豪世藉此真成癡但令長鬚日致饋不敢求君帳下兒張于湖謝南軒笋脯食當肉齊厨日蕭條晩丨以丨丨公來共蔬盤留語輙更僕平生懲沸仍吹虀欲了公事渠能癡何時竟作淮南歸擊鮮校獵從盧兒于湖再和登吾盤笋脯丨丨丨可使食無肉鮭腥避三舍棕􅀈乃從僕書生長有十甕虀却笑虎頭骨相癡得君新法也太竒且復從遊錦䙀兒于湖謝笋脯方古今合璧事類備要别集六十一
