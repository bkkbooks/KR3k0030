body:
  text: 古今合璧事類備要續集卷二十三宋謝維新撰類姓門井扶風徵音古今姓纂穆天子傳周有大夫井利又天子與井公博左傳虞大夫井伯漢有司徒掾井宗事類五經紛綸後漢井丹字大春通五經善談論京師語曰丨丨丨丨井大春性清髙未嘗修刺候人段京兆徵音古今姓纂鄭武公子共叔段之後以王父字為氏戰國韓相段規三輔決録云段氏李老之自出段干木之後干木之子隱如入關去干字事類優遊卿相前漢段會字子松天水上邽人谷永豫之書曰若子之材可丨丨都城而取丨丨何必勒功昆山之側涼州三明後漢段熲字紀明武威人與皇甫威明張然明並知名京師稱為丨丨丨丨抗節虜廷晉段匹磾鮮卑人不忘忠孝本自遐方而係心朝廷盡忠國難丨丨丨丨涼土文華段承根熲九世孫也機辨有文思崔浩竒之以為丨丨丨丨才堪注述請為著作郎北史歎真將軍唐段志玄齊州人文德皇后之葬與宇文士及勒兵衛章武門太宗夜遣使至二將軍所士及披户納使志玄拒曰軍門不夜開使者示手詔志玄曰夜不能辨不納比曙帝丨曰丨丨丨周亞夫何以加必為將相段文昌字墨卿世客荆州疏爽任義節不為齷齪小行後依劒南節度韋臯臯卒劉闢為髙崇文所擒崇文目文昌曰君丨丨丨丨雨不愁出段文昌文宗立徙帥荆南州或旱禱解必雨或久雨遇出遊必霽民為語曰旱不苦禱而雨丨丨丨公丨遊世多其謀段秀實字成公汴陽人以笏擊朱泚帝聞垂涕嘗言禁兵寡弱不足備非常及涇卒亂召神䇿六軍無一人至丨丨丨丨後鄭覃曰自古殺身利社稷未有如秀實者帝惻然為罷朝世推敢言段平仲字秉庸磊落有風節朝廷有得失未嘗不論奏丨丨其丨丨夢鳳而生皇朝段少連字希逸開封人其母丨丨集于家庭丨少連丨富齊郡羽音古今姓纂周大夫富辰之後又魯大夫富父終生之後亦單姓富鄭大夫有富子漢先賢傳有陳留太守富允文事類號吳體唐富嘉謨武功人本經術雅厚雄邁人爭慕之丨丨丨王佐才皇朝富弼字彥國河南人也幼篤學有大度范仲淹見而識之曰此丨丨丨也懷其文以示王曽晏殊殊即以女妻之舉茂才異等言災異非天數富弼拜左僕射同平章事有於上前言災異皆天數非人事得失所致者弼聞之歎曰人君所畏惟天若不畏天何事不可為者去亂亡無幾矣吾不可以不速救即上書數千言雜引春秋洪範及古今傳記人情物理以明其決不然者時稱北京三傑富嘉謨與吳少微魏谷並負文辭丨丨丨丨丨丨巫平陽商音古今姓纂風俗通氏於事巫乙匠陶也殷有巫咸巫賢漢有冀州刺史巫捷又有巫都著養性經也本朝巫伋紹興二十年作樞參事類作咸乂伊陟贊于巫咸作丨丨四篇尚書乂王家巫咸丨丨丨同上烏潁川角音古今姓纂齊有烏餘烏枝鳴莒有烏存秦有烏獲鄱陽姓苑云鄱陽有此姓河南代北人烏石蘭改姓烏事類轅門二龍唐烏承玼字德潤張掖人開元中與族兄承恩皆為平盧先鋒沈勇而決號丨丨丨丨掎角百戰烏重胤字保君承玼子擢河陽節度使帝討淮蔡詔與李光顔相丨丨大小丨餘丨凡三年賊平進邠國公焦中山角音古今姓纂風俗通姬姓國也按史記周武王封神農之後於焦其後以國為姓左傳曰虞虢焦滑皆姬姓也為晉所滅漢有外黃令焦貢事類真健人焦度字文績少有氣幹氣力弓馬並絶人宋武帝召充左右曰此丨丨丨也南史巴髙平徵音古今姓纂代本云巴子國子孫以國為氏亦見左傳後漢揚州刺史巴祗事類丹穴擅利前漢巴寡婦清其先得丨丨而丨其丨數世婦能守其業用財自衛人不敢犯始皇以為貞婦而客之為築女懷清臺弓太原羽音古今姓纂魯大夫叔弓之後以王父字為氏漢有光祿勳弓祉也太原弓祉之後後魏有博陵太守弓翊曽孫逸唐陳倉令生羲之逵之羲之德州刺史離石公生志和志𢎞志元彭祖志𢎞陳州刺史生嗣宗祠部員外郎嗣業洛州司馬志元右金吾將軍相州刺史陽曲公彭祖揚府長史蒲州刺史晉陽公生嗣初嗣説嗣初雍州司功事類闕牧𢎞農商音古今姓纂黃帝臣力牧之後漢有越雋太守牧良事類闕隗餘杭宫音古今姓纂春秋時翟國隗姓子孫因氏焉事類據隴右漢隗囂丨天水丨丨之地光武命馬援討之山河內商音古今姓纂周山師之官掌山林以官為氏風俗通烈山氏之後事類為竹林遊晉山濤字巨源少有器量介然不羣丨丨丨之丨山公啓事山濤纍遷吏部尚書再居選職十有餘年所奏甄拔人物各為題目時稱丨丨丨丨璞玉渾金王戎目濤如丨丨丨丨人皆欽其寶莫知名其器同上倒著接㒿山簡字季倫假節鎮襄陽每出戲遊多之習氏池上置酒輒醉名曰髙陽池童兒歌之有日夕倒載歸丨丨白丨丨之句近天子作好官山偉字仲才涉獵文史路逢一尼望之歎曰君方丨丨丨當丨丨丨北史谷上谷羽音古今姓纂漢衛司馬谷吉代居長安生永事類公車上第前漢谷永字子雲長安人舉方正直言極諫之士待詔丨丨對者數千人永為丨丨擢光祿大夫災攻上身善言丨異前後所上四十餘事専丨丨丨與後宫同上彎弓勇冠谷渾字元沖父袁丨丨三百斤丨丨一時仕慕容垂位廣武將軍北史為九經庫唐谷那律博識羣書禇遂良嘗稱為丨丨丨車京兆角音古今姓纂漢武帝時丞相田千秋以年老詔乘小車出入省中時號車丞相子孫因以為氏河南官志後魏獻帝命疏屬曰車焜氏改為車氏事類聚螢照書晉車胤字武子丨丨丨丨風姿美劭機悟敏速甚有鄉曲之譽以寒素博學知名于世善于賞會每有盛坐而胤不在皆云無車公不樂評獄寬恕車路頭代人每丨丨處理常獻丨丨之議以此見重於人北史侯上谷角音古今姓纂晉侯緡之後適他國以侯為氏鄭有侯宣多名羽魯有侯叔夏侯犯齊有侯朝魏有侯嬴事類乞留期年後漢侯霸字君房河內人為淮平大尹更始徵之百姓老弱相携號哭遮使者車或當道而卧皆曰願丨侯君復丨丨丨稱為侯君侯瑾字子瑜常以禮自牧獨處一房如對嚴賔作矯世論以譏切當時西河人敬其才而不敢名之皆丨丨丨丨司直清忠晉侯史光字孝明東萊人為御史中丞所以伸其丨丨之才厲志守約有丨丨之節儒學博古歷官著績文筆奏議皆有條理髙昌刻功唐侯君集豳州三水人以材雄稱少事秦王幕府從征討有功初文泰與西突厥欲谷設約有急相援及是欲谷設益懼西走智盛失援乃降丨丨平君集丨石紀丨還宓平昌角音古今姓纂宓犧之後仲尼弟子宓不齊字子賤魯人今轉為密氏事類與前伏姓類通逢長樂宫音古今姓纂夏殷諸侯有逢公伯志封齊王其後子孫氏焉事類于鞍為右齊師陳丨丨邴夏御齊侯逢丑父丨丨左傳冠挂東門後漢逢萌字子慶為亭長既而擲楯歎曰大丈夫安能為人役哉去之長安復解丨丨丨都城丨光武連徵不起全上洛徵音古今姓纂吳郡錢塘後漢丹陽都尉全柔吳尚書全尚女為吳主孫亮后琮孫暉魏封南陽侯食封白水遂改為泉氏後魏洛州刺史上洛侯泉企也事類易得精微全綬字𢎞立錢塘人幼受丨學丨其丨丨兼通老莊時言玄者皆推之南史頗間草𨽻泉元禮少有志氣丨丨丨丨有士君子之風為洛州刺史北史清白見稱泉仲遵為梁州刺史有方雅之操歷官之處皆以丨丨丨丨同上郗山陽宫音古今姓纂闕事類博覽吟詠晉郗鑒字道徽髙平金鄉人漢御史大夫慮之玄孫也丨丨經籍躬耕隴畝丨丨不倦以儒雅著名儒雅名位王敦專制拜安西將軍鎮合肥敦忌之表徵還與敦相見鑒曰丈夫既潔身北面豈可偷生屈節靦顔天壤耶敦素懷無君之心聞鑒言大忿之拘不遣敦之黨與譛毀日至鑒舉止自若初無懼心敦謂錢鳳曰郗道徽丨丨之士丨丨既重何得害之乃放還臺遂與帝謀滅敦同上施與親故郗超字景興少卓犖父愔好聚斂積錢數千萬嘗開庫任超所取超性好施一日中散與親故都盡其任心獨詣皆此類也髯參喜怒桓溫辟為征西大將軍掾溫英氣髙邁罕有所推與超言嘗謂不能測遂傾意禮待超亦深自結納時王恂為溫主簿亦為溫所重府中語曰丨丨軍短主簿能令公丨能令公丨超髯恂短故也入幕之賔謝安與王坦之嘗詣溫論事溫令超帳中卧聽之風動帳開安笑曰郗生可謂丨丨丨丨矣伊川田父唐郗士美字和夫兖州人自拾遺七遷至中書舍人處事不回為元載所忌遂遷東都號丨丨丨丨德宗召為學士不拜世髙其節班扶風徵音古今姓纂芊姓楚若敖孫令尹子文為獸所乳謂獸有班文因氏焉事類才髙述作漢班彪字叔皮丨丨而好丨丨専心史籍辟為司徒掾通儒上才行不踰方言不失正仕不急進貞不違人敷文華以緯國典比良遷董班固字孟堅九流百家之言無不窮究除為郎典校祕書二班懷文裁成帝墳丨丨丨丨兼麗卿雲固自以二世才術位不過郎作賔戲以自通弟超燕頷虎頸班超字仲升有大志不修細節傭書養母相者指曰生丨丨丨丨飛而食肉萬里侯相也其後出征安集西域五十餘國悉皆納質內屬不入虎穴不得虎子封定逺侯大家女誡曹世叔妻班彪之女名昭字惠博學髙才踵成漢書表志號曰丨丨作丨丨七章清潔勤力唐班宏衛人竇參當國德宗以宏熟天下計故進宏尚書副參丨丨丨丨晨入宫署夕而出吏不堪其勞而已益恭此行登仙班景倩入為大理少卿過大梁刺史倪若水餞之行立望其行塵久之乃返謂官屬曰班生丨丨何異丨丨卬汝南宫音古今姓纂漢公卿表御史大夫卬抵事類闕秋天水角音古今姓纂闕事類闕仲中山宫音古今姓纂髙辛氏才子八元仲堪仲熊之後以王父字為氏一云魯桓公子慶父子孫號仲孫亦為仲氏又仲虺為湯左相子孫氏焉仲尼弟子有仲由字子路事類闕伊陳留宫音古今姓纂帝堯伊耆氏之胤裔孫伊尹名摰相湯生陟又風俗通漢有議郎伊推又伊嘉為雁門都尉石顯黨山陽蜀志伊籍山陽人也今右僕射安黃節度伊慎廣州人河南官氏志伊婁改為伊後魏有伊馛代人事類格于皇天伊尹作咸有一德惟尹躬暨湯咸有一德克享天心受天明命又君奭在昔成湯時則有若伊尹丨丨丨丨書贊于巫咸伊陟相太戊亳有祥桑榖共生于朝伊陟丨丨丨丨作咸乂四篇同上伊陟伊尹子雍容風議伊籍字機伯遷昭文將軍丨丨丨丨見禮於世蜀志清約自守伊馛代人少勇健善射走及飛馬曳牛却行擢為侍郎大武曰馛智力如此終至公相後拜司空丨丨丨丨為政舉大綱不為苛細北史宫太原羽音古今姓纂虞大夫宫之竒之後唐殿中侍御史宫志惲居河東今河南有宫氏大歷兼侍御史宫頊或云恆州人事類忠臣之謀晉荀息請假道於虞以伐虢公曰宫之竒存焉左傳又劉向新序曰晉獻公假道於虞以伐虢宫之竒諫曰唇亡則齒寒今日亡虢明日亡虞可謂丨丨丨丨也三復白圭孔子曰獨居思仁公言仁義一日丨丨丨丨之玷是宮滔之行也家語寧齊郡徵音古今姓纂衛康叔之後至武公生季亹食采於寧弟須叔生跪孫速生武子俞生殖生喜九代卿族齊有寧戚周有寧越事類宴賦湛露衛寧武子來聘公與之丨為丨丨丨及彤弓左有道則智寧武子邦丨丨丨丨邦無道則愚其智可及也其愚不可及也語擊牛角歌齊桓公郊迎客夜開門執火甚盛寧戚飯牛於車下丨丨丨疾商丨公聞之命後車載之賜之衣冠遂舉而用之授之以卿新序狼羊乳虎前酷吏寧成南陽穰人為人上操下急如束濕為濟南都尉其治如丨牧丨寧見丨丨無直寧成之怒仇南陽宫音古今姓纂左傳宋大夫仇牧之後事類庭化鴟梟漢仇覽字季智一名香為蒲亭長勸人生業農事畢乃令子弟還就黌學期年稱大化有陳元者母告其不孝覽驚云云乃到元家與其母子飲為陳人倫孝行譬以禍福元卒成孝子鄉邑諺曰父母何在在我丨丨我丨丨哺所生棘非鳳棲考城令王渙署仇覽為主簿謂曰主簿聞陳元之過不罪而化之得無少鷹鸇之志耶覽曰鷹鸇不若鸞鳳渙謝遣之曰枳棘非鸞鳳所棲百里豈大賢之路欒西河徵音古今姓纂唐叔虞之後晉靖侯孫賔食采欒邑因氏焉事類政令是成宣伯使告卻犫曰魯之有季孟猶晉之有欒范也丨丨於丨乎丨左傳使訓子弟晉悼公即位使欒黶為公族大夫丨丨卿之丨丨共儉孝弟同上社曰欒公欒布梁人孝文時為燕相至將軍嘗有德者厚報之以軍功封俞侯燕齊之間皆為之丨號丨丨丨社史記定禮立學漢欒巴字叔元魏郡人為桂陽太守以郡處南垂不間典訓為丨昏姻喪紀之丨丨校丨以奬進之暴魏郡商音古今姓纂暴公周卿士見毛詩風俗通云暴辛周諸侯也事類公子威名漢暴勝之字公子河東人武帝時盜賊起勝之為直指使者衣繡衣持斧逐捕盜賊威振州郡雋不疑曰竊伏海瀕聞暴丨丨丨丨舊矣雋不疑傳郎子好相暴顯字思祖幼時見一沙門指之曰此丨丨丨丨表大必為良將極貴人臣語終失之北史古今合璧事類備要續集卷二十三
