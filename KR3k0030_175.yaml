body:
  text: 古今合璧事類備要續集卷二十五宋謝維新撰類姓門池西河徵音古今姓纂以居為姓漢有中牟令池瑗魏有城門侯池仲魚義安令義安有池氏事類闕喬梁國角音古今姓纂本橋氏黃帝之後黃帝葬橋山子孫守冡因為橋氏事類舉孝廉漢橋玄字公祖梁國尉人丨丨丨補洛陽左號神君晉喬智明字元逹以德行著稱為隆慮共二縣令丨為丨丨隂始興宫音古今姓纂周文王第三子管叔鮮之後管夷吾七代孫修適楚為隂大夫因氏焉風俗通又云隂康氏之後周有隂不佞隂里人也南陽新野漢末居焉隂子公生子方有禮竈之祥者也方生幼公生睦女為光武皇后生明帝睦子識金吾孫綱女為和帝皇后事類祀竈巨富漢宣帝時隂子方者臘日晨炊而竈神形見家有黃羊因以祀之自是暴至巨富有田七百餘頃金吾輔導後漢隂識字次伯光烈皇后之母兄其先出管仲七世孫修自齊適楚為隂大夫因而氏焉光武時遷侍中後守執丨丨丨丨東宫常留鎮守京師帝敬重之常指識以敕戒貴戚激厲左右傳龜襲紫隂興識之弟字君陵顯宗詔曰興輔導朕躬有周昌之直在家仁孝有曽閔之行以其子慶為鮦陽侯恂恂苗胤丨丨丨丨以廉潔稱隂子春字幼文仕梁遷梁秦二州刺史雖無他才行臨人丨丨丨丨南史善五言詩隂鏗字子堅博涉史傳尤丨丨丨丨為當時所重為法曹參軍同上戎狄所憚隂世師少有節槩隋時拜張掖太守深為丨丨丨丨尉音鬱太原宫音與鬱姓通古今姓纂鄭有尉止尉翩古賢有尉繚著書號尉繚子河南官氏志北方尉遲部如中華諸侯也尉孝文改為尉事類時比寒蟬尉瑾仕齊除吏部尚書見人好笑丨論丨之丨丨北史清平惠績尉撥代人為太學生應募擊賊於陳汝有功文成以其丨丨有丨丨賜以衣服同上元亨利貞尉元字茍仁世為豪宗纍遷尚書令進位司徒詣闕請老詔曰前司徒尉元丨丨丨丨明允誠素位顯台宿歸老私第可謂知始知卒希世之賢也復拜為三老胥琅琊羽音古今姓纂春秋時晉有胥甲父胥闕晉有胥臣事類佐軍上德僖公二十八年晉郤縠卒原軫將中軍胥臣丨下丨丨丨也左傳必名天下皇朝胥偃字安道潭州長沙人少好學栁開見其所為文而器之曰子異日丨有丨於丨丨能太原商音古今姓纂闕事類闕蒼武陵商音與倉姓通古今姓纂風俗通云八凱蒼舒之後又黃帝史官倉頡之後春秋時周有倉葛事類民稱德惠魏倉慈字孝仁為長安令清約有方吏民畏而愛之遷燉煌太守抑挫權右撫恤孤羸丨夷翕然丨其丨丨恤理有方為魏代之名守詔標門閭倉跋居母憂毀瘠見稱州里丨丨丨丨北史雙天水宫音古今姓纂顓頊之後封於雙蒙城因以命氏天水狀云後魏有涼州刺史疊水公雙士洛因家天水生彌周河州刺史平涼公生㻛生士恪右武衛大將軍定相二州總管杭州刺史吕國公生萬琚萬壽東郡白馬縣唐瀛吕二州刺史雙子符事類闕聞吳興宫音古今姓纂闕事類闕莘天水徵音古今姓纂夏后啓支子封莘因氏焉音轉為辛事類闕黨馮翊商音與黨通古今姓纂左傳晉大夫黨氏之後又唐有黨項本朝有黨進又本出西羌姚秦有將軍黨耐虎自云夏后氏之後代為羌豪事類闕翟南陽徵音古今姓纂黃帝之後代居翟地國語云翟國為晉所滅齊有翟僂後漢有翟黃漢文帝時廷尉翟公下邽人事類君仁臣直魏文侯與士大夫坐問曰寡人何如君也皆曰君仁君也翟黃曰君非仁君也文侯怒問任痤對曰君仁君也曰子何以言之對曰臣聞之其丨丨者其丨丨向翟黃之言直是以知也文侯曰善復召翟黃為上卿新序儒雅法律漢翟方進字子威汝南上蔡人徙京兆尹搏擊豪強京師畏之知能有餘兼通文法吏事以丨丨緣飾丨丨號為通明交情交態翟公為廷尉賔客闐門既罷門外可設雀羅後復為廷尉賔客欲往公為大書其門曰一死一生乃知丨丨一貧一富乃知丨丨一貴一賤交情乃見同上修學立碑後翟黼字子超廣漢人請丨繕太丨學者為丨丨銘饋遺無受晉翟湯字道深篤行純素不屑世事人有丨丨雖釜庾一丨所丨寇聞其名德皆不敢犯鄉鄰賴之鵲巢孝感翟普林事親以孝聞躬耕色養鄉閭謂為楚丘先生父母喪廬墓負土成墳有一丨丨其廬前柏樹入廬馴狎司𨽻奏其丨丨擢孝陽令北史設𢎞農徵音古今姓纂闕事類闕貢古今姓纂仲尼弟子端木賜字子貢之後以王父字為氏事類明經潔行漢貢禹字少翁琅邪人以丨丨丨丨著聞徵為博士舉賢良為河南令以職事為府官所責免冠謝禹曰冠一免安可復冠乎遂去官廉直不阿貢禹後徵為諌大夫遷光祿大夫上書乞骸骨報曰朕以生有伯夷之丨史魚之丨守經據古丨丨當世今未得久聞生之竒論也其強飯慎疾以自輔勞武陽徵音古今姓纂其先居東海勞山因氏焉渤海晉有三公郎勞霸後蜀有尚書左丞勞彥逺琅琊後漢監師勞丙事類闕逢扶風切譙國宫音逄姓見前古今姓纂闕事類闕姬南陽徵音古今姓纂帝嚳生姬棄因以為氏裔孫周文王三十餘代至赧王子孫號姬氏漢有周子南君姬嘉唐水部郎中處遜代居長安開元初以玄宗嫌名改姓周氏事類闕申魏郡商音古今姓纂薑姓炎帝四嶽之後封於申號申伯周宣王元舅也晉有申書魯有申豐鄭有申侯楚有申叔時申公巫臣申包胥申亥韓有申不害著書事類建國褒賞天下復平能丨丨親諸侯丨丨申伯焉維嶽降神生甫及申詩嵩髙文武憲德丕顯申伯丨丨是丨申伯之丨柔惠且直同上功成逃賞申包胥楚大夫吳敗楚兵包胥不受命而赴秦乞師秦救楚大敗吳師昭王復國而賞包胥包胥曰丨丨受賞是賣勇也遂丨丨左傳學本黃老申不害荆人也韓昭侯用為相終申子之身國治兵強無侵韓者丨丨丨丨而主刑名著書二篇號曰申子史記以詩經訓漢申公魯人也弟子自逺方至受業者百餘人申公獨丨丨丨為丨武帝使使束帛加璧安車駟馬迎申公至見天子問治亂之事時已八十餘對曰為治者不在多言顧力行何如耳畫楊震像申徽字世儀為襄州刺史性廉慎乃丨丨丨丨於寢室以自戒北史扶京兆羽音古今姓纂漢有廷尉扶嘉河南官氏志乞扶氏改為扶氏事類號白獸蠻扶猛字宗略其種落丨丨丨丨從賀若敦南討梯山捫葛備歷艱阻遂入白帝城撫慰人夷莫不悅附北史堵河東羽音古今姓纂左傳鄭有堵叔事類三良為政鄭有叔詹堵叔師叔丨丨丨丨未可間也左傳冉武陽宫音古今姓纂髙辛氏之胤一云大夫叔山冉之後雲安冉氏槃瓠之後冉耽之種類也代為巴東蠻夷酋帥事類德行丨丨冉伯牛仲弓注冉雍字仲弓冉耕字伯牛論語聚斂冉求字子有為季氏宰季氏富於周公求也為之丨丨而附益之同上宰西河徵音古今姓纂周大夫宰孔宰周公之後以官為姓仲尼弟子宰豫字子我魯人也漢有司空掾宰直事類言語丨丨宰我子貢語文雅宰我有丨丨之辭家語宰豫利口辨辭為臨災大夫史記酈新彘徵音古今姓纂黃帝之後支孫食采於酈因氏焉事類紿祿賣交漢酈寄字况與吕祿善大臣欲誅諸吕吕祿為將軍軍北軍太尉勃不得入乃使人劫商令其子况丨丨祿信之故與出遊勃乃入據北軍遂誅諸吕商卒諡曰景侯子寄代侯天下稱况丨丨也下七十城酈生食其陳留髙陽人好讀書家貧落魄無以為衣食業為里監門吏説齊王罷歷下軍韓信聞生伏軾丨齊丨丨餘丨度兵襲齊齊王以酈生賣已遂烹之髙陽酒徒酈生謁髙祖自稱髙陽賤民又曰丨丨丨丨同上崇勸學校酈道元字善長為冀州長史後守魯陽郡表立黌序丨丨丨丨山蠻服其威名不敢為冦北史雍古今姓纂風俗通云周文王第十二子也雍伯之後以國為姓今或音雍州之雍鄭大夫有雍糾楚有雍豫齊有雍廩宋有雍鉏漢什邡侯雍齒沛人也事類封雍齒漢髙帝六年正月封大功臣三十餘人其餘爭功上見諸將往往耦語以問張良良曰陛下與此屬共取天下所封皆故人所誅皆仇怨相聚謀反耳上曰為之奈何良曰取上素所不快羣臣共知者先封一人示羣臣上置酒丨丨丨酒罷群臣皆喜曰雍齒且侯吾屬亡患矣郤濟隂商音古今姓纂晉大夫郤文生豹豹生芮芮生缺缺生克克生錡代為晉卿又郤犨郤至並其族也漢有侍中郤琠事類禮樂詩書晉搜于被廬作三軍謀元帥趙衰曰閲丨丨而篤丨丨郤縠可乃使郤縠將中軍郤溱佐之左傳桂枝崑玉晉郤詵字廣基博學多才瑰偉倜儻不拘細行舉賢良對䇿第一猶丨林之一丨丨山之片丨為左丞纍遷雍州刺史璩黎陽羽音古今姓纂闕事類闕桑黎陽商音古今姓纂秦大夫子桑之後以王父字為氏漢有桑𢎞羊為武帝理財事類待詔翰林唐桑道茂者寒人失其系望善太乙遁甲術丨丨丨丨屢上言皆驗著扶桑賦五代桑維翰字國僑河南人為人醜怪身短而面長常臨鑑以自竒曰七尺之身不如一尺之面慨然有志於公輔初舉進士主司惡其姓與喪同音人有勸其不必舉進士可以從它求仕者維翰慨然乃丨日出丨丨丨以見志又鑄鐵硯以示人曰硯弊則改而他仕卒以進士及第桂天水宫音古今姓纂風俗通漢有揚州刺史桂褒唐永寧令桂仲武吳人又漢有衛尉昋橫上計掾昋景曇一作雲昋橫有四子一子守墳墓改姓靈一子居徐州即曇之先也姓昋一子居幽州姓桂一子居華隂姓眭以避難也事類闕濮魯國角音古今姓纂左傳晉大夫食采於濮因氏焉又楚與百濮戰于茍澨事類闕牛隴西宫音古今姓纂宋微子之後司竊牛父子孫以王父字為氏戰國時趙有牛剪秦有牛缺事類作歌議樂牛𢎞字里仁安定鶉觚人好學博聞仕周歷內史上士専掌文翰修起居注仕隋授祕書監表請開獻書之路拜禮部尚書上明堂議除太常卿丨樂府丨并丨丨事北史太平無象唐牛僧孺字思黯隋僕射竒章公𢎞之裔中尉王守澄引纎人竊議朝政它日延英見宰相曰公等有意於太平乎何道以致之僧孺曰臣待罪宰相不能康濟然丨丨亦丨丨今四夷不內擾百姓安生業私室無強家上不壅蔽下不怨讟雖未及至盛亦足為治矣而更求太平非臣所及退謂它宰相曰上責成如是吾可久處此耶固請罷乃檢校尚書左僕射平章事為淮南節度副大使賜彛樽勺牛僧孺治第洛之歸仁里多致嘉石美木與賔客相娛樂為山南東道節度使丨丨丨龍丨詔曰精金古器以比况君子卿宜少留僧孺固請乃行補闕數言牛叢字表齡第進士繇藩帥幕府任丨丨丨丨事會宰相請廣諌員宣宗曰諌臣惟能舉職為可奚用衆耶今張符趙璘牛叢使朕聞所未聞三人足矣木強忠謹皇朝牛存節字贊止青州博昌人為人丨丨丨丨太祖愛之後以戰功拜亳宿二州刺史為將法令嚴毅而善得士心壽京兆商音古今姓纂風俗通吳王壽夢之後吳大夫壽於姚漢牧兖州牧壽良事類闕通西河商音古今姓纂巴大夫食采通川因氏焉事類闕古今合璧事類備要續集卷二十五
