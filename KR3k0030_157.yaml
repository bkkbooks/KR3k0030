body:
  text: 古今合璧事類備要續集卷七宋謝維新撰類姓門趙宗趙趙姓有二在本朝謂之宗趙同姓者謂之外趙附見後皇朝源流趙之先與秦共祖皆顓帝之裔孫曰女修女修織元鳥隕卵修吞之生大業大業娶少典之子曰女華女華生大費與禹平水土帝錫元圭禹受之曰非豫能成亦大費為輔舜曰咨爾費贊禹功其錫皂游爾後嗣將大乃妻以姚姓之玉女大費拜受佐舜調馴鳥獸是為柏翳舜賜姓嬴氏柏翳生大亷大亷元孫曰中行仕商為太戊御其後生季勝季勝三世生造父造父為穆王攻徐偃王大破之以功封趙城子孫因氏焉造父下六世生奄父奄父為周宣王御脫於千畝之戰奄父生叔帶叔帶以幽王無道去周仕晉文侯以為御士其後七世生衰衰仕公子重耳驪姬之亂從奔狄狄人伐咎如得二女以長女妻重耳少女妻衰而生盾衰在晉時又生同括嬰齊及反國遂霸諸侯以衰為原大夫任以國政衰卒諡為成季子盾為嗣卒諡為宣孟子朔嗣屠岸賈之難韓厥暨公孫杵臼程嬰志存趙氏得朔之遺腹子匿之後宫後程嬰與俱匿山中居十五年晉景公疾卜之曰大業之後不遂者為祟以問韓厥韓厥知趙孤在乃曰大業之後在晉絶祀者其趙氏乎夫中衍佐大戊及周天子皆有明德叔帶事先君文侯至於成公世有大功未嘗絶祀今君獨滅趙宗國人哀之故見龜䇿惟君圖之景公問趙尚有後乎厥以實對乃謀立趙氏得趙孤曰武是為文子文子之孫曰鞅是為簡子簡子之子曰恤是為襄子襄子卒子獻侯立獻侯卒子烈侯嗣始與韓魏分晉列為諸侯開國于邯鄲戰國時為强盛與齊秦燕楚皆稱王由武靈王傳五世而秦併六國子孫分散至漢京兆尹廣漢世居涿郡逮後唐而至僖祖文獻皇帝生焉我僖祖生長於燕歷永清文安幽都三縣而生我順祖惠元皇帝纍官兼御史中丞生我翼祖簡恭皇帝歷營薊涿三郡刺史生我宣祖昭武皇帝我僖祖長於燕戎馬之地土俗尚武惟我僖祖以儒學為業故當時有鴻鵠之譽聞於河朔間順祖少以才學知名繼而為藩府從事纍官至兼御史中丞翼祖少慷慨有四方之志時劉仁恭父子繼為燕帥而翼祖屈身以事之蓋不欲去父母之邦也周顯德中我宣祖貴朝廷以恩例追贈翼祖至左驍衛上將軍宣祖少驍勇善騎射為鄉里所推而雅好儒素起家事趙王王鎔時後唐莊宗初開府於太原與梁氏南靣而爭天下於河上日尋干戈戰無虛日常命我宣祖求援於鎔鎔因命宣祖以五百騎赴之澶淵對壘屢有戰功及平定河南唐莊宗愛其勇敢因留之命掌禁軍號飛捷指揮使自同光至晉開運踰二十年軍職不改當時同列者多領藩鎮而宣祖處之恬然未嘗介意漢乾祐中王景崇據鳯翔叛朝廷命趙元暉樂元福領軍進討時宣祖預其行㑹蜀冦來擾邉宣祖率所部禦之於寶雞擁兵大戰殺獲萬計是役也我宣祖身先士卒矢中左目勇氣彌厲以功遷護聖都指揮使周有天下纍功轉左廂都指揮使世宗征河東為地道穴其城命我宣祖監總其事世宗征淮甸以宣祖為前軍副都指揮使領所部兵先入淮陽安民禁暴吳人恱之時諸將皆爭子女玉帛而宣祖但使人購書籍得三千餘卷先是我太宗年甫志學耽玩經史宣祖嘗謂曰惟文與武立身之本也爾其勉之盡以所獲書付焉時宣祖揚州駐軍數月厲兵捍冦聲振敵境世宗嘉之未幾以疾歸欲與太宗㑹於夀春後至京師薨贈太尉焉太祖皇帝乃宣祖第二子也至真宗大中祥苻五年十月戊午降於禁中延恩殿曰吾人皇中九人之一也是汝趙之始祖再降乃軒轅黃帝凡世所知少典之子非也毋感赤電夢天人生於夀丘後唐時七月一日下降總治下方生趙氏之族今已百年矣皇帝善撫育蒼生無怠前志即離坐乘雲而去及曉以語宰相等仍召至殿上觀降臨之所十月二十五日大赦天下云云閏十月癸巳恭上九天司命保生天尊徽號曰聖祖上靈髙道九天司命保生天尊大帝又上聖祖母徽號曰元天大聖后事類脤膰以丨丨之禮親兄弟之國禮寶玉分丨丨於伯叔之國天水郡望也維城宗子丨丨詩麟趾公子仁厚如丨丨之跱也同上犬牙丨丨相制磐石之宗漢書堯族帝丨以親九丨周蕃維丨之翰四國于丨詩文昭丨之丨也左內睦故能丨丨九族詩天潢丨之丨𣲖也宗屏丨臣丨翰盟府藏在丨丨世世守之左宗支丨子公室之丨葉也同上玉牒丨丨傳芳金枝丨丨擢秀宗英丨中之英帝胄丨室之丨周五等丨建丨丨之爵大封同姓漢唐九人丨宗室入相有丨丨劉更生丨向字丨丨漢之宗臣也李長吉丨賀字丨丨唐之宗室也棠棣韡韡丨丨之華鄂不丨丨詩瓜瓞綿綿文王之興本由太王也丨丨丨丨孫子本支文王丨丨丨丨百世並同上公族枝葉公子丨丨之丨丨也左大雅不羣河間獻王丨丨卓然丨丨為善最樂東平王蒼丨丨丨丨堯子一十八人神丨之丨丨丨丨丨周封五十三國丨家之丨丨丨丨丨親睦合十五位本朝仁宗景祐三年六月丨丨宅成丨皇族丨丨丨居焉始置太宗正司於祖宗後選一人領之乃詔國子監直講王宗道為親睦宅說書學士召試三題皇祐五年右親龍武大將軍克悚上擬試詩賦論十卷且隨舉八人赴殿試上曰宗子好學亦朝廷美事也令丨丨院丨丨丨丨既中等遷右衛大將軍同上汝愚言去王抃趙丨丨當淳熙之朝以一丨而丨丨丨之姦令時襲封安定趙丨丨字德麟元祐中東坡喜其才美為作字說同陳履常歐陽叔弼昆季從公詩酒勝集秋暘賦洞庭春色賦皆為德麟作積官朝奉大夫建炎中詔丨丨丨丨郡王有詩號安樂集外趙見前皇朝源流下事類孰賢文公七年酆舒問於賈季曰趙衰趙盾丨丨對曰趙衰冬日之日也趙盾夏日之日也左舉士趙文子丨管庫之丨七十餘家禮方略前趙充國願至金城圖上丨丨又曰明主可為忠言遂上屯田奏成帝時追美圖畫而頌之曰漢命虎臣惟後將軍昔周之宣有方有虎漢之中興充國作武﨣﨣威威亦紹厥後鈎距前趙廣漢為二千石善為鉤距它人效者莫能及其發姦摘伏如神名家駒後趙喜更始即位徴喜年未二十既引見更始笑曰繭栗犢豈能負重致遠乎又曰卿丨丨丨弩力勉之當雄飛後趙溫字千柔初為京兆丞嘆曰大丈夫丨丨丨餘安能雌伏遂棄官歲饑散家糧以振窮餓所活萬人拜司徒一身為膽趙雲嘗將數十騎與曹公戰先主曰子龍丨丨都丨丨也軍中號為虎威將軍蜀志風骨秀爽唐趙彥昭甘州人父武孟少游獵以所獲饋其母母泣曰汝不為好事而放蕩吾安望哉武孟感激遂力學淹該書記為侍御史著西河人物志十篇彥昭少豪邁丨丨丨丨及進士第景龍中遷同平章事文行知名趙光逢字延吉時人稱其方直溫潤謂之玉界尺唐亡事梁為中書侍郎同中書門下平章事纍遷左僕射以太保致仕力學淹該見上風骨秀爽注鼎鐺有耳本朝趙普字則平幽州薊人太祖受禪普以佐命功授右諫議大夫寵待如左右手判大理寺雷德驤憤其增减刑名求見于太祖語不遜太祖叱之曰丨丨尚丨丨獻汝不聞趙普吾之社稷臣乎封真定郡王諡曰忠琴鶴自隨趙抃神宗即位召知諫院故事近臣自京師曰還將大用必更省府不為諫官大臣為言上用趙抃為諫官賴其言耳茍欲用之何傷及謝上謂公曰聞君以匹馬入蜀以一丨一丨丨丨為政簡易亦稱是耶其再任也屏去丨丨止一蒼頭彈劾不避趙抃字閲道衢州西安人少孤貧舉進士及為殿中侍御史丨丨丨丨權勢京師號鐵靣御史遷龍圖閣直學士知成都决親征議髙宗紹興四年趙鼎為相僞齊入冦鼎丨丨丨之議於是世忠進屯揚州遂捷于大儀鎮鼎又薦張浚可當大事錢古今姓纂錢姓出陸終蓋顓頊之苗裔陸終生彭祖孫孚周錢府上士因官命氏焉自三代以來無甚顯者戰國時有隱士錢丹秦有御史大夫錢産子孫居下邳至唐末錢氏多居東南及鏐乘亂世起餘杭有地十三州號兼吳越而王幾百年而武進錢氏猶隱德纍世不顯武進之錢自實七世至君有聞又有賢子不降益彰其勢孰止歐陽公錢治屯田墓志事類孝行錢道職字子韜少以丨丨著聞纍以功都督郢州刺史南史公望唐錢徽字蔚章中進士第遷中書舍人加承㫖憲宗獨召徽稱其長者時內錢財圖復河湟然禁無名貢獻而至者不甚郤徽懇諫罷之闕之有牛田錢百萬刺史以給宴飲贈餉者徽曰此農耕備命代貧民租入又任庶子時韓公武以賂公卿遺徽錢二十萬不納時稱有公望有文章本朝錢惟演少富貴志於學丨丨丨與楊億劉筠齊名嘗曰學士備顧問不可不該博故其家聚書侔於祕府初諡曰文墨改諡曰思又改曰文僖凡三易名云喜草𨽻錢昆字裕之吳越國王倧之子也善為詩賦又丨丨丨封秦王錢俶字文德臨安人也祖鏐因唐末黃巢之亂據有吳越昭宗授以杭越節制封彭城王梁唐封為吳越國王諡曰武肅父元瓘諡曰文穆王子佐嗣佐卒以弟倧繼倧為牙校胡進思所廢俶時鎮浙東遂度江襲位漢授以東南面兵馬都元帥錫以金印玉冊仍領鎮海鎮東節度使至周以天下兵馬都元帥處之宋興改大元帥自我太祖受命俶貢奉有加開寶六年封其妻孫氏為賢德順穆夫人江南平俶與妻子來朝我太祖待以優禮賜劍履上殿詔書不名又以俶妻為吳越國王妃自晉王宰相及中外臣僚請留俶不遣俶歸國時大祖封文字一篋付俶仍諭曰朕知公忠俶感泣至國啓封皆晉王以下留俶王疏也太平興國三年復來朝遂以國歸太宗改封淮海以禮賢宅賜之錢氏𫝊五主共八十四年俶以天下既平求去元帥之稱改漢南國王永熙四年出為武勝軍節度使徙國南陽又辭國號改封許王端拱元年復徙封鄧王諡曰忠懿尚公主錢惟演子暄為寶文閣待制暄子名景臻丨仁宗女許國大長丨丨拜左領軍衛大將軍駙馬都尉官至少師安武軍節度使封康國公生子忱亦至少師忱子端禮隆興初為參政清謹寡過錢藻字醇老舉進士又中制科為人丨丨丨丨居守繩墨為治簡靜立朝無矯亢之節亦不為雷同處勢利淡如也人稱其長者俊逸過人錢易字希白年十七舉進士御試三題日中而就言者以其輕率而黜之太宗語蘇易簡曰朕恨不與李白同時易簡曰有錢易者李白才也易丨丨丨丨為文數千百言頃刻而就人莫及寵貴無比錢俶崇信釋教性謙謹未嘗忤物為大師中書令者四十年任元帥者三十年丨丨之盛丨與為丨七子惟濬惟治惟渲惟灝惟演惟濟惟溍惟治官至左驍衛上將軍保惟渲惟灝俱至團練使惟溍左龍武將軍惟濟靜軍留後諡曰宣惠儒雅有文錢若水字淡成河南人也十歲能屬文入華山陳摶一見以為有仙風道骨舉進士為同州推官太宗擢祕書丞直史館超遷知制誥翰林學士至道拜右諫議大夫同知樞密院事真宗幸大名上書真宗謂左右曰若水儒臣中知兵者也卒諡宣靖若水風流儒雅有文學事母以孝聞所至有譽望評人貴賤夀夭多驗自知不夀故辭勢位賢士大夫皆宗慕之望舊山詩錢員外不知何許人白樂天有和其青龍寺上方丨丨丨丨云舊峯松雪舊溪雲悵望今朝遙屬君共道使臣非俗吏南山莫動北山文容軒隨筆乾道四年講筵開日云上書此章於扇以賜臣邁改使臣為侍臣賦遠山詩錢惟演字希聖幼有俊才俶嘗使丨丨丨丨有髙為天一柱秀作海三峯俶深器之平海冦功錢之望字表臣毗陵人己丑鄭榜登第慶元間嘗帥五羊以丨丨丨丨除待制同年小録云孟回中丞之後疑屯田君之族也蘇東坡表忠觀銘天目之山苕水出焉龍飛鳳舞萃於臨安篤生異人絶類離羣奮挺大呼從者如雲仰天誓江月星晦蒙强弩射潮江海為東殺宏誅昌奄有吳越金劵玉冊虎符龍節大城其居