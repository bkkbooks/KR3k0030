body:
  text: 古今合璧事類備要外集卷二十三宋謝維新撰刑法門栲訊刑法總論栲訊法嚴矣諸捕盜官獲盜應拷訊若過伍拾及以他法者論如考囚法即非應栲訊而栲訊杖壹百栲滿二百者徒二年傷重若致死者論如前人不合捶考律元無可疑之狀者各不以失減事類一連十丨丨丨韓朗十連百同上死有餘辜捶楚之下何求不得雖臯陶聴之猶謂丨者丨丨丨罪得其實文選解械得潭戴就會稽人仕郡倉曹掾揚州刺史奏太守成公俘贓從事薛安收就笞掠五毒慘至燒煆斧使夾肘腋肉焦墮地乃臥就覆船下以馬糞薰之一宿一日謂已死發船就口罵曰何不益火又燒地以大鍼刺指𤓰中令爬土爪悉落安曰太守贓罪狼藉君何骨肉抵扞就曰太守剖符大臣奈何誣枉忠良安竒其節操丨丨丨丨解釋郡事破械勸誘吳陳表文奥為士皆愛附之時有施明盗官物明壯悍収栲極毒雖死無辭孫權以表得健兒心以明付表表丨丨與沐浴飲食勸誘之乃首服兼引支黨權竒之遂捨明罪何故夜栲常林夜撾吏崔林聞曰君為廷尉邪常曰無崔曰丨丨丨丨囚常慙之卒從吏訊鄒陽獄中上書曰左右不明丨丨丨丨栲訊取服隋煬帝時盜發帝令於士澄捕之少渉疑似皆丨丨丨丨凡二千餘人帝悉令斬之大理丞張元濟怪其多試尋其狀内五人嘗為盗餘皆平民竟不敢執奏盡殺之栲掠已死左臺中丞來俊臣羅告狄仁傑謀反下獄仁傑承反後樂思晦男未十歲没入司農上變得召見太后問狀對曰臣父已死臣家已破但惜陛下法為俊臣所弄陛下不信臣言乞擇朝臣之忠清陛下素所任信者為反狀以付俊臣無不承反矣太后意稍寤召見仁傑等問曰卿承反何也對曰不承則已死於栲掠矣於是出此七族流行本嗣真于嶺南餘皆貶為倉密牒按訊蘇珦為監察御史武后殺韓魯諸王付珦丨丨丨丨珦推之無狀或言珦助韓魯者后詰之挺議無所撓后不悦曰卿大雅士此獄不足誘卿即詔監軍河西有司雜訊朱子奢池陽令崔文康坐事櫟陽尉魏禮臣劾治獄成御史言甚枉禮臣訴御史阿黨乞下丨丨丨丨不如所言請死鞫報禮臣不實詔如請子奢曰在律上書不實有定罪今抵以死死者不復生雖欲自新弗可得且天下惟知上書獲罪欲自言者懼而不敢申矣詔可宰相同訊姚紹之武三思烝僭不軌王司皎等謀殺事覺送新開獄詔紹之與左臺大夫李承嘉按治初欲原盡其情會勑丨丨李嶠等丨丨執政畏禍麤減無所問囚嘑曰宰相有附三思者嶠等數附承嘉耳呫嚅紹之飜然不復顧御史覆訊宗室臯字子蘭授衡州刺史為觀察使詔劾之潮州初丨丨丨丨臯懼憂其母出則囚服入乃貌言如平常日中獄具吉温李林甫與李適張垍有隙適之領兵部以垍兄均為侍郎林甫宻遣吏摘其餘銓吏偽選六十餘人帝命與京兆雜治累日情不得京兆尹蕭炅使温左訊温分囚左右中収二重囚重訊後舎楚械榜掠皆呻吟不勝曰公幸留死請如牒乃健出諸吏迎􅀈其酷及引前不訊皆服丨丨丨丨林甫以為能一昔獄具敬羽擢監察御史岐王珍謀反詔羽窮劾力悉支黨環以榜具囚惶怖丨丨丨丨珍賜死惟吏是聴李邕素輕張説會仇人告邕贓貸枉法下獄當死邕妻請戍邉自贖曰邕初蒙訊責便繫牢戸水不入口者踰五日氣息奄奄丨丨丨丨隨問輒承吉温推事未窮而先計贓成奏乃引囚問震以裂成丨丨丨丨無敢迕鞭楚未収于壁而獄具矣鍾能辨盗陳述古知浦城縣有人失物捕得莫知的為盗者述古紿之曰某廟有丨至靈丨丨丨為盗者摸之則有聲不盜者摸之無聲以帷帷之陰使人以墨塗鍾良久引囚逐一令引手入帷摸之出騐其手皆有墨唯一囚無墨訊之遂承為盜徐有功疏唐季人多逆節鞫訊結斷刑慘獄嚴桞宗元守道論懲之以黜遠鞭抃楛拳斬殺之慘欵辨附證驗刑法總論欵辨諸獄結正徒以上各呼囚及其家屬具告罪名仍取其服辨若不服者聴其自理更為審詳達者笞五十死罪杖一百囚辭皆獄官親聴令自通狀不能書者典為書之書訖讀示辭已窮盡即官典同以辟狀類合成欵惟具要切事情不得漫録出語仍示囚詳認書字能書者親書結欵若重罪大情已明者其餘並據招結欵免追究諸鞫獄于證人無罪者日下責狀先放其告捕及被侵損人唯照要切情節聴暫追證訖仍不得隨司若證徒以上罪犯人未録問者告示不得遠出即推盗應被追主認贓或證對者限當日責狀先放有故獄官具情由禀長吏通不得過二日告捕及被侵損人若被主認贓證對各不得鬬留如違許于連不應禁之家越訴事類明清丨丨于單辭師聴兩造具備丨丨五辭並書置對丨丨自伏其過莊子置辭漢大鴻臚持節移梁王傳相曰王陽病抵讕丨丨注抵拒也讕諱也讕力亶反不能舉見前注詳不足受公孫賀子敬聲代賀為大僕擅用北軍錢千九百萬發覺下獄是時招捕朱安世不能得賀請捕以贖敬聲罪上許之後果得安世安世京師大俠聞之笑曰丞相禍及宗矣南山之竹丨丨丨我師斜谷之木不足為我戒安世遂從獄中上書告敬聲使誣祭詞詛上下有司案騐賀父子遂死獄中前公孫賀傳不知置周勃下廷尉丨丨丨辭吏稍侵辱之勃以千金與獄吏乃書牘背以公主為證注置立也丨丨對獄辭讀木簡引詠為證後漢英詠為馬賢所辟又為太府龎參椽參賢相誣罪應死各丨丨丨丨理無兩直自刎死二人慙悔和解凉州刺史張視祭其墓旌其子孫引説為證宋璟張易之誣魏元忠有不臣語丨張丨丨丨將廷辨説惶遽璟謂説曰名義至重不可䧟正人以來茍免縁此受謫芬芳多矣若有不測吾且扣閽救將與子偕死説感其言以實對元忠免死乃詔推事武后元年丨丨法司反丨丨使敢多詐辨狀而加者以故入論刑法志各呼家屬大理烝徒以上丨丨囚與其丨丨告以罪名問其狀疑不伏則聴其自理唐通典古今合璧事類備要外集卷二十三
