body:
  text: 古今合璧事類備要外集卷二十八宋謝維新撰賦役門商征征稅總論征商非古也古者關譏而不征市㕓而不稅易曰日中為市聚天下之貨交易而退書曰懋遷有無化居皆未聞所謂商征者也及讀周禮司關始見掌關貨之節以聯關市故有關市之征商征倣諸此矣蓋以市多淫巧關通末游欲止抑之故加稅耳然關必險道市必要津天下諸津舟船所聚也旁通巴漢前詣閩越七澤十藪三江五湖控引河洛兼包淮海洪舸巨艦千軸萬艘交貿往來憧憧永日此舟車所由算也然司關市者且有額外過取者歸於公者未一二而歸之巳者已七八商亦吾民也亦何便於此哉事類賤丈夫古之為市也以其所有易其所無者有司者治之耳有丨丨丨焉必求壟斷而登之以左右望而罔市利人皆以為賤故從而征之征商自此丨丨丨始矣孟子市有司古者丨置丨丨但治其爭訟不征稅也賤丈夫貪人可賤者也入市則求龍斷而登之龍斷謂堁斷而髙者也左右占視望見市中有利罔羅而取之人皆賤其貪者也故就征取其利後世緣此遂征商人上文注取其稅古之為關也將以禦暴今之為關也將以為暴注古之為關將以禦暴亂譏閉非常也今之為關反以征稅出入之人將以為暴虐之道也疏孟子之時司關征丨丨丨孟掌其征司關司貨賄之出入者掌其治禁與丨丨㕓注丨㕓者貨賄之稅與所止邸舍也疏征謂稅禮不出於關凡貨丨丨丨丨者舉其貨罰其人注丨丨丨丨謂從私道出辟稅者則沒其財而撻其人禮願藏於市市㕓而不征法而不㕓則天下之商皆恱而丨丨丨其丨矣注㕓市宅也古者無征衰世征之王制曰市㕓而不稅周禮戴師曰國宅無征法而不㕓者當以什一之法征其地耳不當征其㕓宅也願出於路關譏而不征則天下之旅皆恱而丨丨丨其丨矣注古之設關但譏禁異言識異服耳不征稅出入者故王制曰古者關譏而不征周禮太宰曰九賦七曰關市之征司關曰國凶扎則無關門之征猶譏王制謂文王以前文治歧關譏而不征周禮有征者謂周公以來孟子欲令復古之征使天下行旅恱之也並孟子文王治岐丨丨之丨丨也關市譏而不征注紂時稅重文王復行古法不征稅也孟景公逼介齊景丨丨丨丨之關暴征其私注介隔也迫近國都之關言邉鄙既入服政後又為近關所征稅枉暴奪其私物左傳昭二十市租饗士李牧之為趙將居邉軍丨丨皆自用丨丨市租給卒魏尚為雲中守軍丨丨盡以丨士丨楊炎稅商自丨丨立兩丨法户無主客以見居人為數人無丁中以貧富為差不居處而行丨者所在州縣稅三十而一客卿征市隋主舊制軍人士人並無關市之稅上盛修宫室窮極耳目府庫虛空有所興造恆苦不給沈丨丨奏請不問士庶並責鬬市之丨而又增重其舊於是以陽惠朗為太息令暨惠景為尚書金倉都令史二人家本小吏考校簿領毫釐不差然皆不逹大體督責苛碎聚斂無厭士民嗟怨客卿揔督之每歲所入過於常格數十倍上大恱王鍔租㕓丨丨擢遷嶺南節度使廣人與蠻雜處地征薄多牟利於市鍔租其㕓𣙜所入與常賦埒以為時進裒其餘悉自入諸蕃舶至盡有征稅於是財蓄不資謂之率貸自天寶末年盜賊奔突克復之後府庫一空乂所在屯師用度不足於是遣御史康雲出江淮陶鋭往蜀漢豪商富户皆籍其家資所有財貨畜産或五分納一丨丨丨丨所收巨萬計通典乂陳京初帝討李希烈財用屈京與戶部侍郎趙贊請籍賈人資以率貸之又開元時諸道節度使觀察使多率貸商賈以充軍資雜用或於津濟要路及市肆間交易之處計錢至一千以上者皆以分數稅之自是商稅無利多失業矣謂之埭程上元中勑江淮堰埭商賈牽船過處凖斛㪷紏錢丨丨丨丨請收邸直裴休進中書侍郎時方鎮設邸閣居茶取直因是商人他貨橫賦之道路苛擾休建言丨丨丨丨無擅賦商人禁絶碇稅孔戣拜嶺南節度使蕃舶泊步有下定稅戣丨丨無所求索號經制錢本朝宣和因方臘之亂官兵無所給乃詔發運使陳亨伯經制東南亨伯於商稅亦增一分並丨丨丨丨靖康罷之號月椿錢建炎七年先是諸路贍大軍錢令運司於經制征商等數內逐月椿辨丨丨丨丨所椿不能十之二三餘則州縣之吏臨時措畫未免敷之百姓本抑商賈本朝紹興二十六年詔京西淮南販買耕牛與免稅三年用三省請也豈上曰關市之征丨以丨丨丨如米麵民間日用之物可收稅令耕牛亦猶是也宜通商人泰州鹽課虧緡錢數千萬事連十一州詔殿中丞張奎往按之還奏三司發鈔稽緩非諸州罪因言鹽法所以足軍食非仁政所宜行若必不得已令商人轉貿流通獨關市收其征則上下皆利孰與設重禁雍閼之為民病有詔悉除所負關吏所搜唐介字子方潭州一巨賈私藏胖胎為丨丨丨丨太守而下輕其估悉自售焉質肅時以言事謪潭伻分珠獄發奏方入仁宗謂近侍曰唐介必不肯買案具奏覆覽之果然湘山野録崔融上疏丨丨字安成武后時纍進鳯閣舍人時有司議關市行人盡征之融丨丨謂周官九賦其七曰關市以市多淫巧而關通未游欲止抑之故加稅耳然雖斂工商而不及往來且天下之關必險道市必要津豪宗惡少在焉聞一旦變法或致騷動恐南走蠻北走狄有如師興費廣雖倍算商旅加斂齊人可也古今合璧事類備要外集卷二十八
