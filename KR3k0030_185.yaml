body:
  text: 古今合璧事類備要續集卷三十五宋謝維新撰性行門儉約事理發揮儉美德也故以約失之者鮮矣是以士能儉于身則其身足大夫能儉于家則其家足諸侯能儉于國則其國足天子能儉于天下則天下足儉於己者無所求于人儉于官者無所取于民儉之為訓大矣哉然儉不中禮君子亦無取焉耳事類節以丨丨制度不傷財不害民易節卦昭其清廟茅屋大輅越席大羮不致粢食不鑿丨丨儉也左德之共儉丨丨丨也左德之恭儉丨丨丨也禮以避難君子丨儉德丨丨易否卦不中禮儉丨丨丨詩唐風與其奢禮丨丨丨也寧儉語今也純麻冕禮也丨丨丨儉吾從衆語靳一弊袴韓昭侯惟一黒裘蘇季子三十年丨丨丨貂丨公孫布被丨丨𢎞起徒步至宰相身食一肉脱粟飯丨丨奉祿以給故人賔客無有所餘可謂減於制度而率下篤俗者也本𫝊楊孫臝葬丨丨學黄老術家業千金養生無所不致及病且終先令其子曰吾欲丨丨以反吾真必無易吾意死則為布囊盛尸入地七尺旣下從足引脱其囊以身親土本𫝊一錢不貸寧見貫朽千萬而不忍貸人一錢知積粟朽倉而不忍貸人一斗骨肉怨望於家細人謗讟於道王符傳單衣責償司徒王戎儉吝其從子婚與一丨丨後更丨之丨戎既貴且富區宅僮牧膏田水碓之屬洛下無比契疏鞅掌每與夫人燭下㪚籌算計家貲食有三九庾杲之清貧食惟有韮葅卄瀹韮生韭雜菜任昉戲之曰誰謂庾郎貧丨常丨二十七種言丨丨也齊書食有二九魏季宗家富而丨常無肉止丨韭葅李元祐曰季令公一食十八種謂丨丨十八世説賣李鑽核王安豐有好李常賣之恐人得種常丨其丨世説數米秤炭韋莊性慳丨丨而炊丨丨而爨唐葫蘆一枚鄭餘慶與人㑹食日髙衆客皆餒呼左右曰爛蒸去毛莫抝折項諸人相顧以為必蒸鵝鴨良久就餐每人前下粟米飯一碗蒸丨丨丨丨餘慶餐美餘人强進而罷太平廣記蒸豆兩甌盧懐慎為黄門監兼吏部尚書卧病既久宋璟盧從愿嘗相與訪焉懷慎卧於敝簀門無簾箔常器重璟及從愿見之甚喜命設食有丨丨丨丨菜數俎而已此外翛然無辦寢止一幃萊公初為樞密直學士常賜金甚厚乳母泣曰太夫人不幸時家貧求一縑作衾襚不可得豈知今日富貴哉公聞之慟哭盡散金帛終身不蓄財産後雖出入將相所得俸禄惟務施與公外奢内儉無聲色之娛丨處丨丨青丨二十餘年時時有破壊益命補葺或以公孫𢎞事靳之公曰彼詐我誠雖敝何憂且不忍處之久而以敝復弃也靳者愧之食止一器查道以謹儉律己為待制每丨丨盡丨丨度已不勝則不下筯雖蔬茹亦然常曰福當如是惜聖宋掇遺帷不羅綺范仲淹子純仁娶婦或𫝊婦以羅為帷幔者公聞之不悦曰羅綺豈帷幔之物耶吾家素清儉安得亂吾家法敢持至吾家當火之于庭遺事地無樓臺處士魏野詩贈冦萊公曰有官居鼎鼐無地起樓臺及上即位北使至賜宴兩府預坐北使歴視坐中問譯者曰誰是無地起樓臺相公坐中無荅丁謂使譯者謂曰朝廷初即位南方須大要臣鎮撫冦公暫撫南夏非久即還政一麫一飯杜正獻公衍食於家惟丨丨丨丨或美其儉曰某本一措大名位壽福冠冕服用皆國家所有一旦去身復為措大何以自奉一爵一肉東坡在黄州嘗書云自今日以往早晚飲食不過丨丨丨丨有尊客盛饌則三之可損不可増有召我者預以此吿之主人不從而過是乃止一曰安分以養福二曰寛胃以養氣三曰省費以養財侯鯖錄費事相稱范仲淹嘗自言曰吾每夜就寢為計一日飯食奉養之丨及書所為之丨若丨丨則鼾睡熟寐無復愧耻茍或不然則終夜不能安枕存亡如一張文節事見後文司馬温公訓儉貴而從儉王沂公與孫冲同榜冲子京一日往辭沂公相留云喫飯了去飭子弟云已留孫京喫飯安排饅頭饅頭時為盛饌也食後合中送數軸簡紙開看皆是他人書簡後截下紙韓莊敏遺事貴不忘貧范文正公旣貴常以率家人且戒諸子曰吾貧時與汝母養吾親汝母躬執爨而吾親甘㫖未嘗充也今而得厚祿欲以養親親不在矣汝母又以蚤世吾之所最恨者忍令若曹享富貴之樂也同前司馬公訓儉文吾本寒家世以清白相承吾性不喜華靡自為乳兒長者加以金銀華美之服輒羞赧棄去之二十忝科名聞喜宴獨不戴花同年曰君賜不可違也乃篸一花平生衣取蔽寒食取充腹亦不敢故服垢弊以矯俗干名但順吾性而已衆人皆以奢靡為榮吾心獨以素儉為美人皆嗤吾固陋吾不以為病應之曰孔子稱與其不遜也寧固又曰以約失之者鮮矣又曰士志於道而耻惡衣惡食者未足與議也古人以儉為美德今人以儉相詬病嘻異哉近世風俗尤為侈靡走卒類士服農夫躡絲履吾記天聖中先公為羣牧判官客至未嘗不置酒或三行五行不過七行酒沾於市果止於梨栗棗柿殽止於脯醢菜羮器用瓷漆當時士大夫家皆然人不相非也㑹數而禮勤物薄而情厚近日士大夫家酒非内法果殽非逺方珍味食非多品器皿非滿案不敢㑹賔客常數月營聚然後敢發書茍或不然人爭非之以為鄙吝故不隨俗靡者鮮矣嗟乎風俗頽弊如是居位者雖不能禁忍助之乎又聞昔李文靖公為相治居第於封丘門内㕔事僅容旋馬或言其太隘公歎曰第當𫝊子孫此為宰相㕔事甚隘為太祝奉禮㕔事已寛矣參政魯公為諌官真宗遣急召之得於酒家旣入問其來以實對上曰卿為清望官奈何飲於酒肆對曰臣家貧客至無器皿果殽故就酒家之觴上以其無隱益重之張文節為相自奉養如為河陽掌書記時所親或規之曰公今受俸不少而自奉若此公雖自信清約外人頗有公孫布被之譏公宜少從衆公歎曰吾今日之俸雖舉家衣錦玉食何患不能顧人之常情由儉入奢易由奢入儉難吾今日之俸果豈能常有身豈能常存一旦易於今日家人習奢旣久不能頓儉必致失所豈若吾居位去位身在身亡如一日乎嗚呼大賢之深謀逺慮豈庸人所及哉御孫曰儉德之共也侈惡之大也共同也言有德者皆由儉來也夫儉則寡欲君子寡欲則不役於物可以直道而行小人寡欲則能謹身節用逺罪豐家故曰德之共也奢則多欲君子多欲則貪慕富貴枉道迷禍小人多欲則多求妄取敗家䘮身是以居官必賄居鄉必盜故曰侈惡之大也昔正考父饘粥以餬口孟僖子知其後必有達人季桓子相三君妾不衣帛馬不食粟君子以為忠管仲鏤簋朱紘山節藻棁孔子鄙其小器公叔文子享衛靈公史鰌知其及禍及戍果以富得罪出亡何曽日食萬錢至孫以驕溢傾家石崇以奢靡驕人卒以此死東市近世冦萊公豪侈冠一時然以功業大人莫之非子習其家風今多窮其餘以儉立名以侈自敗者多矣不可徧舉聊舉數人以訓汝汝非徒身當服行當以訓汝子孫使知前輩之風俗云朱文公儉德帖朱文公晚年親書一帖戒其子云年來衰病多因酒色過度以致近覺肉多為害尤甚自丁巳正旦以往早晚飯各不得過一肉如有肉羮不得更設肉飣如是菜羮熟水下飯即肉飣不得用大楪只用菜楪大小一般晚食尤須減少不肉更佳一則寛胃養氣一則節用省財庶幾全生盡年儉徳避難之萬一埜等如有愛親之心切宜深體此意詩集藜莧腸肚習丨丨韓瓠瓜吉凶禍福有來由俱欲深知不欲憂只見火光燒潤屋未聞風浪覆虛舟名惟公器無多取利是身災合少求唯異丨丨難不食大都食足便宜休白居易書懐對菊每恨陶彭澤無錢丨丨花杜懸鶉衣故有丨丨同上古今合璧事類備要續集卷三十五
