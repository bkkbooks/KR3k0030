body:
  text: 古今合璧事類備要别集卷三十九宋謝維新撰花卉門菊花格物總論菊按爾雅名菭蘠凡數種瞿麥為大菊馬藺為紫菊烏喙苗為鴛鴦菊旋覆花為艾菊又有所謂筋菊有所謂白菊有所謂黃菊或名日精或名周盈或名傳延年又有紫莖氣香而其味美者又有青莖而大氣味苦不堪食者自昔品名為最多前賢譜之者或謂有二十七種或謂有三十五種或謂有三十六種且猶以為未偹也今據耳目之所接者言之有淡黃者有深黃者有鵝黃者有欎金黃者有正黃色者且不止此或純白或外白內黃或黃心白葉或深紅或粉紅或淺紫猶未也白單葉白多葉白五出白雙紋或不過六七葉或葉捲為筒或葉細如茸有鈴葉者有鐸葉者又有不如鈴則如鐸者抑未也或以五月開或以六月開如此之類亦不待於秋而後著花自古及今品名之多孰有加於此花者哉遽數之不能終其物欲覼縷而數之雖更僕未可也姑述其大概云事類飲菊桓景隨費長房長房曰九月九日汝家合有大災厄急縫囊盛茱萸繫臂上登山丨丨花酒續齊諧記賜菊見重陽門奉一束魏文帝與鍾繇書曰歲往月來忽後九月九日九為陽數俗宜其名以為宜於長久是月芳菊紛然歸榮輔體延年莫斯之貴謹丨丨丨以助彭祖之術本紀摘盈把陶潛九月九日無酒宅邊菊叢丨丨丨坐其側悵望久之見白衣至乃江州王𢎞送酒即便就酌醉而後歸續晉春秋菊水滋液南陽酈縣有甘谷谷中水甘美其上有大丨菊丨從山流下得其丨丨谷中二十餘家仰飲此水上壽百二三十其中百餘歲七十八十則謂之夭風俗通菊水甘馨酈縣北八里有丨丨其涯悉芳菊被崖水甚丨丨胡廣久患風羸常飲水飲後疾遂瘳年及百歲荆州記服花升天道士朱孺子吳末入玉笥山丨菊丨乘雲丨丨名山記服花得仙康風子丨甘菊丨桐實後丨丨神仙傳作歌示綬韋綬九月九日帝丨黃菊丨以丨丨孔六帖獻酒於適李適秋登慈恩浮圖丨菊花丨稱夀同上寒花晚節韓魏公在北門九日燕諸僚佐有詩云不羞老圃秋容淡猶有丨丨丨丨香識者知其晚節之髙李彥平録秋菊落英王荆公殘菊詩黃昏風雨打園林殘菊飄零滿地金歐陽公見之戲荆公曰秋花不比春花落慿仗詩人仔細看荆公聞之笑曰歐陽九不學之過也豈不見楚辭云夕餐丨丨之丨丨或云詩之訪落以落訓始蓋謂始開之花耳史正志序廢圃求菊蘇東坡守膠西府傳索然不堪其憂日與通守劉君廷式循古城丨丨丨把丨食之作後杞菊賦坡文集郡圃採菊張南軒先生為江陵之數月方春經行丨丨命丨杞丨付之庖人或謂先生據方伯之位頥指如意乃樂從野人之餐得無近於矯激有同於脫粟布被者乎先生應之曰天壤之間孰為正味厚或臘毒淡乃其至惟杞與菊中和所萃驗賦南陽於河西又頽齡之可制於是又作續杞菊陸氏杞菊賦陸龜蒙自號天隨生宅荒少牆屋多隙地前後皆樹以杞菊春苗恣肥得以採擷供左右杯案及夏五月枝葉老硬氣味苦澀旦暮猶責兒輩掇拾不已遂作杞菊賦惟杞惟菊偕寒互緑或穎或苕煙披雨沐我衣敗綈我飯脫粟羞慚齒牙茍且梁肉蔓延駢羅其生實多爾杞未棘爾菊未莎其如豫何其如豫何劉蒙菊譜敘草木之有花浮冶而易壞凡天下輕脆難久之物皆以花比之宜非正人達士堅操篤行之所好也然余嘗觀屈原之為文香草龍鳯以比忠正而菊與菌桂荃蕙蘭芷江蘺同為所取又松者天下歲寒堅正之木也而陶淵明乃以松名配菊連語而稱之夫屈原淵明實皆正人達士堅操篤行之流至於菊猶貴重之如此是菊雖以花為名固與浮冶易壞之物不可同年而語也且菊有異於物者凡花者以春盛實者以秋成其根柢枝葉無物不然而菊獨以秋花恱茂於風霜搖落之時此其得時者異也有花葉者花未必可食而康風子乃以食菊仙又本草云以九月取花久服輕身耐老此其花異也花可食者根葉未必可食而陸龜蒙云春苗恣肥得以採擷供左右杯又按本草云以正月取根此其根葉異也夫以一草之微自末至本無非可食有功於人者加以花色香態纎妙間雅可為丘壑燕靜之娛然則古人取其香以比德而配之以歲寒之操夫豈偶然而已哉洛陽之風俗大抵好花菊品之數比他州為盛劉元孫伯紹者隱居伊水之瀍萃諸菊而植之朝夕嘯咏乎其側蓋有意譜之而未暇也崇寧甲申九月余得為龍門之遊得至君居坐於舒嘯堂上顧玩而樂之於是相與訂論訪其居之未嘗有者因次第焉夫牡丹荔支香笋茶竹硯墨之類有名數者前人皆譜録今菊品之盛至於三十餘種可以類聚而記之故隨其名品論敘于左花數總三十有五品龍腦都勝新羅御愛玉毬鈴金萬玉鈴鈴大金銀臺蜂鈴棣棠鵝毛毬子鈴秋金夏金鈴金錢鄧州黃黃二色薔薇甘菊酴釄白鄧州玉盆白菊銀盆鈴秋萬夏萬鈴繡毬荔枝楊妃垂絲粉紅合蟬紅二色紫順聖淺桃花范至能菊譜敘山林好事者或以菊比君子其説以謂歲華晼晚草木變衰乃獨燁然秀發傲睨風露此幽人逸士之操雖寂寥荒寒而味道之腴不改其樂者也神農書以菊為養性上藥能輕身延年南陽人飲其潭水皆夀百歲使夫人者有為於當年醫國芘民亦猶是而已菊於君子之道誠有臭味哉月令以動植志氣候如桃桐華直云始華至菊獨曰鞠有黃華豈以其正色獨立不伍衆草變詞而言之歟故名勝之士未有不愛菊者至陶淵明尤甚愛之而菊名益重又其花時秋暑始退歲事既登天氣髙明人情舒間騷人飲流亦以菊為時花移檻列斛輦致觴詠間謂之重九節物此非深知菊者要亦不可謂不愛菊也愛者既多種者日廣吳下老圃伺春苖尺許時掇去其顛數日則岐出兩枝又掇之每掇益岐至秋則一幹所出數千百朵婆娑團欒如車蓋重籠矣人力勤土又膏沃花亦為之屢變頃見東陽人家菊圖多至七十種淳熙丙午范村所殖共得三十六種悉為譜之明年將益訪求它品為後譜云黃勝金黃麝香黃疊金花太真黃棣棠菊垂絲菊疊羅黃金黃千葉小鴛鴦菊鈴金鈴菊夏小金十樣菊毬子菊甘菊單葉小金錢野菊白五月菊黃鈴菊金杯玉盤蓮花菊喜容千葉御衣黃千葉芙蓉菊茉莉菊木香菊白荔枝酴釄菊銀杏菊艾葉菊波斯菊佛頂菊燕脂菊桃花菊名孩兒紫菊一史正志菊譜序菊草屬也以黃為正所以概稱黃花漢俗九月飲菊以祓除不祥蓋九月律中無射而數九俗尚九日而用時之草也南陽酈縣有菊潭飲其水者皆壽神仙傳有康生服其花而神仙菊有黃華北方用以凖節令大略黃華開時節候不差江南地暖百卉造作無時而菊獨不然考其理菊惟介烈髙潔不與百卉同其盛衰必待霜降草木黃落而花始開嶺南冬至始有微霜故也本草一名日精一名周盈一名傳延年所宜貴者苖可以菜花可以藥囊可以枕釀可以飲所以髙人隱士籬落畦圃之間不可一日無此花也陶淵明植於三徑采於東籬裛露掇英泛以忘憂鍾會賦以五美謂圓華髙懸凖天極也純黃不雜后土色也早植晚發君子德也冒霜吐穎象徑直也杯中體輕神仙食也其為所重如此然品類有數十種而白菊一二年多有變黃者余在二水植白菊百餘株次年盡變為黃花今以色之黃白及雜色品類可見於吳門者二十有七種大小顏色殊異而不同自昔好事者為牡丹芍藥海棠竹筍作譜記者多矣獨菊花未有為之譜者殆亦菊花之缺文也歟余姑以所見為之若夫耳目之未接品類之未偹更俟博雅君子與我同志者續之今以所見具列于後黃大金黃金墩菊小金黃金鈴菊佛頭菊金錢菊小佛頭菊黃深色御袍毬子黃野菊棣棠菊甘菊淺色御袍黃白金盞銀臺樓子佛頭玉盤菊單心菊添色喜容樓子菊纒枝菊萬鈴菊腦子菊荼蘼菊雜色十樣菊頂菊桃花菊夏月佛芙蓉菊孩兒菊范至能菊譜後序菊有黃白二種而以黃為正人於牡丹獨曰花而不名好事者於菊亦但曰黃花皆所以珍異之故余譜先黃而後白陶隱居謂菊有二種一種莖紫氣香味甘葉嫩可食花微小者為真其青莖細葉作蒿艾氣味苦花大名苦薏非真也今吳下惟甘菊一種可食花細碎品不甚髙餘味皆苦白花尤甚花亦大隱居論藥既不以此為真後復云白菊治風眩陳藏器之説亦然靈寶方及抱朴子丹法又悉用白菊蓋與前説相抵牾今詳此惟甘菊一種可食亦入樂餌餘黃白二花雖不可餌皆可入藥而治頭風則尚白者此論堅定無疑併著于後史正志菊譜後序菊之開也既黃白深淺之不同而花有落者有不落者蓋花瓣結密者不落初開之後淺黃者轉白而白色者漸轉紅枝千枝上花瓣扶疏者多落盛開之後漸覺離披遇風雨撼之則飄散滿地矣王介甫殘菊詩云黃昏風雨打園林殘菊飄零滿地金歐陽永叔見之戲介甫曰秋花不比春花落為報詩人仔細看介甫聞之笑曰歐陽九不學之過也豈不見楚辭云夕餐秋菊之落英東坡歐公之門人也其詩亦有欲伴騷人賦落英與夫却繞東籬嗅落英亦用楚詞語耳王彥賔言古人之言有不必盡循者如楚詞言秋菊落英之語全謂詩人所以多識草木之名蓋為是也歐王二公文章擅一世而左右佩劒彼此相笑豈非於草木之名猶有未盡識之而不知有落不落者耶王彥賔之徒又從而為之贅疣蓋益逺矣若夫可餐者乃菊之初開芳馨之可愛耳若夫衰謝而後落英豈復有可餐之味楚詞之過乃在於此或云詩之訪落以落訓始也意落英之落蓋謂始開之花耳然則介甫之引證殆亦未之思歟或者之説不為無據余學為老圃而頗識草木因併書于菊譜之後淳熙乙未閏九月望日吳門老圃敘詩集舒金英芳菊丨丨丨唐德宗真琪樹家家菊盡黃梁國獨如霜瑩淨丨丨丨分明對玉堂仙人披雪氅素女不紅粧粉蝶來難見麻衣拂更香向風搖羽扇含露摘瓊漿髙艷翻銀井繁枝覆象床桂叢慙並發梅蕚妬先芳一入瑤華詠從兹播樂章劉禹錫無錢對每恨陶彭澤丨丨丨菊花如今九日至自覺酒須賖杜移時晚庭前甘菊丨丨丨青蘂重陽不堪摘明日蕭條盡醉醒殘花爛熳開何益籬邊野外多衆芳采擷瑣細斥中堂念兹空長大枝葉結根失所纒風霜杜黃紅間緑禁署寒氣遲孟冬菊初拆丨丨丨繁丨爛若金照碧仙郎小隱日心似陶彭澤秋憐潭上看日慣籬邊摘令來此地賞野意潛自適金馬門內花玉山峯下客寒芳引清句吟靚煙景夕賜酒色偏宜握蘭香不敵凄凄百卉死歲晚氷霜積惟有此花開殷勤助君惜白樂天琮璧交輝素蕚迎寒秀金英帶露香繁華照旄鉞瑩盛對銀黃丨丨丨丨映衣裳雜彩章晴雲遙蓋覆秋蝶近悠揚空想逢九日何由陪一觴滿叢佳色在未肯委嚴霜劉夢得色似霜滿園花菊欎金黃中有孤叢丨丨丨還似今年歌酒席白頭翁入少年埸白樂天叢如雪數丨丨丨雪一旦冒霜開寒蘂差池落清香斷續來思深含别怨芳樹惜年催千里難同賞看看又早梅劉夢得陶後無知己籬畔霜前偶得存苦教遲晚受避蘭蓀能消造化幾多憾不陽和一點恩栽處豈容當玊砌要時還許上金樽丨公殁丨丨丨丨露滴叢見淚痕羅隱岑生多新詩是節東籬菊紛披為誰秀丨丨丨丨丨性亦嗜醇酎采采黃金花何由滿衣袖杜寄岑參金折小苞香籬落歲云暮數枝聊自芳雪栽纎蘂密丨丨丨丨丨千載白衣酒一生青女霜春叢莫輕薄彼此有行藏羅隱朝來數花發何處曽綴菊溪橋鶴嶺東籬疏還有艷園小亦無叢日晚秋煙裏星繁曉露中影和金滴水香染玊潭風罷酒慙陶令題詩答謝公丨丨丨丨丨身在尉他宫許渾坤裳有正色黃花候秋節逺自夏小正丨丨丨丨丨鞠衣亦令名一從人偽勝遂與天力爭易姓寓非族改顏隨所令新奇既易售粹駁定相傾疾惡逢伯厚識真似淵明君言我所印世論誰敢評願君為霜風一掃紫與頳坡贈朱遜之詠黃菊清香知故人吕園未肯輕沽我且寄田家砌下栽他日秋光媚重九丨丨丨自丨丨來山谷添我老生涯誰將陶令黃金菊幻作酴醿白玉花小草真成有風味東園丨丨丨丨丨同上普供世間人味苦誰能愛香寒只自珍長將潭底水丨丨丨丨丨楊誠齊樂府惆悵滿枝紅去年秋晚此園中携手玩芳叢拈花嗅蘂惱煙撩霧沉醉倚西風今年重對芳叢處追往事又成空敲遍闌干向人無語丨丨丨丨丨少年遊歐公桃花黃菊須插滿頭歸與客携壺上翠微江涵秋影雁初飛塵世難逢開口笑菊花丨丨丨丨丨酩酊但酬嘉節了雲嶠登臨不用怨斜暉古往今來誰不老多少牛山何必更沾衣定風波東坡莫待無花折黃菊滿東籬與客携壺上翠微已是有花兼有酒良期不用登臨怨落暉滿醉不須辭丨丨丨丨空折枝寂寞酒醒人散後堪悲節去花愁蝶不知南鄉子黃山谷盡把芳心吐雅致裝庭宇黃花開淡佇細香明艷盡天與助秀色堪餐向曉自有真珠露剛被金錢妬擬買秋天容易獨步粉蝶無情蜂已去要上金樽惟有詩人曽許待宴賞重陽恁時丨丨丨丨丨陶令經回顧免憔悴東籬冷煙踈雨受恩深柳耆卿山茶花格物總論山茶花樹髙者丈餘低者三二尺許枝幹交加葉硬有稜稍厚中闊寸餘兩頭尖長三寸許靣深緑光滑背淺緑花有數種寶珠茶雲茶石榴茶海榴茶躑躅茶茉莉茶真珠茶串珠茶正宫粉塞宫粉一捻紅照殿紅千葉紅千葉白者不可勝數葉各不同海榴茶花青蒂而小石榴茶中有碎花躑躅茶山躑躅樣宫粉茶串珠茶皆粉紅色其中最佳者寶珠茶也或又言此花品中有黃者然亦鮮矣事類花紅白有紅白二種人有千葉者名品頗多不能盡録南方草木記葉薄厚南山茶葩蕚大倍中州者色微淡丨柔丨有毛結實如梨大如拳中有數子如肥皂子形又别自有一種葉丨硬花深紅如中州所出者虞衡志詩集鶴頂紅誰憐兒女花散大氷雪中堂中調丹砂染此丨丨丨坡犀角健長明燈下石闌干長共杉松鬪歲寒葉厚有稜丨丨丨花深少態鶴頭丹久陪方丈曼陀雨羞對先生苜蓿盤雪裏盛開知有意明年歸後更誰看坡開元寺山茶爛如火山茶相對本誰栽細雨無人我獨來説似與君君不見丨紅丨丨雪中開坡簇釘朱樹子團團映碧岑初看喚作木犀林誰將金粟銀絲膾丨丨丨紅菜碗心春早橫招桃李妬嵗寒不受雪霜侵題詩畢竟輸坡老葉厚有稜花色深楊誠齋有嘉樹南國丨丨丨華居亦玉杯曽無冬春改常冒霰雪開梅聖俞首羣花鶯聲老矣移雖晚鶴頂丹時看始嘉雨葉鱗鱗成小蓋春枝艷艷丨丨丨王梅溪水仙花格物總論水仙花金盞銀臺類也叢低葉似薤根似蔥莖首著花白盤開五尖瓣上承黃心宛然盞樣此名金盞銀臺也令一種干葉與酒杯不相類是名為水仙識者所必辨事類馮夷丨丨華隂瑾鄉隄首人服八石得水仙是何名伯清冷傳江妃丨丨二女遊於江漢之濵逄交甫解佩以與之劉向列仙傳楊誠齋詩序世以水仙為金盞銀臺蓋單葉者其中有一酒盞深黃而金色至千葉水仙其中花片捲皺密蹙一片之中下輕黃而上淡白如染一截者與酒杯之狀殊不相似安得以舊日俗名辱之要之單葉者當命以舊名而千葉者乃真水仙云詩集銀臺碧玉簮長洞洞府黃金杯重厭丨丨錢穆父金相胡然此柔嘉支本但自持乃以平地尺氣與松篁夷粹然丨玉丨承以翠羽儀獨立萬稿中氷膠雪垂垂水仙誰強名相冝未相知刻畫近脂粉而况山谷詩吾聞抱太和未易形似窺云云掇花置膽瓶吾今得吾師止齋薤葉丨丨秀且聳蘭香細而幽徐月溪蘭根薤葉丨丨兩不差重蕤風味獨清嘉薄柔肪玊圍金鈿細染鵝黃刺素紗臺盞元非千葉種丰容要是小蓮花向來山谷相看日知是他家是富家楊誠齋香本折送南園玉蘂花併移丨丨到寒家何時持上玉宸殿乞與宫梅定等差山谷玊花淤泥已作白蓮藕糞壤能開黃丨丨可惜國香天不管隨緣流落野人家前人氷肌得水能仙天與竒寒香寂寞動丨丨仙風道骨今誰有淡掃蛾眉篸一枝前人雪膚早於桃李晚於梅氷丨肌丨姑射來明月寒霜中夜靜素娥青女共徘徊劉貢父樂府一點嬌黃雲卧衣裳冷看瀟然風前月下水邊幽影羅襪塵生凌波步湯沐煙波萬頃愛丨丨丨丨成暈不記相逄曽解珮甚多情為我香成陳待和淚勻殘粉靈均千古懷沙恨恨當時忩忩忘把此花題品煙雨離迷僝僽損翠袂遙遙誰整謾寫入瑶琴幽憤弦斷招魂無人境但金杯的皪銀臺潤愁滯酒又還醒賀新郎稼軒一枝蟬影白玉為臺金作盞香是江南名閬苑年時把酒對君歌不斷杯無算花月當樓人意滿中翹載丨丨丨丨亂樂事且隨人意換西樓回首月明花已綻人何逺可惜國香天不管水仙子馬莊父古今合璧事類備要别集卷三十九
