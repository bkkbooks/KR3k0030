body:
  text: 古今合璧事類備要外集卷十八宋謝維新撰刑法門刑辟附謹刑淫刑寛刑刑措峻刑刑法總論古者刑辟所以助治也然亦豈得已而不忌者耶大刑用甲兵其次用斧鉞中刑用刀鋸其次用鑚鑿薄刑用鞭扑大者陳諸原野小者致諸市朝其所由來者上矣若古有訓蚩尤惟始作亂延及于平民相習為惡罔不冦賊鴟義矯䖍而刑辟作焉用刑豈古人之得已哉自是以來唐虞三代皆用五刑五刑者墨劓剕宫大辟也刻其額而湼之曰墨截鼻曰劓刖足曰剕男子割勢婦人幽閉曰宫大辟死罪也此古者肉刑之法也其後又作九刑正刑五兼流贖鞭扑凡九然古者聖人制為此法非以為虐也所以禁虐也三代逺矣秦不師古顒顒然恐天下之叛已淫刑以逞而民心失矣逮漢初藻鑒秦弊然其大辟尚有夷三族之令當三族者皆先黥劓斬左右趾笞殺之梟其首葅其骨肉於市其誹謗詈詛者又先斷舌故謂之具五刑韓彭之屬皆坐此誅文帝時感女子緹縈上言為除肉刑有以易之而肉刑不復行於後世者昉諸此也然刑之為言侀也侀之為言成也言一成而不可變也故古者聖人欽哉欽哉惟刑之恤哉今之刑輕者杖重者處死然民率有輕犯而不顧者何也或者以為肉刑既廢無所忌憚故也豈知夫齊之以刑不若齊之以禮懲之以威不若化之以徳使人人知所自愛則禮義㢘恥之風作而刑辟可錯矣事類坊淫君子刑以丨丨記御宄丨丨以刑左啓書明丨刑丨書用典大司冦之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國丨輕丨二曰刑平國丨中丨三曰刑亂國丨重丨禮方姦先王刑以丨其丨樂記正邪刑以丨丨左禦姦刑以丨丨國晉語禁悍析愿丨丨此刑罰不過百姓曉然皆知夫為不善於幽而蒙刑於顯也荀教中司徒刑以丨丨則人不虣禮助治刑法所以丨丨也劉向疏秋冬刑以丨丨左雷電為刑罰威獄使人畏忌以類其震耀殺戮取象丨丨威也前决罪孟夏之月斷薄刑丨小丨戮罪孟秋之月丨有丨嚴斷刑天地始肅不可以贏記月令草艾丨丨則墨注謂立秋後也記祭統䖝附季秋之月蟄丨咸丨在内皆墐其户乃趣獄刑毋留有罪注殺氣已至有罪者即决也記月令㘅轡刑罰者人之丨丨也後虞詡傳藥石刑罰者治亂之丨丨也後崔寔政論制五刑凡丨丨丨必即天論注制斷也必即天論言與天意合記嚴百刑仲秋之月乃命有司由丨丨丨斬殺必當毋或枉撓記月令威四夷刑以丨丨丨左僖二十五年糾萬民天官太宰六典五曰刑典以誥邦國以刑百官以丨丨丨禮使民觀秋官正月之吉始和布刑于邦國都鄙乃垂刑象之法于象魏丨萬丨丨刑象挾日而歛之禮與衆棄刑人于市丨丨丨之記王制説桎梏蒙卦初六發蒙利用刑人用丨丨丨象曰利用刑人以正法也易蒙卦用甲兵大刑丨丨丨其次用斧鉞中刑用刀鋸其次用鑚鑿薄刑用鞭扑大者陳諸原野小者致之市朝前刑法志故無小臯陶曰帝徳罔愆云云宥過無大刑丨丨丨罪疑惟輕功疑惟重與其殺不辜寧失不經好生之徳洽于民心玆用不犯于有司書用必當天討有罪五刑五用哉注言天以五刑討有罪丨五刑宜丨丨書施惟明臯陶方丨象刑丨丨書期于治舜典臯陶惟兹臣庶罔或于予正汝作士明于五刑以弼五教期予于治刑期于無刑民協于中時乃功懋哉書四罪服舜象以典刑流宥五刑鞭作官刑扑作教刑金作贖刑眚災肆赦怙終賊刑欽哉欽哉惟刑之恤哉流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山丨丨而天下咸丨書三辟興夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑丨丨之丨皆叔世也左垂象魏詳見前注徇木鐸春官小宰丨以丨丨曰不用法者國有常刑禮鑄刑書鄭人丨丨丨叔向使詒子産書曰始吾有虞於子今則已矣昔先王議事以制不為刑辟懼民之有爭心也猶不可禁禦是故閑之以義糾之以政行之以禮守之以信奉之以仁制以禄位以勸其從嚴斷刑罰以威其淫云云今吾子相鄭國制參辟丨丨丨將以靖民不亦難乎詩曰儀式刑文王之典日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知爭端矣將棄禮而徴於書錐刀之末將盡爭之亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國將亡必多制其此之謂乎復書曰若吾子之言僑不才不能及子孫吾以救世也既不承命敢忘大惠士文伯曰火見鄭其火乎火未出而作火以丨丨器藏爭辟焉火如象之不火為何左昭六年鑄刑鼎趙鞅丨丨丨書范宣子所為刑書焉仲尼曰人在鼎矣何以尊法謂棄禮徴書也左用竹刑鄧駟歂殺鄧析而用其竹刑君子謂子然於是不忠茍有可以加於國家者棄其邪可也靜女之三章取彤管焉干旄何以告之取其忠也故用其道不棄其人詩云蔽芾甘棠勿剪勿伐召伯所茇思其人猶愛其樹况有其道而不恤其人乎子然無以勸能矣注鄧析鄭大夫欲改鄭所鑄舊制不受君命而私造刑法書之於竹簡故言竹刑左定九年除肉刑漢文帝時太倉令淳于公有罪當刑詔獄逮繫長安淳于公無男有五女當刑會逮罵其女曰生子不生男緩急非所益也其少女緹縈自傷悲泣乃隨其父至長安上書曰妾父為吏齊中皆稱其㢘平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道亡繇也妾願没入為官婢以贖父刑罪使得自新書奏天子悲憐其意遂下令曰制詔御史今法有肉刑三而姦不止其咎安在毋乃朕徳之薄而教不明歟吾甚自媿故夫訓道不絶而愚民陷焉朕甚憐之夫刑至斷支體刻肌膚終身不息何其刑之痛而不徳也豈稱為民父母之意哉其丨丨丨有以易之及令罪人各以輕重不亡迯有年而免具為令丞相張蒼御史大夫馮敬奏言肉刑所以禁姦所由來者久矣陛下下明詔憐萬民之一有過被刑者終身不息及罪人欲改行為善而道無由至臣謹議請定律曰諸當髠者完為城旦舂當黥者髠鉗為城旦舂當劓者笞三百當斬左趾者笞五百當斬右趾及殺人先自告及吏坐受賕枉法守縣官財物而即盗之已論命復有笞罪者皆棄市罪人欲已决完為城旦舂滿三歲為鬼薪白粲一歲為𨽻臣妾一歲免為庶人滿二歲為司冦一歲及作如司冦二歲皆免為庶人其亡逃及有罪耐以上不用此令前令之刑城旦舂歲而非禁錮者如完為城旦舂歲數以免臣昧死請制曰可其後外有輕利之名内實殺人斬右趾者又當死斬左趾者笞五百當劓者笞三百率多死前刑法志易釱之科魏武造丨丨丨丨釱音逑鐵鉗減死之令明皇施丨丨丨丨並隋志季秋行罰宣帝選于定國為廷尉求明察寛怒黃霸等以為廷平丨丨後請讞時上常幸宣室齋居而決事獄刑號為平矣前季夏行刑隋文帝嘗發怒六月棒殺人大理少卿趙綽固争曰丨丨之月天地成長庶類不可以此時誅殺帝報曰六月雖曰生長此時必有雷霆天道既於炎陽之時震其威怒我則天而行有何不可隋志用刑有五隋唐之丨丨丨丨一曰笞二曰杖三曰徒四曰流五曰死笞刑五自十至于五十杖刑五自六十至于百徒刑五自一年至于三年流刑三自一千里至于二千里死刑二絞斬為刑又六太宗即位詔房𤣥齡等復定舊令𤣥齡等以謂肉刑既廢今以笞杖徒流死為五刑而又刖足是六刑也於是除斷趾法唐志除斷趾法見前注去鞭背刑太宗嘗覽明堂針灸圖見人之五臟皆近背針灸失所則其害致死歎曰夫箠者五刑之輕死者人之所重安得犯至輕之刑而或致死遂詔罪人無得鞭背唐史謹刑哀矜孟氏使陽膚為士師曽子曰上失其道民散久矣如得其情則丨丨而勿喜語哀敬丨丨折獄書明慎君子以丨丨用刑而不留獄易又丨而不留丨而不擾史盡心刑者侀也侀者成也一成而不可變故君子丨丨焉記伏念丨丨五六日至于旬時書審克五刑之疑有赦其丨丨之書閱實丨丨其罪簡孚五辭丨丨正于五刑又丨丨有衆欽恤丨哉欽哉惟刑之丨哉並書無刑刑期于丨丨書止辟辟以丨丨乃辟同上齋决漢宣帝見前刑辟注詳涕泣漢張歐叔明為御史大夫未嘗案人官屬亦不大欺上具獄有可却却之謂平反也不得已者丨丨面封之注面封不忍見之去酒肉杜緩為守治諸陵縣每冬月具獄常丨丨丨省食官屬感其恩也泣丹筆盛吉為廷尉妻執燭持丹筆相向泣曰吾可使一人濫禍及子孫召平處沈傳師字子言為宣州於吏治明吏不敢罔謹重刑法每斷獄丨幕府丨丨輕重盡合乃論决請覆奏徐堅字元固遷萬年主簿天授三年上書言囚有五聴令有三覆慮失情也比犯大逆詔使者勘當得實輙决人命至重萬一有不實欲訴無由以就赤族豈不痛哉此不足檢下之姦亂適長使人威福耳臣丨如令丨丨則死者無恨寛刑流宥丨丨五刑罪疑丨丨惟輕並書畫衣有虞之時丨丨冠異章服以為戮而民不犯漢文詔出金舜金作贖刑注金黃金誤而入刑丨丨以贖罪書用象刑上古丨丨丨是殺人者不死傷人者不刑是惠暴而寛惡也前志作贖刑穆王訓夏丨丨丨書問有子否吳祐為膠東相有毌丘長者殺人臨刑祐丨丨丨丨長曰有妻無子乃緩其桎梏令妻入獄有孕然後行刑長泣曰何以報吳君後生子以吳為名宜進藥死鍾離意字子阿為瑕丘令有吏行盗意不忍行刑罷其職放歸其父曰有道之君以義刑人子丨丨丨丨公累獲原賈敦頤為洛陽司馬以丨丨下獄太守貫之有司執不貫帝曰人孰無過吾去太甚者若悉繩以法雖子不得于父况臣得亊其君乎遂丨丨死罪悉原唐太宗親録囚徒閔丨丨者三百九十人縱之還家期以明年秋即刑及期囚皆詣朝堂無後者太宗嘉其誠信丨丨之笞杖行決笞一十决笞五下二十笞六下三十笞七下四十笞八下五十笞十下並放杖六十臀杖十二七十臀杖十三八十臀杖十五九十臀杖十七一百臀杖二十並放名例勅徒流聴贖笞刑五一十贖銅一斤至五十五斤杖刑五六十贖銅六斤至一百十斤徒刑五一年贖銅二十斤一年半三十斤二年四十斤二年半五十斤三年六十斤流刑三二千里贖銅八十斤二千五百里九十斤三千里一百斤死刑二絞斬贖銅一百二十斤凡贖銅每斤一百二十文峻刑慘礉少恩韓非喜刑名極丨丨丨丨史鞭貫立威子玉治兵終日而畢丨七人丨三人耳左又丨丨丨丨筆削入罪白氏帖披毛求疵崔元綜雖外示謹厚而情深刻薄每受制鞫獄必丨丨丨丨甚於重辟人多鄙之唐史斷舌決口史洪肇字化元凡民抵罪吏以白洪肇洪肇但以三指示之吏即腰斬之又為丨丨丨丨斮筋折足之刑五代史朶頥垂涎南漢劉龑性聰悟而苛酷為刀鋸支解刳剔之刑每視殺人則不勝其喜不覺丨丨丨丨呀呷人以為真蛟蜃子弟不宥武宗見李徳裕誅劉稹等大刑舉矣而性嚴刻故時竊盗無死所以原民情迫於飢寒也至是贓滿千錢者死至宣宗乃罷之而宣宗亦自喜刑名常曰犯我法者雖丨丨丨丨也然少仁恩唐自是衰矣唐刑法志少長皆坐王世充顧下多背已乃峻刑暴禁以威之戸一人逃無丨丨丨丨父子兄弟夫婦許相告免令五五相保一家叛舉五坐誅唐淫刑㭬黔蚩尤惟始作亂延及于平民罔不冦賊鴟義姦宄奪攘矯䖍苗民弗用靈制以刑惟作五虐之刑曰法殺戮無辜爰始淫為劓刖丨丨炮烙商紂重為刑辟為熨斗以火燒然使人舉之手爛更為銅柱以膏塗之加於炭火之上使有罪縁之紂與妲己以為大樂名曰丨丨之刑通鑑外紀踊貴齊景公繁於刑有鬻踊者晏子對曰丨丨屨賤注丨刖足者屨言刑多左昭公五年鑊烹戰國韓任申子秦用商鞅連相坐之法造參夷之誅増加肉刑大辟有鑿顛抽脅丨丨之刑注師古曰鼎大而無足曰鑊以鬻人也前刑法志大夫逃死楚多淫刑其丨丨丨丨於四方左百姓不親衛國並為威虐丨丨丨丨莫不相攜持而去詩北風赭衣塞路秦始皇時姦邪並生丨丨丨丨天下愁怨潰而叛之前刑法志𤣥鉞肆市秦落嚴霜於政敎揮流電於邦國棄灰偶語生愁怨於前毒網凝科害肌膚於後丨丨丨於朝丨赭衣飄於路衢將閭有一劒之哀茅焦請列星之數隋志老人遮説梁武帝天監三年南郊秣陵丨丨丨丨帝曰陛下為法急於黎庶緩於權貴非長久之術誠能反是天下幸甚帝於是思有以寛之數人刼謂隋髙祖行署取一錢棄市之法有四人共盗一榱桷三人同竊一𤓰事發即時行决有丨丨丨執事者丨之曰吾豈求財者耶但為枉人來耳而為我奏至尊自古以來體國立法未有盜一錢而死也而不為我以聞吾更來而屬無類矣帝聞之為停盗取一錢棄市法隋志鋸剉屠裂齊文宣以功業自矜恣行酷暴昏狂酗醟任情喜怒為大鑊長丨丨錐之屬並陳於庭意有不快則手自丨丨轘梟磔射隋煬時楊𤣥感反帝誅之罪及九族其尤重者行丨裂丨首之刑或丨而丨之命公卿以下臠噉其肉百姓怨嗟天下大潰並隋志刑措勝殘子曰善人為邦百年亦可以丨丨去殺矣語逺罪民日遷善丨丨而不自知也孟止殺臯陶刑期于無刑民協于中注以殺丨丨而刑措書止辟君陳辟以丨丨乃辟同上獄生櫓北齊宣帝天保初大赦郡無一囚率群吏拜詔而已丨内丨丨桃木蓬蒿並滿每旦圜門虚寂無訴訟者謂之神門北史囹生草隋劉瞻為平鄉令七年風敎大治獄中無繫囚爭訟絶息丨圄皆丨丨庭可張羅隋本傳鵲巢其庭唐元宗即位二十年間號稱治平衣食富足人罕犯法是嵗刑部斷天下死罪五十八人徃時大理獄相傳鳥雀不栖至是丨丨丨丨羣臣賀以為幾致刑措唐志柳子正符隋氏環四海以為鼎跨九垠以為罏釁以毒燎煽以虐焰其人沸湧灼爛號呼騰蹈莫有救止於是大聖乃起丕降霖雨濬滌盪沃蒸為清氛疏為冷風人乃漻然休然相晞以生相持以成相彌以寧琢斮屠剔膏流節離之禍不作而人乃克完平舒愉尸其肌膚以達于夷途焚坼抵椅奔走轉死之害不起而人乃克鳩類集族歌舞悦懌用祇于元徳云云人以有年簡于厥刑不殘而懲是謂嚴威小屬而支大生而孥愷悌祇敬用底于治陸贄奏議今京邑初平所用刑章尤宜謹審一輕一重理亂所生李庾西都賦司刑無鬼哭之庭大理有烏巢之獄韓愈聖徳詩八月壬午闢棄城走載妻與妾包裹稚乳是日崇文入處其宇分散逐捕捜原剔藪闢窮見窘無地自處俯視大江不見洲渚遂自顛倒若杵投臼取之江中枷脰械手婦女纍纍啼哭拜叩來獻闕下以告廟社周示城市咸使觀覩解脫攣索夾以砧斧婉婉弱子赤立傴僂牽頭曳足先斷腰膂次及其徒體骸撑拄末乃取闢駭汗如雨揮刀紛紜争切膾脯柳氏斷刑論余既為斷刑論或者以釋刑復於余其辭云云余不得已為之言焉夫聖人之為賞罰者非他所以懲勸者也賞務速而後有勸罰務速而後有懲必曰賞以春夏刑以秋冬而謂之至理者偽也使秋為善必俟春夏而後賞則為善者必怠春為不善者必俟秋冬而後罰則為不善者必懈為善者怠為不善者懈是敺天下之人而入於罪又緩而慢之以滋其懈怠此刑之所以不措也必使為善者不越月踰時而得其賞則人勇而有勸焉為不善者不越月踰時而得其罰則人懼而有懲焉為善者日以有勸為不善者日以有懲是敺天下之人而從善逺罪也敺天下之人而從善逺罪是刑所以措而化所以成也或者務言天而不言人是惑于道者也胡不謀之人心以熟吾道吾道之盡而人化矣是知蒼蒼者焉能與吾事而暇知之哉果以為天時之可得順大和之可得致則全吾道而得之矣全吾道而不得者非所謂大和也是亦必無而已矣又何必枉吾之道曲順其時以謟是物哉吾固知順時之得天不如順人順道之得天也何也使犯死者自春而窮其辭欲死不可得貫三木加連鎖而致之獄吏大暑數月痒不得搔痺不得揺痛不得摩飢不得時而食渴不得時而飲目不得瞑支不得舒怨號之聲聞於里人如是而大和之不傷天時之不逆是亦必無而已矣彼其所宜得者死而已矣又若是焉何哉或者乃以雪霜者天之經也雷霆者天之權也非常之罪不時可以殺人之權也當刑者必順時而殺人之經也是又不然夫雷霆雪霜者特一氣耳非有心於物者也聖人有心於物者也春夏之有雷霆也或發而震破巨石裂大木木石豈為非常之罪也哉秋冬之有霜雪也舉草木而殘之草木豈有非常之罪也哉彼豈有懲於物也哉彼無所懲則効之者惑也果以為仁必知經智必知權是又未盡於經權之道也何也經也者常也權也者達經者也皆仁智之事也離之滋惑矣經非權則泥權非經則悖是二者强名也曰當斯盡之矣當也者大中之道也强而為名大中之器用也知經而不知權不知經者也知權而不知經不知權者也偏知而謂之智不智者也偏守而謂之仁不仁者也知經者不以異物害吾道知權者不以常人怫吾慮合之於一而不疑者信于道而已矣且古之所以言天者葢以愚蚩蚩者耳非為聰明睿智者設也或者之未達不思之甚也皮日休原親能嗣其親不曰子乎吾觀夫今之世誨其子者必檟肌篣骨傷愛毁性以為教嗚呼孟子所謂古者易子而教誠有㫖歟不能教其子者是亡其身者也不能得其親者是捨其族者也古者佞臣愛人之貴過乎其親必捨而争公子開是也愛人之權過乎其子必殺而徇之易牙是也自兹已降為夫强臣者將欲奪人之宗必殺己子王莽殺子字是也噫教尚不可况其殺歟或曰均是親也均是害也則周公誅管蔡石碏殺石厚叔向僇叔魚漢文流淮南可乎曰均是親也賢則能嗣親凶則能覆族均是害也周公不誅則他人誅之石碏不殺則他人殺之叔向不僇則他人僇之漢文不流則他人流之已刑則及一人他刑則及其族此聖賢所以惜其族也刑者仁在其中矣沈顏象刑解舜禹之代象刑而人不敢犯言象刑者以赭以墨染其衣冠異其服色凡為三等及秦法苛虐方用肉刑鋸鑿箠扑楚毒畢至而人犯愈多俗益不治其故何也非徒上古淳朴人易為化亦聖智𤣥逺深得其理故也夫法過峻則犯者多犯者多則刑者衆刑者衆則民無恥民無恥則雖曰劓之刖之笞之扑之而不為畏也何以知其然耶夫九人冠而一人髽則髽者慕而冠者勝九人髽而一人冠則冠者慕而髽者勝民不知冠之髽之為勝但見衆而為慕矣今免者多而刑者少人尚慕其多矣及刑者多而免者少焉以少為勝乎故曰法過峻則犯者多犯者多則刑者衆刑者衆則民無恥民無恥則雖曰劓之刖之笞之扑之而不為畏也凡人之心知恣其所為而不知戒其所失今辱而笞之不足以為法也何者盖笞絶則罪釋痛止則恥滅恥滅則復為非矣故不足以為法也虞舜染其衣冠異其服色是罪終身不釋恥畢世不滅豈特已以為恥也人之見之者皆以為恥也皆以為戒也愚故曰非徒上古淳朴人易為化亦由聖智𤣥邈深得其理故也朱敬則濫刑疏臣聞李斯之相秦也行申商之法重刑名之家杜私門張公室棄無用之費捐不急之官惜日愛功疾耕急戰人繁國富乃屠諸侯此捄弊之術也故曰刻薄可施於進趨變詐可陳於攻戰兵猶火也不戢將自焚况鋒鏑已銷石城又毁諒可易之以寛泰潤之以淳和八風之樂以柔之三代之禮以導之秦既不然淫虐滋甚徃而不返卒至土崩此不知變之禍也陸賈叔孫通之事漢王也當滎陽成臯之間糧饋已窮智勇俱困不敢開一說効一奇惟進豪猾之才薦貪暴之客及區宇適平干戈向戢金鼓之聲未歇傷痍之痛尚聞二子顧盻綽有餘態及陳詩書説禮樂開王道謀帝圖髙皇帝忿曰吾以馬上得之安事詩書乎對曰馬上得之可馬上理之乎髙皇黙然於是陸賈著新語叔孫通定禮儀始知天子之尊此知變之善也向使髙皇排二子而不敎置詩書而不顧重攻戰之吏尊首級之材複道爭功張良以知其變拔劒擊柱吾屬不得無謀即晷漏難逾何二十帝乎亡秦是續何二百年乎故曰仁義者聖人之蘧廬禮經者先王之陳迹然則祝辭向畢芻狗須投淳精已流糟粕可棄仁義尚捨况輕此者乎自文明草昧天地屯蒙二叔流言四凶搆難不設鈎距無以應天順人不切刑名不可摧姦息暴議置神器開吉端曲直之影必呈包藏之心盡露神道助直無罪不除人心保寧無妖不戮以兹妙筭窮造化之幽深用此神謀入天人之秘術故能計不下席聴不出闈蒼生晏然紫宸易主大哉偉哉無得而稱也豈比造攻鳴條大戰牧野血變草木頭柝不周可同年而語乎然而急趨無善迹促柱少和聲拯溺不規行療飢非鼎食即向時之妙䇿乃當今之芻狗也伏願覽秦漢之得失考時事之合宜審糟粕之可遺覺蘧廬之須毁見機而作豈勞終日乎陛下必不可偃蹇太平徘徊中路伏願改法制立章程下怡愉之辭流曠蕩之澤斷萋菲之牙角頓奸險之鋒芒塞羅織之源掃朋黨之迹使天下蒼生坦然大悦豈不樂哉韋嗣立濫刑疏臣竊嘗聞之在堯舜之日畫其衣冠當文景之時幾致刑措厯兹千載以為美談臣伏惟陛下睿哲欽明窮神知化自軒昊以降莫之與京獨有徃之論法或未盡善皆由主司姦兇惑亂視聴尋而陛下聖察具詳之矣然竟未能明其本源察其前事令天下萬姓識陛下本心尚使四海多銜寃之人九泉有抱痛之鬼臣誠愚暗不識大綱請為陛下始末而言其事楊豫之後刑獄漸興用法之伍務於窮竟連坐相牽數十年不絶遂使巨姦大猾伺隙乘間内包豺狼之心外示鷹鸇之迹隂圖潛結共相影會搆似是之言成不赦之罪皆深為巧誣恣行楚毒人不勝痛便乞自誣公卿士庶連頸受戮道路籍籍雖知非辜而鍛煉已成辨占皆合縱臯陶為理于公定刑則謂汚宫毁柩猶未塞責雖陛下仁慈愛念恤獄緩死及覽辭狀便已周密皆謂勘鞫得情是其實犯雖欲寛捨其如法何於是小乃身誅大乃族戮相縁並坐者不可勝言此豈宿構讎嫌將申報復皆圖茍成公效自求官賞當時稱傳謂為羅織其中陷刑得罪者雖有敏識通才被告言者便遭枉抑心徒痛其寃酷口莫能以自明或受誅夷或遭殛竄並甘心引分赴之如歸故知弄法侮文傷人實甚賴陛下特迴聖察昭然詳究周興丘勣之類𢎞義俊臣之徒皆相次伏誅事暴遐邇而朝野慶泰若再覩陽和且如仁傑元忠俱罹枉陷被勘鞫之際亦皆已自誣向非陛下至明垂以省察則葅醢之戮已及其身欲望輸忠聖代安可復得陛下擢而升之各為良輔國之棟幹稱此二人何乃前非而後是哉誠由枉陷與甄明耳臣但恐徃之得罪者多並皆此流則向時之寃其數甚衆昔殺一孝婦尚或降災而濫者盖多寧無怨氣怨氣上達則水旱所興欲望歲登不可得也陛下儻𢎞天地之大徳施雷雨之深仁歸罪於削刻之徒降恩於枉濫之伍自垂拱以來大辟罪巳下常赦所不原者罪無輕重一皆原洗被以昭蘇伏法之輩追還官爵縁累之徒普霑恩造如此則天下皆知比所陷罪元非陛下之意咸是虐吏之辜幽明歡欣則感通和氣和氣下降則風雨以時風雨以時則五榖豐稔歲既稔矣人亦安矣太平之美亦何逺哉伏願陛下深察崔仁師刑名疏自昔羲農以降爰及唐虞或設言而人不犯或畫像而下知禁三代之盛泣辜解網父子兄弟罪不相及咸臻至理俱為稱首及其叔代辭獄滋煩周之季年不勝其弊烈火原于子産峭澗起于安于韓季申商爭持急刻參夷相坐始于此也秦用其法遂至土崩漢髙之務寛大未為盡善文帝之存仁厚仍多凉徳遂使新坦族滅信越葅醢見嗤良史謂之過刑晉魏至隋雖有損益凝脂猶密秋荼尚煩皇上爰發至仁念兹刑憲酌前王之令典採徃哲之嘉猷革弊蠲苛可大可久仍降綸綍頒之九區故得斷獄數簡手足有措刑清化洽未有不安忽以暴秦酷法為隆周中典乖惻隱之情反惟行之令進退參詳未見其可且父子天屬昆季同氣誅其父子足累其心此而不顧何愛兄弟既欲改法請更審量徐有功疏唐季人多逆節鞠詛結斷刑慘獄嚴古今合璧事類備要外集卷十八
