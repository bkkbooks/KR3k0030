body:
  text: 古今合璧事類備要續集卷二十八宋謝維新撰類姓門曽魯國徴音古今姓纂夏少康封其少子曲烈于鄫春秋時為莒所滅鄫太子巫仕魯去邑為曽氏見代本事類三省吾身語曽子曰吾日丨丨丨丨為人謀而不忠乎與朋友交而不信乎傳不習乎𢎞毅任重曽子曰士不可以不丨丨丨丨而道逺同上敢治魏庠皇朝曽致堯字正臣撫州南豐人為兩浙轉運使諫議大夫魏庠知蘇州介舊恩以進志堯劾其罪太宗曰是丨丨丨丨可畏也名聞天下曽鞏字子固生而警敏年十二能文及冠遊太學歐陽修見其文而奇之自是丨丨丨丨史書宜付神宗手詔中書曰五朝丨事丨丨曽鞏遂以為史館修撰元豐類藁曽鞏平生嗜書家藏至二萬餘卷手自讐對雖白首不倦有文集曰丨丨丨丨五十卷外集十卷所為文字開闔馳騁應用不窮然言近指逺要其歸必止於仁義文譬星斗曽鞏初與王安石友善安石稱其丨辭以丨水之江漢丨之丨並同上材髙識明曽紆字公衮撫之南豐人文肅公布之第四子汪彥章志其墓曰公丨丨丨丨博極書史始以通知古今裨贊左右為家賢子弟中以文章翰墨風流醖藉為時勝流晚以精明強極見事風生為國能吏雖低徊外補位不至公卿而所交知一時英豪世之言人物者必以公一二數班吏束手曽公亮字明仲泉州晉江人知三班院三丨丨世所賤薄老胥抱文書升堂取判者髙下在口異時長官漫不省察謹占名而已公亮盡取前後條目置坐側案以從事吏丨丨無能為後至者莫能易也多知典章公亮精於法令丨丨朝廷丨丨臺閣故事時韓琦為上相歐陽修參知政事琦於法令典故以問公亮文學人材以問修百官奉法循理而朝廷治同上題武夷句曽懋曽開曽幾兄弟俱贑人也懋為尚書生迪方迪之子集終廣西憲開幾為侍郎幾賜諡文清為李公擇之甥生左司逢侍郎逮逮子栗近為總卿逢子槩槃槃近為工部丨丨丨有丨云還持病眼將昏力來看仙山未了青母巨鹿羽音古今姓纂母丘氏或為毋氏開元右補闕母嬰洛陽人一云吳人事類闕沙汝南宫音古今姓纂姓苑東莞有沙氏事類闕也晉昌宮音事類闕養山陽羽音古今姓纂楚有養由基孝子傳有養奮梁有養彭舒事類闕鞠汝南宫音古今姓纂后稷生不窋不窋生鞠有文在手曰鞠支孫氏焉皇朝有鞠詠事類闕須渤海羽音古今姓纂風俗通太昊風之後有須句國又殷有密須並以國為氏魏有須賈漢有平陸侯須無紹封四代事類闕豐昭陽宫音古今姓纂左傳鄭穆公子豐之後以王父字為氏有豐施豐卷魯有豐點宋有豐衍事類論京惇誤國皇朝豐稷字相之明州鄞縣人徽宗即位以左諫議大夫召道除御史中丞稷對首丨蔡丨之罪京貶又論章丨丨丨惇黜又言宣仁佐佑哲宗垂簾聽政退黜小人洎小人復用遂造誣謗今宜辨明又史官修神宗實録轉以王安石日録亂之今修神宗實録願擇史官申飭成書又數上疏言近習之非會曽布由內侍進將拜相稷謂臺屬曰合共論之巢彭城闕古今姓纂有巢氏之後堯時有巢父夏殷有巢國左傳吳有巢牛臣後漢司空巢堪事類朋友義無愧皇朝巢谷字元修眉州眉山人嘗舉進士京師見舉武藝者心好之谷素多力遂棄其舊學蓄弓箭習騎射久之業成而不中第去遊秦鳳涇原間所至友其秀傑蘇軾謫黃州與谷同鄉幼而識之因與之遊及軾與其弟轍在朝谷浮沈里中未嘗一見紹聖初軾轍謫嶺海平生親舊無復相聞者公獨慨然自眉山誦言欲徒步訪兩蘇聞者皆笑其狂元修之賢潁濵先生筆之於傳謂谷於丨丨之丨丨丨髙恭者此豈無意哉關隴西商音古今姓纂風俗通關令尹喜之後一云夏大夫關龍逄之後事類魏之賢人文中子或問關朗子曰丨丨丨丨也孝文沒而宣武立穆公死而關朗退魏之不振有由哉為世虎臣蜀關羽字雲長斬顔良降于禁威震華夏拜為前將軍假節鉞稱萬人之敵丨丨丨丨報效曹公有國士之風對問治要唐關播字務元衛州人德宗初丨殿中帝丨政丨之丨播曰為政之本要得有道賢人乃治帝曰朕比下詔求賢才又遣使黜陟搜逮所遺播曰陛下雖求賢又使舉薦然止得求名文詞士焉有有道賢人肯奉牒丐舉選邪帝曰善蒯襄陽闕古今姓纂風俗通晉大夫蒯得之後見左傳禮記漢帝有蒯徹漢書齊辨士蒯通本名徹與漢武同名史家追改之事類説號雋永前蒯通范陽人曹參請為客拾遺舉過顯賢進能論戰國時説士權變亦自序其丨丨曰丨丨相西河商音古今姓纂姚秦有相雲代居馮翊事類闕查齊卿商音古今姓纂宣城涇縣武德池南宕二州刺史查文熙鄱陽貞元有富人查祥事類闕候東海羽音古今姓纂周禮候人氏子孫因官為姓事類闕荆廣平角音古今姓纂熊繹國亦號荆支孫因氏焉事類為政清淨家語荆公行年十五而攝相事孔子聞之使人往觀其丨丨使人反曰其朝丨丨而少事歌易水寒史記荆軻為燕丹報仇餞於易水丨曰風蕭蕭兮丨丨丨壯士一去兮不復還及奉燕督亢圖進於秦皇圖窮而七首見紅平昌宫音古今姓纂楚元王交子紅侯劉富之後事類闕遊廣平宫音古今姓纂左傳鄭穆公子偃字子遊之後以王父字為氏春秋氏族圖鄭國遊氏子遊子太叔公孫楚遊德事類廉白有政北史遊雅字伯度太武時為雍州刺史在任丨丨甚丨惠丨坎窟讀書遊明根字志逺嘗於白渠丨為丨丨丨積嵗太武擢任散騎常侍使宋宋孝武稱其長者迎送禮加常使遷兖州刺史為政清平為儀曹長清約恭謹致仕為五更國有大事恆璽書訪之歷官內外五十餘年處身以仁和接物以禮讓時論貴之文雅方正遊肇字伯始博綜經史謙素端重丨丨見任帶魏太守為政清簡為畿內大使黜陟善惡賞罰分明廉御史中尉直繩所舉莫非傷風敗俗於吏事斷決反覆至於再三然後下筆雖寵勢干請終無回撓丨丨之操時人服之文行知名遊酢字定夫建州建陽人兄醇與酢俱以丨丨丨丨酢初受業于程皓皓知扶溝縣以道學為己任酢為掌其事由是問學益進又事程頤頤器之書求所學陳正同知建寧因立像設祠於學而屬晦菴朱公熹記其事曰先生逺矣學者登是堂而拜其像於是記也考其師友之淵源退訪其丨而讀之於以丨先生之丨以丨者果惡乎在幸而心自得之則亦無以異乎親為炙之矣詩曰人之好我示我周行又曰髙山仰止景行行止熹雖不敏願與承學之士勉焉以無忘陳公之德晦菴所謂退訪其書而讀之即公所著易説詩二南義中庸義論語孟子雜解也同上竺東海徵音古今姓纂本天竺胡人後漢歸中國而稱竺氏事類闕權天水徵音古今姓纂芊姓顓頊之胤封楚楚若敖之孫鬭緍尹權因氏焉秦滅楚遷大姓於隴西因居天水又傳云楚武王克權使鬭緍尹之今南郡當陽縣東南有權城事類有國良翰北史權景宣字暉逺少聰悟任氣俠曉兵權有智略除南陽郡守盜賊斂迹人得隸業百姓立碑頌德總戎薄伐著尅敵之功布政蒞人垂稱職之譽豈非丨丨之丨丨歟不阿貴近唐權萬紀京兆人擢治書侍御史房玄齡王圭掌內外官考萬紀劾其不平帝以為丨丨丨丨由是奬禮飲三斗塵權懷恩萬紀族孫擢萬年令賞罰明見惡輒收時語曰寧丨丨丨丨無逢權懷恩每盛服妻子不敢仰視更五州刺史所居威名赫然吏重足立可為宰輔權皋字士繇泰州人韓洄王定與友善常評臯丨丨丨丨師保李華亦以為分天下善惡一人而已搢紳羽儀權德輿字載之未冠以文章稱德宗聞其才召為左補闕德輿生三嵗知辨四聲四嵗能賦詩積思經術無不貫綜自始學至老未曽一日去書嘗著論辨漢所以亡西京以張禹東京以胡廣其文雅正當時公卿侯王功德卓異者皆所銘紀雖動止無外飾其風流醖藉自然可慕正元元和間為丨丨丨丨云逯廣平徵音古今姓纂風俗通後漢大司空逯石趙有逯明唐夏官郎中逯仁傑事類闕蓋汝南商音古今姓纂漢有蓋公曹參為相避正堂舍蓋公事類司隸校尉前蓋寬饒字次公魏郡人明經為郡文學以孝亷為郎舉方正對䇿髙第遷諫大夫擢丨丨丨丨刺舉無所回避虎牙將軍後蓋延字巨卿漁陽人長八尺彎弓三百斤光武以為丨丨丨丨耆儒受業唐蓋文達冀州人明春秋三家刺史竇抗集諸生講論孔穎達劉軌思並以丨丨丨丨代作帝師自榮至典世宗其道父子兄弟丨丨丨丨同上仁者之勇晉桓彛字茂倫早獲盛名雅為周顗所重蘇峻之亂固守經年城陷遇害抱中和之氣懷不撓之節知處死之為易丨丨丨丨不其然乎吹笛盡妙桓伊字叔夏善丨丨丨一時之丨名怖小兒南史桓康江南人畏之以其丨丨丨丨病瘧者寫其形帖牀壁無不立愈者志惟忠孝唐桓彥範字士則潤州人狄仁傑曰君之才當自光大攻屬斯文所丨丨丨丨居若不能言及議論帝前安辭定色辨爭愈切卒諡忠烈公括陽羽音古今姓纂左傳魯昭公子公衍公為之後漢主爵都尉公儉事類闕已上四百單八姓並依目今書字俗本百家姓銓次編葺姓纂次事類不依韻略次序蓋欲便世俗上下之通用外有百家姓內續添類姓及覆姓今就內再摘其顯姓並用一二次第編葺成全書考古通今之士幸鑒焉古今合璧事類備要續集卷二十八
