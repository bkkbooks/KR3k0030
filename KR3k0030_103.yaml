body:
  text: 古今合璧事類備要後集卷三十四宋謝維新撰九卿門大理卿少卿評事大理正寺丞司直寺簿歷代沿革大理古官也舜命臯陶作士正五刑孔安國曰理官也周官為司冦晉文公使李離為理韓詩外傳曰謂察理刑獄也秦置廷尉掌刑辟有正左右監漢因之景帝更名大理武帝復為廷尉宣帝置左右廷尉平哀帝復為大理取天官貴人之牢曰大理之義王莽改曰作士後漢復為廷尉郡國讞疑皆處當以報魏復為大理復改廷尉以世宗為之而郭氏尤盛郭躬為廷尉家世掌法務在寬平乃條諸重文可從輕者四十一事悉令皆施行躬奏讞法科多所生全梁為秋卿加卿字曰廷尉北齊復為大理卿隋為大理寺唐因之卿一人少卿二人龍朔二年改為詳刑寺咸亨復武后光宅元年改為司刑寺神龍復卿一人掌鞫獄定刑決諸疑讞國朝大理寺以朝官一員或二員判寺官一員兼少卿事建隆二年以工部尚書竇儀判寺事會要故事臺省長官兼判公事得言判某官事如晉朝尚書左丞崔祝兼判太常卿事是也若止言寺事則其屬丞正並可行之竇儀兼判太常寺又兼判大理寺事皆新例也凡獄訟之事隨官司決劾不復聽訊但掌斷天下奏獄送審刑院詳訖同書以上於朝熙寧九年神宗謂國初廢大理獄非是以問孫洙洙對合旨於是下詔以京師官寺凡有獄皆繫開封府司録司及左右軍巡三院囚逮猥多難於隔訊又暑多瘦死因緣留滯動涉歲時稽參故事宜屬理官可復置大理獄天下奏案刑部審刑院詳斷置卿一少卿二丞四始命崔台符知卿事廳周輔楊汲為少卿各舉丞及檢法官四朝志官制行左斷刑右治獄各五案左廳斷刑曰詳刑詳讞宣黃分簿奏表右廳治獄曰左推右推寺案知雜檢治元祐間因鮮于侁所請廢大理獄職略後復卿掌折獄詳刑鞠獄之事凡職務分左右天下奏劾命官將校及大辟囚以下以疑請讞者𨽻左斷刑則司直評事詳斷丞議之正審之若在京百司事當推治或特旨委勘及係官之物應追究者𨽻右治獄則丞專推鞠蓋少卿分領其事而卿總焉四朝志建炎三年併省寺監而大理如故省卿而斷刑治獄少卿各一員中興會要事類作士帝曰臯陶汝丨丨五刑有服五服三就五流有宅五宅三居書舜典明刑帝曰臯陶惟茲臣庶罔或干于正汝作士丨于五丨以弼五教大禹謨司刑古曰丨丨廷尉秦曰丨丨並六帖棘署聽獄於丨木之丨白帖又記王制凡聽五刑之訟成獄辭史氏以獄成告於王王聽之正獄成告於大司寇大司寇聽之棘木之下注正周卿師之屬竹刑丨丨三尺高門于定國父于公其門閭壞父老方與共治于公曰可丨大其丨令容駟馬高車我治獄多陰德子孫必有興者至定國為丞相于公為郡曹決獄稱平漢書又丹盛吉為廷尉性多哀矜每至冬罪囚當斷夜省刑獄其妻執燭垂淚視事二十年天下稱其有恩無寃虞預會稽典録九則崔德政針邈矣臯陶翊唐作士設為犴狴丨丨允理如石之平如淵之清三槐九棘以質以聽理臣司律敢告執獄後漢二絶宋世軌為廷尉蘇軫之為正寺中語曰決定嫌疑蘇軫之視表見裏蘇世軌人以為丨丨北史北寺唐陳子昂以大理寺為丨丨詳見評事類大棘大理曰丨丨鄭氏談綺雲司榮加天寵職察丨丨陳子昂集為司刑袁卿讓官表星法天文録平星主廷平王平天下之獄事若今廷尉之象故星讚曰平丨執丨正於綱紀職官分紀無虐刑文子曰臯陶為大理天下丨丨丨職官分紀思仁恕季羔為衛士師刖人之足俄而衛亂季羔逃刖者守門謂羔有缺有竇有室乃入焉既罷羔問曰吾親刖子之足而子逃我何也刖者曰曩者君理人以法令先君後臣欲臣之免臣知之臨當論刑君愀然不樂見於顔色臣又知之君豈私臣哉孔子聞之曰善哉為吏其用法一丨丨丨則樹德加嚴則樹怨公以行之其子羔乎孔子家語天下平張釋之為廷尉文帝出有人從渭橋下走乘輿馬驚釋之奏其犯蹕當罰金上怒釋之曰廷尉丨丨之丨也今一傾而天下用法皆為之輕重後有盜髙帝坐前玉環帝欲族之釋之奏當棄市上怒釋之釋之免冠謝文帝與太后言乃許前漢書又張釋之為廷尉周亞夫見釋之持議平乃結為親友由此天下稱之並同上民不寃于定國為廷尉其決獄平法務在哀鰥寡加謹審之心朝廷稱之曰張釋之為廷尉天下無寃民于定國為廷尉丨自以丨丨後漢書奏讞掾倪寬以儒謂不習事會有疑奏寬為言其意椽吏因使寬為奏讀之皆服以白廷尉張湯大驚以寬為丨丨丨以古法誼決疑獄並同上決疑事張文瓘為卿至官旬日丨遣丨丨四百條人無怨言唐本傳三尺法杜周不循丨丨丨三尺律漢朱傳遷廷尉決疑當讞召見正監典法掾吏謂曰廷尉治郡斷獄以來且二十年亦獨耳剽日久丨丨丨令人事出其中務寬條郭躬為廷尉家世掌法丨在丨平乃丨諸重文可從輕者四十一事奏之多所生全東漢本傳附輕典陳寵代躬為廷尉每丨丨丨務從寬恕濟活者衆讚曰陳郭主刑人賴其平同上皆面決孔坦遷廷尉卿獄多囚繫坦到官躬執辭狀口辨曲直每臺司録獄無所顧問丨丨丨當時之事初學記不曲筆遊肇為廷尉卿動存名教持法以平斷獄務於仁恕齊宣武帝常敕肇有所降恕執而丨從曰陛下自能恕之豈足令臣丨丨齊書參臯吕晉潘嶽揚荆州誄曰帷此大理國之憲章聽丨丨丨稱侔于張初學記比于張唐徐有功曰身為大理人命所懸不能順旨詭辭以求苟安時人丨漢丨丨掌折獄大理丨丨丨詳刑鞠獄之事同上舜命臯陶丨丨丨丨刑惟明允六帖漢尊定國丨丨丨丨道在寬仁同上近世名卿或問丨丨丨丨曰若張廷尉之平楊子天下第一漢文帝聞河南守吳公治平為天丨丨丨丨召以為廷尉漢書刑罰大省漢文帝選釋之為廷尉罪疑者豫民是以丨丨丨丨刑錯之風同上舞文巧詆張湯為廷尉為人多詐丨丨丨丨釋之結襪王生善黃老嘗召居廷中公卿盡會立王生曰吾襪解顧謂丨丨為我丨丨釋之前跪而進之或讓王生獨奈何廷辱張廷尉王生曰廷尉方為天下名臣吾故聊使結襪以重之前漢翟公署門漢下邳翟公為廷尉賓客填門及廢門可設雀羅後復為廷尉客欲往丨丨大丨其丨曰一富一貴乃知交情一貴一賤交情乃見十失一存漢宣帝路溫舒為廷尉吏上言秦有丨丨其丨尚丨治獄之吏是也一恩萬怨范堅為廷尉奏主典吏邵廣盜官印依律棄市廣息雲宗二人自沒為官奴婢以贖父尚書議可堅駁之曰此為施丨丨於今開丨丨於後顯宗從之正廣刑並前漢不發私書董初遷廷尉卿持法清正閉門丨丨丨丨同上安得毁法髙柔為廷尉時獵法甚峻宜陽典農劉龜於禁內射兔其功曹張京言之帝以龜付獄柔曰廷尉天下平也丨丨以至尊而丨丨乎魏志漢用平充丨丨丨丨任先張釋六帖魏推明察丨丨丨丨選在鍾繇同上代非法家後漢楊賜遷廷尉歎曰三后成功惟殷於民而咎繇不與蓋宏之也遂以丨丨丨丨固辭本傳不樂法家元淡遷大理卿丨丨丨丨因謝所居官六帖寬恕見稱王殷為大理務在丨丨與鍾繇以治獄見稱魏志清正有識臧榮緒傳咸寧詔劉頌貞固丨丨丨丨鑒其以頌守廷尉卿晉書奉法持正鄭善栗為卿丨丨丨丨風績顯於公卿持法明審范説為卿丨丨丨丨並職林不回不僻天降五刑惟夏之績亂兹平人丨丨丨丨楊雄廷尉針保長棄短正觀八年上謂大理卿竇誕曰法官卿為之長也朕以至公臨天下法之所行無捨親昵卿當丨所丨丨所丨無阿朕意以虧憲典唐本傳一朝決竟司馬岐為陳留相梁郡有囚數年不決請移獄於岐囚至詰之皆不敢詐匿丨丨丨丨遂起為廷尉多所平正孔坦遷廷尉丨丨丨丨當法合人情時勢要以愛憎為斷坦竟不行王隱晉書主好寬急劉德威為大理卿太宗嘗問德威曰近來刑網稍密其過安在德威奏言誠在主上不由臣下人丨丨丨則寬好丨則急律云失入減三等失出減五等今則反是無辜失出則便獲大罪非有教使之然畏罪之所致耳分紀國法刻寬唐臨纍遷大理卿髙宗嘗録囚臨占對無不盡帝喜曰為丨之要在用丨丨則人殘丨則失有罪惟是折中以稱朕意唐史曲盡人情隋楊汪守大理卿帝將親省囚徒其時計囚二百餘人汪通宵究審朝而奏丨丨丨丨帝甚嘉之參處法意戴胃為大理卿犯顔據正丨丨丨丨隨類指摘一無遺慮官尊九寺六帖任重三章並同上得賢之盛國朝已來有劉德威張文瓘唐臨為大理丨丨丨丨人到於今稱之白集撰李同制守法之司大和四年大理卿崔杞奏大理寺即陛下丨丨丨丨設官之重不可搖動若朝示而暮改同罪而異刑則人何所措其手足哉續通典五聽三慮以丨丨察其情氣色視聲詞以丨丨盡其理明謹以讞疑獄哀矜以去寃獄公平以鞠庶獄六典庶獄羣司矧古士官為今理寺典於丨丨紏是丨丨箋表類牆面充位項廷尉丨丨而丨兹丨風俗通廷尉之任南豐擬制丨丨丨丨職略有張釋之風強禹為北曹吏斷法執平明帝以其達法理丨丨丨丨丨起拜廷尉謝承後漢書張釋之復見晉王彪之遷廷尉時揚州刺史殷浩劾永嘉守謝毅付廷尉彪之執法不受治遂發詔人云丨丨丨以來丨丨斯事允吳雄字季髙順帝時為廷尉以明律斷獄平訴孫恭吳季髙以法名家視事二十年盛吉拜廷尉丨丨丨丨丨天下稱其有恩無寃會稽典録廷尉四十年國初劇可久大理卿性況毅方已在丨丨丨丨丨用法平允以仁恕稱分紀恐為官屬所誣漢朱博丨丨丨丨丨丨乃以意覆獄白六帖更以衣食遺之唐張道原拜大理卿何稠得罪籍其家屬賜羣臣道原曰禍福何常丨資丨丨丨丨丨孔六帖贓錢不受向敏中判大理寺時沒入祖吉丨丨分賜法吏敏中引鍾離意委珠事獨丨丨國史刑統增詳竇儀判大理寺奉詔重定丨丨援引律疏勑格參酌重輕丨為三十卷尤為丨備太祖嘉之太祖實録表賀不奏李浩大理奏結獄上顧輔臣曰棘寺當得剛正如李浩者為之已而卿闕上曰無易李某遂除大理卿故事寺獄空上丨丨公獨丨丨言行録張泌奏事不苟容至道中張泌判大理寺會鞠陳廷山謀叛獄具李潤之大理正斷廷山謀叛當絞中書刑房吏李文方用事潤之附會之泌掌廷尉不預議法又不見案櫝上疏言其事上召宰相吕蒙正責讓蒙正稱文方所定為允泌因言曰臣祗能盡心於陛下不能苟容於文方以曲筆爾分紀晉卿鞠獄無觀望苖丨丨字伯修為卿元豐大理兼丨丨事多上所付晉卿獨持平核實丨所丨丨人不以為寃職略韓鎡烏巢大理寺獄戶賦皇帝恩霑庶類道格玄功化覃於萬國之間苛慝不作烏巢於圜扉之內囹圄知空足驗時清可知刑措蒼鷹莫鷙寧懷獄吏之憂踈網無加豈有虞人之懼定國徒美於詳明何施善政治長不罹於縲紲豈見銜寃詩集名不朽上卿才大丨丨丨早朝至尊暮求友髙適宴大理寺卿有陰功憐君獨守廷尉法知君決卿丨丨丨東坡送蔡冠卿大理少卿歷代沿革後魏置少卿北齊及隋因之唐置二人六典國朝以朝官一員兼少卿事神宗置大理獄少卿二員以蹇周輔楊汲為之分左斷刑右治獄四朝志建炎中興省大理卿而少卿二員如故中興會要事類感天隋趙綽為少卿時刑侍辛亶嘗衣緋裩上以為厭蠱將斬之綽曰據罪不當死上怒將斬之對曰執法一心不可惜死上入良久乃釋之賜物三百段又上禁惡錢有二人在市以惡錢易者上令斬之綽曰此人當杖上曰撼大水不動者當退對曰臣冀丨丨心何論動水上乃止隋書登仙倪若水字子泉開元初班景倩自揚州採訪使入為少卿過州若水餞於郊顧左右曰班公是行若丨丨吾恨不得為騶未幾入為户部唐書論獄唐戴胄丨刑丨事皆無寃濫隨方指摘