body:
  text: 古今合璧事類備要外集卷三十七宋謝維新撰服飾門佩附綬組服飾總論佩衷之旗也古者以玉為之貫以組綬衝牙居中央以前後觸也天子白玉𤣥組綬公侯以𤣥玉朱組綬大夫水蒼玉緇組綬世子瑜玉綦組綬士瓀而兖反玫武巾反縕赤黄色組綬凡帶必有佩玉右應徵角象事與民宜勞左應宮商象君與物宜逸趍以采齊行以肆夏周中規折還中矩進則揖之少俛見於前退則掦之少仰見於後故在車則聞和鸞之聲行則鳴玉故非辟之心無自而入焉惟居䘮則不佩此古之所以為佩也三代同之五霸迭興戰攻不息佩非戰器於是解而去之留其繫璲以為章表故詩曰鞙鞙佩璲此之謂也然自佩之既廢秦乃以采組連結於璲光明章表轉相結受故謂之綬漢承泰制用而弗改後加之以璽印佩刀之飾迨至於唐又復佩龜備魚矣至我朝未之改也然如取乎佩魚者非事觀美也亦以明貴賤應召命而防其姦詐者然爾組亦綬也亦以帶璽總絲而為之佩佩上設以衡衡上設銀鉤衡之下凡三直垂下中以雙璜在獸面之兩旁下設雙滴在衝牙之兩旁三道各穿以藥玉珠間之其琚瑀雙璜衝牙滴子並以珉玊又一説以金塗銀為之綬以紅花錦為之下以青絲網施以雙銀環衡衡命緼韍黝衡再命赤韍黝衡三命赤韍蔥事類成德觽所以解結成人之佩也人君能成人之事雖童子猶佩觽早成其德也詩芃蘭注表意所以必有佩者表意見所能故修道無窮即佩環能本道德即佩琨能決嫌疑即佩玦是以見其所佩即知其能故農夫即佩其耒耜工匠佩其斧婦人佩其針縷亦佩玉也白虎通銀佩子思丨丨鹽鐵論玉佩天子佩白玉而𤣥組綬公侯佩山𤣥玉而朱組綬大夫佩水蒼玉而緇組綬士佩瑌玫而緼組綬世子佩瑜玉而綦組綬注云山𤣥水蒼玉之文也綬者所以貫佩玉相承受之鞙鞙丨丨佩璲不以其長注璲瑞玉詩大東將將將翺將翔佩玉丨丨有女同車雙璜佩玉上有蔥衡下有丨丨衡牙蠙珠以納其間禮玉府又見下半璧凡玉佩衝長五寸博一寸下有雙璜璜徑三寸衝牙蠙珠玉納其間上下為衡丨丨為璜璜中横衝牙以蒼珠為瑀三禮圖三道下垂丨丨之斿以穿珠左右對垂兩璜當中有衝牙用觸之使鳴以為行節注珠用琚瑀似玉者也璜半璧也牙以玉為之兩頭銳而似牙用衝其左右禮外傳行有聲丨步則丨環珮之丨記玉藻行有度佩玉之儺注儺丨丨節丨詩竹竿童佩觽芃蘭刺恵公也驕而無禮大夫刺之芃蘭之支丨子丨丨雖則佩觽能不我知容兮遂兮垂帶悸兮芃蘭之葉丨子丨韘雖則佩韘能不我甲詩衛風我佩玖丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也云云丘中有李彼留之子貽丨丨丨詩王國風佩其象揥葛屨刺褊也云云好人提提宛然左辟丨丨丨丨詩魏風佩之金玦太子帥師公衣之偏衣丨丨丨丨狐突歎曰佩衷之旗也用其衷則佩之度今丨以金玦弃其衷也左閔二年衛姬解佩齊威公霸諸侯朝之衛獨不至公謀伐衛丨丨脱簪珥丨環丨再拜請衛之罪公説許諾劉向列女傳大夫捨佩子産死鄭丨丨丨丨玦孔叢子蔡侯獻佩見前裘注五伯解去丨丨迭興戰兵不息佩非戰器韍非兵旗於是丨丨佩留其係燧以見章表後輿服志二女解贈江濵丨丨不知何許人步朓江濵逢鄭交甫桃之不知神人也女遂丨佩丨之交甫受佩而去數十步空懷無佩女亦不見佩玉蘂兮呉申叔儀乞糧於公孫有山氏曰丨丨丨丨余無所繫之注蘂然服飾備也已屬無以繫佩言呉子不恤下左哀十三年佩玉璆然孔子入見衛靈公夫人南子北面稽首夫人自絺帷中再拜環丨丨聲丨丨白氏帖佩韋自戒西門豹性剛急丨丨以丨丨佩弦自誓董安于性寛緩丨丨以丨丨並後范丹傳孔佩象環丨子丨丨丨而𤣥組綬記玉藻由佩􅀈豚子路性鄙好勇力冠雄雞冠丨丨丨丨凌暴孔子史紉蘭為佩丨秋丨以丨丨屈原連蕙為佩丨丨若以丨丨過􅀈肆而失音楚詞幷相六國蘇秦為從約長丨丨丨丨云云歎曰且使我有雒陽負郭田二頃吾豈能佩六國相印乎史本傳欲立六國漢王用酈生之言丨丨丨丨後曰趣刻印先生因行佩之漢本傳漢祖佩璽秦始皇藍田玉璽螭獸鈕在六璽之外文曰受天之命皇帝夀昌丨高丨丨之明帝佩璽丨丨採周官記禮更服衮章天子冠通天而丨玉丨並晉輿服志又孝明帝乃為大佩衝牙雙瑀璜皆以白玉乗輿落以白珠公卿諸侯以采絲漢輿服志舉佩玦三沛公見項王鴻門項留沛公飲范增數目項王丨所丨丨以示之者丨項玉黙然不應范增出謂項莊曰君王為人不忍史本紀得珮珂五于闐徳宗即位遣朱如玉之安西求玉於于闐丨丨丨丨孔六帖佩紫羅囊謝𤣥常丨丨丨香丨安患之而不欲傷其意因獻賭取焚之𤣥遂止佩霹靂木𤣥宗皇后王氏帝欲廢后后兄守之懼為求猒勝浮屠明悟教祭北斗取霹靂木刻天地文及帝諱合佩之孔六帖屈平楚詞指佘玦兮江中遺佘佩兮灃浦柳宗元弔屈原沉璜瘞珮兮孰幽而不光杜牧之晩晴賦倒冠落佩兮與世闊疎綬貫玉綬者所以丨佩丨相承受之記玉藻注帶璽組綬也所以丨丨前髙祖紀注結於腰蔡澤懐金印丨紫綬丨丨言其足矣佩在腰假印綬而官不給鞶囊得自具作但假印不假綬者不得佩綬鞶古制也漢世有鞶囊者丨丨丨間或謂之綬囊晉輿服志佩緺行謝齊東郭先生武帝時詔公車貧困行雪中履有上無下足盡踐地道中人笑之及拜二千石丨青丨出宫門丨丨主人榮華道路諺曰相馬失之瘦相公失之貧此之謂也解綬以帶李世與任光同奉世祖世祖自丨所佩丨丨丨後本傳蕭朱為友丨育哀帝時執金吾少與陳咸丨博丨丨著名當世徃者有王陽貢公故長安語曰丨丨結綬王貢彈冠言其相薦達也前本傳牢石兼官石顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位民歌之曰丨邪丨邪五鹿客邪印何纍纍綬若若邪言其丨丨據勢也前本傳懷其印綬朱買臣拜㑹稽太守丨丨丨丨而入㑹稽郡前本傳陳其印綬桓榮為少傅大㑹諸生丨丨車馬丨丨曰今日所䝉稽古之力也可不勉哉後本傳先佩印綬黄憲陳蕃為三公臨朝嘆曰叔度若在吾不敢丨丨丨丨矣本傳許上印綬裴寂遷左僕射帝置酒含章殿歡甚寂頓首曰始陛下發太原約天下已定丨丨丨丨今四海晏安願賜骸骨歸田里孔六帖加以絲綟丨世充自為太尉尚書令丨黃門印絲綟綬䋎采就典絲組就之物注丨色成曰丨禮天官紕織紕者所以丨組也詩干旄汪垂三組漢王僕為主爵都尉又為樓船將軍并封侯懷銀黃丨丨丨丈二組淮南王安上書陛下以方寸之印丨丨之丨填撫方外前嚴助傳詩集佩聲隨劒丨丨丨玉墀步杜早朝大明宮佩聲歸丨丨丨到鳳凰池王維謝賈至帶垂玉丨丨蒼玉佩韓花迎劒丨丨丨佩星初落岑參和賈至晨趍佩響切丨丨丨柳宗元獻𢎞農公時聞佩丨丨雜丨聲珊珊杜鄭駙馬宅綬青綬未換銀丨丨唯添雪白頭茜綬笑我青袍故饒君丨丨新腰間紅綬丨丨丨丨繫未穩鵲㘅紅綬丨丨丨丨繞身飛並白樂天集魚袋服飾總論魚袋古之算袋也謂之章服魏文帝朝易以龜袋取其先知歸順之義唐改以魚袋取其合魚符之義也自一品至六品以下皆佩唐初卿大夫殁追取魚袋永徽中生平在官用為褒飾亡殁追收情所不忍五品以下亡殁隨身魚袋不追國朝惟綠紫三等而紫袍者除武臣外文官之制其制有六庶僚黒角帶佩金魚未至侍從而特賜帶者為荔枝五子不佩魚大觀制中書舍人諫議待制權侍郎紅鞓黑犀帶佩魚權尚書御史中丞資政殿端明殿閣學士直學士正侍郎給事中金御仙花不佩魚謂之横金元豐制翰林學士以上尚書御仙花帶佩魚謂之重金執政官宰相方團毬文帶佩魚俗謂之笏頭其叙如此若猛進躐得者則不然彼武臣節度使班翰林學士上六曹尚書下至今止横金迄拜太尉則恩禮視執政毬文佩魚矣又文官借服者不佩魚故繫銜止稱借紫借緋及政和中王詔延素始建請借服皆佩魚如賜者從之然差敇止仍舊云可特差某職任仍借緋或借紫而已而其後繫銜者多自稱借紫金魚袋若借緋魚袋然終無所據也書曰天命有徳五服五章哉夫豈濫予者耶事類三品金隨身魚符者以明貴賤應召命皆盛以魚袋丨丨以上飾以金五品以上飾以銀五品銀高宗給丨丨以上隨身魚丨袋以防召命之詐出内必合之三品以上金飾袋改魚為龜天授二年佩丨皆丨丨其後三品以龜袋飾以金四品以銀五品以銅罷龜給魚中宗初丨丨袋復丨以丨都督刺史垂拱中丨丨丨丨始賜魚郡王嗣王中宗初丨丨丨丨亦佩金魚袋特進散官景龍中令丨丨丨丨佩魚自此始然員外試檢校官猶不佩魚衣紫金飾景雲中詔丨丨者丨丨丨之衣緋者以銀飾之衣緋銀飾見上注假紫魚袋開元初駙者都尉從五品者丨丨金丨丨假緋魚袋都督刺史品卑者丨丨丨丨五品佩魚丨丨以上檢校試判官皆丨丨致仕佩魚中書張嘉貞奏丨丨者丨丨終身並唐輿服志賞以魚袋衡州有唐開元二十年所建南嶽真君碑衡州司馬趙頤貞撰荆州兵曹蕭誠書末云别駕丨魚袋上柱國光大晊賞魚袋之名不可曉它處未之見也容齋隨筆賞兼魚袋百官丨緋紫必丨丨丨謂之章服當開元時服朱紫佩魚者衆賜佩帶魚可汗拜蘇禄左羽林大將軍丨銀袍錢丨丨袋七事刻玉為魚五代安重榮既奢侈以為金魚袋丨丨丨丨佩之孔六帖詩集繞腰光銀魚金帶丨丨丨白樂天隨步躍魚綴白金丨丨丨鵲銜紅綬繞身飛腰佩銀龜丨丨丨丨朱兩輪新授銅符丨丨丨丨未著緋並同上銀章付老翁杜詩金紫稱長年魚佩葺鱗光照地鵲㘅瑞帶勢冲天莫嫌鬢上些些白丨丨由來丨丨丨白樂天喜劉蘇州恩賜金紫腰金世上榮紫袍新袐監白首舊書生鬢雪人間夀丨丨丨丨丨白樂天初授袐監賜金紫玉帶懸金魚韓五十佩銀章李爾亦今年賜吾年五十加朝散丨丨丨丨丨服章齒髪恰同知命嵗官曹俱是客曹郎榮傳銀帳花聮蕚彩動銀袍鴈趂行緋多以鴈㘅瑞草為之大抵著緋宜老大莫嫌秋鬢數莖霜白賀行簡賜章服苦為君王惜平生師友兩相知丨丨丨丨丨一衣刺已爭來爭不得青蠅猶傍太陽飛楊廷秀䟦澹庵先生繳張欽夫賜章服答詔抱來皆佩黃金魚秦韜玉京人父為左千牛將軍韜玉有詞藻有公子行云階前莎綠毬不捲銀龜噴香挽不斷亂花織錦柳撚絲粧㸃池臺畫屏展主人功業傳國初六親聮絡駞朝車鬬雞走狗家無事丨丨丨丨丨丨丨却笑儒生把書卷學得顔囘忍饑面為田令孜擢用未幾遂至丞郎出摭言古今合璧事類備要外集卷三十七
