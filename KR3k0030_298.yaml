body:
  text: 古今合璧事類備要别集卷九十二宋謝維新撰蟲豸門蟬附蜩螀格物總論蟬兩翼喙長在腹中或以為無口以翼鳴者數種蜩螳蚻䘁螀蜻蝒蜩大蟬色黑螳一曰蝘蛁蚻䘁螀皆小蟬蝒馬蟬於蟬類中最大又一説蟪蛅寒螀蛁蟟䗿母蜩范並蟬蟪蛄小小紫色四月五月鳴寒螀黑而傴僂九月十月鳴甚悽急蛁蟟色青七月鳴嚀母似寒螀而小二月鳴蜩范所謂馬蟬形大而黑亦五月鳴蜀中又一種其脫殼頭上有一角如花冠狀謂之蟬花乃是蟬在殼中不出而化為花自頂中出然大抵蟬皆乘昏夜方出土中升髙處皆殼拆而所以夜出者一似畏人二畏日炙乾其殼而不能蛻也既登木而鳴但飲風露亦不糞而溺耳至時寒又復墜地或又云是蜣螂所轉丸久而化成也其殼蛻事類蟬緌郕人有兄弟死而不為衰聞子臯將為郕宰遂為衰郕人曰蠶則績蟹有匡范則冠丨有丨記檀弓蟬冠凡侍臣加丨丨取其清髙飲露不食也車服注榆上有蟬吳王伐荆少孺子諌曰園中有榆丨丨丨丨居髙而飲露不知螳螂在後白氏帖螳蜋捕蟬蔡雍鄰人召雍食聞主人彈琴時有殺聲而反主人曰彈琴時有丨丨丨丨吾意唯恐失蟬故情見乎聲同前蟬名齊女牛亨問董仲舒曰丨丨丨丨何故答曰昔齊王之后怨王而死尸變為蟬登庭樹嘒唳而鳴王悔恨之故名齊女崔豹古今注蟬名腹育丨未蛻時丨丨丨相傳蛣蜣所化韋翾莊在杜西常冬中掘樹根見腹育附於朽處怪之村人言蟬固朽木所化也翾因剖一視之腹中猶實朽木雜俎蟬集異冠梁朱異為通事舍人後除中書郎時秋日始拜有飛丨止丨丨丨上時咸謂蟬珥之兆曹植蟬賦惟夫蟬之清潔濳厥類於太隂在炎陽之仲夏兮始遊豫乎芳林實淡泊而寡欲兮獨怡樂而長吟聲噋噋而彌厲闕貞士而介心內含和而弗食兮與衆物而無求棲喬枝闕暑兮漱朝露之清流隱柔桑之稠葉兮快啁號以遁苦黃雀之作害兮患螳蜋之徑斧飄髙翔而逺託兮毒蜘蛛之網罟欲潔身而卑竄兮懼草蟲之襲豫免衆艱而弗獲兮遙遷集于闕步依名果之茂蔭兮託修幹以靜處有翩翩之狡童兮容與於園囿體離侏之脫視兮姿才捷於猴猿條罔葉而不挽兮樹無幹而不緣翳輕軀而奮迅兮跪側足以自間恐此身之驚駭兮睛屢盻而目連怪桑竿之冉冉兮還微粘而我纒欲翻飛而忽滯兮知性命之長捐亂曰詩嘆鳴蜩聲嘒嘒兮盛陽則來太隂逝兮皎皎貞素侔夷惠兮帝臣是戴尚其潔兮傅咸黏蟬賦櫻桃為樹則多花為果則先熟有蟬鳴焉聊命黏取退惟當蟬之得意於斯樹不知黏之將至亦猶人之得於富貴而不虞禍之將來也肅有嘉果之珍樹蔚深秀於我庭在赫赫之隆暑獨肅而自清遂寓目以周覽見鳴蟬於纎枝翳翠葉以長吟信厥樂之在兹茍得意於所歡雖危殆而莫知匪爾之命適薄坐偷安而忘危嗟悠悠之耽寵請兹覽以自規歐陽修鳴蟬賦嘉祐元年夏大雨水奉詔祈晴於醴泉宫聞鳴蟬有感而賦云肅祠庭以祗事兮瞻玊宇之峥嶸收視聽以清慮兮齋豫心以薦誠因以靜而觀動兮見乎萬物之情於時朝雨驟止微風不興四無雲以青天雷隱隱其餘聲乃席芳藥臨華軒古木數枝空庭草間爰有一物鳴于樹顛引清風以長嘯抱纎柯而永嘆嘒嘒非管泠泠若弦裂方號而復咽凄欲斷而還連吐孤韻以諧律含五音之自然吾不知其何物其名曰蟬豈非因物造形能變化者耶自糞壤慕清虛者耶凌風髙飛知所止者耶嘉木茂樹喜清隂者耶呼吸風露能尸解者耶綽約雙鬚修嬋娟者耶其為聲也不樂不哀非宫非徴胡然而鳴亦胡然而止吾嘗悲夫萬物莫不好鳴若乃四時代謝百鳥嚶兮一氣候至百蟲鳴兮嬌兒姹女語鸝鶊兮鳴機絡緯響蟋蟀兮韓疾弄舌誠可愛兮引腹動鼓豈勉強而為之兮至於汚池濁水得雨而聒兮飲泉食土長夜而歌兮彼蝦蟆固若有欲而蚯蚓又何求兮其餘大小萬物不可悉名各有氣類隨其物形不知自止有若爭名忽時變以物變咸漠然而無聲嗚呼達士所齊萬物一類人於其間所以為貴蓋已巧其語言又能傳於文字是以窮彼思慮耗其血氣或吟哦以窮愁或發揚其志意雖共盡於萬物乃長鳴於百世豫亦安知其然哉聊為樂以自喜方將考得失較同異俄而隂雲復興雷電俱擊大雨既作蟬聲遂息蜩蜩笑鵬飛詳見鵬注螀寒螀翔水文子曰飛鳥反鄉兔走歸窟狐死首丘丨丨丨丨各依所生詩集落日鳴丨丨丨蟬蜩當夏急夜蟬丨丨丨並杜依山郭夕響丨丨丨餘悲散秋嶺韋應物號階軒秋蟬丨丨丨感物憂不歇李白響屢嘶避雀喬枝裏飛空華殿曲天寒丨丨丨日暮聲逾速繁吟如欲盡長韻還相續飲露非表清輕身易知足東坡清何甚只憑風作使全仰栁為都一腹丨丨丨雙翎薄更無伴貂金置影并雀畫成圖恐是千年恨偏令落日呼陸龜蒙抱芳槐早蟬孤丨丨丨葉噪向殘陽意度秋也作一聲催我老堪聽兩耳畏吟休得非下第無髙韻須是青山隱白頭若問此心嗟嘆否天人不可怨而尤賈島發髙枝新蟬忽丨最丨丨不覺立聽無限時正遇友人來告别一心分作兩般悲前人聲斷續細丨頻丨丨審聽亦難分倣佛應移處從容却不聞蘭棲朝咽露樹隱暝吟雲若遣鄉愁起吾懷只是君方干聲煩惱説露談風有典章詠秋吟夏入宫商蟬丨無一些丨丨自是愁人極斷腸楊誠齋蜩向秋鳴更多山月滿池流金波寒蜩丨丨丨丨丨大都時節使如此止爾不得將奈何文與可逮夜且復靜鳴蜩嘒髙風丨丨丨丨丨張文潛蜣蜋附螳蜋格物總論蜣蜋蛣蜣也黑甲蟲噉糞二種一種大者名胡蜣蜋身黑光腹翼下有小黃子附母而飛行晝不出夜方飛出至人家庭户中見燈光則來一種小者身黑暗晝方飛出夜不出生長沙池澤中醫家以鼻頭扁者為良或又以鼻髙目深者為良蓋胡蜣蜋也螳蜋有斧蟲螵蛸母也一名蟷蠰事類智在轉丸莊子曰蛣蜣之丨丨于丨丨蜣蜋能以土包糞轉成丸功可出鏃夏侯鄆初為浪州録事參軍有人額上有箭痕問之云隨馬侍中征田恱中射馬侍中微炒巴豆與蜣蜋並研均塗於傷處斯須痛定必微癢且忍之待極癢不可忍便撼動箭鏃拔之立出後以生肌膏藥傅之遂無苦困并方獲之本草螳蜋執翳搏蟬莊子曰莊周遊於雕陵之樊覩一異鵲自南方來者執彈而留之覩一蟬方得美蔭而忘其身螳蜋丨丨而丨之見得而忘其形異鵲從而利之見利而忘其真莊周惕然曰噫物固相纍二類相召指彈而反走餘又見蟬類舉足搏輪齊莊公出獵有螳蜋丨丨將丨其丨問其御曰此何蟲對曰此螳蜋也為蟲知進而不知退不量力而輕就敵公曰此為天下勇士矣回車避之勇士歸焉淮南子詩集殷床聲洪鐘起暗室飄瓦落空庭誰言轉丸手能作丨丨丨蘇子瞻蜣蜋螳蜋當車勇玄蟬無所營風露正凄清執翳機何密丨丨丨自輕將迷黃雀患已變玊琴聲得喪還相召南華所以驚劉原父螳蜋捕蟬蠅附蠅虎格物總論蠅數種有蒼者有青者有負金者其聲在翼然身蒼與青者聲雄惟負金者聲清聒青者能敗物巨者頭如火號為景迹其他種族不一然難於遍舉也蠅虎似蜘蛛色灰白善捕蠅一名蠅蝗事類蠅聲匪雞則鳴蒼丨之丨詩齊風蠅營營營青丨止于榛詩青蠅託驥尾蒼蠅之飛不過十步自丨於騏丨之丨乃騰千里之路光武與隗囂書嗜肉汁青蠅丨丨丨而忘溺死衆人貪世利而陷罪禍班固難莊青蠅弔客虞詡放棄南方云自恨疏節骨體不媚犯上獲罪當長沒海隅生無可與語死以丨丨為丨丨使天下無一人知己者足以不恨青蠅報赦符堅將赦屏人作赦文有大蠅赤頭聲甚厲入室驅之復來俄而人皆知有赦書於是詰其所得皆云有青衣童子呼於街中堅曰是前丨丨也白氏帖投筆逐蠅王思性急方書有蠅飛在筆端去復來思怒丨丨拔劍丨之誤墨成蠅曹不興畫屏風丨丨點汚丨丨孫權謂為真蠅彈之何故放入厙狄伏連居室患蠅杖門者曰丨丨丨丨北史不令人見梁昭明太子食中頻獲蠅蟲之類密置柈邊恐厨人獲罪丨丨丨丨方慶凍蠅王丨丨體質鄙陋言辭魯鈍張元一謂之被丨丨朝野僉載記室獵蠅盧丨丨多作脯對夏則委人於十步之內扇上塗餳金以撲蠅脯且作青紗障隔塵土時人目為丨丨丨丨溪記作行折躬術士相郭代公若青蠅拜賀方能及第公疑之及登科訖歸坐家庭有繩丨八丨立約數萬丨丨者三良久乃去青陽記觸睫隱字假成式讀書有蠅丨丨丨丨偶拂殺一蠅取視之翼似蜩冠似蜂六帖適從何來武儒衡時元稹倚宫官知制誥儒衡厭鄙之會食瓜蠅集其上儒衡揮以扇曰丨丨丨丨遽集於此一坐皆失色時遭點染熙寧初外學置官師職簡地親多在宴席有學官喜誶語同僚苦之詠蠅以刺曰衣服有丨丨丨丨杯盤無處不追隨后山集張復之罵青蠅文火帝降炎臣與邈矣六合歊然如蒸萬物長嬴如騰如凌不可謝其玄造不可名其至能忽隂薄陽化生此青蠅觸類苒苒朋飛薨薨切羶而蠧芳筵預登當是之際無人不憎我疑姦人之魂佞人之魄堙鬱不散託蠅寄迹不然者何以變白為黑變黑為白所以恣其點染所以遂其慙慝姦佞之作敗君之德黑白之變為物之賊所謂欲蓋而彰順非以澤使潔者不得自明元者不得自默連璧失珍兼金奪色致義士之感心幾撫髀而太息衆君子矯而議曰天運地施融融蚩蚩何者不有何生不滋信妍酬以自任亦浩混乎無知蠅斯眇末胡足罵為殊不知天地不言假乎仁者持準操程以上化下使惡不黷善真不類假廊唐堯之雍熙稱周王之風雅防邪之萌雖小不捨厚汚若成悔何及也于是速呼童奴疾致如意當案輒食對客攘臂指西風而罵曰未斷爾祖終惡爾類營營乎青蠅止于藩歐陽永叔憎蒼蠅文蒼蠅蒼蠅吾嗟爾之為生既無蜂蠆之毒尾又無蚊虻之利觜幸不為人之畏胡不為人之喜爾形至眇爾欲易盈杯餘殘瀝砧几餘腥所希抄忽過則難勝苦何求而不足乃終日而營營逐氣尋香無處不到頃刻而集誰相告報其在物也雖微其為害也至要若乃華榱廣厦珍簟方牀炎風之燠夏日而長神昏氣蹙流汗成漿委四肢而莫舉眊兩目其茫洋惟髙枕之一覺冀煩歊之暫忘念於爾而何負乃於吾而見殃尋頭撲面入袖穿裳或集眉端或沿眼眶目乍瞑而復警臂一揮而猶攘闕蝴蝶而徜徉此孔子何由見周公於倣佛莊生安得與其為害者一也又如華屋髙堂嘉賔上客沽酒市脯鋪筵設席聊娛一日之餘間奈闕多之莫敵或集器皿或屯几格或醉醇酎因之沒溺或投熱湯遂喪其魄諒雖死而不悔亦可戒夫貪得尤忌赤頭號為景迹一有霑汚人皆不食奈何引類呼朋搖頭鼓翼聚散倐忽往來絡繹方其賔主獻酬衣冠儼飾使吾揮手頓足改容失色於此之時王衍何暇於清談賈誼堪為之太息此其為害者二也又如醯醢之品醬臡之制及時月而收藏謹瓶罌之固濟乃闕藏以攻鑽極百端之窺覬至於大胾肥牲嘉殽美味蓋稍露夫罅隙守者或時而假寐才稍怠於防嚴已輒遺其種類莫闕憂息蕃滋淋漓敗壤使親朋卒至索爾以無歡臧獲懷因之而得罪此其為害者三也是皆大者餘悉難名嗚呼止棘之詩垂之六經於此見詩人之博物比興之為精宜乎以爾刺讒人之亂誠可嫉而可憎詩集未見出頭百年鑽故紙丨丨丨丨時古靈忩上蠅知我哦詩秋蠅丨丨正丨丨得得緣眉復入髭欲打羣飛還歇去風光乞輿幾多時楊廷秀怒劍休追逐乘炎出何許人意似微看丨丨丨丨丨疑屏謾指揮與蚊更晝夜共蜜上杯盤自有堅氷在能令畏不難梅都官窺赦豈無才海上弔喪如有義筆端丨丨丨丨丨不須計較平生事但問適從何處來曽文昭飛聲滿天下可堪秋後競營營醜類青蒼逐臭生無奈丨丨丨丨丨唯教黑白不分明張俞秋蠅蠅虎物微趣下丨丨丨丨世不數隨力捕生得稱虎匿形注目搖兩股卒然一擊勢莫禦十中失一八九取吻間流血腹如鼓却行奮臂吾甚武明日淮南作端午陳無已古今合璧事類備要别集卷九十二
