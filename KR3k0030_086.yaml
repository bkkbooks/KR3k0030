  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_086-1a, image: WYG0939/WYG0939-0698a.png}
body:
  text: 古今合璧事類備要後集卷十七宋謝維新撰樞屬門都副承旨歷代沿革五代有承旨副承旨以諸衛將軍充職源國朝大平興國中以楊守一充都承旨都始也是時都承旨副承旨多用士人真宗後稍稍遂用吏人歐陽修建言請復舊制不克行熙寧二年始以東上閣門使李評為樞密都承旨李綬為之副不用院吏而更用士人自評治也續會要初評受命文潞公為樞使以舊制見不為禮評訴於上命檢故事不獲乃詔都承旨副承旨見樞密使副並始閣門使禮熙寧五年以尚書比部貟外郎集賢校理同修起居注曽孝寬為起居舍人充史館修撰兼都承旨先是或用士人亦止於右職中選用文館兼領自孝寬始也元豐三年用張誠一為客省使都承旨自是都承旨自是都承復用武臣續會要元祐中復以文臣帶待制充都承旨哲宗職官志至崇寧以後則專用武臣矣四朝志紹興二年權禮部侍郎趙子畫充徽猷閣待制密院都承旨自改官制後始除大臣自子畫始中興系年録建炎四年髙宗在會稽以武臣辛道為都承旨頗用事紹興元年十二月辛道宗既免乃詔依元祐職制置都承旨一貟並差兩制為之中興會要然但聞一二人而已淳熙中王抃久用事孝宗惡焉遂復用士人事類口占兵數魏仁浦為樞密副承旨周祖問屯兵之數及將校名氏令取簿參視之仁浦曰臣悉能記之遂口占而疏舉籍以校一無差誤五代史掌宣密命都承旨副都承旨丨承丨丨丨通領院務若便殿侍立閲試禁衛兵校則隨事敷奏承所得旨以授有司四朝志始用士人熙寧三年始以東上閣門使李評為樞密都承旨李綬為之副不用院吏而更用士人自評始也續會要復用儒臣蕭正肅燧例知閣官兼承旨或怙寵招權孝宗思丨丨丨丨淳熙九年正月命公以龍圖閣待制為之公言績帥餘風未殄羣臣進言非迎合獻諛則強辨邀譽當察誠偽虛實上稱善孝宗聖政文館兼領熙寧五年以尚書比部貟外郎曽孝寬充史館修撰兼都承旨丨丨丨丨自孝寬始續會要正人宜留劉安世作都承旨待制范相純仁之出由安世章疏已而復拜吕相大防遂擬安世真定宣仁難之吕云劉安世曽言范純仁今既復用宜少避之宣仁曰今既不作言事官自不相妨其後樞密院奏事宣仁申前語韓師朴忠彥如吕之對宣仁曰如此丨丨丨且丨朝廷遂輟言行録請委疆事王巖叟字彥林為樞密都承旨湖北諸蠻互出擾邊公請專以疆事委荆南唐義問遂以草檄文喻義問以朝廷方敦尚恩信勿為徼幸功賞之意其後終底綏寧言行録為言邊防洪文安遵兼權樞密院都承旨公既以近臣兼承密旨邊防民隱每為上言三衙春夏秋馬夏菰城仰給蘇湖秀三州適積水冒田有司預請倍輸夏麥以補芻粟北狄索劉孝恭等二百家公皆執不可軍器刓弊命公料簡公區别良窳衆謂熟於軍旅者不能也上以是有大用意周益公集侍立敷奏都承旨從五品副都承旨正六品通領院務及承百司之事檢察主事以下功過而升黜之凡御崇政延和殿則升以丨丨若禁衛兵校試技藝及蕃國入見則隨事丨丨所得旨以授有司神宗正史聀官志侍立受讀每崇政殿臨決庶務則承旨丨丨殿前侍衛司奏事則承旨而丨丨之會要參右府務右府管天下之機務而承旨佐佑參總焉淇水除張誠一制贊右府謨除范純禮制丨丨丨許丨之微曲阜陪輔帷幄除劉奉臣制云丨丨丨丨以承密旨副介樞機除曹誘制云樞機之地親承密旨雖在副介亦須得人並同上檢詳歷代沿革檢詳之職古無之國朝熙寧四年詔以編修經武要略官四人王存陳侗陳奉世蘇液檢詳樞密院諸房文字禮遇視中書檢正官元豐三年詔定置三貟及改官制檢詳官尋罷續會要建炎三年樞密院請依祖宗朝置檢詳諸房文字兩貟敘位在左右司之下紹興二年詔樞密院已置都承旨一貟減檢詳一貟樞密請置二員從之中興會要三十二年詔樞密院諸房令檢詳書擬從左右司請也乾道二年詔樞密院檢詳係掌朝廷機要文字不許出謁及接見賔客亦令遵兩省官施行孝宗會要事類樞掾熙寧五年詔檢詳文字劉安世自擢置丨丨奉職不苟可除集賢校理實録機屬神宗朝除范育檢詳文字制曰右府典領樞丨而設丨于下以核其事李凊臣行掌機要乾道二年詔樞密院檢詳係丨朝廷丨丨文字不許出謁賔客會要典樞機見前機屬注密吕大忠檢詳樞院吏兵房文字令丨義勇丨丨大忠言養兵猥衆國用日屈漢之屯田唐府兵善法也弓箭手近於屯田義勇近於府兵擇用一焉兵屯可省矣事略申酌故實陳居仁字安行樞屬闕貟方以著廷名進擬上曰陳居仁今為何官對曰為郎上曰豈有人材如居仁而可久為郎者乎即除樞密檢詳文字二樞不受私謁差遣恩例悉令投牒送檢詳所公為之考令丨丨丨丨可否立決右選翕然歸心樓攻愧集謀作文書劉子羽樞密院檢詳文字張魏公同知樞密范㻴來赴行在張公奏瓊大逆不道獨與子羽密丨夜召子羽及選密院謹飭吏數人丨丨丨劄榜皆備鎖吏于府中翌早公赴都中召瓊議事瓊從兵隘塗巷意象自若坐定子羽亟取寫勑黃紙請前揖瓊下曰有勑將軍宜下大理置對命縛瓊送大理寺子羽已張榜于省門親以旨勞瓊衆頓刃應諾瓊論死兵分𨽻神武軍晦巷文集旨撰詔檄紹興三十一年元顔亮叛盟時洪文敏公邁仕樞密院檢詳宰傳相傳丨令丨書丨榜丨家簉屬幄籌慶元制核事右府見前機屬注熙寧詔置丨丨四年以編條經武要略官王存等四人檢詳樞密文字秩序俸給視中書檢正官會要編修官皇朝沿革編修官之職古無之編國朝慶歷四年史館王洙承旨單士寧修例册編修之名自此始分紀熙寧三年以館職王存顧臨等同編經武要略兼剛定諸房例册元祐四年詔密院條例久未編修又自官制後舊事𨽻他司所存者亦未刪正命承旨司取索編修以奉議郎蔡駰寇德郎衛規充編修官續會要舊以四貟為額紹興兵興裁省其半會要三年樞密請置檢詳二貟編修止存一貟後復中興事類刪取法制熙寧二年樞密院乞將祖宗以來法制所宜施行於久逺者並與刪取大旨著為畫一及聖政釐革條章檢尋本院文書以次紀録其事目曰兵制几招捒屯戍訓諫之類皆附焉曰馬政曰邊防曰夷狄曰屬國曰守城曰器械曰捕盜曰選材曰責效各以其事類相從一如兵制候編成策仍於逐門各留空紙以備書載將來處置事件從之詔以經武要略為名會要編録條例熙寧九年宣徽比院使王拱辰言本院前後降宣劄條例文字及逐旋聖旨指揮不可遺墜乞行丨丨所貴朝廷故事永久可備檢用從之六月拱辰辟著作郎何詢直充編修官就本院置局十年八月編成丨丨并目二十五䇿上之十二月罷局詢直減二年磨勘長編刪潤條法紹興三年樞密院言本院雖有編修官四貟止是丨丨丨丨又裁省其半中興會要刪定時政孝宗朝編修官張淵言樞密院時政記係本院諸房應降聖旨按月作時政記編修官丨丨近蒙朝廷止作録送付下乞今後丨丨記止據憑録送到文字依舊按月修進從之孝宗會要刪定例册熙寧三年命著作佐郎館閣校勘王存陳侗大理寺丞館閣校勘顧臨並差編修樞密院經武要略丨丨諸房丨丨以樞密院副承旨李綬管勾至九年秋修畢上之同上次第文書神宗朝除周萃樞密院編修官制曰樞密之府自祖宗以來釋患特危應變之大計與夫將相議論之臣密旨要䇿皆具于此而文書貿亂淆雜而無紀綱故選能臣使丨丨之荆公文集經武要略見前刪取法制下注樞庭備檢王銍權樞密院編修纂集祖宗兵制書成上覽之稱善命改京官賜名丨丨丨丨中興繫年録纂集兵書見上文注召問兵學顧臨傳臨編修樞密院經武要略神宗丨丨以丨丨臨對兵以仁義為本仁者愛人義者循理靜靜之機安危所繫也國史扶立世教胡忠簡公銓紹興兩宫未歸母后春秋已高故與大臣決䇿從權獨樞密院編修官胡公銓上書數百言王倫秦檜孫近願竿三人頭羈留狄使興問罪之師當是時一胡編修名震天下勇者服怯者奮下至武夫悍卒遐方裔土莫不傳誦其書樂道其姓字爭願識面雖北敵亦因是知中國之不可輕丨丨丨丨非聖朝之伯夷也周平園集與聞國論隆興間臺諫言黃文昌疏云編修官雖專以編録本院時政記為職然既繫樞密官屬亦得與都承檢詳到宰執閣子丨丨丨丨孝宗實録置無定貟編修官隨事丨丨丨丨以本院官兼者不入䘖四朝志古今合璧事類備要後集卷十七
