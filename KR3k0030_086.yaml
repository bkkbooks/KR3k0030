front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_086-1a, image: WYG0939/WYG0939-0698a.png}
body:
  text: 古今合璧事類備要後集卷十七宋謝維新撰樞屬門都副承㫖歴代㳂革五代有承㫖副承㫖以諸衛將軍充職源國朝大平興國中以楊守一充都承㫖都始也是時都承㫖副承㫖多用士人真宗後稍稍遂用吏人歐陽修建言請復舊制不克行熈寜二年始以東上閤門使李評為樞宻都承㫖李綬為之副不用院吏而更用士人自評治也續會要初評受命文潞公為樞使以舊制見不為禮評訴於上命檢故事不獲乃詔都承㫖副承㫖見樞宻使副並始閤門使禮熈寧五年以尚書比部貟外郎集賢校理同修起居注曽孝寛為起居舎人充史館修撰兼都承㫖先是或用士人亦止於右職中選用文館兼領自孝寛始也元豐三年用張誠一為客省使都承㫖自是都承㫖自是都承復用武臣續會要元祐中復以文臣帶待制充都承㫖哲宗職官志至崇寧以後則專用武臣矣四朝志紹興二年權禮部侍郎趙子畫充徽猷閣待制宻院都承㫖自改官制後始除大臣自子畫始中興系年録建炎四年髙宗在會稽以武臣辛道為都承㫖頗用事紹興元年十二月辛道宗既免乃詔依元祐職制置都承㫖一貟並差兩制為之中興會要然但聞一二人而已淳熈中王抃久用事孝宗惡焉遂復用士人事類口占兵數魏仁浦為樞宻副承㫖周祖問屯兵之數及將校名氏令取簿參視之仁浦曰臣悉能記之遂口占而疏舉籍以校一無差誤五代史掌宣密命都承㫖副都承㫖丨承丨丨丨通領院務若便殿侍立閲試禁衛兵校則隨事敷奏承所得㫖以授有司四朝志始用士人熈寧三年始以東上閤門使李評為樞宻都承㫖李綬為之副不用院吏而更用士人自評始也續會要復用儒臣蕭正肅燧例知閣官兼承㫖或怙寵招權孝宗思丨丨丨丨淳熈九年正月命公以龍圖閣待制為之公言績帥餘風未殄羣臣進言非迎合獻諛則强辨邀譽當察誠偽虚實上稱善孝宗聖政文館兼領熈寧五年以尚書比部貟外郎曽孝寛充史館修撰兼都承㫖丨丨丨丨自孝寛始續會要正人宜留劉安世作都承㫖待制范相純仁之出由安世章疏已而復拜吕相大防遂擬安世真定宣仁難之吕云劉安世曽言范純仁今既復用宜少避之宣仁曰今既不作言事官自不相妨其後樞宻院奏事宣仁申前語韓師朴忠彦如吕之對宣仁曰如此丨丨丨且丨朝廷遂輟言行録請委疆事王巖叟字彦林為樞宻都承㫖湖北諸蠻互出擾邊公請專以疆事委荆南唐義問遂以草檄文喻義問以朝廷方敦尚恩信勿為徼倖功賞之意其後終底綏寧言行録為言邊防洪文安遵兼權樞宻院都承㫖公既以近臣兼承宻㫖邊防民隠每為上言三衙春夏秋馬夏菰城仰給蘇湖秀三州適積水冒田有司預請倍輸夏麥以補芻粟北狄索劉孝恭等二百家公皆執不可軍器刓弊命公料簡公區别良窳衆謂熟於軍旅者不能也上以是有大用意周益公集侍立敷奏都承㫖從五品副都承㫖正六品通領院務及承百司之事檢察主事以下功過而陞黜之凡御崇政延和殿則陞以丨丨若禁衛兵校試技藝及蕃國入見則隨事丨丨所得㫖以授有司神宗正史聀官志侍立受讀每崇政殿臨決庶務則承㫖丨丨殿前侍衛司奏事則承㫖而丨丨之會要參右府務右府管天下之機務而承㫖佐佑參總焉淇水除張誠一制贊右府謨除范純禮制丨丨丨許丨之㣲曲阜陪輔帷幄除劉奉臣制云丨丨丨丨以承宻㫖副介樞機除曹誘制云樞機之地親承密㫖雖在副介亦須得人並同上檢詳歴代㳂革檢詳之職古無之國朝熈寧四年詔以編修經武要略官四人王存陳侗陳奉世蘇液檢詳樞宻院諸房文字禮遇視中書檢正官元豐三年詔定置三貟及改官制檢詳官尋罷續會要建炎三年樞宻院請依祖宗朝置檢詳諸房文字兩貟叙位在左右司之下紹興二年詔樞宻院已置都承㫖一貟减檢詳一貟樞宻請置二員從之中興會要三十二年詔樞宻院諸房令檢詳書擬從左右司請也乾道二年詔樞宻院檢詳係掌朝廷機要文字不許出謁及接見賔客亦令遵兩省官施行孝宗會要事類樞掾熈寧五年詔檢詳文字劉安世自擢置丨丨奉職不苟可除集賢校理實録機屬神宗朝除范育檢詳文字制曰右府典領樞丨而設丨于下以覈其事李凊臣行掌機要乾道二年詔樞宻院檢詳係丨朝廷丨丨文字不許出謁賔客會要典樞機見前機屬注宻吕大忠檢詳樞院吏兵房文字令丨義勇丨丨大忠言養兵猥衆國用日屈漢之屯田唐府兵善法也弓箭手近於屯田義勇近於府兵擇用一焉兵屯可省矣事略申酌故實陳居仁字安行樞屬闕貟方以著廷名進擬上曰陳居仁今為何官對曰為郎上曰豈有人材如居仁而可久為郎者乎即除樞宻檢詳文字二樞不受私謁差遣恩例悉令投牒送檢詳所公為之考令丨丨丨丨可否立决右選翕然歸心樓攻媿集謀作文書劉子羽樞宻院檢詳文字張魏公同知樞宻范㻴來赴行在張公奏瓊大逆不道獨與子羽宻丨夜召子羽及選宻院謹飭吏數人丨丨丨劄榜皆備鎻吏于府中翌早公赴都中召瓊議事瓊從兵隘塗巷意象自若坐定子羽亟取寫勑黄紙請前揖瓊下曰有勑將軍宜下大理置對命縛瓊送大理寺子羽已張榜于省門親以㫖勞瓊衆頓刄應諾瓊論死兵分𨽻神武軍晦巷文集㫖撰詔檄紹興三十一年元顔亮叛盟時洪文敏公邁仕樞宻院檢詳宰傳相傳丨令丨書丨榜丨家簉屬幄籌慶元制覈事右府見前機屬注熈寧詔置丨丨四年以編條經武要略官王存等四人檢詳樞宻文字秩序俸給視中書檢正官會要編修官皇朝㳂革編修官之職古無之編國朝慶歴四年史館王洙承㫖單士寧修例册編修之名自此始分紀熈寧三年以館職王存顧臨等同編經武要略兼剛定諸房例册元祐四年詔宻院條例久未編修又自官制後舊事𨽻他司所存者亦未删正命承㫖司取索編修以奉議郎蔡駰寇德郎衞規充編修官續會要舊以四貟為額紹興兵興裁省其半會要三年樞宻請置檢詳二貟編修止存一貟後復中興事類刪取法制熈寧二年樞宻院乞將祖宗以來法制所宜施行於久逺者並與刪取大㫖著為畫一及聖政釐革條章檢尋本院文書以次紀録其事目曰兵制几招捒屯戍訓諫之類皆附焉曰馬政曰邊防曰夷狄曰屬國曰守城曰器械曰捕盜曰選材曰責效各以其事類相從一如兵制候編成策仍於逐門各留空紙以備書載將來處置事件從之詔以經武要略為名會要編録條例熈寧九年宣徽比院使王拱辰言本院前後降宣劄條例文字及逐旋聖㫖指揮不可遺墜乞行丨丨所貴朝廷故事永久可備檢用從之六月拱辰辟著作郎何詢直充編修官就本院置局十年八月編成丨丨并目二十五䇿上之十二月罷局詢直減二年磨勘長編刪潤條法紹興三年樞宻院言本院雖有編修官四貟止是丨丨丨丨又裁省其半中興會要刪定時政孝宗朝編修官張淵言樞宻院時政記係本院諸房應降聖㫖按月作時政記編修官丨丨近䝉朝廷止作録送付下乞今後丨丨記止據憑録送到文字依舊按月修進從之孝宗會要刪定例册熈寧三年命著作佐郎館閣校勘王存陳侗大理寺丞館閣校勘顧臨並差編修樞宻院經武要略丨丨諸房丨丨以樞宻院副承㫖李綬管勾至九年秋修畢上之同上次第文書神宗朝除周萃樞宻院編修官制曰樞宻之府自祖宗以來釋患特危應變之大計與夫將相議論之臣宻㫖要䇿皆具于此而文書貿亂淆雜而無紀綱故選能臣使丨丨之荆公文集經武要略見前刪取法制下注樞庭備檢王銍權樞宻院編修纂集祖宗兵制書成上覽之稱善命改京官賜名丨丨丨丨中興繫年録纂集兵書見上文注召問兵學顧臨傳臨編修樞宻院經武要畧神宗丨丨以丨丨臨對兵以仁義為本仁者愛人義者循理靜靜之機安危所繫也國史扶立世教胡忠簡公銓紹興兩宫未歸母后春秋已高故與大臣决䇿從權獨樞宻院編修官胡公銓上書數百言王倫秦檜孫近願竿三人頭覊留狄使興問罪之師當是時一胡編修名震天下勇者服怯者奮下至武夫悍卒遐方裔土莫不傳誦其書樂道其姓字爭願識面雖北敵亦因是知中國之不可輕丨丨丨丨非聖朝之伯夷也周平園集與聞國論隆興間臺諫言黄文昌䟽云編修官雖專以編録本院時政記為職然既繫樞宻官属亦得與都承檢詳到宰執閣子丨丨丨丨孝宗實録置無定貟編修官隨事丨丨丨丨以本院官兼者不入䘖四朝志古今合璧事類備要後集卷十七
