body:
  text: 古今合璧事類備要外集卷二十五宋謝維新撰刑法門赦宥古今源流赦者古人忠厚之盛心也自虞舜有眚災肆赦之文其後周官有三刺三宥三赦之法穆王繼之故呂刑一書亦有五刑之疑有赦五罰之疑有赦之條然古人本以人之有過誤遂從疑典而赦之秦漢以來不本此意蓋有即位而行赦亦有其兵而行赦又有符瑞而行赦又有災變而行赦此猶可也亦有無故而祈為市恩之地而行赦甚者間歲一赦而每歲數赦者有焉雖曰不失古人忠厚之心適所以滋小人怙恩之地惟我國朝自三歲郊禋行赦之外其餘非大典禮大冊命則不行赦焉間有曲赦之令亦事出於權宜而非用之為常典也此其所以有合於古人忠厚之心而非秦漢以下之君所可髣佛其意者然赦者小人之幸君子之不幸也夫以人之情誰能無過不幸而陷於刑僇於此而不開其自新之門是固非聖人忠厚之心然世之人不能皆君子也固有今日脫之纍囚而明日復罹於禁網愍不畏死視國家三尺法不啻如辨髦而輕之曾弗思痛悔懲艾體國家與我自新之意也小人得志君子吞聲治天下者宜知所輕重矣事類肆赦青災丨丨注言赦而肆過害當緩之宥過丨丨無大並書宥罪雷雨作解君子以赦過丨丨緩死君子以議獄丨丨並易小過赦丨丨語大眚肆丨丨注赦其罪也春秋從重赦丨丨記好生丨丨之德洽于民心書三赦司刑掌丨丨一赦曰幼弱再赦曰老耄三赦曰蠢愚禮五過五罰不服止于丨丨書過市國君丨丨刑人赦同上解網成湯丨丨四面史無辜多方間釋丨丨書衆疑司冦正刑明辟丨丨赦之在宥開丨丨天下莊子委轡宜思丨丨之懷兼追解網之德注管仲曰赦者奔馬之轡也白六帖小利管仲曰凡赦者丨丨而小利久而不勝其禍無赦者小害而大利久而不勝其福大恩赦者丨丨也漢紀無赦丨丨之國其刑必平文中子不敬管仲曰赦出則民丨丨惠行則過日益大酺漢武帝元鼎元年赦天下丨丨三日賜酒元封元年甘泉産芝九莖丨雲陽百户牛丨作芝房歌同上更始漢承兵革之後比屋可刑故申以大赦之命滌蕩穢流與民丨丨時勢然也天下乃循襲而不革失時宜矣漢紀滌穢大赦者權時之宜非常典漢承兵革之後故設三章之法大赦之令丨蕩丨流與民更始時勢然也枯物孟光責費禕曰赦者偏丨之丨非明世宜有今上仁賢百僚稱職有何旦夕危負以喪奸宄禕顧謝而已蜀志除瑕發哀矜之詔引在豫之責蕩丨丨釁贊揚布澤晉郭璞傳顯義赦以丨丨後岑彭傳布信所以丨大丨者赦令也盧坦傳銀印孫皓天冊元年吳郡言掘得丨丨長二尺廣三分上刻年月字於是改年大赦玉璽劉元海遷都平陽汾水中得丨丨又曰新保之泉無海蓋王莽時璽也獻者因增其三字元海以為已瑞大赦天下改年也崔鴻前趙録烏啼宋元康中徙彭城王義康為豫章臨川王義慶時為江州相見而笑文帝間而快之召還宅義慶大懼妓妾夜間丨丨聲叩閣云明日有赦後改為南州因製為丨夜丨曲蠅集載記苻堅欲赦與王猛苻融密議于甘露堂親為赦文有一大丨丨于筆端俄有小青衣大呼於市曰官令大赦須臾不見南宗室義慶傳生恩丨丨既及於四海和氣遂充於八紘韓文和氣德音朝發于九天丨丨夕周于四海劉禹錫改元赦狀雞竿天子御端門詔天下渙汗發澤與民更始建金丨於仗內聳修丨而揭起李庾西都賦又先集囚徒于闕下令衛尉樹金雞宣制訖乃釋之六典鼉鼓乃建雞竿伐丨丨帝命出皇恩普錫巽風作解雨文粹賜民爵漢高二年赦罪大丨丨丨又文帝即位赦天下丨丨丨一級又景帝五年立皇太子為常山王大赦天下丨丨丨一級又宣帝元始元年鳯凰集膠東千乘大赦天下丨丨丨一級租稅勿收詔賜帛宣帝元康元年丨曰鳯凰集太山陳留甘露降未央宮朕未能景先休烈獲䝉嘉瑞其赦天下丨鰥寡孤獨孝弟力田丨赦殊死高帝五年下令曰兵不得休息萬民勞苦甚今天下事卑其丨天下丨丨以下又武帝元封六年行幸河南祠后土昆田出珍物化為黃金神光三燭赦海隂殊死以下赦死罪景帝四年夏蝗秋丨丨丨又武帝元封四年祠后土丨淮隂賜中都丨丨以下又後章帝章和元年四月丙子以前減死罪一等勿笞詣金城郭躬上封事曰聖恩所以減死罪使戍邊重人命也今死罪亡命甚衆而詔令不及惟天恩莫不蕩宥帝善之下詔赦焉赦軍士前武帝建元六年丨鴈門代郡丨丨不循法者赦貶爵二月丨丨丨從算赦過租天漢三年丨行幸所丨丨赦繫囚後章帝章和元年丨天下丨丨並同上地震赦武帝建元四年丨丨丨又宣帝本始四年丨丨大丨泰畤赦武帝元鼎五年丨丨于甘泉天子龍郊見夏丨天下又後元元年薦郊時光景並見赦天下雍郊赦景帝五年丨丨見五帝丨天下景星赦後主景曜元年丨丨見於是大丨改元北斗赦唐一行長於數所算王生其子以殺人繫獄求赦於一行一行曰吾以數推之當有赦道其徒授以布囊戒令某處廢園伺之有物來其數七共捕之以囊携之勿脫至時果有七豕入園盡獲之一行置之大甕中密覆封書梵字志之太史奏丨丨不見召一行問之曰莫若大丨從之其夕太史奏見大星如故雜爼願無赦後吳漢病篤上親問之曰臣丨謹丨丨而已不妄赦蜀諸葛亮二十餘年赦不妄下不亦卓然陳壽傳金雞樹唐武后南有大檞樹赦日置雞其杪賜號丨丨丨又唐中書令供赦日植金雞於仗南竿長七尺有雞高四尺黃金飾首銜幡長七尺盛以絳繩將作監供焉集百官父老囚徒坊小兒得雞首者以錢求或取絳幡而已百官志丹鳯門幸丨丨丨大赦天下韓文公元和聖德詩草赦令韋承慶字延休張易之誅承慶以素附離免冠待罪時議丨丨丨咸推承慶召使為之無撓色撰辭援筆而就駮赦論五代晉高祖即位屢赦天下張允為丨丨丨以獻行赦不以為恩不行赦不以為無恩罰冇罪故也自古皆以水旱則降德音而宥過開狴牢而出囚冀感天心以救其災者非也假有二人之訟一有罪而一無罪若有罪者見捨則無罪者銜寃此乃致災之道非救災之術也至使小人遇天災則皆喜而相勸以為惡曰國將赦矣必捨我以救災如此則是教民為惡也夫天之道福善而禍淫若捨惡人而變災為福則是天亦喜人為惡也凡天之降災所以警戒人主節嗜欲務勤儉恤矜寡正刑罰而已是時高祖方好言覽之大喜封錢三府陶朱公故人莊生謂楚土曰某星害楚德可除之王使封三府之錢注黃白赤金也將赦慮人知有竊盜痤於礦石管子曰無赦者若丨疽於丨丨委轡必顛覆也礦石療疾也車駕西都前高帝五年丨丨丨丨長安大赦天下士夫新業武帝元朔二年詔嘉與丨大丨日丨厥丨赦天下赦所過徒元封二年冬上行幸雍瓠子河决制命侍從以下皆負薪塞河堤作瓠子歌丨丨丨丨赦今年租五年丨天下所幸縣為出丨丨丨賦與民更始元朔元年赦天下丨丨丨丨厲精更始其赦天下與士大夫丨丨丨丨宣帝詔災武園赦元帝初元二年詔天丨降于孝丨丨館咎在朕躬其丨天下年饑饉赦二年詔連丨不收元元之民困於丨丨朕德不能覆養其丨天下改行自新比年大赦使百姓得丨丨丨丨切見大赦之後奸邪不衰止此導之未得其務也前康衡傳洗心更始嘉與海內丨丨丨丨後章帝紀宗祀光武後明帝永平二年丨丨丨丨于明堂赦天下又章帝建初三年宗祀明堂大赦天下宗祀五帝和帝永和五年丨丨丨丨於明堂大赦惡冒善傷賊良民之甚者莫大於數赦贖惡人則丨人丨而丨人丨古者惟始受命之君承大亂之極冦賊姦宄難以法禁故不得不有一赦與之更新非以養奸猾也後安帝王符述赦賦大德小惠諸葛亮時有言惜赦者亮曰為政以丨丨不以丨丨故康衡不願為赦先帝亦言治亂之道極矣曾不及赦若劉景升父子歲歲赦宥何益於治華陽國記貫索夜見丨丨九星七星丨丨大赦晉天文志驛馬夜流徐路繫冀州獄别駕崔隆宗慰問之路曰昨夜丨丨星流計赦須臾應至隆宗遣人出城候焉俄而赦至北史將與更始詔曰夫赦令者丨丨天下丨丨誠欲百姓改行潔已全其性命也往者有司多舉奏赦前事纍增罪過誅陷亡辜甚繆於赦小過舉賢材之義平帝紀一切勿按建武七年詔中都官三輔郡國凡有罪非犯誅死者皆丨丨丨丨其罪見徒為庶人而罪之命吏以文除之光武紀好人喑啞唐太宗謂羣臣曰語曰一歲再赦丨丨丨丨吾有天下未嘗數赦者不欲誘民於幸死也小人之幸每歲一赦或一歲再赦丨丨丨丨君子之不幸也劉知幾傳責躬大赦太宗正觀二年旱蝗丨丨丨丨就第放赦安樂公主産男滿月中宗韋后幸其第丨丨丨丨天下更新孫伏伽諫陛下制詔曰常赦不免皆原之此非直赦有罪是亦與丨丨丨丨辭也天下自新陸子昻八科北大赦澡蕩羣罪丨丨蒙恩咸得丨丨天地之施臣願陛下廣丨丨丨丨雷雨之仁取垂拱以來罪無輕重所不赦者並皆原洗死者還官生者霑恩則天下瞭然知所陷罪非陛下之意也唐韋嗣立傳仁恕之道赦宜從重所以昭丨丨丨丨廣德澤之恩陸贄奏議蠲逋賑民李吉甫言陛下降赦令丨丨負丨飢丨恩德至矣刑法志紓難宥下丨多丨收羣小者惟赦而已陛下每發德音敷丨丨士陸贄奏議風雲改色九廟成禮百神降祥鸞輅旋行丨丨丨丨殊恩廣被再𢎞莫大之恩寶歷惟新更啓無疆之祚劉禹錫改元赦天光下臨聖德廣運浹于華夏丨丨丨丨照彼幽蟄網間三面危疑者許以自新照被四聰瑕類者期於録用同上賀赦表天澤餘潤桞子厚貶永州司馬貽書蕭俯曰儻因賊平慶賞之餘得以見白使受丨丨丨丨雖朽枿敗腐不能生殖猶足蒸出芝菌以為瑞物不虛為太平人望外之澤詒許孟容曰今其黨與幸獲寬貸得善地無公事坐食俸祿德至渥也尚何敢更俟除弃廢痼希丨丨丨丨哉同上感泣思奮奉天所下制書雖武人悍卒無不感動流涕後李挹真入朝為帝言陛下在奉天山南時赦令至山東士卒聞者丨丨丨丨臣是時知賊不足平矣唐陸贄傳宣剔流涕德音渙然以之更始所在丨丨之際聞者莫不丨丨雖或凶礦匪人亦為之欷歔誠之動物乃至于斯懷梟鴟以好音消祲沴為和氣同上罷兵狀推誠改過致理興化必在丨丨忘已濟人不吝丨丨同上罷兵赦文受煦加恩劫脅之役盡除聚斂之名皆去傷痍丨丨老疾丨丨豐財已復其征徭賜種更盈於穜稑嚴山川之祀神必有依申義烈之家物無不感栁東平赦表勳録爵班農有薄征市無强價丨勤是丨丨秩以丨爰褒有客尊賢之典惟新載奉素王宗教之道斯在同上賀赦表仁滂施厚滌濯剗磢磨滅瑕垢續功臣裔拔賢任耇孩養無告丨丨丨丨韓愈聖德詩恩浹幽明丨丨丨丨慶溢寰宇象德乾坤同明日月同上賀表廣務寬大覬其匍匐相率降欵盡至丨丨丨丨用明惡殺之德杜甫集不原咸赦太祖建隆元年詔因領節度州名定有大下之號曰宋改元大赦常赦所丨丨者丨丨除之不得該赦同上開寶四年詔自今年十一月一日後應犯强竊盜者丨丨丨將來郊天丨委所在長吏速告諭免令下民誤犯刑獄曲求𡨕祐建隆二年德音降死罪囚流以下釋之時太皇后寢疾上憂懼乃丨赦天以丨丨丨焉長編極論如法太宗太平興國二年詔自今八月一日後吏民所犯丨丨丨丨不在赦宥之限自後每郊天大禮前約束三年一赦太平興國六年太宗十一月親享太廟合祭天地于圓丘先是有秦再思者上書願勿再赦且引諸葛亮佐蜀數十年不赦事上頗疑之以問趙普普曰國家開創以來具存彞制丨丨丨丨所謂其仁如天堯舜之道也劉備區區一方用心無足師法上然其對赦宥之議遂定念囚欲赦真宗祥符八年閏六月大赦天下先是上謂宰相曰朕以盛暑之月每丨繫丨丨肆恩宥何以為名王旦曰今邊鄙寧謐黎庶阜安特覃大慶固其宜也丄曰朕前後赦文未嘗不以謹罰為首今當别白條告使四方晚解旦乃以二事為請故特著之長編務從寬大仁宗景祐四年上有事明堂將赦謂宰相文彥博卿等廣詢民間利病者為條目丨丨丨丨稱朕勤恤之意彥博等曰聖意叮嚀恐赦文所載不能具悉上曰朕齊戒以見天地祖宗敷大號於天下因澄清宿弊所以條于赦令者貴示信萬方耳寶訓以召和氣仁宗天聖七年上曰朕不欲赦然捨是無丨丨丨丨四月赦天下免河北被水民賦租與常不同真宗祥符元年大赦常赦所不原者咸赦除之上曰此赦丨丨時丨丨但常赦所有不能行者並録出條目共議之庶實惠及民並從違制仁宗范仲淹富弼奏今後赦書內宣布德澤有所施行而三司轉運司州縣不切遵守者丨丨丨丨論曲盡物情哲宗王巖叟言臣每歎前世赦宥之弊莫不幸小人則多而惠良民則寡撫親近則厚而霑幽逺則疏非前朝以精講之則無以丨丨丨丨深得民意再犯不原光宗紹興四年祭天地于明堂赦天下詔徙流罪人經登極赦免罪丨丨者丨丨免爰布湛恩髙宗建炎元年羣臣因請即位其赦文略曰慰民耳目之注敷朕腹心之言丨丨丨丨誕綏區夏可大赦天下聖政惟求民瘼孝宗隆興三年三月臣僚上言皇帝登寶位赦文及續降寬恤十八事並係恤民州縣未聞施行欲望降詔申敇詔略曰朕臨朝退聽丨以丨丨丨為務自初踐位首行曠澤續降寬恤十八事而郡縣之間不為布宣繼自今其各洗心滌慮恭爾有官俾豫一人實惠孚於百姓同上盍下新令孝宗即位詔曰春秋法五始之要聿彰受命之符天地之大德曰生丨丨維丨之丨釋囚推恩寧宗慶元五年德音降諸路流以下丨丨杖以下丨丨知慶壽故事歐陽修縱囚論信義行於君子而刑戮施於小人刑入于死者乃罪大惡極此又小人之尤甚者也寧以義死不茍幸生而視死如歸此又君子之尤難者也方唐太宗之六年録大辟囚三百餘人縱使還家約其自歸以就死是以君子之難能期小人之尤者以必能也其囚及期而卒自歸無後者是君子之所難而小人之所易也此豈近於人情哉或曰罪大惡極誠小人矣及施恩德以臨之可使變而為君子蓋恩德入人之深而感人之速有如是者矣曰太宗之為此所以求此名也然安知夫縱之去也不意其必來以冀免所以縱之乎又安知夫被縱而去也不意其自歸而必獲免所以復來乎夫意其必來而縱之是上賊下之情也意其必免而復來是下賊上之心也吾見上下交相賊以成此名也烏有所謂施恩德與夫知信義者哉不然太宗施德於天下於兹六年矣不能使小人不為極惡大罪而一日之恩能使視死如歸而存信義此乂不通之論也然則何為而可曰縱而來歸殺之無赦而又縱之而又來則可知為恩德之致爾然此必無之事也若夫縱而來歸而赦之可偶一為之爾若屢為之則殺人者皆不死是可為天下之常法乎不可為常者其聖人之法乎是以堯舜三王之治必本於人情不立異以為高不逆情以于譽湖山吳芾謝肆赦表日月並明欽昊天之成命雷雨作解得萬國之歡心當乾坤清明之時舉天地筮貺之禮既受泰元之策爰頒廣宇之春舞干羽於兩階徂維求定開湯網之三面咸與維新詩集雲鵲飛五色丨間丨丨飛天上來傳聞赦書至却放夜郎回李白詩雷作解日御臨雙闕天街儼百神丨舒丨丨氣歲復建寅春張說和張監觀赦詩泥金檢玊大明煌煌天地分六龍負日升天門鳯凰飛來銜帝籙𤣥載萬代金皇孫靈雞鼓舞承天赦高翔百匹乘朱轓升中告成答𤣥貺丨丨丨丨照鴻恩李益大禮畢皇帝御丹鳯門改元建中大赦詩滌瑖蕩垢赦書一日行萬里罪從大辟皆除死途者追回流者還丨丨丨丨清朝班韓愈詩書報天中丨丨丨丨赦人從海上間沈佺期詩籥動圜狴聖人宥天下幽丨丨丨丨同上九泉開白日丨丨丨丨丨六翮起青雲三元降紫泥六甲迎和氣丨丨丨丨丨恩洗萬家春國嚴三嵗禮丨丨丨丨丨舟楫親南斗衣冠拱北辰張舜民詩不日慶釐成萬計捐珠寶千章列棟盈秋毫思頰挫丨丨丨丨丨青簡流芳逺丹書霈澤傾神人罔恫怨道路沸歡聲蔣之竒上清儲祥宫詩古今合璧事類備要外集卷二十五
