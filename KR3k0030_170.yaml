與邴原三人相善時人丨丨丨丨寧為龍頭原為龍腹歆為龍尾盧范陽商音古今姓纂姜氏齊太公之後至文公子髙髙孫徯食采於盧今盧縣是也因姓盧氏秦有博士盧敖漢有燕王盧綰事類立為燕王史記盧綰豐人與髙祖同里同日生及壯俱學書又相愛髙祖以為太尉嘗從出入卧内衣被飲食賞賜羣臣莫敢望封為長安侯後丨丨丨丨常懐濟世後盧植字大幹涿郡人音聲如鐘性剛毅有大節丨丨丨丨志學為儒宗盧植為尚書彭伯曰盧尚書海内大儒人之望也名著海内丨丨丨丨士人楷模國之楨榦明試有功魏盧毓字子家為侍中在位三年多所駮爭詔曰毓稟性貞固心平體正可謂丨丨丨丨不懈于位者以為吏部尚書時舉中書郎詔曰得其人與否在盧生耳徳為世表北史盧昌衡字子均沈靜有才識為後進風流之士吏部蘇威考之曰丨丨丨丨行為世則論者以為美談善自標置盧元明字㓜章風采閑潤進退可觀丨丨丨丨不妄交游中山王熙嘆曰盧郎有如此風神唯須誦離騷飲美酒自為佳器渠人賴利盧賁字子徴涉書記解鍾律為懐州刺史决沁水東注名曰利人渠又𣲖入温縣名曰濫澗丨丨丨其丨儒學世推盧誕博學有辭采起家侍御史周文帝以其丨宗丨府為當丨所丨拜國子祭酒才備可用唐盧祖尚字季良光州人貞觀二年交州刺史以賄敗太宗方擇人而任之咸以祖尚丨丨文武丨丨也召見内殿知選校考盧承慶字子餘幽州人博學髙才太宗偉其辯擢民部侍郎檢校兵部尚書丨五品丨丨百官丨有坐漕溺舟者以失所載考中下其人無愠色更曰非力所及考中中亦不喜承慶嘉之曰寵辱不驚考中上其能著人善類此隱終南山盧藏用字子潛幽州人舉進士不得調丨丨丨少室二丨與陳子昻趙貞固友善多能知言藏用善著龜九官術工草𨽻大小篆八分善琴率思精逺士貴其丨丨為析滯論世謂丨丨仕宦㨗徑藏用始隱山中有意當世人因為隨駕隱士晩徇權利司馬承禎嘗召至闕下將還山藏用指終南山曰此中大有嘉處承禎徐曰以僕觀之丨丨之丨丨耳藏用慙童丱不凢盧懐慎滑州人在丨丨已丨丨韓思彦嘆曰此兒器不可量及長第進士神龍中遷侍御史上䟽陳時政清儉不營産懐慎丨丨丨丨丨服器無金玉文綺之飾所得禄賜於故人親戚隨散輒盡既屬疾宋璟盧從愿候之日晏設食惟蒸豆菜而已乃下制賜其家詔為立碑蘇頲為文帝自書清白為國寳盧奐早修整為吏有丨丨稱為陜州刺史帝次陜嘉其政題贊於㕔事曰専城之重分陜之雄亦既利物内存匪躬斯丨丨丨不墜家風治廣有清節盧奐天寳初為南海太守時謂自開元後四十年丨丨丨丨丨者宋璟李朝隱盧奐三人而已吏部號稱職盧從愿字子龔擢明經又舉制科髙第拜吏部侍郎吏選自中宗後紀綱耗蕩從愿精力於官六年以平允聞帝異之初髙宗時丨丨丨丨丨者裴行儉馬載及是從愿與李朝隱為有名故號前有裴馬後有盧李目為多田翁從愿代韋抗為刑部尚書盛植産占良田數百頃帝自薄之丨丨丨丨丨屢欲用為相卒以是止人謂識大體盧羣字載初系出范陽入為侍御史郭子儀家與嬖人張昆弟訟財徳宗促案之羣奏言昔子儀有大勲勞今所訟皆其家事且嬖人宅子儀昔畀之非子弟所宜言請勿問從之丨丨羣丨丨丨第進士宏辭盧景亮字長晦范陽人丨丨丨丨丨遷中書舍人善屬文根於忠仁有經國志以清靜治下盧鈞字子和舉進士第擢嶺南節度使海道商舶始至異時帥府爭先售其珍鈞不取時稱廉潔丨丨丨丨丨令蕃華不得通婚南方服其徳不懲而化大厯十才子盧綸字允言河中人與吉中孚韓翃等皆能詩齊名號丨丨丨丨丨自號玉川子盧仝居東都愈為河南令愛其詩厚禮之丨丨丨丨丨嘗為月蝕詩以譏切元和逆黨愈稱其工問書答無滯皇朝盧多遜懐州河内人博涉經史善伺人主意太祖好讀書每遣使取書史館多遜伺知即通夕閱視詰朝丨丨中事多遜丨丨丨太祖寵異之三世居官清節盧欒䟽眉目謹重寡欲斤斤自修與兄奐名相上下而剛毅過之拜御史中丞自懐慎奐及欒丨丨丨丨丨丨似之謂此吾之相如盧照隣字昇之范陽人調鄧王府典籖王重之丨曰丨丨丨丨丨也莫鉅鹿商音古今姓纂漢有富人莫氏見游俠𫝊大厯中比部員外郎莫藏用河南官氏志邢莫氏改為莫氏事類愛其才器北史莫含魏穆丨丨丨丨嘗參軍國大謀卒於左將軍好學善射莫雲丨丨丨丨道武時嘗典選曹遷執金吾參軍國謀議同上古今合璧事類備要續集卷二十
