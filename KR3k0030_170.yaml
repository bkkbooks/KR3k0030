body:
  text: 古今合璧事類備要續集卷二十宋謝維新撰類姓門髙渤海角音古今姓纂齊太公六代孫文公子髙孫傒以王父字為氏事類東觀畫像後髙彪字義方除郎中校書東觀數奏賦頌竒文因事諷諫靈帝異之遷内黄令帝敕同僚臨送祖於上東門詔丨丨丨彪丨以勸學者擁膝抱書魏髙柔字文惠為刺姦令史處法平允又夙夜匪懈至丨丨丨文丨而寢阿酃有才晉髙崧字茂琰謝萬為豫州都督崧為叙刑政之要數百言萬遂起坐呼其小字曰丨丨故丨丨興邪髙子偉器北史髙允字伯恭少孤夙成有竒度崔宏見之歎曰丨丨黄中内潤文明外照必為一代丨丨髙允忠臣後領著作述成國記文成曰丨丨丨丨矣又崔公云髙生豐才博學一代佳士髙昻壯氣髙昻字敖曹㓜時便有丨丨龍犀豹頸姿體雄異每言男兒當横行天下自取富貴誰能端坐讀書作老博士也其父曰此兒不滅吾族當大吾門以其昻藏敖曹故以名字之沙漠靜氛髙琳字季珉後加驃騎將軍周孝閔時討平文州氐師還帝宴卿士賦詩言志琳詩末章云寄言竇車騎為謝霍將軍何以報天子丨丨丨妖丨朝野推服髙熲字昭𤣥仕隋當朝執政將二十年丨丨丨丨時致昇平論者以為真宰相三世僕射唐髙儉字士廉以字顯齊清河王岳之孫遷尚書僕射士廉三世居此官世榮其貴上言賜鍾乳髙馮字季輔徳州人貞觀初數丨書丨得失辭誠切至帝丨丨丨一劑曰卿進藥石之言朕以藥石相報善銓賜金鏡髙儉為吏部侍郎丨丨叙人物帝丨丨背丨一况其清鑒卒謚曰憲以功名自許髙適字達夫滄州人舉有道科哥舒翰表掌書記尚節義語王霸衮衮丨丨丨丨丨政寛簡所涖人便之紀功鹿頭山髙崇文其先徙幽州七世不異居劉闢反杜黄裳薦其才統諸屯兵討闢時顯功宿將人人自謂當選及詔出皆驚後追擒之檻送京師入成都市井不移珍寳如山無秋毫之犯進西川節度南平郡王刻石丨丨於丨丨丨知古問髙君髙仲舒通詁訓學擢明經開元初宋璟蘇頲當國多咨訪焉璟等嘗謂人曰古事問髙仲舒又欲丨丨丨丨丨墾闢䝉褒詔本朝髙賦字正臣中山人其守唐也増戶萬一千三百八十給田三萬一千三百二十八頃而山林榛莽之地皆為良田嵗益稅二萬二千二百五十七作陂堰四十有四詔曰召杜南陽世稱循吏其亡久矣朕尚思之卿招懐飢流丨丨荒梗繕修陂堨績效具昭前人之良何以逺此賦再治唐凡五嵗與前守趙尚寛皆蒙褒詔賦自直龍圖閣至集賢院學士悉以墾闢之功也築室豹林谷髙懌字文悦髙祖季興唐末徙荆南之地子孫因家焉聞种放隱終南山懌亦丨丨丨丨丨放見而竒之與張嶤許勃號為南山三友元祐太學生髙荷字子勉故南平王苖裔丨丨丨丨丨也號還還先生作詩數千篇抜出筆墨畦逕篇各有新意上黄魯直長篇警句云蜀天何處盡巴月幾回彎因此得名魯直䟦其詩云子勉以杜子美為標凖用一事如軍中之令置一字如關門之鍵而充之以博學行之以温恭天下士也夏會稽羽音古今姓纂夏后氏之後以國為姓又陳宣公孫御叔亦為夏氏徴舒其後也事類言行質直後夏馥字子冶少為書生丨丨丨丨同縣蔡氏髙氏並皆富植馥比門不與交通後與范滂張儉俱為黨魁乞應制舉皇朝夏竦字子喬江州徳安人上書丨丨丨丨其畧曰邊障多故羽書旁午而先臣承皓殞身行陣陛下録臣孤㓜任之州縣唯陛下辨而明之陛下以枕石潄流為達則臣世居市井陛下以金牓丹桂為材則臣未忝科第陛下以鳩杖駘背為徳則臣始踰弱冠陛下以荷戈控弦為勇則臣生不緜歴若陛下令臣待詔公車條問急政對揚紫宸指陳時事猶可共漢唐諸儒方車並馳而校其先後矣真宗頗嘉之對策庭乞題詩舉制科丨丨丨下有老宦者曰閱人多矣賢良他日必貴以吳綾手巾丨丨丨題曰殿上衮衣明日月硯中旗影動龍蛇縱横禮樂三千字獨對丹墀日未斜楊徽之歎曰真將相之器也同上在紫宸索新詞初除館職時方早秋上在拱辰殿按舞命中使丨丨丨公立進喜遷鶯日霞散綺月沉鉤簾捲未央樓夜凉河漢截天流宫闕鏁清秋瑶堦曙金莖露鳳髓香和雲霧三千珠翠擁宸遊水殿按凉州上大恱同上蔡濟陽徴音古今姓纂周文王第十四子蔡叔度生蔡仲胡受封於蔡子孫以國為氏晉有蔡墨秦相蔡澤漢功臣肥如侯蔡演事類文昭左僖二十四年富宸曰昔周公封建親戚管蔡郕霍丨之丨也趙史左蔡墨名黯晉大夫為趙簡子丨同上富貴自有史記蔡澤燕人干諸侯不遇問相於唐舉舉曰先生曷鼻曷一作仰巨肩魋顔蹙齃膝攣註巨肩謂頸低而肩竪魋謂貌魋回􅕚齃謂蹙近眉并膝攣曲也吾聞聖人不相殆先生乎澤知舉戲之乃曰丨丨吾所丨丨所不知者夀也舉曰從今以往四十三嵗澤笑謝而去謂其御者曰吾持梁躍馬食肉懐金印結紫綬富貴四十三年足矣持梁作飯也三世不分蔡邕字伯喈丨丨丨丨財里人髙其義定六經文熹平四年奏求丨丨丨丨字靈帝許之乃自書於碑使工刻立於太學門外後儒晩學咸取正之同丄稱蔡侯紙蔡倫用樹膚麻頭及敝布魚網以為紙帝善其能故天下丨丨丨丨浮航脫帶晉蔡謨字道明弱冠察孝廉性尤篤慎每事必為過防時人云蔡公過丨丨丨丨腰舟長茍進畏憚蔡克字子尼素有格量及居選官丨丨之徒望風丨丨山簡曰蔡子尼今之正人同上詔褒其清宋蔡撙字景節少方雅退黙為吳興太守自種白莧紫茄以為常餌丨丨丨丨詳練選事宋蔡興宗累遷尚書吏部侍郎孝武曰卿丨丨清濁今以丨丨相付後拜侍中每正言得失無所顧西齋交接蔡凝字子居授吏部侍郎年位未髙而才地為時所重嘗端坐丨丨自非素貴名流罕所丨丨平世三公南史蔡廓字子度宋武帝以其正直補御史中丞多所糾奏武帝嘗云蔡廓可丨丨丨丨平東將軍北史蔡祐字承先從周文戰有功授丨丨丨丨與齊神武戰於芒山祐時著明光鐵鎧所向無敵齊人咸曰此是鐵猛獸也號登瀛洲唐蔡允恭為十八學士時丨丨丨丨増四諫員皇朝蔡襄字君謨興化軍仙逰人仁宗増置諫官四員襄選在中執經講問蔡襄為政清明而於閩人尤知其風俗時閩士多好學而専詞賦以應科舉襄得鄉先生周希孟以經術𫝊授學者嘗至數百人襄為親至學舍丨丨丨丨為諸生率延見處士陳摶尊以師禮而陳襄鄭穆方以學行著稱鄉里襄皆折節下之歌詞達禁蔡挺字子正應天府宋城人為人有智計多詭譎自以勞久留邊作為丨丨有應念玉關人老之句因中使以丨丨中神宗閔之遂召用云揮毫立就蔡肇字天啓丹陽人召試中書舍人故事宰相未上馬前限三篇成天啓丨丨丨丨文不加㸃擬拜節度使制云於戲千里謬之毫釐朕不從中御也萬世垂之竹帛卿其以身任之天覺讀之擊節稱美田雁門徴音古今姓纂媯姓舜後陳厲公子完字敬仲仕齊或號田氏至田和簒齊為諸侯九代至王建為秦所滅建弟假廣項羽時並裂地稱王事類仁人國寳新序公季成謂魏文侯曰田子方雖賢人非有土之君也君與之齊禮設有賢於子方者又何以加之文侯曰子方者丨丨也仁人也者丨之丨也司馬兵法齊穰苴田完之苗裔景公與語兵事說之以為將軍將兵扞燕晉之師尊為大司馬齊威王論古者司馬兵法附穰苴於其中因號曰丨丨穰苴丨丨食客數千史記孟嘗君名文姓田氏招致賔客舍業厚遇之以故傾天下之士丨丨丨丨人復城七十田單齊諸田䟽屬也從反間火牛以破燕軍丨齊丨丨丨餘封曰安平君召見漢庭前田叔趙陘城人也喜劍學黄老術趙王以為郎中切直廉平王賢之髙祖丨丨與語丨丨臣毋能出其右者上說拜為漢中守權移主上田蚡孝景后同母弟封為武安侯後為丞相入奏事坐語移日所言皆聽薦人或起家至二千石丨丨丨丨誅鉏豪强田延年字子賔為河東太守丨丨丨丨姦邪不敢發議動朝廷霍光議廢昌邑王羣臣莫敢發言延年按劔叱羣臣即日議决大將軍曰誠然實勇士也當發大丨時震丨丨丨光因舉手撫心曰使我至今病悸一言取相車千秋本姓田氏上急變訟戾太子寃立拜為大鴻臚數月為丞相封富民侯無他材能術學又無伐閱功勞特以丨丨寤意旬月丨宰丨封侯世未嘗有也小車入朝初千秋年老上優之朝見得乗丨丨入宫殿門因號車丞相讀書擊劒魏田疇字子㤗好丨丨善丨丨曹操署司空户曹掾以討虜功封亭侯起樓聚書唐田𢎞正字安道性忠孝好功名丨丨丨丨萬餘卷為朕長城𢎞正以功加司徒同平章事來朝上眷勞殊等因請留闕下帝勞曰魏人樂卿之政四鄰畏卿之威丨丨丨丨又安用辭朱紫滿門榮冠當世乗𫝊赴都田游巖京兆人入太白山母及妻皆有方外志與共棲遲山水間召赴京師髙宗幸嵩山親至其門游巖野服出拜儀止謹樸上曰先生比佳否答曰臣所謂泉石膏肓煙霞痼疾者帝曰朕得君何異漢獲四皓乎勑丨丨丨丨拜崇文館學士帝營奉天宫游巖宅直宫左天子自書牓其門曰隱士田游巖宅自暴祈雨田仁㑹雍州人擢制舉為平州刺史嵗旱丨丨以丨而丨大至穀遂登人歌之獻軍國要機本朝田錫字表聖嘉州洪雅人言恭敬好禮既得諫官即上䟽丨丨丨丨丨者一朝廷大體者四太宗褒其言因賜錢五十萬上御覽屏風田錫至道中復知制誥召對悉丨丨丨三十卷御丨丨五卷詔褒之為得諍臣體田錫覽天下奏章有言民饑盜起及詔勑不便悉條奏其事真宗以丨丨丨丨之丨嘗目為汲黯田錫擢右諫議大夫真宗每見錫容必莊丨丨之曰朕之丨丨也人以比張詠田况字元均其先京兆人徙秦州渭州益州聽斷之明蜀丨丨丨丨丨樊上黨商音古今姓纂周文王子虞仲支孫為周卿士食采於樊因邑命氏今河内陽樊是也周有樊穆仲字山甫樊仲皮樊濟並其後也又殷人七族有樊氏仲尼弟子樊遲魯人蓋其後也事類舞陽侯前漢樊噲沛人項羽目曰壯士排闥見髙帝封丨丨丨樊侯學後樊鯈嘗刪定公羊嚴氏春秋章句當世號丨丨丨金盃屬賜樊子蓋字華宗仕隋為武威太守以善政聞煬帝曰人道公清定如此不謝曰臣安敢清止是小心不納賄耳乃賜口味百餘斛後陪宴積翠池帝親以丨丨丨子蓋酒曰良筭嘉謀俟公後動即以此盃丨公用為永年之瑞舉秀第一樊遜字孝謙専心典籍丨丨才為丨丨楊愔曰文章成就莫過樊孝謙政為第一樊叔畧仕隋為沐州刺史甚有聲稱遷相州刺史丨丨丨丨璽書褒美班示天下百姓語曰智無窮清鄉公上下正樊安定封清鄉安定公有將帥器唐樊澤字安時河中人有武力喜兵法議者皆謂丨丨丨丨議論經據樊宗師字紹述力學多通解著春秋傳魁紀公樊子凢百餘篇韓愈稱丨丨有丨丨嘗薦其才胡安定羽音古今姓纂帝舜之後胡公封陳子孫以謚為姓安定漢有胡建始居焉事類治令有聲前漢胡建字子孟河東人守軍正丞甚得走卒心監軍御史為姦建收斬之由是顯名後為渭城令丨甚丨丨至今渭城立祠孝廉第一後胡廣字伯始南郡華容人察丨丨試為天下丨丨天下中庸諺曰萬事不理問伯始丨丨丨丨有胡公清恐人知魏胡威字伯武厲操清白嘗省其父告歸賜其絹一匹威跪曰於何得此絹質曰是吾俸餘威乃受之官至前將軍青州刺史對武帝曰臣父丨丨丨丨臣清恐人不知潔行垂名胡奕字次孫平東將軍並以丨丨丨丨質素業貞粹可謂國之良臣時之彦士矣酒飲文成唐胡楚賔秋浦人屬文敏甚必酒中然後下筆髙宗命作文常以金銀桮㪺丨丨之丨丨輒賜焉大興學校胡宿字武平常州晉陵人知湖州築石塘百里捍水旱丨丨丨丨學者盛於東南自湖學始既去而思之名其塘曰胡公塘而學者為立生祠雋