body:
  text: 古今合璧事類備要後集卷五十九宋謝維新撰宫觀門總宫觀歷代沿革聖朝設祠祿之官以佚老優賢祖宗時員數絶少官制舊典云祖宗待臣以禮雖年及挂冠未嘗直令致仕皆以宫觀處之假以祿耳熙寧以後乃增焉是時方經理時政患疲老不任事者廢職欲悉罷之乃使任宫觀以食其祿時相王安石亦欲以此處異議者遂詔宫觀毌限員並差知州人以三十月為任四朝志事類琳宫式建丨丨太中祥符除向敏中制真館天聖中除王曾兼玉清昭應宫使總祠丨丨又初寮除劉緯制養恬丨丨又箋表退安丨丨之遊靖館總司丨丨夏英公賜王曾昭真廷總使丨丨乾興除王曾兼會虛觀制祠庭丨丨置使實近闕門荆公答富鄭公詔琳房總丨丨之職胡文恭行劉永叔制真宫領秩丨丨曲阜行劉奉世制神館暫安丨丨之遊本朝箋表假以祿祖宗待臣以禮雖年及挂冠未嘗直令致仕皆以宫觀處之丨丨丨耳官制舊典毋過員元豐元年李承之言近年以來內外宫觀約百餘員無纎芥職事虛費廩食不下數萬緡乞今後在京宫觀丨得丨十五丨諸路倍之所貴勤勞官守之人有以區别不虛費國用會要浮丘之袂間館珍臺獨揖丨丨丨丨本朝箋表香火之因修丨丨丨丨久退安於散地灑掃真祠丨丨丨丨拜賜散人之號並同上朱文公語聖朝設祠祿之官以佚老優賢舊員數絶少皆大官帶之真是主管本宫本觀御容之屬其他多只是監當差遣自王介甫更新法慮天下士大夫議論不合一切彈擊罷黜又恐駭物論於是創為宫觀祠祿以待新法異議之人然亦難得惟監司郡守以上眷禮優渥者方得之自郡守以下則盡送郡中與監當差遣後來漸輕今則愈輕皆可得之矣詩集因緣魚書曽替代香火有丨丨劉夢得詩老病莫欺丨丨未歸身玉局他年第幾人東坡送戴蒙玉局觀詩在京宫觀歷代沿革國朝舊制以宰相執政充使或丞郎學士以上充副使兩省或五品以上為判官內侍官或諸司使副政和改武臣官制以使為大夫以副使為郎為都監又有提舉提點主管官其戚里近屬及前宰執留京師者多除宫觀以示優禮之意四朝志紹興二十一年在京宫觀依在外宫祠以三十箇月為任中興會要又紹興五年詔任在京宫觀請給人從前宰執依見任減十分之二閣學士已上依六曹侍郎直學士已上依中書舍人太中大夫已上依左右司郎中任樞密都承旨閣學士已上依六曹尚書直學士已上依六曹侍郎大中大夫已上依中書舍人事類優禮見沿革注請給依見任減十分之二餘見沿革注宫觀使歷代沿革唐天寶七載以給事中楊釗充九成宫使宫使之名自此始南部新書國朝祥符中始真宗建玉清昭應宫王魏公旦為首相始命充使宫觀置使自此始然每為宰相兼職天聖元年吕夷簡為相時朝廷崇奉之意稍緩因讀罷使名石林燕語明道中錢惟演以使相為景靈宮使治平中武康節度李端願為醴泉觀使使相節度領內祠自此始也春明退朝録後又有集禧使治平四年富弼以觀文殿大學士充有太一宫使元祐六年馮京以彰德軍節度使充有同醴泉觀使元祐八年尚書右丞梁燾以疾求能詔與在京宮使宰相以為故事非宰相不除使遂致同醴泉觀使燾以資政殿學士充按元祐六年馮京已除中太一使夀非事始有佑神觀使大觀元年尚書右僕射趙挺之充使續會要徽宗建玉清萬夀宫乃命宰執兼使副用真廟故事也近以前宰執奉朝請者領在京宫觀使而在外舊相共除提舉宫觀非祖宗優待宰相之體靖康以來猶未釐正蓋朝廷未暇講也官制舊典事類景靈祥符七年宰臣向敏中為丨丨宫使會靈九年參政丅謂充丨丨觀使祥源天禧五年樞副錢惟演為丨丨觀使並同上近闕祠庭置使實丨丨門荆公集答富弼語總使真延丨丨丨丨王曽制總祠真館同上提舉宫觀歷代沿革國朝天聖七年王清宫災遂罷使而景靈會靈祥源三宫觀以學士舍人管勾李若谷罷參政為資政殿大學士提舉會靈觀自是學士待制知制詔皆得為提舉晏元獻以舊相提舉萬夀觀武臣李端願止得管勾祥源觀今朝官亦云提舉非故事也退朝録及石林燕語太乙宫歷代沿革漢武帝祠太乙于甘泉時有祠名而無其宫也事類節度充本朝元祐六年馮京以彰德軍丨丨使丨太乙宫使端明兼范鎮字景仁哲宗即位拜丨丨殿學士提舉中太乙宫丨侍讀詔曰西伯善養二老來歸漢室卑詞四臣入侍為我強起無或憚勤公遂辭不起改提舉崇福宫醴泉觀歷代沿革國朝元豐元年皇城司劉永夀為提點六年時君卿以皇城司為提舉元祐八年尚書右丞梁燾以疾求罷詔與在京宫使宰相以為故事非宰相不除使遂置同醴泉觀使大觀三年姚雄以右金吾衛上將軍充使續會要集禧觀歷代沿革國朝治平四年富弼以觀文殿大學士充集禧觀使萬壽觀歷代沿革國朝天聖七年晏元獻公以舊相提舉萬夀觀事類刺史提點國朝元豐元年左藏庫使昌州丨丨曹志為丨丨待制提舉元豐八年龍圖閣丨丨兼侍讀趙彥若為丨丨續會要同寅協力政和八年詔神霄玉清府寶總萬天監臨下土比詔四方改營宫宇以迎神貺更賴輔弼大臣丨丨丨丨七月二日旨太師魯國公蔡京少師太宰鄭居中少保少宰余深檢校太保領樞密院事童貫並兼充神霄玉清萬夀宫使知樞密院事鄧洵武門下侍郎薛昂中書侍郎白時中尚書左丞王黼宣和殿大學士蔡攸並兼充副使佑神觀歷代沿革國朝大觀六年尚書右僕射兼中書侍郎趙挺之除觀文殿大學士充使續會要在外宫觀嶽祠歷代沿革國朝宫觀皆俟力請而後授侍從而上任宫觀者絶少若因責降改作主管方且差焉熙寧中王安石相異已者方直除宫觀大抵宮觀非自陳而朝廷特差者如降黜之例四朝志二年詔杭州洞霄宫亳州明道宫華州雲臺觀建州武夷觀台州崇道觀成都府玉局觀建昌軍仙都觀江州太平觀洪州王隆觀五嶽廟並依嵩山崇福宫舒州靈仙觀置管勾或提舉提點官四年詔宫觀嶽廟留官一員餘聽如分司致仕例從便居住六年詔卿監職司以上提舉餘官管勾當者又詔年六十以上者乃聽差毋過兩任兼用執政恩例者通不得過三任四朝志後蔡京用事增廣職任崇寧三年添宫觀十政和三年添宫觀三十名見續會要多不録選人亦許乞嶽廟宣和王黼用事外開新邉以熙寧法革之一切不恤士夫於是失祿矣舊典事類琳宫式建丨丨見前總宫觀類祠庭丨丨置使真廷總使丨丨真館總祠丨丨並同上請間局熙寧六年以莊宅使帶御器械知鎮戎軍張璛為騏驥使提點鳯翔府太平宫璛有戰功以病丨退故以丨丨處之總琳房見前總宫觀類養真恬館同上領秩真宫闕總司靖館並見上注董正治官政和二年六月復宫觀縣丞詔在熙寧中先帝丨丨丨丨嘗詔宫觀置員縣置丞屬實在乎是所有宫觀縣丞並依大觀三年四月以前指揮詩集犯天顔張忠簡公闡奉祠祿陛辭上曰卿姑暫還秋涼復召卿公既退詩云公請丨丨丨今朝出漢關渾如倦飛鳥日暮傍巢還周益公集是地仙楊誠齋祠祿秩滿感恩詩全家廪祿皆天賜晚嵗祠宫丨丨丨匹似分司轉轉散也無拜表及寒溫他年第幾人東坡詩見總宮觀類古今合璧事類備要後集卷五十九
