  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_187-1a, image: WYG0940/WYG0940-0640a.png}
body:
  text: 古今合璧事類備要續集卷三十七宋謝維新撰性行門愚拙事理發揮人不能皆智而有愚者焉人不能皆巧而有拙者焉愚拙人之所甚病也亦人之不能以盡免也然智之鑿也反不如愚巧之過也反不如拙蓋愚者雖不解事亦不至於生事拙者雖不辦事亦不至於多事此愚之與拙亦古人之所不棄也惟夫愚而好自用拙而好自專未能守道適以害道之人也奚所用於天下事類自用愚而好丨丨記不移唯上知與下愚丨丨語亦謀豫丨拙丨書作偽丨丨心勞日拙書一能愚夫愚婦丨丨勝豫書千能人一能之已百之人十能之已千之雖愚必明記維彼愚丨丨丨人詩古之愚丨丨丨也直今之愚也詐而已矣語不為拙大匠丨丨丨工改廢繩墨羿丨丨丨射變其彀率孟不如拙巧詐丨丨丨誠傅子回如愚子曰吾與回言終日不違丨丨退而省其私亦足以發回也不愚語柴也愚子曰丨丨丨語北山公丨丨愚丨年九十欲平太行王屋二山或笑之愚公曰我死有子子又生孫孫又生子子子孫孫無窮匱也而山不加增何苦而不平操蛇之神聞之懼其不已告之於帝帝命夸娥氏二子負二山一厝朔東一厝雍南列子會稽婦丨丨愚丨輕買臣余亦辭家西入秦李白詩按漢書朱買臣字翁子吳人家貧好讀書不治産業常艾薪樵賣以給食擔束薪行且誦書其妻亦負戴相隨羞之求去買臣曰我年五十富貴今四十九矣女苦日久待我富貴報女功妻恚怒曰如公等終餓死溝中何能富貴買臣即聽去本傳屠龍技朱泙漫學丨丨於支離益殫千金之産以學屠龍三年丨成而無所用其巧列子不龜手莊子曰夫子拙於用大矣宋人有善為丨丨丨藥者世以洴澼絖為事客聞之請買其方百金聚族而謀曰我世為洴澼絖不過數金今一朝而鬻技百金請與之客得之以説吳王越有難吳王使之將冬與越人水戰大敗越人裂地而封之能丨丨丨一也或以封或不免於洴澼絖則所用之異也畫蛇足昭陽為楚伐魏移師攻齊陳軫與齊王使見昭陽曰有祠者賜其舍人酒一巵舍人相謂曰數人飲之不足一人飲之有餘請畫地為蛇蛇先成者飲酒一人蛇先成引酒且飲乃左手持酒右手丨丨曰吾能為之丨未成一人蛇成奪其巵曰蛇故無足子安能為遂飲酒為蛇足者終亡其酒今公攻魏破軍殺將又移師攻齊戰勝不知止猶為蛇足也昭陽乃解軍而歸拙於用多潘安仁間居賦序曰嶽讀汲黯傳至司馬安四至九卿而良史書之題於巧宦之目未嘗不慨然廢書而歎也昔和長輿之論余也固曰丨丨丨丨稱多者吾豈敢言拙則信而有餘方今俊乂在官百工惟時拙者可以絶意乎寵榮之事矣拙於用長周𢎞叔巧於用短杜方叔丨丨丨丨世説桞宗元愚溪序灌水之陽有溪焉東流入于瀟水或曰冉氏嘗居也故姓是溪曰冉溪或曰可以染也名之以其能故謂之染溪余以愚觸罪謫瀟水上愛是溪入一二里得其尤絶者家焉古有愚公谷今余家是溪而名莫能定土之居者猶齗齗然不可以不更也故更之為愚溪愚溪之上買小丘為愚丘自愚丘東北行六十步得泉焉又買居之為愚泉愚泉凡六穴皆出山下平地蓋上出也合流屈曲而南為愚溝遂負土纍石塞其隘為愚池愚池之東為愚堂其南為愚亭池之中為愚島嘉木異石錯置皆山水之奇者以余故咸以愚辱焉夫水智者樂也今是溪獨見辱於愚何哉蓋其流甚下不可以灌溉又峻急多抵石大舟不可入也幽邃淺狹蛟龍不屑不能興雲雨無以利世而適類於余然則雖辱而愚之可也寧武子邦無道則愚智而為愚者也顔子終日不違如愚睿而為愚者也皆不得為真愚今余遭有道而違於理悖於事故凡為愚者莫我若也夫然則天下莫能爭是溪余得專而名焉溪雖莫利於世而善鑒萬類清瑩透徹鏘鳴金石能使愚者喜笑眷慕樂而不能去也余雖不合于俗亦頗以文墨自慰漱滌萬物牢籠百態而無所避之以愚辭歌愚溪則茫然而不違昏然而同歸超鴻濛混希夷寂寥而莫我知也於是作八愚詩紀于溪石上唐子西愚齋記元符三年洛陽蘇公通守南隆治書室於廳事之東偏名之曰愚而屬某為之記某言於公曰愚有等級公將安處也有顔子之愚有髙柴之愚有寧武子之愚揚子以朝錯為愚桞子厚自以為愚顔子之愚老子所謂盛德者也髙柴之愚中庸所謂不及者也寧武子之愚則詩所謂亦維斯戾者也朝錯之愚則語所謂古之直者也若夫栁子厚之愚則事載方册有不可誣者文章學術為百代所宗自唐以來論當世大儒則必稱韓栁而自以為愚可乎然貞元之黨雖婦人女子皆知其必敗而桞子獨不悟也謂之不愚可乎是數子者其愚固有等級公將安處也以為髙柴之愚則才非不及于道以為寧武子之愚則生非不逢於時以為朝錯之愚則無吳楚之變以為栁子厚之愚則無伾文之事某將處公以顔子之愚則公豈有意乎公生平聚書萬卷手不停披既已自得於心矣推其緒餘以教諸子皆卓然有立其長子大壽以文學知名于時而公猶以愚自處此真有意於所謂盛德者歟傳曰晞顔之人亦顔之徒公何辭焉請以是為記周茂叔拙賦或謂豫曰人謂子拙豫曰巧竊所耻也且患世多巧也喜而賦之巧者言拙者默巧者勞拙者逸巧者賊拙者德巧者凶拙者吉嗚呼天下拙刑政徹上安下順風清弊絶黃魯直拙軒頌覔巧了不可得拙從何來打破砂盆一問狂子因此眼開弄巧成拙為蛇畫足何况頭上安頭屋下架屋畢竟巧者有餘拙者不足洪景盧養拙堂記人必有所養以直養氣以蒙養正以知養恬以寡欲養心以靜養生以義方養子以善養民以學養士以法制養兵以節養財養木于山養禾于田養牛羊于牢養雞于塒養魚于淵養龍于江海養萬物于天地繇書契以還亘古往今來之歸理具是矣一失所以養則位養祿勢養交傲侮養髙酒食養口體養姦以誇養盜以竊養虎以遺害養莠以蠧榖養鼠以齧養蟣蝨以蕃瘙養癰疽以戕身觀其所養孰得孰失蓋無待于龜卜而燭照獨未聞以拙自養者也今朱君先覺以養拙名堂吾誠不知其説拙于用大乎拙於作偽乎拙于政乎拙于巧乎拙于謀已乎拙于官乎不龜手之藥不免于洴澼絖夫固有所不用也與人無戟級安事偽奉職非追科固不落道州之下考浮湛里閭間望望若營四海妻子滿室竈突或過中不煙居官得餐錢漫不作明日計巧而謀者若是乎春秋五十六墮儒衣冠秩祿未脫八品擢財從事外臺居之泊如稱意自得豈所謂優遊以養拙亦頗有慨于潘安仁者乎杜子美之詩云度堂匪華麗養拙異考槃先覺蓋出於此既又作詩五百二十言道所以賦名之意豫不暇續也故極引其義而暢之先覺其勉旃毋輕用拙詩集醉如敢論才見忌實有丨丨愚杜勤補本欲將丨丨誰知弄巧成杜不可改所稟有巧拙丨丨丨者性所賦有厚薄不可移者命我性拙且蠢我命薄且屯問我何以知所知良有因亦曽舉兩足學人踏紅塵從兹知性拙不解轉如輪亦曽奮六翮髙飛到青雲從兹知命薄摧落不逡巡慕貴而厭賤樂富而惡貧同出天地間我豈異於人性命茍如此反則成苦辛以此自安分雖窮每欣欣葺茅為我廬編蓬為我門縫布作袍被種粟充盤飱靜讀古人書間釣清渭濵優哉復遊哉聊以充吾身白居易不能學欲知學之力賢愚同一初由其丨丨丨所入遂異閭云云二十漸乖張清溝映汙渠三十骨格成乃一龍一豬韓存吾道用拙丨丨丨杜使溪愚應同栁州栁聊丨愚丨丨坡古今合璧事類備要續集卷三十七
