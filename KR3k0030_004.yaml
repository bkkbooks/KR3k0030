body:
  text: 古今合璧事類備要前集卷四宋謝維新撰天文門露事類陽氣丨丨隂勝則散為雨露所以千載鶴警露而鳴大戴禮隂液露者丨之丨也蔡雍月令仁澤甘露降耆老得敬則松柏受之尊賢容衆則竹葦受之甘露者丨丨也其凝如脂其美如飴晉中興書和氣丨丨精凝為露五經通義六氣春食朝霞朝霞者日始欲出赤黃氣也秋食淪隂淪隂者日沒以後赤黃氣也冬飲沆瀣沆瀣者北方夜半之氣也夏食正陽正陽者南方日中氣也並天地玄黃之氣是為六氣也陵陽子明經五色東方朔曰臣至東極過吉雲之澤帝曰何謂吉雲曰其國常以雲氣占吉凶若有吉慶之事則滿室雲起丨丨照人著于草樹皆成丨丨露味皆甘帝曰吉雲丨丨露可得否曰可乃走東至夕而還得玄露盛以青琉璃各受五升授帝遍賜羣臣其得之者老者皆少疾者皆除洞冥記味甘勒畢國有五色露丨丨同上色紫水之美者有三危之露露之美者有揭雲之露其丨丨吕氏春秋天酒露氣濃甘者為甘露王者施德惠則甘露降一名膏露一名丨丨瑞應圖北海外有人長二千里日飲丨丨五斗東方朔神異記神漿丨丨可挹流珠九户之前天酒自零凝照三階之下隋盧思道賀表託桐人生一代若朝露之丨丨葉耳蘇子晞薤人命如薤上之露易晞崔豹古今注鶴警白丨性丨至八月白露降流于草葉上滴滴有聲即鳴風土記蟬飲丨有五德頭上有緌文也含氣飲露清也黍稷不享廉也不巢居儉也應候信也陸雲蟬賦染紅白庶潭露能丨丨雜俎如珠善飲國人飲丹露云日初出時有露丨丨洞冥記金莖抗仙掌以承露擢雙立之丨丨選班固西都賦注漢武帝建章宫作承露臺高二十丈以銅為之上有仙人掌承露和玉屑飲之丨丨銅柱也玉蘂立修莖之仙掌承雲表之清露屑丨丨以朝餐必性命之可度張平子西都賦銅盤大形見者莫如高物不朽者莫如金氣之清者莫如露盛之安者莫如盤乃詔有司鑄丨丨建于芳林園曹植承露盤銘寶甕帝嚳時有丹邱國獻瑪瑙甕以盛甘露舜移丨露丨於零陵東方朔作丨丨銘曰寶露起于露臺祥風生於月館拾遺記玉杯上作承露盤仙人掌擎丨丨以取雲表之露漢武帝故事瓊爵甘露以降蜜淳冰凝丨丨是承獻之帝朝曹植論未央宫漢元康元年詔甘露降丨丨丨宣帝紀仁夀殿魏明帝與東阿王詔昔先帝甘露屢降于丨丨丨前自吾建承露盤已來復降芳林園丨丨丨魏志樂遊苑陳太元七年甘露降丨丨丨輿駕幸苑採甘露宴羣臣詔於苑龍舟山立甘露亭陳紀崑崙山丨丨丨有甘露色如丹著草木皎然如霜雪寶器承之如飴拾遺記姑射神人藐丨丨之山有丨丨焉不食五穀吸風飲露莊子萊山童子𢎞農鄧紹八月旦入丨丨採藥見一丨丨執五綵囊承柏葉露露皆如珠滿囊中問之答云赤松子先生取之明目言終便失所在今人常以八月旦作囊相遺是也續齊諧記行露聽訟丨丨召伯丨丨也厭浥行露豈不夙夜謂行多露毛詩湛露燕侯丨丨丨諸丨也湛湛露斯匪陽不晞在彼豐草在彼杞棘同上宫露沾衣子胥諫吳王怒暮歸子胥舉衣出宫羣臣曰宫中無泥露相君舉衣行高何為子胥曰吾以越諫王不聽吾恐宫中生荆棘丨丨吾衣吳越春秋園露濕衣吳欲伐荆舍人孺子欲諫懷彈於後丨丨沾其衣王曰何故露沾衣曰臣捕黃雀不覺露丨丨劉向説苑宗元灌手柳丨丨得韓愈所寄詩先以薔薇露丨丨然後發讀本傳太真潤肺丨丨妃宿酒初消苦肺熱晨逰後苑口吸花露以丨丨開元遺事蜜露降柳晉皇甫謐幼時有甘露降其柳上謐每以食之謂蜜也晉史甘露降松熙寧六年冬建昌軍城北五里間丨丨丨于徐上交别業丨上濃厚如酒澤其味洌香上交折松枝獻于太守張子方時有野人賣藥於市語人曰吾嘗客華隂縣民亦有以甘露降告縣者縣令因自出按之有道人笑曰譬如人身精液流通均布六七十年中若其夀短促則涌併于未死之前矣此木蓋將稿故耳官人不信請留我以待明春此松必不復榮也縣令如其説果驗焉漁隱詩集靈液霏霏丨丨重雲表無聲落霑樹急玄蟬灑池凄皓鶴流塵清遠陌飛月澄高閣宵潤玉堂簾曙寒金井索佳人比珠淚坐感紅綃薄李正封明花滴瀝丨丨苑葳蕤泣竹叢玉垂丹棘上珠湛緑荷中夜警千年鶴朝零七月風願凝仙掌上長奉未央宫季嶠一滴秋荷丨丨露清夜墜玄天韋蘇州三霄仙人掌冷丨丨露玉女窗虛五夜風李義山縈蘭丨紆丨葉小點綴菊叢輕介甫綴柳聚荷凝碎玉丨丨訝垂旒李義山綴葉凝花珠錯落丨丨碧玲瓏溫嶠縈花綴草垂珍簟丨丨結寶纓僧潛生階玉階生白露夜久侵羅襪李白下庭秋露白如玉團團丨丨緑同上冰事類隂凝初六履霜堅冰至象曰履霜堅冰丨始丨也易坤卦水滯冰者隂之盛而丨之丨者也前五行志澤堅季冬之月氷方盛水丨腹丨是月也命取冰以入記月令泉沍行積冰之皚皚兮清丨丨而不流張平子賦流澌積冰曰凌氷壯曰凍氷丨曰丨冰解曰泮風俗通生水冰生於水而寒於水荀子知寒覩瓶中之冰丨天下之丨淮南子含凍涸隂沍寒日北至而丨丨文選蟲疑夏丨不可以語冰者篤于丨也莊秋水篇魚負大雪丨丨驗冰易通卦狐行河冰始合狐欲渡河冰帖耳先聽無水聲而後過六帖河冰始合要狐先行方可渡述征記魚上孟春之月東風解凍丨丨冰月令北鼠丨方冰厚百尺有丨在下但食其光毛長百尺可以為布神異經東蠶丨海圓嶠山有冰丨以霜雪覆則為繭色五彩同上六尺胡貉之地積隂之處木皮三寸冰厚丨丨朝錯書百丈北方有層冰萬里厚丨丨神異經治鑑春始丨丨凡內外饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共冰鑑周禮注鑑如錘大口以盛冰置食物於中以禦溫氣春而始為之酒醴見溫氣則失味納凌二之日鑿冰沖沖三之日丨于丨隂四之日其蚤獻羔祭韭詩斬冰凌人掌冰正嵗十有二月令丨丨三其凌周禮藏冰古者日在北陸而丨丨西陸朝覿而出之其丨之也深山窮谷涸隂沍寒於是乎取之夫冰以風壯而以風出祭寒而藏之獻羔而啓之左傳伐冰丨丨之家不畜牛羊記琢冰巧冶不能銷木良工不能丨丨文中子造冰老成子學幻於尹文先能翻校四時夏丨丨列子飲冰葉公子高曰吾朝受命而夕丨丨莊子人間世樹冰永徽二年十一月隂霧凝凍封樹木數日不解劉向以為木少陽此人將有害則隂氣脅木先寒故得雨而冰亦謂之樹介介兵象也漢史本紀海冰長慶元年二月海州丨水丨南北二百里東望無際本紀冰樹景福中滄州城塹中冰有紋如畫大樹華葉芬敷時人以其地當有兵難長編冰花開成末河陽黃魚池丨作丨如纈雜爼春無冰襄二十八年丨丨丨注時天下諸侯大夫皆執國權君不能制誅罰不行周失之舒秦失之急故周衰無寒嵗秦末無燠年左傳木為冰成十六年雨木冰劉歆以為上陽施不下通下隂施不上達故雨而丨丨之丨同上千年冰拘彌國有大凝山其中有冰丨丨不釋謂之長堅丨杜陽編六月冰陵雲臺有冰井戴延之以六月持去經日猶堅戴延之西征記玉精盤董偃以丨丨為丨貯冰於前拾遺記水晶膾山谷以丨丨丨為醒酒冰王直方詩話積水為樓漢建章宫北丨丨丨丨三輔黃圖琢冰圍席楊氏子弟伏中取大冰琢成山周圍宴席坐客皆有寒色開元遺事渡河冰合光武南馳聞王郎兵在後至滹沱河候吏還曰河水流澌無船不可濟令王霸往視之霸還詭曰冰堅可渡官屬喜比至河河冰亦合乃令霸護渡未畢數騎而冰解光武曰王霸權以濟事殆天瑞也後漢王霸傳唐王方翼平西域次葉河無舟冰一夕合時以為祥本傳行海冰凌晉慕容晃上書言躬征郭遠假陛下之精神威靈乃結冰凌行海中三百餘里出晉史陷冰潰賊青州刺史焦和作陷冰丸投河衆賊遂潰後漢椎冰守河初齊文宣時周人常懼齊兵之西渡恆以冬月守河丨丨及武成即位朝政漸紊齊人椎冰懼周師之逼北史冬月煮冰逸人王休居太白山每冬取溪冰琢其精瑩者煮建茗供賔客六帖夏月需冰長安冰雪至丨丨則價等金璧白少傅詩名動于閭閻每丨丨雪論筐取之不復償價日日如是止戈集國忠冰山或勸進士張彖謁楊國忠曰見之富貴可立圖彖曰君輩倚楊右相如泰山吾以為冰山耳若皎日既出君輩得無失所恃乎遂隱居嵩山本傳妃子冰筯開元冬日雪霽寒結簷溜皆為冰條丨丨使侍兒取玩帝晚朝回問之答曰所玩丨丨也遺事姑射冰膚藐丨丨之山有神人居焉肌如丨雪莊子太真冰淚楊丨丨初入宫與父母别淚落凍成紅冰開元遺事后稷鳥覆薑嫄生丨丨以為不祥遷之而棄渠中冰上丨以翼丨之不死周紀王祥鯉躍晉丨丨性至孝繼母朱氏嘗欲生魚時天寒冰凍祥釋衣將剖冰求之冰忽自解雙丨丨出本傳詩集明冰北陸蒼茫河海凝南山闌干晝夜冰素彩峩峩明月升深山窮谷不自見安知採斫備嘉薦隂房涸沍掩寒扇陽春二月朝始暾春光潭沱度千門丨丨時出御至尊形庭赫赫九儀備腰玉煌煌千官事丨丨畢嵗周在位憶昔沙漠寒風漲崑崙長河冰始壯漫汗崚嶒積亭嶂雍雍鳴鴈江上來禁苑池臺冰復開搖春涵緑映樓臺豳歌七月王風始丨丨藏用昭物軌四時不忒千萬紀富嘉謀木冰老病不眠知夜寒晨興薄冰滿庭前枯榆老柳變精妍細梢如苗粗如椽風敲碎玉落紛然冰裏槲葉誰雕鐫鄰家父老笑東垣欲沽官酒囊無錢我亦強起試一觀樹稼不見今十年蘇子由食冰車倦人煩渴思長岩中冰片玉成方老仙笑我塵勞久乞與靈膏洗俗腸程伯淳敲冰稚子金盆照曉冰綵絲穿取當銀鉦敲成玉磬穿林響忽作玻璃碎地聲楊廷秀夏冰碎如墜瓊方截璐粉璧生寒象筵布玉壺䊵扇亦玲瓏坐有麗人色俱素韋應物玉壺清如丨丨冰鮑明遠簷動丨丨冰杜甫開冰動丨丨同上銀竹雪後排簷排丨丨山谷玉井敢望君恩丨丨冰杜月窟渴飲丨丨冰飢餐天上雪李白詠蘇武作糜擔囊行採薪斧冰持丨丨魏武帝成梁飛雪斷道冰丨丨柳宗元霞事類九光仙霞丨丨十洲記五色丨丨流霞來接一身謂日景也內景注錦文丨雲散丨於沙汭注朝霞也木元虛賦赤氣崑崙山有五色水丨水之丨上蒸為霞河圖起天青霞丨而照天楊炯少室廟碑照海霞丨丨兮錦繡開元傑唐殿霞舉元宗朝李白召見于便殿軒軒若霞舉酉陽雜爼滕閣霞飛落霞與孤鶩齊飛秋水共長天一色滕王閣記詩集晨霞丨丨朝可餐杜桐林帶丨丨謝靈運朝霞迎白日選仰首漱朝霞曹植晚霞青軒祕丨丨李白丨丨飛處散朱暉李嶠海風吹斷暮天霞唐人晚望樓角紅綃一縷霞古詩餘霞丨丨散成綺謝朓丨丨明遠川韋應物殘霞照高閣同上落霞沉緑綺杜甫丹霞丨丨夾明月選詩赤霞動金光李白輕霞丨丨冠秋日謝宣遠飛霞繡甍結丨丨鮑明遠雲霞丨丨冠秋嶺謝混煙霞丨丨收夕霏選仙霞萬里洞中朝玉帝九光霞內宿仙壇真誥煙事類香煙許邁燒丨皆為五色丨起本傳烽煙狼糞煙直上烽火用之雜爼冒江涼煙兮丨丨鮑昭賦凝山煙光丨而暮丨紫滕王閣記詩集村煙丨丨對浦沙杜市煙近丨浮丨翠且重杜汀煙丨丨輕冉冉杜水煙丨丨通徑草杜渚煙丨丨見晨釣栁厨煙夜長簷溜寒無寢日晏丨丨濕未炊竇牟寒煙隂谷曵丨丨選長煙丨丨引輕素杜萬井春風掩映干門柳晚色凄涼丨丨煙李郢幾重煙霞障丨丨杜甫謁真諦寺素秋風煙接丨丨杜碧草煙綿丨丨萋萋長杜桑柘丨丨起寒煙謝朓茱萸沉香火暖丨丨煙李賀楊葉梨花千樹雪丨丨萬條煙李白柏子午雞聲不到禪林丨丨煙中靜擁衾王安石霧事類水溢為霧騰丨上丨故丨丨莊子氣亂則霧隂陽之丨丨丨丨曾子云霧重必雨凡重霧三