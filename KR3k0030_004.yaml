星絶漢曰丨丨史天官書地紀夫雲漢自坤抵艮為丨丨唐天文志含星雲漢丨丨而光耀洪流選蜀都賦帶天河漢委蛇而丨丨晉天文志上浮星者元氣之英水之精也氣發而升精華丨丨宛轉隨流名曰天河一曰雲漢衆星出焉楊泉物理論南轉天河從北極分為兩頭至于南極隨天而丨入地下過抱朴子牛渚仙槎舊説天河與海通有居海上者每年八月有浮槎來賫一年糧乘之奄至一處望見婦人織一丈夫牽牛渚次飲之此人即問何處答曰君可詣蜀問嚴君平此人還問君平君平曰某年月有客星犯斗牛即此人到天河也張華博物志天河機石有人尋河源見婦人浣紗問之曰此丨丨也乃與一石而歸問嚴君平君平曰此織女支丨丨也集林詩集明河八月涼風天氣清萬里無雲河漢明昏見南樓清且淺曉落西山縱復橫洛陽城闕天中起長河夜夜千門裏復道連甍共蔽虧畫堂瓊户特相宜雲母帳前初泛濫水晶簾外轉逶迤倬彼昭回如練白復出東城接西陌南北征人去不歸誰家今夜搗寒衣鴛鴦機上疏螢度烏鵲橋邊一鴈飛鴈飛螢度愁難歇坐見丨丨漸微沒已能舒卷任浮雲不惜光輝讓明月丨丨可望不可親安得乘槎一問津更將織女支機石還訪成都賣卜人宋之問天河常時任顯晦秋至最分明縱被微雲掩終能永夜清含星動雙闕伴月落邊城牛女年年渡何曾風浪生杜紅墻本來銀漢是丨丨隔得盧家白玉堂李商隱清漢昭昭丨丨暉燦燦光天步陸士衡洗甲安得壯士挽天河淨丨丨兵長不用杜繞塞明河丨丨微杜南傾招搖西北指天漢東丨丨選西流雲漢丨丨夜未央牽牛織女遙相望魏文帝河漢聲丨丨杜清淺河漢丨且丨相去復幾許盈盈一水間脈脈不得語選明淡初旭紅可染丨河丨如掃杜牧之古今合璧事類備要前集卷四
