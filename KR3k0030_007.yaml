body:
  text: 古今合璧事類備要前集卷七宋謝維新撰地理門水事類隂精水者純丨之丨隂氣盛則洋溢後五行志冬氣水主冬丨丨藏藏氣失故常寒後五行志鄭康成注筋脈水者地之血氣如丨丨之流通也管子水地篇包幕水者天地之丨丨五行之始焉春秋元命包浮天天下之多者水焉丨丨載地髙下無不至萬物無不潤郭氏元中記通海禹之行水一東一北行之無礙也水避礙則丨於丨楊君子篇沔彼流水朝宗于海詩生雨水液而丨雲丨油凝而為甘泉晉王彪之賦為露天下之物莫柔弱於水然而大不可極深不可測上天則為雨露下地則為潤澤淮原道訓負舟水之積也不厚則丨大丨也無力覆杯水於坳堂之上則芥為之舟置杯焉則膠水淺而舟大也莊逍遙逰篇成淵積水丨丨蛟龍生焉荀勸學作鹹一曰水水曰潤下潤下丨丨疏水性本甘久浸其地變而為鹵鹵味乃鹹懷珠水丨丨而川媚陸士衡賦中準水靜則明燭鬚眉平丨丨大匠取法焉莊天道靜鑑人不鑑於流波而鑑於靜水者以靜能清也列清神一勺今夫水丨丨之多及其不測黿鼉蛟龍魚鱉生焉貨財殖焉記中庸盈科流水之為物也不丨丨不行又原泉混混不舍晝夜丨丨而後進放乎四海有本者如是孟子折東夫水其萬丨也必丨荀宥坐篇在北坎者水也正北方之卦也易説卦坎丨丨方為冬為水前五行志上下水性無分于東西無分于丨丨乎人性之善也猶水之就下也孟告子上東西性猶湍水也決之東方則東流決之西方則西流孟告子方員凡水其丨折者有玉其丨折者有珠清者有黃金出淮南子清濁土地各以類生人丨水音小丨水音大湍水人輕遲水人重同上四瀆丨丨江河淮濟何以視諸侯能蕩滌垢濁焉能通百川于海焉能蕩出雲雨焉為德美甚故視諸侯也劉向説苑瀆之為言獨也不因餘水獨能赴海者也許敬宗云八水關內丨丨一涇二渭三滻四灞五潦六鎬七灃八潏一陽洪範疏十一月冬至日南極陽來而隂往冬水也以丨丨生為水數書五行漢李尋對曰丨丨以水為本其星元武婺女天地所紀隂陽所生水曰凖平尚書洪範丨丨一曰水漢書水名水中可居者曰洲小洲曰渚小渚曰沚凡水邉皆曰垂曰涯曰畔曰干曰磧曰濱涯上平坦曰漘重涯曰岸岸上地曰滸曲涯曰澳一曰隈水草交曰湄水邉土人所止曰澨水曲曰汭水北曰陽水南曰隂水出山石間曰潾音吝山夾水曰澗水注川曰溪水注溪曰谷水通谷曰壑石絶水曰梁築土遏水曰塘又曰堤曰防大防曰墳水所鍾曰澤廣澤曰衍澤曲曰臯澤障曰陂澤無水有草木曰藪水流通曰川深水曰潭急水曰流砂石上曰瀨亦曰湍曰灘水别流曰𣲖大水有小口别通曰浦風吹水涌曰波亦曰浪大波曰濤小波曰淪平波曰瀾直波曰徑水朝夕而至曰潮風行水成紋曰漣水波如錦文曰漪水行曰涉逆流而上曰泝洄順流而下曰泝流亦曰沿流絶流而渡曰亂以衣涉水曰厲繇膝以下曰揭繇膝以上曰涉渡水處曰津潛行水中曰泳見説文釋名爾雅水神丨丨曰天吳人靣八首八足亦曰河伯波之神曰陽侯晉陽國溺水因為大海之神能為大波濤之神曰靈胥吳相伍子胥也見徐堅初學記及博物志山海經中極之淵深二百仞惟氷夷都焉氷夷人面而乘龍穆天子傳云天子西征至于楊緬之山河伯無夷之所都蓋氷夷無夷即馮夷也淮南子又作馮遲抱朴子釋思篇曰馮夷以八月上庚日渡河溺死天帝署為河伯昔夏禹觀河見長人魚身曰吾河精豈河伯耶山海經河精鯀治水九載無績自沉羽淵化為元魚號為丨丨拾遺記沙􅈮春秋莊公十八年有􅈮疏謂含沙射人影江南山溪中有射工蟲長二三寸口中有弩形氣射人影不治則殺人博物志河伯娶婦西門豹為鄴令鄴三老廷掾嵗斂百姓錢為丨丨丨丨巫行視小家女好者聘取為治新衣粉飾之如嫁女床席令女居其上浮之河中行數十里乃沒以故人家多持女逺逃俗語即不為丨丨丨丨水沒溺人民云豹至其時往會豹呼河伯婦視之曰是女子不好煩大巫嫗為入報河伯更求好女送之使吏卒抱大巫嫗投河中有頃曰巫嫗何久也弟子趨之復以弟子一人投河中凡三投弟子豹曰巫嫗弟子是女子不能白事煩三老入白之復投三老河中良久豹欲復使廷掾與豪長者一人趨之皆叩頭且破額血流豹曰然河伯留客之久皆罷去歸矣鄴吏民大驚恐自此不復敢言為丨丨丨丨史記真君斬蛟許真君名遜字敬之汝南人後於豫章遇一少年容儀修整自稱慎郎許君與之語知非人類指顧之間少年去君謂門人曰適來年少乃是蛟蜃之精吾念江西纍為洪水所害若非剪滅恐致逃遁蜃精知真君識之潛于龍沙洲化為黃牛真君謂弟子施大玉曰彼精妖化為黃牛我今化其身為黑牛仍以手巾挂膊將以認之汝見牛奔鬪當以劍截彼真君乃化身而去俄頃見黑牛奔趂黃牛而來玉以劍揮黃牛中其左股因投入城西井中從此井徑歸潭洲却化為人先是蜃精化為美少年以珍寶財貨數萬獲娶潭州刺史賈至女至是真君求見賈使君謂曰聞君有貴壻慎郎乃蛟蜃老魅焉敢遁形蜃精復變本形為吏所殺真君晉太康間于洪州西山舉家四十二口拔宅上升而去惟有石函藥臼各一與其所御錦帳復自雲中墮于故宅鄉人因即其地置逰帷觀云太平廣記深州水影大厯末丨丨束鹿縣中有丨丨長七八尺遙望見人馬往來如在水中及至前則不見水五行志湘中水石丨水至清雖深五六丈見底了了然其石子如樗蒲大五色鮮明白砂如霜雪湘中記亳州聖水丨丨浮屠詭言有水可愈疾號曰丨丨李德裕傳省中祕水唐祕書丨丨水最佳故名丨丨茶録君子觀水夫子觀于東流之水子貢問曰君子所見大水必觀焉何也孔子對曰以其不息夫水似乎德其流也則卑下倨邑必修其理此似義浩浩乎無屈盡之期此似道流行赴百仞之溪而不懼此似勇至量必平此似共盛而不求溉此似正綽約微達此似察發源必東此似志以出以入萬語物就以化此似善化也水之德若此故君子必觀焉家智者樂水夫水者緣理而行不遺似有理者重而之下似有智者蹈深不凝似有勇者障防而清似知命者厯險致逺似有德者天地以生萬物以成國家以寧萬事以平丨丨所以丨於丨水韓詩外傳大禹平水當堯之時水逆行泛濫于中國蛇龍居之民無所定下者為巢上者為營窟書曰浲水警豫浲水者洪水也使禹治之禹掘地而注之海驅龍蛇而放之菹水由地中行江淮河漢是也滕文公下女媧止水丨丨積蘆灰以丨大丨淮南子左慈禁水丨丨能丨丨水為之逆流一二丈禁水著庭中大寒不氷抱朴子德裕辨水李德裕作相有奉使京口者令其取金山下揚子江中泠水各置一壺其人忘之至石城方汲一甌歸獻之李飲之曰此頗似建康石城下水其人謝過不敢隱中朝故事朱倉飲水丨丨少受學于蜀郡食豆屑丨丨諷諫周業憐其貧給米肉倉終不受華陽國志趙軌酌水丨丨為隋齊州别駕入朝父老送者曰公清如水請丨一杯丨奉餞軌受飲之北後周本傳屏前置水龐參為漢陽太守郡人任棠者參先候之棠不與言但以水一盂薤一本置屏前參思其微旨曰水欲吾清薤欲吾擊強宗本傳座右止水孔若思厯庫部郎中常曰仕宦至郎中足矣丨丨置丨丨一石明自足意北史燃犀照水晉溫嶠過牛渚磯深不可測世云下多怪物遂丨丨而丨之須臾見丨族覆火竒形異狀嶠於是夜夢人謂曰與君幽明道别何意相照也投馬祭水漢王尊為東郡太守河水盈溢泛浸瓠子金堤尊丨白丨以丨丨劾水神河伯尊執圭璧使巫祝以身瑱金隄本傳滄浪孺子有孺子歌曰丨丨之水清兮可以濯我纓丨丨之水濁兮可以濯我足孔子曰小子聽之清斯濯纓濁斯濯足自取之也孟子湘潭漁父屈原既放遊於江潭行吟澤畔漁父見而問曰子非三閭大夫與何故至斯屈原曰舉世皆濁我獨清衆人皆醉我獨醒漁父曰聖人不凝滯於物而能與世推移世人皆濁何不淈其泥而揚其波衆人皆醉何不餔其糟而啜其醨屈原曰吾聞之新沐者必彈冠新浴者必振衣安能以身之察察受物之汶汶者乎寧赴湘流葬于魚腹安能以皓皓之白而蒙世俗之塵埃乎漁父莞爾而笑鼓枻而去遂不復言屈原漁父歌弱水沉羽弱水既西栁子厚謂西海之山有水散渙無力不能負一羽投之委靡墊溺及底而後止史漳水染腳漳州界有水號烏腳溪涉者足皆如墨數十里間水皆不可飲飲則病瘴行人皆載水自隨梅龍烏圖儀官州縣時沿牒至漳州素多病預憂瘴癘為害至腳溪使數人肩荷之以物蒙身恐為毒水所霑驚愓過甚睢盱矍鑠忽墮水中至于沒頂乃出之舉體黑如崑崙自謂必死然自此宿病盡除頓覺康健無復昔之羸瘵又不知何也筆談觀灔澦賦天下之至信者惟水而已江河之大與海之深而可以意揣惟其不自為形而因物以賦形是故千變萬化而有必然之理掀騰勃怒萬夫不敢前宛然聽命惟人之所使豫泊舟乎瞿唐之口而觀乎灔澦之崔嵬然後知其所以開峽而不去者固有以也蜀江逺來兮浩漫漫之平沙行千里而未嘗齟齬兮其意驕逞而不可摧忽峽口之逼窄也納萬頃于一杯方其未知其峽也而戰乎丨丨之下喧豗震掉盡力以與石鬪勃乎若萬騎之西來忽孤城之當道鈎援臨衝畢至於其下兮城堅而不可取矢盡劍折兮迤邐循城而東去于是滔滔汩汨相與入峽安行而不敢怒嗟夫物固有以安而生變兮亦有用危而求安得吾説而推之兮亦足以知物理之固然東坡登黃樓賦熙寧十年秋七月河決澶淵東流入巨野北溢于濟南溢于泗八月水及彭城子瞻適為郡守水未至使民具畚鍤蓄土石積芻茭窒隙穴以為水備故水至而民不恐九月水及城下子瞻衣弊履屨廬于城上調急夫發禁旅以從事令民無得却避以身率之與城存亡故水大至而民不潰水既去即城之東門為大樓堊以黃土曰土實勝水徐人相勸成之轍方從事于宋將丨丨丨弔水之遺迹乃作黃樓之丨曰在漢元光河決瓠子騰蹙巨野衍溢淮泗梁楚受害二十餘嵗下者為汙澤上者為沮洳民為魚鱉郡縣無所天子封祀太山倘徉東方哀民之無辜流死不藏使公卿負薪以塞宣房瓠子之歌至今傷之嗟惟此邦俯仰千載河東傾而南泄蹈漢世之遺害包原隰而為一窺吾墉之摧敗舞魚龍于隍壑閲帆檣于睥睨試蟻穴之不救分閭閻之橫潰幸冬日之既迫水泉縮以自退棲流枿于喬木遺枮蚌于水裔蘇子由文詩集菰蒲際天丨丨丨丨青無邉只堪蓮蕩不堪田中有一溪元不逺摺作三百六十灣政如緑錦地衣上玉龍盤屈于其間前船未轉後船隔前灣已望得到不得及致前灣到得時只與後灣才咫尺朝來度數百縈問知德清猶半程老夫乍喜棹夫悶管有到時君莫問楊廷秀過霅州舳艫蔽川斗門貯淨練懸板淙鳴雷黃沙斷岸轉白屋飛簷開是間袤丈許丨丨丨丨來千里擁孤隧萬馬盤一杯篙尾亂若雨檣竿束如堆摧摧勢排軋洶洶聲喧豗逼側復逼側誰肯少徘徊傳呼津吏至弊蓋凌髙埃囁嚅議譏征呌怒不可裁吾觀舟中子一一皆可哀大為聲利驅小者飢寒催古今共來往所得隨飛灰我乃畸於人胡為乎來哉范至能長安閘巴童蕩槳嘉陵江色何所似石黛碧玉相因依正憐石破浪花出更復春從沙際歸丨丨丨丨欹側過水雞銜魚來去飛閬州勝事可腸斷閬州城南天下稀杜甫閬水歌閘官聚船春雨未多河未漲丨丨惜水如金樣丨丨久住下河灣等待船齊不教放忽然三板兩板開驚雷丨聲飛雪堆衆船過水水不去船底怒濤跳出來下河半篙水欲滿上旱兩平勢差緩一行二十四樓船相隨過閘如魚貫楊廷秀過奔