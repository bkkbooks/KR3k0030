史記宓妃為神丨丨宓犧氏之女溺洛水曹植作洛神賦曰其形也翩若驚鴻婉若遊龍髣佛兮若輕雲之蔽月飄颻兮若流風之回雪忽然縱體以逰以嬉左倚采旄右蔭桂旗攘皓腕于神滸兮採湍瀨之玄芝衆靈雜遝命儔嘯侣或窺清流或翔神渚從南湘之二妃擕漢濵之遊女體迅飛鳬飄忽若神凌波微步羅襪生塵云云王子得仙丨丨晉好吹笙作鳯鳴常逰伊洛遂丨丨神仙傳成蕩獲瑞湯時有神牽白狼銜鈎入殷朝者乃東觀沉璧于洛獲黃魚黑玉之瑞于是始受命稱王帝王世紀周公告卜召公既相宅丨丨往營成周使來丨丨作洛誥曰我又卜瀍水東澗水西亦惟洛食書林宗泛舟李膺與郭丨丨丨丨于洛水之上望之者以為仙舟本傳王濟解褉丨丨丨丨于洛史適之修防元宗患洛水暴耗徭力詔李丨丨以禁錢作三大防曰上陽積翠月陂自是水不能患昭德繕橋洛有二橋司農韋機徙其一直長夏門民利之其一橋廢省巨萬計然洛水嵗淙齧繕者告勞李昭德始纍石代柱水不能怒自是無患詩集驅馬脈脈廣川流丨丨厯長洲鵲飛山月繞蟬噪野風秋上官儀詩髙宗時天下無事儀獨持國柄常凌晨赴朝巡洛水堤步月緩轡詠詩音韻清亮望之若仙持竿丨丨洛水側孤坐屢窮辰韓愈青壇緑綺因河檢丨丨俯洛濵蘇味道碧簟清洛水光鋪丨丨上陽宫葉剪紅綃劉禹錫拂水别袖丨洛丨征車轉崤陵韓愈插波水花翻照樹隄蘭倒丨丨唐太宗臨洛請渭事類𨗳鳥鼠丨渭自丨丨同穴東會于灃又東會于涇又東入于河禹貢浸雍州雍州其浸渭洛周禮象天河秦都咸陽渭水貫都以丨丨丨浮橋南渡以法牽牛三輔記通寺井景公寺前街中舊有巨井俗呼為八角井元和初有公主夏中過百姓方汲令從婢以銀稜碗就井承水悮墜碗經月餘出于渭河酉陽雜俎女星浴水漢武帝時蜀張寬為侍中從祀甘泉至渭橋有女子浴于渭水乳長七尺上怪其異遣問之女曰帝後第七車知我所來時寬在第七車對曰天星主祭祀者齋戒不潔則女人星見陳夀益部耆舊傳黑龍飲水昔有丨丨從南山出丨渭丨其行道為龍首山三秦記馬化為龍明皇帝在位靈昌郡得異馬於河其狀龍鱗虺尾拳毛環目肉鬛居帝間二十年遇禍亂帝西幸丨至咸陽西入渭水丨丨丨遊泳去不知所終栁宗元龍馬贊蛙大如鼎神龍中渭水有丨丨丨丨里人聚觀數日而失唐志太公垂釣丨丨丨丨于渭周西伯將獵卜曰所獲非龍非螭非熊非羆所獲霸王之輔於是西伯獵杲遇太公於渭之陽與語大悅史記文王造舟文定厥祥親迎于渭丨丨在渭丨丨為梁毛詩西京行祀秦漢都丨丨渭雖不在祀典以其近咸陽故得比大川之祀宋書阿房漲膩杜牧丨丨宫賦渭流丨丨棄脂水也文粹抱馬以逸安祿山反王師敗績僕固懷恩至渭水無舟丨丨鬛丨丨犯蹕者罰張釋之為廷尉漢文帝出中渭橋有一人從橋下走出乘輿馬驚使捕屬廷尉奏此人犯蹕罰金詩集渭源丨丨奔鳥穴輕潤起客亭淺淺滿澗響蕩蕩竟川鳴潘生稱運石馮子聽波聲斜去臨天半橫來對始平合流應不雜方知性本清後周宇文道至渭源涇事類合流涇渭丨丨三百里清濁不雜三秦記涇以渭濁湜湜其沚毛詩富流其地勢也帶涇渭之丨丨唐文粹李庾西都賦秦水丨有丨掎汨泥淖撓混沙礫乃合清渭自彰穢迹故名曰濁涇栁愚溪對涇舟淠彼丨丨蒸徒楫之注淠舟行貌涇水之中舟行者乃衆徒船人以楫棹之毛詩鄭渠韓聞秦之好興利欲罷之無令東伐乃使水工鄭國間説秦鑿丨涇自中山西控瓠口為渠溉田通鑑白渠漢武時趙中大夫白公奏穿渠引涇水溉田名丨丨人得其饒歌曰田于何所池陽谷口鄭國在前白渠起後舉鍤為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口秦皇沉馬秦二世夢虎囓其左驂卜曰涇水為祟二世祀之沉四白馬于涇水水經漢室立祠涇渭雖不在祀典近咸陽皆比大川之祀漢書秦毒涇水晉侯伐秦丨人丨丨上流師人多死漢壅涇流漢武河平四年長陵臨涇岸頽丨丨丨詩集隴阪𨗳源經丨丨屬汭貫嬴都下瀨波常急回圻溜亦紆毒流秦卒斃泥糞漢田腴獨有迷津客懷歸輕暮途徐珩涇川丨丨三百里若耶羞見之上有琴髙水下有陵陽祠李白送族弟漢事類沱潛丨丨既道書禹貢漢廣丨丨德化所及也文王美化行乎江漢之域漢之廣矣不可泳思漢有遊女不可求思毛詩楚望江漢睢漳丨之丨也左傳朝宗江漢丨丨于海禹貢東流嶓冢𨗳漾丨丨為漢又東為滄浪之水注衆源為漾水流為漢水同上南紀滔滔江漢丨國之丨毛詩盧鈞築堤丨丨會昌中洪水害襄陽拜鈞為山南東道節度使丨丨六十步以障漢東之遏湍張東之授襄州刺史會漢水漲囓城郭東之因壘為隄以丨丨怒昭侯沉玉蔡昭侯為兩佩與兩裘以如楚獻一佩一裘于昭王子常欲之三如年不與蔡侯歸及漢執玉而沉曰余所濟漢而南者有大川左傳漢女解珮昔鄭交甫過漢臯遇二女妖服珮兩珠交甫與之言曰願請子之珮二女解珮與交甫懷之而去十步探之則亡矣回顧二女亦不見韓詩傳責漢水辭春秋齊桓公合諸侯之師盟于召陵責楚之包茅不入問昭王南征而不復楚使屈完對曰貢之不入寡君之罪也昭王南征之不復君其問諸水濱按昭王南征至漢舟人膠其舟王遂溺死夫山林川澤天子祀之必有其神楚人膠其船而禍其君神不能福神之罪也余過漢見其波濤滉漾而責其水其辭曰漢之廣兮風波四起雖有風波不如蹄涔之水蹄涔之水不為下國而傾天子漢之深兮其隄莫量不如行潦之汪行潦之汪不為下國而溺天王漢之美者曰魴吾雖飢不食其魴恐汚吾之飢腸李善夷詩集霞光東海既渳渳南紀信滔滔水激沉碑岸波駭㺯珠臯含星映淺石浮蓋下奔濤溜濶丨丨近川長曉氣髙檣烏轉輕翼戲馬落風毛客星既多緒長歌且代勞李百勞鴨緑遙看漢水丨頭丨恰似葡萄初潑醅李白襄陽歌殊流漢水既丨丨楚山亦此分李白擬古歸舟眼前今古意江漢一歸舟杜甫懷灞上逰沔事類入渭西傾因桓是來浮于潛逾于沔丨于丨亂于河注漢上曰沔越沔而北丨丨書禹貢朝海沔水沔彼流水丨宗于丨毛詩斬蛟沔水沔水隈潭極深先有蛟為害鄧遐為襄陽太守拔劍入水蛟繞其足遐自揮劍截蛟數假流血水丹蛟患遂息盛𢎞之荆州記沉碑沔水沔水東經萬山下有潭昔杜元凱好名作兩碑述已功一碑在峴山一碑沉此潭中曰千載之後何知不深谷為陵水經詩集連銅柱正解柴桑纜仍看蜀道行檣烏相背發塞鴈一行鳴南紀丨丨丨西江接錦城慿將百錢卜飄泊問君平杜甫送弟入蜀古今合璧事類備要前集卷七
