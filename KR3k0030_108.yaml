body:
  text: 古今合璧事類備要後集卷三十九宋謝維新撰三學門國子祭酒歷代沿革虞帝曰夔命汝典樂教胄子書周師氏以三德三行教國子一曰至德二曰敏德三曰孝德教三行一曰孝行二曰友行三曰順行凡國之貴遊子弟學焉保氏養國子以道教之以六藝六儀大司樂掌成均之法以治建國之學政而合國之子弟焉以樂德樂語樂舞教國子諸子掌國子之倅凡國之政事國子存遊倅使之修德學道春合諸學秋合諸射以考其藝而進退之周禮漢置博士至東京凡十四人而聰明有威重者一人為祭酒謂之博士祭酒本詩曰僕射中興轉為祭酒胡廣曰凡官名祭酒皆一位之元長古者賓得主人饌則老者一人也舉酒以祭地故以祭酒為名此國子祭酒名所由始晉武咸寧四年立國子學置祭酒一人永嘉中又置儒林祭酒一人以杜夷為之當為訓範總統學中衆事又立太學江左因裴頠奏增置國子博士十六人謂之太學博士品服同國子博士宋不置學明帝置總明觀祭酒一人齊永明中立學尚書令王儉領祭酒省總明觀齊梁號為國師梁武帝以國子學生舊限貴賤帝招徠後進五館生皆引寒門雋士梁置太學博士八人陳後魏亦曰國子祭酒北齊國子寺有祭酒一人有太學博士十人後周置太學博士下大夫六人隋開皇中國子寺不𨽻太常凡國學諸官自漢以下並屬太常至隋始革之又改寺為學仁人壽元年罷國子學唯立太學省祭酒等置博士五煬帝大業減置二人改國子學為國子監復置祭酒唐因之武德二年詔國子學立周公孔子廟七年髙祖釋奠太宗觀于國子學增置博士三人掌教文武官五品以上及郡縣公子孫龍朔改為司成館祭酒為大司成咸亨復光宅改為成均監神龍復領六學國子太學四門律學書學算學皆以儒學優重者為之通典唐職林祭酒一人從三品掌儒學訓導之政檢國子太學廣文四門律書算凡七學太子視學皇太子齒胄則講義釋奠執經論議奏京文武七品以上觀禮凡授經以諸經各為一經兼習孝經論語考于歲終考學官訓導多少為殿最百官志元宗開元七年令𢎞文崇文國子生季一朝參選舉志及國朝國子監有判監事有管勾監事待制以上則為判餘為管勾會要熙寧初詔用經術取士廣别黌舍分為三學增置生徒總二千八百人朝廷育才於斯為盛續會要四年詔宋靖國吕嘉問相度錫慶院建太學從鄧綰所請也綰言國子監粗容春秋釋奠齋庖之室不足以容諸生至於太學即未曾營建止是假錫慶院西北隅廓屋數十間逼窄湫隘又官司未曽葺治今大新學制學者坌集恐不足以容乞以錫慶院為太學故命相度其地建之及元豐中復正上而祭官名置國子監祭酒掌三學之教法政令同酒猶未除人三年詔改國子監直講為太學博士每經二人掌分經講授考校程文以德行道藝訓導學者紹聖元年左司諫翟思言熙寧更置太學博士正録雖有朝廷特除然類令國子監長二薦舉所業考第髙下以次除授復立試法以核材實其進士發解省試廷試在十五人內太學上舍內舍職事者並令召試不在此例許投所業國子監考覆方與召命元祐以來罷去試法請自今除學官依舊法召試從之元符元年詔學官歲一試崇寧立辟雍置大司成一員為師儒之首總辟雍太學之政令位諸曹侍郎上本朝官制詔天下貢士以三舍考選政和七年臣寮言熙豐間博士未嘗除代近年以來席未暖而代者已至率三人而守一若從正録第遷則博士可免除代與熙寧元豐無異從之並同上宣和罷三舍辟雍官屬並罷四朝志建炎南渡廢三年併國子監歸禮部紹興二年詔駐蹕所在因國子監量養生徒置博士二員祭酒猶未置也十二年始置祭酒中興會要權於臨安府措置增展置太學博士三員十三年始復建太學事類師氏注見沿革司成父師丨丨一人元良萬國以貞禮記函丈凡侍坐於大司成者遠近間三席席間丨丨同上老師荀卿年五十始來學於齊襄王時最為丨丨三為祭酒焉史記彤伯春秋云周封兄弟之國十有六同姓之國三十有五選宗中之長而董之謂之宗正成王時丨丨入為祭酒掌王親屬也秦因之漢平帝更名宗伯王莽改名秩宗東漢復為宗伯至晉以庶姓為之大祭酒漢魏皆同姓為之晉以後雜用庶姓梁加卿除大字北齊又加大字隋除之孔白六帖劉向漢髙祖七年自櫟陽從長安置祭酒官以序之族丨丨元帝時蕭望之周堪薦向為宗室忠直明經有行為祭酒劉德字路叔修黃老術少時數言事召見甘泉武帝謂之千里駒昭帝初為祭酒丞後為祭酒妻死大將軍欲以女妻之德不敢畏盛滿也同上仁孝劉平字公豫以丨丨著聞永平三年為祭酒東漢竭忠劉般字伯與代名忠孝在朝丨丨建初元年拜祭酒蒼玉晉祭酒佩水丨丨朱服南齊何胤為國子祭酒與太子中庶子王塋並為侍中時胤輩作祭酒疑所服陸澄博古亦不能定遂以玄服臨試後羣議乃用丨丨自此始儒林晉戴逵為丨丨祭酒刻石傳經晉志教本唐蕭昕代宗時擢國子祭酒請崇文學以立丨丨帝悟其言詔羣臣有籍于朝及神策六軍子弟𨽻業者聽補生徒國庠常令齒胄丨丨唐大詔令太和册太子敕學優唐司成館祭酒領六學皆以儒丨丨重者為之儒重凡祭酒司業丨丨之官非其人不居通典總紀綱漢官儀曰武帝置博士十四人選聰明威重者一人為祭酒丨領丨丨後漢朱浮傳注為訓範見前沿革注請學徒晉袁瓌為國子祭酒時喪亂之後禮教陵遲瓌上疏云丨得給其宅地備其丨丨帝從之國學之興自瓌始也晉史言舉選楊揚為國子祭酒上丨古者卿大夫子弟及諸侯歲貢小學之異者入太學學成然後爵之唐興二監丨者千百數當丨者十之二考功覆校以第謂經明行修故無多少之限今考功限天下明經進士歲百人二監之得無幾然則學徒費官廪而博士濫天祿者也且以流外及諸色任者歲二千過明經進士十倍國學師梁王承好儒業轉國子祭酒承祖儉父陳皆為此職三世為丨丨丨前代未之有當時以為榮梁史大師氏唐歸崇敬國子司業以祭酒司業之名非學業者請以祭酒為丨丨丨似散地權德輿以劉秩為祭酒置之國庠丨在丨丨又元載秉政忌楊綰望髙建言太學當得天下名儒即拜綰國子祭酒外示尊重而實以散地處之不寂寞公遷祭酒奏儒生為學官日使會講生徒聽聞喜曰韓公為祭酒國子監丨丨丨唐李翺韓昌黎行狀研學耆儒建元七年髙平蘇通長樂劉祥並以丨丨丨丨通為禮記祭酒居于東庠祥為儀禮祭酒處于南序每月朔旦率百僚親臨講論也十六國春秋前秦録儒宗學府後周盧誕有名於時文帝以誕丨丨丨丨乃拜國子祭酒几杖不朝漢吳王濞年老以劉氏為祭酒授丨丨丨丨以安車迎漢王莽丨丨丨駟馬丨龔勝為祭酒議學漢擢荀卿見前沿革注晉選劉毅丨丨丨丨並為祭酒也白六帖有道之習博士祭酒丨丨丨丨學者漢官制教胄之班祭酒之榮有道之選丨丨丨丨李嶠表敷教流化臣聞寶劔未砥猶乏切玉之功美箭闕羽尚無充石之勢况才非會稽之竹質謝昆吾之金至於丨丨東序丨丨上庠曠官何仰魏溫子升為安豐王延明讓國子祭酒表師貴道尊切以庠均義重振古所崇丨丨丨丨有來攸尚匪由蘭芷疇變入室之情不自朱藍何遷素絲之質齊王融為王儉讓國子祭酒表終身不恨丘靈鞠領東觀祭酒曰人居官願數遷使我丨丨為祭酒丨丨也宋書一時傳布祭酒楊恭之為華山賦示韓愈愈稱之士林丨丨丨丨敷陳義理隋元善賜爵江陽縣公後遷國子祭酒時帝親臨釋奠命善講孝經於是丨丨丨丨兼之諷諫上大悅曰聞江陽之説更起朕心講論經義正觀命祭酒博士丨丨丨丨論罷蚶菜孔戣歷國子祭酒會嶺南節度崔詠死帝謂裴度曰嘗丨丨丨丨者誰歟度以戣對即拜嶺南節度使能八風舞祝欽明為國子祭酒帝與羣臣宴欽明自言丨丨丨丨盧藏用嘆曰是舉五經掃地矣忠正亮直唐劉毅丨丨丨丨志尚清白為國子祭酒清淑潛敏劉智履德丨丨秉心丨丨為博士祭酒德望學識今後國子祭酒司業及學官並須取有丨丨丨丨人充唐元和敕學行文質唐賀德仁少與從兄德基俱為國子祭酒時人語曰丨丨可師賀德基丨丨彬彬賀德仁引為學官陽嶠為國子祭酒丨尹知章范行恭趙玄默丨丨丨皆名儒冠請廣生徒長興元年國子司業張溥奏丨復入館以丨丨丨古無入館之事按六典國子監領六學謂國子太學四門律學書學算學是也而溥妄云八館續通典以宰相領唐文宗時鄭覃丨丨丨丨祭酒令宰相兼天成中祭酒闕中書奏祭酒之資歷朝所貴望丨丨丨丨判同上掌録及有犯祭酒一人秩二千石丨敘丨王國嫡庶之從次丨諸宗室親屬逺近郡書國歲上宗室名若丨丨法當髠以上請續漢講經舉自代王備為國子祭酒丨孝丨末年丨謝曇濟丨丨吳均齊春秋論難不能屈隋楊汪為國子祭酒帝令百僚就學與汪講論通儒碩學丨丨鋒起皆丨丨丨儒官皆列燕退之聽琴序云司業武公少儀總太學丨丨三十有六人丨丨丨于祭酒之堂求賢德為師長公管勾國子監時詔令兩制臺閣臣僚議學校貢舉之制公先廣丨丨丨使丨丨丨則百度可不勞而成伏見常秩陳烈管師常程頤經行修明宜召為太學官使學者有所師法葉祖洽撰古靈陳先生行狀薦大儒為學官吕正獻公公著為祭酒以太學為教化之原故究心經理舊制薦舉學官博士皆嚴其資格限年齒公為論列寬其科條所丨學官如王回吳政薑濳張載皆一世丨丨王存顧臨為元祐名臣常秩吳申黃履朱臨盛僑亦顯于世處士陳頤隱居不仕公命博士即其家敦請以為太學正頤固辭公即命駕過之言行録諸生服其教鄭穆元祐中以寶文閣待制兼祭酒每丨丨請益無間寒暑雖童子必朝服延接以禮皆尊其經術而丨丨丨六年請老范祖禹言穆雖年七十精力尚強祭酒居師資之地正宜處老成顧毋輕聽其去不報於是公卿大夫各為詩贈其行空學出祖汴東門之外觀者如堵四朝國史師位推其能丨氏之丨必丨丨丨南豐文並命輿論服馮元字道宗仁宗朝判國子監故事國子監必宿儒典領元與孫奭丨丨丨丨大丨東都事略老成無逾卿楊龜山時字中立兼國子祭酒先是吳敏乞用時以靖太學時召對上言諸生伏闕欲忠於朝廷耳但擇丨丨者為之長二即定矣上喜曰此丨丨丨者乃亟命時時入太學諸生慰勞焉言行録掌教授之事丨經術丨丨薦送丨丨會要掌胄子之筵出職表教育諸生法胡安定瑗判國子監丨丨丨丨皆有丨卲氏聞見録儒名三十年汪澥自布衣録天子學至為正為司業祭酒迄國于司成官以丨丨者丨丨丨時人皆推之四朝史班固辟雍詩乃流辟雍辟雍湯湯聖皇蒞止造舟為梁皤皤國老乃父乃兄抑抑皇儀孝友光明於赫太上示我漢行洪化唯神永觀厥成唐國子舞賦天子斂賢才之地合禮樂之府命宗伯因四時之宜教胄子以六代之舞惟德是務以和為主發揮五禮張皇六詩忽投步而赴節乍整容而自持雖鏘鏘與濟濟必庸庸以祇祇觀者如堵曷不肅雍實經國之洪範蓋訓人於中庸且樂以平其心舞以發其貌無小無大是則是效宜合國之子弟實教人於忠孝其儀不忒其德惟馨遠人由是以來之明神可得而禮矣潘安仁間居賦兩學齊列雙宇如一右延國胄左納良選祈祈生徒濟濟儒術或升之官或入之室教無常師道則在是故髦士投紱名王懷璽訓若風行應如草靡此里仁所以為美孟母所以三徙也朱休駕幸學賦皇帝念儒林之繁會當天地之交泰視其鼓篋之地文在其中禮於釋菜之庭化行乎外宗伯禮賢以蕆事司成執經而奉職整衣裳之楚楚