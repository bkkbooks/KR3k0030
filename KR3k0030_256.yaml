body:
  text: 古今合璧事類備要別集卷五十宋謝維新撰衆木門杉格物總論杉樹大者數圍高十餘丈紋理條直皮粗厚葉尖附枝生若刺針然青青不雕種蒔宜山窠深處南方人造屋及為船與夫作棺材多用之美木也出於倭國者尤佳事類被煔丨丨也爾雅倭木出於東海中倭國者為丨丨詩集擢幹方數尺丨丨丨丨丨幽姿已蒼然韋應物徑葉森利劒丨丨丨丨丨孤莖挺瑞標才高四五尺勢若干雲霄白樂天移來得許長何代丨丨丨丨丨想渠厯晉復經唐慣於岩畔諳風雪不與人間作棟梁二室七仙同守護千松萬檜自低昂向來諸葛祠前柏此物當為伯仲行潘紫岩坐待清陰滿更鼓庭空雀噪簷閉門獨宿夜厭厭似聞棗栗同時種應與杉松刻日添糟麴有神薰不醉雪霜誇健巧相沾先生丨丨丨丨丨空使人人歎滯淹坡次韻子由東軒杉竹槐格物總論槐樹極高大生河南平澤今所在而有四月五月開花六月七月結實數種葉大而黑者名櫰槐晝合而夜開者名守宫惟葉細而青緑者但謂之槐也事類取火燧人秋丨槐檀之丨周禮聽訟樹槐丨丨其下也槐之言歸也情見歸實元命苞面槐公位朝士丨丨三丨丨焉周禮植槐王門太公請武王丨丨於丨丨有益者入無益者距以待天下之神也金匱書犯槐者死齊景公有所愛槐令人守之曰丨丨丨丨有醉而傷者且加刑焉晏子春秋觸槐而死趙宣子驟諫公患之使鉏麑賊之晨往寢門闢矣盛服將朝尚早坐而假寐麑退歎而言曰不忘恭敬民之主也云云丨丨丨丨左傳列槐數百元始四年起明堂辟雍為博士舍三十區為市丨丨樹丨丨行諸生朔望會市各持其郡所出物及經書相與買賣雍雍揖遜論議三輔皇圖服槐七十梁庾肩吾丨丨實年丨丨餘目看細字毛皆黑本傳庭前有槐祖士雄廬側其丨丨丨丨先自榮茂及士雄居喪槐忽枯死服闋還茂高祖嘉之名其里為纍德里南史街樾蒔槐吳湊為京兆尹先是丨丨稀淺有司丨榆少空湊曰榆非人所蔭玩悉易以丨及槐成湊亡行人指槐而懷之唐史取樹為薪貞元中度支欲丨兩京道中槐丨丨丨先下符牒渭陽縣尉張造牒曰召伯所憩尚勿剪除先皇舊遊豈宜斬伐唐書字旁木鬼廣陵王克淵夢著衮衣倚槐樹立問於湯元慎云云曰三公之祥退而告人曰廣陵死矣槐丨丨丨丨死後當得三公廣陵討葛榮果為所殺洛陽伽藍記寤尋古槐淳于棼家廣陵宅南有古槐棼豪飲其下因醉致疾二友扶之歸卧夢二使曰槐安國奉邀棼隨二使指古槐入穴中曰大槐安國王曰吾南柯郡政事不理屈卿為守坐纍日達郡丨丨丨丨下穴洞然明朗可容一榻有二大蟻乃槐安王又窮一穴直上南枝即南柯郡也異聞手植庭槐王晉公祐事太祖知制誥以魏州節度使符彥卿事坐貶華州祐赴貶時親友送於都門外謂曰意公作王溥官職矣以太祖遣使魏州之時許以宰相之職也祐笑曰祐不做兒子三郎必做三郎者文正公也祐素知其必貴嘗丨丨三槐于庭曰吾子孫必有為三公者已而果然天下謂之三槐王氏言行録虞摯槐頌東宫正德之內承華之外槐樹二枚連理而生二幹一心以蕃本根王濟槐賦龍升南陸火集正陽鼓柯命風振葉致涼東坡三槐堂銘天可必乎賢者不必貴仁者不必壽天不可必乎仁者必有後二者將安取衷哉吾聞之申包胥曰人衆者勝天天定亦能勝人世之論天者皆不待其定而求之故以天為茫茫善者以怠惡者以肆盜跖之壽孔顔之厄此皆天之未定者也松柏生於山林其始也困於蓬蒿厄於牛羊而其終也貫四時閲千嵗而不改者其天定也善惡之報至於子孫則其定也久矣吾以所見所聞而考之其可必也審矣國之將興必有世德之臣厚施而不食其報然後其子孫能與守文太平之主共天下之福故兵部侍郎晉國王公顯於漢周之餘厯事太祖太宗文武忠孝天下望以為相而公卒以直道不容於時蓋嘗手植三槐於庭曰吾子孫必有為三公者已而其子魏國文正公相真宗皇帝於景德祥符之間朝廷清明天下無事之時享其福祿榮名者十有八年今夫寓物於人明日而取之有得有否而晉公修德於身責報於天收必於數十年之後如持左契交手相付吾是以知天之果可必也吾不及見魏公而見其子懿敏公以直諫事仁宗皇帝出入侍從將帥三十餘年位不滿其德天將復興王氏也歟何其子孫之多賢也世有以晉公比李栖筠者其雄才直氣真不相上下而栖筠之子吉甫其孫德裕功名富貴略與王氏等而忠信仁厚不及魏公父子由此觀之王氏之福蓋未艾也懿敏公之子鞏與吾遊好德而文以世其家吾以是録之銘曰嗚呼休哉魏公之業與槐俱萌封植之勤必世乃成既相真宗四方砥平歸視其家槐陰滿庭吾儕小人朝不及夕相時射利皇恤厥德庶幾僥幸不種而獲不有君子其何能國王城之東晉公所廬鬱鬱三槐惟德之符嗚呼休哉詩集雲屯夏槐作丨丨韓陰凝槐丨丨衆姿白樂天高樹青青丨槐丨采掇付中厨新麵來近市汁滓宛相如杜槐葉泠淘老根夾道疏槐出丨丨韓蜂銜子漢家宫殿蔭長槐嫩色蔥蔥不染埃天仗龍旗穿影去鈎陳豹尾拂枝來青蟲挂後丨丨丨素月生時桂並栽我意方同杜工部冷淘惟喜葉新開梅聖俞蟬抱葉憶我初來時草木向衰歇高槐雖驚秋晚丨猶丨丨淹留未云幾離離見踈莢棲鴉寒不去哀呌飢啄雪破巢帶空枝疏影挂殘月豈無兩翅羽伴我此愁絶坡御史臺槐椿格物總論椿樹枝葉與樗形相似然樗木疏而氣臭椿木實而葉香無花不結子木身大其幹端直其有花而莢木身小幹多夭矯者樗也事類八千嵗上古有大椿者以丨丨丨為春丨丨丨為秋注上江南一云生此户南北木三萬一千嵗為一年莊子逍遙遊一株老燕山竇諫議五子馮處王贈詩曰燕山竇十郎教子有義方靈椿丨丨丨丹桂五枝芳馮道詩集杳杳含風韻峩峩楚南樹丨丨丨丨丨何用八千秋騰凌詫朝菌晏元獻奕奕蔭華傘野人獨愛靈椿館館西靈椿聳危幹風揉雨煉三月餘丨丨中庭丨丨丨劉原父豫章格物總論豫章大木也樹身數十圍高十餘丈根盤枝錯幹聳枝摎皮厚而粗葉硬而滑香烈味辛紋理斕斑南方多有之事類作鼓顙山陽縣豫章木可伐丨丨丨荆州記有棟梁丹陽尹袁粲見王儉曰栝柏豫章雖小已丨丨丨器矣南史司馬子虛賦其北則有楩柟豫章左思吳都賦木則楩柟豫章詩集翻風豫章丨丨動白日夾日豫章丨丨月嵗闕深根深入地豫章丨丨丨並杜甫石楠格物總論石楠葉如枇杷有小刺凌冬不雕春生白花秋結細紅實人多移植庭宇間陰翳可愛不透日氣字亦作柟事類蘧君手植成都寧國觀有古楠四石刻云仙人丨丨丨丨陸遊石楠記豫在成都嘗以事至沉犀過國寧觀有古楠四皆千嵗木也枝擾雲漢聲戛風雨根入地不知幾百尺而陰之所芘車且百兩正晝日不穿漏夏五六月暑氣不至凛如九秋成都固多壽木然莫與四楠比豫蓋愛而不能去者彌月有石刻立廡下曰是仙人蘧君手植豫歎曰神仙至人手之所觸氣之所呵羸疾者起盲瞶者愈榮朽而金玉瓦石不難况其親所培植哉久而不稿不死固宜欲為作詩文會多事不果嘗以語道人蘧昌老真叟以為恨豫既去蜀三年而昌老萬里以書屬豫曰國寧也之楠幾伐以營繕郡人力全之僅乃得免懼卒不免子為我終昔之意豫發書且歎且喜夫勿剪憩棠恭敬桑梓愛其人及其木自古已然姑以蜀事言之則唐節度取孔明祠柏一小枝為手板書於圖志今見非詆蔣堂守成都有美政止以築銅壺閣伐江瀆廟木坐謡言罷亦書國史且王建孟知祥父子専有西南窮土木之侈沉犀近在國城數十里間而四楠不為當時所取彼猶有畏而不敢者況今聖主以恭儉化天下有夏禹卑宫室漢文罷露臺之風専閫方面皆重德偉人豈其殘滅千嵗遺迹侈大棟宇為王孟之所難哉意者情出於吏胥梓匠歎罔専恣以自為功而已使有以吾文告之者讀未終篇禁令下矣然則其可不書詩集赬子大朴既一剖衆材爭萬株懿茲南海華來與北海俱生長如自惜雪霜無雕渝籠籠抱靈秀簇簇抽芳膚寒日吐再艷丨丨流細珠鴛鴦花數重翡翠葉四鋪雨洗新裝色一枝如一株聳異敷庭除傾妍來座隅散彩飾几案餘輝盈盤盂高意因造化常情逐榮枯王公方寸中陶植在須臾養此奉君子賞覿日為娛始覺石楠詠價傾賦西都棠頌庶可比桂詞難以踰因謝丘墟木空采落泥塗時來開佳姿道去卧枯株爭芳無由緣受氣如鬱紆抽肝在郢匠嘆息何踟蹰孟郊紅葉石楠丨丨透簾青憶得粧成下錦茵試折一枝含萬恨分明説向夢中人權德輿幾百嵗楩楠枯崢嶸鄉黨皆莫記不知丨丨丨慘慘無生意上枝磨蒼天下根盤厚地巨圍雷霆折萬孔蟲蟻萃凍雨落流膠衝風奪佳氣白鵠遂不來天雞為愁思猶含棟梁具無復霄漢志良工古昔少識者出涕淚種榆水中央成長何容易截承金露盤裊裊不自畏杜甫枯楠二百年綺江柟樹古堂前故老相傳丨丨丨誅茅卜居總為此五月恍愡聞寒蟬東南飄風動地至江翻石走流雲氣幹排雷雨猶力爭根斷泉源豈天意滄波老樹性所愛浦上童童一青蓋野客頻留懼雪霜行人不過聽竽籟虎倒龍顛委榛棘淚痕血點垂胸臆我有新詩何處吟草堂自此無顔色杜柵木為風雨所拔歌千燈熖傘蓋低垂金翡翠薰籠亂搭繡衣裳春芽細炷丨丨丨夏蕊濃焚百和香白樂天一蓋青柟樹色冥冥江邊丨丨丨近根開樂圃接葉製茅亭落景陰猶合微風韻可聽尋常才醉困卧此片時醒杜甫高柟榕格物總論榕樹大十數圍葉如樟而小不凋樹上懸枝著地即生根一株可以芘蔭數畝然樹拳曲臭惡不可以為材燒之亦無熖不可以為薪故能久而無傷惟全福交廣間於近水處多産此木事類山谷維舟昔丨丨南遷丨丨榕下後人為作榕溪閣南軒文集詩集葉滿庭榕丨丨丨鶯亂啼栁根浮舟寒溪淡容與老木枝相樛其誰合二美名此景物幽太史昔南騖於焉曽少休想當下榻時請與耳目謀品題信要領亦有翰墨留我來訪遺址密竹鳴鈎輈稍令舊觀復還與佳客遊樹影散香篆水光泛茶甌市聲不到耳永日風颼颼所欣簿書隙有此足夷猶平生丘壑願如痼不可瘳雖知等喧寂終覺靜裏優更思濯滄浪榕丨丨小丨張南軒跨空飛忽此榕林中丨丨丨拱枅東坡斜陽入丨丨碎丨高榕葉翻作青天覆作金楊誠齋樗格物總論樗大木數十圍世傳其樹擁腫而枝拳曲其殆不材之木歟事類文木匠石之齊至曲園見社樹曰是不才故若是之壽社見夢曰若此木乃丨丨也楂梨橘柚之屬熟則剝故不終其天年莊子惡木樗丨丨也釋文散材樗櫟丨丨丨莊子注蔽芾丨丨其樗詩擁腫吾有大樹人謂之樗其木丨丨不中繩墨小枝拳曲不中規矩至於逢匠者不顧今子之言大而無用衆所同知莊子詩集一枝不損香檀文杏苦雕鐫生理何能得自全知有無材老樗否丨丨丨丨盡天年白居易樺格物總論樺按本草木似山桃皮上有紫黑花勻者用以裹鞍及弓鐙又可以入藥用字亦作大小未聞也事類脂辟鬼樺堪為燭木似山桃取丨燒丨丨本草燭擁馬唐正旦曉漏以前三司使大金吾以樺丨丨丨謂之火城李肇國史補詩集樺煙風燭丨丨香白樂天樺燭送客林中丨丨香坡冬青格物總論冬青一名女貞木一名萬年枝樹身大合抱皮粗葉茂盛經冬不凋能結子每枝一簇而皮青黑色有瓤中心核飛禽食之事類蘇彥頌序女貞之木一名冬青負霜蔥翠振柯凌風故清士斂其質而貞女慕其名多植之於庭階云詩集風動丨丨萬年枝謝眺直中書省又好丨吹丨萬年枝盧多遜陰寒霜霰不凋色兩株交石壇未秋紅實淺經夏緑丨丨許渾如煙樹碧樹丨丨覆暖波清秋欲盡客重過故園亦有丨丨丨鴻雁不來風雨多趙嘏近天墀離宫見爾丨丨丨雨露常秋養種時惆悵一枝嵐氣裏無人識是萬年枝韓子蒼楮格物總論楮一名榖樹高丈餘大者數圍枝條修聳葉刻缺而澀有毛剝其皮可以為紙取其實又可以練絹又為面藥以米泔灑楮亦能生菌也事類生于朝亳有祥桑榖共丨丨丨書樂彼園丨丨之丨其下維榖詩蔡倫紙丨丨造意用楮膚麻頭敝魚網以為丨本傳桐君方丨丨説其花蕊形色仙丨楮實正赤時收取其子陰乾用之採藥録詩集葉沃我牆東北隅張主維老榖樹先樗櫟大丨等桑柘丨流膏馬乳漲墮子楊梅熟胡為尋丈地養此不材木蹶之得輿薪規以種松菊靜言求其用略數得五六膚為蔡侯紙子入桐君録黃繒練成素黝面頮作玉灌灑蒸生菌腐餘光吐燭雖無傲霜節幸免狂酲毒孤根信微陋生理有倚伏投斧為賦詩德怨聊相續東坡宥老楮根固植丨雖云丨伐去曽須臾我塗雖不寬出入自有餘開門聽來往併納賢與愚頴濵陰繁可憐臺上楮轉日已丨丨不解詩人意何為樂彼園王文公古今合璧事類備要別集卷五十
