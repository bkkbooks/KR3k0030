body:
  text: 古今合璧事類備要後集卷二十七宋謝維新撰六部門吏部尚書司封侍郎司勳郎中員外附考功厯代沿革漢成帝置列曹尚書四人其一曰常侍曹光武改常侍曹為吏部曹主選舉靈帝改吏部為選部魏改選部為吏部主選事晉宋梁陳亦然初學記宋武帝大明二年分吏部尚書置二人通鑑後周依周六官置大冢宰卿舊復曰吏部唐改選部龍朔間改為司列咸亨初復先宅改吏部為天官神龍初復舊天寶間改為文部至德初復舊掌文官選舉總判吏部司封司勳考功四曹事通典六典本朝典選之職自分為四文選二曰審官東院太平興國六年命郭贄考京朝官課淳化三年置磨勘京朝官院又以興國中所置差遣院併入號磨勘差遣院亦名考課院淳化四年以考課京朝官院為審官院而涑水記聞云太宗患中書權太重向敏中時為諫官請分中書吏房置審官院刑房置審刑院熙寧間别置審官西院以主武選於是改審官院為審官東院焉曰流內銓實録淳化四年以幕職州縣考課院歸流內銓命翰林學士蘇易簡領其事自後命近臣主之武選二曰審官西院涑水記聞云王介甫與韓子華合謀欲沮文潞公且奪其權一日發中旨置審官西院樞密初不知也實録煕寧三年詔以審官院為審官東院别置審官西院專領升朝武官磨勘差遣曰三班院實録淳化三年詔置三班院以崇儀副使蔚進掌之先是供奉等官悉𨽻宣徽院至是别置三班院以考殿最自後多命近臣主之元豐定制以審官東院為尚書左選流內銓為侍郎左選審官西院為尚書右選三班院為侍郎右選道卿集蘇丞相行狀唐制文選掌於吏部武選則兵部主之掌文武官選授勳封考課之政令文臣寄祿官自朝議大夫職事官自大理正以下非中書省敕授者歸尚書左選武臣升朝官自皇城使職事官自金吾衛仗司以下非樞密院宣授者歸尚書右選自初任至州縣幕職官歸侍郎左選自借差監當至供奉官軍使歸侍郎右選凡分職為三封爵贈官之事則司封主之賜功定省之事則司勳主之官資課敢名諡之事則考功主之凡應注擬升移敘復蔭補及酬賞封贈者隨所分𨽻校勘法例團甲以上尚書省郎法例可否不決應取裁者亦如之若中散大夫閣門使以上則例遷敘之狀上中書省樞密院得盡給告身則通書尚書郎侍及所𨽻郎官續會要尚書左右選凡十五案左選掌闕案知闕案六品案七品案丿品案九品案雜上案下案甲庫案右選注擬案大使臣案小使臣案甲庫案掌注案知雜案告身案侍郎左右選凡十五案左選注擬知闕案補官案參軍上案下案主簿上案下案縣尉上案下案入官案甲庫案格式案過院案右選注擬上案下案供奉官案殿直案甲庫案掌法案知一案而四選密矣職略事類銓衡崔琰字季班魏氏初載委授丨丨總齊清議十有一年文武羣才多所明拔朝廷歸高魏志注識鑒毛玠之公方李重之識會注識會丨丨也選王文憲集序職掌吏部丨丨人物異晉重吏部為得華談集尚書二曹論官屬自魏晉以來凡吏部丨丨高於諸曹其選舉皆尚書主之通典甲午制王戎領吏部始為丨丨丨凡選舉皆先治百姓然後授晉書九班制子雅制九班而得用注曰劉頌字子雅為吏部尚書作九班之制以别尊卑為裴頠所駁事不見行晉記論舉沉朴吏部非能為刋虛名丨丨丨而名未齒也華談論核流品銓丨丨丨抑華取實無所滯才授王戎制長名榜吏部侍郎裴行儉始設丨丨丨列銓注期限等法又定州縣升降官資高下以為改事丨丨丨自此始也唐選舉志長定格唐文宗開成二年宰相李石奏定丨丨丨吏部請加置南曹郎中一人别置印文宗會要分十銓開元十三年分吏部為十銓選舉志分三銓尚書為尚書銓侍郎二人分為中銓東銓六典宣宗即位赦書曰吏部三銓選士祗憑資考多匪實材許觀察使刺史有竒才異能之士聞薦試用類要四時聽注劉祥道父林甫正觀初為吏部侍郎初隋代赴選者以十二月為始至春即停林甫奏丨丨丨隨到丨擬當時甚以為便唐書三分計闕唐朝舊制吏部選人每年調集自乾元以後屬兵宿于野嵗或凶荒遂三年一置選繇是選人停壅其數猥多文書不接真偽難辨吏緣為姦官爵乖濫而有十年不得調者陸贄奏吏部分內外官員為丨丨丨丨集人每年置選故選司之弊十去七八天下稱之陸贄傳裴馬能名丨行儉為吏部與李元馬載同典選十餘年甚有能名時稱裴馬唐書蘇宋殊等吏部考判丨丨俱入丨丨謂公與宋璟韓休作蘇頲集序三才四實選部每嵗以丨丨丨丨銓署羣吏權集送仲員外充點中選補使序又四事身言書判三類才用勞效六典一幅一揖劉乃從調致書於知銓舍人朱昱曰近代主司獨委一二小冢宰察言丨丨之制觀行丨丨之內若揖文王尼父登之於銓廷雖圖書易象之大以判體裁之曾不及徐庾德宗實録未嘗更易國朝王質字子野判吏部流內銓號為稱職而於選法丨丨有所丨丨人或問之公曰選法具備如權衡在執者不欺其輕重耳何必屢更其法言行録不久遷去杜正獻祁公衍流內銓審官院吏部審官主天下吏員而居職者例以丨丨丨丨公命諸曹各具格式科條以白問曰盡乎曰盡矣明日勑諸吏吏無得升堂坐聽行文書而已由是吏不得與銓事豫奪一出於公其在審官有以賂求官者吏謝不受曰我公有賢名不久見用去矣姑少待之同上左右四選文階官之等三十武選官之等五十有六幕職州縣官之等七散官之等九皆以丨丨髙下分屬四選四朝志東西兩曹諸州道里迢遞河洛天地之中伏望詔丨丨丨丨兩都分簡畢同赴京師東曹謂吏部西曹謂兵部文苑英華崔融吏部兵部選人議詩集敢當吏部銓胸中無水鑑丨丨丨丨丨山谷吏部尚書厯代沿革漢有選部尚書見吏部注魏改選部為吏部專掌選職右於諸曹尚書郎置二吏部尚書廢五兵部尚書尋復舊名齊梁陳後魏北齊皆曰吏部尚書後周依周官置大冢宰卿一人七命隋復曰吏部尚書六典注自漢及魏授此職者咸云吏部尚書若授諸曹尚書直曰尚書然此官厯代班序常尊不與諸曹同也六典自魏至梁並第三等梁定十八班班多為貴吏部尚書班十四諸曹尚書班十三唐因隋制吏部尚書掌文官選舉龍朔二年改為司列太常伯咸亨初復舊光宅元年改為天官尚書神龍元年復舊天寶十一年改為文部至德初復舊總判吏部司封司勳考功四曹事六典通典本朝張昭為尚書獨掌京官七品元豐官制行以審官東院歸吏部尚書左選審官西院歸吏部尚書右選四朝志官制初行詔除李清臣馬職略尚書從二品掌文武選之事而奉行具制命凡天下員闕具注諸籍月取其應選者揭而書之集官注擬考其閥閲以定可否凡選授封爵功賞課最之事皆所𨽻郎官驗實而後判成焉若有疑不能決則稟議於尚書省即應論奏與郎官同上殿續會要建炎六詔曰惟吏部備官餘長二互置題名事類天官吏部尚書周之丨丨卿也六典又掌文官選舉判丨丨司勳司封考功等四司職員令選部吏曹尚書典選舉齊祀屬三公曹靈帝末梁鵠為丨丨尚書後百官志注吏曹常侍曹尚書立公卿事注云世祖改為丨丨同上制法魏陳羣為尚書丨九品官人之丨魏志作法諸葛誕鄭揚等馳名譽有四通八逹之誚帝疾之詔考課莫取有名者如畫地作餅不可啖也盧育曰名不可以得異人而可以得常士王者正以循名按常為識但當有以驗其後今考績之法廢而以毁譽相進退故真偽混淆虛實相蒙帝納其言詔丨考課丨卒人魏毛玠為東曹椽與崔琰並典選舉用皆清正之士雖於時有盛名而行不由本者終其得進務以儉丨丨由是天下之士莫不以廉節自勵易俗毛玠為吏部尚書無敢好衣美食者魏武嘆曰孤之法不如毛尚書令使吏部用心如玠風俗之易不難拔才崔琰委授銓衡揔齊清議十有餘年文武羣才多所明丨朝廷歸美天下稱平進行毛玠雅亮公正在官清格其典選舉超卓下華偽進遜行抑阿黨于時四海翕然莫不勵行至乃長吏垢面羸衣乘柴車吏潔於上俗移於下民到于今稱之舉代魏盧育字子家為吏部尚書魏文帝使育自選代曰得如卿者乃可育舉鄭沖帝曰文和吾自知之更舉吾所未聞者乃舉阮武孫雍帝於是用雍並魏志讓代吳薛綜為選部尚書丨丨顧談曰談心精體密貫道逹微才照人物德服衆人誠非愚臣所可越先後遂丨綜吳志甄竒異李肅字偉恭善議論臧否得已丨丨録丨薦述後進題目品藻曲一條貫以此人服之擢為選部尚書舉選號為得才同上掦俊乂郭撫初為吏部尚書與郎姚範清心虛求搜丨丨丨內外稱之以郛姚擬崔毛崔鴻春秋居選官蔡克丨丨丨茍進之􅑫望風畏憚初克未仕時山簡嘗與王衍書曰蔡子尼今之正人衍以書示衆曰山子以一字拔人然未易可稱後衍聞克正選官曰山子之言驗于今矣晉書居銓衡吳隱之字處默有孝行母亡每哭韓康伯母輒泣涕語康伯曰汝後若丨丨丨之職當用此人及康伯為吏部尚書因進用之遂厯清要晉中興書無失才山濤為吏部尚書用人皆先密啓公奏舉丨丨丨晉本傳無遺才晉裴傾稱稽紹曰延祖領選可使天下丨丨丨本傳清通簡要鍾會見王戎裴階總角曰裴楷丨丨王戎丨丨後二十年此二賢當為吏部尚書冀是時天下無復滯才劉義慶世説周謹廉素太康四年治選曹銓管人才宜得忠恪寡欲抑華崇本者尚書朱整丨丨丨丨以道自居是其人也其以整為吏部尚書晉起居注牧馬家庭晉鄧攸為吏部尚書丨丨於丨丨妻息素食不受一錢於人本傳聚書閣上晉少帝即位以蔡廓為吏部尚書不拜乃以王德惠氏之惠被召即拜未嘗接容有興書求官輒丨丨丨丨及去職其封如初時談者以廓之不拜惠之即拜雖異而意同南史執心平當晉劉雄字公平遷吏部尚書丨丨丨丨本傳居身清正南齊緒炫為吏部尚書炫丨丨丨丨在選部門庭蕭索賓客罕至出入左右常捧一黃紙帽風吹紙已殆盡南史饋餉無受江湛為吏部尚書家甚貧不營私財丨丨盈門一丨所丨南史逰處玩雜袁昂雅有人鑒丨丨丨丨為吏部尚書梁帝謂曰齊明帝用卿為黑頭尚書我用卿為白頭尚書本傳衣冠切恨蕭子顯為吏書負才氣見凡流賓客不與交言但舉扇一揮而已丨丨丨丨之齊書衣冠傾屬梁王泰山仲通能接人士人士願其居選官頃之為吏部尚書丨丨丨丨梁書士不問賢崔亮後魏時為吏部尚書為停年格不問士之賢愚専以停解日月為斷亮甥劉景安以書規亮亮不從北史官有定價元暉遷尚書納貨丨皆丨丨丨大郡二千匹中郡一千小郡五百同上人服其明梁范雲性機警有識且善屬文為吏部尚書居選部寄任降重書牘盈案賓客滿門應答如流無所壅滯官曹文墨發摘若神明時丨莫不丨丨丨贍職官分紀人服無私梁徐勉為吏部尚書居選官彛倫有敘嘗與門人夜集客有虞曇求詹事官勉正色答曰今夕止可談風月不宜及公事時丨丨其丨丨本傳二世吏部謝舉字言揚掌吏部舉祖莊于宋代甫選至舉又三為此職前代未有梁書五人尚書謝莊子朏朏子瀹瀹子覽覽孫溫六代丨丨皆為吏部丨丨同上舉先德行隋牛宏為吏部尚書其選丨丨丨丨而後文才進用多稱職吏隋書好抑文雅唐戴胄檢校吏部尚書然丨丨丨丨奬法吏時以寡學為訾本傳下咸得職杜如晦攝吏部尚書仍領選與房元齡共莞朝政引士賢者丨不肖丨丨丨當時帖然歸重本傳後多知名唐范仲淹判吏部尚書參議朝政前後表薦四十餘人丨丨丨丨者分紀舉用甄明唐崔洪為吏部尚書丨丨丨丨門無私謁同上銓授平允唐韋承慶凡三掌選丨丨丨丨議者