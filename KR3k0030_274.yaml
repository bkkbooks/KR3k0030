body:
  text: 古今合璧事類備要巻六十八宋謝維新撰飛禽門杜鵑附思歸樂格物總論杜鵑一名杜宇一名子規一名嶲周大如鵲而羽烏三四月間夜啼達旦甌越間曰怨鳥凡鳴皆北向其聲哀而吻有血血漬草木聞其初聲則主離别之苦人惡聞之惟田家候其鳴則興農事或以為啼苦則自懸於樹自呼曰謝豹思歸樂鳥狀如鳩而慘色三月則鳴陶岳零陵記云其音云不如歸去即此事類望帝化蜀之先肇於人皇之際至黄帝子昌意娶人女生帝嚳後封其支庶於蜀歴夏殷周始稱王者自名蚕叢次曰栢灌次曰魚鳬其復有王者曰杜宇宇稱帝號望帝自恃功德髙乃以褒斜為前門熊耳靈關為後户玉壘峨眉為池澤時有荆人鱉靈其尸隨水上荆人求之不可得鱉靈至汶山下怱復見望帝帝立以為相後世自以其德不如鱉靈因禪位於鱉靈號開明遂自亡去化為杜鵑故蜀人聞杜鵑鳴曰是我望帝也寰宇記李膺蜀志亦同天津聞嘉祐末康節邵先生行洛陽丨丨橋忽丨杜宇之聲嘆曰北方無此物異哉不及十年其有江南人以文字亂天下者乎客曰聞杜鵑何以知此康節曰天下將治地勢自北而南將亂自南而北今南方地氣至矣禽鳥飛類得氣之先者也聞見録梅聖俞禽言不如歸去春山云暮萬木兮參天蜀天兮何處人言有翼可歸安用空啼向髙樹東坡評杜鵑詩東坡云南都王誼伯謂子美詩西川有杜鵑束川無杜鵑涪萬無杜鵑雲安有杜鵑蓋是題下注脚自我昔遊錦城為句首誼伯誤矣且子美詩備諸家體非必牽合辭程度偘偘然者也是篇句落處凡五杜鵑豈可以文害辭害意耶原子美之詩類有所感者也亦六藝之比興離騷之法歟按博物志杜鵑生子寄之他巢百鳥為飼之江東所謂杜宇曾為蜀帝王化禽飛去舊城荒是也且禽鳥之微猶知有尊故子美詩云重是古帝䰟又云禮若奉至尊子美蓋譏當時刺史有不禽鳥若也唐自明皇以後天歩多棘刺史能造次不忘於君者可得而攷也嚴武在蜀雖横斂刻薄而實資中原是西川有杜鵑耳其不䖍王命負固以自抗擅軍旅絶貢賦如杜克遜在梓州為朝廷西顧憂是東川無杜鵑耳至於涪萬也雲安刺史微不可考凡其尊君者為有也懷貳者為無不在夫杜鵑真有無誼伯以為來束川聞杜鵑聲煩而急乃始疑子美跋疐紙上語又云子美不應疊用韻子美自我作古疊用韻无害於詩僕所見如此誼伯博學强辯殆必有以折之也詩集古帝䰟西川有杜鵑東川無杜鵑涪萬無杜鵑雲安有杜鵑我昔遊錦城結廬錦水邊有竹一頃餘喬木上參天杜鵑暮春至哀哀叫其間我見當再拜重是丨丨丨生子百鳥巢百鳥不敢嗔仍為餧其子禮若奉至尊鴻鴈及羔羊有禮太古前行飛與跪乳識序又知恩聖賢吾法則付與後世傳君看禽鳥情猶解事杜鵑今忽暮春間值我病今年身病不能拜淚下如迸泉杜甫天子化君不見昔日蜀丨丨丨為杜鵑似老烏寄巢生子不自啄羣鳥至今與哺雛雖同君臣有舊禮骨肉滿眼身羈孤業業竄伏深樹裏四月五月偏號呼其聲哀痛口流血所訴何事常區區爾豈摧殘始發憤羞帶羽翮傷形愚蒼天變化誰料得萬事反覆何所無豈憶當殿羣臣趍苕溪云杜子美二詩皆明皇幸蜀還肅宗用李輔國謀遷之西内悒悒而崩此詩感是而作望帝䰟古時杜宇稱丨丨丨作杜鵑何微細跳枝竄葉樹木中槍翔瞥捩雌隨雄毛衣慘黑自憔悴衆鳥安能相尊崇陋形不敢棲華屋短翮惟願巢深叢穿皮啄朽觜欲秃苦饑始得食一蟲誰言養雛不自哺此語亦足為愚䝉聲音咽噦若有謂啼號畧與嬰兒同口乾垂血轉迫切似欲上訴於蒼穹蜀人聞之皆起立至今相效傳微風乃知變化不可窮豈思昔日居深宫嬪妃左右如花紅司空曙杜鵑行聲聲告人楚天空闊月成輪蜀魄丨丨似丨丨啼得血流無用處不如緘口過殘春杜荀鶴聲聲啼血蜀魄千年尚怨誰丨丨丨丨向花枝滿山明月東風夜正是愁人不寐時羅鄴那堪枕上聽銅梁路逺草青青此恨丨丨丨丨丨一種有寃猶可報不如䘖石疊滄溟羅隠偏當雨裏聞南城啼楚鳥逺思更紛紛况是街西夜丨丨丨丨丨應投最髙樹似隔數重雲此處誰能聽遥知獨有君張籍南谷子規啼峽裏雲安縣江樓翼瓦齊兩邊山木合丨丨丨丨丨眇眇春風見蕭蕭夜色悽客愁那聽此故作傍人低杜甫南山子規啼髙林滴露夏夜清丨丨丨丨丨一聲鄰家孀婦抱兒泣我獨宛轉何為情韋應物猶道不如歸夜入翠煙啼晝尋芳樹飛春山無限好丨丨丨丨丨范希文底處最堪憐傳聞望帝寃丨丨丨丨丨蜀月初殘夜巴山欲曙天宋子京思歸樂思歸山中不棲鳥夜半聲嚶嚶似道丨丨樂行人掩泣聽白居易催歸喚起窻全曙丨丨日未西無心花裏鳥更與盡情啼韓愈勸我歸匹馬馳驅事薄遊異香觸目動牢愁春禽丨丨丨休去爭奈功名未放休石舍人不如歸丨丨丨去孤城越絶三春暮故山只在白雲間望極雲深不知處丨丨丨去丨丨丨千忍岡頭一振衣朱元晦又見竹鷄注翡翠附鷸鵁鶄格物總論翡翠形小不盈握一種而二色翡赤羽雀翠青羽雀皆生南海鷸羽亦翠鵁鶄亦翡鬛紫纓大如鳬皆珍禽也翠雀本草云魚狗事類翠羽孝武之世云云明翠文甲通犀丨丨之珍盈於後宫孝武贊翡飾呉後宫却丨翠之丨白氏帖江南鳥李德裕奏言𤣥宗時使者抵丨丨捕鵁鶄翠丨溪鵝汴州刺史倪若水上言即見褒納白氏帖始安羽韋堅每州以所産暴陳其上若丨丨蕉葛蚺膽翠丨同上鷸鷸為冠鄭子華之弟子臧出奔宋好聚鷸冠鄭伯使盜誘之殺于陳蔡之間注聚丨羽丨丨左傳鷸飾帳李蔚咸通十四年春詔迎佛骨鳳翔乃以金銀為刹珠玉為帳孔鷸周飾之孔氏帖晉郭璞贊翠雀鷸鳥越在南海羽不供用肉不足宰懷璧其罪賈害以采鵁鶄怪羽倪若水元宗遣中人捕鵁鶄鸂鶒東方若水上言農方田婦方蚕以此時捕竒禽丨丨為園藥之玩自江嶺而南達京師水舟陸齎所飼魚蟲稻梁道路之言皆以賤人貴鳥議陛下即賜手詔褒答孔氏帖摠毛鵁鶄鳥也似鳬頭上丨丨劉良注文選辟火災鵁鶄舊言丨丨丨巢於高樹生子宂中銜其母翅飛下養之酉陽雜俎司馬上林賦隨風澹澹與波揺蕩太冲呉都賦虞機發留鵁鶄詩集委羽翡翠巢南海雄雌珠樹林投身炎洲裏丨丨玉堂隂旖旎光首飾葳蕤爛錦衾陳子昻感興詩鳴桁翡翠丨衣丨杜竹鳴丨髙丨翡翠巢傾丨丨翡翠低巢翡翠江上玉堂丨丨丨供翡翠近丨生犀丨丨稀復恐征戍干戈密看翡翠或丨丨丨蘭苕上無消息越裳翡翠丨丨丨並杜甫鷸蚌相持寧同丨頑忘但與鷸丨丨酉陽雜俎段成式聨句鵁鶄野塘飛丨丨鵁鶄丨樹頭張籍春隄曲浮跡佀丨丨丨鷗鶄韓老濕沙鵁鶄丨丨丨笠澤叢書賀江潭苑滿睛沙鵁鶄鸂䳵丨丨丨杜甫滿白蘋御水鵁鶄丨丨丨李賀酬荅鴛鴦附鸂䳵格物總論鴛鴦文禽亦匹鳥也似鳬毛有文采雌雄未嘗相離人得其一則一者相思而死鸂䳵毛亦五采尾有毛如船枹小如鴨皆水鳥也事類鴟嚇丨腐鼠而丨鵷雛莊子狐衛鴛鴦尢異者養雛於土窟破冢之間能使丨丨其子孔氏帖瓦化魏文帝問周宣曰吾夢殿屋兩丨墜地丨為鴛鴦何也宣對曰後宫當有暴死者帝曰吾詐卿耳宣曰夫夢者意耳茍以形言便占吉凶言未卒黄門令奏宫人相殺人化大夫韓朋一作憑其妻美好康王奪之朋怨王囚之朋遂自殺妻乃隂腐其衣王與之登臺自殺臺下左右捉衣衣不勝手遺書于帶曰願以屍還韓氏而合葬王怒令埋之兩塚相望經宿怱見有梓木生二塚之上根交于下枝連其上又有鳥如鴛鴦常棲其樹朝暮悲鳴南人謂此禽即韓朋夫婦之精魄搜神記鸂䳵俄有飛下河南府尹闕前臨大溪每僚佐入臺則水中先有小灘漲出石礫金沙常有鸂䳵一雙立牛僧儒為縣尉一旦忽報灘出丨丨鸂䳵丨丨不旬日拜西臺御史詳見後集縣尉門謝惠連鸂鶒賦質水禽之萬類信莫麗乎鸂鶒服昭晰之先資揉𤣥黄之美色詩集紫山岑飛飛鴛鴦鳥舉翮相蔽虧俱來緑潭裏共向白雲渥音容相眷戀羽翮相逶迤蘋藻戲春渚霰露繞寒池浦沙連岸淨汀樹拂潭垂年年此遊翫嵗嵗來追隨鳳凰起丹宂獨向梧桐枝鴻鴈來紫塞空憶稻粱池鳥啼倦依託鶴鳴傷别離豈若此雙禽翻飛不異枝刷羽清江浦交頸丨丨丨文章負竒色和鳴多好音聞有鴛鴦綺復有鴛鴦衾特為美人贈朂此故交心陳子昻碧沙上君不見昔時同心人化作鴛鴦鳥和鳴一夕不暫離交頸千年尚為少二月草菲菲山櫻花未稀金塘風日好何處不相依既逢解佩㳺女更值凌波宓妃精光搖翠蓋麗色映珠璣雙影相伴雙心莫違淹留丨丨丨蕩漾洗紅衣春光兮宛轉嬉遊兮未反宿莫近天泉池飛莫近長洲苑爾願相愛不相忘須去人間羅網逺南有瀟湘洲且為千里逰洞庭無苦寒沈江多碧流昔為薄命妾無日不含愁今為水中鳥頡頏自相求洛陽女兒在青閣二月羅衣輕更薄金泥文采未足珍畫作鴛鴦始堪着亦有少婦破𤓰年春閨無伴獨嬋娟夜夜學織連枝錦織作鴛鴦人共憐悠悠湘水濱清淺漾初蘋葛花發艷無人識江水逶迤空自春唯怜獨鶴依琴曲更念孤鸞隠鏡塵願作鴛鴦被長覆有情人李德裕翠翹紅頸丨丨丨丨覆金衣灘上雙雙去又歸長短死生無兩處可憐黄鵠愛分飛呉融翠鬛紅毛丨丨丨丨舞落暉水禽情似此禽稀暫分煙島猶回首秪過寒塘亦並飛映霧乍迷金殿瓦逐梭齊上玉人機採蓮無限蘭橈女笑指中流候爾歸崔珏翠浪玉沙雙絲絹上為新様連理枝頭是故園丨丨萬回同過影丨丨千處共棲痕若非有恨佳人魄即是多情年少魂應念孤飛爭忍宿蘆花蕭颯雨昏昏皮日休蘋洲花嶼丨丨丨丨接江湖頭白成雙得自如春晚有時描一對日長銷盡綉工夫曹組應笑鸚鵡細鑱雕鏤費深功舞妓衣邊綉莫窮無日不來湘渚上有時還在鏡湖中煙濃共拂芭蕉雨浪細雙遊菡萏風丨丨豪家丨丨畔年年徒被鎻金籠皮日休不隨鸂鶒雙浮雙浴傍苔磯蓼浦蘭臯綉帳幃長羨鷺鷥能潔白丨丨丨丨鬭毛衣霞侵緑渚香衾暖樓倚青雲殿瓦飛應笑隨陽沙漢鴈洞庭波煖又思歸盧弼鸂䳵孤飛故使籠寛織須知動損毛青雲莫惆悵失水任呼號六翮曾經剪丨丨卒未髙且無鷹隼患留滯莫辭勞杜甫雙舞鸂鶒丨雙丨亂為羣至今鸂䳵丨丨丨對浮沉一雙鸂鶒丨丨丨滿晴沙見前鵁鶄注並杜甫古今合璧事類備要别集巻六十八
