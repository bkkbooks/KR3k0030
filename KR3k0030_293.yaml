body:
  text: 古今合璧事類備要别集卷八十七宋謝維新撰水族門蝦附蛇格物總論蝦魚屬似蝗有小大小者不必論大者生海中殼頭尾鉗足具全各七八尺首占二分刺尖利如鋒刃刺上有鬚如紅筯可為簪各長二三尺前兩腳有鉗鉗粗如人大指長三尺餘上有芒刺如薔薇枝赤而銛硬手不可觸腦殼紅透彎環尺餘何止於盤盂也青州有之蛇水母也一名蟦一名樗蒲魚生東海色肉如血䘓大者如床其次如覆笠小者如斗泛泛常浮隨水上下無腹胃以蝦為目蝦動蛇沉故曰水母目蝦如駏驉之與跫跫相假矣可為膾事類民來獻舜攝天子有緩耳貫胸之丨丨丨珠蝦蝗飛化馬援為武陵太守郡連有蝗援振貧羸薄賦稅丨丨入海丨為魚蝦東觀漢記送蝦鬚吳復置廣州以南陽滕修為刺史或語修蝦長一丈修不信其人後故至東海取蝦鬚長四五尺封以示修修乃服王隱晋書貢蝦鮓虞嘯父為孝武帝侍中帝從容謂曰卿在閣下初不聞有獻替虞家富近海謂帝望其丨對曰天時尚暖䱥魚丨丨未可致尋有所獻帝撫掌大笑世說蛇蝦寄腹下水母其形凝一物大如覆帽腹下有物如絮俗謂之足而無口眼常有數十丨丨丨丨嘔食其涎浮水上捕者或遇之即沉乃是蝦有所見耳嶺表異録詩集間食飽丨丨丨魚蝦枯魚雜丨丨丨乾蝦閭閻飽丨丨丨魚蝦並歐蒲藍歸樵人賣柴不買米丨丨博取魚蝦歸施必達蒲湘八景詩河㹠附江㹠海㹠格物總論河㹠如鮎魚口尖一名鮠魚無頰無鱗目與口能開闔及作聲其色黑有芒刺此物多怒觸之則怒氣滿腹翻浮水上漁人就以物撩之遂為人獲橄欖并蘆根汁解其毒或云子不可食其大才一粟浸之經宿如彈丸有中毒者以水調炒槐花末及龍腦皆可解其腹中腴目為西施乳暮春栁花飛時此魚始大肥江淮人時以為珍一種色淡黑有文㸃謂之斑子者不可食土人亦不甚捕之彼江㹠則異於是狀如豚鼻中有聲出沒水上舟人候之以知風雨中有曲脂堪摩病照摴博即明照讀書工作即暗俗言懶婦化此也肉未聞為可食海㹠生大海中候風潮出沒形亦如㹠鼻中聲腦上有孔噴水直上百數為羣人先取得其子繫著水中母自來就而取之其子如蠡魚子其羣亦數萬嘗隨母而行也食亦無毒故併及之事類那一死子瞻在資善堂嘗與人談河㹠之美者云也值丨丨丨其美可知用三物世傳河㹠有毒能殺人蘇子瞻守丹陽及宣城見土人戶食之其烹煮亦無法但丨蔞蒿荻笋菘菜丨丨亦未嘗見有死者詩集怒猶蛙春洲生荻花春岸飛楊花河㹠當是時貴不數魚蝦其狀已可怪其毒亦莫加忿腹若封豕丨目丨吳丨庖煎茍失所入喉為鏌鋣若此喪軀體何須資齒牙持問南方人黨獲復矜誇皆言美無度誰謂死如麻我語不能屈自思空咄嗟退之來潮陽始憚餐龍蛇子厚居栁州而甘食蝦蟆二物雖可憎性命無舛差斯味曽不比中藏禍無涯甚美惡亦稱此言誠可嘉梅聖俞芒如蝟食肉遺馬肝未為不知味食魚必河㹠此理果何謂非鱗亦非介丨刺皮如丨觀形固可憎况復論腸胃禍心中包藏有挾無忌畏戕人甚刀鋸豈數墨宫劓乘時輒朋來戢戢類螽輩投身網罟中闕育如未闕土人重烹鮮肯令百金費蘆芽橄欖實調芼雜姜毅甘肥比西子玉鮪安足貴親朋相過從以此代饔餼口腹適須㬰遇毒死猶諱我本生江湖束帶任梁魏每嫌羊肉羶頗類漢都尉一麾味當烹飽食聊自慰此魚舊傳聞珍異守猩狒試分一杯羮下筯闕髣佛僅能免顛眩纍日氣怫㥜虛名果浮實騰口謾如沸古人供燕饗何有兹品彚解黿招禍變羞鱉取怨誹蟛蜞誤蔡謨垂死但餘氣韓栁食蝦蟆寧甘釣涇渭不知御常珍芻豢勝闕罻曲肱亦足樂採掇有蒿蔚百年天地間妄意事經緯堂堂七尺軀豈免薪土衣物苟乖所養有纍均闕愛身誠有待語道吾則未子固欲上時竹外桃花三兩枝春江水暖鴨先知蔞蒿滿地蘆芽短正是河㹠丨丨丨東坡强名魚鮿生藜莧腸食事一飽足腥腐色所難况乃裹鴆毒膨亨丨丨丨殺氣孕慘黷既非養生具宜謝砧几酷吳儂真差事網索不遺育捐生快下筯束手汗僮僕朝來里中子饞吻不待熟濃睡喚不譍已落新鬼籙百年三寸咽水陸富殽簌一物不登俎未負將軍腹為口忘計身叨死何足哭作俑者誰歟至今走末俗或云先王意除惡如藝菽逆裊與毒獍嵗嵗參幣玊芟夷入薦羞蓋欲殱此族死生有定數斷命烏可續適丁是時者未易一理局黿鼎子公怒羊羮華元衄異味古所珍無事若畏縮駢頭訌此語戒諭祗取瀆聾盲死不悟明智諒已燭范成大河㹠歎江㹠爾何物江㹠江㹠爾丨丨吐浪噴波身突兀依憑風水恣豩豪吞啖魚蝦頗肥腯肉腥骨硬難登俎雖有網羅嫌不取江雲漠漠江雨來天意為霖不干汝王林之鼇附黿鱉鼉格物總論鼇海中物其形贔屭按前載言以背負山周回千里其為大可知也黿鱉之大者江中有濶一二丈者南人亦捕而食之其肉其十二生肖肉五色而白多腸屬於頭至難死剔其肉盡頭猶咬物可以張鳶鳥老者能化為魅卵大如雞鴨子正圓一産一二百枚人亦掘取以鹽淹可食煮之其白不凝膏塗鐵摩之即明鱉九肋者勝目白腹下天字者不可食其甲以赤莧包置溫地即化生又有三足者為能鼉形類守宮鯪鯉輩四足而長一二丈短者六七尺背尾皆有鱗甲甲如鎧甲生卵大如鵝卵善玫崎岸夜則出邊岸人甚畏之南人食其肉云色白如雞其皮中冒鼓江海湖澤中所有也事類使鼇戴山渤海之東有壑焉其中有五山無所連著常隨波上下往還不得塹峙焉仙聖毒之欣于上帝上帝恐流于西極失聖臣之居丨巨丨十五舉首而丨之迭為三畨六萬嵗一交焉五丨始峙而不動列子釣鼇歸國龍伯之國有大人舉足不盈數十步而暨五山之所一丨而連六丨負而丨丨灼其骨以數焉列子鼇冠蓬萊東海丨丨丨丨游滄溟騰躍而上沉沒而下垤蟻聞而恱之相要海畔觀丨羣蟻曰彼丨山何異我戴粒逍遙於封壤之巔伏乎窟穴也符子鼇戲滄海有巨靈之丨背負蓬萊之山而抃舞丨丨丨之中列仙黿為梁周穆王十七年起師至九江以黿丨丨紀年染指楚人獻黿於鄭靈公子公之食指動謂子家曰他日我如此必嘗異味及宰夫解黿食大夫召子公不與子公丨丨於鼎嘗之而出左長史來謁韋丹未第時於洛陽橋見漁者得一黿甚大丹心異之贖投於河後有丹丨丨名濬之丨丨丹即其黿也吉凶響應録水神望候近有漁人泊舟馬當山下月明風恬見一大黿出水直上山頂四望頃之江中踴出一彩舟有十餘人㑹飲酒妓樂陳設甚盛獻酬久之上流有巨艦東下櫓聲振于坐中彩舟乃沒前之黿亦下未及水忽死於岸側意者丨丨使此黿為丨丨不知艦之來故殛之孔氏帖鱉三足鱉丨丨為能傳曰堯殛鯀于羽山其神化為黃能以入于羽淵爾雅無耳鱉丨丨為字神雜俎黃氏化化鱉於丨丨之母文粹堵父怒公父文伯飲南宮敬叔路丨丨丨鱉小曰長而食之遂出文伯母曰吾聞祭養尸饗養賔鱉於何有而使夫人怒國語東海鱉見蛙門注沅江鱉盧肇袁州人初赴舉先達問袁人出舉人邪答曰亦有也丨丨丨甲九肋者稀擴言鱉銜題髙郢夜課于豐亭忽有一鱉在案上視之乃石也郢異其事取十題散置箱中祝令丨丨之以卜來事既而石鱉舉頭乃是沙洲獨烏賊丨果然其年首送雲仙湘潭記鱉求生崔恱尚書家方㑹客夜夢十九人著青緑羅衣拜告求生既寤見器中有水泛丨正十九頭遂詣水次放之王仁裕玉堂閒話晋潘尼鱉賦皇太子遊於𤣥圃遂命釣魚有得鱉而戲之者令臣賦之方銜鈎以振掉吁駭人而可惡既顛墜於巖岸乃盤躎而雅步或延首以鶴顧或頓足而鷹距或曵尾於泥中或縮頭於殼裏若乃秋水暴駭百川沸流有東海之巨鼇乃負山而吞舟鼉鼉以為梁見前黿類注鼉宜冒鼓靈臺於論鼓鐘於樂辟雍注草木疏云丨形似蜥蝪四足長丈餘甲如鎧甲皮堅厚丨丨丨詩秋乃堅成季夏之月命漁師伐蛟取鼉注甲類丨丨丨丨詩月令詩集靈鼇積翠浮淡艷始疑負丨丨栁諸鼇海水無風時波濤安悠悠鱗介無小大遂性各沉浮突兀海底鼇首冠三神丘鈎網不能制其來非一秋或者不量力謂兹鼇可求贔屭牽不動綸絶沉其鈎一鼇既頓頷丨丨齊掉頭噴風激飛亷鼓浪怒陽侯鯨鯢得其便張口欲吞舟萬里無活鱗百川多倒流遂使江漢水朝宗意亦休蒼然屏風上此盡良有由白居易巨鼇方壺蓬萊負丨丨山谷黿鼉黿驕絶岸丨鼉丨黿游江清日抱丨鼉丨水國旁蒲湘丨丨丨黿鼉江光隱丨丨丨見黿鼉窟並杜鱉跛鱉丨丨詎能踊伊豫何所擬韓類鱉已看能丨丨栁車螯附蠔蚌蛤蜊蚶子螺菜淡格物總論車螯大蛤也一名蜄能吐氣為樓臺海中春夏間依約島溆常有此氣蠔即牡犡其初生海島邊如拳石四面漸長有髙一二丈者巉巖如山每一房內有肉一片海夷以斧楔取殼燒以烈火蠔即啓房挑取其肉趂墟市以易醑蛤蜊螺蚌蚶子淡菜一類也淡菜江浙人謂之殼菜詩集臑酒炙宋廬陵王義真居武帝憂使左右買魚肉珍差於齊內别立厨帳㑹長史劉湛入因命丨丨丨車螯湛正色曰公當今不宜有此設義真曰旦甚寒長史事同一家望不為異酒至湛起曰既不能以禮自處又不能以禮處人充口食何𦙍侈於食味前必方丈後稍欲去甚者猶食白魚䱉脯糖蟹以為非見生物擬食蚶蠣使門人識之學生鍾悅曰䱉魚就脯驟見屈伸蟹之將糖躁擾彌甚仁人用意深懹此怛至於車螯蚶蠣眉目內闕慚混沌之竒獷殼外緘非金人之慎不悴不榮曽草木之不若無馨無臭與瓦磔其何殊故宜長丨庖厨永為丨丨南史蠔何𦙍食見上注蛤蜊盧敖食丨丨遊𤣥闕在北海至䝉榖之上見一士深目而𤣥凖渠頭而鳶肩軒軒然迎風而舞顧見敖慢然而下其臂遁乎碑下敖往視之方卷龜殼而丨蛤蜊敖曰敖少好游背羣離黨觀于六合之外夫子可與敖為友矣若士傲然笑曰我方南遊乎罔䍚之野北息乎沉默之鄉西窮冥𡨕之里東貫鴻濛之光其外猶有沉沉之泥下無地上無天吾能往來子處矣吾與汗漫遊於九垓之上乃舉臂聳身入雲中敖仰視曰吾比夫子猶黃鵠與壤蟲也終日行不離咫尺而自以為逺不亦悲哉敖燕人秦皇召為博士使求仙淮南子昭略食宋王融初為司徒法曹詣王僧祐因遇沈丨丨未相識昭略屢顧盻謂主人曰是何年少融殊不平謂曰僕出於扶桑入於暘谷照耀天下誰云不知而卿此問何也昭略云不知許事且丨蛤蜊被甲者謝曽魯公好放生以蜆蛤之類人所不放而活命之多也一日夢被甲者數百人前訴既寤而問其家乃有惠蛤蜊數􅤮者即遣人放之夜復夢丨丨丨來丨東軒録螺張口而至南康有女採螺為業夜宿亭上有風雨聲見衆螺丨丨丨丨亂噉其肉明日唯有骨在焉因號其地為螺亭南康記出足而行衛瓘太康永熙中家人炊飯墮地盡化為螺丨丨丨丨瓘終見誅世說蚌蚌謂鷸趙且伐燕蘇代為燕將謂趙惠王曰川蚌方出曝而鷸啄其肉蚌合而拑其啄鷸曰今日不雨明日不雨即有蚌脯丨亦丨丨曰今日不出明日不出必見死鷸戰國䇿蚌有珠亷州邊海中有洲島島上有大池謂之珠池每年修貢珠戶入池皆採老丨剖而取珠珠如豌豆大常珠也如彈丸者亦時丨得徑寸照室之丨卒不可遇也嶺表異録蚶改名瓦壠蚶子蓋蚌蛤之類也頃盧尚書移鎮嶺南丨丨丨丨子以其殼上有稜如瓦壠故名焉同上淡菜諌進淡菜唐元和中嶺南節度使崔詠卒宰臣奏擬皆不可上謂裴度曰嘗有丨丨海蛤丨丨者詞甚忠正卿可求此人度出以訪人或有言孔戣諫者度即日以聞乃召之唐書度知淡菜孫元憲詩曉厨烹淡菜春杼織橦花牛翰林曰吾子丨丨丨非雅物也北夢瑣言詩集素脣錦背丨丨紫丨丨漿味厭蚶菜海客穿海沙拾貯寒潮退王都有美醖此物實當對相去三千里貴力致以配翰林文章宗炙鮮尤所愛旋折旋沽飲酒船如落埭殊非北人宜肥羊噉臠塊梅都官紫殼玊膚殊官新沐淨瓊沙石鼎初燃㵸井花丨丨旋開微滴酒丨丨莫熟要鳴牙長施金線成雙美更擘糟丘併一家老子宿酲無解處半杯羮後半杯茶楊廷秀食車螯斑斕㸃生花纍纍盤中蛤來自海之涯坐客初未識食之先咨嗟五代皆乖隔九州如剖瓜東南限淮海邈不通夷華于時北州人飲食陋莫加雞豚為異味貴賤無等差自從聖人出天下為一家南産錯交廣西珍當卭巴水戰每連舳陸輸動盈車溪潛好毛髮海怪雄鬚牙豈惟貴公侯閭巷飽魚蝦此蛤今始至其來何晚邪螯娥聞二名久見南人誇璀璨殼如玊丨丨丨丨丨含漿不肯吐得火遽已呀共食惟恐後爭先屢成譁但喜美無厭豈思來甚遐多慚海上翁辛苦斫泥沙歐陽永叔初食車螯蠔相粘為山蠔丨丨丨丨百十各自生韓退之初南食貽元協律蕃息依江薄官遊海鄉雅聞靜康蠔宿昔思一飽饡灼若未髙傳聞巨浪中碨礧如六鼇亦復有細民並海施竹牢採掇種其間衝激恣風濤鹹鹵與日滋丨丨丨丨臯中厨烈熖炭燎以菜與蒿委質已就烹鍵閉猶遁逃稍稍窺其戶青襴流玉膏人言噉小魚所得不償勞况此鐵石頑解剝煩錐刀戮力效一割功烈才牛毛若論攻取難飽食未為叨秋風鱸膾絲霜日持蟹螯修靶踏羊肋巨臠剸牛尻盤空筯得放羮盡釡可轑等是暴天物快意亦魁豪味雖可口腹美不易易遭拋之還土人誰能析秋毫梅聖俞食蠔懷玊深藏蓬山側畔屹蠔山丨丨丨丨萬壑間也被酒徒勾引著薦他樽俎解他顔楊廷秀食蠣房蛤蜊閉口不論事飲者憐渠有典刑見渠借筯眼偏青平生丨丨丨丨丨晚嵗枮腸永獨醒楊廷秀酒蛤蜊下鹽傷正味傾來百顆却盈奩剝作杯羮本屬懕莫遣丨丨丨丨丨不曽著蜜若為甜雪楷玊質全身瑩金緣氷鈿半縷纎更浙香粳輕糝却發揮風韻十分添食蛤蜊采糝羮古今合璧事類備要别集卷八十七
