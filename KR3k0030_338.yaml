front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_338-1a, image: WYG0941/WYG0941-0692c.png}
body:
  text: 古今合璧事類備要外集卷三十八宋謝維新撰簡笏門笏附手板象簡器物總論笏長二尺有六寸中傅三寸其末殺也六分之而去其一天子以球玉為之梃然而方其首示無所屈於天下諸侯以象前詘後直圓其首示屈於天子也大夫以魚班飾竹士竹本前詘後詘又示無所不屈焉凡為臣子者受命於君前則書於笏有致命及所啓白則書之於其上以入則用笏或又有所指畫於君前則亦用笏是笏也者不徒以示敬亦所以備忽忘用指畫也故名之曰笏若執事則搢之於帶之中自非亡喪無所去笏然小功以下亦不去也秦漢以來易以手板唯八座尚書執笏者以筆綴手版頭其餘王公卿士但執手版止主於敬不執筆示非有所記者矣然則手版其古之笏歟事類進笏將適君所史丨象丨書思對命記運笏丨丨長者意欲去禮白六帖書笏造受命於君前丨於丨記玉藻脫笏小功不丨丨當事則丨注悲哀之時不在記事同上執笏古者貴賤皆執笏其有事則搢之於腰帶所謂搢紳之士者搢笏而垂紳帶也晉輿服志搢笏見上詳故笏在詔問魏徵五世孫謨家書詔頗有存者謨對帷丨丨丨詔令上送鄭覃曰在人不在笏帝曰覃不識朕意此笏乃今之甘棠良笏與李絳進中書舍人翌日親擇丨丨丨之且言異時膺顧托南面當如此絳頓首還笏丏歸褚遂良帝將立昭儀遂良翌日復言對曰陛下必欲改立后者請更擇貴姓昭儀者事先帝身接惟第今立之奈天下耳目何帝羞默遂良因置笏殿陛叩頭流血曰丨陛下此丨丨丨田里舉笏却揖宋景告滿入朝公卿以次謁易之等後至促步而附璟丨丨丨丨唯唯書徵遺藁魏徵薨帝後臨朝歎曰朕比使人至其家得書一紙始半藁其可識者曰天下之事有善有惡任善人則國安任惡人則國弊公卿之內情有愛憎憎者惟見其惡愛者止見其善愛憎所宜詳謹若愛而知其惡憎而知其善去邪勿疑任賢勿猜可以興矣其大略如此朕顧思之恐不免斯過公卿侍臣丨之於笏知而必諫也記韋姓名韋貫之或薦之京兆尹李實實舉笏示所記曰此其姓名也孔六帖敇書笏上元禎上裴相書閣下以文皇丨起居郎丨居安思危四字於丨丨為至戒親署笏端崔澄性滑稽善辨帝恐漏禁中語以謹密字丨丨丨丨以笏叩額宋申錫豆慮莘誣告與漳王謀反時二月晦羣司皆休中人馳召宰相至中書舍人唱曰所召無宋申錫申錫始知得罪望延英門丨丨丨丨還第以笏叩顙五代何澤邪佞嘗班退獨留丨丨丨丨北望而呼曰明主明主衣紫擁笏賈直言始劉悟子從諫貴甚見直言輒丨丨丨丨以兵自衛直言諫悟曰郎少年毋使襲山東態朝服可擅著耶以帛裹笏陳希烈不便執笏騎馬丨丨丨丨令左右執之李石座見云便為將來故事雜俎置笏在陛崔元亮改諫議大夫鄭注誣宋申錫捕逮倉卒內外震駭𤣥亮率諫官叩延英苦諫反復數百言文宗未諭𤣥亮丨丨丨丨以笏畫地五代王彥章至京師入見丨丨丨丨陳勝負趙岩等劾不恭勒還第一榻置笏崔琳每嵗時宴于家以丨丨丨丨重積其上三世傳笏韓臯家自黃門以來丨丨丨執一丨經祖父所執末嘗輕授於僕人之手歸則别置在卧內一榻以示敬謹唐語林使人持笏張九齡體弱有醖籍故事公卿皆搢笏于帶而後乘馬九齡獨常丨丨丨之因設為丨囊自九齡始教婢執笏宋遜為連州參軍刺史聞其善歌使丨丨日丨丨簾前唱吟自如未嘗書笏王播善占奏雖數十事丨丨丨丨不便執笏見帶門捍笏中顙段秀實朱泚召之計事源休姚令言李忠臣李子平皆在坐秀實戎服與休並語至僣位勃然起執休腕奪其象笏奮而前陲泚面大罵曰狂賊可磔萬段我豈從汝反邪遂擊之泚舉臂丨丨丨丨而血衊面本傅舉笏擊面常達歸賊薛舉奴張貴曰識我否達瞑目曰若乃奴耳貴忿丨丨丨其丨達不為懾圖陽墮笏司空圖㑹遷洛陽柳粲希賊臣意誅天下才望助喪王室詔圖入朝丨丨丨丨趣意野耄璨知無意於世乃聽還李呼相笏丨參軍善相笏知休咎必驗丨為李丨丨宰相傳笏㑹昌以來丨丨朝則有笏架入禁中逐門丨送至殿前朝罷則置于架上百寮則各有丨囊吏持之常朝録御史揚笏王無競三遷監察丨丨改殿中㑹朝宰相宗楚客楊再思離立偶語無競丨丨曰朝禮上敬捉笏擊姦顧少連裴延齡方橫無敢忤者嘗與少連㑹田鎬第酒酣少連丨丨曰段秀實笏擊賊臣今吾笏將丨丨臣奮且前元友直在坐勸解之以笏擊僕晏元獻丨丨丨死丨𨽻出守南京詩話孫樵魏文正公笏銘太中六年詔出文正公笏歸其孫丞相謨孫樵請銘其笏曰靈豸薦角比干獻骨合以憤烈在公為笏怒虎可唾笏不可挫太華可裂笏不可拆拄天不側指日不食標儀條臆起鯁開直噫諫舌切切上磨帝缺不逆不怫笏則公笏緊拱折列諫舌不發膠榮領餗下偷上愎非公之節孰為公笏韋端符衛公故笏記二年冬端符於三原令坐中揖其羣官有客曰某丞李謂端符曰是衛公之胄也其家傳賜書與他服器十餘物者訖宴端符即丞居為客謁丞延入就次端符因詭請曰籍君僕射公之嗣固願見僕射公之烈之多其事辭雖史記或闕略具天下耳舌矣聞君世傳文帝詔與公服物者願得以觀丞慘慘曰諾即其家偃僂躍步奉賜書一函他物一器出發視有玉帶一首末為玉十有三方者七挫兩隅者六每綴環焉為附而固者以金丞曰𫝊云環者列佩用也玉之粹者若含怡然澤者若渙釋然公擒蕭銑時髙祖所賜于闐獻三帶其一素錦袍一其襟袂促小裁制絶巧密光爛爛如波旁出紫文綾襖一促製小袖如袍其為文林樹於上其下有馳馬射者又雜為狻猊虎貙橐駝者靴袴一往來為鈎屬鎖劒文疑非華人所為也自始傳于今莫能名其物象笏一差狹不類今笏者佩筆一奇木為管韜刻飾以金别為金環以限難其間韜者大鏡二大觽一小觽一笇囊二椰杯一蓋嘗佩於玉帶環者十三物亡其五有存者八犬帝為兒時與公子某年上下文帝命居宮中侍吾兒戲即賜以皇子服物黃綾袍皆為龍鸞文素錦襖綷五采為花若鳥者素錦半䄂小笏皆緻巧功良今之工為不能也文帝賜書二十通多言征討事原勞苦信必威賞而已其兵事節度皆付公吾不從中理也暨公疾親詔者數四其一曰有晝夜視公病大老嫗令一人來吾欲熟知公起居狀丞曰權文公視此詔常泣曰君臣之際乃如是邪端符既畢觀中若有物擊惻其心者於玉帶見逺方致物而上不専有以賜有功也於文錦衆物見其時之工志功不志靡也於賜公子以皇子衣服見視臣如友而猶兒也於詔征討見擇將材付將職也上嘗不曲制其事旁他可動哉於公問公疾見上答憫公如家人之視子姪也公之勞烈如是其大固有以感之獨推其運吾不信也丞曰子觀吾故物異他人之觀一似動色隱心者於霜雪變時每閲省是物人雅謂子工文辭幸為記吾得觀以慰吾思也故曰記衛公故物手板始用手板應仲逺云昔荆軻逐秦王其後謁者持匕首以備不虞從此侍官皆執刀劒漢高祖偃武修文始制以手版代焉故仲長子曰笏以書君教令記善刺過今人手版以象焉輿服雜事倒執手板桓溫大陳兵衛將移晉室呼謝安王坦之欲於坐害之既見溫坦之汗流沾衣丨丨丨丨安從容就席坐定謂溫曰安聞天下有道守在四鄰明公何須壁後置人邪溫笑曰正自不能不爾手板擊鳳溫嶠飲錢鳳酒未飲以丨丨丨丨手板賜駢髙駢吕用之憚其術窮且見詰乃刻青石丨丨為龍蛇隱起文曰帝丨丨使人潜植几上髙駢得之大喜手板拄頰王徽之為桓冲參軍冲謂徽之曰卿在府日久比當相料理徽之初不酬答直髙視以丨丨丨丨云西山朝來致有爽氣耳本傳手版畫地賈隱林德宗見隱林偉其貌問家世答曰故范陽節度副使循臣從父也帝異之引至卧內以丨丨丨丨陳攻守計蕭何相手版經相手版法出蕭何或曰四皓初出殆不行世東方朔見而喜之曰此非庸人所至魏司空蘇長史見此書歎伏以示許士宗韋仲將管輅而推歎郭景純以夜兼畫方得其妙理相手板取五行尋四時定八節明二十四氣百不失一板長一尺五寸廣一寸五分上狹而薄下廣而厚八角十二芒並欲端平板形皆完淨板凶少吉多者可用吉少凶多者不可用服也舊用白直檀刺榆桑柘四材也當令理直從上至下直如絃不得出邊絶理板頭是君座板頭有橫理與君共事必不得終分板作四分上一分為二親左為父右為母第二分都為婦第三分左為男右為女第四分左為奴右為婢婢之下畔方留為田宅財物牛馬猪羊雞犬之屬以五行十二時分若其處崩毁傷蹈破裂弔節蝎穿兆隨所主而應焉初學記詩集移南山帝前動笏丨丨丨李賀手板插手板昨因有緣事上馬丨丨丨韓愈贈張籍抽手板行丨丨丨付丞相韓愈送盤谷子古今合璧事類備要外集卷三十八
