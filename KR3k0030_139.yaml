body:
  text: 古今合璧事類備要後集卷七十宋謝維新撰監司門提刑歷代沿革國朝太宗淳化二年以司門員外郎董循等一十一人分充諸路轉運司提㸃刑獄四年省國朝㑹要景德四年真宗謂王旦曰朕慮四方刑獄官吏未盡得人一夫受寃即召災沴今軍民事務雖有轉運使且地逺無由知先帝嘗選朝臣為諸路提㸃刑獄今可復置仍以使臣副之於是置諸路提㸃刑獄公事以朝臣充始命屯田李拱為之副以武臣閣門祗候以上充天禧四年加勸農使俄改提㸃刑獄勸農使又以武臣為副使天聖六年悉罷明道二年復置嘉祐中有武臣同提㸃河東刑獄竊用公庫銀器及樂倡首飾議者謂武臣不可為監司罷之治平元年罷提㸃刑獄而委轉運司職官分紀熙寧二年諸路提㸃刑獄復差文臣其武臣並罷史臣曰上以武臣罕習吏文多不足以舉察所部人材故罷之人皆以為便十年復置提㸃京畿刑獄掌察所部疑留獄訟勸課農桑而按其官吏之不法别其廉吏以達于朝元豐因之續㑹要總郡之庶獄核其情實而覆按以法督治奸盜申理寃濫則隸提刑司嵗察所部廉能而保任之若疲軟或冒法則隨其職事劾奏神宗正史職官志宣和初詔江西廣東增置武提刑一員然遇闕帥不許武憲兼攝建炎元年以盜賊未衰諸路無武臣提刑處權添差一次專管捉殺四年罷之孝宗乾道六年詔諸路分置武臣提刑一員又乞依故事加同字不從於是武憲橫於四方淳熙末上知其不便遂不復除今止除朝臣一員朝野雜記事類司政四方丨丨典獄書臬事汝陳時丨丨同上直指暴勝之為丨丨使者前漢書繡斧衣丨衣丨以出討盜賊同上外臺丨丨胡文恭行髙良夫制詳刑命爾督視丨丨宗城除田待問制按部公先提㸃荆湖北路刑獄衡人思之繪公像建祠于城東青草司再使湖北先聲入境而姦吏望風解去綬者數十人丨丨所至立大榜於前云久負抑屈州縣不理者立其下於是積年無告之寃咸得伸雪瀘溪先生王庭圭撰向子忞行狀捕督熙寧十年以丁執禮為河北西路使上諭之曰卿職在刑獄盜賊最急宜用丨丨盜賊憲寄早稱才名出提丨丨胡宿集江西提刑施元長奬諭司獄紹興六年侍御史王縉言惟姦贓之吏多丨丨挾智數隂以私賄動丨丨之心平反髙賦言國家置提刑司蓋欲丨丨獄訟使民不寃詳見檢法門欽恤國家唯吏之不平民之失職獄之放紛未能獨察也故設糾度之司使奉丨丨之㫖國朝罷諸路同提㸃刑獄使臣勑惟刑恤丨丨之丨哉書作天牧非爾惟丨丨丨同上列功過慶歷二年詔自今提㸃刑獄朝臣代還丨丨丨三等以聞續㑹要出姓名李及通判廣州州民趙諫者素交通權貴持吏短長求見及及拒之慢罵而去因投匿名書誣及會上封者發諫事命及察其狀及盡數前後所為以聞詔斬諫都市及由是知名擢知隴州㑹置提㸃刑獄丨丨李及與陳綱丨丨付中書乃以綱使河北及使陜西仁宗實録刑得實初潭州劾梁晚四劫殺商人獄成而變其後七推不能明淳熙十二年潘德鄜提㸃湖南丨獄一問丨丨破械出之事聞上由是賢德鄜武岡縣一嵗收罪人三十六死者二十八皆平反之且奏其事時已擢知廣州上以其究心獄事特進秩一等又明年進直徽猷閣帥潭州云朝野雜記令簡嚴見後草切悉平注劾守臣黃遹撰謝殿撰師稷行狀公為湖北路提舉就改本路提㸃刑獄屬郡疆畛多與蠻徭接有守臣邀功生事無故調發兵侵其境反為所敗委公撫諭公既丨丨丨而條上戰沒者恤其家察所部總郡縣之庶獄核其情實而覆以法督治奸盜申理寃濫則隸提刑司嵗丨丨丨廉能而保任之或疲軟或冒法則隨其職事劾奏㑹要神宗正史職官志洗寃澤民濂溪先生周敦頤提㸃廣東刑獄不憚出入之勤瘴毒之侵雖荒崖絶島人跡所不至處亦必緩視徐按以丨丨丨丨為己任淵源録訊獄活囚馬亮徙福建提刑時初置提㸃刑獄亮至部覆丨寃丨全丨者數十人仁宗實録諭民作詩何耕字道夫除潼川提刑丨丨丨丨四十二篇語平易而教化寓焉郡邑家有其書强暴犯法父老必譙曰汝不誦何公詩乎往往知悔周益公集諭藏器甲蔡挺元祐中以起知南安軍擢江西提㸃刑獄時盜賊為江西福建八州之患挺告丨所部私丨丨丨與其首納原其罪所得兵械以萬計於是盜賊日衰東都事略以御史為神宗用丁執禮為河北西路提刑宣諭曰朕惟河朔地重謹選監司故丨丨丨丨之奏除知雜吕夷簡擢提㸃兩浙刑獄時大建宫觀南方伐材木期㑹嚴峻至有死者夷簡上疏請緩其程役又方冬水涸民苦於挽運宜須河疏通以卒送之真宗以夷簡上疏有憂國之心可丨丨侍御史丨丨東都事略單馬擒賊辛簡公次膺除湖南提刑先是賊龍淵李朝擁衆數萬據衡之茶陵秦樞匿不以奏以見闕處公丨丨亟趍茶陵以計丨丨驍將戮之募賊齎旗榜招安奏升茶陵為軍至今無為盜者湖湘距朝廷逺獄寃濫公遍歷郡邑狴犴屢空胡淡菴集閲兵止姦吕居簡擢提㸃京東刑獄徐州人有告孔直溫等挾妖法誘軍士為變而運使不受理者居簡亟令改狀合巡尉捕其黨誅之詔遷一官已而濮州復有叛者民相挺驚潰居簡馳往得其首惡誅之因大丨丨饗士奸不得發詔又遷一官神宗實録帥師往平楊誠齊萬里諡文節遷廣東提刑沈師犯南粵警報至公丨丨丨丨之孝宗大喜天詔褒稱仁者有勇又曰書生知兵遂有大用之意諭馘渠魁鄭丙為廣西提㸃刑獄歸正沙世堅素武勇坐贓决配靜江公時為憲部有劇賊未獲公丨世堅立功贖過世堅丨丨丨以獻言行録讞平岸獄丨丨丨丨曲阜行林劭河北提刑制按兹詳刑丨丨丨丨宜得膚使初寮除蘇綽制祥刑之寄爾久更事任見謂明審其為朕典一道丨丨丨丨惟公其心已察郡縣使毋濫繫毋賄成毋上下其手則汝為稱職張于湖行張德逺利路提刑制岸獄之寄閩吳丨丨丨丨曲阜行黃隱制張于湖棠隂閣記君子之為政去之久而猶見思者必有惻怛愛民之誠心感于民也深故其來也如慈父母之撫其子其去也如父母捨其子而去父母捨其子而去子之心之思寧有既耶猶曰吾父母將復吾歸及其久而不復來也思之之心益不能忘於是過其宫室見其所服用與其所愛樂起敬起慕尸而祝之社而稷之更數十百世而不敢怠者蓋昔之人以為父母則今之人皆其孫子孫子而事其祖宜如何也余昔為中都官聞其賢令曰張君仲欽閩之人歌舞之去而思之前年余為建康仲欽適通判府事當塗闕守余檄仲欽權焉居數月仲欽代去余居當塗之别邑往來田間聞民之思仲欽飲食必禱也余曰張君之政何如而使爾不忘若是民曰我亦不知但知去年有水菑而君實來民不知水今年水不為害而吾懼然若將隕焉君之時吾與吾官相忘君去我我日與州縣之吏接我我亦不知其故知思君而已去年余來桂林仲欽提㸃廣南刑獄下車一月冒黃茅瘴走二十五州以扁舟度海吏士叩頭涕泣交諫仲欽褰裳登舟半濟風作舟師震駭仲欽怡然不為動也黜陟罷行一皆考之民民扶輿歡噭以為百年未之見也夫以當塗之思則知閩之思以閩當塗占之仲欽之去嶺表而還天朝也民之思仲欽可勝述哉昔召伯之教明于南國而人愛其甘棠故余登仲欽之閣名之曰棠隂以識民異日之思閣之前有榕木交䕃閣上仲欽之所遊息乾道丙戌五月朔歷陽張某記詩集命呂訓刑方丨丨理劇復推張直用明銷惡還將道勝剛教逾齊國社思比召南棠希怨猶逢怒多容竟忤强柳子厚賀裴令公詩司刑楚俗號難治丨丨尤擇賢危疑片言決舒慘一方専司馬溫公張都官肅江東憲詩刺史天哀哉吳越人久為江湖患官自倒帑廩惠不及黎元願君五袴手招此半菽魂一見丨丨丨稍忘獄吏尊蘇東坡送黃師是赴兩浙憲陽春腳憲臺師表光且耿濂溪留下濂溪井云云丨丨有丨來江城銀漢乘槎移使星嶺上梅花莫遲發先遣一枝迎玉節楊誠齊送吉州趙山谷赴廣州憲使無訟可丨人丨丨寧須意外陳陳后山送郭大夫䕫路提刑或空囹嚴能喜劇部持節按詳刑萑苻稍衰息郡縣丨丨丨黃山谷詩回使節獨追洙泗人無訟再使成康世措刑召節自天丨丨丨郎星朝斗作台星楊誠齊送彭子山提刑赴召迎漢節却從吉州奪吾侯一州奪與三十州梅花一笑丨丨丨桂花八㭑吹嶺雪使星歸去作台星跳過郎星與卿月楊誠齊餞胡元之持節桂林繡衣綵服寶儲依舊接英游蕩節何曽逺藻旒卿月使星銀漢曉丨丨丨丨太湖秋楊誠齊送王李德提刑星軺玉節方丈蓬萊第一人丨丨丨丨正青春楊誠齊送蔡定夫赴湖南憲使星移天西丨丨丨照丨丨去白鷺青原遮不住楊誠齊送趙吉移利路憲使者來何暮詳刑丨丨丨丨丨楊誠齊持節貴當年上冢過家真樂事平時丨丨丨丨丨陳后山寄提刑李學士豪傑歸囊牘山西丨丨丨丨丨渭北風光入酒杯王荆公送陜西趙提刑杜姦民奠枕擁鉞丨丨丨丨丨唐子西送宋衮臣赴浙憲詩提刑司幹官歷代沿革國朝建炎四年詔諸路提刑司除武臣提刑添置幹辦公事官許存留文臣一員中興㑹要事類佐車以丨軺丨白集檢法歷代沿革國朝熙寧六年置提刑司檢法官一員從呂惠卿之請元豐三年罷五年復置職源紹興四年詔自今提刑司檢法官不許差出中興㑹要事類疏駁髙賦字正臣言國家置提刑司蓋欲平反獄訟使民不寃自罷武臣以來多止一員兼河渠盜賊而州書繁多省閲不給若委之吏則為大弊請逐路置檢法官以専平讞丨丨本𫝊詳讞臣寮章奏檢法官職專丨丨中興㑹要毋得出巡熙寧八年詔諸路提㸃刑獄司檢法官今後丨丨隨長官丨丨詩集長者科勇鋭閫防猶著酒切深疾惡反傷和贈言竊取仁人號善聽君居丨丨丨陳后山送檢法趙奉議詩提舉歷代沿革此即漢耿夀昌常平之任也自衛李悝制平糴之法漢人因之則謂之常平焉然漢人特置倉而猶領之於大司農也國朝淳化中建常平倉景祐元年令轉運司與長史舉所部官專領之然猶隸漕臣熙寧遣使提領此蓋提舉常平之所始也二年制置三司條例言河北陜西已差官提舉常平廣惠倉餘路欲差胡朝宗張復侯叔獻曽誼等並為提舉官九年府界畿內亦専置提舉常平倉一員不令司農丞兼領提舉常平司操常平斂散之法申嚴免役之政令治荒修廢賑民艱厄則隸提舉司嵗察所部廉能而保任之若疲軟或犯法則隨其職事劾奏神宗正史職官志又哲宗正史職官提舉常平司掌常平義倉免役市易坊場河渡水利之法因民之有無嵗之豐凶而斂散賑濟之凡役錢視其産之厚薄人吏廩祿視其役之重輕凡市易掌斂市之不售貨之滯於民用者乘其貿易以平物價皆舉行其政令以裕民力而阜邦財掌按察官吏之事元祐初罷紹聖九年復置政和改元詔江淮荆浙六路共置茶鹽提舉一員宣和三年詔河北京東路推行新法鈔鹽可添置提舉官一員此提舉茶鹽之所始也國朝茶鹽事舊隸發運司元豐間或以轉運常平官兼提舉或以提刑兼領知通提轄政和以後始専置官吏既而諸路皆置建炎元年詔提舉常平司併歸提刑司職源二年八月復諸常平官還其糴本自青苗錢不散外常平免役之政皆掌之朝野雜記三年復置四年詔逐路提刑司茶鹽司並依舊分東西路紹興二年詔荆湖北路復置提舉司茶鹽司四年詔廣西茶鹽司官吏並罷其職事委漕臣五年詔諸路提舉常平併入茶鹽司仍以提舉常平茶鹽等公事為名九年置經制司改常平官為經制某路幹辦常平等公事未幾經制司罷復為常平官久之復置提舉東南以茶鹽司兼領四川以提刑司兼領雜記又中興係年録紹興十五年户侍王鈇言常平法望復置提舉官乃命諸路茶鹽官改充提舉常平茶鹽惟四川廣西以憲臣淮西京西以漕臣兼領仍令檢察所部州有擅用常平錢物者按劾以聞仍别置官吏然常平錢皆取以贍軍今特掌義倉及水利役法賑濟等事而已無復平糴之政矣雜記事類平糴見上沿革注常平注同上庾臺慶元制庾政同上注操斂散沿革注賑囏厄注見上察廉能並同上問疾苦潘畤字德鄜遷江東提舉入境發贓吏一人故相有為請者不聽竟按逐之列城震聳行部所過延見父老使縣别為輩以次召丨所丨丨及吏治得失戒州縣毋得除舍館飾供悵鈐鍵吏卒所過肅然父老嘆息以為未始有也晦菴集濟師糧鄭尚書丙提舉湖南李金陷郴州尹寬起寧逺縣以應之衡邇賊巢提刑託行部以避其鋒常平亦置司在衡公兼程疾趍督州將治城訓兵復常寧縣民恃以安公乞鄂軍丨丨丨餫不足發倉佐之賊平協助為多言行録行荒政公提舉浙東時浙東饑民滿野先生條具利害奏請拯救活飢民無慮數十萬在任按劾贓吏舉丨丨丨一路肅然朱文公行狀摘山煮海掌丨丨丨丨之利以佐國用皆有鈔法視其嵗額之登捐以詔賞罰且給之不如期鬻之不如式與州縣之不加恤者皆劾以聞裕民阜邦見官制役書可法鮮于侁宋子駿熙寧初范鎮舉所知除利漕兼提舉常平上曰鮮于侁定利路丨丨丨為諸路丨風力世濟王鐵字丞可丨丨丨丨臨事精密建炎復被除擢為湖南提舉茶鹽移淮東上聖德詩張商英提舉京西南路常平等事公以說獻曰真夀者不死真樂者不憂真治者不亂其說以長久沖淡為主上異其言召還丨元豐丨丨丨一百二十韻上曰卿不廢學如此耶除館職張丞相商英家傳奏常平數公遷湖南提舉常平赴闕丨事上曰卿到任後有民間利害奏之無隱湖北郡丨丨多所侵用文書類載虛丨而已公悉為核實且奏乞自今諸郡主管官䄮滿並以實數付之新至者朝廷可其奏自是遇有水旱皆可贍給黃遹撰謝殿撰師稷行狀加惠黎元朕以常平蠲役之政丨丨丨丨初寮除方略制以利天下昔在神考取成三代制為常平蠲役之政丨丨丨丨初寮除黃琮制使者節臨淮東煮鹽之利供國用什一命汝以丨丨丨丨之張于湖韓彥直除淮東提舉制唐子西撰常平恤民制書夫理財所以養民養民所以阜財知理財而不知恤民則民且散矣安得財而理諸財用不足而加賦擾民其害有甚於是者則財亦不可以不理此常平之法所以必不可廢雖廢而必復也雖然徒法不能以自行故國家部置使者任之以權授之以成書使専董其事豫欲使民仰事俯育足以自給汝為豫欲使民凶年饑嵗無流離失業汝恤豫欲使民疾苦呻吟有以自達汝聽豫欲使吏奉法惟謹無意外鑿空以侵漁小民汝察庶民艱食赤子開口仰哺嗷嗷吏或恬視不發圭撮民所不欲吏或牽課抑强以利嵗入之嬴數期㑹未至吏或文移四出係纍敲朴以要治辦之功汝其糾戒必罰無赦於戲有弊吏無弊法立法之意至寬至厚條目至纎至悉至明至白汝推行之無俾民受其害而歸咎于法無俾異意之人得以藉口譊譊無謂朝廷不汝聞知朕言維服其聽無怠詩集倚繡衣大江西畔米流脂斂散新陳丨丨丨旗展春山千嶺暗霜飛署路萬艘歸朝家法備農商信臺府官間案牘稀廬阜虎溪天下景未妨行部欵柴扉周益公送肜懷正赴江西倉使避文星詔謂正字當居中肯為朕行綏百蠻梅花迎笑錦囊古南斗退丨丨丨寒動搖山嶽細事耳約束海若收波瀾楊誠齊送蔡定夫提舉正字使廣東山嶽動搖丨丨丨丨增氣色詔書宣布舞羣黎楊誠齊送羅春伯提舉浙西提舉司幹官歷代沿革國朝熙寧二年置提舉常平司勾當公事於通判幕職內選差一員不妨本職是年制置三司條例司言京西路乞差大理寺丞朱紘淮南路著作郎曽伉兩浙路前宣州司理王醇並為管勾官職略紹興三年户部看詳欲諸路州並以通判充主管官又許於幕職官選差六年復置主管官十五年改為幹辦公事依漕屬例中興㑹要此常平幹也宣和三年置茶鹽提舉屬官一員續㑹要此茶鹽幹也今提舉司存二幹官以此事類左軺車以丨丨丨白集幹茗局使丨丨丨胡文恭行李執中制公直不屈朱倬特改左宣義郎倬為廣東提舉司幹辦公事用宣諭明索薦其丨丨丨為勢丨召對論得天下有道在得民心詔下其章而倬有此令中興係年録古今合璧事類備要後集卷七十
