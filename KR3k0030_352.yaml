body:
  text: 古今合璧事類備要外集卷五十二宋謝維新撰鼎鑊門鼎附鼐鏡釜鐺錡銼鬵銚鬲音厯器用旨歸鼎調五味器三足兩耳耳謂之鉉銅鐵等物為之其類有鑊有鼐有釜有鉶有鬵有鍑音冨有鬲有鼒有翼有鐺鑊所以煮肉及魚臘之器既熟乃齊於鼎齊多少之量鼐鼎絶大者釜無足錡三足釜鉶三足兩耳有蓋和羹用之鍑大口鬲鼎豰足實五觳象腹交文三足厚半寸脣寸鬵大上小下苦甑鐺無足鼒小鼎圓而弇上者翼又小而附於耳外夫豈一名而已哉它如所謂錪所謂銼與􅟋鋞皆小釜也猶未也銚與􅀈與􅀈與􅀈柄與鎬又皆溫器然銚皆有今多用之它所罕見矣事類玉鉉九四鼎折足覆公餗六五鼎黃耳金鉉利貞上九丨丨大吉易金鉉見上文和五味鼎三足兩耳丨丨丨之彛鼎也説文受一斛牛鼎丨丨丨天子飾以黃金諸侯白金有鼻目以銅為之三足鼎待人九丨丨丨而後寶揚子鼎烹雞函牛之丨以丨丨多汁則淡少汁則熬後邉孫傳神鼎一昔泰帝伏羲與丨丨丨一者一統天地萬物所係象也寶鼎三黃帝作丨丨三象天地人並前郊祀志得寶鼎黃帝丨丨丨冕俟問於鬼臾區臾區曰黃帝丨丨丨之神策是嵗己酉朔旦冬至得天之紀終而復始於是黃帝迎日推䇿鑄銅鼎黃帝采首山銅丨鼎丨成有龍垂胡髯迎黃帝上升因名其處曰鼎湖並同前鑄九鼎定王使王孫滿勞楚楚子問鼎之輕重大小焉對曰昔夏之方有德也逺方圗物貢金九牧鑄鼎象物百物而為之備使民知神姦故民入川澤山林不逢不若魑魅魍魎莫能逢之用能協於上下以承天休桀有昏德鼎遷於商載祀六百商紂暴虐鼎遷於周德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止成王定鼎於郟鄏卜世三十卜年七百天所命也周德雖衰天命未改鼎之輕重未可問也左宣三遷九鼎武王伐商丨丨丨於洛邑義士猶或非之郜大鼎宋人以丨丨丨賂公納於太廟並左桓二夀夢鼎魯侯賂荀偃以乘馬加璧束錦先吳丨丨之丨左僖二十楚問鼎見前注秦求鼎丨師臨周以丨九丨顯王患之以告顔率率曰請救於齊遂説齊王曰秦無道欲興師求周之鼎君臣計不若歸齊即願王圖之齊王恱發師救之秦師罷齊求鼎丨丨丨顔率曰周即獻鼎不識何塗之所從王曰塗於梁率曰梁欲求鼎謀諢臺之下小海之上梁必不出也王曰從楚率曰楚欲得鼎謀於華亭之上楚必不出矣齊王乃止並後語沒水求周末九鼎沒於泗水彭城下秦始皇兼天下過彭城齋戒禱祠使千人丨丨丨之不得史有雲蓋漢武帝時汾隂巫錦為民祠魏睢后土營旁見地如鈎狀掊俔得鼎以禮迎鼎至甘泉從行上薦之至中山晏溫丨黃丨丨焉有鹿過上自射之因以祭之至長安公卿大夫皆議謂之寶鼎現改元鼎伊尹負丨丨丨鼎俎以滋味説湯致於王道東方朔傳烏獲扛丨丨任鄙丨鼎朴牛楊子孟説舉秦武王與丨丨丨龍文鼎絶臏而死史記涽王覆文摯發怒齊丨丨以愈王疾王命生烹文摯三日三夜不死顔色不變文摯曰何不覆鼎以絶隂陽之氣丨丨使丨之乃死葛陵得漢平中丨丨城東祝黑社下上中丨銅鼎銘曰楚元武王墓穀城得晉咸康四年丨丨縣門外有光取丨九鼎一枚陽秋姚璹奏時九鼎成武后欲用黃金塗之丨丨丨鼎者神器也貴質朴不得外飾臣觀其上先有五采雜麗豈待塗金為符矅耶后乃止唐本集逢堯負和丨丨武后時丨鼎詣闕下上書自完願助天子和調百度有司難曰昔桀不道伊尹負鼎於湯今天子聖明百司以和尚何所調逢堯不能答六熟鼎常山王承乾造丨丨丨招士奴盜取人牛馬親視烹燖孔氏帖常燃鼎貞元八年吳明國貢丨丨丨量容三斗光潔類玉其色純紫每修飲食不熾火而自熟香潔異常久食之令人反老唐杜陽編鼎鐺有耳趙普事見宰相門衛孔悝鼎銘六月丁亥公假於大廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難於漢陽即宮於宗周奔走無射啓右獻公獻公乃命成叔纂乃祖服乃考文叔興舊耆欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅子女銘若纂乃考服悝拜稽首曰對揚以辟之勤天命施於蒸彜鼎正考甫鼎銘一命而傴冉命而僂三命而俯循墻而走亦莫余敢侮叔向讒鼎銘昧旦丕顯後世猶怠班孟堅東京賦嶽修貢兮川郊珍吐全景兮敲浮雲寶鼎見兮色氤氲煥其炳兮被龍文韓退之三器論或曰天子坐於明堂執傳國璽列九鼎使萬方之來矣惕然知天下之人意有所歸而太平之階具矣後王者或闕何如對曰異乎吾所聞歸天人之心興太平之基是非二器之能繫也子不謂明堂天子布政者耶周公成王居之而朝諸侯美矣幽厲居之何如哉子不謂傳國之璽帝王所以傳寶者耶漢高文景得之而為寶美矣新莽胡石得之何如哉子不謂九鼎帝王之所謂神器耶夏禹鑄之周文遷之而為寶美矣桀癸紂辛有之何如哉若然歸天人之心興太平之階決非三器之所能也夫帝王之聖者卑宫室賤金玉斥無用之器以示天下貽子孫而後王猶彈天下之上才不肯已又安思誇廣之尊其為明堂歟若傳國璽之狂嬴賊斯童心侈意而為之宗師有之不抵之足矣稱其符端則未也若九鼎之死百牢不能膏其腹火萬載不能黔其足其烹飪飼之用又足取豈不為分神之器哉堯水滔天人禽鬼神之居相混矣禹導川決水以無壤人之居乃銷九金乃鑄九鼎儀萬有之族露怪異之狀其護人已其救人已後王決不如大禹識鬼神之狀又無當時汨沒之危而徒欲門金大廣器物與天墊巾郊郭異名同藺者豈不逺哉是亦見謬也噫不務其修誠於內而務其盛飾於外匹夫之不可而況帝王哉韓退之石鼎序元和七年十二月四日衡山道士軒轅彌明自衡山來舊與劉師服進士衡湘中相識將過大白知師服在京夜抵其居宿有校書郎侯喜新有詩聲夜與劉説詩彌明在其側貌極醜白鬚黑面長頸而高結喉中又作楚語喜視之若無人彌明忽軒衣張眉指爐中石鼎謂喜曰子亦能與我賦此乎劉往見衡湘間人説云年九十餘矣解捕逐鬼物拘囚蛟螭虎豹然不知其實能否也見其老頗貌敬之不知有文也及聞此説大喜即援筆而題其首兩句次傳於喜喜踴躍即綴其下云云道士啞然笑曰子詩如是而已乎即袖手竦肩倚北墻謂劉曰吾不能世俗書苐子為我書吾句因高吟曰龍頭縮􅌲蠢豖腹脹膨脝初不似經意詩旨有如譏喜二子相顧慙駭欲以多窮之即又為而傳喜喜思益苦務欲壓道士每營度欲出口吻聲鳴益悲操筆欲書將下復止竟亦不能竒也畢即傳道士道士即高踞大唱曰劉把筆吾詩云云其不用意而工益竒不可附説語皆侵劉侯喜益忌之劉與侯皆已賦十餘韻彌明應之如響皆穎脫含譏諷夜盡三更二子思竭不能續因起謝曰尊師非世人所出也某伏矣願為弟子不敢更論詩道士奮髯曰不然章不可以不成也又謂劉曰把筆來即又唱言四十字為八句既止則讀讀畢謂二子曰章已就乎二子齊應曰就矣道士曰此皆不足與語此寧為文耶吾就子所能而作耳非吾之所學於師而能者也吾所能者子皆不足以聞也獨文乎哉吾語亦不當聞矣吾閉口矣二子大懼皆起立牀下拜曰不敢他有問也願聞一言而已先生稱吾不能人間書請聞此而已道士寂然若無聞也纍問不應二子不自得即退就坐道士倚墻睡鼻息如雷鳴二子怛然失色不敢喘斯須曙鼓鼕鼕二子亦困睡及覺日已出驚顧覔道士不見即問其童奴奴曰天且明道士起出門若將便旋然奴怪久不返即出覔之無有見矣二子驚惋自責若有失者遂詣余言不能識其何道士也常聞有隱君子彌明豈其人耶韓愈序蘇子瞻漢鼎銘禹鑄九鼎周器也初不以為寶象物以飾之亦非所以使民逺不若也武王遷之洛邑蓋已見笑於伯夷叔齊矣方周之盛也鼎為宗廟之觀美而已及其衰也為周之患有不可勝言者匹夫無罪懷璧其罪周之衰也與匹夫何異嗟夫孰知九鼎之為周之角齒也哉自春秋時楚莊王以問其輕重大小而戰國之際秦與齊楚皆欲之周人惴惴視三虎之垂涎而睨已也絶周之祀足以致冦裂周之地不足以肥國然三國之君未嘗一日而忘周者以寶在焉故也三國爭之周人莫知所適與得鼎者未必能存周而不得者必碎之此九鼎之所以亡也周顯王之四十二年宋太丘社亡而鼎淪沒於泗水此周人毁鼎以緩禍而假之神妖以為之説也秦始皇漢武帝乃始萬方以出鼎此與兒童之見無異善夫吾丘夀王之説也曰汾隂之鼎漢鼎也非周鼎夫周有鼎漢亦有鼎此易所謂正位凝命者豈三趾兩耳之謂哉恨夀王小子方以諛進不能究其義豫故作漢鼎銘以遺後世君子詞曰惟五帝三王及秦漢以來受命之君靡不有兹鼎鼎存而昌鼎亡而亡蓋鼎必先壞而國隨之豈有易姓而猶傳者乎不寶此器而拳拳於一物孺子之智婦人之仁嗚呼悲矣釜錡及釡維丨丨丨詩鍑火釡釡大者丨丨白六帖器可羞筐筥錡釡之丨丨丨於王公左人食工丨丨丨釜之嵗周禮溉之鬵誰能烹魚丨丨釡丨詩奪鬵於塗蔡澤於趙見逐入韓之魏遇丨釡丨丨丨懸釡而炊韓子曰智伯圍晉陽城襄子決晉陽水灌之城中丨丨丨丨並史記許子以爨丨丨丨釡甑丨孟丘嫂佯軫許見羹門注魚遊釡中後漢揚州賊率張嬰詣太守張綱降曰茍全性命如丨丨於丨丨魚生釡中范舟字史雲為萊蕪令清貧人歌曰釡中丨丨范萊蕪豫章鐺釡韋堅鑿潭以通漕成帝為升樓臨觀堅豫取小斛舟每舟著某郡以所産物其上若丨丨力士瓷飲器茗丨丨井中破釡五代蕭希甫誣奏韋説與鄰人爭井井有寶貨有司推劾丨丨丨丨而已椎釡盈道段秀實郭希屯邠州士放縱不法擊傷市人丨丨鬲甕盡丨於丨以釡炒麥元宗嘗欲真珠數升耿先生曰易致耳即命小麥數升丨銀丨丨之食頃勻圓成珠南唐近事爨釡不沸丨丨丨丨者有物如豚居之去之也酉陽雜俎魏文帝五熟釜銘丨丨丨在東宫賜鍾繇丨丨丨丨丨曰於赫有魏作漢藩輔厥相鍾繇實幹心膂錡鬵鬲鍑事並見前鐺鐺底飯陳遺至孝母好食丨丨焦丨遺作羣主簿恆褁一囊貯歸後戰敗帶焦飯遂得活時以為純孝之報南史金銀鐺咸通九年同昌公主出降以丨丨為井攔甕丨之屬唐杜陽詩集淑氣含丨丨丨公鼎杜幾時烹互鼎丨丨丨元積青苔寒雕螭刻篆相錯蟠地中嵗久丨丨丨韋應物炊熖視丨丨丨爨鼎柳宗元筆力扛龍文百斛鼎丨丨可獨丨韓巧匠斫丨丨丨山骨刳中事烹煎直柄未當權塞口且吞聲龍頭縮􅌲蠢豖腹脹膨脝外包乾蘚文中有暗浪驚在冷足自安遭焚意彌貞謬當鼎鼐間妄使水火爭秋瓜未落蒂凍芋強抽萌一塊元氣閉細泉幽竇傾不值輸瀉處焉知懷抱清方當紅爐燃益見小器盈睥睨無刃迹團圓類天成遙疑龜負圖出曝曉正晴旁有雙耳穿上為孤髻撑或訝短尾銚又似無足鐺可惜寒食毬擲在路傍坑何當出灰地無計離瓶罌陋質荷斟酌狹中愧提擎豈能煮仙藥但未汚羊羹形模婦女笑度量兒童輕徒爾堅重性不過升合盛旁似廢轂仰側見折軸橫時於蚯蚓竅微作蒼蠅鳴以兹翻溢愆實負任使誠常居顧盻地敢有漏泄情寧依暖熱敝不與寒暄井區區徒自效瑣瑣不足呈回旋但兀兀開合唯鏗鏗全勝瑚璉貴空有口傳名豈比俎豆古不為手所撜磨礲去圭角浸潤著光晶願君莫嘲誚此物方施行世德調丨丨丨金鼎孟郊菽水賢丨丨丨五鼎坡鼐當鼎鼐繆丨丨丨間詳見前行鼎鼐食家丨丨丨韓調和新丨丨鼎鼐丨杜釡駝峰出紫丨之丨丨翠釡杜麗人行鐺無足鐺又似丨丨丨韓詳見前銼冷疏煙土銼丨丨丨杜聞斛斯未歸銚或訝短尾丨丨丨丨銚韓詳見前要知無腳銅腥鐵澀不宜泉愛此蒼然深且寬蟹眼翻波湯已作龍頭拒火柄猶寒薑新鹽少茶初熟水漬雲蒸鮮未乾自古函牛多折足丨丨丨丨是輕安蘇子瞻次韻周穜惠石銚甑附甗器用旨歸甑所以炊飯之具古者甑實二釜厚半寸唇寸底七穿甗其無底者字從瓦瓦器陶者為之今以木後世之製也其於捧挈尤輕且便事類黃帝造丨丨始丨甑釡古史考陶人為丨丨丨甑二釜厚半寸底九許子爨丨丨以釡甑丨孟炲煤落顔回炊飯於敗屋下有塵墜飯中孔子遙見攫食之及回至孔子曰吾嚮夢先人將祭之回曰不可向丨丨丨丨甑中置之不可棄之則不祥因攫而食之家語竹筒為郭文以丨丨丨甑史本傳甑生塵范丹字史雲為萊蕪令家貧里歌曰丨丨丨范史雲後本傳甑墜地孟敏字叔達客居大原荷丨丨丨不顧而去林宗見而問其意對曰甑已破矣視之何益林宗以此異之本傳任文公留丨丨丨值王莽亂時竒物悉賣唯丨銅甑白樂天炊丨丨丨舟後有小竈女桐甑而丨唐語林自稱曾元建中末獨孤彥客淮泗間佛寺遇青短衣人丨丨丨丨驗之乃甑張續宣室志甗賔媚人賂晉伐齊齊使丨丨丨丨以紀甗注無底曰甗有底曰甑左成二詩集如坐遭炊丨丨甑中丨蒸炊韓古今合璧事類備要外集卷五十二
