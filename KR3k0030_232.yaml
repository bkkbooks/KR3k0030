body:
  text: 古今合璧事類備要别集卷二十六宋謝維新撰花卉門桃花格物叢話花品以少者為貴多者為賤世傳廣陵瓊花京口玊蘂洛陽牡丹皆以少見貴至如桃花何處獨無之不擇地而蕃不待培壅而滋茂漫山填谷容易成林樵童牧子厭觀熟玩何若是之多歟遂使世人鄙賤目為凡品花中之不幸未有甚於此者也然司花之巧不如此而止也令有數品或黃或碧或絳色垂絲者閃爍者龍鱗者餅子者牡丹者水蜜者千葉者凡中求異不可勝數好事者亦必為之刮目事類紫紋漢武帝上林苑有緗桃丨丨桃金城桃霜桃西京雜記巨核漢明帝常山獻丨桃丨其桃霜下花至暑方熟使植園林同前成蹊李將軍恂恂如鄙人口不能出辭及死之日天下知與不知皆為泣涕彼其中心誠信於士大夫諺曰桃花不言下自丨丨此言雖小可以喻大李廣傳滿縣潘嶽為河陽令栽桃李號河陽丨丨花與兒靧面北齊盧士琛妻崔氏有才學春日以桃花和雪丨丨丨丨云取白雪與兒洗面作光恱取紅花與兒洗面作妍華與妃銷恨明皇時禁苑中有千葉桃盛開帝丨丨日夕宴花下帝日不獨萱草忘憂此花亦能丨丨開元遺事與妃助嬌明皇御苑千葉桃帝折一枝插於妃子寶冠曰此花亦能助嬌態同上花相映紅清明日崔護獨遊都城南得居人莊叩門求飲有女子開門以盂水至及來嵗清明護往則門已扄鎖題曰去年今日此門中人靣桃丨丨丨丨人靣不知何處去桃花依舊笑春風後日復往聞哭聲一老父曰子非崔護耶吾女比見桃花詩句絶食而卒崔亦感動大呼曰某在此女遂復生麗情集花盛如霞劉禹錫元和十四年自朗州召至京師贈看花諸君子云紫陌紅塵拂靣來無人不道看花回玄都觀裏桃千樹盡是劉郎去後栽後再遊元都觀絶句併序云余正元二十一年為屯田員外郎來時此觀猶未有花是嵗出牧連州貶湖州司馬居十一年召至京師人人皆言有道士手植仙桃滿觀丨丨丨紅丨遂有前篇以志一時之事旋又出牧今有有四年復為主客郎中重遊元都蕩然無復一株惟兔葵燕麥動搖春風耳因再題二十八字以俟後遊時太和二年三月也詩云百畝中庭半是苔桃花淨盡菜花開種桃道士歸何處前度劉郎今復來文集花爛如錦石曼卿通判海州以山嶺高峻人路不通略無花卉點綴照映使人以泥裹桃仁拋擲於山嶺上一二嵗間丨發滿山丨丨丨繡談圃陶潛桃源記晉太元中武陵人魚為業溪行忘路之逺近忽逢桃花林夾岸數百步中無雜木芳華鮮美落英繽紛漁人甚異之復前行欲窮其林林盡水源便得一山山有小口倣佛若有光便捨舟從口入初極狹才通人復行數十步豁然開敞土地平曠屋舍儼然有良田美池桑竹之屬阡陌交通雞犬相聞其中往來種作男女衣著悉如外人黃髮垂髫並怡然自樂見漁人乃大驚問所從來具答云便要還家為設酒殺雞作食村中聞有此人咸來問訊自云先世避秦時亂率妻子邑人來絶境不復出焉遂與外人間隔問今是何世乃不知有漢及魏晉此人一一為具言所聞皆歎惋餘人各復延至其家皆出酒食停數日辭去此中人語云不足為外人道也既出得其船便扶向路處處志之及郡下詣太守説如此太守即遣人隨其往尋問所志遂迷不復得路南陽劉子驥高尚士也聞之欣然親往未果尋病終後遂無問津者江淹山桃頌惟園有桃惟山有叢丹葩擎露紫葉繞風引霧如電映煙成虹伊春之秀乃華之宗皮日休桃花賦余嘗慕宋廣平之為相貞姿徑質剛態毅狀疑其鐡腸與石心不解吐婉媚辭然覩其文而有梅花賦清便富艷得南朝徐庾體殊不類其為人也後蘇相公味道得而稱之廣平之名遂振嗚呼夫廣平之才未為是賦則蘇公果暇知其人哉將廣平困於窮厄於躓能強為是也耶日休於文尚矣狀花卉體風物非有所諷輒抑而不發因感廣平之作復為桃花賦其辭曰伊祁氏之作春也有艷外之艷華中之華衆水不得融為桃花厥花伊何其實美多臺𨽻衆芳緣飾陽和開破嫩蕚壓低柔柯其色則不淡不深若素練輕茜玉顔半酡若夫美景妍時春含曉滋密如不幹繁若無枝娩娩婉婉夭夭怡怡或俯者若想或閉者如癡或向者如步或倚者如疲或溫馨而可薰或婑媠而莫持或幽柔而旁午或扯治而倒披或翹矣如望或凝然若思或嫚媟以作態或窈窕而騁姿日將明兮似喜天將慘兮若悲近榆錢兮粧翠靨映楊栁兮顰愁眉輕紅拖裳動則裊香宛若鄭袖初見吳王夜景皎潔閧然秀發又若嫦娥欲奔明月蝶散蜂寂當閨脈脈又若褒姒未聞裂帛或開故斂艷艷春曙又若息媯含情不語或臨金塘或交綺井又若西子浣沙見影玉露厭浥妖紅墜濕又若驪姬將譛而泣或在水濵或臨江浦又若神女見鄭交甫或臨廣筵或當髙會又若韓娥將歌斂態微動輕風婆娑暖紅又若飛燕舞于掌中半霑斜吹或動或止又若文姬將賦而思丰茸旖旎互交遞倚又若麗華侍燕初醉狂風猛雨一陳紅去又若王嬙初隨戎虜滿地春色階前砌側又若戚姬死於鞠域花品之中此花最異以衆為繁以多見鄙自是物情非關春意若氏族之斥素流品秩之卑寒士他目則目他耳則耳或以昵而稱珍或以踈而見貴或有實而花乖或有花而實悴其花可以暢君之心目其實可以充君之口腹匪乎兹花他則碌碌我欲修花品以此花為第一懼俗情之橫議我曰不然為之則已我目吾目我耳吾耳妍蚩於口取舍斷於志豈於草木之獨然信為國兮如此王介甫桃源行望夷宫中鹿為馬秦人半死長城下避世不獨商山翁亦有桃源種桃者一來種桃不計春采花食實枝為薪兒孫生長與世隔知有父子無君臣漁郎放舟迷逺近花間忽見驚相問世上空知古有秦山中豈料今為晉聞道長安吹戰塵春風回首一霑巾重華一去寧復得天下紛紛經幾人韓退之桃源圖行見前集神仙門詩集紅嫩丨入桃花丨杜紅黦嶺桃丨錦丨杜牧發紅蕚山桃丨丨丨謝靈運綴紅糝桃枝丨丨丨韓文公想舊蹊桃隂丨丨丨杜甫迷舊路桃源丨丨丨劉長卿艷陽節丨丨桃李丨杜甫艷陽質偶蒙春風榮生此丨丨丨李白新作花五桃丨丨丨王維始開花小桃知客意春盡丨丨丨杜甫花欲醉桃丨色丨丨劉長卿花依舊花在舞樓空年來丨丨紅許渾葉婆娑桃生丨丨丨枝葉四向多張籍花輕薄丨丨桃花逐水流杜甫涓涓叢敷水小橋東丨丨照露丨溫飛卿短短花丨丨桃丨臨水岸杜甫錦重重剪綃裁丨一丨丨白樂天紅斑斑桃花點地丨丨丨髙適華陽觀裏丨丨丨丨仙桃發白樂天濯錦江邉江陽縣裏雖無數丨丨丨丨未滿園杜甫黃師塔前丨丨丨丨江水東春光懶困傍微風桃花一簇開無主可愛深紅映淺紅杜甫百葉雙桃丨丨丨丨晚更紅臨忩映竹見玲瓏應知侍史歸天上故伴仙郎宿禁中韓昌黎一樹夭桃東風漸急夕陽斜丨丨丨丨數日華為惜紅芳今夜裏不知和月落誰家來鵠飛花交幹初桃麗新彩照地吐其芳枝間留紫燕葉底發輕香丨丨入露井丨丨拂華堂若映忩前栁端疑紅粉粧梁簡文帝間梅遮栁暖觸衣襟漠漠香丨丨丨丨不勝芳數枝艷拂文君酒半里紅欹宋玊墻羅隱紅葩曉態緑蕚丨丨丨丨新風流如陳戰愁人种明逸千蕚春心三月宫桃滿上林一花丨丨費丨丨陶弼笑伴仙郎在處飄紅雨臨忩照夕陽何時清禁裏一丨丨丨丨王梅溪醉伴幽人習習香薰薄薄煙杏遲梅早不同妍山齋盡日無鶯蝶只與幽人伴醉眠种明逸鶴林神女上苑夭桃自作行劉郎去後幾回芳厭從年少追新賞間對宫花識舊香欲贈佳人非泛洧好紉幽佩與沉湘丨丨丨丨無消息為問何由返帝鄉東坡蘂宫姊妹施朱施粉色俱好傾國傾城艷不同疑是丨丨雙丨丨一時俱肯嫁東風邵康節盡日馨香野桃無主滿山隈遷客携樽獨自來丨丨丨丨留我醉每春顔色為誰開王元之此事渺茫欲留王母盤中核兼采秦人洞裏薪丨丨丨丨花笑我不如聮賞故園春王梅溪樂府武陵溪瑶草一何碧春入丨丨丨溪上桃花無數花上有黃鸝我欲穿花尋路直入白雲深處浩氣展虹霓秪恐花深處紅露濕人衣我坐白石欹玊枕拂金徽謫仙何處無人伴我白螺杯為靈芝草不為朱唇丹臉長嘯亦何為醉舞下山去明月逐人歸水調歌頭黃山谷元都觀嶺梅香雪飄零盡繁杏枝頭猶未小桃一種妖嬈偏占春工用意微噴丹砂半含朝露粉墻低倚是誰家了女嬌癡怨别空凝睇東風裏上好是佳人半醉近橫波一枝爭媚丨丨丨裏武陵溪空隨流水惆悵如紅雨風不定五更天氣念當年門裏如今陌上灑離人淚水龍吟朝次膺一枝如畫碧桃天上栽和露不是凡花數亂山深處水縈回可惜丨丨丨丨向誰開怕輕寒細雨情何限不道春難管為君沉醉亦何妨只酒醒時候斷人腸虞美人秦少遊亂紅如雨醉漾輕舟信流引到花深處塵緣相誤無計花間住煙水茫茫回首斜陽暮山無數丨丨丨丨不記來時路點綘唇前人李花格物叢話桃李不先不後同時並開世之善評花者言桃則必言李是此花之可愛不遜於桃也然桃之為花妖嬈爛熳獨可以晝而觀而李之淡泊纎穠香雅潔密兼可以夜而盼有非桃之所可得而埒者好事君子每至月夜清爽愛其雪色彌望芳塵襲人輒拚勝賞真一竒也然品類之中今有一種俗號林檎或者以其味之甘而能來衆禽因名之曰來禽花不減於李故亦附見此耳事類成蹊見前桃花下滿縣同上注引緑裳天寶中處士崔元徽東洛有宅元徽入嵩山採木茯苓回宅中蒿萊滿院時春夜風月清爽忽有白衣丨丨丨者曰姓陽一曰陶氏乃命坐月下色皆殊絶滿座芳香襲人遺事宜緑鬢蕭瑀陳士達於龍昌寺看李花相與論李有九標謂香雅細淡潔密宜月夜丨丨丨宜泛酒無異色皆實事承平舊纂釀換骨醪憲宗以鳯李花丨丨丨丨賜裴度敘聞録作飛仙狀沅陵伍貫家李花開一夜奴婢遙見花丨數團如丨丨丨上天去花上露倐作雨數千點花則亡矣樞要録同詠李花元微之白樂天兩不相下一日丨丨丨丨微之先成曰葦綃開萬朵樂天乃服蓋葦綃白而輕一時所尚髙隱外書惟見李花桃李嵗嵗同時並開而退之詩有花不見桃丨丨丨之句殊不可解因晚登碧落堂望隔江桃李桃皆暗而李獨明乃悟其妙蓋玄晝縞夜云誠齋詩序詩集與桃鄰當知露井側復丨夭丨丨隋江揔盤根植丨丨丨瀛渚交幹橫倚天舒華光四海卷葉映三川唐太宗明無月夜自丨丨丨丨強笑欲風天李啇隱作連天花平旦入西園梨花數株若矜夸旁有一株李顔色慘慘似含嗟問之不肯道所以獨繞百匝至日斜忽憶前時經此樹正見芳意初萌芽奈何趂酒不省録不見玉枝攢霜葩泫然為汝下雨淚無由返斾羲和車東風來吹不解顔蒼茫夜氣生相遮氷盤夏薦碧實脆斥去不御慙其花當春天地爭奢華洛陽園苑尤紛拏誰將平地萬堆雪剪刻丨此丨丨丨日光赤色照未好明月暫入都交加夜領張徹投盧同乘雲共至玊皇家長姫香御四羅列縞裙練帨無等差靜濯明粧有所奉顧我未肯置齒牙清寒瑩骨肝膽醒一生思慮無由邪昌黎春餘知幾昨日摘花初見桃今日摘花還見李晴風冷日苦相催丨物所丨丨有丨中年多病壯心衰對酒思歸未及歸不及墻根花與草春來無處不芳菲歐陽集火急來看山莊又報李花穠丨丨丨丨細雨中除却斷腸千樹雪别無春恨訴春風楊誠齋玉樹環堵嘉李繁相倚園林淡泊春齊紈剪衣薄吳紵下機新色與晴光亂香和露氣勻望中皆丨丨丨丨不為貧司馬公白花倒燭江陵城西二月尾花不見桃惟見李風揉雨練雪羞比波濤翻空音無涘君知此處花何似丨丨丨丨天夜明羣雞驚鳴人夜起金烏海底初飛來朱輝散射青霞開迷亂入眼看不得照耀萬樹繁如堆念昔少年著遊燕對花豈曽辭酒杯自從流落幽感集欲去未到先思回秪今四十已如此後日更老誰論哉力携一樽獨就醉不忍虛擲委黃埃昌黎來禽花燈泛鏡調嬌面粉丨丨髙籠纈元稹風舞直疑丨起丨飛去替雲行鄭谷秋花丨丨冬更開夏實冬還結物理信難常人意自為孽梅聖俞露葩積蠧全無葉踈叢有悴莖偶來庭樹下重看丨丨榮前人自種東坡先生未歸時丨丨來禽與青李五年不踏江頭路夢逐東風泛蘋芷東坡誰徙粲粲來禽已著花芳根丨丨向天涯好尋青李相遮映風味應同逸少家不受折來禽花髙丨丨丨滿意清明好時節人問風日不貸春昨暮胭脂今日雪舍東蕪菁滿眼黃胡蝶飛去專斜陽妍媸都無十日事付與梧桐一夜涼陳簡齋樂府碎雲薄丨丨丨向碧玉枝綴萬蕚如將汞粉勻開疑使柏麝薰却雪魄未應若况天賦嬌姿仍綽約當暄風暖日佳處戲蝶遊蜂看著重重繡帟珠箔障穠艷霏霏異香漠漠見説徐妃當年嫁了信任玉鈿零落無言自啼露蕭索夜深侍月上闌干角廣寒宫要與嫦娥素粧一夜相學尉遲杯慢万俟雅言古今合璧事類備要别集卷二十六
