body:
  text: 古今合璧事類備要别集卷四十四宋謝維新撰果門奈子格物總論奈子或白或丹或紫是不一種考之前載或以為重七斤或以為大如升或以為大如頭夏熟固其時矣而或冬熟時亦有不同焉此奈之大槩也事類夏成素奈丨丨文選寒熟太沖嗟其夏成子建悵其丨丨劉孝儀丹白二奈耀丹白之色潘嶽間居賦赤白酒泉有丨奈張掖有丨奈廣志出酒泉嘉奈一蒂十五實或七實丨丨丨晉起居注出涼州白奈丨丨丨野豬澤大如頭孔氏帖上林奈丨丨苑有白丨紫奈緑奈西京雜記玄洲奈謝玄卿遇神仙設丨丨白丨續仙傳白馬奈丨丨寺丨實重七斤至熟時常取之或賜宫人伽藍記王祥守視丨丨後母庭中有奈始著子使祥丨丨晝驅鳥雀夜警蟲鼠時雨忽至祥抱奈至昏黑母見之惻然木傳楊愔不顧丨丨四世同居庭有奈實落於地羣兒咸爭愔獨坐丨丨季父見之曰此兒恬裕有我風三國典略不敢先嘗王僧儒五嵗有饋其父奈者先與僧儒僧儒曰大人未見丨丨丨丨不受本傳不敢輒食宮人轉遺親戚以為竒異得者丨丨丨丨乃厯數家伽藍記共食未久袁本初時有神出河東號度索君兖州蘇氏母病往禱見一布衣髙冠謂度索君曰昔廬山丨丨白奈丨丨已三十年日月易流使人悵然去後度索君曰此南海李少君也神仙傳曹植謝賜表即夕殿中虎賁宣賜臣等冬奈一大奩以奈夏熟今則冬生物以非時為珍恩以絶口為厚詔報白山李涼州來云云詩集貴素質成都丨丨丨酒泉稱白麗紅紫奪夏藻裁芳掩春蕙潘安仁隱孤實纍纍後堂奈落盡風雨枝行樂偶散步倚杖聊縱窺林葉丨丨丨山鳥曽未知物亦以晦存悟兹身世為梅聖俞見奈喜孫清來問豫扶病為爾起豈無山名留獨丨庭丨丨前人蓮實格物總論蓮荷實每一印多至二三十房每房一蒑蒑中薏五月中生噉脆至秋末皮黑菂成可食或可磨以為飯服之多輕身益氣令人強健非凡果也事類鐵槌撾碎馬郁為祕書監張承業以權貴任事與客宴集陳列珍果客無敢先嘗者郁食之必盡承業私戒主者它日郁至惟乾藕蓮子置前而已郁知不可啖鞾中出一丨丨丨丨食之承業大笑為公易之云勿敗吾案後唐夏侯湛賦採淳葩的圓實拆碧皮食素實味甘滋而清美同嘉異乎橙橘詩集緑實丨房含青丨金條垂白璆晉陸筠青實丨房圓丨齊戢戢張藉露房丨冷蓮丨墜粉紅杜氷繭蠶寒丨丨瘦王琪一百圓緑玉蜂房白玉蟬折來帶露復含煙玻璃盆面氷漿底醉嚼新蓮丨丨丨坡千百菂新收丨丨秋蓮丨剝盡紅衣搗玉霜不假參同成氣味跳珠碗裏緑荷香前人甜於蜜蜂不禁人採蜜忙荷花蘂裏作蜂房不知玉蛹丨丨丨又被詩人嚼作霜方成蛹蜂兒來自宛溪中兩翅雖無已是蟲不似荷花窠裏蜜丨丨玉蛹未成蜂擘時須是薏蓮子丨丨丨丨丨並前人食子何棄心採花莫掣葉掣葉傷蓮根丨丨丨丨丨味苦生意存朱謙父拳如小兒指蓮實大如指分甘念母慈共房頭􅋾􅋾更深兄弟思實中有么荷丨丨丨丨丨令我憶衆雛迎門索梨棗蓮心正自苦食苦何能甘甘餐恐臘毒素食則懷慙蓮生淤泥中不與泥同調食蓮誰不甘知味良獨少五家雙井塘十里秋風香安得同袍子歸製芙蓉裳山谷稜如大馬蹄蓮房前後熟共噉不須齊肉嫩山蜂子丨丨丨丨丨尚蓮餘蘂在深映亂荷低脆美如新採近根猶帶泥溫公藕格物總論藕荷根一曰蔤乃莖下白蒻在泥中者中有七孔凡數節每節盈尺徑二寸許臂相似肉白其間有絲七八月間搬泥取之味清甘而脆食之無查滓者為佳可解暑渴也事類王母進西丨丨丨千年碧藕拾遺記女子詠有碧衣丨丨丨詩云藕隱玲瓏玉樹萱録詩集秋藕折丨丨丨絲輕謝眺春藕香茵陳丨丨丨杜牽作縷藕絲丨丨丨隋殷黃冷比霜太華峯頭玉井蓮開花十丈藕如船丨丨雪丨甘比蜜一片入口沉痾痊我欲求之不憚逺青壁無路難夤緣安得長梯上摘實下種七澤根株連韓退之不汚著自是天姿丨丨丨水深泥濁奈君何宋景文空自纒緑房翠子暗相失紅藕白絲丨丨丨陶弼氷房好他年過食新城藕枕藉船中載親友今年却到經行處獨坐昏煙對舞栁甘酸向口無所適牢落盤飱與樽酒丨丨玉節謾自丨欲御還休涕垂手曽參宦學居常近陽城離別初不久人間此願兩未能西風落日空回首王文公玉節栽萬項金沙裏誰將丨丨丨絲應鮫乞與津是蚌分來盤貯氷猶結刀侵雪易摧防風骨外折混沌竅中開月寺僧家鉢風亭酒客杯胸中秋氣入牙底雨聲回自愧塵泥賤得蒙樽爼陪與君消酷暑瓜李莫相猜陶弼清泉浴春湖栁色黃宿藕凍猶僵翻沼龍蛇動撑船牙角長丨丨丨泥滓粲齒碎氷霜莫使新梢盡炎風翠蓋涼穎瀕七星羅平生氷雪姿丨丨丨心胸豈無有絲毫上裨天子聰而不自薦達胡為乎泥中沉痾正無賴安得君從容其子亦可憐風味如乃翁胡致隆菱實格物總論菱菱也一名芰生水中葉浮出水上莖有刺花黃白色數種或四角或三角或紫苞或青苞紫苞者為勝肉皆白生噉甘脆八九月收之熟蒸多食亦能飽人也事類屈到嗜芰丨丨丨丨有疾召宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之曰夫子不以私欲干國之典也國語厲叔食菱杜丨丨事莒公自以為不見知居海上夏丨丨冬食橡栗吕春秋勸民益蓄龔遂為渤海太守丨丨丨丨果實菱芡漢本傳緣路采給梁魚𢎞為湘東王鎮西司馬述職西上道中乏食丨丨丨菱作飯丨所部梁書凶年為蔬巨野大於常菱淮漢以南丨丨以菱丨丨廣志乏食作飲見上注詩集軟角紫菱生丨丨庾信寒刺採菱丨丨上杜水果剝丨丨丨菱芡前人水葉鮮濁水菱葉肥清丨丨丨丨儲光羲擕觴薦丨丨丨芰夜經過醉踏大隄徑應歌劉夢得隔沼連丨丨丨香芰杜朵頤進丨丨丨芰實栁紫角利菱翻丨丨丨韓青角多菱池如鏡淨無波白點花稀丨丨丨時唱一聲新水調瞞人道是採菱歌白樂天引蔓爭角青菱丨丨空丨丨張俞懷珠韞玉幸自江湖可避人丨丨丨丨冷無塵何須底死露頭角荇葉荷花老此身楊誠齋白璧紅裳雞頭吾弟藕吾兄頭角嶄然也不爭丨丨中藏煙水晦丨丨左袒雪花明一生子木非知已千載靈均是主盟每到炎官張火傘西山未當聖之清楊廷秀食菱芡實格物總論芡雞頭也南楚謂之雞頭北燕謂之䓈淮徐泗之間謂之芡葉似荷而大葉上戲衄如沸貼水而平莖與苞皆有芒刺苞恰如雞頭內著子如指頭大不下三四十顆圓而色褐有殼其間肉白如米熟而食之可飽也本草一名鴈頭又名鴈啄䓈青刺黃事類嗜芡孫楚論屈建云加籩之品菱芡存焉楚多陂塘蓮芡所生父自嗜之而抑按宰祝既毁就養旡方之禮又失奉死如生之義奪乎素欲建何忍焉本傳蓄芡見前菱類注詩集鴻頭排丨丨丨刺芡韓水果剝丨丨丨菱芡杜池散盤平丨丨芡丨韓風拆觜丨能丨芡丨韓珠走盤剝芡丨丨丨山谷珠論斗明丨丨丨煮雞頭剖蚌煮丨丨丨雞頭並同上剖蚌明千頭丨丨丨珠熟前人絳幘雞吳雞閫罷丨丨碎海蚌扶出真珠明梅聖俞青毛蝟水晶冷浸碧玉叢琉璃湧出丨丨丨何人採得離波瀾擘破顆顆生光寒王岩叟剖膏液芡葉初生皺如縠南風吹開輪脫輻紫苞青刺攢蝟毛水面放花波底熟森然赤手初莫近誰料明珠藏滿腹丨開丨丨尚糢糊大盎磨聲風雨速清泉活火曽未久滿堂坐客分升掬紛然咀噍惟恐遲勢若羣雛方脫粟東都每憶會靈沼南國陂塘種無足東遊塵土未應嫌此物秋來日常蓄穎瀕飽珠璣龍宫失曉惱江妃也養鳴雞報早輝要啄稻粱無半粒只教滿頷丨丨丨楊誠齋剖蚌得珠六月京師著雨多夜夜南風吹芡觜疑祥池鎖會靈園僕射荒陂安可擬爭先園客採新苞丨丨丨丨從海底都城百物貴新鮮厥價難酬與珠比金盤磊落何所薦滑臺潑醅如玉醴自慙竊食萬錢厨萬口飄浮嗟病齒却思年少在江湖野艇高歌菱荇裏香新美全手自摘玉潔沙磨軟還美一瓢固不羡五鼎萬事適情為可喜何時遂買頴東田歸去結茅臨野水文忠公襞雞傾琲江妃有訣煮真珠菰飯牛酥軟不如手丨丨顒金五色盤丨驪頷丨千珠夜光明月供朝嚼水府靈宫恐夕虛好與藍田餐玉法編歸辟榖赤松書楊誠齋古今合璧事類備要别集卷四十四
