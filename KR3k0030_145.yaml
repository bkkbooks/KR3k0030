交陳公輔初筮仕職教吳中朱􅌤方丨丨當官者奴事之公丨丨丨之􅌤滋不悅託權要以其壻周審言代而移公會稽言行録樂語辭不為鄒浩字至全調揚州穎昌府教授吕公著范純仁為守獨加禮重純仁嘗撰丨丨丨丨丨純仁曰翰林學士亦作此浩曰翰林學士則可祭酒司業則不可純仁謝國史薦為徐州教陳師道字無已少好詩吕居仁作江西宗派圖以無已為第二或以為高師一著其古文則學曽子固嘗賦六一堂詩有向來一辦香敬為曾南豐之句竒之元祐中丨於朝丨丨丨丨授東都事略召為監直講王堯臣字伯庸晏殊留守南京薦其才為府學教授丨丨國子丨丨丨同上著文諭子弟節孝徐先生積時為楚州教授先生嘗患鄉飲之禮世久不見率郡守舉行其儀閭巷鄉老皆使與飲又丨丨勸丨丨丨室家是日士民在泮者蓋千人矣言行録升堂訓諸生節孝徐先生為楚州教授一日丨丨丨丨丨曰諸君欲為君子而使勞己之力費己之財如此而不為猶云可也不勞己之力不費己之財何不為君子鄉人賤之父母患之如此而不為猶云可也父母欲之鄉人榮之何不為君子同上在職官之上崇寧四年令教授承務郎以上在本州僉判上選人丨丨丨丨丨當國列姓名公任臨安府學教授孝宗皇帝寤寐英賢陳文恭公丨丨丨公丨丨以進旋賜對深合上意趙鞏撰施大資師㸃行狀四方聞風而至中第邵安簡公亢守鄭薦其賢請為州學教授丨丨之士蓋有丨丨丨丨者踵門授經無虛席時上方嚮儒近臣言公經行宜居首善之地有旨延和殿賜除校書兼國子直講楊龜山撰曾肇行狀所至學者從之孔武仲字常甫為揚州教授又為信州推官兼教授丨丨丨丨丨丨同上韓愈進學解國子先生晨入太學招諸生立館下誨之曰業精於勤荒于嬉行成于思毁于隨方今聖賢相逢治具畢張拔去凶邪登崇俊良占小善者率以録名一藝者無不庸爬羅剔抉刮垢磨光蓋有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公言未既有笑于列者曰先生欺余哉弟子事先生於兹有年矣先生口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鉤其𤣥貪多務得細大不捐焚膏油以繼晷常兀兀以窮年先生之業可謂勤矣抵排異端攘斥佛老補苴罅漏張皇幽眇尋墜緒之茫茫獨旁搜而遠紹障百川而東之回狂瀾於既倒先生之於儒可謂有勞矣沈浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈贅牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷大史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣少始知學勇於敢為長通於方左右具宜先生之為人可謂成矣然而公不見信於人私不見助於友跋前躓後動輒得咎暫為御史遂竄南夷三年博士冗不見治命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼飢頭童齒豁竟死何禆不知慮此而反教人為先生曰吁子來前夫大木為杗細木為桶榑櫨侏儒椳闑居揳各得其宜施以成宜者匠氏之工也玉扎丹砂赤箭青芝牛溲馬勃敗鼓之皮俱牧並蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑校短量長惟器是適者宰相之方也昔者孟軻好辨孔道以明輒環天下卒老于行荀卿守正大論是𢎞逃讒於楚廢死蘭陵是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇於世何如也今先生學雖功而不繇其統言雖多而不要其中文雖竒而不濟於用行雖修而不顯於衆猶且月費俸錢歲靡廪粟子不知耕婦不知織乘馬從徒安坐而食踵常途之促促窺陳編以盜竊然而聖主不加誅宰臣不見斥茲非其幸歟動而得謗名亦隨之投間置散乃分之宜若夫商財賄之有亡計班資之崇庳忘已量之所稱指前人之瑕疵是所謂詰匠氏之不以􅍻為楹而訾醫師以昌陽引年欲進其稀苓也柳子厚上韋中立書辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者雖嘗好言論為文章甚不自是也不意吾子自京師來蠻夷間乃幸見取僕自十固無取假令有取亦不敢為人師為衆人師且不敢况敢為吾子師乎孟子稱人之患在好為人師由魏晉氏以下人益不事師今之世不聞有師有輒譁笑之以為狂人獨韓愈奮不顧流俗犯笑侮收後學作師說因抗顔而為師世果羣怪聚罵指目牽引而增為言詞愈以是得狂名居長安炊不暇熟又挈挈而東如是者數矣屈子賦曰邑犬羣吠吠所怪也僕往聞庸蜀之南恆雨少日日出則犬吠豫以為過言前六七年僕來南二年冬幸大雪踰嶺被南越中數州數州之犬皆蒼黃吠噬狂走者纍日至無雪乃已然後始信前所聞者今韓愈既自以為蜀之日而吾子又欲使吾為越之雪不以病乎非獨見病亦以病吾子然雪與日豈有過哉顧吠者犬耳度今天下不吠者幾人而誰敢衒怪於羣目以召閙取怒乎僕自謫過以來益少志慮居南中九年增腳氣病漸不喜閙豈可使呶呶者早暮咈吾耳騷吾心則固僵仆煩憒愈不可過矣平居望外遭齒舌不少獨缺為人師耳抑又聞之古者重冠禮將以責成人之道是聖人所尤用心者也數百年來人不復行近有孫昌𦙍者獨發憤行之既成禮明日造朝至外廷薦笏言於卿士曰某子冠畢應之者咸憮然京兆尹鄭叔則怫然曳笏却立曰何預我耶廷中皆大笑天下不以非鄭尹而快孫子何哉獨為所不為也今之命師者大類此唐眉山上任德翁序薛郡任公之教授通義也士之曳長裾服方領抱書束帶俊游於泮宫者數百人英俊豪傑往往輩出有少年書生曰唐某者誦書不甚多屬文不甚工碌碌落落無可稱者一日持一軸畫掉三寸舌草衣麻屨攘袂登門危言高論不顧忌諱公一見而嗟異之再見而禮貌之三見而憐恤之勸戒勤篤教諭欵密處之而不能自安退而咨之於客曰公於我厚矣吾將圖報矣吾欲脅肩諂笑巧言令色以順適其意以是報公可乎客曰不可是小人之報也吾將抱長劒挾七首有惡聲至者以血濺其襟以是報公可乎客曰不可是刺客之報也吾將淬文鋒礪詞鍔庶幾超騰奮躍高飛遠舉於天下使天下之人稱之曰斯人也出於任公之門以是報之可乎客曰唯唯是國士之報也某因書以為序張于湖送吳教授序臨川於江西號士鄉王介甫曽子固李泰伯以文為一代宗主而皆其郡人故居民多業儒録録者出於他州足以長雄故能文者在其鄉里不甚齒録獨素行可考而後貴也吳氏子鎰舉進士登于朝中乙科知舉者嘗欲以冠多士不果則為之延譽一時名聲籍甚分教彬州學舍謂鎰不以文勝蓋見貴於鄉里者古之君子固有獨行自立舉世非之而不悔至貴於鄉里猶未足道鎰也蓋尚友古人益思未見其止者與必試於烈火而後知玉萬物俱流而金石乃止余欲金石鎰也鎰勉之朱文公漳州教授㕔璧記教授之為職其可謂難矣惟自任重而不茍者知之其以為易而無難者則茍道也何也教授也以天子之命教其邦人凡邦之士皆惟教授者是師其必有以率屬化服之使躬問學蹈矩矱出入不悖所聞然後為稱朱文公蘄州教授㕔記豫友李君宗思為蘄州學官日至於學進諸生而教誨之蓋使之潜思乎論語孟氏之書以求理義之要又考諸編年咨治之史以議夫事變之得失日力有程不躐不惰探策而問勤督以時先以使之知所以明善修身之方齊家治國之本而於詞藝之習則後焉而不之急也既又禮其士之賢有德者而與之居凡學之教詔悉使聽焉由是蘄之為士者始知所以為士之事而用其力朱文公福州州學經史閣記今教授常君濬孫始至既日進諸生而告之以古者聖賢教學之意又為之飭㕑饌葺齊館以寧其居然後謹其出入之防嚴其課試之法朝夕其間訓誘不倦於是學者競勸始知常君之為吾師而常君之視諸生亦閔閔焉唯恐其不自勉進於學詩集儒冠可堪親老須三釜文著丨丨忍一羞陳后山送趙散詩酒錢廣文到官舍繫馬堂階下醉即騎馬歸頗遭官長罵才名三十年坐客寒無氊近有蘇司業時時與丨丨杜甫戲簡鄭廣文絳紗百函無力致諸公誰說著今承學校貶頗訝名字錯宿桑豈無戀得冶不敢躍師儒要好手老大良非腳戛盡識羮空抽窮知繭薄豈惟嘲孝先終恐同有若丨丨諒無有首蓿聊可嚼唐子西除鳳州教作詩自寬槐隂北門塵上滿衣襟廣文直舍官丨丨山谷詩職教翼翼魯泮宫國士媺無雙行且丨丨化儒風成一邦謝元逸寄洪駒父詩獨冷諸公衮衮登臺省廣文先生官丨丨甲第紛紛厭梁肉廣文先生飯不足杜甫醉時歌難隱豹三年泮水振洙風俯接諸生屢改容嶺霧困時丨丨丨巖雲有便得從龍唐子西送蘇教授赴闕詩長如丘宛丘先生丨丨丨宛丘學舍小如舟常時低頭誦經史忽然缺伸屋打頭斜風吹帷雨注瓦先生不愧旁人羞東坡戲陳州教授子由詩屋廬深短日送簷􅴘杵急冷官無事丨丨丨東坡詩雪月苦先生堂前丨丨丨弟子讀書喧兩廡推門入室書縱橫蠟紙燈籠愰雲毋東坡夜過舒堯夫戲作頭低氣不屈勸農冠蓋閙如雲送老虀鹽甘似密門前萬事不掛眼丨雖長丨丨丨丨東坡戲陳教子由詩雜說為爬梳代北諸生漸狂簡床頭丨丨丨丨丨東坡送蔣䕫赴代州學官詩依舊廣文貧先生丨丨丨丨丨東坡次韻趙明叔回顧廣文寒丨丨丨丨丨莫忘雞黍約益公詩端居廣文舍丨丨丨丨丨山谷詩君勿嘲廣文同上講道出新貫側聞頓夫子丨丨丨丨丨東坡賡頓教授見寄春夢猶橫經夜談空說劍丨丨丨丨丨東坡送家安國教授詩杏壇風似魯人物今誰似此郎今居嚴近贊垂裳未將事業先諸老且把文章變一方今日丨丨丨丨丨向來鐵硯志如桑湖山吳芾和池州陳教授韻采芹搖水碧開明後學日升東千里文風一旦雄池上丨丨丨丨丨帳中摛藻映紗紅吳芾錢廣文采芹亭詩慚愧當年戾止人多士欣逢樂育辰一時席上盡懷珍將攀丹桂廣寒裏先采香芹泮水濱味道固應甘若薺絺章還更艷如春扶持風教師儒力丨丨丨丨丨丨丨同上詩小儒不嘆廣文寒但願斯民均暖律丨丨丨丨丨丨丨益公詩泮宫先生非俗儒丨丨丨丨丨丨丨東坡詩兩宫不辦一丘費陳后山兩為學官自以俸薄有八月十詩丨丨丨丨丨丨丨正集作山費簡齊詩注不日經筵重坐席丨丨丨丨丨丨丨暫時黌舍冷無氊楊誠齊送金元度教授古今合璧事類備要後集卷七十六
