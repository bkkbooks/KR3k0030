body:
  text: 古今合璧事類備要後集卷七十六宋謝維新撰郡官門通判歷代沿革秦置郡丞以佐守在邊為長史掌兵馬漢因之於定國條州大小為設吏員治中别駕諸郡從事秩六百石晉因之而省郡丞宋梁以下如之至隋改别駕治中為長史司馬煬帝罷之而置郡贊治後又改為丞位在通守下至唐而郡丞廢矣武德元年改丞為别駕十年改雍州别駕曰長史髙宗即位改别駕皆為長史别駕以皇族為之開元始通用庶姓以二都督刺史之職通典分紀天寶八年諸郡始廢别駕下郡置長史一員上元二年諸郡始置别駕别駕一人從四品百官志德宗時復省元和長慶之際兩河用兵禆將有功者稱東宫王府官久次當進及受代於京師者常數十人訴宰相以求官文宗申宰相韋處厚建議復置兩輔六雄十望十緊州别駕同上國朝藝祖懲五代藩鎮之弊乾德初下湖南始置諸州通判命刑部郎中賈玼等充建隆四年詔知府公事並須長史通判簽議連書方許行下時大郡置兩員西京南京天雄成德益杭并智荆南潭廣秦定等州餘置一員州不及萬户不置正刺史以上及諸司使副知州者雖小郡亦特置天聖三年中書門下言新授號州團練使田敏知隰州自來防團刺史赴本任及知州無同判處權置同判候差朝臣及內職知州即行省罷掌倅二郡政與長史均禮凡兵民錢榖户口賦役獄訟聽斷之事可否裁決與守通簽所部官有善不及職事修廢得刺舉以聞四朝志逮至景德宋興三十四年户口寖息解州以滿萬户置通判自是諸郡多滿萬户矣宣和二年詔諸州茶鹽香礬並委通判此事據續㑹要但通判掌常平水利免役等錢續㑹要既不載而中興以後通判掌經制總制錢㑹要亦不載當考建炎初諸州通州二員减一員紹興五年以後旋行申請添置中興㑹要事類黃綬郡丞秦官也應劭曰景帝置郡丞秩六百石丨丨前百官志泥軾黃霸為刺史詔賜車蓋高一丈别駕車緹油屏丨於丨前以章有德聾丞前黃霸為穎川太守長史許丞老病丨督郵白欲逐之霸曰許丨廉吏雖老尚能拜起迎送頗重聽何傷且善助之幸無失賢者意從事習鑿齒史才不常桓溫深器之年未三十用為荆州治中别駕謝箋曰不遇明公荆州從事焉耳世說别乘别駕從事史一人從刺史行部别乘一乘傳車故謂之别駕漢制題輿後漢周璟為荆河州辟陳蕃為别駕蕃不就景丨駕丨曰陳仲子坐不復更辟蕃起視職又陳子昻為鄭資州讓官表題輿佐嶽無展驥之能雄飛後漢趙溫為京兆郡丞嘆曰大夫當丨丨安能雌伏遂棄官去後官至三公展驥蜀龎統以從事守耒陽令不治免官魯肅遺先主書曰龎士元非百里之才使處治中别駕之任始當丨其丨足耳乃以為治中投傳陳蕃丨丨而去速步顧球時為揚州别駕顧榮謂球曰卿丨丨君孝超卿矣顧和字君孝顧和本傳半刺庾亮答郭豫書云别駕舊與刺史别乘同宣王化於萬里其任居刺史之半屏星孔恂字巨卿為别駕别駕車舊有丨丨如刺史車刺史因怒欲去之恂曰徹去屏星毁國舊儀别駕可去屏星不可去乃止皂衣郡丞視通直一梁冠丨丨銅印黃綬秩六百石晉職官志别榻孔休源為晉安王長史休源纍佐名藩王深相倚仗常於齊中丨施一丨云此是孔長史坐人莫預焉同上處士晉桓中溫之弟也為刺史丨丨劉麟之為厚長史麟之不肯屈親往迎禮甚英儒管寧辟文云州民管誕燕雀之賤棲朝桐之華别駕者明使君之羽翼宜得丨丨監州梁侯景二藩丨丨有職高選行部方題别駕輿贊郡符白集惠政唐黃敦實遷洛州長史甚有丨丨曰政在養民義須存恤政績張仁願中宗時檢校洛州長史時都城穀貴盜竊甚衆仁願一切皆獲杖殺之積尸府門遠近震懾高宗時賈敦頤為洛州刺史亦有丨丨與仁願皆為一時之最故時人語曰洛州前賈後張可敵京兆三王箳篁自江州乘丨丨送艛艓驛船迎白居易集端寮宜膺受命之寵復踐丨丨之列劉豐商州長史制又常集早題坐於端寮端佐大邦丨丨職源上佐别駕長史司馬通謂之丨丨膱源治中韓退之為州丨丨副政唐以堂吏朱儉廉為華州别駕給事中蕭倣駁曰别駕古為治中從事與刺史别乘同宣教化任居刺史之半豈宜以人吏兼丨丨之名續通典佐州刺史有故及闕本道使不得差攝但令上丨知丨事大厯十二年制贊元功以丨丨丨國語居半刺丨丨丨之任白帖關掌郡張步攝州事李臯字子簡為溫州長史無幾丨行丨丨歲歉有官粟數十萬斛臯欲行賑救掾吏乞候上旨臯曰夫人日不再食當死安暇稟君命若殺我一身活人數千命利莫大焉於是開倉盡散之以擅貸之罪飛章自劾上嘉之分紀委腹心袁紹領冀州以審配為别駕一丨丨丨并總幕府忠烈慷慨有不可犯之節為股肱晉王基薦劉毅於公府曰毅方正亮直往日僑仕平陽丨郡丨丨正色立朝舉綱引目朱紫有分類要歌海沂晉王祥為徐州别駕以股肱之忠糾合義衆州境獲寧人丨曰丨丨之康實賴王祥邦國不空别駕之功紀德碑姚崇為揚州長史政條簡肅人為丨丨於丨千里駒顧和字君孝族叔榮雅重之曰此吾家丨丨丨興吾宗者此子也公孝始為别駕遷尚書令又唐宗室榮歷嶽州别駕人遺以金拒而不納武后曰吾家千里駒改名千里荆楚材羅含字君章桓溫臨州别駕溫常集僚屬問羅生何如人時有答者曰可謂丨丨之丨有能名隋趙軌别本作張軌為齊州别駕丨丨丨在州四年考績最殿詔徴入朝父老揮涕隨逐曰公清如水請酌一杯水奉餞軌受而飲之參政事半刺上佐得與二千石丨校丨丨短長利病者也今以名郡藉其相助杜牧行馬迥制囚宦者蘇良嗣戮鱷患陳文惠堯佐通判潮州潮之惡溪有鱷魚食人公命捕得以文告而丨之丨丨屏息言行録太守之副丨王之倅車注倅乃副車今以通判為倅者周禮謂丨丨丨丨太守自辟武帝詔州郡佐吏自别駕長史以下皆刺史丨丨丨丨通典處議當法黃霸為人明察內敏習文法為丞丨丨於丨丨太守甚重之岸幘嘯詠晉謝奕字元奕桓溫辟為安西司馬奕在溫座丨丨丨丨曰我方外司馬也通典清論終日冀州刺史裴徵召管輅相見丨丨丨丨不覺疲倦天時大熱移床在亭前樹下自是汲引輅為别駕擢拜擇日崔神慶則天時丨丨并州長史因曰并州朕之枌榆又有軍馬北日簡擇無如卿者前後長史皆從尚書為之以其委重所以授卿也則天為按行圖丨丨而遣持版答拜刺史六條曰州别駕治中見刺史丨丨拜刺史丨丨職林伐鼓窮歡王翰徙池州别駕日與才士豪俠飲酒游畋丨丨丨丨開倉賑給張須陀為齊郡丞屬歲飢將丨丨丨丨官屬咸曰待詔敇不可擅與須陀曰吾若以此獲罪死無所恨先開而後上狀帝知之而不責隋書開廪賑民王恂出許州長史嵗旱時假刺史丨丨丨丨即自劾元宗赦之璽書褒美孔昌寓字廣成貞觀中對策高第歷魏州司馬治狀帝為不置刺史為政三年丨丨丨丨緋魚賞功唐德宗命盧峴為渭州别駕知州事賜丨丨袋賞有功也忠肅公亮晉書唐彬檄為治中别駕丨丨丨丨正救違闕盡規誨以納諫不顯言以彰主當朝正色焉嚴明憚伏魏元忠檢校洛州長史治號丨丨張易之家奴暴橫甚元忠笞殺之權豪丨丨所至廉介皇甫無逸徙益州大都督府長史丨丨輒閉閣不通賓客左右無敢出入者所須皆希易他境嘗按部宿民家燈炷盡主人將續進無逸抽佩刀斷帶為炷其丨丨如此然過自思謹上表疏讀數十猶懼未審使者上道進省再三乃得遣為政仁恕陸象先為益州大都督府長史劍南按察使丨丨尚司馬韋抱真諫曰公當峻朴罰以示威不然民慢且無畏答曰政在治之而已必刑罰以立威乎卒不從而蜀化督厲風俗髙士廉進益州大都督府長史蜀人畏鬼而惡疾雖父母病皆委去望舍投餌哺之昆弟不相假財士廉為設條教辨告丨丨丨丨翕然為變又引諸生講授經藝學校復興汶江乍灌田瀕水者千金民相侵冒士廉附故渠引旁出以廣溉道人以富饒破碎姦猾王志愔出為揚州長史所至丨丨丨丨令行禁止境內肅然承上率下郡邑之間丨丨丨丨者州長史也白居易制政嚴下畏張嘉貞歷并州長史丨以丨辨吏丨丨之奏事京師元宗善其政數慰勞資秩不卑軍部長史丨丨丨丨白居易張嘉泰延州長史制歲月即遷日比上佐或一二丨或三五丨丨丨曽不論以課最盧懷謹陳時政每戰輒勝張守圭徙幽州長史契丹奚連年使邊牙官可突千胡有謀者前長史趙含章薛楚玉等不能制守圭至丨丨丨丨虜遂大敗帝喜詔有司告太廟引咎自撻蘇長史歷陜州長史邑里犯法不能禁乃丨丨丨丨人笑其不情止雪反風王暖為并州大都督府長史丨丨丨丨單身襆被蘇環轉為揚州大都督府長史丨丨丨丨自將老幼出迎裴懷古為并州大都督長史吏民懷愛召為左羽林大將未至官還為并州人皆攜扶丨丨丨丨為公呵禦蕭得堊斥播州司馬道三峽方迫畏不暝若有人謂曰公無恐豫丨丨丨丨得聖謁白帝祠見帝類向所睹異之製詩贈行賀知章因病求還鄉拜其子曽為㑹稽郡司馬令侍養御丨丨以丨丨文思益深柳宗元貶永州司馬自放山澤固其堙厄感鬱一寓諸文久而丨丨丨丨悉補别駕元和後朱紫淆并韋處厚乃置六雄十望等丨丨丨丨由是流品澄别皆為司馬裴懷古杜如晦張柬之陸象先姚崇賈敦頤蘇環魏元忠張嘉正並為長史楊綰李泌韋安石李元紘白居易柳子厚丨丨丨丨題坐之任常集通倅之官丨丨丨丨宋廣平集賜查道敇才優佐郡職源通理方州丨丨丨丨宋廣平集賜廣州通判敇有公輔量吕䖍有佩刀王相之以為必登三公可服此刀䖍語别駕王祥曰茍非其人刀或有害卿丨丨丨丨故以相與祥死之日以刀授弟有台輔量趙昌言喜推奬後進掌漕湖外時李沆通判澶州昌言謂其丨丨丨之丨表聞於朝真宗實録有宰相器富文忠公弼從王曽辟通判鄆州趙元昊反公上疏陳八事議者以為丨丨丨之丨召還蘇軾撰行狀卒與並相吕許公通判濱州人稱其材王文正公謂王沂公曰此人異日與舍人對秉鈞軸沂公曰何以得之曰以其奏請得之如不稅農器數事丨丨沂公丨丨言行録除卿知院太宗朝前河南府通判劉昌言賜對稱㫖五月丨少丨六月丨樞密丨事分珠不買潭州一巨賈私藏蚌胎為關吏所搜太守而下輕其估悉自售焉唐質肅公時以言事謫潭倅丨丨獄發奏方入仁宗謂近侍曰唐介必丨肯丨案具奏覆覽之果然同上水晶燈籠劉隨待制為成都通判嚴明通達人謂之丨丨丨丨談苑軍府畏肅王濟通判鎮州牧守多勳舊武臣倨貴陵下濟未嘗撓掘戎卒頗恣暴不法夜或焚民居為盜濟部壯士數十潜往窺伺果得數輩并所盜物即斬之馳奏其事上大喜都校孫進使酒無賴歐折人齒濟不俟奏杖脊送闕下丨丨丨丨連三詔褒奬焉長編高麗易書蘇文忠公通判杭州高麗入貢使者驕橫發幣於官吏書稱甲子公却之曰丨丨於本朝稱臣而不禀正朔吾安敢受使者丨丨稱熙寧然後受之言行録內侍抗罷劉文安公沆通判舒州州有大獄歷歲不決沆詣治數日而決之是時章獻太后詔修山谷寺資聖浮圖丨丨張懷信督役嚴急州將移疾不敢出沆抗言於朝丨懷信歸仁宗實録吏橫籍黥公通判滑州兵馬司吏王實結宦官丨甚公一日攝行郡事適有訟實者捕置獄丨其家贓萬計杖而丨之詹定庵撰孫昭遠墓志減市木數天聖間建太乙宫及洪福院市木于陜西通判陳州范仲淹言宜罷修寺觀丨定常歲丨丨之丨事雖不行以仲淹為忠九朝通略飢粟價平曾鞏字子固為通判歲丨常平不足仰以賑給而田居野處之人不能皆至城郭前期喻屬縣召富人使自實粟數