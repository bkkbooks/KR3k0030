body:
  text: 古今合璧事類備要外集卷二十四宋謝維新撰刑法門申理刑法總論見前卷獄繫門事類命斬仁軌初陳倉折衝尉魯寧坐事繫獄自恃髙班慢罵陳倉尉劉仁軌仁軓杖殺之州司以聞上怒丨丨之怒猶不解曰何物縣尉敢殺吾折衝命追至長安而訟之仁軌曰魯寧尉之百姓辱臣如此臣實忿而殺之辭色自若魏徵侍側曰陛下知隋之所以亡乎上曰何也徵曰隋末百姓彊而凌官吏如魯寧之比是也上恱擢仁軌為櫟陽丞詔下君集侯君集之破高昌也私取其珍寳將士知之競為盗窃為有司所劾丨丨丨丨等獄中書侍郎岑文本上疏以為高昌昏迷陛下命君集等討而克之不踰旬日並付大理雖君集等自挂網羅恐海内之人疑陛下唯錄其過而遺其功也臣聞命將出師主於克敵雖貪可賞若其敗續雖廉可誅是以漢之李廣利陳湯晉之王濬隋之韓擒虎皆負罪譴人主以其有功咸受封賞黄石公軍勢曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者急趍其利愚者不計其死伏願錄其微勞忘其大過上乃釋之與萬均對有告薛萬均私通高昌婦女者萬均不服内出婦女付大理丨丨丨丨辨魏徵諫曰君使臣以禮臣事君以忠今遣大將軍與亡國婦女對辨帷箔之私實則所得者輕虚則所失者重若秦穆飲盗馬之士楚莊赦絶纓之罪况陛下道高堯舜而曾不三君之逮乎上遽釋之本傳下士貴吏太宗自臨兵以部陳不整命大將軍張士貴杖中郎將等怒其輕丨丨丨丨魏徵諫曰將軍之職為國爪牙使之執杖已非後法況以杖輕下吏乎上亟釋之懼元忠寃魏元忠中宗在東宮為檢校左庶子時二張勢傾朝廷元忠嘗奏曰臣承先帝之顧且受陛下厚思不能徇忠使小人在君側臣之罪也易之等恨怒因武后不豫即共譛元忠與司禮丞高戩謀挾太子為耐久朋遂下制獄詔皇太子相王及宰相引元忠等辨于庭不能决昌宗乃引張説為證説初偽許之至是迫使言狀不應又促之説曰臣不聞也易之等遽曰説與同逆説又曰臣知附易之朝夕可宰相從元忠則族滅今不敢面欺懼元忠之寃后悟其䜛白崔寧寃崔寧為牙將事裴冕冕被謗朝廷疑之遣使者問狀寧部兵耳丨其寃使者以聞縱囚以還李元素為御史東都留守杜亞惡大將令狐運會盗刼輸絹於洛比運適與其下畋近郊亞疑而訊之掠服之亞請斥運詔監察御史楊寧覆驗事皆不讎亞怒劾寧罔上抵罪詔元素馳按亞迎以獄告元素徐察其寃悉丨丨丨丨亞大驚復劾元素失有罪元素還帝已怒元素曰臣以御史按獄知寃不得盡辭是無容復見陛下帝意解即道運寃狀帝感悟曰非卿孰能辨之出獄付外崔琯字從律京兆尹宋中錫為䜛所危宦官切齒時人罕敢辨者琯與大理卿王正雅固請丨丨丨丨與衆治之天下重其賢悉平貸之李方元字景業為江西判官有大獄論死者十餘囚方元刺審其寃丨丨丨丨當不坐死見寃獄宋申錫注詳臨出其寃唐臨持節按獄交州出寃繫三千人累迁大理卿從疑其寃崔丨攝守卭州前刺史有以盗繫獄辭已具從丨丨丨縱不治俄得真盗上狀訴寃穆贊字相明累侍御史陜虢觀察使盧岳妻分貲不及妾子妾訴之中丞盧佋欲重妾辜贊不聽佋與宰相竇參共誣贊受金捕送獄弟賞丨寃丨詔三司覆治無之出為桞州刺史刑耳列寃張説字道濟宇文融恨恚乃與崔隱甫李林甫共劾奏説引術士王慶則夜祠禱解而奏表其閭引僧道岸窺伺時事冒㸔右職帝怒詔乾曜隱甫刑部尚書韋抗即尚書省鞫之發金吾兵圍其第説兄左庶子光詣朝堂丨丨丨丨帝遣高力士徃視見説蓬首垢面席藁家人以瓦器饋脱粟塩疏為自罰憂懼者力士還奏且言説徃納忠於國冇功帝憮然乃停説中書令誅慶則等坐者猶十餘人師旦妖蠱李尚隱其先出趙郡徙貫萬年擢左臺監察御史馮昭泰性摯刻人憚其強嘗誣繫桐廬令李師旦二百餘家為妖蠱有詔御史覆按皆稱病畏縮不肯徃尚隱曰善良方蒙枉不為申可乎因請行果推雪其寃部官盗金袁滋字徳深進詹事府司直丨丨以丨丨下獄滋直其寃執正其罪張鎰字季權一字公度累殿中侍御史乾元初華元令盧樅以公事譙責邑人齊令詵令詵官人也衘之搆摐罪鎰按驗當免官有司承風以死論鎰不直之乃白其母曰今理樅樅免死而鎰坐貶嘿則負官貶則為太夫人憂敢問所安母曰兒無累於道吾所安也遂執正其罪樅得流鎰貶撫州司户參軍密疏申理狄仁傑出為豫州刺史時越王兵敗支黨餘二千人論死仁傑釋其械丨丨曰臣欲有所陳似為逆人丨丨不言且累陛下欽恤意表成復毁自不能定然此皆非元惡詿誤及此有詔悉謫戍邊囚出寧州父老迎勞曰狄使君活汝耶因相與哭碑下囚齋三日乃去至流所亦為立碑上疏申理裴度字中立加中書令李訓之禍宦官肆威以逞凡訓註宗婭賔客悉收逮訊報可慘度丨丨丨丨全活數十姓多所全活趙普為蘇州判官太祖與語竒之會獲盗百餘人將就死普意其有寃啓太祖更訊之所全活者十七八頼以得免錢若水為同州推官時有富民失女奴其父母訟于州鞠于有司獄吏挾怨劾富民父子數人共殺弃之水中罪皆應死若水疑之宻使人訪求女奴得之乃引示其父母皆泣曰是也富民父子丨丨丨丨郡太守欲薦之若水固辭曰朝廷以此為若水功當置獄吏於何地太守歎服東坡吐舌王介甫與蘇子瞻初無隙呂惠卿忌子瞻才高輒問之中丞李定亦介甫客不服母䘮子瞻以為不孝作詩詆之定以為恨劾子瞻作詩謗訕遂下御史獄張安道致仕在南京上書救之欲附南京逓府官不敢受乃令其子恕持至登聞鼓院投進恕徘徊不敢投久之丨丨出獄其後東坡見其副本因丨丨色動久之人問其故坡不答其後子由亦見之云宜吾兄之吐舌也此事正得張恕力歐陽坐降趙槩除知制誥會歐陽脩甥嫁為脩從子晟妻與人淫乱事覺語連及脩時脩為龍圖閣直學士河北都轉運使疾韓范者皆欲反致脩罪云與甥亂上怒獄急羣臣无敢言㮣上書言脩以文學為近臣不可以閨房曖昧之事輕加汙衊所惜者朝廷大體爾書奏上不悦人皆為之懼㮣亦澹然如平日久之脩終坐降槩亦求去獄空空虛周成王時囹圄丨丨四十餘年衰息漢文帝時獄訟丨丨頴川獄前漢黄霸為丨丨百姓嚮化八年丨無重囚不其獄後漢董恢為丨丨令丨連年無囚全椒獄劉平為丨丨令有恩惠百姓懷感刺史行縣獄無繫囚獄櫓生蒿齊天保初大赦郡無一囚率羣吏拜詔而已獄内丨丨桃木蓬蒿並滿每旦牙門虚寂無訢訟者謂之神門北宣帝紀囹圄生草隋劉廣為平郷令七年風教大治獄中無繫囚爭訟絶息丨丨皆丨丨庭可張羅大理院獄見前鵲巢其庭注府縣寺獄唐代宗徃仁恕即位五年府縣寺獄無重囚大理獄空紹興間丨丨寺奏丨丨上曰大理寺臨安府在闕下雖未敢謂刑措然獄訟清簡寃抑得伸亦庶幾焉惟是諸路憲臣或不得人則吏強官弱民無所訴深恐此弊未革卿等更宜商量本寺獄空本朝孝宗淳熈五年閏六月大理寺卿吳交如等劄子丨丨見今丨丨欲依故事稱賀詔免上表三院獄空元豐五年四月知開封府王安禮言丨丨丨丨安禮事至輒㫁庭無留訟久繫待辨者一切論决於是以獄空揭諸府門遼使過見歎息稱為異事上曰昔由餘聘秦觀政内史瘳軰從容爼豆以奪其謀者秦有人也安禮留意吏事能駭動外夷於古無愧矣獄以屢空趙抃知䖍州地逺而民好訟人謂公不樂公欣然過家上家而去既至遇吏民簡易嚴而不苛悉召諸縣令告之為令當自任事勿以事諉人茍事辦而民悦吾一無所問令皆喜爭盡力處事為少丨丨丨丨神道碑杜甫南風賦叢棘坼而狴牢輕李庾西都賦吏閣丹筆臺收白簡司刑無鬼哭之庭大理有烏巢之獄云云李白萬墳詞獄戸春而不草獨幽怒而沉迷詩集蟄户驄馬刑章峻蒼鷹獄吏清覆盆徒照日丨丨未驚雷蠶室地幽丨丨閉門靜雀羅開有氣還衝斗無時會鑿坏並駱賓王獄中詩白日囚朝為青春士暮為丨丨丨韓愈赴江陵途中楚地囚悲作丨丨丨何由秦廷哭李太白示息秀才造化悲傷燕臣昔慟哭五月飛秋霜庶女號蒼天震風繫齋堂精神有所感丨丨為丨丨李白古風死囚來歸丨丨四百丨丨獄唐白樂天七徳舞敲榜發姦何况親犴獄丨丨丨丨偷韓愈赴江陵塗中愚暗忘身聖主如天萬物春小臣丨丨自丨丨百年未滿先償債十口無歸更累人是處青山可埋骨他年夜雨獨傷神與君今世為兄弟更結人間未了因東坡獄中寄子由文字為累平生丨丨丨吾丨此去聲名不厭低塞上縱歸他日馬城中不鬬少年雞休官彭澤貧無酒隱凡維摩病有妻堪笑睢陽老從事為余投檄向江西坡出獄庭栢陰陰丨丨丨丨盡掩門烏知有赦閙黄昏漢宮自種三生福楚客還招九死魂縱有鋤犂及田畝已無面目見丘園尺應聖主如堯舜猶許先生作正言坡己未獄中恭聞太皇太后不豫有赦臺葉凄凄柏丨霜丨夜丨丨風雨琅玕月向低夢遶雲山心似鹿魂飛湯火命如雞眼中犀角真吾子身後牛衣媿老妻百歲神遊定何處桐郷知𦵏浙江西坡獄中寄子由古今合璧事類備要外集卷二十四
