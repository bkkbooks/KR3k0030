body:
  text: 古今合璧事類備要後集卷二十九宋謝維新撰六部門禮部尚書祠部侍郎舉郎中貟外郎知貢附歴代㳂革漢成帝置尚書五人其四曰客曹主外國夷狄事光武分六曹吏部曹兼掌齋祀事然則夷狄齋祀皆今禮部職也魏尚書有祠部曹及晉江左有祠部尚書掌廟祧之禮後周置春官卿又有禮部後改禮部為宗伯又春官之屬有典命後改典命為大司禮俄改大司禮復為禮部謂之禮部大夫至隋置禮部尚書唐因之龍朔中改為司禮太常伯光宅中為春官尚書六典通典職林本朝禮部判部事二人以两制及帶職朝官以上充凡禮儀之事悉歸於太常禮院而貢舉之政領於知貢舉本曹但掌制科舉人補奏太廟社齋郎室長掌座都省集議百官謝賀章表諸州申舉祥瑞出納内外牌印之事而兼領貢院焉續㑹要元豊改制職掌如舊凡禮樂有所損益小事則同太常寺大事則集侍從或百官議定以聞若有事於南北郊明堂耤田禘祫太廟薦享景靈宫酌獻陵園及行朝貢慶賀宴樂之禮則承詔舉其儀物職官志前期戒有司辨具即上册寳及封册禮命亦如之凡天下選士具注於籍至三歳貢舉考騐無冐濫乃聽預試凡大禮生辰后妃親王以下所推之恩公主下嫁宗室冠昏䘮𦵏之制及賜旌節章服冠帔旌表孝行之法例皆主行之大祥瑞則朔參官詣閣門表賀餘於歳終條奏其屬有三曰祠部禮典醫政道釋祠廟之事𨽻焉曰主客蕃國朝貢及國信禮物之事𨽻焉曰膳部牲酒膳羞宴設給賜之事𨽻焉尚書主禮樂祭享貢舉之政令而侍郎為之貳郎中貟外即參領之續㑹要神宗正史職官志時雖正名尚書猶未除人職畧元祐六年以梁燾為禮部尚書編年備要建炎三年詔鴻臚寺光禄寺併歸禮部中興㑹要事類秩宗舜曰咨四岳有能典朕三禮僉曰伯夷帝曰俞咨伯汝作丨丨尚書容臺式商容之閭索隠引鄭𤣥云商家禮樂之官知禮容所以禮署稱丨丨史記春官三曰丨丨其屬六一掌邦禮周禮天官又唐光宅中改禮部為丨丨神龍中復故六典宗伯乃立春官丨丨使帥其屬而掌邦禮以佐王和邦國春官又大宗伯之職掌建邦之天神人鬼地示之禮以佐王保邦國同上管二曹後魏孝文留宋弁兼祠部尚書攝七兵事曰國之大事在祀與戎故令卿丨攝丨丨北史授二職唐髙宗謂裴行儉曰卿文武兼資故丨卿以丨丨即日拜禮部尚書兼檢校右衛大將軍有四屬禮部尚書侍郎掌天下禮儀祭享貢舉之政令其屬有四一曰禮部二曰祠部三曰膳部四曰主客凡中外百官之事皆質正焉唐職官志以報讜言唐陳叔逹初建成元吉疾害太宗隂行譖毁髙祖惑其言將有貶責叔逹固諫乃止太宗時拜禮部尚書勞之曰武徳間公有讜言故以報卿召入决事睿宗朝薛稷為禮部尚書以翊賛功毎丨丨宫中與丨丨恩絶羣臣筮得鼎卦李綱字文紀仕隋官不進丨之丨丨丨筮人曰君當為卿輔待易乃如志至唐終禮部尚書並唐書藝如襪線偽蜀韓昭仕為禮部尚書琴棊書筭射法悉皆渉獵李台瑕曰韓八座仕丨丨拆丨丨無一條長北夢𤨏言禮樂之司居丨丨丨丨必資明備白六帖祀郊之典典朕三禮大舜委於姜夷分敕六卿成王任於彤伯建兹歳首實曰春官敦叙九族之親欽若五常之教丨天丨地丨丨舉其宏綱朝日夕月之儀撮其機要張鷟集議功臣配饗豊稷為禮部尚書哲宗升祔丨丨丨丨丨稷以為當用司馬光吕公著或者謂二人得罪於哲宗廟或不可用稷曰止論其有功於時爾如唐五王配享中宗豈非得罪於中宗者哉通略言髙麗市書髙麗貢使請買書籍朝廷以故事盡許之禮部尚書蘇軾言漢東王求諸子太史公書猶不許今可與乎詔曽經買者許依例同上却西蕃貢馬元祐西蕃有貢駿馬汗血者事下禮部軾時為宗伯判其狀云朝廷方却走馬正復汗血亦何所用事遂寝蘇東坡三馬賛序并為宗伯之任昔舜命伯夷典禮后䕫典樂至周丨丨丨丨丨丨今禮部尚書盖其任也南豊擬制上應文昌之位擢登宗伯之曹丨丨丨丨丨丨晏類要牋表類春官是用授汝丨丨古卿丨丨丨丨東坡秩宗其選則髙典禮之於有司非人莫濟丨丨之於省户丨丨丨丨晏類要晦庵與汪尚書書自頃拆號日望登庸尚此留滯不省所謂海内有識之士盖以莫不為明公遲之而熹之愚獨有為明公喜者盖以省闈之取舍觀之則疑明公於天下之義理尚有當講求者而喜其猶有此閒暇之時也自道學不明之乆為士者狃於偷薄浮華之習而詐欺巧偽之姦作焉上之人知厭之雖然欲遂變而復於古一以經行迪之則古道未勝而舊習之姦已紛然出於其間而不可制世之人本樂縱恣而悼繩檢於是乗其隙而力攻之以為古道不可復行因以遂其自恣苟簡之計俗聞已薄為法者又從其薄之日甚一日歳深一歳而古道真若不可行矣云云蘇氏貢舉之議正如此至甚詆東州二先生為矯誕無實不可施諸政事之間則其悖理傷化抑又甚焉而省闈盗用此文者两人明公皆推而寘之衆人之上是明公之意盖不以其説為非也云云况於一人坐廟堂之上而以宰相行之其害又當何如哉明公前者駁正張綱之謚深詆王氏之失識者韙之而今日之取舍乃如此死者有知得無為綱所笑不審明公亦嘗悔之否乎云云則願深考聖賢所𫝊之道非孔子子思孟程之書不列於前晨夜覧觀窮其㫖趣而反諸身以求天理之所在既以自正其心而推之以正君心又推而見於言語政事之間以正天下之心則明公之功名徳業且將與三代王佐比隆而近世所謂名相者其規模盖不足道况蘇氏浮靡機變之術又其毎下者哉詩集踐台斗及乎貞觀初尚書丨丨丨注以王珪拜禮部尚書後以侍郎執政杜甫送王評事禮部侍郎歴代㳂革隋煬帝初置禮部侍郎唐因之龍朔中為司禮少常伯掌䇿試貢舉及齋郎𢎞崇國子生等事舊制考功貟外郎典貢舉開元中李昴為進士李權所詆朝議以考功位輕不足以臨多士次年遂以禮部侍郎掌焉六典通典唐職林我本朝官制因革見前禮部尚書門元豊正名五年四月二十四日除户部侍郎謝景温為禮部侍郎自此始正除尚書闕職畧又續㑹要事類小宗伯丨丨丨之職掌建國之神位周禮又禮部侍郎周之春官丨丨丨也六典少常伯唐龍朔中改為司禮丨丨丨咸亨復舊六典并官制好稱人長唐桞璟字德輝為禮部侍郎為人寛信丨接士丨丨之丨逰其門者他日皆顯於世不阿權近唐王凝為禮部侍郎丨丨丨丨重於宰相韋純為禮部侍郎取士抑浮華先行實甞從容奏曰禮部侍郎丨丨丨丨帝曰侍郎是宰相除安得重曰然為陛下柬宰相者得无重乎帝美其言唐書終是貟吏賀知章遷禮部侍郎兼授學士一日併謝宰臣源侍中謂張説曰賀公今日一時加二榮命然二者孰為美説曰侍郎自皇朝已來為衣冠之華選雖然丨丨具丨之丨學士者懐先王之道為搢紳軌儀藴揚班之詞彩兼㳺夏之文學始可處之旡愧同上美聲盈路韋陟為禮部侍郎曩者主司取與皆以一塲之善登其科目陟先知其所長然後依常式考覆片善无遺丨丨丨丨本𫝊喧訴盈庭恵文太子薨詔禮部選挽郎侍郎賀知章取捨非允為門䕃子弟丨丨丨丨知章於是以梯登墻首出决事時人咸咄之舊唐書父子南省崔挹子湜先是湜為兵部侍郎挹為禮部侍郎丨丨同為丨丨副貳有唐以來未有此事兄弟禮部唐崔氏丨丨六人邠郾鄆凡為丨丨五吏部再並唐書宣宗題堂崔氏居光徳里搆便齋丨丨曰鄆一門孝友可為士族法因丨曰徳星丨後京兆民即其里為徳星社同上常衮入相丨丨自禮部侍郎丨丨時潘炎為舍人引麻因戯之曰留取破麻鞋著及衮視事不浹旬果拜南部新書舍人引麻見上常衮入相注貢士賦柳唐吕謂字君載遷禮部侍郎始中書省有古桞建中末枮死徳宗自梁復還復榮茂人以為瑞桞謂令丨丨丨之帝聞不以為善一云上聞而嘉之唐書裁鍳尤長唐韋陟字殷卿為禮部侍郎於丨丨丨丨本𫝊裁鍳精實稱秩元祀春官舊職舉秀興亷國朝兼領非文儒碩茂丨丨丨丨重於一時者不在此也職類唐制儀曹典禮禮闈丨丨丨郊祀之丨獻賢能之書今小宗伯實兼二事非直清公正者不足以處之白集韋賁之授禮部侍郎制宗伯掌禮貳丨丨之丨丨典諸侯之貢士職類唐制典禮考文可使丨丨以和神人可使丨丨以第俊秀白集韋貫之制和神舉秀豈惟神人之和兼舉孝秀之目職類唐制直言時政國朝劉正夫字徳初除禮部侍郎彗見詔求丨丨正夫條奏丨丨十餘事大略重名器輕賦歛戢于戈節賜予選人材惜民力鍳祖宗成憲謹持盈守成之道徽宗嘉納之東都事畧抗聲和議禮部侍郎曽開知婺州先是秦檜語和議曰此事大係安危開於坐中抗聲曰丞相今日不當説安危止合論存亡爾檜矍然驚其言遂命出守中興係年錄乞定樂章洪适權禮部侍郎上初講郊祀公丨進胙徳壽宫及改丨丨丨人謂禮與時得之周益公集張守正人中丞丨丨謚文靖除禮部侍郎力辭不拜上命吕頥浩召至政事堂諭以丨丨不宜輕去朝廷守乃受命廣問老成紹興間吕丨丨為禮部侍郎上謂大臣曰廣問丨丨不沽激徃時薦之者多並係年録羽翼為朕張魏公復除知興元府已登舟除禮部侍郎召對便殿上慰勞宣諭曰朕將有為正欲一飛冲天而無丨丨者卿丨丨留意當專任用朱晦庵集文柄屬公程尚書大昌公權禮部侍郎一時丨丨舉丨丨楊大法撰行狀秩亞春官南豊擬制韓愈除崔羣制見前户部侍郎類禮部郎中附貟外郎歴代㳂革魏晉宋齊梁陳後魏北齊有儀曹郎掌吉凶禮制皆禮部郎中之職也隋禮部曹置侍郎一人焬帝除侍字文改儀曹唐因之稱郎中龍朔二年改司禮大夫六典注本朝官制見尚書門元豊正名初除劉贄王子韶職畧大朝㑹則上書奏藩國貢物凡慶賀若謝則郎中貟外郎分撰表文四朝志建炎三年詔禮部郎官一員兼主客事類下大夫禮部郎中周春官丨丨丨之職也六典眞儀曹孔易為齊尚書儀曹郎屢箴闕禮多見信納上謂王儉曰孔易丨所謂丨丨也南史齊書解朝儀梁武帝問徐勉求一有學藝丨丨丨者為尚書儀曹郎勉曰孔休源識見清通詳練故事帝即日除儀曹郎毎建議訪問前事休源即以所誦記隨機㫁决曽无凝滯吏部任昉常謂之孔獨誦梁書委大儀劉杳博綜羣書為儀曹郎僕射徐勉以臺閣大儀專委杳焉同上南宫舍人舊説禮部郎中掌省中文翰謂之丨丨丨丨唐職林司禮大夫龍朔改丨丨丨丨咸亨復舊掌禮樂學校儀式制度衣冠符印表䟽冊命祥瑞鋪設䘮𦵏贈賻及宮人等通典注辭章自名唐薛稷字嗣道為禮部郎中以丨丨丨丨論議無屈李翺為禮部郎中性峭鯁丨丨丨所丨見宰相李逄吉面斥其過失並唐書奏議詳雅在禮部丨丨丨丨省中服其能韓文王宏中墓碑掌五禮儀掌佐尚書侍郎舉其儀制而辨其名數丨凢丨丨之丨二百五十有二六典賜筆禮闈丨丨丨丨進席天臺之屬張賈制裁書南閣唐大詔令常衮制儀曹實藉丨丨之任丨丨文雄郎吏之選必資時秀唐制仙闥咸推容䑓是則丨丨丨丨彭景直制謂名表郎國朝禮部元豊官制行丨之丨丨丨官別有印曰名表郎印石林燕語湏知制誥百日内丨丨丨丨故王元之與宋給事詩湏知百日掌絲綸春明退朝録止尊號表劉敞字原父氏子將親大祫于太廟丞相欲加上尊號公以禮部兼領名表丞相請撰表公説止之遂上䟽章凡四天子得公奏曰我意本謂當如此遂㫁章表不受公於是忤時相言行録撰賜衣表舊大朝㑹等慶賀及春秋謝賜衣請上聽政之類宰相率百官奉表皆禮部郎官之職大觀以後朝廷慶賀事多非常例郎官不能得其意蔡京乃命中書舍人雜為之既又不欲有所去取於是間參取首尾或摘其一二聯次比成之當時謂之集句表禮部所丨惟春秋两謝丨丨丨而已石林燕語非他曹比神宗與宰執議更官制至禮部郎中曰此南宫舍人丨丨丨丨可除劉摯王鞏聞見録多此途出爼豆之議著為典常牋奏之文𫝊為口實秩清任重時儒所貴不次之用丨丨丨丨曲阜行上官均制士林髙選南宫舍人丨丨丨丨同上儀曹郎選丨丨丨丨參訂禮文兼職牋奏非富儒學未易處也曲阜除鄧忠臣制宗伯之屬太㣲之星郎位甚近丨丨丨丨禮為司清公是謝表春官之屬晏公類要職類貟外郎清廟之器唐李珏為殿中侍御史宰相韋處厚曰丨丨丨丨豈擊摶才乎除禮部貟外郎名徳之首崔澹舉止秀峙謂玉而冠者為禮部貟外郎當時士夫以流品相尚推丨丨者為丨丨並唐書文章稱首劉禹錫桞文序子厚以丨丨丨丨入為尚曹禮部貟外郎文章卓偉桞子厚丨丨丨丨精緻唐職林納印圖祥貟外郎㕔有大石諸州府丨發卜皆於石上碎之又丨冩丨瑞亦貟外郎所掌令狐楚詩曰移石㡬囘敲廢印開箱何處送新圗唐舊説受制撰儀唐韋叔夏授禮部貟外郎則天將享明堂丨丨與當時大儒丨定丨注衆咸推服之唐書十年方轉劉禹錫為禮部貟外郎方與日者從容叚文昌入謁既去日者謂禹錫曰貟外湏待丨丨之後此客入相丨丨正曹郎耳自是禹鍚失意連受外官十餘年文昌入相方除禹錫禮部郎中録累記少年超取僕年二十三甚丨丨丨丨裏行得禮部貟外郎超取顯美桞宗元與蕭俛書清妙儀曹官有秩丨而選丨者其丨丨貟外郎之謂乎白集行張元夫制翔集禁陛怒飛青𡨕丨丨丨丨由兹去者十八九焉同上講議制度國朝禮部郎中貟外郎凡丨丨丨丨損益儀物則審覆有司所上之狀以次諮决而質於尚書省續㑹要分撰表文大朝㑹則上書奏藩國貢物凡慶賀若謝則郎中貟外郎丨丨丨丨四朝志不草金牋吳懋晉陵人為禮部貟外郎金立張邦昌法當郎草牋奏公度不可拒將引䋲自裁有幸非常者儳曰僕請為之由是獲免而王時雍用事坐政事堂公𤼵憤罵時雍曰反賊吾不能擊汝如叚秀實邪時雍面頸𤼵赤不能對公因以疾求罷不聽遂稱疾篤於家中興係年録注汪藻撰墓誌稱誦名表汪大猷字仲嘉除禮部貟外郎南宫名表一出士林丨丨之楼攻媿集論明堂合祭王居正字剛中紹興元年除禮部貟外郎上將祀丨丨有司疑於嚴父之文議不時定公立議請丨丨天地奉太祖太宗配詔禮部議是撫州守臣言甘露降圖以聞公請郤其圖勿泊䑓臣繼劾守奪其州吕東萊文集言海瀆祭典李文簡公燾正除禮部貟外郎中興祭典未備丘鎮海瀆先農先蠶風雨雷師九祠以酒脯代牲牢雨晹失節郡國水灾殆以此詔復舊周平園集詩集轉中儀仙歩徐徐整羽衣小儀澄澹丨丨丨樺飄紅燼趨朝路蘭縱清香宿省時彩筆煙霞供不足綸闈鸞鳳訝來遲自怜孤宦誰相念禱祝空吟一首詩鄭谷寄同年禮部趙郎中敲廢印見貟外郎事類納印圖祥注掌絲綸見事類湏知制誥注及脩綆惟此禮部公東坡也寒泉甃舊井滳此乆羸瓶召還丨丨丨山谷祠部郎中附貟外郎歴代㳂革東晉而下逮於北齊皆有祠部郎後周春官府有典祠中大夫隋有祠部郎唐改為郎中龍朔中改為司禋大夫後復故唐職林本朝皆祠部判司事一人以无職事朝官充凡祠祀享祭𨽻太常禮院而天文刻漏歸於司天監夲司但掌祠祭畫日休假令受諸州僧尼道士女官童行之籍給剃度受戒文牒而已元豊改制郎中貟外郎始實行本司事續㑹要初除趙令鑠職畧參掌天下典祀國忌廟諱凡本司所治之事月奏祠祭畫日及休假令節即神祠封爵號則覆太常所定以上尚書省應宫觀寺院僧道置籍書其名額歳較醫官功過而賞罰之神宗正史職官志建炎三年詔祠部郎官一貟兼膳部郎中事類言明堂徐邈為祠部上言南北郊及丨丨丨宗廟毁建言皆有證魏志立太廟晉改丨丨丨摯虞為祠部郎職其事職類應禮樂許允之字之竒才丨丨丨擢為祠部郎同上酌故實後魏裴修兼祠部曹毎有疑議修撰斟丨咸有丨丨北史損禮儀周捨博學精義理梁武帝召拜祠部郎丨益丨丨多自捨出梁書有史才謝沈為祠部郎丨丨丨職畧傳禮學賀徳基世丨丨丨三世為祠部郎南史呼為氷㕔祠部丨丨丨去聲丨言其清且冷也因話録不博都門唐省中語後行祠屯丨丨中行丨丨同上執奏僧道陳古靈先生㐮字述古判尚書祠部時譯經僧法護遺表度十僧趙㮣奏列子廟三年度道士㐮皆丨丨不行神宗實録祠曹所領祭以事神人道之極也丨丨丨丨躰莫重焉南豊除趙令鑠制貟外郎當官正色唐崔沔為祠部貟外郎為人舒緩訥於造次丨丨丨丨未嘗撓沮本𫝊好賢樂善執事丨丨丨丨孜孜以薦進良士明白是非為己任方今天下一人而已韓退之與祠部陸貟外薦士書祠典清選富弼子紹庭除祠部貟外郎制云惟爾先正相予祖宗爾少長義方習以成性詩不云乎惟其有之是以似之朕亦何愛典祠之清選而命汝陟焉以勸夫孝於親者徃其欽哉東都事畧不阿秦檜胡寕文定之子遷祠部貟外郎與秦檜議論不合時熺為樞宻檜問兒子近除如何寕曰外議以為必不襲蔡京之迹也檜怒以言章罷紹興正論喜擢少藴葉夢得字少藴為祠部貟外郎召對上喜因問在祠部㡬時對行及二年上曰如是乆乎朕即當不次擢卿後數日遂果丨丨丨長編論宗廟薦新趙彦若遷祠部貟外郎先是丨丨丨丨丨仲秋用茭萌不經易以蒲白彦若曰蒲春始生可食秋則過時不可以薦乃據引經傳改從春薦國史韓愈與祠部陸貟外書執事好賢樂善孜孜以薦進良士明白是非為己任方今天下一人而已愈之獲幸於左右其足迹接於門墻之間陞乎堂而望乎室者亦將一年于今矣念慮所及輙欲不自疑外竭其愚而道其志况在執事之所孜孜為己任者得不少助而張之乎誠不自識其言之可采與否其事則小人之事君子盡心之道也天下之事不可遽數又執事之志或有待而為未敢一一言也今但言其最近而切者爾執事之與司貢士者相知誠深矣彼之所望於執事執事之所以待乎彼者可謂至而无間疑矣彼之職在乎得人執事之志在乎進賢如得其人而授之所謂两得其求順乎其必從也執事之知人其亦博矣夫子之言曰舉爾所知然則愈之知者亦可言已文章之尤者有侯喜者侯雲長者喜之家在開元中衣冠而朝者兄弟五六人及喜之父仕不逹棄官而歸喜率兄弟操耒耜而耕於野地薄而賦多不足以養其親則以其耕之暇讀書而為文以干於有位者而取正焉喜之文章學西京而為也舉進士十五六年矣雲長之文執事所自知其為人淳重方實可任以事其文與喜相上下有劉述古者其文長於為詩文麗而思深當今舉於禮部者其詩无與為比而又工於應主司之試其為人温良誠信无邪佞詐妄之心强志而婉容和平而有立其趨事静以敏著美名而負屈稱者其日已乆矣有韋羣玉京兆之從子其文有可取者其進而未止者也其為人賢而有才志剛而氣和樂於薦賢為善其在家无子弟之過居京兆之側遇事輙爭不從其令而從其義求子弟之賢而能業其家者羣玉是也凡此四子皆可以當執事首薦而極論者主司疑焉則以辨之問焉則以告之未知焉則殷勤而語之期乎有成而後止可也有沈杞者張苰者尉遲汾者李紳者張後餘者李翊者或文或行皆出羣之才也凡此數子與之足以收人望得士實主司疑焉則與觧之問焉則以對之廣求焉則以告之可也徃者陸相公司貢士考文章甚詳愈時亦幸在得中而未知陸之得人也其後一二年所與及第者皆赫然有聲原其所以亦申梁補闕肅王郎中礎佐之梁舉八人无有失者其餘則王皆與謀焉陸相之考文章甚詳也待梁與王如此不疑也梁與王舉人如此之當也至今以為美談自後主司不能信人人亦无足信者故蔑之无聞今執事之與司貢士者有相信之資謀行之道惜乎其不可失也方今在朝廷者多以逰燕娛樂為事獨執事渺然高舉有深思長慮為國家樹根本之道宜乎小子之以此言聞於左右也詩集懐祗仰承宗廟丨丨䖍晉祠部嵇含䑓中宴㑹隨詔又丨急丨朝天去陳後山送鄭祠部知貢舉歴代㳂革唐初貢舉省試主之考功開元間考功貟外郎李昻為舉人詆訶帝以貟外郎望輕遂移貢舉於禮部以侍郎主之禮部選士自此始由是與吏部侍郎同其貢士有姻舊悉試考功謂之别頭後齊抗為相奏罷之唐職林本朝禮部貢院以畢朝官一貟主判若遣官知貢舉即主判官罷舉事復别差官主判㑹要事類貢部唐王起字舉之前後四典丨丨精鍳狥公所選皆當代詞藝之士有名於時人皆賞其公也本𫝊禮闈賈餗為中書舍人大和四年權禮部貢舉五年牓出後正拜禮部侍郎凡典丨丨三歳所選士七十五人後多至公卿位職官分紀抑浮華唐高郢為禮部侍郎應進士舉者多務明逰馳逐聲名郢性剛正尤疾其風凡掌貢部三歳進幽獨丨丨丨冗濫之風翕然一變進眞實唐衛次公知禮部貢舉斥浮華丨丨丨不為時力所揺先行實韋賢之為禮部侍郎凡二年所選士夫抑浮華丨丨丨由是趨競者稍息並同上擢孤進髙鍇為禮部侍郎掌貢部選擢雖多頗得實才抑豪華丨丨丨至今稱誦之取名士唐李宗閔字損之典貢舉所丨多知丨丨若唐冲薛庠袁都等世謂之玉筍並見本傳擢名士唐崔郾轉禮部侍郎凡两嵗貢士平心閲試所丨者无非丨丨為輔名卿者十人職官分紀考覆並合唐文宗時禮部侍郎魏扶奏曰臣今嵗放三十三人其封彦卿崔瑑鄭延等三人實有詞藝為時所稱皆以其父兄見居要地不敢令中選詔令翰林學士承㫖韋琮等重丨丨勑曰彦卿等所試文字丨丨程度可放及第唐㑹要考覈無遺唐韋陟為禮部侍郎陟好援後軰尤鍳于文雖詞人後生靡不諳練曩者主司取予皆以一埸之善登其秩目不盡其方陟先責舊文丨丨片善丨丨美聲盈路本𫝊相繼公相權徳輿身不由科第掌貢舉三年門生丨丨為丨丨因話録相躡逹官權德輿考試士踵丨丨為宰相丨丨韓文權徳輿神道碑十年掌貢崔湜弱冠登科丨丨丨丨舉翰林盛事三年知舉見上相繼公相注分两都試奚至為禮部侍郎是嵗至以嵗歉舉人赴省者少奏請丨丨丨丨從之两都試舉人自至始也唐選舉志奏覆夜試唐竇正固遷禮部尚書知貢舉舊制進士夜試以三燭為限長慶二年改令晝試正固以短晷難成文不盡意丨丨丨丨擇士平允時論稱之唐書父子知舉丨丨丨丨三家髙鍇子相于邵子允躬崔郾子瑶唯崔氏相去只二十年南部新書兄弟雙與張楚金年二十七與兄越石同舉所司以丨丨不可两收將罷越石楚金進曰以順則越石長以才則楚金不如請俱退李勣時在中書難曰國家貢舉本求才行何妨兄弟遂俱進士擢第唐書髙湜抵㡌唐丨丨字澄之為禮部侍郎時士多由權要干請湜不能裁既而丨丨于地曰吾决以至公取之得譴固吾分分紀韋陟剖璞凡執文章權衡以揣量多士披沙剖璞由我而顯者落落然居多推是風鍳移于大治則範鎔之内無非祥金劉禹錫為韋陟神道碑稱好脚跡李逄吉知貢舉膀未放而入相禮部王尚書播代放牓及第人就中書見座主時丨丨丨丨門生南部新書謂𫝊衣鉢范質年二十舉進士是時翰林學士和凝權知貢舉凝平生以宰輔自期登第之嵗姓名在十三及司貢部覧質文卷知非常人也泊放牓亦以質為第十三人埸屋間丨之丨丨丨言若禪宗之相付授也其後凝既登庸不十年間質亦大拜焉故當時詩曰登庸衣鉢亦相𫝊五代史吾得二俊國朝陳晉公恕字仲言領春官以王沂公為舉首嵗中㧞劉子儀於常選自云丨丨丨丨名世才也言行録放出一頭蘇文忠公軾字子瞻歐陽文忠公考試禮部進士梅聖俞時與其事得公論刑賞以示文忠文忠驚喜疑門下曽子固所為乃第二復以春秋對義居第一以書謝諸公文忠見之以書語聖俞曰老夫當避此人丨丨丨丨地三典春闈真宗朝趙安仁丨丨丨丨選士平允兩知貢舉太宗朝賈黄中丨丨丨丨並同上两制宗匠慶歴二年富弼上言南省主文者四五人皆丨丨丨丨㑹要一時文柄程大昌權禮部侍郎丨丨丨丨舉屬公其成就人才不可計凡今老師宿儒多公門生也楊大法撰行狀愛惜士類洪文安公遵字景嚴知禮部貢舉邏卒挾内侍王允脩勢侵辱士人公引蘇軾奏故事以聞一士賦擅埸又有對䇿剴切皆傍犯召諱公為取㫖許降等奏名前二人林光朝樓鑰也其丨丨丨丨如此言行録變復文體歐陽文忠公脩權知貢舉時進士以詭異相髙文體大壞公所取率以詞義近古為貴比以嶮恠知名者黜去殆盡牓出怨謗紛然乆之乃服然文章自是變而復古同上徃司貢部慶歴二年詔曰國家申命邇臣丨丨丨丨仁宗實録遂領宗師丨丨丨丨之任并為儒者之榮東坡知舉差四貟元祐六年丨丨丨丨丨詔從范百禄之請也詩集冬烘主司頭惱太丨丨詩話唐人下第嘲主司春永萬蟻戰酣丨晝丨古詩鎻閉試院梧桐葉落井亭隂丨丨朱門丨丨深嘗是昔作年辛苦地不將今日負初心唐人知貢舉有謾説戰場李才叔為東坡客東坡知貢舉才叔下第東坡作詩贈之云平生丨丨古丨丨過眼空迷日五色李直方詩話古今合璧事類備要後集卷二十九
