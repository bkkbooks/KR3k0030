與數會誰能窮百年形影浪自苦便欲此地安㣲躬白雲南來入我望又起歸興隨征鴻郭功父一宿金山頂微茫水國分僧歸夜船月龍出曉堂雲樹影中流見鐘聲兩岸聞因悲在朝市終日醉醺醺張祜萬古波心寺金山名日新天多剰得月地少不生塵櫓過妨僧夢濤驚濺佛身誰言張處士題後更無人孫魴天末海雲横北固煙中莎岸似西興已無船舫猶聞笛逺有樓臺祇見燈山月入松金破碎江風吹水雪崩騰飄然欲作乗桴計一到扶桑恨未能王介甫世上蓬萊第㡬洲長雲漠漠鳥飛愁海山亂㸃當軒出江水中分繞檻流天逺樓臺横北固夜深燈火見揚州迴船却望金陵月獨倚牙旗坐浪頭楊公濟遊金山迴作寶慶寺黄葉前朝寺無僧寒殿開池晴龜出曝松莫鵲飛迴古井碑横草隂廊畫雜苔禪宫亦銷歇塵世轉堪悲司空曙詩廬山寺白茅為屋宇編荆數處階墀石疊成東谷笑言西谷響下方雲雨上方晴䑕驚樵客縁青壁猿戲山僧撼紫檉别有一條投澗水竹筒斜引入茶鐺馬戴道林寺石門迥接蒼梧野愁色隂深二妃寡廣殿崔嵬萬壑間長廊詰曲千岩下静聴林飛念佛鳥細看壁畫䭾經馬暖日斜明螮蝀梁濕煙散羃鴛鴦瓦北方部落檀香塑西國文書貝葉寫壊欄迸竹醉好題窄路垂藤困堪把沈裴筆力鬬雄壯宋杜詞源兩風雅他方居士來施齋彼岸上人投結夏悲我未離擾擾徒勸我休學悠悠者何時得與劉遺民同入東林白蓮社韋蟾王山之南麓山殊道林二壑争盤紆寺門髙開洞庭野殿脚挿入赤沙湖五月寒風冷佛骨六時天樂朝香爐地靈步步雪山草僧寶人人滄海珠塔刼宫牆壯麗敵香㕑松道清涼俱蓮花交響共命鳥金榜雙迴三足烏方丈涉海費時節𤣥圃尋河知有無老杜題嶽麓道林二寺靈巖寺十萬人家天塹東管絃臺榭滿東風功歸范蠡五湖上國破西施一笑中香徑自開蘭葉細屧廊猶響月華空尊前有暇但懐占欲飲一盃誰與同劉禹錫詩破山寺清晨入古寺初日照髙林竹徑通幽處禪房花木深山光悦鳥性潭影空人心萬籟此都寂但餘鍾磬音常建題禪院詩孤山寺樓臺聚碧岑一徑入湖心不雨山常潤無雲水自隂㫁橋荒蘚合空院落花深猶憶西忩月鐘聲在北林張祜詩落星寺岩岩康俗先生廬其下宫庭水所都北辰九闗隔雲雨南極一星在江湖北風捲沙過夜忩枕底鯨波撼蓬島个中即是地上仙但使心閒自難老星宫遊空何時落着地亦化為寶坊詩人晝吟出入坐醉客夜愕江撼床蜜房各自開户牖蟻宂或夢為侯王不知青雲梯㡬級更借瘐藤尋上方落星開士深結屋龍閣老翁來賦詩小雨藏山客坐久長江接天㠶到遲宴寢清香與世隔畫圖妙絶無人知蜂房各自開户牖處處煑茶藤一枝並黄魯直詩梵王家海邊樓閣丨丨丨一水横橋一路斜宻竹㺯風敲璧玉怪松摩日起龍蛇岩猿遶檻偷秋果石鼎當忩煮露芽中有髙僧倦迎送白頭無事老煙霞城山給孤園樹宻當山徑江深隔寺門霏霏雲氣重閃閃浪花翻不復知天大空餘見佛尊時應清盥罷隨喜丨丨丨老杜望兠率寺寒塘路松竹閒僧老雲煙曉日和丨丨歸丨轉清磬隔微波唐李嘉祜詩野僧家澗竹欲萌煙蕨菜不妨括餅丨丨丨従今相遇㡬日事更試南忩榖雨茶江西竹林西身寂心成道花閒鳥自啼細泉松徑裏返照丨丨丨皇甫曽詩苔逕裏隔忩棲白鳥似與鏡湖隣月照何年樹花逢㡬世人岸莎青有路丨丨净無塵願得依容止僧中老此身盧綸下堂鐘寒雨初收草木濃群鴉飛散丨丨丨長廊無事僧歸院盡日門前獨看松李渉寒殿磬薄暮緣西峽停橈一訪僧鷺巢横臥栁猿飲倒垂藤水曲岩千疊雲重樹百層山風丨丨丨溪雨夜船燈許渾立香臺五度金蓮出世來法堂重向石堂開水邊猿鳥尋前侣石上松杉認舊栽黄印使君精曉供紫雲禪客丨丨丨人傳朱頂千年鶴昨夜遼東柱上回城山石泉寺垂講磬紅簷青瓦院西隅隔㫁塵寰一事無兎弄半光來佛案月收斜脚入茶爐簾丨丨丨秋聲逺門掩吟燈夜影孤見説虎溪流水急不勞禪侣酒重沽城山動金璫夜深殿突兀風丨丨琅丨天黑捫春院地晴棲暗芳老杜鳴夕磬鳴磬夕陽盡卷簾秋氣來名香連竹徑清甃出花臺韓雄捫幽徑不到峯前寺空來渭上村此亭聊可喜幽徑豈辭捫谷映朱闌秀山含古木尊路窮驚石㫁林缺見河奔馬困嘶青草僧留薦晩飡東坡臥明忩古寺長廊院院行雲房處處稱幽情明忩浄榻無人到卧聴春禽百舌聲仝上滄海日宋之問遊靈隠夜吟云鷲嶺鬰苕蕘龍宫隠寂寥久不能續有老僧坐禪曰何不道樓觀丨丨丨門對浙江潮桂子月中落天杳雲外飄捫蘿登塔逺刳木引泉遙云云遲明僧不見人以為駱賔王也詩注闍梨鐘王播少孤貧客揚州木蘭院隨僧齋粥僧厭苦之飯後擊鐘其後播鎮揚州訪舊題詩處有曰上堂已了各西東慙愧丨丨飯後丨後二紀播出鎮是邦向所題已碧紗籠之矣乃續云三十年來塵撲面如今始得碧紗籠小説披剃事類落髮金陵牛頭山法融禪師少通經史歎曰儒道世典非究竟法般若正觀出世舟航遂投師丨丨入牛頭山有白鳥䘖花之異傳燈録覆以慚愧之衣落其煩惱之髪類要投簪丨丨落髪妄命受業云云出廬山記劉浄翁捨俗人勸丨丨丨丨丨出家山谷云浄翁在家出家無俗可捨戲作頌云浄名龎老總垂鬚君幸元無免破除心若出家身若住何須㬰覔剃頭書又云掉却甜桃摘酸梨山谷金色女出家丨丨丨白文殊聴我出家非以自剃髪為丨丨若能發大精進為除衆生一切煩惱是名出家非以阿蘭若處獨坐思惟名出家能於汶生死流轉中以定惠方便化令解脱是名出家鄔波三鉢那比丘既落髮披衣梵云室羅末尼唐言末寂減度受戒已名丨丨丨丨丨唐言近要覧恩命事類乗雕輦趙石勒以天竺僧圖澄預言成敗頗有驗敬事之石虎即位事之尤謹衣以綾錦丨以丨丨通鑑賜紫衣則天朝僧法朗等賜紫袈裟僧之賜紫自天后始事物紀原黒衣宰相宋文帝以惠琳善談論與議朝廷大事遂參權要賔客輻凑孔顗曰遂有丨丨丨丨可謂冠屨失所矣通鑑宋文紀翻經學士隋文帝以沙門彦崇為丨丨館丨丨命僧以官自此始事物紀原贈官賜諡唐代宗大厯十年興善寺胡僧不空卒贈開府儀同三司司空諡曰大辨正廣智不空三藏和尚碑文圎寂事類茶毗或云耶維或云闍毗又云闍維正梵云闍臯多此言焚燒要覧闍維天竺第九祖入滅衆以香油楫檀丨丨直體丨丨即茶毗同上逝川寂寂靈塔滔滔丨丨恒沙刼壊智月常貟李華禆滅火薪盡火滅歸真息假梁簡文帝云無聲三昧古靈臨遷化告衆曰汝等諸人還識丨丨丨丨否衆曰不識師曰汝等静聴師儼然而寂不可久留南齊善惠大師降于婺州傳宣慈家納劉氏女名妙志生子普建普成二人梁武帝時會天竺僧達麽號嵩頭陀謂大士曰我與汝毗婆尸佛所發誓今兜率宫衣鉢見在何日當還因命臨水觀其影見大士圓光寶盖大士笑時有法師聞法悟解言我師彌勒應身耳大士呵之後於松山頂雙林寺行感七佛相隨釋迦引前維摩接後及嵩頭陀入滅大士懸知曰嵩公兜率待我決丨丨丨丨也謂子弟曰我従第四天來為度汝等故大品經云有菩薩従兜率天來諸根猛利疾與般若相應即吾日也吾去焚户上建浮屠以彌勒佛像處其下傳燈録達麽攜履二十八祖丨丨自天竺國泛海見梁帝不契潛上嵩山少林寺面壁九年端居而逝𦵏熊耳山魏宋雲奉使西域迴過師子葱嶺見手丨隻丨翩翩而逝雲問師曰西天去又謂雲曰汝王已厭世間聞之茫然别師東邁暨復命即明帝已登遐矣迨孝莊即位宋雲具奏其事帝令起壙惟空棺一隻革履存焉出傳燈錄世尊現足第一祖迦葉丨丨入般涅槃迦葉至雙林樹間悲戀號泣佛於金棺内丨雙丨景徳傳燈録釋迦説偈釋迦佛於二月八日明星出時成佛號天人師住世四十九年將金縷僧迦黎衣博法與摩訶迦葉説無常偈曰諸行無常是生滅法生滅滅已寂滅為樂諸弟子以香薪茶毗之燼後金棺如故高七多羅樹往反空中化火三昧得舍利八斛四斗世尊滅後一千十七年未平中敎至中夏傳燈録阿難説法第二祖丨丨將入滅雪山五百仙人飛空而至阿難為丨丨傳燈録道𤣥居士又居士名藴字道𤣥與石頭希遷為友偈曰有男不昏有女不嫁大家團欒頭共説無生詁女靈照常製竹儷籬賣以供朝夕居士將入滅使靈照視日及午以報靈照遽報曰日蝕居士出户觀次靈照即登父座合掌坐亡居士笑更延七日而化同上鎖骨菩薩僧問風宂如何是佛宂曰金沙灘頭馬郎婦世言觀音化身續延語録延州有婦人甚有姿色少年子悉與狎數嵗而沒𦵏之道左大厯中有胡僧敬禮其墓曰斯乃大慈悲喜俗捨之欲無不徇焉此即丨丨丨丨順緣已盡衆人開墓視其骨鈎結皆如鎖狀遂與起塔馬郎婦事大率類此傳燈錄詩集鎖塵冩留行道影焚却坐禪身塔院闗松雪經房丨隙丨賈島詩埋玉霜顱隠白毫鎖骨丨青丨皆云似達麽隻履還天竺東坡詩古今合璧事類備要前集卷四十九
