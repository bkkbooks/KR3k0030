body:
  text: 古今合璧事類備要前集卷四十九宋謝維新撰釋敎門僧事類三禪沙門有丨坐丨為上輩誦經為中輩助衆為下輩無為集五戒元珪禪師有異人峩冠而至曰我嶽神也稽首乞戒師曰付汝丨丨能不滛乎能不盜乎能不殺乎能不妄乎能不遭酒敗乎曰能師曰如上是為佛戒出傳燈録徳士男曰優婆塞又曰僧又曰丨丨大藏一覧上人行阿耨菩提心是名丨丨出摩訶般若經苾蒭僧曰丨丨本是草名有五義一生不背二冬夏常青三性體柔軟四香氣逺騰五引蔓布條尊勝經又丨丨是西天草名體性柔軟引蔓旁布馨香逺聞能療疼不背日光喻出家人出善覺要覧袈裟梵音迦羅沙曳云不正色令略梵語也本作迦沙至梁葛洪撰字苑字方添衣一名丨丨文名無垢衣又名忍辱鎧又名消瘦衣又名離塵衣字苑釋姓晉道安受業於佛圖澄姓帛氏以師莫過於佛遂以丨為丨中夏沙門稱釋自道安始又道安見習鑿齒自稱彌天釋道安史本傳禪學後漢明帝時佛始入中國當時楚王英最好之然都不曉其説直至晉宋間其敎漸盛然其廣大自勝之説幻妄寂滅之論自齋戒變為義學如逺法師支道林皆義學當時文字亦只是將莊老之説來鋪張如逺法師諸論皆成片盡是老莊意思梁㑹通間達麽入來武帝不曉其説只従事於因果遂去面壁九年只説人心至善即此便是不用辛苦修行達麽一切掃蕩不立文字直指人心又翻了許多窠臼説出丨來又高妙於義丨以為可以直指徑悟而其始者禍福報應之説又足以鉗制愚俗以為資足衣食之計也宋氏語録不二門文殊謂維摩詰曰何等是丨丨法丨維摩詰黙然不應文殊曰善哉乃至無有文字言語是真入丨丨法丨也文選頭陀寺碑注總持門秦少游長老疏語云往開大丨丨丨以繼鑠迦羅眼秦少㳺集達麽衣印初丨丨與佛丨俱來得道傳付以為真丨至大鑒置而不傳傳燈録金剛眼精撫州黄山良匡禪師謂衆曰高山頂頭空蔬飯無可祇待諸道者惟有丨丨丨丨憑助汝發明真心傳燈録破竈和尚嵩山有丨丨丨丨居岳山山有廟甚靈惟安一竈逺近祭祠烹殺物命一日師入廟以杖敲竈三下咄云此竈只是泥瓦合成聖従何來又打三下竈乃墮落須㬰有一人青衣忽然設拜師曰是什麽人云我是竈神久受業報今蒙師説無生法得脱此處生天特來致謝因此號丨丨墮丨丨傳燈録打地和尚忻州丨丨丨丨凡學者致問惟以棒打地而示之一日被僧藏却捧而問師但張其口傳燈録赤髭毗耶佛陀耶舍為人赤髭善解毗婆沙時人號曰丨丨丨丨沙同上白足禪師釋曇如足白於面雖跣涉泥水未嘗沾濕天下咸稱白足和尚魏武帝時有一僧足白名思始號丨丨丨丨雞跖集故劉禹錫送僧云備將迎者皆赤髭白足之侣見本集虎溪法師逺法師居廬阜三十餘年影不出山跡不入俗送客過虎溪輒鳴號昔陶元亮居栗里山南陸修静亦有道之士逺師嘗送此二人與語道合不覺過之因相與大笑今世傳三笑圖鵲巢和尚杭州道林禪師初至秦望山見長松枝葉蟠屈如盖遂棲止其上復有鵲巢其側人目為丨丨丨丨太守白居易入山曰師住處甚危險師曰太守危險尤甚曰弟子位鎮山河何險之有曰心火相交性識不停得非險乎又問佛法大意師曰諸惡莫作衆善奉行白曰三嵗孩兒也解恁麽道師曰三嵗孩兒雖道得八十老人行不得傳燈録布袋和尚丨丨丨丨形材腲腇蹙額皤腹以杖荷一布囊供身之具盡貯囊中入市見物輒乞或醯醢魚葅纔接入口分少許投囊中白鹿和尚問如何是布袋師便放下布袋又問如何是布袋下事師負之而去傳燈録萬迴禪師丨丨師姓張氏初母祈於觀音像而妊迴廻生而愚八九嵗乃能語雖父母亦以豚犬畜之其凡戊役於安西音問隔絶父母遣其問訊一日朝齎所備而往夕返其家父母異之𢎞農扺安西萬餘里以其萬里而迴因號萬迴唐武后嘗賜之錦袍玉帶同上文殊普賢豐干禪師居天台國清寺嘗乗虎入松門衆僧驚駭後於天台寺示滅初閭丘公出牧丹陽忽頭痛醫不能止豐干造之曰貧道自天台來謁使君閭丘且吿之病師乃呪水噴之病立瘥閭丘異之乞一言示此去安危曰到任謁丨丨丨丨曰二菩薩安在師曰國清寺執爨洗器者寒山拾得是也閭丘尋至寺問寒山拾得是何人有僧對曰二人見在㕑下執役閭丘訪之見二人圍爐語笑閭丘不覺致拜二人連聲咄叱寒山執閭丘手笑曰豐干饒舌傳燈録寒山拾得初豐干經行山中道側見一兒可数嵗豐干攜至國清寺付典座曰或人來認可還之名曰拾得後沙門靈熠令去内㕑滌器常日齋畢澄溢食滓寒山即來負之而去寒山者始豐縣西有寒暗二谷以其居寒岩中遂名寒山子以樺皮為冠時來國清寺従拾得取僧殘食菜滓食之閭丘既入禮拜二人自此相攜出松門入寒岩閭丘又隨之二士入岩其石忽然縫合傳燈録慧海修道大珠丨丨禪師或問和尚丨丨如何用功師曰飢來喫飯困來即眠曰一切人總如是同師用功否曰不同他喫飯時不肯喫飯百種須索睡時不肯睡千般計較所以不同也傳燈録藥山論禪道吾山圎智禪師藥山問何處來曰遊山來藥曰速道將來曰山上烏兒白如雪澗底遊魚忙不徹藥山曰智不到處切忌道着師見雲岩不安曰離此殻漏子向什麽處相見岩曰不生不滅處相見師曰何不道非不生不滅處亦不求相見傳燈録懶瓚垂涕唐高僧丨丨居衡山殘岩石窟中徳宗遣人詔之寒涕垂膺使者笑之且勸拭涕瓚曰我豈能有工夫為俗人拭涕耶竟不能致傳燈録臨濟隻眼鎮州普化和尚云丨丨小厮兒只具一丨丨傳燈録吉祥召魚東川解魔寺僧吉祥魁梧多力受飯五鉢日夜誦經九函池中魚知其数以名召之皆出水面使去皆沒蜀普録善覺喚虎潭州華林丨丨禪師觀察使裴休訪之問有侍者否師曰有一兩个乃丨大空小空二丨自庵後出師曰有客且去二虎咆哮而去休問作何行業感得如斯師曰山僧常念觀音同上木杯渡河杯渡者不知其名姓常乗丨丨丨丨因名焉不修細行不甚精持飲酒食肉與俗人不殊髙僧傳舡子泛江華亭船子和尚於華亭吴江泛小舟時號舡子和尚傳燈録天龍圍繞崔法雄碑登法堂居講坐緇素觀聴丨丨丨丨搖塵尾而折理風生㺯象鼻而吐辭河注震雷霆之法鼔聾俗知驚整日月之慈煙幽途識曉同上鬼神服役佛圖澄天竺人妙通𤣥術善誦神呪能役使鬼神腹旁有一孔夜光照室石勒聞其名召試其術澄取鉢盛水燒香呪之須㬰鉢中生青蓮花勒愛子斌暴病死澄取楊枝沾水洒而呪之遂甦同上聚石為徒異僧生公講經於虎丘寺人無信者乃丨丨丨丨與談至理石皆㸃頭坡詩注大雪不動達麽止嵩山少林寺面壁冇僧神光事之夜大雪堅立不動達麽契之與易名惠可即二祖也見傳燈録運水般柴襄州龐居士名藴字道𤣥與石頭希遷為友嘗有頌曰朱紫誰為號丘山絶㸃埃神通并妙用丨丨及丨丨石頭希遷師然之人參馬祖於言下悟傳燈録擲杖飛空昔髙僧隠峯逰五臺山淮西丨丨丨丨徑西天釋氏要覧孫綽天台賦云王喬控鶴以沖天應真飛錫以躡空文選看經遮眼僧問藥山為什麽丨丨師曰我只圖丨丨傳燈録有茅盖頭徳山宣鑒禪師辭龍潭潭謂衆曰有一个漢眼如劍口似盤一棒打不回頭他時向孤峯頂上立吾道在溈山曰是伊將來丨把丨丨丨罵佛罵祖去在同上晨雞暮鐘守清禪師有僧問未後一句師曰塵中人白老天際月常明問如何是和尚家風曰一瓶兼一鉢到處是生涯問佛法大意曰擾擾怱怱丨丨丨丨出傳燈録茒茨石室無業禪師曰看他古得道人得意之後丨丨丨丨向折脚鐺子煑飯喫過三二十年傳燈録三間茅屋廣嚴院咸澤禪師僧問如何是廣嚴家風曰一塢白雲丨丨丨丨同上百丈竿頭招賢大師偈曰丨丨丨丨不動人雖然得入未為真丨丨丨丨須進步十方世界是全身同上土上加泥古禪師升堂無語安國長老乃白衆云當觀去王法如是衆猶不退古曰安國和尚已是郎當老僧不可丨丨丨丨遂下坐同上籃裏盛梅耽原為惠忠國師侍者云須要覔个䕶身符子異日攜籃入方丈國師曰籃裏冇甚麽物曰青梅曰何用曰供養傳燈録招入蓮社逺師結白蓮社以書招淵明陶曰弟子性嗜酒若許飲即往矣逺許之遂造焉因勉令入社陶攢眉而去盧阜雜記不入蓮社謝靈運求入浄社逺師以心雜止之范寗王豫章逺師請入社范不能従逺師傳隠峯參禪鄧丨丨丨馬祖一日辭謁南岳石頭和尚馬祖云石頭路滑對曰竿木隨身逢場作戲纔到石頭遶床三匝振錫一聲問是何宗㫖石頭云蒼天蒼天隠峯無語却回舉似於師師云汝更去見他道蒼天蒼天汝便嘘嘘隠峯又去一如前問石頭乃先嘘嘘隠峯又無語歸來師云向汝道石頭路滑傳燈録南泉賣身丨丨示衆云老師要丨丨阿誰要買一僧云某甲買師云他不作貴價不作賤價作麽生買僧無對趙州代云明年來與和尚縫个布衫同上狐女觀心唐則天時有女人自稱聖菩薩人心所在女必知之則天請入宫中所言皆驗宫中謂聖菩薩後有大安和尚入宫太后令見之大安曰汝善觀心試觀我心安在答曰師心在塔頂頭相輪邊復問之答曰在兠率天彌勒宫中聴去第三問云在非非想天皆如其言大安因置心於四果阿羅地乃不能知女辭屈變作狐下階走不知所適太平廣記大耳慧眼唐代宗時有西天丨丨三藏到京云得他心丨丨帝令與惠忠國師試驗三藏見師禮拜師問曰汝得他心通邪汝道老僧即今在什麽處曰和尚是一國之師何得却去西川看競渡師再問汝道老僧即今在什麽處曰和尚是一國之師何得却在天津橋上看㺯猢猻第三問語亦同前三藏罔知去處師叱曰這狐精他心通在什麽處後有僧問趙州大耳三藏第三度不見國師心未審在什麽處云在三藏鼻孔上為什麽三藏不見云只為太近見傳燈録鬼神送食雲居𢎞覺禪師參見洞山悟本大師後住山菴每月十五日須回問訊洞山一日洞山問庵中飯食如何曰俱無洞山云每日喫个甚麽庵主云毎日常有聖賢送食來洞山喝云將謂汝是个人作麽生却感聖賢送食庵主従此歸庵自備茶食於是聖賢又送食來即不見庵主古禪師云但有一毫佛法異念鬼神便見得你古禪師語録鬼神覷見南泉普願禪師擬取明日遊莊其夜上地神先報莊王莊王乃預為備師到問莊主争知老僧來莊主云昨夜上地神報師師云王老行無力却被丨丨丨丨丨見傳燈録女子寄宿高僧嵬戒行嚴潔嘗有一丨丨丨丨自稱天女以上人有徳天遣我来勸勉其意嵬執意貞確一心無擾曰吾心若死灰無以革囊見試女乃凌雲而逝顧曰海水可生須彌可傾彼上人者秉心堅貞同上妓女逼受鳩摩羅什姚王以丨丨丨令丨之乃自講説譬如臭泥中生蓮花但取蓮花勿取臭泥同上浮屠還俗賈島字泿仙初為浮屠愈因教其為文遂去浮屠舉進士本傳浮屠奉親張䇿少落髪為僧黄巢犯長安乃返初服奉父母以避亂闕李公問禪藥山惟儼禪師朗州刺史李翺問如何是道師曰雲在天水在瓶翺作偈曰練得身形似鶴形千株松下兩函經我來問道無餘話雲在青天水在瓶又問如何是戒定慧師曰太守欲保任此事真須向高高山頂坐深深海底行閨門中物捨不得便為滲漏闕東坡問禪佛印禪師法名了元饒州人東坡與之遊時住潤州金山寺公赴杭過潤為留數日一日值師掛牌與弟子入室公便服入方丈見之師曰内翰何來此間無坐處公戯借和尚四大用作禪床師曰山僧有一轉語内翰言下即答當従所請願留所繫玉帶以鎮山門公許之便解玉帶置几上師云山僧四大本空五藴非有内翰欲於何處坐公擬議未即答師急呼侍者云收此玉帶永鎮山門公笑而與之師遂取衲裙相報闕送簡師序鳳羽而鱗毛鳥與獸也經傳以比聖人豈非以其心不以其形者耶師雖佛氏而儒其行雖夷狄其衣服而仁義其心雖未齒於士與鳳麟類矣不猶愈於冠服朝服惑溺於淫恠之説以斁彛倫者耶嗚呼師吾獨賢也皇甫湜送文暢序人固有儒名而墨行者問其名則是校其行則非可以與之遊乎如有墨名而儒行者問其名則非校其行則是可以與之遊乎楊子雲稱在門牆則揮之在夷狄則進之吾取以為法焉文暢喜為文章其周遊天下凡有行必請於縉紳先生以求詠歌其所志貞元十九年春將行東南栁君宗元為之請解其裝得所叙詩累百餘篇非至篤好其何能致多如是耶惜其無以聖人之道告之者而徒舉浮屠之説贈焉夫文暢浮屠也如欲聞浮屠之説當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物禮樂之盛其心必有慕焉拘其法而未能入故樂聞其説而請之如吾徒者宜當告之以二帝三王之道日月星辰之所以行天地之所以著鬼神之所以幽人物之所以蕃江河之所以流而語之不當又為浮屠之説而瀆告之也韓昌黎集判僧飲酒陸長源郎中判僧常滿智真等於娼家飲烹宰等事云只説如來之敎在處貪財身着無價之衣終朝食肉苦行未同迦葉自謂頭陁神通何有浄名入諸浮舍犯爾嚴戒黷我明刑仍逺近僧徒痛杖三十處死雲溪友議判僧賭錢淅西韓滉相公㫁僧靈晏等賭錢喧争云正法何曽執具空門不積餘財白日既能賭愽通宵必醉尊罍强説天堂難到又言地獄常開並付江神収管波中便是泉臺同上衣食之費五代漢李欽明為司勲員外郎上言古語云一夫不耕一婦不織必有受饑寒者矣聖化之内且約十萬僧尼每日人食二升十萬人日費二千石以日繫月其數可知每一僧嵗中須絹五匹綿五兩十萬僧計絹五千萬匹綿五千萬兩此輩不耕不蚕實斁大倫臣謂聚僧不如聚兵僧富不如民富經曰聖人在上國無幸民民之多幸國之不幸職官分紀土木之侈今也毁中民百家之産而成一屋集農夫十口之食而飯一僧不亦泰乎不耕者燕居而玉食所在常居千百數是以耆會昌之藉沒窮土木之好龍蛇虎豹之區化為金碧是以有廣明之除蕩可不忌耶然會昌之語其説不過人其人火其書廬其居若天毗盧遮那宫救充滿十方書入三世於諸境界無所分别彼又安能廬吾廬有大經卷量等三千大千世界藏在一微塵中彼又安能火吾書無我無人無衆生彼又安能人吾人黄庭堅曰此上人者如來藏中之説客菩薩藏中之游俠耶闕事類胡僧太白中峯絶頂有丨丨不知㡬百嵗眉已長數寸身不製繒帛衣以草葉常持楞嚴經路僻逈絶人跡罕到嘗東峯冇鬬虎弱者將死而僧以杖解之西湫有毒龍久而為患而僧以器貯之商山趙叟前年採茯苓深入太白偶值此僧宿余獨有獨往之意聞而悦之乃為歌曰聞有胡僧在太白蘭若去天三百尺一持楞伽入中峯世人難見但聞鍾忩邊錫杖解兩虎床下鉢盂盛一龍草衣不針亦不線兩耳垂肩眉覆面此僧年紀那得知手種青松今十圍心將流水目清浄身與浮雲無是非商山老人已曽識願一見之何由得山中有僧人不知城裏看山空黛色太白胡僧歌維摩時丨丨詰室有一天女見諸天人所説法便見其身即以天花散諸菩薩大弟子上花至諸菩薩即皆墮落至大弟子便着不墮天女曰是花無所分别仁者自生分别想汝結習未盡故花着身結習盡者花不着身皎然有詩曰天女來相説將花欲染衣禪心定不起還捧舊花歸維摩經旻公不見丨丨三十年封書寄與淚潺湲舊時好事今能否老去新詩誰與傳棊局動隨秋澗水袈裟憶上泛湖船聞君話我為官在頭白昏昏只醉眠老杜洪師丨丨抖擻蔬笋氣白晝宂我夫子牆粥魚齋鼓了無破坐禪不廢談文章謝無逸詩身閒松根滿苔石盡日閉禪闗有伴年年月無家處處山煙波五湖逺瓶屨一丨丨岳寺蕙蘭曉㡬時幽鳥還温廷筠詩心了利門名路兩何憑百嵗風前短焰燈只恐為僧丨不丨為僧丨丨總輸僧杜茍鶴詩清浄溪聲便是廣長舌山色豈非清浄身夜來八萬四千偈他日如何舉似人東坡風流騎驢覔驢真可笑以馬喻馬亦成癡一天月色為誰好二老清浄各自知東坡問禪丨丨不似前畨語施佛空留丈六身老去山林猶夢想雨餘鍾鼓更清新東坡入定瓶殘秦地水錫入晉山雲秋月離喧見寒泉丨丨聞賈島禪床盡日行方到何年獨此林客歸唯伴鶴人少似師心坐石落松子丨丨搖竹隂山靈怕驚定不遣夜猿吟薛能法供碧玉盌盛紅瑪瑙井花水養石菖蒲也知丨丨無窮盡試問禪師得飽無東坡舊隠塵機息盡一真僧唯有林泉捨未能蓮社故人今暫别稽山丨丨與誰登時清豈覺前遊改道勝寧辭白髮增遙羨髙齋吟望處孤雲野鶴是親朋徐騎省詩勝遊優鉢曇華豈有花問師此曲唱誰家已従子美識桃竹更向安期覔棗𤓰宴坐林間時有虎髙眠粥後不聞鴉丨丨自古兼支許為採松枝寄一車東坡鳴鐘巫山不見廬山逺松林蘭若秋風晚一老猶鳴日暮鐘諸僧尚乞齋時飯同上飛錫香爐峰色隠晴湖種杏仙家近白榆丨丨去年帝邑子獻花何日許門徒杜甫持經去掃東林下閒丨未遍丨為山低鑿牖容月廣開庭舊業雲千里生涯水一瓶還應覔新句看雪倚禪扄薛能聞磬去路餘千里行行雪灑衣諸峰何日别一錫犯寒歸老宿誰丨丨農齋自採薇遙知到禪宇猿鳥共開扉孫漢公薰香不踐紛華域來丨知見丨三衣嗣僧粲五字法韋郎善權懸瓠清瘦形容八十餘匏懸籬落似村居勸師英羨人間有幸是元無免破除薛能跏趺室空無侍者巾屨惟掛壁一飯不願餘丨丨便終夕栁子厚詩高座黄金師子承丨丨白玉麈尾談重𤣥太