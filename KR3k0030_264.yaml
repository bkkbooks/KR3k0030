body:
  text: 古今合璧事類備要别集卷五十八宋謝維新撰榖粟門麥附大麥小麥穬麥蕎麥格物總論按本草麥四種曰大麥小麥穬麥蕎麥惟大麥久食令人肥白滑肌膚為麫勝小麥而無躁熱冬十月下種至次年四月成熟田家畦而種之頼以續食亦五穀之一也事類芁芁我行其野丨丨其麥載馳幪幪麻麥丨丨詩麻麥禾丨菽丨七月又菽麥稙穉丨丨閟宫又見前祈麥季春天子乃為丨丨實記月令登麥孟夏之月農乃丨丨天子乃以彘嘗麥先薦寢廟同上於皇來牟丨丨丨丨將受厥明明昭上帝迄用康年臣工貽我來牟思文后稷克配彼天丨丨丨丨帝命率育思文箕子作歌丨丨朝周過殷墟見而傷之丨麥秀之詩以丨詠之曰麥秀漸漸兮苗黍油油史記祭足帥師夏四月鄭丨丨丨丨取溫之麥左傳晉侯將食丨丨夢大厲公覺召桑田巫曰不食新矣晉侯欲麥使甸人獻麥饋人為之召桑田巫而殺之丨丨張如厠䧟而卒同上冬無大麥莊八年丨丨丨丨春秋今兹無麥宓子賤為單父宰百姓化之齊人攻魯道由單父單父老請曰麥已熟矣今齊冦至人人自收不及請放民皆使出穫可以益糧且不資冦宓子賤不從曰丨丨丨丨明年可植若使不耕者得穫是使民樂有冦也季孫聞之赧家語馮異麥飯光武自薊東南馳至南宫遇大風雨帝引車入官舍丨丨進丨丨史張堪麥秀丨丨為漁陽太守勸民耕種以致殷富百姓歌曰桑無附枝丨丨兩岐張君為政樂不可支後漢書久旱傷麥丨丨丨丨秋種未下朕甚憂之光武詔忽雨漂麥高鳳勤學妻嘗之田曝麥于庭以竿授鳳令䕶鷄鳯受竿誦讀如故丨雷丨丨丨去不知東觀漢記盗鄰特賞孔文舉為北海相有遭父喪哭泣墓側色無憔悴文舉殺之又有母病瘥思食新麥家無乃丨丨熟麥而進之文舉聞之丨丨曰不必來謝但勿盗也盗而不罪者以為勤於母哭父而見殺者以形慈而實否也秦記索筆作賦孫權嘗饗蜀使費禕禕停食餅丨丨丨麥丨權亦請筆作磨賦咸稱善呉志誰當穫者漢桓帝時麥童謡云小青青大麥枯丨丨丨丨婦與姑丈夫何在西擊胡後漢書無敢犯者魏祖經行麥中令士卒丨犯麥犯者死士皆下馬扶麥以行適太祖馬騰入麥中勑主簿議罪主簿對以春秋之義罰不加於至尊太祖曰制法而自犯之何以率下遂援劒割髮以寘地魏志有中毒者人丨丨麥丨丨夢紅裳娘子悲歌有丸蘆服火吾宫之句小説乾磨為麵北人嘗新麥初熟取以炒丨丨丨麤丨而乾食之外題曰麨今大内當麥熟時以黄羅帕封賜百官其丨丨丨丨或云以蜜漬食尤佳坡詩句詩集晨氣潤麥秋丨丨丨文選暖風抽丨丨丨細麥同上多秀色麥隴丨丨丨王僧逹落輕花細麥丨丨丨杜陵陂麥青熒丨丨丨崆峒麥丨丨小丨熟且願休王師麥無壠山田丨丨丨並杜麥漲天丨芒丨丨揺青波栁子厚麥如篲丨芒丨丨黍如煙李賀麥青青桑下丨丨丨文粹麥纎纎舍西柔桑葉可拈江邉細丨復丨丨人生幾何春已夏不放酒醪如蜜甜杜輿穿麥小丨丨丨去荆公鞋隨麥穿丨帶履丨丨壠晁无咎老鴉種霜林丨丨閒無用畦東收麥畦西種畦西種得青猗猗畦東已作牛尾稀明年麥熟芒攅槊農夫未食鴉先啄徐行俛仰若自矜皷翅跳踉上牛角憶昔舜耕歴山鳥為耘如今丨丨丨麥更辛勤農夫羅拜鴉飛起勸農使者來行水東坡鴉種麥行快活吟去年麥不熟挾彈規我肉今年麥上場處處有殘粟豐年無象何處尋聴取林間丨丨丨坡五禽言夜食炒梅花開時我種麥桃李花飛麥叢碧多病經旬不出門東坡已作黄雲色腰鎌刈熟趂晴歸明朝雨來麥沾泥犂田待雨挿晚稻朝出移秧丨丨丨范石湖寒醅劑苦寒勿怨天雨雪雪來遺我明年麥三月翠浪舞東風四月黄雲暗南陌坐看比屋騰歡聲已覺有司寛吏責腰鎌丁壯傾閭里拾穗兒童動千百玉塵出磨飛屋梁銀絲入釜須寛湯丨丨發丨炊餅裂新麻壓油寒具香大婦下機廢農織小姑佐庖忘晚粧老翁飽食笑捫腹林下擊壤歌時康陸放翁大麥乾枯大麥丨丨小麥黄婦女行泣夫走藏東至集壁西梁洋問誰腰鎌胡與羗杜甫大麥行半枯大麥丨丨自浮沉小麥刺水鋪緑針山邉老農望麥熟出門見水放聲哭去年泠泠七月雨秋苖不收一粒穀只今米價貴如玉倂日舉家纔食粥小兒索飯門前啼大兒雖瘦把鉏犂晴時種麥耕荒隴正好下秧無稻畦張干湖小麥小麥黄見前乾枯注小麥緑半枯注勝西川少年食稻不食麥老居穎川稻不足人言小麥丨丨丨雪花落磨煮成玉冷淘槐葉氷上齒湯餅羊羹火食腹潁瀕蕎麥鋪雪但見古河東蕎麥如丨丨放翁著雨蕎花丨丨相爭秀孔毅父花覆野漫漫蕎麥丨如雪丨平丨陸放翁穗簮髻城南城北如鋪雪原頭家家種蕎麥霜時收歛少在家餅餌今冬不憂窄胡麻壓油油更香油新餅美爭先嘗獵歸熾火燎雉相呼置酒喜欲狂陌上行歌忘惡嵗小婦紅粧丨丨丨詔書寛大與天通逐熟淮南幾誤計陸放翁觀刈蕎麥稍頭萬玉夜來更下西風雪蕎麥丨丨丨丨塵同上豆附豆腐格物總論豆有大小二種菽大豆荅小豆也叢生其角謂之莢其葉謂之藿其莖謂之萁然又有藤生者種亦不一皆係五穀之數食之能飽人美種也事類采菽丨丨采菽筐之筥之詩烹菽七月丨葵及丨七月菽麥禾麻丨丨同上菽粟使有丨丨如水火孟威公遍布丨丨北伐山戎以戎菽丨丨天下管子周兄不辯丨子有丨而無慧丨能丨菽麥注菽大豆豆麥殊形易别故以為癡左成十八啜菽盡歡子路曰貧也無以為養子曰丨丨飲唅水丨其丨斯謂之孝記檀弓菽無茹閔仲叔太原人與周黨相友黨每過仲叔共飯丨飲水亦丨菜丨東觀漢記南山一頃楊惲與孫㑹宗曰臣之得罪已三年矣田家作苦嵗時伏臘烹羊炰羔斗酒自勞家本秦也能為秦聲婦趙女也雅善皷琴奴婢歌者數人酒後耳熱仰天拊缶而呼烏烏其詩曰田彼丨丨蕪穢不治種丨丨豆落而為萁人生行樂耳須富貴何時本傳蕪蔞厚意王郎起光武自薊東南馳晨夜草舍至饒陽丨丨亭時天寒烈衆皆饑疲馮異上豆粥明旦帝謂諸將曰昨得公孫豆粥饑寒俱解後帝即位使中黄門賜以珍寳詔曰倉卒丨丨亭豆粥滹沲河麥飯丨丨久不報本紀摭以謝恩劉平嘗為餓賊所刧叩頭曰老母饑少氣力恃平為命願得還飯食母馳來就死涕泣發於肝膽賊即遣去乃丨三斗豆丨丨賊丨孝子傳煮以作羹魏陳思王曹植字子建文帝同母弟帝嘗令王七歩中作詩不成者行大法應聲為詩曰丨豆丨丨丨漉菽以為汁萁在釜下然豆在釜中泣本是同根生相煎何太急魏志數升播席趙達善算使人取小豆丨丨丨之丨上立知其數方術傳三升繞舍郭璞至廬江愛主人婢無由而得乃取小豆丨丨丨主人丨散之主人晨見赤衣人數千人圜其家就視則滅甚惡之請璞為卦璞曰君家不宜畜此婢可於東南二十里賣之慎勿爭價則此祟可除主人從之本傳咄嗟而辦石崇作萍韲豆粥丨丨丨丨晉書胡名皆改石勒諱胡凢有丨丨丨丨胡餅曰麻餅胡綏曰綏胡豆曰豆鄴中記張翰豆羹賦孟秋嘉菽垂枝挺英是刈是穫充筺盈篋豆腐淮南王術世傳豆腐丨丨丨丨朱文公詩詩集菽實弱年逢家乏老至更長饑丨麥丨所羡孰敢慕甘肥豆苖種豆南山下草盛丨丨稀並陶潜豆子熟丨丨取已丨杜豆苖荒南山丨丨早丨穢百氏集喜豆高敢辭茅屋漏已丨丨苗丨杜行豆田相擕丨丨丨秋花靄霏霏子實不得喫貨市送王畿盡添軍旅用迫此公家威同上沙瓶煮君不見滹沱流澌車折軸公孫倉皇捧豆粥濕薪破竈自燎衣饑寒頓解劉文叔又不見金谷敲氷草木春帳下烹煎多美人萍虀豆粥不傳法咄嗟而辦石季倫干戈未解身如寄聲色相纒心已醉身心顛倒自不知更識人間有真味豈知江頭千頃雪色蘆茅簷出没晨煙孤地碓舂秔光似玉丨丨丨豆軟如酥我老此身無著處賣書來問東家住卧聴鷄鳴粥熟時蓬頭曵履君家去坡豆粥豆腐淮南術種豆豆苖稀力竭心已腐早知丨丨丨安坐穫泉布朱文公古今合璧事類備要别集卷五十八
