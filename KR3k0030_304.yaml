body:
  text: 古今合璧事類備要外集卷四宋謝維新撰祭祀門祀太一禮經考索太一者五帝之君也其位尤尊於五帝記禮之説曰禮必本於太一則太一者果天地四時之宗自漢人祠太一于甘泉而祀典始昉於此事類具祀壇漢武帝元鼎中上初郊雍有司曰五帝太一之左也宜立太一而上親郊之上遂郊雍登崆洞幸甘泉令祠官等丨太一丨丨立畤壇十一月辛巳朔旦冬至昧爽壬子郊拜太一朝朝日夕夕月則揖而見太一以雍郊禮有司言祠上有光祠官寬舒等奏神靈之休佑福兆祥宜因此地丨泰丨丨以明應其秋伐南越告禱太一以象太乙主星日為太一絳旗始用樂常以昏祠至明並前郊祀志次上帝唐肆類圜丘列太一位丨於昊天丨丨合九宫玄宗丨太一於丨丨祠别一壇並唐禮樂志祠於蘇林太宗雍熙中丨太一丨丨丨祠於角鎮仁宗天聖中丨太一丨八丨丨祀中太一又徽宗宣和三年四月下詔立夏祠八角鎮並長編裁定祀典髙宗紹興初丨丨丨丨每嵗天地宗廟社稷九宫貴神髙禖等定為大禮三十六朝野雜記屈原東皇太一歌吉日兮辰良穆將愈兮上皇撫長劍兮玉珥璆鏘鳴兮琳琅瑶席兮玉瑱盍將把兮瓊芳蕙肴蒸兮蘭藉奠桂酒兮椒漿楊枹兮拊鼓疏緩節兮安歌陳竿瑟兮浩倡靈偃蹇兮姣服芳菲菲兮滿堂五音紛兮繁會君欣欣兮樂康楚辭祠五帝禮經考索帝本一也而有五帝之别或者以為五方之神夏商以前其禮不傳自周官太宰有祀五帝之職掌故秦吕不韋作月令而四時於中央各名其帝焉春太皥夏炎帝中央黃帝秋少皥冬顓帝是以後漢緯書五帝之名有所謂青帝靈威仰赤帝赤標怒黃帝黃樞紐白帝白招拒黑帝叶光紀皆昉於此彼又為六天帝之説者是又加以耀冕寶云事類誓戒太宰祀五帝則掌百官之丨丨周禮具備與其丨丨同上祀五帝見前注祠四帝泰丨丨丨白青黃赤本紀立北畤漢髙祖乃丨黑帝祠為丨丨本紀作五廟文帝丨渭陽丨帝丨立五帝壇從新垣平之言後告其詐誅夷之廟同宇新垣平言長安東北有神氣若人冠冕東北神明之舍宜立祠上帝以合符應遂作丨丨丨同字謂上同下異禮所謂復廟重屋也廟臨渭帝親郊見渭陽五帝廟丨丨丨其北穿蒲池云並前郊祀志五帝即天晉羣臣議丨丨丨丨也五氣時異故殊其號名雖五其實一神明堂南郊冝除五帝之座五郊改五精之號皆同稱昊天上帝各設一座而已晉禮志五郊迎氣唐樂十二和一曰豫和丨丨丨丨黃帝以黃鍾為官赤帝以函鍾為徴白帝以太簇為商黑帝以南吕為羽青帝以姑洗為角皆文舞六成壇祭五方王仲丘言正觀禮正月上辛祀感生於南郊顯慶禮祀昊天上帝於圜丘以祈穀詩春夏祈榖于上帝禮上辛祈榖于上帝則上帝當昊天矣鄭玄曰天之五帝遞王王者必感一以興故夏五月祭所生於郊以其祖配之因以祈穀感帝之杞正觀用之矣請因祈榖之壇遍祭五方帝五帝者五行之精九榖之宗也請二禮皆用詔事壇廣四丈唐丨其丨皆丨丨而髙八尺者青帝七尺者赤帝五尺者黃帝九尺者白帝六尺者黑帝以人帝配唐立春祀青帝以太皥氏配嵗星三辰在壇之下東北七宿在西北勾芒在東南立夏祀赤帝以神農氏配熒惑三辰七宿祝融之位如青帝土王之日祀黃帝以軒轅氏配鎮星后土之位如赤帝立秋祀白帝以少昊氏配太白三辰七宿蓐收之位如黃帝立冬祀黑帝以顓頊氏配辰星三辰七宿玄冥之位如白帝並唐禮樂志以祖宗配本朝仁宗皇祐二年明堂合祭奉太祖太宗真宗並配以五帝天惟一神皇祐二年孫奭建言丨丨丨丨以其至尊故有多名亦猶人君稱王皇后辟天王天子皇帝帝各一神天帝之神迭主五畤故聖人制禮謂之五帝非五丨丨丨丨也並長編祭日月附祭星祭風雨禮經考索自虞書有禋于六宗之説釋者謂四時寒暑日月星辰水旱是也厥後周人因之故有春分朝日秋暮夕月之禮後世以來又有合日月五星而共為一祭者本朝沿漢唐之典禮以祭日月為中祀每嵗春秋二分嘗命官攝事以行禮焉中興百年此禮不廢具在儀典事類王宫丨丨祭日也注壇名記祭法夜明丨丨祭月也注壇名同上朝夕為丨丨必於日月記春秋丨杞朝日於東郊丨杞夕月於西郊月令精意禋于六宗注謂丨丨以享祀也書舜典祀典及夫日月星辰民所瞻仰也非此族也不在丨丨祈于丨福丨天宗注日月星辰記禜之日月星辰之神則雪霜風雨之不時於是乎丨丨左實柴祀大宗伯以丨丨丨日月星辰注實柴致牛柴上周禮圭璧祀丨丨五寸以丨日月星辰同上未後三刻本朝真宗天禧元年王博文參定夕月之禮按禮云從子至巳為陽從午至亥為隂請以丨丨丨丨行事長編祭星幽禜丨丨祭星注幽開也禜壇域也為禜域而祭之記祭法天宗孟冬天子乃祈來年于丨丨注天宗日月星辰月令次祀肆師之次祀用牲幣注丨丨日月星辰禮吉禮一曰丨丨中祀星辰唐禮志奏黃鍾大司樂乃丨丨丨舞大韶歌大吕舞雲門以祀天神注天神五帝及日月星辰禮歌南吕乃奏姑洗丨丨丨舞大㲈以祀四望注此言祀者司中司命風師雨師兆四類小宗伯丨丨丨亦如之注星辰運行無常以氣類為之位掌三辰凡以神位者丨丨丨之法春官司祿司民秋官司民詔司冦孟冬祀司民之日獻民數于王注文昌宫第三能之屬軒轅角近文昌為司命次司中次丨丨次丨丨禮中能上能大宗伯以槱燎祀司中司命注文昌第五第四星或曰丨丨丨丨能音台並商主大火陶氏火正閼伯居商丘相土因之故丨丨丨丨左晉卜實沈鄭侯有疾丨曰丨丨為祟子産曰實沈參神也此不及君日月星辰之神則雪霜風雨之不時於是乎禜之若君之身則出入飲食之事星辰之神又何為也左曰靈星尸髙子丨丨丨之丨也詩絲衣立靈星祠漢詔郡國立靈星祠農祥也祠以牛漢書漢髙亦丨丨丨丨江左以來不立七祠靈星則配南郊不特置也晉書置壽星壇開元勑宜令所司特丨丨丨丨常以千秋節日修其祠典又勑壽星壇宜祭老人星及角亢七宿著之常式通典在大明壇天皇太帝北辰北斗天一大一紫微五帝座並差在行位前係內宫諸座及五星十二辰河漢四十九座在第二等十有二陛之間中宫市垣帝座七公日皇帝席大角攝提大微五帝天子明堂軒轅三台五車諸王月星織女建星天紀十七座及二十八宿差在前列其餘中宮一百四十二座皆在第二等十二階之間外宫一百五在內壝之內衆星三百六十在內壝之外已上丨丨丨夜明丨唐禮志幣以方色唐祀日月星辰五星之丨丨丨丨壺實昔酒以壺尊二丨丨丨以祀衆星並禮樂志從祀星辰本朝太祖南郊令司天監定丨丨丨丨圗上之長編屈原少司命歌秋蘭兮蘼蕪羅生兮堂下緑葉兮素華芳菲菲兮襲豫夫人自有兮美子孫何以兮愁苦秋蘭兮青青緑葉兮紫莖滿堂兮美人忽獨與余兮目成入不言兮出不辭乘回風兮載雲旗悲莫悲兮生别離樂莫樂兮新相知荷衣兮蕙帶倐而來兮忽而逝夕宿兮帝郊君誰須兮雲之際與汝遊兮九河衝飈起兮水揚波與汝沐兮咸池晞汝髮兮陽之阿望美人兮未來臨風恍兮浩歌孔蓋兮翠旌登九天兮撫彗星竦長劒兮擁幼艾荃獨宜兮為民正祭風雨燎牷大宗伯以槱丨祀風師雨師注皆積柴實丨醴焉或有玉帛燔燎以升煙周禮磔狗祭風神曰磔注今俗當大道中丨丨云以止風此其象爾雅西北郊小宗伯西風師於兆雨師於丨丨禮箕畢星丨星好風丨丨好雨書洪範又大宗伯注風師箕也雨師畢也禮戌丑地以丙戍日祠風伯於丨地以己丑日祠雨師於丨丨用羊豕東郊兆東方青大昊青勾芒及雷公風伯于丨丨丨前郊祀志圓壇外丨丨丨營祀風伯雨師之屬後祭祀志檢會政和禮孝宗朝朱文公南康申省狀自今春秋釋奠祈報社稷及祀風伯雨師壇壝器服乞丨丨丨丨五丨司空圖移雨神夏滿不雨民前後走神所刳羊豕而跪乞者凡三而後得請民大喜且將報祀愚獨以為惑何者天以神乳育百苖穀必時既豐然後民相率以勞神之勤於事而祀焉今始吝其施以愁疲民是神怠天之職也必希民之求而遂應是神玩天之權也既應而俾民輸怨於天歸惠於己是神攘天之德也推怨何以為義利腥羶之饋何以為仁怠天下之事何以為敬蔑是數者何以為神假曰非吾所得顓然知民之情而不時請於上是亦徒偶於位此愚所以惑也噫天不可終謾民不可終悔竊為神危之奈何韓昌黎訟風伯維兹之旱兮其誰之由我知其端兮風伯是尤山升雲兮澤土氣雷鞭車兮電搖幟雨寖寖兮將墜風伯怒兮雲不得上暘烏之仁兮念此下民閟其光兮不鬭其神嗟風伯兮其獨謂何我於爾兮豈有其他求其時兮修祀事羊甚肥兮酒甚旨食足飽兮飲足醉風伯之怒兮誰使雲屏屏兮吹使醨之氣將交兮吹使離之鑠之使氣不得化寒之使雲不得施嗟爾風伯兮欲逃其罪又何辭上天孔明兮有紀有綱我今上訟兮其罪誰當天誅加兮不可悔風伯雖死兮人誰汝傷柳宗元雷塘禱雨文惟神之居為坎為雷專此二象宅于岩隈風馬雲車肅焉徘徊能澤地産以祛人災欽兹有靈爰以廟享神惟有知我以誠往茍失其應人將安往歲既旱暵害兹生長敢用昭告期于肹蠁某自朝受命臨兹裔壤涖政方初庶無淫狂潔廉自持忠信是仗茍有獲戾神其可罔擢擢嘉生惟天之養豈使粢盛夷於草莾騰波通氣出地奮響欽若成功惟神是奬古今合璧事類備要外集卷四
