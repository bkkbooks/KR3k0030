body:
  text: 古今合璧事類備要别集卷六十九宋謝維新撰飛禽門鷗格物總論鷗水鳥説文云水鷗色白數百為羣多在漲海中隨潮上下常以三月風至乃還洲嶼頗知風雲若羣飛至岸必風事類狎鷗海上之人好鷗者每旦之海上從鷗鳥遊鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從汝好取來吾玩之明日之海上鷗鳥舞而不下列子賦鷗崔湜玄宗在束宮數至其第湜隂附主時人危之為寒毛門下客獻海鷗丨以諷孔帖李商隱太倉針海翁忘機鷗故不飛海翁易慮鷗乃飛去蕭頴士江有楓篇有鳥有鳥粵鷗與鷺浮湍戲渚皓然潔素詩集願狎丨丨東海鷗杜永與明朝拂衣去丨丨白鷗羣李白泛渚輕丨丨白鷗丨杜浮水靜逺鷗丨丨丨誰能馴白鷗汲浩蕩萬里丨丨丨亦自饒江浦寒鷗戲無他丨丨丨却思翻玉羽隨意點青苗雪暗還須落風生一任飄幾羣滄海上清影日蕭蕭懶避船春鷗丨丨丨並杜常拂筵白鷗間不去丨丨酒丨飛李白宿沙月搖曳雙白鷗飛入滄江流寄影丨丨丨沿芳戲春洲同上泛春聲鷗丨已丨丨杜心靜鷗知丨丨海丨丨李白野靜鷗知丨丨海丨丨李白野靜鷗來丨丨白丨丨杜鷗盟未寒惟有白丨丨丨丨山谷鷗間似我江南野水碧於天中有白丨丨丨丨山谷豈止忘機險夷一節如金石勳德俱髙快古今丨丨丨丨鷗鳥信陶鈞萬物本無心歐陽永叔題韓魏公狎鷗亭相隨得友江鷗好羽毛玉雪無塵垢滅沒波浪間生涯亦何有雄雌屢驚矯機弋常紛糾顧我獨無心丨丨如丨丨飄然紛華地此物乖隔久白髮望東南春江緑如酒王介甫鳬格物總論鳬野鴨色白頭上有毛數百為羣多泊在江海間沙上食沙石皆消化唯食海蛤不消隨其糞出且其羣蔽天而下聲如風雨所至田間稻梁必為之空史遊急就章云水鳥翁也事類翺翔將丨將丨弋鳬與鴈詩上下泛泛若水中之鳬與波丨丨楚詞脛短鳬丨雖丨續之則悲莊子毛長人有得鳬鳥丨丨三丈以示張華華見曰不然此謂海鳬毛也出則天下亂博物志獨翔雙鳬俱北飛一鳬丨南丨李白詩雙飛丨鳬丨不為加少揚雄解嘲舄化王喬為葉令有神術每月朔旦常自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳬從東南來於是候鳬至舉網張之但得一雙丨乃詔尚方診視則曰所賜尚書官屬履本傳射中李克用善騎丨仰丨雙鳬唐莊宗紀錦鳬元宗奉御湯中有瑀文密石中央有玉蓮湯泉湧以成池又有縫丨繡為丨鴈於水中帝與貴妃登文鏤小舟戲玩於其間開元遺事金鳬正月十五夜玄宗於常春殿臨光宴丨丨燈影燈記聲類暴雨余視穫於甫里夜不能寐往往丨丨丨丨而至至明訊其氓曰鳬鷖也其曹蔽天而下蓋田所當之而穗必竭笠澤書左思蜀都賦晨鳬旦至候鴈㗸蘆雲飛水宿哢吭清梁詩集鵠化見鴨注鴨亂人逺鳬丨丨天晴喜丨丨丨浴鳬並杜甫人語驚寒塘沉沉栁蕭疏水暗丨丨丨栖鳬張籍寒塘曲傍母眠沙上鳬雛丨丨丨杜啒雛鳴春江無雲水平滿江心啒丨鳬丨丨張籍春江曲江檻底早鳬丨丨丨雙影謾飄颻杜甫漢渚隈颯沓睢陽底浮遊丨丨丨身飛出井見鶴引入琴哀李陵賦詩罷王喬曵舄來何當歸太液翔集動成雷李嶠翻雪羽水亭鳬浴丨丨丨曬雪羽飢鳬丨丨丨並杜牧入槳牙相趂鳬鷗丨丨丨杜甫鷺鷥格物總論鷺鷥水鳥毛白而潔喙長三寸許頂上有毛十數莖毿毿然頸細而長青腳髙尺餘尾短林棲朝出捕鰌魚而食夜歸宿其處百十為羣一名春鉏一名屬玉事類值翿丨其鷺丨詩宛丘值羽丨其鷺丨同上鼓精吳王夫差時有雙白鷺飛出丨中而入雲篁棲並白氏帖中目石雄始討元稹水次見白鷺謂衆曰使吾射丨其丨當成功一發如言孔帖簉羽上官儀曰御史供奉赤墀下丨丨鵷鷺羽扇張融年弱冠同郡道士陸修靜以白鷺丨丨遺之曰此異物奉異人南史花燈正月十五夜玄宗於常春殿張臨光宴白鷺轉丨丨影燈記謝惠連賦有提樊而見獻實振鷺之鮮禽表弗緇之素質詩集一行丨丨白鷺上青天杜兩邊錦石照碧山丨丨白鷺鷥李起圓沙宿鷺丨丨丨杜入遙碧白鷺兒最髙格毛衣新成雪不敵衆禽喧呼獨凝寂孤眠芊芊草久立潺潺石前山正無雲飛去丨丨丨劉禹錫白鷺兒散飛去白鷺間時丨丨丨又如雪點青山雲李白連拳靜沙頭宿鷺丨丨丨杜暗棲松葉深窺思不窮揭趾淺沙中一點山光淨孤飛潭影空丨丨丨丨露雙下蓼花風好是滄波似垂絲意亦同張祐羣捕魚兒霜衣雪髮青玉觜丨丨丨丨溪影中驚飛逺映碧山去一樹梨花落晚風杜牧飛下灘頭間立春塘煙淡淡靜眼寒葦雨颷颼漁翁歸後汀沙晚丨丨丨丨更自由鄭谷獨拳雨裏雙鷺應憐水滿池風飄不動頂垂絲立當青草人先見行傍白蓮魚未知一足丨丨寒丨丨數聲相伴早秋時林塘得爾須增價况是詩家物色宜陶雍詩間淡水邊身風格孤髙塵外物性情丨丨丨丨丨盡日獨行溪淺處青苔白石見鮮鱗歐陽永叔飛來水滿塘屬玉丨丨丨丨丨蘇養直粉毫幽趣多白鷺畫雙素丨丨丨丨丨翹沙依折葦列羽對衰荷浦思懸秋碧江清憶釣簑因君逺相寄時詠到滄波梅聖俞謝紫微以畫鷺二軸為寄鸕鷀格物總論鸕鷀大於鴨色純黑觜長三寸許而尖善入水捕魚也羽族皆卵生而此獨不卵而孕雛於池澤間事類小環挂項俀國水多陸少以丨丨丨鸕鷀丨令入水捕魚以充食隋書雲祀占雨唐正元十三年上以時雨未降幸興慶宫行丨丨忽有白鸕鷀羣類翼從咸驚異之果大雷滂沱唐紀詩集曬翅鸕鷀西日照丨丨滿漁梁杜銜魚一般毛羽結羣嬉兩岸煙汀好景時深水有魚丨得出看來却是鷺鷥飢鷴格物總論鷴鳥羽族之耿介者形類雞翟白質黑章尾長四五尺體備冠距觜瓜純丹最為可玩江南人捕採得其卵即以家雞伏之自小馴狎了無猜驚或呼其名可以就掌取食與家雞無異然亦數般有青者有黑者皆不雜於衆鳥也事類閩越獻丨丨丨髙帝白鷴黑鷴各一帝大悅厚賜之西京雜記蕭頴士白鷴賦白鷳羽族之幽竒也素質黑章爪觜純丹體備冠距頗類夫雞翟神貌清間不雜於衆禽棲止遐深與人境罕接固莫得而馴狎也上聞而徵焉處於雕籠致以驛騎將集長揚遊太液行有日矣天寶丁卯秋豫旅東陽適與兹鳥偕至於會稽之傳舍因感而賦之玉鳥之生矣于彼江山彩之玄素文不綺斑備文武之飾微妖姬之殊顔遊必海裔棲必雲間冀養拙以自保袪朱萌之憂患不然豈陋彼都邑之佳麗顧投身乎阻難以其標自然之靜故名之曰白間者歟何天聽之緬邈辱微禽之鎖細偶一日之見羈委微軀以受制望層城以斂翼懷衆似之孤唳從驛置之駁奔仰君門以遐逝君門兮九重同叫窱兮穹崇池太液兮島方壺萬族翔泳乎其中畫聒未央之繁弦夕驚長樂之靈鍾顧疏野之賤迹豈敢求一枝而見容越水清兮鏡邑吳山逺兮天逼窺淺深以揚影逗杳冥兮一息謂杉松可得永日而噪聚蓴荇足以窮年而啄食一與心賞兮暌違念歸飛兮何極鸚能言而入座鶴善舞而登軒殊二者之俗態諒慚惶於主思是以雖信美而非其志獨屏營而兢魂者馬李太白白鷴詩聞黃山胡公有雙白鷴蓋是家雞所伏自小馴狎了無驚猜以其名呼之皆就掌取食然此鳥耿介尤難畜之余平生酷好竟莫能致而胡公輒贈於我唯求一詩聞之欣然適會宿因援筆三叫文不加點以贈之照請以雙白璧置君雙白鷴白鷴白如錦白雪恥容顔影玉潭裏刷毛琪樹間夜棲寒月靜朝步落花間我願得此鳥玩之坐碧山胡公能掇贈籠寄野人還詩集聚沙堤白鷴處處丨丨丨李白適塘曲弄蔥濛白鷴丨丨丨李華寄趙七侍郎動白蘋見後注映深竹妻子張白鷴結罝丨丨丨李白晴川下喬木暗青山丨丨丨白鷴春雲生嶺上積雪在岩間緑草張新翳柔冠總翠鬟時哉養文素不羡雉斑斑梅聖俞今朝得李白詩中間未識謝莊賦裏見長思丨丨丨爾心雖喜致謝慚無吐鳯詞魏野比雞鶩白鷴形似鵠搖曵尾能長寂寞懷溪水低回愛稻梁田家丨丨丨野食薦杯觴肯信朱門裏徘徊占玉塘蘇穎濵惡鳬鶩常丨靜時丨丨不驚飽處魚蝦與吾間正相似問爾樂復何如文與可青鷴玉兔精神致鷴猶恐鷴飢渴細織筠籠小丸缸丨丨丨丨憐已久金鑾人物世無雙休爭白鶴臨池沼且伴鳴雞向緑窗美羽竒毛有多少爾身安穩勝他邦梅聖俞送白鷴與永叔依韻和公儀山雞形狀丨丨丨丨鶴精神又似漣漪動白蘋物異恩殊堪愛重廟堂人寄草堂人古今合璧事類備要别集卷六十九
