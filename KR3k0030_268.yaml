body:
  text: 古今合璧事類備要别集卷六十二宋謝維新撰五靈門麒麟格物總論麒麟麕身馬足牛尾黃色圓蹄一角角端有肉髙一丈二尺合仁抱義行步中規折旋中矩音中鐘吕遊必擇土翔而後處不履生蟲不折生草不羣居不旅行不犯陷穽不罹網罟中國有聖人則至故毛蟲三百六十而麒麟為之長麟鳳五靈皆王者之嘉瑞也而麒麟為之首稱牝曰麒牡曰麟事類仁獸丨丨麟也靈獸麟四丨之首百丨之先並白帖一角麟丨丨明海內共一主也春秋感精符五蹄白麟一角丨丨漢武紀玄枵精麟者蓋丨丨之丨鶡冠子五行精凡麟生于火遊于土故修其母臻致其子丨丨之丨月令章句雄雌鳴丨鳴曰逰聖丨丨曰歸昌白氏帖春夏鳴丨鳴曰養綏丨丨曰扶幼同上麒在囿黃帝時丨麟丨丨尚書中候麟在郊周之成康丨鳳丨丨藪前武紀獲為不祥魯哀公十四年西狩於大野叔孫氏之車士曰子鋤商丨麟以丨丨丨賜虞人仲尼觀之曰麟也然後取之注麟者仁獸王者之嘉瑞時無明主出而遇獲仲尼傷王道之不興感嘉瑞之無應故修春秋為中興之教也絶筆於獲麟之一句所感而起故所以為終也故曰感麟而作春秋也出非其時鉏商於大野獲麟折其左足孔子袂之曰孰為來哉反袂拭面泣涕沾襟子貢問曰何泣孔子曰麟為明主丨丨丨丨見害是以傷焉家語哀公不識魯丨丨出獵得之而丨丨蓋索而獲之非其自出也故孔子書於春秋曰西狩獲麟者譏之也西狩非其逺也獲麟惡其盡取也狩必書地而丨丨馳騁所涉者多不可遍以名舉故書西以包衆地謂其舉國之西皆至也識人罕識之獸也以見公之窮山竭澤而盡取至於不識之獸皆搜索而獲之故曰譏之孔氏帖芻兒所見孔子夜夢豐沛邦有赤煙氣起顔回子夏侣往觀之驅車到楚西北苑氏之廟丨丨麟伏其前折左足束薪而覆之孔子曰兒來汝為誰兒曰吾姓赤松字時僑名受紀孔子曰汝冇所見乎曰吾有所見一禽如麕羊頭上有角其末有肉方以是西走孔子發薪下麟視孔子趍而往麟蒙其耳吐三卷書孔子精而讀之搜神記元朔年獲漢武丨丨九丨幸雍祠五畤丨白麟一角五足作歌歌之終軍對曰野獸并角同本也殆將有解辮髮左袵冠帶而化者由是改年曰元狩後越地及胸奴王率衆來降白氏帖九真國貢漢宣時丨丨丨丨麟見玉麟麟初晉愍帝即位進位丞相大都督中外諸軍事及西都不守帝移檄西方徴天下之兵尅日請討于時冇玉册丨於臨安白丨丨丨神璽出於江寧其文曰長壽萬年日有重暈皆以為中興之象焉晉元帝紀得鏤麒麟齊中興二年二月監南兖州蕭日南言廣陵宣城內鑿井丨丨丨丨一枝白氏帖麟見壁州前蜀王建武成元年十月丨丨丨丨麟見文州永平二年六月丨丨丨丨麟見永泰三年丨丨丨丨麟見昌州四年丨丨丨丨並孔氏帖一角而趾天祐二年冬十月有獸入吳興丨丨丨麟丨吳越備史屈原楚辭麟可係而羇兮豈異大犬羊杜子美西嶽賦麒麟踆踆而在郊韓昌黎獲麟解麟之為靈昭昭也詠於詩書於春秋雜出于記傳百家之書雖婦人女子皆知其為祥也然麟之為物不畜于家不常有於天下其為形不類非若馬牛犬豕豺狼麋鹿然然則雖有麟不可知其為麟也角者吾知其為麟鬛者吾知其為馬犬豕豺狼麋鹿吾知其為犬豕豺狼麋鹿惟麟也不可知不可知則其謂之不祥也亦宜雖然麟之出必有聖人在乎位麟為聖人出也聖人者必知麟之果不為不祥也又曰麟之所以為麟者以德不以形若麟之出不待聖人則其謂之不祥也亦宜哉韋表微麟臺碑銘聖人之生也得其時則化生江漢不得其時則道屈于季孟季孟之出也得其時則名薦于郊廟不得其時則身自罹於淺天黃山谷麟趾贊麟有趾而不踶仁哉麟哉有角而不抵仁哉麟哉有角而不觸仁哉麟哉今之人一朝之忿以觸人滅身辱親鳴呼人中有獸獸中有人詩集畫麒麟早聞黃聞丨丨丨猶麒麟衆中見毛骨丨是丨丨兒盡麒麟丨是天上丨丨兒泣象尼麟傷丨丨丨並杜騶虞附白虎格物總論騶虞似虎白質黑文尾長於身不踐生芻不食生物日行千里人君有至信之德則應之説文曰白虎諒然乎事類仁獸丨如騶虞詩又白六帖義獸丨丨也白虎黑文一名騶虞瑞應般獸般丨之丨云云兹爾于舜虞氏以興注騶虞詳見後怪獸文王囚羑里散宜生取丨丨尾獻紂以贖其身名曰騶虞尚書大傳于嗟騶虞騶虞鵲巢之應也鵲巢之化行人倫既正朝廷既治天下純被文王之化則庶類蕃植搜田以時仁如騶虞則王道成矣彼茁者葭一發五豝丨丨乎丨丨詩右射騶虞武王克殷後散軍左射貍首丨丨丨丨貫革之射息也虎從騶虞宋元嘉二十六年琅琊有丨丨丨丨白氏帖鹿隨騶虞前蜀永平三年五月騶虞見璧山有二丨丨之同上司馬相如封禪書殷殷之獸樂我君圃白質黑章其儀可喜旻旻穆穆君子之態蓋聞其聲今視其來厥塗靡從天瑞之徴白居易騶虞畫贊騶虞仁瑞之獸也其所感所食暨形狀質文孫氏應瑞圖具載其事元和元年夏有以騶虞圖贈序者豫愛其猛而威內仁而信乂嗟曠代不覿引筆贊之詞曰孟山有獸仁心毛質不踐生芻不食生物有道則見非時不出三季以還退藏于密我聞其名徴之於書不識其形得之於圖白質黑文猊首虎軀是耶非耶孰知之乎已矣夫已矣夫前不見其往者後不見其來者干嗟乎騶虞白虎扶始見女華之妃白丨丨升丘丨白虎其上有雲感以生咎繇元命包宜生獻文王拘羑里散丨丨林氏山得白虎以丨紂免西伯難太公六韜號虎丘吳王闔廬葬於吳縣三月有白虎居上丨丨丨白氏帖號虎吏王葉字小春為荆州刺史卒於枝江往葬亭有白虎來震側出入人間及喪發又踰境吏民為立廟丨白丨丨南郡獲漢宣帝時東立宗廟告祠白虎肉致于殿前神爵元年詔曰丨丨丨白虎朕之不震于珍物同前詩集不虛來騶虞丨丨丨李白不折生騶虞丨丨丨草莖梁甫吟鳳附鸞鸑鷟鵷雛神雀格物總論鳳瑞應鳥太平之世則見是以不常有也其為形也雞頭蛇頸燕項龜背魚尾五彩色髙六尺許雄曰鳳雌曰凰彼其性非梧桐不樓非竹實不食非醴泉不飲凡所棲止衆禽必隨之而集故曰羽蟲三百六十而鳳凰為之長然象鳳者有五多赤色者鳳多青色者鸞多黃色者鵷多紫色者鶩多白色者鵠不可不辨也事類九苞一曰歸命二曰心合度度天度也三曰耳聰達四曰舌屈伸五曰彩色光六曰冠短州州當味色也七曰鋭釣八曰音激揚九曰腹户户所由出入也六象鳳有丨丨頭象天目象日背象月翼象風足象地尾象緯緯五緯也七德戴德揚義背負仁翼挾信心抱忠足履正尾繫武五文首文曰德翼文曰禮背文曰義膺文曰仁腸文曰信行鳴丨丨曰歸嘻止鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰即都知我唯黃持竹實來也已上並六帖居食所居積石千里河出下鳳丨上天為生食其樹名瓊枝髙百二十圍以琳琅為實天為生救之離珠一人三頭遞卧迭起以司琅玕莊子巢阿閣黃帝服齊于中宫坐于玄扈洛上乃有大鳥體備五色或止東園或丨丨丨世紀止東園黃帝即位施恩修德宇內和平未見鳳凰乃召天老而問之曰鳳象何如天老曰曰夫鳳象鴻前而麟後蛇頭而魚尾龍文而龜背燕頷而雞喙首戴法頭揭義背負仁心入信翼挾禮足履文尾繫武小音金大音鼓延頸奮翼五色備舉佳則安來則喜遊必擇所飢不妄下黃帝曰於戲允哉朕何敢與焉於是黃帝乃服黃服帶黃紳戴黃冠齋於中宫鳳乃蔽日而至止帝東園集梧樹食竹實沒身不去韓詩外傳候鳳調律帝軒轅丨丨鳴丨丨枹朴子以鳳名官少昊摯之立也鳳鳥適至故紀於鳥為鳥師而鳥名鳳鳥氏厯正也注鳳鳥知天時故丨名厯正之官左昭十七鳳凰止庭堯即政七十年丨丨丨丨尚書中候鳳凰來儀舜蕭韶九成丨丨丨丨書皇談駕鳳昔辰數治世雖小九次之號曰丨丨丨六丨皇出也衝治三百五十嵗春秋命厯序孟虧馴鳳蕭丨丨人首身為虞氏丨百禽夏后氏之世民始食卵孟虧去之鳳凰隨也六帖鳳舞紫庭周成王時鳳凰來儀於庭成王乃歌曰丨凰翔兮丨丨丨六帖鳳在郊藪周之成康麟丨丨丨丨漢武紀一毛千金周昭王以青鳳之毛為一裘一曰暖質二曰暄肌常以御寒至厲王末猶寶此及厲王流于彘人得而珍之罪有陷大辟者以青鳳毛贖罪免死丨丨丨丨拾遺記厚賜十倍尹文子楚人掘山雞路人問何鳥欺之曰鳳凰也路人曰我聞鳳凰今始見矣汝販之乎請買千金弗與加倍乃與之方欲獻之楚王經宿死路人不遑惜其千金惟恨不得獻王聞之感其欲獻己召丨丨之過買鳥之金丨丨吹簫能至蕭史秦穆時人善丨丨丨丨鳳穆公以女弄玉妻焉一旦隨鳳飛去劉向列仙傳覆巢不翔孔子自衛將入晉至河聞趙簡子殺竇犨鳴犢舜華晉之賢大夫也簡子未得志之時須此三人人而後從政及其已得志也而殺之丘聞之刳胎殺天則麒麟不至其郊竭澤而漁則蛟龍不處其淵丨丨破卵則鳳凰丨丨其邑何則君子違傷其類者也鳥獸之於不義尚知避之況于人乎遂還夫子歎鳳子曰鳳鳥不至河不出圖吾已矣夫語接輿歌鳳楚狂丨丨丨而過孔子曰丨兮鳳兮何德之衰往者不可諫來者猶可追已而已而今之從政者殆而語文章五色五鳳三年鸞凰又集長樂宫東園上飛下至地丨丨丨丨留十餘刻吏民並觀之毛羽五色建武八年鳳髙八尺丨丨丨丨集穎川郡羣鳥並從蓋地數頃留十七乃去東觀漢記鳳集東海昭帝始元三年丨凰丨丨丨遣使祠其處漢末紀鳳集北海宣帝本末十四年丨凰丨丨丨鳳集膠東元年丨凰丨丨丨鳳集潁川黃霸為穎川太守丨丨境內本傳鳳集上林地節三年丨凰丨丨丨乃作鳳凰殿以答嘉瑞鳳凰集魯地節二年丨丨丨丨羣鳥從之鳳凰集栩帝行幸河東之明年春丨丨丨丨於所集處得寶玉乃下詔赦天下鳳凰五集丨丨丨丨改元五鳳鳳十一集神爵四年丨凰丨丨丨杜陵三十九年章帝時鳳凰丨丨丨丨刻木作鳳石季龍與皇后在觀上有詔書五色紙書著鳳凰口中既㗸詔侍人放數百丈緋繩麻纑回轉鳳凰飛下鳳丨丨丨之五色畫之咮腳皆用金顧愷之鳳凰賦曰朱冠赫以雙翹鄴中記植竹待鳳晉符堅時長安謡曰鳳凰止阿房堅曰鳳凰非梧桐不棲非竹實不食乃丨梧桐丨數十萬於阿城以丨之時慕容沖小字丨凰至是終陷堅城入止阿城也六帖彥先鳳鳴晉張華曰顔丨丨丨丨朝陽東南之賢者也孔帖又褚陶傳善感鳳鳴韓瑗與褚遂良相繼死內外以言為諱將二十年帝造奉天宫御史李丨丨始上疏極言時人喜之謂為丨丨朝陽韓瑗傳集通訓門楊國忠帝再幸左藏庫班賚百官內納判官魏仲犀言鳳丨丨丨丨門直庫西有詔改為丹鳳門進仲犀殿中侍御史屬吏率以鳳凰優得調見萬嵗縣前蜀王建天祐七年六月鳯凰丨丨丨丨孔帖五色鳥為鳳五代安重榮饒陽令劉巖獻水鳥五色重榮曰此鳳也畜之五色雀為鳳海南有五色雀常以兩進者為常進止必隨焉俗謂之鳳凰云久旱而輒見雨潦則反是吾卜居憺耳城南嘗一至庭下今日又見之進士黎子雲及其弟威家既去吾舉酒祝之曰若為吾來者當再集也已而果然乃為之賦詩蘇文野鳥類於鳳東漢劉贇鎮彭城之三年有鳥集蘇碧堂庭樹上黃質朱喙金目青翼紺趾玄尾頗類于鳳賓佐或歎曰野鳥入室主人將去矣乃馮道至九國志陳黯詰鳳文嘗聞揚雄云君子在治若鳳在亂若鳳謂隱見之得宜也將欲仰之以為鑒逮覽其劇秦美新則有異乎是雄仕漢遇新室之亂既不能去之乂懼禍及乃為斯文以媚而取容嗚呼鳳若是耶果若是則鳳遇矰繳而徊翔無間也君子之仕也所以行道道之不行也則可以明其節彼葬之不臣雄時在列宜以君子之義興亡之理匡救之以行其道茍畏其威愛其死則可拔簮髙謝以明其節詎冇茍祿貪生徇非飾詐廣引秦過以喻惡則是稔其纂惡也與古之持顛危死節者背而馳也嚮者所著鳳之説得不為誣鳳也哉雞常禽也曉晦而不迷其候鳳靈鳥也理亂而不知其時耶噫言之不思有如是耶昔仲尼仕魯以季桓子荒齊樂知其不可匡也乃去之魯不聞矯為其辭以求庸於魯雖仲尼日月其德人之不侔也楊雄亦慕仲尼之教者以著書立言為事得自易哉夫立言者豈不欲人之從教耶且己不能勝人況求信于人乎語曰君子先行其言而後從之斯言可欺也鸞棲槐上方諸遭母憂負土成堆種松千根鸞鳥丨其上漢書棲槐木辛繕治春秋讖緯隱居華隂光武徴不至有大鳥髙五尺雞頭燕額蛇頸魚尾五色備居而多青丨繕丨丨旬時不去𢎞農太守以聞詔問百僚咸以為鳳太史令蔡衡對曰凡象鳳者五多赤色者鳳多青色者鸞多黃色者鵷多紫色者鷟多白色者鵠今此鳥多青乃鸞非鳳也上善其言三公聞之咸遜位避繕決録注覩影悲鳴罽賓王置一鸞欲其鳴不可致飾金繁享珍羞對之愈戚三年不鳴夫人曰常聞鸞見類則鳴乃懸鏡照之鸞丨丨丨丨中宵一奮而絶異苑應樂飛舞章帝時集郡國王阜世公為重泉令吏民向化鸞止學館阜使授官椽公沙疊為張雅樂舉足垂翅丨丨聲而丨丨復止縣屋留十餘日乃去束觀漢記非鸞所棲仇香為主簿人曰枳棘上丨丨鳳丨丨乘鸞所憩鸞岡在西山洪崖先生丨丨丨丨處也豫章記集浮木上蓬萊浮木之幹有青鸞丨其上王子年拾遺記舞大桂下八月望日唐明皇逰月宫見大府榜曰廣寒清虛之府少前見素娥數十人皆皓衣乘白鸞丨於丨丨丨龍城録鸑鷟鳴於岐周之興也鸑鷟丨丨丨山周語止於庭張薦祖鷟為兒時夢紫文大鳥五色成文丨丨丨丨父曰吾聞五色赤文鳳也紫文鸑鷟也鵷雛鴟嚇惠子相梁莊子往見之惠子恐代其相搜國中三日三夜莊子伏主人馬棧下往見之曰南方有鳥名鵷雛南海而飛之北海非梧桐不棲非竹實不食非醴泉不飲於是丨得腐鼠鵷雛遇仰而視之曰丨子欲以梁國嚇我邪莊子神雀集秦山宣帝元康二年春神雀數丨丨丨夏詔曰今春五色雀以萬數過屬縣翶翔而舞集長樂四年三月詔曰神雀五采以萬數丨丨丨未央改元神爵本紀集丞相府京兆尹張敞舍鶡雀飛丨丨丨丨黃霸以為神雀議欲以聞黃霸傳詩集鳴髙岡丹冗五色羽其名為鳳凰昔周有盛德此鳥丨丨丨和聲隨祥風窈窕相飄揚韓岐山下詩託髙梧靈鳳丨丨丨凌風何翩翩李白五章備鳳飛九千仞丨丨丨綵珍同前一毛生丨丨丨鳳穴杜百鳥尊鳳凰五色丨丨丨知鳶為害何不言韋應物鳶奪巢餐琅玕石朝丨丨丨丨夕飲玉池津江文通飲砥柱湍鳳飢不啄粟所食惟琅玕焉能與羣雞刺促爭一餐朝鳴崑崙丘夕丨丨丨丨歸飛海路逺獨宿天霜寒幸遇王子晉結交青雲端懷思未得報感别空長歎李白鸞垂玉音神鸞丨丨丨陶翔紫霓鸞乃鳳之族翶丨丨雲丨文章輝五色雙在瓊樹西李白古今合璧事類備要别集卷六十二
