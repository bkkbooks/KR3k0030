body:
  text: 古今合璧事類備要續集卷五宋謝維新撰家世門世家歷代源流何謂世家蓋取其仕宦世不乏人虞夏曰世賞書賞延於世商曰世勞世選爾勞周曰世祿世祿之家又孟子仕者世祿以諸侯則世其國以卿大夫則世其家三代而上則然也秦不足道兩漢以來或以襲封或以保任或以世科越魏晉以至于我國朝班班史冊亦莫不然者矣事類世賞丨延于丨書舜典世勞古我先王暨乃祖乃父胥及逸勤豫敢動用非罰丨選爾丨豫不掩爾善兹豫大享于先王爾祖其從與享之世祿丨丨之家鮮克由禮又仕者世祿孟子封魯丨丨公以為周公也周公拜前魯公拜後生以養周公死以為周公主公羊傳命君牙穆王丨丨丨為周大司徒王若曰惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常書為司徒緇衣美武公也父子並丨周丨丨善於其職詩代軍尉祁奚辭軍尉薦其子丨之丨無秕政國語仍叔子天王使仍叔之子來朝丨丨之丨者何天子之大夫也其稱仍叔之子何譏父老子代從政也公羊桓五田嬰女子丨丨有賤妾子名文乘間問其父嬰曰孫之子為何曰為𤣥孫𤣥孫之子為何曰不能知也君用事相齊至今三王矣齊不加廣而君私家冨纍萬金門下不見一賢者文聞將門必有將相門必有相今君後宫蹈綺縠而士不得短褐僕妾餘粱之肉而士不厭糟糠公家之事曰損文切怪萬石君石奮長子建次甲次乙次慶皆以馴行孝謹官至二千石景帝曰石君及四子皆二千石人臣尊寵舉集其門號奮為丨丨丨漢書三司𨽻鮑宣字子都與子永孫昱俱為司𨽻皆乘驄馬京師歌曰鮑氏驄丨入丨丨再入公十世大夫汲黯之先有寵於古之衛國至黯丨丨世為卿丨丨本傳七世內侍霍光以約髮內侍起於階闥之間確然秉志誼形於主受襁褓之託擁昭立宣雖周公阿衡何以加然光不學無術暗於大理死財三年宗族誅夷哀哉金日磾夷狄亡國羈虜漢庭而又以篤敬寤主忠信自著勒功上將𫝊國後嗣世名忠孝丨丨丨丨何其盛也漢霍光金日磾贊父子師傅漢疏廣為太子太𫝊子受為少傅每朝太傅在前少傅在後父子御史杜延年字幼公周之子也為御史大夫延年居父官府不敢當舊位坐卧皆易其處父子通侯蘇武曰武丨丨居列將爵丨丨兄弟親近侍中十人前張安世子孫相繼自宣元以來為丨丨丨常侍者凡丨丨朱輪十人楊憚家全盛時乘丨丨丨丨貂蟬盈幄劉向疏曰今王氏一姓乘朱輪華轂者二十三人青紫丨丨充丨丨內魚鱗左右車馬纍世東京楊氏袁氏纍世宰相為漢名族然袁氏車馬衣服極為奢僣能守家風為世所貴不及楊氏也華嶠書鄧氏寵貴丨丨纍世丨丨凡侯者二十九人太尉二十大將軍以下十三人東京莫盛於此鄧禹傳耿氏興盛丨丨自中興後訖建安末大將軍二人將軍九人卿十三人列侯十九人中郎將刺史二千石數百人與漢興衰父子交代漢公孫賀自太僕卿遷丞相其子敬聲代父為太僕卿子孫典法陳咸孫躬躬子寵寵子忠皆典漢法家世掌法郭躬字仲孫為廷尉丨丨丨丨務在寬平四世太尉楊震至彪丨丨丨丨德業相繼與袁氏俱為東京名族本𫝊三葉侍中馮魴曹褒父子並丨丨丨丨七人廷尉後漢郭文𢎞子孫丨丨為丨丨汝南袁安丨丨丨丨為司徒子敞為司空孫湯為太尉湯子逢為司空逢弟隗為司徒太丘陳實丨丨長丨丨實子鴻臚紀紀子司空羣羣子僕射泰四世仕於漢魏二朝並有重名而其德漸漸小減時人語曰太丘四世公慙卿卿慙長博物志四世鄉郡晉㑹稽孔愈子安國愈孫靖靖二子山士靈符四世五人為本郡太守三世益州汝南周訪訪子撫撫子楚丨丨丨丨五世吏部宋何尚之子偃偃子戢戢子昌㝢昌㝢子敬容丨丨為丨丨四世吏部謝莊莊子朏朏子瀹瀹子覽覽孫溫丨丨五人為丨丨諸傅縣譜南齊傅琰字季圭父僧祐為山隂令琰又為之山隂東土大縣難為官長僧祐在縣有稱尤明察父子並著偉績江左鮮有世云丨丨有治丨丨子孫相𫝊不以示人八葉宰相梁蕭氏興江左實有功在民厥終無大惡以寖微而亡故餘祉及其後裔自瑀逮遘凡丨丨丨丨名德相望與唐盛衰世家之盛古未有也唐八蕭贊三人卿相溫大雅與弟彥博大有皆知名薛道衡見之嘆曰丨丨者皆丨丨材也髙祖兵興引為大將軍府記室參軍主文檄帝受禪遷黃門侍郎而彥博亦為中書侍中對管華近帝謂曰我起晉陽為卿一門三人學士正觀中顔師古相峙勤禮丨丨皆為𢎞文館丨丨一門三相張嘉貞事見後注一門羣從崔義𤣥子神基為相弟神慶子琳等皆至大官羣從數十人三世僕射髙士睿遷尚書右僕射三世此官世榮其貴晉謝安安子琰琰子琨丨丨丨丨四世司空袁明逺祖滂為漢司徒自滂至明凡十二世其間位司徒司空者四世本𫝊三世典選劉珍甫子祥道祥道子齊賢丨丨丨丨韋挺子待賈待賈子萬石陸元方子景融並同典選三世制誥李德林至百藥安期丨丨掌丨丨三㦸崔家崔儼諫議大夫其羣從數十自興寧里謁大明宫冠蓋騶哄相望琳與弟太子詹事圭光祿卿瑶具列棨㦸世號丨丨丨丨萬石張家張潜官至魏州刺史沛同列刺史洽衛尉卿涉殿中監父子兄弟五人皆至三品官謂之丨丨丨丨唐書三相張家張嘉貞元宗時以中書侍郎同平章事子延賞德宗朝復平章孫𢎞靖元和中又平章時號丨丨丨丨鳳閣王家王從易昆仲三人開元中皆鳯閣舍人號丨丨丨丨父子列㦸德宗正元四年詔以太尉中書令西平郡王李晟長子願銀青光祿大夫太子賓客賜勳上柱國與晟門並列㦸父子同朝韓𢎞子公武從𢎞入朝為右金吾將軍𢎞出河中𢎞弟充徙宣武乃曰二父居重鎮我以孺子又當執金吾職乎固辭改右驍衛大將軍父子隔坐吳亮為尚書令子隲為中書令每朝㑹詔以御屏風丨其丨父子侍郎唐崔挹為禮部侍郎子湜遷兵部侍郎父子同為南省副父子節度近世勳將尤貴盛者無如李郭然汾陽西平猶不得丨丨並為丨丨而𢎞正父子俱擁節旄同日拜命元稹田𢎞正墓碑父子中書蘇瓌子頲遷給事中拜中書舍人時瓌同中書門下三品父子同在禁管朝廷榮之為王珉父洽永和為中書令至珉復居之時人以奕世令望父子史官劉子𤣥貺父子修史父子宰相前漢韋賢子元成賢平當子晏唐劉祥道子齊樂彥瑋子思晦道蘇瓌子頲瓌貞季廣子元綋陸元方子象先崔竇德𤣥子令狐楚子綯鉉子沈杜審言子讓能約戴胄子至德珣徐商子彥相李崔慎由子𦙍韋仁承慶嗣立鄭瑜子覃朗吉父子德裕韓本朝吕許公夷簡子公著魏公琦子儀忠彥父子執政丨丨秉政國初至靖康元年凡十二家王惠獻化基參政子安簡舉正參政吕文靖夷簡宰相子惠穆公弼樞密使正獻公著宰相石元懿熙載樞密使子文定中立參政陳給事恕門下侍郎莊敏縝宰相范文正仲淹參政子忠宣純仁參政純禮尚書右丞曹武惠彬樞密使子武穆瑋樞密副使蔡丞相確子懋尚書左丞蔡太師京宰相子攸樞密曽宣靖公亮子孝寬樞密王侍郎博文同知樞密院子忠簡璹樞密使吕文靖之老也以司徒監修國史兼繹經潤史使每有軍國大事與中書門下樞密院同議以聞正獻之老也復以司空同平章事曽令綽之為簽書宣靖猶康寧遂就養東府士林尤以二家為盛事余度却掃篇父子翰長吕文靖公蒙正子公弼公著公亮公孺俱為翰長並青瑣集祖孫宰相曽魯公公亮孫欽道迭為宰相祖孫執政吕正獻孫舜徒季申韓儀公孫似夫和梁莊肅孫才甫靖冨文忠孫錢文僖元孫處王文獻孫康張師黯孫簡翼忠張章簡孫元量孫張榮僖曽孫文蔣穎叔曽子禮叔姪宰相吕文穆䝉正姪文靖夷簡詳見叔姪門注叔姪執政胡文恭從子修簡子林文簡從子彥振史簽樞從文惠章文憲從孫質夫子厚兄弟宰相韓康公弟莊敏兄弟執政吕鎮南弟正惠陳文忠弟文惠獻任康懿弟安惠韓獻肅弟莊敏吳正肅弟正憲王文公弟和甫吕惠穆弟正蔡儋州弟元度文鄧子能弟文簡弟洪文惠弟安宇文仲理宗慤三世執政韓魏公子儀曽孫似夫曽魯公子孝寬孫欽道四世執政吕許公從父文穆子惠穆正獻曽孫舜徒父子兄弟翰苑錢文僖公記父子入院一家李文正昌武兄弟入院三家二竇可象望之二李文靖相州二錢希白師聖以為極盛矣其後父子入院者又四家錢希白子飛梁仲素莊肅蘇儀甫子容洪忠宣景伯景盧景嚴兄弟入院者又九家二陳文惠康肅二宋元憲景文二吳正肅正憲二韓康公持國二蘇文忠文定二曾文昭文肅二蔡元長元度二宇文仲玨仲通三洪然洪氏父子兄弟入翰苑者四人古今所未有也詩集門閥丨丨冠雲霄杜詩家聲丨丨蓋六合同上門闌地甲丨丨大元微之兄弟君家丨丨真連璧門十朱輪家萬石坡詩藉舊業金張丨丨丨七葉珥漢貂左太沖作世家唐朝韓老誇張籍定有雲孫丨丨丨山谷名家歷代源流君子疾沒世而名不稱焉名者古人所不廢也昔髙陽氏才子八人齊聖廣淵明允篤誠天下之民謂之八愷髙辛氏亦才子八人忠肅恭懿宣慈惠和天下之民謂之八元此十六族者世濟其美不隕其名非古名家乎其後有夏后氏有扈氏有男氏斟尋氏彤城氏褒氏費氏杞氏繒氏辛氏宣氏斟氏戈氏則夏之名家也有殷氏來氏宋氏空桐氏稚氏北殷氏目夷氏則殷之名家也管蔡郕霍魯衛毛𥅆郜雍曹滕畢原鄷郇文之昭也䢴晉應韓武之穆也凡蔣邢茅祭胙周公之𦙍也其他如魯三桓齊髙國宋華向衛孫寧鄭七穆晉欒范則周之名家也秦不足道又其後前漢如金張後漢如袁楊三國如顧陸江左如王謝徐庾輩至唐三崔二李燕郡裴范陽盧滎陽鄭太原王大率皆為名家雖其間彊宗巨族不止此然此乃名之尤著也五代人物類無足觀惟我宋五星聚奎首開文明名公巨卿項皆相望文章事業在人耳目登諸國史未易枚數也非天地清明之㑹國家風氣之開我祖宗三百餘年之㴠養詎至於是哉事類九宗冀丨丨五正左三家丨丨者以雍徹注三家謂仲孫叔孫季孫語八佾四彊家羊舌丨族皆丨丨也注四族銅鞮伯華叔魚叔虎兄弟四人左傳四公子繇是列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢競為游俠雞鳴狗盜無不賔禮皆以取重諸侯顯名天下扼攬而游談者以四豪為稱首史世稱醇厚石奮丨以醇厚為行奮四子皆以孝謹位至二千石故景帝召見其父號曰萬石君萬石君過宫闕門必下車步趍見路馬必式之子孫冠者在側雖燕居必冠申申如也童僕誾誾如也唯謹上或賜食於家必稽首俯伏食如在上前其報喪哀戚其子孫遵教亦如之以教謹聞乎郡國荀悅漢紀世名忠孝金敞為光祿大夫中郎敞以丨丨丨丨太后詔留漢書東京楊氏楊氏自震至彪四世太尉德業相繼與袁氏俱為東京名族華嶠書曰丨丨丨丨袁氏纍世宰相為漢名族獨著然袁氏車馬衣服極為奢僣能守家風為世所貴不及楊氏也大丘陳氏丨丨長丨實子鴻臚紀紀子司空羣羣子僕射泰四世於漢魏二朝並有重名博物志學為儒宗劉長卿妻者同郡桓五更鸞之女也長卿卒妻逺嫌疑乃豫刑其耳自誓曰昔我先君五更丨丨丨丨尊為帝師五更以來歷代不替男以忠孝顯女以貞順稱世推長者吳諸顧陸舊族長者世有髙位檄吳文纍葉忠節房𤣥齡曰袁家丨丨丨丨是吾所尚汝冝師之本𫝊一門孝友博陵崔倕緦麻親三世同㸑貞元以來言家法者以倕為首倕生六子一登輔相五任大寮太常卿邠太府卿鄷外臺尚書郎郾廷尉卿郇執金吾鄯左僕射平章事鄲又郾五知貢舉得七百四十人邠昆仲自始仕至貴達亦同居光德里丨宅宣宗聞之歎曰崔鄯家丨丨丨可為士族師法矣鄯構小齊于别寢御筆題以賜號曰德星堂合京兆民因崔氏舊里立德星社詩集尺五天爾家最近魁三象時論同歸丨丨丨注南韋杜去天尺五杜贈韋善詩世德歷代源流古之盛德必百世祀是故論堯舜禹之興者無不本諸黃帝氏蓋言其德之所由始也由是而論商則必本於契之世論周則必本於稷之世下至秦漢魏晉以及于我國朝其積德皆有所從來非一朝一夕之故也然於其命臣也亦然臯陶則曰邁種德盤庚則曰汝有積德周人之詩亦曰世德作求其後春秋秦漢以下不言隂德則言清德又否則言遺德或以遺直稱或以遺愛著代亦不乏此其世德之源流不可不講也事類百世明德必丨丨祀五世君子之澤丨丨而斬小人之澤丨丨而斬孟七世丨丨之廟可以觀德書數世豐水有芑武王豈不仕丨丨之仕也記八世齊懿氏卜妻敬仲云云五世其昌丨丨之後莫之與京左十世謀而鮮過惠訓不倦者叔向有焉將丨丨宥之以勸能者左令聞丨丨長世國語景鍾晉悼公使令狐文子魏犨之孫顆之子頡也佐新軍曰昔克潞之役秦來圖敗晉功魏顆以其身郤退秦師于輔氏親止杜回其勳銘于丨丨至于今不忘國語甘棠秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎曰以其汰乎曰然欒黶汰虐己甚猶可以免其在盈乎秦伯曰何故曰武子之德在人如周人之思召公焉愛其丨丨况其子乎黶死盈之善未能及人武子之施沒矣而黶之怨實彰將是乎在左流光天子七廟諸侯五大夫三士二故德厚者丨丨德薄者流卑是以貴始德之本也始封必為祖注德厚者位尊道隆者爵重故天子逺及七廟諸侯五大夫三士祭祖而已穀梁餘福流光丨丨也漢注書舊廬疏廣歸鄉里日令共具設酒食請族人故舊賓客與相娛樂數問其家金餘尚有幾所趣賣以共具居歲餘廣子孫切謂其昆弟老人廣所愛信者曰子外幾及君時頗立産業基址今日飲食費且盡冝從丈人所勸說君買田宅老人即以閒暇對為廣言此計廣曰吾豈老悖不念子孫哉顧自有丨田丨令子孫勤力其中足以供衣食與凡人齊今復增益之以為嬴餘但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既無以教化子孫不欲益其過而生怨於是族人恱服漢本𫝊髙門見後集大理卿門號通德孔融深敬於𤣥屣履造門告髙密縣為𤣥特立一鄉云云公者仁德之正號不必三事大夫今鄭君鄉冝曰鄭公鄉昔東海于公僅有一節猶或戒鄉人侈其門閭矧乃鄭公之德而無駟牲之路可廣闢門衢令容髙車丨為丨丨門後鄭𤣥傳號不鬭伏湛伏生之後世𫝊經學清靜無競後東州丨為伏丨丨本𫝊稱清白見後集太守門世掌法郭躬家丨丨丨務寬平起自佐史小大之獄必察焉云云法家之能慶延于世蓋由此也後本𫝊世清德楊彪纍世丨丨四葉重光子孫卿相虞詡字升卿祖父經為獄吏案法平允務存寬恕每冬月上其狀恆流涕隨之嘗曰東海于公髙為里門其子定國卒至丞相吾決獄雖不及于公其庶幾乎丨丨何必不為九丨邪故字詡曰升卿子孫冨貴漢何比干有老姥年可八十餘求避雨雨甚而衣不濕比干延入侍之乃曰君先出自后稷佐堯至晉有隂功今天賜之䇿如簡長九寸以授之曰丨丨能佩者丨丨言訖不見當有興者陸元方素清慎再執政每進退羣臣后必先訪問外祕莫知臨終取奏藁焚之曰吾隂德在人後丨丨丨丨諸子皆美才而象先景倩景融知名本𫝊皆若爾孝崔淡曽祖母長孫春秋髙無齒祖母唐事姑孝每旦乳姑一日病召長幼言吾無以報婦願後子孫丨丨丨丨世謂崔氏昌大有所本云同上徐卿二子歌君不見丨丨丨丨生絶竒感應吉夢相追隨孔子釋氏親抱送並是天上麒麟兒大兒九齡色清徹秋水為神玉為骨小兒五歲氣食牛滿堂賓客皆回頭吾知徐公百不憂積善衮衮生公侯丈夫生兒有如此二雛者名位豈肯卑微休世勳事類賜盟昔周公太公股肱周室夾輔成王成王勞之而丨之丨曰世世子孫無相害也載在盟府太師職之桓公是以紏合諸侯而謀其不叶彌縫其闕而匡救其災昭舊職也及君即位孝公諸侯之望曰其率桓之功左僖公二十六纘服君牙惟乃祖乃父世篤忠貞服勞王家厥有成績紀于太常云云今命爾豫翼作股肱心膂丨乃舊丨無忝祖考書勳族郭曜性沈靜貌魁傑父子儀専征伐曜留治家中子儀薨盧杞秉政忌丨丨德宗稍聞之詔曰尚父有大勳力保乂王家嘗誓山河琢金石許宥十世前日其家市田宅而無賴者妄論奪之自今有司無得受勳業馬璘少孤流蕩無業年二十讀漢馬援𫝊至丈夫當死邊野以馬革裹尸而歸慨然曰使吾祖丨丨墜于地乎平泚蔡李晟字良器洮州人世以武力仕朱泚亂德宗狩梁州乃詔晟進尚書左僕射同平章事使平賊大破降之拜司徒兼中書令有十五子其聞者願憲訴聽訴字元直有籌略善騎射以䕃補憲宗朝討吳元濟以訴為節度及平蔡有詔進左僕射東道節度使封沛國公平蜀蔡髙崇文貞元中從韓全義鎮長武城治軍有聲纍官金吾將軍憲宗朝平劉闢有功進西川節度使南平郡王刻石紀功于鹿頭山卒配享憲宗廟子承簡以父功除嘉王傅裴度征蔡奉署牙將蔡平拜溵州刺史世科歷代源流科目始於漢至于隋唐而始備然隋唐之科目與漢魏以來不同今之論科目者當自隋唐始今考隋唐以來科目有曰明經今之經學者是也有曰進士今之詞賦者是也有曰賢良方正茂才異等有曰博學宏詞今亦未之有改也然世科有祖孫聨第者有父子聨第又有祖父以來下及於子孫而聨第者若此者豈不榮家國見稱當世流芳於後代也哉事類思彥子琬韓丨丨舉下筆成章志烈秋霜科擢第丨丨舉茂材擢第又舉文藝優長賢良方正連中並拜監察御史唐本傳欽緒子沇蔣丨丨工文辭擢進士第丨丨舉孝亷蘇瓌子頲丨丨字昌容擢進士第丨丨字廷碩弱敏悟一覽至千言輒覆誦第進士舉賢良方正異等馬載曰古稱一日千里蘇生是也崇敬子登歸崇敬治禮家學多識容典擢明經天寶中舉博通墳典科對䇿第一有詔舉才可宰百里者復䇿髙等授左拾遺丨丨貞元初䇿賢良為右拾遺狐楚子綯令丨丨德棻之裔五歲能為辭章逮冠貢進士丨丨復舉進士白敏中言綯有宰相器貫之子澳韋丨丨名純及進士第擢賢良方正異等子澳亦第進士韋綬子溫丨丨舉孝亷又貢進士擢明經德宗時為翰林學士丨丨方七嵗日誦書數千言十一舉兩經及第父愕然疑假權謁進召而試諸庭文就無留思喜曰兒無愧矣入為監察御史裴守真子丨丨丨舉進士六科連中子餘中明經薛存誠子丨丨丨中進士第丨廷老亦第進士讜正有父風祖孫聨第仁傑孫狄丨丨舉明經第丨兼謨又及進士第剛正有祖風見素後韋丨丨及進士第其丨韋維對䇿髙第挺之孫嚴丨丨舉進士并擢制科丨綬又擢進士第孔戣孫丨丨孔子二十八世孫擢進士第丨緯又第進士餘慶孫鄭丨丨擢進士第丨從讜亦第進士尤知名僧孺孫牛丨丨工屬文第進士元和初以賢良方正對䇿第一丨徽亦舉進士祖父子孫聨第崔融子孫丨丨擢八科髙第曽孫從講學不廢擢進士第從之子慎由聰警强記資端厚有父風采由進士第擢賢良方正異等思謙子孫韋丨丨名仁約及進士第丨承慶又擢進士第弟嗣立與承慶異母亦第進士嗣立丨𢎞景亦擢進士第公綽子孫栁丨丨屬文典正不讀非聖書舉賢良方正直言極諫丨仲郢舉進士第牛僧孺辟武昌幕府有父風矩僧孺嘆曰非積習名教安及此邪丨泚又以明經補祕書正字由書判拔萃纍拜御史大夫吕氏父子本朝吕䝉正字聖功河南人太平興國二年舉進士太宗始臨軒親試擢冠甲科姪夷簡字坦夫及進士第夷簡子公著字晦叔以恩補奉禮郎中進士第司馬父子丨丨光字君實陜州夏縣人初以丨任為將作監主簿舉進士甲科丨康字公休復舉明經中第父子狀元張去華子師德安德裕子守亮梁皓子固祖孫制科錢易父藻子彥逺明逸洪巖父子洪忠宣公皓字光弼其先徽州人唐末避亂徙樂平之丨丨遂為饒州人政和五年登進士第終敷文閣直學士三子邁遵適遵字景岩紹興十二年冠詞科賜進士出身終知樞密院事適字景伯中紹興八年詞科終右僕射兼樞使邁亦中詞科衛國父子丨丨史公告字直翁四明人登隱丑進士第隆興元年年正月拜右僕射兼樞密使五月除知紹興不拜淳熙五復右僕射子彌逺後登科繼相古今合璧事類備要續集卷五
