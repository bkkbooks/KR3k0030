body:
  text: 古今合璧事類備要後集卷四十四宋謝維新撰東宫官總東宫官歷代沿革各載於後逐類下事類德傅晉悼公問於司馬侯曰何謂丨義在君側以善行以惡戒公曰孰能曰羊舌肸習於春秋乃召使丨太子智囊漢文帝拜朝錯太子家令以其辨得幸太子太子家號曰丨丨才學漢賈誼上書曰王者於太子皆選天下端士孝悌博聞有丨丨者以衛翼之使與太子居處出入故其生則見正事聞正言行正道左右前後皆正人也漢書英俊地節中許伯使其弟中郎將舜監護太子家疏廣曰太子國儲副君師友必天下丨丨不宜獨親外家許史同上先馬漢洗馬員十六人秩如謁者如淳注曰前驅也國語曰勾踐為夫差丨丨先或作洗置驛漢鄭當時為太子舍人五日休沐嘗丨丨馬迎賓客保訓漢中宗赤令劉向王褒蕭望之周堪之徒以文章儒術丨丨中宫調護望優四皓然後能丨丨春闈白居易除趙昌制審諭鄧禹名臣方居丨丨之任于志寧書輔導疏受宿望始除丨丨之官同上還拜漢朝錯詣伏生授書丨丨太子舍人高選保輔不可不丨天下之丨山谷望事儲闈晏類要宫邸同上儲闈升宷丨丨亦居清顯文選儲幄陛華丨丨本朝戚表甲觀太子宮有丨丨三輔黃圖又文詞高於丨丨晏類要銅川同上推文士朝丨丨丨選一在陸機二起家為太子洗馬白六帖號玉人時丨丨丨擢於衛玠六帖晉衛玠為洗馬時人丨為丨丨為國器琅琊王第三子皆丨丨丨宜令四海英俊材德傅於東宫山濤啓事作詩頌荀遽字道𤣥拜太子洗馬戴若思特見欽重丨丨丨之序曰洗馬荀道𤣥纍葉重光才經文雅所以弱冠登朝荀氏家𫝊陸亮忠心晋武帝詔曰太子家令丨丨有丨丨可補吏部郎機雲秀望晋中興書吳王入洛唯陸丨陸丨顧榮而已以南上丨丨遷太子舍人記室新書崇敬尊教晉武帝時有司奏東宫二傅禮儀不同帝曰丨丨師傅所以丨丨化此前世之令典也保相擇賢晉齊王攸為太子太傅太子曰丨丨之材必丨丨防間以禮邢顒為曹植家丞丨丨丨丨由是不合庶子劉楨諫曰懼觀者將謂君侯採庶子之春華忘家丞之秋實魏志以五事諌晉江統為太子洗馬太子頗好遊宴或闕朝侍統丨丨丨而丨搜訪賢德唐太宗謂羣臣曰公等丨丨丨丨以輔儲宫妙選人望唐正觀初置太子司議郎丨丨丨丨以來濟為之兼崇文館直學士兼領宫寮正觀以還師傅皆宰相兼領其餘宫寮亦甚重焉馬周以位高恨不得司議郎元箱教太子書兼授學士唐王元感為四門博士詔曰元感性質溫敏博聞强記掎前達之識究先聖之㫖是謂儒宗可授太子司議郎兼崇文館學士輔相東禁丨丨丨丨唐常衮庶子制擢授儲寀寶歷三年詔長慶以來兩河用兵唐元和後偏裨立功丨丨丨丨又瀏洎疏宫宷齒胄講業願令皇太子洎諸王丨丨丨丨嚴師問道輟禽色之娛資逰習之善豈不美哉唐元稹書書諌善諭韋承慶遷太子賢司議郎儀鳯中詔皇太子賢監國時太子頗近聲色承慶上丨丨又為丨丨針以獻太子善之為承華針唐李義府承華針思皇茂則敬詢端輔獻善諭針注見前書諫善諭下為司議郎唐徐浩宗季海元宗時太子司議郎肅宗即位詔令多出於浩元宗𫝊位誥冊皆浩為之司議郎之文翰寵遇罕與比本𫝊改鶴禁衛唐垂拱中丨左右監門率為丨丨丨皆取甲族庾於陵梁天監中拜太子洗馬舊求宫官屬通為清選近代用人丨丨丨丨有才望者時於陵與周捨並擢充此職武帝曰官以人清豈限甲族時論以為美南史盡學宫體梁徐庾屬文好為新變不拘舊體為皇太子家令兼管書記文體既别春坊丨丨丨丨之號自斯而起號徐庾體梁徐庾幼而俊邁聰敏絶倫博覽羣書父肩吾為梁太子中庶子東海徐陵父摛為左衛率陵及子儉並為抄撰學士父子東宫出入禁闥恩禮莫與比陵儉文並綺艷故世丨為丨丨丨當為後進模範服青襟學斛斯正字士亮精三禮周武帝太皇太子丨丨丨受丨於正號為夫子儒者榮之太子三卿家令率更令及太僕為丨丨丨丨儲闈三少太師太傅太保少師少傅少保賓客詹事左右庶子中允中舍諭德贊善洗馬家令率更令皆緣舊制除授而無職司惟建丨丨即置丨丨賓客詹事庶子諭德中舍二人並它官兼充其左右春坊並鐫印置吏員㑹要宫寮羽翼仁宗諭執政曰延安郡王出閣當議丨並乃曰司馬光名重宜為丨丨乃漢羽翼之謂如呂公著孫覺皆可任之後當擇功臣子弟如文貽慶之類是以取重東宮矣聞見録縉紳羽翼以丨丨之望有丨丨之勤本朝戚表晏殊謹厚丨元獻公丨為館職時天下無事許臣寮擇勝飲晏公貧甚不能出獨家居與昆弟講習一曰選東宫官忽中批除晏殊執政莫諭所因次日進呈上諭曰近聞館閣臣寮無不嬉遊戲賞惟殊杜門與兄弟讀書如此丨丨臣可為宫官公既受命上面諭除授之意公曰臣非不樂燕遊者直以貧無可為之具上益嘉其誠實知事君體眷注日深俊卿誦諷陳俊卿在普安郡王邸每當講必𫝊經啓沃王深器之一日王習毬鞠公取韓愈諌封建書以諷王即為諷全文不遺一宗公退而喜曰王聰明而樂諫社稷之福也言行録王韓厚德神宗就邸英宗命韓魏公擇宫寮用王陶韓魏等皆厚德之士一日侍坐內侍以宮樣靴進維曰王安用舞靴神宗亟令毁法嘗引侯請郡將去王府採東平樂善之語為贊以獻慈聖垂簾諭宰臣曰諸王仁孝日聞皆卿等擇宫臣所置召至中書褒諭同上范朱極選一曰上語鼎曰欲令孝宗御諱出閣選官教之且就禁中置學館便建資善堂庶幾正當鼎乃與同列議選丨冲丨震為翊善朝論以二人為天下之丨丨上謂鼎曰臺諫語及資善之建皆曰如朱震范冲天生此二人為今日資善之用可謂得人矣趙鼎事誕日勉進學黃裳為嘉王府翊善因王丨丨乃作渾天儀以獻為歌詩丨王丨丨如天而不息樓攻愧集封王命贊讀資善堂翊善贊讀紹興五年六月初置命宋子開范元長孝宗以建國公就傅故也其後孝宗出閣就第信王幼亦命近臣踵為之開禧元年皇子初封榮王命陳少逸兼讀少逸以祖諱辭乃命趙贊子中兼領不稱王府而以資善係銜蓋以未出閣之故唐楊炯庭菊賦序庭菊美貞芳也天子幸於東都皇儲監守於武德之殿以門下內省為左春坊今庶子斐公所居即黃門侍郎之㕔事也其庭有菊焉中令薛公昔拜瑣闥此焉遊處令兼左庶子止干東㕔甍宇連接洞門相向每罷朝之後未嘗不游於斯詠於斯覽叢菊於斯是日也薛覬以親賢為洗馬田巖以幽貞為學士高元思張師德以至孝託後車顔强學沈遵行以博聞兼侍讀周琮李憲王祖英曹叔文以儒術進崔融徐彥伯劉知柔石抱忠以文章顯德行則許子豐耆舊則權無二駱演則詁訓之前論張相則老莊之後興並承髙命咸窮體物小子託於吹竿之末遂作賦云程伊川論經筵劄自古人君守成而致盛治者莫如周成王成王之所以成德由周公之輔養皇帝陛下春秋之富睿聖之資得於天稟而輔養之道不可不至所謂輔養之道非調告詔言過而後諌也在涵養薰陶而已大率一日之中接賢士大夫之時多親寺人宫女之時少則自然氣質變化德器成就臣欲乞朝廷謹選賢德之士以待勸講講讀既罷幸留二人直日夜則一人直宿以備訪問皇帝讀習之暇游息之間時於內殿召見從容宴語不獨漸摩道義至於人情物態稼穡艱難積久自然通達俾之常在深宫之中為益豈不甚大伊川文集詩集玷銅門屬叨金馬署又丨丨龍丨文選妨儲𨽻三丨丨丨五塵朝黻顔延年應詔曲水富詞藻之子摛文章縱橫丨丨丨舒錊悲先麗握珠謝竒寶唐王筠贈蕭洗馬奉儲明薄官丨丨丨唐褚亮詩託承輦丨身丨丨側舞劒遵銅車注銅輦太子車也陸機赴漕詩太子太師歷代沿革見總門事類師範丨丨國儲唐陸集李勉太子太師制師保贊翼皇儲允歸師保曲阜行歧王範太子太師制宫師丨丨之尊曲阜行蔣之竒贈殳制春闈輔翼丨丨是資教導陸宣公集李勉太師制忠蹇唐太子承乾與魏王秦交惡帝曰當今丨丨無踰魏證我遣𫝊太子一天下之望羽翼固矣即拜太子太師證以疾辭詔答曰漢太子以四皓為助我賴公其義也公雖卧可擁全之唐書推美馮定為太子詹事時宰臣鄭覃兼太子太師欲於尚書省上事定奏曰據六典太師居詹事府不合於都省禮上乃詔於本司上事人丨丨之同上同三品唐長孫無忌為太子太師同中書門下三品丨丨丨自此始唐職林長庶僚𫝊道元子帥丨丨丨遜逖行信安王禕太子太師制作訓元儲丨丨丨丨許敬宗除太子太師制來儀博望丨丨丨丨曲阜行歧王範太子太師制銀印青綬晉官令云太子太師丨丨丨丨金墀銀棨晨詢丨丨事切於忠蹇夜隨丨丨義先於調護許敬宗除太子太師制詣崇賢門皇太子丨丨丨丨迎師傅晉東宫故事極宫臣位俾丨丨丨之丨唐孫逖行信安王禕太子太師制年八十守節唐顔真卿改太子太師李希烈陷汝州盧杞乃建遣真卿四方所信若往諭之可不勞師而定詔可公卿皆失色李勉以為失一元老貽朝廷羞密表固留至河南府南尹鄭叔則以希烈反狀明勸不行答曰君命可避乎既見希烈時朱滔王武俊田悅李納使者皆在坐謂希烈曰聞太師名德久矣公欲建大號而太師至求宰相孰先太師者真卿叱曰若等聞顔常正否吾兄也祿山反首舉幾師後雖被執詬賊不絶于口吾丨且丨丨官太師吾丨吾丨死而後已豈受若等脅邪諸賊失色唐本𫝊年八十如儀唐盧鈞守太子太師帝元曰大饗含元殿鈞丨丨丨升降丨丨音吐鴻暢舉朝􅢻歎太子太傅歷代㳂革詳見總門事類審道太傅丨父子君臣之丨以示之漢賈誼䇿掌禮後漢太子太傅一人職丨輔導太子丨如師不領官屬恭謹石奮孝文時丨丨舉朝無與比太子太傅缺選可傅者皆推奮遂為太子太傅孝謹石奮子慶循行丨丨元狩元年立太子選郡臣可傅者慶自沛守為太子太傅賢才顯宗始立為皇太子詔問誰可傅太子者群臣皆言隂識可博士張佚曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之丨丨帝曰欲置傅者以輔太子也今博士不難正朕况太子乎即拜佚為太子太傅而以榮為少傅後桓榮𫝊名儒三國吳程秉事鄭元避亂交州與劉熙考論大義遂博通五經孫權聞其丨丨以禮召既到拜太子太傅奉觴踈廣字仲翁為太子太傅廣兄子受為少傅宣帝置酒太子躬丨丨以為夀上甚嘉之親拜晉賀循字彥先為世儒宗除太子太傅命皇太子丨往丨之獻針晉齊王修為太子太傅丨丨曰保相之材必擇賢明讓田唐于志寧兼太子少師俄遷少傅丨丨嗜鮑魚丈王使太公望𫝊太子發生丨丨丨望曰鮑不登于爼安有非禮之物養太子哉乞骸骨疏廣為太子太傅上疏丨丨丨詳見三師三少不稱臣魏太傅於太子丨丨丨禮如師後漢太子太傅一人職掌輔導太子丨丨丨不領官屬正法服何䕫字叔龍為太子太傅每月朔太傅入見太子太子丨丨丨而禮焉魏志訪政理唐趙宗儒太和初進太子太傅文宗詔丨丨丨對曰堯舜之化慈儉而已願陛下守之帝納其言諌易太子前漢叔孫通為太子太傅高帝以趙王如意易太子通曰太子天下之本本一搖天下震動奈何以天下為戲髙帝曰吾聽公躬訓儲宫晉賀循為太子太傅詔曰循清真履道居身以中約為本立德以仁遜為行丨丨丨丨默而化成中興書琢磨以道太子太傅日就月將琢磨王質言太子有王之質丨丨丨丨也唐卲漢官儀立草為訓傅暢晉公卿禮祑太傅丨丨少傅書真以丨儲丨父子為榮漢疏廣地節中為太子太傅兄子受拜少傅丨丨並為師傅朝廷以丨丨師傅為榮漢夏侯勝為太子太傅受詔撰論語年九十卒太后為勝朞服報丨丨之恩儒者以丨丨漢擇名儒丨丨丨丨任先疏廣事見前晉崇碩德丨丨丨丨選在山濤同上以名臣拜後漢明帝鄧禹先朝名臣拜太傅以驃騎充晉王充丨丨丨丨大將軍拜太子太保當今無輩吳張溫少修節操孫權聞之問曰溫當今與誰為比顧雍曰丨丨丨丨召見占對觀者傾悚權改容加禮拜議郎選曹尚書尋太子太傅一時儒宗賀循為太子太傅時朝廷初建動有疑義宗廟制度皆循所定朝野以為丨丨丨丨詣崇賢門張勃晉東舊事皇太子於二傅執弟子禮入見太子丨丨丨丨太子為傅拜合答拜入坐對坐講宣武堂晉山濤為太傅丨於丨丨丨東步輦導太子梁冠黑幘晉一將進賢兩丨丨丨介丨五時朝服佩水蒼玉晋官令品銀章青綬太子太保太傅丨丨丨丨佩蒼玉輿服志寵極腰銀丨丨丨丨榮深佩玉丨丨丨丨同上升傅儲宫丨丨丨丨曲阜行姚福太子太傅制保傅承華丨丨丨丨鄭政制東朝二品丨丨丨丨曲阜行蔣九臯贈太子太傅制前將軍等傅魯論語二十篇太子太傅夏侯勝丨丨丨蕭望之丞相韋賢及子𤣥成丨丨之論語序位視尚書令梁太傅一人丨丨丨丨丨隋百官志詩集英台灼灼丨丨沈約詩德傅峩峩丨丨同上太子太保歷代沿革詳見總門事類直臣後魏顯祖將禪位於京兆王子推陸馥抗言皇太子聖德承基四海屬望臣請刎頸殿廷有死無二久之帝意解語曰馥丨丨也其能保吾子乎遂以為太保德導蕭瑀為太子太保太宗曰三師以丨丨太子者也禮不尊則無所取法保其身見總類歸諸道保也者謹其身以輔翼之而丨丨丨者也文王世子開府加劉實字子真以特進丨丨丨太子太保王隱晉書特進行懷帝以荀組為侍中丨丨丨太子太保召公為保丨丨丨丨書君奭世子有保凡三王教丨丨入則丨丨記詳見總門加兼太保唐張茂昭憲宗元和二年詣朝五奏乃聽願留不許丨丨丨子丨丨春官保氏丨丨丨丨曲阜除文金制舊相當寵異本朝王漙乾德二年罷為太子太保故事一品班於臺省之後太祖因見漙曰漙丨丨丨丨丨之即令分臺省班於東西國史春宫秩甚尊丨丨三太名丨丨丨曲阜行蘇頌太子太保制古今合璧事類備要後集卷四十四
