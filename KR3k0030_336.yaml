body:
  text: 古今合璧事類備要外集卷三十六宋謝維新撰服飾門裳附裙字袴作裩褌亦身章撮要裳下飾以羅為表絹為裏其色天子諸侯朱大夫素士玄黃裳之雜色也凡七幅殊其前後前三幅後四幅繡四章藻粉米黼黻於其上裙即裳按釋名羣也謂運接羣幅而為之亦曰襱袴脛衣亦謂之袑褌褻衣小袴按説文云亦曰衳音鏱字亦作惚事類四章元衣纁裳十二章八章在衣日月星辰山龍華蟲火宗彜丨丨在裳藻粉米黼黻其衣褾領為三禮圗六章十二章丨丨在裳宗彜藻火粉米黼黻通典纁裳見上黃裳丨丨元吉易坤垂裳昔者黃帝堯舜氏作丨衣丨而天下治蓋取諸乾坤易係衣裳宣王考室云云乃生男子載丨之丨注裳下之飾箋男子生而卧於床尊之也裳晝日衣丨以丨者明當主於外事毛詩錦裳裳丨褧丨詩鄭風繡裳黻衣丨丨詩秦風縫裳摻摻女手可以丨丨詩魏風製裳丨彼丨衣勿士行枚詩東山曳婁子有衣裳弗丨弗丨詩山有樞顛倒東方未明丨丨衣裳丨之丨之自公召之東方未晞丨丨裳衣倒之丨之自公令之詩齊風裳不加緣見后袴注羽裳吹簫張昌宗王子晉後身武后使被丨丨丨丨乘寓鶴裴回庭中如仙去狀孔六帖霓裳一曲唐明皇覽成帝傳以趙飛燕體輕能為掌上舞置七寶避風臺謂妃子曰爾則任吹多少妃子曰丨丨丨丨足以高掩前世裙曳地三寸婦人裙不過五幅丨丨不過丨丨唐奭服志曳地五寸淮南觀察使李德裕今管內婦人裙丨丨四丨丨者減三寸布裙俱隱後漢孟光姿貌甚醜德行極髙梁鴻聘以為妻常荆叉布裙與鴻隱霸陵山中毛裙以獻唐安樂公主使尚方合百鳥丨織二丨詳見衣服注袴溺袴漢周仁景帝時為郎中令為人隂重不泄常衣弊補衣丨丨故為不潔清以是得幸於後宮袐戲仁常在旁終無敢言注溺讀曰尿尿袴者為小袴以藉其尿本傳窮袴漢昭帝上官皇后霍光外孫也光欲后擅寵有子帝時體不安左右及醫者皆阿意言宜禁內雖宮人使令皆為丨丨多其帶後宫莫有進者注窮袴有前襠不得交通朱博大袑見衣服注廉范五袴後丨丨為蜀郡太守民歌曰廉叔度來何暮平生無襦今丨丨本傳馬援布袴丨丨牛羊散與故舊身衣丨丨祭遵布袴丨丨奉公賞賜與士卒家無私財身衣丨丨卧布被夫人裳衣不加緣飾主疑所取陳重字景公舉孝廉為郎同舍郎有告歸寧者誤持鄰舍袴以去丨丨重丨丨不自申説市袴償之後歸寧者歸以袴還主其事乃顯人謂通健買逵貧無袴晨著妻兄柳李袴而去時丨丨之丨丨也衣刺紋袴謝尚及長辨悟絶倫好丨丨丨丨諸父責之因自改知名獻蘭縑袴李白遊慈恩寺僧用水松牌乞詩白為題訖僧丨丨丨丨雲仙散録海墨微言為通身袴朴子蠻以青娑羅丨丨丨丨褌露褌上聽事宋宗室茂德封桂陽侯性庸騃為郢州刺史暑月丨丨丨丨丨作褌賜軍士梁吉士瞻少時擲博無褌褰露為儕輩所侮及為將軍得絹三萬匹乃丨為丨其外並丨丨詩集霓裳風吹仙袂飄飄舉猶似丨丨羽衣舞白樂天長恨歌裙開裙陵度丨丨􅙭􅙭丁頰反梁劉遵詠舞出裙見後禨注醉紅裙惟能丨丨丨韓哀練裙丨哉丨丨子坡芾附韠身章撮要芾即韠也韋為之所以蔽膝其色視裳其形園殺直天子四角直無園殺公侯殺四角使之方變於天子也所殺者去上下各五寸大夫圜其上角變於君也士上下正士賤與君同不嫌也然天子之士則直諸侯之士則方大抵下廣二尺上一尺長三尺其頸五寸兩角皆上接革帶以繫之字從巾取象連帶之形亦作韍冕服謂之芾朝服謂之韠名雖不同其義一也又一説以羅為表絹為裏其色纁上有純下有緆去上五寸繪以山火事類緼韍一命丨丨幽衡再命赤韍幽衡三命赤韍蔥衡注緼赤黃之間色記玉藻朱芾斯干宣王考室也乃生男子云其泣喤喤丨丨斯皇室家君王注天子純朱諸王黃朱芾從裳色祭時服纁裳故芾用朱赤但芾所以明尊卑雖同色而有差降詩赤芾君子來朝言觀其旗云云丨丨在股邪幅在下彼交匪紓天子所豫注諸侯丨丨邪幅幅逼也所以自逼束也云云詩采菽蔥衡方叔率止云云服其命服朱芾斯皇有瑲丨丨詩韎韐瞻彼洛矣思古明王能爵命諸侯賞善罰惡焉云云君子至止丨丨有奭注丨丨者茅搜染草也一曰丨丨所以代韠也素韠素冠刺不能三年也庶見丨丨兮注祥祭朝服丨丨者韠從裳色詩莊疑祝天下有道我韍子佩天下無道我負子戴詩集扶病垂朱丨丨丨丨紱杜詩白髮映朱晚遇何足言丨丨丨丨紱白樂天朱紱還鈴閣便留丨丨丨丨丨同上紳身章撮要紳大帶所以搢笏垂三尺天子素芾朱裏以繒采飾其側諸侯不朱裏大夫飾其紐及末士但飾其末而已處士錦芾子縞並紐約用組組之廣三寸長齊于帶麻者不紳此古之制也今按深衣用大帶以白繒廣四寸夾縫之其長圍腰而結於前再繚之為兩耳乃垂其餘為紳下與裳齊以黑繒飾其紳復以五綵絛廣三分約其相結之處長與紳齊所謂紳者所以自紳約也事類搢圭典瑞王丨大丨注謂丨之於紳帶之間禮搢笏端韠紳丨丨記內則昭數鞶厲遊纓丨其丨也注鞶紳芾左威二年垂足凡侍於君丨丨如履齊音咨記玊藻拖紳疾君視之東首加朝服丨丨語十書紳子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉子張丨諸丨語十五搢紳之徒丨丨先生丨丨儼然造焉司馬長卿難蜀文搢紳之人冠帶丨丨丨丨園橋門者億萬計後儒林傳歐陽公晝錦堂記垂紳搢笏不動聲色措天下於泰山之安云云腰帶附銙身章撮要腰帶革為之古鞶帶也又謂之鞶革上自乘輿至文武衆官牧守丞令下及騶寺皆服之反插垂頭飾以銙其有囊與綬則以綴於帶而垂亦以搢笏也銙玉不離石犀不離角可貴者惟金事類垂帶丨丨如厲注厲丨貌詩都人士褫帶或錫之鞶革終朝三丨之易訟卦鞶厲丨丨遊纓昭其數也左威二年鞶鑑鄭伯之享王也王以后之丨丨豫之注后王后也丨帶而以丨為飾也今西方羌胡為然古之遺服左莊二十一年始名秦二世丨丨腰帶順下唐初詔令腰帶搢垂頭於下名曰䤩尾取丨丨之義一品二品銙以金六品以上以犀九品以上銀庶人以鐵並炙轂子于闐玉李靖五代孫彥芳其舊物有靖破蕭銑時所賜丨丨丨帶十三胯七方六刓胯各附環以金固之所以佩物者天子悉留禁中孔六帖葉護金統丨丨可汗獻萬釘竇鈿丨帶突厥傳黃銀帶杜如晦薨帝嘗賜玄齡丨丨丨曰如晦與公同輔朕今獨見公泫然流涕曰世傳丨丨鬼神畏之更取金丨遣玄齡送其家白玉帶楊元卿穆宗賜卿丨丨丨王播獻丨丨自淮南還丨玉帶十有三遂再得相李訴遺丨丨以玊帶丨牛元翼以賜遺帶馬植進中書侍郎初左軍中尉馬元贄最為帝寵信賜通天犀帶而植素與元贄善至通昭穆元贄以賜帶遺之它日對便殿帝識其帶以詰植植震恐具言狀於是罷為天平軍節度使出寶帶夸盧從史初神策中尉吐突承璀與對疊從史時過其營飯博承璀多出寶帶奇玩誇之六帖銀袍鈿帶可汙拜蘇祿左羽林大將軍賜丨丨丨丨七事錦袍寶帶契苾明征吐蕃以戰多進左威衛大將軍賜丨丨丨丨水玉帶賜文宗朝李訓講周易頗協上意時方盛夏遂命取丨丨腰丨以丨訓唐杜陽編紫金帶賜上以丨丨丨丨岐王蓋昔髙宗破髙麗所得開元中髙麗遣使來朝宴內殿因從容言於內臣曰丨丨丨本國亡是嵗荒民散干戈屢起幸在內帑一見足矣上聞之命封付其使紅玉帶賜上自解丨丨丨丨寧王明皇雜録使速以獻萇從簡陳州人許州富人有玉帶欲之而不可得遣二卒夜入其家殺而取之卒夜踰垣隱木間見其夫婦相待如賔二卒歎曰吾公欲奪其寶而害斯人吾必不免因躍出而告之使其速以帶獻遂踰垣而去以無為解鳳翔李永吉初朝京師蘇逢吉以永吉救秦王從曮子家世王侯當有奇貨使人告永吉許以一州而求其先世玉帶永吉丨丨丨丨逢吉乃使人市一玉帶直數千緡責永吉償之既而不得州五代史辛漢臣傳殺商取帶楚馬希聲海商有鬻犀帶者直數百萬晝夜有光洞照一室希聲丨丨而丨之逾月光遂滅九國志終日不休崔元綜同平章事坐政事堂束帶丨丨丨丨偃先朝所賜晉公平淮西賜以玉帶公臨薨却進口占奏狀曰內府之珍丨丨丨丨既不合將歸地下又不合留在人間聞者歎其不亂因話録賜毬文章宋璞等事見前袍內注不買玉帶王文正公旦有貨玉帶者持以及門弟因獻公公曰如何弟曰甚佳公命繫之還見佳否弟曰繫之安得自見公曰玉名石也得不重乎自負重而使觀者稱好無乃勞也我腰間不稱此物亟還之故平生所服止於賜帶名臣遺事願得金帶韓魏公事見度量門銙三品金唐髙宗咸亨三年敇五品以上賜新魚袋並飾以銀三品以上賜金裝刀子礪石一具上元中又敕文武官三品以上賜金玉帶四品五品並金帶六品七品並銀帶八品九品並䃋石帶庶人銅鐵帶文武並帶手巾算袋刀子礪石武官欲帶亦聽之九月百官具新服上宴之于麟德殿唐舊史庶人鐵見前各附金環事見前于闐玉注創為金銙太宗皇帝曰玉不離石犀不離角可貴者惟金丨丨丨丨以賜羣臣方團毬路賜兩府御仙花賜學士以上今俗為毬路為笏頭為御仙花為荔枝歸田録詩集垂蒼玉帶丨丨丨佩韓割方玉密裝腰鞓丨丨丨李賀酬答懸金魚玉帶丨丨丨韓繞腰光銀魚金帶丨丨丨白樂天古今合璧事類備要外集卷三十六
