祿山子慶緒史思明父子繼起肅宗命李光弼等討之號九節度師久之盜滅而武夫戰卒以功起行陳列為侯王皆除節度使唐兵志兵帥自擇留後杜牧追咎長慶以來朝廷措置亡術復失山東巨封劇鎮地大者連州十餘小者猶兼三四故丨驕則逐丨帥强則叛上或父死子握兵而不肯代取捨由於士卒往往丨丨將吏號為丨丨以邀命于朝天子力不能制因而撫之謂之姑息之政姑息愈甚而兵將愈俱驕由是號令自出以相侵擊同上節度軍州三印祥符中上覽河南節度使知許州石普奏狀用許州觀察印以問宰相王旦曰丨丨丨丨丨丨兵仗則節度判官掌書記推官署狀用節度印印之田職則觀察判官署狀用觀察印印之符制屬縣則大使判署用州印印之降麻非昔故事唐制節度使除僕射尚書侍郎者謂之納節皆不降麻止舍人院草制天禧中丁謂自保信軍節度使除吏部尚書參知政事先公在西閣草制政和中韓公自武康軍節度使除工部尚書三司使丨丨丨丨丨也春明退朝録三世節度一家吳璘子挺孫曦四世節使二家錢忱髙祖俶曽祖惟演父景臻鄭藻大父紳父成之子與裔五世節使一家韓托胄曽祖忠獻從子邈從同卿曽孫俟父子建節十三家劉光世父延慶錢忱父景臻邢煥子孝揚韋淵子謙吳珍子拱吳璘子挺郭浩孫杲楊存中子倓劉錡父武仲吳益子琚珽吳蓋子瓌吳挺子曦兄弟建節七家吳玠璘錢忱愐韋謙讜吳益蓋吳拱挺吳琚瓌珽李孝友孝純宋子京唐藩鎮𫝊序安史亂天下至肅宗大難略平君臣皆幸安故瓜分河北付授吏將護養孽萌以成禍根亂人乘之遂擅署吏以賦稅自私不朝獻于廷效戰國肱髀相依以土地𫝊子孫脅百姓加踞其頸利怵逆汗遂使其人自視猶秦越然一寇死一賊生訖唐亡百餘年卒不為王土當其盛時蔡附齊連內裂河南地為合從以抗天子杜牧至以山東王不得不王霸不得不霸賊得之故天下不安又曰厥今天下何如哉干戈朽鈇鉞鈍含忍混貸煦育逆孽殆為故常而執事大人曾不歷算周思以為宿謀方且嵬岸抑揚自以為廣大繁昌莫已若也嗚呼其不知乎其俟蹇頓顛傾而後為之支計乎且天下幾里列郡幾所自河以北蟠城數百角奔為寇伺吾人憔悴天時不利則將與其朋伍駭亂吾民於掌股之上今者及吾之壯不圖擒取乃偷處恬逸以為後世子孫背脅疽根此復何也議者曰倔强之徒吾以良將徑兵為銜䇿髙位美爵充飽其腸安而不撓外而不拘猶豢虎狼而不咈其心則忿氣不萌此大厯貞元所以守邦也何必疾戰焚煎吾民然後為快也愚曰大厯貞元之間有城數十千百卒夫則朝廷貸以法故於是濶視大言自植一家破制削法角為尊奢天子不問有司不呵王侯通爵越録受之覲聘不來几杖扶之逆息驕嗣皇子嬪之地益廣兵益强僣擬益甚侈心益昌土田分器分劃大盡而賊夫貪心未及畔岸淫名越號走兵四略以飽其志趙魏燕齊同日而起梁蔡吳蜀躡而和之其餘混澒軒囂欲相效者往往而是運遭孝武前英後傑朝思夕議故能大者誅鉏小者惠來大抵生人油然多欲欲而不得則怒怒則爭亂隨之是以教笞於家刑罰於國征伐於天下裁其欲而塞其爭也大厯貞元之間反此提區區之有而塞無涯之爭是以首尾指支幾不能相運棹凡今者無知非此而反用以為經將見為盜者非止於河北而已嗚呼大厯貞元守邦之術永戒之哉魏博𫝊五世至田𢎞正入朝十年復亂更四姓傳十世有州十成德更二姓𫝊五世至承元入朝明年王廷湊反𫝊六世有州四盧龍更三姓𫝊五世至劉揔入朝六月朱克融反𫝊十二世有州九淄青𫝊五世而滅有州十二滄景𫝊三世至程權入朝十六年而李全略有之至其子聞一作同捷而滅有州四宣武𫝊四世而滅有州四彰義𫝊三世而滅有州三澤潞𫝊三世而滅有州五雖然迹其由來事有因籍地之輕重視人謀臧否歟今取擅興若世嗣者為藩鎮𫝊若田𢎞正張孝忠等暴忠納誠以屏王室自如列傳云唐韓愈與邢尚書書今閣下為王爪牙為國藩垣威行如秋仁行如春戎狄棄甲而逺遁朝廷髙枕而不虞是豈負大丈夫平生之志願哉是豈負明天子非常之顧遇哉赫赫乎洸洸乎功業逐日以新名聲隨風而流宜乎歡呼海隅髙談之士號召天下慕義之人使或願馳一𫝊或願操一戈納君於唐虞收地於河隍然而未至乎是者亦蓋有其說云豈非待士之道未甚厚遇士之禮未甚優請粗言其事閣下試詳而聽之云云詩集紅斾丨丨將軍昨日歸白居易詩注藩鎮例驅紅斾㦸門建牙吹角丨丨喧三十登壇衆所尊家散萬金酬死士身留一劔答君恩漁陽老將多回席魯國諸生半在門劉長卿獻寧淮軍節度相公詩篤家聲詔發山西將秋屯隴右兵凄凉餘部曲燀赫丨丨丨鵰鶚乘時去驊騮顧主鳴艱難須上䇿容易即前程斜日當軒蓋髙風卷斾旌安邊仍扈從莫作後功名杜甫送郭中丞充隴右節度詩近總戎詔出未央宫登壇丨丨丨上公周太保副將漢司空弓抱關西月旗翻渭北風岑參送李太保充渭北節度詩古今合璧事類備要後集卷六十
