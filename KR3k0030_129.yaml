body:
  text: 古今合璧事類備要後集卷六十宋謝維新撰節相門開府儀同三司歷代㳂革漢文帝元年用宋昌為衛將軍位亞三司漢書無位亞三司之文事見通典章帝建初三年使車騎將軍馬防班同三司三司之名始此殤帝延平元年鄧隲為車騎將軍儀同三司儀同之名始此魏黃權以車騎將軍開府儀同三司開府之名始此東觀漢記魏志晉羊祐為車騎將軍開府如三司之儀晉起居注自是以後又有如開府同三司之儀者自祐始馬通典宋太宰已下至光祿大夫開府者為文公大司馬以下至諸將軍開府者為武公沈休文宋書梁置位次三公從一品隋開皇中以為四品散官煬帝改為從一品同漢魏之制位次王公隋百官志唐武德改為輕車都尉後以開府儀同三司為文散官唐職官志雖三公三師亦必冠以此號國朝因唐節度使兼平章事久缺則兼中書令侍中號使相元豐官制既罷同平章事遂以節制開府為使相而文武寄祿官亦存之職略南窗紀談事類朱服魏以後將軍開府依大司馬丨丨皂服光祿大夫開府依司徒丨丨同上衮職徐孝嗣加儀同三司孝嗣聞詔斂容謂左右曰吾德慙古人位登丨丨將何以堪之固辭不受齊書儀台權相嚴震墓志云階極丨丨晏云必開府儀同三司也如公南齊百官志云開府儀同三司丨丨次公隋百官志云梁置位丨三丨九命唐大詔令云聖王納制丨丨俾尊於開府四人南部新書自先天初至開元儀同姚人崇宋璟王同皎王毛仲四使相元豐以前凡以檢校官兼中書令侍中同門下平章事者謂之丨丨唐制皆書勑五代以來不預政事朝㑹親闕則分班餘官則綴本班正衙見謝則押班凡宣制除授者敕闕㑹其銜而不書閼使字要上宰開府崇階視儀丨丨曲阜行燕達贈使相制同兖章齊王儉拜儀同三司章曰班丨丨丨次王公隋煬帝同漢魏之制其位丨丨丨參鉉席梁王筠為王儀同瑩初讓表云可以妄丨丨丨靦貌槐庭亞槐庭宜進秩於八命儀丨丨丨常衮制以勳授隋何稠為散騎常侍安集嶺南欽州刺史宥猛方欲為逆至是請身入朝稠與之約詣京師後猛入朝上大悅曰何稠著信蠻夷乃至於此丨丨丨開府盛德居開元以前舊例開府特進雖不帶事皆給俸祿與朝㑹皆崇官丨丨罷劇就間者丨之通典班同三事馬防丨丨丨東觀記班同三府馬防位逾九卿丨丨丨丨袁宏漢紀秩比三台禮隆八命丨丨丨丨常衮加杜冕儀同制秩視三公丨丨丨丨南窗記心飛丹掖神夢紫霄丨丨丨丨品同儀比愧鉉莫殊梁王僧儒代表目送白雲晉江總謝儀同三司表云心馳紫路登文石而莫由丨丨丨丨拜承明而未果不以名稱宋璟丨丨丨丨止曰宋開府國史補夢升台鉉陳章昭達字伯通寶應初授鎮前將軍開府儀同三司初文帝丨昭達丨丨丨及旦告之至是侍宴酒酣顧昭達曰卿憶夢否卿何以償對曰臣當效大馬之勞以盡臣節自餘無以奉償陳書紫霄皇極庾肩吾武陵王拜儀同章曰臣宅慶丨丨聫休皇極榮優文品開府之丨名重矣矧丨其禮命視於丨丨為第一南豐擬制遣使寵遇大觀二年詔賜使相以上生日幣帛器物當丨丨銜命而故事上差親戚失丨丨大臣之意自今並取㫖差官㑹要詩集逡巡丨丨庾開府俊逸鮑參軍杜詩朝傑開府當丨丨論兵邁古風先鋒百勝在略地兩偶同智謀垂睿想出入冠諸公勳業青冥上交情氣槩巾杜甫贈哥舒開府太師三紀中書更有誰致君堯舜似臯夔頻年力請方歸第天子臨軒丨丨丨范純仁上開府詩特進歷代㳂革漢制諸侯功德優盛朝廷所敬異者賜位特進位在三公下故曰特進胡廣制度自宣帝用太子外祖許廣漢為平思侯位特進而特進之名始見於此其後或領城門兵得舉吏如五府王商或見禮如丞相得置從事史張禹或給事中視尚書事薛宣或奉朝請傅喜或議大政張禹其職不一後漢皇后兄弟率為特進侯隋志曰特進舊位從公光武以鄧禹列侯就第特進奉朝請是特進引見之稱無官定體也二漢及魏晉以為加官元康中惠帝定令特進位次諸公在開府驃騎上齊時位從公陳因之後魏北齊用人皆以舊德隋文帝以為散官不治事煬帝廢唐為文散官雖不𢃄職事皆給俸祿得預朝㑹班列依本品之次皆崇官盛德罷劇就間者居之通典國朝元豐新制改尚書左右僕射為特進居文階之首大觀著令非宰臣不除大觀三年修成中書勑令格式四十卷諸非宰臣不除特進政和間薛昂以觀文殿學士白時中以門下侍郎並𢃄特進繼改金紫光祿大夫今後非宰臣不得除官制舊典除改非宰相不除特進大觀已有此法非起於政和也國朝職略事類國師謝承後漢書云趙典尊為丨丨位特進而為丨丨寢則布被瓦器而食勳德唐大詔令李光顔除特進制僉曰諸侯丨丨之盛則就加特進以寵之文武特進以加丨丨之德齊者隋百官志功德以丨丨特進見齊職儀次三公位特進丨丨丨後漢樊宏𫝊亞三公漢制進以文冕列侍清祠榮丨丨丨品居第二自非學深張禹功重竇融則可以膺是寵章李德裕謝加特進狀居儀同上除特進位次三公丨驃騎丨丨之丨非茂勳俊德曷以處之李德裕集神䇿劉公神道特見優禮後魏刁雍拜特進以年髙丨丨丨丨朝位特見丨丨丨丨公是除劉沆特進制特進崇班丨丨丨丨自昔冠諸侯之上徐騎省行馮延已制進達名士曹勝加位特進其所丨丨皆海內丨丨三事佩紱張九齡上姚令公書曰大見信用巍巍特進仍踐其位赫赫丨丨躬丨其丨曷日太平二品崇階丨丨丨丨徐騎省集謝匡䇿除特進制詩集羣公表特進丨丨丨丨天人夙德升霜蹄千里駿風翮九霄鵬學業醇儒富辭華哲匠能筆飛鸞聳立草罷鳳騫騰杜太尉歷代㳂革秦官漢因之或制或省武帝元符四年始置大司馬以當太尉之職後漢建武二十七年復舊名為太尉公每帝初即位多與太傅同録尚書事靈帝以劉虞為大司馬而太尉如故自此大司馬與太尉始並置矣歷代皆有悉為三公唯後周無後魏初與大將軍不並置正元之後亦皆置焉六典通典隋以太尉司徒司空為三公正一品唐因隋制武德初秦王兼之永徽中長孫無忌為之其後親王拜三公者皆不視事祭禮則攝行者焉六典國朝㳂隋唐之舊以太尉司徒司空為三公政和新制罷三公置三少以太尉本秦官居主兵之任遂定為武階之首初以授童貫焉職略又續㑹要云政和二年九月御筆近降武選官名以祿多士比元曹文官無極品之官文武一道分職定位理當不殊太尉古官舊掌武事雖循㳂秦漢為三公之任名稱已久可改為武選一品之位在節度使上其儀物班序居執政之次今尚書省裁定以聞事類厚重漢周勃為太尉為人丨丨貞廉楊秉丨丨曰我有三不惑為太尉安劉漢髙祖曰丨丨氏者必勃也可使為太尉讓朝陳蕃拜太尉丨於胡廣王暢等臨朝嘆曰黃憲在不敢先佩印綬上司楊震為太尉謂門生曰吾蒙恩丨丨又汝南先賢𫝊李宣為太尉黃瓊所辟宣曰明日被日月之衣居丨丨之位上台摯虞䇿隴西王太尉文曰進登丨丨鹿轓後漢鄭𢎞為臨淮太守行春有兩丨隨地夾轂而行𢎞怪問主簿黃國賀曰聞三公車丨畫作鹿明府當為宰相𢎞後為太尉鵲印博物志後漢常山張皓為梁相天新雨後有鳥如丨飛翔稍下墮地人取化為一圓石皓椎破之得金丨曰忠孝侯印皓表上聞藏之祕府靈帝時至太尉帝紀注亦有四世東漢楊震秉賜丨丨為太尉一遷張酺為太尉父尚在酺每丨丨轉乃一到洛父來適㑹正臘公卿罷朝供賀奉酒上有極歡人莫不榮之上公吳詔曰范慎勳德俱茂朕所倚憑登丨丨以副衆望可為太尉極品唐大詔令冊杜讓能太尉文云是用拜上司之丨丨居亞獻之殊榮命太尉丨丨丨記月令掌武事太尉金印紫綬丨丨丨漢百官志蓋布被李回為太尉丨丨丨服食麥飯食粗飯司馬包為太尉常丨丨丨主五兵秦立冗官之職太尉丨丨丨漢因循而不革通典主九伐謝靈運晉書曰太尉故司馬之官丨丨丨之職輸千萬太尉劉虞讓位於羊士靈帝為三公皆丨禮錢丨丨有舉縕袍示之曰臣有維此而已遂不拜輸萬億曹嵩靈帝時貨賂中官及丨西園一丨丨故位至太尉也冠百僚太尉之任歷所崇蓋以其掌四方之事丨丨丨之首其職重其品尊爰自我朝罕拜斯任杜讓能冊文訓五兵陳蕃拜太尉辭曰不愆不忘率由舊章臣不如胡廣丨丨丨臣不如義郎王暢文武兼資為國瓜牙臣不如李膺先賢𫝊立五廟唐李晟拜太尉詔丨丨丨唐書惟七人李德裕拜太尉固讓言唐興太尉丨丨丨尚父子儀乃不收拜近王智興李載義皆超拜保傅蓋重惜此官裴度為司空十年亦不遷臣願守舊秩足矣帝曰吾恨無官酬公無固辭同上在位三世漢張禹丨丨丨丨忠孝彌篤典職六年東漢牟融丨丨丨丨勤勞不怠並六帖漢寵元勳丨丨丨丨任先周勃晉尊碩德丨丨丨丨選在王祥並同上尊與相等景帝三年復置太尉丨丨丞丨丨又漢書上欲用田蚡為丞相籍福說蚡云云將軍必為太尉丨丨丞丨丨每朝自卑第五倫為㑹稽太守署鄭𢎞為督郵𢎞為太尉倫為司空位在下丨丨見𢎞鞠躬丨丨帝知之遂置雲母屏風分隔其間後漢書清白為式後漢鄧彪字智伯為太尉在位丨丨丨百僚丨清不可及傅子曰敢問今之君子曰袁郎中積德行儉華太尉積德居順其智可及也其清不可及也元衣纁裳晉制郊廟太尉冕服七旒丨丨丨丨七章錦被梁肉後漢宋寵為太尉朝廷賜丨丨丨丨雲母屏風記室新書注上司光典荀歆字景情道行清純敷揚五教宜登丨丨以丨治丨台庭改觀梁沈約齊太尉王公墓志云揆路揚輝丨丨丨丨務重統兵孫樵記室新書云丨丨丨丨注後漢百官志云太尉一人掌四方兵事掌四方兵唐百官志太尉丨丨丨丨行賞罰郊社之事秦王兼為唐武德初丨丨丨之永徽中無忌兼之六典注宣宗髮淅丨丨即位李德裕奉冊大極殿帝退曰向行事進我者非太尉耶每觀我毛丨灑丨即日罷為檢校司徒荆南節度使星在杓南天文録三公丨丨丨丨主宣德化和陰陽太尉司空之象儀次璣衡見下文注居執政之次政和二年御筆改太尉為武選一品之任在節度使上其儀物班序丨丨丨丨丨為右資之極訂掌武之崇稱丨丨丨丨丨品視古命數有加印紱之榮著令班儀密次璣衡之峻童貫制張于湖上苗太尉啓早嵗臨戎即登於勇爵十年扈蹕屢勒於勳銘逮邊瑣之多虞由殿巖而遣戍茂宣皇略亟挫天驕蘇轍上韓太尉書某生好為文思之至深以為文者氣之所形然文不可以學而能氣可以養而致孟子曰我善養吾浩然之氣今觀其文章寬厚宏博充乎天地之間稱其氣之小大太史公行天下周覽四海名山大川與燕趙間豪傑交游故其文疏蕩頗有竒氣此二子者豈嘗執筆學為如此之文哉其氣充乎其中而溢乎其貌動乎其言而見乎其文而不自知也某生十有九年矣其居家所與游者不過其鄰里鄉黨之人所見不過數百里之間無髙山大野可登覽以自廣百氏之書雖無所不讀然皆古人之陳迹不足以激發其志氣恐遂汨沒故决然捨去求天下竒聞壯觀以知天下之廣大過秦漢之故都恣觀終南嵩華之髙北顧黃河之奔流慨然想見古之豪傑至京師仰觀天子宫闕之壯與倉廩府庫城池苑囿之富且大也而後知天下之巨麗見翰林歐陽公聽其議論之宏辨觀其容貌之秀偉與其門人賢士大夫遊而後知天下之文章聚乎此也太尉以才略冠天下天下之所恃以無憂四夷之所憚以不敢發入則周公召公出則方叔召虎而某也未之見焉且夫人之學也不志其大雖多而何為某之來也於山見終南嵩華之髙於水見黃河之大且深於人見歐陽公而猶以為未見