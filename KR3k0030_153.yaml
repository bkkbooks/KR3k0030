body:
  text: 古今合璧事類備要續集卷三宋謝維新撰姓名門命字附賜字稱同字字字名同字不花古今源流字之為字始於何時乎六經以前未之有聞也按儀禮冠禮篇祝辭曰禮儀既備令月吉日昭告爾字字曰某父爰字孔嘉髦士攸冝冝之于嘏永言保之是始言男子既冠而字也以男子既冠而字則女子亦及笄而字也且儀禮者周公之所作也周公當周家太平之時以制禮作樂自任監于二代郁郁乎文或者字之為字其殆始於此乎然斯時也猶未聞周公以字稱也蓋至于康誥之作有曰以殷餘民封康叔而康叔之字始見于經異時孔子修周公之舊典禮經而作春秋而邾儀父首以字録𫝊者曰曰儀父貴之也然後知名之果不若字也字之果有貴於人也兹非其字之所從起者歟故名終則諱之字則可以為子孫氏以至孔子弟子皆尊其師而稱仲尼由是而降蓋未之有改也漢吕后微時嘗字髙祖為季髙祖之稱三傑至稱張良亦不呼良而呼子房爰種字其叔父曰絲王丹與侯霸子語字霸為君房及魏晉而下皆不諱字延及于唐又皆以字行援是而觀名以正體字以表德遡源而流其逺矣哉事類冠而字男子二十丨丨丨曲禮冠而字之敬其名也郊特牲子生三日而名既丨丨丨名者所以正身體定心意字者所以崇仁義叙長幼禮告爾字冠禮祝辭曰禮儀既備令月吉日昭丨丨丨字曰某父爰字孔嘉髦士攸宜宜之于嘏永言保之儀禮字可為氏諸侯以字為諡因以為族左隱八字不若子氏不若名名不若字丨丨丨丨公羊傳莊十年褒之以字儀父者何邾婁之君也何以名字也曷為稱字褒之也公羊傳隱元貴之以字齊仲孫湫來省難書曰仲孫貴之也左閔字則不著孔子弟子七十七人而有若句井彊皆不著其字史仲尼弟子字則未聞孟子名軻丨丨丨丨也孟子序以臺命字趙岐字邠卿初名嘉其祖為御史岐生於御史臺因字臺卿以閭命字賈充字公閭父逵晚年始生充言後當有充閭之慶故以為名字因戲為字阮孚母祖姑家胡婢也父咸通之生孚咸遺姑書曰不意今日遂生胡兒姑答曰靈光殿賦云胡人遙集於上楹便以遙集為字咸從之因官為字甄濟為著作佐郎兼侍御史濟生子因其官字曰禮闈憲臺字曰慶門楊嗣復韓滉撫其頂曰名與位皆踰其文楊氏之慶也因丨丨丨丨字曰德素王紹少為顔真卿所器丨丨丨丨賜字賜方榖李載義㑹吏下請立碑紀功詔李程為之辭未有字詔曰周書凡厥正人既富丨丨卿冝當之以方榖為字其寵待如此同字小冠大冠杜欽字子夏少好經書家富而目偏盲茂陵杜鄴與欽同姓字俱以材能稱京師故大冠謂欽為盲子夏以相别欽惡以疾見詆乃為小冠髙廣財二寸由是京師更謂欽為丨丨杜子夏而鄴為丨丨杜子夏云本𫝊字名同安石晉謝安字丨丨崇之唐姚崇字丨丨字不稱連古人昔司馬長卿慕藺相如故名相如顧元歎慕蔡雍故名雍而後漢有朱張字孫卿許暹字顔回梁世有庾晏嬰祖孫登丨丨丨姓為名字亦鄙才也顔之推超亞聖宋齊丘汪台符貽書訐之足下齊先聖以立名丨丨丨而稱字齊丘慙而改為子嵩後使人誘與飲酒縳其口沉石城下江南野史花字花判唐制中書有軍國政事中書舍人各執所見雜署其名謂之五丨丨事國史補草書唐人初未有押字但丨丨其名以為私記故號花書韋陟五雲體是也余見唐詩書名未見一楷字今人押字或多押名猶是此意王荆公押一字初橫一畫左引腳中為一圈公性急作圈多不圓往往窩匾而橫畫又多帶過嘗有密譏公押反字者公知之加意作圈一日書楊蟠差遣敕作圈復不圓乃以濃墨塗去旁别作一圈蓋欲矯言者楊氏至今藏此敕石林燕語馬存字侯孟侯孟名夫求豫為字之說豫不得其意而謂之曰君以夫自名者豈慕灌將軍仲孺之為人耶君以夫字孟者豈慕洛陽劇游俠之為人耶二子非全人儒生法士之所諱道也豫以謂人各有所長甚非一介淺淺者之所知摧鋒陷堅決死仇敵名聞三軍勇冠天下不喜諂諛而重然諾此灌將軍之所長也剛橫不遜果於犯上使氣杯酒之間乃其短耳吳楚舉大事而向京師大將軍得之則知諸侯之無能為使諸侯得之則大將軍必以為憂一人之身為兩軍之輕重此劇游俠之所長也起匹夫之私不顧國家之公議乃所短耳吾欲剔去二子之所短而收其所長持以贈君幸君無辭而受之可乎豫與孟同居相悉也知孟之為人氣直而貌質行方而言謹與人要約勇於必信故喜取天下之偉士為孟激揚而稱道之雖然吾因孟切有所感矣今孟乃趙人也古稱燕趙多慷慨謀略之士吾嘗欲登太行之巔遊邯鄲之道觀井陘常霍之險放聲而悲歌大醉以起舞劒鳴腰間精爽旁射庶幾乎意氣必有感者恨以羈留未能也孟君還故鄉千萬為我道此言囊中之錐頴脫而立見者其誰乎賣漿之家屠羊之肆尚有昔時傲遊之習者乎亷藺趙牧亦有遺種可以將兵者乎如其舊態尚在幸為我望燕山之故雲梯易水之悲風扼腕乎沙漠之北可以動心否晦庵字劉瑾古之君子學以為己非求人之知也故從師親友以求先王之道心思口誦而躬行之既自得於已矣而謙虗晦默若無有焉今之人則反是是以譬之古之君子如抱美玉而深藏不市今之人則以石為玉而又衒之也劉氏甥瑾自其先大父大夫公而豫之名矣將冠以其父命來求字豫字之曰懷甫告之以古人之意瑾也勉旃母以石為玉而又衒之也稱呼附自稱相稱不敢自稱稱諸人古今源流稱者稱去聲也所以稱量彼己之輕重而為之言也故君有君之稱臣有臣之稱以至于父子兄弟夫婦朋友主僕婢妾莫不各有稱呼凡此者無非稱量輕重之宜而後為之言也然有相稱者有自稱者又有稱諸人及人稱之者故論語曰邦君之妻君稱之曰夫人此相稱者夫人自稱曰小童此自稱者邦人稱之曰君夫人異邦人稱之亦曰君夫人此人稱之者稱諸異邦曰寡小君此稱諸人者然相稱者尊人也自稱者卑己也稱諸人及人稱之者亦無非卑己以尊人也非稱彼己重輕之冝而然歟今且跡其君臣之稱者言之臣稱君則唐虞帝尚書帝念哉帝豫何言三代王天乃錫王勇智王忱不艱王如弗敢及天基命秦漢以下陛下稱天子曰陛下自秦始君稱臣則唐虞三代皆汝某汝義暨和格汝舜格汝禹汝鳩汝方來汝說汝封秦漢以下皆曰卿卿皆安在卿言是也或某官丞相不來丞相輒來相國為民請苑其自稱者唐虞三代君臣皆通稱朕堯曰朕在位七十載舜曰朕宅帝位禹曰朕德罔克臯陶曰朕言惠湯曰罪在朕躬伊尹曰惟朕以懌武王曰惟朕文考成王曰惟朕小子其新迎周公曰朕復子明辟或稱台台小子或稱豫豫小子秦漢而下惟君獨稱朕臣稱臣某至稱諸人及人稱之者唐虞亦曰帝惟帝時克惟帝其難之昔在帝堯三代亦曰王王其罔害惟王受命王不邇聲色秦漢以下曰皇帝今皇帝曰天子今天子曰聖上今聖上曰主上今主上稱於君前曰臣某它人之前則否此君臣之稱也然國則君臣家臣天子出則師生朋友入則昆弟夫婦公則長二僚屬私則主僕婢妾卑己尊人是或一道也豈獨無所從來哉事類尊稱將丨師衆丨某率師將尊師少稱將春秋公羊傳隱五卑稱將丨師衆丨師將卑師少稱人同上通稱子者男子之丨丨也孟子序美稱宣揚丨事曰丨廣釋文惡稱杜欽字子夏損目時人號為盲子夏欽丨其號丨疾見抵更著小冠自别時人因號小冠子夏漢本𫝊謬稱段平仲常曰上聰明神武但臣下畏怯自為循默爾使我一日得召見宜大有開納㑹京師旱詔擇御史郎中平仲與考功員外郎陳歸被選同得對粗陳振恤事帝察其意有所蓄以歸在側未言事訖平仲方獨進帝乃并留歸正色問之雜以他語平仲錯牾不得言乃丨丨名帝怒叱去之然名由此顯六帖自稱老夫自稱曰丨丨記曲禮小童夫人自稱曰丨丨曰朕天子自稱丨丨注蔡雍曰朕我也古者上下共稱之至秦然後天子獨以為稱秦李斯議曰走自稱太史公牛馬走司馬遷上任少卿書曰僕宋劉凝之隱居南郡臨川王義慶鎮江陵遣使存問答書曰頓首稱㒒不為百姓禮人或譏之凝之丨未聞巢許稱臣堯舜時戴顒與衡陽王義季書亦稱丨六帖不敢自稱余小子君大夫之子不敢自稱曰丨丨丨嗣子某大夫士之子不敢自稱曰丨丨丨不敢與世子同名並記曲禮相稱夫人邦君之妻君稱之曰丨丨論語陛下李斯等議曰今陛下興義兵誅殘賊蔡雍注陛階也天子必有近臣立於階側以戒不虞謂陛下者羣臣與天子言不敢指斥故呼在陛下與之言因卑達尊之意先生古者稱師曰丨丨韋昭小子王爽嘗與㑹稽王道子飲道子醉呼爽為丨丨爽曰亡祖長史與簡文皇帝為布衣交亡姑亡姊伉儷二宫何丨丨之有卿壻王安豐婦卿安豐安豐曰婦人丨丨禮為不恭後勿如之婦曰親愛卿故卿卿我不卿卿誰復卿卿曰君庾敳字子嵩王衍不與敳交敳卿之不置衍丨丨不得為耳敳曰卿自君我我自卿卿我自用我家法卿自用卿家法衍甚奇之不卿齊陸慧曉未嘗卿士大夫或問之答曰貴人丨可丨人生何貴立輕重所懷抱呼公何偃路中遙丨延之曰顔丨延之以其輕脫答曰身非三公又非田舍之公又非君家阿公何以見呼為公偃慙而退宋顔延之𫝊張五北齊張稷為豫章王嶷主簿與劉繪俱見禮接未嘗呼名呼為劉四丨丨劉二劉逖為開府參軍文宣崩文士並作挽歌楊愔擇之員外郎盧思道用八首逖用二首中書侍郎李愔戲逖曰盧八問訊丨丨逖銜之後李愔獻賦逖摘其文奏曰誹謗先朝武成怒大加鞭撲逖喜復前憾曰髙槌兩下執鞭一百何如呼丨丨時同前陸九陸贄入翰林年尚少以才幸天子以輩行呼為丨丨大臣郭子儀代宗不名呼為丨丨官家李侍讀仲容善飲號李萬回真宗飲量無敵巨飲則詔公一夕上命巨觥仲容曰告丨丨免觥上因問何故謂天子為丨丨仲容舉蔣濟萬機論曰五帝官天下三王家天下兼三五之德故曰丨丨上大喜曰所謂君臣千載遇李曰惟有忠孝一生心湘山野録執事前輩與大官書多呼丨丨與足下劉子𤣥與宰相書曰足下韓退之與張僕射書曰丨丨即其例也惟丨丨則指左右之人尊卑皆可通稱閣下古者三公開閣而郡守比古諸侯亦有閣故有丨丨之稱降殿下座前自卑達尊何云丨丨尤非也丨丨降几前一等豈可例用哉並因話録稱諸人與人稱之者寡小君稱諸異邦曰丨丨丨語君夫人邦人稱之曰丨丨丨異邦人稱之亦曰丨丨丨同上號泰皇始皇已并天下李斯等議曰有天皇有地皇有泰皇泰皇最貴臣等昧死上尊丨王為丨丨命為制令為詔號鄭公馬融告髙密縣為鄭𤣥特立一鄉曰鄭君好學實懷明德昔太史公廷尉于公謁者僕射鄧公皆漢之名臣又四皓有園公夏黃公潜光隱耀世嘉其髙皆悉稱公然則公者仁德之正號不必三事大夫也今鄭君鄉宜曰丨丨鄉曰家公侯霸子孫稱其祖父曰丨丨曰家父陳思王稱其父丨丨丨曰家母同上曰家祖潘尼稱其祖丨丨丨古人之所行今人之所笑南北風俗言其祖及兩親無云家者田里偎人方有此言爾凡與人言言已世父以次第稱之不云家者以尊於父不敢家也凡言姑姊妹女子已嫁則以夫氏稱之在室則以次第稱之言禮成他族不得云家也子孫不得稱家者輕略之也蔡雍書集呼其姑女為家姑家姊班固書集亦云家孫今並不行也凡與人言稱彼祖父母世父母父母及長姑皆加尊字自叔父母已下則加賢字尊卑之差也王羲之書稱彼之母與自稱己母同不云尊字今所非也顔氏宋訓曲江公張九齡開元後天下稱曰丨丨丨而不名唐本𫝊贊皇公李德裕天下士歸重不敢有所斥稱丨丨丨元魯山元德秀天下髙其行謂之丨丨丨而不名並本𫝊稱張底崔湜為中書令張嘉貞為舍人湜輕之常丨為丨丨後因議事皆出人右湜驚曰張底乃我輩一般人此終是其坐處隋唐嘉話號鄭五鄭縈本善詩其語多俳諧故使落調世共丨丨丨歇後體昭宗署班簿曰可同平章事至是省吏走其家上謁綮笑曰諸君誤矣人皆不識字宰相亦不及我吏言不妄俄聞制詔下搔首曰歇後鄭五作宰相事可知矣父稱家府府君夫人漢人碑已有之只是尊神之辭府君如官府之君或謂之明府今人亦謂丨為丨丨朱語録母稱夫人故事臣僚封贈母祖母不問生殁並加太字曰太夫人太君政和間待制劉安上建言太者事生之尊稱也封母而别之所以致别於其婦既殁並祭於夫若加之尊稱則是以尊臨其夫也以尊臨夫於名義疑若未正自是始詔命婦追封並除去太字逮紹興新書復仍舊制晏尚書敦復領吏部援劉待制言申明且引漢文帝紀七年冬十月令列侯太夫人夫人無得擅徴補注謂列侯之妻稱夫人列侯死子復為列侯仍得稱太夫人蓋此義也於是追封始不復稱太云按帝者之祖稱太皇太后稱母皇太后既升祔止稱皇后正此比也却掃篇元結作元氏釋河南元氏望也結元子名也次山結字也世業載國史世系在家諜少居商餘山著元子十篇故以元子為稱天下兵興逃亂入猗玗洞始稱猗玗子後家瀼濱乃自稱浪士及有官人以為浪者亦漫為官乎呼漫郎既客樊上漫遂顯樊左右皆漁者少長相戲更曰聱叟彼誚以聱者為其不相從聽不相鈎加帶笭箵而盡船獨聱齖而揮車酒徒得此又曰公之漫其猶聱乎公守著作不帶笭箵乎入漫浪於人間得非聱齖乎公漫久矣可以漫為叟於戲吾不從聽於時俗不鈎加於當世誰是聱者於欲從之彼聱叟不慙帶乎笭箵吾又安能薄乎著作彼聱叟不羞聱齖於鄰里吾又安能慙漫浪於人間取而醉人議當以漫叟為稱直荒浪其性情誕漫其所為使人知無所存冇無所將待乃為語曰能帶笭箵全獨而保生能學聱齖保宗而全家聱也如此漫乎非耶栁子厚志房公墓天子之三公稱公王者之後稱公諸侯之入為王卿士亦曰公有土封其臣稱之曰公尊其道而師之稱曰公楚之僣凡為縣者皆曰公古之人通謂年之長老曰公故言三公若周公召公王者之後若宋公為王卿士若衛武公虢文公鄭桓公其臣稱之則列國皆然師之尊若太公楚之為縣者若葉公白公年之長老若毛公申公涪公陳君舉贈梅生說古者士相號曰子若生子若生非所以賤薄人之稱也能以其姓配焉而著者蓋鮮矣啇而上惟箕子以子著周衰著莫如孔春子孔子之徒則顔子曾子有子以子著餘未有聞焉秋之所貴者子之如季子髙子是己詩之所美者亦子之若彼姝者子是也太史公列𫝊得子稱者老子孟子荀子樗里子數人而已劉氏七略以子稱者七十有六而獨荀子楊子著自唐韓栁今天下未有盡子之也至於生著焉者蓋鮮魯有兩生楚有韓生皆以生著者也漢之世則酈生賈生伏生歐陽生轅生髙堂生胡母生而蕭望之號東海蕭生然不以生著天下豈淺薄人之辭哉世之澆士甚於相啖下之所號乎上者匪君若公上之所號乎下者亦匪君若公以子若生號人人則必怒矣詩集蘇二東坡解纜赴杭州山谷嘗避暑城西李氏園題兩詩于璧其一章云荷舞竹風冝永日氷壺涼簟不能回題詩未有驚人句㑹喚謫仙丨丨來秦少游言於東坡曰以先生為丨丨大似相薄志林黃九山谷有茶詩押腸字韻和者以數四山谷最後有曲几團蒲聽煮湯煎成車聲繞羊腸東坡見之云丨丨恁地怎得不窮故無咎復和云車聲出鼎細九盤如此佳句誰能織同上閽吏詢姓字吕某公歸老于洛嘗遊龍門還閽者執筆歷請官稱公題以詩云思山乘興看山回烏帽綸巾入帝臺丨丨不須丨丨丨也曽三到鳳池來后山詩話諱誋歷代源流諱非古也夫所謂諱者諱死而不諱生也故禮卒哭乃諱以木鐸狥于路曰捨故而諱新釋之者曰故謂髙祖新謂新死者然則諱之為諱為死者設審矣亦孰知其又有不諱者也禮不諱嫌名二名不偏諱逮事父母則諱王父母不逮事父母則不諱王父母且不止此也君所無私諱是私諱不諱於公也大夫之所有公諱是公諱不諱於私也詩書不諱臨文不諱為其失事正也廟中不諱為其有事於髙祖則不諱尊祖以下尊無二也夫人之諱雖質君之前臣不諱為臣之於夫人之家恩逺也婦諱不出門為婦之親逺於宫中則避之也大功小功不諱是為其屬漸疏也是又其不諱者也夫惟其諱者如彼而其不諱者又如此是禮也蓋亦周公之所創乎按周禮小史王有事詔王之忌諱而釋者乃曰諱先王名而左氏傳舉申繻之言亦謂周人以諱事神名終將諱之捨是未之前聞焉故自周人之諱行而後名始尊蓋諱之者所以尊其名也雖然諱雖行矣猶未至如後日之悉也故誦其詩讀其書容或有不能盡避者漢猶是也逮魏晉而下以至于我之國朝士大夫之不尚諱者亡幾然至諱嫌名諱二名又併其生者而諱之諂也况其他乎吾於是知其非古矣事類公諱大夫之所有丨丨記曲禮私諱君所無丨丨同上新諱卒哭以木鐸狥于路捨故而諱新先諱小史王冇事詔王之忌諱注諱先王名周禮問諱入門而丨丨記曲禮終諱周人以諱事神名丨將丨之左桓公君諱晉以僖侯廢司徒僖侯名司徒廢為中軍宋以武公廢司空武公名司空廢為司城先君獻武廢二山一山具敖也魯獻公名具武公名敖更以其鄉各山同上父諱司馬遷報任少卿云同子驂乘蓋指趙談與其丨同丨故曰同子不諱文王昌武王發文王諱昌而箕子為武王陳洪範曰使羞其行而邦其昌周頌祀文武之樂歌雍曰克私昌厥後噫嘻曰駿發爾康王胡丨丨諱胡而其子宣王時詩曰丨不相畏莊公同魯丨丨名丨而春秋書同盟僖公申魯丨丨名丨而春秋書戊申定公宋魯丨丨名丨而春秋書宋仲幾衛侯慈丨丨名丨其臣亦有石慈並左魏曹植曹志植之子奏議云幹植不强不諱植字吳孫權三國志猶不諱其君名如功以權成是斥吳主權之名也並孔氏叢說諱取枉法杜祁公衍嘗言父母之諱在我而已他人何預焉公帥并門吏請家諱公曰下官無所諱但丨丨丨丨贓青箱雜記諱有贓惡包拯尹京禮上之日吏請家諱公瞋目曰吾無所諱惟丨吏之丨丨丨者翰府名談避諱呼雉野雞漢吕后諱雉令臣下丨丨為丨丨改徹通侯武帝諱徹丨丨侯為丨丨改秀為茂光武諱秀丨丨才丨丨才改莊為嚴明帝諱莊丨丨助丨丨助改談作同太史公名談故史記無談字季布𫝊丨趙丨丨趙丨孔氏叢說易虎季龍唐髙祖之祖諱虎字延壽唐人也作史丨石丨以丨丨易韓擒虎以韓擒改昧元海唐髙祖諱淵改劉淵為劉元海戴淵為戴若思更授少傅源乾曜遷太子少師避祖名丨丨丨丨改擢司門李涵繇御史大夫擢太子少傅吕渭建言涵父名少康當避宰相崔祐甫善其言丨丨丨丨員外郎鑱去臯名韋暢臯沒蜀人德之凡刻石著臯名者皆丨其文尊諱之易以孟姓王維過郢州畫孟浩然像于刺史亭因曰浩然亭咸通中刺史鄭諴謂賢者名不可斥易號曰孟亭皮日休作孟亭記春秋書紀季公子仲孫湫字者貴之也故書字曰貴先是亭之名取先生之諱公曰焉有賢者之名為趨厠走養朝夕名於刺史前耶命易之以先生姓避太子諱憲宗為太子王紹丨丨丨丨始改名時議者以為諂李藩曰自古故事由不識體之人敗之不可復正雖紹何誅請長吏諱王述為揚州刺史初至主簿請丨報曰亡祖先君名播海內逺近所知內諱不出門餘無所諱改𢎞為崇郭崇韜諱𢎞宰相豆盧革等皆諂事之因他事奏丨丨史文館丨丨文五代改㑹為當尚書省文字下六司諸路例皆言勘㑹曽魯公為相始作勘當以其父名㑹避之也改準為貨京師舊有平準務自漢以來有是名蔡魯公以其父名準亦改為平貨務並石林燕語諱樂廢飲韋翼尚書有重名生平不飲酒不務歡為家丨丨也丁用晦芝田録遇石不踐徐積以父名石平生不用石器丨丨則避丨丨行狀稱嚴必泣臧逢世臧嚴之子也孝元經牧江州遣往建昌督事郡縣民庶競修箋書有丨丨寒者丨對之流丨顔氏家訓觸諱犯君諱范獻子聘魯問其敖二山對曰先君獻武之諱也道父名桓𤣥呼人溫酒丨其丨丨無心攸王亮為晉陵太守有晉陵令沈㠝之性粗疏好犯亮諱亮不堪遂啓廢之㠝之乃造坐云下官以犯諱被代未知明府諱若為攸字亮父名攸當作無骹尊傍犬為犬傍無骹尊若是有心攸丨丨丨乞告示亮聞之皇恐不履下牀跣足㠝之撫掌大笑而去齊書如周官度支尚書宗如周有人訴事謂曽作如州官也乃曰某有屈滯故來訴丨丨丨如周曰爾何人敢呼我名其人慚謝曰祗言丨丨丨作如州不知丨丨丨名如周早知丨丨丨名如周則不敢喚丨丨丨作如州如周大笑曰令卿自責見侮反深衆咸服其雅量北史石非右石昻有髙行節度使苻習召以為臨淄令習朝京師監軍楊彥朗知留後昻以公事至府上謁贊者以彥朗諱石更其姓曰右昻趨于庭仰責彥朗曰常侍奈何以私害公昻姓丨丨丨也彥朗大怒拂衣起昻即趨出解官五代不觸諱不犯一人梁武帝詔王僧孺改百家譜合一百七十二卷藏在祕閣王𢎞好其書日對千客丨丨丨丨諱諱嫌名布皓凡避諱者須得同訓以代之桓公名白博有五皓之稱不聞布帛為丨丨腎修厲王名長琴有修短之目不聞呼腎腸為丨丨並顔氏家訓改㑹為鄶晉咸和元年當徴蘇峻司徒王導欲出王舒為外援乃拜撫軍將軍㑹稽內史舒上疏以父名㑹不作㑹稽廷尉以字同音異於禮無嫌舒陳狀音雖異而字同乞換他郡於是丨丨丨丨改户為辭羊祜為荆州刺史及卒有遺愛州人為諱其名丨丨曹丨丨曹焉以今為兹范曄父名楚金故為文皆丨丨丨丨孔氏叢說謂銷絹物梁武小名阿練皆呼練為絹乃丨丨鍊物為丨丨謂白鐵樹有諱銅者呼銅為鐵乃謂梧桐樹為丨丨丨便以戲笑耳並顔氏家訓益殷蓴羹宋殷淳字子孚與何朂共食孚羮盡朂曰丨丨丨丨朂司空無忌子也淳徐輟筯曰何無忌憚何無忌憚同上姓沈非審楊都一士人諱審而與沈氏交沈與其書名而不姓姓石非右見前石昻事諱嶽非嵩劉溫叟父名嶽終身不聽樂不遊嵩岱每赴內宴聞鈞奏則涕泣移時曰若非君命則不至是青箱雜記諱㑹非㑹見前不諱嫌名太子詹事范曄泰之子為丨丨丨丨固辭朝議以禮不諱嫌名乃居之中書舍人唐賈曽授丨丨丨丨以父名忠辭不受議者以中書是曹司名又與曽名音同字别禮無嫌曽乃就職二名不偏諱徴在孔子之毋名丨丨夫子言徴不稱在言在不稱徴仲卿韓愈父諱丨丨未嘗諱焉並孔氏叢說諱字伯達魏司馬朗字丨丨九歲客有犯其父字者朗曰慢人親者不敬其親者也客謝之不諱字稱仲尼或問子思丨夫子為丨丨朱文公曰古人未嘗諱字朱語録古者名以正體字以表德孔子弟子記事者皆丨丨丨稱君房王丹與侯霸子語丨霸為丨丨至今不諱字也並顔氏家訓呼茂叔程先生云豫年十四五從周茂叔本朝先輩尚如此呼伯淳伊川亦嘗呼明道表德並文公語録韓文公辨諱韓與李賀書勸賀舉進士賀舉進士有名與賀爭名者毁之曰賀父名晉肅賀不舉進士為是勸之舉者為非聽者不察也和而唱之同然一辭皇甫湜曰若不明白子與賀且得罪愈曰然律曰二名不偏諱釋之者曰謂若言徴不稱在言在不稱徴是也律曰不諱嫌名釋之者曰謂若禹與雨丘與蓲之類是也今賀父名晉肅賀舉進士為犯二名律乎為犯嫌名律乎父名晉肅子不得舉進士若父名仁子不得為人乎夫諱始於何時作法制以教天下者非周公孔子歟周公作詩不諱孔子不偏諱二名春秋不譏不諱嫌名康王釗之孫實為昭王曽參之父名晢曽子不諱昔周之時有騏期漢之時有杜度此其子宜如何諱將諱其嫌遂諱其姓乎將不諱其嫌者乎漢諱武帝名徹為通不聞又諱車轍之轍為某字也諱吕后名雉為野雞不聞又諱治天下之治為某字也今上章及奏不聞諱滸勢秉饑也惟宦官宫妾乃不敢言諭及機以為觸犯士君子言語行事宜何所法守也今考之於經質之於律稽之以國家之典賀舉進士為可耶為不可耶凡事父母得如曽參可以無譏矣作人得如周公孔子亦可以止矣今世之士不務行曽參周公孔子之行而諱親之名則務勝於曽參周公孔子亦見其惑也夫周公孔子曽參卒不可勝勝周公孔子曽參乃比於宦官宫妾則是宦官宫妾之孝於其親賢於周公孔子曽參者耶朱晦庵論諱周人以諱事神然雍詩言克昌厥後噫嘻言駿發爾私不為文武諱周禮一書七月一詩去古未逺皆未之諱故禮有昌本之葅詩有觱發之詠其避諱固未如後世之悉特不敢指曰文王昌武王發若泛用二字則不諱如穆王名蒲其後有王孫蒲襄王名鄭諸侯亦有衛侯鄭雖曰曽以獻武廢二山是特當時為尊者諱故改具敖之名而承襲不易厥後又有公孫敖亦足以泛而言之未嘗諱也後世諱政而正月且易其音視周為密矣觀王嘉上封事無教逸欲有國是為髙祖諱矣及韋孟諫詩有曰總齊羣邦自是而下犯髙祖之諱者凡至五六當楚王戊之時去髙祖為未久而獨不之諱豈漢初懲秦苛禁凡事簡易其避諱亦未如後世之悉至武帝諱徹謂之蒯通固為武帝諱矣至於景帝名啓史記謂之微子開而漢紀元封元年詔書有夏后啓母石之言何為不避之刑法志建三典以刑邦國與萬邦作孚之類皆不為始祖避何耶唐陸贄論關中事每曰與理同道罔不興請釋趙貴先罪狀曰脅從罔理韓文進士策問曰堯舜垂衣裳而天下理又曰無為而理者其舜也歟治字皆易為理避髙宗諱也然韓文潮州上表有曰朝廷治平曰為治日久曰政治少懈曰巍巍治功賀即位曰君臣相戒以致至治舉張惟素自代曰文學治行衆所推與何為不避之中宗諱顯而諱文袁州上表曰顯榮頻煩舉韋顗自代曰顯映班序栁子厚鼓吹曲涇水黃篇云羲和顯曜乘清芬皆犯中宗之諱韓公羅池廟碑曰其月景辰矣而賀慶雲表乃曰其日丙戌子厚平淮夷雅曰命官分土則嵩髙韓奕蒸人矣而韓賀即位表乃曰以和萬民又何耶是二言容或刋行之誤而顯治二字用之非應不應皆誤詩集白也始唐人尚不諱名杜甫詩云丨丨詩無敵杜甫詩云飯顆山頭逢丨丨並朱語録半夜間王立之云老杜家諱間而詩中有翩翩戲蝶間過幔或云恐傳者謬又有泛愛憐霜鬢留歡丨丨丨余以謂皆當以閒為正臨文恐有自不諱也北斗殷迃叟李國老云余讀新唐書方知杜甫父名間撿杜詩果無間字唯蜀本舊杜詩二十卷內寒食詩云鄰家間不違後王琪本作問不違又云曽閃朱旗北斗間後見趙仁約說薛問家本作丨丨丨由是言之則知甫不用間字明矣並侯鯖録古今合璧事類備要續集卷三
