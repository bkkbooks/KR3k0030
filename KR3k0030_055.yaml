body:
  text: 古今合璧事類備要前集卷五十五宋謝維新撰技術門醫家事類作醫人而無恒不可以丨巫丨論語瘳疾若藥弗暝眩厥疾弗瘳尚書十全醫師掌醫之政令聚毒藥以供醫事歲終則稽其醫事丨丨為上十失一次之十失四為下周禮三折齊髙彊曰丨丨肱知為良醫定十三三世醫不丨丨不服其藥曲禮四家論方技為丨丨有醫經家有方家有房中家有神仙家七畧上醫晉平公有疾秦伯使醫和視之文子曰醫及國家乎對曰丨丨醫國其次疾人固醫官也國語良師玉札丹砂赤箭青芝牛溲馬渤敗鼔之皮俱收並蓄待用無遺者醫師之良也韓文知脉虚實凡療病者必丨丨之丨丨然後為之方故疾可愈而夀可長也後王符潛夫傳察脉病否善醫者不視人之瘠肥而丨其丨之丨丨而已善計天下者不視天下之安危察其綱紀理亂而已矣天下者人也安危者肥瘠也紀綱者脉也脉不病雖瘠不害脉病而肥者死也韓文雜說血脉經絡醫經者原人丨丨丨丨骨髓陰陽表𠂻起百病之本死生之分而用度鍼石湯熨之所施調百藥齊和之所宜藝文志神慮血氣丨丨澹則丨丨和嗜慾勝則疾疹作古之聖賢務自頥養不以外物撓耳目聲色敗性情藥以攻疾無疾不用藥也唐書張臯傳君臣佐使藥有丨丨丨丨以相宣攝合和一君二臣三佐五使又可一君三臣九佐使也本草隂陽配合藥有丨丨丨丨子母兄弟根莖花實草石骨肉有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者本草上藥養命神農曰丨丨丨丨中藥養性者誠知性命之理因輔養以通也而世人不察惟五穀是見聲色是耽目炫𤣥黄耳務淫哇滋味煎其府藏醴醪鬻其腸胃香芳腐其骨髓喜怒悖其正氣思慮銷其精神哀樂殃其平粹夫以蕞爾之軀攻之者非一塗易竭之身而内外受敵身非木石其能久乎素問善醫無書唐許𦙍宗丨丨或勸其著書答曰醫者意也思慮精則得之吾意所解口不能宣也古之上醫病與脉值惟用一物攻之今人以情度病多其物以幸有功譬獵不知兎廣絡原野冀一人之獲術亦疎矣脉之妙處不可傳虚著方劑終無益也唐史神農嘗藥丨丨使岐伯丨味草木典醫療疾今經方本草之書咸出焉世紀鴻術為醫巫咸以丨丨丨帝堯之丨郭璞賦序扁鵲鍼脉丨丨兄弟三人善醫魏文侯問曰子兄弟三人孰最善對曰長兄視色故名不出家仲兄視毫毛故名不出門鵲丨人血丨投人毒藥故名聞諸侯鶡冠子華陀精方丨丨曉養性之術丨於丨處劑不過數種心識分銖不假稱量針灸不過數處本傳俞氏良醫季梁得疾謁二醫矯氏曰汝寒温不節虚實失度病由飢飽色欲精慮煩散非天非鬼雖漸可攻也季梁曰衆醫也亟屏之丨丨曰人始則胎氣不足乳僅有餘病非一朝一夕之故其所由來也漸矣季梁曰丨丨也且食之列子盧氏神醫丨丨曰汝疾非由天不由人亦不由鬼稟生受形既有制之者藥石其如汝何季梁曰丨丨也重貺遣之俄而疾自瘳同上扁鵲論病丨丨見齊桓侯曰君有疾在腠理不治將深桓侯曰寡人無疾後五日復見曰君有疾在血脉不治將深後五日復見曰君有疾在腸胃間不治將深後五日望見桓侯退走曰疾居腠理湯熨之所及也在血脉鍼石之所及也在腸胃酒醪之所及也其在骨髓雖司命其奈之何今在骨髓臣是以無請也後五日桓侯病召扁鵲扁鵲已逃去桓侯遂死使聖人預知微能使良醫早從事則疾可已也故病有六不治驕恣不論於理一不治也輕身重財二不治也衣食不能適三不治也隂陽并藏氣不定四不治也形羸不能服藥五不治也信巫不信醫六不治也扁鵲過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫入咸陽聞秦人愛小兒即為小兒醫秦太醫令李䤈自知技不如扁鵲使人刺殺之史記醫和戒色晉侯求醫於秦秦伯使醫和視之曰疾不可為也是為近女色疾如蠱非鬼非食惑以喪志良臣將死天命不祐公曰女不可近乎對曰節之天有六氣降生五味發為五色㣲為五聲淫生六疾六氣曰隂陽風雨晦㝠也分為四時序為五節過則為災隂淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾女陽物而晦時淫則生内熱惑蠱之疾今君不節不時能無及此乎趙孟曰良醫也厚其禮而歸之左昭元年董仙杏林董奉居廬山治病重者種杏五株輕者一株號丨丨丨丨神仙傳蘇耽橘井丨丨種丨鑿丨以捄時疫病者食橘葉飲泉即愈號橘井同上視見癥結扁鵲少為人舎長舍客長桑君過扁鵲竒之常謹遇之長桑君乃呼扁鵲語曰我有藥方年老欲傳與公乃出其懐中之藥予扁鵲飲以上池之水三十日當知物矣扁鵲以其言飲藥三十日從此丨病盡丨五藏丨丨特以診脉為名耳史記病在膏肓晉侯疾病求醫於秦伯使醫緩為之未至公夢疾為二童子曰彼良醫也懼傷我馬逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚為之禮而遣之左成中年湔腸滌藏虢太子死扁鵲至虢國中庶子曰暴蹙而死扁鵲曰尚可為也庶子曰先生得無誔乎臣聞上古有俞跗療病不以湯液乃割皮解肌丨洗丨胃潄丨五丨史記刮骨去毒闗羽為流矢貫臂每隂雨常疼痛醫曰矢鏃有毒當破臂刮骨去毒乃可除之也蜀志導胃吐虫後漢華佗廣陵太守陳登得病佗脉之曰胃中有虫欲成内疽食腥物所致作湯二升服之吐虫三升赤頭皆動半身猶是生魚膾佗為人性惡難得意恥以醫見業曹操苦頭風召佗在左右後求歸取方因妻疾數期不及操累書呼之佗恃能厭事猶不肯至操大怒殺之佗臨死出書一卷與獄吏曰此可以活人吏畏法不敢受佗索火焚之漢書醫瘡以犬河内太守劉勲女苦左膝裏瘡痒迎華佗使視佗以䋲繫一犬於馬後走馬牽犬犬困不能行因取斷腸以向瘡口須臾有若蛇者從瘡中出長三尺華佗别傳召醫䑛痔秦王有病丨丨丨丨者得車五乗也史記為卒吮疽吳起丨士丨丨丨史記又醫吮人之腹含人之血韓子遣醫視病漢東平王蒼病詔丨太丨丞將髙手醫丨丨續漢書為人迎醫張逵召陶侃為主簿逵妻有疾將迎醫於數百里外正寒雪諸綱紀皆難之侃獨曰資於亊父以事君小君猶母也安有父母之疾而不盡心乎乃請行衆咸服其義陶侃傳與藥焚券宋清長安西都藥市人也居善藥有自山澤來者必歸宋清氏清優主之雖不持錢者皆與善藥積券如山未嘗詣取直或不識遙與券清不為辭嵗終度不能報輒焚券終不復言清居藥四十年所焚券者百數十人或至大官或連數州受俸博其饋遺清者相屬於户雖不能立報而以賒死者千百不害清之為富也清之取利逺故大豈若小市人哉一不得直則怫然怒再則罵而仇耳彼之為利不亦剪剪乎清誠以是得大利又不為妄執其道不廢卒以富求者益衆其應益廣或斥棄沈廢親與交視之落然者清不以怠遇其人必與善藥如故一旦復柄用益厚報清其逺取諸利皆類此栁文賣藥守價後漢韓康守伯休覇陵人采藥名山賣於長安市口不貳價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休那乃賀反乃不貳價乎康歎曰我本欲避名今小女子皆知有我何用藥為遁入山中漢書讀藥處方人有患應病問醫官蘇澄澄云古無方吾檢本草集天下藥物試將讀之每發一聲腹中輒應惟至一藥再三無聲澄因處方以此藥為主其疾自除語林儲資防疢下之事上譬家丨積以自丨也脯腊膎胰以供滋味參末苓桂以丨疾丨願以小人備一藥石可乎狄仁傑傳鍼經脉法後漢郭玉廣漢人初有老父漁釣於涪水自號涪翁著丨丨診丨丨授弟子程髙髙傳於玉學方診六徴之技隂陽不測之術和帝時為太醫丞仁愛不矜雖貧賤必盡其心力療貴人時或不愈帝令貴人贏服變處一針即瘥召玉詰狀玉曰醫言意也腠理至㣲隨氣用巧神存心手之間可得解而不可得言貴者處尊髙以臨臣臣懐怖懾以承之其療有四難自用意而不任臣一難也將身不謹二難也骨節不能使藥三難也好逸惡勞四難也臣意猶且不盡何有於病哉此所以不愈也醫經金匱藥方葛洪自號抱朴子抄丨丨丨丨百卷尉後要急方摠四卷本傳委命在天漢髙祖疾甚吕后迎良醫醫入見上問曰疾可治否曰可治上嫚罵之曰吾命乃在天雖扁鵲何益遂不使治疾本紀服藥成效劉無名常於庚申日守三尸食雄黄後見一鬼使曰我秦山直符來攝君見君頂上黄光數尺不可近得非雄黄之功乎因曰一金一石謂之丹君服其石更餌其金則黒籍落名青華定籙劉後遇青華真人授以丹訣以鉛為君以汞為臣八石為使黄牙為田韓俣金鑾記求醫當拜父母疾篤醫雖賤雖少則涕泣而拜之以求哀也梁孝元在江州嘗有不豫世予方等親拜中兵參軍李猷馬顔氏家訓盡告所患脉之難明古今所病也至虚有盛候而大實有羸狀疑似之間便有死生之異士大夫多袐所患以求診驗醫能否使索病於㝠漢之中辨虚實冷暖於疑似之間醫不幸而失終不肯自謂失也巧飾遂非以全其名間有謹愿者雖惑主人之言亦參以所見雨存而雜治吾平生求醫盖於平時黙驗其工拙有疾求療必丨丨以丨丨使醫了然知患之所然後診之虚實冷暖先定於中脉之疑似不能惑也故雖中醫治吾疾常愈吾求疾愈而已豈以困醫為事哉蘇東坡詩集採藥野情貪藥餌郊居倦蓬蓽青龍復道符白犬遊山術要鎌戊巳月負鍤庚辛日時時斷障遮往往孤峰出行披葛仙注坐驗農皇帙龜蛇採二苓赤白尋雙末地凍根難盡藜枮苗易失從容肉作名薯蕷膏成質家豐松藥酒器貯參花蜜且復歸去來刀圭輔衰疾王績防病與其病後求良藥孰若病前能自防康節占卜事類尚占以卜筮者丨其丨易決疑鬬廉曰卜以丨丨不疑何卜左傳稽疑洪範次七曰明用丨丨擇建立卜筮人書決嫌龜為丨筴為筮先王所以使民信時日敬畏神畏法令也所以使民丨丨疑定猶豫也曲禮四兆春官卜師掌開龜之四兆一曰方兆二曰功兆三曰義兆四曰弓兆禮八􅗺占人掌占龜以八􅗺占八頌以八卦占􅗺之八故以眡吉凶禮恊從惟先蔽志昆命于元龜龜筮丨丨卜不習吉書大同三人占則從二人之言汝則有大疑謀及卜筮龜從筮從是之謂丨丨龜從筮逆作内吉作外凶龜筮共違於人用静吉用作凶洪範賛幽明聖人作易幽賛於神明而生蓍說卦審吉凶孟冬命太史釁龜筮占兆丨卦丨丨月令筮龜長短晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮筮短龜長不如從長左精誠吉凶季札以樂卜趙孟以詩卜襄仲歸父以言卜子㳺子夏以威儀卜沈尹氏以政卜孔成子以禮卜其應也如響無他圖在精誠而已不丨丨者不能自卜况吉凶他人乎陸龜蒙雜說庖犧始筮丨丨氏作丨有丨古史考伏羲得神蓍而定皇䇿鄭魴禹穴碑季主賣卜司馬丨丨楚人丨丨於長安市宋忠賈誼謂之曰何居之卑行之汚季主捧腹而大笑詹尹決疑屈原往見太卜鄭詹尹曰余有所疑願因先生決之離騷胡蘆知禍竇廷芝與卜者胡蘆生相善一日謂竇曰君家禍將至非遇黄中君鬼谷子將不可救廷芝物色求之得李鄴侯泌傾家結之未幾朱泚亂廷芝䧟賊事平徳宗命誅之泌以前事上聞得免劇談録以錢擲卦京房卜易卦以錢擲以甲子起卦投瓦為卜西京壽安縣有墨石山神祠頗靈神龍中前有兩瓦子過客投之以卜休咎仰為為吉覆為凶部新書變名於市武攸緒少變姓名賣卜長安市投龜于地秦王將討隠巢使卜人占之張公謹自外至丨丨丨丨曰卜以定猶豫今事無可疑何卜之為唐本傳日取百錢漢嚴君卜筮於成都市以為為卜筮賤業而可以惠衆人有邪惡非正之問則依龜筮為言與人子言依於孝與人弟言依於順與人臣言依於忠各因勢導之以善從吾言已過半矣日裁閲數人得百錢足自養則閉肆下簾而授老子揚雄少從㳺學數為朝廷在位賢者稱君平徳李强為益州牧喜謂雄曰吾真得嚴君平矣雄曰君備禮以待之彼可見而不可得詘强以為不然至蜀致禮與相見卒不敢言以為從事乃嘆曰楊子雲誠知人卦收十疋天寳末處士錢知微嘗至洛遂榜天津表柱賣卜一卦帛十疋居一日有貴公子讀榜命取帛如數卜焉錢命蓍布卦曰予筮可期一生君何戯為其人曰卜事甚切先生誤乎錢云請為韻語曰兩頭㸃土中心虚懸足人踏趿不肯下錢其人本意買天津橋也紿之其精如此酉陽雜爼卜知軍敗秦伯伐晉卜徒父筮之吉渉河晉侯軍敗詰之對曰乃大吉也三敗必獲晉君果如其言左傳筮謂王賔陳厲公生敬仲周内史筮之遇觀之否曰是謂觀國之光利用賓于王其代陳有國乎左傳賁非正色孔子嘗自蓍而卦得賁愀然有不平之狀子張進曰賁是吉卦夫子色有不平何也孔子曰山下有火丨丨丨丨也家語蓍遇非常明皇兼潞州别駕來朝京師將行使術士韓禮筮之蓍一筮孑然獨立禮驚曰蓍立竒瑞非常也不可言舊史兆得大横髙后崩丞相陳平等使人迎代王王計未定遂卜之龜丨丨丨丨庚庚余為天王夏啟以光史記象為天火馬重續晉髙祖以太原拒命廢帝遣兵圍之勢甚危急命馬重續筮之遇同人曰天火之象乾健而離明健者君之徳也明者南面而嚮之所以治天下也同人者人所同也必有同我者焉易曰戰乎乾乾西北也又曰相見乎離離南方也其同我者自北南乎乾西北也戰而勝其九月十月之交是嵗十月契丹遂助晉擊敗唐軍晉遂有天下五代史折足為敗李綱在隋宦不進筮之得鼎筮人曰君當為卿輔然待易姓乃如志仕不知退丨丨丨丨綱雖顯於唐數稱疾辭位去乗舟而來孔子使子貢往外而未來謂弟子兆之遇鼎皆言無下足不來顔子掩口而笑曰無足者丨丨丨丨賜至矣清朝子貢果至衝波傳使避屋崩晉淳于智能易筮譙人夏侯藻母病詣智卜忽有一狐當門向之號怖藻馳見智智曰君速歸在狐嘷處拊心啼哭令家人驚怪大小畢出一人匆出哭勿止藻如其言母亦扶病出堂屋五間拉然而崩預防火失管輅在田舎主人患失火輅卜曰明日南陌上有一角巾生駕黑牛故車必邀留如此言生不得已宿然意不安以為圖已乃把刀出門倚積薪假寐歘有一物如獸手中持火舉刀斫腰視之乃狐也火遂絶書版索金昔隗炤善易臨終書版授其妻子曰後雖大荒勿賣宅後五年當有詔使來此亭姓龔負吾金以吾所書版索之至期妻齎板詣使者使者惘然沉吟乃悟取著筮卦成曰妙哉隗生吾不負金賢夫藏金以待太平知吾善易書版寄意金有五百斤盛以青甕埋在堂屋下去壁一丈入地九尺妻掘之乃得金買鞭懸樹鮑瑗貧苦不信卜筮㑹淳于智至為作一卦曰君安宅失宜故貧入市有人持馬鞭賣買之以懸舎東大桑樹三年當暴得財如言後浚井得錢十萬銅二十斤被火焚囊郭公者客居河東精於卜筮郭璞從之受業公以青囊中書九卷與之門人趙載嘗竊青囊書為火所焚當庭懸綬王宗以賣卜自奉安帝以博士徴恥占驗見知懸綬於縣庭而逃六帖折菱土鬯匕獲奴唐杜生善易占有亡奴者問所從曰自此行逢使者懇丐其鞭若不可則以情告其人果值使者如其語使者曰去鞭吾無以進馬可折道傍菱土鬯匕代之乃往折菱土鬯匕奴伏其下獲之破甕得婦有人失妻管輅卜之令明日於東陽城門候擔豚人牽與共鬬其豚走逸即共追之豚入舍突破主人甕其婦從甕中出六帖蛇綬占祥後漢馮緄拜隴西太守綬笥有兩赤蛇分走許曼筮曰二嵗當為邊將官有重名五年為大將南征龜精著號錢元懿終年六十六初元懿之為新定有士方生時人號為龜精嘗疏卜辭以貽元懿曰太一接天河金華寳具多君侯六十六别處下經過至是皆如其言吳越備史預定狀頭太原王陟貞元初應進士舉時京師有善易者號垣下生陟從筮焉生卦成乆不復言又大嗟異謂陟曰此卦郎君後二十三年及第是嵗狀頭後兩年而生郎君待此人應舉然後同年及第某所以訝之後累舉不第亦不記垣下之所筮比張𢎞靖舍人知舉陟及第牓出復於禮部南院序列參主司各通姓名見首立者即韋瓘也陟忽憶垣下之言試問其年韋答云某春秋一十九年陟遽應之先軰所隠秖二年何不誠如是且先輩貞元四年生瓘矍然乃取垣下生所記示衆衆大驚瓘由此以實告出續定命録連遇宰相張鄧公嘗謂予曰某舉進士時與冦萊公遊相國寺詣一卜肆卜者曰二人皆宰相也既出逢張相齊賢王相随復往詣之卜者大驚曰一日之内而有四人相顧一笑而退因是卜者日消聲亦不復有人問之卒窮餓以死而四人者其後皆為宰相公欲為之作傳而未能也是時鄧公已致仕猶能道其姓名今予則又忘其姓名矣亦可哀也哉范蜀公蒙求剋擇事類日者通名占候時日通名日者史記占家異說褚先生曰臣為郎時與太卜待詔為郎者同署言曰武帝時聚㑹占家問之某日可娶婦乎五行家曰可堪輿家曰不可建除家曰大吉叢辰家曰大凶暦家曰小凶天人家曰小吉太一家曰大吉辨訟不决以狀聞制曰避諸死忌以五行為主人取於五行者也嵗為遊神晉孫邈傳舊疑嵗辰在夘此宅之左則彼宅之右何得俱忌於東邈以為太嵗之屬自是㳺神譬如日出之時向東皆逆非為藏體地中也本傳禮無忌月晉穆帝納后欲用九月是忌月范汪問王彪之答云禮無忌月不敢以所不見便謂無之博士曹耽荀訥等並謂無忌月之文不應有妨王洽曰若有忌月當復有忌嵗晉禮儀志不避哭辰張公謹卒太宗將出次哭之有司奏曰在辰不可帝曰君臣猶父子也情感於内安有所避遂哭之自令擇日唐劉瑑自河東召還宣宗視案上暦曰為朕擇一令日瑑跪曰某日良帝笑曰是日卿可遂相不問時日後漢郭鎮傳河南吳雄少家貧喪母營人所不封土擇葬其中喪事趣辦丨丨丨丨醫巫皆言當族㓕雄後致位司徒子孫三世廷尉故犯妖禁肅宗時司𨽻校尉趙興每入官舍輒更繕修館宇移穿改築丨丨丨丨子孫三世為司𨽻不忌反支漢明帝時公車以反支日不受章奏帝聞而怪曰民廢農業逺來詣闕復枸以禁忌豈為政之意乎遂蠲其制不忌甲窮王正以六甲窮日忌不出兵鄧禹因得理兵勒衆以獲劉均不忌往亡晉武帝攻慕容起諸將曰往亾之日兵家所忌帝曰我往彼亡吉孰大焉遂平廣固唐李愬攻蔡吳房吏曰往亡日法當避愬曰彼謂吾不來此可擊也不忌四廢宋武帝平司馬休之加領南蠻校尉將拜遇四廢日佐史白遷日不許來鄭鮮之上啟宋武帝云伏承明旦見南蠻是四廢日月朔好不識可從否答曰勞足下勤至吾初不擇日商芸小說不忌甲子後魏武帝討賀驎太史令姚崇曰紂以甲子亡兵家忌之帝曰紂以甲子亡周武不以甲子勝乎崇無以對進軍大破之不避嵗星晉苻堅引羣臣曰吾將薄伐南裔如何左衛率石越曰今嵗鎮星守斗牛福徳在吳不可犯也堅曰武王伐紂逆嵗犯星天道幽逺未可知也以吾之衆旅投鞭於江足斷其流載記興工無忌嘉祐中將修東華門太史言太嵗在東不可犯忌仁宗皇帝批其奏曰東家之西乃西家之東西家之東乃東家之西太嵗果何在其興工勿忌出行不擇康節先生丨丨丨丨日或告之以不利則不行盖曰人未言則不知既言則有知而行故畏神敵也繕脩禁忌今世俗營建宅舎或小遭疾厄皆云犯土故道家有謝土司章奏之文按後漢書安帝時皇太子驚病不安避幸乳母野王聖舎太子厨監邴吉以為聖舎新繕脩犯土禁不可久御然則古有其說矣容齊隨筆上官避忌今之上官者多忌正五九月或謂今本朝大徳火生於寅旺於午墓於戌此三箇月謂之灾月官員例減禄料無羊故謂無羊之月衆皆避之陰陽家云武徳詔此三月不行死刑禁屠殺師巫事類羣巫巫掌丨丨之政令若國大早則帥巫而舞雩周禮女巫丨丨掌嵗時袚除釁浴同上男曰巫女曰覡胡的反說文病忘謁巫宋陽里華子丨丨丨丨而卜之不吉列子嵗旱焚巫見前旱門下招魂魄帝告巫陽曰有人在下我欲輔之魂魄離散汝筮予之巫陽乃下招曰魂兮歸來些出宋玉招䰟巫陽女巫也預知生死鄭有神巫曰季咸知人之死生存亡禍福夀夭期以嵗月旬日若神鄭人見之皆棄而走不喜自聞死日也列子見之而心醉莊子漢宮桐蠱武帝末衛后寵襄江充用事充與太子及衛氏有隙㑹巫蠱事充因此為姦白言宮中有蠱氣遂至太子宮掘蠱得桐木人三輔舊事云充使胡巫作而埋之粤祠雞卜東甌王敬鬼夀一百六十廼命粤巫立丨祝丨而以丨丨上信之粤祠雞卜自此始漢郊祀志王嶼類巫丨丨為祠祭使專以祠解中帝意有所禳祓大抵丨丨覡鄴令沈巫西門豹為鄴令鄴三老廷豫嵗斂百姓錢為河伯娶婦巫行視小家女好者浮之河上行數十里乃没鄴至呼河伯婦視之曰是女子不好煩大巫嫗為入報河伯更求好女送之使吏卒抱大巫嫗投河中詳見水門置巫求媚棣王琰妃韋以過置别室求巫者宻置符琰履中以求媚披髮禳厭劉文静家數有怪異巫夜丨丨銜刀為丨丨書禁淫祀第五倫拜㑹稽太守㑹稽俗多淫祀民常以牛祭神倫移書屬縣曉諭百姓巫祝有依託鬼神詐怖愚民皆案論之有妄屠牛者吏輒行罰後遂斷絶請禁巫鬼陳子昻上言巫鬼營惑於人者禁之不許呼巫李勣疾家欲呼巫不許本傳戒勿用巫顔之推曰吾家巫覡符章絶於言議汝曹所見勿為妖妄家訓淫祀歌舞荆楚淫祀祀者舊矣有巫頗聞於鄉閭其初為人祀也筵席尋常歌迎舞將祈疾者健起祈嵗者豐穰其後為人祀也羊猪鮮肥清酤滿巵祈疾得死祈嵗得飢里人忿馬而思之未得適有言者曰吾昔㳺其家也其家無甚累故為人祀誠心罄乎中而福亦應乎外其胙必散之其後男女蕃息焉衣食廣大焉故為人祀誠不得整於中而神亦不歆乎外其胙且入其家是人非前聖而後愚盖牽於心而不服及人耳以一巫用心尚爾况異於是者乎羅隠符祝律令丨丨之類末句急急如丨丨者人以為飲酒之律令速去不得滯也一說漢朝每行卜之書皆云如丨丨言非律非令之文書行下當亦如律令故符祝有如律令之言按律令之令宜平聲讀為零律令是雷邊捷鬼此鬼善走與雷相疾速故云如此鬼之疾走也資暇詩集符師詛師毒口牙舌作霹靂聲丨丨弄刀筆朱墨交揮横韓遣瘧談命事類有命求之有道得之丨丨是求無益於得也求在外者也孟盡心畏命君子有三畏丨天丨畏大人畏聖人之言小人不知天命而不畏也語季氏動作威儀劉子曰民受天地之中以生所謂命也是以有丨丨丨丨之則以定命也能者飬以取福不能者敗以取禍成十三年吉凶曲折薛收曰何為命也子曰稽之於天合之於个丨丨丨丨無所逃乎非君子孰能知之文中子生死夀夭凡人有丨丨丨丨之命亦有貴賤貧富之命命當貧賤雖富貴之猶涉禍患失其富貴命當富貴雖貧賤之猶逢福善離其貧賤論衡貴賤貧富所謂命者死生焉丨丨焉丨丨焉治亂焉禍福焉此十者天之所賦也劉蕡䇿枝榦相配探五行之精占斗魁所建始作甲乙以名日謂之榦作子丑以名日謂之枝丨丨丨丨以成六旬後律歴志日月所㑹聖人必正厯數以定三統人以深知五星日月之㑹其術皆出焉此聖人知命之術也後藝文志孔子言命孔子五十而知天命子罕言命子曰道之將行也與命也道之將廢也與命也公伯寮其如命何語孟子知命孟子曰夀夭不貳脩身以俟之所以立命也又曰莫非命也順受其正是故知命者不立於巖牆之下盡其道者正命也桎梏死者非正命也孟盡心虚中星術李虚中最深於五行以人之始生年月日所值日辰支干相生勝衰死旺相斟酌推人夀夭貴賤利不利輒先處其年時百不失一韓退之作墓誌處訥歴學王丨丨通星丨之丨太宗時賛寜撰僧史十卷充史館編脩夀八十四處訥推其命孤薄三命禽略六壬遁甲俱無夀貴之處謂寜曰師生時正得天貴星臨門必有列土侯王在户否寜曰母長謂某生時方卧革錢文穆王元瓘往臨安縣拜塋至門雨作避於西茅簷甚乆浣浴襁藉徘佪方去湘山野録宰相由命章邭公得象曰人生貴賤莫不有命但生年月日時臨胎有三處合者不為宰相亦為樞副張方平宋子京退而召術者泛以朝士命推之惟得梁適呂公弼命各有三處合皇祐間梁為相熙寧中呂為樞宻使皆如其言歸田録術僧談命熙寜元豐間有僧化成者以命術聞於京師蔡元長兄弟始赴省試同往訪焉時問命者盈門彌日方得前既語以年月率爾語兀長曰此武官大使臣命也他時衣食不闕而已餘不可望也語元度曰此命甚佳今嵗便當登第十餘年間可為侍從又十年為執政然決不為真相晚年當以使相終既退元長大病其言元度曰觀其推步鹵莽如此何足信哉更俟旬日再往訪之則可驗矣旬日復往僧已不復記再以年月語之率爾而言悉如前說兄弟相顧大驚然是年遂同登科自是相繼貴顯於元長則大謬如此而元度終身無一語之差以此知世所謂命者類不可信其有合者皆偶中也却埽編詩集話生縁古寺相逢亦偶然謾將牛斗丨丨丨時行時止非人力莫問流年只問天朱文公逢僧談命問行年官職牽人亦可憐老來那更丨丨丨梁儂觧事無他語道我慈親夀八千楊廷秀送術者談天機今年見說也無錐政坐丨丨泄密丨舉世近來憎直語貴人剰許未為癡同上說星辰許子儒冠怨誤身如今投筆丨丨丨未須道我何時貴且道何時子脫貧災曜福星連珠合璧轉璇霄也被星家不見饒丨丨元來怯檮杌丨丨不是背簞瓢並同上牛角箕口我生之時日宿南斗丨奮其丨丨張其丨牛不見服箱斗不挹酒漿箕獨有神靈無時停簸揚韓退之三星行東坡自謂生時與退之相似盖命宮在斗牛而身宫亦在焉故其贈術士謝正臣詩云生時宿直牛斗箕說相事類心形善惡故相形不如論心論心不如擇術形不勝心心不勝術術正而心順之則形相雖惡而心術善無害為君子也形相雖善而心術惡無害為小人也君子之謂吉小人之謂凶故長短小大善惡形相非吉凶也古之人無有也學者不道也盖帝堯長帝舜短文王長周公短仲尼長子弓短昔者衛靈公有臣曰公孫吕身長七尺面長三尺焉廣三寸鼻目耳具而名動天下楚之孫叔敖期思之鄙人也突秃長左軒較之下而以楚霸葉公子髙㣲小短瘠行將不勝其衣然白公之亂也令尹子西司馬子期皆死焉葉公子髙入據楚誅白公定楚國如反手耳仁義功名善於後小世故事不揣長不揳大不㩲輕重亦將志手心耳長短大美惡形相豈論也哉且徐偃王之狀目可瞻焉仲尼之狀面如蒙倛周公之狀身如斷菑臯陶之狀色如削𤓰閎夭之狀面無見膚傳說之狀身如植鬐伊尹之狀面無須麋禹跳湯偏堯舜參眸子從者將論志意比類文學邪直將差長短辨美惡而相欺傲耶荀子非相篇心相有無相形不如相心心相有三十六善不近小人不忘故舊不念舊惡常行隂徳之類三十六善全有位極人臣諺曰有心無相相逐心生有相無心相随心滅青箱雜記貌似不同昔之聖者其首有若牛者其形有若蛇者其喙有若鳥者有貌若蒙倛者彼皆丨丨而心丨丨馬可謂之非人邪即有平脅曼膚顔如渥丹美而狼者貌則人矣其心則禽獸又烏可謂之人耶然則觀貌之是非不若論其心與其行事之為不失也韓愈雜記相貌有類今之相工言人相者必曰某相類龍某相類鳳某相類牛馬某至公侯某至卿相類禽獸則富貴也噫立形於天地分性於萬物其貴者不過人焉有真人形而貧賤類禽獸而富貴哉將今之人言其貌類禽獸則喜真人形則怒言其行類禽獸則怒真人心則喜夫以鳳為禽耶鳳則仁義之禽也以騶虞為獸耶騶虞則仁義之獸也今之人也仁義能符於是哉是其行又不若於禽獸也宜矣哉皮日休相觧云貴賤休咎丨丨之表近取諸身丨丨之證如指諸掌六帖帝王公侯龍犀日角帝王之表河目龜文公侯之相劉孝標辨亡論聖賢異貌堯眉入彩舜目二瞳子禹耳三漏文王四乳皐陶鳥喙注三漏有三穴也淮南子聖人異表孔叢子曰仲尼聖人之表河目隆顙是帝王之貌又史記姑布子卿相孔子其顙似堯其頂類臯陶其肩類子産然自腰以下不及禹三寸身長九尺六寸纍纍然若喪家之狗孔子世傳日角龍廷唐儉說秦王建大計髙祖嘗召訪之儉曰公丨丨丨丨性協圖誠係天下望乆矣若外嘯豪傑北招戎狄右收燕趙濟河而南以據秦雍湯武之業也本傳李珏舉明經李綘曰日角珠庭非庸人相明經碌碌非子所宜鳳姿日表唐太宗生四嵗有書生謁髙祖曰公相法貴人也必有貴子及見太宗曰龍丨之丨天丨之丨必能濟世安民唐本紀龍瞳鳳頸袁天綱見武后母曰夫人法生貴子后幼姆抱以見紿以男天綱視其步與目驚曰丨丨丨丨若為男當作天子武后傳虎頭燕頷漢班超詣相相者曰當封侯萬里之外問其狀曰燕頷虎頭飛而食肉萬里侯相也後封定逺侯本傳鳶肩火色岑文本謂馬周丨丨丨丨騰上必速恐不能久四十八嵗卒蜂目豺聲王敦字處仲潘滔相之曰處仲丨丨已露且丨丨未振若不噬人亦當為人所噬後為江州牧起兵内向後敗本傳鴟目虎吻王莽為侈口歷􅀈露眼赤精大聲而嘶長七尺五寸反膺髙視瞰臨左右有方技待詔黄門者或問以莽形貌待詔曰所謂丨丨丨丨豺狼之聲者也故能食人亦當為人所食莽傳虎狀豺聲楚子良生子越椒子文曰是子也熊丨之丨丨狼之丨不殺之必滅若敖氏矣鬼猶求食若敖氏之鬼不其餒而後果滅之左傳豺狼之聲初叔向欲娶於申公巫臣氏其母欲娶其黨叔向曰吾母多而庶鮮其懲舅氏矣其母曰子靈之妻殺三夫一君一子而亡一國兩卿矣可無懲乎向懼不敢取平公强使取之生伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰是丨丨丨丨也狼子野心非是莫喪羊舌氏矣遂弗視左昭公龍虎之氣唐王廷溱為戎職寐於道側有洛山人熟視之曰君鼻中之氣左如龍左如虎龍虎氣交當王後遇田洪正之難軍士夜推為留後唐年補録龍犀入額朱建平相書曰額有龍犀入角左角日右角月者王天下伏犀貫腦袁天綱見張行成馬周曰馬君丨丨丨丨背若有負貴驗也近世君臣相遇未有及公者然面澤赤而耳無根後骨不陸壽不長也張晚得官終位宰相伏犀貫枕袁天綱見竇軌曰君丨丨丨玉丨輔角全起十年且顯立功在梁益間後軌為益州行臺僕射袁傳赤脉干瞳竇軌後為益州行臺僕射袁天綱復曰丨丨丨丨方語而浮赤入大宅公為將必多殺願自戒軌果坐事見袁天綱曰公母憂右轉澤而動不乆必還果還為都督唐書額上五柱隋文帝楊堅龍丨丨有丨丨入頂有文在手曰王字長上短下相者來私謂帝曰公當為天子後果然同上髮際四道石勒賣為奴有老父謂勒曰君魚龍丨丨上丨丨已成當貴為天子忽然不見勒後僣位相得沛公單父人呂公善沛公避仇從之因家馬沛中豪吏聞令有重客皆往賀蕭何為主吏主進令諸大夫曰進不滿千錢坐之堂下髙祖為亭長素易諸吏紿曰賀錢萬實不持一錢謁入呂公大驚起迎之門呂公見髙祖狀貌因敬重之引入坐上坐蕭何曰劉季固多大言少成事酒闌呂公留髙祖曰君相貴不可言臣相人多矣無如季相願季自愛臣有息女願為箕帚妾即呂后也髙祖紀貌失子羽子路曰澹臺子羽有君子之容而行不勝其丨宰我有文雅之辭而智不充其辯孔子曰相馬以與相士以居弗可廢矣以容取人則丨之丨丨以言取人則失之宰予父子為相韋賢至大鴻臚有相工相之當至丞相賢有男四人又使相之至第二子𤣥成曰此子貴亦當為丞相賢曰我若為丞相有長子在是安得為之賢後竟為丞相既死而長子有罪乃立𤣥成𤣥成後又至丞相果如其言婦人當貴漢黄霸少為游徼與善相者共載出見一婦人相者言此丨丨丨富丨不然相書不可用也霸推問之乃鄉里巫家女霸即取為妻後霸至丞相封侯童有善相鍾繇嘗與族父瑜至洛陽道遇相者曰此丨丨貴相然當厄於水行未十里度橋馬驚墮水幾死瑜以相者言中益貴繇而供資費使得專學出本傳兒有竒骨桓温生未期温嶠見之曰此丨丨丨丨可試使啼及聞其聲曰真英物也父以其為嶠所賞故名曰温同上奴當侯封漢衛青少為平陽侯家人青嘗從人至甘泉居室有一鉗徒相青曰貴人也官至封侯青笑曰人奴之生得無笞罵即足矣安得封侯事乎後為大將軍封長平侯吏有侯骨翟方進年十五為小吏遲鈍數為掾吏罵辱乃詣蔡父相大竒其形曰小丨也而丨丨丨當以經術進謝病而歸同上子有好相羊祜字叔子遊汶水濱父老謂曰孺丨丨丨丨年六十建大功既言而去莫知所在晉書卿無貴相王顯與太宗皇帝有子陵之舊每掣褌為戯捋帽為歡帝㣲時常戯顯曰王顯抵老不作繭及帝登極而顯謁因召其三子皆授五品顯獨不及謂曰丨丨丨丨朕非為卿惜也房元齡謂曰陛下龍潜之舊何不試與之帝與之三品取紫袍金帶錫之其夜卒竒厖者貴唐李勣臨事選將必資相丨丨福艾丨遣之人問其故答曰薄命之人不足與成功名也豐下有後叔服來聘公孫敖聞其能相人見其二子焉叔服曰穀也食子難也收子穀也丨丨必丨丨於魯有美不貧張負曰豈丨丨如陳平而長貧者乎當刑而王黥布姓英氏少時客相之曰丨丨丨丨及壯坐法黥布欣然而笑曰人相我丨丨丨丨幾是乎赤脉入目歴陽陳訓相甘卓曰頭低視仰相名眄力目中丨丨自外丨必兵死後果為王敦所笑晉書從理入口周亞夫為河内守許負相之曰君後三嵗為侯侯八歳為將相持國秉政後九年而餓死亞夫笑曰既已貴如負言又何說餓死負指其口曰丨丨丨丨此餓死法也貧當餓死文帝使善相者相鄧通曰當貧餓死上曰能富通者在我於是賜蜀嚴道銅山得自鑄錢景帝即位人有告通盜出徼外鑄錢竟案驗没入之寄死人家本傳狀有反相漢髙帝立兄子濞為呉王已受印召濞相之曰若丨丨丨丨獨悔業已拜因拊其背曰漢後五十年東南有亂豈若耶後果反濞傳面部三無李寛為常侍有門下士姓盧善相或問李公如何曰據其面部所無者三無子無宅無塜公有數子皆先公卒有宅未嘗還鄉居死于池州乗舟歸舟破沈其骨金華子命數多蹇魏元忠有善相者謂曰公當位極人臣然命多蹇剥時有憂懼不足為虞但可當事便行聞言則應元忠累遭譴責憶相者之言未嘗少屈其志定命録目𦕈貴相章昭達少遇相者曰卿貌甚善須小虧則當富貴大同中昭達因醉墮馬鬢角少傷昭達喜之相者曰未也侯景之亂昭達為流矢所中𦕈其一目相者見之曰卿相善矣不乆當富貴後為司空耳大貴兆李忠臣帝嘗謂卿丨丨丨丨對曰驢耳大龍耳小帝喜其野而誠龜息必貴袁天綱相竇軌伏犀貫玉枕當于益州立功名果然又相李嶠曰睡則氣從耳出名丨丨丨丨芝田録虎面當武袁天綱在洛陽與杜淹王珪韋挺㳺天綱謂淹曰公蘭臺學堂全且博將以文章顯謂珪法令成天地相臨不十年官五品謂挺面如虎當以文處官然三君乆皆得譴吾且見之至武徳中俱以事流雋州已貴問夀蔡澤從唐舉相曰吾聞先生相李充百日之内持國秉政有之乎曰有之曰若臣者何如唐舉熟視而笑曰君曷鼻巨肩魋顔蹙齃膝攣吾聞聖人不相殆先生乎蔡澤知唐舉戯之乃曰富貴吾所自有所不知者夀也願聞之唐舉曰從今以往四十二嵗蔡澤笑謝而去謂其御者曰吾躍馬疾驅懐黄金之印結綬于腰揖讓人主之前食肉富貴四十年足矣相夭反貴栁渾十餘嵗有巫告曰兒相夭且賤為浮屠可緩死諸父欲從其言渾曰去聖教為異術不若速死學愈篤後至宰相相不當侯李廣與望氣王朔語曰自漢征匈奴廣未嘗不在其中而諸校尉才能不及中庸以軍功取封侯者數十人廣不為後人然終無尺寸功以得封邑者何也豈吾相不當侯也相皆不夀管輅言吾額上無生骨眼中無守精鼻無梁脚無天根背無三甲腹無三壬皆不夀之相領取宰相衡岳寺有僧執役性懶而食殘號懶殘李泌異之一日往見正撥火煨芋啖之取共半授泌曰勿多言丨丨十年丨丨甘澤謠止二千石魏張緝為尚書郎為明帝所識帝以緝之才能多所堪任試呼相工相之相者云不過二千石帝曰何才如是而位丨丨丨丨乎刺指見字善相者師圭謂陶侃曰君左手中指有竪理當為公若徹上貴不可言侃以針刺指見血灑壁而為公字以紙裹手公字愈明攬鏡知刑蜀張裕曉相術每舉鏡視面自知刑死未嘗不撲之於地後為劉備所殺捫骨知貴唐貞元末相骨山人以無目故逢人即手捫之必知貴賤房次卿方勇於趍進率先訪之及出户時後謁者盈巷覩次卿以出迎問之曰如何答曰不足言不足言且道箇杜長秀才位極人臣何必更言或有退者後杜循果帯相印鎮西蜀云太平廣記因怒見相張憬臧相魏元忠乆不答元忠怒曰窮通有命何預君耶拂衣去憬臧遽起曰君之相在怒時位必卿相也同上隂徳紋見裴晉公質狀𦕈小有相者曰郎君若不至貴即當餓死一日遊香山寺有婦人以父被罪假得玉帶三犀帶一以賂津要寘于欄楯忘收之而去度得而授之後見相者曰必有丨丨及物前途萬里非某所知也度果位極人臣摭言玉枕骨亡唐杭州獄吏凌華遇相者曰能捨吏當為上將軍華為吏酷暴以取賄元和初病一夕死見黄衣使宣牒云華昔宰劇縣甚著能續後有闕行謫官環扉俟其循省大乖乃心玉枕巋然委於庸賤付司追凌鑿丨丨骨送上俄有執刀斧鑿其腦華既醒捫其腦而丨丨後十五年暴卒異記相類亞夫南唐宋齊邱微時日者相之曰君貴不可言然亞夫下獄君實有之位極之日當早引退庶幾保全齊邱登相位數載致仕復以大司徒就徴未幾坐陳覺謀千紀事乃賜死唐書狀似劉琨劉掞稱桓温眼如紫石稜鬚作蝟毛磔初桓温自以雄姿是宣帝劉琨之流北伐還得一巧作老婢訪之乃琨妓女也一見温潸然而泣温問故答曰公甚似劉司空温笑出外整理衣冠入呼婢問婢云面甚似恨薄眼甚似恨小鬚甚似恨赤形甚似恨短聲甚似恨雌温於是裭冠解帶昏然而睡不怡者數日同上肉不稱骨袁天綱視岑文本曰學堂瑩夷故文章振天下首生骨未成目前而視法三品丨丨丨丨非夀兆也唐史本傳身不如面五代桑維翰為人醜怪身短而面長常臨鏡自竒曰七尺之丨丨丨一尺之丨後至相同上眉過其目袁天綱見岑文本曰學堂瑩夷丨丨目文章振天下同上拳必入口吳殷文圭舉進士塗中遇一叟目文圭乆之謂人曰向者一人眉緑丨丨丨丨神仙狀也如學道當冲虚不爾有大名於天下而文圭拳實入口乾寧中擢第九國志體貌甚陋唐盧杞體甚陋鬼貌藍色不耻惡衣菲食同上骨法非常五代錢鏐縣錄事鍾起有子數人多切從之遊豫章人有善術者望斗牛間有王氣斗牛錢塘分也因遊錢塘隂求其人私謂起曰占君縣貴人求之市中不可得視君之相貴矣然不足當之鏐適從外來見起反走術者望見之曰此真貴人也召至熟視之顧起曰君之貴因此人乃慰鏐曰子丨丨丨丨願自愛衆中辨貴江南一節度使召相者命其妻立羣婢中令辨之相者云夫人頭上有黄氣羣婢皆切視之然後云某人是又拖工大兒雜立使辨之云面上有水波者是亦用此術雜志術士崔𤣥豹以相法言人事多中莊宗尤信重之以為北京巡官明宗為内衙指揮使安重誨乃使他人與明宗易服而坐明宗於下坐召𤣥豹相之𤣥豹曰内衙貴將也此不足當之乃指明宗於下坐曰此是也因為明宗言其後貴不可言明宗即位思𤣥豹以為神召至京師鳳諫曰好惡上所謹也今陛下神其術而召之則傾國之人皆將奔走吉凶之說明宗遂不復召五代史貴人識貴曽諫議致和性剛介少許可一日在李侍郎虚已坐上見晏元獻公晏李之壻也時方為奉禮郎諫議熟視之曰晏奉禮他日貴甚但老夫耄矣不及見子為相也呂許公夷簡為相日文潞公為太學博士謁許公改容禮接因語之曰太博此去十年當踐其位夏英公謫守黄州時龎穎公司理參軍英公曰龎司理他日富貴逺過於我既而四公皆至元宰古云丨丨多丨丨人信有之也耳白齒露歐公嘗曰少時有僧相我耳白於面名滿天下唇不着丨無事得謗其言頗驗仇池筆録河目海口洛人陳去非丨丨丨丨大耳聳峙識者知其為貴人也及徽宗時為參政富安宰相王欽若鄉薦赴闕謁錢希白時錢以才名獨歩館閣適延一術士不通客欽若厲聲喝閽人術者遥聞之謂錢曰不知何人邪若形聲相稱世無比貴者錢召之而欽若單微神貌踈瘦復贅於頸錢蔑視之術者竦然側目而視欽若起術者稱歎曰人中之貴有此十全者若宰相則天下康富君臣相得至死有慶而無弔不全者但無子而已錢戯曰他日將陶鑄吾輩乎曰恐不在他日後希白為翰林學士而欽若已真拜歸田録清粹公卿錢若水為舉子見陳希夷於華山希夷曰明日當再來若水如期往見有一老僧與希夷擁地爐坐僧熟視若水乆之不語以大箸盡灰作做不得三字徐曰急流中勇退人也若水辭去希夷不復留陳戒曰三兩日却來若水如期往陳曰吾始見子神觀丨丨謂可學神仙然見之未精不敢奉許特召此僧決之渠云子無仙骨但可作貴丨丨耳後若水登科為樞宻副使年才四十致仕老僧者麻衣道者也湘山野録骨類多遜宼莱公十九及第有相者曰君相甚貴丨體丨盧丨丨但及第太早恐不善終若早退庶免深禍筆録眼似王敦李承之在宋仁宗朝官州縣因邸吏報包拯拜參政或曰朝廷自此多事承之正色曰包公無能為今知郡縣王安石丨多白甚丨丨丨他日亂天下者此人也邵氏聞見録手相甚貴王克正任江南歸本朝直舍人院及死無子其家修佛事惟一女十餘嵗跪爐於像前㑹陳摶入弔出語人曰王氏女吾雖不見其面但觀其捧爐丨丨丨丨若是男子當白衣入翰林女子嫁即為國夫人後陳晉公恕為參知政事一日太宗從容問曰卿娶誰氏有幾子對曰臣無妻今有二子太宗曰王克正江南舊族身後惟一女令淑卿可作配晉公辭年髙太宗敦諭再三遂納為室不數日封郡夫人如陳之相也筆録骨相當貴种放字明逸隠居終南山豹林谷聞希夷之風往見之希夷先生一日令灑掃庭除曰當有嘉客至明逸作樵夫拜庭下希夷挽之而上曰君豈樵者二十年後當有顯官名聲聞天下明逸曰放以道義來官禄非所問也希夷笑曰人之貴賤莫不有命君丨丨丨爾雖晦跡山林恐竟不能安異日自知之後明逸在真廟朝以司諫赴召帝携其手登龍圖閣論天下事及辭歸山遷諫議大夫東封改給事中西祀改工部侍郎希夷又謂明速曰君不娶可得中夀明逸從之至六十嵗卒喉骨太髙初王旦與錢若水同直史館有僧善相謂若水曰王含人他日位極人臣富貴無比若水曰王舎人面偏而丨丨髙如何其貴也僧曰作相之後面當自正喉骨髙者主自奉養薄耳後果如言面自正涑水記頭骨不正李士寜道人蓬州人先得塗氏所藏軒轅山鏡洞見逺近蔡君謨學士以道自任聞先生之名望風惡之君謨一夕夢為虎所逼有一人救之虎既去與之坐曰公貴人也但丨丨丨丨乃以手為按之曰頭骨已正矣夢覺頭尚痛翌日先生謁君謨謂曰夜夢頗驚惶否君謨愕然視其狀乃夢中逐虎正骨者遂異之後出守閩中先生經由謁君謨因告先生乆患目疾不愈昨夜夢龍樹菩薩先生即於袖中出畫本視之一如夢中所見先生乃瞠目視君謨須臾兩目豁然明快參政張公方平兩制時先生出入門下極相善時論以為公且大拜先生以詩别公云異時復與公相見正是江南二月天其後乆無爰立之説忽除知江寧先生自茅山来謁即仲春也李璧荆公詩注真大貴人陳瑩中嘗入朝已立班上御朝差晚杲日照曜衆莫敢仰視蔡京注目乆而不瞬瑩中私謂中省曰此公視日不瞬丨丨丨丨也百家詩篇半食戎禄真宗為開封尹呼一術者且瞽令張者夏守斌楊崇勲輩揣聽聲骨或中或否至王繼忠瞽者駭曰此人可訝半生食漢禄丨生丨丨丨真宗笑而遣之繼忠復為髙陽總管咸平六年與狄戰遂䧟狄狄以其姿儀雄偉以女妻之偽封為吳王改姓邪律終於狄玉壺清話熟睡乃相蘇子美謫居吳門有相僧子美謂之云俟寢方可觀子美一日丨丨僧揭帳視之但云來得也曷吳人語甚為曷子美扣之乃曰得一州縣官肯起否子美意復召用聞之不樂果復湖州長史而卒百家詩序聽聲知相術士王生瞽而善丨丨丁晉公守金陵王生潜聽其馬蹄聲曰參政月中必召拜相果如其言後真宗晏駕公充山陵使王生來京師俾聽馬蹄聲曰有西行之兆諸子責曰爾知相公充山陵使故有是說或宻問之曰蹄西去而無囬聲後果罷相分司西京繼貶崖州該聞録厮役皆貴太宗召陳摶問以伐河東之事不答後師出果無功還華山數年再召謂帝曰河東之事今可矣遂克太原帝以其相人也遣詣南衙見真宗及門亟還問其故曰王門丨丨皆將相也何必見王建儲之議遂定聞見録子孫當盛韓參政億李參政若谷王丞相隨未第時同於嵩山法王寺讀書有一男子自言善相曰王君宰相才也韓李二君皆當為執政王君官雖髙子孫不及韓李二君之盛後韓參政之子絳縝皆為宰相維為參政李參政之子淑領三院學士有文名兩家宦學至今不衰王丞相之後微矣異哉聞見録詩集言近真心傳異學不謀身自要清時閲縉紳火色上騰雖有數急流勇退豈無人書中苦覔元非訣醉裏微丨却丨丨我似樂天君記取華顛賞遍洛陽春東坡贈相者語多竒蜀狂士寧者不邪亦不正混世使人疑詭譎非一行平生不把筆對酒時歌詠初如不着意丨出丨丨勁傾財解人難去不道名姓金錢買酒醉髙樓明月滿牀猶不醒一身四海却為家獨行萬里聊乗興既不採藥賣城市又不㸃石化黄金進不干公卿退不隠山林與之㳺者但愛其人莫識其術安知其心吾聞有道之士逍遙太虚動與道俱故能入火不熱入水不濡常聞其語而未見其人豈斯人之徒歟不然則言不純師行不純表滑稽傲世其東方朔之流乎歐陽永叔古今合璧事類備要前集卷五十五
