注十篇辨疑七篇微情二篇明章大中𤼵露公器其道以生一本作聖人為主以堯舜為的包羅旁魄膠轇上下而不出於正其法以文武為首以周公為翼揖遜升降好惡喜怒而不過乎物既成必授世之聰明之士使陳而明之故其書出焉而先生為臣儒用是為天子争臣尚書郎國子博士給事中皇太子侍讀皆得其道刺二州守人知仁永貞年侍東宫言其所學為古書臣圖以獻而道達乎上是嵗嗣天子踐祚而理尊優師儒先生以疾聞終曰于京師陸淳宇元冲避憲宗諱改賜名質門人私諡文通先生太子春坊歴代㳂革北齊有門下坊庶子領之典書坊庶子領之隋門下坊置左庶子典書坊置右庶子唐龍朔中改門下坊曰左春坊左庶子中允司議郎左諭徳左賛善大夫崇文館學士校書郎洗馬文學校書正字等𨽻焉典春坊曰右春坊右庶子中舍人太子舍人右諭徳右賛善大夫太子通事舍人家令率更令等頴焉及本朝建儲闈即置仁宗神宗升儲並以内臣為左右春坊勾當左右春坊事中興不置孝宗乾道元年立皇太子置左右春坊二貟同左右春坊二員孝宗㑹要注又朱文公語録或問東宫宮屬曰唐六典載太子東宫官制甚詳如一小朝廷置詹事以統衆務則猶朝廷之尚書也置左右二春坊以領衆局則猶朝廷之中書門下省也左右春坊又皆設官又各師其屬之意崇文館猶朝廷之館閣贊善大夫猶朝廷之諫議大夫其官職一視朝廷而為之隆殺此等制度猶好今之東官官屬極苟簡左右春坊舊制選賢徳者為之今遂用武弁之小有才者其次惟有講讀數貟而已如贊善大夫諸官又但為階官非實有職業神宗以唐六典改官制當時亦有不曽討論者如東宫官屬之不備是也舊嘗入劄論東宫官制疎畧宜倣舊損益之不改事類儲宷寶厯三年詔長慶以來兩河用兵偏禆立勲擢寘周行率以丨丨王官雜補之列局太和四年左庶子孫革奏青宫丨丨護翼元和備坊寀丨儲丨之丨胡文㳟行趙沐制資善堂歴代沿革資善堂翊善賛讓紹興五年六月初置以命朱子開范元長時孝宗以建國公就傅故也其後孝宗出閣就第而信王幼亦命近臣踵為之開禧元年七月皇弟初封榮王命程少逸左史兼贊讀少逸以祖諱辭乃命軍器監趙子中夢極兼領其不稱皇府而以資善繫銜盖以未出閤之故朝野雜記事類極選得人本朝趙鼎一日上語鼎曰欲令孝宗御諱出閤選官教之用范冲朱震為翊善朝論二人為丨天下之丨上謂鼎曰臺諫語及資善之建皆朱震范仲天生此二人為今日資善之用可謂丨丨矣趙鼎事實日陳正道婁机字彦發諡忠簡為資善小學教授時皇太子為恵國公丨丨正言丨丨又以累朝事親修身治國愛民四字手書以獻寘之左右朝夕觀省樓攻媿集古今合璧事類備要後集卷四十六
