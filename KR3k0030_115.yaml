body:
  text: 古今合璧事類備要後集卷四十六宋謝維新撰東宫官門太子賔客歴代㳂革晉愍懷太子在東宮選人臣子弟有名稱者以為賔友唐太子賔客四人正三品掌侍從規諫賛相禮儀宴㑹則上齒百官志正觀十八年以宰相兼賔客開元定貟四人國朝天禧四年參政任中正樞副錢惟演參政王曽並兼太子賔客執政兼東宫官自此始職官分紀事類調護夫望優四皓然後能丨丨春闈白居易趙昌制左右李固言將作監王堪坐治太廟不謹改太子賔客固言上還制書曰陛下當以名臣丨丨太子堪以漫官斤居調護地非所宜安車唐攸緒中宗初降封巢國公遣杜謹盈齎書以丨丨召拜太子賔客告祈遷山詔可授經鄭肅開成二年詔拜吏部侍郎以肅嘗侍太子言論正典復令兼太子賔客為東宫丨丨既而太子失寵上有廢斥意肅召見詳陳天下夫本不可輕動意上改容嘉之唐書如師傅禮國朝至道元年尚書左丞李至禮部侍郎李沆兼太子賔客見皇太子丨丨丨之丨上召謂至等曰朕以太子仁孝賢則今立為儲貳以為國本當須正人輔之卿等可盡心調護若動皆用禮必須贊成如事稍有未當不當隨順至於禮樂詩書之道可以禆益太子者皆卿等素習不假朕多訓也以為宰相李文定公參知政事時仁皇為太子文定為賔客一日召對滋福殿方相之固辭職太子出謝蒙恩丨賔客丨丨丨真宗顧謂曰尚可辭也乃拜吏部侍郎兼太子太傅同中書門下平章事栁子厚先友記元全柔河南人氣象甚偉好以徳報怨恢然者也為大官有土地入為太子賔客皇甫政河南人有威儀由浙東亷使為太子賔客栁宗元曰先君之所與友凡天下善士舉集焉信譲而大顯道博而無雜今之世言交者以為端敢悉書所尤厚者附兹右以銘于背如右太子詹事歴代㳂革秦宫應邵曰詹省也給也漢因之掌太子家位在長秋上成帝鴻嘉三年省魏復置詹事領東宫衆務晉或置或否齊置府領官屬梁陳任摠宫朝後魏有太子左右詹事北齊東宫衆事無大小皆統之唐置詹事府詹事一人正三品少詹事一人正四品上掌統三事十率府之改内外衆務糾彈非違總判府事置少詹事以貳之龍朔改端尹少尹咸通復垂拱改宫尹神龍復通典至國朝東宫官有詹事仁宗升儲置詹事二人神宗升儲置詹事二人欽宗升儲置詹事二人多以它官兼充及登位亦省兩朝國史志事類儲端丨丨任顯東西兩晉兹選特難注太子詹事也沈納齊安陛碑宫端江總為丨丨分紀揣司丨丨之任王莽表端任尚居丨丨之榮李藩太子詹事制彈肅詹事丨丨一宫王昬答徐􅀈書審喻李綱為太子詹事太子嘗遊有進魚者太子使膾之唐儉趙元鼎自言其能太子曰持刀膾腥和鼎味公等善之若弼諧丨丨則屬綱矣唐書以經授孔霸宣帝時丨丨丨太子為詹事漢書有功領謝琰征羗丨丨為輔國將軍丨太子詹事晉書品第三丨丨丨銀章青綬擬尚書令位視領將軍同上乂魏詹事丨丨丨掌東宫内外庶務三千石秩丨丨丨晉公卿六帖多其正唐馮定改太子詹事鄭覃兼太子少師上曰欲㑹尚書省定據禮當集詹事府論者丨丨丨問其言劉憲遷太子詹事時𤣥宗在東宫雅意墳史憲曰陛下儲副非以尋常摘意要通大意而已侍讀褚元亮經明行修宜召丨以察丨丨妙選賢才晉武帝以王㳟為太陽尹領太子詹事㳟讓表曰今日王儲始建四方是式總司之任崇替所由宜丨丨丨丨盡一時之勝晉起居注必俟材英弼諧儲副丨丨丨丨總務宫端尤資忠量唐李寛太子詹事册學問過人晉王㳟領詹事丨丨清操丨丨有才無實陳後主在東宫欲以江摠為詹事孔奐曰江摠丨潘陸之丨而丨園綺之丨輔弼儲貳切謂非宜儲端華重梁陸倕除詹事允讓表云丨丨丨丨實異書司分紀肅事東朝嗣許王太子詹事制云彈違是屬宜丨丨於丨丨漢選竇卿丨朝丨徳禮儀俊於丨丨晉任謝琰丨代丨賢光榮歸於丨丨並同上裁斷事上晉卞壺遷太子詹事代稱壼丨丨朝實忠於丨丨彈肅任賢博望㫁裁之規輿情僉屬承華丨丨之寄丨丨斯在唐大詔令李寛太子詹事册駕紫谷英皇太子霞褰青殿日晃春宫丨丨丨之丨振洛笙之響器上白雲韻同明月何以延芳芝苑插羽瓊林竇嬰戚貴於西京陸曄風嘉於東國伊人之美方曰可舉孔雅圭表指搘牀龜張説女嫁盧氏嘗為舅盧公求官候父下朝而問焉父不語但丨丨丨丨而示之女歸告其夫曰舅得詹事矣本傳宫坊清班丨丨丨丨白集行張偉謝龍樓上寮丨丨丨丨宋榮制代為詹事鄭鏦字利用為太子詹事鏦卒弟丨丨丨丨員為詹事嚴挺之徙絳州帝顧林甫曰挺之安在此其材可用林甫召其弟損之曰天子視絳州厚要當以事自解歸見上且大用因給挺之使稱疾林甫即奏挺之春秋髙有疾幸得閒官自養帝恨叱久之乃以為丨丨丨丨詔歸東都四上書諫唐桃珽遷詹事兼左庶子節愍太子稍失道珽凡丨丨丨中宗嘉嘆焉舊長史除唐髙宗為皇太子轉李勣太子詹事右弼率太宗謂曰我兒新登儲貳卿丨丨丨故有此丨雖屈階資可勿怪也羊琇願為而匪獲晉丨丨少與武帝同年相愛嘗謂帝曰若得天下用我為領護軍太子詹事武帝即位琇但左衛將軍不可詹事也謝琰有功而後領見前有功領下注栁子厚祭楊詹事文卿雲輪囷天漢昭回自然物外寧雜塵埃公稟間氣心靈洞開翺翔自得誰屑群猜孝友忠信聞于九垓擒華發藻其動如雷世榮甲科亦矜顯處公之俊徳有而不顧御史之選朝之所注公勤于養投刻引去時任方隅威刑是務公施其惠亦莫有還京兆之難下多怨怒或由以黜瓦石盈路公捍其强仁及童孺左遷而出擁道牽慕道峻多謗徳優見憎煩言既詆倚法斯繩南過九疑東逾秣陵顛沛三載天書乃徴入𫝊王國嘉聲聿興詹事東宫致政是膺年唯始至道則彌勵頡頏今古優游徳藝實期濬𤼵再光文陛誰謂昊天遽兹降厲太子庶子歴代㳂革周禮諸子掌國子之倅國有大事則帥國子而攷於大子唯所用之禮記聘義作庶子古者天子有庶子之官職諸侯卿大夫士之庶子之卒掌其戒令與其教治庶子猶諸子周禮諸子之官司馬屬有大事則仕國子而致於太子唯所用之秦置中庶子員漢庶子為太子少傅屬官後漢貟五人晉有中庶子庶子各四人末中庶子與功髙中舍人一人共掌其坊之政令庶子掌侍從左右與功髙通事舍人一人共掌其坊之禁令隋有左右庶子唐龍朔中改左庶子為左中護右庶子為右中護咸享中復故掌侍從賛相駁正啓奏右庶子掌侍從獻納啓奏通典六典糾正違闕儐相威儀我國朝東宫官有左右庶子舊制不常設每諸闈之建隨宜置官以備僚宷多以他官兼領仁宗升儲置二人仁宗升儲置二人欽宗升儲置一人四朝志乾道中庶子諭徳除左不除右孝宗㑹要七年詔庶子諭徳輪日入宫仍同供故事事類肅敬漢王商字子威為太子中庶子以丨丨見稱前漢清白魏鮑勛丨丨有髙節知名當為中庶子在東宫正色不撓賔儲晉陸禕碑云委戈執笏入丨皇丨西田録要任晉武帝置中庶子四人一宫晉起居注通詩漢馮野王丨丨以父任為太子中庶子前漢盡諫蜀後主立太子璿以霍戈為中庶子太子好騎射出入戈輔引古義丨言規丨得切磋之體輔相唐常衮庶子制云丨丨東禁翼贊唐休景右庶子制云巨源諸老仍參丨丨之榮諌苑于志寧為右庶子以承乾數虧禮度志在正救撰丨丨二十卷諷之太宗大悅類要典儀肅宗在東宫孔寅中庶子經學博該識舊丨朝丨禮制春宫唐房喬方太子入丨丨拜右庶子正觀初遷中書令唐書侍讀唐王方慶拜左庶子進封公奉入同職事三品兼丨太子丨書中䕶唐龍朔三年改門下坊為左春坊典書坊為右春坊左庶子為左丨丨右庶子為右丨丨公望唐錢徽在左庶子韓武以賂結公卿遺徽二十萬不納時稱有丨丨宫相賢哉丨丨唐李陽氷作李庶子新泉銘寵蒙恬秦丨丨丨恬輔太子扶蘇白氏帖導孔演晉丨丨丨演傳經學並為庶子同上修宫政栁宗元為栁渾相國行狀云拜右庶子奉翊儲宫丨其丨丨尹宫坊姜公輔左庶子制云俾丨丨丨陸集官清密孫登為太子時太傅張温言於孫權曰中庶子丨最丨丨切開近對宜用雋選於是乃用陳長為中庶子吳志久承華王瑒父冲嘗為瑒辭領中庶子文帝謂冲曰所以丨留瑒於丨丨正欲使太子微有瑒風云耳陳書宜宫職齊袁粲言於帝曰臣觀張緒有正始遺風丨為丨丨後轉中庶子齊書難儲選陶伉遷中庶子曰君少而好學善談元理尤明詩易以孝聞於時儲選殊難其人特召君焉陶氏家𫝊衛太子家國家故事選公卿列侯子孫丨丨丨丨為中庶班彪牋稱陪臣事鄭黙為中庶子朝廷以為太子官屬宜丨丨丨黙上言官臣皆受命天朝不得同藩國丨遂施行晉書沈静復素晉武帝咸寧元年詔皇甫謐丨丨丨丨守學好古其以謐為太子中庶子晉起居注端居守道趙宗儒字秉文罷相為右庶子丨丨丨丨徳宗嘉之遷吏部侍郎召見勞之曰知卿閉關六年故有此拜身任公卿隋太子勇宴宫臣左庶子唐令則自請奏琵琶又歌武媚娘之曲太子洗馬李綱白舅曰令則丨丨丨丨職當調䕶乃於宴坐自比倡優請正其罪唐太子制日直東宫劉泪與岑文本馬周遞丨丨丨丨輔殿下道隋劉行本為左庶子太子嘗得良乗令行本馬行本正色而進曰至尊致臣於庶子之位者欲令丨導丨丨以正丨非殿下弄臣太子慚而止又唐太宗謂于志寧曰今太子幼卿當輔以正道太子承乾數有過惡于志寧止之以諷授太子經歐陽地餘字長賔為中庶子丨皇丨丨丨職授八舍丨丨丨丨八次八舍之職環濟要畧注庶子謂八舍之職班同三舍丨丨丨丨擬侍中中書侍郎班次同又唐休璟自夏官尚書授左庶子制云宜輟五曹之務俾同生舍之班入侍儲幄顔含受命天朝丨丨丨丨同上侍讀東宫崔神基長安中轉太子右庶子時突厥使者入見有司移文召太子神基諫曰今大子非朝朔望而别喚者請降墨敕詔與詹事更日丨丨丨丨並同上進藥石言髙季輔為右庶子上疏切諫時攻得失特賜鍾乳一劑曰丨丨丨之丨故以藥答報諫寺人用太子承乾左右多任宦官于志寧丨曰専柔便佞出納禍福伊吏敗易牙敗齊趙髙亡秦張讓傾漢近髙齊任鄧長顒陳徳信齊卒傾覆殿下皆用丨丨輕忽髙班凌轢貴仕品命失序經紀不立太子不悦以宰相兼唐宋璟丨丨丨丨庶子以太守參中庶子闕宜得俊茂者欲以濟隂劉儀城陽丨丨石崇丨選命職中庶郭子儀家𫝊曰詔以公弟為左庶子公作讓表曰况儲宫丨丨丨丨為重位列龍樓唐宋申鍚制云丨丨丨丨大詔令與典機劇唐許敬宗髙宗在東宫遷太子右庶子太子監國定州敬宗丨髙士㢘丨丨丨屏居恬静唐趙宗儒罷為太子右庶子丨丨丨丨奉朝請而已未有斥太子名唐正方慶奏人臣於太子丨丨丨丨丨丨者稱皇太子不名今東宫門殿名多嫌觸當一改之詔可晉山濤啓事輟卿以佐太子杜正倫傳帝詔正倫曰吾兒幼未有就徳我嘗物物戒之故丨丨於朝丨丨丨丨諫議兼右庶子國朝張士遜仁宗為皇太子遷右丨丨大夫丨右丨丨又為賔客既而兩府大臣皆領東宫官東都事畧判官兼左庶子楊徽之字仲猷真宗為開封尹妙選僚屬召徽之為府丨丨丨丨丨丨同上咨訪參與機宻晏元獻殊字同叔遷左庶子公佐佑東宫真宗所以丨丨多以方才小紙細書問之由是丨丨丨丨凡所對必以藁進示不洩言行槀詩集東曹長寄言丨丨丨當知幽獨心白集寄皇甫庶子太子諭徳歴代㳂革唐龍朔中左右春坊置左右諭徳各一人正四品下掌諭皇太子以道徳隨事諷贊皇太子朝宫臣列侍左右階出入騎從至國朝東