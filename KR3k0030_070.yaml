年八十已上者丨丨丨丨行慶夀禮孝宗淳熙二年十二月以太上皇來年聖夀七十預於立春日詣德夀宫丨丨丨丨郄昻老人星賦端北辰以正家望南極之窮夫𤣥鳥司分蒼龍御厯節春秋而隠見當丙丁而的皪且遺光以表慶亦應祉而純錫故經曰其國泰其皇明天垂象物與禎其座也一符帝者之一位其義也夀契烝哉之夀名楊烱老人星賦赫赫宗周皇天降休麗哉神聖皇天降命河出圖兮五雲集天垂象兮三光暎南極之庭老人之星煜煜爚爚煌煌熒熒秋分之旦見乎丙春分之夕入于丁配神山之呼萬嵗符水德之兆千齡稽元命之攸述按星經之所紀見則化平主昌明則天下多士三公輔弼庻官文武獻仙夀兮祝堯奏昌言兮拜禹穆穆神皇受天之祥貞明也者日月重光貞觀也者天地為常若夫大虹流渚金天當宁大電繞樞軒轅受圖殷旭則黄星見楚雷煥則紫氣臨吳青方半月東井連珠辰極之齊七政秦陛之平六符雖前皇之盛德又何以加於此乎聖上招列仙擇羣賢日慎一日𤣥之又𤣥臣烱仙頌皇家萬年張仲素山呼萬嵗賦惟漢武之肇祀聞嘉言之孔彰告盈數以不忒鬱希聲之載揚于時五輅既臻千官畢㑹望嶄巖之絶壁升縹緲之華葢排羽衛於山前刻金石於天外惟天祚各得一而盈惟岳降神聲至三而大是時也百神受軄萬靈獻功福穰穰於宇内聲隱隱於封中慿乎物陋石言之不臧錫自天歡夢歎之尚少掩龜格與鳯降軼神光與慶雲獨得乎數千百祀何悲於七十二君集詩瑶池丨丨供夀酒銀漢灑宸章代推仙祚逺春共聖恩長鳯扆臨花煖龍爐旁日香遥知千萬嵗天意奉君王楊巨源奉獻聖夀無疆詩舞堦千秋即有感丨丨御書酒杜詩一萬嵗山呼丨丨丨直下九重城盧綸皇帝聖恩詩億萬春聖夀宜過丨丨丨杜聖節古今源流誕節之名古無有也惟詩紀契之生則以天命元鳥推其時説者曰元鳥乙鳥也謂春分乙鳥至之日也然商祖元王凡其所謂長發其祥者亦特追美之辭抑未嘗曰如是而為誕聖之節也維史稱光武之生出自長沙亦不過紀其源述光武之生赤光照室佳氣鬱葱亦不過侈其瑞初未嘗名之以誕聖之節也籍曰兒寛奉觴上夀亦不過盡臣子報效之義初未聞立為誕聖之節而為稱觴之禮也惟自唐明皇以八月五日生始以是日為千秋節故張衍上大衍厯序有開元十六年八月端午赤光照室之夜宋璟千秋節表周有月惟仲秋日在端午之句則誕聖節之名葢昉於此是以我宋受命上聖迭生我藝祖則以後唐天成二年丁亥二月十六日生列聖而下凡其紀聖之生有其日而其誕聖之節有其名是葢因其生聖之日而立其誕節之名也事類繞樞黄帝母曰附寶見大電光丨北斗丨星感之而孕二十四月帝王世紀貫月髙陽姬姓母曰景僕為昌意正妃謂之女樞金天氏之末瑶光之星丨丨如虹感女樞幽房之宫生顓帝同上赤龍堯毋觀河有丨丨腌然隂風感而有孕生堯於丹陵𤣥鳥天命𤣥鳥降而生商詩生商見上注生民厥初丨丨時維姜嫄星精成湯感狼丨之丨又感黒龍而成金樓子瑶光見上貫月下注赫靈以丨厥丨上帝不寧居然生子發祥濬哲維商長丨其丨並同上姚墟鼓瞍妻曰握登見大虹意感而生舜於丨丨帝王世紀華渚河圖云大星如虹下流丨丨女節感而生少昊初學記流星修已見丨丨貫昴又吞神珠已而生大禹帝王世紀乙日主癸妃内扶都見白氣貫月意感以丨丨生湯故字帝乙同上王者興五百年必有丨丨丨孟子聖人出或問五百嵗而丨丨丨有諸曰堯舜禹君臣也而並文武周公父子也而處楊子見交龍漢髙祖母媪嘗息大澤之陂夢與神遇是時雷電晦𡨕父太公徃則丨丨丨於上已而有娠遂生髙祖見玉鷄漢髙母池浴丨丨丨銜赤珠石名玉英吞之有孕生髙祖日入懐漢武帝母王聖后夢丨丨丨遂生武帝龍盤棟漢景帝坐崇文閣上有丹霞起赤丨丨丨使王夫人居之改曰猗蘭殿旬日景帝夢神女捧日以授王夫人吞之十四月而生武帝赤光照室光武生丨丨丨丨影如五麟七鳯望氣者見舂陵城郭曰佳哉鬱鬱葱葱神光明室咸寧二年生於洛陽有丨丨之異盡丨一丨晉元帝紀雲氣如車文帝生時有丨丨青色而貟丨丨葢當其上魏本紀虹光照室後唐太祖在姙十三月生時丨丨丨丨白氣充庭異香經宿太祖宣祖之次子後唐天成二年丁亥二月十六日生於洛陽大内夾馬營是時有神光滿室照耀人影丨丨馥郁丨丨不散赤光滿室英宗天聖十年生於宣平坊丨丨丨丨咸見黄龍徃來室中五星連珠乾德五年三月丨丨如丨丨聚於奎當魯分從鎮星辰見東方占曰有德受慶大人奄有四方子孫蕃昌明年真宗皇帝降生田錫獻詩太宗雍熙四年上誕節丨丨丨祝夀丨百官錫宴髙宗紹興十三年五月天申節丨丨上夀丨丨皆如平時生亦丁亥太祖云生以丁亥髙宗之丨丨以丨丨丁未年生髙宗之中興嵗在丨丨孝宗皇帝實生於是丨之十月一嵗之中一聖人出一聖人丨奏無逸篇髙宗紹興十六年天申節宫觀張浚丨丨丨丨詣德夀宫孝宗隆興元年上皇天申節率羣臣丨丨丨丨上夀自是嵗如之靈符寶厯軒帝生於夀丘發繞樞之異夏禹誕於石紐流貫昴之祥莫不炳煥丨丨延長丨丨諒惟聖德允協昌符陛下禀天地之英挺龍鳯之表請以二月十六日為長春節建隆元年正月宰臣等請立長春節表乾元大明丨丨發祥萬物資始以聖繼聖謂之丨丨願合二義之稱用表無疆之慶請以十月七日為乾明節太平興國二年五月宰臣等請立乾明節表離德融輝玉瑶誕祥式契貫星之兆璿樞紀厯爰標出震之期陛下清寧毓粹聰哲凝華候回炎律氣應薰風協丨丨之丨丨仰榮河之啟瑞請以四月十四日為乾元節播芳㽔於甲令式耀多儀介純嘏於鴻靈彌昌寶筭宰臣丁謂等請立乾元節表青煒動陸赤制告圖肇承題序丨丨丨丨俯協誕期卿等縁華封之素祝建聖夀之嘉名批答允立夀聖節甲觀襲祥誕聖題期表靈源之濬發揆時紀節昭皇德之開光當正陽統月之辰乃丨丨丨丨之日慶由運㑹道與天同請以四月十日為同天節宰臣等請立同天節表夢日儲祥丨丨丨丨預席有開之慶奉符踐作適丁利見之期謹以十二月八日為龍興節宰臣等立興龍節表赤斷錫符丨丨丨丨獲成洪緒冬成肅物用紀誕辰卿等對楊甲觀之祥願上興龍之號既以申盛禮於兩宫亦以同歡心於萬國同上批答瑞集樞星詩紀生民易稱出震時惟陽月丨丨丨丨肇開震夙之祥永御光華之旦離明繼照敷同四海之懽天德出寧請祝萬年之夀請以十月十三為天寧節宰臣章惇等天寧節表紫㣲垣一小星藝祖居潛日與趙普遊長安逢陳希夷召飲普足痺俾坐席左陳怒曰丨丨丨丨丨丨輙據上次可乎斥之使居席右靈芝四十二葉仁宗誕降郭后榻下生丨丨丨丨丨丨後仁宗享國四十二年其瑞應云張彚千秋鏡賦伊惟仲秋日在端午我皇帝出震蘭殿誕膺紫微祥光夜合佳氣晨飛禮容之盛六葉交暎乃啟新節獻金鏡刑於四海加于百姓吳芾天申節表華渚呈祥預紀有開之慶薰風從律式逢載夙之辰吳芾㑹慶節表祐格髙穹方啟明昌之運慶鍾良月聿逢震夙之期張于湖代賀天申節表凡此無為而保治葢將守靜以延年錢起千秋節勤政樓下觀舞馬賦惟大唐之握乾符聲諧六律化廣三無能使乘黄服卑龍馬負圖嵗八月也一聖之生千秋之首舉天慶丹陵之㑹率土獻闕夀上乃御層降臨九有張葛天氏之樂醉陶唐氏之酒感百獸之來儀即入駿之孔阜於是陳金石儼簪裾廣塲天近綵仗晴初有騢有驈有驔有魚雲聚日下花明露餘帝曰司候舞我騏馵須㬰金鼓奏玉管傅忽兮龍踞詩集電轉虹垂惟此休祥地相傅慶育時繞樞飛丨丨流渚彩丨丨鬱鬱餘佳氣緜緜嗣慶基九龍曽洒濯三聖共扶持蔣之竒奉陪穆父尚書仲至侍郎德和吏部至啟聖院詩日角龍顔景烟滿殿曉香清丨丨丨丨五色明五季積成天下亂千年方有聖人生重開混沌立萬象獨斬蚩尤銷五兵願作周公清廟頌神孫世世告升平鄭􅀈伏謁太神御殿詩赤光照夜五徳生王者千齡啟聖人丨丨來丨丨黄雲上覆辰張説奉和千秋節宴應制詩古今合璧事類備要後集卷一
