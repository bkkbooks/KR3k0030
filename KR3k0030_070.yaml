body:
  text: 古今合璧事類備要後集卷一宋謝維新撰君道門聖學古今源流書載若稽古帝堯若稽古帝舜若稽古大禹説者謂堯舜禹雖聖人而猶不自聖每事必順考乎古此即帝王所學之源也荀子載堯學於君疇舜學於務成昭禹學於西王國湯學於成子伯此即帝王所學之人也孟子謂湯之於伊尹學焉而後臣之書載髙宗舊學於甘盤史稱文王為紂囚於羑里而演易書稱武王訪箕子而作洪範此亦帝王所學之實也成王下帝王一等而詩人所頌則曰學有緝熙於光明佛時仔肩葢自二帝三王以來未有不以學為本秦人毎事必師古始甚至焚書坑儒亦焉知學之為何事哉漢髙以馬上得天下且曰安事詩書至於文帝旁求儒雅以闌大猷遂廣遊學之路論語孟子孝經爾雅皆置博士武帝始表章六經罷黜百家宣帝始詔諸儒於石渠以講經成帝始㑹諸儒於白虎以修先帝之故事光武中興息馬論道數引郎將講論經理夜分乃寐史稱世祖經學政事以此也明帝為太子受書於亘榮及即位躬臨辟雍行養三老五更乞言之禮肅宗亦詔諸儒於東觀以修石渠白虎故事魏晉南北之際徃徃以游戲翰墨雕琢文辭為學則人主為學可知矣唐有天下其可稱者三宗以太宗之在東宫招置十八學士更直訪問即位之後所謂仁義既效皆其學問之助也元宗厲精之初常覽史籍而馬懐素褚無量等勸講禁中逮其後也無逸之圖代以山水憲宗留意墳典每覽前代興亡得失之書皆三復其言又集前代事迹書於屏風及其末也佛骨之臣逐于鳳翔其他如代宗之好學彊記通乎易象文宗之閑暇觀書沮於士良其學益可知矣惟我朝列聖無一君不學亦無一日不好學太祖讀書至舜典則嘆近代憲網之宻讀史至釋之定國事則責御史以不寃不特是也以儒臣理財以士人理獄勸武臣以讀書令宰相以讀書朱文公所謂太祖不為言語文字之學而方寸之地直與堯舜合是也太宗繼之故置崇文院以収天下之圖書三聖授受如出一道故在真宗置侍講學士以楊徽之夏候嶠呂文仲為之或召崔頤正至後苑講大禹謀即太宗之講學也自時厥後此意愈傳而愈博以仁宗之講學孫奭毎講必悚然而聽丁度王洙等必數刻乃罷賈昌朝誦説則多所質問既取無逸孝經以至左右又取國風譏刺之事以為覽戒至若元祐諸君子之勸聖學如呂公著之陳十事始於畏天終於無逸而復取論語尚書孝經切於治道百篇以進范祖禹上帝學八篇仁皇訓典三百一十七篇又復進觀文覽古圖三朝訓監圖不特是也以司馬光上稽古録以蘇頌采唐故事以蘇軾進陸贄奏議程頤三劄一疏猶拳拳於講讀之官葢無非所以為帝學之禆益也髙宗中興萬㡬之暇專意經術親書石經命儒臣紬繹其説祁寒隆暑畧無倦色又作損齊置經史古書於其中以為燕坐之所且為之記此我髙宗之典學也孝宗六月即位随御經筵宵衣旰食皇皇汲汲聲色苑囿弗遊弗親此即我孝宗之典學也寧王以三十一年之恭儉培千萬世之深仁厚澤方其封為嘉王而在東宫之日講官如陳傅良黄龜年之流聞皆正言行皆正道無非所以為聖學之助皇上繼志述事經筵進讀露門勸講退朝之後日講有常度撤章之餘嵗講有常經即此一道其所以上按帝王之統下貽子孫之謀無非自聖學之相為授受也事類兢兢堯丨丨日行其道董仲舒䇿汲汲堯舜禹湯文武丨丨楊子就將日丨月丨詩乾惕君子終日丨乾夕丨若厲易緝熙學有丨丨于光明詩髙明曽子曰尊其所聞則髙明行其所知則光大董䇿聚辯乾九三學以丨之問以丨之君德也易彊勉丨丨學問則聞見博而知益知董䇿多聞説曰王人求丨丨時惟建事書時敏惟學遜志務丨丨念終始典於學同上表章漢武丨丨六經講論漢宣帝詔丨丨五經同異夕說唐金華朝丨丨書乙覽唐太宗乙夜觀書故謂之丨丨勸講見前源流注論思侍從日月獻納朝夕丨丨聽雅頌天子燕處則丨丨丨之音記書盤銘湯丨於丨丨曰茍日新日日新又日新同上師悉諸炎帝丨丨丨師大橈黄帝丨丨丨並史記畫八卦伏羲始丨丨丨造書契以代結繩之政由是文籍生焉書序有四叔少昊丨丨丨師伯夷顓帝丨曰丨丨師伯招帝嚳丨曰丨丨取諸人大舜善與人同樂丨丨丨以為善孟子惜寸隂禹丨丨丨晉陶侃傳師太公武王丨丨丨尚父尚父曰敬勝怠者亡怠勝敬者滅義勝敬者從欲勝義者凶聞之退而為銘書于席几觴豆講老子齊髙祖好丨丨丨百官戎服以聽藏孝經唐元宗詔天下家丨丨丨讀周禮唐太宗曰朕夜丨丨丨其聖作也謂魏證曰朕思之不井田不封建不肉刑而欲行周公之道不可得也論詩雅唐文宗坐延英丨丨正否鄭覃曰孔子所刪三百篇是也其非丨正者烏足為天子道哉問學廣成黄帝丨丨丨丨列子受學綠圖顓帝丨丨丨丨史記師子州支堯丨曰丨丨丨師曰許由舜丨丨丨丨惟精惟一人心惟危道心惟㣲丨丨丨丨允執厥中書制心制事以義丨丨以禮丨丨同上能自得師丨丨丨丨者王同上學為王事丨之丨丨者丨其已久矣楊子溥博淵泉丨丨如天丨丨如淵中庸修齊治平正心誠意致知格物丨身丨家丨國丨天下大學進德修業乾九三君子丨丨丨丨易前言徃行大蓄君子多識丨丨丨丨以蓄其德同上禮園書圃修容乎丨丨翺翔乎丨丨相如游獵賦廣厦細㫋丨丨之中丨丨之上明師居前勸講在後上論唐虞之際下及殷周之盛漢王吉上疏過祠孔子漢髙祖丨魯以太牢丨丨丨寳訓刺作王制漢文帝使博士諸生丨六經中丨丨丨同上奏十二篇漢陸賈時時前説稱詩書帝謂賈曰試為我著秦所以失吾所以得及古今成敗賈凡丨丨丨丨丨毎奏一篇帝未嘗不稱善游六藝圃丨于丨丨之丨馳騖乎仁義之塗覽觀春秋之林相如逰獵賦大學之要漢武帝䇿董仲舒欲聞丨丨丨丨至論之極尚書樸學兒寛見上語經學上曰吾始以丨丨為丨丨弗好及聞寛説乃從受一篇漢書在乎如意髙明光大不在乎他丨丨丨之丨而已董䇿求善無厭以天子學問至於蒭蕘者丨丨丨丨也賈山至言銳情經術唐太宗丨丨丨丨引内學士更直討論古今書籍自娛本朝太祖喜觀書雖在軍中手不釋卷視朝之暇毎以丨丨丨丨帝學觀書為樂太宗尚儒術聽之暇丨丨丨丨毎至夜分手不釋卷事畧講説質問真宗幼尚文雅專以講學屬辭為樂及即位每召諸王府侍講邢昺及國子監直講孫奭更侍丨丨丨丨經義同上保邦治民真宗景德四年上謂王旦曰經史之文有國之龜鑑丨丨丨丨之要盡在是矣寳訓炎暑不輟仁宗天聖四年上謂輔臣曰比以大暑罷講讀適已召孫奭等説書王旦曰陛下萬㡬之下留意經術雖丨丨丨丨長編風雨不易神宗元豐八年史臣曰上聰明英睿聖學髙逺言必據經深造道德之藴而詳於度數毎論經史多出人意表間日一御經筵邇英講讀丨丨丨丨禁中觀書或至夜分圖書自娛景德二年幸龍圖閣閱太宗御書又觀諸閣圖書下設六閣經典閣史傅閣予書閣文集閣天文閣圖書閣上曰朕退朝之暇無所用心即此丨丨以丨丨耳帝學廢興鑒戒太宗謂宋琪曰朕性喜讀書開卷有益毎見前代丨丨以為丨丨寶訓善惡鑒戒真宗景德四年上手札王欽若曰編修君臣事迹朕於此書匪獨資於披覽亦乃區别丨丨垂之後世俾君臣父子有所丨丨長編且善評文仁宗天聖七年上謂王曽曰兩漢書文辭温雅唐書終不及也曽退相謂曰上閱經史見前代述作之體丨丨丨之自昔好丨之主未嘗留意及此獨喜觀書哲宗王巖叟言陛下閒燕之中足以留意經史上曰並無所好惟是觀書耳又髙宗紹興三年上曰朕退朝無所嗜好丨丨丨丨事畢御經筵英宗嘗諭侍臣曰凡學之道戒在中止故視丨丨不俟進食即丨丨丨每夜讀尚書髙宗紹興十二年謂宰相曰居常禁中丨丨丨丨丨早朝退閱章疏夜讀尚書率二鼔罷並同上治道宜施行髙宗紹興十一年上曰有帝王之學有士大夫之學朕在宫中無一日廢學然但推究前古丨丨有丨丨今者要丨丨耳㑹要善惡以為戒孝宗淳熙六年上曰朕於㡬務之外只好讀書觀前古之興衰考當時之得失善者從之不善者以為戒聖政讀書知而罕行孝宗淳熙十三年上曰自古人主讀書少有知道知之亦少能行之且如與人不求備檢身若不及二句人君豈不知自是不能行聖政伊川始終條理丨丨曰丨條理者智之事也丨丨丨者聖之事也此學之始終也明道記誦博識明道以丨丨丨丨為玩物喪志横渠立心立極丨丨曰為天地丨丨為生民丨丨為去聖繼絶學為萬世開太平伊川經筵第一劄自古人君守成而致盛治者莫如周成王成王之所以成德由周公之輔養昔者周公輔成王㓜而習之所見必正事所聞必正言左右前後皆正人故習與智長化與心成今士大夫家善教子弟者亦必延名德端方之士與之居處使之薰染成性故曰少成若天性習慣如自然伏以皇帝陛下春秋之富雖睿聖之資得於天禀而輔養之道不可不至所謂輔養之道非謂告詔以言過而後諫也在㴠養薰陶而已大率一日之中接賢士大夫之時多親寺入宫女之時少則自然氣質變化德器成就臣欲乞朝廷慎選賢德之士以待勸講講讀既罷常留二人直日夜則一人直宿以備訪問皇帝讀習之暇游息之間時於内殿召見從容宴語不獨漸摩道義至於人情物態稼穡艱難積久自然通逹比之常在深宫之中為益豈不甚大切聞間日一開經筵講讀數行羣官列侍儼然而退情意畧不相接如此而責輔養之功不亦難乎今主上冲㓜太皇太后慈愛亦未敢便乞頻出但時見講官久則自然接熟大扺與近習處久熟則生䙝慢與賢士大夫處久熟則生愛敬此所以養成聖德為宗社生靈之福天下之事無急於此張商英勸聖學劄仰惟陛下聖性靜而淵廣大而明靜淵則道也廣大而明則天也道無為而生天地天無為而成變化在舜為欽明文思在禹為濬哲文明在禹為不自滿假在湯為聖敬日躋在文王為純亦不已在武王為無競維烈晦庵垂拱殿奏劄願陛下清間之燕博訪真儒考之於經騐之於史以㑹之於心以應當世無窮之變以致於臣下之忠邪計慮之得失不待燭照數計而可否黒白判然矣葢人主之學當以明理為先是理既明則凡所當為而必為所不當為而必止者莫非循天之理而非有意必固我之私也詩集講唐虞不知官髙卑玉帶懸金魚問客之所為巍冠丨丨丨韓愈示兒詩聖製古今源流書稱伏羲畫八卦造書契由是文籍生焉此其聖人制作之始也繼是而降舜有作歌乃歌之辭又有南風之歌太康昆弟有五子之歌湯之盤銘文王之重易武王之洪範與夫几席觴豆之銘此其帝王述作之㫖也秦漢以來漢髙祖有擊筑之歌武帝有白麟寳鼎天馬瓠子芝房赤鴈與夫西極天馬之歌郊祀之歌秋風之辭皆以人主之尊自擅其能文之名也自是而降若漢靈帝自造王羲篇魏武帝自作兵書十數萬言文帝之著漢文帝論宋簡文之賦詩而號宫體陳後主之制五言詩隋煬帝之工於詩唐太宗之作宫體詩又作帝範十二篇以賜太子又制訓戒六篇以示諸王又著金鑑述以示侍臣又作賜馬周蕭瑀詩元宗御製孝經序文宗與桞公權聨句宣宗出金鑑書徃徃人主皆以著述為能五代文章陋矣惟我國朝聖制雖工無徃不出於正以太祖有華山日出詩又自親賛孔顔太宗覆試進士有詩戒諭官吏有辭真宗作瑞雪詩作文武七條其他軫田夫吟念農歌自戒箴祥瑞論勤政論對照詩憫農歌稼穡倍登詩瑞雪詩此特其細爾最是為君難為臣不易論元良箴與夫正説十篇欹器戒酒二論真可與二典三謨相表裏自時厥後家