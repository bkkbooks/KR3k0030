body:
  text: 古今合璧事類備要别集卷二宋謝維新撰都邑門侯藩附郡縣侯藩總論侯國諸侯之國也厯考前古未有知其所由來者也蓋至黃帝畫野分州已得百里之國萬區設左右大監監於萬國而正妃二子一曰元囂一曰昌意列為諸侯然則侯國之設其來尚矣自是以來堯封四嶽於呂封稷於邰封契於商舜之封有庳禹之會塗山湯之漢南諸侯周之盟會八百皆是也逮至嬴氏雖罷侯置守然至於漢又監秦弊未嘗不國置而侯王之此封建之法亘古窮今不容易也然列爵凡五等公一位侯一位伯一位子男同一位此爵有尊卑也分土凡三等公侯皆方百里伯七十里子男皆五十里不能五十里附於諸侯者曰附庸此地有大小也天子之縣內方百里之國九七十里之國二十一五十里之國六十三其餘祿士以為間田四海之內王畿之外八州州方千里州建百里之國三十七十里之國六十五十里之國百二十凡二百一十國其餘以為附庸間田八州總一千六百八十國名山大澤皆不以封不以朌合九州千七百七十三國天子之元士諸侯之附庸不與此封國有疏密也千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國為州州有伯八州八伯五十六正百六十八帥三百三十六長八伯各以其屬於天子之老二人分天下為左右曰二伯然後天下定于一此侯國又未嘗無所聮屬也然去古既逺侯國之制吾不得而見之得見郡縣之治斯可矣亦在乎得良二千石而已何必曰封建事類建國象曰地上有水比先王以丨萬丨親諸侯易比丨丨康侯晉丨丨用錫馬蕃庶晉卦羣后覲四嶽羣牧班瑞于丨丨書舜典羣辟惟周王撫萬邦巡侯甸六服丨丨罔不承德周官邦諸侯武王既勝殷丨丨丨洪範列名城周建子弟丨丨丨班五爵流之十二當時雖欲漢得乎楊重黎侯于魯俾丨丨丨詩閟宮命之蔡蔡仲克庸祗德周公以為卿士乃丨諸王邦丨丨書蔡仲之命尹兹東夏成王既黜殷命殺武庚命微子啓代殷後云云庸建爾于上公丨丨丨丨微子之命尹兹東郊君陳惟爾令德孝恭惟孝友于兄弟克施有政命汝丨丨丨丨敬哉君陳保釐東郊康王命作册畢云云以成周之衆命畢公丨丨丨丨畢命不立諸子丞相綰等言諸侯初破燕齊荆地逺不為置王無以鎮之請立諸子李斯議置諸侯不便分天下以為三十六郡史秦本紀等為匹夫淳于越曰商周之王千有餘嵗封子弟功臣自為枝輔今陛下有海內子弟為匹夫卒有田常六卿之臣無輔弼何以相救哉李斯曰三代之事何足法同上羽王諸將項王欲自王先召諸將相謂曰天下初發難時假立諸侯後以伐秦然身被堅執鋭首事暴露於野三年滅秦者皆將相諸君與籍之力也義帝雖無功故當分其地而王之諸將曰善乃分天下立諸將為侯王立沛公為漢王王巴蜀三分關中王秦降將項王立章邯為雍王司馬欣為塞王董翳為翟王徙魏王豹為西魏王立申陽為河南王趙將司馬卭為殷王徙趙王歇為代王立張耳為常山王黥布為九江王吳芮為衡山王義帝柱國共敖為臨江王徙燕王韓廣為遼東王立臧荼為燕王徙齊王田市為膠東王立齊將田都為齊王立田安為濟北王田榮數負項梁以故不封成安君陳餘不從入關素聞其賢因環封三縣番君將梅鋗功多故封十萬户侯項王自立為西楚霸王王九郡漢之元年四月諸侯罷戲下各就國項王出之國使人徙義帝於郴而殺之漢啓九國丨髙帝尊王子弟大丨丨丨自鴈門東盡遼陽為燕代王子建子恆常山南太行左轉渡河濟漸于海為齊趙王子肥子如意濟泗以往奄有龜蒙為梁楚王子恢子交東帶江湖薄會稽為荆吳王兄子濞北界淮瀕略盧衡為淮南王子長波漢之陽亘九嶷為長沙王吳苪王子弟地髙帝丨丨丨丨犬牙相制此盤石之宗也髙帝紀分子弟邑漢髙帝子弟同姓為王者九國百年之間諸侯驕奢謀為淫亂天子加惠使諸侯推恩丨丨丨國丨諸侯稍微犬牙相臨強本幹弱枝葉之勢也漢諸侯王表皇子備藩十九年詔曰太子強崇執謙退願備藩國後光武紀大國為屏竇太后詔外有丨丨賢王並丨藩丨和帝紀功臣割地太宗曰割地封丨丨欲公等後嗣長為蕃屏唐長孫無忌傳郡邑罷侯置守秦始皇懲周氏之微弱恃狙詐以志為強蔑棄禮典丨丨丨丨隋地理罷侯為郡始皇初并天下懲忿戰國削丨列丨丨三十六丨於是興師逾江南平百粵又置閩中南海桂林象郡前地理志秦郡四十秦自大業傳四十七世至始皇初併天下分置二十八郡三川河東南陽九江鄣郡會稽潁川碭郡泗水薛郡東郡琅邪齊郡上谷漁陽右北平遼西遼東代郡巨鹿邯鄲上黨太原雲中九原鴈門上郡隴西北地漢中巴郡蜀郡黥中長沙凡三十五與內史為三十六郡丨丨丨丨縣萬户以上為令減萬户為長平百粵又置四郡閩中南海桂林象郡郡置一守一丞兩尉以典之監侍御史掌監郡前漢百三漢興以秦地太大更加置郡國其後開粵攘胡土宇彌廣改雍曰涼梁曰益又置徐州復禹舊號置交北有朔方凡為十三部刺史司隸并豫兗徐揚冀幽荆青益交涼而不常所理至哀平之際凡新置郡國六十三焉與秦四十合百三縣邑千三百十四道三十二侯國二百四十一後漢百五光武以官多役煩乃并省郡國十縣道侯四百餘所其後亦為十三州部刺史漸復加置郡國至於靈獻凡百有五焉縣道侯國千一百八十東有樂浪南永昌郡魏六十八丨據中原都洛有州十二司隸荆河兗青徐涼秦分涼州置冀幽并揚雍分三輔置有郡國丨丨丨吳四十三孫丨都鄂後遷建業北據江南盡海置交理龍編今安南州廣理番禺今廣州荆理南郡今江陵郢理江夏今鄂州四州有州丨丨丨蜀凡二十先主都成都置益理成都梁理漢中今興元有郡凡二十晉百五十六西丨都洛陽有州丨丨丨丨縣千一百有九宋二百三八劉丨都建康郡丨丨丨十丨縣千一百七十九齊幾四百郡南齊都建康淮北之地所有絶少州凡二十有二郡三百九十五縣千四百七十四梁三百餘郡蕭梁州縣多以舊制天監中有州二十有郡三百五十縣千二十有五其後更有析置大同中州十有七郡縣亦稱此陳百有九郡陳氏土宇彌蹙於梁西不得梁漢北失淮淝以長江為境有州四十有二地轉狹而州益多郡百有九縣四百三十有八後魏五百餘丨丨都雲中後遷平城至孝文遷都洛陽有州一百一十一郡丨丨十有九縣千三百五十二髙齊百六十丨丨都鄴據河北有州六十七郡丨丨丨縣三百六十五後周五百八丨丨宇文氏都關中通計州三百一十一郡丨丨丨縣千二十四隋廢郡為州丨文帝開皇三年遷都大興城今長安遂丨諸丨以州治人自三代以前為九州兩漢加置十三州晉宋之後分析漸多至于魏齊後周雖割據鼎立天下分裂其於州郡乃倍於兩漢之地隋民以官冗人弊遂廢五百餘郡而以州治人名則因以職事同於郡守無屬刺舉之任云隋改州為郡煬帝大業初移洛陽城又平材邑更置三州既而併省諸州三年改州為郡乃置司隸刺史分部巡察五年平定吐谷渾更置四部大凡郡百九十縣千二百五十五唐改郡為州初丨興髙祖丨丨丨丨太守為刺史又置都督府以治之然天下初定權置州郡頗多太宗元年始命併省又因山川形便分天下為十道至十三年定簿凡州府三百五十八縣一千五百五十一明年平髙昌又增州二縣六明皇開元中定天下州府自京都及諸都護府外以近畿之州為四輔同華岐蒲其餘為六雄鄭陜汴絳懷魏十望宋亳滑許汝晉洛虢衛相十緊初有十緊州後入者甚多不復列及上中下之差天寶中上州一百九十中州二十九下州一百八十九肅宗乾元初收復以郡為州置團練守捉使都團練守捉使大者州鎮十餘小者二三州而已故自此所置皆無郡名而不復列上中下之目其後有方鎮史官不録於地里之書以為方鎮兵伐之事非職方所掌故也然而後世因循以軍目地而沒其州名又今置軍者徒以虛名升建為州府之重五代諸僣偽梁太祖朱氏都汴初天下别為十一南有吳浙荆湖閩漢西有岐蜀北有燕晉而朱氏所有七十八州以為梁蓋當是時劉仁恭稱燕李克用稱晉李茂貞稱岐錢璆稱吳越楊行密稱吳王審知稱閩馬殷稱楚王建稱蜀髙季興稱南平劉隱稱南漢李茂貞僖宗時節度鳳翔後取興元有州二十岐隴涇原渭武秦成階鳳邠寧慶衍鄜坊丹延梁洋其被梁圍也興元入于蜀開平以後邠寧鄜坊入于梁秦鳳階成入于蜀當梁末年所有七州封岐王南平髙氏梁初領荆南節度十州後為諸道所侵所有江陵一城而已劉隱梁初封東海王卒其弟陟襲位盡有嶺表之地僣號於廣州吳越止十三州楊行密盡有淮南地審閩嶺五州馬殷盡有湖南地後兼後衡潭鼎澧二十餘州王建西州節度後併東川及山南諸郡自或離合不常後唐一百二十三州晉一百九州漢一百六州周一百一十八州其餘並為僣偽者所據云皇宋大一統太祖皇帝建隆四年二月王師入荆南平之得州三縣一十五三月克湖湘得州十四縣五十八六年正月兩川平得州四十五縣一百九十八開寶四年二月拔廣州得州四十一縣六十五八年十一月拔升州江南平得州一十九軍三縣一百八至太宗興國三年四月陳洪進以漳泉歸有司五年錢俶以十三州歸有司四年劉繼元納欵得州十縣四十一七年又得銀夏二州而天下一統矣路總二十有三謹按聖朝元豐頒行李法芻曽肇王存等撰九域志總為二十三路京東東西路熙寧七年分東西路元豐元年詔河北東北永興秦鳳京東東西京西南北淮南東西路轉運司通管西路以河北陜西京東京西淮南路為名提刑提舉司仍舊分路東西南北路太平興國三年分河北南路後併為一路熙寧五年復分河北東西路太平興國二年分河北南路雍熙四年分東西路端拱二年併為一路熙寧六年復分陜西路太平興國二年分河北河南路又有陜府西路後併為一熙寧五年分河東路淮南東西路興國元年分東西路後並為一熙寧五年又分兩浙路江南東西路太平興國元年分為二後併天禧四年又分荆湖南北路咸平二年分成都府路乾德三年兩川併為西川路開寶六年分陜路咸平四年分益利梓夔四路嘉祐四年以益州路為成都路夔州路利州路福建路太平興國元年為兩浙西南路雍熙二年改為福建路廣南東西路陜西除永興一路外鄜延環慶涇原秦鳳熙河是為五路而序止稱陜西路今姑别之以俟觀者郡有升改廢置西京東京開封南京應天西京河南北京大名京東升改四兖政和八年升襲慶府齊升濟南府曹升興仁府鄆升東平廢一廣濟熙寧四年廢入曹州京西升改五陳宣和元年升淮寧府潁順昌府孟升河陽府汝政和五年改陸海軍廢一光化熙寧三年廢隸襄州河東升改三晉政和八年升平陽府潞升隆德府及崇寧元年改靖康軍廢四沁興國四年廢慈熙寧五年廢平晉興國四年廢靜樂咸平五年廢河北升改七德升安德府定升中山府邢宣和元年升信法府趙升慶源府澶崇寧五年升開德府瀛升河間府乾寧大觀二年改青州廢二通利興寧二年廢承天廢隸真定兩浙升改六越紹興元年升紹興府杭升臨安府蘇政和三年升平江府潤升鎮江府睦宣和三年改婺溫政和七年改應道軍廢二順化廢還杭州江隂廢還常州淮南升改二舒政和五年改法慶軍夀六年升夀春府廢三髙郵漣水熙寧五年並廢天長至道二年廢江南升改二歙宣和二年改徽州江寧建炎二年升建康府荆湖升改二嶽宣和二年改嶽陽軍誠崇寧三年改靖州廢三復熙寧六年廢漢陽熙寧五年廢荆門熙寧六年廢廣南升改二端宣和九年升肇慶府桂紹興三年升靜江府開置二隆兊政和五年西路置廢二十五富巒潘登勤常樂繡禺順思明南儀崖州瀧溥牢羅竇蒙紆春嚴黨恩剛歸恩芝州五路升改四通逺崇寧四年升改鞏州延升延安府慶升慶陽府廢三乾儀並熙寧五年廢綏熙寧二年廢成都改一陵并大觀四年改為仙井利路升一三泉縣今復改大安軍廢二壁開寶五年廢焦熙寧五年廢潼川升改四戎政和四年改敘州梓宣和元年升潼川府遂升遂寧府涓井改長寧軍夔升改一渝崇寧元年改恭州開置一道義大觀三年置永興升一永興軍升京兆府河北化外升改二幽燕山府雲雲中府陜西化外改一湟宣和元年改樂夔路化外廢二思播宣和二年省并思為務川城播為播川城府號郡名多沿唐舊號不同者七虢曰虢郡滑曰靈河熙曰臨兆楚曰山陽明曰奉化嵐曰樓煩龍曰江油唐所無者十四澶曰澶淵闕曰陽郡淮曰易陽礠曰滏陽祁曰蒲隂耀曰華源府曰永安宿曰苻離信曰上饒沅曰潭陽昌曰昌元南劒曰劒蒲化曰陵水荆湖升一鄂州武昌縣嘉定十五年升夀昌軍浙東升二明紹興四年升慶元府秀慶元元年升嘉興府淮西升一舒慶元元年升安慶府成都升一嘉慶元元年升嘉定府廣東升一英慶元元年升英德府賈誼治安策臣謹稽之天地驗之往古按之當今之務日夜念此至熟也雖使舜禹復生為陛下計亡以易此夫樹國固必相疑之勢下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝親兄之子西鄉而擊今吳又見告矣天子春秋鼎盛行義未過德澤有加焉猶尚如是况莫大諸侯權力有十此者乎然而天下稍安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上偏置私人如此有異淮南濟北之為邪此時欲為治安雖堯舜不治黃帝曰日中必熭操刀必割今令此道順而全安甚易不肯早為已乃墮骨肉之屬而抗剄之豈有異秦之李世乎夫以天子之位乘今之時因人之助尚憚以危為安以亂為治假設陛下居齊桓之處將不合諸侯而匡天下乎臣知陛下有所不能矣假設天下如曩時淮隂侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫髙為相盧綰王燕陳豨在代令此六七公皆無恙當是時而陛下即天子位能自安乎臣有以知陛下之不能也天也下殽亂髙皇帝與諸公併起非有仄室之勢以豫席之諸公幸者乃為中涓其次僅得舍人材之不逮至逺也髙皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣德至渥也然其後十年之間反者九起陛下之與諸公非親角材而臣之也又非身封王之也自髙皇帝不能以是一嵗為安故臣知陛下之不能也然尚有可諉曰疏臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽共王王梁靈王王燕厲王王淮南六七貴人皆亡恙當是時陛下即位能為治乎臣又知陛下之不能也若此諸王雖名為臣實皆有布衣昆弟之心慮亡不帝制而天子自為者擅爵人赦死罪甚者或戴黃屋漢法令非行也雖行不軌如厲王者令之不肯聽召之安可致乎幸而來至法安可得加動一親戚天下圜視而起陛下之臣雖有悍如馮敬者適啓其口七首已陷其胸矣陛下雖賢誰與領此故疏者必危親者必亂已然之效也其異姓負強而動者漢已幸勝之矣又不易其所以然同姓襲是迹而動亦有徵矣其藝盡又復然殃禍之變未知所移明帝處之尚不能以安後世將如之何屠牛坦一朝解十二牛而芒刃不頓者所排擊剝割皆衆理解也至於髖髀之所非斤則斧夫仁義溫厚人主之芒刃也權藝法制人主之斤斧也今諸侯王皆衆髖髀也擇斤斧之用而欲嬰以芒刃臣以為不缺則折胡不用之淮南濟北藝不可也臣竊迹前事大抵強者先反淮隂王楚最強則最先反韓信倚胡則又反貫髙因趙資則又反陳豨兵精則又反彭越用梁則又反黥布用淮南則又反盧綰最弱最後反長沙乃在二萬五千户耳功少而最完藝疏而最忠非獨性異人也亦形藝然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知已欲諸王之皆忠附則莫若令如長沙王欲臣子勿菹醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國少則亡邪心令海內之藝如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子雖在細民且知其安故天下咸知陛下之明割地定制令齊趙楚各若干國使惠王幽王元王之子孫畢以次各受祖之分地地盡而止及燕梁他國皆然其分地衆而子孫少者建以為國空而致之須其子孫生者舉使君之諸侯之地其削頗入漢者為徙其侯國及封其子孫也所以數償之一寸之地一人之之衆天子亡所利焉誠以定治而已故天下咸知陛下廉地制一定宗室子孫莫慮不王下無倍畔之心上無誅伐之志故天下咸知陛下之仁法立而不犯令行而不逆貫髙利幾之謀不生柴竒開章之計不萌細民鄉善大臣致順故天下咸知陛下之義卧赤子天下之上而安植遺腹朝委裘而天下不亂當時大治後世誦聖一動而五業附陛下誰憚而久不為此天下之藝方病大腫一脛之大幾如要一指之大幾如股平居不可屈信一二指搐身慮亡聊失今不治必為錮疾後雖有扁鵲不能為已病非徒瘇也又苦􅏓盩元王之子帝之從弟也今之王者從弟之子也惠王親兄子也今之王者兄子之子也親者或亡分地以安天下疏者或制大權以逼天子臣故曰非徒病瘇也又苦䟝盩可痛哭者此病是也曹冏議封建宗室曹冏上書曰古之王者必建同姓以明親親必樹異姓以明賢賢親親之道専用則其漸也微弱賢賢之道偏任則其弊也劫奪先聖知其然也故博求親疏而並用之故能保其社稷厯紀長久今魏尊尊之法雖明親親之道未備或任而不重或釋而不任臣竊維此寢不安席謹撰合所聞論其成敗曰昔夏商周厯世數十而秦二世而亡何則三代之君與天下共其民故天下同其憂秦王獨制其民故傾危而莫救也秦觀周之敝以為小弱見奪於是廢五等之爵立郡縣之官內無宗子以自毗輔外無諸侯以為藩衛譬猶芟刈股肱獨任胸腹觀者為之寒心而始皇晏然自以為子孫帝王萬世之業也豈不悖哉故漢祖奮三尺之劒驅烏集之衆五年之中遂成帝業何則伐深根者難為功摧朽枯者易為力理藝然也漢監秦之失封殖子弟及諸呂擅權圖危劉氏而天下所以不傾動者動以諸侯強大磐石膠固故也然髙祖封建地過古制故賈誼以為欲天下之治安莫若衆建諸侯而少其力文帝不從至於孝景猥用鼂錯之計削黜諸侯遂有七國之患蓋兆發髙帝釁鍾文景由寬之過制急之不漸故也所謂末大必折尾大難掉武帝從主父之策下推恩之令自是之後遂以陵夷子孫微弱衣食租稅不預政事至于哀平王氏秉權假周公之事而為田常之亂宗室王侯或乃為之符命頌莽恩德豈不哀哉由斯言之非宗子獨忠孝於惠文之間而叛逆於哀平之際也徒權輕藝弱不能有定耳賴光武皇帝挺不世之姿擒王莽於已成紹漢嗣於既絶斯豈非宗子之力也而曾不監秦之失策襲周之舊制至于桓靈閹宦用事君孤立於上臣弄權於下由是天下鼎沸姦宄並爭宗廟焚為灰燼宮室變為榛藪太祖皇帝龍飛鳳翔掃除凶逆大魏之興于今二十有四年矣觀五代之存亡而不用其長策子弟宗室權均匹夫藝齊凡庶內無深根不拔之固外無磐石宗盟之助非所以安社稷為萬世之策也且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟並據而宗室子弟曾無一人間厠其間與相維制非所以強幹弱枝備萬一之虞也今之用賢或超為名都之主或為偏師之帥而宗室有文者必限小縣之宰有武者必致百人之上非所以勸進賢能褒異宗室之禮也語曰百足之蟲至死不僵以其扶之者衆也此言雖小可以譬大是以聖王安不忘危存不忘亡故天下有變而無傾危之患矣冏冀以此論感悟曹爽爽不能用通鑑魏邵陵公紀栁宗元封建論詳見前集蘇子瞻指掌圖序圖書之作其來尚矣周官詔觀事則有志詔地事則有圖圖也者所以輔書之成也昔蘇秦按此以説諸侯而知六國有十倍之藝蕭何藏此以相髙祖而知天下厄塞之所在聚米為象馬援所以度隗囂建樓而畫德裕所以服南詔藩鎮強梁於河北而險要詳於吉甫先零跋扈於隴西而地形上於充國規制華夷靡不憑此後之學者未擅博洽周覽之見區區然知書之為在而至其所謂圖者藏為玩好之具往往時出而觀之夫不考方域審形勢而欲精窮載籍髙談時務顧不鄙哉又况區域之建肇自古初以迄於今上下數千百載間離分合併增省廢置不勝拏煩故有境土雖同名稱或異為梁一也而有南有大有少焉今汝州梁縣為南梁皇都浚儀縣為大梁州韓城縣為少梁為蔡一也而有新有上有下焉新蔡上蔡今蔡州縣下蔡今潁川縣三齊三楚之既别齊與濟北膠東是為三齊江陵為南楚彭城為西楚吳為東楚三蜀三吳之已殊三蜀謂蜀都漢髙分置廣漢武帝分犍為三吳今蘇潤湖州或取名於列宿則曰營曰婺隋置婺州取婺女星之分為名營州亦然或率循於姓氏則為姚為蒙姚州人各姚姓蒙州亦皆蒙姓以至地列荆揚方分陜右南齊以荆州為陜西蓋比周召分陜之義青齊沃壤復號東秦南燕慕容德初議所都潘聰曰青齊沃壤號曰東秦載籍所傳不可不辨豫嘗厯考分志參驗古昔始自帝嚳迄于聖朝代别為圖著其因革刊其同異凡四十有四其目曰坤作地勢髙下九則自昔髙辛經略萬國作帝嚳九州圖舜承堯緒肇分區宇冀北創并部之名燕齊起幽營之號作舜十有二州圖茫茫禹迹大啓九道作禹迹圖帝命武湯奄有九有作商九有圖周有天下改作禹貢徐梁入於青雍冀野析於幽并而職方氏實掌其任作周職方圖周室衰微諸侯強盛齊晉秦楚更主會盟江黃曹滕見於傳記作春秋列國圖春秋之後七國並爭秦險百二楚地六千韓為天下脊魏為東藩障燕文趙肅並為諸侯雄作七國壤地圖秦併八荒罷侯置守始郡縣天下作秦郡縣天下圖秦鹿已斃劉項交馳未決雌雄故有鴻溝之約作劉項中分圖漢祖仗劒蹶秦誅楚以有天下郡國雜治勢錯犬牙作西漢郡國圖方漢祖固陵之敗不指梁楚識之地則不足以致韓彭之師蒙於是喜張子房之達權漢髙皇之審勢作異姓八王圖方吳楚連衡稱為東帝非城守睢陽堅壁昌邑則不足以遏其西勢蒙非特喜趙鄧之善謀抑又嘉條侯之能用作吳楚七國圖新都閏位盜我神器天命未移致命聖皇復還舊物作東漢列郡圖炎劉訖籙天下分崩魏跨中原吳擅江表蜀擁漢中而鼎足之形成矣作三國鼎峙圖逮晉太康南平孫吳天下復合為一作西晉列郡圖劉石唱亂懷愍蒙塵化龍之謡起於江左作東晉中興江左圖宋武之興剗平羣盜西定秦隴幾有天下之半志大謀疏得而復失其後道成帝齊蕭衍帝梁霸先帝陳而天下謂之南國作宋齊及梁陳圖拓跋氏盜有中原稱為元魏運鍾孝武遂分東西厥後髙歡霸齊宇文基周而天下謂之北國作元魏及北齊後周圖隋文平陳車書共道煬帝失德羣雄乘之國以不祀作隋氏有國圖唐太宗親揮天戈掃遏亂略幅員之數跨越三代作唐十道圖郡名建置或因或革檢察之使各部其境作唐郡名及十五採訪使圖肅宗建置藩鎮本以人亂護養孽芽卒以生亂作藩鎮疆界圖五代易君不啻傳舍東割西據疆理不常作梁唐晉漢周圖州郡躔次紀於甘陳甘氏星圖陳卓分野山河雨戒創自一行保章辨封域以知妖祥則天象分野不可不知也馬援立銅柱以表漢界則雜標地名亦不可不知也五代否極天地開泰太祖膺期肇造區夏故為圖以紀開創之功太宗繼統丕揚先烈克集大勳故為圖以紀混一之績分天下為二十三路以州理人則見之於元豐九域志聲教逺暨遐徼內屬則見之於羈縻化外州府號郡名多沿唐舊改易仍廢因時施宜則見於州府名號因革廢置皆以方今郡縣為主又以古今華夷區域及山水名號括要圖先無庶使由今之號以觀厯代之沿革如印券鑰勘之易或有談家者曰子之述作工則工矣恐招後人覆瓿之譏而使覽者貽闕馬之失奈何應之曰不然昔子雲草玄蓋曰後有子雲始必知之使世之觀此圖者河源不必窮禹穴不必探泰山不必登不假登望大梁之墟而始知陳鄭之災不待﨑嶇劒閣之險而始知蜀道之難也古今輿地披圖了然如親履而目見之庶乎可以不出户而知天下因命之曰指掌由是言之豈必後世子雲而始好之耶雖然寡聞單見稽考不詳不無謬誤刪而正之則有俟於後之君子蘇子瞻指掌圖總論厯代郡國見諸載籍固詳矣類舉則不勝其繁略之則其文或闕國勢一統故增損時定土宇分裂則得失不常今於圖末重述因革紀其總數庶幾易於參考焉粵若髙辛創法九土分疆夏功見於唐虞商人無所損益姬姓理鎬頗易舊名徐梁入於青雍冀土析於幽并其後七雄交爭王畿日􅕚東遷之地僅存七城河南洛陽新城平隂偃師鞏緱氏嬴氏得志以守易侯瓜分天下為郡三十有六而南平百粵又置閩中南海桂林象郡凡四十郡郡置一守焉其地則西臨洮而北沙漠東縈西帶皆臨大海漢祖龍興革秦之弊分內史為三郡更置郡國二十有三桂陽江夏豫章河南魏郡東海楚國平原梁田定襄泰山汝南淮陽千乘東萊燕國清河信都常山中山渤海廣陵涿郡合二十三也三內史者河上渭南中地也地理志曰髙祖增二十六武帝改河上渭南中地以為京兆馮翊扶風是為三輔文增其九廣平城陽淄川濟南膠東河間廬山衡山武帝改衡山曰六安景加以四濟北濟隂山陽北海宣帝改濟北曰東平武帝開越攘胡初置十七南海蒼梧鬱林合浦交趾九真日南珠崖儋耳九郡平西南夷置牂牱越雋沈黎文山犍為益州六即西置武都郡又分立零陵郡為十七郡拓土分疆又增十四洪農臨淮西河朔方酒泉陳留安定天水玄菟樂浪廣陵燉煌武威張掖昭帝少事又增其一金城是也至平帝元始二年凡新置郡國七十有一與秦四十合一百一十有一改雍曰梁改梁曰益又置徐州復舊號南置交趾北有朔方凡為十三郡梁益荆揚青豫兖徐幽并冀十一州交趾朔方二刺史合十三郡光武投戈之嵗值雕耗之辰郡國蕭條并省者八咸陽淄川髙密膠東六安真定泗水廣陽建武十一年省州牧復為刺史員十三人掌一州明帝置一永昌章帝置二任城吳郡和順改作其名有九和置濟北廣陽順改淮陽為陳改楚為彭城濟東為東平臨淮為下邳千乘為樂安信都為安平天水為漢陽是也省朔方刺史合之於司隸凡十三部其與西漢不同者司隸校尉郡治河南朔方方𨽻於并部而郡國百有八焉省前置八分置五改舊名七因舊九十有六少前漢三也桓靈頗增於前復置六郡桓髙陽髙涼博陵靈南安鄱陽廬陵魏武定西朔三方鼎立生靈板蕩關洛荒蕪所置者十二新興樂平西平新平略陽隂平帶方譙郡樂陵章武南鄉襄陽而省者七上郡朔方五原雲中定襄泊陽廬江文帝置七朝歌陽干戈陽魏興新城義陽安豐明及少帝增二明增上庸少增平陽得漢郡者五十四焉蜀先主於漢建安之間初置郡九巴東巴西梓童江陽汶山漢嘉朱提宕渠涪陵後主增二雲安興古得漢郡者十有一焉吳大帝初置郡六臨賀武昌珠崖新安廬陵南郡少帝景帝各四少臨川臨海衡陽湘東景天門建安建平合浦厥後歸命侯亦置十有二郡始安始興邵陵安成新昌武平九德吳興東陽桂林榮陽宜都得漢郡者十有八焉晉武太康元年既平孫氏凡增置郡國二十有三滎陽上谷頓丘臨淮東莞襄城沙隂長廣廣寧昌黎新野隨郡隂平義陽毗陵宣城南康晉安寧浦始平略陽樂平南省省司隸置司州别立梁秦寧平四州仍吳之廣州凡十九州司豫冀兖荆徐揚青幽平并雍梁秦涼益寧交廣郡國一百七十七仍吳所置二十五仍蜀新置十一仍魏所置二十一仍漢舊九十三置二十三惠帝不君中州盡棄永嘉南渡建業開基九州之地有其二焉自兹以降國分南北更王迭霸疆理不常宋至孝武大明中州凡二十有二郡二百三十有八縣千一百七十有九南齊繼統又置巴東一郡餘並因之為州二十有三郡三百九十五縣千四百七十有四頻為元魏侵吞互相得失蕭梁之時多沿舊制天監中有州二十有三郡三百五十縣千二十有五其後更有析置大同中州百有七郡縣亦稱於此陳氏較之土宇彌蹙西不得蜀漢北失淮肥而以長江為境有州四十有二是時其地愈狹立名愈多為郡百有九縣四百三十有八此皆疆宇之列乎南者也後魏起自北方遷據中土有州百十有一郡五百一十有九縣千二百五十有一自東西分都之後天下鼎立梁陳有江東宇文有關西髙齊據河北有州九十有七郡百六十縣三百六十有五後周宇文志在興復自是西有姑臧西南有全蜀東南之境盡于長沙通計州二百十有一郡五百八縣千二十有四凡此皆疆理之列乎北者也逮隋文平一天下遂廢諸郡以州理人至煬帝平林邑更置三州大業三年改州為郡乃置司隸刺史分部巡察大凡郡百九十縣千二百五十唐興髙祖改郡為州太守為刺史太宗元年因山川形便分天下為十道開元中又因十道分山南江南為東西道增置黔中道及京畿都畿置十五採訪使檢察如漢刺史之職二十八年户部帳凡郡府三百二十有八縣千五百七十有三天寶之亂兩京覆沒因假方鎮用平羣盜代德之際至于不朝不貢效戰國股髀相依天子羽書所制河南數十郡而已僖昭以後日益割裂其他大鎮南則吳浙荆湖閩廣西則岐蜀北則燕晉而朱溫所握七十八州以為梁繼之克用之唐敬塘之晉劉皓之漢郭威之周躡迹相因迭有中土莊宗初起并代取幽滄有州三十五其後又取梁魏博等十有六州合五十一州以滅梁岐王稱臣又得其州七同光破蜀已而復失唯得秦鳳階成四州而營平二州陷于契丹其增置之州一合一百二十三州以為唐石氏入立獻十有六州于契丹而得蜀金州又增置之州一合一百九州以為晉劉氏之初秦鳳階成復入于蜀隱帝時增置之州一合一百六州以為漢郭氏代漢七州入于劉旻世宗取秦鳳階成瀛莫及淮南十四州又增置之州五而廢者三合一百一十八以為周宋興因之此中國之大略也其餘外屬者強弱相并不常其得失至于晉末閩已先亡而在者七國自江以南二十一州為南唐自劒以南及山南西道四十六州為蜀自湖南北十州為楚自浙東西十三州為吳越自嶺南北四十七州為南漢自太原以北十州為東漢而荆歸峽三州為南平合中國所有二百六十八州而軍不在焉上天降休誕錫真主太祖皇帝撫念黎庶命將専征荆湘蜀土銜璧請命李煜劉鋹束手受擒太宗皇帝聖略勃興志清餘孽吳越井分相繼納欵車書混一德被遐徼聖聖相繼治監太清圖籍所列府州軍監凡二百九十有五縣一千一百三十有一而化外羈縻之州不與焉嗚呼治形則亂弭泰萌而否消猶之重明麗而妖氛清洊雷作而羣聽悚王者大一統四海皆徠臣巍巍乎盛德大業將底於億萬斯年之永豈不偉歟古今合璧事類備要别集卷二
