  text: 欽定四庫全書子部十一
  hash: sha256:6fde423eff804002a73f9da4a96c88a4d581d1c7affa2bef6c291152bdc6238c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_000-1a, image: WYG0939/WYG0939-0001a.png}
body:
  text: 古今合璧事類備要類書類提要臣等謹案古今合璧事類備要前集六十九卷後集八十一卷續集五十六卷别集九十四卷外集六十六卷宋謝維新編維新字去咎建安人其始末未詳自署曰膠庠進士蓋太學生也是書成于寶祐丁巳前有維新自序後有莆田守黃叔度跋稱維新應友劉德亨之托蓋當時坊本總目後又有跋云昨刻古今備要四集盛行于世但門目未備再刻外集云云不署名氏當即德亨所題也是書前集四十一門子目四百九十一後集四十八門子目四百一十六其致仕一目有録無書注曰已見前集續集六門子目五百七十别集六門子目四百一十外集十六門子目四百三十所引最為詳悉惟郡縣山川名勝以祝穆方輿勝覽已備不及更載焉每目前為事類後為詩集所收皆兼及宋代皆不及太平御覽册府元龜諸書皆根柢古籍原原本本而所採究皆宋以前書多今日所未見宋代遺事佚詩如蘇軾詠雪詩以富貴勢力分四首為本集所不録者亦往往見於此書故厲鶚作宋詩紀事多採用之又宋代官制至為冗雜宋史不過僅存其名當時詩文所稱今多有不知為何官者惟此書後集條列最明尤可以資考證在類事之家尚為有所取材者矣乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀古今合璧事類備要原序類書之編何所昉乎自爾雅載蟲魚之名陸氏疏草木之辨沿而下之至於孔白六帖出而類書備矣雖然猶未備也兩坊書市以類書名者尚矣曰事物紀原曰藝文類聚最後則錦繡萬花谷事文類聚出焉何汗牛充棟之多也今友人劉兄以類書見囑且以合璧事類備要名豈非欲備所未備又托其要而為之備乎其視夫徒載首尾而不得其要分門目而備失其倫者萬萬不侔昔人有不善記事每求一事為之紬繹搜索至有終日追思而莫窮其所出者今而是編始而天文地理次而節序人物以至族屬官職姓氏之分儒學仕進道釋技藝之等與夫吉凶慶弔冠婚喪祭之儀草木蟲魚器用動什之末莫不類而得其備備而得其要其間别以標題配以合璧俾閲是編者求其一則知其二觀於此則得於彼既無摉摘之勞而有駢儷之巧如逰元圃而取瑶寶入武庫而繕甲兵則其有功於後之類書者多矣言未畢客有誚者曰果止於備要何其方帙如是之浩瀚耶余應之曰今之所編正將備前乎未見之書以充後乎無涯之用凡古今應用之事悉於此書萃焉又何以訝其多為客曰誠如是盍以合璧備要名余曰唯遂繡諸梓寶祐丁巳大吕既望膠庠進士建安謝維新去咎父序古今合璧事類備要跋記問之學不足以為人師然左氏有廣記備言之要乃為後世類書者之祖一旦友生謝去咎携一編以示余曰此友人劉兄德亨所託編事類備要也不私所藏欲廣其傳且俾余一言以訂其末余不敏何所容喙儻休沐之暇時閲此編信足為揮毫用事之助云郡人新莆田守黃叔度似道敬跋欽定四庫全書古今合璧事類備要總目天文地理嵗時氣候占候時令節序祥瑞災異帝屬國戚親屬外親閫儀嗣續師友賔主故舊學校科舉仕進儒業字學文房釋教道教民事倡優寵姬奴婢技術壽典冠禮婚禮國哀喪紀弔禮襄事墓地哀挽鬼神後集君道臣道三公三少道揆執政樞屬府屬左右史給舍翰苑經筵諫官臺官尚侍六部九卿三監三學史館東宫官大宗正王府官四轄京局歷官環衛官宦官三衙閣舍殿學閣學閣職宫觀節相雜押階官節使國使帥閫監司守臣武臣州官幕官曹官縣官監當續集氏族姓名家世類姓性行事為别集國都居處草木花卉鳥獸蟲蟻外集禮樂刑法獄訟賦稅征役平糶服飾璽印香茶餽遺飲膳器用珍寶錦綺布帛錢楮昨刋古今備要四集盛行于世但門目未備再刋外集補其未備如州郡等門已見方輿勝覽此不復載
