body:
  text: 古今合璧事類備要别集卷六宋謝維新撰橋道門道路附馳道輿地提綱道路之設人之所繇以之四方者也夫東西南北不同其方則所由之路不同其趨故之越者必南轅之燕者必北斾之齊而西之秦而東則車轍馬跡為背馳矣是以出門必問途跬步之差千里之迷天下之不能無道路也久矣昔者堯自洪水之後一時之道路幾為之不通矣而堯則咨禹平之禹乃陸行而乘車水行而乘舟泥行而乘橇山行而乘􅞬隨其所之刊槎其木於是九州以開九道以通是則禹之功也向使不有禹之功則獸蹄鳥跡交乎中國龍漦蛟涎不待異日而後見也彼趙孟觀乎洛而美禹之功且禹之功豈獨於洛觀之哉凡今之道路惟其欲之無所不通亦猶夫洛也故異時魏綘舉虞人之針曰茫茫禹跡畫為九州夫經啓九道其亦思禹也夫抑亦美禹也事類艮為丨丨徑路易說卦震為丨丨大塗同上開通李春之月司空以丨丨道路毋有障塞記月令平易司空以時丨丨道路左襄三十一年又晉之道路丨丨詩注道周有枤之杜生於道左云云生於丨丨詩徑術孟春端丨丨注端正也徑步道術車道記月令微行遵彼丨丨注微行牆下行徑大路遵丨丨兮詩中逵施于丨丨詩置通道疾驅於丨丨大都詩載驅阻且長道丨丨丨詩蒹葭阻且躋道丨丨丨同上野廬達丨丨氏掌丨國道路禮地官合方掌丨丨氏丨達天下之道路同上司險達丨丨丨其道路禮夏官虎賁使丨丨氏若道路不通有徵事則奉書以丨於四方禮夏官九軌七軌經涂丨丨環涂丨丨野涂五軌注涂謂環城之道禮冬官匠人一達九達丨丨謂之道路二達謂之岐旁岐道旁出三達謂之劇旁旁出岐多故曰劇四達謂之衢五達謂之康六達謂之莊康樂壯盛也七達謂之劇驂驂馬有四今此有七故謂之劇驂八達謂之崇期崇多也多道㑹期在此丨丨謂之逵一曰馗言似龜背故曰馗爾雅有徑有畛遂人凡治野夫間丨丨遂上丨丨十夫有溝溝上丨丨百夫有洫洫上有涂千夫有澮澮上有道萬夫有川川上有路以達于畿注徑容牛馬畛容大車涂容乘車一軌道容二軌路容三軌禮地官為阡為陌南北丨丨東西丨丨風俗通男左女右道路丨子由丨丨子由丨車從中央記曲禮列樹表道周制有之丨丨丨丨國周語樹林為阻司險掌九州之圖以周知其山林川澤之阻而達其道路設國之五溝五涂而丨之丨以丨丨固皆有守禁而達其道路禮夏官行者遜路虞芮爭田而訟不決乃相謂曰西伯仁人也盍往質之入其境耕者遜畔丨丨丨丨曰嘻吾儕小人也不可以入君子之庭退以所爭之田為閒田家好生爵者為辟凡道路之舟車繫互者叙而行之凡有節者及有丨丨至則丨之丨注辟辟行人禮野廬氏草穢塞路定王使單襄公聘宋假道於陳道茀不可行謂丨丨丨丨孔六帖桃李垂街子産相鄭丨丨丨於丨衢呂氏春秋璧馬假道晉獻公欲伐虢荀息請以屈産之乘與垂棘之璧假道于虞左僖二金牛通道秦惠王欲伐蜀乃刻石牛置黃金於後曰此天牛能糞金蜀王以為然即遣五丁力士鑿成道入蜀使張儀隨其路伐之本紀行不由徑子游為武城宰子曰女得人焉耳乎曰有淡臺滅明者丨丨丨丨非公事未嘗至於偃之室也語行必循陌焦光孝所丨不踐邪徑丨丨阡丨孔六帖失道隨馬管仲從威公伐孤竹春往冬返迷惑丨丨管仲曰老馬韓子之智可用也乃放老馬而隨之遂得道多岐亡羊楊子鄰人亡羊率其黨請楊子堅追之既返問獲乎曰亡岐路既多之中又有岐焉吾不知所之故返楊子曰大道以丨丨丨丨學者以多方喪生列子車遇軸折楚野辨女者昭氏妻也鄭簡公使大夫聘于荆至於狹路有一婦人乘車與大夫遇擊折大夫之車軸大夫怒將執而鞭之女曰妾聞君子不遷怒不二過今狹路之中妾之避也極矣而子大夫之僕不肯少伺是以廢干大夫之車而反執妾豈非遷怒哉不怒僕而怒妾豈不二過哉轂擊肩摩蘇秦說齊王曰臨淄之塗車丨丨人丨丨連衽成帷舉袂成幕揮汗成雨家殷人足志髙氣揚以大王之賢與齊之彊天下莫能當可以南北楊朱泣岐謂丨丨丨可以丨也淮追訓大蛇當徑髙祖夜徑澤中有丨丨丨丨乃拔劒斬蛇漢本紀逐牛幾里丙吉嘗出逢清道羣鬬者死傷橫道吉過之不問前行逢人丨丨牛喘吐舌吉止駐使騎吏問丨丨行丨丨矣掾史獨謂丞相前後失問或以譏吉吉曰民鬬相殺傷長安令京兆尹職所當禁備逐捕嵗竟丞相課其殿最奏行賞罰而已宰相不親小事非所當於道路問也方春少陽用事未可太熱恐牛近行因暑故喘此時氣失節恐有所傷害也三公典調和隂陽職當憂是以問之掾史乃服以吉為知大體本傳所過糞除第五倫字伯魚不達客河東變姓名稱王伯齊載鹽往來太原上黨丨丨輒為丨丨陌上人號為道士所窮慟哭阮籍常率意獨駕不由徑車轍丨丨輒丨丨而返下避故吏王戎簡脫不持儀刑好乘巴滇馬雖為三司率爾私行巡省園田不從一人以手巾插腰戎故吏多至大官相逢戎輒丨道丨之竹林七賢自避赤棒北齊司馬膺之神氣甚髙性方古舊與楊愔同為黃門郎至愔為尚書令抗禮如初曾路逢愔威儀導引乃於樹下自避愔望見令呼謂曰兄何意避弟膺之曰我丨丨丨丨本不避卿愔甚重之路不齎糧唐太宗丨不拾遺行旅丨丨丨取給于道通鑑道皆列肆元宗丨路丨丨丨具酒食以待行人食貨志水壞其棧封敖大中中厯平盧興元節度使鄭涯開新路丨丨丨丨敖更治斜谷道行者告便雷碎其石髙駢鎮安南使者嵗至乃鑿道五使置兵護送其徑有青石或傳馬援所不能治既攻有丨丨丨丨乃得通因名道曰天威云因問田父朱泚敗走昏迷不辨南北丨丨路於丨丨父曰豈非朱太尉邪源休止之曰漢皇帝父曰天地不長惡蛇鼠不為龍天網恢恢去將何適遂亡所在南部新書何避妬女狄仁傑帝幸汾陽宫為知頓使并州長史李冲𤣥以道出妬女祠俗言盛服過者致風雷之變更發卒數萬改馳道仁傑曰天子之行風伯清塵雨師灑道丨妬女丨邪止其役帝壯之曰真丈夫哉道逢宰相劉公安世作都承㫖待制欲至梁門見一相識呂微仲作左相與執政出尚書省相從歸府第遇之於塗除去席帽凉衫斂馬於浚溝廟下既至遣人傳語相揖而過當時若無所據則為犯義微仲歸不下㕔呼門下省法吏問從官丨丨丨丨如何吏檢條但有尚書省官避令僕兩省官各避其官長而無兩制避宰相之法微仲遂止然終不樂録語馳道蹕道樹松秦東窮燕齊南極吳越丨丨廣五十步隱以金椎丨以青丨為馳道之麗至於此使其後世曽不得邪徑而託足焉賈山至言御道植栁隋煬帝大業元年發淮南民十餘萬開䢴溝自山陽至揚子入江渠廣四十步旁皆築丨丨丨以丨行豹尾中丨道丨丨丨亦為禁中孝元皇后父名禁避之故曰省中漢書注至龍尾道安祿山逆謀日熾每丨丨丨丨南北睥睨久乃去唐史本傳又唐舍元殿前龍尾道自平階地凡詰曲七轉由丹鳳門北望宛如龍尾下垂於地焉兩垠欄檻悉以青石為之故謂之龍尾伯宅編里堠以車記里黃帝遊幸天下丨丨丨丨內傳里置銅表魏文帝迎薛靈芝大道之傍一丨丨丨丨五尺以志里數里植槐木韋孝寬為雍州刺史先是路側一里置土堠經雨頽毁每須修之自孝寬臨州乃勒部內當堠處植槐木代之既免修復行旅又得庇䕃周文後見怪問知之曰豈得一州獨爾當天下同之於是分諸州道路一里植一木十里植二木百里植五木焉北史韶州創驛堠徐申遷丨丨刺史徙治故州丨丨丨孔帖夏州復驛堠李吉甫請起丨丨至天德丨丨丨十一區以通緩急同上兩京置辰堠開元二十九年命觀風使鄭審檢校丨丨驛門即今門丨十二丨丨自審始也事始劉夢得驛路記太和二年閏三月滎陽守歸厚上言臣治所直天下大逵肘武牢而咽東夏誰何宜謹啓閉宜度先是驛于城中驛遞不時四門牡鍵通夕弗禁更請于外隧永永便安制曰可守臣奉詔無違命無奪時縻羡財募遊手逮八月既望新驛成鄭人胥說琢石而紀曰在兑之方面𤣥負陽門銜周道牆隂行桑境勝于外也逺購名材旁延世工塈塗宣晳瓴甓剛滑術精于內也蘧廬有甲乙牀帳有冬夏庭容牙節廡卧囊槖示禮而不慁也內庖外廏髙倉邃庫積薪就陽峙芻就燥有素而不愆也主吏有第役夫有區師行者有饗亭孥行者有别邸周之以高墉乃樓其門勞迎展蠲潔之敬餞别起登臨之思溱洧波瀾嵩丘雲烟四時萬象來貺於我走轂奔蹄遄征急宣入而忘勞出必屢顧其傳舍之尤乎太守姓楊氏字貞一華隂𢎞農人鄭為雄州非聞人大吏不得在其選夫驛之宜遷于外也前此二千石嘗言之而重改作若貞一可謂果於從政而決行其言者乎詩集披榛得丨丨丨微路杜行木杪路危丨丨丨杜山館望鄉路豈無平肩輿莫辨丨丨丨杜甫詩緣江路丨丨丨熟俯青郊堂成詩武陵源失路丨丨丨杜遣興蔣詡徑卜築應同丨丨丨杜羊腸路丨丨丨詰曲車輪為之摧裙腰徑誰開湖寺西南路草緑丨丨一丨斜注孤山寺路在湖州中草緑時望如丨丨丨白樂天杭州春望雪暗天欲渡黃河冰塞川欲登太行丨丨丨李白行路難水平橋野丨丨丨路杜遣興桑麻映宛洛佳遨遊春色滿皇州結軫青郊路回瞰蒼江流云云桃李成蹊徑丨丨丨道周東都已俶載言歸望緑疇謝元暉和徐都曹馳道飛甍夾江南佳麗地金陵帝王州云云丨丨丨馳道垂楊映御溝謝元暉鼓吹曲里堠髙厯厯堆堆路傍堠一雙復一隻迎我入秦關送我入楚澤千以髙山遮萬以逺水隔吾君勤聽治照與日月敵臣愚幸可哀臣罪庶可釋何當迎送歸緣路丨丨丨韓愈直亭亭丨立丨丨若短峯畫分南北與西東從來多少迷途者盡使平趨大道中孫明復久立待車塵才入溧水界休教勤吏民是誰差堠子丨丨丨丨丨苔蘚今仍古風霜秋復春不知雙與隻迎送幾行人楊廷秀厚貌臨官道劉子儀與夏英公在翰林英公為副樞意頗不平作堠子詩曰空呈丨丨丨丨丨大有從人捷徑過單牌雙堠頭都白楊廷秀古今合璧事類備要别集卷六
