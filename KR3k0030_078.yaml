body:
  text: 古今合璧事類備要後集卷九宋謝維新撰臣道門志氣源流見總事類先覺伊尹曰豫天民之丨丨者也豫將以斯道覺斯民也非豫覺之而誰也孟自任其丨丨以天下之重如此同上與㸃四子言志夫子喟然嘆曰吾丨丨也語養浩我善丨吾丨然之氣孟子晞顔丨丨之人亦顔之徒也楊子慕藺後司馬相如丨丨相如以為名倜儻丨丨不羈豪邁為人丨丨題柱升仙橋司馬相如字長卿初西去丨丨曰不乘髙車駟馬不遇此橋果以專車至其處成都記棄繻終軍西游入關關吏受軍繻軍曰丈夫西游終不徒還遂丨丨而去後拜謁者持節出關關吏曰此前丨丨生也投筆後漢班超字仲升有大志家貧為官傭書久勞苦輟業丨丨嘆曰大丈夫無他志略猶能效傳介子張騫立功異域以取封侯安能久事筆硯間乎擲板逢萌給事為亭長時尉過萌候迎拜謁既而丨丨嘆曰大丈夫安能為役遂之長安學焉卓邁崔圓少孤貧志向丨丨慷慨羅道宗丨丨尚節義又張建封丨丨尚氣自許以功名顯濟世假秀實及長沈厚能斷慨然有丨丨意救世劉實慨然有丨丨意志於道丨丨丨語士尚志王子墊問曰丨何事曰丨丨何謂尚志仁義而已矣殺一無罪非仁也非其有而取之非義也孟子宰天下前陳平少時為里中社宰分肉甚均父老謂之曰善為社乎曰使丨丨丨亦如之又唐來濟興髙智周郝處俊處約客宣城相與言志處俊曰願丨丨丨濟及智周亦然處約曰宰相或不可兾願為通事舍人足矣後領吏部處約以瀛州書佐入調濟遽往曰如志遂以約為通事舍人後皆至公輔掃天下後陳蕃字仲舉室有糞不除薛勤曰孺子何不掃灑答曰大丈夫當丨除丨丨安能事一室乎當雄飛後趙溫曰大丈夫丨丨丨安能雌伏當封侯後梁竦曰大丈夫生丨丨丨死當廟食乘髙車郭舟字少卿入關而嘆曰不乘使者車不復出門後奉使南陽果丨丨丨百尺樓許汜與劉備語曰陳元龍湖海之士豪氣不除汜過下邳見元龍無客主之意不相與語自上大床卧使客卧下床備曰今天下大亂君須憂國忘家有救世之意乃求田間舍言無可采是元龍所諱也向緣當與君語如我自卧丨丨丨上卧君於地下奚但上下床之間哉後陳球傳是無志志欲移山必能移山天地之心與人不逺犬戎滅周申甫復之無知亂齊管仲霸之晉室中絶王導興之太平干紀姚宋挫之彼謀之如神即用之如神故賢人君子正救時運有其才必有其志有其言必有其事今一言未行其志乃衰丨丨丨也桞冕答張僕射書謂有志李泌少為詩曰天覆吾地載吾天地生吾有意無不然絶粒升天衢不然鳴珂逰帝都安能不貴復不去空作昻藏一丈夫可丨丨丨者也鄴侯家傳憂天下房元齡顧中原方亂慨然有丨丨丨志定中原五代韓熙載北海將家子也初與李榖相善明宗時熙載南奔吳穀送至正陽酒酣臨訣熙載謂榖曰江左用吾為相當長驅以丨丨丨穀曰中國用吾為相取江南如探囊中物爾及周征淮南命榖為將以取淮南而熙載不能有所為也以射天地男子始生桑弧蓬矢丨丨丨丨四方男子之志也記不忘溝壑志士丨丨在丨丨孟匹夫不奪丨丨丨可丨志也語隱居以求丨丨丨丨其志同上齧臂而盟史吳起出衛郭門與母訣丨丨丨丨曰起不為卿相不復入衛門也後果如言輟耕太息漢陳勝字涉少時嘗與人傭耕丨丨之壟上甚久曰茍富貴無相忘傭者笑而應曰若為傭耕何富貴也勝丨丨曰燕雀焉知鴻鵠之志哉安從斗筲後郭泰字林宗世貧賤毋令給事縣庭林宗曰丈夫丨能從丨丨之役遂就屈彥宗學何作博士任城王彰謂左右曰大丈夫一為衛霍將十萬騎馳沙漠驅戎狄立功建號爾丨能丨丨丨耶魏志澄清天下後范滂為詔使登車攬轡慨然有丨丨丨丨之志橫行天下高昻字傲曹幼時便有壯氣膽力過人龍脣豹頸姿體雄異父為求嚴師令加捶撻昻不遵師訓專事馳騁每言男子當丨丨丨丨自取富貴誰能端坐讀書作老博士也其父以其昻藏傲曹故以名字之北史飲馬河洛蜀諸葛亮慨然有丨丨丨丨之志乘風破浪宋宗慤叔父問所志慤曰願丨長丨丨萬里丨南史取印繫肘晉周顗曰今年殺賊奴明年丨金丨如斗大丨丨捫虱談世秦王猛倜儻有大志不屑細務聞桓溫入關被褐詣之丨丨而丨當丨之務旁若無人上馬橫槊宋桓榮祖曰昔曹公父子丨丨丨丨下馬談詠此於天下可謂不負飯食矣下馬露板齊明帝曰上馬能擊賊丨丨作丨丨惟傅修期耳安事筆硯隋宇文慶少聰敏受業東觀頗涉經史既而謂人曰書足記姓名而已丨能久丨丨丨為腐儒之事何至作儒唐李靖常曰大丈夫遭遇要當以功名取富貴丨丨丨章句丨氣蓋全吳丨丨丨丨雄吞六魏唐尚馳撰諸葛亮賦氣蓋風雲張說撰宋璟碑功濟四海唐馬燧姿度魁傑與諸兄學輟策嘆曰方天下有事丈夫當以丨丨丨丨渠老一儒哉更學兵書戰策沈勇多算功業名節士之有志氣而思富貴者必能建丨丨有志氣而輕爵祿者必能立丨丨二者雖其志不同然時危世亂皆人君之所急者郭代公倜儻不羇之士也贊皇公臣子論腰劔袖捶韓熙載舉進士投書李晟曰釣大鼇者不投取魚之餌斷長鯨者焉用割雞之刀又云丨有丨而丨有丨口有舌而手有筆南唐遺事長鎗大劔史𢎞肇云安朝廷定禍亂直須丨丨丨丨安用毛錐子五代史借風雲為氣用宇宙而成心丨丨丨以丨丨南史隱逸序拳大漠於掌納陰山於寸眸丨丨丨丨一丨唐文粹吹噓霜露變丨丨而丨丨丨叱咤而風塵弭高邁濟河焚舟戰賦指麾貙兕作丨丨而丨丨丨威感激而風雲動色于公異露布豈昻昻若駒卜居丨丨丨丨千里之丨乎楚詞不落落如石後馮衍自論寧碌碌如玉丨丨丨丨丨願秉清忠節本朝楊億年十一太宗親試執政令賦喜朝京闕詩且有丨丨丨丨丨終身立聖朝之句宰相喜賀嘆曰經綸才王元之七八歲能文一日太守席上出對句鸚鵡能言寧比鳳畢文簡書之於屏元之書其下曰蜘蛛雖巧不如蠶丨丨丨丨之丨呼為小友志伊尹所志周濓溪曰丨丨丨之丨丨不志於功名志於道義則功名不足道志於功名則富貴不足道志於富貴則其人不足道矣言行録東坡上劉侍讀書天下之所少者非才也才滿天下而事不立天下之所少者非才也氣也曰何謂氣是不可名者也若有鬼神焉而陰相之今夫事之利害計之得失天下之能者舉知之而不能辨能辨其小而不能辨其大則氣有所不足也夫氣之所加則已大而物小於是乎受其至大而不為之驚納之至繁而不為之亂任其至難而不為之憂享其至樂而不為之蕩是氣也受之於天得之於不可知之間傑然有以蓋天下之人而出萬物之上非有君長之位殺奪施豫之權而天下環向而歸之此又有所得者矣多才而敗者世之所謂不幸者也而幸與不幸君子之論不施於成敗之間而施於窮逹之際故凡所以成者其氣也其所敗者其才也氣不能守其才則焉往而不敗世之所以多敗者皆知求其才而不知論其氣也詩集長劔丨丨倚天外彎弓掛扶桑宋玉詩長鯨威鳯髙其翔丨丨吞九州排雲丨丨呌閶闔披腹呈琅玕韓愈詩倚天安得丨丨劒跨海斬長鯨李白詩沮金石徑氣丨丨丨韓詩吞鴻鵠壯志丨丨丨孟浩然詩洗乾坤安得覆八方為君丨丨丨杜詩干斗牛有氣丨丨丨溫飛卿詩看劔匣氣衝丨丨丨頴脫無囊錐杜詩逐吳鈎經過辨豐劒志氣丨丨丨同上丈夫四方志丨丨丨丨丨安可辭固窮李白詩肝膽一古劔丨丨丨丨丨波濤兩浮萍韓詩澄清洛陽水誓欲斬長鯨丨丨丨丨丨李白蓬萊頂上行巨鼇莫載三山去我欲丨丨丨丨丨同上搏搖九萬里大鵬一日同風起丨丨直上丨丨丨假令風歇時下來猶能搊却滄溟水李白詩欲釣千尺流我有一寸鈎丨丨丨丨丨孟郊詩天地入胸臆同上四溟作胸臆五嶽為詞鋒丨丨丨丨丨皮日休詩呼吸走百川丨丨丨丨丨燕然可摧傾李白詩岸幘揖天子皮日休詩叱詫開帝業丨丨丨丨丨手成天地功李白詩意氣日爭光丨丨與丨丨丨輝王荆公詩四海空無人眼髙丨丨丨丨丨坡詩五歲氣食牛小兒丨丨丨丨丨韓徐卿二子歌欲勒燕然山上石丨丨丨丨丨丨丨登科記裏是閒名姚同詩要斬長鯨為萬段為君鑄作百錬刀丨丨丨丨丨丨丨坡詩要將百篇吐千丈丨丨丨丨詩一丨丨丨虹同上麾斥八極隘九州同上氣浸千里蠅附驥丨丨丨丨丨丨丨黃廷堅演雅正直事類不回經德丨丨孟無邪中正丨丨記司直邦之丨丨詩遺直叔向古之丨丨左正曲正直為正丨丨為直左若曲大直丨丨老子木彊前申屠嘉為丞相為人丨丨懷直後坐朝召鄧通欲斬之帝使持節赦之強項前董宣為人丨丨殺公主奴上令謝主置手據地不肯因謂之丨丨令方正漢武帝舉賢良丨丨直言極諌之上方直朝錯曰奉法令不容私盡心力不敢矜遭患難不避死見賢不居其上受祿不過其量不以無功居尊顯之位可謂丨丨士矣亷直漢嚴彭祖為太傅丨丨不事權貴又申屠嘉為人丨丨不受私謁剛直後虞詡字升卿刺舉無所四容有譴拷三曹刑罪丨丨之性終不可踰又唐崔祐甫性剛直遇事不回峭直劉子翼丨丨有行彊直徐晦丨丨守正不沉浮於時敢直段平仲朝廷有得失未嘗不論奏世推其丨丨云讜直吕元膺為同州刺史既謝帝逮問政所對詳詣明日謂宰相曰元膺氣丨言丨宜留左右奈何出之李藩裴垍謝因言及此乃宗社無疆之休清直席豫丨丨亡欲當官不為權近所憾疏直劉蕡與諸儒階進獨譏切宦官然亦太丨丨矣遜直王魏善諫而房杜丨其丨房杜贊賣直謂姜公輔為丨丨而不能容德宗贊峭正隋煬帝雖愛虞世南之才然其丨丨弗甚用也徑正時政移近幸紀律蕩然李勃丨丨不顧患鯁正蕭做以丨丨為權臣所忌持正李吉甫李絳數爭事帝前不協武元衡獨丨丨無所違附帝稱其長者又虞世南貌儒謹外若不勝衣而中抗烈議論丨丨堅正韓愈操行丨丨鯁言無所忌又武元衡帝素知其丨丨有守故眷禮優渥異他相又李德裕擢韋溫為員外郎或言雅為牛僧孺厚裕曰是子丨丨可以私廢乎莊正武儒衡謁宰相鄭餘慶未嘗有所易以丨詞丨色見重於餘慶處正翟咸為御史丨丨特立風采動一時秉正方鎮多沽恩獨吕元膺丨丨自將監軍及中人往來者無不嚴憚入拜吏部侍郎正色立朝事之幹正者丨丨丨也易人之生丨丨丨也直語志不奪儒有身可危而丨丨可丨記死不更見利不虧其守見丨丨丨其守其正直有如此者同上詐不情漢公孫𢎞多丨丨丨附權門張禹劉歆谷永阿丨丨丨同上折長官郅㡓面丨丨丨反封侯後漢人謡曰直如弦死道邉曲如鈎丨丨丨刺人短唐嗣吳王子巘性介直靣丨丨丨激浮競宋申錫素孤直少與及進用議者謂可以丨丨丨不干譽薛廷老在公卿間侃侃丨丨虛丨稱為正人不詭隨蕭至忠為中書令時宗楚客懷姦植黨而韋巨源楊再思李嶠皆無所弼正至忠介其間丨丨丨時望歸重不失正楊於陵節操堅明始終丨丨其丨重其正李勉召為大理少卿天子素丨丨丨擢太常少卿欲遂柄用疾黨附裴璘以道自任悉心事上丨丨丨不為權近所持嫉新貴王叔文用事韓臯丨之謂人曰吾不能事丨丨從弟華以告叔文叔文怒出為鄂嶽靳沔觀察使靖共爾位丨丨丨丨好是正直詩正色立朝孔父丨丨而丨於丨則人莫敢過而致難於其君者孔父可謂義形於色矣公羊傳使枉者直舉直錯諸枉能丨丨丨丨語惡訐為直丨丨以丨丨者同上直言及難伯宗每朝其妻戒之曰子好丨丨必丨於丨左悻直忘身鯀丨丨以丨丨兮楚詞直道而行三代所以丨丨丨丨也語正已物正有大人者丨丨而丨丨者也孟子正事正言太子乃