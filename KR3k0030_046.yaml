body:
  text: 古今合璧事類備要前集卷四十六宋謝維新撰文房門筆釋名筆述也謂述事言之也事類緑沉王羲之筆經曰有人以丨丨漆竹管及鏤管見遺斯亦可玩詎必金玉哉初學青鏤紀少瑜嘗夢陸倕以一束丨丨管筆授之曰卿自釋其善者其文因此大進青箱雜記筆札谷永與樓煩俱為五侯上客長安號曰谷子雲丨丨本傳筆品梁元帝為湘東王嘗記録忠臣義士文章之美者筆有三品忠孝全者用金管書之徳行精粹者用銀管書之文章贍麗者用班竹管書之筆床南朝呼丨管為丨梁簡文帝荅徐摛書特設書幌下置筆床四管為一床樹萱録筆冢僧智永學書有舊筆頭數石瘞之號退丨丨文房四寳筆陣夫紙者陣也筆者弓弰也墨者鍪甲也水硯城池也王羲之筆陣圖筆諫唐穆宗問栁公權書何由盡善對曰心傳正則筆正穆宗改容知其為筆諫也本潤筆蔡君謨為永叔寫集古目録序歐以䑕鬚粟尾筆銅緑筆格等為丨丨正櫋宗以為太清而不俗歸田録假筆閩人黄碣有丨其丨者碣曰是筆他日當㫁大事不可假五代史君子避丨丨宜丨三端文士筆端武士鋒端辯士舌端韓詩外傳文子化有書生謁李林甫云管丨丨後丨為筆開元遺事中書君毛穎者中山人也始皇時蒙恬伐楚圍毛氏之族㧞其毛載穎而歸封諸管城號管城子累拜中書令呼為丨丨丨韓愈作毛穎傳管城侯宣城毛元銳字文鋒封為丨丨丨文嵩作管城侯傳尖頭奴元魏時有臣古弼頭尖魏太武帝名之曰筆頭又曰丨丨丨時人呼為筆公北史毛錐子洪肇曰安朝廷定禍亂直湏長槍大劍若丨丨丨安足用哉五代史筆生花李白少夢丨頭丨丨自是才思贍逸天寳遺事筆五色江淹夢人與五色筆由是文藻日新後又夢郭璞取去自後為詩絶無美者典略及本傳和墨濡筆起居舍人秉管隨宰相入殿夾香案分立殿下丨丨丨丨時號螭頭唐志持橐簮筆張安世丨丨丨丨注云近臣負橐簮筆備顧問或有所紀負橐者所以盛書也簮筆者謂挿筆於首前趙充國傳班超投筆後漢丨丨嘗丨丨嘆曰大丈夫當立功異域取封侯安能乆事筆硯乎本傳樂天應制白丨丨與元徽之丨丨各有纎鋒細毫之筆携以就試相顧而笑目為毫錐故贈元詩策目穿如札毫鋒利似錐本集詩集吐虹男兒生世間筆端丨白丨何事與秋螢爭光蒲葦叢山谷飛鸞霜蹄千里駿風翮九霄鵬筆丨丨聳立草罷鳳騫騰杜甫如椽青鏤墨淋漓珊瑚架最宜静援花影轉孤卓漏聲遲題柱吾無取丨丨彼一時林和靖詩晉王珣夢筆大丨丨本傳挿架蘇過叔黨賦䑕鬚筆云太倉失陳紅狡兔得餘腐既興丞相歎又發廷尉怒磔肉餧餓猫粉髯雜霜兎挿架刀矟健落紙龍蛇騖穿墉何卑微託此得佳譽苕溪詩話題竹粘粉為題棲鳳丨帶香因洗落花泉僧貫休寫經尚書因用裁天詔内史新将丨道丨栁子厚五兄弟錢次公以墨四丸筆五枚賜楊時可楊戯曰安得硯乎次權曰不難湏一詩楊乃作一絶云尖頭奴有丨丨丨十八公生四客卿過我書齋無一事似應終日待陶泓本朝百家詩千人軍詞源倒流三峽水筆陣獨掃丨丨丨杜詩墨釋名墨晦墨也事類墨卿揚雄上長楊賦聊因筆墨以成文章故藉翰林以為主人子丨為客丨以風漢本傳墨公薛稷封丨為丨加九鍚詳見下使者陶家瓶餘事曰𤣥宗御按墨曰龍香劑一日見墨上有小道士如蠅而行上叱之即呼萬嵗曰臣墨之精黒松丨丨也凡世人有文者其墨上皆有龍賔十二上神之乃以墨分賜掌文官記聞太守薛稷為墨封九鍚拜𤣥香丨丨兼毫州楮郡平章事是日墨吐異氣結成樓䑓狀隣里來觀良乆乃滅纂異記陳𤣥毛頴與絳人丨丨𢎞農陶泓㑹稽楮先生友善其出處必偕上召頴三人者不待詔輒俱往上未嘗恠焉退之毛穎傳松滋燕人易𤣥光字處晦封為丨丨侯盖墨也松滋侯傳墨丸山谷几間取小囊有墨以示潘谷谷隔囊手之即置几上曰天下之寳也出之乃李廷珪墨又别取小錦囊有丨一丨谷手之如前則歎曰今老矣不能為之出之乃谷少所作墨其藝之精如此邵氏後録墨漆太祖下南唐得李廷珪父子墨同俘獲付主藏籍入不為貴也後有司更造相國寺門詔用丨丨取墨於主藏車載以給皆廷珪父子墨至宣和間黄金可得而李墨不可得也邵氏後録削木蔡君謨言李廷珪墨能丨丨墜溝中經月不壞百家詩磨人石昌言蓄李廷珪墨不許人磨或戲之曰子不磨墨墨將磨子今昌言墓木拱矣墨固無恙可為好事者之戒坡集石墨陸雲與兄書曰一日上三臺曹公藏丨丨數十斤令送三螺文房四寳懷化郡掘塹得丨丨精好可冩書顯微廣州記築陽縣有墨山山丨悉如丨盛𢎞之荆州記瑜麋漢尚書令僕丞郎月給丨丨墨大小二枚西京記狻猊徐峯善棊段成式欲盡窮其術峯曰子若以墨丨丨與我當使子過我十倍龍隨記豹嚢養墨以丨皮丨貴乎逺濕文房四寳九子墨陸士龍與兄書云有丨丨丨祝婚者多子之義也祝曰九丨之丨藏於松煙本姓長生子孫無邊文房四寳䨇龍様李超易水人唐末與其子廷珪亡至歙州以其地多松因留居以墨名家本姓奚江南賜姓李其墨有劍脊圎餅面多為龍紋嘉祐中仁宗宴近臣於羣玉殿嘗以其墨賜之曰新安香墨其後翰林承㫖賜者皆丨脊丨丨尤為佳品文房四寳王勃夢墨丨丨丨人遺以圗丨盈䄂自是文章日進酉陽雜俎伯英學書後張丨丨臨池丨丨染水盡墨本傳詩集龍麝此墨足支三十年但恐氷霜侵髪齒非人磨墨墨磨人瓶應未罄罍先耻逝將振衣歸故國數畎芳園自鋤理作書寄君君莫笑但覔來禽與青李一螺㸃漆便有餘萬竈松煙何處使君不見永寜第中擣丨丨列屋閑居清且美倒暈連眉秀嶺浮䨇鴉畵鬂香雲委時聞五斛賜蛾緑不惜千金求獺髓聞君此詩當大笑寒窓冷硯氷生水東坡蛾緑丨丨攅曉門季賀斛煬帝宫女爭畵長蛾司宫吏日給螺子黛五號丨丨子大業拾遺記寸玉書窻拾輕煤佛帳拂餘馥辛勤破午夜收此一丨丨癡人畏老死腐朽同此木欲將東山松湼入南山竹墨堅人苦脆未用歎不足且留注蟲魚莫草三千牘坡詩萬杵徂徠無老松易水無良工珍材取樂浪妙手惟潘翁魚胞熟丨丨犀角盤䨇龍墨成不敢用進入蓬萊宫蓬萊春晝永玉殿明房籠金箋洒飛帛瑞霧縈長虹遥憐醉常侍一笑開天容同上烏玉玦我貧如飢䑕長夜空齩齧瓦池研竈煤葦管書柿葉近者唐夫子逺致丨丨丨同上畵墨仙潘郎曉踏河陽春明珠四壁驚市人那知望拜馬蹄下胷中一斛泥與塵何似墨潘穿破褐琅琅翠餅敲𤣥笏布衫漆墨手如龜未害氷壺貯秋月世人重耳輕目前區區張李争媸妍一朝入海尋李白空着人間丨丨丨東坡與潘谷給上方溪石琢馬肝剡藤開玉板嘘嘘雲靄出奕奕龍蛇綰此中有何好秀色紛滿眼故人歸天禄古漆窺蠧簡瑜麋丨丨丨老手擅編剗分餘幸見及流落一枝赧坡詩妙一世子墨客卿丨丨丨懐玉山中五丈夫峨眉老仙與推轂谷量牛馬斗量珠洪駒父上墨工紙釋名紙砥也謂平滑如砥石也事類蔡侯紙自古書契多編以竹簡其用縑帛者謂之紙縑貴而簡重並不便於人蔡倫字敬仲為尚方令乃造意用樹膚麻頭敝布魚網以為紙奏上安帝善其能自是莫不用焉故天下稱丨丨丨本傳左伯紙丨丨能為丨時蔡倫亦為之伯尤為精妙鄴都宫觀成詔韋誕仲將題署奏曰若用張芝筆丨丨丨及臣墨兼此三具又得臣手然後可以成徑丈之勢書斷楮國公薛稷為紙封九鍚拜丨丨丨白州刺史統領萬字軍畧道中郎將事略又毛穎傳穎與㑹稽楮先生友善注謂紙也韓昌黎文好畤侯謂紙為華隂楮知白字守𤣥亦曰丨丨丨文館書史好畤侯傳側理紙南越獻丨丨丨南人以海苔為紙其理倒側因以為名晉武以賜張華寫博物志拾遺記陟釐紙本草注云水中苔取以為紙名苔紙青黄色本草乂張華撰博物志晉武頗嫌繁命削之賜側理萬張子年云丨丨丨也此紙以水苔為之漢人語訛謂之側理也王子年記衍波牋蕭貫夢至宫庭有婦人授貫紙曰此所謂丨丨丨煩賦宫中曉寒歌直方詩話薛濤牋唐元和初蜀妓薛濤好製小詩惜其幅大乃狹小之人以為便號丨丨丨赫蹏書成帝以篋裏藥二又丨丨丨與獄中婦人曹宫飲赫蹏薄小紙也曹宫宫婢有皇子趙飛燕傳生熟紙唐人有丨紙丨丨熱紙妍妙輝光生紙非有喪不用退之與陳素書云送孟郊序用生紙寫言急於自觧不暇擇耳邵氏後録藤角紙范寗教曰士絶不可以作文書皆令用丨丨丨詩話桃花紙楊炎在中書後閣用丨丨丨糊窻鳳池繡花紙蕭穎士少夢人授紙百畨開之皆繡花文筆候秩金花牋帝與貴妃賞牡丹李延年持丨丨丨賜李白楊妃外傳烏絲欄宋亳間紙有織成界道謂之丨丨丨又異聞集霍小玉傳取朱絲繨囊中取越姫丨丨丨素叚三尺以授李生生多才思援筆成章李肇國史補布頭牋取布頭機餘經不受緯者治之作紙名丨丨丨此紙名冠天下志林吊剡溪唐舒元輿作丨丨丨藤文剡溪藤可作紙言今之錯為文者皆夭閼剡藤者也本傳貴洛陽左太冲造齊都賦一年乃成復賦三都遂締思十稔豪貴競相傳寫洛陽為之紙貴晉史杜暹百番唐丨丨為婺州參軍秩滿歸吏以紙萬番贐之暹受丨丨時人謂之百紙参軍本傳右軍九萬王丨丨為㑹稽謝公就求牋紙庫中有丨丨板悉與之語林詩集雲藍予在九江造丨丨紙輙送五十板詩云三十六鱗充使時數番猶得寄相思段成式與温庭筠詩序鵠白學似貧家老破除古今迷忘失三餘極知丨丨非新得謾染鴉青襲舊書山谷陽山藤丨丨老丨截玉昉烏絲翠竹避寒光羅侯包贈室生白明於機上之流黄愧無征西蠆尾手為寫黄門急就草山谷蠻溪藤丨丨卯丨卷盈百側理羞滑蠒羞白想當鳴杵砧面平桄榔葉風溪水碧千里鵝毛意不輕瘴煙腥膩北歸客硯釋文硯研也可研墨使和濡事類硯名唐李衛公丨丨結隣言與結為隣也開元録硯封薛稷為丨丨九鍚拜離石鄉侯鐡面尚書使持節即墨軍事鳳翔退耕録硯譜端溪丨水中石色青山半石色紫山頂石尤潤如猪肝色者佳蘇易簡墨譜硯傳文嵩石虚中傳字居黙噐宇方圎中心坦然拜即墨侯與宣城毛元銳燕人楮𤣥光華隂楮知白同出處文房四寳硯讃黛㸃文字耀明典章施而不德吐惠無疆浸清甘液吸受流光繁欽硯讃硯銘運量藻榦榮辱是若王粲硯銘東坡有鳳朱石丨丨見後詩余家有歙丨底有欵識云吴順義元年處士汪少微銘松操凝煙楮因鋪雪毫頴如飛人間四絶文集四絶李後主澄心堂紙李廷珪墨龍尾石硯毛元銳筆謂之丨丨硯話三種魏泰曰端溪有丨丨曰岩山曰西坑曰後磨石色深紫襯手而潤叩之清逺有深緑圓小鸜鵒眼乃岩石也其次色亦赤呵之乃潤鸜鵒色紫綅慢而大此乃西坑石也其下青紫色向明側視有碎星光㸃如沙中雲母乾而小潤謂之後磨石西坑硯三當岩石之一後磨三當西坑之一其品可知東軒筆録龍壁壁曰丨丨其下多秀石可硯栁宗元栁州山水記漁潭徐𤣥之夜讀書見人物如粟米數百皆具甲胄擁一紫衣者行案上傳呼曰蚍蜉王欲觀丨於紫石潭漁具數十人入硯中皆獲小魚異聞實録金星歙石出於龍尾溪以丨丨為貴余少時得金坑壙石堅而發墨端溪以北岩為上龍尾以深為上龍尾逺於端溪上而端石以後出見貴爾玉硯許漢陽筆以白玉為管硯碧玉以玻璃為匣馬肝漢武帝時郅支進丨丨石以和丹砂食之則彌年不飢以拭白髪盡黒此石亦可作硯有光起東坡詩注鴝眼黄黒相間黶睛在内晶瑩可愛謂之活眼四傍浸漬不甚睛明謂之淚眼形體畧具内外皆白殊無光彩謂之死眼活勝淚淚勝死死勝無東坡筆録金線文端溪石有白赤黄㸃者謂之鸜鴝眼脉理黄者謂之丨丨丨其山號斧柯昔人採石者先以中牢祭之不爾則雷電失石所在文房四寳紅絲石青州有丨丨丨紅黄相參理黄者其絲紅理紅者其絲黄皆可為硯端歙石丨石如德人毎過於厚或廉於財不能底滯丨丨如俊人輙顛倒失之輕而遇事風生无不厭足人意邵氏後録黯淡石坡作鳳咮石硯銘云出比苑鳳城山余至建州求之無有盖南劍丨丨灘石也此石有二種其一出鹵水去黯淡四十里細潤而不甚發墨丨丨灘丨宜墨而膚理不逮唯兼二者真過龍尾也葉少藴詩君苖焚硯見前文章類維翰鑄硯見前習學類詩集雲氣琱琢山骨秀磨礲發光炯體潤丨丨生寒泉冽幽井平生心腹交陳𤣥與毛頴德重不傾側中虚且明静置之棐几上吾方日三省謝无逸電光巨璞禹鑿餘異狀君獨見其滑乃波濤其光乃丨丨杜子美紫潭丨丨出𤣥雲翳我潭中星獨有潭上月倒掛紫翠屏我老不看書黙坐飬此昏花睛時時一開眼見此雲月眼自明乆知世界一泡影大小真偽何足評笑彼三子歐蘇梅無事自作雪羽爭故将屏硯送兩范要使珠璧棲窻欞牀頭復一虛靈堂窻下爾雅箋魚蝦二物與人初不異飄落高下隨風花坡集眉子石硯君不見李成畵手開十眉横雲九月争新竒㳺人指㸃小顰處中有漁陽戎馬嘶又不見王孫青𤨏横窻碧腸斷浮雲逺山色書生性命何足論坐費千金買消渇邇来䘮亂愁天公謫向君家書硯中小窻書幌相嫵媚令君曉夢生春紅東坡眉子石硯詩郭君大硯丨丨丨丨如南溟化我霜毫作鵬翼安得剡藤三千尺揮九萬字不渴墨山谷古今合璧事類備要前集卷四十六
