body:
  text: 古今合璧事類備要前集四十一宋謝維新撰仕進門赴任附書考事類往戍齊侯使連稱管至父戍葵邱曰瓜時而丨及瓜而代左傳辦裝鍾離意上書薦劉平等特賜丨丨錢後漢書賜縣令錢客曹郎主治羗戎事劇遷刺史其公遷縣令詔書賜錢三萬與三臺祖餞治裝一月謁公卿凌朝乃發後漢百官志注賜太守錢張輔為東郡太守賜裝錢三十萬以之官同上書考有虞考績三載考績三考黜陟幽明庶績咸熈書成周考成以參互考日成以月要考月成以嵗㑹考嵗成周禮奏考課法京房曰古帝王以功舉賢則萬化成瑞應著宜令百官各試其功災異可息詔使房作其事房丨丨丨吏丨漢書劉卲作都官考課法七十二條魏志為黜陟法杜預受詔丨丨丨之丨曰莫若委達官各考所統在官一年以後毎嵗言優者一人為上第劣者一人為下第因計偕以名聞按其六嵗處優舉者超用之處劣舉者奏免之其優多劣少者叙用之劣多優少者左遷之晋書考書第一鄭善果所至有績號清吏嘗與武威太守樊予盖考為天下第一煬帝賜物千段金百兩唐上考第以李綱孫伏伽為第一通鑑盧從愿任豫州刺史考課為天下第一考課第六蕭育為茂陵令㑹課注丨丨丨丨漆令郭舜殿見責育救之扶風怒曰君課第六裁自脫何暇為人言也本傳考績為最路嗣恭連徙神烏姑臧二縣丨丨丨天下丨元宗以為可嗣魯恭因賜名崔彦昭吏治精明戴叔倫清明仁恕所至稱最考改中上盧承慶考内外官有一官督運遭風失米盧考之曰監運損糧考中下其人容止自若無言而退盧改注曰非力所及丨中中既無喜容亦無愧辭又丨曰寵辱不驚考丨丨固辭上考盧邁進給事中俄㑹考課邁以不滿嵗丨丨丨丨縉紳髙其義不許上考宇文融用事以括田功為上下考盧從愿丨丨融恨之並史自書下考陽城為道州刺史賦稅不時觀察使數誚責州當上考功第城自署曰撫字心勞催科政拙考下下自述其考唐臨丨丨丨丨曰形如死灰心若鐡石唐書升中書考張說為中書令元宗詔曰動惟直道累開獻納之誠言則不諛自得謀猷之體才望兼著理合褒升考中上同上書録事考周李詳解褐鹽亭尉因考為録事所擠詳謂刺史曰録事持銓曹之權當要害之地為其妄褒貶耳若使詳秉筆頗亦有詞刺史遂授筆詳即丨丨丨丨曰怯斷大案好勾小稽自隱不清言他擾濁階前兩競鬬困方休獄裏囚人非赦不出天下以為談笑之最焉御史臺記攝職附換官事類兼職丨人之丨六帖二事沈諸梁兼丨丨注謂令尹司馬也傳士㑹攝右晋文公城濮之役舟之僑先歸丨丨丨丨叔魚攝理晋邢侯與雍子争鄐田士景伯如楚丨丨丨丨注理獄官也祝佗辭職衛侯將㑹使丨丨從丨曰臣展四體以率舊丨猶懼不給而煩刑書若又供二徼大罪也謂兼二職也夫子攝政丨丨為魯司冦丨丨七日誅少正夘並同上攝府縣官元宗西狩詔留崔光逺為京兆尹西京留守採訪使乗輿已出都人亂入左藏大盈争輦財珍光逺募官丨丨丨誰何宫闕斬數十人乃定唐史攝臺省官李晟擇文武丨丨丨丨以俟乗輿攝行軍長史李靖陳圖蕭銳十䇿有詔拜靖行軍總管兼丨孝㳟丨丨丨丨攝御史大夫李巨授陳留譙郡太守丨丨丨丨丨明日謝帝驚曰何攝為即詔御史大夫換官兩縣皆理薛宣為馮翊潁陽多盜賊令薛㳟未嘗治民職不辦粟邑縣小人謹朴易理令尹賞有才宣奏賞與㳟換縣旬日間丨丨丨丨曰公綽優於趙魏六帖二州對換母邱儉為鎮南將軍豫州刺史諸葛誕東關不利乃令誕儉對換誕為豫州儉為楊州魏志遷除事類登庸若時丨丨書顯遂丨忠丨良同上不次賢能丨待丨而舉記丨丨見拔以示羣臣唐史不拘英主取賢丨丨階陛陸贄傳除故官凡言除者丨丨丨就新官也漢書音義越清級亦有少負令譽超丨丨丨者南史嵗中大夫漢文帝召賈誼為博士超遷丨丨至太中丨丨本傳旬月宰相車千秋以一言悟意封侯丨丨取丨丨封侯世未嘗有本傳嵗中四遷主父偃上書召見拜為郎中大夫丨丨丨丨本傳夜加二階唐韓思彦擢第授監察御史昌言當世得失髙宗丨召丨丨丨待詔宏文館驟得中書蘇頲為工部侍郎帝問丞相有自工部得中書侍郎者乎對曰陛下任賢何資之計乃詔為中書侍郎四遷吏部鄭珣瑜以諷諫主文科髙第丨丨丨丨侍郎二朞宰相張鎬起布衣丨丨至丨丨數月中丞武后時薛季昶上書自布衣擢監察御史自給事中丨丨為御史丨丨旬日藩鎮李愬進山南東道節度使丨丨父兄踐兩鎮三載侍中南梁張纘起居袐書郎丨丨遷太子舍人遷尚書吏部郎俄兼丨丨時人以為早達並本傳每遷有光郭汾陽丨丨面長三寸額丨丨氣事已乃復舊隴上書召見垂泣韓思彦為李義甫譖出為山陽丞髙宗丨問不丨卿乆今何官耶思彦泣道所以帝召為御史本傳章服附賜緋賜紫事類命德天丨有丨五服五章哉臯謨在笥惟衣裳丨丨說命唐官服制唐初品官舊服止黄紫貞觀四年詔三品以上服紫四品五品以上服緋六品七品以緑八品九品以青永徽三年京官文武職事四品五品並給隨身魚袋天授中改佩魚為龜神龍依舊景雲赦文魚袋着紫者金裝着緋者銀裝是時正員官始佩魚其離任及致仕即去魚袋員外判試并檢校等官並不佩魚開元中張嘉貞奏請致仕官及内外官五品以上檢校試判及内供奉官見占闕者聽凖正員例許終身佩魚以理去任亦許佩魚自後恩制賞緋紫謂之章服凡服飾差等上得兼下下不得僭上唐㑹要及職林國朝服制雍熈初郊祀禮成詔升朝官服緋緑二十年叙賜緋紫真宗東封西祀赦書京朝官並以十五年為限太平興國二年詔朝官出知節鎮及轉運使副借紫知防團刺史州借緋衣緋者借紫其知通判知軍監止借緋㑹要魚袋之制國初多闕雍熈元年南郊畢出内魚袋以賜近臣由是内外升朝官皆佩魚舊制借服者但稱借紫借緋初不佩魚醫官職雖髙亦不佩魚政和初王詔上言於是始佩魚稱借紫金魚袋而醫官隨服色佩魚矣㑹要及國史補賜緋告舅得緋李子慎誣丨其丨獲五品其母見其著緋衫泣曰此是汝舅血染者耶唐書為使請緋張宿使淄青裴度欲丨請銀緋乗驢着緋張鷟初為岐王屬夜夢着緋丨丨睡中自怪我衣緑乗馬何為衣緋却乗驢其年應舉及第授鴻臚丞未經考而授五品以其應也僉載為䑕齧袍張鷟為鴻臚丞㡌帶及緑袍並䑕齧有蜘蛛大如粟當寢門縁絲上經數日大赦加階授五品居相着緋張嘉貞開元中書令著緋傅游藝武后時丨丨位丨丨南部書復官還緋沈佺期以罪謫遇恩丨丨而未丨朱衣因内宴羣臣皆歌迴波詞佺期曰身名已蒙齒録袍笏未賜牙丨中宗即賜之本事詩賜紫侍讀賜紫馮伉為皇太子諸王丨丨殿中丨金丨服唐書中丞奏紫太和三年中書門下奏檢校四品兼丨丨賜緋經三周年以上者兼許丨丨同上賭集翠裘武后以南海獻集翠裘賜張昌宗狄仁傑入奏事后令争三籌丨昌宗所衣裘卿以何物為對狄因指所衣紫絁袍曰臣以此敵則天笑曰此裘價逾千金卿之所指為不等矣狄對曰臣袍乃大臣朝見奏對之服也集異記指紫系布顔真卿問范氏尼曰吾得五品否尼丨坐上丨丨丨云顔郎衫色如此起家金紫李泌丨丨丨丨為帝王師廣記特恩金魚崔日用為中丞賜紫是時佩魚須有丨丨日用因内宴撰迴波詞中宗以丨丨賜之本事詩詩集朱紱丨丨白銀章扶病垂丨丨並杜詩紫綬金章丨丨照青春同上聘召事類君命丨丨召不俟駕行矣論語使節凡君召以三節二節以走一節以趨在官不俟屨在外不俟車注節所以明信輔君命也使使召臣急則持二緩則持一玉藻幣帛季春出丨丨聘名士月令圭璧聘人以丨聘士以丨召人以瑗荀子束帛賁于邱園丨丨戔戔易賁卦車乗翹翹丨丨招我以弓左莊傳公車遣詣丨丨後漢記馹傳李嶠傳郵馹爾雅云丨遽丨皆傳車驛馬之名本傳幣聘莘野伊尹耕于有莘之野湯三使人以丨丨之既而幡然改曰與我處畎畝之中由是以樂堯舜之道吾豈若使是君為堯舜之君哉吾豈若使是民為堯舜之民哉吾豈若於吾身親見之哉孟子旌招虞人齊景公田招虞人以丨不至將殺之志士不㤀在溝壑勇士不㤀喪其元孔子奚取焉取非其招不往也曰敢問丨丨丨何以曰以皮冠庶人以旃士以旂大夫以旌以大夫之招招虞人虞人死不敢往以士之招招庶人庶人豈敢往哉况乎以不賢人之招招賢人乎同上長吏勸駕髙帝詔有稱明德者丨丨必身丨為之丨謂身自往勸以車駕而遣之舍人趣裝蕭何薨參聞之告丨丨丨治行吾且入相居無何使者且召參安車往迎漢四皓隱商山惠帝為太子為書卑辭丨丨迎以為客乃出前席召見賈誼為長沙王太傅嵗餘文帝思誼徵之入見上方受釐坐宣室上因感鬼神事而問鬼神之本誼具道所以然之故至夜半文帝丨丨既罷曰吾乆不見賈生自以為過之今不及也迺拜為梁懐王太𫝊本傳因賦召問蜀人楊得意為狗監侍上上讀子虚賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如為此賦上驚乃召問上書召見主父偃齊人諸儒相與排擯不容於齊家貧北遊燕趙為客乃西入關資用之留乆諸公賓客多厭之偃上書闕下朝奏暮召所言九事其八事為律令一事諫伐匈奴同上主父偃等書奏天子召見謂曰公等皆安在何相見之晩也拜為郎中主父偃尤親幸一嵗中凡四遷為中大夫漢武紀吾今召矣汲黯坐免官隱於田園者數年召為淮陽太守黯泣曰願為中郎出入禁闥補過拾遺上曰君薄淮陽耶丨丨丨君丨何不憚煩王良病歸就徵過友人友人不肯見曰不有忠言竒謀以取大位丨其往來屑屑丨丨丨也蒲輪遣召武帝遣使者安車丨丨束帛加璧召魯申公封車遣詣漢平帝徵天下通知逸經古記歴算五經者所在為駕一丨軺丨丨丨注諸發駕置傳者封以御史大夫印章元纁遣聘光武備安車丨丨丨使丨嚴光三反而後至羔幣往聘安帝時陳忠薦周燮馮良帝以元纁丨丨聘之鋒車一乗晋宗室義陽成王望字子初時魏髙貴鄉公好才愛士望與裴秀王沇鍾㑹並見親待公性急秀等居内職急有召便至以望外官特給追丨丨丨丨武賁五人每有宴集望奔馳而至使者四輩太宗召馬周未至間遣丨丨丨丨敦趣及見與語大恱詔除銀青代宗欲相李泌元載忌之帝不得已出泌約曰後召當以銀為信忽除銀青泌知載必敗已且相矣未㡬果然家傳召見金鑾李太白事見宗室門召拜拾遺陸龜蒙以髙士召不至素善李蔚及當國丨丨丨丨詔下而卒召見延英陳摶隱居華山藝祖召不至太宗丨以羽服丨於丨丨召起除官邵康節與富文忠早相知文忠入相詔天下舉遺逸康節不屈後再舉詔王拱辰尹洛以康節應詔潁川薦常秩皆先除試將作監主簿二人皆不起後常秩賜對除諫官召見拜官种放以處士丨丨丨丨真宗待以殊禮名動海内詩集除書到門簡略非世噐委身同草木逍遥精舍居飲水自為足累日曽一櫛對書常懶讀社臘㑹髙年山川恣游矚明世方選士中朝懸美禄丨丨忽丨丨冠帶便拘束愧忝郎署迹謬䝉君子録俯仰垂華纓飄風翔輕轂行將親愛别戀此西澗曲逺峯明夕川夏雨生衆緑迅風飄野路迴首不遑宿明晨下烟闕白雲在幽谷韋應物送尚書朝會附寓直事類賓禮大宗伯以丨丨親邦國春見曰朝夏見曰宗秋見曰覲冬見曰遇禮官侯職諸丨朝於天子曰述丨一不朝則貶其爵再不朝則削其地三不朝則六師移之告子登陛臣願一丨文石之丨涉赤墀之塗漢史接武丨丨䕫龍簉跡鴛鷺上官儀傳車服以庸舜五載一巡狩羣后四朝敷奏以言明試以功丨丨丨丨書玉帛畢至禹㑹諸侯於塗山執丨丨者萬國制圭璧繅采典瑞公執桓圭侯執信圭伯執躬丨繅皆三采三就子執穀丨男執蒲璧丨皆二丨再就以朝覲宗遇㑹同於王禮庭燎鸞聲丨丨美宣王也因以箴之夜如何其夜未央君子至止丨丨鏘鏘庭燎以圭入覲韓侯以其介圭入覲于王舉烽而朝褒姒不好笑幽王欲其笑萬方故不笑幽王為烽燧大鼓有冦至則舉烽燧諸侯悉至而無冦褒姒乃大笑幽王欲恱之數弄烽火其後不信幽王至幽王之廢申后去太子申侯怒乃與繒西夷犬戎共攻幽王幽王丨丨火徵兵莫至遂殺幽王驪山下來朝不禮鄭伯如周始朝桓王也王不禮焉周桓公言於王曰我周之東遷晋鄭焉依善鄭以勸來者猶懼不蔇况不禮焉鄭不來矣左隱公來朝争長滕侯薛侯丨丨丨丨同上享醴命宥虢公晋侯朝王王丨丨丨之丨皆賜玉五瑴馬三匹非禮也左莊盛服假寐宣子驟諫公患之使鉏麑賊之晨往寢門闢矣丨丨將朝尚早坐而丨丨麑退歎而言曰不㤀恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死也觸槐而死左宣諸生綿蕞髙帝法為簡易羣臣飲争功醉或妄呼拔劒撃柱叔孫通曰願徵魯丨丨與臣弟子共起朝儀為丨丨野外習之漢史九賓臚句叔孫通既起朝儀與諸生習之月餘㑹十月諸侯朝百官各以次陳列廣行設丨丨丨丨傳同上置酒無譁漢長樂宫成諸侯羣臣朝竟丨丨丨敢讙丨失禮者奉璋肅容晋萬國咸享各以其職獻贄丨丨人丨其丨傳元朝㑹賦升殿迺拜東平王蒼入朝既至丨丨丨丨天子親答之本傳離立偶語王無競改殿中侍御史㑹朝宰相宗楚客楊再思丨丨丨丨無競揚笏曰朝禮尚敬公等大臣不當慢常典同上騶卒訪事梁劉孝標多所陵忽毎朝㑹公卿間無與語反呼丨丨丨丨騶童預政馬周疏伏見王長通白明達本樂工輿皂雜類韋槃提斛斯無他材獨解調馬今超授髙爵與政外廷朝㑹丨丨倡子鳴玉曵履臣竊恥之唐史寓直纈袍覆寢韋綬為翰林學士密政多所參逮帝嘗幸其院韋后從㑹綬方寢學生鄭絪欲馳告之帝不許時大寒以妃蜀丨丨丨而去其待遇如此蓮炬送還令狐綯入翰林為學士夜對禁中燭盡帝以乗輿金丨華丨丨丨院吏望見以為天子來綯至皆驚唐書蠟液濡紙栁公權為翰林書詔學士嘗夜召對於亭燭窮而語未盡宫人以丨丨丨丨繼之唐史宫燭然窻蘇易簡為學士太宗嘗夜幸玉堂易簡已寢遽起無燭具衣冠丨嬪自窻格引丨入照之窻格上有火丨處至今不欲更易為玉堂盛事筆談又蘇易簡嘗醉寢於直廬夜分忽中人宣召遽起以水沃面具簪笏以朝賜坐訪以外事應對如流略無舛誤仍令草王顯樞密使剥麻來晨並不記上亦不覺其醉自以為神助焉續翰林志進制麻草祥符中錢惟演入院是夕召入令草夀春王制惟演進草乞御筆刋削然後寫麻從之是夕一更二㸃進草三㸃降出御筆書依奏方付待詔書寫澠水燕談賜金蓮炬蘇軾遷翰林學士嘗鎖宿禁中中使宣入對宣仁問曰卿前年為何官曰臣前年為汝州團練使今為何官曰臣待罪翰林上歎竒才宣仁曰此先帝之意也先帝毎誦卿文章必曰竒才竒才但未及進用卿即上仙耳軾不覺哭失聲宣仁與哲宗亦泣下已而命坐賜茶撤御前金蓮燭送歸院詩集鴈行夜色尚蒼蒼槐隂夾路長聴鐘出長樂傳鼔到新昌宿雨沙隄潤秋風樺燭香馬驕欺地軟人健得天凉待漏排閶闔停珂擁建章爾隨黄閣老吾次紫微郎並入連稱籍齊趨對折方鬬粧花接蕚綽立丨分丨近職誠為美微官豈合當綸言難下筆諫紙易連箱老去何徼幸時來不料量唯求致身地相誓荅恩光白居易騎省丨丨直明光雞鳴謁建章遥聞侍中佩暗識令公香玉漏催銅史天書問夕郎旌旂映閶闔歌吹滿昭陽官舍梅初紫宫門栁欲黄願將遲日意同與聖恩長王維劔佩衣冠銀燭朝天紫陌長禁城春色曉蒼蒼千條弱栁垂青瑣百囀流鶯遶建章丨丨聲隨玉墀步丨丨身惹御爐香共沐恩波鳳池上朝朝染翰侍君王賈至呈寮友旌旂宫殿五夜漏聲催曉箭九重春色醉仙桃丨丨日暖龍蛇動丨丨風微燕雀髙朝罷香烟擕滿袖詩成珠玉在揮毫欲知世掌絲綸美池上于今有鳳毛杜甫和賈舍人九天閶闔絳幘雞人報曉籌尚衣方進翠雲裘丨丨丨丨開宫殿萬國衣冠拜冕旒日色纔臨仙掌動香烟欲傍衮龍浮朝罷須裁五色詔佩聲歸到鳳池頭王維和賈舍人千官仙仗雞鳴紫陌曙光寒鶯囀皇州春色䦨金闕曉鐘開萬户玉階仙仗擁丨丨花迎劔佩星初落栁拂旌旂露未乾獨有鳳凰池上客陽春一曲和皆難岑參和賈舍人天顔有喜户外昭容紫袖垂雙瞻御座引朝儀香飄合殿春風轉花拂千官淑景移晝漏稀聞髙閣報丨丨丨丨近臣知宫中毎出歸東省㑹送夔龍集鳳池杜甫按唐㑹要天祐二年敇令後每遇延英坐朝日只令小黄門祇候引從宫人不得擅出内乃知杜詩所謂引朝儀者真出殿引坐也竒語仙仗成行長安嵗後見歸鴻紫禁朝天拜舞同曙色漸分雙闕裏漏聲遥在百花中爐烟乍起開丨丨玉佩丨丨引上公共荷發生同雨露不應黄葉乆從風皇甫曽丹墀碧落鐘傳清禁纔應徹漏報仙闈儼已開雙闕薄烟籠菡萏九城初日照蓬萊朝時但向丨丨拜仗下方從丨丨迴聖代逍遥更何事願將巴曲贊康哉楊巨源書殿綸闈吟君昨日早朝詩金御爐前喚仗時烟吐白龍頭宛轉扇開青雉尾參差暫留丨丨多稱屈今入丨丨即可知從此摩霄去非晚鬢邊未有一莖絲白居易和劉學士隨仗報班踈星寥落曉光微殘月蒼龍闕角西玉勒争門丨丨入牙牌當殿丨丨齊羽儀雖接鴛兼鷺野性終存鹿與麛笑殺汝隂常處士十年騎馬聴朝雞歐陽永叔鳴鞭佩玉閶闔初開瑞霧中丹霞曉日上蒼龍丨丨警徹廊千步丨丨聲移㦸五重雪後朝寒猶凜冽栁梢春意已䒠茸少年自結芬菲侣老病惟添詩思濃同上花鬛斑虬丨丨丨丨駕早朝玉欄宫殿壓雲濤九州畫地中原壯萬象横天紫極髙日月輝明留闕角龍蛇蟠結動旌旄羣仙遥望蓬萊拜五色非烟遶赭袍鄭毅夫玉龍金獸陸生聲譽在雲間來預簪裾謁帝顔冠劔有容䕫與契文章全盛馬兼班耽耽丨宇丨纒棟靄靄丨鋪丨齧環却出常朝殿前過㦸衣風動自相攀梅聖俞寓直花隱掖垣丨丨丨丨暮啾啾棲鳥過星臨萬户動月傍九霄多不寢聼金鑰因風想玉珂明朝有封事數問夜如何杜甫奉宿左省栁迷歸院晝刻傳呼淺春旂簇仗齊退朝花底散歸院丨邊丨樓雪融城濕宫雲去殿低避人焚諫草騎馬欲雞棲杜甫晩出左掖金爐香燼丨丨丨丨漏聲殘剪剪輕風陣陣寒春色惱人眠不得月移花影上闌干王介甫夜直玉府仙宫絳河星斗夜闌干禁署沈沈閉九關上帝册書羣丨丨丨人丨殿巨鰲山凉蟾影度秋隂薄促漏聲來夜唱閑擁鼻吟多欲愁絶嚴鐘凄斷樹烏還晏同叔初秋寓直海山鼇背鳳樓鴛瓦蟾波濕衆籟聲沈百蟲蟄仙盤雲表露成霜何人夜半牛衣泣芝泥香熟封詔書河漢西傾移斗車隂風摵摵起庭樹寒澌戛戛鳴宫渠千廬迭唱傳宵柝丨丨丨丨蓬壺頂金缸珠網結綺錢玉井銀牀垂素綆前席受釐詢碩生觀書百斤須中程投籖乍應嚴鼓節求衣誤聴蒼蠅聲渴烏漏盡繁星曙魚鑰建章開萬户初日朣朧艶屋梁鳴鞭一聲下大路御燭宫壺微霰霏霏㸃玉堂詞頭夜半攬衣忙分光丨丨星辰爛拜賜丨丨雨露香醉眼有花書字大老人無睡漏聲長何時却遂桑榆暖社酒寒燈樂未央蘇子瞻東坡直玉堂十一月一日鎖院是日苦寒詔賜宫燭法酒古今合璧事類備要前集四十一
