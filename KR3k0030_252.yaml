body:
  text: 古今合璧事類備要別集卷四十六宋謝維新撰菓門橘格物總論橘數種樹綠高丈許枝多生刺葉兩頭尖綠色光面大寸餘長二寸許三月着花結實至冬黄熟圓苞大者如杯瓤數瓣瓣中着核核大兩倍於黍味甘㣲酸毎一樹數百顆皮可入藥又一種皮厚大又倍南人刀剖而食之名曰砂橘事類星㪚璇樞丨丨為橘春秋運斗樞洲浮橘洲在長沙縣西南四里江中時有大水洲渚皆没此洲獨存寰宇記又昭潭無底橘丨丨湘中記錫命貢淮海惟揚州云云厥包橘柚錫貢注小曰橘大曰柚其所包裹而致者丨丨乃丨言不常書禹貢不常御橘柚之實堯舜丨丨丨崔實政論踰淮北橘丨丨丨為枳地氣使然周禮考功記生江北晏子使楚楚王使縛盜而至曰齊人也善為盜乎晏子曰橘丨丨丨為枳水土異也今在齊不盜入楚則盜豈非水土之使然乎白六帖千户侯等江陵千樹橘其人與丨丨丨丨前食貨志千頭木奴李衡種甘橘千樹號丨丨丨丨言利博也白六帖橘當去剖晏子使楚楚王進橘置削晏子并食不割王曰丨丨丨丨對曰臣聞之賜人主前者𤓰桃不削橘柚不剖今者萬乗無教故不剖臣非不知也晏子春秋橘主貢御橘白華赤實皮馨有美味自漢武帝交趾有丨官長一人秩秩百石丨丨丨橘抢朴子呉王餽魏丨丨丨丨文帝大橘帝詔曰南方有橘酢正裂人牙時有甜耳吴志陸績遺母丨丨年五嵗初九江見袁術術出橘績懷三枚去拜而墮地術謂曰陸郎作賔客而懷橘乎跪荅曰欲歸丨丨術大竒之吴志奉橘三百丨丨丨丨顆霜未降未可多得王右軍帖送橘十二庾亮為平西將軍丨丨丨丨實共一蔕羣臣賀續世説蘇耽所植丨丨將仙告母曰後二年郴人大疫乃植橘鑿井曰受病者但食一橘葉飲水一盞當自愈今郴州蘇仙觀乃其舊宅郴州圖經虞愿不取丨丨始數嵗家中橘樹冬熟諸兒競取之愿獨丨丨家人皆異之南史五官掾貢楊由為成都文學掾少治易曉占候忽有風起太守問由由曰南方有薦木實者色黄赤頃之丨丨丨丨橘數包益部者舊傳二叟象戲巴園人種橘收兩大橘如三斗盎剖之有丨丨相對身長尺餘丨丨一叟曰橘中之樂不減商山但恨不得深根固蔕爾一叟曰僕飢矣顧龍脯食之食訖以水噀地為二白龍而去幽𡨕錄蓬萊宴賜唐太宗丨丨殿九日丨羣臣酒丨湖南新橘蓬萊持翫江陵進乳柑橘上種於丨丨宫結一合歡實上與妃子丨丨曰此果似知人意楊妃外傳厚貲以致劉晏自江淮茗橘珍甘常與本道分貢競欲先至雖封山斷道以禁前發常丨丨丨丨之常冠諸府廣記計直以償栁玭為嶺南節度廨中橘柚熟既食遂丨丨丨丨于官中本傳海岸橘社栁毅見龍君叩丨丨橘樹名曰丨丨異聞録豐城橘船陳允升好道撫州危全諷迎寘郡中嘗夜坐危謂之曰丨丨橘美頗思之允升曰方有一船泊丨丨港今為取之港去城十五里少選即還攜一布囊數百枚江淮異錄江南嵗貢建中詔丨丨橘多丨丨供廟享唐徳宗紀浙東禁鬻薛戎遷丨丨觀察使所部州橘未貢先鬻者死戎弛其禁孔六帖屈原橘賛后皇嘉樹橘徠服兮受命不遷生南國兮深固難徙更壹志兮綠葉素榮紛其可喜兮曽枝剡棘圓果摶兮青黄雜揉文章爛兮精色内白類可任兮紛緼宜修姱而不醜兮德裕橘賦清霜始降聖上命中使賜宰臣等朱橘各三枚葢靈囿之所植也臣伏以渡淮為枳由地氣而不遷吹谷生黍信陽和之有感昔漢武致石榴於異國靈根遐布此西域柔服之應也魏武植朱橘於雀園華實莫就乃吳人未格之兆也考於前史昭晰可知豈知天地同和羣物效祉去蠻夷之陋獲近太陽感王化之威更承膏露草木尚爾況乎人心漢宣帝宫館山澤意有所感必使近臣賦之臣幼學為文忝列樞近敢稽首而獻賦曰美南州之嘉樹受烈氣於炎德固一志於殊方遂不遷於上國貞枝疑碧蔚湘岸之夕陰華實變黄動江潭之秋色雜丹楓於谿畔映綠篠於巖側翡翠以之列巢鵷雛於焉棲息雖同霑於雨露竊自得於雕餙終獲譽於皇明豈因人之羽翼感大鈞之獨運輸造化於𤣥功思六合以同風採孤根而移植播元氣以茂育諒英靈之不測逮乎霜飛天囿風落秦川金莖炫熀於朝日玉樹青葱於霽天峩方壺之翠島列靈沼之清漣上蔚檉松下秀蓀荃赩朱草與屈軼華紫芝與賔連靈卉必植而嘉橘在焉碧葉獨潤金衣更鮮天漢之華星焜燿闤風之珠樹粲然香若團於野露色疑炫於江煙既而大官獻新竒果列筵非厥苞之自逺何非陋之莫傳樹隠方塘比丹萍之初實盤映皎月與赤英而共妍東鄙孤臣謬陳三事既乏和羮之用猶霑可口之味并食不割竊愧晏嬰之知捧之以拜重感桓榮之賜庶不朽於雪霜永酬恩於天地詩集瓊漿萎蕤映庭樹枝葉凌秋芳故條雜新實金翠共含霜攀枝折杪幹甘㫖若丨丨無假存雕飾玉盤余自甘梁簡文帝朱苞丨丨待霜潤沈約陋莫傳橘生湘水側菲丨人丨丨逢君金華宴得在玉几前張華摘猶酸憐君病後思新橘始丨丨丨亦未黄書後欲題三百顆洞庭猶待上林霜韋應物麗中州衝颷發寒隴朔雪度炎洲摧折江南桂離披漢北楸獨有凌霜橘榮丨在丨丨齊虞又少生意伊橘丨丨丨雖多亦奚為惜哉結實小酸澁如棠梨云云杜懷貞質橘柚丨丨丨受命此炎方宻林耀朱綠晚嵗有餘芳殊風限清漢飛雪滯故鄉攀條何所歎北望熊與湘栁宗元帶霜甘寒橘丨丨丨許渾隨日長珠顆形容丨丨丨瓊漿氣味得霜成白居易當家僮橘柚丨丨丨栁比封君此郊千樹橘不見丨丨丨金華宴逢君丨丨丨得在玉階前張華蠟珠圓磊落丨丨丨参池金壺重見垂珠㡬樹開花聞噴雪何人橘實丨丨丨栁子厚委么金橘丨丨丨丸山谷九霞漿媚葉重重密幽花裛裛香苞垂列星緯味變丨丨丨宋景文萬黄金新霜徹曉報秋深染盡青林作纈林惟有橘園風景異碧叢叢裏丨丨丨范石湖宜春果丨丨丨結洛陽枝正遇耆朋會客時更引輕舟停葦岸香秔鮮鱠雅相宜司馬温公洞庭苞十年不摘丨丨霜喜見新丨照眼黄但對典刑休嗜味虎賁猶得作中郎張文潛樂府香霧噀人菊暗荷枯一夜霜新苞綠葉照林光竹籬茅舍出青黄丨丨丨丨驚丰破清泉流齒愜初嘗呉姬三月手猶香浣沙溪坡柚附枸櫞格物藂話櫾大橘也碧樹而冬青實丹而味酢與橘同時而熟枸櫞亦似櫾大而長倍之味竒酢人愛其香氣而謂之香櫞今南劍州産此取以供嵗貢也事類厥包見前橘注有條柚條也爾雅又丨丨有梅柚大橘也赤黄而酢風土記可口柚梨橘柦皆丨於丨也莊子并食不剖晏子事見前橘注既食計直栁玭事見橘注枸櫞似橘如柚枸櫞丨丨丨丨大而倍長味竒酢廣州記如𤓰似橙枸櫞子形丨丨皮丨丨而金色故人重之愛其香氣南土女工競取其肉雕鏤花鳥浸之蜂蜜㸃以臙脂亦不讓於鏤木𤓰冬𤓰也嶺表錄詩集寒垂天丨丨橘柚杜寒榮丨初丨橘柚栁烟寒人丨丨橘柚李白星垂丨丨橘柚村劉禹錫荒庭垂丨丨丨橘柚杜宻林耀見橘懐貞質注茅屋依丨丨丨橘柚杜柑子格物藂話柑者橘之属滋味甘美特異者也有黄者有赬者赬者謂之壺柑即乳柑惟泥山為最地不彌一里所産柑其大徑六七寸皮厚而味珍脉不粘瓣食不留滓一顆核纔一二間有全無者生枝柑鄉人以其耐久留之枝上俟味變甘帶葉而折故名焉今温福州江陵天台處産之事類餉一奩張磐為廬江太守潯陽令嘗丨丨丨柑其小男執取一枚磐奪取付外卒以兩枚與之磐奪兒柑鞭卒曰何故行賂於吾子謝承後漢書大三寸彭城王義康時四方獻饋皆以上品獻義康而以次者供御上嘗啖柑歎其味並劣義康在坐曰今年柑殊有佳者遣人還東府取柑丨丨丨宋書春壞爛王丞相儉帳下柑果盈溢涉丨丨丨世說嵗用足李衡字叔平為丹陽太守毎欲治家妻輒不應後密遣人於武陵龍陽洲上作宅種柑千樹臨死敕兒曰汝毋惡吾治家今窮如是吾州里有千頭木奴不責汝衣食丨止一疋亦丨丨矣及柑成嵗得輸絹數千疋襄陽傳摘柑獻隋文帝好食柑蜀中丨黄丨即以蠟封其蔕丨之本紀傳柑宴唐故事賜近臣黄柑以黄羅包之人各二枚上元夜以黄柑遺近臣謂之丨丨丨坡詩注黄羅包見上紫帕包荆州進黄柑帝以丨丨丨賜蕭嵩唐史細布裹益州嵗進柑皆以紙裹之他時長吏嫌紙不敬代以細布既而恐柑子為布所損毎懷憂懼俄有御史柑布至長吏以為推布丨柑子事懼曰果為所推及子布到驛長吏敘以布裹為敬子布初不之知久而方悟聞者莫不笑唐新語蓬萊柑開元末江陵進乳柑橘上以十枚種於丨丨宫至天寳十載九月結實宣示宰臣曰朕近於宫内種丨子數株今秋已結實一百五十顆乃與江南及蜀道所進不異宰臣賀曰雨露所均混天區而齊被草木有性憑地氣以濳通故得資江外之珍果為禁中之華實太真外傳南樓柑羅浮柑子開元中始有種於丨丨寺其後常資進獻幸蜀幸奉天之嵗皆不結實舊唐史能致之否董元素自江南來上召見留於翰林中宿泊夜召與詔曰聞公頗有神術今南中柑橘正熟郷丨丨丨丨對曰請安一合於御榻前數刻忽有㣲風入簾元素乃啓其合柑子滿其中奏曰此江陵支縣柑也逺處恐遲上嘗之歎驚異聞録乃聽汝去南陽郡東望山有柑正熟三人共食致飽訖懷二枚去以示人聞雲中有語云放雙柑丨丨丨丨述異記洞庭春色安定郡王以黄柑釀酒名曰丨丨丨丨坡集蘇子瞻黄甘傳黄甘陸吉者楚之二高士也黄隠於泥山陸隠於蕭山楚王聞其名遣使召之陸吉先至賜爵左庶長封洞庭君尊寵在羣臣右久之黄甘始來一見拜温尹平陽侯班賜令尹吉起隠士與甘齊名立朝久尊貴用事一旦吉位居上甘心銜之羣臣皆疑之㑹秦遣蘇軫鍾離意使楚楚召燕章臺羣臣皆與甘坐上坐吉咈然謂之曰請與子論事甘曰唯唯吉曰齊楚約西擊秦吾引兵踰闗身犯霜露與枳棘最下者同甘苦率家奴千人戰季洲之上拓地至漢南而歸子功孰與甘曰不如也曰神農氏之有天下也吾剥膚刻肝怡顔下氣以固蔕之術獻上上喜之命記注官陶𢎞景狀其方畧以付國史出為九江守宣上德澤使兒童亦懷之子才孰與甘曰不如也吉曰是二者皆出吾下而位吾上何也甘徐應之曰君何見之晚也毎嵗太守勸駕乗傳入金門上玉堂與虞荔申棖梅福棗嵩之徒時列侍上前使數子者口呿舌縮不復上齒牙間當此之属之於子乎属之於我乎吉黙然良久曰属之於子矣甘曰此吾所以居子之上也於是羣臣皆伏嵗終吉以疾免更封甘子為穰侯吉之子為下邳侯穰侯遂廢不顯下邳以美湯藥官至陳謝治中州太史公曰田文論相呉起説相如囘車廉頗屈姪欲弊衣尹姬悔甘吉亦然傳曰女無好惡入宫見妬士無賢不肖入朝見嫉此之謂也雖美惡之相遼嗜好之不齊亦焉可勝道哉韓彦直真甘錄橘出温郡然多種柑又別種有八曰真曰生枝曰海紅曰洞庭曰朱曰金曰木曰甜橘別種為十四曰黄曰塌曰包曰綿曰沙曰荔曰軟條穿曰油曰綠曰乳曰金曰自然曰早黄曰凍棖属別種為五曰棖曰朱欒曰香欒曰香櫞曰枸橘凡其類合二十有七種而乳柑推第一故温人謂乳柑為真柑謂他種皆若假設者而獨真柑為柑爾然橘亦出蘇州台州西出荆州而南出閩廣數十州皆木橘爾已不敢與温州齒矧敢與真柑爭高下耶且温數邑俱種柑而出泥山者又傑然推第一泥山葢平陽一孤嶼大都塊土不過覆釡其旁地延衺只二三里許無連岡陰壑非有佳處風氣之所淫漬欝蒸出三二里外其香味輒益逺益不逮夫物理何可考耶或曰温並海地斥鹵宜橘與柑而泥山特斥鹵佳處物生其中故獨與他異予頗不然其説夫姑蘇丹丘與七閩兩廣之地往往多並海斥鹵何獨温而又豈無三二里得斥鹵佳處如泥山者自屈原司馬遷李衡潘岳王羲之謝惠連韋應物軰皆嘗言呉楚間出者而未嘗及温温最晩出晚出而羣橘盡廢物之變化出没其浩然不可攷如此以予意之温之學者繇晉唐間未聞有傑然出與天下敵者至國朝始盛至於今日尤號為文物極盛處豈以天地光華秀傑不没之氣來鍾此土其餘英遺液猶被草木而泥山偶獨得其至美者耶予北人平生恨不得見橘着花然嘗從橘舟市橘亦未見佳者又安得所謂泥山者㗖之去年秋把麾此來得一親見花而再食其實以為幸獨故事太守不得出城從逺遊無因領客入泥山香林中泛酒其下而客乃有遺予泥山橘者且曰橘之美當不減荔子荔子今有譜得與牡丹芍藥花譜並行而獨未有譜橘者子愛橘甚橘若有待於子不可辭予因為之譜且妄欲自附於歐陽公蔡公之後亦以表見温之學者足以夸天下而不在夫橘而已詩集登爼丨丨黄柑重杜礙衣岑寂雙柑樹婆娑一院香交柯低几杖垂實丨丨裳滿嵗如松碧同時待橘黄㡬囘霑月露乗月上胡床露溥白丨丨甘子霜落破柑丨丨爪三寸金園柑長茂時丨丨如黄丨諸侯舊上計厥貢傾千林二頃田春日清江岸千柑丨丨丨青雲著葉密白雪避花繁結子隨邊使開筒近至尊後於桃李熟終得獻金門三百株手種黄柑丨丨丨春來新葉徧城隅方同楚客憐皇樹不學荆州利木奴㡬嵗開花聞噴雪何人橘實見垂珠若教坐待成林後滋味還堪養老夫並前人歸遺細君丨來一㸃殘燈在猶有傳柑丨丨丨坡元夕寄與維摩侍史傳柑玊帝旁人間草木盡天香丨丨丨丨三十丈不知簷蔔是餘芳金盤玉指一雙羅帕未分珍林下先嘗愧逐臣露葉霜枝剪寒碧丨丨丨丨破芳辛清泉䔩䔩先流齒香霧霏霏欲噀人坐客慇懃為收子千奴一掬為吾貧並坡玉蘂金衣風揺丨丨霏㣲落霜後丨丨委墜繁蘓子羙樂府十顆金苞江陵種橘尚比封侯何況江濤轉千里帶天香令洞乳宜入春盤紅荔子馳驛風流僅比認齒疎潘令老怯咀氷霜丨丨丨丨謾分遺觴前須細别有餘甘從此去枉却㦳桃種李想相如酒渴對文君逈不是人間等閑風味洞仙歌晁補之古今合璧事類備要別集卷四十六
