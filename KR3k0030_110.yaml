body:
  text: 古今合璧事類備要後集卷四十一宋謝維新撰三學門武學歷代沿革唐開元間始置太公師父廟以留侯張良配中春中秋上戊祭之牲樂如文宣仍以古名將十人為十哲配享正元元年尊太公為武成王以白起韓信諸葛亮李靖李績列於左張良田穰苴孫武吳起樂毅列于右以良為配建中初詔考定可配享者列古今名將六十四人圖形焉並唐書于國朝大中祥符元年詔尚父宜加諡詔烈武成王慶厯三年詔置武學于武成王廟以阮逸為教授八月罷武學以議者言古名將如諸葛亮羊祜杜預等豈專學孫吳故也熙寧五年樞密院言古者出師受成於學文武弛張其道一也祖宗嘗建武學橫議中輟識者悼之欲乞復置武學以追成先朝之志詔于武成王廟置學紹興十六年詔修建武學事類去白起建隆二年先是上臨幸武成王廟觀所畫白起曰起殺已降不武乃命去之升管仲四年詔曰武成王廟從祀神像齊桓管仲宜塑像升于堂西河太守吳起宜畫像降于廡下孔子豈太公抗孔子所以祀於學者禮有先聖先師故也自生民以來未有孔子也丨丨丨得與之抗衡哉溫公通鑑論唐周存太學射堂賦皇家之闡化也稽古議酌前修兹宇既起兹道惟休職備乎司射事集乎司裘采蘋采蘩乃施有慶以熊以豹實命不猶是用外直諸體內正乎志豈徒稱善者五舉正者四誠有國之常規而擇賢之盛事曩者天下無虞羯胡生變司馬無祭侯之事梓人罷棲鵠之職方今寰海謐如以無事射堂􅀈然而獨存綵侯不張而逺國家屬貢士不習而順德必敦是知崇樂非鍾鼓之器立德為正鵠之體也武學博士歷代沿革國朝慶厯三年制學始以阮逸為之本朝官制未幾省熙寧五年樞密院乞復置武學選文武官知兵者充教授仍差韓縝判武學郭固同判朝臣以上判學續會要武學教授如國子置直講元豐官制行改為武學博士教授蔡碩就除博士武學博士學諭各二人掌以兵書弓馬武藝訓誘學者四朝志建炎兵興廢紹興十六年詔令臨安府修建武學二十六年詔武學博士學諭各置一員內博士於文臣有出身或武舉出身曽預髙選人充其學諭差武舉人中興職略事類知兵注見沿革掌武同工注師屬爾為丨丨毋専韜略鄭補之擬制典教丨丨右學曲阜行何去非武博士制武諭歷代沿革詳見前武博類事類訓誘見前武博沿革下諭導丨丨之職鄭補之擬制宗學歷代沿革漢平帝詔朕惟宗室皆髙帝子孫令置宗師以糾之致教訓焉明章二帝友愛子弟雖各有自幼者率留京師訓導以禮餐和染教皆為良善唐髙祖詔宗室子孫就祕書外省别為小學唐儒林傳序而本朝胄監之外復立宗學始創於神宗至崇觀而大備中更禍亂宗學遂廢南渡草創為屋數楹暫寓臨安之睦親宅更化之後以羅仲舒范楷奏請有旨遷睦親宅於他所而盡招故基以為學焉案宗學謝表及題名事類招崇睦宗庠載闢用廣舊規所以丨丨丨廣教育也惟麟趾化行瓜瓞綿茂雖資稟之攸稟必陶治而後成俾繇選補著之于籍月書季考一視賢關文行相符矩矱是蹈庶廣收得人之效強我皇室尚其懋哉寧皇御書綾紙贊扶綱常淳熙甲辰之冬皇上奮發英斷更新大化又明年以麟趾之胄苦墮肝膽力丨丨丨於是赫奕奎文誕鍚黌字賜之束帛試之春官優之升擢登科題名記槩視太學南渡更化乃增補貟定試額凡升黜進退之制丨丨丨丨宗學題名記重廣學舍嘉定間命宗學置四齋曰責仁大雅明賢立愛辛巳丨丨丨丨添兩齋曰懷德曰升俊宗學博士歷代沿革宋朝宗學博士舊諸王宫大小學教授也至道元年太宗將為皇姪等置師傅執政謂環衛之官非親王比當有降乃以教授為名咸平初遂命諸王府官分兼南北宅教授南宫者太祖大宗諸王之子孫處之所謂睦親宅也崇寧五年又改稱某王宫宗子博士位國子博士之上靖康之亂宗學遂廢紹興四年始復置諸王公大小學教授二員隆興省其一嘉定九年十二月始復置宗學改教授為博士又置宗學諭一員並𨽻宗正寺博士在太常博士之下諭在國子正之上俸給賞典依國子博士及王體例於是宗室疏逺者皆得就學而彬彬可觀矣旋有旨復存諸王宫大小學教授一員事類善屬文唐庚字子西丨丨丨為宗子博士張商英薦其才除提舉京畿常平東都事略得就學見沿革注總要涖凡皇上寧宗更化之十載聚四方之宗英而后琢之顓𨽻宗寺以卿丨其丨而置博士及諭丨其丨越二年羅仲舒范楷為是職惠篤有敘程督有經立愛愈周為法亦密矣出題名記加惠釋師先皇丨丨天友丨丨而教之凡居是職者皆天下選也是編之設正欲使開卷者肅容敬想其間有出而為名宰相賢侍從乃為當今之正人端士者德行可尊議論可法凛如嚴師之立乎其前而吾方順下風以稱子弟固不必皆與之同時也吳雨巖跋以文學知名王安中字履道自號初寮先生政和中監大名倉丨丨丨丨丨除宗學博士宗諭歷代沿革詳見宗博類事類掌國子之倅庶子之正於公族者教之以孝弟睦友子愛明父子之義長幼之序注庶子司馬之屬丨丨丨丨丨為政於公族者記文王世子在國正之上見前宗博沿革注古今合璧事類備要後集卷四十一
