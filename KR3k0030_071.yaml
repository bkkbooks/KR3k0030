所立衆失色次公曰太子雖久疾冢嫡也丨丨丨丨乆矣必不得已宜立廣陵王絪随贊之議乃定赦為有名宣宗餌長年藥病渴且中躁而國嗣未立帝對宰相欲肆赦患其無端崔謹由曰太子天下本若立之丨丨丨丨帝惡之不答數請求立憲宗暴風眩中外不聞問者三日裴度丨丨到内殿丨丨太子帝遂立景王為嗣此先帝意穆宗立以吏部侍郎吕崔羣勞曰我為太子卿力也羣曰丨丨丨丨臣何力為且陛下向為淮西節度使臣起制草其言有能辨南陽之牘允符東海之貴先帝然之則傳付久矣卿違朕志德宗數稱舒王賢李泌揣帝有廢立意因曰陛下有一子而疑之乃欲立弟之子臣不敢以古事爭且十宅諸叔陛下奉之若何帝赫然曰卿何知舒王非朕子對曰陛下昔為臣言之陛下有嫡子以為疑弟之子敢自信於陛下乎帝曰丨丨丨丨不顧家屬也邪對曰臣衰老位宰相使太子廢日陛下悔曰泌不吾諫吾亦殺爾子則臣絶祀矣睿孝天資太子𢎞引丨丨丨鬢髮班秃肅宗在東宫李林甫隂造不測太子内憂丨丨丨丨以傳二弟太祖昭憲太后聰明有智度嘗與太祖曰汝萬嵗之後當丨次丨之丨丨則并汝之子亦復安矣太祖頓首泣曰敢不如母教因召趙普於榻前為誓約紙尾云臣普書以備儲位仁宗嘉祐三年奉太常博士吳及上疏陛下以海宇之廣宗廟之重而根本未立四方無所係心上下之憂無大於此宜發聖斷擢宗室丨丨丨丨以慰羣情仁宗嘉祐二年八月翰林學士歐陽修以充國公主出降因言臣愚以為宜因此時出言聖意於宗室之中選材賢可喜者録以為皇子其出入左右問安視膳亦足丨丨悦丨丨以安衆心英宗治平三年上疾増劇韓琦奏陛下久不視朝中外憂懼宜早立皇太子丨丨丨丨上頷之琦請上親筆指揮上乃書曰立大王為皇太子琦曰必頴王也煩聖躬更親書之上乃批於後曰頴王頊琦即召曰侍髙居簡授以御批命翰林學士草制承㫖張方平至榻前禀命上書來日降制立某為皇太子長編副天下望參政冦凖自青州召還入見太宗曰朕諸子孰可以付神器者凖曰惟陛下擇所以丨丨丨之丨者上屏左右曰元侃可乎遂以元侃為開封尹改封夀王於是立為皇太子京師之人見太子喜躍曰真社稷之主也惠和天賦真宗天禧元年制曰皇子昇王丨丨丨丨昭敏夙成發自妙年蔚為令器可立為皇太子孝友温恭太宗至道元年制皇第三子夀王符彩昭融智謀宏逺聰明文武本於天賦之才丨丨丨丨發自生知之性自分封大國出尹京師居惟乘謙動必由禮約已靡登於馳道事親無懈於寢門是宜承祧廟之尊為邦家之本踐于守器允叶重離英粹中和英宗治平三年制皇子丨丨日躋丨丨自至仁義充涵之美言動惟時禮樂交錯之華威儀可象抑畏疏封之重敏修典學之勤亦既多聞足當大受是宜誕膺徽命肇啟儲闈懋升明兩之輝益廣在三之道表請監國真宗天禧四年上不豫乃屬翰林學士楊億草丨丨太子丨丨億畏事泄乃屏左右為之辭當出聖擇仁宗朝宰相韓琦等奏事垂拱殿讀司馬光吕誨二章上遽曰朕有此意多時矣但未得人目左右曰宗室中誰可者琦曰此事非臣下可言丨丨自丨丨上曰宫中養子二人明日奏事又啟之上曰决無疑也時宗實猶居父喪乃議起復泰州防禦使知宗正寺至和末上得疾文彦博等勸上早立嗣上既許之既而范鎮司馬光言尤激切包拯為御史中丞又力言之上卒未許如此五六年言者頗怠一日因取孔光傳懐之以進曰漢成帝即位二十五年無嗣立弟之子定陶王為太子成帝中才之主猶能之願陛下以太祖之心為心光又面奏曰唐自文宗以後立嗣皆出於左右之意至有定䇿國老門生天子者此禍可勝言哉至中書見琦等曰諸公不及議異日禁中出寸紙以某人為嗣則天下莫敢違范鎮乞立皇嗣積十九疏居家待罪百餘日鬚髪為白温文睿智神宗元豐八年上疾甚王珪言願早建東宫凡三奏降制曰皇子延安郡王庸丨丨日就丨丨夙成可立為皇太子寛仁端慤孝宗乾道七年詔曰皇子丨丨而肅振丨丨而嚴明可立為皇太子選伯字下髙宗建炎元年上謂宰執曰昨令西外宗正選藝祖之後四五人范宗尹曰此陛下萬世之慮朕丨於丨丨行丨庻昭穆順序富直柔曰陛下聖斷度越千古出於獨斷孝宗乾道八年梁克家奏近有兩事皆前世不能及太上禪位陛下建儲丨丨丨丨了無纎芥遲疑上曰此誠漢唐所無人心所係嘉祐中御史趙抃上疏曰伏覩陛下聖體違豫中外人心莫不揺動賴宗廟社稷之霛天地神明之佑宸躬浸康然猶上有謫見之天迨無虛月陛下皇嗣未立丨丨未有丨丨垂厥祥異欲陛下深思逺慮亟有所為而就也治跡統類天變以塞嘉祐元年京師自五月大雨不止冐城郭壊廬舎諸路亦奏水災詔羣臣言闕失知諫院范鎮言丨丨之發本於儲貳之位虚乞以臣前一章降付執政大臣速為裁定丨丨天變教育宫闈嘉祐中趙抃上疏陛下斷宸衷發誠意擇用宗室賢善子弟或丨丨丨丨或封建藩服治跡統類處以儲闈寧宗開禧三年詔朕主鬯尚虛非所以重大器正大本也皇子曮天姿英粹學問日充望足繫於人心言有禆於治道蔽自朕志丨丨丨丨其立為皇太子改名璹為萬世計嘉祐七年皇子以肩輿入内初皇子稱疾固辭孟陽入見曰主上察知太尉之賢時英宗居父制起復前左衛大將軍岳州圍練使參以大人之助乃發德音太尉獨稱疾堅卧其安在皇子曰非敢邀福以避禍也孟陽曰太尉事兩宫以父母中外所聞主上丨丨丨丨而立為子矣今固辭不拜假如得請而歸藩豈得宴安無患乎皇子撫榻而起曰吾慮亦及此遂與宗諤等同入内良賤不滿三十口行李蕭然無異寒士有書數㕑而已中外聞之相賀對程嬰存趙唐武后常問李嗣真儲貳事丨曰丨丨杵臼丨丨氏孤古人嘉之后悟中宗乃安陳申生戾園裴稹開元末夀王瑁以母寵欲立為太子稹丨丨丨丨丨禍以諫元宗改容謝之選聰明剛正嘉祐中司馬光上疏請建儲后伏望陛下深念祖宗艱難之業斷自聖志昭然勿疑遴丨宗室之中丨丨丨丨孝友仁慈有賢材可喜者使攝居儲貳之地以俟皇嗣之生退居藩服儻未欲然且使之輔政或典宿衛或尹京邑亦足以慰鎮安天下之心治跡統類繼宗廟社稷至和元年上春秋髙未有丨嗣皇祐末太常博士張述上書曰夫生民之命繫於丨丨丨丨之重而以繼嗣為本匹夫匹婦有百金之産猶能定謀托後事出於素况於有天下者哉桞宗元賀册皇太子表行禮之日則屏翳収蹟太陽宣精用彰出震之休更表重離之曜劉禹錫賀册皇太子表前星位定拱宸極以昭彰蒼震氣宣與天地而長久又牋四岳仰揺山之髙百川承少海之潤又蒼震發前星之輝黄離表重輪之瑞唐太學觀春宫齒胄賦我聖人酌古訓建皇極太學備崇儒之禮春官熟齒胄之則儲賀戻止虞庠肅清傾章甫之列駐和鸞之聲讓其齒也長幼之節著明其親也父子之道成深三善兮皆得實萬邦兮以貞則知大學之義國風之始在明德在貴齒敬師臣延胄子尊賢所以抗法講議所謂惇史梁洽海重潤賦况我儲君光膺在震乾乾夕惕兢兢日慎德澤潤於生靈滄海得無重潤惟海之量百泉朝宗猶君之美萬國風順既同類以相求故重潤而必應日光分色山輝廣映然則我君之明兩也毓景前星休徵夢月主鬯之功昭著牽衣之智逸發四皓既親三朝不闕故曰惟其有之是以似之詩集副德皇基屬明兩丨丨表重輪戴嵩月重輪詩少陽乾象開層構離明啟丨丨十征從獻吉守器屬元良韓王元嘉奉和同太子監守違戀詩前星彩太子天下本元良萬國貞丨丨㴠瑞丨洊雷揚逺聲三善傳樂正百行紀司成九流遍已辨七經咸所精延賢博望苑視膳長安城園綺随金輅浮邱侍玉笙智囊前歛笏端上後垂纓劉孝感奉和簡文帝太子應令詩長男氣雷舒丨丨丨枝揺少女風明離信養德能事畢春宫同上皇太子春社晚雨詩古今合璧事類備要後集卷二
