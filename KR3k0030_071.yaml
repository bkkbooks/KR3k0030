body:
  text: 古今合璧事類備要後集卷二宋謝維新撰君道門登極古今源流自書序帝舜將使嗣位之文而後人君有登極之名自易載乾龍乘時御天之説而後人主有登極之位自春秋書元書王書正書即位之事而後人主有登極之實蓋三代而上三聖之授禪夏殷周之相繼凡其神器之相傳厯數之有歸隱然有所謂登極者存也爰自秦人用李斯造皇帝之符璽降及後代凡更一代而得是傅國璽者則謂之登極更一君而羣臣奉上璽綬者則謂之登極蓋自漢魏而下以及于五代凡不繇正統而受命則不得謂之登極不繇禪代而正位則不得謂之登極我朝受周之禪不得已而為應天順人之舉與唐虞何異漢唐而下不足論也已事類陟位三載汝丨帝丨書總師汝惟不怠丨朕丨同上大寶聖人之丨丨曰位何以守位曰仁易注有位而洪道者莫大乎位正位鼎君子以丨丨凝命又渙王居无咎象曰丨丨也易又惟王建國辨方丨丨周禮神主咸有一德俾作丨丨書又昔有熊髙陽髙辛唐虞三代咸有顯德故天祚之為丨丨揚重黎天德飛龍在天乃位乎丨丨易革命湯武丨丨應乎天而順乎人同上體元凡人君即位欲其丨丨而居正左隠元年正始陛下初登至尊與天命符宜丨丨受命之統前路温舒傳正統共惟春秋法五始之要在乎審已丨丨而已王褒頌龍飛丨丨白水鳯翔參墟選張平子東都賦馬渡晉童謡云五丨丨江一馬化龍是嵗五王獲濟而帝竟登大位焉元帝紀瑞符天降嘉丨地出吉丨後荀彧傳玉册晉永嘉初有丨丨見於長安白玉麒麟神璽出於江陵其文曰長夀萬年元帝紀萬物覩聖人作而丨丨丨易在德元其惟王位丨丨丨書履至尊丨丨丨而制六合賈誼過秦論居得致陛下貴為天子富有四海丨丨丨之位操可致之權有能致之資董仲舒䇿承天心明王即位正五事建大中丨丨丨前谷永傳乗時龍初道士西門君惠李守等云劉秀當為天子王者受命信有符乎不然何以能丨丨丨而御天哉光武紀膺天統髙光二聖丨當丨之正丨受克遜之歸運選班固典引據神靈丨丨丨之正位西都賦歸神器元經天下之舊也其以無定國而帝位不明乎證天命以正帝位以明丨丨有丨文中子魏相篇恢聖緒昔我光武受命中興丨洪丨丨安帝紀正乾剛明主嚴天元之尊丨丨丨之位後陳忠傳居正陽王者丨丨丨之位王褒傳自有真帝王之興丨丨丨光武賛不世出至治之君丨丨丨太宗賛定天位太寶以丨丨丨張説握乾符頌有符命董景珍曰吾聞帝王之興必丨丨丨唐華詵傳統宸極丨臨丨丨唐蘇安常傳邁時康巨唐開洪業巍巍皇猷昌深仁諧日月撫運丨丨丨唐新羅傳真德織錦頌大德得位有丨丨者必丨其丨記以德處位飛龍在天利見大人易注位以德興德以位叙丨至丨而丨盛丨萬物之覩不亦宜乎厯數在躬堯曰天之丨丨丨爾丨語聰明嗣位虞舜側㣲堯聞之丨丨將使丨丨書尊為天子黄帝殺蚩尤而諸候丨丨丨丨史記順承天厯夏后氏定大位立大政勤勞萬邦和寧四極丨丨丨丨自南河而受四海大位定馬萬國既同宣省風教自塗山而㑹諸候大政立焉位莫隆於執大象乃輯五瑞以建王極政莫先乎齊大統立朝玉帛以混經制是所以承唐虞之後垂子孫之丕基立商周之前建帝王之洪範也栁塗山銘朝覲謳歌丨丨者不之堯之子而之舜丨丨者不謳歌堯之子而謳歌舜孟勇智天錫天乃錫王丨丨丨丨萬邦纉禹舊服書踐天子位丨丨丨丨焉孟佑民作君天丨下丨丨之丨作之師書天地交泰易泰卦丨丨丨丨又栁踐祚表天地泰而聖人出雷雨作解易解卦丨丨丨丨君子以赦過宥罪又雷雨解而品物榮王者受命丨丨丨丨為民父母漢禹貢傳正德受命仲尼叙書於堯曰克明峻德舜曰峻德文明禹曰文命祗承於帝湯曰克寛克仁武王曰有道曽孫稽揆典誓丨哉惟兹丨實丨丨之符栁正符論握符闡珍聖皇丨乾丨丨坤丨披皇圖稽帝文選東都賦系統接緒丨唐丨丨漢丨膺籙受圖丨丨丨丨並同上施德居位五年諸侯曰大王功盛德厚而位足比擬又曰大王德施四海居帝位實宜願大王以幸天子二月甲子即皇帝位于汜水之隅髙祖紀法五始要共惟春秋丨丨丨之丨注即位者一國之始王褒頌垂萬世基周勃迎大王黜少帝丨丨丨之丨霍光尊孝宣廢昌邑欲垂業於萬世後馮異傳又基業垂於萬世後陳蕃傳膺萬國珍受四海之圖籍丨丨丨之貢丨東都賦接千嵗統今天子丨丨丨之丨司馬相如傳應期紹運劉琨上書曰陛下丨命之丨丨千載之丨符瑞之表晉元帝紀蒼生欣戴晉劉琨等勸進曰丨丨顒然莫不丨丨聲教所至願為臣妾同上受命立極髙祖太宗丨丨丨丨文粹玉牒應天順人元宗幸蜀聞太子即位喜曰吾兒丨丨丨丨髙力士傳膺期啟聖陛下握紀御符丨丨丨丨李伯藥封建論撫運應期髙祖丨丨丨丨創業垂統唐舊禮志長江畫守中宗龍飛非惟信順協乎天人實賴丨丨萬里丨而丨之耳孫綽傳負扆踐祚丨丨而㑹朝夷夏丨丨而統和天人桞為京兆賀即位表龍飛虎變位以丨丨文以丨丨選集吉甫進晉武帝華林詩赤麟黄龍皇帝即位物無違拒云云丨丨丨丨逶陀結糾卿士庻人黄童白叟踴躍吹呀失喜噎謳乾清坤夷夷境落褰舉韓元和聖德詩共推天命五運推移上帝於焉睠命三靈改丨王者所以膺圖朕起自側㣲備嘗艱險當周邦草昧從二帝以徂征洎虞舜陟方翊嗣君而纂位但罄一心而事上敢期百姓之與能旗鼓纔出於國門將校丨丨於丨丨迫回京闕欣戴眇躬勉徇羣心已登大寶昔湯武革命發大號以順人漢唐開基因始封而建國立國號大宋改周顯德七年為建隆元年太祖即位制以嗣神器王者繼統承祧所丨丨丨丨猥以神器付予冲人遵治命而莫獲固辭渉大川而罔知攸濟太宗即位制成規謹守創業垂統于以貽後昆嗣位承祧于以紹前烈洪惟永圖屬在明辟夫何凉德享是丕休恭念先朝庻政盡有丨丨丨丨奉行不敢失墜所宜開諫諍之路㧞茂異之材鰥寡無告之民悉令安泰動植有生之類冀獲昭蘇真宗即位制傅歸善繼稽三代丨丨之典實自王丨丨之規先皇帝紹二聖之丕圖膺三靈之眷命誕掦清靜聿致和平恭念夙恃聖顔備承寳訓仁宗即位制神器傅歸烝民之生置君為之司牧丨丨之重有子所以丨丨英宗即位制鴻圖之守先皇帝紹履至尊欽篤先烈圖治百王之上垂精五載之間恭念先朝之摹具循四聖之業雖寡德之未類敢舊章之或隳尚顗宗社隤靈忠賢合慮以固丨丨丨丨以安寶命之承神宗即位制祗率舊章先皇帝道極聖神德兼文武緝熙事功堇正法度恭念先朝之治必循五聖之謀思丨丨於丨丨用答揚於先訓哲宗即位制率循大卞朕承先帝之末命嗣累聖之丕圖恭念元豐詒謀紹聖遺訓具在天下可舉而行其丨丨於丨丨用奉若於先王徽宗即位制兹為天意靖康二年三月甲戌元祐太后降手詔迎康王詔曰漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在丨丨丨丨夫豈人謀正月庚寅即皇帝位斷自朕意紹興三十二年六月丙子髙宗内禪皇太子即皇帝位太上皇帝居德夀宫大上曰此事丨丨丨丨非由臣下開陳詔降寛恤隆興元年三月皇帝登寶位降丨申飭畧曰朕初即位首行曠澤續丨丨丨十八事而州縣不為布宣蓋由奸贓之吏尚多部使者坐視䝉蔽而弗聞故吾民重困繼自今各洗心滌慮恭爾有官俾予一人實惠孚於百姓若乃狃於舊習奉行弗䖍心罰無赦樂聞直言紹興三十二年皇帝即位詔朕躬有過失朝政有闕遺斯民有休息四海有利病皆所丨丨言有可行賞將汝勸弗協于理罪不汝加中外士庻咸許丨丨一日重暈太祖北征是日薄晚宿陳橋驛其中有知星者苖訓𢎞楚昭輔衣袂視日色指之見日下復有丨丨丨丨訓合手曰此天命也太祖受命録五緯聚奎天禧四年謝絳言神農以火德聖祖以土德國家宜黜五代紹唐土德以繼聖祖臣聞太祖生而包絡黄及受命丨丨丨丨而鎮星是主陛下升于泰山日抱黄珥朝祀有星曰含譽色黄而澤非土德之瑞乎長編為民去殘害曽鞏言丨丨丨丨丨致更生兵不再試而閩蜀吳楚四國之君生到闕下造邦受命之勤為帝太祖之功未有髙焉者也故人主人尊意諭色授而六服震動言傳號渙而萬里奔走嵗星色甚明劉原父嘗齋太一官與王堯臣夜語曰丨丨徃來虛危間丨丨丨盛以吾觀之當有興於齊者嵗餘英宗以齊州防禦使入繼大統遂登大位張于湖賀登極表星暉海潤方肇啟於青宫地闢天開遂丕膺於赤紀有赫聖人之大業於昭天下之至公臣聞父傅於子振古為然天作之君於今未有載纂開基之緒惟新受命之符云云仰太上復艱難之業付吾君於談笑之間十一世而益光邁建武中興之事八百年其増卜侈成周過厯之期建儲古今源流五帝官天下所謂天與賢則與賢三王家天下所謂天與子則與子夏殷以前故無嫡庻之爭爰自周有天下如幽王黜太子申而立太子宜臼於是秦漢以來自殺嫡立庻之嫌面後建儲之名立焉其後滔天於芥卓盜國于曹馬移徙神器易于奕棊甚至如唐一代皆簸弄權柄於宦者之手其益可嘆也惟我國朝懲秦漢以來之弊或以父子而行内禪之儀或取諸藩服以入繼大統而儲議一定遂無動揺之弊此我朝所以上嫓帝王下陋漢唐而為古今之冠冕者也事類震主出可以守宗廟社稷以為祭主也易震卦離明明兩作丨大人以繼丨照四方離卦長子主器者莫若丨丨易序卦元子有王雖小丨丨哉書又顧命敬保丨丨釗元良一人丨丨萬邦以正同上又記世子之謂也儲君公羊僖公五年公及齊侯㑹注文當世父位丨丨嗣主不可以諸侯㑹之又記郊特牲天子之元子士也齒學行一物而三善皆得者唯太子而已其丨丨之謂也故太子丨丨國人觀之曰將君我而與我齒讓何也曰有父在有兄在有君在則禮然此三善也記侍膳太子奉冢祀社稷之粢盛以朝夕丨君丨者也傳國棟太子丨之丨也國晉語前星一星天子正位中堂曰明堂丨丨為太子後星為庻子晉天文志嗣適里克曰君之丨丨不可以帥師左世子文王之為丨丨記監國里克曰從曰撫君守曰丨丨古之制也左傳立貴立嫡以長不以賢丨子以丨不以長公羊傳鶴禁漢宫闕疏曰鶴官太子所居凡人不得輙入故曰丨丨龍樓上嘗急召太子出丨丨門不敢絶馳道成帝本紀鶴駕周靈王太子晉七月七日乗白鶴駐山巔謝時人而去後世稱太子之駕曰丨丨劉向列仙傳羽翼漢髙祖欲以趙王如意易太子張良謂吕后曰上所未嘗致者四人今太子請以為客及宴太子侍四人者從太子鬚鬂皎白上驚曰吾求公逃避我今何從吾兒游乎煩公幸卒調䕶太子上召戚夫人指示曰我欲易之彼四人為輔丨丨既成難動揺矣仁柔漢元帝八嵗為太子壯大丨丨好儒見宣帝以刑名繩下帝曰亂我家者太子也由是疏太子寛容東漢章帝立為皇太子丨丨好儒術顯宗器重之慈仁成帝詔定陶王欣於朕為子丨丨孝順立為皇子歌德漢明帝為太子樂人作丨四章以賛太子之丨儲貳國之丨丨四海屬心魏直允傳儲宫正位丨丨晉書少陽正丨丨之位主承祧之則梁簡文帝立昭明太子表少陽天子比大海太子為丨丨承乾明兩丨丨明良作貳宋謝莊太子謝表承華博望之苑丨丨之門白帖承祧元良之寄有國莫先自昔哲后莫不立儲植嫡守器丨丨南史梁武帝立昭明太子詔毓德正體丨丨於少陽選曲水詩序又白帖繼正體以為大本丨明丨而居少陽功髙唐太宗丨丨髙祖屢許之為太子太子建成懼廢與齊王元吉謀害太宗未發九年太宗以兵入武元門殺太子建成元吉髙祖懼