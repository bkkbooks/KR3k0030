body:
  text: 古今合璧事類備要外集卷三十九宋謝維新撰寢衣門被身章撮要被寢衣大被曰衾單被曰裯世之人或以錦繡或以布素或以褚皮為之豐嗇在人無所取之取其暖且適也事類寢長有半必有丨衣丨一身一丨語十褻不見裏丨衣衾丨丨丨謂其穢禮記尚書綾被漢丨丨郎入直供青綾白丨丨或錦被漢官典職三公布被公孫𢎞為丨丨卧丨丨飾詐以釣名本傳賜及繡被李忠從世祖攻下屬縣無所掠世祖會諸將問曰我欲特丨李忠諸卿得無望乎即以所乘大驪馬丨丨丨家物賜之本傳賜以錦被朱寵為大尉家貧卧布被朝廷乃丨丨丨丨去職布被張湛為漁陽太守丨丨丨丨囊而已在任布被王良為司徒椽丨丨恭儉瓦器丨丨妻子不入官舍與弟共寢薑肱丨丨仲海李江並以孝友著聞每丨被而丨招賢共卧江夏孟宗少遊學其毋作十二幅被以丨丨士丨丨庶聞君子之言錦被賜光賜霍光丨丨百領錦被覆豹馮豹為郎奏事未報俯伏省闥從昏至明肅宗使期門郎丨丨丨丨令勿驚無被編麻王章為諸生與妻居病丨丨卧牛衣中丨亂丨為衾俗呼之為龍且敗裪糊紙羊續為南陽太守以清率下唯卧布丨丨則丨丨錦被蒙上陳元方遭父喪哀慟骨立其母竊以丨丨丨其上郭林宗弔之曰卿海內雋才如何當喪丨丨丨丨孔子曰衣夫錦食夫稻於汝安乎奮衣而去世説幞被徑出晉魏舒為尚書郎或有非其人論者欲沙汰之舒乃曰吾即其人也丨丨丨丨詔給帷被藥松嘗直南宫家貧無被枕祉爼几帝聞而嘉之丨太官賜尚書郎以下朝夕食并丨丨丨何惜一被晉光逸為小史縣令更送客冒寒雨遇令不在解衣入令被曰丨丨丨丨􅀈一人王紹畫腹丨丨素工草𨽻嘗與人書曰聞虞被中丨丨與余正同虞即世南王勃覆面丨丨屬文則酣飲引被丨丨卧冰蠶絲織元和八年大軫國貢神錦被丨丨丨所丨也方二丈厚一寸其文龍文鳳彩殆非人工靈粟珠珞同昌公主堂中設神絲繡被間以奇花異葉其精巧華麗絶比其上絡以丨丨之丨如粟粒五色輝映宛然塵積鄭愚津陽門詩象牀塵埃罨靸被注上在華清日罨靸公主嘗與上晨聽按新水調愛王起晚遽自真珠被而出及冦至倉皇隨駕出宫後不之省及上歸南宫一旦入此中而當時罨畫之被丨丨丨丨並孔六帖范堯夫布衾銘藜藿之甘綈布之溫名教之樂德義之尊求之孔易享之常安錦繡之奢膏梁之珍權寵之盛利欲之繁若難其得危辱旋臻舍難取易去危就安至愚且智士寧不然顔樂簞瓢萬世師模紂居瓊臺死為獨夫君子以儉為德小人以侈喪軀然則斯衾之陋其可匆諸范淳夫布衾銘記溫國文正公所服之布衾𨽻書百有十字曰景仁惠者端明殿學士范公之所贈也曰堯夫銘者右僕射髙平公所作也元豐中公在洛蜀公自許往訪之贈以是衾先是高平公作布衾銘以戒學者公愛其文義取而書於衾之首及寢疾東府治命斂以深衣而覆以是衾公於物淡無所好唯於德義若利欲其清如水而澄之不已其直如矢而端之不止故其居處必有法動作必有禮其被服如陋巷之士一室蕭然圖書盈几經日靜坐泊如也又以圓木為警枕小睡則枕轉而覺乃起讀書蓋恭儉勤禮出於天性自以為適不勉而能與二范公為心交以直道相與以忠告相益凡皆如此其誠心終始如一將殁而猶不忘祖禹觀公大節與其細行雖不可遽數然本於至誠無欲天下信之故能奮然有為超絶古今居洛十五年若將終身焉一起而功被天下內之嬰童婦女外之蠻夷戎狄莫不敬其德服其名唯至誠故也公兄子宏得公手澤紙本于家屬祖禹序其本末俾後世師公之儉云張文濳書布衾銘後司馬公之儉德蓋望其眉宇聞其語言而使奢逸之意銷不必考其服器而後知也公薨於東府某往哭之見其覆尸以布衾上有銘焉蓋此銘也張某汝州東齋記陸務觀司馬公布被銘公孫丞相布被人曰詐司焉丞相亦布被人曰儉布被可能也使人曰儉不曰詐不可能也詩集寒知薄天丨丨被丨古詩夕憶重丨息丨丨衾陸士衡著以長相思客從逺方來遺我一端綺相去萬里餘故人心尚爾文彩雙鴛鴦裁為合歡被著以長相思緣以結不解以膠投漆中誰能别離此古樂府乍捲潮無迹寒聲移晚林殘臘無幾日髙人擁楮眠臠倦事自適素風含混沌春煦回呼吸餘溫偶見分來自芝蘭室乍舒魄流輝丨丨丨丨丨未能澡豫心愧此一衾白嘗聞盱江藤蒼崖走虬屈斬之霜露秋漚以滄浪色粉身從辟絖蛻骨齊麗密乃知瑩然姿故自漸陶出治身猶貴精治心豈宜逸平生感交逰耳剽非無得利神隨事分內省殊未力寸隂捐已多老矣將何及自從得此衾夢覺當惕惕清如夷齊鄰粹若淵騫覿獨警發鏗鍧邪思戢毫匆勿謂絶知聞虛闈百靈集鼎釜或存戒韋絃亦規失則知君子惠所以勵蒙塞劉子暈答呂君仁惠建昌紙被白於狐腋暖於綿紙被圍身度雪天丨丨丨丨丨丨丨放翁用處君知否不是蒲團夜坐禪卧看飛雪入窗櫺大抵藜牀席見經丨丨丨丨丨丨丨布衾紙被元相似只欠髙人為作銘陸務觀寄謝待制朱文紙被之況古今合璧事類備要外集卷三十九
