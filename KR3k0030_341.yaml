body:
  text: 古今合璧事類備要外集卷四十一宋謝維新撰香附香爐香品舉要香最多品類出交廣崖州及海南諸國然秦漢以前未聞惟稱蘭惠椒桂而已至漢武時外尚書郎奏事者始有含雞舌香其他皆未聞逮晉武時外國貢異香始此及隋除夜火山燒沉香甲煎不計數海南諸品畢至矣唐眀皇君臣多有用沉檀腦麝為亭閣何多也周顯德間昆明國又獻薔薇水矣昔所未有今皆有焉然香一也或出於草或出於木或花或實或節或葉或皮或液或又假人力煎和而成有供焚者有可佩者又有充入藥者至龍涎麝臍又取之於龍採之於麝者矣好事者試相與評之事類逺聞凡香之屬皆從香丨丨曰馨美者曰音使氣曰馦説文有飶丨丨其香邦家之光詩載芟始升其香丨丨生民香市南方有丨丨乃商人交易處述異記香戶南海郡有採丨丨同上香界因香所生以為丨丨楞嚴經香篆近世尚竒者鏤木以為之範丨塵為丨文準十二辰分百刻凡燃一晝一夜或燃於飲席或佛像前香譜香珠以雜香搗之丸如梧桐子大青繩穿之謂之丨丨燃之香徹天二洞珠囊薰香莊公束縳管仲以子齊使齊使受之而退比至三舋三浴之注以香塗身曰舋亦或為丨齊語燒香宋景公丨異丨於臺上有野人被草負笈扣門而進是為子韋世司天部洪芻香譜進香漢雍仲子丨南海丨物拜涪陽尉人謂之香尉速異記懷香漢尚書郎丨丨握蘭含雞舌香官儀合香金日磾入侍欲衣服香潔變胡虜氣自丨一丨武帝果悅之洪芻香譜含香漢桓帝時侍中刁存年耆口臭上出雞舌香使丨之自疑有過賜毒歸舍辭訣欲就便宜賴僚友求視其藥更為含食意遂解又見前竊香韓夀賈充會諸吏聞夀有異香之氣是外國所貢者一著人歷月不歇賈計武帝所賜惟已及陳騫家餘無此疑夀與女通乃取左右婢考問即以狀言充袐之以女妻夀禁熏香魏武令云天下初定吾便丨家內不得丨丨愛熏香劉季和性丨香常如厠還輒過香爐上主簿張坦曰人名公作俗人不虛也季和曰荀令君至人家坐席三日香比我如何坦曰醜婦效顰見者必走公欲遁走邪季和大笑襄陽記佩紫囊謝玄少時好丨丨羅香丨叔父安患之而不欲傷其意因戲賭而焚之於是遂止焚數車唐太宗與蕭后宫中觀燈問孰為隋主曰彼亡國之君陛下開基之主奢儉不同爾帝曰隋主何如后曰每除夜殿前諸位設大山數十每一山焚沉香數車沃以甲煎熖起數丈香數十里一夜用沈香二百餘車甲煎二百餘石房中不燃膏火縣寶珠一百二十照之太宗口刺其奢心服其盛續世説沉香亭唐開元中有丨丨丨李又唐敬宗時波斯進丨丨丨子材拾遺漢諫曰丨丨為丨何異瑤臺瓊室檀香亭宣州觀察使揚牧造丨丨丨子初成命賓樂之沉香閣楊國忠嘗用丨丨為丨檀香為欄檻以麝香乳香篩土和為泥飾閣璧每於春時木芍藥盛開之際聚賔於此閣上賞花焉禁中丨丨之丨殆不侔此壯麗也天寶遺事檀香閣同上瑶英啖香元載寵姬薛丨丨母趙娟幼以香丨英故肌肉悉香杜陽編鄭姬薰香唐丨注赴河中丨妾百餘盡丨麝香氣數里逆於人鼻是嵗自京兆至河中所過瓜盡一蒂不獲水沉香氣香嚴童子白佛言我諸比丘燒水沉香香氣寂然來入鼻中本非空非煙非火去無所著來無所從由是意銷發明無漏得阿羅漢帳中香法江南李士丨丨丨丨以鵝梨蒸沉香用之洪駒父異香成穗二十二祖摩拏羅至西印土焚香而月氏國王忽覩異香成穗傳燈録焚香返魂司天主簿徐肇遇蘇氏子德竒者自言善為返魂香手持香爐懷中取一帖白檀香末撮於爐中煙氣裊裊直上甚於龍腦德竒微吟曰東海徐肇欲見先靈願此香煙用為引導盡見其父母曾髙德竒曰但死經八十年已上則不可返矣洪芻香譜灑衣以香周顯德五年昆眀國獻薔薇水十五瓶云得自西域以丨丨衣敝而香不滅以服罩香梅學士詢性喜焚香其在官所每晨起將視事必焚香兩爐丨公丨丨之撮其袖以出坐定撒開郁然滿空濃丨時人謂之梅香歸香香爐被中香爐長安巧工丁緩者作丨丨丨丨為機環轉之運四周又作九層慱山香爐鏤以竒禽怪獸皆自然能動西京雜記帳角香爐石季龍冬月為復帳四角安純金銀鑿鏤香爐鄴中記吳泰筮卦吳郡丨丨能丨會稽盧氏失慱山香爐使泰筮之泰曰此物質重為金其象實山有樹非林有孔非泉闔閭晨興見發青煙此香爐也語其處求即得集異記宗超行道丨丨嘗露壇丨丨奩中香盡自然滿溢爐中無自出火燈五方香床隋煬帝觀文殿前兩廂為堂各十二間堂中每間十二寶厨前設五方香床綴貼金玉珠翠每駕至則宫中擎香爐在輦前行宋范曄香序麝本多忌過分必害沉實易和盈斤無傷零藿慘虐詹唐粘濕草松蘇合安息鬱金榛多和羅之屬並被於外國無取於中土又棗膏昏蒙甲馢淺俗非惟無助於馨烈乃當弭增於尤疾也此序所言悉以比類朝士麝本多忌比庾憬之棗膏昏蒙比羊玄保甲馢淺俗比徐湛之甘松蘇合比惠休道人沈實易和蓋自比也葉庭圭香譜乳香一名薰陸香出大食之南數千里其樹類松以斤斫樹脂溢於外結而成香聚而成塊上品為㨂香圓大如指頭今俗所謂滴乳次曰瓶乳言收時置于瓶中又次曰乳塌蓋香而雜之以沙石者也又次曰黑榻蓋香之黑色者也又次曰水濕塌蓋香在舟中為水所浸漬而氣變色敗者也其雜品而碎者曰斫削簸揚為塵者曰纒末腦子出渤泥三佛齊亦有之乃深山窮谷中經千年老杉樹其枝幹不曾損動者若損動則氣泄無腦矣其土人解作板假隨其板傍橫裂而成縫有腦出於縫中劈而取之其大者成片俗謂之梅花腦其次謂之速腦速腦之中其次者謂之米腦沈香其木類椿櫸多節取之先斷其木根積年皮幹俱朽心與節不壞者香也細枝緊而實為青桂香黑而沉水者為沉香半浮沉者為雞骨香最粗者為箋香類證本草沉香所出非一真臘為上古城次之渤泥為下然就真臘而較之則又有三品緑洋為上三濼次之渤囉間為下而香之大概生結者為上熟脫者次之堅黑者為上黃香次之狀如犀角者謂之犀角沉如燕口者謂之燕口沉如附子者謂之附子沉如梭者謂之梭沉文橫而堅緻者謂之隔沉生沉香蓬萊香出海南山西其初連木則狀如粟棘房土人謂之刺香刀刳木而出其香則堅緻而光澤士大夫謂之蓬萊香同上蕃沉出於渤泥三佛齊醫家多用之亦謂之藥沉同上箋香乃沉香之次者香有三等曰沉曰箋曰黃熟沉箋皆有二品曰熟結曰生結熟結者樹自爛而得生結者伐仆得之又久爛脫而剔取之黃熟有三品曰夾箋其破者為散沉香之良者也瓊崖生取者為角沉宜薰衣木枯朽乃得者為黃熟可入藥談苑及倦遊録一木四香根曰旃檀節曰沉香花曰雞舌膠曰薰陸酉陽雜爼生熟速香伐樹去木而取香者謂之生速樹仆於地木腐而香浮者謂之熟速檀香出於三佛齊國皮木而色黃者謂之黃檀皮腐而色紫者謂之紫檀恐其氣泄則以紙封之黃熟香皮堅而中腐者其形如桶故謂之黃熟桶其夾箋而色黑者其氣尤勝鷓鴣班體薄而易燼其厚而沉水者差久暫香乃熟速之次者但脫者謂之熟速而木之半存者謂之暫香降真香氣徑而逺能辟邪氣篤耨香出真臘國亦樹之脂也樹如松杉之類而香藏之皮樹老而自然流溢者色白而透眀故其香雖盛暑不融土人既取之矣夏月以火環其樹而炙之令其脂液再溢至冬沍寒因其凝而復取之故其香冬凝而夏融土人盛之以瓠瓢至暑月則鑽其瓢而周為之孔藏之米中欲其隂涼而氣通以泄其汗故得不融舟人易之以瓷器不若瓢也香之氣清逺而長雜於樹皮則黑而黑為下矣香之性易融而暑月之融多滲於瓢故斷瓢而藏之亦得其典刑今所謂葫蘆瓢是也麝香木出古城國樹老而仆埋於地而腐外黑而內黃赤者其氣類於麝龍涎出大食國其龍多蟠於洋中之大石卧而吐涎衆魚聚而􅀈之土人見則沒而取焉然龍涎無香其氣近於臊白者如百藥而膩理黑者亞之如五靈脂而光澤能發衆香故人常用之以和香焉薔薇水大食國花露也今則採茉莉取其液以代焉然其水多偽雜試之當用琉璃瓶盛之翻搖數四其泡周上下者為真安息香出三佛齊國其香乃樹之脂也其形色類胡桃攘而不宜於燒然能發衆香故人取之以和香焉亞濕香出占城國其香非自然乃土人以十種香搗和而成體亞而濕氣和而長爇之勝於他香塗肌拂手香皆出占城國土人以腦麝諸香搗和而成或以塗肌或以拂手其香經數宿不散金顔香正出大食真臘國其香乃樹之脂色黃而氣徑工於臘聚衆香今之為龍涎軟香佩帶者多用之蘇合香油亦出大食國氣味大抵類篤耨雞舌香一名丁子香以其形似丁子香也即丁香之大者今謂丁香母是也日華子云治口氣生結香産髙竇等州山民見香木曲幹斜枝以刀所成坎經年得雨水漬復鋸取之刮去白木其香結為班點亦名鷓鴣班倦遊録螺甲雲南者如掌青黃色取靨燒灰合香者多用之本草修申香方取大甲香如崑崙耳者酒煮蜜熬入諸香中用又納世西國似艾蓋柳皮上蘚衣合和諸香燒之其煙團聚清白可愛本草程泰之香説秦漢以前二廣未通中國中國無今沉腦等香也宗廟􅡒蕭灌獻尚鬱食品貴椒至荀卿氏方言椒蘭漢雖已得南粵其尚臭之極者椒房郎官以雞舌奏事而已較之沉腦其等級之甚下不類也惟西京雜記載長安巧工丁緩作被下香爐頗疑已有令香然劉向銘博山罏亦止曰中有蘭錡青火朱煙玉臺新詠説博山文亦曰朱火然其中青煙揚其間香風難久居空令惠草殘二文所賦皆焚蘭蕙而非沉腦是漢雖通南越亦未見越香也漢武內傳載西王母降爇嬰香等品多名異然疑後人為之漢武奉仙窮極宫室帷帳器用之麗漢史備記不遺若曽創有古來未有一香安得不記演繁露香爐漢劉向香爐銘嘉此正氣嶄岩若山上貫泰華承以銅盤中有蘭筒朱大青煙梁元帝香爐銘蘇合氤氲非煙若雲時濃更薄乍聚還分火微難盡風長易聞孰云道力慈悲所薰詩集香事輪困丨丨已郁郁著書畫誰能入吾室脫汝世俗械黃魯直香癖賈俠懷六韜家有十二戰天寶喜文事如我有丨丨香光公虛采蘋宫行樂在小寢丨丨當發聞色敗不可稔香炷險心遊萬仞躁欲生五兵隱几丨一丨靈臺湛空眀煙霏畫食鳥窺臺宴坐日過砌俗氛無因來丨丨作輿衛以上並山谷報賈天錫惠寶薰火力琢瓷作鼎碧於水削銀為葉輕如紙不武丨丨均閉閣下簾風不起詩人自炷古龍涎但令有香不見煙素馨欲開抹利折底處龍涎和檀沉平生飽食山林味不奈此香殊斌媚呼兒急取蒸木犀却作書生真富貴楊廷秀蔚宗傳林花飛片片香歸銜泥燕閉閣和春風還尋丨丨丨山谷安樂窩丨丨丨中一炷香凌晨焚意豈尋常禍如許免人須諂福若待求天可量且異緇黃徼廟貌又殊兒女裛衣裳非啚聞道至於此金玉誰家不滿堂卲堯夫薰知見衣篝麗紈綺有待乃芬芳當念真富貴自丨丨丨香山谷真富貴見前鷓鴣班百鍊香螺沉博水薰近出江南一檖黃雲繞几深祥想對同參螺甲割崑崙耳香材屑丨丨丨欲雨鳴鳩日永下帷睡鴨春間我讀蔚宗香傳文章不減二班誤以甲為淺俗却知麝要防間驪龍沫瘴海丨丨供素丨蠻村花露挹清滋微參鼻觀猶疑似全在爐煙未發時劉子翬還老寄龍涎香結縹渺旃檀婆律海外芬西山老臍柏斫薰香螺脫靨來相羣能丨丨丨風中雲散氤氲一燈如雲起微焚何時渡盡此篆紋繚繞無窮合復分綿綿浮空丨丨丨云云東坡特此夀卯君注東坡於子由生日送檀香觀音像并香印篆蓋一穟黃雲見前鷓鴣班注四兩元參丨丨丨丨三兩松麝香丰分蜜和同丸如彈子金爐爇還似花心噴曉風香譜香爐雕文四坐且莫喧願聽歌一言請説銅香爐崔嵬東南山上枝似松柏下根據銅盤丨丨各異類離婁自相連誰能為此器公輸與魯班朱火然其中青煙揚其間順風入君懷四坐莫不歡香風難久居空令蕙草殘古樂府含薰參差鬱佳麗合沓紛可憐蔽虧千種樹出沒萬重山上鏤秦王子駕鶴乘紫煙下刻蟠龍勢矯首半銜連傍為伊水麗芝蓋出巖間後有漢遊女拾翠弄餘妍榮色何雜揉縟繡更相鮮麏麚或騰倚林薄杳芊眠掩筆如不發丨丨火肯燃風生玉階樹露湛曲池蓮寒蛩飛客室秋雲沒曉煙齊劉繪孤煙石密化螺甲榠樝煮水沉博山丨丨起對此作森森山谷太清雉尾映鞭聲金爐拂丨丨班近聞香早歸來學得成山谷睡鴨床帳夜氣馥衣桁晚煙凝瓦溝鳴急雪丨丨照華燈山谷又見前蟠龍見前含薰未肯然注古今合璧事類備要外集卷四十一
