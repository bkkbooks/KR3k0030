body:
  text: 古今合璧事類備要外集卷十六宋謝維新撰音樂門簫音樂㫖歸簫編竹為之大者二十四管無底小者十六管有底長二尺其形參差以象鳳翼然又有長尺二寸者有長尺四寸者或又有長尺圍寸者併漆之事類仲吕簫丨丨之氣風俗通夏至簫丨丨樂丨丨火用事其數七鄭注易通卦驗肅肅簫肅也言其聲丨丨然釋名喤喤見後先祖聽注樂師均仲夏之月丨丨丨簫管參差之音記君子聽丨丨丨簫管之聲則思畜聚之臣折柳曲短簫有丨楊丨之丨白帖編竹為簫丨丨丨之長尺五寸五經義又丨小丨管丨之詩疏大謂言丨簫丨之丨小者謂之筊李巡曰大簫聲大者言言也小者聲揚而小故言筊筊小也大謂簥丨管丨之丨李巡曰聲髙大故曰簥簥髙也尺二寸頌簫長丨丨丨尺四寸雅簫長丨丨丨白氏文帖伏羲作丨丨丨簫十六管通禮義纂女蝸造事始舜作簫丨丨丨其形參差以象鳳翼風俗通舜造簫簫竹之屬十六管長二尺丨所丨者也隋志細器備簫韶九成鳳凰來儀注韶舜樂名言簫見丨丨之丨書先祖聽周頌有瞽詩云云既備乃奏簫管備舉喤喤厥聲肅雍和鳴丨丨是丨詩見越王客有以吹籟丨丨丨者上下宫商和而越王不喜或謂之野者而王乃恱之亦有如此者要在聽之而已吕氏春秋教弄玉蕭史善吹簫能致孔雀白鶴秦穆公女弄玉亦好簫遂妻之乃丨丨丨作鳳鳴而作鳳臺一旦夫妻皆隨鳳去時為作鳳女祠時有遺音列仙傳吹簫乞食伍子胥鼓腹丨丨丨丨於吳中史記吹簫給喪周勃丨丨以丨丨事本傳未聞人籟莊子謂南郭子綦曰汝聞天籟而未聞地籟汝聞地籟而丨丨丨丨注人籟簫也莊陌上有音薊子訓少嘗仕郡人莫知其道三百餘年顔色不老及死殯之宿昔棺鞠然作雷霆音光照宅宇見棺蓋飛於中庭棺中無復有人但餘履耳須㬰間丨丨丨人馬簫鼓之丨葛洪神仙傳元帝度曲丨丨吹簫自丨丨被歌聲分刌節度極幼妙本贊靈帝能吹丨丨丨丨簫謝承後漢書得赤玉簫凉州胡安盜晉文王張駿墓見駿貌如生丨丨丨丨紫玉笛三十國春秋王褒洞簫賦原夫簫幹之所生兮于江南之丘墟洞條暢而罕節兮標敷紛以扶踈徒觀其旁山側兮則嶇嶔巋﨑倚巇迤㠧誠可悲乎其不安也彌望儻莽聮延曠蕩又足樂乎其敞間也託身軀於后土兮經萬歲而不遷吸至精之滋熙兮凜蒼色之潤堅感隂陽之變化兮附性命乎皇天翔風蕭蕭而徑其末兮回江流川而溉其山揚素波而揮連珠兮聲礚礚而澍淵朝露清泠而隕其側兮玉液浸潤而承其根孤雌寡鶴娛優乎其下兮春禽羣嬉翺翔乎其顛秋蜩不食抱朴而長吟兮𤣥猿悲嘯搜索乎其間處幽𨼆而奧屏兮密漠泊以􅭟猭惟詳察其素體兮宜清淨而弗喧幸得諡為洞簫兮蒙聖王之渥恩可謂惠而不費兮因天性之自然於是般匠施巧夔襄准法帶以象牙掍其會合鎪鏤離灑絳脣錯雜鄰菌繚糾羅鱗捷獵膠緻理比挹抐㩎㩶於是乃使夫性昧之宕冥生不覩天地之體勢暗於白黑之貌形憤伊鬱而酷􅀈愍眸子之喪精寡所舒其思慮兮專發憤乎音聲故吻吮值夫宫商兮和紛離其匹溢形旖旎以順吹兮瞋㖤㗅以紆鬱氣旁忤以飛射兮馳散渙以逫律趣從容其勿述兮騖含遝以詭譎或渾混而潺湲兮獵若枚折或漫衍而絡繹兮沛焉競溢婪栗密率掩以絶滅㘊霵曄踕跳然復出若乃徐聽其曲度兮廉察其賦歌啾咇節而將吟兮行鍖銋以和囉風鴻洞而不絶兮優嬈嬈以婆娑翩綿連以牢落兮漂乍棄而為他要復遮其蹊徑兮與謳謡乎相和故聽其巨音則周流泛濫并包吐含若慈父之畜子也其妙聲則清靜厭㥷順叙卑迖若孝子之事父也科條譬類誠應義理澎濞慷慨一何壯士優柔溫潤又似君子故其武聲則若雷霆輘輷佚豫以沸㥜其仁聲則若凱風紛披容與而施惠或雜遝以聚斂兮或拔摋以奮棄悲愴恍以惻惐兮時恬淡以綏肆被淋灑其靡靡兮時橫潰以陽遂哀悁悁之可懷兮良醰醰而有味故貪叨者聽之而廉隅兮狼戾者聞之而不懟剛毅强􅕝反仁恩兮嘽唌逸豫戒其失鍾期牙曠悵然而愕立兮杞梁之妻不能為其氣師襄嚴春不敢竄其巧兮浸淫叔子逺其類嚚頑朱均暢復慧兮桀跖鬻博儡以頓悴吹參差而入道德兮故永御而可貴時奏狡弄則倣徨翺翔或留而不行或行而不留愺恅瀾漫亡耦失儔薄索合沓罔象相求故知音者樂而悲之不知音者怪而偉之故為悲聲則莫不愴然纍欷撇涕抆淚其奏歡娛則莫不憚漫衍凱阿那腲腇者已是以蟋蟀蚸蠖跂行喘息螻蟻蝘蜓蠅蠅翊翊遷延徙迤魚噉雞睨垂喙䖤轉瞪普忘食况感隂陽之和而化風俗之倫哉亂曰狀若捷武超騰踰曳迅漂巧兮又似流波泡溲泛􅟫趨巇道兮哮呻呟喚躋躓連絶淈殄沌兮攪搜㶅捎逍遙踊躍若壞頽兮優游流離躊躇稽詣亦足耽兮頽唐遂往長辭逺逝漂不還兮賴蒙聖化從容中道樂不淫兮條暢洞達中節操兮終詩卒曲尚餘音兮吟氣遺響聫綿漂撇生微風兮連延駱驛變無窮兮東坡赤壁賦客有吹洞簫者倚歌而和之其聲嗚嗚然如怨如慕如泣如訴餘音嫋嫋不絶如縷舞幽壑之潛蛟泣孤舟之嫠婦詩集混笙箎危聲合歌鼓絶弄丨丨丨劉孝儀間笙篁喧然名都㑹吹簫丨丨丨嬴女善始知丨丨丨吹簫鸞鳳友丨丨丨吹簫並杜甫悲且清簫管丨丨丨潘嶽樂府成聲寶扇輕圓淺畫繒象床平穩細穿藤飛蠅不到避壺氷翠枕面凉頻憶睡玉簫手汙錯古今合璧事類備要外集卷十六
