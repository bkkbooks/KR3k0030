body:
  text: 古今合璧事類備要别集卷九十宋謝維新撰蟲象門蛙附蝦蟆蟾蜍蛤蚪蝌格物總論蛙蝦蟆也數種有黑虎有䖲音旬黃有黃􅀈有螻蟈有蟾蜍有山蛤其形各别蝦蟆皮上腹下有黑斑㸃腳短能跳接百蟲即不鳴呌黑虎身小黑觜腳小斑䖲黃斑色前腳大後腿小有尾子一條黃􅀈遍身黃色腹下有臍帶長五寸分螻蟈即夜鳴腰細口大皮蒼黧色俗名田雞蟾蜍形大背黑無㸃多􅂒磊其腹下有丹書八字頭有肉角世傳三足者妄也山蛤大而黃色多在山石中藏蟄能吞氣飲風露不食雜蟲其他又有蛙蠅長􅀈石螃蠼子之屬然蝦蟆大者名田父能食蛇蛇行田父逐之蛇不得去田父銜其尾久之蛇死尾後數寸皮不損肉已盡也世傳蛇噉蛙今乃田父食蛇其說頗怪當是别有一種如此耳蝌蚪蝦蟆子也曰活即師一名活東形圓有尾聞雷震則尾脫而腳生然皆不可止謂之蛙而不之辨事類掌去蛙蟈氏丨丨丨黽焚牡蘜以灰灑之則死禮秋官式怒蛙楚王屢伐吳欲人之輕死也出見怒蛙乃為之丨從者曰奚敬於此曰為其有氣故也韓非子沈竈産蛙趙襄子以尹鐸有寬政於晋陽其心必和乃守晋陽後晋師圍而灌之丨丨丨丨民無叛意拾磚投蛙燕太子丹自喜得荆軻永無秦憂日與軻之東宮臨池而觀軻丨丨丨丨太子令人奉金丸進之史蹶則滅跗公孫龍問於魏牟曰龍少學先生之道合同異離堅白自今為至達今聞莊子之言茫然異之敢問其方公子牟隱几太息仰天而笑曰子獨不聞夫塪井之蛙乎謂東海鱉曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接腋持頥丨泥丨沒足丨丨還虷蟹與蝌蚪莫吾能若也且夫擅一壑之水而跨跱塪井之樂此亦至矣夫子奚不時來入觀乎東海之鱉左足未入而右膝已縶矣於是逡巡而却告之江曰夫千里之逺不足以舉其大千仭之髙不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損夫不為頃久推移不為多少進退者此亦東海之大樂也於是塪井之蛙聞之適適然驚規規然自失也且夫知不知是非之竟而猶欲觀於莊子之言是猶使蚊負商蚷馳河也必不勝任矣莊秋水怒則努眼艾子使於燕燕王曰吾小國也日為强秦所侵徵求無已吾國貧無以供之欲舉兵一戰又力弱不足以拒敵如之何則可先生其為謀之艾子曰亦有分也王曰其有說乎艾子曰昔有龍王逢一蛙於海瀕相問訊後蛙問龍王曰王之居處如何王曰珠宮貝闕翬飛璇題龍復問汝之居何若蛙曰緑苔碧草青泉白石復問曰王之喜怒如何王曰吾喜則時降膏澤使五榖豐稔怒則先之以暴風繼之以飛電使千里之內寸草不留龍問蛙曰汝之喜怒何如曰吾之喜則清風明月一部鼓吹丨丨先之以丨丨次之以腹脹然至於脹過而休於是燕王有慙色得以給足武帝欲籍阿城以南盩厔以東宜春以西為上林苑東方朔諌以謂此地土宜薑芋水多蛙魚貧者丨丨人丨家足無飢寒之憂東方朔傳妄自尊大公孫述稱帝於蜀隗囂使馬援往觀之援素與述同里閈相善以為既知當握手歡如平生而述盛陳陛衛以延援入欲授援以封侯賔客皆樂留援曉之曰公孫不吐哺走迎國士反修飾邊幅如偶人形何足久稽天下士乎因辭歸謂囂曰子陽井底蛙耳而丨丨丨丨孔圭鼓吹齊丨丨字德璋為都官尚書不樂門庭之內草萊不剪中有蛙鳴或曰欲為陳蕃乎圭曰我以此當兩部丨丨何必效陳蕃王晏鳴鼓疾之聞羣蛙鳴曰此殊聒人耳圭曰我聽鼓吹殆不及此晏慚僧照咒厭梁沈僧照别名法朗少事天師道士後為山隂令時武陸王紀為㑹稽宴集池亭蛙鳴聒耳王曰殊廢絲竹之聽丨丨丨丨便息日晚王欲其復鳴丨丨曰王歡已闌令汝恣鳴即喧聒蝦蟆蝦蟆何哭艾子浮於海夜泊島嶼中夜聞水下有人哭聲復若人言遂聽之其言曰昨夜龍王有令應水族有尾者皆斬吾鼉也故懼誅而哭汝丨丨無尾丨丨復聞有言曰吾今幸無尾但恐更理㑹科斗時事也蝦蟆俱鬭漢武帝元鼎元年秋蛙與丨丨丨丨是嵗四月將軍衆十萬征南越開九郡聞蝦蟆聲晋惠帝在華林園丨丨丨丨問左右曰此鳴者為官乎為私乎侍中賈𦙍對曰在官地為官在私地為私著蝦蟆賦齊卞彬丨丨丨丨云紆青柂紫名為蛤魚世謂比令僕也又云科斗唯唯羣浮暗水唯朝繼夕聿役如鬼比令吏咨事也乃錦襖子百粵人以蝦蟆為上味疥者皮最佳故越人云不可脫去此丨丨丨丨尚書故實夢緑衣人某朝皇帝尚食特供蝦蟆充御膳上忽丨丨丨數百丨貸之後方悟其為蝦蟆因禁採捕或云蝦蟆能食蝗蟲故禁採捕此事不詳何書蟾蜍託身於月羿請不死之藥於西王母嫦娥竊之以奔月將往投筮之於有黃有黃占之曰吉翩翩歸妹獨將西行逢天晦芒毋驚毋恐後且大昌嫦娥遂丨丨丨丨是為蟾蜍張衡靈憲蝌蚪得科斗文魯共王好治宮室壞孔子舊宅以廣其居於壁中得先人所藏古文虞夏商周之書及傳論語孝經皆丨丨丨字云云科斗書廢已久時人無能知者注科斗蟲名蝦蟆子書形似之尚書序理科斗事見前蝦蟆注藥下數升丘傑年十四遭母喪以熟菜有味不嘗於口嵗餘或夢於母曰汝噉生菜遇蝦蟆毒靈床前有三丸藥可取服之傑驚起果得甌中丨服之丨科斗子丨丨南史羣浮暗水見蝦蟆注張文濳鳴蛙賦余寓山陽學舍夏大雨屋四隅成塘聚蛙以千計聲鳴不絶夜為不能寐客有獻豫以殺蛙之術曰投余藥一丸蛙無類矣童子將用之余曰不可復為賦示之賦夏雨初止積潦過尺有蛙百千更跳互出幸此新霽夜月清溢我勞其休歸偃於室于時蛙鳴若啼若訴若歌若歡若悲若喜若怒而詬若噦而謳若咽而嗽瘖者之呼吃者之鬬或急或緩或清或濁若羌絲野鼓雜亂無節兮又似夫蠻歌獠語詭怪之迭作也爾其因於泥潦失其處所而悲又若夫旱暵既久得其所處而樂也奚有童子持燭來謁曰蛙羣夜鳴君寢其聒考之周官灑灰驅蛤君其教之余得盡殺余語童子爾無是酷爾樂而歌而哀則哭哭則悲嗟樂有聲曲聚語羣爭引吭而呼一日之間不寧須㬰蛙不汝嫌汝奚蛙誅萬物一府誰好孰惡爾奚自私已厚蛙薄參適彼已樂我自然弭爾怒心置燭而眠夜半張子援枕而吁顧謂童子記余言歟前既有言請卒吾說物各有時夫誰敢遏爾觀夫春露初靄朝華始敷文羽清喙飛鳴自如若奏琴筝而和笙竽清耳恱心聽者為娛及夫陽春既徂炎火將極惡草蕃遮淫潦瀦積蛙于此時生養蕃息跳梁號呼意氣橫逆子如之何時不可逆時乎時乎美惡皆然當其盛時誰得而遷及其霜雪既降木實草衰飛蠅聚蚊孽無所施於是蛙斂吻收足尫然土中一聲不出黨散巢披不可終日盛不可常與衰迭來子姑忍之奚以殺為哉陳君舉怒蛙說日有烏月有蛙蛙與烏相遇烏戲蛙曰若臠肉耳躍之髙不咫尺焉能為哉蛙曰吾已矣若無靳我烏曰若亦能怒耶蛙曰吾翹吾腹翳太隂之光呀吾頥啖其壤瞪吾目列星不敢輝奚而不能怒若不吾信月于望吾怒以示若其望果無光他日蛙過焉曰曩吾怒得無惕乎烏曰若焉能惕我哉吾振吾羽翳太陽之光肆吾咮喙其壤徐以三尺蹴之天下不敢寧而居吾視吾之怒眇矣奚以若惕為若不吾信月于朔吾怒以示若其朔日果無光嗇人伐鼓馳且走焉又他日烏遇蛙曰吾怒也何如蛙曰始吾謂極威矣而不知子之威震於我也日之馭曰羲和傍聞之曰噫何謂威吾疾其驅六龍不敢稽其輈吾赫其燥雲不敢雲雨不敢雨風不敢風八土之埏吾能赫其膚萬壑之隂吾能充其毛百川之流吾能瀉其液且彼與若敢言怒哉若不吾信吾怒以示若於是果旱暵者半載凡天地之間病之他日羲和遇烏曰吾怒也何如烏赧然曰始吾謂極威矣而不知子之震於我也飛亷豐隆屏翳者聞之相與造羲和誚焉曰若驚而怒耶向吾威示若吾三人焉噓其氣足以幕乾坤之倪噀吾咮足以赭嵩華之峰嘯吾聲足以簸四海掀九州而覆之也時也若何能威言未既豐隆噓焉屏翳噀焉飛亷嘯焉莫晝莫夜彌山漫谷者亦半載嗚呼竊造物之權而私以怒競民物奚罪哉詩集鳴到曉一夜青蛙丨丨丨鳴無謂蛙黽丨丨丨誾誾祇亂人並韓水旱卜丨丨丨蛙聲章孝標鼓吹聲越國車前矜勇甚子陽井底太驕生乘時不羡雲溟樂口作儀同丨丨丨注齊張狗兒將拜儀同日口自作丨丨丨宋子京問公私兩蛙盛怒鬬春池羣吠同聲徹曉帷等是一般狼籍去更無人與丨丨丨朱元晦聞蛙知虛實春來真底好此輩正縱橫身作泥中計聲從雨後憎北人餐未慣南食服猶生灰灑丨丨丨於渠似可行楊廷秀蝦蟆水族嘉魚薦宗廟靈龜貢邦家應龍猶致雨潤我百榖芽蠢蠢丨丨中無足者蝦蟆形穢肌肉腥出沒于泥沙六月七月交時雨正滂沱蝦蟆得其志快樂無以加地既蕃其生使之族類多天又與其聲得以相喧譁豈帷西池上汙君清泠波可獨瑶瑟前亂君鹿鳴歌常恐飛上天跳躍隨嫦娥往往蝕明月遣君無奈何白居易水居蝦蟆丨中丨水特變形貌强號為蛙蛤於實無所校雖然兩股長其奈脊皴皰跳躑雖云髙意不離濘淖鳴聲相呼和無理祇取閙周公所不堪灑灰垂典教我棄愁海濵常願眠不覺叵堪朋類多沸耳作驚爆端能敗笙磬仍工亂學校雖蒙句踐禮竟不聞報效大戰元鼎年孰强孰敗橈居然當鼎味豈不辱鈎罩余初不下喉近亦能稍稍常懼染蠻夷失平生好樂而君復何為甘食比豢豹獵較務同俗全身斯為孝哀哉思慮深未見許回擢韓昌黎答栁栁州食蝦蟆何為者蝦蟆丨丨丨痱磊盎於背人言懷土蟲棄去俄復在昔有繫青繒酉陽志其怪嘗觀三物圖副以蝍蛆帶相持莫先動含毒相屠膾端欲兄龜龍未肯弟孔翠俳語解人頥子陽妄尊大慎勿離窟穴旁午凡五輩東行犯日忌束縳非其罪儻有切玊刀甘心脂鼎鼐平生不下筯實憚背脊疥何必食馬肝前修有明戒願君易嘲誚微命其何貸洪駒父亦皤其動物類含血蝦蟆獨無之雙目但瞪也一腹丨丨丨龍變或託體魚服覩幽姿罕見三足蟾詎減六眸龜向來奏贋瑞背負輪菌芝坐謾皆下吏膠車等兒嬉雖蒙黃金擲荆卿空爾為或以白玉琢形模抄工倕咄爾百醜質詎辱五鼎脂浪號土底曦雄誇水中雞何足汙帝箸但可充蛇飢作意一池鳴和我五字詩洪駒父蛤强號丨丨為蛙蛤見前注宗生吾廬逼沮洳蛙蛤丨丨之委委見科斗閣閣已在兹夜聲一何喧達旦乃寖微月令紀螻蟈語默亦有時豈伊不平鳴沓沓竟何為那復當鼓吹安能問官私吾聞崑崙下厥大數十圍蟾蜍窟望舒色勝金裊蹄癡騃反蝕月吞吐誰能知坎并我自足跳梁而持頥鱉笑色無慍鶉化理莫推疥體不自惜或以調鹽醯栁州味南烹下箸甘若飴在昔薦宗廟乃與羔兔齊擅減幾被坐巨細不可遺莫以腥臊棄終將璉瑚期洪駒父蟾蜍窟望舒蟾蜍丨丨丨色勝金裊蹄詳見前注奏贋瑞罕見三足蟾詎減六眸龜向來丨丨丨詳前注蝌蚪何時生朝開南籬梅暮聞北池蛙丨丨蝌蚪丨草根已吐芽只畏草葉長其下可隱蛇游子且勿行蝌蚪成蝦蟆梅聖俞初聞蛙達旦微委委見蝌蚪閣閣已在兹夜聲一何喧丨丨乃寖丨詳見前注古今合璧事類備要别集卷九十
