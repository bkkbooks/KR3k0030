body:
  text: 古今合璧事類備要後集卷二十六宋謝維新撰六部門總尚書總侍郎總郎中總員外郎歷代沿革秦時少府遣吏四人在殿中主發書故謂之尚書通典漢初因之武昭以後其任稍重六典成帝建始四年置尚書五人一人為僕射而四人分四曹掌圖書祕記章奏之事各有其任一曰常侍曹主丞相御史公卿事二曰二千石曹主刺史郡國事三曰民曹主吏民士書事四曰主客曹主外國夷狄事後又置三公曹主吏獄是為五曹晋百官表尚書舊不分曹至是始分曹通典注光武親攬吏職天下事皆上尚書與人主參决乃下三府六典又改常侍曹為吏部曹主選舉齊祀事後漢書漢末改吏部為選部六典靈帝以侍中梁鵠為選部尚書舊尚書雖有曹名不以為號至是始以曹名為號晋志魏有五曹吏部左民客曹五兵度支晋置六曹吏部三公客曹駕部屯田度支而無五兵渡江有五尚書吏部司部五兵左民度支宋齊梁各有六尚書味梁起部不常置興立宫廟權置事畢省陳置尚書五員後周依周官置六卿隋改為六部尚書唐因隋制六典建官國朝國初太祖太宗監藩鎮之弊乃以尚書郎曹卿寺官出領外寄三嵗一易坐鎮外重分裂官之勢尚書侍郎郎中員外郎與九寺五監皆為空特以寓祿秩序品位而已省臺寺監往往他官兼領故自真宗仁宗以來議者多以正名為請咸平中楊億首言文昌㑹府有名無實宜復其舊既而言者相繼乞復二十四司之制至和中吳育亦言尚書省天下之大有司而廢為間所當漸復之然朝論異同未遑釐正神宗即位慨然欲更其制熙寧末始命館閣校唐六典元豐三年以摹本賜羣臣乃置局中書命翰林學士張璪等詳定八月下詔肇新官制凡省臺寺監領空名者一切罷去而易之以階五年詳定所上寄祿格而臺省寺監之官各還所職矣神宗嘗論蘇綽建復官制上自朝廷下至州縣悉分為六曹體統如一今先自京師候推行有序即監司州縣皆可施行六曹尚書侍郎為長二元祐初置權尚書俸賜依守侍郎班序在試尚書之下四朝志正三品崇寧罷紹興入年復置權尚書十年詔食邑格內將權尚書在左右散騎常侍下中興會要事類訥言帝曰龍朕聖臧說殄行震驚朕師命汝作丨丨夙夜出納朕命惟允尚書又漢明帝詔尚書蓋古之丨丨出納朕命機事不密則害成可不謹歟漢官儀司㑹丨丨主天下之大計二官之長若今尚書周禮注四曹漢成帝初置尚書四人分為丨丨常侍曹尚書主公卿事二千石曹尚書主郡國二千石事民曹尚書主凡吏上書事客曹尚書主外國夷狄事後漢官志六曹世祖承遵後分二千石曹又分客曹為南主客曹北主客曹凡丨丨同上八座後漢有六曹尚書並令僕二人謂之丨丨尚書魏凡五尚書二僕射並令為丨丨分紀曵履前鄭崇字子游為尚書僕射數諫諍上納用之每見丨革丨上笑曰我識鄭尚書履聲本𫝊賜劒章帝丨尚書丨一手署姓名韓凌淵深有謀故得龍泉劍郅夀明逹有文才故得文淵劍陳寵敦素有善於內不記見於外故得煆成劒皆書名而表意東觀漢委珠交址太守張恢坐臧千金徴還伏法以資物簿入大司農詔班賜羣臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰此臧穢之寶誠不敢拜帝嗟嘆曰清乎尚書之言乃更以庫錢三十萬賜意轉為尚書楊意後本𫝊正直朱穆為尚書讜言丨丨謝承後漢書方毅黃琬丨丨亷貞為尚書續漢書蹇諤朱朗字少英入為尚書丨丨平省不屈豪右謝承後漢書平正荀緄字伯條拜尚書緄性明寬敏於衆職以風羣僚秉機丨丨直道而行是時內外公卿大夫莫不敬憚同上機衡尚書職在丨丨宫禁嚴密後郎顗𫝊樞要天下丨丨在於尚書韋彪𫝊喉舌李固疏曰陛下有尚書猶天之北斗北斗為天丨丨尚書陛下之丨丨李固𫝊又近譬丨丨逺譬樞斗隋江總讓尚書表又代宗大厯四年詔曰詩云仲山甫王之丨丨皆尚書之位唐韋要定舊制伏湛拜尚書典丨丨袁嵩漢書間舊典李固薦楊淮丨練丨丨且有幹用宜在機密特拜尚書益部耆舊𫝊習舊事王博拜尚書明敏丨漢家丨丨分紀門故事侯霸光武時拜尚書時無典故事朝廷又少近臣霸丨習丨丨每春下寬大之書奉四時之令皆霸所建也本傳總機事唐虞曰納言周曰內史機事所總號令攸發漢官解話典樞機韋彪上疏曰欲急世所務當先除其患源在尚書丨丨丨天下事一决之不可私也華嶠後漢書典機密尚書唐虞官也龍在納言詩云仲山甫王之喉舌秦改稱尚書漢亦尊此官丨丨丨也漢官儀試對拜後漢翟酺時尚書有闕詔將大夫以上丨丨政事第一天文道術以第一者補之由是酺對第一丨尚書焉本傳疏薦拜後左雄虞詡上丨丨之曰雄有王臣蹇蹇之節宜擢任喉舌之官必有弼正之孟由是丨尚書叱𢃄劒後漢張陵為尚書省嵗朝梁兾丨丨入省陵叱兾令出敕虎責奪其劒百僚肅然兾弟不疑曽舉陵孝廉謂曰昔之舉君所以自罰也陵曰今申公憲以報私恩本傳呵置弓朱穆拜尚書正月百官朝賀畢虎賁當陛下丨丨於地曰此天子弓誰敢于越穆乃呵之曰天子弓當載之盾首之上乃敢置地大不敬即收虎賁付詔獄治罪莫不肅然張璠漢記古六卿任魏世事統臺閣重內輕外故八座尚書即丨丨丨之丨也衛盧久居斯位不忝厥職魏志制九品法陳羣為尚書丨丨丨為官人之丨同上萬事之本晋康帝詔曰尚書丨丨丨丨朕所責成也康帝起居注八座之位蔡謨上疏曰八座之任丨丨丨丨晋本𫝊杜預武庫丨丨為尚書損益萬機不可勝數朝野代焉號曰丨丨丨言其無所不有王隱晋書山公啓事山濤為尚書令領吏部每一官缺輒啓擬數人甄拔人物各為題目時稱丨丨丨丨晋本𫝊銅印墨綬尚書令秩千萬銅丨丨丨冠進賢兩梁冠晋百官志佩刀簪筆尚書丨契丨囊執板加丨丨焉袁子正書又周捨問劉杳尚書官著紫荷相傳云挈囊竟何所出答云張安世傳云囊簪筆事武帝數十年注云囊槖也近臣簪筆以待顧問南史特令早拜蔡景歷拜度支尚書舊式拜官在日午後景歷拜日適逢駕幸𤣥武觀在位皆侍宴帝恐景歷不預丨丨丨丨其見重如此同上莫不仰羡後魏肅宗舉觴為羣臣曰袁尚書朕之杜預故以杯屬元凱侍坐者丨丨丨丨北史文昌政本陳後上授江總尚書册文曰丨丨丨丨司㑹要經况其五曹斯納百揆南史文昌天府尚書出納王命敷奏萬機蓋政令之所由宣選舉之所由定罪賞之所由正斯乃丨丨丨丨隋百官志改太常伯龍朔二年丨尚書為丨丨丨咸亨元年復舊唐百官志曰文昌臺光宅元年改尚書省丨丨丨丨俄曰文昌都省同上上建下制尚書省令一人其屬有六一曰吏部二曰戶部三曰禮部四曰兵部五曰刑部六曰工部庶務皆㑹决焉凡丨之丨丨其丨有六下之逮上其制有六天下大事不决者皆上尚書省同上前中後行開元令尚書六曹吏部兵部為丨行戶刑為丨行禮工為丨丨通典宜擇修潔髙馮正觀初上五事曰如尚書八座之人所責成者也丨丨溫厚丨丨者任之本𫝊妙選德望唐元宗欲用牛仙客為尚書張九齡諫曰不可尚書古之納言有唐以來多用舊相居之不然歷踐內外清貴之地丨丨有丨丨者克之仙客本河湟一使典耳拔升清流齒班常伯此官邪也通鑑文昌左轄臣聞尚書百揆翊亮萬機故天上尊北斗中樞陛下有丨丨丨丨桞子厚為樊左承孫官表宗伯亞相顔真卿為馮翊太守對上表云丨丨丨丨顔真卿文集寄祿官凖國初用除尚書侍郎郎官以丨丨丨之髙下為丨一品以上為行二品為二品為誠守三品為權職略依學士例元豐五年四月詔六曹尚書丨翰林丨丨六曹侍郎給事中依直學士例朝謝日不以行守試並賜服佩魚罷職除他官日不帶行㑹要上孟簡書愈白蒙惠書云有人傳愈近少奉釋氏者妄也潮州時有一老僧號大顛頗聰明識道理逺地無所可語者故自山召至州郭留十數日實能外形骸以理自勝不為事物侵亂與之語雖不盡解要且胸中無滯礙自以為難得因與往來及祭神至海上遂造其廬及來袁州留衣服為别乃人之情非崇信其法求福田利益也孔子云丘之禱久矣凡君子行已立身自法度聖賢事業具在方冊可效可師仰不愧天俯不怍人內不愧心積善積惡殃慶自各以其類至何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎愷悌君子求福不回𫝊又曰不為威惕不為利疚假如釋氏能與人為禍􅑂非守道君子之所懼也况萬萬無此理且彼佛者果何人哉其行事類君子邪小人邪若君子也必不妄加禍於守道之人如小人也其身已死其鬼不靈天地神秪昭布森列非可誣也又肯令其鬼行胸臆作威福於其間哉進退無所據而進奉之亦且惑矣且愈不助釋氏而排之者其亦有說孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不明則三綱淪而九法斁禮樂崩而夷狄橫幾何其不為禽獸也故曰能言拒揚墨者皆聖人之徒也楊子雲云古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢且將數百年以至於秦卒滅先王之法燒除其經坑殺學士天下遂大亂及秦滅漢興且百年尚未知修明先王之道其後始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乘隔不合不公二帝三王羣聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何補然猶賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不收所謂存十一於千百安在其能廓如也然向無孟氏則皆服左袵而言侏離矣故愈嘗推尊孟氏以為功不在禹下者為此也漢氏以來羣儒區區修補百孔千瘡隨亂隨失其危如一髮引千鈞綿綿延延寖以微滅於是時也而唱釋老於其間鼓天下之衆而從之嗚呼其亦不仁甚矣釋老之害過楊墨而於韓愈之賢不及孟子孟子不能救於未亡之前而韓愈乃欲全之於已壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在傍又安得因一摧折自毁其道以從於邪也韓愈上孟簡尚書上李實書愈來京師於今十五年所見公卿大臣不可勝數皆能守害奉職無過失而已未見有赤心事上憂國如家如閣下者今年已來不雨者百有餘日種不入土野無青草而盜賊不敢起穀價不敢貴百坊百二十司六軍二十四縣之人皆若閣下親臨其家老姦宿贓銷縮摧沮魂亡魄喪影滅迹絶非閣下條理鎮服布宣天子威德其何能及此韓愈上李實尚書書詩集藻鑑持衡留丨丨聼履上星辰杜甫銓衡符彩照千里丨丨總九流劉斌和許給事傷牛尚書北斗尊尚書丨丨丨月夜顔真卿集啜茶聨句北斗司丨丨丨喉舌東方領縉紳杜甫統庶事尚書丨丨丨官人承法憲應􅟛雜詩本百官聼履星辰北斗寒三能只隔寸雲間周家冡宰均四海漢制尚書丨丨丨楊誠齊送顔尚書總侍郎歷代沿革隋煬帝二年尚書六曹吏部禮部兵部刑部戶部工部各置侍郎一人以二尚書之職並正第四品六典注今之侍郎其置自此始也夫侍郎之名舊矣漢凡諸郎掌更直執㦸宿衛諸殿門以侍衛之故通謂之侍郎故武帝時東方朔為郎當時謂之官不過侍郎位不過執㦸是也尚書亦有侍郎通典注尚書郎初入臺稱郎中滿嵗稱侍郎漢官儀梁尚書郎初入臺稱郎中功髙者轉為侍郎是也五代史忠案前代郎中侍郎兩署侍郎即今郎中之任郎中即今員外郎之任徐堅初學記隋帝諱忠不置郎中同上尚書二十四司諸郎皆謂之侍郎通若今之郎官非六部侍郎之任也通典注自煬帝署六曹侍郎於是改諸司侍郎但曰郎又改吏部為選部郎禮部為儀曹郎兵部為兵曹郎刑部為憲曹郎工部為起曹郎以異六侍郎之名通典唐武德六年廢六司侍郎貞觀二年復同上降為正四品下惟吏部侍郎為正四品上龍朔一年改為少常伯咸亨元年復為侍郎總章元年吏部兵部各增侍郎一員六典注國朝以為階官至元豐官制行始有職掌元祐二年時初置權侍郎從四品如未歷給事中中書舍人及待制以上者並帶權字祿賜比諫議大夫四朝志崇寧改元遵元豐舊罷權侍郎建炎四年復置見中興會要事類文書侍郎三十六人四百石一曹有六人主作丨丨起草後百官志章奏後陽球字方正為尚書侍郎丨丨處議為臺閣所崇信本𫝊逹故事陽球間丨丨丨同上彌舊章謝承父嬰為尚書侍郎伏事丹墀丨綸丨丨謝承後漢書三年稱尚書郎初從三署詣臺試初上臺稱守尚書郎中嵗滿稱尚書郎丨丨丨侍郎蔡質漢儀見後百官志注四百石見前主文書注宗常伯唐龍朔二年改侍郎丨丨丨咸亨中復舊唐百官志注六卿副丨丨之丨百工牧唐制尚德之舉侍郎官重丨丨丨丨顗宜當之韓愈舉韋顗自代狀衣冠華選侍郎自皇朝以來為丨丨之丨丨自非履歷清望實具美者無以居之類要文昌二卿丨丨丨丨位次八座東坡文除陸佃制詩集中臺微入丨丨作侍郎韓愈贈馬侍郎總郎中歷代沿革西漢置尚書郎四人分掌尚書事通典光武分尚書為六曹每一人尚書則領六郎凡三十六郎焉初學記初秦置郎中今其屬官有三署五官中郎將左中郎右中郎將凡三署署中有郎中侍郎無員多至千人分𨽻三署主執㦸侍官殿出則充車騎漢因之漢官云尚書郎初從三署郎選詣尚書臺試每一郎缺則試五人先試箋奏初入臺稱尚書郎中滿嵗稱尚書郎三嵗稱侍郎故郎中侍郎之名猶因三署本號也初學記西漢言郎者多非尚書郎唯田蚡少為諸曹郎也馮唐為郎中署長直不疑盜同舍郎金郎顔駟為郎三世不遇楊雄為侍郎及諸言以資為父任為郎皆三署郎至東漢猶難分有尚書及曹名冠首者即尚書直言為郎者亦三署魏二晋以後無三署郎主作文書草通典魏自黃初改祕書為中書置通事郎掌詔草而尚書郎有二十三人非復漢時職任通典自漢以來尚書諸曹郎中侍郎或不兩置漢代兩置其職則同魏晋宋齊唯置郎中梁陳兩置後漢北齊唯置郎中隋開皇中置侍郎隋諱忠不置郎中煬帝改曰郎唐改為郎中六典注龍朔二年改為大夫咸亨光宅神龍並隨曹改復六典本朝元豐官制行郎官理郡守以上資任者為郎中四朝志乾道二年詔今後非曽任守臣不得除郎官著入條令孝宋㑹要郎中員外郎亦自為兩等頗自履歷而授之後來相承必欲以關升知州資序為郎中於是拜員外者具改官實歷嵗月申吏部不以若干任但通理細滿八考則升知州乃作正郎别命給告頃常有㫖初除郎官雖資歷已髙且為員外郎侯吏部再申然後升作郎中事類握蘭尚書郎伏奏事黃門郎對揖跪受故稱尚書即懷香丨丨趨走丹墀應邵漢官儀又漢尚書郎口含雞舌香以其奏事答對欲使氣息芬芳也宋百官志起草尚書郎主作文書丨丨更直於建禮門內同上青瑣黃門郎日夕入對丨丨門拜漢官儀丹墀見上握蘭注又省中皆以胡粉塗壁畫古賢烈士以丹朱漆地故謂之丨丨通典賜筆漢尚書郎月丨赤管大丨一雙隃糜墨一丸同上給被尚書郎入直官丨青縑白綾丨或以錦被給帷帳茵褥通中枕太官供食物湯官供餅餌及五熟果實之屬五日一美食下天子一等漢官儀又徐堅初學記題柱田鳳字季宗為尚書郎容儀端正入秦事靈帝目送之因丨丨曰堂堂録乎張京兆田郎三輔决宿臺黃香為尚書郎常獨丄丨丨上晝夜不離省闥帝聞而善之類要伏省馮豹為尚書郎每奏事未報常丨丨下或自昏至明天子默使人持被覆之摯虞三輔史録列宿後漢館陶公主為子求郎不許明帝謂羣臣曰郎官上應丨丨出宰百里本紀積星後楊秉上疏太微丨丨名為郎位入奉宿衛出宰百里楊秉傳又太微宫後十五里蔚然曰郎位史記無員五官中郎將一人主五官郎五官郎中丨丨凡郎官皆更主直執㦸衛侯殿門百官志顯職虞詡曰臺郎丨丨乃類筮仕之通階職恪勤胡廣舉孝廉為天下第一旬月拜尚書郎丨丨職事所掌兼治兩曹續漢書畏謹徐防補尚書郎職典樞機周密丨丨奏事三世未嘗有過云類要白首馮唐丨丨屈於郎荀恱漢紀清行安帝元初六年詔中郎將選孝廉郎寬博有謀丨白丨髙者出補令承尉後安帝紀孝廉國家舊法選尚書郎以丨丨取也魏武集選舉令威容杜軫為尚書郎丨丨可視華陽國志髙選華談曰吳時餘曹通為丨丨而吏部時一時之俊通典清望舊選尚書郎極丨丨也山濤啓事水鑑樂廣為尚書郎與何晏鄧揚等談講衛瓘見而竒之曰常恐微言將絶今復聞之命諸子造焉謂曰人之丨丨也每見此人瑩然如披雲霧而覩青天也王隱晋書郎府郎位十五星在帝位東北一曰依烏丨丨也三省郎中是其職也晋天文志廊廟才索靖子綝字巨秀少有逸羣之量靖每曰丨丨之丨非簡札之用州郡吏不足汙吾兒也舉秀才除郎中晋書宰士俊鄧遐有才義論者以為丨丨之丨冝用為郎朝之選臺郎皆丨丨俊丨當足處事宜辨正凝滯也晋裴秀奏事邦之俊臺郎御史丨丨丨茂若出宰牧守頌聲興矣晋起居注清美選晋尚書郎選極丨丨號為大臣之副通典繁劇任郭璞除尚書郎表辭曰今以劣弱之質任督責之官以無用之才管丨丨之丨且臺郎清顯論望冝允者郭璞𫝊襆被徑出魏舒為尚書郎時郎選或有非其人者論者欲沙汰之舒曰吾即其人也丨丨丨丨同僚素無清論者咸有愧色談者莫不詠其髙晋本𫝊給帳入直尚書郎入直官供青縑白綾後或以錦繅為之給帳帳氈褥如侍使二人選端正妖麗執香爐護衣服奏事明光殿宋百官志皆須稱職永昌五年敕六官分事四方取則尚書郎丨是妙選丨丨丨司馬焉唐㑹要不以賞能開成四年鹽鐵推官姚朂鞠問河隂黠吏得實除職方員外郎右丞韋溫土疏以郎官朝廷之清選丨可丨丨丨吏續通典豈才郎邪李林甫源乾曜執政乾曜子潔為林甫求司門郎中乾曜素薄之曰郎官應得才望哥奴丨丨中丨丨哥奴林甫小字也通典至郎足矣孔若思勵學擢明經歷庫部郎中嘗曰仕宦丨丨中丨丨座右置水一石明自足意同上往自星郎丨丨丨丨爰東天憲唐大詔令楊國忠制為吾望郎嘉乃令子丨丨丨丨元微之行韋審規父漸制古之元士郎官丨丨丨丨天下之務多所關决其於損益大矣常衮制詩集清要郎官丨丨為世稱韓愈永貞行清覽振鷺齊飛日遷鶯逺聼聞明光共待漏丨丨各披雲蘇味道間崔馬並拜臺郎廊廟舉喜得丨丨丨嗟為臺閣分逺從南斗外遙仰列星文同上錦帳座叨陪丨丨丨注漢百官志郎官有丨丨杜呈送湖南親交總員外郎歷代沿革隋開皇三年尚書二十四司各置貟外郎一人通典謂本員之外復置郎也六典掌其曹之版籍侍郎闕則釐其曹事此今員外郎所由始也通典又注曰歷代尚書郎各以曹名為稱首或謂之侍郎皆無員外之號前代史傳及職官要録或有言員外郎者蓋謂員外郎散騎侍郎耳非尚書之職也煬帝三年每司减一郎置承務郎一人同開皇員外之職唐尚書諸曹各置員外吏部置二人龍朔咸享光宅並隨曹改復六典注本朝元豐官制六曹郎官理郡守以上資任者郎中通判以下資序者為員外郎雖理知州資序未曽實歷知州及志監司開封府推判官者止除員外郎四朝事類散郎外郎丨丨也漢惠帝紀注副郎韋侯以考功丨丨守盛山韓文盛山十二詩集彌重其選晋宋以還尚書者置員外分判曹局唐朝丨丨丨丨通典尤用其良昔陶𢎞景代之髙人始願四十為尚書郎而猶不遂國朝選著丨丨丨丨元稹授羅讓員外制古今合璧事類備要後集卷二十六
