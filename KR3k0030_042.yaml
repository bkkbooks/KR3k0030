年踰八十士艷其榮同父謝事李東之子孝基與父同丨丨才年五十士大夫美之以比二疏不治田園李日知為刑部尚書屢乞骸骨許之日知有請不謀於家歸乃治行妻驚曰産利空空何辭之遽日知曰仕至此已過吾分人亦何厭之有若厭於心無日而足也丨丨丨丨惟飾臺池引賓客與娛樂斥賣車騎關播以太子少師致仕丨丨丨丨闔門不嬰外事園林賞詠盧簡求以太子太師致仕還於東都有丨丨别墅嵗時行樂子弟侍側公卿在席詩酒丨丨竟日忘歸池臺奉養尉遲恭致仕末年篤信仙方飛鍊金石穿築丨丨崇飾羅綺常奏清商樂以自丨丨不與人交放歌長嘯歐陽矩移書至陸司勳云論或不行言或不用則乞骸歸去吳越援景山川如繡鱸鱠蓴羮丨丨丨丨夫如是永為陸司勳庶幾乎不朽歸耕築墉宋璟求致仕表臣竊祿簪裳備骸廊廟霜毫生額雪刺滿頭求丨丨養丨丨巖穴樂太平之世允荷聖朝開元遺事劾請奪俸栁公權大中十三年天子元㑹公權稍耄忘先羣臣慶賀占奏忽謬御史劾之議者恨其不歸事咸通初乃以太子太保致仕迫使致仕鮑防初與知雜御史竇參遇導騎不引避參謫其僕及為相防尹京兆丨丨丨丨授工部尚書防叱曰吾與蕭頎子齒而同昕老坐宰相餘忿邪不得志卒不伏致仕武后時夏官侍郎侯知一以年老敇令致仕知一乃詣朝堂跳躍馳走以示輕捷時謂知一丨丨丨丨朝野僉載悔已致仕崔咸舍人嘗受張公之知及懸車之後公與議行止咸極言贊美公便令製奏一章以請三數月後門館閴靜寂寞家人輩竊罵之公後亦悔遂語子弟曰後有大段事勿與少年郎議致仕著書參政趙公槩致仕居睢陽十五年猶以讀書著文憂國愛君為事集古今諫諍為諫林一百二十卷奏之賜詔曰當置座右以時觀閲告老辭闕元豐七年春文太師告老奏乞赴闕親辭天陛庶盡臣子之誠既見神宗即日賜宴顧問溫密留京師一月凡對上者五錫宴者三賜詩再顧問不名稱曰太師寵數優異近世無比賦詩自娛范景仁既退居有園第在京師專以讀書丨丨丨丨客至無貴賤皆野服見之不服報謝抗章求退歐陽文忠公在蔡州屢丨丨乞致仕門生蔡承禧因間言曰公德望為朝廷倚重且未及引年豈容遽去也歐公答曰修平生名節為後生輩描畫盡惟有早退以全晚節豈可更俟驅逐乎倦遊録不忘國事富文忠公弼雖居家而朝廷有大利害知無不言言行録自削奏牘近年或有乞致仕者親戚相怪且痛其死矣豫同年仇伯玉粹夫為户部侍郎一日報乞致仕未幾逢於朝路因訊之曰未嘗有疾亦未嘗告老不知何為也粹夫善詼諧乃告曰前日兒子亦自馮翊奔而來以為死矣且來草閲躃踊一巡又云近時士大夫多因病篤下致仕豫在大農忽得目疾乞宫觀已而掛冠年六十二矣恐四方親友驚歎乃丨丨丨丨叙致頗詳其末云乞骸以去敢希漠傅之髙風鼓腹而嬉願遂堯民之至樂王彥輔麈史騎牛從好劉渙凝之為潁上令掛冠隱廬山嘗作丨丨歌曰我騎牛君莫笑萬事丨吾丨時陳舜俞謫居山南亦乘黃犢相與往來野服為禮滎陽吕公嘗言京洛致仕官與人相接皆以間居丨丨丨丨某衰朽無狀雖幸已叨誤恩許致其事而前此或蒙賓客不鄙下訪初亦未敢遽援此例便以老大野逸自居近緣久病艱於動作屈伸俯仰皆不自由遂不免遵用舊京故俗輒以野服從事然而上衣下裳大帶方履比之凉衫自不為簡其所便者但取束帶足以為禮解帶可以燕居免有拘孿纒繞之患脫著疼痛之苦而已切望深察恕此病人且使窮鄉下邑得以復見祖宗盛時京都舊俗其美如此亦補助風教之一端也朱元晦客位咨目棄官投傳而去周景辟陳蕃為别駕以論不合丨丨丨丨投版而歸范滂為光祿主事執公儀見光祿勳陳蕃蕃不止之滂因棄官郭林宗聞而讓蕃不能折腰陶淵明為彭澤令曰今日丨丨為五斗丨丨於鄉里小兒乃棄官作歸去來詞淵明在官八十餘日解印去縣未嘗有所造詣所之惟至田舍及廬山遊觀而已所貴適意張翰字季鷹為齊王東曹掾在洛陽見秋風起因思吳中蓴菜羮鱸魚鱠曰人生丨丨丨丨何能羇宦數千里以邀名爵乃命駕東歸世說當為雄飛趙溫子柔為京兆郡丞歎曰大丈夫丨丨丨丨焉能雌伏遂棄官而去不為禍逐宋王秀之為晋平太守期年求還曰此郡沃壤珍貨日至人所昧者財財生則禍逐智者不昧財亦不逐禍吾山資已足豈可久留以妨賢路府官見責貢禹為河南令以賊事為丨丨丨丨免冠謝禹曰冠一免豈可服冠耶遂去官漢書太守有嫌晋陶侃補武署令與丨丨吕嶽丨丨遂棄官而歸恥為府屬郝處俊轉滕王友丨丨王丨丨棄官去見薄刺史劉幽求制科中第調閬中尉刺史不禮棄官去本傳毁車逺遁馮良年三十為尉奉檄書迎督郵即路慨然恥在厮役因毁車殺馬裂衣冠遁至犍為從姜橅學妻子求索蹤跡斷絶後見草中有敗車死馬衣裳朽腐以為虎狼盜賊所害發喪制服十許年乃還鄉里後漢周稚傳焚章長嘯張褒梁天監中不供學士職御史欲彈劾褒曰碧山不負吾乃丨丨丨丨而去杜甫贈柏學士詩碧山學士焚銀魚蓋用此也徒步棄歸肅宗為太子而左補闕薛令之兼侍讀時東宫官積年不遷令之書壁言禮之薄帝見復題聽自安令之即棄官徒步歸鄉唐書輕舟潛去王績大業中舉孝悌廉潔授祕書省正字不樂在朝求為六合丞以嗜酒不任事時天下大亂因劾遂解去歎曰網羅在天吾且安之遂出所受俸錢積於縣城門前托以疾丨丨夜遁本傳灌畦自適元結父延祖不仕年過四十親婭疆勒之再調舂陵丞輒棄官去曰人生衣食可適飢飽不宜復有所須每灌畦掇薪以為有生之役過此吾不思也唐書負薪自給杜甫為華州司功參軍關輔饑輒棄官去客秦州丨丨採橡栗丨丨放情沈浮武元衡為華原令時畿輔不鎮軍督將恃恩矜功者多撓吏民元衡苦之乃稱病去官丨丨事外丨丨宴詠者久之僖宗知其才召授比部員外郎舊史杜門謝絶趙光逢昭宗時為御史中丞以世亂棄官洛陽杜門絶人事詩集知止足昔在西京時朝野多歡娛藹藹東都門羣公祖二疏朱軒曜金城供帳臨長衢達人丨丨丨遺榮忽如無抽簪解朝衣散髮歸海隅行人為隕涕賢哉此丈夫揮金樂當年嵗暮不留儲顧謂四座賓多財無纍愚清風激萬代名與天壤俱咄此蟬冕客君紳宜見書張景陽詠史厭富貴我公丨丨丨常苦勳業尋相期赤松子永望白雲岑清風出談笑萬竅為號吟吟成超然詩洗我蓬之心嗟我本何人麋鹿强冠襟身微志空大交淺言屢深囑公如得謝呼我幸寄音但恐酒錢盡煩公揮槖金蘇子瞻和潞公超然臺斗塵纓丨藪丨丨捋白鬚半酣扶起問司徒不知詔下懸車後醉倒狂歌有例無白居易寄裴晋公脫朝衣眼前軒冕是鴻毛天上人情謾自勞丨却丨丨便東去青雲不似白雲髙趙嘏送蕭相公掛冠自在欲掛衣冠神武門先尋水竹渭南村却將舊斬樓蘭劔買取黃牛教子孫唐人題關右寺壁石南北東西無所羇丨丨丨丨勝分司探花嘗酒多先到拜表行香盡不知炮笋烹魚飱飽後擁袍枕臂醉眠時報君一語多應笑兼亦無心羡保釐白居易投紱歸來丨丨丨丨萬事輕消磨未盡祇風情舊因蓴菜求長假新為楊枝作短行不補自安緣夀骨苦藏難密是詩名淺斟杯酒紅生頰細琢歌詞穩稱聲蘇子瞻和張郎中賜剡川湖賀知章年八十六卧病冥然無知疾損上表乞為道士還鄉明皇許之捨宅為觀賜名千秋仍賜鑑湖剡川一曲詔令供帳東門百寮祖餞御製送詩云遺榮期入道辭老競抽簪豈不惜賢達其如髙尚心寰中得袐要方外散幽襟獨有青門餞羣英悵别深唐詩紀事得午橋莊張齊賢相以司空致仕歸洛康寧福夀丨晋公丨丨丨鑿渠通流栽花植竹日與故舊乘小車擕觴遊釣榜於門曰老夫已裂冠冕或公紱垂訪不敢迎見嘗以詩戲故人云午橋今得晋公廬水竹烟花興有餘師亮白頭心已足四登兩府九尚書泉石間身孫集賢冕天禧中直史館幾三十年晚守蘇已及期年大書詩於㕔壁拂衣而去詔下公已歸矣其詩曰人生七十鬼為鄰已覺風光屬别人莫待朝廷差致仕早謀丨丨養丨丨去年河北曽逢李今日淮西又見陳李見素陳莊皆差致仕寄語姑蘇孫太守也須抖藪老精神明山録風月間人趙叔平退居睢陽歐陽永叔致政居潁叔平來訪永叔時吕晦叔知潁開宴召二公永叔自為致語其詩曰欲知盛席繼荀陳請看當筵主與賓金馬玉堂三學士清丨明丨兩丨丨紅芳已過鶯猶囀青杏初嘗酒正醇好景難逢良㑹少乘歡舉白莫辭頻倦遊録老鴻入𡨕張退傳與文惠同時秉政張既以帝傳致政有詩寄文惠曰赭案當年並命時蒹葭衰颯倚瓊枝皇恩乞與桑榆丨丨丨髙丨鳳在池倦遊録老鳳蹲池曽魯公自嘉祐秉政至熙寧中尚在中書年雖甚髙而精力不衰故臺諫無非之者惟李復圭嘗作詩譏之云丨丨池邊丨不去飢烏臺上噤無聲魯公遂致仕云叔姪同辭張鑄希顔祥符中登進士甲科歷四郡守五任漕憲嘗帥南陽王介甫乃其門人也與姪昷並以光祿卿致仕同歸鄉縉紳榮之杜祁公贈詩云七十引年遵禮經君家何事最為榮清朝丨丨丨丨祿歸去田園盡列卿鄉鄰樂飲范景仁鎮喜為詩年六十三致仕一朝思鄉里遂徑行入蜀故人李才元大臨知梓州景仁枉道過之歸至成都日與丨丨丨丨散財於親舊之貧者遂遊峩眉青城山下巫峽出荆門凡期嵗乃還京師作詩凡二百五篇其一聨云不學鄉人誇駟馬未饒吾祖泛扁舟此二事他人所不能用迃叟詩話棄官休官林下詩人類以棄官求隱為髙而謂軒冕榮貴為外物然鮮有踐其言者故韋丹與僧靈徹為忘形之契寄徹詩云王事紛紛無暇日浮生冉冉只如雲已為子午歸休計五老峯前必共論徹酬詩曰年老心間無外事麻衣坐草只容身相逢盡道丨丨去丨丨何曽見一人蓋譏之也雲溪友議歸間水邊趙嘏云早晚粗酬心事了水邊歸去一閒人若身事了則仕進之心益熾愈無歸期矣王易簡云青山得去且歸去官職有來還自來此豈能須臾忘情於軒冕耶余嘗於驛舍見人題壁云謀生待足何時足未老得間方是間余深味其言服其精當而歸未能行也此與夫一日看除目三年損道心者異矣遁齊閒覽古今合璧事類備要前集卷四十二
