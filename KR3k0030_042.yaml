body:
  text: 古今合璧事類備要前集四十二宋謝維新撰仕進門貶謫附祠居事類四裔投諸丨丨以禦魑魅左文五流丨丨有宅五宅三居書貶爵一不朝則丨其丨孟子免官丨所居丨漢書俟罪恭承嘉惠兮丨丨長沙賈誼賦伏竄鸞鳳丨丨兮鴟梟翺翔緩死丨丨申恩徙於瘴癘六帖削迹頻謫逺郡丨丨朝端李雍云屏斥凶族舜流共工於幽州放歡兜於崇山竄三苗於三危殛鯀於羽山書囚奴正士丨丨丨丨注箕子以正諫而為囚奴書令尹三已令尹子文三已之無愠色士師三黜栁下惠為士師三黜曰直道而事人焉往而不三黜行吟湘澤屈原既放丨丨丨丨畔為懷沙賦沈汨羅而死貶謫長沙賈誼謫長沙太傅有鵩飛入誼舍止於坐隅鵩似梟不祥鳥也誼居長沙卑濕自傷以為夀不得長乃為賦以自廣受窘獄吏周勃下廷尉吏稍侵辱之勃以千金與獄吏吏乃書牘背示之勃既出曰吾嘗將百萬軍然安知獄吏之貴乎見辱黃門陳蕃送黃門北寺獄黃門從官騶踏蹴蕃曰老死魅復能損我曹員數奪我曹廩假否居常鞅鞅髙祖赦韓信封為淮隂侯信稱病不朝丨丨丨丨與絳灌等列過樊將軍噲噲跪拜送迎言稱臣曰大王肯臨臣信出門笑曰生乃與噲等伍怪書咄咄殷浩被黜談詠不輟雖家人不見其有流放之感但終日書空作咄咄怪事四字而已浩甥韓伯隨至徙所經嵗還都浩送至渚側詠曹顔逺詩云富貴他人合貧賤親戚離因而泣下徙處五溪張九齡為宰相建言放臣不宜與善地悉徙五溪不毛處然九齡自內職出始安有瘴癘之歎罷政守荆州有拘囚之思身出遐陬一失意不能堪矧華人士族必致醜地然後快意哉議者以為開元良相而卒無嗣豈忮心失恕隂責最大雖他美莫贖耶劉禹錫曲江序貶死朱崖新繁縣有東湖德裕為宰日所鑿夜夢一老父曰某潛形其下幸庇之明府富貴今鼎來七九之年當相見於萬里外後於土中得一蟇徑數尺投之水中而德裕以六十三卒於朱崖果應七九之䜟公卒見夢於令狐綯曰公幸哀我使我歸葬綯曰衛公精爽可畏不言禍將及乃白於帝得以喪還瑣言隱者知數李德裕貶潮州著述雜序數十篇號曰窮愁志其論冥數曰豫自荆楚保釐東周路出方城有丨丨謂方城長曰此官人居守後二年南行萬里則知憾豫者必因天譴譖豫者乃為鬼謀雖抱至寃固不為恨唐書姻友避嫌楊慿貶臨賀尉丨丨憚纍無往侯者獨徐晦至藍田慰餞宰相權德輿謂曰無乃為纍乎晦曰方布衣時臨賀知我今忍遽棄耶有如公異時為姦邪譖斥又可爾乎德輿歎其直李夷簡表為監察御史晦過謝夷簡曰君不負臨賀肯負國乎同上狗竇為門陸宣公至忠州土塞其門鹽菜由狗竇中端坐抄藥方兒姪亦罕與語㑹轉運使至京上問爾峽中過聞陸贄何面孔具以狀對上惻然拜太子賓客已卒丁用晦藝田録猿鳥與伍栁宗元謫侍永州司馬奉太夫人河東縣君溫凊未嘗見憂終於州之佛寺銜哀待刑不得歸奉喪事墓志唐吳武陵與孟簡書曰栁子厚斥已十二年程劉二韓皆已抆拭獨子厚與丨丨為伍春州極惡盧多遜貶朱崖諫議大夫李符求見趙普言朱崖雖在海外而水土無他惡丨丨雖在內地而至者必死望追改前命以外彰寬宥乃置於必死之地普頷之後月餘符坐事貶宣州行軍司馬上怒未已令再貶嶺外普具述其事即以符知春州到郡月餘卒湘山野録崖州為大丁謂謫丨丨嘗謂客曰天下州郡孰丨丨客曰京師也謂曰不然朝廷宰相為崖州司户則丨丨丨丨也聞者絶倒同上初丁謂既逐李文定於衡州遣使賫詔賜之不道所以李聞之欲自裁其子柬之救之得免謂因四行貶竄王欽若丁度等皆投之逺方時王沂公參政不平之曰責太重矣謂熟視久之曰居停主人恐亦不免也沂公踧然而懼因密謀去之以擅移山林劾謂雖沂公以計傾之而公議不以為非也龍川志直言遭貶唐質肅公介為御史論文潞公專權植黨交結宫禁仁宗怒召二府示之疏唐公語益切樞密副使梁公適叱唐公下殿詔送臺劾之公獨留再拜曰御史言事職也願不加罪於是唐公既貶而公亦罷相其後公再入相首薦唐公復召用焉言行録失容坐謫真宗朝張文定公齊賢元㑹上夀以微醺進上丨丨丨丨安州其麻曰仍復酣醟杯觴欹傾冠辨蓋謂是也青箱雜記無愧諸賢黃山谷謫宜州時黨禁甚嚴倅余若著為之經理舍館一日請曰先生今日舉動無愧東都黨錮諸賢願寫范孟博一傳許之遂默誦大書盡卷僅有二三字疑誤次年遂仙去盡呼相公陳瑩中云嶺南人見逐客不問官之尊卑丨丨丨丨豈非相受愛遊此乎近日瑩中赴龍城士美相繼過桂又報伯紀來因念瑩中言發一笑折彥質記與父同貶陳了翁自嶺外歸居明州嘗令其子正彚幹蠱錢塘聞蔡崈記說蔡京之福厚其事有動搖東宫之迹不敢隱默乃自陳於帥司蔡嶷時為杭帥方與京叙宗盟結死黨遂執正彚送京師而飛書告京俾為計事下開封制獄獄辭果不右正彚而公亦連逮開封尹李孝稱脅誘公使證正彚之妄公曰正彚聞蔡京將不利於社稷傳於道路遽自陳告瓘豈與知若瓘以所不知忘父子之恩而指其為妄則情所不忍挾私情以符合其說又義所不為况不欺不二乎昔所以事君教子豈於利害之際有所貪畏自違其言乎蔡京姦邪必為國禍瓘固嘗論於諫省亦不待今日語言間也時內侍黃經臣監勘聞公所對失聲歎息謂公曰主上正欲得實右司但依此供狀其後獄具正彚猶坐所言過實流竄海島公亦有安置通州之命遺事奉母就貶紹聖初黨禍起劉安世器之尤為章惇蔡卞所忌逺謫嶺外盛夏奉老母以行途人皆憐之器之不屈也一日行山中扶其母籃舁憩樹下有大蛇冉冉而至草木皆披靡擔夫驚走器之不動也蛇若相向者久之乃去村民羅拜器之曰官異人也蛇吾山之神見官喜相迎耳聞見録挈子隨侍東坡謫惠州獨以少子過自隨瘴癘所侵蠻蜒所侮胸中泊然無所芥蒂人無賢愚皆得其歡心疾苦者畀之藥殞斃者納之竁又率衆為大橋以濟病涉者惠人愛敬之大臣猶以為未足復以瓊州别駕安置昌化昌化非人所居食飲不具藥石無有所僦官屋以庇風雨有司猶謂不可則買地築室昌化士人畚土運甓以助之為屋三間人不堪其憂公食芋飲水著書以為樂時從其父老遊亦無間也墓志東坡在儋耳一日過黎子雲遇雨乃從農家借箬笠戴之著屐歸婦人小兒相隨爭笑與客對卧范忠宣謫居永州客至必見之對設兩榻多自稱老病不能久坐徑就枕亦授客一枕使與對卧數語之外往往鼻息如雷客待其覺有至終日不得交一談者僦屋獲罪紹聖中蘇轍貶雷州僦州人吳國鑑宅居為創一小閣元符初本州走馬承受段諷言其事詔提舉董必具實狀以聞必至雷置獄根治詔轍移循州知州張逢以下降罰有差國鑑編管及子厚謫雷州亦問舍於民民曰前蘇公來為章丞相幾破我家今不可也人以為報杜門不見蘇黃門子由南遷既還卜居許下多丨丨丨通賓客有鄉人自蜀中來者求丨之伺候於門彌旬不得通宅南有叢竹竹中為小亭遇風日清美或徜徉亭中鄉人既不得見則謀之閽人閽人使待於亭旁如其言復旬日果出鄉人因趨進黃門見之大驚勞久之曰子姑待我於此翩然復入逮夜竟不復出却掃編失明就道范忠宣公素苦目疾忽全丨其丨因上表乞致仕章子厚戒堂吏更不得上貶公永州安置公怡然就道或謂公近名公聞而歎曰七十之年兩目俱喪萬里之行豈其欲哉但區區愛君之心不能自已人若避好名之嫌則無為善之路矣哭子且行趙忠簡公鼎初謫潮州時哭其季子而行既行又喪長子嘗有帖云知舊多勸讀佛書使釋迦老子聞鼎此事亦當感動反遺􅀈金秦檜之千鬼萬怪如不樂這人貶竄將去却與他殷勤不絶一日忽招胡和仲文定子飯意極拳拳比其還家則臺章已下又送白金為􅀈如欲論其人章疏多是自為以授言者朱録與帶階官本朝舊法貶責人若是庶官亦須帶别駕或司馬無有帶階官者吕子約却帶階官安置同上祠居單騎出入司馬溫公為西京留臺每出前驅不過三節後官宫祠乘馬或不張蓋自持扇障日程伊川謂曰公出無從騎市人或不識有未便者公曰某惟求人不識耳王荆公居鍾山惟乘驢或勸其令人肩輿公正色曰自古王公貴人雖不道未嘗敢以人代畜也聞見録二龍間卧熙寧四年吕申公以提舉嵩山崇福宫居洛與康節溫公時相往來申公寡言一日對康節長歎曰民不堪命矣時荆公用事惟行新法者皆新進險薄之士故也康節曰王介甫者逺人公與君實引薦至此尚何言哉公作曰公著之罪也十年春公起知河陽河南尹賈公昌衡率溫公程伯淳餞於福先寺上東院康節以疾不赴明日伯淳語康節曰君實與晦叔席上各辨論出處皓以詩解之有丨丨丨丨洛波清願得賢人均出處之句後申公鎮河陽嵗餘召拜樞密副使哲宗即位拜左丞遷門下侍郎與溫公並相元祐如伯淳詩云詩集投嶺徼南天愁望絶亭上栁條新落日獨歸鳥孤舟何處人生涯丨丨丨世業陷邊塵江入千峯暮花連百越春秦臺憐白首楚水怨青蘋草色無征路鶯聲傍逐臣獨醒翻取笑直道不容身得罪風霜苦全生天地仁青山數行淚滄海一窮鱗流落誰相見空憐鷗鷺親劉長卿題千越亭貶潮陽一封朝奏九重天夕丨丨丨路八千本為聖朝除弊政敢將衰朽惜殘年雲橫秦嶺家何在雪擁藍關馬不前知汝逺來應有意好收吾骨瘴江邊投魑魅力犯雷霆衆共危逺丨丨丨獨為宜忠州學業真無負髙廟神靈固有知自倚聖明容直道未甘憔悴死荒陲滿朝卿相多公議莫把文章作楚詞仲訥送唐介度鬼門人鮓甕中危萬死鬼門關外更千岑問君底事向前去要試平生鐡石心黃魯直戲答劉文學交趾有鬼門關其南多瘴癘去者罕得生還諺曰鬼門關十去九不還唐李德裕貶崖州經此賦詩云一去一萬里千之千不還崖州在何處生度鬼門關千古名孤忠自許衆不與特立敢言人所難去國一身輕似葉髙名丨丨重於山並遊英俊顔何厚已死姦諛骨尚寒天意若為宗社計肯教夫子不生還李師中送唐介百世士東坡謫嶺南時宰欲殺之飽喫惠州飯細和淵明詩淵明千載人東坡百世士出處雖不同氣味乃相似十里海岸冦凖再相天禧末為丁謂所誣再貶雷州司户及境吏以圖獻抵海岸凡十里公恍然曰少時有到海祇十里過山應萬重之句乃今日意耳人生得喪豈偶然耶九死南荒東坡紹聖四年自惠州再責昌化寓城南天慶觀初軾與弟轍相别渡海既登舟笑謂曰豈所謂道不行乘桴浮於海者耶元符間徽廟登極量移廉州由澄邁北渡有丨丨丨丨吾不恨兹遊竒絶冠平生之句再涉鯨波寇忠愍公凖之貶也初以列卿知安州既而又貶衡州别駕又貶道州别駕遂貶雷州司户時丁晋公與馮相拯在中書丁當秉筆初欲貶崖州而丁忽自疑語馮曰崖州丨丨丨丨如何馮唯唯而已丁乃徐擬雷州丁之貶也馮遂擬崖州當時好事者相語曰若見雷州寇司户人生何處不相逢比丁之南也寇復移道州寇聞丁當來遣人以蒸羊逆於境上而收其僮僕杜門不放出聞者多以為得體歸田録踏開荆棘哲宗即位宣仁垂簾蔡確拜左僕射其弟碩贓敗確謫守安州夏日登車蓋亭十絶云公事無多客亦稀朱衣小吏不須隨溪潭直上虛亭裏卧展柴桑處士詩一川佳景疏簾外四靣凉風曲檻頭緑野平流來逺棹青天白雨起靈秋靜中自足勝炎蒸入眼兼無俗物憎何處機心驚白鳥誰人怒劔逐青蠅紙屏石枕竹方牀手倦拋書午夢長睡起莞然成獨笑數聲漁笛在滄浪西山髣佛見松筠日日來看色轉新聞說桃花巖石畔讀書曽有