以斯陳茍知防患之術終無焦爛之賔嗟長孺之昧道常喻此而求伸雖後來之高處亦居上之先焚使薪為能言之物豈容入爨而揚芬未若生幽崖之側紏芳桂之輪不近田野之燎免罹匠者之斤冒霰雪以終嵗齊天年於大椿張文潛燔薪賦嵗暮苦寒烈風不休先生家貧衣無重裘讀書夜闌爐炭已灰先生瑟縮凄然不怡顧謂童子與薪偕來童子曰是薪也陳之壁間自春徂冬風日所熯埃塵所蒙固瀋液之乾竭枵外稿而中空唯利從燔無所獻功與火相得赫然大烘堅枿徑節久而後燃後羣枯而效技又熒熒而不煙於是先生欣然環坐皆喜或祼股出足或引手張臂窮谷蕭條薪炭如土蓋取之而不竭顧此樂之甚富又何必琴材修直獸材攫搏漢壁之椒效暖魏宫之金辟寒誰知空山夜寒之叟敢傲溫於狐貉之前今供上方炭率斫成琴材詩集生薪破竈鬱丨丨坡濕薪翰林丨丨爆竹聲坡墮樵稚子松間拾丨丨斯公松帶葉旋斫生丨丨丨燒孟柮無煙榾丨丨丨雪夜長地爐煨酒暖如湯莫嗔老婦無盤飣笑指灰中芋栗香范至能田園雜興炭薪炭總説炭燒木留性寒月供然火取暖者不煙不焰可貴也事類燒木炭丨丨也説文焚薪丨丨作炭王褒僮約伐薪季秋乃命丨丨為炭月令邾子廢丨丨在門臺臨庭閽以瓶水沃庭邾子望見之怒閽曰夷射姑旋焉命執之弗得滋怒自投於牀丨於爐炭爛遂卒左豫讓吞丨丨丨炭為啞史屑炭作獸晉羊琇字雅舒景獻皇后從弟性豪侈洛下少林木炭貴如栗琇乃搗小炭為屑以物和之作獸形後何劭之徒共集乃以濕酒火爇猛獸皆開口向人赫赫然諸豪皆效之語林屑炭塑鳳楊國公以炭丨塑成雙鳳開元遺事作炭岸下竇廣國家貧為人所略賣為主入山丨丨時寒臥丨丨百餘人岸崩盡壓殺獨少君得脫丨曰當侯及竇后立果封侯外戚傳産炭山間豐城平鄉二縣皆丨石丨於丨丨掘土黑色可燃有火而無焰作硫黃氣既銷則成白灰范成大炭頌豫病衰大冬非附火不暖既銘被爐又作炭頌燔木不灰化為精堅是𠂻至陽維火之傳雪霾六虛氷塞九淵環堵之室天下不能寒有赫神物幹流化甄尺壁寸珠罔功汗顔我維德之莫之名言既燠既安與之窮年詩集倚爐不暖丨丨丨覺丨熾炭屢以添韓曲身成直青山白屋有仁人贈炭價重雙烏銀驅却坐上千重寒燒出户中一片春吹霞弄日光不定暖得丨丨丨丨身孟郊一車千餘斤賣炭翁伐薪賣炭南山中滿面塵灰煙火色兩鬢蒼蒼十指黑賣炭得錢何所營身上衣裳口中食可憐身上衣正單心憂炭賤願天寒夜來城外一尺雪曉駕炭車輾氷轍牛困人飢日已高市南門外泥中歇翩翩兩騎來是誰黃衣使者白衫兒手把文書口稱勑回車叱牛牽向北丨丨炭丨丨丨宫使驅將惜不得半匹紅紗一文綾繫向牛頭充炭直白居易賣炭翁詩百錢不滿籃苦寒摉病骨絲纊莫能禦折薪燎枯竹勃鬱煙充宇西山古松櫪材大招斤斧根槎委溪谷龍伏熊虎踞挑剔靡遺餘陶穴付一炬積火變深黶牙角猶忿怒老翁睡破氊正晝出無屨丨丨丨丨丨一坐幸至暮御爐嵗增貢圈直中常度閭閻不敢售根節姑付汝升平百年後地力已難富知誇不知嗇俯首與誰欣百物今盡然豈惟一炭故我老或不及預為子孫懼坡公買炭詩數米銇稱灰陋邦病且貧丨丨丨丨丨東坡空爐夜無炭薄飯午不羹丨丨丨丨丨荆公烏銀生絲霧丨丨見火丨丨丨便當水沉一濃炷却因斷續更氤氲散作霏微綾袍褲須叟霧霽吐紅光炯如雲表升扶桑陽春和日曛滿室蒼頰渥丹疑醉鄉忽然火冷霧亦滅只見紅爐堆白雪窗外雪深三尺強窗裏雪深一寸香楊萬里雪曉舟中生火白日飛繁星烏銀玉質金石聲見火忽學爆竹鳴腷腷膊膊久不停丨丨坐上丨丨丨不知何怒泄不平不知何喜唧唧吟待渠自靜勿與爭切莫借箸怒復生到渠緘口兩耳熱銅瓶在旁却饒舌並楊廷秀雪曉舟中生火山中有遺寶君不見前年雨雪行人斷城中居民風裂骭濕菽半束抱衾裯日暮敲門無處换豈料丨丨丨丨丨磊落如醫萬車炭流膏迸乳無人知陳陳腥風白吹散根苗一發浩無際萬人鼓舞千人看投風撥水愈光明爍玉流金是精悍南山栗林漸可息北山頑礦何勞煆為君鑄作百鍊刀要斬長鯨為萬段蘇子瞻詩彭城舊無石炭元豐元年十二月始遣人訪於州之西南白土鎮之北以冶鐵作兵犀利勝常古今合璧事類備要外集卷五十五
