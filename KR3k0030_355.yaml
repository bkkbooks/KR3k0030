body:
  text: 古今合璧事類備要外集卷五十五宋謝維新撰燈火門火附火災火禁野燒薪炭燈火總論火化物也性炎上味作苦能燥萬物得其性主烹飪性一失則焚林燎原延燒屋宇生聚一空吁可畏哉故古者必修火禁謹出內也野燒以火而耕耨又為獵火事類燥物丨萬丨者莫熯乎火易化物火丨丨亦燬也物入即毁壞也䆁名炎上火曰丨丨丨丨作苦洪範陽精火者陽之丨春秋考異焚岡火丨崑丨玉石俱焚燎原若火之丨於丨不可向邇並書司烜丨丨氏以陽燧取火於日司爟丨丨掌火之政季春禮出火季秋內火並周赤熛怒火神丨丨丨記月令注宋無忌火之精丨丨丨白澤圖無弗與昏暮叩人之門户求水火丨丨丨者若始然丨火之丨丨並孟子初作燧古者茹毛飲血燧人氏丨丨丨火人始燔炙譙周古史考以紀官炎帝丨火丨丨故為火師而火名左傳流為烏武王既渡河有火自上復下至於王屋丨丨丨其色赤史記揚作龜卜師丨火以丨丨致其黑周禮夜構火陳勝吳廣丨丨丨狐鳴呼曰大楚興陳勝王夜請火曹參為齊相請蒯通為客於齊王田榮畔項羽劫齊處士東郭先生梁石君及榮敗二人醜之入深山隱居客謂通曰先生知梁石君東郭先生何不通之於相國乎通曰臣之里婦與里之諸母相善也里婦丨亡肉始以為盜而逐之婦過所善諸母語以事而謝之里毋即束緼丨丨於亡肉家曰昨暮丨犬得肉爭鬪相殺丨丨治之亡肉家遂追呼其婦故里毋非談説之士也束緼請火非還婦之道也物有相類事有適可臣請乞火於曹相國乃見相國曰婦人有夫死三日而嫁者有幽居守寡不出門者足下即欲求婦何取曰取不嫁者通曰然則求臣亦猶是也東郭先生梁石君齊之俊士也隱居不嫁未嘗卑節下意以求仕也願足下禮之相國曰敬諾遂皆以為上賔通傳坐灰中異人姚光有火術令吳王積荻千束火焚荻了姚光恬坐灰中振襟而起神仙傳撥爐中百丈謂溈山曰汝丨丨丨有火否師丨云無火百丈躬起深撥丨丨火舉以示之云此不是火師發悟禮謝傳燈録火災宣榭火成周丨丨丨人火之也人火曰火天火曰災左宣十六年藏室火晉平公藏火之臺燒救火三日三夜乃勝之公子晏束帛而賀曰臣聞王者藏於天下諸侯丨於百姓農夫藏於囷庾今百姓勞於外而賦斂無已昔桀紂殘賊為天下戮今者天降災於藏臺此是君之福也韓詩外傳新宫災成三年丨丨丨三日哭注三年喪畢宣公神主新入廟故謂之丨丨丨三日哭善得禮宗廟親之神靈所馮居而遇丨故哀而哭之苑澤燒魯燒丨丨天北風火南向恐丨國哀公自將衆趨救火人盡逐獸而火不救及仲尼下令曰不救火而逐獸者比入禁之罪令猶未遍火遂救矣韓非子濡幕濟哀三年夏五月辛卯司鐸火司鐸宫名火踰公宫桓僖災救火者皆曰顧府南宫敬叔至命周人出御書俟於宫曰尼女而不在死子服景伯至命宰人出禮書以待命命不恭有常刑校人乘馬巾車脂轄百官官備府庫慎守官人肅給濟丨為丨濡物於水出用為丨鬱攸從之蒙葺公屋自太廟始外內以悛子全反助所不給有不用命則有常刑無赦公父文伯至命校人駕乘車季桓子至御公立於象魏之外命救火者傷人則止財可為也命藏象魏曰舊章不可亡也冨父槐至曰無備而官辦者猶拾瀋也於是乎去表之藳道還公宫孔子在陳聞火曰其桓僖乎左濡衣走越王思報吳冬則抱氷夏則握火問於大夫種曰吾欲伐吳可乎何不試焚宫室於是遂焚宫室民莫救火乃下令曰民之救火而死者比死敵之賞民之塗其體被丨丨丨火者左三千人右三千人殃及魚俗之城門失火丨丨池丨舊説宋門失火自汲取池中水空竭魚池風俗通不問馬魯廄焚子退朝曰傷人乎丨丨丨語十火神回祿鄭子産禳火於玄冥回祿注玄冥水神丨丨丨丨也左昭十八火正閼伯襄九年春宋災樂喜為司城以為政使伯氏司里火所未至徹小屋塗大屋陳畚挶具綆缶備水器量輕重畜水潦積土塗巡丈城繕守備表火道使華臣具正徒令隧正納郊保奔火所使華閲討右官官庀其司向戍討左亦如之使樂遄庀刑器亦如之使皇鄖命校正出馬工正出車備甲兵庀武守使西鉏吾庀府守令司宫巷伯警宫二師令四鄉正敬享祝宗用馬於四墉祀盤庚於西門之外晉侯問於士弱曰吾聞之宋災於是乎知有天道何故對曰古之火正或食於心或食於咮以出內火是故咮為鶉火心為大火陶唐氏之丨丨丨丨居啇丘祀大火而火紀時焉相土因之故啇主大火啇人閲其禍敗之釁必始於火是以日知其天道也公曰可必乎對曰在道國亂無象不可知也左火燒吳宫秦始皇時吳宫吏以丨丨燕巢因燒丨丨六帖火燒秦宫項王西屠咸陽殺秦降王子嬰焚其宫室丨三日不滅故杜牧阿房宫賦曰楚人一炬可憐焦土曲突亡患初霍氏奢侈茂陵徐福言其大盛三上書輒報罷後霍氏誅滅告者皆封人為徐生上書曰客有過主人者見其竈直突傍有積薪客曰子為曲突逺徙其薪不者且有火患主人不應俄其家失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在上行而不録言丨丨者或謂主人曰鄉使聽客之言不費牛酒終丨火丨言論功而諸賔丨丨徙薪丨恩澤燋頭爛額為上客邪主人悟而請之宣帝召福為郎起屋厭災漢柏梁火粵人勇之言粵俗有火災復丨丨必以大用勝丨之於是作建章官千門萬户郊祀志噀酒救火欒巴為尚書郎王朝大會巴獨後到得酒不飲西南噀之有司奏巴大不敬巴謝曰臣本縣成都失火故丨丨以為雨後成都奏火得雨而滅雨中作酒氣也本傳含酒厭火郭慮從南郊丨丨東北三噀云齊失火以丨之後齊果上丨事汝南先賢傳漱水滅火樊英隱於壺山嘗有黑風從西方起英謂學者成都市火甚盛因含水西向丨之乃令記其日後有從蜀來者云是日大火黑雲平旦從東起須臾大雨火遂得滅反風滅火劉昆除江陵令時縣連年火災昆輒向火叩頭多能降雨止風詔問丨丨丨丨虎北渡河何以致此昆曰偶然帝曰此長者之言也本傳伏棺火滅郅惲為長沙有義士古初遭父喪未葬鄰人火起及初舍棺不可移初冒火丨丨上會丨丨東觀漢記叩殯火越劉殷曾祖母柩在殯西鄰失火風飈甚盛殷夫婦丨丨丨哭丨丨燒東家崔鴟前趙録儲水防火廉范為蜀郡積油生火丨丨萬匹則自然丨丨泰始中武庫火丨丨所致也博物志悉推豖償後漢梁鴻牧豖長安上林苑中失火延人家問所燒物丨丨丨丨之其主言少鴻願以身作躬執其勤昨夢馬舞馬興平問索紞曰我丨夜丨舍丨丨數十人向馬拍手何也紞曰馬者火也舞為火起向馬拍手救火人也平步歸而火起列兵固守張華為司空武庫火華懼趙王倫變作丨丨丨丨然後救之故纍代之寶及王莽頭孔子履盡焚見漢高斬蛇劍穿屋而飛晉書取履不遑晉王獻之與父徽之共在一室忽然火發徽之遽走不遑丨丨獻之神色恬然徐呼左右扶出索輿徐去齊褚彥回宅失火煙焰逼甚左右驚擾彥回神色怡然丨丨丨丨梁婦赴死丨姑姊其室失火兄子與二子在內欲取兄子輒得其子火盛不得復入婦人曰梁豈可户告人曉耶被不義之名何面見兄弟國人哉遂赴火而死列女傳沈母致懼齊沈沖吳興人與兄淡深並厯御史中丞被案裁者多怨沖母在東鄰家失火疑為人所爇大呼曰我三兒皆御史中丞與人豈有善者方恐肌分骨散何但焚如故論者曰丨丨丨丨中丞其戒深矣天使寄載糜竺嘗從洛歸未至家數十里見路次有好新婦從竺求寄載行二十餘里新婦謝去謂竺曰我丨丨去當往燒東海糜家感君見載故以相語竺因請之曰不可不得不燒君快去我緩來日中必火發竺乃急行達家便出財物日中而火大發搜神記祝融隂相柳子厚賀進士王參元失火書云僕始聞而疑終乃大喜人多言足下家有櫝貨士之好亷名者皆畏忌不敢道一出口則嗤嗤者以為得重賂今乃幸為天火之所滌蕩黔其廬赭其垣以示其無有而足下之才乃可以顯白而不汚其實出矣是丨丨回祿之丨丨吾子也柳文宫人多死大和二年昭德寺火延禁中丨丨死者數百人宰相兩省官京兆樞密皆集日華門督神策軍救火獨御史府不至溫造自劾曰臺官擊賊恐人緣以為姦儒家弗焚黃巢圍福州過崇文館黃璞家令曰此丨者丨滅炬丨丨永州火災丨丨多丨丨五年之間四為大火所迫跣足出壞墻壁穴牖僅免燔灼一遇火災纍日茫洋不能出言柳文金陵火災時丨丨多丨丨居者不安乖崖公廉知皆姦民所為潛捕得之乃命先折其脛斬之以徇火患遂息神道碑火禁酒坊火禁本朝太祖時內丨丨丨悉以監官而下數十人棄市遺火卒縳投火中自是諸司莫不整肅楊公談苑京師火禁丨丨丨丨甚嚴將夜分即滅燭故士庶家凡有醮祭者必先關廂吏以其焚楮幣在中夕之後也至和嘉祐之間狄武襄為樞使一夕夜醮而勾當人偶失告報中夕驟有火光探卒馳白廂主又報開封知府到宅則火滅久矣翊日都下盛傳狄相公家有火怪燭天者時劉敞為知制誥聞之語權知開封府王素曰昔朱全忠居午溝夜光怪出屋鄰里謂失火而往救則無之今日之異得無類此此語喧於縉紳間狄不自安遽乞陳州遂薨於鎮而夜醮之事竟無人為辨之者東軒筆録簿守衛者罪玉清昭應宫災守衛者皆坐繫御史獄王文康公上疏曰昔魯桓僖宫災孔子以為桓僖親盡當毁者也遼東高廟及高園便殿災董仲舒以為高廟不當居郡國便殿不當居鄰房故災魏崇華殿災高堂隆以為天以臺榭宫室為戒宜罷勿治文帝不聽明年復災今所建宫不應經義災變之來若有警者願除其地罷諸禱祠以應天變焉仁宗與太后感悟遂丨丨丨丨丨已而詔以不復繕修諭天下言行録為安分者勸紹興丙午四月豫任行在和劑局門官所居在漾沙坑與運屬王某共席屋數椽動息相聞王夜奏圊其婢插紙燈於壁火然而走延燒首及豫家生計一空而周某為著作佐郎亦預為其從叔某執法殿中而馮某為監察御史宰相欲媚其從叔某張大其事以為周某地自三省樞密院至三衛皆致銀絹未閲月遷著作郎隨擢起居舍人時臨安帥韓某知火自王氏以其為馮某妻弟不敢問執豫小童抑使伏辜於是有旨周必大放罷朝士多勸豫訟寃力既不敵又前占卦影明言財傷官磨豈復尤人徑參部授福州永福簿外舅力勉豫試詞科偶中選授金華教授其後忝厯清貴實基於此乃知事皆前定人力何有因書詞科舊稿後丨丨丨不爭丨之丨火晉潘尼火賦覽天人之至周嘉火德之為貴含太陽之靈暉體淳剛之正氣先聖仰觀通神悟靈窮物盡數研幾至精鑽燧改火陶冶羣形叶和五味革變羶腥爾乃狄牙典膳百品既陳和羹酋鐸旨酒醲醇烹黿煮鼉灼龜臛鱗若乃流金化石鑠鐵融銅造製戎器以戒不恭砥鍊兵械整飾軍容四海康乂邉境無寇韜弓戢劍解甲釋胄銷鏑為耒鑄戈為耨戰士反於耕農戎馬放乎外廄及至焚野燎原陸火赫羲林木摧拉沙粒並麋騰光絶覽雲散霓披去若風驅疾若電逝紛輪紆轉倐忽橫厲震響達乎八冥流光燭乎四裔火災柳宗元逐畢方文永州元和七年夏多火災日夜數十發少尚五六發過三月乃止八年夏又如之人咸無安處老弱燔死晨不爨暝不燭皆列坐屋上左右視罷不得休蓋類物之為者訛言相驚云有怪鳥莫實其狀山海經云章義之山有鳥如寫一足赤文白喙其名曰畢方見其邑有訛火若今火者其可謂訛歟而人有怪鳥傳者其畢方歟遂邑中狀而啚之禳而磔之為之文而逐之曰后皇庇人兮敬授羣材大施棟宇兮小蔽草萊各有攸宅兮時闔而開火災為用兮化食生財胡今兹之怪戾兮日