body:
  text: 古今合璧事類備要續集卷二十二宋謝維新撰類姓門程安定商音古今姓纂顓頊重黎之後周程伯林父其後也事類能冶鑄貨殖程鄭山東遷虜也丨丨丨富埒卓氏史記正行陳前漢程不識為邊太守出擊胡丨部曲丨丨軍不得自便江表虎臣吳程普字德謀性好施與喜士大夫遷蕩冦將軍丨丨之丨丨也御下嚴整程文貴字少卿多幹略果决有父風為超武將軍丨丨丨丨軍中服其勤幹每戰為前鋒齊軍深憚之謂為程彪南史歷官清謹程駿字驎駒仕魏為著作郎詔曰駿丨丨丨丨言事每愜門無挾貨之賔室有懷道之士賜帛六百匹旌其儉德駿悉散之親舊北史吟風弄月本朝程皓字伯淳嘗曰昔受學於周茂叔每令尋顔子仲尼樂處所樂何事又曰再見茂叔後丨丨丨丨以歸有吾與㸃也之意經術為倡程頥字正叔以丨丨丨諸儒四方從之游者甚衆嵇譙國商音古今姓纂夏少康封子季杼於㑹稽遂為㑹稽氏漢初徙譙嵇山改為嵇氏事類龍章鳳姿晉嵇康字叔夜其先姓奚避怨徙銍家于嵇山之側因而命氏丨丨丨丨天質自然野鶴雞羣嵇紹字延祖起家為祕書丞王戎曰昨於稠人中始見嵇紹昻昻然若丨丨之在丨丨為竹林七賢嵇康彈琴詠詩自足於懷丨丨丨丨丨之遊自號亳丘子嵇含字君道好學能屬文家在亳丘丨丨丨丨丨門曰歸厚之門室曰慎終之室邢河間商音古今姓纂周公第四子封於邢後為衛所滅子孫以國為氏事類周公之嗣富辰曰凡蔣邢茅胙祭丨丨丨丨也左傳民之先覺邢顒字子昻舉孝廉丨丨丨丨時人稱曰德行堂堂邢子昻魏志東南之寄邢巒字洪賔魏太常貞之後為安東將軍宣武勞遣於東堂曰丨丨丨丨非將軍莫可北史為政清淨邢晏字幼平位滄州刺史丨丨丨丨吏人安之政清刑肅邢祐字宗祐使於宋以將命之勤除平原太守丨丨丨丨百姓安之作孤蓬賦邢産字神寶善屬文少丨丨丨丨為時所稱臺閣肅然邢蚪字神彪為尚書左丞多所糾正丨丨丨丨時人愛敬邢臧字子良除東牟太守清慎奉法吏人愛之和雅信厚有長者之風為丨丨所丨丨文學獨秀邢才少有盛名鼓動京洛丨宗丨府丨丨當年足為一代之模楷也雕蟲獨步邢邵字子才十嵗能屬文日誦萬餘言名動衣冠丨丨之美丨丨當時每一文初出京師為之紙貴風觀月樓邢邵除兖州刺史有善政枹鼓不鳴在郡起清風觀明月樓內參外寄邢巒以文武才䇿丨丨機揆丨丨折衝其緯世之器歟威秋仁春唐韓愈與邢尚書君牙書閣下為王爪牙為國藩垣丨行如丨丨行如丨戎狄棄甲而逺遁朝廷髙之而不虞赫赫乎洸洸乎功業逐日以新名聲隨風而流應試精博皇朝邢昺字叔明曹州濟隂人丨九經廷丨日召至外殿講師比二卦又取其羣經發題太宗嘉其丨丨擢上第召為國子監丞専講學之任真宗始置翰林侍讀學士首以命昺有呻吟集邢居實字敦夫有文早夭蘇子瞻云敦夫自為童所與交皆諸公長者百不一見遂與草木共盡黃魯直云謝師復年未二十文章不類少年語方行萬里出門而車軸折甚矣敦夫似吾師復也且有絶句云詩到隨州更老成江山為助筆縱橫眼看白璧埋黃壤何况人間父子情丨丨丨丨行於世布衣召問邢惇字君雅雍丘人嘗舉進士不中慨然有隱遁之意真宗幸亳州以丨丨丨對丨以治道惇不對真宗問其故惇曰陛下東封西祀皆已畢矣臣復何言真宗大悅滑下邳商音古今姓纂滑伯周同姓國也為晉所滅以國為氏左傳鄭大夫滑維漢有詹事滑興事類姬姓叔侯曰虞虢焦滑皆丨丨也晉是以大左裴河東商音古今姓纂嬴姓伯益之後秦非子支孫封􅘌鄉侯因氏焉今聞喜􅘌城是也六代孫陵周僖王封解邑君又除邑從衣河東聞喜陵裔孫蓋漢侍中九代孫遵始自雲中從漢光武平隴蜀徙居河東安邑安順之際又徙聞喜遵𤣥孫茂侍中尚書生二子輯號東眷徽號西眷徽曽孫天明子孫又號中眷徽與子楷康綽兄孫頠邈楷子攢綽子遐號八裴事類後進領袖晉裴秀字季彥八嵗能屬文時語曰丨丨丨丨有裴秀後為司空武庫五兵裴頠字逸民博學稽古周弼見而嘆曰頠若丨丨丨丨縱橫一時之傑也玉山照人裴楷字叔則以清通用為吏部侍郎人稱見裴叔則如近丨丨映丨丨也廊廟之才裴松之字世期宋武帝剋洛陽松之居州行事武帝曰松之丨丨丨丨不宜久居邊務召為太子洗馬轉中書侍郎南史風流警拔裴讓之字士禮清明俊辨早得聲譽魏時舉秀才遷主客郎中省中語曰能賦詩裴讓之與楊愔友善清談竟日愔每云此人丨丨丨丨裴文季為不亡矣歷中書舍人容儀醖藉齊文襄目之曰士禮佳舍人也北史三河領袖裴駿字神駒魏太武曰裴駿有當世才其忠義可嘉補中書博士崔浩目為丨丨丨丨考績為最裴延雋字平子遷幽州刺史修復廢渠崇起學校丨丨丨天下丨文藻富贍裴伯茂學涉羣書丨丨丨丨為中書侍郎及卒魏收賦詩云臨風想𤣥度對酒思榮公黃驄年少裴果字戎昭少慷慨有志略魏時盜賊起果征討每乘黃驄馬先登陷陳號為丨丨丨丨獨立使君裴俠字嵩和除河北郡守愛人如子惟食菽麥而已人歌曰肥鮮不食丁庸不取裴公貞惠為世規矩嘗與諸牧守俱謁周文周文命俠别立謂諸牧守曰俠清慎奉公為天下最衆中有如俠者可與之俱立衆皆默然無敢應者號為丨丨丨丨斷決如流裴漢字冲霄在魏除相府墨曹理職明贍丨丨丨丨相府語曰日下粲爛有裴漢典銓有名唐裴行儉字守約絳州人與李敬𤣥馬載同丨丨丨能丨時號裴馬設長名榜銓注等法資考為限裴光廷字連城初吏部求人不以丨丨丨丨其後士人猥衆専務趨競銓品枉撓光廷懲之因行儉長名榜乃為循資格任門下省主事閻麟之専主過官凡麟之裁定光廷輒然可時語曰麟之口光廷手瘞鹿得壻裴寬性通敏工騎射彈棊投壺通書記為潤州參軍刺史韋詵有女擇所宜歸㑹休日登樓見人於後圃有所丨藏者訪諸吏曰參軍裴寬居也詵問狀答曰寬義不以包苴汙家適有人以丨為餉致而去不敢自欺故瘞之詵乃引為判官歸語妻曰今丨丨矣寬時衣碧瘠而長族人呼為碧鶴雀詵曰愛其女必以為賢公侯妻也何以貌求人卒妻寬舊德為首唐裴寬兄弟八人皆擢明經任臺省州刺史其為政務清簡所涖人愛之世冀其得宰相天寶間稱丨丨以寬丨丨號霹靂手裴漼絳州著姓父琰之永徽中為同州司户年甚少不主曹務刺史李崇義內輕之吏白積案數百崇義讓使趣斷琰之命吏連進紙筆為省决一日畢既豫奪當理而筆詞徑妙由是名動一州丨丨丨丨曰真儒者裴休字公美孟州人不為皎察行所治吏下畏信能文章書楷遒媚有體法為人醖藉進止雍間宣宗嘗丨丨丨丨疏薦得人裴垍字𢎞中絳州人李吉甫為相問進賢垍即崖略丨三十餘人吉甫藉以丨于朝天下翕然稱丨丨奬勵盡言裴垍器局峻整持法度雖宿貴前望造詣不敢干以私諌官言得失執政多忌之惟垍丨丨使丨丨士大夫不以垍年少柄用為嫌故元和之治百度修舉朝無幸人更直備問裴耀卿字煥之遷相王府典籖丨丨丨丨府中號學直疾風徑草裴諝字士明擢明經遷考功郎中代宗幸陜諝徒步挾南曹印赴行在帝曰丨丨知丨丨果可信討蔡督戰裴度字中立河東人時丨丨數不利羣臣爭請罷兵唯度請身丨丨帝目度曰果為朕行乎度俯伏流涕曰臣誓不與賊偕存即拜招討使入對延英曰主憂臣辱義在必死賊未授首臣無還期帝壯之為流涕功比汾陽裴度退然才中人而神觀邁爽操守堅正既有丨名震四夷其威譽德業丨郭丨丨而用不用常為天下重輕事四朝以全德始終及沒天下莫不思其風烈治第東都裴度時閹豎擅威天子據虛器搢紳道喪不復有經濟意乃丨丨丨丨集賢里號緑野堂野服蕭散與白居易劉禹錫為文章把酒窮晝夜相歡不問人間事陸河南角音古今姓纂齊宣王田氏之後宣王封少子逹於平原陸鄉因氏焉漢有大中大夫陸賈子孫過江吳郡吳縣陸賈裔孫吳丞相遜生丞相抗生晏景機雲耽事類辨士前漢陸賈楚人名為有口丨丨常使諸侯名聲籍甚大族吳陸遜字伯言江東丨丨忠誠懇至憂國亡身海隅清陸𦙍字敬宗交州流民歸附丨丨肅丨天才秀晉陸機字士衡抗之子少有異才文章冠世戰敗河陽乃受害歎曰華亭鶴唳豈可復聞乎丨丨丨逸更患其多君苖見其文輒欲燒筆硯葛洪稱其文猶𤣥圃之積玉龍駒鳳雛陸雲字士龍六嵗能屬文少與兄機齊名號二陸閔鴻見而竒之曰此兒若非丨丨當是丨丨體道清絶陸玩字士瑫弱冠有美名清允平當後轉尚書令詔曰玩丨丨丨丨雅量𢎞逺宜居台司以允衆望嵗寒松柏唐陸象先蘇州人宰相崔湜曰象先人望宜幹樞近恬靜寡欲議論髙簡為時推向又曰陸公加於人一等主為言之並知政事公主謀逆坐為主所進將同誅𤣥宗召免之曰丨丨然後知丨丨之後凋也景倩真清陸景倩為扶溝丞河南按察使畢構覆州縣殿最欲必得其實有吏言狀曰某彊清某詐清惟丨丨曰丨丨終監察御史餉錢不納陸贄字敬輿蘇州人十八第進士中博學宏詞調鄭尉張鎰有重名贄往見語三日竒之請為忘年交既行丨丨百萬曰請為母夫人一日費贄丨丨止受茶一串不負所學陸贄及輔政不敢自顧重事有可否必言之懇到深切或規其太過對曰吾上不負天子下丨丨丨丨遑它恤乎方外十友陸餘慶開元初為宣撫使薦孫逖韋述等皆知名士終太子詹事雅善趙貞固盧藏用陳子昻釋懷一共十人時號丨丨丨丨送車二乘陸長源吳人為汝州刺史徙宣撫司馬清白自將去汝州丨丨丨丨曰吾祖罷魏州有車一乘而圖書半之吾愧不及先人云文通先生陸質字伯冲明春秋師事趙啖盡𫝊二家學門人以質能文聖人書通于後世私共諡曰丨丨丨丨甫里先生陸龜蒙字魯望舉進士不中居松江甫里多所論撰身畚鍤茠刺無休或譏其勞答曰堯舜黴瘠禹胼胝彼聖人吾一褐衣敢不勤乎嗜茶又不喜與流俗交雖造門不肯見齎書茶釣具等往來時謂江湖散人或號天隨子丨丨丨丨自比涪翁漁父江上丈人後以髙士召不至嗜茶著經陸羽字鴻漸不知所生或言僧得諸水濵畜之既長以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀乃以陸為氏名而字之上元初隱苕溪自稱桑苧翁時謂今接輿也丨丨丨丨三篇言茶之原之法之具後著毀茶論薦拔恬退皇朝陸佃字後師越州山隂人遷尚書左丞佃執政丨丨人材多丨丨者山隂遺藁陸游字務觀佃之後有文集行於世工於四六能詩號丨丨丨丨象山先生陸九淵字子靜其學以穎悟為㫖與朱文公辨無極太極有文集行于世號丨丨丨丨榮上谷商音古今姓纂周大夫榮夷公萱叔其先食采於榮因氏焉事類在朝正色榮毗字子諶少剛鯁有局量隋時為華州長史後拜侍御史丨丨侃然北史俱有能名榮建緒毗之兄性甚亮直兼有學業仕隋歷始洪二州刺史丨丨丨丨翁鹽官商音古今姓纂闕事類詠槐花詩唐翁承贊字文饒莆田人乾寧間登進士第丨丨丨丨雨中粧㸃望中黃勾引蟬聲送夕陽憶得當年隨計吏馬蹄經日為君忙該博能文翁續字德功崇人也丨丨丨丨躬踐履之學士負笈從之游者以百數誨之無倦率多成就荀河內徵音古今姓纂周文王第十七子郇侯之後以國為氏去邑為荀晉有荀林父生庚裔孫况事類社稷之衛荀林父之事君進思盡忠退思補過是丨丨丨丨也左傳公族大夫晉悼公即位使荀家荀㑹為丨丨丨丨使訓卿之子弟共儉孝弟左傳最為老師荀卿趙人年五十始來游學於齊齊襄王時卿丨丨丨丨三為祭酒適楚為蘭陵令史記稱為神君後漢荀淑字季和潁川人少有髙行博學名賢皆宗師之補朗陵侯相涖事明理丨丨丨丨荀氏八龍荀爽字慈明十二通春秋論語潁川語曰丨丨丨丨慈明無雙軍國與籌荀彧字文若曹操用為司馬操雖征伐在外丨丨事皆丨彧丨焉魏志佐命弼導荀顗字景倩纍遷侍中清純體道忠允立朝有丨丨丨丨之勳銘功太常配享清廟晉書奪我鳳池荀朂字公曽久在中書専管機事及失之甚罔罔悵悵或有賀之者朂曰丨丨丨凰丨諸君賀我邪洛中英英荀闓字道明京師語曰丨丨丨丨荀道明方伯之少荀羡字令則禇褒以為長史曰荀生資逸羣之氣將有冲天之舉遷徐州刺史時年二十八中興丨丨未有如羡丨丨者目醜舍人荀士遜為文清典見賞知音在齊為中書舍人狀貌甚醜丨曰丨丨丨羊河上商音古今姓纂晉羊舌大夫之後生職生赤伯華生肸叔向鮒叔魚生食我春秋末始單姓為羊氏秦亂徙居太山事類古之遺直叔向晉大夫羊舌肸書詒子産諫鑄刑書叔向丨丨丨丨左傳獻魚懸庭後漢羊續字興祖為南陽太守府丞嘗丨生丨受而丨於丨九世清德晉羊祜字叔子世吏二千石至祜丨丨並以丨丨聞輕裘緩帶羊祜墾田襄陽大獲其利在軍嘗丨丨丨丨身不被甲入綜機密出統方嶽建廟立碑羊祜常造峴山置酒言詠終日不倦及卒襄陽百姓於峴山丨丨丨丨望其碑者莫不流涕因名墮淚碑兖州八伯羊曼字祖延與阮放等八人號丨丨丨丨而曼為䵬伯蓋擬古之八雋鄒魯英賢羊侃字祖欣歸梁為侍中武帝製武宴詩示之侃即席應詔帝覽曰吾聞仁者有勇今見勇者有仁可謂丨丨遺風丨丨不絶天狗下及羊祉字靈祐性剛愎愛刑名仕魏假節龍驤將軍為秦梁二刺史當官不憚彊禦朝廷以為剛斷每令出使頗為深文所經之處人號丨丨丨丨尋山家詩羊士諤不知何許人賦丨丨丨丨云主人間語未開門繞田野菜飛黃蝶苕溪漁隱甚稱之於京兆羽音古今姓纂秦商鞅時有獻商於之地六百里則於之姓蓋因斯地而名大唐宇文化及將於士登以魏州降事類闕惠闕扶風商音古今姓纂周惠王支孫以諡為姓戰國有惠施為梁相漢有交趾太守惠乘太僕惠闕事類闕甄中山徵音古今姓纂虞舜陶甄河濵因以為氏或音堅漢末太保甄邯生豐司徒為中山著姓也中山無極邯六代孫逸後漢上蔡令女為魏文帝皇后生明帝後追封安城侯子嚴孫暢生述六代孫𤣥成梁吏部尚書生詡詡曽孫懷素唐盧陵令事類還金之美甄彬有行業鄉黨稱善嘗以苧就人質錢後贖苧於束中得五兩金即送還之後為益州録事參軍帶郫縣令將行同列五人梁武誡以廉慎至彬獨曰卿昔有丨丨丨丨故不復以此言相屬南史鳩雀棲廬甄恬字彥約母喪廬墓側有白丨白丨丨宿其丨州表其行狀父子顯名唐甄逢濟子常以父名不得在國史欲詣京師自言元和中袁滋表濟節行與權臯同科宜載國史有詔贈濟祕書少監移書於史館逢與其父俱當得書由是丨丨俱丨丨麴吳興宫音古今姓纂麴氏之後至漢麴談生閟避難湟中因居西平姓麴氏閟居西平十一代孫嘉仕沮渠氏事類南門北樓晉麴允為豪族西州為之語曰麴與遊牛羊不數頭丨問朱丨丨望青丨壯勇騎射麴珍字舍洛西平酒泉人丨丨善丨丨以帳內從神武封安康郡王北史家京兆角音古今姓纂周大夫家父之後風俗通漢有家羡北海家羡為劇令子孫因居焉事類作誦家父丨丨以䆒王訩詩維宰家伯丨丨同上封渤海宫音古今姓纂姜姓炎帝之後封巨為黃帝師胙土命氏夏封父侯國君也今封丘是也後漢有侍中封岌湯海蓨縣封岌五代孫仁孫釋晉侍中生挫􅋵事類有大臣體封孚字處道外總機事內參密謀雖位任崇重謙虛博約甚丨丨丨之丨晉載記有髙士風封延伯字仲連三世同財為北州所宗附為梁郡太守丨丨丨丨南史風流間雅封孝琰字士光修飭學尚有風儀位祕書丞以丨丨自立威儀丨丨容止進退人皆慕之北史封軌四戒丨丨字廣度以務德慎言修身之本姦回讒佞世之巨害乃為務德慎言逺佞防姦丨丨識略過人唐封倫字德彛年方少舅盧思道曰是兒丨丨丨丨當自致卿相詔賜宫錦封敖字碩夫雅為李德裕所器㑹昌初為翰林學士屬詞贍敏不為竒澀語切而理勝武宗使作詔書慰邊將傷夷者曰傷居爾體痛在朕躬丨丨以丨丨解賜玉帶封敖劉稹平德裕以定䇿功進太尉時草制云云謂敖曰如君此等語豈易得耶丨所丨丨丨贈之芮平原徵音古今姓纂左傳周司徒芮伯周同姓國也芮伯萬之後漢巨鹿太守芮强吳郡太守芮彌丹陽人事類質成虞芮丨厥丨注二國爭田丨丨於文王也詩桑柔丨丨芮伯刺厲王也詩又左周芮良夫之詩曰大風有隧貪人敗類注良夫芮伯字也羿濟郡羽音古今姓纂左傳有窮后羿篡夏后相之位事類闕儲河東羽音古今姓纂後漢儲太伯又富人儲老王莽亂以五伯人據大庾嶺開元汜水尉儲光羲潤州人生石石生燕客燕客生調宗𢎞文校書生隱撿校郎中事類為相幣交孟子居鄒季任為任處守以幣交受之而不報儲子丨丨以丨丨受之而不報他日由鄒之任見季子由平陸之齊不見儲子屋廬子喜曰連得間矣季子不得之鄒儲子得之平陸孟子靳西河徵音古今姓纂風俗通楚大夫靳歙又汾陽侯靳彊秦六國有靳尚事類闕汲清河徵音古今姓纂風俗通衛宣公太子汲之後居汲因氏焉事類古社稷臣前漢汲黯字長孺濮陽人性倨少禮面折不能容人之過武帝曰丨有丨丨丨如黯近之矣淮南憚黯丨丨王謀反丨丨曰好直諫守節死義難惑以非淮陽卧治汲黯拜為淮陽太守見上曰臣常有狗馬病力不能任郡事願為中郎出入禁闥補過拾遺上曰君薄淮陽邪吾今召君矣顧丨丨吏民不相得吾徒得君之重丨而丨之邴平陽商音與丙通古今姓纂丙與邴通單丙者齊大夫丙歜之後漢功臣表有髙苑侯丙猜𫝊封八代從邑者晉大夫邴豫食采於邴因氏焉齊有邴意兹事類相問牛喘前漢丙吉字少卿魯國人封博陽侯為丞丨掾吏有贓罪與長休告終無所案驗因馭吏言而科瑣邊吏見謂憂邊思職出不問羣鬭死傷而丨丨丨孝宣中興丙魏有聲龍鳳重寶魏邴原字根矩少以操尚稱太祖署丞相啓事清靜足以厲俗貞固足以幹事所謂丨翰丨翼國之丨丨麋汝南宫音古今姓纂楚大夫受封南郡麋亭因以為姓東漢朐山漢有麋竺生芳宋有麋朂之又麋信撰說要注榖梁事類雍容風議蜀麋竺字子仲拜安漢將軍雍容敦雅而幹翮非所長待之以上賔之禮未嘗有所統御丨丨丨丨見禮於世弓馬射御子威官至虎賁中郎將威子照虎騎監自竺至照皆便丨丨善丨丨同上松東管宫音古今姓纂秦始皇遇雨道封松為五大夫後因氏焉事類闕古今合璧事類備要續集卷二十二
