終難作主人司馬公樂府香浮蟻醉醒醒醉慿君會滋味濃斟琥珀丨丨丨一到愁腸别有陽春意須將幕席為天地歌前起舞花前睡從他落魄陶陶裏猶勝醒醒惹得間憔悴東坡醉落魄酒器器皿總統飲必有器其來尚矣古者鴻荒之世猶鑿地為樽壞而飲之也自是而降樽罍盞斚之器不一而足或以玉或以金或以髹或鏤鳥獸之形或倣雲雷之象觚圜有别小大有制備矣兕觥罰爵也後世僣奢過度玻璃琥珀蓮花蕉葉鴛鴦鸚鵡各著其名求之古人之制崇侈甚矣無以復加矣事類一石凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散丨丨曰壺五斗曰甒禮器注一豆梓人為飲器勾一升爵一升觚三升獻以爵而酬以觚一獻而三酬則丨丨矣食丨丨肉飲丨丨酒中人之食也凡試梓飲器鄉衡而實不盡梓師罪之周禮爵斚洗丨奠丨詩行葦瓶罍丨之罄矣維丨之恥注丨小而丨大詩蓼莪弗揮飲玉爵者丨丨曲禮斯饗朋酒丨丨注兩樽曰瓶滑嵇丨丨酒器也轉注吐酒終日不已今之陽燧樽崔浩音義太白見前罰酒注秦樽丨丨冇虞氏之樽也山罍丨丨夏后氏之樽也芳樽丨商丨也犧象周樽也並禮記明堂位牛象犧象二樽全刻丨丨之形鑿具背以為樽三禮圖雲雷卷耳后妃之志也知臣下之勞勤云云我姑酌彼金罍注人君以黃金飾樽大一石金飾龜目蓋列為丨丨之象謂之罍者取象丨丨博施如人君下及諸臣詩以盞夏后氏丨丨以斚商丨丨以爵周丨丨並眀堂注雞彛春祠夏禴裸用丨丨鳥尋皆有之周禮春官鬯人兕觥丨丨其觩旨酒思柔詩大斗酌以丨丨周成王詩行葦杜舉知悼子卒未葬平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢厯階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北靣坐飲之降趨而出平公呼而進之曰蕢曩者爾心或開豫是以不與爾言爾飲曠何也曰子卯不樂知悼子在堂斯其為子卯也大矣曠也太師也不以詔是以飲之也爾飲調何也曰調也君之褻臣也為一飲一食忘君之疾是以飲之也爾飲何也曰蕢也宰夫也非刀七是共又敢與知防是以飲之也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必毋廢斯爵也至于今既畢獻斯揚觶謂之丨丨記檀弓下酒魁蜀中有酒器名丨丨詩人所謂酌以大斗遺制象北斗有魁柄獸樽正旦元會設白丨丨於闕庭蓋上設白丨若有能獻直言者則發此樽飲酒按禮曰丨丨乃杜舉遺式也示無忌憚也晉禮志羽觴王羲之作蘭亭序丨丨隨波酒爵晉劉表有丨丨三大曰伯雅容七升次曰仲雅六升小曰季雅五升酒船畢卓嘗曰得丨滿數百斛丨丨拍浮丨丨中便足了一生叵羅齊著作郎祖珽有文章而踈率無行嘗因宴失金丨丨後於珽髻上得之近世以洗為金丨丨若果為洗其可置之髻上未知果何物也聞見録偏提唐元和間酌酒謂之注子後仇士良惡其名同鄭注乃去其柄安繫名曰丨丨劉馮事始鴛鴦唐張易之與李逈同飲以丨丨盞一雙共飲取其常相逐也雞距集蓬來李適之有丨丨盞海山螺舞仙螺匏子巵慢卷荷金蕉葉玉蟾兒逢原記玻璃太真妃持丨丨七寶杯酌蒲萄酒樂史李太白後序酒榼見酒注酒海葉鈎太宴有裴𢎞泰後至罰以坐上小爵至觥船飲皆竭隨即置器于懷有銀海受一斗一飲而盡踏其海卷抱之索馬徑去乾饌子荷杯李宗閔暑月臨池以丨為丨語林蓮杯有王永年取宗女監金輝書庫嘗置酒延竇卞楊繪於室出其妻間座妻以左右手掬酒以飲卞繪謂之白玉丨花丨後永年盜庫書下獄引卞繪受饋俱落職東軒筆記蕉葉東坡云吾兄子朗飲酒三丨丨吾少時望見酒杯而醉今亦能三丨丨矣志林藍尾蘇鶚云今人以酒巡匝為婪尾又云婪貪也謂處於座末得酒既貪婪故宋景文云迎新送故只如此且盡燈前婪尾杯而樂天詩三杯丨丨酒但改婪為丨耳髹器杜祁公享客多用丨丨客有面稱歎者公嘗為宰相清貧乃爾邪公命侍人盡取白金燕器陳於前曰衍非乏此雅不自好耳然祁公好施亦卒不畜也家孰記珍器胡旦大監出知明州同年董儼給事知揚州延留甚歡入後館出姬侍宴悉皆上古丨丨旦曰人生會合難得來日能枉駕敝舟數杯可乎又曰丨丨家貧未識可略假借誇示妻孥否董以巨奩盡數送至舟中眀日不告而去後乃送還之玉壺清話詩集山杯丨丨捧竹根庾信鑿落酡顔傾丨丨韓昌黎注酒器金盞誰能載酒開丨丨杜又酒酣丨丨照東西曽銀瓶指點丨丨索酒嘗琉璃鍾丨丨丨琥珀濃小槽酒滴真珠紅烹龍泡鳯玉指泣羅幃繡幕圍春風吹龍笛擊鼉鼓皓齒歌細腰舞况是青春日將暮桃花亂落如紅雨勸君終日酩酊醉酒不到劉伶墳上土賀集力士鐺落日欲沒峴山西倒著接㒿花下迷襄陽小兒齊拍手攔街爭唱白銅鞮傍人借問笑何事笑殺山翁醉似泥鸕鷀勺鸚鵡杯百年三萬六千日一日須傾三百杯遙看漢水鴨頭緑恰似蒲萄初醱醅此江若變作春酒纍麴便作糟丘臺千金駿馬換小妾笑坐雕鞍歌落梅車傍側挂一壺酒鳯笙龍管行相催咸陽市上歎黃犬何如月下傾金罍君不見晉朝羊公一片石龜頭剝落生莓苔淚亦不能為之墮心亦不能為之哀清風明月全不用一錢買王山自倒非人推舒州杓丨丨丨一作黃爵白玉瓶李白與爾同死生襄陽雲雨今何在江水東流猿夜聲李白集老瓦盆莫笑田翁老丨丨自從盛酒長兒孫傾銀注玉驚人眠一醉終同卧竹根杜雕鐫妙我有雙飲盞其銀得朱提前漢朱提銀其偵貴黃金塗物象丨丨丨工倕乃令千里鯨么麼微螽斯猶能爭眀月擺掉出渺瀰野草花葉細不辨薋菉葹綿綿相紏結狀似環城陴四隅芙蓉樹擢艷皆猗猗鯨以興君身失所逢百罹月以喻夫道僶俯勵莫虧草木眀覆載妍醜齊榮萎願君常御之行止雜燧鐫異日期對舉當如合分支韓愈寄崔立之琢削為鎔鉛煮白石作玉真自欺丨丨丨酒杯規摹定州瓷荷心雖淺狹鏡面良渺瀰持此夀佳客到手不容辭曹侯天下平定國豈其師一飲至數石溫克頗似之風流越王孫詩酒屢出竒喜我有此客玉杯不徒施請君詰歐陽問疾來何遲呼兒掃月榭扶病良及時蘇子瞻獨酌試藥玉杯有懷諸君子明日望夜月庭佳景不可失作詩括之價重氷瓷仙人棄餘糧玉色已可欺小試換骨力丨丨十丨丨灌以長白虹渺若江海瀰浮之端不惡學者不可辭但愧聞道晚早從雁門師律部有眀文可復時中之汝陽佳少年二十出六竒家有持杯手兩手當一施風吹酒面側月度杯心遲百年容冇命一笑更須時陳師道次前韻貌矮金壺揚君喜我梨花盞却念初無注酒魁丨丨丨丨肯提送挼莎殘菊更傳杯黃魯直謝景何送惠酒器規繩去欹窊矮胡生南方託家碧山崖採擇供貢篚扶持上天街愧此願慤姿欲售久未諧道傍麴先生風味固自佳逢渠即傾蓋輸寫能開懷刮削出光采丨丨必丨丨丨金玉豈足貴膠漆真吾儕客來有佳招二士往偕婆娑止坐偶供饋煩金叉矮胡雖木強醇德真無涯虛心實其腹居然外形骸一物幸見用棄置理則乖毛潁有封國陶匏薦欽柴大藥起世痾炮燔及根荄願子自洗濯勿受塵俟埋暇日肯相從醉經髙坐齊張安國桞子酒榼子孫實無斁趙公飲器魏府藏我思兩公愛甘棠惟魏子丨丨丨丨敬奉其盈如升克平陵朱某拜手刻朱元晦題魏府藏趙公飲器古今合璧事類備要外集卷四十四
