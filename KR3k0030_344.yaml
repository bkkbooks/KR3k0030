body:
  text: 古今合璧事類備要外集卷四十四宋謝維新撰飲膳門酒附造酒貰酒禁酒送酒𣙜酒獵酒賜酒使酒賜酺酒德酤酒禮飲裸飲強飲劇飲真率醵飲罰飲獨飲酒令戒飲飲謔不肯戒酣醉宿酲糟粕麴蘖飲膳標題酒者天之美祿帝王所以頥養天下享祀祈福扶老交歡百福之會蓋非酒則不行也然酒一也而有清濁厚薄甜苦紅緑白三色之别故清者曰醥清而甜者曰酏余攴反濁者曰醠亦曰􅀈莫公反濁而微清者曰盞厚者曰醇亦曰醹需重釀曰酎薄者曰醨甜而一宿熟者曰醴美者曰醑苦者曰􅀈旨善反紅者曰醍緑者曰醽白者曰醝亦有醙醳泲酒去滓而苦者酴麥酒不去滓而飲者曰醪汁滓酒醅其未䍤酒醇謂乳酒而酤又其一宿酒也然又有酒材焉不可以不知秫稻是也又有酒母焉不可以不辨麴蘖是也亦有酒成焉不可以不講湛熾腥熟毋有差貸是也夫如是而後酒成焉然古者酒以行禮非繼以淫故祭祀則用酒賔客則用酒養老扶疾慰勞則用酒共之有道而用之有節未嘗無故而酒也自夫人沉湎無度縱欲敗常於是乎不聞有禮飲而有劇飲者矣不聞有鄉飲而有醵飲者矣彼烏知所謂德將者邪非失事而不知有戒飲非禁穀而不知有禁釀𣙜酤非與民同樂是欲利歸公上也賜酺非因祭而飲是名惠布天下也今罰之施亦豈古者之意飲小而殺身大而敗家又大而失天下皆酒也嗚呼安得惟酒無量不及亂者與之論酒德哉事類旨酒我有丨丨清酒丨丨百壺並詩公酒見後酒正下注禮酒見後酒人下注需酒丨于丨食易釃酒丨丨有衍逮我暇矣詩醇酎白氏六帖清酤既載丨丨詩甘醴小人之交丨如丨記交鬯丨丨醇酒抱朴子酒正丨丨掌酒之政令以二法授酒材凡為公酒者亦如之辨五齊之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三曰清酒酒人丨丨掌為五齊三酒祭祀則共奉之以事役世婦共賔客之禮酒飲酒而奉之凡共酒而入于酒府凡祭祀共酒以供賔客之陳酒亦如之飲齊丨丨視冬時注丨宜寒火齊乃命大酋秫穡必齊麴蘖必時湛熾必潔水泉必香陶器必良丨丨必得兼用六物大酋監之毋有差貸注丨丨腥熟之調記月令酌數皆有丨丨見後注三爵君子之飲酒也一爵而色灑如也二爵而言言斯丨丨而油油以退記又丨丨不識矧敢多又詩兩樽朋酒斯饗注丨丨曰朋詩八樽凡祭祀以法共五齊三酒以實丨丨大祭三二中祭再二少祭一二皆有酌數禮酒正一宿熟醴酒丨丨丨説文百藥長酒為丨丨之丨王莽詔唐子西陸諝傳陸諝麯城人少與壺子商君相友善約先貴無相忘已而壺子任太常商君任主爵都尉通顯矣而諝方青州為從事壺商等上疏曰臣等亡狀蒙陛下器使待罪九卿自非得天下賢聖與之同升則非但無以副陛下傾渴而臣等亦自不滿臣友麯城陸諝者舉世莫能測其為人以為剛又無雲以為柔又有立文雅醖藉號為醇儒至論全身保家治國平天下則又似謀臣䇿士往時袁盎相吳王驕日久數陷害二千石盎用其兄子種計與醑厚善卒賴其力得脫虎口以歸此全身之道也吕太后時羣臣動見覆族吕須讒陳平曰平為相非治事専從諝戲婦女太后聞之私獨喜而平得以全其宗此保家之效也河南獻王修德為仁義天子不悅王懼日夜與諝語不厭相事幾廢而民間作畫一之歌此安天下之效也臣聞王者尊有德進有功今諝既賢聖而上自朝廷郊廟燕饗下至田里冠昏聚會諝未嘗不在其間功效不為後人而位青州從事簿空置臣亡益上從其言遣壺子持節召諝至見上歡甚是日拜諝光祿勳頃之封醴泉侯食千户諝歎曰生我者天地成我者壺商也二人既薦諝以身下之然上每念諝輒并召二人諝卒諡懿侯子淳嗣至曾孫離不肖以罪廢國除諝既沒二人亦斥踈遂不復召用云太史公曰漢興陸賈以辨説遊公卿間名聲籍甚為太中大夫以夀終而醑復以德業位九卿賜爵列侯傳國數世陸氏之先豈有天祿哉蘇子瞻洞庭春色賦并引安定郡王以黃柑釀酒名之曰洞庭春色其猶子德麟得之以餉豫戲作賦曰吾聞橘中之樂不減商山豈霜餘之不食而四老人者遊戲於其間悟此世之泡幻藏千里於一班舉棗葉之有餘納芥子其何艱冝賢王之逹觀寄逸想於人寰嫋嫋兮春風泛天宇兮清間吹洞庭之白浪漲北渚之蒼灣攜佳人而往遊勤霧鬢與風鬟命黃頭之千奴卷震澤而與俱還揉以二米之禾藉以三脊之菅忽雲蒸而氷解旋珠零而涕澘翠勺銀罌紫絡青綸隨屬車之鴟夷欵木門之銅鐶分帝觴之餘瀝幸公子之破慳我洗盞而起嘗散腰足之痺頑盡三江於一吸吞魚龍之神姦醉夢紛紜始知髦蠻鼓巴山之桂楫扣林屋之瓊關卧松風之瑟縮揭春溜之淙潺追范蠡於渺茫弔夫差之惸鰥屬此觴於西子洗亡國之愁顔驚羅襪之塵飛失舞袖之弓彎覺而賦之以授公子曰嗚乎噫嘻吾言夸矣公子其為我刪之蘇子瞻中山松醪賦始豫宵濟於衡漳軍徒涉而夜號燧松眀而識淺散星宿於亭臯鬱風中之香霧若訴豫以不遭豈千嵗之妙質而死斤斧於鴻毛效區區之寸眀曾何異於束蒿爛文章之紏纒驚節解而流膏嗟構厦其已逺尚藥石之可曹收薄用於桑榆製中山之松醪救爾灰燼之中免爾螢爝之勞取通明於盤錯出澤於煎熬與黍麥而皆熟沸舂聲之嘈嘈味甘餘之小苦歎幽姿之獨髙知甘酸之易壞笑涼州之葡萄似玉池之生肥非內府之蒸羔酌以癭藤之紋樽薦以石蟹之霜螯曽日飲之幾何覺天刑之可逃投拄杖而起行罷兒童之抑搔望西山之咫尺欲褰裳以逰遨跨超峯之奔鹿接挂璧之飛猱遂從此而入海渺翻天之雲濤使夫嵇阮之倫與八仙之羣豪或騎麟而翳鳯爭榼挈而瓢操顛到白綸巾淋漓宫錦袍追東坡而不可及歸哺啜其醨糟漱松風於齒牙猶足以賦逺遊而續離騷也造酒為酒十月獲稻丨此春丨詩豳七月又俶載南畝播厥百穀云云丨丨為醴蒸畀祖妣以洽百禮作酒若作丨醴爾惟麴蘖書説命五齊見前酒正注六物見前火齊注酒材見前酒正注酒式以丨丨誅賞人注誅賞其作酒之善惡記儀狄作昔丨丨丨酒而美進之於禹禹飲而甘之遂疏丨丨乃絶旨酒戰國䇿杜康造魏武帝短歌行曰何以解憂惟有杜康注康古造酒者又丨丨善丨酒以酉日死故酉日不飲酒會客客論造葡萄酒漢大宛國丨丨丨丨貨殖傳為馬乳酒漢師學七十二人給大官桐馬酒注以馬乳為酒採桐葉時乃成也營人善釀阮籍聞步兵厨丨丨丨丨有貯酒三百斛乃求為步兵校尉白墮善釀晉河東人劉丨丨丨丨酒飲者醉不能解造玉薤酒隋煬帝丨丨丨丨十年不敗龍城録釀黎花酒杭州其合丨酒趂丨丨時熟號梨花春長慶集注自稱釀王汝陽王璡取雲夢石甃泛春渠以置酒作金銀龜魚浮沉其中為酌酒具丨丨丨兼麴部尚書出醉仙圖有芳醖監河中府河東丨丨丨丨汲河以釀地理志釀祭勾芒李泌字長源泌請里閭丨宜春酒以丨丨丨神祈豐年帝悅乃著令冠絶當時時大樂有府史焦革家善醖酒丨丨丨丨為酒譜一卷李淳風見而悅之文料吕才東臯子集序禁酒搜私釀趙廣漢為京兆突入慱陸侯霍禹第門丨丨丨酤椎破壚罌斧破門關罰私飲曹操以年飢兵與表制酒禁孔融書爭之融因得罪徐邈私飲至於沉醉操怒丨之旱禁釀蜀簡雍拜昭得將軍性簡傲跌宕在先主坐席猶箕踞傾倚時天旱禁釀酒者有刑吏于人家索得釀具論者欲罰雍與先主遊觀見男女行道謂先主曰此人欲行淫何以不縛先主曰何以知之對曰彼有淫具與欲釀者同先主大笑而原欲釀者滑稽皆此類飢禁酤見荒嵗門觸酒禁薛戎字元夫遷浙東觀察使所部州丨丨丨者罪當死戎弛其禁孔融辨禁私釀書曹操欲製酒禁丨丨與操書云天垂酒星之曜地列酒泉之郡堯不千鍾無以建太平孔非百榼無以堪上聖樊噲解厄鴻門非鍾酒無以奮其怒趙之厮養東迎其主非巵酒無以激其氣髙祖非醉斬白蛇無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪無以脫其命定國不酣飲一斛無以決其法故酈生以髙陽酒徒著功於漢屈原不餔糟啜醨取困於楚由是酒何負於政哉沽酒無酤丨酒丨我詩伐木不食沽酒市脯不食語當壚司馬相如與卓文君臨卭賣酒舍文君丨丨相如與傭保雜作滌器本傳開壚王莽時魯庾言請法古令作酒丨丨以賣通典了酤王褒奴了丨納以丨詳見奴僕注蒼頭市劉寬嘗坐客遣丨丨丨酒迃久大醉而還客不堪之罵曰畜産寬須臾遣人視奴疑必自殺顧左右曰此人也罵言畜産辱孰甚焉故吾懼其死也東觀漢記千文一斗孝靈家百司酒酒酒丨丨丨丨典論百錢至店阮宣嘗步行以丨丨挂枝頭丨酒丨便獨酣暢雖當世富貴不肯顧家無儋石之儲晏如也本傳金貂換酒阮公鄰家婦有美色當壚沽酒阮與王安豐常從婦飲酒既醉便眠婦側夫不疑之伺察終無它意金龜換酒賀知章一見李白呼為謫仙人以丨丨丨丨與之共飲托言飲鄰婦壚見前金貂換酒注過黃公壚王戎為尚書令著公服丨丨丨丨謂後車客曰吾昔與嵇叔夜阮嗣宗酣暢於此壚自嵇阮亡以來便為時所羈紲今視此雖近邈若山河世説淵明取酒劉延之與淵眀情飲延之為始安郡經過臨去留二萬錢與淵眀淵眀悉送酒家稍就取酒鄭羲酤酒後魏丨丨為西衮州刺史多所受納政以賄成性又嗇吝人冇禮餉者不與杯酒臠肉西門受羊酒東門丨賣之三騶對飲齊謝幾卿性通脫為尚書左丞嘗預樂遊苑宴不得醉而還詣道邊酒壚停車褰幔與車前丨丨丨丨觀之如堵幾卿自若一斗獨酌馬周字賔王舍新豐逆旅主人不之顧周命丨丨八升悠然丨丨衆異之朝野僉載以為濯足錢悉無留唐陽城為諌議大夫每約二弟吾所俸入而可度食米幾何薪菜鹽幾錢先具之餘悉送酒家丨丨也肆中飲歸仁宗朝宫官魯簡肅公宗道為諭德一日仁宗急召公將有所問使者及門而公不在移時乃自仁和肆中飲歸使遽入白乃與公約曰上怪公來遲當託何事以對公曰但以實告曰然則當得罪公曰飲酒人之常情欺君臣子之大罪中使嗟嘆而去真宗果問使者具如公對真宗問卿何故私入酒家公謝曰臣家貧無器皿酒家百物具備賓至如歸適有鄉里親客自逺來遂與之飲然臣既易服市人亦無識臣者仁宗曰卿為宫臣恐為御史所彈然自此竒公以為忠實可大用歸田録山谷緑隂堂記嘉陽張仲吉寓舍於楚道以酒壚為家産若朝夕汲汲於囂中之嬴惟不足及能種花養竹間間於林下之樂嘗有餘其子寬夫又從豫學故豫數將諸生過其家近市而有山林趣花竹成隂啼鳥鳴蛙常與人意相值或時把酒至夜漏下二十刻雲隂雷風與諸生衝雨踏泥而歸諸生從豫未嘗有厭倦焉則仲吉父子好事喜賔客可知也今蒙恩放還去此有日矣故書遊息之樂使工李夀刻之緑隂堂上使後之不及與余同時亦得觀焉貰酒折劵棄責漢髙祖為泗上亭長好酒及色常從王媪武負貰酒醉卧武負王媪見其常有龍怪之髙祖每酤留飲酒售數倍及見怪嵗竟此兩家常丨丨丨丨注韋昭曰貰賖也史本紀貨袍償欠孫濟權之叔也嗜酒不給産業常醉屢欠酒緡人皆笑之濟恬然自若謂人曰尋常行坐處欠人酒債欲貨此緼袍償之債家至門吳潘璋字文章性博蕩嗜酒居貧好賖酤丨丨丨丨輒言後豪當還送酒饋醪昔者良將用兵人有饋一單醪者使投之於河令將士迎流而飲之單醪不能味一河水三軍至為之死非滋味及之也黃石公獻飲榖陽堅丨丨於子反子反飲之而醉不能見楚子遂宵遁敗楚軍也左獻酒楚宣王朝諸侯魯共公後至而酒薄宣王怒共公曰我周公