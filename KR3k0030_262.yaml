body:
  text: 古今合璧事類備要别集卷五十六宋謝維新撰百草門蒲格物總論蒲草叢生人多種於田間莖長者可六七尺三脊無葉如薤二三月生苖八九月收可為席者是也事類鮫守齊澤之雈蒲舟丨丨之左昭二十年妾織臧文仲丨丨蒲左文公雈苻鄭太叔政寬鄭國多盜取人於丨丨之澤遂興徒兵以攻丨丨之盜盡殺之左昭結蒲秦時一湖有九十臺皆生丨丨乃云始皇遊此臺丨丨繫馬自是蒲生皆結續仙記蒲裹輪漢武帝以丨丨丨迎申公史蒲為牒路溫舒字長君父為里監門使牧羊溫取澤中丨截以丨丨編用寫書稍習善求為獄小吏因學律令轉獄史縣中疑事皆問焉本傳蒲為鞭劉寬宣帝時遷臨淮太守用丨丨丨罰吏漢書醜奴拔河東常丨丨將一小兒于湖邉丨蒲暮宿于田舍中見一小女姿容極美乘小舟直前投醜奴舍寄宿因卧頃覺有臊氣女已知人意便求出户化為獺幽明録詩集聊可截為書丨丨丨匹栁復宜春梁元帝生其間我有一池水蒲葦丨丨丨韓退之何時織丨丨丨得孤帆去陸龜蒙初霜刈魯國寒事早丨丨丨渚蒲揮鎌若轉月拂水生連珠此草誠可珍何必貴龍鬚織作玉牀席欣承清夜娛羅衣能再拂不畏暑塵蕪李白薤葉鋪沮洳沙泉丨丨丨穎濵萍附蘋紫萍格物總論萍浮草也一名芣萊二種有青色者有紫色者葉皆細對生梗長二寸許浮於水上溝瀆間所生彼所謂蘋者按本草謂其大者曰蘋莖長三四寸亦葉葉相對而生沉在水中亦無根著又與所謂白蘋者不同人多不辨因筆併及之事類鴨茵緑浮光多美鴨太原少尹樊千里買百隻置後池載數車浮萍入池使為丨作丨丨雲林異景詩魚藻洞魚朝恩宅有洞房四壁大安玻璃板中貯江水及萍藻諸色丨蝦號丨丨南康記蘋冬不死太原晉祠有水底蘋丨丨丨食之甚美酉陽雜爼詩集風約半丨丨丨池萍杜水悲流風丨丨丨萍劉禹錫無休日萍泛丨丨丨杜蓋汙池萍丨丨丨淨韓微馨借丨丨丨渚萍杜含吹轉青萍丨丨丨杜生事如問家何所有丨丨丨浮萍李頻飄蕩無根泛泛江漢萍丨丨水丨丨司馬彪飄蕩幾時逐水應無定因風不自由只緣根底薄丨丨丨丨休古詩紫萍波流紫葉帶丨丨李白風飄丨丨千點紫前人莎格物總論莎一名薃一名侯莎一名香附子一名雀兒頭香生田野間其根生如棗核者謂之香附子事類闕詩集緑滿巖丨丨丨扉外綿綿芳草隂种明逸青蒲階桃蹊李徑有塵埃初放丨莎秀丨丨想見芊綿古城角有人嗟我未歸來宋景文流水落丨丨涓涓丨砌莎百氏集空庭對何事牽幽思丨丨丨野莎青春衝野步落日拄笻過色與莓苔近隂藏蟋蟀多聞思舊山下蕭颯遍煙蘿李白半摧尖老樹雨隂渾脫葉緑莎霜後丨丨丨秦敏編燒痕最憐高塜臨官道細細煙莎丨丨丨張商英芭蕉格物總論芭蕉一名苞苴叢生根出地面兩三莖成一簇大者三二尺圍重皮相裹葉如扇廣尺餘長一丈柄如山芋莖中心抽幹作花初生大蕚如倒垂菡蓞盛紅者如火炬謂之紅蕉白者如蠟色謂之水蕉閩人以灰理其皮令滑績以為布又一種株大者一圍餘葉長一丈或七八尺廣二尺許花大如酒杯色如芙蓉莖著末百餘各為房相連纍甜美亦可蜜藏二廣閩中有之是名甘焦也然亦三種子大如拇指長而鋭有類羊角名羊角蕉最甘美子如雞卵大有類牛乳者為牛乳蕉微減羊角一種大如藕子長六七寸形正方少甘最下也其莖皆散散如絲可紡績如絺紵交廣閩人俱為之事類種以供揮灑僧懷素貧無紙可書嘗於故里丨芭蕉丨丨丨丨唐本傳詩集開緑扇芭蕉丨丨丨方義山有青絲幸丨丨丨用寧將衆草同心虛含夕露葉大怯秋風細響安禪後濃隂生夏中由來何所喻持以問支公錢起葉題詩蕉丨丨丨詠白居易絲著服焦丨丨丨輕同上信中空不枝惟葉茂無幹丨丨丨所以免摧折為依君子風宋景文起新知芭蕉心盡展新枝新卷新心暗已隨願學新心養新德旋隨新葉丨丨丨張橫渠障夏日芭蕉植秋檻勿云憔悴姿與君丨丨丨羽扇寧復持宋文公作秋聲瀟瀟灑灑復亭亭一半風流一半清不為暑流添午隂却來愁枕丨丨丨楊誠齋狼籍秋霜芭蕉移種未多時濯濯芳莖已數圍畢竟空心何所有欹傾大葉不勝肥蕭騷暮雨鳴山樂丨丨丨丨脫敝衣堂上幽人觀幻久逢人指示此身非蘇穎濵卧聽急雨世情易變如雲葉官事無窮類海潮退食北窗涼意滿丨丨丨丨到芭蕉張南軒苔蘚格物總論苔生於地之隂濕處隂濕氣所生也初生其處漸青成暈斑斑點點久則堆積漸厚如塵埃然又久則微有根葉又能傍緣樹木階砌磚瓦柱礎而上空室無人行則又生紫者又一種生在水中石上青絲色如散髮然江東人多食之事類苔邪在瓦曰丨丨垣衣在垣曰丨丨並廣雅石髮苔衣注云水苔也一名丨丨爾雅澤葵丨丨即莓苔也鮑胎法海藻丨丨一名丨苔南粵志生閣陳王初喪應劉端憂多暇緑苔丨丨芳塵凝榭曹子述側理張連進博物志武帝嫌煩令削之賜丨丨紙王子年云側理陟釐也此紙以水苔為之溪人語訛謂之丨丨爾晉書沒階宋玉微乃太保𢎞之弟也吏部尚書江湛愛其才舉為吏部郎因病不受與湛書告繩足不踰閫十餘年棲遲環堵之室苔草丨丨南史本傳江淹苔賦鑿山楹為室有老苔焉又緑苔鬖髿乎研上松栝交隂泉雨長注詩集日夜黃青苔丨丨丨江文通沙濤痕苔蘚蝕破丨丨丨杜甫山門古苔蘚丨丨丨杜石田荒丨丨茅屋丨蒼苔杜侵履濕新苔丨丨丨韋應物上階緑苔痕丨丨丨劉禹錫依砌上蒼苔丨丨丨謝元暉隨意坐丨丨丨莓苔杜歸休步丨丨丨紫苔同上錢剝落苔斑丨丨丨白樂天車碾來路旁凡草榮遭遇曽得七香丨丨丨前人染馬蹄青青丨丨丨王建挂魚衣千頃桑麻在船裏空餘石髮丨丨丨坡水仙髮繞繞丨丨丨茸茸蛟客髯梅聖俞水苔良冶鑄貪多寧損志嫌少不為愚丨丨何由丨常流豈敢圖野人惟自愛難把悅妻孥魏野屣齒印丨丨丨苔深韓維樵徑入丨丨丨蒼苔曽公衮新笋破緑嫌丨丨丨紅愛落花粧張太和菰格物總論菰按本草生水中葉如蒲葦刈以秣馬甚肥又謂之茭白其嵗乂者中心生白臺如小兒臂謂之菰米其臺中有黑者謂之茭鬱其根如蘆根下澤處謂之菰葑以去其葉便可耕萌其苖有莖硬者謂之菰蔣草至秋結實乃雕胡米也今其葉人多刈以為薦事類孔子舍丨丨之楚丨於蟻丘之蔣莊子張翰思丨丨字季鷹吳郡人齊王冏辟為大司馬東曹掾冏時執權翰謂同郡顧榮語欲求去榮執其手愴然曰吾亦與子摘南山蕨飲三江水耳翰因見秋風起乃思吳中菰菜尊羹鱸魚鱠曰人生貴得適意何能羈宦數千里以要名爵乎遂命駕而歸俄而冏敗人謂之見機宋玉賦主人之女為臣炊雕胡之飯露葵之羹吳都賦菰穗雕胡菰子作餅詩集根布結丨丨洲渚垂葉滿皋澤匹彼露葵羹可以留上客沈約葉肥楚人菰丨丨王維黑穟秋菰為丨丨精鑿成白粲翠牙丨丨穿裛蔣並杜甫雕胡丨丨炊屢新又滑憶丨丨飯又丨丨方自炊沈約雲子飯抄丨丨白杜叉丨丨新炊滑溜匙洪駒父緑未齊短短菰蒲丨丨丨東萊茅格物總論茅説文謂之菅叢生根茹相連葉長三四尺生於荒野間野人刈以覆屋江淮間生者一莖三脊有毛刺者曰菁茅事類茅茨堯為天子丨丨不剪尹文子茅藉荆州包匭菁丨注匭匣也菁以為葅丨以丨酒尚書禹貢嬰茅殷湯救旱素車白馬以身丨丨為犧牲史記掘茅武王伐殷微子啓肉袒面縛牽羊丨丨膝行而前典録坐而漁吕尚丨茅丨丨六韜貢不入僖四年齊侯以諸侯之師伐楚管仲曰爾丨苞茅丨丨王祭不供無以縮酒寡人是徵云云左詩集粗根鶗鴂芳不歇霜繁緑更滋擢本同三脊流芳有四時丨丨縮酒易結解舞蠶遲終朝入楚貢豈羡詠陳詩梁定襄侯發葉銅律與鳴琴俱稱類君子豈惟江淮間丨丨超衆美荑同自牧歸茹因彚征起豈獨邁秦衡方知蔑沅沚梁簡文帝荒蔓丨郊丨草萊杜蓬格物總論蓬叢生長尺許其莖曲微草也事類孤根魯哀公失國走齊公問焉曰子之年甚少道至于此乎吾少之時多愛我者吾體不親人多諫我者吾忌不能用是內無弼外無輔輔弼無人諂諛甚衆譬之猶秧蓬也丨其丨本密其枝葉國語編户子貢作壞室丨蓬為丨彈琴瑟其中以歌先王之風尚書大傳沒人張仲蔚平陵人也與同郡魏景卿俱隱身不仕所居蓬蒿至於丨丨三輔決録詩集離本根轉蓬丨丨丨飄飄隨長風何意回颷舉吹我上雲中高高上無極天路安可窮類此流離子捐軀遠從戎毛褐不掩形薇藿常不充去去莫復道沉憂令人老曹子建轉霜根孤蓬丨丨丨杜復何辜百草應節生含氣有深淺秋蓬丨丨丨飄飄隨風轉司馬彪無勞問丨丨丨轉蓬杜藍格物總論藍叢生園圃間畦而種之人多採其葉以染青事類植藍供母楊震丨丨以丨丨諸生嘗有助種者輒拔更種以拒其後續後漢書種藍為業趙岐云豫就醫偃師道經陳留此境人皆以丨丨染紺丨丨藍田彌望黍稷不植慨其棄本逐末遂作此賦曰同丘中之有麻似麥秀之油油後漢詩集青又出青物有無窮好藍丨丨丨丨朱研方比德白受始成形袍襲宜從政襟垂可問經當時不採擷佳色幾飄零吕溫藤附蘿蔓格物總論藤有大小數種皆依附大木蟠曲而上其綿直不可以尋丈許所在山谷中多有之事類藟藤丨丨也廣雅江東呼丨為丨藤似葛粗大也爾雅松蘿女蘿丨丨也兔絲也詩云􅀢與女丨施于丨柏廣雅又在草曰兔絲在木曰丨丨毛詩注紫藤丨丨葉細長莖如竹根極堅實重重有皮花白子黑置酒中二三十年亦不腐敗其莖截置煙爐中經時成紫香可以降神南方草木狀榼藤丨丨依樹蔓生如通草藤也其子紫黑色一名象上豆三年方熟其殼貯藥不壞生南海解諸藥毒同鍾藤丨丨附樹作根軟弱須緣樹以作藤既纒裹樹即死且有惡汁尤令速朽也藤盛成樹若木自然大者或至十圍又云藤圍數寸重於竹可以為杖篾以縛船及為席勝於竹異物志舒元輿悲剡藤文剡溪古藤甚多為紙工斬伐以造紙今能文者孰非書剡藤者耶詩集刺眼藤枝丨丨新杜寄木纎條丨喬丨弱影掣風斜標春開曉翠出霧露懸花梁簡文帝縷絡高木八九株有藤丨丨之韓愈纒繞幾嵗生成為大木一朝丨丨因長藤百氏集蓋瓦對門藤丨丨杜刺簷庭中藤丨丨曲藏蛇藤蔓丨丨丨並杜下如蛇藤花紫蒙茸藤葉青扶蘇誰謂好顏色而為害有餘丨丨丨盤屈上若繩縈紆可憐中間木束縛成枯株柔蔓不自勝嫋嫋挂空虛豈知纒木身十夫力不如先柔後為害有似諛佞徒附著君權勢君迷不肯誅又如妖婦人綢繆蠱其夫毫末不早刈滋蔓宜難圖願以藤為戒銘之於坐隅白居易繁英照故鄉春欲盡一嵗芳難再巖下已青蔥吾廬日堪愛幽溪人未去芳草行應礙遙憶紫藤垂丨丨丨潭黛李衛公倒松纒丨丨賴藤丨杜丘壑蔓丨丨丨寒藤前人去年採魯人酒薄邯鄲圍西河渡橋南越悲嵗調紅藤百萬計自古工作無窮時丨丨丨藤藤已竭入山十日脫身歸新藤出土拳如蕨唐子西蘿垂飲猿高蘿丨丨丨杜覆巢鶴引蔓出雲樹垂輪丨丨丨幽人對酒時苔上間花落錢起通林帶丨丨丨女蘿杜引蔓出見上注兔絲附丨丨丨女蘿文選虺蔓盤丨丨相結丨虬梢久回曲紛若未契繩繁如已綸綍宋景文亦有託如蘿丨丨丨陸士衡高成幄丨蘿丨幃丨杜縈數匝緑蘿丨丨丨本在草堂間秋色寄高樹晝隂籠遠山移花疏處種斸藥因時攀日暮微風起難尋舊徑還許渾蔓衍傍松蔓丨丨丨枝王融弱垂纓寒松偃澗濵丨蔓丨丨緑波縈翠帶長水濺低花馥梅聖俞亦有尋蔓葛丨丨丨陸士衡古今合璧事類備要别集卷五十六
