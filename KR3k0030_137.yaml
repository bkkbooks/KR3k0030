body:
  text: 古今合璧事類備要後集卷六十八宋謝維新撰監司門都大提舉茶馬歷代沿革國朝熙寧七年始詔三司鹽鐵判官李杞三司勾當公事蒲宗閔經畫川蜀買茶充秦鳳熙河路博馬就除提舉成都府路買茶公事杞於秦州宗閔於成都置司後改名都大提舉茶馬事成都紀國朝熙寧七年差李杞蒲宗閔成都府買茶熙河路博馬並令杞等提舉置都大提舉及主管同主管各因其資品髙下除授云元豐四年羣牧判官郭茂恂又言茶司既不兼買馬遂立法以害馬政恐誤國事乞併茶場買馬為一司從之蓋茶馬司始合於此時也舊制於原渭德順三郡市蕃馬熙寧七年初復熙河經略使王韶言西人頗以善馬至邊其所嗜唯乏茶與之為市請趣茶馬辨之乃命三司勾當公事李杞運蜀茶至熙河置買馬場云而原渭德順更不買馬於是杞言賣茶市馬一事也乞同提舉買馬杞遂兼馬政然分合不常至元豐四年羣牧判官提舉買馬郭茂恂又言茶司既不兼買馬遂立法以害馬政乞併為一司從之掌收摘山之利以佐邦用凡市馬於蕃夷以茶易之大觀以來茶馬之政廢川茶不以博馬唯市珠玉故馬政廢缺建炎四年張浚奏大石進奉珠玉髙宗喻曰云云紹興四年從關師古之請以乏戰馬始令四川宣撫司支茶博馬五年密院言已於永康軍威茂州置場七年宰臣趙鼎言得旨復置茶馬官舊有主管茶馬同提舉茶馬都大提舉茶馬凡三等上曰考其資歷命之乾道元年川秦兩司馬額共九千餘匹茶馬陳彌作言本司買馬川秦兩司丈黎珍敘南平長寧軍本州軍年額川馬五千餘匹係應副江上諸軍階州之峯貼陜西和州之宕昌兩處年額共西馬四千餘匹係輪年應副三衙川秦兩司者祖宗舊制至今不廢四年四川宣撫使虞允文奏照得祖宗朝都大茶馬官於秦州成都各置司居治各半年排發馬月分居秦司訖事即歸川司措置發茶并買馬物帛之類今酌依舊制於鳳州河池縣置秦司既近宕昌買馬之弊可以稽察從之秦馬舊二萬匹乾道川秦買馬之額嵗為萬有一千九百匹有奇川司六千秦司五千九百益梓利三路漕司嵗應副博馬油絹十萬四千匹成都利州路十一州産茶二千一百二萬斤茶馬司所收大較如此其後文州改隸秦司而川司增珍州之額共為四千八百九十六秦司六千一百二十合兩司為萬有一千十有六匹此慶元之額也嘉泰末川司五場又增為五千一百九十六匹秦司三場增為七千七百九十八匹合兩司為萬有二千九百九十四匹然纍嵗所市多不及額焉朝野雜記事類事功李稷言一年通計課利錢七十六萬緡上批蜀茶變法稷能推原法意日就丨丨宜速遷擢以勸在官邊用司馬光元祐初相罷諸路鹽鐵法皆復其舊獨川陜茶以丨丨未即罷遣使相視去其甚者市駿在昔元豐留神武備摘山丨丨具著科條乃詔牧司悉遵成憲乃將使實克推行初寮除李昌孺制摘山必能為吾講丨丨之制得充廏之良龍溪除起宗制馬萬匹元符末程之邵召對徽宗詢以馬政之邵言戎俗食肉飲酪故貴茶而病於難得願禁沿邊鬻茶以蜀産易上乘詔可未幾易丨丨丨四朝志錢百萬李稷初蜀茶額丨三十萬至稷加為五十萬及陸師閔代稷為丨丨馬多茶厚先帝市馬於邊有司幸賞率以駑駘充數紹聖中提舉程之邵始精揀汰又以羡茶轉入熙秦市戰騎故丨丨而丨息丨買茶博馬紹聖初綱馬死損都大陸師閔建議丨丨丨丨立為定額其效已見特賜銀絹各一百匹兩仍令學士院降勑書續㑹要提舉市易熙寧十年李稷丨丨成都府等路茶場熙河丨丨事手詔曰川茶一司創置雖久未能就緒儻非得材智之人益以事權無所成李稷風力固已可仗然權勢輕小可依李杞例兼三司判官仍委權不限員舉劾官吏革買馬弊程之邵主管奏蜀茶馬丨黎州丨丨之丨嵗以仲秋為市四月而止四朝國史以次對為淳熙五年茶馬吳楮以馬政修舉除敷文閣待制再任自紹興初至是踰四十年間丨丨丨丨茶馬趙開及吳㧾二人耳成都記官屬自辟應産茶以市馬之處丨丨許丨丨置視其數之登耗以詔賞罰四朝志增為十一引自趙開行鈔法每茶百斤為一大引令商人輸引錢市利八百文至紹興十三年遞增為十一引時物價騰踴茶商取息頗厚明年主管官賈思誠又丨丨丨丨丨三百文於是諸場類皆溢額而買馬之數復不加多人但知茶馬司之富甲天下其實所收引錢視建炎增倍後雖破敗不可復減矣中興係年録加為一百萬見上錢百萬注嵗計百二十萬黃廉嘗按察川陜謂茶政隨事制宜便於公者不茍去以為名害於民者不茍存以為利是嵗遂代前官領茶馬事在職嵗餘士大夫乃頗見信初陸師閔時丨丨茶息以一丨丨丨丨緡掊克斂怨無所不至及廉將軍盡除公私之病比數年亦得百二十萬也長編利錢七十六萬見上事功注都大坑冶歷代沿革唐開元二十五年監察御史羅文信充諸道鑄錢使唐㑹要天寶三載楊睿矜除御史中丞充鑄錢使六載度支郎中楊釗充諸道鑄錢使永泰元年劉晏充東都淮南浙江東西湖南山南東道鑄錢使第五琦充京畿關內河東劒南山南西道鑄錢使諸鑄錢監監所在州府都督刺史為之副監一人上佐判之續通典國朝自開寶平胡之後因其舊置錢監于鄱陽既而江淮荆浙閩廣之地皆有監係發運使兼提㸃咸平三年以馮亮為江南轉運副使兼都大提㸃江南福建路鑄錢事內供奉官白承睿同提㸃鑄錢事實録至景祐二年始置江浙川廣福建等路都大提㸃坑冶鑄錢一員以魏兼為之九朝通略與提㸃刑獄序官按四年傳榮宗範知鉛山縣有詔罷民采銅皆散為盜宗範一切使如故真宗嘉異擢提㸃江浙諸路銀銅坑冶與此不同當考元豐二年三司言江浙等路提㸃坑冶鑄錢官一員通領九路水陸巡按不周欲增一員分路提㸃從之遂定為兩司在饒者領江東淮浙七閩在䖍者領江西荆湖二廣焉並聖朝職略至元祐元年以坑冶鑄錢通為一司從淮南提㸃李深之請也㑹要政和七年置提㸃鑄錢官兩員於饒䖍州紹興二年置䖍州提㸃司從提㸃王㬇之請也雖有上項指揮後來多在饒州置司贑州只係巡歷六年趙伯瑜乞依嘉祐著令銜內添都大二字與提刑序官二十六年詔都大提㸃坑冶鑄錢司官吏並罷令逐路轉運司交割以尚書省言坑冶鑄錢司近年鑄錢全虧一司官吏所費不資罷之二十七年置提領諸路鑄錢官於行在差侍從或卿監一員不妨本職兼領置屬官三員以提領諸路鑄錢所為名以户部侍郎榮薿兼二十九年從左司諫何溥言乃復置以江淮荆浙福建廣南路提㸃坑冶鑄錢公事繫銜與運判序官依舊於饒贑二州置司輪年守任專以措置坑冶督責鼓鑄為職祖額一百六十餘萬貫孝宗乾道六年併歸發運司八年復置此據提㸃司題名八年詔鑄錢司依舊置提㸃官二員於饒贑二州置司除王楫李大正二人九年兩司分認課額將江南淮南兩浙潼州利州路隸饒州司江西湖廣福建分隸贑州司又王楫等言所有舊坑多係江西却慮饒州一司無從措置欲於江西管內取撥江州吉州撫州興國軍隆興府却隸饒州司從之淳熙三年併贑司歸饒州王楫専為提㸃官加都大焉事類圜府管官錢曰丨丨之職選十八鐘官主鑄錢官曰丨丨王莽㳂挾銅丨丨丨之令以收七福因採山之法用廣五銖胡文恭行葛源制按寶冶丨南州丨丨之饒佐縣官圜府之用宣勞于外典利在公同上鑄貨給邦提舉坑冶司掌收山澤之利或鼓丨泉丨以丨丨國之用凡地利所入及鑄錢嵗有定數視其登耗而賞罰之哲宗正史職官志足國裕民朕修山澤之政令以丨丨丨丨天方降休地不愛寶惟是興利之廣幅員既長必資能臣以持九路之節聖朝職略初寮除徐謹制虞部出使咸平三年馬忠肅亮以丨丨員外丨丨始於江池饒建四州嵗鑄錢百三十五萬貫銅鉛皆有餘羡真宗即以忠肅為江南轉運副使兼大都提㸃江南福建路鑄錢按實録及長編是馮亮此秀岩誤以馮為馬也馬忠肅咸平四年自西川運使召朝野雜記祕閣因任鞏嶸權都大提㸃坑冶公事職事修舉直丨丨丨其丨冶司孝宗朝定鑄額嵗十五萬緡積久寖虧六不及一推原弊端知楮輕費重乃使楮與草音礦各時其直輕重只以相權坑丁競勸草務倍入先是冶卒窳惰多遺草泥滓中有司闕良於是盡還洗所得皆精故額平齊集匿銅籍為羡餘胡則字千正提舉江南路銀銅場鑄錢監得吏所丨丨數萬斤吏懼且死則曰馬伏波哀重囚而縱亡之吾豈重貨而輕數人之罪止丨丨丨丨仁宗實録楮礦時其輕重見前注按南州寶冶之饒丨丨丨丨丨丨丨佐縣官圜府之用宣勞在外興利在公胡文恭制挾銅令以收七福㳂丨丨之丨以丨丨丨因採山之法用廣五銖同上行葛源制檢踏官歷代沿革紹興二年鑄錢司言本司昨被旨許置幹辦公事一員檢踏官五員催綱官二員後來與諸司闕事一例減罷緣所隸九州不可闕官詔復置幹辦公一員檢踏官三員催綱官一員後檢踏置六員十一年從韓球之請將檢踏官各分認專管職事一員在饒州本司一員在信州一員在建州一員在韶州一員在潭州中興㑹要二十六年提㸃坑冶鑄錢司官吏檢踏官並罷二十九年因何溥議再置提㸃官於饒州置主管文字舊亦有贑州置幹辦公事一員韶州建州各置檢踏官一員别置稱銅官催綱官各一員差武臣續紹於饒州添檢踏之員中興㑹要事類幹辦催綱並見沿革詩集錫與同未能便乞勾漏令官曹似是丨丨丨東坡送王維赴錢監詩提舉市舶歷代沿革唐有市舶使以右威衛中郎將周澤為之見柳澤劾慶立疏唐代宗廣德元年有廣州市舶使呂太一通鑑聖朝開寶四年下廣南以同知廣州潘美尹宗訶並兼市舶使通判謝處玭兼市舶判官太祖實録咸平二年九月庚子令杭州明州各置市舶聽蕃官從便長編熙寧中始變市舶法泉人賈海外者往復必使東詣廣否則沒其貨海道回逺竊還家者過半嵗抵罪者泉太守陳稱奏疏願置市舶於泉不報哲宗即位之二年始詔泉置市舶稱了齊之父也稱傳延平志舊制雖有市舶司多州郡兼領元豐中始令轉運司兼提舉而州郡不復預矣元豐二年書言廣州市舶條已修定乞専委官推行詔廣東以轉運使孫逈廣西以運使陳情兩浙以轉運副使周直孺福建以轉運判官王子京逮直孺兼提舉惟行倩子京兼覺察拘攔其廣東路安撫使更不帶市舶後專置提舉而轉運亦不復預矣後盡罷提舉官至大觀元年續置明年御史中丞石公弼請歸之轉運司不報建炎中興詔罷兩浙福建市舶司歸轉運司建炎時政記明年夏復閩浙二司賜度牒直三十萬緡為博易本元年十一月廢二年五月復四年春復置廣司朝野雜記中興㑹要尚書省言併廢以來工人不便虧失數多於是詔依舊復置紹興二年廢福建提舉市舶初令提刑兼領旋委提舉茶事十二年朝廷欲措置福建臘茶時欲廢臘茶至行在置局出賣吕斌上言於是茶事司歸建州而提舉市舶以次復矣中興係年録十四年命蕃商以香藥至者十取其四十七年詔丁沈香豆蔻龍腦之屬號細香樂者十取其一朝野雜記乾道二年詔罷兩浙提舉市舶逐處職事委知通知縣監官同行檢視而總其數令轉運司提督紹興二十九年張闡言福建廣南各置務於一州兩浙舶務乃分建於五所全乾道初臣寮言兩浙惟臨安明州秀州溫州江隂軍凡五處有市舶祖宗舊制有市舶處知州兼提舉市舶務通判帶主管知縣帶監而逐務又各有監官市舶置司乃在華亭近年遇明州舶船到提舉帶一司吏人留明州數月名為抽解其實搔擾且福建廣南皆有市舶物貨浩瀚置官提舉誠所當宜惟是兩浙置官委是冗蠧乞賜廢罷事類仁恕唐盧鈞字子和開成三年為廣州刺史南海有蠻舶之利珍貨輻湊舊帥作法興利以致富凡為南海者靡不梱載而還鈞性丨丨為政廉潔請監軍領市舶使己一不干預廉潔唐李勉拜嶺南節度使西南夷舶嵗才至四五譏視苛謹勉既丨丨人不暴征明年至者乃四十餘柁本𫝊蠻舶見上仁恕注䌖貨海南諸國丨丨所集蠻夷貨也䌖似接子立二切市舶録王府張公為安南習於海邦竒珍良貨溢于丨丨殊俗異類盈于藁街唐職林南庫市舶者其利不資榷金山珠海天子丨丨也市舶録竒器巨蠧唐嶺南市舶使周慶立造奇器以進殿中侍御史柳澤上書曰慶立雕製詭物造作竒器用浮巧為珍玩以譎怪為異寶乃治國之丨丨也𤣥宗稱善金珠御史王絲紹興人以侍御史為廣南運使兼市舶提舉舊蕃稅之來十稅其一必擇精者絲令精粗兼取夷人悅之目為丨丨丨丨㑹稽圖經航琛輦賮丨丨越海丨丨踰障顔延年詩艎浪參雲張鷟云扶南雜種安西諸國跨險憑危飛丨走丨望鼠島而三休大舶丨丨指麟州而一息鳶波象郡萬舳爭先烏滸蠻㬻千艘競進又注曰南海中有炎洲洲上有火鼠又有麟洲餘皆國名蠻賮天珍諸丨之丨五丨之丨每嵗山積市舶録逺人物貨掌蕃貨海舶征榷貿易之事所以來丨丨通丨丨也清節益著向敏中知廣州兼管市舶前後守者多涉譏議敏中始至荆南即市所須藥物以往在官無所求索丨丨丨丨長編熙化二年委寄非輕紹興二十一年李莊除福州提舉上曰提舉市舶司丨丨丨丨若用非其人則措置失當海商不至矣莊可發來禀議然後之任中興㑹要少寬民力上曰市舶之利最厚若措置合宜動以百萬計豈不勝取之於民朕所以留意於此庶幾可以丨丨丨丨耳頗助國用上曰市舶之利丨丨丨丨宜循舊法以招􅝘逺人阜通貨賄並中興㑹要嵗入二百萬髙宗問張闡舶司丨丨幾何闡對抽解與和買以嵗計之納丨丨丨緡如此三路所入固不為少中興㑹要課入倍他路紹興二年廣南提舉市舶司言廣州自祖宗以來興置市舶收丨丨丨於丨丨同上論四弊抽解紹興三十年言者丨市舶丨丨二損詔有司講究户部復奏丨丨舊法令精粗兼取王絲事見前金珠御史下古今合璧事類備要後集卷六十八
