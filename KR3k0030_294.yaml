body:
  text: 古今合璧事類備要别集卷八十八宋謝維新撰水族門蟹附蝤蛑蟛􅒹鱟格物總論蟹八足二螯大者箝角兩出足節屈曲行則旁横今淮海京東河北陂澤多有之雄曰狼螘雌曰博帶取無時獨螯獨目及兩目相向者不可食然其族類最多六足者名蛫音跪四足者名北皆有大毒濶殻而多黄者名䘂其螯最銳斷物如芟刈焉扁而最大後足濶者為蝤蛑一名蟳嶺南人謂之撥棹子以後脚形如棹也隨潮退殻一退一長其大者如升小者如盞楪兩螯無毛所以異於蟹其為至强一螯大一螯小者名擁劔又名桀歩常以大螯鬭小螯食物一名執火以其螯赤故也其最小者名彭螖吳人語訛為蟛􅒹爾雅云螖蠌小者蟧郭璞云即彭螖也似蟹而小蟛蜞亦其類也食之誤人矣鱟大者如扇牡牝相隨牝無目得牡而行牡去牝死以骨及尾尾長二尺生南海事類外剛易之離象曰為鼈為蟹為嬴為蚌為龜孔頴達注以其剛在丨也易側行梓人為簨簴别敘小虫蟹屬以為雕琢鄭康成注刻畫祭器博庶物也賈公彦疏今人謂之螃蟹以其丨丨也周禮敗漆蟹丨丨淮南子集䑕黄及螯燒烟可丨丨於庭本草注用心躁蟹六跪而二螯非虵蟺之穴無所寄託者丨丨丨也荀子用心二蟹之郭索後蚓黄泉范明叔云雖有郭索多足之蟹不如無足之蚓者以其丨丨之丨也揚雄太𤣥無腸公子山中丨丨丨丨者蟹也抱朴子横行介士吳俗有蝦荒蟹兵之語葢取其被堅執銳嵗或暴至則鄉人以為兵證又云出師下砦之際忽見蟹則呼為丨丨丨丨以權安衆又云今之採捕者夜則燃火以照咸附明而至焉蟹譜腹内稲芒蟹八月丨丨有芒芒真丨丨也長寸許向東輸與海神未輸芒不可食雜俎腹中小蟹𤨏􅖜腹蟹水母目蝦松陵集注云𤨏􅖜似蜯有一小蟹在丨丨同瑣􅖜出求食蟹或不至𤨏􅖜餒死所以淮海人呼為蟹奴郭景純江賦蟹則有匡成人有其兄死而不為衰者聞子臯将為成宰為衰成人曰蚕則績而丨有匡范則冠而蟬有緌兄則死而子臯為之衰孔頴達云蟹背殻似匡記檀弓蟹不遺種越王勾踐召范蠡曰吾與子謀呉蠡曰未可也今其稲丨丨丨丨其可乎對曰天應至矣人事未盡也吾姑待之畢卓左持晋丨丨嘗謂人曰丨手丨蟹螯右手執酒杯拍浮酒池中足樂一生矣王倫見惡晋解系與趙丨丨同討叛𦍑時倫信用佞人孫秀與系争軍事更相表奏朝廷知系守正不撓而召倫還系表秀等以謝𦍑氐不從後倫秀以宿憾收系兄弟梁王彤救系等倫曰我於水中見蟹且丨之况此人兄弟輕我邪遂害之何曽糟蟹見前車螯蚶注韓滉畵蟹唐丨晋公丨善丨以張僧繇為之師善状人物異獸水牛等尤妙於螃丨嗜蟹補外國初通判常與知州争權每云我是郡監往者有錢昆者餘杭人也浙人丨丨常求丨丨郡人問其所欲曰但得有螃蟹無通判處則可至今人以為口實歸田録置蟹不食仁宗内宴十門分各進饌有新蟹一品二十八枚帝曰吾尚未嘗問直幾錢左右對直一千帝不恱曰數戒汝軰為侈靡一下箸為錢二十八千吾不忍也置不食聞見録聚以横行僕射嚴續初以位髙寡學為時所鄙江丈蔚作蟹賦譏之曰外視多足中無寸楊口裏雌黄每失途而相煦胷中戈甲常丨衆丨丨丨湘山野録過却便没社相苦痰嗽性嗜蟹人或止之荅云痰嗽發猶有時螃蟹丨丨丨丨雜志懸蟹辟瘧關中無蟹秦人家收得一乾蟹土人怖其形状以為怪物每人家有病瘧者則借去丨門戸往往遂差不但人不識鬼亦不識也筆談藏蟹不沙淮南人丨鹽酒丨凡一器數十蟹以皂筴半挺置其中則可藏之經嵗丨丨歸田録蝤蛑一蟹不如陶榖奉使吳越忠懿王宴之因食蝤蛑詢其族類忠懿命自蝤蛑至蟛蜞凡十餘種以進榖曰真所謂丨丨丨丨一蟹聖宋掇遺蟛􅒹蟹􅒹資養晋夏統養親以孝聞或至海邊拾丨丨以丨丨蟛􅒹所誤晋蔡謨字道明初渡江見蟛蜞大喜曰蟹有八足加以二螯令烹之既食吐下委頓方知非蟹後詣謝尚而說之尚曰卿讀爾雅不熟幾為勤學死陸龜蒙蟹志蟹水族之微者其為蟲也有籍見於禮經載於國語楊雄太𤣥辭晋春秋勸學等篇考於易象為介類與魚鼈剛其外者皆乾之屬也周公所謂旁行者歟參於樂録食疏蔓延乎小說其智則未聞也惟左氏紀其為災子雲譏其躁以為郭索後蚓而已蟹始窟穴於沮洳中秋冬交必大出江東人云稲之登也率執一穂以朝其魁然後從其所之蚤夜觱沸指江而奔漁者緯蕭承其流而障之曰蟹斷七斷入其江之道焉爾然後奔紛越軼遯而去者十六既于江則形質寖大於舊自江復趨于海如江之状漁者又斷而求之其越軼奔去者又加多焉既入于海人亦異其稱謂矣嗚呼穂而朝其魁不近於義耶捨沮洳之江海自微而務著不近於智耶今之學者始知得百家小說而不知孟軻荀楊之道或知之又不汲汲於聖人之言求大中之要何也百家小說沮洳也孟軻荀楊聖人之瀆也大籍者聖人之海也茍不能捨沮洳而求瀆以至于海是人之智反出蟲下能不悲夫吾是以志蟹傅嘉祐蟹譜蟹水蟲也其字從虫旴鬼反亦曰魚屬故古文從魚作􅀢以其外骨則曰介蟲取其横行目為螃蟹焉骨眼蜩腹䖱腦鱟足其爪類拳丁其螯類執鉞其跪又皆外刺性復多躁或編諸繩縷或投諸笭箵則引聲噀沬必死方已類皆􅀈育生於濟鄆者其色紺紫出於江淛者其色青白小者謂之蟛蜞中者謂之蟹匡長而銳者謂之䗻音截大者謂之蝤蛑雖皆有佳味獨蟹參於藥論耳明越溪澗石穴中亦出小蟹其色赤而堅俗呼為石蟹與生伊洛者無異靨圓多腴而奪之􅚺臍長多足而與之蝦其生於盛夏者無遺穂以自充俗呼為蘆根蟹謂其止食茭蘆根瘠小而味腥至八月則蛻形已蛻而形寖大秋冬之交稻粱已足各腹芒走江俗呼為藥蟹最號肥美由江而納其芒於海中之魁遇氷雪則自伏淤澱不可得矣今人設㗖具以按酒者此特為之先置焉江淮間尚推重如此况非所育之地乎何曽食疏𢎞君食檄虞悰飲食亦未必不珍此味也虞悰南史有傳但名存而實亡此為恨耳又曰蟛蜞者二月三日之盛出於海塗呉俗尤所嗜尚嵗或不至則指為禁烟謂非佳節也今之通泰其類實繁然有同蟛􅒹差大而毛好耕穴田畝中謂之蟛蜝毒不可食晋蔡道明誤食之幾死尤宜慎辨也及多生於陂塘溝港穢雜之地往往因雨則瀕海之家列陣而上填砌縁屋雖驅拂之不去也傅嘉祐蟹十二種論文登呂亢多識草木蟲魚守官台州臨海命工作蟹圖凡十有二種一曰蝤蛑乃蟹之巨者兩螯大而有細毛如苔八足亦皆有㣲毛二曰撥掉子状如蝤蛑螯足無毛後兩小足薄而㣲濶類人之所食者然亦頗異其大如升南人皆呼為蟹八月間盛出人採之與人鬬其螯甚巨往往能害人三曰擁劔状如蟹而色黄其一螯偏長三寸餘有光四曰蟛螖螯微毛足無毛以塩藏而貨于市爾雅曰蟛蠌小者蟧云小蟹也蠌音澤蟧音勞吳人呼為蟛􅒹捜神記言此物嘗通人夢自稱長卿今臨海人多以長卿呼之五曰竭朴大於蟛螖殻黒斑有文章螯正赤常以大螯障目小螯取食六曰沙狗似蟛螖壤沙為穴見人則走屈折易道不可得七曰望潮殻白色居則背坎外向潮欲來皆出坎舉螯如望不失常期八曰倚望亦大如蟛螖居常東西顧睨行不四五又舉兩螯以足起望惟入穴乃止九曰石蜠大於常蟹八足殻通赤状若鵝卯十曰蜂江如蟹兩螯足極小堅如石不可食十一曰蘆虎似蟛蜝正赤不可食十二曰蟛蜞大於螖小於常蟹呂君云此皆常所見者北人罕見故繪以為圖又南商言海中􅔢鼊島之東一島多蟹種類甚異有虎頭者有翅能飛者有能捕魚者有殻大兼尺者以非親見故不畫李履中得其一本為作記予家楚宦遊二浙閩廣所識蟹屬多矣亦不悉與前說同而所謂黄甲白蟹蟳蠘諸博呂圖不載豈名謂或殊乎故紀其詳以示博雅者楊廷秀糟蟹賦楊子疇昔之夜夢有異物入我茅屋其背䂓而㸃其臍小而白以為龜又無尾以為蚌又有足八趾而隻形端立而旁行唾雜下以成珠臂雙怒而成兵寤而驚焉曰是作祥也召巫咸卦之遇坤之解曰黄中通理彼其韞者歟雷雨作解彼其名者歟羡海若之黔首馮夷之黄玉者歟今日之獲不羽不鱗奏刀而玊明披腹而金生使營糟丘義不獨醒是能納夫子於醉鄉脫夫子於愁城夫子能親釋其堂阜之縳俎豆於儀狄之朋乎言未既有自豫章來者部署其徒趨蹌而至矣竭入視之郭其姓索其字也楊子迎勞之曰汝二淛之裔耶九江之系耶松江震澤之珍異海門西湖之風味汝故無恙耶小之為彭越之族大之為子牟之類尚與汝相忘於江湖之上耶於是延以上客酌以大白曰微吾天上之故人誰遣汝慰吾之岑寂客復酌我我復酌客忽乎天髙地下之不知又焉知二豪之在側江西趙子宜餉糟蟹風味絶勝作此以謝之廷秀後賦司徒道明來自洛師至止江湄逢一湖海之仙貌肖乎晋時之解揚而其怒有赫骨像乎漢之彭越而其圜中規獨愛其二執戈者前矣視其趾二四而有踦意以為吳中介士郭先生也不知其姓則彭其字則蜞也亟携其手而上曰吾自渡江以來取友不少矣如孔之金如玊之瓊吾皆得而友朋如魏之玉如庾之榖吾皆得而欵曲夫子安在何相見之暮而不夙也於是齒牙嗜焉胷懷寄焉與之一飲一食而同醉焉夜半客起若有所刺者司徒腹心岑岑若有所􅑂者詰朝下逐客之令屏之陽侯之遐裔焉他日以天子之命作牧於豫章幕府者曰延見俊良望見一客又似乎彭越與解揚命典謁是闕我而幾我傷者矣予不汝殺世闕無黄祖其生致之於遡二友上之楊子楊子方晚飲聞其至揖而進之曰吾有惟闕生與爾索郭老夫與之同死生不減顔氏子之樂彼也闕清遊爾之久予云邈何相忘江湖莫我肯顧也何使風闕就湯思元度也爾之徳吾能言之洗手奉職徳之上也闕次也餔靈均之糟卧吏部之甕徳斯為下矣客於是闕而受圍圜視而顰謝曰士固有以贗亂真以逺間親聖肖乎形也孝而投杼同乎名也僕之主公昔為彭為郭今以郭為彭不遇蔡司徒幸遇楊子雲願借先生蒼頡之篇與太𤣥後蚓之文詳注爾雅彭郭之異族庶解嘲於司徒之門昔子宜漕江西餉予糟蟹予為賦之江西蔡師定天復餉生蟹風味十倍秀因再為之賦詩集横行未游滄海早知名有骨還從肉上生莫道無心畏雷電海龍王處也丨丨杜牧詠螃蟹失伴紺甲青匡菭染衣島夷初寄北人時離居定有石帆覺丨丨惟應海月知族類分明連𤨏􅖜形容好箇似蟛蜞病中無用雙螯處寄與夫君左手持皮日休病中有恵海蟹轉寄魯望骨似含春藥杯應阻蟹螯香却乞江邊採捕郎自是楊雄知郭索且非何𦙍敢餦餭丨清猶丨丨丨靄沬白還疑帶海霜强作南朝風雅客夜來偷醉早梅傍陸龜蒙酬襲美見寄海蟹口能嘘沬年年收稲賣江蟹二月得從何處來滿腹紅膏肥似髓貯盤青殻大如杯定知有丨丨丨丨休信無心便畏雷幸與陸機還往熟每分吳味不嫌猜梅聖俞呈吳正仲遺活蟹風味可人海饌糖蟹肥江醪白蟻醇每恨腹未厭誇談口生津三嵗在河外霜臍常食新朝泥看郭索暮鼎調酸辛趨蹌雖入笑丨丨最丨丨憶觀淮南夜火攻不及晨横行葭葦中不自貴其身誰憐一網盡大去河北民鼎司費萬錢玊食羅常珍吾評揚州貢此物真絶倫山谷次韻師厚食蟹酥片蒲螯横行湖海浪生花糟粕招邀到酒家丨丨丨丨凝作玉金穰鎔腹未成沙楊廷秀糟蟹天上三辰次怒目横行與虎争寒沙奔火禍胎成雖為丨丨丨丨丨未免人間五鼎烹黄山谷華堂一座傾觧縳丨丨丨丨丨忍看支解見薑橙東歸起為鱸魚膾未敢知言許季鷹山谷蝤蛑半殻含黄溪邊石蟹小如錢喜見輪囷赤玊盤丨丨丨丨宜㸃酒兩螯砍雪勸加餐蠻珍海錯聞名久怪雨腥風入座寒堪笑呉興饞太守一詩換得兩尖團坡集丁公黙送蝤蛑鱟骨眼鱟實如恵文丨丨相負行韓初南食貽元協律珠胎忽有瓶罌至捲将江海來𤣥霜凍龜殻紅霧染丨丨魚酢兼蝦鮓奴才更婢才平章堪一飯斷送更三盃楊廷秀鱟醤古今合璧事類備要别集卷八十八
