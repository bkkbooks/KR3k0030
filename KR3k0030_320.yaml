body:
  text: 古今合璧事類備要外集卷二十宋謝維新撰刑法門獄繫附學獄察獄疑獄失出留獄失入寃獄議讞鬻獄推斷拷訊申理欵辨獄空刑法總論獄者所以察究情僞者也其始也作於臯陶蓋舜之時理官也自是以來厯代所不廢今考其制為刑圜象斗墻曰圜墻扉曰圜扉總而名之曰圜土法其中皆置氣樓凉窗或造木柵設漿飲薦席罪人以時沐浴食物常令溫暖遇寒量支柴炭貧者假以衣物應獄具每月當職官依式檢校枷以乾木為之長者以輕重刻識其上杖不得留節目亦不得釘飾及加筋膠之類仍用火印從官給凡枷紐暑月五日一濯凡金刀若酒及紙筆錢物瓷器杵棒之屬皆不得入一更三㸃下鎖五更五㸃開十月至二月五更三㸃開凡囚以故逃亡及自傷傷人者徒一年自殺殺人者徒二年若囚本犯流罪以上因得逃雖無傷殺亦准此如婦人在獄以娼女伴之仍與男子别所且鞠問審斷並不許違程他處追到干照人若無罪合遣還而貧闕者推鞠官司計程於囚糧內以錢米當官給之諸州縣獄及當直司從提㸃刑獄司分上下半年各給印厯日書所受公事及見禁知在斷遣人數姓名州委司法縣委佐官五日一申本司催促結絶遇巡厯所至索厯閲視以憑稽考獄俱空三日者以官錢設道場又諸獄籍定醫人姓名不得令人承代遇有病囚即時診視當職官吏躬親㸃檢古語有云畫地為獄誓不入夫以畫地像獄且不願入則其為惡可知已古人以為人命生死所繫故君子盡心焉如得其情則哀矜而勿喜事類囹圄三月省丨丨九月繕丨丨月令桎梏丨丨而死者非正命也孟又用脫丨丨注在手曰丨在足曰丨易狴犴丨丨使人多禮乎注牢獄也揚子徽纆係用丨丨易屨校丨丨滅趾無咎注桎其行也荷校丨丨滅耳注不慮惡積及首非誡滅耳非懲畫地諺曰丨丨為獄議不入路溫舒傳象斗為獄圜者丨丨之制元命苞雀角誰謂丨無丨何以穿我屋誰謂女無家何以速我獄詩犬牙獄字從二犬猶二丨丨之也釋文深室置諸丨丨别為囚室本傳幽圄跡墜昭憲身陷丨丨文選圜土司赦三罰而士加明刑歸丨丨注獄城禮圜扉丨丨獄門白帖三木囹圄之牢有丨丨之威囚者多恭楊子狴犴宋咸注九棘置于丨丨三歲不得凶釋文衆議于丨丨之下易卦叢棘見前桁楊接摺丨丨注足械神霧丨丨杓為天獄詩注句圜丨丨十五星屬杓曰賤人之牢牢中星實則囚多虛則開出天文志貫索天紀屬丨丨晉天文志繫犴朝廷之丨曰丨韓詩外傳入狴詔爵五大夫吏六百石以上及宦皇帝而知名者有罪當盜械者皆頌繫注寬容不丨丨牢也前惠帝紀重事獄丨丨也前景帝紀大命獄人之丨丨也同上又獄者天下之丨丨路溫舒傳訟者之天下丨獄丨不丨堯之子而之舜曰吾君之子也孟子苗匪察惟時丨民丨丨于獄之麗書臯陶作丨丨丨獄風俗通又淑問如臯陶詩曰夏臺夏獄丨丨丨風俗通又桀囚湯于丨丨通鑑曰念室夏獄丨丨丨張華志曰羑里商獄丨丨丨又紂囚文王于丨丨七年通鑑外紀曰動止商獄丨丨丨曰囹圄周獄丨丨丨曰稽留周獄丨丨丨並博物志罔攸兼文王丨丨丨于庶獄庶謹立政則往成秋官訝士四方有亂獄丨丨丨之禮司政典穆王命吕侯作吕刑曰丨丨丨獄非訖于威惟訖于富吕刑小宛刺丨丨丨幽王也哀我填寡宜岸宜獄握粟出卜自何能榖蘇公敬司冦丨丨式丨由獄立政康叔蔽丨丨丕丨要囚書納槖饘晉人囚衛侯寧俞職丨丨丨焉注槖饘衣食也寧俞忠於衛侯以衛侯衣食為已職左僖二十八年在縲紲子謂公冶長雖丨丨丨之中非其罪也語幕季孫晉人囚季孫意如以丨䝉之圄伯嬴楚越椒丨丨丨於轑陽並左李斯縛丨丨既拘執丨仰天而嘆云云史蕭何繫丨丨以長安地狹上林多空地願令民得入田毋收藁為獸食上怒下何廷尉獄械丨之曹參寄丨丨相齊以獄市為丨屬後相曰慎勿擾獄市所以并容擾之奸人何所寄鄒陽書梁王囚丨丨陽乃從獄中上丨立出之獄吏尊周勃事詳見本傳獄吏辱韓安國字長孺坐枉罪丨丨田甲丨之安國曰死灰獨不然乎甲曰然即溺之史囚請室絳侯周勃丨丨丨辱居室灌夫受丨丨丨淳于繫丨丨公下獄逮丨長安仲舒對董仲舒作春秋折獄二百二十二事動以經對晉志霸受經黃丨與夏侯勝俱下獄從勝請丨洪範辭以死在旦夕霸曰朝聞道夕死可矣勝善其言遂授之篤為誄後漢杜丨字季雅下獄晉大司馬吳漢薨世祖詔諸儒誄之篤於獄中為誄誄辭最髙帝美之賜帛免刑關三木魏其侯衣赭衣丨丨丨注頸及手足史貫五木見前文集柳宗元斷刑論注長安獄尹賞為長安令修治丨丨丨穿地方深各數丈以瓴甓為郭大石覆之名虎穴前本傳冀府寺後樊準拜天水太守政嚴猛人犯其禁率不生出獄凉州歌曰寧見乳虎穴不入丨丨丨本傳天子氣宣帝在襁褓中繫郡邸獄後元間望氣者言長安獄中有丨丨丨武帝遣使者分條中都官獄繫無輕重皆殺之內謁者令郭穰夜至郡邸邴吉抵閉使者不得入曽孫賴吉得全本傳寶物精斗牛之間常有紫氣雷煥曰丨丨之丨上徹於天耳華曰在何郡煥曰在豫章豐城即補煥為豐城令煥到縣掘獄基得雙劒寒朗訟寃永平十三年楚王英與方士造作圖書有逆謀廢徙丹陽英自殺是時窮治楚獄遂至纍年其辭語相近自京師親戚諸侯州郡豪傑及考案吏阿附坐死徙者以千數顔忠王平辭引隧鄉侯耿建臧信鄧鯉劉建建等辭未嘗與忠平相見是時上怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者侍御史丨丨心傷其寃試以建等物色獨問忠平而二人錯愕不能對朗知其詐乃上言建等無奸專為忠平所誣欵天下無辜類多如此帝曰即如是忠平何故引之對曰忠平自知所犯不道故多有虛引冀以自明帝曰即如是何不早奏對曰臣恐天下别有發其奸者帝怒曰吏持兩端促持下捶之左右方引去朗曰願一言而死帝曰誰與共為章對曰臣獨作之上曰何以不與三府議對曰臣自知當必族滅不敢多汙染人上曰何故族滅對曰臣考事一年不能窮盡姦狀反為罪人丨丨故知當族滅然臣所以言者誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝㑹陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩烖止於身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多寃無敢悟陛下言者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄囚徒理出千餘人時天旱即大雨郭躬矜恕章帝以頴川丨丨為廷尉决獄斷刑多依丨丨條諸重文可從輕者四十一奏之事皆施行袁安理出任城令袁安遷楚郡太守到郡不入府先任案楚王英獄事理其無明驗者條上出之府丞掾吏皆叩頭爭以為阿附反膚法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即報許得出者四百餘家恥不得與河南張成弟子牢修告李膺等養太學遊士交結諸郡生徒更生驅馳共為部黨誹訕朝廷疑亂風俗於是天子震怒班下郡國逮捕黨人布告天下使同忿疾案經三府太尉陳蕃郤之曰今所案者皆海內人譽憂國忠公之臣此等猶將十世宥也豈有罪名不章而致收掠者乎不肯平署帝愈怒遂下膺等於黃門北寺獄其辭所連及太僕潁川杜密御史中丞陳翔及陳實范滂之徒一百餘人時黨人獄所染逮者皆天下名賢度遼將軍皇甫規自以為西州豪傑丨丨丨丨乃自上言云云臣宜坐之朝廷知而不問乃得並解漢威帝使中常侍王甫就獄訊黨人范滂等皆三木囊頭暴於階下甫以次辨詰曰卿等更相拔舉迭為脣齒其意如何滂曰仲尼之言見善如不及見惡如探湯滂欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨古之修善自求多福今之修善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不愧夷齊甫愍然為之改容丨丨丨丨桎梏李膺等又多引宦官子弟宦官懼請帝以天時宜赦六月赦天下改元黨人二百餘人皆歸田里乃詣考死李膺廢宦官疾惡膺等每下詔書輒申黨人之禁侯覽怨張儉尤甚覽鄉人朱並素佞邪為儉所棄承覽意㫖上書告儉與同郡二十四人别相署號共為部黨國危社稷而儉為之魁詔刋章捕儉等冬十月大長秋曹節因此諷有司奏諸鈎黨者故司空虞放及李膺杜密朱㝢荀翌翟超劉儒范滂等請下州郡考治李膺乃詣詔獄考死門生故吏並被禁錮後黃巾賊起黨禁遂解常有紫氣見前初置黃沙晉太康丨丨丨丨獄以典訊囚本紀怪哉所生漢武帝幸甘泉馳道中有蟲赤色頭牙齒耳鼻盡具觀者莫識帝乃使東方朔視之還對曰此蟲名丨丨昔時拘繫無辜衆庶愁怨咸仰首歎曰怪哉怪哉蓋感動上天憤丨丨也故名怪哉此地必秦之獄處即按地圖信如其言上又問何以去蟲朔曰凡憂者得酒而解以酒灌之當消於是使人取蟲置酒中須㬰糜散小說螻蛄活我晉龎企自云其祖坐繫獄忽見丨丨行其左右因謂曰爾有神能丨丨死否因投飯與之螻蛄食飯盡而去有頃復來形體稍大意異之復投食與之數日間其大如豚及將刑之夜螻蛄夜掘壁為大穴破械得從之出亡後遇赦免故企世祀螻蛄搜神記獄囚感靈許楊少好術數為汝南太守鄧晨修隙鴻陂豪右因陂役辜較所在楊一無所聽遂共譛楊受賂下獄而械輒自解獄吏遽白晨驚曰果濫矣太守嘗聞忠信可以丨丨即夜出楊遣歸時天雨隂晦道中若有火光照之時人異之獄掾亡命魏囚臧霸父式為丨丨據法不聽太守私殺太守收霸父付府霸將數人要奪與父丨丨道囚踰獄魏孫禮荒亂時與母相失馬台為求之既得後台坐法當死禮私丨丨令丨丨乃自首主簿溫嘉之白太祖罪减一等脫械救火晉棠邑丞劉榮坐事當死縣有野火所及榮丨丨丨丨畢還自著械毁械亡去柳晟河中解人朱泚反從帝至奉天自請入京師說賊黨以攜阻之帝壯其志得遣泚將郭常張光皆晟雅故晟出密詔陳逆順常奉詔受命約自拔歸要籍朱既昌告其謀泚捕繫晟及常外獄晟夜半坎垣丨丨丨丨斷髮為浮屠加兵苛督髙駢字千里畢師鐸出駢囚南第駢出金遺守者師鐸知之丨丨丨丨復出囚中子弟十餘人同幽之駢久囚拘供億窘狹羣奴徹延和閣欄楯為薪煮革帶以食撓法貸免王世充隂結豪傑有繫獄者皆丨丨丨丨以植新恩獄為蟻穴見續集蟻類注獄有鵲巢大理卿徐嶠奏今歲天下斷死刑五十八大理丨院由來相傳殺事大盛鳥雀不栖今丨丨丨其樹百官以刑措賀帝歸功宰相賜李林甫爵晉國公牛仙客豳國公唐史以刑措賀見前刑措注以獄靜告五代漢臣蘇逢吉髙祖生日遣吉疏理獄囚以祈福謂之靜獄逢吉入獄中閲囚無輕重曲直悉殺之丨報曰丨丨矣號曰宿囚唐武后時大獄以尚書刑部御史大理寺雜按謂之三司共為羅織丨丨丨丨刑法志號曰羅織姚崇曰自垂拱以來被告者類自誣當是時以告言為功故天下丨丨丨丨甚於漢之鈎黨本傳廢大理獄元豐元年上以國初丨丨丨丨非是以問孫洙洙對合㫖於是中書言開封府左右軍巡三院係囚猥多請復置大理獄從之凡十七日而成置大理獄自神宗丨丨丨寺著令專一承受內降朝㫖重密公事及推究內外諸司庫務侵盜官物餘民事送開封府乾道三年二月詔事涉情理巨蠧及州縣推勘畨異者方許取㫖送寺七年又詔諸處合送寺者並取朝㫖時曹欽道為户部尚書不以為便是歲五月詣都堂白雲六曹所行最計利害若俟取朝㫖恐事致彰露犯人東西請先次送寺仍申朝廷照㑹虞丞相出劄子許之自是六曹寺監事無巨細率皆送寺矣淳熙十四年王順伯少卿為大理寺丞轉對言非所以重大丨請復舊典十月丁卯許之先是大理寺官散居僦舍論者以為非宜淳熙中乃創大第聚居之如臺諫宅之比遣吏就獄胡宿朝廷委公置獄治三司不時計度三司使護吏不肯遣公曰涇卒悖慢誠其罪然折支軍情所繫積八十五日而不與三司豈得無罪耶陛下以包拯近臣不令置對可謂曲法申恩而拯猶不自省公拒制命臣恐主威不行而綱紀益廢矣拯懼立丨丨丨丨行狀以意决獄劒州民李孝忠集衆二百餘人私造符牒度人為僧或以謀逆告獄具公不畀法吏丨丨丨之處孝忠以私造符牒餘皆得不死喧傳京師謂公脫逆黨朝廷取具獄閲之卒無以易也華亭詔獄初吕惠卿為荆公所知驟引至執政荆公去惠卿遂背之洎荆公再相於是起丨丨丨丨而使徐禧王古蹇周輔三輩按之惠卿情不得練亨甫呂嘉問以鄧綰所條惠卿事交鬪其間復為惠卿所中語連荆公子雱雱時已病坐此憂憤而卒荆公憂傷益不堪遂再求罷去名臣言行録開封詔獄監在京安上門鄭俠以言事得罪詔送丨丨取勘俠言事不已又詔付臺推勘後逮赴丨丨獄成俠改送英州編管後哲宗登極恩霈放還用蘇軾等薦除泉學教授司馬遷答任安書少卿足下曩辱賜書教以謹於接物推賢進能為務氣意勤懇若望僕不相師而用流俗人之言僕非敢如是也雖罷駑亦嘗側聞長者遺風矣顧自以身處殘穢動而見尤欲益反損是以抑鬱而與誰語諺曰誰為為之孰令聽之蓋鍾子期死伯牙終身不復鼓琴何則士為知己者用女為悅己者容若僕大質已虧缺矣雖才懷隋和行若由夷終不可以為榮適足以發笑而自黜耳故禍莫憯於欲利悲莫痛於傷心行莫醜於辱先詬莫大於宫刑刑餘之人無足比數非一世也所從來逺矣昔衛靈公與雍渠同載孔子適陳商鞅因景監見趙良寒心同子參乘袁絲變色趙談自古而恥之夫中材之人事有關於宦豎莫不傷氣况慷慨之士乎如今朝雖乏人奈何令刀鋸之餘薦天下豪俊哉夫僕與李陵俱居門下素非相善也趨舍異路未嘗銜杯酒接殷勤之歡然僕觀其人自守奇士常思奮不顧身以徇國家之急僕以為有國士之風夫人臣出萬死不顧一生之計斯亦奇矣提步卒不滿五千深踐戎馬之地足厯王庭垂餌虎口橫挑强胡卬仰字億萬之師與單于連戰十餘日矢盡道窮救兵不至後數日陵敗明主不深曉以為僕沮二師而為季陵游說遂下於理拳拳之忠終不能自列卒從吏議家貧貨賂不足以自贖交游莫救左右親近不為一言身非木石與法吏為伍深幽囹圄之中誰可告訴者此真少卿所親見人固有一死死或重於泰山或輕於鴻毛用之所趨異也太上不辱先其次不辱身其次不辱理色其次其辱辭令其次詘體受辱其次易服受辱其次關木索被箠楚受辱其次剔毛髮嬰金鐵受辱其次毁肌膚斷支體受辱最下腐刑極矣傳曰刑不上大夫此言士節之不可不勵也猛虎在深山百獸震恐及其在穽檻之中搖尾而求食積威約之漸也故有畫地為牢勢不可入削木為吏議不可對定計於鮮也今交手足受木索暴肌膚受榜箠幽於圜墻之中當此之時見獄吏則頭搶地視徒𨽻則心惕息何者積威約之勢也及已至是言不辱者所謂强顔耳且西伯伯也拘羑里李斯相也具五刑淮隂王也受械於陳彭越張敖南鄉稱孤繫獄抵罪絳侯誅諸吕權傾五霸囚於請室魏其大將也衣赭衣關三木季布為朱家鉗奴灌夫受辱居室此人皆身至王侯將相聲聞鄰國及罪至罔加不能引决自裁古今一體安在其不辱也古者富貴而名磨滅不可勝紀惟倜儻非常之人稱焉蓋文王拘而演周易仲尼厄而作春秋屈原放逐乃賦離騷左丘失明厥有國語孫子臏腳兵法修列不韋遷蜀世傳吕覽韓非囚秦說難孤憤詩三百篇大抵聖賢發憤之所為作也近自托於無能之辭網羅天下放失舊聞考其行事稽其成敗興衰之理凡百三十篇亦欲以究天人之際通古今之變成一家之言草創未就會遭此禍惜其不成是以就極刑而無慍色僕誠以著此書則償前日之辱雖萬被戮豈有悔哉此可為智者道難為俗人言也鄒陽獄中上書陽為人有智略不茍合介於羊勝公孫詭之間勝等疾陽惡之孝王謂讒間孝王下陽吏乃從獄中上書曰臣聞忠無不報信不見疑臣常以為然徒虛語耳昔荆軻慕燕丹之義白虹貫日太子畏之衛先生為秦畫長平之䇿太白食昴昭王疑之夫精變天地而信不諭兩主豈不哀哉今臣盡忠竭智畢義願知左右不明卒使吏訊為世所疑是使荆軻衛先生復起而燕秦不悟也昔玉人獻寶楚王誅之李斯竭忠胡亥極刑是以箕子佯狂接輿避世恐遭此患也臣聞比干剖心子胥鴟夷臣始不知乃今知之語曰有白頭如新傾蓋如故何則知與不知也樊於期逃秦之燕籍荆軻首以奉丹事王奢去齊之魏臨城自刎以却齊而存魏夫王奢樊於期非新於齊秦而故於燕魏也行合於志慕義無窮也蘇秦相燕人惡之燕王燕王按劒而怒賜以駃騠馬也白圭顯於中山人惡之魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉故女無美惡入宫見妬士無賢不肖入朝見嫉昔司馬喜臏腳於宋卒相中山范睢拉脅折齒於魏卒為應侯此二人者皆信必然之畫捐朋黨之私挾孤獨之交故不能自免於嫉妬之人也是以申徒狄蹈雍之河徐衍負石入海不容於世義不茍取比周於朝以移主上之心故百里奚乞於道路繆公委之以政寧戚飯牛車下桓公任之以國此二人者豈素宦於朝借譽於左右然後二主用之感於心合於行堅如膠漆兄弟不能離豈惑於衆口哉故偏聽生奸獨任成亂昔魯聽季孫之說逐孔子宋任子冉之計囚墨翟夫以孔墨之辨不能自免於諛而二國以危何則衆口鑠金積毁銷骨也秦用戎人由余而伯中國齊用越人子臧而强威宣豈係於俗牽於世繫竒偏之浮辭哉公聽並觀垂明當世故意合則胡越為兄弟由余子臧是矣不合則骨肉為讐敵朱象管蔡是矣今人主誠能用齊秦之明後宋魯之聽則五伯不足侔而三王易為矣夫晉親其讐强伯諸侯齊桓用其仇一匡天下何則慈仁殷勤誠加於心不可以虛辭借也秦用商鞅之法東弱韓魏立强天下卒車裂之越用大夫種之謀禽徑吳而伯中國遂誅其身是以孫叔敖三去相而不悔於陵子仲辭三公為灌園今人主誠能去驕傲之心懷可報之意披心腹見情素墮肝膽施德厚終則桀之犬可使吠堯跖之客可使刺由况因萬乘之權假聖王之資乎臣聞明月之珠夜光之璧以暗投人於道衆莫不按劒相眄何則無因而至前也蟠木根柢輪囷離奇而為萬乘器以左右先為之容也故無因而至前雖出隋珠和璧秪恐怨不見德有人先談而枯本朽株樹功而不忘今天下布衣窮居之士身在貧羸雖䝉堯舜之術挾伊管之辨懷龍逢比干之意而素無根柢之容雖竭精神開忠於當世之君則人主必襲按劒相眄之迹是使布衣之士不得為枯木朽株之資也是以聖王制世御俗獨化於陶鈞之上而不牽於卑亂之語不奪於衆多之口秦王用中庶子蒙之言以信荆軻而匕首竊發周文王獵涇渭載吕尚歸以王天下秦信左右而亡周用烏集而王以其能越攣拘之語馳城外之議獨觀乎昭曠之道也今人主沉諂諛之辭牽帷牆之制使不羈之士與牛驥同皂此鮑焦所以僨於世也盛飾入朝者不以私汙義砥礪名號者不以利傷行故里名勝母曽子不入邑號朝歌墨子回車欲使天下恢廓之士籠於威重之權脅於勢位之貴回面汙行以事諂諛之人而求親近於左右則士有伏死掘穴巖藪之中安有盡信而趨闕下者哉書奏王出之張說獄針官有决曹掌兹法獄匪惟議罪亦以防欲所貴仁恕非矜窘束吏茍吹毛人安措足古之為主是戒是勗茫茫率土蠢蠢羣生賢愚中雜真僞相傾若魚之駭若鳥之驚不能無犯宜持以平或大或小時重時輕無以快志期於得情孰曰非重國之政令孰曰非輕民之性命虐則招咎寬則納慶宜謹宜恤可畏可敬為獄則固為牢則幽晨嚴管鑰夜密更籌寂寂圜土纍纍繫囚求食搖尾見吏垂頭自昔立名此為非所逼隘狹室敧傾漏宇冬有祈寒夏多隆暑焉可失入焉可妄處勿謂無妨勿謂無傷匹婦含怨三年亢陽匹夫結憤六月飛霜可以安危可以興亡敢告司憲無輕國章皮日休鹿門隱書古之决獄得其民情也哀今之决獄得其民情也喜哀之者哀其化之不行喜之者喜其賞之必至柳宗元斷刑論貫五木加連鎖而致之獄更大暑者數月癢不得搔痺不得搖痛不得撫摩飢不得時而食渴不得時而飲目不得瞑支不得舒怨號之聲聞千里柳宗元李建書譬如囚拘圜土一遇和景出負墻搔摩伸展支體當此之時亦以為適然顧地窺天不過尋丈終不得出復能久為舒暢哉柳宗元答君巢書以罪大擯廢居小州與囚徒為朋行則若帶纆索處則若關桎梏彳亍而無所趨拳拘而不能肆槁焉若枿隤焉若璞形固若是則其中者可得矣古今合璧事類備要外集卷二十
