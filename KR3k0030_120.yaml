body:
  text: 古今合璧事類備要後集卷五十一宋謝維新撰厯官門太史令太史局同歷代沿革少昊氏以鳥名官鳳鳥氏厯正也注鳳皇知天時故以名厯正之官髙陽氏命南正重司天唐堯命羲和以閏月定四時成歲厯象日月星辰敬授人時夏有羲和之官三代各有太史周有馮相氏掌十有二歲十有二月十有二辰十日二十有八星之位保章氏掌天星以志星辰日月之變動以星土辨九州之地所封封域分星觀妖祥以五雲之物辨吉凶水旱以十有二風察天地之和秦有太史令胡母敬秦漢以來太史之任兼成周太史馮相保章三職通典漢司馬談父子相繼為太史令遷云文史星厯近乎卜祝宣帝時修撰之職以他官領之此語見通典中書令史官門於是太史之官唯知占候而已已上合史通通典六典之詞又史通曰自古太史之職雖以著述為宗而兼掌厯象日月陰陽氣數司馬遷既沒後之續史記者褚先生劉向馮商楊雄之徒並以别職來知史務於是太史之署非復記言之司故張衡單揚王立髙堂隆等其當官見稱惟知占候而已故後漢百官志曰太史令掌天時星厯而不及史掌晉太史令品第七注左以它官兼領六典注云髙瑩以侍中陳卓以義興守吳道興欣以殿中侍御史兼領宋齊梁陳同隋祕書省太史曹置令二人煬帝改曹為監唐因之武德改為太史局龍朔改祕書閣局光宅改渾天監又曰渾儀監長安復曰太史局景龍曰太史監景雲又為局六典肅宗改為司天臺掌察天文稽厯數凡日月星辰風雲氣色之異率其屬而占每季録祥青送門下中書省紀于起居注歲終上送史館歲頒厯于天下唐志國朝因梁曰司天監或以他官兼判又有同判之名以朝官充兩朝國史志大監及少監闕則置判監事二人以五官正以士充與分紀同掌察天文祥異鐘鼓刻漏稽定厯數供諸壇祭祀神位版畫日兩朝志元豐官制行改為太史局有令有判局有同判局選五官正以上業優考深者二人為判及同判掌占天文及風雲氣候凡祥異之事日具所占以聞歲一頒厯則造進御覽祭祀昏冠喪葬則擇所用日政和因仍無所改其别局有天文院鐘鼓院測驗渾儀刻漏所印厯所皆主占驗厯法續會要事類欽天乃命羲和丨若昊丨書底日日官居卿以丨丨禮也注位如卿而不在六卿之數故曰居卿底致也平致也左傳司天孟春命太史司天厯候日月星辰宿離不忒無失經紀注厯推測也候占候也宿二十八宿也離猶厯也七曜為經二十八宿為紀禮記月令日官天子有丨丨諸侯有日御注日官太史也左傳南正見沿革夏時行丨之丨語日觀宋有丨丨即司天臺也建康志天工人代丨丨史分日月白氏六帖頒正朔太史丨丨丨于郡國周禮授人時敬丨丨丨書觀天文丨乎丨丨以察時變易擾天紀俶丨丨丨書協時月丨丨丨正日書掌邦典丨丨之六典周禮齊七政在璇璣玉衡以丨丨丨書敘三辰髙陽命南正帝嚳亦丨丨丨唐虞則羲和夏則昆吾殷則巫咸周則史佚魯梓慎宋子韋齊井德鄭禆竈魏石申其巫咸甘石之説後代所宗晉書作渾儀漢張衡為太史官研究陰陽妙盡璇璣之正丨丨天丨以漏水轉之於室內與天相應若符合視玉律丨四時於丨丨白六帖掌日之官丨丨丨丨司天之吏書雲之史丨丨丨丨窺管之官日月星辰丨丨丨丨乾象不忒分至啓閉丨丨丨丨歲功有成二十四氣丨丨丨丨三百六旬丨丨丨丨並同上司分簡日丨丨丨丨海録碎事授厯知天玉律調元璿璣丨丨思舉日官之職用丨丨道之玄宋廣平集當朝稟正朔丨同文之丨思丨丨丨白六帖奉職察天時丨太史之丨宜丨丨丨同上差進清臺之秩丨丨丨丨丨丨胡文恭制唐子西辨陳壽蜀不置史館論禮記人君言則左史書之動則右史書之周禮建官備矣獨不聞有所謂左右史者雖有太史然不以記注為職是時諸侯皆有史豈天子獨闕乎春秋之時卜田宅者占雲日者皆稱太史則太史殆陰陽者流然書趙盾者書崔杼者亦稱太史則太史又似掌注記者蓋方是時學者多知天文而卜興廢者亦不純用著龜太史伯以祝融之功而推楚國之必興太史趙以虞舜之德而占陳氏之未亡其論議證據有絶人者故陰陽注記得兼掌之漢司馬談父子為太史令以論著為己任而又掌天官則兼掌之效於兹可見魏晉之際始置著作郎自是太史之職分而為二孔明之時未也按後主景耀元年史官奏景星見於是大赦改元而曰蜀不置史妄矣文集詩集仙郎秦地立春傳太史漢官題柱憶丨丨唐李白寄司勳員外詩太史正歷代沿革國初司天監無正元豐官制行太史局置正太史令總一局之事而正與丞為之二職源事類侯臺丨丨宋廣平集五官正歷代沿革唐乾元三年置春官夏官中官秋官冬官正各一人掌司四時各司其方之變異唐志本朝設五官正至道中詔五官正磨勘至殿中丞止以後只加檢校官元豐無所改事類職配五方唐乾元二年知司天臺韓熲奏敕創置五官正丨丨丨丨上稽五緯續通典冠加一珠丨丨丨丨星以應五緯衣從其方色元日冬至朔望朝會及大禮各奏方事而服以朝見唐志太史丞歷代沿革漢太史有丞一人秩二百石魏晉齊宋皆同六典注隋置二人煬帝減一人唐初不置久視改渾儀監始置丞二人長安省景龍復置六要典國初司天監有丞元豐官制行置太史局丞續會事類陵宫之職丨丨丨丨胡文恭行馬知良制局事之二本朝太史令總一丨之丨而丞為丨丨太史局直長歷代沿革國初司天監無直長元豐改太史局有直長自直長至今十年一遷續會要元祐官品直長從八品靈臺郎歷代沿革後漢太史下别有靈臺丞掌靈臺掌候日月星辰後漢志魏太史有靈臺丞主候望郎隋有天文博士唐初因之長安二年改為靈臺郎乾道元年改五官之名六典國初司天監有靈臺郎慶厯詔十年一遷續會要事類宜處候臺丨丨丨丨宋廣平集掌觀天文丨丨丨丨之變而占候之六典保章正歷代沿革周禮有保章氏秦漢以來無其職後周春官府有保章上士中士至隋置歷博唐長安四年改改歷博士為保章正教厯生乾元元年加五官之名六典本朝司天監有保章正慶厯詔十年一遷元豐改制掌厯法及測景分至表準五年一遷官會要事類習厯隋置保章正掌丨丨六典注掌厯丨丨見元豐改制注挈壺正歷代沿革周制夏官挈壺氏下士六人秋官司寤氏春官雞人凡三職咸掌其事自漢以後太史掌之唐長安四年始置挈壺正掌知刻漏孔壺為漏浮箭為刻以考中星昏明之候乾元元年加五官之名六典本朝司天監有挈壺正元豐改太史局官惟挈壺正如故太史局官五年一遷亦或十年一遷試中而遷者惟挈壺正無遷者續會要事類掌職朝廷興居無節號令不時挈壺氏不能丨其丨焉縣壺挈壺氏凡軍事丨丨以序聚柝周禮司辰挈壺正丨丨唐六典翰林醫官歷代沿革周禮醫師掌醫之政令聚毒藥以共醫事歲終則稽其醫事以制其食十全為上十失一次之十失四為下食醫掌和王之六食六飲六膳下羞百醬八珍之齊春秋晉有醫和醫緩本朝和安成和成安成全大夫舊為軍器庫使保和大夫舊為西綾錦使保安大夫舊為榷易使翰林良醫舊為翰林醫官使和安成和成安成全郎舊為軍器庫副使保和郎舊為西綾錦副使保安郎舊為榷易副使翰林醫正舊為翰林醫官副使翰林醫闕翰林醫闕翰林醫痊翰林醫愈翰林醫證翰林醫診翰林醫候翰林醫學舊諸司使副有醫官使及副使蓋自太醫丞直院轉醫官副使敘遷年格一同武官但為東班使額耳謂自法酒庫以上至皇城使政和初既易武階而醫官之名亦遂易焉凡十有四階立和安大夫視榷易使以上翰林良醫視醫官使其和安郎以下視東副使若醫官副使則以醫正易之官制舊典云此名皆大臣所撰無所稽據傳曰登髙能賦可以為大夫今乃以雜流為之可見當時大臣之不學也舊額安和大夫至良醫二十員紹興二年五員和安郎至醫官元額三十員紹興二年四員醫效元額七員紹興二員醫痊元額十員今一員醫愈至祗候會要大方脈元額百五十員紹興十五員而已中興事類瞑眩若藥弗丨丨厥疾不瘳書膏肓在丨之上丨之下醫至曰疾不可為也左傳不可試無妄之藥丨丨丨也易分而治醫師凡邦有疾病使醫丨丨丨之周禮太上防疾動不肆勤靜不宴逸有疾歸天醫無能恤丨丨丨丨其次萌芽腠理不蠲骨髓奈何崔實針歲終稽事丨丨丨其醫丨以制其食斯亦賞勞之典也元集髙端制會時知變知六飲六膳以丨其丨察五色五聲以丨其丨同上侍醫禁庭丨丨丨丨曲阜潘播等制古今合璧事類備要後集卷五十一
