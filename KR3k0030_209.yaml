body:
  text: 古今合璧事類備要别集卷三宋謝維新撰都邑門邊隅附封疆亭障輿地提綱邊之為言近也烏乎近近乎外也古者立國有內則有外夫力不能以逺加威不能以廣及雖以帝王之盛不免有此內彼外之分也故禹貢九州方五十里盡東海流沙朔南聲教之地得不謂之邊乎周制九州方七千里盡司馬九畿之地得不謂之邊乎秦併天下分為三十六郡與黔中南海桂林象郡為四十盡東南至海西洮北漠之外得不謂之邊乎漢之盛時四履之地東樂浪西燉煌南日南北鴈門西南永昌東西九千里南北萬三千里晉承三國之後冠帶之區盡漢故地隋之世東南盡海西抵且末北距五原唐初分為十道及乎髙昌拓四鎮比之漢代南北則同東不及而西過之羈縻之地皆受節制我朝土宇與古齊盛凡使者皆所部分為二十三路盡此之土其邊隅槩可知已然古者帝王未嘗求土宇之廣也蓋與其地有餘而德不足豐也不若德有餘而地不足也失吾國之土地不求而吾德之所加者甚豐也吾國之人民不加多而吾德之所及者尤多也故天子守在四夷天子卑守在諸侯諸侯守在四鄰諸侯卑守在四境夫守不在四夷不在四鄰而在諸侯而在四境則畫地以為守而地之所棄者何限域民以為界而民之所遺者無窮故聖人一視而同仁篤近而舉逺事類逐獯鬻黃帝既為天子天下有不順者從而征也其土地東至于海西至于崆洞南至于江北丨丨丨邑於涿鹿之河出通鑑外紀至幽陵顓帝土地東至于蟠木西至于流沙東至于交趾北丨于丨丨通鑑外紀被四表帝堯曰放勳欽明文思安安允恭克讓光丨丨丨出書堯典薄四海外丨丨丨書寧四極惟夏后氏建大功定大位立大政勤勞萬邦和丨丨丨威懷之道儀刑後王出栁塗山銘東極西垂禹使章亥步自丨丨至于丨丨出通鑑外紀南極北垂又使豎亥步自丨丨至于丨丨同上要服荒服五百里丨丨三百里夷二百里蔡五百里丨丨三百里蠻二百里流注要束以文教夷平也守平常之教事王者而已蔡法也法二百里而差簡荒又簡略以文法蠻來之不制以法流移也言政教隨其俗出書禹貢蠻畿夷畿夏官司馬以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰丨丨又其外方五百里曰丨丨又其外方五百里曰鎮畿又其外方五百里曰蕃畿周禮侵自阮疆密人不恭敢距大邦侵阮徂共云云依其在京丨丨丨丨乃陟南岡詩皇矣城彼朔方天子命我丨丨丨丨赫赫南仲玁狁于襄箋王使南仲為將率往築城于朔方為軍壘以禦北狄之難詩出車東郊不開魯侯伯禽宅曲阜徐戎並興丨丨丨丨云云魯人三郊三遂峙乃楨幹甲戌我惟築云云魯人三郊三遂峙乃芻茭書費誓南鄙啓伐惠之四十五年曲沃莊伯伐翼弒孝侯翼人立其弟鄂侯鄂侯生哀侯哀侯侵陘庭之田陘庭丨丨丨曲沃丨翼左桓二至于大原宣王薄伐玁狁丨丨丨丨詩省此徐土王謂尹氏命程伯休父戒我師旅率彼淮浦丨丨丨丨詩常武各棄隙地宋鄭之間有隙地宋鄭為盟曰勿有是注各勿有之左割所至地燕莊王送齊桓公入齊境公曰非天子命諸侯相送不出境吾不可以無禮於燕於是分溝割燕君所至地與之六帖封疆五大不在楚子城陳蔡不羮使棄疾為蔡公王問於申無宇曰棄疾在蔡何如對曰擇子莫如父擇臣莫如君鄭莊城櫟而置子元焉使昭公不立齊桓公城榖而置管仲焉至于今賴之臣聞丨丨丨丨邉五細不在庭親羈不在內今棄疾在外鄭丹在內君其少戒王曰國有大臣何如對曰鄭京櫟實殺蔓伯宋蕭亳實殺子遊齊渠丘實殺無知衛蒲戚實出獻公若由是觀之則害於國末大必折尾大不掉左昭十二三國皆築是時冠帶之國七而丨丨邉於戎狄自雍隴以西有綿諸緄戎翟獂之戎岐梁涇漆之北有義渠大荔烏氏朐衍之戎而趙北有林胡樓煩之戎燕北有東胡山戎各分散居溪谷秦滅義渠始於隴西北地上郡築長城以拒胡趙武靈王北破林胡樓煩築長城自代並隂山下至髙闕為塞置雲中鴈門代郡其後燕破東胡却千餘里亦築長城自造陽至襄平置上谷漁陽右北平遼東郡以拒胡通鑑秦始皇紀胸奴苦邊髙祖八年丨丨冒頓數丨北丨上取家人子名為長公主以妻單于使劉敬往結和親通鑑髙帝紀漢兵至邊文帝六年冬胸奴三萬騎入上郡三萬騎入雲中所殺略甚衆以周亞夫為將軍次細栁劉禮為將軍次霸上徐厲為將軍次棘門以備胡上自勞軍云云月餘丨丨丨胸奴亦逺塞漢兵亦罷通鑑文帝紀棄為甌脫東胡與胸奴間中有丨地千餘里各居其邉丨丨丨東胡請於冒頓吾欲有之冒頓怒曰地國之本也與襲東胡滅之注服曰甌脫作土室以伺也師古曰境上候望處若今伏宿舍也甌去聲脫如字漢胸奴傳釁始爭桑楚邉邑卑梁氏之處女與吳邉邑妾爭桑二家怒相滅兩邊邑長怒而相攻滅吳之邊邑吳王怒遂伐楚取兩都而去二邑謂居巢鍾離吳楚之丨丨於邊女六帖封疆歡由灌瓜梁大夫宋就為邊縣令與楚鄰界梁楚邉亭皆種瓜梁亭劬力數灌其瓜美楚人窊而希灌其瓜惡楚令以梁瓜之美怒因往夜搔梁瓜梁覺之欲往報㧓楚瓜宋就曰是搆怨之道也乃令夜往竊灌楚瓜楚旦往則已灌瓜伺而察之則梁亭為也楚令大悅因具聞楚王王乃謝以重幣故梁楚之歡由宋就賈誼新書塞築紫土秦築長城土色皆紫漢塞亦然故稱紫塞崔豹古今注城得黃金金城郡注應劭曰初築丨丨丨丨故曰金城漢地理志别築候城漢制每塞要處丨丨為城置人鎮守謂之丨丨此即障也漢胸奴傳注斥望烽燧今西邊北邊之郡丨候丨丨丨不得卧注邊城備戎冦作髙土櫓櫓上作桔橰桔頭兜零以薪草置其中常低之有冦即火然舉之以相告曰烽又多積薪冦至即然之以望其煙曰燧注晝前燔燧夜則舉烽有馬周旋馬邑屬鴈門郡秦時建此時輒崩不成丨丨丨丨馳走反覆父老異之因依以築城遂名為馬邑晉太康地紀有鴈栖集梁伯縣界有鴈塞傳云此山丨大池水丨丨丨之故名鴈塞梁州記泉如酒味酒泉郡注應劭曰其水若酒師古曰城下有金泉泉味如酒漢地理志火從地出西河郡屬縣鴻門注有天封苑火井祠丨丨丨丨也同上水無增減天水郡前有湖丨冬夏丨丨丨因以名焉秦州地記州不淪沒北地郡屬縣靈州注水中可居州隨水髙下未嘗丨丨上有二苑河竒苑號非苑可牧漢地理志狐入瓜中燉煌左瓜州地出大瓜長者丨丨丨丨食之首尾不出漢地理志注龍穿地穴南海郡屬縣龍川本博羅縣之多鄉也有丨丨丨而出即丨流泉因以為號裴氏廣州記間闌出物漢使馬邑人聶翁邑丨丨丨丨私與胸奴交易注私出塞交易漢胸奴傳斗辟豫胡漢棄上谷之丨丨縣造陽地以丨丨注孟康曰縣斗辟曲近湖又師古曰斗絶也縣之斗曲入胸奴界者其中造陽地也辟讀作僻徙羌關中漢建武中馬援領隴西太守討叛羌徙其餘種於關中居馮翊河東空地數嵗之後族類蕃息既恃其肥疆且苦漢人侵之永初之元羣羌叛亂覆沒將守屠破城邑鄧隲敗北侵及河內十年之中夷夏俱敝任尚馬賢僅乃克之自此之後餘燼不盡小有際會輒復侵叛中世之冦惟此為大晉江統徙戎論徙氐論川魏武帝丨武都丨於丨丨欲弱冦強國今者當之已受其敝矣同上石頭枸杞丨丨烽火樓最多丨丨本草陶隱居云寒北席萁席萁一名丨蘆生丨胡古詩云千里丨丨草述異記傍海漕渠神龍三年滄州刺史薑師度於薊州之北漲水為溝以備奚契丹之冦又約舊渠丨丨穿丨號為平虜丨以避海難運糧唐食貨志拂雲神祠朔方軍北與突厥以河為界河北岸有丨丨丨丨突厥將入冦必先詣神祠祭酹求福因牧馬料兵而後度河元宗實録四都護府唐依漢法於丨邉立丨丨丨所以鎮重邊陲招懷殊俗安東丨丨丨在營州東界至洛陽二千九百里安南丨丨丨在交趾至洛陽七千二百里安西丨丨丨在龜兹至洛陽八千三百里安北丨丨丨在雲中至洛陽二千二百里制旨兵法三受降城唐薛仁貴奪取漠南之庭於河北築丨丨丨丨首尾相應以絶南冦之路唐休璟以為兩漢以來皆守黃河今於冦境築城恐勞人費功終為賊虜所有中宗從之仁願表留年滿鎮兵以助其功以拂雲祠為中城與東西兩城相去各四百餘里皆據津濟遙相應接三甸而三城俱就唐本傳當諭邊城本朝真宗初即位語宰相曰善用兵者必相地利欲觀西邊郡縣山川形勝之勢可擇使按視即詔楊允恭李允則使靈夏諸州圖上形勢及還召近臣出地圖示之上曰沿邊山川形勝足以控扼賊衝丨丨丨丨量省兵馬分屯內地沿邊冗員亦從減去庶免飛挽以勞民生寶訓請行邊塞紹興六年張浚以冦勢未衰奏丨親丨丨丨部分諸將以觀機會上許之至江上會諸將議事命韓世忠據荆楚以圖睢陽劉光世屯合肥以招北軍命張俊練兵建康進屯旴𣅿命楊沂中領精兵為後翼佐俊命嶽飛屯襄陽以窺中原形勢既立國威大振聖政封疆玉門為限後和帝朝胸奴連車師入冦河西議者因欲閉丨丨陽關以絶其惡注二關名在燉煌西界後西域傳銅柱為界馬援到交趾立丨丨丨漢之極丨廣記收河南地始皇三十三年巡北邊乃遣蒙恬發兵三十萬人北伐胸奴丨丨丨丨為四十四縣築長城因地形用制險塞起臨洮至遼東延袤萬餘里威制胸奴史本紀失河南地胸奴冒頓單于大破滅東胡王虜其民衆畜産既歸西擊走月氐南併樓煩白羊王二王之居在河南悉復收秦所使蒙恬所奪胸奴地者與漢關故河南塞至朝那膚施遂侵燕代而始強大漢胸奴傳復河南地宋文帝七年有恢丨丨丨志三月詔簡甲卒五萬給右將軍劉彥之遣使告魏王曰河南舊是宋土中為彼所侵今當修復舊境不關河北魏主大怒曰我生髮未燥已聞河南是我丨此豈可得必若進軍今當權斂戍相避須冬寒地淨河冰堅合自當取之通鑑宋本紀大唐羈縻州唐通四夷羈縻路一曰營州入安東二曰登州海行入髙麗渤海道三曰夏州塞外通大同雲中道四曰中受降城入回鶻道五曰安西入西域道六曰安南通天闕道七曰廣州通海夷道唐興初未暇於四夷自太宗平突厥西北諸蕃及蠻夷稍稍內屬即其部落列置州縣其大者為都督府以其首領為都督刺史皆得世襲雖貢賦版籍多不上户部然聲教所暨皆邉州都督都護所領著于令式皇宋化外州丨丨丨丨丨蓋唐羈縻之鎮河北路安東上都護府幽慎易涿檀營平燕歸順遼師順瑞薊河東路安北大都護府單于大都護府鎮北大都護府雲應新蔚媯朔寰儒毅陜西路安西大都護府庭靈夏涼沙鄯瓜銀鹽勝宥西廊會宕疊甘肅僕浙陽建康鎮利州路松扶翼當悉恭拓直保靜夔州路思費播夷牂西髙業充莊琰平廣南路交峯瀼嚴田愛歡陸福祿長越溫演林景環琴山武安古德化即茫州並東坡指掌圖以斧畫地大渡河一名沫水源出遊州入龍遊縣界我太祖得天下丨所持王丨丨輿丨圖曰自大渡為界此外吾不有也故二百年無外患逺慮如此以刀劃地紹興四年川陜宣撫司都統制吳玠敗敵于仙人關初宗弼與玠連戰未決敵擁衆乘城玠遣統制官楊政以刀槍手深入吳玠丨丨丨丨謂諸將曰死則死此敢退者斬亭障密艾漢時天水郡屬縣獂道注有丨丨亭輔平酒泉郡屬縣玉門注有丨丨亭熊水丨丨障北部都尉治在武威郡屬縣休屠魚澤燉煌郡效穀本丨丨障孝武帝元封六年濟南崔不意為丨丨尉教力田以勤效得榖因立為縣名偃水丨丨障北部都尉治在酒泉郡會水縣昆侖廣至縣宜禾