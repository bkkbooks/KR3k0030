勝不茍接刃攻不必取不茍勞衆今釋坐勝之道從乘危之勢往終不見利空內自疲敝貶重而自損非所以示蠻夷也且胸奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以贍一隅臣愚以為不便唯陛下省察充國奏每上輒下公卿議臣初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服李遐叔弔古戰場文浩浩乎平沙無垠敻不見人河水縈帶羣山紏紛黯兮慘悴風悲日曛蓬斷草枯凛若霜晨鳥飛不下獸挺隂亡羣亭長告余曰此古戰場也嘗覆三軍往往鬼哭天則聞傷心哉秦歟漢歟將近代歟吾聞夫齊魏徭戍荆韓召募萬里奔走連年暴露沙草晨牧河冰夜渡地闊天長不知歸路寄身鋒刃腷臆誰訴秦漢而還多事四夷中州耗斁無世無之古稱戎夏不抗王師文教失宣武臣用竒竒兵有異於仁義王道迂闊而莫為嗚呼噫嘻吾想夫北風振漠胡兵伺便主將驕敵期門受戰野豎旄旗川回組練法重心駭威尊命賤利鏃穿骨驚沙入面主客相搏山川震眩聲柝江河勢崩雷電至若窮隂凝閉凜冽海隅積雪沒脛堅冰在鬚鷙鳥休巢征馬踟蹰繒纊無溫墮指裂膚當此之時天假強胡憑陵殺氣以相剪屠徑截輜重橫攻士卒都尉新降將軍復沒尸填巨港之岸血滿長城之窟無貴無賤同為枯骨可勝言哉鼓衰兮力盡矢竭兮弦絶白刃交兮寶刀折兩軍蹙兮生死決降矣哉終身夷狄戰矣哉骨暴沙礫鳥無聲兮山寂寂夜正長兮風淅淅魂魄結兮天沉沉鬼神聚兮雲羃羃日光寒兮草短月色苦兮霜白傷心慘目有如是耶吾聞之牧用趙卒大破林胡開地千里遁逃胸奴漢傾天下財殫力痡任人而已其在多乎周逐玁狁北至太原既城朔方全師而還飲至策勳和樂且間穆穆棣棣君臣之間秦起長城竟海為關荼毒生靈萬里朱殷於間反漢擊胸奴雖得隂山枕骸遍野功不補患蒼蒼蒸民誰無父母提攜捧負畏其不夀誰無兄弟如足如手誰無夫婦如賓如友生也何恩殺之何咎其存其沒家莫聞知人或有言將信將疑悁悁心目寢寐見之布奠傾觴哭望天涯天地為愁草木悽悲弔祭不至精魂何依必有凶年人其流離嗚呼噫嘻時耶命耶從古如斯為之奈何守在四夷王翰古長城吟長安少年無逺圖一生惟羡執金吾麒麟前殿拜天子走馬為君西擊胡胡沙獵獵吹人面漢虜相逢不相見遙聞鐘鼓動地來傳道單于夜猶戰此時顧恩寧顧身為君一行摧萬人壯士揮戈回白日單于濺血染朱輪回來飲馬長城窟長城道傍多白骨問之耆老何代人云是秦王築城卒黃昏塞北無人煙鬼哭啾啾聲沸天無罪見誅功不賞孤魂流落此城邉當時秦王按劒起諸侯步行不敢視富國強兵三十年築怨興徭九千里秦王築城何太愚天實亡秦非北胡一朝禍起蕭牆內渭水咸陽不復都詩集席萁愁秋靜見旄頭沙逺丨丨丨薛道衡黃花戍聞道丨丨丨頻年不解兵可憐閨裏月長在漢家營沈佺期鸊鵜泉破訥沙頭鴈正飛丨丨丨上戰初歸平明日出東南望滿磧寒光生鐵衣類選李益早白馬津遙聞丨丨丨上吏傳道黃龍征戍兒文苑蕭子顯天山雪丨丨冬夏丨交河南北流虞世南隗囂臺隴頭急水流流水急難度半入丨丨丨傍浸酒泉路徐陵橫笛曲軒轅道燕山雪花大如席片片吹落丨丨丨李白北風白登道漢下丨丨丨胡窺青海灣李關山月青海頭君不見丨丨丨古來白骨無人收天隂鬼哭聲啾啾烽黯無光雲暗天山首水塞交河源霧丨丨丨丨霜旗凍不翻虞世基鼓寒不起黑雲壓城上欲摧甲光向日金鱗開角聲滿天秋色裏寒上燕支凝夜紫半捲紅旗臨易水霜重丨聲丨丨丨報君黃金臺上意提攜闕龍為君死李長吉雁門太守行蓬雜驚沙雲和朔氣連天暗丨丨丨丨散野飛屈同風吹涼木海丨丨丨丨邉聲響梢頭喬知之擬古贈陳子昂馬㗸苜蓿丨丨丨丨葉劒瑩鸊鵜膏類要邊塞風景鴈乳平蕪盧龍塞外草初肥丨丨丨丨曉不歸才調集單于不南牧丨丨丨向丨丨馬席萁遍簾詞滿天山下王建席萁降騎説蕃情候火起雕城塵沙壅戰聲遊軍藏漢幟丨丨丨丨丨天雲如地陳丨丨丨丨丨漢月帶胡秋徐陵邊月隨弓影丨丨丨丨丨朝霜拂劒花玉關曽未入少婦莫長嗟李白玉關三千里去嵗何時君别妾南園緑草飛蝴蝶今嵗何時妾憶君西山白雪暗秦雲丨丨此去丨丨丨欲寄音書那可聞同上人思邊長城三千里丨丨何連連連連丨丨丨李白詩都護五千兵將軍一百戰丨丨丨丨丨箭箙朝來動刀環臨陳鳴選燕山胡騎鳴啾啾旦辭黃河遊暮至黑山頭不聞爺娘喚女聲但聞丨丨丨丨丨丨丨木蘭詩黃河流水鳴淺淺旦辭爺娘去暮宿丨丨邊不聞爺娘喚女聲但聞黃河丨丨丨丨丨同上野駝尋水磧中鳴漢水連地霜草平丨丨丨丨丨丨丨隴頭風急鴈不下沙場苦戰多流星紅旗當磧飛鳥斷丨丨丨丨丨丨丨二年不上黃金鈎席萁廉詩雲中亭鄣羽檄警丨丨丨丨丨丨丨甘泉炎火日夜明梁簡文從軍行古今合璧事類備要别集卷三
