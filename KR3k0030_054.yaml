body:
  text: 古今合璧事類備要前集卷五十四宋謝維新撰人品門寵姬事類外婦齊悼惠王母為髙祖丨丨漢書旁妻王禁多娶丨丨禁元后父也小妻武帝詔牧乘乘孽子臯之母丨丨不肯隨乘並同上內寵齊侯多丨丨內嬖如夫人者六人左僖十七側室卿置丨丨左桓公専房寵之丨丨燕霍后傳宴専席寵丨丨陳鴻長恨歌傳羅珥堂髙數仞侍妾娟然衣丨紈鳴環丨出聲態者纍百房魯上節度使書巾箱豈惟炊㸑之勞抑亦丨丨之寵六帖列屋曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者丨丨而間居妬寵而負恃爭妍而取憐韓文比房鄭公孫穆後庭丨丨數十皆擇稚齒婑媠者以盈之列子宫中教戰孫武以兵法見吳王闔閭於是出宫中美人百八十人分為二隊以王之寵姬二人為隊長乃三令五申之於是鼓之左婦人皆大笑復三令五申而鼓之右婦人復大笑孫子斬左右隊長用其次復鼓之前後跪起皆中規矩繩墨孫子曰兵既整齊惟王所用雖赴水火可也牀上學涉石季倫所愛婢十數人季倫常屑沉木香塵末布象牀上使所愛者踐之無迹則賜真珠百琲若有迹者即節其飲食令體輕故閨中相戲曰爾非細骨輕軀那得百琲真珠強求愛姬梁氏女有容貌石季倫以真珠三斛買之即緑珠也孫秀使人求之崇競不許崇曰我為爾得罪珠泣曰當效死於君前因自投於樓下而死秀怒乃勸趙王倫誅崇遂矯詔收崇及潘嶽歐陽建等母兄妻子皆被害私盜侍兒漢袁盎使吳吳王欲使將不肯使五百人圍守之初盎為吳相從史丨丨盎丨丨盎知之弗泄遇之如故從史亡去盎自追之以侍者賜之復為從史及盎見守從史適為司馬買二石醇醪醉西南陬卒夜引盎起曰君可以去矣吳王期旦日斬君盎曰何為者司馬曰臣故為君從史盜侍兒者也乃以刀決帳道從醉卒直出司馬與公背盎行七十里明日梁騎馳歸挑尚書妾王導與周顗及朝士詣尚書紀瞻觀妓瞻有愛妾能為新聲顗於衆中欲通其妾露其醜穢顗無怍色有司奏免顗官詔特原之晉紀娶座主妾晉丞相參軍宋挺乃劉陶門人陶亡後取陶愛妾為妻劉隗劾奏挺蔑其死主而專其室悖在三之義傷人倫之序請除挺為民奏可攘妾不還唐左司郎中喬知之有婢名窈娘藝絶當時武延嗣聞之欲一見既見即留之無復還知之痛憤因為詩賂閽者以達窈娘窈娘繫於裙帶赴井而死延嗣見之使酷吏誣罪知之下獄死古今詩話竊姬俱往李靖謁楊素一妓執紅拂侍側目靖久之靖歸逆旅夜有紫衣戴帽人叩門延入脫衣去帽乃十八九一美人也靖驚詰之告曰妾楊家紅拂妓也絲蘿願托喬木乃與俱適太原固請易妓宋蕭惠開赴益州路經江陵時吉翰子在荆州與惠開有舊設女樂有美者惠開就求不得又欲以四妓易之不許惠開怒斬吉納其妓啓孝武云謗訕朝政因求為妾周顗母李氏字絡秀初顗父俊為將軍出獵遇雨止李氏父兄不在絡秀與婢於內宰羊具饌不聞人聲俊窺之見一女甚美丨丨丨丨父兄不許絡秀曰門户殄瘁何惜一女遂與之生顗三子本事綘帳女樂見師門馬融事後堂管弦見師友門張禹事隔簾奏樂梁夏侯壇性儉率有妓妾十數並無被服每有客常丨丨丨丨時謂簾為夏侯妓衣下幃設樂見妬妻類設寶花障寧王有樂妓寵妲美色善歌客莫見李太白曰王何吝此女示於衆乃丨七丨丨丨召寵姬歌於障後白曰雖不許見面聞其聲亦幸矣天寶遺事坐金絲帳元載納薛瑶英為姬以金絲帳却塵褥處之以紅綃衣衣之古今詩話元載寵姬薛瑤英能詩書善歌舞仙姿玉質肌香體輕雖旋波移光飛燕緑珠不能過也擕遊東山謝安棲遲惠山放情邱壑好音樂每遊賞必以妓從納處燕樓張建封節制武寧納舞妓盻盻於燕子樓公薨不他適申王妓圍唐丨丨每冬月苦寒令宫女密圍而坐謂之丨丨天寶遺事孫晟肉臺南唐丨丨官至司空每食不設几案使妓各執一器環立而侍號丨丨盤時人多效之飛燕相見漢成帝嘗微行出過陽阿主作樂上見趙丨丨而恱之先是有童謠曰燕燕尾涏涏張公子時丨丨蓋帝每微時常與張放俱而稱富平侯家故曰張公子素娥潛避武三思妓丨丨有殊色狄梁公請出之忽失所在於堂奧中聞蘭麝芬馥附耳而聽即素娥語曰某花月之妖帝遣奉公言笑梁公時之正人不敢見六帖愛姬善歌雪兒者李密丨丨每賔朋文章有竒麗者付雪兒協律歌之北窗瑣言侍婢誦賦蜀劉琰丨丨十人悉讀書能丨魯靈光殿丨蜀志垂泣感舊漢伶玄之妾樊通德乃趙飛燕女史也能道趙飛燕姊妹事伶玄曰其人俱灰滅矣疲精神馳嗜欲寧知終歸荒田野草乎通德掩袖視燭影以手擁髻凄然泣下伶玄因作飛燕外傳效死報主張天錫疾美人閻姬薛姬二人國色並有殊寵天錫每謂曰汝二人何以報我我死後豈可更為人妻皆曰尊君不諱妾請效死於前灑掃地下無他志十六國春秋幸妾與政王導有丨丨姓雷頗預政事納貨蔡公謂之雷尚書語林曰雷有寵名洽恬世説侍妾主書韋陟常以五彩箋為書記使丨丨丨之妾掌箋表杜大中自行伍為將與物無情雖妻有過亦公杖杖之有愛妾才色俱美大中箋表皆此妾所為一日大中方寢妾至見几間有紙頗佳書一闋臨江仙有彩鳳隨鴉之語大中覺而視之云鴉且打鳯於是掌其面至項折而斃妾為夫人杜佑議者謂佑治行無缺惟晚年以丨丨丨丨有所蔽云妻止勿娶張跋欲娶妾其妻曰子誦白頭吟妾當聽之跂慙而止妻見亦憐見妬妻類注不許妾妝崔樞夫人治家整肅容儀端麗丨丨群丨作時世丨不許妾封劉從諫妻裴氏有妾常願封夫人裴許之詔至裴怒毁詔不與從諫他日會裴黨復出詔裴扺去曰溜青季師古四世阻命不聞側室封者君承朝廷姑息宜自黠削求洗濯顧以婢為夫人族不日滅矣從諫赧然而止老不遣妾齊張瓌位光祿大夫妓妾盈房或譏其衰暮畜妓瓌曰我少好音律老而方解平生嗜欲無一復存惟未能遣此耳老因放妾白樂天既老乃録家事會經費去長物妓有樊素者年二十餘綽綽善歌舞唱楊栁枝人多以曲名之由是名聞洛下樂天既老又病風將放之素慘然泣下不忍去樂天愍然不能對遂作不能忘情吟請顧况有宜城放琴客詩曰琴客宜城之愛妾也宜城老愛妾出嫁不禁人之欲而私耳目之娛達者也因病去妾王處仲敦世許以髙尚之目嘗荒恣於色體為之弊左右諫之處仲曰子乃不覺爾如此甚易耳乃開後閣驅諸婢妾數十人出路任其所之時人歎焉懷妊出妾杜牧之守郡時有妾丨丨而丨以嫁州人杜筠後生子即茍鶴也池陽集幽妾别舍楊憑入拜京兆尹與御史中丞李夷簡素有隙因劾憑江西姦贓及他不法詔李鄘趙昌即臺參訊時憑丨衆丨於永樂丨丨謗議頗歡故夷簡藉之痛擲發欲抵以死縱妓私客韓熙載本髙密人後王即位頗疑比人有鴆死者而熙載且懼愈肆情坦率不遵禮法破其財貨售集妓樂殆數百人日與荒樂蔑家人之法所受月俸至即散為妓女所有而熙載不能制之反以為喜然日不能給遂弊衣屨作瞽者持獨弦琴俾舒雅執板挽之隨房歌鼓求乞以足日膳旦暮亦不禁其出入或竊與諸生糅雜而淫熙載見趍過而笑曰不敢阻興而已及夜奔客寢者其客詩曰最是五更留不住向人頭畔著衣裳時人謂比齊徐之才豁達無以過之湘素雜記兒殺父妾嚴武幼豪爽母裴不為挺之所答獨厚其妾英武始八嵗怪問其母母語之故武奮然以鐵鎚就英寢碎其首左右驚白挺之曰郎戲殺英武辭曰安有大臣厚妾而薄妻者兒故殺之非戲也父竒之曰真嚴武之子子殺父姬宋顔延之有愛姬非姬食不飽寢不安姬憑寵蕩延之墜牀至損子峻殺之延之痛情哭曰貴人殺汝非我殺汝以冬日臨哭忽見妾排屏風以壓延之懼墜地因病卒妾名緑珠見前石季倫事妾名碧玉僑知之有美妾曰碧玉知之為之不昏通鑑唐紀妾號花羞梁故將劉鄩侍兒王氏有美色號花見羞五代史妾字女寶寶歷中太尉李願晚得一青衣乃邑中之尤者乃字之曰女寶意取季倫緑珠臻於此及願老乃曰今老矣乃家藏一女寶曽不問非臣所宜如得善文者希一表進之吾無恨矣妾名好好張好好以善歌為沈述師著作以雙鬟納之麗情集妓名真真沈真真抑將軍愛妓也以贈鄭還古以帶易姬嚴續相公歌姬唐鎬給事通羣帶皆一代尤物唐有慕姬之色嚴有欲帶之心因呼盧之會出妓解帶較勝負於一擲舉座屏風六骼數巡唐彩大勝唐乃酌酒命美人歌一曲而别相君帳然遣之開元遺事以妾易馬酒徒鮑生多蓄聲妓外弟韋生好乘駿馬遊行四方各求所好一日相遇於山寺兩易所好乃以女妓善四絃者換紫叱撥異間集淺斟羊羔陶穀學士得黨太尉家姬遇雪陶取雪水烹茶謂姬曰黨家應不識此姬曰彼粗人安有此但能銷金帳下丨丨低唱飲丨丨兒酒陶默然侍遊駿馬龍邱子陳季常自洛之蜀載二女侍戎裝駿馬至溪山佳處輒住終日命置姬侍真宗臨御中外無虞與羣臣燕語或勸以聲妓自樂王文正性儉約初無姬侍其家以二直省官治錢上使內東門司呼二人者責限為相公買妾仍賜三千兩二人歸以告公公不樂然難逆上旨遂聽之龍川志不留女樂韓魏公在相府時家有女樂二十餘輩及崔夫人亡一日盡厚遣之同列多勸若留以為暮年歡公曰所桑能幾何而常令人心榮孰吾簡靜之樂也别録侍姬狎客种世衡知環州深得屬羌心戎酋慕恩部落最強世衡皆撫而用之嘗夜與慕恩飲出侍姬以佐之既而世衡起入內潛於壁隙窺之竊與丨丨戲世衡出掩之慕恩慚恐請罪世衡笑曰君欲之耶即以遺之由是得其死力諸羌有二者使慕恩討之無不克涑水記聞侍姬訴客王韶罷副樞知鄂州宴客出家妓坐客張續醉挽妓不前時擁之妓泣訴於韶坐客皆失色詔曰出爾曹以娛賔乃令客失歡命取大杯罰妓人服其量聊侍巾櫛王均李順之亂凡官於蜀者多不挈家以行張公詠知益州單騎赴任官屬憚其嚴峻莫敢蓄婢使者公不欲絶人情遂自買一婢以侍巾櫛自此官屬稍置姬侍在蜀四年被召還闕呼婢父母出資以嫁之仍處女也言行録爭直墨紙宋子京晚年知成都帶唐書於本任刪修每宴罷開寢門垂簾然二椽燭媵婢夾侍和墨伸紙逺近觀者皆知其修唐書望之如神仙多內寵偶微寒命取半臂諸婢各送一枚凡十餘枚子京恐有厚薄之嫌競不敢服忍冷而歸詩集買蛾眉黃金不惜丨丨丨揀得如花四五枝歌舞教成心力盡一朝身去不相隨白居易燕子樓詩媚側室陸展染白髮欲以丨丨丨青青不解久星星行復出謝靈運傳何長瑜以韻語序僚佐禹錫擬愁丨丨有妾甚麗李逢吉強取之禹錫為妾作丨四丨詩內警句云得意紫鸞休舞鏡能言青鳥罷銜箋金盆已覆難收水玉軫長拋不續弦又云買笑樹邉花已老畫眉窗下月猶殘又云三山不見海沉沉豈有仙蹤更可尋青鳥去時雲路斷姮娥歸處月宫深紗窗遙想君相憶書幌誰憐夜獨吟料得夜來天上月只應偏照兩人心出本事詩翔風自怨石季倫有愛婢曰丨丨能别五聲以文顯名年三十石崇乃退為房老翔風怨而作詩云春華誰不美卒傷秋落時坐見芳時歇憔悴空自嗤王子年拾遺感杜秋娘杜秋娘金陵女也年十五為李錡妾嘗為錡唱詞云勸君莫惜金縷衣勸君莫惜少年時花開堪折直須折莫待無花空折枝後沒入宫又放歸杜牧感而作詩有云椒壁懸綿幕鏡奩蟠玉螭月上白壁門桂影浮參差金階玉露重間把紫簫吹燕媒得皇子夫人親捧持虎晴珠絡褓金盤犀鎮帷國史補憶崔鶯女唐貞元中張生與崔氏女鶯鶯往來後棄之鶯鶯已委身於人張亦娶適經其所求見不得崔知之潛賦一章曰一從消瘦減容光萬轉千回懶下牀不為旁人羞不起為郎憔悴却羞郎竟不見元稹為作鶯鶯歌歌贈瑤英唐元載寵婢薛瑤英楊炎贈歌曰雪面淡蛾天上女鳳簫鸞翅欲飛去玉叉翹翠步無塵楚腰如栁不勝春雞跖集歌送桃葉晉王獻之愛妾名桃葉獻之丨以丨之云丨丨復桃葉渡江不用楫但道無所苦苦我自迎接不用楫謂橫波急也金覽古綘桃栁枝唐語林云退之二侍姬名栁枝綘桃初使王庭湊至夀陽驛有詩云風光欲動别長安春半邊城特地寒不見園花并巷栁馬頭惟有月團圓蓋有所屬也逮歸楊枝竄去家人追獲及鎮州初歸詩云别來楊栁街頭樹擺亂春風只欲飛惟有小桃園裏在留花不發待郎歸自是專屬意綘桃矣西清詩話樊素小蠻白樂天有二妾丨丨善歌丨丨善舞嘗有詩曰櫻桃樊素口楊栁小蠻腰二妾既長又有詩云一樹春風萬萬枝嫩於金色軟於絲後二妾各去有詩云病與樂天相伴住春隨樊素一時歸古今詩話玉簫遺詩韋臯少遊江夏薑史君之館有小青衣曰丨丨年七嵗常令侍臯年長有情韋去與玉簫約曰後七年再來玉簫丨以白玉指環并丨曰黃雀銜來已數春别時留解贈佳人長江不見魚書至為遣相思夢入秦逾八年韋不至玉簫絶食而殞後十年韋理蜀不替因作生日東川盧八座中送一歌姬來未滿破瓜亦以玉簫為號觀之乃真玉簫也雲溪友議琵琶感興蔡持正侍兒名丨丨嘗飬一鸚鵡持正每呼琵琶即叩一響板鸚鵡傳言呼之琵琶卒後誤觸響猶傳言呼之持正丨傷成疾不起嘗為詩云鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸侯鯖録強留歌妓太和中有御史分務洛京者有妓善歌詩太尉李逢吉留守求一見既不敢辭盛妝以往李尉與衆姬相見李姬四十餘輩皆出其下既入不復出頃之李亦以疾辭遂罷坐信宿耗絶愁嘆不能已乃為詩投獻曰三山不見海沉沉豈有仙蹤尚可尋青鳥去時雲路斷嫦娥歸處月宫深紗窗暗想空相憶書幌誰憐獨苦吟料得此時天上月只應偏照兩人心李但含笑曰詩大好古今詩話遣還美人趙嘏浙人有美妾泊計偕母不許擕行會上元節為鶴林之遊帥見之掩為已有明年嘏歸以詩感之曰寂寞堂前日已照陽臺去作不歸雲當時聞作沙叱利今日青娥屬使君帥聞之乃遣還同上臨老買妾張子野年八十五尚聞買妾陳述古守杭東坡為倅述古令東坡作詩云錦里先生自笑狂莫欺九尺鬢毛蒼詩人老去鶯鶯在公子歸來燕燕忙柱下相君猶有鹵江東刺史已無腸平生謬作安昌客略遣彭宣到後堂全篇多用張姓事其精切如此因貶失姬王晉卿貶均州姬侍盡逐有一歌者號囀春鶯色藝兩絶不知流落何許二年內徙道過許昌市旁小樓聞泣聲晉卿問乃囀春鶯也恨不可復得因賦一聮佳人已屬沙叱利義士今無古押衙客有足成章云幾年流落向天涯萬里歸來兩鬢華翠袖香殘空浥淚青樓雲渺定誰家云云回首音塵兩沉絶春鶯休囀沁園花西清詩話挈妾南遷世謂樂天有鬻駱馬放楊栁枝詞嘉其主老病不忍去也然夢得有詩云春盡絮飛留不得隨風好去落誰家樂天亦云病與樂天相伴住春隨樊子一時歸則是樊素竟去也豫家有數妾四五年相繼辭去獨朝雲者隨豫南過因讀樂天集戲作此詩云不似楊枝别樂天恰如通德伴伶玄阿奴絡秀不同老大女維摩應解禪經卷藥爐新活計舞衫歌扇舊姻緣丹成逐我三山去不作巫陽雲雨仙蘇子瞻朝雲詩置妾南歸王定國嶺外歸出歌者勸東坡酒坡作定風波序云定國歌兒名柔奴姓宇文氏家住京師定國南逐歸豫問柔廣南風土應是不好柔封曰此心安處便是家鄉因為綴詞云常羡人間琢玉郎天教分付點酥娘自作清歌傳皓鹵風起雪飛炎海變清涼萬里歸來年愈少微笑笑時猶帶嶺梅香試問嶺南應不好却道此心安處是家鄉東臯雜録詩戲歌姬東坡嘗飲一豪士家出侍姫十數人皆有姿伎其間有一善歌舞者名媚兒容質雖麗而軀甚偉豪特所鍾愛命乞詩於公公戲為四句云舞袖蹁躚影搖千尺龍蛇動歌喉宛轉聲撼半天風雨寒妓頳然不悅而去遁齊覽詩贈寵姬韓康公上元召從官數人出家妓侍飲其專寵者曰魯生偶中蜂螫少頃持扇就東坡乞詩詩中有魚吹細浪歌搖日舞罷花枝蜂入懷之句上句記姓下句記事詩詠小桃陳述古有小妓東坡答詩曰小桃破萼未勝春不見房中苐一人聞道使君歸去後舞衫歌扇總生塵坡詩詩諷雲英李公擇有婢名雲英屢欲出不果東坡有詩云怪君一身都是德近之清潤淪肌骨細思還有可恨時不許藍橋見傾固穠李四絃王晉卿有二女奴名丨丨昭華黃魯直改竹夫人為青奴有詩云穠李四絃風拂席昭華三㺯月侵床我無紅袖堪娛夜正要青奴一夜涼山谷蒨桃二詩寇萊公鎮北門有善歌者至庭公取金鍾獨酌令歌數闋贈之束綾侍兒丨丨自內窺之作丨丨主公曰一曲清歌一束綾美人猶自意嫌輕不知織女寒忩下幾度拋梭織得成風動衣單手屢呵幽窗軋軋度寒梭臘天日短不盈尺何似妖姬一曲歌公和曰將相功名終若何不堪急景似奔梭人間萬事何須問且向博前聽艷歌婢妾事類奚人丨三百丨注今官婢也周禮卑人腐木不可以為枉丨丨不可以為主漢書副妾泉邱人有子奔僖子僖子使助薳氏之簉注薳氏之女為僖子丨丨故納泉邱之女以副助之左昭公傅婢為丨丨所毒注謂傅相其衣服袵席之事王吉傳衾裯嘒彼小星三五在東肅肅宵征夙夜在公實命不同嘒彼小星維參與昴抱丨爽丨實命不猶詩箕帚願為丨丨妾漢紀進御妻不在妾御莫敢當夕謂丨丨於君禮卜姓買妾不知其姓則卜之同上家僮萬人吕不韋丨丨丨丨師古曰婢妾之總稱女子百數張蒼長八尺餘免相後口中無齒食乳丨丨為乳母妻妾以丨丨嘗孕者不復幸年百餘嵗乃幸僵覆毒酒周室大夫仕於周妻淫於鄰主父還恐覺之為毒藥使婘婢進之婢私曰進之則殺主父告之則殺主母因丨丨酒主父怒而笞之妻恐婢言之因他過欲殺之婢就杖將死而不言主父之弟聞之直以告主父放其妻將納婢辭以自殺主父乃厚幣嫁之列女傳故翻肉羮劉寬性簡略夫人欲試寬意伺當朝會裝嚴已訖使婢奉肉羹翻汚朝衣婢收之寬神色不異乃徐言羮爛汝手東觀漢記沒身贖父漢太倉公淳于公將刑少女上書請丨丨為官婢以丨丨罪漢書挺身代主會稽翟素遭賊欲犯之臨以白刃素婢名青青乞代素賊殺素後欲犯青青青青不許復殺之列女傳家婢讀書鄭元丨奴丨皆丨丨一婢不稱旨使人拽著泥中須臾一婢來問曰胡為乎泥中答曰薄言往訴逢彼之怒胡婢善射金禕為郡上計留在許都時魏武使長史伍必將兵衛天子於許都禕與必善必見禕有丨丨丨丨必常請之從後也三輔決録賣妾求名漢王莽成帝時折節為恭儉敢為激發之行嘗私買侍婢昆弟頗聞知莽曰後將軍朱子元無子聞此兒種直子為買之即日以婢奉子元其匿情求名如此納妾報恩楊晟𨽻鳳翔軍節度使李昌符畏其勇欲殺之妾周擲使亡去昌符死晟得妾周母事之周請為妻晟固辭旦夕問省乃視事給二侍女漢尚書郎入直給以侍使二人皆選端正妖麗執香爐護衣服通典遺一㸑婢祖訥字士言貧常自炊㸑飬母將軍王敦聞之遺其一婢辟為從事中郎人戲曰奴價倍婢價詞曰百里奚何必輕於五羖羊皮耶將婢隨軍馮緄字鴻卿時荆州監軍張敞承宰官日而奉緄將侍婢二人戎服自隨以婢賭馬北齊爾朱文略豪縱不遜平秦王有七百里馬文略敵丨好丨丨取之明日平秦王致請文略殺丨及婢以二銀器盛婢頭馬肉遺之使婢丸藥見居喪類注遣婢掌書潞州節度使薛嵩有青衣曰紅錦嵩遣掌箋表號內記室小名録侍婢殺主漢大司空扶平侯王崇就國嵗餘為丨丨所丨舊婢告主楊謹矜父冡草木皆流血懼問所善胡人史敬忠敬忠使身桎梏裸而坐林中厭之會婢春草有罪將殺之敬忠曰勿殺賣之可市十牛嵗耕田十頃讀矜從之婢入貴妃姊家因得見帝帝愛其辨慧留宫中寢侍左右帝問所從來婢奏為謹矜家所賣具言敬忠夜過謹矜坐庭中步星變夜分乃去帝怒後王珙等與李林甫作飛蹀告謹矜有詔賜死出財募士崔寧弟寬守成都楊子琳乘間起瀘州寬戰切屈宣妾素任驍勇即丨家丨十萬丨勇丨得千人設部隊自將以進子琳大懼吹箎感羌後魏河間王有婢曰朝雲善丨丨諸羌板王令朝雲假為老嫗吹箎羌皆流涕服降語曰快馬健兒不如老嫗吹箎伽藍記幻術得婢郭璞至廬江愛主人婢無由而得乃取小豆二升繞主人宅散之主人晨見赤衣人數千圍其家就視則滅甚惡之請璞為卦璞曰君家不宜畜此婢可於東南二十里賣之慎勿爭價則此可除主人從之釋囚納妾洛州女子淳于以姦繫大理李義府聞其美囑丞畢正義出之納以為妾子蒸父妾觀察使李耕之女奴名却要美容止善辭令李有四子皆欲蒸之而不得遇清明中堂玩月四子各在一處待之長子遇於櫻桃花影中却要紿之曰可於東南隅相待少頃却要燃密炬豁扉照之曰阿堵貧兒爭敢向這裏宿四子掩面而走姪幸姑婢阮咸素幸姑之婢姑當歸于夫家初云留婢既而自從去時方有客咸聞之遽借客馬追婢既及與婢纍騎而還論者非之婢欲為姦王武子左右人嘗於閣中就婢取濟衣服婢欲姦之其人云不敢婢云若不從我當大呼其人終不從婢乃呼曰甲欲姦已濟令殺之其人具述前狀武子不信其人曰枉不可受當訟府君於天武子經年疾困此人見形云府君當去矣遂卒殷藝小説婢與私通劉禕之垂拱中或告禕之與許敬宗妾私通太后遣肅州刺史王本立鞠治以敕承禕之曰不經鳳閣鸞臺何謂之敕后以謂拒制使賜死于家焚券遣歸羅遜嘗有以婢遺之者遜問所從答曰女兄九人皆為官所賣留者獨老母耳遜慘然為丨丨召母歸之質錢許贖子厚得栁州其俗以男女丨丨約不時贖子本相侔則沒為奴婢子厚與設方訃悉令贖歸其尤貧力不能者令書其傭足相當則使歸其質觀察使下其法於他州比一嵗免而歸者且千約期歸還李德裕時蜀人多鬻女為人妾德裕為著科約凡十三而上執三年勞下者五嵗及期則歸之父母細過輒殺張直方婢有丨丨丨丨失身遭辱王瓊奴乃王郎中幼女父死失身於趙奉常家為主母凌辱道出淮上書其事於驛壁見者哀之王平甫為作歌青瑣以女遣嫁江南有國日有縣令鍾離君與鄰縣令結婚鍾離女將出適買一婢以從嫁一日其婢執箕帚至堂前熟視泣曰幼時我父於此穴地為毬窩導我戲劇也鍾離曰汝父何人婢曰我父兩政前令也身死家破我流落民間令詢得實以書抵令曰吾買婢得前令之女憐而悲之義不可久辱當輟吾女嫁資先為求婚更俟一年别為吾女營辦奩篚以歸君子可乎許君答書曰蘧伯玉恥獨為君子願以前女配吾子君别求良媒以嫁君女於是前令之女卒歸許氏東軒筆録賜錢遣還國朝王荆公知制誥吳夫人為買一妾荆公見之曰何物女子曰夫人令執事左右曰汝誰氏曰妾之夫為軍大將部米綱運失舟家資沒猶不足又賣妾以償公愀然曰夫人用錢幾何得汝曰九十萬公呼其夫令為夫婦如初盡以錢賜之盛飾不顧司馬溫公從龎公辟為太原府通判尚未有子夫人為買一妾公殊不顧夫人疑有所忌也一日教其妾俟我出汝自飾至書院冀公一顧也妾如其言公訝曰夫人出安得至此亟遣之詩集詩誚失婢宅院小牆庳坊門榜帖遲舊恩暫自薄前事悔難追籠鳥無常主風花不戀枝今宵在何處惟有月明知白居易詩和失婢把鏡朝猶在添香夜不歸鴛鴦拂瓦去鸚鵡透籠飛不逐張公子却隨劉武威新知正相樂從此脫青衣劉禹錫和樂天誚失婢榜嫂婢私通晉中書令王珉與丨丨情好甚篤嫂鞭撻過苦婢素善歌而珉好持白團扇其婢製白團扇歌以贈珉云團扇復團扇許持自障面憔悴無復理羞與郎相見奴婢復合崔郊居漢上其姑有婢端麗善音律郊嘗私之既貧鬻婢于連帥于頔家給錢四十一萬寵盻彌深郊思慕無已其婢因寒食來從事家值郊立於栁隂馬上漣泣誓若山河崔生贈之以詩曰公子王孫逐後塵緑珠垂淚濕羅巾侯門一入深如海從此蕭郎是路人或有嫉郊者寫詩于座公覩詩令召崔生左右莫之測也及見郊握手曰侯門一入深如海從此蕭郎是路人便是公作耶遂命婢同歸至於帷幌奩匣悉為增飾之唐宋遺史奴婢事類臧獲古制本無奴婢即犯事者或原之丨者被贓罪沒入官為奴婢丨者逃亡獲得為奴婢也風俗通揚雄方言凡民男而壻婢謂之臧女而歸奴謂之獲張揖云壻婢之子謂之臧婦奴之子謂之獲莊子音義方言謂荆淮海岱之間罵奴曰臧罵婢曰獲燕齊亡奴謂之臧亡婢謂之獲或曰取貨謂之臧笞得謂之獲皆謂有罪為奴婢者荀子王伯罪𨽻男子入于丨丨女子入于春藁注謂坐盜賊則沒入今之奴婢古之罪人也周禮良人鬻丨丨子女為奴婢六帖私屬王莽曰秦置奴婢之市與牛馬同簡今改奴婢曰丨丨禁不得買賣也遣遺奴婢陳平結歡太尉皆陸賈之謀於是遺陸賈以奴婢百人詔賜奴婢宣帝丨大司馬光宿偉忠正宣德明恩賞丨前後丨丨百七十人漢書李大亮初破公祐以功賜奴婢百口謂曰而曹皆衣冠子女不幸破亡吾忍録而為𨽻乎縱遣之髙祖聞咨美更賜奴婢二十後破吐谷渾復賜奴婢百五十口悉以遺親戚唐史薑謨子確平髙昌還賜奴婢七十人禁殺奴婢光武詔天地之性人為貴殺奴婢者不得減其罪又詔敢炙灼奴婢論如律免所炙灼者為庶人禁掠奴婢光武詔吏人遭飢為青徐賊所掠賣為奴婢欲恣聽之敢拘制以掠人論孔幾拜嶺南節度使南方鬻口為貨掠人為奴婢戣峻為之禁親吏得嬰兒于道收育之戣論以死由是閭里相約不敢犯諫市奴婢張廷圭會詔市荆益奴婢廷圭上書曰荆益奴婢多國家户口姦豪掠賣一入於官永無脫期南北異宜必至生疾此有損無益也原縱奴婢唐宗室復改宸州刺史先是西原亂吏獲反者沒為奴婢長役之復至使訪親戚一皆丨丨奴婢給子劉洪基始病給諸子丨丨各十五人謂所親曰使賢固不籍多財即不賢守此可以脫飢凍童獲猶儒趙憬位台宰而第室丨丨丨丨先生家奴婢各業唐崔覲老無子以田宅財資分給丨丨丨為丨身與妻隱南山約奴婢過其舍則具酒食夫妻嘯詠相視為娛奴婢爭財唐扶卒丨丨丨丨有司按其資至十餘萬奴婢相配帝賜張志和丨丨各一志和配以為夫婦號漁童樵青奴婢私通齊張敬兒為襄陽府將也家貧每休假輒傭價自給嘗為東吳泰家擔水通泰所愛婢事發將被秦殺逃賣棺材中以蓋加上乃免宋明帝立四方反叛敬兒為將啓帝云泰以絲助袁顗為弩弦收籍吳氏家人保身得出財貨數千萬敬兒皆有之取所通婢以為妾家事當問虜據滑臺太祖欲比伐沈慶之固諫不可丹陽君徐湛之吏部尚書江湛並在坐上使湛之等難慶之曰理國譬如理家耕當問奴織當訪婢陛下今欲伐國而與白面書生輩謀之事何由濟上大笑宋書告主有罪郭子儀壻趙縱為奴告下御史劾張鎰奏言貞觀時有奴丨某丨謀反者太宗曰謀反理不獨成尚有他人論之豈藉奴告耶乃著令奴婢告主者斬由是賤不得干貴下不得凌上教本既修悖亂不萌須者長安令李濟以奴得罪萬年令霍晏因婢坐譴輿臺下類主反畏之悖慢成風漸不可長詩集長鬚一奴丨丨不曩頭一婢赤腳老無齒韓文赤腳小婢立我前丨丨無髻丫歐公常呼丨丨婢雨中擷園蔬東坡自遣丨丨沽村釀同上奴𨽻事類輿臺申無宇曰人有十等王臣公公臣大夫大夫臣士士臣皂皂臣丨輿臣𨽻𨽻臣僚僚臣僕僕臣丨又曰若從有司是無所執逃臣也逃而舍之是無陪臣也左傳紀綱秦伯送衛於晉三千人實丨丨之僕同上厮養丨役扈丨注析薪為厮炊烹為養公羊傳趍厮走養皮日休孟亭記圉牧馬有丨牛有丨以待百事又負羈絏以從扞牧圍並左傳騶哄使訓羣騶知禮注丨丨喝聲也同上趨走丨丨給召呼宰夫庸保荆軻既至燕愛燕之狗屠及善擊築者髙漸離為人丨丨匿作厮役張耳陳餘其丨丨莫非天下英傑本傳論門幹騶皂丨丨魏司馬芝傳監奴愛幸丨丨注奴之監知家務者霍光傳沒官裴豹𨽻也杜預注曰犯罪丨丨為奴左傳賃身申鮮虞僕賃於野注丨丨為僕也同上應門內無丨丨五尺之僮李令伯表執事丨煩辱之丨者也六帖家僕與丨丨雜居齊處也史記家僮卓氏富丨丨八百人鷹犬才丨丨之丨爪牙可任陳琳檄牛馬走太史公丨丨丨注猶僕也言為太史公掌牛馬之僕能蓄豪奴齊俗賤奴虜而刁間愛貴之桀黠奴人之所患而刁間收使之逐魚鹽商賈之利終各得其力起富數千萬也注刁間丨丨丨丨貨殖傳陽縛家奴田儋丨為丨其女從少年之逞欲得殺其奴注古者殺奴婢皆告官不告者罪之與奴分席任安衛將軍舍人過平陽主家主家設食與騎奴同席而食安拔佩刀斷席别坐責奴長髯王褒有奴號髯奴嘗有辭責其鬚曰我觀人鬚長而黑髯弱而調離離若緣坡之竹鬱鬱若春田之苗附以豐頥呈以妍姿黝若玄圭之垂若子髯既亂且赭枯稿秃瘁濁垢流離汙穢泥土無素顔可依無豐頥可恃懶鬚瘦面常如死灰曽不如犬羊之毛為子鬚者不亦難乎初學記買奴得翁南陽龎儉少失其父後居閭里鑿井得錢千餘萬行求老蒼頭使主宰牛馬耕種直錢二萬有賔婚大會奴在䆴下竊言堂上母我婦也婢即白其母母使儉問曰是我翁也因下堂抱其頸啼泣遂為夫婦儉及子歷二千石刺史七八人時為之語曰鑿井得銅丨丨丨丨遣奴給子陶侃為彭澤令不以家纍自隨送一力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子可善遇之海山使者陶侃家僮千餘嘗得胡奴不喜言常默坐侃一日出郊奴執鞭隨胡僧見而驚禮云此丨丨丨丨也因而墮淚侃異之至夜失其所在蒼頭廬兒蕭望之與王仲翁同薦望之以射策甲科為即署小門東候王仲翁補大將軍出入從丨丨丨丨下車趍門傳呼甚寵顧謂望之曰不肯録録反抱關為望之曰各從其志本傳丨丨丨丨孟康注漢名奴為蒼頭非純黑以别於良人也諸給事殿中所居為廬蒼頭侍從因呼為廬兒鮑宣傳奴有侯相衛青其父鄭季以縣吏給事侯家平陽侯曹壽尚武帝姊陽信公主季與主家僮衛媪通生青少時歸其父使牧羊民母嫡母也之子皆奴畜之不以為兄弟青嘗至甘泉居室有鉗徒相青曰貴人也官至封侯青歎曰人奴之生得無笞罵足矣安望封侯奴有士風雄翹嘗為石崇蒼頭性廉直有士風潘嶽見而稱異勸崇免之乃還鄉里奴知文章却愔字方回有蒼頭善知文章王羲之愛之每稱奴于劉惔惔問何如方回羲之曰小人耳何得比却公惔曰不如方回故當奴耳奴盜杯盂栁公權凡公卿以書貺遺蓋巨萬而主藏丨或丨用嘗貯一丨一笥滕緘如故而器皆亡奴妄言叵測者公權曰銀杯羽化矣不復詰請辦喪事盧懷謹死家無餘蓄惟一老蒼頭丨自鬻以丨丨丨唐紀奉養孤兒後漢李善南陽淯陽人本同縣李元蒼頭元家疾疫相繼死沒惟有孤兒續始生數旬而資財千萬諸奴婢欲殺續分其財産善潛負續逃親自哺養乳為生湩續在懷抱奉之不啻長君續年十嵗善與歸本縣修理舊業告奴婢於官悉收殺之又祖逖有胡奴曰王安逖甚愛之及紹之誅安歎曰豈可使士稚無後乎乃往就市觀刑逖庶子道重始十嵗安竊取以歸匿之變服為沙門奴殺其主漢招討彭寵者封侯寵蒼頭奴子密殺寵朝廷以奴殺主不義復不可不封乃封為不義侯東觀漢記滑州刺史王軌為奴所殺奴以首奔竇建德建德曰丨丨丨丨大逆納之不可不賞賞逆則廢教將馬用命斬奴而返軌首奴訴其主大理卿馬曙有犀鎧數十首懼而瘞之奴王慶以怨告曙藏甲有異謀按之無他狀投曙嶺慶免議者謂丨丨丨丨法不聽魏謨引律固爭卒論慶死奴愛其才蕭頴士有丨事頴士十年笞楚嚴慘或勸其去曰非不能去丨丨丨奴化其德陽城嵗飢屏迹不過鄰里屑榆為粥講論不輟有丨都兒丨丨丨亦方介自約或哀其餒與之食不納後致粳核數杯乃受為奴償德山東節度府聞陽城義者發使遣五百縑戒使者不令反城固辭使者委而去城置之未嘗發會里人鄭俶欲葬親貸於人無所得城知其然舉縑與之俶既葬還曰蒙君子之施願丨丨以丨丨城曰非也能與我為學乎俶泣謝即教以書為奴報讐樂布丨丨於燕為家主丨丨也家奴持兵武元衡被害公卿朝以丨丨丨丨呵衛厮竪預政崔為陜號觀察使是時王仙芝亂漢上河南羣盜與蕘簡脫不曉事以器韻自髙委政厮竪李奴善射王毛仲父坐事沒為官奴生毛仲長事臨淄王王出潞州有卜守德者為人丨丨丨騎王市得之並侍左右夷奴斫石范文丨師父丨也以刀丨丨障如斬蘆葦後為國王林邑記奴享長夀并州刺史畢軌送故漢遼將軍范明反鮮卑奴年二百二十嵗言語飲食如常人奴有仙術權同休友人顧得僕遇疾貧窘裭垢衣令辦酒食曰豫將會村老丐道里資僕曰此固不足辦某當營乃斫桑札噀成牛肉復汲數瓶水傾之乃旨酒也且曰某固異人兵交名士普王尼字李孫為兵在大將軍幕府洛中名士王澄胡母輔之皆與尼父將軍聞之因與尼長假遂得離兵奴私侍兒沈洵為節度使丨丨丨丨洵將戮之奴懼結牙將為亂夜攻洵滅其家本傳因奴入謁栁子華為昭應令宰相元載有别墅以奴主務自稱郎將怙勢縱暴租賦未嘗入官子華丨丨丨丨收付獄劾發宿睪杖殺之一邑震伏借奴明法竇軌戒家奴無出外匆遣奴取漿公厨既而悔焉曰要當借汝頭以明法命斬奴家僮上變于頔同中書門下平章事時宦者梁守謙幸於帝頗用事有梁王言者與頔子敏善敏因正言厚賂守謙求頔出鎮久不報敏怒其給責所饋誘正言家奴支解之棄溷中丨丨丨丨詔捕頔吏沉璧及他奴送御史獄家奴告變李嵩坐奴告變族誅洪肇取其幼女以為婢於是前資故將失職之家姑息僮僕而厮養之輩往往脅制其主五代史奴名谷利谷利吳大奴也江表傳奴名奴星送窮文云主人使奴星結栁作車韓退之奴名典琴北齊王元景有丨丨丨丨啓彥録奴名餘地公孫志節有蒼頭名餘地年七十二書疏風俗通買便了約蜀郡王子泉又字子淵以事到煎上寡婦楊惠舍有一奴名便了倩行酤酒便持大杖上冡巔曰大夫丨丨丨時但約守冡不約為他家男子酤酒也子泉大怒曰奴寧欲賣耶惠曰奴父訝人人無欲者豫欲決賣券云奴復曰欲使皆當上券不上券便了不能為也子泉曰諾券文云神爵三年正月十五日資中男子王子泉從成都安志里女子楊惠買夫時户下髯奴決賣萬五千奴從百役使不得有二言每日晨起灑掃食了洗滌居當穿臼縛帚裁盆鑿井浚渠縛落鉏圜斫陌杜陴地刻大枷屈竹作把削治鹿盧出入不得騎馬載車踑坐大呶下床振頭垂鈎刈芻結葦蠟纑紱不絡住䣯徂􅮢模織履作粗粘雀張鳥結網捕魚繳雁彈鳬登山射鹿入水捕龍後園縱魚雁鶩百餘驅逐鴟鳥持梢牧豬種薑養羊長育豚駒糞除堂廡餧食馬牛鼓四起坐夜半益芻二月春分被隄杜疆落桑披棕種瓜作刳别茄披蔥焚槎發笱壟集破封日中早蓄雞鳴起春調治牛馬兼落三重舍有客至提壺行酤汲水作餔滌杯整按披蒜斷蘇切脯築肉臛芋膾魚炮鱉烹茶盡力具鋪已而蓋藏閉門熏竇餧豬縱犬勿與鄰里爭鬬奴但當飯豆飲水不得嗜酒欲飲美酒惟得染唇漬口不得傾盂覆斗不得晨出夜入交關伴偶舍下有樹當裁作船下至江州下到煎主為府椽求用錢椎紛惡販棕索綿亭買席往來都洛當為婦女求豚澤販於小市歸都擔枲轉擁旁蹉牽犬販鵝武陽買茶楊氏池中擔荷往來市聚護行偷入市不得夷蹲旁卧惡言醜罵日作弓刀持入益州貨易牛羊奴自交精惠不得癡愚持斧入山斷槧裁轅若殘當作俎機木屐及彘盤焚薪作炭疊石薄岸治舍蓋屋書削代櫝日暮以歸當送乾柴二三柬四月當披五月當獲十月收豆多取蒲茅益作繩索雨墮無所為當編蔣織箔植種桃李梨柿柘桑三丈一樹八尺為行果類相從縱橫相當果熟收斂不得吮嘗犬吠當起驚告鄰里掁門拄户上棲擊鼓持盾曳矛環落三周勤心疾作不得遨遊奴老力索種莞織席事訖欲休當舂一石夜半無事浣衣當白若有私錢主給賔客奴不得有姦私事當關白奴不聽教當笞一百讀券文訖詞窮咋索仡仡叩頭兩手自縛目淚下落鼻涕長一尺如王大夫言不如早歸黃土陌蚯蚓鑽額早知當爾為王大夫酤酒真不敢作惡王褒楊誠齊書云公之便了我之奉一皆隔其迹便了奉一皆奴名作跛奚文女弟阿通歸李安詩為置婢無所得乃得跛奚蹣跚離疏不利走趍願出屋簷足達户樞三嫗挽不來兩嫗推不去主人不恱厨人罵怒黃子笑之曰堯牽牛而舜鞭之羊不得食堯舜俱疲百羊在谷牧一童子草露晞而出草露濕而歸不亡一羊在其指撝故曰使人也器之物有所不可則亦有所宜警夜偷者不以馬司畫漏者不以雞凖繩規矩異用殊施天傾西北地缺東南尺有所不逮寸有所不覃子不通之則屨不可運土蕢不可當履坐而睨之小大俱廢子如通之則瞽者之目聾者之耳絶利一源收功十百事固有精於一則盡善遍用智則無功有所能乃有所不能馬呼跛奚來前善為若詔之汝能與壯士拔距乎能與群狙賦羊乎能與八駿取路乎能逐三窟狡兔乎皆曰不能曰是固不能闔門之內固無所事此今將語若可為者汝無壯於行當任坐作不得頑癡自今謹飭晨入庖舍滌鎗淪釡料簡疏茹留精點捔臠肉法欲方膾魚法欲長起溲如截肪煮餅深注湯和麋勿投醯韲臼晚用薑蔥泄不欲焦旋葅不欲黃飯不欲著牙揚盆勿駐沙進火守炷水沃沸鼎斟酌薌芼生熟必告姨㜮臨食爬垢掩髮染指舐杓嘬胾懷骨事無小大盡當關白食了滌器三正三反抆拭蠲潔寢題覆碗陶瓦髹素視在謹數兄弟為行牝牡相當日中事間浣衣潄需器穢器淨謹循其初素衣當白染衣增色梔欎為黃紅螺砑光挼藍杵草茅搜槖早漿胰粉白無不媚好燥濕處亭尉帖坦平來往之役資他使令牛羊下來喚雞栖桀撑拒門關護草竊飯飲貓犬堙塞鼠穴凡烏攫肉貓觸鼎犬舐鎗鼠窺甑皆汝之罪也春蠶三卧升簇自裹七畫七夜無得停火紵麻藤葛蕉任絺綌錫疏手作無有停時紾緝偷工夫一日得半工一纓亦有餘暑時藴蒸扇涼蜜水薰艾出蚊冰盤出蠅果生守樹果熟守筥執弓懷彈驅嚇飛鳥無得吮嘗日使殘少姆嫗罵譏瘧痢泄嘔天寒置籠衣衾畢烘搔癢抑痛炙手撋凍無事倚墻鞋履可作堂上聼呼傳聲伐諾截長續短鳬鶴皆憂持勤補拙與巧者儔凡前之為汝能之否跛奚對曰我缺於足猶全於手如前之為雖勞何咎黃子曰若是則不既有用矣乎皆應曰然無不滿意山谷以錢惠奴張文定公齊賢為江南漕日家宴一奴竊銀器數事於懷中公熟視不問後為宰相厮役多得班行此奴竟不沾寸祿乘間泣告公曰爾憶江南盜吾銀乎我懷之三十年不以告人汝亦不知也吾進退百官激濁揚清安敢以盜賊薦耶念汝事我久今與汝錢三百千不可復留奴拜謝而去倦遊録以金付僕程明道雖奴僕必託以忠信嘗自澶淵遣奴持金詣京師貿用物什金之數可當二百千奴無父母妻子同列聞之皆駭且誚既而奴持物如期而歸衆始歎服行狀奴報舊主王逵者屯田郎中李曇僕夫也事曇久親信之既而去曇應募兵以選入捧日軍凡十餘年會曇以子學妖術妄言事父子械繫御史臺獄上怒甚治獄急曇平生親友無一人敢餉問之者逵旦夕守臺門不離給飲食候信問者四十餘日曇坐貶恩州别駕仍即時監防出城諸子皆流嶺外繞追哭送之防者遏之逵曰我主人也豈得不送之乎曇河朔人不習嶺南水土其從者皆辭去曰我不能從君之死鄉也數日曇感恚自死旁無家人逵使母守其尸出為之治喪事朝夕哭如親父子見者皆為流涕殯曇於城南佛舍然後去鳴呼逵賤𨽻也非知有古人臣烈士之行又非矯迹求令名以取祿仕也獨能發於天性至誠不顧罪戾以救其故主之急於終始無倦如此豈不賢哉嗟乎彼所得於曇不過一飯一衣而已今世之士大夫因人之力或致位公卿而故人臨不測之患屏手側足戾目視之猶懼其禍之及已也若畏猛火逺避去之或從而擠之以自脫敢望其優恤賑救耶彼雖巍然衣冠類君子哉稽其行事則此僕夫必羞之洓水記聞詩集詩示阿段山木蒼蒼落日曛竹竿裊裊細泉分郡人入夜靜餘瀝竪子尋源獨不聞病渴三更回白首傳聲一注濕青雲曾驚陶侃胡奴異怪爾常穿虎豹羣杜甫示獠奴阿假詩述余成役者余成忠信不二鄙事八年未嘗見其過其畏得而好德畏不時而慎罰躬行而心安樂問其部伍蓋自其少時至於今行年二十矣猶一日也察其私持廉甚謹而逺名吾嘗與僚友論其人雖古之學問士大夫本強而厚於德如第五公胡威未能逺過此也其人豈子夏所謂雖曰未學吾必謂之學矣者乎吾貧不能脫其役與之同歸江湖之上作詩以識愧云丹籍生涯無列鼎白頭忠信可專城自非車騎將軍勢愧使王尼常作兵黃山谷古今合璧事類備要前集卷五十四
