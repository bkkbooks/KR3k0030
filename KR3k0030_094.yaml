body:
  text: 古今合璧事類備要後集巻二十五宋謝維新撰臺官門御史臺歴代沿革御史之名周官有之戰國亦有秦趙澠池之㑹各命書其事則皆記事之職至秦漢為紏察之任所居之署漢謂之御史臺亦謂之蘭臺寺漢以尚書為中臺御史為憲臺謁者為外臺謂之三臺梁及後魏北齊或謂之南臺後周曰司憲唐曰御史臺髙宗龍朔中改為憲臺武后時改為肅政臺後去肅政臺之名但為左右御史臺本朝沿唐之制設御史臺大夫無正員止為兼官中丞除正員外或帯他官者尚書則曰某官兼御史中丞丞郎則曰御史中丞兼某官給事中諫議則曰某官權御史中丞事次有知雜御史一員副中丞判臺事其屬有三院一曰臺院侍御史𨽻焉二曰殿院殿中侍御史𨽻焉三曰察院監察御史𨽻焉舊制三院多出外任風憲之職用他官領之太平興國三年以張巽為監察御史正名舉職自此始也唐制御史不專言職至天禧中始置言事御史唐朝有御史裏行至景祐中始置以處御史之官卑者唐儀臺案有六監司元豐三年李定請復六察於是以御史專領六察元豐三年御史臺奏言請以吏部及審官東西院三班院𨽻吏察戸部三司及司農寺𨽻戸察刑部大理寺審刑院𨽻刑察兵部武學𨽻兵察禮祠部太常寺𨽻禮察少府將作等𨽻工察從之其後大正官名不除大夫撿校官帯憲銜者亦除去自國初至元豐中檢校官多帯憲銜有檢校御史大夫者至是亦罷以中丞為長知雜御史為侍御史言事官為殿中侍御史六察官為監察御史舊以中丞兼檢理使殿中侍御史兼左右廵使左右廵使分紏不如法者文官違失右廵主之武官違失左廵主之監察御史兼監察使至是使名悉罷見㑹要續㑹要四朝志事類烏府前漢御史府井舎百餘區府中列柏樹常有野丨数千棲上朝去夕来朱博傳烏臺成帝時御史臺有丨集故謂之烏臺蘭臺御史䑓率執憲中司朝㑹獨坐内掌丨丨督諸州刺史漢官儀又在殿中丨丨掌圖籍秘書前漢百官表柏臺見上烏府注繡衣御史有丨丨直指出討姦猾治大獄武帝所制不常置前百官表又衣以繡者尊寵之也顔師古注銀印御史大夫秦官佐上卿丨丨青綬掌副丞相注位次上卿前百官表鐵冠侍御史周官也為柱下史冠法冠一名柱後以丨為柱言其審固不撓常清峻也漢官儀法冠張武曰梁國大都吏民凋弊且當以柱後恵文弹治之耳應劭注曰丨丨也以纚褁鐵柱卷秦制執法服張博傳又丨丨一曰柱後執法者服之或曰獬豸冠獬豸神羊楚王獲之以為冠秦㓕楚以其君冠賜執法近臣御史服之後漢輿服志弄印周昌為御史大夫徙為趙相髙祖持御史大夫印弄之曰誰可以為御史大夫者熟視趙堯曰無以易堯遂拜御史大夫趙堯傳執法叔孫通起朝儀㑹長樂宫成置酒御史丨丨舉不如儀者輙引去叔孫通傳蒼頭風俗通曰御史臺皆以官丨丨為史主賦舎凡守其門戸後百官志注白簡晋傅𤣥天性峻急每有奏劾或值日暮捧丨丨整襟坐以待旦於是貴逰攝伏臺閣生風傅元傳又任昉為中丞奏為弹曰臣謹奉丨丨以聞注丨丨簡畧狀也南史南司元魏崔暹為御史中尉尚書移牒索御史監選不與及暹為僕射還索御史宋㳺道判云崔僕射昔在憲司籠架北省今居禮閣控制丨丨遂不與北史南䑓北齊王髙澄用崔暹為御史中尉宋㳺道為尚書左丞謂之曰卿一人處丨丨一人處北省當使天下肅然通典注北門御史䑓在宫闕西南其門北開取冬殺之義鄴都故事又或曰隋初移都之時兵部尚書李圓兼御史大夫欲向省便故開丨丨譚賔録彈劾北齊御史䑓掌察紏丨丨北史糺繩御史之職邦憲是司先正其身如可行事當湏舉直錯枉不避親讎丨慝丨違務從公正如聞愆過隂自鼔動不即弹射自樹恩私曽無忌憚仍有所託將何以寄之鷹隼用屏豺狼唐人詔令誡百官與供奉人交通詔八印䑓印隨從印左廵印右廵印監倉印庫印監察印出使印唐䑓儀五院自唐初来歴丨丨唯二人李商隐張延賞丨丨謂監察殿中侍御史中丞大夫也南部新書豸冠肅宗乾道二年制御史䑓欲弹事不須進狀仍服丨丨唐㑹要鷺車舊制御史以丨羽飾丨以白鷺見泉中魚象御史察隐㣲之罪唐䑓儀朝長䑓制三院還䑓以一人為丨丨馬植𫝊院屬御史䑓其属有三院一曰䑓院二曰殿院三曰察院唐百官志雄要正觀初以法理天下尤重憲官御史稱為丨丨通典雄峻御史為風霜之任弹糺不法百寮震恐官之丨丨莫之比焉同上凖繩司唐髙宗問羣臣舉御史僉舉萬年尉揚子帝曰斯人常䙝服居公堂視事其可以為丨丨丨也髙宗實録紀綱地大中三年中丞魏謩兼判戸部謩奏曰御史䑓丨丨之丨不冝與泉貨吏雜處乞罷綜戸部事從之唐㑹要耳目官韋思謙進御史大夫性蹇諤顔色莊重不可犯見王公未嘗屈禮或以為譏答曰丨丨丨固當特立鵰鶚鷹鸇豈衆禽之偶奈何屈以狎之唐本𫝊掌刑法御史䑓大夫一人中丞三人丨以丨丨典章紏正百官之罪唐百官志正班序御史䑓御史大夫一人朝㑹則率其属丨百官之丨丨監察御史顓舉不如法者同上紏百司御史䑓所置六察分丨丨丨唐太和七年赦文制百司大中元年御史䑓奏伏以御史䑓臨丨丨丨紏繩不法若事簡則風憲自肅事煩則紀綱轉輕唐㑹要無長官御史大夫李承嘉嘗召諸御史責曰近日御史言事不諮大夫禮乎肅至忠曰故事䑓中丨丨丨御史人君耳目比肩事主得自彈事若先白大夫而許則彈大夫不知白誰也唐㑹要謂外臺唐至徳後諸道使府參佐皆以御史為之丨之丨丨職林號七貴御史故事大朝㑹則監察押班常參則殿中知班入閣則侍御監奏含元殿最逺用八品宣政殿其次用七品紫宸殿最近用六品殿中得立五花磚緑衣用紫案褥之類丨為丨丨唐國史補謂三司凡寃而無告者三司詰之三司謂御史大夫中書門下也唐百官志又髙宗武后之際當時大獄以尚書御部御史䑓大理寺雜按丨之丨丨六典摧剛直枉韓臯常有所陳必於紫宸殿對百寮而請未嘗詣延英便殿曰御史天下之持平也丨丨丨丨惟在外廷公共言之奈何請詣便殿避人私語本𫝊指佞觸邪憲官之職在丨丨丨丨唐太和勅彰善癉惡景雲三年令御史錄奏内外官職事詔曰丨丨丨丨激濁揚清御史之職也唐大詔令貴戚泥樓李景讓為御史大夫内臣丨丨有看街樓閣皆泥之畏其弹劾本𫝊宰相避路唐制大夫中丞午後三刻出回避丨丨如午前出宰相回避大夫中丞唐䑓儀奏裁專達御史䑓凡寃而無告者三司詰之大事丨丨小事丨丨唐百官志風聞訪知唐舊制不受詞訟有通辭狀者立於䑓門候御史御史竞往門外収採知可弹者略其姓名肯云丨丨丨丨臺儀朝廷綱紀魏謩曰御史䑓丨丨丨丨綱紀正則朝廷理朝廷理則天下治本𫝊人君耳目蕭至忠曰御史丨丨丨丨本傳職不壹名御史者不以一職名盖總察羣司典掌衆政元㣲之集官皆顯秩御史府自中執憲暨察視之丨丨丨丨也出入天禁李嶠上疏曰御史得丨丨丨丨本𫝊職司天憲御史䑓事摠朝綱丨丨丨丨五代㑹要授以立秋漢家丨署御史多丨丨丨盖以風霜始嚴鷹隼初擊杜牧之集制象以熒惑熒惑火之精御史之象主禁令刑罰收捕紏正黄石公隂謀秘法勁正之士秦漢以降御史府莫不用剛果丨丨丨丨以維持紀綱季代而還埋輪破柱之徒絶不復出元㣲之行裴生制凖繩之司執憲丨丨丨丨所以提振紀綱端肅内外白集行薛存誠制辟車要秩丨丨丨丨非徳靡升專席雄班惟賢是属中宗授楊再思制烏臺峻秩丨丨丨丨望搃鐵冠蒼佩崇班威髙石室朱威霧徹即停州縣之勞白簡霜飛宜屏權豪之氣蘇炯制蒼佩崇班見上注風節凛聞𫝊献簡公堯俞為御史諫官四年所上百六十餘章多觸忌諱詆權倖名重朝廷而丨丨丨然丨於天下言行録風力愈勁王敏懿公素字仲儀既升臺憲丨丨丨丨嘗與同列奏事上前事有不合衆皆去公方論列是非俟得㫖乃退帝曰真御史也議者目公為獨擊鶻同上絶無臺官英宗新即位任事者益專凡䑓諫官言事一切不聴或盡逐䑓官不留一人京師為之語曰丨市丨丨丨同上忽陳臺諌王陶弹宰相韓琦不押班琦乞出詔琦起視曰覧䑓簡之忽陳規邦彛之浸畧丁未録論濮王事治平元年正月䑓官丨丨丨丨甚急吕誨等疏已七八上不聴遂皆納勑告求去而執政方宻啓禁中自是乃尊濮王為皇言行録諌皇后廢上廢郭后中丞孔道輔與范仲淹帥諸䑓詣閣門請對閣不為奏道輔等欲自宣祐門入監官宦者闔門拒之道輔手持門銅鐶大呼曰皇后可廢奈何不與我曹入諫同上必用忠淳皇祐三年仁宗宣諭宰臣曰諫官御史丨丨丨厚丨直通世務明治體之人以革浮薄之弊自是詔舉御史必載帝語降敕國朝㑹要皆為要劇興國九年詔曰御史府憲命所係凡在官僚丨丨丨丨同上進呈訖了治平中執政恃權以沮言者凡䑓諫官言入輒以丨丨訖寢之時謂之丨丨䑓吏亦為之沮𧹞毎白御史言某事又訖了也備要詩集憲臺廻亦清丨丨選贈王元貺盛元丨丨持青槖殊章動繡衣風連䑓閣起霜就簡花飛蘇味道贈御史入臺玉佩稜稜直指烈烈方書蒼丨鳴丨繡衣登車元希聲四言鐵肝烏府先生丨作丨霜風捲地不知寒東坡贈劉顗言事貶官霜稜老時䑓憲减丨丨林逋霜氣柏臺丨丨夜凄凄風動琅玕月白低東坡擊疆丨丨如摧枯食蘖不知苦山谷降威御史威降霜行私不容粟同上文白簡威丨丨丨猶凜青山興已濃東坡青㝠節時來上丨丨俛仰但一丨危言回邱山聲利盡毫末荆公送孫叔康赴御史府御史中丞歴代沿革周官小宰之職掌建邦之宮刑凡官之糺禁即御史中丞之任也周禮注曰小宰若今御史中丞漢御史大夫有兩丞一曰御史丞一曰中丞亦謂中丞為中執法以其居殿中故曰中丞居殿中察舉非法哀帝更中丞為御史長史光武復改中丞與尚書令司𨽻校尉朝㑹皆專席而坐京師號三獨坐言其尊也通典晋宋以下不置大夫以中丞為䑓主自齊梁皆謂之南司後魏為御史中尉後周有司憲中大夫隋以國諱省中丞唐制大夫掌紏正百官之罪惡中丞為之貳本朝法唐之制見御史䑓類自中丞以下掌紏繩内外百官姦慝肅朝廷紀綱大事則廷辯小事則奏弹兩朝志元豐七年詔中丞雜壓在六曹侍郎之上事類兩丞御史大夫秦官有丨丨一曰中丞在殿中蘭臺掌圖籍秘書前百官表千石御史大夫有兩丞秩千石同上又御史中丞一人丨丨本注曰御史大夫之丞也後百官表執憲漢中丞故二千石為之或選侍御髙第丨丨中司通典注又谷永疏曰薛宣前為御史中丞丨丨轂下不吐剛不茹柔舉錯時當漢史執法薛宣為御史中丞丨丨殿中外總部刺史前本𫝊漢元帝擢陳咸為御史中丞總領州郡奏事課第諸御史内丨丨殿中公卿以下皆畏惮之陳咸𫝊紏正陳謙拜中丞執憲奉法多所丨丨續漢書察舉馬嚴字威卿為中丞嚴舉劾按章申明舊典奉法丨丨無所廻避百寮憚之東觀漢記中司丞故二千石執法丨丨掌蘭䑓督諸州刺史紏察百寮蔡質漢儀見後漢官志獨坐光武特詔御史中丞與司𨽻校尉尚書令㑹同並専席而坐故京師號曰三丨丨後漢史青綬後漢中丞兩梁冠銅印丨丨漢儀白簡見前類白簡注盡忠晋武帝詔曰馮紞有丨丨之心以為中丞新書秉義晋明帝詔曰史光有居正丨丨之心可為中丞同上公忠熊逺遷御史中丞上每嘆其丨丨謂逺曰卿佐朝正色不茹柔吐剛忠亮至勁可謂王臣晋史果毅中丞周浚丨丨有才孔顥有才能果勁不撓可御史中丞事新書山公啓事直筆晋周處為中丞奏石崇王彤等正䋲丨丨權豪震肅本𫝊直繩