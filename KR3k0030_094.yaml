本𫝊刻深舒元輿拜監察御史按丨丨害無所縦本𫝊論宫市韓愈操正堅正鯁言無所忌遷監察御史上疏極丨丨丨徳宗怒貶山陽令論權嬖裴度為監察御史丨丨丨梗切本𫝊名御史周思立在髙宗時為丨丨丨通典鬼夜乂唐監察御史李全交専以酷虐為業䑓中號為丨面丨丨酷吏𫝊明目張膽韋思謙為監察劾禇遂良及再相出之人或弔之答曰大丈夫當正色之地必丨丨丨丨以報國恩終不長碌碌保妻子本傳隨仗入閣唐監察御史職知朝堂正門無藉非因奏事不得入至殿廷在西鳯閣南視殿中侍御史以上從觀象門出若從天降至開元七年勅並丨丨丨丨㑹要諌造宫殿唐李善感為監察御史裏行永淳初造奉天宫於嵩陽縣又於藍田造萬全宫善感諌曰宫殿云云時人以此稱之分紀諌出逸逰楊虞卿為監察穆宗初立多出逸逰荒恣上疏切諫帝令宣付宰臣云虞卿所上議切諫司覧後宰臣令狐楚等因以納諫為賀同上决獄乃雨顔真卿字清臣為監察御史五原有寃獄乆不决真卿至辨之天方旱獄决乃雨郡人呼為御史雨唐徳宗實録受命息風唐陸元方為監察御史則天使安輯嶺外將涉風濤甚狂舟人不敢舉㠶元方曰我丨丨無私神豈害我遽命濟而風息本𫝊上林棲烏李大亮劉洎奏李義甫召見試令詠棲烏立成詩曰日裏颺朝彩琴中伴夜啼上林多少樹不借一枝棲太宗深賞之我将全樹借汝豈惟一枝拜監察御史唐史中灘鸂鶒河南伊闕縣前毎僚佐有入䑓者即水丨丨出石爍金砂清澈可愛牛僧孺為尉一日報灘出縣僚共觀之有老吏曰此必分司御史若是西臺常有一䨇丨丨僧孺因舉抷祝曰既成有灘何惜鸂鶒言訖一䨇鸂鶒飛下灘中不旬日僧孺拜察院劇談夜加二階韓思彦為監察御史昌言當世得失髙宗丨召丨丨丨唐史時號四其郭宏覇自陳討徐敬業臣誓抽其筋食其肉飲其血絶其髄武后大悦授監察御史丨丨丨丨御史同上劾京兆尹徳宗即位之初侍御史朱敖請復舊制置朱衣豸冠於内廓有犯者御史則以弹舉上許之建中元監察御史張著冠豸冠丨丨丨丨兼御史中丞嚴郢於紫㣲殿則郢御史中丞而著特賜緋魚袋自是日懸衣冠于宣政之左廊續通典劾節度使元稹拜監察按獄東川因丨奏丨丨丨嚴厲違詔過賦凡十餘年本𫝊劾背闕坐李勉拜監察御史属朝廷右武勲臣恃寵多不知禮大将管崇嗣於行在朝堂背闕而坐勉劾之肅宗嘆曰吾有李勉始知朝廷尊矣本𫝊諌犯法死唐李素立武徳初為監察御史時有犯法不至死髙祖特令殺之素立諫曰三尺之法與天下共之一法動揺則無所措手足臣忝法司不敢奉㫖帝乃從之分紀論樂工爵馬周客郎將常何家為條條二十餘事皆當世所切太宗怪問何曰此非臣所能家客教臣言之客忠孝人也帝即召之未至遣使四軰趣及見與語帝大悦拜監察御史乃丨臣伏見王長通明白達本丨丨今超授髙丨與外廷朝㑹鳴玉曵履臣窃耻之帝善其言本傳諌市船利元宗有胡人言市船利上命監察御史楊範臣徃求之範臣奏曰御史天子耳目之官必有軍國大事臣雖冒觸炎瘴死不敢辭此特胡人眩惑求媚無益聖徳上慰諭而罷通鑑不樂檢局栁渾召拜監察御史䑓僚以儀矩相䋲而放曠丨丨丨丨乃求補外宰相惜其才唐本𫝊不樂滋味韋表㣲擢進士授監察御史丨丨曰爵禄譬丨丨也人皆欲之吾年五十拭鏡㨵白冒㳺少年間取一班一級不見其味也将為松菊主人不愧陶淵明云兄弟代為韋貫之始為監察御史舉其弟纁自代及為右補闕纁代為御史議者不謂之私兄弟並居楊假楊収並遺直之子假自浙西觀察判官入為監察御史収亦自西川入為監察御史丨丨丨丨御史持為新倒並本𫝊因詠叢竹唐吕太一拜監察御史裏行自負才華而不即真丨丨院中丨丨以寄意焉曰擢擢堂軒竹青青耐嵗寒心貞徒見賞籜嫩未成竿劇談為開口椒監察丨丨丨丨毒㣲歇裏行及試員外為合口椒賈言忠本草臺閣生風受憲監察御史綉衣始拜珥筆升朝丨丨以之丨丨豪貴由是歛手陳子昻集楊府君碑豪貴歛手見上注分寮百司監察御史從七品掌以吏戸禮兵刑工之事丨丨丨丨而察其謬誤凡察事小事則舉正大事則紏劾各籍記其多寡當否嵗終條具殿最以詔黜陟神宗正史職官志分𨽻六察乾道八年二月宰執進呈御史䑓事丨丨丨丨虞允文奏曰祖宗時監察御史却許言事上曰今既分𨽻六察可許随事弹奏自此臺綱肅清矣㑹要期以大用明道先生權監察御史裏行神宗素知先生從容咨訪比二三見遂丨丨丨丨毎将退必曰頻求對來欲常相見爾程伊川文集嘆為得體明道先生為御史時為裏行神宗召對問所以為御史對曰使臣拾遺補闕輔賛朝廷則可使臣掇拾臣下短長以沽直名則不能神宗丨賞以丨丨御史丨劉立之程先生序述聞名面命天聖中以太常丞桑慥為監察御史慥有志行朝廷丨其丨而丨丨之國朝㑹要不識面薦見殿中侍御史類識面䑓官注張錫剛正丨丨為御史言丁謂不當徙内地昭應灾不當以罪人京師之人皆曰張御史貌柔和而心丨丨真御史也國史本𫝊張戬狂直丨丨字天祺除監察御史争新法章数十上最後言今大惡未去横歛未除不正之司尚存無名之使方擾又諸中書争之王安石以扇掩面而笑戬曰戬之丨丨宜為參政所笑天下之人笑參政亦不少矣淵源録鞠詠裂麻丨丨為監察御史言錢惟演與丁謂交結不赴亳州圖入相謂人曰若相惟演當取麻制裂之國史本傳劉摯趣裝丨公肅公丨除監察御史欣然就職語家人曰丨丨無為安居計未及陛對首上疏論事劉元城集劾奏近侍劉庠字希道除監察御史裏行奏宸庫失盗庠丨丨丨丨領皇城司者初禁銷金李珣犯令庠言法行當自貴近始英宗曰朕豈私一李珣耶珣乃仁宗外家若行之天下謂何同上乞治内降𫝊堯俞為監察御史裏行朱晦子頴士以内降監汳口鎮而都水監復薦之公言宻院既不治頴士求内降罪而都水又安知其可任而舉之上下相結迭相阿狥其盗名噐將不但一汳口而已乃罷頴士權倖惮焉言行録進陳古道張戬召為監察御史裏行毎丨對必丨丨丨引大體不舉苛細論王安石變法非是乞罷條例司及追還常平使者東都事畧極陳時弊王巖叟召為監察御史上疏丨丨丨事之丨以謂不絶害源百姓無由樂生不屏羣邪太平終是難致同上言紀綱賞罰吕大防字㣲仲除監察御史裏行首丨丨丨丨丨之際未厭四方之望者有五並同上陳得失利病彭汝礪字噐資權監察御史裏行公在言職非唐虞三代不論初對上十事丨丨丨丨丨多人所難言者言行録言人主防欲明道程先生顥權監察御史裏行前後進説甚多要以正心窒欲求賢育才為先嘗丨丨丨當丨未萌之丨神宗俯身拱手曰當為卿戒之伊川撰行狀用幕官昇朝熈寕三年除秀州推官李定權監察御史李定宋敏求繳詞頭云去嵗驟丨京官今又丨職丨便丨丨著峻處紏䋲之地臣恐未厭衆議㑹要王義方彈李義府疏義府擅殺寺丞陛下雖已釋放臣不應更有鞠劾然天子置三公九卿二十七大夫八十一元士本欲水火既濟塩梅相成然後庶績咸熈風雨交泰則知人主不得獨謂皆由聖㫖昔唐堯至聖失之於四凶漢主深仁失之於陳豨光武聰明寛恕失之於逢萌魏武勇略失之於張邈此並英雄之主莫不失之於前得之於後陛下繼聖撫有萬邦蠻陬夷落猶懼刑綱况輦轂咫尺姦臣肆虐殺一六品寺丞是使忠臣抗憤義士扼腕縱令正義自取絞縊此事彌不可容便是畏義府之權勢能殺身以滅口此則殺生之威上非主出賞罰之柄下移姦佞臣聞履霜堅氷積小成大請乞重勘當畢正義致死之由雪寃氣於幽泉誅姦臣於白日對仗叱義府不退義方三叱上既無言義府趋出義方乃讀弹文曰義府善柔成性佞媚為心昔事馬周分桃見寵後交劉泊割神宗恩生其羽翼長其光領因縁除㑹遂皆通達不能盡忠端節對揚王休䇿蹇勵駑祗奉皇眷而反慿附城社蔽虧日月請托公行交㳺羣小貪冶容之好原有罪之淳于恐漏泄其謀殞無辜之王義雖挟山超海之力望此尤輕回天轉日之威方斯更劣此如可恕孰不可容金風戒節玉露啟途霜簡與秋典共凊忠臣與鷹鸇並擊請除君側少答鴻私碎首玉階庶明臣節伏請付法推㫁以申典憲唐書詩集忠義見前文集内忠謀適當除御史誠當得言秋拜䟽移閤門為丨寕自丨上陳人疾苦無令絶其喉下陳畿甸内根本理宜優韓愈赴江陵途中寄贈注云公自監察貶山陽令移江陵法曹参軍備列峨豸忝丨丨伏蒲愧分經分經注見上御史臺主簿歴代沿革前張忠為御史大夫署孫寳為主簿隋大業三年始置御史臺主簿二員唐省一員掌付事勾稽省署抄目監印給紙筆其俸禄與殿中御史同正觀中自張宏濟為此官之後遂為美職六典通典本朝於幕職官選强明公幹者二人充䑓主簿掌推勘公事後止置一員長編掌簿書錢穀之事紹興二年詔御史䑓全闕長貳檢法主簿特令殿中侍御曽綩奏辟中興㑹要事類詘身西漢孫寳張忠署為主簿寳徙入舎祭竈請比鄰忠怪之使所親問曰今兩府髙士俗不為主簿子既為之徙舎甚悦何也寳曰髙士不為主簿而大夫君以寳為可一府莫言非士安得獨自髙道不可丨丨詘何傷且不遭者何無不為况主簿乎忠聞之甚慙綱書薦寳經明質直宜備近臣孫寳録選屬唐髙元裕進御史中丞建言紀綱地官属湏選其不稱職者請罷之本𫝊管雜務唐主簿丨轄䑓中丨丨通典書譴罰毎食主簿執黄卷丨其丨丨同上在北榻唐憲䑓之禮雜端在南榻主簿丨丨丨唐職林入選門後唐天成四年敕諸道賔従即随府罷䑓主簿既為正秩况丨丨丨顯自敕恩湏終考限朱頴宜仍舊五代㑹要鈎考簿書御史䑓其属有檢法官檢詳法律主簿丨丨丨丨各一人從八品神宗正史職官志分治職事元豐六年九月中丞黄履言本䑓有主簿兼檢法官二員乞復置丨丨丨丨紹置主簿并檢法官一員㑹要㸃檢文字䑓主簿掌受事𤼵辰勾檢稽失兼簿書錢穀之事元豐三年李定請増置一員丨丨六案丨丨元祐元年大理寺左斷刑架閣庫専委主簿主管續㑹要分掌班籍中丞黄履奏本䑓主簿檢法官係丨丨丨丨參預定刑所領職事與他司不同御史臺檢法歴代沿革古無此官本朝熈寧十一年改主簿作檢法官各一員係長貳同舉京官充元豐四年罷見宣和二年御史臺申詣六年復置各一員元祐三年改檢法官為主簿紹聖三年因董敦逸奏請復置掌檢詳法律續㑹要四朝志又熊氏職畧云國初沿唐制御史䑓有推直官元豐官制行始罷推直而置檢法按四朝志推直罷於改官制之時而檢法之置乃在熈寕十年當考事類檢詳法律御史䑓其属有檢法官丨丨丨丨住簿鈎考簿書各一人從八品神宗正史職官志分治職事元豐六年因中丞黄履奏復置各一員令丨丨丨丨㑹要參預定刑中丞黄履奏本䑓主簿檢法官係分掌班籍丨丨丨丨所領職事與他司不同㑹要不依常制元豐罷六年復置各一員許長貳本依常置踏逐秦舉續㑹要典法憲臺紹興除陳良翰制
