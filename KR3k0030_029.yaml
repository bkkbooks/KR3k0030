body:
  text: 古今合璧事類備要前集卷二十九宋謝維新撰外親屬門外祖孫事類外父母之考為丨丨母之妣為外母女子之子為外孫爾雅為丨祖丨母何以小功也以尊加也儀禮䘮服外翁於僕為諸丨丨元集外氏丨丨之世德存乎古史揚乎人言栁文内弟序外孫罪累丨丨有携有嬰扶床坐席嬉笑歡爭韓集段公威德流慶於丨丨白集述外祖書楊惲母司馬遷女也惲始讀外祖太史公記頗為春秋以材能稱又云遷死外孫楊惲祖丨其書遂宣布焉從外祖學蔣乂㓜丨丨丨家丨得其書博覽强記本傳有外祖風梁王筠清潔好學沈約見筠以為似外祖袁粲謂僕射張稷曰王郎非惟額類袁公風韻都欲相似稷曰袁公見人輙矜嚴王郎見人必娯笑惟此一條不能酷似成外宅相魏舒字陽元少孤為外家寗氏所養寗氏起宅相宅者云當出貴甥外祖母以盛氏甥小而慧意謂應之舒曰當為外氏成此宅相外祖稱賞荀朂依舅氏十餘嵗能屬文從丨丨魏太傅曰此兒當及其曽祖梁隆倕少為外祖張岱所異謂諸子曰此汝家陽元也外祖見期楊於陵生子嗣復丨丨韓滉撫其背曰名與位皆踰其父此楊氏之慶也本傳鞠養外家周翼無託養在郤家六帖隋皇甫繢三嵗而孤為外祖韋孝寛所丨丨嘗與諸丨兄博奕孝寛督以嚴訓繢歎命左右自杖孝寛聞而對之流涕於是博渉經史戒飭外孫諸葛亮誠外甥曰丈夫志當存髙遠慕先賢絶情欲棄凝滯廣咨問除嫌吝雖有淹留何損於美趣何患於不濟若志不强毅意不慷慨徒碌碌滯於俗黙黙束於情永竄伏於凡庸不免於下流矣解外孫爭東漢樊重貲至巨萬而加惠宗族外孫何氏兄弟爭財重恥之以田二頃丨其忿訟年八十餘終補外孫官司馬朴丞相光之兄里之孫也少䘮母育於外祖范純仁紹聖初黨議起父宏坐中書論辯得罪純仁亦坐救黨人責永州目疾失明客至必令朴導以見時方七嵗進揖應對如成人客皆驚歎以純仁遺恩補官温造外祖丨丨曰臣丨五世丨李靖唐本傳詳見門閥類陶潛外祖丨丨作晉征西大將軍長史孟府君傳云君諱嘉字萬年淵明先親君之第四女也凱風寒泉之思寔鍾厥心東坡外祖丨丨在惠州讀淵明所作丨丨孟嘉傳意悽然悲之乃記程公遺事以遺程氏云公諱仁霸眉山人以仁厚信於鄉里晦庵外祖丨丨記丨大父祝公遺事云某惟外大父之淳德髙行先人後已其誠心所格固宜有後竊感陶公作孟府君傳及近世眉山蘇公亦述程公遺事不勝凱風寒泉之思書此以遺康國使藏於家時出而訓習之以厲其子孫詩集鍾餘慶中郎餘慶鍾羊祜子㓜能文似馬遷邕之甥琰之子白集似外翁扶床小女君先識應有些些丨丨丨元集汗血駒爾為曽外孫倜儻丨丨丨杜鳯凰雛南山新長丨丨丨眉目分明畫不如年少從他愛棃棗長成須讀五車書王介甫贈外孫舅甥事類母晜弟丨之丨丨為舅丨之從父丨丨為從舅爾雅姊妹子男子謂丨丨之丨為出謂我舅者吾謂之甥同上姊妹之子曰甥出配他男而生也釋名姊妹之孫謂從孫甥左注肥牡速舅既有丨丨以丨諸丨寧適不來㣲我有咎詩路車贈舅渭陽康公念母也我見舅氏如母存焉我送舅氏曰至渭陽何以贈之丨丨乘黄詩叔向母黨初丨丨欲娶申公巫臣氏其丨欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣注言母多媵妾而庶子鮮少嫌母氏性不廣左昭二十八晉侯自出丨丨曰康公我之丨丨注秦康公晉外甥也威十二申伯元舅不顯丨丨王之丨丨文武是憲詩康子彌甥季丨丨曰以肥之得備丨丨也注季丨丨名肥彌遠也康子父之舅氏故稱丨丨左傳陳本蔡出陳厲公蔡出也注姊妹之子曰出同上衞本霍出霍去病衞青妹子也宫中帝甥竇抗歸長安髙祖以兄呼之丨丨稱為舅六帖洛中名甥劉嶼宇慶孫弟琨字越石並為尚書郎郭奕之甥名著當時京師為之語曰丨丨奕奕慶孫越石舅有此甥王悦造其舅范寗寗曰卿風流峻望後來之秀悦曰不有此丨焉丨丨丨六帖甥似其舅宋桓元聞義軍起大懼曰劉裕一世之雄勇冠三軍劉毅一擲百萬何无忌劉牢之之外丨酷丨丨丨共舉大事何為無成舅甥無對陸果好學舅張融有髙名果風韻舉止頗類時稱曰無對日下惟舅與甥碎事舅甥俱宦郝處俊事諸丨謹甚與丨許圍師同里丨丨達六帖同為洗馬汲黯字長孺司馬安是其姊子與黯丨丨太子丨丨史記參議大事何无忌少有大志舅鎮北將軍劉牢之時鎮京口每有大事皆丨丨之本傳白水同心秦伯納晉公子重耳及河子犯以璧授公子曰臣從君巡於天下臣之罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如丨丨投璧於河僖二十四明珠在側衞玠字叔寶風神秀異入市見者皆以爲玉人王濟字武子玠之舅也每見玠輒歎曰珠玉在側覺我形穢又嘗語人曰與玠同遊冏若丨丨之丨丨朗然照人舅所鍾愛陳江總七嵗而孤依於外氏聰敏為舅呉平光侯蕭勵鍾愛謂曰爾神采英㧞後之知名當出吾右舅素賞愛殷浩甥韓愛伯浩素賞之浩被廢徙東陽韓隨至徙所經嵗還都浩送至渚側詠曹顔遠詩云富貴他人合貧賤親戚離本傳恩過子弟南齊丹陽徐湛之素為彭城王義康所愛雖為舅甥丨丨丨丨視猶子姪王佖李晟之甥武敢閑騎射晟在師佖无不從晟視佖與子姪等其給與過之六帖與甥論兵李靖字藥師其舅韓擒虎每與論兵輒歎曰可與語孫呉者非斯人尚誰哉為甥立産姚崇外甥任奕任异少孤長於崇家乃與之立家産謂之曰爾吾無間然矣惜殊宗而代疎命與其子同名冀無以别也器識許甥晉鎮南大將軍劉宏應詹之祖舅請詹為長史謂之曰君丨丨宏深後當代老子於荆南矣將相期甥封倫年方少舅盧思道曰是兒識畧過人當自致卿相宅相寄甥晉李澮神情朗俊邢晏曰丨丨之丨良在三丨三國典畧宅相事詳見前類㓜女託甥韓充依舅季元元為河陽節度使署充為牙將元曰我知君舊矣吾兒不才不足累卿者二女方㓜以爲託後元没充為嫁以墅乞甥謝安與姪謝𤣥賭墅顧謂甥羊曇曰以墅乞爾以禄給甥裴守寛關中旱悉廪禄奉姊及諸甥六帖無罪斬甥劉昌寧陵之圍昌令守陴内顧者斬昌孤甥張俊守西北未嘗内顧稡下斬之士有死志史臣謂勒兵乘城與賊抗所頼惟賞罰爾今丨丨而丨其丨士心離離不祥莫大焉六帖因呼斬甥竇軌以甥為腹心嘗夜出呼不時至斬之同上怠舅甥禮王獻之兄弟自郄超未亡見郄愔嘗躡屐問訊甚修舅甥之禮及超死見愔怠屐而候之本傳無渭陽情陳郡謝重王胡之外孫也於諸舅敬禮多闕重子絢袁湛之甥也嘗於公座戲調其舅湛不堪曰汝父輕舅汝今復加我可謂兩世丨丨丨丨絢有愧色南史正舅以法王師範舅醉殺人其家訴之師範厚賂謝訴者不置師範曰法非我敢亂乃抵舅罪母恚之師範立堂下日三四至不得見三年拜省户外不敢解怨舅設謗皇甫松牛竒章公之甥怨公不薦作謗詩曰夜入真珠室朝遊玳瑁筵真珠公侍妾名也摭言選甥坐貶王涯居翰林其甥皇甫湜中選考覈之際不先言上坐貶官甥被劾張克勤左環衛大將軍有詔賜一子五品官克勤以息㓜推與其甥裴夷直劾曰克勤骫有司法引庇它族開後日賣爵之端不可許詔聽遂著於令以舅補官周濓溪少孤養外家景祐中用舅氏龍圖學士鄭公向奏試將作監主簿詩集吾舅賢良歸盛族丨丨盡知名徐庶髙交友劉牢出外甥泥塗豈珠玉環堵但柴荆衰老悲人世驅馳厭甲兵氣吞江上别淚血渭陽情舟鷁排風影林烏反哺聲永嘉多北至勾漏且南征必見公侯復終聞盗賊平郴州頗凉冷橘井尚凄清從役何蠻貊居官志在行杜甫送舅録事攝郴州賢甥丨丨即明月聲價動天門能成吾宅相不减魏陽元自顧寡籌畧功名安所存與爾共飄颻此心難具論李白别從甥表兄弟事類姑舅子丨之子注外兄弟也丨之丨注内兄弟也爾雅父母黨睦於丨丨之丨可謂孝矣禮内外屬我與子當内丨丨當為伯仲其抵我書執禮太卑劉禹錫答薛郎中論書儀内弟之䘮文中子有丨丨丨丨不飲酒食肉郡人非之外家之寶韋述父景駿元行冲景駿姑子也為時儒宗常載書數車自隨述入其室觀書不知寢食行冲異之試與語前世事熟複詳諦如指掌然使屬文受紙輙就行冲曰丨丨丨丨也世説外兄歎異孔紹安閉門讀書數十萬言丨丨虞世南丨丨之本傳外弟充選太學博士周捨舉外弟徐摛曰形質陋小若不勝衣而堪此選乃為晉安王侍讀劉璠梁典乞封舅子羊祜進爵丨丨丨丨蔡襲跪奏舅子唐員俶九嵗召對禁中詞辨注射帝問曰童子豈有類若者俶丨丨臣丨丨李泌帝即馳召之本傳不餞姑子皇甫謐從姑之子梁栁為城陽太守之官有勸謐餞之謐曰栁為布衣送迎不出門食不過鹽菜貧不以酒肉為禮今作郡送之是貴城陽太守而賤栁豈中古之人情非吾心所安也六帖嫚侮外弟崔彦昭與王凝外昆弟也凝太中初先顯而彦昭未仕嘗見凝凝倨不冠帶嫚言曰不若從明經舉彦昭為憾至是凝為兵部侍郎其母聞彦昭相敕婢多製履韈曰王氏妹必與子偕逐吾將共行彦昭聞之泣且拜不敢為怨而凝竟免本傳外弟知敗王晏外弟尉氏阮孝緒知晏必敗屢至其門逃匿不見嘗食醬美問知得於晏家吐而覆之通鑑外兄合謀楊阜與丨丨姜叙丨丨攻馬超大敗之以報殺本州刺史讐為内兄鼓琴晉阮瞻字千里讀書不甚研而黙識其要善彈琴内兄潘岳每令彈琴終日達夜無忤色不可得而榮辱約内兄嵗㑹北山黄榦招其内弟鄭子恭而告之曰吾從母昆弟皆葉出也葉氏昆弟猶吾從母之昆弟也凡三姓四家雖所系不同自吾外祖父母以來一本而已先王制禮列之五服之次以爲緦麻之戚焉古之緦麻非今之所謂緦麻也其嵗月必相往來吉凶必相慶弔出入必相餞勞禍患必相賙䘏亦其理宜也吾嘗記為童子日外祖父母皆無恙嵗冬之朝兄弟畢集相與握手終日談諧笑語市棗栗相啖迨其去則留連不忍捨旦暮又思之而幸其復來也豈非秉彝良心有不能自已者及其長也而後怵於習俗迫於利害而不能以相保此有識者之所當慨念也今吾欲與兄弟約以嵗正月之十日六月之二十日㑹於天寧之浮圖人具肴一柈酒一壺飯一器春蠔夏荔不拘其數合而飲食之古人騷賦詩詠與夫投壼弓矢之具有則携之以供娯樂相告語以孝悌忠信相問勞以老少安否家計有無至於農圃桑麻之業皆可抵掌而劇談也晨而往戴星而歸於是重親戚厚風教其不善歟子恭曰善哉遂述其言以告諸兄弟黄直卿序詩集外家昔别長安未裹頭如今詩句可消愁外家未覺風流遠他日相期到益州山谷贈外姪李光祖仲氏與子甥舅氏推頽各蒼顔並為東諸侯長此佳江山寒松無時花安得挿髻鬟惟將老不死一笑榮枯間我甚似樂天但無素與蠻掛冠未及髦當獲一紀閑子亦拙進取才髙命堅頑譬如萬斛舟行此九折灣丨丨新得道一漚自塵寰嵗晚家鄉路莫遣生榛菅東坡送表弟程㦤叔赴漕皆兒曹烱烱明珠照雙璧當年三老蘇程石里人不道避鳩杖刺史迎門倒鳬舄我時與子皆兒童狂走從人覔棃栗徤如黄犢不可恃隙過白駒那暇惜醴泉寺古垂橘柚石頭山髙暗松櫟諸孫相違萬里外一笑未解千憂積子方得郡古山陽老手風生謝刀筆我正含毫紫㣲閣病眼昏花困書檄莫教印綬繫餘年去掃墳墓當有日功成頭白早歸來共藉棃花作寒食東坡送表弟程六知楚州傳甥舅仗下千官散紫庭時聞小語説蘇程長身自昔丨丨丨壽骨遥知是弟兄曾活萬人寧望報祗求五畆却歸耕四朝遺老凋零盡鶴髪他年幾箇迎東坡上表弟程德孺生日婦翁附翁壻事類外舅妻之父為丨丨妻之母為外姑爾雅婦父陳後主曰丨丨乃是翁比女壻柰何不敬婦翁通鑑令嶽青城山為五嶽之長故名丈人山今世俗呼人婦翁為丨丨妻之伯叔父為列嶽往往因此青城山記㤗山丨丨有老父失其姓名今人稱人婦翁亦曰丨丨不知何所據或者出此訛以傳訛耶神仙傳俗呼人之妻父為嶽丈以丨丨有丈人峯丈人觀似亦有理而呼妻母為㤗水此何義耶然晉樂廣乃衛玠妻父俗所謂岳丈或當云樂丈耳本朝孫持正不禮婦翁陳渉既為王妻之父往依焉陳王以衆賔待之長揖不拜妻之父怒不辭而去誣撾婦翁後漢明帝戲第五倫曰聞君為吏撾婦翁不過從兄飯有諸對曰臣之三娶皆無妻父壻謀殺翁祭仲專公使其壻雍糾殺之雍姬知之謂其母曰父與夫孰親母曰人盡夫也父一而已胡可比焉遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍糾尸諸周氏之汪池也公載以出曰謀及婦人宜其死也左傳翁故抑壻華廙有才妻父盧毓典選廙年三十五不得調貸錢索還王戎女適裴頠貸錢數萬乆而未還女後歸寧戎色不悦女遽還直然後乃歡壻謂翁癡太原王述謝萬之妻父也為揚州刺史萬嘗衣白綸巾乘平肩輿徑至㕔事前謂曰人言君侯癡君侯信自癡述曰非無此論但晚合耳翁可人意王適曰吾求婦氏乆矣惟此丨丨丨丨且聞其女賢不可以失韓墓志翁壻翁壻齊名樂廣字彦輔時人謂之氷鏡壻衞玠字叔寶時號玉人故時人謂曰婦翁氷清女壻玉潤翁壻能詩給事中姚合有詩名士多歸重李頻走千里丐其品題大加奬挹以女妻之翁壻不協謝安壻王國寶安惡其為人每抑而不用國寶乃譖安於道子使離間之於帝武紀翁壻迭顯封德彝即楊素之壻素為僕射嘗撫其座曰封郎必居此座後果如其言南部新書翁壻皆貴郭子儀七壻皆貴顯朝廷翁壻俱賢本朝公卿多有知人之明見於擇壻趙參政昌言之壻為王文正旦王文正旦之壻為韓忠憲億吕惠穆公弼之壻為韓文定忠彦李侍郎虛已之壻為晏元獻殊晏元獻殊之壻為富文忠弼楊尚書察富文忠弼之壻為馮宣徽京陳康肅堯咨之壻為賈文元昌朝曽宣靖公亮此類甚多不可悉數而其後名位風節往往相似前代所不及也却埽編宣徽鄭天休選王禹玉為壻其後為丞相禹玉選鄭達夫後亦為樞相詩集萬里别丈人東南來復向西南去連年丨丨丨更覺貧賤苦王事有程期親年多喜懼畏與妻子别已復迫曛暮何者最可憐兒生未知父陳無已詩后山以貧故妻子常寄食槩家十年學婦翁不可撾王郎非嬌客十年為從學苦淡共堙厄燕雀嗤鴻漸大羊睨麟獲偶逢涇渭分昨夢春氷釋平生五車書纔吐二三䇿已作謗薫天金朱果何益君窮一窻下風雨更削迹詩工知學進詩苦見意迫俗情傲秦贅婦舍不暖席南冶從東來不聞被嘲劇師儒並世難日月過箭疾公今未有田把筆耕六籍黄魯直次韻東坡王郎子立風雨有感詩女壻擇壻得壻皆見後婚婣門事類倩壻黄氏倩注丨女丨也東洛間謂壻為倩史記贅壻淳于髠齊之丨丨史家貧子壯則出贅賈誼䇿少壻出蘇秦傳云子壻趙王禮甚卑有子壻禮史館甥帝丨丨于貳室注禮妻父曰外舅謂我為舅者吾謂之甥萬章兒例女夫乃是丨丨陳後主云側室趙有丨丨曰穿晉君之壻也左半子乃命長嗣為君丨丨劉禹錫祭楊庻子文唐帝御延喜門見回紇使者是時可汗上書恭甚言昔為兄弟今壻半子也陛下若患西戎子請以兵除之壻列朝廷唐郭子儀七壻皆貴顯朝廷史壻在翰林張垍尚主在翰林獨以珍玩常誇於同列張淑曰此婦翁與壻非天子賜學士者也李肇國史補以為心膂宇文㤗諸子皆㓜唯丨諸壻丨丨丨梁世祖倩作文奏崔行功祖謙之在北齊終鉅鹿太守少好學唐儉愛其才妻以女因丨丨丨丨六帖不開翁書潘炎方劉晏任權炎乃其壻雖書疏報答未嘗輙開時稱有古人節盗閲翁書楊玠娶博陵崔季讓女崔家富圖籍殆將萬卷成婚之後頗亦遊其書齋既而告人曰崔氏書被人盗盡曽不之覺崔遽令檢之玠捫腹曰已藏之經笥矣談藪婦翁不禮張延賞選壻無可意者其妻苗氏賢而知人時選進士韋臯許之臯性疎曠不拘細行延賞竊悔由是婢僕頗輕慢之惟苗氏待之益厚臯因辭東遊張氏罄奩具以治行延賞幸其去以七䭾物為贐臯行翌日悉還之惟留奩物及書冊而已後五年臯擁節旄㑹德宗幸奉天持節西川替延賞乃改姓名作韓翺人莫敢言至大囬驛去府三十里人有報曰替相公者韋臯非韓翺苗氏曰必韋郎也延賞曰天下姓名同者甚衆彼韋生必填溝壑豈能乘吾位乎次日果韋皐也延賞慚懼自西門潛遁臯入見苗禮奉過布衣之日求前輕慢者皆杖死之時泗濵郭圍因為詩曰宣父從周又入秦昔賢誰不困風塵當時甚訝張延賞不識韋臯是貴人唐宋遺史婦翁見薄李彦允薄其壻崔員後崔救李娣死杜黄裳初不為執誼所禮及敗黄裳悉力營救既死表還其柩葬焉德輿有壻權丨丨為相其壻翰林學士獨孤郁以嫌自白去内職憲宗歎曰丨丨乃丨佳丨我反不及耶唐紀昌黎得壻昔丨丨為唐儒宗丨子丨李漢然後其文益振其道益大臨川集詩集得翁句法謝師厚方為其女擇對見山谷詩曰吾得謝如是足矣庭堅往求之然庭堅之詩卒從謝公得句法故山谷有詩曰自往見謝公論詩得津梁夢為子壻予為密州子立未嘗相識忽告同舍生曰吾丨丨密州壻何也已而果以子由之子妻之故詩云彭城初識子照眼白而長異夢先成兆清言未得嘗豈惟知禮意遂欲補詩亡咄咄真相逼諸生敢鴈行東坡哭王子立詩注友壻事類僚壻江東呼同門為丨丨爾雅婣亞𤨏𤨏丨丨詩大雅為亞兩壻相謂丨丨爾雅維私譚公丨丨注姊妹之夫曰私碩人彌子子路孟子曰丨丨之妻與丨丨之妻兄弟也丨丨謂丨丨曰夫子主我衞卿可得也然子路在弟子中號為好勇而彌子瑕至以色悦人乃為友壻哀侯息侯蔡丨丨取於陳丨丨亦取焉息媯將歸過蔡蔡候曰吾姨也止而見之弗賔息侯聞之怒使謂楚文王曰代我吾求救於蔡而伐之楚子従之莊十一叔隗季隗晉公子重耳奔狄狄人伐廧咎如獲其二女丨丨丨丨納諸公子公子取季隗以叔隗妻趨衰僖三十二大喬小喬周瑜字公瑾為中䕶軍從孫䇿攻皖得喬公兩女皆國色䇿自納丨丨瑜納丨丨䇿從容戲瑜曰喬公二女雖流離得吾二人作壻亦足為歡李蔣二壻丨漢丨係皆韓愈之子壻唐書孫李二壻丨儁與丨元膺俱娶太尉桓焉女時人謂兩女俱乘龍言得壻如龍也楚國傳受辱友壻嚴助侍宴上問所欲對曰家貧為友壻所辱願為會稽太守恥為吏屬謝誨庾登之俱曹氏壻為荆州刺史請登之為長史登之意甚不愜到㕔牋惟言即日恭惟初無感謝之言兄弟同壻崔休弟之子愍字長謙濟州刺史盧尚之欲以長女妻之休為子陵求尚之次女曰家道多由婦人欲令姊妹為妯娌尚之感其義於是同日成婚友壻異黨王懿恪歐陽文忠同為薛簡肅公子壻後文忠為參政吏擬封懿恪僕射文忠曰僕射宰相官也拱辰非曽任宰相者改東宫官以至拜宣徽使終身不至執政蓋懿恪主李文靖文忠公主范文正其黨不同云妻黨事類戒弟勿至王右軍郄夫人謂二弟司空愔中郎鑒曰王家見二謝傾筐倒履見汝輩來平平耳汝可無煩復往也世説責姪不來王江州夫人語謝遏曰汝何以都不復進夫人𤣥之妹遏之姑為是塵俗經心天分有限妻兄戲辱劉穆之少貧好往丨丨江氏乞食多見辱江氏後有慶㑹囑令勿來穆之猶往食畢求㯽榔江氏兄弟戲之曰㯽榔消食君乃飢何忽須此妻市殽饌為其兄弟以餉穆之穆之為丹陽尹乃令厨人以金盤貯㯽榔一斛以進之本傳妻族傾陷栁勣與丨丨不協欲陷之為飛語勣杖死元宗紀期待妻甥何充廬江人王導妻姊之子王導早為顯官充嘗請導舍導以麈尾指床呼充共坐曰此是君座也周䘏妻弟許昌士人張孝基娶同里富人女富人只一子不肖斥逐之富人病且死盡以家財付孝基與治後事如禮乆之其子丐於途孝基見之惻然謂曰汝能灌園乎答曰如得灌園就食亦幸矣其灌園稍自力孝基復謂曰汝能管庫乎答曰得管庫又何幸也孝基使管庫覺馴謹無他過知其能自新遂以其父所委財産悉歸之其子自此勵操厚德録詩集沙哥聞成中楊汝士以户部檢校尚書鎮東川白樂天即其妹壻也時樂天以太子少傅分洛戲代内子賀足嫂詩曰劉剛與婦共昇仙弄玉隨夫亦上天何似丨丨汝士小字領崔嫂碧油幢引向東川樂天黔婁金花銀椀饒君用罨畫羅裙任嫂裁嫁得黔婁為妹壻可能空寄蜀茶來同上無怨謝公文章如虎豹至今班班在兒孫竟陵主簿極多聞萬事不理專討論澗松無心古鬚鬛天球不瑑中粹温落筆塵沙百馬奔劇談風霆九河翻胸中恢疎丨丨恩當官持㢘且不煩吏民欺公亦可忍慎勿驚魚使水渾漢濵耆舊今誰存駟馬髙蓋徒紛紛安知四海習鑿齒拉笏看度南山雲山谷送謝公定作主簿懷親歴亂百憂心漂零一涯天讀禮不盈尺眼萎坐自憐君來訪安否春風吹栁綿篝燈濟平生敞恍夜不眠那知嵗月度但恠氷雪堅感君懷親意使我淚貫泉髙堂急榮養躬耕恨無田筆端日色新氣壓諸生前聖門要鑽仰至味研簡編經綸出緒餘文字忘蹄筌它年聞擊竹妙契琴無弦此時一瓣香竟爲何人然江然多北風懷哉歸袖翩刮目看奮飛此道要着鞭朱喬年送祝仲容歸新安公娶仲容之姊即文公之母也古今合璧事類備要前集卷二十九
