body:
  text: 古今合璧事類備要别集卷五十七宋謝維新撰榖門榖附禾梁嘉禾粟稼穡粳黍稷秫稻米格物總論榖種之美者也其為種也不一攷之前載有言三穀者粱稻菽是也有言五穀者麻黍稷麥豆是也有言六穀者稻黍稷粱麥苽是也有言九穀者稷􅐕黍稻麻大小豆大小麥是也有言百穀者又包舉三穀各二十種為六十蔬果之實助榖各二十是也蓋人食之則飽不再食則饑未有不資以為生者也此其為種信美矣此其為種信乎其不一矣然不種則不生不耕則不穫故古者重榖而務農焉種以時而生以時耕以時而穫以時人事盡焉地力興焉天時應焉苗而秀秀而實昔春而種者一粒耳今秋而收者萬顆也昔春而入土者升斗耳今秋而登場者倉箱也國與民俱足獨不在此乎故聖王必貴五榖而賤金玉事類農殖丨丨嘉榖吕刑始播其丨丨百穀詩七月為有年五穀皆熟丨丨丨榖粱不違時丨丨農丨穀不可勝食也孟榖不升一丨丨丨曰歉二丨丨丨曰饑三丨丨丨曰饉四丨丨丨曰荒五丨丨丨曰大侵大侵則君上食不兼味臺榭不塗百官布而不制鬼神亦禱而不祠穀粱穀不收一丨丨丨謂之饉二丨丨丨謂之旱三丨丨丨謂之凶四丨丨丨謂之匱五丨丨丨謂之饑饉九穀不熟謂之大侵大侵則大夫以下損禄五分之一旱則二凶則三匱則四饑饉大侵則盡禄廩而已墨子炎帝播丨丨大庭氏下為地皇作耒耜丨百穀曰神農月令疏神農殖丨丨氏之治天下也甘雨以時五穀蕃丨淮王術黄帝藝丨丨丨五穀史記播百榖舜曰棄黎民阻饑汝后稷丨時丨丨舜典殖五榖厲山氏之子能丨丨丨故祀以為稷禮記五皆熟魯威公三年丨穀丨丨為有年五蕃熟淳于髠滑稽多辯齊威王八年楚伐齊齊使髠之趙請救齎金百斤車馬千駟髠仰天大笑冠纓索絕王曰先生少之乎髠曰臣今者從東方來見道旁穰田者操一豚蹄酒一盂祝曰甌窶滿篝汚邪滿車丨榖丨丨穰穰滿家臣見其所持者狹所欲者奢故笑之齊王乃益黄金千鎰白璧十雙車馬百乗髠至趙予精兵十萬楚聞之引兵去史記問幾何漢文帝丨丞相勃曰天下錢穀一嵗出入丨丨勃謝不知又問左丞相平平曰各有主者陛下問錢穀責治粟内史本傳患不足魏太祖丨廩穀丨丨私謂主者曰何如荅曰以小斛量之太祖曰善其後軍中謂太祖欺衆太祖謂主者曰特當借汝死以厭衆不然不可解遂斬于軍中魏志今使典諸葛亮聞孫恪伐徐以書與陸遜曰家兄年老而性疎丨丨丨糧穀者軍之要最也僕在遠切用不安江表傳禾八月熟禾嘉穀也二月始生丨丨而丨得時之中故謂之禾説文十月納丨丨丨禾稼黍稷重穋禾麻菽麥注禾者總名黍稷稻苽粱皆名為禾麻與菽麥則無禾稱七月滋液以生禾者銜丨丨丨丨春秋説題莽鹵而報丨丨而種之禾亦丨丨丨丨之㓕裂而耰之禾亦㓕裂而報之莊異畝同頴唐叔得禾丨丨丨丨獻諸天子書乃雨反風秋大熟未穫天大雷電以風禾盡偃王與大夫盡弁以啓金藤之書王出郊天丨丨丨丨禾則盡起金滕成周之禾隠三年鄭祭足取丨丨丨丨左北里之禾管仲説威公曰古之封禪丨丨丨丨所以為盛注北里地名史取禾三百不稼不穡胡丨丨丨丨囷兮又胡丨丨丨丨㕓兮伐檀見禾三變孔子丨丨之丨丨注三變始於粟粟生苖苖成於穗淮汎論訓嘉禾異莖同穗成王時有苖丨丨而生丨為一丨人有上之者王召周公而問之公曰三苖為一穗抑天下其和為一乎尚書大傳一莖九穗光武生於濟陽縣舍是嵗縣界有嘉禾生丨丨丨丨因名曰秀本紀又和帝元年嘉禾生濟隂城陽丨丨丨丨古今注魯恭庭中丨丨拜中牟令嘉禾生恭便坐丨丨本傳洛陽家田後魏許謙居丨丨為鴈門太守洛陽丨丨三生嘉禾異畝同頴本傳㑹稽生嘉禾赤烏七年丨丨言嘉禾丨改年為丨丨呉志豫州獻嘉禾初太子生之嵗丨丨丨丨丨乃更名豫唐代宗紀曹子建嘉禾頌野多滯穗畝有餘糧六穗慙稱於漢臣異畝耻書於周典栁子厚嘉禾表嘉穀順成靈貺昭格天人合應遐邇同心伏惟皇帝陛下睿謀廣運神化旁行植物知仁祥圖應聖靈嶽不愆於贊佑燕谷用遂於生成豐稔既均知朔南之被澤休嘉克叶見天地之同和六穗慙稱於漢臣異畝耻書於周典自中形外均慶同歡稼穡實為稼禾之秀丨者丨丨一曰在野曰稼説文歛曰穡土爰稼穡注種曰稼丨丨丨書洪範稼既同我丨丨丨豳七月稼維寳稼丨丨丨代食維好桑柔服田力若農丨丨丨穡乃亦有秋盤庚大田多丨丨丨稼詩大田黍稷薌合黍曰丨丨曲禮明馨稷曰丨丨同上仲夏登丨丨之月農乃丨黍記月令大暑種以丨丨而丨故謂之黍説文農夫慶黍稷稻粱丨丨之丨甫田天子食孟冬之月丨丨丨黍與彘月令雛嘗黍天子以丨丨丨月令豕宜稷牛宜梌羊宜黍丨丨丨犬宜粱内則彼稷之苖彼黍離離丨丨丨丨詩五榖之長稷丨丨丨丨也説文稻粱白黍飯黍稷丨丨丨丨黄粱楈樵内則秬秠黑黍丨黑黍一名栕黍丨一稃二米秠是丨丨之中一稃有二米者爾雅祭以為盛孔子侍坐於魯哀公設桃具黍孔子對曰夫黍者五榖之長也丨先王丨丨上丨果有六而桃為下祭先王不得入於廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五穀之長雪果菰之下是侵上雪下也家語傳名為谷鄒衍在燕有谷地美而寒不生五榖鄒子吹律而溫至今丨丨丨黍丨列子見盗割者隋季士謙望丨丨丨其禾黍丨黙而避之家僮執盗者士謙曰窮困所致放之本傳稻紫芒有丨丨稻廣雅赤穬丨丨白米稻稻穗丨丨謂之禾稻屬秔丨丨稻孫稻已割而復抽曰丨丨並同上嘉蔬祭宗廟之禮稻曰丨丨禮記新稉魏文帝與羣臣書曰江表惟長沙有好米何時丨丨稻出邪風吹之五里聞香魏志十月穫丨丨丨稻詩豳七月五里香見前慙送以還夏香有盗刈稻者香助收之盗者丨丨丨丨香香不受㑹稽典歎不得事李百藥隋内史徳林之子七嵗能屬文父友陸又等共讀徐陵文有刈琅琊之稻之語丨丨丨其丨百藥進曰春秋鄅藉稻杜預謂在琅琊客大驚本傳粱虋赤苖丨丨丨今之赤粱粟芑白苖丨丨丨今之白粱粟並爾雅疏米微青青粱殻穗有毛粒青丨亦丨丨而細於黄白粱同上榖俱麤黄粱穗大毛長其丨米丨丨於白粱而收子少殻扁長白粱穗亦大而長丨麤丨丨不如粟圓也並本草粟為粢粢稷今江東人呼粟丨丨爾雅比粱粟米畬田種之甚易春粒細香美陳者或呼為粢大氐人多種粟而少種粱以其損地力而收穫少耳粟米丨丨乃細而圓本草天雨神農之時丨丨粟神農耕而種之然後五穀興周書春頒凢用粟丨丨而秋歛之禮旅師不食武王平商天下宗周伯夷叔齊耻之義丨丨周粟隠於首陽山采薇而食史記發大賚丨鉅橋之粟丨丨于四海書武成餼國人鄭饑而未及麥民病子皮以子展之命丨丨丨粟户一鍾左襄二十九餼夫子季桓子以粟十種丨丨丨受而頒諸門人之無者子貢曰季孫以夫子之貧也而致粟今而施矣乃厥意乎子曰吾受而不辭為季孫惠受而惠非一人不亦宜乎家語母請粟子華使於齊冉子為其丨丨丨子曰與之釡請益曰與之庾冉子與之粟五秉語六友饋粟子思居貧其丨丨之丨者受二車焉或獻以樽酒束脩子思曰為費而不當也或曰子取人粟而辭酒是辭而受多於義無名於分則不全行之何也子思曰然不幸而貧至於困乏將絕先人之祀夫所以受粟焉周之也酒脯則所飲燕也方為食而乃飲燕非義也度義而行之可也家語原思辭丨丨為之宰冉子與之粟九百丨子曰母以與爾鄰里鄉黨乎語六北郭受丨丨騷見晏子託以養母晏子分倉粟府金遺之騷辭金丨粟管子莊周貸丨丨徃丨粟於監河侯曰諾我以金貸子周忿然曰若乃言不如早索我於枯魚之肆矣説苑高平貸丨丨王遺使者從魏文侯丨粟文侯曰須吾租粟至乃可也使者曰如魚張口待水上呼吸間若待決淮河之水必求吾於枯魚之肆矣説苑無食粟馬季文子丨丨丨之丨左襄五年無食粟鴈鄒穆公有令食鳬鴈者必以秕無敢以粟鳬鴈丨丨而以石丨易一石秕其費甚矣請以粟食之公曰非爾所知也夫百姓飼牛而耕曝背而耘勤而不敢墮者豈為鳥獸食哉粟米人之上食也柰何其以養鳥汝知小計而不知大害韓非子以小斗受田釐子乞為齊大夫收賦税於民丨丨丨丨之其粟予民以大斗行隂徳於民由是得齊衆心惠子以大斗出田乞卒子常立復脩釐子之政丨丨丨丨貸以小斗受齊人歌之同上以金生粟商君丨丨丨丨遂致金粟西生倉府西實國是以强史記獨倉窖粟有任氏為倉吏秦敗豪傑爭取金玉而任丨丨丨丨楚漢相距滎陽民不得耕其米踊貴是時豪傑金玉盡歸任氏以此起富同上據敖倉粟酈食其説高祖曰敖倉天下轉輸久矣急丨丨丨之丨本傳發河南粟河内失火上使汲黯徃視之還報曰河内人或父子相食臣謹丨丨丨倉丨以賑貧乏汲黯傳大倉紅粟孝武元狩六年丨丨之粟紅腐而不可食賈捐之傳長安黒粟宣帝地節三年丨丨雨丨丨古今注一斗可舂淮南王死民歌曰丨丨粟尚丨丨兄弟二人不相容本傳一囊飽死東方朔曰侏儒長三尺餘俸丨丨粟錢三百四十臣朔長九尺餘亦一囊粟錢三百四十侏儒丨欲丨臣朔饑欲死也本傳入粟拜爵晁錯建策令民丨丨塞下丨丨本傳又見下文入粟除罪錯説文帝曰方今之路莫若使民務農務農在於貴粟貴粟之道在於以粟為賞罰令天下丨丨縣官得以拜爵丨丨本紀治粟内史見前報門問㡬何注捜粟都尉武帝末年悔征伐下詔以趙過為丨丨丨丨本紀粳稌屬秔丨丨也秔稻不粘者然秔稻與糯稻甚相類粘與不粘異耳本草稻屬秔丨丨也説文所常食粳米即人丨丨丨米有白赤大小異族四五種同一類也本草有再熟秔丨丨丨之稻呉都賦呼為秈丨秔丨丨本草三十畝種陶淵明為彭澤令公田悉令種秫稻妻子固請種秔乃使二百五十畝種秫丨丨丨丨粳宋書秫稻黏為􅟙江東呼糯為􅟙􅟙力亂反詳見前稻粘為秫丨之丨者丨丨古今注公田悉種見上注米負米子路見於孔子曰昔者由也事二親之時常食藜藿之食為親丨丨百里之外親殁之後南遊於楚從車百乗積粟萬鍾欲食藜藿為親丨丨不可得也家語索米東方朔言臣若無用宜棄捐無丨長安丨本傳指一囷周瑜為居巢長將數百人過魯肅家并求資糧肅家有囷米各三千斛乃丨丨丨與瑜瑜益知其竒也遂相親結僑札之分本傳為五斗淵明為彭澤令郡遣督郵至軍吏白應束帶見之潜歎曰我不能丨丨丨米折腰向鄉里小兒即日解印綬賦歸去來以遂其志本傳齎米空還呉全琮父柔為桂陽守使琮丨丨數千斛至呉交易琮皆賑給士大夫丨船而丨柔竒之本傳送米不須王脩齡貧乏陶胡奴為鳥程令丨丨一船荅曰王脩齡饑自就謝仁祖索食丨丨陶胡奴送來世説餉米不煩齊劉懷惠為齊郡守人有丨新丨一斛者懷惠出所食麥飯示之曰食有餘幸丨丨此世説米耗不問梁張率為新安太守遣家童載丨三千石還宅及至遂丨其半率問其故荅曰䑕雀耗率笑曰壯哉䑕雀竟丨丨梁書米恣取足梁庾詵嘗乗舟從山舍還載丨百五十石有人寄載三十石至宅寄載者曰君三十石我百五十石詵黙然不辨丨其丨丨世説于宗見侮梁沈絢少貧丨丨黨得米數百斛為宗人所侮覆米而去及貴不以為憾梁書行旅不賫唐太宗貞觀初户不及三百萬絹一匹易粟一斗至四年米斗三四錢人行數千里不賫糧本傳舉家食粥顏魯公乞米於魯大夫帖云拙於生事丨丨丨丨而已數月今又罄乏實用憂煎法帖為奴易酒陽城嘗絶糧遣奴求米奴以米易酒醉卧於路城與弟迎之奴未醒城負以歸及覺痛咎謝城曰寒而飲何害焉本傳詩集舊榖丨丨猶儲今陶淵明佳榖丨丨垂金穎陸機榖價蠶麥俱收丨丨平放翁榖實開塍放餘水經霜丨將丨郭功父九穗既多丨丨穀復有三秀芝芝以保萬夀穀以豐東菑宋景文禾未秀父耕原上田子斸山下荒六月禾丨丨官家已收倉鉏田當日午汗滴禾下土誰念盤中餐粒粒皆辛苦二月賣新絲五月糴秋穀醫得眼下瘡剜却心頭肉我願君王心化作光明燭不照綺羅筵只照逃亡屋聶夷中田家願稔麻麥聞熟刈蠶成繰莫遅更看田中禾稂莠時去之幸此赤日長農事莫敢違丨言一嵗丨不受三冬饑郭功父田家盈囷田事今去休官輸亦已足刈禾既丨丨採薪又盈屋同上百把出裹一簞飯歸收丨丨禾勤勞解堪忍餘暇更吟哦嵗惡増吾囷家貧頼汝多村醪莫辭醉羮芋學岷峨陸放翁禾把減井字行都整花香遠已甜穗肥黄俯首芒動紫掀髯風攪平雲障聲鬆缺月鎌不愁丨丨丨高廪却愁添誠齋禾蒔匝田夫抛秧田婦接小兒抛秧大兒挿笠是兠鍪簑是甲雨從頭上濕到胛喚集朝餐歇半霎低頭折腰只不荅秧根未牢丨丨丨照管鵞兒與鷄鴨誠齋挿秧歌根土烈晚禾不及秀日炙丨丨丨踏車邀湖水車得衆湖竭張文潜稼穡買居依丨丨丨稼穡戮力東林隈不言春作苦常恐負所依陶淵明黍稷催釀衰年丨丨黍杜力耕禾黍不陽艷競㘽桃李春翻令丨丨者變作賣花人名賢集連山種歌元豐十日五日一雨風麥行千里不見土丨丨沒雲皆丨黍水秧緜緜復多稌龍骨長乾挂梁梧荆公今秋熟丨年丨應丨過從飽鷄黍坡稻鸚粒香稻啄殘丨鵡丨杜鹿米丨丨麠芽白白樂天擔肩赬刈稻丨丨丨韓昌黎流脂白稻米丨丨粟米丨杜共比屋稉稻丨丨丨佇聞香東渚雨今足丨丨秔稻丨官鷄輸丨丨丨稻粱並同上北鴈戀南思洞庭水丨想丨門關稻粱俱可丨飛去復飛還陳周𢎞正詠鴈稻翻起嘗丨雪丨丨杜稻义牙荒畦九月丨丨丨李賀六月多東屯大江北百頃平若按丨丨丨新稻千畦碧泉亂挿秧適云已引溜加溉灌更僕徃方塘决渠當斷岸公私各地著浸潤無天旱主守問家臣分明見溪畔竿竿烱翠羽剡剡生銀漢鷗鳥鏡裹來關山雪邉看秋苽成黑米精鑿傳白餐玉粒定晨炊紅鮮任霞散終然添旅食作苦期壯觀遺穗及衆多我倉戒滋蔓杜三秋末香稻丨丨丨平田百頃間喜無多屋宇幸不礙雲山御裌侵寒氣嘗新破旅顏紅鮮終日有玉粒未吾慳炊能白稻米丨丨丨秋葵煮復新誰云滑易飽老藉軟俱匀種幸房州熟苗同伊闕春無勞映渠盌自有色如銀子粒紅復作歸田去猶殘穫稻功築場連蟻宂拾穗喜村童落杵先輝白除芒丨丨丨加餐可扶老倉庾慰飄蓬並同上陂雨細稻丨丨丨豐年候陸放翁塍霜報厭丨丨稻丨年豐宋景文八九折旱稻如倒戈十潜穗丨丨丨張文粱舂得細白露黄粱熟分張素有期已應丨丨丨頗覺寄來遲云云老人他日愛政想滑流匙求未足稻粱丨丨丨新炊間丨丨丨黄粱並杜粟春種丨丨一粒粟秋收萬顆子四海無閒田農夫猶餓死李紳地宜瘐丨翻丨粟雲鋤丨嶼丨畬粟放翁鳥雀肥丨丨苦丨舂粟菽杜稉甌貯香白丨丨丨稉李頎玉炊香淅丨丨丨秔韓半濕搗柴扉臨野碓丨丨丨香稉杜隨土宜田田時雨足鞭牛務深耕選種丨丨丨播植糯與粳郭功父今年熟丨丨粳丨稻苦遅庶見霜風來幾時霜風來時雨如㵼把頭出菌鎌生衣眼枯淚盡雨不盡忍見黄穗卧青泥茒苫一月壠上宿天晴穫稻隨車歸汗流肩頳載入市價賤乞與如糠粞賣牛納税折屋炊慮淺不及明年饑官今要錢不要米西北萬里招羗兒龔黄滿朝人更苦不如却作河伯婦東坡田婦歎玉粒輸鞭地如鏡築我場簸礱丨丨丨官倉九月野空天欲霜甑中初喜炊粳香放翁秫舂作酒丨秫丨美丨陶潜植與秔播丨糯丨丨郭功父供留客種秫丨丨丨陸放翁米白粲秋菰成黒米精鑿儲丨丨杜紅鮮丨丨終日有玉粒未吾慳又玉粒足晨炊丨丨任霞散同上古人供丨丨丨飯米杜酬高使君鄰僧送至今丨丨乞米丨韓贈盧仝助饙餾乞米丨丨丨荆公與乞食舉家鳴鵞鴈突冷無晨炊大貧丐小貧安能不相嗤幸存顏氏帖况有陶公詩乞米丨丨丨皆是前人為梅堯臣貸米於如晦送乞鄰僧盧同不出僧流俗我卜郊居避俗僧今有鄰僧來乞米我今丨米丨丨丨王荆公送米與法恵先舂年計臈中儲蓄百事利第一丨丨丨丨米羣呼歩碓滿門庭運杵成風雷動地篩匀箕健無粞糠百斛只費三日忙齊頭圓㓗箭子長隔籬耀日雪生光土倉瓦龕分蓋藏不蠧不腐常清香去年薄收飯不足今年頓首炊白玉春耕有種夏有糧接到明年秋刈熟鄰叟來看還嗟嗟貧人一飽不可賖官租私債紛如麻有米冬舂能幾家范石湖冬春古今合璧事類備要别集卷五十七
