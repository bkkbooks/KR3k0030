陛下以讀書為樂天下幸甚大抵聖賢之學須在積纍積纍之要在專與勤四字是積學之意願留聖意繫年録臺臣特召慶歷二年召御史中丞賈昌朝侍講邇英閣故事丨丨旡在經筵者仁宗以昌朝長於講說丨丨之帝學朝班居下熙寧元年龔鼎臣蘇頌劉邠等議不當坐講疏丨廷丨制以侍講丨侍讀丨國朝會要帶職補外故事侍講學士無帶出外者張知白罷參知政事授此職知大名府然非由二府而出者不得與寶元中梅詢始帶知鄭州改許州自後兩制遂為例也東齊記事得州講徹錢象先字資賢自講筵出知蔡州故事講讀官分日迭進象先已丨蔡丨帝猶諭之曰大夫行有日矣宜丨丨一篇於是同列罷進者浹日四朝國史賜宴東宫元祐元年丨宰執經筵官丨于丨丨上親書唐人詩分賜之以講論語終篇也會要賜宴祕省紹興二十二年丨丨丨書丨以講尚書徹章自是以為例繫年録賜公亮章服慶歷七年上御邇英門講孝經丨曽丨丨三品丨丨曰此賜異於他日實録賜祖禹御書范祖禹講論語畢上賜御書唐人詩家傳學士一十餘年曽公亮自集賢校理至翰林丨丨侍講丨丨丨丨事略經筵二十七年嘉祐間王安國在丨丨丨丨丨丨上稱其行義以比先朝崔遵度同上臺諫兼充源流慶歷二年召御史中丞賈昌朝侍講邇英閣故事臺丞無在經筵者上以昌朝長於講說特召之仁宗實録神宗用吕正獻亦止命時赴講筵去學士職中興後王尚書賓為御史中丞建請復開經筵遂命兼侍講自後十五年間繼之者惟王唐公徐師川二人皆上意也紹興十二年春万俟中丞卨羅諫議楫並兼講讀紹興二十五年春董殿院德元王正言珉並兼侍講非臺丞諫長而以侍講為稱又自此始其後猶或兼說書臺官自尹穡隆興二年五月諫官自詹元宗乾道九年十二月後並以侍講為稱不復兼說書矣朝野雜記修注兼充源流自朱子發後修注官多得兼侍講嘉泰二年八月林伯玉自殿中侍御史兼侍講除起居郎其年閏十二月鄧伯允自右正言兼侍講除起居舍人伯玉改兼權刑侍伯允改兼史編實討非故典也開禧元年八月婁彥開自言路徙奉常兼權中書舍人亦以史院易經筵遂為定例三年十月朱仙文自司諫改奉常兼講如故意者以其兼權史侍故也十一月王簡卿知諫院為左史仍兼崇政殿說書言者猶以為不可罷之嘉定元年黃伯庸自右正言兼侍講除起居舍人兼如舊今故典矣自渡江後惟王密論以右史兼說書其他無此比宫觀兼充源流國朝自元豐以來多以丨丨丨侍讀乾道七年寶文閣待制胡銓除提舉佑神觀兼侍講是日以宰執進呈虞允文奏曰胡銓蚤歲一節甚髙謂當濶略録其氣節不宜令遽去朝廷上曰銓固非他人比且除在京宫觀留侍經筵故有是命中興會要望西清之帷幄丨丨丨丨丨丨久立倣徨聼長樂之鼓鍾恍如夢寐東坡謝表命金華之經幄丨丨丨丨丨丨併以命爾曲阜行周常制晦庵初辭免侍講臣昨任潭州日䝉主恩今赴行在奏事除臣煥章閣侍制兼侍講者恭惟國家設官分職以熙庶事其遷進之序選用之方雖甚微細莫不有法而况次對之官班通禁近其自內而除者猶有歲月之限在外而擢者必以勞效而升從昔以來未嘗輕授至于經帷則又仰關帝學在今初政尤所當先必得醇儒使任其職然後有以發揮道要感格君心大明謹始之規以為由治之本尤不可以不遴其選也如臣疏賤久以病廢比叨試用又復罔功固己不堪超躐不次之除聞見甚淺記職不彊妄意本原亦未知要則又無以仰副招延自近之意在臣非敢自愛實恐不免冒昧之誅有纍維新之政加以盲瞶跛躄不利走趨昨䝉收召之恩已伸辭避之懇所有今來恩命臣實不敢祗受欲望皇帝陛下察其悃愊特賜矜憐俯狥愚誠曲全素志則臣不勝干萬幸甚臣旡任天瞻望聖激切祈懇之至謹録奏聞晦庵文集晦庵再辭免侍講伏念臣猥以凡品遭值昌辰龍德天飛萬物咸覩豈不願以此時進趨軒陛仰瞻穆穆之光况使執經入侍帷幄得以所學論說人主之前臣雖至愚亦豈不冀幸少有萬一可以仰裨聖聰特以次對異恩無故超受在臣私分實難自安是以倣徨未敢拜受今來復凖前項聖旨雖巳望闕遙謝聖恩即日拜發前去外欲乞到日許臣且依七月十一日已降指揮帶元官職詣闕奏事所有新除却俟靣奏辭免别聼處分冒瀆宸嚴臣不任惶懼隕越之至謹録奏聞伏候敕旨同上詩集繡裳畫衮丨丨丨丨雲垂地不作成王剪桐戲東坡邇英講論語謝賜書鴟閣象篦丨丨行看迎太宰丨丨應記講庖人注公在講筵講周禮至庖人而請去周益公寄胡邦行上尊茗碗丨丨初破早朝寒丨丨仍沾講舌乾升楯諸公空雨立故應慚悔不儒冠東坡黃色起天庭曈曈日腳曉猶清細細槐花暖欲零坐閲諸公半廊廟時看丨丨丨丨丨自注僕射吕公門下韓公左丞劉公皆自講席大明東坡傳立邇英述懷黃繖下西清日髙丨丨丨丨丨風動槐龍麟文翠東坡邇英講論語謝賜書絲絇侍禁庭江沙踏破青鞋底却結丨丨丨丨丨東坡入侍文星環北極隆儒殿閣對橫經咫尺清都雨露零見說丨丨丨丨丨人間無路仰天庭黃山谷和同上注崇政殿說書歷代㳂革古無此官國朝仁宗景祐元年正月命賈昌朝趙希言為崇政殿說書初侍講學士孫奭年老乞外因薦昌朝等至是特置此職以命之續會要慶歷二年以趙師民預講官復為崇政殿說書職官分紀蓋秩卑資淺則為說書不兼侍講元佑間范淳夫乃以著作佐郎兼侍講司馬公休又嘗以著作佐郎兼侍講前此未有也吕原明家記崇寧中初除說書二人皆以𨼆逸起蔡崇吕瓘仍遂其性詔以士服隨班朝謁入侍渡江後尹彥明初以祕書兼之中間王龜齡范至能皆以郎官兼亦殊命也朝野雜記事類真侍講程頥召充崇政殿說書一日講罷未退上忽起憑檻戲折栁枝先生進曰方春發生不可無故摧折注或云無此經筵承受張茂則嘗招講官啜茶觀畫先生曰吾平生不啜茶亦不識畫竟不往文潞公嘗與吕范諸公入侍經筵聞先生講說退相與歎曰丨丨丨也朱文公伊川年譜上師傅哲宗幼冲召程正叔為崇政殿說書正叔以師道自居每侍上講色甚莊繼以諷諫上畏之正叔曰吾以布衣為丨丨丨其敢不自重言行録初授昌朝賈昌朝傳景祐元年丨置崇政殿說書以丨丨丨而天章閣侍制亦自昌朝始東都事略以召程頥哲宗嗣位召程頥將以為崇政殿說書上奏論經筵三事其一以上富春秋宜選賢德以輔講官因使陪侍宿直講說道義所以涵養氣質薰陶德性其二請上左右內侍宫人皆選老成厚重之人不使侈靡之物淺俗之言接於耳目仍置經筵祗應內臣十人使上在宫中動息以語講官其三請令講官坐講以養人主崇德重道之心既而命下以通直郎充崇政殿說書實録納誨輔德伊川先生既召對充崇政殿說書四月例以暑熱罷講先生奏言輔導少主不宜疏略如此乞令講官以六參日上殿問起居因得從容丨丨以丨上丨伊川文集修身正心吕希哲字原明為說書凡二年日夕勸導人主以丨丨為本修身以丨丨誠意為主心正意誠天下自化不假他術身不能修雖左右之人且不能諭况天下乎言行録上喜質問景祐元年以賈昌朝為崇政殿說書昌朝講說明白丨丨之多所丨丨昌朝悉記録歲終以付史館東都事略上聞擢用熙寧四年以王雱為崇政殿說書雱宰相安石之子丨丨其能故召而丨丨之丁未録賜名記注賈昌朝為說書昌朝在經筵善講說仁宗多所質問皆記録删開以進丨丨邇英延義二閣丨丨録事略命詞給告近制兼職雖宰相領國史實録院敕令所玉牒所降敕而已惟講讀官下至說書皆丨丨丨丨可見崇儒重道之道也周益公文集輪貟袛候景佑元年命賈昌朝趙希言王宗道楊安國並為崇政殿說書日丨二丨丨丨日歷侍經如故賈昌朝初為崇政殿說書後為天章閣侍講歷如制誥開封府權御史中丞而丨丨筵丨丨言行録成就君德程頥為說書上奏論經筵三事三曰天下治亂係宰相丨丨丨丨在經筵伊川文集感悟人君尹焞每當講前夕必齊戒沐浴曰欲丨丨丨丨安得不敬編年備要存誠感上伊川先生在經筵當進講必宿齊豫戒潜思丨丨以丨動丨意言行録引經稱旨熙寧中吕惠卿為說書召見奏對丨丨丨丨丁未録庶官曰說書近事侍從以上兼經筵則曰侍講丨丨則崇政殿丨丨故左史兼亦曰侍講如程敦􅌋趙衛是也周益公集𨼆逸除說書熙寧中初除說書二人皆以𨼆逸起蔡崇吕權詔以士服隨班朝謁入侍吕原明家孰廣記臺諫兼說書紹興十二年春万俟中丞卨羅諫議楫並兼講讀蓋秦楚材梓是時巳兼說書便於傳導自後伯陽繼之每除言路必與經筵矣檜死遂罷兼自二十五年閣月至三十二年臺丞諌長兼經筵止三人慶元後臺承諫長暨副端正言司諌巳上無不預經筵者正言兼說書自巫端明伋始副端兼說書自余端明堯弼始察官兼說書自陳少卿䕫始朝野雜記修注兼說書自朱發後修注官得兼侍講開禧三年十一月王簡卿知諫院為左史丞兼崇政殿說書言者以為不可罷之同上古今合璧事類備要後集卷二十三
