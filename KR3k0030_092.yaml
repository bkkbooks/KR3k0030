body:
  text: 古今合璧事類備要後集卷二十三宋謝維新撰經筵門侍讀歷代㳂革唐開元三年上謂宰相曰朕每讀書有所疑滯無從質問可選儒學之士使入內侍讀乃以馬懷素與褚無量更日侍讀通鑑開元十三年改麗正修書院為集賢殿書院選耆儒日一人以質史籍疑義置集賢院侍講學士侍讀直學士唐百官志本朝太宗始用著作佐郎吕文仲為侍讀真宗咸平二年以楊徽之夏侯嶠並為翰林侍讀學士㑹要先是侍讀名秩未崇真宗首置此職擇耆儒舊學以充其選班秩次翰林學士祿賜如之設直廬於祕閣侍讀更直侍講長上曰給尚珍膳夜則迭宿多召對訪問或至中夕㑹要天禧舊制凡侍臣皆賜坐講者别設本于前侍讀初無所職但侍立而已自宋綬夏竦為侍讀始今讀唐書一傳會要元豐官制廢翰林侍讀侍講學士不置但以為兼官然必侍從以上乃得兼之其秩卑資淺則為說書歲春二月至端午日秋八月至長至日遇隻日入侍邇英閣輪官講讀元祐七年復增學士之號元符元年省去續㑹要建炎元年詔可特差侍從官四員充講讀官遇萬機之暇令三省取旨就內殿講讀事類儒學元宗謂宰相曰朕每讀書有所疑滯無從質問可選丨丨之士日使入內侍讀慮懷慎薦馬懷素使與褚無量更日侍讀待以師傅之禮通鑑文士元宗置麗正書院聚丨學之丨或修書或侍讀有司供給甚厚同上師臣馬懷素元宗時與褚無量同為侍讀更日畨入既叩閽肩輿以進或行在逺聼乘馬宫中每宴見帝自送迎以丨丨禮或作以中師資之禮唐職林經士元宗詔羣臣及府郡舉通丨丨而褚無量馬懷素等勸講禁中天子尊禮不敢盡臣之唐儒林傳序緝經籍集賢殿書院侍讀學士掌刋丨丨丨凡圖籍遺逸賢才隱滯則承旨以求之唐百官志質史籍元宗嘗選耆儒日一人侍讀以丨丨丨疑義至是置集賢院侍講學士侍讀直學士至德一年置大學士四年罷上注粹擷經史唐鄭浣文宗時為侍讀學士帝使丨丨丨丨為要録愛其博而精舉諸條擲問之隨即酬析無留唐書分講詩書韋處厚路隨為侍讀穆宗召入太掖亭命丨丨毛丨關雎尚丨洪範等篇訪以理體處厚演經義以廣規諷之道同上讀書貞守開元中王志愔表薦白履忠隱居丨丨丨苦丨操堪代褚無量馬懷素以為侍讀同上好學謹守唐徐岱字處仁少而丨丨多所探究侍讀兩宫而丨丨過人同上不趨黨與宋申錫寶歷二年轉禮部員外郎尋充侍讀學士申錫在朝行清謹介潔丨丨丨丨當長慶寶歷之間時風囂薄朋比大扇及申錫初用時論以為改觀本傳迭處禁密髙少逸代元裕為侍讀學士兄弟丨丨丨丨時人榮之髙元裕傳訪逮時政王起釋褐授校書郎纍遷中書舍人數上疏諫穆宗遊畋事俄加侍讀文宗上文好古學是時鄭覃以經術進起以敦慱顯帝數丨丨丨丨因積而願寬逐臣過惡唐本傳訪以理體見前分講詩書注郾謝無功崔丨姿儀秀偉人望而慕之敬宗即位拜翰林侍讀學士旋進中書舍人丨曰陛下使侍講歷半歲不一問經義臣丨丨不足副厚恩帝慚曰朕少閒當請益本𫝊放辭不任薛放端厚寡言穆宗為太子拜侍讀及即位帝謂曰小子新立懼不克荷宜相以輔不逮丨叩頭丨曰臣庸淺丨足塵大丨帝美其誠本傳耆儒舊學先是侍讀其名未崇真宗首置此職擇丨丨丨丨以充其選班次翰林祿賜如之設直廬於祕閣侍讀更直侍講長上日給尚食珍膳夜則迭宿多召對訪問或至中夕會要老成端士趙元若元祐初將啓講筵宣仁后諭執政云陸佃蔡卞皆少年宜用丨丨丨丨乃以彥若兼侍讀四朝國史純謹清約皇祐中翰林侍讀學士給事中郭勸表乞致仕帝以勸履行丨丨立身丨丨特降詔不允示優恩也會要忠厚純茂元祐初劉摯上疏仁宗皇帝盛年嗣服用李維宴殊為侍讀孫奭為侍講陛下春秋鼎盛願選丨丨孝弟丨丨老成之人以充勸講進讀之任以廣睿智仰副求治之志劉贄行實議論該洽仁宗詔翰林侍讀學士張錫講書禁中敷揚經㫖丨丨丨丨上嗟賞之國史記問不衰侍讀張錫上見其鬢髮皓然上曰卿老矣丨丨丨丨乃以飛白書博學字錫之因訪以治道錫曰節欲者治身之本也謹刑賞者治國之本也時貴妃被幸故以此諷之上改容曰卿言甚善朕恨用卿晚矣同上敷引時事邢昺傳昺字叔明真宗始置翰林侍讀學士首以命昺即於便坐令講左氏春秋嘗講孝經禮記論語書易詩據傳疏丨丨丨多及丨丨真宗甚嘉奬之東都事略歷言時事蘇軾除侍讀嘗侍讀三朝寶訓因及時事公歷言今賞罰不明善惡無所勸沮又黃河西方流而強之使東夏人冠鎮戎殺掠萬餘人帥臣不以聞朝廷亦不問恐成衰亂之漸當軸者恨之言行録暇日召問太平興國六年上聼政之暇日開經史始用著作佐郎吕文仲為侍讀常出經史命文仲讀之文仲與侍書王著更宿而書學葛端亦直禁中每丨丨多丨丨文仲以經書著以筆法端以字學編年備要遞宿宣召隆興元年十一月命經筵官丨丨學士院朝夕丨丨商確古今問以經書會要以備顧問至和二年詔龍圖閣直學士兼侍讀張升諡康節年髙免進讀止令侍經筵丨丨丨丨仁宗實録以禆聰明哲宗即位以吕公著為邇英侍讀始至上言曰人君即位當正始以治天下修德以安百姓修德之要莫先于學學有緝熙于光明臣待罪講讀謹條上十議丨丨丨丨曰畏天愛民修身講學任賢納諌薄斂省刑去奢無逸言行録不殺羊羔邇英讀三朝寶訓至真宗祀汾隂日見一羊自擲道左怪問之曰今日尚食殺其羔真宗不樂自是丨丨丨丨資政殿學士韓維讀畢因奏言此特真宗小善耳推其心以及天下則自不可勝用也真宗自澶淵之後十九年不言供天下富庶其源蓋出于此言行録行避螻蟻程伊川頤云嘗聞上在宫中起丨潄水必丨丨丨因請之曰有是乎上曰然誠恐傷之爾先生曰願陛下推此心以及四海則天下幸甚同上節要三書吕公著邇英侍讀講論語畢上奏曰陛下睿哲之性出于天縱而復內禀慈訓日新大學誠以堯舜三代為法則四海不勞而治將來論語終帙進講尚書二書皆聖人之格言為君之要臣輒于其中及孝經內節要語共一百段進呈便于省覽或遊意筆硯之間以備揮染亦日就月將之一助也家𫝊條上十議見前以聰明注論經筵三事伊川召對上奏丨丨丨丨丨一上富春秋輔養為急二左右內侍宫人皆選老成重厚三請令講官坐言行録著聖覽十卷丁度傳度字公雅兼侍讀在經筵仁宗呼為學士而不名嘗問以蓍龜占應事對曰不若以古之治亂為蓍龜也仁宗出欹器以示之曰朕欲臨天下以中正對曰臣亦願以中正事陛下丨邇英丨丨丨丨龜鑑精義十三卷慶厯兵録五卷編年總録八卷事略讀唐書一𫝊天禧舊制凡侍臣皆賜坐講者别設本于前侍讀初無所職但侍立而已耳自宋綬夏竦為侍讀始令日丨丨丨丨丨參釋義理會要進唐書二條蘇頌兼侍讀奏言國朝典章大抵沿襲唐舊乞詔史官學士采録新唐書中臣主所行日進數事以備聖覽遂詔經筵官遇非講讀日丨丨故丨丨丨公每有所進可為規戒有補時事者必述以己意反復言之言行録録太宗帝範宋綬字公垂為翰林學士兼侍讀遂丨唐謝偃惟皇戒德武孝經論語節要唐丨丨所撰丨丨開元臣僚所獻政典君臣正理論上之事略進祖禹帝學鄭丙字少融淳熙中兼侍讀取陸贄議奏切時者反覆開陳丨司馬光五規范丨丨丨丨資隱覽同上讀蘇秦約從司馬溫國文正公遷侍讀學士進讀通鑑至丨丨丨六國丨事先曰秦儀為從橫之術多華少實無益於治此謂利口之覆邦家者也言行録論黃帝無為史衛國公浩字直翁淳熙中除醴泉觀使兼侍讀浩嘗讀正心篇丨丨丨丨丨天下治上曰所謂無為者豈燕安無所事事之謂乎同上御延義賜宴崇政殿西有延義閣南向迎陽門之北有延英閣東向皆講讀之所仁宗初丨丨丨每初講論或講讀終篇則宣二府大臣同聼賜飛白書或丨丨其後專御邇英也東齊記事知徐州賜宴吕溱以侍讀學士丨丨丨仁宗特丨丨資善堂遣使諭曰此會特為卿設可盡醉也仍詔自令由經筵出者為例神宗實録薦三十三人樞密直學士陳襄在經筵曰嘗論丨當世之士自司馬溫公而下丨丨丨丨最後言鄭俠小臣愚直敢言如此是亦發於忠義非陛下矜憐其志而使得生還誰復為俠言者言行録薦一十五人史浩除少保大觀文醴泉觀使兼侍讀進讀三朝寶訓及真宗正說事關治體及當法祖宗者必委曲援引開廣上心引陳襄故事薦石斗文等五人皆召赴闕再兼侍讀又丨薛叔似等丨丨丨丨叔似召用餘以次收擢同上言外戚不預政陳正獻公俊卿兼侍讀會錢端禮起戚里秉政駸駸入相館閣之士相與上疏斥之皆為所逐公進讀寶訓適及外戚事公極丨本朝家法丨丨丨丨丨最有深意上首肯久之端禮卒不相誠齊集論日食本惡念張九成在經筵一日丨丨丨曰日食之變本於惡氣之萌惡氣之萌丨於丨丨之起上聳然曰誠在朕念慮間當為卿戒之他日上謂近臣曰朕於張九成所得甚多絲年録反覆治亂之際蘇軾侍讀至治亂盛衰邪正得失之際未嘗不反覆開道上雖恭默不言聞所論輒肯首善之墓志反復兵民之意蘇頌言吾在金華每進讀至弭兵息民則必丨丨使上不忘弭丨息丨丨丨以謂人主之聰明不可有所嚮有所嚮則偏偏則為患大矣談訓侍講歷代㳂革漢顯宗時張酺數侍讀于御前張酺侍靈帝以楊賜有重名舉賜侍講于華光殿中又召劉寬拜太中大夫侍講華光殿劉寬傳雖有侍講之號而未以名官至唐開元十三年始置集賢院侍講學士詳見侍讀門本朝真宗咸平二年國子祭酒邢昺為侍講學士其後又有馬宗元為侍講不加别名但供職而已會要景德四年以翰林侍講學士邢昺知曹州侍讀學士外使自昺始焉續會要元豐以後官制通見侍讀門故事自兩省臺端以上並兼侍講元祐中司馬公休以著作佐郎兼侍讀時朝議以文正公之賢故特有是命朝野雜記紹興五年范元長以宗卿朱子發以祕少並兼蓋殊命也乾道六年張敬夫始復以吏部員外郎兼蓋中興後庶官兼侍講者惟此二人若紹興二十五年張扶以祭酒隆興二年王宣子佐以檢正乾道七年林景度以宗卿入經筵亦兼侍講者蓋扶本以言路兼說書就升其秩宣子時攝版曹景度嘗為右史且有敬夫舊例故稍優之皆有以也朝野雜記事類講經宣帝甘露三年詔諸儒丨五丨同異蕭望之等平奏其儀帝親稱制臨决本前紀論藝宣帝纂修決業亦講丨六丨招選茂異而蕭望之梁丘賀夏候勝等以儒術進公孫𢎞等贊守義顯宗永平四年置五經師張酺以尚書教授數講於御前酺為人質置丨經丨每侍講間隙數有匡正之辭後漢史張酺傳明經桓榮光武拜為博士車駕幸太學會博士難於前榮辨丨丨義每以禮讓相厭不以辭長勝人特加賞賜愈見敬厚常令止宿積五年榮薦門下生胡憲侍講乃聼得出旦入榮嘗病朝夕遣問後病愈復入侍講後桓榮傳通書楊賜靈帝嘗授學詔選丨尚丨宿有重名者三公舉賜乃侍講于光華殿中後本傳講經劉寬靈帝初拜太中大夫侍講光華殿賜衣一襲帝頗好學藝每引見寬常令丨丨後本傳侍帝幕孟侯經傳丨言丨丨後張酺傳贊入講帷楊秉以明尚書丨勸講拜太中大夫以病乞退黃瓊上言秉勸丨丨幄不宜外遷注勸講猶侍講也本傳屢諫正肅宗常言張酺入侍講丨有丨丨誾誾惻惻出於誠心可謂有史魚之風矣後張酺傳常謙虛楊東威帝即位以明尚書徴入勸講邊韶議奏秉儒學侍講丨在丨丨後本傳白虎觀賈逵班固並校祕書肅宗好古文尚書左氏傳入講丨丨丨南宫靈臺後賈