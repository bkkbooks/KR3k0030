body:
  text: 古今合璧事類備要前集卷五十二宋謝維新撰民事門耕稼事類菑畬一歲曰丨二歲曰新三歲曰丨爾雅耕耨漢武詔火丨水丨應劭曰曉草下水種稻益生因悉芟去復下水灌水草死獨稻長所謂火丨水丨也漢書良農丨丨不為水旱輟耕荀子惰農丨丨自安不昏作勞不服田畝盤庚舉趾三之日于耜四之日丨丨同我婦子饁彼南畝田畯至喜出毛詩豳七月興事農樣晨正天駟星也立春見於南畝以丨農丨國語有秋若農服田力穡乃亦丨丨盤庚無飢百畝之田勿奪其時數口之家可以丨丨孟子服襏襫先雨耘耨以待時雨時雨既至挾以搶刈耨鏄以旦暮從事於田野脫衣就功别苗莠列疏遬首戴茅蒲身丨丨丨沾體塗足暴其髮膚盡其田肢之力此謂之農管子痔錢鏄命我衆人丨乃丨丨奄觀銍艾臣工詩注錢銚鏄耨田器也薅荼蓼其餉伊黍其笠伊糾其鏄斯趙以丨丨丨荼蓼朽止黍稷茂止良耜納禾稼採荼薪樗食我農夫九月築場圃十月丨丨丨黍稷重穋禾麻菽麥毛詩抱甕占星編茅結草上漏下濕之悲桔橰丨丨丨丨望雲之勞負薪蒸以耕耘徯一餉而不至者之苦舉債於豪右結一為五者之寃農之為農亦良苦矣決渠降雨提封五萬疆埸綺紛溝塍刻鏤原隰龍鱗丨丨丨丨荷插成雲五榖垂穎桑麻敷芬西都賦耕耘種藝子路問於孔子曰有人於此丨丨丨丨手足胼胝以養其親然而無孝之名何也荀子鹵莽滅裂長梧封人問子牢曰昔豫為禾耕而丨丨之則其實亦鹵莽而報豫藝滅裂之其實亦丨丨而報豫來年深其耕而熟擾之其禾繁以滋豫終年厭飱莊子后稷教藝丨丨丨民稼穡樹藝五穀樊遲學稼丨丨請丨丨子曰吾不如老農論語耦耕辟士長沮桀溺丨而丨孔子過之使子路問津焉長沮曰是知津矣問於桀溺桀溺曰云云與其從丨人之丨也孰若從辟世之士哉耰而不輟語微子荷蓧丈人子路從而後遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子植其杖而藝止子路宿殺雞為黍而食之見其二子焉同上樂道莘郊伊尹耕于有萃之野以樂堯舜之道躬耕壠畝諸葛亮丨丨丨丨好為梁父吟敬饋如賔晉冀缺耨其妻饁之相敬如賔晉侯曰能敬必有德以為下軍大夫左傳輟耕言志陳勝宇涉少時嘗與人傭耕輟耕之壠上悵然曰茍富貴無相忘傭者笑勝曰嗟乎燕雀安知鴻鵠之志哉出史書歷山遜畔舜耕歷山丨丨之人皆丨丨死葬蒼梧有羣象常為之耕帝王世紀兔園遺冊馮道本田家狀貌質野朝士多笑其陋道入朝任贊劉嶽在後道行數步反顧贊問嶽何為嶽曰遺下兔園冊爾兔園冊者鄉校俚儒教田夫牧子之所誦也故嶽舉以誚道道聞之大怒遷嶽祕書監劉嶽傳羔酒自勞楊惲與孫㑹宗書曰臣之得罪已三年矣田家作苦嵗時伏臘烹羊炮丨斗丨丨丨家本秦也能為秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊缶而呼烏鳥其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時豚蹄禳田淳千髠滑稽多辨齊威王八年楚伐齊齊使髠之趙請救齎金百斤車焉十駟髠仰天大笑冠纓索絶王曰先生少之乎髠曰臣今者從東方來見道傍禳田者操一豚蹄酒一盂祝曰甌寠滿篝汙邪滿車五穀皆熟穰穰滿家臣見其所持者狹所欲者奢故笑之齊王乃益黃金千鎰白璧十雙車馬百乘髠至趙豫精兵十萬楚聞之引去注篝籠也汙邪下地田也負郭有田孔子曰回家貧胡不仕對曰回有郭外之田五十畝足以給飦粥郭內之田十畝足以為絲麻回不願仕又蘇季子曰吾若有雒陽負郭二頃田安能佩六國印乎殖貨買田張禹內丨丨財及富貴多丨丨至四百頃皆涇渭灌溉極膏腴自耕而食徐稚嘗自耕稼非其力則不食本傳苦饑常勤陸龜蒙有田數百畝屋三十楹田苦下雨潦則與冮通故常苦飢身畚插茠刺無休或譏其勞答曰堯舜徵瘠禹胼胝彼聖人也吾一褐衣敢不勤乎陸文詩集牧牛草肥朝牧牛桑緑晚鳴鳩闕花篘引戊南坡下春蔬和雨割仕酒向去篱邊有小舟鄭谷放犢田家無五行水早卜蛙聲牛犢乘春放兒孫候曖耕池塘烟未起桑柘雨初晴嵗晚香醪熟村村自送迎章孝標飯牛蒲葉日以長荷花日以滋老農要看此貴不違天時迎晨起丨丨雙駕耕東菑蚯蚓土中出田鳥隨我飛羣合亂啄噪嗷嗷如道飢我心多惻隱顧此兩傷悲發食飼田鳥日暮空筐歸親戚更相誚我心終不移儲光義田家書倩飲犢無雨衆卉新一雷驚蟄始田家幾日間耕種從此起丁壯俱在野場國亦就理歸來景常晏丨丨西澗水饑劬不自苦膏澤且為喜君廪與宿儲徭役獨未已方慚不耕者祿食出閭里韋應物詩種黍歌元豐十日五日一雨風麥行千里不見土連山沒雲皆丨丨水秧綿綿復多稌籠骨長乾掛梁柖鮒魚出網蔽洲渚荻笋肥甘勝牛乳百錢可得酒斗許雖非社日長聞鼓吳兒踏歌女起舞但道快樂無所苦老翁塹水西南流楊栁中間􅍻小舟桑興欹眠過日下逢人歡笑得無愁王介甫餉田舊穀行將盡良田米可希老年方愛粥卒嵗且無衣雀乳青苔井雞鳴白板扉柴車駕贏牸草屩牧豪豨多雨紅榴拆新秋緑芋肥丨丨桑下憩傍舍草中歸住處名愚谷煩君問是非荷鋤斜陽照墟落窮巷牛羊歸野老念牧童倚杖候荆扉雉雊麥苖秀蠶眠桑葉稀田夫丨丨至相見語依依即此羡間逸悵然歌式微王維負杖歸來物外情丨丨閲岩耕源水看花入幽林採藥行野人相問姓山鳥自稱名去去獨吾樂無能愧此生宋之問椎鼓鬲田二陵接山青傍水低田緑未耕桃杏滿村春似錦踏歌丨丨過清明范至能踏車下田水出江流髙壠翻江逆上溝地勢不齊人力盡丁男長在丨丨頭同上蒸梨稹雨空林烟大遲丨丨炊黍餉東菑漠漠水田飛白鷺隂隂夏木囀黃鸝山中習靜觀朝槿松下清齊折露葵野老與人爭席罷海鷗何事更相疑出王維詩煮菜夫因兵死守蓬茅麻苧裙衫鬢髮焦桑柘廢來猶納稅田園荒盡尚徵苗時桃野菜和根煮旋斫生柴帶葉燒任是深山更深處也應無計避征徭杜筍鸖種粟春丨一粒丨秋成萬顆子四海無間田農夫猶餓死李申詩糶谷父耕原上田子斸山下荒六月禾未秀官家已修倉鋤田日當午汗滴禾下土誰念盤中飱粒粒皆辛苦二月賣新絲五月丨秋丨醫得眼前瘡剜却心頭肉我願君王心化作光明燭不照綺羅筵只照逃亡屋索租鳩婦勃磎農荷鉏身披襏襫頭茅蒲雨不破塊田拆國稊稗青青佳祋枯大婦碓舂頭鬢踈小婦拾檖行餉姑四時作苦無袴襦門前叫嗔官丨丨洪駒父田家謡輸稅老翁家貧在山住耕種山田三四畝苗疏移多不得食輸入官倉化為土嵗暮鋤犁倚虛室呼兒登山收橡實西江賈客珠百斛船中養犬常食肉張籍說年稔縣官清且儉深谷有人家一徑入寒竹小橋穿野花碓喧春澗滿梯倚緑桑斜自丨丨來丨前村酒可賒鄭谷願官清古今利名路只在儂門前至老不離家一生常晏眠牛羊晚自歸兒童戲野田豈思封侯貴惟只待豐年征賦不辭苦但願時官賢時官茍貪濁田舍生憂煎王貞白務稼穡梧桐隂我門薜荔綱我屋迢迢兩夫婦朝出暮還宿稼穡既自務牛羊還自牧日旰懶耕鋤登髙望川陸空山足禽獸墟落多喬木白馬誰家兒聮翩相馳逐儲光羲共糗糒楚山有髙士梁國有遺老築室既相鄰向田復同道糗糒常供飯兒孫每更抱忘此耕耨勞愧彼風雨好蟪蛄鳴空澤鶗鴂生秋草日夕寒風來衣裳苦不早儲光羲分畦浪翻翻聮聮銜尾鴉犖犖確確脫殼蛇丨丨翠丨走雲陳刺氷緑針弘稻牙工夫不忿老農泣喚取阿香推雷車東坡水車詩灌稻泉種茶岩接紅霞塢丨丨丨生白石根皤腹老翁眉似雪海棠花下戲兒孫膝白田中啼鳥南村北村雨一犁新婦餉姑翁哺兒丨丨丨丨自四時催人脫袴著新衣著新替舊亦不惡去年租重無袴著山谷枝外鳴鳩緑楊髙下映平川賽罷田神笑語喧丨丨丨丨春雨歇屋頭初日杏花繁歐陽修蠶桑事類勸蠶季春之月后妃躬桑禁婦女母觀省婦使以丨丨事蠶事既登分繭稱絲效功以共郊廟之服月令浴種質掌質馬禁原蠶者注原再也天文辰為馬蠶書蠶為龍精月直大火則丨其丨是蠶與馬同氣物奠能兩大禁再蠶者為傷馬故禮夏官條桑蠶月丨丨取彼斧箋以伐逺揚倚彼女桑女執懿筐遵彼微行爰求桑桑詩七月具筥季春之月命野虞無伐桑柘戴勝降于桑丨曲植籧丨月令八績南陽郡一嵗蠶丨丨孫皓傳三熟元宗天寶中益州獻丨丨蠶三起食桑而吐絲前亂而後治夏生而惡暑喜溫而惡雨蛹以為母蛾以為父三俯三起事大乃已是之謂蠶理荀蠶賦四熟尹思正為青州刺史治州有績蠶至嵗丨丨黜陟使路敬潛至部嘆曰是非善政致祥乎表言之惠史蠶室天子諸侯必有公桑丨丨近川而為之三宮之夫人世婦之吉者使入蠶于蠶室奉浴種于川桑于公桑瞻印注繭館漢元帝王皇后為太后幸丨丨率皇后及列侯夫人桑也蠶室神吳縣張成見一婦人立宅東南角謂成曰此地是君丨丨我即地丨正月半日可作白粥泛膏於上以祭之當令君家蠶葉百倍言訖而去成如其言大得蠶續齊諧記馬頭娘蜀之先有蠶叢帝又髙辛時蜀有蠶女不知姓氏父為人所掠惟所乘馬在女念父不食其母因誓於衆曰有得父還者以此女嫁之馬聞其言驚躍振迅絶其拘絆而去數日父乃乘馬而歸自此馬嘶鳴不肯齕母以誓衆之言告父父曰誓於人不誓於馬安有人而偶非類乎能脫我於難功亦大矣所誓之言不可行也馬跑父怒欲殺之馬愈跑父射殺之曝其皮於庭皮蹶然而起卷女飛去旬日皮復棲於桑上女化為蠶食桑吐絲成繭以衣被於人間一日蠶女乘雲駕此馬侍衛數千人謂父母曰太上以我自心不忘義授以九宫仙嬪矣無復憶念也今家在什邡綿竹德陽三縣界每嵗祈蠶者四方雲集蜀之風俗宮觀諸化塑女像披馬皮謂之丨丨丨以祈蠶馬圖經苑窳氏祭先蠶以少牢注漢舊儀曰春蠶生而皇后親桑於苑中蠶室養蠶千薄以上祠以中牢羊豕祭蠶神曰丨丨丨婦人寓氏後禮儀志宿瘤女齊閔王遊東郭百姓盡觀丨丨丨採桑如故王怪問之對曰受父母教採桑不受教觀大王王恱聘以為后列女傳五畝之宅丨丨丨丨樹牆下以桑匹婦蠶之則老者可以衣帛矣孟子十畝之間丨丨丨丨兮桑者間間兮十畝之外兮桑者泄泄兮詩詩集三眠吳地桑葉緑丨丨蠶正熟李白詩又織婦何太忙蠶經三卧行欲老元稹詩重緑繅成白雪桑丨丨王荆公美女採桑岐西路丨丨妖且間文選越婦丨丨未織作吳蠶始蠕蠕李賀詩採桑女秦地羅敷女採桑緑水邊李白詩又羅敷善採桑採桑城南隅青絲為籠繩桂枝為籠鈎出古詩拜簇婦蠶欲老箔頭作繭絲皓皓場寬地髙風日多不向中庭聮蒿草神蠶急作莫悠揚年老為爾祭神桑但得青天不下雨上無蒼蠅下無鼠新婦拜簇願繭稠女灑桃漿男打鼓三日開箔雪團團先將新璽送縣官已聞鄉里催織作去與誰人身上著王建蠶簇詞工匠事類飭材天官太牢五曰百工丨化八丨執藝工丨丨事以諫尚書工師為巨室則必使丨丨求大木工師得大木則王喜以為能勝其任矣匠人斫而小之則王怒以為不勝其任矣孟子巧匠不善為斫血指汗顔丨丨旁觀縮手袖間韓文梓人京兆尹將飾署委羣材會衆工或執斧斤或執刀鋸丨丨左持引右執杖而中處焉量棟宇之任視木之能舉揮其杖曰斧彼執斧者奔而右顧而指曰鋸彼執鋸者趍而左俄而斤者斫刀者削皆視其色俟其言莫敢自斷者其不勝任者怒而退之亦莫敢愠焉畫宫於堵盈尺而曲盡其制計其亳釐而構大厦無進退焉既成書於上棟曰某年某月某日某建則其姓字也凡執用之工不在列余圜視大駭然後知其術之工大矣出栁梓人傳匠氏大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其宜以成屋室者丨丨之工韓文鈎繩般倕棄其剞劂兮王繭也爾投其丨丨注剞劂鑿鈎曲尺繩以凖直甘泉賦墨斗審方面勢覆量髙深逺近算家謂之專術專文象形如繩木所用丨丨也筆談朴斫若作室家既勤垣墉惟其塗暨茨若作梓材既勤丨丨惟其塗丹雘梓材毁畫彭更曰有人於此丨瓦丨墁其志將以求食也則子食之乎曰否曰然則子非食志也食功也滕文成方圎公輸子之巧不以規矩不能丨丨丨職尋引裝封叔之第在光德里有梓人欵其門願傭隙宇而處焉所丨丨丨規矩繩墨家不居磨斷之器問其能曰吾善度材視楝宇之制髙深圓方短長之宜吾指使而羣工役焉栁梓人傳得手應心齊桓公讀書輪扁斷輪於堂下曰臣丨丨丨丨莊子卷術默智夫繩墨誠陳規矩誠設髙者不可抑而下也狹者不可張而廣也由我則固不由我則圯彼將樂去固而就圯也則丨其丨丨其丨悠爾而去不屈吾道是誠良梓人耳運斤成家郵人堊漫其鼻端若蠅翼使匠石斷之匠石丨丨丨丨聽而斷之盡堊而鼻不傷莊子鑿械挈水子貢見丈人為圃子貢曰有械於此丨木為丨丨丨若神其名為橰圃者笑曰有機事者必有機心吾羞不為也莊子造梯設戰公輸般為髙雲梯欲以攻宋墨子聞之自魯往裂囊睘足日夜不休十日十夜而至于郢見楚王曰聞大王將攻宋有之乎王曰然墨子曰請令公輸般設攻宋之具臣請城守之於是公輸般設攻宋之計墨子縈帶守之公輸般九攻之而墨子九却之不能入遂輟兵陳琳傳解帶為城以箸為械削鐻猶神梓慶丨木為丨見者驚丨鬼丨魯侯問其術對曰臣將為鐻未嘗敢以耗氣齊七日忘吾四肢然後入山林觀天性區别見成鐻然後加手縛草為舞師偃周穆王時人丨丨丨人使之丨又作木人以手招王美人王怒殺師偃六帖刻木為御魯班為母作木人為御機闕一發遂去不還論衡撰成木經都料預浩工於造塔每卧則交手於胸為結構之狀如此逾年丨丨丨丨三卷行于世歸田録和顧匠徒襲延齡大搜市㕓逮捕匠徒迫脅就工號曰敕索弗讎其直名曰和顧弗與之庸商賈事類龍斷古之為市者以其所有易其所無者有賤丈夫焉必求丨丨而登之以左右望而罔市利故從而征之征商自此賤丈夫始矣孟子駔􅀈丨丨注會二家交易也駔者其首率也貨殖傳藏市商賈皆欲丨於王之丨行旅皆欲出於王之塗孟子通物商之言商也商其逺近丨四方之丨以聚之也賈者固也固物以待民來求其利也白虎通貿絲氓之蚩蚩抱布丨丨毛詩販糴諺曰百里不販樵千里不丨丨居之一嵗種之以穀十嵗種之以木百嵗來之以德德者人物之謂也今有無秩祿之奉爵邑之入而樂與之比者謂之素封衣食之欲恣所好美矣貨殖序列肆市㕓所㑹萬商之川列隧百重丨丨巨千左太冲賦編户凡丨丨之民富相什則卑下之伯則畏憚之千則役萬則僕物之理也夫用貧束富農不如工工不如商刺繡紋不如倚市門此言末業貧者資也貨殖序談智巷列千所羅居百族則能目語額瞬丨丨於尺寸之間窺窬於分毫之際晉成伯陽市賦聚貨神農氏作日中為市致天下之民丨天下之丨交易而退各得其所蓋取諸噬嗑易繫辭為主夫市日昃而市百旅丨丨朝市朝時而市商賈為主夕市夕時而市販夫販婦為主禮役貧富商賈或滯財丨丨轉轂百數廢居邑注或有所廢置有所居蓋居邑中以乘時射利也後食貨志販繒前漢灌嬰睢陽人本丨丨賣甕俗說有貧人止能辦販隻甕之資夜宿甕中心計曰此甕賣之若干其息已倍矣我得倍息遂可販二甕自二甕化而為四所得倍息其利無窮遂喜而舞不覺甕破小說得錢立本劉伯芻侍郎所居巷日有鬻餅者早過户必聞謳歌當壚召與萬錢令多其本曰取胡餅償之後過其户絶不聞歌聲呼至問曰何輟歌之遽乎曰本領既大心計轉粗不暇唱渭城矣南唐嘉話借財致富昔有周犨者家貧夫婦夜田天帝見而矜之問司命曰此可富乎司命曰命當貧有張車子財可以假之乃借而與之期曰車子生急還之田者稍富利及期夫婦輦其賄以逃同宿路傍逄夫妻寄車下宿夜生子問名於夫夫曰生車問名車子也從是所向失利遂貧困搜神記貨殖事類為利雞鳴而起孶孶丨丨者跖之徒也孟子言財或問子之治産不如用圭之冨曰吾聞市井相與丨則以丨為利患貧諺曰千金之子不死於市此非空言也故曰天下熙熙皆為市來天下穰穰皆為市往夫千乘之王萬家之侯百室之君尚猶患貧而况匹夫編户之民乎貨殖序附益季氏富於周公求也為之聚斂而附益之論語取豫觀時白圭當魏文侯時李克務盡地力而白圭樂觀時變故人棄我取人取我豫夫嵗熟取穀豫之絲漆璽出取布帛豫之食史記廢舉收利子貢好丨丨注廢舉停貯也物賤則買而停眝值貴則轉移丨丨也等千户封陸地牧馬二百蹄牛子蹄角千足羊水居千石魚澤中千足彘山居千章材安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘淮北常山已南河濟之間千樹荻陳夏千畝漆齊魯千畝桑麻渭川千畝竹及名園萬家之城帶郭千畝鍾之田若千畝巵茜千畦薑韭此其人皆與千户封君等是富給之資也貨殖致巨萬産范蠡浮海入齊變姓名自謂鴟夷子皮耕于海畔苦身戮力父子治産致數十萬齊人聞其賢以為相蠡喟然嘆曰居家則致千金居官則致卿相此布衣之極也乃歸相印散其財與知友鄉黨而懷其重寶間行以去止於陶以為此天下之中交易有無之路通為生可以致富矣自謂陶朱公復約要父子耕蓄廢居候時轉物逐什一之利居無何則致資纍巨萬越世家伎巧興利太公望封於營邱地潟鹵人民寡於是勸其女功極丨丨則人物歸之襁至而輻輳故齊冠帶衣履天下海岱之間斂袂而往朝焉貨殖傳勤儉致富漢張安世自以父子封侯在位太盛乃辭祿詔都內别藏張氏無名錢以百萬數安世身為公侯邑萬户然身衣戈綈夫人自紡績家僮七百人皆有手技是以能殖其貨富於大將軍光作書著録許然者濮上人也博學無所不通尤善計算嘗南游越范蠡畢身事之其書則有方物録著四方所出本傳執籌算計王戎性好興利廣收八方園田水碓周遍天下積寶聚錢不知紀極每自丨牙丨晝夜算丨常若不足女適裴貸錢數萬又而未還女後歸寧戎色不恱女遽還直然後乃歡從子將昏戎遺其一車求婚訖而更責取衣繫衆鑰漢吏部侍郎張允家資萬計而性吝不委妻子自繫衆鑰於衣下如環佩聲郭威入京師允匿佛殿藻井之上板壞而墜凍餒而卒續世說身障二簏阮咸傳初祖約性好財有詣約約料理物客至屏當不盡餘兩小簏以著背後傾身障之出貸收息王莽令市官收賤賣責賒貸豫民收息百月三注出百錢豫民用月收其息三錢也散資周施後漢祈像字伯式有資財二億家僮八百人像丨金帛丨産丨丨親疏或諫之像曰吾門户殖財日久今世將衰子又不才不仁而富謂之不幸牆隙而髙其崩必疾也智者聞之咸服焉鬼笑營方宋劉伯龍歷位九卿郡守貧窶尤甚常在家慨然將營什一之方一鬼在傍撫掌大笑伯龍嘆曰貧窮固有命乃復為鬼所笑也遂止父焚債券宋顧覬之子綽私財甚豐鄉里士庶多負債覬之禁不能止後誘出文券一大尉悉令焚之語逺近皆不復還綽慎歎彌日樊宏削券後漢丨丨其父重字君雲世善農稼好貨殖年八十餘終素所假貸人間數百萬遺令焚丨文丨債家皆慙爭往償之馮歡焚券孟嘗君使丨丨收債於薛歡至召取錢者殺牛置酒與期貧者取而燒之曰有君如此豈可負哉孟嘗君聞而怒召歡云云歡曰有餘者與期不足者終無以償焚無用之券捐不可得之虛計令薛民親君有何疑焉孟嘗君拊手而謝之生理有方田農拙業也而秦楊以甲一州掘冡奸事也而田叔以起博戲惡業也而桓發用之富行賈大夫賤行也而雍樂成以饒販脂辱處也而雍伯千金賣漿小業也而張氏纍萬灑削薄技也而郅氏鼎食濁氏以胃脯而連騎燖羊胃張里以馬醫而擊鍾倚頓以盬鹽起郭縱以冶鑄成業至於蜀卓苑孔齊之刀間公擅山川銅鐵魚鹽市井之人上爭王者之利下錮齊民之業皆蹈不軌奢僣之惡又况掘冡搏擊犯奸成富傷化敗俗大亂之道也貨殖傳市易立法熙寧間詔京師置丨丨務樞密使文彥博言市易司遣監官賣果實有失國體王安石曰惟陛下不殖貨利豈於稟實收數千緡息數以規利者直以細民久為兼并所苦故為丨丨耳長編漁者事類引魚善釣者丨丨于千仭之下餌香也吕氏春秋把釣吾本麋鹿情性强拘名利欲脫不能漢水澄明鱖魚正肥待得秋風凉冷吾當丨丨盡此林泉之意杜預書網罟筌罛漁之為事也有釣丨丨丨丨罶罩涔笱梁罨算􅩬銛之類尸子竿綸鈎餌聖人以道德為丨丨以仁義為丨丨投之天地間孰非其有哉張天下以為籠因江海以為罛又何亡魚失鳥之有乎淮南子因水教漁燧人之世天下多水故教人以漁其後堯使人水處者漁結繩為罔伏犧氏作丨丨而丨丨罟以佃以漁蓋取諸離繫辭雷澤遜居舜漁雷澤丨丨之人皆丨丨本紀魯棠矢魚公矢魚于棠又曰公將如棠觀魚者遂往陳魚而觀之非禮也公羊曰公如棠觀漁登來百金之魚而張之注云張綱羅也登來美大得也恥公去南面逺與人爭利便逺觀之隱五年渭濱漁鈎吕尚窮困年老隱於丨丨以丨丨奸周西伯西伯將獵卜之曰所獲非龍非彲非虎非羆所獲伯王之輔西伯獵果遇太公於渭之陽與語大恱曰自吾先君太公望子史久矣故號太公望載與俱歸立為師澤中羊裘後漢嚴光宇子陵少與光武同遊太學及帝即位光隱身不見帝令物色誘之後齊國言有一男子披半裘釣澤中帝疑其光備禮聘之後漢本傳漁父聽琴孔子休坐杏壇之上絃歌鼓琴有漁久下船而來以聽之莊子漁父辭劔伍子胥至江丨丨渡子胥既渡子胥解劒與父父丨不受央記烟波釣徒張志和居江湖自稱丨丨丨丨著𤣥真子以自號垂釣不設餌志不在魚也本傳江湖散人陸龜蒙髙放不喜交流俗不乘馬升舟設蓬席齎束書茶筆牀釣具往來時謂丨丨丨丨或號天隨子甫里先生自比涪翁漁父江上丈人巨緇為餌任公子為大鈎丨丨五十犗以丨丨蹲乎會稽投竿東海旦旦而釣期年不得魚已而大魚食之牽巨鈎䤾沒而下驚揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而暗之自浙河以東蒼梧以比莫不厭若魚者已而後世輕才諷說之徒皆驚而相告也夫揭竿纍趍灌瀆守鯢附其於得大魚難矣莊外物芒針為釣詹何楚人也以獨繭絲為綸丨丨丨丨剖粒為餌於百仞之泉引盈車之魚列子餌鮦以豚子思居衛衛人釣於河得鮦魚焉其大盈車子思問之曰鮦魚難得者子如何得之對曰吾一釣垂一魴之餌鮦過而弗餌更以豚之半體則吞之子思曰鮦雖難得貪以死餌士雖懷道貪以死祿孔叢子釣鯉得書吕望年七十釣於渭渚三日三夜魚無食者與農人言農人者古之先賢人也謂望曰子將復釣必細其綸芳其餌徐徐而投之無令魚駭望如其言初下得鮒次得鯉刳腹得書書文曰吕望封於齊望知當貴藝文類聚垂釣得璜周文王至磻溪見吕望文王拜之尚曰望釣得玉璜刻曰周受命吕佐尚書大傳太公釣於慈泉在磻溪吕氏春秋撒網得梭陶侃少時漁於雷澤嘗網得一織梭以掛于壁有頃雷雨自化為龍而去本傳得魚不賣宋王𢎞之性好釣上虞江有一處名三石頭𢎞之嘗垂綸於此經過者不識之或問漁郎丨丨賣否𢎞之曰亦不自得得亦丨丨取直如常魏任嘏字昭先遭兵亂家貧賣魚會官稅魚貴數倍嘏丨丨丨丨就盤垂餌左慈字元放廬江人少有神道嘗在曹公坐公曰今日髙會珍羞略備所少者吳江鱸魚為膾耳元放曰此可得也因求銅盤貯水以竿餌釣釣於盤中須叟引一鱸魚出會者皆驚舉網得魚十月之望步自雪堂將歸于臨臯二客從豫行歌相答客曰今者薄暮丨丨丨丨巨口細鱗狀似松江之鱸於是携酒與魚游於赤壁之下東坡後赤壁賦詩集散人江湖丨丨天骨竒短髮搔來蓬半垂手捉孤篁曵寒繭口誦太古滄浪詞人間所得好男女我見婦人留鬚眉奴顔婢膝直乞丐反以正直為狂癡所以頭欲散不散辨峩巍所以腰欲散不散佩陸離行散任之適坐散從傾欹語散空谷應笑散春容披衣散單腹便食散酸鹹宜書散忘簮履禽散虛籠池外物一以散中心散何疑不共諸侯分邑里不與天子專隍陴靜則守桑柘亂則逃妻兒金鑣紳帶未嘗識白刃殺我窮生為或聞藩勝負恩澤號令鐵馬如風馳大君年小丞相少當軸自請都旌旗興師十萬一日費不翅千金何以支祇今利口且箕斂何暇俯首哀惸嫠均荒補敗豈無術載在方䇿撑巇冰霜襦袴易反掌白簡諸郎殊不知江湖散人悲古道悠悠幸寄羲黃傲官家未識活蒼生拜賜江湖散人號陸龜蒙歌溪翁一邱之木其栖深也屋吾容不辱一溪之石其居平也席吾勞以息一竇之泉其音清也絃吾方在懸得乎人得乎天吾不知所以然而然先生辨而賡之曰采江之魚兮朝船有鱸采江之蔬兮暮筐有蒲左圖且書左瑟與壺夀歟天歟貴歟賤歟歌闋而去前人紫溪翁歌釣臺平生久要劉文叔不肯為渠作三公能令漢家重九鼎桐江波上一絲風釣舟江上往來人盡愛鱸魚美君看一葉舟出沒風濤裏范希文詩打魚綿州江水之東津魴魚鱍鱍色勝銀漁人漾舟沈大網截江一數百鱗衆魚常才盡棄却赤鯉騰出如有神潜龍無聲老蛟怒回風颯颯吹沙塵饔子左右揮霜刀鱠飛金盤白雪髙徐州秃尾不足憶漢隂槎頭逺遁逃魴魚肥美知第一既飽歡娛亦蕭瑟君不見朝來割素鬐咫尺波濤永相失杜甫觀打魚蒼江漁子清晨集設網提綱萬魚急能者操舟疾若風撑突波濤挺又入小魚脫漏不可紀半死半生猶戢戢大魚傷損皆垂頭屈强泥沙有時立東津觀魚已再來主人罷膾還傾杯日暮蛟龍改窟穴山根鱣鮪隨雲雷干戈兵革鬭未止鳯凰麒麟安在哉吾徒胡為縱此樂暴殄天物聖所哀同前義魚丨丨春岸濶此興在中宵大炬然如盡長船縛似橋深窺沙可數靜榜水無搖刃下那能脫波間或自跳中鱗憐錦碎當目訝珠銷迷大逃翻近驚人去暫遙競多心轉細得雋語時囂潭罄知存寡舷平覺獲饒交頭疑湊餌駢首類同條濡沫情雖蜜登門志已遼盈車欺故事飼犬驗今朝血浪凝猶沸腥風逺更飄蓋江烟羃羃回棹影寥寥獺去愁無食龍移懼見燒如棠名既誤釣渭日徒消客驚先賦篙工喜盡謠膾成思袔友觀樂憶吾僚自可捐戞纍何須强問梟韓愈招張功曹垂釣八月九月盧花飛南溪老人丨丨歸秋山入簾翠滴滴野艇依攬雲依依却把漁竿尋小徑間梳鶴髮對斜暉翻嫌田皓曾多事出為儲王定是非張志和扣船來往烟波非定居生涯簑笠外無餘間垂兩鬢任如鶴祇把一竿時釣魚月浦丨丨歌皎潔雨蓬偎岸卧蕭疏行人誤話金張貴笑指北邙邱與墟鄭谷停橈千里楓林烟雨深無朝無暮有猿吟丨丨靜聽曲中意好是雲山韶濩音元結欵乃曲撥棹村寺鐘聲渡逺灘半輪殘月落前山徐徐丨丨却歸灣浪疊朝霞錦繡翻出李夢符詩撑篙緑竹丨丨上小灘滿蓬秋色照人寒雨沾沙鷺毛毛雪風捲岩楓葉葉丹城山詩踏浪射鴨復射鴨鴨驚菰蒲頭儂是凊浪兒每丨清丨遊笑他鄉貢郎踏土稱風流獨斟小雨溪風卷釣絲瓦甌蓬底丨丨時醉來睡著無人喚流下前溪也不知杜荀鶴醉著萬里清江萬里天一村桑柘一村烟漁翁丨丨無人喚過午醒來雪滿船韓偓魚蠻子江淮水為田舟楫為室居魚蝦以為糧不耕自有餘異哉丨丨丨本非左袵徒連排入江住竹瓦三尺廬於焉長子孫戚施且侏儒擘水取魴鯉易如拾諸途破釡不著鹽雪鱗芼青蔬一飽便甘寢何異獺與狙人間行路難踏地出賦租不如魚蠻子駕浪浮空虛空虛未可知會當算舟車蠻子扣頭泣勿語桑大夫東坡拍浪兒銅斗飲江水手拍銅斗歌儂是丨丨丨飲則拜浪婆却踏小舟頭獨速舞短簔孟郊白頭翁白頭波上丨丨丨家逐船移浦浦風一尺鱸魚新釣得兒孫吹大荻花中鄭谷詩短褐翁窮秋漫漫䈴葭兩丨丨休休白髮丨范子歸來思狡兔吕公何意兆非熊漁收亥日妻到市醉卧冰痕船信風四海租庸人草草太平長在碧波中山谷詩一束書船頭丨丨丨船尾一壺酒新釣紫鱖魚旋洗白蓮藕陸放翁百尺綸丨丨絲丨直下垂一波才動萬波隨夜靜水寒魚不食滿船空載月明歸唐詩一曰華亭船子和尚偈云兩鬢髮屬玉雙飛水滿塘菰蒲深處浴鴛鴦白蔑滿棹歸來晚秋著蘆花一岸霜扁舟繫岸依林樾蕭蕭丨丨吹華丨萬事不理醉復醒長占烟波弄明月蘇養直白綸巾丨丨丨下髮如絲靜倚楓根坐釣磯中婦桑村挄葉去小兒沙市買䉴歸雨來尊萊流船滑春後鱸魚陛釣肥西塞山前終日客隔波相羡盡依依皮日休青蒻笠新婦磯頭眉黛愁女兒浦口眼波秋驚魚錯認月沉鈎丨丨丨前無箇事緑簑衣裏一時休斜風細雨轉船頭山谷桃花水西塞山前白鷺飛丨丨流丨鱖魚肥青蒻笠緑簑衣斜風細雨不須歸張志和栁花氊青草開時已過船錦鱗躍處浪痕圎竹葉酒丨丨丨有意沙鷗傍我眠建炎御製明細火扁舟小纜蘆花風四合青山暮靄中丨丨丨倚孤松但願樽中酒不空酌流霞無數菰蒲間藕花掉歌輕舉丨丨丨隨好處轉山斜也有孤村三兩家縱逺柂薄晚烟林淡翠微江邊秋月已明輝丨丨丨適天機水底間雲片片飛催短棹雪灑清江江上船一錢何有買江天丨丨丨去長川魚蟹來傾酒舍烟春水生鑑湖丨丨夜來丨幾疊春山逺更橫烟艇小釣絲輕釣得關中萬古名桃浪暖魚信還催花信開風光得得為誰來舒抑眼落梅腮浪暖桃花夜更雷小笠青簑水㴠微雨湛虛明丨丨丨丨未要晴明鑑裏縠紋生白鷺飛來空外聲清灣幽島丨丨丨丨住盤紆一舸橫斜得自如惟有此更與居從教紅袖泣前魚並御製獵者事類捷取獵捷也言以丨丨之亦曰狩獰獸也月令章句為獠宵曰丨丨注管子曰獵獠畢弋江東亦呼獵為獠爾雅除害春獵為搜夏獵為苗秋獵為獮冬獵為狩郭璞注搜為搜索取不任者苗為苗稼丨丨獮為順殺氣狩謂得獸取之無所擇皆為田丨丨之義爾雅充庖古者天子諸侯無事則歲三田一為乾豆二為賓客三為充君之庖無事而不田曰不敬田不以禮曰暴天物天子不合圍諸侯不掩羣獺祭魚然後漁入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田不麛不卵不殺胎不夭夭不覆巢禮記中林武夫肅肅兔罝施于丨丨赳赳丨丨公侯干城肅肅兔罝施于中林赳赳武夫公侯腹心毛詩上蘭行伍逄蒙列眥羿氏控弦皇車幽輵光純天地望舒彌轡翼乎徐至於丨丨移圍徙陳浸淫蹴部曲隊堅重各案丨丨壁壘天旋神扶電擊逄之則碎近之則破鳥不及飛獸不得過軍驚師駭刮野掃地揚雄校獵賦搜必以時文王搜田以時仁如騶虞則王道成也獵不失期魏文侯與虞人期獵且以飲酒樂天雨文侯將出左右曰今日飲酒樂天雨君將焉之文侯曰吾與虞人期獵雖樂豈不一會期哉乃往自罷之魏於是始强戰國䇿西狩獲麟魯哀公丨丨于大野叔孫氏之車子鉏商丨丨以為不祥以賜虞人仲尼觀之曰麟也然後取之左東都摶獸宣王㑹諸侯丨丨因田獵而選車徒焉田車既好東有甫草駕言行狩之子于苗選徒嚻嚻建旐設旄丨丨于敖詩車攻發􅘣殪兕既張我弓既挾我矢丨彼小丨丨此大丨吉日射麋格麟駕車千乘選徒萬騎畋於海濱列卒滿澤罘網彌山掩兔轔鹿丨丨丨丨射中獲多矜而自功出子虛獵賦袒裼暴虎鄭太叔丨丨丨丨獻于公所將叔無狃戒其傷女跪遇獲禽昔者趙簡子使王良與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良良曰請復之彊而後可一朝而獲十禽孟子獵得善言梁君出獵見白雁羣下彀弩欲射之道有行者梁君謂行者止行者不止白雁羣駭梁君怒欲射行者其御公孫龍止之梁君怒曰龍不與其君而顧他人對曰昔宋景公時大旱卜之必以人祠乃雨景公下堂頓首曰吾所以求雨為公也今必使吾以人祠乃雨將自當之言未卒而大雨何也為有德於天而惠於民也君以白雁故而欲射殺人無異於豺狼也梁君乃與龍上車歸呼萬嵗曰樂哉人獵皆得禽獸吾丨丨丨丨而歸莊子歸載老師西伯將獵卜之曰非龍非彲非虎非羆所穫伯王之輔於是果遇太公於渭之陽載與俱歸立以為師史書以兒從獵孫盛為庾公記室參軍從獵將其第三兒齊莊俱行庾公不知忽于獵場見齊莊時七八嵗庾公謂曰小兒亦復來乎應聲答曰所謂無小無大從公于邁矣與君言獵唐元宗獵渭濵召見姚崇帝曰公知獵乎對曰幼所習也臣年二十居廣成澤以呼鷹逐獸為樂少為獵師老而猶能帝恱與俱馳逐緩速如㫖本傳老麋哀請晋州刺史蕭至忠將以臘月畋遊有樵者於霍山見一丨丨丨丨於黃冠者黃冠曰若今滕六降雪㢲二起風則蕭君不獵矣薪者回未明風雪竟日蕭不復出幽怪録羣豕突前唐太宗獵於洛陽苑有羣豕突出林中上引弓四發殪四豕有豕突前及馬鐙民部尚書唐儉投馬摶之上笑曰天䇿長史不見上將擊賊耶何恨之甚對曰陛下神武豈復逞雄心於一獸乎上大恱為之罷獵石䖍拔箭晉相石䖍小字鎮惡在荆州於獵圍中見猛獸被數箭而伏諸將素知其勇戲令拔箭石䖍因急往拔得一箭猛獸跳石䖍亦跳髙於猛獸伏復拔一箭而歸從桓溫入闕威震敵人時有病瘧者謂桓石䖍來以怖之多愈秦巴放麑孟孫獵得麑使西秦巴持之其母隨而呼之西秦巴不忍而與其母孟孫適至求麑對曰余不忍而與其母孟孫大怒逐之居三月復召為其子傳曰夫子不忍麑又且忍吾子乎韓子詩集鷹疾風徑角弓鳴將軍獵渭城草枯丨眼丨雪盡馬蹄輕忽過新豐市還歸細柳營回看射鵰處千里暮雲平王維馬驟曉出鳯城東分圍淺草中紅旗開向日白丨丨迎風背手抽金鏃翻身控角弓萬人齊指處一鴈落寒空張祐古今合璧事類備要前集卷五十二
