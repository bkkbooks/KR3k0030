body:
  text: 古今合璧事類備要别集卷四十三宋謝維新撰果門瓜實格物總論瓜蓏也在地曰蓏數種皆蔓生甜瓜畦種之葉大數寸實亦徑尺許有稜白者斑斑黃暈黃者斑斑青暈肉白光潔瓤黃色核如米糝而匾七八月熟味甜香又一種純青大者徑四五寸長八九寸許肉亦帶微青色又一種一握而青耳長亦四五寸名曰握青此皆所謂瓜果者也它有所謂刺瓜布瓜稍瓜王瓜是謂瓜菜不在此數事類食瓜七月丨丨聚瓜委人掌丨丨禮地宜瓜瓞綿綿丨丨詩綿瓜緒瓞瓝其紹瓞注俗呼瓝瓜為瓞紹者丨蔓丨亦著子但小如瓞耳爾雅巾以絺為天子削瓜者副之丨丨丨注副披福反折也四折之也以巾覆焉記巾以綌為國君者華之丨丨丨注華中裂也音話不巾覆為大夫者纍之注纍倮也謂丨丨丨也纍力果反不中裂士疐之注丨丨丨橫斷去疐而已疐音帝庶人齕丨丨丨之注不橫斷並同上婦人贄丨丨之丨瓜桃李梅記內則祭尚環瓜丨丨丨食中棄所操環瓜頭也祭祭先記連稱戍齊侯使丨丨管至父丨葵丘瓜時而往曰及瓜而代本傳曽子藝丨丨丨瓜而誤斬其根曽晳怒大杖擊其背曽子仆地有頃乃蘇家語積石瓜丨丨山丨三年一熟白六帖硎谷瓜始皇密令種瓜於驪山丨丨中溫處丨實成使人上書曰瓜冬實有詔下博士諸生說之人人各異使往視之儒生皆至方相難不決因發機從上填之以土皆壓死史青門瓜邵平故秦東陵侯秦滅後為布衣種瓜長安城東瓜有五色甚美故世謂之東陵瓜又云丨丨丨青門即東陵蕭何傳朱陵瓜西王母謂上元夫人曰後造丨丨山食靈丨其味甚好憶此味已七千嵗矣漢武外傳玉井水洗五原蔡誕入山而還欺家人云至崑崙有玉瓜光明洞徹而堅剛須以丨丨丨丨即軟可食抱朴子酒杯土種馬湘有道術嘗於江南刺史馬植坐上冬月以丨丨盛丨丨瓜須臾引蔓生實食之甚美神仙傳見瓜得尸後漢曹娥父溺死娥丨丨浮而丨丨㑹稽志乞瓜定墓孫鍾富春人與母居至孝篤信種瓜為業忽有三年少來丨丨為鍾丨丨地出門悉化為白鶴而去幽冥録異本同蒂漢哀帝二年瓜丨丨丨丨共生一瓜時以為嘉瓜白帖六子一蒂李融為政得吏人有祥瓜生丨丨丨丨二莖一實晉王濬園生嘉瓜丨丨丨丨並同上種瓜以餉姚俊嘗丨丨菜灌園丨供衣食時人或餉一無所受吳録種瓜自給步隲避難江南單身窮困丨丨丨丨吳志盜瓜請罪晉桑虞家園瓜熟有人踰園丨之虞見園籬多棘刺使人為開道及盜負出見道通知虞使除之乃送瓜叩頭丨丨虞與之史分瓜相遺滕曇恭年五嵗母患熱病思食寒瓜土俗不産曇恭厯訪而不得俄遇一桑門曰我有雙瓜丨一相丨舉家驚異南史種瓜辦葬韓虞敏兄早孤並有孝性家貧無以營葬共丨半畝丨朝采暮又生遂丨丨事齊史悲昉投瓜梁任昉亡高祖方食瓜聞之投瓜悲不自勝史思杜輟瓜唐太宗食瓜美丨丨如晦丨其半使祭之史蠅集其上儒衡議論徑正有風節時元稹恃宦官知制誥儒衡鄙厭之㑹食瓜丨丨丨丨儒衡揮以扇曰適從何處來遽集於此一坐失色史兔逐無遺王𢎞義始賤時求傍舍瓜不與及為御史乃騰文言園有白丨縣為集衆捕丨畦蓏丨丨索錢得瓜明崇儼四月帝憶瓜崇儼丨百丨須臾以瓜獻曰丨之緱氏老人圃中帝召老人問故曰埋一瓜失之土中得百錢云唐史本傳以囊盛瓜李泌請以二月朔為中和節民間丨青丨丨丨果種相問遺謂之獻生子孔六帖牛糞覆棚契丹破回紇得此種以丨丨丨丨而種大如中國冬瓜而味甘可生食五代陷虜記喜子布網七月七日設瓜於庭中以乞巧有記丨丨丨丨於瓜上則為得巧嵗時瓜瓜一器陸贄帝幸梁道有獻瓜果者帝嘉其意欲授以官贄曰爵位天下之公器不可輕也今丨丨丨丨果一盛則授之彼忘軀命者何勸哉唐史獻瓜三蔓貞元四年夏右神䇿軍丨瑞丨丨丨合為一蒂而生三瓜舊唐書剖瓜傷指代宗皇后沈氏河南為史思明所沒失后所在德宗即位令咨訪高力士女嘗從后游年狀差似后嘗削脯哺帝傷左指高女亦丨丨丨丨史削瓜侵肉後周王羆嘗與客食瓜丨丨皮丨丨頗厚羆意慊之及瓜皮落引手就地取而食之客有愧色史斬瓜試劍南漢劉晟嘗夜飲大醉以瓜置伶人尚玉樓項拔劍丨之以丨丨因斬其首史饐瓜名亭吕文穆蒙正在龍門讀書一日行伊水上見賣瓜者意欲得之無錢其人遺一枚公悵然食之後作相買園洛城東南下直伊水起亭以丨丨為丨不忘貧賤也聞見録栁子嘉瓜表臣某等今日內出浙東觀察賈全所進越州山陰縣移風鄉百姓王獻朝園內産嘉瓜二實同蒂圖示百寮者寶祚維新嘉瑞來應式彰聖德更表天心臣某等誠慶誠賀頓首頓首伏惟皇帝陛下保合太和緝熙庶類德馨上達神化旁行嘉瓜發祥來自侯服質惟同蒂見車書之永均地則移風知化育之方始雖七月而食豳土歌王業之難五色稱珍東陵詠佳賔之㑹未聞感通若斯昭著者也臣某等遭逢聖運親仰珍圖抃躍之誠倍百常品無任慶悅之至詩集鉤帶昔聞東陵瓜近在青門外連畛距阡陌子母相丨丨阮籍澄徹丨丨甘瓜濯韓秋蒂丨瓜未落丨韓霜蔓丨丨縋寒瓜栁陽坡種丨丨可丨瓜杜青門學豈傍丨丨丨種瓜杜爛文貝瓜畦丨丨丨韓嚼水晶瓜丨丨丨寒杜沉玉甃翠瓜碧李丨丨丨杜黃臺下種瓜丨丨丨瓜熟子離離一摘使瓜好再摘使瓜稀三摘猶自可四摘抱蒂歸李泌作此救太子青門外事去人亡迹自留黃花緑蒂不勝愁誰能更向丨丨丨秋草茫茫覔故侯劉長卿思明哲暑軒無物洗煩蒸百果凡材得我憎蘚井竹籠浸蒼玉金盤碧筯薦寒氷田中誰問不納履坐上適來何處蠅此理一杯分付與我丨丨丨在東陵山谷嘗子母獨酌聖賢酒新丨丨丨瓜丁寧林下友莫道故侯家楊誠齊玉雙浮病骨那禁暑寒年更作愁有風依舊熱初伏幾時秋瓜葉誰新餉饞涎小忍休金盆井花水且看丨丨丨楊誠齊罌一搦風露盈籃至甘香隔壁聞緑圍丨丨丨白裂玉平分鮮甃開氷段梅山失火雲老夫供晚酌不用辨羶葷同上筠籠香發越瓜疇暑雨亂花飛美實蠲煩喜及時蘚井丨丨丨丨丨金刀玉手翠離披侯家昔見連阡盛貫肆徒誇厚貌竒珍重故人分小意臨風宛似對竒姿劉屏山襟雪沍清甘呼兒急走送筠籃敵暑惟應此物堪一握青瑶含秀潤滿丨寒丨丨丨丨搔園底用修鄰怨剪棘聊應益盜慚他日儻收餘瓣種離離虎掌遍山南前人木瓜格物總論丨丨按爾雅謂之㮊蜀本草云其樹枝狀如奈花作房生子形似栝蔞堅硬皮青肉白味甘酸入藥和氣火乾甚香事類報瓊瑶投我以木瓜丨之以丨丨詩木瓜見苞苴孔子曰吾於木瓜丨丨丨之禮行詩江袖出以獻唐元獻皇后思食酸味明皇以告張說因進經丨丨木瓜丨丨明皇雜録禁中所無崔涓守杭州湖上飲餞客有獻木瓜所未嘗有也有中使即袖歸曰丨丨丨丨宜進於上頃之解舟而去守懼得罪欲輟飲官妓作酒糾者白守某度木瓜經宿以委中流也㑹送者還云果潰亂弃之矣守異其言召問之曰此物芳脆易損必不能入獻守取香錦面賚之唐語林何承天木瓜賦為申州之嘉木王摩詰木瓜頌枯木無生物之理而布護滋蔓時果有常形之分而碩大殊尤杜牧祭木瓜神文維㑹昌六年敬告于木瓜山之神惟聰明格天能降雨出雲詩集酸楚客心自丨丨况對木瓜山李白望木瓜山榮耀金牛蜀路逺玉樹帝城春丨丨華堂裏逢迎缺主人劉禹錫藥品用百果各甘酸或由人所植木瓜聞衛詩贈好非玉色投此瓊瑶報蓋重車馬飾幸資丨丨丨少坐宣調力神土加文章中州異肥瘠梅聖俞紅粧面沉沉黛色濃糝糝金沙絢却笑宣州房競作丨丨丨范石湖日華沾液天下宣州花木瓜丨丨丨丨繡成花何須堠子强呈界自有瓊琚先報衙楊廷秀李實附來禽子嘉慶子人面子格物總論李實數種或朱或黃或緑或紫或班㸃大者如杯小者如雞卵核小味甘脆食之肉自離核熟之時自能吐核皆果中之珍也彼有且酸且澀且苦不足録矣又一種實大如小黃㼐色白如玉間以朱㸃三數又如纈狀食之其肉粘茹此來禽也事類三咽陳仲子居於陵三日不食井上有李螬食實者過半矣匍匐往將食之丨丨而後耳有聞目有見也孟子不言李將軍恂恂如鄙人死之日知與不知皆為流涕其忠誠信於士大夫也諺曰桃李丨丨下自成蹊此言雖小可以喻大李廣傳金李杜陵有丨丨述異記綺李上林苑有紫李青丨丨青房李西京雜記韓終琳國多生玉華李五千嵗一熟丨丨嘗食之亦名韓終李洞冥記朱仲房陵丨丨有李園三十六所閙居賦注龍血崔奉國家一種李肉厚而無核識者曰天罰乖丨必割其耳丨墮地生此李也琴莊美事鼠精王侍中家堂前有丨從地出其冗則生李樹花實俱好此丨丨李也好事集啖畢伐樹和嶠性至儉家有好李求之不過數十王濟俟其上直率少年詣園丨丨丨丨送一車枝與和公唯笑而已計核責錢和嶠諸弟往園中食李皆丨丨丨丨故嶠婦弟王濟伐之並語林恐人得種王安豐有好李常賣之丨丨丨丨常鑽其核世說多子必苦王戎字濬仲年六七嵗與羣兒戲於道側見李多實等輩競趨之戎獨不往或問其故戎曰李在道傍而丨丨丨丨李也取之果然晉書以李為首李直方第果品丨緑丨丨丨國史補見李思戒明宗不豫馮道入朝曰寢膳之間尤宜調謹因指御前果實曰如食桃不康他日丨丨丨丨瑣言洗之即軟五原蔡綖入山而還欺家人云到崑崙山有玉李形如世間者但光明洞徹而堅以玉井水丨丨丨丨可食抱朴子陸士衡賦中山之縹李晉傅𤣥賦潛實內結豐肌外盈翠質朱實形隨運成來禽速致此子青李來禽日給藤子皆囊盛為佳函封多不生足下所疏云此果佳可為致子當種之吾篤喜果今在田里惟以此故丨為丨丨丨則太惠也甘來衆禽來禽以味丨丨丨丨也洪玉父云名文林果紀王謹為曹州刺史有得之獻於王貢於髙宗似朱奈又名五色林檎上大重之賜王文林郎丨曰丨丨丨嘉慶子為京都美京都嘉慶坊有李樹其實甘鮮丨丨丨之丨故稱嘉慶子韋述西京記詩集沉朱實夏李丨丨丨謝元暉薦碧實氷盤夏丨丨丨脆韓退子沉不冷朱李丨丨丨前人輕籠熟丨丨丨李香杜中園實青玉冠西海碧玉彌外區他為丨丨丨其下成蹊衢色潤房陵縹味奪寒水朱梁沈約沉玉甃碧李翠瓜丨丨丨不整冠君子防未然不處嫌疑間瓜田不納履李下丨丨丨顔延年但整冠主人肝膽無猜忌果下遊人丨丨丨陶弼桃樹傍桃生露井上李生丨丨丨蟲來嚙桃根李樹代桃僵樹木自相代骨肉還相忘古歌詞筠根籠摘以丨丨丨沉以石根泉濛濛粉未落粲粲葉相連歐公來禽粧濃丨丨酒漸醺鄭谷右軍求丨丨好佳果墨帖丨來禽梅東城種丨丨先生未歸時自丨來禽與青李坡李扶踈朱丨丨丨禽自來坡李遮映粲粲來禽已著花芳根誰徙向天涯好看青丨相丨丨風味應同逸少家劉屏山雞子大甘露落來丨丨丨曉風凍作水精團西川紅綿無此色南海緑羅猶帶酸楊誠齊金彈丸枝上離離丨丨丨宜隨玉食薦金盤從來物以逺為貴酷愛閩溪荔子丹謝幼槃無風自落熟果丨丨時丨丨半腮近日鬪紅鮮蘇道嘉慶子把得欲嘗東都緑李萬州栽君子封題我手開丨丨丨丨先悵望與渠同别故鄉來白樂天人面子只今瘦似喜時能笑醉能歌眉映青山眼映波舊日美如潘騎省丨丨丨丨病維摩楊誠齊古今合璧事類備要别集卷四十三
