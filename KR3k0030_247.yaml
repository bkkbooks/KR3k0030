body:
  text: 古今合璧事類備要别集卷四十一宋謝維新撰果門梅子格物總論梅子大者如小兒拳小者如彈丸枝頭碧顆初熟帶胭脂色熟甚黃而隕凡數種一種貟小鬆脆多液無滓者名消梅一種結實多雙名重葉梅一種一蒂結雙實名鴛鴦梅又一種蠟梅亦生子者名狗蠅梅味酸甘噉之過多能使人齒弱人多用以煎造最耐久藏惟消梅不冝熟亦不耐日乾止堪青噉也事類燕食牛修鹿脯田豕脯麋脯麕脯皆有軒雉兔皆有芼爵鷃蜩范芝栭凌椇棗栗榛柿瓜桃李梅杏楂藜薑桂注自牛修至此三十則一物皆人君丨丨所嘉庶羞也記內獸用丨丨梅同上嘉卉山有丨丨侯栗侯梅乾䕩饋食之籩實丨丨注乾䕩梅也周禮籩人相和羮髙宗命傳說爰立作丨曰若作丨丨爾惟鹽梅書說命軍止渴魏武帝與丨士失道大渴而無水遂令曰前有梅林結子甘酸可以丨丨士卒聞之皆口中水出遂得及泉源世說食生梅孫亮方丨丨丨使黃門以銀碗併蓋就藏吏取其蔗餳黃門著鼠屎於餳中吳志食青梅五代趙康凝楊偓方宴丨丨丨康凝顧偓曰勿多食發小兒熱諸將以為慢仍貶康凝海陵取槁􅀢蕭倣拜嶺南節度使家人病丨丨丨於厨以和劑倣知趣市還之孔六帖􅀈浸佛桑民間以鹽梅丨丨丨丨花為紅漿投荔枝漬乾曝之色紅而甘酸可三四年而不蛀荔枝譜乾為􅀢虀梅暴丨丨臘羮丨丨中詩疏醋浸一瓶吳人多謂梅子為曹公以嘗望梅止渴也又謂鵝為右軍有士遺醋梅與燖鵝作書云丨丨曹公丨丨湯燖右軍兩隻筆談人致一斛范任能啖梅丨嘗丨丨丨奩留任食之須㬰而罄語林號落梅風江淮有梅雨丨為梅霪沾衣皆黦又有丨丨丨以為信丨風俗通謂迎梅雨夏至前雨名黃梅沾衣裳皆敗黦又埤雅載云今江湘二浙四五月間梅又黃落則水潤土溽柱礎皆汗蒸鬱成雨謂之梅雨故自江以南三月丨之丨丨五月謂之送梅也注黦黑有文也於勿於月二切周處風土記陳照食梅賦魏無林而止渴范留信以前嘗詩集半傳黃梅杏丨丨丨杜一抹腮天賜胭脂丨丨丨盤中磊落笛中哀雖然未得和羮便曾與將軍止渴來羅隱金酸子氷盤未薦丨丨丨坡帶葉枝丨丨連丨摘未殘依依茶塢竹籬間相如病渴應須此莫與文君蹙逺山山谷大幾分久雨令人不出門新晴喚我到西園要知春事深和淺試看青梅丨丨丨楊誠齊摘一枝紅雨班班竹外蹊黃金嫋嫋水邊絲降頭㨂遍低隂處帶葉青青丨丨丨前人消梅蒸豆作烏青莎徑裏香未乾黃鳥隂中實已團丨丨丨丨鹽作白屬同丹杏薦牙盤山谷磨錢和蜜北客未嘗眉自顰南人誇說口生津丨丨丨丨誰能許去蒂供鹽亦可人前人樂府一㸃著枝酸一聲羌管吹嗚咽玉溪半夜梅翻雪江月正茫茫斷橋流水香含章春欲暮落日千山雨丨丨丨丨丨吳妃先齒寒菩薩蠻孫濟師杏子格物藂話杏子葉似梅差大而微紅味香於梅而酸不及核與肉自相離其仁可入藥然世所見梅多杏少故其仁不易得也事類研為酪寒食丨杏仁丨丨以餳沃之玉燭寶典資為命嵩山有牛山其山多杏至五月爛然黃茂自中國喪亂百姓飢饉皆丨此丨丨人人充飽而杏不盡嵩山記孔子壇丨丨休坐杏丨之上莊子漢帝苑丨武丨上林丨有文杏西京雜記董仙林神仙董奉居廬山為人治病重者種杏五株輕者種一株於杏林中以杏一器換穀一器穀少者虎逐之乃以榖贍貧窮號丨丨杏丨神仙傳孫楚酪丨丨祭子推云飲一盤醴丨二孟今寒食有杏酪麥粥即其類也荆楚嵗時記以杏還主後周張元性廉潔南鄰有杏兩枝杏熟多落元園中元悉以還主饋杏封樹馬燧之子暢以第中大杏饋竇文場文場以進德宗德宗未嘗見頗怪暢令中使就封杏樹暢懼進宅廢為奉誠園唐史杏大如梨濟南郡之東南有分流山山上多丨丨丨丨黃如橘土人謂之漢帝杏亦曰金杏孔六帖詩集半黃梅杏丨傳丨半紅天暖酒易醺春暮花難覔意行到南園杏子丨丨碧輕風動髙枝可望不可折聳肩跂一足偶爾攀翻得攀條初亦喜折條還復惜小苦已自韻未酸政堪喫聊將插鬢歸空樽有餘瀝楊廷秀櫻桃格物總論櫻桃按爾雅名禊荆桃樹多隂先百果熟大如拇指圓而色朱味甜核如豆大每一朵不下一二十顆以鶯鳥所含故亦名含及也桃今有一種正黃明色者謂之蠟櫻味不事類以含桃薦仲夏之月天子羞丨丨丨先丨寢廟記月令取櫻桃獻漢惠帝出離宫叔孫通曰古者春嘗果方今櫻桃熟可獻願陛下出丨丨丨丨宗廟上許之漢書進以瑛盤後漢明帝於月夜宴群臣於園太官丨櫻桃丨赤丨為丨賜群臣月下視之盤與桃同色群臣皆笑云是空盤也漢書盛以琉璃帝命侍臣升殿食櫻桃並丨丨丨丨和以杏酪飲酴釄酒景龍記有櫻筍厨唐三月宰相丨丨丨丨時為最盛重櫻桃宴唐新進士尤丨丨丨丨托言內園奉三宫唐文宗即位因丨丨進櫻桃以丨丨丨又景龍文館記上與侍臣於樹下摘櫻桃恣食末後大陳宴席奏宫樂至暝人賜朱櫻兩籠青衣携一籠天寶初有范陽盧子赴東都下第嘗春暮遊僧舍有僧開講盧至講筵至精舍有丨丨丨丨丨櫻桃因與同餐青衣云娘子姓盧即盧子再從姑也盧即隨之盧夢為御史大夫為相經三十年却到昔逄携櫻桃青衣精舍門遂下馬升殿禮佛忽然昏醉聞講師云何久不起乃見衣著白衫服飾如故訪其僕云日已午矣異聞録蠟帛丸雜果中李希烈始入汴聞户曹參軍竇良女美强娶之嘗稱陳仙竒忠勇可用而妻亦竇姓願為娣姒以固其夫希烈許諾及希烈死其子不發喪悉誅諸將自立未决有獻含桃者竇請分遺仙竒因丨丨丨丨丨丨出所謀仙竒大驚率兵入斬之同上果品以為第三李直方第丨丨丨櫻桃丨丨丨國史補遺蕭頴士伐櫻桃賦天寶八載豫以前校理罷及降資廣陵大府軍事任在限外無舍是處寓居於紫極宫之道學館因領其秩職焉廟庭之右有大櫻桃樹髙纍數尋條暢薈蔚攢柯比葉擁蔽風景腹背微禽是焉栖託頡頏上下喧呼甚適登其喬枝則俯逼軒屏中外斯隔豫實惡之懼盜窺踰因是為資遂命伐焉警夫在位者耳古人有言芳蘭在門不得不鋤眷兹櫻之攸止亦在物之冝除觀其體異修直林非棟幹外森沉以茂密中紛錯以交亂先群卉以效諂望嚴霜以凋換綴繁英兮霰集駢朱實以星粲故當小鳥之所啄食妖姬之所攀玩赫赫閟宇𤣥之又𤣥長廊霞截髙殿雲搴實吾君聿修祖德論道設教之筵冝乎蒔以芬馥樹以貞堅匪夫松篠桂檜茝若蘭荃猗具美其在茲爾何德而居焉擢無庸之瑣質蒙本枝而自庇汨羣林而非據專廟庭之右地雖先寢之或薦豈和羮之正味每俯臨乎蕭墻奸回得而窺伺諒何惡之能為終物情之所畏於是命尋斧伐盤根密葉剝攢柯焚朝光無隂夕鳥不喧肅肅明明曠蕩乎階軒嗟乎草無滋蔓瓶不假器茍時挈而將逼雖見親而益忌譬諸人事也則晋吞并於僣沃魯出逐於强季綝峻擅而吳削倫冏專而晋墜其大者虎遷趙嗣鵉竊齊位由履霜而莫戒聿堅氷而洊至嗚呼乃終古覆車之軌轍豈尋常散木之足議詩集落紅珠殘櫻丨丨丨白樂天擎朱實倒流映碧叢㸃露丨丨丨梁簡文帝映絲籠赤墀櫻桃枝隱丨銀丨丨杜滿筠籠西蜀櫻桃也自紅野人相贈丨丨丨數回細㵼愁仍破萬顆勻圓訝許同憶昨賜霑門下省退朝擎出大明宫金盤玉筯無消息此日嘗新任轉蓬杜降紫宸清曉趍丹禁紅櫻丨丨丨驅禽養得熟和葉摘來新圓轉盤傾玉鮮明籠透銀內園題兩字西掖賜三臣熒惑精華赤醍醐氣味真如珠未穿孔似火不燒人瓊液酸甜足金丸大小勻偷須防曼倩惜莫擲安仁已懼長尸祿仍驚數食珍最慙因未報飽餵不才身白樂天照銀盤漢家舊種明光殿炎帝還書本草經豈似本朝承雨露共看傳賜出青𡨕香隨翠籠擎初重色丨丨丨㵼未停食罷自知無所報空然慙汗望皇扄韓愈被鶯含惜堪充鳯食痛己丨丨丨李啇隱充鳯食時節雖同氣味殊未知堪薦寢園無合丨丨丨留三島誰許鶯偷過五湖苦笋恐難同象栗酪漿無復瑩蠙珠金鑾嵗嵗長宣賜忍淚看天憶帝都韓偓鳥㗸殘才見寢園春薦後非關御苑丨丨丨歸鞍盡帶朱絲籠中使頻傾赤玉盤王維鳥偷飛丨丨丨處㗸將火人摘竒時踏破珠白樂天珊瑚叢磊落火齊珠參差丨丨丨劉原父火色具團於丨丨丨燦極日光珠西海瑶池苑曽城寶樹區楊文公丹更圓含桃丨丨丨輕質觸必碎外有千粒株中藏半泓水何人弄好手萬顆楊虛脆印成花鈿薄染作氷澌紫北果非不多此味良獨美同上文公云云光如濕櫻桃一雨半雕零更與黃鸝翠羽爭計㑹小風留紫脆殷勤落日映紅明摘來珠顆丨丨丨走下金盤不待傾天上薦新更分賜兒童猶解憶寅清同上樂府一種阿誰知雨後園亭緑暗時櫻桃紅顆壓枝低緑兼紅好眼中迷荔子天教生處逺風流丨丨丨丨丨最紅深處有黃􅀈院沙溪朝無咎萬顆㵼輕勻香浮乳酪玻瓈碗年年醉裏嘗新憤何物比春風歌唇一㸃紅野江湖清夢斷翠籠明光殿丨丨丨丨丨低頭愧人菩薩蠻蒲萄格物總論蒲萄按本草苗作藤蔓而極長大盛者一二本綿被山谷開花極細而黃白色其實紫白黑三色而形之圓鋭亦二種其汁可以釀酒一名馬乳或亦名水晶皆此物事類廣破大宛李丨利為二師將軍丨丨丨得蒲萄移歸漢孔六帖騫破西域西域蒲萄酒可至十年張丨丨丨丨還得蒲萄慱物志酒可十年上注家至千斛龜兹國胡人奢侈丨有丨丨丨蒲萄漢使取實來離宫别館旁盡種之異國志採蒲萄種大宛俗嗜蒲萄酒後漢因丨丨丨丨以歸植於宮館館傍令皆有之漢時種也同上設蒲萄酒西王母下帝丨丨丨丨漢武傳外斛遺張讓扶風孟他以蒲萄酒一丨丨丨丨拜凉州刺史續漢書燉煌張氏傳盤贈世宗李元忠贈世宗蒲萄一丨世宗報以白縑遺書曰忽惠蒲萄良愧仰荷聊以絹百匹以酬清德北史解酒宿酲蒲萄丨丨丨丨掩露而食甘而不䬼酸而不脆冷而寒味長汁多除煩解䬼又釀以為酒甘於麯米善醉而昜醒道逄固以流涎咽唾况親食之邪魏文帝詔賜食不舉陳叔逹嘗丨丨得蒲萄丨丨帝問之對曰臣母病渴求不能致願歸奉之子實逼仄蒲萄出於大宛張騫所致有黃白黑三種成熟之時丨丨丨雜爼房實磊落貝丘之南有蒲萄谷谷中蒲萄可就其所食之或有取歸者即失道世言王母蒲萄也天寶中沙門曇霄因遊諸嶽至此谷得蒲萄食之又見苦蔓堪為杖大如指五尺餘持還本寺植之遂活長髙數仞䕃地幅員十丈仰觀若帷蓋其丨丨丨丨紫瑩如墜時人號為草龍珠帳雜爼實大如卵磨鄰老勃􅀢嵗獻貴人蒲萄丨丨者丨雞丨孔六帖實大如棗蒲萄丨丨丨丨至熟時常取之或賜宫人伽藍記國多蒲萄西域有笯赤建丨丨丨丨孔六帖圡宜蒲萄西域焉耆國丨丨丨丨同上汝若不澀楊炎食蒲萄曰丨丨丨丨當以太原郡尹相授河東偹録始識其味太宗破髙昌收馬乳蒲萄種於苑中并得酒法仍自損益遂造酒成緑色芳香酷裂長安丨丨丨丨味兼醍醐南部新書果品第五李直方第丨丨蒲萄為丨丨國史補鍾士秀賦託靈根於𤣥圃植氓山之髙根左太冲賦蒲萄結䕃以蔓延而葉密故多隂又云若蒲萄之珍磊落蔓衍乎其間詩集珠顆露垂丨丨重日輝水晶明百氏集寶璫九月肅霜初熟時丨丨碌碌珠纍纍白樂天珠璣蹙野田生蒲萄纒繞一枝蒿移來碧墀下張王日日髙分岐浩繁褥修蔓蟠詰曲揚趐向庭柯意思如有屬為之立長架布護當軒緑米液溉其根理踈看滲漉繫葩組綬結懸實丨丨丨馬乳帶輕霜龍鱗躍初旭有客汾隂子臨堂瞪雙目自言我晋人種此如種玉釀之成美酒令人飲不足為君持一斗往取凉州牧劉禹錫鉛華膩魚鱗含宿潤馬乳帶殘霜染指丨丨丨滿喉甘露香醖成千日酒味敵五雲漿前人一縣熟丨丨蒲萄丨李白滿盤堆新莖未遍半猶枯髙架枝離倒若扶若欲丨丨丨馬乳莫辭接竹引龍鬚韓愈并架鱗甲蒲萄盤屈如修蛇春來蟄起行橫斜延之丨丨丨丨動舊梢粲粲生光華盤堆馬乳未敢望殷勤灌溉意匪他張文潜滿架龍鬚丨丨丨丨捲復伸堆盤馬乳釀青春潑醅一斗冝延客莫付凉州學漢人王梅溪向來馬乳凉州慱酒不勝癡銀海乘槎領得歸玉骨瘦來無一把丨丨丨丨太輕肥楊誠齊詠蒲萄乾如隔蝦鬚映日圓光萬顆餘丨觀寶藏丨丨丨夜愁風起飄星去曉喜天晴綴露珠宫女㨂枝模錦繡論絲持味比醍醐欲收百斛供春釀放出聲名壓駱奴山谷甘寒黑水晶才喜盤藤捲葉生又驚壓架暗成隂夏搴凉潤青油幕秋摘丨丨丨丨丨近竹猶爭一尺許拋鬚克骨兩三莖今年乞種江西去長是茅齊怯曉晴前人古今合璧事類備要别集卷四十一
