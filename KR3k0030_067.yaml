body:
  text: 古今合璧事類備要前集卷六十七宋謝維新撰墓地門壽藏事類取其遠壽藏謂冢墳也稱壽者丨丨乆丨之意漢書注知所息子貢倦於學告於仲尼曰願有所息仲尼曰生無所息望其壙睪如也宰如也墳如也鬲如也則丨丨丨矣荀子樂斯丘公叔文子升於瑕丘蘧伯玉從文子曰丨哉丨丨也死則我欲葬焉蘧伯玉曰吾子樂之則瑗請前注刺其欲害人良田記檀弓下歸於宅陶子將辭逆旅之館永丨丨故丨羞以嘉蔬薦以清酌淵明自祭文樹檟東門季孫為已丨六丨於蒲園丨丨之外欲自為櫬也左傳治塋平陵張禹年老自丨冢丨起祠堂好丨丨肥牛亭部處地又近延陵奏請求之上以賜禹為壽藏圖後漢趙跂漢帝時為太僕副太僕馬日磾撫慰天下歧老病留荆州就拜太常建安六年卒先自丨丨丨丨季札子産晏嬰叔向四像居賓位又自畫其象居主位皆為讃頌勅其子曰我死之日墓中聚沙為牀布簟白衣散髪其上覆以單被即日便下下訖便掩坎本傳定古葬地安定真善筭術成帝時真常自筭其年七十三至期果死又曰北邙青壠上孤檟之西四丈所鑿之七尺吾葬地也真死依言往掘得古時空槨即以葬焉西京雜記登臨得墓曹植登魚山臨東阿喟然有終焉之心遂營為墓遺令薄葬瞻望卜宅傳永字修期嘗登北邙山於平坵處奮矛躍馬回旋丨丨欲祔葬於祖墓遂買左右地數畝遺勑子叔偉此吾之永宅也酌酒賦詩唐司空圗豫為冡棺遇勝日引客坐壙中賦詩酌酒客或難之圖曰君何不廣耶生死一致吾寧暫遊此中哉設榻為寢李適勒其子曰霸陵原西視京師吾樂之可營墓樹十松焉及未病時衣冠往寢石塌上置所譔九經要句及素琴時士貴其逹盧照鄰預為墓偃卧其中自署寂居姚崇孫朂丨為壽藏於萬安山麓祖塋之傍兆曰丨丨冗墳曰復真堂中剟土為臺曰化臺新唐史預營繭室本朝王樵淄川人自號贅世翁預卜為􅐎名繭室中置石榻刻石其上曰生前投軀以虞不備没後寄魄以備不虞澠水燕談詩集鄭冡宻邇松楸地一隅㑹心何必問青烏亢宗雖愧鎮公子没世尚存先大夫京兆漢阡賢問望邢山丨丨舊規模家庭遺訓焄蒿在不學邠卿盡古圖范至能得夀蕆先壠旁感慨而作首丘家山隨處可松楸荷鍤擕壺似醉劉縱有千年鐵門限終須一箇土饅頭三輪世界猶灰劫四大形骸強丨丨螻蟻烏鳶何厚薄晚風拊掌菊花秋范至能重九行夀蔵墳墓附吉地凶地事類宅兆卜其丨丨而安厝之孝經墟墓丨丨之間未施哀於民而民哀檀弓樹槐天子墳髙三仭樹以松諸侯半之樹以柏大夫八尺樹以栾士四尺丨以丨庶人無墳樹以揚栁白虎通有草朋友之墓丨宿丨而不哭焉曲禮不登適墓丨丨壠不歌適墓丨丨並同上即逺葬於墓所以丨丨也檀弓永安窀穸既終丨丨體魄通鑑隂堂丨丨是夜古木非春楊盈川集神宅感慕之所丨䰟之丨呂才傳連堈丨丨隱幹狀如亂雲望之劌劌絶而復連小頓大起千里相牽壽過期頥世世登仙圖墓書潜闥窈窈𤣥宇三光不入丨丨一扄尊靈永蟄曹植誄牛岡丨丨得兆馬鬛將封栁集馬塋青烏升十白丨臨丨晏類要羡門丨丨盖冢中之門西京雜記神道墓門前開道建石柱以為梁乃謂之丨丨後漢中山王傳日月照臨於佳城煙雲變態於丨丨文粹大宵宅淪於無形之中其丨丨之丨淮南子長夜宮東首塋園即宮丨丨文選齊安陸碑一棺土生有七尺之形死有丨丨之丨淮南子萬鬼隣託丨丨之丨居千年之屋六帖螻蟻隣丨丨丨烏鳶食祭李商隱表狐兎宂雍門周以琴見孟嘗君曰臣切恐千秋萬嵗外墳墓生荆棘丨丨丨其中樵兒牧豎躑躅而歌其上行人見之愴悽曰孟嘗君之尊貴如何成此乎孟嘗君喟然歎息涙下承睫桓譚新論狐首丘太公封於營丘比及五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也馬鬛封孔子之喪有自燕來觀者舍於子夏氏子夏曰昔者夫子言之曰吾見封之若堂者矣見若坊者矣見若覆夏屋者矣見若斧者矣從若斧者丨丨丨之謂也今一日而三斬板而已封尚行夫子之志乎哉注封築土為壟斧形旁殺刃止而長孔子以為刃上難登狹又易為功馬鬛封俗間名也檀弓坎不至泉延陵李子長子死葬于嬴博之間其丨深丨丨於丨既葬而封廣輪揜坎其髙可隱也祥見葬類葬子事墓不生棘孔子葬魯城北泗上注云冡塋百畝冢塋中樹以百數皆異種魯人旡能名其樹者民傳言弟子異國人各持其方樹來種之塋中不生荆棘及刺人草孔子世家孔子當泗水而葬水為之却流下不衝其墓晏類要掛劔於樹李札將過徐徐君欲季子所佩劔口不言而色欲之季子以有上國之事未獻心已許之李子還而徐君死矣遂丨丨丨墓丨封墓於防孔子少孤不知具墓父鄒叔梁紇殯於五父之衢問於曼父之母然後得合葬於防曰吾聞之古也墓而不墳今丘也東西南北之人也不可以弗識也於是封之祟四尺檀弓宰木將拱秦伯襲鄭百里子與蹇叔子諫秦伯怒曰若爾之年者宰上之木拱矣公羊僖二十二年宰冢也拱可以手對抱墓檟可材子胥賜屬鏤死將死曰樹吾丨丨檟丨丨也吳其亡乎三年吳始弱矣左哀十一年下馬過墳膠西相董仲舒墳在長安人為致敬過者必丨丨名下馬陵後人語訛為蝦蟆非是西京雜記負土成塜楊子卒葬安陵坂上柏君山弟子侯芭丨丨作墳號曰𤣥冡家諜營墓旁地韓信葬母行營髙燥地令旁可置萬家者本傳買墓前田宋郭原平父母墳前冇數十畝田不屬原平每農月耕者祼袒原平不欲使人慢其墳墓乃貨家貲貴買此田三農之月輙束帶垂泣躬自耕墾佳城石槨漢滕公夏侯嬰死送葬至東都門外駟馬不行踣地悲鳴即掘馬蹄下得石槨其銘云丨丨欎上三千年見白日于嗟滕公居此室乃葬斯地謂之馬冡博物志與前卷葬類沈彬事略同古塜篆文見前葬類沈彬事布囊盛土范訓母亡以丨丨丨丨負以成墳謝承後漢書涕淚着樹晉王衰父儀為司馬文王所殺衰嘗至墓下拜跪悲號丨丨丨丨樹為之枯不知父墓杜羔父死河北丨丨丨丨晝夜哀慟它曰舍佛祠觀柱間有文字乃其父臨死記墓所在羔奔往亦有耆老識其壠因是乃得葬六帖趙矜歴㐮陽丞客死桞州十七年子來章始壯始求其喪不得野哭再閲旬卜人秦謝為筮曰金食其墨而火以貴其墓直丑在道之右南有貴神冡土是守宜遇西人深目而髯乃得其實明日有老人過其所問之得矜墓直社北遂歸葬同上求得母墓呂向少喪母失所在將葬巫者求得之一夕墳髙宗承宇世材父葬舊塋負土作墳不役僮僕丨丨之閒土壌自髙五尺松竹生焉萬日墳成韋温痬生於首謂其婿曰予作秘書日夢黄衣攝去道逢人告曰彼墳至大功須丨丨遂寤今萬日矣果不起過鳥泣墓後漢楊震將葬日有大鳥髙丈餘集喪前俯伏泣下葬畢飛去遂立鳥象於墓前孤燕尋墳宋末有女姚玉京室冇䨇燕一為鷙鳥所獲其一孤飛不離庭戸凡六七嵗玉京死燕來周回姚氏族泣語墳在南郭燕至墳所亦死燕銜墳土漢臨江王榮徵請中尉府自殺葬藍田燕數萬銜土置冡上百姓憐之鹿觸墓松晉許孜親殁負土成墳植松栢五六里時有丨丨其松㘽孜悲嘆曰鹿獨不念我乎明日怱見鹿為猛獸所殺置所㘽松下古冡得書晉太康二年汲郡人盗發魏襄王墓或云安釐王冡得竹書數十車其中與經傳大異者云夏年多殷益于啓位啟殺之太甲殺伊尹文王殺季歴自周受命至穆王百年非穆王壽百嵗也幽王既亡共伯和者攝行天子事非三相共和也初發冢者燒䇿照取寳物及官收之多燼簡斷䇿束哲傳鄰墓金椀盧充家西有崔少府墓一日見一府舍門進見少府與崔小女為婚三日崔曰君可歸女生男當以相還居四年三月三日臨水忽見崔氏并少府抱兒還充又與盌并贈詩一首充取兒益及詩女忽不見充詣市賣盌崔女姨曰我妹之女嫁而亡贈以金椀着棺云反間發墓田單行丨丨令燕人劓所得齊卒又掘城外塜墓即墨人望見皆涕泣怒自十倍田單因而用之史因隙發墓唐郭子儀為魚朝思所忌使人發其父墓盗未得子儀來朝中外懼冇變人見代宗唁之號泣曰臣乆主兵不能禁士殘人之墓人今發先臣墓此天譴非人力也發墓葬母晉世王公貴人多葬梅嶺及叔陵所生母彭氏卒啓求梅嶺乃發故太傅謝安舊墓棄去安柩以葬其母陳始興王叔陵傳發墓斬臂王𤣥謨從弟𤣥象位下邳大守好發冡墓時人聞桓内有小冡或告𤣥象墓上見一女子近視則亡便命發之冇一棺上有金蠶銅人以百數一女子可三十資質若生卧而言曰我東海王家女應資財相奉幸勿見害女臂冇王釧斬臂取之於是女復死末書求禁樵採唐武后幸洛陽至閿鄉縣車騎不進召巫問之曰晉龍驤將軍王濬之墓在道南每為樵採所苦聞大駕至哀求后詔百歩墓外不得樵採杜甫詩送韋尚書櫬云墓待龍驤詔不禁芻牧栁子厚謫永州與許孟容書曰先墓在城南旡異子弟為主懼便毁傷松柏芻牧不禁以成大戾訟禁斫墳熈寧初有人知河中府薛少卿為盗斫墳塋之松檟少卿投牌乃判其狀曰周文王之苑囿尚得芻蕘薛少卿之墳塋乃禁樵採洎宅編勸免發墓韋蔡同肆羅織遷謫元祐諸公蔡率章以奏乞發司馬光墓門下侍郎許將獨無言蔡等退朝哲宗留將問曰卿不言何也將曰發人之墓非盛徳事也哲宗曰朕與卿同乃不從邵伯温辦誣石介作聖徳頌孫復曰子之禍自此始矣未幾介病卒㑹山東舉子孔直温謀反或言直温嘗從介學於是夏英公言於仁宗曰介實不死北走胡矣出中使與京東部刺史發介棺以驗實是時呂居簡為轉運使謂中使曰萬一屍在即是朝廷無故剖人墳墓何以示後世耶遂令介親屬及門人姜潛以下各結狀保證中使持以入奏仁宗亦悟竦之姦有㫖赦介妻子還鄉東軒錄吉地位極人臣晉周訪微時與陶侃結友侃丁艱家中忽失牛遇一老父曰前崗見一牛眠山洿中其地若葬丨丨丨丨又指一山云此亦其次當世出二千石言訖不見侃尋牛得之因葬其母以所指别山與訪之父葬焉訪果為刺史著稱于益自訪三世為益州世為三公袁安父卒母使安訪求葬地道逢三書生問安何之為言其故生廼指一處云葬此地當丨丨丨丨須叟不見安異之遂葬於其所占之地後登司徒子孫昌盛四世五公幽明錄有帝王氣晉羊祐時有善相墓者言祜祖墓所丨丨丨之丨若鑿之則旡後祜遂鑿之相者曰猶出折臂三公而旡嗣祜遂墮馬折臂位至三公而無子致天子問郭璞嘗為人葬明帝微服往觀之因問主人何以葬龍角此法當滅族主人曰郭璞云此葬龍耳不出三年當致天子也帝曰出天子耶答曰能丨丨丨丨耳帝甚異之郭璞以母憂去職卜葬地於暨陽去水百許歩人以近水為言璞曰當即為陸矣其後沙漲去墓數百里皆為桑田道士審地唐智興㣲時嘗為徐州門子有道士居門側智興每日一掃道必掃道士之門智興母死丨丨曰吾善丨墓丨他日引智興以竹䇿表一處曰必定此兩世方伯智興再往竹䇿冇枝叢生遂葬焉後至方伯太平廣記過僧論地李太尉在中書舒元輿自侍御史辭歸東都遷李太尉言近有僧自東來云有一地葬之必至極位何妨取此元輿辭以家貧不辦遂歸别覔葬地他日僧又經過復謂太尉曰前佳城已有用之者詢之乃元與也元輿自刑部侍郎平章事感定錄凶地葬母妨子梁昭明太子丨其丨丁貴嬪遣人求墓地之吉者葬畢有道士云此地不利長子若厭之或可申延髙祖紀害兄福地唐温大雅改葬祖父卜人占其地曰丨丨而丨丨大雅曰若家弟永康我將含笑入地嵗餘果卒預定斵棺唐李勣卜葬地繇曰朱雀和鳴子孫盛榮張景藏曰占者過也所謂朱雀悲哀棺中見灰後孫敬業反則天斵英公棺焚之見其灰也唐郝處俊死葬訖有書生過其墓歎曰葬壓龍角其棺必斵其後象賢坐不道果斵處俊信焚其尸朝野僉載逆知傷目閩越黄撥沙善視墓畫地為圖即知體咎故號撥沙婺人有世患左目者問之曰祖墳有本根傷害葬者之目必發墓以去之既發有根賁其左目出之而愈后山叢談詩集白骨洛陽北門北邙道喪車轔轔入秋草車前齊唱薤露歌髙墳新起白峩峩朝朝暮暮人送葬洛陽城中人更多千金立碑髙百尺終作誰家柱下石隴頭松栢半旡主地下丨丨多於土寒食家家送紙錢䲭鳶作巢銜上樹人居朝市未解愁請君暫向北邙逰張籍比印山昔嵗不我與颯然凉風生繁華掃地歇蟀蟋充堂鳴感物增憂思奮衣出遊行行值古墓林丨丨下縱横田堅鞭髑髏村童埽精靈精靈無奈何像設安所營石人徒瞑目表柱燒無聲試讀牌上文乃是昔時英位極君詔葬勲髙盟忠貞寵終禁樵採立嗣修墳塋運否前政缺羣盗多蚊虻即此丘壠壞鐡心為霑纓當其崇樹日豈憂侵辱并冥漢生變故凄凉結幽明悲端豈自我外物紛相縈所適非所見前登江上城倚樓臨緑水一望解傷情顔胄適恩黄泉驅車上東門遥望郭北墓白楊何蕭蕭松栢夾廣路下有陳死人杳杳即長暮潛寐丨丨下千載永不寤浩浩隂陽移年命如朝露人生怱如寄壽無金石固萬嵗更相送賢聖莫能度服食求神仙多為藥所悞不如飲美酒被服紈與素古樂府白楊去者日以踈來者口以親出郭門直視但見丘與墳古墓犂為田松栢搉為薪丨丨多悲風蕭蕭愁殺人思還故里閭欲歸道無因同上玉樹行路一孤墳路成墳已毁空疑年嵗積不知陵谷徒幾經秋葉飛驟見春流瀰金蠶不可織丨丨何曾蘂陌上驅馳人笑語自侈靡今日非明口可憐詎隣此何遜蒿草北邙山頭少閑上盡是洛陽人舊墓舊墓人家欲葬多堆着黄金無處買天涯悠悠葬日促岡坂崎嶇不停穀髙張素幙繞銘旌和唱挽歌山下宿洛陽城北復城東䰟車靈馬長相逢車轍廣若長安路丨丨少於松栢樹山頭洞底石漸稀盡向墳前作羊虎誰家石碑文字㓕後人重取書年月朝朝車馬送葬回還起大宅與髙臺王建北邙行棠棃君不見馬侍中氣吞河朔稱英雄君不見韋太尉二十年前鎮蜀地一朝冥漢歸下泉功業聲名兩憔悴奉誠園裡蒿棘生長興街南沙道平當日帶礪在何處今日子孫無地耕或聞覊旅職常調簿尉文參各天表清明修辦専使來一把紙錢風樹杪碑文半缺碑堂摧祁連塜象狐兎開野花似雪落何處丨丨樹下香風來馬侍中韋太尉盛去哀來片時事人生倐忽一夢中何必深深固權位薛逢如厦屋茫茫野田平極目歴歴古墳丨丨丨碑版無文荆棘深石獸沉淪松柏秀問人雖不知姓名昔皆髙官仍厚禄子孫流落何所之凶吉當年非不小我來正值寒食天祭膰不設無人哭司馬公成聚塵朱顔苦留不肯住白髪政爾欣得人嬋娟去作誰家妾意氣都丨一丨丨今口牛羊上丘壠當時近前丞相嗔花開鳥啼荆棘裏誰與平章作好春山谷送客過故人墓黄鸝飛離宫路逺北原斜生死恩深不到家雲雨今歸何處去丨丨丨上野棠花竇鞏宫人斜晩鶯怨草樹愁煙似不春丨丨哀丨問何人須知一種埋香骨猶勝昭君作虜塵陸龜䝉宫人斜賡竹風詩鄭交謁友人於陳蔡路逢一冡有竹二竿鄭為詩曰冡上兩竿竹風吹常裊裊冡中人賡之曰下有百年人長眠不知曉賦棃花韻于襄陽在鎮時選人劉某入京逢一舉人年二十詩言語盟唔意甚相得劉因邀藉草同飲日暮舉人指支逕曰弊止數里能左顧乎劉辭以程期舉人因賦詩云流水涓涓芹吐芽織鳥雙飛客還家荒村無人作寒食殯宮空對棠棃花至明年劉歸襄州尋訪舉人殯宮存焉旌墳墓事類封比干墓武王克啇丨丨丨之丨祭孔子墓明皇開元十三年幸孔子宅以太牢祭其墓本紀周太祖如曲阜謁孔子祠帝曰孔子百世帝王之師敢不敬乎遂弭之又拜孔子墓禁孔林樵採本紀禁兵樵採顔蝎曰昔秦王攻齊令曰有敢去桞䇿下季壠五十歩樵採罪死不赦戰國置家奉祀髙祖微時數聞魏公子信陵君無忌賢及即位每過大梁常祠公子及擊黥布還為公子丨五丨世守冡嵗以四時丨丨公子信陵君傳象祁連山霍去病至祁連山捕酋虜甚多益封五千四百戶及薨上悼之為冡丨丨丨丨立思賢碑徐孺子墓在郡南白社牧守除興於墓隧種松太子謝景立碑太守夏侯嵩於碑邉丨丨丨丨豫章記命官行禮漢宣詔祀百辟卿士有益於民者蜀都以文翁九江以召父應詔嵗時郡二千石率官屬行禮遣掾修墓魏太祖北征栁城過涿郡令告太守曰故中郎將盧植名著海内孤到此州嘉其餘風敬丨丞丨丨墳丨并致薄酸以彰厥徳祠功臣壠後漢和帝幸長陵祀髙祖詔曰髙祖功臣蕭曹為首有傳世不絶之義曹相國後客成侯無嗣朕望長陵東門見二臣之壠每有感馬可遣使者以中牢祠式功臣墓漢明帝西廵狩幸長安遣使者以中牢祠蕭何霍光帝謁陵園過式其墓祭前賢墓唐太宗幸洛陽宫祭漢文帝親講武於鄭之郊遣使祭鄭大夫國僑漢太丘長陳寔墓祭舊臣墓唐太宗貞觀七年狩于少陵詔以少牢祭杜如晦杜淹墓築闕象山李靖其妻卒詔墳制如衛霍故事丨丨丨鐵丨積石山以旌其功擇原起冡李翰所善張廵死節翰傳廵功表上之曰廵身首分裂將士骸骼不掩宜於睢陽相丨髙丨丨大丨招䰟而葬旌善之義也樹闕表孝安城縣有孝子孝聞天下太守王府君丨雙土丨以丨墓琢石旌功秦叔寳陪葬昭陵太宗詔有司丨丨為人馬立墓前以丨戰丨丘行恭貞觀中詔丨丨為人馬象㧞箭狀立昭陵闕前以丨武丨封墳祭墓介士送葬即封征虜之墳單于入朝當祭度遼之墓燕集式墓象山丨丨表文終之徳丨丨昭去病之勲郭子儀贈詔為禁芻牧袁滋先世墳墓在蔡吳少陽時丨丨丨丨為立門墻朱文公守南康訪屯田劉公凝之墓丨丨丨丨以限樵牧廬墓事類廬冡三年漢原渉先丨丨丨丨由是顯名京師廬冡彌年崔衍居父喪跣護柩行千里道路為之流涕丨丨丨丨捧土涕濡丨丨涕濡頓首成墳䧟膺腐㫮寒暑在廬栁宗安豊孝闕銘偃廬柴毁膠東郡王道彦父喪荷上就墳躬蒔松柏丨丨丨丨雖親友不復識手植松柏蔣挺之卒列兄弟廬墓側丨丨丨丨泣慘松柏晉王裒父喪廬墓側泣涕松柏為之色慘本傳居廢櫛沐元譲母終廬墓次廢櫛沐飯蔬飲水藉無茵席元徳秀母亡廬母墓側食不塩酪丨丨丨丨穿壙為門梁文貞少從軍守邉逮還親已亡即丨丨丨丨晨夕洒掃廬墓左㑹官改新道出文貞廬前行旅見之皆為流涕冇甘露降塋木白兔馴擾縣令刋石記之埏甓作冡林攅泉州莆田人母亡丨丨丨丨廬其右有白烏甘露降兎循其室後漢蔡邕母卒廬于墓側動靜以禮有丨丨撓其房丨又木生連理獸循其旁晉夏方廬墓側猛丨丨丨丨白鵲上廬支叔才母亡廬墓有丨丨丨丨傍白兎循塋許法謹倉州清池人母喪常廬於塋有甘露嘉木連理白兎之祥並六帖羣鹿循擾褚旡量母喪廬墓左鹿犯所植松栢旡量號訢曰山林不乏忍犯吾塋樹耶自是丨丨丨丨本傳雙鶴飛吊陶侃丁母憂在墓下忽有客來吊儀服鮮異禮畢遣人尋之但見丨丨丨天而去世說殺觸松鹿見前墓類刃盗樹人李充母喪服行墓次有人盗其樹者充手刃之表異其門薛萬備有志行居母喪廬墓前太宗詔丨丨丨丨詔表其廬劉知柔居親喪廬墓側詔築闕表之居廬生子見居䘮類居喪割乳五代之際民苦於兵往往因親疾以割股與既喪而割乳廬墓以規免州縣賦役五代史省墓事類反國展墓子路去魯謂顔淵曰何以贈我曰吾聞之也去國則哭于墓而後行丨其丨不哭丨丨而入也檀弓展省祝過家上塜後漢彭岑傳有詔丨丨丨丨四時上飯古不墓祭始皇起寢墓側漢因不改丨丨丨丨漢官儀寒食上墓丨丨丨丨禮經旡聞近代相尿浸以成俗士庶有不合廟祭者何以用展孝思宜許上墓同拜掃禮於塋南門外奠祭徹膳唐明皇詔巵腊禱墓盧越之東有扁鵲冡元魏時針藥之士常以丨丨丨之所謂盧扁酉陽雜爼負笈醊墓徐穉傳黄瓊辟不就及瓊薨穉丨丨徒步三十里丨黄瓊丨致其哀傷髙士傳祀延陵冡皇覽曰延陵季子冡在毗陵縣暨陽鄉至今吏民皆祀事史記呉世家酹園内冡梁何黙隱居園内有卞忠貞冡黙植花卉於側每飲必酹之禮重拜掃近世丨丨丨丨今已闕者四年矣每遇寒食則北向長安號以首頓地田野道路士女遍滿皂𨽻庸丐皆得上父母丘墓焉馬醫夏畦之鬼旡不受子孫追養者栁宗元書祭名破散奉先之禮旡寒食野祭之禮近代莊宗每年寒食出祭謂之破散五代㑹要祭以麥飯劉知逺殺從益王淑妃曰何不留吾兒使每嵗寒食以盂麥飯酒明宗陵乎通鑑五代漢髙祖祭用紙錢寒食野祭而焚紙錢五代周本紀序詩集郭外丘墟丨門丨寒食誰家哭風吹曠埜野紙錢飛古墓纍纍春草緑棠棃花映白楊樹盡是死生離别處冥漢重泉哭不聞蕭蕭暮雨人歸去白居易塜頭拜掃無過骨肉親一年惟此兩三辰丨丨莫種有花樹春色不闕泉下人唐熊持登古今合璧事類備要前集卷六十七
