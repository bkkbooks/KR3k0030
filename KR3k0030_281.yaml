body:
  text: 古今合璧事類備要别集卷七十五宋謝維新撰飛禽門精衛格物總論精衛按博物志狀如烏文首白喙赤走事類㗸木石填海昔炎帝女溺死東海中化為精衛每丨西山丨丨以丨東丨怨溺死也述異記詩集羽折墮水精衛誰教爾填海海邊石子青磊磊但得海水作枯池海中魚龍何聽為口穿豈為空㗸石山中草木無全枝朝在樹頭暮海裏飛多丨丨時丨丨髙山未盡海未平願我身死死還生王建鳥有償寃丨丨丨丨者終年抱寸誠口㗸山石細心望海波平渺渺功難見區區命豈輕人皆譏造次我獨賞専精豈計休無日惟應盡此生何慙刺客傳不著報仇名韓愈舉諸進士作精衛填海淘河格物總論淘河即鵜鶘一名鴮澤水鳥也如蒼鵝大喙長尺餘頷下有兩塊肉大如數斗囊若小水有魚能抑水滿其䳺含水竭盡魚在地乃共食之故曰淘河事類竊肉昔為人丨丨入河化為此鳥今猶有肉因名淘河本草食魚即沐澤腹下胡大數升囊好羣入澤中詬水丨丨因名顔師古云又孔氏帖詩集嚇飛燕江中淘河丨丨丨杜無用鵜津梁暗引丨丨丨元稹伯勞格物總論伯勞按郭璞云形似鶷􅗾而大夏至來冬至去以隂氣動而鳴以陽氣復而止蓋隂賊之鳥其鳴鵙鵙然故名曰鵙或曰博勞或曰伯趙即此事類仲夏鳴丨丨之月鵙始丨記月令七月鳴丨丨丨鵙詩豳七月少皥名官魯昭子問曰丨丨丨鳥名丨何也剡子曰我少皥摰之立也鳳鳥適至故紀於鳥為烏師而烏丨云云伯趙氏司至者也注伯趙伯勞也左昭十七主人姓名東方朔與弟子偕行渴令弟子叩道邊家取飲不知姓名主人開門不與須臾見伯勞飛集主人門中李樹上朔謂弟子曰此丨丨丨李丨伯勞耳但呼李伯勞果有李伯勞應即入取飲别傳曹植惡鳥論國人有以伯勞生獻者王召見之侍臣曰世間惡伯勞之聲敢問何謂也王曰昔尹吉甫用後妻之讒殺孝子伯竒吉甫後悟追傷伯竒出遊於田見鳥鳴於桑其聲噭然吉甫動心曰伯竒乎鳥乃橅翼其音尤切吉甫乃顧曰伯勞乎是吾子栖吾輿非吾子飛勿居鳥尋聲而棲其蓋歸入門集於井幹之上向室而號吉甫命後妻載弩射之遂射殺後妻以謝之故俗號伯勞言所鳴之家必有凶也梟鵙之鳴弗可更者天性然也昔荆之梟將巢於吳鳩遇之曰何去荆而巢吳乎梟曰荆人惡豫之聲鳩曰君如不能革子之音則吳楚之民不易情也為子計者若宛頸戢翼終身勿復鳴也昔議朝會者有人問曰寧有聞梟食其母有答之者嘗聞烏反哺未聞梟食其母聞者慙惡不善也得蟢者莫不馴而放之為利人也得蚤者莫不糜之齒為害身也鳥獸昆蟲猶以名聲見異况夫吉士之與凶人乎梟附鴟梟姑獲鵂䳎鉤鵅鵩狐鬼車車載板訓蘄州鬼格物總論梟不孝鳥也聲惡常盛午目不見物夜則飛行入人家捕鼠一名梟一名鵂吳人呼為􅂒魂古人重其炙肥而美或者謂與鵩相似或曰其實一物然詳而考之鵩鉤鵅梟鵂鶹姑獲訓狐鬼車車載板九頭鳥蘄州鬼名雖不同實則同類皆妖鳥云事類至日捕丨丨丨梟磔之說文人家惡北方梟丨丨以為怪共丨之與烏無異南中晝夜飛鳴丨丨鵲丨丨捕鼠為勝桂林人羅取生鬻之家家飬使丨丨以丨丨狸並嶺表録異請為之禳齊景公為露寢之臺成冇梟鳴甚惡之桓常謇曰丨丨禳之夜用事明日問曰今旦聞梟鳴乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死說苑尚為之諱男子畢康殺其母訟焚燒其尸暴其罪於天下余上章言宣帝時公卿朝會丞相語次曰聞梟生子長且食其母寧然有賢者應曰但聞烏子反哺耳丞相大慙君子之於禽獸丨丨丨丨况人乎桓談論梟鳴牙中晉張重華為石季龍所攻重華使謝艾為中堅將軍引師出振武夜有二丨丨丨丨尅敵之兆於是進戰大破之梟鳴庭樹有丨丨于張率更丨丨其妻以為不祥連唾之張聞之曰急灑掃吾當改官言未畢賀者已在門唐書鴟梟惡鳥鴟梟丨丨也一名鵩一名鵂鶹說文嗜鼠鴟梟丨丨莊子入人家梟丨丨丨凶賈誼所賦鵩是也其肉甚美可為羮臛又可炙說文集泮林翩彼飛梟丨于丨丨食我桑椹懷我好音魯頌胖亦尚梟丨人丨丨之記內則目無毒梟丨丨丨吞之令人夜中見物本草周公為詩鴟梟丨丨救亂也成王未知周公之志公乃丨丨以遺王名之曰鴟梟焉鴟梟鴟梟既取我子毋毁我室恩斯勤斯鬻子之閔斯詩辨女為歌陳丨丨者陳國採桑之女也晉大夫解居甫使於宋道過陳遇採桑之女而戲之曰女為我歌吾將舍女乃丨丨曰墓門有棘斧以斯之夫也不良國人知之知而不己誰昔然矣又曰為我歌其二女曰墓門有梅有鶚萃止夫也不良歌以訊之訊豫不顧顛倒思豫大夫曰其梅則存其梟安在女曰陳小國也攝乎大國之間因之以饑饉加之以師旅其人且亡而况梟乎大夫乃服而釋之列女傳見彈思鴟丨丨而丨丨炙莊因飲聞梟天寶中韋郇公謫守蘄州時李鄴侯亦以處士放逐丨夜丨丨丨梟韋公泣下李侯曰此鳥人以為惡其聲可聽乃令坐客有不聞此聲者罰以大白由是聽之不厭羲之好炙王丨丨丨梟丨晉書德裕作賦大尉李贊皇作懷梟賦元之述志滁楚地郡城之上鴟梟巢焉秋冬永夕鳴嘯不已妻子驚咤或終夜不寐因作詩以喻之且徴前賢放逐而聞是鳥者總而述之以見吾志文集詩見後鵂鶹似訓狐微小而黃姑獲鵂鶹即鴟也一名丨丨為國可以聚諸鳥太平廣記忌欺鵂鶹一名丨丨白日不見人夜能拾蚤蝨雜志飛撮蚊虻鵂鶹晝日目無所見夜則丨丨丨丨能拾蚤蝨見上拾人爪甲鵂鶹乃鬼車之屬皆夜飛晝藏或好丨丨丨丨則知吉凶凶者輒鳴於屋上知其將有咎耳故人除指甲埋之户內蓋忌此也鑠人魂氣又名鬼車春夏之交稍遇隂晦則飛鳴而過嶺外尤多愛入人家丨丨丨丨或云常滴血血滴之家則有凶咎名夜遊女鵂鶹亦丨丨丨丨好與嬰兒作祟故嬰兒之衣不可置星露下畏其祟耳名鬼車鳥見前並太平廣記鳥呼廊下侯景入臺城在昭陽殿廊下居處常有鵂鶹丨鳴丨丨景惡之使人窮山野捕焉南史鳥伏符下尹輒字公度人有怪鳥鳴其室上者以語公度傳公度為一奏符著鳥鳴處其夕丨丨丨丨神仙鵩鳥賈誼鵩賦誼為長沙王傅三年有鵩鳥飛入誼舍止於坐隅似梟不祥鳥也誼既以謫居長沙長沙卑濕誼自傷悼以為夀不得長乃為賦以自廣其辭曰單閼之嵗四月孟夏庚子日斜鵩集余舍止於坐隅貌甚閒暇異物來萃私怪其故發書占之䜟言其度曰野鳥入室主人將去請問于鵩余何去之吉呼告我凶言其災淹速之度語余其期鵩乃太息舉首奮翼口不能言請對以意萬物變化固亡休息斡流而遷或推而還形氣轉續變化而嬗沕穆無間胡可勝言禍兮福所倚福兮禍所伏憂喜聚門吉凶同域彼吳强大夫差以敗越棲會稽勾踐霸世斯遊遂成卒被五刑傳說胥靡乃相武丁夫禍之與福何異糾纒命不可測孰知其極水激則悍矢激則逺萬物回薄震蕩相轉雲蒸雨降糾錯相紛太鈞播物坱圠無垠天不可預慮道不可與謀遲速有命烏識其時且夫天地為爐造化為工隂陽為炭萬物為銅合散消息安有常則千變萬化未始有極忽然為人何足控摶化為異物又何足患小智自私賤彼貴我達人大觀物無不可貪夫徇財烈士徇名夸者死權品庶每生怵迫之徒或趍西東大人不曲億變齊同愚士繫俗窘若囚拘至人遺物獨與道俱衆人惑惑好惡積意真人恬漢獨與道息釋智遺形超然自喪寥廓忽荒與道翺翔乘流則逝得坎則止縱軀委命不私與己其生兮若浮其死兮若休淡呼若深淵之靜泛乎若不繫之舟不以生故自寶養空而遊德人無纍知命不憂細故芥蒂何足以疑鬼車即車載板亦名逆鶬家捶門户正月七日多鬼車鳥度家家丨丨丨打丨捩狗耳滅燈燭禳之荆楚嵗時記血滴人家鬼車晦暝則飛鳴能入人室收人魂氣一名鬼烏此鳥昔有十首為犬所噬今猶餘九首其一常下丨丨丨丨則凶夜聞其飛鳴則捩狗耳猶言其畏狗也亦名九頭鳥本草孔子所見蒼鸆昔丨丨與子夏丨丨故歌之白澤圖周公厭聞見後詩注蒲子之戈丨丨丨丨連雙鶬於青雲之際列子裴瑜所注寶厯中四門助教史迥常見丨丨丨丨爾雅言鶬麋鴰是九頭鳥也酉陽雜俎杜甫鵰賦爾其鶬鴰鳵鶂之倫莫益於物空生此身聨拳拾穗長大如人肉多奚有味乃不􅎇梅堯臣古風嘉祐六年秋九月二十有八日天愁無光月不出浮雲蔽天衆星沒舉手向空如抹漆天昏地黑有一物不見其形但聞其聲其初切切凄凄或髙或低乍似玉女調玉笙衆管參差而不齊既而咿咿呦呦若軋若抽又如百兩江州車回輪轉軸聲啞嘔鳴機夜織錦江上羣鴈驚起蘆花洲吾謂此何聲初莫窮端由老婢撲燈呼兒曹云此怪鳥無匹儔其名為鬼車夜載百鬼凌空遊其聲雖小身甚大翅如車輪排十頭凡鳥有一口其鳴已啾啾此鳥十頭有十口十口插一舌連一喉一口出一聲千聲百響更相酬昔時周公居東周厭聞此鳥憎若仇夜呼庭氏率其屬彎弧俾逐出九州射之三發不能中天遣天狗從空投自從狗嚙一齒落斷頭至今清血流邇來相距三千秋晝藏夜出如鵂鶹每逢隂黑天外過乍見火光驚輒墮有時餘血下㸃汚鳥卧反所遭之家家必破我聞此語驚且疑反祝疾飛無我禍我思天地何茫茫百物巨細理莫詳吉凶在人不在物一蛇兩頭反為祥却思老婢炷燈火卷簾開户清華堂須臾雲散衆星出夜靜皎月流清光姑獲乳母鳥姑獲能收人魂魄今人一云丨丨丨言産婦死變化作之能取人之子以為己子胸前有兩乳本草夜行女姑獲一名天帝少女一名𨼆飛一名丨丨遊丨㸃血為志姑獲好取人小兒養之有小兒之家則血丨其衣以為志並𤣥中記脫毛為女姑獲一名鉤星衣毛為鳥丨丨丨丨荆楚嵗時記鳴于亳社或叫於宋太廟曰嘻嘻出出鳥丨丨丨丨如曰嘻嘻甲午宋大災左襄三十又姑獲左傳云鳥丨丨丨丨注云嘻嘻是也本草鉤鵅似鴟有角鉤鵅入城城空入宅宅空怪鳥也常在一處則無若聞其聲如笑者宜速去之鳥丨丨丨丨夜飛晝伏本草訓狐兩目如猫比土有訓狐聲自呼其名丨丨丨丨兒大於鴝鵒作笑聲當有人死蘄州鬼問其名王元之自黃移蘄州聞啼鳥丨丨丨或對曰蘄州鬼元之大惡果卒於蘄坡集詩集勿諱泥坑屋東惡水溝有鴟墮鳴悲青泥掩兩翅拍拍不得離羣童叫相召瓦礫爭先之計較生平事殺却理亦宜奪攘不愧恥飽滿盤天嬉晴日占光景髙風送追隨擬凌鸞鳳羣肯顧鴻鵠卑今者運命窮遭逢巧丸兒中汝要害處汝能不得施於吾乃何有不忍乘其危救汝得死命浴以清水池朝餐輟魚肉瞑宿防狐狸自知無以致蒙德久猶疑飽入深竹叢飢來傍階基諒無責報心因以德所為昨日有氣力飛跳弄籓籬今辰忽徑去曾不報我知僥幸非汝福天衢汝休窺京城事彈射竪子豈易欺丨丨丨丨守泥坑乃良規韓愈病鴟依倚秋風丨丨丨丨氣象豪似欺黃雀在蓬蒿不知羽翼靑冥上腐鼠相隨勢亦髙王介甫鳴嘯未已元精育萬彚羽族何茫茫為怪有鴟梟為瑞稱鳳凰鳳凰不世出未識五色章吾生在鄒魯風土殊逺方鳴鳩隨乳燕日夕巢我梁翩翾雜鳥雀穿屋率為常又從筮仕來五年居帝鄉更直入承明侍宴趍未央上林聞鶯囀巧舌如笙簧鴟梟徒知名聞見實未嘗頃年謫商山聽之已悲凉今兹出內庭罰郡來永陽誰知爾鸋鴂營巢在城墻年加睡漸少秋盡漏且長丨丨殊丨丨歷歷含秋霜孺人泣我右稚子啼我傍吾心非逹士詎免亦悵悵人生縱百嵗忽若石火光其間有窮通幽味難可量我愛咎與夔峩冠虞舜堂簫韶聞九成丹穴來鏘鏘又愛閎與散陳力遇文王鸑鷟聽岐山多士周道昌嗟嗟漢賈誼年少謫南荒故有鵩鳥賦倚伏理甚詳郇公暨鄴侯放逐同一邦夜深聞此鳥韋公涕沾裳李侯舉酒令斯音非不祥坐客如不聞罰之以巨觴遂使惡鳥聲聽之靡所傷贊皇貶袁州懷梟義亦臧乃知昔賢哲未免亦悽遑况余不肖者冒寵登朝行報國惟直道謀身昧周防四年兩度黜鬢髮已蒼蒼雖得五品官銷盡百鍊剛何當解印綬歸田賴膏梁教兒勤稼穡與妻日糟糠鳳來我慶梟集非吾殃優遊盡天年身世俱可忘王元之車載板即鬼車亦名逆鶬九頭江竒鶬丨丨連􅐴弓彎滿月不虛發雙鶬併落丨飛丨李白行行逰且獵篇引臂落丨丨丨鶖鶬杜壯遊置汝傍東飛鴽鵝後鶖鶬安得送我丨丨丨杜寓居聞此聲荒哉我中園珍果所不産朝暮惟有鳥自呼車載板楚人丨丨丨莫有笑而莞而我更相呼與之相往返視寓若轉黍好音而睨睆攘攘生死夢久知無可揀物弊則歸土吾歸其不晚歸歟汝隨我可相蒿里挽有此名鳥有車載板朝暮常一至世傳鵩似梟惟能預人死以丨丨丨字疑即賈長沙當時所遭值洛陽多少年擾擾經世志粗聞方外語便釋形骸纍吾衰久捐書放浪無復事尚自不見我安知汝為異憐汝好毛羽言音亦清麗胡為太多知不默而見忌楚人既憎汝彈射將汝利日長隨我遊吾不汝羮胾並王介甫訓狐誇自呼有鳥夜飛名訓狐矜凶挾狡丨丨丨乘時隂黑止我屋聲勢慷慨非常粗安然大唳誰畏忌造作百怪非無須聚鬼徴妖自朋扇擺掉拱角頽塈塗慈母抱兒拍入席那暇更護雞窠雛我念乾坤德泰大卵此惡物常勤渠縱之豈即遽有害斗柄行指西南隅誰謂停奸計尤劇意欲唐突羲和烏侵更歷漏意彌厲何由僥幸休須㬰咨余往射豈得已候汝兩眼張盱睢梟驚墮梁蛇走竇一夫斬頸羣雛枯韓愈射訓狐誇隂獰黃昏月暗妖鳥鳴尨然鈍質鹿豪聲聞凶自異立屋角潛事觜吻欲我驚豈知慣此醜狡呼集鬼物丨丨丨夕盜雞雛無畏避曽遭彈射沉泥坑汝今病翼未甚愈還作舊態侵乎明陽烏曈曈出東海照汝宜喪膽與精何為世人苦憎汝汝嘗盜物資已榮倘有弓矢勿汚辱殺汝非得出惡名養雛三四已相似眼腦實異鸞皇生一朝車輪翅墮地狐鼠入穴梟黨烹梅聖俞蘄州鬼寧知使君死使君向蘄州更唱蘄州鬼我不識使君丨丨丨丨丨人生作鬼會不免使君已老知何晚蘇子瞻五禽言古今合璧事類備要别集卷七十五
