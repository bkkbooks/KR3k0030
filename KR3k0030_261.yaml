body:
  text: 古今合璧事類備要别集卷五十五宋謝維新撰百草門草格物總論草叢生之物非一種也非名言可盡彼其所可知名者固已備録於炎帝之經禹貢之書列國之詩屈宋騷人之篇也總總矣至於不可得而盡識者惟見其自形而自色爾自生而自長爾自榮而自祜爾誰得而名之哉是非聖人不能正其名也蓋以大鈞播物坱北无際有象有滋而又有數彼所不切於日用雖畧之可也事類神農嘗丨丨始丨百草一日七十毒淮南子師曠對黄帝問丨丨曰吾欲知苦樂苦樂可知乎丨曰嵗欲豐甘草先生甘草薺也嵗欲苦苦草先生苦草葶藶也嵗欲惡惡草先生惡草水藻也嵗欲旱旱草先生旱草蒺莉也嵗欲疫疾病草先生病草艾草也博物志名黄精黄帝問天姥曰天地所生豈有食之不死者乎天姥曰太陽之草丨曰丨丨餌之可以長生太隂之草名曰鈎吻不可食之入口立死同上名鈎吻見上注名蓂莢堯土階三等有草生庭丨曰丨丨草十五日以前生一葉十五日以後落一葉若小盡則一葉厭而不落新序屈佞人堯時有丨丨草佞人入朝則屈而指之又名丨丨草博物志不刺人魯城孔子塋中丨生丨丨草色如虹山戎有紅草葉如車輪丨丨朝丨齊桓植之以表霸者之瑞酉陽雜爼腐為螢丨草化丨丨吕不韋月令不死草秦時大宛中多枉死者横道有鳥如烏銜草以覆死人面遂活鬼谷先生曰此草是瀛洲丨丨丨也生瓊田中亦名養神芝廣記吉雲草東方朔曰臣有丨丨丨種於九景山中二十嵗一花臣種一千九百九十九年矣明年應生臣走徃刈之以飼馬馬食不饑帝許之朔平旦而去至暮而返背負數束其形葉似麥而金色剉以飼馬即覺不饑洞㝠記昭君塜漢王丨丨嫁單于服毒死𦵏之胡中胡地草白而此丨草獨青因謂青塚漢書鄭𤣥山不其城東有丨丨敎授山丨下生草如薤葉土人名作康成書帶草三齊要記葉糺如彈漢元帝永光二年天雨草丨相丨結丨丨丸史莖大如指靈帝中平元年東郡陳留濟陽長垣濟隂諸縣界有草生其丨丨丨丨狀似鳩爵龍蛇鳥獸之形五色各如其物毛羽頭目足翅皆具續漢書有風不偃魏興錫義山多生薇蘅草其草丨丨丨丨无風則揺水經思詩忽夢謝靈運丨丨不就丨丨弟惠連即得池塘生春草之句人以為工史皆類人形符堅至夀春與符融登城而望王師見部陣齊整八公山上草木丨丨丨丨顧謂融曰此亦勍敵憮然有懼色晉史以記嵗時定昌羗俗无文字但候草榮落丨丨丨丨後漢書有五色蛾有園客者濟隂人嘗植五色香草積十年採其實一日丨丨丨丨止其旁客收而蓄之至蠶時有女夜半至自稱客妻道蠶之狀客與俱蠶得一百二十頭繭皆如甕太平廣記數羣白羊午橋莊小兒坂茂草盈望晉公毎使丨丨丨丨散於坂上曰芳草多情頼此粧㸃窮幽記冦不可冒王戎徙安南都䕶浚濠繞柵外植刺草丨丨丨丨孔六帖醉嗅立醒興慶池南岸有草數叢葉細心勁有丨者過其旁丨之丨丨謂之醒醉草開元遺事葉如决明舞草出雅州獨莖三葉丨丨丨丨一葉在莖端兩葉居莖之半相對人或近之歌及抵掌謳曲必動葉如舞段成式雜爼榦若苦竹李輔國家夏則設迎涼草其色類碧丨丨丨丨葉細如杉杜陽編卉類合歡草則蘭芷又有異丨丨丨丨而蔓生轇轕水石栁宗元記昏黒如夜順宗即位拘彌國貢變晝草有類芭蕉可長三尺而一莖千葉樹之則百歩内丨丨丨丨始藏於百寳匣中上見而怒曰背明向隂之物何貴并匣焚之杜陽編樛結如旗光啓元年七月河中解永樂生草葉自相丨丨丨丨旌之狀時人以為旗子草五行志煎為湯飲元和時館閣湯飲待學士者丨麒麟草退耕傳屑以塗壁元載造芸暉堂芸暉香草也出于闐國香潔如王入土不朽為丨丨丨丨故名之杜陽編馬食而飽東行至褭澤有息鷄草尤美而本大丨丨不過一本丨丨五代史載䧟膚記烏銜以覆見前可藉以寢至陽城淀草軟如茸丨丨丨丨五代史載䧟敵記能使馳走孫甑生丨丨草為人騎丨丨孔六帖意思一般周茂叔忩前草不除去或問之曰與自家丨丨丨丨程語録屈原離騷經余既滋蘭之九畹兮又樹蕙之百畝畦蒥荑與掲車兮雜杜蘅與芳芷冀枝葉之峻茂兮頼竢時乎吾將刈雖萎絶其亦何傷兮哀衆芳之蕪穢相如子虛賦其高燥則生葴菥苞荔薛莎青薠其埤濕則生藏莨蒹葭東蘠彫胡蓮藕菰蘆菴䕡軒于衆物居之不可勝圖詩集光風浮丨丨草際丨選疾風知丨丨丨勁草唐太宗春風生丨丨百草丨東風揺丨丨丨百草選換野色芳草丨丨丨古詩競春花百草丨丨丨杜滴秋根草露丨丨丨亂青袍汀草丨丨丨隨青袍春色丨丨丨並杜如碧絲燕草丨丨丨李白濕翠羽隂草丨丨丨栁宗元映階碧丨丨丨草自春色杜入簾青草色丨丨丨劉禹錫煙迷碧丨丨丨草萋萋長杜秋含緑丨草丨丨滋張榮陽暗生春池草丨丨丨李太獨尋春丨丨丨草上荒臺薛能如有意春草丨丨丨羅生玉堂隂選獨憐幽丨丨丨草澗邉行韋應物南浦見不似萋萋丨丨丨晚來煙雨半相和羅鄴委牆隅碧丨丨丨草杜知湖外碧丨丨丨草前人王孫恨欲識丨丨多少丨正和煙雨滿章臺韓呉王鬬若共丨丨丨百草不知應是欠西施劉禹錫撥不開館娃宫外姑蘇臺鬱鬱芊芊丨丨丨前人燒不盡離離原上草一嵗一榮枯野火燒不盡春風吹又生李白芳復芳丨草丨丨草斷腸還斷腸自然傾下淚何必更斜陽杜牧歸不歸山中相送後日暮掩柴扉春草年年緑王孫丨丨丨王維有所託緑羅紛葳㽔繚繞松栢枝草本丨丨丨嵗寒尚不移古詩相期拾丨丨丨瑶草杜終朝採丨丨丨草榮日暮不盈抱採之欲遺誰所思在遠道古詩經寒碧楚草丨丨丨庭春入眼濃舊低收葉舉新掩捲牙重歩履宜輕過開筵得屢供看花隨節序不敢强為容杜一醉眠花落江堤簇煖煙雨餘江色遠相連香輪莫碾青青破留與遊人丨丨丨韓偓一寸心砌下芝蘭新滿徑門前桃李舊垂隂却應垂念江邉草放出春煙一寸心韋應物色青青君王不可見芳草舊宫春猶帶羅裙丨丨丨向楚人劉長卿生書帶庭下已丨丨丨草使君疑是鄭康成坡隨車輪勿去草草無惡若比世俗俗浮薄君不見長安公卿家公卿盛時客如麻公卿去後門無車又不見千里萬里江湖濵觸目凄凄無故人惟有芳草丨丨丨一朝返故居門前草先除草於主人實無負主人於草宜何如勿去草草無惡若比世俗俗浮薄亂抽莖春草綿綿不可名水邉原上丨丨丨似嫌車馬繁華處纔入城門便不生劉原父不識名山無人跡草長青異彩竒香丨丨丨只是黄花兼蘚葉也無半㸃俗塵生楊誠齋詩空怨漸覺東皇意思匀陳根初動夜來新忽驚平地有輕緑已蓋六街無舊塵莫謂榮枯吟野草且憐愁醉柅香輪丨人丨丨王孫遠極目萋萋又一春程明道望欲迷波翻别浦情無盡日下重樓丨丨丨獨鳥自飛煙漠漠行人不駐雨萋萋王孫何事征鞍晚蘭澤空閒杜宇啼王岐公芝格物總論芝瑞草名菌蠢凢數莖連葉有花土氣和則主有五色或者以黄者為喜黒者為惡諒不容無辨也事類味如鷄蘇東坡云夜夢遊何人家開堂西門有小園古井井上有蒼石石上生紫藤如龍蛇枝葉如赤箭主人言此石芝也余率爾折食枝衆皆驚笑其丨丨丨丨而甘明日作詩坡詩序臼如黄精子瞻詩所寄胡道士玉芝一名瓊田草者俗號其葉云唐婆鏡本草云鬼臼也嵗生一葉丨丨丨云堅瘦可辟穀山谷詩云風吹石髓堅如鐵坡石芝笑嗤熊掌内芝烹熟石枝老丨丨丨丨嗤雕胡坡菖蒲附石菖蒲格物總論菖蒲一名昌歜種於池沼間其根盤屈有節狀如馬鞭大一根旁引三四根節尤宻一寸而九節者佳亦有一寸十二節者一名昌陽令有一種根苖纎細人家以瓦石器種之須旦夕易水則茂水濁及其泥滓則萎矣此所謂石菖蒲是也事類烏髪菖蒲又名堯薤丨丨吕氏春秋長年菖蒲放花人食之丨丨風俗通天精堯時丨降丨於庭為薤感百隂為菖蒲焉典術昌本文王好食丨丨葅說苑昌歜王使周公閲來聘饗有丨丨左傳仙人食漢武帝上嵩高忽見有丨丨長二丈耳出頭下垂肩帝禮而問之仙人曰吾九疑山中人也聞中嶽石上有菖蒲一寸九節食之可以長生故來採之忽然不見帝謂侍臣曰彼非欲服食以此喻朕耳神仙傳安期服畨禺東有澗澗中生菖蒲皆一寸九節丨丨生丨之仙去但留玉舄焉草木狀服蒲不寒韓藂服菖蒲十三年身上生毛識視書萬言皆目之冬袒不寒本草一作韓終又見抱扑子食蒲長生王興採菖蒲丨得丨丨神仙傳菖蒲映竹王徽之以丨丨丨丨曰菖蒲止以九節為貴而此君面目聳然菖蒲正當再拜此君而此君亦安得不受之邪高氏春秋菖蒲成鳯僧普寂大好丨丨房堵以菖蒲種丨獅子鸞丨仙人之狀海墨微言參寥石蒲頌寒溪之濵沙石之竇產此靈苖蔚然其秀四皓採芝歌丨丨避秦隠居商山丨丨而丨曰漠漠高山深谷迤邐曄曄紫芝可以療饑唐虞世遠吾將何歸駟馬高蓋其憂甚大富貴之畏人不如貧賤之肆志乃共入商山隠于地胏山秦滅漢高帝召之不至深入終南山史山谷瑞芝記晉陵邵君協為新昌宰視事之三月靈芝五色十二生于便坐之室吏民來觀無不動色相與言曰吾令君殆將有嘉政以福我民乎山川鬼神其與知之矣不然此不蒔而秀不根而成非人力所能致而自至者何也乃相與廓其室四達為亭命曰瑞芝犇走來請記於豫章黄庭堅焉黄庭堅曰予觀神農草木經青芝生泰山赤芝生衡山黄芝生嵩山白芝生華山黑芝生常山皆久食而輕身延年而不老蓋序列養生之藥不言瑞世之符又其傳五芝曰赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黄者如紫金皆光明洞徹如堅氷而世之所名芝草不能若是也故嘗考於信書自先秦之世未有稱述芝草者及漢武帝厭飫四海之富貴求致神仙不死天下騷然元封中乃有芝草九莖連葉生甘泉殿齋房中於是赦天下作芝房之歌孝宣興于民間厲精萬事事無過舉然廟享數有美祥頗甘心焉故復修孝武郊祀以瑞紀年元康中金芝九莖又產函徳殿銅池中然此芝不生於五岳果神農經所謂芝者耶予又竊怪漢世既嘉尚芝草而兩漢循吏之傳未有聞焉何也豈其所居民得其職所去民思其功生則羽儀於朝歿則蒸嘗於社則是民之鳯凰麒麟醴泉芝草也耶抑使民田畝有禾黍則不必芝草生户庭使民㐲臘有鷄豚則不必麟鳯在郊藪吏不舞文則不必虎渡河里胥不追擾則不必蝗不入境此其見效優於空文也耶昔黄霸引上計吏問興化之條有鶡雀來自京兆舍中飛集丞相府上覇以為皇天報下神雀欲圖上奏京兆尹張敞言郡國計吏竊闕條或之仁厚智畧有餘而微信竒怪也恐丞相興化之闕昆輒以敗風俗天子嘉納焉劉昆為江陵令連年火灾闕頭多能反風降雨遷𢎞農太守驛道多虎崤渑不通昆爲政三年虎負子渡河乃召入為光禄勲詔問昆江陵反風滅火𢎞農虎北渡河行何徳政而致是對曰偶然耳左右皆笑其言帝歎曰是乃長者之言由君子觀之張敞之篤論世祖之知闕戍之文不如光禄之質也雖然新昌之吏民愛其令君將闕軼焉焉可誣也又嘗試論之古之傳者曰上世蓋有屈指佞萐蒲扇庖蓂莢紀歴嶰竹生律既不經見後世亦不聞有之蓋前世之有芝草特未定也邵君家世儒者闕詩集望三秀靈芝丨丨丨選冠衆芳靈芝丨丨丨葉玲瓏闕丨正丨丨庾肩吾根盤錯靈丨丨丨呈天瑞寳葉蟬聮表地仙李紳金華發黄丨九丨丨翠蓋六英舒庾肩吾玉殿生豈如丨丨丨三秀詎有銅池出五雲陌上堯樽傾北斗樓前舜樂動南薰時清茹吾慕漢初老丨丨猶丨芝杜朝陽靜明王證孝感寳殿秀靈芝色帶丨丨丨闕涵宿露滋且摽宣徳重更引國闕樂聖祚今無限微臣未歸錢起味如蜜藕空堂明月清且新幽人睡息來初匀了然非夢亦非覺有人夜扣祁孔賔披衣相從闕何許朱欄碧井開瓊户忽驚石上堆龍蛇玉莖紫筍生無數闕然散折青珊瑚丨丨丨丨和鷄蘇主人相顧一撫掌滿堂坐闕盧胡亦知洞府嘲輕輕終勝嵇康羡王烈神仙一合五百而秀有美君子採持而歸文石相并涵蓄清漪根盤九節霜雪不槁置之幽齋永以為好東坡石蒲贊本草菖蒲味辛溫無毒開心補五臟通九竅明耳目久服輕身不忘延年益心智高志不老注云生石磧上概節者良生下濕地大根者乃是昌陽不可服韓退之進學解云訾醫師以昌陽引年欲進其狶苓不知退之即以菖陽為菖蒲耶抑謂其似是而非不可以引年也凢草木之生石上者必須微土以附其根如石韋石斛之類雖不待土然去其本處輒槁死惟石菖蒲并石取之濯去泥土漬以清水置盆中可數十年不枯雖不盛茂而節葉堅瘦根鬚連絡蒼然於几案間久而益可喜也其輕身延年之功既非昌陽之所能及至於忍寒苦安澹泊與清泉白石為伍不待泥土而生者亦豈菖陽之所能髣髴哉余游慈湖山中得數本以石盆養之置舟中間以文石石英璀璨芳郁意甚愛焉顧恐陸行不能致也乃以遺九江道士胡洞微使善視之余復過此將問其安否死贊曰清且泚惟石與水託於一器養非其地瘠而不夫孰知其理不如此何以輔五藏而堅髮齒詩集紫茸新蒲含丨丨謝靈運又菖蒲花丨丨李白碧節丨丨吐寒蒲杜石上生丨丨丨菖蒲一寸十二節仙人勸我食令我頭青白如雪逄君寄君一縫裳書中不得傳此方君能來作棲霞侣與君同入丹丘鄉張文昌溪毛秀岳麓丨丨丨湘濵玉髓香靈苖怜勁直達節著芬芳豈謂盤盂小而忘臭味長拳山并勺水所至未能量姜自一寸碧蕭然丨丨丨卓爾四時青四時青靈根九節瘦不改丨丨丨並百氏集我來采神人多古貎雙耳下垂肩嵩嶽逄漢武疑是九疑仙丨丨丨菖蒲服食可長年言終忽不見滅影入雲煙喻帝竟莫悞終歸茂陵田李白人不識自我來關輔南山得再遊山中亦何有草木媚深幽菖蒲丨丨丨生此亂石溝山高雪霜苦黄葉不得抽下有千嵗根蹙縮如蟠蚪長有鬼神守徳薄安敢偷坡碎石養斕斑丨丨丨菖蒲一勺清泉半石盂坡盆水養碧玉椀盛紅碼碯青丨丨丨石菖蒲同上龍骨痩根盤丨丨丨葉聳虎鬚長姚思巖翠羽紛丨丨丨披一尺長帶煙和雨過書堂知君别有臞仙種容易難交出洞房未文公謝送石菖蒲古今合璧事類備要别集卷五十五
