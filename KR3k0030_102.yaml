可勝道哉丨丨丨丨以次序昭穆皆吾宗寺之職也唐元徽之行李從易制長以才行憲宗法堯睦族深惟本支乃詔執事曰伯父叔季幼子童孫在屬籍者必命卿丨丨丨丨聞唐元稹行李途制以睦周親載司宗伯丨丨丨丨唐陳子昂為李卿官表實司屬籍宗正設官丨丨丨丨唐開元二十五年勑續通典敏睦居司當丨丨之代丨紏綏之丨六帖昏繆失對唐竇誕為宗正卿太宗與語丨丨丨丨乃下詔曰誕比衰耗不能事朕知而任之是謂不明其以光祿大夫罷九宗之委以副丨丨丨丨唐大詔令孫逖褒信郡王璆宗正卿制六親之屬宗正卿掌九族丨丨丨丨籍以别昭穆之敘唐百官志儒者之職見前儒職注總學之政宗正卿丨宗子治大小丨丨丨宗子之少卿二卿之職事選宗中之長見沿革注封兄弟之國注同上必擇賢以名器宗卿設位邦族是司丨丨親丨丨光丨丨唐孫逖濮陽郡王徹宗正卿制宜受寄於本支丨丨丨丨丨丨更遷榮於列棘同上漢揚雄宗正針巍巍帝堯欽親九族經哲宗伯禮有攸訓屬有攸藉各有育子世以不錯伯臣司宗敢告執正詩集宗卿丈人領丨丨杜甫别李義詩冷卿宗正為丨丨東坡詩注謂管玉牒所宗正少卿歷代沿革後魏大和中初置宗正少卿北齊亦然隋唐皆有國朝祥符中以給舍以下兼少卿元豐始正名焉中興罷寺監詔太常少卿兼宗正少卿紹興三年復置少卿六典職略中興會要事類通古學唐李漢為少卿丨丨丨屬辭雄蔚唐史典兵衛淮南王神道碑遷少宗正丨丨丨丨韓文李近古墓志敘文昭列制以九族乃立二卿宜丨丨丨之丨用魁輔德之任常集除少卿制晏類要宗正寺丞歷代沿革秦宗正掌親屬有丞漢百官表漢用皇族後漢一人劉茂字子衛為宗正丞歷代皆有之隋有二人唐一人掌判寺事通鑑分紀國朝寺元豐五年正名初除趙君錫明年以楊畏為宗正丞詔宗正寺除長二外自令後更不專差國姓續會要建炎三年罷紹興五年復置中興會要事類召見漢劉德丨丨甘泉宫武帝謂之千里駒昭帝時為宗正丞復為卿參領宗正卿掌宗𣲖紀屬藉以别昭穆而定親踈少卿為之二丞丨丨之四朝志佐譜録司屬命卿往為之丨董正丨丨以詔戚休曲阜賈希純制董屬籍丨吾丨丨之事曲阜賈希純制修玉牒王鞏字定國為宗正丞乞别立法丨丨丨三年一進九朝通略上治道趙師民字周翰遷宗正丞屬陜西用兵丨丨丨卜五事改天章閣待制同知宗正寺事仁宗實録修纂屬籍詔興五年詔復置宗正寺丞一貟仍除偉以偉收得宗枝事迹諳曉編類丨丨丨丨次第編纂圖書詳見宗簿下注詩集氣力侔陶鈞清時為丞郎丨丨丨丨丨劉禹錫送張同年子宗正寺簿歷代沿革梁天監七年置北齊隋皆有唐因之通典主簿一人掌印及勾檢稽失分紀開元加一人並於宗室中擇才行者補受六典國朝天禧楊改元以衛尉丞趙鼎兼宗正寺簿元豐正名初除完職略建炎三年罷紹興十年復中興會要隆興元年從王大寶等議詔宗正併省主簿一貟二年詔宗正寺丞簿並依舊制孝宗會要事類勾稽宗正地嚴秩清儒者之職也稍以序進宗丨丨之任曲阜除王柄制簿正丨丨屬籍慶元制通管寺事元祐元年宗正寺言既許主簿丨丨丨丨切恐亦合依太常寺國子監例正通管雜務其編纂圖書乞依舊例丞專修從之會要許對上言隆興元年曾覿以使相領京祠王抃知閣兼都丞旨甘忭為內押班三人相與盤結士大夫無廉恥者爭附之袁樞字機仲為宗正簿因輪對數為上言之古今合璧事類備要後集卷三十三
