body:
  text: 古今合璧事類備要後集卷三十三宋謝維新撰九卿門總九卿歷代沿革夏商九卿周六官是為六卿又立少師少傅少保是為三孤與六卿為九前漢百官志漢正卿九太常光祿勳衛尉太僕廷尉鴻臚宗正大司農少府亦謂之九寺大卿又置十二卿執金吾大長秋將作大匠魏晉宋齊如舊梁天監中象四時置十二卿春卿太常宗正司農夏卿太府少府太僕秋卿衛尉廷尉大匠冬卿光祿鴻臚太卿即都水後魏置六卿各有少卿北齊謂之九寺隋唐因之又九寺皆曰棘卿通典分紀龍朔改名凡卿皆加正字後復舊制國朝雖設九卿皆以為命官之品秩而無職事元豐正名始有職掌中興以來併省冗職除太常寺大理寺不罷外宗正以太常兼而衛尉併兵部太僕併駕部太府司農併户部光祿鴻臚併禮部紹興復置宗正太府司農餘遂廢中興會要事類六命典瑞王之卿丨丨周禮九棘左丨丨公卿大夫位焉外有九室九卿朝焉初學記惟月卿士丨丨書洪範靣槐周禮曰丨三丨上卿曹太子來朝賓之以丨丨禮也左傳貴戚齊宣王問卿曰有丨丨之卿有異姓之卿孟子佩玉後漢左雄言九卿位亞三事班在六官行有丨丨之節帶綬馬防位至九卿身丨三丨寵貴至盛也職官分紀再登濮陽假宏給事蓋侯信信任宏官亦丨丨九卿史記四至前漢許商善算丨丨九卿儒林傳又續漢書汲黯姊之子司馬安善官丨丨九卿結河春秋漢合孿曰九卿丨丨海括海李淑諫更始九卿下丨河丨九列漢韋元成傳恤我丨丨注九卿也三星三公北丨丨曰九卿隋志倡九牧六卿分職以丨丨丨參三公九卿者所以丨丨丨也説苑民之主國卿君之二丨丨丨也君之佐丨卿丨丨是謂股肱在於德九卿之事常丨丨丨並同上成其天天子立三公九卿所以順丨丨丨道佩兩印二千石以下六百石丨丨丨皆以黑犀司馬彪漢書為列棘九卿位丨丨丨南史法北斗九卿丨丨丨職官分紀通寒暑九卿丨丨丨晉志三圭之位楚昭王進屠羊説以丨丨丨丨謂三卿皆執圭莊子一國之髙舉丨丨丨丨以為九卿淮南子萬國慶賴卿慶也言丨丨丨丨漢韋昭釋列侯參議古之上卿次公一等至於西漢每與丨丨丨決朝丨類要龜鈕犀印漢官儀卿秩中二千石孝武令通官印方寸大皆丨丨又見上佩兩印下注藻衣花綬漢官儀衣裳卿大夫藻火綬青地桃花三彩又紈扇朱輪參差交映丨丨丨丨焜爚生光初學記明白名卿牟容為大司農性丨丨號曰丨丨東觀漢記膺名稱重長慶元年給事韋景封還駙馬劉士涇為太僕卿制惟月丨丨象河丨丨續通典問異姓之卿齊宣王請丨丨丨丨丨孟子受下卿之禮齊侯使管夷吾平戎于王王以上卿之禮饗管仲仲丨丨丨丨丨而還左傳敬仲辭髙位齊侯使丨丨為卿丨曰羈旅之臣敢辱丨丨以速官謗同上魏絳治大官晉悼公使張老為卿辭曰臣不如丨丨之智能丨丨丨若在卿位內外必平國語一公三卿佐之古者天子三公每丨丨丨丨丨丨故天子三公九卿尚書大傳賜金百鎰再見虞卿躡屩擔簦一説趙孝成王丨丨丨丨丨丨上卿史記詩集開東觀獻納丨丨丨君王問長卿杜詩度玉墀卿月升金掌王春丨丨丨杜送馬大卿赴闕總少卿歷代沿革周六官凡小宰小司徒小宗伯小司馬小司寇皆少卿之任也後魏依南齊以前置九卿又各加以少卿焉北齊隋因之初學記事類介卿丨丨左傳卿佐君之丨丨同上亞卿唐元徽集卲國制授以丨丨亞列杜牧行制丨丨河海之亞類要丨丨丨丨列卿之副公是行吕務簡制丨丨丨丨宫儀亞海胡文恭行制丨丨丨丨亞秩象河楊億代表丨丨丨丨太常卿附少卿歷代沿革唐虞伯夷為秩宗夔典樂太常之任也周曰宗伯為春官掌邦禮秦改奉常典宗廟禮儀有丞漢初曰太常以列侯忠孝恭謹者居之秩中二千石太常者王之旌也畫日月有大事則建以行禮禮官主奉持之又太常欲令國家盛太常存惠帝更名奉常景帝更名太常武帝建元元年制太常職典天地兼掌宗廟王莽改卿為秩宗後漢太常掌禮儀祭祀及行事掌贊天子晉品第三銀章青綬進賢兩梁冠絳朝服佩水蒼玉餘卿皆同魏晉宋齊皆有舊用列曹尚書好遷選曹尚書領護梁太常宗正司農為春卿太常位視金紫光祿大夫後魏為上卿兼置小卿官周禮有小宗伯北齊曰太常寺置卿及少卿丞各一人掌陵廟羣祀禮樂儀制天文術數衣冠之屬隋與北齊同焬帝加置少卿二人唐因之卿一人少卿二人掌禮樂郊廟社稷之事凡大祀則贊引有司攝事則為亞獻龍朔二年改為奉常咸亨復舊九寺卿皆曰正卿少卿曰大夫武后光宅元年改為司禮神龍復正卿一人總判寺掌禮樂郊廟社稷之事總太樂鼓吹大醫大卜廪犧諸祠廟等署通典六典國朝初太常寺皆以禁林之長主判續會要云皆以兩制充而禮院自有判院同判院祥符中符瑞繁縟别建禮儀院輔臣主判而知制誥為知院天禧末罷知院天聖中省禮儀院而寺與禮院事舊不相兼康定元年置判寺同判寺並兼禮儀事元豐正名始專其職焉職略卿掌禮樂郊廟社稷壇壝陵寢之事禮之名有五吉賓軍嘉凶皆掌其制度儀式祭祀有大祠有中祠有小祠其犧牲幣玉酒薦獻器服名辨其等掌樂律樂舞樂章凡親祠及四孟月朝獻景靈官郊祀太廟掌贊相禮儀升降之節及朝會宴饗上夀封册之儀若禮樂有損益及祀典神祗爵號與封襲繼嗣之事當考定者擬上於禮部凡大醫政令以時頒行國朝志元祐詔太常寺置長二餘寺監長二並互置續會要復中興併省寺監獨存太常又命太常兼宗正紹興中興會要隆興元年詔光祿寺併歸太常寺兼領掌社稷及武成王廟諸壇齋宮習樂之事丞一貟罷孝宗會要事類三禮有能典朕丨丨僉曰伯夷汝作秩宗書六樂大宗伯掌丨丨注雲門大卷大咸大韶大濩大武周禮文學漢朝錯以丨丨為太常掌故儒雅太常典天地掌宗廟是以上古選建未嘗不妙簡時望兼收丨丨以通天人合暢神祗漢武帝制秩宗太常寺古曰丨丨唐志奉常秦曰丨丨同上朝儀叔孫通為博士羣臣飲酒爭功或拔劔擊柱叔孫通説上曰願採古禮與秦儀雜就之為綿蕝野外習之會長樂宫成諸侯皆朝謁者引以次入殿門自侯王以下莫不震恐無敢失禮高帝曰吾今乃知皇帝之貴拜通為奉常前漢師禮亘榮遷太常明帝尊以丨丨乘輿每幸太常府令榮東靣坐設几杖會百官後漢本傳清貧和洽為太常丨丨守分至賣田宅以自給明帝加賜榖帛魏史清重宗卿丨丨歷選所難辭爵則亘郁張奮讓對則丁鴻劉愷潘尼之文雅純深華表之從容退默梁陸倕代表容臺太常曰丨丨類要禮寺唐曰司丨丨唐志又曰禮院杜牧之行杜濛制王旌太常者丨之丨也畫日月有大事則建以行禮赤車魏王朗遷太常行陵丨丨千乘又唐太常表西京置一十二列首冠金吾東漢有三十九人多遷玉鈜戴玄晃之七旒驅丨丨之千乘初學記間職張瓌拜太常自謂丨丨帝怒職官公紀清選立國之本禮樂為先今之太常兼掌其事歷代迄今謂之丨丨白居易制傳父業桓榮子郁丨丨丨亦為太常初榮授朱普學言多浮辭省定為十二萬言由是有桓榮君大小章句後漢導母輿故事太常始視事大閲四部樂都人縱觀邠自第去帽親丨丨丨都人榮之邠傳定大典曹褒上疏宜丨六制著成漢禮章下太常以為一世丨丨非褒所能定不可許後漢作類禮魏鄭公嘗以小戴禮綜彚不倫更丨丨丨一十篇帝美其書唐賜御衣後漢楊賜拜太常詔丨丨丨一襲後漢本傳總太樂唐太常卿一人總判寺掌禮樂郊廟社稷丨丨丨鼓吹太醫太卜廪犧諸祠廟等署通典有四院唐制藏大享之祭服丨丨丨一曰太府院藏瑞應及伐國所藏之寶禘洽則陳于闕庭二曰御衣院藏天子祭服三曰樂縣院藏六樂之器四曰神廟院藏御廪及諸器冠九列居九寺之先丨丨丨之首六帖相百禮陳沈卿讓太常表曰儻九卿闕丨丨丨失儀賁以司存云誰之咎初學記戴七旒丨元晃之丨丨驅赤車之千乘類要中華殿唐令狐德棻為卿髙宗召宰相坐丨丨丨問王伯孰先德棻對以清心簡事為本望省樓崔日知恨不居八座為太常卿起樓與尚書省相對人謂之崔公丨丨丨國史纂異請專配趙君錫同知太常禮院時近臣有請祀英宗於明堂配昊天上帝及五帝君錫與禮官建言丨丨丨上帝以稱嚴父之意事略論名器司馬光知禮院時中官凌允言死詔特給鹵簿公丨言丨丨不可假人允言近習之臣非有元勳大勞而贈三公給鹵簿其為繁纓不亦大乎故相夏竦賜諡文正公言諡之美者極於文正竦何人可以當此改諡文莊言行録宗官典禮唐虞歷三代以丨丨丨國之丨漢之太常是也周禮春官注常臣司宗揚雄太常針丨丨丨丨不諧為妻後漢周澤為太常值齋遇疾妻憐其老窺內問之澤大怒以為于齋送詣獄吏爭之不聽語曰居世丨丨丨太常丨一日不齋醉如泥先入見母北齊趙彥深拜卿不脫朝服丨丨丨丨跪陳幼小孤露蒙訓至此北史果敢直言周澤為太常丨丨丨丨後漢強禦不奪張渙拜太常立節可否之間丨丨丨敢丨續漢書伉伉太常劉愷論議常引正大義諸儒為之語曰難經丨丨劉丨丨後漢翼翼宗伯崔駰丨丨太常實為丨丨同上絳服佩玉後漢太常進品第三銀章青綬進賢兩梁冠丨明丨丨水蒼丨餘卿同布被瓦器趙與為太常雖身處上卿而丨丨丨丨耆舊傳時稱德行邢顒丨人丨其丨丨文帝以為太常魏志歷位忠恪晉華表丨丨丨丨清貧履道而內正外順言行不玷臨軒作樂晉蔡謨拜太常咸康四年臨軒謨奏臨軒宜有金石顯宗納焉丨丨丨丨自此始視事設樂封敖為太常卿故事太常始丨丨庭丨九部丨九卿之首漢官解語曰太常事專職尊故號丨丨丨丨初學記尚書裏行唐崔日知遷太常以歷任年久每朝士參集常與尚書同列時人號為丨丨丨丨又太常在六曹尚書之下與尚書丞郎同幕次謂之丨丨丨丨因類好生異議成泰位至太常丨丨丨丨終無折𠂻晉後略窮以理趣劉實為太常與諸博士丨道義丨丨丨傳暢晉讃禮樂之司劉賔客集為杜佑謝男師損等授官表云太常實丨丨丨丨非儒者勿履聲樂之司本寺禮儀丨丨丨丨官屬亦妙選才也見兩京記韓愈為權德輿戴之墓碑云詢選樂童唐王涯字廣津文帝時拜太常以樂府之音鄭衛太甚欲聞古樂命涯丨於舊工取開元雅樂丨丨丨按之命曰梨園樂上悅充禮儀使唐元載秉政忌楊綰奏為祭酒天下清議益歸于綰乃遷綰為太常丨丨丨丨郊廟禮久廢綰振起之捉筆賦詩唐楊師道字景猷太宗時為卿賜宴帝曰聞公每酣丨丨丨丨如宿搆試為朕為之師道再拜少選輒成一坐嗟伏職林巨人長德唐韓愈為權德輿墓碑天下惟為丨丨丨丨同上藝通禮樂太常卿位任特隆學冠儒林丨丨丨丨者可以居之職貟令贊導法儀肇自清廟逮于還宫丨丨丨丨踰於四制俯伏趍數訖無尤違元集趙宗儒制六樂九儀丨丨丨丨興贊在此同上三牲七祀張鷟云聖朝道方萬古業降百祥輯五瑞而禮羣卿薦丨丨而尊丨丨八通鬼道俱申滌濯之誠七里神壇並被嚴宗之貺故使白鶴楊彩向清廟而歸飛赤鴈呈姿對祠宫而振羽清潔為俗表晉賀循拜太常中宗踐祚下令曰循氷丨玉丨行丨丨丨懦怯不任事唐趙君儒為卿太常有師子樂非會期不作幼君荒誕教坊牒取宗儒不敢違以狀白宰相宰相以宗儒丨丨丨丨丨改太子少保以祠禱見寵唐王嶼專以詞解中帝意有所禳祓大抵類巫覡肅宗立遷太常卿又丨丨丨丨丨請籩豆皆加唐韋縚開元時歷光祿卿遷太常卿唐興禮文雖具至顯慶中許敬宗建言籩豆已多縚建言丨宗廟丨丨丨丨十二卿似尹翁歸晉鄭默拜