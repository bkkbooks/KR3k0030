寧朔大使朕丨丨丨丨矣再入翰林本朝竇儀遷工部尚書太祖謂宰相曰深嚴之地當以宿儒充之范質曰竇儀清介重厚然已自翰林遷端明矣太祖曰禁中非此人不可卿當諭以朕意即日丨丨丨丨為學士奬汝面折竇儞字日彰太宗領開封尹以稱為判官賈琰為推官一日太宗燕射琰贊美過甚稱斥之曰賈氏子導諛豈不自愧坐上皆失色因罷宴後拜參知政事入謝太宗曰汝何由至此稱曰陛下不忘藩邸之舊太宗曰非也乃奬丨丨丨賈琰耳竇氏五龍竇儀字可象薊州漁陽人父禹鈞在周為諫議大夫五子曰儀儼侃稱僖皆相繼登科時人謂之丨丨丨丨章河間商音古今姓纂薑姓齊太公支孫封鄣左傳齊人降鄣子孫改為章氏章子齊威王將事類號章孝子唐章全益梓州涪城人少孤為兄全啓所鞠母病全啓刲股膳母而愈及全啓亡全益服斬衰斷手一指以報不畜妻童僕處一室賣藥自業居成都四十年丨丨丨丨練氏隂德五代章仔鈞其先巖仕晉永嘉中守泉州因家焉後唐天祐間王審知守福州謙抑下士中朝避地者多依之仔鈞往見投以三䇿審知大喜承制授髙州刺史檢校太傅付以步騎五千屯于浦城西岩山控制二浙之衝幾二十年子孫因居岩之西村娶練氏生子十五人仁嵩仁徹仁侑三位仕多顯者得象友直子厚楶誼望之衡元振今樞密良能大著良肱皆其諸孫也世傳以為丨丨保全二校丨丨之考夢積象笏皇朝章得象字希言生時父丨庭丨丨丨因以得象為名召篆石經章友直皇祐中近臣言其文章善篆有旨丨試辭焉後太學丨丨丨近臣又薦之召往經成除試將作監主簿不就作栁花詞章楶字質夫東坡與質夫帖云丨丨丨丨妙絶使來者何以措辭本不敢繼作又思公正栁花飛時逺出巡按坐想四子閉門愁斷故寫其意次韻一首題釣臺詩章才邵性喜賦詩丨嚴子陵丨丨有云短棹夷猶七里灘人亡依舊水尤寒漢家名節君知否盡在先生一釣竿過清逺大家峽云岩頭風急樹欹斜溪畔漁樵十數家老盡往來名利客年年秋水映蘆花篤實君子章才邵篤學能文兩預鄉貢以父蔭補官嘗守臨賀辰陽少年謁龜山楊先生時龜山誨以熟讀論語將論仁處仔細玩味而躬行之是後日用踐履莫非所聞所知者故世目為丨丨丨丨雄藩幕府章才邵晚嵗間時與晦翁朱先生遊荆州之行晦翁餞之詩曰丨丨荆楚地自古國西門客有籌邉略人知丨丨尊云云劉清之和云誰云兩州牧澤笏望轅門渠亦髭鬚好公今德義尊古今合璧事類備要續集卷十三
