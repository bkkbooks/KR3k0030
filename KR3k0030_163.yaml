body:
  text: 古今合璧事類備要續集卷十三宋謝維新撰類姓門戚東海商音古今姓纂衛大夫食采於戚因氏焉古賢人有戚子著書漢高祖戚夫人生趙王如意功臣表臨轅侯戚鰓傳封七代事類三禮大義戚兖字公文吳郡人少聰慧受丨丨丨丨兼太學博士為儒推詳南史諡稱堅素皇朝戚同文字文約幼孤事祖母以孝聞從邑人楊慤受經慤隱居不仕而以女弟妻同文遇疾因託以家事同文為葬其三世之未葬者遭世喪亂亦不復仕且思見混一遂以同文為名聚徒講學相繼登科者五十六人踐臺閣者亦至十數尚信義喜周人急所交皆當世知名士楊徽之因使至郡多所酬倡及卒徽之與其門人丨丨丨丨先生賜書院名戚同文應天府民有曹誠者即同文舊居廣舍百五十楹聚書千餘卷以延學者真宗嘉之賜名曰應天府書院為諭民詩戚綸字仲言應天府楚邱人父同文長子曰維仕至户部郎中綸其次子也篤於古學知泰和縣同文卒詔令起復泰和民險悍好興訟綸丨丨丨丨五十篇言近而易曉老幼多傳之謝陳留商音古今姓纂薑姓炎帝之胤申伯以周宣王舅受封於謝今汝南謝城是也後失爵以國為氏焉魯有謝息事類亹亹丨丨申伯王纘之事于邑于謝南國是式詩畨畨申伯丨丨既入于謝同上才行後漢謝夷吾字堯卿第五倫令班固為文薦之曰丨兼四科丨包九德誠社稷之元龜大漢之棟甍公輔晉謝安字安石少有重名放情邱壑有丨丨之望髙卧謝安丨丨東山諸人每言安石不肯出將如蒼生何邱壑謝鯤字幼輿一丨一丨自謂過庾亮神悟謝尚字仁祖八嵗丨丨夙成父鯤嘗携之送客或曰此兒一座之顔回也時譽謝萬字方石早有丨丨領淮南太守王羲之曰萬才流經通處廊廟參諷議故是後來一器今屈其邁往之氣以俯順荒餘近是違才易務矣謝氏尤秀彥者稱封胡羯末三絶宋謝瞻字宣逺六嵗能屬文與從叔混族弟靈運俱有盛名嘗作喜雪詩靈運寫之混詠之王𢎞在坐以為丨丨二寶謝靈運詩書皆兼獨絶每文竟手自寫之文帝稱為丨丨文章謝靈運奕之曽孫丨丨之美為江左第一山水謝靈運為永嘉太守郡有名丨丨肆意遨遊理人聽訟不復關懷兩玉人宋謝混風華為江左第一嘗與晦俱在武帝前帝目之曰一時頓有丨丨丨耳古名臣謝𢎞微萬之曽孫叔父混異之曰是兒深中夙敏沈約曰間而不失淡而不流丨之所謂丨丨𢎞微當之令草表謝眺遷尚書吏部郎好奬人才孔闓粗有才筆未為時知孔圭嘗丨丨讓丨以示眺眺嗟吟良久自折簡寫之嘗直中書省賦詩有蒼苔依砌上紅藥當階翻之句見文選長五言謝眺字玄暉少好學有美名文章清麗善草𨽻丨丨丨詩沈約常云二百年來無此詩也池塘春草宋謝惠連十嵗能屬文靈運嘉賞之云每有篇章對惠連輒得佳語嘗於永嘉西堂思詩不就忽夢見惠連即得丨丨生丨丨大以為工嘗為雪賦以髙麗見竒藍田生玉謝莊字希逸宋文帝異之謂劉湛曰丨丨丨丨豈虛也哉殊有鳳毛謝超宗有文辭盛得名譽武帝曰超宗丨丨丨丨齊髙帝以為義興太守坐公事免詣東府門自通其日風寒髙帝謂四坐曰此客至使人不衣自暖矣二龍長塗謝舉字言揚與兄覽俱預元會江淹一見並相欽挹曰所謂馭丨丨於丨丨者也清風明月梁謝譓不妄交接門無雜賔有時獨醉曰入吾室者但有丨丨對吾飲者唯當丨丨位右光祿大夫覺芳蘭竟體謝覽字景滌梁武帝嘗目送之曰丨此生丨丨丨丨後拜吏部尚書出為吳興太守郡境多劫覽下車肅然風定花猶落陳謝貞八嵗嘗為春日間居詩有丨丨丨丨丨之句李詩謝賦唐謝偃衛州人正觀初對䇿髙第嘗為塵影賦二篇帝召見欲偃作賦先為序一篇頗言天下乂安功德茂盛意受偃使賦偃緣帝指名篇曰述聖其意蓋規帝成功而自處至難云又撰玉牒真紀以勸封禪時李百藥工詩而偃善賦時人稱其丨丨丨丨切問近思本朝上蔡謝顯道與伊川别一年伊川曰做得甚工夫謝曰也只去個矜字伊川曰此人為學丨丨丨丨者也鄒范陽角音古今姓纂子姓宋慜公之後正考父食邑於鄒生叔梁紇遂為鄒氏齊有鄒衍鄒忌事類鼓琴鄒忌以丨丨見齊宣王王善之鄒忌曰夫琴所以象政也遂為王言琴之象政狀新序上客鄒衍齊人也獄中上梁孝王書王使人出之卒為丨丨史記盛夏降霜鄒衍事燕惠王左右譛之被繫於獄仰天而哭丨丨天為之丨丨明月夜光鄒陽獄中書云丨丨之珠丨丨之璧以暗投人於道莫不按劔相眄者無因至前也裙曵王門太史公曰鄒陽辭雖不遜然其比物連類有足悲者亦可謂抗直不撓矣文辨著名長丨丨丨丨為人有智略伉慨不茍合同上南陽人傑晉鄒湛字潤甫南陽人持論實丨丨之丨丨言瑤華貶本朝鄒浩字志完常州晉陵人紹聖中以丨丨丨得丨而其友田畫勉之曰使君官京師遇寒疾不汗五日死矣豈獨嶺海之外能死人哉進士第一鄒應龍字景初邵武泰寧人徽之子也紹熙丙辰擢丨丨丨丨人喻江夏羽音古今姓纂南昌有喻氏東晉有喻歸撰西河記三卷事類闕柏魏郡商音古今姓纂風俗通柏皇氏之後又伯亮父顓頊師柏招帝舉師柏冏為周太僕柏國在汝南西平縣為楚所滅子孫以國為氏事類録功封平原唐柏良器字公亮魏州人父友王奐見之曰爾額文似臨淮王面黑似顔平原殆能立功乃薦之光弼年二十四更戰陳六十一李希烈圍寧陵拔城良器以救兵至擇弩手善遊者沿汴渠夜入及旦伏弩發賊乘城者皆死丨丨丨丨丨郡王圖形凌煙閣大誼動承宗柏耆有縱橫學王承宗叛耆謁裴度且言願得天子一節掉舌下之乃以左拾遺往既至以丨丨丨丨丨乃請獻二州以二子入質由是聲震一時太和初李同捷反耆斬其首以獻劉彭城宫音古今姓纂帝堯陶唐氏之後受封於劉裔孫劉纍事夏后孔甲在夏為御龍氏在商為豕韋氏在周為唐杜氏杜伯子􅀈叔奔晉為士氏孫士會適秦後歸晉其處者為劉氏又周大夫食采於劉亦為劉氏康公獻公其後也士會之後周末家于魏又徙豐沛至豐公生煓字執嘉生漢髙祖事類御龍蔡黑曰有劉纍學擾龍於豢龍氏以事孔甲夏后嘉之賜氏曰丨丨左昭二十九年脫挽劉敬齊人丨丨輅見髙帝勸帝都關中乃賜姓劉氏拜為郎中號奉春君往胸奴結和親約太史公曰劉敬丨丨輅一説建萬世安史記更生前漢劉向字子政本名丨丨年十二以父德任為輦郎以行修飭擢為諫大夫祕書劉向獻淮南枕中鴻寶苑丨丨器量劉劭為陳留太守夏侯惠薦之曰性實之士服其平和良正清靜之人慕其玄虛退讓文學之士嘉其推步詳密文章之士愛其著論屬辭實為朝廷竒其丨丨若人宜輔翼機事納謀幃幄當與國俱隆非世俗所常有也又作都官考課七十二條國師劉歆字子駿與父向領校祕書講六藝傳記諸子詩賦數術方技王莽篡位歆為丨丨蒲鞭後漢劉寬字文饒𢎞農人拜南陽太守吏人有過但用丨丨罰之示辱而已見父老慰以農里之言少年勉以孝弟之訓一錢劉寵字祖榮為會稽太守徴為將作大匠山隂縣有五六老叟人齎百錢以送劉寵為人選丨大丨受之詳見知縣門火降雨劉昆字桓公光武除為江陵令連年火災輒向丨叩頭多能丨丨止風虎渡河劉昆為𢎞農太守仁化大行丨皆負子丨丨上漢論劉毅少有文辨稱丨丨德丨并憲論十二篇安帝嘉之賜錢三萬拜議郎校經子劉珍字秋孫少好學為謁者僕射詔同丨定東觀五丨諸丨傳記百家藝術並同上思劉君劉陶字子竒頴川穎隂人除順陽長覆案姦軌所發若神以病免吏民思而歌之曰悒然不樂丨我丨丨何時復來安此下民明太一吳劉惇字子仁以明天官達占數顯於南土尤丨丨丨窮極要妙作皇覽魏劉劭字孔才為散騎侍郎受詔丨丨丨立學校劉馥字元頴為揚州刺史建立州治丨丨丨廣屯田及興陂塘之利子靖遷廬江太守詔曰卿父昔為彼州今卿復據此郡可謂克負荷者也號八俊劉表字景升少知名丨丨丨有三嘏晉劉宏字終嘏宏兄粹字純嘏弟演字沖嘏並有中朝世人語曰洛中雅雅丨丨丨讀靈光蜀劉琰字威碩有風流善談論侍婢皆能聲樂又悉教誦丨魯丨丨殿賦撰易訓晉劉兆字延世博學洽聞從受業者數千人為春秋左氏解名曰全綜丨周丨丨注以正動二體互通其文本史北府兵劉牢之字道堅鬚目驚人沉毅多計畫謝去以為參軍攻苻堅百戰百勝號為丨丨丨崇讓論劉實字子真博通古今無瑕玷纍厯吏部郎以世多進退著丨丨丨以矯之三臺清肅劉暾字長升正直有父風為左丞正色立朝丨丨丨丨十部從事劉𢎞字和季有幹略政事之才為荆州刺史每有興廢手書守相丁寧欵密人爭赴之咸曰得劉公一紙書賢於丨丨丨丨同上枕戈待旦劉琨字越石少得雋朗之目少與祖逖為友聞逖被用曰吾丨丨丨丨志梟逆虜常恐祖生先吾著鞭登樓清嘯劉琨在晉陽為胡騎所圍乃乘月丨丨丨丨中夜奏胡笳賊棄圍而走慶孫越石兄劉輿字慶孫京都語曰洛中奕奕丨丨丨丨越府長材劉輿東海王越以為左長史時稱丨丨有三材潘滔大材劉輿丨丨裴邈清才樗蒲百萬劉毅字希樂少有大志家天儋石之儲丨丨一擲丨丨盛冬堇生劉殷字長盛曽祖母王氏丨丨思堇殷慟哭澤中有丨丨焉又夢西籬下有粟掘得十五鍾銘曰七年粟百石以賜孝子劉殷常乘鹿車劉伶字伯倫常以細宇宙齊萬物為心丨丨丨丨携一壺酒使人荷鍾而隨謂曰死即埋我著酒德頌劉伶丨丨丨丨並晉事一蹙青雲宋劉瑀字茂琳位本在何偃前孝武初偃為吏部尚書瑀圖侍中不得與偃同從郊祀時偃乘車在前瑀䇿駟車後相去數十步瑀踏馬及之謂偃曰君轡何疾偃曰牛駿馭精所以疾耳偃曰君馬何遲曰騏驥羅於羈絆所以居後偃曰何不著鞭使致千里答曰丨丨自造丨丨何至與駑馬爭路一時喉唇劉湛字𢎞仁弱年便有宰物情與王華王曇首殷景仁並為侍中宋文帝歎曰此四賢丨丨之秀同管丨丨恐後世難繼後進領袖劉繪字士章悛之弟厯位中書郎永明末都下人士盛為文章皆湊景陵王西邸繪為丨丨丨丨時張融以言辭辨捷周顒彌為清綺而繪音采不贍麗雅有風則時語曰三人共宅夾清漳張南周北劉中央並便尺牘劉穆之字道和東莞莒人與朱齡石丨丨丨丨常於武帝坐與齡石並答書自旦至日中穆之得百函齡石得八十函而穆之應對無廢並宋事號曰神童齊劉孝綽七嵗能屬文丨丨丨丨王融曰天下文章若無我當歸阿士阿士孝綽小字著辨命論劉峻字孝標博極羣書文藻秀出謂之書淫時不見用乃丨丨丨丨以寄其懷文藻預宴梁劉苞字孝嘗悛弟之子梁初纍遷太子洗馬以丨丨見知多丨丨坐受詔詠天泉池荷及採菱調下筆即成博綜遺器劉杳字士深丨丨羣書為東宫舍人昭明太子以瓠食器賜之曰卿有古人風故丨卿古人之丨皮裏晉書劉諒字求信尤悉晉代故事號曰丨丨丨丨朱霞白鶴劉訐字彥度幼稱純孝尤精釋典與兄敲卜築鍾山有終焉之志劉孝標稱曰訐超超越俗如半天丨丨敲矯矯出塵如雲中丨丨用第一人劉孝綽纍遷祕書丞梁武帝謂周捨云第一官當丨丨丨丨故以孝綽居此職莫飲第一劉玄明有吏能厯山隂建康令政常為天下第一嘗曰作縣令惟日食一升飯而丨丨酒此丨丨策也御坐為賦劉孺字季幼七嵗能屬文嘗在丨丨丨李丨受詔便成梁武帝甚稱賞之武帝題其手板有劉孺洛陽才之句連珠寄懷劉祥字顯徵式之孫著丨丨十五首以丨其丨南史一快女壻劉延明燉煌人年十四就博士郭瑀瑀弟子五百人瑀有女始笄妙選良偶遂别設一席曰吾欲覔丨丨丨丨誰坐此席者吾當壻焉延明遂奮衣坐神