body:
  text: 古今合璧事類備要别集卷二十三宋謝維新撰花門瓊花格物總論瓊花天下無雙惟揚州后土祠一株耳世傳此花乃唐人所植樹大而花繁清馥異常潔白可愛獨殿春光冠絶羣品唐賢今人多詠之昨因遭紹興辛巳之變狄騎侵軼或謂今所存者非其舊使非後來得老道士唐大寧者力言其不然則此花恐無復眀白於世鮮能不以八仙花日之矣蓋此花雖遭敵人之狼籍然其盤根非他所比似有神物為之遮護不然靈苗不絶生意復回既剪而終盛孰使之然哉今此花如故必有為之賞識者事類或云玉蘂楊州后土廟瓊花丨丨自唐所植即李衛公所謂丨丨花也舊不可移徙今京師亦有之宋敏求春眀退朝録誤以八仙后土廟瓊花樹大而花繁天下無之孫冕過維揚使人訪之山中謂山中甚多但嵗苦樵採野燒故木不能大而花不能盛遂不為人所貴復傷之以詩曰可憐遐僻地常化燎原灰其說蓋丨丨丨丨花為此花爾八仙花雖類瓊花而瓊花之異者其香如蓮花清馥可愛雖剪折之餘韻亦不减此聚八仙之所無也廣陵志作亭以賞自淮南還東平移后土廟瓊花植於濯纓亭此花天下只一株耳永叔為揚州丨無雙丨丨丨之彼土别號八仙花或云李衛公玉蘂花即此劉原父詩序賦詩以狀揚州后土廟有瓊花一株潔白可愛且其樹大而花繁不知實何木也俗謂之瓊花因丨丨丨丨其態劉禹錫詩序杜斿瓊花記余自京口過揚州尋訪舊事知世所傳后圡瓊花在今城之蕃禧觀亟往謁蕃禧觀故瓊花猶在然余間紹興辛巳之變狂冦入揚州已揭其本而去何從復得此種也觀壁間有諸公所紀載直排世俗詭謂道士以聚八仙嗣其名聚八仙葉瓣色香皆不類余曽不及見二花開時類不類不得知獨怪狂冦既揭其本復何從得此種也有老道士出鬚髮皓然自言生於崇寧間今八十有六載矣能叙今花本末余與對坐於花之亭西改容而問道士指花之根幹而言曰此某手所培護而至此者也指觀之大門而言曰此向之殿廬處也指所坐之亭曰此向之無雙亭處也花舊在無雙亭下堂殿西之北自紹興十五年向龍圖子諲以殿廬靣勢狹小徙置轉後則花當殿西之南更三十一年知郡事劉澤復命移花於殿之前即今之花處乃是嵗八月十五日也初二十四年時直花之東南離二三四尺許倏然一小根枝葉日茂其下大徑寸至是放其鄉背踈密移之不敢易又十一月逆亮渡淮趍揚州直入觀揭花本去其小者剪而殊之於是某方避亂奔走初亦不知也冦既退某始以十二月來舊地是時訓練官成平領兵馬依觀屯寨其軍人接某曰觀主至耶瓊花已壞冦手旁有一小根徴見地靣可識認非其種否某心知之謂難以口舌定惟告以瓊花若剔其根皮投之火則臭逹於鼻於是剔其根皮投之火果臭逹於鼻軍人皆喜歡某即默禱后圡移植之花處日往護之越明年二月既望夜中天大雷雨某詰朝起視兩廡蚯蚓布地皆滿往所植根旁則勃然三蘖從根出矣自是遂條逹不已至於今三十年之久見其婆娑偃蓋常不忘斷根時也道士既言余為之竦然曰盛衰感應之理豈可不知其故哉夫他日不生小根而倏起於二十四年兆先見也去辛巳八年者以養稚也離二且三四尺許者不併揭也剪而復萌者終盛也天大雷雨蚯蚓布地而三蘖勃發者蚯蚓伏深壤陽氣驟趣之則動植俱奮也以人事言之不知趙孤漢曽孫之不亡何以異是自微而存存而有立秩植成就以至後日則程嬰丙吉之功道士冥獲其報今之享上夀儻有利之者余恐道士老死後來者無以知今花本末而其疑不解也故序而書之其間嵗月事故之參錯煩委有可附見者悉不敢略以知其不誣右其他靈異甚多未暇及也道士姓唐名記大寧余實金華杜斿紹興三十二年鄭興裔瓊花辨瓊花天下無雙昨因金人侵軼或謂所存非舊疑黃冠輩以聚八仙花種其處初未審然否屬自合淝易鎮來此所覩郡圃中聚八仙若驟然過目大率相類及細觀熟玩不同者有三瓊花大而瓣厚其色淡黃聚八仙花小而辦薄其色徵青不同者一也瓊花葉柔平瑩澤聚八仙葉粗而有芒不同者二也瓊花蘂與花平不結子而香聚八仙蘂低於花結子而不香不同者三也余尚未敢自信嘗取二花雜示兒輩皆能識而别之始乃無疑適后圡祠宇頺弊鳩工撤舊鼎為增建時當季夏非花放之日忽一枝敻然特開於其抄邦人競觀莫不嘉嘆余生罕信竒詭儻非目擊則謂好事者誇誕今觀此靈異豈非司花之神堅豫之信心乎故為之辨以諗來者張昌言瓊花賦揚州后土祠瓊花經兵火後枯而復生今嵗尤盛邦人喜之以為和平之證乃賦之賦曰偉赤社之㑹都滋黑壤之饒沃萃溫潤之秀氣發英華於地軸是為瓊花異於凡木香凝媚服之蘭色瑩光眀之玉託根后土之祠擢幹蜀岡之麓曽不知其嵗年亦弗紀於圖録欲問司花之女但注詩人之目謂天下之一株冠羣葩之芳馥起唐昌之餘芳載後庭之遺曲者乎當其風入琳宮春歸華屋蕚折青綃色凝寒緑枝珊瑚兮鏤氷雪蘂珠璣兮爛金栗真庭靜兮朝䂀麗其纎穠仙籞深兮瑞露滋其芬都瑶林瑰艷之葱倩閬苑竒英之耀煜若蓋而繡似璧而榖如黃琮瑚璉璀璨乎禋壇而文佩環琚玲瓏乎衣鞫桂娥競爽借月影於氷蟾阿母來觀下雲軿於皓鵠儷靚質於茉莉抗素馨於簷蔔笑玫瑰於塵凡鄙荼䕷於淺俗惟水仙可並其幽閒而江梅似同其清淑真絶代之無雙久彌芳於幽谷乃聚八仙之殊種玉蝴蝶之别族葉扶踈而韻不勝色近似而香不足猶瑾瑜琬琰之粹溫豈碔砆堅珉之碌碌蓋艷冶爭妍者衆之所同而蠲潔尚白者我之所獨是以兵火不能禁狄騎不能辱根常移而復還瑞本已枯而再續疑神物之護持偏化工之茂育抑將薦於中興而效祥於玉燭詩集玉花后土祠中丨榮丨唐人瓊蘂崑山採丨丨可以鍊精魂李白二月氷誰移琪樹下仙鄉丨丨輕丨八月霜若使夀陽公主在自當羞見落梅粧王先之一環玉千㸃真珠擎素蘂丨丨眀丨破香葩韓雅圭芍藥慙維揚一株花四海無同類年年后土祠獨在瓊瑶貴中含散水芳外團蝴蝶戲酴醿不見香丨丨丨多媚扶踈翠蓋圓散亂真珠碎不從衆格繁自守幽姿粹嘗聞好事家欲移京轂地既違孤潔情終誤栽培意洛陽紅牡丹適時多轉異新榮託舊枝舊狀呈妖麗天工借顔色深淡隨人智三春愛賞時車馬喧如市草木稟賦殊得失豈輕議我來首見花對花聊自醉韓雅圭杏花俗此花愛圓不愛缺一樹花開似眀月襄王半夜指為雲謝女黃昏呤作雪丨丨丨艷梨花粗桞花細碎梅花踈桃花不正其容冶牡丹不謹其體舒如此之花不足竒此花之外更有誰世非紅紫不入眼江淮寂寞無人知詩人自與花相期長告年年乞一枝徐孝節樂府傾國稱姝無雙亭下瓊花樹玉骨雲腴丨丨丨丨除却揚州是處無天教紅藥來驂乘桃李先驅總作花奴翠擁紅遮到玉都醜奴兒向子諲自昔聞名客裏傷春淺問今年梅蘂因甚花工不管阡陌芳塵行處滿可計天涯近逺見說道迷樓左畔一似江南先得暖向何郎亭下都尋遍辜負了看花眼作古來好物難為伴只瓊花一種傳來仙苑獨許揚州珍産便勝了千千萬萬又恰待東風吹綻丨丨丨丨今見靣數歸期屈指家山逺歸去說也稀罕賀新郎馬古洲玉蘂花格物總論玉蘂花所傳不一有以為㻛花者曽端伯有以為瓊花者李衛公有以為山樊者黃山谷有以為米囊者其說皆非也蓋此花條蔓而生狀如茶䕷柘葉紫莖冬凋春茂花鬚出始如氷絲上綴金粟花心復有碧筒髣佛膽瓶其中别抽一英出衆鬚上散為十餘蘂猶刻玉然名為玉蘂乃在於此羣芳所未有也今長安唐昌觀所植存否不可知惟潤州招隱寺之花識者鮮不為之稱賞或人輕肆誣毁不知何見而然邪使不有博物君子則此花將與凡卉無異又安特知名若此之重哉花如有知冝不無待者事類唐昌所植長安安業坊唐昌觀舊有此花乃丨丨公主丨丨者公主眀皇女也神女下遊唐昌觀玉蘂花每發若瓊林瑶樹元和中春物方妍車馬尋玩者相繼忽一日有女子年可十七八衣繡緑衣乘馬峩髻雙環無簮珥之飾容色婉娩逈出於衆從以二女冠三小僕僕者皆緋頭黃衫端麗無比既下馬以白角扇障面直造花所異香芬馥聞於數十僕步之外觀者以為出自宫掖莫敢逼視竚立良久令小取花數枝而出將乘馬回謂黃冠者曰曩有玉峯之約自此可以行矣時觀者如堵咸覺煙霏鶴唳景物輝焕舉轡百餘步有輕風擁塵隨之而去頃遂滅望之已在半天矣方悟神仙之遊餘香不散者經月時嚴給事休復相國劉賔客白醉吟俱有聞玉蘂院真人降詩云康闕劇說及太平廣記及雞跖集所載文饒品題禁林有此本吳人不識自丨丨丨丨始得嘉名寬夫詩話覺師培埴招隱玉蘂花纍經兵毁普覺來主法席頓還三百年舊觀自晋宋招隱名甲京口古松修竹清泉幽洞播在談詠誇詡勝絶邇者採伐童赭實不副名丨丨丨丨掃剔之志弗倦加以年序蒼翠環合景物清邃師與此寺此詞同永其傳胡仔漁隱叢話平園老叟周必大題唐人甚重玊蘂故唐昌觀有之集賢院有之翰林院亦有之皆非凡境也豫往因親舊自鎮江招𨼆來遠致一本條蔓如荼䕷種之軒檻冬雕春茂柘葉紫莖再嵗始著花久當成條花苞初甚微經月漸大暮春方八出鬚如氷絲上綴金栗花心復有碧筒狀類膽瓶其中别抽一英出衆鬚上散為十餘蘂猶刻玉然花名玉蘂乃在於此羣芳所未有也宋子京劉原父宋次道博洽無比不知何故疑為瓊花王元之知揚州但言未詳何本俗呼為瓊花子桑何故以誣元之蔡君又引晏同叔之言以為證甚無謂也劉夢得雪蘂瓊絲之句最為中的何必拘李善赤玉為瓊之注耶􅙢音陳南史劉杳傳所謂􅙢酒者豫嘗得醖法芳冽異常山谷似不以杳傳為據狥俗訛􅙢作鄭而江南鄉音又呼鄭為㻛復疑未安於是創山礬之名然三詩并序初未嘗及玉蘂止因好事者僞作唐人帖故曾端伯洪景盧皆信之其實諸公猶未見此花所謂信耳而不信目也江淮肥遁陳景沂書戴顒字仲若捨宅為招隱寺寺在京口放鶴門外與鶴林古竹院相望數里孤處於萬山荒凉之顛所由山徑石卵纍纍不絶如線是名昭隱寺有米元章𨽻碑以紀仲若之出處方丈有閣號增華梁昭明選文于中閣之左有亭名虎距鹿跑其泉清泚閣之右有亭名玉蘂懸扁其上亭之下有玉蘂二株對峙一架其株條髣佛乎蒲萄而非蒲萄之所可比輪囷磊瑰如古君子氣象焉其葉類柘葉之圓尖梅葉之厚薄其花類梅而莩瓣縮小厥心微黃類小淨瓶莫春初夏盛開葉獨後凋其白玉色其香殊異而其髙丈餘也是名玉蘂土人僉言此花自唐迄今自天下與此寺只二株亦猶瓊花之於維揚千餘年間凡幾遭兵燬幸存今唐長安白玉等觀及御史所居閣前往往不可稽考而僅存此寺雖然李德裕沈傳師之詩句如新自可以究其終始欲天下皆知此花非山礬非瓊花其敻出鮮儔而自成一家也故詳紀其本末云江淮肥遁愚一子親歷其寺因書詩集琪樹丨丨年年玉蘂新洞宫長閉綵霞春日暮落英鋪地雪獻花無復九天人武元衡瓊枝瀛女偷乘鳳下來洞中潛歇弄丨丨啼鳥不絶春饒舌青瑣仙郎可得知白居易玉蘂天中樹金閨昔共窺落英間舞雪密葉乍低帷舊賞煙霄逺前歡嵗月移今來想顔色還似憶丨丨李德裕雪英花間丨丨舞松風正蕭索經聲草堂逈天香中夜發月落山氣深清猿嘯聲絶如何人外迹䡖與世網别王琪煙樹絶澗先春幹同依玉樹隂雪英飛舞近丨丨動搖深素萼年年密衰容日日侵勞君想華髮僅欲不勝簪沈傳師樹瓏鬆一丨丨丨玉刻成飄廊㸃地色䡖盈女冠夜覓香來處唯見階前碎月明王建樹玲瓏鳳池西畔圖書府玉丨丨丨景象閒長聽餘風送天樂時登髙閣望人寰劉禹錫金粟氷絲維揚后土廟瓊花安業唐昌宫玉蘂判然二物本不同喚作一般良未是瓊花雪白輕壓枝大率形模八仙爾山蹊野路多見之樵斧摧殘如獮剃比之玉蘂似實非丨丨丨丨那有此花鬚中有碧膽瓶别出瓏璁髙半指清馨靜夜衝九天招引瑶臺玉仙子乘風躍馬汗漫逰偷折繁香分月姊紫堇柘葉荼䕷條少到尋常人眼底翰林內苑集賢閣雨露承天近尺咫後人不識天上花又把山礬䡖比擬葉酸而澀供淡黃不著霜縑偏入紙江鄉老少知此名鄭陳瑒音無正字方言土諺隨舌訛烏馬成焉固應爾鄭松忩玉盞翠罌才入平園便有聲唐昌觀裏舊知名已堆丨丨分金粟更插銀花入丨丨蘿蔓春風滕薛長山礬香氣晉齊盟世間百卉應無限不遇王公枉一生楊東山樂府一朵氷姿百紫千紅翠惟有瓊花特異便是當年唐昌觀中玉蘂尚記得月裏仙人來賞明日喧都市甚時又分與揚州本丨丨丨丨難比曽向無雙亭畔半酣獨倚似夢覺曉出瑶臺十里猶憶飛瓊標古今合璧事類備要别集卷二十三
