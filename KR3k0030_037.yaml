body:
  text: 古今合璧事類備要前集卷三十七宋謝維新撰科舉門科舉事類獻士古者天子之制諸侯嵗丨貢丨於天子天子試之於射宮射義設科取士有三學館曰生徒州縣曰鄉貢天子自詔曰制舉選舉志貢士唐丨丨之科有秀才有明經有進士有明法有書有算每嵗仲冬郡縣館監課試其成者長吏會屬僚設賓主陳俎豆備管弦牲用少牢行鄉飲酒禮歌鹿鳴之詩召耆老敘少長而觀焉既餞而與計偕其不在館學而舉者謂之鄉貢唐史舉人方今舉士明詔方下固已驅馳府寺之廷出入王公之第陳篇希恩奏記誓報故俗號丨丨皆稱覔舉唐薛登疏賢能書地方鄉大夫之職云三年則大比考其德行道藝而興賢者能者鄉老及鄉大夫羣吏獻丨丨之丨於王王受之登於天府周禮進士科唐薛登疏曰古之取士考素行之碩詢鄉曲之學以敦朴為先刋文為後以計貢賢愚為州之榮辱李陵降而隴西慙干木隱而西河美卻冀以禮遜升而晉人知禮文翁以經術教而蜀士多儒未有上行而下不從也漢之求士必觀其行魏取放達晉先門閥梁陳尚詞賦隋文納李諤之言禁浮詞煬帝始置丨丨丨後生馳逐競綴小文名曰䇿學以浮為貴本傳列方物武后長夀二年始令舉人獻嵗丨於丨丨前以備充庭通典歌鹿鳴見前貢士下注郡守勸駕髙祖詔曰賢士大夫既與我定有天下而不與吾共安利之可乎有肯從我逰者吾能尊顯之以布告天下其有稱明德者御史中執法丨丨必身丨為之丨遣詣丞相府漢高帝紀縣次續食武帝詔召吏人有明當世之務習先聖之術者丨丨丨丨令與計偕今至闔郡不薦一人其與中二千石禮官博士議不舉者罰有司議曰不舉士一則黜爵再則削地三則黜爵削地畢矣武帝紀隔截進士陳彭年任翰林學士求對歸詣政府王文正公旦延見之陳起呈其狀曰科場條貫公投之於地曰內翰做官幾日待丨丨天下丨丨陳惶懼而退遺事變為學究王荆公改科舉暮年曰本欲變學究為秀才不謂丨秀才丨丨丨蓋舉子專誦王氏章句而不解義正如學究誦注疏耳談叢詩集計吏諺曰槐花黃舉子忙唐翁承贊詩曰雨中粧點望中黃勾引蟬聲送夕陽憶得當年隨丨丨馬蹄終日為君忙秀才馬蹄聲特特去入天子國借問去是誰丨丨皇甫湜含吐一腹文八音兼五色主文有崔李郁郁為朝德青銅鏡必明朱絲繩必直稱意太平年願子長相憶送皇甫湜赴舉發舉事類沅江鱉盧肇赴舉先達問所從來曰某袁民也先達曰袁出舉人耶答曰袁之舉人亦猶丨丨丨甲九肋者稀托言蓬山鼇盧肇江西解末有謝啓云巨鼇屭贔首冠蓬山有司怪其語答曰頑石處山巨魚戴之非首冠耶同上卜珓得吉孟賓於華山神丨丨有如一年乞一珓凡六擲丨上上大丨後果六舉及第郡國雅談夢柩發薦秦少遊丨發殯而葬之者云是劉發之丨是嵗丨首丨東坡集詩集鄉曲英送河南府秀才詩云吾皇紹祖烈天下再太平詔下諸郡國嵗貢丨丨丨韓文省試事類設衛武德以來禮部閲試之日皆嚴丨兵丨荐棘圍之搜索衣服譏伺出入以防偽濫焉出通典糊名武后以吏部選人多不實乃令試目自丨其丨暗考以定等第唐史不繼燭唐制禮部試舉人夜以三鼓為限本朝率用白畫丨許丨丨國朝事實無上請禮部貢院言近年進上惟鈔略古今文賦懷挾入試昨者御試以正經命題多懵所出則知題目不示以出處也大中祥符元年試禮部進士內出清明象天賦等題仍録題解摹印以示之至景祐元年始詔試日進士題目具經史所出摹印給之更不許上請容齋隨筆號榜花唐大中以來禮部放榜有姓氏稀僻者丨曰丨丨唐史造榜天唐陸扆舉進士時方遷幸六月榜出甚暑李士轍戲曰丨丨丨也譏扆進非其時也本傳南院東牆唐舊制都省考試南院放榜丨丨丨丨别築起一堵髙丈餘天辨色自北院將榜南院張之國史補淡墨氊筆李紆侍郎放舉人命筆吏勒紙書榜未及填禮部貢院字吏得疾令史王昶亦善書詔令終其事值昶醉以氊筆染不能加墨逮明方覺字體濃淡相間反致其妍自後法之遂為故事賈魏公談録又進士榜粘黃紙四張以丨丨丨丨書禮部貢院四字粘於榜首托言中書詳覆長慶三年正月禮部侍郎王起奏曰伏以禮部放榜之後逺近誤傳非便臣請今年進士堪及第者本司考試訖其詩賦先送丨丨門下丨丨候敇下本司然後凖例大字放榜從之出國史貴遊覆試王祐知舉陶穀子邴登第上遽命中書覆試詔自今舉人凡關食祿之家皆令覆試白衣卿相進士科始隋大中盛貞觀永徽之際縉紳雖位極人臣不由進士者不以為美其推重謂之白衣卿相以白衣之士即卿相之資也重之如此出通典白袍士子有客譏宋濟曰近日白袍子何太紛紛濟曰由緋袍子紫袍子紛紛化使然也云云國史補列棘坐廡下舒元輿舉進士見有司鈎校苛切既試尚書雖氷炭脂炬餐具皆人自將吏唱名乃得入丨丨圍席丨丨丨因上書言古貢士未有輕於此者羅棘遮截疑其姦非所以求忠直也本傳圍棘閉省門和凝知貢舉是時進士多浮薄喜為喧譁以動主司有司每放榜則丨以丨丨丨丨絶人出入以為常凝徹棘開門而士皆肅然無譁所取皆一時之秀稱為得人本傳詩集建福鼓新進士放榜後翌日排建福門候謁宰相有詩曰華陽館裏鍾聲起丨丨門前丨動時即其事也南部新書都堂燭褒衣博帶滿塵埃獨上丨丨納卷回蓬巷幾時聞吉語棘籬何日免重來三條丨盡鐘初動九轉丹成鼎未開殘月漸低人擾擾不知誰是謫仙才韋承矩白蓮千朵照廊明一片承平雅頌聲更報第三條燭盡文昌風景寫難成薛能登第事類龍虎榜唐歐陽詹與韓愈李觀李絳崔羣王涯聨第進士皆天下選時稱丨丨丨歐陽詹傳千佛經唐張倬柬之之孫數舉進士不第捧登科記頂上戴之曰此丨丨名丨托言前進士得第謂之丨丨丨俱捷謂之同年列姓名於慈恩寺謂之題名籍而入選謂之春關不捷而醉飽謂之打眊燥李肇國史補新郎君薛逢晚年厄於宦途策羸馬赴朝值新進士綴行而出遊團司使百數十人見逢行李蕭然前導曰回避丨丨丨逢輾然遣介語曰莫貧相阿婆三五少年時也曽東塗西抹來托言阿孩兒苗台符年十六張讀年十七同年進士同佐鄭少師宣州幕嘗列題西明寺中或竊注曰一雙新進士兩箇丨丨丨同上陳橘皮給事中喬舜知舉進士及第者五人皆以舉數升降等甲無名子謂喬之榜類丨丨丨年多者居上南唐近事期集院進士榜出便往丨丨丨狀元請一人為録事其餘主宴主酒主樂探花主茶之類主樂兩人一人主飲妓放榜後大科頭兩人第一部也小科頭一人第二部也常宴小科頭主之大宴大科頭主之同上慈恩塔神龍以來杏園宴罷於慈恩寺塔下題名他時有將相則朱書之托言破天荒荆州人每嵗解舉人多不成名號天荒解劉蛻以荆州解及第號丨丨丨北夢瑣言燒尾宴士人初登第必展歡宴謂之燒尾説者云虎化為人惟尾不化須得燒去乃化又説新羊入羣羊抵觸須燒其尾乃定又説魚躍龍門化為龍時必雷為燒其尾乃得化聞見録泥金信新進士及第以泥金貼子附家信謂之丨丨丨開元遺事淡墨榜見前省試類注櫻桃宴宴名有九五曰櫻桃六曰月登雜詳上尤重丨丨丨櫻桃之熟和以糖酪托言燈毬會唐進士開宴會於曲江亭既徹饌則移樂泛舟又有丨閣打丨之丨唐制曲江題名武帝即位宰相李德裕尤惡進士初舉人既及第綴行通名詣主司第謝主生拜主司答拜乃敘齒謝恩遂升階與公卿觀者皆坐酒數行乃赴期集又有丨丨會丨丨席至是德裕奏國家設科取士而附黨背公自為門生自今一見有司而止其期集丨丨丨丨唐選舉志杏園會宴進士丨丨初丨謂之探花丨以少俊二人為探花使遍遊名園若他人先折得名花則二人被罰秦中記選最年少者三人為探花使世謂之探花郎東軒筆録載妓尋春唐進士會燕曲江崔彖請告假不赴乃以雕幰丨丨遊觀為團司所發崔沆為主罰録事判云深攙席帽密映氊車紫陌丨丨便隔同年之面青雲得路可知異日之心托言錫宴簪花溫公曰吾性不喜華靡二十沗科名聞喜宴獨不簪花同年曰君賜不可違也乃簪一花家傳見鼠銜卷杜鎬龍圖江南名士植之祖也初登第時將試前夕丨大丨丨丨於前視之乃孝經正義明日果於正義中出題三道本傳夢狗撇箭裴元質舉進士夜夢一狗從竇出挽弓射之其箭遂撇以為不祥夢神解之曰茍第字頭也弓者第字身也箭者第字豎也有撇為第也尋唱第朝野僉議因弟受撻李景莊老於場屋每被黜母輒撻景讓景莊兄宰相謂主司曰李景莊今嵗不可不收可憐彼兄每嵗受撻由是始得及第唐武宗紀與兄同登曽鞏子固嘉祐二年歐陽永叔知貢舉子固兄弟四人同登科同上自取儒科李宗諤昉之子七嵗能屬文恥以父任得官獨由鄉舉既第進士授校書郎同上再擢科第元厚之舉進士擢髙第殿試被黜復舉進士中第同上夢立斗下袁郭初應舉丨丨丨丨果第七人及第同上夢登塔上孫夢得初名貫字道卿嘗語豫曰某舉進士過長安丨丨丨丨見持一大文卷者問之云來年春榜索而視之不可問其間有孫貫否曰惟第三人有孫抃既寤遂改名抃明年果然東齋記事詩集摘髭佳句喧衆口考官敢瑕疵連年收科第若丨頷下丨韓退之拔旗一戰文場丨趙丨便調金鼎佐無為跋敇案前人到少築沙堤上馬歸遲巨仁裕折桂丨丨一枝先許我穿楊三葉盡驚人白樂天看花春風得意馬蹄疾一日丨盡長安丨孟東野躍馬洗眼上林看丨丨賀詩先到古宣城坡詩騎驢咸通中舉子車服太盛楊雲翼欲令丨丨時有詩曰看看詔下盡丨丨紫軸緋氊滿九衢盧氏雜記姓字新鶴使曉來華表上分明説得帝都春門開閶闔星河在榜注神仙丨丨丨韓持國雲泥隔春官南院院牆東曉色初明日色紅文字一千重馬擁喜歡三十二人同眼看魚變辭凡水心逐鶯飛弄曉風莫怪丨丨從此丨總曽惆悵去年中陳標離席帽國初猶襲唐士子皆曵袍重戴出則席帽自隨李巽纍舉不第鄉人曰李秀才不知甚時席帽離身及第後乃遺鄉人詩曰當年蹤迹困泥塵不意乘時亦化鱗為報鄉閭親戚道如今席帽已離身詩話蓋畨氊唐太和八年放進士多貧士無名子作詩曰乞兒還有大通年六十三人籠仗全薛庶凖前驅瘦馬范酇依舊丨丨丨秦中記拋白紵間思蓬島會神仙二百同年最少年利市襴衫丨丨丨風流名字寫紅箋歌樓夜宴停銀燭栁巷春泥汚錦韉王禹稱爛銀袍元和十三載李源公榜三十三人皆取寒素時有詩曰元和天子丙申年三十三人同得仙袍似爛銀衣似錦相將白日上青天花迎馬天上髙高月桂叢分明四十一枝風滿懷春色向人動遮路亂丨丨丨紅鶴馭迥飄雲雨外蘭亭不在管絃中居然盡是前賢事何必青樓倚碧空托言載趙嘏雲隨步青丨丨丨登華榻紅雪飄香入杏園王禹稱三清路丹霞照上丨丨丨瑞錦裁成五色毫預想平生騰躍處龍津春碧醉仙桃鄭谷一字橋三春省壁鶯遷榜丨丨天津馬渡丨劉禹錫擇壻車囊空不辦尋春馬眼亂行看丨丨丨注尋春馬謂孟郊春風得意馬蹄疾丨丨丨謂唐進士開宴常寄曲江亭其日公卿家縱觀鈿車珠鞅櫛比而至中東床者十八九詩話上渡船孟賓于獻主司詩云那堪雨後更聞蟬溪隔重湖路九千憶昔故園楊栁岸全家送丨丨頭丨主司見之自謂得之晚當年中第興國初歸連上吉守贈之詩末句曰今日還家莫惆悵不同初丨丨頭丨雅言參述紅粧問金榜題名墨尚新今年依舊去年春花間每被丨丨丨何事重來只一人何扶紅裙看舒王有詩云却憶金明池上路丨丨爭看緑衣郎歐公