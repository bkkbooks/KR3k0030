舉遂為第三人玉壺清話制科事類親策制科所謂制舉者其來逺矣自漢以來天子常稱制詔道其所欲問而丨丨之唐丨取士之丨其天子自詔者曰制舉所以待非常之才焉唐選舉志增重制科仁宗天聖間從夏竦之奏丨丨丨丨之目於是自賢良方正以下其科為六自書判拔萃以下其科為四驗之以進䇿十卷先之以過閣六論薦之糾之以臺諫國史夏竦上書夏英公以父沒王事受丹陽縣主簿上書乞應制舉其略曰若陛下以枕流潄石為達則臣世居市井若陛下以金榜丹桂為材則臣未沗科第若陛下以鳩杖台背為德則臣始逾弱冠若陛下以荷戈控弦為勇則臣生不經歷若陛下令臣待詔公車指陳時事猶可與漢唐諸生並驅較其先後真廟聞言賞激召赴中書試論六首一曰定四時别九州聖功孰大論二曰考定明堂制度論三曰光武二十八將功業先後論四曰九功九法為國何先論五曰舜無為禹勤事孰優論六曰曽參何以不列四科論是嵗應中制科歸田録吳育升等宋興以來御試制科舉人無登三等者惟吳育第三等餘皆四等除此則落之東軒筆録預擬出題張咸漢州人應茂科初出蜀過夔州郡將知名士也一見遇之甚厚因問曰四科優劣之差見於何書張無以對守曰載孟子注中因掇示之張道中漫思索著論咸至都閣試文論以此為首題張更不注思而就主文錢穆父覽之大喜過閣第一張即魏公之翁也揮麈録偶失出處李泰伯素不喜孟子以為孔子尊王孟子教諸侯為王嘗試制科六論不得其一曰吾書未嘗不讀必孟子注疏也擲筆而出人為檢視之果然終不中第托言詩集羣玉府驚禽一時巢栖息無少安秋扇一離手流塵蔽霜紈故侣不可追涼風日已寒逺逢杜陵士别盡平生歡逐客無印綬楚江多芷蘭因君時暇遊長鋏不復彈閲書南軒霽絙瑟清夜闌萬境身外寂一杯腹中寬伊昔元宗朝冬卿冠鴛鸞肅穆升內殿從容頂髙冠遊夏無措辭陽秋垂不刋至今丨丨丨學者空縱觀世人希德門揭若攀峰巒之子尚明訓鏘如振琅玕一旦西上書班裳拂行鞍荆臺宿暮雨漢水浮春瀾君門起天中多士如星繁煙霞覆雙闕抃舞羅千官清漏滴銅壺仙厨下雕盤熒煌仰天榜錯落飛濡翰古來長策人所歎遭時艱一鳴從此始相望青雲端劉禹錫送韋道沖賢良事類詔舉賢良丨諸侯王公卿郡守丨丨丨能直言極諫者上親策之敷納以言前文帝紀考問賢良陛下舉賢良方正之士論誼考問將欲興仁義之休德明帝王之法制建太平之道也前董仲舒策明王事體賢良丨於古今丨丨之丨受䇿察問咸以書對著之於篇朕親覽焉於是董仲舒公孫𢎞出焉武帝紀修先聖術武帝詔有司舉賢良文學災川復推𢎞𢎞至太常上䇿詔諸儒制曰子大夫丨丨丨之丨明國家之體講論洽聞有聲乎當世公孫𢎞傳敇舉一人光武日食詔其丨公卿丨賢良公正各丨丨本紀對策百餘時丨丨者丨丨人太常奏𢎞䇿居下䇿奏天子擢𢎞對為第一前公孫𢎞傳遣詣公車詔舉賢良方正丨丨丨丨光武紀安帝永初五年詔舉賢良方正有道術能直言極諫之士並丨丨丨丨本紀詔會東堂武帝丨諸賢良方正直言丨丨丨策問摯虞對䇿擢為太子舍人晉摯虞傳起至宰相上昔與功業屢舉賢良𢎞自見為舉首丨徒步數年丨丨丨公孫𢎞傳選補郎吏永和元年詔舉賢良方正能直言極諫之士上親臨策問丨丨丨丨和帝紀舉得穆裴正元元年策賢良方正得穆質裴復栁公鮑緯崔邠韋純洪簡熊執易等世美防知人防傳策過朝董文宗太和二年舉賢良方正能直言極諫帝引諸儒百餘於廷丨之是時第策官賈餗龎嚴見蕡對嗟伏以為丨古丨丨而畏中官睚眥不敢取上人讀其辭至感慨流涕劉蕡傳仲舒舉首武帝舉賢良文學之士丨丨對策制曰朕廣延四論方之豪雋公選賢良博習之士欲聞大道之要至之極今子大夫褒然為丨丨其精心致思朕垂聽而問焉董仲舒傳柬之第一張東之以賢良召時年七十餘矣對策者千餘丨丨為丨丨擢拜監察御史唐本傳仲舒三策漢武帝三策仲舒仲舒對陳天人大槩緩而不切也唐劉蕡傳郤詵一枝晉丨丨遷雍州刺史武帝曰卿自以為何如對曰臣舉賢良對䇿第一猶桂林之丨丨崑山之片玉帝笑之本傳大科名世富公弼初遊場屋穆修伯長謂之曰進士不足以盡子之才當以丨丨丨丨公果禮部試下時太師官耀州西歸陜范文正公遣人追公曰有旨以大科取士可亟還公復還京師見文正辭以未嘗為此學文正曰已聞諸君薦君矣久為君闢一室皆大科文字可往就館時晏公元獻為相求婚於文正文正曰公女若嫁官人仲淹不敢知必欲國士無如富弼者元獻一見公大愛重之即議婚遂以賢良方正登第聞見録大科相繼錢希白賢良方正擢第子明逸子飛彥逺子高相繼登制科蘇軾蘇轍兄弟同年制策入等故子高謝啓曰兩朝之間相繼者父子十年之內並進者弟兄子瞻啓曰兄弟並竊於賢良衣冠或以為盛事澠水燕談降入四等嘉祐六年試賢良方正蘇軾第三等轍第四等轍語切直司馬光考入第三等翰林學士范鎮難之欲降其等考官胡宿欲黜之光言是獨有愛君憂國之心不可不收上曰求直言而以直棄之天下其謂我何乃收入第四等國史夢覽二傳吳文肅公奎將舉賢良丨入魏文帝廟升殿問羣臣優劣公未對帝曰韓延夀為最是夕門下抄書吏楊開者亦夢公讀楊阜傳翌日告公公丨丨丨及試六論一乃韓延夀楊阜孰優公果中首選同上六科得人張方平少頴悟絶人凡書一覽終身不再讀宋綬蔡齊見之以為天下竒才也共以茂才異等薦之中選為校書郎復舉賢良方正又中選遷著作佐郎後上平戎十策吕夷簡見之曰丨丨丨丨矣事略六州解元天聖中吳育甲科進士應賢良入髙等文詞雅正天下推之晏元獻曰以六論分六州當為丨丨丨丨職官分紀詩集對丹墀殿上衮衣明日月硯中旗影動龍蛇縱橫禮樂三千字獨丨丨丨日未斜夏竦宏詞事類更易科名國初立宏詞拔萃科大中祥符立服勤詞學科大觀改詞學兼茂科紹興改博學宏詞科國史增試雜文國初猶循唐制用詩賦神宗始罷詩賦以經術造士又慮不足以盡人才設詞學一科試以雜文同上許人自薦景德三年龍圖待制陳彭年奏應宏詞拔萃科明經人許投狀自薦䇿試經義以勸學者紹聖元年詔立宏詞一科每科場後許進士登科人經禮部投狀乞試依進士法差官考校試以詔皓章表針銘賦頌赦敇檄書露布戒諭之類同上以文自售楊龜山云試宏詞乃是丨丨字丨丨古人得已似不如此語録語類俳優韓愈云僕聞有以博學宏詞選者人尤謂之才退因取所試讀之乃類於俳優者之辭顔忸怩而心不寧者數月答崔立之書文若神助李平叔云洪景伯兄弟應博學宏詞以克敵弓銘為題洪惘然不知所出有巡鋪老卒觀於案間以問洪曰官人欲知之否洪笑曰非爾所知卒曰不然我本韓太尉世忠之部曲從軍日見有人以神臂弓舊樣獻於太尉太尉令如其制度製以進御賜名克敵并以嵗月告之洪盡用其語首云紹興戊午五月大將云云主文大驚喜是嵗遂中科目若有丨助焉館職事類見老衙官韓忠獻公宋景文公同召試中選王德用帶平章事例當謝二公有空踈之嫌德用曰亦曽見程文誠空踈少年更宜廣問學二公大不堪景文至曰吾屬丨一丨丨丨是納侮也後二人俱成大名德用已薨忠獻謂景文曰王公雖武人尚有前輩激厲後學成就之意不可忘也聞見録倒繃孩兒苗振召試館職晏殊語之曰君久從仕必踈筆硯今將就試宜稍溫習振曰豈有三十年為老娘而丨丨丨丨者乎既而試澤宫選士賦押韻有王字振曰率土之濱莫非王由是不中選殊聞曰苗君竟丨丨却丨丨矣筆談詩集三英座梅聖俞試館職止得賜進士出身胡宿贈之詩曰賦就甘泉客薦雄獨攀仙桂向秋風抽毫同上丨丨丨換骨才爭第一功瞥看靈鰲居水下恍聞仙犬吠雲中嫦娥應有憐才意唯許詩人到月宫雪齋廣録白玉堂古木隂森丨丨丨長年來此試文章日斜奏罷長楊賦間拂塵埃看畫牆王欽臣古今合璧事類備要前集卷三十七
