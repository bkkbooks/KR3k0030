body:
  text: 古今合璧事類備要别集卷八十五宋謝維新撰畜産門雞格物總論雞有丹者白者烏者三色知時畜也大者曰蜀稚未成曰僆三尺曰鷤絶有力曰奮皆積陽火德之精故陽出而雞鳴以類而感也事類火精雞為積陽丨德之丨春秋題辭翰音祭宗廟之禮雞曰丨丨禮記天雞桃都山有大樹曰桃都枝相去三千里上有丨丨日初出照此木丨丨即鳴天下雞皆隨之𤣥中記牝雞丨丨無晨丨丨之晨惟家之索商書母雞五丨丨孟音相聞昔者有神農氏當是時也云云鄰國相望雞狗之丨丨丨莊胠篋鳴而起雞丨丨丨孳孳為善舜之徒也孟子初鳴而衣文王之為世子朝於王季日三雞丨丨丨丨服至於寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜記文王世子掌嚻為官雞人丨夜呼旦丨丨丨周禮雞鳴思賢丨丨丨丨妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉齊風雞鳴刺今女曰丨丨刺不恱德也陳古義以丨丨不恱德而好色也鄭風出雞以詛鄭伯使行丨丨犬丨丨射考叔者左氏殺雞而食子路遇丈人以杖荷篠止子路宿丨丨為黍丨丨之語憚為人用賔孟適郊見雄雞自斷其尾周之侍者曰憚其為犧也注雞丨丨丨丨之左氏猶為君食田饒事魯哀公而不見察告哀公曰臣將去君黃鵠舉矣哀公曰何謂也饒曰君不見夫雞乎頭戴冠文也足傅距武也敵在前敢鬬勇也見食相呼仁也守夜不失時信也雞雖有五德君猶烹而食之何也以其所從來近也夫鵠一舉千里止君園池食君魚鱉啄君黍粱無此五德而君猶貴之以其所從來逺也韓詩外傳平子芥雞季郈之雞鬬季丨丨丨其丨郈氏為之金距左渻子木雞紀丨丨為宣王養鬬雞十日而問之雞可鬬乎曰未也猶虛矯而恃氣十日又問之曰幾矣雞有鳴者已無變望之似丨丨矣其德全矣異雞無敢應者皆友走矣莊子雞鳴達境丨丨犬吠相聞而丨乎四丨而齊有其地矣孟子雞鳴度關詳見前關注日膳雙雞公膳丨雙雞饔人更之以鶩左月攘一雞孟子曰今有人日攘其鄰之雞者或告之曰是非君子之道曰請損之丨丨丨丨以待來年然後已孟滕文下雞化童子秦時陳倉見二寶丨丨為丨丨或云得雄者王得雌者霸穆公獵獲得雌者遂霸西戎立祠神光從東方來如雌雞之聲白氏帖雞銜赤珠昭靈后名含始遊於洛水有王丨丨丨丨曰吞之者王含始吞之生漢髙祖白氏帖䑛藥飛升淮南王劉安得仙餘藥雞犬丨之皆丨丨後雞鳴天上犬吠雲間白氏帖驗刻無差武帝時交趾越雋獻長鳴雞司晨雞即下漏丨之時丨丨丨長鳴一食時不絶長距善鬬西京雜記皆有名字祝雞翁雒陽人居尸鄉北山下飬雞百餘牢雞丨丨丨丨千餘頭暮棲于樹朝日放散呼名即種别而至列仙傳極有𤣥致晋宋處宗嘗置一長鳴雞著忩間後雞作人語與處宗談論丨丨丨丨處宗因此功業大進幽𡨕録呼雞祝祝祝雞翁善養雞今世人丨丨云丨丨起此博物志呼雞朱朱俗傳雞本朱氏翁化為之故丨丨皆曰丨丨風俗通當三進爵晋元年三省共登一雄雞飛入安東府㕔事占者云丨丨丨丨為天子也白氏帖鳴不失晨劉邠取山雞毛著器中使管輅筮筮云髙嶽巖巖有鳥朱首羽翼赤黃丨丨丨丨此山雞之毛魏志聞雞起舞晋祖逖與劉琨俱為司州主簿情好綢繆共被而寢中夜丨荒丨鳴蹴琨覺曰此非惡聲也因丨丨相謂曰若四海鼎沸豪傑並起吾與足下當相避於中原問雞何食詳見縣令注官屬不知魏王入漢中討劉備不得進欲守復難意欲棄之乃發令云雞筋丨丨丨丨主薄楊修曰夫雞筋棄之則可惜噉之無所得王遂還九州春秋羌營皆燃殷浩北伐辟江逌為長史取雞百餘隻以長繩連之腳皆繫火一時驅放羣雞駭散過塹飛集丨丨丨丨因其驚亂衆兵擊之號金雞樹則天皇后封嵩山封壇南有大􅀈赦日置雞其杪賜丨丨丨丨孔氏帖治鬭雞坊上在藩邸樂民間清明節鬬雞戲及即位丨雞坊於兩室間索長安雄雞金觜鐵距髙冠昻尾千數養於雞坊唐陳鴻東城父老傳吏食人雞宋世良為清河太守發姦摘伏嘗有一丨外宿還郡丨丨丨豚世良叱而語之叩首伏罪北史傅𤣥鬭雞賦前看如倒旁視如傾頭象規作觜似削成髙膺峭峙雙翅齊平躍身竦體怒勢橫生爪似煉銅目如奔星揚翅因風抗翮長鳴猛志橫逸勢凌天庭或躑躅踟蹰囁喋容與或爬地俯仰或抗翼逞勢或狼顧鴉視或鸞翔鵠舉或佯背而引敵或畢命於强禦得勢者凌九天失據者淪九地羅隱天雞說狙氏子不得父術而得雞之性焉其父畜養者冠距不舉毛羽不彰兀然若無飲啄意洎見敵則他雞之雄也伺晨則他雞之先也故謂之天雞狙氏死傳其術於子且反先人之道非毛羽彩錯觜距銛利者不與其棲無復問向時伺晨之儔見敵之勇峩冠髙步飲啄而已吁道之壞矣有是夫張文濳鳴雞賦先生閒居學道昧旦而興家畜一雞司晨而鳴畜之既老語默有程意氣武毅被服鮮明峩峩朱冠丹頸𤣥膺蒼距矯攫秀尾翹騰奉職有恪徐步我庭啄粟飲水孔肅靡爭山川蒼蒼風霰宵凝默幽忩之紞紞恍余夢之初驚萬里一寂鐘鼓無聲聞振衣之腷膊忽孤奏之泠泠委更籌之雜亂和城角之凝清應雲外之鳴鴻弔山巔之落星歌三終而復寂夜五分而既更萬境皆作車運馬行先生杖屨而出觀大明之東生詩集向市賣小奴縳雞丨丨丨雞被縳急相喧爭家中厭雞食蟲蟻不知雞賣還遭烹蟲雞於人何厚薄吾叱奴兒解其縳雞蟲得失無了時注目寒汀倚江閣杜甫縳雞行别時苦星稀月沒入五更膠膠角角雞初鳴征人牽馬出門立辭妻欲向長安行再鳴引頸茅簷下樓中角聲催上馬才分曉色第三鳴旗斾紅塵已出城婦人上城禮招手夫壻不聞遙哭聲長恨雞鳴丨丨丨不遣雞栖近忩戶李廊雞啼曲束何寃清晨臨江望水禽正喧繁鳬雁與鷗鷺游蕩戲朝暾適有鬻雞者挈之來逺村飛鳴彼何樂窘丨此丨丨喔喔十四雛罩縳同一樊足傷金距縮頭搶花冠翻經宿廢飲啄日髙詣屠門遲回未死間飢渴欲相吞常慕古人道仁信及魚豚見兹生惻隱贖放雙林園開籠解索時雞雞聽我言購爾鏹三百小惠何足言莫學銜環鶴﨑嶇謾報恩白居易昻然來大雞丨丨丨小雞竦而待愈峥嶸顛盛氣洗刷凝仙彩郊髙行若矜豪側睨如伺殆愈精光目相射劍㦸心獨在郊既取冠為冒復以距為鐓天時得清寒地利挾爽塏愈磔毛各噤㾕怒癭手碨磊俄膺忽爾低植立瞥而改郊腷膊戰聲喧繽紛落羽皠中休事未决小挫勢益倍愈妬腸務生敵賊性専相醢裂血失鳴聲啄殷甚饑餒郊對起何急驚隨旋誠巧紿毒手飽季陽神鎚困朱亥愈惻心我以仁碎首爾何罪獨勝事有然旁驚汗流浼郊知雄欣動顔怯負愁看賄爭觀雲填道助呌波翻海愈倳爪深難解嗔睛時未怠一噴一醒然再接再礪乃郊頭垂碎丹砂翼塌拖錦綵連軒尚賈餘清厲比歸凱愈選俊感收毛受恩慙始隗英心甘鬬死義肉耻庖宰君看雞鬬篇短韻有可採孟郊韓愈孟郊聨句老怯風霜斷尾雄雞本畏烹年來聽法伴修行還須却置蓮花漏丨丨丨丨恐不鳴坡集僧爽白雞養二十餘年常立座側聽經不辭風雨君園富稻非爭食省樹枝深未許棲但得青蠅無亂響丨丨丨丨五更啼宋景文公雞答勇頸怒目舟子抱雞來雄雞峙髙岸側行初取勢俯啄示無憚先鳴氣益振奮擊心非愞丨丨毛逆張丨丨皆喪膽血流何所爭死鬬欲充玩應當激猛毅豈獨専晨旦勝酒人自私粒食誰爾喚緬懷彼興魏傍睨當衰漢徒然驅國衆曽靡救時難羣雄自苦戰九鈎邀平亂寶玉歸大姦干戈託竒算從來小資大聊用一長嘆梅都官介甲金戈峥嶸已丨季氏丨更以黃丨飾兩戈雖有英心甘鬬死其如紀渻木雞何文與可髙冠沉羽昻然大雄雞丨丨紫丨丨星占太史局樹接丞相府知時不失晦得食曽呼五幸無終夜鳴須逢人起舞前人竟不一鳴王店有郵吏養雞殊可笑昻然處髙柵不肯以時呌官有宿此者西征待初曉雞丨丨丨丨問吏吏以告云此最荒絶左右悉蓬藋狐狸占為宅恣橫不可道前此三四雞一一遭其暴尋聲即知處盡獲爪牙禍自後始得此其若有人教東方或未明羣醜尚騰趠此雞但鈴結直伺太陽耀雖然謂失旦似得保身要官曰此何用不然則宜糶不見不鳴雁先死蓋自召天下已明白豈假更喧閙徒爾廢稻粱曽莫知所報吏云官言是但願勿嘲誚知時本在人此物何足校文與可和提刑度支王店雞不待羣鳴立馬階除待一鳴何如春夢不聞聲固知雞口羞牛後丨丨丨丨已可驚陳無已次韻秦覯聞雞空忩聽爾談耆舊漂流漢汝南長鳴獨與古無慙蕭蕭風雨思君子欲倚丨丨丨丨丨劉原父養雞鑿垣安其棲茅茨一畝宫生理備委曲雞豚自古昔豢養隨世俗丨丨丨丨丨幼長何碌碌旦出四散飛暮還相從宿頗哀鴻鵲輩飲啄不充腹何事萬里遊羈旅傷局促衣冠相嫵媚庭廡更追逐未悟糞土非豈知稻粱辱物理常有此人情苦不足安見避世翁頽然卧空谷前人鵝格物總論鵝有蒼白二色緑眼黃啄紅掌按爾雅一名舒鴈一名􅕯善鬬好啖蛇多溪毒處養此以辟之或者又云鵝不食生蟲今本革言鵝子亦噉蚯蚓輩可知已事類殺鵝與食陳仲子處於於陵他日歸則有餽其兄生鵝者已頻蹙曰惡用是鶂鶂者為哉他日其母丨是丨也丨之丨其兄自外至曰是鶂鶂之肉也出而哇之孟滕下烹鵝以待晋王羲之性愛鵝㑹稽有姥養一鵝善鳴求市未能得遂携親友就觀姥聞羲之將至丨丨丨丨之羲之嘆惜彌日舉羣相贈山隂道士好養鵝羲之往觀焉意甚恱固求市之道士云為寫道德經當丨丨丨丨耳羲之寫畢籠鵝而去殘炙見惠劉毅家在京口酷貧嘗與鄉曲士大夫往東堂共射時庾恱為司徒右長史要府僚佐出東堂毅已先至因與恱相問曰身苦貧躓營一遊甚難君如意人無處不可為適豈能以堂見讓恱不答時衆人並避惟毅留射如故恱厨饌甚盛不以及毅毅既不去恱甚不歡毅又相問曰身今未得子鵝豈能以丨丨丨丨恱又不答及毅貴奏解恱將軍都督官深相挫辱恱不得志疽發背少日而死聞鐘聽講淨影寺沙門慧逺講經初在鄉養一鵝常隨逺聽經及逺入京留在寺晝夜鳴噪不止僧徒送入京至此寺大門放之自然知逺房便入馴狎每丨講經即入堂伏聽若聞泛說他事則鳴翔而出如是六年忽哀呌庭宇不肯入堂二旬而逺卒寺內有逺碑亦述其事兩京記食炙知色符朗丨鵝丨丨黑白之處人不信既而試之果然秦記卿禮有過何逺為永康令人甚稱之太守王彬巡屬縣諸縣皆盛供帳以待焉至永康逺獨設糗水而已彬去逺送之拜斗酒雙鵝而别彬戲曰丨丨丨丨陸納將不為古人所笑乎畜生乞汝庾信自建康遁歸江陵湘東王固賜妾徐氏妾與任掞私通掞欲求之無致言者信庭前有一蒼鵝乃繫書於鵝頸信視之乃掞啓遂題紙尾曰丨丨丨丨三國典略賜食鵝炙齊髙帝引江淹入中書省先丨酒丨淹素能飲啖食丨丨垂盡飲酒數升文詔亦辦置表鵝頸唐髙祖義兵至河東隋將堯君素城守時圍甚急君素乃為木鵝丨丨於頸具論時勢浮之黃河下河陽守者得之達於東都越王侗見而嘆息金鵝實酒帝伐遼還使祿東贊上書曰髙麗恃逺弗率於禮天子自將度遼墮城陷陳指日凱旋雖鴈飛于天無此之速夫鵝猶鴈也臣請治黃丨為丨以獻其髙九尺中實酒三斛吐蕃傳木鵝撞車荔非元禮李光弼守河陽周摯攻北城以車千乘載丨丨丨丨麾兵填塹鵝亂軍聲唐元和間季訴襲蔡州兵至懸􅋃城夜半雪甚城旁有丨鳴池訴令驚擊之以丨丨丨鵝充庖闕中和四年臨淮漣水民家鷹化為鵝而弗能游鷹以鷙而闕臣象也丨雖毛羽清潔而飛不能逺無搏擊之用丨丨丨闕孔氏帖漁人聽聲濟南有鵝浦有丨丨居水側常丨鵝丨其中有鈴聲甚清亮候之見一鵝咽頸有鈴羅得之項上有銅鈴綴以銀鎖隱起元鼎元年字酉陽雜俎書生入籠許彥山行遇一書生卧路側云足痛求寄鵝籠中彥戲言許之丨丨便丨丨中籠亦不廣書生與兩鵝並坐負之不覺重至其一樹下書生乃出籠去同上一鵝十萬錢唐僖宗好鬬鵝數幸六王宅興慶池與諸王鬬鵝丨丨至丨丨丨田令孜傳詩集眠沙丨丨卧水自成羣曲岸殘陽極浦雲那解將心憐孔翠羇雌長共故羣分李商隱在野臘後閒行村舍邊黃鵝清水真可憐何時散亂隨新草永日淹留丨丨田無事羣鵝遮水際爭來引頸逼人前風吹楚澤蒹葭暮看下寒溪逐去船李郢白於雲房相西亭鵝一羣眠沙泛浦丨丨丨鳳凰池上應回首為報籠隨王右軍黃似酒鵝兒丨丨丨對酒愛新鵝引頸嗔船過無行亂眼多翅開遭宿雨力小困滄波客散層城暮狐狸奈若何並杜乏鳴鴈姿我非好鵝癖爾丨丨丨丨安得免沸鼎淡然遊清池見生不忍食深情固在斯能自逺飛去無念稻粱為吕逺似胸中字駕鵝引頸回丨我丨丨丨右軍亦能來不為口腹事山谷池上一雙學書丨丨丨丨鵝宛頸相追筆意多皆為涪翁赴湯鼎主人言汝不能歌注世以婢子為鴨謂貴夫鴨而賤夫鵝黃山谷鴨格物總論鴨家鶩也雄者緑頭文翅紅腳或蒼腳雌者遍身黃色然又有純白者皆自呼其名但雄者其聲小闕舒鳬野闕鳬鶩事類雞伏丨丨鴨卵雛成入水雞母隨岸呼之雛出而不隨母鴨雞異類能相隨也風俗通貍闕室庶人祐養鬬鴨未幾丨丨鴨四十餘絶其去及敗牽連諫死者凡四十餘人孔氏帖供鴨鈎看闕買鴨浮光多美鴨太原少尹樊千里丨百隻置後池雲林志用此何為闕孫慮於堂前作鬬鴨欄頗施小巧陸遜正侯宜勤覽經典丨丨丨丨慮即毁之吳志斃之奈何陸龜蒙居震澤之南巨積莊有鬭鴨一欄有驛使過挾彈斃其尤者龜蒙手一表本云此鴨能作人語待附蘇州上進使者丨丨丨丨使者恐酬以槖中金俟其稍說方倩語之猶不能呼其名使人僨且笑拂袖上馬復召之還其金曰吾戲耳李雍鬭鴨賦唼喋爭食䙰褷帶雛詩集惱比鄰不教鵝鴨丨丨丨杜無泥滓花鴨丨丨丨階前每緩行羽毛知獨異黑白太分明不覺羣心妬休牽衆騖驚稻粱沾汝在作意莫先鳴杜戀地回丨丨羣鴨丨韓曲池眠丨丨丨乳鴨李賀潔白盡夭姿已斷鷹隼猜仍叨主人惠丨丨丨丨丨雙栖莫相忌張文濳毰毸浴清水䙰褷出短蒲丨丨丨丨丨物忌太鮮明何妨染泥滓司馬溫公羽冷難伏卵春鴨日浮波丨丨丨丨丨嘗荷雞飽時託以雞窠暖三旬鷇既拆乳毛寒脛短雞寧辨其雛翅擁情欵欵一日向水涯所禀殊未斷泛然去中流雞呼心意亂人之茍異懹負義不足算有志在養育勿論報德限梅都官古今合璧事類備要别集卷八十五
