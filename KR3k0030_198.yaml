body:
  text: 古今合璧事類備要續集卷四十八宋謝維新撰人事門書問事理發揮通諸人之㗲㗲者莫如言傳千里之忞忞者莫如書雖書亦所以載言也盖言不能以對面而後託書以傳焉此書問之所不容無也然言心聲也書心畫也君子觀其書可不知其人乎事類簡牒丨丨也說文簡畢丨謂之丨爾雅書編簡丨丨也釋名書版牘丨丨也說文札節丨丨也編之如櫛齒相比也釋名槧版丨丨長三尺即牘牒也同名斷木丨丨為槧論衡編竹丨以丨簡寫之尚書序作書伊尹丨丨書太甲上藏書成王有病周公旦自揃其爪以沉於河曰云云乃書而藏之記室蒙恬𫝊寓書子西子産丨丨於丨丨以告宣子左襄二十四詒書子産鄭人鑄刑書晉叔向使詒子産書曰始吾有虞於子今則已矣云云復書曰若吾子之言僑不才不能及子孫吾以救世也既不承命敢忘大惠左昭六復書叔向見上文起刀筆吏蕭何曹參丨秦丨丨丨注刀所以削書古者用簡牘故吏皆以刀筆隨本贊奉咫尺書廣武君謂韓信曰君若使一介丨丨丨之丨史記中涓受書萬石君為丨丨丨丨謁本𫝊冒頓遺書漢匈奴丨丨髙后時丨丨曰孤僨之君生於沮澤之中長於平野牛馬之域數至邊境願遊中國陛下獨立孤僨獨居兩主不樂無以自娛願以所有易其所無髙后報書曰單于不忘敝邑賜之以書敝邑恐懼退日自圖年老氣衰齒髮墮落行步失度單于過聽不足以自汚敝邑無罪宜在見赦雁足繫帛蘇武留匈奴十九年昭帝與匈奴和親求武等詭言武死後漢使至常惠夜見教言天子射上林中得丨丨有丨丨書言武等在某澤中使者如惠語讓單于單于驚謝曰武等實在武等始以强壯出及還鬚髪盡白鹿車載泥鄧訓故吏知訓好青泥封書從黎陽步推丨丨丨青丨至上谷遺訓東漢記寄聲謝我趙廣漢為京兆尹嘗記召湖都亭長西至界上界上亭長戲曰為我多問趙君亭長至廣漢謂曰界上亭長丨丨丨丨何以不為致問亭長叩頭服實有之注多問趙君者言殷勤若今人千萬問訊也藏弆為榮陳遵性善書與人尺牘主皆丨丨以丨丨請求不敢逆所到衣冠懐之本𫝊憑几口占陳遵為河南太守嘗遣從史西召善書吏於前治私書謝京師親故丨丨丨丨書數百封親踈各有意賜書手迹後漢馬融與竇伯向書曰孟陵奴來丨丨見丨丨歡喜本𫝊數予湯書漢陳咸滯於郡守時王音輔政信用陳湯咸丨賂遺湯予書曰即蒙子公湯字力得入帝城死不恨本𫝊正得祖意禰衡為江夏太守黄祖作書記輕重踈密各得體宜祖持其手曰處士此丨丨丨丨如祖腹中所欲言也買菜求益後漢侯霸使西曹侯子道奉報書求報光曰我手不能書乃口授之使者嫌少可更足之光曰丨丨乎丨丨乎後嚴光𫝊注苦掾無書後漢王良東海人為司空司直妻子不入官舍布被瓦器司徒史鮑恢到東海過候良家妻布裙曵柴從田中歸恢曰我司徒人也故來受書妻曰妾是也丨丨丨丨恢歎息去每得父書吳顧愷以孝悌㢘正聞於鄉黨丨丨丨丨灑掃整衣服設几案舒書其上拜跪讀之毎句應諾畢復再拜欲使兒讀劉荆州嘗自作書欲與孫伯符以示禰正平正平嗤之曰如是之作丨丨孫郎帳下丨丨之耶將使張子布見乎典畧不過十字蜀王平為鎮北大將軍生長戎旅手不能書所識丨丨丨丨而口授作書皆有意理使人讀史備知大義賢於十部劉𢎞每有興發手書守相丁寧款密所以人皆感悦爭赴之咸曰得劉公一紙書丨丨丨丨從事晉懐紀不作草書席豫與兄弟屬書丨丨丨丨三國劉廙曰尊卑有分不敢修草書不為置郵殷羨為豫章太守都下人士因其致書百餘函行次石頭皆投之水中曰沉者自沉浮者自浮殷洪喬丨丨丨書丨浩傳竟達空函桓温將以殷浩為尚書令遣書告之浩欣然許焉答書慮有繆誤開閉者十數丨丨丨丨大忤温意由是遂絶不喜作書嵇康作絶交書曰丨丨丨丨而人間多事堆案盈几不相詶答則犯教傷義欲自勉則不能久非簡可呼王凌面縛水次遥謂司馬宣王曰卿直以折簡召我我何敢不至而乃引軍來乎宣王曰以卿丨折丨丨丨故也魏畧具自申叙殷浩致書於簡文丨丨丨丨小紙勿報何曽好學博聞武帝拜為太尉性奢侈人以丨丨為書敕記室丨丨善效人書魏鍾㑹與鄧艾平蜀艾先入成都㑹丨丨丨丨艾草表白事皆易其言令悖傲矜伐又毁文王報書手作以疑之莫不手答陶侃為荆州逺近書䟽丨丨丨丨善於尺牘徐湛之丨丨丨丨音詞流暢沈約宋書用小却字晉人帖中往往丨丨丨丨其意猶言少退也南史宋武帝紀帝疾召太子戒之曰謝誨數從征伐頗識機變若有同異必此人也小却可以㑹稽汀州處之首云死罪閣下諸帖十卷淳化中朝廷所集其中多弔喪問疾人多疑之比見刋誤乃唐國子祭酒李注所撰短啓出於晉宋兵革之間時國禁書䟽非弔喪問疾不得輒行尺牘故王羲之丨丨丨丨違制令故也且啓事論兵皆短而緘貴易於隱藏雜志應對不廢劉穆之與朱齡石於齊武帝坐並答書自旦至日中穆之得百函齡石得八十函而穆之丨丨丨丨南史報答皆宜後周中書監盧柔太祖引為行臺即對掌機密時汝潁之間多義舉來附書翰徃返日丨餘百牒柔隨機丨丨丨合事號郇雲體唐韋陟常以五采牋為書記使侍妾主之其牋答受意而已皆有楷法陟唯署名自謂所書陟字若五朶雲時人慕之丨丨公五丨丨號柳篋子柳璨遷左拾遺公卿朝野託為箋奏時譽以其博洽目為丨丨丨重疊别紙盧光啓受知於租庸張濬毎致書凢一事别為一紙朝士效之葢丨丨丨丨自光啓千里對面髙祖曰若人機識實宜委任毎為吾兒陳事丨丨外猶丨丨語房𤣥齡𫝊有古人節劉晏任權潘炎乃其壻雖書䟽報答未嘗輒開時稱丨丨丨丨得無名書王鍔節度淮南嘗丨丨丨丨納鞾中俄取他書焚之異日因小罪并以所告窮驗示衆以為神明目為飛奴張九齡家養羣鴿每與親知書繫鴿足上飛往投之丨丨丨丨王仁裕開元遺事號曰苦海鄭光業有一巨皮箱凡投贄有可嗤者即投其中丨丨丨丨摭言安事辨證錢徽為禮部段文昌李紳以書託徽徽不從二人怒奏徽取士以私坐貶江州或勸出文昌紳私書自直徽曰茍無愧於心丨丨丨丨勅子弟焚書求書先容顧雲大順中同羊昭業等修史時劉子長僕射有清名丨髙逢休諫議丨為丨丨雲潛啓閲之凡一幅並不言雲但云昭業等擬將一尺三寸汗脚踏他龍尾道雲歎息而已摭言以文求序杜牧之作李賀集序云太和五年十月中半夜時舍外有疾呼𫝊緘者某曰必有異亟取火來及發之果集賢學士院沈公書一道曰吾亡友李賀且死丨其丨丨丨偶得家書王筠久在沙場一日丨丨丨丨曰抵得萬金耳祗作報書李翺答獨孤舍人書所不數附書者性頗慵懶便一切畫斷丨丨丨丨隴西李稹李稹常以爵位不如族望官至刺史與人書唯稱丨丨丨丨李肇國史補漢上題衿段成式與温庭筠等唱和往來書目之為丨丨丨丨大抵多閨闥中情昵事政府無書司馬光薦劉安世充舘職謂安世曰光居閒足下問訊不絶光居丨丨足下獨丨丨此光之所以相薦也府坐得書丁崖州多智數在海外有一販夫輒與數百緍任其貨易嵗久不問商人疑其意且欲報之曰相公或使之雖死不避丁乃預計南京春宴必有中使在坐因作表丐還封為書投府坐約商人曰汝必於是日到仍須宴次投之商人欣躍而去至則如其言丨丨丨丨俱不敢發欲匿之又中使已見遂因中使回附奏自是得移光州其表云雖遷陵之罪大念立主之功多談圃平日私書王荆公薦吕惠卿為叅知政事惠卿既得位遂叛荆公出荆公丨丨丨丨有曰無使齊年知齊年謂馮公京蓋荆公與馮公皆辛酉生又曰無使上知神宗始不恱荆公矣聞見録即投之澗侍講胡安定公瑗布衣時與孫明復石守道同讀書泰山攻苦食淡終夜不寢一坐十年不歸得家問見上有平安二字丨丨丨丨中不復展讀便擲於地張文潛毎見親友書無月日丨丨丨丨更不復觀書須先思本朝滎陽呂公希哲嘗言凡與交遊書聞其父祖知名於世者須避其名諱凡作丨丨丨丨及書之於几然後作書文潞公與故舊欵接一坐末嘗犯其父祖名諱雜志書不以聞方諫議謹言為侍御史時丁謂貶遣謹言籍其家得士大夫丨多干請關通者悉焚之丨丨丨世稱其長者厚徳録吳質答曹子建書信到奉所惠貺發函伸紙是何文采之巨麗而慰喻之綢繆乎曹植答吳季冲書得所來信文采委曲曄若春華瀏若清風周𢎞讓答王褒書蒼雁赬鯉時流尺素清風朗月俱寄相思韓退之答侯喜書欲致一書問足下并自舒其所懐含意連辭將發復已卒不能成就其說柳宗元答山人書黄鵠一去青冥無極安得不憑豐隆愬飛廉以寄聲於寥廓邪韓退之答山人書足下猶復以為可教貶損道徳乃至手筆簡之辭義髙逺足下於故舊之道得矣詩集代兼金愧無雜佩贈良訊丨丨丨陸非尺牘誰謂情可盡盡書丨丨丨謝逺家信歸今朝聽聲喜丨丨必應丨梁蕭紀詠書札光開緘丨丨丨杜甫抵萬金烽火連三月家書丨丨丨杜直千金相思千萬里一書丨丨丨李寄不達有弟皆羈旅無家問死生丨書多丨丨况乃未休兵杜秦中寄惟頻丨書丨在丨無恡簡與繒韓八九讀折書丨丨丨淚落千萬行元稹三過讀久客多枉友朋書素書一月凡一束虛名但蒙寒暄問泛愛不救溝壑辱齒落未是無心人舌存恥作窮途哭道州手札適復至紙長要自丨丨丨盈把那須滄海珠入懐本寄崑山玉杜甫暮秋枉裴道州手札率爾遣興憑客寄去丨遊丨丨來為問家書杜無使來欲問平生丨丨丨杜寄歸雁征人去日慇懃囑歸雁來時早寄書樂府寄雙燕袖中有短書願丨丨飛丨江淹雁無情厚禄故人書斷絶北書不至丨丨丨杜燕寄書紫丨西飛欲丨丨顧况開緘見面丨丨宛丨諫議丨盧仝開緘發封母付書至妻寄衣丨丨丨丨淚㾗稀韓吏把封書敲門驚晝睡問報睦州吏手丨一丨丨上有皇甫字拆書放床頭涕與淚垂泗昏昏還就枕惘惘夢相值悲哉無竒術安得生兩翅韓愈寄皇甫湜君寄邊書征人去年昔遼水夜得邊書字盈紙揮刀就燭裁紅綺結作同心答千里丨丨丨丨書莫絶妾答同心心自結同心再解心不離書字頻㸔字愁滅結成一夜和淚封貯書只在懐袖中莫如書字固難乆願學同心長可同長孫佐輔答邊信瘴海雙魚丨丨寄丨丨中宵達我居兩行燈下淚一紙嶺南書地說炎蒸極人稱老病餘殷勤報賈傅莫共酒杯踈盧綸夜中得循州趙司馬侍郎書因寄迴使衡陽歸雁丨丨有丨丨他日更傳音山谷上有加餐食青青河畔草綿綿思逺道逺道不可思夙昔夢見之夢見在我傍忽覺在他鄉他鄉各異縣展轉不相見枯桑知天風海水知天寒入門各自媚誰肯相為言客從逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書長跪讀素書書中竟何如丨丨丨丨丨下有長相憶古詩飲馬長城窟行下言乆離别孟冬寒風起北風何慘慄愁多知夜長仰觀衆星列三五明月滿四五蟾兎缺客從逺方來遺我一書札上言長相思丨丨丨丨丨置書懐袖中三嵗字不滅一心抱區區懼君不識察古樂府懐袖且三年爾有烏拆書相招琴溪飲手把尺素書如天落雲錦讀罷向空笑疑君在我前長吟字不滅丨丨丨丨丨李白酬答十五見招開緘方一笑青鳥海上來今朝發何處口銜雲錦書與我忽飛去鳥去凌紫煙書留綺窻前丨丨丨丨丨乃是故人𫝊故人深相朂憶我勞心曲離居在咸陽三見秦草緑置書雙袖間引領不暫閒長望杳難見浮雲横逺山李太白代書答元丹丘㸔取北來魚深慚長者轍重得故人書云云雖無南過雁丨丨丨丨丨杜酬韋韶州寄忽因西飛禽丨丨丨丨丨贈我以瓊琚韋應物未有北來鴻一别今何向三年信不通不因書字倦丨丨丨丨丨陳無已因人問消息多問黄居士終年欠一書丨丨丨丨丨有使報何如陳無己送楊禁侍兼寄山谷𫝊語報平安故園東望路漫漫雙袖龍鍾淚不乾馬上相逢無紙筆憑君丨丨丨丨丨岑參逢入京使書來細作行但知家裏人無恙不用丨丨丨丨丨一百八盤攜手上至今猶夢繞羊腸黄魯直寄元明緘題不必㸔蔣堂侍郎告老姑蘇有僧將遊錢塘求吕濟叔書公作詩乃云告老於君惟掩户年來無事老江干吾師莫訝無書去閑慢丨丨丨丨丨青瑣髙議山谷求書得詩不寄一行書安穩髙詹事兵戈乆索居時來知宦達嵗晚莫情踈天上多鴻雁人間足鯉魚相㸔過半月丨丨丨丨丨杜甫寄髙詹事不寄一枝梅章子厚與劉子先嘗有場屋之舊又頗相善子厚居京口子先守姑蘇以新醖洞庭春寄之子厚答詩曰洞霄宫裏一閒人東府西樞舊老臣多謝姑蘇賢太守殷勤分送洞庭春其後契闊十年子厚拜相亦不通問寄書誚其相忘逺引之意子先以詩謝曰故人天上有書來責我疎愚喚不迴兩處共瞻千里月十年丨丨丨丨丨塵泥自與雲霄隔駑馬難追徳驥才莫謂無心向門下也曽終夕望三台公得詩大喜即召為宰屬遂遷户部侍郎不如一見面關塞寒雪欲寄音燕雁拂天河鯉沉百書丨丨丨丨丨幾日歸來兩慰心山谷寄叔父夷仲古今合璧事類備要續集卷四十八
