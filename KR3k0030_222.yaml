body:
  text: 古今合璧事類備要别集卷十六宋謝維新撰宫室門樓閣宫室舉要說文樓重屋亦閣也劉熙釋名以為牖户諸射孔髙明覿逺慺慺然也門上為之以望則謂之譙門而其羙麗譙則謂之麗譙此樓閣之説不可不知也事類感鳯蕭史善吹簫秦穆公有女字弄玉妻焉教弄玉吹簫作鳯鳴公為作鳯樓夫妻居其上數日丨丨鳯来集一夕皆隨鳯去列仙傳墜鼠虞氏者梁之富人登髙樓臨大路擊摶樓上而笑有俠客在下飛鳶適丨腐丨中俠客曰虞氏富樂已乆吾不侵犯乃以此辱我此而不報非也遂率其屬以滅其家列子井幹漢武帝造丨丨音寒樓髙五十丈在建章宫中丨丨垣也孔白帖麗譙魏武有丨丨樓同上仙人居公孫卿言丨丨好樓丨黄帝時為十二樓以候神人武帝於是作飛廉觀三輔黄圖延壽超漢甘丨丨以良家子為吏丨踰羽林亭彭氏造黄昌為郡守陟縣丨丨丨樓臨道昌行道彭氏婦人輒升樓而觀昌乃殺之綠珠墜石崇有妓曰丨丨孫秀求之不得秀矯詔収崇丨丨因自投樓下而死名曰芳塵石虎起樓四十丈以雜寳異香為屑風作則揚之丨丨丨丨拾遺記望見紫氣張華善天文解望氣與雷焕夜登樓丨丨丨丨起牛斗間華曰何氣也雷孔章曰其寳劔氣乎乗夜共登庾亮字元規在武昌諸佐吏殷浩之徒丨秋丨佳月丨丨南樓不覺庾至諸人將起避亮曰諸君少住老子於此興復不淺便據胡床與浩等談詠乗月清嘯劉琨在晉嘗為胡騎所圍數重琨乃丨丨登樓丨丨賊聞之皆悽然長歎遂棄􅮚走焉奴令更直蜀周羣作小樓多令丨更直於上視天纔有一氣即白羣仙游亦迷隋煬帝開汴河泛艦為江都之逰浙人項昇進新宫圖帝愛之即如圖營建既成幸之曰使真丨丨此丨當自丨可日之曰迷樓書曰花蕚唐元宗於宮西南置樓其西書曰丨丨相輝之樓南曰勤政務本之樓圖其險要李徳裕徙劔南西川乃建籌邊樓按南道山川險要與蠻相入者丨之左西道與吐蕃接者丨之右其部落衆寡饋饆逺近曲折咸具乃召習邊事者與之指畫商計凡虜之情偽盡知之作三重樓長寜公主韋庶人所生取西京髙士廉第左金吾衛故營合為宅右屬都城左頫大道丨丨丨丨以慿觀建七重樓西域泥婆羅宫中丨丨丨丨覆銅瓦楹棟皆大琲雜寳四隅置銅槽下有金龍口激水仰注槽中作望仙樓武宗會昌五年六月甲申丨丨丨丨于神策軍本紀造迎仙樓髙駢丨丨丨等丨皆度髙八十尺飾以金珠璖玉侍女衣羽衣新聲度曲以擬鈞天薫齋其上祈與仙接孔帖造以聚書田𢎞正丨樓丨丨丨萬餘卷託云占星吕用之建百尺樓丨丨丨丨實窺伺城中之有變者宴丹霄樓大宗丨丨丨丨魏徵傳作紫雲樓鄭注帝嘗詠杜甫曲江辭有宫殿千門語意天寳時環江有觀榭宫室聞注言即詔兩神策治曲江昆明丨丨丨丨采霞亭詔公卿得列舍堤上登氾水樓孔述睿梁侍中孫髙祝徳詔事竇建徳為中書侍郎嘗草檄毁薄太宗賊平執丨丨丨丨責曰爾以檄謗我云何對曰犬吠非其主帝怒曰賊乃主邪命壯士推殞樓下登齊雲樓五代韓建昭宗幸其鎮丨丨丨丨西北顧望京師作菩薩蠻三章以思歸其卒章曰野煙生碧樹陌上行人去安得有英雄迎歸大内中酒酌與従臣悲歌泣下宴長寜樓李輔國初上皇每置酒丨丨丨丨南俯大道因裴囬觀覽或父老過之皆拜舞乃去宴廣逺樓王君㚟明皇丨君㚟及妻夏於丨丨丨為五鳯樓梁太祖即位羅紹威取魏良材丨丨丨丨為七鳯樓五代于闐有樓曰七鳯樓造以祈祥劉闢以太一舎于蜀乃丨大樓丨丨丨思以避暑唐莊宗患宫中暑濕不可居丨得髙樓丨丨丨宦官進曰臣見長安全盛時大明興慶宫樓閣百數今大内不及故時卿相家莊宗曰吾富有天下豈不能作一樓乃遣宫苑使王允平營之宦官曰郭崇韜眉頭不伸常為租庸惜財用陛下雖欲有作其可得乎莊宗乃使人問崇韜崇韜曰願陛下旡忘創業之難常如河上則可使繁暑坐變清涼莊宗黙然終遣允平起樓盻盻念舊張尚書有愛妓曰丨丨尚書既沒張氏舊第有小樓名燕子丨丨丨丨愛而不嫁居是樓十餘年幽獨悵然居易集貴戚泥樓李景讓為御史大夫丨丨有看街樓閣皆丨之畏其糾彈也金華子都人幔閣詔丨丨列繒樓丨丨裴矩傳閣阿閣黄帝時白鳯巢于丨丨帝主世紀堯閣未央宫有丨丨三秦記藏秘書石渠閣蕭何造其下礲石為渠以導水若今御溝因為閣名所藏入闗所得秦之圖籍至成帝又於此丨丨丨焉三輔黄圖圖功臣麒麟閣蕭何造漢書宣帝思股肱之羙乃丨丨丨霍光等十一人於上同上劉向校書天禄閣蕭何造丨丨於成帝之末丨丨天禄閣専精覃思夜有老人著黄衣植青藜杖叩閣而進見向暗中獨坐誦書老父乃吹杖端煙然因以見向授五行洪範之文恐詞說繁廣忘之乃裂裳及紳以記其言至曙而去請問姓名云我是太一之精天帝聞卯金之子有博學者下而觀焉乃出懐中竹牒有天文地圖之書曰余畧授子焉至子歆従授其術向亦不悟此人焉同上揚雄校書丨丨以符命自立時丨丨於天禄閣上治獄使者欲収雄獄従閣上自投下幾死京師語曰惟寂惟寞自投于閣髙臨江渚滕王丨閣丨丨丨佩玉鳴鑾罷歌舞下臨肆區河間王子晦初晦第起觀閣丨丨丨丨其人規晦曰庻人不及以禮然家室之私不願外窺人將辭公晦驚遽命毁撤之臨春三閣陳後主起臨春結綺望春三閣皆以沉檀香木為之臨春後主自居之結綺張麗華居之望春以龔孔二妃居之夾殿二閣唐工部丹鳯門内中正殿曰含元殿丨丨丨丨左曰翔鸞右曰棲鳯注與殿飛廊相接唐六典賔友賞花楊國忠用沈木為閣檀香為欄檻以麝香乳香飾土為泥飾於閣壁謂之四香閣每於春時木芍藥盛開衆丨丨於閣上丨丨禁中沈香之亭殆不侔此壯麗天寳遺事羣臣賦詩席豫嘗登朝元閣賦詩丨丨屬和帝以豫詩最工蔣乂補賛徳宗嘗登凌煙閣視左壁頽剥題文漫缺行纔數字命録以問宰相無能知者召蔣乂至荅曰此聖厯中侍臣圖賛帝前口誦以補不失一字本傳景先獻賦許丨丨神龍初東都造眼慈閣丨丨丨丨孔帖華埒西京長寜公主魏王泰故第泰薨王丏得之亭閣丨詭丨丨丨孔帖創表殊勲昭宗末中書奏西京舊有淩煙閣圖畫功臣今遷都洛陽合議修建副元帥梁王勲庸冠世仍請煙閣之側别丨一閣以丨丨丨舊史沈光李白酒樓記有唐咸通辛巳嵗正月壬午吳興沈光過任城題李白酒樓夫觸强者靦緬而不發乗險者帖薾而不進潰毒者隠忍而不能就其鍼砭摶猛者遲疑而不能盡其膽勇而復視其强者弱之險者夷之毒者甘之猛者柔之信乎酒之作於人也如是翰林李公太白聰明才韻至今為天下唱首業術匡救天必賦之矣致其君如古帝王進其臣如古藥石揮直刄以血其邪者推義轂以輦其正者豈凴酒而作也凴酒而作者强非真勇太白既以峭訐矯時之狀不得大用流斥齊魯眼明耳聰恐貽顛踣故狎弄杯觴沉溺麴蘖耳一滛雅目混黒白或酒醒䄂健視聴鋭發振筆著紙乃以聰明移於月露風雲使之涓潔飛動移於草木禽魚使之妍茂騫騰移於邊情閨思使之壮氣激人離情溢目移於幽岩䆳谷使之遼歴物外爽人精魄移於車馬弓矢悲憤酣歌使之馳騁决發如睍幽并而失意放懐尽見窮通焉而嗚呼太白觸文之强乗文之險湏文之毒搏文之猛作狎弄杯觴沉溺麴蘖是真塞其聰翳其明醒則移於賦詠冝乎醉而生醉至死余徐思之使太白露其聰决其明移於行事强犯時忌其不得醉而生死也當骨鯁忠赤逓有其人収其逸才萃於太白至于齊魯結構凌雲者無限獨斯樓也廣不踰數席瓦缺椽蠧雖樵兒牧竪過亦指之曰李白常醉于此矣王勃滕閣詩序南昌故郡洪都新府星分翼軫地接衡廬襟三江而帶五湖控蠻荆而引甌越物華天寳龍光射牛斗之墟人傑地靈徐孺下陳蕃之榻雄州霧列俊采星馳臺隍枕夷夏之交賓主盡東南之美都督閻公之雅望棨㦸遥臨宇文新州之懿範襜帷暫駐十旬休暇勝友如雲千里逢迎髙朋滿座騰蛟起鳯孟學士之詞宗紫電清霜王將軍之武庫家君作宰路出名區童子何知躬逢勝餞時維九月序屬三秋潦水浄而寒潭清煙光凝而暮山紫儼驂騑於上路訪風景於崇阿臨帝子之長洲得仙人之舊館層臺聳翠上出重霄飛閣流丹下臨無地鶴汀鳬渚窮島嶼之縈迴桂殿蘭宫列岡巒之體勢披綉闥俯雕甍山原曠其盈視川澤紆其駭矚閭閻撲地鐘鳴鼎食之家舸艦迷津青雀黄龍之軸虹銷雨霽彩散雲衢落霞與孤鶩齊飛秋水共長天一色漁舟唱晩響窮彭蠡之濵鴈陣驚寒聲斷衡陽之浦遥吟俯暢逸興遄飛爽籟發而清風生纎歌凝而白雲遏睢園緑竹氣淩彭澤之樽鄴水朱華光照臨川之筆四羙具二難并窮睇盼於中天極嬉遊於暇日天髙地逈覺宇宙之無窮興盡悲来識盈虚之有數望長安於日下指吳會於雲間地勢極而南溟深天柱髙而北辰逺闗山難越誰悲失路之人萍水相逢盡是他鄉之客懐帝閽而不見奉宣室以何年嗟乎時運不齊命途多舛馮唐易老李廣難封屈賈誼於長沙非無聖主竄梁鴻於海曲豈乏明時所賴君子安貧逹人知命老當益壯寜知白首之心窮且益堅不墜青雲之志酌貪泉而覺爽處涸轍以猶歡北海雖賒扶揺可接東隅已逝桑榆非晩孟嘗髙潔空懐報國之心阮籍倡狂豈效窮途之哭勃三尺㣲命一介書生無路請纓䓁中軍之弱冠有懐投筆慕宗慤之長風捨簪笏於百齡奉晨昬於萬里非謝家之寳樹接孟氏之芳鄰他日趨庭叨陪鯉對今晨捧𬒮喜托龍門楊意不逢撫凌雲而自惜鍾期既遇奏流水以何慙嗚呼勝地不常盛筵難再蘭亭已矣梓澤丘墟臨别贈言幸承恩於偉餞登髙作賦是所望於羣公敢竭鄙懐恭疏短引一言均賦四韻俱成滕王髙閣臨江渚佩玉鳴鸞罷歌舞畫棟朝飛南浦雲珠簾暮捲西山雨閒雲潭影日悠悠物换星移幾度秋閣中帝子今何在檻外長江空自流李白登龍興閣序夫槿榮芳園蟬嘯珍木盖紀乎南火之月也可以處臺榭居髙明吾之友惟順此意也遂卜精勝得乎龍興留寳馬於門外步金梯于閣上漸出軒户遐瞻雲天睛山翠達而四合暮江碧流而一色屈指鄉路還疑夢中開襟危欄宛若空外嗚呼屈宋長逝無堪與言起予者誰得我二季當揮爾鳯藻飛子鸞觴與白雲老兄俱莫負古人也韓愈修滕王閣記愈少時則聞江南多臨觀之美而滕王閣為第一有瑰偉絶特之稱及得三王所為序賦記等壮其文辭益欲往一觀而讀之以忘吾憂繫官于朝願莫之遂十四年以言斥守揭揚便道取疾以至海上又不得過南昌而觀所謂滕王閣者其冬以天子進大號加恩區内移刺袁州於南昌為屬邑私喜幸自以為當得躬詣大府受約束於下執事及其無事且還儻得一至其處竊寄目償所願焉至州之七月詔以中書舍人太原王公為御史中丞觀察江南西道洪江饒䖍吉信撫袁悉屬治所八州之人前所不便及所願欲而不得者公至之日皆罷行之大者驛聞小者立變春施秋殺陽開隂閉令脩於户庭數日之間而人自得於湖山千里之外吾雖欲出意見論利害聴命於幕下而吾州乃無一事可假而行者又安得捨己所事以勤館人則滕王閣又無因而至焉士其嵗九月人屯浹和公與監軍使燕於此閣文武賔皆與在席酒半合辭言曰此屋不修且壊前公為従事此邦適治新之公所為文實書在壁今三十年而公来為邦伯適及朞月公又来燕于上人胡得無情哉公應曰諾於是棟楹梁桷板檻之屬腐黑撓折者易新之盖瓦級甎之缺者赤白之漫漶不鮮者治之則已無侈前人無廢後觀工既訖功公以衆飲而賞焉以書命愈曰子尚其為我記之愈既以未得造觀為歎竊喜載名其上辭列三王之次有榮耀焉乃不辭而成公命某江山之好登望之樂雖老矣如獲従公遊尚能為公賦之元和十五年十月某日袁州刺史韓愈記范希文岳陽樓記慶厯四年春滕子京謫守巴陵郡越明年政通人和百廢俱興乃重修岳陽樓増其舊制刻唐賢今人詩賦于其上屬予作文以記之予觀夫巴陵勝狀在洞庭一湖銜逺山吞長江浩浩蕩蕩横無際涯朝暉夕陰氣象萬千此則岳陽樓之大觀也前人之述備矣然則北通巫峽南極瀟湘遷客騷人多會于此覽物之情得無異乎若夫霪雨霏霏連月不開陰風怒號濁浪排空日星隠耀山岳潜形商旅不行檣傾檝摧薄暮冥冥虎嘯猿啼登斯樓也則有去國懐鄉憂纔畏譏滿目蕭然感極而悲者矣至若春和景明波瀾不驚上下天光一碧萬頃沙鷗翔集錦鱗遊泳岸芷汀蘭郁郁青青而或長烟一空皓月千里浮光耀金静影沉璧漁歌互荅此樂何極登斯樓也則有心曠神怡寵辱皆忘把酒臨風其喜洋洋者矣物嗟夫予嘗求古仁人之心或異二者之為何哉不以喜不以己悲居廟堂之髙則憂其民處江湖之逺則憂其君是進亦憂而退亦憂然則何時而樂邪其必曰先天下之憂而憂後天下之樂而樂歟噫微斯人吾誰與歸時六年九月二十五日記葉正則勝賞樓記凡城邑據江海陂澤之勝皆即以為賞盖物常聚於大矣吳興三靣切太湖沙足稍峻偉浸可几席盡也然四水會於霅溪鏡波藍浪梁㭒動揺而靚粧袨服之倒影互為散合衆流放於荷葉浦沉清浮緑鵠鵷棲止而綺花文蓼之羅生無有際畔特嶺聨亘巧石綿給頗抑湖之重勢而蔽遮其風寒故其人意安而氣和舸經舫緯艇㑹舟縷細聲窈眇豪唱激超宛轉一州間随地而勝隨勝而賞無不得所求具區雖大不暇觀也夫豈娛於耳目之狹者易徇而迪於心志之廣者難親耶亦其神靈爽異所獨鍾彼雖大而此不小也國風廢王道息栁惲以江南曲名於時古之採蘋莒盈而釡熟薦於六宗禮至敬也主於女少教至行也惲之採蘋徒詠而已其思蕩其志滛豈召南本指哉然而詞人藝士争共誇述郡之勝賞由是而始敞堂奥館益盛於今太守趙君既新白蘋亭復樓於側其言曰清風水遁碧瀾山隠兼之者斯樓也力能見湖而不為者民方與我游於麗密之内我不敢與民縱於靑冥之外也雖然以道講民見湖可哉白居易論栁憚樂山水多髙情不聞善政案史惲守吳興前後十年其政清静吏民所懐病去而乞留千餘人居易偶不詳也政在平平在乆加以不倦瘠土可使沃窮閻可使富况蒲魚豐衍明山媚水素稱勝絶乎君初至損稅直増學廩親不葬女不嫁廢疾無醫死無松棺者助之恐不及可謂有志矣惜其暫不得乆近惠不及逺利丨也故録以次惲君名某字漢英詩集十二梯江上樓髙丨丨丨梯梯登遍與雲齊人従别浦經年去天向平蕪盡處低劉禹錫百尺墻鸛雀樓前丨丨丨煙汀雲樹共茫茫漢家簫鼔沉流水魏國山河半夕陽事去千年猶恨短愁来一日即知長風煙併在相思處滿目非春亦自傷李白十二重鳯樓丨丨丨鮑明逺千里目白日依山盡黄河入海流欲窮丨丨丨更上一層樓望長安一為遷客去長沙西丨丨丨不見家黄鶴樓中吹玉笛江城五月落梅花李白下楊州故人西辭黄鶴樓煙花三月丨丨丨孤帆逺影碧空盡惟見長江天際流同前此地空餘昔人已乗白雲去丨丨丨丨黄鶴樓黄鶴一去不復返白雲千載空悠悠晴川歴歴漢陽樹芳草凄凄鸚鵡洲日暮鄉闗何處是煙波江上使人愁崔顥懐古悲歌髙樓丨丨動丨丨鸛雀今無野燕過樹隔五陵秋色早水連三晉夕陽多漁人遺火成寒燒牧笛吹風起夜波十載重來值揺落天涯歸計欲如何張喬崔顥題詩眼前有景道不得丨丨丨丨在上頭李白太真梳洗寢殿相連端正樓太丨丨丨樓上頭元稹連昌宫辭碧瓦朱甍孤城西北起髙樓丨丨丨丨照城郭杜甫越王樓歌金䆫珠箔丨丨夾綉户丨丨懸瓊鈎飛梯綠雲中極目散我憂散花樓詩野水無人渡髙樓聊引望杏杏一川平丨丨丨丨丨孤舟盡日横荒村生斷靄古寺語流鶯舊業遥清渭沉思忽自驚冦公凖明月無人管四顧山光接水光凭欄十里芰荷香清風丨丨丨丨丨併作南樓一味凉山谷南樓書事眼力為疆界無限青山散不収雲奔浪捲入簾鈎直將丨丨丨丨丨何啻人間萬户侯坡聚逺樓門外有塵寰聞說樓居似地仙不知丨丨丨丨丨幽人隠几寂無語心在飛鴻滅沒間同上凌太虚飛閣丨丨丨晨躋欝峥嶸韋應物步行月閣道丨丨丨李白上之回璘石靣江閣丨丨丨杜水閣朝霽倚天半髙閣丨丨丨杜牧張好之詩靣春築丨丨丨飛閣山谷終日對嵩峯三十六丨丨丨髙閣歐横空敞丨丨丨新閣髙處絶炎氛野逈長風入天凉秋氣分凴欄生逸想投迹逺人羣終憶茒簷外靑山多白雲朱元晦倚晩晴癡兒了却公家事快閣東西丨丨丨落木干山天逺大澄江一道月分明朱絃已為佳人絶青眼聊因美酒横萬里歸船弄長笛此心吾得與鷗盟山谷古今合璧事類備要别集卷十六
