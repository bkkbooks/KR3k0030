body:
  text: 古今合璧事類備要别集卷二十八宋謝維新撰花卉門梨花格物叢話春二三月百花開盡始見梨花此花靚艷寒香自甘寂寞罕見賞識於人然又一種千葉花賦姿逈别何造物者變態又若是竒且巧歟然此等之花尚未離其類也又有一種名曰棠梨花亦不小結實甚大如指亦以梨名或者曰以同類云事類簮花壓帽梁緒梨花時折花簮之壓損帽簷祥雲志為花洗粧洛陽梨花時人多携酒其下曰丨梨丨丨丨唐餘録衆賀梨花武帝嘗季秋出梨花示諸臣宰相以為祥丨丨曰陛下德被草木故秋再花周家仁及行葦之比杜景佺曰隂陽不相奪倫瀆則為災故曰冬無愆陽夏無伏隂春無凄風秋無苦雨今草木黃落而梨復花瀆隂陽也唐史酒號梨花杭州其俗釀丨趂梨花開時熟則丨丨丨春故白公杭州春望云紅䄂織簾誇柿蒂青旗沽酒趂梨花長慶集詩集微雨濕獨卧郡齊寥落意隔簾丨丨丨梨花吕溫白雪香梨花丨丨丨杜甫三月雪丨丨丨連夜未應傷物華只緣春欲盡留著伴梨花同上一枝春玉容寂寞淚闌于梨花丨丨丨帶雨白樂天河陽苑列茂丨丨丨蓄此濫觴隈翻黃秋沃若落素春徘徊沈約洛陽城丨丨丨外清明節百花零落梨花發今日相逢瘴海頭共驚爛熳開正月韓退之院落無人梨花丨丨丨丨處竊取寧王玉笛吹張祐曲水飄香丨丨丨丨去不歸梨花落盡成秋苑李賀艷淨香寒丨丨如籠月丨丨未逐風桃花徒㸃地剛𬒳笑顔紅錢起粧靚光凝共飲梨花下梨花插滿頭清香來玉樹白蟻泛金甌丨丨青娥妬丨丨粉蝶羞年年寒食夜吟繞若為柔穆清叔徘徊繞樹紅梨千葉愛者誰白髮郎君心好竒丨丨丨丨不忍折一日千匝看無時夷陵寂寞千山裏地逺氣偏時節遲歐陽公惆悵東欄梨花淡白栁深青栁絮飛時花滿城丨丨丨丨一株雪人生能得幾清明東坡真妃含淚朝來經雨低含淚競寫真妃寂寞粧王忠獻荀令薰香繽紛紫雪浮鬚細冷淡清姿奪玉光剛笑何郎曽傅粉絶憐丨丨愛薰香院南溪看花思實沙頭十日春當日誰手種風飄香未改雪壓枝自重丨丨丨食丨知味少人共霜降百工休把酒約寬縱山谷當花期實丨春丨盛時雪滿山前後常丨摘秋丨穰穰落吾手南豐樂府朱鉛退盡素肌應怯餘寒艷陽占盡青蕪地樊川照日靈關遮路殘紅斂避傳火樓臺妬花風雨長門深閉亞簾櫳半濕一枝在手偏勾引黃昏淚别有風前月底布繁隂滿園歌吹丨丨丨丨潘妃却酒昭君乍起雪浪翻空粉裳縞夜不成春意恨玉容不見瓊英謾好與何人比水龍吟周美成丹青傳得鏤雪成花擅作蕊愛伴秋千搖曵春風裏翠䄂年年寒食淚為伊牽惹愁無際幽艷偏宜春雨細紅粉闌于有個人相似鈿合金叉誰與寄丨丨丨丨凄凉意蝶戀花王道輔畫黎花杏花格物藂話杏者東方嵗星之精葉似梅而花差大其色微紅至春二三月始開妖嬈艷麗比桃花伯仲間亦可愛也故騷人詠物與梅並言則曰梅杏蓋取其葉之似也與桃並言則曰桃杏蓋取其花之近也杏之云乎豈凡花之比乎然又有多葉者又有黃花者真絶品也故併及之事類緇帷林孔子遊丨丨之丨坐杏壇之上弟子讀書孔子弦歌鼓琴莊碎錦坊裴晉公午橋莊有文杏百株其處立丨丨丨曹林異景探花宴神龍以來杏園宴後於慈恩寺塔題名唐進士杏花園初會謂之丨丨丨以少俊之人為探花使托言聞花歎太平園中有杏數株每至爛開大宴一株則令一娼倚其傍立歌曰爭春開元中宴罷夜闌或丨丨有丨息之聲楊州事跡花皆發唐明皇時遇春雨初晴命取羯鼓臨軒縱擊回視栁杏皆發上笑曰此不喚我作天公可乎遺事花無恙徐州古豐縣朱陳村有杏花一百二十里近有人為德慶戶曹道過此村見丨尚丨丨也昔東坡詩云我是朱陳舊使君勸農曽入杏花村如今風物那堪話縣吏催錢夜打門詩話詩集紅拆霞杏初丨丨白樂天紅交丨簇丨枝杏李賀煙鬚丨濕杏花丨李賀雨花清明時節丨紛紛路上行人欲斷魂借問酒家何處有牧童遙指杏丨村古選詩艷奪霞杏丨桃花丨晚丨唐房彥謙光鬪日日日春丨丨丨光山城斜路杏花香李啇隱壓枝紅大道青樓御苑東玉欄仙杏丨丨丨韋莊滿枝紅知有杏園無路入馬前惆悵丨丨丨溫飛卿粉啼消春意竟相妬杏花應最嬌紅輕欲愁殺丨薄似丨丨願作南華夢翩翩繞此條吳融色盡明寒艷芳姿丨丨丨辛夤遜萬樹紅丨丨丨邉杏新開一夜風滿園深淺色照在碧波中王涯雙株紅居鄰北郭古寺空杏花丨丨能白丨曲江滿園不可到看此聊避雨與風云云豈如此樹一來玩若在京國情何窮今旦胡為忽惆悵萬片飄泊隨西東明年更發應更好道人莫忘鄰家翁昌黎集淡泊開杏園丨丨丨花鳯白樂天爛熳開春色方盈野枝枝綻曉英依稀映村塢丨丨丨山城好折待賔侣金盤襯紅瓊周庾信舊燒枝獨開新塹底半露丨丨丨張籍半在枝杏園欲去春遲遲正是風吹狼籍時近西數樹猶堪醉半落春風丨丨丨樂天花開處明日期何處杏丨丨丨村樂天花下人怪君把酒偏惆悵曽是正元丨丨丨自别花來多少事東風二十四回春前人每年開趙村紅杏丨丨丨十五年來看幾回前人曲江望年年丨丨丨花發即經過未飲心先醉臨風笑倍多劉禹鍚插花人莫怪杏花憔悴去滿城多少丨丨丨杜牧登龍客不覺梅欺雪輕黃照碧池小桃新謝後雙燕却來時香屬丨丨丨煙籠宿蝶枝臨軒須邈取風雨昜離披鄭谷活色生香丨丨丨丨第一流手中移得近青樓誰知艷性終相負亂向春風笑不休薛龍殷紅淡白丨丨鄙桃艷丨丨笑梨花落處飄微霰繁時疊亂霞孫何花開能幾二十餘年作逐臣歸來還見曲江春遊人莫笑白頭醉老醉丨丨丨丨人劉夢得花間共醉劉郎不用閒惆悵且作丨丨丨丨人等是貞元舊朝士幾員同見太和春元微之花連錦帳丨開丨丨丨姚台蘂粘紅蠟艷丨丨丨丨仙葩總薄羅梅聖俞池倒寫真月淡斜分影丨清丨丨丨文與可枝如㸃酥北園山杏皆髙株新丨放花丨丨丨前人枝密作圑紅芳紫蕚怯春寒蓓蕾粘丨丨丨丨王元之道白非白丨丨丨真丨言紅不若紅請君紅白外别眼看天工楊廷秀文杏道竒不竒不信東君也有私如何偏寵杏花枝於中更出紅千葉且丨化工丨丨丨紅紅白白曽見輕條撼雪飛一暄曝出萬餘枝從今日日須來看丨到丨丨丨丨時白白紅紅丨丨丨丨一樹春晴光耀眼看難真無端昨夜蕭蕭雨紅錦全機卸作茵並前人流鶯偷宿惟有丨丨偏稱意夜來丨丨最繁枝王元之期蝶成圑蓓蕾枝梢血㸃乾粉紅腮頰露春寒不禁煙雨輕欺著只好亭臺愛借看偎桞傍桃斜欲墜等鶯丨丨猛丨丨京城巷陌新晴後買得風流更一般林和靖不施朱粉桃紅梨白莫爭春素態妖姿雨未勻日暮墻頭試回首丨丨丨丨是東鄰王元之淺注胭脂丨丨丨丨剪絳綃獨將妖艷冠花曹春心自得東皇意逺勝𤣥都觀裏桃朱淑真春寒著蘂踈江梅已過杏花初尚怯丨丨丨丨丨待得重來幾枝在半隨蝶翅半蜂鬚吕東萊春力奔花梢紅藍細細糝晴色紫玉森森走膩條枯梗折枝無一寸併驅丨丨丨丨丨楊誠齊多杏葉天工剪刻零露泣月蘂溫風散晴葩丨丨子不睡連夜開此花芳心誰丨丨天質自清華惱客香無有弄粧影橫斜中山古戰國殺氣浮髙牙叢臺餘袨服昜水雄悲笳自從此花開玉肌洗塵沙坐令遊俠窟化作溫柔家我老念江海不飲空咨嗟劉郎歸何日紅桃爍流霞明年花開時舉酒望三巴東坡黃花杏仙人種植顆顆粧成藥竈牙白邉開處近彤霞直宜相閣栽培物更是丨丨丨丨花髙行出羣猶仰慕香名超格合洪誇諸賢繼有尋芳㑹欲奉歡遊决自差韓忠獻樂府把花看東風約略吹羅幕一簾細雨春隂薄試丨杏丨丨濕紅嬌暮寒佳人雙玉枕烘醉鴛鴦錦抑得最繁枝暖香生翠幃菩薩蠻張于湖任紅欹小桃零落春將半雙燕却來池館名園相倚初開繁杏一枝遙見竹外斜穿栁間深映粉愁香怨丨丨丨宋玉墻頭千里曽牽惹人腸斷常記山城科路噴清香日遲風暖春隂挫後馬前惆悵滿枝粧淺深院簾垂雨愁人處碎紅千片料明年更發多應更好約鄰翁看水龍吟朝次膺胭脂滿地春寂寞長安古道東風惡丨丨丨丨杏花零落臂消不耐黃金約天寒猶怯春衫薄春衫薄不禁揾淚為君彈却憶秦娥康伯可碎紅千片紅杏一枝遙見凝露粉愁香怨吹開吹謝任春風恨流鶯不能拘管雕曲池連夜雨緑水上丨丨丨丨直擬移來向深院任零不孤雙眼憶漢月杜安世古今合璧事類備要别集卷二十八
