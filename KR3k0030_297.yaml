body:
  text: 古今合璧事類備要别集卷九十一宋謝維新撰蟲豸門蜜蜂附蜾螺螟蛉格物總論蜜蜂三種皆一日兩衙一種在林木上作房一種在人家作窠其蜂甚小微黃蜜皆濃美然蜜採花而成花之色不同而蜜之色隨異或白或黃或赤凡三色視其花之色也一種黑色以虻作房巖崖髙峻之處非人迹可到其蜜名石蜜又名崖蜜人以長竿刺出多者至三四石味醶色緑比他蜜尤勝蠟其蜜底煮治乃成其他大黃蜂比蜜蜂差大在人屋及大木間作房大如巨鐘其中數百層土人採之須以物蔽體捍其毒螫以火煙薰散方敢緣崖木斷其蒂一房蜂子或五六斗至一石以鹽炒乾味佳蓋所謂􅫴􅕕也上蜂子即穴居者最大蓋馬蜂也亦名曰蟺土人亦啖其子皆蠆尾能螫手又一種蛒蜂窠在褰鼻蛇穴下故毒螫倍諸蜂蠆中手足輒斷落中心胸則圮裂其他蜂中人方不能療須特禁制之又一種細腰蜂名蜾螺名蒲盧又名蠮螉觀其所負不但螟蛉或蟢子磔而斃之因産一小卵於其上俟其卵化而成形漸食所負之蟲久乃寖大生翼飛去其聲似云類我類我者事類壺蜂有蜜謂之丨丨方言玄蜂丨丨若壺楚辭稷蜂丨丨不爇韓詩外傳取蜂繫衣尹吉甫子伯竒事後母至孝母丨丨去毒丨於丨上伯竒前欲去之母便大呼曰伯竒牽我吉甫見疑伯竒自死列女傳有蜂附車豫章巖豐字孟侯為郡主簿太守賈萌舉兵欲誅王莽丨飛丨丨萌丨衡豐諫以為不祥之徵萌不從果見殺謝承後漢書飛還入口葛仙翁與客對食客曰食畢當先作一竒戲食未竟仙翁曰諸公得無欲見乎即吐出口中飯盡成飛蜂滿屋或集客身莫不震肅但自不螫人耳良久仙翁乃張口見蜂皆丨丨丨丨中成飯食之别傳鑽他故紙神瓚禪師見蜂子投忩紙求出師曰世界如許廣濶不肯出丨丨丨丨傳燈録顧况採蠟章採蠟怨奢也荒巖之間有以纊蒙其身攀藤造險及有羣蜂肆毒哀呼不應則上捨藤而下沈壑採採者蠟于泉石兮煌煌中堂列華燭兮新歌善舞弦柱促兮荒巖之人自取其毒兮王元之蜂記商於兔和寺多蜂寺僧為豫言之事甚具豫因問蜂之有王其狀何若曰其色青蒼差大於常蜂耳問胡以服其衆曰王無毒不識其他問王之所處曰窠之始營必造一臺其大如栗俗謂之王臺王居其上且生子其中或三或五不常其數王之子盡復為王矣嵗分其族而去山氓患蜂之分也以棘刺關于王臺則王之子盡死而蜂不析矣又曰蜂之分也或團如罌或鋪如扇擁其王而去王之所在蜂不敢螫失其王則潰亂不可嚮邇凡取其蜜不可多多則蜂飢而不蕃又不可少少則蜂墮而不作豫愛其王之無毒似以德而王者又愛其王之子盡復為王似一姓一君上下有定分者也又愛其王之所在蜂不敢螫似法令之明也又愛其取之得中似什一而稅也至于刺王之臺使絶其息不仁之甚矣故總而記云蜾裸蠮螉蜾裸蒲盧即今之細腰蜂也一名丨丨爾雅蒲盧夫政也者丨丨也注丨丨蜾裸謂土蜂也螟蛉桑蟲也取桑蟲之子去而變化之以成為己子政之於百姓若丨丨之于桑蟲然記中庸負螟螟蛉有子蜾裸丨之詩祝蛉螟蛉之子殪而逢蜾裸丨之曰類我類我久則肖之矣楊歐陽公螟蛉賦爰有桑蟲實曰螟蛉與夫蜾裸異類殊形負以為子祝之以聲其子感之朝夕而成嗟夫人子父母所生父祝之言子莫之聽父傳之業子莫克成父沒母死身覆位傾嗚呼為人孰與蟲靈人不如蟲曷以人稱詩集蝶休離恨沙苑華池爛熳通後門前檻思無窮宓妃腰細才勝露趙后身輕欲倚風紅壁寂寥崖蜜盡碧簾迢遞霧巢空青陵粉丨丨丨丨長定相逢二月中李商隱蜜為誰甜不論平地與山尖無限風光盡被沾採得百花成丨後到頭辛苦丨丨丨羅隱中有王子空中蜂隊如車輪丨丨丨丨蜂中尊分房減口未有處野老解與蜂語言前人傅蜜延客住後人秉艾催客奔布囊包裹閙如市坌入竹屋新且完小忩出入旋知路幽圃首夏花正繁相逢處處夢儔侶共入新室長子孫今年活計知尚淺蜜蠟未暇分主人明年少割助和藥慙愧野老知利源蘇子由收蜜蜂大勝監河真珠為漿玊為醴六月田夫汗流泚不知春甕自生春蠟為耕耘花作米一日小沸魚吐沫二日眩轉清光活三日開甕香滿城快㵼銀瓶不須撥百錢一斗濃無聲甘露微濁醍醐清君不見南國採花蜂似雨天教釀酒醉先生先生年來窮至骨問人乞米何曽得世間萬事真悠悠蜜蜂丨丨丨丨侯坡公集西南道士楊世昌善作蜜酒絶醇釅余得其法作此歌遺之多為造化使燕銜芹根泥蜂掇花上蘂帶雨兩股飛所取日能幾調和露與英凝甘滑於髓天寒百蟲蟄割房霜在七燕已成雛歸蜂憂凍餒死乃見萬物心丨丨丨丨丨楊廷秀蜜蜂不食人間倉蜜蜂丨丨丨丨丨玊露為酒花為糧作蜜不忙採花忙蜜成猶帶百花香蜜成萬蜂不敢嘗要輸蜜國供蜂王蜂王未及享人已割蜜房老叨吏來搜我室老蜂無味祗有滓幼蜂初化未成兒老叨火攻不知止既入我室取我子楊廷秀蝶附鬼蝶格物總論蝴蝶色白而背青一名蛺蝶一名野蛾一名風蝶江東謂之撻末又一種大如蝙蝠或黑色或赤色或青斑名曰鳳子一名鳳車一名鬼車生江南橘樹間橘蟲所化也事類莊周夢昔丨丨丨為蝴蝶栩栩然蝴蝶不知周也俄然覺則蘧蘧然周也不知周之夢為蝴蝶蝴蝶之為周周與蝴蝶必有分矣此謂物化莊子韓憑化見鴛鴦門注魏收驚北齊丨丨嘗在洛京輕薄尤甚人號為丨蛺蝶周昉畫丨丨有丨撲蝶圖一卷藝文志鬼蝶翅有金眼衛公得峽中蝴蝶翅濶四寸餘深褐色每丨上丨三箇丨丨雜俎詩集昭君覔葉葉復翻翻斜陽對側門蘆花唯有白栁絮可能溫西子尋遺殿丨丨丨故村年年芳物盡來别敗蘭蓀李商隱漢王精丨丨刀筆丨寫爾逼天生舞巧何妨急飛髙所恨輕野田黃雀慮山館主人情此物那堪作莊周夢不成羅隱得花心飛來繡戶隂穿過畫樓深重傅秦臺粉輕塗漢殿金相兼唯栁絮所丨是丨丨可要凌孤客邀為子夜吟李商隱宿花房尋艷復尋香似間還似忙暖煙沈蕙徑微雨丨丨丨書幌輕隨夢歌樓誤採粧王孫深屬意繡入舞衣裳鄭谷萬古貞魂青陵臺畔日光斜丨丨丨丨倚暮霞莫許韓憑為蛺蝶等間飛上别枝花李義山八字宮眉壽陽公主嫁時粧丨丨丨丨捧額黃見我佯羞頻照影不知身屬冶遊郎翅薄於繒丨輕於粉丨丨丨長被花牽不自勝若信莊周尚非夢豈能投死為韓憑王介甫翅輕糊粉鶯欲綿蠻栁欲隂露叢煙蕚恣搜尋那將兩丨丨丨丨凝遍千花百卉心晏元獻細眉雙聳丨丨丨丨敵秋毫苒苒芳園日幾遭清宿露花應自得暖爭風絮欲相髙情人發久魂猶在傲吏齊來夢亦勞間掩遺編苦堪恨不并香草入離騷林和靖白日雙飛暖翅玉羅薄香鬚金線微青春二三月丨丨一丨丨露重休深入風髙且暫歸南園芳樹下燕雀最多機陶弼生計託流芳撲粉曽過宋玊墻一身丨丨丨丨丨不須長結東風願秋菊春蘭各有香宋景文公薄命寄餘菲粉蝶爾何知秋深尚戲飛憐渠迷節物猶若弄春暉露葉今非昔霜叢疇可依籬邊菊無幾丨丨丨丨丨李方敬秋蝶花心何處無休歇飛近素霜時滅沒去銜紅葉共悠揚丨丨丨丨丨丨丨野蝶雙翎花樹荒石曼卿秋蝶品物多情總屬伊香鬚粉翅暖爭飛丨丨丨丨丨丨丨上國萬家風月夜樓臺取意宿花枝晏元獻鬼蝶雙眉捲鐵絲丨丨丨丨丨兩翅暈金碧初來花爭妍忽去鬼無迹蘇子瞻古今合璧事類備要别集卷九十一
