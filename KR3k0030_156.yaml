body:
  text: 古今合璧事類備要續集卷六宋謝維新撰家世門慶胄歷代源流胄系也所以系諸人之後也積善之家必有餘慶從古而然故自髙陽氏髙辛氏始曰才子左文十八唐虞夏皆曰胄子書舜典商曰後裔微子之命周曰貴遊周禮漢曰功臣苗裔漢功臣表魏晉而下有所謂豪俊公子魏志注貴介公子劉伶酒德頌家世餘緒顔之推家訓至于唐有所謂公卿子弟選舉志李德裕我本朝晏元獻公又曰丨丨類要皆是也君子不可無考焉事類濟美見前集有子門種德咎繇邁而丨丨兮德茂乎英六邁行也種布也英六並國名咎繇能布行道德子孫茂盛封於英六帝王世紀象賢殷王元子惟稽古崇德丨丨統承先王修其禮物作賓于王家與國咸休永世無窮書微子之命踐猷爾惟丨修厥丨舊有令聞同上席寵兹殷庶士丨丨惟舊書君陳祚胤周公之丨丨也左世子諸侯丨丨世國注象賢也記王制公子公之子曰丨丨公之孫曰公孫左注有後臧孫逹其丨丨於魯乎左隱必大晉畢萬封於魏小偃曰畢萬之後丨丨左閔葛藟丨丨王族刺平王也云云綿綿丨丨在河之滸詩椒聊丨丨刺晉昭公也君子見沃之盛強能修其政知其蕃衍盛大子孫將有晉國焉詩析薪見不肖子門喬木所謂故國者非謂有丨丨之謂也有世臣之謂也孟光有耀陳厲公生敬仲其少也陳侯以筮之曰此其代陳有國乎不在此其在異國非此其身在其子孫丨逺而自他丨丨者也左莊二十德在人欒書雖弒厲公然人被其德不以為惡傳曰武子之丨丨丨如周人之思召公也國語注又士鞅曰欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之丨丨丨左成十五年侍祠侯張奮釋通純之子襲封武始侯來朝上引見宣平殿應對合旨顯宗異其才以為丨丨丨注各以子孫侍祠封侯解見鄧禹傳保家主韋康字元將誕字仲將孔融與康父端書曰前日元將來淵才亮茂雅度𢎞毅偉世之器也昨日仲將又來懿性昌實文思篤誠丨丨之丨也不意雙珠近出老蚌甚珍貴之魏志功臣之裔封爵之誓曰使河如帶泰山如厲國以永寧爰及苗裔史功臣表公族之苗大司農李固丨丨丨丨忠正不撓其以為太尉漢官銘功彛鼎孝宣時美陽得罪京兆尹上議曰按鼎有刻書曰王命尸臣官此栒邑尸主事之臣賜臣新蔽雕代尸臣拜手稽首曰敢揚天子丕顯休命此殆周之所以褒賜大臣子孫大臣子孫刻銘其先功藏之于宗廟也漢郊祀志受學金華班伯紹丨丨於丨丨殿中數年金華之業絶出與王許子弟為羣在綺繻紈袴之間非所好也漢班氏敘傳貴介公子漢書郡將郎君劉祐為郡主簿郡將少子出錢令市果實祐實悉買筆書具與之白丨丨丨丨年可入小學而但傲狠逺近謂明府無過庭之教郡將使就祐受經遂成學業後漢封爵襲號金欽幸得以通經術超擢侍帷幄重蒙厚恩丨丨丨丨漢書甄邯傳傳龜襲紫恂恂苖胤丨丨丨丨注公侯皆紫綬金印龜紐後隂識傳三男一經鄧禹有丨丨各命通丨丨其閨門之訓皆可為後世法袁氏漢紀四世清德楊震之後丨丨並為三公彪字文光清德海內所瞻子孫必興見後集大理卿門子孫有封鄧后訓之女也叔父浮言常聞活千人者丨丨丨丨兄訓為謁者使修舊河歲活幾千人天道可信家必蒙福后祖父太尉禹歡曰吾嘗將百萬之衆未嘗妄殺一人其後世必有興者後漢圓源育珠凡水其方折者有玉其丨育者有珠尸子藍田種玉諸葛恪字元遜瑾之長子少有才名發藻歧嶷辨論應機莫與為對孫權見而竒之瑾曰丨丨生王真不虛也吳志佩紫香囊見姪類注衣刺文袴謝尚好丨丨丨丨諸父責之因而自改門中龍虎王僧虔戒子書曰吾丨丨優者為丨鳳劣者為丨豹失蔭之後豈龍武之議哉况吾不能為汝蔭正應各自弩力耳冗中騏驥虎豹之丨生此丨丨丨劉夢得考章銘襁褓補官李義甫諸子雖丨丨皆丨清丨本傳寶劒立勳長慶元年幽鎮亂殺田𢎞正訴為魏博節度以其玉帶丨丨丨大丨吾又以此平蔡今鎮人叛逆公冝用此剪之元翼承命感激乃以劒及帶令於軍中少習臺閣朝廷顯官須公卿子弟為之何者丨丨其業目熟朝廷事丨丨之儀不教而自成寒士縱有出人之才固不能間習也選舉志李德裕猶有簪笏文宗以拾遺魏謨徴之裔孫頗竒待之謨纍諫事轉起居舍人紫宸中謝上曰卿家有舊書詔否對曰比多失墜唯簪笏存上曰進來鄭覃曰在人不在笏上曰覃不解朕意比甘棠之義非笏而已將退又戒之曰事有不當即奏論謨曰臣今為史官不敢踰越曰兩省但合論事勿拘此言唐紀授六品官本朝沈義倫盧多遜為相其子起家即授水部員外郎後遂以為常今之朝奉郎是也吕文穆為相當任子奏曰臣忝甲科及第釋褐止受六品京官况天下才能老於巖冗不能沾寸祿者多矣今臣男始離襁褓膺此寵命恐罹譴責乞以臣釋褐時所授官捕之自是止丨丨丨京丨因為定制以至今日揮塵録棄科舉學吕希哲字原明少好學王安石謂之曰士未官而專科舉者為貧也有官矣而復事科舉是僥幸冨貴利達而已學者不由也希哲遂丨丨丨一意古丨不求恩澤王文正公旦以儉約率勵子弟使在冨貴不知為驕侈兄子睦欲舉進士公曰吾嘗以太甚為懼其可與寒士爭進至其薨也子素猶未官遺表丨丨丨丨神道碑分銜左右元祐間范純仁當國一時科舉取人多得豪傑之士范純仁病公卿家子弟或不知書言於朝乃於有無出身人丨位上帶丨丨丨字以分優劣欲公卿子弟知向學故為是以奬勸焉地胄髙華王家龍鳳王僧虔戒子書曰丨丨門中優者如丨丨劣者猶虎豹南史謝庭蘭玉見前集姪類注代作宗師伏氏自東西京相襲為名儒以取爵位中興而桓氏尤盛自榮至典世宗其道父子兄弟丨丨丨丨世習朝儀王恱之字少明父納之有青箱世謂之王氏青箱丨練丨丨丨並諳江左舊事儒術傳家韋孟以詩禮傳楚而郊廟之制卒正於元成鄭玄以箋注師漢而禪代之儀卒集於小同賈誼以經術起而嘉最好學盧植以儒學用而諶為祭酒韓文父子繼美以夷簡為父而公著為子其謀謨事業有大過人者蓋夷簡善任智而公著則特立以成天下之務賢於父逺矣吕文靖地胄不稱寵榮之位貴遊子弟未免襁褓而加青紫之秩才勝衣冠而居丨丨丨丨抱朴子膏粱之性欒伯請公族大夫公曰夫丨丨丨丨難止也賈逵曰膏肉之肥者粱食之精者言食肥美者率驕放其性難止也左降在皂𨽻叔向曰欒郤胥原狐續慶伯丨丨丨丨注八姓舊臣之族皂𨽻晉臣也左生為愍𨽻漢功臣苗裔或絶或乏丨丨丨丨死為轉尸功臣表不肖敗家唐李績謂其弟弼曰我見房玄齡杜如晦辛苦立門户悉為丨丨子丨之我今以子孫付汝可慎察有不厲言行交非其類急榜殺之毋令人笑吾猶笑房杜不道破産唐盧坦為河南尉時杜黃裳為尹召坦曰某家子與惡人遊破産盍察之坦曰凡居官亷雖大臣無厚蓄其能積財者必剝下以致之如子孫善守是天富不道之家不若恣其不道以歸於人黃裳驚其言持紙閣筆唐苖晉卿知選以張奭為第一奭中丞倚之子本無學術議者囂然玄宗覆實奭丨丨終日筆不得下人謂之曳白晉卿坐貶假手賦詩梁朝全盛之時貴遊子弟多無學術至於諺云上車不落則著作體中何如則祕書無不燻衣剃面傅粉施朱駕長簷車踉髙齒屐坐棊子方褥憑班絲隱囊列器玩於左右從容出入望若神仙明經求第則雇人答䇿三九公宴則丨丨丨丨當爾之時亦快士也及離亂之後朝市遷革銓衡選舉非復曩者之親當路秉權不見昔時之黨求諸身而無所得施之世而無所用被褐而無裘珠失皮而露質兀若枯木泊若窮流蹗躅戎馬之間轉死溝壑之際當爾之時誠駑才也顔氏家訓彈絲弄竹太祖曰資蔭子弟但能在家丨琵琶弄絲竹豈能治民於是不許親民石介聖政録飽食醉酒士大夫恥涉農商羞務工伎射既不能穿札筆則才記姓名丨丨丨丨忽忽無事以此銷日以此終年或因家世餘緒得一階半級便自為足全忘修學及有吉凶大事議論得失蒙然張口如坐雲霧公私宴集談古賦詩塞默低頭欠伸而已有識傍觀代其入地何惜數年勤學長受一生愧辱哉顔氏家訓自矜門第李績外孫溫造天子愛其才問造家世及年造對曰臣五世祖大雅外五世祖李績臣犬馬之齒三十有二帝竒之方相從姪唐有士人姓方好矜門地但姓方貴人必認為親或戲之曰豐邑方相何親遽曰再從伯父戲者笑曰既是方相姪只堪嚇鬼豐邑坊造凶器出賣之所也朝野僉載魏文正笏白居易馬北平王韓退之詩集素風家襲韋平身業文丨丨清白至今貧劉禹錫朱輪一家何啻十丨丨諸父雙飛秉大鈞同上與李庚赴選家風東山子弟丨丨在歐陽修世胄欎欎澗底松離離山上苗以彼徑寸莖蔭此百尺條丨丨躡髙位英俊沉下僚地勢使之然由來非一朝金張藉舊業七葉珥漢貂馮唐豈不偉白首不見招左思詠史朱門悲哉為儒者力學不知疲讀書眼欲暗秉筆手生胝下士方一第成名良苦遲縱有宦達者兩鬢已成絲可憐少壯日適在窮賤時丈夫老且病焉用冨貴為沉沉丨丨宅中有乳臭兒狀貌如婦人光明膏粱肥手不把書卷身不擐戎衣二十襲封爵門承勳戚資春來日日出服御何輕肥朝從博徒飲暮有娼樓期平封還酒債堆金選蛾眉聲色狗馬外其餘一無知山苗與澗松地勢隨髙卑古來無奈何非獨君傷悲白居易行錦衣丨丨鮮華手擎鶻間行氣兒多輕忽稼穡艱難總不知五帝三王是何物外史蜀王建僭位遊龍華禪院召僧貫休口誦近詩時諸王貴戚皆侍坐休欲諷之因誦公子行聖賢後歷代源流論聖賢之後者當不徒以苗裔論也盍亦考論諸家學之何如耳故元凱皆以才子稱可以無忝於乃祖乃父至於不才者如所謂渾敦窮竒檮杌叨餮者非不為人後也然滔滔者皆是亦何足録哉今周孔以前姑未暇論盍相與遡周孔之裔而言之可乎周公者文王之子也而其子乂有伯禽能不墜周公之業孔子殷湯之後也而其子又有伯魚能不忘孔子之學然而猶未也周公之後有僖公亦能復周公之宇故詩人頌之孔子之後有子思亦能述孔子之言故傳者詳之凡所以推其後者無非取其不墜於家學也豈但以區區之苗裔論哉故孟子魯族孟孫之後則於周公為無忝孔順者孔子六世孫孔鮒者孔子七世孫孔襄九世安國十一世若此者則於孔子為無玷不然則伯鯀也丹朱也商均也其先世何如人哉其先世黃帝也然黃帝之子二十五人而得姓者十有四今其後豈果無人哉吾是以知其不當徒以苖裔論也明矣事類伊陟伊尹之子贊於巫咸作咸乂四篇書併注君陳周公之子禮記周公命丨丨分正東郊伯禽就國丨丨丨封於魯周公曰子之丨慎毋以國驕人史世家伯魚過庭陳亢問於伯魚曰子亦有異聞乎曰嘗獨立鯉趨而丨丨曰學詩乎曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而丨丨曰學禮乎曰未也不學禮無以立鯉退而學禮語子思中庸孔子之孫丨丨作丨丨曾子大學丨晢之丨參著丨丨孔子之孫丨丨丨丨至今世襲封為衍聖公荀卿之後後漢荀淑荀况十一世孫本傳童烏太玄揚雄字子雲其先出自有周伯僑者以支庶初食采於晉之揚因氏焉草太玄經以擬易其子丨丨九齡而與玄文本傳福畤中説王通講道河汾著中説其弟凝繕録召諸子而授之曰先兄之緒言也孺子奉之毋使失墜福畤編為十卷于以觀先君之事業明道垂訓傳子孫以為素業其孫勮勃皆有文名家事雜録世業歷代源流古者農工商賈各有其業而士不與焉故農相與謀稼穡於田野工相與議技巧於官府商賈相與語財於市井朝夕從事不見異物而遷焉故其父兄之教不肅而成子弟之學不勞而能各安其居而樂其業甘其食而美其服雖見竒麗紛華非其所習譬猶戎狄之與於越不相入矣是以欲寡而事節財足而不爭於是在民上者道之以德齊之以禮故民有恥而且敬貴誼而賤利此三代之所以直道而行不嚴而治之大略也及周室衰禮法墮諸侯刻桷丹楹大夫山節藻梲八佾舞於庭雍徹於堂其流至乎士庶人莫不雜制而棄本稼穡之民少商旅之民多穀不足而貨有餘陵夷至于桓文之後禮誼大壞上下相冒國異政家殊俗嗜欲不節僣差之極於是商通難得之貨工作亡用之器以追時好而取世資偽民背實而要名姦夫犯害而求利富者木土被文錦犬馬餘肉粟而貧者短褐不全唅菽飲水其與編户齊民同列而以財力相君雖為僕虜猶亡愠色故夫飾變詐作姦軌者自足乎一世之間守道循理者不免於飢寒之患其教自上興繇法度之亡限也君子亦以此觀世變云事類治産范蠡之陶為陶朱公丨丨積居與時逐十九年之間三致千金而再分散與貧友昆弟後年衰老聽子孫修業而息之遂至巨萬故言冨者稱陶朱治生白圭樂觀時變人棄我取人取我豫能薄飲食忍嗜欲節衣服與用事僮僕同苦樂故曰吾治生猶伊吕之謀孫吳用兵商鞅行法也天下言丨丨者祖白圭鹽盬猗頓用丨丨起頓魯之窮士盬鹽池於此造鹽故曰盬鹽鑄冶邯鄲郭縱以丨丨成業與王者埒冨畜牧烏氏贏丨丨及衆斥賣谷量牛馬比封君丹冗巴寡婦清其先得丨丨而擅其利數世家亦不訾鐵山蜀卓氏之先趙人後遷之蜀臨卭即丨丨鼓鑄運籌算賈滇蜀民富至童八百人田池射獵之樂擬於人君鹽井成都羅裒資巨萬初賈京師隨身數十百萬為平陵石氏持錢其人強力石氏資次如氏苴氏親信厚資遣之令往來巴蜀數年間致千餘萬裒舉其半賂遺曲陽定陵侯依其權力賖貸郡國人莫敢負擅丨丨之利期年所得自陪遂殖其貨陂田宛孔氏之先梁人也孔鐵冶為業秦滅魏遷氏南陽大鼓鑄規丨丨連騎遊諸侯因通商賈之利有遊間公子之名然其嬴得過當愈於孅嗇家致數千金故南陽千賈盡法孔氏之雍容魚鹽齊俗賤奴虜而刁間獨愛貴之桀黠奴人之所患唯刁間收取使之逐丨丨商賈之利或連車騎交守相故奴曰寧爵無刁馬醫張黑以丨丨而擊鍾胄脯獨氏以丨丨而連騎田畜宣曲任氏其先為督道倉吏秦之敗也豪傑爭取金玉任氏獨窖倉粟楚漢相距滎陽民不得耕種米石至萬而豪傑貪玉盡歸任氏以此起富富人奢侈而任氏拆節為力丨丨非丨丨所生不衣食公事不畢則不得飲酒食肉以此為閭里率故富田農秦楊以丨丨而甲一州轉轂周人玩孅而師史尤甚丨丨百郡國無所不至能致十千萬販脂翁伯以丨丨而傾縣邑賣漿張氏以丨丨而隃侈灑削質氏以丨丨而鼎食粟萬鍾塞之斥也唯橋桃以致馬千匹牛倍之羊萬丨以丨丨計息十倍吳楚兵之起長安中列侯封軍行從軍旅齎貸子錢家子錢家以為關東成敗未決莫肯豫唯母鹽氏出捐千金貸其息十之三月吳楚平一歲中母鹽氏丨丨丨用此冨關中千戶侯等陸地牧馬二百蹄牛千蹄角千足羊澤中千足彘水居千石魚波山居千章之荻安邑千樹棗燕秦千樹栗蜀漢江陵千樹橘淮北滎南河濟之間千樹荻陳夏千畝漆齊魯千畝桑麻渭川千畝竹及名國萬家之城帶郭千畝畝鍾之田若千畝巵茜千畦薑韭此其人皆與丨丨丨丨千乘家比通邑大都酤一歲千釀醯醬千瓶漿千儋屠牛羊彘千皮穀糴千鍾薪藁千車船長千丈木千章竹竿萬個軺車百乘牛車千輛木器漆者千枚銅器千鈞素木鐵器若巵茜千石馬蹄噭千牛千足羊彘千雙童手指千筋角丹砂千斤其綿絮細布千鈞文采千匹答布皮革千石漆千大斗糵麴鹽豉千合鮯鮆千斤鯫鮑千斤棗粟千石者三之狐貂裘千皮羔羊裘千石旃席千具它果采千種子金錢千貫節駔儈貪賈三之亷賈五之亦丨丨丨丨並漢貨殖傳序古今合璧事類備要續集卷六
