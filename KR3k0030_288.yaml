body:
  text: 古今合璧事類備要别集巻八十二宋謝維新撰畜産門牛格物總論牛大牲數種赤色曰騂剛黄色曰犉白色曰㹊黒色曰犛純色曰犧牷雜色曰牻惟水牛青色犢一歲牛㸬二歲牛犙三歲牛牭四歲牛犕八歲牛也牛母為㹀牛父為牯事類巢父牧堯以天下讓巢父丨丨曰君之丨天下亦猶余之牧孤犢君牧天下是各有其所牧矣焉用惴惴然以所牧而與余余無用天下為也於是牽犢而去符子巢父飲巢父堯時隱人年老以樹為巢而寢其上故人號為丨丨堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光非吾友也乃擊其膺而下之許由悵然不自得乃遇清泠之水洗其耳拭其目曰向者聞言負吾友遂去終身不相見樊仲父牽牛丨之見巢父洗耳乃驅牛而還令牛飲其下流也逸士傳牧於野武王丨牛丨桃林之丨書牧誓篇降于阿宣王考牧誰謂爾無牛九十其犉爾牛來思其耳濕濕或丨丨丨或飲于池茁壯長孔子嘗為乘田委吏曰牛羊丨丨丨而已矣孟謝拯溺子路拯溺其人丨之以牛子路不受孔子曰魯人必不拯溺矣乘牛度關周元年老子之度關令尹喜先勑門吏曰若有老公從東來丨青丨薄板車者勿聽丨丨其日果見老公乘青牛求度關吏入白之喜曰諾道今來矣我見聖人矣即帶印綬出迎設弟子之禮關中記牽牛蹊田楚子為陳夏氏亂故伐陳殺夏徴舒因縣陳申叔時使於齊復命不賀而退王使讓之對曰抑人有言曰丨丨以丨人之丨而奪之牛牽牛以蹊者信有罪矣而奪之牛罪已重矣諸侯之從討有罪今縣陳貪其富也無乃不可乎王曰善左宣十一牽牛釁鐘齊宣王坐於堂上有丨丨而過堂下者王問之曰牛何之曰將以丨丨孟梁王上飯牛叩角寗戚丨丨車下丨丨而長歌曰南山粲白石爛生不逢堯與舜禪短布單衣纔至骭長夜漫漫何時旦桓公聞之舉以為相琴操百里飯牛丨丨奚未遇時丨丨於秦鬻以五羊之皮公孫得而獻諸繆公繆公用之謀無不當舉必有功吕氏春秋猗頓畜牛丨丨魯之窮士聞朱公富徃問術焉告之曰子欲速富丨五牸乃適西河大畜丨羊于猗氏之富十年之間子息萬計貲擬王公叢子庖丁解牛丨丨為文惠君丨丨曰臣之刀十九年所解千牛而刀刃若新彼節者有間而刀刃無厚以無厚入有間而恢恢乎其投刃必有餘地是以十九年而刀刃如新莊子石牛伐蜀秦惠王欲伐蜀乃刻五丨丨置金其後蜀人見之以為牛能便金有養卒以為此天牛也能使便金蜀王以為然即發卒千人使五丁力士拖牛成道置三牧於成都秦得道通石牛力也後遣丞相張儀等隨石牛道丨丨蜀紀火牛擊燕騎刼攻即墨田單取牛千頭衣以五彩束刃其角縛丨其尾穿城而出丨壯士五千䘖枚隨其後牛出火明所觸皆死壯士因丨之丨師大敗遂收齊城生犢曰吉宋人有好行義者三世不懈家無故而黑牛丨白丨以問孔子孔子丨此丨祥也以享上帝居一年其父無故而肓牛復生白丨居一年其子又肓後楚攻宋圍其城民易子而食之析骸而炊之丁壯皆乘城戰死者火半此人父子有疾皆免列子射牛不中賈堅彎弓三石餘烈祖以堅善丨故親試之乃取一丨置百歩外召堅射曰能中之乎堅曰少壯之時能令丨丨今已年老正可中之恪大笑射發一矢拂脊再一矢磨腹皆附膚落毛上下如一格曰能復中乎堅曰所貴者以不中為奇中之何難一發中之觀者咸服其妙崔鴻十六國春秋燕語賣刀買犢龔遂為渤海太守民有帶刀劒者使賣劒買牛丨丨丨丨可謂帶刀佩犢矣本傳觸墻成字鄭𤣥家牛丨丨丨八丨白集注逢人逐牛丙吉為相出逢死傷横道過之不問前行丨丨丨丨牛喘吐舌使問逐牛行㡬里矣掾吏謂前後失問吉曰民鬬相殺傷長安令京兆尹職所當禁捕宰相不親小事非所當問方春未可大熱恐牛行近用暑故喘三公典調和陰陽職當憂是以問之本傳還里乘牛封君達少好道入鳥䑕山百餘年丨鄉丨常丨青丨故謂青牛道士乘槎而見舊說天河與海道通近世有人居海渚者年年八月有浮槎去來不失期人有寄志立飛閣於槎上多齋糧丨丨丨去十餘月至一處有城郭狀屋舍甚嚴遙望宫中有織婦丨一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人為說來意并問此是何處答曰君還至蜀都訪嚴君平則知之竟不上岸因還如期後至蜀問君平曰某年某月有客星犯牽牛宿計年月正是此人到天河時也張華博物志見月而喘吳牛丨丨丨丨劉義慶世說認牛不辨劉寛嘗行有人失牛者乃於路就寛車中丨之寛無所言下駕步歸有頃認者得丨而送還叩頭慙謝寛曰幸勞見歸何為謝也還牛大慙管寧鄰有牛犯寧禾者寧牽着涼處自飲食丨丨主其主丨丨頭懸在門蜀蔣琬夜夢一牛丨丨丨丨流血滂沱趙直曰見血者事分明也牛角及鼻公字之象至當為三公果為中書令目光在背王衍因宴集為族人所怒舉樏擲其面衍初無言引王導共載而去然心不能平在車中攬鏡自照曰爾看吾丨丨乃丨牛丨上方腹曲頭蜀諸葛亮復出祁山以木牛運木牛者丨丨丨丨一脚四足頭入頷中舌著於腹載多而行少宜可大用不可小使探心作炙王愷之有牛名八百里駮常瑩其蹄角王武子與射賭得趣左右丨丨丨丨一啖而去墜井不視褚彦囘父湛之有牛丨丨湛之率左右營救彦囬下簾丨丨去任見留魏時苗為壽春令初至縣乘輦車駕黄牸牛方歲餘生一犢及丨丨留之曰是爾土所生由此知名盗殺訪牛晉周訪鄉人丨訪牛於冡間丨之訪得宻埋其肉不使人知盗殺舒牛郭舒雅行鄉人丨丨丨丨事覺來謝舒曰君飢所以食牛餘肉可共啖之世人皆服婦家餉牛梁傳昭性篤謹子丨丨丨丨肉以進昭昭召其子曰食之則犯法告之則不可取而埋之不負闇室如此叔射殺牛隋吏部尚書牛𢎞弟弼好酒而酗常醉射殺𢎞駕車牛𢎞還宅其妻迎謂𢎞曰丨丨丨丨𢎞聞無所怪問直答曰作脯坐定其妻又曰叔射殺牛大是異事𢎞曰已知顔色自若讀書不廢苦請不得後周孟信家貧唯有一老牛其兄子賣以供薪米契劵訖信適從外來方知其賣因告買者曰此牛先來有病小用便發君不須也杖其兄子買者嗟異丨丨丨丨質所從來張允濟仕隋為武陽令元武民以㹀牛依婦家者久之孳十餘犢將歸而婦家不與牛民訴縣縣不能決乃詣允濟允濟曰若自有令吾何與為民泣訴其抑允濟因令左右縛民䝉其首過婦家云捕盗牛者令盡出民家牛丨丨丨丨婦不知遽曰此婿家牛我無與即遣左右撤蒙曰可以此牛還婿婦家叩頭服罪元武吏大慙禪師變牛大安丨丨丨丨安在溈山三十年只看一頭水牯牛若落路入草便牽出若犯人苗稼即鞭撻調伏既久如今變作箇露地白牛常在面前終日馴擾依人趕亦不去也戴文成牛貞元中海鹽縣有丨丨者家富性貪每鄉人舉債必收利數倍有鄰人與之交利刻剥至多鄰人積恨數年文病死鄰人家牛生一黒犢脇下白毛成字曰戴文閭里咸知文子恥之乃求謝焉以物熨去其字鄰人從之既而文子以牛身無驗乃訟鄰人妄稱生犢有字追至官則白毛復出但呼戴文牛則應聲而至鄰人恐文子盗去夜則閉於别室經數歲方死原化記牛角掛書李宻聞包愷在緱山徃從之以蒲薦乘丨掛漢書一帙丨上一手捉牛靷一手翻書讀之越公楊素見而竒之牛背書字陸羽幼時師使牧牛三十羽潛以竹畫丨丨為字六帖稱特處士寗茵假宿大僚莊南山下月夜有叩關丨桃林班丨丨丨相訪繼而南山班寅將軍來謁茵為置酒及明視門外唯有牛蹄虎跡而已廣記此黒牡丹廣末劉訓者京師富人梁氏開國嘗假貸以給軍京師春遊以觀牡丹為勝賞訓邀客賞花乃繫水牛數百在前指曰丨劉氏丨丨丨也盗割牛舌包拯知天長縣有訴丨丨丨丨者公使歸屠其牛鬻之既而有告私殺者公曰何為割某家牛舌而又告之盗者驚服寗戚相牛經牛岐胡壽岐牽兩腋下分為三去角近行駛眼欲得大眼中有白脈貫睡子最快頸骨長且大駛壁堂欲得濶胸股間也倚欲得如絆馬聚而正也膺庭欲得廣胷前天關欲得成背骨雋骨欲得垂脊中央欲得下蘭株欲得大尾株豐嶽欲得大膝骨捶頭欲得髙百體欲得𦂳垂星欲得有怒肉蹄上也肉覆蹄間名怒肉力柱欲得大而成當車骨也懸蹄欲得如八字陰虹屬頭隂虹者有雙筋自尾骨属頸陽鹽欲得廣陽者夹尾株前兩膁上常有似鳴者有黄也洞胡無壽珠淵無壽遊毛當日下也上池有亂毛妨主凶池角中也身欲得促形欲得如巻大臁疎肋難飴龍頭突目好跳豪筋欲得成就脚後筋也毛欲得短宻若長疎不耐寒氣尾不用至地尾毛少骨多者有力膝上肉欲得竪角欲得細鼻如鏡則難牽口方易飴漦府方易飴柳宗元牛賦若知牛乎牛之為物魁形巨首垂耳抱角毛革疎厚牟然而鳴黄鐘滿脰抵觸隆曦日耕百畆徃來修直植乃禾黍自種自歛服箱以走愉入官倉已不適口富窮飽饑功用不有陷泥蹷瑰常在草野人不慚愧利滿天下皮角見用肩凥莫保或穿緘縢或實俎豆由是觀之物無踰者不如羸驢服逐駑馬曲意隨勢不擇處所不耕不駕藿菽自與騰踏康莊出入輕舉喜則齊鼻怒則奮擲當道長鳴聞者驚辟善識門户終身不惕牛雖有功於己何益命有好醜非若熊力慎勿怨尤以受多福劉禹錫嘆牛劉子行其野有叟牽牛於蹊偶問焉何形之瑰歟何足之病歟今觳􅑌然將安之歟叟攬縻而對云瑰其形飯之至也病其足役之過也請為君畢詞焉我僦車以自給嘗驅是牛引干鈞北登太行南並商嶺掣以廻之叱以聳之雖涉淖躋高轂如蓬而輈如墳及今廢矣顧其足雖傷而膚尚腯以畜豢之則無用以庖視之則有嬴伊禁焉莫敢尸也甫聞邦君享士卜剛日矣是徃也將要售於宰夫余尸之曰以叟言之則利以余言之則悲若之何余方窶且無長物願解裘以贖將置諸豐草之鄉可乎叟輾然而咍曰我之沾是屈指計其直可以持醪而囓肥飴子而衣妻若是之逸也奚事裘為且昔之厚其生非愛之也利其力今之致其死非惡之也利其財子烏乎落吾事劉子度是叟不可用辭屈乃以杖叩牛角而嘆曰所求盡矣所利趍矣是以員能霸吳屬鏤賜斯既帝秦五刑具長平威震杜郵死陔下敵擒鐘室誅皆用盡身殘功成禍歸可不悲哉可不悲哉嗚呼執不匱之用而應夫無方使時宜之莫吾害也茍物於形器用拯則憂明已韓退之革華傳下邳侯革華者其先隴西人也三十六代祖守犍為黄帝時以力召拜大司農以其闢土有功又知稼穡之艱難遷輕車都尉子孫相繼至周武王時徙居桃林冠冕遂絶其後人思其澤世之才因復其位而加任使焉華父犨生五年襲先祖爵禄仕至上輕車都尉華母世居長樂有乳哺之恩越王勾踐時嘗侍宴姑蘓臺詩所謂有覺徳行者也犨因引重至太行山力不任事遂死於轅下上嗟悼命太宰申屠公執刀而解之其支派分離散他處華長子也上念其父劬勞而死於王事封華為下邳侯詔將作大匠治之華為性堅勁屈強難以直禦匠以其膏潤之然後去其豪族而加裁割焉會太原人金十奴與新鄭人斛斯生相逢薦華於五木大夫是後稍稍得成其名上嘉之遂䆁褐賜墨綬華嘗曰吾辛勤久今方成名得處上左右足矣及獻之果然華為人善能履道别威儀進止趨蹌一隨人意上將駕出遊畋獵馳騁毬擊射御及禮神祭祀交賔接賢未嘗不召華偕徃伏事上久之因病忽開口論議洩露宻㫖上由是疎之詔將作大匠治之乂命其友金十奴等補過之尋獻於上上雖納有泥塗賤處方召使之餘並不得預焉頃之上見其顔色顦悴又衰憊失度上咨嘆曰下邳侯老而憊不任吾事今棄子於市不復召子矣華無息繼者族人焉贊曰其革氏之先本出皮姓軒轅時蒼頡觀鳥跡制文字以始於皮而至於華故從革焉漢書功臣表有煑棗侯革末者即其後也初華自胡而來趙武靈王時見重是後子孫盛於中國蘓子瞻書栁宗元牛賦後嶺外俗皆恬殺牛而海南為甚客自髙化載牛渡海百尾一舟遇風不順渇饑相倚以死者無數牛登舟皆哀鳴出涕既至海南耕者與屠者常相半病不飲藥但殺牛以禱富者至殺十數牛死者不復云幸而不死即歸徳於巫以巫為醫以牛為藥間有飲藥者巫輒云神怒病不可復治親戚皆為却藥禁醫不得入門人牛皆死而後己地産沉水香香必以牛易之黎黎人得牛皆以祭鬼無脫者中國人以沉水香供佛燎帝求福此皆燒牛肉也何福之能得哀哉予莫能救故書栁子厚牛賦以遺瓊州僧道贇使以曉諭其鄉人之有知者庻㡬其可衰矣朱元晦䟦唐人暮雨牧牛圖予老於農圃日親犂杷故雖不識盡而知此畫之為真牛也彼其前者却顧而徐行後者驤首而騰赴目光烱然真若相語以雨而相速以歸者覽者未必知也良工獨苦渠不信然延平余無競出示此巻巻中有劉忠定鄒忠公題字覽之并足使人起敬而龍山老人又先君所選士而余所嘗趨走焉者俯仰存歿為之慨然因識其後而歸之詩集駕官車官牛官牛丨丨丨滻水岸邊般載沙一石沙㡬斤重朝載暮載將何用載向五門官道西緑槐陰下鋪沙堤昨來新拜右丞相恐怕泥塗汚馬蹄右丞相馬蹄踏沙雖淨潔牛領牽車欲流血右丞相但能濟人治國調陰陽官牛偵穿亦無妨白樂天官牛放江岸江草秋窮似秋半十角吳牛丨丨丨隣肩􅔰尾乍依隈横去斜奔怱分散荒陂斷塹無端入背上時時孤鳥泣日暮相將帶雨歸田家煙火㣲茫濕陸龜蒙牧牛歌不怕猛虎欺朝牧牛牧牛下江曲暮牧牛牧牛村口谷荷簑出林春雨細蘆管卧吹沙草綠亂挿蓬蒿箭蒲腰丨丨丨丨丨黄犢李涉牧牛詞又與騾驢走只見吳牛事水田不見黄犂負車軛今牽大車同一羣丨丨丨丨丨長陌昻頭濶步塵濛濛不似緩耕泥拍拍一一夜眠頭向南越鳥心腸誰辨白梅聖俞出曹門見水牛拽車讀書牛不口我昔在田間但知矢牛與羊川平牛背穩如駕百斛舟舟行無人岸自移我坐丨丨丨丨丨前有百尾羊聽我鞭聲如鼓鼙我鞭不妄發視其後者而鞭之澤中草木長草長病牛羊尋山跨坑谷騰趠筋骨強煙簑雨笠長林下老去而今長見畫世間馬耳射東風悔不長作多牛翁蘓子瞻書晁說之考牧圖後掉鞭牛不觸牧牛兒逺陂牧逺陂牧牛芳草緑兒怒丨丨丨丨丨澗邊栁古南風清麥深蔽目田野平塢犍礪角逐草行老㹀卧噍饑不嗚犢兒跳梁没草去隔林應母時一聲老翁念兒自攜餉出門先上岡頭望日斜風雨濕簔衣拍手唱歌尋伴歸逺村放牧風日薄近村放牛泥水惡珠璣燕趙兒不知兒生但知牛背樂張文潛牧牛兒牧童歸去倒騎牛細草煙深暮雨收丨丨丨丨丨丨丨笛中一曲昇中樂筭得生來未解愁王元之升平詞犢兒狂走先過浦千里煙草緑連山雨新足老牛飽朝饑向來影觳􅑌丨丨丨丨丨丨丨却立長鳴待其母母子為人實倉廩汝飽不慚人愧汝牧童生來日日娛只憂身大當把鋤日斜睡足牛背上不信人間有廣輿陳去非題牧牛圖石帆山下買烏犍老子傾囊得萬錢丨丨丨丨丨丨丨牧童避雨歸去晚一笛春風草滿川陸游買牛古今合璧事類備要别集巻八十二
