body:
  text: 古今合璧事類備要前集卷三十五宋謝維新撰故舊門故舊事類不遺丨丨故舊伐木詩注不棄故舊無大故則丨丨也微子久要丨丨不忘平生之言憲問舊人人惟求舊書不棄踦屨借用楚昭王與吳戰楚軍敗走王忘其踦屨已行三十步王返取之左右怪而問之王曰楚國雖貧豈無一屨哉吾悲之與俱出而丨與之俱返矣於是楚俗無相丨者賈子不忘蓍簪借用孔子遊於少原之野聞有婦人哭於澤中甚哀孔子使弟子問焉對曰向刈蓍薪亡吾蓍簪是以哀孔子曰刈蓍薪而亡蓍簪有何悲也對曰非傷亡簪吾所以悲不忘故也韓詩外傳無失其故孔子之故人曰原壤其母死夫子助之沐槨曰故者丨丨丨為丨也檀弓就養於友漢樓護有故人吕公無子歸護身與吕公妻與吕嫗同食及護家居妻子頗厭吕公護流涕責妻子曰吕公故舊窮老託身於我義所當奉遂養吕公終身班荆與食初伍參與蔡太師子朝友其子伍舉與子朝之子聲子相善也及伍舉奔晉聲子遇之於鄭郊丨丨相丨丨時言復故注丨布也布丨坐地共議歸楚事脫粟見待公孫𢎞起家為丞相食故人髙賀以丨丨覆以布被賀怨曰何用故人富貴為脫粟布被我自有之怒而去語人曰𢎞身服貂蟬衣麻枲內㕑五鼎外膳一肴其儉詐也𢎞聞之慚曰寧逢惡賓不逢故人綈袍市恩范睢見須賈賈曰范叔一寒如此哉乃取其丨丨賜之後睢謂賈曰公所以得無死者以綈袍戀戀有故人之意史記紈扇念舊朱買臣為㑹稽太守懷章綬至舍亭而國人未知也所知錢敷乃勞之曰無罷乎遺以丨丨買臣至郡以為上客重見故人景差至蒲騷見宋玉曰不意丨丨丨丨慰此去國戀戀之心昨到夢鐸喜見楚山之碧眼力頓明今又㑹故人開心目足矣怒斬故人陳勝既王其故人嘗與傭耕者聞之乃之陳叩宫門曰吾欲見涉門吏不肯為通勝出遮道而呼涉乃召見載與歸後宫出入愈益發舒言勝故丨勝斬之諸故人皆引去引論故舊光武丨嚴光入道故舊共卧光以足加帝腹太史奏客星犯御座帝笑曰朕故人嚴子陵共卧耳漢史不忘宿昔唐公踐天子位多引貴臣共榻劉文靜時為納言諫曰云云帝曰宿昔之好何可忘唐書始終異趣南陽翟道淵與汝南周子南少相友共隱於潯陽庾太尉說周以當世之務周遂仕翟秉志彌堅其後周詣翟翟不與語兄弟交契溫大雅在隋與顔思魯俱在東宫弟彥博與思魯弟愍楚同直內史省弟彥將又與愍楚弟遊蔡典校祕閣二家丨丨各為一時人物之選少時學業顔氏為優其後職位溫氏為盛唐書迎葬友喪范雲好節尚竒専赴人之急少時與領軍王駭善駭亡于官舍貧無宅居雲乃丨喪還其家躬營唅斂不救友難宋向栁與顔峻友善及峻貴栁猶貧素自許丨推先之處戒栁曰名位不同禮有異數卿何得作曩時意耶栁曰我與士遜心期久矣豈可一旦以勢利處之及栁為南唐郡涉義宣事敗繫獄屢密請峻求相申救竟不助之栁遂伏法楊公筆録擢用舊交何晏遷侍中主選曹宿與有舊者多擢用之不私故人裴垍為相有故人求京兆尹判司垍曰公才不稱此官丨敢以故人之丨傷朝廷至公他日盲宰相憐公者不妨得之垍則不可又見故史門蘇章事羈賤均禮岑文本生平故人雖丨丨必丨丨庸下攜手韋表微篤故舊雖丨丨與丨丨談笑無間陳說平生今但欲守陋巷養子孫時時與親舊叙離闊丨丨丨丨濁酒一杯彈琴一曲志願畢矣嵇康絶交書追思昔遊昔年疾疫親故罹其災徐陳應劉一時俱逝痛可言耶昔日遊處謂百年可長相保何數年之間零落殆盡言之傷心頓撰其遺文却為一集觀其姓名巳為鬼録丨丨丨丨猶在心目而此諸子化為糞壤可復道哉魏王粲傳文帝與吳質書詩集如覆水哀哉練裙子負薪躡破履豈旡故交親逝去丨丨丨不見老優孟談笑託諧美出杜甫頗回車窮巷隔深轍丨丨故人車歡然酌春酒摘我園中蔬陶淵明富貴易合丨丨他人合貧賤親戚離亷藺門易軌田竇相奪移晨風集茂林棲鳥去枯枝今我唯困蒙羣士所背馳鄉人敦懿義濟濟䕃光儀對賓頌有客舉觴詠露斯臨樂何所嘆素絲與路岐曹顔逺感舊死生不變陋巷孤寒士出門苦栖栖雖云志氣在豈免顔色低平生同門友通籍在金閨曩昔膠漆契邇來雲雨暌正逢下朝歸軒騎玉門西是時天久隂三日雨淒淒蹇驢避路立肥馬當風嘶回頭忘相識古道土沙堤昔年洛陽社貧賤相提攜今日長安道對面隔雲泥近日多如此非君獨慘悽丨丨丨丨者唯聞任與黎出白居易詩白髮相逢紅顔創為别丨丨始丨丨唯既昔時慮無復舊時容髙適逢謝偃長安相逢數年音信斷不意在丨丨馬上丨丨久人中欲認難一官今懶道雙鬢竟羞看莫問生涯事只因持釣竿郎士元樽酒論文白也詩無敵飄然思不羣清新庾開府俊逸鮑參軍渭北春天樹江束日暮雲何時一丨丨重與細丨丨甫憶李白折栁分襟秋庭悵望别君初丨丨丨丨十載餘相見或因中夜夢寄來都是隔年書攜樽座外花空老垂釣江頭栁漸疏裁得詩憑千里鴈吟來應不憶吾廬羅鄴寄友别中寄贈元微之為御史鞫獄梓潼時白樂天都下與名輩遊慈恩寺花下小酌作詩寄微之曰花時同醉破春愁聊把花枝當酒籌忽憶故人天際去計程今日到凉州元至褒城亦寄逺遊詩曰夢君兄弟曲江頭又向慈恩寺裏遊驛吏喚人驅馬去忽驚身已在凉州千里神交若合符契朋友之道不其至歟貴不相忘章子厚嘗與劉子先有場屋之舊子厚居京口子先守姑蘇以新醖洞庭春寄之子厚答詩曰洞霄宫裏一間人東府西樞老舊臣多謝姑蘇賢太守殷勤分送洞庭春其後隔十年子厚拜相亦不通問寄書誚其相忘逺引之意子厚先以詩謝曰故人天上有書來責我疏愚喚不回兩處共瞻千里月十年不寄一枝梅塵泥自與雲霄隔駑馬難追德驥才莫謂無心向門下也曽終夕望三台公得詩大喜即召為宰屬遂遷户侍髙齊詩話世契事類相善楚伍參與蔡太師子朝友其子伍舉與聲子丨丨左傳有分王珂曰吾於諸公丨家世事丨通鑑何袁世交丨劭丨毅有纍丨丨唐書嚴杜世舊丨武以丨甫丨丨待甫甚善新唐書孔李通家丨融十嵗聞漢中丨膺清節直亮慕之欲往觀其人門下不為通融曰我是公丨丨子孫門下具白之膺見融問何親融曰先君孔子與老君有師資之道故僕與君亦纍世通家也孔融别集崔栁通家栁子厚送崔羣序云豫於崔君有通家之舊栁文父執附先友事類父黨丨丨無容禮運父執見丨之丨不謂之進不敢進不謂之退不敢退不問不敢對曲禮父事年長以倍則丨丨之同上父友丈人吾丨之丨崔祐甫穆氏四子講藝記父黨與遊班彪家有賜書父黨楊子雲已下莫不造門叙傳陳羣字長文通達有識度其所交皆丨丨也魯國孔融丨羣父紀友又與羣交本傳劉孝綽年十四父繪掌制誥常使代草父黨沈約任昉范雲等聞其名命駕造焉宋本傳又見子過於父類阿戎事父友候問陳蕃少時間居一室庭宇荒穢丨丨薛勤來丨之謂曰孺子何不灑掃以待賓客蕃曰大丈夫處世當掃除天下安事一室乎據牀不答馬援有疾梁松來候之獨拜牀下援不答松去諸子問曰梁伯孫帝壻貴重公卿莫不憚之大人獨不為禮援曰我乃松之父友也雖貴何得失其序乎字父不拜常林年七嵗有父黨造門問林伯先在否汝何不拜林曰臨子字父何拜之有魏志先友顧念其子優孟楚之樂人楚相孫叔敖知其賢善待之孫叔敖死其子窮困負薪逢優孟曰我孫叔敖之子也父且死時屬我貧困往見優孟優孟曰若旡逺有所之即為孫叔敖衣冠抵掌談語嵗餘莊王置酒優孟前為夀莊王大驚以為孫叔敖復生也欲以為相優孟請歸與婦計之三日復來曰婦言慎旡為楚相不足為也如孫叔敖為楚相盡忠楚王得以霸今死其子旡立錐之地負薪以自衣食如孫叔敖不如自殺於是莊王謝優孟召孫叔敖子封之寢丘泣撫其子叔向見司馬侯之子之撫而泣之曰自此父死也吾蔑與比事君也昔者此其父始之我終之我始之夫子終之春秋外傳安其妻子郈成子自魯聘晉過于衛右宰穀臣止而觴之陳樂而不作酣畢而送以璧成子不辭其僕曰不辭何也成子曰夫止而觴我親我也陳樂不作告我哀也送我以璧託我也由此觀之衛其亂矣行三十里而聞衛亂作右宰榖臣死之成子於是迎其妻子還其璧隔宅而居之孔叢子賑其妻子朱暉同縣張堪有名德每與相見常接以友道暉以堪宿成名德末敢安也堪至把暉臂曰欲以妻子託朱生堪後物故南陽俄暉聞堪妻子貧窮乃自往候視其困厄分所有以賑給之嵗送榖五十斛帛五匹以為常收養其子處士樊英有鄰人子止英家每醉詬呼弟子陳實問之英曰其父臨死以相委屬故丨丨之薦用其子晉山濤字巨源與嵇康善康後坐事臨誅謂子紹曰巨源在汝不孤矣其後嵇紹靖居私門山濤謂武帝曰父子罪不相及嵇紹賢侔郤缺請為祕書郎帝曰如卿所言乃堪為丞何但郎也乃起家為丞矜其綀裙梁任昉子東里西華南容北叟並旡學術墜其家聲流離不自振西華冬月著帔綀裙道逢劉孝標泫然丨之曰我當為卿作論乃著廣絶交論譏其舊友到溉見其論抵几於地終身恨之憫其牧豕陳祐年二十而孤家貧牧豕於長垣澤其父之友謂曰二千石子而牧豕縱子旡恥奈何先君教育其子韓魏公少善尹師魯師魯以貶死其子朴方襁褓既長魏公聞於朝命之官公判北京薦為屬丨丨之如子弟所為或過舉公掛師魯像哭之朴亦早死聞見録遣嫁其女吳奎初與鄉人王彭年善彭年客死于京師奎使長子主喪事周恤其家嫁二女焉墓志庭訓其子韓魏公留守北京李稷以國子博士為漕頗慢公公不為較待之甚禮俄潞公代魏公為留守未至揚言云李稷之父絢我門下士也聞稷敢慢魏公必以父死失教至此吾視稷猶子也果不悛將丨丨之公至北京李稷謁見坐客次久之公著道服出語之曰而父吾客也只入拜稷不獲已如數拜之聞見録詩集敬父執人生不相見動如參與商今夕復何夕共此燈燭光少壯能幾時鬢髮各已蒼訪舊半為鬼驚呼熱中腸焉知二十載重上君子堂昔别君未婚兒女忽成行怡然丨丨丨問我來何方問答未及巳兒女羅酒漿夜雨剪春韭新炊間黃粱主稱㑹面難一舉纍十觴十觴亦不醉感子故意長明日隔山嶽世事兩茫茫杜甫贈衛八處士懷同年爾生始懸弧我作座上賓引箸舉湯餅祝辭天騏驎今成一丈夫坎軻愁風塵長裾來謁我自號廬山人道舊與撫孤悄然傷我神依依見眉睫默默含悲辛永丨丨丨友追想出谷晨三十二君子齊飛凌烟旻曲江一㑹時後㑹已凋淪况今三十載閲世難重陳盛時一已過來者日日新不如搖落樹重有明年春火後見琮璜霜餘識松筠肅機乃獨秀武抱亦絶倫爾今持我詩西見二重臣成賢必念舊保節在安貧清時為丞郎氣力侔陶鈞乞取升斗水因之雲漢津劉禹錫送同年之子張與古今合璧事類備要前集卷三十五
