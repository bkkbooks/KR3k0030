body:
  text: 古今合璧事類備要後集卷五十八宋謝維新撰閣職門總閣職歴代㳂革國朝祖宗以來重之有集賢殿修撰後改右文殿直龍圖閣直祕閣三等政和四年二浙福建諸路監司郡守徃徃交通内官多以應奉有勞遷職遂有未嘗朝覲天子因忽為待制班從官者蔡京不樂六年因増其目置修撰與舊為三等曰集英殿修撰右文殿修撰祕閣修撰直閣與舊為六等曰直龍圖閣天章寳文顯謨徽猷祕閣朝廷除授自此宻矣舊貼職无雜壓至是因増置乃定為雜壓蔡條國史外補紹興十年置直敫文閣淳熙十五年置直煥章閣㑹要淳熙令自集撰至直祕閣為貼職事類六等見㳂革注雜壓同上延多士政和六年詔曰天下人才富盛赴功趍事者日衆官職之名寡少不足以褒丨丨丨増置貼職九資令後係時遷授増貼職同上張于湖請刪定圖書劄仰惟帝室龍興聖聖𫝊緒天徳地業既載諸信史雲章奎文又勒于鴻編於是並建内閣以謹其藏所以宣奕葉之文明示萬世之軌範陛下身濟大業遹追來孝載即廣内一新寳儲館御邃清規模輪奐臣竊聞列聖圖書皆在冊府六閣所藏或為未備欲望睿明深詔祕館恭取祖宗寳訓御集實錄五朝正史盡行錄寫館職讎校上之六閣庶幾典冊尊嚴日星並煥上昭陛下尊祖敬宗丕揚謨烈之意外以闡治世之彌文垂耀來今詩集延閣英吾宗丨丨丨聖徳與天通張于湖詩集英殿修撰歴代㳂革唐張昌齡為北門修撰孫逖為集賢院修撰修撰之名始於唐也唐書國朝政和六年置集英殿修撰續㑹要其増置來歴見貼職門事類集賢見㳂革注論撰武帝詔諸儒丨丨禁中元萬頃𫝊褒延初寮除余靖制朕惟承平日久人才衆多欲侈朝廷得賢之光乃新館閣九等之制丨丨兹始逺近所觀論撰集英首以命汝冷熱筆談云集賢修撰舊多以館閣乆次為之近歳有自常參官未至從官者起授修撰有丨撰丨撰時人謂丨中允不博丨修撰詩集資學殖西清邇英閣密勿待經筵晝漏逾三鼓宸居近五塼多聞丨丨丨清問發真筌朱行中元豐盛事詩右文殿修撰歴代㳂革唐有集賢院修撰唐書國朝元祐元年貼書許内外官𢃄五年九月詔復置集賢院學士紹聖二年四月詔職事官罷𢃄職易集賢院學士為集賢院修撰政和六年四月御筆集賢院無此名祕書省殿以右文殿為名見任集賢殿修撰並改作右文殿修撰續㑹要事類書殿具班丨丨初寮除張諤制道山朕肇營書殿邃在丨丨同上鄭修年制髙華之職朕設丨丨丨丨以待中外之材升其班聨進以秩等宜加論撰之名同上李孝瑞制譽髦之選維時論撰之聨必極丨丨丨丨同上鄭修年制詩集分直延和丨日丨左史近臣班咫尺親嚴仗尋常識喜顔退朝金獸冷望幸玉驄閑朱行中元豐盛事詩秘閣修撰歴代㳂革國朝政和六年置餘見貼職門事類陞中秘其丨丨丨論譔之列初寮除王本制待資深官制舊典云貼職修撰以丨館閣之丨丨者仍多由直龍圖閣遷焉詩集白日閑禁林草木青春近秘閣文書丨丨丨本朝彭汝礪次韻履中學士回駕詩直龍圖閣歴代㳂革國朝祥符九年以馮元為太子中允直龍圖閣直閣之名始此㑹要馮元𫝊事類嚴閣進直丨丨荆公除王綽制美名進内閣之丨丨曲阜除孫覺制侍經筵慶厯四年以楊安國直龍圖閣上謂侍臣曰安國久丨丨丨行又淳質乃先朝遵度之比以褒擢之也㑹要擢待制凡除館職之久次者必選直龍圖閣皆為丨丨丨之基也官制舊典内閣之華其班丨丨丨丨初寮除徐禋制西序之名丨丨龍馬丨丨曲阜李周直龍圖制應對之職内閣丨丨丨丨同上李覿制直天章閣歴代㳂革國朝政和六年始置直寶文閣歴代㳂革國朝政和六年始置事類寶訓奎文丨丨入直禁嚴東坡答李寳文啓寶儲張于湖集陳漢除直寳文閣知平江府制丨丨進直偕示優寵直顯謨閣歴代㳂革政和六年置事類清班進直丨丨龍溪除吳洽制直徽猷閣歴代㳂革政和六年置事類嚴直進凝丨之丨龍溪陳起宗制密章延閣寓直追加丨丨張于湖孫佑復直龍圖制直敷文閣歴代㳂革國朝紹興十年置直煥章閣歴代㳂革淳熙十五年置直華文閣歴代㳂革慶元二年置直寶謨閣直寶章閣直秘閣歴代㳂革國朝以史館昭文館集賢院為三館皆寓崇文院太宗端拱元年詔就崇文院中掌建秘閣擇三館真本書籍萬餘卷及内出古畫墨跡藏其中㑹要以右司諫直史館宋泌為直秘閣長編直館直院則謂之館職以它官兼者謂之貼職元豐以前凡狀元制科一任還即試詩賦各一而入否則用大臣薦而試謂之十館官制行廢崇文院為秘書監建祕閣於中自監少至正字列為職事官罷直館直院之名獨以直祕為貼職皆不試而除葢特以為恩數而已石林燕語又故事外官除館職如祕閣校理直祕閣者必先移書在省執事叙同寮之好乃即廢館設盛㑹燕之自崇寜以來外官除館既多此禮寖事類木天本朝内諸司舎屋唯祕書最宏壯閣下穹窿髙敞謂之丨丨類說蓬山寓直丨丨初寮除劉緯制中秘職聨丨丨曲阜除路昌衡制又貼職丨丨書閣進直丨丨欒城除陳同制冊府陞榮丨丨初寮除劉綽制芸閣列于丨丨同上除文維瑞制知其名端拱元年以殿中丞夏侯嘉正兼直祕閣嘉正嘗為洞庭賦由此帝丨丨丨詔試禁中稱旨特有是命㑹要有異才范景仁為館閣校勘當遷校理宰相龎籍言范鎮丨丨丨恬於進取乃除直祕閣容齊四筆作贊書字淳化三年詔増修祕閣成帝丨丨賜之宰臣李昉等請刻石閣下又賜上尊酒太官供膳是日遣中使齎御飛白丨秘閣二丨以賜㑹要叙好設燕故事外官除館職如祕閣校理直祕閣者必先移書在省執事丨同寮之丨乃即館丨盛㑹丨之自崇寜以來外官除館職既多此禮寖廢職源薦充館職溫公丨劉公安世丨丨丨曰知所以相薦否公曰獲從遊舊矣溫公曰非也光居間足下時節問訊不絶光位政府足下獨无書此光之所以相薦也言行錄張于湖宣州建御書閣記臣竊惟我祖宗以聖繼聖所以出治一於道徳仁義之實雖未嘗求工翰墨而英華之發越精神之運動心手相忘道藝一貫得於自然超冠古昔臣在秘閣嘗竊窺累朝雲漢之章葢以太祖皇帝艱難草昧日不暇給之際重之劫火散亡之餘其書之存猶數十百卷自太宗至于徽祖所藏益多我太上皇帝天縱聖學遹追先猷身濟多虞同於剏業萬機餘力一寓之書六經諸子史官之所記寫之琬琰頒於天下者无慮數千萬字特書密賚登牀所取散於羣臣之家者不與焉於乎可謂盛矣主上富於春秋稽古重華心畫之妙其則不逺臣知宣城之閣不足以盡藏所賜繼是又將闢而増之也詩集積書連延閣屹中天丨丨雲漢丨神宗謂太宗也重其選國士比為仙玉檻勾陳上丹梯北斗邊帝容贍日月宸翰照星躔職秩曽无貴光華在得賢公卿殊未曉尚少買臣年司馬公賀范景仁直祕閣詩鎻書深秘閣丨丨丨牆南别晚岑吏人同野鹿庭木似山林淺井寒羌入迴廊疊蘚侵閑看薛稷鶴共起五湖心鄭谷詩古今合璧事類備要後集卷五十八
