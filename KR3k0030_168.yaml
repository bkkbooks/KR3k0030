body:
  text: 古今合璧事類備要續集卷十八宋謝維新撰類姓門熊江陵宫音古今姓纂楚鬻熊之後熊克家譜曰鬻熊為文王師著書一卷號鬻熊子至成王時舉文武勤勞之後以子男之田封鬻熊曽孫繹於楚是為楚子熊繹也三國時有徴士熊僧循尚書熊睦又江陵志黃帝有熊氏之後事類當五百人白公勝謂石乞曰市南有熊宜僚者若得之可以丨丨丨丨矣石乞見之告之故辭承之以劔不動勝曰不為利諂不為威惕去之左石射滅羽熊渠子夜行見寢丨以為虎丨之丨矢飲丨渠子見其誠心而金石為之開况人心乎新序河洛金匱熊襄著齊書名為丨丨丨丨南史補闕疏論唐熊執易為右丨丨時裴延齡得幸德宗欲遂以相執易丨丨之以示拾遺歸登登動容曰願竄吾名雷霆之下君難獨處見歸登𫝊有文除知制誥皇朝熊本字伯通饒州番陽人神宗曰熊本丨丨當遂典誥命丨丨丨丨著書有通略等熊克字子復逺之孫建陽人丨丨丨九朝丨丨中興小厯官制新典帝王經譜壻王克勤狀其行實曰文有顔延之錯綜之工史有陳壽叙事之長牧民得曹參清靜之㫖制行適徐公通介之常紀平陽徴音古今姓纂姜姓炎帝之後封紀為齊所滅以國為姓漢有紀信弟成生通封襄平侯事類請誑楚前漢項羽圍漢滎陽將軍紀信曰事急矣臣丨丨丨乃乘王車黃屋左纛曰食盡漢王降楚以故漢王得出遁羽燒殺信論太極晉紀瞻字思逺丹陽秣陵人少以方直知名後舉秀才召拜尚書郎與榮同赴洛在塗共丨易丨丨瞻曰太極極盡之稱言其理極無復外形既極而生兩儀卧護六軍紀瞻才兼文武朝廷稱其忠亮雅正以久病請去官帝使謂瞻曰卿雖病為丨丨丨丨所益多矣望重縉紳元帝立基淮海夢想羣材紀瞻賀循等並南金赤箭世胄髙門丨丨丨丨宦成名立光國榮家非惟感㑹所鍾抑亦才能斯至夢青鏤筆紀少瑜字幼㻛幼有志節嘗丨陸倕以一束丨丨管丨授之其文因此遒進有大才而無貴仕南史舒京兆徴音古今姓纂風俗通云舒子之後以國為姓事類文檄豪健唐舒元輿婺州人擢髙第裴度表掌興元書記丨丨丨丨一時推許文可輔化舒元輿太和五年獻丨闕下不得報上書自言所上八萬言其文鍛鍊精粹出入今古數千百年披剔刮抉有丨以丨教丨豈主父可比哉牡丹賦句舒元輿唐中葉文士也今其遺文所存者才二十四篇既以甘露之禍死文宗因觀丨丨擲其丨中傑丨曰向者如迓背者如訣折者如語含者如咽俯者如怨仰者如悅為之泣下示夷威信皇朝舒亶字信道明州慈溪人熙河路阻塞分畫疆界命亶馳往於時洮隴新喋血亶即日引道至則示以朝廷威信夷人以肉置刀頭啖亶亶以口承之衆皆歡呼屈臨海宫音古今姓纂楚公族芊姓之後楚武王子暇食采於屈因氏焉屈丐屈蕩屈建屈到三閭大夫屈平並其後事類離騷日月屈原名平楚之同姓也為楚懷王左徒上官大夫害其能故憂愁幽思而作離騷丨丨與丨丨爭光史記江濵漁父屈原至丨丨被髮行吟澤畔顔色憔悴形容枮槁丨丨問之原曰舉世混濁而我獨清衆人皆醉而我獨醒是以見放又曰誰能以身之察察受物之汶汶乎安能以皓皓之白而蒙世俗之塵埃乎項遼西商音古今姓纂左傳云滅項公羊曰為齊桓公所滅子孫以國為姓項託八嵗服孔子項燕下相人為楚將子梁梁兄子籍號西楚霸王項他項伯項襄並籍之族漢初並封賜姓劉氏事類闕祝太原商音古今姓纂黃帝之後周武王封黃帝之𦙍於祝因氏焉鄭有祝𥅆衛有祝鮀或謂祝史之後以官為姓事類治宗廟祝鮀丨丨丨語八風舞唐祝欽明字文思京兆人中宗宴羣臣命侍臣起舞欽明作丨丨丨時人語曰五經掃地矣董隴西角音古今姓纂黃帝之後己姓國有飂升安生董父舜賜姓董氏晉有董狐董安于事類良史孔子曰董狐古之丨丨也書法不隱左豢龍蔡墨曰昔董父甚好龍龍多歸之乃擾畜龍以服事帝舜賜姓董氏曰丨丨左博士前漢董仲舒廣川人治春秋為丨丨下帷講誦弟子莫見其面三年不觀舍園儒宗董仲舒游夏淵源為漢丨丨對皆明法仲舒在家朝廷如有大議使使者就其家問之其丨丨有丨丨䇿明孔氏武帝初立仲舒對丨推丨丨丨抑黜百官立學校之官州郡舉茂才異等皆自仲舒發之有王佐才仲舒丨丨丨之丨雖伊吕亡以加管晏之屬霸者之佐殆不及也贊號為卧虎後董宣字少平為洛陽令搏擊豪强莫不震懾京師丨丨丨丨歌曰枹鼓不鳴董少平稱為通儒後董鈞字文伯習慶氏禮永平初為博士時草創五郊祭祀及宗廟禮樂威儀章服輒令鈞參議多見用當世丨丨丨丨獻納皆専蜀董允字休昭宫中之事無大小悉以咨之遷侍中丨丨之任允丨丨詔榜篤行董陽三世同居丨丨門曰丨丨董氏之閭見劉喻𫝊南史世之竒士皇朝董昭字公仁太祖引坐問計才策謀略丨丨丨丨委以方面董遵誨范陽人也太祖以西戎近邊使守通逺軍凡十四年蕃漢悅附許以便宜制軍事太祖解其所服真珠盤龍衣命齎賜之綜曰遵誨人臣豈敢當此太祖曰吾丨丨丨丨不此嫌也梁安定商音古今姓纂嬴姓伯益之後秦仲有功周平王封其少子康於夏陽是為梁伯後為秦所滅子孫以國為氏晉有梁益耳梁𢎞梁由靡並其後也安定烏氏縣漢初以豪族自河東徙烏氏事類七序後梁竦字叔敬閉門自養以經籍為娛作丨丨而竊位素餐者慚五噫梁鴻字伯鸞作丨丨之歌女賢伯鸞梁鴻勢家慕其髙節多欲女之並絶不娶孟氏有丨擇對不嫁父母問之曰欲得丨如梁丨丨者鴻聞而聘之字曰德耀妻每具食舉按齊眉州縣勞人梁竦嘗嘆曰大丈夫居世生當封侯死當廟食不然間居可以養志詩書足以自娛丨丨之職徒丨丨耳後辟命交至並無所就跋扈將軍梁冀字伯卓鳶肩豺目質帝知其驕橫目曰丨丨丨丨鯁正御史梁毗字景和隋時以丨丨拜治書侍丨丨名為稱職遷雍州贊務直道而行無所回避文貞廬墓唐梁文貞少從軍守邊逮還親已亡自傷不得養晨夕汛掃丨丨左喑默三十年家人有所問晝文以對有甘露降塋木白兔馴擾縣令刋石紀之梁皓有子本朝梁適字仲賢皓之子也適少孤輯皓制誥并自為文以獻真宗曰丨丨丨丨矣為五鳳樓賦梁周翰字元褒鄭州管城人乾德中太祖大修宫闕用周翰為丨丨丨丨以進杜京兆商音古今姓纂祁姓帝堯劉纍之後在周為唐杜氏成王滅唐遷封於杜杜伯為宣王所滅杜氏分散適魯者杜泄是也古有杜康事類小學前杜鄴字子夏子林清靜好古亦有雅材其正文字過於鄴世稱丨丨者由杜公通儒後杜林字伯山博洽多聞時稱丨丨受詩後杜撫字叔和丨丨後歸鄉里教授沉靜樂道舉動必以禮所作詩題文約義通學者傳之曰杜君法杜母杜詩字公君遷南陽太守以誅暴立威省愛民役造作水排鑄為農器百姓便之時人方為召信臣南陽語曰前有召父後有丨丨杜父晉杜預字元凱京兆杜陵人修邵信臣遺跡激用􅓳涓水以浸原田萬餘頃衆庶賴之號曰丨丨尚主杜預博學多通明於興廢之道文帝嗣位尚帝妹髙陸公主起家拜尚書郎利國杜預拜度支尚書奏立籍田建安邊論處軍國之要興常平倉內以丨丨外以救邊者五十餘條請伐吳杜預啓丨丨丨以太康元年正月陳兵於江陵旬日纍尅城邑皆如預䇿兵威已振勢如破竹數節之後皆迎刃而解建河橋杜預以孟津渡險請丨丨丨於富平津議者以為聖賢不作必不可立故也預曰造舟為梁即河橋之謂也橋成帝從百寮舉觴屬預曰非君此橋不立也杜武庫杜預在內七年損益萬幾不可勝數胡野號曰丨丨丨言其無所不有神仙人晉杜乂字𢎞理成恭皇后父有盛名於江左王羲之目之曰膚若凝脂眼如㸃漆此丨丨丨也為河東最魏杜畿宇伯侯為河東太守崇寬惠有詞訟者為陳大義自是少詞訟魏初以畿為尚書下令曰間將授卿以納言之職顧念河東吾股肱郡故且煩卿卧鎮之在河東十六年常為天下最復先代樂杜慶字公良善鍾律絲竹八音靡所不能紹丨丨丨古丨為大樂令協律都尉家世儒學陳杜之偉字子大丨丨丨丨以三禮専門彊識俊才有名當世以為廊廟之器南史杜家新書杜正藏為文軌二十卷後生寶之多資以解褐謂之丨丨丨丨云隋書海內一人杜正𤣥字知禮耽志經史隋世與秀才試䇿髙第時丨丨唯正𤣥丨丨應秀才後為豫章王記室同上一門三秀杜正倫相州人隋世舉秀才天下不十人而正倫丨丨丨丨才皆髙第為世歆美三人同美杜正倫弟正藏字為善隋初亦舉秀才文無㸃竄時正藏弟正儀貢充進士正倫為秀才兄弟丨丨丨時應命當世嗟丨正𤣥難兄難弟信為美矣為棟梁用唐杜如晦字克明京兆杜陵人隋大業中預吏部選侍郎髙孝基異之曰君當丨丨丨丨房𤣥齡曰如晦王佐才也必欲經營四方捨如晦無其功者同佐佑帝杜如晦為相時天下新定臺閣制度憲物容典率二人討裁每議事帝所𤣥齡必曰非如晦莫籌之及如晦至卒用𤣥齡䇿蓋如晦長於斷而𤣥齡善謀兩人深相知故能丨心濟謀以丨丨丨當時語良相必曰房杜云宴賜銀鍾唐杜淹字執禮材辨多聞秦王引為文學館學士常侍丨賦詩尤工丨丨丨賜君臣針杜希全京兆人積功勞至朔方節度使獻體要八章貶切政病帝嘉丨丨丨丨一篇卿吾蕭何杜鴻漸字之巽第進士太子治兵平凉太子喜曰靈武我之關中丨乃丨丨丨也蜀平卿功杜黃裳字遵素京兆人劉闢叛唯黃裳固勸不赦因奏罷中人監軍而専委髙崇文凡兵進退黃裳自中指授無不切於機丨丨羣臣賀憲宗目黃裳曰丨之丨屈宋衙官杜審言字必簡襄州人才髙嘗語人曰吾文章當得丨丨作丨丨吾筆當得王羲之北面世號蘇杜杜審言少與李嶠崔融蘇味道為文章四友丨丨崔李丨丨秋梨花灾杜景佺冀州人延載初同平章事后嘗季丨出丨丨示宰相以為祥衆賀景佺獨曰陰陽不相奪倫瀆即為丨今草木黃落而木復生瀆陰陽也臣位宰相助天治物治不能和臣之咎也頓首請罪后曰真宰相白兔不奏杜悰字永裕佑子以門蔭太和末為鳳翔節度使有詔沙汰僧尼時有五色雲見監軍欲奏之悰曰雲物變色何常之有未幾獲白兔監軍又欲奏之悰曰野獸未馴且宜畜之旬日而斃監軍不悅以為掩蔽聖德獨畫圖獻之文宗謂悰曰李訓鄭注皆因端以售其亂乃知瑞物非國之慶卿前在鳳翔丨丨丨丨真先覺也對曰云云願陛下専以百姓富安為國慶自餘不足取也上善之號為小杜唐杜牧字牧之祐之孫初牧夢人告曰爾應名畢復夢書皎皎白駒字俄而炊甑裂牧曰不祥也乃自為墓志悉取所為文章焚之牧於詩情致豪邁人丨丨丨丨以别杜甫紙受百畨杜暹濮州人五世同居補婺州參軍秩滿歸吏以丨萬畨贐之暹為丨丨丨衆歎曰昔清吏受一大錢何異哉慷慨懷古杜甫字子美曠放好論天下大事與李白齊名時號李杜酒酣登吹臺丨丨丨丨人莫測也詩不忘君杜甫數嘗寇亂挺節無所汙為歌丨傷時撓弱情丨丨丨人憐其忠排天斡地杜少陵畫像古今詩人題詠多矣獨半山山谷二先生之詩髙出衆作半山詩云吾觀少陵詩謂與元氣侔力能丨丨丨九丨壯顔毅色不可求浩蕩八極中生物豈不稠醜妍巨細十萬殊竟莫見以何雕鎪惜哉命之窮顛倒不見收青衫老更斥餓走半九州瘦妻僵側子卧後攘攘盜賊森戈矛吟哦當此時不廢朝廷憂嘗願天子聖大臣各伊周寧令吾廬獨破受凍死不忍四海赤子寒颼颼傷屯悼屈止一身嗟時之人我所羞所以見公像再拜涕泗流推公之心古亦少願起公死從之遊煎膠續絃山谷詩云拾遺流落錦官城故人作尹眼為青碧雞坊西結茅屋百花潭水濯冠纓故衣未補新衣綻空蟠一作崢嶸胸中書萬卷探道欲度羲皇前論詩未覺國風逺干戈崢嶸一作終風且霾暗㝢縣杜陵韋曲無雞犬老妻稚子且眼前弟妹飄零不相見此公樂易真可人圉翁溪友肯卜鄰鄰家有酒邀皆去得意魚鳥來相親浣花酒船散車騎野牆無主看桃李宗文守家宗武扶落日蹇驢䭾醉起願聞解鞍脫兜鍪老儒不用千戶侯中原未得平安報醉裏眉攢一作倩揚之間萬國愁生綃鋪牆粉墨落平生忠義今寂寞兒呼不蘇驢失腳猶恐醒來有新作常使詩人拜畫圖丨丨丨丨千古無鼠銜孝經皇朝杜鎬字文周常州無錫人少好學初應舉將試有丨丨丨丨疏置榻前鎬怪之取以熟讀果試題出其中遂與選書究本末杜鎬真宗凡得古器異丨必詢之皆能丨其丨丨令人檢閲必其事在其書幾頁幾行未嘗少忘鎬雖春秋髙四鼓起誦春秋遲明已數卷日以為常抑絶僥幸杜衍字世昌越州㑹稽人為相與富弼韓琦范仲淹同革弊事以修綱紀而衍尤丨丨丨丨凡內降恩澤者一切不與每積至十數必面納之仁宗嘗謂諫官歐陽修曰外人知衍封還內降耶吾居禁中有求恩澤者每以衍不可告之而止者多於所封還也由是僥幸寢不說衍為相凡百日而罷諱枉法贓杜衍常言父母之諱在我而已他人何預帥并門吏請家諱衍曰下官無所諱惟丨取丨丨丨阮陳留角音古今姓纂殷有阮國在岐渭之間周文王侵阮徂共見毛詩子孫以國為姓後漢有巴吾令阮敦事類青白眼晉阮籍字嗣宗任性不羈方外之士不崇禮典能為丨丨丨見禮俗之士以白眼對之為步兵校尉三語掾阮瞻字千里見王戎戎問曰聖人貴名教老莊明自然其㫖同異瞻曰將無同戎咨嘆良久即命辟之時人謂之丨丨丨挂布犢鼻阮咸字仲容與叔父籍為竹林之遊居道南北阮富而南阮貧七月七日以竿丨大丨丨丨於庭曰未能免俗一麾出守阮咸歷散騎侍郎補始平太守顔延年作五君詠詠咸云屢薦不入官丨丨乃丨丨金貂換酒阮孚字遙集以丨丨丨丨時望所歸百錢杖頭阮修字宣子丨丨挂丨丨當世富貴不肯顧自得於林阜之間少無宦情阮裕字思曠以德業知名拜臨海東陽二太守還剡山有肥遁之志或問其辭徴聘而宰二郡何邪曰雖屢辭王命非敢以為髙也吾丨丨丨丨皆有風政阮長之字景茂除臨海太守在官常擁敗絮一生不侮暗室所蒞官丨丨丨丨為後人所思宋世言善政者咸稱之南史呼為居士阮孝緒字士宗十三徑通五經屛居一室非定省未嘗出戶丨丨丨丨同上藍汝南徴音古今姓纂藍姓出自藍田春秋時楚大夫有藍尹亹定公五年唐有道人藍采和善踏歌著一靴舞拍扳事類闕閔隴西宫音古今姓纂仲尼弟子閔捐字子騫魯人事類費宰季氏使閔子騫為丨丨曰善為我辭焉如有復我者則吾必在汶上矣語在寢或問淵騫曰丨丨或不寢揚子德行丨丨顔淵閔子騫語五雋晉薛兼同閔鴻等號丨丨張華見之曰皆南金也席安定商音古今姓纂本姓籍晉大夫籍談之後也談十三代孫懷避項羽名改為席氏漢初徙關東豪族席氏徙安定臨徑事類典選知人唐席豫字建侯襄州人長安中舉學兼流略詞擅文埸科擢上第時年十六復舉手筆俊拔科中之俄舉賢良方正異等復舉超拔羣類科遷考功貟外郎韓休輔政舉代已入拜吏部侍郎丨丨六年拔寒逺士多至臺閣當時推丨丨號席公云賦詩最工帝嘗登朝元閣丨丨羣臣屬和帝以豫詩丨丨詔曰詩人之冠冕也同上季渤海徴音古今姓纂陸終氏之子季連之後一云魯桓公子季文之後亦為季氏漢功臣表戚圉侯季必𫝊封四代事類林鍾銘功季武子以所得於齊之兵作丨丨而丨魯丨焉左相無私積季文子卒無衣帛之妾無食粟之馬無藏金玉無重器君子於是知文子之忠於公家也丨三君而丨丨丨同上股肱郡故召季布楚人為任俠有名為河東守孝文時人有言其賢者召欲以為御史大夫復有言其使酒難近至留邸一月見罷布進曰陛下以一人之譽而召臣以一人之毁而去臣臣恐天下聞之有以窺陛下上曰河東吾丨丨丨丨丨君耳金不如一諾楚人諺曰得黃丨百斤丨丨得季布丨丨麻上谷商音古今姓纂風俗通齊大夫麻嬰之後漢麻嬰為御史大夫又麻達注論語唐左司郎中麻察太原狀云石趙凉州刺史廣平麻秋之後唐元功臣左金吾大將軍凉國公麻嗣宗賜姓李氏改名延昌子藏珍事類闕强天水商音古今姓纂丹陽有强氏將石趙常山太守强將容事類號强公渠唐强循字季先鳳州人纍雍州司士參軍華原無泉人畜多渴死循教人渠水以浸田一方利之丨丨丨丨錢塘强至皇朝强獻明字可學汪藻嘗銘其墓曰丨丨丨丨以文學顯熙寧間有子五人曰浚明淵明偉明陟明獻明兄弟復以文學踵相躡登進士第淵明入翰林為學士承㫖諡文獻浚明自尚書郎奉使吳中偉明陟明皆有名蹟以沒獻明召掌戶部架閣文字浚明子行父亦能世其家古今合璧事類備要續集卷十八
