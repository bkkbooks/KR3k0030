body:
  text: 古今合璧事類備要後集卷八宋謝維新撰臣道門度量古今總論人臣之事君析而言之其徳有九總而言之其徳不過三焉自臯陶發為九徳之論又申之以六徳三徳之説要其所謂三者惟正直剛柔而已古今臣子委質為臣上而致君下而澤民其見於度量徳量皆柔徳也至於潛身逺害甘於勇退而自處於恬退者亦柔徳之弊其見於力量志氣威名者皆剛徳也至於流而為戰國之豪俠者亦剛徳之縱又其見於正直忠鯁清亷譽望者皆正直之徳也至於縱而為貪濁之汚臣亦正直之反是以分言之則有九徳合言之則亦不離乎三徳也三代之衰光岳氣分天下無全人人才無全徳間有得乎此而又未免失乎彼盡其一而又未免遺其二此論古今之人物徃徃嘆後世之不如古者盖以此事類包荒丨丨用馮河易有容丨丨徳乃大書有制寛而丨丨從容以和同上自下丨丨者人髙之老子愛民寛以丨丨記得衆寛則丨丨論語鞭耻後劉寛字文饒吏人有過但蒲丨示丨而已羮爛又夫人欲試之趨朝裝畢使婢奉肉羮翻汚朝衣上遽收寛神色不異徐謂婢曰丨丨汝手乎同上情恕晉衞玠字叔寶嘗云人有不及可以丨丨理遣非意相干可以丨丨故終身無喜愠之色同上圍棊謝安符秦百萬攻淮淝安携妓東山丨丨别墅折屐謝安破符秦歸户内不覺丨丨同上寛簡唐郭翰性丨丨又顧少車政尚丨丨不為灼灼名長厚常衮與楊綰同執政綰丨丨通可而衮苛細寛博元宗命蕭暠為相暠性丨丨多不可及暠引韓休同列休峭鯁寛易袁滋性丨丨與之接者皆自謂可見肺腑又五代劉鼎性若丨丨而與選曹案吏有風稜坦蕩蕭頴士送弟旭東歸序云冲融丨丨莫可得而窺也渾厚盧知猷噐量丨丨世推為長者不苛細唐楊恭仁賜甘州刺史臨事丨丨丨徼人安之不加罪裴行儉常賜馬及珍鞍令吏私馳馬馬蹶鞍壊懼而逃行儉招還云丨丨丨不榜責吴湊僚吏非大過丨丨丨召至廷詰服原去其下傳相訓勉舉無稽事不忍按許圉師為相州刺史以寛治部有受賕者圉師丨丨丨其人自媿後修飾更為亷士萬頃波後黄憲字叔度郭林宗曰叔度汪汪丨丨丨不可量也萬里江杜牧之詩時人欲識胸襟否彭蠡秋連丨丨丨必忍有濟丨有丨其乃丨丨書不欲勿施已所丨丨丨丨於人語卑以自牧謙謙君子丨丨丨丨注牧養也易可終身行子貢曰有一言而丨以丨丨丨之者乎語見過掩匿曹參為相國舍後園近吏舍日夜飲呼吏患之引參遊園幸國相召按之乃反獨悵坐飲亦歌呼相應丨人細丨丨丨盖覆漢史詰罪第忍丙吉為相馭吏頻醉西曹丨丨之吉曰以醉飽之過斥人欲令安歸乎不過嘔吐丞相車茵西曹丨丨之遜以自免唐婁師徳深沉有度量人有忤己丨丨丨丨不見容色嘗與李昭徳偕行師徳素豐碩不能遽歩昭徳遲之恚曰為田舍子所留師徳笑曰吾不田舍復在何人色不少吝裴行儉初平都支遮匐獲瓌寶不貲蕃酋將士願觀焉行儉因宴徧出示坐者有碼碯盤二尺文彩粲然軍吏趨跌盤碎惶懼叩頭流血行儉笑曰爾非故也丨丨丨丨盛徳所容狄仁傑未輔政婁師徳薦之后曰朕用卿師徳薦也誠知人矣出其奏仁傑慚已而嘆曰婁公丨丨我為丨丨乃知吾不逮逺矣大徳并容陽城出為道州刺史太學諸生何蕃等二百人頓首闕下請留城柳宗元聞之遺蕃等書曰公有博厚恢丨之丨丨丨善偽來者不拒有狂惑小生依託門下飛文陳愚論者以為陽公過於納汚稱其有量孫伏伽拜御史時先被内㫖而制未出歸卧家無喜色頃之御史造門子弟驚白伏伽徐起自若時人丨丨丨丨以比顧雍器重其量李泌竇參愛李吉甫之才厚遇之陸贄疑有黨出為明州長史贄之貶忠州宰相欲害之起吉甫為忠州刺史使甘心焉既至置怨與結歡人丨丨丨丨莫涯其量宋璟風度凝遠人丨丨丨丨不窺其際陽城居位八年人丨能丨丨丨含垢匿瑕晉陳騫沉厚有智謀少有度量丨丨丨丨所在存積莊重寡言唐李栖筠有逺度丨丨丨丨吞雲夢八九司馬相如子虚賦丨若丨丨者丨丨於是胸中曽不芥蔕容卿軰數百晉周顗性寛裕王導甚重之嘗枕顗膝指其腹曰此中何所有也答曰此中空洞無物足丨丨丨丨丨人導亦不以為忤未嘗見喜怒唐賈眈自朝歸第接對賓客終日無倦家人近習丨丨丨其丨丨之色古之淳徳君子何以加焉烏可究津涯丨丨丨其丨丨而窺其墻仞文粹巍若山湛若水仰之彌峻丨乎其丨丨挹之彌深丨乎其丨丨同上登泰華臨溟渤若丨丨丨丨丨丨但觀乎積髙而水深不知磅礴澶漫所為逺大者也杜牧之文窘拾小過不懌本朝韓億在中書見諸路職司丨丨官吏丨丨丨丨曰今天下太平主上之心雖昆蟲草木皆欲得所士之大者望為公卿次而望為侍從職司二千石下亦望為州郡幕職官奈何錮之於聖世語侵杜衍不恨杜衍曰今之在位者多是責人小節是誠不恕也衍厯知州提轉安撫未嘗壊一官員其不職者委之以事使不暇惰不謹者諭以禍福不必繩以法也范仲淹嘗與衍論事異同至以丨丨丨丨丨為丨獨不辭其屬官王安石創條例司人皆議其非惟程顥丨丨丨丨丨丨而爭新法之時獨能使之心感意動若見崖州司户㓂凖為丁謂所擠坐貶崕州司户後丁謂罷相亦貶崖州或作詩贈之曰丨丨丨丨㓂丨丨人生何處不相逢黄庭堅蘇李畫枯木道士賦商宇宙者朝徹於一指計禇中者心醉於九九言其不同識也胾鵬背而不蒂芥烹䑕肝而腹果然言其不同量也明道遺書曰人於議論多欲直已無含容之氣是氣不平否曰固是氣不平亦是量狹人量隨識長今人有斗筲之量有釡斛之量有鍾鼎之量有江河之量江河之量固大矣然有涯涯亦有時而滿惟天地之量則無滿故聖人者天地之量也詩集思風山川正氣侵靈府雪月清輝引丨丨方干贈李郢端公詩春辭君子量不極胸吞百川流嫉邪覇䑓直閣客丨丨柔孟郊贈裴樞端公詩器量古今源流見前總論事類美人彼丨丨兮西方之人兮詩髦士丨丨攸宜又譽丨斯丨瑚璉子貢問曰賜也何如曰汝噐也曰何器也曰丨丨也論語斗筲子曰丨丨之人何足筭也注丨丨小噐同上玉表珉中而丨丨楊子鷙翰鳯鳴而丨丨者也同上蜂目楚公子商臣丨丨而豺聲忍人也左傳熊狀越椒之生也其母曰是子也丨虎之丨豺狼之聲弗殺必滅若敖氏矣同上國士漢蕭何竒韓信曰如信丨丨無雙乃薦之竒士漢江充魁岸容貌甚壮帝望見之曰燕趙固多丨丨冠玉陳平曰美丈夫如丨丨耳其中未必有也峙玉唐鄭畋姿采如丨丨眞相漢王商身長八尺餘容貌絶人單于來朝仰視迂延却退天子聞而嘆曰丨漢丨也封侯後班超虎頭燕頷飛而食肉萬里侯相後丨為定逺丨師表後黄憲字叔度世貧賤荀俶遇憲於逆旅時年十四悚然異之謂子吾之丨丨也既前見袁閬所未及勞問俶曰子國有顔子識之乎閬曰見吾黄叔度耶是子澄之不清撓之不濁異才王粲字仲宣詣蔡邕邕倒屐迎粲粲年少容貌小短座盡驚邕曰王孫有丨丨吾不如也吾家書籍文章當盡與之玉人晉裴楷字叔則為吏部侍郎風神髙邁容儀俊爽愽渉羣書特精義理時人謂之丨丨又王敦以衛玠為丨丨稱王夷甫處衆中如珠玉在瓦礫間也氷鏡龎徳公自謂徳操為丨丨又晉衞瓘見樂廣而竒之曰此人之丨丨見之瑩然卧龍蜀龎徳公自謂諸葛孔明為丨丨鳯鶵龎統士元為丨丨同上武庫晉裴楷目鍾會如觀丨丨森森但見矛㦸在前瑕玷靡所不見又周弼見裴頠嘆曰若丨丨五兵縱横一時之傑聲鐘陸機身長七尺其丨如丨清通吏部闕文帝問其人於鍾㑹㑹曰裴楷丨丨簡要王戎丨丨皆其選也於是以楷為之並同上南金晉薛兼子少長少與紀膽閔鴻顧榮如循齊名號為五俊初入洛張華見而竒之曰此皆丨丨也倚玉魏明帝使后弟毛繒與夏侯泰初共坐時人謂之蒹葭丨丨樹泰初如朗月入懐確論唐太宗以王珪善人物且知言因謂曰卿標鍳通晤為朕言元齡等材自謂孰與諸子賢對曰孜孜奉國知無不為臣不如元齡兼資文武出將入相臣不如靖敷奏詳明出納惟允臣不如彦博濟繁治劇衆務必舉臣不如胄以諫諍為心耻君不及堯舜臣不如徵激濁揚清疾惡好善臣於數子有一日之長帝稱善元齡等亦以為盡已所長謂之丨丨知言高宗問賈曽諸將材否對曰李勣舊臣陛下所自悉龎同善雖非闘將而持軍嚴薛仁貴驃勇冠軍髙偘忠果而謀契苾何力性沈毅闕莫逮有統御才然夙夜小心忘身憂國於勣者衆亦以為丨丨天瑞唐鄭仁表自髙曰丨丨有五色雲人瑞有鄭仁表人瑞見上四䕫唐崔造韓㑹盧東羙張正則皆自謂王佐才故號丨丨文藝傳三鳯薛収與姪元敬徳竒齊名世稱河東丨丨收為長雛竒為鸑鷟元敬年少為鵷四傑唐王勃楊烱盧照鄰駱賓王皆文章齊名天下號丨丨並同上五絶太宗稱虞世南有丨丨徳行忠直博學文詞書翰徳不孤直方大敬義立而丨丨丨易徳之賊一郷皆稱原人孔子以為丨丨丨何哉居之似忠信行之似亷潔衆皆悦之自以為是而不可與入堯舜之道孟子趙魏老孟公綽為丨丨丨則優不可以為滕薛大夫論語謀野邑禆諶能丨於丨則獲謀於丨則否左傳方伯噐張既字徳容世寒素兒童時馮翊功曹游殷察之邀既還家設賓饌請之妻笑曰童昏小兒殷曰丨丨丨也與論王伯之畧遂以子楚托之後既薦楚吳興太守魏三輔决録王佐才袁崧漢書王允字子師世仕州郡為冠盖郭林宗見而竒之曰王生一日千里丨丨丨也遂與之友後允至司徒又唐泰王引杜如晦為府兵曹參軍時府屬多外遷王患之房元齡曰去者雖多不足吝如晦丨丨丨也又牛𢎞見李靖曰丨丨丨也稱許郭後郭泰字林宗許邵字子將咸有知人之鍳故天下言㧞士者咸丨丨丨之鍳署督郵後鄭𢎞字巨君為郷嗇夫太守第五倫行春見而竒之丨丨丨千丈松晉和嶠有盛名庾亮見而歎曰嶠森森如丨丨丨雖磥砢多節目施之大厦有棟梁之用八斗才謝靈運云天下才共一石曹子建獨得丨丨我得一斗自古及今共用一斗竒丨博識安足繼之魏志禮樂器晉武侯𤣥樂裴目𤣥云肅肅如入宗廟中但見丨丨丨玉筍班唐蔣凝羙風標每到朝士家以為祥瑞朝士中號為丨丨丨北窻𤨏言棟梁用隋大業中杜如晦預吏部選侍郎髙孝基異之曰君當為丨丨丨願保令徳台輔噐婁師徳盧承業異之曰子丨丨丨也當以子孫相諉詎論僚吏哉公輔才唐王珪少孤且貧始隠居時房元齡杜如晦善母李嘗曰兒必貴然未知所與游者何如人而試與偕來㑹房元齡等過其家李闚大驚勑具酒食歡盡日喜曰二客丨丨丨汝貴不疑卿相才溫大雅與弟彦博大有皆知名薛道衡見之曰皆丨丨丨也飣座棃崔逺有文而風致整峭世慕其美目之為丨丨丨言所珍也蘭菊芬裴子餘補鄠尉同舍李朝隠程行諶以文法稱而子餘以儒顯或問優劣於長史陳崇業答曰丨丨異丨胡有廢者廊廟才張行成少師事劉炫炫謂門人曰行成體局方正丨丨丨也將相才于劭樊澤始舉賢良劭望見曰丨丨丨也清廟噐李珏為殿中侍御史宰相韋處厚曰丨丨之丨豈擊搏才乎除禮部員外郎嚴稜望崔從為人丨偉立朝丨稜有風丨玉界尺趙光逢在唐以文行知名時人稱其方直溫潤謂之丨丨丨才中人裴度退然丨丨丨而神觀爽邁五代史可承王事衛之賢者仕於伶官皆丨以丨事王者也詩歸告使相鮑叔丨而以丨曰管夷吾治於髙徯丨丨可也左傳管仲之噐丨丨丨丨小哉語犂牛之子丨丨丨丨騂且角雖欲勿用山川其舍諸同上牧御之才後光武鄧禹曰㓂恂文武備足丨丨民衆丨丨也將相之噐賈復字君文始舉習尚書舞陰李生竒