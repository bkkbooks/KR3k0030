撼乾丨丨軸丨丨樞鼓元氣而雷域中騰百川而雨天下據河擘華丨長丨如指盃丨太丨若破塊天下為己任本朝趙普沈毅果敢在朝十年以丨丨丨丨丨某人當薦雖裂其奏而必進某官當遷雖咈上意而必從奏疏不可者雖焚之通衢而不恤其規模力量之堅定如此而金匱一書復有以開奕世太平之輔持重定大計吕端持重識大體鎻王繼恩於閣内而大計已定及真宗即位卷簾升殿審視而後降拜其膽畧如此盡力以事君韓琦曰凡為人臣者丨丨丨丨丨死生以之顧事是非如何耳若夫成敗則天也事君無所避王巖叟言韓琦嘗教臣以丨丨之道前不希寵後不畏死左右丨丨丨中間惟有誠意而已韓琦夷險一致公出入將相勤勞王家丨丨丨丨丨丨至於臨大事决大疑垂紳正笏不動聲色措天下於泰山之安歐陽晝錦堂康伯謀猷靖深陳丨丨起布衣致位上台丨丨丨丨動合機㑹故以為度量似謝安徳用似楊綰用能運動樞極再安天下顯有丕績卒為功臣言行録㓂準鼻息如雷丨丨在澶淵每夕與楊億飲博歌謳諧謔歡呼常逹旦或就寢則丨丨丨丨上使人視之喜曰得渠如此吾復何憂言行録張詠城門不閉有妄言南詔欲來㓂蜀蜀守調兵築城民大驚擾朝廷聞之詔張文定公移鎮西蜀公言此必妄也當以靜鎮之入境下令曰㓂來吾自當之妄言者斬悉歸所調兵罷築城之役會上元觀燈丨丨皆通夕丨丨蜀遂大安東坡張文定公墓誌萊公親扶日轂景徳中敵窺澶淵中外震驚全軀之臣百計身保丨丨丨丨丨丨不動如山卒使敵人幾無匹馬隻輪之返乖崖下馬三呼張丨丨守成都兵火之餘人情反側一日合軍旅大閱始出衆遂嵩呼者三乖崕亦丨丨東北望而丨丨復攬轡行衆不敢讙王清馬塵史宗旦叱罵儂賊孔丨丨丨丨丨丨其死如飴丁隲不附新法丨丨丨丨丨丨擢為正言恐不能臨大節神宗謂司馬光曰今中外大臣更無可用獨陳升之有才智曉民政邊事他人莫及光曰升之才智誠如聖訓丨丨丨丨丨丨而不可奪耳憤死而事一變髙宗建炎初宗澤留守京城數月之間城壁増固龍濠開浚寨柵羅列義士團結五丈河已通流陜西京東北盗皆歸附前後二十餘䟽請上還京為汪黄所沮未及一年而丨丨澤死丨杜充繼天下丨丨丨矣蘇東坡伊尹論立天下之大事者有天下之大節者也夫以天下之大而不足以動其心則天下之大節有不足立而大事有不足辦者矣今夫匹夫匹婦皆知潔亷忠信之為羙也使其果潔亷而忠信則其智慮未始不如王公大人之能也唯其所爭者止於簞食豆羮而簞食豆羮足以動其心則是其智慮之不出乎此也簞食豆羮非其道不取則一郷之人莫敢以不正犯之而不能辦一郷之事者未之有也推此而上其不取者愈大而其所辦者愈逺矣讓天下與讓簞食豆羮無以異也治天下與治一鄉亦無以異也然而不能者有所蔽也天下之富是簞食豆羮之積也天下之大是一郷之推也非千金之子不能運千金之資販夫販婦得一金而不知所措非智不足所居之卑也孟子曰伊尹耕於有莘之野非其道也非其義也雖禄之天下弗受也夫天下不能動其心是故其才全以其全才而制天下是故臨大事而不亂古之君子必有髙世之行非茍以為異而以卿相之佐千金之冨有所不屑將以自廣其心使窮逹利害不能為之芥蔕以全其才而欲有所為耳後之君子亦嘗持其志矣得失亂其中而榮辱奪其外是以役役至於老死而不暇亦足悲夫孔子叙書至於舜禹臯陶相讓之際盖未嘗不太息也夫以朝廷之尊而行匹夫之讓孔子安取哉取其不汲汲於冨貴有以大服天下之心焉耳夫太甲之廢天下未嘗有是而伊尹始行之天下不以為驚以臣放君天下不以為僭既放而復立太甲不以為専何則其素所不屑者足以取信於天下也彼其視天下眇然不足以動其心而豈忍以放廢其君求利也哉後之君子蹈常而襲故惴惴焉懼不免於天下一為希闊之行則天下羣起而誚之不知求其素而以為古今之變時有所不可者亦已過矣蘇子瞻樂全先生文集序昔北海孔融志大而論髙功烈不見於世然英偉豪傑之氣自為一時所宗其論盛孝章郄鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之姿綜練名實之意自見於言語至出師表簡而靜直而不肆大哉言乎與伊尹説命相表裏非秦漢以來以事君為悦者所能至也常恨二人之文不見其全今吾樂全先生張公安道名方平者不其庻幾乎嗚呼士不以天下之重自任久矣言語非不工也政事文學非不敏且博也然至於臨大事鮮不忘其故失其守者其器小也公為布衣則頎然已有公輔之望自少出仕至老而歸未嘗以言狥物以色假人雖對人主必同而後言毁譽不動得䘮若一眞孔子所謂大臣以道事君者世逺道散雖志士仁人或少貶以求用公獨以邁徃之氣行正大之言曰用之則行舍之則藏上不求合於人主故雖貴而不用用而不盡下不求合於士大夫故悦公者寡不悦者衆然至言天下偉人則必以公為首公盡性知命體乎自然而行乎不得已非蘄以文字名世者也詩集嶽立多君秉古節丨丨冠人曹李白詩力排丨丨南山三壯士齊相殺之費二桃同上梁甫吟冠雲霄峻節丨丨丨同上詩匡社稷傅説版築臣李斯鷹犬人歘起丨丨丨寧復長艱辛同上冬夜詩攬犀象孤月倒江河赤手丨丨丨坡詩縛於莵更能赤手丨丨丨同上送徐徳之詩萬牛挽不前丨丨丨丨丨公乃獨力扛黄山谷詩破敵如摧山昔為瓊樹枝今有鳯標顔丈夫當為國丨丨丨丨丨何必事州府空使鬢毛斑韋應物寄暢當詩古今合璧事類備要後集卷八
