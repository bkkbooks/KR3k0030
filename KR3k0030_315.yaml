body:
  text: 古今合璧事類備要外集卷十五宋謝維新撰音樂門琵琶音樂㫖歸琵琶按應劭風俗通近代樂家作不知所起長三尺五寸法天地人與五行四絃象四時釋名曰推手向前曰琵却手向後曰琶因以名焉事類朱絃白氏帖象柱梁山丨丨同上絃鞉琵琶出於丨丨杜縶以為秦之末蓋苦於長城之役後百姓丨丨而鼓之馬上鼓琵琶本胡中丨丨所丨也釋名馬上奏漢遣烏孫公主念其行道思慕使知音丨丨丨琵琶以慰之牖下彈謝仁祖在北丨丨丨琵琶有天際之意世説樓上彈謝鎮西在大市丨丨丨作大道之曲朱生善丨丨丨彈琵琶雖伯牙之妙無以加焉阮咸善丨丨丨彈琵琶竹林七賢傳孫放善丨丨孔偉阮咸丨彈琵琶康崑崙奏讓皇帝子瑀聞丨丨丨丨琵琶曰琵聲多琶聲少是未可彈五十四絲大絃也樂家以自下逆鼔曰琵自上順鼓曰琶唐令則奏李綱仕隋為太子洗馬太子勇宴宫臣左庶子丨丨丨丨琵琶又歌武媚娘曲綱曰令則官調護乃自比倡優進淫聲惑視聴誠使上聞之豈不為殿下累乎龍首琵琶西舍利獻其國樂至成都韋臯以其樂器異常乃圗畫以獻有丨丨丨丨一如龜兹製而項長二尺六寸餘腹廣六寸二龍相向為首有軫柱各三絃隨其數兩軫在項一在頸其覆形如師子雲頭琵琶有丨丨丨丨一形如前面飾虺皮四面有牙釘以雲為首軫亦有花象品字三絃覆手皆飾虺皮刻捍撥為舞崑崙狀而彩飾之號秦漢子初隋有琵琶圓體脩頸而小丨曰丨丨丨葢絃鞉之遺制出於胡中秦漢所作畫國王形髙麗伎有琵琶似虵皮為槽厚寸餘有鱗甲楸木為面象牙為捍撥丨丨丨丨唐樂志睿宗所御胡羯犯京上欲遷幸復登華蕚樓置酒四顧乃命進玉環玉環者丨丨丨丨琵琶也異時上長樂宫中常置别榻以帕覆之不以雜他樂器而未嘗持用至是命樂工賀懷智取調之又命禪定僧段師彈之貴妃每抱天寶中中官白秀正自蜀使回得琵琶以獻其羅以沙檀為之温潤如玉光耀可鑑有金縷紅文蹙成雙鳯丨丨丨丨琵琶奏之音韻凄清飄出雲外諸貴主泊虢國夫人號為丨丨琵琶弟子每授曲畢皆廣為獻沙檀槽羅見上龍香板撥貴妃善擊磬上令琢藍田緑玉成磬妃琵琶以丨丨丨為丨貴妃外傳大小忽雷文宗朝有内臣鄭中丞善胡琴内庫有二琵琶號丨丨丨丨舊吏梁厚本在昭應别墅垂釣之際忽有一物過長五六尺許以錦纒之令家僮接得就岸即秘器也發視乃一女郎粧色儼然巾繫其頸口鼻有餘息將養經旬是内弟子厚本納為妻言琵琶因提頭脫送南趙家料理值訓注之亂人莫知之厚本購得之夜分方敢輕彈後遇良辰花下酒酣朗彈数曲有黄門過云鄭中丞琵琶聲也翌日達上聴文宗追悔至是驚喜遣使宣召赦厚本罪任從疋偶同上妙絶入神貞元中康崑崙善琵琶第一手兩市祈雨因鬭聲樂崑崙登街東綵樓彈一曲新翻羽調緑腰注云緑腰即録要是也本自樂工進曲上令録出要者必謂街西無敵曲罷西市樓上出一女郎抱樂器云我亦彈此曲兼移在楓香調中及下撥聲如雷丨丨丨丨崑崙拜請為師女郎更衣出乃僧善本俗姓段翌日徳宗召入令教崑崙段師曰請彈一調及彈曰本領何雜兼帶邪聲崑崙曰段師神人也臣少學時令鄰家女出授一品絃後易數師段曰且遣崑崙不近樂器十餘年忘其本態然後可教詔許之後果盡得師之藝同上使二女舞柴紹吐谷渾黨項冦邊勅紹討之虜據髙射紹軍兩矢士失色紹安坐遣人彈胡琵琶丨丨丨子丨虜疑之休射觀命諸子鼓吳越錢鏐嘗嵗除夜每丨丨丨及諸孫丨胡琴一再行遽止之曰人將以我為長夜之飲也九國志傅𤣥賦序曰代本不載作者故老云漢送烏孫公主念其行道怨慕使知音者馬上彈琵琶以慰之云云孫該賦絃則岱谷色絲篚貢天府大不過宫細不過羽成公綏賦好和者倡譛善聴者咨嗟眩睛駭耳失節蹉跎白樂天琵琶行元和十年予左遷九江郡司馬明年秋送客湓浦口聞舟船中夜彈琵琶者聴其音錚錚然有京都聲問其人本長安娼女嘗學琵琶於穆曹二善才年長色衰委身為賈人婦遂命酒使快彈數曲曲罷憫然自叙少小時歡樂事今漂淪憔悴轉徙於江湖間予出官二年恬然自安感斯人言是夕始覺有遷謫意因為長句歌以贈之凡六百一十二言命曰琵琶行潯陽江頭夜送客楓葉蘆花秋索索主人下馬客在船舉酒欲飲無管絃醉不成歡慘將别别時茫茫江浸月忽聞水上琵琶聲主人忘歸客不發尋聲暗問彈者誰琵琶聲停欲語遲移船相近邀相見添酒回燈重開宴千呼萬喚始出來猶把琵琶半遮面轉軸撥絃三兩聲未成曲調先有情絃絃掩抑聲聲思似訢平生不得志低眉信手續續彈説盡心中無限事輕攏慢撚抹復挑初為霓裳後六么大絃嘈嘈如急雨小絃切切如私語嘈嘈切切錯雜彈大珠小珠落玉盤間闗鶯語花底滑幽咽泉流水下灘水泉冷澁絃疑絶疑絶不通聲暫歇别有幽愁暗恨生此時無聲勝有聲銀瓶乍破水漿迸鐵騎突出刀鎗鳴曲終收撥當心畫四絃一聲如裂帛東船西舫悄無言惟見江心秋月白沉吟放撥插絃中整頓衣裳起斂容自言本是京城女家在蝦蟇陵下住十三學得琵琶成名屬教坊第一部曲罷曽教善才服妝成每被秋娘妬五陵年少爭纒頭一曲紅綃不知數鈿頭雲篦擊節碎血色羅裙翻酒汙今年歡笑復明年秋月春風等閒度弟走從軍阿姨死暮去朝來顔色故門前冷落鞍馬稀老大嫁作商人婦商人重利輕别離前月浮梁買茶去去來江口守空船遶船月明江水寒夜深忽夢少年事夢啼妝淚紅欄干我聞琵琶已嘆息又聞此語重唧唧同是天涯淪落人相見何必曽相識我從去年辭帝京謫居卧病潯陽城潯陽地僻無音樂終歲不聞絲竹聲住近湓池地低濕黃蘆苦竹遶宅生其間旦暮聞何物杜鵑啼血猿哀鳴春江花朝秋月夜徃徃取酒還自傾豈無山歌與村笛嘔啞嘲􅑜難為聴今夜聞君琵琶語如聴仙樂耳暫明莫辭更坐彈一曲為君翻作琵琶行感我此言良人立却坐促絃絃轉急凄凄不似向前聲滿座重聞皆掩泣就中泣下誰最多江州司馬青衫濕黃山谷松木道士賦昔阮咸宏深識清濁酒沈於陸無一物可輕右琴瑟而左琵琶陶冶此種不溷不濁是謂之竹林之曲詩集娛心所樂亦非琴惟琵琶與筝言能丨我丨晉傅亮促節丨丨營紅袖清音滿翠帷駃彈風響急緩曲漏聲遲唐太宗檀槽琵琶聲亮紫丨丨李宣金槽丨丨琵琶夜悵悵李賀絃索夜半月髙丨丨鳴賀老琵琶定場屋元㣲之連昌宫詞宫調琵琶丨丨八十一元稹破恨請上琵琶絃丨得春風丨李賀破撥低鬟緩視抱明月纎指丨丨生胡風劉禹錫秦娘歌曲中論分明怨恨丨丨丨杜千般調琵琶絃促丨丨丨方干事已非琵琶丨丨丨宋樂府撥弄琵琶絶藝年紀都來十一二丨丨么絃未解將心指下傳主人嗔小欲向東風先醉倒已屬君家且更從容等待他東坡木蘭花曲中傳小蓮初上琵琶絃彈破碧雲天分明綉閣幽恨都向丨丨丨故膚瑩玉鬢梳蟬綺忩前素娥今夜故隨人似鬭嬋娟前人訴𠂻情知音少好因縁惡因縁秖得郵亭一夜眠别神仙是琵琶撥盡相思調丨丨丨待得鸞膠續斷絃何年陶榖長相思籥音樂㫖歸籥三孔笛也竹為之長三尺按爾雅大者謂之産其次謂之仲小者謂之筠事類三孔籥如笛丨丨記明堂位又如篴三空禮笙師注又三禮曰籥春分之音萬物動也唐禮樂志十孔廣雅六孔籥丨丨詩簡兮注筆籥丨丨伊耆氏之樂也記明堂位竹籥豳籥注鄭司農云豳籥豳國之地禮籥章籥舞夔作樂以歌丨丨大戴禮籥章丨丨龡豳雅擊土鼓以樂田畯中春晝擊土鼓龡豳詩以逆暑中秋夜迎寒亦如之凡國祈年于田祖歌豳雅祭蜡龡豳頌以息老物禮樂和奏賔之初筵籥舞笙鼔丨既丨丨詩萬入去壬午猶繹丨丨丨籥傳曰去其有聲者公羊宣釋奠吹王義方貶吉安丞行丨丨禮清歌丨籥登降跽立人大恱順雅樂有文宗好丨丨製雲韶樂有籥一文舞執執籥持羽魏證送丨丨迎武舞入用舒和又丨丨郎左丨籥五代崔恱傳詩集紅頰吹丨丨丨鳴籥韓郾城聮句箜篌音樂㫖歸箜篌瑟名二十五絃漢武帝始作及其後也代有制造是不一體事類用樂作漢武祠太一后土始丨丨丨箜篌史封禪依琴造或曰名坎侯漢武帝命侯暉丨丨丨坎言其坎坎應節因其姓曰坎侯也今訛為箜篌侯氏作丨丨丨故曰箜篌太史解晉永和詔丨丨丨士非祠曲可琵琶箜篌也起居注濮上音箜篌乃鄭衛之音出桑間丨丨之地權輿也以其亡國之丨故號空國之侯其制二十有四絃霍里歌琴操箜篌引者丨丨子髙所作也子髙見白首提壺涉河其妻隨而止之不及墮河溺死妻乃援箜篌作公無渡河之曲丨曰公無渡河公竟渡河公墮河死當柰公何曲終自投河死子髙援琴而冩其歌聲名曰箜篌引立箜篌丨丨丨漢靈帝好之體曲而長二十三絃抱于懷中兩手齊奏謂之擘胡箜篌靈帝好胡服作丨丨丨卧箜篌魏髙陽王雍美人徐月華能彈丨丨丨為明妃出塞之聲雜俎監軍彈哥舒翰丨丨李大宜在軍中不治事與將士丨箜篌為樂孫氏賦丨丨有箜篌丨其文甚美麗白氏帖伎有鳳首樂工天笁丨丨丨丨箜篌一上有朱字有李生者其舅姓盧有道術别乆忽相遇邀李生詣其居曰求得一妓善箜篌令侍飲李生視箜篌丨丨丨丨云雲中辨江樹天際識歸舟盧曰此人名家莫要作婚姻否李莫測而退後娶陸長源女乃所見於盧家者問何能曰善箜篌示之朱字宛然李生具説女亦曰徃嘗夢至一處亦記見生逸史晉鈞滔母孫氏箜篌賦考玆器之所起實侯氏之所營逺不假於琴瑟顧無取乎竽笙爾乃陟九峻之増巖晞丞温之朝日剖嶧陽之孤桐伐楚宫之椅漆徵班輸之造器命伶倫之調律浮音穆以遐暢沉響幽而若絶樂操則寒條反榮哀曼則晨華朝滅邈漸離之清角超子野之白雪然思超梁甫願登華岳路嶮悲秦道難怨蜀遺逸悼行邁之離秋風哀年時之速陵危柱以頡頑憑哀弦以躑躅於是數轉難測聲變無方或冉弱以飄沉或頓壯以抑揚或散角以放羽或攄徴以騁商韋述宗廟加籩豆議今欲取甘㫖之物肥濃之味皆充祭用韶濩可息而箜篌笙笛皆在奏矣洪容齋續筆五十絃瑟李商𨼆詩云錦瑟無端五十絃説者以為錦瑟者令狐丞相侍兒小名此篇皆寓言而不知五十絃所起劉昭釋名箜篌云師延所作靡靡之樂葢空國之侯所作也段安節樂府録云箜篌乃鄭衛之音以其亡國之聲故號空國之侯亦曰坎侯吳兢解題云漢武依琴造坎侯言坎坎應節也後訛為箜篌子按史記封禪書云漢公孫卿為武帝言大帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃於是武帝益召歌兒作二十五絃及空侯應劭曰帝令樂人侯調始造此器前漢郊祀志備書此事言空侯瑟自此始顔師古不引劭所注然則二樂本始曉然可攷雖劉吳博洽亦不深究且空元非國名其説尤穿鑿也初學記太平御覽編載樂事亦遺而不書莊子言魯遽調瑟二十五絃皆動葢此云續漢書云靈帝胡服作箜篌亦非也詩集挑吹捩遲初丨丨弄急時催舞釧響逐弦鳴衫逈半鄣柱欲知心不平君看黛眉聚梁簡文抱撮國府樂手彈箜篌赤黃絛索金搭頭早晨有勅鴛鴦殿夜靜逐歌明月樓起坐可憐能丨丨大指調弦中指撥腕頭花落舞製裂手下鳥驚飛撥刺珊瑚席一聲一聲鳴錫錫羅綺屏一絃一絃如撼鈴急彈好遲亦好宜逺聴宜近聴左手低右手舉易調移音天賜與大絃似秋雁聫聫度隴闗小絃似春燕喃喃向人語手頭疾腕頭軟來來去去如風卷聲清冷冷鳴索索垂珠碎玉空中落美女爭窺玳瑁簾聖人捲上真珠箔大絃長小絃短小絃𦂳快大絃緩李供奉儀容質身才稍稍六尺一在外不曽輒教人内裏聲聲不遣出馳鳳闕拜鸞殿天子一日一回見王侯將相立馬迎巧聲一日一迴變實可重不惜千金買一弄顧況李供奉彈箜篌歌吳絲張丨丨蜀桐丨髙秋李賀箜篌引荆玉碎丨山丨丨鳯凰叫芙蓉泣露香蘭笑十二門前融冷光二十三絲動紫皇李賀詩薊門桑葉有一遷客登髙樓不言不寐彈箜篌彈作丨丨丨丨秋風沙颯颯青塚頭王昌齡箜篌引古今合璧事類備要外集卷十五
