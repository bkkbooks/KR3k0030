body:
  text: 古今合璧事類備要别集卷二十二宋謝維新撰花門梅花附紅梅蠟梅格物總論梅之來久矣考之前載其始見於炎帝之經至於詩書靡不稱述自是以來漢見於上林苑魏見於曹林晉見於江南南北朝宋見於含章宫梁見於揚州法曹廨舍隋又見於羅浮松林間花之名始著見於墨客騷人之手者不一下逮李唐而至于本朝其賦詠何多也然其品類亦甚蕃有非一言之所能盡雖其間譜之者不一而足亦不過隨所得而為之是豈一人之耳目所可得而遍及耶以見天地之大造物之巧窮之而不可勝窮也物皆然况梅乎君子謂水陸草木之花可愛者甚衆而梅也獨先天下而春是故首及之事類大庾嶺丨丨丨上梅花南枝已落北枝方開寒暖之候異也六帖上林苑丨丨丨有朱梅同心梅紫蒂梅西京雜記江南寄陸凱與范曄相善自江南寄梅花一枝詣長安與曄贈詩曰折梅逢驛使寄與隴頭人江南無所有聊贈一枝春笛中曲宋鮑昭云梅花本丨丨丨夀陽粧宋武帝女丨丨公主人日臥於含章簷下梅花落於公主額上自後有梅花粧今安豐軍有花靨鎮即其地也雜五行書何遜咏梁丨丨在揚州法曹廨舍有梅花一株遜吟丨其下後居洛思梅花再請其任從之抵楊州花方盛對花倣徨杜詩注淡粧素服隋開皇中趙師雄遷羅浮一日天寒日暮於松林間酒肆旁舍見美人淡粧素服出迎時昏黑殘雪未消月色微明師雄與語言極清麗芳香襲人因與扣酒家門共飲少頃一緑衣童子笑歌戲舞師雄醉寢但覺風寒相襲久之東方已白起視在大梅花林下有翠羽刺嘈相顧月落參橫惆悵而已龍城録剛態毅狀宋廣平為相其端姿徑質丨丨丨丨疑其鐡心石腸不解吐婉媚辭然觀其文有梅花賦清新富艷得南朝徐庾體殊不類其為人也皮日休桃花賦序映日可見元稹為翰林承旨朝退行至廊下初日映九英梅隙光射稹有氣勃勃然百僚望之曰豈腸胃文章丨丨丨丨乎常朝録為煙所爍袁豐之宅後有梅六株開時曽丨丨丨丨乃圍泥塞竈張幕蔽風久而又折其屋曰氷姿玉骨世外佳人但恨無傾城之笑爾桂林記僧獻緑英李白遊慈恩寺丨丨丨丨梅墨徽言紅梅南唐苑中丨丨丨丨有紅梅亭四面專植紅梅雜志西岡圃中承平時此花獨盛於姑蘇晏元獻公始移植丨丨丨丨一日貴遊賂園吏得一枝分接由是都下有二本遊人莫見蜀州有紅梅數本郡侯建閣扄鑰丨丨丨得而丨一日有兩婦人髙髻大袖憑欄語笑郡侯扄鑰閴不見人惟東壁有詩云南枝向暖北枝寒一種春風扇兩般慿仗髙樓莫吹笛大家留取倚欄干托遺北人不識紅梅粉紅標格猶是梅而繁密則如杏香亦類杏詩人有丨丨初丨丨渾作杏花看之句與江梅同開紅白相間園林初春景也蠟梅御女多憨隋煬帝丨丨袁寶兒騃冶丨丨態帝謂虞世基試嘲之世基詩曰緣何却得君王意常把花枝傍輦行南部煙花記洛人因謂京洛間有一種花香氣似梅花亦五出而不能晶明類女工撚蠟所成京丨丨丨丨蠟梅木身與葉乃類蒴藋竇髙州家有灌叢香一園也山谷詩序山谷初見蠟梅丨丨丨丨之戲作二絶緣此盛於京師王元之詩話范至能梅花譜梅天下尤物無問智愚賢不肖莫敢有異議學圃之士必先種梅且不厭多他花有無多少皆不繫重輕余於石湖至雪坡既有梅數百本比年又於舍南買王氏僦舍七十楹盡折除之治為范村以其地三分之一與梅吳下栽梅特盛其品不一今始盡得之隨所得為之譜以遺好事者江梅遺核野生不經栽接者又名直腳梅凡山間水濵荒寒逈絶之處皆此本也花梢小而疏瘦有韻香最清實小而硬早梅冬至前已開故得早名要非風土之正杜子美云梅蘂臘前破梅花年後多惟冬春之交正是花時耳消梅其實圓小鬆脆多液無滓多液則不耐日乾故不入煎造亦不宜熟惟堪青噉垂古梅其枝樛曲萬狀蒼蘚鱗皴封滿花身又有苔鬚於枝間或長數寸風揚緑絲飄飄可玩去成都二十里有臥梅偃蹇十餘丈相傳唐物也清江酒家有大梅如數間屋可羅坐數十人余平生見梅竒古惟此兩處竒重葉梅花頭甚豐葉重數層盛開如小白蓮梅中之品花房獨出而結實多雙尤為瑰異好緑萼梅凡梅花跗蒂皆絳紫色惟此純緑枝梗亦青事者比之仙人萼緑華京師艮嶽有萼緑華堂其下專植此本標百葉緗梅一名千葉香梅花小而密紅梅粉紅色格猶是梅而繁密則如杏香亦類杏詩人有北人全不識渾作杏花看之句與江梅同開紅白相映園林初春絶景也梅聖俞詩云認桃無緑葉辨杏有青枝當時以為著題東坡詩云詩老不知梅格在更看緑葉與青枝蓋為其不韻為紅梅解嘲云承平時此花獨盛於姑蘇晏元獻公始移梅西岡圃中一日貴遊䀩園吏得一枝分接由是都下有二本嘗與客飲花下賦詩云若更開遲三二月北人應作杏花看客曰公詩固佳待北俗何淺耶晏笑曰傖父安得不然王琪君玉時守吳郡聞盜花種事以詩遺公曰館娃宫北發精神粉瘦瓊寒露葉新園吏無端偷折去鳯城從此有雙身當時罕得如此比年不可勝數矣世傳吳下紅梅詩甚多惟方子適一篇絶唱有紫府與丹來換骨春風吹酒上凝枝之句雙鴛鴦梅花葉紅梅也凡雙果必並蒂惟此一蒂而結梅杏梅花比紅梅色微淡結實甚匾有斕斑色全似杏味不及紅梅蠟梅本非梅類以其與梅同時香又相近色酷似蜜脾故名蠟梅凡三種以子種出不經接花小香淡其味最下俗謂之狗蠅梅經接花疏雖盛開花常半含名磬口梅言似僧磬之口也最先開色深黃如紫檀花密香穠名檀香梅此品最佳蠟梅香極清芳殆過梅香初不以形狀貴也故難題詠山谷簡齋但作五言小詩而已此花多宿葉結實如垂鈴尖長寸餘又如大桃奴子在其中楊東山梅花説易曰乾為天前輩論乾與天異謂天者乾之形體乾者天之性情某因觸類而思之不但乾與天異而已事事物物莫不皆有形體性情林和靖詠梅疏影橫斜水清淺暗香浮動月黃昏此為梅寫真之句也梅之形體也雪後園林才半樹水邉籬落忽橫枝此為梅傳神之句也梅之性情也寫梅形體是謂寫真傳梅性情是謂傳神愚見偶然未知是否願商確之楊誠齋和梅詩序梅之肇於炎帝之經著於説命之書召南之詩然以滋不以象以實不以華也豈古之人皆質而不尚其華歟然花如桃李顔如蕣華不尚華哉而獨遺梅之華何也至楚之騷人飲芳而食菲佩芳馨而服葩藻盡掇天下之香草嘉木以苾芬其四體而金玉其言語文章蓋逮取於江籬杜若而近捨梅豈偶遺之歟抑亦梅之未遇歟南北諸子如隂鏗何遜蘇子卿詩人之風流至此極矣梅於是時始一日以花聞天下及唐之李杜本朝之蘇黃崛起千載之下而躙籍千載之上遂主風月花草之夏盟而於其間首出桃李蘭蕙而居客之左蓋梅之有遭未有盛於此時者也然色彌章用彌晦花彌利實彌鈍也梅之初服豈端使之然哉前之遺今之遭其信然歟吾友洮湖陳晞顔蓋造次必於梅顛沛必於梅者也嘉愛之不足而吟詠之吟詠之不足則盡取古人賦梅之作而賡和之寄一編以遺豫曰從古此詩已八百篇矣不盈千篇吾未止也豫讀之而驚曰一何豐耶豐而不竒則亦長耳一何竒耶豫嘗愛隂鏗詩云花舒雪尚飄照日不俱銷蘇子卿云秪言花是雪不悟有香來唐人崔道融云香中别有韻清極不知寒是三家者豈畏疏影橫斜之句哉今晞顔之詩同梅而清清在梅前同梅而馨馨在梅外其於三家所謂未聞以千里畏人者也或謂物耋則妖興梅亦有妖晞顔此詩非晞顔語也梅之妖慿晞顔而語也或曰非彼慿此乎爾繄此即彼乎爾夫語怪聖門用諱豫又烏知二説之然不然哉因併書之洪景盧老梅屏贊崢嶸突兀茹鐵為骨凛然氷姿氣壓羣木近似則然孰知其真儲萬斛香先天下春范石湖作梅譜後序梅以韻勝以格髙故以橫斜疏瘦與老枝竒怪者為貴其新接稚木一歲抽嫩枝直上或三四尺如酴醿薔薇輩者吳下謂之氣條此直宜取實規利無所謂韻與格矣又冇一種糞壤力勝者於條上茁短橫枝狀如棘針花密綴之亦非髙品近世始畫墨梅江西有楊補之者尤有名其徒倣之者尤繁密楊氏盡大略皆氣條耳雖筆法竒峭去梅實逺惟亷宣仲所作差有風致世鮮有評之者余故附之譜後詩集逢驛使折梅丨丨丨寄與嶺頭人詳見前事類標物序兔園丨丨丨驚時最是梅銜霜當路發映雪擬寒開枝橫却月觀花繞凜風臺朝灑長門泣夕驅臨卭杯應知早飄落故逐上春來何遜奈雪垂不愁風嫋嫋正丨丨丨垂暖熱惟慿酒平章却要詩庾信迎春發丨丨故蚤丨獨自不疑寒畏落衆花後無人别意看謝燮雪共春梅將丨丨丨彩艷不相因逐吹能爭密排枝巧妬新誰令香滿座獨使淨無塵芳意饒呈瑞寒光助照人玲瓏今已遍點綴坐來頻那是俱疑似須知兩逼真熒煌初亂眼浩蕩匆迷神未許瓊華比將從玉樹親先期迎獻歲早梅更伴占兹辰願得長輝映輕微敢自珍韓昌黎春雪映霜滋曉早梅發髙樹逈映楚天碧朔吹飄夜香繁丨丨丨白欲為萬里贈杳杳山水隔寒英坐銷落何用慰逺客柳子厚臘前破梅蘂丨丨丨梅花年後多絶知春意早最奈客愁何雪樹元同色江風亦自波故園不可見巫峽欎差峩杜甫暖獨回萬木凍欲折孤根丨丨丨前村深雪裏昨夜一枝開風遞幽香去禽窺素艷來明年還應律先發映春臺杜白雪枝江梅且緩飛前輩有歌詞莫惜黃金縷難忘丨丨丨吟看歸不得醉嗅立如癡和雨和煙折含情寄所思鄭谷白玉條一樹寒梅丨丨丨逈臨村路傍溪橋不知近水花先發疑是經春雪未消戎昱動詩興東閣宫梅丨丨丨還如何遜在揚州此時對雪遙相憶送客逢春可自由幸不折來傷歲暮若為裴看去亂鄉愁江邊一樹垂垂發朝夕催人自白頭杜和迪登蜀州東亭送客逢早梅相憶見寄落歌管庾嶺梅花丨丨丨冷蘂疏枝巡簷索共梅花笑丨丨丨丨半不禁杜素艷清香丨丨雪凝樹丨丨風滿枝許渾香壓麝臍小園煙景正凄迷陳陳寒丨丨丨丨池水倒窺疏影動屋簷斜入一枝低書名空向間時看詩俗休徴故事題慙愧黃鸝與蝴蝶秖知春色在桃蹊和靖洗盡鉛華丨丨丨丨見雪肌要將真色鬬腰枝檀心已作龍涎吐玉頰何勞獺髓醫東坡次韻王公濟未問和羮事雪中丨丨丨丨丨且向百花頭上開王沂公未薦含酸子氷盤丨丨丨丨丨雪嶺先看耐凍枝東坡清香似有私吟懷長恨負芳時為見梅花輒入詩雪後園林惟半樹水邊籬落忽橫枝人憐紅艷多因俗天與丨丨丨丨丨堪笑蠻兒亦風味醉將聲調角中吹林君復國艷肯相顧羅浮山下梅花村玉雪為骨氷為魂紛紛初疑月挂樹耿耿獨與參橫昏先生家居江海上悄如病鶴栖荒園天香丨丨丨丨丨知我酒熟詩清溫蓬萊宫中花鳥使緑衣倒挂扶桑暾抱叢窺我方醉臥故遺啄木先敲門麻姑過君急灑掃鳥能歌舞花能言酒醒人散山寂寂惟有落蘂粘空樽坡十一月二十六日松風亭下梅花盛開飛雪伴清癯玉骨綃裳韻本孤天教丨丨丨丨丨林寒疏蘂半開落野逈暗香疑有無庾嶺風光仍似舊漢宮鉛粉莫相汚驚心不必傷空樹一自流空春便俱劉屏山凍雨洗塵昏江梅欲破江南村老人解馬招芳魂朔風為斷蜂蝶信丨丨一丨煙丨丨天憐絶艷世無匹故遣寂寞依山園自吹羌笛娛夜永未要鄒律回春溫連姢窺水墮殘月的皪泣露晞晨暾海山清遊記玉面衰病此日空柴門相逢不敢話疇昔能賦豈必皆成言雕鐫肝腎竟何益况復制酒哦空樽朱元晦再和坡惠州梅花韻春撩玉骨香寒入玉衣燈下薄丨丨丨丨酒邉丨却於老樹半枯處忽走一枝如許長楊誠齋曉沐氷膚放去年看梅南溪北月作主人梅作客今年看梅荆溪西氷為風骨玉為衣臘前欲雪竟未雪梅花不慣人間熱橫枝憔悴涴晴埃端令羞面不肯開縞裙夜訴玉皇殿乞得天花來作伴三更滕六駕海神先遣東風吹玉塵梅仙丨丨銀浦水丨丨别丨瑶林春詩人莫作雪前看雪後精神添一半同前紅梅江縣放春沙村白雪仍含凍丨丨紅梅已丨丨杜認桃辨杏丨丨無緑葉丨丨有青枝石曼卿笑杏比桃丨丨少清香丨丨多俗趣梅聖俞學粧聚笑丨丨如少女丨丨發丹唇前人換骨凝脂紫府與丹來丨丨春風吹酒上丨丨方子適月浸繁枝丨丨丨丨香冉冉露浮紅蕚曉團團參寥春初破蕚梅花精神杏花色丨入蓮洲丨丨丨王梅溪直和根撥年來芳信負紅梅江畔垂垂又欲開珍重多情關令尹丨丨丨丨送春來坡不知格在怕愁貪睡獨開遲自恐氷姿不入時故作小桃紅杏色尚餘孤瘦雪霜姿寒心未肯隨春態酒暈無端上玉肌詩老丨丨梅丨丨更看緑葉與青枝坡蠟梅天公變化天公點酥作梅花此有蠟梅禪老家蜜蜂採花作黃蠟取蠟為花亦其物丨丨丨丨誰得知我亦兒戲作小詩君不見萬松嶺上黃千葉玉蘂檀心兩竒絶醉中不覺渡千山夜聞梅香失醉眠歸來却夢尋花去夢裏花仙覔竒句此間風物屬詩人我老不飲當付君君行適吳我適越笑指西湖作衣鉢坡贈趙景貺天工戲剪丨丨丨丨百花房奪盡人工更有香埋玉池中成故物折枝鏡裏憶新粧黃山谷來從蠟國栗玉圜雕蕾金鍾細著行丨丨真丨丨自號小黃香夕吹撩寒馥晨䂀透暖光南枝本同姓喚我作他楊楊誠齋化作黃姑梅花已自不是花氷魂謫墮玉皇家不飱煙火更飧蠟丨丨丨丨暪造物後山未覺坡先知東坡勾引後山詩金花勸飲金荷葉兩公醉吟許孤絶人間姚魏謾如山令人眼暗只欲眠此花寒香來又去惱損詩人難覔句月兼花影恰三人欠個文同作墨君吾詩無復古清越萬水千山一瓶鉢同前將蠟染花蝶採花成蠟還丨丨丨丨一經坡谷眼名字壓群葩梅溪詩封蠟貯香滿面宫粧淡淡黃絳紗丨丨丨幽丨遙憐未識花消息乞與一枝教斷腸張于湖香蜜裁葩丨丨丨丨分外工疏枝數點綴雛蜂嬌黃染就宫裝樣香暖尤宜愛日烘楊巽齋香蠟吐花蜜蜂底物是生涯花作餱糧蠟作家歲晚略無花可採却將丨丨丨成丨楊誠齋樂府霜潔氷清丨丨昨夜梅花發甚處玉龍三弄聲搖動枝頭月夢絶金獸爇曉寒蘭燼滅要捲珠簾清賞且莫掃階前雪霜天曉角林和靖月香溼雲不動溪雲冷嫩寒初透東風影橋下水聲長一枝和丨丨干人憐花似舊花比人應瘦莫憑小闌夜深花正寒菩薩蠻東坡嫌粉涴玉骨那愁瘴霧氷肌自有仙風海仙時遣探芳叢倒挂緑毛么鳯與素面常丨丨丨洗籹不褪唇紅髙情已逐曉雲空不梨花同夢西江月坡得香遲天涯也有江南信梅破知春近夜闌風細丨丨丨不道曉來開遍向南枝杯玉臺弄粉花應妬飄到眉心住平生箇裏飲深去國十年老盡少年心虞美人黃山谷花照眼粉墻低梅丨丨丨依然舊風味露痕輕綴淨洗鉛華無限清麗去年勝賞曽孤倚氷盤同燕喜更可惜雪中髙樹香篝薰素被苔今年對花太匆匆相逢似有限依依愁悴凝望久蒼上旋看飛墜相將脆圜薦酒人正在空江煙浪裏但夢想一枝瀟灑黃昏斜照水花犯周美成春在手年年江上探寒梅為誰開暗香來疑是月宫仙子下瑶臺冷艷一枝丨丨丨故人逺相思寄與誰恨極怨極嗅香蘂念此情家萬里暮霞散綺楚天碧數片輕飛為我多情特地點征衣花易飄零人易老正心碎那堪塞管吹江坡梅花引栁耆卿花羞落鴈霜寒透幕正護月雲輕嫩氷猶薄溪奩照梳掠想含章弄粉艷粧誰學玉肌瘦弱更重重龍綃襯著倚東風一笑嫣然轉盻萬丨丨丨寂寞家山何在雪後園林水邉樓閣瑶池舊約鱗鴻更仗誰託粉蝶兒只解尋花覔栁開遍南枝未覺但傷心月落黃昏數聲盡角瑞鶴仙稼軒花知否丨丨丨花一似何郎又似沈東陽瘦稜稜地天然白冷清清地許多香笑東君還又向北枝忙著一陳霎時間底雪更一個缺些兒底月山下路水邊墻清香怕有人知處影兒守定竹旁廂且饒他桃李趁少年場最髙樓辛稼軒笑問羣芳臨風一丨丨丨丨誰是真香純白獨立無朋算來有姑射山頭仙客絶艷誰憐貞心自保邈與塵緣隔天然殊勝不關風露氷雪弄應笑俗李粗桃無言翻引得征蜂飛蝶爭似黃昏間影清淺一溪霜月盡角初殘瑶臺夢斷直下成休歇緑隂青子莫教容易攀折滿江紅朱文公孤壓羣芳雪徑深深北枝貪睡南枝醒暗香疏影丨丨丨丨頂和玉艷氷姿粧點園林景憑欄詠月明溪靜憶昔林靖點絳唇王梅溪紅梅生微暈好睡慵開莫厭遲自憐氷臉不時宜偶作小紅桃杏色間雅尚餘孤瘦雪霜姿休把間心隨物態何事酒丨丨丨沁瑶肌詩老不知梅格在吟詠更看緑葉與青枝定風波惜殘枝嶠南江淺紅梅小小梅紅淺江南嶠窺我向疏籬籬疏向我窺老人行即到到即行人老離别丨丨丨枝殘惜别離菩薩蠻並坡詞蠟梅一標題蠟換梅姿天然香韻初非俗蝶馳蜂逐蜜在花梢熟巖壑深藏幾載甘幽獨困坡谷丨丨丨目髙價掀蘭菊王梅溪越樣裝江南雪裏花如玉風流丨丨新丨束恰恰縷金裳濃薰百和香一分明籬菊艷却作粧梅面無處奈君何枝春已多菩薩蠻韓文澗古今合璧事類備要别集卷二十二
