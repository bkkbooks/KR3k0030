body:
  text: 古今合璧事類備要後集卷四十三宋謝維新撰史館門國史編修官實録編修官玉牒所日厯所刪定所敕令所勘會要所國史校歷代沿革本朝太平興國八年以楊文學為國子監丞史館編修職官分紀乾興元年判官李淮修撰宋授言修撰官只二人望驛館閣官二員充編修官遂詔集賢校理王舉正館閣校勘李館同共編修會要紹興二十八年修神宗哲宗徽宗三朝正史差吏部郎葉謙亨胡沂校書注徹兼編修官乾道四年詔國史院添置編修二員五年詔更添編修二員孝宗會要事類清職范文穆公成大除禮部員外郎兼崇政殿説書上今更加丨丨遂兼國史院編修官周益公集良史袁樞字杋仲為編修官分成列傳故相章子厚家以同里宛轉求釋其事公曰吾為史官書法不隱寧可負鄉人不可負天下後世公議時丞相趙雄總史事見子厚傳嘆曰無愧古之丨丨遊洚撰袁樞行狀名唐鑑范氏家傳祖禹在書局分撰唐史考其成敗治亂得失之迹撮其機要論次成書丨曰丨丨元祐元年上表進其書修唐書吕夏卿字縉叔丨丨丨以夏卿為編修官夏卿博覽強記於厯代史尤該洽於新書用力居多東都事略刻意篇什天聖中修國又王安簡謝陽夏黃唐卿李邯鄲為編修官安簡神清沖淡唐卿丨丨丨丨詳見前修撰門記覽史學劉恕傳恕為人強丨於書無所不丨有丨丨司馬光修資治通鑑奏請同編修東都事略子厚寧可負見前良史事注荆公未嘗謁范氏家傳范祖禹子淳甫司馬文正公修厯代君臣事迹辟公同編修供職祕省時王荆公當國公丨丨往丨王安國與公善嘗諭以荆公意公竟不往見兼國史遷著作見修撰門進國初至治平李文簡公燾長編卷帙漸成蜀帥汪應辰乞下臨安府給筆札繕寫藏閣公遂丨丨丨丨丨丨言行録詩集圖書史聞望簪紳舊恩華雨露重丨丨周內丨汾會晉全封東坡送史館任祠部顓河東潽詩斥辭費大意晚有屬先生拔書彚是非原正始簡古丨丨丨褒善傷獲麟疾邪記有蜚處心必至公撥亂豈多諱何必藏名山􅀈如避羅蔚劉原父寄永叔五代史詩藏名山故人青雲客出入承明廬傳聞播六經絶筆獲麟初必復丨丨丨尚能訪隱居劉原父寄永叔修唐書詩爛霆雷結繩去淳古文章被事業續紛南山竹箋賊困簡牒大賢乃獨樂逸軌誰復躡丨然丨丨光四海俱曄曄劉改請觀永叔五代史詩諂骨羞碑文命遣貞魂謝史筆應令丨丨丨王建上韓愈侍郎詩延閣書端笏朝光殿厯稔朝雲陛詔升丨丨丨髙議平津邸王維别綦毋潛詩提舉實録院編修官附歷代沿革治平元年以宰臣韓琦提舉修仁宗實録熙寧元年以宰臣曽公亮提舉修英宗實録後皆準此見會要續會要紹興初實録國史皆寓史館後罷史館遇修實録即置實録院遇修國史即置國史院九年二月以修神宗哲宗徽宗實録始置院以宰臣一員提舉修撰檢討官無定員檢討官以本省官或它官兼而修撰官如史館例詔將史館前廳充實録院作角門通過史館併祕書省十二年詔史館提舉諸司承受等并官吏並併歸實録院以罷史館也中興會要事類朝大典于休烈奏國史實録聖丨丨丨續通典今董狐吳兢與劉子元撰定武侯實録敘張昌宗誘張説誣魏元忠事頗言説已然可賴宋璟等激勵苦切故轉禍為忠後説讀之知兢所為屢以情靳改辭曰徇公之情何名實録卒不改世謂丨丨丨唐吳兢傳玉牒所提舉官附檢討官同歷代沿革厯代玉牒官無定貟修掌皇帝玉牒凡編年以帝紀帝系而載其厯數及朝廷政令之因革者為之會要唐太宗正之職開成後始别置修玉牒官及本朝淳化六年始設局置官倣唐制也詔以皇宋玉牒為文建玉牒殿于新寺九年以知制誥劉筠夏竦為修玉牒官自後置一員或二員朱勝非秀水間居録本朝國書嚴奉生藏未有如玉牒者月金花紅羅縹黃金軸至神宗廟以軸大難於披閲詔為黃金梵夾又以黃金為匣鎖鑰皆金也進呈畢安奉於宗正寺玉牒殿士大夫罕有知其制度者豫須在朝廷日宗正丞􅒜汲白本寺事論及玉牒問宰執諸公制度趙元鼎曰不過刻如玉册耳豫曰國家宗支之蕃自古無之每朝為一牒宗室官稱名行女與其夫皆録之以玉刋不其難乎又中興系年録注每朝為一牒乃載人主系序及歷年行事如帝紀而差記其後附以皇后事迹親王宗室子女則有宗蕃慶系録仙源類譜仙源積慶圖二書詳焉非同為一牒也玉殿則奉安於玉牒殿類譜則安於屬藉堂勝非亦少誤景祐元年宗正寺修玉牒官李淑申請詔以編修院廳西閣子充修纂玉牒之所李淑言前修玉牒官馮允亦是兼編修會要蓋緣國史玉牒事節須要照會所以只就編修院修纂熙寧二年玉牒於三班院置局後徙編修院皇帝玉牒十年一進修玉牒於三班學士典領自元豐行官制分𨽻宗正寺官六年詔宗正寺修玉牒照用日厯所文字並指定所書事令本所節録元符二年宗正寺丞陳覺民乞將先帝玉牒內聖政令本守修玉牒官抄寫封送國史院從之紹興十二年襲舊制始建以宰臣一人提舉修玉牒官一人以待從兼凡宗正卿少而下悉與纂修二十九年詔玉牒官併入宗正寺更不置修玉牒官檢討官以本寺少卿及丞同領編修事詔玉牒所宰臣提舉依舊修書官一員同宗正卿丞修纂更不置檢討官中興會要紹興三十二年詔尚書左僕射陳康伯提舉編修玉牒後或以參知政事簽書樞密院事兼權提舉乾道元年錢端禮以參政兼權蔣芾以簽檢權見玉牒所題所題名故事玉牒以首相領之自後相府有闕則以首參兼領仍帶權字淳熙十五年王丞相淮去位周益公以右揆兼領時敕令所才罷而首參相仲至無兼局益公乃奏乞以仲至權提舉玉牒宰在位而執政權領寶訓玉領自此始也朝野雜記事類輝華名七命生必丨丨丨於玉牒文選光帝籍開成二年修玉牒官李衢奏聖唐玉牒與史册並驅立號立號建名期於不朽伏乞臣商量於玉牒之上特創嘉名以丨丨丨敇旨定以皇唐玉牒為名續通典依唐室故事趙安仁重修玉牒屬籍請丨丨丨丨丨修玉牒官奏劉筠夏竦宋綬等為之真宗實録為仙源慶圖初梁周翰始創其制而未備趙安仁重加裁定又丨丨丨積丨丨皆統列精簡焉張于湖代進玉牒表帝系勒鴻燦科條於屬籍聖謨啓佑嚴訓典於寶儲御巖廊以觀成拱朝班而稱慶臣切以堯統漢緒肇𣲖别於天潢周誥商盤麗光躔於東璧惟昭穆親踈之有序與文章號令之常傳厯時浸闕於編摩甫嵗悉加於纂緝必親經財率稽春秋簡牘之文故並建殊尤若河洛圖書之出皇帝陛下慶綿景祚志遹光猷世茂本支襲生民之尊祖道昭嗣服成下武之繼文考仙宗皆聚此書述遺烈永為大訓臣等猥蒙際遇快覩休嘉麟趾振振其仰宗盟之益茂虞書渾渾更瞻聖作之相輝日厯所歷代沿革唐正元初魏執誼奏撰私家紀録非是望令各撰日厯月終館中詳定從之此日厯所從起也堇伯益宏詞編題國朝舊以宰相兼監修國史修撰直館檢討無常貟掌修日厯以時政記起居注會集修撰為一代之典舊於門下省置編修院事掌國史實録修纂日厯元豐四年廢編修院歸史館官制行屬祕書省國史案六年詔祕書省長二毋得預著作修纂日厯事進書即繫銜以防漏泄如著編修院法焉八年詔吏部郎中曽肇禮部郎中林希兼著作職事官兼職自此始元祐五年移國史案置局専掌國史實録編修日厯以國史院為名𨽻門下省更不𨽻祕書省紹聖二年詔日厯還祕書省宣和二年詔罷在京修書諸局惟祕書省日厯所係元豐國史案除著作官専管修纂日歷之事無定貟外其元豐分案編修日厯書庫官吏並依元豐法四朝志紹興元年以修日厯所為名又詔祕書長二通行修纂日厯以少監程俱言長二於條不與修纂欲準元豐故事著作官闕後本省時暫牒校書郎或正字兼權所貴不廢編修故有是命三年詔左僕射吕頤浩兼提舉修國史時修日厯張綱言祕書省權輕難以取會又孫近言景德二年王旦為相領史職乞宰府提舉故有是命詔修日厯令侍從官帶史館修撰餘官帶直史館史館檢討若著作郎佐郎闕依元豐例差郎官兼領時以祠部郎虞澐兼大著禮部郎舒國清兼本著日厯所以修國史日厯所為名四年詔修國史日厯所以史館為名依舊制置編修校勘官十年秦檜請下有司討論史館建併之弊禮部看詳於元豐舊制併歸祕書省國史案以著作郎佐郎修纂日厯遇修正史即置國史院遇修實録即置實録院見今修淵聖及今上日厯令宰相提舉以監修國史繫修實録院以提舉實録院編修中興會要事類直筆蔣氏見修撰門無以易藻同上陳瑩中移書闕闕私史而壓宗廟緣邊費而壞先政二者閣下之也某作日録下與國用須知閣下試一讀之二闕下者王安石熙寧初罷政歸金陵作日録七十臣及當時名士不附己者皆被毁斥安石臨終戒其家焚之悔其作也壻蔡卞留之至紹聖間為尚書右丞編入俗陵國史中或為詩云訓釋詩書日月明紛紛法令下朝廷不知心本緣何事苦勸君王用肉刑張于湖修日厯劄臣聞神宗皇帝相王安石用私意作日録一時政事美則歸已陳瓘以死爭之著為尊堯集日録辨等書忠臣義士感激增氣恭惟陛下躬履艱難濟登休治寶慈與儉仁民愛物聖德之盛固已聿追先烈而故相信任之専禮遇之隆又非特如安石受知於神祖也臣切謂政事舉措號令設施一皆蔽自聖斷故相或能將順贊襄而已臣懼其作時政記亦如安石専用己意掠美自歸掩陛下之聖明私羣臣之褒貶日厯之官因取其説著之簡策殆非尊戴君父傳信萬世之義臣仰惟陛下既遴選史臣付以論撰欲望駿發明詔再取去嵗以前臣寮修過日厯詳加是正審訂事實貶黜私説發明聖德庶幾作宋一經襲六為七垂之無窮天下幸甚會要所歷代沿革唐德宗正元渭蘇冕始為唐會要四十卷武宗時崔鉉又續四十卷至本朝建隆初王溥取宣宗以後故事并蘇崔所録共為一百卷本朝會要自建隆止慶厯四年成一百五十卷章得象上王洙編修王圭續以慶厯止熙寧十年通舊增損成三百卷總二十一類八百五十五門國朝會要序乾道四年詔尚書左僕射陳俊卿兼提舉編修國朝會要五年祕書少監汪太猷等言蔡攸所修國朝會要除將熙寧十年以前章得象王圭所修重加刪潤外其自元豐至政和止修得帝系后妃吉禮三門攸所修吉禮緣當時議論好惡不同妄有刪改以迎時好乞令本省再加刪定兼今來續修斷自神宗其五朝會要內有熙寧十年內事亦合重行編入以續修國朝會要為名從之六年中書門下省言國朝會要已修至靖康詔今自建炎元年接續至乾道五年九年祕書少監陳騤言編類建炎以後會要至紹興三十二年六月十一日成書以中興會要為名從之孝宗會要事類蘇冕始崔鉉續並見沿革內敕令所提舉修刺合同詳宗官附歷代沿革本朝天聖慶厯嘉祐熙寧編叉及元符敇令格式名差宰臣提舉此事見續會要何郭中奏而四朝志乃云自熙寧初編修三司令式命宰臣王安石提舉如志所言是自熙寧始也修天聖既有提舉之則不應自熙寧始今姑存之以俟考究詳定官以待從之充法令者充政和元年差左僕射何執中提舉重修教令執中上章力辭於是不帶提舉以監領為名續會要建炎四年命宰臣范宗尹提舉重修詳定敇令至是始設官置局倫大理寺及見在敇局官兼詳定刪定官中興會要紹興三十二年孝宗已即位未改元六月權吏部侍郎徐慶等言近措置衰集建炎紹興已來詔旨専一置局今來所名取自朝廷旨揮詔依舊以􅎁合所為名會要紹興中改為詳定一司敇令所自建炎四年以前昔為詔興新法以後續降幾二萬餘條前後抵吾職源乾道四年詔差刑部侍郎汪大猷兼詳定官理少王彥洪韓元吉兼同詳定官刑部蔡洗鶯芮吏部鄭伯熊戶部曽逮理丞潘景兼刪定官限一年了半六年汪大猷奏合行事件請行刪削於是復置敕令所提舉官御繫兼詳定一司敕令詳定官銜繫兼詳定一司敕令並依舊例施行孫孝宗會非修入自此後淳熙慶元嘉泰及今上淳祐各有頒修令格式國朝修軍馬司敇則屬樞密仁宗時命田况提舉熙寧八年權知審刑院崔台符言奉詔修軍馬司刺緣軍政事重故事以權臣揔領於是命樞密使陳升之提率管勾續會要紹聖元年又營勾詳定刪定軍營司救勾事類鈞金束矢李延年論刑法第二表周禮丨丨丨丨慎之至也前律後令杜周為廷尉客有周曰君曰君為天下決平循三天法周曰丨主所是著為丨丨生所是疏為令當時為是何古之法乎漢本傳金科玉條刑法曰丨丨丨丨劇秦美新牙章竹簡丨丨丨丨之中因於法吏類要刪定官歷代沿革國朝舊刪定無常員大觀三年詔六曹刪定官併入詳定一司敕令所為一局四朝志後省紹興十二年徐度申請裒集建炎紹興詔旨令専置一局乞權行復置刪定官以三員為額於行在職事官內差兼詔休舊以敕令所為名後省乾道元年復置敕令所汪大猷申請正差刪定官乞繫銜充詳定一司敕今所刪定官兼刪定官繫銜兼詳定一司敕令所刪定官淳熙十五年材票巾請廢敕令局刪定官並照淳熙二年復置局差刪修官三員敕令所題名事類賜三品朋錢象元知津令屢為刑法官預修慶厯嘉祐編敕及州縣堵路條貫常以犯敕者重犯令者輕請將敕文入令者甚衆又嘗議告捕法以為罪有可告捕者皆許捕則姦民得依法以害善良因省去許捕之條百餘其持法近厚如此敕成例進勳爵仁宗以其母老有以慰之乃獨丨公丨丨丨神宗實録為宣教郎文林郎刪定官鄭剛中字亨仲引對願下詔不得以虛名文具欺罔朝廷翌日進呈上曰近所引劉多是人材朕雖得珠玉珍玩不足為寶但冀得十數人物乃足為寶也今學士院降詔出榜廟堂以剛中丨左丨丨丨充樞密院編修官中興係年録好古識竒字李公麟用陸佃薦為刪定官公麟博學丨丨多丨丨丨東都事略入對上三字敕令所刪定官金安節丨丨丨丨丨曰人才當長養成就之取其第二奏行下旬日以為司農丞中興係年録推舉明練之士汪大猷乞重修法令上極以為己任丨丨詳丨通丨丨丨以自佐防求舊史網羅故牘年餘書成孝宗取進本列於選德殿之左右朝以觀覽樓攻愧集參升刋約之局丨丨丨丨丨丨文恭行范仲模制史館校勘歷代沿革兩京雜記省內本統經史及大史厯象之職後並為列曹惟主寫書校勘而已自是門可設羅會要事類以文召試歐陽修丨丨章冠天下景祐初丨丨為館閣校勘東都事略釋褐召試范鎮字景仁成都人舉進士為禮部第一丨丨用參知政事主舉正薦丨丨舉士院除館閣校勘同上張于湖史警序余自荆州還湖隂東至黃州二十里扁舟遡浪來迎者故人談獻可也握手問無恙命酒相勞苦略赤壁泊黃岡望武昌西山獻可又出所作史警十餘篇相示純正剴切得古人論議所未到余三復擊節之因書以冠諸策首獻可蘄水人名也字去否詩集勘青編儒家無事外招客丨丨丨筆墨東西置朱黃次第研頻憂傷點竄細恐誤流傳改是文辭正增加字數全端坐窮今古披襟見聖賢得興忘昏曉題名記嵗年棲毫思確論廢卷為忘篇魚魯皆刪定誰人敢鬨然孫僅勘書詩飛雲箋銅門初下辟石館始沉研遊霧千金字丨丨五色丨楊炯和鄭讐校詩古今合璧事類備要後集卷四十三
