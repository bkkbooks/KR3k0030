body:
  text: 古今合璧事類備要續集卷四十六宋謝維新撰事為門别離事理發揮男子生而桑弧蓬矢以射天地四方言之其當有四方之志也然親戚故舊臨岐始於其情也不無所感傷焉此古人之所以重離别也惟夫慷慨丈夫意氣相期仗劔於樽酒之間着鞭於功名之㑹惟知以懐安敗名為戒夫豈欷歔流涕戀戀作兒女子態耶事類遵大路丨丨丨兮摻執子之手兮詩歌驪駒丨丨丨其辭云驪駒在門僕夫具存驪駒在路僕夫驚駕逸詩送子以言孔子去周而老子送之曰吾聞富貴送人以金仁者送人以言吾雖不能富貴而竊仁者之號請丨丨丨丨凡當世之聰明深察而近於死者好議人者也博辨宏大而危其身者好發人之惡者也孔子曰敬奉教也家語贈子以言曽子行晏子從於郊曰嬰聞之君子贈人以言庶人贈人以財請假於君子丨吾丨丨丨荀大畧贈汝以言子路將行辭於孔子孔子曰贈以帛乎丨丨丨丨乎對曰請以言孔子曰不强不達不勞無功不忠無親不信無復不恭無禮謹此五者而已矣子路曰願終身奉之家語離羣索居子夏曰吾丨丨而丨丨亦已久矣禮記登山臨水憭慄兮若逺行丨丨丨丨兮送君歸楚辭厲聲髙揖子髙遊趙平原君客有鄒文李節者與相友善及將還魯諸故人訣既畢文節送行三宿臨别文節流涕交頤子髙徒握手而已分背就路其徒問先生與彼二子善彼有戀戀之心而先生丨丨丨丨無乃非親之謂乎髙曰始吾謂此二子丈夫耳今乃知其婦人人生有四方之志豈鹿豕哉而常羣聚乎孔叢子贈子不拜陳遵使匈奴過辭於王丹丹謂遵曰俱遭世反覆唯吾二人為天地所遺今子當之絶域無以相贈丨丨以丨丨遂揖而别遵甚喜東觀漢紀不見黄生後漢黄憲字叔度同郡陳蕃周舉相謂曰時月之間丨丨丨丨則鄙吝之萌復存乎心不見季真陸象先曰季真清談風流吾一日丨丨則鄙吝生矣唐賀知章𫝊刮目相待吕䝉曰士别三日當丨丨丨丨吳志覩物思人王猛將行造慕容垂飲酒從容謂垂曰今當逺别何以贈我使我丨丨丨丨晉海西公下數日作惡謝安嘗謂王羲之曰中年傷於哀樂共親友别輒丨丨丨丨羲之曰年在桑榆自然至此常恐兒輩覺損其歡樂之趣王羲之𫝊今夜誰家宋選送弟入洛登舟挂席東下選凝佇久之語細君曰㠶過南浦丨丨清風明月宿水涘丨丨李陵答書子卿足下勤宣令徳策名清時榮問休暢幸甚幸甚逺託異國昔人所悲望風懐想能不依依昔者不遺逺辱還答慰誨慇懃有踰骨肉陵雖不敏能不慨然自從初降以至今日身之窮困獨坐愁苦終日無覩但見異類韋韝毳幙以禦風雨羶羊骼漿以充饑渇舉目言笑誰與為歡胡地𤣥氷邊土慘裂但聞悲風蕭條之聲凉秋九月塞外草衰夜不能寐側耳逺聽胡笳互動牧馬悲鳴吟嘯成羣邊聲四起晨坐聽之不覺淚下嗟乎子卿陵獨何心能不悲哉與子别後益復無聊上念老母臨年被戮妻子無辜並為鯨鯢身負國恩為世所悲子歸受榮我留受辱命也如何身出禮義之鄉而入無知之俗違棄君親之恩長為蠻夷之域傷已令先君之嗣更成戎狄之族又自悲矣功大罪小不蒙明察孤負陵心區區之意毎一念至忽然忘生陵不難刺心以自明刎頸以見志顧國家於我已矣殺身無益適足増羞故攘臂忍辱輒復茍活左右之人見陵如此以為不入耳之歡來相勸勉異方之樂祗令人悲増忉怛耳嗟呼子卿人之相知貴相知心前書倉卒未盡所懐故復畧而言之昔先帝授陵步卒五千出征絶域五將失道陵獨遇戰而裹萬里之粮帥徒步之師出大漠之外入强胡之域以五千之衆對十萬之軍策疲乏之兵當新羈之卒然猶斬將搴旗追奔逐北滅迹掃塵斬其梟帥使三軍之士視死如歸陵也不才希當大任意謂此時功難堪矣匈奴既敗舉國興師更練精兵强踰十萬單于臨陣親自合圍客主之形既不相如步馬之勢又甚懸絶疲兵再戰一以當十然猶扶乗創痛决命爭首死傷積野餘不滿百而皆扶病不任干戈然陵振臂一呼創病皆起舉刃指虜胡馬奔走兵盡矢窮人無尺鐵猶復徒手奮呼爭為先登當此時也天地為陵震怒戰士為陵飲血單于謂陵不可復得便欲引還而賊臣教之遂便復戰故陵不免耳昔髙皇帝以三十萬衆困於平城當此之時猛將如雲謀臣如雨然猶七日不食僅乃得免况當陵者豈易為力哉而執事者云云茍怨陵以不死然陵不死罪也子卿視陵豈偷生之士而惜死之人哉寧有背君親捐妻子而反為利者乎然陵不死有所為也故欲如前書之言報恩於國主耳誠以虛死不如立節滅名不如報徳也昔范蠡不狥㑹稽之恥曹沫不死三敗之辱卒復勾踐之讎報魯國之羞區區之心竊慕此耳何圖志未立而怨已成計未從而骨肉受刑此陵所以仰天椎心而泣血也足下又云漢與功臣不薄子為漢臣安得不云爾乎昔蕭樊囚縶韓彭葅醢鼂錯受戮周魏見辜其餘佐命立功之士賈誼亞夫之徒皆信命世之才抱將相之具而受小人之讒並受禍敗之辱卒使懐才受謗能不得展彼二子之遐舉誰不為之痛心哉陵先將軍功畧蓋天地義勇冠三軍徒失貴臣之意到身絶域之表功臣義士所以負㦸而長嘆者也何謂不薄哉且足下昔以單車之使適萬乗之虜遭時不遇至於伏劔不顧流離辛苦幾死朔方之野丁年奉使皓首而歸老母終堂生妻去帷此天下所希聞古今所未有也蠻夷之人尚猶嘉子之節况為天下之主乎陵謂足下當享茅土之薦受千乗之賞聞子之歸賜不過二百萬位不過典屬國無尺土之封加子之勤而妨功害能之臣盡為萬戶侯親戚貪佞之類悉為廊廟宰子尚如此陵復何望哉且漢厚誅陵以不死薄賞子以守節欲使逺聽之臣望風馳命此實難矣所以毎顧而不悔者也陵雖孤恩漢亦負徳昔人有言雖忠不烈視死如歸陵誠能安而主豈復能眷眷乎男兒生以不成名死則葬蠻夷中誰復能屈身稽顙還向北闕使刀筆之吏㺯其文墨邪願足下勿復望陵嗟乎子卿夫復何言相去萬里人絶路殊生為别世之人死為異域之鬼長與足下生死辭矣幸謝故人勉事聖君足下𦙍子無恙勿以為念努力自愛時因北風復惠徳音李陵頓首江淹别賦黯然銷魂者唯别而已矣况秦吳兮絶國復燕宋兮千里或春苔兮始生乍秋風兮蹔起是以行子腸斷百感悽惻風蕭蕭而異響雲漫漫而竒色舟凝滯於水濵車逶迤於山側櫂容與而未前馬寒鳴而不息掩金觴而誰御横玉柱而霑軾居人愁卧怳若有亡日下壁而沉彩月上軒而飛光見紅蘭之受露望青楸之離霜巡層楹之空掩撫錦幙而虛凉知離夢之躑躅意别魂之飛揚故别離一緒事有萬族至若龍馬銀鞍朱軒繡軸帳飲東都送客金谷琴羽張兮簫鼔陳燕趙歌兮傷美人珠與玉兮豔暮秋羅與綺兮嬌上春驚駟馬之仰秣聳淵魚之赤鱗迨分手而銜涕咸寂寞而傷神乃有劒客慙恩少年報士韓國趙厠吳宫燕市割慈忍愛離邦去里瀝泣共訣抆血相視驅征馬而不顧見行塵之時起方衘感於一劔非買價於泉裏金石震而色變骨肉悲而心死或乃邊郡未和負羽從軍遼水無極雁山參雲闉中風暖陌上草薰日出天而耀景露下地而騰文鏡朱塵之照爛襲青氣之烟煴攀桃李兮不忍别送愛子兮霑羅裙至如一去絶國詎相見期視喬木兮故里訣北梁兮永辭左右兮魂動親賔兮淚滋可班荆兮増恨惟樽酒兮叙悲值秋雁兮飛日當白露兮下時怨復怨兮逺山曲去復去兮長河湄又若君居淄右妾家河陽同瓊珮之晨照共金爐之夕香君結綬兮千里惜瑶草之徒芳慙幽閨之琴瑟晦髙臺之流黄春宫閟此青苔色秋帳含兹明月光夏簟清兮書不暮冬缸凝兮夜何長織錦曲兮泣已盡迴文詩兮影獨傷儻有華隂上士服食還仙術既妙而猶學道已寂而未𫝊守丹竈而不顧鍊金鼎而方堅駕鶴上漢驂鸞騰天蹔游萬里少别千年惟世間兮重别謝主人兮依然下有芍藥之詩佳人之歌桑中衛女上宫陳娥春草碧色春水緑波送君南浦傷如之何至乃秋露如珠秋月如珪明月白露光隂往來與子之别思心徘徊是以别方不定别理千名有别必怨有怨必盈使人意奪神駭心折骨驚雖淵雲之墨妙皆嚴樂之筆精金閨之諸彦蘭臺之羣英賦有凌雲之稱辯有雕龍之聲詎能摹暫離之狀寫永訣之情者乎詩集離居涉江採芙蓉蘭澤多芳草採之欲遺誰所思在逺道還顧望舊鄉長路漫浩浩同心而丨丨憂傷以終老感别庭中有竒樹緑葉發華滋攀條折其榮將以遺所思馨香盈懐袖路逺莫致之此物何足貴但丨丨經時起徘徊明月何皎皎照我羅牀帷憂愁不能寐攬衣丨丨丨行客雖云樂不如早旋歸在須臾良時不再至離别丨丨丨屏營衢路側執手野踟蹰仰視浮雲馳奄忽交相踰風波一失路各在一天隅長當從此别且復立斯須欲因晨風發送子以賤軀李陵贈蘇武别長相思攜手上河梁遊子暮何之徘徊溪路側悢悢不能辭行人難久留各各丨丨丨安知非日月弦望自有時努力崇明徳皓首以為期同前莫相忘雙鳬俱北飛一鳬獨南翔子當留斯舘我當歸故鄉一别如秦胡㑹見何詎央愴悢切中懐不覺淚沾裳願子長努力言笑丨丨丨蘇武别李陵一長嘆征夫懐往路起視夜何其參辰皆已没去去從此辭行役在戰場相見未有期握手丨丨丨淚為生别滋努力愛春華莫忘歡樂時生當復歸來死當長相思同前何足嘆丈夫非無淚不灑離别間仗劒對樽酒恥為游子顔蝮蛇一螫手壯士疾解腕所思在功名離别丨丨丨陸龜蒙别離聲無歡食虀腸亦苦强歌丨丨丨出門即有礙誰謂天地寛有礙非遐方長安大道旁小人智慮險平地生太行鏡破不改光蘭死不改香始知君子交乆之道益彰君心與我懐離别俱迴遑譬如浸蘖泉流苦日已長忍泣日易衰忍悲形自傷項籍豈非壯賈生豈非良當其失意時涕泗各滿裳古人勸加飡此飡難自强一飲九祝噎一嗟十斷腸况是兒女寃寃氣凌彼蒼彼蒼若有知白日下清霜今朝始驚呼碧落空茫茫孟郊贈崔純亮别髮白早一别一回老志士丨丨丨在富易為容居貧難自好沉憂損性靈服藥亦枯槁秋風客子衣落日行逺道君問去何之賤身寧自保孟郊怨恨痛銷骨富别愁在顔貧别丨丨丨懶磨舊銅鏡畏見新白髪古樹春無花子規啼有血離弦不堪聽一聽三四裂世途非一險俗慮有千結有客步大方驅車獨迷轍故人韓與李逸翰雙皎潔哀我摧折歸贈詞縱横設徐方國東樞元戎天下傑禰生投刺遊王粲吟詩謁髙情無遺照朗抱開曉月有土不埋寃有讎皆為雪願為直草木永向君地列願為古琴瑟永向君聽發欲識丈夫心曽將寳刀說孟郊長安留别李觀韓愈因獻張徐州酸在肝食蘖不易食梅難蘖能苦兮梅能酸未如生别之為難苦在心兮丨丨丨晨雞載鳴殘月没征馬重嘶行人出迴㸔骨肉哭一聲梅酸蘖苦甘如蜜黄河水白黄雲秋行人河邊相對愁天寒野曠何處宿棠梨葉戰風颼颼生别離憂從中來無斷絶憂積心勞血氣衰未年三十生白髮白居易生别離父子離夫婦死同穴丨丨貧賤丨天下寧有此昔聞今見之母前三子後熟視不得追嗟爾胡不仁使我至於斯有女初束髪已知生離悲枕我不肯起畏我從此辭大兒學語言拜揖未勝衣喚爺我欲去此語那可思小兒襁褓間抱負有母慈汝哭猶在耳我懐人得知陳無已别三子親戚離殷浩甥韓伯隨至徙所經嵗還都浩送至渚側詠曹顔逺詩云富貴他人合貧賤丨丨丨因而泣下棄我去當時我醉美人家美人顔色嬌如花今日美人丨丨丨青樓珠箔天之涯娟娟嫦娥月三五二八盈又缺翠眉蟬鬢生别離一望一見心斷絶心斷絶幾千里夢中醉卧巫山雲覺來淚滴湘江水兩岸花木深美人不見愁人心含愁更奏緑綺琴調髙絃絶無知音美人兮美人不知為暮雨兮為朝雲相思一夜梅花發忽到窻前疑是君盧仝有所思不相從昔年因讀李白杜甫詩長恨二人丨丨丨吾與東野生並世如何復躡二子蹤東野不得官白首誇龍鍾韓子稍姦黠自慙青蒿倚長松低頭拜東野願得終始如駏蛩東野不回頭有如寸莛撞鉅鍾吾願身為雲東野變為龍四方上下逐東野雖有别離無由逢韓愈醉留東野酒一盃不見李生久佯狂真可哀世人皆欲殺吾意獨憐才敏捷詩千首飄零丨丨丨匡山讀書處頭白好歸來杜甫詩山萬重白日去難駐故人非舊容今宵一别後何處更相逢過楚水千里到秦丨丨丨話來天未曉月落滿城鐘于武陵各天一涯行行重行行與君生别離相去萬餘里丨在丨丨丨道路阻且長㑹面安可知胡馬依北風越鳥巢南枝相去日已逺衣帶日已緩浮雲蔽白日游子不顧反思君令人老嵗月忽已晩棄捐勿復道努力加飡飯古樂府一日三秋為别未幾日丨丨如丨丨猶疑望可見日日上髙樓唯見分手處白蘋滿芳洲寸心寧死别不忍生離憂趙微明古别離數聲風笛揚子江頭楊柳春楊花愁殺渡江人丨丨丨丨離亭晩君向瀟湘我向秦鄭谷淮上與友人别一船離恨東坡長短句云無情汴水自東流只載丨丨丨丨向西州張文潛詩云亭亭畫舸繫春潭只待行人酒半酣不管煙波與風雨載將離恨過江南王平甫愛而誦之不知其出於此此奪胎換骨法也泊宅編書來未報丨丨丨丨幾時還知在三湖五嶺間獨立衡門秋水濶寒鴉飛去日銜山竇鞏寄南遊弟兄醉中分袂蕭鳳使玉門關弟蕭某勸酒頻頻謂兄曰丨丨庻丨丨不悲杜送王判官黔陽信使應稀少莫怪頻頻勸酒盃四時不在家不飲濁水瀾空滯此汴河坐見遶岸水盡為還海波丨丨丨丨丨弊服斷線多逺客獨顦顇春英各婆娑荒陂遶曲流野桑無直柯但見君子心嘆息終匪他孟郊汴州留别韓愈古今合璧事類備要卷四十六
