body:
  text: 古今合璧事類備要外集卷二十二宋謝維新撰刑法門失入刑法總論失入法嚴矣諸官司失入人罪一名為首者當職官勒停吏人阡里編管第二從當職官衝替事理重吏人五百里編管三從當職官官衝替事理稍重吏人鄰人編管第四從當職官差替吏人勒停二人各遞加一等謂如第四從依第三從三之類為首者當職官追一官勒停吏人二千里編管人又遞加一等為首者當職官追兩官勒停吏人犯阡里以上雖非一案皆通計並不以去官赦降原減未決者各遞減一等謂第三從依第四從三人依二人之類會恩及去官又遞減一等以上本罪仍依律其去官會恩者本罪自依原減法即事涉疑慮若係犯強盜及殺人正犯各應配或中散大夫以上及武官者奏裁諸官司舉駮入人死罪不當者杖一百諸官司失出人罪者依因罪人以致罪法諸命官犯贓至死後因理雪改正勘官吏合行收坐者正依犯人所降特旨從流罪理為失人事類刑僣丨丨則懼及善人左罰爽入人之罪丨既丨於躬行理乖情匪哀矜丨丨明啓並白氏帖枉撓丨丨不當反受其殃注丨丨曲入人罪也記私曲察阿黨注謂獄官以丨恩丨斷記宋申鍚見前寃獄注蕭齡之唐臨字本道御史大夫丨丨丨任廣州都督受賕當死詔羣臣議之曰齡之貪贓狼扈死有餘咎陛下以異於它囚故議有司又令入死非堯舜所以用刑也不可為後世法帝然之故入死罪本朝建隆二年五代以來刑典弛廢州郡獄吏不明習律令守牧多武人率意用法金州民馬從玘子漢惠無賴嘗害其從弟從玘與妻及次子共殺漢惠防禦使仇超判官左扶悉按誅從玘妻及次子上怒超等丨丨丨丨令有司劾之並除名徙扶海島自是人知奉法失入死刑雍熙二年九月判刑部張佖上言望自今應斷奏丨丨丨丨者不得以官減贖檢法官削一任長吏並停見任從之嘗有犯大辟者詔特減上謂佖曰朕以小人冒法原其情非巨蠧故貸死流竄亦足以懲艾之也佖對曰先王立法蓋為小人君子固不犯矣上以語宰相且歎賞佖以為知言誤入死罪至和二年二月廣州司理陳仲約丨丨人丨丨有司當仲約公罪應贖帝謂知審刑張揆曰死者不可復生獄吏雖暫廢他日復得序官可不重其罰邪失出寧失與其殺不辜丨丨不經寧僣賞不僣刑不濫不幸而過丨丨毋濫左容姦輕典丨丨禮惠暴殺人不死傷人不刑是丨丨而寬惡也刑法志張藴古自丨丨丨之死也法官以失出為戒有失入者又不加罪自是吏法稍密帝以問大理卿劉德威對曰律失入者減三等失出減五等今失入無辜而失出有罪故吏皆深文帝矍然遂命失出入者皆如律刑法志徐有功竇孝諶妻龐謂為其奴怖以妖祟教為夜解因告以厭詛薛季昶鞫之龎當死有功明其枉季昶劾有功黨惡逆當棄市有功方視事令吏泣告有功曰豈吾獨死諸人長不死邪安步去后詰有功曰公比斷獄多失出何邪有功對曰失出臣小過好生陛下大德后默然盧為臣丨商字丨丨同平章事大中元年春旱詔商與御史中丞封敖理囚繫於尚書省誤縱死罪罷為武昌軍節度使議讞緩死中孚君子議獄丨丨易平議讞丨丨也前景帝詔讞于公公族有死罪獄成有司丨丨丨公曰宥之及三宥不對走出致刑於甸人記文王世子讞所屬前疑獄注詳讞不當前獄類重事注讞不厭前疑獄注驚乘輿文帝朝張釋之為廷尉上行中渭橋有人行從橋下走記驚乘輿釋之奏犯蹕罰金上怒其輕釋之曰法者天下所公共其時上誅之則已既付廷尉廷尉天下之平用法一傾人安所措盜廟環又有丨髙丨玉丨者釋之奏當棄市上怒令族之釋之曰如盜長陵一抔土何以加其法乎可前奏廷尉張湯有疑奏已再却倪寬為言其意因使寬為奏成讀之喜上寬所奏即得丨上曰丨丨非俗吏所為也湯舉寬為奏讞掾讞以古法議決獄幸宣室宣帝詔夫決獄不當使有罪興邪不辜蒙戳朕甚傷之季秋後請讞時上丨丨丨齋居而決事獄刑號為平益精明于定國飲酒數石不亂冬月請治讞飲酒丨丨丨為廷尉為平處朱博遷廷尉職當讞平天下獄恐為官屬所誣謂椽吏曰本起武吏不通法律然三尺律人事出其中諸君試取吏議難知者來為諸君覆之乃丨丨丨十中八九吏大驚異傳命誤後漢兄弟共殺人帝以兄不訓弟報兄重常侍孫章宣詔誤言兩報重尚書奏矯詔當斬郭躬曰法故誤丨丨丨當罰金帝曰疑其故也躬白曰君子不逆詐帝曰善爭死上張儉元節亡投孔融兄褒褒不在融匿之事發并收褒融爭死問母母曰家事當在長妾合當辜一門丨丨郡不能決乃丨讞詔坐褒法不當坐張藴古除大理丞初河內人李好德素有風疾而語涉妄妖藴古究其獄稱好德癲疾有愆丨丨丨丨御史權萬紀劾藴古情在阿縱奏事不實太宗大怒曰小子乃敢亂吾法耳令斬於東市尋悔因發制凡決死者命所司五覆奏自藴古始奏不應死狄仁傑左威衛大將軍權善才右監門中郎將范懷義坐誤斧昭陵柏罪當免髙宗詔誅之仁傑丨丨丨丨帝怒曰是使我為不孝子必殺之仁傑曰漢有盜髙廟玊環文帝欲置之族張釋之廷諍曰假令取長陵一抔土陛下何以加其法於是罪止棄市陛下之法在象魏固有差等犯不致死而致之死何哉今誤伐一柏殺二臣後世謂陛下為何如主帝意解遂免死僕不去曹李日知歷同刑丞時法令嚴吏爭為酷日知獨平寬無文致嘗免一囚死少卿胡元禮執不可曰吾不去曹囚無生理丨丨丨丨囚無死法皆以狀讞而后用日知議法有首從李峴於東京平陳希烈等數百人待罪議者將悉抵死崔器附致深文峴獨曰丨丨丨有重有輕若一切論死非陛下與天下惟新意且羯胡亂常誰不凌汙衣冠奔亡各顧其生可盡責邪陛下之親戚勳舊子若孫一旦皆血鐵砧尚為仁恕哉衣冠蒙更生法有重輕魏謨中尉仇士良輔妖民賀蘭進興及黨與治軍中反狀具帝自臨問詔命斬囚以徇御史中丞髙元裕建言獄當與衆共之刑部大理法官也決獄不與知律令謂何請歸有司未報謨上言事繫軍即推軍中如齊民宜付縣令獄不在有司丨丨丨丨何從而知帝停決蒙峴更生李峴事見前注詳得戣論正孔戣字君嚴改給事中江西觀察使李少和坐贓獄寢不下博陵崔易簡殺從父兄鞫獄其京兆尹左右之翻其情戣慷慨論正貶少和殺易簡奪尹三月俸牒案填委嚴郢字叔敖曰京師天下聚論徒者至廣例不覆讞今若悉待報有司斷決有程月不啻五十獄正恐丨丨丨丨章程紊撓科條叢繁王播進刑部侍郎是時天下多故大理議讞丨丨丨丨播悉置格律坐隅餘慶免死徐有功時博州刺史王沖責息錢於貴鄉遣家奴督斂與尉顔丨丨相聞知奴自市弓矢還會沖坐逆誅魏州人告餘慶豫沖謀魏元忠謂餘慶為沖督償通書合謀明甚非曰支黨請殊死籍其家詔可有功曰永昌赦令與虺貞同惡魁首已伏誅支黨未發者原之餘慶赦後被言是為支黨今以支為首是以生入死赦而後罪不如勿赦生而復殺不如勿殺竊謂朝廷不當爾后怒曰何謂魁首有功答曰魁者大帥首者元謀后曰餘慶安得不為魁首答曰若魁首者虺貞是已既已伏誅餘慶今方論死非支黨何后意解乃曰公更思之遂丨丨當此時左右衛仗在廷陛數百人皆縮頸不敢息而有功氣定言詳截然不撓齡之免死蕭丨丨任廣州都督受賕當死詔羣臣議請戮于朝唐臨建言羣臣不知陛下議之之意在律王族戮於隱議親也刑不上大夫議貴也今齡之貪贓狼扈死有餘咎陛下以異于他囚故議之有司又令入死不可為後世法帝然之齡之齊髙帝五世孫由是免之唐臨字本德例不覆讞見前注詔與詳讞韋𢎞景吏部員外郎楊虞卿以纍下吏丨𢎞景丨御史丨丨置笏在陛崔元亮右散騎常侍字晦叔鄭注誣宋申鍚捕逮倉卒內外震駭元亮率諫官叩延英苦諍反覆數百言文宗未諭丨丨丨丨曰孟子有衆人皆曰殺之未可也卿大人皆曰殺之未可也天下皆曰殺之然後察之乃置於法令今殺一凡庶尚稽典律况欲誅宰相乎臣為陛下惜天下法不為申鍚言也帝感悟特從上讞仁宗天聖五年詔大辟之科丨丨丨丨國史申嚴奏讞紹興初陳去非在黃門始丨丨丨丨不當之令其後寢寬慶元後東南有因詈人被毆死者而行凶之人作可閔奏裁姚愈次韓為御史上言如此是詈人之罪重於殺人三年三月壬寅詔自今有司奏讞死罪不當者論如律偽印免死趙抃為武安軍推官有丨造丨者吏皆以為當死公獨曰造在赦前用在赦後赦前不用赦後有造法者皆不死遂以疑讞之卒丨丨一府皆服蘇內翰撰神道碑推斷致刑豐卦君子以折獄丨丨明政賁卦君子以丨庶丨無敢折獄易蔽要囚丕丨丨丨伏念五六日至于旬時注要囚謂審其要辭書康誥啓刑書哀敬折獄明丨丨丨胥占咸庶中正書呂刑決小罪孟秋天子命有司繕囹圄具桎梧斷薄刑丨丨丨無留罪仲秋命有司申嚴百刑斬殺必當丨丨有罪兩劑禁以丨丨丨人獄入鈎金三日致于朝然後聽之注獄相告罪也劑劵書也使各賫劵書又入鈎金三日而聽之亦重刑不入金則自服不直不堅也鈎三十斤禮五聲聽以丨丨丨獄訟求人情一曰辭聽二曰色志三曰氣聽四曰耳聽五曰目聽同上協日殺司冦旬職聽子朝要之羣士司刑皆在各麗其刑以議獄獄成士師受中丨丨刑丨肆之三日十日斷小司冦以五刑聽萬民之獄訟附于用情訊之至于旬乃弊之注用情理之丨丨乃丨兾有可出也並禮必以情魯莊公曰小大之獄雖不能察丨丨丨得其情孟氏使陽膚為士師問於曾子曰如得丨丨則哀矜而勿喜嘗學斷見前學獄詳片言折子曰丨丨可以丨獄者其由也歟語十三導囚意穿封戍囚皇頡公子圍與之爭之正於伯州犂曰請問於囚乃立囚州犂曰所爭君子也其何不知上其手曰夫子為公子圍寡君之介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子注上下乎以丨丨丨左衰公二十六年舉要辭王叔陳生與伯輿爭政王右伯輿王叔陳生怒而出奔及河王復之殺史狡以説焉不入遂處之晉候使士丐平王室王叔與伯輿訟焉王叔之宰與伯輿之大夫瑕禽坐獄於王庭士丐聽之王叔之宰曰蓽門圭竇之人而皆陵其上其難為上矣瑕禽曰昔平王東遷吾七姓從王牲用備具王賴之而賜之騂旌之盟因世世無失職若蓽門圭竇其能來東底乎且王何賴焉今自王叔之相也政以賄成而刑放於寵官之師旅不勝其富吾能無蓽門圭竇乎唯大國圖之范宣子曰天子所右寡君亦右之所左亦左之使王叔與伯輿合要王叔氏不能丨其契遂奔晉注丨契之丨吕步舒淮南衡山王謀反發覺上思仲竒前言使仲舒弟子丨丨丨持斧鉞治淮南獄以春秋義専斷於外不請既還上皆是之前五刑志雋不疑丨丨丨始元五年有一男子乘黃犢車詣北二闕自謂衛太子公車以聞詔使公卿將軍中千石面雜識視莫敢發言不疑叱從吏收縳不疑曰昔衛瞶違命出奔衛拒而不納春秋是之衛太子得罪先帝亡不即死而來自詣此罪人也遂送詔獄天子謂霍光曰公卿大臣當用經術明於大誼者陳寵奏後漢丨丨咸之曾孫明家業天下獄訟其所由決平有無不厭伏時肅宗詔絶鉆鑽慘酷之科人俗和平屢嘉瑞漢舊事斷獄報重常盡三冬之月是時帝始改用十月冬初而已元和年旱賈崇上言斷獄不盡三冬故陰氣微陽氣發泄招致災旱寵奏冬至陽氣始萌令曰諸生蕩仲冬日身欲寧事欲靜若降盛怒不可謂寧行大刑不可謂靜帝納之為廷尉每附輕典從寬也魯恭疏和帝令麥秋案驗簿刑司徒丨丨上丨諫盛夏召農人拘時上失天時下傷農業一夫吁嗟王道為虧後卒施行寺中二絶宋世軌為大理卿蘇珍之為大理正寺中語曰定嫌決疑蘇珍之視表見裏宋世軌時人以為丨丨丨丨北史齊宋世軌傳並令棒殺梁武帝年老厭於萬機又專精佛戒每斷重罪則終日弗懌由是王侯驕橫轉甚或白日殺人於都街劫殺亡命咸於王家自匿薄暮塵起則剝掠行路謂之打稽武帝深知其弊而難於誅討及元帝即位懲前政之寬且帝素苛刻及周師至獄中死囚且數千人有司請皆釋之以充戰士帝不許丨丨丨丨之事未行而城陷隋史單言輒判李程字表臣調藍田尉縣有滯獄十年程丨丨丨丨一切待報嚴郢字叔敖御史臺請天下斷獄丨丨丨丨唯殺人許償死論徒者得悉徙邉郢言罪人徙邉即流也流有三而一用之誠難且殺人外猶有十惡偽造符印強劫放火諸盜今一徙之法太輕不足禁惡州部審覆徐浩字季海尚書右丞浩建言故事有司斷獄必丨丨丨丨自李林甫楊國忠當國專作威福許有司就宰相府斷事尚書以下未省即書垂謹恤意請如故詔可幕府平處沈傳師字子言為宣州吏治明吏不敢罔謹重刑法每斷獄召丨丨丨丨輕重盡合乃論決女厲進謝李景略為朔方節度監官五原將張光殺其妻以資市獄前後不能決景略核實論殺之既而有若丨丨者丨丨庭中如光妻者唐史道人素狂薛懷義陰募力少年千人為浮圖有逆謀侍御史周矩劾狀請治驗太后曰第出朕將使詣獄矩坐臺少選懷義怒馬造庭直往坐大榻上矩召吏受辭懷義即乘馬去矩以聞太后曰是丨丨丨丨不足治力少年聽窮劾唐卿所斷丨臨為大理丨髙宗嘗親録死囚前丨丨丨者悉號呌稱寃臨所入者獨無言帝怪問狀囚曰丨丨丨丨既非寃濫所以絶意舊史張説所按丨丨字道濟睿宗即位遷中書侍郎兼雍州長史景雲秋譙王重福於東都橫逆而死留守捕繫枝黨經時不決睿宗令説往按其獄一宿捕獲重福謀主盡得其情狀自餘枉被係禁一切釋之故睿宗勞曰知卿按此獄不枉良善不漏罪人非卿忠正豈能如此韋君所論韋仁壽京兆萬年人隋大業末為蜀郡司法書佐斷獄平得罪者皆自以丨丨丨丨死無恨元懿寬平鄭惠王丨丨數斷大獄務丨丨髙宗嘉之守真裁恕裴丨丨天授中為司府丞推覆詔獄多丨丨全免數十姓仁傑平恕狄仁傑為大理丞歲中斷久獄萬七千人時號丨丨本傳吕諲平反丨丨能以才智潤飾吏道至德中與三司同鞠大獄獨引緯文傅會經義而丨丨之當時卒用中興古今合璧事類備要外集卷二十二
