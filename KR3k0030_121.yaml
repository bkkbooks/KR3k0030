body:
  text: 古今合璧事類備要後集卷五十二宋謝維新撰環衞官門左右金吾二衞將軍諸衞将軍附歴代㳂革諸将軍事並各見國朝每條下小注内今以左右金吾二衞㳂革自唐叙起唐武徳曰左右衞府上将軍各一人從二品大将軍各一人正三品将軍各二人從三品掌宫宿禁衞凡五府及外府皆緫制焉凡五府三衞及折衝府驍騎畨上者受其名薄而配以職皇帝御正殿則守諸門及内廂宿衛杖非上曰亦将軍一人押仗将軍缺以中郎将代龍朔中省府事百官志左右金吾衞掌宫中京城巡警烽候道路水草之宜凡翊府之翊衞及外府忺飛畨上者皆属焉師田則執左右營之禁南衙宿衞官将軍以下及千牛畨上者皆配以職大功役則與御史循行同上龍朔二年改左右候衞曰左右金吾國朝六軍諸衞有左右金吾衞上将軍秦曰中衞漢武改曰執金吾隋曰候衞所領軍事名攸飛以執禦非違漢官宰尹曰吾禦也常執金革以禦非常緹騎二百人輿馬道從充滿於路世祖嘆曰仕官當作金吾吾左右衞上将軍晉武帝分中衞将軍為左右衞各大将軍一人銀章青綬隋改置左右衞為左右翊衞左右驍衞将軍漢武以李廣為驍騎将軍後省之光武改屯騎為驍騎晉又立晉臺以為宿衞官至隋煬帝改左右備身為左右騎衞所領名豹騎唐置驍衞府龍朔去府字光宅改左右武威衞神龍復舊武舊衞上将軍魏武為丞相有武衞營晉採其名置左右武衞府有大将軍光武改左右鷹揚衞龍朔復舊屯衞上将軍隋煬帝置右左屯衞唐龍朔改為威衞光宅改為左右豹韜衞領軍衞上将軍魏武為丞相始置中領軍魏文又置領軍晉因之品第三金章紫綬宋齊領軍掌内禁兵唐别置領軍衞大将軍龍朔改戎衞咸亨復舊監門衞大将軍漢魏以來城門校尉之職也隋置左右監門府将軍煬帝改府字為衞唐置大将軍龍朔改為監衞千牛衞上将軍後魏有千牛衞備身本掌乗輿御刀葢取庖丁為惠文君解數十牛而刄若𤼵硎此刀可以備身因以名官隋左右府領千牛備身唐改左右千牛府龍朔改為奉神衞神龍改為千牛衞即諸衞大将軍諸衞将軍並為環衞官无定員皆命宗室為之亦為武臣之贈典大将軍以下又為武臣責降散定政和中改武臣官制而環衞如故葢雖有四十八階别无所領故也四朝志靖康元年用御史中丞陳過庭言請遵藝祖開寳初罷諸節度使歸環衞故事於是節度使錢景臻等並為左右金吾衞大将軍同上又崇寜四年倣古修立三衞官有郎一員中郎為之貳文武各一員博士一主簿一親衞府有郎有中郎以后妃嬪御之家有服親及翰林學士并管庫正任觀察使以上子孫充勲衞府有郎有中郎以勲臣之世賢徳之後有服親大中大夫以上及正任團練使遥郡觀察使以上子孫充翊衞府有郎有中郎以卿監正任刺史遥郡團練使以上並以親兄弟子孫試充三衞郎治其府之事率属日直于殿陛長在左立起居郎之前貳分左右文東武西立都承㫖之後親衞立于殿上勲衞立於垜殿翊衞立於兩階衞士之前中興乆不除授孝宗隆興詔學士院討論環衞官制度欲參酌祖宗時及唐太宗制度詔曰朕惟祖宗選用将帥以崇武節外建方鎮内列環尹品式備具近來環衞乆不除授非所以除材而均任也可依舊制應以才畧聞堪任将帥及乆勤軍事暫歸休佚之人並為環衞官更不換授正令兼領如節度使則領左右金吾衞上将軍承宣使則領左右衞上将軍在内則兼𢃄在外則不𢃄以十員為額朝參侍殿並依御𢃄體例宗室不在此制仍不差戚里及非戰功人除改差主兵官合不領環衞如皇城司𢃄御器械之類仍許兼領事類虎賁丨丨氏掌先後王而趨以卒五周禮爪士祈父予王之丨丨詩環尹潘崇為大帥且掌丨列之丨左傳内官楚君戎分為二廣廣有一卒右廣初駕數及日中左則受之丨丨序當其夜以待不虞同上中尉丨丨即執金吾漢髙祖紀式道丨丨掌儌巡京師武帝更名執金吾有丨丨左右中注式道持麾至宫門門乃開漢百官志環衞丨丨白六帖警巡丨夜丨晝漢西京賦贖罪漢楊淮奏梁冀叔父執金吾利以三月之俸丨丨納官唐田仁㑹麟徳中轉右金吾将軍所得俸給外有餘輒以丨丨時人頗譏其要名而仁㑹强力疾惡晝夜巡警自京城至衢路越法無不立發每日廷引百餘人躬自閱罰畧無寛者京城貴賤咸憚之領護羊琇少與武帝相親謂帝若富貴見用作丨丨各十年帝戲而許之及即位擢琇為左衞将軍警衞左右衞大将軍之職掌統領宮庭丨丨之職六典緹騎金吾統丨丨二百唐百官志蘭錡佐衞丨丨白集左衞崔蕃制武衞官我丨丨杜牧行吳正制戎衞尔以忠勞選登丨丨訓勇力之士以備時使申誰何之人以奉徼廵白集行李彦佐制左廣移領丨丨白集李演除衞上将軍制右廣俾領上軍仍遷丨丨白集王士則除右羽林大将軍制管兵臧盾遷中領軍丨天下丨要監局事多盾為人敏贍有風力長於撥繁職事甚理天監中吳平後蕭景先居此職甚著聲稱至是復繼之梁書司武官崇環衞職實丨丨杜牧之名王釗制緫制凡親勲翊五郎将府及折衝府所𨽻者皆丨丨焉六典嚴衞丨丨禁兵六帖嗜學宗室則之丨丨年五十餘尚執經太學嗣曹王臯薦之邊左金吾衞大将軍職林有禮呉俶章恭皇后之弟為金吾将軍俶循循丨丨遜無倨氣矜色見重朝廷同上請繫郾賈復為執金吾郾王尹尊及諸将反上召諸将議以檄叩地曰郾最强宛次之孰能為我撃郾復曰臣丨丨丨上曰執金吾撃郾吾復何憂耶華嶠後漢書諫逐兎唐執失思力為左領軍太宗將逐兎於後苑思力丨曰陛下何得自輕萬一馬有顛蹶將若之何太宗顧而異之又將丨丨思力脫巾𢃄跪而固諫太宗為止焉不剪槐隋髙穎拜左衞大将軍每坐朝堂北槐下聴事其樹不依行列有司請伐之上特不令剪去以示後人見重如此佩大刀唐王及善除右千牛衞将軍帝曰以爾忠謹故擢三品要職爾丨丨横丨在朕側亦知此官貴乎解金𢃄隋皇甫無逸轉右武衞将軍王世充簒弃母妻斬關自歸騎追及無逸丨丨丨投之地彈琵琶唐柴紹轉右驍衞大将軍吐谷渾党項冦邊虜據髙射紹軍紹安坐遣人丨胡丨丨真將軍唐段志𤣥為左驍衞大将軍文徳皇后之葬勒兵衞章武門太宗夜遣使至士及披户内使志𤣥拒曰軍門夜不開使者示詔志𤣥曰夜不能辨帝歎曰丨丨丨益重名唐張萬福徳宗時拜右金吾将軍楊城等詣延英門論裴延齡事伏閣不去帝震怒懼不測萬福大言曰國有直言天下無慮矣吾年八十與見盛事徧揖城等天下丨丨其丨環太微丨丨丨諸星有上将次将之位所以拱衞震極不若天子置上将軍以禦侮率是道也元稹授張奉國左衞上將軍制法勾陳王者丨丨丨設環列非勲勤之将信近之臣則何以久張爪牙轉置肘腋白集李演除左衞上将軍制摧姦伏唐宗室晦遷金吾将軍丨擿丨丨無畱隠識舊儀唐宗室若水為左金吾衞大将軍兼通事舎人多丨丨丨每宣勞揖輦進止有可觀者延入閣唐于文士及擢右衞大将軍太宗丨丨丨語或至夜分休沐馳召號珂里唐張嘉祐嘉正弟有幹畧方嘉正為相時任左金吾衞将軍昆弟每上朝軒葢騶導盈閭巷時丨所居坊曰鳴丨丨威重有謀漢耿秉為人丨丨丨丨畧拜執金吾每行幸秉常領宿衞忠亮雅正紀善丨丨丨丨才兼文武拜領軍衞将軍務嚴公正馬防字孝孫拜執金吾牲丨丨丨丨處議多見用秉觀記不畏强禦陶回拜領軍将軍回性方範丨丨丨丨丹陽户桓景頗以供事司徒王導甚悦之回常慷慨論景非正人不宜狎㑹熒惑守南斗回曰公以明徳輔弼聖主當親正逺邪而與桓景造膝熒惑何由退舎導深愧之晉中興書任國柱石辛慶忌明畧威重丨丨丨丨拜執金吾雜漢事入直殿中羊祐遷中領軍悉統宿衞丨丨丨丨執兵之要事兼内外晉中興書咨訪軍事威霜召為執金吾毎有軍事帝丨丨焉魏書分典飛騎姜確字行本太宗選趫才衣五色袍乗六閑馬直屯營宿仗内毎出幸即以從拜行本左屯衞将軍丨丨丨丨莅官勁正屈突通為右武衞将軍丨丨丨丨有犯法者雖親無縱其弟葢長安令亦以方嚴顯時人語曰寜食三斗葱不逢屈突通寜食三斗艾不見屈突葢論奏風彩李景畧召為羽林衞将軍對徳宗延英殿丨丨衎衎有大臣丨丨乆衞宸階自參戎秩丨丨丨丨常相除右金吾制統領宫庭左右衞将軍之職掌丨丨丨丨警衝衞之法以督其属之隊俊而緫諸曹之職務焉其左右驍騎等皆如之六典巫劾徙邊唐田仁㑹為右金吾丨傳鬼道惑衆自言能活死人市里尊神仁㑹丨丨于邊惡少捕死唐杜中立歴左右金吾衞大将軍京師丨丨優戲道中具騶唱呵衞中立郡從吏丨繫立箠丨執金立侍丨丨丨丨唐杜牧于釗制分職環衞丨丨丨丨重名冠軍白六帖累從征討唐柴紹髙祖即位拜左翊衞大将軍丨丨丨丨歴國公歴二百載唐秦叔寳拜右武衞大将軍嘗曰吾少長戎馬間丨丨丨餘丨典衞屯兵唐阿史那社尔率衆内属十年入朝授左驍衞丨丨大将軍尚衡陽長公主為駙馬都尉丨丨伺察細事唐徳宗時金吾大将軍李翰好丨丨城中丨丨舊史爪牙之軍丨丨丨丨同上輦轂之衞丨丨丨丨同上警衞禁街貞元十七年金吾衞大将軍李翰奏丨丨丨丨必資澄肅續通典夾峙宫省北落親兵丨丨丨丨禮六帖杜牧行梁榮幹制號為稱職唐趙道興正觀初歴遷武候中郎将明閑宿衞丨丨丨丨太平御覧以為模矱唐龎玉乆宿衞習知朝廷制度髙祖顧諸将多不閑儀檢故授玉領軍武衞二大將軍使衆觀丨丨丨丨敷奏詳辨唐姜柔逺美姿容丨丨丨丨武后時為左鷹楊衞将軍忠信彰美丨丨丨丨於禁營政績茂宣於汧隴時宋淮為右千牛衞大将軍遣宋淮宣諭詔七萃八屯周設丨丨漢列丨丨皆所以拱衞王宫肅嚴徼道白集鄭何除右衞将軍制八舎二廣天子六軍必有材官飲飛超乗挽强之士董之以威待之以信分丨丨之衆寡均丨丨之逸勞皆将軍之力也是以李大亮上直禁中而文皇甘寢則心腹爪牙之任斯不細矣元微之行于季友右羽林制典戒武衞烈烈揚侯實統禁戎注曰皇祖之始丨丨丨丨文選揚荆州諫典兵禁門丨丨於丨丨之内直侍於衞㦸之中杜牧行張直方制天子押衙唐邢濟為金吾将軍曰我金吾丨丨丨丨以死生從安自脫武候緹騎謂丨丨丨丨為金吾衞将軍右衞将軍權集詔乗蜀馬唐髙祖以李粲為右監門衞大将軍曰卿忠勇之譽聞於隋今年齒雖邁筋力未衰監門之職非公莫可粲以年老辭髙祖曰藉公處分尓豈欲煩公筋力耶於是丨粲自非殿庭皆丨丨丨論者榮之統良家騎丨丨丨之丨士訓期門之材官白集行王士則制周廬肅然交㦸之下丨丨丨丨白集李演除左衞上将軍制屯萃盡察八丨之警巡七丨之勤惰尓為其正丨得丨之同上分司丹禁梁有左右中将以丨丨丨丨侍衞左右掌護建章國家設十二衞猶漢之有南北軍而左右羽林尤稱親重自諸衞而移鎮者謂之美遷丨勾陳而丨丨丨借巡警而嚴武衞白集王元輔授左羽林衞将軍制臨難不屈唐劉洪基京師平功第一授右驍大将軍討薛舉戰淺水原八緫管軍皆没惟洪基一軍戮力矢盡為賊授帝以丨丨丨丨優護其家本𫝊謀亂不敢唐楊思訓從幸并州右武衞大将軍慕容寳節夜要思訓與丨丨思訓對寳節丨丨将毒酒以進思訓死妻訴之流寳節嶺表斬之蘭錡之兵禁旅緫丨丨丨丨李文饒集環尹之列丨丨丨丨執金為貴曲阜行李貴金吾大将軍制列衞宫邸丨丨丨丨同上行令白武衞大将軍制宿衞王室千牛𢃄刀丨丨丨丨同上行金髙后千牛衞将軍制鈎陳錡杖張鷟云肅肅張北極之威靈森森表南端之