興會要事類良家見㳂革嚴衛丨丨禁兵白六帖羽林漢置丨丨郎孤兒漢羽林丨丨父死子代武帝時繫胸奴死子孤不能自活養於羽林親重國家設十二衛猶漢之南北軍而左右羽林尤稱丨丨白集王元輔制宿衛唐李聽帝在東宫使左右諷取之聽自以身丨丨不敢獻餘檢閉啓梁乾化詔丨校丨丨車駕出則闔扉續通典掌開闔唐城門郎丨京城皇城宫殿諸門丨丨之節奉其管鑰而出納之開則先外而後內闔則先內而後外所以重中禁尊皇居也候其晨昏繫鼓之節而啓閉之同上文臣少卿國朝以皇城使比丨丨丨丨選人才優長者一員供職謂主管皇城司也官制舊典御𢃄主管政和改制之後皇城司依舊以橫行或丨丨二員丨丨同上詩集直禁將軍丨丨圍繡服耀金羈羽衛九天靜英豪四塞知望雲回朔鴈隔水射穹麋門風荀氏敵劔藝霍家推本朝釋無可寄羽林盧人大詩御前忠佐軍頭引見司歷代㳂革國朝但曰軍頭引見司端拱元年改軍頭司為御前忠佐軍頭司引見司為御前忠佐引見司軍頭司掌崇班供奉及諸州駐泊捕捉之事引見司掌軍頭名籍諸軍搜閲引見之事分紀中興以來提㸃官幹辦官並以閣門官充紹興三十二年詔知閣門官兼則稱提㸃宣贊舍人閣門祗候兼則稱幹辦乾道三年詔提㸃幹辦共四員為額事類德用至使相國朝章聖以二月十九日上升時大雪極寒太后以酒賜禁衛之士時總兵者令諸班極飲王丨丨管引見司所轄地分皆不得飲酒太后召問德用曰此輩被大行恩德久矣何忍飲酒況宫中大事未定忽有一夫酗酒髙呼恐社稷危尓太后咨嗟感泣有意大用後丨丨丨𢃄御器械歷代㳂革國初以來嘗選三班以上武幹親信者佩櫜劔御劔或以內臣為之㑹要初是職止名御𢃄咸平元年改為御𢃄器械景祐二年詔自今無得過六人慶厯元年詔遇闕員以歷邊任有功者補之舊制外任𢃄御器械過闕朝見不宿衛熙寧六年向寶移真定府路揔管過京師特命宿直並㑹要中興因仍事類賜𢃄太宗嘗令善工製金𢃄時石晉帶御械方侍立輒進曰願以賜臣太宗即豫之長編屬鞬丨丨左右夙夜不懈曲阜行𢃄御器械樂上宣制居嚴邃御𢃄分禁庭內宿直舍在崇政殿內職丨丨丨多任國戚及內侍官制舊典衛不虞紹興七年樞密院言𢃄御器械官合𢃄插上曰祖宗置此官所以丨丨丨也今乃佩數隻骹箭不知何用中興㑹要四廂歷代㳂革唐有左右神䇿軍掌衛兵及內外八鎮兵百官志左右龍武神武神䇿號六軍正元二年神䇿置大將軍十四年置統軍始殿前左右神威軍號天威軍八年廢以軍𨽻神䇿有馬軍步軍將軍及指揮使等以大將軍知軍事天復三年廢神䇿四年復同上本朝捧日舊曰日騎天武舊曰控鶴太平興國二年詔改控鶴曰天武雍熙四年改殿前司日騎曰捧日龍衛舊曰龍捷神衛舊曰虎捷太平興國二年詔改龍捷曰龍衛虎捷曰神衛皆以美名易禁軍之舊號也殿前司捧日天武馬軍司龍衛步軍司神衛謂之上四軍各有左右廂廂各三軍東齊記事事類募材勇唐柏梁器入為左神䇿大將軍丨丨丨以代士卒市販者中尉竇文揚惡之峙宫省夾丨丨丨唐杜牧梁榮幹制坐䦨入唐柏良器丨友人丨丨换右領軍衛自是軍政皆中官專之號桄梯管軍八位武辨軍門丨八丨丨蓋殿前馬軍步軍副都指揮使三軍都虞候天武捧日龍神衛四廂都指揮使為管軍官制舊典習練軍旅端拱初以龍衛左廂都指揮使孔守正丨丨丨丨特置龍神衛四廂都指揮使以寵之范蜀公蒙求進董親兵丨丨丨丨龍溪除釗錫制擢典親衛丨丨丨丨淇水除白堂制周衛典軍丨丨丨丨之官南豐除曲珍制其還軍候汝服勤戎亦既有年所丨丨丨丨往即官聨張于湖勝捷都虞候謝興換授從義郎制易置武階尓服在戎行多丨丨丨丨同上都虞候姚元換授制古今合璧事類備要後集卷五十二
