body:
  text: 古今合璧事類備要外集卷三十四宋謝維新撰服飾門冠附弁帽冕頭巾幞幘身章舉要冠首服弁冕之總名按説文貫也所以貫韜髮也上古衣毛而冒皮後世聖人見鳥獸有冠角顛胡之制遂作冠冕纓緌以易之然制度各有不同名稱亦隨以異遽數之不能終也巾幘帽幞頭至後世有之巾為黔首之服以三尺皂絹褁髮幘帞卑賤執事不冠者服之其戴也加首有頍所以安物三代之世法制滋章下至戰國文武並用秦雄諸侯廼加其武將首飾為絳帞以表貴賤其後稍稍作顔題漢興一再傳續之為耳崇其巾為屋羣臣無貴賤皆服之文者長耳武者短耳稱其冠也未冠童子幘無屋示未成人也入學小童句卷屋者示尚幼少未逺冒也帽冠之貴製猶冠也義取於䝉覆其首其本纚也古者冠無幘冠下有纚以繒為之後世施幘於冠因或裁纚為帽自乗輿宴居下至庶人無爵者皆服之也然今以紗為之矣幞頭起後周亦有圓頂方頂軟脚硬脚之不同其來皆有漸不可以不知也事類首飾冠丨丨也元服丨丨冠也毋追夏之冠曰丨丨以漆布為殻以緇縫其上前廣四寸髙三寸章甫商之冠曰丨丨其制與周之委貌夏之毋追俱用緇布為之委貌周之冠曰丨丨一名𤣥冠今之進賢冠者乃其遺象也並三禮圖冠不正伯夷思與鄉人處其丨丨丨望望然去之孟冠不免衛太子蒯聵之亂衛輒出奔季子將入遇子羔將出曰門已閔矣季子曰吾姑至焉公孫敢門焉入太子下石乞盂黶敵子路以戈擊之斷纓子路曰君子死丨丨丨結纓而死左哀十五年冠以招齊侯田于沛招虞人以弓不進公使執之辭曰昔我先君之田也旌以招大夫弓以招士皮丨丨丨虞人臣不見皮丨故不進乃舍之左孔子冠丨丨曰丘少居魯丨章甫之冠許子冠丨丨奚冠曰丨素怒髪衝藺相如對秦王丨丨丨冠聚鷸羽鄭子臧丨丨丨以為冠左裂苞楯楚漢會于鴻門項籍圖危髙祖樊噲聞急乃丨丨丨以為冠排入羽營周迁輿服雜事冠竹皮髙祖以竹皮為冠及貴常丨本紀冠鵕䴊髙祖時籍孺孝惠時閑孺婉佞貴幸與上卧起故恵帝時郎中皆丨丨丨具帶傳脂粉化閎籍之屬溺其中騎士曰沛公不喜儒諸客冠儒冠來者輒解其冠丨丨丨彈冠待王陽為益州刺史貢禹丨其丨丨陽薦陽薦禹於成帝召為大夫解冠掛逢萌之長安時王莽殺其子宇萌謂友人曰三綱絶矣不去禍將及人即丨丨丨東都城門將家屬浮海客於遼東著鹿皮宋何尚之致仕在家常丨丨丨冠後復起為開府儀同三司天子臨軒百僚陪位沈慶之戲曰今日何不丨丨丨冠著貂蟬齊周盤龍為散騎常侍武帝謂曰丨丨丨何如兠鍪答曰此貂蟬從兠鍪中生耳有時不冠嚴武鎮成都奏杜甫為參謀甫於浣花里種竹植樹結廬枕江縱酒嘯咏與田畯野老相狎蕩無拘檢武過之丨丨丨丨其傲誕如此舊史傅元冠銘居髙無忘危在上無忘敬懼則安敬則止弁皮弁周弁殷哻夏收三王共丨丨素積禮王與大夫盡弁以啓金縢之書注丨丨質服以應天書雀弁成王崩伯相命士須材云云二人丨丨執惠主于畢門之内注丨韋丨鹿弁四人綦弁執戈上刄夾兩階戺注綦文丨子皮丨尚書顧命頍弁有丨者丨實維在兮會弁丨丨如星載弁丨丨俅俅並詩瓊弁楚子玉為丨丨玉纓夢河神謂已曰畀余余與汝孟諸之麋左僖二十八年韋弁王莽初獻新樂於明堂羣臣冠麟之丨本傳冕邃延天子玉藻十有二旒前後丨丨龍卷以祭注祭先王之法服也雜采曰藻天子以五采藻為旒旒十有二前後丨丨者言皆出冕前後而垂也天子齊肩延冕上覆元表纁裏記郊特牲黈纊黄帝作冕丨丨示不聽讒言也通典皂表平冕丨丨朱絲裏晉輿服志朱紘天子冕而丨丨記祭義白珠平冕皂表朱絲裏廣七寸長二寸加於通天冠上前圓後方垂丨玉丨十有二旒以朱組為綏通典又衮冕垂丨丨十有二旒以組為纓色如綬二禮圖璪旒郊祭之日王戴冕丨十有二十則天數也記郊特牲采玉五采繅十有二就皆五丨丨十有二玉笄朱紘鄭元注繅雜文之名合五采絲為之垂於延之前後各十二所謂邃延也就成也繩之毎一匝而貫五丨丨十有二旒則十二玉也周禮圓方制冕皆前丨後丨朱裏元上三禮圖高下冕者俛也後丨前丨有俯伏之形同上黄帝作丨丨丨冕垂旒目不邪視通典禮篇堯舜為丨丨以德化丨冠冕皇而祭有虞氏丨丨丨收而祭夏后氏丨丨丨哻而祭殷人丨丨丨冕而祭周人丨丨丨並王制加璪旒黄帝結冕王制大有舜氏皇冕論語云禹致美乎黻冕孔子曰服周之冕此明至周加冕始旒藻玉皆五采前後各十二三禮圖用玉珠叔孫通制禮多依周法漢制度古今之冕俱廣八寸長尺六寸前圓後方漢丨白丨丨各十二三公九旒青珠中二千石七旒黑珠然冕服之飾周為最備同上魏珊瑚丨因漢故事明帝好婦人之飾改以丨丨晉翡翠丨過江服章多闕而冕飾以丨丨珊瑚雜珠侍中顧和奏舊禮冕十二旒用白玉珠更平天宋丨名曰丨丨冕天子郊禮及宗廟服之設司服後周丨丨丨之官掌皇帝十二冕祀昊天則蒼冕五帝各隨其方色朝日同青冕夕月同素冕地祗同黃冕神州社稷同元冕享先生加元服笄象冕享先帝食三老耕籍等以衮冕視朝大射等以山冕視朝臨法門適宴等以鷩冕皆十有二旒用采玉北齊採陳之制旒玉用五采以組為纓色如其綬其四時祭祀封禪皆服衮冕垂組纓隋採北齊之法衮冕丨白珠十二旒丨為丨色如其綬充耳玉笄裴正奏色並用元並通典去珠玉乾德元年閏十二月詔乘輿所服冠冕丨丨丨之飾長編貫珠璣治平二年詔栽定衮冕制度禮院奏曰皇朝之制天子之服有衮冕前後十有二旒二纊並丨丨丨又十有二碧鳯㗸翠旒在珠旒外板以龍麟錦表上綴玉為七星旁施琥珀瓶犀瓶各二十四綴金絲網鈿以珠璣雜寳玉如紫雲白鶴錦衣四柱飾以七寶衮服間以雲朶飾以金鈒花鈿窠裝以珠璣琥珀雜寶玉祭天地宗廟朝享太清玉清昭應靈宮等服之改組紘元豐四年臣僚言古者冕弁則用紘冠則用纓今衣服令乘輿服大裘冕以組為纓色如其綬衮冕朱絲組帶為纓冕而用纓不與禮合請丨用朱丨丨仍改平冕為元冕用纓不赤而微黑者又别圖上韍制從之巾折角郭林宗嘗於陳梁間行遇雨巾一角墊時人乃故丨巾一丨以為林宗巾其見慕如此後漢指麾諸葛武侯與司馬宣王在渭瀕將戰宣王戎服涖事使人視武侯乗素輿葛巾毛扇丨丨三軍皆隨其進止宣王聞而歎曰可謂名士矣漉酒晉陶潜郡將候之逢其酒熟取頭上葛巾丨丨畢復著之白綸巾謝萬簡文辟為從事中郎著丨丨丨披鶴氅裘版而前帝與談移曰白接䍦山簡鎮襄陽優游卒嵗唯酒是耽諸習氏荆土豪族有佳園池簡毎出嬉遊多之池上置酒輒醉名之曰髙陽池時有兒童歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著丨丨丨舉鞭向葛彊何如并州兒簡愛將也晉本傳自製巾裴冕丨丨丨子工甚人爭效之號僕射巾孔帖不及巾李愿節度鳳翔用婚家竇綏典帳中兵驕驁怠沓衙將李臣則等因衆不忍夜斬綏首愿聞變丨丨丨與左右數人縋而逸思力脱執矢丨丨丨巾帶諫王衍裹前蜀丨丨好丨尖巾其狀如錐踣様巾武后擅政多賜羣臣巾子綉袍勒以囘文之銘皆無法度不足紀至中宗又賜百官英主丨丨丨帝在藩時冠也圓頭巾楊供奉官及詣司長官則有羅巾丨丨丨子後遂不改並唐車服志以葛為巾武攸暨安樂公主出降遣通事舍人李邈以璽書邀之詔見日丨丨丨丨不名不拜以珠飾巾昭宗播迁於鳳翔朱梁率諸道甲馬奉迎車駕時侯王將帥在政下者皆以珠一顆盤幞頭脚貫以銀綿而簪之又軍人咸丨丨丨丨競相誇尚洎朱梁簒立乃知珠已居人上者久矣秦再思紀異岸巾出門帝怒丨丨丨側丨宋璟傳青巾異相太祖皇帝微時過涇州長武鎮寺僧守嚴者異其骨相密使畵工圖于寺壁丨丨褐裘天人之相也及貴遂易以冠服邵氏聞見錄濶巾異人明道伊川衣服異人衫則大袖巾則濶幅元祐間人皆效之至紹聖中猶有襲之者趙景平其門下士也張文濳贈題趙詩云明道新墳草已春遺風猶有見門人定知魯國衣冠舊盡帶林宗折角巾盖謂此也泊宅編幘覆髻丨丨謂之幘又謂之承露後光武紀注嚴首幘者積也頤首丨頤也後輿服志救蝕凡丨丨日皆著赤幘以助陽也决疑要法迎氣丨丨五郊各如其色從章服也後輿服志青幘丨丨以耕通典紺幘凡齋丨丨耕青幘秋貙劉緋幘後輿服志赤幘武吏常丨丨成其威也同上垂干虎賁羽林郎將皆赤幘陛衛丨丨無屋未冠童子幘丨丨者未成人也入學小童幘也句卷屋示尚幼小未逺冒也並通典晢幘齊侯伐晉夷儀東郭書讓登犂彌從之云云濟侯賞犂彌辭曰有先登者臣從之丨丨而衣貍裘注晢白也齒上下相值製裘也首飾秦加武將丨丨為絳幘以表貴賤後輿服志威儀時三輔吏上東迎更始見諸將過皆服赤幘老吏或垂涕曰不圖今日復見漢官丨丨後光武紀幘髙顔秦加武將首飾為絳怕以表貴賤漢興續其顔文帝乃丨其丨後輿服志幘無巾元帝額有壯髮不欲使人見始進丨服之羣臣皆隨焉然尚丨丨蔡邕獨斷王莽秀丨丨丨幘施屋冠進賢者宜長耳冠恵文者宜短耳各隨其宜同上董偃服緣幘漢丨丨召見丨之杜通典允章衣劉丨丨青衿介幘見衣服詳笑詠如常謝奕安之兄桓温辟為安西司馬在温座岸幘丨丨無異常日朝野爭效王儉監試諸生巾卷在廷劒衛令史儀容甚盛作解散幘斜挿簪丨丨慕之丨相倣丨南本傳以頭穿取庾凱雅有豪韻轉軍諮祭酒時劉輿見任於越人士多為所構惟凱縱心事外無跡可間後以其性儉家富説越令就换錢十萬冀其有名因此可乗越於衆坐中問凱凱頽然已醉幘墮機上丨丨就丨丨徐答云下官家故有兩千萬隨公所取輿於是乃服越甚悦因曰不可以小人之慮度君子之心晉書帽冒絮漢薄太后以丨丨提文帝烏紗成帝咸和九年制聽尚書八座丞郎門下三省侍郎乗車白幍低幃出入掖門又二宮直官著丨丨幍帽也然則往往士人宴居皆著縚矣而江左時野人已著帽人士亦往往而然但其頂圓耳後乃髙其屋云晉輿服志司馬著謝安為桓温司馬温後詣安值其理髮安性遲緩久而方罷使取幘温見留之曰令丨丨丨帽進見重如此市嫗遺晉王濛美姿兒嘗著破帽入市丨上丨競丨之新帽孟嘉落丨丨為征西桓温參軍温甚重之九月九日温宴龍山寮佐畢集時佐吏並著戎服有風至吹嘉帽墮丨嘉不之覺温使左右勿言欲觀其舉止嘉良久如厠温令取還之命孫盛作文嘲嘉著嘉坐嘉還見即答之並晉書著皮帽宋沈慶之討沔北諸山蠻大破之羣蠻皆稽顙慶之患頭風好丨狐丨丨羣蠻惡之號蒼頭公著縠帽唐初以轂為之以隔風塵唐實錄繡帽自表唐李晟收京師毎與朱泚戰必錦裘丨丨丨丨李懷光惡之箴曰將務持重豈宜自表襮為賊鉗哉晟曰昔在涇原士頗相畏伏欲令見之奪其心爾本傳碧帽為識張巡前此逺將李滔救東平遂叛入賊大將田秀榮替與通或以告逺曰晨出戰以丨丨丨丨視之如言盡覆其衆還輒曰我誘之也請以精騎往易丨丨孔六帖危帽散衣李紳河南惡少丨丨丨丨孔六帖好戴大帽五代蜀王衍晚年俗競為小帽僅覆其頂俛首即墮謂之危小帽衍以為不祥禁之而衍丨丨丨丨常服髙帽伊川丨丨璽袍丨丨簷劣半寸一本云帽桶八寸簷半寸置繫絛曰此野人之服也深衣紳帶青禒篆文非禮勿視非禮勿聽非禮勿言非禮勿動外書率多頂帽余見大父家居及燕見賓客丨丨丨丨而繫勤帛猶未甚服背子帽下戴小冠簪以帛作横幅約髮號額子處室中則去帽見冠簪或用頭巾也石林燕語猶是軟帽或問今冠帶起於何時曰㸔角牴圖所遷觀戯者盡是冠帶立底屋上坐底皆戴帽繫帶樹上坐底也如此那是丨丨丨丨搭在頭上朱語錄幞頭服頭後周武帝裁為四脚名丨丨曾類説高頭隋大業中着巾子以桐木為之内外皆漆又賜百僚絲葛巾子呼為丨丨様炙縠子褁頭馬周議丨丨左右各三摺象三才重繫前脚法二儀詔從之唐史木斫唐人幞頭初止以紗為之後以其軟遂所木作一字在前櫬起名曰軍容頭其説以為起於魚朝恩一時人爭效之士大夫欲為幞頭則曰為我斫一軍容頭來及朝恩被誅人以為語䜟朱語錄珠盤昭宗播􅂒於鳯翔朱梁率諸道甲馬奉迎車駕時侯王將師在岐下者皆以丨一顆丨幞頭脚貫以銀線而簪之又軍人咸以珠飾巾競相誇尚洎朱梁篡立乃知珠已居人上者久矣秦再思紀異吏人官唐人朝服猶著禮朋幞頭圓頂軟脚今之丨丨所丨是也並朱語錄宦官帶或問長脚幞頭於橫渠説唐莊宗取伶丨幞頭帶之後遂為例曰不是如此莊宗在位亦未能便化風俗兼是伶人所帶士大夫亦未肯帶之云云或云乃是唐丨丨要得常似新様故以鐵線挿丨中藩鎮僭盖本唐明皇已帶長脚幞頭或云丨丨丨禮為之遂為此様並朱語錄桐木山子五代時惟人君得裹兩脚者丨丨丨丨相承用藤織坏子本朝易以藤織者而以紗冒之近時方易以漆紗嘗見南溪紗漠一士夫家尚收得上世所藏幞頭猶是丨丨丨丨唐制又有兩脚上下者亦莫可曉漆紗幞頭仁宗時方以丨丨為之並朱語錄詩集整冠李下不丨丨顔延年巍冠丨丨講唐虞韓儒冠誤丨丨多丨身拜紫宸衣冠丨丨丨杜飄綵紘朝冠丨丨丨韓鵕䴊冠何須不著丨丨丨杜貂蟬冠丨丨丨舊行柳虎皮冠幽州胡馬客錄眼丨丨丨李白巾白㲲光明丨丨巾杜烏角二老白接籬兩郎丨丨巾坡頭戴丨丨小烏巾杜首戴丨丨方頭巾李葛巾呼兒正丨丨杜花巾呉江女道士頭帶蓮丨丨落烏紗風過丨丨丨杜掛石壁脱巾丨丨丨露頂灑松風李漉淵明酒半升僅丨丨丨丨二寸纔容子夏巾坡帶林宗巾盡丨丨丨折角丨張文華髮岸綸巾一簪丨丨丨丨丨坡幘隤然岸丨丨丨巾幘曽岸江臯白幘丨丨丨杜帽烏帽為客裁丨丨杜白帽丨丨應嫌似管寧杜紗帽淨管寧丨丨丨杜秋日詠懷脱帽露頂丨丨丨丨王公前杜紗帽籠頭柴門反闗無俗客丨丨丨丨自煎喫盧仝古今合璧事類備要外集卷三十四
