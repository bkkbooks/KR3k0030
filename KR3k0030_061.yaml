皮鹿皮也入純帛凡嫁女娶妻丨幣丨丨無過五兩注必言兩者欲得配合之名也又凡納幣一束五兩兩一束五尋記雜記篇鏡臺下聘見前婚姻娶姑女事剪刀為聘南史江祐求范雲女為婚因酒酣巾箱中取丨丨與雲曰且以丨丨雲笑而受之至祐貴雲曰昔與將軍俱為黃鵠將軍今化為鳯凰荆布之室理隔華盛因出剪刀還之祐更姻他族及祐敗妻子流離本傳藍橋玉杵見前夤緣王田白璧同見上類公孫委禽見前婚姻宗室納鴈唐丨丨丨幣用白丨禮用烏羊見前婚姻類奏加皮馬晉所司婚禮納徵大婚用玄纁束帛加圭馬二駟王侯玄纁束帛加璧乘馬大夫玄纁束帛加羊古以皮馬為庭實天子加榖圭諸侯加大璋可依周禮改璧用璋其羊鴈酒米玄纁如故諸侯婚禮如納采告期迎各帛五匹及納徴焉四匹皆夫家自備唯璋官為具晉志羊祥也婚有羊漢末始也以五百緍張公丨丨丨丨聘韋恕女神仙傳借二萬錢牽牛娶織女借天帝錢二萬下禮久不還被驅在營室中荆楚歲時記納吉新儀其日媒氏至女氏門掌事者設神位如初主人受禮如納采之儀主人媒氏俱即座從者以鴈陳於階媒氏曰稽諸龜筮枚卜曰吉使某以告主人曰龜筮協從某曷敢辭政和重修昏儀納成新儀其日媒氏至女氏門掌事者設神位如初主人受禮如納吉儀通媒氏于門外媒氏執函書主人揖入媒氏報揖從入持禮物者從其後如納吉儀從者陳禮物于階媒氏曰吾子既修好於某某使某請納成媒氏以函書授主人主人曰備物有加敢不重拜主人復書以授媒氏同上文公婚禮古禮有問名納吉今不能盡用止用納采幣以從兩便凡幣用色繒貧富隨宜少不過兩多不踰十今人更用叉釧羊酒果實之屬主人者具書遣使如女氏女氏受書復書禮賔使者復命並同納采之儀但不告廟使者致辭改采為幣從者以書幣進使者以書授主人主人受書執事者受幣主人再拜使者避之復進請命主人授以復書家禮請期逮冰歸妻士如歸妻逮冰未泮詩占星成禮三星在天三星在隅三星在户注男女待禮而成若薪待人而後束三星在天所以嫁娶箋三星謂心星有夫婦之象故嫁娶者以為候焉在天則三月之末在隅則四月之末在户則五月之末不得其時詩使者告期請期用鴈主人辭賔許告期如納成禮期日由夫家來夫家必先卜之得吉日乃使使者往辭即告之使者曰吾子有賜命某既申受命矣惟是三族之不虞使某也請告日對曰某既前受命矣唯命是聼使者曰某命某聽命于吾子某壻父名對曰某固唯命是聽使者曰某使某受命吾子不許某敢不告期曰某曰對曰某敢不敬須也須待也儀禮主人聽命媒氏復致命曰某使某請吉日丨丨曰某固丨丨媒氏曰請以某甲子主人曰敢不承命政和婚儀親迎事類男先女男親迎丨丨於丨剛柔之義也天先乎地君先乎臣其義一也執贄以相見敬章别也男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安壻親御授綏親之也親之也者親之也婚義父醮子丨親丨丨而命之迎男先於女也子承命以迎主人筵几於廟而拜迎于門外同上丨丨丨命之曰往迎爾相承我宗事朂勉以敬先妣之嗣君則有常子曰諾唯恐弗堪不敢忘命賔至擯者請對曰吾子命某以兹初婚使某將請承命主人對曰某固敬具以須儀禮父送女丨丨丨命之曰戒之敬之夙夜毋違命母施襟結帨曰勉之敬之夙夜毋違宫事庶母及門內施鞶申之以父母之命命之曰敬恭聽宗爾父母之言夙夜無愆視爾襟鞶承上文壻揖婦婦執鴈而入揖讓升堂再拜奠鴈壻出御婦車而壻授綏御輪三周先俟于門外婦至丨丨丨以入共牢而食合卺而酳所以合體同尊卑以親之也昏義政和新儀質明堂事者設禰位如初壻之父服其服北靣拜祝曰某子某年若干禮宜有室聘某氏某女以某日親迎敢告子將行父坐於廳南向子服其所服之服立於父位西少南東向贊者注酒于盞授子子再拜跪受贊者又設饌於位前子舉酒興即座飲食訖降再拜進位於父位前父命之曰釐爾內治往求爾匹子再拜曰敢不奉命又再拜降出初昏掌事者設酒饌於室中置二盞於盤壻服其服至女氏家贊者引就吹掌事者設禰位主人受禮如請期儀女盛服立房中女父升階立房外之東西向贊者注酒于盞授女女再拜受盞贊者又設饌於位前女即座飲食訖降再拜父降立東階下賔出次主人近於門揖賔入賔報揖從入主人升東階賔升西階進當房前北靣掌事者陳鴈於階賔曰某受父命以兹嘉禮躬聽成命主人曰某固願從命賔再拜降出主人不降送初女出父戒曰往之汝家無忘肅恭母戒曰夙夜以思無有違命諸母申之曰無違父母之訓女出壻先還俟于門外婦至贊者引就北位立壻南靣揖以入至于室掌事者設對位於室中婦壻皆即座贊者注酒于盞授壻及婦壻婦受盞飲訖乃設饌再飲三飲如上儀壻婦皆興再拜贊者徹酒饌重修昏儀文公家禮前期一日女氏使人張陳其壻之室世俗謂之鋪房然帳幔帷幕應用之物其衣服鎖之篋笥不必陳也厥明壻家設位于室設倚卓子兩位東西相向蔬果盤盞七箸如賔客之禮酒壺在東位之後又以卓子置合卺一於其南又南北設二盥盆勺於室東隅又設酒壺盞注於室外或别室以飲從女家設次于外卺音謹以小匏一判而兩之初婚壻盛服主人告于祠堂如納采儀祝版同前但云某之子某若某親之子某將以今日親迎於某官某郡某氏不勝感愴謹以後同若宗子自婚則自告遂醮其子而命之迎先以卓子設酒注盞盤于堂上主人盛服坐于堂之東序西向設壻席於其西北南向壻升自西階立於席西南向贊者取盞斟酒執之詣壻席前壻再拜升席南向受盞跪祭酒興就席末跪啐酒興降西授贊者盞又再拜進詣父坐前東向跪父命之云云辭與儀禮壻曰諾俯俯興出非宗子之子則宗子告于祠堂而其文醮於私室如儀但改宗事為家事若宗子已孤而自婚不用此禮壻出乘馬以二燭前導至女家下馬於大門外入俟于次女家主人告于祠堂如納采儀祝版前同但云某之第幾女若某親某之第幾女將以今日歸于某官某郡某人不勝感愴謹以後同遂醮其女而命之女盛飾姆相之立于室外南向父坐東序西向母坐西序東向設女席於母之東北南向贊者醮以酒如壻禮姆導女出於母左父起命之曰敬之戒之夙夜無違於舅姑之命母送至西階上為之整冠斂帔命之曰勉之敬之夙夜無違爾閨門之禮諸母姑嫂姊送至中門之內為之整裙衫申以父母之命曰謹聽爾父母之言夙夜毋愆非宗子之女則宗子告于祠堂而其父醮於私室如儀主人迎壻于門外揖遜以入壻入鴈以從至于廳事主人升自阼階立西向壻升自西階北向跪置鴈於地主人侍者受之壻俯伏興再拜主人不答拜若族人之女則其父從主人出迎立于其右尊少進畢少退凡贊用生鴈左首以生色繒交絡之無則刻木為之取其順隂陽往來之義姆奉女出中門壻揖之降自西階主人不降壻遂出女從之壻舉轎簾以俟姆辭曰未教不足與為禮也女乃登車壻乘馬先婦車亦以二燭前導壻至家立于廳事俟婦下車揖之導以入婦從者布壻席於東方壻從者布婦席於西方壻盥於南婦從者沃之進帨壻揖婦就席婦拜壻答拜壻揖婦就坐壻東婦西從者斟酒設饌壻婦祭酒舉殽又斟酒壻揖婦舉飲不祭無殽又取卺分置壻婦之前斟酒壻揖婦舉飲不祭無殽壻出就他室姆與婦留室中徹饌置室外設席壻從者餕婦之餘婦從者餕壻之餘壻脫服婦從者受之婦脫服壻從者受之家禮納婦附借吉事類見舅姑夙興婦沐浴纚笄宵衣以侯見質明贊見婦於舅姑婦執筓棗栗腶修以見贊醴婦婦祭脯醢祭醴成婦順也舅姑入室婦以特豚饋明婦順也厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也儀禮見禰廟三月而廟見稱來婦也擇日而祭於禰成婦之義也儀禮乃奠菜若舅姑既沒婦入三月丨丨丨以篚祭用槿祝曰某氏來婦敢奠菜于皇舅姑婦拜投地扱地猶男子稽首也同上不舉樂嫁女之家三夜不息燭思相離也取婦之家三月丨丨丨思嗣親也又婚禮不用樂幽隂之義也禮書九子蒲婚禮有丨丨丨朱葦雙石蒲葦取其心可屈伸雙義在兩固酉陽雜爼百子帳唐人婚禮多用丨丨丨特貴其名與婚為宜而其制度則非有子孫衆多之義蓋其制本戎虜特穹廬佛廬之具禮之微者也捲栁為圈以相連鎖可張可闔為其圈之多也故以百子總之亦非真有百圈也朱語録用布幔北方婚禮丨青丨丨為屋謂之青廬於此交拜行禮酉陽雜爼坐馬鞍劉嶽書儀婚禮有女丨壻之丨丨大為可笑今之士族當婚之夕以兩倚相背置一馬鞍反令壻坐其上飲以三爵女家遣人三請而後下乃成婚禮謂之上髙坐乖謬如此士大夫不知禮法而與閭閻鄙俚同其習見歸田録國初婚姻坐女於馬鞍之側此狄人尚乘鞍馬之義也蘇氏演義今娶婦家新人入門跨馬鞍此其始也酉陽雜爼會客遣嫁宋璟作相王毛仲嫁女奏玄宗曰臣萬事已備但未得客上曰知汝所不能致者宋璟也明日謂宰臣曰毛仲有婚事卿等宜悉詣第既而日中璟方至執酒謝恩飲不盡巵遽稱腹痛而歸約民破酒韋宙為永州刺史初里民婚出財會賔客號破酒晝夜集多至數百人貧者猶十數力不足則不迎至淫奔者宙條約使略如禮俗遂改孔帖政和新儀質明婦服其服以俟見掌事者設神位如常儀贊者引主人位於東階下引主婦位於西階下諸親及壻婦各次序分立於後立定贊者引婦進詣庭中北面再拜訖復位主人升階請神位前上香祭酒祝曰某氏來歸敢率以見祝訖降自西階復位主人以下皆再拜訖退婦見舅姑贊者設舅姑位於堂上東西相向舅位東姑位西俟舅姑俱即座贊者引婦奉棗栗立於庭再拜訖升階置於舅位前贊者受之婦降階又再拜次又奉腵修婦從者奉於階下婦再拜訖升階置於姑位前贊者受之婦降階又再拜醴婦如别儀贊禮者設醴婦位於姑位之北少西東向婦升階立於位西贊者注酒于盞授婦婦再拜授盞訖贊者設饌於位前婦即座飲食訖降階再拜而退壻饗婦送者掌事者設衆賔位賔至主人揖以入主人升東階賔升西階進詣兩楹間對拜暨送者俱即座具酒饌如常儀會訖賔主興掌事者以幣授主人主人授賔賔降階從者受幣賔退主人送于門外重修昏儀文公婚禮婦夙興盛服俟見舅姑坐于堂上東西相向各置卓子於前家人男女少於舅姑者立於兩序如冠禮之敘婦進立於阼階下北靣拜舅升奠贄幣于卓上舅撫之侍者以入婦降又拜畢詣西階下北靣拜姑升奠贄幣姑舉以授侍者婦降又拜若非宗子之子而與宗子同居則先行此禮於舅姑之私室與宗子不同居則如上儀舅姑禮之如父母醮女之儀婦既受禮降自西階同居有尊於舅姑者則舅姑以婦見於其室如見舅姑之禮還拜諸尊長于兩序如冠禮無贄小郎小姑皆相拜非宗子子而與宗子同居則既受禮詣其堂上拜之如舅姑禮而還見於兩序其宗子及尊長不同居則廟見而後往若冡婦則饋于舅姑是日食時婦家具盛饌酒壺婦從者設蔬果卓子于堂上舅姑之前設盥盆於阼階東南帨架在東舅姑就坐婦盥升自西階洗盞斟酒置舅卓子上降俟舅飲畢又拜遂獻如進酒姑受飲畢婦降拜遂執饌升薦於舅姑之前侍立姑後以俟卒食徹飯侍者徹餘饌分置别室婦就餕姑之餘從者餕舅之餘壻從者又餕婦之餘非宗子之子則於私室如儀舅姑饗之如醴婦之儀禮畢舅姑降自西階婦降自阼階三日主人以婦見于祠堂古者三月而廟見今以其太逺改用三日如子冠而見之儀但改告辭曰子某之婦某氏敢見餘並同前明日壻往見婦之父母婦父迎送揖讓如客禮拜即跪而扶之入見婦母婦母闔門左扉立于門內壻拜于門外皆有幣婦父非宗子即先見宗子夫婦不用幣如上儀然後見婦之父母次見婦黨諸親不用幣婦女相見如上儀婦家禮壻如常儀親迎之夕不當見婦母及諸親及設酒饌以婦未見舅姑故也家禮借吉用吉不可五代劉嶽唐明宗時太常卿常見鄭餘慶所為書儀有起復𡨕婚之制歎曰儒者所以隆孝悌而厚風俗且無金革之事起復可乎婚吉禮也用於死者可乎乃詔嶽增損其書冒凶非便張孝忠子茂宗尚義章公主母亡遺言丐成禮帝念孝忠功即日召為左衛將軍許主下降蔣乂上疏以為墨縗禮本緣金革未有奪喪尚主者禮違人情不可為法帝令中使者諭茂宗母之請乂意殊堅帝曰卿所言古禮也今俗借吉而婚不為少對曰俚室窮人子旁無至親乃有借吉以嫁不聞男丨丨而娶公主春秋少待年不為晚請茂宗如禮便帝三更思之會太常博士韋彤諫曰婚禮主人几筵聽命稱事立文謂之嘉所以承宗廟繼後嗣也喪禮創巨者日久痛甚者愈遲二十五月而畢謂之凶所以送死報終示有節也故夫義婦聽父慈子孝昔魯侯改服晉襄墨縗緣金革事則有權變安有釋縗服衣冕裳去堊室行親迎以凶續嘉為朝廷爽法疏入帝忤其言促行前詔然心嘉又有守孔帖詩集公主下嫁唐雲安丨丨丨丨詔陸暢作催粧五言曰雲安公主貴出嫁五侯家天母親調粉日兄憐賜花催鋪百子帳待障七香車借問粧成未東方欲曉霞內人以其吳音捷才以詩嘲之云十二層樓倚翠空鳯鸞相對立梧桐雙成走報監門衛莫使吳歈入漢宮或曰宋若葌姊妹作陸酬曰粉面仙郎選正朝偶逢秦女學吹簫須教翡翠聞王母不奈烏鳶噪鵲橋六宫大咍兄弟同婚棠棣開雙蕚夭桃照兩花分庭同佩響隔扇偶粧華迎風俱似雪映綺共如霞今宵二神女併在一仙家鄭軌古今合璧事類備要前集卷六十一
