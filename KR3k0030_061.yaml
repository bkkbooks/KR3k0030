body:
  text: 古今合璧事類備要前集卷六十一宋謝維新撰婚禮門媒妁附自媒事類良媒匪我愆期子無丨丨詩旡良媒以接歡兮托微波以通辭洛神賦賢媒離騷注蹇修古丨丨楚辭拙媒理弱而媒拙兮恐導言而不固同上鴆媒望瑶臺之偃蹇見有娥之佚女吾令丨為丨兮丨告豫以不好注鴆惡鳥喻使讒人為丨故云不好同上掌判媒氏丨萬民之丨凡男女自成名以上皆書年月日名焉令男三十而娶女二十而嫁注判半也得耦為合主合其半成夫婦也禮知名男女非有行媒不相丨丨曲禮線針丨因丨而入不因針而急女因媒而成不因媒而親準南子薪斧折丨如之何匪丨不克娶妻如之何匪媒不得詩又伐柯如何匪丨不克娶妻如何匪媒不得執柯伐柯其則不逺麯麩地官媒氏注媒謀也謀合異類使和成者今齊人名丨丨曰媒是也周禮薑桂丨丨因地而生男女因媒而成賈誼新書舟子招招丨丨人涉卬不注招招號召之貌舟子舟人主濟渡者舟人之子號召當渡者猶媒人之會男女使為匹配也詩冰人晉索紞字叔徹世為通儒明術數令狐䇿夢立冰上與冰下人語問紞曰冰上為陽冰下為隂隂陽事也士如歸妻逮冰未泮婚姻事也君在冰上與冰下人語媒介事也䇿曰老夫耄矣不為媒也會太守田豹因䇿為子求鄉人張公徵女仲春而成婚晉史青鳥䘖書漢武帝時西王母來先有丨丨一雙丨丨報帝蹇修為理吾令豐隆乘雲兮求宓妃之所生解佩縗以結言兮吾令丨丨以丨丨注豐隆雲師也宓妃洛水神縗音相佩帶也蹇修伏羲之臣言既見宓妃解佩帶取玉結言契令蹇修為媒離騷自媒太真自壻溫嶠字丨丨從姑劉氏有一女屬公覔壻公有丨丨意答云佳壻難得但如嶠比如何姑云何敢希汝比耶後數日公報云已覔得壻門地粗可身名官盡不減嶠云云詳見昏帖姑女類孔明得婦見後擇婦東鄰騏驥馮素弗慷慨有大志姿貌魁偉雄傑不群任俠放蕩不修小節故時人未之奇惟交結時豪為務不以産業經懷弱冠自詣慕容熙尚書左丞韓業請昏業怒而距之復求尚書郎髙劭女劭亦弗許南宫令成藻豪傑有高名素弗造焉藻命門者勿納素弗徑入與藻對坐旁若無人談飲連日藻始奇之曰吾逺求騏驥不知近在東鄰何識子之晚也詩集啓齒雲郊顧我笑粲然丨玉丨蹇修時不行要之將誰使郭景純題葉見夤緣類夤緣事類朱繩繫足韋固少未娶旅次宋城遇異人倚囊坐向月檢書曰此幽𡨕之書固曰然則君何主曰天下之婚爾因問囊中赤繩子云以繫夫妻之足雖仇家異域此繩一繫終不可易君妻乃此店北賣萊陳嫗女爾固逐之入菜市見嫗抱二歲女亦陋老人指示固怒磨小刀付奴曰殺彼女當賜汝萬錢奴翼日刺於稠人中才傷眉間爾後十四年以父蔭參相州軍事刺史王泰妻以女年十六七容貌端麗眉間常貼花鈿未嘗暫去逼問之曰妾郡守之猶子也父卒于宋城恁時方襁褓乳母鬻蔬以給朝夕嘗抱于市為賊所刺痕尚在因盡言宋城宰聞之名其店曰定婚店續幽怪録玉田種璧楊公字雍伯嘗設義漿給行旅一日有一人飲訖懷中取石子一升與之曰種此生美玉并得好婦如言種之有徐氏女極美求之徐公曰得白璧一雙即可乃於所種玉田果得五雙以聘徐氏大驚遂以女妻之搜神記夢得夫姓曽崇範之妻許聘數人其夫輒死一夕夢人謂曰田頭有鹿迹田尾有日炙乃汝夫也後嫁崇範方悟野史夢婦始生崔元綜娶婦吉日已定匆寐見人云此家女非君婦君婦今日始生定命録詩集紅葉題詩唐僖宗時于祐於御溝拾一丨丨丨丨云流水何太急深宫盡日間殷勤謝紅葉好去到人間祐題一葉云曽聞葉上題紅怨葉上題詩寄阿誰溝逆流為宫女韓夫人拾之後祐託韓泳門館因帝放宫中三千人泳以韓夫人有同姓之親作伐嫁祐及成禮各於笥中取紅葉相示乃曰事豈偶然莫非前定也一日泳開宴館於韓曰子二人今日可謝媒人也韓氏笑答曰一聨佳句隨流水十載幽思滿素懷今日却成鵉鳯友方知紅葉是良媒泳笑曰吾今知天下事無偶然得者也桐葉題詩蜀尚書侯繼圖本儒士一日秋風四起樓上倚欄有大桐葉飄墜上有詩云拭翠斂雙蛾為欎心中事桐葉下庭除書成相思字侯貯小貼凡五六年方卜任氏為婚嘗諷此事任氏曰此是妾書時詩爭得在君侯以今書校之葉上無異玉溪詩話藍橋搗藥裴航遇仙女樊夫人以詩答航曰一飲瓊漿百感生玄霜搗盡見雲英藍橋自是神仙窟何必區區上玉京航後經藍橋渴過一舍有老嫗接之求漿嫗呼雲英擎一甌漿飲之即美女也航欲娶雲英嫗曰但得玉杵臼當與之航至京師獲玉杵臼及為搗藥乃得娶焉傳奇擇婦附不擇事類窈窕丨丨淑女君子好逑關雎貞好女不必貴種要之丨丨孔叢子下體采葑采菲無以丨丨谷風為養娶妻非丨丨也而有時乎為養注娶妻本為繼嗣而有親執釡竈不擇妻而取者孟子簡斥數婦梁鴻字伯鸞家貧不娶同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女求作布衣麻屨織篋作緝績之具及嫁始以裝飾入門七日而鴻不答妻乃跪牀下請曰竊聞夫子髙義丨丨丨丨妾亦偃蹇數夫矣今而見釋敢不請罪鴻曰吾欲裘褐之人可與共隱深山者爾乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀子之志耳妾自有隱居之服乃更為椎髻著布衣操作而前鴻大喜曰此真梁鴻妻也名之曰德曜字孟光乃共入灞陵山中以耕織為業至吳依大家臯伯通居廡下為人賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉伯通察而異之舍之於家擇取醜婦蜀黃承彥髙爽開列為沔南名士謂諸葛孔明曰聞君擇婦家有醜女黃頭黑色才堪相配孔明許即載送之時人以為笑鄉諺曰莫作孔明擇婦正得阿彥醜女娶隂麗華光武聞隂皇后美心恱之因歎曰仕宦當作執金吾丨妻當得丨丨丨後納后於宛時年十九求郝普女王汝南少無婚自丨丨丨仲將之丨普門至孤陋甚非其耦君見其女便求聘焉司空王昶以其癡會無婚處任其意便許之既婚果有令姿淑德髙爽英邁生東海母儀冠族或問何以知之曰嘗見井上取水舉動容止不失常未嘗忤視以此知之世説娶巫家女黃霸少為陽夏遊徼與善相人共載出見一婦人相者言此婦當富貴不然相書不可用也霸推問之乃其鄉里丨丨丨也霸即丨為妻納王氏女王克正仕江南歸本朝直舍人院及死無子唯一女十餘嵗陳摶入吊出語人曰王氏女吾雖不見其靣觀其捧爐奉佛手相甚貴後數年陳晉公恕為參知政事一日便坐太宗問曰卿娶誰氏有幾子晉公對曰臣無妻有二子太宗曰王克正江南舊族身後唯一女朕甚念之卿可作配晉公不敢辭遂納為室不數日封國夫人如陳之相也不擇不在貴族虞翻與弟書曰長子容當為求婦其父如此誰肯嫁之逺求小姓足使生子天其福人丨丨丨丨楊雄之才非出孔氏虞世家法反生癡子不擇髙門賈詡嫁娶丨丨丨丨擇壻附女自擇事類求先聖裔叔梁紇丨婚於顔氏顔氏有三女其卜曰徴在顔父問三女曰陬大夫雖父祖為士然其丨丨王之丨今其人長十尺武力絶倫吾甚貪之雖年長性嚴不足為疑三子孰能為之二女莫對徴在進曰從父所制將何問焉父曰即爾能矣遂以妻之徴在既廟見以夫之年大懼不時有男而私禱尼丘之山以祈焉生孔子故名丘字仲尼家語為賢侯妻韋詵女許妻裴寬幃族人觀之寬碧瘠而長族人笑呼碧鸛雀詵曰愛女必以丨丨公丨丨也何可以貌求人卒妻之詳見前婚姻類不與凡子見前求婚類文書銜袖不為庸婦假儀女元妃嘗語妹貴妃曰我終不為庸人妻季妃曰我亦丨丨丨人丨儀曰吾女輩志行不凡且踟蹰擇良配垂稱燕王納元妃為繼室范陽王德亦聘季妃俱為垂德皇后嘆有佳壻獨孤郁最為權德輿所稱以女妻之德輿輔政以嫌去內職憲宗丨曰德輿乃丨丨丨喜得美壻杜廣初為劉景廄卒景因問廣中曲有條章景曰為女求夫三年不覺廄中有麒麟於是妻之又詳見前婚姻類遍觀東床郤鑒使門生求女壻於王導導令就東床遍觀子弟門生歸謂鑒曰王氏諸少並佳然聞信至咸自矜持惟一人在東床坦腹獨若不聞鑒曰此正佳壻及訪之乃羲之也遂以女妻之莫近禁臠晉元帝為晉陵公主求壻請王珣曰子壻但似劉真長王子敬便足如王處仲桓元子誠可才小冨貴便與人家事珣對曰謝琨雖不及真長子敬帝曰如此便足未幾帝崩袁嵩欲以女妻謝琨珣曰卿丨丨丨丨初元帝鎮建業公私窘罄每得一豚以為珍美頂上一臠尤美輒以薦帝群下未敢食于時呼禁臠故珣因以為戲琨尚主襲父爵畫屛射雀唐髙祖竇皇后父毅嘗謂妻曰此女有奇相何可妄與人因畫二孔雀於屛間請婚者射二矢隂約中目則得之射者閲數十皆不合髙祖最後射各中一目遂歸之隔幔牽絲郭元振少美宰相張嘉貞欲納為壻元振曰知公有五女未知孰醜張曰吾女各有姿色即不知誰是匹偶使五女各持一線幔前使子取便牽之元振欣然從命遂牽一紅絲線得第三女無如季相漢單父人吕公見髙祖狀貌因敬重之曰臣少好相人丨丨丨丨願季自愛臣有息女願為箕帚妾彼有竒表後漢陶謙年十四猶綴帛為幡乘竹馬而戲故蒼梧太守同縣甘公見謙容貌異之許妻以女其夫人怒曰陶家兒遨戲無度如何以女許之甘公曰丨丨丨丨長必大成遂與之無如楊生楊於陵釋褐為句容主簿時韓滉性剛嚴少所接與及於陵以屬吏謁謝滉甚竒之謂其妻桞氏曰夫人常擇佳壻吾閲人多矣後貴且夀丨丨丨丨者競以女妻之後遷户部尚書惟有姚某陳州刺史王當有女集州縣文武官令袁天綱擇壻天綱曰惟果毅姚某有貴子可嫁之終必得力當從其言時人笑之乃元崇也定命録平豈長貧見前貧婚類呂寧久賤呂範少為縣吏有姿容邑人劉氏家富女美範求之母嫌欲勿與劉氏曰觀丨子衡丨丨貧丨耶遂與之吳志以老成重明道先生程皓十嵗能為詩賦十二三群居庠序中如老成人故户部侍郎彭思永至學舍一見異之許妻以女以修謹取晏元獻判南京范希文以大理寺丞丁母憂權掌西監一日晏謂范曰吾一女及笄君為我擇壻范曰監中有二舉子冨臯張為善皆可壻也晏曰然則孰優范曰冨修謹張踈俊晏即取冨臯為壻後改名弼即鄭公也為善後亦更名方平筆録必求佳壻杜祁公衍既貴有女其夫人鍾愛丨丨丨丨衍以文章器業為天下第一無如蘇舜欽乃以女妻之特取名士孫明復先生退居泰山之陽枯稿憔悴鬚鬢皓白家貧不娶故相文定公李迪就見之歎曰先生年五十一室獨居誰事左右不幸風雨飲食生疾奈何吾弟之女甚賢可以奉先生箕帚先生固辭文定曰吾女不妻先生不過一官人妻先生德髙天下幸壻李氏榮貴莫大於此石介與其羣弟子進曰公卿不下士久矣今丞相不以先生貧賤而欲託以子是髙先生行義也先生於是曰宰相女不以妻公侯貴族而固以嫁山谷衰老藜藿不充之人相國之賢古無有也豫不可不成相國之賢名遂妻之其女亦甘淡薄事先生盡禮當時士夫莫不賢之先生用冨弼薦除國子監直講澠水燕談女自擇徐妹自擇鄭徐吾犯之妹美公孫楚聘之公孫黑又使強委禽焉犯請於二子使女自擇焉子晳盛服而入布幣而出子南戎服入左右射超乘而出女自房觀之曰子晳信美矣子南夫也遂適子南公孫楚也婁氏請嫁北齊武明皇后婁氏少明悟強族多聘之並不肯行及見神武於城上執役驚曰此其吾夫也父母不得已而許焉欲得伯鸞見前擇婦孟光事願如葛勃鄢陽陳忠女名豐鄰人葛勃有美姿豐與村中數女