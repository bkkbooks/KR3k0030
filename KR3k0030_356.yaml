body:
  text: 古今合璧事類備要外集卷五十六宋謝維新撰矢門弓附弧鞬櫜柲韜弩韔弦器物總論弓之為言穹也張之穹穹然也其末曰簫又謂之弭以骨為之弭弭然滑也中央曰弣弣撫也人所撫持也簫弣之間曰淵淵宛也言曲宛然也其端弦所居處曰彄弓之用材也六曰幹曰角曰筋曰膠曰絲曰漆幹之本強所及必逺角之勢順所發必疾筋之力鋭所中必深合之以膠則和纒之以絲則固環之以漆則雖受霜露而不為之損六材既美而又天時工巧之不相違此弓之所以為良也弧木弓櫜弓衣亦曰韜一名韔鞬又馬上盛弓矢器柲又弓檠弩有臂弓也事類取幹凡丨丨之道以柘為上檍次之檿桑次之橘次之木瓜次之荆次之竹為下禮取材弓人為弓丨六丨必以其時幹也角也筋也膠也絲也漆也同上烏號黃帝鼎成有龍垂髯下迎黃帝上騎墮弓百姓乃抱其弓而號因名曰丨丨繁弱封父之丨丨注封父古諸侯丨丨大弓名又封父國名左定四年揮作弓黃帝之臣丨丨丨古史考羿作弓倕作弓成王錫彤弓錫有功諸侯也詩平王錫丨丨丨晉文侯彤弓一彤矢百盧弓矢千書文侯之命交韔二弓秦襄公虎韔鏤膺丨丨丨丨詩小戎二矛重弓魯僖公丨丨丨丨詩閟宫齊人為弓丨景公使丨丨丨弓人之妻曰此弓者泰山南烏號之柘燕牛之角荆麛之弭河魚之膠四物者天下之精材也楚人亡弓丨丨出遊丨烏嘷之丨左右請求之王曰止丨丨丨丨楚人得之又何求孔子聞之曰惜乎其不大也不曰人遺之人得之何必楚也家語顔高奪弓公侵齊門於陽州士皆坐列曰顔高之弓六鈞皆取而傳觀之揚州人出丨丨丨人弱丨籍丘子鉏擊之與一人俱斃偃且射子鉏中頰殪左定八年陽虎盜弓公斂處父帥成人自上東門入與陽氏戰於南門之內弗勝又戰於棘下陽氏敗陽虎説甲如公宫取寶玉大弓以出左定八年何為不執鄭人使子濯孺子侵衛衛使庾公之斯追之子濯孺子曰我疾作不可以執弓吾死矣夫云云庾公之斯至曰夫子丨丨丨丨弓曰今日我疾作不可以執弓孟以招不進齊侯田於沛招虞人以弓不進公使執之辭曰昔我先君之田也旃以招大夫弓丨丨士皮冠以招虞人臣不見皮冠故丨敢丨乃舍之左昭二十年執弓延射孔子射於矍相之圃使子路丨丨矢出丨丨彀弓持滿周亞夫屯細柳丨丨弩丨丨前本傳弓挂扶桑襄王謂宋玉曰汝能大言乎玉曰彎丨丨丨丨荆楚故事弓射戟支袁術選將紀零等攻劉備吕布謂零曰玄德布弟也為諸君所圍故來救之布性不喜合鬭但喜解鬭耳乃令軍候植戟於營門布彎丨而顧曰請君觀布丨丨小丨中者各解兵不中可留決鬭布即一發正中戟支零等皆言將軍天威也罷去布傳得弓十數唐太宗謂蕭瑀曰朕少好弓矢丨丨丨丨自謂無以加近以示弓工乃曰非良材朕問其故工曰木心不正則脈理皆邪弓雖徑而發矢不直朕始悟向者辨之未精也通鑑本紀挽弓兩石張𢎞靖曰天下無事爾輩挽兩石弓不如識一丁字五代藏弓武庫見後矢門詳作神臂弓見下文注造克敵弓紹興初韓世忠丨丨丨丨斗力強徑可以退虜騎製強徑弓吳璘丨丨丨丨強弩號駐隊矢足以敗金膚或為神臂弓禇從龍唐武庫大弓銘嘗讀唐杜工部詩有進賢冠大羽箭之句均是箭也而獨以大羽箭為神夫豈其習聞秦王射突厥之大羽箭乎蓋唐武庫嘗藏天䇿大弓長矢而世寶之每郊丘重禮陳於儀物之首詩人得以流傳詠歌之方王之逐黑闥而窘於突厥也嘗以此射却之然王豈徒以弓矢長大威虜哉觀其心正脈邪之辨殆有得於攻心之法故能制弧矢而倍於常而射之神且速史臣書其事於黑闥傳謂突厥得箭傳以為神箭豈神哉射之神也抑不知王之所挾大弓長矢幾何而僅餘弓一矢王亦甚危且急矣藏之寶之表其武功而不得與書太常者並傳可乎遂追述而銘之曰察弓以其良非以其大大而非良危地其殆惟王知弓木脈理弓正心安可托生死天䇿所制倍常而強弦不虛鳴其矢亦良既平建德仍逐黑闥薄人於險豈料突厥寇逸虜噬血人於牙大弓斯張長矢以加突如豨奔潰如犬斃比漢尤神膽裂創沸鐵山具碎愷還載櫜森森攔錡蜿蜒龍韜藏諸寶之儀冠鹵簿武功流芳百王千古將軍三箭而定天山猛將可歌大羽腰間惟王大弓一可敵萬誰其並雄劈張伏逺曷如天兵大弓素精授不能張偏方震驚三邉猶警詔授种法可無大弓習民莫發道德安強威於矢弧匪直銘唐抑贊廟謨洪遵韓世忠克敵弓銘臣恭惟姿皇帝陛下天英武光啓中興器械之利洗萬古而空之乃克紹興改元之十一年夏五月樞密使韓世忠獻所造敵弓於朝皇帝稱善詔密院下其制於起部命軍器監擇工部之良者建造以聞既成分賜六軍制度之精誠足以壯軍容而怖敵人示子孫武功之盛然未有銘詩祓飾厥美臣生無益縣官幸以文墨簉迹朝紳暗而無言使嘉量盤盂楹席巾几之辭獨光簡册兹非臣之罪歟敢昧死載拜而獻銘曰員穹宣精森列纒度天弧煌煌九星炳著在昔聖人仰憲皇乾弦木爰作以威幅員炎德復暉肇開英主光啔中興戎器具備於時樞臣弓陳克敵其制維何神臂遺則皇帝曰俞頒諸共工六材既聚俾鳩僝功折幹液角治筋沈絲漆良膠和合九成規期門控弦虎賁攢簇決拾既佽射必中鵠巧穿七札力倍六鈞繁弱武庫有掩前聞時方未精庸窒不軌既安既衆以壯國體淵淵鼓鉦悠悠斾旌弓矢啓行卒乘精明屬車彭彭和鑾鏘鏘弓在天仗萬民斯望周備器械見歌聲詩漢精技巧見稱史辭侯今之制跨周軼漢下臣作銘揭示億萬弧張弧先丨之丨説弧後丨之丨並易暌卦桑弧男子生而丨丨蓬矢六以射天地四方記內則木弧昔者黃帝堯舜氏作弦丨為丨剡丨為矢丨矢之利以威天下蓋取諸暌易係桃弧楚定王語右尹革曰昔我先王僻居荆山惟是丨丨棘矢以供禦王事左角弧紀昌以燕丨之丨列子詳見虱門制倍於常初秦王建天策府其弧矢丨丨丨丨舊唐史櫜載櫜丨丨弓矢言櫜彤弓弨兮受丨丨之並詩右屬晉公子重耳奔楚楚子饗之曰公子若反晉國則何以報不穀對曰云云若以君之靈得反晉國晉楚治兵遇於中原其辟君三舍若不獲命其左執鞭弭丨丨櫜鞬以與君周旋注弭弓末無緣者櫜以受箭鞬以受弓左僖二十三年請垂楚公子圍聘於鄭伍舉為介知其有備也丨丨櫜而入注垂櫜示無弓左昭元年韜解韜丨其天丨注韜弓衣莊伏韜吕錡中項丨丨左成十六韔交韔虎韔鏤膺丨丨二弓注虎虎皮也韔弓室也丨丨交二弓於韔中詩小戎抑鬯抑釋掤忌丨丨弓忌注掤所以發矢鬯弓㢰箋射者蓋矢韜矢言田事畢疏鬯者盛弓之器鬯弓謂韜弓而納之鬯中大叔于田鞬受弓鞬以受弓詳見櫜注藏弓黃卓膂力過人雙帶兩鞬左鞬右馳射注藏箭謂服丨丨謂柲弓檠丨丨曰柲弛則縳於弓裏備頓傷也以竹為之周禮鄭注弩弩法夏官司弓掌六弓四丨八矢之法辨其名物掌其守藏與其出入中春獻丨丨中秋獻矢箙周禮弩地平陵相逺山谷居間仰高臨下此弓丨之丨也短兵百不當一徑弩丨丨長戟射疏及逺則胸奴之弓弗能格也遊弩丨丨往來什伍俱前則胸奴之兵弗能當也並朝錯言兵事作弩黃帝丨丨古史考禁弩公孫𢎞奏丨民不得挾弓丨刑措之道也上下其議夀王對曰盜賊猶有郡國二千石之罪非挾弓弩之過也前吳丘夀王傳萬弩發魏龎涓伐韓韓請救於齊齊威王因起兵使田忌等將之孫臏為帥孫子度其行暮至馬陵伏兵斫大樹白而書之曰龎涓死此樹下於是令善射者丨丨夾道而伏期曰暮見火舉而俱發龎涓果夜至斫木下見白書以火燭之讀觀畢丨丨俱丨魏師大亂通鑑千弩發李陵至浚稽山與胸奴相值騎可三萬圍陵軍軍居兩山間以大車為營陵引士出營外為陳前行持戟盾後行持弓弩令曰聞鼓聲而縱聞金聲而止虜見漢軍少直前就營陵搏戰攻之丨丨俱丨應弦而倒虜還走前李陵傳以弩交射孫權討黃祖祖以兩蒙衝挾守沔口以栟閭大紲繫石為矴上有千人丨丨丨丨飛矢雨下董襲與凌統將敢死士百人人被兩鎧進斬之董襲傳置弩萬張曹公大出濡須孫權以吕蒙為督據前所立塢丨強丨丨丨於其上以拒曹公曹公前鋒屯未就蒙攻破之吕蒙傳以弩射象隋劉方經略林邑王梵志遣兵守險乘巨象四面而至方丨丨丨丨象中瘡却蹂其陳因攻破之本傳弦鉤鉉決拾既佽弓矢既調注決鉤弦拾遂也詩車攻遂弦決著於右手大指所以鉤弦開體遂著於左臂所以丨丨手指相比次而後射得和利上文孔穎達疏弦木丨丨為弧易係弦膠見鸞門應弦見前注控弦沈慶之曰佛狸威震天下丨丨百萬南王立謨傳拓弦曹景宗謂所親曰我昔在鄉里騎快馬如龍與年少輩數十騎丨弓丨作礕礰聲箭如餓鴟呌平澤逐麞數肋射之南本傳銀鏑在丨丨丨弦六帖詩集龍淵左手彎繁弱右手揮丨丨注皆弓名選麟膠霜重丨丨徑風高月影圓楊師道玉帳分丨丨丨弓射虜營胡馬挾丨丨丨雕弓兩斛力三尺角弓丨丨丨並杜鞬氊帶佩丨丨丨雙鞬注鞬盛弓鮑明逺擬古弦鳴不虛丨弦丨丨發應不礙異獸如飛星宿落丨弦丨丨蒼山高並杜開緑絃彎弓丨丨丨滿月不憚堅李白逐鳴弦鴈落丨丨丨楊師道破左的控弦丨丨丨選矢附括箙羽矰鏃繳掤彈器物雜説矢箭也箭竹為之箭竹高一丈節間三尺可為矢故亦名焉矢之為言直也矯而使之直也然必括而羽之括謂受弦處鏃而礪之鏃謂箭末刃則其入也必深矣掤所以發矢者箙所以藏矢者矰又弋射矢繳其生絲縷所以綴矰而收之彈丸也以打飛禽事類金矢得丨丨易蓬矢見前弧門注詳束矢角弓其觩丨丨其搜泮水挾矢既張我弓既丨我丨詩吉日為矢矢人丨丨鍭矢三分茀矢三分一在前二在後兵矢田矢五分二在前三在後殺矢七分三在前四在後參分其長而殺其一五分其長而羽其一以其笴厚為之羽深水之以辨其隂陽夾其隂陽以設其比夾其比以設其羽參分其羽以設其刃則雖有疾風亦弗之能憚矣刃長寸圍寸鍵十之重三垸前弱則俯後弱則翔中弱則紆中強則揚羽豐則遲羽殺則躁是故夾而搖之以視其豐殺之節也撓之以視其鴻殺之稱也凡相笴欲生而摶同摶欲重同重節欲疏同疏欲臭周禮砮矢鏃礪砥丨丹注丨石中丨丨楛矢幹惟箘簵楛注丨中丨丨出雲夢之澤釋名楛木名可以為箭並禹貢黃帝剡丨丨堯舜氏作丨木為矢易係辭牟夷作黃帝之臣丨丨初丨矢世本竹矢在垂之丨丨丨東房注垂舜共工所為皆中法故亦傳寶之書顧命棘矢供見前弧門注詳蓬矢射同上楛矢貫有隼死丨丨丨之長尺有咫仲尼曰此肅慎之矢也國語射南宫莊公以金僕姑丨丨丨長萬注金僕姑矢名左莊十一年納厨子楚雄負羈囚知罃知莊子以其族反之厨武子御下軍之士多從之每射抽矢菆丨諸丨丨之房厨子怒曰非子之求而蒲之愛董澤之蒲可勝既乎知季曰不以人子吾子其可得乎吾不可以茍射故也射連尹襄老獲之遂載其尸射公子穀臣囚之以二子還左宣十三年南山竹子路曰丨丨之丨不揉自直軒而用之達於犀角子曰括而羽之鏃而礪之其入之不亦深乎家語胡篷幹紀昌學射於飛衛以燕角之弧丨丨之丨射之貫虱之心而乘不絶列湯問妢胡笴丨丨之丨注丨丨胡子之國在楚旁丨矢幹也禹貢荆州貢杶幹栝柏及箘簵楛故書笴為筍杜子春云笴讀為藁謂箭藁周禮肅慎楛丨丨國以丨木為矢以石為鏃六帖獲三矢楚子與若敖氏戰於臯滸伯棼射王汰輈及鼓跗著於丁寧又射汰輈以貫笠轂師懼退王使巡師曰吾先君文王克息丨丨丨焉伯棼竊其二盡於是矣鼓而進之遂滅若敖氏注輈車轅汰過也箭過車轅左宣四年與兩矢鄢陵之戰王召養由基丨之丨丨使射吕錡中項伏韜以一矢復命左成十六年箭過轅注見上文矢叩輪見前輪門注詳矢貫余手師及齊師戰於鞍郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而丨丨丨丨及肘余折以御左輪朱殷豈敢言病吾子忍之左成二年矢集於目子駟請息肩於晉公曰楚君以鄭故親集丨於其目非異人任寡人也左襄二年流矢所中高祖擊布為丨丨丨丨行道疾甚前本紀射矢皆盡單于攻漢軍李陵居谷中虜在山上四面丨丨如雨下漢軍南行未至鞮汙山百五十萬矢丨丨即棄車去淇園之竹寇恂伐丨丨丨丨為矢百餘萬會稽之竹虞翻州舉茂材與孔融書并示以所著易注融答曰聞延陵之理樂覩吾子之治易乃知東南之美者非徒丨丨丨丨箭也本傳矢如雨下見前射矢皆盡注矢如鴟呌見前柘弦注以火箭燒王玄謨圍滑臺城城內多茅屋衆求丨丨丨丨之玄謨曰損亡軍實不聽夲傳以鐵箭射錢鏐丨丨丨丨退潮頭以大箭射初秦王建天䇿府其弧矢制倍於常逐劉黑闥為突厥所窘自丨丨丨丨却之突厥得箭傳觀以為神後餘太弓一長矢五藏之武庫世寶之每郊兵重禮必陳之於儀物之首以識武功舊唐史黑闥傳發三矢射薛仁貴破九姓突厥於天山仁貴丨丨丨丨殺三人餘皆請降軍中歌曰將軍三箭定天山壯士長歌入漢關號駐隊矢紹興元年秦鳯路經略使吳玠及金人戰於和尚原大敗之初宗弼會諸道兵數萬入寇玠及其弟璘率統制官雷仲等遣徑弓強弩與戰分畨迭射丨丨丨丨接發不絶且繁密如雨敵稍却則以竒兵邀擊斷其糧道凡三日是夜大破之俘馘首領及甲兵以萬計宗弼中流矢二僅以身免中興繫記括省于度若虞機張往丨括丨丨則釋書夾其比丨丨隂陽以設其丨丨丨丨以設其羽注比謂括也禮矢人詳見下文注括而羽子曰丨丨丨之詳見前注設其羽夾其比以丨丨丨注夾其隂陽者弓矢比在藁兩旁弩矢比在上下設羽於四角禮矢人詳見前注鏃石為以丨丨鏃砮中丨丨鏃並見前矢門注無遺鏃費秦丨亡矢丨丨之費賈誼過秦論與亡鏃同射不能中與亡矢同中不能入丨丨丨丨前朝錯傳叩輪去金庾公之斯至抽矢丨丨丨其丨發乘矢而後反注叩輪去鏃孟離婁下刮骨去毒關羽嘗為流矢所中貫其左臂後瘡雖愈每隂雨痛醫曰矢鏃有毒毒入於骨當破臂作瘡丨丨丨丨然後此患乃除耳羽便伸臂令醫鑿之時羽適請諸將飲食相對臂血流漓盈於盤器而羽割炙引酒言笑自若蜀志響箭鳴鏑所射冒頓作鳴鏑習勒其騎射令曰丨丨丨丨而不悉射者斬後從父獵以鳴鏑射殺頭曼遂自立為單于注鳴鏑髐箭也髐呼交反前胸奴傳掤釋掤抑丨丨忌注掤所以發矢詩大叔于田抉拾丨丨既佽注丨所以縱弦丨所以引弦或謂抉引弦彄拾謂韝扞詩六月箙魚服象弭丨丨注取魚獸之皮為矢之服詩六月籠箙田弋充丨丨矢共矰矢注籠竹箙矰矢不在箙者禮司弓矢春作稿人掌受財於職金以齎其工弓六物為三等弩四物亦如之矢八物皆三等箙亦如之春獻素秋獻成注矢箙丨丨秋成禮秋獻夏官司弓矢掌六弓四弩八矢之法辨其名物而掌其守藏與其出入中春獻弓弩中丨丨矢箙車充繕人掌王之用弓弩矢箙矰弋抉拾掌詔王射贊王弓矢之事凡乘丨丨其籠服載其弓弩既射則斂之無會計禮厨子房見前注矰結繳丨丨於矢謂之矰矰高也禮司弓矢注不箙矰矢丨在丨者同上鴈避丨銜蘆而飛以丨矰繳注鴈自江南還河北體肥不能高飛畏人所獲淮南訓羽為吳王赤羽之矰賈逵注赤丨丨矰國語繳射鴻鵠奕秋通國之善奕者也使奕秋誨二人奕其一人専心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之孟子射鳬鴈楚人有以弱弓微繳加鴈之上者襄王召而問之對曰三王弋道德五霸弋戰國王何不以聖人為弓勇士為繳張而丨之非特丨丨之實世家彈彈人晉靈公不君從臺上丨丨觀其避丸也左彈雀吳伐齊太子諫曰向來挾彈於後園螳蜋之捕蟬也不知黃雀在傍黃雀不知臣挾彈在後彈梟楚人惡其聲而彈射之將適吳或謂之曰若能變其聲在楚可也若不能變其聲吳人亦彈射之挾彈右丨丨戰國策見彈丨丨而求梟炙莊子珠丸以隋侯之丨丨彈千仞之雀世必笑之何也所用重而所得輕吕春秋金丸東方朔對驃騎將軍難曰以丨丨彈不如泥丸各有所用又韓嫣以丨彈丨時人語曰若飢寒逐金丸柘彈長安五陵人丨木為彈真珠為丸以彈鳥鵲西京記木彈俠客以蘇合丨為丨季龍挾石丨丨丨彈人其父怒其母曰健犢須走車破環良馬須逸鞅泛駕然後能負重致逺蓋言童稚不竒不惠非異器也劉公嘉話敬業好徐丨丨十餘嵗丨彈射雜俎折簪為樂王準為衛尉少卿以鬭雞供奉禁中過駙馬都尉王繇以彈彈其巾丨玉丨丨丨得鳥拜官王世充羅取飛鳥書符命於帛繫鳥頸縱之有彈捕丨丨而獻者亦丨丨撒槐膠彈李少微子女稍多每退朝於庭樹丨丨丨丨子數百放令諸小兒爭取之以為戲笑終日不倦戲已復收於篋放懷集用榆皮彈僧靈鑒善彈丨洞庭沙岸下土炭末瓷末丨丨泔澱紫礦細砂藤紙榻汁九味和齊手凡之隂乾雜俎一發而中鄭寅常詣靈鑒角放彈指一樹節其節自相去數十步曰中之獲五丨丨丨丨丨彈丸及射之不中至靈鑒乃陷節碎彈焉雜俎五發皆中建中初士人韋生路古今合璧事類備要外集卷五十六
