body:
  text: 古今合璧事類備要後集卷七宋謝維新撰臣道門表奏古今始末唐虞以前臣為良臣有事進言不過如都俞吁咈而已安有連篇纍牘作為章疏如後世奏表之謂哉夏商以來如伊尹有一德之書已謂之陳戒周公有無逸立政之書亦不過嗚呼以寓其警戒之辭惟自周人建六典如宰夫所掌以諸臣之復萬民之逆釋者謂逆反迎受上命復謂朝廷奏事自上而不逆謂上書也此其為奏表之漸乎自是以來秦漢之間有所謂排闥而入奏事者有所謂露章而陳封事有所謂徹去副封以防壅蔽者甚至削藁焚草之名踵迹於後世焉隋唐以詞章取士奏表之體愈工愈偉延及我朝自宰執稱賀則有所謂表侍從卿監輪對直前及臺諫月課則有所謂奏不惟內而百官公卿而有表奏之目外而郡守監司而亦有表奏之名要之帝王之世獻可替否一言而止其視後世之濫觴於長江大河而不可自已者殆有間也事類疏舉可為痛哭者一可為流涕者二可為長太息者六其它難以丨丨賈誼䇿條奏魏相丨隂陽月令丨條對漢人丨丨急變聞程奏課奏也可奏汲黯奏事時武帝在武帳不冠見黯起迎使人丨其丨議是趙充國每奏事上輒下其奏丨臣初丨充國計者什三中什五最後十八伏蒲史丹丨青丨奏事削草後樊宏所上便宜及陳得失輒手自書寫丨丨本又唐戴胄所敷奏時政得失咸有可觀奏已即削藁祕外莫知章奏陳湯字子公常受人金錢作丨丨卒以此敗副封丨丨謂副本也以所上事一本與尚書謂之副封詳見本末乘傳京房出為太山太守奏請無屬刺史得自丨丨奏事上初許之房論石顯五鹿充宗上封事曰辛巳霧氣復乘太陽侵己邜庚辰間必有隔絶臣不能丨丨奏事也露章何武字君公遷揚州刺史所舉奏二千石必先丨丨服罪者為虧除免之其不伏者極法奏之毁章後皇甫嵩字義真前後上表陳論有損益者五百餘事皆手書丨丨不宣于外也焚草陳群字長文密陳得失每上封事輒丨其丨時人及子弟莫知之又晉羊祐字叔子嘉謀讜議皆丨其丨世莫得聞又唐馬周疾甚取所上章奏悉焚之曰管晏暴君之過取身後名吾不為也竊草漢師丹字仲公議改幣册使吏書奏吏私丨其丨丁傳聞之告丹上封事行道持其書遂䇿免丹敗章吳太史慈字子義任郡曹吏與州有隙曲直未分以先聞者為喜時州章已去郡曹恐後之求可使者慈年二十二以選行晨夜取道到洛陽城詣公車門州吏始來慈謂曰章題得無誤乎取視之慈因以力截敗之州吏大呼曰丨我丨慈將至車間與語曰向君不以章相視吾亦無因得敗之是為吉凶禍福等耳吾不獨受罪若默然俱去可以存易亡慈既出城因遁還通郡章州遂受其短疊署唐李澄每上章必丨丨一封士大夫笑其野囊封韓全誨張彥𢎞及彥弼合勢恣暴中官倚以自驕帝不平有斥逐者皆不肯行崔胤固請盡誅之全誨彥𢎞見帝祈哀帝知左右漏言始詔丨丨奏事遺表李希烈拘送顔真卿蔡州真卿度必死乃作丨丨批表梁守謙為院使見錢徽丨監軍丨語簡約嘆曰一字不可益耶銜之今體李商隱能為古文不喜偶對從事令狐楚幕能章奏遂以其事授商隱自是始為丨丨章奏博學強記下筆不能自休草奏潤色之餘論思獻納軍國利害巨細必陳有丨丨七卷則知公之為臣也權德輿陸宣公翰苑序上封事漢劉向丨丨丨又王嘉日蝕上封事定奏章丞相韋玄成言朱雲暴虐雲上疏自訟陳咸為丨丨丨加譙黜唐太宗時上封者衆或不切事帝厭之欲丨丨丨魏徵曰古者立謗木欲聞已過封事其謗木之遺乎陛下思聞得失當恣其所陳言而是乎為朝廷之益非乎無損於政帝悅皆勞遣之置左右裴耀卿為濟州刺史會天子東巡帝謂張説曰裴耀卿數百言至曰人或重擾則不足以告成朕丨書丨丨以自戒此其愛人也元載多引私黨畏群臣論奏乃紿帝曰群臣奏事草遺奏鄭儋維領太原引掌書記室判官德宗喜文每省太原奏必能辨令狐楚所為文數稱之儋暴死不及古後事軍大權將為亂夜十數騎挺刃邀取楚使丨丨丨諸將圜視楚色不變秉筆輒就以遍示士皆感泣一軍乃安由是名益重無遺奏裴度薨帝怪丨丨丨敕家人索之得半藁以儲二為請無私言讀驚馬尾漢石建為郎中令奏事事下建丨之丨曰丨興丨五今乃四不足一乃獲譴也持被覆豹後馮豹字仲文為尚書郎忠勤不懈每奏事未報嘗俯伏省闥或從昏至明肅宗聞而嘉之使黃門丨丨丨丨敕令勿驚之以便宜行前蕭何守關中事有不及奏即丨丨丨施丨之恨相見晚武帝主父偃徐樂嚴安三人奏事朝奏暮召帝丨曰何丨丨之丨也乃皆拜為郎中願示百章後宦者曹節王甫用事日橫陳蕃上疏丨丨丨丨以誅甫等後蕃卒被禍奏聽忘倦後馬援每丨事上丨之而丨丨也上出師表蜀諸葛亮丨丨丨丨於先主間徹清密唐吏部侍郎裴行儉會征突厥引蘇味道管書記執金吾衛裴居道倩味道作章攬筆而具丨丨丨丨詞誼徑切中宗時武三思用事敬暉上表欲削諸武封王者衆畏三思不敢為草獨中書舍人岑羲為之丨丨丨丨以蠟韜表德宗狩奉天李懷光率所部奔命將抵奉天前遣神將張詔丨丨丨丨隨賊攻城叩壘呼曰我朔方使也縋而上比登身被十數矢帝被圍急聞之喜即持詔大號城上人心乃安疾甚為奏令狐楚丨丨謝天子召門人李商隱曰吾氣魄且盡助我成之其大要以甘露事誅譴者衆請霽威普見昭洗辭皆曲盡無訛謬表責太重于頔誣劾鄧州刺史元洪朝廷不欲重違為流端州命中人護送至棗陽頔遣兵劫洪環拘之丨丨洪丨丨改吉州刺史戕奏尤善令狐楚為文於丨丨制令丨丨每一篇成人皆讀誦古言不曉鄭徐慶奏議頗用丨丨如仰給縣官馬万蹄有司丨丨何等語人訾其不適時文甚淺鄙五代張彥之亂命判官王正言草奏詆斥梁君臣正言素不能辭又為兵刃所追流汗浹背不能下筆彥怒推正言下榻詬曰鈍漢辱我顧書吏問誰可草奏者即言司空頲羅王時書記乃馳騎召之頲為亂兵劫以敝服蔽形而至見彥長揖神氣自若揮筆成丨而言丨丨丨彥以其易曉甚喜即給以衣服僕馬遂以為德倫判官後權軍府上疏論北伐本朝太宗欲取燕薊趙普丨丨力丨其丨丨一疏論慧星趙普論慧星一疏卒被諂諛之言建儲十九疏仁宗嘉祐中范鎮積十九疏言建儲而鬚髮為白上奏凡十事慶厯三年范仲淹奏十事始於明黜陟終於重命令壬午上封事孝宗隆興元年丨丨朱熹丨丨丨曰今日講和之説不罷則陛下之勵志必淺大臣之任責必輕將士之赴功必緩百官之奉承必不能忘其心力癸未上封事隆興二年丨丨朱熹又丨丨丨曰釋怨而講和非屈已也乃屈理也已可屈也理可屈乎逆理之禍將使三綱淪九法斁子焉而不知有父臣焉而不知有君人心僻違而天地閉塞強敵愈盛而禽獸實繁是乃舉南北之人而棄之豈曰愛之謂哉且不曰愛其君父而曰兼愛南北之人其於輕重之倫緩急之序亦可謂舛矣同上蘇子瞻樂全先生文集序公自慶厯以來訖元豐四十餘年所與人主論天下事見於章疏者多或用或不用而皆本於禮義合於人情是非有考於前而成敗有驗於後信乎其有似於孔北海諸葛孔明也昔曾魯公嘗為軾言公在人主前論大事他人終日反覆不能盡者公必數言而決粲然成文皆可書而誦也言雖不盡用然慶厯以來名臣為人主所重莫如公者詩集問夜明朝有封事數丨丨如何杜甫左省詩對月兩章丨秋丨一字偕華星致君唐虞際純朴憶大庭同上同元使君春陵行刳肝瀝血我欲進短䇿無由至丹墀丨丨以為紙丨丨以書辭上言諫堯舜下言引龍夔言詞多感激文字少葳蕤一讀已自怪再獻良自疑食芹雖云美獻御固已癡緘封在骨髓耿耿空自竒同上歸彭城詩青山修竹湖外丨丨對結廬墳前丨丨亦瀟踈茂陵異日求遺藁猶幸曽無封禪書林和靖詩對見古今始末古者堂陛無間戶庭無壅君臣之間交際有道君未嘗一日不延見其臣臣未嘗一日不密邇其君逹德下衰於是有堂高陛卑之喻進見有時朝謁有儀間有軍國大事則排闥而入造膝而前者然非常制也降及隋唐之季有便殿召見有延英召對有雙日放朝之制有五日起居之儀至我國朝其文愈密其禮愈嚴故自宰執以至侍從臺諫則謂之常叄卿監以下又有所謂六叄者至於百執事又有所謂四叄者皆許有所轉對焉然又有所謂不時而得直前者蓋非拘乎此也大抵近而親者則常得以進見逺而疏者則其進見又有時也吁又安得有如古者堂陛戶庭之際耶事類晉接丨晝日三丨入覲以其介圭丨丨于王詩造辟丨丨而言詭辭而出穀梁造膝丨丨而諫天威丨丨不違顔咫尺龍顔議背漢公孫洪嘗與公卿丨至上前更丨之庭詰汲黯丨丨公孫洪曰齊人多詐詰過唐魏徵十漸疏正觀初御下有禮羣情上逹今外官奏事顔色不接間因所短丨其細過雖有忠疑而不得申此不克終八漸也推誠德宗問贄事切於今者贄勸帝群臣三日使極言得失若以軍務對者見不以時聽納無倦帝曰朕豈不丨丨然顧上封者惟譏斥人短長類非忠直往謂君臣一體故推信不疑至憸人賣為威福今兹之禍推誠之敝也雙日張茂昭為節度使至京師丨丨開延英對五刻罷又唐制天子以雙日視朝乃命輟朝放朝皆用雙日五刻李吉甫還秉政入對延英凡丨丨罷巡對薛珏為京兆尹時韋彤為萬年令珏使彤禁鬻賣民苦之德宗怒奪珏彤俸因疑下情不通乃詔延英坐日許有司長官二員言鬬失謂之丨丨諭遣帝疑陳京為忌者中傷中人問賚相繼後對延英帝丨丨京沮駭走出罷為祕書少監無威儀漢夏侯勝質朴守正簡易丨丨丨見時謂上曰為君誤相字於上前上以是親信之有常度霍光子孟每出入下殿進止丨丨丨同上衣褐見虞將軍與婁敬鮮衣敬曰衣帛衣帛見衣褐丨丨丨同上大應諾魏遊楚為隴西太守以功封侯引上殿不習朝覲被詔登不知儀式帝令侍臣蒲中贊引呼隴西太守前楚當言唯不覺丨丨丨帝笑勞勉之眀治體崔渙出為巴西太守元宗西狩迎謁于道帝見召奏以為丨丨丨恨得之晚上時議史思明次河北帝將幸河東召元結詣京師問所欲言結自以始見軒陛拘忌諱恐言不悉情乃丨丨丨三篇對便殿桞公權嘗與六學士丨丨丨立紫宸日與群臣序丨丨丨殿下親望穆穆之光韓聖德詩序對揚王休虎拜稽首丨丨丨丨詩敷奏以言丨丨丨丨書書思對命丨丨丨丨記史進象笏丨丨丨丨同上奏事充位漢張湯每朝丨丨天子日旰食丞相丨丨而已事皆決於湯也引令講經後劉寬字文饒每丨見帝丨其丨丨寬嘗於坐被酒睡伏帝問太尉醉耶寬對曰臣下不敢醉但任大責重憂心如醉也儀止秀偉唐武后召張嘉貞見內殿以簾自障嘉貞丨丨丨丨奏對侃侃后異之因曰草茅未覩朝儀陛下過聽引對禁近今威咫尺若隔雲霧恐君臣之道有未盡也后詔上簾引拜監察御史神氣爽徹裴耀卿自梁州都督召見丨丨丨丨占對有序同上占對慷慨武后竒陳子昂之才召見金華殿子昻兒柔野少威儀而丨丨丨丨擢麟臺正字進對詳洽昭宗立王徽見便殿丨丨丨丨踰月不見宗室李巨拜夷陵太守安祿山陷東京元宗方擇將帥張垍言巨有謀可屬大事召至京師楊國忠忌之謂人曰小兒詎可使對天子丨丨丨得丨帝知之召入禁中對合旨帝大悅敕宰相與語久不得罷不待日召德宗正元四年張建封拜徐泗濠節度使十三年來朝帝丨丨丨丨見延英殿豈宜限日故事天子以畸日聽政對群臣李遜奏陛下求治而下有所陳常不時上丨丨丨以丨如是畢嵗得望天子者幾何憲宗從之語不三刻懿宗立曰敏中召拜門下