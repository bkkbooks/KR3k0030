死而啓周韓非死而啓漢陳蕃死而啓魏今臣之來有司或不敢薦臣之言陛下又無以察臣之心退戮於權臣之手臣幸得從四子遊於地下不知臣死之後將孰為啓之也過古朝董時第䇿官左散騎常侍馮宿太常少卿賈餗庫部郎中龎嚴見蕡對嗟伏以為丨丨丨丨而畏中官毗睚不敢取同上氷視鼎鑊諌者肉視虎狼丨丨丨丨諤諤造廷文粹陳點答問知毒刀寒夫差既王宰嚭受賂二十年內越祀又顛太伯廟血將乾闔閭劍光且失公朝焉宴焉入則諌焉孰謂丨丨孰謂丨丨雖言屢出口而車甲已困於齊矣蟹稻已奪於嵗矣文粹盧元輔胥山銘德驤劾奏本朝太祖雷丨丨丨丨趙普上叱之曰鼎鐺尚有耳汝不聞普吾之社稷臣乎記聞知節厲聲真宗末馬知節與王欽若奏事欽若懷數奏出其一二餘皆匿之丨丨丨丨曰王欽若讀盡劄子莫瞞官家陳古諷今太宗太平興國六年拾遺田錫上疏太宗賜書曰錫丨丨丨丨有犯無隱然邦國之事慮之至熟至於興師伐叛聚徒贓役皆有理而為增釋之非無名之舉也講書再誦哲宗范祖禹丨尚丨內作色荒至未或不亡講畢丨丨此六句却立云願陛下留聽十八疏爭仁宗朝夏竦受樞密使凡丨丨丨丨之奪其命伐以杜衍十上始竄楊處厚上蔡確安州所為詩劉安世論奏曰確詩十篇多涉譏訕大不敬彭汝礪在中書為舍人亦皆數確疏丨餘丨丨丨確新州言大臣難仁宗嘉祐六年歐陽修言今唐介五人言陳升之得罪自范仲淹貶饒州至今後二十餘年臺諌未聞有規戒人主而得罪者臣故謂方今諌人主則易丨丨丨則丨論彥博出唐介丨文彥博以燈籠錦媚後宫求遷介遂貶英州别駕丨丨亦丨纍疏安石神宗吕誨疏言臣切見大姦似忠大詐似信王安石外示朴野中藏巧詐驕蹇慢上隂賊害物衆所共知纍疏十事力爭安石張戩上疏王安石處事乖繆專為聚斂又詣中書丨丨曽公亮俯首丨丨以扇掩面而笑戩怒曰參政笑戩戩亦笑參政之所為豈但戩笑天下誰不笑者陳升之解曰察院不須如此戩曰相公得無過邪事權志氣徽宗宣和二年臣寮奏議人君借之丨丨養其丨丨凡欲以破姦回之膽抑夷陵之患開廣奬拔髙宗建炎四年上曰近來諌官無一日無章疏宰臣曰陛下丨丨言路丨丨諫官是以人人得盡言無隱老泉諌論古者論諫常與諷而少直其説蓋出於仲尼吾以為諷直一也顧用之之術如何爾伍舉進隱語楚王淫益甚茅焦解衣危論秦帝立悟諷固不可盡與直亦未易少之吾故曰顧用之之術如何耳然則仲尼之説非乎曰仲尼之説純乎經者也吾之説參乎權而歸乎經者也如得其説則人君有少不為桀紂者吾不諌而百聽矣况虛己者乎不得其術則人君有少不若堯舜者吾百諌而百不聽矣况逆忠者乎然則奚術而可曰機智勇辨如古遊説之士而已夫遊説者以機智勇辨濟其詐吾欲諌者以機智勇辨濟其忠論備其效周衰遊説熾於列國自是而世有其人吾獨惜夫諫有從者百一説而從者十九諌而死者皆是説而死者未嘗聞然而抵觸忌諱説甚於直諫由是知不必乎諷而必乎術也説之術可以為諌法者五理諭之勢禁之利誘之激怒之隱諷之之謂也觸龍以趙后愛女賢於愛子未旋踵而長安君出質甘羅以杜郵之死詰張唐而相燕之行有日趙卒以兩賢王之意語燕而立歸武臣此理而諭之也子貢以內憂教田常而齊不得伐魯穆公以麋虎脅項襄而楚不敢圖周魯連以烹醯懼垣衍而魏不果帝秦此勢而禁之也田生以萬戶侯啓張卿而劉澤封朱建以富貴餌閎孺而辟陽赦鄒陽以愛幸悅長君而梁王釋此利而誘之也蘇秦以牛後羞韓惠王按劍太息范睢以無王耻秦而昭王長跪請教酈生以助秦激漢而沛公輒洗聼計此激而怒之也蘇代謂土偶笑田文楚人以矰繳惑襄王蒯娶婦悟齊相此隱而諷之也五者相傾險詖之論雜然施之忠臣足以成功何則理而諭之主雖昏而必悟勢而禁之主雖驕而必懼利而誘之主雖怠而必奮激而怒之主雖懦必立隱而諷之主雖暴必容悟則明懼則恭奮則勤立則勇容則寬致君之道盡於此矣吾觀昔之臣言必從理必濟莫若魏鄭公其初實學縱橫之説此所謂得其術者歟噫龍逢比干不獲稱良臣無蘇秦張儀之術也蘇秦張儀不免為遊説無龍逢比干之心也是以龍逢比干吾取其心不取其術蘇秦張儀吾取其術不取其心以為諫法詩集排雲丨丨呌閶闔披腹呈琅玕致君豈無術自進誠應難韓詩政治餘參見守令及刺史類古今本末政者正也治者為政之效也唐虞有三載考績之法而熙庶績周人有六計蔽群吏之治而皆以亷為本無非所以為吏治之政也自秦人罷侯置守其所可考者多見於守令之職是以漢唐之際於循良之吏每為之立傳而有識之士每每興嘆於良吏之艱其人蓋以政非君人不足以言治也我朝立國三百年而服勞州縣者莫不求以政治自見爰自王安石以經學禍天下反以滋吏治之弊中興立國江左而仕於東南者凡其得於講明之餘而見於設施之末無非政也則亦無非治也有志於正主庇民者盍亦以我朝臣子為法事類允釐丨丨百工書咸熙庶績丨丨同上剛柔不丨不丨敷政優優詩寬猛丨丨相濟政是以和左從政季康子問仲由求賜可使丨丨也與曰由也果求也藝賜也逹於從政乎何有語正身子曰茍丨其丨矣於從政乎何有不能正其身如正人何孝友惟丨丨於兄弟施於有政是亦為政奚其為為政又書惟丨丨于兄弟克施有政德禮導之以丨齊之以丨有耻且格語先勞子路問政子曰丨之丨之悅來葉公問政子曰近者悅逺者來帥正季康子問政子曰政者正也子丨以丨孰敢不正正名子路曰衛君待子而為政子曰必也丨丨乎子路曰子之迂也奚其正子曰名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中刑罰不中則民無所措手足無倦子張問政子曰居之丨丨行之以忠又子路請益曰無倦舉知仲弓為季氏宰問政子曰先有司赦小過舉賢才曰焉知賢才而舉之曰丨爾所丨爾所不知人其舍諸並同上清靜漢曹參為齊相有蓋公好黃老之術曰治道貴丨丨人自正參避堂以舍之齊國大治又王公著為河南尹治以丨丨聞亷平文景時循吏河南太守吳公蜀守文翁皆謹身率先居以丨丨不至嚴而人從化江都相仲舒內史公孫𢎞兒寬居官可紀也又宣帝詔吏不亷平則治道衰治平吳公丨丨為天下第一儒雅張敞為京兆尹為政緣飾以丨丨共理宣帝曰庶民安田里而無嘆者與我丨此丨其唯良二千石乎民富王成黃霸朱邑龔遂鄭𢎞召信臣所居丨丨所去見思生有榮號死見奉祀庶幾德讓君子也仁恕唐陸象先為劍南按察使為政尚丨丨司馬韋抱真諫曰公當峻朴罰以示威不然民慢且無畏答曰政在治之而已何必刑法以樹威乎卒不從而蜀化寬惠韋恆為碣山令政丨丨吏民愛之天子東巡州縣供帳皆鞭朴趣辦恆不立威而事給無欲速子夏為莒父宰問政子曰丨丨丨無見小利欲速則不逹見小利則大事不成語不忍欺鄭子産為政民丨丨丨西門豹治鄴民不敢欺宓子賤為政民不能欺莫不勸讒慝黜逺去煩宥善丨丨競丨用賢治不肖用貴治賤榖梁聞其政子禽問於子貢曰夫子至於是邦也必丨丨丨求之與抑與之與子貢曰夫子溫良恭儉讓以得之夫子之求之也其諸異乎人之求之與語不立名漢直不疑為官惟恐人知其為吏之迹丨好丨丨稱為長者皆籍記漢尹翁歸為東海郡中賢不肖丨丨丨人道為大哀公問子曰丨丨政丨丨記人存政舉子曰其丨丨則其丨丨其人亡則其政息人道敏政同上容民蓄衆師君子以丨丨丨丨易明政折獄賁君子以丨庶丨無敢丨丨同上農用八政丨丨丨丨書十二聚民大司徒以荒政丨有丨丨萬丨禮不易其俗齊其政丨丨丨丨記以率其怠為之政丨丨丨丨韓原道長於治民前漢黃霸力行教化在成就安全之其材丨丨丨丨也人不敢欺韓延夀推至誠吏丨丨丨丨亷平不苛龔遂丨丨丨丨以愛利百姓為行未嘗笞辱人寬厚為師乂曹以丨丨清靜丨天下之丨九州惠愛唐張萬福蒞凡丨丨皆有丨丨勳閥政績李憲丨丨家子所歷皆以吏能顯丨丨暴著吏政不煩馬政精丨事以文雅絢飾其丨清淨丨丨善政致祥尹思貞為青州刺史治州有績蠶至四熟黜陟使路敬潛至部嘆曰是丨丨丨丨者乎表言之慈惠為本袁滋遷華州刺史專以丨丨丨丨仁惠為治殷侑拜義昌節度使以丨丨丨丨不事威刑韋抗為永昌令輦轂繁要抗丨丨丨丨而治遷中丞不威而治滑亳節度使令狐彰死表李勉為代勉居鎮八年以舊德方重丨丨丨丨上下愛向吳湊為人強力儉勤未嘗擾民丨丨丨丨所至惠愛王質為吏丨丨丨丨能惠養民王緯丨丨丨丨長于撫民崔彥曽丨丨丨丨政在養人髙宗咸亨初賈敦實為洛州長史亦寬惠人心懷向洛陽令楊德幹矜酷烈杖殺人以立威敦實喻止曰丨丨丨丨傷生過多雖能不足賢也德幹為衰減心與古合李惠登朴素無學術而視人所謂利者行之害者去之率心所安暗丨丨丨政清淨居二十年田畝闢戶口增人歌舞之印紙書勞績本朝太宗淳化四年審官院選京官充知州者三十餘人御前丨丨厯子上親丨於其前曰公務刑政惠愛臨民奉法除姦方可書為丨丨嚴辦書姓名吕夷簡以刑部郎中權知開封府丨丨有聲真宗丨其丨丨於屏風范希文守饒州以嚴辦有聲崇尚風化州人嚮之邑人有矜式陳襄宰仙遊縣作勸學一篇以喻民曰吾秩滿去亦有子弟亟遣就學於是丨丨丨所丨丨響應便成風先生所在臨政便上下丨丨丨丨丨明道遺書程晏蕭何求繼論讀漢史者多曰曹參守蕭何之規日醉以酒民歌之曰蕭何為法構若畫一曹參代之守而勿失載其清淨民以寧一其為漢之二賢相也至矣哉論曰非也暑牛之渴也豎子飲之停淖之汙牛渴已久得停淖之汙寧顧於清泠之水乎設使豎子牽之於清泠之水則滌乎腸中之泥也牛然後知停淖之汙不可終日而飲之百姓罹秦之渴已久矣蕭何曰吾所以為法律是權天下之草創也吾不止此將致君為成康之君使民為成康之民是牽民於清泠水也曹參日荒於酒惠帝訊焉參誷於惠帝曰髙帝則之陛下承之蕭何造之臣參遵之陛下垂拱臣等守職惠帝以為是也民又歌之也嗚呼漢之民以漢之汙愈於秦之渴不知牽於清泠之水滌於腸中之泥也蕭何之傳曹參也若木工能搆材而未果覆而終者必待善覆者成焉何既構矣謂參為覆者參守其構而不能覆徒欺君曰陛下不如髙帝臣參不如蕭何善守可也何廢作哉若不可以與廢作即文帝除肉刑不為漢主仁聖之最也參不能孜孜其君於成康之政不知已不能覆何之構而荒於酒幸不同羲和之誅貪位畏事徒苟安以惑君也孰明賢相耶吾病漢史以蕭何為善求繼以曹參為堪其後故為論之韓愈修滕王閣記太原王公觀察江南西道洪江饒虔吉信撫袁盡屬治所公至之日皆罷行之大者驛聞小者立變春生秋殺陽開隂閉令修於庭戶數日之間而人自得於湖山千里之外詩集蒲鞭丨丨挂簷枝示耻無撲扶李白詩害馬蠧政除丨丨傾巢有歸禽同上滯務相公鎮夔子丨丨兹一掃杜圉人送瓜詩失大體政化錯邇丨丨丨坐看傾危受國恩同上石笋行合典則政用踈通丨丨丨同上入秦行古今合璧事類備要後集卷七
