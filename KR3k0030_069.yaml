body:
  text: 古今合璧事類備要前集卷六十九宋謝維新撰神鬼門神事類依人有神降於莘内史過曰以其物享之史嚚曰神聦明正直而一者也丨丨而行左傳見怪山林川谷丘陵能出雲為風雨丨丨物皆曰神記祭法存亡或謂趙世多神何也曰神怪茫茫若存若亡聖人漫云山揚子備降百神醫其丨丨兮九疑繽其並迎屈平離騷湘君晉屈原九歌有丨丨湘夫人按韓愈黄陵廟碑云云旁有廟曰黄陵自前古立以祠堯之二女舜二妃者庭有古碑斷裂分散在地其文剥缺考圖記言漢荆州牧劉表景升立題碑曰湘夫人今驗其文乃晉太康九年又題其額曰虞舜二妃之碑非景升立者秦剥士時始皇帝云丨丨者堯之二女舜妃者也劉向鄭𤣥亦皆以二妃為丨丨離騷九歌既有丨丨又有湘夫人王逸解以為丨丨者自為水神而謂湘夫人者乃二妃也從舜南征三苗不返道死沅湘之問山海經云洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小君為其夫人因以二女為天帝之女以余攷之璞與王逸俱失也堯之長女娥皇為舜正妃故曰君其二女女英自冝降曰夫人也故九歌辭謂娥皇為君謂女英為帝子各以其盛者推言之也孔有小君明其正者自得稱君也云云二妃既日以謀語舜脫舜之厄成舜之聖尭死而舜有天下為天子二妃之力宜當為神食民之祭今之度湘江者莫不進禮廟下蔣帝六朝事實云帝即後漢秼陵尉蔣子文金陵圖經云漢末子文為秼陵尉逐盗種山北傷額而死嘗自謂骨貴死當為神及吳大帝徙都建業子文乗白馬執白羽扇見形故吏白吳帝為立廟不爾百姓大疫權猶未信翌日復見於路云當令飛䖝入人耳後如其言帝乃立廟於鍾山封子文為蔣侯權避相諱因改鍾山為蔣山晉蘇晉之亂鍾山神同蔣侯為助且曰蘇峻為逆當共誅鉏之後果斬峻按杜佑通典云宋髙帝永初二年普禁遥祀自蔣子文祠以下皆絶孝建初脩復加蔣侯爵位至相國大都督中外諸軍事眀帝初四方兵起求救扵神遂封為蔣王齊永明中崔惠景之難迎神還臺以求福助事平授以帝位梁武帝時魏軍圍鍾離丨丨神報夢許扶助既而無雨水長遂挫敵人凱旅之後廟中人馬各盡泥濕當時囙睹焉齊既封以帝號於是以廟門為靈光之門中門為興善之門外殿曰帝山内殿曰神居西閣有佛殿名靈鷲東閣即子文所居也南唐追謚扵莊武帝更脩廟宇開寳八年焚毁雍熙四年邑人張革外舊基重建景祐二年知府陳待制執中復増修之朝廷賜額曰恵烈政和八年本縣復加修餙有南唐及景祐政和廟記可攷今在蔣山之北去城十二里茅司徒浙西僧徳林少時逰舒州路見一夫荷鋤治方丈之地左右數十里不見居人問之對曰湏時自舒之桐城至此暴得痞疾不能去因卧草中及稍醒日已昏矣四望無人惟虎豹吼呌自分必死俄有一人部從如大將至此下馬良乆召二卒曰善守此人明日送到桐城縣下遂上馬去倐忽不見惟二卒在焉某即強記問之答云此丨丨丨也常常夜出獵虎憂汝被傷故䕶汝汝更欲問即日已出矣不復見其二人即起而行意甚輕健至桐城須臾疾愈以所見之處立祠祀之徳林至舒三十里及囬則村落皆立茅將軍廟今呼丨丨丨在建康府溧陽縣東門外一里稽神録炳靈公後唐長興四年封東嶽三郡為威雄將軍五代史大中祥符元年奉勑封丨丨丨廟在建陽府城西建康誌洛邑五神武王伐紂都丨丨天大雨雪甲子朔丨丨車騎止王門之外欲謁武王王曰諸神各有名乎師尚父曰南海神名祝融北海神名𤣥冥東海神名勾芒西海神名蓐收河伯名馮修使謁者以名召之神皆警而見武王王曰何以教之神曰天伐殷立周謹來受命各奉其使武王曰子嵗時無廢禮焉太公隂謀翁仲二神魏明帝鑄銅為二神人號丨丨置司馬門外按古長人見為國亡長狄見臨洮為秦亡之禍始皇反以為祥鑄銅象之晉五行志毗沙門天王唐天寳元年西蕃五國來冦安西奏至上詔不空三藏入内持念不空誦䕶法陀羅尼方二七遍帝忽見神人五百帶甲荷戈在殿前帝問不空對曰此丨丨丨丨第二人獨見副陛下心徃捄安西也其年安西奏城東北三十里雲霧冥晦中有神長丈餘皆披金甲鼔角大鳴地動山揺經二日蕃冦奔潰斯湏城樓上有光如天王見形漢圖様随表進呈因勑諸道節鎮所在州於城西北隅各置天王形像僧傳江南李後主時大宋將興忽見州城上有神現斯如車輪額上有珠光燦若日月軍民皆㸔數日而沒今天王樓是也南海廣利王海於天地間為物最鉅自三代聖王莫不祀事考於傳記而南海神次最貴在北東西三神河北之上號為祝融天寳中天子以為古爵莫貴於公侯故海岳之祀犧幣之數放而依之所以致崇極於大神今王亦古爵也而祀海岳尚循公侯之事虛王儀而不用非致崇極之意也由是册導丨丨神為丨丨丨祝號祭式與次俱昇因其故廟易而新之注云天寳中載封東海為廣徳王南海為廣利王西海為廣潤王北海為廣澤王太公金匱曰南海之神曰祝融東海之神曰勾芒北海之神曰顓頊西海之神曰蓐收世人或謂退之因祝融為火正遂以為南海神而不知自有所㨿也許牛賽福庾亮鎮武昌引戴洋問氣侯亮病洋曰昔蘇峻時公扵白石祠中祈福丨賽其牛至今未解故為此鬼可考亮曰有之君是神人也至明年而薨本傳醵錢賽神京師百司胥吏毎至秋必醵錢為賽神徃徃因醵飲終日蘇子羙進奏院㑹正坐此余問其何神曰蒼王盖以蒼頡造字故胥吏祖之固可笑矣官局正門裡皆於中龕用小木龕供佛曰不動尊佛雖禁中諸司皆然其意亦本吏畏罷斥以為禍福甚驗事之極恭此不惟流俗之繆雖神亦可笑也詩集神來攂蠻鼂吟塞笛女巫結果分行立空中再拜以且丨滿奠椒漿齊献揖隂風窣窣吹紙錢妖巫瞑目傳神言與君降福為豊年莫教賽祀虧常筵李建勲迎神歌神降吉日兮臨水沐青籣兮白芷假山鬼兮清東皇託靈均兮邀帝子吹參差兮正苦舞婆娑兮未巳鸞旌圓盖望欲來山雨霏霏江浪起丨既丨兮我獨知穆誠再拜為傳詞司空曙迎神歌神去丨之丨廻風嫋嫋雲容與桂樽琮席不復陳蒼山緑水暮愁人司空曙送神神語叢祠千嵗臨江渚拜貺今年那可數湏晴雨得晴雨意所向神輙許嘉禾九穗持上府廟前女巫遞歌舞嗚嗚歌坎坎皷香煙成雲丨降丨大餅如盤牲腯肥再拜獻神神不違晩來人散相扶歸蟬聲滿廟鎻斜暉陸務觀賽神曲鬼事類人鬼天曰神地曰祗丨曰丨鬼之言是為慧也說文國殤屈原丨丨云身既死神以靈毅魂魄兮為鬼雄注無主之鬼謂之殤謂死於丨事者精神强壯魂魄武毅長為百鬼之雄傑也楚辭精神丨丨離形各歸真謂之鬼列子形聲鬼有成於丨有慿於丨而下殃禍焉皆民之為也其既也又反乎其常成於丨與丨者圡石風霆人獸是也反乎無聲與形者鬼神是也不能無聲與形者物怪也精爽人生始化曰魄既生魄陽曰魂用物精多則魂魄强是以有精爽至扵神明匹夫匹婦强死其丨丨猶能慿依於人以為淫厲左傳魂魄鳥無聲兮山寂寂夜正長兮風淅浙丨丨結兮天沉沉鬼神聚兮雲冪冪日光寒兮草短月色苦兮霜白戰塲文物怪水石之怪曰龍罔象木之怪曰䕫罔兩土之怪為羵羊火之怪為宋旡忌慱物志山鬼屈原作丨丨歌若有人兮山之阿被薜荔兮𢃄女蘿離騷作搜神記于寳兄弟嘗病氣絶積日不冷後遂悟云見天地間鬼神事如夢覺不自知死寳以此遂撰集古今神秪靈異人物變化名為捜神記以示劉惔惔曰卿可謂鬼之董狐本傳著無鬼論阮贍素執無鬼論或有一客通名詣贍寒温畢聊談名理客甚有材辨贍與之言良乆及鬼神之事反覆甚苦客遂屈乃作色曰鬼神古今聖賢所共傳君何得言無即僕便是鬼於是變為異形須臾消㓕野冡火光晉陸雲嘗行逼宿故人家夜暗迷路忽望草中有火光於是趣之至一家便寄宿見一年少羙風姿共談老子音致深逺向曉辭去行十許里始至故人家云此數十里無人居雲意始悟却尋昨宿處乃王弼冢雲本無𤣥學自此談𤣥殊進官舍怪出宋徐孝先為都官尚書自晉以來尚書寮皆携官属居省年代乆逺多有鬼怪毎夜昏之時無故有聲光或見人着衣冠從出須叟復没或門自開闔見者多死之尚書周確卒於此省孝先代確即居之經兩載妖變皆息時人咸以為真正所致因鬼殺子梁國之北地名黎丘有竒鬼焉善効人之子姪昆弟好扶邑丈人而遒苦之黎丘丈人之市醉而歸者黎丘之鬼效其子之状扶而道苦之丈人歸酒醒而譙其子其子泣而觸地曰孽無苦也其父信之曰譆是必扶竒鬼也我固聞之明日復飲於市欲遇而刺之明旦復醉其眞子恐其父之不能返也遂迎之丈人望其眞子㧞劒刺之而不知惑於似其子者而殺其眞子戰國䇿伐樹移社晉阮修字宣子善清談論者以人死有鬼修獨以為無後遂伐社樹或止之修曰若社而為樹丨丨則社移樹而為社伐樹則社亡矣夢鄭伯有鄭人相驚以伯有鄭人殺伯有言其鬼至曰伯有至矣則皆走不知所徃鑄刑書之嵗二月或夢伯冇介而行曰壬子余將殺𢃄也明年壬寅余又將殺叚也及壬子駟帯卒國人益懼齊燕平之三月壬寅公孫叚卒國人愈懼其眀月子産立公孫洩及良止以撫之乃止及子産丨丨丨丨見甄舒仲晉鄒湛嘗丨一人自稱丨丨丨餘無所言如此非一乆之乃悟曰吾宅西有積土敗瓦其中必有死人甄舒仲者予舎西土瓦中人也檢之果然厚加歛葬畢夢此人復來致謝本傳上清童子岑文本山亭避暑有叩門云丨丨丨丨元寳叅奉冠青圓角冠衣淺青衣自漢得果成本生於吳得不凝滯之道又語以漢魏間事了如目睹問冠帔乃曰僕外服圓而心方正此是丨丨五銖服也又天衣六銖尤細五銖也出門數歩墻下不見文本掘之一古墓中唯得一古錢方知丨丨丨丨銅名元寳錢文也外圎心方正錢之狀也青衣銅衣也五銖服亦錢文也此乃漢朝所鑄也文本自是錢帛日盛至中書令忽失古錢岑遂薨矣神異著驛舎婦也眠字馬撲兒𤓰子也孤字衘厨飯官食也舘字乃獨眠孤舘四字傲視宅怪魏元忠公正寛厚不信邪鬼未達時家貧獨一婢老猿為㸔火婢驚白公公曰猿聞我闕僕為我執㸑耳又嘗呼蒼頭蒼頭未應犬代呼之公曰孝順狗也能代我勞又獨坐有碩䑕拱之於前公曰汝軰飢求食於我耶乃令飼之又夜有鷦鶹鳴於屋端家人將彈之公曰彼晝不見物故夜飛此亦天地所有不可使南走越北走胡何須傷之又一夕夜半有婦女數人立竹牀前公曰能徙吾牀於堂下乎婦人竟擡舁於堂下公曰可復徙堂中乎羣女乃復移床至舊所公曰能徙吾床至街市中羣女再拜而去曰此寛厚長者可同常人翫之哉見易録大出鬼手少保馬公亮少時臨窻燭下閲書忽有大手如扇自窓前伸入次夜乂至公以筆濡雌黄水大書花字忩外大呼速為我滌去不然禍及於汝公不聽而寢有頃怒甚呼滌愈急公不應將曉哀鳴而手終不能縮且曰公將大貴我戯犯公何忍致我極地耶公獨不見温嶠燃犀之事也公大悟以水滌去花字遜謝而去括異志詩集燈檠精宋怙為甘渡巡檢故人趙當訓其子弟忽見羙婦人立燈下纎腰一搦唱曰郎行久不歸妾心傷亦苦低迷羅箔風背泣西牕雨遂㓕趍趙就寢曰妾本東方人鬻身於彭城郎今即觀光上國妾豈可孤眠暗室明夜又來諸生怪趙精神恍惚具告其故請徃觀焉因遽入以身抱之視之乃一燈檠雲齋録神座狐景徳中邠州有神祠相傳神親享盃盤盖丨丨下有穴藏羣丨狐自元出享有體王嗣宗得其實縱火焚穴擒捉羣狐鞭廟祝背遂絶初公在長安極䟽种山人放之短好事有詩云終南隠士聲華歇邠土妖狐巢穴宫二事但輸王太守聖朝方信有英雄渑水燕談鄭郊河北人舉進士第游陳蔡間過一塜上有竹二竿青翠可爱因駐馬吟曰丨上二竿竹風吹常裊裊乆不能續忽聞丨中有言曰何不云下有百年人長眠不知曉郊驚問之不復更有他言矣集異記宅怪賡唱姚康成夜宿廢宅遥見三人入廊房内賦詩一人細長而黒吟曰昔日炎炎徒自知今無烽竈何繇得真訣使我佩環飄闕三閭大夫廟丨丨丨丨屈平字靈均汨羅沉沙之處在岳州境内正廟以漁父配享元末有洪州衙前軍將忘其姓名題一絶云蒼藤古木幾經春崇祀祠堂小水濵行客漫陳三酹酒大夫元是獨醒人自是能詩者不敢措手青𤨏後集睢陽二將廟荆公題雙廟云北風吹樹急西日照牎凉及詳味之其託意深逺非止詠廟中景物而已盖巡逺守丨丨當時安慶緒遣突厥勁兵攻之日以危困所謂北風吹樹急也是時肅宗在靈武號令不行於江淮諸將觀望莫肯救之所謂斜日照牕凉也此深得老杜句法如老杜題蜀相廟映階碧草自春色隔葉黄鸝空好音亦自托意其中矣公安㓂公祠冦菜丨貶死雷州喪過還荆南丨丨縣民懐公徳以竹挿地掛紙為祭焚之後生笋成林民以為神因立公祠目其竹曰相公竹楊誠之有詩曰已枯斷竹再成林天為英賢春獨深仆木偃禾如不起至今誰識大忠心渑水燕談家廟事類念親質家古宗廟上親親也公羊威二年注云孝子必丨其親故為之立宗廟以鬼事之藏主廟者所以丨丨列昭穆也漢書事象生廟以藏主以四時祭寢有衣完几杖丨丨之具以藏新物俊祭祀志思貎廟貎也丨想儀丨而事之也公羊威二年首立家廟唐王珪既貴丨丨丨丨四時祭于寢居室為後及秦非笑聖人蕩㓕典禮務尊君卑臣於是天子之外無敢營宗廟者漢世公卿貴人多建祠堂於墓所在都邑則鮮焉魏晉以降漸復廟制其後遂著於令以官品為所有世數之差唐侍中王珪不立私廟為執法所紏太宗命有司為之營搆以耻之是以唐世貴臣皆有廟及五薄折士民永生有所未遑禮頽教墜廟制遂絶迨後宋興夷亂蘇疲乆而未講至仁宗皇帝問羣臣貴窮公相而祖禰食于寢儕於庶人慶厯五年行郊祀赦聽文武官依舊式立家廟臣嘗因進對屢聞聖言謂宿薄后廟牛僧瑞落第歸宛葉間將宿大安民舎㑹暮失道逺見火明至一大宅黄衣閽人曰有客有客入告少時出曰請郎君入至大殿蔽以珠簾拜于殿中簾中語曰妾漢文帝母薄太后此是廟郎何辱至行役無苦乎今夜風月佳甚呼左右屈兩娘子出見牛秀才良乆有二女子從雲中至太后顧曰此髙祖戚夫人余下拜夫人亦拜又顧一人曰此元帝王嬙如前拜各就坐太后使紫衣中貴人曰迎楊家潘家來乆之五色雲中有二女子下太后曰此是唐太宗妃余即肅拜如臣禮更一人曰此齊潘淑妃余拜非復再既畢太后命進饌具酒各賦詩别有善笛女子太后謂曰識此否此石家緑珠也因曰牛秀才來今夕誰人與伴戚夫人潘妃緑珠皆辭不可及亂太后又曰太真先朝貴妃固勿言也乃謂王嬙曰昭君嫁呼韓禪于胡鬼何能為昭君幸無辭昭君不對低眉羞恨俄各歸利牛秀才為左右送入昭君院㑹將旦竞辭去太后使人送徃大安邸施失使人行少時天使明余却望直廟荒大不可入境不知其如何僧孺自作周行記毁諸滛祠唐狄仁傑為江南廵撫使吳楚多滛祠仁傑丨千七伯房止㽞夏禹吳太伯季札伍貟四祠謁江瀆廟文潞公少時從其父赴蜀州幕官過成都潞公入江瀆廟觀畵壁祠官接之甚勤且言夜夢神令洒掃池庭曰明日有宰相來官豈異日之宰相乎公笑曰宰相非所望若為成都當令廟室一新慶厯中公以樞宻直知益州聽事越三日丨丨丨丨若有感焉方經營改造中忽江漲大木數千章蔽流而不盡取以為村廟成壯觀甲天下聞見録詩集玉華宫溪囬松風長蒼䑕竄古瓦不知何王殿遺搆絶壁下隂房鬼火青壊遒哀湍瀉萬籟真笙竽秋色正蕭洒羙人為黄土况乃粉黛假當時侍金輿故物獨石馬憂来藉草坐浩歌涙盈把冉冉征途間誰是長年者杜前黄牛祠大川雖有神滛祀亦其俗石馬繫祠山門鴉噪叢木潭潭村鼔隔溪聞楚巫歌舞送迎神畵船百丈山前路上灘丨峽長來去江水東流不暫停黄牛千古長如故峽山侵天起青嶂崖崩路絶無由上黄牛不下江頭望行臣專殖第産不立私廟下儒臣禮官議定制度於是翰林承㫖而下共奏請自平章事以上立四廟東宫太保以上立三廟詔如其請公卿無肯偪衆為之者獨平章事文公首奏乞立廟河南有詔可之司馬公作文路公家廟碑生祠事類古今生祠石慶為齊相齊人慕其嘉行則有石相之祠欒布嘗守燕郡燕人服其亷則有欒公之社以至荀勉之遺愛童恢之異政韋羲之奸獄屢空王堂之削平羣盗杜軫之專尚風化皆立生祠狄仁傑生祠唐丨丨丨為魏州刺史民為立生祠後其子景睴官魏州司功貪暴為虐民苦之因毁父生祠唐史張文定生祠至和元年秋蜀人傳言有㓂至邊邉軍夜呼野無居人妖言流聞張公方平至蜀之日歸屯軍撒守備明年正月蜀人相慶如他日遂以无事又明年正月相告㽞公像于净衆寺公不能禁蘇洵曰公之恩在爾心爾死在爾子孫其功業在史官無以像為也且公意不欲奈何皆曰公何事於斯雖然於我有不釋焉今夫平居聞一善必問其人之姓名與其隣里之所在以至扵其長短小大羙惡之狀甚者或詰其平生所嗜好以想見其為人而史官亦書之於其傳意使天下之人思之於心則存之於目存之於目故思之於心也固由此同之像亦不為無助也洵無以詰遂為之蘇明允作記古今合璧事類備要前集卷六十九
