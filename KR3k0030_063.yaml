body:
  text: 古今合璧事類備要前集卷六十三宋謝維新撰喪紀門死喪附凶兆作神遺言遺書遺忠遺思遺愛遺業事類壽考丨丨曰卒短折曰不祿死寇曰兵禮記消澌死者澌也丨丨也諸侯曰薨壞聲也大夫曰卒言終竟也士曰不祿不復食祿也凡五材膠漆陶冶皮草乾槁乃成也漢以來謂死為物故皆就朽故也既定曰尸尸舒也骨節舒解不復能自勝斂也釋名委蛻身非汝有是天地之委形也生非汝有是天地之委和也性命非汝有是天地之委順也子孫非汝有是天地之丨丨也莊子上仙千載厭世而丨丨乘彼白雲至于帝鄉舟壑夫大塊勞我以形勞我以生佚我以老息我以死藏丨於丨藏山於澤謂之固矣然而夜半有力者負之而走昧者不知也並同上風燭萬事丨丨九原草露權集重泉歐陽詹上鄭相公書其或素蓄當在丨丨之下唐史千古薛收卒秦王與兄子玩敬書曰吾與伯褒共軍旅間豈期一朝成丨丨也同上正丘狐死丨丨首仁也禮記就木李綱上書曰綱老矣幸未就木備位保傅捐館秦陽君丨丨舍蘇秦傳歸泉逼近丨丨之期劉禹鍚慰太尉薨表逍遙生為附贅縣疣死為決􅪵胡亂反潰癰忘其肝膽遺其耳目芒然倣徨乎塵埃之外丨丨乎無為之表莊子沈瘞平仲曰既死豈在我焚之亦可丨之亦可丨之亦可衣薪而棄諸溝壑亦可袞衣繡裳而納諸石槨亦可唯所遇焉列子在棺在牀曰尸丨丨曰柩柩究曰不復變也喪大記掩尸棺關也而以丨丨又曰櫬又曰櫝小棺曰槥說文數盡孔子對哀公曰分於道謂之命形於人謂之性化於陰陽象形而發謂之生化窮丨丨謂之死故命者性之始也死者生之終也有始則必有終也家語死歸古者以丨為丨也然則豈死者皆得歸哉故有貌肆之徒壓溺而斃貪暴之輩刑戮以亡謂之不得其死不得所歸也父母全而生之子全而歸之不虧其身不辱其親是得所歸矣所歸者猶有數品焉有跛躄而歸者有困窮而歸者有憂鞠而歸者有暇豫而歸者有顯榮而歸者有欣喜而歸者佞媚於生前而得其死者跛躄而歸也愚鄙於生前而得其死者困窮而歸也彊暴於生前而得其死者憂鞠而歸也三者皆茀其歸路也正直於生前得其死者暇豫而歸也敏達於生前得其死者榮顯而歸也仁惠於生前得其死者欣喜而歸也三者皆坦其歸路也李英華書彭陽公碑鄰喪丨有丨春不相里有殯巷不歌禮記山木弟子問於莊子曰昨日丨中之丨以不材則終其天年山木篇屬纊丨丨俟絶氣注纊今之新綿易動搖置口鼻之上以為候也喪大記懸衣蠟氏掌若有死於道路者則令埋而置揭書其日月焉丨其丨服任器于有地之官以待其人周禮腐骨萬物齊生齊死齊賢齊愚齊貴齊賤十年亦死百年亦死仁聖亦死凶愚亦死生則堯舜死則丨丨生則桀紂死則腐骨丨丨一矣孰知其異列子輕毛人固有一死死有重於泰山或有丨於鴻丨用之所趣異也司馬遷傳顔淵早死丨丨年二十九而髮白三十二而丨丨曾參正斃曽子寢疾病樂正子春坐於牀下曽元曽申坐於足童子隅坐而執燭童子曰華而皖大夫之簀與子春曰止曽子聞之瞿然曰呼曰華而皖大夫之簀與曽子曰然斯季孫之賜也我未之聞能易也元起易簀曽元曰夫子之病革矣不可以變幸而至於旦請敬易之曽子曰爾之愛我也不如彼君子之愛人也以德細人之愛人也以姑息吾何求哉吾得正而斃焉斯已矣舉扶而易之反席未安而歿禮記檀弓黔婁布被丨丨先生卒曽西來弔見尸在牖下覆以丨丨覆頭則足見覆足則頭見西曰斜其被則斂矣妻曰斜而有餘不若正之不足先生生而不斜而死斜之非其意也髙士傳葛仙空衣葛洪坐至日中兀然若睡而卒視其顔色如生體亦柔軟舉尸入棺甚輕如空衣世以為尸解葛仙晉書預知當死魏管輅舉秀才弟辰謂輅曰大將軍待君意厚冀當富貴乎輅長歎曰然天與我才名不與我年壽恐四十七八間不見女嫁男娶也是歲八月為太府丞明年二月卒年四十八但少一死蜀宗預為鎮軍大將軍諸葛瞻初統朝事車騎將軍廖化欲與預共詣瞻預曰吾等年踰七十所竊已遇丨丨丨丨何求於年少輩而屑屑造門耶得死不恨陳咸與陳湯書幸蒙子公力丨入帝城丨丨丨本傳含笑入地漢桓帝時公孫舉東郭竇等聚衆至三萬人寇青兖徐三州以司徒掾潁川韓韶為嬴長韶開倉賑之曰長活溝壑五人而以此伏罪丨丨丨丨矣減年代死晉王徽之為黃門侍郎棄官東歸與弟獻之俱病篤術人云人命應終有生人樂代者則死者可生徽之曰吾才位不如弟請以餘年代之術者曰代死者以巳年有餘得以足亡者耳今君與弟俱盡何代也未幾獻之卒却醫付命李績屬疾家人欲呼醫巫不許諸子固以藥進輒曰我山東田夫耳今位至三公年踰八十非命乎生死係天寧就醫求活耶本傳七日復蘇趙簡子死丨丨而蘇雖蛆食其舌鼻猶不為害程子曰有死而丨丨者故禮三日而斂未三日而斂皆有殺之之理遺書半月復生翰林待詔戴少平卒十六日復生唐德紀州門興慟晉謝安卒甥羊曇輟樂彌年不由西州路嘗大醉不覺至州門曇悲感以馬䇿叩肩詠曹子建詩生存處華屋零落歸丘山慟哭而去本傳酒壚念舊王戎經黃公丨丨嘆曰昔與嵇阮為竹林之逰今嵇阮亡余為羈紲視此雖近邈若江河晉書聞笛興嘆向秀作思舊賦序云余少與嵇康吕安居止並有不羈之才其後各以事見法經其舊廬於時鄰人有吹笛者發音寥亮追思曩昔豫感音而歎故作賦云文選覩貌懷人孔融與蔡雍友善雍卒後有虎賁士貌類雍融每酒酣引與坐曰雖無老成尚有典型後本傳使虜道卒張薦為弔贈吐蕃使在途被病卒其孤與軍吏童騎護輤車而東權集墓志寫詩立逝中書舍人鄭居中辭官逰名山一日搦管寫詩才書五字曰雲山逰已遍筆忽墜地而終職官分紀留寄遺象張乖崖守蜀及代去留一卷實封文字與僧正希白且云候十年觀此後十年公薨於陳州訃至蜀人罷市號慟希白為公設大㑹齊請知府凌䇿諫議發開所留文字乃公畫像衣兔褐繫縚草裏自為贊曰乖則違俗崖不利物乖崖之名聊以表德遂畫於天慶觀仙逰閣又為之立祀誤傳仙去東坡既遷黃岡京師盛傳白日仙去神廟聞之對左丞蒲宗孟歎息久之故東坡謝表有云疾病連年人皆相傳其已死饑寒併日臣亦自厭其餘生聞見録凶兆夢奠兩楹孔子蚤作負手曵杖逍搖於門歌曰泰山其頽乎梁木其壞乎哲人其萎乎夏后氏殯於東階之上則猶在阼也殷人殯於兩楹之間則與賓主夾之也周人殯於西階之上則猶賓之也而丘也殷人也豫疇昔之夜丨坐丨於丨丨之間夫明王不興而天下其孰能宗豫豫殆將死也寢疾七日而沒檀弓夢講東堂後漢周磐年七十三謂子曰吾丨先師東里先生與我丨於東丨之奧既而長嘆豈吾齒之盡乎其月卒本傳夢見朱羆晉春秋云平公疾夢朱羆窺屏左氏亦載此事而云黃羆入門夢遇白雞謝安疾篤悵然謂所親曰昔吾夢乘溫輿行十六里見一白難而止乘溫輿者代其位也十六里今十六年年白雞主酉今太嵗在酉吾疾殆不起乎尋薨夢論大衍李適嘗丨與人丨丨丨數寤而曰吾夀盡此乎夢書白駒唐杜牧夢人告曰爾應名畢復夢書皎皎白駒字或曰過隙也俄而炊甑裂牧曰不祥也自為之志悉取所為文章焚之果卒夢懷瓊瑰魯公孫嬰齊號聲伯初夢涉洹或與之瓊瑰食之泣而為瓊瑰盈其懷從而歌之曰涉涇之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎不敢言三年言之暮而卒本傳夢應玉符唐貞元中司勳郎中李朝歸第夢二黃衫人引至戶外中有人曰未至須玉魚符下也後朝當龍尾道上見一玉魚把玩至家數日卒戎幕間談夢山流金李虛中將疾謂其友韓愈曰吾夢泰山裂流出赤黃物如金左人曰是所謂大還者虛中既歿愈追占其夢曰山者艮為背裂而流赤黃疽象也大還者其告之矣韓李虛中墓銘夢燈遍城廣守數人連卒多先丨丨後作守夢燈丨郡丨未幾果卒見聞雜録夢桑知數丁固夢井中生桑以問趙直答曰桑文四十八字君夀恐不過此果然佩觹集夢棗知卒王子堇善占夢有人夢丨堇曰棗字重來來來呼魂之貌其人果卒酉陽雜爼夢人與絹南史沈慶之臨賜死時年八十夢有人以兩匹絹與之曰此絹足度寤而謂人曰老子今年不免矣兩匹八十尺也足度無餘也本傳夢女篩豆王師伐金陵城將破或夢女子行空中以巨篩篩物散落如豆著地皆成人問其故曰此當死於難復見一貴人盛冠服墮於地云此徐舍人也既寤聞鍇死圍地中後王平甫和篩字韻詩云當時徐氏擅筆墨夜圍夢墮空中篩謂此西京雜記夢鳳集拳有孫氏求官丨雙丨丨其兩丨以問卜者曰鳳非梧桐不栖非竹實不食卿當大凶非苴杖則削杖苴杖竹削杖桐後孫氏果遭母喪集異記夢臼炊飯有客張贍將軍夢炊臼中問解夢者王生王生言君歸不見矣臼中炊無婦也及歸其妻果卒歲辰之䜟鄭𤣥字康成夢孔子告之曰起起今年丨在丨明年歲在已既寤以䜟合丨知命當終注䜟云歲在龍蛇賢人嘆本傳月酉之應晉文王司馬為魏國相蜀譙周書版示文王曰典午忽兮丨丨沒兮典午謂司馬月酉為八月文王果卒周傳月犯少微晉時有丨丨丨丨星一云處士星占者曰隱士當之戴逵有美才士人憂之俄而卒晉書月掩畢口五代張希崇字德舉為將不喜聲色頗知星厯天福三年丨丨丨丨大星希崇歎曰畢口大星邊將也我其當之正月卒本傳月蝕東壁開元中燕公為左丞相集賢學士將薨而丨丨丨丨鄴侯傳星殞寢室令狐楚卒之夕有大丨丨於丨丨之上其光燭庭星流營中諸葛亮據五丈原與司馬宣王相持百餘日丨丨赤而芒角自北西南丨於亮丨三投再還往大還小俄而亮卒諸葛亮卒於軍楊儀等整軍而出百姓奔告宣王宣王追焉姜維令儀反旗鳴鼓若將向宣王者宣王乃退儀結陳而去百姓諺曰死諸葛走生仲達司馬懿與諸葛亮相拒於五丈原㑹亮卒諸將燒營遁走經日按行其營壘乃曰天下竒才也史星見豫分祖逖傳初有妖丨丨於丨州之丨逖見星曰為我矣方平河北而天欲殺我此乃天不祐國也俄卒天降玉棺葉縣令王喬天下一玉棺於㕔前喬謂人曰天帝召我沐浴寢其中葬於城東風俗天成玉樓李長吉將死時忽畫見一緋衣人駕赤虯持一版書若太古篆或霹靂古文者云當召長吉長吉了不能讀歘下榻叩頭言阿㜷長吉學語時呼太夫人老且病賀不願去緋衣人笑曰上帝成白玉樓立召君為記天上差樂不苦也長吉獨泣邉人盡見之少之長吉氣絶常所居窗中㪍㪍有煙氣聞行車嘒管之聲太夫人急止人哭待之如炊五斗黍久時長吉竟死李商隱作小傳鵩鳥止座賈誼為長沙王𫝊有鵩飛入誼舍乃為賦以自廣曰單閼之歲四月孟夏庚子日斜鵩集豫舍止於座隅貌甚間暇本傳蝙蝠繞庭李禪居廣陵晝匆有白丨丨丨丨而飛出院門又出中門至外門不見其年禪妻卒軟車出即蝙蝠飛翔處也稽神録雷鳴炊釜宋滕景直家在廣州炊釜中有聲如雷家人走視甑上花生漸長似蓮花而赤色俄頃萎景直旬日卒古今五行紀風吹竈突後漢方伎李南女傳父風角術為人妻晨詣㸑室卒有暴風婦便求歸辭二親姑不許乃跪曰家世傳術疾丨卒起先丨丨丨及井此禍為主㸑者妾將亡之應乃如期而卒李南傳畫蛇盤鏡袁叔遇異人得書云每受一命即開一幅纍任皆驗一日晨起巾櫛一物墮鏡中如蛇有四足驚而疾數日卒留書書尚多妻開視之皆空紙也最後一幅丨丨丨丨中而已前定録石兔刻文周長孺字士彥為共成縣令獵近郊有兔起草間自射中之即其處不復見兔有石刻文曰士彥當都而卒後士彥每至京師必遽歸後治平日以都官員外郎卒聞見録食羊將滿李德裕南行召一僧問休咎僧曰當還相公平生當食萬羊今食九千六百矣所以當還積旬日振武軍節度使饋羊四百公大驚召僧告其事僧告曰萬羊將滿公不還乎公曰吾不食之亦可免否曰羊至此已為相公所有後連貶崖州竟沒不還宣室志食魚得病邢和璞居嵩潁間有潁陽書三篇房琯問邢終身之事邢言降魄之庭非館非寺病起於魚飱而休於龜兹板其後房公舍閬州紫極宫見有治龜兹板者始憶邢之言有頃刺史具鱠邀房房悟具以板事白於刺史其夕果病鱠卒西州石折蜀武擔石折文翁曰丨丨丨丨智士死當㑹子孫設酒食後三日卒本傳城樓煙出潤州城南有丨名萬歲樓俗傳樓上丨丨刺史必死不死則貶開元後董琬為採訪使居此州盡日煙出刺史憂愁而死乾元中又煙出有吏密伺之就視乃蚊子樓中有井小蟲黑色而小作團而上遙看類煙從此無慮太平廣記諺傳冰稼唐天寶中諺曰冬凌樹稼達官怕其年冰稼而寧王卒熙寧三年草木皆稼衆謂大臣當之未數日韓琦卒青箱雜記詩定破瓜吕仙翁有詩與張洎言將作鼎鼐之句其句云功成當在破瓜年俗以破瓜為二八字洎六十六而卒乃悟談苑洞賔與錢吕丨丨丨黃覺大丨七文其次十文又小錢三文曰數不可過也覺至七十餘作詩有牀頭歷日無多子屈指明年七十三之句果以是歲終貢父詩話狀元投刺前進士楊通與楊置丨丨相善置丨丨自稱龍首山人慶厯中登第而卒後人解曰龍首狀元也山人無祿之稱也括異志空中甲馬富韓公元豐六年疾病五日火星殞於公所居還政堂下丨丨如甲馬聲公登天光臺焚香再拜知其將終也邵氏聞見録山中旗鶴邵康節一日晝睡覺言曰吾夢旌旗鶴鴈自空而下導吾行亂山中吾神往矣無以藥相逼也王雩復見張靖言荆公在金陵未病前一嵗白日見一人上堂再拜乃故郡牧吏其死也已久矣荆公驚問何故來吏曰蒙相公恩以待制故來荆公愴然問雩安在吏曰見今未結絶了如要見可於某夕幕廡下切勿驚呼唯可令一親信者在側荆公如其言頃之見一紫袍博帶據案而坐乃故吏也獄卒數人枷一囚自大門而入身具桎梏曵病足立庭下血汚地呻吟之聲殆不可聞乃雩也雩對吏云告早結絶良久而滅荆公幾失聲而哭為一指使掩其口明年荆公薨靖公門人其說甚詳談圃傅霖來訪張乖崖少與逸人傅霖同學公既顯達求霖三十八年不可得有憶霖詩云寄語巢由相笑此生終不羡輕肥晚年守宛丘有被褐騎驢扣門大呼曰語尚書青州傅零閽吏走白公曰傅先生天下士汝何人斯呼姓名霖笑曰别子一世尚爾童心是豈知世間有我哉公問昔何隱而今出霖曰豫將去矣來報子爾公曰詠亦自知之霖曰知復何言後一一月薨而清詩話雷電晦冥劉元城器之死時忽大風飛瓦驟雨如注雷電畫晦於公正寢人皆駭懼而走及雨止辨色公已終矣聞者咸異焉言行録溪流泛漲晦菴先生朱熹以建炎庚戍生以慶元庚申三月薨於考亭所居之正寢足歲春先生故宅之前其山絶頂有數百年合抱之木一株勢干雲霄一旦忽為巨風所拔夏六月溪流大漲素所未有宅前之岸為洪濤捲去數百尺作神箕尾列星傅說乘東維騎丨丨而比於丨丨東維箕斗之間天漢津之東維也傅說死其精神乘東維託龍尾乃列神尾上有傅說星廣桑真官唐韓滉亷問浙西嘗有不軌之志有李順夜漂船不知所止及明泊一山下上岸見一烏巾古服引詣一宫有人自簾中語曰欲寄金陵韓公一書順得書受之出門因問贊者曰此為何處恐韓公問是何人致書曰東海丨丨山也是魯國仲尼得道為丨丨理於此韓公即仲由也性強夫子恐其掇刑網致書諭之順還投書韓公發視之九文九字皆科斗之書不可曉詰問其由以為妖妄訪能篆籕者有一客龎眉古服自詣言識古文韓公以書示之捧書賀曰此孔宣父科斗之丈也曰告韓滉謹臣節勿妄動客出門不見韓了然自憶克保終始神仙感遇集帝宸侍中侍丨丨有八人徐庶龎德爰愈李廣王嘉何晏解結殷浩如世之丨丨是北大帝之官陶隱居真話太極圍編丨丨真仙中莊周為丨丨郎同上孔升真人唐明皇移入大內玩紫玉簫吹數聲有雙鶴下於庭上皇曰吾受上帝為元始丨丨丨丨笛可送與大牧大牧代宗小字也俄崩楊妃傳北斗主簿許收夢烏衣吏奉六封書曰府君當為北斗君陳康伯為主簿既覺陳康伯來謁收曰我作道師死不過作社公今得北斗主簿余為忝矣明年同日而卒幽𡨕録天宫修門洞丨六丨人死皆至其中宫一門有二亭長四丨丨郎一天門凡八修門郎顔淵卜商今居此職又云紀瞻為天北修門郎代田録為之陶隱居真話地下修文蘇韶既死而蘇弟節問地下事韶云顔淵卜商丨丨為丨丨郎王隱晉書王屋道君許吉過丨丨山見丞相龎公道服從三四童而行吉詢童曰此丞相龎公乎童曰然吉曰何故逰此曰公作王屋山丨丨治此山也青瑣靈芝仙官王平甫在朝一夕夢至水殿榜曰丨丨宫邀平甫曰欲與之俱往有人隔水止之曰時未至它日迎之平甫恍然夢覺禁中已鳴鐘矣平甫每自負為詩曰萬頃波濤木葉飛笙簫宫殿號靈芝揮毫不似人間世長樂鐘聲夢覺時後四年平甫卒其家卜之曰吾嘗夢往靈芝宫果然乎卜曰然又三年曽阜夢與平甫㑹傍一人曰平甫已列丨丨矣東軒筆録芙蓉城主石曼卿卒後有人見之者恍惚如夢言我今為仙所主丨丨丨欲其人與逰不得忿然乘一青騾去如飛歐公詩話芙蓉館主慶厯中有朝士晚赴朝見美女二十餘兩兩並馬而行觀之丁度按轡於後朝士驚問有一人最後曰迎丨丨丨丨俄聞丁卒括異志長白山主歐公子仲純嘗與東坡說吾夢道士持吾吾授上帝命汝為丨丨丨丨者何祥也後一年純父卒坡集遮須國王劉聰有子約死後蘇言見其祖元海在不周山謂約曰東北有遮須國無王待汝父為之汝父三年當來約辭歸道過二國倚尼渠國與約皮囊一枚曰為吾遺漢皇帝約歸置皮囊於几上俄而蘇取皮囊開之有一方白玉題曰倚尼渠國天王敬訊丨丨夷丨天丨歲在攝提當相見也北史上帝司糾吕誨為御史出知安陸一日燕坐忽見碧衣人云非久上帝南遊炎洲命子為紏正羣仙賜公清涼丹一粒吞之不見公捐館朱明復渡湘見公乘玉角青鹿左右數百人明復拜曰公已仙乎公曰吾待丨丨南逰口占一篇落句云我今從帝為司紏更有何人值柏臺數日間謝世古今詩話淮陽上神田畫字丞君陽翟人其人物雄偉議論慷慨知淮陽軍一日小疾不出覃之人盡見丞君擁騎從騰空而去就問之死矣或曰為丨丨丨丨云邵氏録閻浮提王冦萊公有妾蒨桃隨南遷再移光州蒨桃泣曰妾前世師事仙人為俠今將别去敢有所托願葬杭州天竺寺萊公諾曰吾去非久也何之桃曰吾向不言恐泄陰理今欲去言非無害公當為地下主者浮提王也公不久亦亡有王克勤見公於曹州境上擁驢北去克勤詢後騎曰公何往曰丨丨丨丨交政也果為閻羅王矣翰府名談隋時韓擒虎有人疾篤匆驚走至擒虎家我欲謁王左右問曰何王曰閻羅王子弟欲撻之擒虎止之曰生為上柱國死作閻羅王亦足矣因寢疾而卒本傳更生如來故德陽縣男虞祺字齊年起陵州諸生中初不知佛書也每曰誠者天之道也思誠者人之道也其至則一也吾知此而已矣間屬微疾憑几不言忽顧坐客曰古佛俱來吾亦去矣男子允文旁立泣下又笑曰人而為佛寧不可哉即云已逝矣明年陵州民鮮述者病死一晝夜再生具言初為黃衣追去遇故里中曹生曰卿之大人虞君生吏事當為更生佛亟見之前抵宫室王者冕服正坐虞君也更問述為善狀述欣力貧但至丸屋山見辟支佛瑞色甚勝得釋去王再語述過語吾家廣置更生佛道場誦更生佛名號忽白光自王身起直大觀闕黃金書榜大慈大悲丨丨丨丨述灑然而悟即闕後録五相清燕府張澤民死十日復生自云至一處若瓊瑶世界有堂高隆金牌曰丨丨丨丨之丨澤民問其守門吏曰五相可得聞乎曰吕相夷簡李相迪劉相沆龎相籍富相弼也翰府名談九江真人府元豐間于立禮舟至落星寺舟沒立禮為人導至一官府有牌曰三江都水使者丨丨丨丨立禮算未終令速送出門詢吏曰九江真人誰也曰大丞相劉沆也同上遺言屬以其子秦康公送公子雍於晉曰文公之入也無衛故有吕郤之難乃多與之徒衛穆嬴靈公母日抱太子以啼於朝出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何宣子與諸大夫皆患穆嬴且畏逼乃背先蔑而立靈公文七年命嫁其妾晉魏武子有嬖妾無子命顆曰必嫁是疾病則曰必以為殉乃卒顆嫁之曰疾病則亂吾從其治也託以身後後漢申屠蟠字子龍陳留人與濟隂王子居同在太學子居臨卒以身託蟠蟠乃躬推輦車送喪還鄉里遇司𨽻從事義之為封傳護送蟠不肯受投傳於地而去注傳符諜也屬以葬具盧殷能詩為登封尉將死自為書告留守與河南尹乞葬已又為詩與常所往來河南令韓愈曰為我具棺留守尹為具凡葬事韓愈為買棺又為作銘令市棺具後漢博士郭鳯好圖䜟先自知死期令弟子市棺之具至其日而終方術傳廣漢折像自知亡日召賔客九族飲食辭訣命致石刻趙岐初名嘉生於御史臺因名臺卿年三十有重疾自慮奄忽乃遺令勑兄子曰可置一員石於墓前刻之曰漢有逸人姓趙名嘉有志無時命也奈何其後疾瘳又墓志門命葬桐鄉前漢朱邑字仲卿病且死屬其子曰我故桐鄉吏其民愛我汝必葬我桐鄉後世子孫奉我不如桐鄉民囑葬陶家鄭泉字文淵性嗜酒臨卒謂同類曰必葬我陶家之側庶百歲之後化而成土幸見取陶壺實獲我心吳志命送陀林僧從諫卒遺言送尸於建春門外尸陀林施與鳥獸為食三日後人往視之體貌如生林在王舍城側死人多送其中三水小牘付金托友唐李勉少貧與諸生共逆旅且死出白金曰幸君以此為我葬餘則君自取之勉密置餘金棺下後其家謁勉共啓墓出金付之分香與姬曹操持姬女而指季豹以示四子曰以纍汝因泣下又云餘香可分與諸夫人諸舍中無所為學作履組賣也吾歷官所得綬皆著藏中吾餘衣裘可則為一藏不能者兄弟可共分之留術付之范文正公仲淹少極貧悴常與一術者逰病甚告文正曰吾有煉水銀法兒幼不足以付今以方授子并白銀一斤內文正懷中後為諫官術者之子已長取其方及白金授之封識宛然遺戒訓家宋景文公丨丨云吾歿之後稱家有亡以治喪用浣濯之衣鶴氅裘紗帽線履三日棺三月葬慎無為流俗陰陽拘忌也棺用雜木漆其四㑹三塗即止使數十年足以臘五骸而已吾學不名家文章僅及中人不足垂後為吏在良二千石下非著數人無功於國無惠於人不可請諡不可受贈典不可求巨公作碑志不可作道佛二家齊醮汝等不可違命違命作之是以吾死為無知也趙槩聞見録遺書立言不朽晉平公謂叔孫豹曰曰魯先大夫臧文仲其身歿矣其言立於後世此之謂歿而不朽國語作書未成桓談著新論琴道一篇未成肅宗使班固續成之仲長統作昌言未竟而亡後董襲撰次之陸平原臨亡曰窮通時也遭遇命也古人貴立言以為不朽吾所丨丨丨丨以此恨耳上封禪書漢司馬相如既病免居茂陵天子曰相如病甚可往悉取其書使者往而相如卒妻曰長卿未死時有一卷書曰有使者求書奏之乃遺札言封禪事求孔融文魏文帝深好孔融文詞每歎曰楊班儔也募天下有上孔融文者賞以金帛遺忠盡忠公室李文子卒無衣帛之妾無食粟之馬無藏金無重器備君子是以知季文子之忠於公室相三君而無積可不謂忠乎不忘社稷楚子囊死遺言謂楚子必城郢郢楚所徙都未有城郭君子謂子囊君昏不忘增其明將死丨丨衛丨丨可不謂忠乎左將死薦賢見交代門注臨終憂國王文度坦之為中書丨丨與謝安桓沖書言不及私惟丨丨家之事已死得書魏徴既死太宗使人至其家得書一紙始半藁其可識者天下之事有善有惡任善人則國安用惡人則國敝公卿之內情有愛憎憎者惟見其惡愛者惟見其善愛憎之間所宜詳審太宗曰朕恐不免斯過公卿侍臣可書於笏疾革抗表房元齡寢疾謂諸子曰當今天下靖謐咸得其宜惟東討高麗不止方為國患主上含怒意決臣下莫敢犯顔吾知而不言則銜恨入地遂抗表諫太宗曰此人危惙如此尚能憂我國家事唐史張南軒栻疾革親書遺表云臣再世蒙恩一心報國大命至此厥命無繇猶有微誠不能自已伏願陛下親君子逺小人信任防一已之偏好惡公天下之論則臣死之日如生之年遺思思法孝直蜀法正死先主征吳羣臣諌不從及敗績亮曰法孝直若在能制主上令不東行就復東行必不傾危思檀道濟宋檀道濟文帝時為司空有威名及見枚道濟目光如炬曰乃壞汝萬里長城魏人聞之曰道濟已死矣吳子不足復復憚頻嵗南伐有飲馬長江之志及魏軍至瓜步文帝曰若道濟在豈至此念岑文本唐太宗將伐遼凡有籌度悉委岑文本至幽州卒其夕太宗聞嚴鼓之聲曰文本殞逝情深惻怛今宵夜警所不忍聞命停之優禇無量禇無量卒帝聞悼痛詔宰相曰無量朕師今其永逝宜用優典於是贈禮部尚書嘆魏徴亡唐太宗遼東之役李績等力戰破之軍還悵然曰魏徴若在此吾豈有此行耶帝後臨朝嘆曰以人為鑑可明得失今魏徴逝一鑑亡矣惜楊綰死楊綰薨帝深悼之顧謂侍臣曰天不使我致太平何奪我楊綰之速遺愛九京武子趙文子與叔向逰於九京曰死者如可作也吾誰與歸其隨丨丨乎納諫不忘其師善言不失其友事君不援而進賢不阿而退不肖也國語南國召公甘棠美召伯也召伯之教明于丨丨蔽芾甘棠勿剪勿伐召伯所苃人皆流涕子産相鄭二十年卒國人哭於巷農夫傾郊野哭商人罷市而哀流涕三月不聞琴瑟之聲童不歌謡秦五羖大夫百里奚卒秦人流涕丨子丨丨丨舂者不相杵文選注百姓圖像豫州丨丨皆丨畫陳仲弓元方季方三君之形丨先賢行狀四州哀哭梁安成康王秀為南徐江荆郢刺史及薨丨丨人裂裳為白帽丨丨以迎送之百姓罷市司馬溫公薨丨丨丨丨而往弔粥衣而致奠巷哭而過車道以萬千數而京師民畫其像刻印鬻之家置一本飲食必祝焉四方皆遣人求之京師時畫工有致富者遺業家無餘財宋穆字公叔祿仕數十年蔬食布衣丨丨丨丨官無留資程异身沒丨弟丨丨丨世重其亷本傳不增田廬人勸疏廣為子孫立産業置田宅廣曰吾豈不念子孫哉顧自有舊田廬子孫勤力其中可以共衣食賢而多財則損其志愚而多財則益其過且富者衆之怨也吾既亡以教子孫不欲益其過僅有桑田諸葛日表後主曰成都有桑八百株薄田十五頃子弟衣食自有餘饒至於臣在外任旡别調度衣食唯仰於官不别治生以長尺寸臣死之日不使內有餘帛外有贏財以負陛下及卒如所言田園分子姚崇先分其田園令諸子侄各守其分仍為遺令曰比見諸達官身亡以後子孫既失覆䕃每至貧寒斗尺之間參商是競陸賈石苞皆古之賢達也所有預為定分將以絶其後爭吾靜思之深所嘆服奉廪賙親薛戎悉丨丨丨濟內外丨既病以所有分遺之曰吾死矣可持為歸資衆皆哭而去貪無産業橋𤣥字公祖為太尉久病卒家貧乏産業無所殯惟存圖書冲子陵及亡其家所存惟圗書及酒數斛而已大帖詩集水窮天盡李續長源一日忽有人在床下誦詩曰行到水丨處未知丨丨時續斥曰誤矣豈非坐看雲起時耶答曰此雲安能起兹必死期故來相别數日而卒古今詩話雲穿雪壓廖融作詩曰丨丨搗藥屋丨丨釣魚舟白解曰屋破雲穿其中無人也船為雪壓無用後六十日卒撫遺醉臥花間何中正初及第聞郭從周精卜求占從周贈詩一首云三字來時月正圖一麾從此出秦關錢塘春色濃如酒貪醉花間臥不還公後以八月十五日改知制誥出秦州又改知杭州而卒翰苑名談醉臥藤陰秦少游在處州夢中作好事近詞云山路兩添花花動一山春色行到小溪深處有黃鸝千百飛雲當而化龍蛇夭矯掛碧空丨丨古丨丨下杳不知南北後南遷久之北歸逗留於藤州光華亭方醉起以玉盂汲泉笑視溪而死冷齊夜話古今合璧事類備要前集卷六十三
