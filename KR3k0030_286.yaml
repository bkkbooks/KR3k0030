body:
  text: 古今合璧事類備要别集卷八十宋謝維新撰走獸門猩猩附􅢈􅢈猓􅛊獸格物總論猩猩猿形人面頭顔端正毛翠色能與人言又能知人姓名及人先世名字與人家往事在山谷間數百為羣聲如小兒啼獵者多以酒醉之而後獲夷人取其血染毛罽色鮮不黯字亦作往􅢈􅢈亦獼猴形人面紅赤色身黑毛有尾無膝睡常倚物反踵髮極長作人言如鳥聲能知生死極多力負可千斤迅走食人飲其血使人見鬼里人以其血染緋髮可為髲然見人則笑笑即上唇掩目獵者嘗用竹筒穿臂以授之彼執臂輒笑人因自筒中出手以鍊鐶之於樹故可得字或作狒亦名梟羊亦曰山都猓􅛊亦如猿猴人面白質毛如蒼鴨尾長過其頭鼻孔向天雨注則以尾塞鼻其名自呼肋邊毛長而且溫堪作褥疑亦同類也事類哀牢夷出後漢丨丨丨丨猩猩形若狗而人面頭顔端正善與人言聲音妙麗如婦人對語昔有以餉封溪令令問餉何物猩猩自於籠中曰但有酒及僕且無他飲食裴炎猩猩銘酈道元水經注云武平封溪縣有獸曰猩猩猿形人面顔容端正學人語若與交聞者無不欷歔其肉食之窮年無厭可以辟榖淮南子曰猩猩知往而不知來謂知人家往事及祖父名位阮汧云使封溪見邑人云猩猩在山谷間常有數百為羣里人以酒并糟設於路側又愛著屐里人織草為屐更相連結猩猩見酒及屐知里人設張則知張者祖先姓字及呼名云奴欲張我捨爾而去復自再三相謂曰試共嘗酒及飲甘味逮乎醉因取屐而著之乃為人之所擒皆獲輒無遺者遂置檻中隨其所欲而飲之將烹里人索其肥者乃自推肥泣而遣之左太沖吳都賦曰猩猩啼而就烹里人以餉封溪令令曰何物曰猩猩惟與酒兼之以屐可以就擒耳西國胡人取其血染毛罽色鮮不黯或曰或刺其血問之爾與我幾許猩猩曰二升果足其數若加之鞭捶而問之隨所加而得至於一斗弗如此未肯頓輸張薦孝廉好古之士於笥中出此圖相示賔客覽之曰悲哉此獸何其愚也有僧去塵在座謂諸賔客曰彼獸也夫何足云竊見人而似之曽無悟矣四座引而問之曰夫財色名利溺人也曷若猩猩好酒乎爵賞祿位羈人也曷若猩猩愛屐乎叨餮致禍飾辭覬免者曷若猩猩推肥乎藴利生孽死而無悔者曷若猩猩含血乎子奚獨悲此諸賔矍然改容而歎曰大哉髙人之言也豈務世利汨沒名位者之所聞乎敬篆斯言以為座右銘其銘曰李爾形惟猿爾面惟人言不忝面智不踰身淮隂佐漢斯相秦曷若箕山以全吾身􅢈􅢈西波尸進宋孝建中獠子以丨丨丨地高城郡安西縣主簿韋文禮進雌雄二頭宋帝曰吾聞􅢈􅢈能負千鈞若既力如此何能致之彼土人丁鑾進曰􅢈􅢈見人喜笑則下唇掩其額以釘著額任其奔馳候死而取之髮極長可為頭髲血堪染鞾其毛一似獼猴人面紅赤色作人言鳥聲善知死生飲其血使人見鬼帝聞而欣然命工圖之郭璞􅢈􅢈贊􅢈􅢈怪獸被髮操竹獲人則笑唇蓋其目終亦號咷反為我戮猓􅛊交州猓􅛊丨丨有丨丨獸南州異物志詩集醉魂在愛酒丨丨丨能言機事疏平生幾兩屐身後五車書物色看王會勳勞足石渠拔毛能濟世端為謝楊朱黃魯直和錢穆父詠猩猩毛筆巧言語桄榔葉暗檳榔紅朋友相呼墮酒中政以多知丨丨丨故應來作管城公戲詠猩猩毛筆二首奉錢穆父束縛歸來明窗脫帽見蒙茸醉著青鞋在眼中丨丨丨丨儻無辱逢時猶作黑頭公奉子瞻並前人􅢈􅢈穿筒挌􅢈􅢈丨丨丨鼠附竹𪕋格物總論鼠小獸善為盜族類不一有家鼠有鼬鼠有鼫鼠有鼨鼠有齕鼠有鼴鼠有蚡鼠有鼯鼠有鼷鼠有天鼠天鼠即伏翼鼷鼠狀如小狐伯勞化地中行食煙火􅀈毒及人鳥獸皆不痛今之甘口鼠乃微乎微者鼯鼠五技能飛不能上屋能緣不能窮木能浮不能渡谷能穴不能掩身能走不能先人鼺鼠亦飛鼠兔首鹿耳其音如􅀈犬以其尾飛故名丹重山有之鼴鼠隱鼠也無尾黑色長鼻甚強常穿鑿地中行亦名蚡扶粉反齕鼠穴居飲泉囓竹鼨鼠豹文鼠也鼫鼠能人立前兩腳於頭上跳舞善鳴食人禾稼逐則走入窟中亦有五技或謂崔鼠今河東有之鼬鼠性多豫家鼠多藏於瓦屋下晝伏夜動最為人所憎疾者皆陰類鬼物也其他有火鼠入火不焚毛長丈許可為布所謂火浣布是南蕃有之水鼠入水不溺捕魚而食竹𪕋又食竹根鼠腰腹大如盎所在深山有也亦不難捕貂亦鼠也毛可為裘亦作鼦事類似鼠臧武仲謂齊景公曰抑君丨丨晝伏夜動不穴於寢廟畏人故也左若鼠碩鼠賴貪也刺其君蠶食於民貪而畏人丨大丨也詩食牛角鼷鼠丨郊丨丨春秋遇鵷雛見鵷雛門如鼠自處李斯少時為郡小吏見吏舍厠中鼠食不潔近人犬數驚恐觀倉中鼠食積粟居大廡之下不見人犬之憂乃嘆曰人之賢不肖譬丨丨矣在所丨丨耳掘鼠掠治張湯其父為長安丞出外湯為守舍而鼠盜肉其父還怒乃笞湯湯丨隧得盜丨及餘肉劾鼠丨丨傅爰書訊鞠論報并取鼠與肉具獄磔堂下其父見之視之文辭如老獄吏大驚遂使書獄本傳臧洪掘鼠丨丨為太祖所囚糧乏乃丨野丨而食魏志蘇武掘鼠丨丨使胸奴牧羝海上廩食不至乃丨野丨草實而食之本傳以爾雅對竇攸治爾雅舉孝廉為郎世祖與百僚大會時買得鼠身如豹文問羣臣莫知惟攸對曰名鼨鼠見爾雅竇氏家傳以囓鞍聞公子蒼舒早慧時軍國多事用刑嚴重太祖馬鞍在庫為鼠所囓庫吏懼罪必死議欲面縛首罪猶慮不免沖謂曰待三日中然後自歸沖於是以刀穿單衣如鼠囓者繆為失意貌有愁色太祖問之沖對曰世俗以為鼠囓衣者其主不吉今衣見囓是以憂戚太祖曰此妄言耳無所苦也俄而庫吏丨丨丨丨太祖笑曰兒衣在側尚囓況馬鞍懸柱乎一無所問我復何道中山王周南正始中為襄邑長有鼠衣冠出廳事語曰爾某日當死周南不應至期復出冠幘絳衣語曰爾日中當死復不應入後更出日適中鼠曰周南汝不應死丨丨丨丨遂顛蹶而死即失衣冠視如常鼠也列異傳視以為佳晉簡文為撫軍時床上塵不聽拂見鼠行迹丨丨丨丨有參軍見鼠白日行以手板批殺之撫軍不恱門下起彈教曰鼠被害尚不能忘懷今復以鼠損人無乃不可乎世説作字殺鼠晉淳于智善厭勝劉柔夜卧鼠囓其左手中指智曰是欲殺君而不能當為君使其反死乃以朱書手丨田丨使露手卧明旦有大鼠伏死于前作符召鼠許邁小名映有鼠囓映衣乃丨丨丨丨莫不畢至於中庭映曰囓衣者留不囓衣者去羣鼠並去惟一鼠獨住伏於中庭而不敢動别傳前腳捧朱景平中東陽大水永康蔡喜夫避水住南龔有鼠浮水來伏望喜夫奴牀角愍而不犯每以食與之退喜夫退居鼠丨丨丨紙裹三片許丨著奴前啾啾如欲語也異苑剖腹有贓南陽趙度好藝術度有白米為鼠所盜乃被髲以刀畫地作獄四面開門向東長嘯羣鼠俱至呪之曰凡非噉者過惟止者十餘乃丨丨丨丨有米在焉述異記銜炷燒幡祗園精舍燒香燃燈續明日夜不絶鼠丨丨丨丨蓋精舍都盡釋法顯仙遊本紀白質歸命王孝傑為清邊道總管初進軍平州白鼠晝入營頓伏皆謂鼠精胡象也丨丨丨丨天亡之兆及戰乃孝傑覆焉孔氏帖王敦亡兆黃君漢為密守柏崔義元見羣鼠渡河曰此丨丨丨丨也因説君漢以城歸同上銜尾以渡李密將敗屯營羣鼠相丨丨丨丨於洛經月不絶擁杖而號路敬潛為遂安令到官鼠數十走於前左右驅之丨丨丨丨蘇徴失窟唐丨丨任汜水縣令舉止輕薄郎中張元一目為丨丨鼠朝野僉載髙駢走穴黃巢進取陜虢檄關戍曰吾道淮南逐丨丨如鼠丨丨爾無拒我孔帖貓鼠同乳朱泚軍中丨丨丨丨祐甫曰可弔不可賀崔祐甫傳貓鼠同處龍朔元年涪州丨丨丨丨鼠隱伏象盜竊貓職捕囓而反與鼠同象同盜者廢職容姦五行志焚符斷鼠僖宗末廣陵丐者杜可均嘗大雪訪街西酒家姓樂者求飲見主事者曰人以衣襖換酒收藏不謹鼠囓其衣杜即令治淨室曰頃年記一符能却鼠試書之既有驗可書此室永無鼠矣主得符焚之遂絶桂苑叢談以物擊鼠李林甫將病一目取書囊訝其重開而視之乃一大鼠躍出化為蒼犬怒目張牙仰視林甫乃丨丨丨之鼠即應手而斃林甫惡之月餘而卒孔帖灌穴殺鼠見貓門詳貓為鼠囓𢎞道初梁州倉有大鼠長二尺餘為貓所囓數百鼠反囓丨少頃聚萬餘鼠州遣人捕擊殺之餘皆去五行志蛇為鼠傷景雲中有蛇鼠於右威衛營東衙槐樹丨丨丨所丨鬬者兵象同上鼠亦燒尾竇璠久不第晚娶宇文翊女遂登科時杜尚宅遺災云因鼠尾戔火而作韋詵因謂璠曰魚將化龍雷為燒尾近日丨丨有丨丨者璠大慙瑣言鼠三易腸唐公房舉宅升仙雞犬皆去惟鼠惡其不淨不將去丨自悔一月丨吐丨其丨束廣微所謂唐鼠博物志殿前鏦事李知微宿文昌宫月微明見古槐下有小鼠數十或稱丨丨丨丨或曰馳道都尉或曰司城主簿或曰西閣舍人須臾入一大穴中明日掘視之乃鼠也唐小説子孫不肖五代南漢主劉龔病召右僕射王翻語曰吾丨丨丨丨後世如鼠入牛角勢漸小耳因泣下欷歔盧元明劇鼠賦爾雅所載厥類多種詳其容質皆不足重或處野而隔隂山或同穴而鄰嶓冡或飲河以求飽腹或吸煙而遊森聳然於今者之所論出於人家之壁孔嗟乎在物最為可賤毛骨莫充於玩賞脂骨不登於爼膳故淮南輕舉遂嘔腸而莫追東阿體拘徙稱仙而被譴其為狀也􅉃惔􅀈盱睢離睒者多姦睗中無鬢如麥芒半垂眼如豆角中劈乃有老衆敵託社忌器妙解自惜深藏厚閉巧能推覓或尋繩而下或自地髙擲登杌緣緣蕩扉動帟忉忉終朝轟匱竟夕是以詩人為辭實云其碩盜於湯之珍爼傾留麾之香澤傷繡領之新製毁羅衣之重襲曹舒由是獻規張湯為之被謫亦有間居之士倦遊之客絶弔慶以養真素擯左右而尋詩易庭院肅清房櫳虛寂爾乃乘間東西攛擲或床上捋髭或户間出額貌甚舒暇情無畏惕又領其黨欣欣奕奕欹覆箱奩騰踐茵席共相侮慢特無宜適天壤之含𢎞産此物其何益蘇子瞻黠鼠賦蘇子夜坐有鼠方囓拊床而止之既止復作使童子燭之有橐中空嘐嘐聱聱聲在橐中曰嘻此鼠之見閉而不得出者也發而視之寂無所有舉燭而索中有死鼠童子驚曰是方囓也而遽死耶向為何聲豈其鬼耶覆而出之墮地而走雖有敏者莫措其手蘇子嘆曰異哉是鼠之黠也閉於槖中槖堅而不可穴也故不囓而囓以聲致人也不死而死以形求脫也吾聞有生莫智於人擾龍伐蛟登龜狩麟役萬物而君之卒見使於一鼠墮此蟲之計中驚脫兔於處女烏在其為智也坐而假寐私念其故若有告豫者曰汝惟多學而識之望道而未見也不一于汝而二于物故一鼠之囓而為之變也人能碎千金之璧而不能無失聲於破釡能摶猛虎而不能無變色於蜂蠆此不一之患也言出於汝而忘之耶豫俯而笑仰而覺使童子執燭記豫之作陸龜蒙稻鼠賦乾符己亥歲震澤之東曰吳興自三月不雨至於七月常時汙坳沮洳者埃壒坌勃棹楫支派者入扉屨無所汚農民轉逺流漸潤稻本晝夜如乳赤子欠欠然救渴不暇僅得葩折穗結十無一二焉無何羣鼠夜出囓而僵之信宿食殆盡雖廬守板擊驅而駭之不能勝苦官督户責不爾者有刑當是而賦索愈急束榜箠木頸者無壯老吾聞之於禮曰迎貓為食田鼠也是禮缺而不行久矣田鼠知之復集作紱歟物有時而暴歟政沓貪而廢歟國語曰吳稻蟹不遺種豈吳之土鼠與蟹更伺其事而效其力殱其民歟且魏風以碩鼠刺重斂碩鼠斥其君也有鼠之名無鼠之實詩人猶曰逝將去汝適彼樂土況乎上捃其財下啖其食率一民而當二鼠不流浪轉徒聚而為盜何哉春秋螽蝝有大有年皆書是聖人於豐凶不隱之驗也余通於春秋乂親蒙其災於是乎記蘇子瞻却鼠刀野人有刀不愛遺豫長不滿尺劔鉞之餘丈如連環上下相繆錯之則見或漫如無昔所從得戒以自隨畜之無害暴鼠是除有穴於垣侵堂及室跳床撼幕終夕窣窣叱訶不去啖囓棗栗掀杯舐缶去不遺粒不擇道路仰行躡壁家為兩門窘則傍出輕趫捷猾忽不可執吾刀入門是去無迹又有甚者聚為怪妖晝出羣鬬相視睢盱舞於端門與王雜居貓鼠不噬又乳於家狃於永氏謂世皆然亟磨吾刀槃水致前炊未及熟肅然無蹤物豈有是以為不誠試之彌旬為凜以驚丈貓鷙禽晝巡夜伺拳腰弭耳目不及顧鬚搖於穴走赴如霧碎首屠腸終不能去是獨何為宛然尺刀匣而不用無有爪牙彼孰為畏相率以逃嗚呼嗟夫吾茍有之不言而諭是亦何勞詩集拱亂穴野鼠丨丨丨杜北征竄古瓦蒼鼠丨丨丨杜橫庭鼠丨丨丨徑空土澀李賀雜敘循墻鼠縮縮丨丨丨杜牧李甘詩開門走丨丨野鼠丨杜壞壁鳴丨丨丨飢鼠杜鼠上檠卧看飢丨丨燈丨坡鼠有牙夜壁頻驚丨丨丨王元之鼠出穴燈青人已眠飢丨稍丨丨掀翻盤盂響驚聒夢寐徹惟愁几硯撲又恐案書囓癡兒效貓嗚生計誠已拙梅聖俞宿胥氏書齋聞鼠甚患之竹𪕋山民愛商嶺多修篁蒼翠連山谷有鼠生其中薦食無厭足春笋囓生犀秋筠折寒玉飫飽致肥腯優遊甚蕃育林密鳶不攫穴深犬難逐鳯凰餓欲死彼實無一掬唯此竹間𪕋琅玕長滿腹暖戲緑叢隂舉頭傲鳴鵠不知商丨丨丨爾身上肉有鍤利於鋒有錐銛於鏃開穴窘如囚洞胸聲似哭膏血尚淋漓攜來入市鬻竹也比賢良鼠弓類流俗所食既非宜所禍誠知速吁嗟狡小人乘時竊君祿貴休社樹神俸盜太倉粟笙簧佞舌鳴藥石嘉言伏朝見秉大權夕聞惟顯戮李斯其五刑趙高夷三族信有司殺者在暗明於燭彼狡勿害賢彼鼠無食竹王元之野人獻丨丨丨竹𪕋腰腹大如盎自言道傍得採不費罝網鴟鵜讓圓滑混沌悲瘦爽兩牙錐有餘四足僅能髣逢人自驚蹶間若兒脫襁念兹微陋質刀几安足枉就擒太倉卒羞愧不能饗南山有狐熊澤獸行舐掌蘇子瞻獨何罪野食不穿囷溪飲不盜盎嗟𪕋丨丨丨膏血自為網隂陽造百物偏此愚不爽肥癡與瘦黠稟受不相髣王孫處深谷小若兒在襁超騰被彈射將中還復枉一朝受羈緤冠帶相賔饗愚死智亦禽臨食抵吾掌蘇子由古今合璧事類備要别集卷八十
