body:
  text: 古今合璧事類備要後集卷五十宋謝維新撰京局門監封椿庫歴代㳂革周内府掌受九貢九賦九功之貨賄良兵器良以待邦之大用周禮國朝乾徳二年置封椿庫太宗改為乾徳内庫長編渡江後有左藏封椿庫者孝宗所創也其法非奉親非軍需不支湻熙末徃徃以犒軍或造軍器為名撥入内庫十三年庫中所儲金至八十萬兩銀一百八十萬餘兩又有糴米并度牒錢而下庫復儲見緍常五六百萬朝野雜記左庫南之者本御前椿管激賞庫也紹興休兵後秦椿取户部窠名之可必者盡入此庫户部吿乏則予之檜死属之御前由是金幣山積黄通老為禮部侍郎建言請歸之左藏及孝宗受禪袁伯誠在諫院復以為言上嘉納之遂改為左藏南庫焉湻熙末始併歸户部紹興元年又改稱封椿下庫仍𨽻户部焉同上事類國用太祖討平諸國收其府藏貯之别庫曰封椿庫毎歳丨丨之餘皆入焉嘗語近臣曰石晉割幽燕諸郡以歸契丹朕憫八州之民乆䧟夷狄俟所蓄滿百百萬緍遣使遺北狄以贖山後諸郡如不我從則散財募士以圖攻取長編國帑典司丨丨公是行曹侁制提領贍軍酒庫所歴代㳂革國朝紹興八年沿一月户部尚書章誼請置贍軍酒庫于行在命司農寺丞葢􅀈主之賜浙東總制錢五萬緍為釀夲其後歳收息錢五十萬緍九年錄事類異選陳居仁字安行監贍軍酒庫所籴場隆興改元修髙宗聖政兼檢討葢丨丨焉周益公集編估打套局歴代㳂革國朝紹興三年從户部所請三路𤼵到市舶香藏雜物左藏東西庫㩁貨務交納外其編估職事乞隔委左藏庫監門官一員兼其打套職事委太府寺丞引庫監官兼八年專置打套局監一員以右迪功郎范仲由充從户侍李彌遜請也九年置編估官一員酬賞依打套官例十一年移編估打套局出左藏庫外於南倉之北置局中興㑹要監太平惠民局歴代㳂革周醫師救萬民之疾苦本朝神宗設太醫局熟藥所於京師崇寜中増置七局揭以和劑惠民之名修製給賣各有攸司又設收買藥材所以革偽濫之弊和劑局方序添置太府丞一員提㸃後廢續㑹要紹興六年置藥局以行在太醫局熟藥東西南北四所為名内将藥局一所以和劑局為各名從户部王俣之請也詔劑局置監官文武各一員差京朝官與大使臣十八年朝官熟藥所依在京改作太平惠民局中興㑹要事類不𨽻太醫政和四年尚修省言修合賣藥所本周官醫師救民之意今以都城四壁并商稅院東出賣熟藥名非創置惠民之意矧令局事丨丨丨丨續惠要無修書省范公成大監行在太平惠民和劑局堂吏丐藥不獲以朝㫖下所𨽻太府寺蒐細故杖吏逞憾公白户部侍郎汪應辰杖太府吏已能大其官矣夀皇類編髙宗聖政以公為檢討官兼敕令所近世局務丨丨丨丨人以公為宜周益公集御前軍器所歴代㳂革國朝元豐官制置軍器監以掌戎器之政令又有御前軍器所其役兵有萬全軍匠東西作坊所得專達舊器軍器監置别差提舉官以内侍領之不属工部故不𨽻臺察建炎中嘗以大閹董慤提舉未踰年即罷之紹興五年始𨽻工部朝野雜記仍日輪夲部郎中及軍器監官赴所㸃檢監視十一年臣寮奏疏軍器所𨽻工部當𨽻臺察從之中興㑹要後復以中人典領其調度程品軍器監有不得預聞者三十年黄通老為侍郎為上言非祖宗建官正名之意請得𨽻属稽考之詔依條檢察孝宗受禪増置提㸃官一員以内省都知李綽為之改稱提舉又七日詔御前軍器所專𨽻提舉製造御前軍器所所有𨽻工部等指揮更不施行孝宗㑹要張真父時為御史力論其不然上乃命仍𨽻朝野雜記舊有提㸃官今同舊有提轄官六員今一員幹辦官二員今一員監造官六員今二員受給官二員今一員監門官二員今一員中興㑹要車輅院歴代㳂革夏后氏因鸞車而制鉤車俾正奚仲建斿旐尊卑上下各有等級周禮巾車氏掌王五輅有玉金象革木之制至秦惟乘金根車漢乗秦制以為乗輿晉武帝始備五輅令掌為天子法車後周置司輅之職皇帝之輅十有二等通典國朝車輅院舊不載御輦院掌乗輿步輦供奉及宫闈車乗之事㑹要神宗正名廢羣牧司供乗輿法物則歸車輅院有監官三員一員内侍一員文臣京朝官一員武臣建炎三年罷紹興十二年因前東京車輅院人吏王道陳乞遂詔車輅院官吏依舊例減半差中興㑹要事類典路出周禮車正見㳂革司輅同上辨物巾車氏掌公車之政令丨其用與其旗丨而等叙之以治其出入之五路周禮騏驥院歴代㳂革周禮牧人掌牧地皆有𨽻禁而頒之孟春焚牧中春通滛掌其政令校人掌王馬之政唐有㸃廐令六典國朝舊有天廐雍熙中以天廐改為左右騏驥院隆平康掌司國馬景徳中始増置羣牧使副都監判官以領廐牧之政官制行廢羣牧所供乗輿法物則歸車輅院養國馬則歸左右騏驥院天騏監而總於太僕寺焉續㑹要事類騋牝丨丨三千詩駉牧丨丨于坰野詩天馬丨丨徠從西極漢禮樂志天廐見㳂革國馬同上書不時新作延廐丨丨丨也左傳不問馬廐焚子退朝曰傷人乎丨丨丨語天駟星丨丨丨主國馬晉天文志萬歳為使唐張丨丨丨羣牧丨毛仲領監唐王丨丨丨羣牧丨唐張說監牧碑頌天子十二閑馬六種閑為一廐馬二百一十六應乾之爽也六廐成秣五良一駕是以謂小備校有左右閑成十十一合月之良也駑馬三良馬之數凡三千四百五十六是之謂大備故春祭馬祖夏祭先牧秋祭馬社冬祭馬步敬其夲也日中而出日中而入焚原燎牧除羣除廐時其事也潔泉美薦牙凉棧溫翹首靣陸交頸相劘豈其性也攻車教駣講馭臧僕刻之剔之羈之筴之就其才也乾道為艮坤元利牝駒從渥水駿發中廬屈産貴其能鳴鴈門多其美脊豈止宗生冀北族絶汧西而已哉省倉上中下三界歴代㳂革周禮有倉人庾人北齊司農寺掌倉正綂太倉隋司農寺綂太倉典廩隋百官志國朝祥符九年詔京師官年六十已上勿差監在京諸倉時國子博士雍文載年六十五受敕上言求免上曰京倉自受納至給畢殆六七歳若此輦一任則老於掌庾矣因著式焉長編紹興三年行在省倉内鎮城倉改為行在南倉舊係臨安府州倉仁和倉改為行在北倉舊係仁和縣地基上修葢監官四員並兼管幹和籴十一年詔行在三倉以行在省倉上中下界為名監官監行在省倉上中下倉界繫銜中興㑹要事類坻京曽孫之庾如丨如丨詩紅腐漢武帝太倉之粟丨丨而不可食天囷天倉六星在婁南倉榖所藏南三星天庾積厨粟之所丨丨十二星囷倉廩之属主䘖粮也石氏星經國廪丨丨罕蓄乏九年之儲唐䇿問九年蓄國無丨丨之丨曰不足無六年之蓄曰急無三年之蓄曰國非其國也禮記千斯倉乃求丨丨丨詩中都儲積丨丨丨丨續會要服勞廪委丨丨丨丨公是行劉誥制老於掌庾見㳂革記其姓名梁莊肅公適景祐中監在京倉南郊赦錄朱全忠後莊肅上疏罷之曰全忠叛臣何以為勸仁宗善之擢審刑院詳議官丨丨丨丨禁中自是遂見擢用石林燕語詩集閑曹丨丨猶得醉薄俸亦勝耕唐方干寄賈司倉詩豐儲倉歴代㳂革國朝豐儲倉掌九穀廩藏之事以給官兵祿食之用哲宗正史紹興二十七年韓仲通乞以上供米所餘之數歳樁一百萬石别廪儲之遇水旱則助軍粮及減收籴豐儲詔從之中興小厯事類掌庾事見省倉門國廩唐大詔令見省倉門服勞廪委丨丨丨丨公是行劉詔制詩集莫言卑身到瀛洲須命好官稱庾氏丨丨丨何斯舉寄錢監倉草料場歴代㳂革周禮夏官圉人掌養馬芻牧之事以從圉師本朝草料場十有二掌京畿芻秸以給内外飼䬴哲宗正史職官志事類廐摧乗馬在丨丨之秣之詩秣司乾元元年李輔國奏丨馬之丨事資草料主續通典交引庫歴代㳂革本朝交引庫𨽻太府寺掌給印出納交引錢之事㑹要樓店務事類條二事仁宗寳元間以災異下詔求直言監在京樓店務蘇舜欽詣軌通疏丨丨丨一日正心二曰擇賢長編論大事蘇舜欽監在京樓店務官京師位雖卑數上疏丨朝廷丨丨敢道人之所難言范文正公薦之召試得集賢檢理六一集排岸司歴代㳂革國初開封府置排岸東西南北四司掌諸路綱船輸納及粮運至京師分定諸倉交卸領各處交卸役卒指揮以備卸綱牽駕以京朝官充二人或一人所貴主轄得雜般舟舡催驅卸納綱稍國朝㑹要政和六年浙西諸州各置排岸一員從兩浙運副應安道之請也四朝志紹興三年知臨安梁汝嘉請專置行在排岸司又詔添文官一員七年詔行在建康府置文臣排岸司監官一員以行在排岸司為名二年為任係京官中興㑹要事類漕舸顓促丨丨胡文恭行楊至制水運掌典司丨丨舟舡輸納雇直之事哲宗職官志董司漕引丨丨丨丨之舸胡文恭行李師中制釐葺舟船應安道奏排岸官專一管幹津遣綱運并丨丨丨丨續㑹要古今合璧事類備要後集卷五十
