  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_240-1a, image: WYG0941/WYG0941-0215a.png}
body:
  text: 古今合璧事類備要别集卷三十四宋謝維新撰花卉門榴花格物總論榴花非國中所産也其始來自安石國故名曰石榴或曰安榴亦有來從海外新羅國者或又以海榴名之也此花跗蕚皆真紅色如小琴軫様花面開寸許瓣如拶丹鬚黄粟蜜葉脩條盛夏花時閃爍鮮明良有可愛者然不止此有千葉者有黄花者有紅花白縁者有白花紅縁者花品中一竒也然又有一種人目之曰寳珠榴其花獨貟如寳珠狀司花之巧一至於此彼有所謂山石榴者乃指杜䳌花而名之也或亦認為此花豈不誤於引用者耶事類安石國張騫為漢使外國十八年得塗林安石榴也陸機與弟書何年丨丨丨萬里貢榴花迢逓河源道因依漢使槎元稹詩祝融峯衡山丨丨丨下法華寺有石榴花如真紅春秋皆發酉陽雜爼緋衣女崔𤣥徽遇數美人李氏陶氏又丨丨少丨石醋醋又有封家十八姨來石醋醋曰諸女伴皆住苑中每被惡風所撓常求十八姨相芘處士每嵗旦與作一朱旛圖日月五星則免矣崔許之其日立旛東風刮地折木飛花而苑中花不動崔方悟衆花之精封家姨乃風神也石醋醋乃石榴也博異記應制詩孔紹安仕隋高祖受禪間徃來奔見之甚恱拜内史舍人時夏侯端亦甞為御史先歸朝紹安授秘書監因丨丨詠石榴丨祗為時來晩開時不及春時人稱之孔六帖試御題本朝王禹偁丨丨丨千葉榴詩王母庭前親見㘽張騫偷得下天來誰家巧婦殘針線一拶生紅熨不開發一花王荆公作内相時翰苑中有石榴一叢枝葉甚茂但只丨丨丨故荆公題云濃綠萬枝紅一㸃動人春色不須多余每以不見全篇為恨王直方詩話張載榴賦仰青春以啓萌晞朱夏以發采揮光垂綠擢榦曜鮮潘岳榴賦暮春告闌朱夏戒初新莖擢潤膏葉垂腴丹暉綴於朱房緗色㸃乎紅鬚潘尼榴賦遥而望之煥若隋珠耀重川詳而察之灼若列宿出雲間夏侯湛榴賦接翠蕚於綠蔕冐紅牙於丹鬚應吉甫榴賦丹葩結秀朱實星垂范堅安石榴賦赬如丹砂詩集映水珊瑚還憶河陽縣丨丨丨丨開葉翠如新剪花紅似故栽梁孝元帝分根金谷丨丨丨丨重移植廣庭中云云影入環階水香隨度隙風隨魏彦深珊瑚映水魯女東窓下海榴世所希丨丨丨綠丨未足比光輝清香隨風發落日好鳥歸願為東南枝低舉拂羅衣無由一攀折引領望金扉琥珀供梳何年安石國萬里貢榴花迢逓河源道因依漢使槎酸辛犯葱嶺憔悴渉龍沙初到標珍木多來比亂麻深抛故園裏少種貴人家唯我荆州見憐君胡地賒猶教當路長兼恣入簾斜綠葉栽煙翠紅英動日華新簾裙透影疎牖燭籠紗委作金爐熖飄成玉砌瑕乍驚珠綴宻終誤綉幃奢丨丨丨丨碎臙脂懶頰搽風翻一樹火電轉五雲車絳帳迎宵日芙蓉綻早芽淺深俱隱映前後各芬葩宿露低蓮臉朝光借綺霞暗虹徒繳繞濯錦莫周遮俗態能嫌舊芳姿尚可嘉非專愛顔色同恨阻幽遐滿眼思鄉淚相嗟亦自嗟元稹何日移榮曽在蓬壺伴衆仙文章枝葉五雲牋幾時奉宴瑶臺下丨丨丨丨玊砌前染日裁霞假雨露凌寒向煖占風煙應笑強言河畔栁逄波隨浪逐張騫沈亞之題海榴樹呈八叔大夫幾年封植丨丨丨丨愛芳叢韶艶朱顔競不同從此休論上春事看成古木對衰翁柳宗元蠟蔕緗叢海榴開似火先觧報春風葉亂裁牋綠花宜挿髻紅丨珠攅作丨丨綵剪成丨鄭驛多歸思相期一笑同温飛卿珠樹瓊英弱植不盈尺逺意駐蓬瀛月寒空堦曙幽夢綵雲生糞壌擢丨丨莓苔挿瓊英芳根閟顔色徂歲為誰榮柳宗元新植海石橊移根意如何葉有苦寒色山中霜霰多雖此䝉陽景丨丨丨丨丨韋應物移石橊無價􅀞難傳春去花隨盡紅榴火始然後時何所恨處獨不祈憐葉葉自相對重重乆更鮮流珠沾暑雨改色淡朝煙著子專寒酒移根擅化權愧非丨丨手刻丨竟丨丨陳无已和黄充實詩山石橊似結紅巾山榴花丨丨丨丨容艶新妍不占春白樂天裁破紅綃淚㾗挹損臙脂臉剪刀丨丨丨丨巾同上燒却翠鬟似火山榴映小山繁中能薄艶中閑一朶佳人玉釵上祗疑丨丨丨雲丨杜牧舞腰香不盡一叢千朶壓䦨干剪碎細綃却作團風裊丨丨丨丨丨露消粧臉淚新乾薔薇𢃄刺攀常懶菡蓞生泥翫亦難不及此花簷户下任人採斫儘人看白樂天樂府芳條颭翠樹芳丨丨灼灼裙腰初染佳人擕手弄芳菲綠隂紅影芳展雙紋簟悄挿花照影窺鸞鑑只恐芳容减不堪零落春晩青苔雨後深紅㸃梁州令歐陽公紅巾蹙乳燕飛華屋悄無人桐隂轉午晩凉新浴手弄生綃白團扇扇手一時似玉漸困倚孤眠清熟簾外誰來推綉戶枉教人夢斷瑶臺曲又却是風敲竹一石榴半吐丨丨丨待浮花浪蘂都盡伴君幽獨穠艶枝細看取芳心千里似束又恐被西風驚綠若待得君來此向花前對酒不忍觸共粉淚兩􅉡蔌賀新郎東坡青子莫相催紫陌尋春去紅塵拂靣來無人不道看花回惟君石榴新蘂一枝開氷簟堆雲髻金樽灔玉醅綠隂丨丨丨丨丨留取紅巾千㸃照池臺南柯子靈砂别有功深庭䆳館鎻清風榴花芳艶濃陽光染就欲燒空誰能窺化工花觀物外喻聲中丨丨丨丨丨闕一粒比容金丹色又紅阮郎歸並坡古今合璧事類備要别集卷三十四
