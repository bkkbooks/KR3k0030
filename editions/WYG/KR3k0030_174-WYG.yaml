body:
  text: 古今合璧事類備要續集卷二十四宋謝維新撰類姓門甘渤海宫音古今姓纂風俗通甘夏時侯國也以國為氏一云周武王同姓於畿内為諸侯因氏焉甘伯桓公是也又周封王子帶於甘昭公是也殷有甘盤秦有甘茂生羅見史記事類學百家說甘茂下蔡人也丨丨丨之丨為秦左丞相史記顯名諸侯太史公曰甘茂起下蔡閭閻丨丨丨丨重强齊楚甘羅年少然出一竒計聲稱後世雖非篤行之君子然亦戰國之䇿士也年少名家甘羅茂之孫也年十二事秦相吕不韋不韋言於始皇曰甘羅丨丨耳然丨丨之子孫諸侯皆聞之秦以為上卿又楊子或問甘羅之寤吕不韋其以十二齡茂良乎曰才也茂良不必父祖投石拔距前漢甘延夀字君况北地人少以良家子善騎射為羽林丨丨丨丨絶於等倫以材力愛幸江表虎臣吳甘寧字興霸建方略以禽黄祖破曹公於烏林攻曹仁於郡南丨丨之丨丨也西土惠政季思鎮襄陽為政簡惠善於綏撫估稅悉除市無二價丨丨稱為丨丨斟遼西宫音針姓同古今姓纂夏諸侯斟灌斟尋氏之後以國為氏焉並祝融之後國語注曰曹姓之别也事類闕厲景陽古今姓纂風俗通齊厲公之後漢有魏郡太守義陽侯厲混吳志孫皓以孫秀奔魏改姓厲氏事類闕戎江陵羽音古今姓纂齊人戎夷之後蓋戎子駒支之𦙍漢功臣有柳丘侯戎賜宣帝戎婕妤生中山袁王意扶風處州刺史戎昱岐州人又春秋戎律河南後魏書官氏志茙眷氏改為茙事類闕祖范陽羽音古今姓纂子姓殷後殷王祖甲祖乙祖丁支庶因氏焉殷有祖已祖伊漢有祖沂始家涿郡事類雉雊訓王高宗肜日高宗祭成湯有飛丨升鼎耳而丨祖已丨諸丨尚書聞雞起舞晉祖逖字士稚輕財好俠慷慨有節尚有贊世才其中夜丨丨丨丨為奮威將軍北伐及渡江中流擊楫誓清中原明歷解律祖沖之字文逺稽古有機思丨丨法丨鐘丨又特善籌嘗造指南車又造欹器又造千里船等器南史巧思入神祖暅之字景爍少傳家業究極精微亦有丨丨丨丨之妙才非所及祖瑩字元珍父季真多識前言往行位中書侍郎鉅鹿太守瑩八嵗誦詩書親屬呼為聖小兒高允曰此子才器丨諸生丨丨北史文成一家祖瑩拜太學博士與袁翻齊名秀出語曰京師楚楚袁與祖洛中翩翩祖與袁累遷國子祭酒祕書監以文學見重常云丨章須自出機杼丨丨丨風骨何能共人同生活政有能名祖鴻勲父慎仕魏歴鴈門咸陽太守丨丨丨丨武太原羽音古今姓纂周文王少子生而有文在手曰武遂以為氏漢武臣為趙王又有武陟功臣表梁鄒侯武彪𫝊六代後居沛國事類知名國士晉武陔字元夏父周為魏衞尉陔沉敏有器量早獲時譽與二弟韶叔夏茂季夏並總角丨丨劉公榮見周三子曰皆丨丨也元夏最優有輔佐之才學通春秋唐武平一名甄博丨丨丨丨工文辭武后時畏禍不敢與事隠嵩山屢詔不起真宰相器武元衡字伯蒼舉進士徳宗欽其才擢御史中丞嘗對延英帝目送之曰是丨丨丨丨開府極選帝素知堅正有守眷禮異它宰相時蜀新定使元衡至綏靖約已寛民比三年上下完實蠻夷懐歸雅性莊重雖淡於接物而丨丨丨一時丨同上持正長者八年還秉政李吉甫李絳數爭事帝前元衡獨丨丨無所違附帝稱其丨丨同上論議勁正武儒衡字延碩元衡從父弟姿狀秀偉不妄言與人交終始一節知諫議大夫事皇甫鏄以宰相領度支剥下以媚天子儒衡疏其狀丨丨丨丨有風節符瑯琊羽音古今姓纂魯頃公孫公雅為秦符璽令因為氏焉事類幅巾談辭後符融字偉明逰太學師事李膺膺毎見融輒絶它賔客聽其言論融丨丨奮褎丨丨如雲膺每奉手歎息為將有略五代符存審字徳詳陳州宛丘人事李罕之罕之歸晉晉王以為義兒軍使賜姓李名存審存審丨丨丨機丨大小百餘戰未嘗敗衂與周徳威齊名號良刺史符令謙官至趙州刺史有善政卒於州州人號泣送葬者數千人當時丨為丨丨丨玉彭城徵音古今姓纂黄帝時公玉帶造合宫明堂見尸子後改為玉氏後漢有司徒玉光甫字文伯事類闕景京兆宫音古今姓纂芊姓楚公族也漢初徙山東豪族於關中今好畤華陽諸景是也楚有景差漢有景丹事類破王郎後景丹字孫卿馮翊人縱突騎以丨丨丨光武以為驃騎大將軍封櫟陽侯理詩易景鸞字漢伯能丨齊丨施氏丨作易說及詩解文句凡著述五十餘萬言詹河間羽音古今姓纂詹姓始於周宣王支子賜姓曰詹封為詹侯其後有詹父為周大夫詹嘉處瑕以守桃林之塞姓纂曰楚詹尹之後有詹何善釣昭公九年有詹桓伯辭於晉事類忠臣唐詹洗者為福州候官令子名豪移家建之建陽生五子一居嚴陵一居信城一居太末婺女之間留武夷者其二子焉唐則有肇為御史中丞沆為侍御史皇朝則有庠為工部侍郎王隨之壻範知惠州時升為提舉福建茶鹽公事靖康間官京師張邦昌迫以偽命不受逃歸行在高宗即日召對奏北事甚詳上喜曰卿丨丨也擢太常丞遷祠部員外郎忠節詹良臣字唐公以累與恩補官為縉雲尉方臘犯境立丨丨徽宗官其二子飲巽亭詩詹適嘗為御史臺主簿東坡先生有和詹適丨丨丨丨云江上同三黜天涯又一尊桂酒二詩詹範知惠州從東坡先生㳺先生嘗有次韻丨丨丨丨束南陽羽音古今姓纂晉書云踈廣之後曾孫孟逹避王莽亂自東海徙涉鹿山西因去足為束氏事類三日甘雨晉束晢字廣微大旱晢為邑人請雨三日而雨注歌曰束先生通神明請天丨丨丨丨零我黍以育我稷以生何以酬之報束長生三日曲水束晢辨丨丨丨丨之義賜金五十斤竹書分釋束晢轉著作佐郎觀汲冡丨丨隨疑丨丨皆有義證補詩六篇束晢補南陔白華華黍由庚由儀崇丘亡丨丨丨龍武陵羽音古今姓纂尚書舜臣龍為納言子孫以王父字為氏又董父已姓賜氏豢龍氏龍且楚人為項羽將急就章龍未央亦楚人也事類廉公有威後龍伯高名述京兆人為仙都長馬援嘗戒其兄子曰龍伯高敦厚周慎口無擇言謙約節儉丨丨丨丨吾愛之重之願汝曹效之效伯高不得猶為謹勑之士所謂刻鵠不成尚類鶩者也使見獨揖五代龍敏字欲訥幽州永清人歴晉為太常卿使於吳越是時丨吳越者丨吳越王皆下拜敏丨丨之葉南陽羽音古今姓纂風俗通楚沈尹戍生諸梁字子高食采於葉因氏焉吳志有都尉葉雄事類子高好龍子張見魯哀公七日而哀公不禮告僕夫而去曰臣聞葉公丨丨丨丨鉤以冩龍鑒以冩龍屋室雕文以冩龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄五色無主是葉公非好龍也好夫似龍而非龍者也君非好士好夫似士而非士者也新序文華清麗皇朝葉夢得字少藴蘇州人豋科旬嵗間歴清要召入翰林為學士時年方壯丨丨丨丨一時欽重參大政出帥建康移福唐以節度使致仕居霅溪下山之下開山為徑玲瓏秀發自號石林居士詩酒以娛其老諸福全備當世罕有及之者長編載少藴安危利害邪正休戚之論與朋黨之對及潁昌救荒之政皆足嘉尚清徳愈光葉顒字子昻仙遊人第進士調南海簿屬攝尉事有欲以所獲鹽授公公曰仕塗發軔如造屋建柱石柱石不正屋隨以傾吾方入仕豈宜自欺聞者歎服孝宗初為給事中除史書尋除參知政事兼同知樞密繼提舉洞霄宫召對上問勞加禮且曰卿之丨丨自是丨丨矣拜左僕射同平章事薨贈特進林光朝以詩哭之傳家惟舊徳無地起樓臺人以為實録云幸雁門宫音古今姓纂闕事類里號之癡晉幸靈建昌人與小人羣居見侵辱而無愠色邑丨丨丨丨療病即愈百姓奔趣水陸輻凑司瑕丘宫音古今姓纂左傳鄭有司臣司齊事類闕昭太原宫音古今姓纂楚辭云昭屈景楚之三族也戰國時楚有昭奚恤上柱國風俗通漢有大鴻臚昭闕事類闕郜京兆角音古今姓纂周文王第十一子封於郜其地右濟隂後失國以國為氏晉有髙昌長郜玫事類大鼎取郜丨丨于宋左傳文昭郜雍曹滕丨之丨也同上黎京兆徵音古今姓纂黎侯殷周時侯國風俗通云九黎之後尚書西伯戡黎亦見毛詩左傳齊大夫黎彌黎且字亦作犁宋城唐左拾遺黎昕九真洛陽尉黎迴愛州人壽春京兆尹黎幹生燒燧炬煟焴煟生植右散騎常侍河南官氏志素嵇氏改為黎事類記識著述黎景熈字季明少以孝行聞於世好讀書强丨黙丨而無應對之能後拜著作佐郎勤於所職丨丨不怠北史善星緯術唐黎幹戎州人丨丨丨丨喜議論遷京兆尹以治稱薊内黄宫音古今姓纂闕事類有神異道漢薊子訓丨丨丨之丨京師士大夫皆承風向慕薄雁門宫音古今姓纂風俗通衞賢人薄疑漢有薄太后弟薄昭文帝殺之事類闕印馮翊角音古今姓纂鄭穆公子印之後以王父字為氏事類相禮無違印段字子石鄭大夫也鄭伯如晉段丨甚敬而卑丨丨丨者左傳宿東平徵音古今姓纂伏羲氏風姓之後左傳云任宿須句顓􅁷風姓也宿國在東平無鹽縣以國為姓事類尚主駙馬宿石朔方人曽祖文陳父子歸魏拜上將軍祖若豆根明元時賜姓宿氏石丨公丨拜丨丨都尉位吏部尚書北史白南陽商音古今姓纂黄帝之後秦大夫白乙丙楚有白公勝楚平王太子建之子也事類善用兵白起郿人丨丨丨事秦昭王為左庻長攻韓魏趙燕遷為武安君戰勝攻取七十餘城史記言治生白圭周人樂趨時變人棄我取人取我予天下丨丨丨者祖白圭敏悟絶人唐白居易字樂天其先太原人徙下邽丨丨丨丨工文章未冠謁顧况况曰吾謂斯文遂絶今復得子矣穆宗好遊畋獻續虞人箴以諷自號醉吟居易與弟行簡從弟敏中友愛東都所居疏沼種樹搆石樓香山鑿八節灘丨丨丨丨先生為之𫝊暮節惑浮屠至經月不葷稱香山居士繪九老圖居易嘗與胡杲吉旼九人等燕集皆髙年不事者人慕之丨為丨丨丨𫝊鷄林行居易於文章精切最工詩以規諷得失當時士人爭丨丨丨丨賈售其國相率篇易一金甚偽者能辨之元白劉白居易初與元稹酬詠故號丨丨又與劉禹錫齊名號丨丨賦木託諷樂天丨有丨八章其六章丨弱柳櫻桃枳橘杜黎野葛水檉凌霄以丨在位與附麗權勢者其八章則曰有木名丹桂云云葢樂天自謂也素不入黨樂天丨善李紳而丨丨徳裕之丨素善牛僧孺楊虞卿而不入宗閔之黨素善劉禹錫而不入伾文之黨中立不倚峻節凛然於八木之中而自比於桂殆未為過也懐河内角音古今姓纂无懐之後吳志顧雍𫝊有尚書郎懐敘春秋時野王邑漢為河内郡武徳初於栢崖城置懐州事類闕蒲河東角音與苻通古今姓纂風俗通有詹事蒲昌又有蒲遵晉書苻洪𫝊云其先家居池上生蒲皆長三丈因號蒲家遂以為氏後改為苻也又前秦主苻健本姒姓有扈之後為啟所滅奔西戎代為氐酋本姓蒲蒲洪以孫堅背上有草付文改為苻事類自稱三秦苻洪字廣世其先葢有扈之苖裔世為西戎酋長本氏蒲以䜟文有草付應王遂改姓苻氏丨丨丨丨王晉載記著浮圖賦苻融字博休堅之季弟未弱冠便有台輔之望嘗丨丨丨丨壯麗清瞻世咸珍之目千里駒苻朗字元逹堅從兄子幼懐逺操不屑時榮堅丨之曰吾家丨丨丨也學士佩魚皇朝蒲宗孟字𫝊正閬州新安人為翰林學士神宗曰學士職清地近而官儀未寵自今宜佩魚丨丨丨丨自宗孟始也邰平盧商音與臺姓通古今姓纂周自后稷封於邰春秋世有臺駒即邰國之名也漢有侍中臺崇後漢髙士臺佟前趙錄特進臺彦髙事類隠武安山後漢逸民臺佟字孝威丨於丨丨丨鑿穴為居採藥自業州辟不就隠商洛南晋藝術臺彦字國雋漢侍中崇之後専京氏易善圖䜟祕緯天文洛書風角星算尤善望氣占候推步之術丨居丨丨丨山從東筦角音古今姓纂漢將軍從公事類闕鄂武昌商音古今姓纂晉鄂侯之後子孫氏焉漢初功臣安平侯鄂千秋沛人事類闕索武威商音古今姓纂殷人七族索氏之後燉煌晉索湛為北地太守生靖尚書事類燉煌五龍晋索靖字幼安燉煌人少有逸羣之量與汜衷張甝索紒索永俱詣太學馳名海内號稱丨丨丨丨碩徳名儒索襲字偉祖虛靖學好丨丨丨丨形居塵俗而棲心天外咸汝南徵音古今姓纂闕事類闕籍廣平商音古今姓纂晉文侯仇弟陽叔生伯黶司晉典籍遂為籍氏𤣥孫談孫代為晉大夫晉為趙所滅籍氏播遷于宋事類闕賴潁川徵音古今姓纂左傳賴國為楚所滅以國為姓漢有交趾太守賴先事類闕卓河西徵音古今姓纂闕事類富擬人君蜀有卓氏用鐵冶致丨即鐵山皷鑄至僮千人田池射獵之樂丨於丨丨史記封褒徳侯後漢卓茂字子康南陽宛人父子皆至郡守習詩禮後以儒術舉遷密令吏人親愛不忍欺之道不拾遺蝗不入界光武即位先訪求茂以為太傅丨丨丨丨藺中山宫音古今姓纂鄭穆公支孫以王父字為氏漢有武陵太守藺廣事類有謀善戰藺欽字休明父子雲以軍功至冀州刺史欽丨丨略勇决丨丨進號智武將軍百日再破魏軍威振鄰國為衡州刺史有惠政南史屠陳留宫音古今姓纂左傳晉大夫屠蒯禮記作杜蕢又屠羊說楚人晉將屠岸賈風俗通漢末有屠景先河東人也事類禦狄右行晉侯作三行以丨丨荀林父將中行屠繋將丨丨先蔑將左行左傳直言夭妖晉太史屠餘見晉國之亂以其圖去歸周曰臣不敢丨丨示晉公以丨丨日月星辰之行說苑蒙安定宫音古今姓纂風俗通東蒙主以蒙山為氏事類威震匈奴蒙恬齊人大父蒙驁事秦昭王官至上卿後為秦將驁子曰武武子曰恬恬弟曰毅恬嘗書獄典文學因家世得為秦將攻齊大破之拜為内史恬丨丨丨丨始皇甚尊寵蒙氏信任賢之而親近史記位至上卿蒙毅丨丨丨丨出則參乘入則御前恬任外事而毅常為内謀名為忠信故雖諸將相莫敢與之爭焉古今合璧事類備要續集卷二十四
