丨丨曰後來之英也善書體備始浩父嶠之丨丨以法授浩浩書四十二幅屏八丨皆丨草𨽻尤工世狀其法曰如怒蜺抉石渇驥奔泉云八嵗能文徐齊聃字將道湖州人丨丨丨丨太宗召試賜所佩金削刀屬文典厚徐堅字元固齊聃子聖厯中揚再思引為判官丨丨丨丨再思每目為鳳閣舍人樣與張說修三教珠英典故諳識𤣥宗改麗正書院為集賢院以堅充學士副張說知院事堅於丨丨多所丨丨節孝處士本朝徐積字仲車楚州山陽人每嵗甘露降於父母墳域必逾月木為連理郡守迎入學甘露又降其舍鄉閭化之州其以聞賜絹米後部使者言積藴徳丘園聲名顯著謚曰丨丨丨丨官其一子冲晦處士徐復字復之建州人嘗遊京師舉進士不中退而學易通流衍卦氣之法遊淮浙間凡天文地理遁甲占射諸家之說讀之必得其宜賜號丨丨丨丨江南韓徐徐鉉字鼎臣揚州廣陵人十嵗能屬文與韓熙載齊名丨丨謂之丨丨江南忠臣王師圍金陵煜遣鉉朝京師求緩兵太祖以禮遣之後隨煜至京師太祖責之鉉對曰臣仕丨丨亡國不能死臣之罪也太祖歎曰丨丨也以為太子率更令從征太原加給事中出為左散騎常侍二陸不及李穆嘗使江南見鉉及其弟鍇歎曰丨丨丨能丨也曽慥云鉉好李斯小篆尤得其妙同上丘河南宫音古今姓纂齊太公封於營丘支孫以地為姓代居扶風事類辭采麗逸南史丘遲字希範丨丨丨丨㸃綴映媚似落花依草拜中書侍郎才士唯丘文學丘靈鞠吳興人少好學善屬文褚彦回曰此郡丨丨丨有丨靈鞠仕梁領東觀祭酒曰人居官願數遷使我終身為祭酒不恨也在宋時文名甚盛不如一丘丘仲孚字公信王儉曰東南之美復見丘生遷山陰令甚有聲稱百姓謡曰二傅沈劉丨丨丨丨長於撥煩號稱神明政為天下第一不食武昌魚丘巨源蘭陵人少舉孝亷後除武昌太守不樂曰古人云寧飲建鄴水丨丨丨丨丨乃以為餘杭令詔斲石旌功唐丘行恭有力善騎射聚兵保郿城人多依之盜不敢窺境累從戰功多錫勞甚厚所守嚴烈僚吏畏之太宗常思其功貞觀中丨丨丨為人馬象抜箭狀立昭陵闕前以丨武丨駱内黄商音古今姓纂姜姓齊太公之後有子駱以王父字為氏事類容貌逺致南史駱文牙字旗門年十二相者云此郎丨丨非常必將丨丨陳文帝引為將帥勇冠衆軍文章齊名唐駱賔王義烏人七嵗能賦詩武后時數上疏言事下除臨海丞不得志棄官去與王勃楊烱盧照隣皆以丨丨丨丨天下古今合璧事類備要續集卷十九
