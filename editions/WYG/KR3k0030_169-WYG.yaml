body:
  text: 古今合璧事類備要續集卷十九宋謝維新撰類姓門賈武威商音古今姓纂唐叔虞少子公明康王封之於賈為晉所滅以國為氏又云本自周賈伯之後事類股肱左昭公十三年文公好學而不貳生十七年有賈佗以為丨丨至言賈山潁川人孝文時言治亂之道借秦為喻名曰丨丨諫鑄錢其後除鑄錢令山復上書諫以為變先帝法非是以錢者亡用之器可以易富貴富貴人主之操柄令民為之是與人主共操柄不可長也議詔令賈誼洛陽人以能誦詩書屬文稱文帝召以為博士是時年二十毎詔令議下諸老先生未能言誼盡為之對文帝說之超遷嵗中至太中大夫弔屈原賦賈誼絳灌之屬盡害之曰洛陽人年少初學紛亂諸事天子亦踈之以為長沙王太傅意不自得及渡湘為賦以丨丨丨同上陳治安策賈誼數上䟽陳政事多所匡建因丨丨丨之丨宣室前席文帝思誼召之上方受釐丨丨坐宣室問鬼神之事夜半丨丨帝曰吾久不見賈生自以為過之今不及也待金馬門賈捐之字君房賈誼之曽孫元帝即位上䟽言得失召丨詔丨丨丨諫擊珠厓初武帝征南越立儋耳珠厓郡其民暴惡二十餘年凡六反至元帝又反賈捐之以為不當擊棄之不足惜不擊不損威賈君志氣後賈復字君文南陽人事舞隂李生李生竒之曰丨丨之容貌丨丨如此將相之器賈父來晩賈琮字孟堅交趾屯兵反三府舉琮為交趾刺史巷路歌曰丨丨丨丨使我先反今見清平吏不敢飯褰帷震竦賈琮拜冀州刺史舊典𫝊車驂駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聽糾察美惡何有反垂帷裳以自掩塞乎乃命御者丨之百城聞風丨丨男女名賈賈彪字偉節潁川人補新息長民貧多不養子彪嚴為其制共殺人同罪數年人養子千數僉曰賈父所長生男名為賈子生女名為賈女賈氏三虎賈彪兄弟三人並有髙名而彪最優天下稱曰丨丨丨丨偉節最怒阿縱奏免賈逵字梁道為豫州刺史二千石以下丨丨不如法者皆舉丨丨帝曰逵真刺史矣遂布告天下當以豫州為法文號蘇賈唐賈曽河南人𤣥宗為太子遴選官僚以曽為舍丨人俄擢知制誥共蘇縉同掌皆以丨辭稱時丨丨謂今頗牧賈循有大畧蘇頲嘗丨丨丨丨父子繼美賈至字㓜隣從𤣥宗幸蜀知制詰帝𫝊位至當譔册既進藁帝曰昔先天誥乃父為之今兹命册又爾為之兩朝盛典出卿家丨丨可謂丨丨矣苦吟跨驢賈島字浪仙初為浮屠後舉進士當其丨丨雖逢值公卿貴人皆不之覺一日見京兆尹丨丨不避呼詰之乆乃得釋三典貢舉賈餗字子美河南人䇿賢良方正異等美文辭開敏有斷歴禮部侍郎凢丨丨丨丨得士七十三人多名卿宰相里號一龍賈循京兆人父㑹有髙節丨中丨丨丨關中曽子賈循親亡負土成墓廬其左號丨丨丨丨卒縣人私謚曰廣孝徴君廉潔入朝賈敦頤曹州人貞觀時數歴州刺史資丨丨丨丨常盡室行車一乗敝甚羸馬繩羈道上不知其刺史也發摘無欺賈敦實為饒陽令政清靜吏民嘉美遷洛州丨奸丨伏下丨能丨為政寛惠人心懐向立碑號常棣始洛人為敦頤刻碑大市旁及敦實復丨丨于其側故丨丨丨碑賜錢旌其潔皇朝賈黄中字媧民滄州南皮人也唐相耽四世孫太宗即位知昇州一日黄中按行府庫見扄鐍甚嚴集僚吏發之得寳貨數十櫝皆李氏宫闈之物不𨽻於籍者黄中悉表上之太宗歎曰吾府庫之物有籍貪黷者尚冐禁盜之况此亡國之餘物乎丨黄中丨三百萬以丨丨丨多知臺閣故事黄中性端重守家法丨丨丨丨丨丨朝之典禮資以損益當時之名士皆出其門談論娓娓聽者忘倦邇英延議二記賈昌朝字子明真定人在經筵善稱說仁宗多所質問昌朝皆記録删潤以進賜名丨丨丨丨丨閣丨注録儒術作相如二人昌朝始見孫奭奭以唐路隋韋處厚傳示之謂昌朝曰知此意否君異日以丨丨丨宰丨正丨此丨丨世以謂奭能知人同上不欺二字用不盡賈黯字直孺南陽人有學識好修潔無所阿附初登第還南陽范仲淹知鄧州黯謝仲淹曰黯晩輩偶得科第願受教仲淹曰君不憂不顯唯丨丨丨丨可終身行之黯拜其言其後黯每以語人曰吾得於范公不欺二字平生丨之丨丨也路内黄商音古今姓纂炎帝之後黄帝封其支子於潞春秋時潞子嬰兒是也今上黨潞縣子孫以路為氏事類伏波將軍路博徳平州人以衛尉為丨丨丨丨史記守廷尉史前漢路温舒字長君鉅鹿東里人截蒲寫書又受春秋舉孝廉為丞坐免後丨丨丨丨正直知名路去病仕齊為殿中侍御史彈劾不避貴戚以丨丨丨丨考績為最唐路嗣恭字懿範京兆人為蕭關令連徙神烏姑藏二縣丨丨丨天下丨𤣥宗以為可嗣漢魯恭因賜名著姓系録路敬淳貝州人尤明姓系丨丨畧衣冠丨丨等百篇婁譙國徴音附樓姓古今姓纂風俗通邾婁國之後子孫以婁為姓左傳齊大夫婁禋齊國漢有奉春君婁敬改封建信侯賜姓劉氏事類著禮卷南史隱逸婁㓜瑜字季聚徒教授不應徴辟丨丨捃拾三十丨附徐伯珍傳台輔器唐婁師徳字宗仁鄭州人揚州刺史盧承業異之曰子丨丨丨也與虜戰克婁師徳上元初使吐蕃諭國威信開陳利害虜為畏悦後募猛士討吐蕃乃自奮戴紅抺額來應詔丨丨丨白水澗八遇八丨教弟耐事婁師徳深沉有度量人有忤己輒遜以自免不見容色其弟守代州辭之官教之耐事弟曰人有唾面㓗之乃已師徳曰未也㓗之是違其怒正使自乾耳為盛徳所容狄仁傑未輔政師徳薦之及同列數擠令外使武后覺問仁傑曰師徳賢乎對曰為將謹守賢則不知又問知人乎對曰臣嘗同僚未聞其知人后曰朕用卿師徳薦也誠知人矣出其奏仁傑慙歎曰婁公盛徳我為所容乃不知吾不逮逺矣以功名始終婁師徳為將相者三十年恭勤樸忠心無適莫方酷吏殘鷙人多不免獨能丨丨丨丨丨與郝處俊相亞世之言長者稱婁郝樓古今姓纂夏少康之後周封杞東樓公支孫以樓為氏秦有相樓緩事類君卿唇舌前游俠樓䕶字君卿齊人為人短小精辯議論常依名節聴之者皆竦與谷永俱為五侯上客長安號曰谷子重筆札樓丨丨丨丨世稱儒宗後樓望字次子習嚴氏春秋操節清白有稱鄉閭教授不倦丨丨丨丨太學書扁本朝樓鑰髙宗時丨丨成鑰乃奉勑丨丨又書崇化堂扁三字余音蛇切始奢鴈門商音古今姓纂南昌洪州有余氏開元有太學博士余欽洛陽唐右司郎中余珩祖文集隋考功主事事類闕江濟陽商音古今姓纂嬴姓顓頊𤣥孫伯益之後爵封於江後為楚所滅以國為氏事類燕趙竒士前江充字次倩趙國邯鄲人為人魁岸容貌甚壯武帝異之曰丨丨固多丨丨江左馳聲晉江統字應元子虨字思𤣥終於國子祭酒惇字思悛孝友淳粹髙節邁俗虨之昆弟丨丨丨丨不受請謁江湛字徽深仕宋轉吏部尚書餉饋盈門一無所受在選職公平無私丨丨丨丨辭采清贍江智深夷之弟子愛好文雅丨丨丨丨遷尚書吏部郎夢五色筆江淹字文通少以文章顯後丨郭璞問其取筆乃探懐中丨丨丨以授之搢紳先生江夢孫字修之九江盆城人諸生子弟不逺數郡而至者百人春誦夏絃以時講習鼔篋函丈庠序常盈先主輔政欲廣賢良之術聞其徳業遂以幣帛聘之為芸閣郎甚被親禮後辭歸鄉里先主固留不止既還家門生弟子復至乃率身耕稼躬事繼母旦則冠帶入門温凊親饋飲饌退更常服力操耒耨耘暮而歸易衣侍膳畢然後就庠序集門生弟子説釋經義如故時號為丨丨丨丨一門百口敦睦如一子孫學業各授一經兼持江左稱之卒葬之日自逺方至者幾千人而服縗絰徒跣者百許嗣主聞之美其才茂徳逸故贈國子司業後進之美江夷字茂逺少自操厲為丨丨丨丨仕宋歴吏部尚書後遷為右僕射童鴈門宫音古今姓纂顓頊生老童子孫以王父字為氏事類執法廉平後漢童恢字漢宗琅邪姑幕人少仕州郡為吏司徒楊賜聞其丨丨丨丨迺辟之及賜被劾免掾屬皆去獨詣闕爭之得理掾屬悉歸府恢杖䇿而逝由是論者歸美呪虎服罪童恢除不其令民嘗為虎所害捕獲二虎恢聞出丨丨曰虎狼當食六畜而殘暴於人王法殺人者死傷人則論法汝若是殺人者當垂頭丨丨自知非者當號呼稱寃一虎低頭閉目狀如震懼即時殺之其一視恢鳴吼自奮遂令放釋吏人為之歌頌遷丹陽太守顔魯國商音古今姓纂出琅邪本自魯伯禽支庶有食采於顔邑者因而著族入邾武公字曰顔故公羊傳稱顔公後遂為氏事類在寢楊子或問淵騫之徒惡乎丨曰丨或曰淵騫曷不寢曰攀龍鱗附鳳冀巽以掦之勃勃乎其不可及也如其寢顔弓左公侵齊門於陽州士皆列坐曰丨髙之丨六鈞皆取而𫝊觀之吳人斂手晉顔含字𢎞都少有操行以孝聞累遷侍中除吳郡太守簡而有恩明而能斷以威御下王導歎曰顔公在事丨丨丨丨矣謂顔彪南史顔延之字延年性褊激肆意直言論者丨之丨丨鋪錦繡延之詩鮑照曰君詩若丨丨列丨雕繢滿眼江左顔謝延之謝靈運自潘岳陸機之後文士莫及江右稱潘陸丨丨稱丨丨府中二協顔協字子和少以器局稱博涉羣書工草𨽻飛白卒於荆州記室時顧協亦在藩邸與協同名才學亞丨丨稱為丨丨麟趾學士北史顔之儀字升博涉羣書好為詞賦周明帝以為丨丨丨丨孟堅忠臣唐顔師古字籀之推之孫太宗即位嘗歎五經去聖逺𫝊習寖訛詔師古於秘書省考定多所釐正誼據該明出其悟表人人歎服學者賴之撰五禮又為太子承乾注班固漢書上之時人謂顔秘書為班丨丨丨丨世守忠義顔杲卿字昕以文儒世家禄山反至陜聞兵興大懼急攻城杲卿晝夜戰粮矢盡賊脅使降不應至洛陽禄山怒曰吾擢爾太守何所負而反杲卿瞋目罵曰汝營州牧羊羯奴耳我丨唐臣丨丨丨恨不斬汝禄山不勝忿縛之天津橋柱節解以肉噉之罵不絶賊斷其舌曰復能詈否杲卿含胡而絶辨獄而雨顔真卿字清臣師古五世從孫使河隴時五原有寃獄久不决天且旱真卿丨丨丨丨郡人呼御史雨城守具備真卿為平原太守安禄山逆狀牙孽真卿度必反増陴濬隍禄山反河朔盡陷獨平原丨丨丨丨使李平馳奏𤣥宗聞亂歎曰河北二十四郡無一忠臣邪及平至帝曰朕不識真卿何如人所為乃如此立朝正色真卿丨丨丨丨剛而有禮非公言直道不萌於心天下不以姓名稱而獨曰魯公河朔金城清河太守使李蕚來乞兵蕚曰聞公首奮裾唱大順丨丨恃公為丨丨真卿為出兵六千賊拒戰敗斬首萬級書筆世寳真卿善正草丨丨力遒婉丨丨𫝊之贊曰嗚呼雖千百嵗其英靈言言如嚴霜烈日可畏而仰哉為魯名儒皇朝顔復字長道先師兖公四十八世孫父太初字醇之丨丨丨丨最後掌南京學嘉祐中訪有道之士京東部使者以復應詔郭太原商音古今姓纂周文王季弟虢叔受封於虢或曰郭氏因以為氏公羊傳云虢謂之郭聲之轉也左傳齊有郭最燕有郭隗事類築宫師事郭隗燕昭王丨丨而丨丨之致士先從隗始賜服章徳後郭賀字喬卿拜荆州刺史百姓歌曰厥徳仁明郭喬卿忠正朝廷上下平顯宗丨以三公之丨黼黻冕旒勑行部去襜帷使百姓見其容服以丨有丨髙車出關郭丹字少卿買符入函谷關慨然歎曰丹不乗使者車終不出關至京師常為都講諸儒咸敬重之更始徴為諫議大夫持節使歸南陽果乗丨丨丨丨京師蒙福郭伋字細侯後拜潁川太守帝勞曰賢能太守去帝城不逺河潤九里兾丨丨并丨丨也竹馬迎拜郭伋行部到西河童兒數百騎丨丨丨丨道左斷刑矜恕郭躬字仲孫潁川人為廷尉决獄丨丨多丨丨乃條諸重文可從輕者四十一事奏之皆著於令賔望為仙郭泰字林宗與李膺友善名震京師後歸鄉里衣冠諸儒送至河