front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_190-1a, image: WYG0940/WYG0940-0654c.png}
body:
  text: 古今合璧事類備要續集卷四十宋謝維新撰性行門譏誚附罵詈事理發揮以辭相責曰譏誚夫人情有所不能平則必形於言猶未得為喜怒愛惡之正也必也出而近乎情發而中其節言之者無罪聞之者足以戒斯善矣故三百五篇之詩而刺詩居其半至今使人讀之辭義凜然者無他一言以蔽之曰思無邪而已爾夫豈若後世喜而譽怒而毁者之為也置監謗之官嚴誹謗之律以此箝天下之口緘天下之舌有過而不得聞斯速亡也已事類鬼域為丨為丨則不可得詩虺蜴哀今之人胡為丨丨詩刺在位相鼠刺無禮也衛文公正其羣臣而丨丨丨承先君之化無禮儀也相鼠有皮人而無儀不死何為刺素餐伐檀刺貪也在位貪鄙無功而受禄君子不得進仕爾坎坎伐檀兮寘之河之干兮河水清且漣猗不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有縣貆兮彼君子兮不丨丨兮近小人候人刺丨丨丨也共公逺君子而好近小人焉彼候人兮何戈與祋彼其之子三百赤芾維鵜在梁不濡其翼彼其之子不稱其服不中禮蟋蟀刺晉僖公也儉丨丨丨故作是詩以閔之欲其及時以禮自娛樂也譏不親迎隱二年紀履繻來逆女外逆女不書此何以書譏何譏爾丨始丨丨丨也公羊傳譏不三年閔二年吉禘於莊公何以書譏何譏爾丨始丨丨丨也同上直入譙羽項羽在戲下欲攻沛公沛公從百餘騎面見羽羽謀殺沛公樊噲事急迺持盾丨撞丨立帳下云云是日微噲奔入營丨讓羽沛公幾殆噲傳對衆折何上置酒丨丨丨丨曰腐儒為天下安用腐儒哉黥布傳坐責諸生周勃為人木彊敦厚不好文學毎召諸生說士東嚮丨丨之趣為我語其椎少文如此召青鄧通申屠嘉為人㢘直門不受私謁是時鄧通方愛幸文帝嘗燕飲通居旁怠慢嘉奏事畢因言曰云云罷朝坐府中為檄召通責之本𫝊雖美丈夫陳平降漢王與語說之拜為都尉使叅乗典䕶軍諸將盡讙絳灌等或讒平曰平丨丨丨丨如冠玉耳其中未必有也本𫝊若真鄙儒叔孫通召魯諸生三十餘人共起朝儀魯有兩生不肯行通笑曰丨丨丨丨不知時變共一秃翁田蚡罷朝坐止車門召安國載怒曰與長孺丨丨丨丨何為首鼠兩端田蚡傳專欲擅權天子以誼任公卿之任絳灌之屬盡害之曰雒陽之人年少初學丨丨丨丨紛亂諸事天子後亦䟽之不用其議賈誼𫝊深文巧詆上方嚮文學尊公孫𢎞及事益多吏民巧上分别文法張湯等數奏決讞以幸而汲黯常毁儒面觸𢎞等懐詐飾智以阿人主取容而刀筆之吏丨丨丨丨陷人於㒺以自為功𢎞湯心疾黯上亦不恱汲黯𫝊曲學阿世轅固曰公孫子務正學以言毋丨丨以丨丨本𫝊治業通賔孫㑹宗書與楊惲曰大臣廢退當闔門惶懼為可憐之狀不當丨産丨丨丨客有稱譽楊惲報書𫝊曰云云今子尚安得以卿大夫之制而責僕哉惲汲黯面折丨丨好丨丨人不能容人之過本𫝊李賢耳語灌夫罵丨丨曰平生毁程不識不直一錢乃效兒女曹呫囁丨丨本傳臺中三狗曹爽進用丁謐何晏鄧颺等於時謗書謂丨丨有丨丨𤓰上青蠅江陵士曹元稹與監軍崔潭峻善潭峻歸朝獻稹歌詩問稹安在對曰今為散郎以為祠部郎中知制誥朝論鄙之㑹同僚食𤓰於閣下有青繩集其上中書舍人武儒衡以扇揮之曰適從何來遽集於此同座皆失色儒衡意氣自若通監無義丈夫李白開元中謁宰府封一板上題云海上釣鼇客李白相問曰先生臨滄海釣巨鼇以何物為鈎線曰以風浪逸其情乾坤維其志以虹霓為絲明月為鈎又曰以何物為餌曰以天下丨丨氣丨丨為餌丞相悚然是何物人唐初裴畧宿衛考滿兵部試判為錯一字落第此人即向僕射温彦博處披訴彦博當時共杜如晦坐不理其訴此人即云少小以來自許明辨至於通𫝊言語堪作通事舍人并解作文章兼能嘲戲彦博始迴意共語時㕔前有竹即令嘲竹應聲嘲曰竹風吹青肅肅凌冬葉不彫經春子不熟虛心未能待國士皮上何須生節目彦博大喜即云既解通𫝊言語可傳語與㕔前屏牆此人走至屏前大聲語曰方今聖主聰明闢四門以待士君丨丨丨丨在此妨賢路即推倒彦博云此意著膞此人云非但著膞亦乃著肚當為杜如晦在坐有此言彦博如晦俱大歡笑即令送吏部與官啓顔録蓋宅奉候馬子將純負才自任好面折人人敬畏之建炎中呂元直作相子將求郡元直拒之徐云有英州見任公可往否子將曰領鈞㫖待先去為相公丨一丨子丨丨揮塵録放鄭不若初荆公為叅知政事時因閲晏元獻公小詞而笑曰為宰相而作艶詞可乎平父曰平父荆公弟亦偶然耳吕惠卿為館職在坐遽曰為政必放鄭聲况自為之乎平父正色丨丨聲丨丨逺佞人也吕大以為譏已自是遂與平父相失東軒筆録也買脱空隆興初有胡昉者大言誇誕當國者以為天下竒才力加薦引命以官曽未數年為兩浙漕一日語坐客云朝廷官爵是買吾曹頭顱豈不可畏適聞人伯卿阜民在座末趨前云也丨丨丨胡黙然同上但惟聲苦熙寧中朝廷有生老病死苦之語時王荆公改新法目為生事曽魯公以年老依違其間富韓公稱病不出唐叅政與荆公爭按問欲與理直不勝疽發背死趙清獻丨丨丨時范忠宣為侍御史皆劾之聞見録柳子厚譏韓愈不作史見後集史官門孫㑹宗與楊惲書惲材朽行穢文質無所底幸賴先人餘業得備宿衛遭遇時變以獲爵位終非其任卒與禍㑹足下哀其愚蒙賜書教督以所不及殷勤甚厚然竊恨足下不深惟其終始而猥隨俗之毁譽也原鄙陋之愚心若逆指而文過黙而息乎恐違孔氏各言爾志之義我故敢畧陳其愚惟君子察焉惲家方隆盛時乗朱輪者十人位在列卿爵為通侯總領從官與聞政事曽不能以此時有所建明以宣徳化又不能與羣僚同心并力陪輔朝廷之遺忘已負竊位素餐之責乆矣懐禄貪勢不能自退遭遇變故横被口語身幽北闕妻子滿獄當此之時自以夷滅不足以塞責豈意得全首領復奉先人之丘墓乎伏惟聖主之恩不可勝量君子遊道樂以忘憂小人全軀說以忘罪竊自思念過已大矣行已虧矣長為農夫以没世矣是故身率妻子戮力耕桑灌園治産以紿公上不意當復用此為譏議也夫人情所不能止者聖人弗禁故君父至尊親送其終也有時而既臣之得罪已三年矣田家作苦嵗時伏臘烹羊炰羔斗酒自勞家本秦也能為秦聲婦趙女也雅善鼓瑟奴婢歌者數人酒後耳熱仰天拊缶而呼烏烏其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時是日也拂衣而起奮褏低卭頓足起舞誠淫荒無度不知其不可也惲幸有餘禄方糴賤販貴遂什一之利此賈豎之事汙辱之處惲親行之下流之人衆毁所歸不寒而慄雖雅知惲者猶隨風而靡尚何稱譽之有董生不云乎明明求仁義常恐不能化民者卿大夫之意也明明求財利常恐用乏者庶人之事也故道不同不相為謀今子尚安得以卿大夫之制而責僕哉夫西河魏土文侯所興有段干木田子方之遺風凜然皆有節槩知去就之分頃者足下離舊土臨安定安定山谷之間昆戎舊壤子弟貪鄙豈習俗之移人哉於今迺睹子之志矣方當盛漢之隆願勉旃毋多談漢本𫝊詩集異煮魚北齊盧思道聘陳設宴聨句作詩先唱者譏北人云榆生欲飽漢草長不肥驢謂北人食榆吳地無驢故有此句思道即續之曰共甑分炊飯同鐺丨丨丨謂南人無義同炊異饌也吳人愧之談藪幾飛螢杜甫謁漢中王王不為禮詩曰西漢親王子成都舊客星相㸔萬里眼一别丨丨丨忍斷盃中物祗㸔座右銘不能隨皂盖自醉逐浮萍荆棘滿庭賈島狂狷行薄執政惡之故不預選裴晉公於興化作池亭島詩曰破却千家作一池不栽桃李種薔薇薔薇花謝秋風起丨丨丨丨公始知人皆惡其不遜古今詩話鳳蹲烏噤曽魯公自嘉祐秉政至熙寜中尚在中書年甚髙而精力不衰故臺諫無非之者惟李復圭以為不可作詩曰老丨池邊丨不去饑丨臺上丨無聲公致仕而去東軒筆録鵞伸鼈縮林和靖傲許洞洞作詩嘲之云寺裏掇齋饑老鼠林間咳嗽老獼猴豪民送物丨丨項好客臨門丨丨頭古今詩話說法馬留元祐間王景亮與仕族無名子結為一社紀事嘲誚士大夫無問賢愚一經諸人之目即被不雅之名號曰猪觜關呂惠卿察訪京東呂天資清瘦語話之際喜以雙手指畫社人呼之曰丨丨丨丨又湊為七字曰說法馬留為察訪社中彌嵗不能對一日邵箎因上殿氣泄出知東平邵髙鼻捲髯社人呼之湊氛獅子仍對曰湊氛獅子作知州惠卿銜之諷部使者發以他事舉社遂為虀粉桐江詩話湊氛獅子見上注身後無名王禹玉丞相既亡有無名子作詩嘲之云太師因被子孫煎丨丨丨丨只有錢喏喏佞翻王介甫竒竒歆殺宋昭宣嘗言井口難為戲獨坐中書不計年東府自來無土地便應正授不須權其家經府指言張山人作府中追張山人至曰你怎生作詩嘲他大臣張曰某自來多作十六十七字詩着題詩某吟不得府尹笑而遣之王直方詩話古今合璧事類備要續集卷四十
