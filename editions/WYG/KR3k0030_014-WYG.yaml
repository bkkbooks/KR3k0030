瓊芳撾鍾髙飲十日酒却入凝寒作君夀御溝泉合姤環素火井温泉在何處李賀季冬十二月建丑丑紐也言終始之際故以紐結名也一云除月事類大吕律中丨丨鴈北鄉鵲始巢雉雊雞乳月令小嵗魏舊制羣臣季冬朝賀服桍褶行事謂之丨丨詔罷之通鑑婺女日在丨丨昏婁中旦氏中月令元枵日月會于丨丨而斗建丑之辰月令注招揺指丑出淮南子地正丨以為丨商以為春後陳寵傳月窮日窮于次丨丨于紀星囘于天數將㡬終嵗且更始月令水澤堅氷方盛丨丨腹丨命取氷以入月令天地烈元冬季月丨丨隂丨萬物權輿于内徂落于外楊校獵賦命大難丨有司丨丨旁磔出土牛以送寒氣月令吕氏春秋曰前嵗一日擊鼔駈疫癘之鬼謂之害除亦曰儺大享臘季冬之月星囘嵗終隂陽以交勞農丨丨丨後禮儀志飭國典天子乃與公卿大夫共丨丨丨論時令以待來嵗之宜月令計耕事令告民出五種命農丨耦丨丨修耒耜具田器同上浴佛會南方専用正月八日灌佛皇朝東京十二月初八日都城諸大寺作丨丨丨井送七寳五味粥謂之臘八粥驅儺神昔顓頊氏有三子亡而為疫鬼一居江水中為瘧鬼一居若水為罔兩􅈮鬼一居人宫室區隅中善驚小兒為小鬼于是以嵗十二月命祀官時儺以索室中而駈疫鬼為東海度索山有神荼鬰壘之神以禦凶鬼為民除害因制丨丨之神季冬先臘一日大難謂之疫選侲子百二十人皆赤幘皂製執大鼓方相氏黄金四目䝉熊皮𤣥衣朱裳執戈特盾率百𨽻及童子而時儺逐惡鬼千禁中見山海經及漢禮樂志詩集樂辭日脚淡光紅灑灑薄霜不銷桂枝下依稀和氣排冬嚴已就長日辭長夜李賀宫詞金吾除夜進儺名晝桍朱衣四隊行院院燒燈如白日沉香火裏坐吹笙王建看梅新陽氣候未全佳尚縱寒威壓嵗華頼有椒觴供卯酒不妨和雪丨丨花韓子蒼古今合璧事類備要前集卷十四
