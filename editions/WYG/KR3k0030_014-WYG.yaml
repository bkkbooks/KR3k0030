body:
  text: 古今合璧事類備要前集卷十四宋謝維新撰時令門秋禮鄉飲酒云秋之為言愁也前律厯志云秋也物歛乃成熟也子由切事類兊正丨丨秋萬物之所説也説卦隂中秋為丨丨萬物以成前律厯志少皥其帝丨丨其神蓐收月令白帝禮西方以立秋謂丨精之丨而少吴蓐收食焉禮注白藏秋為丨丨又曰收成爾雅素節秋曰三秋九秋素秋素商髙商天曰昊天風曰商風素風凄商節風激風悲風景曰明景清景澄景時曰凄辰霜辰節曰丨丨纂要商聲其音商月令注秋氣和則丨丨調注序移玉律氣應金商舊唐書隂氣西方曰辰其時曰秋其氣曰隂管子少隂者西方西遷也丨丨遷落物於時為秋前律厯志秋者隂氣始下故萬物收管子金行西方丨丨之氣西羗傳西顥秋歌丨丨前禮樂志丨丨沆碭秋氣肅殺含秀垂頴續舊不廢郊祀歌金勁丨氣方丨吴淑秋賦矩方秋為矩丨者所以丨萬物也淮南子義者成成者方故為矩也前律厯志金天其帝少昊注少昊丨丨氏月令白露皇天平分四時兮切獨悲此凜秋丨丨既下降百草兮奄離披此梧楸楚詞秋既先戒以丨丨冬又申之以嚴霜同上蘆花浦上丨丨兮秋復秋出皮日休賦木葉嫋嫋兮秋風洞庭波兮丨丨下楚詞一葉落一丨丨天下知秋淮南子萬物酋丨丨丨乎西酋者生之府也太元百卉腓秋日萋萋丨丨果丨毛詩萬葉吟碧天如水窗窗悠悠百蟲迎暮丨丨丨秋欲辭林而蕭颯潛命侣以啁啾劉禹錫秋聲賦萬物肅秋為禮秋肅也丨丨莫不丨敬禮之至也尸子萬寳成正得秋而丨丨丨成注天地以萬物為寳莊子梧楸脱晚枝多露蟬之思夕蔓趣寒螿之愁至若松竹含韵丨丨早丨驚綺䟽之曉吹堕碧砌之凉月劉禹錫賦蒲栁零丨丨之質望秋先丨晉顧愷之云蟬寒吟於是乃屏輕箑釋纎絺藉莞蒻御祫衣庭樹摵以灑落勁風戾而吹帷丨嘒嘒以丨丨鴈飄飄而南飛潘岳秋興賦鴈南飛雲髙氣静露凝衣野草變色莖葉稀鳴蜩抱木丨丨丨曹植秋思賦斗指西方丨丨丨丨曰秋公羊注斗柄西指而天下皆秋鷄冠子日行白道丨丨丨丨曰西陸通統圖後律厯志日行西陸謂之秋少昊執矩丨丨乗兊丨丨司秋前魏相傳蓐收按轡少昊司晨丨丨丨丨選月光露冷嗟秋日之可哀諒無愁而不盡野有歸鷟隰有翔隼逰氛朝興槁葉夕隕何㣲陽之短晷覺凉夜之方永丨朣朧以含丨丨淒清以凝丨熠燿燦於階闥蟋蟀鳴乎軒屏聴離鴻之晨吟望流火之餘景潘岳秋興賦雲浄天髙丨既丨而丨丨潦將收而水潔虞世南賦淅瀝鏦錚有聲自西南來初丨丨以蕭颯忽奔騰而砰湃如波濤夜驚風雨驟至其觸于物也鏦丨丨錚金鐵皆鳴歐陽永叔秋聲賦慘淡慄烈秋之為状也其色丨丨煙霏雲歛其容清明天髙日晶其氣丨丨砭人肌骨其意蕭條山川寂寥故其為聲凄凄切切呼號奮發豐草綠縟而爭茂佳木葱蘢而可悦草拂之而色變木遭之而葉脱同上宋玉秋悲悲哉秋之為氣也蕭瑟兮草木搖落而變衰憭慄兮若在逺行登山臨水兮送将歸泬㵳兮天髙而氣清寂寥兮潦收而水清宋玉九辯禹錫楚望丹葉星房燭耀川原夕月既望躍于丹泉上鏡下氷湔塵洗煙劉禹錫楚望賦詩集秋色鴈聲不到歌臺上丨丨徧欺客路中宿寺夢囘荷葉雨渡江衣冷荻花風王竒凉思松間小檻接波平月淡煙沉暑氣清半夜水禽栖不定緑荷風動露珠傾吴融秋晨梧桐在階影蟋蟀近床聲曉旁窗間至秋從簟上生樂天秋暮岸紅初破木芙蓉送别遥間野寺鐘江抱月流青炯炯山隨天去碧重重盧襄白藕作花風已秋不堪殘睡更囘頭晚雲帯雨歸飛急去作西風一夜愁趙徳隣茅堂索索秋風發行遶空庭紫苔滑蛙號池上晚來雨鵲轉南枝夜深月山谷朔鴈别南裔越燕辭江樓黄雲結暮色白水蕩寒流太白淒清臨晚景踈索望寒階濕庭凝墜露博風捲落槐日氣斜還冷雲峯晚更霾可憐數行鴈㸃㸃逺空排僧清塞㣲陽下江樹秋葉泛殘紅鴈背寒塘雨帆争晚渡風夏竦秋夜竹凉侵卧内野月滿庭隅重露成涓滴稀星乍有無暗飛螢自照水宿鳥相呼杜甫凉冷三秋夜安閑一老翁卧遲燈滅後睡美雨聲中灰宿温瓶火香添暖被籠曉晴寒未起霜葉滿階紅樂天銀燭秋光冷畫屏輕羅小扇撲流螢天階夜色凉如水卧看牽牛織女星王建宫詞銀河漾漾月輝輝樓礙天邉織女禨横玉呌雲清似水滿空霜逐一聲飛崔魯華清宫詩梧桐葉落覆東墻院落風清枕簟凉夢覺踈鐘鳴逺寺一池明月芰荷香謝無逸雲斂青天月漏光中庭立乆却歸房小牕席冷未􅀎卧桃盡殘燈秋夜長樂天逺碧秋聲蟲絡絲入簷新影月低眉床帷半故簾旌㫁仍得初寒欲夜時同上秋冷黄葉委庭觀九州蟲聲日夜戒衣裘金錢滿地無人費百斛明珠薏苡秋山谷莫言秋早未知秋今日風雲已自愁獨傍黄塵吹一馬行看蕭瑟聴颼颼荆公秋江平波渺𣺌煙蒼蒼菰蒲纔熟楊栁黄扁舟繋岸不忍去秋風斜日鱸魚郷陳堯佐秋塘屬玉雙飛水滿塘菰蒲深處浴鴛鴦白蘋滿棹歸來晚愁看蘆花㡬岸黄蘇庠秋郊乍覺生風喜雨凉農家得地發田穣郊園暑退秋光滿㸃滴髙梧似漏長歐陽公秋梧霜風侵梧桐衆葉着樹乾空階一葉下琤若摧琅玕退之宿雲䕶朝霜丨陽佐殘暑庭丨自黄隕風過成音語后山秋意凍雨洗空曠丨標驚丨新大暑去酷吏清風來故人樽酒酌未酌曉花嚬不嚬銖秤與鏤雪誰覺老陳陳杜牧之秋懐霜禽驚呼山麓音霜風急吹溪上林可正平長安一片月萬户𢷬衣聲秋風吹不盡摠是玉闗情李白秋興葦風荷露逼人寒午夢天髙眼界寛落落與誰同此意纎纎初月上雲端僧恵供秋思一從雲水住曽不下西岑落水故園在秋庭積葉新泉流通井脉蟲響出墻隂盡夜更深徹寒燈獨向吟僧齊已月團新碾淪花瓷飲罷呼兒課楚詞風定小軒無落葉青蟲相對吐秋絲秦觀秋望雲物凄凉拂曙流漢家宫闕動髙秋殘星㡬㸃鴈横塞長笛一聲人倚樓紫艷半開籬菊静紅衣落盡渚蓮愁鱸魚正美不歸去空戴南冠學楚囚趙嘏小雨斷復續囘斜落㡌風寒心生蟋蟀秋色旁梧桐草與遥山碧花欺照晚紅口湏談世事目已失飛鴻后山秋感四時催老丨偏丨萬事縈心夜更長魏舒詩人間萬事老無味天下四時秋最愁朱希真秋雨一雨洗殘暑萬家生晚凉陳甫已覺逺天丨色動不堪寒夜丨聲頻出劉鄴秋霽踈雨入簾收薄暑破窻殘月漏㣲明吕居仁楊栁影踈丨丨雨梧桐葉墜夕陽天裴愈逺嶠收殘雨寒林𢃄夕陽㓂凖㡬㸃分秋霽不知何䖏峯秋天露垂金掌重天壓玉䋲低恵崇玉䋲天闕近金柝海城秋希畫秋月一天里色中丨丨十萬軍聲半夜潮趙嘏恍疑水底長流月冷覺天圍不剰秋盧㐮風月竹宻丨敲玉簾踈丨鏤金杜詩鵲飛山月晚蟬噪野風秋上官儀孤管明秋月清砧韻霜風霜月風傳鼔角丨侵㦸雲捲笙歌丨上樓李羣玉纎塵不動天如水一色無垠月共丨舒亶新丨染楓葉皎月借蘆花楊徽之詩秋近草蟲亂夜遥丨丨低恵崇月露夜乆金莖添沆瀣空虚碧月映琉璃杜牧水光先見丨丨氣早知秋李昉風露蕭蕭白露催黄落剪剪凉飈痩碧鮮謝無逸丨來玉宇烏先覺丨下金莖鶴未知劉子儀樓潤星河露川寒鼓角風希畫風雨濯殘暑氣朝來雨助作秋聲夜半風曽䡗秋聲簾幙千家雨落日樓臺一笛風杜牧雲埋山麓蔵秋雨葉脱林梢帯晚風陳知黙水雲杳杳愁生晚丨丨冥冥秋到遲吕居仁㣲雨池塘見好風襟䄂知選雨壁長秋菌風林落病蟬卜震風清江上寺雨洗月中砧貫休西風酒旗市細雨菊花天歐陽丨丨江城暮波濤海寺秋王元之曉景澄霄半床月淡曉數峯雲范仲淹壁横殘月丨門掩候蟲秋栁子厚晚景一笛西風吹落日滿帆行客背孤城韓持國半身落日離秦樹一路平蕪落楚煙沈彬寺接江聲秋月上樓依野色夕禽還僧無本白鳥背人秋自老蒼煙和樹丨來濃林逋橋横水木已秋色寺倚雲風更晚晴同上浮雲悲晚翠落日泣秋聲趙嘏暝色披煙鳥秋聲帯雨荷樂天樹蔵秋色老禽帯夕陽歸余靖山景秋移瘦出無多寺古翠濃連一半雲林逋秋聲萬壑滿月色一窻虚梵崇秋聲動羣木暮色起千山林逋夕寒山翠重秋静鳥行髙同上江景汀葦亂飄寒夜雨沙鷗寒㺯夕陽天張泳貪看好鳥横秋浦不覺清林沒暮潮東坡潮落漁人散鍾遲秋寺深方平江山一聲丨笛巴雲暝半夜丨風楚樹秋㓂凖山中露冷草木瘦江上月寒蒲栁秋吕居仁花木風荷老葉蕭條綠水蓼殘花寂寞紅樂天霜葉聲乾飄夕照露荷香冷泣秋風冦凖開盡菊花秋色好落遲桐葉雨聲寒楊徽之自種黄花添野景旋移髙竹聴秋聲謝景山露菊花蔞日風梧葉落時樂天石莎無雨痩秋竹共蟬清林逋禽鳥惜别擬憑風外燕傷秋因感雨中蟬陳堯佐鶴盤兩翅投孤嶼蟬曵殘聲過别枝樂天翡翠閑居眠藕葉鷺鷥别葉在蘆花余秀老蛩聲千里暮鴈影一天秋李若水歸鴉度晚景落鴈帶邉聲秋燕辭楓樹日鴈度麥城霜杜髙鳥黄雲暮寒蟬碧樹杜過鴈𡨕㝠沙水鴈初下獵獵菰蒲秋向深韓子蒼驚起暮天沙上鴈海門斜去兩三行齊已井花汲水銀瓶冷鴈字吹髙玉露寒盧襄西風隨岸急寒栁向人踈僧尚􅀎踈鍾天竹曉一鴈塞門秋出姚鉉木落千山瘦天髙一鴈横吴正仲詩啼猿水宿五溪月霜丨三峽丨太白萬木殘秋裏孤舟半夜猿翁宏雜詠秋色入林紅黯淡日光穿竹翠玲瓏蘇子羙卧聴秦樹秋聲斷吟想荆江夕鳥還鄭谷扇聲猶泛暑月氣忽生秋王元之溪聲連竹韻野色混秋光宼凖破林霜後月孤寺水邉山林逋露滴秋樹髙蟲吊寒夜永退之粉蝶風煙外黄雲草樹秋田元邈西風一横笛金氣愈髙明山谷宦情随日薄詩思入秋多杜荀鶴孟秋七月建申申身也言萬物身體皆成也一云相月纂要云亦曰初秋首秋上秋肇秋蘭秋事類夷則律中丨丨注孟秋氣至則丨丨之律應月令建星昏丨丨中旦畢中在金是月也以立秋盛徳丨丨並同上流火七月丨丨毛詩化螢立秋腐草丨為丨出通卦驗鳴鵙七月丨丨詩烹菽七月丨葵及丨食𤓰七月丨丨並同上食麻丨丨與犬月令登榖農乃丨丨天子嘗新先薦寢庙月令斗建申日月會於鶉尾而丨丨丨之辰月令招揺指申淮南子日在翼孟秋之月丨丨丨月令天地肅是月也丨丨始丨風露䧏凉丨至白丨丨寒蟬鳴鷹乃祭鳥誅暴慢詰丨丨丨以眀好惡修法制命有司丨丨丨繕囹圄具桎梏禁止姦吕令選兵天子乃命將帥選士厲兵簡練桀俊専任有功以征不義並同上漢儀揚武丨丨立秋日迎郊畢始丨威丨斬牲于東門薦陵廟後禮儀志詩集早秋旦暮已凄凉離人逺思忙夏衣臨曉薄秋影入簷長前事風随扇歸心燕在梁殷勤寄牛女河漢止相望元稹初秋殘暑已束装好風方來歸未􅀎踈團扇且復製秋衣髙蟬遽如許長吟送落暉相戒趣女功莎虫􅀎表㣲秋熱七月六日苦炎蒸對食暫飡還不􅀎毎愁中夜自足蝎况乃秋後轉多蠅束帯發狂欲大呌簿書何急來相仍南望青松架短壑安得赤脚踏層氷杜甫秋霽時丨積雨丨新凉入郊墟燈火稍可親簡編可卷舒韓詩樂辭星依雲渚泠露滴盤中圓好如花生木末衰黄愁空園夜天玉砌池葉極青錢僅厭舞衫薄稍知花簟寒曉風何拂拂比斗光闌干李賀扇詩新裂齊紈素皎潔如霜雪裁成合歡扇團團似秋月出入君懐袖動揺㣲風發常恐秋節至凉飈奪炎熱棄捐篋笥中恩情中道絶顔延年班婕妤扇詩急雨丨丨收殘暑西風吹暮蟬煙浮水空闊露洗月華圖張芸叟西風打荷看急雨吞月住行雲夜半蚊雷起丨丨為解紛山谷暑退茗椀夢中覺荷花鏡裏香凉生只當處丨丨亦無妨山谷氣低遞嘯取遥風㣲㣲近秋朔金柔丨尚丨火老候愈濁韓聫句清商至丨丨應秋丨溽暑隨節閑文選大火流丨丨