body:
  text: 古今合璧事類備要别集巻七十六宋謝維新撰走獸門獬廌格物總論獬廌神竒之獸也生於東北荒狀如羊而一角青色四足性忠直遇有不正者則觸之一名任法獸廣雅字作􅀈􅀈字林作觧廌陸作獬豸同事類獄依所在獬廌性忠而邪則觸之困則未止故立丨皆東北丨丨丨也東北荒之獸也神異經冠象觸邪解豸之性觸而瑰飾獬豸丨足以丨丨丨牛僧孺象化解帝問何食解廌伏如牛古者决訟命之以觸不直黄帝時有遺者丨丨丨丨何處曰食廌夏處山澤冬處松栢説文堯緝其毛丨時有獬廌丨丨丨為帝帳田求子獬廌能觸丨丨或曰似熊丨知曲直性識有罪獄者令羊丨之臯陶敬羊跪坐事也論衡獬廌不學侯思止髙元禮密教曰上不次用人如問君不識字宜對丨丨丨丨而能觸邪陛下用人安事識字無何后問思止以對后大悦本傳富平神羊𤣥宗時丨丨縣産一丨丨肉角當頂白毛上捧議者以為獬豸雜俎魏文正公笏銘靈豸薦角比干獻骨合以憤烈在公為笏云云詩集冠豸丨丨猶屈蠖師子格物總論師子狻猊也一名白澤一名斗形似虎正黄色有髯耏尾端茸毛大如銅頭鐵額鉤爪鋸牙弭目跪足目光如電聲吼如雷能食虎豹外國之産毛君之長也事類食虎狻㹸如虥猫丨丨豹爾雅服狸見後注若虥毛淺丨丨爾雅注似麟見後注白澤出黄帝巡於東海丨丨丨能言語賢君德及幽逺則出孫氏瑞應圖狻猊走穆天子巡行天下云云丨丨日丨百里穆天子傳安息獻漢章元年丨丨國丨師子形似麟而無角月支獻後漢章帝章和元年丨丨國使丨扶拔師子疏勒獻孝順帝陽和四年夏丨丨國丨氂牛師子並本紀狸伏師子魏武伐冒頓經白狼山逢師子使格之見一物從林中出如丨上帝車軌上師子將至便跳上師子頭師子伏不敢起遂殺之得獅子還至四十里鷄犬皆無鳴吠博物志象畏師子宋宗愨討林邑王范陽邁傾國來逆以具裝被象前後無際愨以為外國有師子威服百獸乃製其形與象相禦丨果驚奔因此潰亂遂克林邑間又梁伯玉説沙門釋僧告云嘗從天竺欲向大秦其忽聞數千里外哮哮噉噉驚天怖地頃之但見百獸率走蹌地至絶既而四巨象虓馬而至以鼻巻泥數數噴鼻偶立俄有師子三頭崩石折木直搏四象以殪血若溢泉巨樹草偃宋炳擊象圖夢騎師子王敬則丨丨五色丨丨位至太尉齊書詔停師子姚璹大食使者獻師子璹曰是獸非肉不食自碎業至都所費廣矣陛下鷹犬且不畜而厚資養猛獸哉有丨大食丨獻天竺師子丨丨濱海出丨丨訶毗師子總章間丨丨施主捺塞獻丨丨康居使獻西域丨丨遣丨丨師子獸帝珍其逺命秘書少監虞世南作賦西域馴養丨丨師子能丨丨師子因以名國太常樂舞趙宗儒守丨丨卿太常有五坊師子丨非大朝會不作帝嗜聲色宦官領教坊者乃移書取之宗儒不敢違慈恩名畫西明丨丨多丨丨塔前璧濕耳師子時所重也南部新書師子尾拂集賢校理張希復言舊有丨丨丨丨夏月蠅蚋不敢集其上雜俎師子筋絃釋氏書言丨丨丨為丨鼔之衆絃皆絶同上近井哮吼開元丨西國獻師子至安西道中繫於驛樹丨丨丨若不自安俄頃風雨大至有龍出井而去鷄跖集虞世南師子賦時西域康居獻師子帝􅎇其逺命世南作賦惟皇風於海外通鳳穴以文軌襲龍庭以冠帶舍夷言於藁街陳方物於王會𣺌𣺌地角悠悠嶂表有絶域之神獸因重譯而來擾其為狀也筋骨糾纒殊姿異制闊􅀈修尾勁毫柔毳鉤爪鋸牙藏鋒蓄鋭弭耳宛足伺間借勢暨乎奮鬛䑛唇倐來怱往瞋目電曜發聲雷響拉虎吞貔裂犀分象碎隋兕於齦齶屈巴蛇於指掌踐藉則林麓摧殘哮呼則江河震蕩服猜心與猛氣遂感德以依仁同百獸之率舞共六擾而來馴斯則物無定性從化如神譬鱗羽變質於淮海金錫成器於陶鈞當是時也兆庶欣瞻百寮加歎悦聲教之遐宣属光華之在旦臣載筆以叨幸得寓目於竒玩順文德以呈祥乃編之於東觀張九齡師子賛序夫德之所感者深物之所懷者逺中國有聖占候而自來四夷不舉王征伐而難致故絶域有來貢没羽諸侯有不入包茅其大凡不在遐邇頃至自南海厥繇西極獻其方物而獅子在焉爾雅所謂狻猊如虥猫食虎豹今之所見信然絶猛者也其天骨雄詭材力傑異得金精之剛為毛羣之特屹立不動而九牛相去耽視目瞋則百獸皆伏所以肉視犀象孩撫熊羆其餘𤨏細不置牙齒我天子示柔逺之義固無不庭有服猛之威物無難致故其受羈絏伏閑皂而為用鋒莫敢當然吾君所存義不謂此蓋蠻夷君長歲時貢獻或珠琛絶賚實於内府或異獸竒禽擾於外囿皆其覲禮若中國之贄幣所不辭讓明異方之臣妾此則非有利之之心充耳目之玩好以為懷之之道示天地之舍容不其然歟故無得而稱也義異大犬豈勞召公之訓美同赤豹何關韓侯之詩凡我侍臣咸為之賛髙適樊少府㕔賛序百獸至猛莫如師子紺眼星懸赤毛熖起銅爪鐵甲鋸牙鑒齒顧犀象則百隊山跧看熊羆則千羣野死以此言威威可知矣仙尉樊公寫象圖中崑崙却捽而屋壁欲動虎豹瞻懾而訟庭已空稜稜兮隔簾飛霜颯颯兮滿院生風於是乎師子為百獸之長遂識樊公為百夫之雄蘇子瞻屏風賛并序潤州甘露寺有唐李衛所留陸探微畫師子板余自錢塘守膠西過而觀焉使工人摹之置公堂中且賛之曰顧圓其目仰其鼻奮髯吐舌威見齒舞其足前其耳左右盻喜見尾雖猛而和蓋其戲嵓嵓髙堂䕶燕几啼呼顛沛走百鬼嗚呼妙哉古陸子象格物總論象大獸外國所産身長丈餘髙稱之大六尺餘長鼻牙耳鼻俱垂牙亦長丈許鼻端有爪猪目睛黒三年一乳形體特詭鼻為口使望頭如尾馴良承教聽言則跪服重致逺行如丘徙有白者有灰色者肉兼十牛六十嵗骨方足古者典廐象一給二丁日給藁六圍稻菽各三斗鹽一升非此不足飽其欲然象妬惡犬聲獵者褁糧登髙樹創熊巢伺之有羣過則為犬聲悉舉鼻吼叫循守不復去或經五六日困倒其下因潜殺之又脱其牙則藏之削木以代可得不爾則窮其土得之即噬也或以為象雖魁梧而蚺蛇能吞之三嵗而出其骨則其又有大於此者事類焚軀象有齒以丨其丨左擢齒丨象之丨舒元輿哀雌南方有象各有雌雄其一雌死百有餘日泥土著身獨不飲食長吏問其所以輒流涕若有哀之情狀博物志泣子象見子皮無逺近而泣莊子揺光精丨丨散而為象運斗樞南山美丨丨之丨者有犀象焉白帖為之耕舜葬蒼梧下有羣象常丨丨丨皇甫謚帝王世紀驅而逺周公相武王滅國者五十丨虎豹犀象丨丨之孟滕文公來獻象齒憬彼淮夷丨丨其琛元龜丨丨大賂南金詩泮水使執象尾呉伐楚王丨丨燧丨以奔呉師注燒燧火以繫象丨使驚奔呉師左南海獻象武帝時丨丨丨馴丨注能拜隨人意林邑獻象成帝時丨丨王丨丨一能拜跪驅象以助王莽與世祖戰昆陽丨虎豹犀象丨丨威武乗象以戰大宛身毒國其人丨丨丨丨並漢書張茂夢象後漢丨丨丨大丨問萬推推曰象者獸也獸者守也君當為郡然不能善象有齒以焚身後皆如其言蒼舒秤象魏太祖欲知象輕重而不可秤少子蒼舒曰置象以舟刻其水痕而以土實則知其數也帝悦之行則導引晉時南越獻馴象駕車丨丨以丨丨以試橋梁後象以鼻害人有司怪之欲殺象象垂鼻而泣血流地不敢動自後朝議以象無益於事悉送還越戰果驚奔宗愨事見師子門注祖道率舞呉賀齊為新都太守孫權出丨丨作樂舞象權謂齊曰今定天下都中國使殊俗貢珍百獸丨丨非君而誰異類不拜明皇所教舞象天寳之亂祿山大宴胡酋出象紿之曰此自南海奔至以吾有天命雖丨丨必拜舞左右教之象皆努目不動終丨肯丨祿山怒盡殺之南楚新聞動合音律明皇每賜酺御樓引大象犀牛或拜或舞丨丨丨丨雜錄皆合節奏蠻王迎漢使於百花樓前設舞象曲動樂即倡優引入一象以金羇絡首錦襜垂身隨拍滕踏動掉頭揺尾丨丨丨丨嶺表錄異詔還詹毗魏謩詹毗國獻象謨以為非土性不可畜請還其獻詔可孔帖悉放荆山真臘德宗初即位蠻夷所獻馴象畜苑中元會充庭者凡三十二丨丨丨丨之陽同上郭璞象賛象之為獸形骸特詭身倍數牛目不踰狶鼻為口使望頭若尾馴良承教聽言則跪素牙玉潔載籍所美服重致逺行如丘徙范至能虞衡志象出交趾山谷惟雄者有兩長牙佛書云白象又云六牙今無有象頭不可俯頸不可回口𨼆於頤去地尚逺運動以鼻為用一軀之力皆在鼻將行先以鼻拄地乃移足知其足力劣於鼻也鼻端甚深可以開闔取物中有小肉夾雖芥子亦可拾每以鼻取食即就爪甲擊去泥垢而後捲以入口飲水亦以鼻吸而捲之足如柱無指而有爪甲五枚形如大栗登髙山下峻坂涉深水形擁腫而甚捷交趾出象處曰象山嵗一捕之山有石室惟通一路周圍皆石壁先置蒭豆於中驅一馴雌入焉布甘蔗於道以誘野象象來食蔗則縱馴雌入野象羣誘以歸石室隨以巨石窒門象饑人緣石室飼馴雌野象見雌得食亦狎而來求飼益狎則鞭之少馴則騎而制之久則漸解人意又為立名字呼之則應牧者謂之象奴又名象公凡制象必以鈎象奴正跨其頸以鐵鉤鈎其頭欲其左鈎頭之右欲右鈎左欲却鈎額欲前不鈎欲其跪伏以鈎正案其腦案之痛則號鳴人謂象能聲諾者此也其行列之齊皆有鈎以前却左右之其形雖大而不勝痛故人得以數寸之鈎馴焉馴之久者象奴來則低頭跪前左膝人踏之以登則奮而起行蠻酋出入多乗象其貢中國者背施鞍架御座號羅我象額編金鈴千數枚行則琅琅然交人有犯惡逆者卧之地使象蹴殺之二廣亦有野象村落小民酒熟則尋香而來破壁入飲人甚苦之所過亦害禾稼象日細畏火不畏人倉卒遇之以長竹繫火逐之輒退羣象雖多不足畏惟獨象最可畏蓋其强悍不容於羣獨行無所忌遇其肆毒以鼻捲人擲殺蹴其血流吸飲之欽州人能捕象象行觸機則刅下繫之中其要害必死將死以牙觸石折之以牙為身災也非要害則負刅而行肉潰則刅脱傷其鼻亦死鼻傷之瘡不可合故亦致死殺一象材衆飽其肉鼻肉最美熟而加糟糟透臠而食之象皮可以為甲或條截之硾之至乾治以為杖甚堅詩集添跡山腹雨餘丨象丨栁宗元嶺南江行埋牙野象丨丨斸石磯元稹送崔侍御竒毛覩丨丨丨象犀韓愈同宿聨句赤手縛丨丨丨象犀王荆公犀附兕格物總論犀狀如水牛豬頭大腹痺脚三蹄黒色皮一孔三毛行於江海水為之開冒霧露不濕二角一在鼻一在額鼻上角長額上角短鼻上食角也或曰奴魚或又云二角一在額上為兕犀一在鼻上差小為胡帽犀牡犀亦有二角皆為毛犀而今人多傳一角之説然此數種俱有粟文以文之麄細為貴賤角之貴者有通天花文犀有此文必自惡其影常飲濁水不欲照見也其文理絶好者則有百物之形或又云犀之通天者是其病理不可知也又有倒挿者有正挿者有腰鼔挿者倒挿者一半以下通正挿者一半以上通腰鼓挿者中斷不通其類極多足為竒異犀中最大者為墮羅犀一株有重七八斤者此牯犀額角也其花多作撒豆班色深者堪帶佩班散而色淺者但可作器皿耳海人取之之法先於山路多植木如猪羊棧其犀以前脚直常依木而息多年植木爛犀或倚之即木折犀倒久不能起因格殺而取其角又云犀每自退角必培土埋之海人知處即潜作木寓角而易之再三不離其處時復有得者若直取之則犀去於别山退藏不可尋也未知的然否或又以為鴆飲水處有犀牛若不自濯其角必為水物食之而死蓋鴆食蛇毒在焉故也兕或以為雄犀如野牛青皮堅厚可以為鎧嶓冡山多或以為兕似牛而一角犀似猪而三角必有能辨之者事類和羅墮丨丨多美犀世謂墮丨丨犀孔帖占城丨丨獸之竒犀五代史烏弋馳丨丨之名黄支標丨丨之美巴浦丨丨之犀其可遇乎並孔帖梁山南方有丨丨犀象出焉爾雅得以獻太公使南宫适至義渠丨駭鷄犀丨丨於紂韓詩外傳驅而逺周公丨犀象丨丨之天下大悦孟滕文照水怪晉温嶠過牛渚磯水深不可測世云其下多怪物嶠遂燃犀角而丨之須㬰見丨族覆火竒形異狀或乗車馬著赤衣者嶠其夜夢人謂己曰與君幽明自别何意相照也意甚惡之未旬而卒本傳厭水精水為害蜀守李氷作石犀五枚沈於江中以丨丨丨蜀記屏風為匣唐太真虹霓丨丨以玳瑁丨丨太真外傳白玉方響宫人沈阿翹自言呉元濟之女進丨丨丨丨言其搥則響犀也凡物有聲乃響杜楊編煖氣襲人開元元年冬至交趾國進犀角一枚色如金使者請以金盤置於殿中温然丨丨丨丨上問其故使者對曰此辟寒犀也開元遺事夜明如晝敬宗寳厯元年南昌國進丨丨犀其狀類通天夜則光明可照百步覆繒十重終不能掩其輝煥上令解為腰帶每遊獵夜則不施其蠟炬有如丨日杜陽編賜辟暑犀文宗延學士於内庭李訓講周易時方盛夏上命取辟暑犀以賜孔帖帶蠲忿犀同昌公主丨丨丨丨形如彈入土不杇丨之令人丨去丨怒為母為簟張易之丨丨丨犀丨唐五行志搜家所珍李勉嶺南節度使被召至石門盡丨丨人丨蓄丨犀投江中孔帖貢雙龍犀大中初女蠻丨丨丨丨有二龍鱗鬛爪甲悉備乃卧魚犀楊收女適裴坦長子嫁資豐厚坦尚儉聞之不樂一日與夫人至新婦院臺上視果楪丨丨丨丨遽拂袖出北夢鎻言為簪辟塵辟塵犀丨婦人丨梳塵不着髮嶺表錄異服帶辟塵李司封宗易嘗言石駙馬保吉知陳州其州廨一皆新之每毁舊屋則坐於下風塵自分去人皆驚怪蓋其所丨丨丨丨犀也本草郭璞犀贊犀之為狀形兼牛豕刀無不傾吻無不靡以賄嬰災因乎角犄兕出狎虎兕丨於丨語投角善攝生者無所丨其丨老不遇陸行丨丨虎兕同上不避陸行丨丨兕虎獵夫之勇莊大兕既張我弓殪此丨丨詩周宣王時狂兕丨丨觸蹷西都賦水兕占城丨丨五代史白兕丨丨為上瑞唐六典禮部盧肇海潮賦驅貔虎與兕象呀偃蹇而矍鑠忽劃礫而齹􅀈注此何反意宜反齒露不齊狀李白大獵賦施犇兕以却走皮日休鹿門𨼆書披林逐虎兕遇其患是人不為天幸也非天也詩集期剸匣龍丨丨犀孟郊歲貢貞元之丨丨馴犀上林置圏官司養玉盆金盞非不珍虎啖狴牢魚食網元稹毛覩象丨竒丨丨犀韓詩角駭鷄馴犀馴犀通天犀軀貌駭人丨丨丨海蠻聞有明天子驅犀乗傳來萬里一朝得謁大明宫歡呼拜舞自論功五年馴養始堪獻六譯語言方得通上嘉人獸俱來逺蠻館四方犀入苑䬴以瑤蒭爍以金故鄉迢逓君門深海鳥不知鐘皷樂池魚空結江湖心馴犀生處南方熱秋無白露冬無雪一入上林三四年又逢今嵗苦寒月飲氷卧霰苦踡跼角骨凍傷鱗甲縮馴犀死蠻兒啼向闕再三顔色低奏乞生歸本國去恐身凍死似馴犀君不見建中初馴象生還放林邑君不見貞元末馴犀凍死蠻兒泣所嗟建中異貞元象生犀死何足言白居易犀鎮帷金盤丨丨丨杜牧杜秋娘犀入苑見前入海求何但丨丨丨靈犀歐兕兕吼雲霧埋山蒼丨丨杜兕呌山寒青丨丨兕啼松風澗水聲合時青丨黄熊丨向我幕前致丨丨生丨九青兕東南有丨丨丨狂兕獵者西北矢利塵白冥冥獨此清夜止陸龜蒙槖駞格物總論槖駞大於水牯紫色耳垂脊上有一封若封土有靈性能知水脉識泉源風將發即引項而鳴然負重致逺力可千斤日行三百里古者典廐駞牛騾各四給一丁日給藁一圍鹽三合易馴養也亦曰駱駞云事類陽光丨丨之山其獸多槖駞若流沙日行二百里力負千斤山海經泉渠槖駞本出丨丨白帖知水脈燉煌西渡流沙往外國千餘里中無水時有伏流處人不能知槖駞丨丨丨過其處輒停不行以足踏地人掘之輒得水博物志知風候流沙數百里夏日多熱風為行旅之患其風欲至唯老駞知之即預鳴而避之埋其口於沙中人以為候即以氊擁其鼻口其風迅速須㬰即過不爾則至危斃後周四夷傳實内廐蘇秦説楚成王王誠能用臣愚計則燕代槖駞良馬必丨丨丨也史鄯善多漢丨丨丨槖駞白帖龍祠鬪單于於丨丨丨槖駞為樂東觀漢記駞助軍田縉拜夏綏銀節度使王師伐蔡縉上槖丨牛馬丨丨駞給行回紇大厯三年光親可敦卒以兵部侍郎李涵持節􅁽拜可敦是時財用屈税公卿羸槖丨丨丨並孔帖飛龍駞貞元初關輔宿兵以丨丨丨負永豐倉米給禁軍唐食貨志獨峯駞吐蕃贊普其獸丨丨丨日行千里孔帖名牛豹南蠻寳利佛逝有槖駞豹文而犀角以耒且耕丨丨駞丨同上曰山精劉秉仁為江州刺史自京將槖駞至郡放之山下野人見之大驚共射之乃以狀白州丨獲廬丨丨於某處劉命致之乃所放駞耳三水小牘如馬鞍槖駞脊丨丨丨鄴中記若丘阜史思明賊之陷兩京嘗以槖駞載禁府珍寳貯范陽丨丨丨然孔氏帖卧漏明明駞千里脚明當作鳴謂駞丨屈足腹不着地而丨丨者最能行逺雜俎疾如風于闐有風脚駞日行七百里其丨丨丨洽聞記石駱駞西南夷國山上有丨丨丨腹下出水飲之令人身白净異域志金駱駞神龍以後民謡曰山南烏鵲窠山北丨丨丨鎌柯不鑿孔斧子不施柯山南唐也烏鵲窠者人居寡也山北胡也丨丨丨虜獲而重載也五行志收數十張光晟勒兵盡教回紇羣胡丨槖駞丨丨孔帖羣七十駞之丨以七十唐百官志典廐吉槖駞天官侍郎吉頊長大好昻頭行視髙而望逺郎中張元一目之為望栁丨丨朝野僉載郭槖駞丨丨丨未知始何名病傴僂隆然伏行有類槖駞者故鄉人號之曰駞駞聞之曰甚哉名我固當因捨其名亦自謂槖駞云栁文王槖駞五代蜀龍州軍事判官王延鎬頎然而長書扎飲博觸事不能時號丨丨丨北夢𤨏言郭璞槖駞贊駞為竒畜肉鞍是被迅驚流沙顯功絶地潜識泉源微乎其智詩集駞呼􅕫載實丨丨丨注􅕫乙轄反韓文聨句槖垂鈴丨丨丨棧駞名􅕫王荆公峯出翠釡紫駞之丨丨丨丨杜麗人行封䝉錦帕鳴駞出西域衘尾自連連漢驛凌雲去胡人踏雪牽當時識風候過磧辨沙泉老覺肉丨側猶丨丨丨鮮梅聖俞紫駞之峯丨丨丨丨𤣥熊掌陸雲居古今合璧事類備要别集巻七十六
