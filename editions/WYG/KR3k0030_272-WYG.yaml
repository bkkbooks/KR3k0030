body:
  text: 古今合璧事類備要别集巻六十六宋謝維新撰飛禽門鸛格物總論鸛水鳥一名負金一名背竈一名旱羣狀類於鶴但赤脚無朱頂巢於髙木絶頂處善飛摶其飛也奮於層霄之上落處不知其幾千里仰天號鳴必將有雨或者其有靈性云事類後有銜鱣後漢楊震字伯起年五十始應州郡辟衆人謂之晩暮丨丨鸛雀丨三丨魚飛集講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣本傳目為趂蛇魏光乗任丨拾遺題品朝士丞相姚元之長大行急丨丨丨鸛坐此貶新州新興尉朝野僉載呼爲碧鵲裴寛韋詵許妻以女幃其族使觀之寛時衣碧瘠而長既入族人皆笑丨丨丨鸛丨本傳栁宗元閔生賦戲鳧鸛乎中庭芳蒹葭生於堂筵詩集水鸛巢丨丨丨層甍文集田鸛鳴時聞田鸛鳴杜遊石角詩鳶格物總論鳶鴟類陶隠居云即俗人呼為老殦者與鵰鶚並相似而太極善飛騰江湖間捕魚食之事類載鳴鳶前有塵埃則丨丨丨禮嚇鵷雛鴟鳶得腐䑕仰丨丨丨恐奪之莊子集魚上自置魚於葦間仰見鳴鳶集其上乃冠木於器旁以懼之明日澤西漁者乃刻木澤畔前日置魚者目眡而去三年不敢漁劉蜕古漁父篇視飛鳶當吾在浪泊西里聞虜未滅之時下潦上霧海氣熏烝仰丨丨丨跕跕墮水中卧念少游平生語時何可得也後馬援傳下雙鳶後魏托跋翰從太宗遊自登東北有雙鳶飛鳴於上太宗命左右射之莫能中鳶旋飛稍髙翰因而目射之二箭丨丨丨太宗嘉之賜御弓矢以旌之曰射鳶都尉白帖乗紙鳶北齊景哲従弟黄頭使與朱姻自金鳯臺各丨丨丨以黄頭獨能空紫陌乃以殺之白帖放紙鳶五代漢李業與隠帝狎眤丨丨丨於宫中白帖白鳶見晉中典孝宗永和元年丨丨丨白帖夜鳶鳴光啓二年正月閶鄉湖城野雉及鳶夜鳴孔帖鳶肩火色馬周岑文本謂所親曰周丨丨丨丨騰上必速恐不能久果年四十八而卒本傳劉禹錫飛鳶操鳶飛杳杳青雲裏鳶鳴蕭蕭風四起旗尾飄揚勢漸髙箭頭砉劃聲相似長空悠悠霽日懸六翮不動凝非烟游鯤翔雁出其下慶雲清景相廻旋忽聞飢鳥噪相聚瞥下雲中争腐䑕騰音厲吻相喧呼仰天大嚇疑鵷雛畏人避犬投髙處俯啄無聲猶屢顧青鳥自愛玉山禾仙禽徒貴華亭露樸簌危巢向暮時陪鰓飽腹蹲枯枝遊童挾弹一麾肘臆碎羽分人不悲天生衆禽各有類威鳯文章在仁義鷹隼儀形螻蟻心雖能戾天何足貴楊譽紙鳶賦相彼鳶矣亦何戾天問何能爾風之力焉余因稽於造物知不得於自然原其始也謀及小童徴諸哲匠蔡倫造紙公輸獻此理纎蔑以體成刷丹青而神王殷然而髠彼羽翼邈爾而引夫圎吭膺繫纎縷尾續長繩俯劇驂之七達挂髙臺之九層形同而和似鬬雞之養紀渻目大不覩若異鵲之在彫陵因所好而毛羽思有遇而騫騰鄙宋都之退鷁暮溟海之摶鵬於是扇以扶揺縦諸寥廓絢練倐閃翕赫忽霍瞬息而上千尋咄嗟而遊大漠翔鶤仰不逮逮况青鳥之與黄雀彼都人士瞻竚城隅初指冲天之鶴逺言拂日之烏望有塵埃謂翻形而載斾德無音響疑避影以銜蘆始回翔於元氣終出入於髙衢所以羽翮既成雲霄自致期上騰以奮激何中路之顛墜力不倍風勢將控地感魚龍之失水羡蚊䖟之附􅂹比畫虎之非真與芻狗之同棄寧待時而畜力信因人以成事吁嗟鳶兮適時與我相期知我者使我飛浮不知我者謂我拘留啄腐鼠兮非所好嘯茅棟兮增至愁才與不才且異能鳴之雁適人之適將同可狎之鷗我於風兮有待風於我兮何求幸接蜚廉之便因従汗漫之遊當一舉而萬里焉比夫榆枋之與鸒鳩者哉詩集嘯愁鳶茅棟丨丨丨文集盡阽鳶南征丨丨丨杜諌懐下林隈飢鳶阽阽丨丨丨猜意鵷雛奪鼠來瞥映斜陽上茅棟塊如岷芋坐毰毸張文潜憑風去誰作輕鳶壯逺觀似嫌飛鳥未多端纔乗一線丨丨丨便有愚兒仰面看未必青霄因可到偶能終日遂為安扶揺不起滄溟逺笑殺鵬摶似爾難王逢原紙鳶詩雁附鴻格物總論雁陽鳥狀如鵞而小泊江湖洲渚之間動計千百大者居其中令雁奴圍而警察飛有先後行列秋南而春北鴻又其大者羽毛純白似鶴而大南人多採捕之事類候時大夫執雁取其丨丨而行也隨陽陽鳥攸居注丨丨之鳥鴻雁之屬書禹貢鴈行兄弟之齒以丨丨禮記雁贄凡贄大夫用丨雁有先後行列故以為丨繁露雁塞梁州界有雁塞山相傳此山有大池記水雁棲集故名丨丨梁州雁峰衡州有回丨丨至此不過遇春而回郡志食黍與雁記月令弋鳧與雁將翺將翔丨丨丨丨詩虛弓而落更嬴善射引丨丨丨雁丨家語不材而死莊子出於山舍故人之家令竪子請曰其一能鳴其一不能鳴請宰殺主人曰殺不能鳴者弟子問曰主人之雁以丨丨丨丨先生何處焉莊子笑曰周將處夫材與不材之間乎莊子上林得雁蘇武在匈奴中昭帝即位數年匈奴與漢和親漢求武䓁匈奴詭言武死後漢使復至匈奴常惠請其守者與俱得夜見漢使具自陳過敎使者謂單于言天子射丨丨中丨丨足有繫帛書言武䓁在某澤中使者大喜如惠語以讓單于單于視左右而驚謝漢使曰武䓁實在本傳在郡食雁後漢度遼將軍皇甫規解官東歸安定鄉人有以貨買雁門太守者亦去職還家書刺謁卧不迎既入而問卿前丨丨丨丨美乎本傳銜蘆避繳雁従風而飛以愛氣力丨丨而飛以丨矰丨淮南子抜草除穢上虞縣雁為人田春銜丨丨根秋啄丨其丨是以縣官禁民不得妄害白氏帖白為婚贄孝敬皇帝𢎞納妃裴而有司奏贄用白雁適苑中獲之帝喜曰漢獲朱雁為樂府歌今得丨雁丨丨丨婚乃人倫首我則無慙孔氏帖赤為中瑞禮部蒼鳥丨丨丨丨唐百官志誰為此詞羯胡犯京上欲遷幸復登樓置酒有一少年自言工於歌使之登且歌歌曰山川滿目淚沾衣富貴榮華能幾時不見只今汾水上唯有年年秋雁飛上聞之􅏰然出涕顧侍臣曰丨丨丨丨對曰李嶠上曰真才子也不待曲終而去明皇雜録可託回使元徹栁實遇水仙既别約曰有信丨丨丨雁丨者後於回雁峯下得使者廟太平廣記羅雁取翅臨邑縣有雁翅泊泊旁無樹木土人至春夏常於此澤丨丨鳥丨其丨以禦暑酉陽雜爼黥雁於頰五代朱漢賓梁方東攻兖鄆鄆州朱瑾募其軍中驍勇者丨雙丨丨其丨號雁子都太子聞之乃更選勇士數百人號落雁都以漢賓為指揮使及漢賔貴人猶以為朱落雁史漢武帝秋風辭秋風起兮白雲飛草木黄落兮雁南飛曹子建離繳雁賦偉孤雁之編時兮情悵兮而内傷鴻來賓季秋之月鴻雁丨丨記月令為儀鴻漸于陸其羽可用丨丨吉易漸卦飛遵渚鴻丨丨丨公歸無所詩不失時鴻雁春北而秋南丨丨其時管子衛獻公射丨丨丨戒孫文子寗惠子食皆服而朝日旰而朝不召丨鴻於圃二子従之公不釋皮弁而與之言二子怒如戚左傳公孫彊獻曹伯陽即位丨丨丨好田弋獲鴻丨之同上猶鴻有翼桓公在位管仲隰朋有間有二鴻飛過桓公歎曰仲父今彼鴻鵠有時而南有時而北四方無逺者欲至而至焉唯有羽翼之故寡人有仲父丨飛丨丨羽丨也視鴻不悦衛公與孔子語見飛鴻過仰視之色不悦子乃逝去矣家語隨軒翔舞後漢虞國字季卿為日南太守行惠澤有雙鴻丨丨丨丨去郡乃遂還鄉卒栖於墓側白氏帖觸物增悲張孟陽仰聽離鴻哀鳴人亦傷感丨丨丨丨同上此安可籠晉郭瑀隠於臨雍谷張天錫使葢公明徴之瑀指翔鴻以示之曰此鳥丨丨丨哉遂深逃跡公明拘其門人瑀歎曰吾逃禄非逃罪豈得隠居行義害及門人乃出就徴用以銷憂盧思道遷武陽太守為孤鴻賦曰有離羣之鴻為羅者所獲野人馴養貢之於余置諸池亭朝夕賞玩丨丨丨丨賦序漢髙祖鴻鵠歌鴻鵠髙飛兮一舉千里羽翮已成就兮横絶四海横絶四海兮將奈何雖有矰繳兮何所施詩集飛不下白水滿春塘旅雁毎廻翔唼流牽弱藻斂翮帶餘霜羣浮動輕浪單泛逐孤光懸丨竟丨丨亂起未成行刷翅同揺蕩一舉還故鄉沈約詠湖中雁聲念羣孤鴻不飲啄飛鳴丨丨丨誰憐一片影相失萬重雲望盡似猶見哀多如更聞野鴉多意緒啼噪自紛紛杜孤雁詩羣侶違嗷嗷鴻雁鳴且飛窮秋南去春北歸去寒就煖識所處天長地久棲息稀風霜酸苦稻粱㣲羽毛摧落身不肥徘徊反顧丨丨丨哀鳴欲下洲渚非江南水濶朔雲多草長沙軟無網羅閑飛静集鳴相和違憂懐惠性匪他凌風一舉君謂何韓鳴雁幾聲來金河秋半虜弦開雲上驚飛四散哀仙掌月明孤影過長門燈暗幾聲來雖隨胡馬翩翩去豈逐春風一一廻莫厭瀟湘少人處水多菰米岸莓苔杜牧早雁自成行來時沙磧已冰霜飛過江南木葉黄水濶天低雲暗澹朔風吹起丨丨丨歐陽此為奴鴻雁無定棲隨陽以南北嗟哉丨丨丨至性能懇惻人將伺其怠奴輙告之急舉羣寤而飛機巧無所得夜或以火取奴鳴火因匿頻驚莫我捕顧謂奴不直嗷嗷身百憂冺冺衆一息相隨入矰繳豈不聽者惑偷安與受紿自古有亡國君㸔雁奴篇禍福甚明白王介甫雁奴鵠格物總論鵠禽之大者色白又有黄者有丹者善髙翔湖海江漢間有之事類不浴而白丨丨丨丨自然也莊子寧與比翼丨丨黄鵠丨丨乎屈平卜居雞不伏卵越丨丨丨鵠丨魯雞固然矣莊子燕安知志丨雀丨丨鴻鵠之丨漢陳勝傳厚賜倍價齊王使淳于髠獻鵠於楚見前鶴門此云鵠也一舉千里戚夫人欲以己子為太子四皓輔太子不得動夫人泣上曰為我楚舞吾為君楚歌歌曰鴻鵠髙飛兮丨丨丨丨云云歌闋夫人歔欷流涕竟不易太子史詳見鴻門文集注不知射者莊辛謂楚王曰黄鵠游於江海丨丨丨丨已治矰繳加於己也戰國策能吞短人鶴國男女長七寸畏海鵠鵠遇即吞之神異經空籠以獻魏文侯使蔡澤獻鵠於齊在道失之獻丨丨齊侯曰勝得鵠説苑援弓而射奕秋誨二人奕云云其一人以為有鴻鵠子將至思丨丨繳丨丨之孟下液池中漢昭帝太始元年黄鵠丨建章宫太丨丨丨公卿上壽賜侯王宗室金錢有差白氏帖經祠壇上孝章元和二年廵守代宗柴望祀畢黄鵠従南來丨丨丨丨同上不成類鶩後漢馬援書戒子弟曰龍伯髙敦厚願爾曹效之效之不得猶為謹飭士所謂刻鵠丨丨尚丨丨也本傳出見如鳯恩及羽蟲則飛鳥大為鵠丨丨丨丨凰翔玉林繁露來弔陶侃晉陶侃字士衡丁母憂有二客丨丨不哭而去化為雙鵠冲天嗚呼子安仙人死葬陵陽山下有黄鵠棲其冢邊樹上丨常丨丨丨列仙傳羽服乗鵠髙駢為寓鵠庭中設機闗觸人則飛動駢衣丨丨丨之作仙去狀孔氏帖騎射中鵠李克用善丨丨能仰丨雙丨五代莊宗紀漢髙鴻鵠歌見前鴻門漢武黄鵠歌黄鵠飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳自顧薄德兮愧爾嘉祥李白大鵬賦豈比夫蓬蒿之黄鵠誇金衣與菊裳李華齋居賦鴻鵠遡清風凌顥氣翺翔自得於冥冥之中詩集奮翅起願為雙鴻鵠丨丨丨髙翔文選矯翮逐丨丨丨黄鵠韓千里徘徊黄鵠一逺别丨丨顧丨丨送蘓子卿詩雙翅不擘黄鵠忍長飢丨丨乆丨丨同上鵠翅垂雲黄丨丨丨丨杜秦州鵠殻攅橙丨丨丨瓌丨韓銜枝啄泥雄鵠丨丨來雌鵠丨丨歸巢成不生子大義當乖離韓别鵠操據髙棲卑南山冇髙樹花葉一何衰黄鵠丨其丨衆鳥丨其卑韓南山髙樹行化為白鳧黄鵠髙於五尺童丨丨丨丨似老翁故種遺穗已蕩盡天寒歳莫波濤中杜白雁行古今合璧事類備要别集巻六十六
