body:
  text: 古今合璧事類備要後集卷六十一宋謝維新撰官品門官職雜壓淳熙重定歴代㳂革太師太傅太保左丞相右丞相少師少傅少保互樞密使開府儀同三司知樞密院事參知政事同知樞密院事簽書樞密院事太子太師太傅太保特進觀文殿大學士太尉太子少師少傅少保冀兖青徐揚荆豫梁雍州牧御史大夫觀文殿學士資政保和殿大學士吏部禮部户部兵部刑部工部尚書金紫銀青光禄大夫光禄大夫左右金吾衛上將軍殿前都指揮使節度使翰林學士承㫖翰林學士資政保和端明殿學士龍圖天章寶文顯謨徽猷煥章敷文閣學士左右散騎常侍權六曹尚書御史中丞開封尹尚書列曹侍郎樞密直學士龍圖天章寶文顯謨徽猷煥章敷文閣直學士宣奉正奉大夫正議通奉大夫左右驍騎衛武衛屯衛領軍衛監門衛千牛衞上將軍太子賔客詹事給事中承宣使中書舍人通議大夫殿前都指揮使左右諫議大夫保和殿待制龍圖天章寶文顯謨徽猷敷文煥章閣待制權六曹侍郎大中大夫觀察使太常卿宗正卿秘書監馬軍歩軍都指揮使馬軍步軍副都指揮使中大夫光禄衛尉太僕大理鴻臚司農太府卿中奉中散大夫内客省使通侍大夫樞密副承㫖國子祭酒太常少卿宗正少卿祕書少監延福宫正使侍宣正履正協忠大夫景福殿使中侍大夫中亮大夫太子左右庶子中衛翊衛親衛大夫知閣門事殿前都虞侯馬步軍都虞侯防禦使棒日天武四廂都指揮使神龍衛四廂都指揮使團練使宣慶使諸州刺史左右金吾以下諸衛大將軍駙馬都尉集英殿修撰七寺少卿朝議奉直大夫中書門下省檢正諸房公事尚書左右司郎中右文殿修撰國子司業少府監將作監軍器監都水使者入内内侍省内侍省都知宣政使拱衛大夫太子少詹事左右諭徳入内内侍省内侍省副都知昭宣使左武大夫同知閣門事右武大夫入内内侍省内侍省押班樞密承㫖樞密副都承㫖起居郎起居舎人侍御史𢃄御器械尚書左右司員外郎樞密院檢詳諸房文字秘閣修撰開封少尹太子侍讀侍講尚書吏部司封司勲考功户部度支金部倉部禮部祠部主客膳部兵部職方駕部庫部刑部都官比部司門工部屯田虞部水部郎中開封府判官推官直龍圖閣朝請朝散朝奉大夫直天章閣殿中侍御史左右司諫左右正言符寳郎内符寳郎樞密副承㫖武功武徳和安春官成和夏官成安中官成全秋官武顯武節平和冬官武畧保安武經武義武翼大夫尚書諸司員外郎直寳文閣開封府司録參軍樞密院諸房副承㫖朝請朝散朝奉郎直顯謨閣少府監將作軍器少監諸衛將軍正侍宣正履正協忠中侍中亮中衛翊衛親衞拱衛左武右武郎左右補闕拾遺監察御史直徽猷敷文煥章閣承議郎中郎將翰林良醫武功武徳和安成和成安成全武顯武節平和武畧保安武經武義武翼郎太子中舍人太子舍人親王府翊善贊讀直講太常丞判太醫局宗正大宗正秘書丞直秘閣左右郎將奉議郎大理正著作郎閣門舍人閣門宣贊舎人翰林醫官醫效醫痊兩赤縣令太子左右衛司禦清道監門内率府七寺丞秘書郎太常博士樞密院計議編修官勅令所刪定官陵臺令著作佐郎國子監丞諸王宫大小學教授國子博士大理司直評事訓武通直修武郎内常侍少府將作軍器都少監丞開封府功曹倉曹尸曹兵曹法曹士曹參軍事左右軍巡使判官主管太醫局秘書省校書郎正字親王府記室太史局五官正御史臺檢法官主簿九寺主簿閣門祗候樞密院逐房副承㫖從義秉義郎太子諸率府副率府幹辦左右廂公事忠翊忠訓郎宣教郎太學武學律學博士太常寺奉禮郎太祝郊社藉田令光禄寺太官令五監主簿宣義郎成忠保義承事承奉郎承務郎國子太學正武學諭國子太學録律學士太醫局丞京府判官京府司録參軍承直郎京畿縣令兩赤縣丞三京赤縣令承節承信郎節度觀察判官節度掌書記觀察支使防禦團練判官京府節度觀察推官軍事判官防禦團練軍事推官節鎮録事參軍京府諸曹參軍事軍巡判官儒林文林從事郎三京赤縣令京畿縣丞三京亦縣丞上中下州録事參軍三京畿縣丞兩赤縣主簿尉諸州上中下縣令丞從政郎諸府司理諸曹參軍事節鎮上中下州司理司户司法參軍修職郎京畿縣主簿尉三京赤縣畿縣主簿尉諸州上中下縣主簿尉城寨主簿馬監主簿廸功郎諸州司士文學助教事類名位丨丨不同禮亦異數左傳名信丨以出丨信以守器同上服位正其丨丨周禮班制修其丨丨同上九命自上公至下士丨丨同上十等人有丨丨左傳周班魯人以丨丨後鄭鄭忽以其有功也故忽左傳任齒魯公謂薛侯曰寡人若朝于薛不敢與諸丨丨同上王爵白六帖國章同上儀辨等以丨丨丨則人不越周禮昭事序朝有著定表著之位所以丨丨丨也左傳恥在藺下亷頗丨丨丨相如丨史記積薪居上漢汲黯曰陛下用人如丨丨後來者丨丨屏風分隔後漢鄭𢎞字巨君為太尉舉第五倫為司空班次在下毎朝見𢎞曲躬自卑帝知問其故遂聴置雲毋丨丨丨丨其間遂為故事朱衣𫝊呼唐朝日殿上設黼扆躡席熏爐香案御史大夫領屬官至殿西廡從官丨丨丨丨促百官就班序班于通乾觀象門南武班居文班之次入宣政門文班東門入武班自西門入至閣門亦如之夾階校尉十人同唱入卑而止宰相兩省官對班于香案前百官班如殿庭先一品班次二品班次三品班次四品班次五品班毎班尚書省官為首唐儀衛志官稱淳熈重定歴代㳂革太師太傅太保為三公左右丞相為宰相少師少傅少保為三少樞密使知樞密院事參知政同知樞密院事為執政官簽書樞密院事同本條不同執政官者依本條開府儀同三司為使相特進至承務郎為寄禄官通直郎修職郎以上為國朝官有職掌者為職事官觀文殿大學士至敷文閣待制為侍從官集英殿修撰至直秘閣為貼職上柱國至武騎尉為勲官王公侯伯子男為爵金吾衛上將軍至諸衛將軍為衛官太子太師至率府副率府為東宫官節度觀察為兩使承宣觀察防禦團練使刺史為正任領他官者為遥郡通侍大夫至右武郎為横行内客省使至内侍省内品為内侍官武功至武翼大夫為正使武功至武翼郎為副使訓武修武郎閣門祇候為大使臣從義郎至承信郎為小使臣京府判官至京監判官為幕職官録事參軍至馬監主簿為州縣官承直郎至廸功郎為階官節度副使行軍司馬司士文學助教為散官和安大夫至醫學春官大夫挈壺正為伎術官官品歴代㳂革正一品太師太傅太保左右丞相少師少傅少保王從一品樞密使開府儀同三司特進太子太師太傅太保嗣王郡王國公正二品金紫光禄大夫知樞密院事參知政事同知樞密院事樞密副使太尉開國郡公上柱國從二品銀青光禄大夫光禄大夫簽書樞密院事觀文殿大學士太子少師少傅少保御史大夫吏部户部禮部兵部刑部工部尚書左右金吾衛上將軍冀兖青徐揚荆豫梁雍州牧殿前都指揮使節度使開國縣公柱國正三品宣奉大夫正奉大夫觀文殿學士資政保和殿大學士翰林學士承㫖翰林學士資政保和端明殿學士龍圖天章寳文顯謨徽猷敷文閣學士樞宻直學士左右散騎常侍權六曹尚書上䕶軍從三品正議通奉大夫龍圖天章寶文顯謨徽猷敷文閣直學士御史中丞開封尹尚書列曹侍郎諸衛上將軍太子賔客詹事開國侯䕶軍正四品通議大夫給事中中書舍人太常聊宗正卿秘書監諸衛大將軍殿前副都指揮使承宣使開國伯上輕車都尉從四品大中大夫保和殿龍圖天章寶文顯謨徽猷敷文閣待制左右諫議大夫權六曹侍郎士寺卿國子祭酒少府將作監諸衛將軍輕車都尉正五品中大夫馬步軍都指揮使副都指揮使觀察使通侍正侍宣正履正協忠中侍大夫開國子上騎都尉從五品中奉中散大夫太常宗正少卿秘書少監内客省使延福宫景福殿使太子左右庶子樞密都承㫖中亮中衞翊衛親衛大夫殿前馬步軍都虞侯防禦使捧日天武龍神衛四廂都指揮使團練使諸州刺史附馬都尉開國男騎都尉正六品朝儀奉直大夫集英殿修撰七寺少卿中書門下省檢正諸房公事尚書左右司郎中國子司業軍器監都水使者太子少詹事左右諭徳入内内侍省内侍省都知副都知宣慶宣徽昭宣使拱衛左武右武大夫入内内侍省内侍省押班樞密丞㫖副都承㫖驍騎尉從六品朝請朝散朝奉大夫起居郎起居舍人侍御史尚書左右司員外郎樞密院檢詳諸房文字古文殿秘閣修撰開封少尹尚書諸司郎中開封府判官推官少府將作軍器少監和安成和成安大夫陵臺令飛騎尉正七品朝請朝散朝奉郎殿中侍御史左右司諫尚書諸司員外郎侍講直龍圖天章寶文各開封府司録參軍事樞密副承㫖樞密院諸房副承㫖武功至武冀大夫成全平和保安大夫翰林良醫太子侍讀侍講兩赤縣令雲騎尉從七品承議郎左右正言符寶郎監察御史直顯謨徽猷敷文閣太常宗正祕書丞大理正著作郎崇政殿説書内符寶郎正侍至右武郎武功至武翼郎和安至保安郎翰林醫官閣門宣贊舍人太子大舎人舎人諸率府率親王府翊善贊直講判太醫局太醫局太史局令翰林醫效醫痊武騎尉正八品奉議通直郎七寺丞秘書郎太常博士樞密院計議官編修官敕令所刪定官直秘閣著作佐郎國子監丞諸王宫大小學教授國子博士大理司直評事敦武修武郎内常侍開封府諸曹參軍事軍巡事判官京府判官京畿縣令兩赤縣丞三京赤縣畿縣令太史局正五官正中書門下省録事尚書省都事從八品宣教宣義郎御史臺檢法官主簿少府將作軍器都水監丞寺監主簿秘書省校書郎正字太常寺奉禮郎太祝太學武學律學博士主管太醫局閣門祗候樞密院逐房副承㫖東西頭供奉官從義秉義郎太子諸率府副率親王府記至節度觀察防禦團練軍事軍監判官節度掌書記觀察支使京府節度觀察防禦團練軍事推官諸州簽判節鎮上中下州録事參軍事京府諸曹參軍事軍巡判官承直儒林文林從事從政修職郎京畿縣丞三京赤縣畿縣丞諸州上中下縣令丞兩赤縣主簿尉諸府諸曹節鎮上州諸司參軍事節度副使行軍司馬防禦團練副使太史局丞直長靈臺郎保章正翰林醫愈醫證醫診醫候三省樞密院主事守闕主事令史書令史正九品承事承奉郎理親民資序者從九品承務郎凖此殿頭髙品郊社籍田太官令國子太學正録武學諭律學正大醫局丞忠訓忠翊成忠保義郎絜壺正京畿縣主簿尉三京赤縣畿縣主簿尉諸州别駕長史司馬樞密院守闕書令史從九品承務郎官班黄門内品承節郎承信迪功郎中下州諸司參軍事諸州上中下縣主簿城寨馬監主簿諸司士文學助教翰林醫學古今合璧事類備要後集卷六十一
