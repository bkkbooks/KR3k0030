body:
  text: 古今合璧事類備要前集卷三十六宋謝維新撰學校門太學事類辟雍周辟雍在長安西北四十里漢丨丨在長安西北七里學省唐歸崇敬建議古天子學曰辟雍壅水環遶如璧故前世曰璧池璧沼亦言丨丨隋更名國子監今請為辟雍省本傳三代學夏曰校殷曰序周曰庠學則丨丨共之孟子四代學有虞養國老於上庠養庶老於下庠夏養國老於東序養庶老於西序商養國老於右學養庶老於左學周養國老於東膠養庶老於虞庠記漢設學丨室龍興開丨丨校旁求儒雅以闡大猷書序唐廣學太宗廣學舍千三百區四方秀艾挾策負素雲集京師文治蝟然勃興於是新羅髙昌百濟吐蕃髙麗等羣酋長並遣子弟入學鼓笥踵堂者凡八千餘人紆侈袂曳方履誾誾秩秩雖三代之盛所未聞也唐儒學傳補弟子陽嘉元年以太學新成試明經下第者丨丨丨増甲乙科員一千人後順帝紀増游學順帝感翟酺之言乃更修黌宇凡所造千八百五十室自是游學増盛至三萬餘生後漢儒林傳圜橋門光武建武五年初起太學車駕還幸明帝即位始冠通天衣日月備法物之駕盛清道之儀袒割辟雍之上尊養三老五更饗射禮畢帝正座自講諸儒執經問難於前冠帶搢紳之人丨丨丨而觀聼者蓋億萬計出東漢史登瀛洲武徳四年太宗為天策上將軍冦亂稍平乃鄉儒宫西作文學館收聘賢才於是出教以杜如晦為十八學士天下慕向謂之丨丨丨褚亮傳營國子監建隆三年六月始丨丨丨丨置學舍詔有司増修祠宇塑繪先聖先儒之像車駕臨幸焉長編廣錫慶院慶厯四年國子監王拱辰等言首善當自京師始漢太學二百四十房千八百餘間生徒三萬人唐學舍亦千二百間今取才養士之法盛矣而國子監才二百楹制度狹小不足以容學者請以錫慶院為太學葺講殿備乗輿臨幸同上武學附武成王廟亊類置武成廟開元十九年始丨太公尚父廟以留侯張良配牲樂中春上戊祭之牲樂之制如文宣出師命將發日引辭于廟仍以古名將十人為十哲配享上元元年尊太公為丨丨王以白起韓信諸葛亮李靖列於左張良田穰苴孫武吳起樂毅列於右以良為配唐書圖名將形建中二年詔史館考定可配享者列今古名將六十四人丨形焉同上命去白起本朝建隆二年先是上臨幸武成王廟觀所畫名將相白起曰起殺已降不武丨丨之乃詔張昭竇儀髙錫等取厯代謀臣名將功業始終無瑕者配享㑹要詔升管仲建隆四年詔曰武成王廟從祀神像齊相管仲宜塑像升于堂西河守吳起宜畫像降于廡下同上加諡武成大中祥符元年詔尚父宜丨丨昭烈丨丨王詔置武學慶厯三年丨丨丨丨于武成王廟以阮逸為教授八月罷武學議者以為古名將如諸葛亮羊祜杜預裴度等豈専學孫吳立學無謂故也復置武學熙寧五年樞宻院言古者出師受成於學文武張弛其道一也洪惟仁祖常建武學横議中輟識者悼之欲乞丨丨丨丨以追成先朝之志詔於武成王廟置學並同上乞興武學胡翼之丨丨丨丨講論語使知忠孝之道講孫吳使知制勝之術撰成武學規矩一卷時議難之言行録宗學事類以迪天枝兩漢宗室設學未聞唐初為皇族子孫别立小學而不及大學皇朝胄監之外復立宗學神宗基之哲宗繼之而最備於崇觀之時肆我寧考再興黌宇丨丨丨丨粹然之習炳然之文宜與帝王盛時同風宗學謝表益聚宗英訓迪天枝培植化本之地自南渡草剏為屋數楹乃更化之十載規敞廢宇増闢黌舍丨丨四方之丨丨而追琢之宗室題名以昭崇睦宗庠載闢用宏舊規所丨丨丨丨廣教育也惟麟趾化行𤓰瓞綿茂雖資禀之攸厚必陶冶而後成俾繇選補著之于籍月書季攷一視賢闗文行相符矩矱是蹈庶益收得人之效强我王室尚其懋哉寧宗御書綾紙贊詞以優陞擢皇上奮發英斷更新大化以麟庠之胄苦隳肝膽力扶綱常於是赫弈奎文誕錫黌宇賜之束帛試之春官優之陞擢登科題名更新四齋嘉定丨丨宗學置丨丨曰貴仁大雅明賢立愛小録續添兩齋辛巳重廣學舍丨丨曰懷徳升俊同上幸學事類天子袒割食三老五更於大學丨丨丨丨牲執醬而饋執爵而酳記樂記車駕親臨陛下尊敬先聖垂意古典宫室未飾干戈未休而先建太學造立黌舍比日丨丨丨丨享將以𢎞時雍之化也光武朝朱浮疏行大射禮漢明帝永平二年三月臨辟雍初丨丨丨丨十月幸辟雍初行養老禮本事記盛清道儀明帝即位丨丨丨之丨袒割辟雍之上尊養三老五更饗射禮畢帝正坐自講諸儒執經問難於前冠帶縉紳之人圜橋門而觀聴者蓋億萬計儒林傳序賜學生帛晉武帝幸辟雍行鄉飲之禮賜太常博士丨丨丨本紀上釋奠頌太宗幸太學觀釋菜命頴達講經畢丨丨丨丨孔頴達傳郡學事類泮宫丨丨者宫也明尊卑有差聴化少也半於天子之宫半者象璜也獨南面禮儀之方有水耳白虎通泮水頌僖公能修丨丨也泮半水也半有水半無水也詩陸徳明釋文鄉校鄭人游於丨丨以論執政然明謂子産曰毁丨丨何如子産曰何為夫人朝夕退而游焉以論執政之善否是吾師也若之何毁之左襄三十一年立校宫任延拜武威太守造丨丨丨自掾吏子孫皆令諸學受業復其徭役章句既通悉顯拔榮進之郡遂有儒雅之士後本傳起横舍鮑徳遷南陽守時郡學久廢乃修丨丨丨備爼豆黼冕行禮奏樂諸儒百姓歡服本傳建蜀學前漢文翁為蜀郡守見蜀地僻陋有蠻夷風乃起造學宫於成都由是蜀好文雅文翁之化也本傳倡閩學常衮為福建觀察使始閩人未知學乃為鄉校使作為文章親加講導由是風俗一變嵗貢士與内州等同上廣學徒晉虞溥除河陽内史大修學校丨招丨丨告屬縣曰學所以定情理性而積衆善者也本傳崇儒雅後秦彭遷山陽太守丨好丨丨素明學校本傳聘儒生冦恂拜汝南太守修起鄉校教生徒聘能為左氏春秋者講經藝唐髙士亷進益州長史引諸生丨授丨丨學校復興並本傳下車修教後衞颯遷桂陽太守丨丨丨庠序之丨設婚姻之禮期年間拜俗從化本傳以身為誨唐倪若水為汴州刺史増修孔子廟興州縣學廣勸生徒身為教誨風化遂行祀孔子祠唐曹華為兖州節度使下令曰鄒魯禮義之鄉不可忘本乃身見儒士春秋丨丨丨丨立學官講誦人乃知教􅀞孝友傳唐李栖筠為常州刺史大起學校堂上丨丨丨丨以示諸生為鄉飲酒禮登髙降飲人人知勸已上並本傳賜諸生書田公錫知睦州下車建孔子祠教民興學表請入紙國子監印經籍給諸生詔賜之還其紙言行録益弟子員胡公宿知湖州前守滕公大興學校費錢數千萬安定胡先生教授其間未㡬滕公罷公繼之乃闢齋㕔於學之東丨丨丨丨安定之教得盛於東南東南之士知本經術行義以為學者公之力為最多積帑興學曽公肇知應天府事當東南孔道宴勞無虛日公曰飾廚傳以邀往來之譽吾不為也乃丨公丨之餘大丨丨校親加訓導養成人才為多並同上給田養學滕公元發知鄆州學生食不給民有爭公田二十年不給者公曰學無食而以良田飽頑民乎乃請以為學田遂絶其訟事畧學倡天下晏公殊留守南京興學校延范仲淹以教授諸生天下興學自公始同上學冠諸郡陳公襄知常州郡庠小窄不足以容師生公勤於經始成以不日其氣象規模遂為諸郡之冠公晨入其中坐授諸生經義旁決郡事由是毗陵學者盛於二浙言行録廣文翁石室蔣公堂知益州漢文翁石室在孔子廟中堂因廣其舍為學宫選屬官與鄉老賢者以教諸生事畧新嶽麓書院劉公珙知潭州舊有嶽麓書院真廟朝以勅賜額給田與書經亂蕪廢公一新之養士數千人延禮佳士言行録縣學事類置校官魏武帝下令縣滿五百户丨丨丨選其鄉之俊造而崇學之庶㡬先王之道不墜而有益於天下本紀勸生徒唐倪若水修孔子廟興州縣學廣丨丨丨餘見前州學類注擇賢者范公純仁知襄邑縣宇學校倉廪驛舍皆一新之又營學田丨鄉之丨丨以教其人聴政之暇時一至學親勸誘之言行録選秀民文公先生任同安簿兼學事身率諸生規矩甚嚴厲以誠敬開以義理初士子尚循故態食已則去先生為文勸諭之以學如不及一邑悚慕而師尊之又丨邑之丨丨充弟子員年譜古今合璧事類備要前集卷三十六
