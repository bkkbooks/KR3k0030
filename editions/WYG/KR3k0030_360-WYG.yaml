front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_360-1a}
body:
  text: 古今合璧事類備要外集卷六十宋謝維新撰傘扇門蓋附黃屋傘繖器物總論蓋之為言覆也形圓象天撩即弓一十八以象經星斗圍三寸長二尺柄圍六寸長八尺宇深二尺人長八尺則蓋之為高也總為一丈撩長六尺圍寸五分參分其長近斗二尺而平其四尺為宇宙合兩旁六尺之撩為闊丈二尺又宇曲減之約以一尺為差則蓋之為廣也總為丈一然蓋之上為部非部無納撩於其旁下為柄非柄無以含斗於其中此皆為兩而設者傘盖乃張帛為之有顔題黃屋又天子盖也一曰繖一曰傘皆盖之别稱君子盍有攷焉事類華蓋黃帝戰蚩尤於涿鹿常有五色雲氣金枝玉葉止於帝上因作丨丨曲蓋武王伐紂大風折蓋遂為丨丨並風俗通貧無蓋仲尼之畜狗死使子貢埋之曰吾聞之也敝帷不棄為埋馬也弊蓋不棄為埋狗也邱也丨丨丨於其封也亦予之席毋使其首䧟也記檀弓雨無蓋孔子將行丨丨丨門人曰商也有之孔子曰商之為人也甚恡於財吾聞與人交推其長者遺其短者故能乆也家語傾蓋而語孔子之郊遭程子於塗丨丨丨丨終日甚相親顧家語冠蓋相望武帝元狩三年山東被水災使者分部護丨丨丨丨本紀令容高蓋于公曰少高大吾門丨丨駟馬丨丨定國傳乃造華蓋黃帝時華蓋九重以登仙莽丨丨丨丨九重前王莽傳宋玉高唐賦翠為蓋兮注以翠羽為蓋劉孝標絶交論雞人始唱雞蓋成陰注謂蓋如飛鶴成陰言多也黃屋紀信黃屋項羽圍漢王榮陽將軍紀信請誑楚乃詐乗王車黃屋左纛曰食盡漢王降楚帝紀粤王黃屋唐蒙上書説上曰丨丨丨丨有纛前西南夷傳繖雲如繖先是旱甚詔祈蔣帝神求雨十旬不降帝怒命載萩欲焚蔣廟并神影爾日開朗然欲起火當神上忽有丨丨丨倐忽驟雨如瀉䑓中宫殿皆自振動帝懼馳詔追停少時還静南史曹景宗傳詩集遊西園清夜丨丨丨飛蓋相追随曹子建承華景傾蓋丨丨丨陸士衡若飛鴻傾蓋丨丨丨鮑明遠黃屋非堯心黃屋丨丨丨繖動西清日高黃繖丨丨丨坡炎官張丨丨丨火傘韓扇附翣尾便面如意麈柄器物總論扇箑也所以障日又所以引風古者以紈素裁之今多用紙尤便便面亦扇也麈尾柄麈亦名鹿類色白執之所以拂也如意鐵為之或以玉以供指麾又可椎擊諸物者事類五明舜廣開視聴作丨丨扇漢公卿大夫皆用之魏晉非乗輿不得用古今注雉尾商高宗有雊雉之祥故有丨丨扇同上鵲翅周昭王時塗修國獻青鳯丹鵲各一雌雄孟夏取丨丨為扇一名條翮一名仄景王子年拾遺記翟羽趙飛燕為皇后其弟上遺丨丨扇西京雜記七華趙飛燕其弟上遺丨丨扇同上九華曹子建丨丨扇賦序曰音吾先君侍奉漢桓帝時賜上方竹扇其扇不圓不方其中結成文名曰丨丨扇持白羽諸葛亮丨丨丨扇指麾三軍裴啓語林麾白羽顧榮伐陳敏以丨丨扇丨之賊衆大散晉書謝安執晉丨丨冇盛名時多愛慕鄉人有罷中宿縣詣安安問歸資荅曰唯有五萬蒲葵扇又以非時安乃取其中者丨之士庶競慕價數倍右軍書王羲之字逸少見老姥持六角扇賣之因書其扇各五字老姥初有愠色羲之謂曰但云王丨丨丨以求百金姥從之人競買揚仁風袁宏為東陽太守謝安授以一扇聊以贈行宏曰即當奉丨丨丨慰彼黎庶並齊書畫江水吳猛好道術將弟子回豫章江水大急人不得渡猛乃以手中扇丨丨丨横流遂成陸路徐行而過過訖水復依舊捜神記舉扇蔽塵庾亮出居外鎭而執朝廷之權既據上流擁强兵趣向者多歸之導内不能平嘗遇西風塵起丨丨自丨曰元規丨汚人以扇障目禇彦回丨腰丨丨丨南史劉禕傳畫扇誤蠅見畫門以扇措蠅見𤓰與蠅門歌白團扇晉中書令珉與嫂婢私通嫂撻甚苦婢素善歌而珉好執白團扇故製白團扇丨書白團扇梁柳惲有詩云亭臯木葉下隴首秋雲飛王融見而嘆賞因丨齋壁及所執丨丨丨咫尺為遥齊竟陵王子良之孫賁於扇上圖山水丨丨之内便覺萬里丨丨南史客至誤取王元俊精於圖畫嘗狀一扇于齋中壁上丨丨遂丨丨之吳越備史鬼携扇去周祖自鄴舉兵向闕京師亂范魯公質隠於民間一日坐封邱巷茶肆中有人貌怪陋前揖曰相公無慮時暑中公所執扇偶書大暑去酷吏清風來故人詩二句其人曰世之酷吏寃獄何止如大暑也公他日當深究此弊因携其扇去公惘然久之後至社廟後門見一土木短鬼其貌肖茶肆中見者扇亦在其手中公心異焉聞見録張九齡白羽扇賦九齡既戾𤣥宗㫖恐為李林甫所危因進此賦云當時而用任物所長彼鴻鵠之弱羽出江湖之下方安知煩暑可敵清凉豈無紈素彩畫文章復有脩竹剖析毫芒提携密邇揺動馨香惟衆珍之在御何短羽之敢當與竊恩於聖后且見持於未央伊昔臯澤之時亦有雲霄之志茍效用之得所雖殺身而何忘肅肅鳥羽穆如清風縱秋氣之移奪終感恩於篋中翣武王作丨丨丨翣世本便面謂之扇便面丨丨丨張尚傳麈尾柄王導所執丨丨妻曹氏妬忌導甚憚之乃密營别館以處衆妾曹氏知將往焉導懼妾被辱遽令命駕猶恐遲之以丨丨塵尾柄驅牛而進司徒蔡謨聞之戯導曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物唯有短轅犢車長柄麈尾導大怒謂人曰吾往與羣賢遊洛中何曽聞有蔡克兒也晉本傳王衍每捉丨丨有盛才美貌明晤若神丨捉玉柄麈尾與手同色晉本傳如意玉如意胡綜時有掘地得銅匣長二尺七寸開之得白玉如意所執處皆刻螭蟬等形時人莫知其由吳大帝以綜多識乃問之綜荅云昔秦始皇東遊以金陵有王者氣乃鑿諸山岡處埋寶物以當王者之氣此抑是乎胡綜别傳鐵如意石崇與王愷争豪窮極綺麗以飾車服晉武帝愷甥也每助愷以珊瑚高二尺許枝柯扶踈世間罕比愷以示崇崇視訖以丨丨丨擊之應手瓦碎又石崇本事曰崇有珊瑚如意長三尺二寸詩集裂齊紈新丨丨丨素皎潔如霜雪裁為合歡扇團圓似明月出入君懐袖揺動㣲風發常恐秋節至凉飈奪炎熱棄捐筐笥中恩惜中道絶畫秦女紈扇如圓月出自機中素丨作丨玉丨乗鸞向煙霧彩色世所重雖新不代故竊愁凉風至吹我王階樹君子恩未畢零落在中路自障面青青林中竹可作白團扇動揺玉郎手因風訪方便團扇復團扇特許丨丨丨憔悴無復理羞與郎相見沈約團扇歌奉清暑團扇復團扇丨君丨丨殿秋風入庭樹從此不相見上有乗鸞女蒼蒼蟲網徧明年入懷袖别是機中線劉禹錫團扇歌秋豪具吳僧畫團扇㸃綴成微蟲丨丨宛皆丨獨竊天地功細者及蛛螫大者纔阜螽枯枝擁寒蜩黃蘂粘飛蜂翾然得生意上下相追從徒觀飛動姿莫覩筆墨蹤兒曹取眞物細校無不同恐其遂躍去亟取藏箱中乃知藝無小意精神可通不與誤圖蠅能感紫髯翁子猷狀蟬雀藏木傳江東不知古何如此畫今人雄人墓寶已本其徒頗能工舊法存百一要足超凡庸友人幸為賜物薄意何隆玩之不替手愛重心無窮常如對君子穆穆來清風司馬君實謝孫興宗惠草虫扇草蟲獻生怕炎天老又逢丨丨扇子丨奇功還將多稼亭前月卷以西湖柳上風蚱蜢翅輕塗翡翠蜻蜓腰細滴猩紅舊時緑鬂常州守今作霜髯一秃翁楊廷秀謝人送常州草虫扇寶月團玉斧脩成丨丨丨月邊仍有女乗鸞青冥風露非人世鬢亂釵横特地寒王介甫題扇熱時知露入庭蕪恨已深丨丨天下是丨音汗流浹背曽施手氣爽中宵便負心一片江山從蠧損數行文字任塵侵緑槐陰合清和後不會何顔又見尋鄭谷代秋扇詞松柎織猩毛束筆魚網紙丨丨丨扇清相似動揺懷袖風雨來想見僧前落松子張侯哦詩松韻寒六月火雲蒸肉山持贈小君聊一笑不須射雉彀黄間弩名見射雉賦黄山谷戯和文潛謝穆父松扇戯謂文潛之肥如賈大夫之惡掛壁上紈扇本招風曽將熱時用秋來丨丨丨却被風吹動張芸叟紈扇翣輕凉銀鈞玉唾明璽紙松箑丨丨并近似可憐逺度幘溝漊高麗城名適堪今時褦襶子丈人玉立氣高寒三韓持節見神山合得安期不死藥使我蟬蜕塵埃間黃山谷次韻穆父贈高麗松扇便面江山取意成郭熈雖老服猶明便面丨丨丨丨丨一段風煙且千里解如明月逐人行山谷題郭熈山水扇古今合璧事類備要外集卷六十
