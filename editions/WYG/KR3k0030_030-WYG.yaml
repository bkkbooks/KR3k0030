body:
  text: 古今合璧事類備要前集卷三十宋謝維新撰閫儀門慧婦互見女子類及見賢妻類事類專一婦人尚專一德無所兼連禮秋官疏柔靜地道丨丨隂之常義後李尋傳窈窕丨丨淑女君子好逑詩有淑謹之德丨丨之賢珠玉翡翠職是其儀而澣濯蘩蘋不改其操故我琴瑟友之陳子昻集正順其為妻道也丨丨之宜常服於身體疑忌之慮不萌於心衛忿懥之色不兆於容貎同焉而合於禮婉焉而得其正栁文婦德丨丨不必才明絶異也清閑正靜守節整齊行已有恥動靜有法是謂丨丨列女傳婦言丨丨不必辨口利辭也擇辭而説不道惡語時然後言不厭於人是謂丨丨婦容丨丨不必顔色美麗也盥洗塵穢服飾鮮潔沐浴以待身不垢辱是謂丨丨婦功丨丨不必工巧過人也專心紡績不好戲笑潔齊酒食以奉賔客是謂丨丨並同上四德温慈惠和信肅修睦行有法度動有禮經嚴恪以理家人嫺瑟以和君子則已含𢎞光大矣若乃宗廟哀敬仁孝也娣姒祗和謙順也蠲潔酒食婦儀也黼黻元黄女工也洪此四德而務六親可以作範母儀昭宣壼則矣陳子昻集三美昔漆室緹縈列女也及為婦則無聞伯宗梁鴻之妻哲婦也及為母則無聞文伯孟氏之親賢母也為女為婦時亦無聞今夫人為女則孝友為元氏婦則豐潔家祀為母則親執書誨二子皆以通經仕女美如此婦德又如此母儀又如此丨者具丨可謂冠古今矣樂天元夫人墓銘閨房秀王夫人神清朗徹有林下風顧家婦清心玉映自是丨丨之丨晉列女傳女博士見女子類動合禮儀東漢一代賢明婦人如秦嘉妻徐氏丨丨丨丨言成規矩史通不趨權利符承祖事見姊妹類瘤女採桑見烈婦類貧女夜績齊世徐吾者與其鄰婦合燭夜績吾貧而燭不屬鄰婦請无與夜徐吾曰妾以貧故起常先去常後掃陳席以待來者坐常處下為貧故也今一室之中益一人燭不為益明去一人燭不為益闇何愛東壁餘光皆莫之能應遂復與績列女傳殺雞謝客漢武帝始㣲行嘗夜至柏谷投逆旅主人求漿主人翁曰无漿止有溺耳且疑為姦盗聚少年欲攻之主人嫗覩上狀貌而異之止其翁曰客非常人也且有備不可圖也翁不聽嫗飲翁以酒醉而縛之少年皆散走嫗乃丨丨為食以丨丨通鑑具饌延客周浚嘗出獵遇雨止李氏家㑹其兄弟不在李氏聞浚至與一婦於内宰猪羊丨數十人之丨甚精辦而不聞人聲浚因求為妾生子顗晉史參决軍事劉氏有膽畧石勒與之丨丨丨丨佐勒建功業有吕后之風而不妬忌更過之通鑑謀議府事朱全忠夫人張氏多智畧全忠敬憚之雖軍府事時與之丨丨或將兵到中塗夫人以為不可遣一介召之全忠立為之返同上率衆守城朱序鎮襄陽符堅遣將圍序母韓氏自登城行謂西北角當先受弊遂領百餘婢井城中女丁於其角斜築城二十餘丈賊攻西北角果潰衆便守新城賊遂引退人謂此城為夫人城晉史鄒保英妻奚氏萬嵗年契丹賊李盡忠來冦平州保英時任刺史領兵討賊既而城孤援寡將䧟奚氏乃率家僮及城内女丁相助固守賊退封為誠節夫人唐列女傳開幕置屬陳髙凉太守馮寶妻洗氏懷集部落數州晏然至隋王仲宣反嶺南髙凉洗夫人救廣州獲全册洗氏為譙國夫人丨丨府於嶺南丨官丨便宜行事通鑑梁紀赴營討賊史思明之叛衞州女子侯滑州女子唐青州女子王相與㰱血丨行丨丨丨皆補果毅唐列女傳出財募衆崔寧與楊子琳戰不利崔寧妾任女丨家丨十萬募兵得數千人帥以擊子琳破之通鑑平陽公主嫁柴紹初髙祖兵興主與紹發家貲招亡命渡河主引精兵萬人與秦王㑹渭北紹及公主對置幕府分定京師號娘子軍唐書樊姬諌獵楚莊王好獵夫人丨丨數丨不止不食禽獸之肉二年王感之而勤於政事列女傳越姬諷遊楚昭王讌遊丨丨丨丨姬曰願與子生死若此姬曰君王讌遊要妾以死不敢聞命後王病太史請移於將相王曰將相猶股肱也姬曰大哉君王之德妾請從王死矣漢書烈婦事類無犯江漢之域丨思丨禮求而不可得也詩不爽女也丨丨詩投梭折齒髙氏有美女謝鯤嘗挑之女丨丨丨其兩丨晉書引繩封髮唐賈直言妻董氏直言坐事貶嶺南以妻少年訣曰死生不可期吾死可别嫁董不答丨丨束髮丨以帛使直言封曰非君手不解直言貶二十年乃還見帛宛然汲湯沐丨墮无餘本傳毁面自誓陜婦人嫠居事叔姑甚謹家欲嫁之丨丨丨丨後叔姑病卒有女在夫家從婦乞假不得因誣殺其母有司誅之烏哀嗚尸上境内不雨呼延為太守訪其墓諡曰貞烈婦其日大雨六帖割耳自誓李德武坐事徙嶺南謂妻裴曰我方貶无還理君必儷它族於此長訣矣答曰夫天也可背乎願死无它欲丨丨丨丨母持不許本傳剔目示信房𤣥齡㣲時病且死謂妻盧曰吾病革君年少不可寡居善事後人盧泣入帷丨一丨以丨房云無他㑹𤣥齡良愈禮之終身截耳自信上陽女趙昔父盗鹽當論死女詣官訴曰迫飢而盗救死爾情有可原原之否則請俱死有司義之許减父死女曰身為官所賜願毁服衣浮屠法以報即丨丨丨丨侍父病卒不嫁斷髮不嫁崔儈䘮妻盧年少家欲嫁之盧稱疾不許女兄適工部侍郎李思冲思冲方顯重表求繼室詔許家内外婣皆可思冲歸幣三百􅓅盧不可曰吾豈再辱於人乎寧没身為婢是夕出自賣還崔舍丨丨自誓武后詔為浮屠尼自刖陳寃衡方厚為邕州録事招討使董昌齡治无狀方厚數爭昌齡怒將執付吏辭以疾不免即以死告卧棺中昌齡知之使闔棺甚牢方厚閉絶妻程懼并死不敢哭昌齡恬不疑厚遣其䘮程徒行至闕下叩右銀臺門丨丨丨丨下御史鞫治有實昌齡乃得罪文宗詔封程武昌縣君賜一子九品正員官冒刃救姑鄭義宗妻盧夜有盗兵劫其家人皆匿竄惟姑不能去盧丨丨立姑側為賊捽捶幾死賊去人問何為不懼答曰人所以異鳥獸者以其有仁義也今鄰里急難尚相赴况姑忍委棄耶若百有一危我不得獨生姑曰嵗寒然後知松栢後凋吾乃今見婦之心孔帖抵甓報寃衛孝女絳州人字无忌父為郷人衛長則所殺无忌甫六嵗无兄弟母改嫁建長志報父仇會從父大延客長則在坐无忌丨以丨殺之詣吏稱父寃已報請就刑巡察使褚遂良以聞太宗免其罪給驛徒雍州賜田宅州縣以禮嫁之不為賊婦杜弢至長沙掠前姑興太守尹虞二女皆國色也將妻之曰我父二千石終丨丨丨作丨遂自殺晉記恐虧婦節陳仲妻張叔明之妹名芝與二嫂没賊丨見侵畧相謂曰婦人以不汚身為髙不虧節為美豈可委身待辱哉於是自刺列女傳不為賊汙鄒待徵妻簿者從得㣲官江隂袁晁亂薄為賊所掠將汙之不從語家媪使報待徵曰我義不辱即死於水賊去得其尸義聲動江南李華為作節婦賦六帖不受賊辱符鳯妻某氏妹美鳯以罪徙儋州至南海為獠賊所殺脅某氏欲私之對曰一婦人丨足事衆男子請推長者賊然之乃請更衣有頃盛服立於舟罵曰丨丨丨不如死自沈於海同上夫疾不嫁蔡人之妻宋女也丨有惡丨其母將改嫁之女曰夫之不幸乃妻之不幸也奈何去之適人之道一與之醮終身不改且芣苢之草雖甚惡猶始將采終懷擷之浸以益親况於夫婦劉向列女傳夫惡不嫁梁寡婦髙行者早寡不嫁梁貴人欲取之梁王聞之使聘焉髙行曰妾之天不幸先犬馬填溝壑妾宜以身薦其棺槨守養孤㓜不得專意妾聞婦人之義一生不改以全貞信之節今忘死而起生是不信也乃㧞劒以割其鼻曰妾已刑矣所以不死者不忍㓜嗣之重孤也同上齊女守符楚昭王夫人丨丨也昭王出遊留夫人於漸臺江水大至王遣使者迎夫人忘持符夫人曰王與宫人約召必以符今使者不持符妾不敢行於是使者返取符未還臺已壊沈水而死列女傳宿瘤採桑齊閔王后項有大瘤號曰丨丨初閔王出遊百姓盡觀宿瘤丨丨如故王恠問故對曰妾受父母教丨丨不受教觀大王王命後乘載之女曰父母在内使妾不受教而隨王是奔女也王安用之王大慙使使者奉禮加金百鎰往聘之父母驚欲洗浴加衣裳女曰如是見王變容更服不識也遂如故隨使者至閔王以為后同上楊婦守城丨烈丨者李侃妻也侃為項城令李希烈分兵數千畧定諸縣侃欲逃去婦曰冦至當守力不足則死焉君而逃尚誰守乃募士固守賊引去唐書又見前慧婦類率衆守城髙妻拒賊丨叡為趙州刺史為然啜所攻州䧟叡仰藥不死黙啜示以寶帶異袍曰降我賜爾官不降且死叡視妻秦秦曰君受天子恩當以死報賊一品官安足榮自是皆瞑目不語黙啜知不可屈殺之唐書列女傳魯秋胡妻丨人丨丨娶丨三日而遊宦三年休還其婦採桑於郊胡至不識而悦乃遺金一鎰妻曰妾夫遊宦未返於兹三年未有被辱如今日也不顧胡慙而退西京雜記唐李白孫范傳正廉間宣池訪李白子孫獲孫女二人一為陳雲之室一乃劉勸之妻皆編户甿也因召至郡庭相見與語衣服村落形容朴野而進退閑雅應對詳諦且祖德如在儒風宛然問其所以則曰父伯禽以貞元八年不禄有兄一人出遊二十二年不知所在父存无官父殁无名有兄不相保為天下之窮人元桑以自蚕非不知機杼无田以自力非不知稼穡况婦人不任布裙糲食何所仰給儷於農夫救死而已言訖淚下因告以將改適於士族二女曰夫妻之道命也亦分也在孤窮既失身於下俚仗威力乃求援於他門生縱偷安死何面目見大父於地下欲敗其類所不忍聞也李太白集詩集自持美人出南國灼灼芙蓉枝皓齒終不發芳心空丨丨李白集獨檢艶女皆如花靜女丨丨縱任體恥任裝嫁德不嫁容君子未求聘小人難相從此志誰與説琴絃幽韻重孟郊静女詞山頭石夫行竟不歸婦德轉光明不比山頭石空有望夫名白侍郎共中水波瀾誓不起妾心丨丨丨孟郊美婦事類揚且丨丨之晳也詩美艶宋華父督見孔父之妻於路曰丨而丨左清揚有美一人丨丨婉兮詩嫵媚丨丨纎弱便姗嫳屑皓齒燦爛宜笑的爍長眉連娟㣲睇綿藐司馬相如傳邦媛展如之人兮丨之丨也詩舜華有女同車顔如丨丨將翺將翔佩玉瓊琚彼美孟姜洵美且都髮雲鬒丨如丨不屑髢並詩膚雪肌丨若冰丨綽約若處子莊子螓首蛾眉手如柔荑膚如凝脂領如蝤蠐齒如瓠犀丨丨丨丨巧笑倩兮美目盼兮詩素腰貝齒東家之子増之一分則太長减之一分則太短着粉則太白施朱則太赤眉如翠羽肌如白雪腰如束素齒如含貝嫣然一笑惑陽城迷下蔡宋玉賦玉貌絳唇東都好姬南國麗人蕙心紈質丨丨丨丨鮑眧賦朱唇皓齒丨丨丨丨豐肉㣲骨嫮目宜笑蛾眉曼只容則秀雅穉朱顔只楚辭小腰秀頸滂心綽態丨丨丨丨同上柔情綽態髣髴兮若輕雲之蔽月飄颻兮若流風之廻雪遠而望之皎若太陽升朝霞迫而察之灼若芙蕖出緑波穠纎得中修短合度肩若削成腰如約素延頸秀項皓質呈露芳澤無加鉛華弗御雲髻峩峩脩眉聯娟丹唇外朗皓齒内鮮明眸善睞靨輔承權瓌姿艶逸儀靜體閑丨丨丨丨媚於語言凌波㣲歩羅襪生塵轉盼流精光潤玉顔含辭未吐氣若幽蘭華容妸娜令我忘飡曹子建洛神賦靨輔竒牙粉白黛黒施芳澤只丨丨丨丨宜笑嫣只體便娟只既含盼兮又宜笑只楚辭曲眉豐頰丨丨丨丨清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而閑居韓文巫山鬱雲𤣥丘絪緼瑤臺降芳唐堂渫雨丨丨丨丨范蔚宗皇后論事類蓬頭攣耳登徒子妻丨丨丨丨齞唇歴齒旁行踽僂又疥且痔宋玉好色賦齞張口齒歴猶疎也臼頭深目齊無鹽女為人極醜無雙丨丨丨丨列女傳齊女宿瘤桑之女項有大瘤故曰丨丨同上梁妻壯力丨鴻丨孟先丨醜而肥丨舉石臼東觀漢紀齊女無容丨邑鍾離丨為人極醜行年四十丨所丨入行嫁不售列女傳許婦奇醜丨允之丨丨丨交禮竟不復入房許曰婦有四德卿有幾女曰新婦所乏者容耳士有百行卿有幾許曰皆備女曰君好色不好德何謂皆備許有慙色遂相敬重郭子妬婦附不妬事類以色曰妬丨丨丨丨以行曰忌詩小星注入宫見妬女無美惡丨丨而丨丨史記惡女之仇好女入室丨丨丨丨同上婦人之情丨丨丨所以事夫者色也而妬者其丨也戰國䇿媵不備數江沱之間有嫡不以其丨丨丨媵遇勞而無怨嫡亦自悔也江有汜注母多鮮庶叔向曰吾丨丨而庶鮮注言父多妾媵而庶子鮮少嫌母氏性不廣左傳不畜媵妾馮衍字敬通妻妬悍丨丨丨丨兒女自操井臼劉孝標云予與敬通三同不遇一同也剛直二同也馮有忌妻自操井臼予亦有忌妻家道坎軻三同也同上謀害愛寵司𨽻馮方女避亂楊州袁術見而悦之遂納焉甚愛幸諸婦害其寵語之曰將軍貴人有志節當時時涕泣憂愁必長見欽重馮氏從之後諸婦因其絞殺繫之厠衛誠以為不得志而死妻絶其夫見出妻門注書遣其妻馮敬通有一婢妻任酷妬之擊婢無所不至敬通乃棄遣之因與不婦弟任武達丨曰不去此婦則家不寧不去此婦則家清不去此婦則福不生闕之覺但謙退而已謨曰戲導曰朝廷欲加公九錫導弗不聞餘物惟有短轅犢車長柄塵尾導大怒謂公曰吾往與群賢共遊洛中何曽聞有蔡克兒也隔幃置婢謝安夫人劉嘗幃諸婢使在前作伎太傅暫見便下幃太傅索更開夫人云恐傷盛德梁栁惔甚重其婦積成畏憚性愛音樂女妓精麗曽不敢視僕射張稷與惔狎而為惔妻賞敬稷詣惔先相問夫人惔每見妓常因稷請奏樂其妻隔幔坐妓然後出惔因得留目疑殺乳母賈充婦廣成君郭槐性妬忌初充子黎民三嵗乳母抱之當門黎民見充入喜笑就而拊之槐望見謂充私乳母即便殺之黎民戀念而死充遂无嗣本傳生埋侍婢千父有所寵侍婢母甚妬忌及父亡母乃生推婢於墓中後十餘年開墓而婢伏棺如生載還經日乃甦言其父常取飲食與之思情如生在家中吉凶輒語之考校悉驗地中亦不覺為惡既而嫁之生子同上殺婢髠頭後漢袁紹死妻酷妬丨紹寵丨五人為死者有知恐見紹地下乃丨丨墨面以毁其形怒夫斷髮宜城公主下嫁裴巽巽有嬖妹主怒珥耳劓鼻丨巽丨帝怒斥為縣主故刻其眉房孺復妻崔氏性忌左右婢不得濃粧一婢新買粧稍佳崔怒刻其眉以青填之燒鎻桁灼其兩眼角以朱傳之及脱如粧焉酉陽雜爼善劓其鼻楚王愛新人夫人鄭褒謂新人曰王惡子鼻見王必揜又謂王曰惡王之鼻臭也王令劓之夫死猶妬齊劉瑱妹為鄱陽王妃王為明帝所誅妃追傷成疾瑱令陳群殷舊畫鄱陽王與寵姬照鏡狀如欲偶寢以示妃妃唾之罵曰故宜早死於是病亦除姪諷不從謝太傅劉夫人不令公有别房公既深好聲樂夜遂頗欲立妓妾兄子外甥等㣲達此㫖共間訊劉夫人因方便稱關睢螽斯有不忌之德夫人知以諷已乃問誰撰此許答云周公夫人曰周公是男子相為爾若使周姥撰詩當無此也妬記寧死亦妬兵部尚書任瓌賜二艶姬妻妬爛其髪秃盡太宗聞之賜金瓶酒云飲之立死不妬即不須飲栁氏拜勅曰妾與瓌俱出㣲賤更相輔翼遂致榮宦今多内嬖誠不如死乞飲盡無他帝謂瓌曰人不畏死不可以死恐朕尚不能禁卿其奈何二女令别宅安置朝野僉載為神亦妬臨濟有妬婦津相傳言晉太始中劉伯玉妻段氏性妬忌伯玉嘗於妻前誦洛神賦語其妻曰娶婦得如此吾無憾焉段氏曰君何以水神美而欲輕我吾死何愁不為水神其夜乃自沈而死後七日托夢語伯玉曰君本願神吾今得為神也伯玉寤而覺之遂終身不復渡水有婦人渡此津者皆壊衣枉粧然後敢濟不爾風波暴發醜婦雖粧飾而渡其神亦不妬也酉陽雜俎佯許女奴李福妻裴妬忌福鎮渭臺有以女奴獻者福曰吾官至節度使指使者不過奴𨽻夫人得無甚乎裴曰未知公所願者指所獻女奴裴許諾福賂左右夫人沐髪必來告既告福乃佯為腸痛促召女奴既往左右亦以白裴裴遽出髮盆中跣問所苦福業以病為言即若不可忍狀裴乃以藥投小便中進之明日監軍事來問候福具告之皆大笑語林計出愛姬莊宗愛姬甚有色而生子后心患之莊宗燕居宫中元行欽侍側莊宗問曰爾新䘮婦其復娶乎吾助爾䀻后指愛姬請曰帝憐行欽何不賜之莊宗不得已陽諾之后趨行欽拜謝行欽再拜起顧愛姬肩輿已出宫矣莊宗不樂稱疾不得者累日擲刀前抱桓温平蜀以李勢女為妾嘗置别齊妻南郡主始不知既聞與數十婢拔白刃襲之正值李梳頭髮委藉地膚色玉輝不為動容徐徐結髮歛手曰國破家亡無心至此今日若能見殺乃是本懷辭甚悽惋主於是丨丨丨丨之曰阿子我見汝亦憐何况老奴遂善待之王子年拾遺記茹膳妬止梁武平齊盡有其内獲侍兒十餘輩頗娯於目為郄后所察動止皆有偏抝其憤恚殆將成疹左右識其情者進言曰臣嘗讀山海經云以鶬鶊為膳可以療其事使不忌陛下盍試諸梁武從之郄茹之後妬减殆半帝愈神其事左右復言曰願陛下廣羞諸以徧賜群臣使不才者無妬於有才挾私者不妬於奉公濁者不嫉其清貧者不忌其廉俾其惡去善勝忌者皆知革心亦助化之一端也帝深然其言將詔虞人廣捕之㑹方崇内典誠於血生其議遂寢楊䕫著時號六虎本朝延平呉氏姊妹六人皆妬悍丨丨丨丨其中五虎尤甚平生手殺婢十餘人凡三適人皆不終夜分常聞堂廡間喧呼聲同室皆懼五虎怒曰狂鬼敢爾耶闢户移榻中庭持刀獨寢徹旦寂然人謂五虎之威鬼猶畏也遯齋閑覽堂名四畏王丈穆夫人悍妬貴為一品不置姬侍欲置左右人竟不可得好賔客畜樂院二十人宅後圃中作丨丨三畏楊文公戲言曰可改作丨丨公問其説曰兼畏夫人王深以為恨卒無嗣趙槩聞見録不妬螽斯不妬丨丨美后妃也言若螽斯丨丨忌則子孫衆多也螽斯羽詵詵兮宜爾子孫振振兮詩樛木逮下丨丨后妃丨丨也言能逮下而無嫉妬之心焉詩賤妾進御小星夫人無妬忌之行惠及丨丨丨丨於君詩碩人不答丨丨美衞莊姜也衞莊公惑於嬖妾莊姜賢而不答同上趙姬内子晉丨丨以叔隗為丨丨而已下之左傳鮑妻女宗宋丨蘇之丨不妬宋公表其閭曰丨丨列女傳樊姬進女楚莊王丨丨丨丨於王勝已者二人如已者七人六帖商女辭帝梁丨丨為貴人嘗持被引御從容丨於丨曰夫陽以博施為德隂以不專為義螽斯則百福之所由興也願陛下思雲雨之均澤識貫魚之次序使小妾得免罪謗之累東漢梁后傳詩集奪寵薦枕嬌夕月卷衣戀春風寧知趙飛燕丨丨恨無窮李白怨歌行效顰西施宜笑復宜嚬醜女丨丨徒嫉身君王雖愛蛾眉好無柰宫中妬殺人李白玉壺吟詩詠妬妻昔聞桓司馬嬖妾貌甚都其妻南郡主悍妬誰與俱持刀擁群婢徑往將必屠妾時在窻前解鬟臨鏡梳鬓髮雲垂地􅉷姿氷照壺妾初見主來綰髻下庭隅歛手語出處國破家已殂無心來至此豈願奉君娯今日茍見殺雖死生不殊主乃擲刃前抱持一長吁曰我見猶憐何况是老奴盛怒反為喜哀矜非始圖嫉忌尚服美傷哉今亦無梅聖俞桓妬妻詩刺畏内孫公素畏内嘗求坡書扇坡題云披扇當年笑温嶠握刀嵗晚戰劉郎不須戚戚如馮衍但與時時説李陽公素昔為程宣徽門賔後娶程公女性極妬悍故云侯鯖録淫婦附失節事類桑中期我乎丨丨要我乎上宫送我乎淇之上矣詩桑中洧外女曰觀乎士曰既且且往觀乎丨之丨洵訏且樂伊其相謔贈之以芍藥溱洧奔誘男女無别遂相丨丨花落色衰復相棄背氓序鑽窺不待父母之命媒妁之言丨穴隙相丨踰墻相從則父母國人皆賤之矣孟子妻貪無厭昔有仍氏生女黰黒而甚美光可以鑑名曰𤣥丨樂正后䕫取之丨惏丨丨忿纇無期謂之封豕有窮后羿滅之夔是以不祀云夫婦遇姦蕪李季好遠出其妻有士季至士在内妻患之妾曰令公祼而解髪直出門吾屬佯不見也公子從其計疾走出門季曰是何人也家室皆曰無有季曰吾見鬼為之柰何婦曰取五姓之水浴之季曰諾乃浴韓子文君感琴司馬相如素與臨卭令王吉相善富人卓王孫聞令有貴客為具召之并召令酒酣臨卭令前奏琴曰竊聞長卿好之願以自娯為鼔一再行是時卓王孫有女文君新寡好音故相如繆與令相重而以琴心挑之既罷文君夜已奔相如與馳歸成都家徒四壁立卓王孫大怒曰女不才我不忍殺一文不與也相如與俱之臨卭買酒舍乃令文君當爐相如身自著犢鼻褌滌器於市中卓王孫恥之不得已分與家僮百人錢百萬及其嫁時衣被財物文君乃與歸成都買田宅為富人賈女竊香韓壽美姿容賈充辟以為掾充每聚㑹賈女於青𤨏中看見壽悦之常懷存想發於吟咏後婢往壽家具述其事并言女光麗壽聞之心動遂請婢潛脩音問及期往宿壽蹻㨗絶人踰墻而入家中莫知自是充覺女盛自拂拭悦暢有異於常後㑹諸吏聞壽有異香之氣是外國所貢香一著人歴月不歇充計武帝惟賜已及陳騫家餘無此疑壽與女通而垣墻至密門閤急峻何由得爾乃託言有盗令人脩墻使反曰其餘無異惟東北角如有人跡而墻髙非人所能踰充乃取左右婢考問即以狀言充秘之以女妻壽秦后通淫始皇帝益壯太后淫不止吕不韋恐覺禍及已乃告私求大隂人嫪慮報反毒焉改反詐令人以腐罪之拔其鬚眉為宦者遂得侍太后太后私與通絶愛之有娠生二子皆匿之史賈后求少晉惠帝丨丨荒淫放恣洛南尉部小吏端麗美容止忽有非常衣服衆疑其竊尉嫌而辨之小吏云行逢一嫗説家有疾病丨者云宜得城南少年厭之欲暫相煩即隨上車内簏箱中行可十餘里過六七門限開簏箱樓闕好星問此是何處云是天上即以香湯見浴將入見一婦人年三十五六短而形青黒色眉後有疵共寢數夕贈此衆物聽者知是賈后慙笑而去時他人入者多死此吏后愛之得全而出與奴私通梁冀妻孫壽色美善為妖態冀甚寵憚之冀愛監奴秦宫官至太倉令得出入壽所因與私通宫内外兼寵權威大振載婦入宿後魏宗室又明帝時以領軍專政卧婦人於食輿以帕覆之輿入禁中直衞雖知莫敢言者山隂公主宋文帝女丨丨丨丨適駙馬都尉何戢淫恣嘗謂帝曰妾與陛下男女雖殊俱托體先帝陛下六宫數百而妾惟駙馬一人太不均帝乃為置首面左右三十人吏部郎褚彦囬貌美公主窺見悦之白帝召彦囬西上閤宿公主夜就之彦囬不為移志公主曰公鬚髯如㦸何無丈夫意彦囬曰囬雖不敏不敢首為亂階通鑑河間淫婦丨丨丨丨始居戚里有賢行既嫁養姑謹甚未嘗言門外事又禮敬夫其族類醜行者謀壊之乃以車衆造門邀之遨嬉河間固謝强之乃從遊過市南入浮屠有國工呉叟始圖東南壁甚恠可使奚官先壁道乃入觀觀已延及客位具食帷牀之側男子欬者河間驚走出召從者馳車歸愈自閉不與從者通朞年乃敢復召邀於姑必致之與偕行遂入州西浮屠俄而又引至食所空無帷幕廊廡廓然河間乃肯入先壁群惡少於牖下降簾使女子為秦聲倨坐觀之有頃壁者出宿選貌美隂大者主河間乃便抱持河間河間號且泣婢夾持之或諭以利或罵且笑之河間竊顧視持已者甚美左右為不善者已更得適意鼻息咈然意不能無動力稍縱主者幸一遂焉用擁致之房河間收泣甚適自慶未始得也日旦暮駕車相戒歸河間曰吾不歸矣必與是人俱死夫騎來迎莫得見左右力制明日乃肯歸持淫夫大泣齧臂相與盟而後就車既歸不忍視其夫閉目曰吾病且死非藥餌能已為吾召鬼解除之夫召鬼祝詛上上吏訊驗河間大喜闢門召所與淫者倮逐為荒淫居一嵗所淫者衰乃出之召長安無頼男子晨夜交於門猶不慊及為酒壚西南隅已居樓上㣲觀之鑿小門以女侍餌焉凡來飲酒大鼻者少且壯者美顔色者善為酒戲者皆上與合且合且窺恐失一男子也猶自呻吟懵懵以為不足積十餘年病髓喝而死自是雖戚里為私行者聞河間之名則掩鼻蹙頞皆不欲道也蘇五奴妻丨丨丨丨善歌舞亦姿色能弄踏揺娘有邀迓者五奴輙隨之前人欲其速醉多勸其酒五奴曰但多與我錢雖喫䭔子亦醉不煩酒也今呼鬻妻者為五奴自蘇始崔令欽教坊記失節文君失身丨丨丨丨於長卿相如傳詳見前蔡琰䘮節丨丨字文姬適河東衛仲道夫亡無子天下䘮亂文姬為胡騎所獲在胡中十二年生二子曹操以金璧贖之重嫁於董祀後漢列女傳董祀妻蔡氏載誕胡子受辱虜庭文詞有餘節槩不足劉知幾史通詩集止奔井底引銀瓶欲上絲繩絶石上磨玉簮欲成中央折瓶沉簮折知柰何似妾今朝與君别憶若在家為女時人言舉動有殊姿嬋娟兩鬢秋蟬翼宛轉雙蛾遠山色笑隨戲伴後園中此時與君未相識妾弄青梅憑短墻君騎白馬傍垂楊墻頭馬上遥相顧一見知君即斷腸知君斷腸共君語君指南山松柏樹感君松柏化為心暗合雙鬟逐君去到君家舍五六年君家夫人頻有言聘則為妻奔則妾不堪主祀奉蘋蘩終知君家不可住其柰出門無去處豈無父母在髙堂亦有親情滿故鄉潛來更不通消息今日悲羞歸不得為君一日恩誤妾百年身寄言癡小人家女慎勿將身輕許人白樂天止淫奔感興晉陽啟唐祚王明紹巢封垂統已如此繼體宜昏風麀聚凟天倫牝雞司禍凶乾綱一以墜天樞遂崇崇淫毒穢宸極虐熖燔蒼穹向非狄張徒誰辦取日功云何歐陽子秉筆迷至公唐經亂周紀凡例孰此容侃侃范太史受説伊川翁春秋二三䇿萬古開群蒙朱元晦感興古今合璧事類備要前集卷三十
