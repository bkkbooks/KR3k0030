body:
  text: 古今合璧事類備要後集卷七十三宋謝維新撰守臣門太守本朝㳂革太祖開基革五季之患召諸鎮㑹於京師賜等以留之分命朝臣出守列郡號權知軍州事軍謂兵州謂民政焉聖朝職畧其後文武官參為知州軍事二品以上及帯中書樞密院宣徽使職事稱判㑹要太守掌總理郡政宣布務教導民以善而糾其姦慝嵗時勸課農桑旌别孝悌其賦役錢榖獄訟之事兵民之政皆總焉凡法令條制悉意奉行以率所屬有赦宥則以時宣讀而班告于治境舉行祀典察郡吏徳義材能而保任之若疲軟不任事或姦貪冒法則按劾以聞遇水旱以法賑濟安集流亡無使失所四朝志建炎元年詔河北京東西路除帥臣外舊差文臣知州去處許通差武臣一次後詔要郡帯本路兵馬鈐轄次要郡帯本路兵馬都監紹興三年罷元年七月詔要郡文臣帯本路兵馬鈐轄武臣副之次要郡文臣帯本路兵馬都監武臣副之今遂州改正稱呼至紹興三年臣寮言既與異時法邊事體不同又於今日諸州統制無補徒著名位以成虚文詔並罷之五年令郡守除授罷任並令上殿六年詔控扼去處守臣並以三年為任九年罷令郡守並帯提舉學士九月禮部言知建昌軍李長民奏宣和以前應知通令左階銜並帯主管學士自軍興以來中輟今欲郡縣依舊法結衘從官以上知郡係帯提舉學士餘郡知通縣令佐並帯主管學士結銜從之孝宗乾道三年令不任守臣不為郎中書門下省言勘㑹已降指揮非曽任守臣及監司不得除郎官著入條令提舉市舶非淳熙中令郡守罷滯主管學士事類良太守劉敞知揚州郡有雷塘舊屬民耕種其中往歲官取蓄水以備漕運舊田主皆奪業公至持契書詣府説公判還之發運使以漕事動朝廷靳留之公用種稻事明其無用朝廷乃聽杜衍居南都閒之喜曰真丨丨丨也好知府張忠定知益州斬一猾吏吏穪無罪公封判令至市曹讀示之旣聞斷辭告市人曰爾輩得丨丨丨矣蓋李錄順嘗有死罪繫獄此吏故縱之也語稱循吏韓忠定之守安陽人將鬭訟輒自止曰吾非畏汝慙見侍中耳郡幾至無事抃再守錢塘天下劇郡從容為之其政本於愷悌然不嚴而肅民不敢犯議者誰二公治民雖西京所丨丨丨不能過也吕氏家塾記號循吏陳居仁歴興數郡率乗旱歉公悉心指畫責成于下政事日脩財用自足寛嚴適中丨稱丨丨所至皆立生祠道出舊治迎餞塞塗比子産王待制質知荆南府民有訟婚者訴曰貧無貲故後期問其用幾何以俸錢與之使婚獲盗竊人衣者曰迫於飢寒而為之公為之哀憐取衣衣之遣去荆人丨公為丨丨比杜詩謝絳慶元中知鄧州行寛厚之政時丨為丨丨並言行錄歌父母祥符九年邵曄知廣州鑿内河通舟􅄓不為害陳世卿代之奏免廣南口鹽廣人丨曰邵丨陳丨除我二苦呼余佛余崇龜守九江自夏涉秋不雨公到郡舉家蔬食為民禱祈旣而雨霔遂有秋田里之間旣安樂易之政歲又順成莫不舉手加額丨為丨丨善幹國淳化四年命張詠知成都公至府問城中所屯兵尚三萬人而無半月之食公知鹽價素髙而廪有餘積乃下其佑聽民以米易鹽未踰月得米數萬斛軍中喜而呼曰前所給米皆不可食今一一精好此翁丨丨丨事者曾開門曾宣靖公公亮字明仲知鄭州為政惠和而尤能鈎考情偽禁戢姦盜郡故多寇攘公至境悉竄他境路不拾遺外户不閉至號丨丨丨去民疾曾鞏為州務丨丨丨苦急奸盜而寛貧弱曰為患者不去則吾民不寧齊俗悍强喜攻刼至是豪宗大姓斂手不敢動寇攘屏迹州郡肅清興學校王沂公凡更四鎮所至悉丨丨丨輒俸錢以助其費青州仍出家藏書以備習讀奬學者張詠守益州時學校頽替公察郡人張及李畋張逵者皆有學行遂延丨加禮敦勉就舉後三人悉登科立美官於是兩川丨丨知勸文風日振並同上養人材曾鞏知應天府當東南孔道宴勞無虚日公曰飾廚傳以邀往來之譽吾不為也乃積公帑之餘大興學校親加訓導丨成丨丨為多訓兵卒余崇龜守九江軍旅方興羽檄旁午人心皇皇公鎮以靜重百姓恃以為安増築城陴修造器甲丨練丨丨隄防江面事緒叢委日不暇給公處以優暇不擾而辦誅亂卒向文簡出知永興時有告禁卒欲倚儺為亂者密使麾兵被甲衣袍伏廡下幕中明日盡召賓僚兵官置酒縱閲命儺入召至階公振袂一揮伏卒盡出盡擒之各懷短刃即席丨丨丨掃庭張樂宴樂賓從股慄捕首領蘇頌知抗州燕有美堂聞將兵結集謀害官吏郡人喧傳恐懼不安公談笑自如密喻兵官丨丨丨械送獄中逮夜㑹散而坐客不知也去盜賊曾子固為州務丨丨丨是時州縣未屬民為保伍公獨行之部中有盜則鳴鼓相援又設方畧明賞購急追捕且開人自言故盜發輒得豪宗大姓斂手莫敢動寇攘屏迹州郡肅清行述招誘盜柳開字仲塗太宗征河東適常潤有小寇遂以開知常州徙潤州開至治所丨丨羣丨以俸金給之又解衣與賊首置之左右或謂不可開曰彼失所則盜不爾則吾民也今推此赤心夫豈不懷未半歲境内輯寧拜監察御史東都事畧籍為兵出知泉州政治寛簡有盜剽海朝廷遣將逐捕公自以上命招懷之多出降者丨丨丨丨乃無警陳康伯神道碑隨車雨陳戩知處州時苦亢旱公下車雨沾足人以為丨丨丨入境雨劉公敞守鄆州尤多蝗蟲公丨丨而丨至州數日蝗自出境亡去嵗以有年行狀良二千石陳居仁知徽州決事公明隣郡有訟多詣臺省乞付公御史間取文案覆視嘆曰真丨丨丨丨也言行錄繼號良吏孫甫字之翰初謝絳知鄧州有惠政慶厯中范仲淹洎甫相丨守郡皆丨丨丨愷悌為政吕公著為郡率五鼓起黎明出㕔決民訟以故郡無留事凡典六郡以為常後雖至高貴重而不少易以丨丨丨丨不嚴而肅寛簡便民歐陽公為數郡以丨丨不擾為意所至丨丨旣去民思如楊青南京皆大郡公至三五日事已減五六一兩月後官府間如僧舍或問公為政寛簡而事不廢弛者何也公曰以縱為寛以畧為簡則廢弛吾所謂寛者不為苛急耳所謂簡者不為繁碎耳治尚和易田况知成都丨丨丨丨以德化人人不忍欺時謂張乖崖之明王文康之平程文簡之肅韓忠獻之愛公兼有之長編政尙嚴明鄭丙知越州丨丨丨丨徙泉南治泉如治越或勸從寛公曰惟有德能以寛服民吾固非用猛者然嫉惡有素豈以晚節喪所守耶言行錄治稱神明劉敞治長安大姓范偉積産數巨萬冒武功家不徭役者五十年持府縣短長數犯法至徒流輒以贖去人皆知偉罔冒不敢言公因事𤼵之窮丨偉伏罪長安中懽呼丨丨丨行狀江浙神明縢宗亮知岳州修岳陽樓大興學校治為荆襄之最慶厯間移蘇州未逾月丨丨聞喧然稱有丨丨之政湖湘治最向子忞剛直明敏不畏强禦累任郡守所至有聲昨知衡州治行為丨丨之丨當荒歉之歲罷不急之務減無名之費所活不勝計盜賊不敢起穀價不敢増千里肅然人不知旱言行錄治狀著聞進呈知福州陳俊卿乞宫觀上曰前執政治郡舊來往往不以職事為念如俊卿在福州劉珙在建寧於職事間極留意丨丨丨丨未可換易不可干私包希仁知開封為人剛嚴丨丨丨以丨京師為之語曰闗節不到有閻羅包老涑水記聞市藥往任向敏中知廣州兼掌市舶前後郡守多涉外議敏中始至荆南即丨所須丨物以丨在丨無所須戒市南藥余襄公帥二廣請立法丨官吏不得丨丨丨及公北歸不載南海一物一龜一鶴趙清獻公任成都攜丨丨丨丨以行其再任也屏去龜鶴止一蒼頭執事張公裕送以詩云馬諳舊路行來滑龜放長河不共來言行錄白集一部蔡君謨嘗書小呉牋云李及知杭州取丨丨丨丨乃為終身恨此君殊清節可為世戒筆談一介弗取王信紹熙間知紹興自當官受俸非祿令丨丨丨丨去之日纔餘五萬錢政明且清聞於遠近一硯不持包拯為端州守歳州貢硯前守所取輒數十倍以遺權貴公命製者纔足貢數歳滿丨丨丨丨歸照天蠟燭田元均治成都有聲蜀人謂之丨丨丨丨東齋記事水精燈籠張中庸知洋州民號為丨丨丨丨更漏分明張忠定公寢室中張燈炷香通夕宴坐郡樓丨鼓番丨水歴歴丨丨儻一刻差誤必詰之守籖者指名伏辜皆謂公曰神明剖析如流王信知湖州生平未涉州縣猾吏拱稽覬侮及倨按丨丨敏丨丨泉老於吏事翻不逮言行錄版記不用張文定公權知開封府府事至繁為尹者皆置丨丨事公獨丨丨黙記數百人以次決遣了無遺忘吏民大驚以為神不復敢欺墓誌最為親民太平興國九年選祕書揚延慶等十餘人分知諸州太宗謂宰相曰郡守之任丨丨丨丨非其人則下受其弊先試于外鄭戩知長安有表曰聽嚴城之鍾鼓未卜何辰植勁節於雪霜更觀晚節上稱頌者數四謂左右曰戩器識英豪朕將用為宰相故丨丨丨丨召還領相太宗朝遺事張忠定章聖即位公守青州上想見之㑹遣中使撫巡山東因令問公安否旣而丨丨遂丨丨印入辭許召向敏中知廣州丨丨太宗丨以三歲丨歸政成許召陳居仁知徽州陛辭上曰政成召卿矣北門鎻鑰冦萊公鎮大名府北使道由之謂公曰相公望重何以不在中書公曰皇上以朝廷無事丨丨丨丨非準不可異域指使余靖在廣恩信被于丨丨如交趾大理特磨南詔之國皆可以頤丨氣丨之復三大陂趙尚寛字濟之知唐州按圖記復召信臣故迹丨丨丨丨皆漑田萬頃廢田盡為膏腴増戸萬餘仁宗下詔褒焉進秩賜金唐民畫像祠之王安石作新田詩以美之後蘇軾亦作新集詩五章東都事畧復通濟堰范成大字至能知處州處多山田梁天監中詹南二司馬作丨丨丨於松陽遂昌間漑田二十萬頃丨壞五十年公尋故迹置閘以節啓閉堰成而水大至公被召躬往勞工父老懽呼曰堰成而公公忍去我耶至今蒙其利言行錄號陳公堤陳文惠公堯佐字希元河決滑州公作堤以殺水勢又為長堤以䕶其外滑人曰不可使後人忘我公因丨為丨丨丨同上號胡公塘胡宿字武平知湖州築石塘百里捍水患大興學校學者盛於東南自湖學始旣去而民思之丨其塘曰丨丨丨而學立生祠具件便民髙宗諭輔臣曰朕須嘗令守臣到任半年以上丨民間利病或邊防五丨聞奏宜委都司看詳有丨於丨即與施行無事虚文出詩愛民王十朋守泉初到任㑹七邑宰勸酒歴告以愛民之意出詩示之云九重天子愛民深令尹宜懷惻隠心今日黄堂一杯酒使君端為庶民斟不阿鄉曲苕溪漁隠曰包拯合肥人守本郡丨屈法丨丨丨有詩曰直栢終為棟衡剛不作鈎親舊屏息包拯知廬州即鄉郡守親舊多乗勢擾官府有從舅犯法希仁撻之自是丨丨丨丨記聞御書課最何承矩知滄州徙雄州賜丨丨印紙錄其丨丨仍賜内府弓劍故鄉晝錦王祐知大名府太祖謂曰此卿之丨丨所謂丨丨者也職畧州人遮留曾公子固在齊㑹朝廷變法遣使四出公推行有方民用不擾既罷丨丨絶橋閉門丨丨夜乗間乃去蜀人慶來上以張定公前治蜀長於安集復以公知益州丨丨聞之皆鼓舞相丨如赤子久失父母而知復丨鞠我也張忠定神道碑恐報政去向子忞受命衡州伸達寃滯振業矜寡官僚肅於庭士卒整於伍商賈集於市縁南畝者惟丨侯之丨丨而丨隣於衡之人則曰天子何為不以向公而牧我乎不忍其去施師㸃知池州愛惜百姓重於用刑歲大歉悉心賑給環千里不知其為無嵗諸將以公誠意相孚嚴戒軍士無敢干令及受代民空城遮道丨丨丨丨願得向公蔡州闕守州人邀使者馬首丨丨丨丨三年民爭我公杜正獻公衍知乾州未滿歲安撫使察其治行以公權鳯翔府二邦之丨丨於界上一曰此丨丨也汝奪之一曰今我公也汝何有焉威信皆信張忠定公問李畋曰百