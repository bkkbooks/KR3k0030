body:
  text: 古今合璧事類備要後集卷二十四宋謝維新撰臺諫門諫院諫議大夫正言司諫歴代㳂革見百官類首事類保氏丨丨掌諫王惡注曰諫省以禮義正之周禮地官箴尹丨丨楚之官亦諫臣也吕氏春秋注坐反齊桓公有丨丨三人諫臣五人舉過者三十人劉軻上崔相書諫臣見上注皁囊凡章表皆啓封其言宻事得丨丨也漢官儀青蒲元帝寝疾史丹直入卧内頓首伏丨丨流涕言前本𫝊白馬光武臨朝或有惰容張湛輒諫其失常乘白馬帝每見湛輒言丨丨生復諫矣後張湛傳諫官漢元帝時辛慶忌上書曰願明主垂寛容之聼崇丨諍之丨廣忠直之路前辛慶忌傳諫臣鄭昌宣帝時上疏曰聖主置丨諍之丨者非以崇髙防逸豫之生也前刑法志補郡宣帝時悉出博士諫大夫丨丨國守相以蕭望之為平原守望之上疏曰悉出諫官以丨丨吏所以憂其末而忘其本朝無諫官則不知過前蕭望之傳入闥武帝以汲黯為淮陽守黯曰臣願出丨禁丨拾遺補過前汲黯傳軔輪申屠剛嘗慕汲黯史鰌之為人光武嘗欲出游諌不聼遂以頭丨乘輿丨帝遂為止後本傳引裾魏文帝欲徙翼州十萬户辛毗諫帝不荅而起毗隨而丨其丨三國魏志入閣唐王珪帝曰朕雖不明幸諸公數相諫諍王珪曰古者天子有争臣七人諫不用則相繼以死今陛下開聖徳収采芻言臣願竭狂瞽佐萬分一帝乃詔諫官隨中書門下及三品官丨丨本傳叩墀唐敬宗好游畋劉栖楚曰臣以諫為官使陛下負天下之機請碎首以謝遂以為丨龍丨血被面劉栖楚傳鳴陽鳯唐髙宗自韓瑗褚遂良之死内外以言為諱髙宗造奉天宫李善感始上書極言之時人喜之謂之鳯鳴朝陽李善感傳立仗馬唐李林甫居相蔽欺天子耳目諫官皆持禄養資無敢正言者補闕杜璡再上書斥為下邽令因以語動其餘曰君獨不見丨丨丨乎終日旡聲而食三品芻豆一鳴則黜之矣雖欲不鳴得乎由是諌諍路絶矣本傳元素回天張丨丨諌太宗修洛陽官魏證嘆曰張公論事遂有丨丨之力可謂仁人之言其利溥哉本𫝊陽城守閣徳宗朝裴延齡誣逐陸贄等帝怒甚無敢言丨丨聞曰吾諌官不可令天子殺無罪大臣乃約拾遺王仲舒等丨延英丨上疏極論延齡罪慷慨引義申直贄等累日不止聞者寒懼城愈勵唐陽城傳閣中論事穆宗立數荒昵吐蕃方強鄭覃與崔郾等延對曰陛下新即位宜側身勤政而内耽宴嬉外事游畋帝不懌顧宰相蕭俛曰是皆何人俛曰諌官因詔覃曰閣中殊不欵後為我言當見卿延英時乆無丨丨丨丨者至是人相慶本傳側門論事大歴十二年詔曰諌官所獻封事不限早晩任進狀來所由門司不得輒有停滯如須丨丨丨丨亦隨狀面奏即便令引對代宗實録燕游必在唐太宗時王珪魏證為諫官文皇雖丨丨寢食之間王魏丨丨其所猶以為視聼之未廣也因命三品以上入議軍國大事必遣諫官一人隨入以參騐之唐賢良策辭議罕聞唐詔百官言事曰朕曰有所念直丨讜丨時或丨丨五七諫臣其人安在眷懐於此耿嘆良深唐大詔令不可一二憲宗元和二年謂幸臣曰朕見文皇行事少有過差諫臣論諍往復數見况朕之寡昧今後事或未當卿等事當丨論丨丨丨丨而止實録俄去五六唐憲宗問李絳曰比諫官多朋黨論奏不實皆䧟謗訕欲黜其尤者若何綘曰人臣進言豈易哉如欲陳十事丨而丨丨丨及時以聞而削其半故上達者纔一二今乃欲譴訶之使直言箝口非社稷利也本傳疏凡十九國朝范忠文公鎭字景仁仁宗未有繼嗣嘉祐初得疾中外危恐公獨奮曰天下事尚有大於此者乎即上丨丨章丨丨上鬢髪為白言行録論至四五劉元城安世字器之遍歴言路正色立朝知無不言言無不盡每以辨是非邪正為先進君子退小人為急其面拆廷争至雷霆之怒赫然則執簡却立伺天威少霽復前極論一時奏對且前且却者或至四五殿廷觀者皆汗縮竦聼退則咨嗟嘆服至以俚語目之曰殿上虎同上豈可謗時田錫字表聖嘗曰吾立朝以來封章五十二奏皆諫臣任職之常事也丨丨藏副示後丨丨賣直悉取焚之東都事畧務存大體陳忠肅公瓘字塋中公在言路知無不言然議論持平丨丨丨丨彈擊不以細故未嘗及人私過言行録綴兩省班熙寜八年同知諫院范百禄言今脩起居注直舍人院則丨小丨丨丨同知諫院則絀而不與非明職分勤官守之意詔令丨小丨丨丨職官分紀賜五品服歐陽文忠公脩慶歴增諫員取敢言士公首被選以太常丞知諫院丨丨丨丨言行録規諫諷諭左右諌議大夫各一人從四品左右司諌各一人正七品左右正言各一人從七品同掌規諫諷諭凡朝廷有闕失大事則廷争小事則論奏會要神宗正史職官志從容論議治平元年同知諫院吕誨奏先帝朝諫官奏對即左右近侍皆引避故丨丨丨丨無泄於外分紀號為四諌慶歴厭天下乆敝而選用歐陽脩余靖蔡襄王素為諌官丨丨丨丨長編親除三諫慶歴中除歐陽脩余靖王素為諌官蔡君謨以詩賀之曰御筆丨丨丨丨官諠然朝野盡相歡昔時流落丹心在自古忠賢得路難好竭謀猷居帝右直須風采動朝端世間萬事皆塵土留取功名乆逺㸔三人以其詩薦除為諌官言行録言兵民計范鎭知諌院丨中書主民樞宻主兵三司主財各不相知故財巳匱而樞宻益兵無窮民巳困而三司取財不巳請使中書樞宻通知丨丨財利大丨與三司取制國用東都事畧為朋黨論初范公貶饒州朋黨之論起歐公丨丨丨丨以進改右正言知制誥仍知諌院言行録上禦戎十策王禹偁為諫官丨丨丨丨丨涑水記聞置言官一簿范宗尹因奏事言趙鼎由司諫遷殿中非故事上曰朕除言官即置一簿攷其所言多寡此祖宗舊制外廷不之知也鼎所言四十事已行三十六事長編言君子小人范忠宣公純仁為諌官前後屢上丨以休兵省事節用富民進丨丨也丨丨愛人材申公論為急崇聚斂事苛刻親讒佞任偏聼為戒其於君子小人之際尤反復激切無所諱避言行録斥大臣權倖包孝肅公拯字希仁知諫院數論丨丨丨丨丨請罷去内降曲恩又列上唐魏鄭公三疏請置坐右以為龜鑑别條七事多見采納言天下大計呉文肅公奎字長文初仁宗春秋髙而皇嗣未立公自為諫官即為上丨丨丨丨丨願早有所繋後因奏事上留語曰將有所置以維大本公再拜賀因復進勸已而皇子遂定請日蝕罷宴富公弼知諌院康定元年正旦丨丨公請丨丨執政不可後使夷還者云彼中罷宴仁宗深悔之並言行録安用如此諌官慶歴中余靖歐陽修王素蔡襄為諌官力引石介范仲淹曰石介剛正天下所聞然性亦好異使為諌官必以難行之事責人君以必行少拂其意則引裾折檻叩頭流血無所不為主上雖富有春秋然無失徳朝廷政事亦自修舉丨丨丨丨丨丨也長編詩集賜牋榮班聯錦繡諌紙丨丨藤元稹補衮丨丨諌官能用儒吾道益山谷諫議大夫歴代㳂革秦置諌大夫掌論議多至數十人漢武帝元狩中更置後漢增為諌議大夫後漢書曰來歙父仲哀帝時為諫議大夫誤矣隋亦曰諫議大夫置七人屬門下省煬帝廢唐武徳中復置龍朔二年改為正諌大夫後又置諌議大夫開元以來廢正諫大夫復諌議大夫正元四年分為左右右𨽻門下右𨽻中書元和元年勅左諌議大夫宜去左字其右諌議大夫四員並停續通典國朝承五代之弊官失其守官職差遣纔以定俸入而不親職諌議大夫司諌正言皆須别降勅許赴諌院供職者方為諌官王彦輔塵史亦有領他職而不與諌諍其由它官領者帶諌院以兩省官充掌供奉諫諍凡朝廷闕失大大則廷議小則上封兩朝志眞宗天禧元年詔兩省置官六員不兼職務三年以李虚己為諌議大失充職其後員闕不補天聖初上封者以為言詔以孔延魯劉隨並為右正言而諌大夫兼他職猶故也長編明道元年陳執中為諌官屢請置院於是以門下者為諌院徙舊省於左掖之西置諌院自此始麈史慶歴四年詔自今除諌官毋得用見在輔臣所薦之人元豐正名左右諌議大夫為諌垣之長專言責焉職畧左𨽻門下右𨽻中書同掌規誎諷諭凡朝政闕失大臣至百官任非其人三者至百司事有失當皆得諌正四朝志靖康元年詔臺諌天子耳目之官宰執不當薦舉當出親擢立為定制續會要中興之初因舊制設左右諌議大夫司諌正言屬門下中書後省建炎二年詔諌議大夫下𨽻兩省别置局於後省之側許與兩省官相見議則以登聞檢鼓院專𨽻焉中興會要紹興元年詔中書門下兩省併為中書二年詔中書門下後省諌院官吏並依舊赴三省内元置局處供職同上事類宿徳漢武帝因集置諌大夫皆名儒丨丨為之初學記軼才前漢王褒字子淵益州刺史王襄奏褒有丨丨乃徴褒既至詔褒為聖主得賢臣頌擢為諌大夫本傳名儒鮑宣字子都好學明經哀帝初徴為諌大夫每居位常上書諌争其言少文多質時丁傅用事董賢貴幸宣上書曰臣道迫大義官以諌為職不敢不竭愚上以宣丨丨優容之前本傳潔行貢禹以明經丨丨者聞元帝召為諌大夫虚己問以政事前本傳著郎前漢兩龔皆楚人勝字君賔舍字君倩二人相並丨名丨故世云楚兩龔少皆好學明經何哉薦勝徴為諌大夫引見勝薦龔舍及寗夀侯加有詔皆徴勝曰切見國家徴醫巫尚為駕徴賢者宜駕上曰大夫乘私車來邪勝曰唯有詔為駕龔舍候加至皆為諌大夫兩龔鮑宣傳守節王章遷諌大夫在朝廷名敢直言後為王鳯䧟死賛曰王章剛直丨丨不量輕重以䧟刑法前本傳忠直蓋寛饒對策髙第遷諌大夫數上疏諌後奏封事上以寛饒怨謗下其書諌議大夫鄭昌愍傷寛饒丨丨憂國上書訟寛饒罪曰臣以諌為名不敢不言迂闊王吉少好學明經宣帝徴為諌大夫時帝修武帝故事許史王氏貴盛吉上疏曰願言及儒生述舊禮明王制毆一世之民躋之仁夀之域上以其言丨丨不甚寵異之也言任子王吉為諌大夫又丨舜湯不任三公九卿而舉臯陶伊尹今俗吏得丨丨弟無益於民上以為迂闊吉遂謝病免諌立后劉輔上書言得失召見上羙其材擢諌大夫丨成帝丨趙倢伃為丨言制度龔勝為諌大夫數上書丨百姓貧吏不良風俗薄丨太奢刑太深賦斂太重宜以儉約為先並本傳言災異劉向本名更生以行修餙擢為諌大夫元帝即位與蕭望之等同心輔政乃上封事臣幸得以骨肉備九卿竊見災異並起念忠臣雖在畎畝猶不㤀君惓惓之義也本傳當聖心辛慶忌上書曰劉公前以縣令見今為諌大夫此其言必有卓絶切至丨丨丨者前劉輔𫝊數忠言後漢王良字仲子拜諌議大夫丨有丨丨以禮進止朝廷敬之後本𫝊言宦官陳陶拜諌議大夫靈帝時上疏丨丨丨云臣恨不列稷契伊周之徙而與比干龍逢為儔袁崧漢書諌夷樂陳禪入拜丨議大夫時西南丨獻丨及幻人明年元㑹作之於庭安帝與羣臣共觀大竒之禪獨舉手大言曰夾谷之㑹齊作侏儒之樂仲尼誅之帝王之庭不宜陳夷狄之技後本傳清謹髙亮梁商曰周舉丨丨丨丨可任諌議大夫續漢書周舉𫝊公直蹇正後漢韋彪字孟達上議曰諌議之職應用丨丨之士通才丨丨有補益於朝者本𫝊李法無改丨丨性剛有節上疏論椒房宦官免官八年徴為諫議大夫正言直辭丨丨於舊後本傳王登喜得後漢張普惠為諫議大夫任城丨丨謂普惠曰不丨君丨諫議惟喜諫議得君分紀為供奉官元和六年御史中丞竇易直奏諫議大夫至拾遺御史中丞至殿中侍御史並丨丨丨丨續通典創諌院印大歴十二年諫議大夫薛之望奏諌官所上封章皆樞宻毎進一封即須門下中書兩省印署文牒毎有封奏人且先知請别賜丨丨丨庶免漏泄至太和九年始創諌院印以院之印為文