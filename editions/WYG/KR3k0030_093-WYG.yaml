可言者欲行其志宜莫若此時國之疵民之病亦多矣執事亦抵職之日乆矣向之所謂疵者今或痤然若不可治矣向之所謂病者今或痼然若不可起矣曾未聞執事建一言寤主上也何向者指斥之切而今之疏也豈向之利於言而今之言不利邪豈不免若今之所謂舉方正者獵取名位而已邪人之疑執事者以此為執事解者或造辟而言詭辭而出疏賤之人奚遽知其微哉是不然矣傳所謂造辟而言者廼其言則不可得而聞也其言之效則天下斯見之矣今國之疵民之病有滋而無損焉烏所謂言之效邪復有為執事解者曰蓋造辟而言之矣如不用何是又不然臣之事君三諫不從則去之禮焉執事對策時常用是著于篇今言之而不從亦當不翅三矣雖惓惓之義未能自去孟子不云乎有言責者不得其言則去下亦辭其言責邪執事不能自免於疑也必矣雖堅強之辯不能為執事解也乃如某之愚則願執事不矜寵利不憚誅責一為天下昌言以寤主上起民之病治國之疵蹇蹇一心如對策時則人之疑不解自判矣惟執事念之如其不然願賜教荅不宣韓愈與李拾遺書十二月某日愈頓首伏承天恩詔河南敦諭拾遺公朝廷之士引頸東望若景星鳯皇之始見也争先覩之為快方今天子仁聖小大之事皆出宰相樂善言如不得聞自即大位以來於今四年凡所施者無不得宜勤儉之聲寛大之政幽閨婦女草野小人皆飽聞而厭道之愈不通於古請問先生世非太平之運歟加又有非人力而至者年榖熟衍符貺委至若干紀之姦不戰而拘纍強梁之兇銷鑠縮栗迎風而委伏其有一事未就正自視若不成人四海之所環無夫夫甲而兵者若此時也拾遺公不疾起與天下之士君子樂成而享之斯無時矣昔者孔子知不可為而為之不已足跡接於諸侯之國即可為之時自藏深山牢闗而固拒即與仁義者異守矣想拾遺公冠帶就車惠然肯來舒所蓄積以補綴盛徳之有闕遺利加於時名垂於將來踊躍悚企傾刻以冀又竊聞朝廷之議必起拾遺公使者往若不許即河南必繼以行拾遺徴君若不至必加髙秩如是以辭少就多傷於亷而害於義拾遺公必不為也善人斯進其類皆有望於拾遺公拾遺公儻不為起使衆善人不與斯人施也由拾遺公而使天子不盡得良臣君子不盡得顯位人庶不盡被惠利其害不為細必望審察而逺思之務使合於孔子之道幸甚愈再拜李潡詩集趨丹陛聨步丨丨丨分曹限紫微曉隨天仗入暮惹御香歸云云聖朝無闕事自覺諫書稀岑參寄左省杜拾遺升諌署初丨丨丨是眞仙浪透祧花十五年鄭谷賀韋拾遺古今合璧事類備要後集卷二十四
