班在下也後遂為故事李氏談録論前相作詩梁燾復為左諌議大夫前宰相蔡確作詩怨謗燾與劉安世等交攻之竄確新州事畧論秀守市燈陳良翰除諌議秀守遣吏市燈公論輟之人聞之皆懼而畏言行録率臺諌論后廢孔道輔字原魯為右諫議大夫上廢郭后道輔與范仲淹丨諸丨丨宫詣拒之孔手附門不為奏道輔等欲自宣右門入監官宦者闔扉拒之孔手附門銅鐶大呼曰皇后被廢柰何不與我曹入諌同上率同列論后服梁燾字况之遷右諌議大夫有請宣仁后御文徳殿服冠冕受册者燾丨丨丨諌引薛奎丨章獻明肅皇丨不當以王丨見太廟事宣仁欣納事畧不歴郎中而為近世鄭文肅劉丞相張尚書方平王宣徽拱辰滕侍讀甫吕給事惠卿鄧中丞潤又皆丨丨丨丨貪外任便丨諌議大夫春明退朝録不用輔臣所薦慶歴四年詔諌議大夫丨得丨見任丨丨丨丨實録韓愈争臣論或問諌議大夫陽城於愈可以為有道之士乎哉學廣而聞多不求聞於人也行古人之道居於晋之鄙晉之鄙人薰其徳而善良者幾千人大臣聞而薦之天子以為諌議大夫人皆以為榮陽子不色喜居於位五年矣視其徳如在野彼豈以富貴移易其心哉愈應之曰是易所謂恒其徳貞而夫子㓙者也惡得為有道之士乎哉在易蠱之上九云不事王侯髙尚其事蹇之六二則曰三臣蹇蹇匪躬之故夫不以所居之時不一而所蹈之徳不同也若蠱之上九居無用之地而致匪躬之節以蹇之六二在王臣之位而髙不事之心則冒進之患生曠官之刺興志不可則尤之不終無也今陽子在位不為不乆矣聞天下之得失不為不熟矣天子待之不為不加矣而未嘗一言及於政視政之得失若越人視秦人之肥瘠忽焉不加喜戚於其心問其官則曰諌議也問其禄則曰下大夫之秩也問其政則曰我不知也有道之士固如是乎哉且吾聞之有官守者不得其職則去有言責者不得其言則去今陽子以為得其言言乎哉得其言而不言與不得其言而不去無一可者也陽子將為禄仕乎古之人有云仕不為貧而有時乎為貧謂禄仕者也宜乎辭尊而居卑辭富而居貧若抱闗而擊柝者可也蓋孔子嘗為委吏矣嘗為乗田矣亦不敢曠其職必曰㑹計當而已矣必曰牛羊遂而已矣若陽子之秩禄不為卑且貧章章明矣而如此其可乎哉或曰否非若此也夫陽子惡訕上者惡為人臣昭其君之過而以為名者故雖諌且議使人不得而知焉書曰爾有嘉謨嘉猷則入告爾后于内爾乃順之于外曰斯謨斯猷惟我后之徳夫陽子之用心亦若此者愈應之曰若陽子之用心如此滋所謂惑者矣入則諌其君出不使人知者大臣宰相者之事非陽子之所宜行也夫陽子本以布衣隠於蓬蒿之下主上嘉其行誼擢在此位官以諌為名誠宜有之奉其職使四方後代知朝廷有直言骨鯁之臣天子有不僣賞從諌如流之羙庶巖宂之士聞而慕之束帶結髪願進於闕下而伸其辭説致吾君於堯舜熙鴻號於無窮也若書所謂則大臣宰相之事非陽子之所宜行也且陽子之心將使君人者惡聞其過乎是啓之也或曰陽子之不求聞而人聞之不求用而君用之不得已而起守其道而不變何子過之深也愈曰自古聖人賢士皆非有求於聞用也閔其時之不平人之不又得其道不敢獨善其身而必以兼濟天下也孜孜矻矻死而後已故禹過家門不入孔席不暇暖而墨突不得黔彼二聖一賢者豈不知自安佚之為樂哉誠畏天命而悲人窮也夫天授人以賢聖才能豈使自有餘而已誠欲以補其不足者也耳目之於身也耳司聞而目司見聼其是非視其險易然後身得安焉聖賢者時人之耳目也時人者聖賢之身也且陽子之不賢則將稽於賢以逸奉其上矣若果賢則固畏天命而憫人窮也惡得自暇乎哉或曰吾聞君子不欲加諸人而惡訐以為直者若吾子之論直則直矣無乃傷於徳而費於辭乎好盡言以昭人過國武子之所以見殺於齊也吾子其亦聞乎愈曰君子居其位則思死其官未得位則思修其辭以明其道我將以明道也非以為直而加人也且國武子不能得善人而好盡言於亂國是以見殺傳曰惟善人能受盡言謂其聞而能改之也子告我曰陽子可以為有道之士也今雖不能及已陽子將不得為善人乎哉韓文栁子厚遺愛碣四年五月皇帝以銀印赤紱即隠所起陽公為諌議大夫後七年廷諍懇至累日不解帝尤嘉異遷為國子司業旌直優賢道光師儒又四年九月己巳出拜道州刺史太學生魯郡李償廬江何蕃等百六十人投業奔走稽首闕下呌閽籲如天願乞復舊朝廷重更其事如己巳詔翌日㑹徒比嚮初行至延喜門公使追奪其章遮道願罷遂不果獻生徒嗷嗷顧眄徘徊昔公之來仁風扇揚暴慠革靣柔輭有立聼聞嘉言樂甚鍾鼔瞻仰徳宇髙逾嵩岱及公當職施政示人準程良士勇善偽夫去飾惰者益勤誕者益㳟沉酗腆酒斥逐郊遂違親三歲罷退鄉黨今未及下乞歸就養者二十餘人禮順克彰孝悌以興則又講貫經籍俾達奥義簡習孝秀俾極儒業􅃣履裳衣由公而嚴進退揖遜由公而儀公征甚遐吾黨誰師遂相與咨度署吏布告諸儒願立貞珉侔髙狀明乃訪于學古之士紀公名字垂憲于後公名城字亢宗家于北平隠于條山惟公端椊冲和髙嶷懿醇道徳仁明孝愛友悌薰襲里闕布聞天下守節貞固患難不能遷其心始往坦厚榮位不足動其神為司諌義震于周行為師業愛加于生徒宜乎立石俾後是憲其辭曰惟兹陽公履道葆醇爰初隠聲覆簣基仁徳充而形乃作諫臣抗志勵太義直道事陳帝求師儒式我成均開朗蒙滯宣明徳教和濳布𤣥機宻照群生聞禮後學知孝進退作則動言是俲匪公之軌人用奚蹈麤厲貪凌待公順之欺偽譎詐待公信之少年申申咸適其宜榎楚廢弛尊嚴而威公褒其良俾升于堂癯者既肥榮如衮衣公弁不