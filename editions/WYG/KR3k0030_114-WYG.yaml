body:
  text: 古今合璧事類備要後集卷四十五宋謝維新撰東宫官門總三太三少見卷末太子少師厯代沿革見總類事類慷慨唐李綱為太子太保為陳父子君臣之道問寢視膳之方聴者忘倦太子嘗商確古来君臣孝忠盡節之事綱凛然曰託六尺之孤寄百里之命古以為難綱以為易每吐論𤼵言正色丨丨有不可奪之志太子未嘗不聳然禮待卑損房元齡為太子少師時皇太子將行禮拜備禮以侍之元齡厚目丨丨不敢修謁識者重其崇議又曰姚崇事持黄㼐後魏郭祚領太子少師祚從世宗幸東宫明帝幼弱丨一丨丨出奉之時謗祚者號為黄㼐少師乘小馬許敬宗為太子少師乾封初以年老不能行步特令朝日丨丨丨入禁門至内省選舊徳唐文宗丨丨丨保䕶東宫乃以太子少師召蕭俛俛字思謙職林難其選正觀中房元齡為太子少師元齡遜位詔不許太宗因為侍臣曰太子師保古丨丨丨太子為拜李綱詣東宫丨丨承乾丨丨宰相有别元和以来丨丨丨兩李少師故以所居丨之一曰情安少師一曰永寧少師職林至禁中問政唐李綱拜太子少師綱素有脚疾太宗特賜步輿令乗丨閤下數引丨丨丨以丨道益僊韶院錢王起改太子少師起治生無檢所得祿賜為僮婢盗有貧不能自存帝詔曰丨丨丨丨丨議者謂與玩臣分給可恥也起賴其入不克遜以觀三師之徳梁三少各一人掌奉皇太子丨丨丨丨丨丨必擇九徳之師先王之建太子丨丨丨丨丨丨六行之符北堂書抄薛綜讓少師表太子少傅歴代沿革見總類事類審諭少傅奉世子以觀太傅之徳行而丨丨之記卧傅漢上謂張良曰子房雖疾彊丨丨太子時叔孫通已為太傅良行少傅事稱臣見總㳂革參傅周伯仁辭太子少傅䟽外丨丨訓賜輜車漢桓榮之丨丨丨詳見後乘小輦晉山濤之丨丨丨並記室新書濤為少傅拜太子求退帝賜小輦乘之以訓太子白氏帖三世傅晋丹陽薛兼祖綜父榮兼遷尚書領太子少傅丨丨丨東宫三傑詩唐源乾曜為少傅與左右丞相宋璟張説賜宴尚書省帝賦丨丨丨以賜不朝朔望漢故事太傅少傅並丨丨丨丨準古不拜晉何曽議少傅丨丨丨丨䟽乞骸骨漢䟽受為少傅上丨丨丨丨丨以老乞身唐張行成拜左僕射太子少傅永徽四年三月不雨至五月行成懼丨丨丨丨制荅曰古者䇿免乖罪已之義朕寡徳非宰相咎乃賜宫女黄金器勑勿後辭行成固請云稽古之力桓榮為少傅詔以輜車乘馬榮大會諸生陳其車馬印綬曰今日所䝉丨丨丨丨也後漢書有古之風晉書山濤轉少傅詔曰秉徳冲素心思潜通清虚履道丨丨人丨丨辭禮閑雅䟽受丨丨丨丨徳重當時王丹為少傅名丨丨於丨丨並續漢書又東觀漢記丹為少傅蹇蹇尅己復禮晉山濤啓事少傅羊祐秉徳尚義丨丨丨丨清靜少欲甄宇丨丨丨丨又年尚少可濟於其事也輔道之義華廙遷少傅得丨丨丨丨晋書不言之益晋周顗拜少傅詔云有丨丨丨丨北堂書抄賓友之禮王儉拜太子少傅朝議太子接少傅以丨丨丨丨南史調䕶是職蕭圓為少傅以丨丨丨丨乃作少𫝊箴愛惜日力寸隂母棄親膳再飯寝門三年小心翼翼大孝烝烝詢謀計慮問對疑丞安樂必敬毋忘戰兢後漢漢用名儒丨丨丨丨任先踈受白六帖晉推碩徳丨丨丨丨選在羊公同上徳義盈堂傳立為太子少傅箴曰正人在側丨丨丨丨鮑肆先入蘭臺不芳傅臣司計敢告君王保傅承華丨丨丨丨唐太詔令鄭畋太子少傅制調䕶之任可領丨丨丨丨白集行嚴綬制宫傅之亞丨丨丨丨洪水制升副儲宫丨丨丨丨曲阜除福進制俾登儲副丨丨丨丨之榮本朝牋末資六傅之賢實丨丨丨丨丨白集嚴綬制𢎞三善之益用丨丨丨丨丨同上以庶代宗之戒邢顒初太子未定而臨菑侯植有寵下儀並賛翼其美太祖問顒對曰丨丨丨丨先世丨丨也願殿下深察之太祖識其意以為太子少𫝊魏志太子少保歴代㳂革見總類事類直士唐李綱兼太子詹事頻乞骸骨髙祖慢罵之曰建成在東宫遣卿輔導何為屢致辭乎綱頓首陳謝曰云云陛下功成業秦頗自矜伐臣事太子所懐鄙見復不採納髙祖謝曰知公丨丨勉弼我兒於是擢拜太子少保效愚綱拜太子少保上書太子曰綱備位保傅兾得丨丨鄙曰殿下飲酒過量非養生道凡為太子務孝謹以慰上心不宜聴受邪説與朝廷生惎間太子不擇優禮李綱為太子少保髙祖以其情氏名臣甚加丨丨手勑未嘗不稱名其見重如此尊崇東朝保傅歴代丨丨白集行嚴綬制兼領東宫國朝天禧四年以資政殿大學士王欽若為司空職如故欽若丨丨丨丨三少品序非便表换秩故有是命亞保春坊丨丨丨丨洪水制總三太三少歴代沿革三王教世子立太傅少傅以養之太傅在前少傅在後入則有保出則有師文王太子周成王幼在襁抱太公為太師大戴禮西漢有太子太傅少傅蜀官有太子門大夫庶子洗馬舍人後漢太傅禮如師不領官屬少傅悉主太子官屬魏太傅於太子不稱臣少傅稱臣晉咸寧中備六傅之職三太三少東晉置保𫝊而無二師景帝諱師後齊以太師太傅太保為三師少師少傅少保為三少唐三師三少官不必備唯其人無其人則闕之職官分紀太子太師太𫝊太保各一人從一品掌轉導皇太子每見迎拜殿門三師各拜有門必讓三師坐太子乃坐與三師書前名惶恐後名惶恐再拜太子出則乗路備鹵簿以從百官志少師少傅少保各一人從二品掌曉三師徳行以諭太子奉太子以觀三師之道徳同上國朝師傅不常設仁宗升儲置三少各一人李文定公以參知政事兼少客及陛左相遂進兼少傅此宰相兼宫僚之所從始也丁謂兼少師馮拯兼少傅曹利用兼少保是時實為東宫官餘多以前宰執為致仕官若太子少師太傅太保以待宰相官未至僕射者及樞宻使致仕亦隨本官髙下除授太子少師少傅少保以待前執政其少師非經顧命不除若本官至尚書即除少傅丞郎給諌只除少保若因遷轉則逓進一官至太師即遷司空矣官制舊典天禧末皇太子同聴政乃以首相兼少師樞使曹利用兼賓客自後神宗欽宗孝宗光宗在東宫皆不相開禧三年史同知自詹事入樞府乃進兼賓客已而太子侍立遂以錢丞相兼太子少傅明年並置二相左相改兼少師右相兼少傅未幾右相丁内艱左相亦去位又明年左相起復遂進兼少師焉朝野雜記事類教喻凡三王教世子必以禮樂立太傅少傅以養之欲知父子君臣之道也太傅審父子君臣之道以示之少傅奉世子以觀太傅之徳行太傅在前少傅在後入則有保出則有師是以丨丨而徳成也師也者教之以事而喻諸徳者也保也者謹其身以輔翼之而歸諸道者也記文王世子輔翼選天下端士孝悌博聞有道術者以丨丨之故太子見正事聞正言行正道左右前後皆正人也大戴禮元良樂正司業父師司成一各丨丨萬國以貞注貞正也司主也言樂正教以善文師教以成禮記尊敬丨丨師傅師又國之将興尊重傅也漢詔承華太子門名文選曰遵彼丨丨又曰高步承華皆謂太子諸宮博望漢太子苑名丨丨東朝太子朝也文選曰丨丨既建青綬六帖注云太子太師太傅太保古官也銀章丨丨佩蒼王漢輿服志晋官品令並同上大夫賈誼上䟽曰昔者成王幼在襁抱召公為太保周公為太傅太公為太師保保其身體傅傅其徳義師導之教訓此三公之職也於是為置三少皆丨丨丨也曰少保少傅少師是與太子宴者也故乃孩提有識三公三少固明仁孝禮義以道習之逐去邪人不使見惡行前漢本𫝊賢大夫䟽廣為太子太傅兄子受為少傅在位五歳皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆今仕至二千石官成名立如此不去懼有後悔即日父子上䟽乞骸骨公卿故人設祖道供帳送者車數百兩道路觀者皆曰丨哉二丨丨同上其令拜晉武帝時有司奏東宫二傅禮儀不同帝曰崇敬師傅所以尊教何論臣與不臣丨丨太子丨之晋史輒先拜順宗為皇太子禮重師傅見丨丨丨順宗實録掌輔導太師太傅太保丨丨丨皇太子少師少傅少保掌曉三師徳行以諭皇太子奉太子以觀三師之道徳唐志掌教諭三少之職丨丨丨太子舊書以道輔教太子三師丨丨徳丨丨太子者也至於動靜起居言語觀聴皆有以師焉續通典即置輔弼唐太宗謂庻子于志寧曰古者太子生使士負之丨丨丨丨成王幼小周召為師是也九徳六行先王之建大子必擇丨丨之師丨丨之傅薛綜表十日一赴仁宗為皇太子宰相丁謂馮拯兼少師少傅樞使曹利用兼少保叅政王曽樞副錢惟演兼賓客謂等因請師傅丨丨丨丨資善堂賓客以下隻日互倍侍講學上從之石林燕林程伊川經筵劄三代之時人君必有師傅保之官師道之教訓傅傅其徳義保保其身體後世作事旡本知本知求治而不知王君知而不知養徳傅徳義之道固已踈矣保身體之法旡復聞焉臣以為傅徳義者在乎防見聞之非節嗜好之過保身體者在乎適起居之宜存畏讓之心臣欲乞皇帝左右扶持祗應宫人内臣並選年四十五已上厚重小心之人服用器玩皆須質朴應華巧奢麗之物不得至於上前要在侈麗之物不接於目淺俗之言不入於耳及乞擇内臣十人充經筵祗應以伺候皇帝起居凡動息必使經筵官知之有剪桐之戯則隨事箴規違持養之方則應時諫止調䕶聖躬莫過於此古今合璧事類備要後集卷四十五
