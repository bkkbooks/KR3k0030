body:
  text: 古今合璧事類備要外集卷三十二宋謝維新撰璽綬門玉璽器物叢談璽王者印也所以主土亦所以示信於天下凡九各有文刻皆以玉為之螭虎紐黄赤綬四采武都紫泥封盛以青囊白素裏兩端無縫尺一板中約署其用之各有攸當也然三代以前未有聞焉爰自秦始皇時藍田山得美玉刻之仍用丞相斯篆其文自是以來經歴數代屢喪屢得迨至李唐所刻又多及至末世喪亂不免亡失至周廣順中詔造二寶天開我宋受命傳之列聖相承又多增刻南渡惟鎮國神寶在焉他皆為金所刼取而去嗣後天人效順又有以國寶陸續來歸我者神器至公歸有德鳴呼盛哉事類玉為天子有傳國璽及八璽皆丨丨之神璽以鎮中國藏而不用受命璽以封襌禮神皇帝於璽以報王公書皇帝之璽以勞王公皇帝信璽以召王公天子行璽以報四夷書天子之璽以勞四夷天子信璽以召兵四夷皆泥封後輿服志金為太皇太后皇太子及妃璽皆丨丨之藏而不用太皇太后封令書以宮官印皇后以内侍省印皇太子以左春坊印妃以内坊印函封大朝㑹則符璽郎進神璽受命璽于御座行幸則合八璽為五轝丨從于黃鉞之内泥封凡天子璽皆以武都紫泥青囊素裏兩端無縫尺一板中約署同上秦制乗輿六璽丨丨也曰皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽漢遵秦不改又有秦知璽藍田玉璽螭獸紐在六寶之外文曰受天之命皇帝壽昌漢寶丨髙祖佩之後世名曰傳國璽與新蛇劒俱為乗輿所丨並晉輿服志皇帝璽沛公至覇上秦皇子嬰素車白馬係頸以組封丨丨丨符節降枳道旁漢髙祖紀天子璽代王至渭橋羣臣拜謁稱臣代王下拜太尉勃乃跪上丨丨丨文帝紀郎不授光殿中嘗有恠一夜羣臣相驚光召符璽丨丨肯丨丨光欲奪之郎按劒曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等后以授舜初髙祖入咸陽得秦璽及即天子位因御服其璽世世傳授號曰傳國璽以儒子未立璽藏長樂宫及莽即位請璽元后元后不肯以授莽莽使安陽侯王舜諭㫖太后怒罵之曰而屬父子宗族䝉漢家力富貴累世既無以報受人孤寄便奪取其國為人如此者狗不食其餘若自以金匱符印命為新皇帝當自更作璽何以用此亡國不祥璽我為漢家老寡婦旦暮且死欲與此璽俱𦵏不可得也太后因涕泣舜曰莽必欲得傳國璽寜能終不與邪太丨聞舜語切乃出璽投之地丨丨丨曰我老已知而兄弟今族滅也璽書勉厲帝二千石有治理以丨丨丨丨增秩賜金璽書既至光武賜竇融璽書因授融為凉州牧丨丨丨丨河西咸驚以為天子明見萬里之外璽以洛南漢大亂天子北詣河上六璽不自隨掌璽者以投井孫堅討董卓頓軍洛南其井毎有五色氣從中出堅使人浚之得漢傳國玉璽其文曰受命于天既夀永昌方圓四寸上紐文盤五龍龍上一角缺璽還江南懷市没胡傳國丨没于劉聰後又没于石勒及石季龍死胡亂及帝世乃丨丨丨晉輿服志皇天命德初太宗刻文命𤣥璽以白玉為螭首文曰丨丨景丨有丨者昌至武后改諸璽皆為寶中宗即位復為璽開元六年復為寶天寶初改璽書為寶書十載改傳國寶為承天大寶唐志上天賜寶唐肅宗元年建子月十六夜女尼真如怱見二皂衣引至一所見天帝因出寶授真如曰汝往令刺史崔侁進達於天子肅宗寢疾方甚視寶召代宗謂曰汝自楚王為皇太子今丨丨丨丨獲於楚州天祚汝也宜保愛之代宗再拜受賜即日以寶應紀年云疑璽已焚晉宗室延煦契丹滅晉出帝與太后遣延煦延寶齎降表玉璽金印以歸契丹契丹得璽以為製作非工與前史所傳者異命延煦等還報求真璽出帝以狀答曰頃路王從珂自焚於洛陽玉璽不知所在丨已焚之元帝受命命玉工製此璽在位羣臣皆知之乃已奉璽來降寶建徳斬于長安市齊善行乃與裴矩及建徳妻丨山東之地傳國八丨丨丨廣順二寶舊制乗輿六寶唐改為寶唐末喪亂或多亡失周丨丨中詔造丨丨曰皇帝承天受命之寶皇帝神寶太祖受命傳其二寶至太宗又别制承天受命之寶至道三年中書門下言皇帝受命寶請以皇帝恭膺天命之寶為文詔曰可皇祐神寶丨丨五年作鎮國丨丨謂輔臣曰有良玉大尺而厚半之盖希世之珍也不可以為服玩具天下八璽一曰神璽遂令梁適撰寶名而刻之乾興受命丨丨作丨丨寶曰恭膺天命之寶嘉祐篆文丨丨八年英宗即位作受命寶命歐陽脩丨其丨曰皇帝恭膺天命之寶夐無前比大觀元年十一月詔朕承祖宗休烈萬邦作孚永惟受命之符當有一代之制尚循秦六璽之用度越百年之乆或未大備自天申命地不愛寶得全玉於異土得好工於編氓八寶既成丨丨丨丨可以來年正月御大慶殿恭受八寶真希世寶建炎二年詔有司築圓壇於南門外初政和所造九寶其八為金虜刼取惟鎮國寶在焉至是上以宣示執政玉色溫潤丨丨丨之丨也賫玉璽至建炎元年謝克家以張邦昌命丨丨丨丨文曰太宗受命之寶上動哭命汪伯彦司之奉玉寶獻嘉定勅迺者山東河北連城慕義爰致殊方效順肅丨丨丨來丨于京質理温純篆刻精古文曰皇帝恭膺天命之寶暨厥圖開登載燦然實惟我祖宗之舊繼獲玉檢其文亦同玉璽譜傳國璽是秦始皇所刻其玉出藍田山是丞相李斯所書其文曰受命于天既夀永昌漢髙祖定三秦秦王子嬰獻此璽及漢髙即位仍佩之因以相傳故號曰傳國璽漢昭帝時殿中一夜相驚霍光即召持節郎取璽郎不與光欲奪之郎按劒曰頭可得璽不可得光善之明日遷郎秩二等光後廢昌邑王賀立宣帝光自手解取賀璽扶令下殿至漢平帝王莽纂位就元后求璽乃出璽投之于地璽上螭一角缺及莽敗時帶璽綬避火於漸臺商人杜呉殺莽取綬不知取璽及莽頭公賓就見綬間綬主所在及斬莽首莽璽與王憲憲得無所送又自乗天子車輦李松入長安斬送璽詣宛上更始赤眉大司馬謝禄至髙陵更始奉璽赤眉赤眉立劉盆子建武三年盆子敗于宜陽璽還光武孫堅從桂陽入討董卓卓時已焚燒洛邑徙都長安堅軍於城南見井中旦旦有光軍人莫敢汲堅乃探得璽初卓作亂掌璽者投于井中故堅得之袁紹有僭盗意乃拘堅妻逼求之紹得璽見魏舉以向肘魏武惡之紹敗得璽還漢以襌魏魏以禪晉趙王倫篡立使義陽王威就恵帝取璽帝不與强奪之晉帝永嘉五年王彌立入洛陽執懷帝及傳國六璽詣劉曜後為石勒所并璽復屬勒刻一邊云天命石氏此題今不復存勒為冉閔所滅此璽屬閔閔敗璽存閔大將軍蔣幹晉鎮西將軍謝尚遣督䕶何融至購賞得之以晉穆帝永和八年還江南晉元帝東渡歴數帝無玉璽北人皆云司馬家是白板天子太平御覽詩集降紫泥天書丨丨丨李印器物叢談印亦所以示信也惟天子印曰璽用玉其餘王公卿大夫士或曰印或曰草非用金銀則用銅鐵有綬綬之色各不同以辨尊卑貴賤之等皆有文刻上古無是也爰自三代俗化雕文詐偽並興始有印綬之設以檢姦萌秦漢不古從可知已事類印文諸侯正印黃金橐駞鈕丨曰璽列侯黄金龜鈕文曰丨丞相黄金龜鈕丨曰章二千石銀印六百石銅印鼻鈕文曰丨漢舊儀印章乃設丨丨作信萬國印銘銀黃黃金印丨綬是謂銀丨金紫相國太尉御史大夫太傅太師太保皆丨印丨綬前百官表銅黑凡吏秩比二千石以上皆銀印青綬光禄大夫無秩北六百石以上皆丨印丨綬大夫博士御史謁者郎無比二百石以上皆丨印黃綬前百官表銀青郡公縣公縣侯大夫夫人丨印丨綬晉輿服又見前蘇秦佩丨丨丨六園相印史本傳蔡澤懷丨丨謂其御曰丨黄金之印結紫綬於腰揖遜人主之前食禄富貴四十三年足矣刓不與項羽為人刻印丨忍丨丨令趣銷項羽急圍漢王於榮陽酈食其謀立六國後以撓楚權漢王曰善趣刻印先生行佩之酈生未行良從外來漢王方食具以酈生計告良良曰誰為陛下畫此計者陛下事去矣臣請借前箸以籌之云云漢王輟食吐哺罵曰豎儒幾敗乃公事丨丨丨印無易堯周昌既為趙相髙祖以御史大夫印弄之熟視堯曰北印丨丨丨者遂拜之使立信漢王丨張良操印丨韓丨為齊王得一匱秦時自相署置官之印也夏侯嬰從擊秦得之五字印漢武時據土數五故丨丨為印文若印文不足五字則以之字足之方寸印陛下以丨丨之丨丈二之組鎮於天下淮南王書欒大受漢武令刻玉印賜丨丨文成文曰天道將軍使使衣羽衣夜立白茅上五利將軍亦立白茅上丨印以示不臣買臣懷朱丨丨拜㑹稽太守丨其印綬而入㑹稽郡石顯纍漢丨丨元帝時為中書令與僕射梁少府五鹿充宗結黨附倚者皆得寵位民歌曰牢邪石邪五鹿客邪印何纍丨綬若若邪言其兼官據勢也鵲飛化張顥為梁相雨後有山丨丨丨為圓石破之得金印文曰忠孝侯印海錄龜左顧孔愉討華軼功封餘不亭侯愉嘗行經餘不亭見籠龜於路者愉買而放之溪中龜中流左顧者數四及是鑄侯印而印丨丨丨三鑄如初印工以告愉為司徒長史乃悟遂佩焉本傳取金印周顗曰今年殺諸賊奴丨丨丨如斗大擊肘後齎金印晉宗室延煦事見前璽注許上印裴寂遷左僕射帝置酒含章殿歡甚寂頓首曰始陛下發太原約天下已定丨丨丨綬今四海妥安願賜骸骨歸田里久當印程忌以錢穀奮而至宰相自以非人望不敢丨丨丨監軍有印宗室説馬燧節度太原辟署少尹李自良代燧自良卒説與監軍王定逺袐其喪詔以通主為節度使授説行軍節度留後定逺自以有勞於説頗横恣請别賜印丨丨丨丨自定逺始中人假印李藩李吉甫復相藩頗沮止會呉少陽襲淮西節度吉甫已見帝濳欲中藩即奏曰道逢中人假印節與呉少陽臣為陛下恨之帝變色不平翌日罷藩為太子詹事懷走京師盧奕黄門監懷慎子也留臺東都兼知武部選安禄山䧟東都吏亡散奕前遣妻子丨印間道丨丨丨挈走京陽劉允章為東都留守黄巢至分司李磎丨尚書印丨丨丨允章寄治河清巢僣號輒受偽官文書盡用金統遣取印磎所磎不與更悔愧移檄近鎮起兵捍賊磎持印還之倒司農印段秀實會源休教朱泚偽迎天子遣將韓旻領鋭師三千疾馳奉天秀實以為宗社之危不容喘乃遣人喻大吏岐靈岳竊取令言印不獲乃丨用丨丨丨進其兵倒都統印李崧劉皇后聽讒者言遣人教繼岌殺郭崇韜人情不安崧見繼岌曰王何作此危事今逺軍五千里不見咫尺之詔殺大臣是召亂也乃召書史三四人登樓去梯夜以黃紙作詔書丨用丨丨丨明日告諭諸軍人心乃定復還故處裴度平章中書失印度自如左右白復於故處得印度不應或問其故曰此必吏人盗之以印書卷耳急則投諸水火緩則丨丨丨丨人復其識量控制萬里唐王忠嗣為河西隴右節度權朔方河東節度佩四將印勁兵重地丨丨丨丨近古未有也寶函金印順宗元和五年給事中張維則自新羅使囘云於海上泊洲島間見花木臺殿有數公子命一青衣捧金龜印以授維則乃寘之於丨丨復語維則曰致皇帝還舟中囘顧舊路悉無蹤跡丨龜長五寸上負黄金王丨面方一寸八分其篆文曰鳳芝龍木受無疆維則達京師即具以事進上曰朕前世豈非仙人乎玉册金印唐莊宗入洛鏐遣使貢獻求玉册莊宗下其議於有司羣臣皆以為非天子不得用玉册既而許之乃賜鏐丨丨丨丨呉越世家倒印不同昔王文正在中書冦萊公在密院中書倒用了印萊公須勾吏人行遣他日密院亦倒用了印中書吏人呈覆亦欲行遣文正問吏人汝等且道密院當初行遣丨用丨者是否曰不是文正曰既是不是不可學他不是遂丨丨龜山語錄失印薄罪郎官何洵直丨本部丨呂正獻公曰洵直誠有罪然重譴之則自今猾吏皆得以制主司矣乃丨其丨詩集字屈盤垂垂金印押千官金窠篆丨竒丨丨李白篆分明彤管内人書細膩金奩御印丨丨丨元禎取豈遲軍符侯印丨丨丨杜甫枉裴道州手札符節門符附節器物叢談符契也代古之珪璋剖而相合長有度用以徵召兼防欺詐者也古者以竹為之故字從竹及後世詐偽蠭起以竹易得之物又不足為之防於是有以銅鐵鑄及金銀鑄為物象而用之者皆剖而為兩一留在内一給付外如有徴召必令合之有不合者刻奏吁信嚴矣然猶不免有偽冒者今之世又至於從省代以書翰毋乃實是而名非歟節出使操持之物所以為行道之信亦以竹為之或以金玉為之其長也亦有度有所將命則出而給之入而歸之使之達諸其外而無所留滯焉者其唯節乎事類中孚符者孚也徵召防偽事資丨丨三代玉瑞漢用金竹末代從省代以書翰矣文心雕龍大信初禁網尚簡易但以璽書發兵未有虎符之信詩上疏曰舊制發兵皆以虎符其餘徵召竹使而已符象合取為丨丨所以明著國命欽持威重也間者發兵但有璽書或以詔令如有奸人詐偽無由知覺愚以為軍旅尚興賊虜未殄召兵郡國宜有重謹可立虎符以絶奸端書奏世祖説之後杜詩傳焚符丨丨破璽而民朴鄙莊子合符若合符節孟子闕𤣥女兵符丨丨出丨丨與黃帝戰蚩尤河圖太公隂符武王問丨丨曰引兵深入卒有緩急吾將以近通逺奈何太公曰主與將有丨丨凡八等與夫人刻秦華陽夫人承太子間從容言子楚質於趙者絕賢願得子楚立以為適嗣安國君許之乃丨丨丨丨玉符約為適嗣史呂不韋請如姬盗公子無忌丨丨丨丨晉鄙兵符史本傳銅竹為符漢文帝初與郡守為丨虎丨竹使符應劭注銅虎符第一云五國家當發兵遣使者至郡合符合乃受之竹使符皆以竹箭五枚長五寸鐫刻篆書師古曰與郡守為符者各分一半右留京師左以與之棨繒為符又闗無用傳注傳信也或用丨或用丨棨者刻木丨合丨也並前文帝紀棄繻而去初終軍入關闗吏與軍繻曰傳還當以合符軍曰大丈夫西遊終不復還丨丨丨丨注繻符也帛邊也裂帛頭合以為符軍為謁者使行郡國建節東出闗吏識之曰此乃前棄繻生也本傳刻傳以出寗成為内史抵罪髠鉗廼解脱詐丨丨丨丨闗歸家注云傳所闗之符也傳張恋反出符發兵武帝曰吾不欲丨銅虎丨丨丨郡國廼遣嚴助以節發兵㑹稽嚴助傳買符入闗後郭丹從使長安丨丨丨函谷丨乃喟然嘆曰不乗使者車終不出闗本傳賜玉麟符隋煬帝幸遼東命鄭𤣥為京師留守樊子盖為東都留守俱丨丨丨丨以代銅獸六典云傳符之制京師留守曰玉麟符朌銀莵符唐髙祖丨丨丨丨其後改為銅魚符以起軍旅易守長兩京北都留守給麟符東方諸州給青龍符南方諸州朱雀符西方諸州騶虞符北方諸州𤣥武符唐車服志駐節即辦唐房𤣥齡太宗曰今我有𤣥齡猶鄧禹也居府出八十年軍符府檄或丨丨丨丨本傳楊子雲解嘲儋人之爵懷人之符分人之圭韓文公原道相欺也為之符璽以信之節明信凡君召以三節二節以走一節以趍注節所以丨丨輔君命也使使召臣急則持二緩則持一記玉藻防姦地官掌節注將送者執此節以送行者皆有道里日時果如今郵行有程矣以丨容丨擅有所通也輔玉命掌節守邦節而辨其用用以丨丨丨守邦國者用玉節守都鄙者用角節凡邦國之使節山國用虎節土國用人節澤國用龍節皆金也以英蕩輔之門闗用符節貨賄用璽節道路用旌節皆有期以反節凡通達於天下者必有節以傳輔之無節者有幾則不達達天下小行人掌丨丨丨之六節山國用虎節土國用人節澤國用龍節皆以金為之道路用旌節門闗用符節都鄙用管節皆以竹為之並禮節尚墨秦始皇推始終五德之傳以為水德之始衣服旌旄丨皆丨丨數以六為紀史本紀節加旄太子以節發兵與丞相劉屈氂戰長安初置城門屯兵更丨丨黃丨注時太子亦發節以戰故加其上旄以别之前武紀以節入太尉周勃丨一丨丨北軍一呼士皆􅃝左為劉氏杖節卧蘇武丨漢丨牧羊丨起常持節旄盡脱持節不失張騫使月氏匈奴得之留騫十餘嵗丨漢丨丨丨持節不屈後鄭衆顯宗遣丨丨使匈奴衆至北虜庭欲令衆拜衆丨為丨後復遣衆衆上言臣不忍持大漢節對氊裘獨拜竝本傳司𨽻去節諸葛豐為司𨽻舉節以收侍中許章於是上收豐節丨丨丨丨自豐始本傳司馬持節光武行大丨丨事丨丨北渡河本傳今以建威馮衍與田邑書曰丨丨一節之任丨三軍之丨豈特寵其八節之竹氂牛之尾哉後本傳恨不授卿晉石苞遷徐州刺史文帝之敗於東闗也苞獨全軍而返帝指所持節謂苞曰丨丨以此節丨丨以究大事晉本傳詩集符符印車丨候丨取豈遲紫燕緑耳行甚速杜相裴道州手扎符節見後節注張虎豹兵丨丨丨符杜兼太守俄丨丨丨符髙適節主恩持丨丨前後三丨節杜諸將詩十年持丨丨丨漢節李自崆峒山丨丨符節丨青霄杜贈田判官古今合璧事類備要外集卷三十二
