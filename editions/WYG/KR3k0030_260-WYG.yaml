body:
  text: 古今合璧事類備要别集卷五十四宋謝維新撰竹木門竹格物總論竹中虛白膜外皮青緑色或黄或紫或班駁文或小或大或長或短種族最多未易枚數也大抵皆自根而莖莖皆有節莖間節處生枝毎兩之枝亦有節枝間節處生葉葉毎三之然初出地為筍節節有籜包之及成莖抽之而籜遂漸次脱落處自然有粉嵗久而茂茂則成林葱翠交加最為可愛至於雪霜摧壓不改也按山海經竹六十年一易根易根必經生花生花必結實結實必枯死及實落土又復生之此言諒為不妄事類揚州貢丨丨厥丨篠蕩荆州貢丨丨厥丨惟箘簵楛並書禹貢淇奥竹瞻彼丨丨緑丨猗猗詩衛風渭川竹丨丨千畝丨其人與千户侯等史記㑹稽竹東南之美有丨丨之丨箭焉爾雅號陸海秦地有鄠社竹林南山檀柘丨丨丨焉漢書為釡甑少室之山大竹堪丨丨丨孝經河圖生簫管江寧縣慈姥山丨丨丨竹丹陽記辰日種種竹者各用丨丨山谷所謂竹湏辰日斸笋看上畨成是也臘月㘽㘽用丨丨杜林所謂東林竹影薄丨丨更須丨是也非此時移之多不活竹醉迷五月十三日古人謂之丨丨日又謂之竹丨日㘽竹多盛茂或隂雨則鞭行明年筍莖交出然又有不拘此者竹雌雄丨有丨丨雌者多笋種竹當種雌自根而上至於稍一節發者為雄二節發者為雌並仇池墨記雌雄鳴黄帝使伶倫自大夏之西崑崙之隂取竹於嶰谷擇其竅厚均者斷兩節間吹之以黄鐘之宫制十二筩以聴鳯之鳴其雌鳴為六雄鳴亦六此黄鐘之宫皆可以生之是為律本西漢律歴志鳯凰食黄帝時丨丨棲帝梧桐丨帝竹實韓詩外傳淚染即斑舜南巡不返𦵏於蒼梧之野堯二女娥皇女英追之不及至洞庭之山丨下丨竹丨丨妃死為湘水神博物志簡用殺青殺青者直用青竹丨書耳劉向別録淇園之竹漢武帝發卒塞瓠子河令羣臣將軍以下皆負薪塞河而下丨丨丨丨漢書南山之竹公孫賀子敬聲擅用北軍錢發覺下獄時詔捕朱安世賀自請捕以贖子罪後得安世安世笑曰丞相禍及宗矣丨丨丨丨不足受我辭云云遂從獄中上書告敬聲云云漢公孫賀傳以椽為笛蔡邕避難江南宿於柯亭柯亭有觀丨竹為丨邕仰而視曰良材也後以丨丨音聲卓絶本傳以杖與騎費長房隨壺公入山丨竹丨丨丨至家長房以杖投葛陂中顧見則龍也本傳以葉挿户晉武帝平呉之後納孫皓宫人數千帝並寵之莫知所適乗羊車恣其所之所至宴寢宫人乃丨竹丨丨丨以鹽汁灑地而引帝車晉史可無此君王徽之字子猷時呉中一士大夫家有好竹欲觀之便出坐輿造竹下諷嘯良久主人灑掃請坐徽之不顧而去嘗借居空宅中便令㘽竹或問之徽之但嘯咏指竹曰何丨一日丨丨丨耶晉史方知是尹宋袁粲為丹陽尹郡南一家頗有竹石粲率爾歩徃不通主人直造竹所嘯詠主人出語笑欵然而車騎羽儀至門丨丨丨袁丨唐史下開三逕蔣詡舍中竹丨丨丨丨有羊仲裘仲之徒與之遊三輔決録世稱七賢嵇康所與交者阮籍山濤向秀劉伶阮咸王戎為竹林之遊丨丨竹林丨丨晉史人號六逸唐李白與孔巢父韓凖裴政張叔祖陶沔居徂徠山日沉飲丨丨竹溪丨丨唐史地為竒勝王維别墅在輞川丨丨丨丨有竹里館本傳日報平安李衛公言北都唯童子寺有竹一窠纔長數尺相傳其寺綱維毎丨丨竹丨丨雜爼杖無恙否潤州甘露寺僧某者李徳裕以方竹杖留贈出大宛國堅實而正節眼鬚牙四面對出公再鎮浙右問僧曰竹丨丨丨丨曰已規園而漆之矣叢談一枝為橋羅公遠引明皇遊月宫擲丨丨竹於空中丨丨色如白金行數里至一大城闕曰此月宫也明皇雜録二矢中筒党項剽掠詔鳯翔李業河東李拭合節度兵討之宰相白敏中為都統帝出近苑或以竹一筒植舍外近纔尺許遠且百歩帝囑二矢曰党項窮冦仍嵗暴吾鄙今我約射竹中則彼當自亡不中我當且索天下兵剪之終不以此賊遺子孫左右注目帝一發竹分矢徹諸外左右呼萬嵗不閲月党果破五代史復生成林冦萊公貶死於雷詔還𦵏洛陽過公安民皆迎祭斬竹挿地以掛紙錢焚之尋丨丨丨丨邦民神之號曰相公竹因立廟劉貢父王樂道為文刻石以紀其事宋史戴凱之竹譜植物之中有名曰竹不剛不柔非草非夭小異空實大同節目或茂沙水或挺巖陸條暢紛敷青翠森肅質雖冬蒨性忌殊寒九河鮮育五嶺實繁萌筍苞籜夏多冬鮮根榦將枯花􅘽乃縣䈙必六十􅘽亦六年􅀢龍之美爰自崑崙員丘帝竹一節為船巨細已聞形名未聞桂實一族同稱異源􅟳尤勁薄博天之賢篁任篙笛體特堅圓棘竹駢深一叢為林根如稚輪節若束針亦曰笆竹城固是任篾筍既食鬢髪則侵單體虛長各有所育苦實稱名甘亦無目弓竹如藤其節却曲生多卧土立則依木長幾百尋狀若相續質雖含文須膏乃縟厥族之中蘇麻特竒修榦平節大葉繁枝凌羣獨秀蓊茸紛披篔簹射筒箖箊桃枝長爽纎葉清䏎薄皮千百相軋洪纎有差相繇既戮厥土維腥三堙斯沮尋竹乃生物尤世遠畧狀傳名般腸實中與笆相類於用寡宜為笋殊味筋竹為矛稱利海表槿仍其榦刃即其杪生於日南别名為篥百葉參差生自南垂傷人則死醫莫能治亦曰篣竹厥毒若斯彼之同異余所未知簹與由衙厥體俱洪圍或累尺簹實衙空南越之居梁柱是供竹之堪杖莫尚於笻磥砢不凢狀若人功豈必蜀壤亦產餘邦一曰扶老名實縣同􅚠籃二族亦甚相以把髪苦竹促節薄齒束物體柔殆同麻枲蓋竹所生大抵江東上宻防露下疎來風連畝接町疎散崗潭鷄脛似篁高而筍脆稀葉稍杪類記黄細狗竹有毛出諸東裔物類衆詭于河不計有竹象蘆因以為名東甌諸郡縁海所生肌理均淨筠色潤貞凢今之篪匪兹不鳴㑹稽之箭東南之美古人嘉之因以命矢箘簵載籍貢名荆鄙篃亦箘徒概節而矩江漢之間謂之􅞴竹根深耐寒茂彼其苑篲篠蒼蒼接町連篁性不卑植必也巖岡踰矢稱大出尋為長物各有用掃之最良又有族類爰挺嶧陽懸根百仞疎榦風生簫笙之選有聲四方質清氣亮衆管莫伉亦有海篠生於島岑節大盈尺榦不滿尋形枯若筯色如黄金徒為一異莫知所任赤白二竹還取其色白薄而曲赤厚而直沅澧所豐餘邦鮮植肅肅䈄􅀢畟畟攢植擢笋於秋冬乃成竹无大无小千萬脩直蘴膜内暠繡丈外施箛築誕節内實外澤作貢漁陽以供輅策浮竹亞節虛軟厚肉臨溪覆潦棲雲䕃木洪筍滋肥可為㫖蓄厥性異宜各有所育􅀢植于宛笭生于蜀細篠大簜竹之通目互名統體譬牛與犢人之所知事生軌躅赤縣之外焉可詳録臆之筆之匪邁伊矚白樂天養竹記竹似賢何哉竹本固固以樹徳君子見其本則思善建不拔者竹性直直以立身君子見其性則思中立不倚者竹心空空以體道君子見其心則思應用虛受者竹節貞貞以立志君子見其節則思砥礪名行夷險一致者夫如是故君子人多樹之為庭實焉貞元十九年春居易以拔萃選及第授校書郎始於長安求假居處得長樂里故關相國私第之東亭而處之明日履及于亭之東南隅見叢竹於斯枝葉殄瘁無聲無色詢于關氏之老則曰此相國之手植者自相國捐館他人假居於是筐篚者斬焉篲箒者刈焉刑餘之材長無尋焉數無百焉又有凢草木雜生其中菶茸薈蔚有無竹之心焉居易惜其嘗經長者之手而見賤俗人之目剪棄若是本性猶存乃芟翳薈除糞壤疏其間封其下不終日而畢於是日出有清隂風來有清聲依依然欣欣然若有情於感遇也嗟乎竹植物也於人何有哉以其有似於賢而人猶愛惜之封殖之况其真賢者乎然則竹之於草木猶賢之於衆庶烏乎竹不能自異惟人異之賢不能自異惟用賢者異之故作養竹記書于亭之壁以貽其後之居斯者亦欲以聞於今之用賢者云劉嚴夫植竹記秋八月劉氏徙竹凢百餘本植於室之東西軒泉之南比隅克全其根不傷其性載舊土而植新地煙翠靄靄寒聲蕭然適有問曰樹椅桐可以伐琴瑟植樝棃可以代甘實茍愛其堅貞豈無松桂也何不雜列其間也荅曰君子比徳於竹焉原夫勁本堅節不受雪霜剛也緑葉萋萋翠筠浮浮柔也虛心面直無所隠蔽忠也不孤根以挺聳必相依以林秀義也雖春陽氣王終不與衆木鬬榮謙也四時一貫榮衰不殊常也垂蕡實以遅鳯樂賢也嵗擢笋以成榦進徳也及乎將用則裂為簡牘於是冩詩書彖象之辭留示百代微則聖哲之道墜地而不聞矣彼後人将何所宗歟至若鏃而箭之挿羽而飛可以征不庭可以除民害此文武之兼用也又劃而破之為蔑席敷之於宗廟可以展孝敬截而穴之為篪為簫為笙為篁吹之成虞韶可以和人神此禮樂之並行也夫此數徳可以配君子故嚴夫列之於庭不植他木欲令獨擅其美且無以雜之乎竊懼來者之未諭故書曰劉氏植竹記尚徳也劉寛夫􅜩竹記左史院邇宸居之正地直日華之東偏俗塵不飛人意自遠閟邃幽闐似非之官曹有竹一叢翠接堦所其虛中㓗外之操䕃坐祛煩能紫薇郎高公嘗賦之固已備盡然而嵗月滋久蔓衍浸淫大小相依高下叢茂俾日光雖透隂氣常凝瞑色為之早來陽春為之減煦四序不正一庭常昏蚊蟲曹飛雀鷃自遂披圖散帙觀覽不快二年冬侍軒之暇載筆之餘偶歩庭除病其蔽翳因命斧斤將治其蕪沉吟即時乃用申誠且謂其徒曰礪爾器用端爾瞻視謹爾操執慎爾區分其有質微而葉環苯䔿者去之從風而不能自正者去之大而倚者去之聚而曲者去之竅而不能備笙篁之用者去之挺而不能棲鸞鳯者去之其有羣居不亂獨立自持振風發屋不為之傾大旱乾物不為之瘁堅可以配松栢勁可以凌霜雪密可以泊晴煙疎可以漏宵月嬋娟可玩勁挺不囘者爾其保之既而芟剪成功葉蕪刈盡去者存者邪正乃分不浹旬扶疎一林歴歴可見有清風澡慮之效無蔽日匿姦之機檀樂風生韻合宫徵君子是以知竹箭之美尚資科别之功即其他不俟言而詳矣或以斯為小可以伸之因紀一時之妙廣而述之晁補之有竹堂記濟南李文叔為太學正得屋於經衢之西輸直於宮而為之治其南環第植竹砌傍而名其堂曰有竹榜諸棟間又為之記於壁卓午歸自大學則坐堂中掃地置筆硯呻吟策牘為文章日數百篇不休如繭抽絲如山蒸雲如泉出地流如春至草木發須臾盈卷軸門窻几案婢僕犬馬目前之物有一可指無不論説形容疆朝而故評之以致其吹悦而於竹尤數數也顧其地狹而卑天雨捧薉蜘蛛之織河栁莬葵之所交横而蒙翳人不知其竹也有過者文叔必顧堂下而語之讀壁間記抑棟而指其榜曰吾固詔客矣客輾然而笑曰今夫渭用之千畝淇園之林與南山之造天而蔽日者其大若盃若盂若桐梓之軀其膠繚嵌巖之上而臨百仞之淵不特出屋簷而摩牆堵也暮春者春雷隠隠萬笴奮角如犀角作籜解而出碧一日尋尺彌望不可以極於時刀斧之取材者度徑圍而得之大小齊一西轉巴笮南引江漢浮渭而亂河囷束簰屬而下者為箘為竿為屋椽犍菑千丈之笮徧國之藩籬是頼興竅而北夫律名以悲衷娯耳者聲音滿天地也視其旁之人室廬竹也用器竹也摧而薪者竹也以貿米鹽而出之其鄰境者竹也夫此人豈知竹之愛翛然而喜諄諄然語人而以誇之曰吾居有竹也哉文叔亦輾然而笑曰不然夫物安知其貴賤之所常在玉之美而藍田以抵鵲沉為美木而交趾以為盤食彘白鷼錦鷄山中以醢腊而貴人以百金致茗以為今而戎人以為佩夫物固有以多為賤而以少為貴者夫三城之廣大九塗四達三門十二陌坊之棊置上自王侯至於百姓庶民宫接而垣比車馬之所騰藉人氣之所蒸漬囂塵百里欲求尺寸之地以體逸而莫之致而貧者置圚無所况於其他哉然則環堵不容文而有竹如吾堂者不知能幾人也則余所以揭之於棟而名之書諸壁而記之翛然而喜諄諄然語客以誇之不亦可哉且竹之美昔人以比徳松栢在冬夏青青君子之所獨也以夫少猶責之使余得見夫渭川淇園與南山之蒼蔚者而遊其間雖多固不可賤也夫多猶不可賤又况其少哉客曰唯雖然吾聞昔王子猷好竹嘗曰安可一日無此君聞呉中士大夫有佳竹欲觀之徑出坐輿造竹下嘯詠良久主人欲留而不可將出主人閉之因盡歡而返今文叔居有竹文叔姑亦灑掃儲具借不邀客客將造門坐堂上不去曰竹固招我楊誠齋竹所記永嘉呉公叔清曠簡遠望之皎然如雪山倚空落月滿屋梁也趯然如瓊田之鶴阿閣之鸞鳯也蕭然如馭風騎氣飲沆瀣而遊汗漫也予頃識之湘中一見定交脱帽痛飲説詩論文俗士徃徃或疑其異或信其真公叔不知也今年四月予來為邑於斯呉公叔實賔贊洪府相見談湘中事予蓋老且病矣折腰走堦下非其好也公叔復呼酒以濯盥予之泥塗塵沙夜過半月在牖户荷風颯然從東湖之東度水而至公叔與予皆大醉矣公叔起曰吾有竹所子盍為吾記之予曰奚而名也公叔曰子不聞夫王子猷之不問主人敬造竹所乎予曰記之易耳雖然此非公叔事也乃揚子事也揚子將為子猷之徑造矣但未知今之主人與昔之主人何如耳公叔大笑曰王茂洪不云乎元規若來吾便角巾還第楊誠齋此君軒賦客有問於清虛子曰昔者子猷愛竹字之曰君謂此君一日之不可無古之知竹者未有若子猷之勤者歟清虛子曰子猷可謂愛竹矣知竹則未也古之知竹者其惟吾夫子乎蓋嘗聞之夫子適衛公孫青僕子在淇周有風動竹聞簫瑟團欒之聲欣然忘味三月不肉顧謂青曰人不肉則瘠不竹則俗汝知之乎其詩曰瞻彼淇澳緑竹如簣言念君子溫其如玉吾乃今知竹之所以清武公之所以盛也蓋君子於竹比徳焉汝視其節凛然而孤也所謂直哉史魚邦有道如矢者歟汝視其貎欣然而癯也所謂伯夷叔齊餓于首陽之下民到于今稱之者歟汝視其中洞然而虛也所謂囘也其庶乎屢空有若無歟故古之知竹者其惟夫子乎子猷蓋非知竹者也客曰甚哉清虛子之言似夫子也敢賀此君從陳蔡者皆不及門君何脩何飾乃得與四子而同席願堅晚節於嵗寒以無忘夫子之徳詩集風颯颯含丨自丨丨負雪亦徛徛齊虞羲露凄凄夜條風淅淅晚葉丨丨丨謝朓抱貞心無人賞高節徒自丨丨丨梁沈約分苦節迸籜丨丨丨輕筠抱虛心栁影參差緑竹丨丨丨葳㽔帶曲池陳賀循影瑣碎竹丨金丨丨韓為馬向作龍還葛水丨丨丨并州梁元帝吐龍吟誰能製長笛當為丨丨丨劉孝先叢低地丨篁丨丨碧梢過牆為問南溪竹抽丨合丨丨野堂依丨外丨丨竹野池幽竹細丨丨丨並杜凌冬性能識丨丨丨惟有嵗寒知虞世南滴露梢籠竹和煙丨丨丨杜鳯不至勿嫌丨丨丨終當待聖明梁劉孝威鳥莫彈無塵從不掃有丨丨令丨若要添風月應除數百竿韓愈夏蟲避味苦丨丨丨叢卑春鳥疑杜衆鳥嫌無端種在幽寒處丨丨丨寒鳯未知薛能出欄抽筍添南階竹日日成清閟縹節已儲霜黄苞猶揜翠丨丨丨五六當户羅三四高標陵秋嚴貞節奪春媚稀生巧補林併出疑爭地縱横乍依行爛熳忽無次風枝未飄吹露粉先涵淚何人可携玩清景空瞪視韓愈題新竹鑽石生野竹丨丨丨含波映江島翠色落波深虛聲帶寒草龍吟曽未聴鳯曲吹應好不覺蒲栁彫貞心常自保李白慈姥竹雀不喧乍見凌雲飄粉籜須知礙石作盤根細看枝上蟬吟處猶是筍時蟲食痕月送緑隂斜上砌露凝寒葉濕遮門列仙終日逍遥地鳥丨潜來丨敢丨方千蟲難篆江南瀟洒地本自與君宜固節還同我虛心欲待誰澗泉傍借響山水共相滋粉膩丨丨丨叢疎鳥易窺遊邉曽結念到此數題詩莫恨成龍晚成龍自有時唐詩畫色侵書帙緑竹半含籜新梢纔出牆丨丨丨丨晩隂過酒樽涼雨洗涓涓淨風吹細細香但令無剪伐會見拂雲長杜風拂琴埃微風驚暮坐臨牖思悠然開門風動竹疑是故人來時滴枝上露稍霑階下苔幸當一入幌為丨素丨丨李益竹窻聞風寄司馬曙錦衣半着東風弄巧補殘山一夜吹添王數竿半脱丨丨猶丨丨籜龍未信怯春寒楊誠齋粉節新塗青士何年下大荒羽儀禁省立如牆錦綳半脱娟娟玉丨丨丨丨拂拂霜帶雨小酣三日後出牆忽喜一梢長今年秋潤防多暑剰借先生格外涼前人新竹樂府龍孫脱頴丨丨丨丨破苔紋英氣欲凌雲深處未須留客春風自掩柴門蒲團宴坐輕敲茶臼細撲爐熏彈到琴心三疊鷓鴣啼傍黄昏馬古州新竹古今合璧事類備要别集卷五十四
