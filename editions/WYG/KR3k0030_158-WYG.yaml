body:
  text: 古今合璧事類備要續集卷八宋謝維新撰類姓門周古今姓纂帝嚳生后稷至大王邑于周文王以國為氏亊類諤諤周舎事趙簡子立簡子之門三日三夜簡子使人問之曰子何以令我周舎曰願為丨丨之臣墨筆操牘隨君之後司君之過而書之新序期期漢周昌沛人也為中尉後為御史大夫封汾隂侯為人彊力敢直言吃丨丨不奉詔絳侯周勃沛人也材官引强從髙帝攻戰賜爵號丨丨木强敦厚帝以為可属大事不好文學椎而少文當孝惠時為太尉誅諸吕文帝以為右丞相史記條侯周勃子亞夫封丨丨為將軍軍細栁並同上奏貪猾後漢周舉與八使巡行天下號曰八俊劾丨丨丨表薦公清朝廷稱之問大姓酷吏周䊸字文通拜洛陽令下車先丨丨丨主名吏數問里豪彊以對䊸厲聲怒曰本問貴戚輩豈能知此賣菜傭乎貴戚跼蹐京師肅清後為御史中丞公輔器周捨字昇逸舉秀才除太學博士仕梁累遷鴻臚卿尚書吏部郎留省内二十餘年未嘗去左右帝以為有丨丨丨儒者宗周舉字宣光博學洽聞為丨丨所丨京師語曰五經縱横周宣光舉茂才為平丘令上書言得失辭甚切正旱澍雨周暢字伯持為河南尹夏丨因收葬客死骸骨萬餘人應時丨丨妻干齊周澤字穉都拜太常清潔循行盡敬宗廟嘗卧疾齋宫妻問之澤大怒以丨丨犯丨禁收送詔獄謝罪作北山文周顒字彦倫顗七世孫宋元徽中詔為剡令又為山隂令於鍾山西立隠舎體沐則歸之遷中書郎兼著作轉國子博士太學諸生慕其風争事華辯孔稚圭丨丨丨移丨有曰蕙帳空兮夜鶴怨山人去兮曉猿驚中興名將晉周訪字士達周窮振乏智勇過人為丨丨丨丨慨然有平河洛之志鎮東將軍周馥字祖宣遷吏部郎選舉精宻為丨丨丨丨振立中朝素有俊彦之稱汝頴竒士周顗字伯仁少有重名神彩秀徹賁嵩見之嘆曰丨丨固多丨丨廬山隠居梁隠逸周續之字道祖通五經五緯號曰十經名冠同門閑居讀老易隠于丨丨徴命並不就皆呼周郎呉志周瑜字公瑾廬江舒人年二十四呉中丨丨為丨丨敗魏師八十萬於赤壁卒破曹休呉周魴字子魚呉郡人為鄱陽太守謀畧多竒丨丨丨丨斬獲萬計功名常書之竹帛在郡十三年賞善罰惡威恩並行除去三害晉周處字子隠膂力絶人不脩細行丨丨丨丨勇冠三軍周羅㬋字公布仕陳與齊師戰丨丨丨丨除豫章内史獄訟庭決不關吏手人懷其惠著三宗論晉周顒長於佛理丨丨丨丨言空假義金印斗大周顗王導嘗指其腹荅曰此中空洞無物然足容卿輩數百人殺諸賊奴取丨丨如丨丨後為王敦所害貂蟬兠鍪周盤龍齊髙帝進號右將軍與其子奉叔大敗魏軍父子由是名播北國後年老還為散騎常侍武帝戲之卿著貂蟬何如兠鍪盤龍曰此丨丨從丨丨中生耳望塵知敵五代周徳威字鎮逺朔州馬邑人為人勇而多智能丨丨以丨丨數其狀貌雄偉笑不改容人見之凛如也勇聞天下周徳威事晉王為騎將小字陽五當梁晉之際周陽五丨丨丨丨上東封書周起字萬卿淄州鄒平人母得吉夢而生起父異之謂必大其門因名之曰起舉進士累擢知制誥及真宗東封還羣臣多獻文以頌徳起獨上書願陛下毋以告成為可恃真宗嘉之獻汴都賦周邦彦字美成錢塘人也性落魄不羈涉獵書史元豐中嘗丨丨丨丨神宗異之自諸生命為太學正號濓溪先生周敦頥字茂叔為人洒落光風霽月丨丨丨丨丨號周益公集周必大廬陵人當孝宗淳熈中為宰相有文集行于世丨丨丨丨丨並史東坡黙化堂說周文之未知其名定家藏東坡先生與文之别紙真墨載之于此軾近蒙寄示畫圖及新堂面勢仍求榜名嶺南無大寒甚暑秋冬之交勾萌盜發春夏之際柯木潜改四時之運黙化而人不知民居其間衣食之奉終歲一律寡而易安有足樂者若吏治不煩即共所安而與之俱化豈非牧養之妙手乎文之治循似用此道故以丨丨名此丨如可用便請題榜也呉古今姓纂周大王子大伯仲雍封呉後為越所滅子孫以國為氏季札之𦙍居齊魯間呉季子名札呉子壽夢之少子出聘請觀周樂見子産如舊相識事類好兵呉起衞人丨用丨司馬穰苴不能過魏文侯以為將與士卒分勞苦卒有病疽者起為吮之復為西河太守去為楚相南平百越北并陳蔡却三晉西伐秦諸侯患之史記在徳魏文侯浮西河曰美哉山河之固此魏國之寳也呉起曰在徳不在險番君前呉苪秦時番陽令甚得江湖間心號曰丨丨議郎後呉良字大儀躬儉安貧白首一節顯宗以為丨丨有智謀後漢呉漢字子顔南陽宛人為人質厚少文造次不能以辭自達隠若一敵國及在朝廷斤斤謹質形於體貌勇鷙丨丨丨諸將鮮能及者拜大司馬封廣平侯好篇章呉邁逺丨為丨丨宋明帝見之曰此人吟詠之外無所復有善三禮呉苞字天盖丨丨丨及老莊徴為太學博士不就立館鍾山下教授賦貪泉晉呉隠之字處黙有清操遷晉陵太守轉廣州刺史至石門酌丨丨賦詩詳見清亷及刺史門文有古氣宋呉均字叔庠好學有俊才丨體清拔丨丨丨好亊者或斆之謂為呉均體論今董狐唐呉兢汴州人少厲志貫知經史方直寡諧比魏元忠薦兢才堪論譔詔直史館脩國史私撰唐書唐春秋叙事簡核號良史世謂今董狐云為相安靜本朝呉充丨丨務丨丨力辭位除觀文殿大學士吏部尚書西太一宫使卒謚正憲使虜殺禮呉奎字長文維州北海人奉使契丹遇虜主加稱號邀使者入賀奎自以丨事有職不為往比還中道與虜使遇丨人衣服以金冠為重紗冠次之而使人輙欲以紗冠邀漢使盛服奎不許而丨其丨見及神宗即位拜樞密副使踰月參知政亊知青州卒諡文肅義莊周親呉奎少時甚貧晚貴以錢二百萬置丨丨以丨丨戚朋友之貧者死之日家无餘財諸子至无屋以居制詞温厚呉敏字元中儀真人累官中書舎人給事中宣和間召還兼直禁林丨丨丨丨人多傳誦河北徳音云桑麻千里皆祖宗涵養之休忠義百年亦父老訓誨之力靖康初進元樞拜少宰建炎間起帥長沙中林蘭蕙呉俶字正儀潤州人也幼有俊才韓熈載潘佑皆以文章著名江左一見俶深加器重曰呉正儀丨丨之丨丨也湘山文集呉芾淳熈中為徽猷閣待制有文集行於世號丨丨丨丨制舉入三等呉育字春卿建州建安人强學博辯舉進士甲科舉賢良方正䇿入二等有國以來丨丨惟育丨丨丨前此未有也慶厯五年拜右諫議大夫樞密副史數月除參知政事進士宏詞魁呉幵字正仲滁之全椒人與兄竝弟兹同舉丨丨與兹偕試丨丨並中丨等士林多傳誦之為宗室六箴呉充字沖卿舉進士為國子監直講兼呉王宫教授他官與宗室狎習无誨導之誼充獨以嚴見憚丨丨丨丨丨以獻仁宗嘗命分寫遍賜皇族英宗書之座右上御戎要畧呉遵路舉進士累遷司封員外郎除漕淮南知洪州入脩起居注除天章閣待制知開封府出知宣州丨陜西丨丨丨丨二十篇鄭古今姓纂周厲王少子友受封於鄭是為桓公在畿内今華州鄭縣是也生武公與晉文侯夾輔平王東遷于洛徙溱洧之間謂之新鄭傳封十三代至幽公為韓所滅子孫播於陳宋以國為氏事類聲聞鄭當時字莊陳人以任俠自喜丨丨梁楚之間為太子舎人常置驛馬請謝賓客其知交皆天下有名之士誡門下客至无貴賤无留門者執賓主之禮以貴下人常推轂士史記名震谷口鄭子真不屈其志而耕乎岩石之下丨丨于京師楊子履聲鄭崇字子游哀帝時為尚書僕射每見曳革履上笑曰朕識鄭尚書丨丨治蹟前漢鄭𢎞字穉卿泰山剛人兄昌字次卿皆明經通法律政事次卿為太原涿郡太守𢎞為南陽太守皆著丨丨條教法度為後所述𢎞以髙第入為右扶風京師稱之後為御史大夫振西域鄭吉㑹稽人以卒伍從軍為人彊執習外國事破莎車師降日遂威丨丨丨使匈奴後漢鄭衆字仲師顯宗遣丨丨丨虜欲令拜衆不為屈不忍將大漢節對氈裘獨拜吾道東後鄭𤣥字康成北海髙密人從馬融質疑義問畢辭歸融曰鄭生今去丨丨丨矣朱紫别鄭黙字思元起家秘書郎考覈舊文刪省浮穢虞松曰而今而後丨丨丨矣鄭公鄉鄭𤣥孔融深敬之告髙密縣為𤣥特立一鄉曰丨丨丨門閭號通徳門號鄭陂魏鄭渾字次公教民耕桑重去子之法所育男女多以鄭為字遷沛郡太守興陂遏開稻田民賴其利刻石頌之丨曰丨丨父子兖州鄭述祖字恭文有風檢為先達所稱譽仕齊遷兖州刺史其父亦嘗為此州百姓歌曰大鄭公小鄭公相去五十載風教猶尚同及病曰一生冨貴足矣以清白之名遺子孫死無所恨兄弟侍饗鄭道昭字椿年孝文饗侍臣與兄懿俱侍坐孝文歌曰白日光天无不耀江左一隅獨未照懿續曰雲雷大振兮天門闢率土來賓一正歴道昭曰皇風一鼔兮九地匝載日依天清六合累遷國子祭酒豪爽有文唐鄭肅子仁表丨丨丨丨嘗以門閥文章自髙曰天瑞有五色雲人瑞有鄭仁表姿采峙玉鄭畋為人仁恕丨丨如丨丨也善果清吏唐鄭丨丨鄭州人累轉魯郡太守母崔氏賢明曉政治嘗坐閣内聽處决當理則悦有不可引至牀下責愧之故丨丨所至有績號丨丨鄭涵直臣鄭澣本名㴠第進士遷右補闕敢言無所諱憲宗嘗謂餘慶曰㴠卿令子而朕丨丨也可更相賀口伐可汗鄭元璹字徳芳諭罷可汗兵數年始得還帝勞曰卿不辱於虜可輩蘇張矣拜鴻臚卿突厥攻太原詔元璹持節往勞既至虜以不信咎中國元璹隨語折讓無所屈太宗賜書曰知公丨丨丨丨如約遂使邊火息燧朕何惜金石賜於公哉持節使虜鄭權汴州人擢進士第佐涇原節度劉昌府穆宗立丨丨為囘鶻告哀丨權識謀魁然有閎辨與可汗爭曲直持議明壯丨禮異之七松處士鄭薰字子漙擢進士第時數大赦階正議光禄大夫者得䕃一子門施㦸薰却之不肯叙知舉引寒畯士類多之既老號所居為隠岩蒔松于庭號丨丨丨丨廣文博士鄭䖍鄭州人掇當世事著書八十餘篇𤣥宗愛其才為致廣文館以䖍為博士宰相曰令後世言丨丨丨丨自君始䖍乃就職賊憚二鄭鄭從讜字正求及進士第進門下侍郎沙陀都督李國昌冦邊朝廷以為憂乃拜從讜為節度兼招討使自擇參佐皆一時選士人比太原為小朝廷言得才多也時鄭畋以宰相鎮鳳翔移檄討賊兩人以忠義相持丨尤丨之號丨丨云時號廣文唐鄭䖍學長於地理山川險易著書丨丨鄭丨丨在官貧約澹如也杜甫嘗贈以詩曰才名四十年坐客寒無氈又善山水好書自寫獻帝帝大書鄭䖍三絶教成儒學鄭餘慶字居業鄭州人三世皆顯官少砥礪完潔仕四朝其禄悉周所親常語人曰禄不及親友而侈僕妾者吾鄙之後生内謁必諄諄丨丨丨丨儒者之勇鄭畋字台文舉進士中和元年賊將王璠率衆三萬來攻畋設伏以待禽其子斬之威動京師巢大懼不敢西謀當此時微畋天子幾殆帝聞捷曰朕知畋不盡丨丨丨丨乃爾論詩鄭覃鄭覃文宗時坐延英丨丨工否覃曰孔子所刪三百篇其非雅正者烏足為天子道哉歇後鄭綮每以詩謠託諷其語多俳諧故使落調世號鄭五丨丨體後忽拜相宗戚詣慶綮搔首曰歇後鄭五作宰相時事可知矣直言上疏皇朝鄭獬字毅夫安州安陸人俊邁不羣舉進士第一授將作監丞通判陳州召試直集賢院脩起居注遂以右司諌知制誥京師大雨水詔求丨丨獬丨丨圖安上門鄭俠字介夫福州福清人嘗從王安石學舉進士調光州司法秩滿至京師㑹安石秉政俠見安石具言青苗免役用法之害安石不荅又數以書諭之乆之得監安上門遂丨丨丨丨事以奏上力諫攻遼鄭居中字達夫開封人宣和二年進少師封宿國公初遼國叛臣李良嗣來歸陳滅燕之策蔡京童貫主其事時居中為相丨丨不可又謂京