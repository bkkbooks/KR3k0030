body:
  text: 古今合璧事類備要别集卷四十五宋謝維新撰菓門梨附柦格物總論梨數種大者㡬如􅀢有青黄紫三色肉白於雪核少食之甘脆無查滓者為佳品另有一種熟時糜爛可口謂之金鳯梨亦其次也事類快果梨曰丨丨本草山樆梨丨丨尔雅真定梨丨丨郡丨大如拳甘若蜜脆若菱可以解煩結鬼文詔上苑梨丨林丨有紫丨青梨大谷梨縹梨西亰雜記千户等淮北滎陽河濟之間千株梨其人與丨丨侯丨食貨志五升大漢武帝園一名樊川一名御宿有大梨如丨丨落地則碎取者以布囊盛之名含消梨三輔黄圖王母食老子西游與丨丨共丨紫梨尹喜内傳小兒取孔融與諸兄食梨輒取小者人問其故曰丨丨法當丨小者後漢本傳貢鳯棲河中府上丨丨丨梨地理志有虵在李昪本徐氏湖州安吉人為安吉令先是其家有梨結一實大如升其父異之將獻於郡守有謂其父曰此果非常年所有即上獻來年見索安知復有此物不如勿獻其父然之因㑹鄰里將共食即席割之丨赤丨丨實中割者大驚投刀於地俄而赤虵走於母榻之下尋之了無所見未㡬其母遂孕知誥吴越備史張公梨丨丨大谷之丨注洛陽北郊賦張公夏梨海内惟一株潘岳哀家梨栢南郡毎見人不快輒嗔曰君得丨丨丨當復不蒸食否舊語秣陵有丨仲丨丨甚美大如升入口即消釋言愚人不别味得好梨蒸食之也世說賞以轉枝房次律弟子金圗十二嵗時次律問葛洪仙籙中事以水玉數珠手節之凡兩編三百事次律丨丨丨丨梨童子通种集目為飣坐崔逺文才清麗風神峻整當時丨丨丨丨梨言席上之珍唐書非離別刀李建勲罷相江日南出鎮豫章一遊西山田間茅舍老叟教授村童公觴于其廬連食數梨賔僚有曰梨號五臓刀斧不宜多食叟笑曰鶡冠子云五臟刀斧乃離别之離丨梨也葢丨丨戕伐胷懐有若丨斧遂就架取小冊振拂以呈丞相鶡冠子東軒是飛騰藥王夫人謂許長史曰交梨火棗丨丨丨之丨要使生於胷中令君胷中荆棘掃除未盡是以梨棗不生也燒梨賜泌唐肅宗嘗夜坐召頴王等三弟同坐地爐時李泌方絶粒上自丨二丨以賜之穎王等曰臣等請聨句以為他年故事頴王曰先生年㡬許顔色似童兒信王曰夜抱九仙骨朝披一品衣一王曰不食千種粟惟餐兩顆梨上曰天生此閒氣助我化無為鄴侯傳查何如梨張敷小名查父郡小名梨帝常戲謂之曰查丨丨丨荅曰梨萬果之宗查何敢比宋書譬猶橘丨丨柦梨丨柚其味相反而皆可於口莊子李遵表紫花開處擅美春林綠蔕垂時囘先秋浦離離玉潤落落珠圜宋武賛沃瘠異壤舒慘殊時惟氣在春具物含滋嘉木之生于彼之基開榮布彩不離塵淄齊謝朓啓味出靈闗之陰㫖潤玉律之澨豈徒真定歸美大谷滋慙將恐帝臺妙棠安期靈棗不得孤擅玉盤獨甘仙席雖秦君得器漢后推食望古可儔於今誰荅庾肩吾啓睢陽東苑子圍三尺新豐箭谷枝垂六斤未有生因枌水産自桐丘影連鄧橘林交苑柿來薦中㕑爰頒下室事同靈棗有願還年恐似仙桃無因留核詩集紫含津丨實已丨丨梁宣帝紅得霜丨梨逈丨丨杜結小紅山梨丨丨丨且綴碧柦梨丨丨丨不外求張梨丨丨丨呼兒具丨丨丨梨栗濁酒亦在眼並前人蠲煩疾遺之析朝酲亦以丨丨丨韓忠獻落吾手常期摘秋實穰穰丨丨丨曽南豊泉垂口初嘗蜜經齒酒嚼丨丨丨前人蜜過喉老嫌氷熨齒渴愛丨丨丨梅聖俞玉有漿元圃雲膄滋絳質上林風御獵清香尋芳尚意瓊為樹蠲渴應知丨丨丨丁晉公瓊為汁掛冠大谷肯干時飣坐風流特地竒骨裏馨香衣不隔胷中氷雪齒先知賣漿碎搗丨丨丨解甲方憐玉作肌老子醉來渾謝客見渠倒屣只嫌疑楊誠齋嘉名美實丨丨舊出新豐谷丨丨今鄰御宿園晏元獻清香竒品逺意來嘉惠秋筠啓翠籃丨丨殊未㪚丨丨互相參鳯卵辭丹穴蘢珠出古潭剖輕刀七快嚼易齒牙甘程金紫丹顋曉露尚想飛花映綺疏離離秋實㸃塵蕪丨丨丨丨香猶薄玉齒寒氷嚼欲無舊有佳名傳大谷誰分靈種下仙都柘漿不用傳金椀猶得相如病少甦劉屏山翠羽清泉想像含消與接枝英華集裏脆香詩外披丨丨中懷玉嚼出丨丨上滿池溢齒應餐多正好堆盤儘飣老將宜炎蒸時節還能洗不是梨侯更有誰楊東山橄㰖格物總論橄㰖大如棗兩頭尖青色八九月熟生噉味酢甘香口勝雞舌核有稜内三竅有仁及煮食之悉解酒毒置茶中尤佳有野生者子繁樹峻不可梯但刻其根下方寸許内鹽於其中一夕子皆落事類閩中尤重橄㰖樹身聳枝髙皆數丈其子深秋方熟丨丨丨丨其味嶺表異錄廣人不食廣州有烏㰖色黒澁酢丨丨丨丨廣州記左思吳都賦龍眼橄㰖詩集苦且澁江南多果實橄㰖最珍竒北人將就酒食之先顰眉皮肉丨丨丨瀝口復弃遺良久有囘味始覺甘如飴我食何所喻喻彼忠臣辭直道逆君耳斥退投天涯世亂思其言噬臍焉能追寄語採詩官毋輕橄㰖詩王元之久方和五行居四時惟火盛南訛炎焦凌木氣橄㰖得之多酸苦不相入初爭丨丨丨霜苞入中州萬里來江波幸登君子席得與衆果羅中州衆果佳珠圓玉光瑳媿兹㣲陋質以逺不同訶云云歐陽公翠顆森􅔽蓞南珍富竒異疇昔頗窮覧夷荒不書傳從古隨鈆槧苞封走中土天序異離坎有香已變衰有色多黯黯令君此堂上真物惟橄㰖青膚鏤瓊瑩丨丨丨丨丨苦為幽人止久見君子淡甘懷彼包羞日新此剛敢清泉薦芳茗臭味獨潛感澡雪漬煩醒滌除瑩𤣥覧靈均採時菊西伯嗜昌歜廟鼎實調梅壯士仍甞膽由來超俗好諸絶不言慘股勒謝凡品薤白空三􅠏劉貢父青子落紅鹽紛紛丨丨丨丨丨正味森森苦且嚴待得㣲甘囘齒頰已輸崖蜜十分甜東坡至美或莫售江魚肆潛毒頃刻輒僵仆宿酒發狂酲千日尚沉瞀性命如危弦一絶不可救幸然服刀圭咄叱及其舊吾昔評橄㰖不在百果後俗人多不識丨丨丨丨丨劉原父真味晩方囘方懷味諫軒中果忽見金盤橄㰖來想共餘甘有𤓰葛苦中丨丨丨丨丨山谷竟嘗甘莫敵南國青青果渉冬如始摘雖咀澁難任丨丨丨丨丨梅聖俞餘甘子格物總論餘甘子如彈丸大視之理如陶𤓰片色㣲黄初入口苦久乃更甜鹽而蒸之尤美可食本草云菴摩勒即此事類落迦果菴摩丨丨丨佛書味諫軒戎州蔡次律家軒外有餘甘余名之曰丨丨丨山谷集瀘水南岸丨丨丨丨有餘甘子樹色㣲黄味酸苦核五稜雲南記左思呉都賦其果則丹橘餘甘荔枝之林詩集澁吻炎方橄㰖佳餘甘豈苖裔風姿雖少殊氣韻乃酷似醉顔丨丨餘髣髴清香至侯門收寸長粉骨成珍劑猶聞雜蜜草少轉森嚴味竒材用不専雖用何殊弃端如效苦言逆耳多嫌忌弃果事何傷違言德之累悦口易逢知感兹長發喟劉屏山苦口此老纔堪上諫坡南州留滯意如何還將丨丨劘英主醫國懸知藥籠多張于湖樂府西土果菴摩勒丨丨丨霜後明珠顆顆憑玉兔搗香塵稱為席上珍號餘甘爭奈苦臨上馬時分付管囘味却思量忠言君試嘗更漏子黄山谷胡桃附崧子格物總論胡桃生北土今陜洛間多有之大株厚葉多陰實青皮有房瓤白味甘殻薄者為佳食之令人肥健秋冬熟時採之又一種皮厚而堅底斧搥之方破此山胡桃也崧子二種海崧子生新羅如小栗三角其中仁香美東夷食之當果雲南崧子巴豆相似其味不及也事類張騫得種此果本出羌胡漢丨丨使西域還始丨其丨植之秦中後漸生東土故曰陳弇胡桃薄皮多肌隂平胡桃大而皮脆急投則碎本草沈約謝賜梁丨丨有丨丨樂遊園胡桃啓本集詩集何曽喫皺殻傾來紫麥新中藏瓊采不勝珍胡桃松實丨丨丨却嚼秋風栢子仁楊誠齋須臾空三韓萬里半天松方丈蓬萊東復東珠玉鏁成千嵗實氷霜吹落九秋風酒邊腷膊牙車響座上丨丨漆櫑丨新果新嘗正新暑繡衣使者念山翁前人榧子格物總論榧子樹生實有皮殻肉黄白味甘無毒主五痔去三蟲産信州玉山縣以懐玉得名熟之時毎一樹可下數十斛詩集樹移皆活榧丨丨丨丨風霜不變青冡壇雖閴寂田客毎丁寧梅聖俞贈毋輕擲彼美玉山果餐為金盤實瘴霧脱蠻溪清樽奉佳客客行何以贈一語當加璧祝君如此果德膏以自澤驅攘三彭仇己我心腹疾願君如此木凛凛傲霜雪斵為君倚几淨滑不容削物㣲興不淺此丨丨丨丨坡玉山妙唱老坡文中哮闞聲凛凛常如對英峙琅然諷誦興凌雲瞠若追攀顙流泚丨丨丨丨人寂寥可與言詩有六子裁牋逺餉風露薪坐我千尺黄山底初按𤣥縠出氷霜小嚼清香泛窓几已輕魏帝昵蒲桃肯許唐賢魁綠李極知人口無正味苦淡甘酸各矜美不經真識為品題此物初焉幾不齒青青有用拔蒿萊邂逅無酬腐糠粃士懷瓌瑞勿自神邂逅飛沈同一理子才超然㑹􅁮然外澤中貞期是似味果固已驅煩邪味道更須淪骨髓劉屏山石乳蔭根平林常常談俚蠻玉山之産升金盤其中一樹斷崖立丨丨丨丨多嵗寒楊東山銀杏格物總論銀杏樹高大葉薄有刻缺實如枇杷大毎一枝動是百十顆八九月熟採之去其皮與肉取核為果瓤黄白色去膜食之生噉㣲苦煑炒煨為妙一名鴨脚因葉相似也故云事類南方移植京師無鴨脚樹駙馬王和父自丨丨丨丨于其第歐公詩注詩集誠可珍鵝毛贈千里所重以其人鴨脚雖百箇得之丨丨丨予問得之誰詩老逺具貧霜野橘林實京師寄時新封包雖甚㣲採掇皆躬親物貴以人貴人賢弃而淪開緘重嗟惜詩以報慇懃歐公謝梅聖俞常充貢宣城此物丨丨丨晁旡咎其名因葉高北人見鴨脚南人見胡桃識内不識外疑若橡栗韜鴨脚類綠李丨丨丨丨丨吾鄉宣城郡多以此為勞種樹三十年結子防山猱剝核手無膚持置宫省曹今喜生都下薦酒壓蒲萄初聞帝苑誇又復主第褒纍纍誰採掇玉盌上金鼇金鼇文章字分贈我已叨豈無異鄉感感此㣲物遭一世走塵上鬢顛得霜毛梅聖俞歐公贈我比珠投鴨脚生江南名實未相浮綘囊因入貢銀杏貴中州致逺有餘力好竒自賢侯因令江上根結實夷門秋始摘纔三四金奩獻凝旒公卿不及識天子百金詶嵗久子漸多纍纍枝上稠主人名好容丨丨丨丨丨博望昔所徙蒲萄安石榴想其初來時厥價與此侔今也徧中國籬根及牆頭物性久雖在人情逐時流惟當記其始後世知來由是亦史官法豈徒續君謳歐陽和梅聖俞葉如欄邊跡魏帝昧逺圖於吾求鴨脚乃為吳人料重翫志已愜江南有佳木修聳入天插丨丨丨丨丨子剝杏中甲持之奉漢宫百果不相壓劉原父殻破玻璃明鴨脚半熟色猶青紗囊馳寄江陵城城中朱門慙林宅清風六月吹簾旌玉纎雪椀白相照爛銀丨丨丨丨丨張旡盡小苦㣲甘韻最高深灰殘火界相遭丨丨丨丨丨丨丨未必雞頭如鴨脚不妨銀杏伴金桃楊誠齋古今合璧事類備要別集卷四十五
