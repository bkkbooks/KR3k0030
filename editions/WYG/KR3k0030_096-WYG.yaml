服丨丨丨丨丁未錄又見張文潜集知卿直諒胡銓諡忠簡入對乞修徳結民心練兵觀虜釁上曰久丨丨丨丨拜吏部尚左郎官周平園集知卿學問陳𫝊良奏事入修門鬚鬢如雪丞相留公正一見嘆曰幾年陳君舉尚可使外補耶奏留為吏部貟外郎初對上曰卿去國㡬何時朕欲見卿久矣丨丨抱負丨丨深醇有所著書進來時上臨朝淵黙罕有聖語公敬謝而退以周禮説進擢秘書少監樓攻媿集上常目送曽肇諡文昭官制行除吏部郎中毎便殿引選人丨丨丨丨之出殿狀門乃已楊龜山撰行上聞矍顧張栻南軒召為吏部貟外郎廟堂用史正志為發運使奪州縣財賦逺近騷然栻為上言之上曰正志以為非取之民對曰今州郡財賦大底無餘不過巧為之名以取之於民耳丨丨之丨然丨栻曰論此事者多矣未有能及此者如卿之言是朕假手於發運使以病吾民也閱實如栻言即詔罷之楊誠齊集員外郎南曹吏部貟外郎掌選院謂之丨丨注曰其曹在銓曹之南故謂之丨丨唐六典小選吏部貟外郎二人掌文選以三銓之法官天下之材其投試銓注與流内畧同謂之丨丨唐百官志吏部省眼唐吏部郎中二㕔先小銓次格式貟外郎二㕔先南曹次廢置舊說丨丨為丨丨分紀南宫眉目韋陟字商衡為吏部貟外郎是曹在丨丨為丨丨在選士為司命公執直筆墨簿書紛挐盤錯一瞬而剖劉禹錫撰神道碑文簿最詳緻韓滉遷吏部貟外郎性强直明吏事在南曹五年丨丨丨丨識記精覈裴遵度遷吏部貟外郎専判南曹天寳中海内無事九流輻湊㑹府毎嵗吏部選人盈萬遵度敏丨强丨丨丨文贍詳而不滯時稱吏事第一由是知名鈐制官吏唐皇甫鏄為吏部貟外郎判南曹凡三年頗能丨丨丨丨改吏部郎中旌别能否唐牛徽遷吏部貟外郎乾符中選曹猥濫吏為奸弊每嵗選人四十餘人徽性貞剛時為起請由是銓叙稱正能否旌别物議稱之孤寒不滯崔郾為吏部貟外郎奸吏不敢欺孤寒無援者未嘗留滯銓叙之美為時所稱判析有條唐李栖筠遷吏部貟外郎判尚書栖筠丨丨丨丨吏氣奪號神明復清選部劉崇望字希徒轉吏部貟外郎崔安潜為吏部尚書崇望判南曹滌除宿弊丨丨丨丨並唐書以分劇曹才盛居東之任禮處司南之重髙選髦士丨丨丨丨常集鄭叔則吏部貟外郎制不附時宰李殿撰浩字德逺公之為郎也時為吏部貟外郎宰相召同為郎者四人欲有所進用最属意於公公不發一語明日同舎皆遷公如故言行録思制吏姦紹興三十年以劉珙為吏部貟外郎珙在銓曹時苦吏為奸思有以制之一日命張幕設案置令式其中使選集者得出入繙閲與吏辨吏無得藏其巧人甚便之長編詩集諧金石吏部信才傑文降振竒響調與金石諧思逐風雲上梁沈約悼齊謝眺捧紫泥今日君先丨丨丨裴度桞公綽與度俱為判官公綽先入為吏部郎中度有詩餞别云提英鍳吏部丨丨丨片善蒙采録黄山谷司封郎中歴代沿革舊主爵郎職貟令北齊置主爵郎中一人隋曰主爵郎中龍朔二年改為司封大夫咸亨元年復故光宅元年改為司封郎中神龍元年復故開元二十四年復為司封掌邦之封爵凡有九等六典本朝司封判司事一人以無職事朝官充凡封爵之制一出於中書本司但掌定諡先期戒本部赴集而已元豐官制行郎中貟外郎始實行本司事初除王祖道為司封郎中參掌官封叙贈之事凡宗室賜官授官親王内外命婦以下封爵諸親保任其宗属陞朝官褒贈其妻皆例焉列爵有九自王至男分國有三大中小國内外命婦之品五自貴妃至貴人外命婦之號九自大長公主至縣君叙贈之制三三代二代一代皆辨其位序以進之加食邑實封則視其髙下之品以為户数多寡之節凡事之可否與司勲通决於尚書侍郎續㑹要事類執秩晉文公作丨丨以正其官注丨丨主爵之官左傳典封後漢馮勤為郎中給事尚書使與諸侯封事本𫝊心正唐桞公權為司封貟外郎入奏帝曰見卿筆蹟久矣因問用筆法權曰丨丨則筆正乃可法矣同上聲聞楊凝為司封貟外郎直丨彰丨栁文楊懋公墓碣三列宿正觀中韋孝武為主爵郎中與兄弟同省時號丨丨丨丨唐史九等爵司封郎中掌封命朝㑹賜子之級爵凡丨丨唐官志掌封命見上注掌叙贈國朝司封郎中參丨官封丨丨之事凡宗室賜名授官親王内外命婦以下封爵諸親保佐其宗属陞朝官褒贈其祖考妻皆𨽻焉神宗正史職官志主以郎吏封爵之恩施於内外國之典也丨丨丨丨寵秩甚優南豐除王祖道制宜寵曹秩丨丨左丨之丨用優主爵之名胡文恭制司勲郎中附員外郎歴代沿革周官有司勲上士二人凡有功者司勲詔之後周夏官有司勲一人掌功勲之賞隋文帝立司勲侍郎二人煬帝改為司勲郎武德初為司勲郎中龍朔元年改為司勲大夫咸亨二年復故掌邦國宫人之勲級凡勲十有二等十二轉自上柱國至武騎尉凡十二凡有功之人合授勲官者皆委之覆定然後奏擬六典本朝司書本司無所掌元豐官制行郎中貟外郎始實行本司事初除穆洵為參賞勲賞事凡勲十有二級自上柱國至武騎尉自從七品推而上之至正三品三歳一遷必因其除授以加之凡賞格格皆設於此以逆其至焉若事應賞從其所𨽻之司考實以報則審核其狀以格覆之非格所載則參擬輕重以上尚書省用前代帝系及勲臣之後則考騐奉行其制命隆興詔省併司勲郎中以司封郎中兼領事類主賞周司勲上士二人注此官丨封丨周禮夏官職名等功司勲掌六卿賞地之法以丨其丨王功曰勲國功曰功民功曰庸事功曰勞治功曰力戰功曰多凡賞無常輕重眡功周禮掌勲績丨校定丨丨論功行賞職員令掌勲級丨官吏丨丨唐百官志詞人稱首張九齡遷司勲貟外郎張說謂人曰後來丨丨丨丨本𫝊功􅃺盈几張循憲薦張嘉正奏對偘偘武后悅擢循憲司勲郎中酬其得人時丨丨丨丨郎吏不决嘉正為詳處廷無留牒張嘉正𫝊藏於勲府唐史百官志擢居左闥選貟外郎丨丨丨丨白集獨孤郁自考功遷司勲郎中制論安石配饗趙忠簡公鼎字元鎮公為司勲郎官乃言自王安石用事肆為紛更祖宗之法掃地而生民始病蔡京托名紹述盡祖安石之政以致大患今安石猶配饗廟廷而京黨未族何以收人心而召和氣哉言行録遠秦檜擅事陳文正公康伯字長卿自公為郎時為司勲郎秦檜方擅事公雅有素乃澹然其中檜雖稱公静重常越用他人公不以為意在省五年始為軍噐監同上考功郎中附員外郎歴代沿革漢元帝時京房功課吏之法然其職不在尚書至光武改尚書三公曹主歳書考課課諸州郡通典魏有考功郎中宋齊並置功論郎中文帝置考功侍郎煬帝改考功郎唐武德初復為考功郎中龍朔改為司績大夫咸亨初復故掌内外文武官吏之考課六典及功臣家傳碑頌誄諡等事通典考課之法有四善二十七最六典武德舊令考功郎中監試貢舉人正觀以來乃以考功貟外郎專掌貢舉省郎之殊美者至開元移貢舉於禮部而考功員外郎分判而已通典本朝考功判司事一人以帶職朝官或無職事朝官充凡考課之法分𨽻他司或以他司専領本司但掌覆太常擬諡及幕府州縣官流外較考之事元豐官制行郎中貟外郎始實行本司事續㑹要初除蔡峋蔡京職畧掌文武遷叙磨勘資任考課之政令凡命官隨所𨽻選以其職事具注於歴給之於其属州若司嵗書其功過應升遷選授者據歴按法而叙進之者負殿則正其罪罰以七事考監司以六善三書考守令凡改服色者以年勞計之應諡者覆太常所定行狀報尚書省官集議以聞凡立碑碣名額之事掌之舊置考課院其定殿最皆有考辟元豐悉罷分案十有七五品案六品案七品案八品案九品案職官案參軍案令丞案主簿案縣尉案使副案供奉官案資任案校定案法案知雜案元祐三年詔知州課法吏部上其事于尚書省送中書省取㫖縣令以下本部專行四朝志事類定課考功丨丨晉百官志司績唐龍朔改為丨丨大夫咸亨復舊職源鶴㕔唐考功貟外郎㕔事有薛稷畵鶴宋之問為賛西京雜記南曹裘諝遷考功郎中代宗幸陜諝徒歩挾考功丨丨印赴行在上曰疾風知勁草本𫝊敏識鄭澣為考功員外郎刺史有駈廹人吏上言政績請刋石紀者幹探得其情條以下原缺一頁主羣吏之課丨丨丨丨丨而議其誅賞郎於天䑓任属先重南豐除蔡京制計羣吏之治丨丨丨丨丨而明黜陟之法䑓郎典引列於左曹又除吕和卿制詩集稱意新丨丨丨官又少年秋清功健好凉天白樂天送霍考專心望唐王尚客為侍御史自以才望清華妙當入省常望前行怱降膳部員外郎㣲有惋悵張恭忠詠曰有意嫌兵部丨丨丨考功誰知脚朘膯却落省墻東詩話古今合璧事類備要後集卷二十七
