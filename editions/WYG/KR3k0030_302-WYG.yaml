body:
  text: 古今合璧事類備要外集卷二宋謝維新撰典禮門元㑹附冬至日五月一日禮經考索元㑹正月一日朝賀禮也其來古矣厯代不廢國朝東都全盛固嘗行之中興後僅一行而止視舊儀損三之一云冬至日與五月一日朝㑹亦不可不攷事類輯瑞舜正月上日受終于文祖云云丨五丨注斂公侯伯子男之瑞詢岳月正元日舜格于文祖丨于四丨闢四門明四目達四聦咨十有二牧覲羣牧舜既月乃日丨四岳丨丨班瑞于羣后注蓋以正月中乃日日見四岳及九州牧監還五瑞於諸侯與之正始率百官禹正月朔旦受命于神宗丨丨丨若帝之初奉嗣王太甲惟三祀十有二月朔伊尹以冕服丨丨丨歸于亳注湯以元年十一月崩至此二十六月三年服闋踰月即吉服並書十月朝叔孫通與弟子徵魯諸生共起朝儀習之月餘會丨丨諸侯丨百官各以次陳列臚句傳皇帝輦出房闥帝曰吾乃今知皇帝之尊也注高帝初用秦建亥為歳首故於十月為元三朝㑹後漢春丨丨丨同漢京是月也天子受四海之圖籍膺萬國之貢珍班西都賦日蝕在一漢建安中將正㑹而太史上言正旦或當丨丨朝士疑㑹否共諮尚書令荀時廣平計吏劉邵在坐曰梓慎禆竈古之良史猶占水火錯失天時諸侯旅見天子入門不得終禮者四丨丨丨丨然則聖人垂制不為變異豫廢朝禮者或灾消異伏或推術謬誤也或善而從之遂朝㑹日亦不蝕邵由此顯名天眚將至晉康帝建元元年太史上元日合朔後復疑應却㑹與否庾永輔政冩劉邵議以示八坐於是蔡謨著議非之曰云云間丨丨丨丨行慶樂之禮於禮乖矣云云庾氷從衆議遂以却㑹並日禮志珪璧入拜梁元㑹之禮未明庭燎設文物充庭臺門闢禁衛皆嚴大階東置白獸樽羣臣及諸蕃客並集各從其班而拜侍中奏中嚴王公卿尹各執丨丨丨丨侍中乃奏外辦皇帝服衮冕乗輿以出皇帝服通天冠升御座王公上壽禮畢而書騶騎引計吏郡國各一人皆跪受詔侍中讀五條詔計吏每應諾訖今陳便冝者聽詣白獸樽以次還坐宴樂罷詔書宣示後齊正日侍中宣詔慰勞州郡國使詔牘雌黄塗飾上冩丨丨三計會日侍中依儀勞郡國計吏問刺史太守安不及穀價苗麥善惡人間疾苦又班五條詔書於州郡國使人冩以詔牘亦以雌黄塗飾上冩詔書正㑹日依儀丨丨勞諸上計正會日侍巾黄門宣詔丨丨郡丨丨勞訖付紙遣陳土冝字有脱誤者呼起席後立書跡濫劣者飲墨水一升文理孟浪無可取者奪容刀及席既而本曹郎中考其文跡才辭可取者録牒吏部簡同流外三品叙並隋書受羣臣賀皇帝元正丨丨丨朝丨而㑹前一日尚舍設御幄于太極殿有司設羣臣客使等次於東西朝堂展縣置按陳車輿又設觧劒席於縣西北横街之南其日將士填諸街勒所部列黄麾大仗及陳於殿庭羣官就位侍中版奏請申嚴諸將衞之官諸閣奉迎元置者入就位侍中版奏外辦皇帝服衮冕冬至則服通天冠絳紗袍御輿出自西方即御座南向符寳置于前公主以下及諸客使等就位典儀曰再拜贊者承傳在位皆再拜上公一人詣西階脫舄跪觧劒置于席升當御座前北靣跪賀稱某官臣某言元正首祚景福維新伏惟開元神武皇帝與天同休乃降階詣席跪佩劎俛伏興納履復位在位者皆再拜宣制曰履新之慶與公等同之初羣官將朝中書侍郎以諸州鎮表别為一案俟於右延明門外給事中以祥瑞案俟於左延明門外户部以諸州貢物陳於太極門東禮部以諸蕃貢物可執者蕃客執入就位其餘陳於明堂前上公已賀中書令奏諸六表黄門侍郎又進跪奏神瑞於案侍郎與給事中引案退户部尚書進詣階前跪進稱户部尚書臣某言諸州貢物請付所司承制退稱制曰可禮部尚書以次進詣階跪奏稱禮部尚書某言諸蕃貢物請付所司承制退稱制曰可大府帥其属受諸州及諸蕃貢物出歸仁納義門執物者随之典儀曰再拜通事舍人以次引北面位者出侍中前跪奏稱侍中臣某言禮畢皇帝降坐御輿入自東房侍臣從至閣引東西面位者以次出蕃客先出於至不奏祥瑞無諸方表唐禮樂志百官上壽大朝會紹興十二年十月詔來嵗舉行之王望之為禮部侍郎言排辦不及靖竢來年冬至既而不果十五年正月朔旦乃克行用黄麾仗三千三百五十人視東都舊儀損三之一時無大慶殿遂權於崇政殿行之以殿狹輦出房不鳴鞭它如故事是日設宫采樂百官朝服上壽如儀自是一行而止雜記五月一日歐陽公帖修啟信宿為况清佳前日貪奉笑言有一事數日欲咨問偶忘之唐時有五月一日會朝之禮略記其始本出於道家是日君臣集㑹其儀甚盛而其説不經不知起自何帝亦記得是開元禮後方有畧與批示其時為幸修再拜細中間嘗罷後又復行復行恐是憲宗朝亦不記仔冬至日朱文公語録見衣服門凉衫類注詩集淑景輝雕輦丨丨丨丨丨髙旌揚翠煙魏證奉和正日臨朝詩近臣有虛位天星牢落雞喔咿僕夫起餐車載脂正當窮冬寒未已借問君子行何之會朝元王元不至受命上宰須及期侍從丨丨丨丨丨公今此去歸何時韓愈天星送揚疑郎中賀正入閣禮經考索閣殿側小門也皇帝不御前殿而坐便殿於是乎始有入閣之儀其議盖用隻日常朝喚正衙黄麾仗自東西閣門而入凡百官候朝於正衙者皆随之而入也前古所未聞實自唐人始焉但衙正朝也其禮尊閣宴見也其禮殺或者不辨而以入閣儀注為朝廷非常之禮則失唐人之本意矣事類入閣議唐太宗丨丨丨品以上諫注天子御便殿百官入見曰入閣通鑑入閤門髙宗永徽元年正月上召朝集使謂曰朕初即位事有不便於百姓者悉宜陳不盡者更封奏自是日引刺史十人丨丨丨以百姓疾苦及其政治有洛陽人李𢎞秦誣告長孫无忌謀反上立命斬之同上朔朢入唐僖宗自乾符後國亂禮闕天子不能日見羣臣而見朔朢故正衙常日廢仗而丨丨丨閤有仗其後習見遂以入閣為重至出御前殿猶謂之入閤其後亦廢至五代唐明宗而復五日入五代唐明宗初即位乃詔羣臣丨丨一隨宰相丨見於内殿謂之起居李琪言非唐故事請罷五日起居而復朔朢入多御崇元本朝景祐元年李淑言唐寳厯之後嘗以月朔御紫宸殿行入閣儀後雖五代俶擾猶或不廢弛及本朝太祖五行其禮丨丨丨丨殿備殿中金吾諸仗設待制侯對官崇元殿即今之大安殿也乾德之後改御大明殿即今之集英殿也太宗三行其禮别定新儀就文徳殿庭增設黄麾仗真宗亦三行之繪圖儀講習藏之禁閣兹禮之廢向踰三紀願因盛時修起之詔行文德太宗淳化二年上以入閤舊圖禮容不備命楊徽之等詳定儀注十二月丙寅丨丨其禮於丨丨殿張洎上疏曰今之文德殿即唐之宣政殿也在唐為正衙凡朔朢起居及冊拜妃后皇子王公大臣對四夷君長試制策舉人之殿今之崇德殿即唐之紫宸殿也在唐為上閣乃隻日常朝之殿前代謂之入閣儀注者盖隻日御紫宸上閤之時先扵宣政殿前立黄麾金吾仗契勘畢喚仗節自東西閣門入故謂之入閤今輿論以入閣儀注為朝廷非常之禮甚无謂也仍請準舊儀侍從先入起居畢分行立於丹墀下謂之蛾眉班然後宰相率正班入起居合於禮行入閤儀太宗淳化三年夏五月朔丨丨丨丨舊例入閤惟殿中省細仗隨兩省供奉官先入陳於庭上以為儀衞大簡命有司更設黄麾仗其殿中省細仗仍舊從新例也罷入閤儀神宗熙寧三年丨丨丨丨王珪等言入閤者乃唐隻日紫宸殿受常朝之儀也唐紫宸殿中省細仗唐宣政殿即今文德殿唐制天子坐朝必立仗於正衙若止御紫宸即喚正衙仗自宣政殿東西閤門入故謂之入閤五代以來廢正衙立仗之制今閤門所載入閤儀者止是唐常朝之儀非為盛禮不可遵行故罷之又初沿唐政事百官日赴文德殿宰臣押班謂之常朝休假三日以上内殿起居官畢集謂之梅行宰臣以下應見謝辭者皆先赴文德殿謂之過正衙元豐四年冬侍御史知雜蒲中行言今垂拱田殿宰臣已下既已日參而文御常朝仍復不廢極為舛謬甚至横行參假與夫見謝辭官先過正衙雖沿唐故事然必俟天子御殿之日行之可也有司失於申請欲乞罷去詔從之入閤本意仁宗寳元二年上嘗論及唐人入閤儀宋庠言入閤乃有唐隻日於紫宸殿常受朝之儀也今欲求丨丨丨丨即湏先立仗於文德殿之庭如天子止御紫宸殿即喚仗自東西閤門入如此則差與舊儀合唐自中葉以還雙日及非時大臣奏事别開延英殿若今假日御崇政延和殿是也入閤遺制劉原父駮五代李琪凡五日一入見中興殿便殿也此丨丨之丨丨而反謂之起居朔朢一出御文明殿前殿也反謂之入閤琪皆不能正也歐陽公帖入閤之禮起自何年開延英亦起何年五日一起居遂廢正衙不坐起何年三者孤陋所不詳乞示其本末修啓辱示甚煩尊用然得以開釋未悟其幸尤多感刻感刻問此一事也為明宗置内殿起居又復入閤當時縁昭宗朝誤繆不合故事也朔望宣政一事尤失紫宸入閤本制也今乃入閤却御前殿延英之對與入閣合儀起居而廢正衙含元大殿宣政常朝延英便殿前殿入閤脩於史已不熟於制度又不熟乞不合詳之詩集爐煙起寒生千門裏日照雙闕間禁旅下成列丨丨丨中天輝輝覩明聖濟濟行後賢韋應物香風轉户外昭容紫袖垂雙瞻御座引朝儀丨飄合殿春丨丨花覆千官淑景移晝漏稀聞髙閣報天顔有喜近臣知宫中每出歸東省會送䕫龍集鳯池杜紫宸殿退朝口號燕饗禮經考索燕饗君臣俱冇之禮也然饗以訓恭儉宴以示慈惠饗有醴薦設几而不倚爵盈而不飲殽乾而不食此其所以訓恭儉宴則不然有折組焉得以相與而共食非所以示慈惠而然乎古者慈惠以布政而恭儉以行禮禮又所以成其政也然又不能無隆殺之辨上公三饗三燕侯伯三饗再燕子男一饗一燕上下如是亦豈混然無等哉設或有故不親饗燕之禮則各以其弊致之亦所以見將意以致敬者不可廢也然燕饗之大槩不可以不之知也唐虞夏商逺矣無所考證周人郁郁乎文其禮偹載於周官之書者可覆也及周之衰此禮浸失秦漢而降間亦行焉然非復古人之舊矣國朝遇臣有禮待下有敬無秦漢衰世之失有成周盛時之得相與繼於千百餘年之乆者盖有足觀歟事類燕衎君子有酒嘉賓式丨以丨燕笑丨丨語兮是以有譽處兮詩昭德夫享所以丨丨也左有容享禮丨丨色語鍾鼓丨丨既設一朝饗之詩腶脩諸侯為賓大饗尚丨丨而已矣記饗禮食丨之丨非以致味也宴毛丨丨所以序齒也並書鈞臺夏啟有丨丨之享瑶池周穆王舉觴為丨丨之宴於西王母世說燕羣臣鹿鳴丨丨丨嘉賓也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賔得盡其心矣呦呦鹿鳴食野之苹我有嘉賔鼔瑟吹笙吹笙鼔簧承筐是將人之好我示我周行燕諸侯湛露天子丨丨丨也湛湛露斯匪陽不晞厭厭夜飲不醉無歸燕朋友伐木丨丨丨故舊也自天子至于庶人未有不須友以成者親親以睦友賢不弃不遺故舊則民德歸厚矣燕兄弟棠棣丨丨丨也閡管蔡之道故作棠棣焉云昙並詩享命宥一虢公晉侯朝王王丨醴丨丨丨皆賜玉五㲄馬三匹非禮也享備物王使周公閱來聘丨有丨丨白黒形鹽辭曰國君文足昭也武足畏也則有偹物之享以象其徳薦五味羞嘉穀鹽虎形以獻其功吾何以堪之享九獻楚子入丨于鄭丨丨庭實旅百加籩豆六品注食器六品加於籩豆享三獻季孫宿如晉晉侯享之有加籩武子曰得貺不過丨丨今豆有加下臣不堪无乃戾也固請徹加然後卒事晉人以為知禮晉士㑹周定王享丨丨丨厚襄公相禮殽烝武子私問其故王