大寢公卿大夫皆御命曰勞酒記月令千耦載芟載祚丨丨其耘詩千畝昔者天子為籍丨丨冕而未絃躬秉耒諸侯為藉百畝冕而青絃躬秉耒以事天地山川社稷先古以為醴酪粢盛於是乎取之敬之至也記祭義率屬甸師掌丨其丨而耕耨王日以時入以供粢盛僼除壇司空丨丨于籍農大夫戒農用國語下車武王克殷及商丨丨耕籍然後諸侯知所以敬記樂記祈社周公成王時耕籍以勸民丨丨而求榖實故其時之民樂治田業詩載芟䟽不耕宣王丨丨千畝虢文公諫曰國之大事在農上帝粢盛於是乎出是以稷為大官也國語詔耕漢文帝丨朕親丨籍田以為農先史本紀乙田漢儀縣邑常以乙日祠老農乃耕於丨丨晉禮志弄田昭帝上耕鉤盾丨丨在未央宫中本紀執耜後明帝詔朕親耕籍田以祈農事注五經要義曰天子籍田以供上帝之粢盛所以先百姓而致孝敬也籍蹈言親自蹈履于田而耕之續漢志云正月始耕既事告祠先農漢舊儀曰先農即神農皇帝也祠以太牢百官皆從皇親丨耒丨而耕天子三推三公五孤卿大夫十二士庶人終畝乃致籍田倉致今丞以給祭天地宗廟以為粢盛本紀載耒順帝即位不行藉田黄瓊上疏曰昔宣帝不籍千畝卒有羌戎之患終損中興之名臣聞先王制田有日司徒咸戒司空除壇先時五日有叶風之應王即齋宫飡禮丨丨誠重之也先農之禮所宜自勉以迎和氣以致時風後黄瓊傳修制晉武帝詔近世耕籍有慕古之名无供祀勸農之實今丨千畝之丨當與羣公卿士躬稼穡之艱難帥先天下本紀議禮唐初為帝社亦曰籍田壇正觀二年太宗將親耕孔穎達丨丨天子籍田南郊諸侯東郊晉武帝猶東南令帝杜乃東壇未合於古太宗白書稱平秩東作而青輅黛耜順春氣也吾方位少陽田宜於東郊乃耕于東郊唐禮樂志草儀憲宗元和五年詔以來年正月籍田韋公肅丨具其丨吉亥皇帝孟春丨丨享先農遂以耕籍前享一日奉禮設御亦於壇東西向望座位於壇西南北向從官位於内壝東門之内道南執事者居後奉禮位於樂縣東北贊者在南又設御耕籍位於外壝南門之外十步西南向從耕三公諸王尚書郷位於御座東南重行西向北上介公酅公於御位西南向北上尚舍設御采席於三公之北少西南向奉禮又設司農卿之位於南少退諸執耒耜者位扵公卿耕者之後非耕者之前西向乃以耕根車載耒耜於御者聞皇帝乗車自行車降大次乗黄令以耒耜授廩犧全横執之謁者引三公及從耕侍耕者司農卿與執耒耜者皆就位皇帝出就耕位南向立廩犧令進耒席西北向解韜出采執以具少退北西立司農卿進受之以授侍中奉以進皇帝受之耕五推侍中前受耒耜反之司農卿卿反之廩犧人今復采於韜執以其復位皇帝耕止還入自南門出内壝東門入大次太常卿帥属耕于千畆皇帝還宫明日班勞酒於太極殿如元㑹不賀不為壽唐禮志乙亥元宗開元二十三年正月丨丨耕籍田大赦耆老百嵗以上朕授上州刺史九十以上中州刺史六十以上上州司馬睗陪位官勲爵征防兵父母年七十者遣還民酺三日本紀躬耕盡畝唐明皇開元二十三年親祀神農於東郊配以勾芒遂丨丨丨丨釋祓入壇肅宗乾元二年詔去耒耜雕刻命有司改造之天子出通化門丨丨而丨丨遂祭神農氏以后稷配冕而朱紘躬九推焉耕復數步本朝太宗端拱元年親耕籍田始三推有司言禮畢上曰朕志在勸農恨不能終千畆豈煩為限復耕數步耕十二步仁宗明道二年行籍田禮禮儀使張士遜奏皇帝三推而止帝曰朕既躬耕不以古禮為式願終畆乃丨丨丨丨而止擇日有事太宗雍熙四年詔維燔柴告類紫壇屢薦於至誠而執耒親耕青輅未行於盛禮三推宜舉於舊章百代永垂於信史其以來年正月丨丨丨丨于東郊因時展采仁宗明道元年詔今紹述神宗之成憲舉先穡之精祠申命攸司丨丨丨丨朕取來年二月擇日耕籍田先請皇太后恭謝宗廟來年冬更不行南郊之禮躬推黛耜太宗雍熙五年改元赦制振前王之闕典修耕籍之盛儀載陟青壇肅事接神之禮丨丨丨丨用恢教本之風寧惟奉眷祐於乾坤兼以備粢盛於宗廟可大赦天下改雍熙五年為端拱元年毖杞農壇仁宗明道三年赦文秩開元之遺事述端拱之舊章丨丨丨丨親臨帝籍公卿執耒而陪侍人士側肩而聳觀于以荷靈休于以勸力穡中置神農神宗元豐二年禮官奏自漢迄唐皆有帝籍神倉今既廢去於京城東南度田千畝置籍田仍徙先農壇於其中丨丨丨於東南一嵗祠祭之用取具焉從之本欲終畝髙宗紹興十五年詔大閒籍田頒詔書于郡縣十六年宰相奏曰陛下耕籍過三推之數少勞聖躬上曰朕丨丨丨丨以卿累奏而止張衡東都賦農祥辰正土膏脉起乗鸞輅而駕蒼龍介馭閒以剡耜躬三推於天田修帝籍千畝供禘郊之粢盛必致思乎勤已兆人勸於彊場咸懋力以耘耔潘安仁藉田賦伊晉之四年正月丁未皇帝親率羣后藉于千畆之甸禮也於是乃使甸師清畿野廬掃路封人壝宮掌舎設枑青壇蔚其嶽立兮翠幕黕以雲布結崇基之靈址兮啟四塗之廣阼沃野墳腴膏壤平砥清洛濁渠引流激水遐阡繩直邇陌如矢緫犗服于縹軛兮紺轅綴於黛耜儼儲駕於㕓左兮俟萬乗之躬履百僚先置位以職分自上下下具惟命臣襲春服之萋萋兮接㳺車之轔轔㣲風生於輕幰兮纎埃起於朱輪森奉璋以階列兮望皇軒而肅震若湛露之晞朝陽兮衆星之拱北辰也於是前驅魚鹿属車鱗萃閶闔洞啟參塗方駟常伯陪乗太僕秉轡后杞獻種稑之種司農撰播殖之器挈壺掌升降之節官正掌門閭之蹕天子乃御玉輦䕃華盖衝牙錚鎗綃紈綷䌨金根照耀以洞晃兮龍驥騰驤而沛艾表朱𤣥於離坎飛青縞於震兊中黄曄以發揮兮方綵紛其繁㑹五輅鳴鑾九旗揚斾瓊鈒入蘂雲罕晻藹簫管嘲􅑜以啾嘈兮鼓鞞硡隱以砰礚筍虚嶷以軒翥兮洪鍾越乎區外震震塡填塵騖連天以幸乎籍田蟬冕熲以灼灼兮碧色肅其芊芊似夜光之剖荆璞兮若茂松之依山顛也扵是我皇乃降靈壇撫御耦游場染屨洪縻在手三推而舍庶人終畝貴賤以班或五或九于斯時也居靡都鄙民無華裔長幼雜還以交集士女頒斌而咸戾被褐振裾垂髫緫髻躡踵側肩掎裳連袂黄塵為之四合兮陽光為之潜翳動容發音而觀者莫不抃舞乎康衢謳吟乎聖世情欣樂乎昬作兮慮盡力乎樹藝靡推督而常勸兮莫之課而自勵躬先勞以恱使兮豈嚴刑而猛制哉有邑老田父或進而稱曰盖損益随時理有常然髙以下為基民以食為天正其末者端其本善其後者慎其先夫九土之宜弗任四人之務不一野有菜蔬之色朝靡代耕之秩無儲蓄以虞灾徒望嵗以自畢三季之衰皆此物也今聖上昧旦丕顯夕愓若慄圖匱於豐防儉於逸欽哉欽哉惟穀之恤展三時之宏務致倉廩於盈溢固堯湯之用心而存救之要術也若乃廟祧有事祝宗諏日簠簋普淖則此之自實縮鬯蕭茅天於是乎出黍稷馨香㫖酒嘉栗宜其民和年登而神降之吉也古人有言曰聖人之德無以加於孝乎夫孝者天地之性人之所由靈也昔者明王以孝理天下其或繼之者鮮矣希矣逮我皇晉實光斯道儀刑孚于萬國愛敬盡於祖考故躬稼以供粢盛所以致孝也勸穡以足百姓所以固本也能本而孝盛德大業至矣哉此一役也而二美具焉不亦逺乎不亦重乎敢作頌曰思樂甸畿薄採其茅大君戾止言籍其農其農三推萬方以祗耨我公田實及我私我簠斯盛我簋斯齊我倉如陵我庾如坻念兹在兹永言孝思民力普存祝史正辭神祗攸歆逸豫無期一人有慶兆民賴之詩集躬帝籍蒼玉臨珪璧青壇丨丨丨冑厥乃三推齊衡均百辟張正見従籍田應衡陽王教詩脩政典帝籍丨丨丨也躬耕以勤農焉帝籍于郊典儀具陳務農以利躬耕以勤勤祀在誠匪勤于人訓農以實匪訓以文帝慎二物乃躬乃親公侯郷士暨厥庶民千畆有制飭哉惟寅帝賚髙年式宴且喜種種黄髪族立而議生我艱難暴亂以繼耳聽金鼓目狎戎器皇其我圖親講農事有子有孫力田孝悌鼓舞至仁薰為和醉尹師魯皇雅帝籍詩古今合璧事類備要外集卷二
