body:
  text: 古今合璧事類備要續集卷三十三宋謝維新撰性行門遲鈍事理發揮遲者速之對鈍者利之反性稟之偏也見幾而不作撫機而不發日月逝矣而坐失時事變亟矣而曰母動遲鈍者為之乎然孔子去魯曰遲遲吾行孟子去齊三宿而後出晝則亦曰於予心猶以為速亦揆諸理焉而已若是者又何遲鈍之病哉自非有得乎時中之道而能弗失之者鮮矣事類有悔六二盱豫悔遲丨丨易豫不敏敢謝丨丨左趑趄其行丨丨易臯緩魯人之臯注丨丨也言魯人丨丨數年不荅齊稽首左需疑子行抽劒曰需事之賊也注丨丨則害事佩弦董安于性寛緩丨丨以自警噬嚌若不早圖後將丨丨左拾瀋無備而官辦者猶丨丨也注瀋汁也言不備而責辦不可得左哀三晚成大器丨丨老後進丨丨於禮樂語宿諾子路無丨丨語後覺以先知覺後知以先覺覺丨丨孟困知或丨而丨之記狷者丨丨有所不為也語見事遲范睢與秦謁者王稽入秦逢丞相穰侯行縣睢曰穰侯專秦權惡内諸侯客我且匿車中穰侯至勞稽因曰謁君得無與諸侯客俱來乎稽曰不敢即别去睢曰穰侯智士而丨丨丨嚮疑車中有人忘索之睢下車走曰此必悔之行十記餘里果使騎還索車中無客乃已史不及事翟方進號遲頓丨丨丨本𫝊焦頭爛額初霍氏奢侈茂陵徐生上疏言霍氏泰盛陛下宜以時抑制無使至亡其後霍氏誅滅而告者皆封人為徐生上書曰客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不聽且有火患主人嘿然不應俄而失火鄰里共救殺牛置酒謝鄰人灼爛者在於上行而不錄言曲突者人謂主人曰嚮使聽客言不費牛酒終正火患今論功而請賔曲突徙薪無恩澤丨丨丨丨為上客邪主人乃寤而請之云云宣帝紀黄絹幼婦後漢楊修至江南讀曹娥碑碑背上有八字曰丨丨丨丨外孫韲臼操不解問脩曰卿知否脩曰知之操曰且勿言待吾思之行三十里乃得之令脩解脩曰黄絹色絲絶字幼婦少女妙字外孫女子好字韲臼受辛辭字操曰一如吾意俗云有智無智校三十里語林李驤字說馬之行地曰騰驤取其駸駸載驟日進無疆也夫人之為善儻亦如是騰驤焉其進豈易量哉馬之進可至千里人之進可達聖賢中道而止不如毋進李氏外兄之子曰楊孫謂其名不自勵也求易之余為名之驤而字曰進夫葢嘗觀之視鞭影而奔者驊騮山子也策而進者次也儻戀豆遲回屢鞭不前雖有良樂末如之何矣驤其勉之黙齋文清㳺公文集詩集迃回臨事丨丨種種遲后山疑惑事理發揮疑生于不明古之君子事事取決於理當于理者行之不合于理者不之行也故胷中洞然了無可疑之事自世道浸微人欲横流取非其有處非其據顛倒于醉來夢往之鄉迷繆於此是彼非之境而疑生矣一可一否而莫知所適從一取一舍而莫知所當決利與害相持正與邪相守率意而行之而悔吝生焉謂能疑為明何啻千里事類敗謀蓄疑丨丨書害事需事之賊也注需疑則丨丨左筮從汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮汝則從龜從丨丨卿士從庶民從是之謂大同書卜決丨以丨疑不疑何卜左龍戰野丨丨于丨其血𤣥黄文言曰隂疑於陽必戰易豕負塗見丨丨丨載鬼一車先張之弧後脱之弧匪寇婚媾往遇雨則吉象曰遇雨之吉羣疑亡也易意竊鈇人有亡鈇丨其鄰之子視其行丨丨也言語竊鈇也動作態度無為而不竊鈇也俄而得其鈇他日復見其鄰之子動作態度無似竊鈇者列子意盃蛇嘗有親客久闊不復來廣問其故荅曰前在坐蒙賜酒方欲飲見盃中有蛇意甚惡之既飲而疾于時河南㕔事壁上有角弓畫作蛇廣意盃中即角影也復置酒于前處謂曰酒中復有所見否荅曰所見如初廣乃告之以所以客豁然意解沈疴頓愈晉樂廣𫝊三言市虎龐共與太子質於邯鄲謂魏王曰今一人言市有虎王信乎曰不二人言信乎曰不三人言王信乎曰寡人信之龐共曰夫市無虎明矣而三人言成市虎願王察之韓子三告投杼秦王使甘茂約魏以伐韓茂還息壤曰宜陽大縣其實郡也今王倍數險行千里攻之難魯人有人與曽參同姓名者殺人人告其母其母織自若也及丨丨之其母丨丨下機踰牆而走臣之賢不若曽參王之信臣又不如其母疑臣者非特三人臣恐大王之投杼也通鑑周赧王毛遂按劒平原君至楚與楚王言合從之利害日出而言日中不決丨丨丨丨歴階而上謂平原君曰從之利害兩言而決耳今日中不決何也云云楚王曰唯唯同上孟賁狐疑漢蒯通説韓信曰隨厮養之役者失萬乗之權守儋石之祿者闕卿相之位計成知之而決不敢行者百事之禍也故猛虎之猶豫不如蜂蠆之致螫騏驥之跼躅不如駑馬之安步丨丨之丨丨不如庸夫之必至雖有舜禹之智嘿而不言不如瘖子之𫝊指麾也此言貴能行之本楊敞猶與昌邑王淫亂大將軍與車騎將軍張安世謀廢立使大司農田延年報楊敞敞驚懼不知所言汗出浹背徒唯唯而已敞夫人謂敞曰此國大事今議已定君侯不疾應猶與無決先事誅矣楊敞𫝊猶獸名善疑與與豫同代王猶豫大臣使人迎立丨丨張武等議皆曰漢大臣皆故髙帝時將習兵事多謀詐其屬意非止此也特畏髙帝太后威耳今已誅諸吕喋血京師以迎大王為名實不可信願稱疾無往宋昌進曰羣臣之議皆非也云云大臣因天下心而欲迎立大王大王勿疑也代王報太后計丨丨未定卜之兆得大横占曰大横庚庚余為天王夏啟以光注猶獸名漢文帝紀腰疑有寶漢攻下殷平懼誅乃封其金與印使使歸羽而平杖劒亡度河船人見其美丈夫獨行疑其亡將腰下當有寶器金玉目之欲殺平平心恐乃解衣羸而佐刺船陳平𫝊意疑竊金直不疑文帝時其同舍有告歸誤持其同舍郎金已者而同舍郎覺亡丨不丨不疑謝有之買金償後告歸至而歸金亡金郎大慙本𫝊明珠暗投鄒陽曰明月之丨夜光之璧以丨丨人於道衆莫不按劒相眄本𫝊黄金衆鑠臣身逺與寡莫為之先衆口鑠金韓退之師説古之學者必有師師者所以傳道授業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其先後生於吾乎是故無貴無賤無長無幼道之所存師之所存也嗟乎師道之不傳也久矣欲人之無惑也難矣古之聖人其出人也逺矣猶且從師而問焉今之衆人其去聖人也亦逺矣而耻學於師是故聖益聖愚益愚其皆出於此乎愛其子擇師而教之於其身也則恥師焉惑矣彼童子之師授之書而習其句讀者也非吾所謂傳道授業解惑者也句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也周茂叔通書公於已者公於人未有不公於已而能公於人者明不至則疑生謂能疑為明何啻千里公明篇詩集掇蜂丨丨滅天性拾塵貳孔顔陸機古今合璧事類備要續集卷三十三
