body:
  text: 古今合璧事類備要外集卷十宋謝維新撰音樂門樂音樂發揮天地之間陰陽二氣而已陰陽之動盪而有聲者莫如風與雷自昔聖人於風則取其為號令於雷則取其為樂易曰雷出地奮豫先王以作樂崇德其是樂之所由本乎葢自黄帝作伶倫自大夏之西崑崙之陰取竹之嶰谷生其竅厚均者斷兩節間而吹之以為黄鍾宫以聽鳳之鳴其雄鳴亦六雌鳴亦六比皆可以生之是為律本此其為制樂之始乎唐虞盛時有䕫以專其典樂之職而六律五聲八音相比而成厥後商人尚聲臭味未成樂三闋而後迎牲成周盛際兵寢刑措周公於是作樂以文太平而六典之書宗伯一官其典樂之屬居其半是以成康之世頌聲洋溢皆是樂之胚腪也三代之衰先王之樂幾盡惟太師一官世得典樂至於春秋之季以摯且適齊而入河入海入漢踵至焉而先王之樂泯沒而不傳焉當是時所聞者惟鄭衛桑間濮上之音縱有樂亦與先王有異此夫子於齊而忽有聞韶之喜孟子於齊梁諸君子夏於魏文侯則有同樂獨樂古樂新樂之辨正以慨嘆於後世之樂非先王之樂明矣秦人之興每事不師古始奚復以先王之樂為重故李斯一書丁寧反覆以為擊甕叩缶彈箏拊髀欲嗚嗚快耳以為真秦之聲厥後漢高以馬上得天下且不識詩書之為何物况於樂乎故賈生於文帝之世直欲輓三代之禮樂帝且謙遜以為未遑以文帝之仁厚且未暇及於三代之樂况下於文帝者乎是以武帝之興其在漢家雖有劉氏之樂亦不過止為漢人之樂光武中興至明帝時始改大予之名故王通謂之制能終之以禮樂則三王之舉則其不足於漢人之樂可知矣自三國以至於六朝隋唐一代之興各有一代之樂其間所辨律度之長短聲音之清濁區區求以合乎古要之不過止為後世之樂故王通氏謂孔明王猛不死則禮樂可興葢將欲輓後世為三代之樂可也是以中説一書其問禮問樂非無人至於房杜則終身諉曰不能葢房杜非不能為隋唐之樂而不能為三代之樂也唯房杜之不能是以唐人之興其所與定為一代之樂者不過祖孝孫竇璡張說等輩亦何有於古人之樂哉五代天下濁亂固無足責我宋勃興太祖始以雅樂聲高故既詔和峴定其制又繼而命竇儀以定其章厥後仁宗之世而燕肅宋祁輩又從而按試修廣焉最其後莫大於范鎮劉几以定黄鍾之律而辨四汨四清之聲而後一代之樂純乎正不幸崇觀小人用事倡為豐亨豫大之說以文太平雖能作大晟樂置大司樂要亦不過崇虚文以飾美觀而已亦奚救於宣靖之弊哉中興立國江左每事草剏紹興十一年而明堂始備大樂至十六年始作景鍾奏新樂葢自息兵二十年而樂之文物畧備四宗緝熙承平百年天地之間洋洋和氣所謂致隆平頌清廟者宛然常如一日又豈必待區區致辨於和鳴戛擊之末而謂之樂耶事類崇德先王以作樂丨丨易象德樂所以丨丨也德華樂者丨之丨非聽其鏗鏘而已德音聖人治天下天下大定然後正六律和五聲絃歌詩頌此之謂丨丨德音之謂樂天作樂由丨丨陽來樂由丨丨生於音感於物並記大巻黄帝樂曰雲門丨丨咸池黄帝作丨丨注咸皆也池苞容浸潤也六莖顓帝作丨丨注莖根莖澤及下也五英帝嚳作丨丨大章堯作丨丨注章明也大㲈舜作丨丨注㲈紹也繼堯張樂北門成問於黄帝曰帝丨咸池之丨於洞庭之野吾始聞之懼復聞之怠卒聞之惑蕩蕩黙黙乃不自得莊天運典樂帝曰䕫命汝丨丨敎胄子直而温寛而栗剛而無虐簡而無傲詩言志歌永言聲依永律和聲八音克諧無相奪倫神人以和䕫曰於予擊石拊石百獸率舞大夏禹作丨丨注夏大也承二帝大濩湯作丨丨注濩救也作武武王丨丨注言以武功定天下作勺周公丨丨注言能酌取先祖之道並漢禮樂志象成孔子曰樂丨丨者也摠干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之治也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子夾振之而駟伐盛威於中國也分夾而進事蚤濟也久立於綴以待諸侯之至也注每奏武曲一終為一成始奏象觀兵盟津時再象克殷時三象克殷有餘力而反也四象南方荆蠻之國侵畔者服也五奏象周召分職而治也六奏象兵還振旅也復綴反位正也崇充也凡六奏以充武樂樂記告成酌丨丨大武也言能酌先祖之道以養天下也注周公后攝六年制禮作樂歸政成王乃後祭於廟而奏之其始成告之而已詩樂奏曹太子射姑來朝享之初獻丨丨而歎施父曰曹太子其有憂乎非歎所也左桓九樂徧周王子頽享五大夫丨及丨舞鄭伯聞之見虢叔曰哀樂失時殃咎必至今王子頽歌舞不倦樂禍也注皆舞六代之樂莊二十樂備鄭厲公享王于闕西辟丨丨注備六代之樂莊二十一樂半鄭人賂晉侯以師悝師觸師蠲歌鍾三肆及其鎛磬女樂二八晉侯以丨之丨賜魏綘於是乎有金石之樂左襄樂成孔子語魯太師丨曰樂其可知也始作翕如也從之純如也皦如也繹如也以丨樂正孔子自衛反魯然後丨丨雅頌各得其所並語不知味孔子在齊聞韶三月丨丨肉丨曰不圖為樂之至於斯也語不知人趙簡子五日丨丨丨寤曰我之帝所與百神遊于鈞天廣樂九奏萬舞不類三代之樂其聲動人文侯問魏丨丨丨於子夏曰吾端冕而聽古樂則唯恐臥聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏對曰今夫古樂進旅退旅和正以廣絃匏笙簧㑹守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子於是語於是道古修身及家平均天下此古樂之發也今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也今君所問者樂也所好者音也云云齊王語莊暴見孟子曰暴見於王王語暴以好樂暴未有以對也好樂何如孟子曰王之好樂甚則齊國其庶幾乎它日見於王曰王嘗語莊子以好樂有諸王曰寡人非能好先王之樂直好世俗之樂耳孟子曰今之樂猶古之樂也曰可得聞歟曰獨樂樂與人樂樂孰樂曰不若與人曰與少樂樂與衆樂樂孰樂曰不若與衆臣請為王言樂今王鼓樂於此百姓聞王鍾鼓之聲管籥之音舉疾首蹙頞而相告曰吾王之好鼓樂夫何使我至於此極也父子不相見兄弟妻子離散云云此無他不與民同樂也今王鼓樂於此百姓聞王鍾鼓之聲管籥之音舉欣欣然有喜色而相告曰吾王庶幾無疾病歟何以能鼓樂也云云此無他與民同樂也壽人樂漢髙祖唐山夫人作也周有房中樂秦改名丨丨丨凡樂樂其所生高祖樂楚聲故房中樂楚聲安世樂孝惠二年楚樂府令夏侯寛備其簫管更名丨丨丨紀鏗鏘漢興樂家有制氏以雅樂聲律世世在大樂官但能丨其丨丨鼓舞而不能言其義並禮樂志用烝祭漢明帝時樂有四品一曰大予樂郊廟上陵之所用焉二曰雅頌樂辟雍饗射之所用焉三曰黄門鼓吹樂天子宴羣臣之所用焉其四曰短簫鐃歌樂軍中之所用焉又採百官詩頌以為登歌十月吉辰始用烝祭董卓之亂正聲咸蕩晋音樂志杜䕫定漢雅樂郎丨丨能曉樂事八音七始靡不兼該魏武平荆州得䕫使其刋丨雅律魏有先代古樂自䕫始也自此迄晉用相因循永嘉之亂盡淪胡羯鄭譯奏隋開皇二年齊黃門侍郎顔之推上言禮崩樂壞其來日久今太常雅樂並用胡聲請憑梁國舊章事考尋古典高祖不從曰梁樂亡國之音奈何遣我用邪是時尚因周樂命工人齊樹提檢校樂府改換聲律益不能通俄而沛公丨丨丨上請更修正於是詔牛𢎞章彦之何妥等議正樂然淪謬既久音律多乖積年議不定何妥陳何妥舊以學問雅為高祖所信高祖素不知樂妥又恥已宿儒不逮譯等欲沮壞其事乃立議非之是時競為異議各立朋黨是非之理紛然淆亂或欲令各修造待成擇其善者從之妥恐樂成善惡易見乃請張樂試之遂先説曰黄鍾者以象人君之德及奏黄鍾之調高祖曰滔滔和雅甚與我心㑹妥因陳用黄鍾一宫不假餘律高祖大悅班賜妥等修樂者自是譯等議寢牛𢎞請後丨丨又因鄭譯之丨依古五聲六律旋相為宫雅樂每宫但一調唯縵氣奏五調謂之五音縵樂用七調祭祀施用各依聲律尊卑為次高祖猶憶妥言注𢎞奏下不許作旋宫之樂但作黄鍾一宫而已故隋代雅樂唯奏黃鍾一宫郊廟近氣用五調舊工更盡其餘聲律皆不復通或有能為蕤賓之宫者享祀之際肆之竟無覺者二十器大業元年煬帝詔修高廟樂有司未及陳奏帝又以禮樂之事總付祕書監柳顧言等增多開皇樂器大益樂員郊廟樂懸並令新製帝復難於改作其議竟寢其雅樂鼓吹多依開皇之故雅樂合丨丨丨十二律隋滅陳鄭譯牛𢎞之徒皆名知樂相與撰定依京房六十律因而六之為三百六十律以當一歲之日又以一律為七音音為一調凡十二律為八十四調其說甚詳鍾鼓云乎唐興即用隋舊武德九年詔太常少卿祖孝孫等定樂既成奏之太宗謂侍臣曰古者聖人㳂情以作樂國之興衰未必由此杜淹曰陳將亡也有玉樹後庭花齊將亡也有伴侣曲聞者悲泣所謂亡國之音哀以思以是觀之亦樂之所起帝曰夫聲之所感各因人之哀樂將亡之政其民苦故聞以悲今玉樹伴侣之曲尚存為公奏之知必不悲魏徵曰孔子稱樂云樂云丨丨丨丨哉樂在人和不在音也金石諧矣張文收復請重正餘樂帝不許曰朕聞人和則樂和若百姓安樂丨丨自丨丨用十二鍾唐興即用隋樂武德九年詔祖孝孫協律郎竇璡等定雅樂初隋用黄鍾一宫惟擊七鍾其五鍾設而不擊謂之啞鍾協律郎張文收乃依古斷竹為十二律高祖命與孝孫吹調五鍾叩之而應由是十二鍾皆用製十二和祖孝孫又以十二月旋相為六十聲八十四調樂成奏之初孝孫已定樂乃曰大樂與天地同和者也丨丨丨丨以法天之成數號大唐雅樂一曰豫和二曰順和三曰永和四曰肅和五曰雍和六曰壽和七曰舒和八曰太和九曰昭和十曰休和十一曰正和十二曰承和用於郊廟朝廷以和人神舞士九百武后享坤宫自製大樂丨丨用丨丨人壯士千人先時大饗雜進優倡劉瑑為宣武節度使乃曰豈軍中樂邪取丨丨丨丨被鎧擁矛盾習擊刺與吏士臨視撰誕聖樂王䖍休嘗得大常樂家劉玠丨繼天丨丨丨因帝誕以獻其樂以宫為鈞示五聲有君也以土為德本五運在中也奏二十五豐取二十四氣而成一歲奏十六節象元凱于朝者後中和樂本此作奉聖樂始韋皋丨丨丨丨于頔作順聖樂常奏之軍中李夷簡帥劒南輒廢去謂禮樂非諸侯可作詰其屬曰我欲戒前人非以詒戒後來五坊師子趙宗儒守太常卿太常有丨丨丨丨樂非大朝㑹不作帝嗜聲色宦官預敎坊者乃移書取之宗儒以訴宰相宰相以專事有司不應關白以懦不職罷音聲博士開元二年又置内敎坊於蓬萊宫側有丨丨丨丨第一曹博士第二曹博士侏優雜技京師置左右敎坊掌丨丨丨丨自是不隸太常以中官為敎坊使同上宫商離亂涼州獻新曲帝御便坐召諸王觀議皇憲曰曲雖佳然宫離而不屬商亂而暴君卑迫下臣僭犯上發於忽微形於音聲播之詠歌見於人事臣恐一旦有播遷之禍帝黙然及安史亂乃思憲審音金石諧婉裴知古善樂律神龍元年正月享太廟樂作知古密謂萬年令元行沖曰丨丨丨丨將有大慶在唐室子孫乎是月中宗復位歌聲煩慝五代明年正旦復奏於庭而登丨發丨悲離丨丨如薤露虞殯之音聞者皆悲憤其年高祖崩詔王朴正周世宗丨丨丨考丨雅樂朴以十二律管互吹難得其真乃依京房為律準以九尺之絃十三依管長短寸分設柱用七聲為均樂成而和凡所為當時無敢難者所作樂至今用之不變本傳命和峴製本朝太祖乾德四年上以雅樂聲高丨丨丨依古法丨造新尺并黃鍾九寸之管音始和暢命馮元修仁宗景祐二年丨丨丨聶冦卿宋祁同丨樂書為景祐廣樂記改周樂名建隆元年夏四月定樂名丨丨丨文舞崇德之舞為文德之舞武舞衆成之舞為武功之舞十二順為十二安樂章皆竇儼所定也減周樂律皇祐二年詔國初循用王朴竇儀所定周樂太祖患其聲高遂令和峴減下一律何器象求仁宗景祐四年韓魏公因詳定胡巽之等所造鍾律曰不若窮作樂之源為致治之本使政令平簡民物熙洽海内擊壤鼓腹以歌太平斯乃治古之樂丨為丨丨丨乎與政化通同上詔中外臣寮洎草澤有知雅樂音律得失者御史劉䕫言樂之大本丨丨丨丨不當輕易其器今樂不然同上天聖四年上問古今之樂異同王曾曰古樂用於天地宗廟社稷山川鬼神而聽者和悅丨丨丨丨徒娛人耳目蕩人心志自昔人君流連荒亡者莫不由此古樂不同哲宗范淳夫講孟子今之樂猶古之樂曰孟子切於救民故深勸齊王與民同樂非欲以今樂治天下嘗考孔子答顔淵為邦之問孔子所言者為邦之正道孟子所言者救世之急務此所以不同純厚皦繹徽宗政和三年詔比詔有司以大晟樂播之敎坊按試於庭五聲既具八音始全無惉懘焦急之聲有丨丨丨丨之美可以所進樂並頒天下其舊樂悉行禁止嘽厚純和同上年詔聲律之度協彼中聲迺詔太師魯國公京討論載籍博求䆳古去焦急惉懘之非成丨丨丨丨之美庶幾比隆三代追配韶武矣輔臣按試徽宗政和三年御筆以樂敎士先王之政葢仁言不如仁聲之入人深也樂樂此者也士茍知樂乎此則達性命之理矣兩學生按試已成丨丨丨丨訖取㫖蘇東坡九成臺銘韶陽太守秋咸新作九成臺玉局散吏蘇軾為之銘曰自秦并天下滅禮樂韶之不作葢千三百二十有三年其器存其人亡則韶既已𨼆矣而况於人器兩亡而不傳雖然韶則亡矣而有不亡者存葢嘗與日月寒暑晦明風雨並行於天地之間世無郭子綦則耳未嘗聞地籟也而况得聞天籟使耳聞天籟則凡有形有聲者皆吾羽旄干戚管磬鞄弦嘗試與子登夫韶石之上舜峯之下望蒼梧之𣺌莽九疑之聨綿覽觀山川之吐吞草木之俯仰鳥獸之鳴號衆竅之呼吸往來倡和非有度數而均節多成者非韶之大成乎上方立極以安天下人和而氣應氣應而樂作則夫所謂簫韶九成來鳳凰而舞百獸者既已粲然畢陳於前矣司馬温公通鑑論夫禮樂有本有文中和者本也容聲者文也二者不可廢先王守禮樂之本未嘗須臾去於心行禮樂之文未嘗須臾逺於身興於閨門著於朝廷被於鄉遂比鄰達於諸侯流於四海自祭祀軍旅至於飲食起居未嘗不在禮樂之中如此數十百年然後治化周浹鳳凰來儀也茍無其本而徒有其文一日行之而百日捨之求以移風易俗誠亦難矣是以漢武帝置協律歌天瑞非不美也不能免哀痛之詔王莽建羲和考律呂非不精也不能救漸臺之禍晉武帝制笛尺調金石非不詳也不能弭平陽之灾梁武帝立四器調八音非不察也不能免臺城之辱然則雖韶夏濩武之音具存於世茍其餘不足以稱之曽不能化一夫况四海乎是猶執垂之規矩而無工與材坐而待器之成終不可得也况齊陳淫昏之主亡國之音蹔奏於庭烏能變一世之哀樂哉而太宗遽云治之隆替不由於樂何發言之易而果於非聖人也如此夫禮非威儀之謂也然無威儀則禮不可得而行矣樂非聲音之謂也然無聲音則樂不可得而見矣譬諸山取其一土一石而謂之山則不可然土石皆去山何在哉故曰無本不立無文不行奈何以齊陳之音不驗於今世而謂樂無益於治亂何異睹拳石而輕泰山乎必若所言則是五帝三王之作樂皆妄也君子於其所不知葢闕如也惜哉歐陽修梅聖俞詩藁述凡樂達天地之和而與人之氣相接故其疾徐奮動可以感於心歡欣惻愴可以察於聲五聲單出於金石不能自和之而工者和之然抱其器知其聲節其廉肉而調其律吕如此者工之善也今指其器以問於工曰彼簨者簴者堵而編執而列者何也彼必曰鼗鼓鍾磬絲管干戚也又語其聲以問之曰彼清者濁者剛而奮柔而曼衍者或在郊或在廟堂之下而羅者何也彼必曰八音五聲六代之曲上者歌而下者舞也其聲器名物皆可以數而對也然至乎動盪血脈流通精神使人可以喜可以悲或歌或泣不知手足鼓舞之所然問其何以感之者則雖有善工猶不知其所以然焉葢不可得而言也樂之道深矣故工之善者必得於心應於手而不可述之言也聽之善亦必得於心而㑹以意不可得而言也堯舜之時䕫得之以和人神舞百獸三代春秋之際師襄師曠州鳩之徒得之為樂官理國家知興亡周衰官失樂器淪亡散之河海逾千百歲間未聞有得之者其天地人之和氣相接者既不得泄於金石疑其遂獨鍾於人故其人之得者雖不可和於樂尚能歌之為詩古者登歌清廟太師掌之而諸侯之國亦各有詩以道其風土性情至於投壺饗射必使工歌以達其意而為賓樂葢詩者樂之苗裔歟詩集諧韶濩正聲丨丨丨韓詩知燥濕音丨丨丨絃杜䕫府詠懷古今合璧事類備要外集卷十
