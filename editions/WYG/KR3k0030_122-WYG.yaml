body:
  text: 古今合璧事類備要後集卷五十三宋謝維新撰宦官門入内内侍省歴代㳂革夏商兵制周禮有閽人寺人内䜿皆其職也春秋齊有䜿刁晉有寺人披秦有寺人秦漢加官有中常侍參用士人皆銀璫左貂給事殿省後漢中常侍贊導内事顧問應對永平中定員四人小黄門十人漢舊儀曰中常侍得出入卧内舉法省中明帝以後改以金璫右貂和熹太后稱制乃以閹人為常侍小黄門通命兩宫自此悉用閹人不調他士後魏有大長秋初漢景帝改將作為長秋又置内侍長四人掌顧問拾遺應對北齊有中侍中省隋曰内侍省置内侍二人内常侍二人内侍即舊長秋内常侍即舊中常侍煬帝改為長秋監唐復為内侍省龍朔改省為監光宅為司宫臺神龍復號内侍省官有内侍四内常侍六初太宗定制内侍不立三品官以内侍為之階第四不任以事惟閣門守禦廷内掃除禀食而已開元天寳中始拜三品将軍列㦸于門通典唐職林國初有内中髙品班院淳化五年改入内班院又改入内黄門班院又改内侍省入内内侍班院景徳三年其東門取索司可併𨽻内東門司餘入内都知司内東門都知司内侍省入内内侍班院可立為入内内侍省以諸司𨽻之國初有内班院淳化五年八月改内班為黄門九月改黄門為内侍黄門院為内侍省入内内侍省與内侍省號為前後省而入内省比前省尤為親近兩朝國史志通侍禁中役服䙝近者𨽻入内内侍省拱侍殿中備洒掃之職役使雜品者𨽻内侍省職畧云入内内侍省號北司内侍省號南班與志不同入内内侍省有都都知都知副都知押班内東朝供奉官内西頭供奉官内侍殿頭内侍髙品内侍髙班内侍黄門内侍省有左班都知副都知右班都知副都知押班内東頭供奉官内西頭供奉官内侍殿頭内侍髙品内侍髙班内侍黄門自供奉官至黄門以一百八十人為定員凡内侍初補曰小黄門經恩遷補則為内侍黄門兩朝國史志後省官闕則以前省官補押班次遷副都知次遷都都知遂為内臣之極品續㑹要職畧熙寧中入内内侍省内侍省都知押班逐省各以轉入先後相壓永為定式其官稱則有内客省使延福宫使宣慶使宣政使昭宣使國初所置職畧云太祖以内客省使換樞密以延福宫使換宣宣其㫖逺哉由都知延福使以下至寄資諸司副使者依外官蔭補法元豐議改官制張誠一欲易都知押班之名置殿中監以易内侍省既而宰執進呈神宗曰祖宗為此名有深意豈可輕議四朝志王定國見聞錄政和二年始遂改焉四朝志以通侍大夫易内客省使正侍大夫易延福宫使中侍大夫易景福殿使中亮大夫易宣慶使中衞大夫易宣政使拱衞大夫易昭宣使拱奉官易内東頭供奉官左侍禁易内西頭供奉官右侍禁易内侍殿頭左班殿直易内侍髙品右班殿直易内侍髙班而黄門之名如故事類侍御丨丨僕從書奔走予曰有丨丨詩内事贊導丨丨見㳂革右貂金璫丨丨北司丨丨南班丨丨並見上三品見㳂革注四星天文有宦者四星在帝座之西通典含天憲口丨丨丨漢書握王爵手丨丨丨同上通侍禁中見㳂革司宫前省同上拱侍殿中並同上超登宫卿丨丨丨丨之位後漢宦者𫝊論服勞宫省丨丨丨丨龍溪除柔回制聨職内宰丨丨丨丨曲阜行内侍閻安制不除節度皇祐間王守中丨丨丨丨觀察使而止給其俸何剡抗疏爭辨以為不可其後孫托亦以節度使所以尊寵将帥置軍事安危成敗一以係焉豈宜中官得加其任餘皆奉祠祖宗成法内侍為承宣觀察者𢃄横行雖有一二正任皆老疾歴年既多丐祠祿然後與之中興以來此選尤遴以髙孝兩朝言之其為正任承宣使者不過數人丨丨丨丨歐陽脩五代宦者論自古宦者亂人之國其源深於女禍女色而已宦者之害非一端也葢其用事也近而習其為心也專而忍能以小善中人之意小信固人之心使人之必信而親之待其已信然後懼以禍福而把持之雖有忠臣碩士列於朝廷而人主以為去已疎逺不若起居飲食前後左右之親為可恃也故前後左右者日益親則忠臣碩士日益疎而把持者日益牢安危出其喜怒禍福伏於帷闥則向之所謂可恃者乃所以為患也患已深而覺之欲與疎逺之臣圖左右之親近緩之則養禍而益深急之則挾人主以為質雖有聖智不能與謀謀之而不可為為之而不可成至其盛則俱傷而兩敗故其大者亡國其次亡身而使姦豪得借以為資而起至抉其種類盡殺以快天下之心而後已前史所載宦者之禍常如此者非一出也夫為人主者非欲養禍於内而疎忠臣碩士於外葢其漸積而勢使之然也夫女色之惑不幸而不悟則禍斯及矣使其一悟捽而去之可也宦者之為禍雖欲悔悟而勢有不可得而去也唐昭宗是已故曰深於女禍者謂此也可不戒哉昭宗信狎宦者由是有東宫之幽既出而與崔􅏷圖之􅏷為宰相顧力不足為乃召兵於梁梁兵且至而宦者挾天子走之歧梁兵圍之三年昭宗既出而唐亡矣初昭宗之出也梁王悉誅唐宦者第五可範等七百餘人其在外者悉詔天下捕殺之而宦者多為諸鎮所藏匿而不殺及莊宗立詔天下訪求故唐時宦者悉送京師宦者遂復用事以至於亡此何異求已覆之車躬駕而履其轍也可為悲矣荘宗未滅梁時張承業已死其後居翰雖為樞使而不用事有宣徽使馬紹宏者頗見信用然誣殺大臣黷貨賂専威福以取怨於天下者左右狎昵黄門内養之徒也是時明宗自鎮州入覲奉朝請荘宗頗疑有異志陰遣紹宏伺其動静紹宏反以情告明宗明宗自魏而返天下皆知禍起於魏孰知其啓明宗之二心者皆紹宏始也郭崇韜已破蜀荘宗信宦者言而疑之然崇韜之死荘宗不知皆宦者為之也當在時唐之精兵皆在蜀使崇韜不死明宗入洛豈無西顧之患其能取唐而伐之耶明宗入立又詔天下悉捕宦者而殺之其他至太原者七十餘人悉殺之都亭驛明宗晚而多病王淑妃専内以干政宦者孟漢瓊因以用事秦王入視明宗疾已革既出而聞苦聲以謂帝崩矣乃謀以兵入宫者懼不得立也大臣朱宏昭等方圖其事議未決漢瓊遽入見明宗言秦王反即以兵誅之隨秦王大惡而明宗以此飲恨而終後􅉖帝奔于衞州漢瓊西迎廢于路廢帝惡而殺之嗚呼人情處安樂自非聖哲不能久而無驕之宦女之禍非一日必伺人之驕怠而浸入之明宗非佚君而猶若此者葢其在位差久也其為大害畧可見矣獨承業之論偉然可愛而居翰更一字以活千人於斯二人有取焉取其善而戒其惡所謂愛而知其惡憎而知其善也入内内侍省都知歴代㳂革國初止有内中髙品都知押班後隨省院改易景徳二年置都都知副都知以諸司使充領省事自都知至黄門皆畨休入直專職禁中之事凡祭祀朝㑹行幸燕享則分侍左右或出使四方宣達上㫖或務領中外督察庶事兩朝國史志止一員其任至重相傳自號内宰相恩數幾同執政以封贈三代賜守墳院額度僧官不延福宫使仍𢃄遥郡留後或觀察使皇祐五年以入内内侍省都都知延福宮使武信軍節度觀察留後任守忠為入内内侍省内侍都都知兩省都都知國朝未嘗除也御史俞希孟乞今後更不除前後殿都都知乃詔自守忠後更不差除元祐中以張茂則逮事仁廟累朝有功特除兩省都都知亦官使留後无以加焉不敢廢祖宗法也官制舊典熙寜中入内内侍省都知押班只以四員為定更不非次添員崇寜二年改入内内侍省都知為知入内内侍省事四朝志事類極品内臣丨丨見入内内侍省門㳂革五品都都知從丨丨元祐令内宰相丨丨丨恩數幾同執政見㳂革掌供奉掌禁中丨丨之事四朝志専職禁中領省事丨丨丨丨之事見㳂革緫領内侍丨丨丨四朝志入内内侍省副都知歴代㳂革國朝景徳三年置以諸司使副充止一員為北司之貳所掌同都知己見都知門其官率任景福殿使遥郡觀察使間或有至宫使者與都都知同主判皇城司内庭知事無不預焉宿直諸班禁衞畧无統攝但皇城司有親從官數千人乃命武臣二員同兩都知主之而殿前司不預焉此祖宗處軍政之深意也崇寜二年改為同知入内内侍省事後復事類參冠丨丨近職王歧公除任守忠制六品副都知正丨丨元祐令領省事丨丨丨見都知門參近綴丨黼扆之丨丨王歧公除石全彬制掌供奉事丨禁中丨丨之丨四朝志選補取㫖元豐五年以内侍副都知石得一為入内内侍省副都知帯御器械劉有方為内侍省押班仍詔自今丨丨都知押班三省察院同丨丨實錄北司之貳見㳂革中省之務俾尓以丨丨丨丨王歧公石全彬制率屬殿省矧乃丨丨給事丨丨地親寄重舒信道除石得一制董治内省宿守中禁丨丨丨丨曲阜除梁從吉制參治宫省丨丨丨丨曲阜行宋用臣制入内内侍押班歴代㳂革國初止兼他職他或加檢校官淳化後始以崇班以上充國朝押班二員簽預省事而其官率任宣慶昭宣使而已凡都知押班入禁中奏事上見之以禮非若御藥之比常侍於左右也每都知押班遇殿閣進見通事使臣先以名聞左右進帽皆上坐方引奏畢而退乃徹皆宦官昔以為榮紹聖以來宦者預事毎自御藥進持押班自號疏逺無復不悵然崇寜二年改押班為簽書入内内侍省事後事類六品押班正丨丨元祐令二員見㳂革簽預同上任參宫省之政尓丨丨之曲阜行樂士宜除押班制治宫省董丨丨丨以近為貴曲阜行内侍省班閻闕掌禁中丨丨丨待奏之事四朝志五年除副知熙寧六年七月以内侍押班蘇利涉為右班並副都知仍詔自今兩省押班丨丨無違缺丨丨丨都非五十不除祖宗成法押班丨丨丨丨丨嘉祐間李繼和以年四十九不得除英宗朝張茂則以四十八不得除内侍省都副知押班歴代㳂革國朝景徳三年置以諸司使副使以上充雍熙三年以内中髙品都知王仁睿為洛苑副使仍舊都知諸司副使領都知自仁睿始也淳化五年以竇神興充荘宅使兼黄門左班都知諸司使領都知自神興始也熙寜六年以内侍押班蘇利渉為内侍省左班都知仍自入内内侍省内侍省押班五周年無違闕並除副都知國朝都都知副都知間置一員押班二員主本省官差使遇坐朝侍立而已或特宣喚方許入禁中進見固有時也多以恬退不肯任事之人處之或在北司乆次吿老自請而除者亦有因事左遷為之者其都都知恩數與北省都都知均焉官制舊典事類寵以内省丨丨丨丨之崇杜牧行周元植内侍省制參珥左璫丨丨丨丨列侍中省胡文恭行張惟吉制御藥院歴代㳂革周禮有食醫掌和王之六飲六膳百羞百醤八珍之齊周制不用官閹本朝御藥院主管四人以入内内侍充掌按驗方書修合藥劑以待進御及供奉禁中之用凡藥必品甞而後進大祭祀朝㑹燕享行幸則扶持左右饋進膳羞亦如之四朝志凡遷轉之序初除聼喚以進左右也自聴喚中選任主管龍圖天章閣謂之閣長次遷管後苑次遷管内東門謂之門司次遷御藥謂之藥局自此為侍從由御藥擢押班即除昭宣使或以功遷昭宣而闕押班無闕員則除御𢃄器械職畧事類藥藏屢辭丨丨之親禮制胡文恭行王崇御府擢升丨丨曲阜制門司閣長歴代㳂革門司内東門司主管四人以入内内侍充掌宫禁人物出入周知其名數而幾察之四朝志閣長龍圖大章寶文閣主管官四人以入内内侍充掌藏祖宗文章圖籍及符瑞寳玩之物安像設以崇奉之並四朝志事類擢居禁局丨丨丨丨胡文恭行向𫝊範制東西頭供奉官歴代㳂革從官之名自唐永徽以後人主多居大明宫别置從官謂之東頭供奉官西内具一不廢則謂之西頭供奉官放談國朝㳂唐制入内内侍省及内侍省皆置東西頭供奉官元豐定制無所改政和初改内臣官制獨不變供奉官乃以制供奉至尊為職也但不分東西頭耳官制舊事類貂華珥丨之丨胡文恭行李允恭制宫省服勞丨丨龍溪除朱回制古今合璧事類備要後集卷五十三
