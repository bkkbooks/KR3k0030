body:
  text: 古今合璧事類備要外集卷十九宋謝維新撰刑法門笞刑法總論笞之為言恥也凡過之小者捶撻以恥之漢用竹刑後世更以檚書曰抃作教刑是也然文帝時施於背後笞臀笞背未畢或致死及笞臀遂得全此刑之至輕者也事類鞭抃丨作官刑丨作教刑注治官者用丨丨楚也不勤道業則撻之書檟楚丨丨二物以受威也記學記捶拷仲春無肆掠注掠丨丨肆暴屍記月令小則受子曰舜事瞽瞍也丨杖丨丨大杖則走故舜不失烝烝之孝瞽瞍不陷於不義家語過則撻周公教成王有丨丨丨伯禽孔帖抶何傷見役門董役註抶不勉司城子罕鞭徒費齊襄公誅屨於徒人費不得丨之見血云云遇賊袒而示之背鞭師曹衛侯有嬖妾使師曹誨之琴師曹鞭之公怒丨丨丨三百掠數百楚相亡璧門下意張儀執儀丨笞丨丨不服釋之榜數千貫髙對獄吏丨笞丨丨刺藝身無完者撻陳餘吏過笞丨丨丨餘欲起張耳躡使受笞去耳責餘曰今見一辱而死一吏乎榜舍人上令倡監丨郭丨丨不勝痛其定笞漢景元年詔加笞以為重罪無異幸而不死不可為人丨丨律丨也五百曰三百三百曰二百猶尚不全其減笞又中六年詔加笞者或至死而笞未畢朕甚憐之丨丨丨三百曰二百二百曰百又曰笞者所以教之也其定箠令無得更人丞相劉含御史衛琯請笞者箠長五尺其本大一寸其竹也末薄半寸皆平其節當笞者笞臀丨丨丨丨畢一罪乃更人自是笞者得全未嘗辱人朱邑為桐鄉嗇夫丨丨撻丨丨禁擅笞人第五倫遷蜀丨吏丨丨丨仙婦笞秦白氏帖常林撾吏丨丨夜丨丨崔林嘲之曰君為廷尉耶自毁耳目唐太宗詔身體髮膚不敢毁傷比來訴訟者或自毁耳目自今有犯先笞四十然後依法通鑑頴士笞奴蕭丨丨字茂挺有奴事頴士十年丨楚嚴慘羅珦笞吏丨丨越州人為奉天令中官出入係道吏縁以犯禁珦榜笞之雖死不置自是屏息捶人流血嚴安之丨丨畏不免視腫潰復笞之至血流乃喜榜吏至死柳渾字夷曠同平章事韓滉自浙西入朝帝虚已付之奏事或日晏它相取充位滉遂省中丨丨自若渾雖為滉所引惡其專質讓曰省闥非刑人地而榜吏丨丨公家先相國以捐察不滿歲輒罷之今公案何蹈前非顓立威福豈尊主卑臣義耶滉悔悟稍褫其威笞人責負吳越世家錢鏐世重斂每丨一丨以丨其丨則諸案吏各持其簿列于庭凡一簿所負唱其多少量為笞數以次唱而笞之少猶積數十多者至笞百餘人尤不勝其苦五代史笞不賀者閩王曦嫁女朝士有不賀者丨之御史中丞劉贊坐不糾舉將加笞諫議大夫鄭元弼切諫曦謂之曰卿何如魏鄭公乃敢彊諫元弼曰陛下似唐太宗臣為魏鄭公可矣曦喜乃釋不笞笞修獄典許誡言為琅琊太守有囚縊死獄中乃執去年修獄典鞭之修獄典曰小人主修獄耳如墻垣不固狴牢破壞賊自中出猶以修治日月久可矜免况囚自縊而終修獄典何罪誡言猶怒曰汝胥吏舉動則合笞又何訴紀聞廏夫笞責蜀有姜太師者失其名許田人幼年為黃巾所掠亡失父母從事先主征伐立功繼領節鉞有掌丨丨姜老者事芻秣數十年姜每入廏見其小過必笞之如是積年計其數將及數百後老不任鞭箠因泣告夫人乞放歸鄉里夫人曰汝何許人對曰許田人彼有何骨肉對曰當被掠之時一妻一男迄今不知去處又問其兒小字及妻姓氏行第并房眷近親皆言之及姜歸宅夫人具言姜老欲乞假歸鄉因問得所失妻男親屬姓名姜大驚疑其父也使人細問之其男身有何記驗曰我兒脚心上有一黑子餘不記之姜大哭密遣送出劒闗之外奏先主曰臣父近自闗東來遂將金帛車馬迎入宅父子如初姜報撻父之過齋僧數萬終身不撻從者王氏見聞院子笞責後唐長興中侍衛使康義誠嘗軍中差人於私宅充丨丨亦曽小有丨丨忽一日憐其老而詢其姓名則曰姓康别詰其鄉土親族息嗣方知是父遂相持而泣聞者莫不驚異玉堂閒話笞背逐斥渤海王太尉髙駢鎮蜀日因巡邊至資中郡舍於刺史衙對郡山頂有開元佛寺是夜黃昏寺僧禮讃螺唄間作勃海命軍候悉擒械之來晨丨丨丨丨召將吏而謂之曰僧徒禮念亦無罪過但以此等十年後當以秃丁數千作亂我以是厭之其後土人皆髠髪執兵號大髠小髠据此寺為寨北夢瑣言笞臀逐去袁傪之破袁晁擒其偽公卿數十人州縣大具梏拲謂必生致闕下傪曰此惡百姓何足煩人乃遣丨丨丨丨國史補聞捶楚聲李匡逺性忭急一日不斷刑則慘然不樂嘗丨丨丨之丨曰此一部肉鼔吹臨終曰吾平生殺數十僧道以此享壽八十二及𦵏盗發其墓斷其四支乃殘刑之報也瑣碎録作徒流罪諸縣以杖笞及無罪人丨丨丨丨或以徒流罪作死罪送州者各杖一百若以杖笞及無罪人作死罪送州者徒一年其故増減情狀者各從出入法法書賈誼論執敲扑以鞭笞天下高郢疏榜笞愁痛盈於道路孔璋北山遺文敲扑喧囂犯其慮唐陸宣公奏議笞肉捶骨呻吟里閭沈公顏象刑解見刑辟門詳柳宗元監察使記設箠抃于堂下以修官刑而羣吏莫敢不備詩集發姦偷見獄繫門詳杖刑法總論杖者持也可持以擊也書曰鞭作官刑是也事類杖叩孔子見原壤以丨丨其脛語杖走見前笞注詳杖吏隋髙祖詔所在官人不相敬憚多所寛縱事難克舉諸有殿失雖備科條或據律乃輕論情則重不即决罪無以懲肅其諸司屬官若有懲犯聴於律外斟酌决丨於是上下相驅迭行箠楚以殘暴為幹能杖人裴潾為汝州刺史越法丨丨以太子左庶子分司東都杖二十初段秀實為營田判官涇大將焦令諶取之田自占給與農約熟歸其半是歲大旱農告無入令諶曰我知入不知旱責之急農無以償徃訴秀實秀實署牒免之因使人遜諭令諶令諶怒召農責曰我畏段秀實耶以牒置背上大丨擊丨丨輿致庭中秀實泣曰乃我困汝即自裂裳裏瘡賣已馬以代償杖三十馬燧元子暢建中中燧討賊山東暢留京師於是大旱朝廷議栝商旅緍錢多亡命入南山為盗暢客單超俊李雲端等竊議以為事且危暢是其言遣奴諫燧班師燧使執奴以聞使兄炫拘暢請罪帝方倚燧貸不問但誅其客勑炫賜暢丨丨丨踰杖制王遂杖扑皆丨制後遂械送京師斬東市監軍上遂所制杖出示於朝為戒云創杖架宇文融以榎檚大小無制始丨丨丨以髙卑度杖長短又鑄銅為規齊其巨細杖坐免宗室李瓌為荆州都督長史馮元命者嘗為御史太夫素貴事多專决瓌怒丨之丨丨杖立威洛陽令楊徳榦矜酷烈丨殺人以丨丨因勸加刑元和初天水趙雲客遊鄜畤遇中部縣縣僚有宴吏擒一人至其罪不甚重官僚欲縱之雲醉丨丨丨丨於是杖之累月雲出塞行及蘆子闗道逢一人要之過其居命酒偶酌問曰君省相識耶前於中部值君遭罹横罪與君素無讐隙奈何為君所勸因被重刑雲遂起謝之其人曰吾望子久矣豈虞於此獲刷前恥乃令左右拽入一室室中有大坑深三丈餘坑中惟貯酒糟十斛剥去其衣推雲於中飢食其糟渴飲其汁如是昏昏幾一月矣乃縛出之使人蹙頞鼻額挼捩支體其手指肩髀皆改舊形提出風中倐然凝定至聲韻亦改遂以賤𨽻畜之為烏延驛中雜役累歳㑹其弟出案靈州獄雲以告其弟言於觀察使李銛由是發卒討尋乃覆滅獨異志入謝請罪李元皛為沂州刺史怒司功㕁承明命剥之屏外承明狡猾者也既出屏適㑹博士劉琮璡後至將入衛承明以琮璡儒者則前執而剥之紿曰太守怒汝衙遲使吾領人取汝今便剥將來琮璡以為然遂解衣承明目吏卒擒琮璡以入承明乃逃元皛見剥至不知是琮璡也遂杖之至十焉琮璡丨丨曰蒙恩賜杖丨示丨名元皛曰為承明所賣竟無言遂入戸紀聞杖殺張擢天寶中哥舒翰為安西節度時差都知兵馬使張擢上都奏事值楊國忠專權好貨擢逗遛不返因納賄交結翰續又朝奏擢知翰至懼求國忠拔用國忠乃除擢兼御史大夫充劒南西州節度敇下就第辭翰翰命部下數十於庭數其罪杖而殺之俄奏聞帝却賜擢屍更令翰决屍一百乾􅍧子杖殺胡雛黎園弟子有胡雛善吹笛尤承恩嘗犯洛陽令崔隠甫已而走禁中𤣥宗非時託以它事召隠甫對胡雛在側指曰就卿乞此得否隠甫對曰陛下此言是輕臣而重樂人也臣請休官再拜而去𤣥宗遽曰朕與卿戯也遂令曳出纔至門外立杖殺之俄而復敇釋已死矣乃賜隠甫絹百匹國史補有犯共斥徐有功名𢎞敏以字行初為蒲州司法以寛為治不施敲扑吏相約丨丨徐司法杖者衆丨丨之迨官滿不杖一人職事亦修有罪不加李封為延陵令吏人丨丨丨丨杖罰但令裹碧巾以辱之州鄉大以為恥竟不捶一人謂隨年杖五代劉銖用法刻深民有過者問其年幾何對曰若干即隨其數杖之丨之丨丨丨謂合歡杖又每杖一人必兩杖俱下丨之丨丨丨徒刑法總論徒役也奴也盖奴辱之周禮曰其徒男子入于罪𨽻任之以事寘之圜土而教之量其罪之輕重有年數而舍是也今徒刑五自一年至于三年盖仍隋唐云事類給役凡萬人有罪者桎梏而坐諸嘉石役諸司空重罪旬有三日坐朞月役則宥而赦之注役者使丨百工之丨禮計庸丨徒丨也左罷人司圜掌收教丨丨凡害人者不使飾冠任之以事上罪三年而捨中罪二年下罪一年刑人几圜土之丨丨不虧其財寘圜土凡害人者丨之丨丨而施諸職事以明刑恥之不齒三年注明刑書罪惡於大方版著背出圜土不能改丨乎丨丨者殺之云云並周禮漢惠詔丨丨丨上造以上内外公孫有罪當刑及當為城旦舂皆耐為鬼薪白粲注城旦謂旦旦起治城舂者婦人不預外徭役俱舂作米四歲刑取薪給宗廟白粲令擇米皆三歲刑張蒼律丨丨定丨諸當完者完為城旦春滿三歲為鬼薪白粲鬼薪白粲一歲入𨽻臣妾𨽻臣妾一歲免為庶人逃亡及耐罪以上不用此令有爵者七十者未齓者皆不為奴注男子為𨽻臣女子為𨽻妾有爵謂命士已上男子八歲女子七歲而毁齒皆司厲之職也徒復作邴吉使女丨丨丨徒掃道魏王陵為刑丨於道注髠五歲當丨丨徒責保漢㢮刑丨不私鎖但丨丨白氏帖徒論歸平帝時天下人丨已丨丨家出雇山錢月三百本紀私罪以上徐有功時有詔公罪流私罪徒以上會赦免踰百日不首復論有功奏陛下寛殊死罪已發者原之若無告言所犯終不自發如告言赦前事則與律乖今赦前之罪不自言者還以論法則恩雖布天下而一罪不能貨臣切為陛下不取死罪以下五代梁乾化二年五月丁亥徳音降丨丨丨丨囚罷役徒流刑法總論流放也自一千里二千里二千五百里三千里以至五千里凡五等書所謂流宥五刑是也謂不忍刑殺宥之于逺以禦魑魅事類流宥丨丨五刑注宥寛也以丨放之法寛其五刑流宅五丨有丨五宅三居注居罪人逺近有三等書緩死君子以議獄丨丨易絀惡簡不肖以丨丨記播棄丨丨黎老書投畀丨丨有北詩屏逺方丨之丨丨終身不齒記王制實裔土莊舄曰越之流人去人滋久思人滋深以丨丨丨國語流共工舜丨丨丨于幽州放驩兜丨丨丨于崇山竄三苗丨丨丨于三危殛伯鯀丨鯀于羽山四罪而天下咸服並書宥子南子産謂子南曰君不忍殺丨汝以逺勉速行乎左放甲父晉丨其大夫胥丨丨于衛春秋放屈原屈原楚三閭大夫以罪見丨楚騷徙青衣梁王彭越僕得罪走漢告梁王與扈輒謀反上囚之赦為庶人傳處蜀青衣後誅之梟首雒陽本傳謫長沙賈誼漢文帝時丨為丨丨王太傅本傳徙交州虞翻性踈直孫權怒丨丨丨雖處罪放講學不倦上書曰長沒海隅生無可與語死以青蠅為弔客云云吳志降為流太宗時房𤣥齡與法司増損隋律丨大辟丨丨者九十二流為徒者七十一免以配元宗時詔曰徒非重刑而役者寒暑不釋械繫杖古以代肉刑也或犯非巨蠹而捶以至死其皆丨丨丨諸軍自効唐刑法志流嶺南長孫無忌奏别敕長流以為永例後趙公犯罪敕長丨丨丨至死不復回此亦為法自弊也又李朝隠為大理卿武彊令裴景仙丏贓五十疋帝怒欲杖殺之曰景仙其先寂有國功又丏乞贓無死比藉當死坐猶將宥之固請決杖百丨丨丨又則天皇后武氏諸王牽連死戮殆盡子孫雖嬰褓亦投嶺南並孔六帖放靜州裴寂字𤣥真浮圖法雅坐妖言辭連寂坐免官削封邑半歸故郡未幾汾隂狂男子謂寂奴曰公有天分寂遣奴殺所言者奴盗寂封邑錢百萬寂捕急遂上變帝怒曰寂有死罪四乃丨丨丨流登州五代王殷廣順三年秋九月永壽節殷來入為壽太祖許之而懼其疑也復遣使止之明年太祖有事於南郊是冬殷來朝殷握兵柄職當警衛出入多以兵從又求兵甲以備非常是時太祖卧疾疑殷有異志乃力疾御兹徳殿殷入起居即命執之削奪在身官爵長丨丨丨已殺之投醜裔薛懷義隂募少年千人為浮屠有逆謀侍御史周矩劾狀請治驗太后曰是道人素狂不足治募少年聴窮劾矩悉丨放丨丨懷義搆矩免官嚴郢論丨丨字叔敖御史臺請天下斷獄一切待報唯徒者得悉徙邊郢上言徙邊即流也流有三而一用之誠難且殺人外猶有十惡偽造符印等諸盗今一徙之法太輕皮日休鹿門隱書今之士為名與勢茍刑禍及流竄至是監刀鋸者必名人司流竄者必勢士繼其踵者惟恐其位之不速也名與勢然也死刑法總論死刑二絞斬極典也絞尸首全斬斷其首梟之事類必當斬殺丨丨記月令無肆仲春丨丨掠注肆暴屍同上保首領得丨丨丨以殁左全要領是丨丨丨記刑於市丨人丨丨記王制肆諸朝景伯之於公伯寮吾力猶能丨丨市丨語斬羽東城項羽兵敗灌嬰追丨丨丨丨斬錯東市晁錯上書請削吳地吳約齊緇川膠東濟南楚趙皆反以誅錯為名上令丞相青中尉嘉廷尉歐劾奏錯不稱主上徳信大逆無道當腰斬同産皆棄市制曰可上使中尉召錯紿載行市朝衣斬東市要斬楊惲騶馬猥佐成上書告楊惲驕奢不悔過日食之咎此人所致章下廷尉按驗得所予孫㑹宗書帝見而惡之惲以大逆無道丨丨腰斬廣漢趙廣漢以私怨論殺男子榮畜人上書言之云云下廷尉獄坐丨丨延壽棄市韓丨丨代蕭望之為左馮翊望之聞延壽在東郡時放散官錢千餘萬使侍御按之延壽聞知即部吏按校望之在馮翊時廩犧錢放散百餘萬望之自奏職在總領天下聞事不敢不問而為延壽所拘持上由是不直延壽竟坐丨丨霍顯棄市丨丨及禹山雲自見日侵削數相對啼泣自怨謀廢天子事發覺雲山自殺禹腰斬顯及諸女昆弟皆棄市棒殺獄囚梁元帝素苛刻周師至獄中死囚數千人並令丨丨之贓汙立斬隋祖文法自矜患令忠丨丨因私使人以錢帛遺之得犯丨丨竊盜皆斬煬帝外事四夷窮人無告聚為盗賊更立嚴刑敕天下丨丨以上罪無輕重不待聞奏丨丨百姓轉相羣聚故剽城邑誅罰不能禁玉素藥主中書舍人郭正一破平壤得一髙麗婢名丨丨極姝艷專令知財物庫正一夜須漿水非玉素煮之不可玉素乃毒之而進正一急曰此婢藥我索土漿甘草解之乃止覔婢不得并失金銀器物等録奏敕令長安萬年捉不良脊爛來賊不獲不良主帥魏昶有謀略請舍人家奴選年少端正者三人布衫籠頭至街縛衛士四人問十日内何人不見舍人家衛士云有投化髙麗留書遣付舍人捉馬奴書見在檢云金城坊中有一空宅更無語不良徃金城坊空宅並搜之至一宅封鎖打開婢及髙麗並在拷問乃是投化髙麗共捉馬奴藏之奉敕斬於東市朝野僉載楚金辯奸垂拱年間則天監國羅織事起湖州佐吏取刺史裴光判書割字合成文理詐為徐敬業反書以告差使推光欵書是光書疑語非光語前後三使推不能決敕令能推事人勘當取實僉言張楚金可楚金憂悶仰卧西窻日到向看之字似補作平看則不覺向日則見之令喚州官集索一甕水令琛投書於水中字一一解散琛叩頭伏罪敕杖一百然後斬之賜楚金絹百匹朝野僉載賜貴妃死禄山亂明皇幸蜀至馬嵬驛將士飢疲皆憤怒陳𤣥禮以禍由國忠軍士以搶揭其首上出驛門慰勞令收隊軍士不應上使髙力士問之𤣥禮對曰國忠謀反貴妃不宜供奉願陛下割恩正法云云上乃命力士引貴妃於佛堂縊殺之輿尸置驛庭召元禮等入視之注縊絞也認刀得賊劉崇龜鎮南海有富商子少年而白晢殊於禆販之伍泊船於江岸上有門樓中見一姬年二十餘艷態妖容非常所覩亦不避人乘便言曰黃昏當妨宅矣頷言微哂既昏黑啓扉俟之未及赴約有盜入竊見一房無燭突入姬即欣然就之盗乃謂見擒以庖刀刺之遺刀而逸商客之子入戸即踐其血以手捫之逗血之聲未已徑走登船一夜解維比明已行百里其家即其血至江岸詰岸上云其夜有某客船一夜徑發即差人追及械於圓室掠拷備至具實吐之惟不招殺人其家以庖刀納于府主乃下令曰某日大設合境庖丁宜集於毬場以俟烹宰屠者皆集又下令曰今日已晚可翌日至乃各留刀府主命取入諸刀以殺人之刀雜其中換下一口來日諸人各認本刀惟一屠最後至不肯持去府主詰之對曰此非某刀又詰之此何人刀曰此合某乙之刀命擒之已竄之矣乃以他囚合死者代商人之子潛令人俟之竄果歸家即擒之遂置于法商人之子夜入人家以姦罪杖背而已玉堂閒話寡婦告子李傑為河南尹有寡婦告其子不孝其子不能自理但云得罪于母死所甘分傑察其子非不孝謂寡婦曰汝寡居惟有一子今告之罪至死得毋悔乎寡婦曰子無賴不順母寧復悔乎傑曰審如此可買棺木來取兒屍因使人覘其後寡婦既出謂一道士曰事了矣俄將棺至尚冀其悔再三諭之寡婦執意如初道士立於門外密令擒之一問承伏某與寡婦私嘗為兒所制故欲除之傑放其子杖殺寡婦及道士同棺載之國史異纂竊盗贓滿本朝建隆三年舊制丨丨丨絹三疋者棄市改為錢三千其陌八十有司歲申明之强盗贓滿又舊制丨丨丨丨十疋者絞詔改為錢三千足陌者處死長編皮日休斬丁公論忠之為稱也盖欲委身以事主不以猜悞貳其心不以辨説貳其心不以疑懼貳其心者也上有過諍於公不揚名於私豈猜悞之足入乎上有忌愈乎進不愈乎退豈辨説之足入乎上有間去懼乎心不懼乎事豈疑懼之足入乎夫茍禄恡生而仕者上有過言未息而懼乎誅諫未再而去乎位自以得古人三諫不從之義然幸其生貪其禄是猜悞而貳其心也上有忌必奸于心機媚于聲氣不思己之不聰而謂上之受謗不思道有未可而謂辯之足從不從辯而去是辯説貳其心者也上有間去必佞彼愛取乎厚也必諂彼倖求其捨也有愛不可佞倖不可諂即茍而已矣是疑懼而貳其心者也嗚呼劉項之作也淮隂不以猜悞而去項乎淮南不以疑懼而去項乎曲逆不以辯説而去項乎去彼而就此果謂忠乎果謂不忠乎是利則存不利則亡者也則丁公臨敵捨敵無殺惻隱之者豈有猜悞辯説疑懼者耶有利則存不利則亡者耶與其不忠則彼三侯者謂淮隂侯淮南王曲逆侯是也未可免鼎鑊之誅刀鋸之刑也是髙祖斬之果不為當噫漢之初立未為無人丁公就刑未聞有一言而戾者將固之命也悲夫古今合璧事類備要外集卷十九
