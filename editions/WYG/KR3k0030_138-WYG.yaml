body:
  text: 古今合璧事類備要後集卷六十九宋謝維新撰監司門經畧使歴代沿革唐貞觀二年邊州别置經畧使此蓋使名之起唐百官志節度兼度支營田招討經畧使則有副使判官各一人職官分紀儀鳳二年以黒齒常之為河源軍經畧大使今職畧永淳元年婁師徳為河源軍經畧副使通鑑至徳三年賀蘭進明除嶺南五府經畧兼節度使建中元年除元琇節度始不帶五府經畧唐㑹要國朝不常置咸平五年始以右僕射張齊賢為邠寜環慶涇原路經畧使判汾州諸路軍馬並受節度又以鄧州觀察使錢若水為并代經畧使判并州自後不除人寶元中夏人入寇始命陜西沿邊大將皆兼經畧皇祐間儂智髙擾邊詔知廣桂州並帶經畧安撫使自後西南二邊常帶經畧所以重師權而服羌夷也聖朝職畧國朝㑹要其經畧安撫各以直秘閣以上充掌一路兵民之事皆帥其屬而聽其獄訟頒其禁令定其賞罰稽其錢榖甲械出納之名籍而行以法若事難專决即具可否禀奏即干机速邊防及士卒抵罪則聽以便宜裁斷帥臣任河東陜西嶺南路職任綏御戎夷則為經畧安撫使續㑹要四朝志南渡之初依舊制廣南東路帶主管經畧安撫司公事西路帶經畧安撫使紹興五年令襄陽守臣湖北帥帶經畧安撫使中書門下省言湖北帥司已移還荆南舊治與襄陽府事體頗同詔王庻許依襄陽例帶經畧安撫中興㑹要後罷而二廣如故事類仁恕戴叔倫為容管經畧使綏徠夷落威名流聞其治清明丨丨多方畧故所至稱最徳宗嘗賦中和節詩遣使者寵賜唐職林威聲唐裴行立為安南經畧使丨丨風行教徳唐元結為容管經畧使自諭蠻豪綏定八州民樂其丨立石頌丨文武唐髙宗以婁師徳為經畧副使曰卿有丨丨材勿辭也管嶺外唐涼公房為涼州經畧丨丨丨十三州之地税節賦詩公私有貶食不立資遺以班親舊為友為義平嶺表唐王宗肱大歴中為容管經畧使丨丨丨夷獠代宗遣使慰勞加金紫光祿大夫職林計度上考置經畧使以丨丨為丨丨集事為中考修造為下考唐百官志太史書功見後注徳政敷施元和十二年御史中丞裴公來蒞兹邦都督二十七州諸軍州事盜息姦革丨丨丨丨邕年化成柳子厚桂州賀家洲亭記商賈饒益徐申字維降為邕管經畧使黄洞納質供賦不敢桀外蕃嵗以珠􅀈瑁香文犀浮海至申於常賦外未嘗賸索丨丨丨丨唐職林寇攘順化張公師為安南經畧使自為吏習於海邦去之則夷獠稱亂復至則丨丨丨丨及受命專征牧人盡區處之方制國備形體之法道阻而備百貨地偏而具五榖儲峙委積師旅無庚癸之呼繕完板榦控帶兼戊巳之位皆用周禮率由漢儀易野之守險逾丘陵而萬世無虞竒珍良貨溢于王府殊俗異類盈于藁街優詔累旌其忠良太史嗣書其功烈唐職林夷落綏徠見前仁恕注輕財愛士唐劉雍為隴右經畧使丨丨丨丨得人之死力優詔旌忠見上寇攘順化注摘山市駿在昔元豐留神武備丨丨丨丨具著利條乃設牧司悉遵成憲初寮除李昌孺制摘山充廏必能為吾講丨丨之利得丨丨之良龍溪除起宗制恩被異域本朝余襄公帥二廣首尾幾十年以丨信丨于丨丨如交趾大理特磨南詔之國皆可以頤指氣使言行錄徳著夷夏范文正公帥邠延涇慶四都恩丨丨聞丨丨聳服熟户畨部率稱曰龍圖老子至于元昊亦以此呼之澠水燕談龍圖之呼見上注韓范之謡范仲淹與韓琦協謀必欲外復靈夏横山之地邊上謡曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽元昊大懼遂稱臣名臣𫝊築青簡城范文正公為環慶路經畧安撫招討使於延州丨丨丨丨墾營田復永平廢寨熟羌歸業數萬户於慶州城大順以據要害奪賊地而耕之又城細􅆎胡盧於是明珠城藏大族皆去賊為中國用言行錄自為長城范仲淹知慶州兼經畧招討使未幾賊兵三萬叩城淹麾兵血戰賊奔而北久之种世衡不利於定州以仲淹晝夜為領兵援初關人心揺動及見仲淹耀兵號令嚴明威震戎落人心遂安相賀曰邊上丨有龍圖公丨丨丨吾屬何憂弛禁通輸劉徽猷子羽字彦脩宣撫司移軍閬州吳玠戍河池王彦戍金州二鎮皆飢而興元帥過為守備閉關塞褒斜二鎮病之公乃承制拜公利路經畧兼知興元府公至之日盡丨其丨民飢丨商丨粟二鎮乃安言行錄買馬利病張敬夫經畧安撫廣南西路朝廷丨丨横山嵗久弊積邊氓吿病而馬不時至公究丨丨得六十餘條皆有以窮其根穴而事為之防由是諸蠻感悦爭以善馬來嵗額率常先期以辦朱晦菴集移檄交趾余襄公靖字安道嘉祐五年交趾宼邕州殺五巡檢驛召公以為廣西體量安撫使公至則丨丨丨丨召其臣費嘉祐詰責之嘉祐惶恐對曰種落犯邊罪當死願留取首惡以獻即械送五人送斂州斬于界上言行錄移文諭虜唐質肅公介知太原府河東經畧使至則首戒邊將毋生事初代州岢嵐軍虜數擾邊公遣兵撤其境上堡柵又丨丨丨以利害嚴守以待之遂不復敢動元昊欽畏鄭戩字天休為陜西經畧安撫招討使廵邊至鎮戎軍趣蓮花堡丨丨方擁兵近塞謂其下曰我已遣人使稱臣朝廷何為復用此公䕶諸將其丨丨如此東都事畧蠻酋叩謝李浩公字徳逺為廣南西路帥有入對論擇帥事者上孝宗欣然顧之曰如廣西朕已得人矣李浩也公至鎮勤於民事郡舊有靈渠通漕運溉田甚廣嵗頗湮塞公命疏治之民賴其利邕管所領羈縻安平州丨丨恃險凶横聚兵謀為邊患公遣單使開心見誠諭以禍福即日丨頭丨過焚撤木柵受約束曽李貍撰李殿撰浩行狀州兵補闕籍南軒先生張栻經畧安撫廣南西路所統州二十有五遼夐荒殘故多盜賊徼外蠻夷間亦入塞為暴而州兵皆脆弱慵惰乂乏糧食死亡輒不補公為之簡閲丨丨汰冗丨丨丨諸州黥卒伉健者以為效用合親兵摧鋒等軍日習而月按之視諸州有不足於糧賜若戈甲之費者更許漕司鹽木羡錢以佐之𫝊令溪洞酋豪諭弭盜睦鄰毋得輒相讐殺生事而它所以立恩信謹關防亦無不備於是境内肅清方外柔服莫府無南鄉之慮矣晦菴文築城據要害見上築青澗城注至鎮勤民事見上蠻酋叩謝注處置歸經畧予為鄜延經畧使日新一㕔謂之五司㕔延州正㕔乃都督㕔治延州事五司㕔治鄜州路軍事如唐之使忠五司者經畧安撫總管節度觀察處置五使今節度之職多歸總管司觀察歸安撫司丨丨丨丨丨司其節度觀察兩案并支掌惟判官今皆治州事而已經畧安司司不置佐官以帥權不可不専都總管副總管鈐轄都監司三書而不皆受經畧使節制沈括筆談祖於瓊林苑咸平四年兵部尚書張齊賢充涇原儀渭邠寜環慶鄜延州保安鎮戎渭逺軍安撫經畧使知制誥梁顥副之帝以邊將玩寇朔方糧道艱阻故命齊賢等使焉即命𤼵日馳騎而往仍命宣徽南院使周瑩丨丨丨丨丨廣西已得人見上蠻酋叩謝注歸裝無南物李殿撰浩為廣南西路帥奉法循己律己甚嚴自闕右丨丨丨丨丨歸不載南物余靖公襄知廣州唐之畨舶裝船舊皆取税公奏罷之以徠逺商又請立法戒當任官吏不得市南藥及公北丨丨丨丨丨王荆公桂州新城記儂智髙反南方出入十有三州而十有二州之守吏或死或不死而無一人能守其州者豈其材皆不足歟蓋夫城郭之不設兵甲之不戒雖有智勇猶不能勝一日之變也天子於是遂推選上大夫所論以為能者付之經畧而令尚書工部侍郎余公當廣西焉寇平之明年蠻越接和乃占城桂州以至和二年八月始作而以二年之六月成夫其為役亦大矣蓋公之信於民也久而費之欲以衛其財勞之欲以休其力以故為是有大費與大勞而人莫或以為勤也故文王之起也有四夷之難則城于朔方而以南仲宣王之起也有諸侯之患則城于東方而以仲山甫此二臣之徳惙於其君於其為國之本末與其所先後可謂知之矣慮之以悄悄之勞而發之以赫赫之名乗之以翼翼之勤而續之以明明之功蓋其君臣如此而守衛之有其具也今余公亦以文武之材當明天子承平日久於補弊立廢之時鎮撫一方脩扞其民其勤於今與周之南仲仲山甫蓋等矣是宜有記也詩集將壇上丨丨場拜南荒羽檄招逺人來百越元老事三朝霧繞龍川暗山連象郡遥劉長卿送徐大夫赴廣州詩兵符牙斾從城展丨丨到府開蠻聲吟夜市海色潤朝臺張籍送鄭權尚書出鎮南海詩文星斧鉞下青㝠樓船過洞庭北風隨爽氣南斗避丨丨杜甫送李大夫赴廣州詩名賢廟堂選世將范氏真丨丨仁風被宿麥緑浪揺秦川東坡送范仲濟經畧詩軍府盛畨禺丨丨丨欲説暫停盃蓋海旌旗出連天觀間開韓愈送鄭尚書赴南海詩門旗出嶺頭分界堠一半屬湘南水驛丨丨丨山蠻洞主參王建送嚴大夫詩龍户馬人衙時丨丨集上日丨丨來風靜鶢鶋去官廉蚌蛤迴貨通獅子國樂奏越王臺事事皆殊異無嫌出大才韓愈送靳尚書赴南海詩腦鋪牙堆戊頭龍丨丨關口象丨丨物設薫鑪出蠻辭晚節開市喧山賊破金賤海船來白㲲家家織紅蕉處處栽已將身報國莫起望郷臺王建送鄭權尚書南海詩翠羽黄柑蒼蒼森八桂兹地在湘南江作青羅帶山如碧玉篸户多輸丨丨家自種丨丨逺勝登仙逺飛鸞不假驂韓愈送桂州嚴大夫詩翠浪玉虹握刀將帥迎牙纛龍尾名臣進寶奎虎頭移鎮赴溶溪解辨戎蠻貢象犀丨丨丨丨餘昨夢碧篸羅帶入新題鳯池雞拊公栖處早箇雲飛不要梯楊誠齋送張子智移師入桂詩二十四州民丨丨丨丨丨樂否莫教一物怨窮途張孝祥詩紅旗壓南荒丨丨照海丨丨丨徴入中臺作侍郎韓退之贈刑部馬侍郎詩安撫使武臣門都總管同併與前制置宣撫通用歴代沿革梁武帝普通五年魏以酈道元為大使慰撫六鎮大使始此隋文帝開皇九年詔遣柱國韋洸安撫嶺外乂仁夀四年以楊素為并州道行軍總管河北道安撫大使並通鑑唐貞觀初遣大使十三人巡省天下諸州水旱則有廵察安撫存撫之名節度使兼之則有副使天授二年𤼵十道存撫使職官分紀聖歴中狄仁傑為河北道安撫徳宗正元又置副使今職畧聖朝舊不常置自咸平二年以翰林學士王欽若為西川安撫使知制誥梁顥為陜西安撫使安撫使之名始此其後景徳三年始置河北沿邊安撫使以雄州守臣為之而陜西沿邊諸州亦有安撫使慶歴二年詔置湖南安撫司八年詔置河北四路安撫以韓琦王拱辰賈昌朝等充諸路使皇祐四年詔廣桂二州帶經畧安撫使熙寜五年罷諸路經畧安撫司崇寜二年置河南安撫使宣和二年置輔郡内穎昌府帶京西安撫使宣和三年臣僚言睦賊猖獗乞以杭越知州府本路安撫鎮撫一方詔杭越州江寜府守臣並帶安撫使詔洪州守臣可依江寜府安撫使凡諸路安撫逐州知州兼以直秘閣以上充掌總䕶諸將統制軍旅察治姦宄以肅清一道凡兵民之政皆掌焉帥其屬而聽其獄訟頒其禁令定其賞罰稽其錢榖甲械出納之名籍其行以法若事難専决則具可否稟奏即干機速邊防及士卒抵罪則聽以便宜裁斷係邊任則綏御夷狄撫寜疆圉若甲兵屯戍芻粟餽運則視其緩急盈虚而移用之掌凡戰守之事並㑹要續㑹要建炎元年李綱請沿河沿淮沿江置安撫使兼馬步軍都總管以文臣充二年令將兵處知州帶管内安撫使後省四年置鎮撫使罷逐路安撫使後罷鎮撫使置安撫使如故時諸路又有安撫大使自兩浙西路劉光世始二品以上為帥即為安撫大使中興㑹要事類岳伯内有百揆四丨外有州牧侯丨書藩侯詩方伯千里之外設丨丨記藩岳陸宣公韓洸制岳政出咨丨丨入填邦紀唐大詔令蘇頲太子哀冊帥長以文昌為丨丨白集詳見參議門垣