  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_081-1a, image: WYG0939/WYG0939-0666a.png}
body:
  text: 古今合璧事類備要後集卷十二宋謝維新撰三少門三少歴代沿革周以少師少傅少保為三孤貳公𢎞化寅亮天地弼予一人通典曰孤特也言卑於公尊於卿特置此三人秦漢而下省後周置三孤以貳三公職源我國初沿唐制置三師以太尉司徒司空為三公元豐肇新官制於三師三公無所改政和二年詔司徒司空周六卿之官非三公之任乃今之六曹尚書是也太尉秦官居主兵之任亦非三公太尉司徒司空並罷依周制立三孤之官乃次輔之任或稱三少為次相之任通典續㑹要事類貳公少師少傅少保曰三孤丨丨𢎞化寅亮天地弼予一人書周官孤卿司士正朝儀之位丨丨特揖禮夏官又以三少丨丨與九卿為九焉通典又太師太傅太保為三公又立三少為之副少師少傅少保是為丨丨前百官公卿表輔治副貳三公𢎞大道化敬信天地之教以丨我一人之丨書周官注聽獄成獄辭大司冦聽之於槐棘之下注左九棘孤卿位焉記王制四命公之孤丨丨以皮帛眂小國之君注九命上公得置孤一人禮春官典命特揖司士孤卿丨丨注丨丨一揖之禮夏官東面射人掌國之三公孤卿之位孤丨丨同上北上朝儀之位王南鄉三公北面東上孤東面丨丨禮司士幕案孤卿有邦事則張丨設丨禮天官掌次夏篆服平五乗孤乗丨丨卿乗夏縵注謂丨丨五采盡轂約也春官巾車爵弁孤之服自希冕而下注雜記曰大夫丨丨自祭享於廟惟孤爾春官司服皮帛大宗伯以禽作六贄以等諸臣孤執丨丨注丨丨者束帛而表以皮為之飾皮虎豹丨丨如今碧色繒天子之孤卿䞇以虎皮公之孤䞇以豹皮禮春官三耦射孤卿以丨丨丨一侯一獲一容樂以采蘋五節二正禮射人九棘位朝士掌建邦外朝之法左丨丨孤卿丨焉羣士在其後注植九以為位者取其赤心而外刺禮秋官卑於公此三官名曰三孤孤特也言丨丨丨尊於卿特置此三者書周官注尊於卿注見上副三公孤王之孤三人丨丨丨論道者禮掌次注立三孤依周制丨丨丨之官乃次輔之位或稱三少為次相之位通典少師正四方㣲子若曰父師少師殷其弗或亂丨丨丨書㣲子答諸侯天子燕業反其學左右之習詭其師丨丨丨遇大臣不知文雅之辭已語之道簡聞小誦不博習此少師之責後漢百官志注又見大戴記以節度除紹興九年丨丨丨使韓世忠丨少師十年少傅節度使張俊除少師二十八年少傅節度使楊存中除少師孝宗即位九月少傅四川宣撫使呉璘除少保㑹要罷僕射授隆興二年授特進尚書右僕射兼樞宻使張浚可罷右僕射特進少師保信軍節度使判福州以浚自劾求去故也同上極貳公位丨丨丨丨之丨叙政和除童貫制陟亞師列俾丨丨丨之丨初寮除楊戬制又視秩亞師李邦彦藍從熈制少傅天子居處丨丨丨丨岀入不以禮衣冠冠帶不以制御噐列側不以度采服從好不以章忿悦不以義與奪不以節此少傅之責也大戴記又後漢百官志太子侍從髙祖欲易太子張良為畫計曰上所不能致者四人今誠能卑辭厚禮請以為客時從入朝亦一助也及黥布反良説上以太子監闗中兵上謂子房雖疾彊非傅太子以良行少傅事及破布歸上愈欲易太子及晏置酒丨丨丨四人者丨上徑問之四人各言姓名帝大驚曰煩公卒調護太子太子竟不易者此皆良招四皓力也前本傳節度使除紹興六年少保丨丨丨張俊丨少傅七年少保節度使楊存中除少傅三十一年少保四川宣撫使呉璘除少傅樞宻使授紹興三十二年孝宗即位張浚特授少傅進封魏國公浚以丨丨丨都督江淮軍馬入朝奏事繼有是命同上次傅之名元衮赤舄進丨丨丨崇丨政和除錢景鑄制亞傅之班俾公洪化越陞丨丨丨丨初寮除余深制少保居處燕私天子丨丨丨丨安而易樂而躭飲食不時醉飽不節寢起早晏無常玩好器弄無制此少保之貴也大戴記又後漢百官志注寢起早晏見上注未嘗輕授紹興元年少保左僕射吕頥浩罷少保除特進先是頥浩言少保之官自陛下臨御丨丨丨丨望追寢成命除一階官故有是詔至七年三月自鎮南軍節度使開府儀同三司充浙西安撫制置大使兼知臨安府始除少保㑹要求去特授乾道八年九月左丞相華國公虞允文特授少保武安軍節度使充四川宣撫使進封雍國公以求去故也左僕射授隆興元年十二月丨丨丨信國公陳康伯特丨少保大觀文進封福國公判信州節度使除紹興五年武成威徳軍節度使開府儀同三司充鎮江建康府淮東宣撫使韓世忠除少保又紹興六年兩鎮使相江東宣撫使張俊除少保又紹興九年六月武勝定國軍丨丨丨岳飛丨少保又紹興十二年保成軍節度使開府楊存中除少保又紹興二十九年奉國軍節度使判興州呉璘除少保並同上峻陞亞保丨丨丨丨位孤棘於外朝初寮除余深制眷予孤保丨丨丨丨初寮除鄧洵武制檢校官厯代沿革檢校本加官自唐以來有之凡内職崇班今修武郎武臣副率以上初授及該恩皆帶若文武則樞宻宣徽節度使始帶焉自三公謂太尉司徒司空三師僕射尚書僕射尚書常侍至賓客祭酒凡十餘等元豐官制武臣承宣使已下皆罷惟存檢校三公三師以待節度使之久次者政和後改三公為三少若武臣累加至檢校少師則拜太尉文臣累加至檢校少師則拜開府儀同三司安南國王初襲封加檢校太尉經恩加檢校太師諸蕃刺史州則檢校太子賓客此外皆不帶云朝野雜記事類加官檢校本丨丨自唐以來始有之朝野雜記建節三公三孤以師道輔佐天子後世官職益紊今遂以三公三孤之官如階官貼職之類不復有師保之任論道經邦之責矣舊來猶是文臣之有勲徳重望者方得除此以其有輔教天子之名故也後世或以諸王子或以武臣為之既是天子之子與武臣豈可任師保之責耶訛謬承襲不復釐正祖宗之法除三孤三公者必須丨丨加檢校太子少保少師之類然後除開府儀同三司既除開府然後除三孤三公南渡以來如張韓劉岳諸武臣猶是如此外皆不帶今則不然既丨丨便抹過檢校徑除開府至三孤三公矣晦菴語録元豐皆罷唐有檢校官國朝之制檢校官一十九三公三師六左僕射至水部郎共十三丨丨官制行左僕射以下皆為職事官故罷之凡三師三公除授自司徒遷太保太保遷太傅太傅遷太尉太尉遷太師檢校官亦如之續㑹要政和後置丨丨二年罷太尉司徒司空以少師少傅少保為三少丨亦丨檢校官紹興四年士褭檢校少師錢忱檢校少保同上聨羙朝華仍益校丨之丨悉欽丨賞之丨胡文㳟除范全檢校制聨階宰路丨三丨於丨丨平章事厯代沿革唐太宗貞觀八年僕射李靖以疾辭位詔疾小瘳三两日一至中書門下平章事平章之名盖始於此淳化元年以黄門侍郎郭待舉兵部侍郎岑長倩等同中書門下平章事入銜自待舉等始自是之後終唐之世不能改唐百官志文國朝舊相特命平决軍國事者凡四人天禧中王正公以首相告老拜太尉兼侍中五日一朝遇軍國大事不以時入參决公懇辭不拜慶厯初吕文靖公亦以首相求罷拜司空平章軍國事公辭之元佑初文忠烈公自太師落致仕除平章軍國重事未幾吕正獻公以右揆求去亦除司空同平章軍國事潞公五日一朝申公两日一朝開禧元年初置平章軍國事以命韓侂胄盖侂胄繫銜比申公省同字則其體尤專比潞公省重字則其所舉者廣見朝野雜記嘉熈中以喬行簡平章軍國事事類天子尊禮杜佑拜檢校司空同中書門下平章事嵗餘乞致仕詔三五日一入中書平章政事佑每進見丨丨丨丨之官而不名後數年因乞骸骨許之公紀天下重輕裴度太和四年詔進司徒平章軍國重事三五日一入中書狀貌不踰中人而神觀爽邁操守堅正善占對既有功名震四夷用不用常為丨丨丨丨同上僕射平章正觀八年丨丨李靖以疾辭位詔疾小瘳三兩日一至中書門下丨丨事唐百官志冢宰平章裴冕肅宗至扶風召赴行在拜左相代宗立詔攝冢宰固辭以疾乞間日入政事堂平章事帝優之聴入閤不趨為御小延英召對本傳閲表得名宋璟罷帝欲用張嘉貞而忘其名夜召韋抗曰朕嘗記其風操今為北方大將姓張而複名卿為朕思之夜半因觀文臣表奏一閲而得其名遂以為中書侍郎同門下平章事張嘉正傳上簿署名鄭綮毎以詩託諷中人有誦于帝前者昭宗意其有藴未盡因有司上班簿遂署其側曰可禮部侍郎同中書門下平章事鄭綮傳五日一入鄭覃以疾乞去位有詔解太子太師許以丨丨丨丨中書商量政事分紀三日一入裴度數引疾不任機事詔丨五丨丨丨中書平章政事分紀金鉉重名丨丨丨丨銀章貴服劉禹錫伐上平章事表銀青貴服注見上優待勲徳平章軍國重事祖宗所以丨丨元丨重丨之意非他相比朝野雜記足尊老成文彦博召赴闕既而御史中丞劉摯左正言朱光庭右正言王覿俱上言彦博春秋髙不可為三省長官司馬公又言若令以正太師平章軍國重事亦丨以丨丨丨矣遂下制如公言事略與聞重事平章軍國事祖宗所以優待元勲重徳之意王吕二公所平章重事之囙不可得而考潞公所謂重事則大典禮大刑政侍從管軍三京尹三路帥臣以上乃與聞之比申公去重字則政事旡所不闗第省其常程細務而已朝野雜記第省常程見上注重事參决天禧元年王旦太尉兼侍中許五日赴起居每起居日入中書或遇軍國丨丨不限時日並令入預丨丨分紀大事同議慶歴三年詔宰相吕夷簡每有軍國丨丨與中書樞宻院丨丨以聞以夷簡宿疾在身故有是命同上士艷其榮元祐元年以吕公著平章事國朝大臣以三公平章軍國事四人其二人則吕公著父子也丨丨丨丨通鑑使問其年文潞公彦博平章軍國重事契丹丨耶律永昌来聘見公立班丨丨丨曰抑何壯也言行録古今合璧事類備要後集卷十二
