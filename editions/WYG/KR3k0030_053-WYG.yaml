body:
  text: 古今合璧事類備要前集卷五十三宋謝維新撰娼優門妓女事類市門刺繡紋不如倚丨丨貨殖序營妓丨丨古以待軍士之無妻者雜志微服逸遊牛竒章公帥維揚杜牧在幕中夜丨丨丨丨後牧以拾遺召公以縱逸為戒牧始隠諱公取一箧皆街子輩報帖云杜書記平善芝田録寫真寄贈崔徽河中娼也裴敬中以興元幕使河中與徽相從累月敬中歸情懐怨抑後東川幕白知退歸徽乃寫真奉書謂知退曰為妾謂敬中崔徽一旦不及卷中人且為郎死矣元稹為作歌元集紅兒肉聲鄜州李孝恭籍中有丨丨善丨丨羅虬挑之不答遂作絶句百篇號比紅兒詩蓮香國色都下名妓楚丨丨丨丨無雙每出則蜂蝶相隨慕其香也天寳遺事鏡湖春色元稹廉問浙東喜官妓劉採春嘗題詩有因循歸未得不是戀鱸魚之句人注曰戀丨丨丨丨耳古今詩話葱嶺女肆唐丨丨以東俗喜淫龜兹于闐置丨丨征其錢龜兹傳判僧遊娼見僧門居官笞妓吕士隆知宣州好笞官妓官妓皆欲选去會杭州一妓到士隆喜之留不使去一日羣妓復犯小過士隆欲笞之妓訴曰某不敢辭罪但杭妓不能安也士隆愍而捨之魏㤗詩話詩集翠眉當代我醉美人家美人顏色嬌如花今日美人棄我去青樓朱箔天之涯㳙㳙嫦娥月三五盈又缺盈盈丨丨蟬鬢生别離一望不見心斷絶心斷絶㡬千里夢中醉卧巫山雲覺來淚滴湘江水湘江兩岸花木深美人不來愁人心含愁更奏緑綺琴調髙絃絶無知音美人不知為暮雨兮為朝雲相思一夜梅花發忽到窻前疑是君盧仝有所思清歌花月樓臺近九衢丨丨一曲倒金壺坐中亦有江南客莫向春風唱鷓鴣鄭谷席上贈歌者緑水蓮元微之到通州見塵壁間有詩落句云丨丨紅丨一朶開千花萬草無顔色不知何人題也録此詞寄樂天乃樂天十五年前及第時贈長安妓阿軟絶句故白詩云十五年前似夢遊曾將詩句結風流偶助笑歌嘲阿軟那知傳誦到通州樂天集章臺栁韓翊少負才名鄰居有姓李者每將娼妓栁氏至其居必邀韓飲愈熟栁每窺所往来皆名人因乗暇語李曰韓秀才甚貧然所與遊必時賢是必不久困宜假借之李具酒邀韓至謂韓曰公當今名士栁當今名色名色配名士不亦可乎遂命栁與韓韓辭之栁曰此豪達者昨暮具言之矣俄就栁歸来嵗成名淄青節度使侯希逸奏為從事以世方擾不敢以栁自隨置之都下三嵗不果迓寄詩曰丨丨丨往日青青今在否縱使長條似舊垂也應攀折他人手栁答曰楊栁枝芳菲節可恨年年贈離别一葉隨風忽報秋縱使君來豈堪折後為畨將沙吒利所刼寵之專房翊隨希逸入覲見栁氏在輜軿中殆不勝情虞侯許俊曰當為足下立致之乃衣縵胡佩雙鞬從一騎造沙吒之第伺其出排闥大呼曰將軍中惡召夫人僕侍辟易遂陞堂挾栁氏馳馬而至時沙吒利恩寵殊等翊懼禍訴於希逸希逸以事聞諸朝詔栁氏還翊異聞録司空見慣劉禹錫罷蘇州過揚州帥杜鴻漸飲大醉宿傳舎既醒見二妓在側驚問之乃曰郎中席上與司空詩因遣某來問何詩曰髙髻雲鬟宫樣妝春風一曲杜韋娘丨丨丨丨渾閑事惱亂蘇州刺史腸一云韋應物過杜鴻漸御史狎遊杜牧既為御史久之分務洛陽時李聰罷鎮閑居聲伎豪華為當時第一嘗宴客女伎百餘人皆殊色牧瞪目注視問李聞有紫雲者孰是宜以見惠李俯而笑諸妓亦皆回首破顔牧自飲三爵朗吟而起曰華堂今日綺筵開誰喚分司御史來怱發狂言驚座主兩行紅粉一時廻意氣閑逸旁若無人後三年狎遊詩曰落拓江湖載酒行楚腰纎細掌中情三年一覺揚州夢嬴得青樓薄倖名􅘑船一棹百分空十載青春不負公今日髩絲禪榻畔茶烟細颺落花風本事傳約妓愆期杜牧太和末往遊湖州刺史崔君素所厚者悉致召妓殊不愜意牧曰願張水嬉使人畢致牧當間行寓目使君如其言兩岸觀者如堵怱有里姥引髽髻女年十餘嵗真國色也將至舟中姥女皆懼牧曰且不即納當為後期吾十年後必為此郡若不來乃從他適因以重幣結之洎周墀入相牧上牋乞守湖州比至郡則十四年所約之姝已從人三載而生二子牧亟使召之夫母懼其見奪擕手以詣母曰向約十年不來而後嫁嫁已三年矣牧俛首曰其辭直强之不祥乃禮而遣之為悵别詩自是尋春去較遲不須惆悵怨芳時狂風落盡深紅色茂緑成隂子滿枝麗情贈妓以詩元微之元和中使蜀籍妓薛濤者有才色府公嚴司空知之遣濤往侍焉後登翰林以詩寄曰錦江膩膩娥眉秀化出文君與薛濤言語巧偷鸚鵡舌文章分得鳳凰毛紛紛詞客皆停筆箇箇公侯欲夢刀别後相思隔烟水菖蒲花發五雲髙麗情又嘗辟為校書贈之詩云萬里橋邊薛校書枇杷花下閉門居洛陽才子知多少管領春風盡不如作謝遣行韓滉鎮浙西戎昱為部内刺史有官妓善歌色亦閑妙昱情屬至厚滉聞其名召置籍中昱為詞以送云送客春風湖上亭栁條藤蔓繫人心黄鸝久住渾相識欲别頻啼四五聲妓至唱戎此詞滉即時歸之索骰賭酒張祐客淮南幕中赴宴杜牧同坐有所屬意丨丨子丨丨微吟骰子逡巡褁手拈無因得見玉纎纎祐曰但知報道金釵墜彷彿還應露指尖摭言嘲妓無貌崔崖張祐齊名每題詩倡律譽之則車馬盈門毁之則杯盤失錯嘲李端端云黄昏不語不知行鼻似烟窻耳似鐺愛把薑牙梳掠鬢崐崙山上月初生端遂往見二子再請曰端端祗候三郎六即伏望哀之乃更贈曰覔得黄騮被繡鞍善和坊裏取端端揚州近日渾成夢一朶能行白牡丹於是賔客競臻其户或曰李家娘子纔出墨池便登雪嶺何其一日墨洒不均雲溪友議嘲妓納胥元微之貶江陵士曹少年氣俊過襄陽夜召名妓劇飲將别作詩云花枝臨水復臨堤也照清江也照泥寄語東風好擡舉夜米曾有鳯凰栖謝師厚作襄倅聞營妓與二胥相好此妓乞書扇子遂改下句云寄語東風好檯舉夜来曽有老鴉栖侯鯖録寄掌書仙長安中有娼女曹文姬尤工翰墨為闗中第一時號為書仙有任生者投之詩曰玉皇前殿掌書仙一染塵心下九天莫怪濃香熏骨膩雲衣曾惹御爐烟麗情集贈御史娘國樂婦人有永新媍御史娘栁青娘皆一時之妙也有與御史娘詩曰天下能歌御史娘花前月底奉君王九重深處無人見獨把新聲傳順郎桂苑叢集娼善賦詩江淮間娼徐月英送人詩曰惆悵人間萬事違兩人同去一人歸生憎平望池亭水忍照鴛鴦兩背飛乂云枕前淚與階前雨隔箇窻兒滴到明詞多不盡北窻𤨏言妓為拂塵魏仲先冦萊公㳺陜郊僧寺多留題後同到見萊公詩已用碧紗籠而仲先詩獨塵昏滿壁時有從行官妓頗慧以衣袖拂之仲先徐曰若得常将紅袖拂也應勝似碧紗籠莱公大笑青箱記屬意小鬟范文正公守番陽郡創慶朔堂而妓籍中有小鬟尚㓜公頗屬意既去以詩寄魏介曰慶朔堂前花自栽便移官去未曽開年年長有别離恨已託春風幹當来介因鬻以惠公今州治有石刻泊宅編願覓愛卿韓魏公為陜西安撫開府長安李待制師中過之李有詩名席間使有官妓賈愛卿賦詩云願得貔貅十萬兵犬戎巢穴一時平歸來不用封侯印只問君王覓愛卿厚遺歌妓見後寵姬門舊桃能詩事私幸營妓司馬温公為武定從事同幕丨丨丨丨而公諱之嘗會僧廬荆公往迫之使妓踰垣而去度不可隠乃具道荆公集句戯之云年去年來來去忙暫閑偷卧老僧床驚回一覺㳺仙夢又逐流鶯過短牆后山談叢奉使狎妓文潞公知成都喜行樂有飛語至京師會御史何剡字聖徒蜀人當歸上遣察之李少愚謂公曰無足念慮因迎謁聖徒於漢州同郡會有妓善舞聖徒喜之問其姓曰楊聖徒曰所謂楊臺栁者少愚取妓帕題詩曰蜀國佳人號細腰東臺御史惜妖嬈從今喚作楊臺栁舞盡春風萬萬條命其妓歌之數日聖徒至成都頗嚴重潞公一日宴聖徒迎其妓雜府妓中歌其詞以酌聖徒聖徒每為之醉聞見緑此與陶榖使江南事畧相類併鈞于後陶穀奉使江南留寫六朝實録每進見嚴冷下視江左韓熈載曰五栁公雖若端整其守可隳乃命妓秦弱蘭衣弊衣為驛卒之女每日擁箒掃地陶微見恱之詢其故答曰妾守驛者之女也久喪夫歸托父母陶因與狎因與一詞名風光好云好因縁惡因縁祗得郵亭一夜眠别神仙琵琶撥盡相思調知音少待得鸞膠續斷絃是何年數日李主開宴令弱蘭歌此詞陶大沮即日北歸坐客畏妓蔡君謨知福州召飯於復圓陳烈與焉時暮春沽酒籍妓喏而過公留妓佐酒舉歌一拍烈怖駭越牆攀木而逝因賦詩云七閩山水掌中窺乗興登臨對落暉誰在畫樓沽酒處㡬多鳴㯭趂潮歸睛来海色依稀見醉後鄉心積漸微山鳥不知紅粉樂一聲檀板便驚飛李㤗伯云妓求僧詩東坡在徐州參寥自錢塘訪之坡席上令一妓戯求詩參口占云多謝尊前􅆼窕娘好將幽夢惱襄王禪心已作沾泥絮不逐春風上下狂妓學禪語杭妓琴操善應答東坡善之後因在西湖戯琴云我作長老爾試叅禪問琴云何謂湖中景答云落霞與孤鶩齊飛秋水共長天一色何謂景中人答云裙拖六幅湘江水髻挽巫山一叚雲何謂人中意答云隨他楊學士鼈殺鮑參軍如此究竟如何坡云門前冷落鞍馬稀老大嫁作商人婦琴大悟即削髪為尼泊宅編詩紀姓事韓康公上元召從官數人出官妓侍飲其専寵者曰魯生偶中蜂螫少頃持扇就東坡乞詩詩中有云魚飲細浪歌揺白舞罷花枝蜂入懐上句記姓下句記事也侯鯖録詩寓名字陳筑字夢和登第為福州古田尉至官惑一娼周氏周能詩嘗有詩贈筑曰夢和殘月過樓西月過樓西夢已迷喚起一聲腸斷處落花枝上鷓鴣啼首句葢寓筑字也夷堅志古今合璧事類備要前集卷五十三
