body:
  text: 古今合璧事類偹要後集卷二十八宋謝維新撰六部門戸部尚書度支侍郎金部郎中倉部附貟外郎歴代沿革漢置尚書郎四人其一人主財帛委輸至魏文帝置度支尚書寺専掌軍國支計呉有戸部而晉有度支皆主筭也宋齊度支尚書領度支金部倉部起部四曹度支統度支倉部左戸右戸金部庫部六曹後周置大司徒卿一人如周禮之制隋初有度支尚書則并後周民部之職開皇三年改度支為民部唐條隋志謂之戸部永徽初改民部為戸部廟諱故也顯慶元年改戸部為度支龍朔二年改度支尚書為司元太常伯咸亨元年復為戸部尚書初戸部居禮部之後武后改置天地四時之官以戸部為地官自是遂居禮部前神龍元年復置地官為戸部摠判戸部度支金部倉部事通典本朝制戸部判官事一人以兩制以上充凡戸口田産錢穀食貨之政令皆歸於三司三司謂塩鐵戸部度支也本曹但受天下之土貢元㑹陳於庭而已續㑹要元豐改官制罷三司歸戸部左右曹而三司之名始冺矣四朝志初除安燾為戸部尙書續㑹要戸部掌天下人民錢糓之政令貢賦征役之事以版籍考戸口之登耗以稅賦待軍國之嵗計以土貢辨郡縣之物宜以征㩁抑兼并而生調度以孝義婚姻繼嗣之道和人心以田務劵責之理直民訟凡此歸於左曹以常平之法平豐凶時歛散以免役之闕比閭察盗賊以義倉賑濟之法救飢饉恤艱阨以豊凶水旱之政治荒廢務稼穡以坊場河渡之課酬勤勞省科率凡此歸之右曹其屬有三曰度支上供俸賜及邦國經度㑹計之事𨽻為曰金部貨賄出納之制及權衡度量頒禁之令𨽻焉曰倉部凡國之倉廪儲積及其給受之事𨽻焉尚書掌軍國用度財賦出納州縣廢置升降凡四司所治之事侍郎貟外郎参領之獨左曹事弗豫専𨽻所掌侍郎若事屬本曹而歴郡縣監司不能直則受其訟焉大享祀薦饌則尚書奉爼飲福徹之朝㑹則奉貢物闕則侍郎攝行舊三司使即今尚書舊三司副使即今侍郎其權發遣副使即今權侍郎舊三司判官推官及判子司官即今郎中貟外郎之任也續會要神宗正史職官志元祐元年門下侍郎司焉光欲令戸部尚書兼領左右曹而舊三司財用事有在五曹寺監者並歸戸部則利權歸一詔尚書省立法左右曹錢糓尚書兼總使周知其数量入為出而制國用焉職畧事類司徒虞書五教實委司徒之班周禮六卿爰開地官之位唐張鸑文集地官戸部尚書周之地官卿也唐六典又乃立丨丨司徒使帥其屬而掌邦教以佐三安擾邦國周禮掌圖大司徒之職丨建邦土地之丨與其人民之数以佐王安擾邦國以天下土地之圗周知九州之地域廣輪之数而辨其邦國都鄙之数制其畿疆而溝封之施教以上㑹之法辨五地之物生因此五物者民之常而丨十有二丨焉並同上掌計魏文帝置度支尚書専丨軍國之丨朝議以征討未息動湏節量及明帝嗣位欲用安平王孚問左右曰有兄風否答曰似兄帝曰吾得司馬懿二人復何憂轉度支尚書晋安平王孚傳置用杜預為度支尚書内以利人外以救邉偹物丨丨濟當時之益者五十餘條損益杜預在内七年丨丨萬機不可勝数朝野稱之並本𫝊計較文帝立度支尚書年粮丨丨一由之以司馬孚為之朱鳯晋書武庫晉杜預為度支尚書號杜丨丨言旡所不有本𫝊王佐張華為度支尚書有丨丨之才清儉晉吴隐之為度支尚書以竹篷為屏風坐無氊席後遷中領軍丨丨不改毎月所得祿纔留身粮餘悉分賑親族本傳清白劉溉為左民尚書溉美風儀善容止所至以丨丨自脩生又率儉不好聲色梁書義倉長孫平開皇三年為度支尚書見天下州縣多罹水旱百姓不給奏令民間毎秋家出粟麥一石以下貧富為差等儲之閭里以偹凶年名曰丨丨隋書藻鑑景雲中盧從愿為吏部侍郎杜暹注鄭縣尉後為戸部尚書盧自益州長史入朝杜立於上乃曰選人定何如盧曰亦由僕丨丨遂使明公展千里之足内相王琚佐明皇平内難為戸部尚書帝於琚春委特異豫大政事號丨宰丨並本𫝊版使韋燠辭判戸部歸謂甥姪曰已讓丨丨矣佳話録掌錢榖戸部尚書丨天下土地人民丨丨之政貢賦之差其属有四戸部度支金部倉部唐志掌戸口戸部尚書丨天下丨丨井田之政令凡徭賦職貢之方經費賙給之筭六典有善績唐鄭善果檢校大理卿兼民部尚書正身奉法甚丨丨丨分紀有風望崔從字子乂為戸部尚書為人􅃊偉立朝稜稜丨丨丨帝自擇唐髙宗以竇徳𤣥舊臣自殿中少監為御史大夫歳中選司元太常伯又任十餘人皆丨丨丨㑹要眷殊厚徳宗時王紹進戸部尚書丨待丨丨主計凡八年政事多關訪紹亦未嘗一言漏於人唐書時爲榮鄭善果為民部尚書制與裴寂等十人每奏事及侍立並令升殿與從兄元壔在其数丨以丨丨分紀嘗㑹計亦總地卿丨丨丨而經國紀綱式叙征賦益饒唐大詔令崔鉉制制輕重地官理財能丨於丨丨同上羣制制地征掌司徒之邦教丨民曹之丨丨綜事率属居其要㑹幹時通才始可典領常集制總事機翼翼版圗以辨九州之地英英㑹府實丨萬丨之丨司邦賦及領地官且丨丨丨㑹計事劇出納孔殷投利刅以皆虗委絲棼而必理白居易行裴垍制掌邦計國朝李常字公擇號山房為戸部尚書常文士少吏幹或疑不勝任以問司馬光光曰使此人丨丨丨則天下知朝廷非急於征利貪吏望風掊克之患庶幾少息長編作㑹稽錄李常為戸書丨元祐丨丨丨三十卷國史置裁省局韓忠彦字師朴謚文定召為戸部尚書時元祐㑹稽録初成入狹而用廣忠彦愛之因言歛節財用遂裁省冗費置局於戸部同上戸部中臺丨丨之於丨丨為周司徒之職南豐擬制民曹上卿韓愈與李實書見前總尚書類戸部侍郎歴代沿革隋煬帝始置民部侍郎唐因之後改為戸部龍朔二年改為司元少常伯咸亨元年復為戸部侍郎通典本朝戸部之職皆歸三司元豐官制行戸部始總邦計置侍郎二員左曹五案戸口案稅賦案農田案檢法案知雜案右曹五案常平案免役案坑塲案檢法案知雜案左曹除陳安石右曹除李定職畧餘詳見前戸部尚書官制因革紹興四年七月詔戸部侍郎二員通治左右曹職事以權吏部侍郎劉岑有請故有是命中興會要事類左戸唐戸部侍郎有二員判使按者别一置謂之丨丨元和後選舉華重宰相多由此進崔羣既相孟簡代之六典貳郷韋表㣲為中書舎人俄拜戸部侍郎職如故時自長慶寳歴國家比多變故凡在翰林例無滿歳由是表㣲自監察六七年間秩正丨丨􅊀承恩渥盛于一時叙戸口唐太宗問盧承􅂟歴代戸口多少之数承慶叙夏已後迄周隋皆有依據議戸版周末帝召大臣丨丨丨場言利害甚詳帝咨賞不進獻李絳為戸部侍郎憲宗問曰戸部比有進獻至卿獨無何也絳曰將戸部錢進入内藏是用官物以求結私恩上嘉其直不受賂唐牛僧孺拜戸部侍郎初韓宏入朝父子俱卒諸孤㓜小穆宗命中使閲其宅簿以付家老而簿上具納賂之所唯於僧孺官側求書曰某月日送牛侍郎物若干不受穆宗按簿甚恱居無何議命相帝首可僧孺之名財用非長王彦威開成初為戸侍判度支彥威於儒該􅃉亦善吏事但經總丨丨出入米塩丨所丨也譽望大䘮潘孟陽權知戸部侍郎詔馳驛江淮視財賦孟陽恃氣豪倨所至招金錢多補吏丨丨丨丨並唐書伏臘侍郎蕭炅不知書嘗與嚴挺之言稱伏臘為伏獵挺之曰省中豈容有丨丨丨丨乎乃出之本𫝊能計材臣張平叔國之材臣也計能析秋毫吏畏如夏日司㑹逾月綱條甚張况師旅未息調食方急倚成取濟非爾而誰白居易張平叔戸部侍郎制條奏利害李元絃歴工兵吏三侍郎上令宰臣及公郷以下猜擇堪為戸部者多有薦元絃者乃拜戸部侍郎元絃因丨丨人間丨丨及時議得失以奏之上大恱因賜衣一副本傳毎懲聚歛地卿之貳爰委典司理財先示於簡亷利物丨丨其丨丨唐太詔令李絳制以濟國用周有地官小司徒佐敷五教魏置度支尚書丨丨軍丨之丨政有餘地然後兼之常集授户部侍郎専判度支制必選國華地官之職邦教是先丨丨丨丨以從人望韓退之除崔羣制罷議開河國朝元祐五年王議者執開河减水之䇿戸部侍郎蘇轍上疏諫曰臣為戸部右曹云云户部休戚計在此河若復緘黙誰當言者推㫁在聖心盡罷其議通典執奏宣索栁約字元禮權戸部侍郎感激奮厲悉力盡言凡例宣索皆執奏以進周益公集俾參版部丨丨丨丨之繁初寮除李本制徃副民部丨丨丨丨孰如汝宜同上地官之貳下制民產上經國用丨丨丨丨實參總焉南豐擬制韓愈除崔羣制故地官之職邦教是先必選國華以從人望具官崔羣體道履仁外和内敏清而容物善不近名從容禮樂之間特達珪璋之表比參宻命宏並既多及貳儀曹升擢維允邁兹令徳蕩然休聲選賢與能于今雖重擇才均賦自古尤難徃慎乃司以服嘉命晦庵與鍾戸部書熹謹東向再拜致書侍郎執事熹昨得見於省户下忽忽五年中間來使閩部熹方退伏田里有俯仰出入之故雖不得瞻望履舄之餘光亦嘗以章少卿丈所致書輙為数字之記以通於左右是後乃不敢有所關白不自知其果能逹視聴否也比來同安銓伏薄書塵土中乃聞執事復為天子出使巴蜀萬里之外弛去通負緍錢之在宫者以数百巨萬計弭節來還天子嘉之下所議奏於四方擢執事置尚書省郎以計六曹二十四司之治可謂寵且榮矣又以執事通於君民兩足之義俾執事攝貳於版曹務以均節財用便安元元為職除日既聞四方幽顯無不恱喜以為執事必能以所嘗施於蜀者恵綏此民寛其財力之所不足以助天子仁厚清静之政也今執事之涖事􅁆月矣四方之聴未有所聞也熹不佞竊有所懐敢以請於下執盖熹間之天子憫憐斯民之貧困未得其職故数下寛大詔書弛民市征口筭與逃賦役者之布又詔稅民母會其踦嬴以就成数又詔遣執事使蜀弛其逋負如前所陳者熹愚竊以為此皆民所當輸官所當得制之有藝而取之有名者而猶一切蠲除不復頋計又出御府金錢以償有司是天子愛民之深而不以利為利也明矣而况於民所不當輸官所不當得制之無藝而取之無名若所謂虧少經摠制錢者乎熹以謂有能開口一言於上以天子爱民如此所宜朝奏而暮行也而公卿以下共事媕阿莫肯自竭盡以助聰明廣恩恵前日之為戸部者又為之變符檄急郵傳切責提刑提刑下之州州取辨於縣轉以相承急於星火奉行之官如通判事者利於賞典意外督趣無所不至此錢既非經賦賞入為民所逋貰官吏所攸盗而以一歳偶多之数制於定額責使償之自戸部四折而至於縣如轉圜於千仞之扳至其址而其勢窮矣縣將何取之不過巧為科目以取之於民耳而議者必且以為朝廷督責官吏補發非有與於民也此又與盗鐘掩耳之見無異盖其心非有所蔽而不知特藉此為說詿誤朝聴耳計今天下用縣以此為號而率取其民者無慮什之七八幸其猶有未至於此者則州日月使人持符來逮吏繫治撻擊以必得為效縣吏不勝其苦日夜相與撅其長官以科率事不幸行之則官得其一吏得其二三並縁為奸何所不有是則議者所謂督責官吏者乃所以深為之地而重困天子所甚爱之民也夫吏依公以侵民又陽自解曰此朝廷所欲得非我曹過也夫愚民安知其所以然者何哉亦相聚而怨曰朝廷不䘏我等耳嗚呼此豈民之所當輸官之所當得者耶其制之無藝取之無名甚矣夫以天子之愛民如此彼所當輸當得有藝而有名者猶一切出捐而無所吝况如此者惟其未之知耳一有言焉其無不聴且從矣而獨愛其言者何哉是執政任事之臣負天子也執事誠能深察而亟言之使所謂虧欠經總制錢者一日而罷去則州縣之吏無以藉其口而科率之議寢矣然後堅明約束痛加繩治敢以科率病民者使民得自言尚書省御史臺則昔之嘗為是者其罪亦無容矣於以上廣仁厚清静之風下副四方幽隐之望無使西南徼外巴寳卭莋之民夷獨受賜也豈不休哉熹踈逺之跡於執事有先君子之好而亦嘗得一再見辱教誨焉今也適在此位為可言者誠不自知其愚且淺思有補盛徳之萬分故敢獻書以聞詩集内署雄辭昔年丨丨振丨丨今日東都結去思宮女猶𫝊洞簫賦國人先録衮衣詩劉禹錫奉送李戸部侍郎自河南尹再除本官金門侍籍華昌却復文昌位别鶴重歸太乙池想到丨丨丨稱丨一時驚喜見風儀同上戸部郎中歴代沿革漢尚書郎一人主戸口墾田呉張温為戸曹郎魏有左民郎曹晋兼置右民郎曹東晋而下有民部曹梁陳為左右郎後魏為左戸曹郎北齊有左右民部曹隋初置侍郎二人煬帝改曰民部郎唐為郎中髙宗改為戸部龍朔為司元大夫後復故掌戸口土田賦役貢獻蠲免優復婣婚繼嗣之事以男女之黄小中丁老為帳籍以承業口分園宅均其土田以租庸調歛其物以九等定天下之戸以為尚書侍郎之貳其後以諸行郎官判錢穀而戸部度支郎官官失其職矣本朝官制見尚書下事類農部魏有丨丨郎中魏晋儀註人部魏為左人右人後又為丨丨人曹皆戸部也海錄碎事詞當髙構轉民部郎中時有叔姪争嫡尚書省不能㫁朝臣之議不决構㫁而合理上以為能勞之曰我聞尚書郎中上應列宿觀卿才識方之古人之言信矣嫡庶考禮教之所重哉請卿判數遍丨理惬丨意所不能及也賜米百石由是知名隋書氣高武儒衡遷戸部師時皇甫轉以宰相領度支剥下益上儒衡上疏論列儒衡丨岸丨雅唐書考堂唐張博濟為戸部郎中部有考堂天下嵗㑹計處博濟廢為貟外郎中㕔事制取都水監地為丨丨同上郎省初韋維為郎乃蒔栁于庭及虚心兄弟居丨丨對之輒欲容本傳郎官家韋維為郎自叔謙後至郎中者數人世號丨丨丨同上土山頭唐者郎中不自貟外郎拜者謂之丨丨丨果毅言便拜崇品有似長征兵士便授邉逺果毅景雲中趙謙光自大理正便遷戸部郎中而貟外郎賀渉遂戯詠曰貟外由來美郎中望不優寧知粉署裏翻作丨丨丨詩話戸部二妙韋維字文紀為戸部郎中善裁剖時員外郎宋之問善詩故稱丨丨丨丨唐書正元十子唐盧綸為戸部郎中有詩名於丨丨中與李端司空曙之徒名為丨丨形於圗畵以美其名同上儒衡風采武丨丨遷戸部郎論事有丨丨本傳王質方雅丨丨字華卿為戸部郎中以丨丨特立除諫議大夫劉禹錫為神道碑人曹掌計復以丨丨郎佐丨邦丨元㣲之行髙允恭制地官為郎杜牧韋退之制官為清秩郎丨皆丨丨丨杜牧韓制世尚儒學國朝淳化中戸部郎中張郁父正仕至戸部侍郎丨丨丨丨號書樓張家長編參地官之屬丨我丨丨丨丨首於時俊之科類要貟外郎賞其清俊唐戸部與吏部鄰司時吏部移牒令戸部列棘以偹交通呂太一為戸部貟外郎答曰眷彼吏部銓摠之司當須簡要清通何必設蘺樹棘丨丨丨丨聞其理行裴向為渭陽縣令奏課第一朝廷丨丨丨丨擢為戸部貟外郎涖事有聲狄仁傑為子光嗣為貟外郎丨丨丨丨奏議第一裴向累為櫟陽渭南令丨丨皆丨丨擢戸部貟外郎並周書掌戸口之事戸部貟外郎丨丨丨賦役貢獻蠲免優復嫺婚繼嗣丨丨唐百官志為尙侍之貳貟外郎丨丨書丨郎丨丨同上詩集上到青雲千里歸程三㐲天官新身徤馬翩翩行衝赤日加餐飯丨丨丨丨稳着鞭白居易送白敏中新役戸部貟外郎西歸不應列星唯愁貟外置丨丨丨丨文度支郎中歴代沿革漢有度支侍郎即郎中之任也歴魏晋宋齊後魏北齊並有度支郎中俱號為為侍郎煬帝但曰郎開皇三年改度支尚書為民部尚書始民部領之唐因焉武徳三年加中字龍朔二年改為司度大夫咸亨元年復故六典掌支度國用租賦多少之数物產豐約之宜每嵗計其所出而支其所用六典本朝度支判司事一人列六案度支案運發案支供案賞賜案掌法案知雜案以無職事朝官充凡朝度之政皆歸三司本司無所掌元豐官制行郎中貟外郎始實行本司事續會要初除陳向職畧參掌計度天下之經費以貢賦租稅之入而為之出小事則擬畫大事則諮其長神宗正史職官志餘見前户部尚書事類司度唐龍朔中改度支郎中為丨丨大夫咸亨復舊六典副知蘇弁授度支郎中丨丨度支事仍命立於正郎之首有丨丨之名自蘇弁始也同上振行舊說考功度支丨丨國史補分領唐以宰相丨丨度支唐故事自職狄梁公以度支之司天下利害部常闕人求之未得乃丨丨之唐職林判入判出唐故事度支案郎中丨丨貟外郎丨丨侍郎總統押案而已支度支用掌丨丨國用租賦多少之数毎嵗計其所出而丨其所丨太宗大竒崔仁師為度支郎中嘗奏皮支財物奏数千言手不執本太宗恠之令杜正倫齎本與仁師對唱一無差殊丨丨丨丨也當時爲笑正觀中勅下度支求杜若省郎以謝眺詩云芳洲采社若乃責方州貢之丨丨以丨丨筆談位參職綰尹某丨丨計㑹丨丨度支唐張鸑集年支歳計鳴鶴登朝舎雞伏省轉筋之敏未見稱奇聚米之能無聞播美張蒼之善筭國用詎肯留情馮勤之力計軍儲曽何介意丨丨國用為政之嘉猷丨丨軍儲邦家之要務注西京雜記曰曹元理善筭回筋知二國之粟不差升斗也同上通知經費國朝徐宗說在度支㑹右曹金部皆闕官因令兼領三曹金穀􅊏悉之地而宗說素有心計於天下經費出入盈縮之数莫不通知老吏為之歛手中興繫年錄參掌經費丨丨計度天下之丨丨以貢賦租稅之入而為之出小事則擬畫大事則諮其長神宗正史職官志支度要部胡文恭行盧成制司度典貳財物多寡之数物生豊約之宜丨丨之曹丨丨為重南豊除陳良制金部郎中歴代沿革漢置尚書郎四人其一人主財帛委輸盖金部郎曺之任也歴魏晋宋齊後魏北齊並有金部郎梁陳隋為侍郎煬帝但曰郎唐因之武徳三年加中字六典龍朔中為司珍大夫唐職林咸亨復天寳改司金郎中至徳初復舊六典本朝金部判司事一人以無職事朝官充凡庫藏出内之節金寶財貨之用皆歸於三司而權衡度量之制主於太府寺本司無所掌元豊官制行郎中貟外郎始實行本司事續㑹要初除晁端彦焉職畧参掌給納天下之帛幣計其嵗所輸数歸於應受之府藏以待邦國之用而鉤考平凖市舶摧易商稅香茶塩礬之数以周知其登耗凡造升斗尺秤皆以法頒其禁令若事應諮决擬書者視度支分案七左藏右藏錢帛𣙜易請給法案知􅄂見前戸部尚書事類職金丨丨掌凡金玉錫石丹青之戒令周禮主財漢置尚書郎四人其一丨丨帛委輸盖金部郎曺之任也職林無愧隋盧昌衡為祖孝徴所薦遷金部郎孝徵曰吾用盧子均為尚書郎自謂丨丨幽明矣隋書稱職唐元季方為金膳二郎中號丨丨調掌准格建中初罷塩銕等天下錢穀委金部倉部中書門下㨂兩司郎官准格式調掌諒直有風蕭穎士終於揚州功曹子存為金部員外郎有丨丨功曹之丨並唐書財貨之用掌庫藏出内之節金寳丨丨丨丨權衡度量之制皆總其文籍而頒其節制六典藏錢之府大寳曰位夏陳納貢之書聚人曰財漢有丨丨丨丨莫不取之以道用之以時不役人以奉身不遣人以供國自鹿䑓重賦東夏為墟鴻都賣官西園成市張鸑集對及治道木朝王師愈曰召除金部郎中数召對言事上孝宗賜書比聞奏丨煩丨丨丨之具而未詳也尚有可禆政體而宜於今者亟復條奏其眷待之渥一時在廷之臣莫得望焉朱晦庵集不督虛集王師愈為金部郎戸部尚書楊倓取諸郡積逋緡錢七百萬付金部使督之公曰此錢徒有名耳督之未必有得而文移一下所櫌者不知㡬何人且中外一體若邦計未裕不若歸誠君父以幸寛免豈宜舉此虚籍以㒺上而病民耶持其事下同上司金劇部丨丨丨丨命汝典之曲阜除孫升制司珍劇曹郎之文昌之髙選丨丨民部丨丨曲阜陳紘制出納之政財用金榖有丨丨丨丨權衡度量有制作之法司珍之任寔典治焉南豊除晁端彦制倉部郎中歴代沿革周廪人倉人之職也魏晋而下皆有倉部郎中梁陳為侍郎宋齊以度支尚書領之後魏有太倉尚書後周有司倉下大夫隋初制倉部侍郎煬帝止曰倉部郎唐武徳三年加中字龍朔二年改司庾大夫咸亨復天寳中為司儲郎中至徳復本朝倉部判司事一人以無職事官充凡倉庾受納租稅出給祿廪之事皆歸三司而别置提㸃倉塲官以督察本司續㑹要初除韓正彦焉職畧参掌國之倉塲儲積及其給受之事神宗正史職官志列案六倉塲上供給納粜米掌法知雜建炎三年詔罷司農寺本寺諸倉塲事務𨽻倉部紹興三年復舊中興㑹要事類廪人倉部郎中周丨丨倉人之職也六典及職林又丨丨掌九穀之数以待國之匪頒賙賜稍食以嵗之上下数邦國以知足否以詔國用以詔年之凶豐周禮倉人見上注又丨丨掌粟入之藏辨九穀之物以侍邦用同上沛然無言唐畢諴為倉部郎中故事要家勢人以倉駕二曹為辱諴丨丨如處美官丨丨宰相知之還職方郎中兼侍御史知雜唐職林凝然不附孟簡為倉部貟外郎王叔文為戸部侍郎簡為其属中立正色丨丨丨丨唐書出内之事掌天下儲庫丨丨租稅禄粮倉廪丨丨六典及職林出内之常丨丨必受有司丨丨貳上下之價則茫昧者敝雜苦良之貨則豪右者受嬴惟一惟公乃㒺不同惟平惟實乃㒺不吉元㣲之行范季睦制參掌儲積國朝丨丨國之倉塲丨丨及其給受之事均定支移嵗以應用芻粟前期關度支丨丨丨丨折變之数並四朝志典倉庾政倉庾賦入之政禄廪賙賜之法䑓郎典領列於右曹南豊韓正彦制命廪人職國朝嵗漕東南粟六百石以實中都兹用丨汝以丨丨之丨曲阜王宗望制以待邦用辨九穀之物丨丨丨丨南豊制無曠爾官惟當於㑹計丨丨丨丨曲阜制古今合璧事類備要後集卷二十八
