body:
  text: 古今合璧事類備要續集卷四宋謝維新撰家世門家學附經學學史學學文學學天文律兵歴代源流求古人之家學六經以前無聞也攷之傳記惟周公有撻伯禽之事孔子有訓伯魚以詩禮之言繼是則有曾子養曽晢曽元養曽子一家父子藹然以孝道著聞論家學者其始此乎然周禮出於周公六經備於孔子孝經成於曾子豈亦以是而相𫝊乎自六經以來世守其學者代不乏人且不特此也有以史學有以文學有以字學有以律學又有以兵學其家世相𫝊亦不可勝紀其來蓋亦逺矣事類菑播見前集不肖子門箕裘見前集有子門義方見前集訓子門孝養曽子養曽晢必有酒肉將徹必請所與問有餘必曰有曽晢死曽元養曾子必有酒肉將徹不請所與問有餘曰亡矣將以復進也此所謂養口體者也若曽子則可謂養志也事親若曽子者可也孟過庭見前集有子門書訓趙簡子之子長曰伯魯幼曰无恤將置後不知所立乃丨丨戒之辭有二簡以授二子曰謹識之三年而問之伯魯不能舉其辭求其簡已失之矣問無恤誦其辭甚習求其簡出諸袖中而奏之於是簡子以為賢以為後通鑑呉氏季子呉祐字季英父恢為南海太守祐年十二隨從到官恢欲殺青簡以冩經書祐諫曰今大人踰越五嶺逺在海瀕舊多珍怪上為國家所疑下為權戚所望此書若成則載之兼兩若馬援以薏苡興謗王陽以衣裳邀名嫌疑之間誠昔賢所慎也恢乃止撫其首曰呉氏世不乏季子矣荀氏髙陽荀寂字季和荀卿十一世孫少有髙行慱學而不好章句名為俗儒所非名賢李固李膺等皆宗師之有子八人儉緄靖燾注爽肅專並有稱名時人謂之八龍初荀氏舊里名西豪頴隂令渤海范康以為昔髙陽氏有才子八人今荀氏亦有八子故改其里曰髙陽里靖有至行不仕號曰𤣥行先生爽字慈明幼而好學穎川為之語曰荀氏八龍慈明無雙儒家文林崔駰祖父篆駰年十三能通詩易春秋盡通古今訓詁百家之言善祝文與班固𫝊毅齊名常以典籍為業子瑗𫝊父業明天官厯数京房易𫝊六日七分與馬融張衡相友瑗子寔少沈靜好典籍桓帝時舉至孝獨行除為郎崔氏世有美才兼沈淪典籍遂為儒家文林並本𫝊州郡禮命楊賜字伯獻父秉祖震子彪世𫝊家學篤志愽聞常退居隠約不荅州郡丨丨本𫝊禮法聞家崔祐甫字貽孫炳之子也世以丨丨為丨丨第進士唐本𫝊掞之八人裴漼父丨丨兄弟丨丨皆擢明經任臺省州刺史雅性友愛於東都治第八院相對寛子諝字士明擢明經𢎞機曾孫述韋丨丨丨丨家厨書二千卷述為兒時誦憶畧遍父景駿為肥鄉令述從至官行沖景駿姑子也為時儒宗嘗載書數車自隨述入其室觀不知寢食行沖異之使屬文受紙輒就行沖曰外家之寳也弟逌迪學業亦亞述本𫝊易學𫝊子臨梁丘賀從京房受易年老終官丨丨丨亦入說為黄門郎甘露中奉使問諸儒於石渠臨學精熟專於京房法琅琊王吉通五經聞臨説善之時宣帝選髙才郎十人從臨講吉乃使其子郎中駿上疏從臨受易授子康髙相治易其學亦无章句專說隂陽灾異自言出於丁將軍傳丨丨丨以明易為郎書學金籯見前集訓子門竹簡魯共王好治宫室壞孔子舊宅以廣其居於壁中得先人所藏古文虞夏商周之書及𫝊論語孝經皆科斗文字王又升孔子堂聞金石絲竹之音乃不壞宅悉以書還孔氏科斗書廢已乆時人無能知者以所聞伏生之書考論文義定其可知者為𨽻古文更以丨丨冩之増多伏生二十五篇云云其餘錯亂磨滅弗可復知悉上送官藏之書府以待能者承詔為五十九篇作𫝊於是遂研精覃思慱攷經籍採摭羣言以立訓傳約文申義敷暢厥㫖庶幾有補於將來尚書序石渠尚書世有歐陽生初師事倪寛得其學世世相𫝊至曽孫髙子陽為􅀶士髙孫地餘長賔以太子中庶子授太子後為􅀶士論丨丨元帝即位地餘侍中貴幸世傳伏湛先世祖勝所謂濟南伏生也教授數百人自伏生以後丨丨經學本𫝊世宗伏氏自東西京相襲為名儒以取爵位注謂伏生以後至伏湛中興而桓氏尤盛自榮至典丨丨其道父子兄弟代作帝師受其業者皆至卿相顯乎當世自榮至典五世本𫝊從父學張酺字孟侯少從祖父充受尚書永平九年顯宗為四姓小侯開學於南宫置五經師酺以尚書教授數講於御前以論難當意除為郎本𫝊詩學韋氏學韋賢治詩事愽士大江公及許生至丞相𫝊子𤣥成以淮陽中尉論石渠亦至相及兄子賞以詩授哀帝由是魯詩有丨丨丨翟氏學翟酺字子超四世𫝊詩張氏學魯詩有張唐禇氏之學張生兄子㳺卿為諫議大夫以詩授元帝其門人琅琊王扶為泗水中尉陳留許晏為愽士由是張家有許氏學春秋學世業嚴彭祖春秋學授瑯琊王中家丨傳丨世學鄭衆字仲師從父受左氏春秋精力於學明三統歴兼通易詩知名於世傳父業世言左氏者多祖於興而賈逵自傳其父業故有鄭賈之學逵字景伯父徽從劉歆受左氏春秋逵丨丨丨自為兒童常在太學鄭興賈逵𫝊禮記學慶氏學曹褒父充持慶氏禮為􅀶士褒結髪𫝊充業亦徴拜􅀶士􅀶物識古為儒者宗教授諸生千餘人丨丨丨遂行後本𫝊戴氏學大戴禮學授琅琊徐良游卿為愽士州牧郡守家世𫝊業小戴授梁人楊仁季卿楊榮子孫仁為大鴻臚家世𫝊業史學二班司馬遷班固父子遷父談固父彪其言史官載籍之作大義燦然議者咸稱二子有良史之才又二班懷文裁成帝墳比良遷董兼麗卿雲彪識皇命固迷世紛二馬司馬談謂子遷曰予先周室之大史也自上世嘗顯功名於虞夏典天官事司馬氏典周史至漢談為太史公自序覽羣史劉子元名知幾父藏器為授古文尚書業不進父怒楚督之及聞為諸兄講春秋左氏冒往聽退輒辨析所疑歎曰書如是兒何怠父竒其意許授左氏踰年遂通丨丨丨與兄知柔俱以善文詞知名擢進士第中宗時領史事居集贒冕栁芳子字敬叔􅀶學冨文辭且世史官父子並丨丨丨院文學𤣥文童烏揚子雲之子子雲作太𤣥經童烏九齡而與我丨丨楊子補注李邕少知名始父善注文選釋事而忘意書成以問邕邕不敢對善詰之邕意欲有所更善曰試為我補益之邕附事見義善以其不可奪兩書並行弱敏悟蘇瓌字昌容擢進士第子頲字廷碩丨丨丨一覽至千言輙覆誦第進士又舉賢良方正異等工辭章顔真卿字清臣師古五世從孫􅀶學丨丨丨開元中舉進士又擢制科下筆成章韓思彦字英達丨丨丨丨子琬舉茂材又舉文藝優長賢良方正連中講學不廢崔融擢八科髙第曽孫從丨丨丨丨擢進士第為推官本𫝊及進士第韋思謙名仁約丨丨丨丨子承慶嗣立並擢進士第後承慶鳳閣舎人武后召嗣立謂曰爾父嘗稱二子忠且孝堪事朕比兄弟稱職如爾父言今使卿兄弟自相代即拜鳳閣舎人嗣立孫𢎞景又擢進士第累遷吏部侍郎律學寛平郭躬字仲孫家世衣冠父𢎞習小杜律躬少𫝊父業講授嘗數百人後為郡吏辟公府後本𫝊家世掌法務在丨丨同上矜嚴竇參字時中誕四世孫學律令為人丨丨正直果於斷以䕃累遷監察御史兵學奢括趙括自少時學兵法以天下莫能當嘗與其父奢言兵事奢不能難然不謂善括母問其故奢曰兵死地而括易言之趙若將括破趙軍者必括也後果然史記梁籍項梁者楚將項燕子也嘗殺人與兄子籍避仇呉中籍少時學書不成去學劒又不成項梁怒之籍曰書足以記名姓而已劒一人敵不足學學萬人敵於是項梁乃教以兵法同前廣陵李廣其先曰李信秦時為將至廣世世受射文帝時以良家子從軍擊胡用善射殺酋虜多為郎騎常侍匈奴號飛將軍與從弟李蔡從大將軍擊右賢王有功中率封為樂安侯子當戸蚤死有子陵將兵擊胡本𫝊贒忌辛丨丨武賢子隨常惠屯田烏孫與歙侯戰䧟陣郤敵惠奏其功子三人皆有將帥風以勇武顯聞父子著節本𫝊父風班超子勇有丨丨永平元年西域反叛以勇為軍司馬本𫝊世將陳龜字叔珍家世邊將便習弓馬雄於北州少有志氣拜京兆尹後本𫝊世喜武力竇威字文符家世貴子弟皆丨丨丨獨威尚文兄子軌從秦王討王世充軌兄子抗抗子靜竇宗自魏迄唐攴胄扶疏數百年所憑厚矣並本𫝊去病孤子王忠嗣年九歲父戰死𤣥宗憐其忠授忠嗣尚輦奏御入見帝伏地號泣𤣥宗撫之曰此丨丨丨也須壯而將之飬禁中及長雄毅寡言有武畧上與論兵應對蠭起帝器之曰後日爾為良將興貴曾孫李抱玉本安丨丨丨丨閑騎射少從軍為人沈毅有謀李光弼引為禆校天寳末禄山亂上言恥與逆臣共宗賜姓李兵法田𢎞正字安道丨丨丨丨善騎射承嗣愛之以為必興吾家名之曰興世以武力李晟字良器丨丨丨丨仕十五子其聞者愿憲遡聽家訓附父訓母訓歴代源流人有言天下國家天下之本在國國之本在家故大學之治國平天下之道而必以齊家為本也天子不能齊其家則不可以化天下諸侯不能齊其家則不可以化一國卿大夫不能齊其家則不可以化一邑士庶人不能齊其家則亦不能以化誨其子弟自天子以至于庶人壹是皆以齊家為第一義故舜釐降二女于溈汭禹娶于塗山辛壬癸甲啓呱呱而泣予弗子商人亦立愛自親始周文王刑于寡妻至于兄弟以御于家邦武王之事文王一飯亦一飯再飯亦再飯周公抗世子法於伯禽訓家之道振古如茲况後世乎否則逸居而無教也其去禽獸也幾希事類冠見趙文子丨丨欒武子武子曰善哉昔吾逮事莊主華則榮矣實之不知請務實乎見中行宣子宣子曰賢哉惜也吾老矣見范文子文子曰而今可以戒矣夫賢者戒驕故興王賞諫臣佚王罰之吾聞古之王者政徳既成又聽於民於是乎使工誦箴諫於朝在列者獻詩使勿兠風聽臚言於市辯夭祥於謠考百事於朝問謗譽於路有邪而正之盡戒之術也先王疾是驕也見郤駒伯駒伯曰善哉然而壯不若老者多矣見韓獻子獻子曰戒之此謂成人始與善善進不善蔑由進矣始與不善不善進善亦蔑由進矣如草木之産也各以其物人之有冠猶宫室之有墻屋也糞除而已何加焉見智武子武子曰成宣之後而老為大夫非恥乎成子之文宣子之忠其不可忘乎夫成子道前志以佐先君道法而卒以政可不謂文乎夫宣子盡諫於襄靈以諫取惡不憚死進也可不謂忠乎吾子勉之有宣子之忠而納之以成子之文事必濟見若成叔子叔子曰抑年少而執官者衆吾安容子見温季子季子曰誰不可以求乎見張老而語之張老曰善矣從欒伯之言可以滋范叔之教可以大韓子之戒可以成物偹矣志在子若夫三郤亡人之言也何述焉智子之道善矣是先主覆露子也國晉語嫁戒大夫之冠也父命之女子之嫁也母命之往送之門戒之曰往之女家必敬必戒母違夫子以順為正者妾婦之道也孟子女誡曹大家作試兒江西風俗兒生一朞用珍寳服玩飲食試之顔氏家訓教婦諺曰丨丨初來教兒嬰孩誠哉是同上女則唐長孫皇后作丨丨顔氏家訓北齊黄門侍郎顔之推作王氏家訓王通曰甚矣王道難行也吾家頃銅川六世矣未嘗得宣其用退而咸有述焉蓋先生宋朝王先生之述曰時變論江州府君之述曰五經決録晉陽穆公之述曰政大論同州府君之述曰政小論安康獻公之述曰皇極獲議銅川府君之述曰興衰要論余小子讜覩成訓勤九載矣楚督其業見前覽羣史下問志何語獨孤及為兒時誦孝經父試之丨曰兒丨丨丨對曰立身行道揚名於後世宗黨竒之天寳初以道學髙第本𫝊稱名畏義杞文舒為其子弟作名皆依謙以見意故後兄子黙字居靜沈字處道子渾字仲𤣥深字道沖遂作書戒之曰以𤣥黙沖虚為名欲使爾曹丨丨丨丨也終身遜路朱仁軌字徳容隱居養子嘗誨子弟曰丨丨丨丨不五百步終身遜畔不失一段唐朱敬則𫝊詩集責懶惰白髪被兩髸肌膚不復實惟有五男兒總不好紙筆阿舒已二八丨丨故無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覔梨與栗天運茍如此且進盃中物陶潜責子勉後生養子不教父之過訓導不嚴師之惰師嚴父教兩無外學問不成子之罪煖衣飽食居人倫視我笑談如土塊攀髙不及下品流稍遇賢才無與對丨丨丨力相誨投明師莫自昧一朝雲路果然登姓名及等呼先輩室中若未結親姻自有佳人求匹配勉旃汝等各早脩莫待老來空自悔司馬温公古今合璧事類備要續集卷四
