body:
  text: 古今合璧事類備要外集卷五十九宋謝維新撰器物門車附御車輶戰車輪軒輿輦轓軺輞輜軿重車輈轅軫轂軌軾轍衡輠綏器物發揮車輅也陸行用之所以引重而致遠古者正名百物車有小大各適其用而名亦不無辨焉輅大車軺小車輶輕車輦挽車輼輬卧車輜重載衣物車以至兵車一也有軘車䡴車轈車之别䘮車一也而有輀車䡭車輴車之辨猶未也又就車析而言之輪有輻輻亦曰轑輇輪無輻者轂輪之心轂三十輻轂小穿曰軹所以納輻也轂端鐵曰輨轄轂飾曰軧軸頭曰轊車脂轂曰輠􅬈烏木反又其盛膏器礙車輪為軔輿車之所以載者也車闌曰軨横軨曰轛車箱曰轓車􅀈曰輞車羽曰􅀈都鄧反車耳曰䡊反車前􅀈曰軾軾中䡏軾前䡄范驂馬内轡繫軾前者曰軜音納􅵬車横木軫車後横木轐步篤反車伏兔亦曰軧車轅輈直轅䡽􅀈縳曰􅀢几足切轅端持衡木曰輗以縳軛轅端上曲鈎衡曰軏車軛下曲者曰軥渠拘反軌轍皆車之跡綏又上車索遽數之不能終其物覼縷以數之則雖更僕未可也然造車自輿始察車又自輪始輪輿其車之要歟事類轉蓬聖人觀丨丨而為車淮南子椎輪夫丨丨為大輅之始大輅寧有丨丨之質服車五丨丨丨乗孤乗夏篆卿乗夏縵大夫乗墨車士乗棧車庶人乗役車並禮中車䘮車五王之丨丨丨乘木車蒲蔽大榠尾槖䟽飾小服皆䟽素車棼蔽大榠素飾小服皆素薻車薻蔽鹿淺榠革飾車雚蔽然榠髤飾漆車藩蔽豻榠雀飾禮中車車轞轞大丨丨丨車轔轔有丨丨丨並詩庳使高孫叔敖為楚相俗好丨車楚王以為不便於馬欲下令丨丨其車相曰令數下人不知所從王必欲高車臣請教閭里使高其梱乗車皆君子君子不能數下車從之半歳民悉自高其車此不教而人從化也史記澤可鑑齊慶封獻車於季武子美丨丨以丨形也展莊叔見之曰車甚丨人必瘁宜其亡也左載䓤靈陽虎盡借邑人之車鍥其軸麻約而歸之丨丨丨寢其中而逃追而得之注鍥刻也䓤靈輜車名定十年乗衷甸衛太子使渾良夫丨丨丨兩牡注衷甸一轅卿車哀十一年引避匿藺相如拜上卿廉頗不肯為之下相如出望見廉頗丨車丨丨史本傳虚左迎魏公子乗丨丨丨自迎侯生通鑑死請車顔淵丨顔路丨子之丨以為之槨出無車馮驩彈鋏歌曰長鋏歸來乎丨丨丨通鑑門多車陳平以席為門丨外丨長者丨轍前本傳門容車于定國父于公始其閭門壞父老共治之于公曰可高大閭丨令丨駟馬高盖丨本傳安車迎漢武帝丨丨蒲輪丨申公小車入車千秋年老上憂之朝見得乗丨丨丨宫殿因號車千秋戱車郎張綰以丨丨為丨奉車尉丨丨都丨掌御乗輿車前百官表乗牛車漢初將相或丨丨丨伏熊軾後漢列侯丨丨丨皂盖賜車蓋黃霸字次公任揚州刺史宣帝下詔丨丨丨特高一丈别駕主簿車緹油屏泥於軾前以彰有德賜車馬桓榮為太子少傅丨以輜丨乗丨大㑹諸生陳其車馬印綬曰今日所丨稽古之力也可不勉乎均茵憑汲黯與周陽由同列共車未嘗敢丨丨丨褰帷幔梁曹景宗為領車性躁動出行常欲丨車丨丨左右諫以位望隆重不宜然景宗謂所親曰吾昔在鄉里騎快馬如龍拓弓弦作礕礰聲箭如餓鴟呌乎澤中逐麞數肋射之渇飲其血飢食其胃甜如甘露漿覺耳後生風鼻頭出火使人忘死今來揚州作貴人路行開車幔小人輒言不可閉置車中如三日新婦於邑使人氣盡駕壹馬鮑宣子都為豫州牧郭欽奏宣行部乗傳去法駕丨丨丨舍宿鄉亭坐免罪駕駟馬太康四年詔依漢故事給九卿朝車丨丨丨及安車各一乗如流水馬皇后見親戚車丨丨丨馬如龍甚不悦如歷塊駕齧䣛驂乗旦王旦執靶韓哀附輿縱馳騁騖忽若景靡過都越國蹶丨丨丨追奔電逐遺風周流八極萬里一息何其遼哉聖主得賢臣頌乗驢車張楷公超家貧無業常丨丨丨至市賣藥足給而還又薊子訓常丨丨丨乗羊車晉衛玠風神秀異揔角丨丨丨入市丨見者皆以為玉人又䕶軍羊琇輙丨丨司𨽻劉毅劾其罪晉輿服志乗柴車謝夷吾堯卿遷鉅鹿守行春丨丨丨刺史上其儀序失中損國典左轉為下邳令乗葦車袁閎夏甫為沛相丨丨丨惟短轅王導妻曹氏性妬導憚之乃密置衆妾於别館以處之曹氏知而將往導恐被妻辱遽命駕猶恐遲以所執麈尾柄驅牛而進司徒蔡謨聞之戯導曰朝廷欲加公九錫導弗之覺但謙退而已謨曰不聞餘物丨有丨丨犢車長柄麈尾導大怒謂人曰吾往與羣賢共遊洛中何曽聞有蔡克兒也乗薄苯宋劉凝之妻郭不事榮華夫妻共丨丨丨車出市貿易為村里所誣一年三輸公調崔衍車銘乗車必䕶輪治國必愛民李尤車銘圓蓋象天方輿法地輪法陰陽柳宗元説車楊誨之將行柳子起而送之門有車過焉指馬而告之曰若知是之所以任重而行於世乎材良而器攻圎其外而方其中然也材而不良則速壞工之為功也不攻則速敗中不方則不能以載外不圓則窒拒而滯方之所謂者箱也圓之所謂者輪也匪箱不居匪輪不塗吾子其務法焉者乎曰然曰是一車之説也非衆車之説也吾將告子乎衆車之説澤而杼山而侔上而輊下而軒且曵祥而曠左革而長轂以㦸巢焉而以望安以愛老輜以蔽内垂綏而以畋載十二旒而以廟以郊以陳于庭其類衆也然而其要存乎材良而器攻圓其外而方其中也是故任而安之者箱達而行之者輪恒中者軸挶而固者蚤長而撓進不罪乎馬退不罪乎人者轅却暑與雨者盖敬而可伏者軾服而制者馬若牛然後衆車之用具今楊氏仁義之林也其産材良誨之學古道為古辭冲然而有光其為工也攻果能恢其量若箱周而通之若輪守大中以動乎外而不變乎内若軸攝之以剛健若蚤引焉而且御乎物若轅高以逺乎汚若盖下以成乎禮若軾險而安易而利動而法則庶乎車之全也詩之言曰駟牡騑騑六轡如琴孔氏語曰左為六官右為執法此其以達於大政也凡人之質不良莫能方且恒質良矣用不周莫能以圎遂孔子於鄉黨恂恂如也遇陽虎必曰諾而其在夾谷也視叱齊侯類蓄狗不震乎其内後之學孔子者不志於是則吾無望焉耳矣誨之吾戚也長而益良方其中矣吾固欲其任重而行於世懼圓其外者未至故説車以贈司馬公飯車天雨迃夫出見飯車息於高蹊者指謂其徒曰是車也將覆不久矣行未卜步聞讙聲顧見其車已覆其徒謂曰子何用知之迃夫曰吾以人事知之夫天雨道濘而蹊獨不濕又狹而高是衆人之所趣也而車不量其力固狹擅高久留不去以妨衆人之欲進者其能無覆乎禍有鉅於此者奚飯車之足云御車王路丨五丨一曰玉路錫樊纓十有再就建太常十有二斿以祀二曰金路鈎樊纓九就建大旂以賔同姓以封三曰象路朱樊纓七就建大赤以朝異姓以封四曰革路龍勒條纓五就建大帛以即戎以封四衛五曰木路緇樊鵠纓建大麾以田以封蕃國后路丨五丨一曰重翟錫面朱總二曰厭翟勒面繢總三曰安車彫面鷖總皆有容蓋四曰翟車貝面組總有握五曰輦車組輓有翣羽蓋彤車堯丨丨乗白馬史本紀鸞車有虞氏因彤車而制丨丨通典又丨丨有虞氏之路車也記明堂鉤車夏后氏因鸞車而制丨丨通典禹乗丨曰予丨四載注陸用車殷輅乗丨之丨語載與俱周西伯遇太公於渭水之陽丨丨丨歸史齊世家下而訪武王丨車丨丨箕子中副車張良為韓報仇彊秦東見倉海君得力士為鐡錐重百二十斤徂擊秦皇誤丨丨丨前本傳乗王車項羽圍漢王榮陽將軍紀信詐丨丨丨黄屋左纛曰食盡漢王降楚高祖紀宋昌驂乗文帝自代王迎立令丨丨丨丨本紀趙談驂乗文帝朝東宫丨丨丨丨盎伏車前曰臣聞天子所與共六尺與者皆天下豪英今漢雖乏人陛下奈何與刀鋸之餘共載於是上笑下丨丨袁盎傳趙温同輿後漢獻帝西都與侍中丨丨丨車丨輦至長安封江南侯為司空夏侯同載魏太祖與丨丨惇丨車丨諸將無得比戰車戎車武王丨丨三百兩書牧誓革車武王丨丨三百兩孟元戎六月宣王北伐也云云丨丨十乗以先啓行小戎丨丨美襄公也備其兵甲以討西戎云云丨丨俴収五楘梁輈游環脅驅陰靷鋈續文茵暢轂駕我騏􅑓並詩軘車晉人懼彘子趙旃之怒楚師也使丨丨逆之左宣十三年巢車楚子登丨丨以望晉軍注丨丨車上為櫓成十六年武剛衛青見匈奴以丨丨車自環為營前本傳偏廂馬隆討羗依八陣圖作丨丨車地廣為鹿角車營路狹則為木屋施於車上且戰且前弓矢所及應弦而倒晉本傳車毁堞唐侯君集討高昌鼓而前賊嬰城自守遣諭之不下及刋木塞塹引撞車毁其堞飛石如雨所向無敢當因拔其城車繚營房琯討賊用春秋時戰法以丨二千乗丨丨騎步夾之戰敗並唐本傳雙輪皮籬建炎元年李綱言步不足以勝騎騎不足以勝車請以車制頒於京東西路使製造而教習之用繪圖進呈其法用靖康間統制官張行中所創兩竿丨丨上載弓弩又設丨丨以捍矢石下設鐵桾以衛人足長兵禦人短兵禦馬傍施鐵索行則布以為陣止則聨以為營每車用卒二十五人四人推竿以運車一人登車以發矢餘執軍器夾車之兩傍每軍二千五百人以五之一為輜重及衛兵餘當車八十乗即布方陣則四面各二十乗而輜重處其中諸將皆以為可用乃命兩路憲臣總領中興係年録偏廂鹿角王彦恢拒馬車詳見後周旋應用東京留守宗澤募義士守京師且自製勝戰車千二百乗每乗用五十有五人運車者十有一執器械輔車者四十有四丨丨曲折可以丨丨衝擊如神紹興二年王彦恢制神武戰車下安四輪略同飛虎頂張布惟以避矢石傍斜丨丨其用丨丨又有拒馬車一人之力可以轉用比之蒙衝偏廂鹿角此尤至要並同上軒魚軒齊侯使公子無虧戍曹歸夫人丨丨注以魚皮為飾鶴軒衛懿公好丨鶴有乗丨者並左閔十年犀軒齊師謂夷儀人曰得敝無存者以五家免乃得其尸與之丨丨與直蓋左定九年意兹乗齊侯斂諸大夫之軒唯邴丨丨丨軒左定十三年良夫乗孔氏之竪渾丨丨衛太子與之言曰茍使我入獲國服冕丨軒三死無與左哀十五年輦金玉飾周穆王馭黃丨碧丨之輦從朝及暮而窮宇宙之内徧焉王子年拾遺記翣羽蓋王后輦車有丨丨丨注以羽作小盖翳日通典輦其母宋南宫萬奔陳以乗車丨丨丨一日而至注乗車非兵車駕人曰輦左莊十二年文帝止漢文帝每朝郎官上書流未嘗不止輦受其言袁盎傳文帝過丨丨輦丨問馮唐曰父老何自為郎馮唐傳班女辭成帝班媫伃帝游後庭嘗欲同輦載辭曰三代末廼有嬖女今欲同輦得無近似之乎上善其言而止謝安獲司車記里諸車過江亡失制度而謝安率意造焉及獲京師舊輦形制無差晉輿服志劉裕獲丨丨執慕容超丨金鈿輦通典道武制後魏丨丨帝天興初始修軒冕丨乾象輦羽葆圓盖盡日月五星二十八宿天街雲䍐大禮御唐高宗不喜乗輅每有丨丨則丨輦至武后以為常𤣥宗以輦不中禮廢而不用並通典軺軺車丨丨者古之將軍車也一馬曰丨丨軺傳二馬曰丨丨車並晉輿服志輜軿漢貴丨丨輜軿而賤軺車晉賤丨重軺車而丨輜軿並晉輿服志出入乗王丨丨閭里丨輜軿車五代史重辟重梁山崩晉侯以傳召伯宗伯宗丨丨曰辟傳重人曰待我不如捷之速也注重辟之車左成二十五年輦重孟氏之臣秦堇父丨丨如役注步挽重車以從師左襄十年間道絶漢遣韓信張耳擊趙李左車説成安君曰云云願足下與臣竒兵三萬人從丨丨丨其輜重云云願君留意輶車鸞鑣輶車丨丨載獫猲驕詩四鐵輪輪人為丨丨丨輪斬三材必以其時三材既具巧者和之注三材所以為轂輻牙也周禮考工記輪扁斵威公讀書於堂上丨丨丨輪於堂下輪扁曰斵輪徐則甘而不固疾則苦而不入不徐不疾得之於手而應之於心口不能言有數存焉於其間臣不能以喻臣之子臣之子亦不能受之於臣行年七十而老斵輪莊天道篇左輪朱殷師陳于鞌晉解張御卻克齊侯曰余始翦滅此而朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御丨丨丨丨豈敢言病吾子忍之左威二年隻輪不返晉人與姜戎要而擊之殽匹馬丨丨丨丨者注倚輪一隻之輪倚居宜反或於綺反穀梁僖三十三年建大車輪狄虎彌丨丨丨之丨而蒙之以甲以為櫓左執之右拔㦸以成一隊左襄十年抽矢叩輪鄭人使子濯孺子侵衛衛使庾公之斯追之云云丨丨丨丨去其金發乗矢而後反孟離婁下埋於都亭張綱為御史在八使之中丨輪丨洛陽丨丨云􅉘狼當道安問狐狸遂劾梁冀也摧於太行魏武帝時北登太行山羊腸坂詰曲車輪為之丨闕蜀林知元所居有茂林脩竹為山石之娛嘗丨丨丨丨命僮牽之隨意所止九國志輿坤大丨為丨輿易説卦蓄閑大丨九三良馬逐曰丨輿衛剥載丨卦上九君子得輿象曰民所丨也壯大丨于丨輿之輹並易周人尚丨丨丨輿禮冬官考工記武公在左史倚相曰昔衛丨丨丨輿有旅賁之規國楚語韓哀附丨丨丨輿王褒聖主得賢臣頌輿上殿魏鍾繇元帝時為太傅有膝疾拜起不便時華歆亦以高年􅔂朝見皆使載輿虎賁丨丨丨就坐見三公有疾遂為故事輿至朝濮恭王泰帝以泰大腰腹聽乗小丨丨丨輿至闕李綱以足疾賜步輿聽乗至闕輿入殿房𤣥齡病稍閒召許肩丨丨丨肩輿朝韋思謙轉納言辭疾不許丨丨以丨聴子孫侍腰輿入禇無量復故官以耆老隨仗聴徐行又為設丨丨許乗丨殿中七寶輿崔寜嚴武奏為漢州刺史吐蕃引雜羗冦西山於是武遣寜将而西城拔還武大悦裝丨丨丨迎入成都以誇千軍黃金輿黃巢乗丨丨丨衛者皆繡袍華幘陷京師入自春明門錦車繡輿咸通十四年迎佛骨鳯翔京師丨丨丨丨載歌舞從之轓車箱朱兩轓漢詔吏者人之師也車服宜稱六百石以上皆長吏也而與民無異令二千石丨丨丨千石至六百石丨左轓輞􅀈茱茰輞石崇作丨丨丨及白槐之輻白氏帖紅朱網楊復恭帝問游幸費對曰聞懿宗以來每行幸無慮用錢十萬金帛五車十部樂工五百犢車丨網丨網畫香車百乗諸衛士三千孔帖輈轅挾輈以走子都與穎考叔争車考叔丨丨丨丨左隠公十一年汰輈以貫楚子與若敖戰伯棼射王丨丨及鼔跗著於丁寧又射丨丨丨丨笠轂師懼退注此言箭過車轅及王之蓋左宣公五年轅即輈也右轅楚蒍敖為宰擇楚國之令典軍行丨丨注在軍之丨者挾丨為戰備南轅令尹丨丨反斾注迴車丨鄉並左宣公十二年轂依轂而立伯棼射王汰輈以貫笠轂注兵車無蓋尊者則邊人執笠丨丨丨丨以禦寒暑名曰笠轂左宣五年夾轂而趨公㑹吳子于潢池注滕薛丨丨丨丨穀梁朱輪華轂武平一上言臣一宗階三等家數侯丨丨丨丨過許史梁鄧遠甚唐本傳軾憑軾而觀子玉使鬭勃請戰於晉曰請與君之士戯君丨丨丨丨之得臣與寓目焉左僖二十八年登軾而望齊師伐我公將戰曹劌曰未可下視其轍丨丨丨丨之曰可矣遂逐齊師公問其故對曰云云吾視其轍亂望其旗靡故逐之左莊十年中車折軾叔山冉搏人以投丨丨丨丨左成十六年衡投衡乃出晉人或以廣隊不能進楚人惎之脱扃少進馬還又惎之拔斾丨丨丨丨綏授綏以免趙旃棄車而走林逢大夫與其二子乗謂其二子無顧顧曰趙傁在後怒之使下指木曰尸汝於是丨趙旃丨以免左宣公十二年交綏而退晉人秦人戰于河曲注不書敗績丨丨丨丨不大敗也左文十二年轍軌同軌今天下車丨丨中庸殊轍必騁丨軌丨孝經序下視轍詳見前軾註門多轍陳平家貧讀書家負郭家巷丨丨長者車前本傳轍中鮒出莊子詳見魚門註輠炙輠過髠淳于髠齊人博聞强學無所不至其諫説慕晏嬰之為人然以承意觀色為務故齊人頌曰炙輠丨丨輠者車之盛膏器也炙之雖盡猶有餘流言髠知不盡如炙輠耳史記詩集車鬪風楊氏諸姨丨丨丨元徽之連昌宫詞車揚塵大丨丨飛丨亭午暗阡陌李白古風門外車更有南堂堪着客門前車丨丨轣轆使君丨並坡擲果盈丨丨定丨車輪在梓匠木之就規矩丨丨丨輪輿韓輿籃輿行樂從丨丨山谷輈華輈疊鼔送丨丨謝元暉轅長轅縁周入洞投田間雙轂丨丨礙荆刺張籍詩轂擊轂如行九軌道並驅無丨丨坡輕轂韋蘇州軫結軫丨丨青郊路選轍九軌道如行丨丨丨前注古今合璧事類備要外集卷五十九
