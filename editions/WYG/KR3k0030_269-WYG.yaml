深鼻豁鬐尖鱗宻上壮下殺朱火􅁮􅁮雌者角靡浪平鼻直耆圓鱗薄尾壮於腹洞微曰何以知之其人曰吾乃龍也化為丨丨飛去太孫乃龍明皇幸蜀徳宗時年十五從行有父老言於衆丨丨丨儋耳丨何懼賊哉鄴侯家傳田説為龍馬侍中既立勲業自矜伐常有陶侃之志故呼丨丨丨丨至今為義士非之雜爼得一紅葉有史生逰華山時暑環憩一小溪忽有一紅葉大如掌紅殷可愛隨流而下史獨接丨寘懷中食坐頃覺懷中冷重潜起觀之其葉上栗栗而動史驚懼棄林中遽白衆人曰此必龍也可速去須臾林中白烟生彌布一谷史下山未半風雷大至酉陽雜爼救一青虵孫思邈甞丨丨丨丨龍子也後為龍王召至水府得龍宫藥方三千道作千金方三千巻内祕隠方一續神仙傳龍争此居張公諱路斯以明經為宣城令夫人石氏生九子自宣城罷歸甞釣于焦氏臺一日見釣處有寶殿遂入居之自是歸輙體寒而濕問其故曰我龍也蓼人鄭祥逺亦丨也與我丨丨丨明日當戰使九子助我我領絳綃而鄭綃明日九子射者綃者中之九子皆化為龍事見唐布衣趙耕之文載於歐文忠公之集古録蘇東坡作碑龍生彼家臨安大旱宰君命道士東方氏起龍祈雨對曰苑山前池中有之然不可起起必大異遂止明年宰君復召至臨池遽指王所居曰此丨丨丨丨矣時王已誕數日吳越備史自舟首并王之巡句章也行次餘姚文亭鎮舟湊巨石不能進既而大雨震電有二龍負舟之下鎮遏使翁元軻曵舟而進龍丨丨丨丨焉同上以木匣貯韋太尉末年資州一龍丈餘餘韋丨丨丨丨之蟠屈於内時屬中元置於大慈殿上百姓縱觀三日為烟所燻死死幕閑談夢化赤龍吳程始勤學文穆王時西府院官滕雋甞丨程丨為丨丨望南方而去雋因語其夢於人曰吳氏子非我所測也及為福州始騐其兆吳越備史夢為黄龍江南李景昇之長子也昇在愛其第三子達故未定儲貳甞晝寝丨冇黄龍繞寝殿柱既寤使人視之乃見景抱其殿楹而立意遂定同上引出如鰌長安有龍户見水色則知有龍或丨丨但丨丨而已南部新書鬬死似魚桐城縣百姓吳舉家有青龍丨丨於樹中鱗鬛皆丨丨唯有髯長二尺雙角各長二尺餘雜爼軍中獨眼李克用有武勇才一貝毓眇丨丨號為丨丨龍其威名盖於代北五代史淅中不睡吳越錢鏐少在軍中未甞寝未年少倦乃刻木為枕以自驚或命諸孫諷詩以達旦晉天福中契丹使至朝廷以近侍李泳為監伴使虜有判官者幽薊人謂泳曰吳越常不睡乎泳詰其故對曰嘗聞五臺山王子大師言丨丨丨丨龍今已歸矣訪所聞乃長興壬辰之後也九國志穴中大羊洛中有洞丨曾有誤墜其丨行數里漸明見有宫殿人物凡九處又有丨丨羊髯有珠人取食之後出以問張華華曰此地九仙館也大羊名曰癡龍北夢鎖言榻旁小虵僧聞禪師住邵武山中一日有老人來謁聞曰我龍也以疲惰行雨不職上天有罰當死賴道力可脱俄失所在聞視坐丨丨有丨丨尺許延縁入袖中屈蟠夜風雷挾坐榻電碎雨射山嶽為榣而聞危坐不傾達旦晴霽垂袖虵墮地而去僧史韓退之雜説龍之噓氣成雲雲固弗靈於龍也然龍來是氣茫洋窮乎𤣥間薄日月伏光景感震電神變化水下土泊陵谷雲亦靈怪矣哉雲龍之所能使為靈也若龍之靈則非雲之所能使為靈也然龍勿得雲無以神其靈矣失其所憑依信不可與異哉其所憑依乃其所自為也易曰雲從龍既曰龍雲從之矣盛均真龍對客有紬時賢待已之對舉葉君愛龍意于座曰葉公好假而憚其真誠然乎均曰即飛出丹青者殊未真翔來庭宇者愈假矣何則夫靈濟於物無求於物無求於人實龍徒也今聞葉公鱗畫其象則慕形趍之是欲滋乎豢育與虵魚類耳真烏在哉曰然則擾于夏鬬于鄭者非耶曰妖而怪所以幽王𤯝身子産不祀焉率假物矣彼其真龍者道能神化其流多派或蟠於天或巢於田或翼於人或為馬或為劒冇侔於此靡徒不居其在天也樞紐隂陽不蹉厥常其在田也贍腴疆土庶類蕃廡其在人也珠媚心瀾呀成智門其為馬也布體柔油徧崇九州其為劍也鬼涙淫淫秋江萬尋至於挾雲則十雨時濡御照則三光助舒是真羣龍也綿古今而不僵渥生人以無倦聖賢在上将利益于物天下無道必亢悔于時豈獨矯矯欄端露威于葉公而誇爪喙哉是謂妖怪假物也客皺眉而俯不復紬言栁宗元神龍説扶風馬孺子言年十五六時在澤州與羣兒戲郊亭上頃然有竒女墮地有火􅂱然被緅裘白紋之裏首步揺之冠貴㳺少年駭且悦之稍狎焉女頩爾怒曰不可吾故居釣天帝宫下上星辰呼嘘隂陽薄蓬萊羞崑崙而不即者帝以吾心侈大怒而謫來七日當復今吾雖辱塵土中非若儷也吾復且害若衆恐而退遂入居佛寺講室焉及其進取杯水飲之嘘成雲氣五色翛翛也因取裘反之化為白龍徊翔登天莫知其所終亦怪甚矣嗚呼非其類而狎其謫不可哉孺子不妄人也故記其説陸龜䝉招野龍對昔豢龍氏求龍之嗜慾幸而中焉得二龍而飲食之龍之於人固異類以其若已之性也席其宫沼百川四溟之不足㳺甘其飲食洪流大鯨之不足味施施然擾擾然其愛弗去一旦值野龍奮然而招之曰爾奚為者茫洋乎天地之間寒而蟄暘而升能無勞乎誠使從吾居而宴安於野龍矯首而笑之曰若何齪齪乎之如是耶賦吾之形冠角而被鱗賦吾之德泉潜而天飛賦吾之靈嘘雲而成風賦吾之職抑驕而澤觀乎無極之外息乎大荒之墟窮端倪而盡變化其樂不至耶今爾茍容于蹄涔之間況泥沙之是拘惟蛭螾之與徒牽乎嗜好以希飲食之餘是同吾之形異吾之樂者也狎其人㗖其利者扼其喉胾其肉可以立待吾方哀而援之以手又何誘吾之陷穽耶爾不免矣野龍行未幾果為夏后氏之醢沈存中記彭蠡小龍彭蠡小龍顯異至多人人能道之一事最著熙寧中王師南征有軍㐲數卜船泛江而南自離真州即有一小蛇登船船師識之曰此彭蠡小龍也當是來䕶軍仗耳主典者以潔器薦之蛇伏其中船船便風日棹數百里未甞有波濤之恐不日至洞庭蛇乃附一商人船回南康世傳其封域止於洞庭未甞踰洞庭而南也有司以狀聞詔封神為順濟王遣禮官林希子中致詔至祠下焚香畢空中忽有一蛇墜祝肩上祝曰龍君至矣甚重一臂不能勝徐下至几案間首如龜不類蛇首也子中致詔曰曰使人至此齋三日然後致祭王受天子命不可以不齊成蛇受命徑入銀香奩中蟠三日不動祭之日既酌酒蛇乃自奩中引首吸之俄出尋案行色如濕胭脂爛然有光穿一剪綵花過其尾尚赤其前已變為黄矣正如雌黄色又過一花復變為緑如嫩草之色少頃行上屋柔紙幡脚以行輕若鴻毛倐忽入帳中遂不見明日還蛇在船後送之踰彭蠡而回此龍常㳺舟楫間與常蛇無辨但蛇行必蜿蜒而此乃直行江人常以此辨之筆談邵康節應龍吟龍者陽類與時相須首出庶物周㳺六虚能潜能見能吸能呼能大能小能有能無詩集泥沙困丨丨丨老龍杜積水蟠龍依丨丨丨杜改常服白龍丨丨丨偶被預且制誰使爾為魚徒勞訢天帝李白枯魚過河泣轟雷鼓毒龍脱骨丨丨丨元禎送崔侍郎怪潛溟波龍丨丨丨丨李白寄裴隠泉化為土天昏地黑蛟龍移雷驚電擊雌雄隨清丨百丈丨丨丨魚鼈枯死吁可悲韓退之功在杳冥育德知何德逢辰或見霛配乾雖有象作解本無形浹物周寰宇遺丨丨丨丨丹青如可状試下葉公庭韓忠獻公力倦滄溟滿目塵埃日日隂皇天無命且深沉終當丨丨丨丨水來作人間十日霖王逢原龍池二首神物登天丨丨丨丨擾可騎如何孔甲但能羈當時若更無甫劉素龍意茫然豈得知王介蒼生望雨山腰石有千年潤石眼泉無一日天下丨丨丨霖丨丨不知龍向此中蟠前人如何蟠屈無飛志盡道神龍有此靈一池澄静暮痕清丨丨丨丨丨丨丨却放鳴蛙有怒聲王逢原龍池古今合璧事類備要别集巻六十三
