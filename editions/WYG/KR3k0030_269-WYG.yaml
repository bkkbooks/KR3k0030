body:
  text: 古今合璧事類備要别集卷六十三宋謝維新撰五靈龜格物總論龜甲蟲按爾雅一曰神龜二曰虚龜三曰攝龜四曰寳龜五曰文龜六曰筮龜七曰山龜八曰檡龜九曰水龜十曰火龜凡十等然神虚之龜五色色似玉背隂面陽上隆象天下平法地轉運應四時蛇頭龍頸左睛象日右睛象月知吉凶存亡之變者也古者用以占卜必取之扵春而攻之於秋前弇果甲前長也後弇獵甲後長也灼之之法上春灼後右夏灼前左秋灼前左冬灼後右食墨則吉蠅反是故甲蟲三百六十而龜為之長此所以係四虛之數而亦為王者之嘉瑞也貝玳瑁亦龜屬貝質白如玉紫㸃有文皆行列相當玳瑁形狀如龜惟腹背甲有烘㸃其大者悉似盤盂附見于此事類神物天生丨丨易介物大司徒以上㑹之法卞五地之物生云云四曰墳衍其動物宜丨丨注龜屬周禮三足龜丨丨曰賁爾雅十尾龜百嵗一尾千嵗丨丨六帖靈龜舍爾丨丨易頤卦元龜丨丨象齒注丨丨尺二寸詩泮水十朋或益之丨丨之龜注龜者决疑之物獲益而得丨丨之龜則盡天人之助也前列龜為丨丨先知也禮禮運卷耳龜者隂蟲之老三十嵗㳺于丨丨之上老者先知故君子舉事必攷焉逸禮蓮葉龜千嵗乃㳺于丨丨之上龜筮傳搘床南方老人以龜丨丨足經二千餘年老人死移床龜尚生龜能行氣道引至神若此同上照鏡南人採龜溺以其性妬而與蛇交或雌龜至有相趂鬬噬力小致斃者採時取雄龜置前盌及小盤中於龜前以鏡照之既見鏡中龜即淫發而失溺以入藥治聾尤妙北夢瑣言昆命禹曰官占惟先蔽志丨丨于元龜尚書納錫九江丨丨大龜注尺二寸曰大龜龜不常用錫命而納禹貢九疇箕子陳洪範曰天乃錫禹洪範丨丨注天與禹此書神禹負文而出列于背有數皆至九洪範大寶寧王遺我丨丨龜紹天明即命書大誥青純龜丨丨髮純縁也謂甲髯千嵗龜青明吉凶也公羊𤣥衣龜名丨丨督郵古今注昭兆成之丨丨注龜名左僂句左昭伯如晉臧㑹切其寶龜丨丨以卜為信與僣云云㑹曰僂句不予欺也注寳龜名左昭二十五居蔡臧文仲丨丨山節藻梲何如其知也注龜出蔡因名之語致蔡臧武仲自邾使告臧賈具丨大丨焉曰紇之罪不及祀子以大蔡納請其可賈曰聞命矣再拜受龜左曵尾楚王聘荘子荘子曰吾聞楚有神龜死三嵗矣王中笥而藏之於廟堂之中此龜寧其死留骨而貴乎寧其生而丨丨於泥塗中乎使者曰生而丨丨荘子曰吾将丨丨矣荘刳腸宋元君夢人被髮曰予為清江使者河伯被漁者預且得予元君使人占之曰此神龜也乃召預且預且釣得白龜五尺使獻之乃刳之以七十二鑽而無遺䇿仲尼曰龜能夢于元君不能避預且之網智能七十鑽無遺䇿不能避丨丨之患如是則智有所困能有所不及也孔愉放丨丨見人籠龜乃買而放之中流龜乃反顧愉及封侯鑄印龜乃回首而三有似所放之龜愉悟而佩之㑹稽録毛寶放丨丨見漁人釣得白龜贖而丨之江中寳後将戰敗投江如躡著物漸浮至岸視之乃所放龜搜神記空冢中郄儉行獵墜丨丨丨見大龜張口吞氣或俛或仰乃試隨龜所為遂不復饑抱朴子石龕中張鋋見巴西侯飲酒命樂乆之有告者曰洞𤣥先生在門言訖有一人被黑衣頭長而身甚廣揖之與坐曰天将曉鋋悸悟見身卧在丨丨丨一龜形甚巨乃向所見洞𤣥先生也張續宣室志汝靈物鄱陽人黄覩入山採荆楊遂迷路數日忽見大龜赭便呪之曰丨是丨丨而吾迷不知道今騎汝背頭向便是路龜即回右轉赭從行十餘里便得溪水即估家行舟者也續搜神記夢靈山淳于棼丨大獵于國西丨龜丨山峰峻秀川澤廣逺師徒大獵竟夕而還及悟尋穴究源一穴中有一腐龜殻積雨浸潤小草叢生即為獵靈龜山也李公佐南柯太守傳籠龜十三福州貞元末有人買一丨丨其數丨丨徐仲以五鐶獲之村人云此聖龜不可殺徐置庭中一龜籍四龜而行八龜為導悉大六寸一夕而失雜爼瓶龜旋轉徐太尉彦若赴廣南渡小海於棧中得一琉璃瓶中有一龜及寸旋轉不停而瓶口極細不知何自而入置之舟中夜半覺舟偏重視之則羣龜層疊遶其瓶子懼而棄之後門船主曰此龜寶也劉崇逺金華子前代為龜太宗曰朕行有三監丨丨成敗丨元龜褚遂良傳無逸為龜崔植曰元宗在天后時踐憂患既得位得姚崇宋璟此二人早夜孜孜納君于道璟甞手寫尚書無逸為圖以獻今願陛下以丨丨丨元丨則天下幸甚白龜化石武德宋文皇欲平内難苑池内得丨丨丨為丨故登極後降制曰皇天眷祐錫以寳龜南部新書巨龜吹水歸登尚書毎浴皆屏左右自於浴盆中坐移時或有窺者見一丨丨丨丨也北夢鍞言號五總龜殷踐猷賀知章甞丨為丨丨丨謂龜千年五聚問無不知也招搘床龜燕文貞公嫁女盧氏甞為舅盧公求官候公下朝問焉公曰但丨丨丨丨視之女拜而歸告其夫曰舅得簷事矣朝野僉載龜辟虵毒明皇甞有方士獻一小丨徑寸金色色可愛云神明而不食置之枕笥中丨巨丨之丨録異記龜繞虵積建中二年夏趙州寧晋縣沙河北有掌樹甚茂民祠之為神有虵數百千自東西來趍北岸者聚棠樹下為二積留南岸者為一積俄有徑寸丨三丨行積虵盡死而後各登其積野人以告虵腹各有瘡若矢所中刺史康日知圖其事奉三龜來獻五行志截作帶胯張儀築成都城依龜行路築之李德裕鎮西川龜殻猶在後為髙崇文丨丨腰丨丨孔氏帖司馬遷龜筴傳宋元王二年江使神龜使於河至於泉陽漁者預且舉網得而囚之置之籠中夜半龜來見夢於宋元王曰我為江使於河豫且得我身在患中莫可告語王有徳義故來告訴元王召博士衛平而問衛平乃援式而起對曰今昔壬子宿在牽牛河水大㑹鬼神相謀漢正南北江河固期南風新至江使先來白雲壅漢萬物盡留斗柄指日使者當囚𤣥服而乗輜車其名為龜王使人持而往問泉陽令令與使者問豫且即獻使者使者載行出于泉陽之門正畫無見風雨晦冥雲盖其上五采青黄霜雨並起風将而行入於端門見於東廂身如流水潤澤有光望見元王延頸而前三步而上縮頸而却復其故處元王見而怪之問衞平對曰延頸而前以當謝也縮頸而却欲亟去也元王曰善哉趣駕送龜衞平曰龜者天下之大寳也先得此龜者為天子且十言十當十戰十勝王能寶之諸侯盡服王勿遣也元王曰龜在患難中以我為賢德忠信故我告寡人寡人若不遣也是漁者也漁者利其肉寡人貪其力下為不仁上為無德奈何勿遣衞平對曰不然臣聞盛德不報重寄不歸天與不受天奪之寳王雖遣之江河必怒務求報仇淫雨枮旱其罰必來王勿遣也元王慨然歎曰暴得者必暴亡强取者必後無功寡人安事此實趣駕送龜勿令乆留衞平對曰人或忠信不如誕謾或醜惡而宜大官或美好佳麗而為衆人今龜使來扺網而遭漁者得之見夢自言是國之寳也王何憂焉元王曰禍不妄至福不徒來福之至也人自生之禍之至也人自成之今寡人之邦居諸侯之間舉事不當乂安亡逃衛平對曰龜大寶也為聖人使傳之賢士不用手足雷電将之風雨送之流水行之侯王有德乃得當之今王有德而當此寶恐不敢受王若遣之宋必有咎後雖悔之亦無及已元王大悦於是擇日齊戒乃刑白雉驪羊以血灌龜於壇中央以刀剥之身全不傷使工占之所言盡當元王之時衛平相宋宋國最强龜之力也故云神龜能夢于元王而不能自出漁者之網身能十言盡當不能通使于河還報於江賢能令人戰勝攻取不能自解于刀鋒免剥刺之患聖能先知亟見而不能令衞平無言言事百全至身而攣當時不受又焉事賢是故明有所不見聽有所不聞人雖賢不能左畫方右畫圓日月之明而時蔽扵浮雲孔子聞之曰神龜知吉凶而骨直枯空日為德而君於天下辱於三足鳥月為刑而相佐食食於蝦蟆蝟辱於鵲蝟能制虎見鵲抑地騰蛇之神而殆於即旦黄金有庇白玉無瑕事有所疾亦有所徐物有所拘亦有據據罔有所數亦有所踈人有所貴亦有所不如貝織貝淮海惟揚州云云厥篚丨丨書禹貢大貝商拘文王於羑里於是散宜生乃以千金求天下之珍怪得丨丨百朋以免君罪六韜又丨丨在西房注如車渠顧命文貝丨丨仍几同上玳瑁生取甲廣南日見海島夷人盧亭獲活珍瑁龜一枚以獻連帥嗣薛王王令丨丨丨小者二片帶於左臂以辟毒俟其掲處漸生復遣盧亭送於海畔或云玳瑁若生帶之有蟲毒其甲即自揺動若死無此驗本草詩集開萍龜丨丨葉過觸網信然龜丨丨瓦影䕃丨丨丨龜魚並杜甫荷深處半脱蓮房露壓欹緑丨丨丨有㳺龜坡詩欵天門乃呼大靈歸騎雲丨丨丨云云東坡夜得夢有夫立衣巾闖然入其戸三稱天之言再拜謝𤣥夫收悲以歡忻韓愈鳴窟中天欲雨有東南風南溪白龜丨丨丨張籍詩衆漁賤棄世傳一尾龜百齡此龜殆見隋唐興雖然天幸免焦灼想屢縮頸愁嚴凝前年赴海不量力欲替鼇負三􅔳嶒畨禺使君邂逅見知困􅉫蕩因嗟矜疾呼豫且設網取以組系首繩穿繩北歸與俱大度大庾兩夫贔屭苦不勝艤船淮擔送我云此一可當十朋昔人寶龜謂神物奉事枮骨尤兢兢殘民滅國逓相奪有此乃敢司黎蒸于時觀甲别貴賤太上藏法傳昆仍豈如𤣥君頃見夢初知歡喜得未曾自從九江納錫罷丨丨丨丨秋不登卜人官廢亦已乆果獵誰復知珠稱今居此寳世莫惜我以坐視心瞢瞢搘床纔堪比瓦礫當粟孰肯捐斗升糁頭腥臊何足嗜曵尾汚穢適可憎盛溲除聾豈必騐蹈背出險安敢慿刳腸以占幸無事卷殻而食病未能如聞翕息可視効往乃有墜崖千層仰窺朝陽俯引氣亦得難老如岡陵諒能學此真夀類世論妄以蟲凝冰嗟余老矣倦呼吸起晏光景尤難承但知古人所玩惜毎以異物相侵凌唯憂盜賊今好卜夜半刼請無威懲復恐嚵夫負之走并切老木為薪蒸淺樊荒圃不可保守視且寄鍾山僧王介甫同王濬賢良賦龜羌桑同朽老龜千年作一息天地倂入攴床力何年生此石腸兒非皮褁骨骨裏皮君家元緒不慎口遂與丨丨丨一丨知君逰世磨不磷徃作道人之石友道人莫欺此龜無六眸試與話禪當㸃頭陳去非以石龜子施覺心長老龍格物總論龍水物鱗蟲之長也有鱗曰蛟龍冇翼曰應龍有角曰虬龍無角曰螭龍未升天曰蟠龍然善變化能大能小能長能短能幽能明春分而登天秋分而入川古之人有畜龍者可豢而擾也自後世水官之政不修而龍乃坻伏矣藉使世冇之其誰得而狎之哉故鳥吾知其能飛魚吾知其能㳺獸吾知其能走走者可以為綱㳺者可以為綸飛者可以為矰至於龍吾不能知其乗風雲而上天夫子所以有言也然則五靈之物莫靈於龍然以此夫事類飛在天九五丨龍丨丨躍在淵九四或丨丨丨見在田九二丨龍丨丨潛勿用初九丨龍丨丨亢有悔上九丨龍丨丨並易乾卦戰于野龍丨丨丨其血𤣥黄易坤卦蟠於泥或曰龍必飛天乎曰時飛則飛時潛則潛潛丨丨丨蚖其肆矣蚖哉蚖哉烏覩龍之至也歟楊問神雲從龍易乾卦澤生龍深山大丨實丨丨蛇左魚鱉伍譬猶龍之未升與丨丨為丨及其升天鱗不可覩公孫𢎞答方朔書蛇蠋化有自然之龍有丨丨丨成之龍抱朴子雄雌鳴大蛟龍伏潛於淵而卵剖於陵丨鳴上風丨丨下風而化者形精之至而然也人不見龍之飛舉而能髙者兩奉足也淮南子螻蟻制神龍失水而陸居為丨丨之所丨荘子龍門暴鰓河津一名丨丨龜魚之屬莫能上江海大魚集門下數十不得上上即為龍故云丨丨龍門三秦記龍門㸃額大鯉魚登丨丨化為龍不登者丨丨暴鰓矣白氏帖神龍衘燭大荒北隅有山不合因名不周故丨丨丨丨照之王逸蛟