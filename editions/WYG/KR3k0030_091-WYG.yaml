body:
  text: 古今合璧事類備要後集卷二十二宋謝維新撰翰苑門翰苑歴代㳂革事類鑾殿唐元宗召李白見於金丨丨降輦步迎如見園綺李白傳鑾坡唐制駕在大内則明福門内置學士院駕在興慶宫則金明門内置院徳宗移院於金丨丨翰林志麻綸唐故事中書用黄白二丨為丨命重輕之辦其後翰林學士專掌内命選用益重中書所出獨得用黄麻其白麻皆在北院自非國之重事拜授將相徳音赦宥不得由於斯唐翰林志菱紙李徳裕侵紅㸃書詔皆用丨汁持丨海録碎事視草至徳後天子召集賢學士於禁中草書詔雖宸翰所揮亦資其檢討謂之丨丨翰林志用麻元和初凡赦書徳音立后建儲大誅討拜免三公宰相命將曰制書並丨白不用印會要内相陸贄入翰林年尚少以材幸天子常以輩行呼而不名雖外有宰相主大議而贄常居中參裁可否時號丨丨唐本傳門客武后朝曽宣諭卿等是我丨丨李衛公詩話内命開元二十八年始别建學士院於翰林院之南俾掌丨丨韋執誼翰林志文名翰林所著撰拜免公王將相妃王曰制賞賜恩宥曰赦書曰徳音處分事曰勅曰御札五品以上曰詔六品以下曰勅批郡臣表曰批答奨勲勞曰􅅄諭賜外國書曰蕃書醮曰青詞宻詞釋曰齊文教坊致語曰白話土木興建曰上梁文宣賜曰口宣此外有祝文碑文神道碑樂章詩頌春帖子之類撰述進入遇有除拜以雙日鎖院隻日降麻同上賜笏李絳初入院憲宗親擇笏以賜之賜燭今狐趙公大中初常便殿召對夜父方罷宣丨金蓮花丨送歸院院使以下謂是駕來俄傳學士歸院莫不驚異金蓮花燭柄耳至尋方有之給綺被唐翰林初選者試制書批答三首内庫丨青丨丨紫絲履之賞端午賜青團扇並翰林志賜錦襖學士舊規十月丨丨長丨國初以來賜翠毛錦太宗改賜黄盤鵰錦金坡遺事翔紫霄登翰林者謂之凌玉清丨丨丨翰林志又居翰苑者皆謂之凌王清遡紫霄豈止於瀛洲哉李肇志邇紫闥玉署之設宻丨丨丨毎夜漏既上宫鑰並入有大號令大除拜邊境急奏大臣宰相皆不得聞雖戴鶡之士充滿千廬典司翰墨一人而已居是職豈不貴重乎金坡遺事供奉翰林李白召見金鑾殿論當世事奏頌一篇有詔丨丨丨丨選入翰林唐元宗丨朝官有詞藝學識者丨居丨丨供奉别旨於是吕向尹愔首充焉至二十六年始改稱學士遂别建學士院翰林故事居一品上凡内宴丨丨丨之丨唐故事繼九相後自永貞鄭絪為承㫖十七年間由鄭至杜十一人而九參大政若此則安可以昧陋不肖之稹丨居丨丞丨二名節之丨哉元稹翰林院記不受謝金寳厯元年路隋為翰林學士有以金帛謝除制者必叱而去之曰吾以公事接私財邪終無所納續通典何以潤筆草麻潤筆自唐有之鄭譯自降州刺史復爵李徳林作詔髙穎戲之曰筆頭乾譯曰出為方伯杖策而歸不得一錢丨丨丨丨分紀放浪江湖李白以翰林斥去丨丨丨丨嘗夜月乘舟采石達金陵白衣宫錦袍於舟中顧瞻笑傲旁若無人初賀知章見白賞之曰此天上謫仙人也瞻接樓殿北院之置尤為切近左接寢殿右瞻彤樓晨趨瑣闥夕宿嚴衛宻之至也韋執誼翰林故事發揮大猷丨丨丨丨藻繪上命隻簡片削可以動乎人神受遺羣務典持縑牘丨丨丨丨並同上禮優賜縟若乃職任之凊切曹局之嚴凝丨遇丨渥丨與繁丨金坡故事恩厚職重丨之丨也備待顧問辨駁是非典持縑牘受遺群務凡一世得失動為藏否丨之丨也韋執誼翰林故號稱六絶唐李邕號翰林六絶謂文學書翰等六事過人唐志號試五題長興元年翰林學士劉昫奏本院舊例學士入院除中書舍人不試餘皆試麻制答蕃書批答各一道詩賦各一首丨曰丨丨丨續通典司掌綸命後唐學士劉昫奏矧惟翰墨之丨專丨絲丨之丨翰林志詔賜金印晉開運中賜學士院書詔金印一同上清華之地太宗賜蘇易簡詩後衘札蓋居丨丨丨丨也蘇易簡續志深嚴之地乾徳元年翰林欲命學士太祖謂宰相曰丨丨丨丨當以宿儒處之㑹要金馬之廬太祖鼎新大壯敞丨丨丨直丨金坡遺事玉堂之署國朝太宗皇帝以玉堂其來向矣但虚傳其號而無正名乃飛白書丨丨丨丨四字以賜焉禁林讌㑹集玉堂殿名也疑武帝時所造翼奉傳疏曰漢徳隆盛在孝文躬行節儉其時未央宫無髙門武臺玉堂金華之殿則玉堂殿疑武帝所造李尋傳尋待詔黄門哀帝使侍中往問災異對曰尋過隨衆賢待詔食太官衣御府乆汙丨丨丨丨蓋待詔者有直廬在其側故曰署本朝英廟嗣位乃撒去及元豐中有翰林學士乞摘去下二字復榜院門以為臣下光寵詔可是乞以殿名召其院也不避甚矣元城語録又太宗謂宰臣曰蘇易簡乞衘飛白書丨丨丨丨四字令付宰臣李昉以下喚來於中書當靣宣賜金坡遺事素號槐㕔學士院第三㕔閤子有一巨槐丨丨丨丨舊傳居此閤者多至入相蘇易簡續志設視草臺古事堂中丨丨丨丨毎草制則具衣冠據臺而坐今但存空臺筆談榜摛文堂政和五年衘書摛文堂榜賜學士院續㑹要人世仙境玉堂東西璧延袤數丈悉畫水以布之風濤浩渺擬瀛洲之象也脩篁皓鶴悉圖廊廡竒花異木羅植軒砌毎外喧已寂内務不至風傳禁漏月色滿庭眞丨丨之丨丨也蘇續志詞臣仙職太宗皇帝嘗謂近臣曰丨丨實神丨之丨也同上兩制詞臣雍熙三年勅曰丨丨丨丨公朝精選典司誥命親近冕旒會要先達鉅儒宋公白賈公黄中皆丨丨丨丨同在鼇禁筆談北扉應召學士院北扉者為其在浴堂之南便於應召同上門外立候有唐學士院深嚴非本院人不可遽入雖中使宣事及有文書必先動鈴索立於門外俟小判官出授授訖授院吏院吏授學士自五代以來其制乆廢蘇易簡因召對言上可其奏自是院復置鈴索焉蘇續志悉畫煙風玉堂後廡建二閣丨丨丨丨曉景蘇續志復置鈴索見前門外立俟注詞臣清羙太宗嘗諭蘇易簡曰丨丨丨丨朕恨不得為之㑹要文翰清秘陳彭年兼數職皆丨丨丨丨之目人謂其官衘為一條氷事畧聚㕔分草或郊禋行慶制命填委必丨丨丨丨之蘇續志進詩屬和太宗皇帝至上林春融千花萬卉妍䴡冠絶上必曲宴宰衡勲舊召兩制詞臣俯龍池垂金鈎學觴賦詩終日而罷上嘗謂近臣目詞臣實神仙之職也翊日凡所丨丨悉迴衘毫丨丨以賜焉分純賜紅錦袍十月朔舊丨對衣丨丨丨淳化二年代以細花盤鵰錦袍下丞相一等續志給青綾被凡初遷者本院賜宴營幕使宿設帳幄尚食使供珍饌酒坊供羙酒是為勅設宴賜衣内殿丨丨綺丨丨青綾單帕紫絲履白布手巾之類續志有七盛事學士今日之盛事有七新學士謝恩日賜襲衣金帶寳鞍名馬一也十月朔改賜新様錦袍二也特定草麻利物三也改賜外庫法酒四也月俸並給見錢五也特給親事官隨從六也勅設供帳之盛七也凡此七事並特出異恩有以見聖君待文臣之優厚也李昉禁林讌㑹詩序謂一條氷見前文翰清秘注贄乏時望太宗曰郭丨南府門人朕命掌誥制書一出人或哂之蓋其素丨丨丨朕亦為之靦顔亦終不令入翰林也長編杲失躁競范杲數致書宰相求入翰林於是獻玉堂記請備其職上惡其躁競不使居内同上咨報中書規百司申中書皆用狀惟學士院用丨丨其實答子不出名但當直學士一人押字而已謂之咨報此唐學士舊規也歸田録不草内侍制胡宿知制誥内都知郭懐敏勢傾中外出為和州都監召復故職宿還詞頭不草制事畧進草皇子制宻旨多夜降出草麻五更三㸃進錢惟演草夀春王制丨丨乞御筆刋削然後寫麻從之其後册皇太丨亦進草親王宰相等即不進漏水燕談文事訪於陶竇太祖平海内修學舊典有丨太丨多丨丨丨丨㑹要朝典定於扈䝉扈䝉太宗即位復入翰林加承旨自張昭竇泰卒丨廷丨故皆裁丨丨丨事畧雙鵲鳴噪之靈朝學士院有丨丨常棲於海棠上或丨丨必有大詔令或宣召之事因謂之丨鵲晁公詩云都聞靈鵲心應喜金坡遺事翰林承旨歴代㳂革唐始置翰林學士無承旨至憲宗末正元年始命鄭絪為之大詔令大廢置丞相之宻畫内外之宻奏上之所甚注意者莫不專受專對居東第一閣本朝承旨不常置以院中乆次者一人充續會要詳見翰林學士事数廷老鄭絪為内丨之丨首定大計翰林志院長沈傳師入翰林為學士翰林缺承旨次當傳師穆宗欲靣命辭曰學士丨丨參天子宻議次於宰相自知必不能因稱疾出孔白六帖召詢時事韋澳為承旨與同僚蕭寘為宣宗所遇二人同直無不丨見丨訪丨丨唐韋澳傳多識朝章唐穆宗以杜元穎丨丨丨丨拜為中書舍人學士承旨杜元穎傳論事可否韋澳為承旨為宣宗器遇毎有邦國刑政大事中使傳宣草詞澳心欲論諌即曰此一事須降衘札方敢施行遲留至旦必論其可否本傳處事機密唐韓偓昭宗時丨丨丨丨與帝意合本傳獨承密命翰林院例置學士六人内年深德重者一人為承旨所以丨丨丨丨故也德宗好文尤難其選正元以後為學士承旨者多至宰相焉通典九參大政自永貞鄭絪為承旨十七年間由鄭至杜十一人而丨丨丨丨若此則安可以昧陋不肖之稹繼居九丞相一名卿之後唐元稹承旨院記草立儲制順宗風噤不能言時太子未立牛羙人有異志中外洶懼召鄭絪丨丨丨丨絪搦管便書立嫡以長四字跪而上皇乃定憲宗絪之力也即位拜平章事鄭絪傳不草相麻韓偓進承旨宰相韋貽範母喪詔還位偓當草制曰腕可斷麻不可草本傳在學士上憲宗以上聞翌日帝曰朕諷讀數四有以見儒墨之盛學士之貴也同上就院賜物近例丨丨轉官惟承旨則丨分丨勅設如初拜之禮餘不得比矣蘇續然䆫引燭玉堂東承旨閣子窻格上有火然太宗常夜幸玉堂蘇易簡為學士已寢遽起無燭貝衣冠宫嬪自窗格引燭入照之至今不欲更易以為玉堂一盛事筆談得乘廐馬乘輿奉郊廟承旨丨丨丨丨自洛堂殿由内朝以從蘇志得升丹鳯揭雞竿布大澤丨丨丨丨之西南隅外賔客進見則上直禁中同上五人同拜太宗時賈黄中宋白李至呂䝉正蘇易簡丨丨丨時丨翰林學士承旨扈䝉贈之詩云五鳯齊飛入翰林其後吕為相賈李蘇㕘政宋為尚書廬陵詩注三體刻賜淳化二年十月承旨蘇易簡請以衘賜二詩刻石帝為眞草行丨丨命待詔丨石以丨易簡蘇志鼇峯上頭宋景文公祁守益州以翰林承旨召以詩寄丞相云寧知不是神仙骨上到丨丨最丨丨國老可談鑾堂東閣金丨玉丨雜被絲綸之宻北㕔丨丨獨稱年德之髙東坡謝表院中乆次者充本朝承旨不常置以丨丨丨丨丨一人丨續會要老泉上歐内翰書洵布衣窮居嘗切有歎以為天下之人不能皆賢不能皆不肖故賢人君子之處於世合必離離必合往者天子方其有意於治而范公在相府富公為樞宻副使執事與余公蔡公為諫官尹公馳騁上下用力於兵革之地方是之時天下之人毛髪絲粟之才紛紛然而起合而為一而洵也自度其愚魯無用之身不足以自奮於其間退而養其心幸其道之將成而可以復見於當世之賢人君子不幸道未成而范公西富公北執事與余公蔡公分散四出而尹公亦失勢奔走於小官洵時在京師親見其事忽然仰天歎曰以為斯人之去而道雖成不復足以為榮也既復自思念往者衆君子之進於朝其始也必有善人焉推之今也亦必有小人焉聞之今之世無復有善人也則已矣如其不然也吾何憂焉姑養其心使其道大有成而待之可傷退而處十年雖未敢自謂其道有成矣然浩浩乎其胷中若與曩者異而余公適亦有成功於南方執事與蔡公復相繼登於朝富公復自外入為宰相其勢將復合為一喜且自賀以為道既已初成而果將有以發之也既又反而思其向之所慕望愛恱之而不得見之者蓋有六人今將往見之矣而六人者已有范公尹公二人亡焉則又為之潜然出涕以悲嗚呼二人者不可復見矣而所恃以慰此心者猶有四人也則又以自解思其止於四人者則又慰慰欲一識其面以發其心之所欲言而富公又為天子之宰相逺方寒士未可遽以言通於其前余公蔡公逺者又在萬里外獨執事在朝廷間而其位差不甚貴可以呌呼板援而聞之以言而飢寒衰老之病又痼而留之使不克自至於執事之庭夫以慕望愛恱其人之心十年而不得見而其人已死知范公尹公二人者則四人者之中非其勢不可遽以言通者何可以不能自往而遽已也執事之文章天下之人莫不知之然竊自以為洵之知之特深愈於天下之人何者孟子之文語約而意盡不為巉刻斬絶之言而其鋒不可犯韓子之文如長江大河渾浩流轉魚黿蛟龍萬怪惶惑而抑遏蔽掩不使自露而人望見其淵然之光蒼然之色亦自畏避不敢廹視執事之文紆餘委備往復百折而條達踈暢無所間斷氣盡語極急言竭論而容與閑易無艱難勞苦之態此三者皆斷然自為一家之文世惟李翺之文其味黯然而長其光油然而幽俯仰揖遜有執事之態陸贄之文遣言措意切近的當有執事之實而執事之才又自有出人者蓋執事之文非孟子韓子之文而歐陽子之文也夫樂道人之善而不為謟者以其人誠足以當之也彼不知者則以為譽人亦求其恱己世夫譽人以求其恱己洵亦不為也而其所以道執事光明盛大之徳而不自知上者亦欲執事之知其知我也雖然執事之名滿於天下雖不見其文而固已知有歐陽子矣而洵也不幸墜在草野泥塗之中而其知道之心又近而粗成而欲徒手奉咫尺之書自託於執事將使執事何從而知之何從而信之哉洵少年不學生二十五歲始知讀書從士君子游年既已晩而又不遂刻意厲行以古人自期而視與己同列者皆不勝己則遂以為可矣其後困益甚然後取古人之文而讀之始覺其出言用意與己大異時復内顧自思其才則又似夫不遂止於是己已者由是盡燒曩時所為文數百篇取論語孟子韓子及其他聖人賢人之文而兀然端坐終日以讀之者七八年方其始也入其中而惶然懼觀於其外而駭然以驚及其乆也讀之益精而其胷中豁然以明若人之言固當然者然猶未敢自出其言也時既乆胷中之言曰益多不能自制試出而書之已而再三讀之渾渾乎覺其來之易矣然猶未敢以為是也近所為鴻範論史論凡七篇執事觀其如何嘻區區而自言不知者又將以為自譽以求人之知己也惟執事思其十年之心如是之不偶然也而察之老蘇東坡謝歐内翰書天下之事難於改為自昔五代之餘文教衰落風俗靡靡日以墜地聖上慨然歎息思有以澄其源䟽其流明詔天下曉諭厥旨於是招來雄俊魁偉敦厚朴直之士罷去浮巧輕媚叢錯采綉之文將以追兩漢之餘而漸復三代之故士大夫不深明天子之心用意過當求深者或至於迂務竒者恠僻而不可讀餘風未殄新弊復作大者鏤之金石以傳乆逺行者轉相模寫號稱古文紛紛肆行後莫之或禁蓋唐之古文自韓愈始其後學韓而不至者為孫樵自樵以降無足觀矣伏惟内翰執事天之所付以収拾先王之遺文天下之所得以覺悟學者恭承王命親執文柄意其必得天下之竒士以塞明詔軾也逺方之鄙人家居碌碌無所稱道及來京師乆不知名將治行西歸不意執事擢在第二其素所蓄積無以慰士大夫之心是以群嘲而聚罵者動滿十百亦惟恃有執事之知與衆君子之議論故恬然不以動其心猶幸御試不為有司之所排使得搢笏跪起謝恩于門下聞之古人士無賢愚惟其所遇蓋樂毅去燕不復一戰而范蠡去越亦終不能有所為軾願長在下風與賔客之末使其區區之心長有所發夫豈惟軾之幸亦執事將有取一二焉東坡文集翰林學士歴代㳂革唐學士之職本以文學言語備顧問出入侍從因得㕘謀議納諫諍其禮尤寵職林翰林院院者在銀臺門内以藝能伎術召見者之所處也韋執誼翰林故事文書詔令則中書舍人掌之職林自太宗時名儒學士時召草制然猶未有名號乾封以後始號為北門學士元宗初置翰林待詔掌四方表䟽批答應為文章復繼以詔敕文告悉中書多壅滯始選朝官有詞藝學識者入居翰林供奉别旨然亦未定名制詔書敕猶或分在集賢開元二十六年始以翰林供奉改稱學士别建學士院於翰林院之南俾專内命其後又置東翰林院於金鑾殿之西隨上所在韋執誼翰林志選用益重而禮遇益親至號為内相又以為天子私人凡學士無定員下自校書郎上及諸豐尚書皆為之入院一歳則遷知制誥未知制誥者不作文書晉天福五年詔翰林學士院公事宜並歸中書舍人自是舍人畫直者當中書制夜直者當内制至開運元年復詔翰林學士與中書舍人分為兩制各置六員五代職官志本朝翰林學士掌内制制誥赦敇國書及官禁所用之文辭凡后妃親王公主宰相節度使除拜則學士草詞授待詔書訖以進赦降徳音則先進草大詔命及外國書則具本稟奏得畫亦如之凡拜宰相或事重者宣詔靣諭旨則給筆札書所得旨稟奏歸院具詞以進餘遣内侍授中書省熟狀亦如之若已畫旨而有未盡則論奏貼正乘輿行幸則侍從以備顧問有所獻納則請對或奏對凡初命為學士皆遣使就第宣詔旨召入院續㑹要淳化二年以翰林學士貫黄中蘇易簡同知朝京官考課李沆權判吏部流内銓故事學士掌内庭書詔指揮邊事院達邊謀天子機事宻命在焉不當豫外司公事蓋防纎微間或漏省中語故學士院嘗在金鑾殿側號為深嚴自國朝太祖以來藉其才用始令判三銓及知太常禮院事太宗實録天聖元年詔學士遇隻日至晚出宿