body:
  text: 古今合璧事類備要後集卷三十二宋謝維新撰六部門工部尚書郎侍郎六郎中附貟外郎架閣屯田中部監門六部歴代㳂革漢成帝初置尚書有民曹主凡吏民上書光武改民曹主繕修功作塩池園苑晉宋有起部尚書而不常置毎營宗廟宮室則權置之事畢省其屬有工部中大夫至隋乃有工部尚書唐因之龍朔中改為司平太常伯咸亨復武后改為冬官神龍復通典本朝工部判部事一人以两制以上充凡城池土木工役皆𨽻三司修造案本曹無所掌元豊官制行尚書工部掌天下城池宫室舟車器械符印錢寳之事凡土木金革之工役皆有程式其屬有三曰屯田營田職分田官莊塘濼之事𨽻焉曰虞部山澤苑囿場治之事𨽻焉曰水部川瀆河漲漕運之事𨽻焉是時尚書猶未除人職畧紹興三年併少府監歸工部以文思院屬焉中興會要文思院舊屬少府監至是以少府監併於工部故文思院監官乃令工部辟差事類司空舜曰咨四岳有能奮庸熙帝之載使宅百揆亮采恵疇僉曰伯禹作丨丨書舜典又位當𤣥武之官職在司空之任虞舜之代伯禹統其班周成之朝毛公處其地張鷟集共工帝曰疇若予工僉曰垂哉帝曰俞咨垂汝丨丨書舜典冬官六曰丨丨其屬六十掌邦事周禮又工部尚書周之冬官卿也晏類要宏父丨丨定辟注宏父司空書酒誥工正鳲鳩氏司空也云云五雉為五丨丨左傳居四民司空掌邦土丨丨丨時地利周官飭五材審曲面勢以丨丨丨以辨民器謂之百工同上工居一國有六職百丨與丨丨焉禮考工記屬有四工部尚書一人侍郎二人掌山澤屯田工匠諸司之事其丨丨丨一曰工部二曰屯田三曰虞部四曰水部唐官志巧過人陳從易為起部尚書丨思丨丨軍國器械多所創立陳書名稱職長孫平為工部尚書丨丨丨隋書掌山澤唐工部尚書一人侍郎一人丨天下百工屯田丨丨之政令六典緫職務工部其屬有四尚曹侍郎丨其丨丨而奉行其制命凡内外咸質正焉同上正身奉法鄭善果為工部尚書丨丨丨丨甚著勞績唐新語樂賢下善于休烈為工部尚書不治産業丨丨丨丨推轂士甚衆兄弟相代唐閻立本代兄立德為工部尚書丨丨丨丨為八座時人榮之並唐書忠謹不言唐李大義為工部尚書性丨丨外若丨能丨而内剛烈不可干非其義率屬程工尚書漢公卿也言動可否屬人耳目固不專扵丨四丨丨百丨脩位於冬官而已白集常貫之制綜事訓工平百官之上書飭五材以辨器非國之髦碩詳於典制則不可以丨丨丨丨建明理本也常集惟叙百工五材是宜百工惟叙城郭都鄙定其規士農工商得其所記室新書尤難六職程品之重有若百工號令之先丨丨丨丨唐大詔令請斥佞人元符三年曽布之相也御史中丞豐稷欲率臺屬論之遂遷稷工部尚書稷力丐補外不允謝表有内侍成已於怨府佞人方剡於奏章之語上問佞人為誰曰曽布陛下斥布則天下事定矣編年備要召訪政事張忠簡公闡擢工部尚書兼侍讀初上用眞宗故事命經筵官二貟遞宿學士院朝夕宣丨商確古今諮丨丨丨公入對尤數知無不言屢引疾丐閑上曰朕所以知外事皆頼尚書工部尚書相從乆忍言去耶周平園集冬卿常伯楊億代謝表中臺起曹丨丨丨丨訓匠建事南豊擬制韓愈送鄭尚書序嶺之南其州七十其二十二𨽻嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為大府大府始至四府必使其佐啓問起居謝守地不得即賀以為禮嵗時必遣賀問致水土物大府帥或道過其府府帥必戎服左握刀右屬弓矢帕首袴鞾迎郊及既至大府帥先入據館帥守屏若將趨入拜庭之為者大府與之為譲至一再乃敢改服以賓主見適位執爵皆興拜不許乃止䖍若小侯之事大國有大事諮而後行𨽻府之州離府逺者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多洲島飄風一日踔數千里漫瀾不見蹤跡控御失所依險阻結黨仇機毒矢以待將吏撞搪呼號以相和應蜂屯蟻雜不可爬梳好則人怒則獸故常薄其征入簡節而踈目時有所遺漏不䆒切之長養以兒子至紛不可治乃草薙而禽獮之盡根株痛㫁乃止其海外雜國若躭浮羅流求毛人夷亶之州林邑扶南真臘于陀利之屬東南際天地以萬數或時候風潮朝貢蠻胡賈人舶交海中若嶺南帥得其人則一邉盡治不相㓂盗賊殺無風魚之災水旱癘毒之患外國之貨日至珠香象犀玳􅈘竒物溢於中國不可勝用故選帥常重於他鎮非有文武威風知大體可畏信者則不幸徃徃有事長慶三年四月以工部尚書鄭公為刑部尚書兼御史大夫徃踐其任鄭公嘗以節鎮襄陽入帥滄景德𨽻歴河南尹華州刺史皆有功德可稱道入朝為金吾將軍散騎常侍工部侍郎尚書家屬百人無數畆之宅僦屋以居可謂貴而能貧為仁者不富之效也及是命朝廷莫不悦將行公卿大夫士茍能詩者咸相率為詩以美朝政以慰公南行之思韻必以來字者所以祝公成政而來歸疾也工部侍郎歴代㳂革隋煬帝改置工部侍郎唐因之龍朔改為司平少常伯咸亨復他時曹名或改而官不改通典國朝建官本末並見前工要部尚書門元豊正名初除熊本續㑹事類小司空工部侍郎周之丨丨丨中大夫也六典少常伯唐龍朔改司平丨丨丨咸亨復舊通典有宰相望李栖筠字貞一為工部侍郎魁然丨丨丨丨本𫝊得中書者帝問蘇頲有工部侍郎丨丨丨侍郎丨乎對曰陛下任賢惟所命何資之計唐書指陳實事本朝張忠簡權工部侍郎給札侍從臺諫條具時務公上十事時應詔數十人惟公與國子司業王十朋丨丨丨丨斥言權倖無所回隠明日上召两人對内殿大加稱賞賜酒者再面授御書各一軸周平園集首言典學楊龜山先生時為工部侍郎入對丨丨自古聖賢之君未有不以丨丨為務以君德在是故也尋命兼侍講長編冬官之貳丨丨丨丨方此得人疇若予工箴為已試曲阜除郭知章制共工之職南豊擬制飭五材程匠事丨丨丨丨丨丨冬官寵列俾介厥司同上紀繕修塞巧作疇若予工汝徃惟允汝其丨綱丨脩之用俾塞滛丨之丨曲阜行制工部郎中附貟外郎歴代㳂革晉宋齊皆有起部郎中梁陳改置起部侍郎隋初為工部侍郎焬帝除侍字改起部唐武德改工部郎中龍朔改司平大夫咸亨復光宅神龍並隨曹改復六典國朝建官本末見前工部尚書元豊正名初除范子竒髙遵惠職畧建炎五年詔御前軍器所𨽻工部郎官詔本所行移文字並係工部官衘又詔工部專立一案以御前軍器為名中興會要紹興三十二年孝宗即位七月詔不𨽻工部二十五日又詔依舊乾道四部年撥屬步軍司依舊𨽻工事類下大夫周禮司空屬官丨丨丨即郎中之任也起部郎丨丨丨不常置宋書掌工匠程工部郎中貟外郎丨經營興造之衆務凡城池之修濬土木之繕葺丨丨之丨式咸經度之六典掌舍宇事丨興造工匠諸公廨丨丨五行紙筆之丨職貟令時論稱之唐蔣係遷工部貟外郎又遷郎中宰相宋申錫為北軍羅織罪在不測係與諫官崔𤣥亮泣諫於玉階之下申錫方减死丨丨丨丨唐書位名著者開元以後丨卑丨丨丨杜工部國史補以知制誥國朝范杲丨工部郎中丨丨丨㑹要郎選甚髙宮室城隍程匠度材之事丨扵起部其丨丨丨南豊范子竒制官曹為劇郎吏今之髙選工官號為劇曹張元方制貟外郎司其帳籍隋朝二十四司各置貟外郎一人以丨丨曹之丨丨辟為幕府杜甫有詩名元宗時獻朝饗太清宫賦拜官禄山䧟京師元宗幸蜀肅宗即位扵靈武甫間關奔詣行在拜左拾遺因房琯罷相甫諫不納請告省家後嚴武丨丨丨丨拜工部貟外郎劍南西川節度府參謀官本記祭虞部張貟外文分司憲臺風紀由振遂遷司虞以播華問詩集粉署馨香丨丨妍注公時乃工部貟外郎不能詣省徒想其官署之妍美耳杜甫省郎身覺丨丨在家湏農事歸同上不才丨丨名位晚敢恨省郎遲同上䕫府書懐備貟郎官幸丨丨欲陳世䇿丨丨濟丨丨已老尚書郎不及野人雖為尚書郎丨丨村丨丨並杜甫屯田郎中歴代㳂革漢尚書郎四人其一主户口墾田盖屯田之始也晉始置屯田郎中東晉宋齊並左民郎中兼知屯田事陳隋並為侍郎煬帝曰屯田郎唐龍朔中為司田大夫後復故掌天下屯田及在京文武職田諸司公廨田以品給焉唐職林國朝屯田判司事一人以無職事朝官充凡屯田之政令𨽻三司本司無所掌元豊改制郎中貟外郎始實行本司事两朝志參掌營田屯田官莊塘濼學校職分之田及其租入凡興修種刈給納檢察賞罰之事皆詔其長貳而行之神宗正史職官志初除張叙職畧元祐改入户部崇寧復續㑹要見崇寧元年十二月詔建炎三年詔兼虞部中興㑹要隆興元年詔工部屯田郎官一貟兼領孝宗㑹要事類兼儀式隋初屯田郎丨掌丨丨隋書並清立齊裴譲之十七舉秀才為屯田郎中譲之弟讞之謀之訥之諏之丨丨丨楊愔毎云河東士族京官不少裴譲之兄弟都無郷音北史祠屯不博唐省中語後行丨丨丨丨中行都門國史補閑簡無事省中司門都官屯田虞部主客皆丨丨丨丨諺曰司門都官屯田水部入南部新書有宣撫才唐沈扶為屯田郎中充南山道宣撫使至鄧州奏倉督鄧琬等先主掌湖南江西運到糙米裛爛成灰塵鄧琬父子兄弟至元孫相承前後禁死九人云云勅曰云云已上速便踈理以聞物議嘉扶丨丨丨丨擅小詞名柳永字耆卿識音律工小詞遊諸内侍門為屯田貟外郎未有差遣㑹太史奏老人星見時秋霽宴禁中仁宗命左右召詞臣為新樂章内侍屬永應制兾因縁進用永以小詞擅名天下欣然走筆甚得意比進呈上見首有一漸字色若不悦讀至其中乃與御製真宗挽詞暗合上慘然乃擲于地自此不復進用然至今天下稱為桞屯田云本事詞謀軍穫田出軍西域我君謀之屯田北假我君穫之燕集掌田入租見前本朝官制服畎畆事率屯戍之兵丨丨丨之丨郎於巾臺統其政令南豊擬制擢屯墾曹俾丨丨丨丨張道制六部監門歴代㳂革古無之國朝渡江後紹興二年詔置六部監門官一貟從堂除差人從吏部尚書沈與求之請也尋詔六部長貳踏逐奏差沈與求等舉新平江府通判董將詔依中興㑹要𨽻尚書左右選見中興㑹要尚書左遷注内遷則為寺監丞或權郎外除至有為諸路緫領者紹興十年吕郎中希常二十四年蘇寺丞振是也乾道後補外止為州内遷止為寺監簿紹興後又有為添倅者其遷寖輕矣朝野雜記事類選陞朝人紹興二年詔置六部監門官一貟丨丨丨文臣有才力丨充仍令六部掌貳奏差中興㑹要依寺監丞詔置六部監門官序位請給丨丨丨丨同上掌司門鑰丨丨丨丨之嚴胡文恭行吕惟簡制更司門鍵許公集制六部架閣歴代㳂革古無之國朝元豊有六曹架閤庫續㑹要崇寧元年何執中為吏部尚書四選按集史藏于家以舞文取賄執中請置庫架閣命官涖之是後六曹皆建止四朝史何執中傳大觀三年罷政和三年六書依舊置宣和二年罷續㑹要宣和二年户部勘㑹紹興三年立六部架閣庫中興題名記十五年復置官吏部户部各差一貟禮部兵部共差一貟刑部工部各差一貟以主管尚書某部架閣為名中興㑹要舊制官庀其司置于六部之内或遇其廢則以郎省兼之否則以監六部門兼之迨于紹興寺監年正官俱復然始屯司于外一也舊制金耀門文書庫多藏三司帳籍三司今版曹也自銓曹而下儲藏帳籍之所未之詳焉其後置六部架閣下大抵成案留部二年然後畀而藏之又八年則入之金耀今金耀無復曩日則悉藏於架閣庫二也二者不同而至於諸曹二十四司之文書盡歸儲蓄以待有用則今猶昔也中興題名記以都官貟外郎蘇治奏復之命末㕔郎官兼領中興繫年録事類論當世故杜莘老字起莘以珍南一教授客中都見九重方更化因上書執政執政偉其説薦為六部架閣明年慧見東方公奏對直丨丨丨之丨語益切直遷為刪定劉後溪撰文集序選似漢掌故其任似周司書其丨丨丨丨丨中興題名古今合璧事類備要後集卷三十二
