body:
  text: 古今合璧事類備要續集卷十一宋謝維新撰類姓門朱沛國角音古今姓纂顓頊之後周封曹挾於邾乃楚所滅子孫去邑以朱為氏一云舜臣朱彪之後齊有朱毛漢有中邑侯朱進隐陵侯朱濞吳郡漢功臣又都昌侯朱軫軫至買臣㑹稽太守事類折角前朱雲字游魯人與五鹿充宗論易連拄五鹿君諸儒語曰五鹿嶽嶽朱雲丨其丨由是為博士折檻朱雲願賜尚方斬馬劒斷佞臣張禹上令叱出雲攀丨殿丨艾薪朱買臣字翁子吳人常丨丨樵賣以給食擔束薪行且誦書當貴前朱買臣拜㑹稽太守上謂之曰冨貴不歸故郷如衣繡夜行年五十丨冨丨治第一朱邑字仲卿廬江舒人也學賢良為大司農丞遷北海太守丨行丨丨入為大司農並同上詔稱揚後朱暉卒天子憫惜下丨丨丨曰大司農邑廉潔守節退食自公亡疆外之交束脩之餽可謂淑人君子賜邑子黄金百斤以奉祭祀歌彊直朱暉字文季南陽人為臨淮太守使人畏愛丨曰丨丨自遂謚文忠朱穆字公肅常感時澆薄乃作崇厚論又著絶交論亦矯時之作為冀州刺史部令長聞穆濟河解印綬去者四十餘人卒丨為丨丨先生金印紫綬吳朱治字君理察孝兼州辟從事後拜安國將軍丨丨丨丨金玉山海梁朱异字彦和徧覽五經尤明禮易明山賔表薦异云丨丨萬文緣渉未登丨丨千尋窺映不測珥貂鹵簿朱异為太子博士居權要三十餘年自員外常侍至侍中四官皆丨丨自右衞率至領軍四職並驅丨丨並同上輕財好施唐朱據字子範吳郡人有姿貌膂力丨丨丨丨尚公主拜左將軍不虚接士丨丨丨丨隐居養親朱仁軌字徳容敬則之兄丨丨丨丨常誨子弟曰終身讓路不枉百步終身讓畔不失一叚有赤烏白雀棲所居樹謚為孝友朱仁軌卒表半千等共丨丨丨丨先生世被旌顯朱敬則字少連亳州人以孝義丨丨丨丨一門六闕相望吏畏人恱朱季南陽人丨丨其威丨丨其恵肅宗召拜僕射上便宜報曰補公家之空不累清白之素斯善美之士也篤學曰小萬卷皇朝朱昻字學之其先京兆人父葆光寓潭州遂家于衡山昻少丨丨有朱遵度者時謂之萬卷目昻曰丨丨丨幽棲自號退叟朱昻買竒書於所居為二亭曰知止曰丨丨丨丨曰丨丨又朱昻卒門人謚之曰正裕先生告老比漢二䟽朱昻弟協仕為主客郎中雍王府翊善其後以丨丨而歸時人以丨丨丨丨念母為朱孝子朱夀昌字康叔揚州天長人生七嵗父守長安出其母劉氏嫁民間母子不相知者五十年壽昌既仕而丨丨之不見也行四方求之不已行次同州得焉劉氏時年七十餘矣由是天下皆知其孝母卒泣涕幾䘮明有白烏集其墓上後為司農少卿東坡有丨丨丨詩云此事今无古春風中坐一月朱光庭見明道子汝歸曰光庭如在丨丨丨丨了丨个丨晦庵晩號滄洲朱松字喬年徽之婺源人儒學决科翰林學士綦處厚薦于朝為尚書郎子熹字元晦初居建之崇安立書室曰紫陽書堂後居建陽號雲谷老人亦曰丨丨丨丨丨丨秦天水徵音古今姓纂顓頊嬴姓之後伯益裔孫非子周孝王封之於秦隴西秦亭是也至始皇滅六國子嬰降漢子孫以國為氏又魯有秦堇父生丕兹及秦並秦祖人秦商楚人秦冉秦非並仲尼弟子事類萬石後漢秦彭字伯平扶風人與羣從同時為二千石者五人三輔號曰丨丨秦氏遷三陽太守百姓懐愛莫有欺犯奸吏跼蹐无所容詐轉穎川太守仍有鳯凰麒麟嘉禾甘露之瑞集其郡境簞瓢蜀秦宓字子軌始慕肥遯之髙曝背田畝之中誦顔氏之丨丨原憲之蓬户後為益州别駕遷大司農賜黄金瓶唐秦瓊字叔寳以字顯濟州歴城人始為隋將來䕶兒帳内䕶兒曰是子才而武豈久處貧賤邪後降髙祖拜馬軍緫管破尉遲敬徳功多帝丨以丨丨丨圖凌煙閣秦瓊卒太宗詔有司琢石為人馬立墓側以旌戰功丨形丨丨丨髙宗遣使致祭名臣者七人叔寳與焉皆終始著名者也文集長於議論本朝秦觀字少游揚州髙郵人有丨丨四十卷丨丨丨丨文麗而思深為相専主和議秦檜紹興丨丨十八年丨丨與金人丨丨子填亦舉進士第一尤吳興徵音古今姓纂或曰尤游同稱或曰尤乃石姓之誤乗訛𫝊襲因以為姓或曰尤起於仇仇者怨之義尤亦怨之義皆無所據者也事類閩人避諱丨丨丨王審知諱而沈氏去水而姓尤寧國多尤本朝江東丨丨丨有諸丨仕宦有至翰林尚書八座者許髙陽羽音古今姓纂姜姓炎帝之後周武王封其裔孫文叔於許後為楚所滅子孫分散以國為氏晉有許偃楚有許伯鄭有許瑕事類太岳左夫許丨丨之後又詩崧髙維嶽注四岳申甫齊許皆其後也旦評後漢許劭字子蔣汝南平輿人少峻名節好人倫多所賞識與從兄靖俱有髙名好共覈論人物毎月輒更其品題故汝南俗有月丨丨二龍許劭兄䖍亦知名汝南人稱平輿淵有丨丨五經許慎字叔重博學經籍時人語曰丨丨無雙許叔重英偉蜀許靖字文休少知名有人倫臧否之稱丨才丨士智畧足以計事倜儻瑰偉有當世之具勇力魏許禇字仲康勇力絶人一手逆曵牛尾行百餘歩淮汝陳梁間聞之皆畏憚軍中以褚力如虎而癡故號曰虎癡又曰虎侯遷武衞將軍經史笥南史許懋字昭哲為國子博士號為丨丨丨長鬚公北史許悙字秀良遷殿中尚書惇美鬚下垂至帶省中號丨丨丨稱神童許善心字務本多聞黙識為當時所稱謂為丨丨仕隋除秘書丞嘗製神雀頌文不加㸃筆不停毫有禮學唐許孟容方勁丨丨丨每所折衷咸得其正好提拔士天下清議歸之門下論駁許孟容字公範京兆人自袁髙争盧杞後凡十八年丨丨无議可否者至孟容數丨丨四方知天子開納多士浩然想見其風制誥豐美許景先常州人學手筆俊拔茂才異等連中知丨丨以雅厚稱張說曰許舎人之文雖乏峻峯激流然詞㫖丨丨得中和之氣進士第一本朝許將字冲元福州閩縣人舉丨丨丨丨元祐臣僚惇卞奏乞發司馬光墓將獨无言哲宗問曰卿不言何也將曰發人之墓非盛徳事哲宗曰朕意與卿同乃不從何盧兆商音古今姓纂周成王弟唐叔虞裔孫韓王安為秦所滅子孫分散江淮間音以韓為何遂為何氏事類無赫名前漢何武字君公蜀郡郫縣人所居丨丨丨去後常見思功名畧比薛宣有心思後何休字劭公質樸訥口稚丨丨丨精研六經世儒无及者作公羊墨守左氏膏盲榖梁廢疾酷似舅晉何无忌劉牢之之甥丨丨其丨務華侈何曽字頴考丨在丨丨帷帳車服窮極綺麗日食萬錢猶曰无下筯處稱清白何昌㝢字儼望尚之弟子少獨立不羣所交必當世清名是以風流籍甚厯湘東南郡二太守皆以清白稱舊徳宗臣何曽位太傅進太宰侍中明朗髙亮執心𢎞毅可謂丨丨老成國之丨丨者也一代偉人何烱字士光十五從徹受業一朞並通五經章句從戢曰此子非止吾門之寳亦為丨丨丨丨也清公第一何達字義方為武昌太守奉錢无所取所至皆生立祠遷東陽太守疾强冨如仇讎視貧細如子弟特為豪右畏憚丨丨實為天下丨丨撰史年老宋何承天初為尚書祠部郎性剛愎不能屈意朝右後除著作佐郎丨國丨時丨已丨而諸佐郎並年少荀伯子嘲之常呼為妳母白楊何妥何妥字栖鳳少機警八嵗遊國子學時蕭眘亦有雋才住青楊巷妥住白楊巷時語曰世有兩雋丨丨丨丨青楊蕭眘史叱賊何蕃唐何蕃和州人朱泚反諸生將從其亂蕃正色叱不聽故六館士旡受其汙者言夏竦回佞本朝何郯字垩從成都人擢侍御史知雜上䟽丨宰相陳執中寡學參政丁度輕脱樞宻使丨丨丨丨皆不協人望不當在此位章累上言不已仁宗正色舉進士第一何㮚字文縝仙監人丨丨丨丨丨在虜營題詩何㮚在虜中不食而死年三十九後有自丨丨還者言㮚死狀始贈觀文殿大學士丨丨丨丨丨云念念通前刼依依返舊魂人生㑹有死遺恨滿乾坤以太傅就第何執中字伯通䖍州龍泉人政和六年以丨丨丨丨朝朔望徽宗曰自相位得謝古難其人本朝數十年无此事執中曰唯張士遜以太傅鄧國公就第徽宗曰當時恩禮恐未必爾其眷遇如此東坡教誨何頡之字斯舉黄岡人自號樗叟篤學善屬文丨丨先生謫居齊安斯舉少年因侍丨丨吕河東羽音古今姓纂炎帝姜姓之後虞夏之際封吕今南陽宛縣西亭是也至周失國子孫氏焉事類四嶽吕尚東海上人其先祖嘗為丨丨有功封於吕尚其苗裔也本姓姜氏從其封姓故曰吕尚號曰太公望史記六韜太公丨丨曰文王將田史編布卜曰田於渭陽非龍非彲非虎非羆兆得公侯天遺汝師以之佐昌施及三王文王曰兆致是乎文王乃齋三日田於渭陽卒見太公坐茅以漁乃載與俱歸立為師詩曰維師尚父時維鷹揚同上更刮目吳吕䝉字子明孫權謂蒙宜學問以自開益後魯肅過䝉言議拊蒙背曰吾謂大弟但有武畧耳今者學識英博非復吳下阿䝉䝉曰士别三日即丨丨丨相待寧乆貧吕範字子衡有容觀姿貌邑人劉氏家冨女美範求之女母嫌欲勿與劉氏曰觀吕子衡丨當丨丨者邪遂與之婚府君清明吕䝉字子明歸魏拜鉅鹿太守百姓頌之曰時惟丨丨克丨克丨緝我荒土人胥樂生願夀無疆以享長齡姿儀瓌秀唐吕元膺字景夫鄆州人丨丨丨丨有器識游京師謁故相齊映映歎曰吾不及職婁郝殆斯人類乎有台宰望吕元膺正色立朝丨丨丨丨處事裁宜人服其有體號連錦書吕尚字子回工草𨽻一筆環寫百字若縈髮然世丨丨丨丨奏美人賦吕向開元十年召入翰林時帝嵗遣使采擇天下姝好内之後宫號花鳥使向因丨丨丨丨以諷擢進士第吕温字和叔渭之子從陸贄治春秋梁肅為文章丨丨丨丨藻翰精富一時流輩推尚國朝三居相本朝吕蒙正字壁功河南人丨丨以來丨丨丨位唯趙普與蒙正有姪宰相才吕蒙正真宗問曰卿諸子孰可用蒙正對曰諸子皆不足用丨丨夷簡丨丨丨也當對秉鈞軸吕夷簡字坦夫河南人王曽為知制誥一日至中書見宰相王旦旦謂曽曰君識吕夷簡否曽曰不曽也旦曰其人器識逺大君其善交之異日丨與君丨丨丨丨曽曰公何以知之旦曰以其奏請得之如不稅農器是也此子公輔器吕公著字晦叔宰相夷簡子識慮深逺有度量夷簡嘗曰此子丨丨丨也又宋興大臣以三公平章軍國者四而二人則公著父子也推廣祖宗法吕大防字㣲仲京兆藍田人拜左僕射兼門下侍郎哲宗朝因丨丨丨丨家丨以進曰祖宗家法甚多自三伐以後唯本朝百二十年中外无事盎由祖宗所立家法最善為管庫幾十年吕希哲字原明前後丨丨丨者丨丨丨因詩窮耽禪病吕本中字居仁申公之孫舜徒右丞之子少學山谷為詩自成一家平生丨丨以丨丨丨而丨清癯如不勝衣有孟浩然跨驢之相一室蕭然凝塵滿席裕如也每以前路資糧為念嘗有詩云病知前路資粮少老覺平生事業非精史學號東萊吕祖謙字伯恭淳熈中與晦翁南軒相酬答丨於丨丨丨丨丨先生施吳興徵音古今姓纂魯惠公子施父尾生施伯伯孫傾叔生孝叔惠公五代孫也因氏之漢有博士施讎事類殷民七族左丨丨丨丨陶氏施氏封畛之畧以共王職論經同異前施讎字長卿沛人從田王孫受易梁丘賀薦之拜為博士與五經諸儒丨丨丨丨於石渠閣明閑吏職施文慶陳後主以為中書舍人丨丨丨丨心筭口占應時條理大被親幸南史張清河商音古今姓纂黄帝弟五子青陽生揮為弓正觀弧星始制弓矢主祀弧星因姓張氏事類孝友侯誰在矣張仲丨丨詩侯奄晉悼公即位張老為丨丨左筭厯前漢張蒼陽武人也封為北平侯自秦時為柱下史明習天下圖書記籍又善用丨律丨受書張良其先韓人也丨丨於圮上老父帝師張良以三寸舌為丨者丨封萬户位列侯運籌張良丨丨帷幄中决勝千里外借箸張良丨丨畫籌辟榖張良願棄人間事從赤松子遊乃學丨丨道引輕身結襪張釋之字季堵陽人為王生丨丨記書張安世字子孺以父仕為郎丨亡丨三篋上竒其才封侯張安世宿衞忠正勤勞國家以定䇿功拜大司馬車騎將軍領尚書事薦舉莫見其迹父子丨丨功臣之世惟有張氏親近遺寵比於外戚能吏張武為梁相以柱後恵文彈治其治亦有迹丨丨也枹鼓張敞字子髙何東平陽人詔守京兆尹丨丨稀鳴市無盜賊又為婦畫眉長安𫝊京兆眉膴絲竹張禹字子文後堂理丨丨管絃弟子彭宣戴崇禹親愛崇將入後堂飲食宣來見於便坐未嘗得至後堂白馬生後漢張湛字子孝扶風人光武臨朝或有惰容湛輒陳諫其失常乗白馬帝每見湛輒言丨丨丨且復諫矣張曽子張霸字伯饒成都人數嵗而知孝讓郷人號為丨丨丨號聖童張堪字君游南陽人年十六志美行厲諸儒號曰丨丨後拜漁陽太守百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支謂草聖張芝字伯英好草書丨之丨丨千里駒張敷字景𦙍宋武帝召見竒之曰真丨丨丨也明故事張純字伯仁京兆人宿衞十有餘年封武始侯在朝厯世丨習丨丨自郊廟婚冠䘮紀禮儀多所正定埋車輪張綱字文紀漢安初遣八使循行風俗綱獨丨其丨丨於洛陽都亭曰豺狼當路安問狐貍作渾儀張衡字平子南陽人通五經貫六藝拜郎中遷為太史令丨丨天丨著靈憲筭罔論馬金不入張奐字然明遷安定屬國都尉羌豪師感其恩徳上馬二十匹先零酋長又遺金鐻八杖受之而召主簿以酒酹地曰使丨如羊不以入廐使丨如粟丨以丨懐悉以還之折車布囊張堪為蜀郡太守去之日乗丨轅丨丨被丨而已𢎞雅英秀吳張温字惠恕吳郡人少脩節操容貌竒偉當今無軰丨丨之素丨丨之徳文章之采論議之辯卓躒冠羣煒曄曜世世人未有及之者容貌務嚴吳張昭字子布忠謇亮直有大臣節丨丨丨丨有威風舉邦憚之征東將軍魏張遼字文逺與孫權戰於合肥衝壘突圍吳人奪氣拜丨丨丨丨詔曰合肥之役以歩卒八百破賊十萬自古用兵未之有也為世虎臣蜀張飛字翼徳雄壯威猛稱萬人之敵丨丨丨丨博學有文晉張載字孟陽丨丨丨丨章為著作郎著西蜀銘作濛汜賦為名流之所挹博物洽聞張華字茂先强記黙識四海之内若指諸掌丨丨丨丨世無與比江東歩兵張翰字季鷹吳人也有清才善屬文號為丨丨丨丨吳中蓴鱸張翰齊王冏辟為東曹掾翰謂同郡顧榮曰天丨紛紛吾亦與子採南山蕨飲二江水耳翰因秋風起乃思丨丨菰菜丨羮丨魚膾曰人生貴得適志何能覊官數千里以要名爵乎遂命駕而歸論事回天唐張𤣥素蒲州人貞觀中詔𤼵卒治洛陽官且東幸𤣥素上書魏證聞𤣥素言歎曰張公丨丨有丨丨之力可謂仁人之言哉用必盡節張東之字㿻將襄州人令狐徳棻以王佐期之武后謂仁傑曰荆州長史張柬之雖老宰相才也丨之丨丨丨於國長史政績張仁愿華州人有文武材神龍中兼洛州長史先是賈敦頥為丨丨有丨丨時人語曰有前洛賈後張江淮知名張萬福魏州人李正己反為濠州刺史上謂曰先帝改爾名政所以褒也朕謂丨丨草木亦丨卿威丨九州惠愛張萬福詔圖形凌煙閣卒年九十自始終禄食七十年未嘗一日言病凡丨丨皆有丨丨七嵗屬文張九齡字子壽韶州曲江人丨丨知丨丨十二以書干廣州刺史王方慶歎曰是必致逺擢進士始調校書郎以道學伊吕科䇿髙第為左拾遺千秋鑑録張九齡初千秋節公卿並獻寳鑑九齡上事鑒號丨丨金丨丨以神諷諭為修書使張説字道濟洛陽人上置麗正書院聚文學之士或修書或侍講以張說丨丨丨丨供給優厚陸堅以為無益於國欲奏罷之說曰自古國家無事莫不崇宫室廣聲色今天子獨延禮文儒𤼵揮典籍所益者大所損者微陸子何不達也上聞之重說而薄堅賦朝天行張建封字本立鄧州人十三年來朝帝不待日召見延英殿帝眷遇異等建封丨丨丨丨以獻文瑞朝廷張鷟字文成薦之祖早慧絶倫為兒時夢紫文大鳥五色成文止其廷大父曰五色赤文鳯也紫文鸑鷟也若爾殆以丨章丨丨丨乎遂命以名文猶青錢張鷟貟半千稱鷟丨辭丨丨銅丨萬選萬中號青錢學士屬文下筆輒成晩進莫不𫝊記新羅日本使至必出金寳購其文長於樂府張籍字文昌和州人第進士韓愈薦為國子博士排釋老籍為詩丨丨丨丨多警句三㦸張家張儉字師約京兆人兄弟三人門皆立㦸號丨丨丨丨號鳴珂里張喜祐有幹畧嘉貞為相任金吾衞將軍昆弟每上朝軒葢騶道盈閭卷時丨丨所居坊曰丨丨文武兼資張闇字季權代鳳翔帝曰丨丨丨丨望重内外無易卿者帝幸奉天鎰罄家資自獻行在體局方正炫張行成字徳立定州人劉曰行成丨丨丨丨廊廟才也今之管簫張文瓘字稚圭闕州人貞觀初第明經補并州參軍時李勣為長史歎曰稚圭丨丨丨丨吾所不及比之嚴光張志和善圖山水酒酣或擊筑吹笛砥筆輟成常撰漁歌憲宗圖真求其歌不能致李徳裕稱志和隐而有名顯上而無事不窮不達嚴光之比並同自號𤣥真張志和著𤣥真子亦以自號又著太易十五篇其卦三百六十五自稱釣徒張志和字子同婺州人母夢楓生腹中而産志和待詔翰林後居江湖丨丨煙波丨丨甲戌進士第一張孝祥字安國紹興丨丨擢丨丨丨丨古今合璧事類備要續集卷十一
