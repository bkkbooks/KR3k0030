  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_299-1a, image: WYG0941/WYG0941-0480a.png}
body:
  text: 古今合璧事類備要别集卷九十三宋謝維新撰蟲豸門蠧格物總論蠧食木蟲爾雅云蝎蛣􅔒也一如蠐螬節長足短生腐木中穿木如刀桃木中者殺鬼去邪氣桂中者辛美可噉去冷氣又一種曰蟫音白魚衣書中蠧蟲今人亦止以為蠧然二物也胡可以不别事類獻蠧文帝賜尉佗書衣物佗因使者丨桂丨一器漢書桂蠧紫色香辛有味噉之去隂痰之疾大業拾遺録陸龜蒙蠧化橘之蠧大如小指首負特角身蹙蹙然類蝤蠐而青翳葉仰囓飢蚕之速不相上下人或棖觸之輒奮角而怒氣色桀驁一旦視之凝然弗食弗動明日復往則蛻為蝴蝶矣力力拘拘其翎未舒襜黒韝蒼分朱間黄腹瑱而橢墮緌纎且長久醉方悟羸枝不揚又明日往則倚薄風露攀縁草樹聳空趐輕瞥然而去或隱蕙隙或留篁端翩旋軒虚颺曵紛拂甚可愛也須㬰犯蝥網而膠之引絲環纒牢若拲梏人雖甚憐不可解而縦矣噫秀其外類有文也黙其聲類有徳也不朋而遊類潔也無嗜而食類亷也向使前不知為橘之蠧後不見觸蝥之網人謂之鈞天帝居而來今復還矣天下大橘也名位大羽化也封畧大蕙篁也茍滅徳忘公崇浮飾傲榮其外而枮其内害其本而窒其源得不為大蝥網而膠之乎觀吾之蠧化者可以惕之蟫辟蠧芸香丨丨魚豢典畧不蠧火炙簡令汗取青易書復丨丨謂之汗簡後吳祐傳詩集粉光鮮鱗細丨丨丨開書亂眼前透忩疑漏網落硯似流泉潛穴河圖内吞鈎乙字邊莫言鬐鬛小食盡白蘋篇李逺詠壁魚文字間豈殊蠧魚蟲生死丨丨丨韓散帙乾丨丨壁魚丨杜當夏㬠形状類于魚其心好蠧書居常遊篋笥未始在江湖為害千般有言烹一物無年年丨盛丨丨了又如初邵康節蟻格物總論蟻微蟲穴居卵生有白黒黄赤大小數種大螘俗呼為蚍蜉小螘齊人呼為蟻蛘又有翅而飛者其卵蚳其子蝝事類蚍蜉蛾子時術之注蛾丨丨也學記𤣥駒蟻為丨丨大戴禮慕羶蟻丨丨荘子觀鰲見前鰲注詳攻欒巴蟻衆而善丨丨棟往往木容完具而心節朽壞屋居者不省其微而禍成傾壓元稹文集封戸蟻丨穴丨大雨将集焦贛易林蟻穴千丈之堤以丨丨而壞韓子蟻壤齊威公伐孤竹山中無水隰朋曰蟻冬居山之陽夏居山之隂丨丨寸而有水乃掘地遂得水韓子澆蟻得禍桓謙字敬祖太元中忽有人皆長寸餘悉被鎧持槊縁杌登竈尋飲食之所或有竊肉以槊刺取徑入穴蒋山道士朱應子以沸湯丨所入處寂不復出因掘之有斛許大丨死在穴中謙後以門釁同滅劉敬叔異苑救蟻獲報董昭之過江見蟻􅇢一短蘆昭之丨之後繋獄丨領羣蟻穴獄昭之遂得免東陽元疑齊諧記河内馬遊牛亨問蟻為𤣥駒者何答曰丨丨人見丨數十萬騎皆大如黍米遨丨往來從朝至暮家人以火燒之人皆成蚊蚋馬皆成大蟻今人呼蚊蚋曰黍民蟻曰𤣥駒古今注牀下牛鬭殷仲堪父師晋陵太守嘗患耳聰聞丨丨蟻動謂之丨丨晋本傳兖州蟻鬭後魏顯宗時丨丨有黒丨與赤蟻交丨長六十步廣四寸赤蟻斷頭而死鄴下蟻鬭東魏孝静時丨丨有黄丨與黒丨丨並五行志盥而避蟻哲宗朝程頤為崇政殿說書頤聞帝在宫中丨丨丨丨因畢講請曰有是乎上曰然誠恐傷之耳頤曰推此心以及四海帝王之要道也上曰善橋以渡蟻二宋少時有胡僧曰小宋他日魁天下大宋亦不失甲科後十年僧驚問大宋曰公丰神頓異如能活數萬人之命者試思之曰堂下比有蟻穴為暴雨所侵羣蟻繚繞穴傍吾戲編竹丨丨丨之耳僧曰是也小宋今年首捷公終不出其下比唱第小宋累中魁選章聖臨朝謂弟不可以先兄以大宋為第一惕然恐踐徐孝節先生自小戒殺見聚蟻丨丨惟丨丨之行状李徳裕蚍蜉賦此郡多蚍蜉所居臨流實繁其類或聚於袵席或入於盤盂終日厭苦而不知可禦之術因戲為此賦令稚子􅂱和之惟江潭之下國况幽居於澤畔何螻蟻之微物亦有徒而零亂或泮散於經笥或寅縁於食案予乃戲而問之曰爾能居厚地而漏江河無乃處吾身而為大患蟻不能言辭以意宣其㫖曰我禀形於造化亦一氣之所甄嘗濟齊師之乏亦聞媯徳之羶覩封穴而知雨驗寸壤而得泉出以時而不息故學者得而稱焉戴粒而遊若巨鰲之冠神嶽繞磨而行若日月之麗清天若乃依垤縁壁淫淫奕奕其聚無聲其行無迹值晏温而出遊當祁寒而入隙迅雷作而不駭微雨灑而自適生雖𤨏細亦有行藏止若羣羊之聚進如旅鴈之翔乘其便也雖鱣鯨之可制無其勢也雖蛭螾而不傷今願悔過戢于垣墻豈同青蠅之㸃白汙君子之衣裳詩集上枯桑行蟻丨丨丨杜漏成河蟻壤丨丨丨鮑明逺化飯為臣妾蟻王丨丨丨丨丨螺母偷蟲作子孫彼此假名非本物其間何怨復何恩白居易拾粒苦鶯􅘱蟻子生無處元因濕處生隂淫煩擾攘丨丨丨丨丨床上主人病耳中靈藏鳴雷霆翻不省聞汝作牛聲元稹咂食困鮫鯨時術功雖細年深禍亦成故穿漏江海丨丨丨丨丨敢憚衰欒蠧深藏柱石傾寄言持重者微物莫全輕前人勇鬭劇虓虎嘗聞蠻觸氏殺人血漂杵不知爾何事丨丨丨丨丨世言螘之戰日中當大雨茍能驗天時殺身亦何補鄭内翰由來穴知雨擾擾嗟何急營營若有侵丨丨丨丨丨非爾早為霖王覇强并弱興亡古到今願君推逹觀安得異機心劉原父歸來滿後車偶爾相逢試問途不知何事數遷居微軀所饌能多少一獵丨丨丨丨丨楊廷秀觀蟻突出陳成行一騎初來隻又雙全軍丨丨丨丨丨䇿勛急報千夫長渡水還争一葦航前人蝨附蚤格物總論蝨囓人蟲蟣蝨子然頭蝨着身皆稍變而白身蝨着頭皆漸化而黒抱朴子毉家以為出於皮膚下蚤囓人跳蟲也出於塵土間或以為蟻化諒然乎事類甲胄生丨丨丨蟣蝨韓子湯沐具丨丨丨而蟣蝨相弔淮南子衣中蝨似衣丨丨必須搯之三國典畧口中蝨以新室吞胡虜無異丨丨丨漢書貫之而懸紀昌學射於飛衛使學視小如大紀昌以氂懸蝨於牖南靣而望之二年之後如車輪焉以觀餘物皆丘山也乃以燕角之弧孤蓬之簳射之丨蝨丨心丨丨不絶以告飛衛衛曰汝得之矣蕩然無依馬援擊尋陽山賊上書曰除其竹木譬如嬰兒頭多蟣蝨而剃之丨丨蟣蝨丨所復丨書奏上大恱因出小黄門頭有蝨者皆剃之東漢記捫蝨而言王猛隱居華山懷佐世之念桓温入關猛被緼袍而詣之面談當世之事丨丨丨丨旁若無人温察而異之搔蝨無已稽康與山濤書危坐一時痺不得揺性復多蝨爬搔丨丨而當裹以章服揖拜上官三不堪也擇蝨夷然晋顧和王導辟為揚州從事月旦當朝未入停車門外周顗遇之和方丨丨丨丨不動顗指和心曰此中何所有和徐應曰此中最是難測地語録終身無蝨齊江泌性仁義衣被蝨多綿裹置壁上恐蝨饑死乃復置衣中後丨丨丨丨對客覔蝨北齊邢子才位中書監脫畧簡易不修威儀有齋不居坐卧常在一小屋菓餌之屬置之梁上賔至下而共噉丨丨或解衣丨丨且與劇談卞彬賦蝨齊丨丨為南昌郡丞仕既不遂及著蚤蝨蝎蟲蝦蟆等賦皆大有指斥士蔚採蝨卞丨丨居貧多病縈寝敗絮澡刷不謹澣沐不時四體㲰㲰加以臭穢故葦席蓬纓之間探丨蚤丨日不替手自作賦序文襄擇蝨馬子如為大行臺及丨丨輔政見之哀其憔悴以股承其首親為丨丨賜酒百瓶羊五百口粳米五百石子如曰無事尚被囚幾死若受此豈有生路耶北史衲衣養蝨查道性淳古少寓狼山寺躬事薪水以給僧衆丨丨不洗濯以丨丨後仕至龍圖閣侍制國老閑中夜捫蝨無畏三藏飲酒食肉言行麄易律師不說當令宿于戸外律師丨丨丨丨投床下無畏即呼曰撲殺佛子律師異之鄭棨傳信記蚤殺蚤不誠韓昭侯搔而痒亡一蚤求之甚急左右因取其蚤蝨而丨之昭侯以此察左右不誠也韓子探蚤不替齊卞士蔚事詳見前賦蚤指斥齊卞彬事詳見前阮籍大人先生傳其畧曰世之所謂君子惟法是修惟禮是克手執圭璧足履繩墨行欲為目前檢言欲為無窮則少稱鄉黨長聞鄰國上欲圖三公下不失九州牧獨不見羣蝨之處褌中逃乎深縫匿乎壤絮自以為吉宅也行不敢離縫際動不敢出褌襠自以為得繩墨也然炎至火流焦城熾都羣蝨動於褌中而不能出也君子之處域内何異乎蝨之處褌中乎此亦籍之胸懷本趣也李商隱蝨賦亦氣而孕亦卵而成晨鷖朝鶴不知其生汝職惟囓而不善囓囬臭而多跖香而絶陸龜䝉後蝨賦余讀玊溪生蝨賦有就顔避跖之嘆似未知蝨作後蝨賦矯之必衣緇守白髪華守黒不為物遷是有恒徳小人趨時變顔色棄􅇤涵腴乃蝨之賊詩集食血自安貧衣敝易垢易垢少蝨難羣處裳帶中旅升裘領端藏迹詎可索丨丨以丨丨人世猶俯仰爾生何足觀梅聖俞師厚云古蝨未有詩邀予賦之懷絮非吉吾兒久失恃髪括仍少櫛曽誰具湯沐正爾多蟣蝨變黒居其元丨丨宅丨丨蒸如蟻亂縁聚若蚕初出鬢搔極蓬葆何暇嗜梨栗剪除誠未難所惡累形質前人秀叔頭蝨蚤捫蝨反得兹日頗所愜丨丨丨丨蚤去惡雖未殊快意乃為好物敗誰可必鈍老而狡夭穴蟻不囓人其命常自保前人古今合璧事類備要别集卷九十三
