body:
  text: 古今合璧事類備要後集卷八十宋謝維新撰縣官門縣丞歴代沿革漢氏縣丞尉多以本部人為之三輔縣則兼用他郡諸縣皆有主刑獄囚徒後漢署文書典知倉獄署諸曹掾史自晉後無丞宋惟建康有獄丞及隋氏革選盡用他郡人漢以下皆用一人唐置京縣丞三員北京太原晋陽各置一人六典注髙宗始為品官吏部選授為縣令之貳唐職林國初不置丞天聖中因蘇耆請開封兩縣始各置丞一員在簿尉之上仍於有出身幕職令録内選充時兩赤縣簿尉多差出外本縣闕官故耆有此請皇祐中詔赤縣丞並除新改官人熙寜四年編修條例所言諸路州軍繁劇縣令户二萬已上増置縣丞一員以幕職官或縣令人充㑹要元祐元年詔應因給納平常免役置丞並行省罷如委是事務繁劇難以省罷處令轉運司存留崇寧二年宰臣蔡京言熙寜之初修水土之政行市易之法興山澤之利皆王政之大請縣並置丞一員以掌其事國史外補云縣丞昔大邑有之至是不以邑之大小皆得置丞使主管常平坑冶農田水利大觀三年詔昨増置縣丞内除舊額及萬户以上縣令委是事務繁冗并雖非萬户實有山澤坑冶之利可以興修去處依舊存留外餘皆减罷續會要建炎元年詔縣丞係嘉祐以前員闕并萬户處存留一員餘並罷紹興三年以淮東累經兵大權罷縣丞十八年置海陵丞一員中興會要事類長吏縣丞長吏也百官表縣百户以上為令皆有丞尉秩四百石至二百石是為丨丨漢書景記廉吏黄霸為穎川太守許丞年老病聾督郵白欲逐之覇曰許丞丨丨雖老尚能拜起真清唐陸景情為扶溝丞按察使畢講覆州縣殿最惟景情曰丨丨簡靖穎川陳南仲居是官邑人宜之號為丨丨夫以武功彊理之大人徒之多而陳生以簡靖輔其理斯固難矣柳文武功丞壁記佐邑縣寮並白六帖賛府裴子雨為下邳令張晴為縣丞二人俱有聲氣而善言語會論事移時人吏竊相謂曰縣官甚不和長官稱雨丨丨道晴終日如此不和也南部新書典倉獄丞署文書丨知丨丨後漢百官志主刑獄丞丨丨丨囚徒注史記曰記捕淮南太子淮南相壽春丞留太子不遺如淳曰丞主刑獄囚徒故責之通典述六職丞之位八品以下丨丨丨以輔其治也柳子厚武功縣丞壁記佐一司丨理丨丨貳職百里白六帖清淨無欲後漢張𤣥字宗君遷陳倉縣丞丨丨丨丨專心經書鋩刃不頓崔倕在臨晉處煩應卒丨丨丨丨縣徒勞人梁竦曰州丨之職丨丨丨耳位極人臣張東之年六十三為清源丞善相者云當丨丨丨丨縣為副貳丨有七司丞丨丨丨如州上佐通典通判縣事隋又大唐縣丞各一人丨丨丨丨同上解曚難問張𤣥初為縣丞嘗以職事對府不知官曹處吏白門下責之時扶風徐業亦大儒也聞𤣥諸生試引見之與語大驚曰今日相遭真丨丨矣遂請堂上丨丨極丨講經行禮唐王義方坐與張亮交通貶為儋州吉安丞行至海南舟人將以酒脯致祭義方曰黍稷非馨馨在明德酌水而祭時當盛夏風濤蒸毒既而開霽南渡吉安蠻俗荒梗義方召諸首領集生徒親為丨丨丨釋奠丨清歌吹籥而登降有序蠻酋大服佐縣有稱呉孫堅為下邳丞丨丨丨丨丨頌議歸丞獨孤君上迫宰君下雜羣尉文墨教令不專有窮然力行務仁推誠愛物謳吟者不歌其宰丨丨者必丨於丨陳子昂集彭州九龍縣丞獨孤君遺愛碑序出囚知名唐臨為萬泉丞縣有輕囚十數人㑹春暮時雨臨白令請丨之令不許臨曰明公若有所疑臨請自當其罪令丨請假召囚悉令歸家耕種與之約令歸繋所囚等倍感恩義至時畢集詣獄臨由是丨丨唐書俗謂閑官州有上佐縣有丞簿丨丨丨丨不領公事殊乖制作之本意續通典大中四年勑書占氣遷丞唐張鷟云九十里之丹鳯自下升髙七十日之黄龍從微至著注宋玉曰鳯凰上擊九十里翺翔乎窈𡨕之上藩籬之鷃豈得料其髙哉士亦然矣相書丨丨要曰日中有黄氣如龍七十日丨為丨也登岳諭屬唐宋安公為龍門丞年已五十八數年而登列岳每謂寮屬曰公輩但守清白何憂不遷俗云雙陸無休勢余以為仕宦亦無休勢各宜勉之白黥猾胥王庭珪號瀘溪先生召茶陵丞民俗朴陋擇秀民置之學士皆被其化猾胥文雅者勢傾一邑交結諸監司為囊槖累政不能去公把其宿負白于郡黥之舉邑稱快至今人猶德之胡澹菴集論免和糴紹興十八年旱詔復民租十之八而和糴尚在海鹽丞丁安義語其令曰歳饑常賦且不充不應復有和糴使上官怒安義當以身任之檄屢至安義抗論反覆卒賴以免桓譚為陵安後漢丨丨字君山數言事忤㫖出丨丨丨丞忽忽不樂温舒為石苞路丨丨丨丨丨邑丞佐卓魯之政貳子男之職丨丨丨丨丨白帖從趙典之任髙府君為易州遂城縣丞以管輅之才丨丨丨丨丨陳子昻集公輔民稱惠愛𫝊察字丨丨知洺州永平丞在職清謹惠愛及民到于今稱之𫝊忠肅公察𫝊公節人頌遺愛錢丨丨丞臨安縣民轉徙豪右冒墾其田官不能直于者悉奪還之流民復業又除二税積弊亦蠲民瘼至今邑丨丨其丨丨楊龜山錢忠定公墓制議事僉書文檄縣丞簿尉日赴長安㕔丨丨及丨丨丨丨本朝元符詔處事明限必信汪大猷字仲嘉為同華丞丨丨益丨其丨丨丨文引可以質錢至有以潤其屋者樓攻媿集正心誠意之學楊萬里諡文節丞零陵張忠獻公謫寓焉勉公以丨丨丨丨丨丨佩服其言遂以誠名齋言行録韓愈藍田縣丞㕔壁記丞之職所以貳令於一邑事無所不當問丞位髙而偪例以嫌不可否事文書行吏抱成案詣丞鴈鶩行以進平立睨丞曰當署丞涉筆占位署惟謹丞之設豈茍然哉博陵崔斯立運學績文以蓄其有泓涵演迤曰大以肆再轉為丞兹邑始至喟然曰官無卑顧材不足以塞職既噤不得施用乃喟然曰丞哉丞哉余不負丞而丞負余則盡枿去牙角一躡故跡破崖岸而為之庭有老槐四行南牆矩竹千挺儼若相持水㶁㶁循除鳴斯立痛掃溉對樹二松日吟哦其間有問者輒對曰余方有公事子姑去詩集外府聖朝收丨丨皆是九天除姚合書縣丞舊㕔貳職因君丨丨藍溪上遣我維舟紅葉時方干題慈溪張丞壁佐雙鳬計程航一葦試吏丨丨丨權德輿送上虞丞詩歌賛府剰有老農丨丨丨楊誠齋詩花綬傍腰新丨丨丨丨丨闗東縣欲春云云虞坂臨官舍條山映吏人看君有知己坦腹向平津岑參送虞校書赴虞卿丞主簿歴代沿革漢晉有之自漢以來皆令長自調用至隋始置之唐赤縣置二人他縣一人武德初以流外為之髙宗始以為品官吏部選授掌付事勾稽省署抄目糾正縣内非違通典唐職林本朝開寳三年詔諸縣千户以上置令簿尉四百户以上置令尉令知主簿事四百户以下置簿尉主簿兼知縣事實録咸平四年王欽若言川峽縣五千户以上請並置簿自餘仍舊以尉兼從之天禧五年劍州梓潼等各増主簿皇祐五年詔南川縣置主簿嘉祐五年婺州義烏永康武義浦江四縣置主簿熈寧四年陜西河東沿邊城寨置主簿此事從鄧綰申請事類紏職周禮簿司主簿謂主諸丨丨通典鸞棲後漢仇覽字李智一名香考城令王渙署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志耶覽曰以為鷹鸇不若鸞鳳渙謝遣曰枳棘非丨鳯所丨百里豈大賢之路今日太學曳長􅅂飛名譽皆主簿後耳以一月俸為資勉入太學其名大振箏彈晉謝景仁為豫州主簿在桓元閣下元聞其善彈箏呼之既至取丨與丨因歌秋風意氣殊適以此大竒之短簿王恂為桓温主簿人曰丨主丨昻駒韋元將為郡主簿楊處稱曰韋主簿有長成之風丨昻千里之丨三輔决録三傑唐魏谷倚為太原主簿與𫝊嘉謀呉少徴號北京丨丨佳壻楊於陵調句容主簿節度使韓滉剛嚴少許可獨竒於陵謂妻曰吾求丨丨無如於陵賢田以妻之符邙職司丨丨主掌簿書白帖管轄丨丨之司糾察丨丨凖繩勾稽朱勾並同上上轄唐主簿丨丨通典糾邑俾之丨丨白集鄭枋河西主簿制棲棘丨丨之官白帖矮屋張彖登科為華隂簿而為守令所抑嘆曰丈夫有凌雲蓋世之志而拘於下位若立身丨丨之下使人擡頭不得乃棄官而去開元天寳遺事髯鬚外史王建僣蜀李景上封事以為眉山主簿制曰旌其忠藎之心委以丨丨之職注云崔豹古今注羊名髯鬚主簿閑官見前縣丞俗謂閑官注不遇始韓琬為髙郵主簿使京師自負其才有丨丨之言題客舍他日欽緒見之笑曰是子歎後時耶唐蔣飲緒𫝊鐵主簿齊許惇性識敏速逹於後政嘗為司徒主簿以能判時人號曰入丨丨丨習主簿晉習鑿齒極温辟西曹主簿為親密時語曰徒三十年看儒書不如一詣丨丨丨為宰相盧公邁去河南為右補闕其後由尚書至宰相鄭公餘慶去汜水為監察御史其後由工部侍郎至宰相趙公宗儒去陸渾為右拾遺其後由給事中丨丨丨韓愈河南府同官記至吏書顧公少連去登封為監察御史其後由京兆尹丨丨部尚書東都留守同上王佐才唐李栖筠有丨丨丨士多慕向為冠氏簿太守李峴視若布衣交有能名髙祖謂吏部侍郎曰今選吏豈無才問特達者朕將用之鋭言行成調富平薄丨丨丨召補殿中侍御史唐張行成𫝊髙士不為漢孫寳以明經為羣吏御史大夫張忠辟寳為屬欲令教子更為除舍設儲孫寳自劾去忠固還之心内不平後署寳主簿寳徙入舍祭䆴請比隣忠怪之隂使所親問寳前大夫為君設除大舍子自劾去者欲為髙節近舍兩府髙士俗不為主簿子既為之徙舍其説何也寳曰丨丨丨丨主簿而大夫以寳為可一府莫言非士安得獨自髙前日君男欲學文而移寳自近禮有來學義無往教道不可詘身詘何傷且不遭者可無不為况主簿乎忠聞大慚薦寳經明為義郎遷諫議大夫本𫝊後來之英張説稱其才由魯山主簿薦為集賢校理見喜雨五色鴿賦咨嗟曰丨丨丨丨也唐徐浩𫝊文有父風常熟主簿蕭文亮能丨辭丨丨丨同上口記無差唐顔春卿調犀浦主簿嘗送徒於州亡其籍至廷丨丨物色凡千人丨所丨長史陸象先異之遇事蠭鋭唐李畬為汜水主簿丨丨丨丨甚有聲稱雖村童厮養一閱無不知替代姓名者累轉國子司業命移虎害顧少連字夷仲為登封主簿邑有虎孽民患之少連丨塞陷穽獨丨文岳神丨不為丨鴻漸之資鳯棲之位白帖得一偉人薛奎守蜀或問入蜀所得曰丨丨丨丨當以文學名於世謂鎮也舉進士為新安簿後舉正薦召試擢館閣校勘事畧號為三傑朱光庭調萬年主簿邑人謂之明鏡時程伯淳主鄱縣簿張山甫主武功簿與公皆以才名稱閣中丨丨丨丨淵源録有公輔器張昇字杲卿少力學有志操為營丘簿留守王曽以為丨丨丨丨事畧有宰相器葉正簡公顒調黄州南海主簿府帥待制曽開告其子連曰葉主簿丨丨丨也汝往見之因倡諸部使者薦于朝遵度好學崔丨丨字堅白純介丨丨調和川簿事畧伊川通易明道先生為上元簿謝師直尹洛時曰某往在上元某説春秋猶時見取至言易則皆曰非是某謂君皆通易者也監司談經而主簿乃曰非監司不怒主簿敢非通易能如是乎伊川文集使講春秋劉恕字道原公在鉅鹿時為主簿陳􅅠公帥髙陽召至府重禮丨丨丨丨丞相親帥官屬往聴太史集集好學者陳古虛先生襄字述古為浦城簿丨丨丨丨教于縣庠由是為父兄者更相糾戒不可以非禮干吾簿焉言行録折黏鳥竿明道先生再調江寧府上元簿嘗曰一命之士茍存心於利物於人必有所濟始至邑見人持竿道傍以黏飛鳥取其竿折之及罷官艤舟郊外有數人共語自主簿折黏竿鄉民子弟不敢蓄禽鳥不嚴而令行大率如此伊川文集名髙士軒公為同安縣簿廨有燕坐之室為更丨曰丨丨丨以令甲凡簿所當為者大書揭