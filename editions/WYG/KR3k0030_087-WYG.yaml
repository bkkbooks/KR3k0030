body:
  text: 古今合璧事類備要後集卷十八宋謝維新撰宰屬門檢正歴代㳂革檢正之職古無之自國朝熈寧三年詔中書五房各置檢正二貟在堂後官之上都檢正一貟在五房提㸃之上皆以士人為之石林燕語元豐五年官制行罷檢正職務分歸中書舎人給事中左右司郎官續會要建炎三年都省言軍興以來天下多事欲差官兩貟充中書門下省檢正諸房公事一貟檢正吏禮兵房一貟檢正户刑工房位序在左右司上於都堂置直舎從之四年罷紹興二年詔復置一貟紹興三年孝宗已即位未改元詔尚書省吏房兵房三省樞宻院機速房尚書省刑房戸房工房三省樞宻院看詳賞功房尚書省禮房今左右司分房書擬其中書門下諸房令檢正書擬中興會要乾道八年詔都承檢正左右司檢詳編修每日通輪宿直孝宗會要事類宰士哲宗朝范鏜除都檢正制曰爾為丨丨考校詳當所補滋多李清臣行宰旅職略選士人熈寧三年中書門下言奉㫖議中書創置士人為屬官㐲以中書統治百官以佐天子政事而所置吏屬尚仍舊制宜髙丨丨丨稍依先王設弼置輔之意今欲置檢正五房公事一人逐房各置檢正公事二人並以朝官充或用京朝官若選人即為習學公事見宰相參政如常朝官之禮會要核羣吏孝宗朝臣寮言熈寜中創置檢正五房公事官一員每房各置檢正官二貟書功過簿以丨丨丨之失其程督之嚴如此會要執筆入記神宗開天章閣對輔臣呈官制除目詔中書檢正官聞王震江陵吳雍丨丨丨丨聖語面授震左司貟外郎使自書時論榮之九朝通略進文嘉覽鄧潤甫字温伯為檢正中書户房公事詔取所丨丨上丨而丨之遷集賢校理直舎人院國史書無不通沈括字存中博覽古今於丨丨所丨丨熈寧間除太子中允為檢正中書刑房公事東都事略官非所好劉忠肅公摰字莘老王荆公初秉政捜擇人才任以不次元公絳數以公為言荆公一見遂器重焉擢為中書檢正居月餘默黙非所好會除御史欣然就職言行録以備侍從初議中書置屬神宗以為必不能得第一等人才王安石曰中書屬官須精擇可丨丨臺諫丨丨者實録以知流品大觀中李夔奏元豐間神宗命檢正官畢仲衍纂集内外事物綱目為中書備對丨丨官吏丨丨户口錢榖之數以知禮法文物軍兵名額之數以知刑罰赦宥之事夫役之數小大精粗無乎不備續會要通知省政中興初除傳崧為檢正制曰宰士止於中臺之屬不與聞命令之原故又置檢正以丨丨三丨之丨汝其擿過差以禆國論程期魯以檢吏姦汪藻行狀紏正貟務檢正官五房各一人掌丨丨丨丨四朝志政事所出紹興除陳藻檢正制曰檢正之判自我神祖二省丨丨丨丨髙宗實録功過各書見前核羣吏注左右司歴代㳂革隋尚書都司置左右司郎中各一人掌都省之職通典唐武德省正觀復置掌副左右丞所管諸司事二十四曺呼左右司為都公國史補龍朔改為左右承務咸亨中復為左右司郎中武后又増貟外郎各一人永昌二年置神龍初省後復置焉國朝以為階官元豐正名始實有職掌左右司郎中各一人左右司貟外郎各一人中興題名記凡四貟掌舉諸司之綱紀號為都司亦曰左右曹焉職畧元豐六年諸司置御史房主行彈劾御史案察失職七年御史房置簿以書御史六曹官糾核之多寡當否為殿最紹聖初詔都司以歳終㸃檢六曹稽違太多者具姓名取㫖二年詔御史臺察六曹稽緩違失者送左司記定四朝志建炎三年以置檢正减左右司二貟明年復中興會要隆興元年從右諫議大夫王太寶等議詔左右司郎官各差一員减罷二員二年詔左司書擬吏户禮機速房右司書兵刑上賞功房文字孝宗會要後以右司掌刑房事任為劇乃置二貟中興題名事類鼎味太尉司徒司空長史秩比千古號為毗佐三台助丨和丨應劭漢官制台佐褚球字仲寳為司徒右長史加貂丨丨加貂始自球南史喉舌三公天子之股肱掾属則三公之丨丨漢崔實傳志節隋骨儀為右司郎中時政漸濁亂貨賂公行士夫變節儀厲志守常介然獨立隋書有識白敏中字用晦為左司貟外郎武宗雅聞白居易名欲召用之是時居易病足宰相李徳裕薦敏中文辭類其兄而丨器丨本傳著名奚陟字殷卿為左司郎中陟少自砥厲丨丨節唐本傳宣邦教左右司郎中貟外郎各掌付十有二司之事以舉正稽遲凡都省掌舉諸司之綱紀百寮之程式以正邦理以丨丨丨唐六典承要務許鑑為左司郎中不稱職張鷟劾之云位膺列宿爵綰通班總八座之繁司丨萬機之丨丨唐書掌機衡鏘鏘會府丨北斗之丨丨肅肅禮闈握南宫之樞奥同上握樞奥注見上付諸司務左右司掌丨丨丨之丨舉稽違署符目知宿直為丞之貳唐六典轄諸司事左司郎中副左丞丨丨丨署録日勘稽失知省内宿直之丨唐職官志彌綸省闥奚陟字殷卿歴右司郎中丨丨丨丨唐本傳毗佐三台見前鼎味注詳整任職武元衡字伯蒼為左司郎中以丨丨丨丨唐本傳精簡得人太宗朝劉洎言曰尚書萬機乃為政本比者綱維不舉並為勲親在位品非其任功勢相傾將救兹弊且宜丨丨四員左右丞左右司郎中如並丨丨自然綱維一舉唐本傳詳整稱重武元衡遷左司郎中時以丨丨丨丨唐本傳掄選有序呉王濳為左司郎中典選事時䘮亂之後官失其守甲簿湮没濳雍容欵接坐客常滿隨才而接人人自以為得徐知誥相吳丨丨丨丨潜之力也九國志分治省事左司郎中右司郎中各一人正六品左司貟外郎右司貟外郎從六品掌受付六曹諸司出納之事而舉正其稽失丨丨丨丨左司冶吏户禮奏鈔班簿房右司治兵刑工案鈔房而開拆制置御史催驅封播知雜印房則通治之㑹要詔賛省務宣和六年左司王蕃奏都司以彌綸省司為職事無不預今宰相入省諸房文字填委次第具呈自朝至於日中或昏暮僅絶其勢不暇一一檢閲細故而省吏徑禀宰丞請筆以草檢令承從官齎赴郎官㕔落日押字請依元豐崇寧舊法諸司各具簽帖先都事次㸃檢次郎官押訖赴宰相請筆行下於是詔先帝肇正三省丨給舎都司以丨丨丨今都司寢以曠官縁省吏强悍敢肆侵侮自今違法事其左右司官勿書具事舉劾情重者竄責四朝官聀志付六曹事左右司掌授丨丨丨之丨而舉正文書之籍失四朝志考六曹功宣和二年臣寮䟽神考肇建中臺分六官而設之属以御史紏其稽違復令都司較其功過令文左右司歳丨丨丨郎官治狀以丨過對折分等惟三而上下等又有優劣次年春申省續會要學為宰相紹興十三年三省進擬右司郎中上謂輔臣曰神宗聖訓云左右司便是丨丨丨丨豈可不謹擇㑹要質請宰相張拭字敬夫除右司貟外郎知閣門事張説除簽書拭夜草手䟽極言其不可且詣宰相丨丨之丨丨慙憤不堪而上獨不以為忤親札疏尾付宰相使諭㫖拭復奏上意感悟命得中寢時兼侍讀得入經筵楊誠齋集職當綜覈慶歴二年左司宇文鼎奏判度支胡征曰臣謬跡都曹丨丨丨丨續通鑑職為彌綸見前詔賛省務注共决可否劉䞇傳遷右司郎中初宰掾每於執政分㕔時請間曰事多持兩端伺意㫖摯始請以公禮聚見丨丨丨丨四朝國史自書除目王震字子發元豐四年開天章閣初用官制大除拜詔震與吳雍從輔臣執筆入記聖語面授左司貟外郎直使丨丨丨丨時論榮之哲宗實錄置御史房元豐六年都司丨丨丨丨主行彈劾御史案察失職七年都司御史房置簿以書御史六曹官紏劾之多寡當否為殿最歳終取㫖陞黜紹聖元年詔都司以歳終㸃檢六曹稽違太多者具郎官姓名上省取㫖二年詔御史臺察六曹稽緩違失者送左司記定四朝志増宰士貟葉顒除右司時孝宗初即位欲清中書之務丨丨丨之丨公膺首選遷左司一日帝召諫官曰葉顒在都司二年甚宣力然與宰相為朋黨諫官對曰臣不識葉顒聞之公論不然因具陳公求外補意帝黙然良久曰非卿則朕無以知此人越翌日除吏部侍郎兼權給事中楊誠齋集出使除職元豐六年七月左司郎中范雍直龍圖閣河北轉運使都司丨丨丨丨自此始元祐元年范子竒范純粹自左右司出為河北京東轉運皆用雍例直龍圖閣長編具官取㫖見置御史房注瓘數曽布陳瓘為右司貟外郎以書獻曽布曰尊私史而壓宗廟縁邊費而壞先政皆閣下之過也布讀之大怒辨論移時瓘指事叔言辭色不撓堂吏比肩竦觀又以日録辨國用湏知檄申三省遂出知秦州丁未録岡言頥浩紹興三年時方審量濫賞以左右司領之吕頥浩當國時有縱舎右司貟外郎王岡輒持不可曰公秉國鈞於天下具瞻之地不平謂何怨始有所歸矣頥浩矍然中興系年録任吾宰屬國家即位以來百司紀綱日失其序詔今稽壅吏媮不䖍思得時髦之英丨丨丨丨之職淳熈制升冠都司趙及除左司郎中制曰丨丨丨丨之名胡文恭行董正左曹除楊安國制曰參訂左曹范純禮制曰丨丨丨丨同上參訂右曹除裴倫制曰丨丨丨丨同上分治六官除孫覺制都司丨丨丨丨事無巨細畢陳于前若綱在綱振之則舉弛之則廢奕城異於諸曹尚書政本左右司紀綱之地故郎選丨丨丨丨南豐擬制主以郎吏除張康國等制曰中臺都司丨丨丨丨非獨付受書奏亦以助正紀綱曲阜習知臺閣范純禮左司郎中制董正左曹宜莫如汝又云上都司紀綱之地非丨丨丨丨故事不在茲選同古今合璧事類備要後集卷十八
