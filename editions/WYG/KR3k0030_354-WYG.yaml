body:
  text: 古今合璧事類備要外集卷五十四宋謝維新撰燈燭門燈附燈檠燭燭蛾燈燭總論燈火也所以續明破暗於暮夜為有功當日沈西海四顧昏黑一有緩急不有以代明則一舉足間擬步如漆則不顛且踣者幾希此燈之所以為有功於暮夜也然膏沃則光􅂱炷盡則燼滅惟益其炷續其膏為主人者時加挑撥眼前光景夜不夜矣釭燈盞檠其架也事類金釭丨丨銜壁是為列錢注燈盞列於室有似列錢班西都賦蘭膏焚丨丨以繼晷進學解燭燼燈火也燈丨丨曰炧說文炧似也文膏明丨以丨自茁漢書朱燼輝輝丨丨熖熖紅熒庾信賦青光燼長宵久光丨夜寒庾信賦瑞應樊噲問陸賈曰自古人君受命於天云有丨丨豈有是乎賈曰目動得酒食燈花得錢財乾鵲噪而行人至蜘蛛集而百事喜小既有徵大亦宜然西京雜記靈恠武帝既耽於丨丨嘗得丹豹之髓白鳯之膏磨青鍚為屑以純蘓油和之照於神壇夜暴雨火光不滅有雙蛾如蜂赴侍者舉麟鬚之拂以驅之洞𠖇記然九燈漢武帝祈王母於宫中丨丨光之丨内傳建四燈荀采爽之女為隂瑜妻而夫蚤亡爽逼嫁與太原郭奕入奕家暮乃去惟帳丨丨丨按劒正坐郭不敢通鬼魅争光嵇中散燈下彈琴忽有一人面甚小斯須轉大遂長尺餘單衣革帶嵇視之既熟吹其燈滅曰吾恥與丨丨丨丨語林童子有見佛圖澄預知劉矅之敗令童子結齋七日取麻油合燕攴躬自研於堂上舉手示丨丨粲然有輝童子驚曰有軍馬甚衆見一人長大白晳以朱絛縳其肘澄曰此即矅也勒甚恱遂赴洛拒曜生擒之晉藝術傳㫁帶為炷皇甫無逸為益州長史嘗夜宿人家遇燈炷盡主人將續之無逸袖佩刀丨衣丨以丨丨其亷介如此减油滅火沈約孤貧篤志學書一夜必十卷母恐其勞生疾常遣丨丨丨丨畫之所讀夜輒誦之遂愽諸史本傳囊盛螢火車武子事見丨集螢注乞禁松明唐昭宗時財用窘乏李茂正令㩁油以助軍須俄有司言官油估賣不行多有松明攙奪丨行丨止葢民間然丨丨為燈故也優人張廷範曰更有一利便可并月明禁之茂正大笑松明之禁遂止易齊笑林篝燈密室陳彭年幼好學母以一子特所鍾愛禁其夜誦彭年輒丨丨丨丨不令母知蒙求置燈於帳范文正公門下多延賢士如胡瑗孫復石介李覯之徒與公從遊盡夜肄業帳中夜分不寢後公貴夫人猶收其帳頂如墨色時以示諸子孫曰爾父少時勤學燈煙跡也言行錄燈檠作三鴈足黄山谷與黨伯舟書云欲作鍚燈檠一枚高七寸盤闊六寸足丨丨丨丨不須高受盞圏徑二寸半盞面三寸盞傍作小圏如釵股屈之鴈足燈漢武帝上林中燈制度極佳至今士大夫家有之見一婦人宋潛為甘陵巡檢故人趙當訓其子弟忽見美婦人立燈下唱曰郎行久不歸妾心傷亦苦低迷羅箔風泣向西窻雨遂滅燈趍趙就寢曰妾本東方人鬻身彭城郡今郎觀光上國孤眠暗室故來相伴明夜又來唱曰一自别來音信杳相思瘦得肌膚小秋夜迢迢更漏長守盡寒燈天未曉後又曰獨倚朱扉翠黛顰傷嗟良夜暫相親如今且伴才郎宿應為才郎喪此身諸生恠趙精神恍惚具告其父潛往觀焉見一婦人唱曰向曉臨鸞拂黛眉紅妖艷冶照羅幃不辭夜夜偷相訪只恐傍人又得知宋大呼遽入以手抱之甚細乃一燈檠耳遂焚之雲齋廣錄高邁燈頌離婁之目處暗室或不能覩燈處之皎如也澄公之掌在𤣥夜或不能照燈在之了如也故大雄氏以方便力救黑暗界藉其光誘其人佛所以有燃燈名法所以有傳燈義大抵長明燈是其藴乎夫日主晝太陽之精中則昃昃則没我長明燈不没月主夜太隂之精滿則虧虧則盡我長明燈不盡日月尚爾況小光小明哉要自積苦為海舉足見溺積邪為山舉足見礙竟不能髣髴之或髣髴之不克成就之言之可為長歎我邑中有俊傑主此燃燈精進成就於寳融寺藏經院且夫蘭炷爇火吾見其盛未見其㣲也鐵盆盛膏吾見其增未見其減也一籠而四時長花滿室而終嵗不夜人見之一作禮眼蒙利冄作禮心蒙美目自相照了内外由是洞徹然則終日見燈未嘗見燈終日未見燈未嘗未見燈夫達觀者乃如是也意者不獨如此直上照一天二天乃至三十三天無門不闢恒沙等人由兹而入直下照一地二地乃至一十八地有獄皆開多刼罪人由茲而出若然者四維上下虚空可思量不可思量邪我長明燈實相功徳亦復如是邁三數年内顧銘頌之間迫賤事未搆斯文一朝染目疾朦朧不自審從何得也遂夢神人語邁曰子於長明燈其有負乎邁應聲而寤寤而起起而作頌明日目愈頌曰見外燈長明見内燈長明萬惡自光中滅萬善自光中生不見一燈百千萬億燈乃至於無窮不見一人百千億人歸之於大同空即是色色即是空弟子作頌允執厥中宋白燈讃灼灼燈華耿耿秋夕人愛其財我愛其容詩集含光丨丨似燭龍謝眺生暈夢覺燈丨謝眺何太喜燈花丨丨丨杜更含輝燈殘猶未滅將盡丨丨丨紀少瑜燈燼繁頭白丨明夜何須花丨丨杜燈影照丨丨丨無寐排銀粟今夕知何夕花然錦帳中自能當雪暖那肯待春紅囊裏丨丨丨釵頭綴玉蟲更煩符喜事來報主人翁韓似紅蓮破暗長明世代深煙和香氣兩沉沉不知社㸃人何在只見當年火至今曉丨丨丨開沼面夜如寒月鎮潭心孤光自有龍神䕶雀戯蛾飛不敢侵羅隠長明燈生寒燼灼灼丨丨丨終朝照夕明從教古冇驗然滅本無情梅堯臣吐丹榮迴鱗抱雙帶倒鳯丨丨丨水宇寒生暈風疏動有聲燼垂金藕細影透玉荷清斗帳依東壁誰人夢不成石曼卿怕冷風一㸃分明直萬金開時唯怕丨丨侵主人若也勤挑撥敢向樽前不盡心古今詩話愁夜雨分影由來恨不同綠窻孤館两何窮熒煌短熖長疑暗零落殘花旋委空幾處隔簾丨丨丨誰家當户怯秋風莫言明滅無多事曾比人生一世中韓喜小籠疎四面丨丨丨丨丨明紙罩孤燈自小共寒熱相親如友朋舊書曾遍照新燭莫相憎幾為吟詩苦留光到夙興張天覺讀書燈半㸃伴三更老穉都眠我獨醒寒燈丨丨丨丨丨雙花忽作蜻蜓眼孤熖仍懸玉膽瓶輝光生滿室昏昏擬步方如漆虚心喜有榮華質主人倘不靳吹噓㑹使丨丨丨丨丨並聲應燈檠二尺便長檠八尺空自長短檠丨丨丨且光殘年債光卷吾今一字無打包隨處野僧如短檠未盡丨丨丨欲問班生試借書陳去非題繼室蟠室燭附燭蛾燈燭總論燭捲帛等物為心四向澆蠟為之筆直㸃之光輝連屬不息然有小大不等亦燈之别名也蛾飛蟲明燭宵舉則羣然來赴一名慕光事類燧火司烜氏掌以丨取丨於日漬供祭祀之明燭周官蘭膏丨丨明燭注以丨漬丨取其香也宋玉招魂燭至侍坐於所尊丨丨起注異晝夜也禮記燭盡燭不見跋注跋本也丨丨則去之記請繼以燭陳公子完與顓孫奔齊使為工正飲桓公酒樂公曰以燭繼之辭曰臣卜其晝未卜其夜不敢左莊二十二年誤書舉燭鄭人有遺燕相國書者夜書謂持燭者曰舉燭而丨丨丨丨舉相受書曰舉燭高明高明者舉賢而任之韓子日暮燭滅楚莊王賜羣臣酒丨丨丨丨有引美人衣者美人援絶其冠纓告王王曰人醉失禮奈何欲顯婦人之節而辱士乎乃命羣臣皆絶去冠纓然後上燭司馬彪戰畧夜雨燭盡顔叔子曾獨居一室夜大雨比屋舎崩有一女投之叔子令女執燭燭盡乃破屋柱續至明不貳史願分餘光甘茂亡秦奔齊逢蘓代為齊使秦茂曰臣聞貧人女與冨人女㑹績貧人女曰我無以買燭而子之燭光幸有餘願分我餘光無損子明而得一便焉今臣困而君方使秦茂之妻子在焉丨以餘光振之何愛餘光齊女徐吾者東海上貧婦與其鄰婦李吾合燭夜績徐吾最貧而燭不屬或謂李吾曰徐吾燭如不屬請無與夜徐吾曰妾以貧故起常先去常後掃陳席以待來者坐常處不為貧故也今一室之中益一人燭不為益明去一人燭不為益闇丨丨東壁丨丨莫之能應遂復與夜績光分鄰燭匡衡勤學家貧無燭鄰舎有燭不逮乃穿壁引其光讀書不燃官燭巴秪為揚州刺史與客坐闇暝之中丨丨丨丨謝承後漢書舉蠟燭擲周顗字伯仁友愛過人弟嵩飲醉瞋目面謂伯仁曰君才不如弟而横得重名須臾丨丨丨火丨伯仁伯仁笑曰阿奴火攻固出下策耳以蠟燭炊石季倫丨丨丨灼丨王愷以飴糖澳釡世說刻燭賦詩蕭文琰丘令揩江拱並以文稱竟陵王夜賦詩約四韻丨丨一寸文琰曰何難之有乃與江拱共擊鉢立韻響絶而成王僧孺傳南史燃燭奕棋後魏甄琛舉秀才入都常以奕棋通夜不止手下蒼頭奴常令執燭或時睡則加杖奴不勝痛楚乃曰郎君若為讀書執燭不敢辭罪今愽奕是何事也琛大慙遂研習經史蠟淚楺紙柳公權充翰林侍書學士毎玉堂召對繼之燭見跋語猶未盡宫人以丨丨丨丨繼之蓮炬還院令狐綯為翰林承㫖夜對禁中燭盡以傳金丨花丨送丨丨吏皆驚本謂之燭奴申王以龍檀木刻童子緑衣束帶毎遇夜集列執畫燭丨丨丨丨天寳遺事燃燭十圍五代淮南王渥居喪晝夜酣飲樂然十圍之燭以擊毬一燭費錢數萬續世說樺燭百炬本朝京師毎嵗正旦曉漏以前宰相三司使大金吾皆以丨丨丨丨擁馬方布象城謂之火城仍雜以衣綉鳴珂焜燿街陌如逢宰相即諸司火城悉皆撲滅國史補燭燃公鬚韓魏公帥定武時夜作書令一侍兵執燭於旁侍兵他顧丨丨丨丨遽以袖揮之而作書如􅀈少頃回視已易其人公恐主吏鞭之亟呼曰勿易之渠方解持燭矣軍中感服記聞燭淚成堆鄧州花蠟燭云是㓂萊公法公自少富貴不㸃油燈雖厠溷間丨丨丨丨杜祁公在官未嘗然官燭油燈一炷與客相對二公皆名臣奢儉不同如此然祁公夀考終吉萊公有南迁之禍雖其不幸亦可為戒歸田錄夜蛾赴燭宋傅亮以少帝失徳内懐憂懼直宿禁中睹夜蛾赴燭作感物賦以寄意焉傅𤣥燭銘煌煌丹燭熖熖飛光取則龍景擬象扶桑照彼𤣥夜炳若朝陽焚形監世無隠不彰詩集秉燭何不丨丨遊古詩愛燭更長丨丨紅題詩丨丨蠟炬紅檢書丨丨燒燭短並杜金花庭炬折丨丨唐詩蘭燼仙漏迢迢出建章宮簾不動透清光金幃露白新裁詔畫閣春紅正試粧淚滴盃盤何所恨燼飄蘭麝暗和香多情更有分明處照得歌塵下燕梁鄭谷丹心六龍西走入崦嵫寂寂華堂漏轉時一寸丨丨如見用便為灰燼亦無辭古今合璧事類備要外集卷五十四
