body:
  text: 古今合璧事類備要前集卷五十七宋謝維新撰技術門撫琴事類宫商琴第一絃為丨次絃為丨次為角次為徴次為羽次為少宫次為少商三禮圖太史公曰琴長八尺一寸正度也絃大者為宫而居中央者君也商張右傍其餘小大相次不失其次序則君臣之位正矣史樂書暢操凡琴曲和樂而作命之曰丨言其道之暢也憂愁而作命之曰丨言周征窮追由不失其操風俗通鄭聲世以琴為雅聲誤矣琴正古之鄭衛耳今世所謂丨衛者乃皆胡部非復中華之丨自天寶中坐律部與胡合自爾莫能辨者孫枝凡本實而末虚惟桐反之試取小枝削皆實堅其末皆中虚故世所以貴丨丨者貴其實也實故絲中有木聲也志林嶧桐徐州丨陽孤丨注云孤特也嶧山之陽特生桐中琴瑟尚書禹貢篇李白琴贊云嶧陽孤桐石聳天骨根老水泉葉苦霜月斵為緑綺徽聲粲發秋風入松萬古清絶空桑雲和龍門丨丨之琴注云雲和龍門丨丨皆山名出周禮春官四善琴雖用桐然須多年木性都盡聲始發越予曽見唐初路氏琴木皆枯朽殆不勝指而其聲愈清絶又陶道真蓄一越琴云是古塜中敗棺杉木也聲極勁挺大抵琴材欲輕鬆脆滑謂之丨丨謂堅如石亦所未論筆談四美嵇叔夜琴賦曰氣和故響逸絃急故聲清間遼故音痺絃長故徽鳴此丨皆丨聲也東坡曰痺㪇聲音鮮琴之有㪇聲以琴面不平或焦尾與岳高低不相應則其聲㪇此琴之病聲也葢琴操弄中自有痺下聲非病聲其間音知聲間遼者徽之逺處徽外近焦尾處聲手取之自然痺下學林五絃舜作丨丨之琴歌南風之詩其詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮史七絃五絃象五行文王武王加二絃琴操琴長四尺五寸法四時五行丨丨象七星風俗通九絃太宗令待詔蔡裔増琴為丨丨有待詔朱文濟以為不可太宗曰古琴五絃而文武増之今有何不可文濟曰五絃尚有遺音而益以二絃實無所闕上怒斥出遂増琴絃筆談五曲古琴有詩歌丨丨一鹿鳴二伐檀三騶虞四鵲巢五白駒並琴操九引一列女楚樊姬作二伯飛魯伯飛作三貞次魯女作四思歸衛女作五霹靂楚商梁作六走馬恭侯作七箜篌霍子高作八琴引秦皇作丨楚丨楚龍丘子作風俗通記九弄琴工由傳楚漢舊及清調蔡邕五弄楚調四弄謂之九弄唐志十弄陽春白雪長清短清側清雙鳯離鸞緑水悲風别鶴石上流泉河間十弄又鄭述造龍吟丨丨時為妙絶北史雜歌河間丨丨二十一章蔡氏五弄雙鳯離鸞歸鳯送逺幽蘭白雲長清短清側清明君胡笳廣陵散白魚歎楚妃歎風入松鳥夜啼石上流泉雙鸞離陽春緑水悲風别鶴之類風俗通記十二操一將歸二猗蘭三龜山並孔子作四越裳周公作五拘幽文王作六岐山周公為文王作七履雪尹伯竒作八雉朝飛牧犢子作九别鵠商陵穆子作十殘形曽子作十一水仙十二懷陵並伯牙作同上十小調一不換金二不換玉三峽泛吟四越溪吟五越江吟六孤猿吟七清夜吟八葉下聞蟬九三清十亡其名琴曲賀若曲世傳琴曲大小調皆隋賀若弼所製琴家但名賀若而已太宗猶愛之改不換金曰楚澤涵秋不換玉曰塞門積雪命詞臣探題製詞時蘇易簡探得越江吟其詞曰非雲非煙瑶池宴片片碧桃冷落黄金殿鰕鬚半捲天香散春雲和孤竹清婉入霄漢紅顔醉態爛漫金輿轉霓旌影爛簫聲逺冷齋夜話東坡詩註云賀若琴操名唐宣宗時待詔賀若所製因人得名瑶池燕琴曲有丨丨丨其詞曰飛花成陣春心困寸寸别腸多少愁悶無人問偷啼自揾殘粧粉抱瑶琴尋出新韻玉纎趂南風未解幽愠低雲鬢眉峯眉暈嬌和恨坡集焦尾桐蔡邕在呉聞人家爨下桐爆聲知其良材因請之果良桐以治琴琴成尾有焦處因號焦尾本傳螺蚌徽蜀中雷氏琴最佳上者玉徽次瑟瑟徽次金徽次丨丨丨國史補氷清琴錢塘沈振蓄一琴名氷清腹有晉陵子銘云卓哉斯器樂惟至正音清韻髙月苦風勁璅餘神爽緣絶機静雪夜敲氷霜天擊磬隂陽潛感石臧前鏡人其審之豈獨知政書大厯三年三月三日上底蜀郡雷氏斵奉詔書貞元十一年七月八日再修士雄記或以謂晉陵子杜牧道號篆法類李義山不知士雄何人也同上響泉琴劉禹錫嘉話載汧公李勉好雅琴取桐絲精者雜綴號百納琴其尤絶者曰響泉韻磬坡詩注秀州祥符院僧智和蓄一古琴瑟瑟徽碧文細石為軫製作精巧音韻清越中刻李陽冰篆三十九字其畧云南溟夷島産木名伽陀羅文横如銀屑其堅如石遂用作此朱長文琴譜皆著此琴即唐李勉所製響泉也澠水燕談清角琴丨丨黄帝丨繞梁楚莊王琴號鍾齊桓公琴縁綺琴丨丨卓文君丨一云司馬相如琴楚妃歎琴曲有丨丨丨白氏六帖廣陵散嵇康嘗游洛西暮宿華陽亭引琴而彈夜分忽有客詣之稱是古人與康共談音律詞致清辯索琴彈之而為丨丨丨聲調絶倫遂以授康仍誓不傳人亦不言其姓字康嘗曰但欲濁酒一杯彈琴一曲志意畢矣康臨刑索琴彈之曰昔袁孝已嘗從吾學丨丨丨吾固靳之於今絶矣康傳後韓臯聞鼓琴至止息歎曰美哉嵇康之為是曲其當晉魏之際乎其音商商主金晉乘金運此所以知魏季晉將代也王陵毋丘儉文欽諸葛誕繼為揚州都督咸有興復之謀皆為司徒所殺康以揚州廣陵地故其曲曰廣陵散言魏散亡自廣陵始止息者篇名其音哀傷憯痛迫脇晉雖暴興終於止息臯傳鳳凰操趙后有寶琴曰丨丨皆以金玉隠起為龍鳳螭鸞古賢列女之象亦善為歸風送逺之丨西京雜記蛇蚹文知音者以謂前一指後一指為妙以丨丨丨為古王晉叔所蓄前幾不容指而後劣容指然終無雜聲可謂妙矣志林單鵠弄劉道强善鼔琴能為丨丨寡鳬之弄聽者悲不自勝西京雜記落霞琴恒山夕望東邊有青雲髣髴俄而見雙臼鶴集於臺上倐忽化為二神女舞於臺上握鳯管之簫拊丨丨之丨歌清呉春波之曲㓊㝠記白鵠翔師曠鼓琴通於神明而丨丨丨瑞應圖别鶴翔繁絃既抑雅聲乃揚仲尼思歸鹿鳴三章梁甫悲吟周公越裳青雀西飛丨丨東丨蔡邕琴賦宫調角調嘗考琴家謂宫者非宫角者非角又五調迭犯特宫聲為多與五音之正者異西清詩話㪇聲泛聲東坡云㪇聲音鮮出羯鼔録偶讀嵇中散琴賦云間遼故音痺絃長故徽鳴所謂痺者如今俗云丨丨也兩可之間逺則有㪇聲故曰間遼徽鳴云者今之所謂丨丨也絃虚而不接乃可按故曰絃長而徽鳴也五臣妄注云八曲其他淺妄可知志林三聲類聚段由夫擕琴就松風間響之嘗曰丨者皆自然之丨正合丨丨半曇即以金縷衣邀之曲終云金微變化篇五聲叢鳴舒元輿斵琴志曰越客沈蚪子斵琴絃素絲七條其上備指一弄丨丨丨丨鳴中有靈峯横空烏泉出雲鳯龍騰凌鶴哀烏啼松吟風悲蟹行鸞鳴凡彈琴輪指曰丨丨側轉指曰丨丨若全用甲則聲乾而多思全用肉則聲重濁而不勻琴書訣烏舞魚躍瓠巴鼓琴而丨丨丨丨列子蘿蔦附木楊收嘗言琴通黄鍾姑洗無射三均側出諸調由丨丨丨灌丨然同上駟馬仰秣伯牙鼔琴而丨丨丨茍子援琴鶴舞師曠丨丨而鼓一奏有𤣥丨集乎門廊再奏之延頸而鳴舒翼而丨史彈琴鬼歎嵇中散夜丨丨忽有一丨械而長丨舉其手袂曰君一絃一調中散與琴彈之聲清冷遥問不對欵是蔡邕邕死之日身着桎梏出職官分紀云云伏羲作琴丨丨丨丨修身理性反其天真也琴操神農為絃丨丨削桐為琴繩絲丨丨以通神明之德以合天地之和桓譚新論舜帝鼓琴舜被袗衣鼔琴二女果若固有之孟孔子學琴丨丨丨丨於師襄子曰丘迨得其為人矣黯而黒頎然長曠如望洋奄有四方非文王孰能為此師襄子曰君子聖人也其傳曰文王操家語子期知音伯牙鼓琴志在高山鍾子期曰峩峩然若泰山在流水曰洋洋然若江河丨丨死伯牙絶絃以無丨丨者列子蔡琰辨琴蔡琰邕之女也年六嵗邕夜彈琴絃絶琰聞之曰第一絃也復故斷一絃問之曰第四絃也邕曰偶中耳琰曰昔季札觀風知四國興衰師曠吹律知南風不競由是言之何得不知乎後漢閔子審音孔子晝息於室鼔琴焉閔子自外聞之告曽子曰向也夫子之音清徹以和今也更為幽沉之聲幽則利欲之所發沉則貪得之所施夫子阿感若是乎二子入問孔子孔子曰汝言是也向者見猫方取䑕欲其得之故為之音也孔叢傳騶忌言絃齊威王鼔琴丨丨子入曰善哉大絃濁以舂温者君也小絃亷折以清者相也攫而深醇而愉者政令也鈞諧以鳴小大相益回邪而不相害者四時也故曰琴調而天下治史書龜年辨聲李龜年至岐王宅聞琴曰此秦聲良久又曰此楚聲主人入問之則前彈者隴西沈妍後彈者揚州薛滿辨音集如意聽琴唐于頔嘗令客彈琴其嫂丨丨丨之曰三分中一分筝聲二分琵琶聲全無丨韻國史補君山獻曲遂創新聲爰改舊用丨丨丨丨伯牙奏弄成公綏琴賦云後漢桓譚字君山陶潛得趣晉陶潛性不解音惟蓄素琴一張絃徽不具曰但識琴中趣何勞絃上聲嵇康論價丨丨抱琴訪山濤濤醉欲割琴康曰吾賣東陽舊業以得琴乞尚書令河輪佩玉藏為徽貨所衣玉簾中單買縮絲為袋丨之其丨與武庫争先如欲割之吾即死矣同上吕才定曲唐高宗以琴曲寖絶令有司習吕才上言舜彈五絃之琴歌白雲之詩是知琴操曲弄皆合於歌今以御雪詩為白雪歌帝善之唐禮樂志文君心感卓文君新寡好音相如以琴心挑之前相如傳趙璧神遇丨丨彈五絃琴人問其術璧曰吾之五絃也始則心驅之中則丨丨之終則天隨之方吾浩然眼如耳如鼻不知五絃之為璧璧之為五絃也語林蔡邕殺聲丨丨在陳留鄰人召酒邕比往有客彈琴邕聽有丨丨遂反主人自追問邕邕以告琴者曰我向見螳蜋方捕蟬此豈為殺心形於聲乎邕傳揚收武聲有安說善琴丨丨問五絃外其二云何說曰世謂周文武二王所加者收曰能為文王操乎說即以黄鍾為宫而奏之以少商應大絃收曰止如子之言少商武絃也且文世安得丨丨乎說大驚収傳單父鳴琴宓子賤為丨丨宰丨丨不下堂而自治吕氏春秋武城聞絃子之丨丨丨丨歌之聲注子游為武城宰夫子莞爾而芙曰割雞焉用牛刀子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使也杏壇奏曲孔子坐杏壇之上絃歌鼔琴曲未終有漁父下舟而來以聽莊子漁父篇汾亭鼓琴文中子遊丨丨坐丨丨有舟而釣者過之曰美哉琴意傷而和怨而靜在山澤而有廊廟之志非太公之都磻溪則仲尼之宅泗濵也文中子睹物命琴昔魯哀公二十一年孔子出魯東門過故杏壇歴級而升顧謂弟子曰兹魯將臧文仲誓盟之壇也丨丨思人丨丨而歌歌曰暑往寒來春復秋夕陽西下水東流將軍戰馬今何在野草閑花滿地愁雜記迎船援琴伯牙學琴於成連先生乃與遊蓬萊山留伯牙曰子居習之我將丨子師刺丨而去伯牙迎過但見海水􅐓洞山林㝠杳鳥獸悲號歎曰吾師將移我情乃丨丨而歌歌終成連至遂為天下妙絶樂府解題抱琴而來司業武公總太學儒官三十六人列飲於祭酒之堂有一儒生丨丨丨丨歴階而升坐於樽俎之南鼓有虞氏之南風賡之以文王宣父之操優游夷愉追三代之遺音想舞雩之詠歎及暮而退充然若有得也韓文上已宴大學序鼓琴自樂顔回曰丨丨足以自娯學夫子之道足以丨丨回不願仕莊子就宴推琴嵇紹遷侍中齊王囧燕㑹左右進琴紹推不受曰紹雖庸鄙忝備常伯腰紱冠冕鳴玉殿省豈可操執絲竹為袷人事若釋公服從私宴所不敢辭也囧大慙紹傳對使破琴戴逵能鼓琴武陵王晞使人召之逵丨丨者丨丨曰戴安道不能為王門伶人本傳詩集夜彈風松瀑布已清絶更愛玉佩