效天文也四象既陳行之在人葢王政也或虚設豫置以自衛䕶葢象庖犧網罟之制隄防周起障塞漏决有似夏后治水之勢一孔有闕頽壤不振有似瓠子汎濫之敗作伏設詐突圍横行田單之竒要厄相刼割地取賞蘇張之姿參分有勝恕而不誅周文之德逡巡儒行保角依旁却自補續雖敗不亡繆公之智上有天地之象次有帝王之治中有五霸之權下有戰國之事覽其得失古今畧備出班固奕㫖賢愚難易胡旦曰以碁為易則聰明者或不能以為難則愚下小人往往精絶堯舜教子堯造圍碁以教子丹朱或云舜以子商均愚故作圍碁以教之其法非智不能也博物志奕秋誨人奕之為數小數也不専心致志則不得也奕秋通國之善奕者也使丨丨丨二丨奕其一人專心致志惟奕秋之為聽一人雖聽之一心以為有鴻鵠將至思援弓繳而射之雖與之俱學弗若之矣出孟告子下王粲覆棋魏丨丨觀人圍碁局壤粲為丨之丨者不信以帊葢局更以它局為之用相比校不誤一道其强記黙識如此積薪短具王丨丨每出遊必擕圍碁丨丨畫紙為局與碁子併盛竹筒中繫於車轅馬鬛間道上雖遇匹夫亦與對手勝則徵餅餌牛酒北忩瑣言李泌諫博肅宗在彭原廨舎隘狹帝與張良娣博打子聲聞於外李泌言帝乃潛令刻乾樹子不欲有聲良娣以此怨泌韋曜戒奕呉蔡穎亦在東宫性好博奕太子和以為無益韋曜論之貴戚彈棋梁冀少為丨丨逸遊自恣嗜酒能挽滿丨丨格五六博蹴鞠意錢之戯書生撇棋魏文帝善彈棋能用手巾角時一丨丨又能低頭以所冠葛巾丨丨臨敵圍碁延興中魏軍次於興勢假費禕節率衆往禦之束敏至褘許别求共圍碁時羽檄交馳人馬擐甲嚴駕已訖禕與敏留意對戯色無厭倦敏曰聊觀試君且君信可人必能辦賊禕至城遂退别墅圍碁苻堅率衆百萬次淮淝京師震恐加謝安征討大都督安夷然無懼色遂命駕出丨丨親朋畢集方與𤣥丨丨賭别墅安碁常劣於𤣥是日𤣥懼便為敵手而又不勝安遂顧謂其甥羊曇曰以墅乞汝遂遊陟至夜乃還指授將帥各當其任既而兄子𤣥等破堅有驛書至安方對圍碁看書既竟便攝於牀下了無喜色碁如故客問之徐答曰小兒輩已破賊既罷還内過户限心喜甚不覺屐齒之折其矯情鎮物如此推枰决策晉武帝與中書令張華圍碁間杜預表適至推枰斂手曰陛下聖明神武國富兵强呉之荒淫驕虚宜亟討之以具投江陶侃為荆州見佐史博奕具投之於江曰圍碁堯舜以教愚子博殷紂所造諸君並國器何以此為將吏則加鞭朴曰樗蒲者牧猪奴戯耳圍碁應答殷仲堪在都嘗往看碁諸從在瓦棺寺前宅上於時袁羌與人共在窻下丨丨仲堪在裏問袁易義袁丨丨如流圍碁不輟袁意傲然殊有餘地殷撰辭致難每有往復圍碁失寢梁劉溉為侍中與武帝碁達旦或復失寢加以低睡帝歎曰狀若喪家狗又似懸風槌入侍東宫順宗為太子王叔文以善棋得侍東宫奕賭外郡南史羊𤣥保為黄門侍郎善奕棋宋文帝亦好奕與賭郡𤣥保戯勝以補宣城太守天帝遣召滑能善奕忽有一小子自云張清與能對奕思甚精敏能異而詰之曰我非世人天帝召公着碁能忽奄然北夢瑣言老姥指教翰林碁者王積薪從明皇西幸寓宿深溪之家但有婦姑止給水火纔瞑闔户積薪夜聞姑謂婦曰良宵無以為適與子手談可乎堂内無燭婦姑各在東西室對談已而姑曰子已北矣吾止勝九枰耳遲明王具禮請問出局盡平生之好布子未及數十姑謂婦曰是子可教以常勢因指示攻守殺奪捄應防拒之法其意甚畧曰此已無敵人間矣謝而别回顧失向之室矣異叢談記圍碁争道王導嘗共其子恱丨丨丨丨笑曰相與有𤓰葛何得爾邪觀碁爛柯信安郡石室山晉時樵者王質伐木入山有二童子碁與質一物如棗核食之不覺飢以所持斧置坐而觀童子指謂之曰汝斧柯爛矣質歸鄉閭無復時人述異記偽為不勝李道古便佞巧宦常以酒肴碁博游公卿門角賭之際丨丨丨丨而厚償之故得一時虚名而嗜利者悉與之狎續世說懼償所賭石晉陳保性極鄙吝每與人奕碁敗則手亂其局懼所賭金錢不欲償也及卒家無妻兒惟貯白金十錠為他人所有續世說西南風急謝宻與客奕宻西南碁有死勢復一客曰丨丨丨丨或有覆計宻悟乃殺之吏南風不競晉王獻之年數嵗看人圍碁有勝負因曰丨丨丨丨注云春秋楚伐鄭師曠曰歌南風南風不競多死聲必無功也獻金免召蜀簡州刺史安重霸瀆貨無厭州民有油客者姓鄧能碁其家亦贍重霸召對敵只令立侍每落一子俾其退立於西北牖下俟我筭路乃始進之終日不下十數子而已鄧生倦立且飢殆不可堪次日又召或有諷鄧生曰此侯好賂本不為碁何不獻賂而自求退乃獻中金三鋌獲免北夢瑣言賜緋賞勝蘇子瞻云太宗時有待詔賈𤣥者常侍上碁太宗饒𤣥三子𤣥常輸一路太宗知𤣥挾詐不盡其藝也乃謂之曰此局汝復輸我當榜汝既而滿局不生不死太宗曰汝亦詐也更圍一局汝勝賜汝緋不勝當投汝於泥中既而局平不勝不負太宗曰我饒汝子今既局平是汝不勝也命左右抱投之水乃呼曰臣握中更有一子太宗大笑賜以緋衣荆公詩話戒勿嗜碁丁晉公好釋老乂酷嗜奕碁中堂退食對局以夜繼日一日問李畋虚心之法對曰請侍中弼諧之外勿於碁子役心虚已半矣公曰如子之言何止於碁凡有所着則不虚矣該聞録唯不能碁林和靖每曰逋世間事皆能之丨丨丨擔糞與着丨墨客揮羣偶坐觀碁東坡云予素不解碁嘗獨遊廬山白鶴觀觀中人皆闔户畫寢獨聞碁聲於古松流水之間意欣然喜之自爾欲學然終不解也兒子過乃粗能者儋守張中日從之戯予亦偶坐竞日不以為厭也因作詩云五老峯前白鶴遺址長松䕃庭風日清美我時獨遊不逢一士誰與碁者户外二屨不聞人聲時聞落子紋楸坐對誰究此味空鈎意釣不在魴鯉小兒近道剥啄信指勝固欣然敗亦可喜優哉游哉可以卒嵗就枕閱碁東坡云南岳李巖老好睡與人食飽下碁巖老就枕閱數局乃一展轉云我始一局君幾局矣東坡曰巖老常用四脚碁盤着一色黒子昔與邊韶敵手今被陳摶饒先着時自有輸嬴着了並無一物對坐精思仁廟時李重恩善奕碁冠絶當世然形神昏戇時人謂之李憨奕碁之外一無所曉與人丨奕丨而昏睡人丨丨久之方下一子重恩開目隨手應之皆出人意表善品碁者以為重恩在王積薪之上賈𤣥之下荆公詩嘗用之升堂說法僧寶傳云浮山法逺禪師歐公造其室以與客碁逺坐其傍歐公收局請逺因碁說法乃鳴鼔升坐曰若論此事如兩家着碁相似何謂也敵手知音當機不讓若是綴五饒三又通一路始得有一般底柢解閉門作活不解奪角衝闗硬節與虎口齊張局破後徒勞逴幹所以道肥邊易得瘦腹難求思行則往往失粘心麄則時時頭撞休誇國手謾説神仙嬴局輸籌即不問且道黒白未分時一着落在什麽處良久云從前十九路速誤許多人歐公嘉歎久之漁隠叢話詩集兩奩莫將戱事擾真情且可隨縁道我贏戰罷丨丨收黒白一枰何處有虧成王介甫幾局松窻楸局穏相顧思皆凝丨丨賭山果一先饒海僧覆圖聞夜雨下子對秋燈何日無羈束期君向杜陵出鄭谷詩楸枰荆璞玉為子井文丨作丨有求惟别墅不喜得宣城跕跕飛鳶墮丁丁伐木聲破愁逢一笑無地著虧成洪王父玉局不作丹朱戱難禁清晝長敢言白丨丨聊取紫羅囊角道空傳記乘除自有方兒童争畫紙謾學老夫狂同上幾微眉山非快手奕勝亦欣然變態一翻覆丨丨係後先陶公慮太過雪女慧堪憐張弛誠吾道斯文許爾賢同上𤣥妙未去交争意難忘勝負心一條丨丨路徹了沒人尋邵堯夫險路十九條平路言平又險􅇖人心無筭處國手有輸時勢過流星逺聲乾下雹遲臨軒纔一局寒日又西垂裴説刼權對敵常觀勢臨機便得先安危心不動殺活手能專勿以欺為行須知丨是丨旁人爛柯看當局是神仙楊元素談兵偶無公事客閒時席上丨丨校兩棋心似蛛絲遊碧落身如蜩甲化枯枝湘中一日誠甘死天下中分尚可持誰謂吾徒猶愛日參横月落不曽知山谷布陣自從仙人遇樵子直到開元王長史前身後身付餘習百變千化無窮已初疑磊落曙天星次見搏擊三秋兵鴈行丨丨衆未曉虎穴得子人皆驚行盡三湘不逢敵終日饒人損機格藹藹京城在九天賭取聲名不要錢劉禹錫送儇師守黙野客圍碁坐搘頤向暮秋不言如丨丨設計似平讐决勝雖關勇防危亦合憂看他終一局白却少年頭髙輦藏機黒白旋盈盤分途各占寛縱髙無盡幸遇敵始知難對面心千里丨丨勢萬般寄言當局者踈失早須看陳元輿閑争大都博奕皆戱劇象戱翻能學用兵車馬尚存周戰法偏裨曽備漢官名中軍八面將軍重河外斜尖步卒輕却凭紋楸聊自笑雄如劉項亦丨丨程伯淳静筭碁理還將道理通為饒先手却由裏古人重到今人愛萬局都無一局同丨丨山川千里近閑消日月兩輪空誠知此道剛難進况是平生不着功歐陽烱聞聲山僧對碁坐局上竹隂清映竹無人見時丨下子丨樂天對面丨丨不相見用心如用兵筭人常欲殺顧已自貪生得勢侵吞逺乘危打刼贏有時逢敵手當局到深更杜荀鶴換世夜凉吹笛千山月路暗迷人百種花碁罷不知人丨丨酒闌無柰客思家歐陽公銷日玉子紋楸一路饒最宜簷雨竹蕭蕭羸形暗去春泉長猛勢横來野火燒守道還如周㐲柱鏖兵不羨霍嫖姚得年七十更萬日與子期於石上銷杜牧饒人爛柯仙客妙通真一局曽經幾度春自出洞來無敵手得饒人處且丨丨古詩又碁為丨丨下子遲古詩呵子碁為手寒丨丨下衣嫌春瘦縮紗裁呵子縮紗取藥名也陳亞詩賭詩荆公在鍾山下碁薛昻門下與焉丨梅花丨一首薛敗而不善詩荆公為代作今集中所謂薛秀才者是也薛既宦達出知金陵或者嘲以詩曰好笑當年薛乞兒荆公坐上賭梅詩而今又向江東去奉勸先生莫下碁薛書名似丐字故人有乞兒之説呉曽漫隱語荆公在鍾山與道士奕碁道士作數語曰彼亦不敢先此亦不敢先惟其不敢先是以無所争故能入於不死不生公笑曰特碁丨丨也冷齋夜話習射事類和容鄉大夫退而以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰丨丨五曰興舞出周禮正己射者仁之道也射求丨諸丨己正而后發發而不中則不怨勝己者反求諸己而己矣射義主皮射不丨丨為力不同科古之道也語八佾繹志射之為言繹也或曰舎也繹者各丨已之丨也射義審固内志正外體直然後持弓矢丨丨然後可以言中可以觀德行矣射義揖遜君子無所争必也射乎丨丨而升下而飲其争也君子語八佾貍首諸侯以丨丨為節記猿臂呉太史慈丨丨善射弦不虚發又李廣為人長猿臂其善射亦天性五甲射薛仁貴為鐵勒道總管宴内殿帝曰古善射有穿七札者卿試以丨丨丨焉仁貴一發洞貫帝大驚本傳萬人敵李晟往事河西王忠嗣從擊吐蕃悍酋乘城殺傷士甚衆忠嗣怒募射者晟挾一矢殪之三軍讙奮忠嗣撫其背曰丨丨丨也本傳孔子觀射丨丨丨丨於矍相之圃葢觀者如堵墻使子路執弓矢出延射曰賁軍之將亡國之大夫與為人後者不入其餘皆入葢去者半入者半又使公罔之裘揚觶而語曰少壯孝弟耆耋好禮不從流俗修身以俟死者不在此位也葢去者半處者半序㸃又揚觶而語曰好學不倦好禮不變旄期稱道者不在此位也葢有存者射義逢蒙學射丨丨丨丨於羿盡羿之道思天下惟羿為愈已於是殺羿曰是亦羿有罪焉孟子庾公叩輪鄭人使子濯孺子侵衛衛人使庾公之斯追之子濯孺子曰今日我疾作不可以執弓吾死矣夫問其僕曰追我者誰也其僕曰庾公之斯也曰吾生矣庾公之斯學射於尹公之他尹公之他學射於我夫尹公之他端人也其取友必端矣庾公之斯至曰小人學射於尹公之他尹公之他學射於夫子吾不忍以夫子之道反害夫子雖然今日之事君事也我不敢廢抽矢叩輪去其金發乘矢而後反同上君謨齧鏑督君謨善射閉目而射應口而中有王靈智者學其法久之曲盡其妙欲射君謨殺之丨丨時無弓矢執一短刀矢來輙折末後一矢以口承之遂丨其丨謂靈智曰學射三年但未教汝齧鏑耳朝野僉載紀昌貫虱甘蠅古之善射者彎弓而獸伏鳥下弟子飛衛學射於甘蠅巧過其師丨丨又學射於飛衛衛曰視小如大視微如著而後告我昌以氂垂蝨於牖間南面而望之旬月之間浸大也三年之後如車輪焉乃以燕角之弛朔蓬之簳射之丨丨之心而垂不絶昌既盡衛之術計天下之敵己者一人而已乃謀殺衛一日相遇於野二人交射中路矢鋒相觸墜於地而塵不揚衛之矢先窮昌遺一矢既發衛以荆棘之端打之而無差於是二人相拜於塗請為父子列湯問孺襄射鷃晉平公射鷃不死使孺襄射之叔向曰昔唐叔射兕以為大甲國語由基穿楊養由基蹲甲而射之徹七扎焉左成十六楚有養由基者善射去栁葉百步而射之百發而百中左右觀者數千人皆曰善射有一夫立其旁曰善可教射矣養由基怒曰客安能教我射乎客曰非吾能教子支左絀右也夫去楊葉百步而善之不以善息少氣衰力倦弓撥矢鈎一發不中者百發盡息史周紀栁渾貼梅栁渾與瑯琊王射嫌其布濶乃摘梅貼烏珠之上發必命中辛史射中九烏堯時十日並出命羿仰丨十日丨其丨丨皆死墮其翼彀淮南子射獲十禽趙簡子使王良與嬖奚乘終日不獲一禽嬖奚反命曰天下之賤工也良曰請復之一朝而獲十禽奚曰天下之良工也簡子曰我使掌與汝乘良不可曰我不貫與小人乘請辭御者且羞與射者比比而得禽獸雖若丘陵不為也孟子射虎飲羽楚熊渠子夜行見寢石以為伏虎彎弓射之沒金飲羽下視知其石也因復射石矢躍無跡渠子是其誠心金石為之開而况於人乎韓詩外傳李廣為右北平太守出獵見草中石以為虎而射之中沒鏃視之石因復射之終不復入廣所居郡聞有虎自射之及居右北平射虎虎騰傷廣廣竟射殺之史射沒鏃李逺出獵見叢薄中以為伏射之旋入寸餘細視之乃石周文曰可謂世載其德矣北史調弓猿啼楚王有猿王自射猿搏矢而喜使養由基射始丨丨丨擁木而啼墮矢馬躍斐旻守北平多虎旻善射一日得虎三十一休山下有父老曰此彪也稍北有真虎使將軍遇之且敗旻不信怒馬趨之見虎出叢薄中小而猛據地大吼旻馬辟易弓矢皆墮自是不復射唐李白傳引弓射妻公孫龍紿孔穿謂善射者能令後鏃中前括前矢造維而無絶落後矢之括猶衘絃規之若焉孔穿駭之龍曰此未其妙者逢蒙之弟子曰鴻起怒其妻而怖之引烏號之弓淇衛之箭射其目矢至眸子而目不睫矢墜地而塵不揚出列子激矢殺子後漢宋則為鄢陵令則子年十嵗與蒼頭共弩射絃斷矢激誤中子即死奴抱頭就誅則察而恕之潁川荀爽深以為美走馬射飛瑯琊郡公賀拔勝字破胡尤工武藝丨丨丨丨十中其五六賭牛破的晉王覬有牛名八百里駁常瑩其蹄角王濟與對射賭之覬矜持其能令濟先射一發破的因據胡床令左右探牛心來一割便去落鵰都督齊斛律光神武授都督嘗從文襄校獵雲表見一大鳥射之中頸旋轉而下乃鵰也丞相嘆曰此射鵰手也號丨丨丨丨北史又李廣為上郡太守匈奴侵入上郡上使中貴人從廣擊匈奴匈奴射傷中貴人廣曰是必射鵰者也廣傳射鴟都尉魏宗室幹以三箭下雙鴟軍中號丨丨丨丨魏志射貫飛鵰高駢事朱叔明為司馬有二鵰並飛駢曰我且貴當中之一發貫二鵰衆大驚號落鵰侍御射中白鷺石雄徐州人初討劉稹水次見白鷺謂衆曰使吾射中其目當成功一發如言帝聞下詔褒美射中金瓶崔仁冀父詢天成中有蕃使假道來聘仍以弧矢大誇於呉人武肅王宴之於龍山擊場酒酣因以金瓶置射掤之上命蕃使射之蕃一發中瓶之竇武肅王命詢曰汝能賽之乎詢曰詢雖不能願假王之威德請兼觜竇以勝之遂授以親箭二一發中瓶之竇再發中瓶之觜蕃使慙服久之王大悦因賜金瓶并帛器以奬之呉越史射中馬鞭崔詢在達靼時從羣酋射獵或掛針於木或立馬鞭百步射之輙中羣豪皆伏以為神五代史凡射命中李廣力扼虎射命中注命中隨手所指而中也善射不知晉魏舒性好騎射為後將軍鍾毓長史毓每與㕘佐射舒常為畫籌而已後遇朋人不足以舒滿數毓初不知其善射舒容範閑雅發無不中毓嘆射曰吾之不足知卿如此射矣豈一事哉射無空發張士貴號州盧氏人彎弓百五十斤左右無空發射每破的王栖曜善騎射始將兵涉寇境遇遊騎環合乃規百步立表而射丨丨丨丨虜相顧懼引去三發連中薛公逺佐鳳翔會軍帥不文嘗集射設的髙數十尺令曰中者酬錦與金一大衆軍莫能中公逺投弓矢揖曰當為公讙丨丨丨丨衆呼笑帥不喜因引去一發輙中晉高祖起太原使張潁隂招安重榮母與兄皆以為不可重榮業已許潁母兄謀共殺潁以止之重榮曰未可吾當為母卜乃立一箭百步而射之曰石公為天子則中丨丨丨丨一立一箭而射之曰吾為節度使則中一發又中其母兄乃與重榮叛入太原高祖即位拜重榮成德軍節度使五代史三箭定天山薛仁貴時九姓衆十餘萬令驍騎數十來挑戰仁貴發三矢殺三人於是虜懾皆降軍中歌曰將軍丨丨丨丨丨壯士長歌入漢闗本傳七矢斃洞獠羅寶諸洞獠叛詔馮盎率衆二萬為諸軍先鋒賊據險不可攻盎持弩語左右曰矢盡勝負可知矣發七矢斃七人賊乃退去詩集緩箭彊弓唐宋國公蕭瑀不能射太宗賜射俱不着垜歐陽詢作詩嘲曰急風吹丨丨弱手馭丨丨欲髙畨覆下應西還更東十回俱着地兩手併擎空借問誰為此多應是宋公後帝見此詩謂蕭瑀曰此乃四十字章疏也由是與詢有隙啓顔録投壺事類樂賓投壺之禮主人奉矢司射奉中使人執壺主人請曰某有枉矢哨壺請以丨丨賔曰子有㫖酒嘉肴某既賜矣乂重以樂敢辭主人曰枉矢哨壺不足辭也敢固以請賔曰敢不敬從講藝鄭云投壺者主人與賔燕飲丨論才丨之禮也並記投壺審度夫投壺細事游戲之類而聖人取之以為禮用諸鄉黨用諸邦國其故何哉鄭康成曰投壺射之細也古者君子射以觀德其心平體正端壹丨丨然後能中故也葢投壺亦猶是矣夫審度於此而取中於彼仁道存焉疑畏則疎惰慢則失義方象焉左右前郤過分則差中庸著焉得一失二成功盡棄誠謹明焉是故投壺可以治心可以修身可以為國可以觀人司馬君實中雋晉侯以齊侯宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坻寡君中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君並興亦中之伯瑕謂穆子曰予失辭吾固師諸侯矣壺何為也以其丨丨也齊君弱吾君歸弗來矣左昭十二舍人激矢武帝時郭丨丨善投壺以竹為矢能丨丨還一矢百反謂之驍西京雜記將軍雅歌祭遵為丨丨取士皆儒術對酒設樂必丨丨投壺雖在軍旅不忘俎豆之事可謂好禮悦樂末箭中耳邵康節赴河南尹李君錫會投壺君錫丨丨丨丨君錫曰偶爾中耳康節應聲曰幾乎敗壺坐客以為的對聞見録小障隔壺投壺之禮近世愈精古者實以小豆為其矢之躍也今則唯欲其驍益多益喜乃有倚竿帶劍狼壺豹尾龍首之名其尢妙者有蓮花驍汝南周璝𢎞正之子㑹稽賀徽賀華之子並能一箭四十餘驍賀又嘗為小障置壺其外隔障投之無所失也至鄴以來亦見廣寧蘭陵諸王有此校具舉國遂無投得一驍者彈棋亦近世雅戯消愁釋憤時可為之顏氏家訓博戲事類四采説文云行棋相塞謂之簺鮑宏簺經曰簺有丨丨塞四乘五是也至五即格不得行故謂之格五晏子五塞鮑宏博經琨䔩玉著也各投六著行六棊故云六博用十二六棊白六棊黒所擲頭謂之瓊瓊有五采刻為一畫者謂之塞刻為兩畫者謂之白刻為三畫者謂之黒一邊不刻者丨丨之間謂之五塞意錢者何承天纂文曰詭億一曰射意一曰射數即攤錢也晏子五木博塞之戯人多謂之賭博誤矣葢博乃樗蒲戱古者烏曹作博以丨丨為子有梟盧雉犢為勝負之采塞亦采也塞音賽六著博局戲丨丨十二棊古者烏曹作博尹文子曰博盡闗塞之宜得周通之路説文囊家世之糾率蒲博者謂之公子家又謂之丨丨樗蒲經云一有賭兩人以上須置囊合依條檢文書了投錢入囊家謂之録事麈史坑塹樗蒲經曰凡近闗及後一子謂之塹近闗及前一子謂之坑落丨丨非貴采不出凡一馬作一馬如遇退六踏馬則一馬可踏三馬故世指不循理者謂之踏坑塹云麈史格五吾丘夀王以丨丨召待詔博陸丨丨采名也陳思王製雙陸局置骰子二至唐末冇葉子之戲未知誰置遂加骰子至六骰合作投投擲之義今作骰非聲譜博塞亡羊臧與榖相與牧羊問臧奚事挾䇿讀書問穀奚事丨丨以遊事業不同丨丨均也管中窺豹王子敬數嵗時嘗看諸門生樗蒲見有勝負因曰南風不競門生軰輕其小兒乃曰此郎亦丨丨丨丨時見一斑子敬瞋目曰逺慙茍奉倩近愧劉真長遂拂衣而去喝雉成盧宋劉毅字希樂於東府聚樗蒲大擲一判應至數百萬餘人並黒犢以還惟劉裕及毅在後毅次擲得雉大喜褰衣繞床叫謂同坐曰非不能盧不事此耳裕惡之因援五子久之曰老兄試為卿答既而四子俱黒其一子轉躍未定裕厲聲喝之即成盧毅意殊不快也本傳呼重得四飾四以朱者明皇與貴妃采戯將北唯重四可轉敗為勝上擲連呼叱之骰子宛轉而成重四上大悦命高力士賜四緋也事始投馬擲帽晉袁耽字彦道有才氣倜儻不羈桓温少時遊於博徒資産俱盡猶有負進思自振之方莫知所出求濟於耽耽時在艱以誠告焉耽畧無難色變服懷布帽隨温與債主戲耽素有藝名債者聞之而不相識謂曰卿當不辦作袁彦道也遂就局十萬一擲直上百萬耽丨丨絶叫以布帽擲地曰竟識袁彦道不其通脱若此拄䇿爛鞭有人山行見洞中二老翁樗蒲以馬䇿拄地觀之俄鞭爛鞍朽與樵人爛柯事相類異苑以袍對賭則天時南海貢集翠裘后以賜張昌宗狄仁傑奏事命與昌宗雙陸則天曰賭何物梁公曰丨臣紫絁丨為丨丨昌宗翠裘則天曰此裘價踰千金公曰臣袍乃大臣朝見之衣翠裘乃嬖倖寵遇之服對臣之袍臣猶怏怏昌宗神沮氣索累局連北公對御褫裘謝恩而出及光範門遂向家奴衣之從馬而去集異記整冠為誓慕容寶與韓黄李根等宴因舉樗蒲危坐整冠誓曰樗蒲有神豈虚言哉若富貴可期頻得三盧於是三擲俱得盧寶拜而受賜一擲百萬南史桓𤣥聞劉毅起兵曰毅家無儋石之儲樗蒲丨丨丨丨共舉大事何謂無成一輸百萬宋顔師伯為侍中孝武與樗蒲帝得雉大悦為必勝師伯後得盧帝失色師伯遽歛手曰幾得盧爾曰師伯丨丨丨丨詩集布衣今夕何夕嵗云徂更長燭明不可孤咸陽客舍一事無相與博塞為歡娯憑陵大叫呼五白袒洗不肯成梟盧英雄有時亦如此邂逅豈即非良圖君莫笑劉毅從來丨丨願家無儋石輸百萬杜甫今夕行牧奴近來新譜識梟盧擬喚安陽舊博徒只恐分陰閑過了更教人誚丨猪丨元晦觀雙陸譜骰子張祐杜牧之同燕有屬意者索丨丨賭酒牧之微吟曰丨丨逡巡裏手拈無因得見玉纎纎祐應聲曰但知報道金釵墜髣髴還應露指尖樗蒲能銷永日是丨丨坑塹由來似宦途鄭都官詩葢丨丨所難者在於過闗以前後為坑塹畏墜落耳古今合璧事類備要前集卷五十七
