body:
  text: 古今合璧事類備要外集卷五十三宋謝維新撰鏡照門鏡附鏡匣鏡帶鏡臺器物總論鏡之為言景也言有光景也所以照形之物用精銅鑄為之亦曰鑑葢人短於自見必須假此以觀面然設之於前雖物有妖異其形皆不容遁則夫鏡之有功於人也多矣然鏡易以塵昏不匳以䕶之則其明易於虧亦所貴乎匳之施也臺即所以架鏡者帶穿鼻以供持挈併及之事類粉以𤣥錫明鏡之始型朦然及丨之丨丨丨摩之以白旃則鬚眉鬢毛可得而察淮南子塗以金膏胡僧云古鏡以金膏丨之珠粉拭之舉以照日必影徹墻壁又造金煙薫之玉水洗之藏之泥中亦不晦矣王度古鏡記以鏡觀面古之人目短於自見故丨丨丨丨智短於自知故以道正已目失鏡則無以正鬚眉身失道則無以知迷惑韓子用鏡自照丨明丨九寸丨丨有所思存七日即見神仙知千里外事也明鏡或用一或用二謂之四窺鏡枹朴子我心匪鑒丨丨丨丨不可以茹詩聖心若鏡丨人之用丨也丨丨不將不迎應而不藏故勝物無傷莊子鏡中響應周穆王時渠國貢火齊鏡廣三尺六寸暗中視如書人向鏡中語則丨丨丨丨之拾遺記鏡中形見道士以明鏡九寸懸於背老魅不敢近若有鳥獸邪物照之其本形皆見丨丨枹朴子擲鏡還汝魯相臧氏之婦忽失鏡經數日從空中丨下有人言曰還汝丨勿責之遲遲風俗通窺鏡自視鄒忌衣朝衣冠問妻妾曰我何如城北徐公美皆曰美明日徐公來丨丨丨丨始知不如徐公之色逺矣懸鏡照鸞罽賔王獲一鸞丨丨以丨之丨覩影乃悲鳴而舞顧鏡乃鹿昔張葢二人並精思於蜀雲臺山石室中忽有一人黄練衣葛巾到其前曰勞乎道士辛苦幽隠於是一人丨視丨中丨丨也云云抱朴子照見心膽秦始皇有方鏡丨丨丨丨女子有邪心者即膽張心動有然者始皇輒殺之西京雜記照見腸胃高祖入咸陽宫得方鏡廣四尺九寸表裏有明人來照之影則倒見以手捧心可丨丨丨五藏厯然無疑西京雜記負局磨鏡丨丨先生語似燕代人因丨丨輒問主人無有疾苦者若有輒出紫丸赤藥與之神仙傳孫􅀶引鏡河東丨丨能丨丨為刀屬刀為鏡並神仙傳覽鏡恚怒魏夏侯惇從征吕布為流矢所中傷左目時夏侯淵與惇皆為將軍軍中號惇為盲夏侯惇怒之毎丨丨丨丨輒撲照著地視鏡自知張裕曉相術毎舉鏡視面目自知刑死未嘗不撲之于地蜀志龍駒持月隋王度有寳鏡嵗疫度令僕持鏡詣里有疾者照之即愈皆云丨丨丨一月光彩被體清涼而愈異聞集碧光連日王度寳鏡大業中有胡僧至其家曰宅上常有丨丨丨丨絳氣屬月此寳鏡氣也異聞集鏡防已過魏徵薨太宗臨朝嘆曰以銅為鑑可正衣冠以古為鑑可知興替以人為鑑可明得失朕常保此三丨内丨丨丨今魏徵逝一鑑亡矣鏡況清鑒唐太宗賜高季輔金背丨以丨其丨丨拭鏡㨵白韋表㣲授監察御史不樂曰爵祿譬滋味也人皆欲之吾年五十丨丨丨丨冐游少年間取一班一級未見其味也刻鑑為文龎勛賊首孟敬文欲絶勛自立隂丨丨丨丨曰天口丨丨文錫爾將軍夜瘞之野耕者得之以獻衆駭乃齋三日授之勛知其謀使人襲殺之引鑑不樂韓休同平章事帝嘗丨丨黙丨丨左右曰自韓休入朝陛下無一日歡何自戚戚不逐去之帝曰吾雖瘠天下肥矣本傳覽鏡成字宋璟未第時因於日中丨丨影丨相丨璟因此自負於相業開元遺事終身不引路隋父執虜中毋告以貌類泌者丨丨丨丨鏡既孤不視韓臯貌類父丨丨丨復丨鑑題曰夷則唐天寳中有陳仲躬井中有鏡自云敬元穎又曰其本師曠所鑄十二鏡之第七者仲躬後交戰累勝為大官其鏡背有二十六字科斗書曰維晉新公二年七月七日午時於首陽山前白龍潭鑄成此鏡千年後出於背上環書一字管天文一宿依方列之則左有日右有月龜龍虎雀各依方安焉於鼻下丨丨丨丨之鏡博異志名曰紫珍龍駒夢一人先冠紫衣曰我鏡神丨丨丨丨剖鯉得鏡元稹登黄鶴樓望江濵有光若星就視得一鯉丨其腹得古鏡如錢大背有雙龍口中常吐光焉三水小櫝投網得鏡漁者丨丨秦淮覺異常極力舉丨一丨照之厯歴見五藏六腑驚懼失墜後萬計終不獲唐王歆松窻錄寳在蜀中孟蜀時軍校張敵得一古鏡模闊尺餘鏡光照寢處不施燈燭將求磨滌之有貧士見而嘆禮曰久知丨丨丨丨一見是然此鏡不久當亦歸敵益珍藏自得鏡無疾病樵牧閑談寳出世間長安任仲宣家素蓄寳鏡示之識者謂之三代物後有八字僅可曉仍篆籕云水銀隂精百煉成鏡詢所得云高山樵者石下得之後仲宣南鶩洞庭風濤洶然因泊州夢一道士赤衣乘龍詔仲宣言此鏡乃水府至丨丨丨丨有期言當歸我矣因持鏡去仲宣睡覺亟視篋中已失所在龍城錄解造真龍唐天寳中楊州進水心鏡一面清瑩耀目背有盤龍勢如飛動元宗覽而異之進鏡官揚州㕘軍李守泰曰鑄鏡時有老人自稱姓龍名䕶鬚眉皓白眉垂至肩衣白衣有小童衣黑衣呼為𤣥㝠至鏡所謂鏡匠吕輝曰老人丨丨丨丨鏡為汝鑄之將愜帝意遂令𤣥㝠入爐所扄户三日户開吕輝等摉覔已失龍䕶及𤣥㝠所在爐前獲素書一紙云開元皇帝聖通神靈吾遂降祉斯鏡可辟衆邪鑒萬物秦皇之鏡無以加焉歌曰盤龍盤龍隠於鏡中分野有象變化無窮興雲吐霧行雨生風上清仙子來獻聖聰吕輝等移爐以五月五日於楊子江心鑄之後大旱不雨葉法喜善祠鏡龍於凝隂殿須臾雲氣滿殿甘雨大㴻異聞號為照骨僯溪石岸石窟有方鏡徑文餘照人五臟秦始皇世丨丨丨丨寳在無勞縣山境酉陽雜俎照二百里吕文穆公居相有一朝士家藏古鑑自言能丨丨丨丨欲因公弟獻以求知其弟伺間從容言之公笑曰吾面不過堞子大安丨丨丨丨聞者歎服以為賢於李衛公逺矣歸田錄晉傅咸鏡賦順隂位於西裔搩秋金之剛精醮祝融以致䖍命歐冶而是營晞日月之光烈儀厥象乎曜靈不有心於好醜而衆形其必詳同實錄於良史隨善惡而是彰猗猗淑媛峩峩后妃眷春榮之零猝懼玉顔之有衰助清陽而自鏡競崇姱以相輝若乃雲髻亂於首頳黛渝於色設有之於斯器兮孰厥貌之能飾茍盲瞽而同昧兮近有面而不識君子知貌之不可以不飾則内省而自箴既見前而慮後則祗畏於幽深察明明之待瑩則以此而洗心睹目觀之有假則稽訓於儒林夫然尚何厥容之有慢而厥思之有滛梁劉緩鏡賦欲啓奩而更飾乃當窻而取鏡訝宿粉之猶調笑殘黄之不正唐司空圖容成侯傳容成侯金烱者本蜀郡嚴道人附山而居同族中多見摉採其先因秦時調發詣尚方輸作世苦之乃誡子孫易其服色必以清厲自進後徙居上洛㑹郎中盧生范生皆傳修錬之術委質相資因砥磨以致用上聞而鑒器之召見嘉其器局且謂毫髮無隠屢顧之厯試臺閣號為明達挾奸邪以事上者見之膽慄輒自披露至於婦人女子媚惑之態亦不能掩也其察之如此是雖造物無私圓方不礙然疵陋者終惡忌積毁於上以為背面不相副烱亦自病於狹中不能以塵垢混其迹也竟被擯斥後亟有月蝕之變時官中漏下數刻上臨軒念其規益復召俾具道所以然者扣之響應不疲上異焉命以容成侯奉朝請而宗人派别於廣陵者炫飾求售陷為輕薄干權戚中或撫然自喜則狎玩不厭至或被以組綉葢其俯仰取容雖穿鼻服役亦無恥耳既稍進烱又鄙其為人迺復以讒廢歸老於家太史公曰烱之逺祖當軒轅時以化服祝融氏得薦於山能强記天象地形草木蟲介萬殊之狀皆視諸掌握葢其術亦規模於洪範耳物恠遇之莫不喘息自廢後益親幸上晨興必先至則與冠冕者偕進號為夀光先生不名也子孫稍下衰然流寓太原者始尚𤣥亦以精錬見重觀烱雖任用兢兢惟恐失墜不善晦匿果為邪醜所疾幾不能免噫大雅君子既明且哲以保其身難哉鏡匣漆奩晉太子納妃有著大鏡一尺八寸著小鏡一尺二寸丨丨盛葢銀華金薄甕匣元和初海陵夏候乙庭前生百合花大於常數倍異之因發其下得丨丨十三重各匣一鏡第七者光不蝕照日花環一丈其餘䂓銅而已酉陽雜俎置巾奩蜀王宗夀嘗於許間得鏡晦不可覽屢令工人營之了無所覩置丨丨丨中有日至是忽覽之光彩煥發因見市舎中有一青衣小兒丱角獨坐宗夀令人訪之於是小兒欣然肯來因曰我為鐵鏡來耳公不見還神物當還去宗夀出鏡與之長揖而去九國志唐姚崇執鏡誡秦樓明鏡鑒有餘輝色自凝曉光能洞微飾以鞶組匣以珠璣龍繞池臥烏臨月飛鏡臺銀臺鏡臺出魏武帝宫中宫有純丨㕘帶鏡丨一純丨七子公主鏡丨面魏武雜物疏玉臺劉聰為丨鏡丨温嶠辟劉越石長史北征得之後娶姑女下焉劉義慶世說瑇瑁臺皇太子納妃有丨丨細鏤鏡丨一晉東宫舊事詩集藍水色我有古時鏡初自壤陵得蛟龍猶泥蟠魑魅幸月蝕磨久見菱蘂青於丨丨丨贈君將照心無使心受惑朱畫贈友人古鏡菱花舒一尺圓潭深墨色篆文如絲人不識耕夫云住赫連城赫連城下親耕得鏡上磨瑩一月餘日中漸見丨丨丨金膏光拭鉎澁盡黒雲吐出新蟾蜍人言此是千年物百鬼聞之形暗慄玉匣曾經龍照來豈宜更鑒農夫質有時霹靂半夜驚忩中飛電如晦明盤龍鱗脹玉匣溢牙爪觸風時有聲耕夫不解珍靈異翻懼赫連神作崇十年賣與靈臺兄百丈靈湫坐中至溢匣水色如欲傾兒童不敢窺泓澄寒光照人近不得坐愁雷電湫中生吾兄吾兄須愛惜將來慎勿虚抛擲興雲致雨㑹有時莫遣紅粧穢靈跡薛逢古鏡歌清光發妾有盤龍鏡丨丨常晝丨自從生塵埃有若霧中月愁來試取照坐歎生白髮寄語邉塞人如何久離别孟浩然同張明府清鏡歌流塵翳丨丨丨明鏡塵昏鑑不昏纎泥落清水泥滑非水渾人能辨二物相與自忘言二物不能辨悠悠何足論無為捨其内逐外取煩寃司馬君實寳鏡胎開鑒古鑒今百煉鏡鎔範非常規晨置處靈且竒江心波上舟中鑄三月五日午時瓊粉金膏磨瑩已化為一片秋潭水鏡成將獻蓬萊宫楊州長史手自封人間臣妾不敢照背有九五飛天龍人人呼為天子鏡我有一言聞太宗太宗嘗以人為鏡丨丨丨丨不鑒容四海安危居掌内百王理亂懸心中乃知天子别有鏡不是揚州百鍊銅白居易百煉鏡照來照去背如刀截機頭錄面似勝量澗底泉銅雀臺南秋日得丨丨丨丨二三年賈島方鏡鏡匣經龍照玉匣曾丨丨丨來詳見前慙鳯來憶昔逢君新納聘青銅鑄出千年鏡意憐光彩固無瑕義比恩情永相映毎將鑒面并鑒心鑒來不輟情逾深君非結心空結帶結處尚新恩已背開簾攬鏡悲難語對面相看孟門阻掩匣翻丨雙丨丨懸臺欲效孤鸞舞粧成持照尚當時只畏愁多遽變衰昔日照來人共許今朝照罷自生疑鏡上有塵猶可拂君恩詎肯無回時長孫輔佐對鏡吟匣藏龍龍就丨中丨李巨奩幽鳯丨鏡丨丨塵李賀為塵垢蝕沈沈匣中鏡丨此丨丨丨輝光何所如月在雲中黑南金既彤錯鞶帶共輝飾空存鑑物名坐使妍蚩惑美人竭肝膽思炤氷玉色自非磨瑩工日日空歎息韋應物雜體開鸞鳯活軒后洪爐獨鑄成蘚㾗磨落月輪呈萬般物象皆能鑒一個人心不可明匣内乍丨丨丨丨臺前高掛鬼神驚百年肝膽真堪比祗怕看頻素髮生唐僧若靈古鏡盤龍鱗脹丨丨丨丨玉匣溢詳見前瑶匣開旭日明月何處來朦朧在人境得非軒轅作妙絶世莫並丨丨丨丨丨白電走孤影泓澄一尺天徹底㴠霜景氷輝凛毛發使我肝膽冷忽驚行深幽面落九秋井雲天入掌握爽朗神魄静不必負局仙金沙發光烱隂沈畜靈恠可與天地永恐為悲龍吟飛去在俄頃李羣玊古鏡鏡臺鳯出丨從臺上丨李巨鸞舞懸臺欲效孤丨丨明鏡無菩提本無樹丨丨亦丨臺何勞勤拂拭自不染塵埃六祖明鏡了丨明金鵲丨丨了玉臺前拂拭的氷月光輝何清圓李白前高掛臺丨丨丨鬼神驚並詳見前鏡帶燈前自繡嫁時明鏡老猶在黄金鏤畫雙鳯背憶昔咸陽初買來丨丨丨丨芙蓉帶十年不開一片鐵長向暗中梳白髪今日後牀重照看生死終當此長別玉建老婦鏡歎結處尚新君非結心空結帶丨丨丨丨恩已背詳見前鞶共輝飾丨帶丨丨丨詳見前古今合璧事類備要外集卷五十三
