body:
  text: 古今合璧事類備要後集卷四十八宋謝維新撰王府官門總王府官記室事見後本類此不重出歴代㳂革唐王府𫝊一人從三品掌輔正主過失友一人從五品下掌侍游處規諷道義記室參軍二人掌表啟書疏百官志事類靡刑漢申公傳楚太子成無道疾申公及為王胥丨申公腐丨也减死漢王式翁思為昌邑王師王無道羣臣以不輔導誅式曰臣以詩朝乆授王書奏丨丨二賢郎家丨丨注郎餘令孔六帖五孝趙洪智入為陳王師講孝經百福殿洪智舉丨丨同上賦詩唐杜淹秦王引為天䇿府兵曹參軍侍宴丨丨尤工賜銀鍾棄官唐郝處俊再轉滕王友恥為王府屬丨丨去又漢王駿遷趙内史丨丨丨無雙唐張薦調露初登第考功員外郎蘇味道稱天下無雙授岐王府參軍自擇趙贊秦王從禁握兵而驕言者請置師傅以傅之大臣畏王請王丨丨秦王即請贊拜祕書監為秦王侍贊泣曰禍將至矣五代史駐馬唐房元齡居秦王府出入十年軍符檄丨丨即辦檄雞孔六帖戒子孫漢王吉為昌邑中尉以數諫王得减死髠丨丨丨毋為王國吏治師傅漢清河王慶侍衞訴私千于萬詔案丨慶曰訴以丨丨之尊選自聖朝臣惟知聽從不惟有此糾察王佐才唐杜如晦秦王引為府兵曹參軍元齡曰如晦丨丨丨也大王欲經營四方捨如晦無共功者卿師矩劉悼之拜相王府司馬帝謂曰卿家忠孝吾子頼丨丨丨冀蓬在麻不扶而挺也見尊憚唐蘇良嗣髙宗時為周王府司馬王年少不法良嗣數諫甚丨丨丨恨晚得唐韋湊入為相王府屬姚崇兼府長史曰韋子識逺文詳吾丨丨丨之侍宴升堂吳張昭為長史丨丨丨丨白六帖位加輔國龎秀為司馬丨丨丨丨注加輔國將軍同上以祭酒遷劉寔丨丨丨丨注晉書遷為廣陵王師白六帖以尚書領阮孚丨丨丨丨注為吏部東郡王師同上公非池中物唐韋思謙沛王府長史皇甫公義引為倉曹參軍謂曰丨丨丨丨丨屈公以重吾府此吾之相如唐盧照隣調鄧王府典籖王曰丨丨丨丨丨不事江滕蔣虢江安性慵遊時蔣滕虢三人貪暴得其府官者不願行語曰寜向儋崖振白丨丨丨丨丨丨王府翊善歴代㳂革國朝太平興國四年置翊善一人續㑹要孝宗初就𫝊范元長以待制兼資善堂翊善自是率以從官為之其後親王府不復除第以朝工兼贊讀直講而已淳熙末寜宗在嘉邸留丞相始薦用黄文叔自祕書除翊善不為兼官非常制也其後文叔遷起居舎人歴中書舎人給事中皆兼翊善是以従官兼七品之職矣朝野雜記事類外府王勵美風儀博涉書史仕梁為河泉東王功曹王出鎮勵將隨之藩張纘時典選見其風采乃曰王生才地豈可遊丨丨乎奏為太子洗馬南史西邸竟陵王子良開丨丨招文學沈約蕭珠王融謝眺陸倕范雲任昉等游號為得人盻遇見後入子鸞府下極選見東宮官属門朱震范冲事下賓客慕徳前漢淮南王安為入好書招置賓客數千人公之徒感慕其徳各竭材智著述篇章分其詞賦以類相次或稱大山小山猶詩有大雅小雅也南方秀望晉顧榮時在洛者惟陸雲陸機及榮三人而已機雲有詞藻不及榮以丨丨丨丨補吳王府中令晉中興書曵王門裙呉王濞陰有邪謀鄒王上書諫之曰臣何王之門不可曵長裙乎同漢書入子鸞府宋武帝時殷淑儀寵傾後宫子始平王子鸞愛冠諸子凡為上盻遇時莫不丨丨丨丨宋書竭誠親邸丨丨丨丨胡文恭行王􅀈制申翊宗藩丨丨丨丨曾惠訓之不倦同上耆徳方正國朝大中祥符九年以張士遜崔遵度並充夀春郡王府賓客時王將受經擇丨丨丨丨有學術者為府官士遜時為河北轉運使雅素清謹遵度力學有士搢紳目為長者即召士遜等赴闕並命焉天性誠信張忠簡公大猷公莊重出於丨丨丨丨濟以學力在王邸讀資治通鑑至論脩身治國反復誦說夀皇毎嘉納暇日賜札和詩恩意綢繆周益公集充為翊善國朝治平三年以尚書節度使官王稷臣直賢院丨丨穎王府丨丨令於皇子兩位供職也輟為諫官國朝邵亢𫝊英宗諭頴王曰以翊善端直朴厚丨丨丨丨矣王出道帝語遂以制誥知諫院事東都事略諫作假山姚坦為益王府翊善王嘗作假山召僚属置酒觀之坦獨俛首不觀諫曰但見血山安得假山王驚問對曰坦在田舎時見州縣督稅捕人鞭笞血流滿身此假山皆民租賦所出非血山而何太宗亦為假山未成有以坦言告于上者上曰傷民如此何以山為亟命毁之長編訪以世務邵亢字興宗為穎王府翊善召對羣王殿英宗丨丨丨丨稱之曰學士真國器東都事略名宦不為不遇乗朱輪於華邸曵長裾於王門丨丨丨丨丨丨白樂天文集初後皆為翊善王陶傳陶字樂道皇子丨王淮陽丨王穎丨丨丨丨東都事略王府直講歴代㳂革國朝太平興國四年别置侍講以常參官充政和七年詔改侍講為直講詳見贊讀事類經佐睠彼藩邸髙選丨丨唐大詔令姚元之制師範其歸登吕元膺宜侍講承華丨丨磐石可充太子諸王侍講元和冊太子赦賜紫至道二年以孫奭為諸王府侍講丨丨答拜大觀二年定王嘉王府侍講沈錫奏真宗時以張士遜為王友命王丨丨以示賓禮今講讀之官職在訓導亦王之友𫝊也可如王友例令王答拜續㑹要可為勸戒鄭穆字閎中為嘉定二王侍講府僚缺員御史陳襄請擇人神宗曰如鄭穆徳行乃宜左右王也居館下三十年在王邸一紀非公事不至執政之門講說有法丨丨丨丨者必反復摘誦二王敬禮焉四朝國史多所禆益李浩字徳逺兼恭王府直講在王府丨丨丨丨且因事以及時政書之於冊上或見之王亦愛重之校經正義孫奭宗宗古為諸王府直講丨正九經丨丨東都事略勸講親賢丨丨丨丨之地李淇水制庶專講授熙寜元年五月言者謂諸王宫教授向來率用朴學醇儒近以員多所用之人或異於前者西漢以博士不通政事者補諸侯王傅欲下兩制及國子監學有學行不通政事者充仍限年五十以上丨丨於丨丨有益宗室詔如缺宜令舎人院國子監舉朴舉純誠行義無缺年五十以上充㑹要特為加禮校書郎王十朋兼建王府小學教授先是教授入講堂則與皇孫叙賓主而教授居賓位十朋不可王丨丨之丨丨而位教授於中中興係年錄召除記室徐勣字元功為越王等官大小教授丨對丨王府丨丨東都事略典教宫邸丨丨丨丨公是行畢由制聖賢出處周孟陽嘉祐中為澤王潤王宫教授辭命皆孟陽為之贊導勤至雖家事之微無所不及陳丨丨丨之方參以古今禍福之變以為箴規英宗陳然起拜經書名數治平元年詔曰雖王子之親必由於學稽古大猷若時至訓粤三徳三行之順有四術四教之崇歴辟承風自家刑國今一祖之後諸宗之支亦嘗著命於前命官以訓或兼職他邸或備位終年誘導失宜滅裂無狀特詔近臣並薦能者成童而上訓習丨丨小學之居通達丨丨固當漸漬簡編恪修志業居常謹思戒在中止所謂少成若天性習慣如自然顧禮義之方須長者之誨真天子門生紹興二十五年以趙逵兼普安恩王府教授逵時為禮部郎及引對上曰卿乃朕自擢秦檜日薦士曾無一言及卿以此知卿不附權貴丨丨丨丨丨也又日兩王方學詩冀有以切磋之因奏言路乆壅願陛下廣覧兼聴庶養成敢言之氣上嘉納之併小大學官其後言以官冗丨丨丨丨丨又更員數毋變以寡失法意矣吕氏廣記選有道之士朕丨敦樸丨丨丨丨校經藩方掌教宗子胡文恭李恂制䖍宗屏之訓同上王府贊讀歴代㳂革唐開成元年宰相李石奏太子有侍讀諸王亦有侍讀無降殺之禮宜改奉諸王講讀國朝英宗治平元年諸王府置侍讀二人職畧以為太平興國中始置侍講侍讀與此不同當考徽宗政和七年張大亨奏功見講讀之官在太子謂之侍講侍講而在諸王府者亦有侍講侍讀官號比擬稱謂相紊詔諸王府侍讀改為贊讀侍講改為直講事類徳業隋楊注字元度為周冀王侍讀王甚重之每曰楊侍講丨丨優深孤之穆生也隋書文學徐摛字士秀髙祖謂周捨曰我求一丨丨俱長兼有行者欲令與晉安王緯遊處捨曰臣外弟徐摛刑質陋小若不勝衣而堪此選髙祖曰必有仲宣之才無問其容貎乃以摛為侍讀經佐睠彼藩邸髙選丨丨唐大詔令姚元之制經席桂山徐􅆅字將道更路沛豫周諸王侍讀四王之門從容丨丨類要燕公清切丨丨蕃房寂寥舊蓽類要謝眺牋節義姚思廉仕隋為代王侍讀髙祖定京師獨思廉持正觀者歎曰仁者之勇謂此人乎太宗嘗語及隋事遣使遺物三百段致書曰想卿丨丨之風故有此贈閉影不交梁陶洪景為諸王侍讀雖在朱門丨丨丨丨外務唯以披閱為務談經雍容丨丨王府揮玉麈以丨丨李淇水制義兼師友蔡挺𫝊兄執字子直為穎川郡王伴讀英宗在藩邸器重之請於濮安懿王願得與遊毎見抗衣冠盡禮丨丨丨丨東都事略王府記室歴代㳂革漢三公及大將軍皆有記室令史主上表記章奏報書記魏太祖輔漢以陳琳阮舉管室軍國書檄多二人所為職林宋自明帝以後皇子皇弟雖非都督亦置記室參軍隋伯叔昆弟皇子是為親王府置記室參軍唐因之六典通典本朝太平興國中置政和中以參軍行軍之際所稱詔除去參軍字事類謹恪太宗雍熙二年以王龜從等並為陳王韓王冀王府記室參軍太宗諭龜從等曰諸子生長深宫未知世務必資良士贊導為善使日聞忠孝之道卿等皆丨丨有守故兹謹選各宜勉之靜重維朕叔父為時賢王宜得良士從游以爾樸茂丨丨有規矩輟自奉常徃司管記曲阜行辛雍制處淡鄭雍字公肅元豐中為皇弟嘉王府記室參軍在王府幾十考不遷而自丨丨如士論歸重本𫝊行優畢文簡公士安字仁叟兼冀王府記室參軍端拱中詔王府官各上所為文帝問近臣曰文吾既知之其丨孰丨皆以公對帝喜以本官知制誥言行錄辦符檄房喬為秦府記室征伐末嘗不從居府出入十年丨軍丨府丨駐馬即揮文約理盡初不著藁髙祖曰若人機識毎為吾兒陳事千里外猶對面語職林掌機近溫大有字彦將唐初攝大將軍府記室與兄大雅丨丨丨石林燕語拜起節神宗封淮陽王穎王韓維皆為記室參軍王每事咨訪維悉以對至丨丨進退趨揖之容皆陳其丨四朝國史富貴箴孫覺傳字莘老遷昌王府記室參軍王禮之問終身之戒覺為陳諸侯之孝作丨丨丨河東三鳳薛元敬薛收及族兄徳音齊名世稱丨丨丨丨收為長雛徳音鸑鷟元敬年最少為􅀈雛武徳中為記室元敬謹畏未嘗申欵曲於房杜如晦歎曰少記室不可得而親不可得而疏職林明珠一言薛收字伯褒為天䇿府記室上書諫王畋獵王答曰丨丨兼乗未若丨丨職林以史館為大中祥符五年丨直丨丨晏殊丨昇王府記室參軍㑹要自奉常司見靜重注斥巧言令色竇偁為晉府記室賈琰為判官諸王宗室宴集琰怡聲下氣褒讚捷給偁叱曰賈氏子何丨丨丨丨之甚獨不懼於心邪楊文公談苑有直諒多聞朕以賢王將就外傅推茲僚属歴選在廷庶幾朝夕正士之親先有丨丨丨丨丨之益擢參王府葢莫汝宜初寮除李弥大制與論天下事韓維字持國神宗初就外𫝊以維為王府記室神宗嘗丨維丨丨丨丨語及功名維曰聖人功名因事始見人不可有功名心神宗稱善國史諸王宫大小教授歴代㳂革國朝太宗至道元年以員外郎孫蠙充皇姪皇孫教授從所號也時中書言按唐文宗朝宰臣李石言太子有侍讀諸王亦有侍讀旡降殺之禮請改為奉諸王講讀今皇姪皇孫是環衞之職以教授為名從之真宗咸平元年以朱昂兼南宅教授張蔚兼北宅教授嘉祐以來置諸宫教授立講書課試規罰之法此事見紹興五年錢觀復奏疏中興㑹要又朝野雜記云咸平初命諸王府官分兼南北宅教授南宫者太祖太宗諸王之子孫處之所謂睦親宅也北宫者魏悼王子孫處之所謂廣親宅也英宗治平元年教悼更不兼官以兩處供職有所廢闕㑹要時宗室本支之盛自率府副率以上八百餘人而教授之官六員而已因詔増置教授官凡皇族年三十以上者百十三人置講書四員年十五以上者三百九人増置教授五員年十四以下者别置小學教授十二員并舊六員為二十七員以分教之大學京朝官充小學選人充四年詔今後諸宫院大小學教授有缺令國子監與學士院舎人院輪舉熙寜元年小學教授亦輪京朝官元祐三年詔諸宫學教授闕選所舉學官及可為師表可備講讀科不足則三省選陞朝官有出身年四十以上者充崇寜三年睦親宅及北宅廣親宅各大學小學教授一員廣親北睦親西及周王宫大學兼領小學各二員大小學兼領始于此朝野雜記事類都講治平中宗室四千餘人親王置翊善侍講記室餘則逐宫院置丨丨教授嵗時有喜慶則燕崇政殿或太清樓明師治平六月五日詔内有懿親之表率外有丨丨之功劘懋進汝功用符眹意端慤仁宗嘗曰諸宫院教授非止習經術亦須揀履行丨丨者於是以張維翰充樸厚治平四年詔諸宫院教授須舉士行丨丨實有經術恪靜自守衆所共推者即不舉權貴親戚㑹要為六箴呉充兼吳王宫教授他官多與宗室伸無誨道之義充獨以嚴見憚宗子相率闢㕔事設講席受經英宗在藩邸心重之丨宗室丨丨以獻一曰視二曰聽三曰好四曰學五曰進徳六曰崇儉仁宗命寫賜皇族英宗書之座右屏神宗實錄出二書吳申字景山英宗擇官教導宗室以為睦親宅都講初宗室坐爵序仍自為賓主講官位主席之東隅申不肯坐且曰宗室當以親族尊卑為序與講官分賓主至再移書太宗正宗正不能決因内朝出二書英宗是之宗室正講席自申始同上舉所知治平三年蔡抗言今後諸宫院教授有缺並下兩制丨丨丨以盡天下之才從之國史古今合璧事類備要後集卷四十八
