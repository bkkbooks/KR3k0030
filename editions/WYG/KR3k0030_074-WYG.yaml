body:
  text: 古今合璧事類備要後集卷五宋謝維新撰君道門恢復古今源流祖宗之故物已失而復得者則謂之恢復三代之世如少康如髙宗如宣王是也然三代之君皆以自上伐下以天子攻蠻夷以中國討夷狄而收恢復之功奈秦漢以來多事和戎然有以崛起南陽而可以中興漢室者光武亦有崎嶇巴蜀而不能興復漢祚者先主又有宴安江沱而終不能復黄河山南而為晉土者元帝惟唐之肅宗因逆賊之亂而即位于靈武終于尅復兩京以迎上皇而還都大抵秦漢而下徃徃以征伐為懼以和戎為喜是以境土日蹙而無以還祖宗之舊物者以此也我宋澶淵之役雖不能免於和然天誅一施強冦随斃彼氣已先沮而後為休兵息民之和髙宗中興使其果常得李綱宗澤其人則豈可不盡復天下於一統惟和議一事萌於鼎浚主於秦檜厥後牢不可破不得已則駐蹕於錢塘焉孝宗因符離之後亟欲恢復而當時諸臣議論角立卒無以副夀皇恢復之志反復古今上下而觀之則秦漢而降其間所以不能恢復者徃徃壊於和戎之一事云事類紹業盤庚丨復先王之大丨書復古車攻宣王丨丨也詩祀夏哀元年少康邑諸綸有田一成有衆一旅能布其德以收夏衆復禹之績丨丨配天不失舊物左傳攘夷宣王能内修政事外丨丨狄復文武之境土詩復興宣王上天佑之為生賢佐明文武之功業周道粲然丨丨董仲舒䇿復見不圖今日丨丨漢官威儀後光武紀披圖光武丨輿地丨示鄧禹曰今天下郡國如是前日言天下不足定何也清京昨見元温表便當躬率二軍討除二㓂蕩滌河渭灑丨丨邑反皇居於東土正玉衡於太極晉孫綽傳疏興復丨丨漢室還於舊都又唐李翺興復太平大畧誓清祖逖為豫州刺史渡江中流擊楫而誓曰祖逖不能丨丨中原而復濟者有如大江復境土宣王丨文武之丨丨詩歸侵疆孔子用魯齊人章丨其丨丨揚子復疆宇聖皇系唐統接漢緒茂育羣生恢丨丨丨勲兼乎古昔事勤乎三五選東都賦興洪祚皇乾眷命火德復輝光武以聖武天挺繼統興業丨復丨丨光被八極名垂無窮後黄瓊傳清冀北祖逖方當摧鋒越河掃丨丨丨本傳收河南天子獨以匹馬至靈武合弱旅鎮强㓂曽不踰時摧鋭攘胷復兩京丨丨丨州縣何其異耶復神州過江人士毎至暇日相邀出新亭飲宴周顗中坐歎曰風景不殊舉目有江山之異相視流涕惟導愀然變色曰名士當共戮力王室尅丨丨丨何至作楚囚相對泣耶晉祖逖傳光宗社帝嘉其勲曰今晟等宣力肆勤丨復丨丨李晟傳登單于臺前武帝元封元年詔曰朕將廵邊陲擇兵振旅躬置十二部將軍親帥師焉丨北丨丨丨至朔方臨北河勒兵十八萬騎旌旗逕千餘里威震匈奴遣使者告單于曰單于能戰天子自將待邊不能亟來臣服封狼居胥宋文帝王元謨北伐帝曰聞元謨之言使人有丨丨丨丨之意盡為晉土由是自黄河以傳傳南丨丨丨丨祖復見官軍肅宗至德二年從廣平王収長安翌日入京師老㓜夾道呼曰不圖今曰丨丨丨丨郭子儀傳神器重耀皇祚中興江左舊物克彰丨丨丨丨元温傳王室再造子儀自朔方待孤軍轉戰遂北是時天子西走唐祚若贅而能輔太子再造王室本傳破尋邑等漢光武以兵數千丨王丨馬丨丨百萬人故建武所以中興剪齊滅蔡杜黄裳言王道在修己任賢憲宗以其言忠嘉納之由是平夏丨丨丨丨復兩河赫然號中興兩都再復丨丨丨丨於鑾輿舊唐史肅宗紀二聖重歡儲宗撫戎蕩攘羣兇恢復指期曽不踰時宗廟再復丨丨丨丨地闢天開蠲除妖災唐元吉中興頌當贖百姓五代晉髙祖起并州藉契丹割幽薊瀛漢涿易澶順新為孺武雲應􅀢朔蔚十六州以報之藝祖恨華人歿於北即位即置私藏曰俟及三百萬當移書契丹丨晉朝䧟沒丨丨事畧來朝獻地李􅂜興夏州人本姓拓跋唐季賜姓世有夏銀宥綏靜五州之地太宗太平興國三年李繼捧丨丨願丨其丨其弟繼遷復叛當修軍政本朝髙宗建炎元年李綱言今日中興規模有先後之序丨丨丨丨變士風裕邦財寛民力改赦法省冗費誠號令信賞罰擇帥臣選監司使吾政已修然後可議興師中興係年録先求人才髙宗謂輔臣曰恢復人宜盡力講究須丨丨丨丨有人才則天下事何患不舉同上大作規模紹興五年上曰祖宗德澤在天下二百年民心不忘當乘時丨丨丨丨措置朕安能鬱鬱久居此乎趙鼎曰時不可失誠如聖諭自有天命髙宗紹興十一年上曰中興丨丨丨丨光武以數千破尋邑百萬豈人力所能乎朕在宫中聲色之奉未嘗動心只是靜坐内省求所以合天者同上書車攻詩御丨丨丨丨賜趙鼎鼎曰陛下游神翰墨不忘恢復臣不敢不勉同上書光武紀三年諫議徐俯入對上丨丨丨丨以賜之曰朕看世祖紀以益中興之治因思讀六七遍未若書一遍之為愈也係年録惟恢復可喜同上五年上曰世忠奏㓂退朕謂㓂退不足喜丨丨丨中原還二聖乃丨丨乎然有一可喜卿等諸將爭先非昔時比也聖政以中原為憂孝宗乾道七年上曰朕念冦讎未復宵旰不遑虞允文奏陛下不以萬乘為樂而以中原久陷塗炭丨丨訪恢復大計趙師進對上思中興故家首丨以丨丨丨丨曰士民尺寸之地為人攘奪尚力爭之祖宗二百年宗社陷于冦顧不爭何如同上須規恢廣大平生雄武心覽鏡朱顔在豈惜常憂勤丨丨丨丨丨孝宗述懐詩大一統之恩興念燕雲久淪邊圉故家望族流移四野之悲廣谷大川阻𨽻九畿之籍方藝祖肇基寔軫恤民之慮逮神考嗣服深惟復古之圖惟春秋以王者丨丨丨方隆廣覆丨丨而要荒賴中國有至仁咸起來蘇之望整我師旅徹彼土疆未閲再朞悉平兩路崗巒靡迤東踰碣石之封亭障騫翔西軼榆溪之阻拯百年塗炭之餘咸躋夀域還五路衣冠之舊復覩華風徽宗宣和八年恢復燕雲赦天下制復九世之讎春秋丨丨丨丨丨用伸宿憤玉帛定兩國之好旋拓故疆又云納降附以孤其黨與行間諜以離其腹心果振下齊之旅迄成平蔡之功凌雲既剪知命危破竹之中㧞幟先登遂火縱績薪之下衣寶自焚於煙熖遺禽悉就於俘纍旌斾來歸師徒不蝢端平平蔡露布神京應未逺丨丨丨丨丨當繼沛中歌孝宗新春喜晴詩八荒而為家吾將觀登臺之熙熙包丨丨丨丨丨穆然若東風之振槁灑然若膏雨之萌芽同上春賦班孟堅燕然山銘惟永元元年秋七月有漢元舅曰車騎將軍竇憲寅亮聖明登冀王室納于大麓惟清緝熙乃與執金吾耿秉述職廵御理兵於朔方鷹揚之校螭虎之士爰該六師暨南單于東烏桓西戎氐羗侯王君長之羣驍騎三萬元戎輕武長轂四分雲輜蔽路萬有三千餘乗勒以八陣蒞以威神𤣥甲耀日朱旗降天遂陵髙闕下雞鹿經磧鹵絶大漠斬温禺以釁鼓血尸遂以染鍔温禺尸遂皆單於號然後四校横狙星流彗掃蕭條萬里野無遺㓂於是域滅區單反斾而旋考傳驗圖窮覽其山川遂踰涿邪跨安侯乘燕然躡冒頓之區落焚老上之龍庭上以攄髙文之宿憤光祖宗之𤣥靈下以安固後嗣恢拓境宇振大漢之天聲茲所謂一勞而久逸暫費而永寧者也乃遂封山刋石昭銘上德其辭曰鑠王師兮征荒裔勦凶虐兮截海外敻其邈兮亘地界封神丘兮建隆嵑熙帝載兮振萬世元結大唐中興頌天寶十四年安禄山䧟洛陽明年陷長安天子幸蜀太子即位于靈武明年皇帝移軍鳯翔其年復兩京上皇還京師於戲前代帝王有盛德大業者必見于歌頌若令歌頌大業刻之金石非老於文學其誰宜為頌曰噫嘻前朝孽臣奸驕為昬為妖邊將騁兵毒亂國經羣生失寧大駕南巡百僚􅇡身奉賊稱臣天將昌唐繄睨我皇匹馬北方獨立一呼千麾萬旟戎卒前驅我師其東儲皇撫戎蕩攘羣兇恢復指期曽不逾時有國無之事有至難宗廟再安二聖重歡地闢天開蠲余妖灾瑞慶大來兇徒逆儔㴠濡天休死生堪差功勞位尊忠烈名存澤留子孫盛德之興山髙日昇萬福是膺能令大君聲容沄沄不在斯文湘江東西中直浯溪石崖天齊可磨可鑴刋此頌焉何千萬年詩集抵掌収伊洛丨丨丨西京不足㧞禍轉亡胡嵗事成擒胡月胡命其能久皇綱未宜絶杜甫北征詩感聖心神州荆棘欲成林霜露凄凉丨丨丨故老㡬人今好在壺漿爭聽鼓鼙音晦翁聞捷詩親征源流見前事類誓師帝曰惟時有苖弗率汝徂征禹乃㑹羣后丨于丨曰濟濟有衆咸聽朕命書巡師武王乃大丨六丨明誓衆士同上執罪天子將出征類于上帝宜于社造于禰禡于所征之地出征丨有丨反釋尊于學以訊馘告記賞祖用命丨于丨不用命戮于社書甘誓聽誓武王伐殷嗟我友邦冡君越我御士庻士明丨丨同上出征王于丨丨以佐天下詩親御文帝中年發憤遂躬戎服丨丨鞍馬馳射上林講習戰陣前匈奴賛親勒後光武建武三年馮異與赤眉戰于崤底大破之餘衆南面宜陽甲辰丨丨六軍大陳戎馬吳漢精卒當前中軍次之驍騎武衛分陳左右赤眉望震怖遣使乞降君臣面縳奉髙麗璽綏躬屬正觀十九年帝親征遼東丨丨櫜鞬太宗紀自將髙麗莫離支專國太宗丨丨討邊詔曰朕所過營頓毋飭食毋豐恠行在非近州郡不得令學生耆老迎謁四月圍遼東城城潰唐東夷傳一心力禹曰予以爾衆士奉辭罰罪爾尚丨乃丨丨其克有勲書秉旄麾王左杖黄鉞石丨白丨以丨牧誓至潭上漢文躬御六飛親丨丨丨至朔方武帝帥師丨丨丨詳見恢復四字類同上我武維揚丨丨丨丨侵于之疆取彼凶殘殺伐用張書四征弗庭惟周王撫萬邦巡候甸丨丨丨丨綏厥兆民同上不宜深入西征隗囂至漆諸將多以為王師丨丨丨丨隂阻馬援於帝前取米為山谷帝曰虜在吾目中矣馬援傳何憂不克太宗親征髙麗羣臣皆勸帝曰丨丨丨丨耶唐髙麗傳親征太原太祖開寶二年丨丨丨丨韓重贇來朝上謂曰虜知我是行必率衆來援卿可為朕領兵倍道兼行出其不意破之契丹兵果入㓂韓重贇大破其衆急幸澶淵景德中髙瓊奏曰願丨丨丨丨臣等効死冦不難破上意遂决冦衆抵澶淵北直犯大陣李繼隆等整軍成列以禦之分伏勁弩控扼要害其統軍撻覽所將者精鋭躬出督戰威虜軍頭張環守床子弩濳發撻覽中額死敵大挫衂退却上幸北城門樓張黄龍旗諸軍皆呼萬嵗氣勢百倍敵益震駭彈貟之地太祖平淮北惟太原未下趙普曰彼丨丨丨丨何足芥意孤注之謗真宗親征至大名射殺撻覽狄退謗者曰澶淵之役㓂準以陛下為孤注率師親征蠢爾太原獨背朝化潜依敵帳屢結蜀川洎喪劉筠擅立異姓乘我郊禋之際來侵晉絳之民宜順人心恭行天討朕取此月内丨六丨丨丨太祖開寶二年親征河東詔以諫班師太宗伐契丹丨曹翰丨遂丨丨次金臺驛奏捷事類執訊宣王南征也蠢爾蠻荆大邦為讐方叔元老克壯其猷方叔率止丨丨獲醜詩采芑獻俘僖二十八年楚國宋宋告于晉晉戰于城濮楚師敗績晉侯丨楚丨于王秋七月丙申振旅凱以入于晉獻俘飲至大賞左傳獲醜赫赫南仲薄伐西戎執訊丨丨薄言還歸詩奏公薄伐玁狁以丨膚丨注公功也詩六月獻馘矯矯虎臣在泮丨丨詩泮水獻捷凡諸侯而有外攘之功則丨丨于王以警于夷中國則否諸侯不相遺俘左又子産獻陳捷戎服將事日陳知其罪授首於我用敢獻功又齊侯來獻戎捷又齊侯獻楚捷于周驟稱其伐獻功丨丨于社周禮獻俘晉文公丨楚丨于王又獻俘受馘飲至大賞左奏愷王師大獻令丨丨樂周禮䇿勲舎爵丨丨焉禮也又李華戰場文飲至丨丨和樂且閑左下齊燕以子之亂而齊大敗燕燕昭王怨齊使樂毅為上將軍以兵伐齊破之濟西毅攻入臨淄盡取濟西財物祭器輸之燕下齊七十餘城皆為郡縣本傳破荆王剪將兵六十萬攻荆大丨丨軍