body:
  text: 古今合璧事類備要外集卷三十五宋謝維新撰服飾門裘身章舉要裘皮衣亦曰製古者有大裘有黼裘有良裘有功裘而又有褻裘大裘黑羔皮為之示質也黼裘以羔與狐白雜為黼文為之良裘以鳥獸毨毛而為之功裘以狐青麛虎狼犬羊等皮為之大裘天子祭上帝之服也黼裘國君誓獮田之服也良裘用功最善惟王之服也功裘用功微麤卿大夫士之服也然裘之為裘有制度存焉君子狐青裘而豹襃𤣥綃衣而裼之麛裘而青豻襃絞衣而楊之羔裘而豹飾緇衣而楊之麑裘狐裘素衣黃衣而裼之惟君衣狐白裘不襃錦為異錦衣而裼之惟諸侯則用用錦不以為之裼大抵裘之楊也將以見其美也君子於事以見美為敬也故楊庶人犬羊之裘犬羊之裘不裼以其質略而不文飾也故不裼然於禮君在焉則裼不然則否若夫弔焉則襲服之襲覆其美不欲露也喪非所以見美故不盡其飾無事則反是君之右虎裘厥左狼裘亦不聞其裼矣䙝裘私居之服也狐貉皮為之惟取其温故長於它裘惟取其便於作事故短其右􅃑童子不衣為大温也事類大裘司裘掌為丨丨以供王祀天之服良裘仲秋獻丨丨功裘季秋獻丨丨並周禮黼裘惟君有丨丨以誓省記玉藻貍製見前幘注羔袖余狐裘而丨丨矣左傳熊羆是舟人之子丨丨丨裘注言富也詩狐狸為取彼丨丨丨公子裘詩豳風鹿裘堯冬日丨丨史李斯傳鳳裘周昭王以青鳳毛為二裘一燠質二暄䏎以禦寒也拾遺記昭侯獻蔡昭丨為兩佩與兩裘以如楚獻一佩一裘於王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之蔡人固請而獻之乃歸左定三臧紇服丨丨救鄫侵邾敗于狐駘國人誦之曰臧之狐裘敗我於狐駘注臧紇時丨狐裘左襄四年子華衣丨丨使於齊子曰赤之適齊也乗肥馬丨輕裘語雍也貉厚以居孔子狐丨之丨丨丨語十羔不以弔丨裘𤣥冠丨丨丨同上晏子狐裘丨丨一丨丨三十年晏子焉知禮言太儉也季子貂裘蘇秦字丨丨説相季兌兌遺之以墨丨丨秦游秦秦不能用於是丨丨敝史記子思不受子思在衛緼袍無裏田子方遺其狐白之裘子思曰吾聞遺人食物不肯者受之如弃物於溝壑中吾雖無德不敢以身為溝壑遂不受孔叢子秦姬願得秦囚孟嘗君説幸姬來解姬曰丨丨君狐白裘時狐白裘已獻昭王有客能狗盜入秦宮藏内盗得獻之遂得歸通鑑羊裘釣澤嚴光事見前衣服注鸘裘就市司馬相如與文君還成都以所服鷫丨丨丨丨狐裘反衣漢楊興謂史髙曰將軍所舉不過門下賔客富貴而列士不舉是有丨白之丨而丨丨也被鶴氅裘王恭常乗髙輿丨丨丨丨世説焚雉頭裘太醫司馬程據上雉頭裘非常服也上以損費功用於殿丨之晉起居注人莫能測朱桃椎被裘帶索丨丨丨丨其為孔六帖嫂為躬績張志和嘗欲以大布為製裘丨丨丨丨及成衣之雖暑不解塵皆流積武攸緒王公所遺鹿裘丨丨丨丨雨無沾潤敬宗寶歴即年南昌國進浮光裘紫海水染其色也以五綵蹙成龍鳳綴五色真珠上衣之以獵北苑為朝日所照光彩動揺一日從禽忽值暴丨而裘略丨丨丨上異之唐杜雜編賜集翠裘則天皇后丨狄仁傑丨丨丨獻𤣥狐裘西域髙昌太宗即位丨丨丨丨李嚴製裘丨丨為叅軍時丨丨丨服之終身鄭注麤裘丨丨裳衣丨丨並孔六帖止有其一陳無己趙挺之邢和叔皆郭大夫壻陳在館職當侍祠郊丘非重裘不能禦寒氣無己丨丨丨丨其内子為於挺之家假以衣之無己詰其從來内以實告無己曰汝豈不知我不着渠家衣邪既而遂以凍病而死謝克家作其文集序中有云篋無重裘盖指此事朱語錄王褒講德論千金之裘非一狐之腋韓愈原道篇是責冬之裘者曰曷不為葛之之易也柳宗元文集氷雪之交衆裘我絺詩集青草裘披丨丨飾李珍裘粉圖丨丨五雲色曄如晴天散彩虹李酬殷明佐青兕羌兒丨丨裘杜送韋千六弊裘何啻聨百結杜投簡成華諸子詩披翠雲身丨丨丨裘袖拂紫煙去李鳴早歌披紫綺倒丨丨丨裘李翫月金陵日本昻藏身着丨丨裘丨丨出風塵李白送魏萬袍附襖衫褐襴身章撮要袍按説文長􅀈也記玉藻云纊為襧緼為袍注云衣有着之異名緼謂今纊及舊絮純着新綿名曰襧雜用舊絮名曰袍雖着有異名其制度則一至唐服袍者下始加襴緋紫緑皆視其品庶人以白然則今之有襴袍自唐始然襖與褐亦袍也不襴襲又左袵袍因筆以及事類宴居袍者或曰周公抱成王丨丨故施袍逢掖禮記孔子衣丨丨之衣逢掖其袖合而縫大云近今袍也今下至賤吏小史皆通制袍單衣皂綠領袖中衣為朝服云並後輿服志衣緼子曰丨敝丨袍與衣狐貉者立而不恥者其由也歟語無裏孔伋緼袍丨丨孔叢子與同無衣刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉豈曰無衣丨子丨袍詩秦風解賜須賈入秦見范雎曰范叔一寒如此哉丨綈袍以丨之通鑑賜錦袍宋之問獻詩武后奪東方虬錦袍以丨之雞跖集賜銀袍唐永夀中敇丨岳牧金丨字丨雞跖集製金袍狄仁傑轉幽州都督武后賜紫袍以龜帶自丨丨字十二於丨以旌其忠御褐袍見前天子服注安可棄是楊炎自貶道州還家人以綠袍木簡弃之炎止曰吾嶺上一逐吏超登上台可常哉且有非常之福必有非常之禍丨丨丨丨乎唐本傳結今生緣開元中賜邊衣製自宫有軍校袍中得一詩云留意多添線含情更着綿今生已過了重結後生緣持詩白帥帥以聞明皇問之有一宮人自言萬死即以嫁得詩者與汝丨丨丨丨本事詩袍易繡文唐諸衛大將軍中郎以下給丨者皆丨其丨丨千牛衛以瑞牛左右衛以瑞馬驍衛以虎武衛以鷹威衛以豹領軍衛以白澤金吾衛以辟邪袍用赤黃其後紫為三品之服金玉帶銙十三緋為四品之服金帶銙十一淺緋為五品之服金帶銙十深緣為六品之服淺線為七品之服皆銀帶銙九深青為八品之服淺青為九品之服皆錦石帶銙八黄為流外官及庶人之服銅鐵帶銙七既而天子袍衫皆丨丨丨遂禁臣民服並唐新志賜寶雞袍丨安禄山品目有金鸞紫羅緋羅立馬丨丨丨酉陽雜俎著宮錦袍李白浮游四方嘗乗月與崔宗之自采石至金陵丨丨丨丨坐舟中旁若無人本傳覆以妃袍韋綬事見衣服注覆以妃袍安禄山事見前注伊川常服丨丨丨丨璽袍前野服詳宋樸易服國朝惟綠緋紫三等而紫袍者除武臣外文臣之制其别有六庶僚黒角帶佩金魚未至侍從而持賜帶者為荔支五子不佩魚中書舍人諫議待制權侍郎紅鞋黒犀帶佩魚權尚書御史中丞資政端明殿閣學士直學士正侍郎給事中金御仙花帶不佩魚謂之横帶翰林學士以上正尚書御仙帶佩魚謂之重金執政官宰相方團毬文帶俗謂之笏頭是也其叙如此若猛進躐得者則不然紹興中丨丨自侍御史遷中丞施鉅自中書檢正鄭仲熊自右正言並遷權侍郎三人皆受告日丨丨以正謝日拜執政樸以緋仲熊以綠服紫之次日以賜毬文帶盖侍從以下俟正謝乃易帶而執政命纔下即遣中使齎賜遂服之而赴都堂供職可謂捷疾矣容齋隨筆服慘紫袍故事大臣奪情者丨慥光幘丨丨丨皂角帶道君惡之政和末始議以入公門不應變服遂以吉服朝然居家猶喪服也紹興初朱藏一起藏右僕射請所服太常遂援政和近事為請而居第則慘服去佩焉議者不以為是朝野雜記無一綠袍唐憲宗時因數赦官多汎階又帝親郊陪祠者授三品五品不計考使府軍吏以軍功借賜朱紫率十八近臣謝郎官出使多所賜與毎朝㑹朱紫滿庭而少衣緑者品服太濫人不以為貴帝亦惡之詔太子少師鄭餘慶條奏懲革淳熙十六年紹熙五年連有覃霈轉官賜服者衆紹熙元年予自當塗徙㑹稽過闕遇起居舍人莫仲謙於漏舍仲謙云北赴景靈行香見朝士百數丨丨丨丨者又朝議中奉皆直轉行故五品不勝計頗類元和也容齋三筆庾信賦青袍如草襖衲布衣襖宋徐湛之武帝長女㑹稽公主之子也武帝微時貧甚有丨丨丨丨皆敬皇后手自作帝既貴以此衣什公主曰後世有驕奢者以此示之博褐紬襖伊川嘗愛衣皂或丨丨丨丨其袖如常人云云不知今人謂大袖方領何謂祈寛所紀尹公語褐褐寒賤呉中叔儀乞糧於公孫有山氏曰佩玉蘂兮余無所繫之㫖酒一盛兮余與褐之父睨之注丨丨丨之人左哀十三褐寛博北宫黝之養勇也不膚橈不目逃思以一毫挫於人若撻之於市曹不受於丨丨丨亦不受於萬乗之君視刺萬乗之君若刺褐夫又昔者曾子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖丨丨丨吾不惴焉孟公孫丑下許子衣有為神農之言者丨行自宋之滕願受一㕓而為氓其從數十人皆衣褐捆屨織席以為食又丨丨丨褐孟滕文公老父衣張良遊下邳圯上有一丨丨丨褐至良所張良傳衣褐見婁敬丨丨衣褐丨本傳被褐詣王猛事見前野服注為作褐衣王望遷青州刺史州郡大旱望行郡道見饑者祼行草食愍然哀之因以便宜出布粟給其廩糧丨丨丨丨後本傳尚擁褐坐陳季卿事見舟注詳褐衣辭讓陽城事見野服注褐衣如初康節先生事見前青巾褐裘藝祖皇帝事前天子服注襴衫襴袍太尉長孫無忌議服袍者下如丨緋紫綠皆視其品庶人以白唐車服志襴衫士人以棠苧丨丨為上服貴女功之始也一命以黃再命以黑三命以纁四命以綠五命以紫士服短褐庶人以白中書令馬周上議禮無服衫之文三代之制以深衣請加襴袖褾襈為士人上服開骻者名曰􅆙骻衫庶人服之新志奴婢服開元中丨丨丨襴衫而士女衣胡服其後安禄山反當時以為服妖之應唐輿服志詩集紫袍丨丨新袐監白首舊書生鬢雪人間夀腰金世上榮白樂天初授袐監賜金紫綾袍吾年五十加朝㪚爾亦今年賜服章齒髮恰同知命嵗官衘俱是客曹郎榮傳錦帳花聨蕚彩動丨丨鴈趂行大抵著緋宜老大莫嫌秋鬢數莖霜白樂天賀行簡賜章服春草隨丨丨丨青袍汀草亂丨丨丨青袍錦袍鮮江冷丨丨丨錦袍新獸丨奪丨丨並杜映玉羇金袍丨丨丨劉苞明玉帶玉帶丨珠袍李白織女成不知丨丨寒窻下幾度抛梭織得丨唐詩使君贈丨丨寒丨袍杜緋舊賜酒典丨花丨丨袍白緋著了丨袍丨丨好歸田假緋袍丨著丨丨君莫笑笑青袍丨我丨丨故並白樂天草色動恩袍丨丨丨仁廟賜詩金門着不踏丨丨丨戰袍山谷樂府娥剪綠雲姮丨丨就丨丨袍待來步蟾宫與換古詩草爭翠色㸔㸔芳草綠如茵與藍袍丨丨丨丨古詞褐風入松短褐丨丨丨杜深衣身章撮要深衣古者聖人之法服也攷之於經自有虞氏始焉其製用十五升布鍜濯灰治而後為之上衣而下裳盖有制度存焉禮記深衣篇可考也事類五法深衣丨丨已施聖人服之故規矩取其無私繩取其直權衡取其中故先王貴之記深衣三袪深衣丨丨縫齊倍要衽當旁袂可以囘肘長申繼掩尺袷二寸袪尺二寸緣廣寸半記玉藻用白布有虞氏皇而祭深衣而養老疏謂白布衣以質丨丨丨也記玉制加襴袖中書令馬周議見前襴衫隨時色後漢乗輿服深衣制有袍丨五丨丨輿服志依禮記司馬温公丨丨丨作深衣簪幅巾縉帶毎出朝服乗馬用皮匣貯深衣隨其後入獨樂園則衣之嘗康節曰先生亦可衣此乎康節曰某為今人當服今人之服温公歎真言合理聞見錄朱文公深衣制度并圖裁用白細布度用指尺寸中指中節為寸衣全四輻其長過脇下屬於裳用布二幅中屈下垂前後共為四幅如今之直領衫但不裁破腋下其下過脇而屬於裳處約圍七尺二寸毎幅屬裳三幅裳交解十二幅上屬於衣其長及踝用布六幅毎幅裁為一幅一頭廣一頭狹狹頭當廣頭之半以狹頭向上而聮其縫以屬於衣其屬衣處約圍七尺二寸每三幅屬衣一幅其下邊及踝處約圍丈四尺四寸圓袂用布二幅各中屈之如衣之長屬於衣之左右而縫合其下以為袂其本之廣如衣之長而漸丨殺之以至丨口則其徑一尺二寸方領兩襟相掩衽在腹下則兩領之㑹自方曲裾用布一幅如裳之長交解裁之如裳之制但以廣頭向上布邊向外左掩其右交映垂之如燕尾狀又削裁其内旁太半之下令漸如魚腹而末為鳥喙内向綴於裳之右旁黑緣緣用黑繒領表裏各二寸袂口裳邊表裏各一寸半袂口布外别此緣之廣大帶帶用白繒廣四寸夾縫之其長圍腰而結於前再繚之為兩耳乃垂其餘於紳下與裳齊以黑繒飾其紳復以五綵絛廣三分約其相結之處長與紳齊緇冠糊紙為之武髙寸許廣三寸袤四寸上為五梁廣如武之袤而長八寸跨頂前後下著於武屈其兩端各半寸自外向内而黑漆之武之兩旁半寸之上竅以受笄笄用齒骨凡白物幅巾用黑繒六尺許中屈之右邉就屈處為横㡇左邉反屈之自輒左四五寸間鈄縫向左圓曲而不遂循左邉至于兩未復反所縫餘繒使之向裏以輒當額前裏之至兩髻旁各綴一帶廣二寸長二尺自巾外過頂後相結而垂之黑履白絇繶純綦紫衫附涼衫大衣皂衫身章撮要紫衫非公服特小衫也白涼衫國䘏服之皂衫士人家居常服紗帽皂衫束帶無此則不敢出今易以背子而皂衫不之用流俗之失非也大衣者今寛衫為婦人禮服非命婦皆可著附見於此事類軍興又變隨煬帝數出幸因令百官以戎服從一品紫次朱次青皂靴乃馬鞋也後世循襲遂為朝服國朝渡江乃變為白凉衫紹興二十年士人猶是白凉衫至後來丨丨丨丨為紫衫皆戎服也朱語録軍興始衣詳見凉衫註朝見許用壽皇初間得幾時見羣臣皆許只有紫衫後來有人説道太簡後不如此同上􅎭除畢服見後凉衫注涼衫士人許用注見前解頭許用祖宗時元正冬至皆有大朝㑹君臣都着法服諸州丨丨亦預籍溪胡先生在某州為解元亦曽預元正朝㑹著白羅衫青褖有裙有佩並朱語録教大晟樂藉溪云士服著白羅衫青褖有裙有佩紹興間韓勉之知某州於信州㑹様來製士服正如此某後來看祖宗實録乃是丨丨丨丨時士人所服方知出處同上顔色可憎自軍興士大夫始衣紫窄衫上下如一紹興九年八月甲子詔卿長吏毋得以戎服臨民復用冠帶然乞不行秦檜之死魏道弼秉政復舉行之論者以為優士人貧者尤患苦之未幾道弼為臺諫所攻遂罷政事中數事此其一也於是紫衫既廢士大夫皆服凉衫乾道中李獻之為學士為上言㑹聚之丨丨丨丨今陛下上奉兩宫宜服紫衫為便上從之盖自渡江以來人情乆趍簡便不可復故矣朝野雜記終喪乃止孝宗之喪趙子真當國始令羣臣服白凉衫皂帶以治事逺丨丨丨丨論者以為是及光宗之喪禮部侍郎陳宗召復請百官以日易月􅎭除畢服紫衫皂帶以治事從之同上皂衫家居常服前輩無著背子者雖婦人亦無之士大夫家居常服紗帽皂衫束帶無此則不敢出朱語錄大衣婦人可著或問婦人不著背子則何服曰大夫問大衣非命婦亦可著否曰可朱語錄背子附半臂勒帛身章撮要背子本半臂武士服古禮士人只繫勒帛盖有垂紳之意後有勒帛不便於搢笏故稍易背子然須用上襟掖下與背皆垂帶大觀間未之有改近背子又引為長袖與半臂製已不同士人而衣武士服恬不為異流俗使然乎婦人背子本婢妾之服以其行直主母之背故名焉今亦習俗相承為男女辨貴賤之服服制之變一至於此事類御便殿著上丨丨丨丨紗帽背子則國初已有背子朱語錄本婢妾服背子丨丨丨之丨以其行直主母之背故名背子胡行輝雜志半臂今長褎隋大業中内官多服半除即丨之丨丨漢官亦服之今禮服唐髙祖減為半臂内官服者無脊縫丨為丨丨炙轂子勒帛燕見賔客今大父家居及丨丨丨丨率多頂帽而繫勒帛石林燕語汗衫身章撮要汗衫本古之中單以白綾為之青領標襈裙古者燕朝及祭祀接神衮冕有白紗中單有明衣皆汗衫之象至漢祖與項羽交戰汗透中單因改今名然自是以來貴賤皆可服無異義也事類布單衣甯戚叩牛角而歌曰南山矸白石爛生不逢堯與舜禪短丨丨丨適至骭從朝飯牛薄夜半長夜漫漫何時旦紗單衣燕朝衮冕有白紗中單漢王與項籍交戰汗透中單改名汗衫貴賤通服炙轂子縠單衣後漢武冠謂之大冠云云紗丨丨丨皆虎文輿服志白紗中單爵弁者六品以下九品以上從祀之服也以紬為之無旒黑􅈁角簪導青衣纁裳丨丨丨丨青領褾襈裾革帶鉤帶鉤䚢大帶及禆内外皆緇爵鞞白韈赤履五品以上私祭皆服之孔氏帖古今合璧事類備要外集卷三十五
