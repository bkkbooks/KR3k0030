body:
  text: 古今合璧事類備要後集卷四十七宋謝維新撰大宗正門大宗正司歴代㳂革本朝仁宗景祐三年初置續㑹要以皇兄江寜節度使允讓即濮安懿王皇姪彰化軍留後守節同知太宗正事實録時宗室子孫衆多聚居大第故於祖宗後各擇一人知宗正事令叙睦之違則糾其失焉實録英宗治平元年詔宗室之盛數倍於前而宗正司事亦繁多乃増置同知大宗事一員選宗恵為之詔畧曰夫明徳以親九族正家而刑萬邦古先哲王罔不由此朕嗣守丕業率循舊章惟皇屬之敦和命宗臣而董正念其性本於仁厚宜廣學以勤修顧其日益於衆多必増員而統理庶乎協贊其職並修厥官式孚于休以副予意㑹要元豐官制行詔大宗正司不𨽻六曹大宗正以宗室團練使以上有徳望者為之次一人為同知位髙屬尊者為判掌糾合族屬而訓之以徳行道藝受其詞訟而糾正其愆違有罪則先劾以聞法例不能决者同上殿取裁凡宗室服屬逺近之數及其賞罰規式皆總之屬有記室一人掌牋奏講書教授十有二人分位講授兼領小學之事四朝志知大宗正事用太祖太宗之屬近行尊者為之率以官至王相者領焉渡江後頗用南班多不得人無以表率更生刻削宗室皆患之淳熙初宗正官缺趙温叔言崇宣簡公不息之賢自江西運判召為右監門衛大將軍忠州防禦使知大宗正事非常例也朝野雜記事類領宗正李勉都丨丨丨之務鄴侯家𫝊典屬籍司丨丨丨克有令名東坡除宗晟制賜鞍馬皇祐三年以允讓知大宗正事守節同知大宗正事仍丨襲衣金帶丨丨時宗室子孫衆多方聚居於大第故於祖宗後各擇一人令敦睦之違失則糾正焉凡宗室奏陳先委詳酌而後聞仁宗實録賜甲第仲忽入判大宗正事徽宗丨之丨丨建賢懋功之閣以示寵仲忽鯁亮端毅動循禮法立宗司法式四朝國史定讀書式治平元年判大宗正事允弼言詳丨到皇親丨丨等賞罰規丨詔依所定次第施行四朝國史掌教法令大宗正丨宗室之丨丨教丨以行藝訓導而敦睦之受其辨訴之事而糾其失仁宗正史職官志位髙屬文見㳂革屬近行尊知大宗正事仁宗始置用太祖太宗之後丨丨丨丨者各一人於是者命濮安懿王為之自是率以近官至王相者領焉朝野雜記徳及皇族元豐七年以宗景知大宗正事先是宗景父允弼司宗久故神宗復選而用之使諭其母先正久司宗正丨丨丨丨令命而子繼之四朝國史宗景傳言天下事淳熙初宗正官缺趙温叔言崇宣簡公不息之賢自江西轉運判官召為右監門衛大將軍忠州防禦使知大宗正事非常制也不息字仁仲中進士第所至有聲積官昭慶軍承宣使在宗司數丨丨丨丨上甚重之朝野雜記董正宗籍吕正獻賜允弼詔丨丨丨丨董司宗諜文㳟賜允弼詔丨丨丨丨長治公族賜同知宗正仲爰不允詔曰朕既得宗室老成屬之丨丨丨丨又擢爾之賢使為之貳曲阜集司我本支惟時賢亮丨丨丨丨胡文㳟行宗懿制宗臣董正見㳂革九宗治正資六徳之夙成賴丨丨之丨丨胡文㳟允弼制整訓族屬丨丨丨丨次第昭穆杜牧之行李文舉制統于大宗惟我公族丨丨丨丨崇叙訓齊創宏規於文祖錢總除宗晟制董我宗秩選諸近屬之尊董我大宗之秩曽子宣除宗晟制宗丞歴代沿革神宗熙寧三年置丞三員以異姓朝臣充都官員外郎張稚圭知丞事光禄寺丞李徳初同知丞事神宗疑用異姓王安石言前代宗正固有用庶姓時乃録春秋時公族大夫事神宗曰此雖無前代故事行之何害安石曰聖人創法不必盡循前代所已行者於是召稚圭對而命之四朝志元豐五年詔太宗正丞中書省奏差以文臣京朝官知事類不能屈田畫字承君人物雄偉議論慷慨俱有前輩之風入為大宗正丞宰相曽布欲收置門下丨丨丨言行録無所詘曽恬少事楊時謝良佐陳瓘得存心養性之學及為大宗正丞秦檜専政士求媚以取要官恬自守丨丨丨中興係年録晉丞瑶籍丨丨丨丨慶元制贊治公姓丨丨丨丨人無間言曲阜集知大宗正丞崔公度制條上五事知太宗正丞謝伋丨丨宗室丨丨曰舉賢才以强本支更法制以除煩苛擇官師以專訓導繼封爵以謹𫝊襲修圖牒以辨親疎詔内外從官各舉宗室一人中興係年録議襲封食謝伋始立法嚴學官久闕襲封之典遂廢宗正有寺無官故伋言之時用伋丨惟丨丨丨知西南二外宗正歴代㳂革本朝崇寧元年蔡京申請宗室既許分居兩京輔郡乞於兩京置外宗正司擇宗室賢者管幹逐處一人仍於本州通判職官内選二人經理丞簿凡外任宗室事下于州縣者外宗正受理大觀三年罷政和二年復置中興南渡後南外置司泉州西外置司福州丞係倅兼簿係僉判兼紹興府亦有宗正司乾道七年省紹興府宗司𨽻行在中興會要孝宗㑹要事類考實政和三年知西外宗正事士暕奏廢兩京睦宗院宗子有文藝行實衆所共知者許宗正丨丨以聞續㑹要糾正爰俾訓齊往分丨丨慶元制年一商議紹興二年六年七月知西外宗正事士衎言西南兩外宗司相去不逺鈐束訓導事體一同有未便者理有商議望許兩京宗官毎丨丨次往來丨丨職事從之中興㑹要雙隻日送隆興元年刑部言大宗正司奏犯罪宗子丨日送西外丨丨丨南外本部看詳欲依所乞從之同上睦宗院歴代㳂革本朝崇寧元年宰臣蔡京請宗室非袒免親以下兩世欲分於西京南京近輔或沿流便郡居止每處置敦宗院差文武臣各一員管幹續㑹要中興南渡南外居泉州西外居福州光宗即位改為睦親院事類睦宗崇寧五年詔近置敦宗院所以親丨丨族愛養幼孤置院大觀詔曰比丨丨于别都並國史二外宗教厯代沿革前漢元始五年於郡國置宗師以糾皇室親族世氏致教訓焉選有徳義者為之有寃失職者宗師得因郵亭上書西漢紀唐武徳三年詔天下毎州置宗師一人以相統攝類㑹本朝國初闕崇寧初蔡京申請置外宗外有敦宗院乂云今置學立師為量試之法大觀元年南外敦宗院大學教授張戣以宗子釋褐教養有方特轉一官是時距置敦宗院才五年意宗教必置於崇寧之初大觀三年罷詔曰北置院于别都増學於官鄉廩其無禄而教養其未命者累年于兹宗子之在别都或輕犯法吏弗能禁民以為師儒之官殆相陪蓗而就學者寡官冗而事繁宜有裁適應兩京登宗院并官吏並罷政和二年復置宣和三年増置西南外敦宗院教授各一員時乂有博士正録中興後置宗教事類政和詔立格由教丨丨詔曰宗族蕃衍丨有司庠序分食兩京為丨廩稍之丨丨之丨朕心庶幾焉秦檜察公不附巳陳正獻公俊卿舉進士第二授泉州察推秩蒲故事當入閣學丨丨丨丨丨丨丨以為南外睦宗院教授楊誠齋集古今合璧事類備要後集卷四十七
