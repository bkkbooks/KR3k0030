body:
  text: 古今合璧事類備要外集卷四十七宋謝維新撰鹽醯門鹽食品須知鹽鹹味水潤下所作也然有二類或引池而化或煑海煑井及煮鹻而成引池而化者周官所謂監鹽也今謂之顆鹽煮海與井與鹻而成者周官所謂散鹽也今謂之末鹽夫所謂引池為鹽者曰陜西解州解與安邑兩池墾地為畦引水沃之水耗而鹽即成籍民給役謂之畦戸煮海為鹽者曰京東河北淮南兩浙福建廣南凡六路其煮鹽之地曰亭場民曰亭戶或謂之竈戶户有鹽丁嵗課入官受錢或折租􅑝兩浙又役軍士煮焉煮井則川陜四路大為監小為井監則置官井則募士民或役衙前主之煮鹻則河東并州永利監凡課鹽末鹽皆以五斤為斗其他胡中鹽出於木或出於石而夏鹽出於池然其色又有不同者或青或白或紅或紫或黒不可以不辨其味味有不同者或甜或苦不可以不别其狀乂有不能不異者或􅆈波或結沙不可以不察其方言又有不能以强同者東方謂之斥西方謂之鹵河内謂之鹹尤不可以不之知然皆食肴之將也其可闕諸事類苦鹽丨丨不煉治之鹽祭祀用之散鹽丨丨煉治之飴鹽王者膳羞供丨丨鹽之甜者今戎鹽有之鬻鹽凡齋事供丨丨練治者厥貢鹽禹貢丨丨丨絺書爾惟鹽說命若作和羮丨丨丨梅虎形鹽王使周公閲來聘享有昌歜白黒形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其徳薦五味羞嘉穀鹽丨丨以獻其功吾何以饗之驥駕鹽騏丨丨丨車上虞阪遇伯樂而長鳴齊糶鹽丨桓公問何以為國管子曰惟官山海可耳海王之國謹正鹽筴十口之家十人食丨百口之家百人食丨公乃使丨之得成金萬觔管子海王論吳煮鹽漢丨王濞東丨海水為丨本傳官與牢盆漢武帝財用匱竭孔僅咸陽言山海天地之藏願募民因官器作鬻鹽丨丨丨丨注牢盆者廪食也古名廪為丨丨煮鹽丨也前食貨志條上新法盧𢎞正初兩池鹽法弊費不相償𢎞正使判官司空輿檢鈎釐正丨丨丨丨即表為兩池使自是顆入嵗倍用度賴之同上道陵所開陵州井乃東漢張丨丨丨丨曰狼毒井有毒龍藏井中及鹽神玉女十二為祟陵乃以道力驅出毒龍禁玉女於井下然後人獲鹹泉之利郡志玉女為祟見上文鹽味少生晉符朗元達識味㑹稽王道子設食食之極闕左精饌食訖問曰闗内食孰若此朗曰比丨丨丨丨即問宰夫果如其言鹽如何去齊崔慰祖䘮父不食丨母曰汝既無兄弟又未有子毁不㓕性故當不進肴羞耳丨丨丨丨吾今亦不食矣慰祖不得已從之置飛雪將杜中立以䕃為義武節度使舊傜車三千乘嵗闕具舟闕民苦之中立丨丨丨丨數百人置寳應池韓滉判度支方是時潦敗河中鹽滉奏地産瑞鹽帝疑遣諌議大夫滉還乃賀之且闕丨丨靈慶丨鹽如氷精白鹽崖有丨丨丨丨名為君王鹽酉陽雜俎鹽如張傘朐䏰縣鹽井有丨方寸中央隆起丨丨丨名曰傘子丨同上酸水如闕者輒死隂氣襲人入候雨入井則隨雨施工㸃設於井木盤滿中貯水底鑿小竅終日不絶鹹泉如瀑大寜之井丨丨出於山竇有丨飛丨民間分而所開中州蒲江縣乃祥符中民丨丨丨丨自慶歴皇祐以來始創筒井用圜刀鑿井數十丈以巨竹大節牝牡相銜為井以隔横入淡底而竅其竹之差小者出入井水為桶無又以出入水中氣自呼吸而啓閉之一筒致水數斗闕械利之所在人既不知漢書有水韝法惟蜀中治鐡用之大略似鹽井取水筒太子賢不識妄以意解非也東坡志林張融海賦漉沙結白􅆈波出素積雪中春飛霜暑路柳宗元晉問柳先生曰猗氏之鹽晉寳之大也人之賴之與榖同化若神造非人力之功也但至其所則見溝塍畦畹之交錯輪囷若稼若圃敞兮均均渙兮鱗鱗邐瀰紛屬不知其垠俄然决源釀流交灌互澍若枝若股委屈延布脉冩膏浸潗濕滑汨彌髙掩􅋻漫壠冒塊决决没没逺近混㑹抵值隄防瀴瀛霈濊偃然成淵漭馬成川觀之者徒見浩浩之水而莫知其所以及神液隂漉甘鹵宻起孕靈富媪不愛其美無聲無形熛結迅詭廻眸一瞬積雪百里皛皛幕析奮僨離析鍜圭椎璧眩轉的皪乍似隕星及地眀㓕相射冰裂雹碎巃嵸増益大者印亘纍小者珠剖湧者如坻㘭者如浮日晶熠煜螢駭電走歩盈車方尺數斗於是裒歛合集舉而堆之皓皓乎懸圃之巍巍皦乎溔乎狂山太白之淋漓駭變化之神竒卒不可推也然後驢羸牛馬之運西出秦壠南過樊鄧北極燕代東逾周宋家獲作鹹之利人被六氣之用和鈞兵食以征以貢其賚天下也與海分功可謂有濟矣若是如何吳子曰魏絳之言曰近寳則公室乃貧豈謂是耶雖然此可以為利民矣而未為民利也先生曰願聞民利吳子曰安其常而得其所欲服其教而便於已百貨通行而不知所自來老幼親戚相保而無徳之者不苦兵刑不疾賦力所謂民利民自利者是也詩集鹽商婦丨丨丨多金帛不事田農與蠶績南北東西不失家風水為鄉船作宅本是楊州小家女嫁得江西大商客緑鬟一去金釵多皓􅔉肥來銀釧窄前呼蒼頭後叱婢問爾因何得如此婿作鹽商十五年不屬州縣屬天子每年鹽課納官時少入官家多入私官家利薄私家厚鹽鐡尚書逺不知何况江頭魚米賤紅鱠黄橙香稻飯飽食濃粧倚柂樓兩朶紅腮花欲綻丨丨丨有幸嫁鹽商終朝美飲食終嵗好衣裳好衣美食有來處亦須慚媿桑𢎞羊桑𢎞羊死已久非獨漢朝今亦有白居易醯食品須知醯酸味亦曰醋釀米糟為之也食品中用之所以殺腥肉及其氣亦所以釀菜而柔之者也以濟百味事類實諸醯肉腥細者為膾大者為軒去聲或者麋鹿魚為菹麕為辟雞野豕為軒兎為宛脾切葱若薤丨丨丨以柔之記内則和用醯膾春用葱秋用芥豚春用韭秋用蓼脂用葱骨用薤三牲用藙丨丨丨調以醯炮取豚若將之丨刲之刳之云云丨丨醢食以醯清取牛肉必新殺者薄切之必絶其理湛諸美酒期朝而丨之丨醢丨醷並同上供醯物醯人女醯掌丨五虀七葅凡丨醬之丨王后則丨虀葅丨丨六十甕供及世子之醬醯若醯雞莊子詳見蟲門若和羮王曰來汝說云云丨作丨丨爾惟鹽梅云鹽鹹梅醋羮須鹹醋以和之書乞諸鄰子曰孰謂微生髙直或乞醯焉丨丨其丨而與之語王母仙藥西丨丨謂帝曰丨丨有風林鳴酸漢武内傳官販苦酒中書監劉放曰丨丨丨丨與百姓争錐刀之末請停苦酒注醋也魏名臣傳飲醯衉血任迪簡李景畧表佐其軍嘗宴客而行酒者誤進醯景略用法嚴迪簡不忍其死丨為釂辭以它辭請易之歸衉血不以聞軍中悅其長者注醯于鼻來俊臣鞠囚不問輕重皆丨丨丨丨唐風貴重丨世丨俗丨丨桃花酸晉公遺語聖善常貯唐舊說丨丨寺閤丨丨數十甕恐為蛟龍所伏致雷國史補桞宗元與李睦州書醯敖倉之粟以為酸沈亞之上李諌議書真偽難鬻梅醯之質類而不為也又醯醢之具必越海逾陸而趍君之指矣詩集食常苦丨梅丨丨酸古詩斟不調貪食以忘軀丨丨丨鹽醯韓醢附醬食品須知醢肉醬雜骨者曰臡音促事類夏后享見龍門女奴曉醢人職女醯二十人注謂丨丨丨醢者醢千瓿通邑大都丨醬丨丨比千乗之家史記醢百罋晉襄公葬其夫人醯丨丨丨醢長萬宋人丨南宫丨丨左醢子路孔子哭子路於中庭既而問使者曰丨之矣遂命覆醢禮醢彭越徃年丨丨丨前陳狶傳掌醢署丨丨丨令一人丞二人丨供丨醯之物一曰鹿醢二曰兎醢三曰羊醢四曰魚醢百官志醬膳夫掌丨丨丨王饋食醬百有十二罋禮天子執食三老五更丨丨丨醬而饋孔子食丨丨不得其醬不丨語張氏賣丨丨丨醬而踰侈貨殖傳食蒟醬武帝使唐䝉使南越南越丨丨丨如桑椹取實為醬致魚醬晉武帝與山濤書兼丨丨丨一斗榆莢醬丨丨丨曰􅀈通白虎芍藥醬丨丨之丨枚乘七發玉津金醬西王母謂帝曰神藥上有連珠之醤丨丨丨丨中有元靈之醬漢武内傳沉香油醬十二香醬以丨丨等丨煎成服之神仙食經太𤣥覆瓿揚雄作丨丨經劉歆見之曰今學有禄利尚不能易又如太𤣥吾恐後人丨醬丨注瓿小罌也音部進鹿尾醬禄山丨丨丨丨禄山事跡重葫蘆醬唐世風俗貴丨丨丨丨晉公遺語梁劉孝儀謝蝦醬啟龍醤𫝊甘退誠可陋虹醢稱遺追覺失言詩集姦臣競丨丨丨沮醢杜北征古今合璧事類備要外集卷四十七
