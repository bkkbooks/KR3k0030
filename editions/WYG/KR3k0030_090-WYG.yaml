器涵閎逺德藴純深講仁義之淵源極天水之精祲備言語侍從之列承清間顧問之榮時望蔚然輿談久屬果被上心之東進司書命之嚴惟帝制之烜明必訓辭之深厚金相玉振焕三代之文章雷動風行警四方之耳目遂歸鴻筆増重本朝顧惟襄病之餘敢辱眷勤之貺遽先惠問益認撝謙感服欣愉敷陳罔既詩集紫薇絲綸閣下文章靜鐘鼓樓中刻漏長獨坐黄昏誰是伴紫薇花對丨丨郎白居易又西掖重雲闗禁署北山踈雨㸃朝衣千門栁色連青𤨏三殿花香入紫薇岑參西省即事紅藥紫薇肅陰隂彤庭赫𢎞敝風動萬年枝日華承露掌玲瓏結綺綫深沉映朱網丨丨當堦翻蒼苔依砌上兹言翔鳯池鳴佩多清響選謝元直中書省又紫泥初熟詔書成紅葉翻堦畫影清屋瓦生煙宫漏永時聞幽鳥自呼名古詩薇省西掖深沉大帝居紫丨西丨掌文書天閽啓鑰趨朝後侍史焚香起草初古詩上李舎人松䆫緑丨丨對鳯池開履跡衣香遍上台天意皆從紫毫出宸心盡向紫烟來非時玉案呈宣㫖每日金堦謝賜回蜀王建詩西省今年寒食夜丨丨鳯池頭誠知視草貴未免對花愁白居易中書連直西垣東壁圖書府丨丨翰墨林張説白玉堂上君丨丨丨注謂中書也杜甫贈張九齡青𤨏闥巢君緑梧樹舞君丨丨丨或言鳯池環禁林仙閣霧沉坐深沉璇題激流日珠㻜綿清陰郁穆帝言重熒煌台鳯張丹戺翮月弄紫庭音徐彦伯贈舎人古意又西掖謁所知赤墀髙閣自從容玉女䆫扉報曙鐘日麗九門青𤨏闥雨晴雙闕翠㣲峯毫端蕙露滋仙草琴上薰風入禁松荀令鳳池春婉娔好將餘潤變魚龍温庭筠紫宸裏躍鱗龍鳯池揮毫丨丨丨申伯王中書郎丹禁靜清切丨丨丨浩蕩文河注上官儀酬薛舎人詩鳳凰池獨有丨丨丨上客陽春一曲和應難岑參和賈舎人彩筆批詔太㣲西掖鳳池邊西閣凌空為起煙丨丨時丨尺一丨直廬深在九重天古詩柬同舎人分班曉入鸞翔閣直閣旁連浴鳯池彩筆閑批五色詔好風時動萬年枝古詩和宗人見賀彩筆代言拜命大西垣偏承聖主恩黄扉陪漢制丨丨丨堯丨古詩和李舎人煙携滿袖朝罷香丨丨丨丨詩成珠玉在揮毫欲知世掌絲綸美池上于今有鳳毛杜甫和賈舎人詩氷破滿渠墻下春渠入禁溝渠丨初丨丨丨浮鳯池近日長先暖流到池邊更不流韓退之寄第三閣老兼呈白馮二閣老聨飛仙掖丨丨丨丨舊心明古詩與渠大束對草帝綸夜開金鑰詔詞臣丨御抽毫丨丨丨湏信朝家重儒術一時同榜用三人王荆公題中書院壁學問文章討論潤色今為美丨丨丨丨老更醇同上上西垣舎人一宫要稱三字丨丨早丨丨丨丨注三字謂知制誥陳后山又摛毫終要居三字出郡終湏借一麾王禹偁一時同榜三人見前注古今合璧事類備要後集卷二十一
