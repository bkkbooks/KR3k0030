body:
  text: 古今合璧事類備要後集卷二十一宋謝維新撰給舎門中書舎人歴代㳂革漢尚書郎直宿建禮門奏事明光殿下筆為詔誥出語為誥令乃令中書舎人也通典注魏置中書通事舎人東晉省以中書侍郎一人直西省即侍郎兼其職而掌其詔命宋初復置通事舎人四貟入直閣内出宣詔命凡有陳奏皆舎人特入參决於中自是中書侍郎之任輕矣齊永平初中書通舎人四貟各住一省時謂之四户權傾天下與給事中為一流梁用人殊簡以才能不限資地多以佗官兼領後除通事字直曰中書舎人自是詔誥之任舎人専之魏晉已來詔誥皆中書令及中書侍郎掌之後魏有舎人省後周小史上士二人隋内史舎人八貟煬帝减四人後改為内書舎人唐武德三年改中書舎人置六貟自永淳以來天下文章道德臺閣髦彦無不以文章逹故中書舎人為文士之極任朝廷之盛選諸官莫比焉通典中書舎人掌侍進奏議表章凡詔㫖制整璽書冊命皆起草進畫既下則署行百司奏議文武考課皆預裁焉以一人知制誥顓進畫給食于政事堂其餘分署制敕以六省分押尚書六曹又云分押六司佐宰相判按同署職林龍朔改西臺舎人光宅改鳯閣舎人開元紫㣲舎人又曰紫㣲省唐會要國朝中書舎人為所遷官實不書任職復置知制誥及直舎人院故事入西閣皆中召試制誥三篇惟梁周翰不召試而授焉其後薛映梁鼎楊億陳堯佐歐陽修亦如此例按長編薛映梁鼎皆召試翌日與億並命會要誤也元豐五年曽鞏陸佃並試中書舎人自是始正官名續㑹要遂以中書舎人判後省之事分案五曰上案掌冊禮及朝㑹所行事曰下案掌受付文書曰制誥案堂書記制詞及試吏校其功過曰諫官案掌受諸司闗報文書曰記注案掌録記注其雜務則隨所分案掌之元祐初以蘇軾直舎人院有司言自宫制行舎人院廢今為中書後省於是改為權中書舎人遂為故事後詔舎人各簽諸房文字其命詞則輪日分草續㑹要中興置中書後省以中書舎人為長官六員常除二貟一貟領吏房乃兵工房一貟領吏房右選及禮刑房中興會要嘉㤗四年李季章壁以宗正少卿權中書舎人而中字犯祖諱李章辭有㫖權以直舎人院繫銜乃受命不知舎人院廢已久矣盖大臣失於討論也朝野雜記事類雞木魏晉世語曰劉放孫賀共典樞要夏侯献曹肇心内不平殿中有丨棲丨二人相謂此亦久矣其能復幾指謂中書監劉放中書令孫賀初學記鳳池晉荀朂自中書監為尚書令人賀之乃發恚曰奪我丨凰丨何賀之有本傳忠謹晉劉超遷中書舎人時臺省創建内外多事超出納書命以丨丨稱本傳廉靜南齊傅昭為中書通事舎人時居此職者皆權傾天下獨昭丨丨無所干預器服率陋明帝聞之賜漆合燭盤勑曰卿有占風故賜以古物南史文敏前蜀庾楷進中書舎人時署百司誥命填委皆有典則人服其敏分紀文速梁裴子野掌詔誥或問其為丨丨者子野荅曰人皆成於手我獨成於心職林瑞栁中書省有栁樹中枯死興元車駕還京其樹再生人謂之丨丨舎人院誌焚草高郢為中書舎人九年家無制草或問之曰前輩皆有制集公獨焚之何也荅曰王言不可存於私室林閤老唐楊綰為中書舎人故事舎人年久者為丨丨其公廨雜料獨取五之四至綰悉均給之本傳清官南詔謂詞臣曰丨平丨南越志三才唐魏收兼中舎與温子升邢子才齊譽世稱丨丨魏收傳四俊張嘉賔為中書令薦中書苗延嗣吕太工等四人皆位清要日與議政事時號令君丨丨張嘉正傳四禁唐故事漏泄稽緩違失妄誤謂之丨丨分紀七制唐制故事王言之制有丨冊書丨書慰勞制書發日勑勑牒勑㫖論事勑書晏公類要蘇賈賈曾開元初拜中舎與蘇晋同掌制誥皆以文辭稱出本傳常楊楊炎為中書舎人與常衮並掌綸誥衮長於除書傳炎善於德音自開元以來詔誥之美時稱丨丨本大手筆唐李嶠朝廷每有丨丨丨令嶠為之聀林宿老文唐李嶠字巨山為鳯閣舎人立冊大號令多主為之嶠富才思然其仕前與王勃楊盈川接中與崔融蘇味道齊名晚諸人没而為文章宿老一時學者取法焉本傳舎人様徐堅聖歴中楊再思王方慶為東都留守引堅為判官表奏專委之方慶甞稱曰掌綸誥之選也再思曰此鳳閣丨丨丨聀林學者法見前宿老文注上五事高馮為中書舎人列丨丨丨唐本傳發十難唐韋處厚穆宗時為中書舎人時張平叔以便侫進欲糶塩處厚丨丨丨以詰之帝乃知害民平叔始踈斥本傳海内共推虞世南拜内史舎人栁顧博學罕所推許至是與世基相見嘆曰丨丨當丨丨此一人唐本傳同僚共推鄭畋薦中書舎人咸通十年討徐方書詔旁午畋洒翰泉湧動無滯思同僚閣筆推之本傳又陸扆拜中書舎人扆文思敏速初無思慮揮翰如飛文理俱惬丨丨丨丨其能出本傳為代言最唐孫逖典詔誥丨丨丨丨而逖尤精宻張九齡視其草欲易一字卒不能也聀林有應猝長常衮文采瞻蔚長於應猝譽重一時唐本傳冊奏之工顔師古迁中舎專掌機宻時軍國多務凡制誥皆成其手丨丨丨丨時無及者本傳誥命之授岑文本善職而敏速成䇿令叢遽勑吏六七人泚筆丨丨丨丨咸無遺意職林執筆分占王勃長授中為鳳閣舎人壽春等五王出閣有司具儀忘載冊文勃召五吏丨丨丨其辭粲然本傳獨成於心見文速注皆成其手見册奏之工注一代詞宗唐吏部郎中張九齡丨丨丨丨為中書令引韋陟為中書共梁渉對掌文誥時人以為美談聀官分紀一朝大手武德及開元中有顔侍陳叔逹蘇頲云大手筆掌書王命故一朝言語焕成文章唐大詔令一人辦事孫處約為中書舎人累年中令杜正倫奏請更授一舎人與處約同知制誥高宗曰處約丨丨足丨我丨何須多也唐會要兩省獨直權徳輿字載之為起居舎人歳中兼知制誥進中書舎人獨直兩省數日一還舎乃上言左右掖垣承天子誥命奉行詳覆各有攸司舊制分曹十貟以相防檢大抵事有所壅則吏得為非四方聞者或以朝廷為之士要重之司不宜乆廢帝曰非不知卿之勞但擇如卿者未得其人耳本傳五花判事唐故事中省有軍國政事則中書舎人各執所見雜署其名謂之丨丨丨丨中選一人明練事者知機宻謂之解事舎人通鑑六押分司李泌曰給舎分司押事故舎人謂之六押李泌傳著三足記唐盧景亮甞謂人君足食足兵而又得士天下可為也乃自軒轅以來至唐掇治道之要丨書丨丨丨職林撰五經訓徐邈在西省丨正丨丨音丨學者宗之本傳出寶圖賦崔融為文華婉當時未有軰者朝廷大手筆多勑妄之其洛丨丨丨丨尤工唐書上清暑賦崔仁師太宗時幸翠㣲宫丨丨丨丨以諷帝賜帛五十叚唐職林唐陣雄帥唐蘇頲工文辭張九齡甞覽頲文卷謂同列曰蘇生之俊瞻無敵真丨丨之丨丨也蘇頲傳文場元帥張九齡號詞人之冠又號丨丨丨丨本傳文士極任唐自永淳以來天下文章道盛臺閣髦彦無不以文章逹故中書舎人為丨丨之丨丨朝廷之盛選諸官莫比焉通典人物精鑒裴垍為中舎李吉甫執政以情謂垍曰比日丨丨吾懵不及知丨丨為我言之垍即䟽三十許人吉甫薦于朝裴垍傳文思温雅唐王仲舒自職方郎中知制誥丨丨丨丨制誥所出人皆傳寫職官分紀文詞贍給唐徐浩肅宗時拜中書舎人時天下事殷詔令多出於浩浩屬詞膽給文工楷隸肅宗悦其能加兼尚書右丞元宗傳位誥冊皆浩為之參掌兩宫文翰寵遇莫比職官分紀文有古風王仲舒穆宗立每言仲舒之丨可喜最宜為誥丨丨丨召為舎人既至視同列率新進少年居不樂曰豈可復治筆硯於其間哉行状論準古誼齊澣字洗心開元初姚崇為相用為給事中中書舎人丨駁及誥詔皆援丨丨丨朝廷大政必咨之時號解事舎人本傳出納書命見前忠謹注潤色訓誥唐順宗除裴度中書舎人制曰度以茂學懿文丨丨丨丨體要典麗甚得其宜施之四方朕命惟允况中立不倚道直氣平介然風規有光近侍臺官滿歳班列當遷綸閣之職所宜其授唐大詔令掌書王命見前一朝大命注封還詞頭長慶元年中書舎人白居易奏獨孤朗岳州刺史温造朗州刺史李豐澧州刺史王鎰郢州刺史令臣撰詞四人出官詞頭臣以封訖未敢撰進伏待勑㫖穆宗實録屢獻讜言蘇晉先天中為中舎丨丨丨丨天子嘉允本傳當納諫諍唐桞公權為中書舎人充翰林書詔學士文宗便殿語及漢文恭儉帝舉袂曰此澣濯者三矣公權曰人主丨進賢退不肖丨丨丨明賞罰以澣濯之衣乃小節爾文宗謂之曰極知舎人不合作諫議以卿言事有諍臣紀風采也翌日降制以為諫議大夫知制誥學士如故分敷奏機辯馬周字賔王為中書舎人善丨丨丨丨明鋭動中事㑹丨丨丨丨時譽歸之岑文本曰吾見周論事多矣一字不可加一言不可减唐本傳居官鯁正宋璟為中書舎人丨丨丨丨本傳草詔賜錦封敖為學士拜中書舎人文思敏速武宗深重之甞丨陣傷邉將丨警句云傷居爾體痛在朕躬帝覽而善之丨之宫丨分紀納言賜錦髙鉞為中書舎人入見帝因勸躬親以示憂勤帝丨其丨丨丨綵同上特報藥石唐太宗時中舎人季輔上封事丨丨鍾乳一劑曰卿進丨丨之言故以藥石報之本傳除賜金紫吐突承璀於軍中立聖政碑李絳以為不可許憲宗初甚怒絳語不已上卒大開悟故除絳中書舎人翌日又面賜絳紫衣金魚上親為綘擇良笏勉之曰爾時無易此心續通典賜以古物見前亷靜注不納私財唐敬宗初登極路隋拜中書舍人翰林學士仍賜金有金帛謝除制者叱而却之曰吾以公事接私財耶終無所納分紀訪逮政事崔琳明政事開元中與髙仲舒同為中書舎人侍中宋璟親禮之每所訪逮甞曰古事問仲舒今事問琳本傳咨訪政事故事政事中書堂有門盖宰相時適中書舎人院丨丨丨丨以自廣也及常衮相塞絶其門以示尊大不相徃來續通典一家書命楊嗣復除中舎制貞元中汝父為中書舎人甚稱厥職今使汝繼書吾命成一家言堂搆國華在於此舉唐大詔令三世居職孫簡知制誥進中書舎人初逖掌誥至代宗時族祖宿又居職逮簡凡三世通典三世掌制唐李德林李百藥李安期丨丨丨丨誥職林三世掌書唐張嘉正武后時進中書舎人崔湜輕之後與議事正出其上湜驚曰此終其坐後十年而為中書令子延賞延賞子𢎞靖丨丨丨丨命又唐徐堅祖孝徳父齊聃及堅三世為中書舎人皇朝衣冠無此為比又徐嶠父子自祖及孫三世為中書舎人又王徽字昭文曽祖檡從昆弟四人至鳳閣舎人者三人故號三世舎人集賢紀注父子同在蘇廷碩為中書舎人時父瓌同中書門下三品丨丨丨丨禁筦朝廷榮之元宗平内難書詔填委獨廷碩在太極後閤口所占授功状百緒輕重無差書史白曰丐公徐之不然手脱腕矣李嶠曰舎人思若湧泉本傳父子繼美唐賈至天寶末為中書舎人肅公即位於靈武上皇遣至為傳位冊文上皇覽之嘆曰昔先帝遜位於朕冊文則卿之先父所為今朕以神器大寶付儲君卿又當演誥累朝盛典出卿丨丨之手可謂丨丨矣聀林叔姪對掌封氏自太和世居兩制舜卿從子德昭時為翰林舜卿時為中舎丨丨丨丨誥命當時以為榮封敖傳兄弟相代韋思謙二子承慶嗣立承慶解鳳閣舎人武后謂嗣立曰爾父甞稱二子忠孝今使卿丨丨自丨丨即拜鳯閣舎人唐本傳又南漢趙光裔以膳部郎中知制誥時兄光逢為翰林學士兄弟對掌内外制時論榮之九國志西掖八年唐權德輿四歳能為詩後為中書舎人居丨丨丨丨間獨掌者數歳職官分紀中書元年見前焚草注鳳閣舎人唐光宅中改為丨丨丨丨分紀紫㣲舎人開元中改為丨丨丨丨又曰丨丨省同上斵䆫舎