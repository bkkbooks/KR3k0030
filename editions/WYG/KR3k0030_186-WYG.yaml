body:
  text: 古今合璧事類備要續集卷三十六宋謝維新撰性行門奢侈事理發揮奢侈惡之大也竭百年之蓄而供一日之費罄千金之資而奉一笑之樂溝壑其欲泥沙其用彼何為者耶貴不與富期而富自至富不與粱肉期而粱肉至粱肉不與奢侈期而奢侈至奢侈不與死亡期而死亡至彼何為者耶傾宮鹿臺蠟薪步障小者殺身大者亡國永鑒兹哉事類大惡侈惡之大也先君有儉徳而納諸丨丨無乃不可乎左莊十四侵欲丨丨崇侈不可盈厭左文十八所自邪驕奢淫佚丨丨丨也四者之來寵祿過也左隱三年則不遜奢丨丨丨語鏤簋朱紘管仲丨丨丨丨記山節藻梲臧文仲丨丨丨丨何如其知也塞門反坫邦君樹丨丨管氏亦樹塞門邦君為兩君之好有丨丨管氏亦有反坫管氏而知禮孰不知禮語舞佾歌雍孔子謂季氏八佾舞於庭是可忍也孰不可忍也三家者以雍徹子曰相維辟公天子穆穆奚取于三家之堂同上視肉如藿陛下多賜董賢使奴從賔客漿酒藿肉蒼頭盧兒皆用致富非天意也注視酒如漿丨丨丨豆丨漢鮑宣疏以金為丸韓嫣好彈丨丨丨丨一日所失者十餘長安為之語苦飢寒逐彈丸京師兒童每聞嫣出彈輒隨之望丸所落便拾取焉西京雜記人乳飲㹠武帝嘗降王武子家武子供饌並用琉璃器婢子百餘人皆綾羅袴襦以手擎食蒸㹠肥美異於常味帝怪而問荅曰以丨丨丨丨帝甚不平兒口承唾苻堅從兄朗初過江常與朝士燕時賢並用唾壺朗欲誇之使小兒跪而開口唾而􅅤出裴景仁晉書一食萬錢何曽日食近萬錢猶云無下箸處子邵奢侈每食必盡四方珍饌一日之供以二萬為限晉本傳一費萬錢北齊韓晉明好酒誕縱招飲賔客丨席之丨動至丨丨猶恨儉率以􅏁􅀈釡石崇財産豐積室宇宏麗後房百數皆曳紈繡珥金翠絲竹盡當時之選庖膳窮水陸之珍與貴戚王愷羊琇之徒以奢靡相尚愷丨丨丨丨崇以蠟代薪愷作紫絲布步障四十里崇作錦步障五十里以敵之崇塗屋以椒愷用赤石脂武帝常以珊瑚樹賜愷髙二尺許枝柯扶疏愷以示崇便以鐵如意擊之應手而碎愷既惋惜崇曰不足多恨命左右悉取珊瑚有高三四尺者六七株愷恍然自失以蠟代薪見上文玉鳳金龍晉元保奢侈嘗云石崇庶姓猶能畫卵雕薪元保窗户以丨丨銜鈴丨丨吐斾洛陽伽藍記金蓮寶龜梁魚容性侈靡車馬服玩皆窮一時之麗嘗以象齒檀沈造一眠床四面週匝皆用銀鏤金花寶鈿四脚别以丨丨花捧琥珀龜以負牀脚六逸清談水碓三千石崇任俠無行檢在荆州刼逺使商客致富不貲丨丨丨丨餘區他珍寶貨賄皆稱是杯羮三萬李德裕奢侈每食一丨丨其費約錢丨丨雜珠玉貝黄朱砂煎汁為之過三煎即棄其滓括異志胡椒八百元載受賄賂後事敗有司籍其家鍾乳五百兩丨丨丨丨斛本𫝊金銀飾物安禄山起第既成具幄帟器皿充牣其中有帖曰檀牀二皆丈濶六尺銀平脱屏風帳一方一丈八尺於厨廏之物皆飾以金銀金飯甖二銀陶盆二皆受五斗織銀絲筐及笊籬各一他物稱是𤣥宗紀銅錢甃徑唐王元寳以金銀疊為屋以丨線穿丨丨花丨中貴泥雨不滑時名為富窟開元遺事肉陣遮風楊國忠冬月選婢妾肥大者列行於前令遮風謂之丨丨同上方朔化民對堯舜禹湯文武成康上古之事經歴數千載尚難言也臣不敢陳願近述孝文皇帝之時當時耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄以韋帶劒莞蒲為席兵木為刃衣藴無文集上書囊以為殿帷以道德為麗以仁義為準於是天下望風成俗昭然化之今陛下以城中為小圖起建章左鳳闕右神明號稱千門萬户木土衣綺繡狗馬被繢罽宫人簪瑇瑁垂珠璣設􅃧車教馳逐飾文采樷珍怪撞萬石之鐘擊雷霆之鼔作俳優舞鄭女上為淫侈如此而欲使民獨不奢侈失農事之難者也陛下誠能用臣之計推甲乙之帳燔之於四通之衢却走馬示不復用則堯舜之隆宜可與比治矣易曰正其本萬事理失之毫釐差以千里願陛下留意察之栁玭戒奢文王相國涯方居相位掌利權竇氏女歸請白玉工貨一釵奇巧須七十萬錢王曰七十萬錢我一月俸金耳豈于女惜但一釵七十萬此妖物也必與禍相隨女子不復敢言數月女自婚姻㑹歸告王曰前時釵為馮外郎妻首飾矣乃馮詠也王歎曰馮為郎吏妻之首飾有七十萬其可久乎馮為賈相餗門人最密賈有蒼頭頗張威福馮召而朂之未浹旬馮晨謁賈有二青衣捧地黄酒飲之食頃而終賈為出涕竟不知其由明年王賈皆遭禍噫王以珍奇貨為物之妖信知言矣而徒知物之妖而不知恩權赫弈之妖甚于物耶馮以卑位貪寳已不能正其家盡忠所事而不能保其身斯亦不足言矣賈之臧獲害門客于牆廡之間而不知欲終始富貴其可得乎此雖一事作戒數端詩集玉脂琉璃鍾琥珀濃小槽酒滴真珠紅烹龍庖鳳丨丨泣羅幃綉幕圍春風吹龍笛擊鼉鼓皓齒歌細腰舞况是青春日將暮桃花亂落如紅雨勸君終日酩酊醉酒不到劉伶墳上土李白犀筯三月三日天氣新長安水邊多麗人態濃意逺淑且真肌理細膩骨肉勻云云丨丨厭飫久未下鸞刀縷切絲紛綸杜甫貪濁事理發揮貪濁穢行也凡民猶不可况士大夫乎今夫簞食豆羮得之則生不得則死蹴爾而予之行道之人弗受嗟來之食餓者不屑也然彼其所以不畏四知不顧三尺若是之無忌憚者豈獨無良心哉向為身死而不受今為妻妾之奉為之向為身死而不受今為宫室之美為之向為身死而不受今為所識窮乏者得我而為之是亦不可以已乎此之謂失其本心事類饕餮縉雲氏有不才子貪于飲食冒于貨賄侵欲崇侈不可盈厭聚斂積實不知紀極不分孤寡不恤窮匱天下之民謂之丨丨左奪攘􅃖尤為始作亂延及于平民罔不寇賊鴟義奸宄丨丨矯䖍書吕刑殉貨敢有丨于丨色時謂淫風伊訓總貨母丨于丨寶盤庚貪婪丨丨無厭左叨懫丨丨日欽書取大鼎魯桓公二年丨郜丨丨于宋戊申納于太廟非禮也臧哀伯諫曰今滅德立違而寘其賂器于太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失德寵賂章也郜鼎在廟章孰甚焉而况將昭違亂之賂器于太廟其若之何左求寶劒魯桓公十年初虞叔有玉虞公求㫋弗獻旣而悔之曰周諺有之匹夫無罪懐璧其罪吾焉用此其以賈害也乃獻之又丨其丨丨叔曰是無厭也無厭將及我遂伐虞公左謁玉環昭十六年宣子有環其一在鄭商宣子謁諸鄭伯子産弗與云云宣子辭玉注玉環同工共璞成此雙環謁請也左羊舌瀆貨昭十三年叔鮒求貨於衛淫芻蕘者衛人使屠伯饋叔向羮與一篋錦曰云云芻蕘者異於他日敢請之叔向受羮反錦曰晉有丨丨鮒者丨丨無厭亦將及矣為此役也子若以君命賜之其已客從之未退而禁之叔魚鬻獄十四年晉邢侯與雍子爭鄐田丨丨攝理雍子納女於叔魚叔魚蔽罪邢侯邢侯怒殺叔魚與雍子于朝諱宣子問其罪於叔向叔向曰三人同罪施生戮死可也雍子自知其罪而賂以買直鮒也丨丨邢侯專殺一也已惡而掠美為昏貪以敗官為墨殺人不忌為賊夏書曰昏墨賊殺臯陶之刑也請從之乃施邢侯而尸雍子與叔魚于市左昭公使請冠焉昭二十三年范獻子求貨于叔孫婼丨丨丨丨取其冠法而與之曰兩冠盡矣注既送作冠模法又進二冠以與之若為不解其意使請帶焉樂桓子相趙文子欲求貨于叔孫丨丨丨丨弗與梁其踁曰貨以藩身子何愛焉叔孫豹曰云云然鮒也賄弗與不已召使者裂裳帛而與之曰帶其褊矣注言帶褊盡故裂裳示不相逆左昭元賂以女樂二十八年梗陽人有獄魏戍不能斷以獄上其大宗丨丨丨丨魏子將受之魏戍謂閻没女寛曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之比置三歎既食使坐魏子曰吾聞諸伯叔諺曰惟食忘憂吾子置食之間三歎何也同辭而對曰或賜二小人酒不夕食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人獻以馬佩定三年蔡昭侯為兩佩與兩裘以如楚獻一佩一裘於昭王昭王服之以享蔡侯蔡侯亦服其一子常欲之弗與三年止之唐成公如楚有兩肅爽馬子常欲之弗與亦三年止之唐人或相與謀請代先從者許之飲先從者酒醉之竊馬而獻之子常子常歸唐侯蔡人聞之固請而獻佩於子常子常朝見蔡侯之徒命有司曰蔡侯之久也官不共也明日禮不畢將死蔡侯歸鬻五羊皮百里奚自丨於秦養牲者丨丨之丨食牛以要秦繆公孟食二雞子子思言茍變於衛侯曰其材可將五百乗公曰吾知其可將然變也嘗為吏賦于民而丨人丨丨丨故弗用也子思曰今君處戰國之勢選爪牙之士而以二卵棄干城之將此不可使聞於鄰國通鑑張武受賂漢文帝時丨丨丨丨金錢覺更加賞賜以愧其心張正坐贓陳湯先誅斬郅支單于有大功成帝時受王參妻金五十斤為其子比例上奏求封𢎞農太守丨丨丨丨百萬使人報湯為公罪得踰冬月謝千二百萬事覺免為庶人安問狐狸漢張綱事詳見奉使門埋輪注謂囚鸞鳳後漢陳耽為司徒時詔舉刺史二千石為民蠧者其内官子弟賔客雖貪濁皆不敢問而虚糾邊逺小郡有惠化者耽與曹操上言公卿所舉所丨放鴟梟而丨丨丨其言忠切劉陶傳筒中細布晉王戎為侍中南郡太守劉肇賂丨丨丨丨五十端為司𨽻所糾以知而未納得不坐船載綿絹宋孔覬為司徒長史二弟東還覬迎之見輜重十餘船皆是綿絹紙席覬命置岸側謂曰汝輩忝預上流何至東還作賈客耶命燒盡乃去造問興生後魏封囘為度支尚書鄭雲諂事劉騰賂紫襭四百疋得安州刺史除書旦出晚詣囘問安州興生何事為便囘曰卿位為方伯宜思方畧以濟百姓如何見丨丨丨丨乎封囘不為商賈何以相示雲大慙去自解經紀唐滕王元嬰蔣王惲昏不能亷貞太宗賜諸王帛各五百段獨不及二王敕曰滕叔蔣兄丨丨丨丨不勞賜物與麻兩車以為錢貫二王大慙朝野僉載里正造像唐瀛州饒陽縣竇知範貪有一里正死範令門内二百人為丨丨丨丨各出錢一貫範自納之謂曰里正地下受罪先須急救範先造得一像且以與之納錢二百千像五寸半其貪皆類此範惟有一男放鷹馬驚桑枝打其頭破百姓快之皆曰千金之子易一之命同上里正括客唐深州刺史段崇簡為性貪暴到任追丨丨令丨丨云不得稱無上户每家取兩人下户取一人以刑脅之人懼皆妄通通訖簡云不用唤客來但須見主人主人到處分每客索絹一疋約一月之内得絹三十車同上令買竹笋唐益州新昌縣令夏侯彪之初下車問里正竹笋壹錢幾莖曰五莖取十千錢付之丨得五萬莖謂里正曰吾未須丨且林中養之至秋丨成一莖十錢遂成五十萬其貪猥不道皆此類同上令買絲羅唐汴州刺史王志愔飲食精細對賔下脱粟飯商客至丨丨單丨丨匹至三千愔問用幾兩絲對曰五兩愔命豎子取五兩絲來每兩别與十錢手工之直同上十萬通神唐張延賞將判度支知一大獄頗有寃濫每甚扼腕及判使召獄吏嚴誡之且曰此獄已久旬日須了明旦視事案上有小帖子錢三萬貫乞不問此獄公大怒更促之明日復有小帖子來曰錢五萬貫公益怒令兩日須畢明日案上復見帖子曰錢十萬貫公遂止不問子弟乘間偵之公曰錢至丨丨貫丨丨矣無不可􅂞之事吾懼及禍不得不止也幽閑鼓吹一書禱廟戊子嵗旱廬陵人龍昌裔有米數千斛糶既而米價稍賤昌裔乃為文禱神祠廟祈更一月不兩祠訖還至路憩亭中俄有黒雲一段自廟後出頃之雷雨大至昌裔震死於亭外官司檢將視之脱巾於髻中得丨紙丨則丨丨之文也昌裔有孫應童子舉鄉人以其事訴之遂不獲送稽神録獻金獲免蜀簡州刺史安重霸瀆貨無厭州民有油客者姓鄧能棊其家亦贍重霸召對敵只令立侍每落一子俾其退立於面北牖下俟我算路乃始進之終日不下十數子而已鄧生倦立且飢殆不可堪次日又召或有諷生曰此侯好賂本不為棊何不獻賂而自求退鄧生然之丨中丨三鋌丨丨北夢瑣言倍斗徵斂張䖍欽多貪鎮滄洲日因亢旱民飢乃發廩賑之事上聞甚嘉賞它日秋成丨丨丨丨嘗言自覺言行相違然每見財不能自止時人笑之同上椒八百斛見前絹二百萬文宗時鄭注得幸後以甘露事敗誅受人饋遺丨至一丨丨丨疋受贓棄市太宗朝著作佐郎盧珮坐監昇州𣙜酤丨丨丨丨受贓流罪真宗朝著作佐郎張清以贓敗杖脊配沙門島仁宗朝以漣水軍鄭餘慶等坐巧法自盗贓杖脊配廣南受𤓰子金太祖朝韓王趙普為相車駕因出或幸其第時兩浙王俶方遣使致書及海物十缾於韓王在廡下㑹車駕至倉卒出迎未屏也上顧丨何物韓王以實對上曰此海物必佳即令啓之皆滿貯丨丨丨韓王恐頓首謝曰臣未發書實不知若知之當奏聞而却之上笑曰但取之無慮彼謂國家事皆由汝書生耳因命謝而受之長編獻楊梅仁王薿字豐父守㑹稽童貫時方用事貫苦脚氣或云丨丨丨可療是疾豐父裒五十石以獻之後擢待制再任不歴貼職徑登次對惟豐父一人揮麈錄古今合璧事類備要續集卷三十六
