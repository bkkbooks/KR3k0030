body:
  text: 古今合璧事類備要别集卷三十六宋謝維新撰花卉門茉莉花格物叢話茉莉花似薔薇之白者叢生香勝於那悉茗葉面㣲皺無刻缺性喜地煖南人畦蒔之開時在夏秋間六七月始盛今人多採之以薫茶或蒸取其液以代薔薇或搗而為末以和靣藥其香可寳有如此者坡公目為暗麝亦可謂善平章矣事類花田盡㦳廣州城西九田曰丨丨丨丨茉莉及素馨鄭松窻詩詩胡國移至那悉茗花與茉莉花皆胡人自西國移植於南海南人憐其芳香競植之陸賈南越行紀曰南越之境五榖無味百花不香此二花特芳香者縁自丨丨丨丨不隨水土而變與夫橘花為枳異矣彼之女子以綵絲穿花心以為首飾南方草木狀黎女競簮東坡謫儋耳見丨丨丨丨茉莉戲云暗麝着人簮茉莉大全集詩集氷姿丨丨澹不粧百氏集冬蕤庭中紅茉莉丨月始葳丨杜甫琲珠圜蕚趺丨丨丨碎簇柔梢垂蔫然經月餘艶色愈不衰始疑神功化火結丹砂為謝工部龍涎避江梅去去木犀晩芝草石榴刺人眼茉莉獨立幽更佳丨丨丨香雪避花朝來無熱夜凉甚急遣山童報花信一枝𢃄雨折歸來走送詩人覔好詩楊誠齋氷葩淡翠葉光如沃丨丨丨不粧一畨秋早秀徹日座旁香色照祗園静清回瘴海凉儻堪紉作佩老子欲浮湘劉彦冲氷㽔亂曠然塵慮盡為對夕花明宻葉低層幄丨丨丨玉英不因秋露濕詎識此香清預恐芳菲盡㣲吟小砌行朱文公伴衆芳尋得天花丨丨丨王右丞最孤潔西域名花丨丨丨東山芳友更清幽王梅谿獻寳珠日暮園人丨丨丨同前人飄山麝風韻傳天竺隨輕入漢京香丨丨丨馥露染雪衣輕鄭松忩滿城香風流不肯逐春光削玉團酥素淡裝疑是化人天上至毗那一夜丨丨丨百氏集禪房覓茉莉名佳花亦佳逺從佛國到中華老來耻逐蠅頭利故向丨丨丨此花王梅谿樂府玉人笑挿五月炎洲路千叢撲地開只疑標韻是江梅不道薫風庭院雪成堆寳髻瓊瑶綴仙衣翡翠裁一枝長伴荔枝來付與丨丨和丨丨鸞釵南柯子韓南澗呉人未識北窓凉透南窓月浴罷滿懷風露不知何處有花香但恠底清香無數炎州珍産丨丨丨丨天與人間獨歩氷肌玉骨歳寒時倩問止堂中留住鵲橋仙張子湖素馨花格物叢話素馨舊名那悉茗與茉莉花皆胡人從西國移入南海自此中國所在而有其花細四瓣有黄色白色者藤身枝裊娜葉小殊甚無刻缺而香不及於茉莉云事類穿以為飾南方草木狀詳見茉莉注因以得名舊名那悉茗昔劉王有侍女名素馨其冡上生此花丨丨丨丨龜山志詩集花穿弱縷細丨丨丨丨盤向綠雲鬟樟隱質備衆馨衆芳發越充南溟梅花腦飛水弄沈露積箋檀薪降真薫陸光射琉璃瓶山川草木一天芬素丨如玉丨丨丨朱待制猶有名聞山林託足雖無地丨丨佳丨萬里丨黄公度絶無人問昔日雲鬟鎻翠屏只今煙塜伴荒城香銷㫁丨丨丨丨空有幽花獨擅名傳大諫不遜梅兄羞將姿媚隨花譜愛伴孤髙上月評獨恨遇寒成弱植色香殊丨丨丨丨陳止齋羞御鉛華妙香真色得之天丨丨丨丨學女妍只向温柔鄉裏活怕寒不到上林邊鄭松忩樂府玉人催買㦳層層細剪氷花小新隨荔子雲㠶到一露一畨開丨丨丨丨丨愛花心未已摘向冠兒裏輕浸水晶凉一窩雲影香菩薩蠻張約齋仙人偏耐熱青顰粲素黶海國丨丨丨丨丨餐盡風香露屑便萬里凌空肯憑蓮葉盈盈歩月悄似憐輕去瑶闕何人在憶渠癡小㸃㸃愛輕絶詩愁絶舊遊輕别忍重看青𤨏金篋凄凉夜簟席杳杳魂真化風蝶冷香清到骨夣千里梅花霽雪歸來也厭厭心事自共素娥說霓裳中序第一尹旃律金錢花格物叢話花以金錢名言其形之似也按風土記日開而夜落花時常在於秋君子觀此花之巧惟欠稜郭耳事類得花勝錢梁豫州掾属䨇陸陸賭金錢金錢盡以金錢花相足魚洪謂丨丨丨得丨雜爼詩集終不臭繁多丨丨丨百氏集自不貧風流丨丨丨同上買三秋能丨丨丨景難供九府輸百氏集殊半兩厚重圜丨秦丨丨輕飄薄似漢三分同上逞顔色隂陽為炭地為爐鑄出金錢不用模謾向人前丨丨丨不知還觧濟貧無同上無稜郭也丨丨丨也無神露洗還同鑄出新青帝若教花裏用牡丹應是得錢人來鵠盡斸將占得佳名繞樹芳依依相伴向秋光若教此物堪収貯應被豪家丨丨丨羅隱用得無巧冶都由造化爐風磨雨洗好形模花神果有神通力買㫁春光丨丨丨章藝齋金鳳花格物叢話金鳳花一名鳳仙花叢髙二三尺許青莖或赤莖葉翩翩柔脆尋常園圃間或於階前徑面取次而出春抽苖夏成叢秋初則着花花數品或白或碧或黄或紫或紺或粉紅色開開謝謝接續不㫁至秋杪猶有花花多結苞苞中有子子着地及次年又自萌芽不假人力㘽培顔色又或能相變得人嫌處縁多也事類呼為菊婢菊詩中丨丨丨丨因得此名張宛丘詩集紅紫相鮮金鳳乃婢妾丨丨徒丨丨張右史紅白紛亂花有金鳳為小叢秋色已深方盛發英英秀質實具體文采爛然無少闕纎莖翩翩翠影動丨丨丨丨如㸃纈誰云脆弱易飄墮自卯至申亦數月鋪茸剪綵轉難似只把長莖恣穿結常疑只似小兒花性命所係不忍折君不見昨夜雨今朝風一隊驚飛返丹宂文與可昻昻驤首九苞顔色春意動丹宂威儀秀氣攅題品直須名最上丨丨丨丨倚朱欄晏元獻輝輝矯翅手植中庭地分破紫蘭畹綠葉紛映堦紅芳爛盈眼丨丨丹宂禽丨矯丨翎展劉原父便翾金翅短天霜彫九陵梧桐日枯槁鳳德何其衰驚飛下幽草九苞空髣髴衆彩各自好黄中獨含章見晩更傾倒托根幔亭峯弱質深自保丨丨丨丨丨淡泊乃幾道俗眼迷是非人間跡如掃劉抑父寂寞采羽瘖小似釵頭縷粟金不將紅淺笑紅深虛名兄對閑花草丨丨朝陽丨丨丨北􅤝僧髙下幾畨開憶繞朱欄手自㘽綠叢丨丨丨丨丨中庭雨過無人跡狼籍深紅㸃緑苔歐陽公深淺四般紅細看金鳳出花叢費盡司花染作功雪色白邊袍色紫更饒丨丨丨丨丨楊誠齋罕見有為貴鮮鮮金鳳花得時亦自媚物生無貴賤丨丨丨丨丨徐月溪蓼花格物叢話蓼有二種不可不之辨也其一樹身筆直髙者丈餘節生如竹圍逕寸半許每節中間壯下而銳上一節髙一節初出地靣每節三寸四寸五寸許漸至其中八寸九寸或尺餘不止也直到末首始四向抽枝着葉葉大者亦尺餘枝頭抽穗穗間着花花如紅糝様不計其數也花能結子花着地次年又自根萌取次而出春苖夏茂秋始華八九月餘㸃綴爛熳亦儘可愛其一叢生高不下二尺許莖細弱葉似栁其味香辣枝頭葉底亦抽短穗着糝糝紅花等閒淤泥處出此俗名辣蓼人多賤之豈容一㮣而觀事類古國號霍丘丨號西蓼東蓼蓋丨之蓼丨也安豐志越王甞丨丨念呉欲復怨非一旦也苦思勞心夜以接日卧則丨蓼吳越春秋孔臧蓼蟲賦蓼蟲在蓼則生在芥則死非蓼仁而芥賊也戰國策覩兹茂蓼紛葩吐盈猗那隨風緑葉厲莖爰有蠕蟲厥狀似螟羣聚其間食之以生則罔不知心况乎人以安逸為心乎詩集被隄岸蓼花丨丨丨栁雜芳菲蓼丨丨丨疇韓文入船忩蓼花無數丨丨丨李元膺開水國暮天新鴈起汀洲紅蓼花丨丨丨愁羅鄴水花紅丨蓼冷丨丨簇簇白樂天雨花紅丨濕蓼丨千穗丨温庭筠拂漫流簇簇復悠悠年年丨丨丨差池伴黄菊冷落過清秋晩帶鳴蟲急寒藏宿鷺愁故溪歸不得憑仗繋漁舟鄭谷結晚紅花穗迎秋丨丨丨園林清淡更西風宋景文沾峽雨紅穗已丨巫丨丨綠痕猶帶錦江泥狂吟不覺驚幽鷺坐困翻疑在舊溪張忠定蘸秋霞簇簇菰蒲映蓼花水痕天影丨丨丨林和靖卧雨幽花秋歸南浦蟪蛄鳴霜落横湖溪水清丨丨丨丨無限思抱叢寒蝶不勝情坡樂府漸蓼花明金井先秋梧葉飄黄幾回驚覺夢初長雨㣲燈淡疎柳池塘丨丨丨丨菱花凈藕花凉日幽花已慣衾單枕冷任商飈催換年光問誰相伴終清狂有竹間風樽中酒水邊床行香子王晉卿蘆花格物叢話蘆葦之未秀者也叢生脆弱葉四向而垂中心抽榦高八九尺許有節如竹至末抽穎穎上生花花色白江岸間多有之或亦謂之荻花即此事類鴈㘅丨丨蘆以避矰繳淮南子詩集葉沉波摧折不自禁秋風吹若何暫時花帶雨幾處丨丨丨體弱春苖蚤叢長夜露多江湖後揺落亦恐歳蹉跎杜花似霜蘆丨丨朝丨李白留客晩蘆花丨丨丨杜使人愁雨折霜乾不耐秋白花黄葉丨丨丨月明小艇湖邊宿即是江南鸚鵡洲坡經雨後最愛蘆花丨丨丨一篷煙浪飲漁船林君復訴月華避世水雲國卜鄰鷗鷺家風前揮玉塵霜後幻楊花骨相縁詩瘦秋聲丨丨丨欲招盧處士歸去老生涯楊誠齋牽牛花格物叢話牽牛花蔓生傍籬落而上葉有稜角楓葉相類七八月間花如鼓子稍大作碧色其子可入藥是也事類牽牛易藥陶隱居云作藤生花狀如扁豆黄色子作小房實黑色形如毬子核療脚氣此藥始出田野人丨丨丨丨故以名之本草詩集作架柔條長百尺秀蕚包千葉不惜丨高丨為君相引接文與可繞籬晩思歡欣晩思愁丨丨縈架太嬌柔木犀未發芙蓉老買斷西風恣意秋楊誠齋蔓相延楚女霧露中籬上􅎥牽牛花丨丨連丨星宿光未収采之一何早日出顔色休持寘梅窓間染薑奉盤羞爛如珊瑚枝惱翁齒牙柔齒牙不能餐梁肉坐為讎梅聖俞衣染得銀漢初移漏欲殘歩虛人倚玉欄干仙丨丨丨天邊碧乞與人間向曉看古詩著茜衫素羅笠頂碧羅簷晩卸藍裳丨丨丨望見竹籬心獨喜翩然飛上翠雲篸楊誠齋織錦裳莫笑渠儂不服箱天孫為丨丨雲丨浪言偷得星橋巧只觧氷盤染茈薑前人凌霄花格物叢話凌霄花蔓生纒古木而上每一莖着數葉花赤色有斑㸃開時向下秋七八月有也事類指花覔句錢塘西湖有詩僧清順居其下自名藏吾塢門前有二古松各有凌霄花絡其上順常晝卧子瞻為郡一日屏騎從過之松風搔然順丨落丨丨丨子瞻為作木蘭花本事集梅聖俞賦厥草惟夭厥木惟喬草有柔蔓木有繁條縁根兮附蔕布葉兮敷苗朱華粲兮下覆本榦蔽兮不昭嗟乎此木幾嵗幾年而至於合抱夫何此草一旦一夕而遂曰凌霄是使藜藿蒿艾慕高􅃩而仰翹翹也安知蘋藻自潔蕙蘭自芳芙蓉出汙而自麗芝菌不根而自長或紐珮𢃄或采項筐或製裳於騷客或登歌於樂章故得為馨為薦為嘉為祥皆無附著亦以名揚奚必托危柯而後昌吾謂木老多枯風高必折當是時將恐摧為朽荄不復萌蘖豈得與百卉並列也耶詩集氣類固未合草木不觧行隨生自有理觀此引蔓柔必憑高樹起丨丨丨丨丨縈纒豈由已仰見蒼虬枝上發彤霞蘂層霄不易凌樵斧者誰子梅聖俞縈纒不自由固知臭味非相類其柰丨丨丨丨丨曽南豐樂府百尺英雙龍對起白角蒼髯煙雨裏疎影㣲香下有幽人晝夣長湖風清軟雙鵲飛來爭噪晩翠颭紅輕時墜凌霄丨丨丨本蘭花坡佛桑花格物叢話佛桑花樹生枝柯柔弱葉深綠微澁如桑花赤大如蜀葵五六出朝生暮隕有白花者有千葉者等閑籬落間多見之事類耕園驛數株明道中予為漳州軍事判官晩秋至州西丨丨丨庭有佛桑丨十丨開花繁盛念其寒月窮山方自媚好乃作丨丨丨佛桑花詩一首既而乘桴東下又作溪行一首慶厯七年予使本路明年夏四月自汀來漳復至是驛花尚仍舊追感昔逰因紀前事併載舊篇龕於西壁云蔡君謨詩序詩集過墻花使軺迢遞到天涯候館遷延感歳華白髪却攀臨砌樹青條猶放丨丨丨悲來惟有金城切醉後曽乗海客槎欲問昔遊無處所晩須沉水日沉沙蔡君謨繁枝艶溪館初寒似早春寒花相倚最於人可憐萬木彫零盡獨見丨丨爛熳新清丨夜沾雲表露幽香時過轍中塵名園不肯爭顔色灼灼夭桃野水濵前人古今合璧事類備要别集卷三十六
