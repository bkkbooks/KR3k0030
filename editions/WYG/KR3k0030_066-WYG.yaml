body:
  text: 古今合璧事類備要前集卷六十六宋謝維新撰襄事門卒哭事類周祔丨卒哭而丨孔子善殷注期而神之人情檀弓周弔上大夫之虞也少牢下大夫之虞也特牲反哭之弔哀之至殷既封而弔丨卒哭而丨孔子曰殷已慤吾從周士三虞大夫五諸侯七迎精而反成事卒哭曰丨丨是日也以告祭易喪祭明日祔于祖父祭告其祖之廟檀弓諱新卒哭而諱生事畢而鬼事始已既卒哭宰夫執木鐸以命於宮曰舍故而丨丨同上小祥事類練祔殷丨而丨檀弓又云練而弔雜記練祭小祥者主人丨丨曽子問期而小祥日祭薦此常事士虞禮練衣丨練丨黄裏縓縁注小祥練冠練中衣以黄為内縓為餙黄之色卑於纁縓纁之類明外除檀弓練冠丨丨縓縁要絰不除男子除乎首婦人除乎帶間傳居琧室父母之喪居倚廬寢苫枕槐不脫絰帶既虞卒哭柱楣剪屏芐剪不納期而小祥丨丨丨寢有席同上食菜果練而丨丨丨䘮人記悲未盡大扺子於親喪有終身之痛創鉅者日乆痛深者愈遲何嵗月而止乎故練而慨然丨慕丨丨而踊擗之情差矣注至小祥但歎慨日月若馳之速也奠不舉小祥者練祭而不旅丨酬於賓賓丨丨禮也曽子問練而杖魯大夫丨丨丨子貢問孔子曰丨丨丨禮歟子曰非禮也家語子貢問練而牀魯大夫丨丨丨孔子曰非禮也茍子昭公舉酬昔者魯丨丨練而丨丨行旅非禮也孝公大祥奠酬不舉亦非禮也曽子問伯魚猶哭丨丨之母死期而丨丨孔子聞之曰誰與哭者門人曰鯉也夫子曰嘻其甚也伯魚聞之遂除之大祥事類有已三年之喪二十五月而畢豈不以送死丨丨復生有節哉注復生除喪反生者之事也三年問廓然祥而丨丨注哀傷在禮下心之貌也曲禮有終喪不過三年示民丨丨也孝經從殺服丨情丨哀以禮終喪制除喪親喪外除注日月已竟哀未忘也六帖無哭祥而外丨丨者喪大記過隙三年之喪若駟之丨丨三年問及期甫丨嵗丨奄過大祥禮制云終追號永逺悲裂肝心白集吉服大祥丨丨而筮尸注凡變除必服其吉服以即祭不以凶服間吉事六帖縞冠祥而丨丨除成喪者祭以縞冠注猶未純吉既祭乃大祥素縞麻衣既祭乃服朝服既祭𤣥冠而居服平常同上黝琧既祥丨丨喪大記徹筵奠筵將徹幃帳一收此生之間豈有見日未死之際應無忘期仰天一號心骨破碎猶冀萬一聞吾此言鼓琴祥之日丨素丨示民有終也以節制者也喪服四制饋肉顔淵之喪丨祥丨孔子受之入彈琴而后食之注彈琴以散哀也檀弓朝祥暮歌魯人有丨丨而丨丨者子路笑之夫子曰由爾責於人終無己夫三年之喪亦已乆已夫子路出夫子曰踰月則其善也檀弓除喪彈琴子夏既丨丨而見予之琴和之不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也子張既除喪而見予之琴和之而和彈之而成聲作而曰先王制禮不敢不至焉檀弓孔子既祥五日彈琴而不成聲十日而成笙歌同上縞冠素紕䘮禮既祥祭而丨丨丨丨詩􅤂素冠注絲屨組纓冇子既祥丨丨丨丨非禮也檀弓孝思敢忘祥雖除服憂且終身雖送終之有已豈丨丨之丨丨六帖哀徳靡極喪紀有終丨丨丨丨度新宮而館御諢吉日以徂遷臨川集禫事類平安禫祭名與大祥間一月自喪至此凡二十七月禫之言澹澹然丨丨之意也六帖終始孝無丨丨喪有祥禫同上從御禫而丨丨喪大記無哭禫而内丨丨者樂作矣故也同上飲醴禫而丨丨酒記間傳用樂是月禫徙月樂注言禫明月可以用樂檀弓𤣥冠𤣥衣黄裳則是禫祭丨丨矣黄裳者未大吉也既祭乃服禫服記雜記纎佩禫而丨無所不丨注纎采纓也記間傳除服事類吉祭丨丨而復寢喪大記縞冠除殤之喪也必𤣥除成喪者其余也朝服丨丨注縞冠未絶祭服也記免喪丨丨之外行於道路見似目瞿聞名心瞿弔死而問疾顔色戚容必有以異於人也雜記去喪丨丨無所不佩語十變禮容日月其除丨丨丨於衰絰霜露所感遵祀典於練祥白孔六帖從吉典寒暑之變怱焉再朞練祥之餘復將三月勉丨即丨之丨莫遂無窮之哀蘇東坡文垂冠戴纓不幸餘命不殞丨丨丨丨元微之集外除杖絰杖絰外除柴瘠加等燕集除喪不忍子路有姊之喪可以除之矣而不除也孔子曰何不除也子路曰吾寡兄弟而不忍也子曰患其過於制也遂除之記後漢江革母終不忍除服郡丞遣丞椽釋服因請為吏行服過制後漢汝南薛包丨丨六年本傳喪除不仕尹愔以親喪哀毁丨丨丨丨許康佐母䘮已除凡辟命皆不答畢創居親喪毁棘甚已除猶屏處丘園並本傳服除請禄吳兢母喪去官丨丨自陳修史有緒家貧不能具紙筆願得少禄以終餘功拜諫議大夫復修史終身如喪郭世通服除思慕丨丨丨丨南史在心之哀謝曜卒弟𢎞微服雖除猶不噉魚肉沙門釋慧琳見其猶蔬素謂曰檀越素既多疾即吉猶未復膳若以無益傷生豈所望於得理𢎞微曰衣冠之變禮不可踰丨丨丨丨實未能已南史諱日事類終身君子有丨丨之喪忌日之謂也記所志忌日不用非不祥也言夫忌日志有所至而不敢盡其私也注不用不舉事也祥善也有所至親以此日亡其哀心喪時也祭義必哀忌日丨丨同上不樂忌日丨丨注不舉吉事曲禮感親忌日王修母以社日亡來年社日修哀感悲號鄰人為之罷社孝子傳匿親忌日祝欽明為相坐丨丨丨丨貶申州刺史忌日辭酒季節見於子順子順賜之酒辭曰今家之忌日也孔叢子忌日不食申屠蟠每丨丨輙三日丨丨東漢本傳忌不聴樂王世將忌日送客主人欲作樂王便往衛洗馬墓下彈鳥世說忌辭攝祭徳宗貞元八年將作監元亘當攝大尉薦饗昭徳皇后廟以私忌不受誓戒為御史劾奏於是令尚書省與禮官法官集議右丞盧邁等奏曰禮云大夫士將奉祭於公既洗濯而父母死則猶祭也又按唐禮散齋有大功喪致齋有周喪及齋中疾病則還家皆無忌日之文雖假寧令有給假一日春秋不以家事辭王事亘不宜以丨日丨丨丨由是坐罸實錄嫁笥墨衰丁晉公言嘗見文中孺侍郎言中孺嘗聞祖母當日歸時於衣笥中得一墨衰妯娌骨肉皆驚駭而詰之云父母教以候翁姑私忌日着此衣出慰當時士族之家猶有此禮今未之聞也談錄黲墨衫巾朱文公母夫人忌日着丨丨布丨其丨亦然學者問今日服色何謂曰公豈不聞禮君子有終身之喪語錄葬附侈葬送葬儉葬殉葬合葬賜葬歸葬事類襄事雨不克丨丨禮也注襄成也雨中成事嫌若汲汲於葬也左傳卜兆丨其宅丨而安厝之孝經窀穸丨丨之事慎終追逺白帖惟是春秋丨丨之事注窀厚穸夜厚夜長夜也左傳祖載祖於庭何奪孝之思也祖始也始載於庭也乘車辭祖禰故為丨丨也白虎通虞祭葬日虞弗忍一日離也是日也以虞易奠記檀弓設盥既夕哭請啓期告于殯宿興丨丨於祖廟門外儀禮明器竹不成用瓦不成味木不成斵琴瑟張而不平笙竽備而不和冇鍾磬而無簨􅙇其曰丨丨神明之也檀弓明旌銘丨丨也以死者為不可别已故以其旗識之同上芻靈塗車丨丨自古有之注束茅為人馬謂之靈者神之類孔子謂為芻靈者善謂為俑者不仁不殆於用人乎俑偶人也有面日機發有似於生人栁車芻靈飛旐翩翩檀弓栁霎飾棺牆置霎注牆栁衣又云絞衾設丨丨注絞衾尸之飾栁翣棺之牆飾霎以木為筐廣三尺髙二尺四寸方兩角衣以白布盡者盡雲氣柄長五尺車行使人持而從既窆乃樹於壙中餙棺者以華道路不欲衆惡其親也檀弓帷荒飾棺者君龍帷黼荒大夫􅀞丨􅀞丨荒蒙也在旁曰帷在上曰荒皆所以衣栁也士布帷布荒者白布也君大夫加文章焉喪大記引紼吊於喪者皆執紼注廟中曰紼在途曰丨禮儀志丨發也發車使行也釋名廞車丨丨既展祖奠斯聞張說祭文廞木如塗之曰殯穀梁傳題湊丨丨既肅龜筮既辰注題湊棺木内向也晨輼解鳯曉盖峩金注輼輬喪車也沈約齊安陸王碑葬中野古之葬者厚衣以薪丨之丨丨不封不樹喪期無數後世聖人易之以棺槨盖取諸大過易繫葬北方丨於丨丨北首三代之逹禮也禮送形而往丨丨丨丨迎精而反注迎精誠而反日中而虞記問喪欲人弗見國子髙曰葬者藏也藏也者丨丨之丨得丨也是故衣足於身棺周於衣椁周於棺土周於椁檀弓必誠必信子思曰凡附於身者丨丨丨丨勿之有悔焉耳矣同上如慕如疑衛有送葬者夫子觀之曰善哉為喪乎足以為法矣小子識之子貢曰夫子何善彼也曰其往也丨丨其反也丨丨子貢曰豈若速反而虞乎子曰我未之能行也故喪以哀為主記天地為棺莊子將死弟子欲厚葬之莊子曰吾以丨丨丨丨椁以日月為連璧星辰為珠璣萬物為齎送吾葬具豈不備耶何以加此弟子曰吾恐鳥鳶之飱夫子也莊子曰在上為鳥鳶食在下為螻蟻食奪彼與此何其偏也以不平二其平也日月有期公孫文子卒其子戊請謚於君曰丨丨丨丨將葬矣請所以易其名者也葬妻犯禾季子臯丨丨丨人之丨申祥請更之子臯曰孟子不以是罪予朋友不以是棄予以吾為邑長於斯也買道而葬後難繼也葬子習禮延陵季子喪長子𦵏於嬴博之間孔子曰季子吳之習於禮者往而觀之其坎深不至於泉其歛以時服廣輪揜坎其髙可隱也既窆右旋左袒其封且號者三日骨肉歸復于土命也若䰟氣則無不之也擇地而葬成子髙曰生无益於人吾何以死害於人乎我死則丨不食之丨丨丨我焉檀弓指山為葬李白至姑熟恱謝家青山欲終焉及卒葬東麓劉悟大將郭誼者兖州人兄岌事悟山為牙常樂㵚山秀峻曰我死必葬此六帖弗許毁室鄭簡公卒將為葬除及游氏之廟子産使辟之司墓之室有當道者子太叔請毁之子産弗毁左昭十二預知建宫樗里子且死曰葬我必於渭南章臺東後百年當有天子宫夾我墓及漢興長樂宫在其東未央宮在其西武庫直其上劉向說苑葬近前賢梁鴻病告主人曰慎勿令我子持喪歸及卒王伯通葬於要離列士伯鸞請宜相近魏田豫戒子曰葬我必於西門豹邊妻子曰豹古之神人那可葬其邊日豹履行與我適等死有靈當與我善也六帖葬祔先塋張曲江丁内憂奔喪馳訃祔葬先塋白雀黄鶯號噪庭塋素鳩紫燕巢植廬壠唐文更葬朽骨周文主作靈臺掘地得死人之骨王曰更葬之吏曰此無主矣文王曰有天下者天下之主也有一國者一國之主也寡人固其主又安求之主遂丨丨之天下皆曰文王賢矣澤及丨丨况於人乎新序殯葬鰥寡漢黄霸為穎川守鰥寡孤獨有死旡葬者覇為區處收葬暴骨後魏宋世良以御史使河北還過汲郡見城傍多骸骨移文州郡悉令収瘞其夜甘雨滂沱後周賀蘭祥為荆州刺史境内亢旱見發掘吉冡暴露骸骨者命收葬之即日澍雨掩葬枯骨陳寵為廣漢守先洛陽城南每隂雨常有哭聲寵使使按行多骸骨不葬者勑縣盡收葬哭聲自絶于頔為胡州刺史州地庫薄葬者不掩柩頔坎瘞枯骨千餘人頼以安葬以報徳羅士信齊州人初為仁基所禮及東都平出家財殮丨北邙丨丨丨且曰我死當墓其側至是如其志葬以行志吳保安與郭仲翔善仲翔母葬服除喟曰吾頼吳公生吾死今親殁可行其志乃求保安于時保安以彭山丞客死其妻亦殁喪不克歸仲翔為服縗經囊其骨徒跣負之歸葬魏州廬墓三年而去王果得銘唐左衛將軍丨丨被責出為雅州刺史於江中泊船仰見巖腹中有一棺臨空半出乃縁崖而觀之丨丨曰欲堕不墮逢王果五百年重収我果歎曰吾合葬此今被責雅州固其命也乃収窆而去廣記沈彬留篆丨丨將八十近居阜上有一大樹可數拱未殂前嘗指示家人曰吾死可葬於是既葬穴其處乃古塜爾覿其間儼然復見一古燈臺上有􅃮一盞壙頭獲一銅牌上有䥴篆文曰佳城今已開雖開不葬埋漆燈猶未爇留待沈彬來江南野史庾亮埋玉晉庾亮位司空薨將葬何充㑹之歎曰丨丨樹於上中使人情何能已本傳劉伶荷鍤晉丨丨放情肆志常以細萬物齊宇宙為心每乘鹿車擕一壺酒使人丨丨隨之曰死便埋我貴妃香囊唐楊丨丨死裹尸以紫茵瘞于側𤣥宗至自蜀過其所使祭之宻遣中使具棺槨他葬焉啟瘞故紫丨丨猶在中人以獻帝視之流涕太子玉魚髙宗营太明宫每夜見數十騎行殿左右乃使術者劉明奴問故曰我漢楚王戊之太子明奴詰問漢書楚王與七國謀反夷宗覆族安有遺嗣曰王起兵畱吾在長安王誅天子念我不殺養宫中死葬此天子憐我殮以玉魚一雙今在殿東北角史臣遺略不書今在宫中頗見拘限乞改葬髙敞無奪玉魚發其處果然乃勅以禮改葬玉魚隨之西京雜記賣金辦葬王忳路行遇書生病下車省之生云我腰下有金請取之鬻以葬我未及問姓名而絶忳丨丨葬之餘金亦埋之奪山為葬潘兊朱勔里人不登其門兊字恱之吳門人仕裕陵為侍從時郡民朱勔以倖進寵眷無比父冲殂勔䕶喪歸𦵏鄉間傾城出迓而潘獨不徃潘之先茔適有山林形勢近冲新阡勔欲得之乃修敬于潘二杜門不納勔恃恩自恣遣人諷之且席以薰天之勢潘一切拒之勔歸京師果訢于上降御筆奪之已而又假御史誣之以罪褫潘之職揮塵録司馬葬論葬者藏也孝子不忍其親之暴露故歛而藏之齎送不必厚厚者有損無益古人論之詳矣今人葬不厚於古而拘於隂陽禁忌則甚焉古者雖卜宅卜日蓋先謀人事之便然後質諸耆龜庻無後艱耳旡常地亦無常日也今之葬書乃相山川岡壠之形勢考嵗月日時之支干以為子孫貴賤貧富壽夭賢愚皆繫焉非此地非此時不可葬也舉世惑而信之於是喪親者往往乆而不葬問之曰嵗月未利也又曰未有吉地也又曰遊宦逺方未得歸也又曰貧未能辦𦵏具也至有終身累世而不葬遂棄失尸柩不知其處者嗚呼可不令人深嘆愍哉人所貴於身後有子孫者為能藏其形骸也其所為乃如是曷若無子孫死於道路猶有仁者見而殣之耶先王制禮葬期逺不過七月今世著令自王公以下皆三月而葬又禮未葬不變服食粥居倚廬哀親之未有所歸也既葬然後漸有變除今之人背禮違法未葬而除喪從官四方食稲衣錦飲酒作樂其心安乎人之貴賤貧富壽夭繫於天賢愚繫於人固無闗預於葬就使皆如葬師之言為人子者方將哀窮之際何忍不顧其親之暴露乃欲自营福利耶昔者吾諸祖之葬也家甚貧不能具棺槨自太尉公而下始有棺槨然金銀珠玉之物未嘗以錙銖入於壙中將葬太尉公族人皆曰葬者家之大事奈何不詢陰陽此必不可吾兄伯康旡如之何乃曰詢於隂陽則可矣安得良葬師而詢之族人曰近村有張生者良師也數縣皆用之兄乃召張生許以錢二萬張生野夫也世為𦵏師為野人𦵏所得不過十錢聞之大喜兄曰汝能用吾言吾俾爾𦵏不用吾言將求他師張師曰惟命是聴於是兄自以已意處嵗月日時及壙之淺深廣狹道路所從出皆取便於事者使張生以葬書縁飾之曰大吉以示族人皆悅旡違異者今吾兄年七十九以列卿致仕吾年六十六忝僃侍從宗族之從仕者二十有三人視他人之謹用葬書未必勝吾家也前年吾妻死棺成而歛裝辦而行壙成而葬未嘗以一言詢隂陽家迄今亦無他故吾嘗疾隂陽家立邪說以惑衆為世患於喪家尤甚頃為陳官嘗奏乞禁天下葬書已時執政莫以為意今著兹論庶俾後之子孫葬必以時欲知葬具之不必厚視吾祖欲知葬書之不必信視吾家元豊七年月日司馬光述伊川葬說卜其宅兆卜其地之美惡也非隂陽家所謂福禍者也地之美者則其神靈安其子孫盛若培㙲其根而枝葉茂理固然矣地之惡者則反是然則曷謂地之美者土色之光潤草木之茂盛乃其驗也父祖子孫同氣彼安則此安彼危則此危亦其理也而拘忌者惑其擇地之方位决日之吉凶不亦泥乎甚者不以奉先為計而專以利後為慮尤非孝子安厝之用心也惟五患者不得不謹須使異日不為道路不為城郭不為溝池不為貴戚所奪不為耕犂所及一本謂五患者溝渠道路避村落逺井窑五患既謹則又鑿地必四五尺遇石必更穿之防水潤也既葬則以松脂塗棺槨石灰封墓門此其大畧也若夫精畫則又在審思慮矣其火葬者出不得已後不可遷就同葬矣至於年祀寢逺曽髙不辨亦在盡誠各具棺槨葬之不須假夢寐蓍龜而决也葬之宂尊者居中左昭右穆而次後則或東或西亦左右相對而啓穴也出母不合葬亦不合祭棄女還家以殤穴葬之程正淑濠梁殯宫客有自丨丨來者余訊之曰濠梁之政何如客曰夷俗好巫而信鬼死者其親戚不敢穿斸事葬相傳立小屋號曰丨丨焉雖在城郭而為之有上木隳槖棺櫬巍然者有棺櫬分折骸骨縱横者不獨庶人而士大夫之家有焉劉公惻然曰非禮也吾忍不導之耶下令曰某月有限限别其家不闕地葬者笞二十鰥寡惸獨力不任者絶嗣無主傍無近親者刺史以俸錢為營之訖事人無犯令野旡殯宫焉盧子曰理乎哉劉公今日能以禮導邦人且夫葬者藏也欲人之不得見也奈何宿昔濠之人不藏其父子昆弟耶又曰生事之以禮死葬之以禮奈何夙昔濠之人不以禮葬其父子兄弟耶又曰延陵季子葬其子仲尼觀之曰其坎深不至於泉其歛以時服奈何夙昔濠之人喪其父母昆弟不葬於土中耶又曰䰟氣歸于天形􅅎歸于地奈何夙昔濠之人不歸其父子昆弟之形于地耶今刺史彭城劉公教生者以禮示之日月信也恤死者以仁除其暴露義也合此智以成之難乎哉余耳得客之言不浹旬適至濠上因書以偹太史氏采録焉盧子駿濠州刺史劉公善政述漳州義塜人死曰歸葬曰藏歸者復其所也藏者欲人之不得見也故先王制禮喪葬有期下至於士則踰月而已何漳之為子若孫者乃有不𦵏之俗耶其親死往往舉其柩而置之僧寺是蓋始於茍簡中則因循乆則忘之矣嗚呼已則忘之矣而不知虚廊冷殿之間寒聲泣霜弱影弔月其望於子孫一旦之興念者猶未已也盖嘗命官僚覈其事近城之五里乃有十瓦棺合二千三百有竒爰擇於城之西南北髙燥地立為義塜三每所大為之域既封覆以青莎使如舊壠前塗白琧書其有名氏者庻㡬子孫猶來祭享也訖事郡人合辭以請記余曰義之名立其死於不義而後見也此其不義果起於誰乎曰僧人其作俑者也是間層山疊林梵宇無數廊廡間率不置門若此類為土室其入如竇黯然無光斯皆誘愚俗以來殯者也彼棘人者舉其親而即安于彼死者一入杏無葬期使其子若孫良心䧟溺不復知有天理之正人道之終此有識者之所深恨也原道曰不塞不流不止不行近因為令下諸浮圖必使盡改其室以為民房不改則鞭其人而俗之籍其田而公之蓋治盗之法治其藏者此法常存則誘者始有所畏死者始有所歸矣是為記危稹義阡記侈葬孟軻美棺孟子自齊葬於魯反於齊止於嬴充虞請曰前日不知虞之不肖使虞敦匠事嚴虞不敢請今願竊有請也木若以美然曰古者棺槨無度中古棺七寸非直為觀美也然後盡於人心不得不可以為恱無財不可以為恱得之為有財古之人皆用之吾何為獨不然且比化者無使土親膚於人心獨無恔乎吾聞之君子不以天下儉其親公孫丑司馬石槨宋桓丨丨自為丨丨三年不成子曰若是其靡也死不如速朽之為愈也記蜃炭瘞壙宋文公始厚葬用丨丨燒蛤為灰以丨丨榆沈設撥孺子􅀈之喪哀公欲設撥問於有若有若曰其可也三臣猶設之顔栁曰天子龍輴以槨幬諸侯輴而設幬為丨丨故丨丨三臣廢輴而設撥廢禮之不中而君何學焉注撥可發輴車也榆沈以榆汁澆地利其滑易進也金銀鳬鶴秦始皇葬驪山起墳髙丨五十丈下周三泉周廻七百歩以明月珠為日月人魚膏為燈燭水銀為大海丨丨為丨丨三輔故事玉匣蛟龍漢帝及侯王送葬者皆珠襦丨丨形如鎧甲連以金縷匣上皆縷以丨丨鸞鳯龜麟之象時謂交龍玉匣西京雜記大治冡舍漢原涉字巨先父為南陽太守死讓還南陽賻贈千萬以上涉後自以身得其名而令先人墳墓儉約非孝也廼丨丨丨丨周閣重樓初武帝時京兆尹曹氏葬茂陵人謂其道為京兆阡渉慕之買地開道立表曰南陽阡人不肯從謂之原氏阡多治喪車樓䕶出入五侯之門咸得歡心母喪送葬治喪車三千輛人謂曰五侯治喪樓君卿得古冢器齊書曰始興王鎧鎮蜀於州園地丨丨丨珍寶甚多金銀為蠶形者數十又以朱砂為阜水銀為池發壙中藏張侍中耆遺言厚葬晏丞相殊遺言薄葬二公俱葬陽翟元祐中同為盗所發侍中壙中金玉犀珠充塞盗不近其棺所得已不勝慰皆列拜而去丞相壙中但瓦器數十盗怒不酬其勞斵棺取金帶亦木也遂以斧碎其骨厚葬免禍薄葬致禍楊王孫之計䟽矣聞見錄儉葬稱財為禮子路曰傷哉貧也生無以為養死無以為葬子曰歛手足形還葬而無槨丨其丨斯之謂禮以儉自全杜預遺令言形山上有冡云是鄭大夫祭仲或云子産墓隧道惟塞其後而空其前不填之示藏無珍寳不取於重深也山多美石不用必取水中自然之石以為冡示不勞工功而此石不入世用也君子尚冇情小人無利可動吾自表營洛陽城東首陽之南將來域兆儀制取法鄭大夫欲丨丨丨丨耳非茍為儉仲尼孝子延陵慈父其葬骨肉皆微薄矣丨丨丨丨誠便於體徳彌厚者葬彌薄知愈深者葬愈微丘壠彌髙發掘必速漢成紀何用徇侈夫厚葬之家流于俗以侈靡為孝令死者戳尸暴骨可不痛哉死者無知自同糞土豈煩奢葬使其有知神不在柩丨丨破貲丨丨乎姚崇傳載以牛車漢張湯自殺兄弟欲厚葬母曰湯為天子大臣被惡言而死何厚葬為丨丨丨丨有棺無槨藉以黄壌東漢趙咨將終告其故吏朱祗簫建等曰薄歛素棺丨丨丨丨欲令速朽且歸后土不聴子孫改之本傳不用棺椁後漢盧植字子榦臨卒勑其子儉葬於上宂丨丨丨丨勿起墳壠晉王祥為睢陵公疾篤遺令曰西邙土自堅貞乃甓石丨丨丨丨葬以幅巾後漢皇甫規遺命曰地底冥冥長無曉期而復纒以纊綿牢以釘漆為不喜耳幸有前窀朝殞夕下措尸靈牀幅巾而已奢非晉文晉文公請隧王不許以臣而請王禮奢也儉非王孫惟情從意庶旡咎吝諸子從之歛以常服姚崇遺令吾亡丨丨丨丨四時衣各一堯典狥葬後漢周磐堅伯云命終之日桐棺足以周身外槨足以周棺歛形懸封濯衣幅巾冩堯興一篇置棺前示不忘聖道學者以為知命焉孝經為殯梁元帝金樓子曰吾之亡也可以一卷孝經一帙老子陶華陽劔一口以自隨外此珠玉不入銅鍚勿藏也田國譲求葬於西門豹側杜元凱求葬於祭仲冡邉曹子藏求葬於蘧伯玉側梁伯鸞求葬於要離之傍彼四子者異乎吾之意也金蠶無吐􅁝之實瓦雞無司晨之用謹母以血膻膋腥為祭也棺槨之造起自軒轅周室有廧翣之飾晉文公請隧桓司馬石槨甚亡謂也又見後皇甫謚事布車載柩唐書魏徵陪葬昭陵妻裴氏曰證平生儉素今以一品禮葬羽儀甚盛非亡者之志悉辭不受竟以丨丨丨丨無文采之飾桐瓦為棺楊行宻卒遺令穀葛為衣丨丨丨丨夜葬山谷人不知所在雜木為棺楊震臨死曰不能誅患身死丨丨丨丨布單盖形勿歸冡次勿設祭祀也聚沙為牀趙岐字邠卿遺令子曰墓中丨丨丨丨布簟白衣散髪其上覆以單被即日便下戒使周棺太山太守嚴望終於家遺言以身服歛棺周於身土周於棺也戒勿立碑唐司勲致仕李建勲且死戒家人曰時事如此吾得良死幸矣勿封土立碑聴人耕種於其上免為他日開發之標及江南亡也諸貴人髙大之冢無不發者惟建勲莫知其處作臝葬書楊王孫者孝武時人家業累千金厚自奉養生亡所不致及病且終先令其子曰吾欲臝葬以反吾真必亡昜吾志則為布囊盛尸入地七尺既下從足引脫其囊以身親土其子不忍廼往見王孫友人祁侯祁侯與王孫曰子欲臝身先人於地下乎王孫報之以書曰蓋聞古之聖王縁人情不忍其親故為制禮今則越之吾是以臝葬將以矯世也夫厚葬誠亡益於死者而俗人競以相髙靡財殫幣腐之地下或廼今日入而明日發此真與暴骸於中野何異且夫死者終生之化而物之歸者也歸者得至化者得變是物各反其真又曰精神者天之有也形骸者地之有也精神離形各歸其真故謂之鬼鬼之言歸也其尸塊然獨處寧有知哉褁以幣帛鬲以棺槨交纒絡束口含玉石欲化不得欎為枯腊千載之後棺槨朽腐乃得歸土就其真宅由是言之焉用乆乎昔帝堯之葬也窽木為櫃葛藟為緘其穿下不亂泉上不泄殠故聖王生易尚死易葬也楊王孫著篤終論生不能保七尺之軀死何故隔一棺之土然則衣衾所以穢尸棺槨所以隔真故桓司馬不如速朽季孫璠璵比之暴骸文公厚葬春秋以為華元不臣漢王孫親土漢書以為賢於秦始皇夫葬者藏也藏也者欲人不得見也而大為棺槨備存器物無異埋金路隅而書表於上也吾氣絶之後便即時服幅巾故衣以籧篨裏尸擇不毛之地穿坑下尸平生之物皆無自隨惟齎孝經一卷示不忘孝籧篨之外便以親上若不如此則寃悲没世長為恨鬼皇甫謐合葬合葬非古季武子成寢杜氏之墓在西階之下請丨丨焉許之入宮而不敢哭武子曰合葬丨丨也自周公以來未之有改也吾許其大不許其細何居命之哭記祔葬不筮丨丨者丨丨宅注謂祔先塋不改卜墓也魯人合祔衛人之祔也離之丨丨之祔也合之善夫注祔合葬也離謂棺中間之合謂棺中無間善夫善魯也孔氏合葬孔子少孤不知其墓問於郰曼父之母然後得合葬於防記同墳異藏後漢樊重遺令使與吏人丨丨丨丨招䰟合葬後漢鄧晨娶世祖妹新野公主遇害後晨卒詔令招公主䰟與晨合葬歸葬願得歸葬韋𤣥成嗣封扶陽侯初父賢葬平陵𤣥成後徙杜陵病且死因使者自白曰不勝父子恩願乞骸骨歸葬父塋上許焉夢求歸葬後漢温序為䕶羗校尉為隗囂將所拘伏劍而死主簿從事持尸歸殮光武聞而憐之命送葬到洛陽賜城旁為冡長子壽夢序告曰乆思客鄉里壽即棄官上書乞骸骨歸葬帝許之乃返舊塋李徳裕貶死朱崖見夢於令狐綯曰公幸哀我使我歸葬綯曰衛公精爽可畏不言禍將及乃白於帝得以䘮還𤨏言責不歸葬晉王褒與管彦許為婚彦葬父河南褒更嫁其女謂彦弟馥曰賢兄葬父洛陽則京邑人也非結好本意馥曰嫂齊人也當還齊褒曰安有葬父河南而隨嫂還齊用意如此何婚之有坐不歸葬陳夀為治書御史母遺言葬洛陽壽不遵其㫖夀巴西安漢人丨丨以母丨丨沉累數年令勿還葬後漢崔瑗臨終命子曰人終歸精於天歸骨於地不可不藏形勿歸鄉里子寔字太真奉遺令葬於洛陽各欲為葬晉王祥二子芬烈將死烈欲還葬舊鄉芬欲葬京邑祥泣曰不忘鄉土仁也不戀本逹也唯仁與逹二子有焉託遣喪歸後漢范式字巨卿受業太學長沙陳平子病謂妻曰吾聞山陽有巨卿烈士也可以託吾没後但以尸埋巨卿戸前乃裂素書以遺巨卿時式出還省書悽愴向墳悒哀哭甚以為死友營䕶平子妻兒自送喪於臨湘未至四五里委素書於棺上而去其兄弟聞之尋求不復見助歸葬費栁子厚之得歸葬也費皆出觀察使河東裴君行立行立有節槩重然諾與子厚結交子厚竟頼其力墓誌送葬送車千乘西漢劇孟葬母自逺方丨葬盖丨丨丨本傳縞服數百崔日用御井州長史卒井人懐其惠吏民皆送䘮丨丨者丨丨四方來會陳蕃竇武為閹人所害林宗哭之於野悅然而歎曰人之云亡邦國殄瘁瞻烏爰止不知于誰之屋耳明年卒丨丨之士千餘人皆丨丨葬百官拜哭李晟及葬帝御望春門臨送遣謁者宣詔于柩車丨丨丨丨于道吹簫㑹葬周勃丨丨來丨丨停柩候送范式字巨卿張劭字元伯相與為友元伯寢疾而卒式怱夢元伯呼曰巨卿吾以某日死以某時葬子未我忘豈能相及式便服朋友之服馳往赴之式未及到而喪已發引既至壙將窆而柩不肯進其母撫之曰元伯豈冇望耶遂丨丨移時乃見有素車白馬號哭而來母曰是必巨卿也式因執紼而引柩於是乃前本傳殉葬宋公用殉丨文丨卒始丨丨君子謂華元樂舉於是不臣左傳陳妻謀殉陳子車死於衛其妻與其家大夫謀以殉乃告陳子亢曰夫子疾莫養於下請以殉葬子亢曰以殉非禮也雖然則彼疾當養者孰若妻與宰不得已則吾欲以二子者為之於是不果用禮三良為殉秦穆公卒以子車氏三子奄息仲行鍼虎為殉皆秦之良也國人哀之為之賦黄鳥二婢夾殉陳乾昔寢疾屬其兄弟而命其子尊已曰如我死則必大為我棺使丨丨子丨我其子曰以丨葬非禮也况又同棺乎不果殺左傳與魏顆事相類見前遺言賜葬御賜輼輬孔光薨上賜轀輬及副各一乗輓送車萬餘輛道路皆舉音以過喪本傳特給㨹車韋杭歴職以清儉及終無以葬元宗聞之丨丨丨丨令給班劔魏徴薨給羽葆鼓吹班劔四十人陪葬昭陵餘見前薄葬下房元齡薨給班劔羽葆鼔吹絹布二千叚粟二千斛陪葬昭陵詔給儀仗太和初王承元祖母喪詔曰武俊當横流時極定奔潰功在史官母李不幸贈恤宜加厚且給儀仗以葬賜以壽器梁商薨丨丨東園朱丨之丨銀鏤黄腸注器棺也以朱飾之以銀鏤之前漢音義曰以栢木黄心為郭曰黄腸也及葬賜輕車介士注云輕車兵車介士甲士也賜與墳塋唐髙宗詔賜英國勣墳塋一所時勣猶在命官建塜唐劉昌節度涇原初城平涼當吐蕃劫盟後將士骸骨不藏昌命瘞之夕夢若原謝者昌具以聞徳宗下詔哀痛出衣數百稱官為賽具歛以棺槨分建二冡大將曰旌義冡士曰懷忠冡於淺水原詔學士為銘具禮收葬李懷光據河中帝令孔巢父宣慰衆害巢父帝聞震悼詔丨丨丨丨古今合璧事類備要前集卷六十六
