body:
  text: 古今合璧事類備要續集卷三十四宋謝維新撰性行門遺忘事理𤼵揮心為耳目口鼻之主心而遺忘則憒憒焉倀倀焉隨取而隨失隨得而隨喪雖具耳目口鼻而為人而精神已恍惚矣夫以精神有所恍惚則是胸中已無主矣胷中而無主則耳受役於心而聽而聽者遺忘目受役於心而視而視者遺忘口鼻亦受役於心而司味與嗅也而味與嗅者亦莫不與之而遺忘聖賢治心之學葢不若是然故日知其所亡月無忘其所能子夏之語也擇乎中庸得一善則拳拳服膺而弗失之顔子之學也葢聖賢之心天地其鑑也日月其明也凡入于耳觸于目者皆著乎其心雖終其身而不能忘也或者則曰有馬者借人乗之今亡矣夫則孔子未免有所忘也孟獻子有友五人焉曰樂正裘牧仲其三人則予忘之矣則孟子未免有所忘也然是忘也皆聖賢闕疑闕殆之學也非若後世訛𫝊訛謬翼謬惟欲好奇騁博以示其記聞之多耳此豈足為聖賢累哉惟其發憤忘食食可忘也樂以忘憂憂可忘也所忘者小而所不可忘者大所忘者食與憂而所不可忘者理與義聖賢用心殆與衆人不侔矣事類如遺棄予丨丨詩如忘歃丨丨左大忘魯哀公問孔子曰魯有丨丨徙而忘其妻有諸孔子曰此忘之小者也昔商紂有臣曰王子須務為諂使其君樂湏㬰而忘終身之憂家語迷忘秦人逄氏有子少而恵及壯而有丨丨之疾聞歌以為哭視白以為黑饗香以為臭嘗甘以為苦行非以為是列子病忘宋陽里華子中年丨丨朝取而夕忘夕與而朝忘在塗則忘行在室則忘坐魯有儒生能治之試屏左右獨與居室七日從之莫知其所施為也而積年之疾一朝都除注引華子之忘同于自然以明無心之極同上坐忘顔回曰回益矣仲尼曰何謂也曰回忘仁義矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回忘禮樂矣曰可矣猶未也他日復見曰回益矣曰何謂也曰回丨丨矣仲尼曰何謂丨丨回曰隨肢體黜聰明離形去知同于大通此謂丨丨莊大宗師予忘孟獻子有友五人焉樂正裘牧仲其三人則丨丨之矣孟不能舉趙簡子之子長曰伯魯幼曰無恤將置後不知所立乃書訓戒之辭于二簡以授二子曰謹識之三年而問之伯魯丨丨丨其辭求其簡已失之矣威烈王紀不能記張安世長子千秋與霍光子禹俱為中郎將將兵隨度遼將軍范明友擊烏桓還謁大將軍光光問千秋戰鬭方略山川形勢千秋口對兵事畫地成圖無所忘失光復問禹禹丨丨丨曰皆有文書光由是賢千秋以禹為不材嘆曰霍氏世衰張氏興矣漢張安世𫝊失其本經濟南伏生年過九十丨丨丨丨口以傳授裁二十篇尚書序忘其前語漢師丹㑹有上書言古者龜貝為貨今以錢易之民故貧宜改幣上以問丹丹時言可改章下有司議難卒變丹老丨丨丨丨惶遽誤對石勒事見前忌諱門恍惚多遺北齊劉臻位儀同性丨丨躭經覃思丨所丨忘有劉訥者亦仕儀同俱為太子學士臻住城南訥住城西臻俄欲尋訥謂從者曰汝知劉儀同家從者謂臻欲還家於是引之而去既至叩門尚未悟謂至訥家乃大呼曰劉儀同可出其子迎門臻驚曰汝亦來邪子曰此是大人家於是顧眄久之乃語叱從者曰汝大無意吾欲造劉訥耳卿為我思唐𤣥宗欲用嘉貞而忘其名夜詔中書侍郎韋抗曰朕嘗記其風操而今為北方大將張姓而複名丨丨丨丨之抗曰非張齊丘乎帝即使作詔以為相夜且半因閲大臣表疏舉一則嘉貞所獻遂得其名張嘉貞傳卿自難記許敬宗性輕見人多忘之或謂其不聰乃曰丨丨丨丨若遇曹劉沈謝暗中摸索着亦可識國史纂異忘記易帽客有造胡文恭宿者具公服靴版而丨丨不丨丨胡公與之對語盡禮而退終未嘗色動吕氏家塾記忘記書名韓魏公在魏府寮屬路拯者就案呈有司事而狀尾忘書名公即以袖覆之仰首與語稍稍濳卷丨丨以授之别錄錯誤事理發揮夫人不言言必有中夫人不為為必有成言動云為不可茍也故言輕發則招辱行輕動則招憂言行君子之樞機樞機之發其可不謹哉一發之不謹則小者誤其身大者誤家國而又其大者誤天下與來世始謀之不審其末流之弊一至于此吁事類差繆丨之毫釐千里之丨易繫過誤宥過無大注丨丨所犯雖大必宥錯亂其餘丨丨磨滅弗可復知尚書序違闕見其丨丨孟序書舉燭鄭人有遺燕相國者夜書謂持燭者曰舉燭而誤丨丨丨燕相受書曰舉燭髙明髙明者舉賢而任之韓子中副車張良韓人秦滅韓良以家財求客刺秦王為韓王報仇東見倉海君得力士為鐵椎重百二十斤秦王東游至博浪沙中良與客狙擊秦皇帝誤丨丨丨秦皇怒求賊急甚良乃變姓名匿下邳良𫝊書馬恐誤石建為郎中令奏事下讀之驚恐曰丨丨者與尾而五今乃四不足一獲譴死矣其為謹畏雖他皆如此注馬字下曲者為尾并四㸃為四足凡五唱名而誤東漢王愔典選令史丨丨誤以盧士深為士琛深自呼其名愔曰盧郎朗潤所以加玉誤對忌諱石勒事見前忌諱門注誤達空函桓温將以殷浩為尚書令遺書告之浩欣然許焉荅書恐繆丨開閉者十數竟丨丨丨大忤温意由是遂絶必誤天下晉王衍字夷甫神清明秀風姿詳雅總角嘗造山濤濤嗟嘆良久既去目而送之曰何物老嫗生此寧馨兒然誤天下蒼生未必非此人也本傳誤墨畫蠅曹不興善畫吳王使不興畫屏風墨落㸃素因就以作蠅既御權以為生蠅舉手彈之呉興雜録誤食蟛蜞晉蔡謨字道明初渡江見蟛蜞大喜曰蟹有八足加以二螯令烹之既食吐下委頓方知非蟹後詣謝尚而説之尚曰卿讀爾雅不熟幾為勸學誤死聚鐵鑄錯羅紹威帥魏博以牙軍驕恣盡殺之由此勢弱為梁祖所制乃曰聚六州四十三縣鐵打一箇錯不成也五代史乗快指揮太祖皇帝一日忽不樂曰比丨丨丨丨一事而誤故爾長編詩集持蠡測海謬丨丨丨丨杜看鳥應人仰面貪丨丨囘頭錯丨丨杜鑄此一大錯不知幾州鐵丨丨丨丨丨坡古今合璧事類備要續集卷三十四
