body:
  text: 古今合璧事類備要别集卷二十九宋謝維新撰花卉門海棠花格物藂話按唐李賛皇集花本以海為名者悉從海上來海棠是也此花未知其所從始也至南朝時沈約始以詩詠之今閲此花乃五出初則極紅如臙脂㸃㸃及開則漸成纈暈比其落也則若宿粧淡粉彼有謂其似木𤓰林檎二花者恐非真是或者特棠棃花爾然此花惜其有色而無香盖亦未得造化之全而其有色而又有香者惟蜀中嘉州種為然世傳其木獨合抱與它所不侔也然江浙間又令有一種柔枝長蔕者顔色淺紅垂英向下如日蔫乃謂之垂絲海棠與此大不類盖强名爾善品題者不可以一槩故併及之事類太真被酒明皇登沉香亭召太真妃子丨丨時夘醉未醒命力士從侍兒扶掖而至妃子丨丨醉顔殘粧鬂亂釵横不能再拜明皇笑曰此真海棠花睡未足耳太真外傳子美無詩杜丨丨母名海棠所以集中丨海棠丨詩話羅隐一本丨丨為錢塘令嘗手植海棠丨丨於舊治庭前王禹偁有詩賦之淵材三恨楚丨丨有丨丨一恨鰣魚多骨二恨金橘太酸三恨海棠無香詩詁花中神仙唐相賈耽著百花譜以海棠為丨丨丨丨花木録花中名友曽端伯十友調笑令取友於十花云云名友海棠也仍有玉友來奉佳賔酒也詞話作海棠窠徐老丨丨丨丨飲其上黄山谷詩注和海棠題真宗御製後苑雜花詩以海棠為首賜近臣唱和洗立志恨不同時以梅聘海棠似丨丨丨丨耳金城記詩集開未落野索丨丨丨沈約􅀞不真名園封植幾經春露葉煙梢丨丨丨多謝許昌傳雅什蜀都曽不遇詩人賈島㫁鶯腸濃淡芳春滿蜀郷乍隨風雨丨丨丨浣花溪上空惆悵子美無心為發揚鄧谷宿蝶枝春風用意匀顔色銷得携觴與賦詩艶麗最宜新着雨妖嬈全在欲開時莫愁淺黛臨忩懶果信丹青㸃筆遟朝醉暮吟㸔不足羡他胡蝶宿深枝同前側卧㸔海棠花在否丨丨捲簾丨韓偓移不得一枝低𢃄流鸎睡数片狂和舞蝶飛堪恨路長丨丨丨可無人與畫将歸鄭谷燕支色丨丨丨欲滴紫蠟􅎞何長梅聖俞神仙品不奈丨丨丨何辜造化恩煙愁思舊夢雨泣怨新婚畫恐明妃恨移同卓氏犇王荆公笑粲粲髙枝丨丨丨低枝明皪皪但與風相撩不與風相得風吹莫苦急游子嘆日妟云云梅聖俞繁衮衮未知此日家園樂数遍丨枝丨丨紅宋景文公絲絲蕚欎欎蒼髯真道友丨丨紅丨是卿人坡揺揺花丨丨墻頭丨脉脉含幽姿王岐山霞藏日盛若丨丨丨鮮如血灑空髙低千㸃赤深淺半開紅粧指朱纔布膏唇檀更融色焦無可厭躰痩不成豊石曼卿錦為天西域流根逺中都属賞偏初無可比色意不許勝妍薄暝霞烘爛平明露濯鮮長衾綉作地宻帳丨丨丨宋景文公名花幽獨江城地瘴蕃草木只有丨丨苦丨丨嫣然一笑竹籬間桃李漫山總麄俗也知造物有深意故遣佳人在空谷自然富貴出天姿不待金盤薦華屋朱唇得酒暈生臉翠䄂捲紗紅映肉林深霧暗曉光遟日煖風輕春睡足雨中有淚亦悽慘月下無人更清淑先生飽食無一事散步逍遙自捫腹不問人家與僧舍拄杖敲門看修竹忽逢絶艶照衰朽歎息無言揩病目陋邦何處得此花無乃好事移西蜀寸根千里不昜到䘖子飛來定鴻鵠天涯流俗俱可念為飲一樽歌此曲明朝酒醒還獨來雪落紛紛那忍觸坡媚柯攅仄丨丨丨丨倚春暉封植寕同北枳移台嶺分霞爭抱蕚蜀宫栽錦鬬纒枝宋景文公垂絲海棠花别得一風光垂絲丨丨丨丨丨誰道全輸蜀海棠風攪玉皇紅世界日烘青帝紫衣裳懶無氣力仍春醉睡起精神欲曉粧舉似老夫新句子看渠桃李敢承當香曬一絇絲無波可照底湏窺與桞爭妍也學垂破曉驟晴天有意生丨新丨丨丨丨楊廷秀新晴生睡思不関殘醉未醒鬆不為春愁懶散中自是丨丨丨丨丨起來無力對春風楊廷秀風前不自持宛轉丨丨丨丨丨妖嬈㣲傅淡胭脂花如剪綵層層見枝似輕絲裊裊垂斯菴棠棃花棠梨葉野客歸時山月上丨丨丨顫暝禽呼百氏集棠梨花東風二月淮隂郡惟見丨丨一樹丨劉啇樂府腰支裊碧紗影弄東風曉一夜海棠開了枝上数聲啼鳥粧㸃愁多少妬雨恨雲丨丨丨眉黛不忺重掃薄倖不來春已老羞帶冝男草桃源憶故人歐陽公胭脂淡海棠珠綴一重重清曉近簾櫳丨丨誰與匀丨偏向臉邉濃風看葉嫩惜花紅意無窮如花如葉嵗嵗年年共占春訴𠂻情晏元献賸摘繁枝前日海棠猶未破㸃㸃胭脂染就真珠顆今日重來花下坐亂鋪宫錦春無那丨丨丨丨簮幾朶痛惜輕怜只恐芳菲過醉倒何妨花底卧不湏紅袖來扶我蝶戀花張林甫妖嬈一樹羣芳未盡是海棠時候雨過寒輕好晴晝最丨丨丨丨全是初開雲鬟小粉施朱未就全開還自好駘蕩春餘百様宫羅鬬繁綉縱無語也應心恨我來遟恰桞絮将春歸後醉猶倚柔枝怯黄昏這一㸃愁湏共同花痩洞仙歌晁無咎踈枝低繞常嵗海棠時偷閒湏到多病尋芳懶春老偶來恰值半謝妖嬈猶好便呼詩酒伴同傾倒我繁枝髙䕃丨丨丨丨花底玉盤花影照多情一片恨歸來早㫁腸鋪碎錦門前道感皇恩晁無咎柔英未吐醉痕潮玉愛丨丨丨丨露華如簇絶艶矜春分流芳金谷風梳雨沐耿空抱夜䦨清淑杜老情踈黄州賦冷誰怜幽獨錦園春張于湖芳塵休撲丨丨丨丨名花喚我相隨逐淺粧不比梅欺竹深注朱唇粉面稱紅燭阿嬌合貯黄金屋是誰却遣來空谷酏顔遍倚䦨干曲一段風流不枉到西蜀醉落魄京松坡鏜春風得意馬蹄塵樸丨丨丨丨笙歌逐欵門不問誰家竹只揀紅粧髙處燒銀燭曲碧雞坊裏花如屋燕王宫下花成谷不湏悔唱關山只為海棠也合來西蜀范石湖棣棠花格物藂話棣棠即棠棣也樹似白楊其名稱不一或曰夫移或曰奥李或曰欎梅或又曰苞棣有曰常棣者有曰唐棣者詩記爾雅可攷而見矣世傳其花反而復合鄂鄂然其盛􅙽􅙽然其光明是誠有取云耳事類鄂不􅙽常棣燕兄弟也閔管蔡之失道故作常棣焉常棣之華丨丨丨􅙽疏鄂猶鄂鄂然言外發也􅙽􅙽光明也箋承華者鄂鄂足也鄂足得華之光明則􅙽􅙽然盛喻弟以敬事兄兄以榮覆弟恩義之顕亦􅙽􅙽然又云常棣花反而復合詩小雅偏其反唐棣之華丨丨丨而豈不爾思室是逺而子曰未之思也夫何逺之有此逸詩也唐棣移也華反而後合賦此詩者以言權道反而後至於大順思其人而不得見者其室逺也以言思權而不得見者其道逺也夫思者常思其反反是不思所以為逺能思其反何逺之有言權可知唯不知思爾思之有次序斯可知矣晉孫綽賦豈以梨有用之為貴杜無用之為賤昔在召伯聴訟述職甘棠作訟垂之罔極詩集佛輪公帶潘賦幽芳在周詩榮蕚傳丨丨千幅細丨丨萬傳圓宋景文公􅀈服仙盤更衣入侍宫中貴􅙽􅙽芸黄殿後花鬬色長宜日光近生輝尤喜盖隂斜依稀丨丨開風􅃑約畧丨丨裛露華不與艶桃偷結子漫天飛去作朝霞梅聖俞樂府宫様粧成花為年年春昜改待放柔條繫取春長在丨丨丨丨還可愛鬢邉斜作拖枝戴􅈁毎到無情風雨㬠㸃檢羣芳却是深叢耐搖曵羅金帶丹青傳得妖嬈態蝶戀花王道輔古今合璧事類備要别集卷二十九
