body:
  text: 古今合璧事類備要前集卷五十六宋謝維新撰技術門工畫事類六法畫有丨丨一曰氣韻生動二曰骨力用筆三曰應物象形四曰隨類賦彩五曰經營置位六曰傳移模寫畫品諸師丨大幻丨求太隂精用和幻藥是諸師等手執方諸承月中水周禮注鏡謂之方諸楞嚴經畫像難易顧愷之曰畫人最難次山水次狗馬若臺閣一定器耳韓子曰狗馬難鬼神易狗馬乃凡俗所見鬼神則譎怪之狀名畫記畫學源流上古之畫迹簡而意淡顧陸之流是也中古之畫細宻而精微展鄭之流是也呉𤣥縱以怪石崩灘山水之變始於道𤣥成於李思訓父子樹石之狀妙於韋偃窮於張通又若王右丞之深重楊僕射之竒贍王宰之巧宻劉商之取象名畫記畫塑一法古丨丨丨丨楊惠之與呉道子同師張僧繇學畫惠之見道子筆法已至不服居其次乃去學塑亦為古今第一邵氏録詩畫三絶唐鄭䖍善圖山水嘗自寫其丨并丨以獻帝大署其尾曰鄭䖍丨丨正經三史晉顧愷之陸探微張僧繇北齊楊子華隋董仲仁展子竒唐呉道子鄭䖍皆名畫顧陸張呉為丨丨楊鄭董展為丨丨餘畫為百家名畫記畫家三祖晉以來顧長康張僧繇陸探微所畫通神為丨丨丨丨談實録畫思入神唐王維字摩詰善丨丨丨丨至山平水逺雲勢石色繪工以為天機所到也本傳畫手通神開元中李思訓畫大同殿壁明皇喻之曰卿所畫夜聞水聲真通神佳手灸轂子畫學第一荆浩曰山水之學呉道子為有筆無墨項容有墨無筆王維李思訓之流不數也其所立可知矣然入吾本朝如長安闗同營丘李成原范寛之絶藝荆浩者工不數也故本朝丨丨古今丨丨邵氏録畫家世師五代營丘李成字咸熙尤妙畫山水王朴與之善畫平逺寒林氣韻瀟洒古今一人真丨丨百丨丨也昔稱王維李思訓之徒不可同日而語其後燕貴翟阮深許道寧僅得一體退朝録神彩飛動王鉷據陜州集天下良工畫夀聖寺壁為一時妙絶畫工凡十八人皆殺之使天下不復有此筆今佛毋壁最竒丨丨丨丨鬼母瘐佛次之筆談神氣迥出國初江南布衣徐熙偽蜀翰林待詔黄筌皆善畫著名筌與二子居寶惟亮皆隸圖畫院其後徐熙至京師送畫院品其畫格諸黄妙在傅色巧細不見墨迹但以輕色染成徐熙以墨筆畫之殊草草畧施丹粉丨丨丨丨别有飛動之意筌惡其軋已言其畫麄惡不入格罷之熙之子乃效諸黄格更不用墨直以彩色圖之謂之没骨圖工與諸黄不相上下筌等不復瑕疵遂得齒院品然其氣韻皆不及熙逺甚湘山野録解衣槃礴宋元君將畫圖衆史皆至䑛筆和墨在外者半有一史後至者儃儃然不趍受揖不立因之舍公使人視之則丨丨丨丨羸君曰可矣是真畫者也莊子登樓揮染顧愷之建層樓為畫所疾風暴雨烈暑祁寒並不下筆炎涼皆過天地明朗時乃染毫丨丨去梯妻子罕見南齊謝奕畫品醉中揮墨永嘉僧擇仁畫松一日夢看四百條龍自是臻於神每醉揮墨醒後乃補之形狀極於竒怪常醉永嘉市顧竹壁取拭盤布濡墨洒其上來日少増修為狂根枯枿人伏其神筆談醒後畫地蜀有孫大古善畫山水又有李懷衮雖夜中酒醒睡覺得意時急起畫於地遲明寫之則優於平居所畫也東齋記事立本畫師太宗與侍臣泛舟春苑池見異鳥容與波上恱之詔坐者賦詩而召閻丨丨侔狀閣外傳呼閻立本閻立本是時已為主爵郎中俯伏池左研吮丹粉望坐者羞恨流汗歸戒其子曰吾少讀書文辭不减儕輩今獨以畫見名與厮役等若曹慎母習本傳子華畫聖北齊楊丨丨畫馬於壁每夕必踶齧長鳴號為丨丨李嗣真畫品黄筌逼真丨丨蜀人善丹青凡所操筆皆丨丨與其子居寳從孟昶歸朝居寳字伯鸞善畫竹蘇易簡得其墨竹圖李宗諤作贊名畫評周昉絶冠丨丨窮丹青之妙至畫美人女子為古今丨丨畫斷取軸棄畫王涯居永寧里名書畫以金玉為奩軸鑿垣貯之重複固祕及被誅為人破垣剔丨奩丨金玉而丨其書丨於道發㕑取畫顧長康曽以一㕑畫糊題寄桓𤣥皆其所珍惜者𤣥乃丨丨丨之封題如初丨並不存直云妙畫通靈變化而去了無怪色世説觀畫修福吳道𤣥字道子畫地獄變相後成都人來觀咸懼罪修福田兩市屠沽魚肉不集朱景𤣥畫斷觀畫施錢顧愷之建康實録注云京師寺記興寧中瓦棺寺初置僧衆設㑹請朝賢鳴刹注疏其時士大夫無有過十萬者既至長康直打刹注一百萬長康素貧時以為大言僧後寺成請勾疏長康曰宜備一壁遂閉户往來一百餘日畫維摩一軀工畢將欲㸃眸子謂寺僧曰第一日開見者責施十萬第二日開可五萬第三日開可任例責施及開户光明照寺施者填咽俄而果百萬錢也啜茶觀畫經筵承受張茂嘗招講官丨丨丨丨程明道先生曰吾平生不啜茶亦不識畫竟不往龜山語録洗手觀畫非好事不可妄傳書畫近火不可觀書畫向風日正涕唾不丨丨並不可丨書丨昔桓𤣥愛重圖畫每示賔客有非好事者正食寒具如今之油煑環餅以手捉書畫大㸃汚𤣥惋惜移時自後每出法書輒令洗手水衡記以大觀小李成畫山上亭館及樓塔之類皆仰畫飛簷其說以為自下望上如人平地望塔簷間見其榱桷此謬論也大都山水之法葢丨丨丨丨如人望假山以上望下只合見一重山又如屋舍不應見中庭及後巷李君不知丨丨丨丨之法折高折逺自有妙理豈在掀屋角也出筆談以小為大畫牛虎皆畫毛惟馬不畫毛予以問畫工不能對大凡畫以大為小所以毛細不可畫牛虎雖是以大為小但牛虎深毛馬淺毛理宜有别故名為小牛小虎約掠拂拭自有神觀若畫馬如牛虎之大理當畫毛葢見小馬無毛遂亦不比庸人襲迹非可與論理也同上當辨時代呉道子畫仲由戴木劍閻令公畫昭君着帷帽殊不知木劍創於晉代帷帽興於本朝舉此凡例亦畫之病也且如幅巾傳於漢魏羃䍦起自齊隋幞頭用於周朝巾子創於武徳胡服靴衫豈可輙施於古象衣冠組綬不宜長用於今人芒屩非塞北所宜牛車非嶺南所有詳辨古今之物商較上風之宜指事會形然後可以議畫水衡妄寫形狀有藏戴崧牛鬭與客觀旁有一牧童曰牛鬭力在前尾入兩股間今尾掉何也頭黄筌畫飛鴈頭足皆展不知飛鳥縮則展足縮足則展頭無兩展者筆記下生枯筆唐張藻善畫嘗以手握雙筆一時齊丨一為丨枝一為丨枝生枝則潤含春澤枯枝則乾裂秋風畫斷畫晝夜牛本朝太宗時李至獻丨牛丨則齧草欄外丨則歸卧欄中莫曉其理僧贊寧曰此幻藥所畫南海倭國有蚌淚和色着物畫見夜隠沃焦山有石磨色染物畫隠夜見海外記遶欄畫花蜀有趙昌善畫花每晨露遶欄諦玩手中調色寫之自號寫生趙昌人謂趙畫染成驗之者以手捫摸不為采色所隠者乃直也東齋記事倚墻寫景度支員外郎宋迪工畫龍善為平逺山水其得意者有瀟湘八景往嵗卜窰村陳用之善畫迪見其畫山水謂用之曰汝畫信工但少天趣且謂用之曰汝先當求一敗墻張絹素訖丨之敗丨之上朝夕觀之既久隔素見敗墻之上高平曲折皆成山水之象心存目想高者為山下者為水坎者為谷缺者為澗顯者為近晦者為逺神領意造恍然見其有人禽草木飛動往來之象了然在目則隨意命筆黙以神會自然景皆天就不類人為是謂活筆用之自此畫格進筆談雪裏芭蕉書畫之妙當以神㑹難以形器求也世之觀畫者多能指摘其間形象位置彩色瑕疵而已至於奥理㝠造者罕見其人如彦逺畫評言王維畫物多不問四時如畫花往往以桃杏芙蓉蓮花同畫一景予家所藏摩詰畫哀安卧雪圖有雪中芭蕉此乃得心應手意到便成故造理入神迥得天意此難以與俗人道同上日中牡丹歐公得一古畫牡丹下有猫呉正肅開闕也其花披哆而色燥此丨丨時花曰此正午牡丹不同黒睛如線正午猫眼也歸田録詩集天工論畫以形似見與兒童隣賦詩必此詩定知非詩人詩畫本一律丨丨與清新邊鸞雀寫生趙昌花傳神如何此兩幅疎淡含精匀誰言一㸃紅解寄無邊春枝書王簿侣天巧瘦竹如幽人幽花如處女低昂枝上雀揺蕩花間雨若人留丨丨春色入毫楮懸知生㑹扇寄聲求妙語同上寫佛貴人多金身復閑争買書畫不計錢已將鐵石充逸才更補朱繇為𤣥煙道薰屋漏裝玉軸鹿皮蒼璧知誰賢呉生丨丨本神授夢中幻化飛空仙覺來落筆不經意神妙不到秋毫巔我昔長安見此畫嘆惜至寶空潜然素絲斷續不忍看已作蝴蝶飛聨翩志公彷彿見刀尺脩羅天女由嗤妍如觀老杜飛鳥句脫字欲補知無縁貴人一見空羞忤錦囊千紙何足捐不須更用博麻縷付與一炬隨飛烟坡旻畫畫意古畫丨丨不畫形梅詩詠物無隠情忘形得意知者寡不若見詩如識畫歐陽公盤軍圖畫山玉堂畫掩春日閑中有郭熙丨春丨鳴鳩乳燕初睡起白波青嶂非人間離離短幅開平逺漠漠疎林寄秋晚却似江南送客時中流回頭望平巘伊川佚老鬢如霜卧看秋山思洛陽為君紙尾作行草炯如嵩洛浮秋光我從公遊如一日不覺青山映黄髪為畫龍門八節灘待向伊川買泉石東坡題文潞公跋郭熙畫畫竹植物之中竹難寫古今雖畫無似者蕭郎手下獨逼真丹青以來唯一人人丨丨身肥擁腫蕭畫莖瘦節節竦人丨丨梢死羸垂蕭畫枝活葉葉動不根而生從意生不笋而成由筆成野懷水邊碕岸側森森兩叢十五莖嬋娟不生筠粉態蕭颯盡得風烟情舉頭忽看不似畫低耳静聽疑有聲西叢七莖勁而健省問天竺寺前石上見東叢八莖疎且寒憶曽湘妃廟裏雨中看幽姿逺思少人别與君相顧空長嘆蕭郎蕭郎老可惜手戰眼昏頭雪白自言便是絶筆時從今此竹尤難得白居易贈蕭恱畫松天下幾个丨古丨畢宏已老韋偃少絶筆長風起纎末滿堂動色嗟神妙兩株􅆭裂苔蘚皮屈鉄交錯回高枝白摧朽骨龍虎死黒入太隂雷雨垂松根胡僧憩寂寞厖眉皓首無住着偏袒右肩露雙脚葉裏松子僧前落韋侯韋侯數相見我有一匹好素絹重之不减錦綉段已今拂拭光凌亂請君放筆為直榦老杜韋偃雙松歌老夫清晨梳白頭𤣥都道士來相訪握髪呼兒延入户手提新丨青丨障障子松林静杳㝠憑軒忽若無丹青隂崖却承霜雪榦偃葢反走虬龍形老夫平生好竒古對此興與精靈聚已知仙客意相親更覺良工心獨苦松下丈人巾屨同偶坐自是商山翁悵望聊歌紫芝曲時危慘淡來悲風題李尊師松畫梅到畫無鹽醜不除此花風韻更清姝從教變白能為黒桃李依然是僕奴病眼昏花已數年只應梅蕋故依然誰教也作陳𤣥面眼亂初逢未敢憐粲粲江南萬玉妃别來幾度見春歸相逢京洛渾依舊唯恨緇塵染素衣含章簷下春風面造化功成秋毫意足不求顔色似前身相馬九方臯自讀西湖處士詩年年臨水看幽姿晴窻畫出横斜影絶勝前村雪夜時陳去非和張䂓臣五絶風雨山深岩高石壁青白日忽變天晦㝠黒丨駈雲走不停驚電疾丨來如傾山前雨㸃大如手山下水湧危槎横崩崖古樹老有靈吼怒直與丨丨争枝披葉揠鬭不怯萬竅却與藏雷霆鞭驢疾駈者誰子石路險澁驢凌兢目迷心懾愈走愈不及來憩樹下如寒蠅蒼茫直與鬼神接恍惚不保龍蛇驚平居此樂忽入眼孫家古圖纔可辨柰何一幅一尺餘欲奪天地之竒變我心愛之良有以昔苦山行親遇此一生兩足不下堂輸爾朱門貴公子張文潜風雨山水歌江山良工善得丹青理輒向茅茨畫山水地角移來方寸間天涯寫在筆鋒裏日不落兮月長生花片片兮水泠泠經年蝴蝶飛不去累嵗桃花結不成一片石數株松逺又淡近又濃不出門庭三五步坐見丨丨千萬重唐呉融畫山水歌獐猿㕘天古木相繆枝嵌空怪石御青漪兩猿上下一旁掛兩猿熟視蒼蛙