天下說築丨丨之野惟肖書麟閣圖形宣帝甘露三年單于始入朝上思股肱之美乃圖畫其人於麒丨丨法其形貌署其官爵姓名惟霍光不名曰大司馬大將軍博陸侯其未曰典屬國蘇武雲臺圖畫顯宗追感前世功臣乃圖畫二十八將於南宫丨丨始於鄧禹終於耿純其外又有王常李通竇融卓茂合三十二人故依其本第係之篇末以志功名之次惟馬援以椒房故獨不及煙閣繪像太宗貞觀十七年凌丨丨圖畫勲臣河間元王孝恭房梁公元齡杜葉公如晦魏鄭公徵李衛公靖李英公勣虞永興公世南尉遲鄂公敬德段褒公志𤣥合二十二人魏徵亡帝思不已登凌煙閣觀畫像得詩悼痛聞者媢之帝不恱乃停昏仆碑薛收卒太宗親自臨問哀動左右後凌煙圖像嘆曰薛收遂成故人恨不早圖其像傳神工妙晉顧愷之字長康尤善丹青圖寫特妙謝安深重之以為自蒼生以來未之有也愷之每畫人成或數年不㸃目睛曰四體妍蚩本無缺少於妙處丨丨寫照正在阿堵中每重嵇康四言詩因為之圖常云手揮五絃易目送歸鴻難嘗圖裴楷像頰上加三毛觀者覺神明殊勝又為謝鯤象在石岩裏云此子宜置丘壑中欲圖殷仲堪有目疾固辭愷之曰明府正為眼耳若明㸃瞳子飛白拂上使如輕雲之蔽月豈不美乎仲堪從之寫真優劣郭汾陽女壻趙縱令韓幹寫真後又請周昉丨丨二人皆有能名令公嘗列二真畫於坐末定丨丨因女趙夫人歸省問云此何人對曰趙郎也何者最似曰兩畫揔似前畫得趙郎狀貌後畫兼移其神思情性笑語之姿是日定二畫之丨丨畫斷圖賢求贊晉嵇含為郎中時𢎞農王粹以貴公子尚主館宇甚盛圖莊周垂綸之象命舍為贊含援筆為文云畫真人於刻桷之室載退士於進趣之堂可謂託非其所可平而不可贊也畫像索直成都畫師姓許善傳神一日有人敇衣憔悴求傳神許笑之其人解布囊出黄道服鹿皮冠白王簮頂冠易衣危坐以手摩面則童顔矣引其鬚應手而黒乃一美丈夫也許驚曰不知神仙臨降道人曰君傳吾神置肆中有求售止取千錢後有識者云此唐神仙傳朱桃椎也求者輻輳許貪畫直每象輙取二千夢道人曰汝福有限安得過取掌其左頰既寤頭遂偏括異記爭賂畫工王嬙字昭君元帝宮人時後宮人多不得常見乃使畫工圖其形按圖召幸宫人皆賂畫工多者十萬金少者不减五萬昭君自恃其貌獨不與及匈奴入朝選宫人配之昭君以圖當行入辭光彩射人竦動左右天子重信外國悔恨不及窮究其事畫工數人同日棄市怒責畫工党太尉進畫真大怒詰畫師云我前時見畫大䖝猶用金薄㸃眼我豈不消得一對金眼睛㑹類説裴晉公像爾才不長爾貌不揚胡為將胡為相一片靈臺丹青莫狀自贊韓退之像世人畫丨丨丨丨小面美髯乃江南韓熙載耳熙載諡文靖亦謂之韓文公因此謬為退之肥而寡髯後世不復辨也筆談歐陽公像陳后山云丨丨丨丨公家與蘇眉山皆有之而各自是也葢蘇本韻勝而失形家本形似而失韻形而不韻乃所謂畫非傳神乖崖遺像張乖崖守蜀及代去留一卷實封文字與僧正希白且云候十年觀此後十年公薨於陳州訃至蜀人罷市號慟希白為公設大㑹齋請知府凌䇿諫議發開所留文字乃公畫像衣褐繫縚草裹自為贊曰乖則違俗崖不利物乖崖之名聊以表德遂畫於天慶觀仙遊閣為之立祠東坡畫像子瞻堂堂出於峩眉司馬班揚金馬石渠閱士如墻上前論事釋之馮唐言語以為階而投諸雲夢之黄東坡之酒赤壁之笛嬉笑怒罵皆成文章解羈而歸紫微玉堂子瞻之德未變於初爾而名之曰元祐之黨貶之朱崖儋耳方其金馬石渠不自知其東坡赤壁也及其東坡赤壁不自意其紫微玉堂也及其紫微玉堂不自知其朱崖儋耳也九州四海知有東坡東坡歸矣民笑且歌一日不朝其間容戈其一丘一壑則無如此道人何黄魯直賛岌岌堂堂如山如河其愛之也引之上西掖鑾坡是亦一東坡非亦一東坡槁頃黄馘觸時干戈其惡之也投之於鯤鯨之波是亦一東坡非亦一東坡訃東坡之在天下如太倉之一稊米至於臨大節而不可奪則與天地相終始同上六先生像道喪千載聖逺言堙不有先覺孰開我人書不盡言圖不盡意風月無邊庭草交翠晦菴賛濓溪先生揚休山立玉色金聲元氣之㑹渾然天成瑞日祥雲和風甘雨龍德中正厥施斯普賛明道先生規圓矩方䋲直準平允矣君子展也大成布帛之文菽粟之味知德者希孰識其貴賛伊川先生天挺人豪英邁葢世駕風鞭霆歴覽無際手探月窟足躡天根閑中今古静裏乾坤賛康節先生早恱孫呉晚逃佛老勇撤臯比一變至道精思力踐妙契疾書訂頑之訓示我廣居賛横渠先生篤學力行清修苦節有德有言有功有烈深衣大帶張拱徐趍遺象凜然可肅薄夫賛涑水先生三君子像擴仁義之端至於可以彌六合謹善利之判至於可以析秋毫拳拳乎其致主之切汲汲乎其幹父之勞仡仡乎其任道之勇卓卓乎其立心之高知之者識其春風沂水之樂不知者以為湖海一世之豪彼其揚休山立之姿既與其不可傳者死矣觀於此者尚有以卜其見伊吕而失蕭曹也耶晦菴賛張敬夫體備陽剛之純氣含喜怒之正睟面盎背吾不知其何樂端居深念吾不知其何病置之釣臺擦不住寫之雲臺捉不定天下之生久矣以聽上帝之命陳同父賛晦菴以一身而備四氣之和以一心而涵千古之秘推其有足以尊主而庇民出其餘足以範俗而垂世然而狀貌不逾於中人衣冠不詭於流俗迎之而不見其來隨之而莫覩其躅矧是丹青孰形心曲惟嘗見之者於此而復見之焉則不但遺編之可續而已也晦菴賛吕成公楊廷秀自贊汝翎弗長汝趾弗强毋駛汝頑毋競汝驤于崖于濵其窈其茫曀曀其光弋誰汝傷秋作月荒春作花荒哦者遜尫釂者遜狂汝者是鄉莫與汝争鍩又有絡者巾有䉫者杖雲嶠風杉步月獨往龍伯國之民歟無功鄉之民歟又益國晦翁前瞻後視珠玉在側覺我形穢周子充自贊方丈蓬瀛早陪羣英鳳掖鼇扃中敷帝文晚侍嚴宸徧持樞鈞若非精神滿腹則當容貌動人何闕頤而折頞弗走俗而抗塵豈所謂相形不如論心見面不如聞名者耶東坡傳神記傳神之難在目顧虎頭云傳神寫影都在阿堵中其次在顴頰吾嘗於燈下顧自見頰影使人就壁模之不作眉目見者皆失笑知其為吾也目與觀頰似餘無不似者眉與鼻口可以増减取似夫傳神與相一道欲得其人之天法當於衆中隂察之今乃使人具衣冠坐注視一物彼方斂容自持豈復見其天乎凡人意思各有所在或在眉目或在鼻口虎頭云頰上加三毛覺精采殊勝則此人意思葢在鬚頰間也優孟學孫敖抵掌談笑至使人謂死者復生此豈舉體皆似亦得其意思所在而已使畫者悟此理則人人可以為顧陸吾嘗見僧惟真畫曽魯公初不甚似一日往見公歸而喜甚曰吾得之矣乃於眉後加三紋隠約可見作俛首仰視眉揚而頞蹙者遂大似南都程懷立衆稱其能於傳吾神大得其全懷立舉止如諸生蕭然有意於筆墨之外者也故以吾所聞助發云東坡居士書虎頭顧愷之小字也胡公寫真序畫莫難於寫真非寫形似之難寫心之精微為難也葢君子小人貌或類而心不同寫其形似而不得其心之精微或以小人為君子未見其能寫也今夫世俗所謂骨相之至貴者宜莫如秀眉重瞳龍顔鳯姿日角也然堯秀眉魯僖馬卿亦秀眉舜重瞳子項羽朱友敬亦重瞳子漢高龍顔嵇叔夜亦龍顔世祖日角唐高祖亦日角文皇鳯姿李相國亦鳯姿然則魯僖沐猴可以比堯舜而嵇李可以擬漢祖唐宗乎世俗所謂骨相之至惡者宜莫如虎狼蒙魌鳶肩之相也然尼父面如蒙魌陽虎亦如蒙魌竇將軍鳶肩馬賔王亦鳶肩揚食我熊虎之狀班定逺亦燕頷虎頭司馬懿狼顧而周嵩狼抗然則虎可以比尼父而憲之不臣可以比賔王之忠食我之惡可以擬定逺之勲乎故曰君子小人貌或似而心不同寫其形似而不得其心之精微或以小人為君子未見其能寫也胡邦衡贈劉琮詩集寫真將軍魏武之子孫於今為庶為青門英雄割據雖已矣文彩風流今尚存學書初學衛夫人但恨無過王右軍丹青不知老將至富貴於我如浮雲開元之中嘗引見承恩數上南薰殿凌煙功臣少顔色將軍筆下開生面良相頭上進賢冠猛將腰間大羽箭褒公鄂公毛髮動英姿颯爽來酣戰先帝天馬玉花騘畫工如山貌不同是日牽來赤墀下迥立閶闔生長風詔謂將軍拂素絹意匠慘淡經營中斯須九重真龍出一洗萬古凡馬空玉花却在御榻上榻上庭前屹相向至尊含笑催賜金圉人太僕皆惆悵弟子韓幹早入室亦能畫馬窮殊相幹惟畫肉不畫骨忍使驊騮氣凋喪將軍盡善葢有神必逢佳士亦丨丨即今漂泊干戈際屢貌尋常行路人途窮反遭俗眼白世上未有如公貧但看古來盛名下終日坎凜纒其身杜甫贈曹將軍丹青引通神君不見景靈六殿圖功臣進賢大羽東西陳能令將相長在世自古獨有曹將軍嵩高李師掉頭笑自言弄筆曹前身百年遺象誰復識滿朝冠劍多偉人據鞍一見心有得臨窻相對疑丨丨十年江筆穎半脫歸來俛仰慚簮紳一揮七尺倚墻立客來顧我誠殷勤金章紫綬本非有緑簔黄篛甘長貧何如畫作白衣老置之茅屋全吾真蘇子山贈李道士着眼我昔山林人不識或疑謫仙或狂客仰看青天不看人醉裏那知眼青白一擕破硯入長安素衣成緇緑鬢斑上林麒麟着野馬滄洲鷗鷺綴孔鸞漢官威儀既不入貴人様灞橋風雪又不見詩人相不須覽鏡照清溪我亦自憎塵俗狀葉君丨丨秋月明葉君下筆秋風生市人請畫即唾罵只寫龍章鳳姿公與卿肯來為予寫衰貌擲筆掉頭欣入妙相逢可惜遲十年不見詩翁昔年少楊廷秀贈葉徳明信手憶昔射䇿干先皇珠簾翠幄分兩廂紫衣中使下傳詔跪捧再拜開天香仰觀眩晃目生暈但見曉色開扶桑迎陽晚出步就坐絳紗玉斧光照廊野人不識日月角彷彿尚記重瞳光三年歸來真一夢橋山松檜凄風霜天容玉色誰敢畫老師古寺晝閉房夢中神授心有得覺來丨丨筆已忘幅巾常服儼不動孤臣入門涕自滂元老侑坐鬚眉古虎臣立侍冠劍長平生慣寫龍鳯質肯顧草間猿與獐都人踏破鐵門限黄金白璧空堆床爾來模寫亦到我謂是先帝白髮郎不須覽鏡坐自了明年乞身歸故鄉東坡贈寫御容妙善師無敵玉座烟消硯水清龍髯不動彩毫輕乍分龍準山河秀初㸃重瞳日月明宫女卷簾皆暗認侍臣開殿盡遥驚六朝天下應丨丨始覺僧繇浪得名李逺贈寫御真李長史有神世人只數曹將軍誰知虎頭非痴人腰間大羽何足道頰上三毛自丨丨平生狎侮諸公子戯着㓜輿岩石裏故交世世作黄冠布襪青鞋弄雲水坡贈李道士遺像君不見潞州别駕眼如電左手掛弓横撚箭又不見雪中騎驢孟浩然皺眉吟詩肩聳山飢寒富貴兩安在空有丨丨留人間此身常擬同外物浮雲變化無踪跡問君何苦寫我真君言好之聊自適黄冠野服山家容意欲置我山岩中勲名將相今何限往寫褒公與鄂公坡贈何充畫圖我不如森森千丈松我不如濯濯春月栁髯踈鬢秃已雪霜皮皺肉皺真老醜葉生畫時顔尚朱王生畫時骨尚癯一生愛山吟不就兩肩化作秋山瘦君不見褒公鄂公圖凌烟腰間羽箭大如椽君不見浣花醉圖粉墨落日斜泥滑驢失脚貴人貴士兩相嗤畫圖猶在人已非王生王生且停手不如生前一杯酒楊廷秀贈寫真冰鑑處士王温叔古今合璧事類備要前集卷五十六
