body:
  text: 古今合璧事類備要續集卷十宋謝維新撰類姓門蔣古今姓纂周公第三子伯齡封蔣子孫氏焉國在汝南期思縣宋改為樂安漢有蔣許蔣朗事類須良臣魏蔣濟字子通文帝時出為東中郎將詔曰天下未寧要丨丨丨以鎮邊境如其無事乃還鳴玉未為後也社稷器蜀蔣琬字公琰零陵湘鄉人除廣都長先主見琬衆事不理大怒諸葛亮曰蔣琬丨丨之丨非百里之才也其為政以安民為本不以脩飾為先兄弟才吏唐蔣沇欽緒子愽學有名以孝亷授洛陽尉與丨演溶丨清俱為丨丨有名乾元中歴四縣令善政流行郭子儀軍出其縣勅麾下曰蔣沇賢令母撓其清也父子學士蔣乂貞元九年擢史館脩撰徳宗重其職先召見延英條據神䇿軍建置本末髙郢等歎曰集賢有人哉詔兼判集賢院事丨丨為丨丨儒者榮之集賢小職蔣乂字徳源常州人父蔣明在丨丨值兵興圖籍殽舛白宰相請引乂入院助力長鎰竒之署丨丨丨丨國史良筆蔣偕歴史館修撰三世踵脩歴丨丨世稱丨丨咸云蔣氏日舉賢良科本朝蔣之竒士字頴叔常州宜興人舉論進又丨丨丨方正丨試六進士第二蔣芾字子禮辛未趙逵榜丨丨丨丨人及第乾道間為宰相沈古今姓纂周文王第十子􅡭季食采於沈因氏焉今汝南平輿沈亭即沈子國也秦有沈郢徴丞相不就事類葉大夫葉公子髙姓沈名諸梁沈尹戌之子為丨丨丨左破山蠻沈慶之字𢎞先仕宋為建威將軍大丨丨丨威震諸山羣蠻皆稽顙慶之著狐皮㡌羣蠻號曰蒼頭公毎見慶之軍輙畏懼曰蒼頭公已復來矣為竹賦沈衆字仲興梁武令丨丨丨勅曰卿文體翩翩可謂無忝爾祖意聖人沈不害字孝和愽綜經典製文立成曽無尋檢周𢎞正曰沈生可謂丨丨丨乎良史才唐沈既濟蘇州人經學該明楊炎雅善之薦既濟有丨丨丨召拜左拾遺史館脩撰呉興男子晉沈勁字世堅丨丨丨丨腰鼓兄弟沈沖字景綽與兄淡深名譽有優劣士號為丨丨丨丨三人並歴御史中丞皆為司直晉宋所未有織簾先生沈麟士字雲禎愽通經史有髙尚之心隠居餘杭呉差山講經教授從學士數十百人時語吳差山中有賢士開門教授居成市號丨丨丨丨回波弄辭唐沈佺期字雲卿相州人及進士第兼文館學士侍宴帝詔學士等舞丨丨佺期為丨丨恱帝水陸轉運本朝沈義倫軍太祖北伐為隨丨丨丨丨使罷籍民車沈括字存中呉興人北兵將入冦亟遣中貴人取兩河民車以為戰備民大驚擾一日括持筆立御坐側神宗頋曰卿知籍車之事乎括曰未知車將何用神宗曰北兵以多馬取勝唯車可以當之括曰胡之來民父子墳墓田廬皆當棄去復暇卹車乎朝廷姑籍其數而未取何傷神宗曰卿言有理何論者之紛紛也利括曰車戰之利古人所謂輕車者兵車也五御折旋於輕速今之民間輜車重大椎檏以牛挽之日不能行三十里少䝉雨雪則跬步不進故俗謂之太平車恐兵問不可用耳我神宗益善曰無人如此語朕者明日遂丨丨丨丨執政問括曰君以何術而立談罷此事括曰聖主可以理奪不可以言爭若車可用其敢以為非韓古今姓纂出自唐叔虞之後曲沃桓叔之子萬食邑於韓因以為氏代為晉卿後分晉為國韓為秦滅復以國為氏也出頴川後韓騫避王葬亂移居南陽故有頴川南陽二望事類武穆邗晉應韓丨之丨也左不仕武王之子應韓丨丨同上訓子晉悼公即位以韓無忌為公族大夫使丨卿之丨弟恭儉孝弟守業晉魏韓子為政分祁氏之田以為七縣以韓固為馬首大夫謂能丨丨者也並左中尉晉趙盾舉韓厥晉君以為丨軍丨説苑王佐韓恒字景山張載竒之曰丨丨才也愽覽經籍無所不通載記說難韓非韓之諸公子也喜刑名法術之學而歸本於黄老為人口吃不能道説而善著書作孤憤五蠧内外諸説林丨丨十餘萬言史記國士前漢韓信淮隂人寄食漂母受辱跨下數與蕭何語何竒之曰諸將易得如信丨丨無雙人傑韓信髙帝曰連百萬之衆戰必勝攻必取此丨丨也詩𫝊韓生名嬰燕人文帝時為博士推丨之意為内外丨數萬言燕趙間言詩者由韓生國器韓安國字長孺梁成安人武帝拜為御史大夫與王恢辯議和親所舉皆天下名士天子以為丨丨徙為材官將軍虎臣呉韓當字義公累遷將軍加都督江表之丨丨也守道固韓暨字公至詔曰暨澡身浴徳志節髙潔年踰八十丨丨彌丨可謂純篤老而益邵者也自標置晉韓伯字康伯留心文藝能丨丨丨居然是出羣之器勝氣籠霄飛談卷霧申國威隋韓禽字子通少慷慨以膽畧稱有雄傑之表隋文拜為廬州總管為先鋒伐陳及平金陵詔曰以名臣之功成太平之業丨丨丨於萬里宣朝化於一隅髙名塞於宇宙盛業光於天壤仰山斗唐韓愈學者丨之如泰丨北丨一識荆州韓朝宗李白與之書云生不用萬户侯但願丨丨韓丨丨與此韓翃韓翃唐徳宗時制誥闕人上批曰與韓翃時有同姓名者上復批曰春城無八處不飛花寒食東風御栁斜日暮漢宫傳蠟燭青煙散五侯家丨丨丨丨峭直盡言韓休京兆人宋璟曰休仁者之勇休峭鯁時政所得失言之未嘗不盡張樂疏至韓休帝嘗獵或丨丨必視左右曰韓休知否已而丨輙丨引鑑不樂左右曰何不逐去之帝曰吾用休社稷計耳相麻不得韓偓字致元京兆人宰相韋貽範母䘮詔還位偓當草制上言貽範處䘮未數月即視事傷孝子心學士使馬從皓逼偓求草偓曰腕可斷丨丨可丨丨淵深有謀韓稜字伯師五遷為尚書令肅宗賜以寳劒自署其名曰韓稜楚龍淵以其丨丨丨丨故也論功第一韓游瓌靈州人始為郭子儀禆將禄山反誘河曲九蕃府六胡叛部落五十萬子儀使游瓌擊破之進邠寧節度使奉天之狩兵未集游瓌以兵三千來赴難功第一又李瓌光叛誘為變游瓌白發其書帝曰卿可謂忠義矣破朱泚咸陽京師平丨丨丨丨芝生刻頌韓思復字紹出京兆人遷滁州刺史有黄丨五丨州署民為丨丨其祥唱名雲見本朝韓琦字稚圭相州安陽人也父國華終右諫議大夫琦風骨秀異弱冠舉進士名在第二時方丨丨太史奏日下五色丨丨左右侍從皆賀於殿上定䇿元勲琦少有大志天下想望其風采識量宏偉臨事不見喜愠之色天資朴忠自稱安陽贑叟司徒御侍中判相州贈尚書令謚忠獻公神宗自為碑又篆其首曰兩朝顧命丨丨丨丨之碑配享英宗廟庭相州韓氏韓琦政和中追論琦定䇿之勲贈魏郡王子忠彦粹彦純彦嘉彦丨丨丨丨魏公家也魏公生儀公兄弟名連彦字彦生子從口口生子從冑冑生子從三畫桐樹韓家韓億字從魏其先真定靈壽人八子綱綜絳繹維縝緯緬而絳縝位宰相維門下侍郎真定韓氏忠憲公家也忠憲諸子名連系字康公兄弟也生宗字宗之下從玉玉之下從日日之下從元元之下從水世謂丨丨丨丨文章官様韓駒字子名王安國有云丨丨格調須得丨丨若子蒼者乃臺閣之文所謂官様者歟其詩亦然内外制多用西漢語故温潤有體中興大將韓世忠建炎初與劉光世岳飛張俊為丨丨四丨丨楊古今姓纂周武王第三子唐叔虞之後至晉出公遜于齊生伯僑歸周天子封為楊侯子孫以國為氏一云周宣王曽孫封為晉所滅其後為氏焉或曰周景王之後揚雄自叙云伯僑不知周何别也或云掦雄自叙云從手從易則為掦與從木從易之楊又為一族不知孰為是事類出流輩前楊惲字子幼詩眼云古人學問必有師友淵源漢楊惲一書逈丨當時丨丨則司馬遷外甥故也謚文公後楊厚字仲桓少學父業三遷侍中後歸家教授門生上名録者三千餘人年八十一卒鄉人丨曰丨丨出周伯僑揚雄字子雲蜀郡成都人少好學不為章句簡易佚蕩口吃不能劇談黙好深湛之思不汲汲於冨貴不戚戚於貧賤博極羣書度越諸子三世不徙官久次轉為大夫受梁丘易楊政字子行丨丨丨丨善説經書京師語曰説經鏗鏗楊子行春秋外傳楊終字子山成都人習春秋顯宗拜校書郎著丨丨丨丨十二篇關西孔子楊震字伯起明經􅀶覽無不窮究諸儒語曰丨丨丨丨楊伯起雀㘅三鱣楊震後有官丨丨丨丨魚飛集講堂前都講取魚進曰蛇鱣者卿大夫服之象也數三者法三台也先生自此升矣暮夜四知楊震遷荆州刺史東萊太守所舉王密懷金遺震曰丨丨無知者震曰天知神知我知子知此即四知何謂無知五登衮職楊賜字伯獻遷侍中侍講于華光殿七在卿校致位特進丨丨丨丨四世太尉自震至彪丨丨丨丨徳業相維為東京名族並同上七世名徳晉楊佺期漢太尉震之後曾祖準太常自震至準丨丨有丨丨四世三公楊文宗武元皇后父其父仕漢丨丨為丨丨我家龍文北齊楊愔字遵彦從兄昱謂人曰此兒駒齒未落已是丨丨丨丨更十歲後當求之千里外楊公鐵星楊津字羅漢除定州刺史時賊殘掠州境嘗置壚鑄鐵持以灌賊賊遂相告曰不畏利槊堅城唯畏丨丨丨丨北史隂求將領隋楊𤣥成隋帝好征伐𤣥成丨丨丨丨帝嘉之曰將門有將故不虚也牧宰第一楊達字士達為鄯鄭趙三州刺史文帝差品天下丨丨達為丨丨擢拜工部尚書楊素每曰有君子貌兼君子心者唯楊達耳非常之器楊素字處道少有大志不拘小節逸羣絶倫非常之器有英傑之表周武帝拜為儀同三司又賜以竹䇿曰方欲大相驅策故用比物賜卿並同上越公家風唐楊𢎞禮字履莊素弟之子太宗征遼拜兵部侍郎跓蹕之役領步騎二十四軍跳出所向摧靡帝曰丨丨兒郎故有丨丨有子必相楊嗣復字繼之父於陵始見識於韓滉妻以其女歸謂妻曰吾閱人多矣後貴且壽無若生者丨丨丨位宰丨既而生嗣復滉撫背謂曰名與位皆踰其父楊氏之慶也時號三楊楊憑虢州人善文辭與弟凝凌皆有名大歴中踵擢進士第丨丨丨丨楊家三喜楊敬字茂孝擢進士第平判入等兼太常少卿是日二子戎戴登科時號丨丨丨丨長有竒志楊於陵字達夫漢太尉震之裔丨丨丨丨十八擢進士韓滉謂妻栁氏曰吾求佳壻無如於陵呉號神童楊收字藏之七歲而孤母親授經十三通大義善属文所賦輟就丨人丨丨丨里人造門觀賦詩至堅敗其藩收嘲之曰爾非羸角者奚用觸吾藩切當類此左右圖史楊綰字公瓘華州人性沉静獨處一室丨丨丨丨不好立名琴通三均楊收􅀈陽耕得古鐘髙尺餘收扣之曰此姑洗角也既劀拭有刻在兩欒果然嘗言丨丨黄鍾姑洗無射丨丨時有安説者世稱善琴且知音收問五絃外其二云何説曰世謂周文武二王所加收曰能為文王操乎説即以黄鍾以宫而奏之以少商應絃收曰文世安得武聲乎説大驚因問樂意童子召試詩賦皇朝楊億字大年建州浦城人生之夕其祖文逸夢一羽衣自稱懷玉山人覺而億生有毛被其體其長盈尺踰月始墮母口授以書隨即成誦七歲善属文年十一以丨丨丨對丨丨丨五篇下筆立成我太宗歎異以為袐書省正字文章元和風格楊億真宗嘗謂王旦曰慕億辭學無比後學皆師之丨丨有貞元丨丨丨丨自億始也問佛法有無為集楊傑字次公無為人妙齡擢甲科文行有名于時官太常連六七任一朝禮樂皆賴討論遷南吕舎人入侍講筵王荆公東坡先生皆欽重之元豊中召對上問以丨丨丨丨丨丨數十卷屢立功號楊無敵楊業并州太原人也少任俠善射好田獵弱冠事劉崇累遷至建雄軍節度使丨丨戰丨所向克捷國人丨為丨丨丨善戰虜呼為六郎楊延昭智勇丨丨沉嘿寡言寒不披衣暑不張盖遇敵必身先功成推其下故人樂為之用威振異域守邊二十餘年虜人畏之丨丨丨丨見書謂周室忠臣本朝楊徽之字仲猷建州浦城人上書言事及我太祖受䄠太宗丨其丨丨太祖曰此丨丨丨丨也古今合璧事類備要續集卷十
