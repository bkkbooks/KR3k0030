方之熒熒駟道端而如砥浴日上而如萍制翠旄於華盖之角轉黄屋於鈎陳之星地回回而風淅淅天泱泱而氣青青甲胄乗陵轉迅雷於荆門巫峽玉帛清廻霽夕雨於瀟湘洞庭聲明通於純粹溟涬為之垠堮駟蒼螭而蜿蜒若無骨以柔順奔鳥攫而黝蟉徒有勢於殺縛朱輪竟野而杳冥金鋄成隂以結絡上方將降帷宫之綝縭屏玉􅋴以蠖畧人門行馬拱乎合沓之場皮弁大裘始進於穹崇之幕衝牙鏗鏘以將集周衞轇轕而咸若月窟黒而扶桑寒田燭稠而曉星落雲菡萏以張盖春葳蕤而建杓簪裾斐斐罇俎蕭蕭方面曲折周旋寂寥必本於天王宫與夜明相射動而之地山林與川谷俱標於是乎官有御事有職所以敬鬼神所以勤稼穡所以報本反始所以度長立極𤣥酒明水之尚越席疏布之則必取先於稻秫麴蘖之勤必取著於紛純文繡之飾由是播其聲音陳乎節奏變方形於動植聽宮徵於砰􅔫既而膟膋挂􅇢柴燎窟瑰騞擘砉赫葩斜晦潰電纒風升雪颯星碎拂勿􅀈濚渺溟蓯淬雷公河伯或􅛖騃以脩聳霜女江妃乍紛綸而晻曖執紱秉翟朱干玉戚鼓瑟吹笙金支翠旌神光倐斂祀事孔明於是涾沲兮漫汗紆餘乎經營浸朱崖而灑朔漠洶暘谷而濡若英𤣥澤澹竚乎无極殷薦綢繆乎至精爾乃孤卿侯伯羣儒三老稽首曰臣聞燧人氏已往法度難知文質未變太昊氏繼天而王以木傳子虞夏殷周煥炳葱蒨伏惟道祖視生靈之􅀈裂醜害馬之蹄齧呵五精之息肩考正氣之無轍累聖昭洗中祚觸蹶氣慘黯乎暗夜之妖勢迴薄乎龍蛇之孽陛下撫紫極之將頽拾清氛於己缺罏之以仁義鍛之以賢哲九五之後人人自以遭唐虞四十年來家家自以為稷卨上曰吁昊天有成命惟五聖以受我其夙夜匪遑定寔用素樸以守于嗟乎麟鳯胡為乎郊藪夫聖以百年為鶉􅙿道以萬物為芻狗於是黙然而徐思終將固又固之意不在抑殊方之貢亦不必廣無用之祠金馬碧雞非理人之術珊瑚翡翠此一物何疑奉郊廟以為寳增怵惕以孜孜况大庭氏之時六龍飛御而歸王荆公議三聖並侑劄子推尊尊以享帝義之至推親親以享親仁之極尊尊不可以瀆故郊無二主親親不可以僣故廟止其先今三后並侑欲以致孝也而適所以瀆乎享帝後宫有廟欲以廣恩也而適所以僣乎享親推存事亡則非所以寧親也臣等今詳議欲乞各如禮官所議王荆公議郊祀壇制劄子先王所以交於神明壇坎牲幣器服時日形色度數莫不依其象類易曰一隂一陽之謂道乾陽物也坤隂物也冬日至祀天於地上之圜丘所謂為髙必因丘陵而因天事天也夏日至祭地於澤中之方丘所謂為下必因川澤而因地事地也盖陽以圓為形其性動隂以方為體其性静天陽而動故祀於地上之圓丘而禮神以蒼璧璧亦圓也地隂而靜故祭於澤中之方丘而祀神以黄琮琮亦方也合祀天地為圓壇而於國陽之地上豈聖人以類求神之意哉熙寧郊儀祭皇地示壇八角祭神州地示壇廣四十八步髙五尺今則變方為圓壇神州築方壇而復無坎皆不應禮伏請皇地示神州地示為方壇壇之外為坎庶協古制王荆公議不合燔燎劄子伏為北郊所祭皇地示并神州地示秖合坎瘞自來却如祭天升煙之義别建一壇燔祝版臣昨累次具狀奏聞乞行改正雖蒙聖㫖下有司詳定又縁所定壇壝儀注條件不少考求典故未能遽革伏覩今月二十一日神州地示亦依襲故常泥飾壇燎依舊行事臣昨亦備述自古以來祭祀皆為瘞坎盖取就下求隂之義及考先儒所祭地示即无槱燎之文伏覩國朝祀儀所載祀辭亦曰瘞儀却行燔燎之禮顯是從來差錯恐瀆于神欲乞不候詳定諸壇壝等制度先次考正今來瘞埋之義更不於壇上燔燎祝版以别天神地示之異上副陛下修誠致孝肅恭祀享之意奏聞候勑㫖狀前批送太常禮院本所謹案古者祀天神燎柴登煙祭皇地示埋瘞盖燔柴則廾煙于上瘞埋則達氣于下求神必以其類故也王涇唐郊祀録凡祭祀地示則為瘞埳於神壇之壬地方深取足容物祭訖置牲幣祝饌於其中而埋之熙寧祀儀皇地示神州地示皆為燎壇方一丈髙一丈有二尺開上南出方六尺在壇南二十步内地祭大社大稷又設燎紫於西神門外道北以地示而同之天神之祀殊悖於禮所有今來王某起請實合禮制伏請自今祭皇地示神州地示大社大稷其祝版與牲幣饌物並瘞於埳更不設燎所有皇地示神州地示州地示燎壇並乞除去詩集嚴祀事燦燦辰角曙亭亭寒露朝川原共澄映雲日還浮飄上宰丨丨丨清途振華鑣圓丘峻且坦前對南山標韓退之和李相公事南郊覧物興懐呈一二知舊降大君太一天壇丨丨丨屬車龍鶴夜成羣春深玊藻寒初落露拂金莖曙欲分三代樂迴風入律四溟歌駐水成文千官不動旌旗下日照南山萬樹雲曹唐大禮詩奉嚴蠲端職恭瘞祀飭躬丨丨丨淑氣符首節光風臨上年梁傳昭敬明祀惟皇丨丨丨云云森陳羽林騎肅穆虎賁弓王褒星斗垂光丨丨丨丨燭紫壇云云欲識懽心從四海鈞天一曲引迴鸞吴升霜露凝感丨丨丨宸丨肅僾動天引謝莊公規盛典列聖丨丨修丨丨萬方和氣助升煙錢勰郊祀詩靈圉仙遊日月圓丘吉前期告上清朅來修祀事齋潔奉祗明丨丨賔瑶館丨丨列玉京丹青浮象魏盛典照蓬瀛蔣之奇奉勑宿齋於上清館祥官詩德澤恩光傳警千門寂南郊綵仗迴但驚龍再見誰識日雙開丨丨施雲雨丨丨變燼灰閱兵貔武振聽樂鳯皇來唐觀南郊迴仗詩龍常玉勒舞風汎丨丨輪霞浮丨丨謝莊龍駕鳯笙五岳移丨丨十洲迴丨丨陳𢎞祥輝嘉氣孝湏三后配禮重一郊尊翠羽來千仗鳴鐃下九闗服維周冕盛樂自舜韶温未酌羣靈墮先祠萬玉犇黄流凝夕祼紫熖亘宵燔星拱低宸幄雲回䕶帝轅丨丨新日月丨丨浹乾坤曠古歸鴻鑠函生躍至恩欽惟齋恪志迎福在元元王岐公郊祀慶成詩靈光瑞霧帝出乗昌運天心予太平文章三代繼制作七年成大祀乾坤合剛辰日月明泰壇朝掃地魄寳夜垂精仰御圜蒼盖環觀海岳城北冥為朔易西極薄攙搶升燎丨丨合迴鸞瑞氣迎需雲遍枯槁解雨澤勾萌可頌非天德因箴亦下情民言知可酌帝謂本無聲節用因崇儉蘄年在好生無心湏格物克己自銷兵化國安新政孤臣反舊耕還將清廟什留與野人耕東坡郊祀禮成詩方士朝仙杖漢統千齡接虞衡七政齊德馨天自饗容侵古猶稽輿衞勾陳北衣冠觀闕西雨先清道蹕寒避禮神圭丨丨丨丨丨宮垣挾御圭廟芝楹疊璧帝樂字連奎虚次尤祗慄懐親極慘悽珠旒依玉色蘭炬映璇題兩相初扶翼崇壇六降隮髙靈森欲墮諸福應如携燎夜壇三燭凌霜甲萬犀宗燔申寳酌祕檢䕶金泥奉引星辰爛旋歸錦繡迷端門臨五鳯步輦駐雙霓日照雲裳委風含綵筤低和聲翔四表嘉澤浸羣黎盛事真寥廓微生荷奬提侍祠叨執爵著籍繆通閨異寵何其報孤忠誓不睽裁詩獨愁晚猶得並鳬鷖張于湖賀郊祀慶成詩吉土兆精禋祀教民昭孝天惟德是親太宫嚴大饗丨丨丨丨丨禮樂三王盛梯航萬國賔恩沾羣動洽慶與一陽新奉册尊長樂均釐及衆臣不湏雲物瑞和氣洽人神歐陽永叔南郊慶詩竹宫歌毖祀盛禮郊儀肅純音帝樂清葳蕤飄翠羽赫奕展華旌鳯邸光交覆鸞旗色共明繽紛拂葩盖輝映雜緌纓且異文竿飾非同翿舞名丨丨丨丨丨雅曲播遺聲歐陽公翠旌詩靈祇攄景光君不見昔日西京全盛時汾隂后土親祭祠齋宫宿寢設厨供撞鍾鳴鼔樹羽旗回旌駐蹕降靈場焚香奠醑邀百祥金鼎發食正焜煌丨丨煒􅂱丨丨丨埋玉陳牲禮神畢舉麾上馬乗輿出彼汾之曲不可遊木蘭為楫桂為舟櫂歌微吟綵鷁浮簫鼓哀鳴白雲秋觀娱宴洽賜羣后家家復除户牛酒聲明動天樂无有千秋萬歳南山壽李嶠汾隂行古今合璧事類備要外集卷三
