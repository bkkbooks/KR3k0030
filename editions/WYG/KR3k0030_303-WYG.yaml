body:
  text: 古今合璧事類備要外集卷三宋謝維新撰祭祀門郊祭附南北二郊分合禮經考索祭祀之義大率有三祀天地所以示人報本也祀聖賢所以訓人崇德也祀祖考所以教人追孝也三者行於天下則萬人順百神和此先王所以重祭祀也自今觀之祭莫大於天天行徤其道變化是以包犧氏仰而觀之以類萬物之情黄帝封禪天地少昊戴時以象天顓帝乃命南正重司天以属神髙辛順天之義堯命羲和敬順昊天至舜始肆類于上帝郊祭所從來尚矣盖以天地以王者為主聖王制祭天地之禮必於在國之郊亦曰聖王之居皇天所觀視故也然是祭也本惟於即位之初而行此禮亦不欲數也何後世則有三嵗或一嵗而數行焉本惟以天子之尊而行此禮示不可僣也何後世固有諸侯而僣用焉本惟主於尊上帝而行此禮示不可泛也何後世則有變上帝而為六天之說分南郊而北郊之議焉由是古人郊祀之禮漠然無定據矣盖至於我國朝郊祀之禮至元祐而始定設大神大示及太祖太宗配位自天地至從祀諸神凡七百七十有一焉仍詔今後南郊合祭天地依元祐七年例拖行迨南渡紹興始克行之迨今未有改也然祭不欲數亦不欲疏數則煩煩則不敬疏則怠怠則又忘三嵗一郊守為常典未為不可也而今也惟天子即位則始親郊焉至於三歳之乆則間惟舉明堂之典毋乃失之疏乎或者曰郊之費倍於明堂故郊不欲間行也然豈知祖宗自有故事由事神賞軍之外一切從儉自宜大有咸省茍從省約則三嵗一行何不可之有惟省約之未能焉此郊祭所以為希闊之典歟雖然聖人此心與天為一不以郊祭之數而此敬為之堯存亦不以郊祭之䟽而此敬為之桀亡也惟於即位之初一見天地而三年之乆間修明堂配天配帝不䟽不數揆之以古人之禮時中之義殆庶幾焉事類殷薦丨丨于上帝易肆類丨丨于上帝書昭事丨丨上帝對越丨丨在天並詩報天大丨丨埽地丨丨而祭於其質也天道郊所以明丨丨天位先王祭帝于郊所以定丨丨也用犢郊之祭也牲用騂尚赤也丨丨誠也並記用騂凡陽祀丨丨牲毛之郊天也禮辛日郊之用辛也周之始郊日以至注用丨丨者人君當齋戒自新耳陽位兆於南郊就丨丨也記燔柴丨丨於泰壇祭天也張氊丨丨按設皇邸以褾祀之田燭汜埽反道鄉為丨丨不命唯人聽上注謂郊祀也汜歸反道謂除郊見道越紼有䘮不祭唯祭天地社稷為丨丨行事並白氏六帖子月郊天之月而日至魯禮也三王之郊一用夏正魯以無冬至祭天於圜丘之事是以建丨之丨郊天示先有事也寅月一用夏正注建丨丨也象天地器用陶匏以丨丨丨之性象日月郊之祭也迎長至之日也注郊天丨丨丨以示人則天數王被衮以象天冕璪十有二旒丨丨丨也並郊特牲舞雲門丨丨丨以祀天禮大司樂事上帝亦越文王武王丨丨丨書立政旅上帝周禮祀上帝大宗伯禋祀丨昊天丨丨同上祈農事㐮十七年夏四月卜郊不從乃免牲孟獻子曰吾乃今而後知有卜筮夫郊祀后稷以丨丨丨也是故啟蟄而郊郊而後耕今既耕而卜郊宜其不從也左魯之郊丨丨丨禘非禮也周公其衰矣杞之郊丨丨丨也禹也宋之郊丨丨丨也契也是天子之事守也並記禮運卜不從四丨郊丨丨乃免牲猶三望非禮也左望非禮不郊而丨皆丨丨也又見上文左三年一秦始皇尊雍四畤上帝丨丨丨郊常以十月丨丨丨郊自始皇始三嵗一漢武帝初至雍郊見五畤後常丨丨丨郊増五畤漢文帝丨雍丨丨夏四月郊祀上帝始見雍郊見復五畤成帝罷甘泉諸畤後又詔丨甘泉泰畤雍丨丨復親郊下詔議漢文帝十五年春黄龍見成紀上乃丨丨丨郊祀公孫臣明服色新垣平設五廟夏四月上幸雍始郊見五帝赦天下本紀有司議宣帝本始二年詔丨丨丨曰往者朕郊見上帝西祭隴首獲白麟以饋宗廟見羣鶴武帝後元元年詔朕見上帝巡于比邊丨丨丨留止獻薦于秦畤光景並見獲白麟見前注神光集永始四年行幸甘泉郊泰畤丨丨降丨紫殿精氣感天郊饗神歌整泰壇禮皇神丨丨丨百靈賔束緼火燎芳薪紫壇遊冠青雲晉音樂志正火德光武建武二年立郊兆於城南始丨丨丨因火數立夏之日迎夏於南郊祭赤帝祝融車旗服色皆赤注郊去邑七里丨丨丨也後郊祀志除帝座晉武帝泰始二年南丨五丨丨從王肅議嵗二郊梁陳以降皆迄於隋議者各宗所師故郊丘互有變易天監二年吴操之啟報傳云啟蟄而郊郊應立春之後何終之議今之郊祭是報昔歳之功而祈今年之福故取嵗首上辛不拘立春之先後周冬至於圜丘大報天也夏正又郊以祈農事故有啟蟄之嵗自晉太始二年並圓丘方澤同於二郊是知今之郊禋禮兼祈報不得限以一途也帝曰貟丘自是祭天先農即是祈榖但就陽之位故在郊也冬至之夜陽氣起於甲子既祭昊天宜在冬至祈榖時可依古必須啟蟄在一郊壇分為二祭自是冬至謂之祀天啟蟄名為祈榖隋禮儀志嵗一郊北齊其南郊則丨丨丨玉帛載升丨丨丨丨棫樸斯燎旌回外壝蹕静郊門千乗按轡萬騎雲屯藉茅无咎掃地惟尊隋樂志籩豆有數祀昊天上帝於員丘尊罍玉幣丨丨簠簋丨丨唐志太后謝况唐則天臨朝武承嗣偽欵洛水石導使為帝遣雍人唐司泰獻之后號為賽圗於是汜人又上瑞石丨丨乃郊上帝丨丨皇后亞獻中宗將南郊詔定儀典時祝欽明郭山惲建言丨丨為丨丨禇无量與太常愽士唐紹蔣欽緒因争以為郊祀國大事其折衷莫若周禮周禮冬至祭天圓丘不以地配惟始祖為主亦不以妣配故后不得預又大宗伯凡大祭祀王后不與又内宰太皇后裸獻則賛瑶爵祭天无祼知此乃宗廟祭耳巾車内司服掌后六服為五路無后祭天之服與路是后不助祭天也惟漢有天地合祭皇后參享事末代黷神事不經見不可為法為郊祀録正元中太常禮院修撰五經考次厯代郊廟沿革之制及其工歌祀號而圗其壇屋陟降之序丨丨丨丨十卷唐禮樂志上南郊賦徐彦伯移蒲州以近畿㑹郊祭丨丨丨丨一篇孔氏帖昭謝上𤣥太宗太平興國三年詔祗見九廟丨丨丨丨伸報上帝至道元年正月十日南郊詔昨頒詔㫖將奉郊丘取來嵗之仲春丨大丨於丨丨屏去葷茹真宗祥符一年上曰太祖太宗每奉郊祀皆丨丨丨丨朕三祀圜丘並遵行之顧外廷不知耳更制藁枯仁宗慶厯十年太常言奉祠郊廟冝丨丨丨丨為藉縮酒用茅恭上帝號真宗大中祥符九年用來年正月一日上玉皇號有争南郊恭謝禮詔祕圖申錫靈祲洪均式瞻霄極之尊䖍上帝真之號來歳元日適協上帝舉冠絶未行之事報髙明洪覆之恩謹以來年正月一日詣玉清昭應宫與天下臣庶丨丨玉皇大天丨聖丨又謹以正月十一日有事于南郊行恭謝之禮裒對明靈仁宗慶厯四年南郊御札六欵洵丘祇見上帝愾聞六聖之祫丨丨丨丨之臻欵見道祖皇祐五年赦自合宫之迄饗即陽土以系誠申命攸司詳稽舊典卜日南之長晷祀上帝之圓丘前詔諸儒考正雅樂率前期而戒誓復先甲而潔齊欽翼祕宫丨丨於丨丨恭優在廟永念於前人紫營未除赤霄在望蒼璧既奠朱燎以升燔燎泰壇英宗治平二年赦就陽國郊肇禋吉土振古盛節本朝上儀因黄宫之氣萌迨南極之景至躬執圭幣潔修粢盛祼薦清廟之庭丨丨丨丨之地於時祥晏温大圓精粹和氣充塞積曀肅清兹皆諸神受祀於懐柔有美卷顧而響荅陟配烈祖神宗元豐六年南郊制奉罍以欵真宇祼鬯以享宗祊齋戒乎端誠之宫清肅乎禮神之囿丨丨丨丨對侑昊穹維太常之斿備金玉之駕迺搢大圭以為國之綴迺服大裘以倣古之文欽柴之燎四施爥煬太一圜鍾之樂六變繳繹崇丘孝奏而日月光靈游而風馬下對佑昊穹徽宗大觀四年南郊改元制乗景至之熙辰備星陳之法駕祼獻清廟初蠲饎以掲䖍謁欵紫壇遂欽柴而展采推本烈祖丨丨丨丨表潔純犧薦誠蒼玉乾端澄霽哲宗元符元年南郊制未奉皇祗之祠先嚴蒼昊之饗乗一陽之復習三嵗之常即路寢以齋居至珠庭而朝獻廣牡肆祀於假廟以詔䖍欽柴宗祈遂升壇而欵謁配侑烈祖對越明神樂成繹純禮敬勑備於時丨丨丨丨冬序晏温靈星嘉虞精意昭格雲物晏温元祐七年十一月一日冬至合祭天地于圓丘是日五鼔輦詣壇外壝百官准詔不回班自小次厯午陛外壇不設茵褥稽首跪奠致誠極恭夜月澄爽丨丨丨丨比還御按肆赦終日和燠翌日時雪如期云云又見後合祭並長編宿齋如望髙宗紹興十三年進呈郊禮丨丨丨丨祭青城幕次事上曰止是一宿不必枉費人力所有宿齋處望祭殿只随宜絞縛用蘆蓆青布之類不得侈大致齋而雪紹興十六年十一月初上丨丨丨丨作及朝獻則杲日麗空至郊夕則徹隂登壇即霽而台星明見不事華麗紹興十三年有司檢舉將來大禮依舊合用珠子坐褥上曰丨丨丨丨為主若事華麗恐非事天之意並從省約孝宗隆興三年詔曰太祖皇帝乾德元年郊祀詔書有云務從省約毋至煩勞仰見祀天之誠養民之心朕遵皇祖之典崇儉德而戒勞民除事神賞軍外其乗輿服御及中外支賞丨丨丨丨並聖政分饗丘圜方凡樂圜鍾為宫黄鍾為角大簇為徴姑洗為羽靁鼔靁鼗孤竹之管雲和之琴瑟雲門之舞冬日至於地上之圜丘奏之若樂六變則天神皆降可得而禮矣凡樂函鍾為宮太簇為角姑洗為徵南吕為羽靈鼔靈鼗孤竹之管空桑之琴瑟咸池之舞夏日至於澤中之方丘奏之若樂八變則地示皆出可得而禮矣隋音樂志城南北天郊在長安丨丨地郊在長安城丨所属掌治壇墠郊宫四時供張以奉郊祀武帝定丨丨丨郊祀之亊祠泰一於甘泉圜丘取象天形就陽位也祀后土於汾隂澤中方丘取象地形就隂位也成帝徙丨丨丨泰畤后土于京師始祀上帝于長安南郊杞后土於長安北郊並三輔黄圗康衡議丨丨丨宜於長安定南北郊為萬世基遂立甘泉泰畤紫壇八觚宣通八方五帝之壇周環其下有羣神之壇以尚書禋于六宗望于山川徧于羣神之義紫壇有文章采刻鏤黼黻之飾及玉女石壇仙人祠瘞鸞輅騂騎寓託焉臣聞郊壇饗帝之誼埽地貴誠尚質不敢修其文以為神祇功德至大難備庶物不足以報功惟至誠為可其紫殿飾女樂鸞輅騂騎龍馬石壇之属宜皆勿備本傳桓譚奏右將軍王商等以為長安聖王之居皇天所觀視冝徙就正陽太隂之處於是丨丨丨曰宜於長安定南北郊為萬世基天子從之本傳髙帝配光武建武元年即位于鄗祭告天地采用元始中郊祭故事二年正月初制郊兆於雒陽城南七里為圜壇八陛中又為重壇天地位其上皆南鄉西上其外壇上為五帝位其外為壝重營皆紫以象紫宫隴蜀平後乃增廣郊祀丨丨丨食位在中壇上西面北上天地髙帝黄帝各用犢一青帝赤帝共用犢一白帝黒帝共用犢一日月北斗共用牛一四營羣神共用牛四凡樂奏青陽朱明西皓𤣥冥及雲翹育命舞既送神燌爼實於壇南已地後祭祀志髙后配三十二年初營北郊雒陽城北四里為方壇四陛明年正月辛未郊别祀地祇位南面西上髙皇后配西南北上皆在壇上中嶽在未四嶽各在其方中營内海在東四瀆河西濟北淮東江南地祇髙后用犢各一五嶽共牛一四海共牛一奏樂如南郊同上加登歌隋圜丘在國南七里每嵗冬至祀昊天玉帝方丘在國隂六里南郊舞奏黄鍾取陽始化也其郊舞奏林鍾取隂始化也丨有丨丨用夏正明山賓稱伏尋制㫖周以建子祀天五月祭地殷以建丑祀天六月祭地夏以建寅祀天七月祭地自頃代以來南北二郊同丨丨丨詔更詳議山賓以為二儀並尊三朝慶始同於此日二郊為允并請迎五帝於郊并以始祖配享