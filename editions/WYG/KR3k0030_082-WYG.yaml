body:
  text: 古今合璧事類備要後集卷十三宋謝維新撰道揆門左右丞相上前代沿革黄帝得六相而天下治管子髙陽氏有才子八人謂之八愷髙辛氏有才子八人謂之八元舜有大功二十而為天子以其舉十六相也左傳舜命禹宅百揆成湯始置二相通典以伊尹為右相仲虺為左相宋百官志髙宗夢得傳說營求諸野得諸傳巖爰立作相周成王時召公為保周公為師相成王為左右周公位冡宰正百工又作六典冡宰掌邦治統百官均四海齊悼武二年始置丞相官樗里疾耳甘茂為左右丞相史記漢髙帝即位置丞相孝惠髙后置左右丞相文帝即位周勃為右丞相位第一陳平為左丞相位第二勃免平専為丞相武帝用劉屈氂為左丞相分官屬為兩府虚其右以待四方之選哀帝元夀二年復置丞相以曹操居之後有相國魏黄初元年改為司徒文帝復置中書監令並掌機宻自是中書多為樞機之任後置大丞相第一品又有相國司馬昭等為之晉罷丞相復司徒永昌元年罷司徒并丞相後或有相國或丞相省置不常而中書監令常管機要多為宰相之任宋孝武以義宣為丞相而司徒府如故齊丞相不用人以為贈官梁罷相國置丞相置司徒陳又置相國位丞相上並為贈官自晉魏以來宰相但以他官參掌機宻或委知政事者無有常官其相國丞相或為贈官或闕不置間者自為尊崇之位多非其人臣之職其真為宰相者不必居此官也通典隋文帝自大丞相代後周遂置内史納言即中書令侍中是為宰相亦有它官參與焉栁述為兵部尚書參掌職事又楊素為右僕射與高熲専朝政通典唐世宰相名尤不正初以三省長官中書令侍中尚書令共議朝政此宰相職也其後以太宗嘗為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為宰相品位既崇不欲輕授常以它官居宰相而假以它官唐百官志如同中書門下三品及平章事知政事參知機務參與政事及平章軍國重事之名是也通典武后龍朔元年改侍中為左相中書令為右相尚書僕射為文昌後復改易摘竒事類宅揆咨四岳有能奮庸熈帝之載使丨百丨亮采惠疇書舜典正官宰丨百丨注宰相之治百官表記補衮衮職有闕惟仲山甫補之詩烝民秉均尹氏太師丨國之丨四方是維天子是毗詩節南山登庸允釐百工庶績咸熙帝曰疇咨若時丨丨書爰立丨丨作相王置諸左右同上股肱帝曰臣作朕丨丨耳目書益稷又乃歌曰丨丨喜哉元首起哉臯陶拜手稽首乃賡載歌曰元首明哉丨丨良哉庶事康哉同上又康衡曰大臣國家之丨丨天下所瞻仰在明主所謹擇前朱雲傳阿衡實維丨丨實左右商王注丨丨伊尹也詩長發良弼夢帝賚予丨丨乃審厥象俾以形旁求于天下說築于傅巖之野惟肖爰立作相書說命上舟楫若濟巨川用汝作丨丨若歳大旱用汝作霖雨同上喉舌王命仲山甫式是百辟王躬是保出納王命王之丨丨詩黄閣丞相聽事閣曰丨丨漢舊儀朱門丨丨洞啟當陽之正色三公與天子禮秩相亞故黄其閣以示謙不敢匹天子疑是漢舊制也鄭𤣥注黄扉漢丞相金印紫綬丨丨黑轓所以異車服於百辟也前百官志赤舄𤣥冕丨丨在帝左右杜佑碑紫綬丞相相國秦官金印丨丨掌丞天子助理萬機同上金印天子之相號為丞相黄丨丨而尊無敵秩加二千石之上賈誼新書金鉉丨丨重名銀青貴服劉禹錫代上平章事表柱石丞相王商國家之丨丨臣也其人守正不詘節前元后傳又宰相國丨丨不可不强呉陸凱傅棟梁隋大業中髙孝基謂之曰公有應變之才當為丨丨之用又宰相之門豫章栝栢雖小已有丨丨之氣南史王儉傳管籥蕭何起秦刀筆漢興依日月之末光以信謹守丨丨蕭何贊當軸丨丨處中前車千秋傳贊名宰韓安國翟方進為漢之丨丨然猶不能振一貧取薦一孤士朱穆論上宰建丨丨近立功立名者唐李泌傳賢相相齊九年齊國安集大稱丨丨前曹參傳上相陸賈謂陳平曰足下位為丨丨食三萬户侯本傳儒相自孝武興學公孫宏以丨丨漢贊台相中興以後居丨丨總持權衡者多矣其能以任職取名者豈非先逺業而後小數哉故伏湛造次急於鄉射之禮侯覇入朝先奉寛大之令後侯霸傳論公宰年除歲遷以至丨丨韓公權相碑槐宰王僧儉釋奠詩鉉台納旌弓於丨丨潘岳西征賦上公翟方進奏曰春秋之義尊丨丨謂之宰海内無不統焉丞相進見聖主御坐為起在輿為下前本傳元老唐元宗謂宋璟曰卿國之丨丨為朕股肱耳目堂老宰相曰丨丨國史補鼎臣姑臧集批崔植等賀册禮畢赦恩表鼎位同上注風流王儉曰江左丨丨宰相惟有謝安盖自况也南本傳風度張九齡罷相後宰執每薦公卿上必問丨丨得如九齡否風操張嘉貞天子欲用而忘其名謂韋抗曰朕甞記其丨丨而複名因閲表疏遂得其名本傳上寛大丙吉代魏相為丞相丨丨丨好禮讓掾吏有罪贓不稱職終無所案驗前本傳兼文武唐宰相丨丨丨者李靖郭元振唐休璟張仁愿識治才先主即帝位策亮為丞相曰丞相其輔朕之闕助宣重光以照明天下評曰亮之為國也撫百姓示儀軌約官職從權制開誠心布公道可謂丨丨之良丨諸葛亮傳宰相才張柬之傳武后謂狄仁傑曰安得一竒士用之仁傑曰張柬之雖老丨丨丨也用之必盡節於國正百官宰丨丨丨大臣慮四方記總衆職前魏相字弱翁宣帝即位遂為丞相帝始親萬機厲精為治練羣臣核名實而相丨領丨丨甚稱上意本傳自有體後李浮論呉起與田文論功不及者三朱買臣難公孫洪十策洪不得其一終之田文相魏公孫宰漢誠知宰相丨丨丨也知大體丙吉出逢羣鬬者死傷横道吉過之不問前逢人逐牛牛喘吐舌使騎問逐牛行幾里矣掾吏謂前後失問吉曰民鬬傷京兆尹職當禁捕宰相不親小事非當於道路問也方春牛喘此時氣失節恐有所傷三公典調隂陽職當憂是以問之掾吏乃服以言為丨丨丨魏相傳理隂陽周勃為右丞相上問勃一歳决獄幾何勃謝不知問錢糓一歳出入幾何又謝不知上問陳平曰各有主者上曰君主何事曰宰相者上佐天子丨丨丨順四時下遂萬物之宜外鎮四夷諸侯撫百姓使卿大夫各任其職前王陵傳調隂陽唐武后時三月大雨雪蘇味道等以為瑞率羣臣入賀王求禮曰宰相丨爕丨丨而季春雨雪乃災也果可以為瑞則冬月雷亦可以為瑞雷乎節風雨神龍元年大水宋務先上書今霖雨即閉坊門故里人呼坊門為宰相謂能丨其丨丨天工人代乃是虚設宋務先傳識兵畧上謂魏相真漢相丨丨丨達時令文中子憂邊職前丙吉代魏相為丞相吉馭吏出見驛騎馳赤白􅇸馭吏隨至公車知狄入雲中吏歸白狀吉召東曹案邊長吏科瑣條其人詔問狄所入郡邑吉具對見謂丨丨思丨本傳調鼎實注見上文贊化原爕丨丨丨調和鼎實栁集表安黎庶唐文宗以度支戸部分命宰臣鎮之郭承嘏論之曰宰相者上調隂陽下丨丨丨致時清平俾之閱簿書筭緍帛非所宜也二相共和周宣王即位用公召公丨丨行政號曰丨丨三相愈卑孫叔敖曰吾丨丨楚而心丨丨荀子代相守法蕭何薨曹參聞之告舎人曰趣治行吾且入相使者果召參參丨何為丨事無所變更遵何之約束百姓歌之曰蕭何為法講若畫一曹參代之守而勿失載其清静民以寧一本傳同心輔政魏相為相丙吉為御史大夫丨丨丨丨上皆重之本傳有宰相器何武初為郡吏時太守何夀知武丨丨丨丨前本傳又冦恂經明行修名重朝廷所得秩俸厚施朋友及從吏常曰吾因士大夫以致此可獨享之乎時人歸其長者謂丨丨丨丨後冦恂傳又龎參入為大鴻臚虞詡薦參丨丨丨能後龎參傳誠台輔器孟康薦崔琳曰切見司𨽻崔琳牧守州郡所在而治及為分司萬里肅齊丨丨丨之妙丨衮職之良材後崔琳傳有大臣節張九齡為相諤諤丨丨丨之丨同心濟謀唐杜如晦方為相時天下新定臺閣制度憲物率二人討裁每議事帝所如晦長於斷而𤣥齡善謀二人深相知故丨丨丨丨以佐佑帝當世語良相必曰房杜本傳相維致平李玨曰祖宗倚宰相天下事皆先平章君臣丨丨所以丨太丨也李玨傳人物第一唐李揆同平章事帝曰卿門地丨丨文學皆當世丨丨信朝廷之羽儀乎本傳宰相標首唐自武徳以來丨丨寛厚以陸象先為丨丨詞翰以姚元崇為標首文學以張說為標首决遣以張義正為標首西京雜記元老股肱𤣥宗謂宋璟曰卿國之丨丨為朕丨丨耳目宋璟傳上宰功名建丨丨近立丨丨者李泌贊五龍夾日狄仁傑䝉耻奮忠以權大謀引張柬之等卒復唐室功盖一時而人不及知故吕温頌之曰取日虞淵洗光咸池潛授丨丨丨丨以飛世以為知言本傳一柱承天姚崇與張説有隙崇死謂其子曰我死張説來弔爾以我平日寳玩盡列于前如説屬目即舉以獻之就問其求神道碑纔得即模刻以示外此人見遲梢緩即悔彼不顧則吾族無噍類矣子如其言説來果屬目稱去後即以獻之遂求所為文説許之故其碑曰丨丨丨丨髙明之位列四時成歳亭毒之功深後説悔來索則碑已模刻矣説嘆曰死姚崇猶能筭生張説後譖不行唐記一代偉人姚狄蘇宋皆丨丨丨丨或三入相再入相未有不乆於其事能成令名焉柳氏家學録二客公輔王珪始隠時與房杜善母李嘗曰兒必貴然未知所與遊者何如人試與偕來會元齡等過其家李闚大驚曰丨丨丨丨才汝貴無疑王珪傳朝野相賀楊綰字公權謚文簡久積公輔之望及拜相詔出丨丨丨丨唐本傳海内想望唐徳宗即位擢崔祐甫為相頗以道徳寛人以宏上意故建中初政聲藹然丨丨丨丨正觀之理公紀天下重輕裴度名震四夷用不用常為丨丨丨丨本傳天下具瞻王鍔將加平章事居易以為宰相丨丨丨丨非有重望顯功不可任白居易傳匈奴怪問武帝征和三年以車千秋為丞相千秋無材能學術又無閥閱功勞特以一言悟意旬月取宰相世未有也後漢使至丨丨單于丨而丨之曰聞漢新拜丞相以何用得之使者以上書言事故單于曰茍如是非用賢也妄一男子上書即得之矣本傳單于仰視王商有威重容貌絶人單于來朝商坐未央廷中單于前拜謁商離席與言丨丨丨丨商貌大畏之遷延却退天子聞而嘆曰真漢相矣謹愿賢輔順帝之世梁商稱為賢輔豈以地居亢滿而能謹愿自終者乎後梁商傳為真宰相隋髙穎有文武之大畧明逹政務朝野推服議者以丨丨丨丨本傳尚徳尚道唐元宗即位以來所用之相姚崇丨丨宋璟丨丨張嘉貞尚吏張説尚文李元紘蘇暹尚儉韓休張九齡尚直通鑑窮俗窮權張氏三世宰相然各有所窮嘉正丨於丨延賞窮於伎洪靖丨於丨張延賞贊遜直濟文太宗定禍亂而房杜不言功王魏善諫而房杜丨以丨英衛善兵而房杜丨以丨房杜贊應變守文姚崇善丨丨以成天下之務宋璟善丨丨以持天下之正天所以佐唐使中興也姚宋贊同筦朝政如晦與元齡丨丨丨丨引士賢者下不肖咸得其職當時浩然歸望房杜賛不閲訟牒太宗謂房元齡曰公為僕射當廣朕耳目助訪賢才比閲訟牒日數百豈暇求人哉乃勑細務屬左右丞大闗僕射房元齡傳興仆植僵太宗用元齡如晦於大亂之後紀綱彫弛而能丨丨丨丨使號令典刑粲然罔不全備雖數百年猶䝉其功然求所以致之之蹟殆不可見房杜賛獻可替否見後事至即斷注不負天子陸䞇為相所言皆拂帝短或規其太過對曰吾上丨丨丨丨下不負所學唐本傳要説天子姚崇以十事丨丨丨丨而後輔政顧不偉哉唐姚宋傳贊事至即斷唐蘇頲與宋璟同當國相得懽甚璟曰吾與蘇氏父子同為宰相僕射長厚自是國器若獻可替否丨丨丨丨盡公不顧私則今丞相過之通鑑事先平章