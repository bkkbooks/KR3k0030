相道得而萬國理矣相道既得萬國既理天下舉首而望曰吾相之功也後之人循跡而慕曰彼相之才也大哉相乎通是道者所謂相而已矣韓愈上韓光範書正月二十七日韓愈再拜獻書相公閤下詩之序曰菁菁者莪樂育材也君子能長育人材則天下喜樂之矣孟子曰樂得天下英材而教育之此皆聖人賢士之所極言至論古今之所宜法者也然則孰能長育天下之人材將非吾君與吾相乎孰能教育天下之人材將非吾若與吾相乎今若聞有以書進宰相而求仕者而宰相不辱焉而薦之天子而爵命之而布其書於四方枯槁沉溺魁閎寛通之士必且洋洋焉動其心峨峨焉纓其冠于于焉而來矣後十九日復上書曰向上書及所著文後得命凡十九日不得命恐懼不敢逃遁不知所為乃復自䧟不測之誅以求畢其説且今節度觀察使及防禦營田諸小使尚得自舉判官無問已仕未仕者况在宰相吾君所尊敬者而曰不可乎後二十九日復上書曰愈聞周公之為輔相其㥯於見賢也方一日三吐其哺方一沐三握其髪當是時天下之賢才皆已舉用姦邪讒倿欺負之徒皆已除去四海皆已無虞九夷八蠻在荒服之外者皆已賓貢天災時變昆蟲草木之妖皆已銷息天下所謂禮樂刑政教化之具皆已脩理風俗皆已敦厚動植之物風雨霜露之所霑被者皆已得宜休徴嘉瑞麟鳯龜龍之屬皆已備至而周公以聖人之才憑叔父之親其所輔導承化之功又盡章章如是其所求進見之士豈復有賢於周公者哉不惟不賢於周公而已豈復有賢於時百執事者哉豈復有所計議能補於周公之化哉然而周公求之如此其㥯惟恐耳目有所不聞見思慮有所未及以負成王託周公之意不得於天下之心如周公之心設使其時輔理承化之功未盡章章如是而非聖人之才而無叔父之親則將不暇食與沐矣豈特吐哺握髪為勤而止哉維其如是故于今頌成王之徳而稱周公之功不衰今閤下為輔相亦近耳天下之賢才豈盡舉用奸邪讒倿欺負之徒豈盡除去四海豈盡無虞九夷八蠻之在荒服之外者豈盡賔貢天災時變昆蟲草木之妖豈盡銷息天下所謂禮樂刑政教化之具豈盡修理風俗豈盡敦厚動植之物風雨霜露之所霑被者豈盡得宜休徵嘉瑞麟鳯龜龍之屬豈盡備至其所求進見之士雖不足以希望盛徳至比於百執事豈盡出其下哉其所稱説豈盡無所補哉今雖不能如周公吐哺握髪亦宜引而進之察其所以而去就之不宜黙黙而已也愈之待命四十餘日矣書再上而志不得通足三及門而閽人辭焉惟其昏愚不知逃遁故復有周公之説焉閣下其亦察之古之士三月不仕則相弔故出疆必載贄然所以重於自進者以其於周不可則去之魯於魯不可則去之齊於齊不可則去之宋之鄭之秦之楚也今天下一君四海一國舎乎此則夷狄矣去父母之邦矣故士之行道者不得於朝則山林而已矣山林者士之所獨善自養而不憂天下者所能安也如有憂天下之心則不能矣故愈每自進而不知愧焉書亟上足數及門而不知止焉寧獨如此而已惴惴焉惟不出大賢之門下是懼亦惟少􅂷察焉凟冐威尊惶恐無已詩集衡宰絳灌歸丨丨後漢酈圭詩皇佐丨丨揚天惠四時無交兵曹子建詩清文貴相山瞻峻丨丨玉絶瑕韓文公詩清風吾愛房與杜魁然眞宰輔黄閣三十年丨丨億萬古皮日休詩廊廟器大厦須異材丨丨非庸丨選雜體詩鼎軸老榮公丨丨丨烹斡力健倔韓文公詩金印客楊收王鐸皆逄同年也收作相逄作詩曰須知丨丨朝天客同是沙堤避路人威鳯偶時皆瑞聖應龍無水謾通神收大銜之王拜相又作詩曰昨日鴻毛百鈞重今朝山嶽一毫輕鐸又怒之唐本事詩金鼎佐一戰文塲㧞趙旗便調丨丨丨無為王仁裕上傅相國補山龍早歲天教作霖雨明時帝用丨丨丨王建上張相得麒麟霖雨思賢佐丹青憶老臣應圖逄駿馬驚代丨丨丨沙汰江湖濁調和鼎鼐新杜詩福蒼生終當持一筆再入丨丨丨劉夢得送令狐相公得舊儒左轄頻虛位今年丨丨丨相門韋氏在經術漢臣知杜詩掌洪鈞十年紫殿丨丨丨出入三朝一品身文帝寵深陪雉尾武皇恩厚宴龍津李徳裕昇玉署朝丨丨丨朝天紀王勃洪鈞轉一氣轉丨丨杜上章左相相車遊林館經春瑞氣浮當時曽約丨丨丨白樂天金科篆字柳陰半眠丞相樹珮馬圢玲蹋沙路帝前簪笏稱南山獨垂重印押千官丨丨丨丨紅屈盤沙路歸來聞好語早火不光天下雨李賀沙堤路曲玉鼎金章丨丨昇黄閤丨丨謁紫宸任希古班絶百辟清如氷玉重如山百辟嚴趨禮絶班强狄外聞應破膽平人長見合開顔岑參上濮相公印押千官見上金科篆字注印將金鎖唐韋相國罷右司員外郎寄寓荆州作詩云丨丨丨丨鎖簾用玉鈎鈎即京兆大拜氣概詩中已見之矣北窓瑣言裳補色線平生五色線願補舜衣裳杜收古今合璧事類備要後集卷十三
