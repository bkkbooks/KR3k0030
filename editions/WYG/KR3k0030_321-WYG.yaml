body:
  text: 古今合璧事類備要外集卷二十一宋謝維新撰刑法門學獄刑法總論見前卷事類學斷邾婁定公曰寡人嘗丨丨斯獄矣記檀弓學決漢張湯父為長安丞出湯為兒守舍還䑕盗肉父笞湯湯乃掘熏得䑕及餘肉劾䑕掠治傅爰書訊鞫論報並取䑕與肉具磔堂下父視文辭如老獄吏遂使書獄注丨丨獄之書乃學為律令也前本傳疑獄疑赦疑獄氾與衆共之衆丨丨之記王制疑讞諸丨獄雖文致於法而於人心不厭者輒丨之漢景帝詔論決髙帝詔御史獄之疑者吏不能決使有罪者久而不丨無罪者久繫而不丨自今縣道官獄疑者各讞屬所二千石官二十石官以罪名當報之注當處也其所不能決者移廷尉廷尉亦報之廷尉不能決者具奏平亭張湯決獄欲傳古義乃請博士弟子治尚書春秋補廷尉史丨丨疑法注亭均也奏疑讞事必先奏上分别其原上所是受而著讞法廷尉挈令注著謂明書之挈者獄訟之要也書於讞法挈令以為後代式史按訊崔善為仕隋調文林郎督工徒五百營仁壽宫摠監楊素索簿閲實善為執板暗唱無一差繆素大驚自是四方疑獄悉令丨丨皆究其情辨處杜佑補剡縣丞常過潤州刺史韋元甫元甫以故人子待之不加禮它日元甫有疑獄不能決試訊佑佑為丨丨契要無不盡元甫竒之署司法參軍叅裁韋思謙髙宗賢之疑獄劇事多與丨丨并州賊唐韓思彦字英遠使并州有賊殺人主名不立碎胡懷刀而汙訊掠已服思彦疑之晨集童兒數百暮出之如是者三因問兒出亦有問者皆曰有之乃物色推訊遂擒真盗史卭州盗崔従字子义攝守丨丨前刺史有以丨繫獄辭已具從疑其寃縦不治俄得真盗訊不承成汭頗知吏治嘗録囚盡其情墊江賊陰殺令其主簿疑小吏導之丨丨丨臨刑曰我且訟地下踰月吏暴死汭聞益詳於獄似必誅韓滉罪渉疑丨丨丨留獄不留君子以明謹用刑而丨丨獄易旅卦無留仲秋命有司嚴百刑丨丨有罪記月令梁山謀逆宋璟京兆人權丨丨者丨丨勑河南尹王怡馳傳往按牢械充滿久未決乃命璟為京留守復其獄初丨丨詭稱婚集多假貸吏并坐貸人璟曰婚禮借索大同而狂謀率然非所防意使知而不假是與為反弗知何罪之云縱數百人鄧琬負米唐扶字雲翔太和五年為山南宣撫使内鄉倉督丨丨丨度支漕丨七千斛吏責償之繫其父子至孫凡二十八年九人死於獄扶奏申釋之詔切責塩鐵度支二使天下監院償逋繫三年以上者皆原之千數不決殷佑初塩鐵度支使屬官悉得以罪人繫在所獄或私置牢院而州縣不聞知歲丨百丨丨時丨侑奏許州縣糾列所繫申本道觀察使并具獄上聞許之三赦不原白居易字樂天度支有囚繫閿鄉獄更丨丨丨得丨又奏言父死繫其子夫久繫妻嫁債無償期禁無休日請一切免之奏凡十餘上益知名笞死女𨽻至和中陳執中為宰相其嬖人張氏笞女𨽻至死臺官趙抃范師道極言執中營救張氏故獄久不直偽冒官戸劉厰字原父治長安豪猾歛手良民得職大姓范偉積産數百萬冒武功縣令范祚為其祖持祚為令時黄勑家不徭役盗掘祚墓以己祖母合葬之謾云祚繼室也數犯法至徒流輒以贖去長安人皆知偉罔冒不敢言吏受賄輒為蔽匿公因事發之窮治伏罪會大赦未斷而公去雍偉因謀變及前狀是後連五獄證逮四五百人展轉二年朝廷以委御史乃不得變後更大赦杖之而已寃獄非罪子謂公冶長雖在縲絏之中丨其丨也語五無辜衛侯夢人被髪北面而譟曰予為渾良夫呌天丨丨左五月霜鄒衍被囚仰天而歎丨丨降丨三年旱東海孝婦養姑甚謹夫死不嫁姑女告婦殺母婦自誣服殺姑獄椽于公明之不可竟殺之郡界旱丨丨後太守至祭其冡天乃雨又上虞孝婦事姑以壽終姑女誣告婦鴆之竟結其罪孟嘗伯周為戸曹明之不可亦連丨後太守殷丹至明之遂雨血逆流晉劉隗大連為司直丞相府斬督運令史淳于伯丨丨丨隗奏曰斬伯著柱遂逆上絲桓末復下流百姓讙譁咸曰寛伯子恵亦訴父不乏軍興孕不貸髙駢字千里駢之自將出屯也突將亂乗門以入監軍収役夫數百名叛卒籍斬其首乃定駢徐出以金帛厚賞士開府庫悉還其民廪然宻籍所給姓名夜遣牙將繫殺之夷其族雖丨者丨丨投尸于江有一婦方踞而乳子將就刑媪傷之疑其畏死謂曰以子丐我一詣曹司婦蹶起曰我知之且飽吾子不可使以饑就戮見刑者拜曰渠有節度使奪戰士食一日忿怒淫刑以逞國家法令何有也我死當訴于天使此賊闔門如今日寃也逮死神色晏然蜀人聞者為垂泣吏暴死成汭頗知吏治事見前疑獄注宋申錫丨丨丨既被罪怡然不以為意自中書歸私第止於外㕔素服以俟命其妻出謂之曰公為宰相人臣位極於此何負天子反乎申錫曰吾自書生被厚恩擢相位不能鋤去奸亂反為所羅織夫人察申錫豈反者乎因與泣後開成元年李石因延英召對從容言曰陛下之政皆承天心惟申錫之枉久未原雪帝慙曰我當時亦悟其失而詐忠者廹我以社稷計爾使逄漢昭宣時當不坐此因追復右丞李昭徳萬歲通天二年來俊臣誣以謀逆既而俊臣亦下獄同日誅時雨甚衆莫不寃昭徳而快俊臣報獄靜蘇逄吉事見前獄注聞鬼哭李錡之誅大霧三日不開或丨丨丨上疑其寃詔収葬南部新書張齊賢言本朝太宗朝丨丨丨丨令州縣每月具禁放數聞故為淹滯者放黜無寃滯則校其旌賞會要馮元吉辨石州判官丨丨丨丨寃獄全活者二人特超一資賜緋章服奬之寳訓夢人來告胡宿字武平通判宣州有被誣以殺人者獄成議法將抵死公疑之呼囚以訊囚憚箠楚不敢言公正衣冠坐堂上思之俄而假寐夢有人來告曰吳姓也公遽引内辟左右復訊之囚曰旦將之田縣吏執以赴官不知其由也公取獄辭窮治乃被毆之婦與吳姓姦姦者殺其夫與婦謀執平人以告之行狀仲孫審獄姚丨丨為許州司理時有王嗣宗知州事民有被盗殺者其妻訴里胥責賄於其夫不與而惡之此必盗也乃捕繫獄將抵死仲孫疑之嗣宗怒曰若非盗耶然亦不敢遽決後數日果得真盗嗣宗喜曰丨丨當如是也改資州轉運使檄往富順監按疑獄全活者數十人張奎辨囚丨丨為婺州有滯囚法當死獄成三問輒不伏轉運使命奎覆按一視牘而辨之得不死人皆伏其明唐肅白寃丨丨為泰州司理有商人夜宿逆旅而同宿者殺人亡去旦視之血汚其衣為吏所執不能明遂自誣服肅為丨其丨而知州馬知節趣令具獄肅固持不可後數日果得真殺人者厚徳録訪問非盗孫觀察廉權知滄州有刼盗獄成廉疑之謂其僚屬曰我武人也獄辭非吾事試召其鄰里而丨丨之皆曰此貧居他不事今以為盗非也既二日果得真盗降詔奬諭厚徳錄釋囚得賊靳宗説嘗攝滄州塩山縣事有繫囚坐殺人法當死宗説疑之會犯者言其母年九十病甚願一别母而死宗説惻然丨丨縳令人與俱至家既而吏獲所殺人者厚徳録鬻獄訖富典獄非訖于威惟丨于丨注典主也訖絶也絶當謂賄賂不行書府辜獄貨非寳惟丨丨功注府聚也辜罪也功事也言受獄貨非寳惟以聚罪之事同上納其女晉邢侯與雍子爭鄐田久而無成士景伯如楚叔魚攝理韓宣子命斷舊獄罪在雍子雍子丨丨丨於叔魚叔魚蔽罪邢侯邢侯怒殺叔魚與雍子於朝左昭公十四年賂以樂梗陽人有獄魏戊不能斷以獄上其大宗丨丨女丨魏子將受之魏戊謂閻没女寛曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭饋入召之比置三歎既食使坐魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之間三歎何也同辭而對曰或賜二丨人酒不夕食饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人之腹為君子之心屬厭而已獻子辭梗陽人左昭二十九錢十萬張延賞聞度支有一寃獄久不决每不平之及判度支期以每日案上有一貼子云奉錢三萬乞不問其獄公怒悉収公吏左右訊之明日於曰洗處云丨丨丨又於寢所云丨丨丨公嘆丨盥丨丨可以通神乃不問幽閑鼓吹金五百裴寛先是寛以所善請於裴敦復即欲白發其言林甫趣之敦復未及聞扈幸温泉宫而其下禆將程藏耀曹鍳自以它事繫臺寛捕案之敦復謂寛求致其罪遽以丨丨丨兩賂貴妃姊妹因得事聞於帝由是貶寛睢陽之守貴倖鬻裴寛遷刑部員外萬騎將軍馬崇冐殺人而王毛仲方以丨丨將丨其獄寛固執不從參軍鬻陸肱宣宗時除刺史有録事丨丨頗尚修潔肱召問曰録事丨丨有㡬對曰有三下等懦政虐刑貪財丨獄即懼失事唐語林門如沸湯李義府母與妻諸子皆市獄丨丨丨丨厲謝中庭見寃獄詳察色子文動色魏護軍營士竇禮出不還營以為之没事其妻盈及男女詣廷尉髙柔曰為夫不與人交錢財乎妻曰嘗出錢與同營焦子文柔察丨丨丨丨應對召至於是扣頭首殺禮李若色動胡質為常山太守盧顯為人所殺質曰此士無讎而有一少妻見其比居年少書吏丨丨丨丨遂窮詰罪人斯得矣黄門伏罪吳孫亮事見續集梅子注馮昌具服符融字博林善斷獄董豐遊學三年而反宿妻家妻為賊殺妻兄疑豐融引問汝初行不有怪及卜占否豐曰初發夢乘馬渡水自北而南俯見兩日在水中馬左濕筮者云憂獄訟逺三沐避三枕既至妻具沭夜授豐枕豐憶筮言皆不從妻乃自沭枕枕而寢融曰易坎為水離為馬南渡旋北而南從坎至離六爻同變離為中女坎為中男左向濕水也水左有馬馮字兩日昌字其丨丨殺之昌乃丨丨與妻通期新沐沐者枕枕為驗誤中婦人後出真盗冀州有老母遇刼唱盗人為逐之擒盗反誣行人日暮毋及路人莫知符融曰二人並走先出鳯陽門者非盗既還融正色謂後出者曰汝真盗其發奸擿伏如此惟有廷椽後漢周紆字文通為邵陵相廷椽憚紆嚴明欲損其威乃取死人斷手足立寺門紆便往于死人邉若與死人共笑語狀陰察口眼中有稻芒乃宻問守者曰誰載藁入城對曰丨丨丨丨耳又鈐下云外惟廷椽疑君與死人語乃収廷椽而考問具服不殺人但取道邉死人自後莫敢犯之令吏追聴有一人持一疋絹到市責遇雨而披覆後一人求庇廕授一頭雨霽當别因爭云是我縑太守薛宣呼騎吏斷各與半使追聴之後人曰君恩縑主稱寃不已宣知其狀栲問乃服令吏縳來陸雲為浚儀令人有被殺主名不立雲録其妻無所問遣出宻丨丨隨之曰有一男與語便丨丨果得之云與妻同謀殺子長為政李丨丨丨丨欲知囚情以梧桐為人像囚之形鑿地為坎置木囚於其中罪若正木囚不動若有怨木囚即動豈囚之情着木人也懷素守法馬丨丨字惟白魏元忠謫嶺表太僕崔貞謹東宫率獨孤禕之祖道張易之怒使上急變告貞謹與元忠謀反武后詔懷素按之使者促廹懷素執不從曰貞謹餞流人當得罪以為謀反則非昔彭越以逆誅欒布奏事尸下漢不坐罪今元忠罪非越比不宜坐餞閣之人且陛下操殺生之柄欲加之罪自當處决聖心既付臣按惟知守陛下法爾后意解盜劫貢船錢徽守蔚章貶江州刺史初州有丨丨丨丨捕吏取濱江惡少年二百人繫訊徽按其枉悉縦去數日舒州得真盜聞哭知寃鄭子産晨出聞婦人哭柎僕之手而聴有間使吏執而問之即手殺其夫也其僕問曰夫子何以知之子産曰凡人於所親愛知病而憂臨死而懼已死而哀今哭已死而懼知其姦也王充論衡挾私殺妻李景略凉州人闔門讀書李懷光為朔方節度使招在幕府五原有偏將張光者丨丨丨丨前後不能斷光富於財獄吏不能劾訊得實情以景略驗之光伏辜既而亭午有女被髪血身膝行前謝而去譚賓録女哭不哀嚴遵為揚州刺史行部聞道傍丨子丨而丨丨問之夫遭燒死勑吏輿尸令人守曰當有物往吏白有蠅聚頭所遵披視鐡錐貫頂考問以滛殺夫耆老傳婦哭不悼韓滉在潤州夜與從事登萬歲樓方酣置杯不悦語左右曰汝聴婦人哭乎當近何所或對在某街詰朝命吏捕哭者訊之信宿獄不具吏懼罪守於戸側有大青蠅集其首因發髻驗之果婦私於鄰醉其夫而釘殺之吏以為神因問晉公晉公云吾察其哭聲疾而不悼若强而懼者酉陽雜爼辨金化土李汧公勉鎮鳯翔有屬邑編甿因耨田得馬蹄金一甕里民送于縣縣將置府庭邑宰欲以為殊績慮公藏主守不嚴因使置於私室信宿與官吏重開視之皆為塊土矣莫不驚駭以狀聞僉云姦計换之就鞫其案獲金里社皆共證邑宰莫能自白遂以易金伏罪拘繫僕𨽻脅以刑辟結成具獄以案上聞汧公覧之盛怒偶有宴筵語及斯事皆共驚嘆以為胠篋穿窬無足訝也時袁相國滋亦在幕中略無詞對李公目之曰邑宰者非判官親乎曰與之無素袁相曰甚疑此事更請詳之汧公曰换金之狀極明豈别有所見非判官莫能明之袁曰諾因俾移獄於府中案問乃云閲甕間二百五十餘塊語其初獲者即本質存焉遂於列肄索金鎔寫與塊相等既成始秤其半已三百斤矣詢其負擔之力乃二農夫以竹舁至縣境計其金非二人以竹擔可舉明其即路之時金已化為土於是羣疑大豁遂獲清雪汧公歎服無已每言才智不及其後履渉清途至徳宗朝為宰相劇談録古今合璧事類備要外集卷二十一
