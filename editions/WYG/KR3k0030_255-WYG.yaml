body:
  text: 古今合璧事類備要别集卷四十九宋謝維新撰衆木門松附松栢栝格物總論松木樹有小大大者數圍高十數丈磥砢多節皮極麄厚逺望之如龍鱗盤根樛枝四時青青不改柯葉春二三月抽蕤生花結子然數品或二針或三針或五針三針者謂栝子松五針者謂崧子松其脂味苦入地滿千年為茯苓又千年為琥珀皆可入藥事類化青牛大松千嵗其精丨為丨丨為伏龜為伏龜同上駢麈尾石門澗有松林仰視之離離如丨丨丨廬山記如馬鬛西嶺松丨丨丨又葉五粒者服之長生同上偓佺食丨丨好丨松實能飛行如走馬以松子遺堯堯不能服時受服者皆至三百嵗劉向神仙傳始皇封秦丨丨上封泰山逢疾風暴雨賴得抱樹因丨其樹為五大夫漢官儀馳道植秦始皇道廣五十歩三丈而樹厚築其外隠以金椎植以青松為丨丨之麗至於此賈山至言墓前種徐孺子墓在郡東時杜牧為守於丨丨丨松豫章記丁固夣丨丨丨松樹生腹上謂人曰松字十八公後十八年為公遂如夣吳錄淵明徑陶丨丨云三丨就荒松菊猶存陶集棟梁用庾亮見和嶠歎曰嶠森森如千丈松雖磥砢多節施之大厦有丨丨之丨本傳庭院植陶𢎞景特愛松風丨丨皆丨松毎聞其響欣然自樂獨遊泉石望見者以為仙人梁書張湛屋丨丨好於齋前種松樹人曰丨丨丨下陳屍世説秦系廬丨丨結丨泉州九日山有大松百餘章俗傳東晉時所植郡志松主人韋表㣲授監察御史不樂曰吾將為丨菊丨丨不愧陶淵明云本傳松處士鄭薫瑞勁再知禮部舉引寒畯士類多之既老號所居為隠巖號七丨丨丨本傳吟哦其間崔斯立為藍田縣丞植二松丨丨丨丨韓退之記手磨其枝唐武德中𤣥裝將往西域取經見一松樹以丨丨丨丨曰吾西去求佛教汝可西長若吾歸即却東向及去年年西向一年東向𤣥裝果囘衆曰此松為摩頂松廣異記射不及顛囘紇黠戞斯木松高者仰丨丨丨丨孔六帖化而為石囘紇㧞野古有川曰康于河斷松投之三年輒丨丨丨丨色蒼緻然節理猶在世謂之康于石同上樛枝者獻李泌嘗取松丨丨以隠背名曰養和後得如龍形丨因以丨帝同上枯松復生明皇遭祿山之亂鑾輿西幸禁中丨丨丨丨枝葉葱蒨宛如新植者後肅宗平内難再興唐祚祥不誣矣開元遺事去三尺蟲五代鄭遨聞華山有五粒松脂淪入地千嵗化為藥能丨丨丨丨因徙居華陰欲求之孔帖牽一白犬芳山有野人見一使者異服丨丨丨丨野人問居何地曰居偃葢山隨至古松下而没松形果如葢意使者乃松樹精犬乃茯苓耳金陵記夾道種松蔡君謨為閩部使者丨丨丨丨以蔽歊毒人至今賴之郡志符載植松論楚國主人嗜材搴異有植美松於庭者培沃土灌甘澤根柢深固柯葉暢達居三十年起盈尺挺於累丈始筳筯大於栱把高姿傑然若陵重雰主人方凝睇結意曰是可采之矣將行斧焉客有過之者曰噫其甚也是木有戞雲之姿有構厦之材繩墨太速恐失生理今植于庭除之間充耳目之翫尚見狎近氣色不振若徙於嵩岱之間沆瀣之華注於内日月之光溥於外祥鸞嗷嗷戲其上流泉湯湯鳴其下巖岫重複漠漠然清淨靈風四起聲掩竽籟是時也當境勝神王㧞地千丈根實黄泉枝摩青天則可以柱明堂而棟大厦也豈遐曠之㫖捨此而取其榱桷棼橑哉主人曰客言雖濶而無岸然余終能大之矣陸龜蒙恠松賛有道人自天台來示余恠松圖披之甚駭人目根盤于巖穴之内輪囷偪側而上身大數圍而高不四五尺礧磈然蹙縮然榦不暇枝枝不暇葉有若龍攣虎跛壯士囚縛之狀道人曰是何竒恠之如是乎余曰草木之生安有怪耶茍肥瘠得於中寒暑均於外不為物所凌折未有不挺而茂者也況松柏乎今不幸出於巖穴之内雖正性不辱而力與石鬬卒不勝其壓擁勇欝遏坌憤激然後大醜彰於形質天下指之為怪木吁豈異人乎哉天之賦才之盛者蚤不得用於世則伏而不舒薫蒸沉酣日進其道摧擠勢奪卒不勝其阨號呼呶拏發越赴訴然後大竒出於文彩天下指之為怪民嗚呼木病而後怪不怪不能圖其真人病而後竒不竒不能駭於俗非始不幸而終幸者耶道人曰然為我讃之讃曰松生陰隘巖嶽穴械病乎不快卒以為恠擁腫支離神羞鬼疑道人咨嗟筆傳其竒或恠於形或竒於辭吾為怪魁是以讃之栁宗元送崔羣正松産於岩嶺高直聳秀條暢碩茂粹然立於千仞之表和氣之發也禀和氣之至者必合於正性於是有正心勁質用固其本禦攘氷霜以貫嵗寒故君子儀之王龜齡巖松記野人有以岩松至梅溪者異質叢生根銜拳石茂焉匪枯森焉匪喬栢葉松身氣象聳焉藏參天覆地之意於盈握間亦草木之英竒者予頗愛之植以丸盤置之小室稽古之暇寓陶先生鄭處士之趣焉是日與同舍飲談故事因共覩之咸有欲得之色予曰有能續之以言者予非敢吝俄而篇章爭先而並至皆佳作也予不暇品第之莫知所贈因徙置于㑹趣堂與一齊之衆共之且告之曰諸友講於斯食於斯遊息於斯是松也常在眼焉奚必几案間然後為吾物耶雖然是松之意不可以不知産於岩谷於松肖形諸友之姿也青青之色凌傲雪霜諸友嵗寒之心也欝宻輪囷若偃若伸爪距奮而鱗角生諸友變化之象也今日之觀豈曰徒物而已哉唐人詩曰鼎君松栢心予於諸友亦然松栢松栢成行猗頓至孝母喪頓立墳厯年乃成居服踰制種丨丨丨丨先賢傳松栢數株後漢方儲居母憂負土成墳丨丨丨丨鸞鳥棲其上白兎遊其下兎遊其下見上注鶴棲于上千嵗之丨丨丨松栢之丨白六帖希夷餌葉王丨丨丨松栢丨雜華孔六帖郎家成林郎餘令授霍王元軌叅軍從父知年亦為王友元軌毎曰丨丨二賢皆二府不意培塿而松栢丨丨也同前王濤手植王濤遭母制歸鄉里丨丨年老丨丨松栢簡文姿茂顧愷之與丨丨帝同年而髪蚤白帝問其故對曰松栢之丨經霜猶丨蒲桞之質望秋先零帝悦其對本傳栝揚州貢丨丨厥丨杶榦栝栢書禹貢詩集鬱鬱丨丨澗底松選森森丨丨千丈松磊砢非一節晉袁宏勁節凌風識丨丨負霜知真心梁范雲貞姿懷此丨秀丨卓為霜下傑淵明鸞倚青丨丨長松韓龍盤錯落千丈松虬丨丨古根李石冠巖青松丨丨列陶叅天中有松栢丨丨長杜甫隔水踈松隔水奏笙簧雪榦大哉霜丨丨嵗久為寒材前人風標寒松縱老丨丨在白樂天露滴身㸔松丨丨丨杜聲清耳南窓蕭瑟松丨起憑誰一聽丨心丨李白釵千股長松夜落丨丨丨韓渥條百尺亭亭山上松一一生朝陽森森上叅天柯丨丨丨長云云嵗莫滿山雪松色鬰蒼蒼彼如君子心秉操貫氷霜白樂天嶓穹蒼四松初移時大抵三尺强別來忽三載離立如人長幽色幸秀發疎柯亦昂藏所插小藩籬本亦有隄防終焉掊觸損得媿千葉黄覽物歎良謝及兹慰凄凉清風為我起洒面若㣲霜是亦送老姿聊待偃葢張我生無根蔕配爾亦茫茫有詩且賦詩事迹兩可忘勿矜千載後惨澹丨丨丨杜甫四松承雨露孤松停翠葢託根臨廣路不以防自防遂為明所誤幸逢仁惠意重此藩籬䕶猶有半心存時將丨丨丨栁子厚道傍松凌雲霄南軒有孤松柯葉自綿冪清風無閑時瀟洒終日夕陰生古苔綠色染秋煙碧何當丨丨丨直上數千尺李白凌雲木自小刺頭深草裏而今漸覺出蓬蒿時人不識丨丨丨直待丨丨始道高杜荀鶴小松栖日榦近世交道衰青松落顔色人心忘孤直本性隨改易既摧丨丨丨未展擎天力終是君子材還思君子識孟郊衰松榦排風雷春風吹榆林亂荑飛作堆荒園一雨過戢戢千萬栽青松種不生百株望一枚一枚已有餘氣壓千畝槐野人易斗粟云自魯徂徠魯人不知貴萬竈飛青煤束縛同一車胡為乎來哉泫然解其縛清泉洗浮埃枝傷葉尚困生意未肯囘山僧老無子養䕶如嬰孩坐待走龍蛇清陰滿南臺孤根裂山石直丨丨丨丨我今百日客養此千嵗材茯苓無消息雙鬂日復催古今一俛仰作詩寄餘哀坡枝隔煙雨偃蹇松丨丨丨丨知儂定是嵗寒材百年根節要老硬將恐崩崖倒石來直氣森森丨丨丨丨恥屈盤鐵衣生澁紫鱗乾影揺千尺龍蛇動聲撼半天風雨寒蒼蘚淨緣離石上翠蘿高絆入雲端石曼卿瘦骨亭亭風韻颼飀逺更清蒼髯丨丨聳丨丨栝東南美翠栝丨丨丨近生神嶽陰惜哉不可致霜根絡雲岑仙風振高標香實隕平林偶隨樗櫟生不為樵牧侵忽驚黄茅嶺稍出青玉鍼好事雖力取王城少知音豈無換鵞手但知覔來禽高懷獨夫子一見捐槖金得之喜不寐贈我意殊深公堂開後閣凡本媿華簮栽培一寸根寄子百年心常恐樊籠中摧我鸞鶴衿誰知積雨後寒芒曉森森恨我迫歸老不見汝千尋蒼皮䕶玉骨旦暮視古今何人風雨夜卧聽飢龍吟東坡種栝禮曹北垣栢附檜格物總論栢樹大者數圍高數丈皮光滑枝榦脩聳葉香烈所在深山中有之一種名側栢葉大不相類如鋪茸細細相比檜亦光皮然葉尖硬如芒刺檜栢相半者名檜栢皆能結子柯葉青青四時不彫也事類厥貢荆州丨丨杶榦栝栢書禹貢是斷新甫之栢丨丨是度是尋是尺詩閟宫倒生大谷丨丨之栢與天齊其長地等其久也抱樸子後彫嵗寒然丨知松栢之丨丨也語孔子廟魯郡丨丨舊丨有栢二十四株厯漢晉其大連抱土人崇敬之莫犯也水經徐君墓延陵季子解寳劍于丨丨丨栢樹而去以其心許之也本傳食柏實赤松子好丨丨丨齒落更生列仙傳造栢梁漢武丨丨丨臺二十四丈悉以栢香聞數十里本紀盜者弃市漢諸陵皆属太常有人丨栢丨丨丨三輔舊事色亦為惨王褒痛父非命絶世不仕居墓側旦夕常至墓前朝拜輒悲號斷絶墓前栢樹褒常所攀涕泣其栢丨與凡樹不同丨丨丨焉烏棲其上朱博為御史大夫府中列栢有丨數十丨丨丨後世稱曰栢臺史蟲蝕作字昭帝時長安諸陵栢樹枯倒者悉起之葉丨丨丨丨云曽孫病巳立後昭帝崩昌邑王被廢迎立宣帝宣帝名病巳漢史栢林蔭藹栢谷谷名也漢武帝㣲行至谷中無囘車地夾以高原丨丨丨丨窮是幽暗弗睹陽景述征記栢樹株數虞延為郡督郵光武巡狩至外黄問延園陵丨丨傳丨丨延悉以對由是見知本負土以植李恂遭父母喪六年躬自丨丨丨丨栢冡下東觀記埋鐵其下桑道茂居有二栢甚茂曰人居而木蕃者去之木盛則土衰土衰則人病乃以鐵數十斤丨丨丨復曰後有發其地而死者太和中温造居之發藏鐵而造死異聞錄有棟梁器司徒袁粲見王儉而歎曰宰相之門也栝柏豫章雖小亦丨丨丨之丨本傳教服食法田鸞入華山見黄冠師師語曰栢葉乃長生藥也丨以丨丨之丨後得道朝上真雜説孤山陳朝栢丨丨有丨丨丨二株其一為人所薪僧志詮作堂其側名曰栢堂東坡作二詩燕談巴東萊公栢冦萊公知丨丨縣嘗手植雙栢於縣庭至今民比甘棠謂之丨丨丨後丨丨大火栢與公祠俱焚明年莆陽鄭贑來為令悼栢之焚惜公手植不忍剪伐種凌霄於下使附榦而上以著公之遺德且慰邦人之去思云燕談祖師西來意僧問趙州和尚丨丨丨丨丨趙云庭前栢樹子又有老宿怱拈拄杖謂僧曰要識趙州麽這裏是趙州傳燈錄江夏王栢賦既殊羣而抗立亦含貞而挺正豈春日之自芳亦霜下而為盛衝風不能摧其枝積雪不能改其脩性賦雖壈坎於當年庶後彫之可詠齊江夏王鋒栢李德裕進戒帝辨邪正請以物為喻松栢之為木孤生挺特無所因倚蘿蔦則不然弱不能立必附他木杜子美古栢行孔明廟前有老栢柯如青銅根如石霜皮溜雨四十圍黛色參天二千尺君臣已與時際㑹樹木猶為人愛惜雲來氣接巫峽長月出寒通雪山白憶昨路繞錦亭東先主武侯同閟宫徘徊枝榦郊原古窈窕丹青户牖空落落盤據雖得地冥冥孤高多烈風扶持自是神明力正直元因造化功大厦如傾要梁棟萬牛囘首丘山重不露文章世已驚未辭剪伐誰能送苦心豈免容螻蟻香葉終經宿鸞鳯志士幽人莫怨嗟古來材大難為用檜榦左紐太清宫檜老子手植根株枝丨皆丨丨太清記枝再生此檜不知年代後李唐之盛一丨丨丨至聖朝復有此異石曼卿詩集詩集青青丨丨陵上栢文選森森錦官城外栢丨丨杜鳯雛翔有栢生崇岡童童狀車葢偃蹇龍虎姿主當風雲㑹神明依正直故老多再拜豈知千年恨中路顔色壞出非不得地蟠踞亦高大嵗寒恐無憑日夜柯葉改丹丨領九丨哀鳴丨其外鴟鴞志意滿養子穿穴内客從何鄉來佇立久吁怪靜求元精理浩蕩難倚賴杜甫病栢龍皮戞幽幽太華側老栢如建纛丨丨相排丨翠羽更蕩掉李賀轉蕭瑟松栢丨丨丨文選本孤立松栢丨丨丨難為桃李顔杜葉隨酒樽前栢丨休丨丨杜聲疑雨晉朝名軰此離羣想對濃陰去住分題處尚尋王内史畫時應是鮑叅軍長廊夜靜丨丨丨古殿秋深影勝雲一下南臺到人世晚泉清韻更誰聞温庭筠未覺枯雖當霰雪巖丨丨栝栢丨杜動盈掬佳人采栢丨丨丨孔帖蒼龍吟澗底長松風雨寒岡頭老栢顔色悦天生草木臭味同同盛同衰見氷雪君莫愛清江百尺船刀鋸來謀嵗寒節千林無葉草根黄丨髯丨丨送日月山谷白鶴下庭栢無生意摧殘二十秋稍沾杯水潤己與嵗寒謀黄裏青青出愁邊稍稍瘳㑹看丨丨丨暮瘳莫深投后山蒼蒼榦故園多珍木翠栢如蒲葦幽囚無與樂百日看不已來時拾流肪未忍踐落子當年誰所種少長與我齒仰視丨丨丨所閲固多矣應見李將軍膽落温御史坡公御史臺栢凛凛節丨丨丨竒霜榦栢檜翠為葢淮南庭中有蒼檜仰視團團丨丨丨直榦毎容鸞鳯棲盤根深壓鯨鰲背北風預作兵陣聲恐取蛟龍斬天外呼童出屋為我窺摩颭清陰月光碎問誰植之前蔣公得地倐經三十載不同種杏上青天正似甘棠有遺愛使華今復見公孫太平事業鍾一門祖朝冠葢漸塵土却嗟此檜春長存孤高豈忘栽培力秀發兼承造化恩已看枝葉飽霜露終作梁棟扶乾坤新詩編聯盡珠玉光大先烈聽箎塤更憶丹青妙畫手進入明堂逢至尊郭功父詠蔣公檜根如輪君家大檜長百尺丨丨車丨身弦直壯夫連臂不肯抱孤鶴高飛直下立穎濵左紐文江陰多老檜處處屯蒼雲地連丹砂井物化青牛君時有再生枝還作丨丨丨王孫有古意書室延清芬應怜四孺子不墮凡木羣體備松栢姿氣含芝本熏初扶鶴骨立未出龍纒筋巢根白蟻亂網葉青蟲紛乃知蔽芾初甚要封植勤他年皮三寸狐䑕子不聞坡大厦材種木待成林聊為千年事目中趍百里寧問萬牛費植檜三尺强已有凌雲氣生世能㡬何擬作千嵗計衆人笑拍手君子用其意蕭蕭孤竹君忘言理相契名以金石交椿楊豈奴婢緬懷萬仞巔千丈蔚蒼翠蟠根泉石底用意霜雪外寧須丨丨丨坐待斧斤至散為風雨聲宻作牛馬蔽后山根似石周遭松檜漫為鄰翠碧婆娑未出羣但願盤丨堅丨丨不憂松榦不凌雲郭功父榦凌空凛然相對敢相欺直丨丨丨末更竒根至九泉無曲處世間惟有蟄龍知東坡古今合璧事類備要别集卷四十九
