下幸其當雨以禱不誠不誠不可動天臣故知不雨帝曰明日禱雨醴泉觀公曰醴泉之近猶外朝也豈憚暑不遠出耶帝毎意動則耳赤耳已盡赤厲聲曰當丨西丨丨丨公乞傳㫖帝曰車駕出郊不預告卿不知典故公曰國初以虞非常今久太平預告使百姓望清光者衆耳無虞也諫官故不扈從明日特召王公以從日色甚熾埃霧漲天帝玉色不怡至瓊林苑回望西太一宫上有雲氣如香煙乍起少時雷雨至帝却逍遥輦御平輦徹葢還宫明日召對帝曰朕自卿得雨聞見録祀五龍法眞宗咸平間知揚州魏羽上雩丨丨丨祈雨丨詔頒諸路其法以甲乙日擇東地作壇取土造青龍土器之大小龍之修短餘方皆如之凡旱建壇取五行生成之數焉長吏齋三日詣龍所汲流水設香茗果率郡官日再至祝酹不用樂巫覡雨足送龍水云云本朝事實詩集雨井居然鱗介不能容石眼環環水一鍾聞説旱時求雨澤只疑科斗是蛟龍韓愈水廟桑條無葉土生煙簫管迎龍丨丨前朱門幾處看歌舞猶恐春隂咽管絃李約鞭雷公滄江夜來雨眞宰罪應雪安得丨丨丨滂沱洗呉越杜牧之呵電母常山山人信英武撝駕雷車丨丨丨山中歸時風色變中路已覺商羊舞夜牕騷騷閙松竹朝畦泫泫流膏乳庶將積潤掃餘孽收拾豐嵗還明主東坡龍枕雷車長笑蛇醫一寸腹銜水吐雹何時足蒼鵝無罪亦可憐斬頭横盤不敢哭豈知泉下有猪丨卧丨丨丨踏隂軸前年太守為旱請雨㸃隨人如散菽東坡神鞭鬼御東堤黑風駕海水海底卷上天中央錚棧雷車轍軸壯矯攫蛟龍爪尾長丨丨丨丨載隂帝來往噴洒何顚狂四方嵗騰玉京仗萬里横牙羽木槍杜牧之祠女郎魂乞雨女郎魂炰羞潔且繁廟開鼯䑕呌神降越巫言旱氣期銷蕩隂官想駿奔行看五馬入蕭颯已隨軒韓愈減大官膳湯帝嗟咨徴六事漢庭災異刻三公聖明罪已思寛大時雨愆期旱藴隆東海得無寃死婦南陽疑有卧雲龍傳聞已丨丨丨丨肉食諸公盍奏功東坡喜雨事類膏澤油雲四布丨丨溥周衆靈受識薈蔚自躋于南山百穀仰榮滂沛遂沾于東作柳子厚賀雨表醴泉甘雨降萬民以喜謂之丨丨爾雅三時雨六月必有丨丨丨田家以為甘澤邑里相賀曰喜雨荆楚嵗時記六月雨魯僖公三年丨丨丨雨云者喜雨而有志乎民者也御史雨唐顔眞卿為監察御史使河隴時五原有寃獄久不決天且旱眞卿辨獄而雨郡人呼丨丨丨隨車雨漢百里嵩為徐州刺史境内旱嵩行部車所經甘雨輒降本傳後漢鄭洪遷淮隂太守行春大旱丨丨致丨本傳獄決而雨袁安為楚相會楚王英事互相牽引拘繫者千餘人三年而獄不決坐掠幽而死者百餘人天用災旱赤地千里安決獄事人人具録其辭狀本非首謀為王所引應時理遣一旬之中延千人之命其時甘雨滂沛嵗大豐稔汝南光賢傳師興而雨衞大旱卜有事於山川不吉甯莊子曰昔周飢克殷而年豐今邢無道諸侯無伯天其或者欲使衞討邢乎從之丨丨丨丨左傳三日雨歌晉太康中郡大旱束晢為邑人請雨丨丨而丨注衆丨之曰束先生通神明請天三日甘雨霖我黍以育我稷以生晉史喜雨亭記亭以雨名志喜也余至扶風之明年始治官舍為亭於堂之北是嵗之春雨麥於岐山之陽其占為有年既而彌月不雨民以為憂越三月乙卯乃雨甲子又雨丁卯大雨三日乃止官吏相與慶於庭商賈相與歌於市農夫相與抃於野憂者以樂病者以愈而吾亭適成於是舉酒属客從而歌之曰使天而雨珠寒者不得以為襦使天而雨玉飢者不得以為粟一雨三日伊誰之力民曰太守太守不有歸之天子天子曰不然歸之造物造物不自以為功歸之太空太空㝠㝠不可得而名吾以名吾亭東坡詩集田父伸眉南風吹雨下田塍丨丨丨丨願力耕麰麥明年應解好簾櫳今夜不勝清直須洗盡焦枯意不厭屢聞飄洒聲東坡三農滿望何假嗔雷擊怒桴黙然嘉澤浹民區經時亢隔羣心駭數月焦熬一陣蘇已發宋苗安在揠再生莊鮒不虞枯須臾慰滿丨丨望歛却神功寂似無韓稚圭歌元豐四山翛翛映赤日田背坼如龜兆出湖隂先生坐草室看踏溝車望秋實雷磻電掣雲滔滔夜半載雨輸亭臯旱禾秀發埋牛凥豆死更蘇肥莢毛倒持龍骨掛屋敖買酒澆客追前勞三年五穀賤如水今見西成復如此元豐聖人與天通千秋萬嵗與此同先生在野固不窮擊壤至老丨丨丨王介甫有生意皇天降德澤焦卷丨丨丨杜甫古今合璧事類備要前集卷二
