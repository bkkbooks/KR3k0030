body:
  text: 古今合璧事類備要前集卷二宋謝維新撰天文門風事類噫氣天地之氣噓而成雲噫而成風埤雅大塊丨丨其名為風作則萬竅怒號莊子籟聲汝聞天籟未聞地籟注云風吹萬物有聲故曰籟同上虎嘯丨丨而谷風生淮南子鵬摶丨之徙於南溟也丨扶揺羊角而上者九萬里逍遥篇退鷁六鷁退飛過宋都風也春秋翥鳳鳳鶱翥於甍標咸遡風而欲翔張平子賦風母丨丨出九德縣似猨見人若慙出頸打殺得風還活劉欣期交州記風師飛廉風伯也丨丨箕星也風俗通飛廉丨丨神禽能致風氣應劭注吕氏春秋丨丨鹿身頭如雀有角而蛇尾豹文晉灼注羊角熈寧九年恩州武城縣有旋風自東南來望之揷天如丨丨大木盡拔晉史少女時大旱有問何當雨言今夜當大雨至日向暮了無雲氣衆人並欲嗤公明公明言樹上已有丨丨微風樹間隂鳥和鳴若丨丨反風隂鳥亂翔其雨至矣須臾𤣥雲四集大雨河傾管公明傳封姨崔元微月夜見青衣女伴曰楊氏李氏陶氏又緋衣小女曰石醋報丨家十八丨來言辭泠泠有林下風色皆殊絶芳香襲人醋曰女伴在苑中恐被惡風相撓常求十八姨相庇處士每嵗旦作一幡上圖日月五星立苑東則免難矣今嵗已過此月二月一日立之其日立幡東風刮地折木飛花而苑中繁花不動崔乃悟女伴即衆花之精封家姨乃風神也後楊氏軰來謝各裹桃李花數斗云服之可以却老某等亦長生至元和中元微猶貌若少年亦一異也傳異記信風江淮船泝流而上常待東北風謂之丨丨七八月有上信三月有鳥信五月有麥信國史補􅄓風熈安間多丨􅄓者具四方之丨也常以五六月發未至時雞犬為之不寧又嶺表録云秋夏之間暈如虹者謂之􅄓母必有飃風南越志嶺嶠夏秋雄風曰􅄓發自午至夜乃止仆屋僵樹累年一發或嵗再三嶺南録番禺雜記云􅄓風將發有微雨細雨先緩後急謂之鍊風又有石尤風亦􅄓之類舶趠風丨丨丨呉中梅雨既過颯然清風彌旬嵗嵗如此潮人謂之丨丨丨是時海舶初回云此風自海上與舶俱至爾東坡集花信風自初春至初夏其間有二十四番風始于梅花終于楝花謂之丨丨丨故前輩云二十四番丨丨丨是也嵗時廣記鄭公風射的山南有白鶴山此鶴為仙人取箭𢎞嘗採薪得一遺箭頃有人覔𢎞還之問何所欲𢎞知其神人也乃曰嘗患若耶溪載薪為難願旦南風暮北風後果然故若耶溪風至今猶然呼丨丨丨後鄭宏傳楚王風楚襄王遊於蘭臺之宫宋玉侍有風颯然而至王披襟而當之曰快哉此風寡人所與庶人共者邪玉對曰此獨大王之風耳庶人安得而共之夫風生於地起於青蘋之末盛怒於土囊之口縁于太山之阿舞於松栢之下徘徊於桂椒之間翺翔于激水之上然後徜徉中庭北上玉堂清清泠泠發明耳目寧體便人此所謂大王之雄風王曰善哉宋玉賦相風烏長安南有靈臺高十仞有丨丨銅丨遇風乃動述征記相風竿晉車駕出丨丨在前刻烏於丨上名曰相風傅𤣥有相風賦今檣烏乃其餘意東坡詩注占風鐸唐岐王宫於竹林内懸碎玉片每夜聞相觸之聲即知有風號丨丨丨開元遺事候風旌五王宫中各立長竿挂五色旌於竿頭候之四垂綴以金鈴有聲即往視旌之所向可以知四方風候同上南風琴虞舜作五絃琴歌南風其詩曰南風之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮家語大風歌漢高祖歸沛召父老飲酒酒酣擊筑而歌曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方本紀秋風辭漢武帝行幸河東祠后土與羣臣燕飲作丨丨丨曰秋風起兮白雲飛草木黄落兮鴈南歸歡樂極兮哀情多少壯幾時兮奈老何本紀秋風曲唐明皇製丨丨高一丨每奏之則秋風徐來夜葉交墜羯鼓録大風拔木周公居東二年天大雷電以風禾盡偃大木斯拔成王啟金縢之書迎周公天乃反風禾盡起書大風揚沙項王圍漢王三匝於是大風從西北來折木發屋揚石楚軍大亂漢王乃得與數十騎遁去漢書㢲二起風蕭至忠為晉州刺史欲獵有樵者於霍山見一長人俄有虎兕鹿豕狐兎雜駢而至長人曰余九㝠使者奉北帝命蕭君畋汝輩若干合鷹死若干合箭死有老麋屈膝求救使者曰東谷嚴四善課試為求計羣獸從行樵者覘之至深巖有茅堂黄冠一人老麋哀請黄冠曰若令滕六降雪丨丨丨丨即蕭使君不出矣羣獸散去翌日未明風雪大作竟日蕭果不出幽怪録爰居避風海鳥丨丨丨於魯國東門之外三日展禽曰今其有災乎是嵗也海多大丨國語方朔占風孝武坐未央前殿天新雨東方朔屈指獨語上問之對曰殿後栢上有鵲立栢枝上東向而鳴視之果然問朔何以知之對曰此以人事知之風從東方來鵲尾長傍風則順背風則蹶必當順風而立是以知也東方朔傳滿奮畏風丨丨丨丨在晉武帝坐北牕作琉璃屛實密似疎奮有寒色奮曰臣猶呉牛見月而喘世説曾㸃舞風丨丨曰暮春者春服既成冠者五六人童子六七人風乎丨雩詠而歸語列子御風丨丨丨丨而行泠然旬有五日而後返莊子列子乗風而歸曰吾心疑釋隨風東西猶木葉幹殻竟不知風乗我邪我乗風邪列子張翰思蓴丨丨字季鷹辟齊王東曹掾在洛見秋風起因丨呉中丨菜羮鱸魚鱠曰人生貴得適意爾何能羈宦數千里以要名爵遂命駕而歸世説王導拂扇庾亮在石頭丨丨在冶城坐大風揚塵王以扇拂之曰元規塵汙人同上太平瑞應丨丨丨丨五日一風風不鳴條論衡中國有道漢武帝天漢三年月氐國獻神香使者曰國占東風入律百旬不休青雲干吕經月不散意丨丨丨好丨之君故來貢東方朔傳以琯和風王母遣使獻白玉琯吹之以和八風廣記吹律知風十二辰皆有風吹其律以知和不周禮保章氏注起南入北予蓬蓬然丨於丨海而丨於丨海折大木蜚大屋者唯我能也秋水吹花擘柳河朔春時多大風飛塵撼木若疾雷數日一作每作輙三二日方止以訪左右對曰不得是且無年是名丨丨丨丨草木百穀皆藉之遯齋閒覽八卦之風服䖍以為丨丨丨丨乾音石其風不周坎音革其風廣莫艮音匏其風融震音竹其風明庶㢲音木其風清明離音絲其風景坤音土其風凉兑音金其風閶闔易緯通卦驗云立春條風至春分明庶風至立夏清明風至夏至景風至立秋凉風至秋分閶闔風至立冬不周風至冬至廣莫風至論語疏四時之風四時和為通正謂之景風南風謂之凱風東風謂之谷風北風謂之凉風西風謂之泰風爾雅猛風曰颲凉風曰飀微風曰飈小風曰颼風俗通暴風從上下曰頽從下上曰飈亦曰扶揺廻風曰飄日岀而風曰暴隂而風曰曀風而雨土曰霾爾雅春晴日出而風曰光風秋冬餘風曰緒風吹萬物有聲曰籟終日風謂之終風同上詩集春風吹鬢風拘小雨來殘紅埽盡緑蒼苔稻田緑遍無邊幅更欲煩君為剪裁僧惠洪夏風三旬已過黄梅雨萬里初來舶趠風幾度縈廻渡山曲一時清駛滿江東驚回蓛蓛先秋葉喚醒昏昏嗜睡翁欲作蘭臺快哉賦却嫌分别問雌雄東坡秋風揫斂一何饕天機亦自勞墻隈小翻動屋角盛呼號漠漠驚沙宻紛紛斷柳高江湖豈在眼昨夜夢波濤王安石晚風落日生蘋末揺揚遍遠林帶花疑鳳舞向竹似龍吟月動臨秋扇松寒入夜琴蘭臺宫殿峻還拂楚王襟李嘺凉風揺揺歌扇舉悄悄舞衣輕引笛秋臨塞吹沙夜遶城向風回鴈影出峽送猿聲何似琴中奏依依帶别情同上大風雲埋月􅆙暈寒灰飈發齊如巨象豗縱湧萬川冰柱立紛披千嶂土囊開魯門未怪爰居至鄭圃何妨禦宼來終夜不眠誰與共坐忘唯有一顔回王安石送香飄飄散香勢汎漾下蓬萊傳凉入鏤檻發氣滿瑶臺委禾周邦偃飛鴨宋都回亟揺故葉落屢蕩新花開暫舞驚鳬去時丨蘂丨來已拂巫山雨何用捲寒灰梁簡文帝飄粉樓上起朝粧風花下砌傍入鏡先丨丨翻衫好染香度舞飛長袖傳歌共繞梁欲因吹少女還持拂大王梁孝元帝可聞不可見能重復能輕鏡前飄落粉琴上響餘聲梁何遜動竹宋地鶂飛初湘川燕起餘掃壇聊丨丨吹薤欲成書蒼梧勲猶在舍浦樹應疎陽烏一轉翅千里定非虚梁庾肩吾開花颺漾楚王宫徘徊遶竹叢帶葉俱吟樹丨丨共儛空飄香雙袖裏亂曲五絃中試上高樓聽悲響定無窮陳祖孫花風深紅落盡東風惡柳絮榆錢不當春東坡詩夜風仙人掌冷三霄露玉女牕虚午夜風李義山萬里風中和堂上東西頰獨有人間丨丨丨東坡九萬風天地寥廓誰相待日月虚乗丨丨丨李義山故人風大熱去酷吏清風來丨丨杜牧之雨事類生穀益之以霡霂既優既渥既霑既足丨我百丨毛詩仰膏小國之仰大國如百穀之丨丨焉若常膏之其天下輯睦左傳龍興潛丨蟠於沮澤應鳴鼔而丨雨左太冲蜀都賦魚噞天之且雨也隂曀未集而丨已丨矣淮南子雨隊徐州王忠政死十二日却甦語云見一人引臂曰天召汝行雨小頃瓶中貯人間水一般如馬牙消謂之乾雨丨丨在前風車在後酉陽雜爼雨工柳毅見涇川婦人牧羊問何物曰非羊也丨丨也雷霆之類也異聞録雨師霍山南岳山有丨丨雲師如蠶長六寸似兎丨丨似蛹長七八寸似蛭雨雲之時出在石上肉甘可熟而食之開山圖雨師屏翳風伯飛廉漢郊祀志注赤松子神農時雨師列仙傳云𤣥㝠丨丨風俗志瑞雨梁大同中嘗驟雨殿前往往有雜色寶珠梁武帝觀之有喜象虞寄因上丨丨頌云飛甘洒潤玉散珠聨初學記作盧昻道時雨太平之丨凡嵗三十六丨此休證時若之應京房易候榆莢雨丨丨丨春雨也黄雀風濯枝雨六月之風雨也御覽豆花雨里俗以八月雨為丨丨丨荆楚嵗時記黄梅雨夏至前雨為丨丨丨沾衣服皆敗黦埤雅云今江湘二浙四五月間梅欲黄落則水潤土溽柱礎皆汗蒸鬱成雨謂之梅雨故自江以南三月雨謂之迎梅五月雨謂之送梅風土記月額雨謂旦日雨為丨丨丨如織垂絲金樓子石燕飛零陵山有丨丨遇風雨即丨止還為石湘州記垤鸛鳴零雨其濛鸛鳴于垤注云鸛水鳥將隂雨則鳴毛詩商羊舞齊有一足之鳥飛公朝下于殿前舒翅而跳齊侯遣使訪孔子孔子曰此鳥名丨丨昔童兒有屈其一足振迅兩臂而跳且謡曰天將大雨商羊鼓丨今齊有之其應至將有水為災家語黑蜧躍丨丨神蛇潛泉而居將雨而丨淮南子蟻封穴沛獻王輔善京氏易明帝永平五年少雨上御雲臺闕自以周易林占之其繇曰丨丨丨户大雨將至以問輔輔曰蹇艮上坎下艮為山坎為水山出雲為雨蟻穴居知雨至故以蟻為雨居東觀漢記鳩逐婦鵓丨隂則屏丨其婦晴則呼之語曰天將雨丨丨丨埤雅審雨堂盧汾夢入蟻穴見堂宇題其名曰丨丨丨捜神記兜率天其雨丨丨丨上雨摩尼䕶世城雨美膳海中注雨不絶如連輪阿修羅中雨兵伏閻浮提中雨清浄水雜爼華陽洞仙張元賔得仙入丨丨丨為理禁伯其職主水葢雨官也眞誥河伯使者西海上有人乗白馬朱鬛白衣𤣥冠從十二童子馳馬如飛名曰丨丨丨丨其所至之國雨水滂沱神異記黑猪渡河夜半天漢中有黑氣相逐俗謂之丨丨丨丨雨候也述異志玉女披衣萍鄉西津有玉女崗天當雨石間先湧五色雲俗謂之丨丨丨丨同上峴山張葢安定郡有峴陽峯峯上有池若雨則雲起池中若車葢然故里諺曰丨丨丨丨雨滂沱三山小牘巫峽行雲楚襄王與宋玉逰雲夢之臺望高唐之觀其上獨有雲氣湏臾之間變化無窮王曰此何氣也玉曰所謂朝雲也昔先王莊王逰高唐書寢夢一婦人曰妾丨山之女朝為行雲暮為行雨選高唐賦序噀酒滅火神仙傳曰欒巴為尚書正朝大會巴飲酒西南丨之有詔問巴巴曰臣本縣成都市失火臣故因丨為雨以丨丨詔即以驛書馳問成都答言正旦大失火食時有雨從東