body:
  text: 古今合璧事類備要續集卷十七宋謝維新撰類姓門姚吳興商音古今姓纂虞舜生於姚墟子孫以姚為氏左傳鄭大夫姚句耳漢有諫議大夫姚平舜後胡公封陳至敬仲仕齊又為田氏至田豐王莽封為代睦侯奉舜後子恢避莽亂過江居吳郡氏媯氏五代孫敷又立姚氏事類鯁直無避晉姚弋仲其先有虞氏之苖裔石季龍召之遷冠軍大將軍清儉丨丨屢獻讜言丨所回丨朝之大議靡不參决公卿亦憚而推下之文武冠世姚襄字景國弋仲第五子少有髙名丨丨丨丨英濟之稱著於南夏自云大將軍仁勇謂此人唐姚思㢘萬年人髙祖定京師府僚皆奔亡獨思靡侍王兵升殿厲聲曰唐公起義兵本安王室若等不宜無禮於王衆眙却布列階下帝義之觀者歎曰丨者之丨丨丨丨乎時政記始此姚璹字令璋思廉孫永徽後左右史唯對仗承㫖仗下謀議不得聞璹以帝王謨訓不可闕紀請仗下所言軍國政要責宰相自撰號丨丨丨以授史官時政有記自璹始擿發無容姚璹力學才辯掞邁永徽中舉明經第遷益州長史始蜀吏貪暴璹丨丨之丨所丨貸降璽詔慰因謂左右曰為二千石清其身者易使吏盡清者難唯璹為兼之奏决若流姚崇字元之陜州硤石人少倜儻尚氣節長乃好學下筆成章五遷夏官郎中契丹擾河北兵檄叢進崇丨丨丨丨武后賢之即拜侍郎政條簡肅姚崇遷揚州長史丨丨丨丨人為紀徳於碑卿宜遂相先天二年𤣥宗講武新豐故事天子行幸牧守在三百里者得詣行在帝亦密召崇崇至帝曰丨丨丨丨朕崇知帝鋭於治乃先設十事度不可行臣敢辭帝曰試為朕言之云云帝曰朕能行之崇乃頓首謝戒不敢犯塞皇朝姚内斌盧龍人守邊有威名邊人戒不敢犯塞湛豫章古今姓纂後漢有大司農湛重晉荆州刺史陶偘母湛氏新淦人事類闕汪平陽商音古今姓纂汪芒氏之𦙍禮祀有汪踦魯人也事類天門放榜汪宗朝有道士伏章見丨丨丨春丨有名應辰者是年汪洋登進士第一御為改名應辰世說詔比宣公汪藻彦章狀其先公行實曰汪氏軒轅皆古國名春秋時童子踦以功顯魯孔子韙之中間譜系不𫝊至五季有自歙之黄墩徙婺源還珠者於公為九世祖子孫因家焉用髙訾為江左著姓汪縠字次元生子彦章孫覿仲益誌其墓曰建炎紹興間天子仗一劍出入兵間以建中興之烈當是時公為中書舍人翰林學士一時丨令往往多出公手學士大夫𫝊誦以丨陸丨丨後斥居永州年益髙文益竒詩益工華妙精深與柳儀曹相望於數百載後文章格力與其相上下祁太原徴音與祈通用古今姓纂帝堯伊祈氏之後左傳晉大夫祁奚生午午生順生勝姓苑云今扶風有此姓唐刑部員外郎祁順之樂陵祁順之後代居滄州六一先生為祁衞尉墓碑惟太原祁氏其先黄帝之子二十五人一食於祁遂為氏太原晉公盛於春秋之際祁氏亦盛於晉其後世逺而衰子孫亡散之他國有居譙者即為譙人事類立子君子謂祁奚能舉善矣稱其讎不為諂丨其丨不為比左擇子祁奚子祁午奚曰丨丨莫若父公族大夫襄公十六年晉平公即位祁奚為丨丨丨丨改服修官烝於曲沃國之力士趙盾之車右祁彌明者丨丨丨丨也仡然從乎趙盾而入公羊學誦教授晉祁嘉字孔賔清貧好學依丨官丨書為書生都養以自給博通經傳精究大義丨丨門生百餘人晉書目録祁嘉本𫝊祈嘉今附入祁毛西河羽音古今姓纂周文王第九子毛伯受封毛國因以為氏支孫為周卿士毛伯過毛伯得並毛公之後也趙有毛遂漢有毛公治詩趙人也為河間王博士毛萇亦治詩為詁訓事類文昭僖公二十四年富辰曰周公封建親戚魯霍毛原丨之丨也左上客毛遂至楚而使趙重於九鼎大呂以三寸之舌强於百萬之師遂以為丨丨出平原君位囊中脫頴毛遂趙使平原君合從於楚約與門下文武備具者二十人偕得十九人毛遂願備員而行平原君曰夫賢士之處世若錐之處囊中其末立見今先生處勝門下三年未有所聞先生不能遂曰臣乃今日請處囊中耳使蚤得處丨丨乃丨丨而出非特其末見而已卒定從東曹典選魏毛玠字孝先為丞相丨丨掾丨丨舉其所舉用皆清正之士三葉開國晉毛寳字碩真自寳至璩丨丨擁旄丨丨者四人晝錦榮鄉毛鴻賓狀貌頗異氐羌見者皆畏之明帝以為雍州刺史詔曰此以丨丨丨丨也禹隴西羽音與萭通用古今姓纂禹姓即夏禹之後世代罕聞至漢世有從草從禹而曰萭章字子夏在長安號曰城西萭子夏為京兆尹門下督從至殿中侍中諸侯貴人爭欲揖章莫與京兆言者疑此萭與禹姓同也又鄅子國在瑯琊其後以國為氏恐此鄅即禹也事類闕狄天水徴音古今姓纂周成封少子於狄城因氏焉魯大夫有狄虒彌古賢人有狄儀仲尼弟子有狄黒衛人漢有博士狄山事類滄海遺珠唐狄仁傑字懐英并州人舉明經調汴州參軍為吏誣訴黜陟使閻立本召訊異其才謝曰仲尼稱觀過知仁君可謂丨丨丨丨矣奮忠復唐唐贊武后承唐中衰刼制天下而攘神器仁傑蒙恥丨丨以權大謀引張柬之等卒復唐室呂温頌之曰取日虞淵洗光咸池潛授五龍夾之以飛世以為名言雲飛親舍狄仁傑薦授并州法曹親在河陽登大行山反顧見白丨孤丨謂左右曰吾丨丨其下瞻悵乆之雲移乃去代使絶域狄仁傑同府叅軍鄭崇質母老且疾當使絶域仁傑詣長吏藺仁基請代行仁基咨嗟其誼每曰狄公之賢北斗以南一人而已多毁淫祠持節江南巡撫吳楚丨丨丨凡毁千七百房同上内舉得人狄光嗣聖厯初為司府丞武后詔宰相各舉尚書郎一人仁傑薦光嗣以稱職聞后曰祁奚丨丨果丨丨發粟賑濟狄兼謨字汝諧仁傑孫及進士第剛正有祖風歴三州刺史嵗旱丨丨丨丨民人不流當嗣家聲狄兼謨遷御史中丞帝曰御史臺朝廷紀綱一臺正則朝廷治朝廷正則天下治畏忌顧望則職事廢矣卿梁公後丨丨丨丨兼謨頓首謝敵望如神皇朝狄青字漢臣汾州西河人後𨽻拱聖軍選為散直元昊叛擇衛士徙邊以青為延州指使青勇於臨敵常為先鋒前後二十五戰中流矢者八每戰飾以銅面具丨人丨之丨丨以功遷泰州刺史涇原路總管米京兆徴音古今姓纂出西域米國事類文字洗瘴毒米芾字元章少負英聲前輩鉅公皆器重之東坡先生尺牘有云嶺海八年念吾元章邁往凌雲之氣清雄絶俗之丨超邁入神之丨何時見之以丨丨丨今真見之兒子於何處得寳月觀賦朗然誦之老夫卧聽未半蹶然而起恨二十年相從知元章不盡此賦當過古人不論今世也公當有大名不勞我輩說也髙宗天縱日躋雲章落畫超軼前古獨愛元章萬幾之暇朝夕披攬以元章平生篆𨽻真行草書刻石分為十卷風檣陣馬沉著痛快當與鍾王抗行非但不愧之而已書畫得家法米芾子友仁字元暉英俊早成山谷有元暉小印章因命以為字乃贈絶句其文詞丨丨深丨丨丨紹興間為工部侍郎待制敷文閣韻語陽秋載其不及陪東坡往金山作水陸與栖雲閣二詩謂其超出翰墨畦逕之表蓋自邁往凌雲之氣流出非尋規索矩者之可到也貝清河商音與都通用古今姓纂古鄁國在今衛州作背以國為姓今鄁姓少恐貝姓因衛州背姓而更之為貝也今河北貝州人多貝姓恐州名因姓而𫝊事類闕明吳興宫音古今姓纂虞仲之後公族有井伯即百里奚也生孟明視子孫以王父字為氏事類應博士選明山賔字孝若在梁首丨五經丨丨之丨為袁州刺史雖出撫大藩擁旌推轂珥金拖紫而恒事屢空刺史六人明氏自宋至梁為丨丨者丨丨詠脩竹詩明克譲字𢎞道嘗令丨丨丨丨末云非君多愛賞誰貴此貞心异甚竒之北史以𤓰獻帝唐明崇儼洛州人以竒技自名髙宗四月憶𤓰崇儼索百錢須臾丨丨丨曰得之侯氏老人圃中丨召老人問故曰埋一𤓰失之土中得百錢有廊廟材皇朝明鎬字化基密州安丘人也舉進士薛奎稱鎬丨丨丨丨宣撫以副王則反於貝州以鎬為安撫使城未下命文彦博丨丨河北丨鎬丨之貝州平以功遷端明殿學士彦博相以鎬參知政事未幾卒謚文烈臧東海商音古今姓纂魯孝公子彄食采於臧是為僖伯事類有後於魯取郜大鼎於宋納於太廟臧哀伯諫周内史聞之曰臧孫達其丨丨丨丨乎君違不忘諫之以徳哀伯僖伯之子名達曰臧孫氏家有守龜漆雕憑曰臧氏丨丨丨丨焉名曰蔡文仲三年而為一兆武仲三年而為二兆孺子容三年而為三兆文仲魯大夫臧孫辰也武仲臧孫紇也子昭伯從弟臧㑹抵掌伊吾後臧宫字君翁潁川人從光武征戰諸將稱其勇從破羣賊數陷陣郤敵拜輔威將軍謹信質樸常見任用封朗陵侯撫鳴劒而丨丨志馳丨丨之北海内竒士魏臧洪字子源張起請為功曹稱其才畧智數丨丨丨丨也又曰子源天下義士謂之臧彪宋臧厥字獻卿為晉安太守郡居山海常結聚逋逃上以二千石討捕不能止厥下車宣化囚黨皆襁負而出自是居人復業然政嚴百姓丨丨丨丨自號被褐臧榮緒純篤好學隱居京口教授丨丨丨丨先生詁京兆宫音古今姓纂詁姓古今無𫝊恐即古字今從古姓考按風俗通古公亶父之後因氏焉晉平公時有舟人古乗事類輔佐才古弼代人善騎射初為獵郎門下奏事以敏正稱明元嘉其直而有用賜名曰筆後改名弼言其有丨丨丨也累遷尚書令端謹慎密口不言禁中事筆頭公古弼頭尖太武嘗名之曰丨丨時人呼為筆丨伏太原商音古今姓纂伏羲風姓之後子孫氏焉與任宿須句顓臾同祖事類尚書口授伏生張晏曰伏生名勝濟南人文帝聞伏生治丨丨時年九十餘老不能行使朝錯往受之史記又書序年過九十失其本經口以授文詩自名學伏理為當世名儒以丨授成帝别丨丨丨號伏不鬭後伏湛字恵公琅邪人清靜無競東州丨為丨丨丨有蘇武節伏隆字伯文使張步步欲留隆隆不聽帝曰隆可謂丨丨丨之丨多伏氏學伏恭字叔齊父黙字稚文明齊詩敦修學校教授不輟由是北州丨為丨丨丨西堂預㑹晉伏滔字𤣥度武帝嘗㑹於丨丨滔丨坐還下車先呼子系之謂曰百人髙丨天子先使問伏滔在坐否此故未易得作貪泉銘伏曼容字公儀善老易為南海太守在石門丨丨丨丨成上谷商音古今姓纂周文王第五子郕叔武之後子孫以國為氏後為楚所滅子孫去邑為成成肅公桓公並為周卿士左傳楚大夫成得臣為楚令尹成大心成熊並其後也事類我丈夫成覸謂齊景公曰彼丈夫也丨丨丨也吾何畏彼哉孟釋遊論成淹字季文好文字有氣尚入魏授著作佐郎獻文欲冬月巡漠北朝臣諫並不納淹上接輿丨丨丨帝覽之詔曰卿諸人不如成淹論通釋人意乃勅停行北史戴譙國徴音古今姓纂宋戴公之後以謚為姓宋大夫戴惡事類大小戴學前漢戴徳延君戴聖次君皆受禮於后蒼徳號大戴為信都太傅聖號小戴以博士論石渠由是禮有丨戴丨丨之丨孟卿𫝊解經侍中後漢戴憑字次仲習京氏易正旦朝賀百僚畢集帝令能説經者相難詰義有不通輒奪其席以益通者憑遂坐五十餘席京師語曰丨丨不窮戴丨丨關中大豪後漢戴良字叔鸞父遵字子髙家富好給施食客常三四百人語曰丨丨丨丨戴子髙琴書自娛晉戴逵字安道能鼔琴工書畫巧藝靡不畢綜以丨丨丨丨以禮度自處累徴不至居於㑹稽之剡縣大理清直唐戴胄相州人大理少卿缺太宗曰丨丨人命所繫冑丨丨其人哉即日命之父子宰相戴至徳乾封中遷侍郎同三品閲十數年丨丨繼為丨丨髙宗為飛帛書賜至徳作均水法戴叔倫字㓜公潤州人守撫州民爭灌溉為丨丨丨丨中和詩賜戴叔倫遷容管經畧使綏徠夷落威名流聞其治清明仁恕所至稱最徳宗嘗賦丨丨節丨遣使寵丨談廣平宫音古今姓纂子姓殷王帝乙長子微子啓周武王封之於宋𫝊國三十六代至君偃為楚所滅子孫以國為氏事類闕宋京兆宫音古今姓纂子姓殷王帝乙長子微子啓周武王封之於宋𫝊國三十六代至君偃為楚所滅子孫以國為氏楚有宋玉漢有宋義宋昌事類遊雲夢楚襄王與宋玉丨丨丨之臺望髙唐之觀其上有雲氣王問曰何氣也玉曰朝雲也曰試為寡人賦之楚宋玉文選序虎渡江後漢宋均字叔庠以父任為郎好經書通詩禮遷九江太守郡多虎為民患嘗募設檻穽尤多傷害均曰咎在殘吏其務退奸貪進忠良一去檻穽其後𫝊虎相與東渡江號神父宋登字叔陽京兆長安人父由為太尉為汝隂令政為能明丨稱丨丨人中龍晉宋纎字令艾隱居酒泉南山太守馬岌造焉纎髙樓重閣拒而不見岌嘆曰名可聞而身不可見徳可仰而形不可覩今而後知先生丨丨之丨也銘詩於石壁曰其人如玉維國之琛宋氏文宣君韋逞母宋氏家世以儒學稱受周官音義苻堅憫周官之學乆廢乃就宋氏家立講堂置生員百二十人隔絳紗帳而受業號丨丨為丨丨丨宋弁王佐才宋弁字義和西河人與李冲言論移日冲曰此人一日千里丨丨丨也北史題曰忠清君宋遊道兖州人為生立祠堂像丨丨丨丨丨游道入省劾權貴宋游道崔暹為御史中尉游道為尚書左丞文襄謂暹游道曰卿一人處南臺一人處北省當使天下肅然游道丨丨丨太師咸陽王等不避丨丨獄中生桃蓬宋世良字元友拜清河太守才識閑明尤善政術郡有曲隄盜多萃此世良施八條之制盜奔他境謡曰曲隄雖險賊何益但有宋公自屏跡後大赦郡無一囚率羣吏拜詔而已丨丨穭丨丨樹丨蒿亦滿每日牙門虚寂無復訴訟者謂之神門孝母夢獲𤓰宋瓊字普賢以丨稱丨曽病季秋月思𤓰瓊夢想求之求而遂獲時人異之為相清政刑唐宋璟邢州人風度凝逺人莫測其量丨宰丨務丨丨丨使官人皆任職帝賦三傑詩宋璟張說源乾曜宋璟同日除拜有詔大官設饌太常奏樂㑹百官東堂丨丨丨丨丨自寫以賜詩成奪錦袍宋之問字廷清汾州人偉儀貌雄于辨甫冠武后召與楊炯分直習藝舘武后游終南龍門詔從臣賦詩左史東方虬丨先丨后賜錦袍之問俄頃獻后覽之嗟賞更奪袍以賜詩號為沈宋江左丨律屢變至沈約及之問丨丨丨丨語曰蘇李居前沈宋比肩父世號三絶之問丨令文富文辭且工書有力丨丨丨丨皆得父一絶之問以文章起弟之悌以蹻勇聞之愻精草𨽻世謂丨丨丨丨丨孤直激浮競宋申錫字慶臣擢進士第長慶寳厯間風俗嚻薄申錫少丨丨少與及進用議者謂可以丨丨丨父子同館閣本朝宋綬字公垂隨州平棘人父臯直集賢院綬㓜聰警其外祖楊徽之器愛之以徽之遺恩授太常寺太祝年方十五召試中書省真宗竒其文聽於祕閣讀書久之詔試學士院為集賢校理與父臯丨在丨丨世以為榮兄弟謂二宋宋庠字公序開封雍丘人舉進士開封禮部俱第一與弟祁同時有名以詩賦為學者所宗丨之丨丨奏名屈第十宋祁字子京與兄郊同試禮部㑹諒隂正丨丨祁為第一章聖皇后曰弟可先兄乎乃以郊為第一而祁為丨丨唐書獨秉筆丨丨初修而堯臣以憂去方平察相繼出外祁遂丨丨丨雖外官亦以藁自隨祁與范鎮在局一十七年刋纂紀志六十卷列傳一百五十卷至是書成祁進工部尚書茅東宫商音古今姓纂周公第三子茅叔封茅國子孫以國為氏焉左傳邾大夫茅地弟夷鴻史記秦有茅焦神仙𫝊有茅盈事類周公之裔凢蒋邢茅丨丨丨丨左就衣受事茅焦諫秦始皇之遷太后解衣伏質始皇下殿手自接之曰先生起丨丨今願丨丨乃爵之上卿通鑑勸學成徳後漢茅容字季偉郭林宗嘗寓宿於容旦日殺雞為饌林宗謂為己設既而以供其母自以草蔬與客同飯林宗起拜之曰卿賢乎哉因丨令丨卒以丨丨龎始平宫音古今姓纂周文王子畢公髙之後封於龎鄉因氏焉事類以惠政得民龎參字仲達為漢陽太守郡人任棠有竒節參先候之棠以薤一大本水一盂置户屏前自抱兒孫伏於戸下參思其意曰水者欲吾清也㧞大本薤者欲吾擊强宗也抱兒當戶欲吾開門恤孤也參在職果能抑强助弱丨丨丨丨丨有宰相器能龎參虞詡薦其丨丨丨丨丨後為太尉録尚書事登鹿門採藥龎公襄陽人劉表問曰先生苦居􅅵畆而不肯官禄何以遺子孫乎公曰世人皆遺之以危今獨遺之以安未為無所遺也遂攜妻子丨丨丨山丨丨不反謂白馬將軍魏龎徳字令明每戰常乗白馬關羽軍丨之丨丨丨丨謚戎昭果毅龎徳丨策曰惟侯丨丨丨丨蹈難成名聲溢當時義髙在昔南州士冠冕蜀龎統字士元為丨丨丨之丨丨使治中展驥足守耒陽令不治免官魯肅曰龎士元非百里才丨處丨丨别駕始當丨其丨丨先主以為治中從事非執議豈成功皇朝龎籍字醇之單州武城人農智髙叛命狄青為宣撫使或言青不専任仁宗問籍籍曰青起行伍以文臣副之則號令不専仁宗然之及捷書至仁宗謂籍曰丨卿丨丨丨能丨丨議汰兵省八萬龎籍為樞密使言近世養兵務多而不精請與中書議簡汰之法仁宗疑焉籍曰儻有一夫之呼臣請以百口償之卒省兵八萬人古今合璧事類備要續集卷十七
