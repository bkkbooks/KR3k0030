body:
  text: 古今合璧事類備要續集卷二十一宋謝維新撰類姓門經滎陽徵音古今姓纂闕事類闕房清河商音古今姓纂堯子丹朱封為房邑侯子陵以父封為氏陵四十八代孫雅王莽末為清河太守始居清河雅十九代孫諶隨慕容徳南遷因居濟南郡生四子豫坦遂熈號四龍今稱為四祖房氏事類號為慈父北史房彦謙少通涉五經雅有詞辯風槩髙人為齊州主簿清簡守法州境肅然遷長葛縣令甚有惠化百姓丨丨丨丨使者察長吏能否以彦謙為天下第一世稱清白房謨字敬放沈深内敏歴昌平代郡太守所在著廉惠為兖州刺史選用廉清廣布恩信丨丨丨丨同上為五經庫隋房暉逺字崇儒世𫝊儒學明三禮春秋三𫝊詩書周易逺方負笈而從者動以千計牛𢎞稱丨丨丨丨獨收人物唐房𤣥齡字喬臨淄人父彦謙仕隋歴司𨽻刺史年十八舉進士太宗徇渭北杖䇿上謁軍門征伐未嘗不從衆爭取怪珍𤣥齡丨丨丨丨置幕府王嘗曰漢光武得鄧禹門人益親今我有𤣥齡猶禹也累表辭位𤣥齡為中書令䇿功班賞與如晦等功第一帝曰𤣥齡有决勝帷幄定社稷功居宰相十五年女為王妃男尚公主自以權寵隆極丨丨丨丨帝曰一日去良弼如亡左右手集家誡書𤣥齡治家有法度常恐諸子驕侈席勢凌人丨古今丨丨丨為屏風令各取其一具曰留意於此可以保躬矣作封禪書房琯字次律河南人少好學風度沈整與吕向偕隠陸渾山十年不諧際人事開元中作封禪書說張說說竒之裘與求通渤海角音古今姓纂本仇氏避難改焉魯孟獻子時有裘牧仲為獻子友後漢有求仲事類闕繆莫救切餘見穆姓通用蘭陵羽音古今姓纂秦繆公之後以謚為姓或音作穆漢書楚有穆生為元王師晉有繆播字宣則𦙍字休祖事類自撾為敦睦後繆肜字豫公兄弟同財業及娶諸婦遂求分異又數鬬爭肜乃掩户丨丨諸婦謝罪更丨丨丨之行誅吏有威名繆肜後遷中牟令丨諸姦丨及託名貴戚賔客者百丨餘人丨丨遂行干潁川徵音古今姓纂宋大夫干犨之後事類咸稱良史晉干寳字令升博覽書記以才器召為著作郎著晉紀二十卷直而能婉丨丨丨丨號鬼董狐干寳撰捜神記丨曰丨丨丨解平陽商音古今姓纂晉大夫解揚解狐之後其先食采於解因氏焉事類考績第一晉解系字少連父修魏琅琊太守丨丨為天下丨丨二弟結育並清身潔己甚得聲譽舉幽素科唐解琬魏州人丨丨丨丨中之後滄州刺史為政引大體部人順附應汝南宫音古今姓纂周武王第四子應侯之後以國為氏事類武穆左富辰曰昔周公封建親戚邘晉應韓丨之丨也不仕武王之子應韓丨丨同上糾舉姦違後應奉字世叔南頓人為司𨽻校尉丨丨丨丨不避豪戚以嚴厲為名戰却黄巾應劭字仲逺博覽多聞舉髙第拜太山太守丨丨丨丨三十萬衆郡内以安三入承明應璩字休璉作詩有問我何功徳丨丨丨丨廬之句獨全百姓晉應詹字思逺督南平天門武陵三郡軍事天下大亂詹境丨丨丨丨歌之曰嵗寒不凋孤境獨守拯我塗炭惠隆丘阜潤同江海恩猶父母軒冕盛族應貞字吉甫自漢至魏世以文章顯丨丨相襲為郡丨丨宗京兆宫音古今姓纂周大夫宗伯之子後以官命氏事類功曹畫諾後黨錮𫝊宗資為汝南太守任丨丨范滂郡中謡曰汝南太守范孟博南陽宗資主丨丨與八顧號宗資丨丨丨之丨乘風破浪宗慤字元幹慤年少叔父少文問其所志荅曰願丨長丨丨萬里丨號宗曾子宗元卿字希蔣有至行鄉人丨曰丨丨丨見解叔謙𫝊小兒學士宗懔字元懔少聦敏好讀書語輙引古事鄉里呼為丨丨丨丨梁元帝鎮荆州謂長史劉之遴曰貴鄉多士為舉一有學少年乃以懔應即令兼記室留守東京本朝宗澤髙宗建炎元年五月自磁州至丨丨丨丨數月之間城壁龍濠開浚寨柵羅列義士團結五丈河已通流陜西東京盜皆歸附前後二十餘疏請上還京為汪黄所沮未及一年而憤死丁濟陽徵音古今姓纂姜姓齊太公生丁公伋支孫以謚為姓事類易東前丁寛字子襄梁人讀易精敏事田何學成東歸何謂門人曰丨道丨矣作易說三萬言學精後丁恭字子然習春秋丨義丨明敎授數百人建武中遷少府諸生自逺方至者著錄千人當世稱為大儒夢松為公吳丁固初為尚書丨丨生其腹上謂人曰松字十八公也後十八嵗吾其丨丨乎卒如夢焉侍讀著訓唐丁公著字平子蘇州人舉明經髙第充皇太子諸王丨丨因丨太子諸王侍讀丨十篇恥居第四皇朝丁謂字公言初字謂之蘇州人嘗以文謁王禹偁禹偁稱其文與孫何比之韓柳名遂大振既而何冠多士謂占第四自以與何齊名丨居其下臚𫝊之際殿下有言太宗曰甲乙丙丁合丨丨丨復何言登詞學科丁度字公雅開封祥符人也祖顗盡其家貲以置書至八千卷且曰吾聚書多矣必有好學者為吾子孫父逢吉為光祿寺丞度力學有守丨服勤丨丨丨宣始平徵音古今姓纂魯大夫叔孫宣伯之後以謚為姓風俗通宋宣公之後後漢有司空宣鄷事類號三獨坐後宣秉字巨公馮翊人拜御史中丞光武特詔中丞與司𨽻校尉尚書令㑹同並専席而坐故京師丨曰丨丨丨歎雲陽公宣秉常服布被蔬食瓦器帝見而丨曰楚國二龔不如丨丨宣巨公賁扶云反真城徵音古今姓纂縣賁父之後風俗通魯有賁浦汝南漢有郎中賁光見論衡晉書汝南賁嵩清操之士又汝琛女適汝南賁氏又長水校尉賁顓事類闕鄧南陽徵音古今姓纂曼姓殷時侯國也春秋時鄧侯吾離朝魯後為楚文王所滅子孫以國為氏事類興鴻郤陂後鄧晨字偉卿南陽新野人為汝南太守丨丨丨丨數千頃田汝土以殷魚稻之饒流衍他郡􅂷名竹帛鄧禹字仲華南陽新野人十三能誦詩杖䇿見光武曰願明公威徳加四海禹得效尺寸丨功丨於丨丨累世寵貴鄧隲字昭伯拜車騎將軍儀同三司始自隲也鄧氏自中興後丨丨丨丨凡侯者二十九人公二人大將軍以下十三人中二千石十四人列校二十二人州牧郡守四十八人其餘侍中將大夫郎謁者不可勝數積榖廣渠魏鄧艾字士載屯田丨丨行於兩淮開丨漕丨達於江淮揮劒截蛟晉鄧遐字應逺勇力絶人氣蓋當世歴數郡太守號為名將襄陽沔水有蛟害人遐入水丨丨丨丨數段而患息俸祿無受鄧攸字伯道以􅍿致稱清和平簡貞正寡欲授吳郡太守載米之郡丨丨丨所丨惟飲吳水而已中興良守鄧攸刑政清明百姓歡悅為丨丨丨丨後去郡百姓數千人留牽攸船不得進吳人歌曰紞如打五鼔雞鳴天欲曙鄧侯拖不留謝令推不去隠𤣥先生唐鄧世隆相州人亡命變姓名號丨丨丨丨棲白鹿山貞觀為修史學士郁黎陽宫音古今姓纂魯國國語云魯相郁貢子孫因居之事類闕單南安徵音古今姓纂周成王封少子臻於單邑為甸内侯因氏焉襄公穆公靖公二十餘代為周卿士事類善明筭術方術單颺字武宣以孤特清苦自立丨丨天官丨丨遷太史令獨處茅茨晉藝術單道開後入羅浮山丨丨丨丨蕭然物外百餘嵗卒抗去聲餘杭商音古今姓纂後漢有抗徐太山都尉抗徐代居丹陽事類闕洪燉煌角音古今姓纂共工氏之後本姓共氏因避仇改為洪又曰毗陵監察御史洪察常州人本姓𢎞氏避孝敬諱改姓洪氏生子與起居舍人生經綸諫議大夫通鑑唐徳宗建中元年二月命洪經綸為河北黜陟使事類文詞知名皇朝豫章洪氏山谷四甥皆以丨丨丨丨洪朋字龜父同郡黄著集龜父詩百篇為一集山谷以謂句句可𫝊也著老圃集洪芻字駒父殚洽開豁溢于文詞中進士第放浪江湖不求聞達嘗倅上饒累任奉祠靖康初召為郎擢諫大夫遭值變故坐事貶海上平生著詩千餘篇丨丨丨前後丨使北遞冷山洪丞相适状其先君行實曰先君諱皓饒州人士良之後登政和五年進士第建炎三年五月擢徽猷閣待制禮部尚書丨丨留太原至雲中粘罕流丨之丨丨幾二十年還朝積官朝請大夫職徽猷閣直學士卒謚忠宣諸琅琊徵音古今姓纂越大夫諸稽郢之後後漢洛陽令諸於事類闕包上黨羽音古今姓纂楚大夫申包胥之後以王父字為氏焉事類錫以几杖後包咸字子良㑹稽人習魯詩論語除郎中入授皇太子論語遷大鴻臚每進見丨丨丨丨經𫝊有疑遣小黄門就舍即問常特賜珍玩束帛奉祿増於諸卿皆散與諸生之貧者多憚其方嚴皇朝包拯字希仁廬州合肥人嘉祐三年除右諫議大夫御史中丞遷禮部侍郎樞密副使終于位謚孝肅為以不茍合平居無私書故人朋友亦皆絶之人人丨丨丨丨丨仕已通顯奉己儉約如布衣時有閻羅包老包拯知開封府為人剛嚴不可干以私京師為之語曰闗節不到丨丨丨丨丨左濟陽商音古今姓纂齊公族有左右公子因以氏焉魯左丘明楚左史倚相事類奏按貪猾後左雄字伯豪為冀州刺史部多豪族好請託常閉門不與交通丨丨丨丨二千石尤所回避少有神道左慈字元放廬江人丨丨丨丨後曹操欲殺之郤入壁中霍然不知其所在作三都賦晉左思字太冲家世儒學貌侵口訥而詞藻丨丨丨丨十年而成豪貴競𫝊寫洛陽為之紙貴石武威徵音古今姓纂衞大夫石碏之後又石鮐仲衞大夫生石祁子事類純臣左石碏曰臣聞愛子敎之以義方弗納於邪君子曰石碏丨丨也父子揚子孝至篇石奮石建丨丨之美也萬石前丨丨君名奮趙人姓石氏長子建次甲次乙次慶皆以馴行孝謹官皆至二千石號奮為丨丨君丨丨君家不言而躬行建老白首丨丨君尚旡恙為郎中令每五日洗沐歸謁親取親中裙厠牏身自浣滌六馬慶為太僕御史上問車中幾馬慶以策數馬畢舉手曰丨丨同上君房貴幸前石顯字丨丨為中書令丨丨傾朝與牢梁五鹿充宗結為黨友民歌之曰牢耶石耶五鹿客耶印何纍纍綬若若耶言其兼官據勢也仲容偉麗晉石邕字丨丨容儀丨丨語曰石仲容佼旡雙金谷錦幛石崇字季倫與貴戚王愷爭以奢靡相尚起丨丨别館作丨步丨五十里裘葛飯蔬唐石洪字濬川先姓烏石蘭後獨以石為氏有至行舉明經歸東都十餘年隠居不出重𦙍鎮河陽求賢者以自重乃具書幣邀辟後詔書召為集賢校理韓昌黎送石洪赴河陽參謨序云先生居嵩邙瀍榖之間冬一丨夏一丨朝夕丨一盂丨一品問之仕則不應坐一室左右圖書與之語道理辨古今事當否論人髙下事後當成敗若河決下流而東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也云云義勇罕比石雄徐州人敢毅善戰氣蓋軍中臨財廉每朝廷賜與輒置軍門自取一匹縑餘悉分士伍武宗喜曰今將帥丨而丨丨與雄丨者金帶解賜石普其先幽州人有胆略聞敵即馳赴親冒矢石前後戰未嘗少衂通兵書及隂陽六甲星歴推步之術太宗嘗令善工製丨丨普帶御器械輒面求賜太宗丨以丨之崔博陵角音古今姓纂姜姓齊太公生丁公伋生叔乙讓國居崔邑因氏焉自穆伯至沃杼成良代為卿大夫良十五代孫意如秦東萊侯生二子伯基仲牟伯基居清河東武城仲牟居博陵安平並為著姓見姓氏英賢門事類母淑徳後崔寔字子真舉至孝獨行除為郎明於政體史才有餘為五原太守教民紡績織絍民以免寒苦母劉氏有丨儀丨丨博覽書𫝊常訓寔以臨民之政寔之善績母有助焉又崔氏世有美才兼以沉淪典籍遂為儒家之林母賢明鄭善果丨崔氏性丨丨有節操善果出聽事母坐胡床於鄣後察之聞其剖斷合理歸則大悅若行事不允乃蒙袂而泣終日不食善果由此克己號為清吏清厲顯名晋崔洪字良伯博陵人少以丨丨丨丨骨鯁不同於物人之有過輒面折之為尚書左丞語曰叢生荆刺來自博陵在南為鷂在北為鷹蒲鞭不用南史崔景真位平昌太守有惠政常懸一丨