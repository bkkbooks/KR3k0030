body:
  text: 古今合璧事類備要後集卷十九宋謝維新撰左右史門左右史起居郎人起居舎歴代㳂革周周官有左右史盖今起居之本動則左史書之言則右史書之左史記言右史記事漢武帝有禁中起居注後漢馬皇后撰明帝起居注則漢起居似在宫中為女史之任其後起居皆近侍之臣録記也歴代有其職而無其官後魏始置起居令史每行幸宴會則在御左右記録帝言後又别置修起居注通典北齊有起居省至隋煬帝乃於内史省置起居舎人二貟同上唐起居郎二人掌録天子起居法度天子御正殿則郎居左舎人居右有命俯陛以聽季終以授史官正觀中以給事諫議大夫兼知起居注或知起居事每下議政事起居郎一人執筆記録于前史官隨之其後又置起居舎人分侍左右秉筆隨宰相入殿若仗在紫宸内閣則夾香案分立殿下直第二螭首和墨濡筆皆即坳處時號螭頭敬宗李義府為相奏請多畏人之知乃命起居舎人對仗承㫖仗下與百官皆出不復聞事務矣長壽中宰相姚璹建議仗下後宰相一人録軍國政要為時政記月送史館率推美讓善事非其實未幾亦罷而起居郎由因舊制勅稍稍筆削以廣國史之闕起居舎人居記言之職唯編紹書不及他事太和中詔入閤日起居舎人具紙筆立螭頭下復正觀故事百官志國朝㳂唐制起居郎𨽻門下起居舎人𨽻中書號小兩省官皆為虚名職畧不典本省事而典職者自號修起居注凡二人天子御正殿記注官不侍左右唯朝會對立於香案前常日則更畨逓直於崇政殿延和殿行幸則從上出入皆所以書言動熈寧初詔諫官兼修注者因後殿侍立許奏事元豐中兼修注王存乞復起居郎舎人之職使得盡聞明天子德音退而書之神宗亦謂人臣奏對有頗僻讒慝者若左右有史官書之則無所肆其姦矣故事左右雖日侍立而欲奏事必稟中書俟㫖存因對及之乃詔雖不兼諌職者亦許直前奏事五年官制行罷修注而郎舎人始顓其職四朝志起居郎舎人掌記天子言動御正殿則俟於門廡外便殿則侍立行幸則從大朝會則對立於殿下螭首之側凡朝廷命令赦宥禮樂法度損益因革賞罰勸懲羣臣進對文武臣除授及祭祀燕享臨幸引見之事四時氣候四方符瑞戸口増減州縣廢置皆書以授着作官六年詔左右史分記言動元祐元年仍詔不分七年詔邇英閣講讀罷有留身奏事者許侍立紹聖元年中丞黄履言所奏或千古機宻難令旁立乃止㑹要史隆興元年胡銓奏記注之失有四一人主不當觀國朝梁周翰以起居注每月進御慶歴中歐陽修乞更不進本仁宗從之今望遵仁宗之訓二立非其地國朝記注之臣立于座後歐陽修謂當仁主言動而書乃立於前脩罷復故令乃立於殿之東南隅言動不聞乞復歐陽修之制三前殿不立國朝古制前後殿皆侍立而前殿不立又左右史分日而立無言動之異欲乞於前後殿皆分日侍立四奏不直前臣欲直前奏事閤門以不預牒却之甞預牒矣又以無班為詞是雖有直前之名而無可奏之時矣乞左右史奏事直前不必預牒及有無班次為拘也詔前殿依後殿侍立餘並依舊制淳熈間羅春伯㸃自户部貟外郎除右史避曾祖諱以太常少卿兼侍立修注官其後兩史或闕則降㫖以某人權侍立官盖自此始事類書言動天子元端而居言則左史書之動則右史書之記玉藻覽載籍身為國史躬丨丨丨必廣記備言左傳序記言事古之王者世有史官君舉必書所以謹言行昭法式也左史丨丨右史記丨前天文志書善惡古者天子諸侯有事必吿于廟廟有二史左史記言右史記事事為春秋言為尚書君舉必丨丨丨成敗無不存焉後漢荀悦傳柱史星東一星曰丨丨主記過古有左右史之象也晉天文志録言訓後魏始置起居令史每行幸宴會則在御左右記丨帝丨及賔客丨荅通典録動作起居郎掌丨天子之丨丨法度以修記事之史凡記事之制以事繫日以日繫月以月繫時以時繫年必時書其朔日甲乙以紀厯數典禮文物以考制度遷拜恩賞以勸善誅代黜免以懲惡季終則授之於國史焉唐六典夾香案起居舎人分侍左右秉筆隨宰相入殿若仗在紫宸肉閣則丨丨丨分立殿下唐百官志入延英唐馮定請左右史隨宰相丨丨丨記事宰相不樂唐㑹要侍從班左史得中謝自開成中至武宗即位隨仗而退無復簪筆之際因得宻邇天顔故後人謂兩省為丨丨丨則登其選不為不逹矣嘉話録清美官正直第二螭首和墨濡翰皆即螭首之坳處由是諺傳謂螭頭有水官既宻侍號為清美唐㑹要左侍極栁玭為左史其著序訓自稱丨丨丨桞玭家傳右螭立唐文宗時杜牧周墀誌曰公為起居舎人二史濡筆立丨丨下晏公類要第一流唐人言左右史當用丨丨丨㑹要第二首見清美官注執筆螭頭唐鄭朗字有客為起居郎文宗謂宰臣曰云云時朗丨丨丨丨下宰臣退上謂朗曰適所議論卿記録末吾試觀之朗對曰臣執筆所記便名為吏故事不可取觀帝曰朕恐平常閑語不闗理體垂諸將來切以為耻異日臨朝庻幾稍改何妨一見以誡醜言朗遂進之本傳齎紙螭下唐文宗勑左右省起居丨丨硯及筆於丨頭丨記言記事六典置札玉階開成末韋絢自左補闕為起居舎人時揚嗣復以除起居舎人楊嗣復於殿下先奏曰左補闕韋絢新除起居舎人未中謝奏取進㫖帝頷之李珏招而引之絢即丨筆丨於丨丨欄檻之右疾趨而置詞拜舞焉嘉話録操筆赤墀鄭覃曰記注丨丨丨丨下其書為後世法不可用黨人職林執簡記録正觀中每日仗退上與宰臣參議政事即令起居郎一人丨丨丨丨唐會要蘇氏記對仗承㫖唐永徽已後左右史惟得丨丨丨丨已下後謀議皆不得預聞姚璹請撰時政記百官志職官修注唐杜正倫知起居注太宗甞謂侍臣曰朕每日坐朝欲出一言即思此言於百姓有利益否所以不不能多言正倫曰羣舉必書言存於左右史臣丨丨丨起居不敢不盡愚直若一言乖於道理則千載累於聖徳非直當今損於百姓願陛下慎之太宗大悦本傳職在司言唐元宗親製春臺望一章起居舎人蔡孚奏臣丨丨丨丨請宣示百僚及編國史實録陳政得失髙鉞為起居郎言丨丨丨丨丨穆宗嘉之職官分紀論事忠切唐魏謩轉起居舎人帝謂之曰以卿丨丨丨丨有正觀之風故不循限授卿此官本傳諫罷封禪唐王觀有事太山禇遂良為起居郎丨丨丨丨之事職林請納封事唐吳兢為起居郎上䟽元宗丨容丨丨丨本傳文章俊㧞鄭仁表為起居郎文章俊㧞自謂門地人物文章俱美嘗曰天瑞有五色雲人瑞有鄭仁表唐本傳文史博渉禇遂良丨丨丨丨工𨽻楷太宗召令侍書職林資質所宜文宗時周墀兼舎人帝御紫宸或召左右史丨丨丨丨最為天子欽本傳召質是非張次宗有文學開成中為起居舎人文宗復故事每入閣左右史執筆立於螭頭之下宰相奏事得以備録宰臣既退上丨左右史更丨證所丨丨故開成政事詳於史氏次宗尤稱奉職職官分紀不聞觀史唐太宗謂諌議大夫禇遂良曰卿知起居記録何事得觀之否對曰今之起居古左右史也書人君言事且記善惡以為檢誡庻幾人主不為非法丨丨帝王親自丨丨上曰朕有不善卿必書之耶遂良曰臣子當載筆君舉必記本傳不許觀史魏謩文宗時為舎人帝索起居注謩奏古置左右史書得失人主不可觀向者取觀史氏為失職陛下一見則後來所書必有諱屈善惡不實不可以為史乃止魏謩傳賦偃松篇開元中起居舎人蔡孚賦東都龍興觀丨丨丨元宗賜和御書刻石紀之聀林製春臺章見前職在司書注珥筆記言丨丨丨丨才光東觀唐許公集珥彤記事書笏丨丨丨丨於仙室文選王元長詩序才光東觀見前珥筆記言注著為國典為起居郎書事不回丨丨丨丨桞宗源集楊凝茂功墓状入記吾言擢為右史丨丨丨丨白集温造制俾伺朕居丨丨丨之起丨遂編之於簡牘元徽之集行髙鉞制邇英立侍仁宗朝講讀官侍丨丨者皆立每問事則衆人齊對頗紛紛乃詔皆坐唯當講讀者以次立而記注亦坐石昌言奏記注官當丨丨宻邇德音以詳記録不可坐遂令立侍長編延英入侍至和中知制誥賈黯言丨丨召侍臣講讀其諮訪之際動闗政體乞令修注官侍閣中㑹要便殿侍立起居郎舎人掌記天子言動御正殿則俟於門廡外丨丨則丨丨行幸則從大朝㑹則對立於殿下螭首之側續㑹要後殿奏事熈寧詔諫官兼修起居者因丨丨侍立亦許丨丨同上綴兩省班熈寜八年范百禄奏今修起居注則丨丨丨丨知諫院絀而不輿長編兼諌院職熈寜二年四月刑部郎中秘閣校理同修起居注陳襄丨起居舎人知丨丨兵部貟外郎兼起居注人同知諫院范純仁直𨽻賢院同修起居注㑹要遂特用詢唐詢言執政純用科名人修起居注非故事未幾修注闕仁宗丨丨丨丨同上無以易乗初修起居缺中書擬人而彭乗在選中上指乗曰此老儒也雅有恬退名丨丨丨之及召見諭曰卿先朝舊人久補外未甞自言對曰臣生孤逺自量其分敢過有所望耶上頗嘉之仁宗實録士林竦羡元豐蔡京起居郎其弟卞為右史兄弟並入侍立丨丨丨丨馬文昌雜録聞者稱快見後起居直前注朝無出公朝廷欲用蘇軾為起居舎人公起於憂患不欲驟履要地力辭之見宰相蔡持正自言持正曰公徊翔久矣丨中丨丨丨右者公固辭持正曰今日誰當任公前者公曰昔林希同在館中年且長名臣言行録朕自知卿胡銓字邦衡公為起居郎直前奏事云陛下登極首蒙召除曽未浹旬又擢左史上曰丨丨丨丨同上推明聖德蘇軾為右史奏曰竊見韓維讀三朝寳訓至真宗皇帝惡殺生因論陛下在宫中不忍踐履蟲蟻其言可以丨丨丨丨臣忝備位右史謹書其事於冊又録一本上進望陛下采覽無忘此心以廣好生之徳臣不勝大願同上備職史官王巖叟字彦霖元祐中為起居舎人入侍邇英司馬康講洪範至論體三徳上曰只此三德為更有德公退而上書曰陛下既能審而問之必能體而行之三德者人君之大本得之則治失之則亂臣丨丨丨丨敬已書之於冊以示萬世同上延訪政事歐陽修仁宗朝召知諫院未幾修起居注每勸止丨見大臣丨以丨丨東都事畧從容訪問周文忠公必大以起居郎直前奏事上曰有近作可多進來属初御經筵公奏祖宗置經筵非為分章析句正欲人主丨丨丨丨以禆聖德行狀起居直前胡銓擢丨丨郎論記注不應進案前後殿皆當侍立遇丨丨每曰閤門毋隔班次金人再求和公曰願絶口不言和字上歎其忠直王之望尹穡皆主和排張忠獻公公延責之聞者稱快行狀起居進御梁周翰太宗召兼史館修撰尋遷起居舎人兼起居郎因言皇帝宣諭之言侍臣論列之事望修為時政記仍令郎與舎人分直崇政殿以記言動别為起居注每月先進御後降付史館丨丨注丨丨自周翰始也東都事畧為郎七年陳文惠公堯佐居官不妄進取丨起居丨丨丨不遷言行録修注十載崔遵度字堅伯大中祥符初同上起居丨丨餘丨常退匿楹間慮為上所見其恬於勢利如此東都事略立堦非地李誠營造式螭首施之對柱及殿四角今二史所立東南偏其丨殿角隨丨之螭歟以其堦為石螭遂認為唐螭丨其丨也程大冒演繁露繫鞋造殿國朝古制左右史逐日二貟特立雖前殿亦立今輪畨逓直以一日為率謂之直日駕御垂拱殿則同侍從官俱朝而退至崇政殿則與日參官同朝退出殿門則就次丨丨而入丨嚲丨拱立待三省樞宻院及上殿班退方升殿自黼座西面立於樞宻都承㫖之下閣門奏無公事駕興乃退然後趨出玉上並職略與講讀並唐起居舎人皆同宰相入預聞奏事本朝記注初不侍立但於前後殿為次上殿臣寮退回問所言書之然未甞有敢告之者後始詔後殿輪日入侍崇寧初鄭居中字逹夫為左史復建言併前殿皆入並立於垜殿雖存故事而奏對語畧不相聞亦不敢自書惟經筵得依講讀奏事嘉祐間賈直孺所請也石林燕語依講讀奏紹興二十八年詔起居郎舎人自今後許丨丨丨官丨事先是起居舎人吕陶甞乞候講讀臣僚再留奏事並許侍立以見講退猶且入侍何由不許奏事乞下講筵所依講讀官例施行故有是詔中與會要職聮兩省右右置史筆載螭坳丨丨丨丨初寮制號為要地左右史官丨丨丨丨手刋勑書足以明枉直之效宻侍殿陛足以觀進退之詳栾城真西山辭左史狀臣某奉聖㫖真某除起居舎人日下供職某竊惟古者設載筆之官分記言之職推原本指蓋以人主出言之善否實治亂榮辱之樞機遴選端良寘在左右操觚執簡有聞必書庶幾非道不言納君徳於無過之地膺是任者不其重歟伏念某材弗適時學未聞道徒以文墨淺技饕攝禁林首尾四年漫無云補循名責實擯斥乃宜遽䝉誤恩權典記注維昔先正宗工猶多力辭不敢輕授顧如庸陋廼可冒居况今賢俊布滿周行論德較材最在人後伏望朝廷特賜敇奏俾某姑仍舊署少逭譴訶别乞精擇名儒以重螭陛所有恩命某未敢祗受西山文集詩集㸃筆含章復記言清秩稱當年丨丨非常筆朝天最近天鄭谷寄左省張起居濡毫風神何藴藉張緒正當年端簡爐煙裏丨丨御案邊鄭谷寄左省韋起居近御筵獻納司存雨露邊地分清切任才賢舍人退食收封事宫女開函近御筵曉箭追移青鎻闥晴忩㸃檢白雲篇楊雄更有河東賦惟待吹嘘送上天杜工部贈起居田舍人聞天語九衢寒霧歛䨇闕曙光分綵仗迎春日香煙接瑞雲珮聲清漏間天語侍臣聞莫笑馮唐老還來謁聖君姚合寄劉起居玉皇吏我是丨丨香案丨謫居猶得在蓬萊元㣲之誇白樂天詩皇帝語十官曉立爐煙裏立近丹墀是起居彩筆專書丨丨丨書成幾卷太平書姚台寄裴起居近丹墀注見上眠玉殿官清立在金爐北仗下歸丨丨丨西姚合寄周起居含雞舌纔歸龍尾丨丨丨更立螭頭運兎毫閶闔欲開金漏盡冕旒初坐御香髙姚合寄右史李定言立螭傍名髙三俊上官丨右丨丨陳后山寄張文潜舎人古今合璧事類備要後集卷十九
