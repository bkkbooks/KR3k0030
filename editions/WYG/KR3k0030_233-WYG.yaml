body:
  text: 古今合璧事類備要别集卷二十七宋謝維新撰花卉門蘭花格物叢話蘭香草也叢生山谷與澤蘭相似紫莖赤節緑葉光潤一榦而一花花兩三瓣幽香清逺可挹然花亦数品或白或紫或淺碧間亦有一􅆬而雙頭者花時常在春初雖氷霜之餘髙潔自如尔至於蕙亦有似於蘭而葉差大一榦而五七花花時常在夏秋間香不及蘭也彼有所謂幽蘭有所謂猗蘭如此之類又此花之别種識者辨之尤不可不審矣事類服媚如是鄭文公有賤妾曰燕姞夢天使與已蘭曰余為伯鯈余而祖也以是為而子以蘭有國香人丨丨之丨丨文公與之蘭而御之辝曰妾不才幸而有子将不信敢徵蘭乎公曰喏生穆公名之曰蘭左傳祓除不祥鄭國之俗上已於溱洧兩水上執蘭招䰟丨丨丨丨韓詩孔子作操猗蘭操者丨丨所丨也孔子聘諸侯莫能任自衛返魯隐谷之中見香蘭獨茂喟然嘆曰夫蘭當為王者香今乃獨茂與衆草為伍乃止車援琴鼓之自傷不逢時託辝於蘭云琴操屈原為佩紉秋蘭以為佩楚辭芳蘭當門先主殺張裕諸葛亮救之帝曰丨丨丨丨不得不鋤蜀志芝蘭生階謝安嘗謂諸子弟曰子弟何預人事答曰譬如丨丨玉樹欲其丨於丨庭云爾晉書漢尚書郎丨丨丨丨含香握蘭官儀唐秘書省丨龍朔年改丨丨丨曰蘭臺秘書郎曰省郎唐書賦蘭等詩孫逖為集賢院修撰宰相蕭嵩㑹百官丨丨丨丨継雅頌躰使逖序孔白帖竊蘭挿㡌霍定與友生遊曲江以千金求人丨貴侯亭榭中丨花丨丨兼自持往羅綺叢中賣之士女爭買抛擲金錢曲江春宴録給以香粉李適帝冬幸新豊賜湯池丨丨丨丨蘭澤孔六帖養以綺石王維貯蕙蘭必黄磁斗丨丨丨丨累年彌盛汙漫録胡有廢者裴子餘同舎李尚隐程行湛或問優劣於長史陳崇業曰蘭菊異芳丨丨丨丨孔帖蕙花為香以焼蕙花緑葉紫花魏武帝以丨丨焼之廣志累年彌盛見前蘭花下孔子猗蘭操蘭之猗猗揚揚其香不採而佩於蘭何傷今天之旋其曷為然我行四方以日以年雪霜貿貿薺麥之茂子如不傷我不爾覯薺麥之茂薺麥之有君子之傷君子之守孔子傷不逢時作楊夔植蘭説或稱蘭荃鄙不遄茂乃法圃師汲穢以溉而蘭淨荃潔非類於衆卉苗既驟悴根亦旋腐噫貞哉蘭荃歟遟發舒守其天和雖瘠而茂也假雜穢亂其天真雖沃而斃也守貞介而擇禄者其蘭荃乎樂􅁋亂而偷位者其雜卉乎受莽之偽爵者孰若龔勝之不仕耶食操之僣禄者孰若管寕之逺引耶嗚呼業圃者以穢為主而後見龔管之正山谷修水記蘭似君子蕙似是大夫大槩山林十蕙而一蘭也離騷曰既滋蘭之九畹又植蕙之百畝則知楚人賤蕙而貴蘭矣蘭蕙叢生蒔以沙石則茂沃之以湯茗則芳是所同也至其一榦一花而香有餘者蘭也一榦五七花而香不足者蕙也余居保安僧舎開牖於東西西飬蕙而東養蘭觀者必問其故故著其説焉紫陽離騷辨證蘭蕙二物本草言之甚詳劉次荘云今沅澧所生花在春則黄不若秋紫之芬馥又黄魯直云一榦一花而香有餘者蘭一榦数花而香不足者蕙今按本草所言之蘭雖未之識然而云似澤蘭則今處處有之可推其類以得之矣蕙則似為零陵香尤不難識其與人家所種葉類茅而花有兩種如黄説者皆不相似劉説則又詞不分明大抵古之所謂香草必其花葉皆香而燥濕不變故可刈而為佩若今之所謂蘭蕙則其花雖香而葉乃無氣其香雖美而質弱易萎皆非可刈而佩者也止齋責盗蘭説予寓梓溪一夕友人以園隅蘭芳告予往視之愛其美而憫其不知於人也遂出置于庭数日香無聞欲去而猶遟之既卒以不香遂目之曰盗蘭而語之曰吾聞䑕有似豹大小異形吾得以辨其為鼮鳥有似鳯赤紫相見吾得以辨其為鷟石雖似玉疵而不醇吾故知其為瑉草雖似苖秀而不實吾固知其為莠彼固有近似吾惑之今汝蘭其形蘭其色花簮焉而癯葉脩焉而持吾乃薙茹藘剪荆棘出汝於散地置汝於坐側汝乃假蘭之名乏蘭之徳蕕如其臭苕如其賊吾知汝竊其近似以自欺深其偽而難測者也向使漢宫舎汝何以對乃辟楚人舎汝何以祛其祥鄭君失汝何取乎七穆之端屈原去汝何誇乎九畹之芳然則汝之盗蘭而香亦何異乎人之盗儒而實亡吾試言汝以證夫人陽短石􅂋盗吾公也隂附王鳯盗吾直也釣名布被盗吾儉也伏死諌墀盗吾忠也託經以媚婦盗吾學也口聖而行市人盗吾誠也是皆君子近之而不知其䜛人主俯之而不覺其奸此社稷所以危覆忠良所以彫殘吾今可置汝於中庭是君可置斯人於百官也吾故效魯司寇誅少正卯之義戒鄭寤生去叔叚之難亟命除汝其何安蘭曰伏辜願屏園樊陳正敏遯齋閑覧楚辭所詠香草曰蘭曰蓀曰茝曰葯曰虈曰芷曰荃曰蕙曰薫曰蘼蕪曰江蘺曰杜若曰杜衡曰掲車曰留夷釋者但一切謂之香草而已如蘭一物或以為都梁香或以為澤蘭或以為猗蘭草今當以澤蘭為正山中又有一種如大葉門冬春開花極香此則名幽蘭非真蘭也蓀則今人所謂石葛蒲者茝葯虈芷雖有四名止是一物今所謂白芷是也蕙即零陵香一名薫蘼蕪即芎藭苗也一名江蘺杜若即山薑也杜衡今人呼為馬蹄香惟荃與掲車留夷終莫能識余他日當徧求其本列植欄檻間以為楚香亭詩集嚴霜降靈芝生河洲動揺因洪波秋蘭榮何晚丨丨丨其柯哀哉二芳草不植㤗山阿後漢酈炎清露被丨丨丨蘭臯阮嗣深忌當門種蘭丨丨丨袁淑不改芳蘭槁丨丨丨文粹被長坂秋蘭丨丨丨曹子建被幽崖秋蘭丨丨丨魏文帝蔭玉池秋蘭丨丨丨池水清且芳雙魚自踴躍兩鳥時囬翔晉傅元紫艶鮮楚客重蘭蓀遺芳今未歇葉抽清淺水花㸃暄妍節丨丨映渠丨輕香含露潔李奕葉光猗蘭丨丨丨杜甫紫芽出庭蘭丨丨丨白樂天含幽色紫蘭丨丨丨韋應物舞幽香風蘭丨丨丨孟遟香風逺蘭秋丨丨丨李白香風煖煙開蘭葉丨丨丨李白光風催丨丨丨蘭吹少殿李白生幽園孤蘭丨丨丨衆草共蕪没雖照陽春暉復悲髙秋月淅瀝飛霜早緑艶恐休歇若無清風吹香氣為誰發李白在幽林蘭丨丨丨亦自芳劉夢得童子佩光華丨丨丨柔軟美人心同上騷客賦江海久無丨丨丨一枝止可薦靈均叅􅋁子流聲馥丨丨丨秋蘭潘正叔中心比謾道丨丨丨芳草不知讒者起椒蘭晏元献炎帝書療痾丨丨與丨功紉佩楚臣空有意梅聖俞燕姞夢丨丨丨魂惟是見謝家庭戸本來多文潞公靈均佩根移地因偏花老色未改意踈瘴霧餘氣壓初寒外婆娑靖節忩髣髴丨丨丨王右丞藝植繁丨丨日丨滋芬芳時入座青葱春茹擢皎潔秋英墮温公香馥滿陽崖月崫得芳叢滿握歸來誇所遇淨掃幽逕植蘚墀紫莖緑葉弄竒姿踈簾風軟日華薄丨丨丨懐君自知叅寥羞自獻春蘭如美人不採丨丨丨時聞風露香蓬艾深不見坡行採掇昔人慕倚蘭佩服比修潔往往卒嵗間山中丨丨丨叅寥一以悴秋至百草晦寂寞寒露滋蘭臯丨丨丨蕪穢不能治端居念離索無以遺所思願言託孤根嵗晏以為朝朱文公寄蘭不自媚幽獨塵事屏婉晩秋蘭滋芳馨丨丨丨掩洎空相思時對日方永披叢露未晞翛然寄􅁔詠九畹陳悲詩朱文公空自秘健碧繽繽葉班紅淺淺芳幽香丨丨丨風肯秘幽香楊誠齋塵編詎考今花得古名旖旎香更好適意欲忘言丨丨丨能丨朱文公雪徑偷開丨丨丨丨淺碧花氷根亂吐小紅芽生無桃李春風面名在山林處士家政坐國香到朝市不容霜節老雲霞江蘺蕙圃非吾耦付與騷人定等差楊誠齋蕙花泉浸我根蕙草生山北託身失所依寒丨丨丨丨植根隂崖側夙夜懼危頽凄風常徘徊三光照八極獨不蒙餘輝漢繁欽草留芳根蕙丨丨丨丨李白幻色真香蕙本蘭之族依然臭味同重為水仙佩相識楚詞中丨丨雖非實丨丨亦竟空云何㣲起馥鼻觀已先通東坡孤榦初㽔幽人非愛山出山将何之山居種蘭蕙嵗寒久當知初藝止百畝餘地惜奚為先生無廣居千巖一茅茨四面秪藝蕙中間纔置錐鋭緑紛宿叢修紫摧㓜枝丨丨八九花一花破丨丨西風澹無味㣲度成香吹燈夢得幽馥月冩傳静姿我欲掇芳英和露充晨炊眷然惻不忍環玩自忘飢豈無衆花草不願秋来遟種時亂不擇嵗晩悔何追楊誠齋蓀紫艶輕香楚客重蘭蓀遺芳今未歇葉抽清淺水花㸃暄妍節丨丨映渠鮮丨丨含露潔離居若有贈暫與幽人折李衛公樂府楚客才華為發揚丨丨丨丨丨丨丨深林着意不相忘夢成燕國正芬芳莫把品名閒擬議且㸔青鳯羽毛長十分領取面前香浣溪沙仲殊貴游公子不能招緑玉叢中紫玉條幽花踈淡更香饒不将紅粉汚髙標騷空谷佳人宜結伴丨丨丨丨丨丨丨小忩相對誦離浣溪沙諲向子輕紅蔓引絲多少丨丨丨丨丨丨丨剪青蘭葉巧人向月中歸留下星鈿彈破真珠小得等閒不管春知多着綉簾圍繞只被東風偷餘香分付閒花草醉花隂仲殊萱草花格物聚話萱草花其名不一有曰宜男者謂其宜懐姙佩之必生男有曰忘憂者謂其萱本又作諼引詩諼草諼訓忘令人忘憂也此花在莛首叢生朱槿色跗五色葉四垂春末夏初着花有紅黄紫三種又一種名鳯頭者尤佳可愛也或曰一名鹿葱誤事類療愁吳中謂萱草丨丨述異記忘憂神農經曰中藥養性萱草丨丨博物志宜男水葱花葉如鹿葱花色有紅黄紫三種出始興婦人懐姙佩其花生男者即此花非鹿葱也交廣人佩之極有驗然其土多男不厭女子故不常佩也南方草木記樹之背焉得諼草言丨丨丨曰諼訓忘非草名背北堂也士昏禮云婦洗在北堂有司徹云主婦北堂房室所居之地揔謂之堂房半以北為北堂房半以南為南堂釋文諼本又作萱説文作藼云令人忘憂也詩伯兮注種之前嵇康丨丨舎丨崔豹古今注曹子建宜男草頌草號宜男既曄且貞厥貞伊何惟乾之嘉其曄伊何緑葉丹花光采晃曜配彼朝日君子躭樂好和琴瑟固作螽斯徽音孔臧福齊大姒永世克昌晉傅𤣥宜男花賦猗猗令草王於中方花曰宜男號應貞祥逺而望之煥若三辰之麗天近而察之見若芙蓉之鍳泉於是姣童媛女以時來征結九秋之永思含春風以娛情夏侯湛宜男花賦淑大邦之竒草兮應則百之休祥稟至貞之靈氣兮􅂋嘉名以自彰冠衆卉而挺生兮承木徳於少陽躰柔性剛蕙潔蘭芳結纎根以立本兮靈渥於青雲順隂陽以滋茂兮含章之有文逺而望之灼若丹霞照清天近而觀之煒若芙蓉鍳緑泉萋萋翠葉灼灼朱華曄若珠玉之樹煥如景宿之羅充后妃之盛飾兮登紫㣲之内庭囬日月之輝光兮隨天運以虗盈詩集可愛丨丨宜男草垂采映娼家何時如此葉結根復含花梁元帝當樹忘憂丨丨萱李含丹粉萱草丨丨丨温庭筠生堂階萱草丨丨丨游子行天涯慈親倚堂門不見萱草花聶夷中兒女花萱草丨丨丨不觧壮士憂孟郊後庭草宜男謾作丨丨丨不似櫻桃結子紅温庭筠蝶尚留叢踈露始滴芳餘丨丨丨韋應物麕䴥食野馬不任騎菟絲不任織既非中野花無堪丨丨丨沈約忘不得我有憂民心對君丨丨丨石舎人憂自釋人心與草不相同安有樹萱丨丨丨若言憂及此能忘乃是人心為物易梅聖俞觧使人愁若教花有語却丨丨丨丨晏元献定忘憂否修莖無附葉繁蕚攅莛苜毎欲問詩人丨得丨丨丨宋景文孤秀能自㧞萱草雖㣲花丨丨丨丨丨亭亭亂草中一一芳心挿坡榮衰可兩忘從來古北堂雨露借恩光與菊亂佳色共葵傾太陽人生真苦相物理忌孤芳不及空庭草丨丨丨丨丨山谷谺然黄鵠觜萱草朝欲開丨丨丨丨丨穎濵絶似杜蘭香莫訝萱枝小能施宫様粧只縁沾染足丨丨丨丨丨徐竹隐樂府小庭春老丨丨丨丨碧砌紅萱草長憶小欄閒共繞携手緑叢含笑别來音信全乖舊期前事堪猜門掩日斜人静落花愁㸃蒼苔清平樂古今合璧事類備要别集卷二十七
