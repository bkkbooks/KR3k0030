body:
  text: 古今合璧事類備要外集卷十四宋謝維新撰音樂門磬附方響音樂㫖歸磬石聲石有一定之聲而衆聲依焉古者制磬其形垂下以象天形屈而下覆之意上曲者為句釣下直者為倨句即股在上廣而短倨即鼓在下狹而長以長掩短則鼔長於股者半矩廣狹長短厚薄聲之清濁係焉惟貴適中而已矣方響以纎鐡為之出於編磬之制梁始為之脩九寸廣二寸圓上方下亦以代磬也事類立辨石聲磬磬以丨丨辨以致死君子聴磬聲則思死封疆之臣記樂記防淫古者天子諸侯聴鐘磬所以養行義而丨丨佚也史樂書秋樂磬立丨之丨五經要義冬音磬立丨之丨唐樂志帝嚳造丨丨丨鐘磬皇圖要義無句作丨丨丨磬注丨丨堯時人本草又句氏作磬説文夔擊石丨曰予丨丨拊石夔鳴球丨曰戛擊丨丨注球亦玉磬並書禹垂磬丨以五音聴政丨鼓丨鐸鐘鞀以待四方之士為銘於簨簴曰語寡人以憂者擊磬淮南子叔離磬丨之丨丨注離謂次序記明堂位又磬叔所作樂録又磬叔所造不知何代人古史考云堯時人也世本磬氏為丨丨丨磬倨句一矩有半磬師掌丨丨丨編磬並周禮笙同音丨磬丨丨鞉備奏丨磬祝敔既丨乃丨並詩襄擊磬擊磬丨入於海子擊磬丨丨丨於衛有荷蕢而過孔氏之門者曰有心哉擊磬乎斯已而已矣並語臧文仲糴魯饑丨丨丨以玉磬告丨于齊國語賓媚人賂晉敗齊師于鞌齊侯使丨丨丨丨以紀甗玉磬注丨丨丨國佐也左升堂聞石魯恭王欲壞孔子舊宅以廣其居丨丨丨金丨絲竹之音乃不壞宅尚書序作閣懸玉漢武帝丨仙丨於甘泉宫西其上丨浮金輕丨磬郭子橫洞冥記於水濵得漢武時犍為郡丨丨丨丨石磬十六枚劉向説上宜興辟雍設膠序隆雅頌之音以風化於天下為泗濵友南李建勛目磬丨丨丨丨是閏月應摠章中閏州得玉磬以獻張文收扣其一曰晉某嵗丨丨丨者通典注鳥應飛舞後楊阜為重泉令鸞鳥集于學宫阜擊磬丨丨丨而丨東觀記玉琢精巧楊妃善擊磬乃取藍田綠丨丨之備極丨丨幸蜀還乃送太常藏之開元記雲韶法曲文宗好雅樂詔太常卿馮定采開元雅樂製丨丨丨丨雲韶樂有玉磬四笙磬同音文宗遇内宴乃奏曰丨丨丨丨沉吟忘味不圖為樂至於斯也自是臣下功髙者輒賜之擇其可用本朝神宗元豐三年禮院楊傑言請就太常鐘磬丨丨丨丨者方響以代磬梁有銅磬則今之方響也丨丨丨通典出編磬方響體似應石通典曰審此則是丨于丨丨之製而梁始為之者唐志縁直技聲方響以纎鐡為之胡部無方響丨丨丨丨不應諸調是蕤賓調樂工廉郊師於曹綱綱曰教授人多矣未有此性靈弟子也郊嘗池上彈蕤賓調忽聞芰荷間有物跳躍出岸乃方響一片有知者識丨丨丨鐡也指撥精妙致律吕相應物類相感琵琶録只有四調本朝太宗内庫别水别鐵有方響二十八調是筝丨丨宫商角羽丨丨臨時移注應二十八調李允方響歌敲金扣石聲相凌遥空冷靜入正澄寶瓶下井轆轤急小姓弄索傷清氷穿絲透管音未歇迴風繞指驚泉咽季倫怒擊珊瑚摧靈芸整鬢步揺折十六葉中侵素光寒玲震月雜佩璫雲和不覺罷餘怨蓮峯一夜啼琴張急節冩商商恨促秦愁越調逡巡足夢入仙樓戛殘曲飛霜稜稜上秋玉詩集驚瀑敗沸耳作丨丨端能丨笙磬韓荅柳州食蝦蟇詩方響數條秋水丨丨丨丨掛琅玕玉手丁當怕夜寒曲盡連敲三五下恐驚珠淚落金盤瑟附阮音樂㫖歸瑟絲聲其來古矣大者長八尺一寸廣一尺八寸絃二十有七其次長七尺二寸廣未詳也絃二十三其常用者或十九絃或止四絃焉阮者阮咸所作近世之制又不同皆名為阮子事類儀節秦醫和曰君子之近琴瑟以丨丨也非以慆心也左昭公元年立志絲聲哀哀以立廉廉以丨丨君子聴琴瑟之聲則思忠義之臣樂記䟽越清廟之瑟朱絃而丨丨一唱而三嘆有遺音矣注越瑟底孔禮記促柱丨丨危絃清微白氏六帖雅頌丨丨長八尺一寸二十三絃其常用者十九絃其餘四絃謂之畨畨嬴也頌瑟長七尺二寸禮圖灑步大瑟謂之丨徒瑟謂之丨注大瑟長八尺一寸廣一尺八寸二十七絃爾雅改調道猶琴瑟終丨丨注曲節既殊固宜變易文中更張竊譬之琴瑟不調甚者必解而丨丨之乃可鼔也云云當丨丨而不丨丨雖有良工不能善調也膠柱譬猶丨丨而調瑟楊子準狀丨之丨如瑟後律厯志庖犧作丨丨丨瑟世本伏羲作瑟三十六絃世紀瑟二十七絃伏羲所作隋音樂志晏龍為丨丨始丨瑟山海經素女鼔黃帝命丨丨丨瑟帝悲不止故破五十絃漢書后夔拊夔搏拊琴瑟以詠書圜丘奏周禮雲和之琴瑟冬日至於丨丨丨之注雲和山名方丘奏空桑之琴瑟夏至日於丨丨丨之宗廟奏龍門之琴瑟丨丨丨之不聴琴孫林父在戚擊鐘季札非之林父聞之終身丨丨丨瑟左襄公二十九年不合雅子曰由之瑟奚為於丘之門門人不敬子路子曰由也升堂矣未入於室也注子路鼓瑟丨丨丨頌語十一取而歌孺悲欲見孔子孔子辭以疾將命者出户丨瑟丨丨使之聞之注使知己非真疾也捨而作子曰㸃爾何如鼓瑟希鏗爾丨瑟丨丨曰異乎三子者之撰並語鼓而鳳舞趙女丨瑟丨丨丨鼓而魚出瓠巴丨瑟丨流丨丨聴荀勸學秦王請奏趙文惠與丨丨會澠池秦王曰切聞趙王好音丨丨瑟趙王鼓瑟藺相如前曰聞秦王善為秦聲請奉盆缶秦王不懌為之擊缶史藺相如傳趙女善鼓楊惲婦丨丨也雅丨丨瑟本傳揺瑟清骨相國李公集紀寶瑟和志盧邁有丨丨各數十有寒玉石磬響泉丨丨之號南部新書雲韶樂曲文宗製丨丨丨丨有瑟一軒轅律吕齊王好竽有求仕於齊者操瑟而立於王之門三年不得入叱曰吾瑟鼔之能使鬼神上下吾瑟鼓之合丨丨氏之丨丨客罵之曰王好竽而子鼔瑟其如王之不好何是所謂工於瑟而不工於求齊也韓子阮阮咸製阮琴本丨丨所丨制備五音可彈琴操元康中有發古塜得此器以銅為之遂依其制以木為之因名阮咸近世方格小為雙韻亦名阮其有依琵琶様制者名曰耍琵琶阮咸造唐元行冲曰丨丨所丨命匠人以木為之名月琴杜佑以為晉七絃阮咸所彈與此同因謂之阮蒯朗得秦琵琶也武后時蜀人丨丨于古墓中丨銅器似琵琶而圓通典詩集鳴瑟已呼孺子戛丨丨韓柔瑟合情弄丨丨彈作陌上桑絃聲何激烈風卷繞飛梁李白靈瑟丨丨時窅窅韓清瑟悲管逐丨丨杜齊瑟丨丨彈東吟秦絃弄西音慷慨動顔􅅎使人成荒淫李白錦瑟何時詔取金錢㑹暫醉佳人丨丨旁杜清塵埃趙瑟正髙張音響丨丨丨一彈和妙謳吹去繞瑶臺艷雪凌空散舞羅起徘徊韋蘇州吟松風丨丨丨汎瑟李白箏附􅌙筑音樂㫖歸箏形如瑟長六尺以應六律絃有十二象十二時柱髙三寸象三才或曰十三絃彈之者用骨𤓰長寸餘以代指其音箏箏然蒙恬所製真秦之聲箏形如瑟兩頭俱方七絃七柱以竹潤其端而軋之筑似琴以竹為之大頭安絃二十二或五絃以竹擊之事類秦聲夫彈箏者真丨之丨也頌瑟五曰絲為丨丨丨丨箏也樂志十二絃見前十三絃絲之屬四百箏丨丨丨隋音樂志蒙恬作丨丨丨箏故曰秦筝風俗通郝素彈丨丨善丨箏桓伊善晉丨丨字叔夏為豫州都督時謝安壻王國寶專利無厭安每抑制之孝武末年嗜酒而會稽王道子狎昵諂邪以安功名盛極而間之帝召伊宴飲安侍坐帝命伊吹笛伊神色無迕即吹為一弄乃放笛云臣於箏分乃不及笛然自足韻合歌管并請一吹帝丨其調達勑御妓奏笛伊曰御府人於臣必自不合臣有一奴善相便串帝召之奴既吹笛伊撫箏而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刋推心輔王政三叔仄流言聲節俯仰可觀安泣下沾衿越席就之捋其鬚曰使君如此不凡帝甚有愧色吕布奏丨丨詣袁紹紹患布欲殺之遣三十六兵被鎧迎布使著帳邊卧布知之使於帳中鼔箏諸兵卧布出帳去兵不覺也楊惲為丨丨曰家本秦也能丨秦聲西京伎丨丨丨有彈箏搊箏各一唐志陌上聲羅敷丨丨之丨白氏六帖舍利獻唐西丨丨丨其國樂至成都箏二其一形如鼉長四尺有四足虚腹以鼉皮飾背面及仰肩如琴廣七寸腹闊八寸尾長尺餘卷上虚中施門以張九絃左右一十八絃其一面飾彩花傅以虺皮為别善琴撰譜李汧公蓄二琴殊絶所謂響泉韻磬也二寵妓秀奴七七丨丨與箏自丨琴丨引刀斬指唐樊彦琛妻魏者揚州人彦琛卒值徐敬業難陷其中聞其知音令鼓箏曰亡不死而逼我管絃禍由我發丨丨丨丨阮瑶箏賦箏長六尺以應六律絃有十二象十二時柱髙三寸象於三才傅元箏賦上崇如天下圓如地中空准六合絃柱擬十二月設之則四象在鼔之則五音發彈箏以骨爪長寸餘以代指也追赴促彈急聲而危洪纎奮假或合或離移風易俗推故引新清濁代興有始有終侯瑾箏賦於是急絃促柱變調改曲卑殺纎玅微聲繁縟散清商而流轉兮若將絶而復續紛曠蕩以繁奏邈遺世而越俗若乃察其風采練其聲音美哉蕩乎樂而不淫雖懷思而不怨似幽風之遺音於是稚曲既闋鄭衛仍修新聲變順妙弄優游微風漂裔冷氣輕浮感悲音而増嘆愴嚬悴而懐愁若乃上感天地下動鬼神饗祀祖宗酬酢嘉賔移風易俗混同人倫莫有尚於箏者矣陶融妻陳氏賦摠八風之候不差其微而洞雪度中楷模不盈不縮劉夢得與柳子厚書嗟夫箏郭師與不可傳者死矣絃張柱差枵然貌存中有至音含糊不聞噫人亡而器存布方冊者是已􅌙闕筑為變徵聲荆軻之秦至易水之上既祖取道髙漸離擊筑軻和而歌丨丨丨之丨士皆垂淚涕泣史出裝匣中髙漸離變姓名為人庸保聞其家堂上客擊筑一坐稱善賜酒漸離念久𨼆畏約無窮時乃退丨丨丨丨筑與其善衣更容貌而前舉座客皆驚下與抗禮以為上客聞於始皇始皇召見人有識者乃曰髙漸離也秦皇帝惜其善擊筑重赦之乃矐其目使擊筑未嘗不稱善稍益近之漸離乃以鉛置筑中復進得近舉筑扑秦皇帝不中於是遂誅漸離終身不復近諸侯之人擊筑自歌漢髙帝破布軍還沛留置酒沛宫悉召故人父老子弟佐酒發沛中兒得百二十人敎之歌酒酣丨丨丨丨曰大風起兮雲飛揚威加海内兮歸故鄉安得猛士兮守四方令兒皆和之本紀詩集清箏丨丨何繚繞度曲絲奚垂李白邯鄲南亭詩哀箏丨丨傷老大杜銀甲丨丨彈箏用杜又十二學彈箏丨丨不曽卸李義山玉指箏絃丨丨調杜手語家人當窗弄白日絲將丨丨彈鳴箏李白春日行甲鳴丨丨銀玓瓅柱觸玉玲瓏白居易哀響嬌童為我歌丨丨誇箏笛韓感春無言聴滿座丨丨丨軋箏秋山碧樹一蟬清聞彈罷不聴哀箏二十年忽逢纎指弄鳴絃綿蠻巧囀花間舌嗚咽交流氷下泉常謂此聲今已絶問渠從小自誰傳樽前笑我丨丨丨白髪蕭然涕泣泫歐陽李留後家聞箏坐上作余少時常言一釣客老樂工箏聲與時人所彈絶異云是前朝敎坊舊聲其後不復聞至此始復一聞也知心懷月髙夜鳴箏聲從綺忩來隨風更迢遰縈雲暫徘徊餘音若可玩繁絃互相催不見理箏人遥丨丨所丨寧悲舊寵棄豈念新期乖含情鬱不發寄語宣餘哀一彈飛霜零再撫流光頽每恨聴者稀銀甲生浮埃幽幽孤鳳唫衆鳥聲難諧盛年嗟不偶况乃容華衰道同符難諾志異勞百媒栖栖墻束客亦抱凌雲才劉子翬古今合璧事類備要外集卷十四
