body:
  text: 古今合璧事類備要外集卷五十宋謝維新撰屏風門屏風附床屏枕屏器物叢談屏風所以障風亦所以隔形者也古者扆之遺象又床有屏施之於床枕有屏又施之於枕但高不下長短同耳事類皇邸掌次設皇邸注邸後板也丨其屏風也丨染羽像鳯凰以為飾周禮蕭墻丨丨注蕭肅墻屏也君臣相見至屏而加肅敬焉語季氏罘罳漢丨丨注屏也文帝紀又丨丨伏思也君朝行至内屏思惟故曰丨丨古今注清防丨丨屏風也顔延年詩注頭觸屏前陳萬年子咸數言事譏刺近臣萬年病召咸戒牀下語至半夜咸睡丨丨丨萬年大怒曰乃公教汝汝反不聴吾言何也咸曰具曉所言大要教咸諂也萬年乃不復言本傳座施屏後宋𢎞嘗見御丨丨丨風畫列女帝數顧𢎞曰未見好徳如好色者也帝撤之東觀漢記雲母屏後鄭𢎞為太尉時舉第五倫為司空班次在下毎正朔朝見𢎞曲躬自卑上遂聴置丨丨丨風分隔其間由此為故事刻鏤屏何敞為汝南太守章帝巡過邵設丨丨丨風帝命侍中銘云三輔决錄素屏風太祖平桞城頒所獲器物有丨丨丨持以賜毛珍曰君有古人之風故賜君以古人之服魏志畫屏風曹不興事見蠅注畫屏四堵劉向云臣與歆所校烈女傳種類相從為七篇丨之於丨風丨丨别録御屏隔座景帝時紀亮為尚書令子隲為中書令毎朝㑹詔以丨丨風丨其丨吳録鏤作瑞圖孫亮作琉璃屏風丨丨丨應丨一百二十種古今注衣以白縑石季龍作金鈕屈膝屏風丨丨丨丨畫義士仙人禽獸鄴中記上疏列為唐太宗覽魏徵十漸疏曰方以所丨丨丨丨屏庶朝夕見之集家誡書房𤣥齡恐諸子驕侈席勢凌人乃丨古今丨丨丨屏風曰留意於此足以保躬矣錄刺史名太宗曰治人之本莫重於刺史故錄姓名於屏風臥與對之寫列女傳虞世南帝嘗命丨丨丨丨於屏風屛上婦人元和初有士人因醉臥㕔中及醒見古丨丨丨丨等悉於床前踏歌歌曰長安女人踏春陽無處春陽不㫁腸舞袖弓腰渾忘却蛾眉空帶九秋霜其中雙鬟者問如何是弓腰歌者乃反首䯻及地勢如規焉士人驚叱之女忽然上屏酉陽雜俎屏上美女水晶丨丨刻丨丨可二三寸妃以遺國忠置之樓上常偃息其下一日國忠獨臥丨丨諸女悉下各通名曰當壚人也步蓮人也桃源人也拾翠人也竊香人也金屋人也解佩人也為雲人也畫眉人也弄簫人也笑嬖人也許飛瓊也趙飛燕也金谷人也結綺臨春人也國忠驚叱皆復歸屏自是不登樓未幾果敗楊妃外傳三孔雀屏唐竇氏畫丨丨丨丨間使娶女者射之隂約中目與之唐高祖各中二目詳見婚娶門八角花屏安禄山恩寵莫比錫賚無數其所賜品目有丨丨丨鳥丨風孔氏帖虹霓為名元宗語妃憶得一屏風今在訪以賜汝屏乃丨丨丨丨雕刻前代美人之形可三寸許其餘執玩之器衣服皆用衆寳相厠而成水晶為地以玳瑁水犀為匣絡以真珠瑟瑟間綴精巧殆非人力所製乃隋文帝所造賜義成公主墮在北胡貞觀初滅胡蕭后同歸中國上因而賜焉太真外傳手印為誌明皇所幸美人王氏數夢人召飲客具言於上曰此必術士所為若再往以物誌之其夕夢中又往因就硯中濡丨丨於屏風上既寤即告帝索於外果於東明觀中得其手紋而道士已遁去矣唐末遺史次為連屏憲宗詔李絳摉聴君臣成敗五十種丨丨丨張便坐列為一屏李伯時嘗畫高陽長揖張釋之諫文帝馮媛當熊霍光取璽武帝問日磾明妃出塞王猛捫蝨醉山簡李密迓太宗明皇攬鏡妃子剪鬟十事丨丨丨丨黄香屏風銘古典務農彫刻傷民忠則竭節義在修身劉安屏風銘惟新屏風出自幽谷不逢仁人永為枯木李尤屏風銘舎則潛辟用則誤張立必端直處必亷方壅遏風邪霧露是抗羊勝屏風賦重葩累綉香璧連璋連以文錦映以流黄畫以古烈顒顒昻昻梁簡文謝棊子屏風啓雲母之􅙘慙其麗色瑠璃之扇愧其含影白居易屏風謠素屏素屏孰為乎不文不飾不丹不青當世豈無李陽氷之篆文張旭之筆跡邉鸞之花鳥張藻之松石吾不令加一㸃一畫於其上欲爾保真而全白吾於香爐峯下置草堂二屏倚在東西墻夜如明月入我室曉如白雲圍我床我心久養浩然氣亦欲與汝表裏相輝光爾不見當今侯家主第與王宫織成步障錦屏風綴珠陷鈿帖雲母五金七寳相玲瓏貴豪待此方恱目晏然寢臥乎其中素屏素屏物各有所冝用各有所施爾今木為骨兮紙為而捨草堂欲何之枕屏張敬夫枕屏銘勿欺暗毋思邪席上枕前且自省莫言屏曲為君遮床屛銀塗緑沈宋元嘉十六年御史大夫劉楨奏廣川刺史韋朗作丨丨漆屏風三十三床又丨丨屏風一床枕屛晝臥題詩邵康節過士友家丨丨見具枕屛畫小兒丨丨其上云遂令高臥人欹屏看兒戲詩話詩集金鴨丨丨屛風蜀山夢李賀金雀屛開丨孔丨杜晴天掃畫丨丨丨丨屏李白枕屏伴人閑臥繩床竹簟曲屏風野水遙山霧雨濛長有灘頭釣魚叟丨丨丨丨寂寥中几杖門几附案器物叢談几案屬長五尺高尺二寸廣一尺兩端赤中央䛇古者坐必設几所以依凭之具然非尊者不之黑皆所以示優寵之也其來古矣然人几在左神几在右又不可以不辨事類司几丨丨筵掌五几授几丨丨有緝御詩行葦賜几大夫七十致仕則必丨之丨杖操几謀於長者必丨丨杖從之並曲禮銘几武王丨丨大戴禮慿几王乃洮水相被冕服丨玊丨書成王顧命仍几華玉丨丨雕玉丨丨文具丨丨漆丨丨注華玉文具雕刻鏤皆以飾慿几仍因也因生時几不改作此見羣臣覲諸侯之坐同上倚几左史倚相曰昔衛武公箴儆於國曰丨丨有誦訓之誡國楚語投几晉伐偪陽城荀偃士匄請班師智伯怒丨之以丨出於其間注出偃匄之間左隠几臥孟子去齊有欲為王留行者坐而言不應丨丨而丨公孫丑隠几坐南郭子綦丨丨而丨仰天而噓嗒焉似喪其偶顔成子游立侍乎前曰何居乎形固可使如槁木心固可使如死灰乎今而隠几者非昔之丨丨也莊子隠几眄郭隗謂燕昭王丨丨據杖丨視相使則厮役之人至奮髯抵朱慱遷琅琊太守齊郡舒緩養名慱丨丨丨几曰觀齊兒欲以此為俗邪乃召見諸曹史書佐及縣太史選其可用者省中置平帝詔太師孔光毎十日一賜飡賜靈夀杖令為太師丨丨丨几前本傳封以玉函漢武帝受太甲靈符十二於西王母盛以黄金几丨丨白丨丨以珊瑚為床内傳化為白麂葛仙翁慿桐木几於女几山凡學數十年白日登仙几丨丨丨丨三足時出於山上神仙傳慿之安坐孔融為北海太守為袁譚所攻流矢雨集矛㦸内接然融慿几安然而坐讀書論義自若也見之因書王羲之詣門生家丨棐几滑浄因書丨真草相半其父誤刮去驚懊累日賜毛玠几毛玠事與素屏風同詳見前賜甄權几甄權許州扶溝人正觀中權已百嵗太宗幸其舎丨几杖衣服孔六帖召凭狐几房夀六月丨客丨丨文丨雲仙散録叩頭錄號為肉几黄㼐兒矮陋機惠元宗嘗慿之行問外間事動有錫賚丨丨丨丨案酉陽雜俎柳斬曲几文后皇植物所貴乎直聖主取焉以建家國亘為棟楹齊為閫閾外隅平端中室謹飾度焉以几維量之則君子馮之以輔其徳末代滛巧不師古式㫁兹揉木以限肘腋欹形詭狀曲程詐力制類竒邪用絶繩墨勾身陋狹危足僻側支不得舒脅不遑息余胡斯蓄以亂人極追咎厥始惟物之殘禀氣失中遭生不完託地墝垤反時燠寒鬱悶結澁癃蹇艱難不可以逺遂虧其端離竒詰屈縮恧􅀈岏含蝎孕蠧外邪中乾或因先容以售其蟠病夫甘焉制器以安彼風毒敗形隂沴遷魄禍氣侵骨滛神化脉體側筋倦榮乖衛逆乃喜茲物以為已適器之不祥莫是為敵烏可昵近以招禍癖且人道甚惡惟曲為先在心為賊在口為愆在肩為僂在膝為攣戚施踦跛匍匐拘拳古皆斥逺莫致於前問誰其類惡木盜泉朝歌迥車簡牘載焉昭王市骨樂毅歸燕今我斬此以希古賢諂諛宜惕正直宜宣道焉是達法焉是專咨爾君子曷不乾乾既和且平獲祐於天去惡在㣲慎保其傳賈生書几銘仲逺好學辭藻良贍逸然有子貢之感時倦而顧息聞之吾師曰生無所息仲逺其務自彊而夕愓陳希元几銘親仁可以自託友賢可以自扶求位得仁必駞必驅若隱几以召慿几而呼則仁賢斯遯厮役求趍嗚呼賢既遯身即孤晏同叔几銘小飯防饐跬行虞跌巾有角墊衣存人缺惟忠與孝則罔摧折案等案燕丹太子常與荆軻丨丨而食持案漢高祖過趙趙王張敖丨丨進食禮甚恭高祖箕踞罵之史記對案不食萬石君石奮子孫有過不誚譲為之丨丨丨丨前本傳屏案不食尹敏與班虎相厚善語常丨丨丨丨白氏帖有鳩入案魏公子無忌方食丨丨丨丨下公子怪之此有何忌來投無忌邪使人於殿下視之左右顧望見一鷂從屋上飛去烈士傳與鴻舉案梁鴻妻孟光毎上食丨丨丨丨齊眉後本傳短人行案東都獻丨丨長五寸上疑是山精常令短人丨丨方朔問曰巨靈王何叛阿毋健否漢武故事怒吏抵案朱慱子元為琅琊太守丨丨丨丨抵破書案更始韓夫人嗜酒毎侍飲奏事輒丨丨丨丨東觀漢記斫前奏案曹公平荆州欲伐吳張昭等皆勸迎唯周瑜陳拒之之計孫權乃丨丨丨丨曰復有欲迎北軍者與此案同江表傳百寳為案同昌公主琢丨丨丨圓丨唐杜陽編白紙糊案舉人多以丨丨丨丨子面鄭昌圖詩曰新糊案子其白如銀摭言紙筆置案郭翰巡察隴右狄仁傑為刺史民争言有異政翰就館以丨丨丨於丨謂僚屬曰願薦使君美於朝據之何案劉立佐貴母尚在賢婦人也見縣令走廷中白事退戒曰長吏恐懼卑甚吾思而父吏於縣亦當爾而丨案當丨丨丨乎𤣥佐感悟待下益加禮據所未安高士廉同太子監國又攝太傅太子令曰寡人資公訓導而比聴政據案對公情丨丨丨所司宜别設案奉太傅士廉固辭指香案爐鄭覃帝嘗謂百司不可使一日弛惰因丨丨丨丨曰此始華好用久則晦仆臥案前韋處厚大和二年方奏事暴疾丨丨丨丨帝令中人翼扶之輿還第詩集拭烏皮拂丨丨丨几看魚樂凭几丨丨丨隠亦無心丨几丨丨丨杜扶導之言丨几丨丨丨韓愈病中贈張十八烏几伴棲遲丨丨丨丨杜朽几懼傾􅡼丨丨丨丨丨撫几空嘆息雲車何來遲丨丨丨丨丨案晁旡咎八僊案銘東臯松菊堂飲中八仙案八仙何必來松菊自吾伴詩集報玉美人贈我錦繡段何以丨之青丨案張子平論慿玉天子丨丨案劒履若雲行李白鼔吹入朝曲傳觴丨丨青玉案李白臨食或如丨丨案肴核分飣餖韓南山鳥黏孜孜凭書案譬彼丨丨黐韓文寄崔念六蠅食晝丨丨案繁韓霞布君門曉日開赭案横丨丨杜牧李皆詩綺食瓊杯丨丨青玉案使我醉飽無歸心李白憶舊遊玉皇香案我是丨丨丨丨吏謫居猶得在蓬萊元􅍬終日書案至哉天下樂丨丨在丨丨汨没事堆丨丨丨丨案並歐杖器物叢談杖持也所以扶持而防傾跌者也然古者設杖將以優老也而亦豈無分别哉葢五十杖於家而不杖於鄉六十杖於鄉而不杖於國七十杖於國而不杖於朝杖於朝者必八十餘老也過此以往天子欲有問焉則就之是已不必杖矣杖之設豈虚文乎哉事類齒杖夏官伊耆氏掌供王之丨丨齒杖謂賜老者杖供其杖函藏之既事受之函杖席間丨丨記神農放丨丨嚗然丨杖而笑嚗然放杖聲莊子夸父棄丨丨死丨杖化為鄧林山海經武王銘丨丨踐祚為杖之丨曰惡乎太道於嗜慾惡乎相忘於富貴大戴禮周王索丨丨下令丨曲杖吏求之不得使和求得之乃知吏不事杖韓子孔子荷孔子弟子從逺方來者丨丨丨杖問之曰子之父不有患乎摶杖問之曰子之母不有患乎置杖問之曰子之兄弟不有患乎杖步而問之曰子之妻子不有患乎故孔子六尺之杖論貴賤之禮辨親疎之義吕氏春秋孔子曳丨丨丨杖記植而耘子路遇丈人以杖荷蓧子路問曰子見夫子乎丈人曰四體不勤五穀不分孰為夫子丨其杖丨丨語十八投而拜子夏丨其杖丨丨策而去魯連却秦軍平原欲封之連遂丨杖丨丨以杖叩原壤夷俟孔子丨丨丨其脛叩竹杖張騫在大夏時日丨丨丨云賈人市之於身毒國積竹杖昌邑王買丨丨丨注合竹作杖賜吳王杖吳王不朝丨以几杖前文帝賛賜孔光杖丨丨丨靈夀丨後本傳騎此任之壺公與費長房一竹杖曰丨丨丨丨望之皆避契丹犯京師王遣牙將王峻奉表契丹耶律徳光呼之為兒賜一木柺虜法貴之如中國几杖非優大臣不可得峻持歸虜人丨丨丨丨道五代史高祖紀杖化懸崖楊隠之謁唐先生將歸先生以杖畫地視其庭忽丨丨丨丨萬仞嵓谷重疊謂隠之曰陵谷遽迁子將安歸隠之泣告乃以箒掃之其庭户如故乃得歸宣室志杖直如筆徐鳯有一丨丨丨丨管其後毎年生一節二十年後毎年縮一節三月即丨之四面青赤白黑各開一花不知何木也陶家瓶餘事問無恙否潤州甘露寺有僧道行孤高李徳裕廉問以方竹杖一贈焉方竹出大宛國堅實而正方節眼鬚牙四面對出及再鎮浙右其僧尚在丨曰前所奉竹杖丨丨丨僧喜對曰已規圓而漆之矣公嗟惋彌日前輩詩曰削圓方竹杖漆脚㫁紋琴桂苑叢談在什麽處夾山間佛印和尚闍黎與什麽人同來曰木上座丨丨丨丨曰在堂中夾山便到堂中師招拄杖擲於夾山前曰莫是從須彌山得邪師曰月宫亦不逢見李尤杖銘亭亭竒榦云云乃制為杖扶危定傾馮衍杖銘杖莫如信行莫如仁惠而無實怨及爾身趙武之珍子罕之寳二子之迹葢近於道庾信杖賦桓宣武平荆州外白有人稱楚丘先生來詣門下桓公曰名父之子流離江漢孤之責矣乃令引進乃曰噫子老矣鷄皮鶴髪蓬頭厯齒乃是江漢英靈荆衡杞梓雖有聞於十室幸無求於千里寡人有銅鐶靈夀銀角桃枝開木𤓰而未落養蓮花而未痿迎仙客於錦市送遊龍於葛陂先生將以養老將以扶危先生笑而言曰中國明於禮義開於知人心之憂矣惟我生民雖復孤條勁柘促節貞筠杖端刻烏角首圖麟豈能將余此身余之衰矣雖然有以非鬼非蜮心之憂矣未見縱心先求順耳伯玉何嗟丘明惟恥别有孔棘龎眉三槐基齒孔光謝疾袁逢致仕明公此贈或非乖理晉傅咸杖銘立此高節承也矜式梁簡文杖銘妙飾佳木游聖振灼排空霧轉騰雲鳯躍厖異玉伸長踰金錯唐羅衮杖銘身之疲杖以扶之國之危賢以圖之陳瑩中杖銘用之則行舎之則藏唯我與爾顛而不持危而不扶將焉用彼黄魯直笻竹杖賛厲亷隅而不劌故竊比於彭之夀屈曲而有直體能獨立於雪霜之後伯夷食薇而清陳仲嚥李而瘐涪翁晝寢蒼龍掛壁涪翁履危心如鐵石窮山獨行解兩虎争終不使卞莊乘間而孺子成名詩集卭竹丨丨籍舊聞靈夀堂前識復有冐霜筠寄生桂潭側文彩既班斕質性其調直所費天二真為有乘危力梁劉溉餉任新安竹杖因贈詩赤藤丨丨為杖世未窺喜節始攜自滇池韓愈赤藤杖歌紅藤惟有丨丨杖相隨錦里來白居易丨丨杖緩步須丨丨仍丨竹杖扶杜過眉拄丨丨丨杖班杜倚牖户空堂畫眠丨丨丨飛電著壁披蛟螭韓出嶇􅋂焉得輟兩足杖藜丨丨丨杜接宴兼丨丨身丨杖徐步入腸㫁春江欲盡頭杖藜丨丨丨芳洲杜扶公休沭五屋經霜老紫藤丨丨丨丨對親朋異時駟馬安車去拄到天壇願力能山谷以天壇靈夀杖送孫莘古今合璧事類備要外集卷五十
