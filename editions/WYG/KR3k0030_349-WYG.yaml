body:
  text: 古今合璧事類偹要外集卷四十九宋謝維新撰簾帷門簾器物叢談簾之為言亷也自障蔽為亷亷耻也一名筁一名箔事類蓬箔宋魏陳楚江淮之間謂之筁自關而西謂之箔南楚謂之丨丨揚雄方言户幃丨丨為簾風俗通緯蕭河上有家貧丨丨蒿以為業莊子織簿周勃以丨丨曲為業前本傳剟寢户簾曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮義捐亷耻日甚可謂月異而歲不同矣今其甚者盗丨丨丨之丨云云此其亡行義之尤至者也賈治安䇿為神屋簾漢武帝起神屋以白珠丨簾箔玳瑁壓之象牙為篾漢武故事編羽為簾漢武帝起招靈閣丨翠丨麟毫丨丨洞冥記織珠為簾昭陽殿以丨丨丨丨風至則鳴珩瑀西京雜記以金玊為明光宫丨丨丨珠璣丨簾箔三秦記以青布縁晉東宫簾箔皆以丨丨丨舊事作簾傷手沈麟士居貧嘗為人丨丨誤丨丨便流涕而還曰遺體毁傷感而悲耳南史謂簾為衣梁夏侯亶性儉率有妓妾十數並無被服毎有客嘗隔簾奏樂時丨丨丨夏侯妓丨同上詩集升月照丨丨丨簾櫳選落日在丨丨丨簾鈎杜用玊鈎簾丨丨丨古詩垂銀鈎珠箔丨丨丨李白蝦鬚捲丨丨半丨天香散蘇易簡翡翠名丨丨佳丨世共稀玉堂髙下巧相冝殷勤為囑纎纎手捲上銀鈎莫放垂羅隠狀玲瓏編竹丨丨丨庭闈盡處中不由經緯力安有卷舒功春晝曾妨燕寒宵豈隔風都堂重獻賦明處憶牢籠杜世昌影熒煌疊丨重紋映畫堂玉鈎銀燭共丨丨㑹看得見神仙在休下真珠十二行羅隠勞手捲丨將素丨丨蝦鬚瓊室流光更綴珠玉漏報來過半夜可憐潘岳立踟蹰陸暢􅌥地垂髙明庭宇好崇基枉把疎簾丨丨丨必欲滿堂隂有樂誰能暗室遂旡欺卷舒未必風旡意間隙須防燕解窺莫道人終可遮障可終遮障亦何為王逢原帷附幕幃㡩幨幄障帳幔幬幰紙帳器物叢談帷圍也以自障圍者在四旁在上者曰幕小幕坐上承塵曰㡩上下四旁悉周㡩曰幄帳亦曰幬小者曰斗帳形如覆斗單帳曰幃床前帷曰幨障所以自障蔽者幔帷之屬止一面幰張在車上者皆布帛羅綺等物為之然奢約在人而已矣事類組綬繫丨丨所以丨帷禮天官幕人注針縷成先丨後丨可以丨帷淮南訓外不趨帷薄之丨丨丨記曲禮敝不棄敝帷丨丨為埋馬也檀弓帷使觀晉侯使郤克徴㑹于齊齊頃公丨婦人丨丨之郤子登婦人笑于房左宣十七年帷中拜孔子見衛夫人夫人在絺丨丨而丨史帷不移秦起咸陽而西至雍離宫三百丨帳不丨而具帷不脩古者坐汙穢滛亂男女無别者不曰汙穢曰丨薄丨丨賈治安策張良運籌丨丨丨丨帷幄之中仲舒講誦董仲舒為􅀶士下帷丨丨弟子轉以乆次相授業或莫見其面本傳文帝示朴漢文帝帷帳無文繡丨淳丨為天下先本賛威帝内備丨丨時丨丨帷幄後賈陸傳謀謨帷幄光武策禹曰與朕丨丨丨丨决勝千里後鄧禹傳命褰帷裳賈琮為冀州刺史舊典傳車駿駕垂赤帷裳迎於州界及琮之部升車言曰刺史當逺視廣聽紏察美惡何有反垂帷裳以自掩塞乎廼丨御者丨之百姓聞風自然竦震其有贓過者望風解印綬去後本傳安坐帷中張奐使單于休屠及朔方烏相並同反叛遂燒度遼將軍門列屯煙火相望兵衆大怒奐丨丨丨丨與弟子誦書軍士稍安東觀漢記伏兵帷中孫峻欲誅諸葛恪置酒丨丨於丨丨吳志過户輙歎宋袁粲毎丨傅昭丨丨丨曰經其户寂若無人披其帷其人斯在豈非名賢乎叅謀决勝隋髙熲丨丨帷幄丨丨千里魏徴奉侍唐魏徵疏臣丨丨丨丨十餘年𤣥齡决勝房丨丨有丨丨帷幄定社稷功鄭畋坐籌丨丨丨丨帷幄終能復國並唐本傳作擇勝亭東坡守汝隂丨丨丨丨以帷幕為之世所未有也銘略云乃作斯亭筵楹栾梁鑿枘交設合散靡常赤油仰承青幄四張我所欲往十夫可將與水升降除地布牀又云豈獨臨水無適不臧春朝花郊秋夕月揚無脛而趨旡翼而翔敝又改為其費易償榜曰擇勝名實允當觀此銘則製度可見也苕溪漁隠集當火於庭范仲淹之子純仁娶婦將歸或傳以羅綺為帷幔者公聞之不恱曰羅綺豈帷幔之物邪吾家素清儉安敢亂吾家法敢持至吾家丨丨丨丨幕供幕幕人凡朝覲㑹同軍旅田役祭祀共其帷幕設重㡩重案禮勿幕井收勿丨注幕猶覆也不擅其有青油居丨丨幕下沈約宋書綺羅登思仙之臺張丨丨之幕神仙傳幕烏諸侯救鄭楚師夜遁鄭人將奔桐丘諜告曰楚丨有丨乃止左莊二十八年幕燕猶燕之巢於丨上左租入廉頗李牧收市丨皆丨幕府史本傳上功魏尚丨丨幕府前馮唐省書李廣出擊胡幕府丨文書本傳幕府衛青征匈奴大克帝拜大將軍於幕中因號丨丨注丨丨者以軍幕為義軍旅旡常居止故以張幕言之幕賔晉郗超為桓温謀謝安與王坦之嘗詣温論事温令超帳中卧聽之風動帳開安笑曰郗生可謂入幕之賔矣晉本傳廡幕伏兵帝御紫宸殿韓約奏甘露降金吾左仗樹李訓舒元輿奏甘露近在禁中陛下冝親往以承天休許之即輦如含元殿詔宰相羣臣往視還訓奏言非甘露帝顧中尉仇士良魚志𢎞等驗之訓因欲閉也諸宦人使旡逸者宦人至伏所約流汗不能舉首㑹風動丨丨見執兵者士良等驚走出曰李訓反士良遣神策使劉㤗倫率衛士捕訓黨千餘人斬四方館流血成渠李訓傳㡩大次掌次朝日祀五帝則張丨丨小次設重案重㡩師田則張幕設重㡩重案禮天官平帳㡩平帳也同上注幄虎幄衛侯為丨丨於藉圃注於藉田之圃新造幄幕皆以丨獸為飾左哀十七年紺幄以丨丨帳祭天漢舊儀與諸王處帝友愛至厚殿中設五幄丨丨丨丨號五王帳鄭處誨明皇雜録帳流蘇丨丨者乃盤線繪繡之毬五色錯為之同心而下垂者也海録覆斗斗帳小帳也形如覆斗同上起飲項羽至垓下諸侯兵圍之數重漢軍四面皆楚歌項羽大驚曰漢皆已得楚乎夜丨丨帳中有美人名虞常幸從駿馬名騅常騎之項王悲歌忼􅁣自為詩曰力拔山兮氣葢世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌數闋美人和之史本紀嘗坐武帝丨丨武帳黯前奏事上不冠望見黯避帷中使人可其奏汲黯傳雜錯珍寳上以琉璃珠玊明月夜光丨丨天下丨丨為甲帳次為乙帳甲以居神乙以自居漢武故事壞為襦袴謝尚為江夏相都督始到官郡府以布四十疋為尚造烏布帳尚丨之以丨軍士丨丨晉本傳施絳紗帳馬融常坐髙堂丨丨丨丨前授生徒後列女樂弟子次以相傳鮮有入其室者給青縑帳漢尚書郎主作文書起草更直於建禮門臺丨丨丨白綾或以錦給丨帷茵褥卧内紫氣元載芸暉堂户牖内設紫綃帳得於南洞之中酋帥則鮫綃之類也輕疎而薄如旡所礙雖屬凝冬而風不能入盛暑則凉自至其色隠隠焉忽不知其為帳也謂卧丨丨丨唐杜陽編堂中連珠唐同昌公主丨丨設丨丨之帳續真珠為之也不施幃帳楊貴妃妹虢國夫人素與國中亂頗為人知不取也毎入謁並驅道中從婢侍姆百餘騎姖宻如晝靚粧盈里丨丨丨丨時人謂之雄狐孔氏帖願得錦帳京師名娼嬌陳如姿藝俱美睦州尹一見來納焉陳如曰丨丨丨丨三十里乃可葢戯之也翌日載錦帳數十車張之陳大驚乃如前約紀聞譚入已帳中許侍郎顧司空俱作王丞相從事常夜在丞相所飲二人歡極丞相便使丨丨丨丨眠顧至曉猶展轉不得熟寐許上牀便大鼾丞相語謂客曰此中亦是難眠處耳郭子銷金帳下見茶門幬傭債作黄昌夏多蚊貧旡幬丨丨為丨幬後漢書糊紙補羊續為廬江大守卧一幅布幬幬穿敗丨丨丨之司馬卿賦颷風廻而赴閨兮舉帷幄之襜襜稽叔夜詩閑夜肅清朗月照軒微風動桂組帳髙褰孔德璋移文蕙帳空兮夜鶴怨程㤗之百子帳詩話唐人昏禮多用百子帳特貴其名與昏冝而其制度則非有子孫衆多之義葢其制本出戎虜特穹廬拂廬之具體而㣲者耳棬柳為圏以相連鎻百張百闔為其圈之多也故以百子總之亦非其有百圏也其弛張旣成大抵如今尖頂圓亭子而用青氊通冐四隅上下便於移置耳白樂天有青氊帳詩其䂓模可考也其詩始曰合聚千羊毳施帳百子弮骨盤邊柳健色染塞藍鮮其下注文自引史記張空弮為證即是以柳為圏而青氊冐之也又曰此制因戎却南移逐虜遷是制出戎虜也有鼎中央聳旡隅四向圓是頂聳旁圓也旣曰影孤明月夜又曰也冝霜後地則是以之弛張移置於月於霜隨處皆可又曰側置低歌坐平鋪小舞筵則其中亦差寛矣旣曰銀囊帶火懸又曰獸炭休親近則是其間不設燎爐但用銀囊貯火虚懸其中也又曰蕙帳徒招隠茅庵浪作禪其所稱比但言蕙帳茅庵而不正比穹廬知其制出穹廬也樂天詩最為平易至其鋪叙物制如有韻之記豈世之徒綴聲韻者所能希哉演繁露幃賜以幃後漢桓榮常寢疾太子丨丨丨帳奴婢曰如有不諱無憂家室本傳便下幃謝安夫人劉氏幃諸婢使在前作伎太傅暫見丨丨丨太傅索更開夫人云恐傷盛德飾金玉郭孝恪云在軍牀幃多丨丨丨孔氏帖幨幨帷交質任昉為御史中丞彈劉整云不能折劵鐘庾而丨丨丨丨言整姪自整求米整要幨帷交質整毎詣臺訟之梁本史障絲歩障石崇與貴戚王愷羊琇之徒以奢靡相尚愷作紫丨布丨丨四十里崇作錦歩障五十里以敵之本傳錦歩障見上綾歩障謝道韞為王凝之妻凝之弟獻之嘗與賔客談論詞理將屈道韞遣婢白獻之欲為小郎解圍乃施青丨丨丨自蔽申獻之前議客不能屈列女傳金雞障安禄山帝登勤政樓幄坐之左置丨丨大丨列屛障太宗以魏徴所上疏丨為丨丨庶朝夕見之青絲障見蠅注詳幔天雨不張丨丨丨丨幔蓋六韜賊火以掩後漢岑彭圍隗囂壅容以縑幔盛土為隄灌城軍令曰戰時皆取船上布幔漬水中丨有丨樞火箭丨丨滅之隔幔坐妓梁柳惔甚重其婦頗成畏憚性愛音樂女妓精麗略不敢視僕射張稷與惔狎而為惔妻賞敬稷詣惔先相問夫人惔毎欲見妓嘗因稷請奏樂其妻丨丨丨丨然後出惔因得留目隔幔受業韋逞母宋氏傳父業得周官義㫖乃就宋家立講堂書生百餘人丨絳紗丨丨丨焉覆以油幔馬璘治第京師侈甚其寢堂無慮費錢二十萬緡方璘在軍守者丨丨丨丨蔽以帷幔周世宗宣懿皇后符氏初適李守貞子崇訓手自殺其家人次以及后后走匿以帷幔自丨虞世南秋賦褰輕綃之碧幔云云幰通幰隋制輦而不施輪丨丨朱綏全飾以金玉杜佑通典青幰親王及武職一品有象輅青油纁朱裏通幰朱絲絡網二品三品有革輅朱裏青通幰四品有木輅五品有軺車皆碧裏青偏幰象飾朱班輪八鸞左建旂畫升龍右載闒㦸革輅木輅左建􅎶軺車曲璧碧裏丨通幰唐車服志詩集明月照丨丨何皎皎丨我羅牀幃古詩微風飄丨丨吹閨闥羅帷自丨揚選鑒明月薄帷丨丨丨阮籍講殿闢丨丨丨書帷杜夔府書懷幕繡幕丨丨後擁春風香瓊奴歌緑幕黄簾丨丨朱户閑風露氣入秋堂凉韓圍春風羅幃繡幕丨丨丨李白幄華容溢丨丨丨翠幄陸士龍宻葉成丨丨丨翠幄選帳羅元冕帳殿丨丨丨杜射虜營玉帳分弓丨丨丨同上度春宵芙蓉帳暖丨丨丨白樂天長恨歌弄喔咿武帳丨丨丨杜牧杜秋娘詩延秋月羅帳丨丨丨劉休文叨陪坐丨丨錦帳丨杜號寒卧冬暖丨丨丨無帳坡詩紙帳亂紋龜殻丨丨丨丨細相連慣卧青綾恐未便潔似僧中白㲲布暖於蠻帳紫茸氊錦衾速卷持還客破屋那愁仰見天但恐嬌兒還惡卧夜深裂踏不成眠坡幃金鴨冷深幃丨丨丨李賀神女廟春寒出銀盃同色試一傾排遣丨丨丨幃帳山谷幛鴛鴦繡帶碧玉為竿丁字成丨丨丨丨短長縈强遮天上花顔色不隔雲中笑語聲陸暢行幛金爐氣幸得與珠綴羃䍥君之楹月映不辭卷風來輒自輕每聚丨丨丨時駐玉琴聲王融詠幔繡沓褰丨丨丨長幔李白雨淋幔簷丨亂丨丨風捲幔天清丨丨丨並杜深金屏重重翠幔丨丨丨韓古今合璧事類備要外集卷四十九
