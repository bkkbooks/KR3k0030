杜牧黄花九日無歡可得追飄然隨意立山陂蒋陵西曲風煙慘也有丨丨三兩枝王介甫十道志齊武帝九日燕羣臣於蔣陵岡我醉欲眠卿罷休已教從事到青州鬢霜饒我三千文詩律輸君一百籌聞道郎君閉東閣且容老子卧南樓相逢不用忙歸去明日丨丨蝶也愁東坡次王鞏韻白酒木落霜洲溪水清登臨滿目是飄零黄花有意憐幽獨丨丨無聊漫醉醒牢愁錯倚西風立楚些巴歈不可聽李漢老白衣九日東籬採菊英丨丨遙見眼能明向今自有盃中物一段風流可得成韓子蒼烏㡌一見黄花只自羞蕭然短髮不禁秋誰人為整丨紗丨獨倚西風滿眼愁張芸叟濁酒獨掩衡門秋景閑洛陽才子訪柴闗莫嫌丨丨君須醉雖是貧家菊也斑同人願得長携手久客深思一破顔却笑孟嘉吹落㡌登髙何必上龍山九日賈明甫見訪戎昱作香醪小驛丨丨嫩重巖細菊斑遥知簇鞍馬囘首白雲間杜詩傳盃舊曰重陽日丨丨不放盃即今蓬鬢改但愧菊花開北闕心長戀西江首獨迴茱萸賜朝士難得一枝来杜甫落㡌初九未成旬重陽即此辰登髙間古事訪戴遇幽人丨丨恣歡飲授衣同試新茱萸正可佩折取寄情親孟浩然横汾菊盞茱囊自古傳長房寕復是臞仙應從宋武丨丨日數到劉公戯馬年東坡泛酒可訝東籬菊能知節候芳細枝青玉潤繁葉碎金香爽氣浮朝露濃姿帶夜霜丨盃傳壽丨應共樂時康黄宣應制詠菊花獨坐豈有白衣来剝啄亦從烏帽自欹斜真成丨丨空搔首門外蕭蕭噪暮鴉程致逺他鄉幾向丨丨逢九日不須把酒已霑巾眼前景物年年異只有茱萸似故人約齋避地逢佳節窮愁强不知十年猶亂過九日又奚為况借他蝸舍兼無自菊籬登髙轉惆悵囘首也風吹裴説客中重陽阻雨滿懐黄菊籬邊折兩架茱萸鏡裏開落帽臺前風雨隔不知何處醉金盃魚元機悲秋年年㸔見菊花開十度丨丨上楚臺半嶺殘陽銜樹落一行新鴈向人来行人永絶㐮陽夢野水偏傷宋玉才絲管闌珊歸客盡黄昏獨自詠詩囘李羣玉明朝九日丨丨是相邀舊俗非老翁難早出賢客幸知歸舊採黄花賸新梳白髮㣲謾㸔年少樂忍淚已沾衣杜甫九日集于林閏月黄花叢發緑樽前猶有眥眥舊管弦偶遇丨秋重九丨東籬獨酌一陶然自從九日持齋戒不醉重陽十五年閏月九日獨酌龍山客指㸃雲間數㸃紅笙歌正擁紫髯翁誰知愛酒丨丨丨却在漁舟一葉中東坡九日望見有美堂上魯少卿飲以詩戯之淮海士九日清尊欺白髮十年為客負黄花丨丨少年天下丨可能無事落烏紗后山題令狐㕔李義山乃令狐楚故吏楚子綯繼相殊不展分重陽日義山詣綯㕔事題云曾共山翁把酒巵霜天白菊正離披十年泉下無消息九日樽前有所思莫學漢臣裁苜蓿還同楚客詠江籬郎君官重施行馬東閣無由得再窺綯乃閉此㕔終身不處北忩瑣言寄崔侍御李白集聞九日崔侍御遊敬亭余時登響山不同此醉後寄崔詩有云九日茱萸熟挿鬢傷早白登髙望山海滿目悲古昔本集桑苧煎茶僧皎然九日與陸羽煎茶羽號桑苧翁坡詩云明年丨丨丨丨處憶著衰翁首重囘布衣與宴韓忠獻嘗遇重陽置酒私第惟歐文忠與一二執政而蘇明允乃以布衣參其問都人以為異禮席間賦詩明允有佳節屢從愁裏過壯心還倚醉中来之句其志氣不少衰詩用餻字劉夢得作九日丨欲丨丨丨以五經中無之輟不復為宋子京以為不然故子京九日食餻有詩云飇館輕霜拂曙袍糗餈花飲鬬分曹劉郎不敢題糕字空負詩中一世豪遂為古今絶唱糗餌粉餈糕類也周禮籩人羞籩之實糗餌粉餈注曰糗餌者豆末屑蒸之以棗豆之味今餌䭔也方言餌謂之糕或謂之餈聞見後錄用茱萸字劉夢得云詩中丨丨丨丨者凡三人杜甫云醉把茱萸子細㸔王維云挿遍茱萸少一人朱放云學他年少挿茱萸三君所用杜為優予觀唐人用七言者又十餘家漫録于後王昌齡茱萸挿鬢花宜壽戴叔倫挿鬢茱萸米未盡盧綸茱萸一朶映華簪權德輿酒泛茱萸晚易醺白居易舞鬟擺落茱萸房茱萸色淺未經霜楊衡强挿茱萸隨衆人張諤茱萸凡作幾年新耿緯髮希那敢挿茱萸劉商郵筒不敢獻茱萸崔魯茱萸冷吹溪口香周賀茱萸城裏一尊前比之杜句俱不侔矣容齋隨筆用落帽事孟嘉落帽前世以為勝絶杜子美九日詩云羞将短髮還吹帽笑倩傍人為正冠其文雅矌逹不減昔人故謂詩非力學可致正須胷中度世柯三山老人語録云自来九日多丨丨丨丨獨東坡南子詞云破帽多情却戀頭乃反之尤為竒特杜詩不眠瞻白兔百過落烏紗故東坡以閏九月題披雲樓詩云九日再逢堪一笑終朝百過更深憂謂短髮不堪落帽也后山詩話十月重陽東坡云嶺南氣候不常菊花開時即重陽凉天佳月即中秋不須以日月為斷也丨丨初吉菊始開乃與客作丨丨因次和陶九月九日詩今日我重九誰謂秋冬交黄花與我期草中實後凋香餘白露乾色映青松髙志林滿城風雨謝無逸溪堂集云亡友潘邠老有丨丨丨丨近重陽之句今去重陽四日而風雨大作遂用邠老之句廣為三絶滿城風雨近重陽無奈黄花惱意香雪浪翻天迷赤壁令人西望憶潘郎滿城風雨近重陽不見修文地下郎想得武昌門外柳垂垂老葉半青黄滿城風雨近重陽安得斯人共一觴欲問小馮今健否雲中孤鴈不成行重陽日雨丨丨丨常有疎風冷丨康伯可在翰苑日嘗重九遇雨奉勑撰詞伯可口占望江南一闋進云重陽日隂雨四垂垂戯馬臺前泥拍肚龍山㑹上水平臍直浸到東籬茱萸膀菊蘂濕滋滋音齎落㡌孟嘉尋篛笠休官陶今覔簔衣兩箇一身泥荆楚嵗時記古今合璧事類備要前集卷十七
