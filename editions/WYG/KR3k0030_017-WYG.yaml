body:
  text: 古今合璧事類備要前集卷十七宋謝維新撰節序門立秋事類迎西郊先立秋三日太史謁之天子曰某日立秋盛德在金天子親帥三公九卿諸侯大夫以丨秋於丨丨月令祭白帝丨丨丨蓐收車旗服飾皆白後漢郊祀志舞雲翹先立秋郊黄帝立秋迎氣西郊樂奏黄鍾之宮歌西皓丨丨丨育命所以養時訓也後禮儀志戴楸葉京師立秋滿街賣楸葉婦女兒童皆剪成花様戴之形製不一夢華錄取姦惡漢孫寶為京兆尹以立秋日署侯文為東都督郵入見勅曰今日鷹隼始擊當從天氣丨丨丨以成嚴霜之誅又裴德容制漢家授御史多於立秋日盖以風霜已嚴鷹隼初擊出本傳習戰陣立秋日丨丨丨之儀名曰貙劉後禮儀志詩集草衰始驚三伏盡又遇立秋時露綵朝還冷雲峯晚更竒隴香禾半熟原迥丨㣲丨幸好清光裏安仁謾起悲僧齊已蓮謝律變新秋至蕭條自此初花酣丨報丨葉在柳成疎淡日非雲映清風似雨餘卷帷凉暗度迎扇暑先除草盡多翻燕波澄下露魚今朝散騎省作賦興何如司空曙槐疎蟬噪古丨丨葉下樹銜斜日映孤城欲知潘鬢愁多少一夜新添白數莖王叡七夕事類曝衣太液池西有漢武帝丨丨樓七月七夕宮女出后衣曝之穿針齊武帝起層城觀七月七日宮人多登之丨丨世謂之丨丨樓輿地志洒淚雨七月六日有雨謂之洗車雨七日雨則云丨丨丨嵗時雜記明星酒洛陽人家乞巧使蜘蛛結卍字造丨丨丨裝同心膾金門嵗節開襟樓漢綵女七夕皆穿針於丨丨丨西京雜記百子池漢宫七夕臨丨丨丨以五縷相羈謂之相連愛廣記曝犢鼻褌阮咸字仲容籍兄子也諸阮前世皆儒學内足於財唯咸一生尚道棄事好酒而貧舊俗七月七日法當曬衣諸阮庭中爛然莫非綈錦咸時總角乃豎長竿標大布犢鼻曝於庭中曰未能免俗聊復爾耳竹林七賢論曬腹中書郝隆七月七日見鄰人皆曝曬衣物隆乃仰卧曝腹於庭曰我丨丨丨丨綵樓穿針唐天寶宫中七夕以錦綵結成樓殿髙百丈可容數十人陳花果酒炙設坐具以祀牛女二星嬪妃各執九孔針五色線向月穿之過者為得巧動清商之曲宴樂達旦士民皆效之天寳遺事蛛絲占巧開元中帝與妃子每至七夕夜在華清宮宴時宫女各以蜘蛛内之小金盒子中至曉開視蛛絲稀宻以為得巧之多少民間效焉開元遺事七夕婦人結綵樓穿七孔針以金銀鍮石為針陳𤓰果於庭中以乞巧有喜子輞於𤓰上則以為得巧荆楚嵗時記織女渡河成武丁有仙道謂其弟曰七月七日丨丨當丨丨暫詣牽牛世人至今謂織女嫁牽牛夫者是也續齊諧記烏鵲填河而渡織女淮南子天河之西有星煌煌與参俱出謂之牽牛天河之東有星㣲㣲在氐之下謂之織女焦林大斗記織女犬女孫也史記天官書河鼔謂之牽牛爾雅黄姑即河鼔也嵗時記牽牛星荆州呼為河鼓主關梁織女星則主𤓰果嘗見道書云牽牛娶織女取天帝二萬錢下禮久不還被驅在營室荆楚嵗時記天官考福七月七日為慶生中會此日地官三宮九府四十二曹同會丨水二丨六宮十八府七十八曹同丨罪丨又為道德臘五帝校定生人骨髓枯盛學業文籍名宦隆益其日可謝罪請並神氣沐浴先亡道書西王母来七月七日漢武帝於承華殿齋正中有一青鳥從西方来集殿前上問東方朔曰丨丨丨欲丨有頃王母至有二青鳥侍旁帝與朔於朱雀忩中窺王母時母以桃七枚獻帝帝欲留核種之王母笑曰此桃一千年生花一千年結實指方朔曰此兒三偷桃矣帝内傳王方平降仙人丨逺字丨丨位為總真真人七月七日偶丨蔡經家威儀如大将軍持玉壺十二皆以蠟封遣人招麻姑麻姑至指爪長數寸經見之意可以爬癢忽有鐵鞭鞭經背有陳縣尉聞經家有神人乞見逺曰君心邪未可以教仙道以一符與陳可以存本壽陳後一百二十嵗而死神仙傳王喬乗鶴丨子丨周靈王太子晉也好吹笙作鳯鳴遊伊洛間道士浮丘公接上嵩山三十餘年後来於山上告桓良曰告我家七月七日待我緱氏山至日果丨白丨駐山巔望之不得到舉手謝時人而去列仙傳安公騎龍陶丨丨時諺曰安公安公與天通七月七日迎女以赤龍至時安公丨赤丨而去後隱列仙傳楊妃私語唐𤣥宗與楊貴妃避暑驪山宮七日牛女相見之夕夜半妃獨侍上上凭肩宻相誓心願世世為夫婦内傳竇后神光丨丨少小頭秃不為家人所齒遇七夕日人皆看織女獨不許出乃有丨丨照室為后瑞后傳子儀祈壽郭子儀至銀州夜見左右皆赤光仰視空中駢車繡幄中有一美女自天而下子儀拜祝云今七月七日必是織女降臨願賜長壽富貴女笑曰大富貴亦壽考言訖冉冉升天子儀後立功貴盛年九十餘薨感遇集宗元乞巧柳子厚夜歸自外庭有設祠者饗餌馨香蔬果交羅挿竹垂綏剖爪犬牙且拜且祈怪而問焉女𨽻進曰今兹秋孟七夕天女之孫将嬪於河鼔邀而祠者幸而與之巧驅去蹇拙手目開利組紉縫製將無滯於心焉為是禱也柳子曰茍然歟吾亦有所大拙儻可因是以求去之乃再拜稽首稱臣而進曰下土之臣竊聞天孫專巧於天轇轕璇璣經緯星辰能成文章黼黻帝躬以臨下民欽聖靈仰光曜之日久矣今聞天孫不樂其獨得真卜於元龜将蹈石梁欵天津儷于神夫于漢之濱兩旗開張中星耀芒靈氣翕歘兹辰之良幸而弭節薄遊民間臨臣之庭曲聽臣言本傳真如獲寶唐開元中有李氏為尼號曰真如天寶七年七月七日忽見五色雲墜地一囊中有五物乃寶玉也肅宗元年真如為神人召徃化成見天帝授以八寳俾獻于朝真如乃併前五物皆獻之唐寳記蔡氏得梭蔡州丨丨每七夕禱以酒果忽見流星墜筵中明日𤓰上丨金丨自是巧思益進祕閣閑話贈七寶枕郭翰少有清標乗月卧庭中視空中有人冉冉而下乃一少女明艷絶代曰吾天之織女也上帝賜命遊人間願乞神契乃升堂共枕欲曉辭去後夜復来翰戯之曰牽牛郎何在那敢獨行對曰隂陽變化關渠何事至七夕忽不来數夜方至翰問曰相見樂乎笑曰天上那比人問問曰迎来何遲曰人中五日彼一夕爾忽一夜悽惻流涕曰帝命有期便當永訣以七寶枕留贈而去墨荘冗錄然九華燈王美人七月七日生武帝於猗蘭殿王母謂帝曰七月七日我當来帝至日丨丨丨丨又武帝七月七日掃除宮掖之内張雲錦之帷然九光㣲燈漢武内傳四民月令七月初七其夜洒掃於庭露施几筵設酒脯時菓散香粉於河鼔織女二星神當會守夜者咸懐私願或云見天漢中有奕奕正白氣有光曜五色以此為徵應見者便拜而願乞富乞壽無子乞子唯得乞一不得兼求三年乃言之崔寔云京師舊俗京師七月七夕城市悉以雕木綵裝欄坐或用紅碧紗籠或飾以金珠牙翠有一對直數千者禁中及貴家與士庶為時物追陪又以黄蠟做為鳬鴈鴛鴦鸂鶒龜魚之類綵畫金縷謂之水上浮又以小板上傅土旋種粟今生其苗置小茒屋花木作田舍家小人物皆村落之態謂之穀板又以𤓰雕刻成花樣謂之花𤓰又以油麵糖蜜造為笑黶兒謂之果食花樣竒巧百端如㮏香方勝之類若買一斤數内有一對被介胄者如門神之像盖自来風俗不知其説謂之果食将軍又以录豆小豆小麥於磁器内以水浸之生牙數寸以紅藍絲縷束之謂之種生皆以街心綵幕帳設貨賣至初六初七晚貴家多結綵樓於庭謂之乞巧樓鋪陳磨喝樂花𤓰酒炙筆研針線或兒童裁詩女郎呈巧焚香列拜謂之乞巧婦女望月穿針或以小蜘蛛在合子内次日㸔之若網圓正謂之得巧里巷與妓館徃徃列之門首爭以侈靡相尚磨喝樂本佛經摩侯羅今通俗而書之夢華録詩集河漢八月涼風天氣晶萬里無雲丨丨明昏見南樓清且淺曉落西山縱復横洛陽城闕天中起長河夜夜千門裏複道連甍共蔽虧畫堂瓊戸特相宜雲母帳前初汎濫水精簾外轉逶迤倬彼昭囘如練白復出東城接南陌南北征人去不歸誰家今夜𢷬寒衣鴛鴦機上疎螢度烏鵲橋邊一鴈飛鴈飛雲度秋難歇坐見明河漸㣲沒已能舒卷任浮雲不惜光輝讓流月明河可望不可親願得乗槎一問津更将織女支機石還訪成都賣卜人宋之問明河篇牛女牽丨出河西織丨處其東萬古永相望七夕誰見同神光意難候此事終朦朧颯然精靈合何必秋遂通亭亭新粧立龍駕具層空世人亦為爾祈請走兒童稱家隨豐儉白屋達公宫膳夫翊堂殿鳴玉淒房櫳曝衣徧天下曳月揚㣲風蛛絲小人態曲綴𤓰菓中初筵浥重露日出甘所終嗟汝未嫁女秉心鬰冲冲防身動如律竭力機杼中雖無舅姑事敢昧織作功明明君臣契咫尺或未容義無棄禮法恩始夫婦恭小大有佳期戒之在至公方圓茍齟齬丈夫多英雄杜甫人間一葉梧桐飄蓐收行秋囘斗杓靈官召集役靈鵲直渡銀河横作橋河邊女兒天帝子機杼年年勞玉指織成雲霧紫綃衣辛苦無歡容不理帝怜獨居無與娱河西嫁與牽牛夫自從嫁後廢織絍緑鬢雲鬟朝暮梳貪歡不歸天帝怒謫歸却踏来時路但令一嵗一相見七月七日橋邊渡别多會少知柰何却憶從前歡愛多怱怱萬事説不盡燭龍已駕隨羲和河邊靈官催曉發今嚴不管輕離别空将淚作雨滂沲淚痕有盡愁无歇寄言織女君休怨地久天長會相見猶勝嫦娥不嫁人夜夜孤眠廣寒殿張文潛七夕歌迢迢牽牛星皎皎河漢女纎纎擢素手札札弄機杼終日不成章涕泣零如兩河漢清且淺相去距幾許盈盈一水間脉脉不得語古樂府靈匹寳婺揺珠佩嫦娥照玉輪丨歸天上丨巧遺世間人花果香千戸笙竽溢四鄰明朝晒犢鼻方信阮郎貧李義山神光古来傳織女七夕渡明河巧意世爭乞丨丨誰見遇隔年期已拙舊俗騐方訛五色金盤菓蜘蛛浪作窠梅聖俞佳期恐是仙家好别離故教迢逓作丨丨由来碧落銀河畔可要金風玉露時清漏漸移相望久㣲雲未接過来遲豈能無意酬烏鵲唯有蜘蛛乞巧絲李義山仙會翠幙瑶梯百尺樓樓前星斗自悠悠天家丨丨能多少未到平明已别愁范蜀公龍駕河邊獨自對星宿夜織天絲難接續抛梭振躡動明璫為有秋期眠不足遥愁今夜河水隔丨丨車轅鵲填石流蘓翠帳星渚間環珮無聲燈寂寂畫作天河刻作牛玉梭金鑷綵橋頭每年宮女穿針夜勅賜諸親乞巧樓王建宫詞鵲橋鸞扇斜分鳳幄開星橋横道鵲飛迴爭将世上無期别換得年年一度来李商隱雲幙无波斗柄移丨慵烏慢得丨遲若教精衛填河漢一水還應有盡時晏叔原龍梭鳳律驚秋氣丨丨靜夜機星橋百枝動雲路七香飛映月迴雕扇凌霞曳綺衣含情向華幄流態入重闈歡餘夕漏盡怨結曉驂歸誰念分河漢還憶雨心違張文恭鳳駕仙車駐七襄丨丨出天潢月映九㣲火風吹百和香何遜香車已駕七丨丨心心待曉霞風輕唯響佩日暮不嫣花桂嫩傳香逺榆髙送影斜成都過卜肆會是識靈槎李義山盈盈一水不斯須經嵗相過自作疎豈待翔禽報佳會徑須飛過洗丨丨后山靈駕落日隠簷楹升月照簾櫳團團滿葉露淅淅振條風蹀足循廣除瞬目瞻層穹雲漢有靈匹彌年闕相從遐川阻昵愛修渚曠清容弄杼不成藻聳轡驚前蹤昔離秋已雨今聚夕無雙傾河易迴斡歡顔難九悰沃若丨丨旋寂寥雲幄空留情顧華寢遥心逐奔龍謝惠連六幕丨丨西囘斗轉車鮮雲㸃綴玉鈎斜天孫已渡黄姑渚阿母還来漢帝家楊大年七襄白露含明月青雲斷絳河天街丨丨轉闗道二神過袨服鏘環佩香筵拂綺羅年年今夜盡機杼别情多杜審言月帳丨丨星河次第開雨情惟恐曙光催時人不用穿針待沒得心情送巧未羅隱雲階丨丨月地一相過未抵今年别恨多最恨明朝洗車雨不教囘却渡天河杜牧玉殿丨丨凭肩共語時風清月墜有誰知梧桐秋雨三山逺始