body:
  text: 古今合璧事類備要别集卷二十一宋謝維新撰苑囿門園圃附藩籬園林紀勝園圃所以毓草木也果𤓰給焉蔬茹供焉材木需焉其利多矣然不種則不生不殖則不蕃人力之不至則地産之不豐也故植木於園則梗楠豫章有以資吾之梁棟蒔菜於圃則韮菘葵菊有以充吾之盤飱其利果不為不多也否則荒蕪矣而欠鉏治旱暵矣而闕澆灌而欲於此求美木與嘉毓豈有是理哉是則老圃之事也若樊遲請學為圃吾夫子之所深誚法真隠大澤講論藝術歴年而不窺園作史者以為美談此又名教中自有樂地而所得又豈止一草一木之細而已哉彼區區種藝之功姑舍是事類賁邱束帛戔戔丨于丨園易卦名築場九月丨丨圃詩七月有桃園丨丨其實之殽詩折柳丨丨樊圃狂夫瞿瞿詩毓草木以九職任萬民云云二曰園圃丨丨丨注植果蓏曰圃園其樊禮天官植果菜園丨丨圃植菜説文乗田吏孔子嘗為丨丨丨注苑囿之吏孟子漆園吏莊周為丨丨丨史記園庾居丨丨丨園中世謂之丨公陳留志列子居丨丨丨園圃四十年人無識者莊天瑞篇樊遲學丨丨請丨為圃曰吾不如老圃語仲子灌於陵丨丨辭卿相而桔橰丨園白帖丈人鑿隧子貢過漢隂見一丈人為圃畦丨丨而入井抱甕而出灌用力甚多而見功寡子貢曰有械於此一日浸百畦夫子不欲乎丈人曰奈何曰鑿木為機後重前輕挈水若抽數若沃湯其名桔橰為圃者忿然作色而笑曰有機械者必有機事有機事者必有機心道之所不載也吾非不知羞而不為也子貢恧然而慙曰始吾以夫子天下一人耳不知復有此人也莊天地篇儀休㧞葵公丨丨相魯丨園丨不與人爭利白帖襄公鸞鑣駟鐵美丨丨也始命有田狩之事園囿之樂焉云云遊於北園四馬既閑遊車丨丨載獫歇驕詩衞侯虎幄丨丨為丨丨於籍圃求令名者而始食焉太子請使良夫乗衷甸兩牡紫衣狐裘至袒裘不釋劒而食太子使牽以退數之以三罪而殺之左哀十二年終歳不飽魯漆室之女曰昔有客繫馬園中馬逸踐葵使予丨丨丨丨葵三年不窺董仲舒下帷發憤丨丨丨丨園圃漢本傳自相免歸戴宏為河間相自免歸而灌蔬以經教授使吏鉏治魏顔斐文材為京兆守於府下起菜園丨丨投間丨丨之圃則有蒟其丨丨丨丨蒻茱茰𤓰疇芋區甘蔗辛薑陽萃隂敷日徃菲㣲月来扶疎任上所麗衆獻而儲左三都賦圃樊以蒩丨丨丨丨注樊藩也詩曰營營青蠅止於樊蒩草名亦名土茄葉覆地而生根可食人饑則以繼糧同上鉏園得金成帝時沛國戴異丨丨丨黄丨印後漢史鋤園擲金管寧華歆園中丨菜見地有片金管揮鋤與瓦石不異華捉而擲之世説取含消梨御宿園大梨如五勝落地則破其丨梨先以布囊承之號曰丨丨此園丨也三秦記聞蝦蟇聲晉惠帟在華林園丨丨丨丨曰鳴者為官乎為私乎晉書乗輿入園晉王獻之髙邁不羈雖閒居終日不怠容止風流為一時之冠嘗經吳郡聞顧辟彊有名園先不相識丨平肩丨徑入時辟彊方會賔友獻之游歴既畢傍若無人辟彊勃然數之曰傲主人非禮也以貴驕士非道也失其二者不足齒之傖耳便驅出門獻之傲如也不以屑意翻車灌園魏馬鈞巧宦絶世居京都有地可以為園而無水以灌乃作丨丨丨令兒童轉之而丨水自覆更出更入巧倍於常種菜供啖栁元景為尚書令南岸有數十畝菜園守園人賣菜得錢三萬送宅元景曰我立此園丨丨以丨家中丨耳乃復賣以取錢奪百姓之利耶以錢乞守園者宋書盗笋不問齊范元琰家貧以園蔬為業見人盗其崧元琰遽走欲起其媿恥或有渉溝丨其丨者元琰伐木為橋以渡之盗者大慙茂林衆果余以元康六年從太僕卿出為使持節監青徐軍事征虜將軍有别廬在河陽縣界金谷澗中或髙或下有清泉丨丨丨丨竹柏藥草之屬莫不畢備又有水碓魚池土窟其為娛目歡心之物備矣崇金谷詩序竒花異草賛皇公平泉莊周廻十里建堂榭百餘所今基砋猶存天下丨丨丨丨珍松怪石靡不畢致其閒故徳裕自製平泉草木記今悉蕪絶唯鴈翅檜珠子柏蓮傍玉藻等葢僅存之怪石名品甚衆多為洛城有力者取去唯禮星石及師子石今為陶學士徙置梨園别墅賈氏談録元圃梨頌晉太康中梨西枝與東枝合生於丨丨園中皇太子令侍臣作頌緱圃𤓰獻四月帝憶𤓰明崇儼索百錢湏㬰以𤓰獻曰得之丨氏丨中延平林園李晟賜丨丨門丨丨奉誠亭觀馬燧子丨終少府監諸子無室廬自託丨丨園丨丨即其安邑里舊第並孔帖漢陽遺業唐韋臯遷山南節度使張柬之有園圃在襄陽皇晏集將市取之馬彜曰丨丨有中興功今丨丨當百世共保奈何使其子孫鬻乎皐謝曰主吏失詞以為君羞微君安得聞此言帝城勝景芙蓉在京羅城東南隅有青林重複緑城瀰漫葢丨丨丨丨駕時幸之景龍文舘記豈獨平泉石五代張全義唐莊宗時為太師尚書令兼四鎮莭度使監軍得李徳裕平泉莊醒酒石徳裕孫延古託全義復求之監軍忿然曰自黄巢亂後洛陽園宅無復能守丨丨丨丨一丨哉全義嘗在賊亂中以為譏己大怒笞殺之本傳不受園丁錢温公營獨樂園園子吕直性愚公以直名之春時人遊園子得茶湯錢十千閉園日與主人分之一日来納公公曰此自汝錢可持去再三欲留公怒遂持之顧曰只端明不受錢者後十許日公見園中新創一井亭問之乃前丨丨十千所創也元城語録藩籬羊觸羝丨丨藩羸其角易大壯蠅營丨丨青丨止于樊毛詩雉蓄澤丨十歩一啄百歩一飲不蘄丨乎樊中神雖王不善也莊飬生篇枳樹芳丨丨籬注馮衍顯志賦犍六枳而為籬丨果丨以為藩籬潘閒居賦棘扈姜晦除吏部侍郎主選舊吏嘗請託為奸前領選者周丨丨藩檢窒内外猶不禁至晦悉除之示無防限孔六帖壓藩楊收吳人號神童里人多造門觀賦詩至盿丨其丨收嘲之曰爾非羸角者奚角觸吾藩孔帖植籬庾衮與弟子丨丨跪而授條曰幽顯異操非君子意晉書陶淵明歸去来辭歸去来兮田園將蕪胡不歸詳見前還歸門李徳裕平泉莊記經始平泉追先志也吾随侍先大師忠公在外十四年上會稽探禹穴歴楚澤登巫山遊沅湘望衡嶠忠公每維舟清眺意有所感必悽然遐想屬在伊川嘗賦詩曰龍門南嶽盡伊原草樹人煙目所存正是此州梨棗熟夢魂秋日到郊園吾心感是詩有退居伊洛之志為前守金陵於龍門得喬處士故居天寳末避地逺遊遂荒榛首陽微岑尚有薇蕨山陽舊徑唯餘竹木吾乃剪荆棘驅狐狸如立班生之宅漸成應叟之地又得江南珍木竒石列於庭際平生素懐於此足矣吾嘗以為出處者貴得其道進退者貴不夫時古来賢逹多有遺恨至於𤣥相潜身於柱史柳惠飬徳於士師漢代邴曼容官不過六百石終無辱殆邈難及矣越蠡激文牛以肥遯留侯託黄老以辭世亦其次馬范雎感蔡澤一言超然髙謝鄧禹見功臣多敗委逺名勢又其次也矧如吾者於葵無衛足之智處鴈有不鳴之患雖有泉石杳無歸期留此林居貽厥後代鬻平泉者非吾子孫也以平泉一樹一石與人者非佳子弟也吾百年之後為權勢所奪則以先人所命泣而告之此吾志也詩曰維桑與梓必恭敬止言祖父所植也昔周人之思召伯愛其所憇之樹近代薛令君於禁省中見先祖所據之石必泫然流涕汝曹可不慕之唯岸為谷谷為陵然後已焉可也五代張全義唐莊宗時為太師尚書令兼四鎮節度有監軍嘗得李徳裕平泉醒酒石徳裕孫延古託全義復求之監軍忿然曰自黄巢亂後洛陽園宅無復能守豈獨平泉一石哉全義嘗在賊巢中以為譏己大怒笞殺之夲傳歐陽集古錄䟦云余讀鬼谷子書見其馳説諸侯之國必視其為人材性賢愚剛柔緩急而因其好惡喜怒憂樂而捭闔之陽開隂塞變化無窮顧天下諸侯無不在其術中者惟不見其所好者不可得而説也以此知君子宜慎其所好葢泊然無欲禍福不能動而利害不能誘此鬼谷之術不能為者聖賢之髙致也其次簡其所欲不溺於所好斯可矣若徳裕者處富貴招權利而好竒貪得之不已至或疲弊精神於草木斯其所以敗也其遺戒云壊一草一木者非吾子孫此又近乎愚矣柳宗元訾家亭記大凡以觀遊名於代者不過視於一方其或傍逹左右則以為特異至若不騖逺不臨危環山洄江四出如一夸竒競秀咸不相讓徧行天下者惟是得之桂州多靈山發地峭竪林立四野署之左曰灕水水之中曰訾氏之洲凡嶠南之山川逹於海上於是畢出而古今莫能知元和十二年御史中丞裘公来蒞茲邦都督二十七州諸軍州事盗遁姦革徳恵敷施朞年政成而當天子平淮夷定河朔告于諸侯公既施慶于下乃合僚史登兹以嬉觀望攸長悼前之遺於是厚貨居甿移于閒壤伐惡木刜奥草前指後盡心舒目行忽焉若飄浮上騰以臨雲氣萬山面内重江東隘聨嵐含輝旋視其宜常所未覩倐然互見以為飛舞奔走與遊者偕来乃經工庀材考極相方南為燕亭延宇垂阿歩簷更衣周若一舎北有崇軒以臨千里左浮飛閣右列閒館比舟為梁與波昇降苞灕山舎龍宫昔之所大蓄在亭内日出扶桑雲飛蒼梧海霞島霧来助游物其隙則抗月檻於廻谿出風榭於篁巾畫極其美又益以夜列星下布顥氣廻合邃然萬變若與安期羡門接於物外則凡名觀游於天下者有不屈伏退讓以推髙是亭者乎既成以燕歡極而賀咸曰昔之遺勝槩者必於深山窮谷人罕能至而好事者後得以為己功未有直治城挟闤闇車輿歩騎朝過夕視訖千百年莫或異顧一旦得之遂出於他邦雖博物辯口莫能舉其上者然則人之心目其果有遼絶特殊而不可至者耶葢非桂山之靈不足以瓌觀非是洲之曠不足以極視非公之鍳不能以獨得噫造物者之設是久矣而盡之於今余其可以無籍乎司馬公獨樂園記孟子曰獨樂樂不如與人樂樂與少樂樂不如與衆樂樂此王公大人之樂非貧賤者所及也孔子曰飯蔬食飲水曲肱而枕之樂亦在其中矣顔子一簞食一瓢飲不改其樂此聖賢之樂非愚者所及也若夫鷦鷯巢林不過一枝偃䑕飲河不過滿腹各盡其分而安之此乃迂叟之所樂也迂叟始家洛五年為園其中為堂聚書五千卷命之曰讀書堂云云迂叟平日多處堂中讀書上師聖人下友羣賢窺仁義之原探禮樂之緒自未始有形之前暨四逹無窮之外事物之理舉集目前所病者學之未至夫又何求於人何待於外哉志倦體疲則投竿取魚執祍采藥决渠灌花操斧䂨竹濯熱盥水臨髙縱目逍遥相徉惟意所適明月時至清風自来行無所牽止無所柅耳目肺腸悉為己有踽踽焉洋洋焉不知天壤之間復有何樂可以代此也因合而命之曰獨樂或咎迂叟曰吾聞君子所樂必予人共之今吾子獨取於己不以及人其可乎迂叟謝曰叟愚何得比君子自樂恐不足安能及人况叟之所樂者薄陋鄙野皆世之所棄也雖推以與人人且不取豈能强之乎必也有人肯同此樂則再拜而獻之矣安敢專之哉葉水心北村園記户部尚書吳興沈公園於城東奉勝門外而使告余曰北村畆餘三十中涵五池大半皆水也其為叢花茂木之䕃狹矣靈夀書院旁有空隙而移老堂廢屋地不過三楹而止其為崇閎䆳宇之居褊矣洲藏渚伏濠港限隔非舟不能通道相為市者皆魚蝦之友菱芡之朋而冠帶車馬之来絶矣併日却坐分夜獨宿艣回棹轉穿南北而透東西遺音款乃常在庭除而絲竹鼔鐘之奏息矣葢其陋若此也惟對湖䑓髙不逾丈其區前臨湖心逺峯明晦滅没近而後溪鳯凰毗弁諸山徃徃凑泊於溪山亭之下殆或天與者雖然是亦樵夫野人之所同有也若夫城中甲觀大囿照曜映奪曽不敢仰視而側立也吾聞古之善遊者精於天而不精於人今吾鹵莽而營之茍且而成之姑以置吾身於一壑之内而遊於天地之外非所謂粗耶故名其園曰自足而甲觀大囿照耀而映奪者非惟不敢望亦不敢羡焉余謂公冲約有清識既以天趣得真樂而又能挹損其言不自夸擅可謂賢矣余嘗評天下山水之美雖質文變態各異而吳興特為第一其山脉地絡融液而浸灌者莫非氣之至清渟止演漾澄瑩紺徹數百十里接以太湖蒲荷蘋蓼盛衰榮落無不有意而来鷗鳥焉風帆浪楫恣肆𣺌瀰不知其所窮昔之功已就若范蠡身不用若張志和之流未嘗不遁逸嘯歌於其間葢仙聖之宅非人世也余海濵之人山凡水俗常恨不得生長其地而尚友其賢豪沈公乃以築圃曲折名實大指使余記之豈非所願欲也哉楊誠齋帶經軒記楊子將闢軒於南溪之北涯其地甚肥而美可為畦以蔬而朝夕挾書於斯一日與客觀之且夸其地客曰美則美矣然今之人目辨紅紫者其心不能應答問之是非手捉方圓者其耳不能聴英莖之節奏子於此乎書則蕪子之蔬子於此乎蔬則蕪子之書又焉在於帶經而鋤余曰不然書者吾事蔬者所以寓吾意也早夜孜孜披閲古今非徒為是譊譊者而其志在乎堯舜禹湯文武之事業故謂之吾之事然既藏必遊息也由是寓志於韮菘葵菊之間而忘言於韮菘葵菊之外非意也乎雖事者本也意則末矣烏在乎其意也然學道自洒掃應對進退皆足入乎道雖末也無害其為本故説者謂君子不當忘乎意况畦而列之横斜有徑髙卑有陳則君子之宫庭壇宇也種植有時采掇有芳芬馨辛烈有類有族則君子之陳立經紀也灌之溉之由是得涵飬之術鋤之耰之由是得修慝之理如是則荷鋤而趦趄不害其為書帶經而囁嚅不害其為蔬吾豈若樊遲哉規規然專務為老圃之事而董仲舒不為窺園之勤彼二子者所謂楚失而齊亦未得也六一居士真州東園記真為州當東南之水會故為江淮兩浙荆湖發運使之治所龍圖閣學士施君正臣侍御史許君子春之為使也得監察御史裏行馬君仲塗為其判官三人者樂其相得之歡而因其暇日得州之監軍廢營以作東園而日徃遊焉秋八月子春以其職事走京師圖其所謂東園者来以示予曰園之廣百畝而流水横其前清池浸其右髙䑓起其北䑓吾望以拂雲之亭池吾俯以澄虚之閣水吾泛以畫舫之舟敞其中以為清讌之堂闢其後以為射賔之圃芙蕖芰荷之的歴幽蘭白芷之芬芳與夫佳花美木列植而交隂此前日之蒼煙白露而荆棘也髙甍巨桷水光日影動揺而上下其寛閒深靚可以荅逺響而生清風此前日之頽垣斷塹而荒墟也嘉時令節州人士女嘯歌管絃此前日之晦明風雨鼪鼯鳥獸之嘷音也吾於是信有力焉凡圖之所載葢其一二之畧也若乃升於髙以望江山之逺近嬉于水而逐魚鳥之浮沈其物象意趣登臨之樂覧者各自得焉凡工之所不能畫者吾亦不能言也其為我書其大槩焉又曰真天下之衝也四方之賔客徃来者吾與之共樂于此豈獨私吾三人者哉然而池䑓日益以新草樹日益以茂四方之士無日不来而吾三人者有時而皆去也豈不眷眷於是哉不為之記則後孰知其自吾三人者始也予以為三君子之材賢足以相濟而又協于其職知所後先使上下給足而東南六路之人無辛苦愁怨之聲然後休其餘閒又與四方之賢士大夫共樂于此是皆可嘉也乃為之書李濟南書洛陽名園記後洛陽處天下之中挾殽澠之阻當秦隴之襟喉而趙魏走集葢四方必爭之地也天下當無事則已有事則洛陽必先受兵余故嘗曰洛陽之盛衰者天下治亂之候也方唐貞觀開元之間公卿貴戚門館列第於東都號千有餘邸及其亂離繼以五季之酷其池塘竹樹兵車蹂蹴廢而為丘墟髙亭大榭煙火焚燎化而為灰燼與唐共滅而俱亡無餘處矣余故嘗曰園囿之興廢洛陽盛衰之候也且天下之治亂候於洛陽之盛衰而知洛陽之盛衰候於園囿之興廢而得則名記之作余豈徒然哉嗚呼公卿大夫方進於朝放乎以一己之私自為而忘天下之治怱欲退享此得乎唐之末路是矣詩集夜追隨清丨遊西園飛葢相丨丨曹植日蒼翠我圖丨丨丨杜甫詩問葵藿耕地桑柘間地肥菜芋熟為丨丨丨羹争如廟堂肉髙適同羣公題張處士菜園詩舉桔橰宿雨乗輕屐春寒著弊袍開畦分白水間栁發紅桃草際成棊􅈰村端丨丨丨還特鹿皮几日暮隠蓬蒿王維春園即事春松闊摶擊路終迷南園且灌畦敢言逃俗態自是樂幽棲葉長丨丨丨科圓早薤齊雨沾虚檻冷雪壓逺山低竹好還成徑桃夭亦有蹊小窓奔野馬閒甕飬醯雞水石心逾切煙霄分已暌病憐王猛畚愚笑隗囂泥澤圃潮平岸江村栁覆隄到頭乗興是誰手好提携羅隠南園暮花飛上士愛清輝開門向翠微抱琴看鶴去枕石待雲歸野坐苔生席髙眠竹掛衣舊山東望逺惆悵丨丨丨李端題崔端公園林地接吾廬邵平瓜丨丨丨丨榖雨乾時偶自鋤昨日春風欺不在就牀吹落讀殘書盧綸老圃堂乞作醉鄉天子優賢是有唐鑑湖恩賜賀知章他年我若成功去丨取南園丨丨丨薛能南園偶題畫成煙景韋曲樊川雨半晴竹莊花院遍題名丨丨丨丨垂楊色滴破春愁壓酒聲滿野紅麈誰得路連天紫閣獨關情漢陂水色澄於鏡何必滄浪始濯纓鄭谷郊墅未經霜草已落地花方遣掃丨丨丨丨莫教鋤馮長樂七歳吟治圃詩客道故鄉旅泊多年歳老去不知廻忽逢門前丨丨發丨丨来歛眉俱握手破涕共銜盃殷勤訪朋舊屈曲問童孩衰宗多弟姪若箇賞池䑓舊園今在否新樹也應栽栁行疎宻布茅齋寛窄裁經移何處竹别種幾株梅渠當無絶水石計縂生苔院果誰先熟林花那後開羈心秪欲問為報不湏猜行當驅下澤去剪故田菜守送名花隴右諸侯供語鳥日南太丨丨丨丨題平泉莊詩小亭荒榭洛下園池不閉門洞天休用别尋春縱遊只却輸閒客遍入何嘗問主人更丨丨欄花自好儘丨䑓丨景纔真虛名誤了無涯事未必虛名搃到身邵堯夫洛下園池青山流水丨丨在屋上丨丨在屋下中有五畝園花竹秀而野花香襲杖履竹色侵盞斚樽酒樂餘春棊局消長夏洛陽古多士風俗猶爾雅先生臥不出冠葢傾洛社雖云與衆樂中有獨樂者才全徳不形所貴知我寡先生獨何事四海望陶冶兒童誦君實走卒知司馬持此欲安歸造物不我捨名聲逐吾軰此病天所赭撫掌笑先生年来效喑啞蘇子瞻司馬君實獨樂園詩誰家美園朝遊北城東囘首見修竹下有朱門家破墻圍古屋舉鞭扣其户幽響荅空谷入門所見夥十歩九移目異花兼四方野鳥喧百族其西引溪水活活轉墻曲東注入深林林深牕户緑水光兼竹靜時有獨立鵠林中百尺松歳久蒼鱗蹙豈惟此地少意恐關中獨小橋過南浦夾道多喬木隠如城百雉梃若舟千斛隂隂日光淡黯黯秋氣蓄盡東為方池野鴈雜家鶩紅梨驚合抱映島孤雲馥春光水溶漾雪陣風翻撲其北臨長溪波聲卷平陸北山臥可見蒼翠間磽秃我時来周覧問此誰所築云昔李將軍負險乗衰叔抽錢筭間口但未㩁羮粥當時奪民田失業安敢哭丨丨丨丨圃籍没不容贖此亭破千家鬰鬰城之麓將軍竟何事蟣虱生刀鞘何嘗載美酒来此駐車轂空使後世人聞名頭猶縮我今官正閒屢至因休沐人生營居止竟謂何人卜何當辦一身永與清景逐蘇子瞻題李家園僦舎為圃丨丨亦丨丨從人笑我癡自求佳草木仍挿小藩籬吾事正如此人生聊自怡霜松未及尺獨我見竒姿張文潜種圃茅齋㸔地形我從銅州来見子上京客問我故鄉事慰子羈旅色子問我所知我對子應識朋游搃强健童稚各長成華宗盛文史連墻富池亭獨子園最古舊林間新坰栁行隨堤勢丨丨丨丨丨竹從去年移梅是今年榮渠水經夏響石苔終歳青院果早晩熟林花先後明語罷相歎息浩然起深情歸哉且五斗餉子東臯耕朱仲晦答王無功思故園見鄉人問棘針樊笋徑種園得果僅償勞不奈兒童烏雀搔已挿丨丨丨丨丨更鋪魚網葢櫻桃范至能田園雜興物情多相稱偶向東湖更向東數聲雞犬翠微中遥知楊栁是門處似隔芙蓉無路通樵客出来山帶雨漁舟過去水生風物情多與閒相稱所恨求安計不同劉威黄處士園林詩花影不分明竹邉䑓榭水邉亭不要人隨只獨行乍暖柳條無氣力半晴丨丨丨丨丨一畨過雨来幽徑無數飛禽有喜聲只欠翠紗紅映肉謂海棠兩年寒食負先生楊廷秀春晴懐故園花開一徑行東園新開九徑江梅海棠桃李橘杏紅梅碧桃芙蓉九種花木各植一徑命曰三三徑徑三徑初開是蔣卿再開三徑是淵明誠齋奄有三三一徑丨丨丨丨丨楊廷秀三三徑日長無客到蝴蝶雙雙入菜花丨丨丨丨丨田家雞飛過籬犬吠竇知有行商来買茶范至能曲折迷歸途晨輝麗丹極翼翼侔帝居向東堂上人零落煙海隅聨翩際時會振跡皆刑餘閨惟尚帝主皂𨽻乗軒車流威被東南生殺在指呼樓船載花石里巷無袴襦至今江左地風雲亦嗟吁叨榮己過量受禍如償逋荒凉㦸門路尚想冠葢趍客船維岸栁隣人罾池魚徘徊極幽觀丨丨丨丨丨夜月扄綺户春風㪚羅裾繁華能幾時䘮亂實感予曹鄶予何譏此曹真人奴劉子翬題朱勔園古今合璧事類備要别集卷二十一
