body:
  text: 古今合璧事類備要後集卷六宋謝維新撰臣道門賞賜厯代㳂革天有雨露生育萬物聖人體之則有慶賞之賜焉是理也見於虞則以五服五章而為命德之天見於周則以馭羣臣之幸而為詔王之柄古今之意葢以慶賞不體於天則不得謂之公恩賞不本於天子則不得謂之出于一逮德下衰如秦漢以迄于五代下之覬賞者有僥倖之思上之僣賞者有僣窃之患殆失古人體天詔王之意惟我國朝列聖相承大權有屬倖門不開其慶賞之權本於公道出於朝廷此禮樂自天子出舉無漢唐以來窃位假寵之患此其由三百年以迄于千萬世所以犂然允當於人心也歟事類車服丨丨以庸書功賞丨多有厚丨同上蕃庻晉康侯用錫馬丨丨晝日三接也易等差司勲掌賞功之法以等其功禮錫予賚予也言所以丨丨善人也詩匪頒太宰以九式均節財用八曰丨丨之式注丨分也丨賜也謂分賜羣臣禮慶賜丨丨遂行無有不當記爵賞見丨丨之施焉同上制禄以庸丨丨則民興功禮賞地凡頒丨丨三之一食凡賞田王食一臣食二唯加田無國征注征税也謂既丨之又重賜之若此田則無國税也錫功彤弓天子丨有丨諸侯也詩賞德天子之為樂也以丨諸侯之有丨者也德盛而教尊五糓時熟然後丨之以樂故其治民勞者其舞行綴逺治民逸者其舞行綴短注民勞者德薄故賜舞亦少民逸則丨盛德則賜舞多則舞行相去近記注䕫始制樂以賞諸侯賞奸介之推曰下義其罪上丨其丨上下相蒙難與處矣左傳門賞郈班敗狄宋以丨丨之使食其征與邑仲叔于奚有功于衛請曲縣繁纓以朝許之仲尼聞之曰惜也不如多丨之丨唯器與名不可以假人君之所司也賜樂晉侯以樂之半丨魏絳曰子教寡人和諸戎狄正諸華夏八年之中九合諸侯如樂之和無所不諧請與子樂之夫賞國之典也子其受之魏絳於是乎始有金石之丨並同上上賞齊威王下令曰有能面折寡人者受丨丨獻書諫者受中賞謗議於市朝者受下賞戰國策加錫古者議有貢士一適謂之好德再適謂之賢者三適謂之有功乃丨九丨也大戴記賞縣晉侯丨胥臣以先茅之丨注賞其舉欲缺之子又丨丨士伯以𤓰衍之丨賞栢子狄臣于室獲狄士救伯氏之功伯氏謂林父也左賞邑鄭伯丨入陳之功賜子展先輅三命之服先八丨賜子産次輅再命之服先六邑又齊侯與晏子鄁殿其鄙六十不受曰慶氏之邑足欲故亡吾邑不足欲也不受鄁殿非惡富也恐失富也賜田晉侯朝王王丨之温原攅茅之丨又周平王取蒍䢴之田于鄭而與鄭人蘬忿生之田又史記趙列侯好音鄭歌者二人丨之丨各萬畆又秦始皇以甘羅説秦攻燕以甘􅌗田宅賜之又漢蘇武自匈奴來賜公田二頃宅一區又唐郭子儀前後賜良田美玉名園甲館不勝紀又孔緯丨天興良丨又符璘入朝賜藍田田四十頃又于志寧與張行成髙季輔俱丨丨志寜奏臣願以有餘賜不足者帝分田以與二人又元結祖仁基從太宗征遼以功賜宜君田二十頃賜服訟或錫之鞶帶易君賜衣服服以拜記太宗伯九儀之命受服禮晉侯獻楚俘于王王丨之大輅之丨載輅之服左後郭賀字喬卿為荆州刺史有殊政顯宗巡狩時嗟歎賜以三品服中書令張嘉正奏致仕者佩魚終身自是百官賞兼魚袋謂之章服元稹謝表金章紫服老陋軀賜馬虢公晉侯朝王王享醴宥皆丨丨三匹非禮也王命諸侯名位不同禮亦異數不以禮假人平王錫晉文侯馬四匹後漢世祖以所乘大驪賜李忠李光顔為澡冀行營節度使臨送丨珍器良丨王君廓鎮幽州擊突厥俘斬二千獲馬五十匹入朝帝丨所乘丨令自廷中乘以出魏證陳事帝丨黄金十斤丨二匹薛仁貴丨以御丨丨輔公祐據丹陽詔李恭為帥召李靖入朝江南平丨百匹郭子儀給芻馬二百匹張行成侍燕丨名丨一錢十萬衣一稱賜車君丨丨乘以拜記君子來朝何錫予之路車乘馬詩賜玉虢公晉侯朝王皆丨丨五㲄虞卿説趙王一見賜白璧一雙黄金百鎰後鍾離意子阿為尚書令交趾太守坐贜詔以其資物頒賜羣臣意得珠璣悉委地不拜曰孔子忍渴於盗泉此贓汚物故不敢拜帝嘆之泉男生擒髙麗還賜寶器蘇定方滅三國皆生擒其主賞賚珍寶不勝計河間王孝恭討輔公祐擒之丨寶玩不貲元宗在藩邸識姜皎有非常度委心焉及即位賜珍物張垍尚寧清公主元宗眷垍厚即禁中置内宅珍賜不可數李載義賊平詔同平章事丨白丨帶示殊禮賜金王成為膠東王勞徠不怠宣帝詔増秩丨丨薛收交天䇿府記室上書諫秦王止田獵王答曰覽所陳知成於我者卿也明珠兼乘未若一書丨黄丨十鋌蕭瑀字勝文遷内史令孜孜抑過繩違無所憚丨黄丨一函元宗將以牛仙客為尚書又欲丨實封張九齡曰謹法非有功不封邊將積榖帛繕器械適所職爾陛下必賞丨帛可也賜帛丨之束帛之秦二世丨叔孫通丨二十四衣一襲漢明帝時鳳皇集于蔡丨汝南太守丨百匹晉張華以平吳之計賜絹百匹御史大夫蕭瑀劾李靖待軍無律帝召讓之徐曰赦公之罪録公之功賜絹千匹既而曰人譛短公朕今悟矣加賜絹二千匹屈厥通從乎薛仁杲珍用山積諸將爭得之通獨無所取帝曰清以奉國名實不虚特賚綵千段太宗討髙麗先遣張儉輕騎度遼江夏王道宗請以百騎徑約其還日將還會髙麗兵繼其路更走間道謁帝如期賜絹千段太宗治洛陽宫張元素上書極諫詔罷役賜綵二百匹倪若水為汴州刺史元宗嘗遣中官徃淮南捕鵁鶄上疏諫手詔答曰言念忠讜深用慰喜賜物四十段用答至言馬周字賓王至長安舎中郎將常何家正觀五年詔百官言得失何武人不渉學周為條二十餘事皆當世所切太宗怪問何何曰此非臣所能為家客馬周教臣言之客忠孝人帝召謁見大悦詔直門下省明年拜御史奉使稱職帝以何得人丨丨三百匹賜第唐孔緯字化及遷尚書左僕射賜號持范啟運保人功臣鐡劵丨天興良田善和里丨李光顔丨開化里丨劉仁軌進六階丨丨一區李晟字良器丨丨永崇里晟入第京兆供帳教坊鼔吹迎導將相送之渾瑊繇樓煩郡王徒咸寧丨大寧里甲丨李祐以功遷神武將軍賜宅河間王孝恭討輔公祐生擒之江南平丨甲丨一區劉幽求誅韋庻人以功丨丨一區五代李守貞以功拜平章事丨以楊先逺舊丨守貞取官旁民舎大治之為京師之甲帝出臨卒燕錫恩禮出於諸將賜劔漢衛綰淳謹景帝丨之丨辭曰光帝丨臣丨凡六不敢奉詔賜賜錢漢蘇武自匈奴來丨丨二百萬東觀漢記祭彤為遼東太守三十年嘉其功丨丨百萬明帝館陶公主為子求郎不許而丨丨百萬賜前張武為郎中令受金錢覺文帝更發金錢之以愧其心賜榖後章帝詔寵頒毛義丨丨千斛又袁􅀈字耀卿為郎中令卒太祖為之流泣丨丨三千斛一窖云以大倉谷千斛丨郎中令一窖云以垣下數千斛與耀卿家人不解意教曰以太倉丨者官法也以垣下榖者親舊也銅山鄧通無他能文帝愛之賞賜至多復賜蜀郡丨丨得私鑄錢鄧氏錢因滿天下金穴後郭况為太鴻臚賞賜金錢錦帛豐盛莫比京師號曰丨丨敝餘賦大府以丨丨之丨以待賜予藏盟府夫賞國之典也丨在丨丨不可廢也左傳班宗彞武王朝諸侯丨丨丨作分器注以宗廟􅂜器班賜諸侯分器言諸侯尊卑各有分也書分寶玉丨丨丨於伯叔之國時庸展親注伯叔同姓之國庸用也同上以春夏古之治人賞丨丨丨將賞為之加膳加膳則飫賜荀子賜虎賁晉文獻楚俘于王王命為侯丨丨丨三百人左又漢册魏公文君秉國之鈞正色處中纎毫之怒靡不抑退是用錫君虎賁之士三百人賜女樂後東都平丨竇抗丨丨一部繇唐李晟蕩夷凶憝丨丨丨一列渾瑊樓煩郡王徙咸寧丨丨丨五人戴休顔京師平從乘輿至京師丨丨丨河間王孝㳟討輔公祐生擒之江南平丨丨丨二部賜佩刀太宗曰正觀以前從武定天下間闗草昧家元齡功也正觀之後納忠諫正朕違為國長利徵而已雖古名臣亦何以加解佩刀以賜二人賜胡瓶丨李大亮丨丨一云乃朕所自御金削刀徐齊􅆅字將道八嵗能文太宗召試賜所佩丨丨丨賜貂裘裴矩助城伊吾脅處羅入朝帝喜丨丨丨西路珍器賜錦袍張長遜突厥怒引兵南至河長遜世靖出塞勞之且若専致賻賜者敵引還授總管又討薛舉不待命輙引兵會丨丨丨金甲賜魚袋唐髙宗給丨五品以上随身銀丨丨以防召命之詐出内必合之三品以上金飾垂拱中初督刺史始丨丨天授二年改佩魚皆為龜其後三品以上龜丨飾以金四品以銀五品以銅中宗初罷龜袋復給以魚郡王嗣王亦佩金魚袋加金紫唐劉餗字鼎卿進歙州刺史政幹强濟野媪將為虎噬㓜女呼號呼搏虎俱免觀察使韓滉表治有異行丨丨丨賜金紫李從晦出為常州刺史鎮海軍節度使李琢表其政丨丨丨賞朱紫唐初丨丨丨者服於軍中其後軍將亦賞以假緋紫有從戎􅆙骻之服車服志靈夀杖李靖乞骸骨賜丨丨丨功疑惟重丨丨丨丨注寧重賞也書輕重視功凡賞無常丨丨丨丨禮天子禮樂昔者周公有大勲勞於天下成王賜以丨丨丨丨記土田附庸王曰叔父建爾元子俾侯于魯乃命魯公俾侯于東錫之山川丨丨丨丨詩四牡鉤膺王錫申伯丨丨蹻蹻丨丨濯濯淑旗綏章王錫韓侯丨丨丨丨簟茀錯衡𤣥衮赤舄鉤膺鏤錫鞹鞃淺幭同上土田彞器奉之以丨丨撫之以丨丨注奉賜也彞器弓旌斧鉞也左車服文章旌之以丨丨明之以丨丨注車服戎輅之服也文章旌旗也同上弓矢鈇鉞諸侯賜丨丨然後征賜丨丨然後殺平王賜晉文侯彤弓一彤矢百旅弓十旅矢千晉文侯獻楚俘于王王賜之彤弓一彤矢百旅弓矢千皮日休納夏歌賜之鉄鉞征彼不懐權德輿劉濟銘天子賜以寶劔金甲彤弓盧矢韓平淮西碑曰度汝其徃衣食予士無飢無寒以既厥事遂生蔡人賜汝節鉞渾瑊拜奉天行營副元帥帝臨軒授鉞用漢拜韓信故事制曰㓂賊干紀授爾節鉞以戡多難徃欽哉清泰二年馬希範襲殷官爵封楚王賜以弓矢冠劔秬鬯圭瓚平王錫晉文侯丨丨丨丨記賜圭瓉然後鬯未賜圭瓉則資鬯於天子左晉文公獻楚俘于王賜秬鬯一卣注卣器也秬黑黍也鬯香酒所以降神也冕服非德魯公賜公冶冕服將死曰我死必無以丨丨斂丨丨賞也注言公畏季氏而賞我非以我有德故也軒蓋親推齊侯令曰得弊無存尸者以五家免乃得其尸公三禭之與之犀丨直丨丨丨之三注三禭先以士服次大夫服次卿服犀軒卿車直盖髙盖也錫命而惰天王使召武公内史過錫晉侯命受玉惰過歸告王曰晉侯其無後乎王丨之丨丨丨於受玉先自棄也已左傳三賞後及晉文公從亡賤臣壺叔曰君三行賞不及臣公曰夫導我以仁義防我以德惠此受上賞輔我以行此受次賞矢石之難汗馬之勞此復受次賞若以力事我而無補吾缺者此受次賞丨丨之丨且丨子晉人聞之皆悦史記徙木示信秦商君變法恐人未信乃丨丨於市南門募人徙置北門者予五十金有一人徙之與五十金以丨丨厲精信賞漢宣帝丨丨為治丨丨必罰封鄂千秋漢髙帝羣臣爭功鄂千秋曰蕭何功第一曹參次之帝曰何雖有功待鄂君而後明乃丨丨丨丨為平安侯賞魏無知封陳平為户牖侯辭曰非魏無知臣安得進乃復丨丨丨丨同上賜五熟釡魏鍾繇武帝時遷相國文帝在東宫丨繇丨丨丨為之銘曰於赫有魏作漢藩輔厥相惟鍾是幹心膂賜古人服魏太祖平栁城班所獲器特以素屏風慿凡賜毛玠曰以君有古人之風故丨以丨丨之丨賜荀漢紀太宗丨李大亮丨悦丨丨曰悦議論深博極為政之體公宜繹味之賜清廟器李珏牛公碑特丨丨丨丨六事皆範金飾玉如古時製宣曰以卿精忠用以貺别