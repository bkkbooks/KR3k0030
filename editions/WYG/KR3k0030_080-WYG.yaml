body:
  text: 古今合璧事類備要後集卷十一宋謝維新撰三公門三公歴代沿革太師太傅太保古官殷太甲時伊尹為太保紂時胥餘為太師漢儀注成王作周官立太師太傅太保兹惟三公尚書漢承秦制閥三師之位吕后以王陵為太傅陵免官省平帝元始元年始置太師太傅太保太師位在太傅上太保次太傅漢百官表太師位在三公上崇號為上公東漢以後常曰上公初學記其後或置或廢大抵無所統職至後魏特稱三師以正其名正一品然非道徳崇重不居其位無其人則闕之六典後周改為三公隋氏又為三師李唐因之宋承唐制以太師太傅太保為三師職畧政和二年詔曰太師太傅太保比古三公之官為宰相之任今為三師然古無三師之稱合依三代為三公官不必備惟其人為真相之任若除三公即為宰相靖康末詔依元豐故事以僕射為宰相三公止為階官不復與三省之政焉職畧國朝三公官未始兼備惟元豐末文潞公守太尉雍王曹王守司空富鄭公曹濟陽守司徒皆同一時其後宣和間蔡魯公為太師王將明為太傅鄭達夫為太保方相繼兩見石林燕語三公自祖宗以來罕嘗官備獨宣和末三公至十八人三少不論也太師三人蔡京童貫鄭紳太傅四人王黼燕王俁越王思鄆王楷太保十一人蔡攸肅王樞至儀王㮙至江後以用兵故紹興十二年秦申王為太師張循王韓蘄王為太傅劉安城王為太保其後乾道初楊和王呉信王並為太傅紹興初年㑹稽王為太師嗣秀王為太保盖自紹興而後三公未嘗備官焉朝野雜記事類論道立太師太傅太保兹惟三公丨丨經邦爕理隂陽官不必備惟其人書周官又三公者内與王丨丨中參六官之事外與六卿之教地官鄉老注又坐之丨丨謂之三公冬官考工有徳三公之任佐王論道以經緯國事和理隂陽言有徳乃堪之三公之官不必備員惟其人有徳乃處之孔安國尚書注具瞻維石巖巖赫赫師尹民丨爾丨詩節南山又荀朂曰三公丨丨所歸不可用非其人昔魏文帝用賈詡孫權笑之魏志賈詡𫝊注參聽大司冦以獄之成告於王王命三公丨丨之三公以獄之成告于王記王制八命王之三公丨丨及其出封皆加一等春官典命九命三公一命衮若有加則賜也不過丨丨三公八命復加一命則服龍衮與王者之後同記王制執圭大宗伯之職以玉作六瑞公丨植丨禮春官又上公之禮丨植丨九寸夏官廣行人執璧其贄三公丨丨禮夏官射人朱組公佩山元玉丨丨記玉藻繡裳我覯之子衮衣丨丨注王迎周公當以上公之服往見之詩九槐位朝士掌建服外朝之法面三丨三公丨焉禮秋官繅藉上公之禮執桓圭九寸丨丨九寸冕服九章建常九旒樊纓九就貳車九乗禮秋官覆餗鼎折足丨公丨注智小謀大不勝其任也易鼎卦正位宰夫掌治朝之法以丨王及三公之丨禮天官大儒丨丨者天子三公也荀儒效上賢丨丨使之為三公荀君道無官記曰三公丨丨有人然後充之舜之於堯伊尹之於湯周公召公之於周是也漢百官表兼卿周成王立三公而云官不必備惟其人以書傳攷之皆丨領六丨未嘗特置也容齋随筆表率太史公曰三公者百僚之率萬民之表也史記張丞相傳調和丙吉出逄牛喘吉問牛行幾里或以譏吉吉曰方春少陽用事恐有所傷害三公典丨丨隂陽職當憂前漢本傳又三公正天下調隂陽節風雨説苑承君彭宣哀帝即位轉大司空上書言三公鼎足丨丨一足不任則覆禮莫實願上大司空印綬前本傳又三公之任鼎足丨丨不有建明固守無以居位馬宫傳議政太師太傅太保是為三公盖參天子坐而丨丨前百官表宣化杓南三星及魁第一星西三星皆曰三公主丨徳丨調七政和隂陽也前天子志美俗王尊劾丞相衡衡史大夫禫位三公典五常九經以總方畧一統類廣教化丨風丨為職前本傳分職成帝時何武建言國之輔佐必得賢聖然猶天之三光備三公官各有丨丨宜建三公官丨丨授職以考功效前百官志總方王嘉謂丞相衡曰君以道徳位在三公以丨丨畧一統萬類分明善惡為職前本傳禮貌三公之貴皆天子之所改容而丨丨之也前賈誼傳師法漢哀平間始尊師傅之位明雖天子必有丨丨丨丨六典又三師天子所師法無所總職唐百官志六符東方朔對武帝曰願陳㤗階丨丨應邵注曰㤗階丨丨經曰㤗階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人中階上星為諸侯三公下星為卿大夫三階平則隂陽和風雨時天下大安前東方朔傳萬石漢制三公號稱丨丨前百官表注布被汲黯曰𢎞位三公俸禄甚多然為布被此詐也上問𢎞𢎞謝曰有之夫以三公為丨丨誠飾詐以釣名公孫𢎞傳粟飯荀爽為三公食不過一肉惟脫丨丨荀悦漢記非人蕭望之言三公任丨其丨則三光為之不明今歳首日月失光咎在臣等前本傳備員光武雖置三公事歸臺閣三公之職丨丨而已本紀鼎任光武尤信䜟言以王梁孫成名應圖籙越登槐丨之丨分紀鼎司三公丨丨無所不統後楊秉傳象極李固曰三公尊重承天丨丨後王龔傳應台三公上丨丨階下同元首注三公上象天之台階後郎覬傳紏非章帝詔曰春秋之義以貴理賤自今三公並宜明丨丨法宣振國威後本紀舉謡蔡邕上䟽曰五年制書令三公丨丨言是時奉公者欣然得志又漢官儀曰三公聽察長吏臧否人所疾苦條奏之是為丨丨言也後本傳考功三公丨丨量才以序庶僚郎顗傳奉職永平六年王雒山出寳鼎詔曰易曰鼎象三公豈公卿丨丨得理耶其賜三公帛章帝紀下輿安帝朝陳忠上疏曰三公稱曰冡宰王者改容而禮在輿為下御坐為起入則參對而議政事出則監察而量是非後陳忠傳避朝胡廣在公台二十餘年禮任甚優凡一履司空再作司徒三登太尉又為太傅其所辟命皆天下之士與故吏陳蕃李咸並為三司蕃等朝命嘗稱疾以避廣謝承後漢書元首見前應台注股肱陳忠薦劉愷曰三公上則台階下象山岳丨丨元首鼎足居職協和隂陽調訓五品後劉愷傳天極見前象極注天階三公上象丨之台丨下與人君同體者也郎覬傳累世楊彪博覽衆籍有恭孝稱位至司徒太尉自以丨丨三公耻為魏臣乃不復行續漢書四世袁宏至袁紹四世五公同上雀環𢎞農楊寳者嘗見一黄丨墜樹下為螻蟻所困寳愍之食以黄花百餘日毛羽成放之後寳讀書有黄衣童子向寳再拜曰我王母使臣為䲭梟所搏賴君拯濟今當使南海不得復住以白丨四枚與寳曰令君子孫潔白登三公辭去遂絶寳生震震生秉秉生賜賜生彪四世為三公續齊諧記鱣堂楊震明經博覽不應州郡禮辟後有冠雀銜三丨魚墜丨下都講取魚進曰蛇鱣卿大夫服之象也數三法三台也先生自此升矣後位三公後本傳佩印綬後黄憲字叔度同郡陳蕃為三公臨朝歎曰叔度若在吾不敢先丨丨丨本傳載輿車太傅鍾繇有膝疾拜起不便朝見使丨丨丨虎賁舁就坐是後三公有疾遂以為故事魏志並名臣魏文帝即位時司徒華歆司空王朗丨先世丨丨文帝罷朝謂左右曰此三公者乃一代之偉人後人難繼矣三國志訪大事魏初三公無事希預朝政髙柔上疏曰古者刑政有疑輒議於槐棘之下自今之後朝有疑議及刑獄大事宜數以咨訪三公三公朝朔望之日可特延入講論得失文帝嘉納焉分紀始封侯崔邕為司空封安陽亭侯三公封侯自此始也分紀詔設㑹前代三公䇿拜皆設小㑹所以崇宰輔之制自魏末以後廢不行至石鑒拜司徒有詔令㑹遂以為常同上夢松生丁固丨丨丨其腹上謂人曰松字十八公也後十八歳吾其為公乎卒如夢焉呉嗣主傳注聞車聲魏舒未達時嘗詣野王土人妻夜産俄而丨丨馬之丨相問寢者誰曰魏公舒自知當為公矣其後果為司徒晉書本傳佩刀相晉吕䖍有丨丨工相之當為三公䖍以贈别駕王祥曰以子有台輔之望故相贈後祥果為太傅臨薨以刀授弟覽曰汝後必興足稱此刀覽後歴世多賢才興於江左王祥傳手文占陶侃左丨有丨直達中指至横文上節便絶丨者以為此文通位無極侃針挑令徹血流彈壁上仍作公字以紙裛之公字愈明異苑天柱星天文上三台六星兩兩而居一曰丨丨三公之位也在人曰三公在天曰三台主開徳宣符晉天文志上台星三台六星西近文昌二星曰丨丨為司命次二星曰中台為司中東二星曰下台為司禄所以昭徳塞違也同上又上台司命為太尉中台為司中為司徒下台司禄為司空周禮大司空疏斗杓星丨丨南三丨及魁第一星西三星皆曰三公晉天文志和隂陽三公宣徳化丨丨丨同上典天地衛瓘奏三公職丨丨丨寳掌人物國之大事取義於此晉禮志黑頭三公晉諸葛恢為臨沂令名亞王𨗳庾亮謂曰明府當作丨丨丨丨本傳人後魏宗室元或少有才學當時甚美侍中崔光見而謂人曰黑頭侍中當此人也北史折臂三公有善相墓者言羊祜祖墓所有帝王氣祜遂鑿之相者見曰猶出丨丨丨丨而祜竟墮馬折臂位至公晉羊祜傳王導歎我丨丞相丨既拜司徒丨曰王喬若過江丨不獨拜公世説陸玩無人丨丨謂賓客曰以我為三公是天下為丨丨晉本傳父子上公晉司馬望安平王孚之長子有才偉早著名咸熈中位司徒入晉封義陽王遷太傅太司馬時孚為太宰丨丨居丨丨位百代以来未之有也分紀兄弟宰輔卞粹以清辯丨丨六人並登三公丨丨世稱卞氏六龍三十國春秋王戎乗馬晉丨丨雖位總鼎司而委事僚寀間丨小馬從便門而出逰見者不知為三公也本傳慶之給車宋廢帝加沈丨丨几杖丨三望丨慶之每朝賀常乗犢鼻無􅎻車履行田園遇之者不知三公也慶之曰我每有履田園有人時與馬成三無人時則與馬成二今乗車安所之乎及賜几杖並固讓南史本傳墜水三公宋司徒禇淵送王僧䖍閣道壊淵墜水王儉驚跳下車謝超宗丨丨丨丨墜車僕射禇彦回傳平世三公武帝云羊徽蔡廓可為丨丨丨丨南史蔡廓傳格外三公齊明帝即位陳顯達以太尉判鄱陽郡公為三公事雖職典連率人以為丨丨丨丨陳顯達傳師範一人三師丨丨丨丨儀刑四海齊職品令冠冕百辟丨丨丨丨從容論道同上班秩萬石梁制十八班班多者貴為上公丨第十八丨丨丨六典注紫綬金章三師品第一丨丨丨丨進賢冠絳朝服齊職儀黄閤鴟尾陳舊制三公丨丨聴事置丨丨後主時蕭摩訶以功授侍中驃騎大將軍時詔摩訶開閤門施行馬聴事寢堂並置鴟尾分紀又三公府三門當中開黄閤設内屏隋百官志參國家事三公丨議丨丨之大丨置府僚隋百官志置師傅官唐太守手詔曰朕觀前代明王聖主曷嘗無師傅哉况朕踵百代之末智不周物其无師傅何以正朕之不逮詩云不愆不忘率由舊章其依古道置三公官六典佐平邦國三公丨天子丨丨丨理隂陽無所不統唐百官志不設官屬三師三公皆丨丨丨丨唐百官志注三公明理天設三光以照明天子立丨丨以丨丨桓寛鹽鐵論三公銓時丨丨丨丨論道文選袁宏名臣論如人喉咽天理在斗中司三公丨丨丨在丨以理舌語春秋合城如言條理斗為天之舌口主出政教三公導君命諭於人則宜如人喉在咽以理舌口丨丨有丨丨上文宋均注坐見庶僚元豐中文彦博除太尉判河南彦博至河東未交印先就第丨以丨監司既交府事見監司府官如常式或以問彦博答曰吾未視府事三公丨丨也既交印河南尹見監司矣六年請老拜太師致仕事畧必為輔臣王文正公旦性沉黙好學父祐器之曰此兒異日丨丨三公丨丨因手植三槐於庭以為識事畧福夀罕比張齊賢四踐兩府九居八座以三公就第康寜丨丨世丨其丨事畧位貌隆重文彦博凝簡莊重有大臣體位將相者五十餘年徧