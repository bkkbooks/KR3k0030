公答史太保别紙熹昨者狂妄輒以瞽言仰凟崇聴自循分守當得譴斥之罪不謂髙明博大無所不容誨答諄諄鏧竭底藴三復自幸不惟私以免於罪戾為喜而又得側聞前此告猷之益天下已有隂受其賜者尤切增氣尚恨未得躬扣昌言之目以發䝉昧耳今者邊事警急變異荐臻人無智愚共以為懼然熹淺陋切以為境外之傳未足憂而譴告之深為可畏也今朝廷於其不足慮者既已過為之防而於其深可畏者反未有處熹甚惑焉夫以災異而求直言厯世相傳具有故實明公身為天下大老誠有憂國之心不當俯及細務願以此意為上一言使幽險之情得以上通則天下之言皆明公之言而明目逹聰感召和氣皆明公之功矣感激容貸之恩懐不能已故復言之俯伏俟罪詩集登壇詔出未央宫丨丨近總戎上公周太保副相漢司空岑參軍送李太保古今合璧事類備要後集卷十一
