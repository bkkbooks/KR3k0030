body:
  text: 古今合壁事類備要前集卷四十七宋謝維新撰釋教門浮屠名義事類三縁第一為了自己輪廻生死二為紹隆三寳三為六道四生皆令觧脱古禪師語録八風寳積經及太毗婆娑論以利衰毁譽稱譏苦樂為丨丨又得可意事名利失可意事名衰不見前排撥名毁不見前讃美為譽現前讃美為稱見前排撥名譏逼迫聲心名苦悦適心意為樂要覽四諦苦集滅道是也苦謂一切生老病死之類集謂一切聚集骨肉財帛之類滅謂壊滅道謂脩行類比名丨丨謂其理審諦非徒説也經云見苦斷集因滅修道龍舒心經注五濁刼濁見濁煩惱濁衆生濁命濁彌陀經五盖貪欲瞋恚睡眠調戲疑侮文選注十身自身衆生身國土身業報身聲聞圓覺菩薩智法虚空等身古禪師語録三昧道家云貞一儒者云致一釋氏云丨丨其義通也言一即有二遂至於三言三即昩在其間反覆存之而已佛言三有欲有色有无色有有者何謂一切有漏法是佛言若業能令後生相續是有又云生滅故名有墮苦集諦中是有婆沙論三藏謂經律論三者㧾名六帖七衆謂比丘比丘尼式又摩那沙彌室羅未尼此出家五衆優婆塞優婆夷此在家二衆此丨丨也三衣一僧伽梨即大衣也二欎多羅僧即七條也三安陀㑹即五條也此是丨丨若呼七條褊衫裙為三丨誤也四大我今此身丨丨和合所謂毛髪爪齒皮肉筋骨腦膸垢色皆歸於地唾涕膿血津沫津液痰淚精氣大小便利皆歸於水煖氣歸火動轉歸風丨丨各離今者妄身當在何處圎覺經六通華嚴經一天眼二天耳三他心四宿命五神足六漏盡晁迥道院集五禪禪有五有凡夫禪有外道禪有小乗禪有大乗禪有最上乗禪同上四恩恩有四種一父母二師教三國主四施主大乗本生經五戒凡出家師已評之經旬月令其觧息師乃為受丨丨名鄔波索迦此是創入佛法之基丨丨謂一不殺二不偷盗三不邪滛四不妄語五不飲酒大衆所攝也師次為辨漫條方請阿梨為剃頭授十戒此名室羅未尼又云有善男子欲求出家未得衣鉢欲依寺中住者名畔頭陀波羅沙此方行者也五藴謂色受想行識也色謂色身有形或黄或白是也受謂一切受苦受樂受用是也想謂一切思念是也行謂所行之事識謂曉觧世間事丨丨即五隂六塵色聲香味觸法謂之丨丨眼入色耳入聲鼻入香舌入味身入觸意入法謂之六入文選頭陀寺碑色隂如人以目觀晴空權一瞔空逈无所有其人無故目瞪發勞則虚空别見狂華非從空來非從目出若空來者還從空入若有出入即非虚空自不容其華相起滅若從目出還從目入既従目出當合有見若有見者既云空華旋合見眼若無見者出既翳空旋當翳眼是故當知丨丨虚妄楞嚴經受隂如人以手於空相摩妄生澁滑冷熱諸相是諸幻出不從空來不從掌出若從空來既能觸掌何不觸身若從掌出應非待合要名為觸稱當知丨丨虚妄想隂如人談酸梅口中水出思蹋懸崖足心酸澁如是假説不從梅生非從口入若梅生者梅合自談何待人説若從口入自合知聞何湏待耳若獨耳聞此水何不耳中而出想蹋懸崖與説想類是故知丨丨虚妄同上行隂譬如暴流波浪相續前際後際不相踰越如是流性不因空生不因水有若因空生則無盡虚空成无盡流若因水有則此暴流性即非水是故當知丨丨虚妄同上識隂如人取頻伽瓶塞其兩孔滿中擎空千里逺行用餉他國知是虚空非彼方來非彼方入若彼方來則彼瓶中取去水地應是少虚空若此方入則開孔倒瓶應是空出是故當知丨丨虚妄同上眼入如人目睛瞪發勞相因明暗二種妄塵發見當知是見非明暗來非於根出不於空生若從明來暗即隨滅應非見暗若從暗來明即隨滅應無覺明若無根生必無明暗若於空出前瞩塵象歸當見根是故當知眼入虚妄同上耳入如人兩手争塞其耳頭中作聲動静兩種妄塵發聞是聞非動静來非於根出不出空生若從静來動即隨滅應非聞動若從動來静即隨滅應無覺静若從根生必無動静若從空出有聞成性即非空出是故當知耳入虚妄同上鼻入如人急搐其鼻耳中聞其冷氣觸目觸分别通塞通塞二種妄塵發聞畢竟無體是聞非通塞來非於根出不於根出不於空生若從通來塞聞即滅如因塞有通則無聞若從根生必無通塞若從空出自當囬齅汝鼻是故當知丨丨虚妄同上舌入如人以舌䑛物熟䑛令勞其人苦病則有苦味無病之人㣲有甜味舌根不動之時淡性常在甜苦二塵畢竟無體非因淡有非因根出不於空生若從苦來淡則知滅若從淡來甜則知亡若從舌生必無甜淡若從虚空自味非汝口知是故當知丨丨虚妄同上身入若人以冷手觸於熱手若冷勢多於熱者從冷若熱勢勝於冷者成熱離合二種妄塵發見離合二塵畢竟無體非離合來非違順有不於根出又非空生若合時來離當已滅若從根出必無離合必於空出空自覺知何關汝入是故當知丨丨虚妄同上意入如人倦勞則眠睡熟則悟覧塵斯憶失憶為妄是其顛倒生任異滅生滅二塵畢竟無體非寤寐來非生滅有不於根出亦非空生若從寤來寐即隨滅必生時有滅滅即同生若從滅有生生即無滅若從根出寤寐二相隨身開合同於空化若從空生自是空知何關汝入是故當知丨丨虚妄並同上無為袁宏漢記佛者漢言覺也其精為沙門沙門者漢言息也息欲去欲而歸於丨丨後漢楚王暎傳非想釋迦於檀山中學非丨丨覺道成傳燈録止觀定有出定入定意非若土無所不定慧者見㣲而已不若止觀無所不見故定慧為菩薩丨丨為佛王介甫金陵語録小捨若廣修衆善有所希望聞法即空道乃不着是謂丨丨如火燭在後不見坑穽黄蘖示要論忘心一念離真皆為妄想一念計生死即落諸魔一念起諸見即落外道凡人皆逐境生心若欲無境當丨其丨心忘則境空境空則妄滅若見善相諸物來迎亦無心隨去若見惡相種種現前亦無畏心但自丨丨同於法界便得自在示要論着相心即是佛佛即是心更無别佛亦無别心今人不悟此心向外造惡枉受輪廻丨丨修善枉受勞苦不如認取即心若不直下無心累刼修行終不成道供飬十方諸佛不如供養一無心人無心者一切無心也亦無别心之體内外有如木石不動不轉内外如空虚不動妄念便証菩提黄蘖示要論聲聞因聲得教謂之丨丨但不了自心於聲教上起解或因神通或因瑞相語言運動聞有菩提湼槃三阿僧祇刼修成佛者皆屬丨丨因丨丨道謂之丨丨傳燈録又諸佛聖教丨丨為上首從師友所聞展轉修証小行小果故名丨丨祖師不立文字直指人心本來是佛若也聞聲悟道故號丨丨注聲是言教也假饒厯刼修行只成報化佛終不成道報化佛非真佛亦非説法者縁覺因聲教而悟者名聲聞因縁而悟者名丨丨名相諸人被丨丨二字所惑聖凡名號三世諸佛八萬法門百千三昧有佛有衆生摠謂之丨丨只為諸人起心動念妄有生滅妄有菩提湼槃便有出世間法不出世間法妄起許多異見却同在鬼窟裏作活計諸人皆㑹自己便是佛悟即是佛迷即是凡夫不假修行古禪師語録因果果者謂丨丨之果非有非無非真非妄無生無死無迷無悟不曽出世不入湼槃不曽生諸惡道亦不曽為人亦不曽成佛亦不曽為諸天常自無為湛然常寂又曰從息心而成佛傳燈録空覺觀為覺為動止為空為静丨丨未嘗相離有動無静有覺無空即成人見是凡夫法有静無動有空無覺即成我見是三乗法王介甫金陵語録如來晁迥云本覺為如今覺為來故曰丨丨道院集正因起信論云離言説法佛説三乘十二分教了無交渉所以佛祖不立文字以心傳心有僧辭上坐云某甲親附上座三年丨丨中也未曽聞一字曰若是丨丨一字也無傳燈録正位呼為丨丨猶如至尊指斥乘輿者尚有罪何况丨丨而欲擬議論辨同上蒼天王介甫云哀莫哀於心死禪家所謂丨丨蒼天佛家語録慈雲謂如來丨心如彼大丨䕃注世界雞跖集招提梵語云丨聞丨奢唐言四方僧物訛柘為招去閗奢留提故稱丨丨即今十方持住守也浮圖梵云丨丨此云聚相伽藍梵語題云僧丨丨摩或云僧伽羅摩此云衆園園者生植之所佛弟子居之取生檀道本聖果之義也或云毗阿羅此云逰止處釋氏要覽檀那梵語陀那鉢底唐言世主稱檀那者即訛陀為檀去鉢底故曰丨丨也又稱檀越者謂此人行檀施能越貧窮海故僧伽梵語云丨丨唐言衆僧史略云凡四人以上名僧今一人亦稱僧盖從衆之名也亦如萬二千五百人為軍一人亦稱軍也善覺要覽沙門梵云沙迦懣曩又丨丨那或云桑門唐言勤息秦譯云勤行又云善覺要覽沙彌落髪後稱丨丨也華言為息慈謂安息在慈悲之地又謂息惡行慈也同上比丘梵語云丨丨秦言乞士謂上於諸佛乞法資益恵命下於施主乞食資益色身同覺要覽上人有過能自改名丨丨内有德知外有勝行在人之上名丨丨同上闍梨梵語云阿丨丨耶唐云軌範今稱丨丨盖梵音訛畧也又云阿遮梨夜隋云正行能紏正弟子行故同上頭陀梵語云杜多漢言抖擻謂三毒如塵坌真心此人能振撣除去故也上今訛稱丨丨又抖擻貪欲嗔癡三界内外不敢不捨名杜多同净土如來説從是西方過十萬億佛上有世界號極樂以無八苦十惡道故也其國名丨丨以無三毒五濁業故也其佛號阿彌陀以壽無量願無量功德相好光明無量故也文粹白公文經言西方丨丨以七寳装嚴無地獄餓鬼禽畜以至蝡動之類常清净自然無一切雜穢故名丨丨其人生蓮花中長生不老衣食宅宇隨意化成其景序常春無復寒暑大受快樂無一切苦惱故名極樂世界佛書梵刹梵云利瑟故此名竽今略名刹即幡柱也沙門得一法者便當建幡告四逺要覽叢林梵語貧婆此云丨丨譬如大樹叢叢故僧聚此得名丨丨祖庭事苑柰苑昔西域國有奈樹生果果生有一女子王収為妃女乃以苑地施佛為伽藍故曰丨丨出雞跖集寳坊給孤長者布黄金地為伽藍故寺宇號為丨丨同上金田或云金地即舍衛國給孤長者側布黄金買祗陀太子園建精舎諸佛居之處也鹿苑在羅柰國佛成道初轉法輪處也鷄園在摩竭陀國无憂園造小乗大衆出家寺也佛滅後衆多名比比丘皆住丨丨鴈塔昔有比丘見羣鴈飛翔忽有一鴈投下自隕衆曰此鴈垂戒宜旌彼德於是瘞鴈建塔西域記鴈堂比舍離於大林為佛作堂形如鴈子一切具足要覽鷲嶺耆闍窟山中山形如鷲佛常居此中故號丨丨法華經犍椎犍音䖍梵云丨丨此云鐘磬又曰凡有一个銅鐡名者皆名丨丨又云但是金石板木砧鎚有聲可以集衆者皆名丨丨要覽寒林即西域葉尸處謂多死尸入者可畏毛寒故云丨丨今名尸陀林南無佛言丨丨者此决定諸佛世尊名號音聲又梵語丨丨此翻為名即是歸趍之義或云那摩曩謨梵音訛也悲花經泥梨立世論梵音丨丨耶此云无喜樂又云丨丨迦此言無去處皆云地獄也釋氏要覽伽陀梵言丨丨此言諷誦祖廷事苑毗尼梵語丨丨藏此云律也要覽般若梵語丨丨此云云智忠也同上湼槃梵語丨丨此云無為楞伽經云乃不生不死之地一切修行之所依歸佛説施燈文云願一切修行皆得丨丨㣲妙光明至丨丨者乃有微妙光明世人誤認以為死大非也出多心經注阿毗曇梵語云丨丨丨此云論摠言經律論釋氏要覽修多羅梵語丨丨丨上此言經也同吃栗多梵云丨丨丨唐言賤人同上底栗車梵語丨丨丨此云畜生謂其形傍故云世論羯麽陁梵云丨丨丨此云知事要覽窣堵波梵云丨丨丨此云墳同上優婆塞梵語也又云鄔波索迦奉言善宿男唐言近事男亦云清信士同上優婆夷梵語云夷即女聲字也又云鄔婆斯迦名義同前同上摩訶薩梵語丨丨丨者此云大有情即能救度人也地時論波演那梵語云羅摩唐言院西域記云丨丨丨此云周圍廊舍院也須菩提西域人凡稱人道髙臘長呼為丨丨丨如中國凡具道眼有可尊之德者號曰長老也禪門䂓式舍利弗舎利子亦云丨丨丨乃佛弟子名以其母眼似丨丨丨鳥之眼故因其母而立名或云舍利鳥則此間所謂鶖鳥其眼圎因以舍利稱其母此言舍利子若曰婦人舍利者之子也龍舒心經注優曇華是人甚希有過於丨丨丨䟽云丨丨丨鉢名瑞應三千年一現現則金輪王出法華經殻漏子洞山良价和尚將員寂謂衆曰離此丨丨丨向什麽處與衆相見衆不對師儼然坐化出傳燈録般若航清涼禪師云夫丨丨者苦海之慈航昏衢之巨燭也杜詩注妙喜國佛言有國名丨丨維摩詰於彼國寂沒而來此生也阿蘭若蘭若梵言丨丨丨唐言無净四分律云空浄處菩薩名論云閑静處知度論云逺離處小異大同釋氏要覽祇樹園祇洹林樹名梵云祇陁洹此云戰勝即太子名須達長者施園祗陁太子施樹為佛説法之處故後人曰祇園金剛經注白骨觀優婆尼沙陀語也白骨㣲塵歸於空虚謂之丨丨丨楞嚴經大願船菩薩乗丨丨丨住生死海就此世界呼引衆生上丨丨丨如是送至西方如有往者無不得生净土文白牛車法達念法華經三千部禮祖不投地六祖曰心迷法華轉心悟轉法華誦乆不明已與人作讐家無念念即正有念念成邪有無俱不計長御丨丨丨法達問經説三車大牛車與丨丨丨如何區别祖曰汝自迷背不如坐却丨丨丨更於門外覔三車傳燈録鸚鵡車設有人道得言語尖新語中㫖趣都摠不知必無實行只謂之丨丨丨可也出古禪師語録田相衣佛住王舎城經行見稻田畦畔語阿難云諸佛衣相如是從今依此作衣相記云田畦貯水生長嘉苗法衣之田潤以四利之水増其三善之苖以養法身自惠命也要覽尼師壇坐具也梵語云丨丨丨又云尼師但那此云隨坐衣唐言坐具也安覽伊蒲饌後漢楚王英詣闕以縑贖罪詔報曰王好黄老之言尚浮屠之教其還贖以助伊蒲塞桑門之饌注伊蒲塞優蒲塞也本傅盂蘭盆梵云盂蘭此云救倒懸盆則此方噐也華梵䨇舉自目連救母始也要覽戒定慧法要有三曰丨丨丨戒生定定生慧慧八萬四千法門是三者迭為用若次第言之則定為慧因戒為定根根植則苗茂因為果樹樹培則果滿無因求滿猶夢果也無根求茂猶揠苗也雖佛以一切種智攝三界必先用戒菩薩以六波羅蜜化四方不能舍律律之用不可思量文粹白居易文又唐宣宗問𢎞辯禪師何名丨丨丨師曰防非止惡謂之戒六根渉境心不隨縁謂之定心境俱空照覧無碍謂之慧傳燈律法禪白居易問惟寛禅師既為禪師法何以説法師曰無上菩提被於身為丨説於口為丨行於心為丨應用者三其致一也譬如江湖淮漢在處立名名雖不一水則無二七聖財人生世間禍福從口生當䕶於口甚於猛火猛火能燒一世惡口能燒無數世猛火燒世間財惡口燒丨丨丨口舌皆鑿身之斧也丨丨丨謂一信二精進三戒四慚愧五聞捨六忍辱七定慧七者能資用成佛故名財報恩經七支業謂三身四口業三法門體中𤣥句中𤣥𤣥中𤣥三摩提一切禪定攝心皆云丨丨丨秦言正心行處謂是心從無始以來縈曲百端得是正心行處心則端直如蛇入竹筒内十二處色與見二處聼與身二處嗅與香二處嘗與味二處身與觸二處意與法二處丨丨丨俱虛妄有相因縁非自然十八界眼所見處耳所聞處鼻所嗅處舌所味處身所觸處意所思處謂之六根界色聲香味觸法所在謂之六塵界眼識色處謂之眼識界耳聞聲處謂之耳識界并鼻識界舌識界身識界意識界謂之六識界摠謂之丨丨丨龍舒心經十二類因動有聲因聲有色因色有香因香有觸因觸有味因味有法六亂妄想成業性故十二區分由此輪轉是故十二變為一旋復乘此輪轉故有卵生濕生胎生化生有色無色有想無想若非有色若非無色若非有想若非無想楞嚴經十六觀門唐宣宗問𢎞辯禅師今人念佛如何對曰如來出世為天人師隨根噐而説法為上根者聞最上乗頓悟至理中下者未能頓曉是以佛為韋提希權開丨丨丨丨令念佛生於極樂傳燈録十六觀禪圭峯禅源序曰念佛求生净土亦須修丨丨丨丨金陵語録四歡喜法一儉素歡喜能引少欲樂二積集梵行歡喜能引逺離樂三無悔歡喜能引三摩地樂四樂斷樂修歡喜能引三菩提樂要覽四無量心慈悲喜捨是無量心授與饒益是慈相除去衰損是悲相慶慰得捨是喜相忌壊平等是捨相六波羅蜜一布施二持戒三忍辱四精進五禪定六智慧布施以廣義持戒以守信忍辱以為謙精進以思敬禪定以守静智慧以通理又謂之六度文選頭陀碑三身四智六祖謂智通曰三身者清浄法身汝之性也圓滿報身汝之智也千百億化身汝之行也若悟三身即名丨丨大圓鏡智平等性智妙觀察智所作智三業四儀如來以身口意丨丨難調伏也浄尸羅以息其内行住坐卧丨威丨攝善心也明布薩以照其外故曰波羅提木义是汝之師文粹顔魯公文五分法身丨丨丨丨所謂戒定慧觧脱觧脱知見此五者皆以超出五隂故戒超色隂定超受隂慧超想隂觧脱超行隂觧脱知見超識隂王介甫金陵語録三句正見一函盖乾坤句二隨波逐浪句三截斷衆流句體中𤣥即函盖乾坤句句中𤣥即隨波逐浪句𤣥中𤣥即截斷衆流句三𤣥法門是佛祖正見學人但入得一𤣥已具正見若不達此三𤣥别有悟觧皆是邪見語録菩提薩埵梵語丨丨此云覺梵語丨丨此云有情言菩薩者本云丨丨丨丨欲簡於稱呼故省文言菩薩此云覺有情也凡有生皆有情菩薩乃有情之中覺者耳佛有覺性而無情菩薩亦未免有情故謂之覺有情心經阿耨多羅梵云阿此云無梵語丨丨丨此云梵語三此云正梵語藐此云等梵語菩提此云覺是丨丨丨丨三藐三菩提者乃無上正等正覺謂無上真性也心經注波羅蜜多梵經云丨丨丨丨此云到彼岸彼岸者西土俗以設喻諸佛地謂之彼岸衆生輪廻作業之地如在海中謂之此岸則佛地所以謂之彼岸心經注毗盧遮那梵經云丨丨丨丨華言是種種光明遍照道院集浄名毗耶維摩經毗耶離城中有長老維摩詰云維摩詰華是净名也華言注浄名體用浄者本體也名者迹用也從本體起迹用從迹用歸本體體用不二本迹非殊也此維摩詰所以立名也諸方語正法眼藏五祖𢎞忍夜召六祖惠能告曰佛以無上㣲妙秘宻圓明真實丨丨丨丨付迦葉展轉至達麽以至於吾今以法寳及所傳袈裟付與汝傳燈録湼盤妙心空刼以來自己本名字方便呼為正法眼藏丨丨丨丨又呼為正國又呼為正位又呼為沙門果古禪師自論律師法師有人問惠海禅師云丨丨丨丨禪師何者最勝師曰律師者啟毘尼之法藏傳受命之遺風秉威儀行軌範三番羯麽作四界初因若非宿德白眉焉敢造次法師者㨿獅子座瀉懸河辯啟鑿𤣥關開般若妙門若非龍象蹴蹋安敢當斯禪師者㨿其樞要直了心源出沒卷舒縱横應物頓見如來㧞生死深根獲現前三昩三學雖殊得意忘言一乘何異諸方廣語狂慧乾慧佛祖是觧悟人無正見只是學觧謂之丨丨亦非丨丨乾慧者悟得正見為無定水浸潤既非悟觧只認得生死垢心却成邪古禪師語録慾界無禪有法師問鵞湖丨丨丨丨禪居色界此上凴何而立師云法師只知丨丨丨丨不知禪界無慾傳燈録真妄如火世間諸相無所從來亦無所從去如鑽木火出可以遍世界燒盡有形還歸於無若知妄為妄即妄是真認妄為真雖真亦妄荆公無位真人臨濟義𤣥禅師上堂云汝等諸人肉團上有一丨丨丨丨汝若不識但問老僧有僧問師便打云丨丨丨丨是什麽乾屎撅後雪峰聞乃曰臨濟大師白拈賊傳燈録金粟如來發迹經云浄名大士是往古丨丨丨丨又祖廷事苑維摩詰是丨丨丨丨梵言維摩詰華言浄名也李善文選注鉢塞數珠梵語丨丨莫梁云丨丨此是引接下根牽果脩業之具也佛言軍持浄瓶梵語云軍持此云瓶常貯水隨身用以浄手也又云軍持有二若甆瓦者浄用若銅鐡者是觸用寄歸傳法中龍象達麽傳曰波羅提丨丨丨丨按智度論曰龍象言其大大水行中龍力大陸行中象力大故負荷大法者比之象龍傳燈録海水魚鼈維摩經云佛以四大丨丨入一毛孔不撓丨丨性彼大海本相如故又云取三千大千世界如陶家輪着掌中擲過恒河沙國界之外其中人不覺不知不使人有往来相後漢楚王相貍奴白牯池州甘䞇行者将錢三貫入僧堂云請上堂施財上座云財施無盡法施無窮甘云恁麽道爭得某錢却將去與南泉和尚設粥云請和尚念誦南泉云甘贄行者設粥請大衆為丨丨丨丨念摩訶般若波羅蜜甘乃禮拜又僧問南泉丨丨丨丨却知有師三世諸佛不知有師曰未入鹿苑時猶較些子傳燈録象迹蜂歌下壓丨丨歡喜之地上接丨丨莊嚴之境段成式塑像記在家出家有問佛丨丨白衣能修福德善根勝出家否佛言我於此則不定若出家不修善根不如在家若出家能善根根則勝在家要覽飛鍚掛鍚釋子云逰行僧為丨丨安住僧為丨丨釋氏要覽浮屠佛陀梵語佛陀或云浮屠或云部多或云毋䭾或云沒陀皆是五天竺語楚夏並譯為覺今畧稱佛也波羅木义華言則别觧脱即戒所謂感果也諸善之本以戒為根也不住色布施所謂丨丨丨丨丨不住聲香味觸法布施如是布施不住於相其福德不可思量金剛經不住法布施若菩薩心住於法而行布施如人入暗則無所見若菩薩心丨丨於丨而行布施如人有目光明照見種種色同上古今合璧事類備要前集卷四十七
