body:
  text: 古今合璧事類備要前集卷五十一宋謝維新撰道教門道士事類丹臺紫陽真人周季道入蒙山遇羨門子再拜乞長生訣羨門子曰名在丨丨玉室中何憂不仙六帖仙堦陳子昂頌尊師有弟子十人並丨丨之秀唐書名大字道大道者不可强名也强丨曰丨强丨曰丨真一經訣從道為事人行大道號曰道士士者何理也事也身心順理唯道是從丨丨丨丨稱道士太一珢書經元始天尊無宗無上而獨能為萬物之始故名丨丨運道一切為極尊而常處三清出諸天上故稱丨丨太𤣥真一經天真道士道士有五一丨丨丨丨髙𤣥真人之流也二神仙道士杜沖尹軌之例也三山居道士許由巢父之比也四出家道士宋倫彭諶之匹也五在家道士黄瓊籛鏗之倫也三洞道科寓形人間鶴骨松貌泉停谷虚丨丨丨丨天地無累與扶桑公陶隠君遥為師友矣蔣防文寄跡老子張道士嵩髙之有道者通古今學有文武長材丨丨丨丨法中為道士以養其親九年聞朝廷將治東方諸侯貢賦之不如法者三獻書不報長揖而去韓文神眸清朗有道者其神則清雙眸朗暢四氣和平長江月影太華松聲王維云膚體清温齋心受籙服氣鍊形暑不流汗冬不挾纊丨丨顔色冰丨玉丨未識者望之疑神仙中人也白氏六帖徧游名山晉許邁恬静不慕仕進父母尚存未忍違親立精舍於餘杭懸溜山朔望時節還家定省父母既終乃遣婦孫氏還家後改名𤣥丨丨丨丨採藥本傳詔賜鏡湖賀知章遷祕書監請為道士還鄉里丨丨丨丨剡川一曲本傳鼓琴燒香孫策欲斬道士于吉諸將勸之策曰昔南陽張津為交州刺史捨前聖典訓廢漢家法律嘗著絳帊蒙頭丨丨丨丨讀邪俗道書云以助化卒為南夷所殺此甚無益諸君但未悟耳江表傳養鵝換經王右軍事見書畫類三景法師凡道三景稱三景弟子已度三人付師友已後傳授得稱丨丨丨丨太上八素真經瓊華真人華陽公主大厯七年以病丐為道士號丨丨丨丨本傳嵩山八字後唐清泰中進士龎式於嵩陽觀聚課有薛學士者因上山次見道士五人曳輕羅羽帔身長大欲攜此子同去薛辭之乃褫其襂背上朱篆一行八字道士乗虚而去薛歸宫話其事無有識其篆者北夢瑣言句曲五果秦孝王時道士周大賓住丨丨山下種丨丨也出真誥章甫來迎稷丘公者太山下道士漢武帝東巡狩乃冠丨丨衣黄衣擁琴丨丨列仙傳羽衣入夢蘇子與客遊於赤壁之下反而登舟時夜將半四顧寂寥有孤鶴横江東來翅如車輪𤣥裳縞衣戞然長鳴須㬰客去予亦就睡夢一道士羽衣蹁蹮過臨臯之下揖而言曰赤壁之遊樂乎問其姓名俛而不答赤壁賦奏章天門見天類天門掛榜事遊神月宫見中秋類唐明皇事詩集飡霞我昔東海上勞山丨紫丨親見安期公食棗大如𤓰中年謁漢主不愜安歸家朱顔謝春暉白髪見生涯所期就金液飛步登雲車願隨夫子杏壇上閒與仙人掃落花李白送孟士融煮石今朝郡齋冷忽憶山中客澗底束荆薪歸來丨白丨遥持一尊酒逺慰風雨夕落葉滿空山何處尋行跡韋應物寄道士攜琴夕陽度西嶺羣壑倐已暝松月生夜涼石泉滿清聴樵人歸欲盡煙鳥棲初定之子期宿來丨丨候蘿徑孟浩然宿山房疊帔古木無人也來尋羽客家道書堆玉案仙帔疊青霞鶴老難知嵗松寒未作花山中不可見何處化丹砂劉長卿訪道士時藥裹仙翁無定數時入一壺藏夜夜桂露濕村村桃水香醉中抛浩刼宿處有神光丨丨丹山鳳棊函白玉郎弄河移砥柱吞日傍扶桑龍竹裁輕䇿鮫絲熨短裳樹栽嗤漢帝橋板笑秦皇徑欲隨關冷龍沙萬里強李義山贈𤣥微先生詩丹房閉劔瑠璃匣錬丨紫翠丨身佩溪洛圖腰垂虎盤囊李白醮壇頭戴鹿胎皮身披鶴氅衣月寒丹井立霜白丨丨歸陳元老詩丹竈綵雲不散燒丨丨白鹿時藏種玉田錢起霞裳朝弄紫泥詔夕披丹丨丨揮手折若木拂此西日光李白月帔嵗計芝田熟晨裝丨丨寒李義山詩風餐丨丨委松栢雲卧恣天行選升天行霞起道士無白髪語音常泉清青松多夀色白石夜常明放步霽丨丨振衣華風生孟郊行氣道士寫將丨丨法家童授與步虚詞王建輕身茹芝鍊玉學丨丨元次山詩女道士事類金仙唐景雲元年睿宗第八女西成公主出家為女冠二年改封為丨丨本傳玉真唐睿宗第九女昌隆公主與西成並出家為女冠二年改封為丨丨長安輔興坊西南有丨丨女冠觀今云有修道之迹後人為之立堂同上飡花絕粒女道士黎瓊仙年八十而容色益少曽妙行夢瓊仙而丨丨丨丨麻姑記泛舟求師蜀女真謝自然泛海將詣蓬萊求師舟為風飄至一處山見道人指言天台山司馬子微名在丹臺身居赤城真良師也蓬萊隔弱水三萬里非舟楫可行非飛仙無以到自然乃回求子微受度後白日上升續神仙傳詩集學仙果州南充縣寒女謝自然童騃無所識但聞有神仙輕生學其術乃在金泉山繁華榮慕絶父母慈愛捐凝心感魑魅慌惚難共言一朝坐宫室雲霧生其間如聆笙竽韻來自冥冥天白日變幽晦蕭蕭風景寒簷楹氣明滅五色光屬聨觀者徒傾骸躑躅詎能前須㬰自輕舉飄若風中煙茫茫八紘大影響無由縁里胥上其事郡守驚且觀驅車領官吏甿俗争相先入門無所見冠屨同蛻蟬皆云神仙事灼灼信可傳韓愈步虚願隨仙女董雙成王母前頭作伴行初戴玉冠多誤拜欲辭金殿别稱名將敲碧落新齋磬却進昭陽舊賜筝旦暮焚香繞壇上丨丨猶作按歌聲項斯送宫人入道詩著帔街東街西講佛經撞鐘吹螺閙宫庭廣張罪福資誘脅聴衆狎恰排浮萍黄衣道士亦講說座下寥落如明星華山女兒家奉道欲驅異教歸仙靈洗粧拭面丨冠丨白咽紅頰長眉青遂來陞坐演真訣觀門不許人開扃不知誰人暗相報訇然震動如雷霆埽除衆寺人跡絶驊騮塞路連輜軿觀中人滿坐觀外後至無地無由聴抽釵脫釧解環佩堆金積玉光精熒天門貴人傳語召六宫願識師頗形玉皇頷首許歸去乗龍駕鶴來青冥豪家少年豈知道來繞百市脚不停雲牕霧閣事慌惚重重翠幔深金屏仙梯難攀俗縁重浪憑青鳥通丁寧戴巾吳江女道士頭丨蓮花丨霓衣不濕雨特異陽臺神足下逺遊履凌波生素塵倦尋向南嶽應見魏夫人李白送女士遊南岳乗龍駕鶴見上華山女著帔事騎鳳駕蟾不慚弄玉丨丹丨應逐嫦娥丨老丨東坡題延真觀唐玉真公主修道處道觀事類福區王璵建言唐家宜崇表丨丨招致神靈唐史靈境不死之福鄉養真之丨丨崔尚桐柏觀頌太微宫丨丨之丨列真之宇文選仙遊館列丨丨丨𤣥祖所居六帖璇臺玉樹唐辛替否傳銀宫金闕丨丨丨丨列仙攸館元租所居決疑經靈宫祕宇丨丨丨丨將尊道德之風宜廣神仙之宅出文選丹臺碧洞出道經又六帖珠庭琳館歐陽文集金榜瑶壇出唐文粹瑞雲靈跡唐顯德中世宗營道宫於城西二人發得石一片上有字題丨丨丨丨鎮梁東他日多應與古同天華上宫唐廣德初王璵建言請度昭應南山作丨丨丨丨京師𤣥都觀劉禹錫由和州刺史入為主客郎中復作遊𤣥都觀詩且言始謫十年還京師道士植桃其盛若霞又十四年過之無復一存唯兔葵燕麥動搖春風耳本傳長安玉真堂東坡延生觀詩自注云觀後上小山有堂玉真宫主修道之遺迹則此云小堂者玉真之堂也本朝端拱元年十月奉勑賜名玉真觀玻詩注南京鴻慶宫四聖神御在焉故朱文公謝表云舊邦香火有嚴四聖之真游文集嵩山崇福宫司馬公居洛嘗同范景仁過韓城抵登封憇峻極下院登髙頂入崇福宫會善寺華州雲臺觀陳摶隠武當山後居丨丨丨丨丨神仙傳臨安洞霄宫漢武帝元封間開創祥符改洞霄宫山有五洞交扃九峯回挹千岩萬壑秀聚其中在餘杭縣西真鏡録紹興鴻禧觀鑑湖在丨丨府城南東西二十里南北數里縈帶郊郭連屬峯岫白水翠岩互相映發若鑑若圖賀知章入道賜鑑湖一曲後以所居宅為觀始曰千秋今賜名千秋丨丨丨在湖上郡志隆興萬夀宫晉太康間許旌陽於洪州西山舉家四十二口拔宅上昇初旌陽學道於丹陽黄堂嘗以五色錦帷施於黄堂及旌陽上昇錦帷飛還故宅鄉人為立遊帷觀祥符改賜玉隆萬壽官額本記江州興國宫任廬山之隂唐九天使者祠明皇自言親見使者降於殿庭因立此祠今為太平興國宫郡志武夷沖佑觀丨丨山第十六昇真元化洞天昔有神仙降此曰武夷君統録地仙授館于此兩岸絶壁人迹罕到清溪九曲流出其間俗傳玉帝與太姥魏真人武夷君建幔亭綵屋數百間施雲裀紫霞褥宴鄉人男女千餘人於其上皆呼為曽孫酒行命奏賓雲之曲石壁上有室曰昇真洞洞上有神仙蛻骨莫計其數室前有黄心木棧又有四木船兩兩相覆亦盛仙骸半枕室棧不墜不壊其下曰丨丨丨遊仙者多自此買舟泝流而上觀之郡志成都玉局觀後漢永夀元年李老君與張道陵至此有局脚玉床自地而出老君昇坐為道陵說南北斗經既去而座隠洞中因成洞穴故以玉局名之彭乗記台州崇道觀此山代謂之天台真謂之桐柏髙万八千丈周旋八百里其山八重四面如一中有洞天號金庭宫即王子晉之所處唐有司馬鍊師承禎居焉連山峩峩四野皆碧茂樹欎欎四時常青大巖之前瀑布百丈故初搆天尊之堂晝日有雲五色微我錬師孰能興之唐崔尚碑今賜名崇道觀建昌仙都觀麻姑山去城十五里髙九里至山麓石磴盤旋山腰而上乍平乍峻至山之半有瀑布淙下三十餘丈又登髙巘旁有石池又百餘步入山門榜曰丹霞小有洞天其下有水簾岩有龍居之夾兩山間東望逺峯秀出如畫自是而入地勢寛平膏腴數百畝路之東南隅則碧蓮池坦途一望間即仙都觀乃蔡經宅麻姑王方平所㑹之處郡志詩集紫極宫何處聞秋聲蕭蕭北牕竹回薄萬古心攬之不盈掬静坐觀衆妙浩然媚幽獨白雲南山來就我簷下宿人從唐生訣羞向季主卜四十九年非一往不可復野情日蕭散世道有翻覆陶令歸去來田家酒應熟李白雲臺觀華嶽獨靈異草木常新鮮山盡五色石水無一色泉仙酒不醉人仙芝皆延年夜聞明星館時詠女蘿絃敬兹不能寐焚柏吟道篇孟郊桐柏觀深山丨丨丨殘雪路猶分數里踏紅葉全家穿碧雲月寒岩障曉風逺蕙蘭芬明日出林去吹笙不可聞同上山深地忽平縹緲見殊庭瀑近春風濕松多曉日青石壇遺鶴羽粉壁剥龍形道士王靈寳輕强滿百齡趙師秀詩玉臺觀中天積翠玉壺遥上帝髙居絳節朝遂有馮夷來擊鼓始知嬴女善吹簫江光隠見黿鼉窟石勢參差烏鵲橋更有紅顔生羽翼便應黄髪老漁樵杜甫洞霄宫上帝髙居愍世頑故留瓊館在凡間青山九鎖不可到作者七人相對閒亭下泉流翠蛟舞洞霄飛鼠白鴉翻長松恠石宜霜鬢不用金丹苦駐顔東坡又詩便欲洞霄為隠吏一庵閒地且相留仙都觀道士白髪尊面黒嵐氣染自言王方平學道古有驗道成白畫飛人世不留窆後有隂長生此地亦所占並騎雙翔龍霞綬紫雲䄡揚揚玉堂上與世作豐歉蘇子由詩空山樓觀何峥嶸真人王逺隂長生飛符御氣朝萬靈悟道不復誦黄庭龍車虎駕來不迎去如旋風摶紫清真人厭世不回顧世間生死如朝暮學仙度世豈無人飡霞絶粒長苦辛安得獨從逍遥君泠然乗風駕浮雲蘇東坡詩玉局觀拾遺被酒行歌處野梅官栁西郊路聞道華陽版籍中至今尚有城南社我欲歸尋萬里橋水花風葉暮蕭蕭芋魁徑尺誰能盡榿木三年已足燒百嵗風狂定何有羨君今作峨眉叟縱未家生執㦸郎也應世出埋輪手莫欺老病未歸身玉局他年第幾人會待子猷清興發還須雪夜去尋君東坡送戴蒙赴成都玉局歌玉局祠官殊不惡銜如清冰俸如鶴酒壺釣具常自隨五尺新蓬織青蒻倚樓看鏡待功名半世兒癡晚方覺何如醉裏泛桐江長笛一聲吹月落蔣公新冡石馬髙謝公飛觀詩旐臨秋濤微霜莫遣侵髸緑如今二十四考書玉局陸務鴻慶宫舊宫原廟久煙塵白髪祠官感慨新北望千門空引籍不知何日去朝真朱文公有感神仙居山行似覺鳥聲殊漸近神仙簡寂居門外長溪容浄足山腰苦笋助槃蔬喬崧定有藏丹處大石仍存拜斗餘弟子蒼髯年八十養生世世授遺書東坡澹泊境獨宿丨丨丨杳然心事空愛兹清溪月復有三松風内慮茍不息外縁乃無窮能知静黙理可與論幽通張少遇詩石殿雨龍首聳江上上峩曽城宫仙源暗霧雨石殿鳴松風天際白雲起人間神鼎空飄飄見遺像還欲駕㝠鴻同上齋壇月參差樓閤半天中六月清風百尺松隠約丨丨低曉丨五雲深處一聲鍾尹介叔詩煙霞逺石壁髙千尺微蹤逺欲無飛簷如劔寺古柏似仙都洞府丨丨丨人間爪髪枯飄飄乗到景誰復顧遺軀東坡笙簫下道人幽夢曉初還已覺笙簫下月壇風伯前驅清宿霧祝融參乗破朝寒英姿連璧從多士妙向鏘金和八鸞已向禁臣得頗牧路人莫作老儒看東坡紫臺髙丨丨丨不極清溪千仭餘壇邊逢藥銚洞裏閱仙書庭舞經乗鶴池游被控魚梢昏薤葉斂欲暝槿花疎陳隂鏗綵雲駐浩刼因王造平臺訪古遊丨丨蕭史丨文字魯恭留宫闕通羣帝乾坤到十洲人傳有笙鶴時過北山頭老杜山頂稻田浮雲有意藏丨丨流水無聲入丨丨古木微風時起籟諸峯落日盡藏煙東坡泉聲樹色朝莫丨丨落寒暄丨丨同凊猿不可聴偏在九秋中皇甫冉詩蘂珠金字閒開丨丨殿暗閱丨丨經唐元禎詩鬱藍瓊室上有丨丨天垂光抱丨丨杜甫恩命事類墨勅授官唐元宗時葉法善授銀青光禄大夫中宗時墨勅以鄭普思為祕書監葉静能入直翰林為國子祭酒唐書特㫖封公唐元宗時葉法善封越國公後周武帝時衛元嵩封蜀郡公事物紀原加賜紫衣唐中宗神龍初加葉静能金紫之階未領紫衣代宗時李泌乞為道士賜紫衣道士賜紫自李泌始事物紀原賜號先生唐王知逺號昇元先生元宗時賜李含光曰𤣥静先生同上解化事類解形丨丨而遺世乗白雲而丄賓陳子昂鍊蛻尸解本真人之丨丨也五屬之隠適也寳劍上經羽化晉許邁游名山採藥後莫知所終好道者皆謂之丨丨本傳蟬拆劉合還丹成而上之及卒惟有空皮而背上開拆有如蟬蛻本傳尸如空衣葛洪卒年八十一視其顔色如生體亦柔軟舉丨入棺甚輕丨丨丨世以為尸解晉書形如生人丨丨丨丨者尸解也足不青皮不皺者尸解也日光不落無異生人者尸解也集仙録詔作仙郎侯道華晨起飛在松頂揮手謝衆曰玉皇詔我為仙臺郎今去矣續仙傳召補仙官丞相王徽姪女幼年慕道持經撫琴嘗曰洞宫有丨命當丨丨丨遂題一詩是夕奄然而終明月雙鶴音樂異香滿野舉衣就木空衣而已詩見後詩集鶴飛翫水登山無足時諸仙頻下聴琴詩此心不戀居人世唯見天邊雙丨丨王徽之姪女事見前蟬蛻見前女道士類古今合璧事類備要前集卷五十一
