body:
  text: 古今合璧事類備要前集卷三十一宋謝維新撰嗣續門子道事類親枝身也者丨之丨也敢不敬與不能敬其身是傷其親傷其親是傷其本記哀公問遺體身者父母之丨丨也行父母之丨丨敢不敬乎祭義父隂子者丨之丨也西漢杜欽傳家督家有長子曰丨丨史越世家幹蠱丨父之丨丨母之丨易傳重正體於上又將所以丨丨也儀禮為子夫丨人子者三賜不及車馬所遊必有常所習必有業常言不稱老居不主奥坐不中席行不中道立不中門不登髙不臨深不茍訾不茍笑不服闇不登危懼辱親也父母存不許友以死不有私財曲禮事親丨丨有隱而無犯左右就食无方服勤至死致䘮三年檀弓予之丨丨有三道焉生則養没則䘮䘮畢則祭祭統愛敬母取其丨而君取其丨兼之者父也孝經父母之所愛愛之父母之所敬敬之至於犬馬亦然内則喜懼父母之年不可不知也一則以丨一則以丨語冬温夏凊凡為人子之禮丨丨而丨丨昏定而晨省曲禮色愉容婉孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容祭義應父母命在父母之所有命之應唯敬對不敢噦噫嚔咳欠伸跛倚内則父命呼唯而不諾手執業則投之食在口則吐之走而不趨玉藻諫父母過父母愛之喜而不忘父母惡之懼而无怨父母有過諫而不逆祭義事父母幾諫見志不從又敬不違勞而不怨語予之事親也三諫而不聽則號泣而隨之記曲禮父母有過下氣怡色柔聲以諫諫若不入起敬起孝説則復諫内則舉足不忘一丨丨而丨敢丨父母是故道而不徑舟而不游不敢以父母之遺體行殆一出言而不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親祭義有善則稱善則稱親過則稱已坊記思貽令名父母雖没將為善丨丨父母丨丨必果將為不善思貽父母羞辱必不果内則不遺惡名父母没謹行其身丨丨父母丨丨可謂能終矣祭義不敢許人聶政曰母在政身未敢以許人也通鑑不願為弟李密曰為人子者願為人兄丨丨丨人丨兄事親之日長弟事親之日短蜀志事實並詳見前父子母子類有子附不肖子互見前父子類事類克家子丨丨易蒙卦裕蠱幹父之蠱丨父之丨蠱卦克紹丨丨先烈書冏命是似維其有之丨以丨之詩裳華幸哉有子國人稱願然曰丨丨丨丨如此所謂孝也已祭義必有是子有是父丨丨丨丨弓冶箕裘良冶之子必學為裘良弓之子必學為箕樂記瑶環瑜珥姆抱㓜子立側眉眼如畫髪漆黒肌肉玉雪可憐娟好靜秀丨丨丨丨蘭茁其芽稱其家兒韓愈撰馬公墓誌才子八人昔髙陽氏有丨丨丨丨謂之八愷髙辛氏有丨丨丨丨謂之八元此十六族也世濟其美五世一子自季至雄丨丨而傳丨丨故雄无它揚於蜀揚雄傳欲如孫䇿袁術見孫䇿嘆曰使術有子如孫郎死復何恨東漢同上當如仲謀曹公攻濡須塢孫權拒之乘輕船入曹公軍還作鼓吹公見整肅歎曰生子丨丨孫丨丨劉景升兒子若豚犬耳呉志梁帝曰生子當如李亞子克用為不亡矣吾兒豚犬耳五代必興呉門陳群為兒時祖寔謂宗人曰此兒丨丨丨丨當為國器髙孝基見房𤣥齡曰僕閲人多矣未有如此郎者丨丨丨丨但恨不見其聳壑昻霄耳一不為少梁陸瓊㓜聰慧從祖襄歎曰此兒必荷門基所謂丨丨丨丨褚彦囘嘗謂任昉父曰聞卿有令子相為喜之所謂百不為多丨丨丨丨各得所長顔延之少有令名晉穆帝問曰諸子誰得卿風延之曰竣得臣筆測得臣文奐得臣義姓氏英賢録栁氏有子栁宗元少精敏逮其父時雖年少已自成人能取進士第嶄然見頭角衆謂丨丨丨丨矣墓誌蘇家有子丨詵十餘嵗彊學有成人風頲曰吾丨丨丨餘慶令子鄭丨丨子涵為右補闕敢言无所諱憲宗謂餘慶曰涵卿丨丨而朕直臣也可更相賀挺之真子嚴武母裴氏不為其父所答獨厚其妾英武奮然以鐵槌就英寢碎其首挺之竒之曰真嚴挺之子新唐書荀氏八龍荀淑有子八人並有名稱時人謂之八龍王氏九龍王昕生九子並風流醖藉世號丨丨丨丨竇氏五桂見及第類韓氏八龍丨忠憲八子時以比荀丨丨丨詳見教子類不肖子弗肯弗荷其父析薪其子丨丨丨丨左不知艱難厥子乃丨丨稼穡之丨丨書无逸弗念厥紹丨丨丨丨抑乃弗肯播若考作室既底法厥子乃弗肯堂矧肯構厥父菑厥子丨丨丨丨矧肯獲其肯曰予有後弗棄基大誥四凶不才帝鴻氏有不才子掩義隱賊好行凶德醜類惡物頑嚚不友是與比周謂之渾敦少皥氏有不才子毁信廢忠崇飾惡言靖譖庸回服讒蒐慝以誣盛德謂之窮竒顓頊氏有不才子不可教訓不知話言告之則頑舍之則嚚傲狠明德以亂天常謂之檮杋此三族也世濟其凶縉雲氏有不才子貪於飲食冒於貨賄侵欲崇侈不可盈厭聚歛積實不知紀極不分孤寡不恤窮匱天下之民以比三凶謂之饕餮舜臣堯賔於四門流凶族投四裔以禦魑魅左文二子不肖堯之子不肖丹朱舜之子亦不肖商均不辨菽麥程滑殺厲公荀罃士魴逆周於京師而立之周子有兄而無慧丨能丨丨丨故不可立注豆麥殊形易别故以為癡者之候不慧盖世所謂癡左桓温第四子禕丨丨丨丨本傳不識金鋌梁廬陵王續之子應不慧王薨至庫門閲珍物見金鋌問左右曰此可食否答曰不可應曰既不可食並總乞汝怒子不敬丙吉子顯少為諸曹嘗從祀髙廟至夕牲乃使出取齊衣丞相吉大怒謂其夫人曰宗廟至重而顯不敬謹亡吾爵者必顯也甘露中有罪削爵為關内侯愧子失禮後漢太原王覇妻不知誰氏覇立髙節與同郡令狐子伯為友子伯為楚相而其子為郡功曹子伯令子奉書於覇車馬服從雍容如也覇子方耕於野聞客至投耒而歸見令狐子沮怍不能仰視霸目之有愧色客去卧不起妻怪其故覇曰吾與子伯素不相若向見其子容貌甚光舉措有適我兒曹逢髮歴齒未知禮則父子恩深不覺自失耳妻曰君少修清節不顧榮禄今子伯之貴孰與君之髙柰何忘初志而慙兒子乎覇屈起而笑曰有是哉遂共隠遁終身肆通饋遺見前父子門不私其子下注恣行貪暴狄仁傑為魏州刺史有惠政百姓為之立生祠後其子景暉為魏州司空參軍貪暴人患焉遂毁其像妄竄史字韓昶退之子也性闇劣為集賢校理史傳有金根車㫤以為誤悉改根字作銀字尚書故實謬引書句中宗嘗召宰相蘇瓌李嶠子進見頲曰木從繩則正后從諫則聖嶠子迹曰斮朝渉之脛剖賢人之心上曰蘇瓌有子李嶠無兒唐史餘見前門閥子弟類詩集八慈我似老牛鞭不動雨滑泥深四蹏重汝如黄犢走却來海濶山髙百程送庶幾門户有丨丨不恨居鄰无二仲他年汝曹笏滿床中夜起舞踏破甕㑹當洗眼看騰躍莫指癡腹笑空洞譽兒雖是老翁癖積德已自三世種豈惟萬一許生還尚恐九十煩珍從六子晨耕簞瓢出衆婦夜績燈火共春秋古史乃家法詩筆離騷亦時用但令文字還照世糞土腐餘何足夢東坡寄予姪拾得黄童三尺世无雙筆頭衮衮懸秋江不憂老子難為父平生崛强今心降我來喜共阿戎語應敵縱横如急雨生子還如孫仲謀豚犬謾多何足數黄家小兒名丨丨眉如長松眼如漆只今數嵗已動人老人留眼看他日笑君老蚌生明珠自笑此物吾家無君當置酒吾當賀有兒傳業更何須蘇子贍贈山谷子訓子附母訓事類式榖教誨爾子丨丨似之小宛以正公孫丑問曰君子之不教子何也孟子曰勢不行也教者必以正丨丨不行繼之以怒則反夷易也矣夫子教我以正夫子未出於正也則是父子相夷也父子相夷則惡矣古者易子而教之父子之間不責善責善則離離則不祥莫大焉離婁下導之以道君子之於子愛之而勿面使之而勿貌丨丨丨丨而勿彊荀大畧謹無為善人有教其子曰爾行矣丨丨丨丨曰不為善將為不善耶應之白善且猶弗為况不善乎此全其天器者也淮南子孔庭詩禮陳亢問於伯魚曰子有異閒乎曰嘗獨立鯉趨而過庭曰學詩乎對曰未也鯉退而學詩云云鯉退而學禮陳亢退而喜曰問一得三聞詩聞禮又聞君子之逺其子也語石氏義方衞莊公之子州吁有寵而好兵公弗禁石蜡諫曰臣聞愛子教之以義方不納於邪左隠三年教忠能仕晉懷公命无從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也䇿名委質貳乃辟也今臣之子名在重耳有年數矣若又召之教之貳也父教子貳何以事君乃殺之僖二十二教謟不聽陳萬年子咸數言事譏刺近臣萬年病召咸戒床下語至半夜咸睡頭觸屏萬年大怒曰乃公教戒汝汝反不聽吾言何也咸曰其曉所言大要丨咸丨也萬年乃不復言不如一經韋賢字長孺子𤣥成字少翁俱以明經位至丞相故語曰遺子黄金滿籝丨丨教子丨丨齊栁世隆盛多墳典張緒曰觀君舉措當以清名遺子孫耶答曰一身之外亦復何須子孫不才將為爭府知其才也丨丨丨丨各守一藝鄧禹有十三男丨命丨丨丨晉劉殷有七子五子各授一經一子授太史公一子授漢書一門之内七業俱成北方之學殷門為盛晉書馮奉世子野王通詩次逡通易次立通春秋次參通尚書勸效賢德馬援戒其子曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不得言也好議論人長短妄是非政法此吾所大惡也寧死不願聞子孫有此行也龍伯髙端厚周謹口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所失吾愛之重之不願汝曹效也效伯髙不得猶為謹勅之士所謂刻鵠不成尚類鶩也效季良不得䧟為天下輕薄子所謂畫虎不成反類狗也本傳教慕時望王昶明帝時為揚威將軍嘗為書誡其子及兄子曰吾與時人從事雖出處不同然各有取頴川郭伯益好尚通達敏而有知其為人洪曠不足輕貴有餘得其人重之知山不得其人忽之如草吾以是親之昵之不願兒子為之北海徐偉長不沽髙名不求茍得澹然自守惟道是務其有所是非則託古人以見意當時無所褒貶吾欽之重之願兒子師之東平劉公幹博學才髙識遠有大意然性行不均少所拘忌得失足以相輔吾愛之重之不願兒子慕之樂安仟昭先淳粹履道内敏外恕推遜恭謙處不避汚而義勇在朝忘身為國吾友之善之願兒子遵之蜀三國志教懲盈溢後漢樊宏丨子曰富貴盈溢未有能終者吾非不喜榮勢也保全身已豈不樂哉本傳戒以行已栁玭嘗戒其子曰凡門地髙可畏不可恃立身行已一事有失則得罪重於他人死无以見先人於地下門髙則驕心易生族盛則為人所嫉懿行實才人未信之少有疵纇衆皆指之唐本傳戒不為惡范滂謂其子曰吾欲使汝為惡惡不可為使汝為善則我不為惡通鑑誨使知遜朱仁軌嘗誨子弟終身遜路不枉百歩終身遜畔不失一段唐書怒其驕傲顔延之嘗早詣竣見賔客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能乆乎戒以保持王昶戒其子曰未有干名要利不厭而能保世持家永全福禄者也魏書以書垂誡鄭𤣥以書戒子益恩曰入此嵗來已七十矣家事大小汝一承之家令頗多於昔勤力務時無恤飢寒菲飲食薄衣服尚可令吾寡恨因名示訓王昶名其兄子曰黙曰沈名其子曰渾曰深為書戒之曰吾以四者為名欲使汝曹顧名思義不敢違越夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆冬不衰夫能屈以為伸讓以為得弱以為强鮮不遂矣通鑑魏紀屏風書誡房𤣥齡恐諸子驕侈集吉今冢誡書為丨丨令各取一其曰留意於此足以保躬矣家令著訓穆寧居家嚴嘗譔丨丨訓諸子人一通乂戒曰君子之事親養志為大吾志直道茍枉而道三牲五鼎非吾養也先是韓休家訓子姪至嚴正元間言家法者尚韓穆六帖不教吏職漢薛宣子惠為彭城令宣過其縣橋梁郵亭不修宣心知惠不能留數日終不問惠以吏事惠知不稱宣意使掾送宣令掾自從其所問宣以丨丨戒惠丨丨之意宣笑曰吏道以法令為師可問而知自有資才何可學也常講家法栁公綽最名冇家法中門東有小齋自非朝謁之日每平旦輙出至小齋諸子仲郢皆束帶晨省於中門之北公綽决私事接賔客與弟公權及羣從弟再㑹食自旦至暮不離小齋燭至則命子弟一人執經史躬讀一過乃講議居官治家之法或論文或聴琴至人定鐘寂然後歸寢諸子皆昏定於中門之内教以讀書百世小人知讀論語孝經尚為人師雖千載冠冕不曉書記者莫不耕田養馬若能保數百卷書終不為小人也諺曰積二千萬无過讀書顔氏家訓鄭奕嘗以文選教其子其兄曰何不教他讀孝經論語免學他沈謝嘲風詠月污人行止外史勉使勤學唐劉贊父玭為縣令贊始就學衣以青布衫襦每食則自肉食别以蔬食食贊牀下曰肉食君之禄也爾欲之則勤學以干禄吾食非爾之食也由是贊力學舉進士五代崔光悌之子鴻强冠有著述拜給事中光悌謂次子曰阿鴻已摩天去汝可不勉哉元魏戒子安分韓忠憲丨其丨曰窮達禍福則有定分枉道以求之徒䘮所守切勿為也余以孤忠自信未嘗有因緣憑藉而每遭人主為知已今忝三公所恃者公道與神明而已焉可誣也唐介一日自政府歸語諸子曰吾備位政府知无不為桃李固未嘗與汝等栽培而荆棘則甚多矣然汝等窮達亦自有命惟自勉而已湘山録燕客索杖韓忠憲億教子嚴肅知亳州第二子舍人自西京倅謁告省勤康公與右相及姪柱史宗彦皆中甲科歸公喜置酒召僚屬之親厚者俾諸子坐於席隅惟持國多深思知必有義方之訓託疾不赴坐中忽云二郎吾聞西京有疑獄奏讞者其詳云何舍人思之未得已訶之再問未能對遂推案索杖大詬曰汝食朝廷厚禄倅貳一府事无巨細皆當究心大辟奏案尚不能記則細務不舉可知吾在千里無所干預猶能知之爾叨冒廪禄何顔報國必欲撻之衆賔力解方已諸子股栗家法之嚴如此所以多賢子孫也忠憲八子曰綱綜絳繹緯縝維􅒺絳縝皆宰相維門下侍郎蘇氏家訓教子誠實司馬公云光五六嵗弄胡桃女兄欲為脱其皮不得女兄去一婢以湯脱之女兄復來問脱胡桃者光曰自脱也先公適見之訶曰小子何得謾語自是不敢謾語後公以誠教學者曰從不妄語入是也邵氏後録戒婢往來丁彦輔云予昔官洛陽有外醫媪張氏公卿士人家无不到説富鄭公治家嚴肅有二子舍凡使女僕軰戒不得互相往來閨門肅如也塵史母訓詳見前母子類擇鄰處子孟軻母其舍近墓孟子少嬉遊於墓間為其事母曰此非吾所以處子也乃去舍市傍其嬉戲乃賈人衒賣之事又曰此非所以處子也復徙舍學宫之傍其嬉戲乃設俎豆揖遜進退母曰此真可以居吾子遂居焉列女傳斷機勉學孟軻母三徙孟子學而歸母問學所至孟子自若也孟母以刀丨丨曰子之廢學若吾斷織孟子懼勤學不息遂成名儒買肉示信孟子少時聞東家殺猪問母何為曰欲啖汝既而母悔曰吾嘗教以割不正不食席不正不坐今適有知而欺之是教之不信也乃丨鄰猪丨以食之韓詩外傳和膽助勤栁仲郢㓜嗜學母嘗丨熊丨丸使夜咀嚥以丨子丨唐本傳持金易書唐孟昌王弟麴智湛入朝位驍騎大將軍其子昭好學有鬻異書母顧笥中金曰何愛此不使子有異聞乎遂持易之輟膳勸學趙武孟少遊獵以所獲饋其母母泣曰汝不好書而傲蕩吾安望哉不為食躬加訓導顔真卿師古五世從孫少孤母商丨丨丨丨既長博學工辭章孔若思早孤其母躬加訓教長以博學聞老猶箠敕李景讓母鄭治家嚴躬訓教諸子始貧之時治墻得積錢僮婢奔告母曰士不勤而禄猶灾其身况无妄而得我何取亟使閉坎及景讓為浙西觀察使母問行日景讓率然對有日鄭怒其不嘗告曰己貴何庸母行景讓請罪乃赦雖丨丨加丨丨也已起欣欣如初景讓嘗怒牙將杖殺之軍且謀變母欲息衆讙召景讓責將鞭其背吏大恐再拜請不許皆泣謝乃罷一軍遂定王大司馬母魏夫人性甚嚴王在湓城時為三千人將年逾四十少不如意猶捶撻之故能成其勲業顔氏家訓訓子修潔崔元暉為軍校員外郎母盧氏戒之曰吾見辛𤣥馭云兒子從宦者聞有人來云貧乏不能自守此是好消息吾聞貨資充足衣馬輕肥此是惡消息吾重此言今坐食俸禄若不能忠清何以戴天履地特加修潔勿累吾此意也職官分紀戒子謟佞王琚始為中書侍郎母居洛陽來京師讓琚曰爾家上世皆州縣職今汝无攻城野戰勞以謟佞取容海内切齒吾恐汝家墳墓旡人復掃除也琚卒不免訓子有法吕滎公希哲字原明申國正獻之長子正獻公居家簡重寡黙不以事物經心而申國夫人性嚴有法雖甚愛公然教公事事循蹈規矩甫十嵗祁寒盛暑倚立終日不命之坐不敢坐也日必冠帶以見長者平居雖盛熱在父母長者之側不得去巾襪縛袴衣服唯謹行歩出入无得入茶肆酒肆市井里巷之語鄭衞之音未嘗一經於耳不正之書非禮之色未嘗一接於目正獻公與申國夫人教訓之嚴如此故公德器大異於人聽客與語張密學奎弟密省亢母宋氏白之族也親教督二子讀書客至輙於窻間丨之丨與其子論文學政事則為之設殽饌或閑話諧謔則不設也後二子皆登第奎少嗜酒嘗有酒失母怒欲笞之遂不復飲終身涑水秤槌投足冦萊公凖少時不修小節頗愛飛鷹走犬太夫人性嚴每不勝怒舉丨丨丨之中丨流血由是折節從學及貴母已亡每捫其瘡痕輙哭記聞杖碎金魚陳堯咨善射號小由基及守荆南回其母馮夫人問汝典郡有何異政堯咨曰每以弓矢為樂母曰汝父教汝以忠孝輔國家今汝不務行仁化而專務一夫之勇豈汝父之志耶丨之丨其丨丨燕談詩集詩示宗武覔句新知律攤書解滿牀試吟青玉案莫帶紫羅囊假日從時飲明年共我長應須飽經術已似愛文章十五男兒志三千弟子行曽參與游夏達者得升堂杜甫詩諭龜兒憐渠已解弄詩章揺膝支頤學二郎莫學二即吟太苦纔年四十鬢如霜白居易陶潛責子白髪被兩鬢飢膚不復實雖有五男兒總不好紙筆阿舒已二八懶惰故无匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覓棃與栗天運茍如此且進杯中物盧仝寄男别來三得書書道違離乆書處甚麄殺且喜見汝手殷十七又報汝文顔新有别來纔經年囊盎未合斗當是汝母賢日夕加訓誘尚書當畢功禮記速須剖嘍囉兒讀書何異摧枯朽尋義低作聲便可飬年夀莫學村學生麄氣强呌吼下學偷工夫新宅鋤藜莠乘凉勸奴婢園裏耨葱韮逺離編榆棘近眼栽桃栁引水灌竹中蒲池種蓮藕澇漉蛙䗫脚莫遣生科斗竹林吾最惜新筍好看守萬籜包龍兒攅迸溢林藪吾眼恨不見心腸痛如搊宅錢都未還債利日日厚籜龍正稱寃莫殺入汝口丁寧囑託汝汝活籜龍否殷十七老儒是汝父師友傳讀有疑誤輙告咨問取兩手莫破拳一吻莫飲酒莫學捕鳩鴿莫學打鷄狗小時无大傷習性防已後頑發苦惱人汝母必不受任汝惱弟妹任汝惱姨舅姨舅非吾親弟妹多老醜莫惱添丁郎淚子作面垢莫引添丁郎赫赤日裏走添丁郎小小别吾來乆乆脯脯不得喫兄兄莫撚搜他日吾歸來家人若彈糾一百放一下打汝九十九寄男抱孫昌黎訓子木之就規矩在梓匠輪輿人之能為人由腹有詩書詩書動乃有不勤腹空虚欲知學之力賢愚同一初由其不能學所入遂異閭兩家各生子提孩巧相如少長聚嬉戲不殊同隊魚年至十二三頭角稍相疎二十漸乖長清溝映汚渠三十骨骼成乃一龍一豬飛黄騰踏去不能顧蟾蜍一為馬前卒鞭背生蟲蛆一為公與相潭潭府中居問之何因爾學與不學歟金璧雖重寶費用難貯儲學問藏之身身在則有餘君子與小人不係父母且不見公與相起身自犂鋤不見三公後寒飢出無驢文章豈不貴經訓乃菑畬潢潦無根源朝滿夕已除人不通古今馬牛而襟裾行身䧟不義况望多名譽時秋積雨霽新凉入郊墟燈火稍可親簡編可卷舒豈不旦夕念為爾惜居諸恩義有相奪作詩勸躊躇符讀書城南康節生男我今行年四十五生男方始為人父鞠育教誨誠在我夀夭賢愚係於汝我若夀年七十嵗眼前見汝二十五我欲願汝成大賢未知天意肯從否聞見録愛子附知子昧於知子事類顧復撫我育我丨我丨我出入腹我詩蓼莪恩勤丨斯丨斯鬻子之閔斯鴟鴞天屬之親林回棄千金之璧負赤子而趨彼以利合此以天屬丨丨丨丨窮廹禍患相收也莊義方之教見前教子類偏愛少子左師觸讋見太后曰老臣賤息舒祺最少臣切憐之願補黒衣之闕太后曰丈夫亦愛少子乎對曰甚於婦人戰國䇿喜譽家兒王福畤五子勔勮勃助勸皆以文顯嘗詫於韓彦思彦思戲之曰武子有馬癖君有譽兒癖王家癖何多耶著載車中陳太丘詣荀季和長文尚少丨丨丨既至荀致酒文若亦小着膝前詳見前殳子類抱置膝上王坦之字文度父述愛之雖長大猶丨丨丨丨為桓温長史温欲為子求婚於述坦之因言温意述大怒遂排下曰汝竟癡耶述傳老牛䑛犢見後䘮子類犢子破車石季龍少時數彈人石勒白母欲殺之母曰快牛為丨丨時多能丨丨汝當小忍之勒乃止晉書載記不與講論晉謝朗總角時病新起體羸未堪勞嘗於叔父安前與沙門支遁講論遂至相苦母王氏出云新婦一生所寄惟在此兒因流涕抱去安謂座客曰家嫂詞情慷慨恨不使朝士見之失於教義梁元帝時有一學士聰敏有才為父所寵失於教義一言之是徧於行路終年譽之一行之非揜藏文飾冀其自改年登婚宦暴慢日滋竟以言語不擇為周逖拍腸釁鼓云顔氏家訓知子知子可任祁奚請老晉侯問嗣曰午也可知子必敗趙括少學兵法父奢不能詰然不謂善曰兵死地而括易言之敗趙者必括也趙王以括為將代廉頗藺相如曰括徒能讀其父書傳不知合變及括將行母上書願王勿遣即有不稱妾得无隨坐乎宋維父弁嘗曰維性疎險必敗吾家梁髙祖紀仁剛伍奢曰尚為人仁呼必來員為人剛戾能成大事史知子奢儉陶朱公中男殺人囚於楚朱公曰吾聞千金之子不死於市令其少子往視之長男曰家有長子曰家督乃遣少弟是吾不肖也欲自殺其母為言朱公不得已而遣長子長子竟持其弟䘮歸朱公笑曰吾固知必殺其弟也彼非不愛固有所不能忍也是少與我俱見其為生難故重棄財至如少弟生而見我富乘堅駈良逐狡豈知財所從來故輕棄之非所惜吝前日吾所欲遣少子固為其能棄財故也而長者不能故卒以殺弟事之理也史記知子不材張安世長子千秋與霍光子禹俱隨范明友擊烏桓還謁大將軍光問千秋戰鬬方略千秋曰對兵事盡地成圖无所忘失問禹禹不能記光由是賢千秋以禹為不材知子多欲見父子類不私其子下注知子能文京兆尹訪蘇瓌既去瓌令男頲詠尹字乃詠曰尹雖有足甲不成身見君无口知伊少人其敏㨗如此明皇問瓌草書難其人誰可瓌曰臣不知其他臣男頲為文甚速可備使令授筆立就明皇撫背曰知子莫若父明皇雜録知子有得見前子道類各得所長知子才顯索靖子綝少有逸羣之略靖每曰綝廊廟之才州郡不足汚吾兒也後至尚書左僕射晉書知子名著王獻之七八歲時學書羲之密從後掣其筆不得嘆曰此兒後當復有大名晉本傳知子早成諸葛亮與兄瑾書曰瞻今已八歲而聰慧可愛嫌其早成恐不為重器耳蜀志知子難為陳元方季方共論其父寔因曰元方難為兄季方難為弟世説知子必富石崇司徒苞之㓜子生於青州故小名齊奴少敏慧有謀苞臨終分財物與諸子獨不及崇其母以為言苞曰此兒雖小後能自得及為荆州刺史刼遠使商客致富不貲知兒必貴唐王珪少與房杜善母李曰兒必貴然未知所與遊者何如人知子當興梁彦光岐嶷其母謂所親曰此兒有風骨當興吾家北史知子有能見愛子類犢子破車下注昧於知子不知子能陳思王植太祖常視其文曰汝倩人耳植跪曰固當面試時建鄴銅雀臺新成太祖將諸子登使各賦植援筆立成太祖甚異之不為父知山簡濤之子也簡歎曰吾年幾三十而不為家公所知遇以常兒謝惠連初有奇才不為父方明所知族兄靈運謂方明曰阿連才悟如此而尊作常兒遇之畜以豚犬萬廻師神若愚癡雖父母亦以豚犬畜之兄戍役安西音問隔絶忽一日朝往夕返曰兄平善發書視之乃兄手迹其家以萬里而迴故號萬廻開元傳信記博學不知段文昌鎮成都子承式好獵丞相患之承式以所獲雉分送幕僚各致書援引故事甚悉僚幕多不曉其義以呈丞相方知其子博學説聞録受賄不知令狐綯執政歲久子滈頗招權丨丨言事者攻其短綯為子訟寃通鑑詩集添丁春風苦不仁呼逆馬蹄行人家慚愧瘴氣却憐我人我憔悴骨中為生涯數日不食强起行何忍索我抱看滿樹花不知四體正困憊泥人啼笑聲呀呀忽來案上翻墨汁塗抹詩書如老鴉父憐母惜摑不得却生癡笑令人嗟宿舂連曉不成米日髙始進一碗茶氣力龍鍾頭欲白憑仗丨丨莫惱爺盧仝唐人多傳盧仝因留宿王涯第中遂預甘露之禍仝老无髪奄人於腦後加釘焉人以為丨丨之讖或言好事者為之仝處士於人无怨何為有此謗然平時切齒元和逆黨月蝕一詩膾炙人口意者羣奄以此害之驕兒况我墮胡塵及歸盡華髮經年至茅屋妻子衣百結慟哭松聲逈悲泉共幽咽平生所丨丨顔色白勝雪見爺背面啼垢膩脚不襪牀前弱小女補綻纔過膝海圖拆波濤舊綉移曲折天吳及紫鳯顛倒在短褐老夫情懷惡嘔泄卧數日那无囊中帛救汝寒凜慄粉黛亦解包衾裯稍羅列瘦妻面復光癡女頭自櫛學母无不為曉粧隨手抹移時施朱鈆狼籍畫眉闊生還對童稚似欲忘飢渴問事競挽鬚誰能即嗔喝翻思在賊愁仕受雜亂聒新歸且慰意生理焉得説杜甫著潛夫論中年舉兒子謾種老生涯學語轉春鳥塗窻行暮鴉欲嗔王母惜稍慧女兒誇解丨丨丨丨不妨无外家黄魯直嘲小德誦老夫詩驥子好男兒前年學語時問人知客姓丨得丨丨丨杜甫古今合璧事類備要前集卷三十一
