body:
  text: 古今合璧事類備要别集巻六十七宋謝維新撰飛禽門鸚鵡附秦吉了時樂鳥格物總論鸚鵡能言鳥有慧性大如鵲朱咮鈎吻翠頂金眼𤣥項碧羽頳足翠尾尾長凡鳥四指三向前一向後此獨兩指向前兩指向後行則以口啄地然後足從之言語音圓滑亦最惜毛羽喜潔淨惡垢汙又有白者秦吉了大約似鸚鵡腦有黄肉冠時樂鳥丹首紅臆朱冠綠翼鶯領文背糅以五色與鸚鵡狀亦同而毛尾全異其心聰慧䕶主報恩尤非凡禽比鳴云天下太平有道則見皆嶺南所産靈鳥也事類靈禽鸚鵡西域丨丨兩指向前也異物志惠鳥郭璞鸚鵡贊願先生賦後漢禰衡字正平少有才辯而尚氣傲曹操欲見之不肯操不欲殺之送劉表復侮慢表不能容以江夏太守黄祖性急故送衡與之祖長子射為章陵太守尤善於衡射大會賓客人有獻鸚鵡者射舉札於衡前曰丨丨丨丨之攬筆而作辭彩甚麗後黄祖殺之本傳詔羣臣賦宋元嘉二十一年湘州獻赤鸚鵡丨丨丨為丨之白氏帖獻能言鳥丨丨丨丨注鸚鵡漢異物志獻能歌鳥宋天監二年丨丨丨丨不納白氏帖令歸本土漢興平元年益州獻鸚鵡三隻日夜食三升麻子今穀貴此鳥無益有損可付安西將軍楊定國丨丨丨丨同上詔付使者貞觀五年新羅獻女樂二太宗曰北林邑獻鸚鵡數言思鄉丐還况於人乎丨丨丨丨歸之孔氏帖名白頭翁諸葛恪在呉主座有鳥飛過恪曰白頭翁張昭在座疑恪譏之乃曰恪欺陛下不聞有鳥丨丨丨丨若有請覓白頭母恪聞鳥有鸚鵡請覓鸚父昭不能對白氏帖呼白鸚鵡韓渥與姚洎皆為翰林學士從昭宗幸岐渥每與兩敇使會棊兩使稍不勝洎即以手壞之渥丨為丨丨丨金鸞記教啄鸇脚張華有白鸚鵡華每出行還輒説僮僕善惡後遂無言華問其故鳥云見藏甕中何由得知公後在外令喚鸚鵡鸚鵡曰昨夜夢惡不宜出户公猶强之至庭為鸇所搏丨其丨丨丨獲免大如鴨母廣州一根社出鸚鵡五色曾見其白色者大如鴨母白氏帖呼雪衣娘開元中嶺南獻白鸚鵡養之宫中嵗久頗聰慧洞曉言辭上及貴妃皆呼雪衣娘性既馴擾常縱其飲啄飛鳴然亦不離屏幃間上令以近代詞臣詩篇授之數遍便可諷誦上每與貴妃及諸王博戲上稍不勝左右丨丨丨丨必飛入局中鼓舞以亂其行列或啄嬪御及諸王手使不能爭道忽一日飛上貴妃鏡臺語曰雪衣娘昨夜夢為鷙鳥所搏將盡於此乎上使貴妃授以多心經記誦頗精熟日夜不息若懼禍難有所禳者上與貴妃出於别殿貴妃置雪衣娘於步輦竿上與之同出既至上命從官校獵於殿下鸚鵡方戯於殿上瞥有鷹搏之而斃上與貴妃歎息久之遂命瘞於苑中為之冡呼為鸚鵡冢明皇雜録封緑衣長安豪民楊崇義妻劉氏與隣舍兒李弇私通同謀害崇義埋井中劉氏訴於官府縣官詣所居檢校架上鸚鵡忽然曰殺家主者李弇也遂執訊得實明皇封為綠衣使者天寶遺事鸚鵡訴寒環王貞觀時獻五色鸚鵡白丨丨丨丨有詔還之孔氏帖鸚鵡叱咤明皇時有五色鸚鵡能言上令左右試牽帝衣鳥輒瞋目叱咤岐府文學熊延京獻鸚鵡篇以贊其事張燕公有表賀稱為時樂鳥雜俎鸚鵡傳呼蔡相確貶新州侍兒名琵琶終焉有鸚鵡甚慧公每扣響板丨丨丨丨其名琵琶卒後誤觸響板鸚鵡猶傳呼不已公悒悒不樂有詩云鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸又作送將歸賦未㡬公果下世漢禰衡賦時黄祖太子射賔客大會有獻鸚鵡者舉此酒於衡前曰禰處士今日無用娛賓切以鳥自逺而至明慧聰善羽族之可貴願先生為之賦使四坐咸共榮觀不亦可乎衡因為賦筆不停綴文不加㸃其辭曰德維西域之靈鳥挺自然之竒姿體金精之妙質含火之明輝性辯慧而能言兮才聰明以識機故其嬉遊髙峻栖跱幽深飛不妄集翔必擇林紺趾丹觜緑衣翠衿采采麗容咬咬好音雖同族於羽毛固殊智而異心配鸞鳳而等美偉靈表之可嘉命虞人於壠坻訟伯益於流沙跨崑崙而播弋冠雲霓而張羅雖綱維之備設終一目之所加且其容止閒暇守植安停逼之不懼撫之不驚寧順從以逺害不違忤以喪生故獻全者受賞而傷肌者被刑爾乃歸窮委命離羣喪佀閑以彫籠剪其翅羽流飄萬里崎嶇重阻踰峴越障載罹寒署女辭家而適人臣出身而事主彼賢哲之逄患猶棲遲以羇旅矧禽鳥之微物能馴擾以安處眷西路而長懷望故鄉而延佇忖陋體之腥臊亦何勞於鼎俎嗟禄命之衰簿奚遭時之險巇豈言語以階亂將不密以致危痛母子之永隔哀伉儷之生離匪餘年之足惜慜衆雛之無知背蠻夷之下國侍君子之光儀懼名實之不副恥才能之無竒羨西都之沃壤識苦樂之異宜懷代越之悠思故每言而稱斯若乃少昊司辰蓐收整轡嚴霜初降凉風蕭瑟長吟逺慕哀鳴感類音聲凄以激揚容貌慘以顦顇聞之者悲傷見之者隕淚放臣為之屢歎棄妻為之歔欷感平生之遊處兮若塤箎之相須何今日之兩絶兮若胡越之異區順櫳檻以俯仰窺户牖以踟蹰相崑山之髙嶽思鄧林之扶疎顧六翮之殘毁雖奮迅其焉如心懷歸而弗果徒怨毒於一隅茍竭心於所事敢背惠而忘初託輕鄙之微命委陋賤之薄軀期守死以報德甘盡辭以效愚恃隆恩於既往庶彌久而不渝惡孔融薦彌衡以為淑質正亮英才卓礫志懷霜雪疾若讎任座史魚殆無以過若衡等輩不可多得數稱述於曹操操欲見之衡素相輕疾不肯往而數有恣言操懷忿因召之擊鼔裸身辱之融為見操説其狂疾冀得自謝操喜勅門者有客便通待之極宴衡乃坐於營門言語悖逆操怒送與劉表衡為融所薦東坡謂融視操特鬼蜮之雄其勢决不兩立非融誅操則操害融而衡平生唯善融及楊脩常稱曰大兒孔文舉小兒楊德祖融脩皆死於操手衡無由得全漢史言其尚氣剛傲矯時玩物此蓋不知其鄙賤曹操故陷身危機所謂狂悖者必誦斥其有僭竊之意耳劉表復不能容以與黄祖觀其所著鸚鵡賦専以自况一篇之中三致意焉予每三復其文而悲傷之李太白詩云魏帝營八極蟻觀一禰衡黄祖斗筲人殺之受惡名呉江賦鸚鵡落筆超羣英鏘鏘振金石句句欲飛鳴鷙鴞啄孤鳳千春傷我情此篇最為精當宋謝莊賦惠梏昭大天機自曉審國音於中華逹方聲於遐表及其雲移霞峙雪委雨翻陸離翬衞容與傾軒躍林飛岫煥若輕電之勢月圓光於綠水雲瀉影於青林時樂鳥南海貢來伏見天恩以靈異鸚鵡乃熊延京所述篇出示朝列臣按南海異物志有時樂鳥鳴云天下太平有道則見今此鳥本丨丨丨丨與鸚鵡狀同而毛尾全異其心聰性辯䕶主報恩固非凡人實瑞經爾謂時樂鳥延京雖叙其事未正其名望編國史以彰聖瑞臣竊聞延京獻詩一首張説集詩見後詩集雕檻紅縚華屋日漸髙丨丨繫丨丨故國隴山樹美人金剪刀避籠交翠尾礪觜靜新毛不念三緘事世途皆爾曹杜甫雕籠翠羽莫恨丨丨丨丨殘江南地煖隴西寒勸君不用分明語語得分明出轉難羅鄴常恐思歸隴西鸚鵡到江東養得經年觜漸紅丨丨丨丨先剪翅每因餧食暫開籠人憐巧語情雖重鳥憶髙飛意不同應似朱門歌舞妓深藏牢閉後房中白居易偏能識主養來鸚鵡觜初紅宜在朱樓綉户中頻學喚人緣性慧丨丨丨丨為情通斂毛睡自難銷日嚲翅愁時願見風誰遣聰明好顔色事須安置入深籠劉禹錫翠衫短盡鸚鵡含愁思聰明憶别離丨丨渾丨丨紅觜謾多知未有開籠日空殘宿舊枝世人憐復損何用羽毛竒杜甫玉鏁閒拘一入秦宫裏千山隴樹秋能言依婦女學語類俳優丨丨丨丨束金籠不自由哀良是黄鳥死為穆公羞梅聖俞更向君前語莫把金籠閉鸚鵡箇箇分明解人語忽然丨丨丨丨丨三十六宫愁㡬許蘇郁强作人間語雲木何時兩翅翻玉籠金鏁秪煩寃直須丨丨丨丨丨舉世無人解語言荆公秦吉了爾是能言鳥秦吉了出南中彩毛青黒花頸紅耳聰心慧舌端巧鳥語人言無不通昨日長爪鳶今朝大觜烏鳶捎乳燕一窠覆烏啄母雞雙眼枯雞號墮地燕驚去然後食卵攫其雛豈無鵰與鶚嗉中肉飽不肯搏亦有鸞鶴羣閒立颺髙如不聞秦吉了人言丨丨丨丨丨豈不見雞燕之寃苦吾聞鳳凰百鳥王爾竟不為鳳凰之前致一言安用噪噪閒言語白居易時樂鳥名聞不可尋舊聞南海出靈禽時樂丨丨丨丨丨形貌乍聞鸚鵡類精神别稟鳳凰心千年待聖方輕舉萬里呈材無伴佀紅茸糅綉好毛衣清泠謳啞好言語内人試取御衣牽啄手嗔聲不許前心願陽烏常保日志嫌隂鶴欲凌天天晴玩訝良無己察圖果見祥經裏本持祥瑞感明主還用文章比君子自憐弱羽詎堪珍喜共華篇來示人一見嚶嚶報恩鳥多慙碌碌具官臣張説鸜鵒格物總論鸜鵒似鵙而有幘色純黑金眼宂居一名寒臯斷舌可使言語鸜字亦作鴝亦慧鳥也事類中國有之鸜鵒不踰濟注無妨於中丨丨丨禮考工記童謠有是魯昭公二十五年有鸜鵒來巢書所無也師已曰異哉吾聞文武之世丨丨丨丨鴝之鵒之公出辱之鴝鵒之羽公在外野往饋之馬鴝鵒咮之公在乾侯徵褰與襦鴝鵒之巢逺在遥遥稠父喪勞宋父以驕鴝鵒鴝鵒往歌來哭丨丨丨丨今鴝鵒來巢其將及乎左傳着衣幘舞晉謝尚字仁祖及長博綜衆藝王導比之王戎辟為掾始到府導有勝會謂曰聞君能作鴝鵒舞尚便丨丨丨而丨坐者撫掌擊節尚俯仰其中傍若無人其率詣如此本傳聽琵琶曲晉司空桓豁在荆有參軍剪五月五日鸜鵒舌教令學語遂無所不名顧參軍彈琵琶每立聽移時幽𡨕録學􅙄鼻語善效人語聲司空大會吏佐令悉效四坐語無不絶似有生􅙄鼻語難學學之不似因納頭甕中以效焉遂與􅙄者語聲不異白盜牛肉主典人於鸜鵒前盜物參軍如厠鸜鵒伺無人密丨主典人盜某物參軍銜之而未發後丨丨丨鴝鵒復白參軍曰汝盜肉應有驗鴝鵒曰以新荷褁着屏風後檢之果獲痛加法並同上有銜魚袋秘書少監崔行功未得大夫前忽丨鸜鵒丨一物入其室乃丨丨鉤缺不數日加大夫也同史異集請殺此人盜者患鴝鵒白盜肉以熱湯灌殺之參軍為之悲傷累日遂丨丨丨丨以報其怨司空教曰原殺鴝鵒之痛誠合論殺不可以禽鳥故極之於法令止五嵗刑也幽𡨕録使進天子貞元十一年五月戊辰愈東歸癸酉自潼關出息於河隂時始去京師有不遇時之歎見行有籠白烏白鴝鵒而西者號於道曰某土之守某官丨使者丨於丨丨東西行者避路莫敢正目焉韓愈感二鳥賦序鴝鵒食蝗五代乾祐元年七月戊申丨丨丨丨丙辰禁捕孔氏帖鴝鵒勝鸚丨丨舊言可使取火效人言丨丨鵡取其目睛和人乳研滴眼中能見煙霄外物酉陽雜俎韋應物白鴝鵒歌鸜鵒鸜鵒衆皆蓬蒿下爾自三山來掌上時拂拭人心鳥意自無猜詩集不足登俎有鳥名鴝鵒力不能髙飛肉味丨丨鼎丨胡為見羈虞羅中杜甫冬狩行空欲銜環日夕依仁全羽翼丨丨丨丨非報德呼傳鴝鵒令丨丨丨丨丨韓愈城南聨句未知鸜鵒語風晴日煖揺雙竹竹間相語兩鴝鵒鴝鵒之肉不可肴人生不材果為福子舟之筆利如錐千變萬化皆天機丨丨筆下丨丨丨何似夢中胡蝶舞山谷戲詠子舟畫竹間兩鴝鵒飛上野桑枝牛背雙鴝鵒煙陂共入時草枯行齧美日晩趂羣遲間載寧辭逺相鳴不問雌初驚牧人去丨丨丨丨丨梅聖俞百舌格物總論百舌反舌鳥蒼毛尖觜形小於鴝鵒能反覆其舌隨百鳥之音故謂之百舌春二三月鳴至五月無聲亦候禽也或以為即鶯未知其果然否事類食蚯蚓春囀夏止惟丨丨丨朝野命載傲百鳥變易其聲丨丨丨之鳴記月令注解杜詩句山谷云余讀周書月令反舌無聲讒人在側乃丨丨丨過時如發口君側有讒人丨詩集報春百舌來何處重重秪丨丨知音兼衆語整翮豈多身杜甫報曉星未渡河先丨丨唐詩五更頭一家千里外百舌丨丨丨顧况早春萬變乘春曉星零落春雲低初聞百舌問關啼花樹滿空迷處所揺動繁英墜紅而笙簧百囀音韻多黄鸝吞聲燕無語東方朝日遲遲升迎風弄景如自矜數聲不盡又飛去何許相逢綠楊路綿蠻宛轉似娯人一心百舌何紛紜酡顔俠少停歌聽墜珥妖姫和睡聞可憐光景何時盡誰能低回避鷹隼廷尉張羅似不聞潘郎挾彈無情損天生羽族爾何微舌端丨丨丨丨揮南方朱鳥一朝見索寞無言高下飛劉夢得百舌吟百種巧言栁條初重草初肥煙濕園林晩未晞丨丨堪憐丨丨語一般惟欠好毛衣欺凌紅杏從頭宿諷刺黄鸝趂背飛誰道間關便多事更能緘黙送芳菲林君復未聞鳳凰一冬常噤嘿乘春何多舌蒼毛無文章尖觜若騰説曉升髙髙樹百鳥言漏泄只丨丨丨丨有亦學不徹傷哉古辯士往往遭車裂梅聖俞學盡衆禽丨丨丨丨鳴終無自己言深山喬木底緘口過平生張芸叟自無一語衆禽乗春喉吻生滿林無限啼新晴南園花木正繁盛小小大大皆來鳴藏枝映葉復誰使不肯停住出常嚶嚶就中百舌最無謂滿口學盡羣鳥聲丨丨丨丨於己徒爾嘲􅑜誇從横朝朝泊我髙栁上叫破一牕殘月明幽人隠睡正酣美無計可奈遭爾驚少年挾彈彼誰者安得為我來五更文與可不是多言曉語月斜樹畫啼春霽天胸中多有激丨丨故丨丨張文潛古今合璧事類備要别集巻六十七
