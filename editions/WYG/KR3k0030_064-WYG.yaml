body:
  text: 古今合璧事類備要前集卷六十四宋謝維新撰䘮紀門居䘮事類哀戚䘮禮丨丨之至也節哀順變也檀弓創痛丨鉅者其日久丨甚者其愈遲三年之䘮稱情而立文所以為至痛極也記三年問專席有䘮者丨丨而坐記曲禮倚廬親者居丨丨賤者居堊室周禮宮正注斬衰丨丨齊衰堊室儀禮居丨丨寢苫枕塊不說絰帶孟康注丨丨倚墻至地而為之無楣柱檀弓父母之䘮不避涕泣見人夫怨哀在中故形變外也居於丨丨寢苫枕塊苴杖食粥所以為至痛飾也並記扶杖杖者何也曰竹桐一也何為也曰孝子身病體羸以杖扶病也父在則不敗杖矣尊者在故也記問䘮苴杖竹也削杖桐也杖者各齊心皆下本杖者何爵也無爵䘮而杖者何檐主也非主而杖者何輔病也童子何以不杖不能病也婦人何以不杖亦不能病也爵謂天子諸侯卿大夫士也無爵謂庶人也檐猶假也無爵者假以杖尊其為主也非主謂衆子也儀禮䘮服稽顙三年之䘮以䘮拜稽顙而後拜為妻父母在不杖不丨丨母在不丨丨記雜記偯聲斬衰之哭往而不返齊哀之哭若往而返大功之哭三曲而偯小功緦麻哀容可也三曲一聲三曲也丨丨從容也偯音倚記間傳戚容子貢問䘮子曰敬為上哀次之瘠為下顔色稱其情丨丨稱其服雜記不言斬衰唯而不對齊衰對而丨丨大功言而不議小功緦麻議不及樂間傳讀禮居䘮丨䘮丨既葬讀祭禮䘮復常讀樂章曲禮衰絰孤斬然在丨丨之中左傳素冠素冠刺不能三年也庶見丨丨兮棘人欒欒兮小雅哭無時父母之䘮丨丨丨記檀弓篇如有求始死皇皇焉丨丨丨而弗得及殯望望焉如有従而弗及既葬慨焉如不及其反而息記檀弓三年如斬丨丨之䘮丨丨雜記三日後斂孝子親死悲哀志懣故匍匐而哭之若將復生故曰丨丨而丨丨者以俟其生也記問䘮繩纓管屨父母之䘮衰冠丨丨丨丨三日而食粥三月而沐䘮服四制齊晏桓子卒晏嬰苴絰帶杖管履左傳齊疏饘粥三年之䘮丨丨之服丨丨之食自天子逹於庶人三代共之孟子滕文公被髮徒跣男子白布衣丨丨丨丨婦人女子青練衣去首飾齊哀以下丈夫素冠主人坐於床東啼踴旡數衆主人兄弟之子在其後皆西面南上哭妻坐於床西妾及母子在其後哭踊旡數唐禮志擊心爵踊婦人不宜袒故發胷丨丨丨丨殷殷田田如壞牆然悲哀痛疾之至也問䘮毁瘠不形居䘮之禮丨丨丨丨視聴不衰升降不由階阼出入不當門隧曲禮食㫖不甘君子之居䘮丨丨丨丨聞樂不樂居處不安語陽貨孝子之䘮親也哭不偯禮無容言不文服美不安聞樂不樂丨丨丨丨此哀戚之情也三日而食教民無以死傷生也毁不滅性此聖人之教也䘮不過三年示民有終也孝經衰麻在身居䘮之禮頭有創則沐身有􅅑則浴有疾則飲酒食肉疾止復初不勝䘮乃比於不慈不孝五十不致毁六十不毁七十唯丨丨丨丨飲酒食肉處於内曲禮水漿不入君子執親之䘮也丨丨丨丨於口者三日杖而後能起檀弓䘮不慮居丨丨丨丨謂賣舍宅以奉䘮為無廟也毁不危身為憔悴將㓕為無後也同上哭無常聲曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失母焉何常聲之有雜記柴骨欒心殘喘胡顔丨丨丨丨茹哀苦廬銜恤終祀悲摧欒棘思結寒泉陳子昂集灰心垢體丨丨丨丨泣血漣漣松檟之下其生尚殘與其偷生而孤苦不若就死而團圓欲自決以毁傷懼虧孝於歸全白侍郎集酸鼻痛骨履影弔心丨丨丨丨冮文通書殞涕熏心丨丨丨丨韓文荼蓼之苦丨丨丨丨陳蕃傳未堪家多難予又集于蓼詩小毖蓼莪之徳蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞出則銜恤入則靡至欲報之徳昊天㒺極詩蓼莪儼然憂服吾子丨丨在丨丨之中記檀弓憔然苫塊于志寜丨丨在丨丨之中唐史五服異等斬衰三年子為父嫡孫承重為祖父母父為嫡子祖為嫡孫在室女為父子婦為夫之父妻為夫齊衰三年子為母嫡母繼母慈母養母同在室女為母子婦為夫之母齊衰五月孫為曽祖父母女孫在室適人同齊衰三月孫為高祖父母女孫在室適人同杖期子為出母孫為祖母祖在為祖母則杖期夫為妻不姊杖期孫為祖父母姪為父兄弟及父姊妹在室者父妹已嫁無夫與子者同父為衆子及女在室者女已嫁無夫與子者同伯叔為姪及侄女在家者祖為承父重孫女孫為祖父母在室適人同女適人為親父母婦人為夫兄弟之子及夫兄弟之女在室者大功姪為父姊妹已適人者兄弟為姊妹已適人者為堂兄弟及堂姊妹在室者為巳女及兄弟之女己適人者伯叔為姪婦祖為衆孫姪為親叔父及姑之長中殤者已為親兄弟姊妹及親子兄弟之子兄弟之女嫡孫之長中殤者女為出母女為父之兄弟姊妹已之兄弟姊妹及兄弟之子為人後者女為兄弟之女長中殤者孫婦為夫之祖父母姪婦為失之伯叔為夫姪女之適人者及夫姪婦之長中殤者小功從姪為父堂兄弟及父堂姊妹在室者為堂姊妹已適人者為再從兄弟及再從姊妹在室者伯叔為堂姪姪孫及堂姪女姪孫女之在弟室者祖為嫡孫婦為女孫已適人者為己兄之妻為親兄弟姊妹及親子兄弟之子衆孫之下殤者為母之祖父母母之父母母之兄弟姊妹女為兄弟之妻為堂兄弟姊妹親兄弟之子婦兄弟女之中殤者婦人為夫之姑夫之姊妹在室適人同為夫之兄弟及夫兄弟之妻夫之堂侄及堂侄女之在室者夫之姪孫夫姪孫女之在室者為夫伯叔之長殤夫姪婦之下殤者緦麻從姪孫為曽祖兄弟及曽祖姊妹在室者為祖兄弟祖堂兄弟及祖姊妹祖堂姊妹在室者為父堂姊妹適人者為父再從兄弟已再從姊妹堂姪女已適人者已三從兄弟及三從姊妹在室者為堂姪婦為再從姪及為再從姪女在室者祖為衆孫婦姪孫婦及姪孫女已適人者為堂侄孫及堂姪孫女在室者為曽孫元孫曽堂姪孫及曾堂姪女在室者為堂叔父長殤親叔父下殤親姑下殤堂姑長殤堂兄弟中下殤再從兄弟長殤堂姊妹再從姊妹堂姪堂姪女姪孫姪孫女之長殤衆孫等之下殤者壻為妻之父母外祖父母為女之子及女之子婦舅為甥及甥婦為舅姑姨之子兄弟姊妹同母之姊妹長殤者女為祖親兄弟姊妹父堂兄弟姊妹已再從兄弟姊妹堂兄弟之子堂兄弟之女兄弟之姪孫及姪女孫姑舅之子親兄弟女之下殤者孫婦為夫高祖父母夫曽祖父母夫從祖伯父夫之堂伯叔夫堂兄弟之妻夫堂姊妹在室適人同夫堂姪之妻夫堂姪女已適人者夫之再從姪夫再從姪女在室者夫姪孫婦夫姪孫女適人者夫堂姪孫夫之曽姪孫夫曽姪孫女夫外祖父母夫之舅姨夫伯叔之中下殤者殤者男女未成人而死可哀傷者男子已娶女子許嫁皆不為殤凡男女亡年十九至十六嵗為長殤十五至十二歲為中殤十一至八歲為下殤若生三月至七歲皆為無服之殤儀禮三年通䘮宰我問三年之䘮期已久矣君子三年不為禮禮必壞三年不為樂樂必崩舊穀既沒新榖既升期可已矣子曰食夫稻衣夫錦於汝安乎曰安女安則為之夫君子之居䘮食㫖不甘聞樂不樂居處不安故不為也今女安則為之宰我出子曰予之不仁也子生三年然後免於父母之懐夫三年之䘮天下之通䘮也予也有三年之愛於其父母乎語陽貨無緦麻䘮崔琳三十年間丨中外丨丨之丨明皇雜錄請小功服魏徴定服制義嫂叔不服蓋推而逺之也或有長年之嫂遇孩童之叔劬勞鞠養情若所生稱情立文其義安在嫂叔舊無服請服小功五月文粹求尸漬血唐王少𤣥父隋末死兵亂少𤣥甫十歲時即哀泣求尸時野中白骨覆或曰以子血漬而滲者父胔也少𤣥鑱膚閱旬而獲尸徒跣護柩王衍居父䘮跣護柩行千里道路為流涕李百藥侍父母䘮還鄉徒跣數千里雖除䘮容貌癯毁者累年劉審禮父母北葬徒跣血流行路咨嗟審禮為虜執持詔令其庶弟易從省之既至審禮卒易從晝夜哭不止吐蕃哀其志乃還父屍徒跣萬里扶護以歸見者流涕並孔帖和嶠生孝晉王戎字濬仲為吏部尚書丁母憂性至孝不拘禮制飲酒食肉或觀奕棊而容貌毁悴杖而後起和嶠亦居父䘮以禮法自持量米而食而哀毁不踰於戎武帝謂劉毅曰和嶠毁頓過禮使人憂之毅曰嶠雖寢苫食粥乃生孝耳至於王戎所謂死孝陛下當先憂之伯鸞死孝戴丨丨母卒居廬啜粥非禮不行弟叔鸞食肉飲酒哀至乃哭二人俱有毁容世謂丨丨丨丨叔鸞生孝典畧居䘮過哀哀泣難繼弁人有其母死而孺子泣者孔子曰哀則哀矣而難為繼也夫禮為可傳也為可繼也故哀踊有節檀弓號泣無節侯知道程俱羅生養以孝歿奉以哀廬於冡次丨丨丨丨侯氏七年矣程氏三年矣擁墳推膺聲氣咽塞下入九泉上徹九天丈粹李華靈武二孝賛毁瘠㡬死劉滋居母䘮丨丨丨丨時謂劉孝子哀感不食高士亷子履行居母䘮毁甚太宗諭使彊食丁公著三歳䘮母甫七歳見隣媪抱子丨丨丨肯丨父䘮貌力癯惙見者憂其死孔帖嗌不粒食張曲江公丁内憂奔䘮南計毁無圗生丨丨丨丨徐浩張曲江碑疾不如薤郭曜居䘮以禮疾甚或勸茹葱薤終不屬口並孔帖毁滅糲食羅遜父䘮㡬丨丨服除布衣丨丨居䘮柴瘠唐宗室嵩丨母丨丨丨服除家人未嘗見言笑同上三年泣血髙子羔執親之嘗䘮泣血三年未見齒君子以為難也記檀弓五日不食子春之母死丨丨丨丨曰吾悔之先王制禮患其過於制不以死傷生也同上房元齡父䘮米飯不入口五日唐書三年不出廬路敬淳居親䘮倚廬不出者三年服除號慟入門形容癯毁妻不之識孔帖五十猶麻縗絳人三十䘮父母丨丨丨丨丨故鄉黨稱氏不名貴之也崔祐甫汾何義橋記居䘮越禮戚有嘉容魯昭公居䘮而不哀在戚而有嘉容比及葬三易衰衰袵如故哀葬齊姜昭公不戚晉使者曰其不歿乎有三年之䘮而無一日之戚左傳䘮不為服後漢袁閎居土室母沒不為制服設位世莫能名衰絰擊鍾宋子明謂桐門右師曰吾猶丨丨而子丨丨何也右師曰䘮不在此故也退而告人曰已衰絰而生子余何故捨鍾朞功聴樂謝安愛好聲律朞功之慘不廢妓樂頗以成俗王坦之諫不從居䘮彈棊晉阮籍至孝母終與人圍棊既畢而飲二斗號吐血數升將葬又食一蒸㹠飲酒二斗又吐血毁瘠骨立居䘮彈琴姚興時京兆韋高慕阮籍為人丨丨丨丨飲酒黄門郎吉成詵聞之泣曰吾私刄斬之以樂風教遂持劍見高高懼而逃走冒服飲宴灌夫與竇嬰相得驩甚夫嘗有服過丞相蚡蚡曰吾欲與仲孺過魏其侯㑹仲孺有服夫曰將軍乃肯臨況魏其侯夫安敢以服為辭蚡許諾夫以語嬰嬰與夫益市牛酒夜飲極驩而去廬墓孕育後漢陳蕃為樂安太守民有趙宣葬親不閉埏隧居其中行服二十年蕃與相見問及妻子而宣五子皆服中所生蕃大怒曰寢宿冡藏而孕育其中誑時惑衆誣汙鬼神遂致其罪使婢丸藥陳夀遭父䘮有疾丨丨丨丨客往見之鄉黨以為貶議坐是沈滯者累年召人作樂南漢劉玢襲在殯丨伶丨丨丨裸男女以為樂匿䘮受封後漢李爕為河南尹先是潁川甄邵謟附梁冀為鄴令有同歲生得罪於冀亡奔邵邵偽納而陰告冀即捕殺之邵當遷郡守㑹母亡邵埋葬馬屋先受封然後發䘮還至洛爕行途遇之使卒投車於溝中笞捶亂下大署帛於背曰謟貴賣友貪官埋母乃具表狀遂廢錮終身匿䘮典軍李抱真卒其子殿中侍御緘丨丨與其屬盧㑹昌元仲經謀㑹諸將仲經詭抱真令曰吾疾不任事令緘丨丨勉佐之副使李説及諸校俯首皆曰諾緘盛服出衆拜之變服親迎五代張孝忠子茂宗尚義章公主母亡遺言丐成禮太常愽士韋彤等諫曰婚禮所以承宗廟繼後嗣也安有釋縗服衣冕裳去堊室行親迎以凶續嘉為朝廷爽法五代史重䘮不哭唐承隋大亂風俗薄惡人不知教御史大夫韋挺上疏曰父母之恩昊天罔極創巨之痛終身何已今衣冠士族辰日不哭謂為重䘮親賔來弔輒不臨舉既葬隣伍㑹集相與醉酣名曰出孝望一切懲革詩集制中不詩昔歐陽叔粥季黙以憂丨丨丨作詩陳履常不飲酒東坡一日設燕兩歐至履常不飲故不作詩坡詩云商也哀未㪚歲月怱已秋祥琴雖未調餘悲不敢留矧此乃韻語未入金石流君言不能詩此語人信不陋矣陶士衡當以大白浮明當罸二子已洗兩玉舟䘮居作詩梅聖俞至寧陵寄詩云獨護慈母䘮淚與河水流河水終有竭淚泉常在眸彦猷持國譏作詩早余應之以蓼莪及傅咸贈王何二侍中詩亦如此按晉孫綽詩自丁荼毒載罹寒暑暑不勝哀號作詩一首敢冒諒闇之譏以伸㒺極之痛故洪玉甫以魯直丁母憂絶不作詩夫魯直不作者以非思親之詩也孫綽作者以思親之詩也聖俞之早庸何傷乎秦少㳺初過浯溪題詩云玉環妖血無人埽以被責憂畏又方持䘮手書此詩借文潛之名後人遂以為文潛非也江鄰幾雜誌起復事類從宜䘮有四制變而丨丨注四制者恩理節權也恩仁理義節禮權智也又曰門内之治恩掩義注若公羊傳所言是也又曰門外之治義斷恩庄若曽子問所言是也䘮服四制奪情重奪孝子之情望慕無窮公羊傳注移忠君子之事親孝故忠可移於君孝經奪禮頃丨丨於苴麻俾戾權於韎韐常相制要絰服事古者臣有大䘮則君三年不呼其門已練可以弁冕服金革之事君使之非也臣行之禮也閔子丨丨而丨丨孔子蓋善之也弁禮所以皮弁爵弁也皮弁武冠爵弁文冠加旒曰冕王所以入宗廟服金革者謂以兵事使之公羊傳卒哭征戎子夏問曰三年之䘮卒哭金革之事無避者也禮與初有司歟孔子曰君子不奪人之䘮亦不可奪䘮也昔者魯公伯禽有為為之也今以三年之䘮從其利者吾弗知也注伯禽封於魯有徐戎作難䘮卒哭而征之急王事也征之作費誓不敢踰制翟方進為丞相封高宻侯後母既葬三十六月除服起視事以為身備漢相丨丨丨國家之丨固請終制唐張説累遷工部兵部二侍郎以母䘮免既期詔使為黄門侍郎丨丨丨丨祈陳哀到時世俗衰薄士以奪服為榮而說獨以禮終天下高之張曲江起復表聞命號咷使者逼迫及至闕下懇請終䘮武后朝解琬除監察御史以䘮免武后以琬習邊事迫令西撫羌夷琬因乞終䘮后嘉許之代宗朝宗室㴠方母䘮奪哀持節宣慰所至州縣非公事未嘗言蔬飯水飲席地以瞑及使還丨丨丨丨代宗見其癯毀許之並唐史令起視事隋邳國公蘓威為右僕射以母憂去職柴毁骨立上勅威曰公徳行高人情寄殊重必須抑割為國惜身朕之於卿為君父宜依朕㫖以禮自存未㡬起令視事疆起就職于志寧為太子詹事以母䘮免有詔起復本官固請終䘮帝遣中書侍郎岑文本敦諭之曰忠孝不兩立今太子須人教約卿丨丨為我卒輔導之志寜乃丨丨太傅房元齡以母憂罷職未㡬起復本職奪服拜官杜暹遷給事中以母䘮解㑹安西都護張孝嵩遷太原尹或言暹往使安西虜服其清今猶慕思乃奪服拜黄門侍郎兼安西副大護奪情就職山濤居母䘮負土成墳手植松柏詔丨丨以濤為吏部尚書濤不得已丨丨偪令攝事晉張華為度支尚書母憂哀過禮中詔丨丨丨丨贊成伐吳之計不許辭官魏解宏遭父䘮有軍事當行辭疾病帝怒曰汝非曽閔收廷尉高柔為請之帝乃原之薦興塊次來填擢潁川太守母䘮免以孝聞安禄山反張垍丨之丨丨丨拜汝南太守詔起苫次鄭元璹母䘮免㑹突厥提精騎數千萬身自將攻太原詔即苫次起元璹持節衰麻謁相李林甫聞蕭穎士名欲拔用時穎士寓居廣陵居母䘮即衰麻詣京師徑謁林甫於政事堂林甫素不識遽見衰麻大惡之即令斥去穎士大怒乃著伐櫻桃賦刺林甫有曰擢無庸之瑣質專廟朝之右地居䘮獻計盧從史元和中丨父丨未官即丨丨誅王承宗陰向帝㫖繇是奪服奪服不哭唐陳思忠居父䘮詔丨丨客往弔思忠詔以辰日不哭薛大鼎子克構曰事親者避嫌可也既孤矣則無不哭世服其論釋縗拜賜吕諲擢平章事㑹母䘮解三月復召知門下三品當賜門㦸或勸諲以凶服受吉賜不宜諲丨丨丨丨人譏其失禮唐史徒跣籍藁歐陽詢母䘮詔奪哀每入朝丨丨及門夜直丨丨以設非公事不語還家輒號慟被髮居堊田宏正遇害魏人素徳𢎞正以田布使世其官穆宗遽召布解縗拜魏愽節度乗傳以行布號泣固辭不聴乃出伎樂與妻子賔客訣曰吾還矣未至魏三十里跣行丨丨號泣而入丨丨室屏節旄墨縗𤣥纛田布起復節度使制云丨丨在體丨丨在前提劍就命無忘哀敬元稹峩冠泣血韓渥言宰相崔貽範處䘮未數月遽使視事傷孝子心今中書事一相可辦陛下誠惜貽範才矣變縗而召可也何必使出丨丨廟堂入丨丨柩側毁瘠則廢務勤恪則忘哀此非人情可處也佩魚不中禮李宗諤云先公周顯徳末翰林學士起復褁素紗軟脚幞頭黲紫公服每入朝猶佩魚袋或曰魚袋者取事君夙夜匪懈之義然以金為飾亦身之華也居䘮奪情不當有金寳之飾公遽謝不敏談録起復非好事富鄭公韓魏公同在中書鄭公母老矣一日語及故事宰相有起復視事者魏公曰此非朝廷盛事已而鄭公居母䘮朝廷屢詔起之上章三辭貼黄言臣在中書日當與韓琦言之決不當起魏公歎曰吾但以實言之不料以為怨自此二人稍稍有隙龍川志石林過庭録云至和問富鄭公為相以母䘮去位時久無以宰相持䘮者昭陵意大向公必欲起復詔再下再力辭末以盧朱崖薛文惠故事切責有云以相國之尊而守匹夫之節任天下之重而為門内之私朕所不取也且命中人督公起非同就道不得先還公復抗章言天下無事宰臣奉行常務豈可與太宗時比中書樞宻院臣僚韓琦等平居皆嘗與臣論起復不是好事今在嫌疑之地必不肯為臣盡直言斷自聖意上知其不可奪乃已古今合璧事類備要前集卷六十四
