body:
  text: 古今合璧事類備要後集卷七十五宋謝維新撰將帥門都統歴代沿革晉孝武帝太元十九年有河西大都督通鑑唐天寳末置為天下兵馬元帥都統朔方河東北平盧節度使都統之名始於此職林乾元元年户部尚書李峘除都統淮南江東西節度使宣慰觀察處置等使都統之官始於此周㑹要唐制或總五道或總三道上元末省大中後討徐州以康承訓討黄巢以荆王鐸為都統職官分紀黄巢之難置諸道行營都統掌征伐兵罷則省雖總諸道兵馬不賜旌節國朝諸軍都統制者自渡江已前亦有之然未為官稱蓋是時陜西河東三路皆以武臣職髙有智者為馬步軍副都總管遇出師征討則加以都統制軍馬之名猶今節制軍馬之類非有司分也建炎元年置御營司遂擢王襄愍為都統制都統制名官自此始朝野雜記大槩南渡置統制一則兵興稱謂不一諸路起兵有自稱統制者州縣管押勤王兵者亦有稱統制者諸道都總管及諸司便宜差統制者建炎初劉光世上言於是並罷惟中都主兵朝廷差充統制者仍舊紹興初諸大將改為行營五䕶軍四年吳玠升宣撫副使其弟為右䕶軍都統制十一年韓世忠張浚岳飛除樞密副使罷宣撫司其統領将副並改充御前𨽻樞密院各帯御前字入銜中興㑹要其兵馬就令所部統制官節制益之按髙宗小錄岳飛獄案云岳飛所部鄂州兵馬今統制張憲節制及考武昌志乃云十一年二月岳飛被召以御前中軍統制王貴權都統節制諸軍人馬却無張憲姓字與日厯不同當考而都統皆以屯駐名冠軍額之上獨川陜如故十九年漢沔兩大將改為御前諸軍璘稱利州西路駐劄御前諸軍都統制政稱利州東路駐劄御前諸軍都統郭浩時已死故金州無都統制但以知州兼節制嘉定初蜀叛既平安觀文又奏分興州十軍為沔利三軍沔州除都統制利州除副都統制天下有十都統矣朝野雜記是年兀术犯泗州詔樞密使張俊於鎮江府置司措置江淮守備俊𤼵張憲事併岳飛賜死俊遂薦其將定逺軍節度使田師中掌故岳飛之兵又薦清逺軍節度使王徳往金陵於是並詔為御前都統制師中於鄂州徳於建康府駐劄朝野雜記江池三處於史無見當考事類元戎丨丨十乗以先啓行詩上軍卻穀將丨丨左傳帥師長子丨丨易御戎梁𢎞丨丨左傳戎帥賜朱克融詔李衛公集節將代劉𢎞逸與鎮州將士書李衛公集督將分命丨丨保寧疆境開元戒勵州牧將誥戎鈐執丨丨以涖衆杜黄裳制戎藩投迹丨丨誄張谷等告示中外勑戎輅自朕統御尊敬耆老分委丨丨作鎮孟津杜牧行李班冊鎮河中郭子儀上元初詔為諸道兵馬都統今奉諸鎮之師徑抵范陽詔下旬日為朝恩所間事竟不行永泰元年以子儀都統河南節度使行營出丨丨丨分紀滌羣寇乾符黄巢大掠江淮宰相王澤曰臣忝宰相之長在朝不足分陛下之憂願自率諸軍蕩丨丨丨朝議然之乃拜守司徒平章事荆南節度使諸道行營兵馬都統唐㑹要授符律丨銅丨之丨王縉兼都統制總金壇折衝之寄符王帳而丨丨丨唐太詔令節制之地徳宗幸梁洋囘初廢天威軍左右神策軍舉西漢謁者隋何卞淮南功拜為中尉故事命神䇿監軍為中尉又以功臣數多或有秩至司空僕射罷鎮入朝無官序相當乃置六軍統軍秩視六尚書為丨丨迴翔之地分紀中䕶之權宜兼領丨丨丨丨以副師貞之吉唐太詔令李若幽河東節度都統制出總戎旃丨丨丨丨宋廣平集賜三路都部署詔出統戎麾丨丨丨杜佑制聳劒元戎執􅀢霸府盡忠肅之勤誠丨丨丨丨罄旌麾之茂績唐太詔令張延師冊建牙統衆丨丨丨丨必藉雄才陸集劉洽充諸道兵馬都統制來帥熊羆丨丨丨丨四方作儀韓文河中府連理木頌為戎臣師丨丨丨丨韓文與柳公綽書柘臯敗敵李顯宗字君錫兀术寇邊劉光世充三京等路宣撫使表公為本司前軍都統制上以宸翰賜公曰卿如立竒功與卿建節諸將㑹淮西戰於丨丨兀术大敗公追至孔城奪耄倪之被虜者以萬計言行錄和尚原戰丞相魏國張忠獻公浚兀术欲窺蜀公令陜西都統制呉玠於鳳翔府之丨丨丨先處丨地誘致其來兀术引衆十餘萬來犯玠與敵戰凡三十餘陣兀术中箭而遁俘其將羊哥孛堇及酋領三百甲殺賊衆横尸滿野兀术其衆損者過半皆呻吟扶攜以歸同上戰大人洲李顯忠時金亮犯順公以池州都統移軍舒城除御營先鋒都統制堠騎報賊兵萬人渡淮公領趙康年等與金丨于丨丨丨首挫其鋒乗勝掩擊過淮金軍溺死者千餘人同上柳子厚為楊侍郎祭張都䕶文柱史稍遷郎曹繼昇程功佐理海裔斯澄乃紀南方專任是慿禮分五玉思錫百朋李遐叔張韓公廟碑銘唐之元老有大庇於生人曰韓公公盡禮大朝位尊將相三城立廟軍帥乞靈則祠之天寶季嵗華奉使朔方展敬祠下式瞻風采像與神合沈沈如生嗚呼生以功為臣殁以靈為神神乎宜奉公總戎疆外懸衡審政拒隴循河緜亘萬里堅城雄防扞蔽三輔介胄之士垂十萬人瞻我麾節以為進退先是突厥犯塞乗勝入朔方游騎至安定官軍不到經畧失守虜乃驅監牧之騋牝退存廬帳進圍聚邑鳴弓躍馬規復漠南邊人揺心元聖軫念節將更至咸以為請搢紳獻議則以和親為便中宗未之許也初以公耄老且重煩之及卜師於太宫之庭唯公之吉至尊親臨前殿授以兵符公承命徂征北蕃逆駭記所謂君子有其時有其命公得其二而伸其一者也公忠貫神明慮幾造化鎮以長策潰其姦謀一麾偏師屠名王復喪馬奪塹拂雲維而城之並阿之河列築三鎮將精士銳談笑就役匈奴莫敢南視雷哭而遁老幼望公以相震怖不然則乗冰轉鬬無日無之既而據河山翫其動靜納行旅歸之袵席慿墉而望匹馬單兵不匿影形虜由是械手足而刳腹心朝廷無草竊之虞矣天下減征役之半矣詩云文武吉甫萬邦為憲又曰方叔元老克壯其猷公之謂也帳下之厮尚有存者曰公號令素嚴人無違禁自將吏騎卒咸有旗表節不常出出則賞罰全隨之賞無非功罰無非罪上流而下競心行而事從謀功成由此術也三城旣就刋木標櫓記之種落刻其降年後皆知之豈挺生上將之龜策也竒鑒先物之然也夫鳥獸草木出其倫輩猶或利害慿焉况殊績功勲終始天地翼輔先聖寵綏元元有茅杜之尊符節之重後奉者果一勝遂一謀庸非明聖幽贊之效雅有吉甫薄伐至于太原王命南仲城彼朔方傳稱齊桓伐戎攘狄以其病燕滅衛魏絳和戎狄合諸侯從古及今以為大功其餘秦恬漢青之倫纔丘垤耳尚或筮頌颺之簡冊貴之况忠武卓異屢復今昔而詠歌舞之非古也竊感趙孟懷隨武之徳寤寐永嘆奉銘神宫其文曰赫爾韓公司武有經受命北伐渠魁就刑敢或不順鼓行風霆崇岱壓卵滄波灌螢沈泉雷動機發㝠㝠功奮三城人謡億齡謀出先後構危於寧張天之威恢廟之靈北狄頓顙山戎來庭萬里寢柝縁河罷扄趨拜故祠徳謝惟馨朝野何有羣山青青感激遺風徘徊涕零吾誰與歸式薦斯銘詩集弓箭圍狐兎軍馬旣頻召戎馬乃連跨大梁從相公彭城赴僕射丨丨丨丨丨絲竹羅酒䏑韓愈詩冠蓋催入相暫辭堂印執兵權盡管諸軍破賊年丨丨相望丨丨丨待將功徳格皇天韓愈次潼闗上都統相公詩號令取天驕飛將是驃姚行營已近遼河冰堅度馬塞雪密藏鵰敗壘殘旗在全軍列帳遥傳呼更丨丨今夜丨丨丨僧惠氣塞上贈王太尉詩無戰是天心上卿増命服都䕶揚歸斾鳴笳瀚海曲按節陽闗外落日下河源寒山爭秋塞丨丨丨丨丨天心同覆載王維奉和聖製送石蒙都䕶兼鴻臚歸安西詩華騮嘶皷角邊塵已滅天山外閉閣隂隂日復曛櫪上丨丨丨丨丨門前老將識風雲旌旗四面髙秋見絲竹千家靜夜聞莫道古來多計策功成唯有李將軍耿緯上裴行軍詩自拔鹿頭城當年膽畧已縱横毎見妖星氣不平身貴早登龍虎道功高丨丨丨丨丨尋常得對論邊事委曲承恩掌内兵㑹取安西將報國凌烟閣上早書名孟郊贈超將軍詩賓客冠金貂百萬􅆛貅趨玉帳三千丨丨丨丨丨羅隠上羅鄴王詩副都統歴代沿革唐興元中置副都統職林紹興中亦有副統制隆興二年詔應諸軍副都統制並罷乾道三年五月陳天麟奏荆南都統王宣久病邊報不一恐緩急誤事蔣芾奏員琦為副都統制就同管軍閏七月上謂宰執曰朕欲江上諸軍各置副都統制一員令兼領軍事豈惟儲他日統制亦使主將有所顧忌於是以郭剛為鎮江副都統制張榮為建康副都統制三省樞密院定制云已復置在外副都統制禆贊主帥商議軍事覺察姦弊所有本司文字與都統連銜調發軍馬并聽都統指揮月旦亦許上表孝宗㑹要平江許浦水軍乾道間置副都統以領之朝野雜記事類佐軍晉使趙武以丨新丨左傳為右萊駒丨丨同上戎御晉悼公知欒糾之能御以和於政也使為丨丨國語戎右晉知荀賈之有力使為丨丨左傳元候知張老之智而不計也使為丨丨謂偏將也國語晉語偏師先穀事左傳偏裨馮奉世傳叅戎在丨丨之盛列史記叅戎副常制丨於丨丨協我師旅晏類要倅戎事白集制副都統副旌麾丨丨丨於戎閫戒士馬於棘門唐太詔令常衮行辛景宗制翊外閫丨丨丨而專征膺鑿門而受律續通典叅戎政自古軍制必有佐貳逮至漢氏亦循舊章既得將才俾丨丨丨實資謀䇿州正紀綱李德裕制佐戎斾夙以驍騎之鋒累丨元丨之丨同上行史憲制佐戎亞旅大夫也左傳早叅戎秩丨丨丨丨田承嗣制軍倅之任長慶元年以王智興為節度副使事續通典左軍之選李光弼除副知節度行營詔元帥之任實屬於師身丨丨丨丨諒資於邦傑分麾之寵宜副出車之命仍踐丨丨丨丨同上詩集丹霞破佛手知是丨丨丨丨丨先聲想已懾羣夷東坡送錢承制赴廣西副都統都幹歴代沿革都統制僚屬有計議官一員主管機宜文字二員一辟親屬幹辦公事一員提㸃醫藥飯食一員事類叅戎丨丨作弼文選楊荆州誄佐戎初試丨丨韓文祭馬總文賓僚軍前之要掌在丨丨白居易路貫制叅務丨丨戎旃白集行盧衆制典文章班固傳毅之徒皆置於戎幕以丨丨丨李文饒集展芙蓉營開楊柳幕丨丨丨海録碎事事前軍幕昔丨丨丨丨文選倣古制庇身戎幕丨丨丨丨唐文粹髙適後漢董卓廟碑乃佐戎幕出官府廷丨丨丨丨韓文為裴垍讓官表效策戎幕因丨丨於丨丨唐太詔令魏伯玉制贊畫戎壘丨丨丨丨公是行鄭宗輔制統制歴代沿革統制統領官三衙及御前軍將佐也祖宗時禁兵但以路分都監等領之渡江後大軍又有統制同統制副統制統領同統領副統領等其下乃有正將副將準備將之名皆偏禆也舊制準備而上自主帥陞差仍先申樞密院定察紹熙四年詔江上陞差統制至準備將今主帥解發三人赴總領所内選一名慶元三年詔陞差並委主帥自是主帥之權復重矣事類好漢楊沂中傳沂中下統制官呉進將所部二千人還臨安進勇於戰常對御騎射上曰好漢進聞之刺丨丨呉進字作楷心每閲兵則披以示衆言行録大功賊衆劉猊十萬已次于濠壽之間張浚拒之詔併以淮西軍屬浚沂中為張浚統制官浚遣沂中至泗州與浚合且使謂之曰上待統制厚宜及時立丨丨取節鉞或有差秩浚不敢私復江州和義揚郡王沂中傳李成叛江南招討使張浚議所以破賊王時為右軍統制官遂由上流徑絶生米渡出賊不意遇其先鋒擊退之賊將馬進鋭卒數萬乗犯浚率步兵攻其前沂中乃將騎數千與神武後軍統制陳思恭出山後前後夾擊乃大破之遂丨丨丨並同上都總管副總管附歴代沿革魏黄初始置都督諸州軍事後周改都督諸軍事為總管武帝時以王謙為益州總管之名始此通