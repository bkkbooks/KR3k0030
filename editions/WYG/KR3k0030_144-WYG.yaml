路第十一西路桂州第十二邕州第十三實録合諸路九十二將各有正副軍中行圖陣隊調𤼵賞罰皆闗決於將副宣和六年詔元祐元年司馬光請盡罷諸路將官其禁軍各委本州縣長吏與總管鈐轄都監押等轄一如未置將官以前之法而樞密院難之止詔諸路將副在州駐劄不係路分兵官知州并州鈐轄兼充者並差將官一員兼本州都監其單將駐劄處勿復差兼宣和五年御筆諸路將副部隊自今並依元豐法選差中興㑹要乾道四年密院奏諸州揀中弓弩手雖已差路分鈐轄都監春秋詣諸路巡按縁逐州未有將官專一日逐訓練恐致事藝生踈詔諸州各置淮備將一員專一管轄日逐訓練揀中弓弩事藝孝宗㑹要哲宗職官志諸路將官掌統制所𨽻禁旅以行陣隊伍金鼓旗幟弓矢擊刺之法而教習訓練之别其武藝精强者待次迂補以激勸士卒凡兵仗器甲之數廪祿犒設賞罰約束之禁令皆掌焉副將為之貳若屯戍防邊則受師同節制道寇敵則審其戰守應援之事若師有功則具馘數藉用命者而旌賞之續㑹要事類節將代劉𢎞逸與鎮州將上書李衛公集將兵劉舜欽字希文熙寧初詔求將帥近臣以舜欽名聞命總京東九郡丨丨訓之悉以新書從事三年詔以所部軍閲於内殿神宗歎曰坐作有度其可用也本傳出處同上控扼郭成進築平夏城置第十將以戌之章楶謂諸將曰新邊丨丨誰可付者皆曰非郭成不可遂用之東都事畧按試元豐間王祖道言陜西河北京東府路將皆朝廷所選擇尚多庸人其餘淮浙等路雖有團治訓練之法而無教閲丨丨之實望密下諸路經畧監司體量將副第人材為三等職畧力戰禦賊劉仲武字子文為涇原路第一將夏人欲犯天聖砦主帥檄仲武㑹兵於天聖約過某日賊不來則分屯去仲武得賊的期乞緩分屯主帥止留一將及仲武軍賊果至仲武丨丨丨之丨屯去遷熙河路兵馬都監東都事畧戰功為多趙隆除涇原第九將與夏人丨却夏人丨丨丨同上西戎無犯塞李顯忠為鄜延路兵馬都監兼充第六正將丨丨入寇公屢擊之自是丨敢丨丨言行錄巡轄馬遞鋪事類捉驛唐劉晏初州縣取富人主郵遞謂之丨丨驛遞駕部門丨丨續通典主郵傳大厯十一年華原尉侯莫陳息以丨丨丨優改長安尉同上校信宿季月之晦必令其簿書以視其等列而丨其丨丨柳子厚館驛使壁記千里内尤重館驛之制於丨丨之丨丨丨同上園令歴代沿革漢制每園各令一人秩六百石國朝乾徳二年以河南府鞏縣令孔美兼安陵事至道三年新修永熙陵時置令一員專切管勾景徳四年正月詔永安鎮建為縣𨽻河南府同赤縣其知縣兼陵臺令事類守陵園令掌丨園丨案行掃除漢書司墓陵臣丨丨胡廣陵令箴為令漢司馬相如為茂陵令陵監梁天監七年丨丨之名不出前誥且宗廟憲章旣備典理園陵職司理不容異諸王陵先立監者改為令唐官品制江淮鐵錢官事類鐵冶呉及傳舊制主丨丨者得補班行陳升之奏下議省之既定藁呉及與沈起輒増注興國軍磁湖鐵錢如舊制此係李清臣作傳又續通典唐西北邊州禁人無置鐵錢國史鐵官西漢郡國有丨丨甲仗事類鎧曹隋有丨丨皇朝改鎧曹為胄曹六典注胄曹見上不釐務事類空尸祿俸盧懷慎為御史中丞上疏臣竊見京朝諸司官員委積多者數餘十倍官不必備此則有餘人代天工多不釐務云云官員中或簮􅅂雅望或臺閣舊人或明習憲章或諳閑政要皆一時之良幹多不同案牘丨丨丨丨滯其才而不勝其用尊其位而不盡其力唐書添差事類具員外吏張説曰學士以徳行相推非丨丨丨丨唐有具員簿建中三年復置具員簿又宣宗謂令狐綯曰朕要知官員名數綯曰六品以下吏部注擬員額至多所司有簿籍謂之具員文武登朝官除授者宰相各執其員一本以考年限續通古今合璧事類備要後集卷七十五
