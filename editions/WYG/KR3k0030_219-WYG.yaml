body:
  text: 古今合璧事類備要别集卷十三宋謝維新撰宫室門宫殿宫室志要宫穹也屋見於垣上穹然髙也殿其大堂也形象東井刻為荷菱水物所以厭火灾盖嘗考之宫之制其來久矣而殿則商周以前其名不載按史記秦始皇初作前殿上可以坐萬人下可以建五丈之旗是則殿之所從始也然自周秦以上制度不厭簡陋至周而後大備降及于秦乃始尚宏麗非復古人之影響也况秦漢而下日敝於文土木之功愈浩矣且天子之宫殿非令壯麗固無以重威獨不思以四海為家而遽忍竭民之膏窮民之力以從事一室乎此有道之君惟務崇儉不務崇奢惟事廣徳不務廣居而所御之宫殿惟修舊而已不廢其成而已矣事類禁中伏儼曰蔡邕云本為禁中門閤有禁非侍御之臣不得妄入行道豹尾中亦為丨丨孝元皇后父母禁避之故曰省中師古曰省察也言入此中皆當視察不可妄也漢書宸中楓槐被宸注宸帝居屋宇也言植此木於丨丨何晏賦雙闕宫門丨丨鄭衆云象魏闕也劉熈釋名云闕在門兩旁中央闕然為道也然則其上縣法象其狀巍然髙大謂之象魏使人觀之是觀與象魏闕一物而三名也門之相對為雙故名焉並釋名兩觀闕觀也古者每門樹丨丨於其前所以標表宫門也其上可居登之則可徧觀故謂之觀人臣將朝至此而書其所闕多少故謂之闕其上皆丹壁其下皆畫雲氣仙靈竒禽恠獸以昭示四方焉蒼龍闕畫蒼龍白虎闕𤣥武闕畫白虎𤣥武朱雀闕畫朱雀三枚崔豹古今注端門丨丨注師古曰殿之正門漢掖門丨丨注服䖍曰正門之旁小門如人臂掖也漢成帝紀又宣政門内有宣政殿東有東上閤門西有西上閤門故以掖稱長安志丹地丨丨注以丹淹泥塗殿上地梅福傳彤庭玉除丨丨西都賦冬窟夏巢昔者先王未有宫室丨則居營丨丨則居櫓丨注寒則累土暑則聚薪柴居其上記禮運上棟下宇上古穴居而野處後世聖人易之以宫室丨丨丨丨以待風雨盖取諸大壯易繫辭兵師為衞黄帝邑于涿鹿之阿遷徙無常以丨丨丨營丨通鑒外紀茅茨不剪堯之有天下也堂髙三尺采椽不斵丨丨丨丨李斯傳禹戒雕墻夏啓五子述大丨之丨以作歌云云其二曰云云峻宇丨丨有一於此未或不忘書五子之歌湯儆恒舞制官刑儆于有位曰敢有丨丨于宫酣歌于室時謂巫風書伊訓禹無間然子曰丨吾丨丨丨矣卑宫室而盡力乎溝洫語湯以自責丨丨六事丨丨曰云云宫室崇歟傾宫瑶臺桀為丨丨丨丨殫百姓之財瓊室玉門紂為丨丨丨丨其大三里髙千尺七年乃成並通鑒外紀前朝後市左祖右社丨丨丨丨注王宫當中記考工體國經野丨丨丨丨注鄭司農云營國方九里國中九經九緯左祖右社前朝後市禮天官宫阿五雉王丨門丨之制丨丨隅之制七雉注阿棟也禮考工堂髙九尺有以髙為貴者犬子之丨丨丨記禮器路門畫虎師氏居虎門之左注虎門路寢門也王日視朝于丨寢丨外丨丨焉以明勇猛前以詔王又大寢門外如今宫殿端門下禮魏闕觀象正月之吉始和布治于邦國都鄙乃縣治象之法于象丨丨萬民丨治丨挾日而歛之禮豳居允荒篤公劉既景廼岡云云丨丨丨丨聿來胥宇古公亶父來朝走馬率西水滸至于岐下爰及丨女聿丨丨丨曰止曰時築室于兹宣王考室斯干丨丨丨丨也云云築室百堵西南其户爰居爰處爰笑爰語約之閣閣㭬之槖槖風雨攸除鳥䑕攸去君子攸芋如跂斯翼如矢斯棘如鳥斯革如翬斯飛君子攸躋殖殖其庭有覺其楹噲噲其正噦噦其㝠君子攸寧詩穆王清都丨丨及化人之官以為丨丨紫微鈞天廣樂帝之所居列子至故宫室箕子諌紂不聽其後箕子朝周丨丨殷墟丨丨毁壊生禾黍箕子傷之乃作麥秀之詩以歌詠之宋世家至故宗廟黍離閔宗周也周大夫行役至于宗周丨丨丨丨宗室盡為禾黍閔周室之顛覆彷徨不忍去故作是詩也詩王國風阿房宫殿始皇以為咸陽人多先王之宫庭小乃營作朝宫渭南上林苑中先作前殿阿房東西五百歩南北五十丈上可以坐萬人下可以建五丈旗周馳為閣道自殿下直抵南山表南山之顛以為闕為複道自阿房度渭屬之咸陽以象天極閣道絶漢抵營室也注阿房者言殿之四阿皆為房也一説大陵曰阿言其殿髙若于阿上為房營室星名天官書曰太極紫微宫後十七星絶漢抵營室曰閣道閣道亦星名也北斗未央宫殿丨丨丨漢書曰髙祖七年蕭何造未央宫立東闕北闕前殿武庫太倉上見其壯麗甚怒曰天下匈匈勞苦數嵗成敗未可知是何治宫室過度也何對曰以天下未定故可因以治宫室且天子以四海為家非令壯麗無以重威無令後世有以加也上悦自櫟陽徙居焉丨丨丨周迴二十八里前殿東西五十丈深十五丈髙三十五丈營未央宫因龍首山以制前殿至孝武以木蘭為棼橑文杏為梁柱金舖玉户華榱璧璫雕楹玉磶重軒鏤檻青𤨏丹墀左墄右平黄金為壁𢃄間以和氏珍玉風至其聲玲瓏也未央宫有宣室麒麟金華承明武臺鈎弋等殿又有殿閣三十有二有壽成萬嵗廣明椒房清涼水延玉堂壽安平就宣徳東明飛雨鳯凰通光曲臺白虎等殿廟記云未央宫有増成昭陽殿漢宫殿疏曰未央宫有麒麟閣天禄閣有金馬門青𤨏門𤣥武蒼龍二闕朱鳥堂甲觀非常室又有鈎盾署弄田三輔決録曰未央宫有延年殿合歡殿四車殿又漢宫觀記云未央宫有宣明長年温室昆徳四殿又有玉堂増盤閣宣室閣三輔舊事云武帝於未央宫起髙門武臺殿漢武故事曰神明殿在未央宫王莽改未央宫曰壽成室前殿曰玉路堂如路寢也按舊圖漸臺織室凌室皆在焉三輔黄圖長樂宫殿丨丨丨本秦之興樂宫也髙皇帝始居櫟陽七年長樂宫成徙居長安城三輔舊事宫殿疏皆曰興樂宫秦始皇造漢修飾之周廻二十里前殿東西四十九丈七尺兩杼中三十五丈深十二丈長樂宫有鴻臺有臨華殿有温室殿有信宫長秋永壽永寧四殿髙帝居北宫後太后常居之孝惠至平帝皆居未央宫漢書宣帝元康四年神爵五采以萬數集長樂宫五鳯三年鸞鳯集長樂宫東闕中樹上王莽改長樂宫為常樂室在長安中近東直杜門仝上甘泉宫殿丨丨丨一曰雲陽宫史記秦始皇二十七年作甘泉宫及前丨築甬道自咸陽屬之關輔記曰林光宫一曰丨丨丨秦所造在今池陽縣西故甘泉山宫以山為名宫周匝十餘里漢武帝建元中増廣之周十九里去長安三百里望見長安城黄帝以來圜丘祭天處遁甲開山圖云陽先生之墟也武帝闕於南以象方象於甘泉宫更置前殿始造宫室有芝生甘泉殿邊按西漢舊儀云芝有九莖帝又起紫殿雕文刻鏤黼黻以玉飾之成帝永始四年行幸甘泉郊泰畤神光降於紫殿宫有髙皇宫又有林光宫有長定宫竹宫通天臺通靈臺武帝作迎風館于甘泉山後加露寒儲胥二館皆在雲陽甘泉中西廂起彷徨觀築甘泉苑建元中作石闕封巒鳷鵲觀於苑垣内宫南有昆明池苑南有棠梨宫建章宫殿丨丨丨武帝太初元年柏梁殿灾粤巫勇之曰粤俗有火灾即復起大屋以厭勝之帝於是作丨丨丨度為千門萬户官在未央宫西長安城外帝於未央宫營造日廣以城中為小乃於宫西跨城池作飛閣通丨丨丨構輦道於上下宫之正門曰閶闔髙二十五丈亦曰璧門左鳯闕髙二十五丈右神明臺門内北起别風闕髙五十丈對峙井幹樓髙五十丈輦道相屬焉連閣皆有罘罳前殿下視未央其西則廣中殿受萬人三輔舊事云丨丨周迴三十里東起别風閣髙二十五丈乗髙以逺望又于丨門北起圓闕髙二十五丈上有銅鳯凰赤眉賊壊之鳯凰闕武帝造髙七十丈五尺一名别風闕又嶕嶢闕在圓闕門内二百歩漢書曰丨丨丨南有玉堂璧門三層臺髙三十丈玉堂内殿十二門階皆玉為之鑄銅鳯髙五尺飾黄金栖屋上下有轉樞向風若翔椽首薄以璧玉闕有璧門建章有駘蕩馺娑枵詣天梁竒寳鼔簧等官又玉堂神明堂疏圖鳴鑾竒華銅柱函徳二十六殿太液池唐中池北宫宫殿丨丨在長安城中近桂宫俱在未央宫北周迴十里髙帝時制度草創孝武増修之中有前殿廣五十歩珠簾玉户如桂宫漢書曰吕后崩孝恵皇帝廢處北宫又曰哀帝崩貶皇太后趙氏為孝成皇后退居北宫皇后薄氏退居桂宫桂宫宫殿丨丨漢武帝造周迴十餘里漢書曰桂宫有紫房複道通未央宫三輔記云桂宫在未央北中有明光殿上山複道從宫中西上城至建章神明臺蓬萊山三秦記未央宫漸臺西有桂宫中有明光殿皆金玉珠璣為簾箔處處明月珠金戺玉階晝夜光明又西京雜記云武帝為七寳牀雜寳按厠寳屏風列寳帳設於桂宫時人謂為四寳宫或亦以為北宫並仝上垂楊數畆長楊宫在今盩厔縣東南三十里本秦舊宫至漢修飾之以備行幸宫中有丨丨丨丨因為宫名門曰射熊觀秦漢游獵之所五柞連抱五柞宫漢離宫也在扶風盩厔縣中有丨丨樹因以為名五柞皆丨丨其枝覆䕃數畆瓦化鴛鴦魏文帝謂周宣曰朕夢殿上雙丨落地丨為丨丨何也宣曰當有暴死者魏志門外銅駞晉索靖有先識逺見知天下將亂指洛陽宫丨丨丨丨嘆曰㑹見汝在荆棘中魏好土功丨明帝丨丨丨既作許昌宫又治洛陽宫起昭陽太極殿築緫章觀髙十餘丈力役不已農桑失業陳羣力諌帝乃為之少有減省通鑒本紀宋興土木自晉氏渡江以來宫室草創朝宴所臨東西二堂而已晉孝武末始作清暑殿丨丨無所増改上始大修宫室丨丨被錦綉嬖妾幸臣賞賜傾府藏壊髙祖所居隂室於其處起玉燭殿與羣臣觀之牀頭有土障壁上挂葛燈籠麻繩拂侍中袁顗因盛稱髙祖儉素之徳上不答獨曰田舍翁得此已為過矣宋孝武紀夷山堙谷隋文帝開皇十三年二月詔營仁壽宫于岐州之北使楊素監之素奏前萊州刺史宇文愷撿校將作大匠記室封徳彛為土木監於是丨丨丨丨以立宫殿崇臺累榭宛轉相屬役使嚴急丁夫多死疲頓顛仆者堆填阬坎覆以土石因而築為平地死者以萬數至十五年三月宫成上幸之見制度壯麗大怒曰楊素殫民力為離宫為吾結怨天下素聞之惶懼以告封徳彜徳彜曰公勿憂俟皇后至必有恩詔明日上果召素入對獨孤后勞之曰公知吾夫婦老無以自娛盛飾此宫豈非忠孝賜錢百萬錦絹三千段本紀接澗跨洛隋煬帝大業元年敇宇文愷與内史舍人封徳彜等營顯仁宫南丨瀍丨北丨丨濵發大江之南五嶺以北竒材異石輸之洛陽又求海内嘉木異草珍禽竒獸以實苑囿云云自長安至江都置離宫四十餘所雕飾華靡唐太宗修洛陽宫將作大匠竇璡鑿池築山丨丨丨丨上怒遽命毁之免璡官通鑒貞觀五年制度卑小唐太宗將幸九成宫即隋仁壽宫姚思亷諫上曰朕有氣疾暑輒煩劇往避之耳賜思亷絹五十匹監察御史馬周上疏以為東宫在宫城之中而大安宫乃在宫城之西丨丨比於宸居尚為丨丨於四方觀聽有所不足宜増修髙大以稱中外之望又太上皇春秋已髙陛下宜朝夕視膳今九成宫去京師三百餘里太上皇或時思念陛下陛下何以赴之又車駕北行欲以避暑太上皇尚畱暑中而陛下獨居涼處温凊之禮竊所未安今行計已成不可復止願速示反期以解衆惑御宣政殿唐制天子御正殿宣政則起居郎居左舍人居右有命俯陛以聽退而書之季冬以授史官貞觀初以給事中諫議大夫兼知起居事每仗下議政事起居郎執筆記録于前史官隨之其後復置起居舍人分侍左右秉筆隨宰相入殿唐史百官志對紫宸殿唐制仗在紫宸殿名内閣則起居郎舍人夾香案分立殿下直第二螭首和墨濡筆皆即坳處時號螭頭仝上賜對延英憲宗朝李絳嘗盛夏對延英帝汗浹衣絳欲趍出帝曰欲與卿講天下事乃甚樂也文宗鋭意於治每延英對宰臣率漏下十一刻召見金鑾賀知章見李白之文歎曰子謫仙人也言於𤣥宗丨丨丨丨殿論當世事奏頌一篇帝賜食親為調羮有詔供奉翰林多種花桞唐殿庭間丨丨丨丨故杜詩云花覆千官淑景移又云退朝花底散歸院桞邉迷朱氏實録惟植槐楸國朝丨丨丨丨鬱然有嚴毅氣象仝上洞開諸門太祖命改晉太寧宫一如洛陽宫之制既成太祖坐正殿令丨丨丨丨直望謂左右曰此如我心少有邪曲人皆知之洓水杜牧之阿房宫賦六王畢四海一蜀山兀阿房出覆壓三百餘里隔離天日驪山北構而西折直走去聲咸陽二川溶溶流入宫墻五歩一樓十歩一閣廊腰縵迴簷牙髙啄各抱地勢鈎心鬬角盤盤焉囷囷焉蜂房水渦矗初六反不知其幾千萬落長橋卧波未雩何龍雩一作雲複道行空不霽何虹髙低㝠迷不知西東歌臺暖響春光融融舞殿泠袖風雨淒淒一日之内一宫之間而氣候不齊妃嬪媵嬙王子皇孫辭樓下殿輦來于秦朝歌夜弦為秦宫人明星熒熒開粧鏡也緑雲擾擾梳曉鬟也渭流漲􅕹棄脂水也煙斜霧横焚椒蘭也雷霆乍驚宫車過也轆轆逺聽杳不知其所之也一肌一容盡態極妍縵立逺視而望幸焉有不得見者三十六年燕趙之收藏韓魏之經營齊楚之精英幾世幾年剽掠其人倚疊如山一旦不能有輸來其間鼎鐺玉石金瑰珠礫棄擲邐迤秦人視之亦不甚惜嗟乎一人之心千萬人之心也秦愛紛奢人亦各念其家柰何取之盡錙銖用之如泥沙使負棟之柱多於南畆之農夫架梁之椽多于機上之工女釘頭磷磷多於在庾之粟粒瓦縫參差多于周身之帛縷直欄横檻多于九土之城郭管絃嘔啞多于市人之言語使天下之人不敢言而敢怒獨夫之心日益驕固戍卒呌函谷舉楚人一炬可憐焦土嗚呼滅六國者六國也非秦也族秦者秦也非天下也嗟夫使六國各愛其人則足以拒秦使秦愛六國之人則􅉍三世可至萬世而為君誰得而族滅也秦人不暇自哀而後人哀之後人哀之而不知鍳之亦使後人而復哀後人也王延壽靈光殿賦丨丨丨父逸欲作此賦命文考往圖其狀文考因韻之以簡其父父曰吾無以加也時蔡邕亦有此作十年不成邕見文考此賦遂隐而不出文考時年二十至二十四過漢江溺而死魯靈光殿者盖景帝程姬之子恭王餘之所立也初恭王始都下國好治宫室遂因魯僖基兆而營焉遭漢中微盗賊奔突自西京未央建章之殿皆見隳壊而靈光巋然獨存意者豈非神明依憑支持以保漢室者也然其規矩制度上應星宿亦所以永安也予客自南鄙觀藝於魯覩斯而眙曰嗟乎詩人之興感物而作故奚斯頌僖歌其路寢而功績存乎辭徳音昭乎聲物以賦顯事以頌宣匪賦匪頌將何述焉遂作賦曰粤若稽古帝漢祖宗濬哲文明殷五代之純熙紹伊唐之炎精荷天衢以元亨廓宇宙而作京敷皇極以創業恊坤道而太寧於是百姓昭明九族敦序乃命孝孫俾侯于魯錫介圭以作瑞宅附庸而開宇乃立靈光之秘殿配紫微而為輔承明堂于少陽昭列顯於奎之分野瞻彼靈光之為狀也則嵳峩㠑嵬峞巍㠥􅞸吁可畏乎其駭人也􅀈嶢倜儻豐麗愽敞洞轇轕兮其無垠也邈希世而特出羗瓌譎而鴻紛屹山峙以紆鬱隆崫􅀢乎青雲鬱坱圠以増􅴝崱繒絞而龍鱗汨磑磑以墔璨赫燡燡而爥坤狀若積石之鏘鏘又似乎帝室之威神崇墉岡連以嶺屬朱闕巖巖而雙立髙門擬于閶闔方二軌而並入於是乎乃歴夫太階以造其堂附仰顧盻東西周章彤彩之飾徒何為乎澔澔涆涆流離爛熳皓壁􅀈曜以月照丹桂歙赩而電烻霞駮雲蔚若隂若陽瀖濩燐亂煒煒煌煌隱隂夏以中處霐寥窲以峥嶸鴻爌熀以爣閬䬙蕭條而清泠動滴瀝以成響殷雷應其若驚耳嘈嘈以閒聽目矎矎而䘮精駢宻石與琅玕齊玉璫與璧英逐排金扉而北入宵藹藹而晻曖旋室㛹姢以窈窕洞房呌窱而幽邃西廂踟蹰以閒宴東序重深而奥秘屹鏗瞑以勿罔屑黶翳以懿濞魂竦竦其驚斯心􅓥􅓥而發悸於是詳察其棟宇觀其結構規矩應天上憲觜陬倔佹雲起嶔崟離樓三間四表八維九隅萬楹叢倚磊砢相扶浮柱岹嵽以星懸漂嶢􅒈而枝柱飛梁偃蹇以虹指掲蘧蘧而騰湊層櫨􅛡佹以岌峩曲枅要結而環句芝㮌攅羅以戢孴搏負枝牚蔚以扠㧎而斜據傍夭蟜以横出互黝糾而下岪璀錯上﨑嶬而重注㨗獵鱗集支離分赴縱横絡繹各有所趣爾乃懸棟結阿天窗綺疎圓淵方井反植荷渠發秀吐榮菡蓞披敷綺房紫的窋䆛垂珠雲楶藻棁龍桷雕鏤飛禽走獸因水生姿奔虎攫拏以梁倚仡奮罝而軒箸虬龍騰驤以蜿蟺頷若動而躨踞朱鳥舒翼以峙衡騰蛇蟉蚪而遶榱白鹿子蜺於樽櫨蟠螭宛轉而承楣狡跧伏於柎側猨狖攀椽而相追𤣥熊蚰䗊以齗齗却負載而蹲跠齊首目以瞪盻徒脈脈而狋狋彌胡人遥集於上楹儼雅跽而相對仡欺􅓥以鵰􅀈於危䫜􅉃嚬顤而含顟遼而睽睢狀若悲愁處蹙悴神仙岳岳於棟間玉女闚窗而下視忽瞟眇以響像若鬼神之彷彿圖畫天地品類羣生雜物竒恠山神海靈寫載其狀託之丹青千變萬化事各繆形隨色象類曲得其情上紀開闢邃古之初五龍比翼人皇九頭伏羲鱗身女蝸虵􅥟鴻荒撲畧厥狀睢盱煥炳可觀黄帝唐虞軒冕以庸衣裳有殊下及三后滛妃亂主忠臣孝子烈士貞女賢愚成敗靡不載叙惡以誡世善以示後於是乎連閣承宫馳道周環長塗升降軒檻曼延漸臺臨池層曲九成屹然特立的爾殊形髙徑華葢仰看天庭飛陛掲孽縁雲上征中坐垂景頫視流星千門相似萬户如一巖突洞出逶迤詰屈周行數里仰不見日何宏麗之靡靡咨用力之妙勤非夫通神之俊才誰能剋成乎此勲據坤靈之寳勢承蒼昊之純殷包隂陽之變化含元氣之烟煴𤣥醴騰涌於隂溝甘露被宇而下臻朱桂黝儵於南北芝蘭阿那於東西祥風翕習以䬃灑激芳香而常芬神靈抉其棟宇歴千載而彌堅永安寧以祉福長與大漢而久存實至尊之所御保延夀而宜子孫茍可貴其若斯孰亦有云而不珍亂曰彤彤靈宫巋㠑穹崇紛厖鴻兮崱屴嵫釐岑崟􅀢嶷騈巃嵸兮連拳偃蹇崙菌踡􅀈傍欹傾兮歇歘幽靄雲覆霮䨴洞杳㝠兮葱翠紫蔚礧碨瓌瑋含光晷兮窮竒極妙棟宇已來未之有兮神之營之瑞我漢室永不朽兮梁周翰五鳯樓賦伊京師之權輿也遐哉邈乎騐河圖之象按輿地之書宅禹貢豫州之域距天文辰馬之墟因四履建侯之地為六代興王之居城浚而都𣲖河而渠結坤之絡振乾之樞星甍櫛堵我民之廬海漕山廥我田之租勢雄跨胡氣王吞吳茫茫萬國魚貫而趍惟聖皇之受命應期運而握符光潛躍於龍徳踐元亨於帝衢道徳何師尊盧赫胥揖譲何比陶唐有虞英畧神武威憚八區封豕必誅長鯨盡刳虎皮包闕鵠板搜儒墜典皆索闕政咸鋪成天下之大務若雷奮而風驅乃顧京室時行聖謨陋宸極之非制稽紫垣之舊圖且曰不壯不麗豈傳萬世禹之卑宫葢勿暇之計堯之茅茨非經久之制矧象魏之懸法伊億兆之所視况我力如天我貲如地不漁爾民不牟爾利一毫之費差足為易乃詔共工度景之中因舊謀新它徒之功臺卑者豐棟易而隆椽斵而礱去地百歩在天半空五鳯翹翼若鵬運風雙龍蟠首若鼇載宫丹楯霞繞神光何融朱楹虹植晴文始烘綉楣焜燿雕栱玲瓏椒壁塗赭綺窗暈紅雙闕偶立突然如峯平見千里深映九重奔星墜而交觸靈景互而相逢門呀洞缺若天之裂縱舉百武横駕六轍金鋪爍人光景明滅舞陽之力莫得而排叔梁之力胡可以抉其下則冠葢威㽔劍佩陸離車如流水待漏而馳駕肩排踵兼蠻渾夷萬衆紛錯魚龍尊卑咸去來之由此奔兢湊於玉墀亶皇風之無外豈朝盈之有時三事庶尹乃拜表蕭墻謁帝未央以落大壯登謌永昌曰元聖明兮帝道昌威四海兮君萬方時髙闕兮冠百常赫宋徳兮垂無疆瞻天顔兮獻壽觴願君王兮長樂康帝曰俞哉爾觴且置當聽朕言庶曉朕意頃於戎馬之暇詳窺歴代之記乃知乎夏徳之衰璇室且庇商宫之壊傾宫太侈楚王章華一身何寄秦皇阿房二世而棄漢武柏梁孽火隨熾陳后三閣義師尋至豈非乎禍生於漸欲起於恣亦如崇飲不已必至昏酒嗜師不已必至乏瘁遷怒不已必絶人祀窮兵不已必暴人胔甘諛不已必杜忠義溺讒不已必斥賢智亡國之君未嘗不爾朕皆知之得以趍避滛於土木雅不如是美其成功良以為愧不舉君觴恐驕朕意其大者天地所重者神噐尾虎足氷終日惴惴當共重之勿使顛墜謹謝公卿无忘納誨羣臣以退咸呼萬嵗洪景盧選徳殿記乾道三年正月丙寅詔臣邁夕對景徳殿賜之坐極論古今治亂事及祖宗以仁守天下紀綱法度使後世有以持循者衮衮數百言臣既歛袵肅聽且顧謂臣曰此殿朕即位後所作也命名之㫖雖取於選射觀徳之義然退朝之餘發號出令圖事揆策无適而不在是凡燕遊聲色之奉苑囿之娯非惟不可好然亦所不好獨以閒暇取尚書及資治通鑑等書而讀之帝之所以為帝王之所以為王法其所以興戒其所以壊口誦心維未嘗一日輙去手也近侍外臣晝接夕訪大廷亷陛之儀一切畧去紬繹政理從容問答頗有漢宣室唐浴殿遺意至於騶虞時㑹抗志決拾以弛張文武之道特其一事耳卿為朕記之臣邁離席再拜稽首謝不敏不獲命退而言曰自唐虞至于東周盖千有餘嵗其世逺其政息然至今為後人所傳誦後王所矜式而賴之以不冺者尚書存焉耳由三代而下至於後周亦千有餘嵗世愈益近政愈益多廢興成敗之林𣺌若淵海今列於户牖之間􅀶而得其要簡而周於事者通鑑存焉耳書亡然後通鑑作兹其是與陛下受天命克己厲精綜練名實躬持太阿之柄操以為騐稽以為決未嘗不本原於二書四海九州之人神而明之鼓舞奉承之不暇而不知其所自得者其出於一堂之中萬事之方來畢陳乎前匿態遁形美惡畢見湛乎其若鏡炤而龜告也而臣幸得以筆墨薄技待罪禁林此而不書孰當書者况於跽受天㫖恩紀卓異為无窮光耀乎乃不固辭而承命臣聞之成天下之事者莫大於至勤洞天下之理者莫大於至明今夫百川之流草木之蕃三農之業百工之藝皆勤也而天子之勤異於是必法天行健而後可智効一官化治一州折獄致刑擿奸發伏皆明也而天子之明異於是必如日方中而後可唐明皇致中興勤政務本之意慨然見於作樓之時而日引月長宴安鴧毒之不戒明而不勤為何如哉文宗外憂藩鎮之䟦扈内患朝廷之不清旦朝籌之暮夜計之而訓注之隂謀牛李之朋黨不能早辨以稔甘露之悔勤而不明為何如哉莫盛於太宗而寖不克終有見於魏公之十漸故臣以謂唐三百年去本朝為未逺卓然可喜者惟武宗宣宗為然今陛下擴天縱之聖經之以至勤緯之以至明公卿以下有外朝之勤延英之對金華之講都俞咨詢寒暑一致猶以為未足也而又朝於斯夕於斯舜好問而察邇言禹之惜寸隂文王之中昃不遑食皆以匹休抗美下視武宣誠不足道然自強不息終始毋怠願陛下常以今日之心為心詩曰惟天之命於穆不已盖曰天之所以為天也臣敢以是為陛下獻嵗二月庚午左朝議大夫起居舍人兼權直學士院兼權中書舍人兼同修國史兼實録院同修撰臣洪邁拜手稽首記詩集禾黍中御街為客路行客悲春風野老幾代人種田煬帝宫零落池臺勢髙低丨丨丨鮑容隋官花蕚廢連昌宫中滿宫竹嵗久無人森似束又有墻頭千葉桃風動落花紅䔩䔩宫邊老人為余泣少年選進因曽入上皇正在望仙樓太真同凭闌干立樓上樓前盡珠翠炫轉熒煌照天地歸來如夢復如癡何暇備言宫裏事初過寒食一百六店舎無煙宫樹緑夜半月髙絃索鳴賀