厚其墻垣以無憂客使今吾子壊之雖丨丨丨丨其如異客何以敝邑之為盟主繕完葺墻以待賔客若皆壊之其何以共命寡君使匄請命對曰以敝邑褊小介於大國誅求無時是以不敢寧居悉索敝賦以來㑹時事逢執事之不閒而未得見又不獲聞命未知見時不敢輸幣亦不敢暴露其輸之則君之府實也非薦陳之不敢輸也其暴露之則恐燥濕之不時而朽蠧以重敝邑之罪云云敢請執事將何所命之雖君之有魯䘮亦敝邑之憂也若獲薦幣修垣而行君之恵也敢憚勤勞文伯復命趙文子曰信使謝不敏晉侯見鄭伯有加禮厚其宴好而歸之乃築諸侯之館左㐮三十一賓至如歸文公之為盟主也宮室卑庳無觀臺榭以崇大諸侯之館館如公寢庫廐繕修司空以時平易道路圬人以時塓館宫室諸侯賔至甸設庭燎僕人巡宫車馬有所賔從有代巾車脂轄𨽻人牧圉各贍其事百官之屬各展其物公不留賔而亦無廢事憂樂同之事則巡之教其不知而恤其不足丨丨丨丨無寧灾患不畏㓂盗而亦不患燥濕仝上參避正堂孝恵元年以曹參為齊丞相參之相齊悼惠王富於春秋參盡召長老諸先生問所以安集百姓齊故諸儒以百數言人人殊參未知所定聞膠西有葢公善治黄老言使人厚幣請之盖公為言治道貴清静而民自定推此類具言之丨於是丨丨丨舍盖公焉漢史參傳參遊後園相舍後園近吏舍吏舍日飲歌呼從吏患之無如何廼請丨丨丨丨聞吏醉呼乃反取酒張坐飲大歌呼與相和參見人之有細過掩匿覆盖之府中無事仝上此如傳舍葢寛饒至許伯第曰丨丨丨丨閲人多矣本傳不至官舍何並徙潁川太守並性清亷妻子丨丨丨丨本傳鶡雀飛集黄寛六相京兆尹張敞舍丨丨丨丨丞相府以為神雀本傳野烏棲宿後哀帝時御史府史舍百餘區井水皆竭又其府中列柏樹常有丨丨數千丨丨其上晨去暮來號曰朝夕烏烏去不來者數日長老異之漢朱愽傳徙郡治舍犍為太守李巖欲丨丨丨功曹楊洪諌不聽遂請退孔帖壊府屏幛晉阮籍為東平相到郡丨丨舍丨丨使内外相望繕完城圃呉陸抗與諸葛恪換宅抗臨去丨丨丨丨葺其墻屋廬舍恪不聽深以為恥擅飾城舍晉杜元凱為東𦍑校尉石監奏預丨丨丨門官丨稽乏軍興車徵詣廷尉以尚主在八議以候贖論壁中得貍晉樂廣為河南尹官舍多怪前尹不敢居之廣後於丨穿丨丨丨殺之恠遂絶省中多鬼宋徐孝先為都官尚書自晉以來尚書寮皆㩦官屬居丨省丨丨有丨恠每夜或見人著衣冠從中出或門自開闔見者多病尚書周確卒於此省孝先代確居之經兩載妖變皆息䘮多害人晉羊祜叔子督荊州長吏丨丨丨丨皆毁舊府祜以死生有命富貴在天敇諸鎮禁斷之鬼不侵善梁傳昭歴位在户尚書安成内史郡自宋來兵亂相接府舍稱凶每昏且間人鬼相觸在任者鮮以吉終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰空而去自是郡遂無惡以茅為屋晉羅含字君章為相州别駕以才學知名以廨舍喧擾自於城西小湖安茅屋伐樹為牀織葦為席而居市第為廨楊炎趙惠伯為河南尹時嘗丨炎丨丨官丨御史劾炎宰相御史市私第貴取其直盧杞召大理正田晉評罪晉曰宰相於庶官比監臨計羡利臯奪官杞怒謫晉於是當監主自盗罪絞亟使全新李聽拜邠寧節度使邠署相傳不利治垣舍前刺史視其壊不敢葺聽曰將出鑿凶門何避治署耶丨丨丨丨之卒無異甫旬畧具韋仁夀檢校南寧州都督詔嵗一按行其勞將還酋長泣曰天子藉公鎮撫奈何欲去我仁夀以池壁未立為解諸酋即相率起廨丨丨丨丨菑除視事李吉甫改彬饒二州㑹前刺史繼死吉甫命丨丨其廨以丨丨繕治署名房琯歴慈溪宋城濟源縣令所在多興利除害丨丨廨舍頗丨能丨舊唐史極其華侈五代王浚於樞宻起聽事丨丨丨丨邀太祖臨幸賜予甚厚多所漏泄國初京師職事官舊皆無公廨雖宰相執政官亦僦舍而居每遇出省或有中批外奏急速文字則省吏退歸於私第呈押既稽緩又丨丨丨丨石林燕語公宇立成冦萊公謫道州司馬素無公宇百姓聞之競荷瓦木不督而㑹丨丨丨丨頗亦宏壯守土者聞於朝遂再有海康之命每府相對元豐初建東西二府於右掖門之前丨丨丨丨曰位謂之八位界以中􅋼吕微仲當軸兄大中自陜漕入朝微仲虛正寢以待之大中辭微仲云丨丨丨丨即私家也偃然東序安厚卿在正府父日華尚康寧厚卿夫婦丨丨居丨丨緑莎㕔事河中府有丨丨丨唐治平時好事者常加澆溉兵興以來而好丨者劉吉之王禹偁送柴諌議任河中府詩云丨丨丨丨舊鳴蛩雞跖集韓愈丞㕔壁記見前集丞門皇甫湜刺史㕔壁記元結道州刺史㕔壁記吕温道州刺史㕔後記並見後集刺史門王元之宰相待漏院記見後集宰相門詩集紫閣平明登丨丨日晏下彤闈彤庭紫殿肅隂隂丨丨赫𢎞敞風動萬年枝日華承露掌玲瓏結綺錢深沉映珠網紅藥當階翻蒼苔依砌上謝元暉直中省潭府不見公與相丨潭丨中居韓燕寢丨丨凝清香掖垣丨丨竹埤梧十尋洞門對雪常隂隂落花遊絲白日静鴻雁乳燕青春深杜休通客印在丨丨丨山晴好捲簾張籍休報事吏人丨丨丨公作送春詩韓似野居使君家丨丨人丨杜牧齊安郡如傳舍嗟我官居丨丨丨歐似蓬島况我官居丨丨丨坡緑莎㕔河中府舊有緑莎㕔唐人詩曰丨丨丨事舊鳴蛩詳見前射鴨堂兩尉鬰相望東南百歩場挿旗浦桞市伐鼓水雲鄉已作觀魚檻仍開丨丨丨蘇子瞻城南縣尉水亭談經投老丨丨丨丨拚悠悠為吏文書了即休深炷爐香閉髙閣卧聽簷雨瀉髙秋王介甫金陵郡齋官事長閒平湖繞舍山無盗丨丨丨丨俸有金安得終身為禦冦不辭兒女作呉音黄魯直宿錢塘尉廨古今合璧事類備要别集卷十三
