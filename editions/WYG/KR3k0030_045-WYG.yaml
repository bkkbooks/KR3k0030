body:
  text: 古今合璧事類備要前集卷四十五宋謝維新撰字學門楷書事類八訣歐陽詢丨丨丶如高峯之墜石乁似長空之新月一掛若千里之陣雲丨如萬嵗之枯藤如嶺松倒折落石崖􅗵如萬鈞之弩發丿如利劍截断之角乀如一波常三過筆澄神静慮端己正容秉筆思生臨池志逸虚拳直腕指齊掌空意在筆前文回思後分間布白勿令側偏墨淡即傷神彩毫絶必滯鋒鋩肥則為鈍瘦則露骨勿使傷於軟弱不得怒降為竒㸃畫調勻上下均平逓相顧揖筋骨精神隨其大小不可頭輕尾重毋令左短右長斜正如人上稱下載東映西帶氣宇融和精神洒落省此㣲言孰為不可也歐陽詢三昩張長史郎官㕔壁記唐人正書無出其右所以度越諸家無轍迹可尋可謂入筆墨丨丨黄山谷集墨猪王逸少云凡字多肉㣲骨謂之丨丨出書訣墨藪田漢李後主云顔魯公書端勁有法而無佳處正如义手並脚丨舍丨耳筆録書得於心丨之神運雖丨之丨丨然法度必資講學凡字湏均平若筆畫多寡相逺不可使停寡在左則取上齊吟字是也寡在右則下齊知字是也筆談書象其人歐陽詢貎寒㣲敏悟過人其書勁險厲正稱其貌爾是知凡丨丨丨為丨志林瑶臺芳桂尚書郎李充母以夫衛姓自稱李衛正書如玉壺之氷丨丨之月婉然丨丨穆若清風談苑玉匣蘭亭唐太宗有大王真跡三千六百紙率以一丈二尺為軸寳惜者蘭亭序為最嘗附耳謂髙宗曰吾千秋萬嵗後與吾蘭亭序以玉匣貯蔵昭陵故實手墨和調禇遂良嘗問虞世南曰吾書何如智永答曰吾聞彼一字直五萬君豈能得此孰與歐陽詢曰吾聞詢不擇紙筆皆得如志君豈得此禇遂良曰然則何如世南曰君若丨丨丨丨足可貴尚遂良大喜歐陽詢㸃畫遒勁錢若水言唐陸希聲得筆法凡五字擫押鈎格抵用筆䨇鈎則丨丨丨丨而盡妙矣謂之撥橙法希聲以授沙門􅈯光光入長安為翰林供奉又宰相刀術言江南後主得此法復增二字曰導送今待詔談尹希古亦得之而所書為一時之妙澠水燕當世獨歩近年筆法蔡君謨獨歩當世予嘗戲謂君謨言學書如泝急流用盡氣力船不離處所君謨以為能取譬同上本朝第一五代楊凝式筆迹雄強往往與顔行相上下世多稱李建中宋宣獻此二人書僕所不曉宋寒李俗殆浪得名惟蔡君謨資格既高當為丨丨丨丨仇池筆談詩集見前書法類草書又詳見前書法類事類草聖張伯英臨池學書池水盡黒凡衣帛必書而後練韋仲將謂之丨丨晉衛坦傳草賢崔環善章草謂之丨丨談苑章草漢黄門令史史游作急草觧㪚𨽻體麄書之王羲之以丨丨荅庾翼翼嘆伏曰吾昔有伯英丨丨失之今見王書神明頓還舊觀張懐璀書斷杜操字伯度善草書章帝愛之令上表亦作草書謂之丨丨書苑柿葉鄭䖍好書恨無紙慈恩寺貯丨丨數屋䖍取以書嵗乆皆徧本傳蘭庭序羲之蘭庭草號為最得意宋齊間不聞稱道者永師晚出此書諸儒皆推其真行之祖所以唐太宗必欲得之其後公私相盗至於發冡今遂亡之定武本盖得髣髴禇庭誨所臨極肥洛陽張景元斵地得缺石極瘦定武則肥不剰肉瘦不露骨猶可想其風流三石刻皆有佳處不必寳已有而非彼也南昌集鸚哥嬌劉十五論李十八草書謂之丨丨丨謂鸚鵡能言不過數句大率鳥語十八其後稍進以書問僕曰比舊日如何僕曰可作秦吉了矣一臺二妙索靖燉煌人精草法武帝愛之時尚書令衛瓘世號得伯英之筋丨丨丨丨王隠晉書長沙三昩丨丨僧懐素善書自言得草聖丨丨國史補又山谷詩以頭濡墨張旭善草書大醉呼呌狂走乃下筆或丨丨丨丨而書既醒自視以為神不可復得世呼張顛本傳陳牒乞判張旭為常熟尉有老人丨丨丨丨宿昔又來旭怒老人曰觀公筆竒妙欲以蔵家爾因問所藏盡出其父書旭視之天下竒筆也自是盡其法晉本傳舞劍得神張旭自言始見公主檐夫爭道又聞鼓吹而得筆法意觀公孫大娘丨丨噐而丨其丨後人論書者得其法惟崔邈顔真卿云旭傳聼江得法玻云古今人詩筆有所自長史以劍噐容有是理雷大簡云聼江聲而筆法進文與可亦言見蛇鬪而草書長殆非誕也志林春蚓秋蛇伯英學書之妙宜師垂帳之竒行行若縈丨丨字字若綰丨丨王羲之傳旱蛟毚兔歐陽詢貞元初為太子率更令嘗書千文周越題云所謂如丨丨得水走冗殆不虚耶本傳驚鸞舒翼盖草聖之為狀也婉若銀鈎漂若丨丨丨丨未發若舉復安蟲蛇蚴虬或往或還頽阿那以羸形歘奮亹而桓桓及其逸逰肸蠁乍正乍邪騏驥暴怒逞其轡海水窊隆揚其波𤣥熊對踞於山岳飛燕相追而差池舉而詧之又似和風吹林偃草扇樹枝條從風轉相比附窈嬈亷苫隨體㪚布紛擾擾以綺靡中持疑而猶豫𤣥螭狡獸嬉其間騰猨飛鼬相奔趣陵魚奮翼駭龍反據投空自竄張設牙距出晉索靖書勢飛烏出林張旭草書如孤篷自振驚沙坐飛鄭䖍草書如風送雲収霞催月上釋亞棲草書如丨丨丨丨驚蛇入草書法苑霏煙翥鳳王逸少裁成之妙煙霏霧結狀若斷而還連鳳翥龍盤狀如斜而反正本傳游雲驚龍王羲之尤善草𨽻論者稱其筆法飄若丨丨矯若丨丨本傳瘦硬肥勁懐素草工瘦張長史草工肥丨丨易作丨丨難工又云此兩人一代草書之冠冕也南昌集軟俗俊快本朝尚書郎周越以書名於天聖景祐間然筆法丨丨無古氣梅克佐作詩閑談蘇舜欽子美喜為徤句草書尤丨丨嘗曰吾不幸冩字為人比周越作書為人比梅堯臣良可歎也東軒筆録鍾王無尚唐桞公權書法結體勁媚嘗召至御前書紙三畨作真行草之體文宗嘗與公權聨句属曰薰風自南來殿閣生㣲涼帝命題於璧字徑率五寸帝歎曰丨丨丨以丨也本傳崔杜不足趙襲燉煌太守先是杜伯度崔子玉以工草書稱於前世襲與羅暉亦以能草頗自矜夸故張伯英書與襲同郡太僕朱賜書曰上比丨丨丨丨下方羅趙有餘三輔決録又羅叔景趙元嗣與張伯芝並時見稱於西州伯英自云上比丨丨丨丨下方羅趙有餘坡詩注詩集醉墨堂人生識字憂患始姓名粗記可以休何用草書誇神速開卷惝恍令人愁我嘗好之每自笑君有此病何年瘳自言其中有真樂適意無異逍遥逰近者作堂名醉墨如飲美酒消百憂君於此藝亦云至堆墻敗筆如山丘興來一揮百紙盡駿馬倐忽踏九州我書意造本無法㸃畫信手煩推求胡為議論獨見假隻字片紙皆蔵収不減鍾王君自取下方羅趙我亦優不湏臨池更苦學完取絹素充衾稠東坡東呉精張旭草書詩斯人已云亡草聖秘難得悲風生㣲綃萬里起古色嗚呼丨丨丨逸氣盛清識老杜詩林下風顛張醉素兩禿翁追逐世好稱書工何曽夢見王與鍾妄自粉飾欺盲聾有如市井倡抹紅妖歌嫚舞眩兒童謝家夫人淡首容蕭然自有丨丨丨天門蕩蕩驚跳龍山林飛鳥一掃空為君草書續其終待我他日無怱怱坡題王逸少帖篆書又詳見前書法類事類籀文漢興亡古草書不知作者盖兩漢銘勒雜以古文篆籀及八分為之魏晉以還篆文遂盛衛坦四體書勢雲篆隂陽分則有三元八㑹之文又有八龍丨丨光明之章也其後三皇之世演八㑹之文為龍鳳之章拘省丨丨之迹以為順形梵書破分二道壞真從易乃為六十四種之書遂播之三十六天上下也今三元八會太極清仙之所用丨丨光明今所見神靈符書之字是也陶隠居真誥紫微夫人說書虎唐李陽冰為篆字人不能及號丨中丨本傳又竇泉號陽冰為筆虎法苑篆室李斯變蒼頡籀文為玉筯篆成一家法更八姓無出其右者唐開元時李陽冰窮入丨丨隔一千年與秦斯相見舒元輿篆書金剪書唐司馬承禎字子徽善篆别為一體名丨丨丨續仙傳匾法江南徐騎省鉉善小篆映日視之畫之中心有一繾濃墨正當其中至於曲折處亦當中乃筆鋒直下不倒故鋒嘗在畫中鉉嘗自謂吾晚年始得丨丨丨凡小篆喜瘦而長丨丨丨非老筆不能湘山野録釵頭鼎足竇泉作小篆賛曰丨丨屈玉丨丨垂金書法苑龜文龍鱗體有六篆巧妙入神或象丨丨或比丨丨紆體放尾長翅短身揚波震激鷹峙鸞停鳥震延頸脅翼凌雲事見雜記勁健端妙無惑同安人善小篆為翰林待詔徐鉉鄭文寳查道髙紳中革葛湍皆江東人善篆弗能及也其丨丨丨丨又過於凝士夫蔵以為寳書法苑方圓流峙李陽冰與李夫人書云某意在古篆於天地山川得方圎流峙之狀於日月星辰得經緯昭回之度於雲霞草木得霏布滋蔓之容於文物衣冠得揖遜周旋之體書法苑詩集快劍長㦸蒼頡鳥跡既茫昩字體變化如浮雲陳倉石鼓文已訛大小二篆生八分秦有李斯漢蔡邕中間作者絶不聞嶧山之碑野火焚棗木傳刻肥失真苦縣光和尚骨立書貴瘦硬方通神惜哉李蔡不復得吾甥李潮下筆親尚書韓擇木騎曹蔡有鄰開元以來數八分潮也奄有二子成三人况潮小篆逼秦相丨丨丨丨森相向八分一字直萬金蛟龍盤拏肉屈強呉郡張顛誇草書草書非古空雄壯豈知吾甥不流宕丞相中郎丈人行巴東逢李潮逾月求我歌我今衰老才力薄潮乎潮乎奈爾何杜詩𨽻書又詳見前書法類事類戈法太宗學虞世南𨽻書毎難於戈法一日書遇戩字召虞世南補冩其戈以示魏徵徵曰仰窺聖作内戩字丨丨逼真帝賞其鍳識書法苑錦書唐吕向工草𨽻能一筆環冩百字若縈髪然世號連錦書本傳詩集神翰丨丨顧不一體變鍾兼兩注云鍾􅀈鍾會父子俱善𨽻書杜詩古今合璧事類備要前集卷四十五
