body:
  text: 古今合璧事類備要後集卷四十九宋謝維新撰院轄門登聞鼓院歴代㳂革詳院檢院古者朝有誹謗之木敢諫之鼓所以通治道而來諫者也漢書唐武后垂拱置肺石函國初曰鼓司以内臣掌鼓在宣徳門南街北廓至道三年命太子中舎王濟勾當鼓司用朝臣勾當自此始景徳四年詔改為登聞鼓院掌諸上封而進之以達萬人之情㑹要𨽻司諫正言續㑹要凡文武臣寮閤門無例通進文字並先經登聞鼓院進狀未經鼓院者檢院不得收接分紀建炎元年因舊制置局于闕門之前髙宗即位於南京召李綱為宰相綱奏曰人主莫大於兼聴廣視使下情得以上通今艱難之際四方休威利害日欲上聞而士民之願效其智慮者尤多而檢鼓院猶未置恐非所以通下情而急先務也遂置登聞檢院鼓院於行在便門外三年專𨽻檢院事類來諫見前注達情見前注檢匣見檢院注申投匭神龍元年九重嚴䆳非呌閽之可聞萬邦遐曠因表疏而方達其有寃未丨丨丨唐大詔令申寃制代謗木寳應元年制下自黎蒸上及公卿並須投匭論及時政得失仰差中正清白官一人知匭務知招其直言以丨誹丨之丨其匭朝出夕入續通典廣延不諱太宗之御天下也持稱至理猶復旁求諫諍俯察謳謠丨丨丨丨之書建登聞之鼔于時在朝無闕政四方無疲人不遺聴覽其擊登聞鼓者委金吾將軍收進不得輒有傷損亦不須令人遮擁禁止其理匭使但任投匭人移表狀於匭中依常進來不須留副本併妄有止遏萬方之事無隔於九重獻替之謀不遺於聴覽唐大詔令百官言事詔蘇軾逺器蘇軾字子瞻判登聞鼓院英宗在藩聞軾名欲以唐故事召入翰林宰相韓琦曰丨丨之才丨大之丨天下之士莫不畏慕降伏皆欲其進用然不若朝廷培養而後用也及試二論復入三等得直史館國史伊川再辭程丨丨差兼判登聞鼓院先生引前說且言入談道徳出領訴訟非用人體丨丨不受文集故求閑局吕申公公著諡正獻差判登聞鼓院公研精講學無進趨之意嘗與王介甫相對而歎曰今天下雖小康然堯舜之道知不可復行以丨丨丨丨將以遂其志言行錄恥自引去李椿字壽翁監登聞鼓院淵覿寵方盛同舎人走其門公丨之丨丨丨晦菴集賜近臣錦袍景徳二年改鼓司為登聞鼓院即命周起諡安惠判院㑹十月丨丨丨丨丨特預之仁宗實錄檢院歴代㳂革周以肺石達窮民周禮宋文帝元嘉九年魏主詔闕左懸登聞鼓以達寃人通鑑南宋武帝天監元年詔於公府謗之肺石旁各置一函百姓已窮九重莫達若欲自申投肺石函唐大厯十四年詔天下寃滯於朝堂受詞推決尚未盡者聴撾登聞鼔通鑑國朝雍熙元年改匭為檢東延恩曰崇仁南招諫曰思諫西申寃曰申明北通𤣥曰招賢景徳四年改為登聞檢院命樞密直學生張詠判仍差内品監門不得關預公事𨽻諫議大夫掌受文武官及士民章奏表疏凡言朝政得失公私利害軍期機密陳乞恩賞理雪寃濫及竒方異術皆受以通達凡進狀者先鼓院若為所抑則詣檢院外有理檢使今不置始於淳化三年置理檢校於乾元門之西北廓以知制誥錢若水領之復唐制也至道三年廢天聖七年上因讀唐史見匭函達下民寃枉之事乃謂左右曰天下九州之大豈無寃枉之人若至京師檢院鼔院理雪者必是州縣吏提㸃刑獄轉運使不能理雪又若不為申理則赤子無告矣乃置匭函仍專命御史中丞為理檢使以分紀㑹要中興之初因舊制置局於闕門之前舊在宣徳門外仗𨽻門下省建炎三年專𨽻諫院中興㑹要創治所於和寜移置居雙闕之左中興題名事類封事文仲子曰丨丨謗木之遺也有辭皇帝清問下民鰥寡丨丨于苗書受書武后垂拱二年有魚保宗者上書請置匭以丨四方之丨乃鑄匭唐百官志知匭事武后置四區以正大夫補闕拾遺一人充使丨丨丨唐書掌匭司李華含光殿賦乃立匭司掌舒通之吏職在達下情于上天儆王言于有立唐文粹論治體監登門檢院吕祉字安老特轉一官守右正言祉上疏丨致丨之丨疏入召對復進三䇿上嘉納之遂有是命廣言路紹興十年臣寮奏疏云國家置諫鼓院所以丨丨丨通下情也置理檢使咸平改登聞院曰登聞檢院鼔司曰登聞鼔院自是匭函遂廢天聖間復於檢院鼓院各以匭函為檢匣凡言大事朝政闕失或訴寃未辨者悉令檢匣以進即言涉竒邪無得通聞丨丨丨丨領之隆平集上東封書田錫字表聖入判登聞檢院因夀寜節獻詩二十韻太宗和賜又丨丨丨丨翌日命知制誥真宗實錄詩集雨露邊獻納司存丨丨丨地分清切任才賢舎人退食收封事宫女開函近御筵杜甫贈獻納使用舎人詩進奏院歴代㳂革唐藩鎮皆置邸京師以大將主之謂之土都留後大歴十二年改為上都知進奏院官五代以來支郡不𨽻藩鎮補人為者聴其置邸𨽻藩鎮者兼掌焉國初縁舊制皆本州監補人為進奏官其軍鎮場務轉運司則差知後官則副知掌之逐州就京師各置進奏院㑹要太平興國六年諸州罷知後之名簡知後官得李楚等百五十人並充進奏官命供奉官張文粲提轄諸道進奏院周益公編題監官以京朝官及三班使臣充掌受詔敕及諸司符牒辨其州府軍監以頒下之并受天下章奏案牘狀牘以奏御及分授諸司續㑹要中興以來𨽻門下後省給事中㸃檢訖乾道九年依舊𨽻後省合傳報事令後省錄付報行中興㑹要孝宗㑹要又題名云事類留邸主大藩丨丨之事杜牧行賴師貞制轄院宋興盡罷節度權太平興國言何保樞請以鈴丨諸道扁丨額而摹印章率用名流子野文王質字丨丨初以蔭補太常寺太祝監進奏院獻其丨章召試賜進士及第六一集子美才蘇舜卿字丨丨仲淹薦其丨監進奏院用故紙祠神為御史所糾除名時王質子野聞之歎曰丨丨之丨如此士大夫不為天子惜之可傷也關白啓導諸侯之任各有職貢小者得事例大者決於朝廷丨丨丨丨属有留邸杜牧之行景思齊制官誥院歴代㳂革國初於右掖門置院四司誥身案並集于此以備中書除改本司郎官各主其事湻化五年始専置官司於省内凡官誥各以本司誥身印印之文臣用吏部武臣用兵部王公命婦用司封加勲用司勲掌文武官將校誥身及封贈官誥院提舉一人以知制誥充判院一人以𢃄職京朝官充元封五年行官制文武告身属吏部蕃官告属兵部封贈及命婦告属司封加勲并將校告属司勲官誥院四部誥身案及吏人隨事𨽻本部七年併司封司勲誥身案入吏部預書庫收掌崇寜四年吏部專制造官誥局五年罷令尚書右選主管大觀元年復置尋改為官誥院仍𨽻左右司三年復罷歸吏部政和三年六月詔依舊置官誥院差官二員主管少府監鑄印記吏部製造誥身案記為文中興以來因仍不改事類代言手京鏜字仲逺參政龔茂良薦公于孝宗轉主管官誥院先是茂良帥豫章日得公牋奏之文竒之曰此汪彦章丨丨丨也庀職兩月詔從臣舉良縣令為執法官給事中王希吕以公應書即召見曰卿議論通明有材用也是日除監察御史楊誠齋集科舉議王介甫用事議論素異還朝寘之官誥院介甫欲變更丨丨上疑焉公丨上悟曰吾故疑此得蘇軾議意釋然矣即日召見蘇潁濱集東坡行狀審計院歴代㳂革國朝以三司使總邦計司各有院以乗中外泉穀出入之政葢㑹計之府也然案牘叢委典者不能偏察而姦容焉淳化三年始用户部使樊知古奏剔其冗籍復别為院置官顓領之以聽稍食之要貳置院之初特掌騎兵徒兵給受之數猶未及諸司也元豐三年合步騎兩院為一遂以其一主諸司自官禁朝廷下至斗食佐史凡賦祿者以式法審其名數而稽其辭名者唯郊賜給已乃審祿有疑予則詔以法凡四方之計籍上于大農則逆其㑹凡有司議調度㑹賦出則􅓪焉設員二曰左右聴分案六史八人題名舊為諸軍諸司專勾司建炎元年避髙宗御諱改諸軍諸司審計司事類為關鍵紹興五年臣寮言臣切惟國家之賦祿以糧審丨丨丨糧審之勘給以法令為承式中興㑹要除駕部辛次膺監諸司審計司未嘗登權要門參知政事孟庾被詔薦其才遂召對是日丨丨丨員外郎胡澹菴集糧料院歴代㳂革國朝仍舊制以三司大將軍為都糧料使自開寳六年以著作佐郎陸光範充改用京官自此始太平興國五年分諸司馬軍步軍為三院八年以馬軍歩軍合為一院雍熙四年命供奉官陳處誨勾當諸司糧料供奉官曽祚勾當馬步軍粮料自後復分馬步軍為兩院或以諸司使副分主之端拱二年復以京朝官主之國朝㑹要元豐末併馬步軍與諸司馬二院中興百官題名𨽻太府寺掌以法式頒廩祿凡文武百官諸司諸軍俸料以劵準給四朝志中興以來行在有諸軍諸司粮料院鎮江建康有分差諸軍粮料鄂州有分差戸部粮料院中興孝宗㑹要六院官例以京官知縣有政績者為之故思疏數畧視職事官而不入雜壓紹興間胡汝明以料院除監察御史遂遷副端乾道復相繼入臺者有宋敦書等數人而六縣彌重號為察官儲矣紹興間復入雜壓淳熙間削去近歲復舉班在五寺簿下太學博士上朝野雜記事類祿鍵紹興五年臣寮言國家之賦丨以糧審為關丨糧審之勘給以法令為承式中興㑹要檢校汪大猷字仲嘉幹辦行在糧料院文書盈几日不給視公間摘一二無不切中或言㩁貨務在藏庫有羡儲朝㫖以委公躬自丨丨得其實以對樓攻媿集除常簿林正惠公大中字和叔幹辦諸司糧料院求外補同擬者四人孝宗指公與討衡姓名曰此二人佳可除職事官遂丨太丨寺丨樓攻媿集除察院紹興十一年胡汝明自料院丨丨丨朝野雜記㩁貨務都茶場歴代㳂革㩁貨務掌折博斛斗金帛之屬四朝志以朝官諸司使副内侍二人監太平興國中以先平嶺南及交趾諸國入貢通關市議於京師置搉易院太中祥符中併入㩁貨務㑹要建炎中興又創都茶場給賣茶引隨行在所於㩁貨務置場雖分西司而提轄監官並通銜管幹建炎四年詔㩁貨務都茶場依舊𨽻左右司其提領措置並罷其都茶場仍令提轄㩁貨務官兼行提轄尋徙越州一務場於建康又併真州一務場歸建康紹興五年詔建康鎮江兩務場只是給賣鈔引三十二年詔三省今後選差文臣充監更不差武臣乾道六年詔依舊通差武臣中興㑹要孝宗㑹要先是課入不立額惟沿舊歳為等差是歳始酌分有定數歳終為錢二百四十三萬行都受藏之所為數八十萬萬于建康者一百二十萬萬于鎮江者四十萬萬題名事類㩁務頃分丨丨白居易裴𢎞泰大府少卿制權貨唐劉晏傳云能丨萬丨輕重使天下無甚貴賤而物常平都堂條弊陳從古字希顔監行在㩁務都場丞相虞雍公問君歳終出納幾何君曰國家利源鹺茗居多自合同關子行遂虧常額丞相命君即丨丨丨救丨之䇿於是關子罷而歳入増矣周益公集出知鄜州薛向字師正監在京㩁貨務丨丨丨丨東都事略雜買雜賣務歴代㳂革雜買務舊曰市買司太平興國四年改至道中廢咸平中復置以京朝及三班内侍三人監掌和市百物凡宫禁官物所需以時供納雜賣務景徳四年置掌受内外幣餘之物計直以待出貨或準折支用以内侍及三班二人監後亦差文武朝官四朝志㑹要紹興六年詔雜買務雜賣場置提轄官一員中興㑹要事類聚貨日中為市致天下之民丨天下之丨交易而退葢取諸噬嗑易懋遷丨丨有無化居書司市地官丨丨周禮均市司市掌市之治教政刑量度禁令以次叙分地而經市以陳肆辨物而平市以政令禁物靡而丨丨以商賈阜貨而行市同上平準漢武帝置丨丨官籠天下之鹽鐵於京師中準和帝改平準為丨丨京市隋司農寺統丨丨令丞三市唐有東西南丨丨㩁筦委丨丨之務白六帖平均以二物丨市以三賈丨市唐六典治市政司市凡㑹同師役市司帥賈師而從丨其丨丨掌其賣儥之事周禮和利用太府總京師四市平準所以遷有無丨丨丨六典以廉自將潘峙字徳鄜提轄雜買務雜賣場嚴禁防謹次第大官要人無敢干以私皇城邏卒挾恃干紀公按致其罪不少貸人為公危之然公丨丨白丨丨其黨雖怨之卒無以報也朱晦庵集論皆大計趙粹中監行在雜買雜賣門在筦庫丨當世事丨天下丨丨人属望以為國器矣樓攻媿集未嘗售一物吕好問字舜從監在京雜賣場正獻公當國任事者以公親宰相孫闊其條約不以簿領累公公益自勵日夜治文書若有程督之者時以樸素先天下四方貢獻一歸之有司斥賣以佐經費吏或下其估以自私公獨漠然如不見終秩丨丨丨丨丨吕東萊集文思院歴代㳂革國朝太平興國三年置學造金銀犀玉工巧之物金彩繪素裝鈿之飾以供輿輦冊寶法物及凡器服之用𨽻少府監熙寜三年詔文思院兩界監官立定文臣一員武臣一員並朝廷選差其内侍勾當官並罷四朝志㑹要紹興三年詔少府監併歸文思院其上下界監官從工部辟差工部言所轄文思院舊分上下界監官三員内一員文臣係京朝官上界造作金銀珠玉下界造作銅鐵竹木雜料欲依舊分為上下界從之隆興三年詔併禮物局入文思院中興孝宗㑹要事類工正莊子工尹左傳文公百工咸理季春之月命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良丨丨丨丨監工日號毋悖于時記月令工師度程孟冬之月命丨丨效功陳祭器案丨丨毋或作為淫巧以蕩上心必功致為上注工師上官之長也效功錄見百工所作器物也同上左藏庫歴代㳂革掌受四方財賦之入以待邦國之經費其原葢起於周職内主賦入職歳主賦出而邦布之入出則外府又主之皆其職也晉始置左右藏令唐於左右藏分建東西庫以太府少卿知出納於左長慶門之東國初左藏止一庫置使領焉題名太平興國三年分為二庫淳化三年分置左右藏各二庫四年廢右併入左政和六年修建新庫以東西庫為名㑹要續㑹要中興因仍東西庫各以文臣監武臣同監其東幣帛絁紬之属在焉其西金銀泉劵絲纊之属在焉紹興二十七年詔户部於轄下丞簿内選一員兼充左藏庫提轄官此提轄所由始也孝宗即位詔將御前椿管激賞庫撥歸左藏庫以左藏南庫為名專一椿管應副軍期支遣於是有東西南三庫中興㑹要孝宗㑹要尋罷南庫大抵國家用度多靡於瞻軍四蜀湖廣江淮之賦類歸四總領所以餉諸屯其送京者殆無幾唯閩浙悉輸焉東西庫歳入以端計者率百四十萬以緍計者率二千萬給遣稱是而大軍居十之七宫禁百司祿賜裁三之間有非泛浩繁之費則請於朝徃徃出内幣封椿以補所缺監官凡五人分帑而治舊以京朝官為之今唯才是用故四選通得入題名先是四轄官外補則為州内遷則寺監丞亦有徑為雜監司或入三館者乾道間㩁貨王禋除福建市舶左藏三揖除九路鑄錢淳熙間熊子復自文思除校書郎近歳望稍輕徃徃更遷六院官或出為添倅非曩日之比矣事類外府詳見㳂革御府内庫曰丨丨謝承後漢書更始至長安御府帑藏皆安堵如故東觀漢記職内掌邦國之用入辨其財用之物而執其總以貳官府都鄙之財入之數以逆邦國之賦受財者受其貳令而書之周禮京藏王顯謂楊固曰吾作太府卿庫藏充滿固曰減百官之祿及藏贖悉入丨丨以此充足未足為足山積唐元宗召公卿百寮觀左藏庫貨幣丨丨瓊林唐徳宗置丨丨大盈庫天積丨丨者天子藏庫也韓楊天要集珠府離丨為藏丨在須女北晏公類要治藏特陛丨丨之名李緯制國帑典司丨丨公是行曹洗制皆納於府唐制天下財賦丨丨丨左藏丨不同諸司狄兼謩對唐中宗封敕問丨丨丨丨受藏之府丨丨丨丨國用所資白集行裴武制召試直集賢程文簡琳監左藏庫天禧中詔集選文學履行丨丨丨丨丨六乙髙科滯筦庫韓琦監左藏庫時方貴丨丨多徑去為館職公獨丨於丨丨衆以為非宜公處之自若不以為卑冗未嘗苟且禁中須索金帛皆内臣直批聖㫖下庫公奏天禧中嘗専置𫝊宣合同一司願復舊制詔從之舊有監科内臣一員綱運至必監秤始得交納内臣徃徃數日不至寶貨皆暴露廊廡逺方衙校苦於稽留公奏罷之灾傷州郡所輸物帛不如度者例猶追剝公請蠲之言行錄古今合璧事類備要後集卷四十九
