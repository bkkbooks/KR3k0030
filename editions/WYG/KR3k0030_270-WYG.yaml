body:
  text: 古今合璧事類備要别集巻六十四宋謝維新撰飛禽門鵬格物總論鵬大鳥也鳥未有如是之大者也然經書未聞有言鵬者而言鵬特自南華始焉南華祖齊諧者也文人才士未聞有讚鵬者而讚鵬特自阮修始焉阮修祖南華者也阮修所祖者南華南華所祖者齊諧吾不知齊諧又將祖之誰乎南華曰齊諧志怪者也六經不語怪宜吾聖人之門所不及或云即鳳敢問事類鯤化北溟有魚其名為丨鯤之大不知其幾千里也丨而為鳥其名為鵬鵬之背不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則将徙於南溟南溟者天池也齊諧者志怪也諧之言曰鵬之徙於南溟也水擊三千里搏扶揺而上者九萬里去以六月息也又曰風之積也不厚則其負大翼也无力故九萬里則風斯在下矣而後乃今培風背負青天而莫之欠闕者而後乃今将圖南蜩與鸒鳩笑之曰我決起而飛槍榆枋時則不至而控于地而已矣奚以之九萬里而南為鷃笑窮髪之北有溟海者天池也有魚焉其廣數千里未有知其修者其名為鯤有鳥焉其名為鵬背若泰山翼若垂天之雲搏扶揺而上者九萬里絶雲氣負青天然後圖南且適南溟也斥丨丨之曰彼且奚適也我騰躍而上不過數仞而翺翔翔蓬蒿之間此亦飛之至也而彼且奚適也此小大之辨也並荘子逍遥篇鷹制大鵬之雛始飛為丨所丨孔氏志詳見雁門李白大鵬賦唐開元十年壬戌賦大鵬遇希有鳥賦後改為大鵬賦余昔於江陵口見天台司馬子㣲謂余有仙風道骨可與神逰人極之表因著大鵬遇希冇鳥賦以自廣此賦已傳于世往往人間見之悔其少作未窮宏達之㫖中年棄之及讀晉書覩阮宣子大鵬讚鄙心陋之遂更記憶多将舊本不同今復存于集豈敢傳諸作者庶可示之子弟而已其辭曰南華老人發天僟于漆園荘子䝉人甞為漆園吏吐峥嶸之髙論開浩蕩之竒言懲志怪於齊諧談北溟之巨魚吾不知其幾千里其名曰鯤化成大鵬荘子質疑胚渾脱修鬛於海島張廣翅于天門刷渤澥之春流晞扶桑之朝暾赫奕乎宇宙憑陵乎崑崙一鼓一動烟曚沙昏五岳為之震蕩百川為之崩奔爾乃蹶巨壑摩太清亘層霄突重溟激三千以崛起搏九萬而迅征背葉太山之崔嵬翼舉垂之縱横左迴右旋倐隂忽忽明厯汗漫以夭矯塌閶闔之峥嶸簸鴻濛扇雷霆斗轉而天動山揺而海傾怒無所搏雄無所争固可想象其勢彷彿其形若乃足縈虹蜺目耀日月連軒呇拖揮霍翕忽噴氣則六合生雲灑毛則千里飛雪邈彼北荒将窮南隅遞逸翮以旁擊皷奔颷而長驅燭龍銜光以照影列缺施鞭而啟塗塊視三山杯觀五湖其動也神應其行也道俱任公見之而罷釣荘子任公子為大鈎巨緇五十犗為餌蹲為㑹稽投竿於東海朞年不得魚一日有大魚吞巨鈎任公子得其魚而腊之自淛河以東莫不厭若魚者有窮不敢以彎弧書冇窮后羿莫不投竿失鏃仰之長吁爾其雄姿壮觀映背河漢上摩蒼蒼下覆漫漫古古開天而直視羲和倚日以傍歎繽紛乎八荒之間隠映乎四海之半横大明而掩畫若混茫之未判怱騰覆以回旋則霞廓而霧散然後六月一息至於海湄欻翳景以横榰逆髙天而下垂憩乎泱漭之野入乎汪湟之地猛勢所射餘風所吹渭漲沸渭巖岳紛披天呉為之㤕慄山海經云朝陽之谷有神曰天吳是為水伯虎身人面八手八足八尾青黄色海若為之躨跜荘秋水篇有北海若曰乂望洋向若而歎郭釋云若海神也巨鼇冠山而却走長鯨騰海而下馳縮殻挫鬛莫之敢窺吾亦不測其神怪而若此盖乃造化之所為豈比夫蓬萊之黄鵠誇金衣而菊裳恥蒼梧之𤣥鳳耀綵質與錦章既服御于靈仙亦馴擾於池湟精衛殷勤于銜木鵎鶋悲愁乎薦觴天鷄驚曙于蟠桃神仙傳淮南王劉安食藥得仙餘藥鷄犬䑛之皆飛升故鷄鳴天上踆烏炳耀于太陽踆烏月中三足烏不曠蕩而縱適何拘孿而守常未若兹鵬之逍遥無厥類而比方不矜大而暴猛每順時而行藏㕘𤣥根以比夀考成象篇谷神不死是謂𤣥牡𤣥牡無門是謂天地之根飲元氣以為漿戲暘谷以徘徊憑炎洲而抑揚俄而希有見而謂之曰偉哉鵬乎若此之樂也吾左翼掩乎東極右翼蔽乎西荒跨躡地絡周旋天綱以恍惚為巢以虚無為場我呼爾㳺爾呼我翔於是大鵬許之欣然相隨此二禽已登於寥廓而天鷃之輩空見笑於藩蘺尺鷃笑之曰彼且奚適我騰躍而上不過數仞而下翔蓬蒿之間此亦飛之至也而彼且奚適也此大小之辨也疏斥小凙也鷃雀也荘子逍遥逰詩集變化圖南未可料丨丨有鯤鵬翺翔鵬路觀丨丨九霄風翮丨丨鵬九天鵬礙丨丨須逺避振羽翰從兹丨丨丨九萬一朝搏並墮長翮鵬騫丨丨丨韓文送惠師孔雀格物總論孔雀文禽益諸州所産髙四五尺許許不減于鶴羣飛數十為偶雌者尾短無金翠雄者生三年有小尾五年成大尾初春而生三四月後復凋與華蕚俱榮衰然自喜其尾甚妬凡欲山棲必先擇有置尾處然後止焉南人生捕者候甚雨往取之尾霑雨重不能髙翔又惜其尾恐人所傷不復騫騰雖馴養頗乆見美婦人美衣裳與童子絲服者必逐而喙之芳時媚景聞管絃笙歌必舒張翅尾眄睞而舞若有意焉山谷夷民烹而食之味如鵝解百病人食其肉後飲藥不能愈病其血與其首解大毒南人得卵使鷄伏之即成其脚稍屈其鳴若曰都䕶士人取其尾者持刀于叢篁幽隠之處自蔽伺過急斷其尾若不即斷回首一顧金翠無復光彩矣衍義曰孔雀不可入目昏翳人眼亦不可不知事類吳付使者魏文帝遣使於吳求孔雀羣臣以為非禮欲不與孫權敕付使者江表傳修對文舉見前楊梅注新昌孔雀宋孝武帝大明五年丨丨軍獻白色丨丨鉦樓孔雀西舍利樂丨丨丨丨孔帖織毛為裘文惠太子丨孔雀丨丨丨齊書以羽飾纛盤盤丨孔雀丨丨丨南蠻盤盤傳竇毅畫屏髙祖皇后丨氏父丨在周為上桂國尚武帝姊長公主甞謂主曰如女有竒相何可妄與人因丨二孔雀丨間請婚者射髙祖最後射各中一目邊鸞寫貌丨丨工丹青最長於花鳥正元中新羅國獻孔雀解舞德宗詔於元武門丨丨一正一背翠釋生動金光遺妍能應妍節唐名畫録舍利曲名西丨丨丨丨白孔雀王驃云桃臺謂毛彩光華孔帖羅州土貢丨丨丨丨孔雀唐地理志因雷聲而孕孔雀丨丨丨丨丨酉陽雜爼採金毛為扇交趾人多養孔雀丨丨翠丨丨丨嶺表異録詩集龍養孔雀望赤霄愁入彫丨丨鄭䖍屏開丨丨金孔雀杜鳳凰友穆穆丨丨丨韓愈和武相公孔雀詩雲海巢索寞少顔色池邊無主禽難收帶泥翅易結著人心項毳落殘碧尾花銷暗金放歸飛不得丨丨故丨深白居易翠角金華丨丨髙獨聳丨丨煥相差韓和武翠羽金花孔雀未知牛有角渇飲寒泉逢觝觸赤霄𤣥圃須往來丨丨丨丨不辝辱杜一身金翠越鳥青春好顔色晴軒入户看呫衣丨丨丨丨畫不得萬里山川來者稀絲竹慣聽時獨舞樓臺初上欲孤飛刺桐花謝芳草歇南國同巢應望歸李郢一身文章置從南海桄榔林籠入西州鸚鵡地聳觀翕翼脩尾張鱗鱗團花金縷翠丨丨燦爛丨丨多引聲笙竽奈老何五侯池館不可戀桂樹深枝自有巢鳳凰樓頭饒燕雀入屋穿簾非爾樂非爾樂去何之北方佳人或歌咢梅聖俞我聞梵王跨丨丨大丨丨擒丨鷄孔雀荆公無因青雲上桄榔暗天蕉葉長終露文章嬰世網故山桂子落秋風丨丨雌雄丨丨丨黄魯直鶴格物總論鶴大如鵞長三尺脚青黒髙三尺餘赤頰赤目喙長四寸多純白亦有蒼色者按季浮丘伯相鶴經鶴陽烏也而逰于於因金氣乗火精以自養金數九火數七故七年小變十六年大變百六十年變止千六百年形定體尚潔故其色白聲聞天故頭赤食於水故其喙長軒於前故後指短棲於陸故足髙而尾凋翔於雲故毛豐而肉竦大喉以吐故脩頸以納新故天夀不可量所以體无青黄二色者木土之氣内養故不表于外是以行必依洲渚止不集林木益族族之宗長仙人之驥騏也鶴云上相瘦頭朱頂露眼黑晴髙鼻短喙䯓頰􅀈耳長頭竦身鸞膺鳳翼雀毛龜背鼈腹軒前垂後髙頸麄節洪髀纎指此相之備者也鳴則聞于天飛則一舉千里鶴二年落子毛易黑㸃三年産伏復七年羽翮具復七年飛薄雲漢復七年舞應節復七年晝夜十二時鳴中律復七年不食生物大毛落茸毛生乃潔白如雪或純黑泥水不能汚復百六十年雌雄相視而孕一千六百年飲而不食胎化産鸞鳳同為羣聖人在位則與鳳凰翔于甸此文浮丘伯授之王子晉崔文子學道於子晉得其文藏嵩山石室淮南公採藥得之遂傳於代或以為鶴卵生非胎化也未知其孰當事類仙禽陳標曰鶴與鸕鷀皆胎化而人以鶴為丨丨盖鶴難見而鸕鶿易見貴耳而賤目也唐詩紀事水鳥鶴知夜半注鶴丨丨也夜半水位感其生氣則益喜鳴繁露聲聞天鶴鳴於九皋丨丨於丨小雅性警露白鶴丨丨至八月丨降流於草木上滴滴有聲則鳴周處風土記千嵗一變鶴丨丨則丨蒼又千嵗黒所謂𤣥鶴也伏侯古今注一舉千里田饒田夫黄鶴丨丨丨丨集君華池啄君稻梁君猶貴之以其從來逺也鷄有五德君輕之以其從來近也韓詩外傳脛斷則悲鶴丨雖長丨之丨丨荘子􅥑髙俛啄東方朔隠語曰丨益丨者鶴丨丨也漢書棲偃盖松鶴千嵗丨於丨丨丨白帖唼太湖萍周穆王時塗循國獻青鳯二十鶴各一雌一雄飼以潭皋之粟飲以溶溪之水丨以丨丨之丨君子化鶴周穆王南征一軍自化為猿丨丨丨為丨抱朴子子喬為鶴見後有乗軒者衛懿公好鶴鶴丨丨丨丨及狄人伐衛授事者皆曰使鶴鶴實有禄位左閔王揭空籠見齊王使淳于髠獻鶴於楚出邑門道飛其鶴徒丨丨丨以丨楚王曰齊王使臣獻鶴過於水上不忍鶴渇出而飲之飛去吾欲絞頸而絶恐人議吾君以鳥故令士自殺吾欲買而代之是不信而欺吾王欲赴他國痛吾兩主使不通後來受罪楚王曰善史記緱氏山頭王子喬好吹笙後告其家人曰七月待我於丨丨丨丨及期果為白鶴謝時人去太液池上黄鶴下丨丨丨丨為歌曰黄鶴飛兮下建章金為衣兮菊為裳西京記俱入墓門吳王闔廬有女王伐楚與夫人及女㑹食蒸魚王甞半女怨曰王食我殘魚辱我不忍乆生乃自殺闔廬痛之𦵏郡西閶門外乃舞白鶴於吳市令萬民觀之遂使與鶴丨丨丨丨因塞之以送死史記飛入雷門有鶴丨丨㑹稽丨丨鼔中於是鼔鳴洛陽聞之後斫破鼓鶴遂飛去淮海記青田雙鶴丨丨有丨白丨年年生伏子長便去永嘉記紫峰雙鶴衡山有丨盖丨峯上有丨丨迴翔而鳴白帖爾沖天物有餉鶴於支遁者遁謂之曰丨丨丨之寧為耳耳目之翫乎遂放令去白帖有沖雲志僧支道林好鶴有遺其雙鶴者翅長欲飛林意惜之乃鏃其翮鶴軒翥而不能復起乃舒翼反頸視之有似懊惋道林曰既丨丨丨之丨何肯為人耳目玩乎養令翮成遂放飛去世説華亭鶴唳陸機以成都王潁勞謙下士謂潁必能康隆晉室遂委身焉潁以機㕘大将軍事宦人孟玖譖機於潁言有異志潁大怒使孫秀收機機嘆曰丨丨丨丨豈可得聞乎遂遇害於軍中華表鶴集遼東丨丨柱忽有丨丨其上曰有鳥有鳥丁令威去家千年今始歸城郭如故人民非何不學仙冢纍纍援相鶴經李浮丘伯事見前作别鶴操商陵牧子娶妻無子父母出之牧子别妻援琴而鼔之丨丨丨丨白帖聽琴鳴舞師矌曰鼓琴𤣥鶴鳴舞白帖㘅珠來報噲參行遇𤣥鶴被傷乃收養之放去至一夜雌雄俱丨明丨丨以丨參也搜神記出門化鶴晉陶侃喪親有一客來吊丨丨丨為白丨飛去白帖入廟見鶴好道者丨丨或丨一白丨入帳中鶴者皆是九轉還丹之使茅君傳有物飄然荀瓌事母孝好道術潜棲却粒甞東㳺憇江夏黄鶴樓上望西南丨丨丨丨降自霄漢俄頃已至乃駕鶴之仙也鶴止户側仙者就席羽衣虹裳相與欵對已乃辭去跨鶴騰空妙然烟滅述異傳彈我何為蘇宣公者名耽桂陽人有數十白鶴降于門遂昇雲漢而去後有騎白鶴來止郡城東北樓上人或挾彈彈之鶴以爪攫樓板以漆書云城郭是人民非三百甲子一歸歸吾是蘇仙君丨丨丨丨神仙傳鶴在鷄羣嵇紹在稠人中昂昂然若野丨之丨丨丨晉書鶴鳴雞樹鳳閣侍郎杜景佺文章知識並髙逺時號為丨丨丨丨張鷟僉載鶴為上瑞𤣥丨丨丨丨唐六典禮部鶴亦敗道淵材迂濶好怪甞畜兩鶴客至誇曰此仙禽也凡禽卵生此禽胎生語未卒園丁報曰鶴夜生一卵淵材呵曰敢謗鶴邪未幾鶴展頸伏地復誕一卵淵材歎曰丨丨丨丨吾乃為劉禹錫嘉話所誤自今除孔子佛老語餘皆勘騐然淵材獨相鶴經未熟耳墨客揮犀月夜繞塔太和中長安城南韋曲慈恩寺塔丨丨有一美人從三四青衣丨丨言笑忽顧侍婢白院僧借筆硯來於梁上題詩黄子波頭好月明忘却華亭到遶行烟收山低翠黛横折得荷花逺恨生僧将燭之化為白鶴飛去河東記雲間帶箭𤣥宗天寳十三載重陽日獵於沙苑丨丨有孤鶴徘徊上御弧矢中之鶴丨丨矯翼西南而逝益州城西十五里有道觀觀東廊第一院有青城山道士徐佐卿一嵗率三四至一日怱不懌曰偶為飛矢所加尋已無恙然而箭非人間所有吾留之於壁後年箭主至則付之乃記壁去留箭之時則十三載及帝幸蜀暇日命行游偶至觀入此堂忽覩箭取而翫之乃御箭也深異之佐卿乃中箭鶴廣德神異記夜夢駕鶴李抱真丨丨丨丨寤而刻寓鶴衣羽服習乗之孔帖隠居蓄鶴林逋丨丨孤山常畜兩鶴縱之則飛入雲霄盤旋乆之復入籠中逋常泛小艇遊西湖諸寺有客至逋所居則一童子出應門延客坐為開籠縦鶴良乆逋必掉小船歸盖常以鶴飛為驗也筆談指名兵𤓰鶴左右脚裏第一丨丨丨丨酉陽雜爼翅如車輪時夜将半四顧寂寥適有孤鶴横江東來丨丨丨丨𤣥裳縞衣戞然長鳴掠予舟而西也須臾客去予亦就睡夢一道士羽衣翩躚適臨皋之下揖予而言曰赤壁之逰樂乎問其姓名俛而不答嗚呼噫嘻我知之矣疇昔之夜飛鳴而過我者非子也耶道士顧笑予亦驚寤開户視之不見其處後赤壁賦願騎鶴上昇有客相從各言所志或願為揚州刺史或願多貲財或丨丨丨丨丨其一人曰腰纒千萬貫騎鶴上揚州欲兼三者小説鮑照舞鶴賦散幽徑以騐物偉胎化之仙禽鍾浮曠之藻質抱清迥之明心指蓬萊而翻翰望崑閬而揚音市日域以迴鶩窮天步而髙尋踐神區而既逺積靈祀而方多睛含丹而星耀頂凝紫而烟華引圓吭之纎婉頓修趾之洪姱疊霜毛而弄影振玉羽而臨霞朝戲乎芝田夕飲乎瑶池厭江海而逰澤掩雲羅而見覊去帝鄉之岑寂歸人寰之喧卑嵗峥嶸而愁暮心惆悵以哀離於是窮隂殺節急景凋年涼沙振野箕風動天嚴嚴苦霧皎皎悲泉冰塞長河雪滿羣山既而氛昏夜歇景物澄廓星翻漢迴曉月将落感寒鷄之早晨憐霜雁之逺漠驚臨風之蕭條對流光之昭灼唳清響於丹墀舞飛容于金闍始連軒以鳳蹌終宛轉而龍躍躑躅徘徊振迅騰擢驚身蓬集矯翅雪飛離網則赴合緒相依将興中止若往而歸颯㳫矜顧遷延遲暮逸翮後塵翺翥先路指㑹規翔臨岐矩步態有遺妍貌无停趣奔機逗節角睞分形長楊緩鶩並翅連聲輕迹凌亂浮影交横衆變繁姿參差洊宻烟交霧凝若無毛質風去雨還不可談悉既散魄而蕩目迷不知其所止忽星離而雲罷整神容而自持仰天居之崇絶更惆悵以驚思當是時也燕姬色泪巴童心恥巾停兩停丸劒雙止雖邯鄲其敢倫豈陽阿之能擬入衛國而乗軒出吳都而傾市守馴養於千齡結長悲於萬里李白畫鶴贊髙堂閑軒兮雖聽而不擾圖蓬山之竒禽想瀛海之縹緲紫頂烟赩丹眸星皎昂昂佇眙觀若驚矯形留座隅勢出天表謂長鳴於風霄終寂立于露曉凝翫益古俯察逾妍舞疑傾市聴似聞弦倘感至精以神變可弄影而浮烟詩集貞姿鶴有不羣者飛飛在野田餓不啄腐䑕渇不飲泉丨丨自耿介雜鳥何翩翾同逰不同志如此十餘一興嗜慾念遂為矰繳牽委委質小池内争食羣鷄前不惟懷稻粱兼以競腥膻不惟戀主人兼以狎烏鳶物心不可知天性有時還一飽尚如此況乗大夫軒白居易感鶴野性白首勞為伴朱門幸見呼不知踈丨丨解愛鳳池無劉禹錫和裴相公寄白侍郎求雙鶴玉音我有所愛鶴毛羽霜雪妍秋霄一滴露聲聞林外天自隨衛侯去遂去大夫軒雪貌乆已隔丨丨無復傳吟君感鶴操不覺心惕然元稹和白樂天感鶴丹頂華表千年一鶴歸凝丨為丨雪為衣星星仙語人聽盡却向五雲翻翅飛劉禹錫歩虛詞萬里心老鶴丨丨丨杜九臯禽秋風吹却丨丨丨一片閑雲萬里心碧落有情應悵望青天無路可追尋來時白雪翎尤短去日丹砂頂漸深華表柱頭留語後不知消息到如今李逺失鶴昻藏相正憐標格出華亭況是丨丨入丨經碧落順風初得志故巢因雨却聞腥幾時翔集來華表毎日沉吟看盡屏為報雞羣虚妬爾紅裙向上有青㝠韓偓失鶴踉蹌形瑞羽竒姿丨丨丨稱為仙馭過蒼㝠何年厚禄曽居衞幾世前身本姓丁幸冇逺雲兼逺水莫臨華表與華亭勞君贈我清歌侣将去田園夜坐聽薛然答賈支使寄鶴千里姿明公真愛鶴腥鶴選仙骨遂令丨丨丨為君軒墀物啄豈復辭雞羣鍛翼欲比鳧鷖馴聆音發舞似矜客避寒孤警将依人吾聞芝田逸翮不如此世上悠悠誰識真劉貢父賦題歐公㕔前兩白鶴三尺脛園中有鶴馴可呼我欲呼之立坐隅鶴有難色側睨余豈欲臆對如鵬乎我生如寄乍畸孤丨丨長丨閣疲軀俛啄少許便有餘何至以身為子娛驅之上堂立斯須投以餅餌視若無戞然長鳴乃下趍難進易退我不如東坡鶴嘆秋風天外意樊籠毛羽日低推野水長松眼暫開萬里丨丨丨丨丨日斜閑啄岸邊苔歐陽古今合璧事類備要别集巻六十四
