body:
  text: 古今合璧事類備要前集卷二十三宋謝維新撰國戚門外戚事類姻婭瑣瑣丨丨則無膴仕節南山貴戚有丨丨之卿孟子軒冕丨丨王官同許史之繁漢婚姻帝室比姜姞之宜周燕集車馬流丨躍丨豈無甲觀之親湫宅閑門不有椒房之勢同上屯戍母家揚之水刺平王也不撫其民而逺丨丨於丨丨褒賞元舅崧髙尹吉甫美宣王也能建國親諸侯丨丨申伯焉不顯申伯王之丨丨文武是憲詩奉公如法趙奢說平原君曰以君之貴丨丨丨丨則國强國强則趙固君為貴戚豈輕於天下耶趙奢傳非劉不王漢興外戚與定天下侯者二人故誓曰丨丨氏丨丨若有亡功非上所置而侯者天下共誅之是以髙后欲王諸吕王陵廷争孝景將侯王氏修音條侯犯色卒用廢黜外戚表諸吕謀亂上將軍吕禄相國吕産顓兵秉政因謀作亂太尉勃北軍不得入紀通迺令持節矯内勃北軍勃入軍門行令軍中曰為吕氏右袒為劉氏左袒軍皆左袒遂入北軍逐産殺之兩竇退抑竇后兄長君弟少君灌將軍等曰吾属不死命乃且懸此兩人乃選長者之有節行者與居長君少君由此為退遜君子不敢以富貴驕人不私廣國張蒼免相文帝以皇后弟竇廣國有賢行欲相之曰恐天下以吾私廣國乃以嘉為丞相本傳獨取竇嬰景帝三年上察諸竇無如嬰賢乃拜嬰為大將軍恃權傲兄武帝即位田蚡以肺腑為相權移主丄嘗召客飲坐其兄盖侯北嚮自坐東嚮以為漢相尊不可以兄故私撓由此滋驕治宅甲諸第田園極膏腴市買郡縣器物相屬於道前堂羅鍾鼔立曲旃後房婦女以百數恃恩滅族霍光受遺詔輔昭帝昭帝崩迎立宣帝是時光子禹及兄孫雲皆中郎將雲弟山奉車都尉侍中領胡越兵光兩女婿為東西宫衛尉昆弟諸婿外孫皆奉朝請後因藥殺許后霍氏連坐誅滅者數千家進封外家元帝封外祖父平恩戴侯同産弟子許嘉為平恩侯奉戴侯後注戴侯許廣漢也不私親屬御史大夫李延夀卒在位多舉馮野王行能第一上曰吾用野王為三公後世必謂我私後宫親屬野王歎曰人皆以女寵貴我兄弟獨以賤一姓五侯元后王氏成帝母也王莽之姑家凡十侯五大司馬外戚莫盛焉成帝立尊為太后以王鳯為大司馬大將軍領尚書事王氏之興自鳯始河平二年王潭王商王立王根王逢五人同日封其日黃霧四塞漢史劉向封事曰今王氏丨丨乗朱輪華轂者二十三人丨丨驕奢僣盛並作威福歴上古至秦漢外戚僣貴未有如王氏者也重侯累將自宣元成哀外戚興者許史三王丁𫝊之家丨丨丨丨窮富極貴嘗戒其子樊宏世祖之舅丨丨丨丨曰富貴盈溢未有能終者前世貴戚皆明戒也後漢書不假以權光武閔傷前代權臣太盛外戚與政后族陰郭之家不過九卿親屬榮位不能及許史王氏之半耳東觀漢記號為金穴郭况光武郭后弟也帝數幸其家賞賜金錢縑帛京師丨况家丨丨丨不私椒房馬援女立為顯宗皇后永平間畫建武中名臣列將於雲臺以椒房故獨不及援奪沁水園竇憲恃宫掖聲勢請丨丨丨公主丨田後發覺帝切責曰國家棄憲如孤雛腐䑕耳築渭陽館明帝為外祖築館情鍾舅氏帝問左右館當何名侍中繆襲對曰陛下聖恩齊于哲王罔極過於曾閔此館之興宜以渭陽為名世説四姓小侯永平中為外戚樊氏郭氏陰氏馬氏諸子弟立學號丨丨小學以非列侯故曰丨丨七族六姓西京丨丨皆后黨吕竇衛官霍許王是為七族東京丨丨亦后黨鄧馬竇閻梁何是為六姓庾亮表注防謹舅家顯宗將封爵諸舅馬太后不聴詔曰先帝丨丨丨氏不令在樞機之位諸子之封裁令半楚國常謂我子不當與先帝子等今有司奈何欲以馬氏比陰氏乎明徳馬皇后自撰顯宗起居注削去兄防叅醫藥事章帝請曰黃門舅旦夕供養且一年既无褒異又不錄其勤勞毋乃過乎太后曰吾不欲令後世聞先帝數親後宫之家故不著和熹鄧后和帝后也帝每欲官爵鄧氏后輒哀請謙遜故兄隲終帝世不過虎賁郎戒敕外家明徳馬后云前過濯龍門上見外家問起居者車如流水馬如游龍蒼頭衣緑褠領袖正白視御者不及逺矣其車服不軌者便絶屬籍於是内外從化求訪外氏隋文帝外家吕氏甚微求訪不知所在開皇初汝南郡上言有男子吕永者自稱有姑字苦桃嫁楊氏勘驗知是舅家而貴之因緣椒房楊國忠謂客曰某家起細微丨丨丨丨以致于是未知税駕之所念終不能致令名更當取樂於富貴耳明皇雜文為外戚表唐章敬皇后弟呉湊任中外未嘗以罪過罷丨世丨丨丨唐書以姻戚進竇氏自武徳以來尚主者八人女為王妃者十人竇威曰臣家在漢再為外戚至元魏有三皇后今陛下龍興臣復丨丨丨丨夙夜懼不克任帝曰公以三后族夸我耶同上后父母事類臨泗丨丨侯吕公以漢王后父賜號漢元年始封髙后元年追尊曰宣王漢外戚侯表靈文會稽郡山陰縣有丨丨園盖丨丨侯薄太后父也平原丨丨君武帝外祖母也樂陵丨丨侯史髙以宣帝大家父母貴侍中重厚忠信史紀年表博平漢宣帝地節四年封外祖母為丨丨君成陽丨丨侯趙臨以孝成后父封侯二千石漢表不臣古者天子封后父百里尊而丨丨以重宗廟孝之至也王莽傳封君異姓婦人以恩澤丨者曰丨儀比長公主蔡邕新野後漢和熹鄧太后安帝永初爵號太后太夫人為丨丨君萬户供湯沐邑及薨贈以長公主赤紱冠軍梁商字伯夏順帝選商女為后拜商大將軍自以戚屬居大位毎存謙柔虚已進賢辟巨覽陳龜為掾属李固周舉為從事中郎京師翕然稱為良輔上蔡艾昭甄后明帝母也父逸上蔡令早卒帝即位追封丨丨侯諡敬侯適孫蒙襲爵薨子暢嗣開陽侯魏明帝太和四年封祖母武宣卞太后祖父廣曰丨丨恭丨祖母周封陽都君及恭夫人皆賜印綬當陽君魏明帝追封郭太后父永世婦董氏丨丨丨周上柱國唐髙祖太穆順聖皇后竇氏父毅在丨為丨丨丨尚武帝姊㐮陽長公主常謂主曰此女有竒相且識不凡何可妄與人因畫二孔雀屏間請婚者使射二矢陰約中目則許之髙祖最後射中各一目遂歸於帝隋衛將軍太宗文徳順聖皇后長孫氏父晟涉書史趫騺曉兵事丨為丨丨丨丨后喜圖傳視古善惡以自鑒矜尚禮法晟兄熾為周學士嘗聞大穆竇后太宗母勸撫突厥女毎語晟曰此明睿人必有竒子不可以不圖婚故晟以女太宗俄為皇后配夏之慶匿武收繼趙之勲産姚承丨丨丨丨吹凱風於椒掖外王母於梧宮謂夫人即明皇武恵妃之母諸王之外祖母故有椒掖梧宫之句定申之命唐穆宗即位追贈郭太后父曖為太傅詔曰肆予小子敬纉大業未展丨丨丨丨敢縁褒紀之恩后兄弟事類周吕吕澤吕后長兄以客從入漢定三秦將兵下碭漢王敗彭城往從之佐定天下封丨丨令武侯漢外戚表上欲易太子后怒乃使澤刼張良為畫計張良傳武安田蚡孝景王皇后母弟也孝景即位為中大夫辯有口學盤盂諸書武帝初蚡以舅封為丨丨侯卑下賔客進名士家居者欲以傾諸將相上所鎮撫多蚡賔客計䇿後為太尉蚡雖不任職以王太后故親幸數言事多效後為相上初即位蚡以肺腑為相非痛折節以禮屈之天下不肅益封長平烈侯衛青皇后弟以將軍擊匈奴取朔方侯後破右賢王丨丨又封三子外戚侯表先是青有同母姊子夫子夫自平陽公主家得幸武帝故青冒姓為衛氏後子夫立為后青傳嗣封成帝后弟趙沂丨父臨侯成陽外戚侯表權盛孝成之世委政外家故杜鄴敢譏丁傅而欽永不敢言王氏其勢然也哀帝祖母曰傅太后母曰丁姬稱帝太后而皇后即傳太后從弟子后父孔鄉侯傳晏為大司馬衛將軍而帝舅陽安侯丁明為大司馬驃騎將軍恩渥後漢光武郭后弟况為陽安侯而明帝母乃陰后及明帝即位况與后弟陰就並為特進數受賞賜丨寵俱丨禮待陰郭每事必均皇后紀加恩后自撰顯宗起居注削去兄馬防叅醫藥事章帝請曰黃門舅旦夕供養且一年既无褒異又不録勲勞毋乃過乎太后曰吾不欲令後世聞先帝數親後宫之家故不著也帝欲封諸舅太后不聴明年夏大旱言事者以為不封外家之故太后詔曰凡言者皆欲媚朕以要福昔王氏五侯同日俱封時黃霧四塞不聞澍雨之應又田蚡竇嬰寵貴橫恣傾覆之事世所共傳先帝防慎舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國常謂我子不當與先帝等今有司奈何欲以馬氏比陰氏乎帝復請曰漢舅氏之封侯猶皇子為王也太后誠存謙虛奈何令臣獨不得丨丨二舅乎云云太后報馬氏無功於國豈得與陰郭中興之后比耶由是防先為列侯並辭譲願就闗内侯廖等不得已受封爵而退位奏第後漢本紀進封魏武宣卞皇后弟秉以功封都鄉侯黃初七年文帝丨丨開陽侯邑千二百户切譲姻戚之間謗讟為集假令漢帝無私於廣國元規丨丨於中書唐書志止大將軍國初杜審瓊國舅也官丨丨丨丨梅摯奏議審瓊太祖太宗舅事兩朝有勞始終不至宣徽王拱辰言兩使留後王繼勲太祖考明皇后弟也兼丨丨丨丨政要增釋戚里遷補慶厯六年李璋為閣門副使弟珣求為通事舍人上曰丨丨之家兄弟丨丨如已欲朕何以待勲舊乎長編元舅推恩治平元年加宣徽北院節度使曹佾同平章事初議除拜上問韓琦琦曰陛下推恩丨丨非私外戚也遂降制外家恩澤元祐七年三省言景祐七年李用和等改官移鎮恩例今髙氏朱氏皆舉故事加恩太皇太后曰章獻垂簾初無此例吕大防曰太皇太后以髙氏故深自抑畏如故事何后曰丨丨丨丨方欲裁損可又增長乎大防曰此盛徳事后族恩澤景祐元年曹琮為衛州團練使琮女兄為后奏曰陛下以至公厲天下臣備丨丨不宜冒丨丨亂朝廷法族人敢因緣請托願寘于理外姻輔政至和元年樞宻使彰徳節度同平章事王貽永數以疾求罷本朝丨丨未有丨丨者貽永在樞宻十五年常逺權利歸第則杜門謝賔客人稱其謙静長編崔琦外戚箴後漢崔琦以文章稱梁冀請與之交崔以其行多不軌數引古今成敗以戒之冀不受乃作外戚箴以規之曰赫赫外戚華寵煌煌昔在帝舜徳隆英皇周興三母有萃崇湯宣王晏起姜后脱簮齊桓好樂衛姬不音皆輔主以禮扶君以仁達才進善以義濟才爰暨末業漸以頺虧貫魚不敘九御差池晉國之亂禍起於驪惟家之索牝雞之晨専權擅愛顯已蔽人陵長間舊圯剥至親並后匹嫡淫女斃陳匪賢是尚畨為司徒荷爵負乗采食名都詩人是刺徳用不憮暴君惑婦拒諫自孤蝠蛇其心縱毒不辜諸父是殺孕子是刳天怒地忿人謀鬼圖甲子昧爽身首分離初為天子後為人螭非但耽色母后尢然不相率以禮而競􅅄以權先笑後號卒以為殘家國泯絶宗廟燒燔妺喜喪夏褒姒斃周妲己亡殷趙靈沙邱戚姬人豕吕宗以敗陳后作巫卒死于外霍欲鴆子身乃罹廢故曰无謂我貴天將爾摧无恃常好色有歇緻无怙常幸愛有陵遲无曰我能天人爾違患生不徳福有憎機日不常中月盈有虧履道者固仗勢者危微臣司戚敢告在斯后姊妹附妃姊妹事類長姁扶栁侯吕平以吕后姊丨丨子侯師古曰平既吕氏所生不當姓吕盖史家唯記母族也時吕后朝漢外戚侯表少兒武帝衛皇后姊名丨丨生霍去病封景桓侯霍去病傳美劭楊貴妃天寳初進冊貴妃三姊皆丨丨帝呼為姨封韓虢秦三國為夫人出入宫掖恩寵聲㷔震天下警慧宋尚宫若昭世以儒聞父廷芬能辭章生五女皆丨丨善屬文長若莘次若昭若倫若憲若荀萃昭文尤髙賦性素潔鄙薰澤靚粧不願歸人欲以學名家家亦不欲與寒鄉凡裔為姻對聽其學若莘誨諸妹如嚴師著女論語十篇大抵凖論語以韋宣文君代孔子是大家等為顔冉推明婦道所宜若昭又為傳申釋之唐本傳詩集賜大國三月三日天氣新長安水邉多麗人態濃意逺淑且真肌理細膩骨肉匀繡羅衣裳照暮春蹙金孔雀銀麒麟頭上何所有翠微㔩葉垂鬢唇背後何所見珠壓腰衱穏稱身就中雲幕椒房親丨名丨丨虢與秦紫駞之峯出翠釜水晶之盤行素鱗犀筋厭飫久未下鑾刀縷切空紛綸黃門飛鞚不動塵御厨絡繹送八珍簫鼔哀吟感鬼神賔從雜遝實要津後來鞍馬何逡廵當軒下馬入錦茵楊花雪落覆白蘋青鳥飛去銜紅巾炙手可熱勢絶倫杜甫麗人行承主恩虢國夫人丨丨丨平明下馬入宫門却嫌脂粉涴顔色淡掃蛾眉朝至尊杜真貴人佳人自鞚玉花驄袖内驚燕踏飛龍金鞭争道寳釵落何人先入明光宫宫中羯鼓催花栁玉奴絃素花奴手坐中八姨丨丨丨走馬來看不動塵明眸皓齒誰復見只有丹青餘淚痕人間俯仰成今古呉公臺下雷塘路當時亦笑張麗華不知門外韓擒虎蘇東坡虢國夫人夜遊圖詩國婿事類嬪虞有鰥在下曰虞舜帝曰俞予聞如何岳曰瞽子父頑母嚚象傲克諧以孝烝烝又不格姦帝曰我其試哉女于時觀厥刑于二女釐降二女于媯汭丨于丨帝曰欽哉尚書舜典歸齊魯莊公元年夏單伯逆王姬秋築王姬之館于外冬王姬丨于丨傳單伯者何吾大夫之命乎天子者也何以不稱使天子召而使之也逆之者何使我主之也曷為使我主之天子嫁女乎諸侯必使諸侯同姓者主之主王姬者必為之改築于路寝則不可小寢則嫌羣公子之舍則以卑矣其道必為之改築者也丨于丨何以書我主之也春秋公羊傳嗣王張敖父耳丨丨尚髙祖長女魯元公主為王后七年髙祖從平城過趙趙王旦暮自上食體甚卑有子婿禮本傳封侯曹夀尚武帝姊陽信長公主丨平陽丨衛青傳貴重梁松字伯孫帝婿丨丨朝廷公卿以下莫不憚之後馬援傳貴顯竇固字孟孫以尚公主為黃門侍郎好覽書傳喜兵法丨丨用事襲父友封顯親侯顯宗時欲擊匈奴通西域以固明習邊事拜奉車都尉云云在邊數年服其恩信明經叔髙以丨丨顯於漢俊才武子以丨丨聞於晉並蕭冥公主碑五世尚主後魏穆觀子亮亮子紹紹子王國王國子平平城丨丨丨丨古今姓氏雜録四世尚主穆觀子真真子奉奉子智伯丨丨丨丨一門凡十二人尚公主同上一門三主後魏盧道弟䖍弟元聿並尚魏室公主丨丨丨丨士族榮之同上一門四主唐薛瓘子紹瓘堂姪儆儆子繡並尚公主丨丨丨丨同上進食牙盤成徳軍節度使王元逵自秉節鉞革父風職貢結轍于道文宗詔尚夀安公主元逵遣段氏妹詣闕迎之丨丨于丨丨公主之行其從如雲朝野以為榮陳公闕唐紀行服杖周文宗開成二年杜悰為工部尚書為岐陽公主服日内久未謝恩户部侍郎李珏奏來駙馬為公主行服三年所以士族不願為國戚帝大駭即日詔令丨丨丨丨永為制定唐史對置幕府唐髙祖女平陽公主下嫁柴紹初髙祖兵興主與紹發家貲招南山亡命得數百人以應帝威振闗中後引兵與秦王會渭北紹與主丨丨丨丨分定京師號娘子軍太宗即位以功給賚不涯雙列門㦸蕭銳尚太宗女㐮城公主丨丨丨丨裝賚倍之長孫冲尚太宗女長樂公主乃長孫皇后所生勑有司丨丨視長公主而丨丨求為使相本朝天聖四年仁宗曰駙馬都尉柴宗慶丨丨丨丨何如王曾曰先帝時石保吉皆歴行陳有功晚年方除使相之任豈容私情長編與免稅筭駙馬都尉王承衍石保吉魏咸信因販竹木丨丨丨丨不免責罰政要增釋出知衛州李瑋尚兖國公主主以驕恣聞司馬公上疏言太宗時姚坦為兖王翊善有過必諫左右教王詐疾踰月太宗召王乳母杖之召坦慰勉之齊國獻穆大長公主太宗之子真宗之妹陛下之姑而謙恭率禮天下稱其賢願陛下教之以太宗為法公主事夫以獻穆為法已而公主不安於李氏詔瑋丨丨丨丨公主入居禁中而瑋母楊歸其兄璋散遣其家人公言陛下追念母家使瑋尚公主今乃母子離析家事流落陛下獨無雨露之恩悽惻之心乎瑋既責降公主亦不得無罪上感悟詔公主降封祈國待李氏恩禮不衰司馬公行狀求正刺史世隆父尚秦國長公主主為其子世隆求正刺史真宗曰牧守之官係朝廷公議遂罷之古今合璧事類備要前集卷二十三
