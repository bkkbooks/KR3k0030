body:
  text: 古今合璧事類備要别集卷二十五宋謝維新撰花部芍藥花格物藂話芍藥牡丹之亞也百花之中其名最古本草注一名將離廣雅曰黒挛夷芍藥也詩鄭國風又有贈以芍藥之句其後謝公直中書省白太傅為主客郎中知制誥皆有詩爰自天后以來牡丹始盛而芍藥之艷衰矣花譜總别四十二種今閲其花皆六出至春三月時粗者先發佳者後開叢高二尺許廣亦盈手豐碩艷麗悦目可珍至其色則世傳以黄者為貴餘皆下品也君子謂此花獨産於廣陵者為得風土之正亦猶牡丹之品洛陽之外無傳焉雖四方之人非不市種以歸然徃徃離其土性大率一嵗而小變三嵗而大變及其末也與凡花盖無以異然則芍藥之美益得以專於楊州者或者誠有所未諭云事類金帶圍芍藥花名天下者洛陽牡丹廣陵芍藥尔紅葉而黄腰號丨丨丨而無種有時而出則城中當有宰相韓魏守廣陵日一出四枝公嘗選客具樂以賞之是時王岐公以高科為倅王荆公以名士為属皆在選尚闕其一而莫有當者数日不决而花已盛公命戒客而私自念今日有客而不問何人召使當之及暮南水門陳太傳來早使召之乃秀公也明日酒半折花欹以挿之其後四公皆為相后山叢話玉盤盂東武舊俗毎嵗四月大㑹於南禪資福兩寺芍藥供佛而今嵗最盛凡七十餘朶皆重跗累蕚繁麗豐碩中有白花正圓如覆盂其下十餘葉承之如盤姿格獨出於七十朶之上因易名曰丨丨丨東坡詩序腰金紫四枝正紫重跗累蕚中有金蘂繞之號丨丨丨東軒茟録萬花㑹東坡云揚州芍藥為天下冠蔡繁卿為守始作萬花㑹用花十餘萬枝既殘諸園吏並縁為奸民大病之余始至問民疾苦以此為首遂罷之萬花本洛陽故事亦必為民害也會當有罷之者錢惟演為留守始置驛貢洛花識者鄙之曰此宫妾愛君之意也漁隠叢話孔常父芍藥序揚州芍藥名於天下與洛陽牡丹俱貴於時四方之人盡皆齎携金帛市種以歸者多矣吾見其一嵗而小變三嵗而大變卒與常花無異由此芍藥之美益專於揚州焉大抵粗者先開佳者後發高至尺餘廣亦盈手其色以黄為最貴所葉乃其下者鄭詩引芍藥以具而後説者曰香草也司馬長卿子虗賦曰芍藥之和御之説者曰芍藥根又辟毒氣也謝省中詩曰紅藥當階翻説者曰草州者皆與今所謂芍藥者合但未有專言楊其義以模冩風物自喜如盧人杜牧張闕之徒皆居也余有一語及闕是花品未有若今日之盛官三十有三種乃暇嘗裁而定之盖可紀者具列其名從而釋之劉貢父芍藥譜天下名花洛陽牡丹廣陵芍藥為相侔埒禹貢記揚州草夭木喬聖人之言然未有效其夭喬也廣陵芍藥有自他方移來種之者經嵗則盛至有十倍其初而勝廣陵所出逺甚地氣所宜信其為夭乎然則醫書本草所載藥物方土所出山川原野氣力不同或相倍蓰十百如此花矣不可不察也然芍藥之盛四五十里之間為然外是則薄劣不及洛陽牡丹於嵗變更日新而芍藥自以種傳獨得節泙溉以時亦不能全盛又有風雨暄寒間有至十四五年得一見者其闕闕開不能成天時叅地利人力品此天地一物不與凡品同待其然後出意其造物亦曰珍惜之耳芍藥始開時可留七八日自廣陵至姑蘓北入射陽未至通州海上西止滁和州數百里間人人厭觀矣廣陵到京師千五百里駿馬疾足可六七日至也上不以耳目之玩勤逺人而富啇大賈逐利纎嗇不顧又無好事有力者招致之故芍藥不得至京師而洛陽牡丹獨擅其名其移根此方者二年以徃則不及初年自是嵗加劣矣故北人之見芍藥者皆其下者也然種芍藥為生者猶得厚價重利云熈寜六年攽罷海陵至廣陵時正四月花時㑹友人傳欽之孫莘老偕行相與歴覽人家園圃及佛舍所種凡三萬餘株芍藥媺好及雖好而不至者盡是矣扶風馬玿府大尹給事公子也愽物好竒為予道芍藥本末及取廣陵人所第名品示予予按唐氏藩鎮之盛掦府號為第一萬商千賈珍貨之所叢集百氏小説尚多記之而莫有言芍藥之美者非天地生物無粗於古而特隆於今也殆時所好尚不齊而古人未必能知正色耳白樂天詩言牡丹取叢大花朶繁者為佳此最洛人所卑下者古人之不知芍藥者何疑然當時無記録故後世莫知其詳今此復無傳説使後世今猶不足恨或人情好尚更變浸浸日逺則名品竒花遂將泯黙無傳來者莫知有此不亦惜哉故因次序為譜凡三十一種皆使畫工圖冩之以示未嘗見者使知之其嘗見者固以吾言為信矣彭成劉攽記冠羣芳大旋心冠子深紅寳粧成髻子色㣲紫賽羣芳小旋心冠子盡天工青心紅冠子曉粧新白襭子積嬌紅紅楼子㸃粧紅紅襭子冠疊香英紫楼子醉西施大軟條子色淡紅道粧成黄楼子紅探香瓊青心玉版冠子白冠子素粧殘初開粉即漸白試梅粧淺粧匀粉紅冠子醉嬌紅深紅冠子擬香英紫蕋紫冠子妬嬌紅紅寳相冠子縷金囊金綿冠子怨春紅硬條冠子妬鵝黄黄絲頭葉蘸金香金蕋紫草葉試穠緋多葉宿妝殷紫高多取次粧淡紅多葉聚香絲紫緑頭一簇紅絲紅絲頭會三英三頭紫蕚效殷妝小矮多葉合歡芳雙頭並蒂擬繡韉鞍子兩邉垂下銀含稜銀縁王觀芍藥譜序余嘗論天下之物悉受天地之氣以生其小大短長辛酸甘苦與夫顔色之異計非人力之可容致巧於其間也今洛陽之牡丹維揚之芍藥受天地之氣以生而小大淺深一隨人力之工拙而移其天地所生之性故竒容異色間出於人間以人而盗天地之工而成之良可恠也然而天地之間事物紛紜出乎其前不得而曉者此其一也洛陽風土之詳已見於歐公之記此不復論維揚大抵土壌肥膩於草木為宜禹貢曰厥草惟夭是也居人以治花相尚方九月十月時悉出其根滌以甘泉然後剥削老硬病腐之處揉調沙糞以培之易其故土凡花大約三年或二年一分不分則舊根老硬而侵食新芽故花不成就分之數則小而不舒不分與分之太數皆花之病也花顔色之深淺與葉蕋之繁盛皆出於培壅剥削之力花既萎落亟剪去其子屈盤枝條使不離散脉理不上行而皆歸於根明年新花繁而色潤雜花根窠多不能致逺惟芍藥及時取根盡取本土貯以竹席之器雖数千里之逺一人可負数百本而不勞至於他州則壅以沙糞雖不及維揚之盛而顔色亦非他州所有者比也亦有踰年即變而不成者此亦繫土地之宜而人力之至不至也花品舊傳龍興寺山子羅漢觀音彌陀之四院冠於此州其後民間稍稍厚賂以丐其本培壅事治遂過於龍興之四院今則有朱氏之園最為冠絶南北二園所種㡬於五六萬株意其自古種花之盛未之有也朱氏當其花之盛開飾亭宇以待來遊者逾月不絶而朱氏未嘗厭也揚之人與西洛不異無貴賤皆喜戴花故開明橋之間方春之月拂旦有花市焉州宅舊有芍藥㕔在都㕔之後聚一州絶品於其中不下龍興朱氏之盛徃嵗郡將召移新守未至監護不宻悉為人盗去易以凡品自是芍藥㕔徒有其名爾今芍藥有三十四品舊譜只取三十一種如緋單葉白單葉紅單葉不入名品之内其花皆六出維揚之人甚賤之余自熈寜八年季冬守官江都所見與夫所聞莫不詳熟又得八品焉非平日三十一品之比此皆世之所難得今悉列于左舊譜三十一品分上中下七等此前人所定今更不易新収八品御衣黄黄色淺而葉踈如黄楼子冠子黄楼子五七層間以金線袁黄髻子峽石黄冠子黄金線冠子金鮑黄冠子色𩔖瑠黄楊花冠子心葉紅間以線胡纈紅色深淺相雜黽池紅並蕚或三顔王觀芍藥後論或謂有唐若張祐杜牧盧仝崔涯章孝標李嵘王播皆一時名士而工於詩者也或遊觀於此不為不乆而畧無一言一句以及芍藥意其古未有之始盛於今未為通論也海棠之盛莫盛於西蜀而杜子美詩名又重於張祐諸公在蜀日乆其詩数千篇而未嘗及海棠張祐軰詩之不及芍藥不足疑也詩集當階翻紅藥丨丨丨謝元暉傍砌㸔丨丨丨紅藥杜甫妍華麗凡卉與時謝丨丨丨兹辰欹紅醉濃露窈窕留餘春孤賞薄日暮暄風動揺頻夜窓藹芳氣幽臥如相親願致溱洧贈悠悠南國人桞宗元殷勤開芍藥誰謂壻人人不敢來唯應待詩老日日丨丨丨孟郊花欲老今日階前紅芍藥㡬丨丨丨㡬花新開時不欲此色相落後始知如幻身空門此去㡬多地欲把殘花問上人白居易花長在芍藥花開出舊欄春杉掩淚再來㸔主人不在丨丨丨更勝青松守嵗寒錢起翠莖緑葉丨丨丨丨天力與此恩不属黄鍾家韓退之碧股黄絲罷草紫泥詔起吟紅藥詩詞頭封送後花口拆開時坐對鈎簾久行觀歩履遟兩三叢爛熳十二葉參差背日房㣲歛當階朶旋欹釵莖抽丨丨粉蕋撲丨丨動盪情無限低斜力不支周囘㸔未足比諭語難為勾漏丹砂裹僬僥火㷔旗彤雲䞉根蔕綘幘欠纓緌况有晴風動仍兼宿露垂疑香熏罨畫似淚着臙脂有意留連我無言怨思誰應愁明日落如恨隔年期菡蓞􅅺連蕚玫瑰刺繞枝等量無勝者唯眼與心知白樂天仙禁㣲芳丨丨生紅藥丨丨不自持幸因清絶地還遇艷陽時張九齡浩態狂香丨丨丨丨昔未逢紅燈粲粲緑盤龍覺來獨坐匆驚恐身在仙官第㡬重韓昌黎旋心弱體廣陵芍藥真竒詫名與洛花相上下洛花年來品格卑所在随人趂高價接頭着處聘新妍輕去本根無顧籍不論姚花與魏花只供俗眼陪妖姹廣陵之花品絶高得地不移㱕造化丨丨丨丨不勝枝寳髻欹斜猶墮馬韓忠献公仙姿美態含露丨丨近玉堂翻階丨丨醉紅粧對花未免須酣舞到底昌黎是楚狂卲康節紅芍藥夭桃未可艷艷錦不如夭丨丨丨丨晴霞畏欲散晚日愁將墮結根本為誰賞心期在我元稹牡丹近侍阿姨天上舞霓裳姊妹庭前剪雪霜要與丨丨為丨丨鈆華不御學梅粧康節兩寺寳瓔珞雜花狼藉占春餘芍藥開時掃地無丨丨粧成丨丨丨一枝爭㸔玉盤盂佳名㑹作新翻曲絶品難尋舊畫圖從此定知年榖熟姑仙親見雪肌膚坡一朶玉盤盂旁招近侍自江都兩嵗何曽見國姝㸔盡滿欄紅芍藥只消丨丨丨丨丨水精淡白非真色珠碧空明得似無欲比此花無可比且云氷骨玉肌膚楊誠齋樂府佳名千種人間花老天涯春去揚州别是風光紅葉五株丨丨丨丨天然浩態狂香尊貴御衣黄未便教西洛獨占花王困倚東風漢宫誰敢闘新粧年年高㑹維揚㸔家誇絶艷人詫竒芳結蕋當屏聮葩就幄紅遮緑遶華堂花靣映交相更秉蕳觀洧幽意難忘罷酒風亭夢魂驚恐在仙鄊望海湖晁無咎國色千金洛下根株江南㘽種天香丨丨丨丨重花邉三閣建康春風前十里楊州夢油璧輕車青絲短鞚㸔花日日催賔從而今何許定王城一枝且為鄰翁送踏莎行張于湖古今合璧事類備要别集卷二十五
