body:
  text: 古今合璧事類備要外集卷四十宋謝維新撰衣服門履附舄屩屨靸屣屐鞋靴屧身章撮要履禮也飾足以為禮用緋羅表皮裏頭飾以絇縫中紃且純且緣不帶口兩旁各著帶用以縛足或以為單底舄以木置履下取乾腊不畏泥濕故名曰舄屨用麻為之亦曰屝然朝服謂履祭服謂舄燕服謂屨亦各視其囊之色屣又舞人所服之履不躡跟鞋亦履屬屧履中薦屩又草履輕便出行著之小兒履曰靸靴胡履自趙武靈王好胡服裳短􅀈以黃皮為之後漸以長靿軍戎通服及後來加飾始許著入殿省屐底下有齒事類草履履禮也飾足以為禮屨拘也所以拘足丨丨曰屝釋名麻履丨丨謂之不借言賤易有宜各自蓄不假借也方言苴履履雖鮮不加於首冠至敝不以丨丨漢書補履干將丨丨不如兩錢之錐莊子因自結晉文公與楚人戰至鳳凰之陸絲履墮丨丨丨之韓子復旋取楚昭王與吳人戰楚軍走而履失之行三十歩丨丨丨王曰楚國雖貧豈愛一騎履乎惡與履出而弗與入也賈誼新書陳仲織丨丨適楚楚王欲以為相妻曰子丨履以為食恬淡以無為樂在其中矣乃謝使者史嘯父補丨丨在冀州市中丨履數十年奇而不老列仙傳東郭履丨丨先生衣敝丨不完行雪中履有上無下足踐地路人笑之史記春申履楚丨丨君賔客三千人皆躡珠丨仲子織陸仲子丨履以為食樂在其中高士傳張良取黃石公墮履令張良取之良跪授之履上殿蕭何劒丨丨丨履為業先主少孤織丨丨丨曹公罵曰賣履舍長識履聲鄭崇為尚書數上書諫上笑曰我丨鄭尚書丨丨請履度江州刺史王𢎞造淵明無履𢎞從人脱履以給之語左右為彭澤作履左右請丨丨淵明於衆坐伸脚及履至著而不疑續陽秋履抵面滕王元嬰嘗為典籖崔簡妻鄭嫚罵以丨丨元嬰丨血流乃免履高頭文宗時吳越間織丨丨草丨如綾縠前代所無履下物也織草為之又非正服而被以文飾盖陰邪闒茸侈泰之象唐五行志婢製履崔彦昭與王凝外昆弟也凝大中初先顯而彦昭未仕嘗見凝倨不冠帶嫚言曰不若從明經舉彦昭為憾至是凝為兵部侍郎母聞彦昭相勑丨多丨丨韈曰王氏妹必與子皆逐吾將共行彦昭聞之泣且拜不敢為怨家惟履元德秀丨丨枕丨染以香白樂天燒丹于廬山草堂作飛雲履𤣥綾為質四面以素綃作雲朶丨丨四選丨振履則如烟霧樂天著示山中道友曰吾足下生雲計不久上升朱府矣樵人直說穿如新公燕居正色危坐未嘗不冠出入歩履皆有常衣稍華者不服不踰年不易衣亦無垢汚履雖丨丨丨皆一於自然未嘗有意如此言行錄舄赤舄丨丨几几金舄赤芾丨丨詩豹舄楚子次于乾谿雨雪王皮冠秦復陶翠被丨丨注以丨皮為履左昭十二年革舄漢文帝足履丨丨飛舄王喬事見縣令門注墮舄𤣥宗貴妃楊氏每乗月帝幸華清宫五宅車騎皆從圓忠導以劒南旗節遺鈿丨丨狼籍于道屨命屨屨人為赤舄黒舄赤繶青絇素屨葛屨注赤繶赤絲為緣也丨丨命夫婦履也功屨去飾士及妻屨散屨及素屨大祥時履禮功屨見上注跪遷屨向長者而屨丨而丨丨俯而納屨記坐取屨君子之飲酒也三爵而退則丨丨丨隱辟而後屨禮不上堂禮侍坐於長者屨丨丨於丨解屨不敢當階就屨跪而舉之屏於側記不為蕢不知足而為屨我知其丨丨丨也孟可履霜糾二葛屨丨以丨丨詩戶外二丨丨有丨履記戶外滿無幾何而往則丨丨之屨丨矣莊列禦冠篇織而食公弟叔肹與之財則曰我足丨屨丨丨榖宣十九年捆以食有為神農之言者許行自宋之滕願受一㕓而為氓其徒數十人皆衣褐丨屨織席丨為丨孟文公下供其屨鄭申侯見齊侯曰若師出於陳鄭之間丨丨資糧扉丨其可也注扉屨草屨也左反誅屨齊侯墜于車傷足䘮屨丨丨丨于徒人費不得鞭之左樂在其中陳仲子齊人適楚楚王欲以為相妻曰子織屨以為食恬淡無為丨丨丨丨乃謝使者髙士傳求之弗得孟子之滕館於上宫有業屨於牖上館人丨丨丨丨或問之曰若是乎從者之􅛀也曰子以是竊屨來與曰殆非也夫子之設科也往者不追來者不拒茍以是心至斯受之而已矣孟盡心屣棄屣舜視棄天下如丨敝丨也孟倒屣魏王粲皇甫規事見前迎送門注鞋守鞋鄭仁凱性貪猥嘗為密州刺史家奴告以鞋敝即呼公吏鞋新者令上樹採果俾奴竊其鞋而去吏訴之仁凱曰刺史不是守鞋人朝野僉載竊鞋李泌未相時宿内院旦起丨泌丨送帝所帝曰鞋者諧也當為弼諧事且諧矣家傳麻鞋一屋鄴下有一領軍貪積已甚家童八百後坐事伏法籍其家産丨丨丨丨弊衣數庫其餘財寶不可勝言顔氏家訓桃絲相纒青齊間桃花有一種盛開時垂絲二三尺者採之練以松脂遞相纒織成鞋履寄往都下人皆不辨何物青州雜記屧斫屧為業江泌少貧好學晝則丨丨丨丨夜則隨月讀書屩以草為夏商丨丨丨屩菲絲為左氏曰丨丨丨屩官中妃嬪皆著並炙轂子釋蹻享梁伊尹勤於鼎俎太公困於鼓刀百里自鬻寗子飯牛離此患也反其遇明君遭聖主也云云離疏丨丨而丨膏丨晉賢臣頌躡屩擔簦趙相虞卿丨丨丨丨來説孝成王賜白璧一雙黄金百鎰拜為上卿著屩牧羊漢卜式為郎在上林中布衣丨丨而丨丨注蹻草屨也南方謂之蹻本傳賣屩糴米後漢江夏劉勤家貧作屩供食嘗作一量屨斷勤置不丨出行妻丨以糴米勤􅀈責妻欺取其直因棄不食芒屩祖别古今圖畫多矣如畫羣公祖二疏而有曳丨丨者夫芒屩出於水鄉非京華所有豈可圖畫遂以為故實唐輿服志芒屩習行齊褚彦回父湛之宋元嘉末為丹陽尹魏軍至𤓰步甚之使子弟者丨丨齋前丨丨彦回年十餘嵗甚有慙色芒屩爭躡唐朱桃椎結廬山中嘗織十丨丨置道上見者曰居士僑也為鬻米茗易之置其處輙取去終不與人接其為屩草柔細環結促密人丨丨之㯶屩垂釣張志和築室越州東郭茨以生草椽棟不施斤斧豹芾丨丨毎丨丨不設餌志不在魚也本傳賜以屩遣侯騎獲覘人帝解其縳丨丨丨丨高麗傳靸蒲靸江南李昇常履丨丨九國志屐半寸碓禹治水山行乗檋丘還反履不丨丨如丨著幾量晉阮孚字遥集厯常侍寺中初祖約性好財孚性好屐同是累而未判得大有詣約者見正料財物客至屏當不盡餘兩小簏以著背後傾身障之意未能富或有詣孚正見自蠟屐因歎曰一生未知當丨丨丨屐神色甚閑暢於是勝負使分折屐齒謝安聞姪𤣥破符堅過户限不覺屐齒之折去屐齒宋謝靈運尋山陟嶺必造幽峻岩障數十重莫不備盡登躡常著木屐上山丨其前齒下山去其後齒取新者償宋疑之嘗為人認其所著障笑曰僕莫已敗家中丨丨丨丨君此人後於田中得所失屐送還不肯復取送前者還齊沈麟士嘗行洛鄰人認其所著屐鄰士曰是卿屐邪即跣而反鄰人得屐丨丨丨丨麟士曰非卿屐邪笑受之玩之躡履齊虞玩之為少府髙帝鎮東府朝廷致敬唯丨丨丨丨造蓆帝取屐視之訛黒叙鋭蒵斷以芒接之玩之曰初釋褐拜征也行估買之著以三十年帝賜新屐玩之不受曰著簪弊席復不可遺所以不敢當劉又穿屐丨丨常丨丨破衣聞韓愈接天下士步歸之唐本傳􅀈短靿靴胡履趙武靈王好胡服常丨丨以黄皮為之實錄長靿北齊全用胡服丨丨靴筆談皂靴隋焬帝數出幸因今百官以戎服從一品紫次朱次青丨丨乃馬􅀈也後世循襲遂為朝服朱語錄氊靴唐馬周以麻為靴殺其靿加以靴丨丨紀原羊靴開元中裴叔通以丨為丨隱麖加以帶子裝束同上麂􅀈朱桃椎益州成都人長史竇軌遺以衣服鹿幘丨丨委之地不肯服本傳抱持取靴崔戎出為華州刺史徒衮海沂密觀察使民擁留於道不得行乃休傳舎民至丨丨丨其丨並孔帖醉使脱􅀈唐李白供奉翰林當侍𤣥宗丨丨高力士丨丨力士取之摘其詩激楊貴妃帝欲白輙為妃沮止詩集納履𤓰田不丨丨古詩整履丨丨步青蕪聽履丨丨上星辰步履丨丨宜輕過又丨丨過東籬絲履細軟青丨丨珠履欲問何時颯丨丨並杜劒履初官恵文讀城旦晩入奉常陪丨丨生素塵足下逺遊履凌波丨丨丨李白送人遊南嶽夢絲絇帝庭無復丨丨丨張安國任履穿頻遊丨丨丨杜春日江春舄暄晨躡丨丨丨露舄上方賜丨丨丨尚書舄家廟藏丨丨丨赤舄坡一雙几几泰階歴盡郎歸來赤舄丨丨應丨丨張安國屨泥土滿丨丨丨􅀈履草露濕丨丨丨芒屨並坡税駕喜丨丨丨中履山谷屣負薪躡哀哉練裙子丨丨丨破屣鞋豈辭眠丨丨青鞋丨杜從此始編􅀈織蒲繩作底輕凉堅密穩稱趾帝底無復夢絲絇上客還同貺珠履我家江南山水窟日日行山勞屐齒感君投贈欲别時布􅀈青鞋丨丨丨亨衢知子方著脚直上雲霄三萬里泰階厯盡即歸來赤舄一雙應几几張安國見天子麻鞋丨丨丨衣神露兩肘杜甫述懷屧步春風丨屧隨丨丨步深林丨屧丨丨晚花殘步丨丨丨屧遲並杜屐上足屐丨丨如霜不着鵶頭韈金齒一雙丨丨屣兩足白如霜並李白無遺跡山河昔留賞屐齒丨丨丨歐卧聽響丨丨墻東人丨屐行山勞屐齒我家江南山水窟日日丨丨丨丨丨張安國韈出門厭丨丨丨靴􅀈山谷泥土滿丨丨丨靴屨坡韈身章撮要韈足衣自三代有之以緋羅為表緋絹為裏著以穿履有帶與今之製者不同事類襪繫帶文王伐崇丨丨丨則其物色已見於商代實錄曰自三代有之謂之角襪前後相承中心繫帶炙榖子襪系絶武王罷朝丨丨丨左右無可使結者詳見後不敢解衛侯為靈臺于藉圃與諸大夫飲酒禇師聲子韈而登席公怒辭曰臣有疾異於人若見之君將觳之是以丨丨公愈怒大夫辭之不可禇師出公㦸其手曰必斷而足聞之禇師與司冠亥乗曰令日幸而後亡注古者見君解襪足有創侯丨丨丨韈左哀二十五年為我結張釋之以貲為散騎常侍事文帝十年不得調後為廷尉有王生者善黄老言常召居廷中王生曰韈解顧謂廷尉曰丨丨丨襪釋之乃跪而結之人言於王生獨奈何辱廷尉王生曰余老且賤自度無益於廷尉廷尉方今名臣余故使結襪欲以重之諸公聞之賢王生而重張廷尉焉本傳綾羅襪魏文帝呉妃乃裁縫丨丨紬絹為丨炙榖子錦袎襪妃子死之日馬嵬媪得丨丨丨一隻每遇過客一翫百錢前後獲錢無數太真外傳龍縞韈已卭人家橘園有兩大橘如三斗盎剖開每橘有二老叟皆相對象戯一叟曰我輸阿母女態盈娘子路虚龍縞襪八緉幽恠錄或韈而騎李石中人自邉還走馬入金光門道路妄言兵至百官丨丨丨丨白氏帖不襪而鞋五代唐臣李仁矩董璋置酒召仁矩仁矩辭醉不往於𫝊舍與娼妓飲璋怒率衙兵露刃之𫝊舍仁矩惶恐丨丨丨丨走廷中璋責之孔六帖常進履韈近古丨以冬至丨丨丨於舅姑崔浩女儀多製履襪見前履注詳如折韈線偽蜀吏部尚書韓昭多能而皆不精朝士李白云韓八座事業丨丨丨丨無一條長北夢鎖言穢韈塞口元載賜死主者以丨丨丨其丨而終劉禹錫嘉話陸龜蒙雜記傳曰武王罷朝而襪系絶左右無可使結者衛禇師呼聲子結韈而登席漢廷尉為王生者襪二有帶尚矣今獨亡古之制亡者十八九矣奚襪帶之足云詩集蕖艷羅襪紅丨丨杜甫千秋節有感詩雅頭履上足如霜不著丨丨襪李白凌波步盈盈漢水若可越可惜丨丨丨羅襪李白寄逺香塵動綠水不沾衣丨丨丨羅襪陳子昻感興詩白足傲呉風謝安屐丨丨丨履襪李白私手結不見岩畔人空見凌波襪郵墨愛蹤跡丨丨解槃結傳㸔千萬眼縷絶香不歇劉禹錫馬嵬行垢不襪丨膩脚丨丨杜甫北征詭製襪丨丨􅀈巾丨韓出畫裙鈿尺裁量咸四分纎纎玉笋裹輕雲五陵年少欺他醉笑把花前丨丨丨杜牧誅古今合璧事類備要外集卷四十
