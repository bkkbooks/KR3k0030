body:
  text: 古今合璧事類備要前集卷五十九宋謝維新撰冠禮門冠事類突弁婉兮孌兮總角丱兮未幾見兮丨而丨兮詩甫田元服令月吉日始加丨丨史嘉事冠者禮之始也丨丨之重也是故古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也冠義重禮古者冠禮筮日筮賔所以敬冠事敬冠事所以丨丨重禮所以為國本也同上備服凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顔色齊辭令順而後禮義備以正君臣親父子和長㓜君臣正父子親長㓜和而後禮義立故冠而後服備服備而容體正顔色齊辭令順故曰冠者禮之始也成人冠於阼以著代也醮於客位三加彌尊加有成也已冠而字之丨丨之道也見於母母拜之見於兄弟兄弟拜之成人而與為禮也𤣥冠𤣥端奠摰於君遂以摰見於卿大夫鄉先生以成人見也成人之者將責成人禮焉也責成人禮焉者將責為人子為人弟為人臣為人少者之禮行焉將責四者之行於人其禮可不重與並同上三加士禮始加緇布不忘本也次加皮弁朝服也丨丨爵弁祭服也不忘本然後能事君能事君然後能事神所謂三加彌尊喻其志者如是而已若諸侯則始緇有冠繢綏次加皮弁三加爵弁四加𤣥冕天子則始𤣥冠朱組纓次皮弁三爵弁四𤣥冕五衮冕矣禮書三祝始祝弃㓜志順成德再祝敬威儀慎爾德丨丨兄弟具成厥德以順成德然後慎德慎德然後能成德也同上筮日士冠禮筮於廟門主人𤣥冠朝服緇帶素鞸即位於門東西面有司如主人服即位於西方東面北上筮與席所卦者具饌於西塾布席於門中闑西閾外西面筮人執筴抽上韇音獨藏筮之器兼執之進受命於主人宰自右少退筮人許諾右還即席坐西面卦者在左卒筮書卦執以示主人主人受眡反之筮人還東面旅占卒進告吉若不吉則筮逺日如初儀注筮者以蓍問日吉凶於易也冠必筮日於廟門者重以成人之禮成子孫也廟謂禰廟親其親也禮儀朱文公冠禮云古禮筮日今不能然但正月内擇一日可也前朝三日主人告於祠堂主人謂冠者之祖父自為繼高祖之宗子者若非宗子則必繼高祖之宗子主之有故則命其次宗子若其父自主之告禮祝版云維年嵗月朔日子某敢昭告於皇某親某府君皇某親某封氏某之子某年漸長成將以某月某日加冠於其首謹以果酒用伸䖍告謹告家禮筮賔前期三日丨丨如求日之儀禮書文公冠禮云古禮筮賔今不能然但擇朋友賢而有禮者一人是日主人深衣詣其門所戒者出見如常儀啜茶畢戒者起言曰某有子某將加冠於其首願吾子之教之也對曰某不敏恐不能供事以病吾子敢辭戒者曰願吾子之終教之也對曰吾子童有命某不敢從地逺則書初請之辭為書遣子弟致之所戒者辭使者固請乃許而復書曰吾子有命某敢不從若宗子自冠則戒辭但曰某將加冠於首餘辭同前同上宿賔前一日遣子弟以書致辭曰來日某將加冠於子某若某親某子某之首吾子將蒞之敢宿答書則曰某敢不夙興宿贊冠者一人亦如之注佐賔為為冠事者賔自擇其子弟親戚習禮者為之設盥帨丨丨丨於㕔事如祠堂之儀以帟幕為房於㕔事之南北或㕔事無西階則以堊畫而分之後倣此並文公冠禮陳冠服厥明宿興丨丨丨有官者公服帶靴無官者襴衫帶靴通用皂衫深衣大帶履櫛􅔮掠皆以卓子陳於房中束領北上酒注盞盤亦以卓子陳於服北幞頭帽子冠并巾各以一盤盛之蒙以帕陳於西階下執事者一人守之長子則布席於阼階上之東少北面向衆子則少西南向宗子自冠則如長子之席少南主人以下盛服就位主人阼階下少東西向擇子弟親戚習禮者一人為儐立於門外迎賔贊賔與贊冠者俱盛服至門外東面立贊者在右少退儐者入告主人出門左西向再拜賔答拜主人揖贊者贊者報揖主人遂揖而行賔贊從之入門分庭而行揖遜而至階又揖遜而升主人由阼階先升少東西向賔由西階升少西東向贊者盥恱由西階升立於房中西向文公家禮加冠巾賔揖將冠者出房立於席右向席贊者取櫛􅔮掠置於席左興立於將冠者之左賔揖將冠者即席如其向跪進為之櫛合紒施掠乃降主人亦降賔盥畢主人揖升復出執事者以冠巾盤進賔降一降受冠笄執之正容徐詣將冠者前向之祝曰吉月令日始加元服棄爾㓜志順爾成德夀考維祺以介景福乃跪加之贊者以巾跪進賔受加之興復位揖冠者適房釋四䙆衫服深衣加大帶納履出房正容南面若宗子自冠則賔揖之就席賔降盥畢主人不降餘並同加帽子良久賔揖冠者即席跪執事者再以帽子盤進賔降二等受之執以詣冠者前祝之曰吉日令辰乃申爾服承爾威儀淑謹爾德眉夀萬年永受遐福乃跪受之興復位揖冠者適房釋深衣服口皂衫革帶繫鞋出房立力幞頭三丨丨丨公服革帶納靴執笏若襴衫納靴禮如再加惟執事者以幞頭盤進賔降沒階受之祝曰以嵗之正以月之令咸加爾服兄弟具在以成厥德黄耉無疆受天之慶贊者徹帽賔乃丨丨丨執事者受帽徹櫛入於房行醮禮醴醮儀側尊一甒醴在服北有篚實勺觶角柶醴匕也脯醢南上徹皮弁冠櫛筵入於户西南面贊者洗於房中則酌醴加柶覆之面葉賔揖冠者就筵筵西南面賔受醴於户東加柶面枋筵前北面冠者筵西拜受觶賔東面答拜薦脯醢冠者即筵坐左執觶右祭酬醢以柶祭醴三興筵未坐啐醴啐古文為呼嘗也建柶興降筵坐奠觶拜執觶興賔答拜冠者奠觶於薦東降筵北面坐取脯降自西階適東壁北面見于母若不醴則祭用酒酌而旡酬酢曰醮醴尚質旡酬酢酒本有酬酢故旡酬酢曰醮尊於房户之間兩甒有禁𤣥酒在西加勺南枋洗有篚在西南順始加醮用脯醢賔降取爵於篚啐降如初卒洗升酌冠者拜受賔答拜如初冠者升筵坐左執爵右祭酺醢祭酒興筵未坐啐酒降筵拜賔答拜冠者奠爵於薦東立於筵西徹薦爵筵尊不徹云云始醮酺醢再醮攝酒三醮有乾肉折俎嚌之若殺特豚載合升始醮如初再醮兩豆葵菹嬴醢兩籩栗酺三醮加俎嚌之如初嚌胏三醮一加一醮也醴用觶醮用爵醴尊之篚在房醮之篚在庭醴則贊者酌受賔不親酌故無升降醮則賔親酌酒洗爵故有升降冠不用醴則醮焉醴者太古之物故其禮簡所以示質酒者後世之味故其禮煩所以示文故適子用醴庶子用醮醴重而醮輕醴辭曰甘醴惟厚嘉薦令芳拜受祭之以定爾祥承天之休夀考不忘醮辭曰㫖酒既清嘉薦亶時始加元服兄弟具來孝友時格永乃保之再醮曰㫖酒既湑嘉薦伊脯乃申爾服禮儀有序祭此嘉爵承天之祜三醮曰㫖酒令芳籩豆有楚咸加爾服肴升折俎承天之慶受福無疆禮書文公冠儀云長子則儐者改席於堂中間少西面南向衆子則仍故席贊者酌酒於房中出房立於冠者之左賔揖冠者就席右南向乃取酒詣席前北向祝之冠者再拜升席南向受盞賔復位東向答拜冠者進席前跪祭酒禮書注祭謂取少許祭先世造此食者不忘本也興就席末跪啐酒興降席授贊者盞南向再拜賔東向答拜冠者遂拜贊賔贊者左東向少退答拜賔告字賔降階東向主人降階西向冠者降白西階少東南向賔字之曰禮儀既備令月吉日昭告爾字爰字孔嘉髦字攸宜宜之於嘏永受保之曰伯某父仲叔季唯所當冠者對曰某雖不敏敢不夙夜祇奉並文公家禮請醴賔既字賔出主人送於廟門外丨丨丨賔禮辭許賔就次禮書告祠堂主人以冠者見於祠堂乃立香卓前告曰某之子某今日冠畢敢見冠者進於兩楹間再拜主人乃降復位文公家禮拜尊長父母堂中南面坐諸叔父兄在東序諸叔父南向諸兄西向諸婦女在西序諸叔母姑南向諸姊嫂東向冠者北向拜父母父母為之起同居有尊長則父母以冠者詣其室丨之丨丨為之起還就東西序每列再拜應答拜者答拜若非宗子之子則先見宗子及諸尊於父者於堂乃就私室見父母及餘親若宗子自冠有母則見於母如儀族人宗之者皆來見於堂上宗子西向拜其尊長毎列再拜受卑㓜者拜醴賔贊既冠乃丨丨以一獻之禮酬賔束帛儷皮丨者皆與贊冠者為介賔出主人送於外門外再拜歸賔俎禮書文公冠禮云主人以酒饌延賔及儐贊者酬之以幣而拜謝之幣多少隨宜賔贊有差見執友冠者遂出丨於鄉先生及父之丨丨冠者拜先生執友皆答拜若有誨之則對如對賔之辭且拜之先生執友不答拜並文公家禮十九而冠天子諸侯丨丨丨丨冠而聽治其教至也茍子十二而冠二十而冠士禮也天子諸侯丨丨丨丨春秋傳曰十二年謂一終一星終也國君十五而生子冠而生子禮也文王十三生伯邑考成王十五而弁則十二而冠可知禮書笄許嫁女子丨丨笄年十五未許嫁亦笄母為主文公家禮戒賔前期三日丨丨一日宿賔亦擇親姻婦女之賢而有禮者為之以牋紙書其辭使人致之辭如冠禮布席陳設如冠禮但於中堂丨丨如衆子之位陳服厥明丨丨用背於冠笄如冠禮主婦以下序立迎賔賔至主婦迎入升堂如冠禮但不用贊者主婦升自阼階加冠賔謂將笄者丨丨笄適房服背子畧如冠禮但祝用如加之辭不能者則省乃醮如冠禮辭亦同乃字如冠禮但改祝辭髦士為女士禮賔皆如冠儀並文公家禮古今合璧事類備要前集卷五十九
