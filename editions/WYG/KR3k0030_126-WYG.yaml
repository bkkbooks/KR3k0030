body:
  text: 古今合璧事類備要後集卷五十七宋謝維新撰閣學門總學士直學士歴代㳂革國朝庶官之外别加職名所以厲行義文學之士髙以備顧問其次與論議典校讎得之為榮選擇尤精元豐中修三省寺監之制其職並罷滿嵗補外然後加恩兼職直龍圖閣省郎寺監長貳補外或領監司帥臣則除之待制雜學士給諌以上補外則除之係一時恩㫖非有必得之理劉忠肅公奏議元祐二年詔増復館職及職事官並許帶職尚書二年加直學士中丞侍郎給舎諫議通及一年加待制石林燕語是時劉忘肅大摰上曰待制學士以侍從顧問為職自祖宗以來極天下之選不為定員今不考治行不察流品幸而給諫以上則計日而得之乞依元豐官制施行王巖叟亦進十不可之説以為待制祖宗之時其選最待出入朝廷讒一二人今立法無定員將一年待制滿朝必有車載斗量之謡朝廷不以為然紹聖二年詔職事官罷帶職非職事官仍舊續㑹要事類西班宣和三年詔丨丨學士待制員多令中書省具名取㫖以班圖觀之學士待制班在西故曰西班續㑹要極選劉摯上言待制學士以侍從顧問為職自祖宗以來丨天下之丨同上寶儲内閣丨丨促上邃嚴之直夲朝牋表邇聨内閣丨丨同上延閣再濟丨丨之榮同上總待制餘並各見每閣條下歴代㳂革唐永徽中命𢎞文館學士一人日待制於武徳殿西門文明元年詔京官五品以上清官日一人待制于章善明福門先天末又命朝集使六品以上二人隨仗待制永泰時勲臣罷節制無職事皆待制于集賢門凡十三人崔祐甫為相建議文官一品以上更待制其後著著令正待制官日二人唐職林永泰元年敕裴冕等並集賢待制此始有待制之所然則葢唐設官也國朝景徳元年置龍圖閤待制以杜鎬戚綸充並依舊充職祥符二年詔班視知制誥列其下元祐令從四品掌侍從備顧問有所獻納則請到或奏封續㑹要事類入閤開成元年勑自今已後毎遇丨丨日次對官未要隨班出並於東堦松樹下立待宰相奏事退令齊至香案前各奏本司公事左右史待次對官奏事訖同出續通典餐錢永泰初詔裴冕十三人同於集賢院待制特給丨丨以優其禮次對宣宗大中三年勑待制官宜令與刑法官次對候對後唐長興二年勑朔望入閤待制丨丨一依舊規五代㑹要清官開元中每日以六品以上丨丨兩人待制於衙内唐職林文儒代宗永泰中勲臣罷節制無職事乃令待制於禁門書院間以丨丨公卿寵之備顧問唐徳宗建中初自文官六品以上清望官毎日二人更置待制以丨丨丨仍以延英南藥院故地為廨咨時政大和元年五月淮南節度檢校司徒平章事王播入見召對於延英殿又召待制官崔郾工部侍郎獨孤朗同對一刻時待制官虗設其名未曽引覿及此屢召丨以丨丨焉續通典創自先天延英待制丨丨丨丨晏類要日於武徳紀元云永徽中詔許敬宗毎丨待制丨丨丨殿此始有待制之名延英候對憲宗元和九年因武元衡奏正衙待制官詔於丨丨丨丨文班輪充周顯徳中詔待制候對官於丨丨内丨丨五代史極天下選學士待制自祖宗以來丨丨丨之丨不為定員今不考治行不察流品幸而給諫以上則計日而得之劉忠肅公奏議置在朝聨朕選通經術有行義之士訪對制閣參掌秘圖丨丨内丨之丨本惟儒者之職胡文恭張昇充天章閣待制非口舌任范仲淹徙蘇州為天章閣待制還朝言事愈亟宰相使人喻之曰待制官丨丨丨丨也仲淹曰論思侍臣職也余敢不勉龍圖閣附學士直學士待制歴代㳂革龍圖閣國朝大中祥符中建龍圖閣在㑹慶殿西偏北連禁中閣東曰資政殿西曰述古殿閣上以奉太宗御書御製文集及典籍圖畫寶瑞之物㑹要及宗正寺所進属籍世譜四朝志有學士直學士待制直閣學士大中祥符三年置以杜鎬為之班在樞密直學士之上六年詔結銜在本官之上㑹要直學士景徳四年置以杜鎬為之班在樞密直學士之下祥符六年詔結銜在本官之上㑹要待制景徳元年置以杜鎬戚綸為之並依舊充職四年詔班在知制誥之下並赴内殿起居㑹要自改官制為學士初復之職或知制誥平出除之官制舊典事類西清元祐中蘇轍奏祖宗御集皆於丨丨建重屋號龍圖天章寳文閣以藏其書為不朽計祕閣用進丨丨之拜胡文恭行歐陽脩制學士老龍蔣樞密之竒為淮漕求字於徐守信徐書龍字而闕三點蔣曰何書之不全也曰它日當為足此是歳寒計稱㫖除龍圖閣直學士及回持前字見徐徐索筆為作三龍未幾遂進丨丨奎象中禁寳儲上應丨璧之丨先朝謨訓逺同河洛之符東坡謝表内閣丨丨深嚴同上淵圖丨丨祕職蔡襄行歐陽公制凝嚴之職見寳文學士門羲圖之序仍進丨丨丨丨賜鄭溫伯辭龍圖學士詔豈如一言孔道輔論廢后事天下聳聞其風采近臣獻詩十首執政請以為龍圖學士上曰千首詩丨丨孔道輔丨丨拜龍圖閣冠於五閣河圖遂在西清朝位丨丨丨丨初寮除龎寅􅂇制龍圖老子范文正公仲淹以龍圖直學士帥邠延涇慶四路威徳著聞夷夏竦服熟戸蕃部率稱曰丨丨丨丨中朝人士亦以此呼之言行錄學士奉祠淳熙中林安宅以丨丨丨丨書閣之拜丨丨丨丨衆以為宜東坡集直學士貴班延閣祕藏學士丨丨淇水除李承之制峻列河圖寵名増丨班丨曲阜行李南仲辭免不允詔凝嚴丨丨之職見寶文學士制清近知鄧州陳堯咨㑹赦當復龍圖閣直學士真宗曰學士清近之職非㑹赦可復祥符八年赴内殿起居景徳四年八月以龍圖閣待制杜鎬為龍圖閣直學士班在樞密直學士之下待制知制誥之上並丨丨丨丨丨至閣下撫慰真宗尤禮杜鎬上開樽酒親封題以賜鎬素不飲飲之疾作上親丨丨丨手調藥丨丨令安卧乃歸同上待制美職河圖丨丨曲阜龍圖待制徐鐸制近綴改河圖之丨丨同上除錢待制並命戚綸字仲言時初創待制與杜鎬丨丨物論榮之廣内河圖丨丨之職曲阜除傅堯俞制延閣侍從丨丨丨丨之職行張商英制内閣應對丨丨丨丨之職行王覿制學士初復之職見前㳂革詩集羣玉先朝丨丨殿冠珮環羣公神文煥王度喜色見天容御榻誰復登帝書元自公緬懷弁服士酬獻鳴瑽瑢陳后山觀文忠公六一圖書詩紫薇冊府藏書在丨丨退朝稽古助論思楊億詩開䇿府羣玉天中丨丨丨神龜溫洛薦圖書楊億龍圖閣觀御書黄閣老龍閣便為丨丨丨周益公賀胡邦衡除龍圖學士天章閣附學士直學士待制歴代㳂革國朝天禧四年初建天章閣在㑹慶殿之西龍圖閣之北明年仁宗即位修天章閣工畢奏真宗御製安於天章閣東曰羣玉殿西曰蘂珠殿北曰夀昌殿南曰延康殿内以桃花文石為柸之所以在位受天書祥符改曰天章取為章于天之義天聖八年置待制慶㦄七年又置學士直學士㑹要周益公宏詞編題又有侍講學士慶厯七年初置在龍圖閣學士之下詔曰欽惟聖考濬𤼵宸文百篇森布於寳函三襲肇興於華閣肆予纂紹之始務闡師儒之隆遂延勸講之臣欽佇論思之益掩玉府藏書之盛延金門待詔之才宜令廣侍從之員抑亦副遹追之念特置天章閣學士直學士學士罕以命人迄仁宗世纔王摯一人官制舊典云天章閣只除待制不除學士難稱呼也直學士慶厯七年初置天章閣直學士在龍圖閣直學士之下㑹要待制天聖八年初置寓直於祕閣與龍圖逓宿尋命范諷鞠詠充職職官分紀詔曰真宗皇帝躬上哲之資據大寜之㑹受翠媯之瑞籙𤼵谷口之璿源勒銘喬封奠圭方澤烜赫景炎丕隆寳構凡經禮樂之制纘成辰象之篇爰即禁圖肇新層閣榜以天章之號煥乎䇿府之華宜擇推才俾參近著可特置天章閣待制位龍圖閣待制之下㑹要詔俯近危楹創崇層宇榜以天章之美冠於䇿府之名宜建官聨並寘材彦事類西清見龍圖閣䇿府見待制㳂革學士不除見㳂革注難呼同上玉府藏書見㳂革詔金門待詔同上凝嚴之職見寳文閣學士待制西序進職丨丨曲阜行黄履天章閣待制云内閣進聨丨丨王岐公除許亢制禁途延對丨丨王岐公除張友直制延閣丨丨侍從之邃曲阜行范純禮復天章閣待制識大體髙若納言古者三公坐而論道今二府對纔數刻安能盡萬機宜賜坐從容如唐延英故事上以兹言丨丨丨擢拜天章閣待制待碩儒萃帝文於寶締以丨丨丨王岐公除張友直制建官之署天聖八年詔煥乎堯言星羅而雲布繳如禹律玉振而金相雖敦稽古之風未立丨丨丨丨詩集鳴玉峩峩天中閣丨丨改新步王荆公送元待制知福州寶文閣附學士直學士待制歴代㳂革國朝寳文閣在天章閣之東西序羣玉蘂珠殿之北即舊日夀昌閣慶厯改曰寳文嘉祐八年英宗即位詔以仁宗御書御集藏于寳文閣命王珪撰記立名治平四年神宗即位始置學士直學士待制恩賜依龍圖英宗御書附于閣㑹要宏詞編題學士治平四年初置以吕公著兼詔曰昔我祖宗咸有制作煥于簡編河漢昭回奎璧相映乃規層宇遂在西清憲上帝藏書之府彰累朝稽古之盛並揭嘉名以登峻望俾服凝嚴之職因為咨訪之地寳文閣宜置學士直學士待制直學士治平四年初置以邵必為以邵必為之㑹要職畧待制治平四年初置事類西清見龍圖閣門帝府見學士詔鈿軸寶函丨丨丨丨未終繙綠白雲紫氣丨丨丨丨遽遂上賓並同上學士在西清乃規層閣邃丨丨詳見㳂革注夢邃殿治平三年予為知制誥夏六月丨丞相遣朱衣吏召命草某人為丨清丨學士制明年五月丞相遣朱衣吏召當制舎人吕縉叔除邵不疑為寳文閣學士後數日得承㫖張公所作詔云乃規層構䆳在西清記去嵗之夢與詔文相合若符契焉春明退朝錄大訓九歌治平置學士等詔云丨丨丨丨之重垂世其長廣内秘室丨丨丨丨之藏詒謀无極同上直學士嚴職凝丨之丨見前近班西清丨丨曲阜吕嘉問制奎文丨丨寳訓入直禁嚴東坡答李寳文啓寶直丨奎之丨表類待制魁甲章衡知澶州神宗曰卿為仁宗朝丨丨寳文藏御集之處未始除人今處卿禁途延閣丨丨曲阜王汾制近職延閣丨丨范純粹制通籍丨丨延閣同上除王欽若制侍從之班延閣丨丨丨丨除李之純制儒學之選三聖圖書萃在延閣丨丨丨士列職其中諷議討論維時妙選除蒋之竒制並同上顯謨閣附學士直學士待制歴代㳂革國朝元符元年曽布鄧洵仁各申請建閣詔翰林學士中書舎人撰閣名五以聞續建閣藏神宗御集以顯謨為名神宗大新政事故以丕顯文王謨徽宗建中靖國元年詔以顯謨閣為熙明閣仍置學士直學士待制詔畧曰神宗皇帝言則為文昭如雲漢寳之垂世炳若丹青仙馭升遐泰陵繼序乃眷祖宗之舊悉藏金玉之編邃在西清並崇華宇爰咨邇列俾訪遺文鈿軸未終雲軿忽逺肆冲人之纂紹惟徃憲之欽承用揭嘉名乃延俊望詒謀有逺豈徒琬琰之並陳與天无窮是惟奎璧之相照宜以顯謨為熙明閣續奉旨仍以顯謨為額此據周益公宏詞編題而續㑹要云復顯謨舊名年月无考按次年已詔顯謨閣學士直學士如三閣故事復名顯謨恐在此年崇寜元年詔顯謨閣學士直學士待制如三閣故事序位在寶文閣學士直學士待制之下三年又詔以熙寜元豐功臣圖形於顯謨閣續㑹要詔畧曰神宗御集㧾九千八百餘篇藏于禁閣揭以顯謨所以丕昭聖作也維時功臣宜列于此其熙寜元豐功臣圖形於顯謨閣文學士建中靖國元年置詔如三閣故事序位在寳閣學士之下續㑹要士直學士建中靖國元年置詔序位在寶文閣直學之下續㑹要待制建中靖國元年置詔序位在寳文閣待制之下同上事類熙明見㳂革邃清見㳂革詔注禁閣神宗御集緫九千八百餘篇藏于丨丨揭以顯謨所以丕昭聖作也圖功臣詔寳宇仰瞻丨丨崇寜圖畫功臣顯謨閣詔金玉之編乃眷祖宗之舊悉藏丨丨丨丨邃在西清並崇華宇爰咨邇列俾訪遺文改熙明閣詔奎璧之照詒謀有逺豈徒琬琰之並陳與天無窮是惟丨丨丨相丨同上徽猷閣附學士直學士待制歴代㳂革國朝大觀二年初建徽猷閣以藏哲宗御集置學士直學士待制詔畧曰祖宗述作皆有寳藏之所參列廣内揭為嘉名世擇儒臣以資訪納今将祗率成憲名以出信不可无所考也在詩有之君子有徽猷是唯詢徳之美而觀道之成其哲宗御集建閣以徽猷為名並見續㑹要學士大觀二年詔置待直學士大觀二年初置制大觀二年初置事類寶藏皆有丨丨之所嘉名揭以丨丨擇儒咨訪世丨丨臣以丨丨納詢徳觀道並見㳂革詔學士西清之秩峻丨丨丨丨龍溪除詹乂制直學士榮名顧已班於次對且就進於丨丨謂自待制而升直學士崇資徽閣西清之丨丨湖山吳芾辭免制待制聨榮次對西清實丨丨於法從初寮除陳彦修制陞班丨甘泉法從之丨龍溪除胡舜陟制敷文閣附學士直學士待制歴代㳂革國朝紹興十年置實錄院檢討朱翌申請乞建閣以藏徽宗聖製詔閣以敷文為名中興㑹要詔畧曰徽宗宸章奎畫與詩書相表裏置閣學士直學士待制等官職畧又中興㑹要詔畧曰徽宗宸章奎畫煥乎若三辰之文麗天垂光賁飾羣物殆與詩書相表裏崇建層閣以嚴寳藏恭以敷文為名宜置學士直學士待制直閣以次列職備西清之咨訪為儒學之華寵其著于令學士直學士待制並紹興十年置事類奎畫宸章丨丨與詩書相表裏寳藏崇建層閣以嚴丨丨並紹興詔學士咨訪見㳂革詔華寵直學士奎文之直内閣寶儲學士最為髙選云云進丨丨丨丨湖山吳芾辭免敷文直學士奏狀延閣之華丨丨丨丨班聨愈峻同上煥章閣附學士直學士待制歴代㳂革國朝淳熙間建藏髙宗御製詔畧曰載稽帝世之隆无若堯章之煥因揭名於層宇仍列職於清廂制學士十直學士並淳熙十瑞五年詔置待淳熙五年置初除劉國事類堯章見官制邃閣堯章丨丨淳熙批答學士列職清廂見㳂革詔華文閣附學士直學士待制歴代㳂革國朝慶元二年置藏孝宗御製詔曰朕惟孝宗皇帝睿闡聖圖粹昭王度經緯天地道存灝噩之書鼓舞風雷仁盪溫縕之命寫之琬琰炳若丹青太微三光之庭丕闡巢之勢上帝羣玉之府邃通龍紀之聨寳典謨訓誥之垂黻禮樂刑政之用華協堯章之煥文光舜哲之明典輯鴻徽禮嚴燕翼以華文為名置學士直學士待制直閣式遵形獻寵陟儒英庸飭攸司其刋諸令學士直學士待制並慶元二年詔置事類媯閣慶元批答儒英寵陟丨丨學士穹班陞媯閣之穹班慶元批答華閣丨丨増學士之寵同上寶謨閣附學士直學士待制歴代㳂革國朝嘉泰二年八月置以藏光宗御製學士直學士待制並嘉泰二年置寶章閣附學士直學士待制歴代㳂革國朝寳慶二年詔置藏寜宗御製學士直學士待制並同上古今合璧事類備要後集卷五十七
