body:
  text: 古今合璧事類備要别集卷三十二宋謝維新撰花卉門瑞香花格物總論瑞香花樹髙者三四尺許枝幹婆娑葉厚深緑色數種有楊梅葉者有枇杷葉者有柯葉者有毬子者有欒枝者花紫色如丁香惟欒枝者香烈枇杷葉者能結子性喜温潤本朝始著名它有黄白二色特野瑞香無取也事類出廬山其始丨於丨丨之中廬山記見成都成都志瑞香芳草也其木髙纔數尺生山坡間花如丁香而有黄紫二種冬春之交其花始發植之庭檻則芳馥出於户外野人不以為貴宋景文亦闕而不載予令舂城後二十年守成都公庭僧圃靡不有也予恐其沒於草一日見知於時殆與人事無異載而圖之為之序吕太防瑞香圖序號殊友曽端伯十友調笑令取友於十花殊友瑞香也云云仍有玉友來奉嘉賔酒也詞話吕大防圖序見前詩集香濃得地秋根逺交柯繞指柔露丨丨結桂池影闘蟠虬黛葉輕雲緑金花笑菊秋如何南海外萬里隔炎洲錢起色淺幽香結淺紫來自孤雲岑骨香不自知丨丨意殊深移㘽青蓮宇遂冠薝蔔林結為楚臣佩散落天女襟君持風霜節耳吟歌笑音一逢蘭蕙質稍回鐡石心云云綵雲知易散鶗鴂憂先吟明朝便陳吟試着丹青臨坡玉英丨丨金實碧淋枝陶弼寳熏著葉團青盖開花炷丨丨韓子蒼曬轉香紫䄂染難透瓊膚丨丨丨楊萬里名始聞真是花中瑞本一朝丨丨丨江南夣後天下遇清芬梅溪香中瑞外着明霞綺中裁淡玉紗森森千萬笋旋旋兩三花小霽迎風喜輕寒索幙遮丨丨真上瑞蘭麝敢名家楊廷秀瘦中肥短短熏籠小團團錦帊圍浮陽烘酒思沉水着人衣茉莉通家逺椒花具體㣲春愁渾瘦盡别有丨丨丨同前移翠斛夜掇香窠沐露華晝丨丨丨馥窓紗將身扶起簾帷看生拍簾帷挨着花楊誠齋蹙紫羅玲瓏巧丨丨丨裳令得東君着意粧帶露欲開宜曉日臨風㣲困怯春霜發揮名字來廬阜彈壓芳菲入醉鄉最是午窓初睡醒重重贏得夣魂香朱淑真白瑞香繁花簇粉丨丨丨丨烘晴日藹有濃香透煖風六曲欄干凝睇處錦龍爭似玉為龍百氏集樂府更纎穠公子眼花亂發老人鼻觀先通領巾飄下瑞香風驚起謪仙春夣后土祠中玉蘂蓬萊殿後鞓紅此花清艶丨丨丨把酒何人心動西江月坡推第一臘後春來别一般梅花枮淡水仙寒翠雲裘着紫霞冠小妙二只今丨丨丨實香元不是人間為君更酌龍團浣沙溪張于湖菖蒲花格物總論菖蒲花水中叢生根長四五尺多節葉長如劒様二三月結花花黄長二三寸粟穗相似但小耳雖㣲草亦不可不知也事類食之長年菖蒲放花人得丨丨丨丨風俗通見者當貴梁太祖后張氏甞於室内忽見庭前菖蒲香光彩照灼非世中所有后驚視謂侍者曰汝見不曰不見后甞聞丨丨丨富丨因取吞之是月産梁武帝盆中九花蘇子由丨丨石菖蒲忽生丨丨坡文詩集芳心春荑秋莢兩湏臾神藥人間果有旡旡鼻何由識薝蔔有花今始信菖蒲丨丨未飽兩蝴蝶寒意知鳴㡬蟪蛅記取明年十二節小兒休更籋霜鬚坡丈薝蔔花格物總論薝蔔花一名梔子花樹髙二三尺葉厚深綠如兎耳或似栁而短凡草木花皆五出惟此花六出色白中心黄春末抽㽔夏初結花又一種樹髙五六尺許花葉皆差大謝靈運目為林蘭因筆併及之事類聞香如入薝蔔林中丨薝蔔丨不聞他香佛書占氣望氣丨人家黄丨者梔子樹也境地圖樓石山丨丨丨多梔子名山志梔茜園漢有丨丨丨説丈曰茅蒐可以染緋漢書華林園晋有丨丨丨種梔子晉書諸宫守護晉令丨丨有秋梔子丨丨者置吏一員同上百官與賞蜀有紅梔花其形六出孟知祥召丨丨於芳林園賞之萬花谷端伯取友曽丨丨十友調笑令丨丨於十花禪友薝蔔也云云仍有玉友來奉嘉賔酒也詞話謝靈運賦林蘭近雪而揚徛注林蘭梔子也詩集雪封枝素華偏可喜的的半臨池疑為霜裹葉復類丨丨丨日斜光隱見風還影合離梁簡文帝瓊倚樹色疑丨丨丨香似玉京來劉夢得發香來有美當階木霜露未能移金蕡丨丨丨映日以離離幸頼夕陽下餘景及西枝還思照綠水君堦無曲墀餘榮未能已晩實猶見竒復畱湏筐德君恩信未貲謝眺與木異林蘭擅孤芳性丨凡木丨不受雪霜侵自足巾和氣欲知清淨身即此林間是曾文昭道氣和梔子比衆木人間誠未多於身色有用與丨丨俱和紅取風霜實青看雨露柯無情移得汝貴在映江波杜艶色殊梔子丨丨丨杜豐榮未絶濯雨時摛素當飈獨含芳丨丨殊丨丨銷落竟誰聞宋顔彦良苦異宜舉世多植蘖而我學種梔顔色固不别丨丨誠丨丨團團綠階側豈畏秋風吹同心誰可贈為詠昔人詩梅聖俞老枝樛屈何處飛來薝蔔林丨丨丨丨更蕭槮凄凉杜老江頭坐坐對行吟得自箴朱文公十葉重臺一花分六出丨丨是丨丨玉潔渾無玷金黄謾奪胎北􅰃禪友何時到丨丨丨丨丨逺從毗舍園妙香通鼻觀應悟佛根源王梅谿樂府鼻觀深參透毗舍遥遥異香一炷馳名久妙香稀有丨丨丨丨丨問訊東來知誰先後稱仙友十花為偶近有江西守㸃絳唇梅谿冷淡不求知花解笑丨丨丨丨丨長是殿衆芳時鮮鮮香頸磋圓玉洛陽翠佩剪琉璃向人間迎茉莉送荼䕷幾欲把清香換春色費多少黄金酬不得梅雨妒麥風欺細腰空戀當時蘂同心猶結舊年枝謝家娘將逺寄待憑誰最髙樓馬古洲山礬花格物總論山礬花俗名椗花木高數尺枝肥葉宻凌冬不凋花白未開時木犀相似及開差大香氣穠郁號七里香尋常山林間多有之又有千葉者事類採染紫色江南野中有一種小白花高數尺春開極香野人謂之椗花王荆公甞欲作詩而陋其名予請名曰山礬野人採椗花葉似染紫不借礬而成色故名補陀落伽海岸孤絶處丨丨丨丨山譯者謂白小花疑即此花爾不然何以觀音老人端坐不去邪並山谷山礬花詩序山谷山礬詩序見前詩集愛着幽香北嶺山礬取意開輕風正用此時來生平習氣難料理丨丨丨丨未擬回山谷獨倚春風高節亭邊竹已空山礬丨自丨丨丨二三名士開顔笑把斷山光水不通前人擎出白婆娑春氷薄壓枝柯倒分與清香是月娥忽似雪天深澗底老松丨丨丨丨丨王元之樂府繁花白雪香細葉黄金嫩丨丨丨丨丨共誰連璧向河陽自是不湏湯餅試何郎婀娜􅋛瓏髻輕盈淡薄粧莫令韓夀在伊傍便逐逰蜂驚蝶過東墻南柯子章耐齋古今合璧事類備要别集卷三十二
