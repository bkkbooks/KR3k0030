body:
  text: 古今合璧事類備要續集卷十二宋謝維新撰類姓門孔魯國角音古今姓纂子姓殷王帝乙長子微子啓受封於宋弟微仲衍曽孫愍公生弗父何生宋父周生世父勝生正考父生孔父加子孫以王父字為氏孔父生子火金金生睪夷父父生防叔仕魯為大夫生相夏夏生鄒紇紇生丘字仲尼三嵗父卒年十九娶宋亓官氏一嵗生鯉字伯魚孔子為魯司冦攝相事居鄒邑平郷闕里魯哀公十六年卒年七十二伯魚年五十先仲尼卒伯魚生伋字子思為魯穆公師作中庸及子思子四十七篇以祖業授弟子孟軻等伋生子上白白生子家求求生箕箕生穿穿生謙謙生鮒以弟子襄為嗣值秦難藏其家書于屋壁襄生忠忠生武武生延年及安國延年生霸號褒成君霸生福福生房房生均封褒成侯王莽敗失國世子復封均子志為褒成侯志生損襲爵徙封褒亭侯損卒子皠嗣皠卒子元嗣无子以弟之子羡襲爵魏時封宗聖侯羡生震晉時徙封奉聖亭侯震生嶷嶷生撫撫生榖榖生鮮宋時襲封奉聖侯鮮生乘後魏封為崇聖大夫乘生靈珍靈珍襲爵改封崇聖侯靈珍生文泰文泰生渠北齊改封恭聖侯後周追封孔子為鄒國公以渠襲封渠生長孫隋封長孫為鄒國公長孫生嗣哲改封紹聖侯嗣哲生徳倫唐封褒聖侯徳倫生崇基襲崇基生璲之明皇詔追謚孔子為文宣王改封褒聖侯璲之襲文宣公璲之生萱襲封萱生齊卿齊卿生惟防惟防生榮自璲之至榮五世並襲封文宣公榮生振振生昭儉自榮至昭儉三世嵗給封絹以供禮享昭儉生光嗣光嗣生仁玉後唐時襲文宣公至周時為曲阜令宜仁玉子也乾徳中至闕上書述其家世詔以為曲阜簿襲封文宣公未幾通判宻州太宗北征受詔督軍糧渉巨馬河溺死年四十六子延世字茂先以父死為曲阜簿改曲阜令襲封文宣公詔轉運使兖州長吏待以賔禮卒年三十八延世子聖佑真宗東封泰山幸曲阜謁孔子廟行酌獻之禮又幸孔林觀其墓加謚孔子為至聖文宣王追封孔子父叔梁紇齊國公母顔氏魯國夫人妻亓官氏鄆國夫人擢聖佑為奉禮郎襲封文宣公至仙源縣後改名佑佑卒以宗愿襲封知仙源縣宗原距孔子四十七世矣仁宗封孔子後為衍聖公哲宗又改為奉聖公徽宗時復以為衍聖公云南渡後徙居三衢今為五十三世孫襲封衍聖公皇上淳祐臨雍詔孔氏之後得有名應得者特畀以官令顯于朝事類有達人孟僖子曰吾聞將有達者曰孔丘其祖弗公何以有宋而授厲公及正考父佐戴武宣三命玆益恭故其鼎銘曰一命而僂再命而傴三命而俯其恭也如是臧孫紇有言聖人有明徳者若不當世其後必丨丨丨今其將在孔丘乎因起家前漢孔安國孔氏有古文尚書安國以今文字讀之丨以丨其丨賜靈壽杖前孔光字子夏丨丨丨丨歸老于第凡為御史大夫丞相各再居公輔位前後七十年拜蘭臺令後魯國孔僖涿郡崔駰同遊太學相與論孝武皇帝始為天子崇信聖道後恣已忘前善鄰房生梁郁上書告駰僖誹謗先帝刺譏當世事下有司駰詣吏受訊僖以書自訟曰凡言誹謗者謂無此事而虚加誣之也至如孝武皇帝政之美惡顯在漢史坦如日月是為直說書𫝊實事非虚謗也書奏帝詔勿問丨僖丨丨丨力行清潔後孔奮字君魚守姑藏長丨丨丨丨為衆所笑以為身處脂膏不能自潤被徵吏民羌胡賦歛牛馬器物追送之無所受累世通家孔融字文舉十嵗見李膺語門者曰我是李君通家子弟膺問之融曰先君孔子與君先人李老君同徳比義而相師友則融與君丨丨丨丨為北海相一介之善莫不加禮坐上客常滿樽中酒不空薦達賢士多所奬進海内英俊皆信服之印龜左顧晉孔愉字敬康會稽人封餘不亭侯嘗行經餘不亭見籠龜買放溪中龜中流左顧者三四及鑄侯印而丨丨丨丨三四如初文思通敏晉孔沉字徳度何充薦於王道曰丨丨丨丨宜登宰門辟丞相司徒掾不就判決無壅南史孔凱字思逺琳之之孫除為長史不能曲意權幸醉日居多而明曉政事醒時丨丨未嘗有丨衆咸云孔公一月二十九日醉勝世人二十九日醒也蛙鳴鼓吹孔珪字徳璋門庭之内草萊不剪以丨丨當兩部丨丨座右止水孔若思越州人祖紹安與孫萬壽皆以文辭稱時謂孔若思以博學聞擢明經厯庫部郎中嘗曰仕宦至郎中至矣丨丨置丨丨一石明自足也製東都賦孔逭抗直有才藻丨丨丨丨于時才士稱之撰經正義唐孔穎逹字仲達冀州人以太子右庶子兼司業與顔師古丨五丨丨丨九百餘篇改為正義云子志終司業志子紹恵元又為司業三世司業時人美之負二宜去孔戣字君嚴穆宗立召為左丞以老自乞韓愈謂曰公尚壯上三留何去之果戣曰吾年一宜去吾為左丞不能進退郎官二宜去愈曰公无留資何恃而歸曰吾丨丨丨丨尚奚顧子言愈尚疏言戣守節清苦論議正平憂國忘家周意至到今求退陛下若不聼許亦无傷義而有貪賢之美不報以禮部尚書致仕嵗致羊酒如徴士禮笏碎蛇一郡驚本朝孔道輔字原魯初名延魯孔子四十五世孫舉進士為寜州推官道士治真武像有蛇穿其前郡將帥其屬仕奠拜之道輔持丨丨丨首而去丨丨皆丨使髙麗稱夫子孔維字為則開封雍邱人以九經及第為國子周易博士遷禮記博士丨丨丨王治問禮維以君臣父子之道升降等威之序為對治大悅謂人曰吾今日復見丨丨也文章兄弟齊名孔平仲字毅父舉進士皇朝以丨丨名世父子丨丨丨丨者甚衆若三蘇三劉三沈三孔則其章章尤著者也三孔乃文仲武仲平仲史學精工集句三孔丨丨尤丨丨於丨丨又有詩戯三公術業不同其大槩皆一世英豪曹譙國角音古今姓纂顓頊𤣥孫陸終第五子安為曹氏至曹挾周武王封之於邾為楚所滅遂復為曹氏周文王第十三子振鐸封曹亦為曹氏因宋所滅子孫以國為氏事類文昭左曹叔振鐸丨之丨也又郜雍曹滕文之丨也魯將國語曹沬魯人以勇力事莊公為丨丨齊魯㑹盟于柯沬執匕首刼齊桓公盡歸魯之侵地平陽侯漢曹參沛人髙祖初起參以中涓從至為丞相號曰丨丨丨齊賢相曹參為齊相使人厚幣請葢公葢公為言治道貴清静而民自定於是避正堂舍葢公其治用黄老術丨國安集大稱丨丨獄市勿擾曹參蕭何卒參告舍人趣治行吾將入相使者果召參參去屬其後相以齊丨丨為寄慎丨丨也守法勿失代何為相舉事無所變更一遵何約束飲醇酒不事事百姓歌之曰蕭何為法講若畫一曹參代之丨而丨丨載其清静民以寧止同上撰次漢禮後曹褒字叔通父充持慶氏禮為博士褒結髮傳父業舉孝亷遷圉令以禮理人以徳化俗丨丨丨丨為百五十篇吾家千里駒魏曹休字文烈太祖曰此丨丨丨丨丨一縣號聖君晉曹攄字顔逺少有孝行補臨淄令縱死囚歸家尅日而還丨丨歎服丨曰丨丨五子皆封侯曹真字子丹不恃親戚之寵不驕白屋之士丨丨丨丨列丨破魏進爵公曹景宗字子震梁武時為右衞將軍大丨丨軍於鍾離丨丨為丨譔桂苑叢珠隋曹憲公卿多從之游於小學家尤䆳自漢杜林衛宏以後古文亡絶至憲復興煬帝令與諸儒丨丨丨丨丨苑正文正又注廣雅學者推其該以文選傳授曹憲始丨梁昭明太子丨丨授諸生而李善相繼丨丨於是其學大興長氣質淳厚皇朝曹彬字國葉真定靈壽人父芸成徳軍兵馬使公始生周嵗父母以百翫羅於席令其所取彬左手持干戈右手取爼豆斯湏取一印人皆異之丨丨丨丨丨謂清介亷謹曹彬太祖以王全斌等貪縱不法屬吏而丨彬丨丨丨丨拜宣徽南院使義成軍節度使公辭曰伐蜀將士俱得罪臣以无功獨蒙褒寵恐無以勸天下又平蜀時諸將多子女玉帛彬槖中惟圖書衣衾而已克城不殺一人曹彬太祖伐江南以彬將行營之師進圍金陵李煜危甚城垂克彬忽稱疾不視事諸將皆來問疾彬曰余之病非藥石所愈惟須諸公誠心自誓以丨丨之日丨妄丨丨丨則自愈矣諸將許諾共焚香為誓明日稱愈遂克金陵城中皆按堵如故二子皆堪為將曹彬真宗即位同平章事召入為樞宻使咸平二年疾真宗親視臨問手為和藥仍賜以白金萬兩問以後事對曰臣無事可言臣丨丨璨與瑋材器有取臣若内舉丨丨丨丨真宗問以優劣對曰璨不如瑋安集勞來民夷曹光實字顯忠雅州百文人王全斌等平蜀既而群盜蜂起全斌以光實為黎雅州都巡檢使丨丨丨丨丨丨懐之召還太祖喜曰此蜀中之俊傑也遂以為黎州刺史割地死不敢聞曹利用字用之趙州人景徳初契丹南牧真宗親征渡河而斃其貴將撻覽有求和意利用適奏事真宗曰契丹如貪嵗幣乃細事或求地當理絶之利用曰虜若妄有所求臣不敢生還利用見虜果及關南之地利用曰若求金帛尚恐大臣議或不同丨丨之議丨丨丨丨虜度不可屈遂决和好之議嵗遺銀絹三十萬詔殿試賜進士曹組字元寵元象弟少游庠校有聲著鐡硯篇以自見宣和中徽宗皇帝親洒宸翰以賜曰曹組文章之字嘗命題作賦限一日投進援筆立就文不加㸃深得古風丨赴丨丨丨丨丨第錫予甚厚又子勛遭際建炎富貴四十年位至太尉客軒筆録號秋浦集曹緯字元象頴昌人元符三年擢進士第與劉壽无言瞿執柔劉正夫徳初在太學號四俊秦少游曰若置君詩於少陵集中誰曰不然正如李光弼提郭子儀兵當益精明耳有詩文丨曰丨丨丨嚴天水宫音古今姓纂芊姓楚莊王支孫以謚為姓楚有莊周漢武疆侯莊不識孫青翟丞相㑹稽莊忌夫子生助後漢莊光避明帝諱並改為嚴氏馮翊稱翟之後代居馮翊魏邰陽侯嚴稜又徙華隂事類屠伯前漢嚴廷年字次卿東海人少學法律舉侍御史朝廷肅焉敬憚遷河南太守務在摧折豪强扶助貧弱河南號曰丨丨嚴嫗嚴延年兄弟五人皆有吏材至大官東海號其母曰萬石丨丨厭承明嚴助會稽人嚴夫子忌之子也舉賢良對䇿百餘人武帝善助對擢為中大夫願為會稽太守於是拜為㑹稽太守丨丨丨之廬勞侍從之事懐故土出為郡吏願奉三年計最言世務嚴安臨蕃人丨丨丨上召見謂曰公安在何相見之晩也拜為郎中通經行道嚴彭祖字公子東海人顓門教授公羊春秋有嚴氏之學為太子太傅亷直不事權貴或曰君以不修小禮曲意亡貴人左右之助經誼雖髙不至宰相答曰凡丨丨固當修丨先王之丨何可委曲茍求富貴乎物色遣聘後漢嚴光字子陵㑹稽餘姚人與光武同遊學光武即位丨丨訪之後齊國上言有一男子披羊裘釣澤中帝遣使丨之三反而後至帝因共偃卧光以足加帝腹上明日太史奏客星犯御坐除諫議大夫不屈乃耕於富春山後人名其釣處為嚴陵瀨榜義行門南史嚴世期有司奏丨其門曰丨丨嚴氏之丨知吏部選唐嚴挺之名浚華州人知吏部選在省中讀代獵為伏獵因號為丨丨丨丨為蜀道難嚴武字季鷹挺之子始用房琯薦為給事中後琯以前宰相為巡内刺史武不為禮最厚杜甫前後欲殺甫數四李白丨丨丨丨者乃為房與杜危之也治行第一嚴震梓州人本農家子建中中劔南韋陟使韋楨狀震丨丨為山南丨丨乃賜上下考治鳳十四年號稱清嚴逺近咨美華武陵角音古今姓纂宋戴公子考父説食菜於華因氏焉華督華元華宣華亥並為宋卿事類右師左宋華元為丨丨元曰我為右師君臣之訓師所司也通經後華佗字元化通數丨曉養性之術精於方脉為秘府吳華覈字永先吳郡人以文學入為丨丨郎素清貧魏華歆字子魚魏初為御史大夫丨丨丨禄賜以振施親戚故人家無擔石之儲徧觀秘籍晉華嶠字叔駿才學深博少著令聞為臺郎徧觀秘籍因作漢紀相繼著作華恒中子徹少子暢丨丨為著丨佐郎踵成十典清貞履素華表字偉容遷