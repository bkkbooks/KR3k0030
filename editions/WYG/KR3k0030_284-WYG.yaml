body:
  text: 古今合璧事類備要别集巻七十八宋謝維新撰走獸門鹿附麋麕麞麂格物總論鹿黄質斑斑然白㸃性多驚烈能别良草常食名物諸毒不食處必山崗他獸多屬十二辰及八卦惟鹿不然䴥牡也麀牝也麛其子也至於所謂麋又鹿之絶有力者然鹿一千年為蒼鹿又百年化為白鹿又五百年化為𤣥鹿其屬有麃有麋有麞有麂有麠麠二角似麋牛尾麂大麕旌尾狗足麞即麕也麋冬至角解鹿夏至角解此為差異麃又鹿之大者又麂小於獐但口兩邊有長牙好鬬則用其牙皮為第一無出其右者然多牙傷痕四方皆有山深處則多其聲如擊破鈸事類牲牲瞻彼中林丨丨其鹿詩桑柔麌麌麀鹿丨丨詩吉日無虞即鹿丨丨惟入于林中易斯奔鹿丨之奔維足伎伎詩小弁乗鹿黄帝時西王母使丨白丨獻白環瑞圖與鹿舜居深山之中丨丨豕遊孟子鹿伏靈臺文王德及鳥獸昆蟲王在靈囿麀丨攸丨麀鹿濯濯詩鹿鳴鹿鳴燕羣臣嘉賔也呦呦丨丨食野之苹詩鋌走文十七年晉侯會諸侯于扈不見鄭伯鄭子家使執訊而與之書以告趙宣子曰云云今大國曰爾未逞吾志敝邑有亡無以加焉古人有言曰鹿死不擇音小國之事大國也德則其人也不德則其鹿也丨而丨險急何能擇左角掎戎子駒支對晉范宣子曰昔文公與秦伐鄭秦人竊與鄭盟而舍戍焉於是乎有殽之師晉禦其上戎亢其下秦師不復我諸戎實然譬如捕鹿晉人角之諸戎掎之與晉踣之戎何以不免左襄十四游姑蘇伍子胥諫吳王不用廼曰臣今見麋鹿丨丨丨之臺也漢伍被傳逐畆丘齊景公丨白鹿至丨丨見封人曰使吾君夀金玉是賤百姓是寶公曰善韓詩外傳遇駭鹿鄭人有薪於野者丨丨丨而斃之恐人見之也遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢列子詳見夢門致生鹿管子告楚人曰為我丨丨丨與子致百斤金鹿為馬趙髙指鹿示二世曰馬二世曰丞相誤取丨丨丨鹿乃龍蘓耽常乘丨過絶嶮之地皆能超越丨丨也白氏帖老子乘丨丨丨白鹿下託於李母崔𤣥山李母碑女子獲昔有丨丨採薇菜有所驚而走因丨得鹿其家遂昌熾後屈子天問曰驚女采薇鹿何祐鹿隨子孟孫獵得麑使秦西巴載之持歸其母隨之而歸秦西巴弗忍而與之孟孫大怒逐之居三月復召以為子傳曰夫不忍於麑又且忍吾子乎鹿愛子吳唐春日將兒出射獵遇麀鹿將麑唐射麑即死鹿母驚還悲鳴唐伏於草中致麑浄地鹿母復來唐又射其母應絃而倒至前塲又逢一鹿上弩將射忽箭發反激其子唐擲弩抱兒撫膺而哭聞空中呼曰吳唐丨之丨丨與汝何異唐驚聽不知所在宣騐記鹿為幣古者皮幣諸矦以聘享乃以白丨皮尺緣以藻繢丨丨直四十萬王侯朝覲享聘必以薦璧然後得行史鹿隨車鄭𢎞為臨淮太守行春有雨白丨馴而丨丨本傳七星符漢明帝永平九年七星鹿出江陵兩角間有道家丨丨丨其祖名字鄉里年月存焉遂斷射獵不為古今注二女紫襭淮南朱氏於田種豆忽見丨丨姿容甚美着丨丨襦衣裾天雨而衣不濡其臂先掛一銅鏡鏡中見二鹿以刃斫之搜神記一人黄衣陳郡謝鯤嘗在一亭中宿此亭從來殺人四更丨丨丨丨丨呼於門外鯤因令申臂於忩中於是鯤即極力掣之臂脫而去明日看乃鹿膊也尋血得鹿焉劉義幽明録馴遊墓側丁茂至孝有白鹿來丨丨於丨丨馴擾墓側羅威字德仁南海畨隅人母没盡哀墓側白鹿乃丨丨其側也皇甫逸士傳不取死鹿晉郭文有猛獸殺大鹿於文庵側文以語人人取賣之分錢於文文曰若須自當賣之所以相語正不爾聞者皆嘆白帖不食饋鹿裴休有饋鹿者諸生共薦之休丨丨曰蔬食猶不足今一啖肉後何以繼孔帖遇鹿臨澗陸紹弟為盧氏縣尉常觀獵忽丨丨五六頭丨丨見人不驚毛斑如畫獵者言此仙鹿也射之不能傷且復不利孔帖夢鹿渡水史思明夜驚據床叱咤優問故荅曰我丨羣丨丨丨鹿死而水乾云何俄而優共相謂曰胡命盡乎去鹿之河安禄山至鉅鹿欲止驚曰鹿吾名去之沙河我言如漢髙祖不宿闕人以佞賊懸膓注酒虢國夫人就屋梁丨鹿丨於半空筵宴使人於梁上丨丨於膓中結其端欲飲則解開流於盞中名洞天聖酒將軍酒中𤣥須肉為羮魏文忠武后曰卿累負謗鑠何邪對曰臣猶鹿也丨臣丨丨之丨爾彼欲誣臣以求進臣顧何辜本傳鹿若牛馬囘鶻斛薛處人豢丨丨丨丨惟食苔用以駕車鹿隨騶虞見騶虞門注蹄下銅鐶胡垧為號州時獵人殺得鹿重一百八十斤丨丨貫丨丨上有篆字博物者不能識雜爼毛中銅牌上嘗於芙蓉園中獲白鹿惟王闕視識之曰晉時鹿也上異之令左右周乃於角際雪丨丨得丨丨刻之曰宜春苑中白鹿上愈愛之津陽門詩因鹿名洞李渤與兄涉俱隱廬山嘗養一白鹿丨名其山曰白丨洞南唐昇元中建學館以李道為洞主掌其教以鹿為餉裴寛刺史韋詵沐日登樓見人於後圃有所瘞藏訪諸吏曰參軍裴寛居也問狀答曰寛恐人以苞苴汚家適有人丨丨丨丨者其人去不敢自欺故瘞之詵嗟異孔帖吕温由鹿賦貞元闕樊歲予南出穰之間遇野人縶鹿而至者問之答曰此為由鹿以此鹿以誘致羣鹿也備言其狀且曰此鹿每有所至輙鳴嘷不食者累日余喟然嘆曰虞之即鹿也必以其類致之人之即人也亦必以其友致之實繁有徒古之然矣嗟乎鹿無情而猶知痛傷人之與謀實安殘酷者彼何人斯彼何人斯物㣲感深遂作賦曰鹿之生兮亦禀亭毒備齒角而自牧姑有昧於行止尚焉知乎倚伏捨爾崇林輕遊近麓偶巧網之生致蒙主人之全育飲以深井飼於芳庭寢卧荃柔騰踔蘭馨露徃霜來日安月寧雖矯性之非樂終感恩而不驚曽不知養非玩物用有深意命之曰由彼䧟其類凉秋八月爽景清氣覊致山阿縻于蹊􅀈設伏以待翳叢而伺同氣相求誘之孔易將必慕侣豈云貪餌呦呦和鳴麌麌狎至彼泯慮於猜信此無情於誠偽用是倉卒禍生所忽毒鏑歘以星貫潜機劃其電發或洞胷而透腋或折足而碎骨望林巒而非逺顧町畽兮未滅風嘷澤而東至日掩山而西没走駭侣於巖烟呌饑麛於㵎月茍行路之或聞孰不心摧而思絶想爾由矣野心而仁望純束而驚顧隨獵車兮逡廵視鼎中之銷爛觀機上之剖分忽哀鳴而感類若痌瘝之在身雖復處之宻邇享以豐珍北檻猿之踆躍同海鳥之愁辛敢擇蔭而知止思走險以何因痛無知以相陷含怨毒而莫伸客有感而言曰物誠有諸人亦宜乎摭事或比原心則異借如淮陰構禍寃在神理通說且拒狶謀寧起堂堂蕭公實稱知己紿致鍾室胡寧忍此禄産之難誰非漢臣交則不義賣則不仁彼美酈生既為交親誘襲軍印豈無他人於戲㣲獸傷類如不自容伊人賣友而享其功滅交道兮墜義風曽麋鹿之不若何仁信之可宗己焉哉諒此世之茫茫吾未見其始終虞世南白鹿賦有金方之瑞獸乃矅質於名都既馴洽於郊甸亦騰倚於山隅素毳呈彩霜毛應圖實佳賔於雅什偶仙客於天衢麋樂伯射晉鮑癸逐楚丨丨樂伯丨麋鹿龜以獻癸乃止本傳魏錡射迹人黨逐晉丨丨見六麋錡丨麋顧獻黨乃不逐國語乞麋角北齊河間守崔謀恃弟暹勢從李繪丨丨丨翎羽答書曰翎有六羽飛則冲天丨有四足走則入澤某官手足遲鈍不能追飛捉走以事佞人孔氏帖麞逐麞忘死曹景宗曰我昔在鄉里騎快馬如龍與少年數十騎平澤中丨丨數肋射之此樂使人丨丨南史許麞為脯李衛公說道書中言麞鹿無魂故可食陶隱居云丨鹿非辰屬又八卦無主即生死無由故道家許聽為脯牛羊鷄犬雖補益充肌膚於亡魂皆為愆責並不足噉道書詩集角蒼麑斑始力直麛丨已丨然野性本難畜翫習亦逾年仰首嚼園栁俯身飲清泉見人若閒暇蹷起若低騫兹獸有髙貌凡類豈比肩不得游山澤跼促誠可憐韋應物述園鹿尾促鹿角芟芟丨丨促張籍山頭鹿號山丨丨無定鹿杜飲泉條峰五老勢相連此鹿來從若箇邊别有野麋人不見一生長丨白雲泉賈浪仙雪色射殺林中丨丨鹿前者坐皮因問毛杜銅牌長生鹿瘦丨丨垂津陽門詩囓草朝渴飲清池暮飽卧深柵慙愧主人恩自非殺身難報德主人施恩不恃報哀爾胡為羅網獲南山藹藹動春陽吾欲縱爾山之傍巖崖雪盡飛泉溜澗谷風吹百草香飲泉丨丨當逺去山後山前射生户歐陽永叔馴鹿麋爾為羣荆扉對麋鹿應共丨丨丨杜人不見見前鹿門何事驚機心忘已乆丨丨丨麋鹿杜麞山中吏紛紛騎馬塵及腹名利之窟争馳逐眼明見此丨丨丨怪底吾廬有林谷雌雄相對目烱烱意閒不受榮與辱掇皮皆真豈自知坐令猫犬羞奴僕我不是李衛公欺爾無魂規爾肉又不是曹將軍數肋射爾不遺鏃明窻無塵簾有香與爾共此春日長戯弄竹枝聊卒歲不羨晉宫車下羊陳去非題元吉畫麞麏即麞也觸禍機何處驚麏丨丨丨煩君遣騎割輕肥秋來多病新開肉糲飯寒葅得解圍黄魯直謝榮緒割麞見貽􅕱及禍樞永與清溪别䝉將玉饌俱無才逐仙隱不敢恨庖厨亂世輕全物機聲丨丨丨衣冠兼盗賊饕餮用斯須杜狼附豺格物總論狼大如犬蒼色銳頭而白頰高前廣後鳴聲諸孔皆沸豺之屬也糞烟烽火用之烟直上也牡貛牝狼子獥音呌事類衘鉤湯時有白狼丨丨入朝以為祥瑞白氏帖䟦胡狼䟦美周公也狼丨其丨載疐其尾詩得白狼宣王丨丨丨而戎狄賔選從兩狼齊哀公好田獵並驅丨丨丨兮詩越椒聲楚子良尘子丨丨子文曰豺狼之丨不殺必滅若敖之宗諺曰狼子野心其可蓄乎左文十七伯石聲丨丨始生姑視之及堂聞其聲而還曰是豺狼之丨也狼子野心非是莫喪羊舌氏矣遂弗視左縱狼為樂江都易王非卒子建立宫人有過丨丨嚙殺之觀以丨丨漢本傳隨狼得濟宋王懿宗軍德義兵窘廹暴雨洪潦不知津梁有一白狼至前仰天而號訖衘王懿衣因渡丨丨丨丨也白帖一人蒼衣張鋋巴侯置酒邀滄浪君至丨丨丨丨其質魁岸天將曉鋋悸寤見一狼卧於前盖所謂滄浪君也張續宣室記一人黄褐晉州神山民黄張妻忽夢丨黄褐丨腰腹甚細留淫之兩接而去遂姙娠好食生肉䑛唇咬齒而性狼戾生二狼生即走其夫擊殺之稽神録王鉷狼噬丨丨林甫方興大獄憾東宫誅不附己者以鉷險刻可動以利故倚之使鷙擊狼嚙本傳餘慶狼彪龍朔中楊思𤣥恃外戚典選多排斥選士為選人夏彪訟之中丞郎丨丨丨丨免官許南陽曰故知楊吏部之敗或問之許曰一彪一狼共看一羊不敗何待南部新書狼乳烏孫烏孫王昆莫初生棄於野丨徃丨之大宛傳狼生突厥突厥之先為匈奴所破其族有一小兒棄草澤中有牝丨以肉飼之及長與狼交合遂有孕生十男後周四夷書詩集將四子一狼丨丨丨一嶺走千羊意得無前敵時乖闕及防寧知射生手已發弩機張㑹使烏鳶飽空令豺虎傷陳無己捕狼獺格物總論獺水狗形類犬頭如馬身如蝙蝠鼻尖尾大四足俱短頭與身尾俱褊毛色若故紫帛大者身與尾長三尺餘食魚居水中出水亦不死亦能休於大木上世謂之木獺嘗有縻置大水甕中於其間旋轉如風水為之成旋壠起四面髙中心凹下觀者駭目海獺大如狗脚下有皮如人胼拇毛着水不濡海人亦食其肉皆獱之屬也事類皮飾毳獺丨西戎以丨丨服領袖問之云垢不着如風霾翳目即就袖口拭目中即出本草衍義膽分盃獺丨丨丨嘗試云不驗惟塗於盞唇但使酒稍髙於盞面分盃之事亦古今傳誤言也叙例少女乘船東平吕球事詳見菱門注大毉和膏吳孫和寵鄧夫人嘗醉舞如意誤傷鄧頰血流哀怨彌苦命吳丨丨合藥曰得白獺髓雜玉與琥珀屑當滅此痕和以百金搆得白獺丨丨琥珀大多及瘥不減左頰赤㸃如痣酉陽雜爼詩集獺祭魚沙暄丨丨丨杜獺捧鱗有丨得嘉魚自謂天見憐先祭不敢食丨丨望清𤣥人立寒沙上心專脰肩肩漁翁以為妖舉塊投其咽呼兒貫魚歸與獺同烹煎云云何地無江湖何水無鮪鱣天意不宰割菲祭徒拳拳空餘知禮重載在淹中篇劉禹鍚有獺吟狐附貍貉貒格物總論狐形似黄狗鼻尖尾大性多疑審聽捕之者多用罝陶隱居云江東無狐出北方及益州今江南亦時有京洛尤多狸似虎斑亦有似猫斑者又一種香狸微有射氣又一種似兎而短多棲息髙木候風吹之而過他木謂之風狸又一種面白而尾似牛故名玉面又名牛尾專食百菓人多噉食之或又言狸形似猫其文有二一如連錢者一如虎紋者肉味與狐不相逺皆可作羮臛貒肥矮毛㣲灰色頭連脊毛一道黑觜尖黒尾短濶蒸食之極美貉形如小狐毛黄褐色皆狐之類事類雄狐丨丨綏綏詩封狐丨丨千里大狐徤走千里楚辭妖狐丨丨獸也鬼所乗也說文濡尾小狐汔濟丨其丨易正首狐死丨丘丨樂其所生丨丘丨言不忘本也記檀弓有芁丨丨者狐率彼幽草注芁小貌詩多疑狐性丨丨水經注妖獸狐丨丨三徳者其色中和小前大後死則丘首謂之三徳說文神獸狐丨丨出於青丘山音如嬰兒食之不蠱淫婦狐者古之丨丨其名紫紫化而為狐故其姓自稱阿紫名山記又見下美女千歲之狐為淫婦百歲之狐為丨丨郭氏𤣥中記狐死見正首注狐壽丨丨八百歲三百歲即解變為人抱朴子赤狐莫丨匪丨詩𤣥狐武都山有丨丨葺首山海經九尾青丘之狐丨丨同上三徳見前注聽氷河氷合須狐丨而行述征記嘯雨風嘷雨丨昏見晨趨白帖白狐禹年三十未娶曰吾娶必有應後乃有丨丨九尾而應之又文王拘羑里散宜生至西海之濵取丨丨獻紂以免文王黑狐丨丨周成王見之並同上假威楚宣王問羣臣曰吾聞北方之民畏昭奚恤亦誠何如江乙對曰虎求百獸而食之得狐狐曰子無噉我天帝令我長百獸子若食我是逆天帝之命子以我為不信我為子先子隨我後觀百獸見我能無走乎虎以為然隨狐而行百獸見皆走虎不知獸之畏己反以為畏狐也今王地方五千里帶甲百萬而任之於昭奚恤然北方非畏奚恤實畏王之甲兵春秋後語詐鳴陳勝聞令吳廣於所次旁叢祠中夜構火狐嗚呼曰大楚與陳勝王卒皆夜恐化男子燕昭王墓有老狐丨丨丨聽張華講說華怪之謂雷孔章曰今有男子少美髙論孔章曰當是老精聞燕昭王墓有華表柱向千年可取照之當見如言化為狐搜神記姦人女吳郡顧旃至一岡忽聞人語聲云咄咄今年衰乃與衆尋覓岡頂有一穽是古時冡見一老狐蹲冡中前有一巻簿書老狐對書屈指有所計較犬咋殺之取視簿書悉是丨丨丨名已經姦者朱鈎頭如疏名有百數旃女在簿次搜神記手持火有一小物如獸丨丨丨以口吹之書生舉刀斫斫斷視之狐也自此無火灾管輅傳尾出火野狐名紫夜擊丨丨丨將成怪必戴髑髏拜北斗髑髏不墜則化為人矣雜爼𤣥丘尉張鋋夜行逢巴西侯置酒邀丨丨校丨至一人衣黑衣天將曉鋋悸寤乃一狐卧于床張續宣室志廣陵人胡道拾自云丨丨丨好音樂醫術之事體有臊氣恒以名香自防唯恐猛犬自審死日戒弟子曰氣絶勿令狗見我屍也死於山陽歛畢覺棺空即開不見其屍體時人咸謂狐也異苑鳴於旁李宻及即位狐丨丨丨惡之孔氏帖噪於庭李揆夏夜宿堂之前軒有巨狐鳴丨丨丨乃人立而跳月光逆射久踰垣而去揆甚惡之及將曉入朝其日正拜集異記兩脚狐楊再思張昌宗坐事桓彦範劾也其官再思曰昌宗為陛下治丹此為有功后悦昌宗還官自是天下貴彦範賤再思戴令言賦丨丨丨以譏之孔氏帖通天狐長慶中舉人歌曰欲入舉塲先問蘇張蘇張猶可三楊殺我故輦下謂三楊為丨丨丨牛羊日歴自穴而出漢平陵王墓多狐丨丨丨丨者毛皆坌灰雜爼登木而墜晉天福甲辰歲公安滄渚民家犬遂一婦丨丨丨丨為犬咬死乃老狐也尾長七八尺南部新書李華鶚執狐記某嘗日異鳥擊豐狐於中野雙睛矅宿六翮垂雲迅若電馳厲若霜殺吻決肝腦爪刳腎腸昻藏自雄倐歘而逝問名與耕者對曰此黄金鶚也其何快哉因讓之曰仁人秉心哀矜不暇何樂之有曰是狐也為患大矣震驚我族姻撓亂我閭里喜逃徐子之廬不畏申生之矢皇祗或以其惡貫盈而以鶚誅之予非斯禽之快也而誰為悲夫位髙疾僨厚味醋毒遵道致盛或罹諸殃況假威為孽能不速禍在位者當洒濯其心袚除凶意惡是務去福其大來不然有甚於狐之害人庸忸於鶚之能邇貍玉貍見前廣雅文貍乘赤貍而從丨丨宋王文掘貍去怪樂廣為河南尹先是河南官舍多妖怪前尹皆不敢處正寢廣居之不疑嘗外户自閉左右皆驚廣獨囘顧見有墻孔丨墻得丨而殺之其怪亦絶本傳捕貍為樂帝嘗夜艾自丨狐丨丨丨謂之打夜狐劉克明傳楊䕫蓄貍說敬亭叟之家毒於䑕暴穿桷穴墉室無全宇咋囓筐篚帑無完物乃賂於捕野者俚求貍之子必銳於家畜數日而獲諸汴飾茵以棲給鱗以茹撫育之厚如字諸子其攫尘摶飛舉無不㨗䑕攝而殄影暴腥露膻縱横莫犯矣然其野心常思逸於外罔以子育為懷一旦怠其紲踰垣越宇倐不知其所逝叟惋且惜涉旬不弭𢎞農子聞之曰野性匪馴育而靡恩非獨貍然人亦有旃梁武於侯景寵非不深矣劉琨於匹磾情非不至矣既負其城復返厥噬嗚呼非所蓄而蓄孰有不叛哉舒元輿養貍述野禽獸可馴養而有禆於人者吾得之於貍貍之性憎䑕余愛其能息䑕切近乎正且勇嘗觀虞人有生致者因得請歸致新豐里客舍舍之初未為某居時曽為富家廪墉堵地面甚足䑕竅穴之口光滑日有䑕絡繹然某既居果遭其暴耗常白日為羣雖敲拍叱嚇略不畏忌或暫僶俛跧縮須㬰復來日數十度其穿申孔箱之患繼晷而有晝或出游及歸其什器服物悉已破碎若夜時長留缸續晨與役夫更吻驅訶甚擾神抱有時或缺死脻交黑暗中又遭其縁塌過面汩汩上下則不可奈何或知之借櫝以收拾衣服未頃刻櫝又孔矣予心深悶當時意欲掘地誅剪始二三十日間未果頗患之若抱癢疾自獲此貍常闔實竇縱於室中潛伺之見軒首引鼻以得䑕氣則凝蹲不動斯須果有䑕數十輩接尾而出貍或躍起竪朣迸金文毛磔斑張爪呀牙劃泄怒聲䑕黨帖伏不敢竄貍遂摶擊或目抉牙截尾掉首擺瞬視間羣䑕肝腦塗地迨夜始背缸潜窺室内酒然予以是益寶貍矣常自馴飼之到今僅半年貍不復殺䑕䑕不復出穴穴有土蟲絲封閉欲合向之韞櫝服物皆縱横排擲無所損害噫微貍䑕不獨耗吾物亦將咬嚙吾身矣是以知吾得高枕坦卧絶瘡痏之憂皆斯貍之功異乎䑕本統乎陰蟲其用合晝伏夕動常怯怕人者也向之暴耗非有大膽壯力能凌侮於人以其人無禦之之術故得恣横若此今人之家茍無貍之用則紅墉皓璧固為䑕室宅矣甘濃鮮肥又資䑕口腹矣雖乏人智其奈之何嗚呼覆幬之間首圓足方竊盗聖人之教甚於䑕者有之矣若時不容端人則白日之下得聘於陰私故桀朝䑕多而關龍逢斬紂朝䑕多而王子比干剖魯國䑕多而仲尼去楚國䑕多而屈原沉以此推之小人道長而不知用君子以正之猶向之䑕竊而不知用貍而止遏縱其暴横則五行七曜亦必返常於天矣豈直流患於人閒耶某因養貍而得其道故備録始末貯諸篋内異日持諭於在位之君子貉踰汶則死貉丨丨丨丨地氣使然也禮考工記詩集為嬰兒嗁老狐宅城隅涵養體豐大不知窟穴處草木但掩靄秋食承露禾夏飲灌園派暮夜出旁舍鷄畜遭横害晚登埤堄塢呼吸召百怪或丨丨丨丨或變艶婦態不知㡬千年出處頗安泰古語比社䑕盖亦有恃賴邑中少年兒耽獵苦沈瘵逺郊盡雉兎近水纎鱗介養犬號青鶻逐獸馳不再勇聞比老狐取必將自快縱犬索幽邃張人作疆界兹時頗窘急迸出赤電駭羣小助嘑嘷奔馳數顛沛所向不能入有類狼失狽鈎牙咋巨顙髓血相濡沫喘呌遂死矣爭觀若期㑹何暇正首丘腥臊滿蒿艾數穴相穿通城堞㡬隳壞久矣縱凶妖一旦果禍敗皮為榻上藉肉作盤中膾觀此為之吟書以為警戒蘓子美獵狐篇為婦人粧古塚狐狸妖且老化丨丨丨顔色好頭變雲鬟面變丨大尾曵作長紅裳徐徐行傍荒村路日欲暮時人靜處或歌或舞或悲啼翠眉不舉花顔低忽見一笑千萬態見者十人八九迷假色迷人猶若是真色迷人應過此彼真此假俱迷人人心惡假更重真狐假女妖害猶淺一朝一夕迷人眼女為狐媚害即深日長月長溺人心何况褒妲色蠱惑能喪人家覆人國試看為害淺深間豈將假色同真色白居易古塜狐橘柚漿首如貍尾如牛攀條㨗險如猱猴丨丨為丨栗為餱酒肉不足惟膏油深居簡出善自謀尋蹤發窟并執囚蓄租分散身為羞松薪瓦甑蒸浮浮壓入糟盎肥欲流熊脂羊酪真比儔引筯將舉訊何尤無功切食人所仇蘇子由牛尾貍氷玉肌狐公韻勝丨丨丨字則未聞名季貍訓隨齊相燧牛尾策勲封作糟丘子語有世世襲膏梁黄雀子魚鴻鴈行先生季貍味其言須聽取楊廷秀氏竒章風林露圃天欲莫取紅粟紫橘弄黄老夫思饞不忍甞丁寧籩人將朝來羽化去通出木奴三百户烏椑士子散如烟檢校不知渠霎強山童相傳皂衣郎字曰季貍丨丨丨上樹千囘一連畧積迺倉并吞乂向黎侯國羅人救黎遂擒獲白茅面縛闕𤣥端貂裘匏肥白解驂薦渠登相門立談封作糟丘君闕招被錦拉通卬日侍樽爼嬉平園玉肌生憎麄手削須防東闕訟寛着楊廷秀獻貍周益公侑以長句古今合璧事類備要别集巻七十八
