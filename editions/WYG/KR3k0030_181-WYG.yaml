body:
  text: 古今合璧事類備要續集卷三十一宋謝維新撰性行門勇敢附勇力事理發揮勇有二曰理義之勇血氣之勇君子勇於理義故其勇為大勇小人勇於血氣故其勇為小勇小勇不足道也已故子路問子行三軍則誰與而吾夫子告之曰暴虎馮河死而無悔者吾不與也必也臨事而懼好謀而成者也異時孟子論孟施舍北宫黝之勇非不侈言之也及論其守約也亦以施舍之不如曽子由此觀之則二者之勇君子盍知所去取矣事類必有仁者丨丨勇勇者不必有仁語不懼勇者丨丨同上見義丨丨不為無勇也語達德知仁勇天下之丨丨中庸客氣盡丨丨也注言非勇定八疾視夫撫劒丨丨曰彼惡敢當我哉此匹夫之勇敵一人者也孟一怒安文王亦丨丨而丨天下之民武王亦一怒而安天下之民孟子大敵勇光武見小敵怯丨丨丨後本紀賈余餘欲勇者丨丨丨勇左成二敢不雄齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰丨丨丨然臣不敏平隂之役先二子鳴莊公為勇爵殖綽郭最欲與焉州綽曰東閭之役臣左驂迫還於門中識其枚數其可以與於此乎公曰子為晉君也對曰臣為𨽻新然二子者譬於禽獸臣食其肉而寢處其皮矣左襄十年一挫若撻北宫黝之養勇也不膚撓不目逃思以丨毫丨于人丨丨之於市朝不受於謁寛博亦不受於萬乗之君視刺萬乗之君若刺褐夫孟所養無懼孟施舍之丨丨勇也曰視不勝猶勝也量敵而後進慮勝而後㑹是畏三軍者也舍豈能為必勝哉能丨丨而已矣夫二子之勇未知其孰賢然而孟施舍守約也孟自反而縮昔者曽子謂子襄曰子好勇乎吾嘗聞大勇於夫子矣自反而不縮雖褐寛博吾不惴焉丨丨丨丨雖千萬人吾往矣孟施舍之守氣又不如曽子之守約也同上四十不動孟子曰我丨丨丨丨心公孫丑曰若夫子過孟賁逺矣同上舉掖謂郎漢王尊為東平相時王以至親不奉法度尊謁見王太傅王前説相䑕之詩尊曰母持布鼔過雷門王怒起入後宫後尊謂王曰尊來為相人皆弔尊以尊不容朝廷故見使相王耳天下皆言王勇顧但負貴安能勇如尊乃勇耳王色變意欲格殺尊即好謂曰願觀相君佩刀尊丨丨顧丨侍丨曰前引佩刀視王王欲誣相拔刀向王耶王情得大為尊屈袖椎虞變五代漢髙祖劉知逺為晉髙祖押衙潞王從珂反唐愍帝出奔晉祖自鎮州朝京師遇愍帝于衛州知逺遣勇士石敢丨鐵丨侍晉祖丨丨晉祖與愍帝議事帝左右欲兵之知逺擁晉祖入室石敢格鬭死知逺以兵盡殺愍帝左右留帝𫝊舍而去鑿骨出鏃高開道有矢鏃在頰召醫出之乃丨丨置楔其間骨裂寸餘竟丨其丨開道奏妓進膳不輟唐髙紀奪矟刺賊尉遲敬德其戰善避矟毎單騎入賊羣刺之不能傷又能奪賊矟還刺之帝嘗問二者孰難對曰奪矟難試與齊王戯少選王三失矟勇力負山夸蛾氏有神力二子負二山一厝朔東一厝雍南觸山丨不周之丨折天柱絶地維列子射日堯時羿丨十丨繳大風殺窫窬斬九嬰射河伯斷脩蛇禽封豨淮南子注繳風見上注折牛角遂擒推移大犧故以為號吕氏春秋又任鄙抃牛注以兩牛相擊如抃手狀楊子裂兕革惡來有力手丨虎丨丨秦紀又力能裂犀兕之革曳九牛之尾猶憾其弱列子投葢稷門雩講于梁氏女公子觀之圉人犖自牆外與之戯子般怒使鞭之公曰不如殺之是不可鞭犖有力焉能丨丨于丨丨注葢覆也接其屋之角反覆門上左莊三十二年抉舉縣門晉荀偃士匄請伐偪陽圍之弗克孟氏之臣秦堇父輦重如役偪陽人啟門諸侯之士門焉縣門發鄹人紇抉之以出門者注門者諸侯之士在門内者紇鄹邑大夫仲尼父叔梁紇也言多力丨丨丨丨出在内者抉鳥穴反左襄十螳以為人齊莊公出獵有丨蜋舉足將搏其輪御者曰此虫知進不量力而輕敵莊公曰丨丨丨丨必為勇力矣於是回車避之由是勇士歸韓詩外傳蛙其有氣越王屢伐吳欲人之輕死也出見怒丨乃為之式從者曰奚敬於此曰敬丨丨丨故也韓非子以桃殺士齊景公畜勇士公孫接田開疆古冶子事景公以勇力摶於虎聞晏子而趨三子者不起晏子見公請去之公乃使人餽之二桃令三子計功而食公孫接曰接一搏特猏再搏乳虎若接之功可以食桃而無與人同矣援桃而起田開疆曰吾杖兵却三軍若開疆之功可以食桃而無與人同矣援桃而起古冶子曰君濟於河黿銜左驂以入砥柱之洪流是時也冶少不能游潛行逆流百步順流九里得黿而殺之左操馬尾右挈黿頭雀躍而上人皆曰河伯也冶子視之則大黿之首也若冶之功可以食桃而無與人同矣二子耻功不逮而自殺古冶子亦自殺晏子春秋結草亢敵魏顆敗秦師於輔氏獲杜回秦之力人也初魏武子有嬖妾無子武子疾命顆曰必嫁是疾病則曰必以為殉及卒顆嫁之曰疾病則亂吾從其治也及輔氏之役顆見老人結草以亢杜回回躓而顛故獲之夜夢之曰余爾所嫁婦人之父也爾用先人之治命余是以報左宣十五瞋目視虎秦召公子母忌不行使朱亥奉璧一雙秦王大怒將朱亥着虎圏中亥丨丨丨丨眥裂血出濺虎終不敢動烈士𫝊空手搏熊廣陵王育有勇力嘗於文帝太子思賢苑别圃學格熊後遂能丨丨丨丨莫不絶脰西京雜紀斬長橋蛟周處年少時凶强使氣力鄉里所患又義興水中有蛟山中有虎並皆暴犯百姓謂之三害而處旣刺殺虎又入水刺殺蛟而出遂自改勵終為忠臣孝子世説尸魯山虎元德秀為魯山令虎為暴盜請格虎自贖許之明日盜尸虎還為難當賊唐李英公勣嘗言我年十二三時為無賴賊逢人即殺十四五時丨丨丨丨有所不惬者殺之十七八時為好賊上陣殺人三十領天下大將用兵以救人死也號一谷柴武行德太原榆次人身長八尺餘絶有膂力以負薪自給里人丨為丨丨丨晉祖因出獵行德方入城鬻薪見其魁岸所負之薪令左右數人不能舉壯其力留帳下後至節帥談苑蘇子瞻倡勇人固有暴猛獸而不操兵出入於白刃之中而不變者有見虺蜴而却走聞鍾鼓之聲而戰慄者是勇怯之不齊至於如此然閭閻之小民爭鬭戯笑卒然之間而或至於殺人當其發也其心翻然其色勃然雖天下之勇夫無以過之及其退而思其身顧其妻子未始不惻然悔也此非不勇者也氣之所乘則奪其性而忘其故故古之善用兵者用其翻然勃然而未悔之間而其不善者沮其翻然勃然之心而開其自悔之意則是不戰而自敗也故曰致勇有術致勇莫先乎倡劉禹錫原力劉子于邁舟次泗濵維䋏邇之於𫝊𫝊吏適𫝊呼曰乗馹者方來誰何之則曰力人也雅以力聞吳楚間中貴人器之謂宜為爪士獻言于上有㫖趣于京師須其至則仡焉五輩咸碩其體毅其容動晴曄如曳趾岌如顧瞻遲回飲啜有聲泗濵守伾由將授也説而勞之饗以太牢飲以百壺酒酣氣振求試自矜傍如無人中若有馮有盪舟如㳂者抉鼎如飛者綯鍵如麻者開兩弧而脈不僨者屣巨石而齎如流者異哉果以力駭世而聞于上也異日話于儒家者流有客悱然自奮曰斯誠力矣上之不過夸胡人而戯角觝次之不過倅期門而振袀服我之力異然以道用之可以格三苖而賔左衽以威用之可以繫六驘而斷右臂由是而言彼力也長雄于匹夫然猶馹其騑餼其食我力也無敵于天下亦當蒲其輪鶴其書矣予詰之曰彼之力用于形者也子之力用于心者也形近而易見心逺而難明理乎而言則子之力大矣時乎而言則彼之力大矣且夫小大迭用曷常哉彼固有小矣子固有大矣子不能齊也客於邑垂淚洟劉子解之曰屠牛于肆適味于衆口也攻玉於山俟知於獨見也貪日得則鼓刀利要嵗計而韞櫝多客聞之破涕曰吾方俟多於嵗計也嵗歟嵗歟其吾與歟程泰之等子辨今衛士扈駕清道者其著藉名為等子誤矣東方朔𫝊夏育為鼎官顏籀注夏育衛人力舉千鈞鼎今殿前舉鼎者也然則今之衛士以力選而誰何犯蹕者當為鼎子不應為等子也若謂等為等差之等而取其軀幹中尺寸則凡今軍人不以長短率中等乃得刺補何以獨此曹名等子也演繁露詩集丈夫勇老䘮丨丨丨韓仁者勇有能揭之行可謂丨丨丨歐萬人敵鄭子喜談兵魁然丨丨丨荆公古今合璧事類備要續集卷三十一
