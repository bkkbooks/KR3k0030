body:
  text: 古今合璧事類備要前集卷六十宋謝維新撰婚禮門婚姻附卜筮姑舅仙遇兩姨門望師友同姓士世婚門下貴婚再嫁富婚續親貧婚約婚有疾求婚㓜婚强婚晚婚辭婚再娶事類婚姻妻父曰丨壻父曰丨後漢順帝紀注婚者昏時行禮故曰婚姻者婦人因夫故曰姻白虎通室家丈夫生而願為之有丨女子生而願為之有丨滕文隂禮以丨丨教親則人不怨注男女之禮也婚姻以時則男女不怨曠禮大倫夫婦人倫之大綱王吉云好仇窈窕淑女君子丨丨詩嘉耦丨丨曰妃怨耦曰仇左傳結褵親丨其丨九十其儀繫援董叔娶於范氏曰將以求丨丨也納采將為婚必先媒通其言乃後使人丨其丨擇之禮用鴈為䞇取其隂陽往來之義也問名丨女丨而卜之知其吉凶也禮如納采納吉卜於廟得吉兆復使往告婚姻之事納徵用𤣥纁不用鴈請期由夫家卜得吉日乃使人往辭之親迎及納采問名請期並用鴈也禮合二姓丨丨丨之好上以事宗廟下以繼後世也禮記娶異姓婚禮萬世之始也丨於丨丨所以附逺厚别也婚禮不賀人之序也郊特牲娶妻不娶同姓買妾不知其姓則卜之注男女同姓其生不蕃坊記占星候綢繆束薪三星在天注三星參也謂心星也心有尊卑夫婦之象又為二月之合宿故嫁取者以為候焉昏而火星不見嫁娶之時也今我束薪於野乃見其在天則三月之末四月之中見於東方故云不得其時詩綢繆用昏昕凡行事必丨丨丨注遣使行𤣥纁吉禮必用昕時親迎乃用昏時婚禮以著代婚禮所丨丨丨也禮不論財婚娶而丨丨夷虜之道也君子不入其鄉古者男女之族各擇德焉不以財為禮文中子秦晉匹秦伯納女五人於晉公子懷嬴與焉奉匜沃盥既而揮之怒曰丨丨丨也何以卑我左傳齊宋子豈其食魚必河之魴豈其娶妻必丨之姜豈其食魚必河之鯉豈其娶妻必丨之丨詩桃夭宜室丨丨婚姻以時也桃之夭夭灼灼其花之子于歸丨其丨家注婦人謂嫁曰歸國風梅實及時標有梅男女及時也標有梅其實七兮求我庶士迨其吉兮注喻始衰也同上蔦蘿施松頍弁詩丨與女丨丨于丨柏施於松上注丨寄生也女丨菟絲也蒹葭倚玉世説毛曽與夏侯共坐時人謂丨丨丨丨也歌詠鳯凰司馬相如琴中挑文君歌曰鳯兮鳯兮歸故鄉遨遊四海求其凰又云鳯兮鳯兮從我栖得托字尾兮永為妃徐陵玉臺新詠詩喻魚水齊桓公使管仲求寗戚戚應之曰浩浩乎育育乎管仲不知婢子曰詩有之浩浩乎水育育者魚未有室家安召我居注水魚喻人配偶寗戚有伉儷之思故陳此詩管子侍執巾櫛晉太子圉為質於秦將逃歸謂嬴氏曰與子歸乎對曰子晉太子而辱於秦子之欲歸不亦宜乎寡君之使婢子丨丨丨丨以固子也從子而歸棄君命也不敢從亦不敢言遂逃歸僖二十二年示訓箕帚庾衮孤兄女曰芳將嫁衮乃刈荆苕為箕帚訓其女天子主婚韋后嘗為其弟洵與蕭至忠殤女㝠婚至忠又以女妻后舅崔從禮子無詖兩家合禮帝主蕭后主崔時謂丨丨丨丨皇后娶婦公主下嫁杜中立開成初文宗欲以真源臨真二丨丨降士族謂宰相曰民間脩婚姻不計官品而上閥閱我二百年天子顧及崔盧邪詔宗正卿取世家子以聞中立及校書郎衛洙得召見禁中拜著作郎月中遷光禄少卿駙馬都尉尚真源長公主婚嫁已畢向長字子平男女丨丨丨遂恣意遊五嶽名山相謝靈運謂子尚曰男娶女嫁畢勑斷家事勿復闗婚嫁相顧諸葛恢大女適庾會會被蘇峻害其女改適江霦次女適羊楷子衡娶鄧攸女於時謝尚書求婚小女乃云羊鄧是平婚江家我顧伊庾家伊顧我世說因婚報德呉師入郢楚子取其妹季芊以出楚昭王之奔鄭楚大夫鍾建負季芊以從王將嫁季芊季芊辭曰所以為女子逺丈夫也鍾建負我矣以妻鍾建以為樂尹定四五代和凝舉進士梁義成軍節度使賀瓌辟為從事瓌與唐莊宗戰於胡栁瓌敗脫身走獨凝隨之反顧見凝麾之使去凝曰丈夫當為知己死吾恨未得死所爾豈可去也已而一騎追瓌幾及凝叱之不止即引弓射殺之瓌由此得免瓌歸戒其諸子曰和生忠義之士也後必富貴爾其謹事之因妻以女後官至太子太傅封魯國公棄妻别娶後漢竇𤣥以形貌絶異天子以公主妻之舊妻與𤣥書别曰丨丨斥女敬白竇生卑賤鄙陋不如貴人妾日以逺彼日以親衣不厭新人不厭故悲不可忍怨不可去彼獨何人而居我處善謔成婚栁子厚云亡妻楊氏今禮部郎中凝之女許嫁於我柔日既卜乃歸於栁氏恭惟先府君崇重友道於郎中最深髫稚好言始於丨丨雖間在他國終無異辭凡十有三嵗而二姓克合奉初言也墓誌荒陬無婚栁宗元貶永州司馬移書言情曰丨丨中少士人女子丨與為丨世亦不肯與罪人親昵以是嗣續之重不絶如綫王謝門高侯景請娶於王謝上曰丨丨丨丨非偶可於朱張以下訪之通監梁紀王滿非偶齊沈約彈丨源嫁女與丨璋男鸞彈文曰璋之下錢五萬源以所聘餘直納妾丨丨連姻實駭物聽潘楊之睦有異於此文選女皆乘龍孫雋文英與李元禮俱娶太尉桓焉之女人謂和叔元兩女乘龍言得壻如龍壻不愜意謝奕女道韞初適王凝之還甚不樂安曰王郎逸少子不惡汝何恨也答曰一門叔父則有阿大中郎羣從兄弟則有封胡羯末不意天壤之間乃有王郎女妻遊士李白上裴長史書云乃杖劍去國辭親逺遊南窮蒼梧東渉溟海見鄉人相如大誇雲夢之事云楚有七澤遂來觀焉而許相公家見招妻以孫女便憩息於此至移三霜焉女事館賔見後聘後登第烏羊為禮南史孔淳之與王敬𢎞為方外之遊又申以婚姻敬𢎞以女適淳之子遂以丨丨丨所乘車轅提壺丨丨至於盡歡共飲迄暮而歸或怪其如此答曰固亦農夫田父之禮也隱逸傳㯽榔成俗唐南蠻歌羅國中其俗嫁娶納丨丨多至三百盤斥去帷幔范文正公之子純仁娶婦將歸或傳婦以羅為帷幔者公聞之不悦曰羅綺豈帷幔之物耶吾家素清險安得亂吾家法敢持至吾家當火於庭遺事不論資裝司馬温公曰文中子曰婚娶論財夷虜之道也夫婚姻者所以合二姓之好上以事宗廟下以繼後世也今世俗之貪鄙者將娶婦先問資裝之厚薄將嫁女先問聘財之多少至於立契約云某物若干某物若干以求售女者亦有既嫁而後欺紿負約者是乃駔儈鬻奴賣婢之法豈得謂之士大夫婚姻哉其舅姑既被欺紿則殘虐其婦以攄其忿由是愛其女者務厚資裝以悅其舅姑殊不知彼貪鄙之人不可盈厭資裝既竭則安用汝女哉於是質其女以責貨於女氏貨有盡而責無窮故婚姻之家往往終為仇讎矣是以世俗生男則喜生女則戚至有不舉其女者用此故也然則議婚姻有及於財者皆勿與為婚姻可也又曰凡議婚姻當先察其壻與婦之性行及家法何如勿茍慕其富貴壻茍賢矣今雖貧賤安知異日不富貴乎茍為不肖今雖富貴安知異日不貧賤乎婦者家之所由盛衰也茍慕一時之富貴而取之彼挾其富貴鮮有不輕其夫而傲其舅姑者養成驕妒之性異日為患庸有極乎借使因婦財以致富依婦勢以取貴茍有丈夫之志氣者能無愧乎嫁娶異宜安定胡先生遺訓嫁女必須勝吾家娶婦必須不若吾家或問其故曰嫁勝吾家則女之事人必欽必戒婦不若吾家則事舅姑必執婦道曽孜滌記童稚不許司馬温公曰世俗好於襁褓丨丨之時輕許為婚亦有指腹為婚者及其既長或不肖無賴或有惡疾或家貧凍餒或喪服相仍或從官逺方遂至棄信負約連獄致訟者多矣是以先祖太尉書曰吾之男女必俟既長然後議婚既通書不數月必成婚故終身無此悔乃子孫所當法也卜筮鳯占和鳴懿氏卜妻陳敬仲其妻占之是謂鳯凰于飛和鳴鏘鏘有媯之後將育子姜五世其昌並于正卿八世之後莫之與京左龜筮從長晉獻公欲以驪姬為夫人卜之不吉筮之吉公曰從筮筮短龜長不如從長同上仙遇華陽玉女南昌蕭防得第為句容簿縣有三茅宫九錫亭瑞芝館碧奈洞防遍遊之至玉晨觀有青童請至大門金書牌曰華陽洞又至一門曰蘂珠殿有一人紫袍稱東方大夫名朔為華陽洞王謂曰公之逺袒蕭史真人臠董雙成與公為婦扶侍者雲英夫人秉扇者呉綵鸞許飛瓊接引者梁玉清衛承莊姮娥結髪麻姑合􅈟中夜梁玉清衛承莊引防至蘂珠殿禮後堂見一女子乃舊曽見諸葛氏交拜梁玉清致辭曰丨丨丨丨聖世才郎仙凡契合如鳯求凰今夕相偶和鳴鏘鏘夀筭天地慶衍無疆禮畢宴於蘂珠殿曲終青童召防曰雙成夫人請君暫起防避席恍若夢覺四顧已失蘂珠殿矣但見左右深林茂草尋玉晨觀歸縣已半山防遂休官入山雲堂廣記天台仙女劉晨阮肇入丨丨山棌藥迷道見二女顔容絶妙邀過家設酒行夫婦之道住半年還家已後失所在續齋諧記裴航雲英見夤縁類蕭史弄玉弄玉家蕭史善以簫作鳯鳴後隨鳯飛去門朢女娶高國見後辭婚不與凡裔尚宫宋若昭欲以學名家家亦丨欲丨寒鄉丨丨為姻對孔帖多尚閥閱山東士人丨丨丨丨後雖衰其子孫猶負世朢凡嫁娶必多邀錢幣故人謂之賣婚唐史皆取勲貴唐初王妃王壻丨丨當世丨丨名臣家未嘗尚山東舊族後房元齡魏徴李勣復與婚故朢不減然每姓第其房望雖一姓中高下懸隔李義府為子求婚不得始奏禁焉其後天下衰宗落譜昭穆所不齒者皆稱禁婚家益自貴同上好求甲門張説丨丨山東婚姻與張氏親者皆為丨丨四姓鄭氏不離滎陽崗頭盧潭底李土門崔皆為顯族國史補婚皆名族李日知貴諸子方總角皆通婚名族時人譏之帝后姻戚竇威帝嘗引入卧内謂曰昔周有八柱國吾與公家是也今我為天子而為内史令事固有不等耶威懼頓首謝曰臣家在漢再為外戚至元魏有三皇后今陛下龍興臣復以姻戚進夙夜懼不克任帝笑曰公有三后族夸我邪闗東人與崔盧婚者猶自矜大公世為帝戚不亦貴乎孔帖族屬姻家李敬之進吏部尚書凡三娶皆山東舊族又與趙李氏合譜故臺省要職多丨丨丨丨不附宰相王義方魏證異之欲妻以夫人之姪辭不取已而證薨乃取其女人問其故曰初丨丨丨丨今感知己故也引就清列李德逺與李林甫善常慕山東著姓為婚姻丨丨丨丨同姓昭公孟子陳司敗問丨丨知禮乎孔子曰知禮曰君娶於呉為同姓謂之呉丨丨君而知禮孰不知禮晉侯四姬丨丨内實有丨丨焉皆同姓左崔盧非古任薛王劉丨丨之婚丨丨也何以眡譜注任薛出黄帝王劉出舜崔盧出帝嚳文中子盧慶同宗丨蒲癸娶丨舍女丨丨也人謂之曰男女辨姓子何不避宗何也曰宗不予避之余焉避之詩賦斷章予所取求焉惡避宗注茍有求於慶氏不復避宗譬如賦詩直取斷章之義以劉嫁劉晉劉頌嫁女臨淮陳矯矯本劉氏子與頌近親出養於姑改姓陳氏中山劉氏譏之頌曰舜後姚虞陳田本同根系而世皆為婚禮律不禁今與此同議為昏可也以王娶王司空陳萊王基當世大儒而不達禮為子納司空王沉女以姓同源異王莽娶王咸女以為源異不同而娶之世婚劉范世姻丨氏丨氏丨為婚丨注劉氏周卿范氏晉大夫左鄭王世婚鄭崇字子游本高宻大族世與王家相嫁娶也潘楊世親楊經字仲武潘岳作誄文云藉三葉世親之恩而予之姑余之伉儷焉丨丨之睦有自來矣朱陳世好事見詩集姑舅秦女事晉晉太子圉為質於秦秦歸河東以懐嬴妻之左傳劉女適費蜀費觀劉璋璋妻乃觀之族姑璋又以女妻觀姑女得壻温嶠丨有丨屬嶠覓壻嶠自有婚意答曰佳壻難得但得如嶠如何姑曰何敢希汝比也後日嶠報姑云已丨丨矣門地壻身不減嶠因下玉鏡臺一枚姑大喜既交婚禮畢姑女披紗扇撫掌大笑曰我固疑是老奴果如所卜舅子結姻老蘇女㓜而好學慷慨能文適其母之兄程濬之子之才詩曰汝母之兄汝伯丨求以厥丨來丨丨鄉人嫁娶重母黨雖我不肯將安云蘇集姑以上係姪娶女姪從其姑晉獻公筮嫁伯姬於秦遇歸妹之睽姪其從姑左傳母娶其黨叔向欲娶申公巫臣氏其丨欲丨丨丨叔向曰吾母多而庶鮮吾懲舅氏矣性似我家李膺之姑為鍾皓兄之妻生子瑾好學慕古與膺同年俱有令名膺祖太尉脩常言瑾似我家性以膺妹妻之妻以小女張鎰㓜女倩娘見外甥王宙美容範嘗戯曰後當以小女妻之後為夫妻陳翰異聞録戱呼王郎王仙客劉振之甥也振有女曰無雙小仙客數嵗皆㓜穉丨丨相狎振妻常呼仙客為丨丨子舅以上係甥娶女兩姨大喬小喬喬公二女皆國色孫䇿納丨丨周瑜納丨丨呉志蕭郎陸郎蕭嵩與陸象先為僚壻宣州夏榮善相謂象先曰陸郎十年位極人臣然不及丨丨一門盡貴姊妹妯娌崔休弟之子愍字長謙刺史盧尚之以長女妻之休為子悛求其次女曰家道多由婦女欲令丨丨丨丨尚之感其義於是同日成婚兄弟婚姻郭逸有二女長女妻崔浩次女復妻其弟詩曰丨丨丨丨無胥逺矣師友妻以己子子謂公冶長可妻也雖在縲絏之中非其罪也以其子妻之語妻以兄女子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之語戴逵字安道性不樂當世常以琴書自娯師事徵士范宣於豫章宣異之以丨丨妻焉從婦翁學後漢馬融有俊才初京兆摰恂以儒術教授隠於南山不應徵聘名重闗西融從其遊學博通經籍恂竒融才以女妻之後漢鮑宣妻桓氏字少君宣嘗就少君父學父竒其清苦以女妻之裝送甚厚宣不悦曰少君生富驕習美飾吾貧賤不敢當禮少君乃悉歸侍御服飾更着短布裳與宣共挽鹿車歸鄉里拜姑畢提甕出汲修行婦道宣官司隸校尉子永中興初為魯郡守永子昱從容問少君曰太夫人寧復識挽鹿車時不對曰先姑有言存不忘亡安不忘危吾安敢忘乎與婦翁親前京房字君明淮南憲王舅張博從房學易以女妻房房丨相親序婦翁文李漢少事韓愈辱知最厚韓愈以女妻之嘗編昌黎文仍為之序傳婦翁業葛洪好神仙導養法師事太守鮑𤣥𤣥以内學逆占將來見洪深重之以女妻洪洪丨丨𤣥業為女覓壻後魏劉延明年十四就博士郭瑀學弟子五百餘人瑀有女選壻惟有心於延明别設一席曰吾有一女欲覓一快女壻誰坐此者吾當妻焉延明奮衣坐曰延明其人也瑀遂以女妻之為孫娶婦范蜀公名鎮字純仁少學於鄉先生龎直温直温之子昉卒於京師公娶其女丨丨婦養其妻子終身係鄰舍門下士以才見竒魏公孫瓚字伯珪為郡小吏為人美姿儀性辨惠侯太守竒其才以女妻焉因相知貴王鍔為辛果下偏禆一旦擊毬馳騁酣鍔向天呵氣高數丈若匹練上衝果謂妻曰此極貴相以女妻之廐中騏驥刺史杜廣初為劉景廐卒景執手曰久負賢者告其妻曰吾為女求夫三十年不覺丨丨有丨丨於是妻之幃外鸛雀唐裴寛為潤州參軍刺史韋詵有女擇所宜歸登樓見人於後圃有所瘞藏訪諸吏曰參軍裴寛居也詵問狀答曰適有人以鹿為餉不敢自欺故瘞之詵歎異乃引為按察判官許妻以女歸語妻曰嘗求佳壻今得矣明日丨其族使觀之寛時衣碧瘠而長既入族人皆笑笑呼為碧丨丨詵曰愛其女必以為賢公侯妻也何以貌求人卒妻寛本傳貴婚已貴而娶唐相白敏中始娶已朱紫矣嘗戱其妻曰接脚夫人登第後娶宋李象字昭文應進士丨丨宰臣劉昫愛其才以猶女妻之呉氏越州山隂人父母賢之謂必得名士乃可為配李䕫之名聞朝廷繼擢高第遂以妻之未第不娶富文忠嘗謂邵伯温曰吾之年二十八登第方娶當先公先夫人時丨丨决丨許丨聞見録娶後登第王沂公曾初就殿試時固己有盛名李文靖公沆為相適求壻語夫人曰吾得壻矣乃舉公姓名曰此人今此不第後亦當為公輔是時吕文穆家亦求姻於沂公公聞文靖之言曰李公知我遂從李氏唱名果第一聘後登第杜祁公少時客濟源有縣令者能相人厚遇之與縣之大姓相里氏議昏不成祁公亦别娶久之祁公妻死令曰相里女子當作國夫人矣相里兄弟二人前却祁公之議者兄也令召其弟曰秀才杜君人材足依也當以女弟從之議遂定其兄尤之弟曰杜君令之重客令之意其可違兄悵然曰姑從之俾教諸兒讀書耳祁公未成婚赴試京師登科相里之兄厚資往見公曰婚已定議其敢違某既出仕頗憂門下無與教兒讀書者爾凡遺却之相里之兄大慙以歸祁公既娶相里夫人至從官以兩郊禮奏異恩任相里之弟後官至員外郎並同上富婚資裝遣嫁後漢鮑宣妻桓氏字少君裝送資賄甚盛宣不悦妻乃悉歸侍御服飾更着布裳錢幣賣婚見前門朢貧婚陳平席門丨丨少時家貧好讀書及長可娶婦富人莫與者貧者平亦愧之户牖富人張負有女孫五嫁夫輙死人莫敢娶平欲得之邑中有大喪平家貧侍喪以先往後罷為助負見之喪所獨視偉平平亦以故後去負隨平至其家家乃負郭窮巷以丨為丨然門外多長者車轍負歸謂其子仲曰吾以女孫與丨丨仲曰平貧不事事一縣中盡笑其所為獨奈何與之女負曰固有美如陳平長貧者乎卒與女為平貧乃假貸幣以聘子酒肉之資以内婦負戒其孫曰母以貧故事人不謹事兄伯如事乃父事嫂如事乃母平既取張氏資用益饒游道日廣相如壁立司馬丨丨㑹卓文君新寡以琴心挑之遂奔而其家徒四丨丨既為夫妻王孫悦乃厚與錢百萬及僮婢焉練裳遣嫁後漢逸民戴良有五女家貧每有求婚輙便許嫁丨丨布被竹筒木履而遣之賣犬遣嫁呉隠之將嫁女謝石知其貧素遣女必當率薄乃令移㕑帳助其經營使者至見婢牽犬賣之此外蕭然無辦有疾納舅盲女北史崔巨倫有姊明惠有才行因患眇一目内外親族莫有求者其家議欲下嫁之巨倫姑趙國季叔𦙍之妻聞其慚感曰吾兄盛德不幸早世肯令此女屈事卑族乃為子翼納之時人歎其義識娶姨廢女唐孫㤗姨老以二女為託曰長女損一目汝可妻其女弟姨卒取其姊或詰之答曰人有廢疾非泰何適不許辭疾華隂吕君舉進士聘里中女未行既中第婦家言曰吾女故無疾既聘而後盲敢辭吕君曰既聘而後盲君不為欺又何辭遂娶之生五男子皆中進士第其一人丞相汲公是也后山叢談不背前約劉廷式本田家鄰舍翁有女約與為婚契濶數年廷式登第歸鄉訪鄰翁而翁已死女因病雙瞽家極困餓廷式使人申前好而女之家辭以疾仍以傭耕不敢姻士大夫廷式曰與翁有約豈可以翁死女疾而背之乎卒與成婚閨門極睦其妻相㩦而後行凡生數子廷式嘗坐小譴監司欲逐之嘉其美行遂為之濶畧其後妻死哭之極哀東坡高其行為文以美之夢溪筆談㓜婚㓜議母黨周恭叔自太學早年登科丨丨丨丨之女登科後其女雙瞽遂娶焉愛過常人伊川曰某未三十時亦做不得此事尹氏言行録早娶外氏傅咸泥陽人六嵗從母省繼外祖母嚴氏嚴氏曰此千里駒也以其妹之女妻之晚婚枯楊生稊丨丨丨丨老夫得其女妻易大過枯楊生華丨丨丨丨老婦得其士夫同上三十未娶禹年三十丨丨行塗山有白狐九尾造禹塗山人歌曰緌緌白狐九尾龎龎成子家室乃都攸昌禹遂娶之吕氏春秋顔延年好讀書無所不覽行年丨丨猶丨婚南史四十無室阮脩字宣子丨丨未有室王敦等斂錢為婚皆名士也時慕之者求入錢而不得晉本傳康節先生作元名君傳曰年四十未有室願為妻者不拒隱居絶婚齊何㸃丨丨不仕丨丨何尚之强為娶任氏禮畢將親迎㸃涕泣求執本心遂罷既老又娶魯國隠者孔嗣女雖昏亦不與妻相見别宇以處之人莫諭其意張融為詩嘲之曰惜哉何處士薄暮遘荒淫南史處士燕爾處士陳貺閩人有詩名五十方娶有慶之者曰丨丨新郎丨丨安乎答曰呵呵僕少處山谷莫預世事不知衣裾之下有此珍美嗣主徵之或問細君置之何所對曰暫寄師叔寺中或曰婦人年少為德不一何不防閑答曰鎻之矣或曰其如水火何曰鑰匙已付之矣江南野史再娶妻亡再娶衛玠妻父樂廣有海内重名議者以為婦翁氷清女壻玉潤以天下大亂移家而行至江夏玠妻先亡征南將軍山簡見之甚相欽重簡曰昔戴叔鸞嫁女惟賢是與不問貴賤况衛氏權貴門户令朢之人乎於是以女妻焉姑女為繼温嶠事見姑舅注又互見繼室類再嫁生子再嫁聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁於齊管于奚生二子而寡以歸聲伯聲伯以其外弟為大夫而嫁其外妹於施孝叔郤犨來聘求婦於聲伯奪施氏婦以與之婦人曰鳥獸猶不失儷子將若何曰吾不能死亡婦人遂行生二子於郤氏郤氏亡歸二子於施氏施氏逆諸河沈其二子婦人怒曰已不能庇其伉儷而亡之又不能字人之孤而殺之將何以終遂誓施氏成公十一年喪夫再嫁諸葛恢女嫁庾亮子會婦既寡不復出嫁此女性兇强無有登車理恢既許江霦婚乃移家近之後誑女云宜徙於是家人一時去獨留女在後比其覺已不復得出江暮來女哭罵彌甚積日漸歇江暝而入宿但在對床上後觀其意轉江乃詐魘良久不寤聲氣轉急女乃呼婢云喚江郎覺江於是躍來就之曰我自是天下之男子卿何事而乃見喚耶既爾相闗不得不與人語女黙然而慙情誼遂篤恢女既改適與亮書及之答曰賢女尚少故其宜也感念亡兒若在初沒世説張女五嫁陳平事文君新寡相如事並見貧婚類四燈正坐筍采爽之女為隂喻妻而夫早亡爽逼嫁與太原郭奕采入郭氏家暮乃去帷帳建丨丨按劍丨丨郭不敢通三年不言李元盛后尹氏好學初適扶風馬元正再為元盛繼室以再醮之故丨丨丨丨鸞鏡對舞􅄢賔王獲一鸞不鳴夫人曰丨見類則鳴乃垂丨以照之鸞覩影乃悲鳴而舞異苑膠弦重續漢武帝時西海有獻膠五兩者武帝射於甘泉宫帝弓弦斷西使乞以所進膠續之弦兩頭遂相着曰可以射終日不斷帝大悦因名續弦膠博物志借用續親以妹繼室韓須如齊逆女齊陳無宇送女致少姜少姜有寵於晉侯晉侯謂之少齊少姜卒齊侯使晏嬰請繼室於晉曰寡君不腆先君之適以備内官焜燿先人之望則又無禄早世隕命寡人失望君義不忘先君之好惠顧齊國辱收寡人徼福於太公丁公二公齊先君照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妹若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰寡君之願也寡君不能獨任其社稷之事未有伉儷在衰絰之中是以未敢請君有辱命惠莫大焉若惠顧敝邑撫有晉國賜之内主豈惟寡君舉羣臣實受其貺其自唐叔以下實寵嘉之遂成婚左傳再娶少女崔浩娶郭逸女逸妻王氏竒浩以為得壻後女亡故以少女繼婚浩遂重結好繼納小妹李行修娶王仲舒女其㓜妹從其後女亡仲舒託行修續親夢女曰納小妹則妾幸矣李遂續王氏婚擇娶九姨龍圖劉公曄未第前娶尚書晃之長女早亡而趙氏猶有二妹皆未適人既而劉公登科晃捐館夫人復欲妻之使媒妁通意劉曰若有武有之德則不敢為姻如言禹别之州則庶可從命葢劉公不欲七姨為匹意欲九姨議親故也夫人諾曰諺云薄餅從上揭劉郎纔及第豈得便揀㸃人家女劉曰非敢有擇但七姨骨相寒薄遂娶九姨後生七子皆至大官七姨後適闗生竟不第落泊寒餒暮年劉氏養之終身青箱雜記再娶小姨歐陽公修與王宣徽拱辰同為薛簡肅公子壻文忠公先娶長女王拱辰娶其次後文忠丨丨其妹故文忠有舊女壻為新女壻大姨夫作小姨夫之戯約婚指腹為婚賈復與五校戰大破之復傷瘡甚光武驚曰失吾名將聞其婦有孕生女邪我子娶之生男耶我女嫁之懷孕許婚韋放字元直與呉郡張率皆有側室懹孕因指腹為昏其後各産男女未及成長而率亡及為北徐州刺史時有貴族請昏者放曰吾不失信於吾友乃以息岐娶率女又以女適率子時稱放能篤舊南史齎裝尋約東都仁和里裴尚書寛子孫衆盛實為名閥天后時宰相魏元同選為壻未成婚而魏陷羅織獄家徙鎮嶺表及北還女已踰笄其家無以為資剪下髪為尼有一尼自外至曰女福豐厚必有令匹子孫將遍天下宜北歸家人遂不敢議及荆則裴賫裝以迎矣出栁玭家訓登第申好見有疾類不背前約求婚玉田得璧見夤縁類文書銜袖唐處士侯高將嫁其女曰吾一女怜之必嫁官人不以與凡子王適懐竒負氣曰吾求婦久矣聞侯翁可人意且闈其女賢謾謂媒嫗曰吾明經及第即官人侯翁女幸嫁若能令侯公許我即進百金嫗諾公曰誠官人即取文書來適計窮吐實嫗曰無苦我祗得一卷書粗若告身者我袖以往公未必取視公望見丨丨丨丨果信不疑曰足矣以女適王氏韓王適碑以上男家求女可求佳對晉元帝謂劉隗曰鄧氏晉妹卿丨為丨丨敬慕公子宗連謂趙元叔曰鄙人切不自量丨丨丨丨今有一女願為箕帚妾公子意何如元叔遂聘為妻以上係女家求男强婚强使委禽鄭徐吾犯之妹美公孫楚聘之矣公孫黒又使强委禽焉女曰子晢誠美矣抑子男夫也左傳强使婚昵唐于頔常怒判官薛正倫奏貶陜州長史比詔下頔中悔奏復署舊職正倫死以兵衛其居丨丨孽子丨丨何愛一女孫破虜呉夫人早失父母與弟景居孫堅聞其才貌欲娶之呉氏親戚將拒焉夫人曰丨丨丨丨以取禍乎以安六親中宮常侍唐衡欲以女妻汝南傳公明不娶轉以女妻荀彧彧父緄慕衡勢誡彧娶之為論者所譏臣松之云時閽竪用亊四海屏氣尤懼唐衡威權莫二順則六親以安違則大禍立至斯以存易亡之由昔蔣詡娶於王氏無損清高之操緄之此婚庸何傷乎典畧辭婚以逺悔婚王褒偉元與管彦為友約男女為婚彦後葬父於洛陽褒遂别嫁其女謂彦弟馥曰昔嫁姊妹皆逺吉凶斷絶今賢兄葬父洛陽而京邑豈吾結好之意哉馥曰嫂齊人也當還褒曰豈有葬父洛陽而隨妻去齊如此去就何婚之有因隙絶婚王珣兄弟皆謝氏壻以猜嫌致隙太傅遂與珣兄弟絶婚珣在東聞安薨便出京師詣族弟獻之曰吾欲哭謝公獻之驚曰所朢於法䕶於是直前哭之甚慟法䕶珣小字魏袁術字公路為子索吕布女後布怨術女已在塗追還絶婚怒郤求婚王述字懷祖子坦之為桓温長史温欲為子求婚於坦之及還省父而述愛坦之雖長太猶抱寘膝上坦之因言温意述大怒遽排下曰汝竟癡耶詎可畏温面而以女妻兵耶辭弗與婚魏王謙為大將軍何進長史進以名公之胄欲求為婚見其二子使擇焉謙弗許一語謝絶謝尚書裒求婚諸葛恢小女恢曰我不能與謝裒兒婚一語敗盟白敏中為相嘗欲以進士侯温為子壻且有日矣其妻盧氏曰身為宰相願為我壻者多矣已既姓白又以侯氏子為壻必為人呼作白侯耳敏中乃止焉以上係女家辭婚辭齊非偶春秋鄭太子忽有功於齊齊侯請妻之忽丨人問其故答曰人各有偶丨大丨吾丨畏霍權盛漢雋不疑字曼倩為京兆尹大將軍霍光欲以女妻之不疑畏其盛大固辭張範辭袁魏丨丨字公儀袁隗欲以女妻範範丨不受亘諧辭劉丨丨字伯緒劉表欲以姪女妻之辭因陳張處拒不受不為亂倫晉陸玩為侍中司空兄􅁮為尚書僕射録光禄事父英高平相玩子納尚書令王導初至江左請婚於陸陸曰培塿無松栢薰猶不同器玩丨丨丨丨之始不結高門見擇婦門以妻讓兄蒼吾繞娶妻而美讓與其兄讓則讓矣非禮之讓也家語辭室與弟敝無存之父將室之辭以與其弟曰此行也不死必娶高國注言欲立功娶卿相女係男辭婚詩集結婚冉冉孤竹生結根太山阿與君為新婚絲附女蘿絲生有時夫婦㑹有宜千里逺丨丨悠悠隔山陂思君令人老軒車來何遲傷彼蕙蘭花含英揚光輝過時而不來將隨秋草萎君亮執高節賤妾亦何為古樂府擇婦天下無正聲悦耳即為娯人間無正色悦目即為姝聲色非相逺貧富則有殊貧為時所棄富為時所趍紅樓富家女金縷繡羅襦見人不歛手嬌癡二八初母兄未開口已嫁不須臾緑窻貧家女寂寞二十餘荆釵不直錢衣上無真珠幾聞人欲聘臨日又踟躇主人會良媒置酒滿玉壺四坐且勿飲聽我歌兩途富家女易嫁嫁早輕其夫貧家女難嫁嫁晚孝於姑聞君欲娶婦娶婦意何如白居易議婚貴婚鳴鸞桂樹舉士江南子各以能詩聞一來取高第官佐東宫軍迎婦丞相府誇映秀才羣丨丨丨丨間觀者何紛紛韓送陸暢詩碧雞蓮幕蔡君謨娶葛常之祖姑清源君已而赴漳南幕常之曽祖通議贈詩曰藻思舊傳青管夢哲科新試丨丨才乍依仲寳丨花丨更下温郎玉照臺玉京狀頭盧儲投卷謁李翺尚書長女及笄見文尋繹數四曰此人必為狀頭李聞之乃慕為壻來年果狀頭及第過殿試徑赴佳期作催粧詩曰昔年將去丨丨遊第一仙人許丨丨今日已成秦晉會早教鸞鳯下粧樓青桂嫦娥袁筠娶蕭安女言定未幾而擢第羅隠詩云細看月輪還有意定知丨丨近丨丨富婚金屏繡褥杜詩李監宅屏開金孔雀褥隠繡芙蓉門闌多喜色女壻近乘龍繡襦甲帳文蕭抵山西睹一姝歌曰若能相伴陟仙壇應得文蕭駕采鸞自有丨丨并丨丨瓊臺不怕雪霜寒貧婚見擇婦注世婚兩姓婚姻徐州古豐縣有村曰朱陳去縣百餘里桑麻青氛氲機梭聲札札牛駒走紛紛女汲澗中水男採山上薪縣逺官事少山深人俗淳有財不行商有丁不入軍家家守村業頭白不出門生為陳村氏死為陳村塵田中老與㓜相見何欣欣一村唯丨丨世世為丨丨親疎居有族少長遊有羣黄雞與白酒歡會不隔旬生者不逺别嫁娶先近隣死者不逺葬墳墓多遶村既安生與死不苦形與神所以多夀考往往見𤣥孫我生禮義鄉少小孤且貧離亂失故鄉骨肉多散分江南與江北各有平生親存者終日别逝者隔年聞悲火燒心曲愁霜侵鬢根一生若如此長羨陳村民白樂天朱陳村一村嫁娶向年顧陸丹青手畫作朱陳嫁娶圖聞道一村唯兩姓不將門户嫁崔盧我是朱陳舊使君勸農曽入杏花村而今風雨那堪畫縣吏催錢夜打門東坡題陳季常所蓄朱陳村圖㓜婚十四為婦妾髮初覆額折花門前劇郎騎竹馬來遶床弄青梅同居長千里兩小無嫌猜丨丨丨君丨羞顔未嘗開低頭向暗壁千喚不一迴十五始展眉願同塵與灰常存抱柱信豈上望夫臺十六君逺行瞿唐灧澦堆五月不可觸猿鳴天上哀門前舊行迹一一生蒼苔苔深不可掃落葉秋風早八月蝴蝶黄雙飛西園草感此傷妾心坐愁紅顏老早晚下三巴預將書報家相迎不道逺直至長風沙李白長千行結髮為妻絲附蓬麻引蔓故不長嫁女與征夫不如棄路旁丨丨丨丨子席不煖君床暮婚晨告别無乃太怱忙君行雖不逺守邊赴河陽妾身未分明何以拜姑嫜父母養我時日夜令我藏生女有所歸雞狗亦得將君今生死地沉痛迫中腸誓欲隨君往形勢反蒼黄勿為新婚念努力事戎行婦人在軍中兵氣恐不揚自嗟貧家女久製羅襦裳羅襦不復施對君洗紅粧仰視百鳥飛大小必雙翔人事多乖迕與君永相望杜新昏别程正叔言婚姻結髮無義欲去之久矣言結髪為夫婦者只稱其少小也如言結髮事君結髪事匈奴只言初上頭時也豈謂合髻子耶子厚云絶非禮義便當去之語録晩婚猶是孩兒陳嶠子景山數舉不遂暮年獲一第鄉里以儒家女妻之時近耳順矣合􅈟之夕嶠自成詩云彭祖尚年八百嵗陳郎丨丨小丨丨客皆絶倒南部新書不見年少盧彖有子弟暮年猶為校書郎晚娶崔氏崔有詞翰結褵之後微有嫌色盧因請賦詩以述懷為戯崔立成曰不怨檀郎年紀大不怨檀郎官職卑自恨妾身生較晚丨丨檀郎丨丨時同上藕花作愁白藕作花風已秋不堪殘睡更回頭晚雲帶雨歸飛急去作西窻一夜愁此趙德麟細君王氏所作也德麟既鰥居因見此篇遂與之為親余以為此二十八字媒也魚隱叢話桃花相笑劉原父再婚歐公以詩戯之云仙家千載一何長浮世空驚日月忙洞裏丨丨莫丨丨劉郎今是老劉郎西清詩話再婚嫁玉簮中折井底引銀瓶歌石上磨玉簮丨成丨央丨白氏六帖寶月修圓玉斧修成寶月圓月邊仍有女乘鸞王荆公辭婚賦鷂子詩高越燕人舉進士文價藹然鄂帥李簡賢之將妻以女越竊諭其意丨丨丨丨一絶書於壁不告而去詩曰雪𤓰星眸衆所歸摩天專待振毛衣虞人莫謾張羅網未肯平原淺草飛古今合璧事類備要前集卷六十
