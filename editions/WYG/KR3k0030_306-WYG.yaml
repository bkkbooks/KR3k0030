body:
  text: 古今合璧事類備要外集卷六宋謝維新撰祭祀門明堂禮經考索明堂者布政之宫也自周公宗祀文王配上帝於此而後明堂之祀舉焉更秦厯漢此禮幾廢明堂月令僅存耳葢至於武帝有公玉帶者以圖上於是始作於汶上如帶圖然乃祠泰一五帝用高祖配焉殆髣髴周人意也東都在國之南自後魏晉以涉宋齊梁陳隋唐制度各有不同我朝承五季之陋至仁考始以大慶殿為明堂而舉嚴父配天之禮於秋之季辛每三歳一行矣是則明堂宗祀之説也事類明庭黄帝接萬靈於丨丨即明堂也明堂起於黄帝其制中一殿四面九壁以茅葢通水水圜宫垣為複道上有樓西南入名崑崙天子從之以拜祀五府唐虞祀五帝於丨丨黄曰靈府赤曰文祖青曰神計白曰明統黑曰元秬清廟丨丨祀文王也周公既成洛邑朝諸侯率以祀文王焉詩又取其宗祀之清貌則曰丨丨蔡邕明堂論我將丨丨祀文王於明堂也丨丨我享維羊維牛維天其右之云云詩宗祀周公丨丨文王於明堂以配上帝是以四海之内各以其職來祭夏居孟丨丨明堂左个乘朱輅駕赤駵載赤旂衣朱衣服赤玉食菽與雞其器高以粗是月也以立夏先立夏三日太史謁之天子曰某日立夏盛德在大天子乃齊立夏之日天子親帥三公九卿大夫以迎夏於南郊記月令歲祠武帝欲治明堂奉高旁未曉其制度濟南人公玉帶上黄帝時明堂圖於是作明堂汶上及是丨修封則丨太一五帝於明堂上坐合高皇帝祠坐對之明年冬至日祀上帝於明堂其贊饗曰天增授泰元神筴周而復始前郊祀志營北郊光武中元二年初丨丨丨明堂如南郊明帝永平二年春祀光武於明堂以配五帝樂並丨丨丨並郊祀志祀光武光武營立明堂顯宗行其禮宗丨丨丨於明堂威儀盛美矣後禮樂志祀文皇晉武帝宗丨丨丨於明堂以配上帝又晉明堂之祭備物以薦三牲兼陳籩豆成列禮祠人理故配以追考郊堂兆位居然異體牲牢晉禮志于汶上肅宗元和二年祀五帝丨丨丨明堂本紀又安帝延光二年祀汶上明堂如元和故事于學南南宋孝武帝大明五年起明堂丨國丨之丨丙巳之位本紀通神靈牛𢎞議明堂者丨丨丨感天地出敎化崇有德禮儀志直丙巳唐中宗將大享明堂陳貞節惡后所營非古木不鏤土不文之制與馮宗上言明堂必丨丨丨以憲房心布政太微上帝之所武后始以乾元正寢占陽午地先王所以布政故改殿作堂徹之日有音如雷庶民譁誑以為神靈不悦堂成災火從之后不修德俄復營剏殫用極侈詭禳厥變又欲嚴配上帝神安肯臨且密邇掖庭人神雜擾是所謂不可放物者也六帖告朔迎氣王方慶言舊制天子歲入明堂者十八享一丨丨十二四時丨丨四巡守歲一同上布政祭天魏證請為五室重屋上圓下方既體有則象又事多故實下室有丨丨之宫上堂為丨丨之所人神不雜禮亦宜之其高下廣袤之規九筵丈尺之制則隨時立法因事制宜同上為大享祭仁宗皇祐二年文彦博丨丨丨明堂丨三卷長編修㑹慶禮哲宗元祐四年有司因天聖之故事丨丨丨之盛丨將俾文武稱慶矧皇帝致賀於禁中羣臣奉表於闈左將來明堂禮畢不受賀百官並内東門拜表太皇太后明堂禮成罷賀賜詔報本敎民神宗元豐三年御札具嚴昭事用伸丨丨之誠明示有尊兼廣丨丨之道報本寧親徽宗政和七年御札相方視址於國之陽面勢飭材循周之舊裒對四時之序甄陶二氣之和達鄉重簷脗合六經之墜緒方輿圓葢是興萬世之閎摹賓筵五府之中秖薦九州之味具伸丨丨斯昭萬寳之成誕示丨丨以敎諸侯之孝裒對陟配仁宗皇祐二年赦制洪惟事天四祭而上辛雩禘間或躬行奉郊三年而天神祖宗須崇並侑唯時總章未展嚴報沿酌舊章參求博議丨丨二靈丨丨三后賓以太微之坐陪以赤縣之祇幣玉普登精純咸薦四海來職六樂且修越前欵於琳宫復祇祼於清廟躬祠嚴配嘉祐七年赦制高惟上帝之稱非丨丨不足以昭乎䖍聖惟文考之尊非丨丨不足以盡乎孝於是備法物之駕服大冕之章格靈埃於真庭欵清光於大宇還祇宗祀之舉具飭純誠之將迺神光陸離獨於薦鬯之夕嘉氣休異被於欽柴之時盡遵禮典皇祐二年詔丨丨丨丨凡乘輿服御諸令裁減之以伸昭事政和七年明堂御札手詔欽若昊天率見昭考將來明堂專以配帝嚴父餘悉移於大慶文德殿丨丨丨丨之義循仁祖規神宗熙寧七年赦逺述周公之志近丨丨丨之丨裒對上帝將以示民之有尊賓延五精不忘報祖之由出用皇祐典哲宗元祐二年蘇轍乞詔今後明堂丨丨丨丨禮熙烈祖典哲宗元祐六年御札卜用秋杪裒對天明以儀式刑文考之謨以維清緝丨丨丨之丨昭事上帝神宗元豐三年赦乃涓路寢之室以度崇堂之筵諏季秋之靈辰備庶物之美報駕齋輅之潔建鸞旗之華被衮冕以欵琳宫執鬯圭以祼清廟逺登陽館之陛大奏我將之詩文物粲庭而輝煌璧玉爛席而華絢丨丨丨丨克禋克祀而精意通燕及皇天如幾如式而美祥下悽然涼露之感肅然榮光之臨靈承一天哲宗元祐元年赦維兹肇禋屬予訪落欽言總章古重宗祀以敎諸侯之孝以得萬國之心我享維天下武式文王之典大孝嚴父孔子謂周公其人嘉與四海丨丨丨丨革顯慶之並尊隆永徽之專配奉罍琳宮奠玉路寢神之弔矣燕及皇天誰其配之既右烈考靈游而風馬下孝奏而日月光惕然履霜詎勝悽愴之意僾然出户如聞歎息之音秩祐賚我思成侍臣助予測楚帝親並饗元祐四年赦肆我昭考稱秩彞祠周爰羣策之長專崇一辛之配前期戒衆先甲端誠始欽崇於真館族備物於大庭作主有神丨與丨而丨丨奠匏及贊薦暨祼以交行一純格而高明歆四氣和而諸福應明靈昭格徽宗大觀元年赦禮緝熙豐之討論樂用崇觀之制作雖廣筵猶因乎路寢而均律己得乎中聲朝獻殊庭祼將太室還登陽館之陛大奏合宫之歌駿奔之多士秉文顯相之羣公咸一丨丨丨丨貺施蕃衍祝嘏並告乎孝慈風采胥來而􅆄蠁命工伻圖徽宗政和五年明堂制度御筆手詔永惟嚴父享帝之禮尚闕未備取考工記所載考其互見之文得其制作之本丨丨丨丨莫不備具置司建立朕萬幾之暇取夏后氏益五室之度兼商人四阿重屋之制從周人度以九尺之筵兼三代之制黜諸儒之臆説享帝嚴父聽朔布政於一堂之上宜令明堂使司遵圖建立同上增元豐光徽宗政和七年赦四海㑹同用繼皇祐肇基之志五位時序益丨丨丨垂裕之丨工祝告親製之辭備樂奏於修之律依熙寧位高宗紹興元年有司言合祭昊天上帝地祇於明堂奉太祖太宗配丨丨丨設從祀位聖政稽紹興制孝宗稽皇祐丨丨丨丨有事明堂黎明肆赦孝宗淳熙六年大享己巳齋宿霖雨交作辛未行禮月色如晝上拜起不倦以迄於成丨丨丨丨人情熙然詔禮儀祀物悉皆如故凡乗輿服御一切減省班固明堂詩於昭明堂明堂孔陽聖皇宗祀穆穆煌煌上帝宴饗五位時序誰其配之世祖光武普天率土各以其職猗歟緝熙永懷多福李白明堂賦昔在天皇告成岱宗改元乾封經始明堂年紀總章時締搆之未輯痛威靈之遐邁天后繼作中宗成之因兆人之子來崇萬祀之丕業葢天皇先天中宗奉天累聖纂就鴻勲克宣臣白美頌恭惟述焉其辭曰伊唐皇天之革天創元也我髙祖乃仗大順赫然雷發以首之於是橫八荒漂九陽掃叛換開混茫景星耀而太階平虹蜺滅而日月張欽若太宗繼明重光廓區宇以立極綴蒼昊之頽綱淳風沕穆鴻恩滂洋武義烜赫於有截仁聲馺沓乎無疆若乃髙宗紹興拓統錫羨神休旁臻瑞物咸薦元符剖兮地珍見既應天以順人遂登封而降禪將欲考有洛崇明堂惟厥功之未輯兮乘白雲於帝鄉天后勤勞輔政兮中宗以欽明克昌遵先軌以繼作兮揚列聖之耿光則使軒轅草圖羲和練日經之營之不彩不質因子來於四方豈殫税於萬室乃凖水臬攢雲梁罄玉石於隴坂空瓌材於瀟湘巧奪神鬼髙窮昊蒼聽天語之察察擬帝居之鏘鏘雖暫勞而永固兮始聖謨於我皇觀夫明堂之宏壯也則突兀朣朧乍明乍蒙像太古元氣之結空巃嵸頽沓若嵬若嶪似天閫地門之開闢爾迺劃岝峉以嶽立郁穹崇而鴻紛冠百王以垂勲燭萬像而騰文窙恍惚以洞啟呼嵌嵓而傍分又比乎崑山之天柱矗九霄而垂雲於是結搆乎黄道岧嶤乎紫微絡鈎陳以繚垣闢閶闔而啟扉崢嶸􅡳嶷粲宇宙之光輝怱霍赫奕張天地之神威夫其背泓黄河垠瀨清洛太行却立通谷前廓逺則標熊耳以作揭豁龍門以開關㸃翠彩於洪荒洞清陰乎羣山及乎煙雲巻舒忽出乍沒岌嵩噴伊倚日薄月雷霆之所鼓蕩星日之所伾扢挐金龍之蟠蜿挂天珠之硉矹勢拔五嶽形張四維軋地軸以盤根摩天倪而創規樓臺崛岉以奔附城闕嶔岑而蔽虧珍樹翠草含華揚㽔目瑶井之熒熒拖玉繩之離離㨖葉葢以儻漭仰太微之參差擁以禁扃横以武庫獻房心而開鑿瞻少陽而舉措採殷制酌夏步雜以代室重屋之名拓以辰次火木之數壯不及奢麗不及素層簷屹其霞矯廣厦鬱以雲布掩日道遏風路陽烏轉影而翻入大鵬横霄而側度近則萬木森下千宫對出熠乎光碧之堂炅乎瓊華之室錦爛霞駮星錯波沏颯蕭寥以颼飀窅陰鬱以櫛密舍佳氣之青葱吐祥煙之鬰嵂九室窈窕五闈聨緜飛楹磊砢走栱夤縁雲楣立岌以横綺綵桷攢欒而仰天皓壁晝朗朱甍晴鮮赬欄各落偃蹇霄漢翠楹迴合蟬聨汗漫沓蒼穹之絶垠跨皇居之太半逺而望之赫煌煌以輝煌忽天旋而雲昏迫而察之粲炳煥以照爛倐山訛而晷換跨蓬壺之海樓吞岱宗之日觀猛虎失道潛虯登梯經通天而直上俯長河而復低玉女攀星於網户金娥納月於璇題藻井彩錯以舒蓮天忩赩翼而銜霓扶摽川而罔足擬跟桂而罷躋要離歘矐而沮積精視氷背而中迷亘以複道通乎掖垣坌入西樓是為崑崙三事庶尹正儀躅以出入九夷五狄順方面而來奔其左右也則丹陛崿崿彤庭煌煌列寳鼎敵金光流辟雍之滔滔像環海之湯湯闢青陽啟總章廓明臺而布𤣥堂儼以太廟處乎中央發號施令采時順方其閫閾也三十六户七十二牖度延列位西八東九白虎列序而躨跜青龍承隅而蚴蟉其深沉奥密也則赤熛掌火招揺司金靈威制陽汁光摧隂坤斗王土據乎其心若乃熠耀五色張皇萬殊人物禽獸竒形異模勢若飛動瞪眄睢盱明君暗主忠臣烈夫威政興滅表賢示愚於是天正孟月朝陽登曦天子乃拖蒼玉轡蒼螭臨乎青陽左个方御瑶瑟而彈鳴絲展乎國容輝乎皇儀旁瞻神臺順觀雲之軌俯對清廟崇配天之規欽若􅆄蠁維清緝熙崇牙樹羽熒煌葳蕤納六服之貢受萬邦之籍張龍旗與虹旌攢金㦸與玉戚延五更進百辟奉珪瓚獻琛帛顒昂俯僂儼容疊跡乃絜菹醢修粢盛奠三犧薦三牲享於神靈太祝正辭庶官精誠鼓大武之隠轔張鈞天之鏗鍧孤竹代奏空桑和鳴盡六變齊九成羣神來兮降明庭葢聖主之所以孝治天下而享祀窅㝠也然後臨辟雍宴羣后陰陽為庖造化為宰飡元氣酌太和千里鼓舞百寮賡歌於斯之時雲油雨霈恩鴻溶兮澤汪濊四海歸兮八荒會哤聒乎區㝢駢闐乎闕外羣臣醉德揖讓而退而聖主猶夕惕若厲懼人未安乃目極於天耳下於泉飛聰馳明無逺不察考鬼神之奥推陰陽之荒下明詔班舊章振窮乏散敖倉毁玉沉珠卑宫頽牆使山澤無間往來相望帝躬乎天田后親於郊桑棄末反本人和時康建翠華兮萋萋鳴玉鑾之鉠鉠遊乎昇平之圃憩乎穆清之堂天欣欣兮瑞穰穰巡陵於鶉首之野講武於驪山之旁封岱宗而祀后土掩栗陸而包陶唐遂邀崆峒之道禮汾水之陽渴飲沆􅒭之精黜滋味而貴理國其若夢華胥之故鄉於是元元澹然不知所在若羣雲從龍衆水奔海此真所謂我大君登明堂之政化也豈比夫秦趙吳楚爭髙競奢經阿房與叢臺建姑蘇及章華非享祀與嚴配徒掩月而凌霞由此觀之不足稱也况瑶臺之巨麗復安可以語哉敢揚國美遂作辭曰穹崇明堂倚天關兮巃嵸鴻濛搆瓌材兮偃蹇坱􅀈邈崔嵬兮周流辟雍岌靈臺兮赫奕日噴風雷宗祀􅆄蠁王化𢎞恢鎮八荒兮通九垓四門啓兮萬國來考休徵兮進賢才儼若皇居而作固窮千祀兮悠哉王臨川郊宗議問郊祀后稷以配天宗祀文王於明堂以配上帝二者皆配天也或於郊之圓丘或於國之明堂或以冬之日至或以季秋之月或以祖或以襧或曰配天或曰配上帝其義何也對曰天道升降於四時其降也與人道交其升也與人道辨冬日至天與人道辨之時也先王於是乎以天道事之秋則猶未辨乎人也先王於是以人道事之以天道事之則宜逺人宜以自然故於郊于圓丘以人道事之則宜近人宜以人為故於國之明堂始而生之者天道也成而終之者人道也冬之日至始而生之之時也季秋之月成而終之之時也故以天道事之則以冬之日至以人道事之則以季秋之月逺而尊者天道也邇而親者人道也祖逺而尊故以天道事之則配以祖襧邇而親故以人道事之則配以襧郊天祀之大者也徧於天之羣神故曰以配天明堂則弗徧也故曰以配上帝而已夫天與人異道也天神以人事之何也曰所謂天者果異於人邪所謂人者果異於天邪故先王之於人鬼也或以天道事之蕭合稷黍臭陽達於牆屋者以天道事之也嗚呼天人之不相異非知神之所為其孰能與於此此禮也尚矣孔子何以獨稱周公曰嚴父配天者以得天為盛天自民視聽者也所謂得天得民而已矣自生民以來能繼父之志能述父之事而得四海之驩心以事其父未有盛於周公者也王臨川明堂樂章穆穆在堂肅肅在庭於顯辟公來相其成神既歆止有聞維馨錫我休嘉燕及羣生右歆安之曲有奕明堂萬方時㑹宗子聖考作帝之配樂酌雲典禮從周制釐事既成於皇東暨右皇帝還大次憩安之曲詩集六變舞雲門貂冕相輝映珩珮自相喧香浮鬱金酒煙裏鳳凰尊四圭邸蒼玉丨丨丨丨丨梁孝元九筵嚴太室辰火天文次皋門路寢閎奉親昭孝徳惟帝享精誠禮以三年諦時因萬物成丨丨丨丨丨六變導和聲象魏中天起風雷大號行歡呼響山岳流澤接根莖寶墨飛雲動金文耀日晶從臣才力薄無以頌休明歐陽永叔明堂慶成雩祭禮經考索雩之為祭為旱設也三代以前經不之見自周禮地官有舞旱暵供雩斂之事則雩祭之名於此始見厥後春秋之季多有非時而舉者秦漢以來遇旱則舉惟唐則獨詳焉本朝承唐之季其禮典大率踵唐之制云事類皇舞舞師敎丨丨旱暵之事禮瓢齎禜門用丨丨注甘瓢去柢為樽雩斂稻人旱暵供其丨丨注發斂也並禮雩禜丨丨祭水旱也記旱舞女巫丨暵則雩丨記旱備魯僖二十一年夏大旱公欲焚巫尫臧文仲曰非丨丨也修城郭貶食省用務穡勸分此其務也左龍見丨丨而雩注蒼龍見巳月得雨丨丨曰雩榖梁不雨一時而言丨丨有志於民也毛澤未盡人力未竭古人重請請道去讓同上夏大雩月令仲丨丨丨用盛樂乃命百縣雩祀有益於民者以祈穀實記秋大雩丨丨丨書不時也左巫禱雨僖二十一年夏大旱公欲焚巫尫臧文仲曰巫尫何為天欲殺之則如匆生若能為旱焚之滋甚公從之注巫尫女丨也主祈丨請丨者巫接神歲旱魯穆公召縣子而問焉曰天久不雨吾欲暴尫而奚若曰天則不雨而暴人之疾子毋乃不可歟然則吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎注丨主丨丨亦覬天哀而雨之周禮女巫旱暵則舞雩記閉諸陽立春至立夏雨澤若少社稷公卿官長以次行雩祀以求雨丨丨丨左禜諸門若霖雨則京城丨丨丨别三日每日一禜不止祈山川嶽鎮海瀆三日不止祈社稷宗廟若州縣則禜城門及境内山川不已唐六典祀圓丘開元中典章差駁王仲丘欲合正觀顯慶二禮上言正觀雩祀上方上帝五人帝五官於南郊顯慶禮祀昊天上帝于圜丘臣謂雩上帝為百穀祈甘雨故月令大雩帝用盛樂鄭𤣥説帝天帝也乃天别號丨于丨丨尊天位也顯慶祀昊天與月令合而正觀嘗祀五帝矣請二祀皆用詔可禮圓丘顯慶丨于丨丨正觀雩丨丨丨祀于南郊正元雩德宗丨丨十三年四月丨于興慶宫並同上聚巫以禱馬璘拜行營節度使天大旱里巷為土龍丨丨丨丨璘曰旱由政不修即令徹之明日雨是嵗大穰白六帖與覡對舞黎幹復為京兆尹時大旱幹造土龍自丨巫丨丨丨彌月不應帝使毁土龍減膳節用既而霔雨孔六帖牲用方色武德定令每歲孟夏雩祀昊天上帝于圓丘景皇帝配丨丨蒼犢二五方上帝五人帝五官並從祀用丨丨犢十通典龍行雨法本朝真宗咸平二年旱魏初上雩禮五丨丨丨之丨長編柳宗元禜門文惟神配陰􅅤德司其翕闢能收水沴以佑成績淫雨斯降害于麰麥野夫興憂官守增惕諸陰既閉休證未獲敬用瓢齎以展周索納其雲氣復我川澤惟神是依式佇來格本集蜡祭禮經考索蜡之為言索也歲十二月合聚萬物有功於人者皆求其神以享報之也是禮也始於伊耆氏堯下迨於周始詳之秦漢而降此禮浸廢矣惟先農之祀僅存焉葢至於唐復於南郊行之然已皆非蜡之時矣我朝臨祭雖其時則似矣而較以古人索饗之義又非也是豈宜於古者果有不便於今歟事類疈辜大宗伯以丨丨祭四方百物注丨而磔之謂磔及蜡祭也周禮索饗歲十二月合聚萬物而丨丨之也蜡之祭也主先嗇而祭司嗇也祭百種以報嗇也饗農及郵表畷禽獸仁之至義之盡也古之君子使之必報之迎貓為其食田䑕也迎虎為其食田豕也迎而祭之祭坊與水庸事也曰土反其宅水歸其壑昆蟲毋作草木歸其澤皮弁素服而祭素服以送終也葛帶榛杖喪殺也蜡之祭仁之至義之盡也記致鹿羅氏丨丨與女而詔客告也以戒諸侯曰好田好女者亡其國天子樹𤓰華不斂藏之種也祭禽命有司修丨丨之禮註謂先蜡日獵禽獸以供蜡祭草服黃衣黃冠而祭息田夫也野夫黃冠黄冠丨丨也記草笠大羅氏天子之掌鳥獸者也諸侯貢屬焉丨丨而至尊野服也祈穀季冬天子乃蜡百神於南郊為來年丨丨於天宗謹財八蜡以記四方四方年不順成八蜡不通以丨民丨也順成之方其蜡乃通以移民也既蜡而收民息已故既蜡君子不興功始蜡伊耆氏丨為丨並記祭蜡周蜡國丨丨則吹􅃎頌擊土鼓以息老物白氏帖仲尼賓昔者仲尼與於蜡賓事畢出游於觀之上喟然而歎仲尼之喟葢歎魯也子貢觀丨丨丨於蜡子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蜡一日之澤非爾所知也並記祭竈神宣帝時隂子方嘗臘日晨炊丨丨丨見形子方再祀之以黄羊家至巨富搜神記遣獄囚元康初王長文試江源令縣牧得盜馬及發冢賊長文引見誘慰時遇臘晦皆丨歸家丨先有繫丨丨丨之謂曰敎化不明使汝等如此長文之過也蜡節慶祚歸就之上下善相憐樂過節還當為汝思他理郡吏惶懼爭請不許尋有赦令旡不感恩華陽國志祭百神䄍丨丨丨大明夜明在壇上神農伊耆各在壇下后稷在壇東五官田畯各在其方水墉坊各在其方壇之後唐禮志致百物自伊耆氏而有其禮古之君子使之必報之是報田之祭也其神神農初為田事故以報之樂以蕢桴土鼓夏后氏更名曰嘉平殷更名曰清祀周因之復名曰大䄍以歳十二月合聚萬物而索饗之春官宗伯以疈享祭四方百物䄍之神有八一曰先穡二曰司穡三曰農四曰郵表畷五曰猫虎六曰防七曰水庸八曰昆蟲索鬼神而丨丨丨通典寅日祭季冬丨丨䄍丨百神于南郊大明用犢二籩豆各四簋俎簠㽅各一神農及伊耆氏各用少牢一籩豆等與大明同后稷及五方十二次五官五方田畯五岳四鎮四海四瀆以下方别各用少牢一其日祭井泉於川澤之下用羊一卯日祭社穆於社宮二十八宿五方之山林川澤丘陵墳衍原隰鱗羽羸毛介水庸坊郵表畷猫虎及龍鱗朱鳥白獸𤣥武方别各用少牢一每座籩豆各二簠簋㽅俎各一䄍祭百八十七座唐通典戌日祭本朝太祖建隆四年和峴言聖朝以臘前七日蜡恐不應於禮請依開元故事蜡臘同用戌日長編定䄍儀高宗紹興十九年丨丨丨聖政柳宗元䄍說柳子為御史主祀事將䄍進有司以問䄍之説則曰合百神於南郊以為歲報者也先有事必質於戸部户部之詞曰旱於某水於某蟲蝗於某癘疫於某則黜其方守之神不及以祭余嘗學禮葢思而得之則曰順成之方其䄍乃通若是古矣繼而歎曰神之貌乎吾不得而見也祭之享乎吾不可得而知也是其誕漫􅐞怳冥冥焉不可執取者夫聖人之為心也必有道而已矣非於神也葢於人也以其誕漫􅐞怳㝠㝠焉不可執取而猶誅削若此況其貌言動作之塊然者也是設乎彼而戒乎此者也其㫖大矣或曰若子之言則旱乎水乎虫蝗乎厲疫乎未有黜其吏者而神黜焉而曰葢於人者何也予曰若子之云旱乎水乎虫蝗乎厲疫乎豈人為之耶故其黜在神暴乎眊乎沓貪乎疲弱乎非神為之耶故其罰在人今夫在人之道則吾不知也不明斯之道而存乎古之數其名則存而教之實則隠以為非聖人之意故歎而云也曰然則致雨反風蝗不為災虎負子而趨是非人之為則何以余曰子欲知其以乎所謂偶然者信矣必若人之為則十年九潦八年七旱者獨何如人哉其黜之曰茍明乎敎之道雖去古之數可矣反是則誕漫之説勝而名實之事喪亦足悲乎古今合璧事類備要外集卷六
