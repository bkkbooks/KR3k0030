body:
  text: 古今合璧事類備要後集卷七十四宋謝維新撰將帥門總將帥歴代沿革並見後逐官之下事類丈人師貞丨丨吉无咎易長子丨丨帥師以中行止同上文武丨丨吉甫萬邦為顯詩顯允丨丨方叔征伐玁狁鷹揚維師尚父時維丨丨虎臣矯矯虎臣在泮獻馘元老方叔丨丨克壯其猶干城﨣﨣武夫公侯丨丨赫赫丨丨南仲矯矯丨丨虎臣並同上六師司馬統丨丨書九伐大司馬以丨丨之法正邦國禮三行晉毁軍為丨丨將上行中行下行左傳輿師能令丨丨淹於君也注主兵車同上師旅班丨振丨書禮樂郤穀閲丨丨敦詩書乃將上軍左傳牙璋玉人丨丨以起軍旅周禮魚麗為丨丨之陣先偏後伍伍承彌縫云云旌動而鼔左傳五門孫吳六奇漢陳平丨出丨計梟將九江王布楚丨丨張良𫝊猛將丨丨如雲謀臣若虎李陵與蘇武書䕶軍陳平典丨丨本兵絳侯為太尉丨丨柄爰盎𫝊才氣李廣丨丨天下無雙方畧趙充國擊羌虜上問當用幾人曰兵難隃度臣願馳至金城圖上丨丨又霍去病不學古兵法顧丨丨何如耳並本傳一竒黥布楚共布戰為三軍欲以相救為奇云云此亦丨丨也九勝韓信絶甬道大破秦軍九戰丨丨特將漢功臣表亞將曹參𫝊誘騎李廣𫝊匈奴數千騎見廣以為丨丨又張良往來為游兵間候𫝊介子傳常為丨丨言為間而伺候拊髀馮唐傳上曰吾獨不得廉頗李牧為將豈憂匈奴哉馮唐傳推轂古王者之遣將也跪而丨丨曰闑以内寡人制之闑以外將軍制之同上易置漢高祖入韓信軍即其卧内奪其印麾召諸將丨丨之持重韓安國刁斗李廣𫝊注以銅作錡器受一斗夜擊持行丨丨史檀車耳不聞丨丨之聲檀車者兵車也後漢劉飛將吕布字奉先便弓馬膂力過人號為丨丨梟將王布優將諸葛亮之才於戎為長竒謀為短理氏之幹丨於丨鐵虎蔡祐與齊戰被明光甲所向無前齊人謂之丨丨杜彪梁西荆州刺史杜山從膂力過人便馬善射所佩霞明朱弓四石餘力毎出挑戰魏軍憚之號為丨丨虎將周瑜謂孫權曰劉備有闗張熊丨之丨又為世虎臣有飲馬長江之志又羽飛萬人敵齋斧凡將出必齋戒之廟受斧故云丨丨魏志授鉞唐渾瑊徳宗進狩山南瑊以諸軍衛入谷口帝臨軒丨丨用漢拜韓信故事又詔於廟堂授以斧鉞鑿門命將十䇿唐李靖累授開府獻丨丨以圖蕭銑三箭薛仁貴髙宗時九姓衆十餘萬令驍騎數十乗挑戰仁貴𤼵三矢輒殺三人虜氣懾皆降軍中歌曰將軍丨丨定天山壯士長歌入漢闗斗魁文昌宫上將以將列耀於丨丨史記厯書天目將為丨丨國命所寄燕集凱歌王大捷則丨丨周禮凱旋唐裴行儉大破突厥振旅丨丨飛將軍李廣為右北平太守匈奴號曰漢丨丨丨避之數歲不敢近李廣傳真將軍文帝時匈奴大入邊亞夫為將軍軍細柳以備胡上自勞軍至霸上棘門已而之細柳先驅至軍門都尉曰軍中聞將軍之令不聞天子之詔上使使持節詔將軍曰吾欲勞軍亞夫傳言開壁門天子按轡至中營亞夫以軍禮見天子為動改容式車文帝曰嗟乎此丨丨丨矣鄉者霸上棘門如兒戲耳亞夫可得而犯耶前周亞夫萬囊沙前韓信與龍且夾淮水陣信夜令人為丨餘丨盛丨壅水上流引軍半度擊且背水陣同上矍鑠翁馬援拜伏波將軍㑹劉向擊武陵五溪蠻長深入軍没援請行時年六十二帝愍其老援曰尚能被甲上馬帝令試之援據鞍顧盼以示可用帝曰丨丨哉是丨也虎頭相前班超相者謂超燕頷丨丨飛而食肉萬里侯丨也本傳楚龍庭後竇憲遂登燕然山勒石刻功紀漢威德令班固作銘曰躡冒頓之區落丨老上之丨丨銘燕然見上八陣圖作丨丨丨諸葛亮傳雞羽檄魏武奏事曰若有丨即插以丨丨又先見漢髙紀萬人敵項籍學丨丨丨又羽飛丨丨丨一身膽趙雲字子龍將數十騎值曹操軍大出雲遂前突其陣且鬭且却魏兵追至營雲大開門魏疑有伏兵引去雲以勁弩射魏兵魏兵驚駭自相蹂踐墮水死甚多備明旦至雲營視昨戰處曰子龍丨丨都是丨也蜀志半段槍哥舒翰為河西衙前將吐蕃大冦邊翰持丨丨丨當其鋒擊之元宗實錄四將印王忠嗣有武畧佩丨丨丨為隴西節度又職林上平戎十八策作露布傅奕字修期拜安遠將軍帝嘆曰上馬能擊賊下馬丨丨丨有角聲李靖兵法丨第一第二三四丨丨絶如第一聲絶右虞候捉馬驢之類奔走禦侮予曰有丨丨予曰有丨丨詩樽俎折衝仲尼曰晏子起於丨丨之間丨丨於千里之外不從中御國不可從外理軍丨可丨丨丨淮南子封外當資四丨丨事丨丨范蠡之賢國語疾雷卒電太公曰丨丨不及掩耳丨丨不及暝目雷合霆𤼵丨丨丨丨楊雄傳與分甘苦呉起丨士卒丨丨丨擊牛饗士李牧備鴈門市租皆丨輸入莫府日丨丨丨正合竒勝太史公曰兵以丨丨以丨丨田單傳正旗堂陣無邀正丨之旗毋擊堂丨之丨孫子減竈增竈孫臏丨丨虞詡丨丨上史下漢拔幟立幟韓信丨趙丨立漢丨名重泰山藺相如國之爪牙漢李廣斬霸陵尉上書自陳上報曰將軍者丨丨丨丨提鼔援枹范蠡應使者曰左丨丨右丨丨國語秉鉞抗旌大將軍丨丨丨丨終軍傳設壇具禮韓信傳擇日齋戒丨丨丨丨拜為大將一軍皆驚授鉞四七丨丨丨丨東都賦馬箠下城杖丨丨丨數丨張耳枕席過師信威千里從丨丨上丨丨趙充國戰勝攻取前髙帝曰連百萬之衆丨必丨丨必丨吾不如韓信人傑漢書雅歌投壺祭遵為將軍取士皆用儒術對酒設樂必丨丨丨丨雖在軍旅不忘俎豆也東觀漢記横行匈奴十萬横行舞隂侯之毅氣又單于嘗為書嫚吕太后太后怒上將軍樊噲曰臣願得十萬衆丨丨丨丨中季布曰可斬也武暢四海陳湯威震百蠻丨丨丨丨威如破竹杜預曰今兵丨已振譬丨丨丨數節之後皆迎刃而解虜在目中光武西征隗囂召馬援至於帝前聚米為山谷帝曰丨丨吾丨丨矣燕頷虎頭班超見前蚪鬚猿臂郭知連誓清中原晉元帝定江南以祖逖為奮威將軍豫州刺史逖渡江中流擊楫而丨曰祖逖不能丨丨丨而濟者有如大江飲馬長江詳見前虎將下注孫呉聒耳丨丨之言丨乎將丨王符潜夫論孫呉暗合行師用兵之要不必取丨丨而丨與之丨乗月清嘯晉劉琨為并州都督拜大將軍在晉陽為胡騎所圍琨丨丨登樓丨丨賊聞之悽然長嘆中夜奏胡笳向曉復吹之賊棄圍走乗風破浪宗慤曰願丨長丨萬里丨宋史高山深溪賞如丨丨罰如丨丨將猛四七魏都賦嚴霜時雨怒如丨丨喜如丨丨魏志龍驤虎奮梟其元首丨丨丨丨同上虎視龍驤信陵丨丨丨丨傳𤣥古今畫贊驅鹿角圍徐晃字公明為平冦將軍討闗羽入圍破之太祖令曰曽丨丨丨小重丨魏志赤兎突陳吕布有良馬曰兎常與其親近乗丨丨而陷鋒矢丨丨曉暢軍情將軍向寵性行淑均丨丨丨丨諸葛亮出師表卧息旗鼓諸葛亮屯陽平兵少自若敕軍卧旗息鼔八陣七擒諸葛亮因丨丨以施武經丨丨以即戎柳氏家錄八遇八克婁師德字宗臣武后時猛士討吐蕃乃自奮戴紅抹額來應詔後共虜戰丨丨丨丨美箭良弓材摽丨丨門襲丨丨軍法盈懷兵規指掌燕公制右刀左矟西郡南郢州刺史耿令貴謂所部曰大夫見賊須丨手拔丨丨手把丨莫皺眉畏死止雪反風王俊將并州兵濟河討突厥晦間行拾趣山谷夜遇雪恐失期誓於神曰睃事君不忠不討有罪天所殛者當自蒙罰心誠忠而天監之則丨丨丨丨俄而和霽晙自東道追及之獲餘三千傾山碎卵丨丨丨丨景帝傳酹酒祝江隋賀若弼丨丨丨丨得𦵏魚腹中死且不恨蹀血虜庭唐李靖為定襄行軍總管領勁騎三千丨丨丨丨職林飲冰授斧丨丨丨丨指授揚麾燕集提鼓揮桴唐薛登上疏丨丨丨丨臨難決疑此將事也一劍之任非將事也將門有將楊元感求領兵煬帝曰相門必有相丨丨必丨丨西平有子李晟子李愬晟封西平王柳文平淮雅曰丨丨丨丨轅門二龍烏承玭字徳潤開元中共族兄承恩皆為平盧先鋒號丨丨丨丨黄騶少年裴果常乗驄馬白袍先陷陣時號為丨丨丨丨降騎十萬郭子儀家傳永泰元年僕固懷恩結吐蕃囘紇合圍涇陽是時也兩軍相對控絃未𤼵公獨以騎出降隂山十萬騎破賊五千唐馬璘以百騎丨丨丨丨光弼則曰吾未見以少擊衆如馬璘者矣以少擊衆見上取糧於敵郝玭貞元中在邊積三十年毎討賊不持糗糧丨丨丨丨雨洗風霾丨丨天兵丨丨虜醜李晟廟碑卯命辰行高崇文為長城使奉詔征劉闢御軍常若冦至丨受丨而丨丨器用無闕中興鋭將馬璘武榦絶倫遭時屯以忠力奮為丨丨丨丨太微上將丨丨丨丨楊炯魏將軍碑振旅凱旋唐裴行儉大破突厥丨丨丨丨旌義懷忠劉昌主平涼刼盟亡殁冡名丨丨家號丨丨唐紀開壁斫營貞元三年尚結贊入冠諸軍丨丨俱丨丨先鋒白衣薛仁貴從征遼東恃驍勇乃異其服色著白衣太宗遥見之問丨丨丨丨者為誰特引見賜馬絹喜得彪將翩翩飛將丨丨丨丨董我三軍李德裕集號望英樓高宗命英公勣伐高麗旣破上於苑中樓上望丨丨丨丨僉載補遺勇冠三軍薛仁貴丨丨丨丨名可震敵魚麗鶴列丨丨丨丨酉陽雜俎五將三門天有大一丨丨丨丨凡舉事皆欲𤼵三門順五將一虎萬鹿丨丨當溪不敢過言守之上通典引主子横槊賦詩曹操乂赤壁賦㑹宴賦詩王侍中智興武畧英竒敕授徐州而制雄材磊落幕府旣開所辟皆儒者一旦從事於使院丨丨從容丨丨頃之遺於王公乃召䕶軍俱至王公曰前某以韜畧發迹未曽留心章句云云遂乃引紙援毫頃刻而就云平生弓劍自相隨剛被郎官遣作詩江南花柳從君詠塞北烟塵我獨知擁麾為漢將北伐詩漢將出山西馬多冀北丨丨丨丨丨安邊擇良將丨丨境立功名在於丨丨丨決疑此將事持鼔揮桴臨難丨丨丨丨也一劍之任此將事也薛登疏名聲暴夷貉丨丨丨於丨丨威稜澹乎隣國顧盼示可用馬援見上矍鑠翁注卧驚營不動髙壘深溝丨丨丨而丨丨地營鳥陣臨死地而無疑蓋公集臨死地無疑見上弟兄惟頗牧惟丨丨丨莫非丨丨元集行李原制金氣凝將星丨方之丨丨為丨丨王者法天選命豪傑授之以鉞白集制西顧九羌釁皷皇情丨丨則丨丨丨丨詔書北伐則六狄焚旗北伐六狄焚旗見上匈奴未滅第何營丨丨丨甲丨丨丨壯士不還塞風自起楊盈川碑匈奴未滅家何為霍去病上為治第令視之對曰丨丨丨丨臣何以家為也平江南歸載圖籍本朝曹彬諡武惠討蜀師還輜重甚多或言悉竒貨也太祖密令伺之圖書也無銖金寸帛之附焉又丨丨丨舟丨無他物惟丨丨十衣被而已言行錄與西賊戰帶面具狄青丨丨丨丨毎帶銅丨丨被髪出入行陣間未嘗中箭而上未識其面遂令圖形以進青家令軍中聞鉦一聲則上再聲則嚴陣而陽却鉦聲止則大呼而突之士卒皆如教終遇敵未接戰遽聲鉦士卒皆止再聲皆却虜人大笑相謂曰孰謂狄天使勇鉦聲止忽前突之敵兵大亂自相蹂踐死者不可勝計射虜貴人而憚服曹公瑋在秦州西番犯塞虜陣有出布陣虜貴人也瑋使射之一𤼵而斃虜鳴笳而道瑋以大軍乗之虜衆大敗係斬萬計西番由是憚服至今不敢犯塞毎言及瑋之則呼為父同上射死韃覽而請盟勸上𤼵瑋城王下馬自澶淵之設高武烈王瓊扶輦擁衆渡河種酋失色及丨丨丨丨請盟奉書虜遂從戮湖寇應飛來之䜟寇湖楊么自持其險賊中語曰有能害我除是飛來俄詔用岳飛適值大旱公命伐木為巨筏塞諸港㲼賊戰敗趨舟欲出湖而舟為筏所碍不能遁遂戮死招降之飛來之䜟於是乎驗並同上捷海州有酋首之獲李寶至東海縣時敵兵已圍丨丨寳麾相登敵驚引去寳引舟師至密之膠西石臼島敵泊唐島相距止一山候風即南不知王師之卒至丙寅風自南來衆喜爭