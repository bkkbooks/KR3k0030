body:
  text: 古今合璧事類備要後集卷三十七宋謝維新撰三監門著作郎歴代㳂革漢東京圖書悉在東觀故使名儒碩學入直東觀撰述國史謂之著作東觀皆以佗官領焉葢有著作之任而未為官員也蘭臺令史班固傅毅洛陽令陳崇長陵令尹敏司𨽻校尉孟兾及楊彪等並著作東觀魏明帝大和中始置著作郎官𨽻中書省專掌國史衞顗以侍中尚書典著作後又置佐著作郎亦屬中書晉祕書監自調補之大元四年詔祕書无監使吏部選佐著作郎有監復舊又閻纂集云鄒湛謂祕書監和嶠曰閻纂可佐著作嶠曰此職閑重勢貴多争不暇表才按此則大著作亦監自晉元康詔曰著作舊屬中書令祕書既典文籍宜改中書著作為祕書著作於是改𨽻祕書後别自置省謂之著作省而猶𨽻祕書著作郎一人謂之大著作專掌史任李充為大著作於時典籍混亂充刪除煩重分作四部祕職以為永制又荀朂以中書監孫盛以祕書監並領為著作孫綽以散騎常侍及陳書並為大著佐佐著作郎始到職必撰名臣𫝊一人宋初廢其制宋齊以求遷佐於下謂之著作佐郎亦重國史集注起居梁初周捨裴子野皆以他官領其職與大著作同陳為令僕子起家之選後周屬春官之外史唐為著作局亦屬祕書省宋以後國史悉属祕書郎二人從五品上著作佐郎二人從六品上掌撰郡誌祝文祭文與佐郎分判局事龍朔改著作郎為司文郎中佐郎為司文郎咸亨復舊初著作郎掌修國史佐郎貳之徒有撰史之名而實無其任盡在史館其屬官有校書郎正字通典國初以寄祿官元豐正名始實有職掌修纂日歴祭祀祝辭則著作郎佐之四朝志初除林希為大著豐稷為小著皆一時選也職略餘見祕監㳂革事類東觀漢班固著作為丨丨六帖承明又有丨丨金馬著作之庭大雅宏達於兹為盛元元本本殫見洽聞啓𤼵篇章校理祕文漢班固西都賦五葉自司𨽻校尉奉臣至父丨丨著作不絶鄉族以為美談應奉集讓者作表三世崔駰丨丨相繼其後無聞若乃談遷接武彪固踵跡亦各一世之良同上史才謝沉為祠都郎何充庾氷以沉有丨丨遷大著作文士晉孫綽為廷尉卿領著作綽少以文才稱于時丨丨綽為之冠晉書西觀晉束晢元康四年除著作郎著文作丨丨撰晉書三帝紀及十志士𫝊文府珥筆史觀記言丨丨梁沈約表史閣北齊著作𨽻祕書謂之丨丨亦謂之史館邢子才作詩酬魏牧冬夜直史館是也清才王讚為著作郎甚有丨丨仙室書笏珥彤記言事於丨丨選言長曲水詩序華省地居丨丨職在修文六帖著述東觀丨丨杜牧行蕭孜制論撰著作乃丨丨之地唯才史是居唐劉賓客謝男授者作表議限斷陸士衡以文學為祕書監虞濬所請為著作郎丨晉書丨丨晉史裒興衰蕭徳言歴著作郎太宗詔魏證虞世南褚亮及徳言丨次經史百氏帝王所以丨丨者帝曰使我稽古臨事不惑者公等力也唐書折僚友隋劉禪之父子翼宇小心為著作郎峭直有行嘗面丨丨丨短退無餘訾李伯藥曰子翼詈人人多不憾成門户許敬宗除著作郎謂所親曰仕不為著作無以丨丨丨唐書司文郎見㳂革唐事注祕省才丨丨史丨六帖採摭前記班固典祕書丨丨丨丨綴緝所聞以為漢書後漢博習舊聞楊彪字文先少𫝊家同上平中以丨丨丨丨召拜議郎與金日磾盧植蔡邕等著作東觀同上著作東漢續漢書稱以班固傅毅蘭臺令史陳宗以洛陽令尹敏以長陵令孟冀以司𨽻校尉並丨丨丨丨直筆東觀北齊天保二年詔中書令兼著作郎魏收撰後魏史初帝令羣臣各言志收曰臣願得丨丨丨丨早出魏書故帝使專其任北史定書漢儀謁者僕射劉珍校書郎劉騊駼等因丨著作東觀撰集漢書因丨丨家禮丨上言請衡參定後漢張衡𫝊執簡東觀丨丨丨丨後漢補志序漢用史才丨丨丨丨任先班固六帖晉推經術丨丨丨丨選在李充漢推良史丨丨丨丨選在孟堅晉重名儒丨丨丨丨任先𢎞度並同上分四部制李充為大著作于時典籍混亂充刪陳煩亂丨為丨丨祕閣以為永丨臧榮緒晉書撰三國志陳夀好學書著述除中書著作郎丨丨丨丨張華列𫝊作賦知名晉張載字孟陽作濛汜賦太僕傅𤣥見其賦嘆息以車迎載言談盡日載遂作賦起家徴為著作郎又作劔閣銘世以為能除著作郎當代必推韓顯宗除著作郎髙祖曾謂顯宗之才朕自委悉中省之品卿等所聞若欲取古人班馬之徒固若遼聞若欲求之丨丨之能卿等丨丨崔孝伯北史料四部書晉孝武帝好覧文藝敇著作郎徐廣丨祕閣丨丨見丨凡三萬六千卷續晉陽秋撰百家類唐孔至歴著作郎明氏族學與韋述蕭頴士柳冲齊名丨丨丨丨例以張說等為近世新族剗去之說子垍方有寵怒曰天下族姓何預若事而妄紛紛者耶垍弟素善至以實告初書成示韋述謂可𫝊及聞垍語懼欲更増損曰大丈夫奮筆成一家書奈何因人動揺有死不可改遂罷東觀陽秋掌丨丨丨丨之重唐大詔令蕭遘制東觀著述丨丨丨丨杜牧蕭孜制常呼妳母何言宋何承天除著作郎時已老而諸佐郎並名家年少荀伯于嘲之丨丨為丨丨承天曰卿當云鳳凰將九子丨丨妳母談藪詭云上車不落梁朝全盛時貴遊子弟多無學術丨丨丨丨丨丨即著作起居何如即校書家訓張贍作應難篇丨丨字仲應丨丨丨丨司空張華晚見稱善命為著作郎王隠晉書陳封作耆舊𫝊丨丨丨益部丨丨丨武帝善之命為著作郎允濟上明堂賦唐劉丨丨奏丨丨丨丨以諷則天甚嘉歎之拜著作郎潘尼造乗輿箴丨丨轉著作郎丨丨丨丨東觀㑹而成書左右史記言動之詳宰臣記時政之要以受丨丨丨丨丨丨欒城黄庭堅制蘭臺實専撰述丨丨東觀丨丨丨丨龜年老儒有士望楊丨丨在著庭吳敏之等李綱併以公姓名納上前曰時亦丨丨丨丨丨可令閣門候對班尋召對論當世急務上喜遂擢用之吳芮手筆張耒在館顧義守丨丨字文濳從蘇轍學轍見其文愛之蘇軾亦深知稱其文汪洋澹泊有一唱三嘆之聲元祐初為著作佐郎改著作郎丨丨八年丨丨自丨泊如也東都事畧唐盧照隣同崔少監作雙槿樹賦作於著作而見諸著作競寫雙槿樹賦蓬萊山上如對神仙芸香閣前仍觀祕寶金懸秦市楊子見而无言紙貴洛城陸生聞而罷笑故知柔條朽榦吹嘘變其死生落葉凋花剪拂成其光價方且𫝊石渠之故事得槿樹之新名足以脂粉仙臺丹青祕府者也賦曰方丈蓬萊邈矣悠哉芸局石室圖天揆日地則圖書之府人則神仙之靈中有芳􅀢鬱鬰亭亭兩砌分植雙階並耀葉鏤五衢榮分四照青陸至而鶯啼朱陽升而花笑紫蒂紅蕤玉蘂蒼枝露華的皪風色徘徊寂寞條利棲閑此地委命卷舒隨時榮顇外无嬰夭之禍内有逍遥之致則有亭伯儒門令思詩友翰苑曠其吞夢文鋒髙而照斗詩集靜直雍容夫子丨且丨丨丨時卷舒東坡送岑著作詩熒煌縹緲華蓋丨丨天帝座蓬萊丨丨道家山彭汝礪次韻履中學士詩著作佐郎歴代㳂革並見著作郎下事類學行晉陵朱鳳吳郡吳震並丨丨清修白首衡門老而未調譚為監知有史才薦之為著作佐郎並稱其職晉華橝𫝊聲姿後魏宋弁為佐郎髙帝孝文帝曽因朝㑹歴訪治道弁年少官微自下而對丨丨清亮舉止可觀髙祖稱善大被知遇賜名為弁取弁和獻玉楚王不知寶之理後魏華婉崔融受著作佐郎為文丨丨清選唐王義方曰臣去歳冬初雲陽下縣丞耳今春及夏陛下授臣著作佐郎極文學之丨丨南郊賦郭璞作丨丨丨獻帝嘉其才拜著作佐郎西觀書晉束晢字廣微博學多聞晚應司空辟月餘除佐郎丨丨撰晉丨草創三帝紀十志遷博士著作如故懽喜詩唐杜審言武后召之賦丨丨丨即授佐郎濛汜賦晉張戴字孟陽作丨丨丨傅𤣥見而嗟嘆以車迎之言談盡日為之延譽遂知名起家著作佐郎堪佐著晉鄒湛以閻纘才丨丨丨薦於祕書監華嶠嶠曰此職閑廩重貴世多爭之不暇求其才遂不能用晉書善著述陳壽丨丨丨除著作佐郎時夏侯湛等多欲作魏書見壽所作即壞已書張華别傳丞便轉晉張華授河南尹丨不拜丨丨佐郎召賜緋唐陽城以著作佐郎丨并丨丨魚李泌使叅軍事韓傑奉詔至其家城封還詔自稱多病苦憊不堪犇奉惟哀辭必不敢强兼修國史唐敬播再遷著作佐郎丨丨丨丨從太宗伐髙麗帝名所戰山為駐蹕播謂人曰鑾輿不復東矣已而果然為後春秋唐劉元濟累著作佐郎采魯哀公後十二世接戰國丨魯丨丨丨本𨽻修書佐著有局丨丨丨丨胡文㳟行范道卿等制到職作𫝊著局有佐𨽻修書之任故事丨丨丨名臣之丨同上行宋敏制蘭臺佐譔丨丨丨丨王禹玉制麟臺著撰佐丨丨之丨丨牋表類領佐史筵丨丨丨丨胡文恭行髙師說制佐著東觀丨丨丨丨公是行李謹修制祕丘撰著遷丨丨丨丨之佐胡文恭行宋迪制書省有佐丨丨丨丨同上行孫諮制佐修書筵丨丨丨之丨同上行張子方制佐選道山命丨丨於丨丨牋表為歐陽公所知王存少有立志為小官修潔自重丨丨丨丨丨丨趙康靖康公薦召試擢祕書省著作佐郎館閣校勘校集賢院書籍言行錄奏劉焞乞遷擢乾道三年七月梁克家丨曰著作佐郎丨丨乆在館閣以拘資格除郎不行丨稍丨丨遂除㑹要文學知名密薦本朝王安中字履道自號初寮先生政和中以丨丨丨丨除宗學博士有丨丨於上者除著作佐郎才學能世其家李炳字漢老伯父昭玘字成李元祐名士與晁張為徒嘗為柱史邴丨丨丨丨丨丨政和末除書局遷著作佐郎同上詩集東南珍子亦東南珍價重不可算東坡送孫著作詩校書郎歴代㳂革漢之蘭臺及後漢東觀皆藏書之室當時文學之士使讎校于其中故有校書之職初漢成帝已命光祿大夫劉向於天祿閤校經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校數術太醫監李柱國效方伎後以諸大夫楊雄等亦典校於其中後以蘭臺置令史属御史中丞又選他官入東觀皆令典校秘書或撰述傳記葢有校書之任而未為官也故以郎居其任則謂之校書郎明帝召班固詣校書郎除蘭臺令史後遷為郎典校祕書又劉珍與校書郎劉騊駼馬融校定東觀五經傳記百家藝術整齊脫誤校正文字又楊終徴詣蘭臺拜校書郎竇章為東觀校書郎以郎中居其任則謂之校書郎中後漢蔡邕拜郎中校書東觀又馬融為校書郎中請東觀典校祕書當時重其職故學者稱東觀為老氏藏室道家蓬萊山至魏始置秘書校書郎後周屬春官之外史唐掌讎校典籍為文士起家之良選其𢎞文崇文館著作司經局並有校書之官皆為美職而祕書省為最通典唐校書郎十人正九品上掌讎校典籍刋正文字皆辨其紕繆以正四庫之國史焉分紀本朝初為寄祿官元豐正名始實有職掌編緝校正定其脫誤則校書郎主之四朝志建炎初罷紹興復置又叅酌舊制必召試學士院而後命之中興㑹要事類石渠東漢楊終顯宗時拜校書郎上言宣帝論定五經於丨丨閣今宜如故事漢書白虎於是詔諸儒丨丨觀考論異同同上太乙漢劉向校書天祿閣夜有老人植青藜杖杖端出火以照向曰我是丨丨之精天帝聞卯金之姓有博學者下而觀焉拾遺記秘文校理丨丨文選班固西都賦碩學丨丨達官徃徃典校書如歆向故事或兼撰漢紀也宋百官志碩儒東觀儒林之府當講校文藝處定疑難漢時皆名學丨丨乃任其職吳志騎驢開元中校書正字俸祿微少孤寒英傑者居之或有不辨正字乗驢入省而太祝奉禮毎月請明衣絹布及胙肉俸祿倍多乃公卿子弟居之衣馬比校正頗為輕肥時有語曰正字校書詠詩丨丨奉禮太祝輕裘食肉雍洛靈異錄畫像髙彪校書東觀後遷内黄令帝敇同僚臨祖送於上東門詔東觀丨彪丨以勸學者東漢神