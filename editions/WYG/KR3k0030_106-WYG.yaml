超邁有丨丨談道屢入微閉門長蓬蓬黄山谷寄字子先紅蘭省並入丨丨丨偏親白玉規葢為校書郎也元集酬白樂天韻天祿閣才子富文華校讎丨丨丨韓文公送鄭校理祝身得如斯豈論校書郎抱笏光參差童稚見稱說丨丨丨丨丨老翁不量分累月笞其兒崔立之及第後除校書韓退之寄崔立之正車問何如校書著作頻召除猶能丨丨丨丨丨黄山谷臺閣多大官鄴侯家多書挿架三萬軸一一懸牙籖新若手未觸丨丨丨丨丨無地可容足我雖官於朝氣勢曰局促今子從之遊學問得所欲入海觀龍英矯翮逐黄鵠韓愈送諸葛覺讀書白頭作校書卷裏詩過一千首丨丨來丨丨丨郎白居易與王建且留天祿閣材如杞梓各稱良海内知名獨豫章終歲丨丨丨丨丨入看應號紫薇郎賀方回寄黄祿直學士十年身校書咸平中天開帝居羣公下直承明廬韓侯畫此時无虞瀛洲仙人樂有餘我生不及正觀初却恨丨丨丨丨丨吟詩天街騎蹇驢爾來戎馬爭馳驅把卷未展先欷歔韓子蒼題登瀛圖終朝守玉署丨丨丨丨丨方夜旁石扉劉孝綽校書祕書省雪夜詠懐青藜夜相訪玉堂學士今劉向禁直岧嶤九天上不須對此融心神㑹植丨丨丨丨丨韓子蒼題李太白畫像每有滄洲心校文在仙掖丨丨丨丨丨儲光羲酬綦校書夢若耶溪見贈召入承明宫忽從被褐中丨丨丨丨丨盧象贈程校書正字歴代㳂革後漢桓帝初置祕書監掌圖書古今文字考合同異其後監令掌圖籍之紀監述作之事不復専文字之任矣今之正字葢令監之遺職校書之通制歴代无聞齊集書省有正書祕書省有正字隋唐因之掌刋正文字其官資輕重與校書郎同貞元八年屬集賢殿通典國初為寄祿官元豐正名始實有職事編集校定正其脫誤則正字主之四朝志建炎二年罷紹興中復又參酌舊制必召試學士院而後命之中興㑹要事類神童唐劉晏以丨丨為祕省正字方十歲慧晤上召入樓中貴妃置於膝上為施粉黛上問晏曰汝為正字正得幾字晏對曰餘字皆正惟朋字未正明皇雜錄又唐吳通𤣥父道瓘為諸王太子授經通𤣥兄弟出入禁掖侍太子遊通𤣥共兄通微俱博學善屬文文采綺麗通𤣥應丨丨舉釋褐祕書正字弱冠唐裴曜卿少聰敏數嵗解屬文應童子舉丨丨拜祕書正字校經長興三年丨丨籍亥豕有差魯魚為弊並同上詠詩丨丨騎驢事見上注安恬洪文公遵除正字閣下前輩以畏友待公秦熺為祕郎勢焰赫赫公守道丨丨留滯不干問益公集靜黙范祖禹字淳父司馬光辟同編修資治通鑑書成上章稱薦而祖禹安恬丨丨若將終身除祕書省正字東都事畧善屬文見上與鈞禮蕭頴士天寳中為祕書正字時裴耀卿席豫張均宋遥韋述皆先進器其才丨丨丨由是名播天下上封章儀鳳中吐蕃盗邊魏元忠丨丨丨洛陽宫髙宗善之授祕書省正字感遇詩陳子昂字伯玉初舉進士上書武后召見金華殿子昂貎柔雅少威儀而占對慷慨擢蘭臺正字為丨丨丨三十八章王適曰是必為海内文宗亥豕魯魚張鷟云丨之與丨涇渭莫分丨之與丨淄澠莫辨注云有人讀史云三豕渡河子夏曰己亥渡河校之果然又簡牘磨滅以陶為陰以魯為魚門閏陶陰辨丨丨之非察丨丨之謬注左傳杜預長厯此年无閏月當為門五日後人五土為合閏遂以意定之陶陰事見上刋於徃籍丨魯魚丨丨丨唐大詔令牛僧孺制疑其宿構晏元獻公殊年十三宋真宗面試詩賦丨丨丨丨明日再試文采愈美上大竒之即除祕書省正字令於龍圖閣讀司馬温公實錄下筆立成楊億字大年以童子召對試詩賦五篇丨丨丨丨太宗嘆異以為祕書省正字制曰汝方在髫齡不煩師訓精爽神􅂇文字生知越景絶塵一日千里予有望於汝也東都事畧不附進用范祖禹除正字供職祕省時王荆公當國人皆奔競公未嘗徃謁王安國共公友善嘗諭意以公獨丨親丨故未丨丨公竟不徃言行錄對策見竒廖正一字明畧元祐中蘇軾在翰苑試館職士得正一丨丨竒之除祕省正字言行錄奏篇見稱李璧撰周益公行狀召試館職丨丨上宋高宗丨丨其文諭丞相曰他日可令掌判除正字實為儒選是正文字之官丨丨丨學之南豐擬制縱觀祕文徃遊藏室丨丨丨丨初寮李質等制未嘗折顔王待制質字子野充職館殿二十餘年同舎皆顯官公介然不動惟求外補當國者非戚必舊公丨丨丨丨以合其意言行錄仍特免試紹興己卯諌官何溥請館職學官皆試而後除人以為憚乆之王十朋始以大魁直除祕書郎不試未幾闕員寖多復召予與程大昌試止除正字其後無不試者至乾道元年黄石輪對稱旨擢書郎丨丨丨丨自廷魁之外不試者惟石而已周益公集侍從合薦于朝陳師道字無已號後山居士少好詩一見豫章盡焚其藁而學焉元祐中丨丨丨丨丨丨起為徐州教授改頻州紹聖中以進士科第罷尋召為祕書省正字而卒著後山集十五卷中書特命以官韓昫字子蒼自布衣有詩名前輩稱許之政和初詣闕上書召試丨丨丨丨丨丨除祕書省正字言者論其進不繇科舉責為筦庫文有氣燄務竒恠本朝石悉字敏若政和初試中宏詞除館職四六之丨丨丨丨而丨丨丨為詩清逸有橘林集十卷文頗富贍不竒恠劉弇字偉明儒學決科擢為館職丨詞丨似石敏若而丨丨丨為丨丨則過之張于湖上陳正字啓瓊琚玉珮乆應接武於䕫龍貝闕珠宫尚困守關之虎豹詩集重銅樓閻公漢庭舊沉鬱富才力價丨丨龍丨聲髙重門側李白酬閻正字畏金根杜老趨嚴詔徐行及聖時端能幾字正敢恨十年遲益丨丨丨繆寜辭溫媼譏况來憂畏斷不盡鹿門期陳后山除祕書省正字無等雙城南晁正字國器丨丨丨黄山谷當居中詔謂正字丨丨丨楊誠齋送提舉蔡正字試文章翠木陰陰白玉堂老來方此丨丨丨宫簷日永揮毫罷閑拂塵埃看畫墻王仲至召