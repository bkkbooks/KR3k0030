body:
  text: 古今合璧事類偹要外集卷四十三宋謝維新撰餽遺門餽遺附辭受餽遺總說餽遺以食物與人曰饋以財物與人曰遺從古有也然君子於此必辨禮義而後受之如其義則舜受堯之天下不以為泰如其非義雖簞食豆羮不可受於人豈輕也哉然世有不當受而受者固非也而又有可以受而猶不之受者焉豈不慕為髙世之舉而反以失中庸之道乎是又君子之所不貴也事類稍餼以致丨丨周禮苞苴少儀嘉貺左傳永好投我以木𤓰報之以瓊琚匪報也丨以為丨也雜佩丨丨以贈之並詩折麻丨䟽丨兮瑶華將以遺兮離居楚辭束帛孔子遭程子於道謂子路曰取丨丨以贈先生家語盤飱晉公子重耳及曹僖負羈曰吾觀晉公子從者皆足以相公子必反其國若反其國必得志於諸侯而誅無禮曹其首也子盍早自貳焉乃饋丨丨置璧焉公子受飱反璧注臣無境外之交故用盤藏璧飡中不欲令人見左篋錦叔鮒欲求貨於衛滛芻蕘者衛人使屠伯饋叔向羮與一丨丨曰諸侯事晉未敢攜貳况衛在君之宇下而敢有異志芻蕘者異於他日敢請之叔向受羮反錦遺珠見珠門遺矢晉卻至如楚聘楚子饗之為地室而懸焉卻至將登金奏作于下驚而走出賔曰君不忘先君之好施及下臣貺之以大禮重之以備樂如天之福兩君相見何以代此下臣不敢子反曰如天之福兩君相見無亦唯是一矢以相加遺焉用樂賔曰若讓之以一矢禍之大者其何福之為成十三餽烝豚孔子陽貨餽以丨丨孔子時其亡也而往拜之餽鼎肉子思繆公亟問亟丨丨丨子思不悅於卒也摽使者出諸大門之外北面稽首再拜而不受曰今而後知君之犬馬畜伋盖時是臺無餽也孟饋五漿列子之齊中道而反遇伯昏瞀人瞀人曰奚方而反曰吾驚焉惡乎驚曰吾食於十漿於十漿而五漿先饋伯昏瞀人曰汝何為也驚曰夫漿人持為食羮之貨多餘之其為利也薄其為權也輕而猶若是而况萬乗之主身勞於國而智盡乎事彼將任我以事效我以功吾是以驚列子餽兼金陳臻問曰前日於齊王丨丨丨一百而不受於宋餽七十鎰而受於薛餽五十鎰而受前日之不受是則今日之受非也今日之受是則前日之不受非也夫子必居一於此矣孟子曰皆是也當在宋也予將有逺行行者必以贐辭曰餽贐予何為不受當在薛也予有戒心辭曰聞戒故為兵餽之予何為不受若於齊則未有處也無處而餽之是貨之也焉有君子而可以貨取乎孟子遺之而受後漢卓茂為宻令人有言部亭長受其米肉遺茂問亭長從女求乎曰往遺之耳茂曰丨丨丨丨何故言邪足自當止王述家貧求試宛陵令頗受餽遺而脩家具王導使人謂之曰名父之子不患無禄屈臨小縣甚不宜爾述荅曰丨丨丨丨後屡居州郡清潔絶倫禄賜皆散之親故服之無疑羊祜與吳陸抗相對命使通交抗稱祜之徳樂毅孔眀莫能過抗嘗病饋之以藥丨丨丨丨心人多諌之曰羊叔子豈酖人者割以分甘王羲之帖有一味之甘分而食之貧無將意紀瞻帖云自昨信來今又益微丨丨以丨丨粉二斗所謂物意全者並法帖吝不分贍梁朱異性丨嗇四方饋遺財貨充積未嘗散施厨下珍羞腐爛每月嘗棄十數車雖諸子别房亦丨丨丨拆開將入有布衣張子路上書言李泌之短徳宗殺之謂泌曰朕皆得其誣妄且云卿受嚴震師子百枚計價二萬貫朕料必是砂糖師子山南地貧何處有許金又人用一百个金師子作何物試使人潜斟送砂糖使猶在城卿避嫌疑諸道寄茶及口味悉皆丨丨丨丨此賊遂敢誣罔故處置之髙士傳獻𤓰子金大祖朝趙韓王普為相車駕因出忽幸其第時兩浙王俶方遣使致書及海物十瓶於韓王在廡下㑹車駕至倉卒出迎未屏也上顧見問何物韓王以實對上曰此海物必佳即令啓之皆滿貯𤓰子金韓王惶恐頓首謝曰臣未發書實不知若知之當奏聞而却之上笑云但取之无慮彼謂國家事皆由汝書生耳因命謝而受之獻楊梅仁王薿字豐父守會稽童貫時方用事貫苦脚氣或云楊梅仁可療是疾豐父裒五十石以獻之後擢待制再任不歴貼職徑登次對惟豐父一人揮麈録辭不受遺粟不受子列子窮容貌有飢色客有言之節子陽者曰列禦冦有道之士也子陽丨之丨列子再拜而辭孔子曰我則異於是无可无不可列子遺米不受見米門詳餽肉不受子思事見前遺魚不受公儀休相魯客有丨丨者相丨丨客曰聞君嗜魚何故不受相曰以嗜魚故不受也今為相能自給魚今受魚而免誰復給我魚者史記麾去梁肉宋陶潜躬耕自資遂抱羸疾江州刺史檀道濟往候之偃卧瘠餒有日矣道濟饋以梁肉丨而丨之怒給猪肝閔仲叔隠居不仕好食猪肝安邑令聞之令吏常給仲叔仲叔曰吾豈以口腹累人遂去安邑之沛髙士傳厲色驅出陳姚察為吏部尚書有私門生送南布一端花練一疋察曰吾所衣止是麻布蒲練此物於吾無用幸不煩耳此人遜請察丨丨丨丨餓死不取韋貫之為尚書右丞長安中争為碑誌若市買然大官卒其門如市至有喧競構致不由䘮家是時裴約之子圖不朽與貫之縑帛萬匹貫之舉手曰寜丨丨丨茍丨一錢不受曹修古者四御史之一也眀道初因上言請太后還政謫守興化暴死于室朋寮及郷之賢者相與率錢十萬以贍其家脩古有女始笄告其母曰先人忠節名聞天下今不幸直家謫死且君子不家於䘮此錢决不可受以凂我先人全徳哭而不謝遣之送者固請丨丨竟丨丨一文不取劉祕丞道原家極貧然丨丨丨妄丨於人冬寒歸自洛陽時無衣具司馬温公以一二衣襪及一貂褥賮之固辭强之乃受及至穎川悉封以反温公曰於光不受於他人肯受乎眀日如何石徂徠為舉子時讀易于南都時侍郎王濟聞其窮困因餉客授以盤飡却而不受曰今日固好丨丨丨丨工夫何在横浦幼年處學正當苦寒衣衾不備鄉里富人有以襲衣為送者亦却不受曰士處貧苦正是做工夫時節若不痛自節抑則貪欲心生亷耻䘮矣丨丨丨丨田還种氏張正議與种世衡善及持父䘮世衡遺以汝州田十頃固辭不受使者在途而世衡已卒其子以父命不復受荒廢者五十年元豐中郡守劉裴請以田給州學朝廷不許遂命還种氏詩集致薄助先生結髮僧俗徒閉門不出動一紀至今鄰僧乞米送僕忝縣令能不恥俸錢供給公私餘時丨丨少丨祭祀勸參留守謁大尹言語纔及輒掩耳韓愈贈盧仝周我窮昔公處貧我處困我無金玉可助公今公既貴我尚窘公有縑帛丨丨丨古來朋儕義亦少子貢不顧顔淵空復聞韓孟最相善身仆道路哀妻潼梅堯臣謝歐公贈絹寄鵝毛鮮鯽經年秘醹醁團臍紫蟹脂填腹後春蓴茁滑如酥先社薑芽肥勝肉鳬子纍纍何足道㸃綴盤飡亦時欲淮南風俗事瓶罌方法相傳竟留蓄且聞千里丨丨丨何用孜孜飫縻鹿坡集揚州以土物寄少游割鷺股我无置錐君立壁舂黍作麋甘勝宓綈袍不受故人意樂􅀈老子樂與餌過客止肯為兒輩屈丨白丨丨何足難食鸕鷀肉未為失莫年五斗得千里有愧寒簷皆朝日時先生以借子贈故云陳旡已答黄生封題難勝有客有客官長安牛酥百斤手自煎倍道奔馳少師府望塵且欲迎歸軒守閽呼語不必出已有人居第一先其多乃後倍於此台顔顧視初怡然昨朝所獻雖第二桶以淳漆麗且堅今君且遲數又少青紗丨丨丨丨前持歸定漸遼東逐努力明年趂頭年江子我瑞友詩時宣和中有鄧其姓者守闗中以牛酥百觔送梁師成故云慇勤送去風卷飛花自入帷一樽遥想破愁眉泥深厭聴雞頭鶻酒淺欣嘗牛尾貍通印子魚猶帶骨披緜黄雀謾多脂丨丨丨丨煩纎手為我磨刀削玉肌坡集時大雪送牛尾貍與徐使君古今合璧事類備要外集卷四十三
