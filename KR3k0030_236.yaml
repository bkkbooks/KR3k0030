body:
  text: 古今合璧事類備要别集卷三十宋謝維新撰花卉門杜鵑花格物總論杜鵑花一名山石榴一名山躑躅蜀人號曰映山紅所在深山中多有之此花數種有黃者紫者紅者五出者千葉者樹髙四五尺或丈許春生苖葉淺緑枝無多葉而花極爛熳杜鵑啼時始開故名焉近似榴花樣故號巖榴羊誤食其葉則躑躅而死故亦以山躑躅名之也事類鶴林竒絶丨丨寺在潤州有杜鵑花髙丈餘每至春月爛熳僧相傳云正元中有僧自天台移栽之其後有殷七七字文祥周寶舊識之及移鎮浙西營飾其花院鎖閉時或窺見二女子共遊林下俗傳花神也寶一日謂七七曰鶴林之花天下丨丨常聞能作時花今重九將近能開此花副此日乎七七乃前二日往鶴林焉中夜女子果謂七七曰妾為上帝司此苑今與道者開之然此花非久歸閬苑矣於是女子瞥然不見及九日爛熳如春寶驚異遊賞纍日花俄不見其後兵火焚寺樹失根株信歸閬苑矣坡詩注榛莽相似物以希見為珍不必異種也鶴林寺杜鵑乃今映山紅又名紅躑躅在江東彌山亘野殆與丨丨丨丨而鶴林之花至以為外國僧鉢盂中所移上𤣥命玉女下司之已踰百年終歸閬苑是不特土俗罕見雖神仙亦不識也王建宫詞云大儀前日緩方來囑向昭陽乞藥栽敕睗一窠紅躑躅謝恩未了奏花開其重如此則宫禁中亦鮮之容齊隨筆詩集胭脂蕚漸綻丨丨丨猶含琴軫房離被亂剪綵班駁未成粧烽熖燈干炷紅裙妓一行好差青鳥使封作百花王白樂天紅綃巾九江三月杜鵑來一聲催得一枝開江城上佐閒無事山下斸得㕔前栽爛熳一欄十八樹根株有數花無數千房萬葉一時新嫩紫殷紅鮮麯塵淚㾗裛損胭脂臉剪刀裁破丨丨丨白樂天占斷春山榴花似結紅巾容艷新妍丨丨丨韓退之徒為叢山榴躑躅少意思照耀黃紫丨丨丨韓退之綃作團一叢一朵壓欄千剪碎紅丨却丨丨風嫋舞腰香不盡露銷粧臉淚初乾白樂天血成花杜鵑啼處丨丨丨寇萊公紅星墮孤光裊餘翠燭影舞多妍迸火燒閒地丨丨丨逺天樂天翠璧邉楓林丨丨楚江丨躑躅千層不忍看東坡紫躑躅丨丨丨滅攏裙倚山腹文君新寡乍歸來羞怨春風不能哭我從相識便相憐但是花叢不回目山花漸暗月漸明月照空山滿山緑山空月午夜無人何處知我顔如玉元微之紅鸜鵒南漪杜鵑天下無披香殿前丨丨丨鶴林兵火真如夢不歸閬苑歸西湖坡南漪堂蜀魄啼丨丨千年尚怨誰聲聲啼血向花枝滿山明月東風夜正值愁人不寐時羅鄴鵑口血泣露啼紅作麼生開時偶值杜鵑聲杜丨丨丨能多少恐是狂人淚滴成楊誠齊仙姿貴嫩紅輕紫丨丨丨合是山中寂寞開九陌風塵肯相顧可憐空使下山來劉原父造物私丨丨丨我小園林此花大勝金腰帶王梅溪樂府猩猩血染百紫千紅過了春杜鵑聲苦不堪聞却解啼教春小住風雨空山招得海棠魂誰一似蜀宮當日女無數丨丨丨丨赭羅巾畢竟花開作主記取大都花屬惜花人定風波辛稼軒薔薇花格物總論薔嶶花一名牛勒一名牛棘一名刺紅一名薔蘼藤身蒲萄相似葉類槐莖青多刺花白色或紫或黃開時連春接夏不絶清馥可人或者號為野客此又一種謂野薔薇也事類題璧長句權德輿云從叔將軍宅薔薇花開有丨丨丨丨因以和作唐詩題架長韻白居昜云裴常侍丨薔薇丨十八韻見示因廣為二十韻和之大食國花露薔薇紅色丨丨丨花丨也五代時藩使蒲河散以十五瓶效首厥後罕有至者今則採茉莉為之然其水多僞試之當用琉璃瓶盛之翻搖數四其泡周上下為真香録詩集低枝丨丨詎勝葉輕香幸自通發蕚初攢紫餘采尚霏紅新花對白日故蘂逐春風謝朓芳叢經植宜春館靃靡上蘭宫片舒猶帶紫半捲未全紅葉踈難蔽日花密昜傷風佳麗新粧罷含笑折芳叢梁鮑泉紫蕚石榴珊瑚蘂木槿垂星葩豈如兹木麗逢春始發花回風舒丨丨照日吐新芽梁簡文帝醉暈丨丨淺深粧白樂天狂艷醉紅不自力丨丨如索扶孟郊瑟瑟金猩猩疑血㸃丨丨蹙丨裝白樂天猩猩血鶯聲漸老桞飛時狂風吹落丨丨丨僧齊已琉璃艷忽驚紅丨丨千丨萬艷開孟郊燕支顆曉風抹盡丨丨丨夜雨催成蜀錦機當晝開時正明媚故鄊疑是買臣歸張祐嫩紅深緑一朵長條萬朵春丨丨丨丨小忩勻只因眼下千年土曽葬西川織錦人裴說艷色繁香還列從容蹀躞歸光風駘蕩發紅薇鶯藏密葉宜新霽蝶繞低林愛晚暉丨丨當軒迷舞䄂丨丨滿徑拂朝衣儲光羲飛葩散馥仙機軋軋織鳯凰花開七十有二行天霞落地攢紅光風枝娜嫋時一揚丨丨丨丨繞空王忽驚錦浪洗春色又似宫娃逞粧飾終當一使移花根還比蒲萄天上植孟郊一莖獨秀裊裊長數尋青青不作林丨丨丨丨當庭心數枝分作滿庭隂春日遲遲欲將半庭影玲玲正堪玩枝上鶯嬌不畏人葉底蛾飛自相亂秦家兒女愛芳菲畫眉相喚採葳㽔髙處紅鬚欲就手低邉緑刺已牽衣蒲萄架上朝光滿楊栁園中暝鳥飛連𬒮踏歌從此去風吹香氣逐人歸儲光羲爭擲霓裳碎剪紅綃間緑叢風流疑在列仙宫朝真更欲熏香去丨丨丨丨上寶籠魏野淺染羅裳海外薔薇水中州未得方旋偷金掌露丨丨玉丨丨已換桃花骨何須賈氏香更煩麯生輦同訪墨池楊楊誠齊謝黃薔薇及酒䖃苴餘春紅殘緑暗已多時路上山花也則稀丨丨丨丨還子細燕支濃抹野薔薇楊誠齊樂府纎手折柔條玉女翠帷薰香粉開粧面不是占春遲羞被群花見丨丨丨丨丨綘雪飛千片流入紫金巵未許停歌扇生查子李橘仙古今合璧事類備要别集卷三十
