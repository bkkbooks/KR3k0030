body:
  text: 古今合璧事類備要後集卷六十五宋謝維新撰帥閫門督府唐都督與本朝督府名同而義稍不同今所載惟取其都督事比附同入厯代沿革後漢建武初征伐四方權置督軍御史竟則罷魏武征孫權還使夏侯惇都轄三十六軍明帝太和四年晉宣帝征蜀加號太都督正元二年文帝都督中外諸軍事尋加大都督及晉伐吳之役以賈充為使持節假黃鉞大都督總統六師晉職官志宋人臣無居者唯江夏王義恭得假黃鉞宋書後魏有都督中外諸軍事又置京畿大都督揔攝六軍職官分紀隋置大都督但以酬勤勞而已隋百官志唐大府皆置都督景雲二年置都督二十四人察刺史以下善惡楊益并荆四州為大都督汴兖魏冀蒲綿秦洪潤越十州為中都督皆正三品齊鄜涇襄安潭遂通果夔十州為下都督從三品當時以為權重難制奏罷之唯四大都督府如故自唐以後不置國朝紹興初吕元直復相謀進取秦會之欲奪其權乃共議令元直以左僕射都督江淮荆浙諸軍事置司鎮江元直覺之遽歸而命孟富文以參政權同都督已而落權字四年趙元鎮自知樞密院為川陜宣撫處置使元鎮以與吳玠共事為嫌乃改都督川陜荆襄諸軍事五年春元鎮與張德並相遂帶兼都督諸路軍馬入銜秋紇石烈志寧入冦詔湯進之以左僕射為之進之逗遛不行乃命王瞻叔以參知政事為同都督瞻叔亦丐免於是遂命楊存中代為都督非宰相而為都督自存中始朝野雜記督視軍馬者紹興三十一年冬葉審言始以樞密院為之朝議以審言非相臣故其名下都督一等蓋不考趙豐公故事失之也隆興初張魏公為江淮都督乃命汪明逺以參知政事督視湖北荆西兵馬方城失守汪責台州遂并令魏公督之同上張魏公之初為都督也以行府為名凡事干朝廷則關三省樞密院孟廋富文時在政府大不平曰三省密院乃奉行府文書耶田稱疾求去隆興初再為都督宰相主和議所行多與督府異魏公乃言進退調發當從督府取旨施行日近主兵官及帥守監司輒以軍期事務徑申朝廷已劄下依本府指揮仍取軍令狀上曰豈有不申朝廷之理乃下詔江淮軍馬調發應援從督府取旨施行其餘事務並令申奏如舊開禧用兵除丘宗卿僉樞督視軍馬閲月而免張肖翁以元代之不勝任奉祠而去數月吳曦反復命李季章以參知政事督視四川軍馬既而有裂土之議又罷行自是不復除都督矣並朝野雜記事類徂征汝丨丨禹乃會羣后誓于野書薄伐丨丨玁狁至于太原文武吉甫萬邦為憲詩元戎丨丨十乘以先啓行同上出將漢丨丨入相綏懷晉將有滅吳之志以羊祜為都督祜率兵出鎮南夏丨丨逺近甚得江漢之心懷附庾翼都督江荆益三州刺史制度規模每出于人數年之中軍國充實人情翕然稱其才明由是自河以南皆丨歸丨稱羊公羊祜都督荆州諸軍事招携以禮懷逺以德吳人悅服丨為丨丨謡杜公杜預為都督荆州諸軍事南土美而丨之曰後世無叛由丨丨孰識智力與勇功務清淨唐漢陽郡王瓌為荆州都督政丨丨丨嶺外酋豪數相攻瓌使諭威德皆如約不敢亂少威嚴唐襄邑恭王神符遷揚州大都督自丹陽渡江治隋江故郡揚人畏之然丨丨丨不為下所畏表求鷹唐李大亮為涼州都督嘗有臺使見名鷹諷大亮獻之大亮密丨曰陛下絶畋獵久矣而使者丨丨信陛下意邪乃乖昔旨如其擅求是使非其人也太宗報曰有臣如此朕何憂勸墾田唐張儉徙代州校檢都督丨丨丨力耕嵗數稔私蓄富實儉恐虜易驕乃建平糴法入之官虜恱喜由是斛儲流嬴擇最吏唐陽嶠等議建都督府丨丨丨故嶠為涇州都督罷都督李景伯景靈中時議置都督府非是詔郡臣著議景伯與太子舍人盧俌議今天下諸州分𨽻都督専生殺刑賞使授非其人則權重釁生非強幹弱枝經邦軌物之議願丨丨丨留御史以時按察繇是停都督善撫御郭元振遷涼州都督治涼五歲丨丨丨道不拾遺政嚴肅張嘉貞厯秦州都督為丨丨丨甚為人吏所畏視行營王師討祭以度丨丨丨諸軍還奏攻取策與帝意合唐裴度傳請督戰時討蔡不利度丨身丨丨帝目度曰果為朕行乎度俯伏流涕曰臣誓不與賊偕存即拜彰義軍節度淮西宣慰招討處置使同上威重夸逺唐宗室孝恭為揚州行臺大都督再破巨賊北自淮東抱江度嶺而南盡統之欲以丨丨丨丨俗乃築第石頭城陳廬徼自衛或誣其反赦為宗正卿威信甚行竇軌為洛州都督周洛間因隋亂人不土著軌下令諸縣有逰手末作者按之由是丨丨丨丨民皆趨本刻石頌德王睃景龍末授桂州都督州有兵舊常仰餉衡永睃始築籮郛罷戍卒棣江開屯田數千頃以息轉漕百姓賴之期年人丨丨丨丨賜錦著政王方慶武后時纍遷廣州都督南海歲有崑崙舶市外區琛琲前都督路元睿冒取其貨舶首不勝忿殺之方慶至秋毫無索部中首領沓墨氏詣府訴府曹素相餉方慶約官屬不得與交通境內清畏議者謂治廣號第一詔丨瑞丨雜綵以丨善丨兵斬首惡馮元常拜廣州都督詔便驛之官安南酋領李嗣仙殺都護劉延祐劫州縣詔元常討之率士卒航海馳徼先示禍福賊黨多降元常縱丨丨丨丨而還政尚清省李襲志轉桂州都督襲志守桂二十八年丨丨丨丨南荒便之璽書賜勞宗室晦乾封中為營州都督以治狀聞丨丨丨丨區落降從膠東王道彥拜􅡠州都督間遣入黨頃諭國威靈丨丨丨丨修復堰坊張守圭為瓜州都督州地沙瘠不可蓻是時渠堰為虜毁材木無所出守圭密禱于神一夕水暴至大木散千章塞流下因取之丨丨丨丨耕者如舊州人神之刻石紀事教之陶瓦宋璟徙廣州都督廣人以竹茅茨屋多火璟丨丨丨丨築堵列邸肆越俗始棟梁利而無患貪泉畢飲唐馮立拜廣州都督前後作牧者多以黷貨為蠻夷所患數怨叛立到不營産業衣食取給而已嘗至丨去丨嘆曰此吳隱之所酌也遂丨丨而褒金以贈李商遷廣州都督及還人或丨丨丨丨曰吾自性分不可易非畏人知也専治軍旅吕忠穆公頥浩字元直與秦檜同秉國政檜令其黨建言令二相宜分任內外之事遂除頥浩都督江淮等路諸軍上諭之曰頥浩丨丨丨丨檜専理庶務如種蠡之分職頥浩秦檜唯唯奉詔乃詔頥浩總師北向置都督府于鎮江兼領屯田張魏公請親行邉郡上乃令浚往視師初言屯田者甚衆而未見其效至是浚丨丨丨丨以出始置官屬凡所行之事皆畫一而去同上表裏相應趙忠簡公鼎與張浚俱帶都督諸路軍馬置司行在浚出視師江上以行府為名而鼎居中總政事丨丨丨丨言行録書押色動張魏公秉樞管視師江上時兀术擁兵十萬于淮陽公召大帥韓世忠張俊劉光世與議且勞其將軍士見公來勇氣十倍令韓世忠移書兀术為言張樞密已在鎮江初虜諜報公得罪逺貶故悉力來冦至是兀术問世忠所遣麾下王愈吾聞張樞密貶嶺外何得在此愈出公所下文書兀术見公丨丨丨丨即強言約日當戰公再遣以世忠書問戰期愈回一日而虜宵遁晦庵集踴躍思奮張浚除右僕射都督諸路軍馬往江上視師浚至鎮江召韓世忠親諭上旨使舉軍前屯楚州以撼山東世忠欣然承命至建康府張浚軍至太平州撫劉光世軍軍士無不丨丨丨丨言行録莫敢仰視樞密副使王庶暫往江淮措置邉防庶素有威嚴臨發勞師於都教場軍容嚴整便服坐壇上自楊沂中而下悉以戎服由轅門庭趍受命拜賜而出丨丨丨丨自多事以來所未有中興系年録御書示意張魏公至江上會諸大帥議事乃命韓世忠據承楚以圖淮陽命光世屯廬州以招北軍命張浚練兵建康以為進屯盱眙之計命沂中領精兵為浚後翼命嶽飛進屯襄陽以窺中原國威大振上丨丨裴度傳遣賜以丨至丨言行録手書嘉歎張魏公往視江上丨丨賜浚曰賊雛犯順侵夀及濠卿奬率師徒臨敵益壯遂使凶渠宵遁同惡自焚寤寐忠勤不忘丨丨兒童知張都督張浚往江上視師四方之士莫不傾心健將悍卒見之者必咨嗟太息下至丨丨亦丨有丨丨丨每使者至金國其國必問浚今何在並同上倚魏公如長城張浚樞密使仍督師江淮上召督參陳俊卿及俊子拭赴行在上見俊卿等問浚動靜飲食顔貌曰朕丨丨丨丨丨丨不容浮言搖奪編年備要宋璟廣州都督碑極有四星惟帝之輔地有五嶽惟天之柱其入宰也帝之股肱其出守也人之父母詩集付兵權黑眉玄髮尚依然紫綬金章五十年三入鳳池操國柄八分龍節丨丨丨東周城闕中天外西蜀樓臺落日邉莫遣洪爐曠真宰九流人物待陶甄薛逢送西川杜司空赴鎮詩開相府幕丨丞丨丨旗㧾二師營料敵知無戰安邉自有征錢起送王相公赴范陽詩看擁傳往來丨丨丨前後賴専城孟浩然送韓使君除洪州都督詩督參此並因督府官屬編若其他幕府各見於本司官屬下此不載厯代沿革國朝紹興二年以吕頥浩都督江淮荆湖諸軍開府鎮江頥浩辟參謀官已下文武七十七貟事類養望晉陶侃為督諸參佐戲談廢事侃責之曰君子當攝其威儀何有亂頭丨丨自謂安逹耶重望唐趙璟審官儀六蕃府官屬曰諸使辟署務得才以丨府丨能否已試則引而置之朝無俾其久滯史列傳贊謀張栻字敬夫孝宗即位起忠獻公宣撫都督諸軍事忠獻公奏以公書寫機宜文字是時公甫三十內丨密丨外參庶務夙夜凜凛直以君父之責為己憂言行録極選張栻辟機宜時浚起謫籍受重寄開府治戎參佐皆丨一時之丨幕府諸人自以栻為不可及國史具姦贓向子忞字宣卿朱丞相勝非以督府討李成於江西屈公參議有一縣令以不亷被訟求薦入幕公丨以丨丨白丞相斥去因論君子小人不可使混雜以亂政丞相納用之參謀議陳克字子髙金陵人不事科舉博學専用以資為詩晚得官吕祉安老帥建康辟置為屬安老入為尚書丨都督府丨丨子高復從軍為淮西之行皆天下選張子湖督府參議官制云朕命相臣以幕府臨遣凡其自從丨丨丨之丨爾忠直強明克承厥家所居之宫聲績較著尚堅一心益固兵圉詩集趨相府貪丨丨丨今辰發恐失佳期後命催南極一星朝北斗五雲多處是三台杜甫送李校書赴杜相公幕府詩逐絳紗相府開油幕門生丨丨丨劉禹鍚送趙中丞參令狐僕射幕府詩制置使厯代沿革唐宣宗大中五年以白敏中充招討黨項行營都統制置等使通鑑制置使之名始此國朝不常置掌經畫邉鄙軍旅之士政和中熙秦用兵以內侍童貫為之四朝志宣和末姚古為京畿輔郡兵馬制置使靖康初种師道為河東路制置使錢蓋為陜西五路制置使欽宗實録建炎元年有招捉盜賊制置使自王淵始二年有行在五軍制置使自劉光世始又諸路皆有副使自江浙陳彥文程千秋始六月浙西安撫使康允之帶本路制置使安撫帶制置自此始也四年罷有松江都制置使管江南東路知建康府紹興二年有沿海制置使係建康兩浙東路三年有安撫制置使大使之名自江南西路大使趙鼎始六年始鑄印以某路制置司為名從浙西淮東制置使梁汝嘉所請也其後盡省惟四川沿海有焉四川係成都府沿海係明州開禧用兵起丘宗卿守金陵留鑰宗卿嘗以僉樞督視軍馬於是趙淳已為江淮制置命卿為江淮制置大使已而罷四川宣撫又以安子文為制置大使朝議以子文恩數視執政特加太字事類便宜張浚至襄陽自屬郡守二以下皆得誅賞因薦程千秋為涼西制置使假以丨丨王之望西事記舉按席大光在成都得旨位宣撫副使上凡監司不法許丨丨朝野雜記築堡置使范成大為四川制置使公以黎為要地奏置路分都監增五寨籍少壯為兵凡吐蕃擾邉徑路十有八悉丨丨丨丨重賞檄羣蠻使相疑二俄蕃牙擒文