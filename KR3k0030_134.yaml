中書門下丨丨事言行録功出儒者虞忠肅公允文字彬父逆亮叛順王權失律公以宣撫視師江上大破賊軍逆亮遁入揚州是日李顯忠至公曰京口無備我欲往公能分兵見助否顯忠即分李捧軍一萬六千人及戈船百艘㑹于京口公至京口謁劉錡錡曰朝廷養兵三十年我軰一技不施今日大丨乃丨於一丨丨我軰愧死矣同上宣諭循行吕忠穆公頥浩字元直時諸路盗賊稍息公慮守令不䖍請分御史丨丨諸路上乃詔三省選彊明亷謹之人臺察不足則以郎官攝之皆令引對面給親札御寳厯囬日攷其殿最以著賞罰分往諸路並以宣諭為名言行録薦劾髙宗紹興二年遣使宣諭諸路賜以宣諭詔書御寳手厯居他官者並攝御史劉大中胡蒙朱異明槖薛徽言五人同入見上諭曰比所下詔令州縣皆為虚文今遣卿等務令民被實惠守令民之師帥縣令尤親於民姦贓之吏必湏按發公正奉法之人必湏薦舉山林不仕者亦具名以聞平反獄訟觀問風俗等事並書於厯朕一一行之乃詔異使浙東福建蒙浙西大中江東西徽言湖南槖廣東西各賜内帑帛二百大中丨舉按丨兩盡其公士論稱之守攻累奏虞雍公之為宣諭也開幕府於襄陽以為荆襄藩籬實在唐鄧勝勢在唐州方城其次在樊城其次光花軍當先城新野次鄧州次唐州又開泌河以通漕運藩籬既固則襄漢乆安此丨䇿也王師進取之路出蔡以䁛秦出襄鄉以襲許出汝洛出商虢以震河東出商以圖陜西此丨策也部分以定丨丨以聞時相欲速和議棄唐鄧三州朝廷深悔之言行録退守屢爭虞雍國忠肅公允文自襄陽開幕府於興元時為川陜宣諭使經理有序闗河響應軍民歸附日以萬計且爭出芻粟牛酒以迎王師夫何言者謂宜棄陜西三路新復州郡而丨丨蜀之故封公丨丨不能得同上吳芾辭宣諭奏狀臣一介踈逺陛下過聼付臣以淮西之寄臣退惟江淮表裏之雄師旅營屯之衆事大躰重受任匪輕臣學不知兵才非應猝究淮西之形勢實江左之藩籬列城雲屯諸將環峙内以宣昭於王略外以安静於邉陲是必精神足以折衝智識足以應變始可當一面之重寄寛九重之顧憂如臣懵不習於軍旅愚且闇於事機儻冒寵榮必辜任使招討破賊孔巢父為河中陜華招討使累上丨丨方略帝嘉納本𫝊横陣一劒丨丨萬夫莫前陰則難窺勇則重閉亞夫緩急之任繼父綘侯祭遵禦侮之才為吾子路一品集王宰制懐撫前命相臣招丨丨諭矜而註誤示以生門期於盡脱綱羅豈欲驅之䧟穽而豺狼當道荆棘牽衣雖欲歸之於仁厥路無由而至元稹裴度制詩集宣撫諗夏卿六月歌周雅三邉丨丨丨欲施攻戰法先作簡稽行禮樂知謀帥春秋識用兵一勞堪定國萬里即長城策布和戎利威傳破虜名軍前雨灑道樓上月臨營别藻瑶華降同衣錦襮榮闗山由義近戈甲為恩輕絲竹路傍㪚風雲馬上生朝廷為吉甫邦國望君平張説和餞王睃廵邉詩解北門暫趍西掖望全丨丨丨憂専幕臨初護親營制督郵盧綸送鮑中丞赴大原抗旌廻廣漠築壇登上將膝席委前籌虜㓕南侵趾朝分北顧方憂丨丨丨丨丨撫劒動旄頭吕温送范司空赴朔旌旗出漢家鳯衘新詔降恩華又見丨丨丨丨丨故吏来辭新属國精兵願逐李輕車氊裘君長迎風懼錦綉酋豪踏雪衙劉禹錫送温大夫赴豊州宣諭鷁軸副尉西域返伏波南海還龍旗翻委欝丨丨更迴邅博選咆咻士廣募嫖姚尉映月比刀環㸔星嗟劒氣渤澥水尚寛崦嵫日猶未荀濟贈除凉州詩求瘼渡江野老思丨丨候館郴人憶下車郎士元送郴州裴明府充宣諭詩喻慈手持國憲羣僚畏口丨天丨百姓安羅維上李蘇州詩古今合璧事類備要後集卷六十五
