body:
  text: 古今合璧事類備要後集卷五十四宋謝維新撰三衙門殿前司附總三衙歷代沿革總三衙三衙即漢人之南軍也國朝沿五代之制有侍衛親兵及殿前兩司蓋侍衛親軍起於後唐職略又石林燕語云侍衛親軍自梁起宣武軍乃以鎮兵因舊號置在京馬步軍都指揮使而自將之蓋於唐六軍諸衛之外則為私兵至後唐明宗遂改為侍衛親軍殿前始於周世宗顯德元年五代會要世宗自髙平之戰覩其退縮慨然有懲革之意又以驍勇之士多為外諸侯所占於是詔募及有身首者分署為殿前之班因有散員散指揮使內殿直散都頭鐡騎控鶴之號國初侍衛親軍置都指揮使雖都虞候亦在殿前都指揮使之上淳化元年傅潛自殿前副都指揮使遷侍衛親軍馬步軍都虞候在殿前指揮使戴興之上咸平三年王超自殿前都指揮使遷侍衛親軍馬步軍都虞候實録自王超罷職無復任者而侍衛司馬軍步軍遂分為二并殿前號三衙而馬步二軍始居殿前司之焉職略三司天下之兵柄皆在其權雖重而軍政號令則在樞密院與漢周間史洪肇之徒為之者異矣此祖宗之微意非前世所及也石林燕語殿前司都指揮使副都指揮使都虞候掌殿前諸班直及步騎諸指揮之名藉凡統制訓練畨衛戍卒遷補賞罰皆總其政令入則侍衛殿陛出則扈從乘輿大禮則提點編排整肅禁衛鹵簿儀仗掌宿衛之事都指揮使以節度使為之而副都指揮使都虞候以刺史以上充資序淺則主管本司公事馬步軍亦如之備則通治闕則互攝四朝志祖宗以來三帥不曽闕兩人若殿帥闕難於從下超補姚麟係殿前都虞候合升作步軍副都指揮使元祐七年樞密王岩叟言政和四年詔殿前都指揮使在節度之上殿前副都指揮使在正任承宣使之上殿前都虞候在正任防禦使之上四朝志國初沿後周有殿前都點檢在都指揮上太祖有此承禪後不置焉中興以來主管殿前司一員其屬有幹辦公事主管禁衛各二員準備差遣準備差使點檢醫藥飯食各一員尋減辦公事一員增書寫機宜文字一員事類禁兵曹植東征賦云建安十九年王師東征余典丨丨行宫省爪士禁旅典兵為吾丨丨杜牧行髙軿制帥鉞仗丨丨余殿除王歧公除李璋制殿巖祗護丨丨東坡除苗授制巖除屬領丨丨之帥王歧公除李璋制嚴衛內典丨丨外秉節旄司馬溫公賜郝質詔虎臣總領禁衛為王丨丨溫公制扈從嘉其丨丨之勤溫公除殿帥逮節制八屯錫以六纛總此丨丨同上七萃內總丨丨之師外分十連之任溫公除郝質制朕虎臣總丨丨丨典綏王旅環列增肅周廬不驚曲阜行燕達制髯將軍劉猊以衆數萬欲犯建康楊和王沂中至藕唐與猊遇遣徑騎五千突入其軍賊兵亂沂中縱大軍乘之賊衆大敗猊曰適見丨丨丨鋭不可及果楊殿前也即以數騎遁中興系年録上言土木張耆字元弼真宗朝為殿中都虞候是時大興宫室之役以奉符瑞宰臣丁謂欲殫國財力雖大臣不敢議耆丨丨丨丨之役不足以承天意耆後為樞密使勸次澶州髙武烈王瓊為殿前都指揮使契丹直抵澶州真宗北幸駐蹕韋城大臣有丨上南巡者召問王行幄王曰誰謂陛下建此者國之安危事在轉漏遂發韋城丨丨丨將抵浮橋左右猶躊躇未進王下馬自扶輦擁衆渡河既而請帝御城北觀兵漢軍望黃蓋皆仰呼萬嵗種酋駭視失色有項弩伏發射契丹貴將橽覽死遂請盟手不釋卷燕達字逢辰元祐初為殿前都指揮使達起行伍然喜讀書丨丨丨丨神宗嘗問用兵愛克厥威可乎達曰威非不用要以愛為先令寓捕蟬宋守約為殿帥自入夏日輪軍校十數輩捕蟬不使得聞聲有鳴於前者皆重笞之人頗不堪神宗一日以問守約曰然上以為過守約曰軍中以號令為先臣承平總兵殿陛無所信其號丨故丨以丨丨耳蟬鳴固難禁而臣能使必去若陛下誤令守一障臣庶幾或可使人上以為然石林燕語置帥殿陛丨丨丨丨屬之董齊南豐擬制董率王旅丨丨丨丨溫公賜郝質召候視軍中士及林武宿衛左右而虞度丨丨於丨丨者其任堪寵南豐擬制典綏王旅就列大廷丨丨丨丨同上凝嚴之護進總丨丨丨丨歷圖徑傑之資王歧公除李章制虞度之事營衛之士皆天下武臣之髙選丨丨軍中丨丨是可非其人哉荆公除宋守約制右除領帥屬丨丨之丨丨歧公除李章制仗鉞殿除丨帥丨於丨丨同上衛士言粟腐髙瓊傳有丨丨丨丨丨王曰邊防戰守之兵暴露寒苦而所食者與豉同色若等日既食大官月給先進樣於上前豈特諸軍比也有一言以動吾軍者斬於是衆莫敢言言行録騎兵牧丹陽郭棣字子華淳熙五年擢殿前副都指揮使居殿巖十餘年嘗為上言丨丨駐輦轂下固以重內然江上有驚奔涉至勞未及對敵徑氣已挫願才留上所當用者餘悉丨之丨丨同選補增數萬王德用為樞密使許懷德為殿前都指揮使復奏丨廂軍以丨禁旅丨丨丨人東軒筆録選補以勞進王德用為殿前都指揮使先是軍中丨丨不以公其貧亡資雖當補不可得公點禁軍親為按籍丨丨舊第丨騎士請馬集於庭中混而給之吏無所容其私言行録總三衙周廬親衛諸軍虎旅百萬蓋天下武鋒之萃也既建三帥以護丨丨之師國史桄梯官制舊典管軍八信武辨軍八丨丨蓋殿前馬軍步軍副都指揮使三軍都虞候天武捧日龍神衛四廂都指揮使為管軍識威名髙武烈王瓊為殿前都指揮使管軍員缺王兼領二司言曰先朝自殿前而下各置副都指揮使及都虞候常有十人職近事親易以第進又使士卒預丨丨丨緩急臨戎上下附習此軍制之大要也上從之言行録營牧圉楊沂中提學宿衛親兵時衛兵不滿三千病其寡弱於是招丁壯丨丨丨未半歲軍容果張中興系年録令在密院見前沿革注禮繼二府熙寧九年殿前都指揮使郝質言往軍器監與判監劉奉世會議軍器上批殿前馬步三帥朝廷待遇丨丨丨丨事體至重寺監小宫豈可呼召自今止令移文定議續會要見宰執橫杖三衙內中丨丨丨皆丨丨于文德殿後主廊下唱喏宰相出立背上揖之外遇從官於通衢皆避馬此禮久廢惟內中橫杖之禮至今不廢也筆談與學士分道寶元康定余自貶所還京見王君貺初作舍人在坐見殿前馬步軍聨騎立門外呈榜稱不敢求見舍人遣人謝之而去慶厯三年余作舍人三衙軍相逢而斂馬駐立前呵者傳聲大尉立馬急遣人謝之此舍人馬過然後敢行後余官于外十年而還遂入翰林丨丨丨相逢丨丨而過更無斂避之禮蓋兩制漸輕三衙漸重歐公歸田步軍司歷代沿革國朝都指揮使副都指揮使都虞候掌步軍諸指揮之名籍凡統制訓練畨衛戍守遷補賞罰皆總其政令侍衛扈從及大禮宿衛如殿前司政和四年詔以步軍都指揮使副都指揮使在正任觀察使之上都虞候在正任防禦使之上四朝志中興以來主管侍衛步軍司數員幹辦公事凖備差遣點檢醫藥飯食事類督將補丨丨之缺淇水除苗青等制候奄王歧公行步軍都虞候制度兵計虞丨丨丨候司戎事亦統護之淇水除苗眚等制典親衛參丨丨丨曲阜行賈岩制典司禁戎丨丨丨丨唐大詔令劉希暹制掌諸名籍注見沿革視若神人黨進權步軍司事先是禁軍校自都虞候以上悉以所掌卒伍之數細書於所執之梃謂之杖記如笏記焉上一日問進兵籍幾何進不能對舉梃曰盡在是矣上笑謂其忠實進每擐甲胄則髭髯皆磔竪目光如電丨之丨丨丨長編言合名將國朝元昊既叛劉平遷副指揮使靜江軍觀察留後遂上攻守之䇿極論二冦利害時以其言丨孫吳以丨丨稱戍兵譁言髙武烈王瓊為步軍都指揮使會丨丨以廪食陳弱丨丨者瓊知之一日巡營士卒方坐食因取其飯啖之謂曰邊鄙無事而坐飽此無乏幸也范蜀公蒙求馬軍司歷代沿革國朝都指揮使副都指揮使都虞候都指揮使本方鎮軍校之名自梁起宣武軍乃以其鎮兵因仍舊號置在京馬步軍都指揮使掌馬軍諸指揮之名籍凡統制訓練畨衛戍守遷補賞罰皆總其政令侍衛扈從及大禮宿衛所掌如殿前司政和四年詔以馬軍都指揮使馬軍副都指揮使在正任觀察使之上馬軍虞候在正任防禦使之上四朝志中興以後主管侍衛馬軍司一員幹辦公事準備差遣點檢醫藥飯食常出戍建康事類既佶四牡丨丨既佶且間詩四牡雖賢漢王問魏騎將誰曰馮敬曰是秦將馮無擇子也丨丨不能當灌嬰騎帥明道初除夏守斌制云既䇿勵於從兵遂皆升於丨丨玉堂集候奄既建三帥以護周廬之帥又設丨丨之職以訓齊其政又疇次事勞宜進丨丨王歧除制成五陳燕達以功遷榮州防禦使為馬步軍副都指揮使神宗閲武騎患未精達請躬自巡教悉精鋭又采諸葛亮李靖遺意丨丨丨以教戰士進殿前副都指揮使哲宗即位遷殿前都指揮使東都事略噭萬旅材官車騎之衆號丨丨丨命爾將之淇水除盧政制典司禁戎唐大詔令劉希暹制云丨丨丨丨參司親衛文恭集賜侍衛都虞候云丨丨丨丨徒騎之虞王歧公制曰益遷丨丨丨丨軍候之職東坡除劉舜卿制云仍遷丨丨丨丨訓齊士伍元豐二年上批馬軍都虞候權主管步軍燕達能體朝廷丨丨丨丨之意故軍司所總帥從技能日進宜與二子閣職會要古今合璧事類備要後集卷五十四
