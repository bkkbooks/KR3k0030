body:
  text: 古今合璧事類備要後集卷五十四宋謝維新撰三衙門殿前司附總三衙歴代㳂革總三衙三衙即漢人之南軍也國朝㳂五代之制有侍衞親兵及殿前兩司葢侍衞親軍起於後唐職畧又石林燕語云侍衞親軍自梁起宣武軍乃以鎮兵因舊號置在京馬步軍都指揮使而自將之葢於唐六軍諸衞之外則為私兵至後唐明宗遂改為侍衞親軍殿前始於周世宗顯徳元年五代㑹要世宗自髙平之戰覩其退縮慨然有懲革之意又以驍勇之士多為外諸侯所占於是詔募及有身首者分署為殿前之班因有散員散指揮使内殿直散都頭鐡騎控鶴之號國初侍衞親軍置都指揮使雖都虞候亦在殿前都指揮使之上淳化元年傅潛自殿前副都指揮使遷侍衞親軍馬步軍都虞候在殿前指揮使戴興之上咸平三年王超自殿前都指揮使遷侍衞親軍馬步軍都虞候實錄自王超罷職无復任者而侍衞司馬軍步軍遂分為二并殿前號三衙而馬步二軍始居殿前司之焉職畧三司天下之兵柄皆在其權雖重而軍政號令則在樞密院與漢周間史洪肇之徒為之者異矣此祖宗之微意非前世所及也石林燕語殿前司都指揮使副都指揮使都虞候掌殿前諸班直及步騎諸指揮之名藉凡統制訓練畨衞戍卒遷補賞罰皆緫其政令入則侍衞殿陛出則扈從乗輿大禮則提㸃編排整肅禁衞鹵簿儀仗掌宿衞之事都指揮使以節度使為之而副都指揮使都虞候以刺史以上充資序淺則主管本司公事馬步軍亦如之備則通治闕則互攝四朝志祖宗以來三帥不曽闕兩人若殿帥闕難於從下超補姚麟係殿前都虞候合陞作步軍副都指揮使元祐七年樞密王岩叟言政和四年詔殿前都指揮使在節度之上殿前副都指揮使在正任承宣使之上殿前都虞候在正任防禦使之上四朝志國初㳂後周有殿前都㸃檢在都指揮上太祖有此承禪後不置焉中興以來主管殿前司一員其属有幹辦公事主管禁衞各二員準備差遣準備差使㸃檢醫藥飯食各一員尋减辦公事一員増書寫機宜文字一員事類禁兵曹植東征賦云建安十九年王師東征余典丨丨行宫省爪士禁旅典兵為吾丨丨杜牧行髙軿制帥鉞仗丨丨余殿除王歧公除李璋制殿巖祗護丨丨東坡除苗授制巖除属領丨丨之帥王歧公除李璋制嚴衞内典丨丨外秉節旄司馬溫公賜郝質詔虎臣緫領禁衞為王丨丨溫公制扈從嘉其丨丨之勤溫公除殿帥逮節制八屯錫以六纛緫此丨丨同上七萃内緫丨丨之師外分十連之任温公除郝質制朕虎臣緫丨丨丨典綏王旅環列増肅周廬不驚曲阜行燕達制髯將軍劉猊以衆數萬欲犯建康楊和王沂中至藕唐與猊遇遣勁騎五千突入其軍賊兵亂沂中縱大軍乗之賊衆大敗猊曰適見丨丨丨鋭不可及果楊殿前也即以數騎遁中興系年錄上言土木張耆字元弼真宗朝為殿中都虞候是時大興宫室之役以奉符瑞宰臣丁謂欲殫國財力雖大臣不敢議耆丨丨丨丨之役不足以承天意耆後為樞密使勸次澶州髙武烈王瓊為殿前都指揮使契丹直抵澶州真宗北幸駐蹕韋城大臣有丨上南巡者召問王行幄王曰誰謂陛下建此者國之安危事在轉漏遂𤼵韋城丨丨丨將抵浮橋左右猶躊躇未進王下馬自扶輦擁衆渡河既而請帝御城北觀兵漢軍望黄葢皆仰呼萬嵗種酋駭視失色有項弩伏𤼵射契丹貴将橽覧死遂請盟手不釋卷燕達字逢辰元祐初為殿前都指揮使達起行伍然喜讀書丨丨丨丨神宗嘗問用兵愛克厥威可乎達曰威非不用要以愛為先令寓捕蟬宋守約為殿帥自入夏日輪軍校十數輩捕蟬不使得聞聲有鳴於前者皆重笞之人頗不堪神宗一日以問守約曰然上以為過守約曰軍中以號令為先臣承平緫兵殿陛无所信其號丨故丨以丨丨耳蟬鳴固難禁而臣能使必去若陛下誤令守一障臣庶幾或可使人上以為然石林燕語置帥殿陛丨丨丨丨属之董齊南豐擬制董率王旅丨丨丨丨温公賜郝質召候視軍中士及林武宿衞左右而虞度丨丨於丨丨者其任堪寵南豐擬制典綏王旅就列大廷丨丨丨丨同上凝嚴之護進緫丨丨丨丨歴圖勁傑之資王歧公除李章制虞度之事營衞之士皆天下武臣之髙選丨丨軍中丨丨是可非其人哉荆公除宋守約制右除領帥属丨丨之丨丨歧公除李章制仗鉞殿除丨帥丨於丨丨同上衞士言粟腐髙瓊傳有丨丨丨丨丨王曰邊防戰守之兵暴露寒苦而所食者與豉同色若等日既食大官月給先進様於上前豈特諸軍比也有一言以動吾軍者斬於是衆莫敢言言行錄騎兵牧丹陽郭棣字子華淳熙五年擢殿前副都指揮使居殿巖十餘年嘗為上言丨丨駐輦轂下固以重内然江上有驚奔涉至勞未及對敵勁氣已挫願纔留上所當用者餘悉丨之丨丨同選補增數萬王徳用為樞密使許懐徳為殿前都指揮使復奏丨廂軍以丨禁旅丨丨丨人東軒筆錄選補以勞進王徳用為殿前都指揮使先是軍中丨丨不以公其貧亡貲雖當補不可得公㸃禁軍親為按籍丨丨舊第丨騎士請馬集於庭中混而給之吏无所容其私言行錄總三衙周廬親衞諸軍虎旅百萬葢天下武鋒之萃也既建三帥以護丨丨之師國史桄梯官制舊典管軍八信武弁軍八丨丨葢殿前馬軍步軍副都指揮使三軍都虞候天武捧日龍神衞四廂都指揮使為管軍識威名髙武烈王瓊為殿前都指揮使管軍員缺王兼領二司言曰先朝自殿前而下各置副都指揮使及都虞候常有十人職近事親易以第進又使士卒預丨丨丨緩急臨戎上下附習此軍制之大要也上從之言行錄營牧圉楊沂中提學宿衞親兵時衞兵不滿三千病其寡弱於是招丁壯丨丨丨未半歳軍容果張中興系年錄令在密院見前㳂革注禮繼二府熙寜九年殿前都指揮使郝質言徃軍器監與判監劉奉世㑹議軍器上批殿前馬步三帥朝廷待遇丨丨丨丨事體至重寺監小宫豈可呼召自今止令移文定議續㑹要見宰執横杖三衙内中丨丨丨皆丨丨于文徳殿後主廊下唱喏宰相出立背上揖之外遇從官於通衢皆避馬此禮久廢惟内中横杖之禮至今不廢也筆談與學士分道寳元康定余自貶所還京見王君貺初作舎人在坐見殿前馬步軍聨騎立門外呈榜稱不敢求見舎人遣人謝之而去慶厯三年余作舎人三衙軍相逢而歛馬駐立前呵者𫝊聲大尉立馬急遣人謝之此舎人馬過然後敢行後余官于外十年而還遂入翰林丨丨丨相逢丨丨而過更无歛避之禮葢兩制漸輕三衙漸重歐公歸田步軍司歴代㳂革國朝都指揮使副都指揮使都虞候掌步軍諸指揮之名籍凡統制訓練畨衞戍守遷補賞罰皆緫其政令侍衞扈從及大禮宿衞如殿前司政和四年詔以步軍都指揮使副都指揮使在正任觀察使之上都虞候在正任防禦使之上四朝志中興以來主管侍衞步軍司数員幹辦公事凖備差遣點檢醫藥飯食事類督將補丨丨之缺淇水除苗青等制候奄王歧公行步軍都虞候制度兵計虞丨丨丨候司戎事亦統䕶之淇水除苗𤯝等制典親衞參丨丨丨曲阜行賈岩制典司禁戎丨丨丨丨唐大詔令劉希暹制掌諸名籍注見㳂革視若神人党進權步軍司事先是禁軍校自都虞候以上悉以所掌卒伍之數細書於所執之梃謂之杖記如笏記焉上一日問進兵籍幾何進不能對舉梃曰盡在是矣上笑謂其忠實進每擐甲胄則髭髯皆磔竪目光如電丨之丨丨丨長編言合名將國朝元昊既叛劉平遷副指揮使靜江軍觀察留後遂上攻守之䇿極論二冦利害時以其言丨孫呉以丨丨稱戍兵譁言髙武烈王瓊為步軍都指揮使㑹丨丨以廪食陳弱丨丨者瓊知之一日巡營士卒方坐食因取其飯啖之謂曰邊鄙无事而坐飽此無乏幸也范蜀公蒙求馬軍司歴代㳂革國朝都指揮使副都指揮使都虞候都指揮使本方鎮軍校之名自梁起宣武軍乃以其鎮兵因仍舊號置在京馬步軍都指揮使掌馬軍諸指揮之名籍凡統制訓練畨衞戍守遷補賞罰皆緫其政令侍衞扈從及大禮宿衞所掌如殿前司政和四年詔以馬軍都指揮使馬軍副都指揮使在正任觀察使之上馬軍虞候在正任防禦使之上四朝志中興以後主管侍衞馬軍司一員幹辦公事準備差遣㸃檢醫藥飯食常出戍建康事類既佶四牡丨丨既佶且閑詩四牡雖賢漢王問魏騎将誰曰馮敬曰是秦将馮无擇子也丨丨不能當灌嬰騎帥明道初除夏守斌制云既䇿勵於從兵遂皆升於丨丨玉堂集候奄既建三帥以護周廬之帥又設丨丨之職以訓齊其政又疇次事勞宜進丨丨王歧除制成五陣燕達以功遷榮州防禦使為馬步軍副都指揮使神宗閲武騎患未精達請躬自巡教悉精銳又采諸葛亮李靖遺意丨丨丨以教戰士進殿前副都指揮使哲宗即位遷殿前都指揮使東都事畧噭萬旅材官車騎之衆號丨丨丨命爾将之淇水除盧政制典司禁戎唐大詔令劉希暹制云丨丨丨丨參司親衞文恭集賜侍衞都虞候云丨丨丨丨徒騎之虞王歧公制曰益遷丨丨丨丨軍候之職東坡除劉舜卿制云仍遷丨丨丨丨訓齊士伍元豐二年上批馬軍都虞候權主管步軍燕達能體朝廷丨丨丨丨之意故軍司所緫帥從技能日進宜與二子閣職㑹要古今合璧事類備要後集卷五十四
