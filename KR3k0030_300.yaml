body:
  text: 古今合璧事類備要别集卷九十四宋謝維新撰蟲豸門螢格物總論螢者是腐草及爛竹根所化初猶未如蟲腹下已有光數日便變而能飛然生階地池澤常在大暑前後飛出是得大火之氣而化故如此明照也一名夜光一名放光一名熠耀一名即照非隂濕處終無矣事類腐草季夏之月丨丨為螢記月令又見後丹烏丨丨羞白烏丨丨者丹良也云云其謂之丨者重其養也凡有翼者為烏羞也羞者進也大戴禮宵行熠耀丨丨詩東山夜光螢火一名暉夜一名燐一名丹良一名丹烏一名丨丨一名宵燭腐草為之食古今注螢火丸方務成子丨丨丨丨云漢武威太守劉子南從道士尹公授其方合而佩之永平中於武威北界遇虜戰敗為冦所圍矢下如雨未至子南馬數尺矢輒墮地終不能中傷虜以為神人乃解圍去神仙感應篇螢火照書車𦙍字武子家貧無燈火以絹囊盛丨丨以丨丨夜讀徴求數斛隋煬帝大業未天下已盜起帝於景華宫丨丨螢火丨丨夜出遊山如放火光遍巖谷晋傅咸螢賦余嘗獨處夜不能寐顧見螢火遂有感於是執以自照而為之賦不其詞曰潛空館之寂寂兮意遙遙而靡寧夜耿耿而寐兮憂悄悄而多傷哀斯火之烟滅兮近腐草而化生感詩人之攸懷兮覽熠耀於前庭不以資質之鄙薄兮欲增輝乎泰清雖無補於日月兮期自照於陋形當朝陽而戢景兮必宵昧而是征進不競於天光兮退在晦而能明諒有似於賢臣兮雖疏外而盡誠蓋物小而喻大兮固作者之所旌假乃光而喻爾職兮庶有表乎忠貞駱賔王螢賦類君子之有道入暗室而不欺同至人之無迹懷明義以應時詩集緣帷徹螢鑒丨丨丨杜拂席流螢光丨丨丨韋應物臨書卷幸因腐草出敢近太陽飛未足丨丨丨時能㸃客衣隨風隔幔小帶雨傍林微十月清霜重飄零何處歸杜甫入人衣巫山秋夜螢火飛簾疏巧丨坐人衣忽驚屋裏琴書冷復亂簷邊星宿稀繞却井欄添箇箇偶經花蘂弄輝輝滄江白髮愁看汝來嵗如今歸未歸前人借光影放螢去不須留聚時年少今白頭架中科斗萬餘卷一字千回重照見青雲杳渺不可親開囊欲放增餘怨且逍遙還酩酊仲舒謾不窺園井那將寂寞老病身更就微蟲丨丨丨欲放時淚霑裳衝籬落千㸃光劉言史放螢怨照晚涼玉虬分靜夜金螢丨丨丨含輝疑泛月帶火怯凌霜散彩縈虛牖飄花繞洞房下帷知不倦當解借餘光駱賔王秋螢清風吹漢陵秦苑遙蒼蒼陳糧腐葉秋螢光夜空寂寥金氣淨千門九陌飛悠揚紛綸輝映平明滅金爐星噴燈花發露華洗濯丨丨丨攢茅不定招搖垂髙麗罘罳過珠網斜歷旋題舞羅幌曝衣樓上拂香裙承露臺前轉仙掌槐市諸生夜對書北忩分明辨魯魚行子東山起征思中郎騎省悲秋氣銅雀人歸自入簾長門帳空來照淚誰言向晦常自明童兒走步嬌女爭天生有光非自衒逺近低昻暗中見撮蚊襖鳥亦夜飛趐如車輪人不見劉禹錫秋螢引秋露洗映水光難定凌虛體自輕夜風吹不滅丨丨丨還明向燭仍藏熖投書更有情猶將流亂影來傍此檐楹李嘉運疑不熱著人丨丨丨集草訝無烟到來燈下暗翻在雨中燃梁元帝冷無烟徘徊無燭丨丨丨秋徑莎庭入夜天休向書忩來照字近來紅蠟滿歌筵羅鄴生處太卑微江邊螢火故輝輝巧解穿簾又㸃衣但取見時增意思難窮丨丨丨丨丨月明敢向星中亂雲黑偏能雨裏飛今日分明知我去何年漂泊照吾歸張藝叟幽室自分明碧梧含風夏夜清林塘五月初飛螢翠屏玊簟起涼思一㸃秋心從此生方池水深溪雨積上下輝輝亂凝碧幸因簾捲到華堂不畏人驚照瑶席漢宮千門連萬戶夜夜螢煌暗中度光流太液池上波影落金門月中露銀闕蒼蒼玊漏遲年年為鹵足愁思長門怨妾不成寐團扇美人還賦詩避暑風廊人笑語欄下撲來羅扇小已投丨丨丨丨丨更伴殘星碧天曉君不見連昌宫殿洛陽西破瓦頽垣今古悲荒榛腐草無人跡只有秋來熠耀飛張文濳蝗格物總論蝗形類蚱蜢螽類腹下有梵字是魚子在水中化為之或又以為蝦化也亢旱則見千萬為羣飛常蔽天日所至苖稼為之一空或以為即螽當考事類蝗飛入海馬援為武陵太守郡連有蝗援振貧羸薄賦稅丨丨丨丨化為魚蝦東觀漢記蝗不入境魯恭為中牟令飛丨丨丨丨又宋均為九江守山陽楚沛多蝗至九江輒四散使者捕蝗漢平帝時蝗詔丨丨丨丨人能捕蝗詣吏者以石斗受錢苑中掇蝗貞觀間京畿旱蝗食稼太宗在丨丨丨丨吞之曰但當食朕毋害百姓是嵗蝗不為患分道殺蝗開元間山東大蝗姚崇奏詩云秉畀炎火此除蝗之義也乃出御史為捕蝗使丨丨丨丨倪若水上言除天灾者當以德昔劉聰除蝗不克而害愈甚崇移書誚之曰聰僞主德不勝妖今妖不勝德若水懼乃縱捕得蝗十四萬石云云蝗害訖息募民捕蝗五代晋出帝天福間丨丨丨丨易以粟備史飛蝗蔽天祥符九年飛蝗過京城上詣玊清宫靈寶塔焚香祈禱禁宮城音樂三日先是上出死蝗示大臣翌日執政有袖死蝗以進者請示於朝率百官賀王旦曰蝗出於災災弭幸也又何賀焉固不可乃止於是二府方奏事丨丨丨丨上曰使百官方賀而蝗若此豈不為天下笑耶飛蝗墮水趙抃守青州時山東旱有蝗自青齊及境遇風退飛墮水而死言行録飛蝗自北荆公罷相出鎮金陵時丨丨丨丨而南江東諸郡縣百官餞荆公於城外劉貢父後至追之不及見先行榻上有一書屛因書一絶以寄云青苖助役兩妨農天下嗷嗷怨相公惟有蝗蟲偏感德又隨台斾過江東詩集始生朝畝暮已頃捕蝗之術世所非欲究此語興於誰或云豐凶嵗有數天孽未可人力支或言蝗多不易捕驅民入野踐其畦因云姦吏恣貪擾戶到頭斂無一遺蝗笑食苖民自苦吏虐民苖皆被之吾嗟此語祗知一不究其本論其皮驅雖不盡勝養患昔人固已决不疑秉蟊投火况舊法古人去惡猶如斯既多而捕誠未易其失安在常由遲詵詵最說子孫衆為腹所孕多蜫蚳丨丨丨丨丨丨丨化一為百無根涯口含鋒刃嫉風雨毒腸不飽疑常饑髙原下隰不知數進退整若隨金鼙嗟兹羽孽物共惡不知造化其誰尸大凡萬事悉如此禍當卑絶防其微蠅頭出土不急捕羽翼已就功難施只驚羣飛自天下不究生子由山陂官書立法空太峻吏愚畏罰反自欺蓋藏十石敢申一上心雖惻何由知不如寬法擇良令告蝗不隱捕以時今苖因捕雖踐死明嵗猶免為蝝災吾嘗捕蝗見其事較以利害曽深思官錢二十買一斗示以明信民爭馳斂微成衆在人力頃刻露積如京坻乃知孽蟲雖甚衆嫉惡茍鋭無難為往時姚崇用此議誠哉賢相得所宜因吟君贈廣其說為我持之告採詩歐公答米寀灑遍秋田雨不如西來烟陳塞空虛丨丨丨丨丨丨丨新法清平那有此老身窮苦自招渠無人可訴烏銜肉憶弟難逢犬寄書自笑迂疏皆此類區區猶欲理蝗餘東坡捕蝗有懷子由弟蚊附蠓蠛蚋子蟆子浮塵子格物總論蚊囓人飛蟲是惡水中蟲羽化所生常晝伏而暮飛又有鳥其大如雞黑色名鷏從口中吐出嘗一二升許謂之蚊母鳥生南方池澤茹藘中也一種蠓蠛喜亂飛生朽壤之中因雨而至覩陽則死蚋子蟆子浮塵子亦蚊類蟆子黑而小不礙沙榖乃夜伏而晝飛浮塵子微而不可見與塵相浮而上下人苦之往往䝉絮衣自蔽而浮塵輒能通透及人肌膚然與蟆子皆巢於巴蛇鱗中故囓人輒成瘡秋夏不愈其毒又甚於蚊子事類白鳥丹鳥羞丨丨白鳥謂蚊蚋也大戴禮黍民呼蚊蚋為丨丨古今注詳見蟻門焦𡨕海上有蟲巢蚊睫名曰丨丨列子噆膚蚊虻丨丨則通宵不寐矣莊子集肉齊桓公卧於柏寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人悒悒今白鳥營營是必饑耳因開翠紗之幬進之其蚊有知禮者不食公之肉而退有知足者丨公之丨而退有不知足者遂長噓短吸而食之及其飽也腹腸為之潰破金樓子使負山肩吾見狂接輿接輿曰日中何以語汝肩吾曰已出經式義度孰敢不聽而化接輿曰是欺德也其於治天下也猶涉海鑿河而丨蚊丨丨也莊子聚成雷漢中山靖王朝天子置酒聞樂而泣問其故靖王對曰臣聞衆詬漂山丨蚊丨丨是以文王拘於羑里孔子厄於陳蔡本傳覆射知蚊東方朔傳郭舍人曰願問朔一事朔得臣願榜一日朔窮臣當賜帛曰客從東方來歌謡且行不從門入踰我垣墻游戲中庭上入殿堂擊之桓桓死者攘攘格鬭而死主人被創是何物也朔曰長喙細身晝亡夜存嗜肉惡燈為掌指所捫臣朔愚戇名之曰蚊舍人辭窮當復脫褌道術禁蚊後漢趙炳有丨丨章安令惡其惑衆收殺之人為立祠於永康至今蚊蚋不能入常不驅蚊吳猛少有孝行夏日丨手丨丨丨懼其去已而噬親也孝子傳未嘗有蚊梁孫謙居身儉素牀施籧篨屏風夏日無幬帳而夜卧丨丨丨丨蚋張妃綃幬崔祖思啓陳政事曰宋武帝節儉丨丨房唯碧丨蚊丨荆州髙齊梁湘東王蕭澤作金樓子曰丨丨丨丨盛夏之月無白鳥余寢虞於其中及移餘齊則聚蚊之聲如雷矣數丈之間如此之異吁可怪哉遂以蚊死舊傳有女子夜過髙郵去郭三十里天隂蚊盛有耕夫田舍在焉其嫂止宿女曰吾寧處死不可失節丨丨丨丨其筋見焉人為立祠曰露筋祠不堪蚊咬歐陽公云豫作憎蠅賦蠅可憎矣尤丨丨丨子自逺喓喝來丨人也聞見録蠓蠛道猶醢雞孔子問老𥅆之言其告顔回曰丘之於丨也其丨丨丨歟莊子蚋子王周蚋子賦蚋子之下有蟆子蟆子之下有浮塵子三者異乎皆狀小而異世云巴蛇鱗介中微蟲所變耳三伏間晝飛夜息咂啄人肌膚動為瘡痏能飛不見其翼能囓不見其口微渺之極雖縝密衣服亦可通透莊生焦冥之說近之也至微之蟲象詩獨無蚋故作賦以廣之蟲之至微名之曰蚋信乎蟣之别品為復蝨之餘裔君巢蚊之異類結搏牛之深契附諸鬱蒸産彼蕪穢張華之識何以辨其兩翼離婁之明何以見其長喙伺暑絺之漏露萃豐肌而睥睨默然而至暗然而噬人之至靈何闕爾之所衛人之至剛何反爾之所制狀斯咄咄籲於造物何不恣蛇虺之毒必當與之為避何不張虎豹之口不敢與之為忽豈食其人之膏血資已之肥腯念膚體之何毁痛瘡痏之難沒吾將擷楸葉以為療俾爾之銷骨者也詩集營營五月中秋息饑蚊尚丨丨但將膏血求豈覺性命輕顧已寧自愧飲人以偷生願為天下掃一使夜景清孟郊擾擾天下有蚊子候夕噆人膚平望有蚊子白晝來相屠不避風與雨羣飛出菰蒲丨丨蔽天黑轟然隨舶艫利觜入人肉微形紅且濡振蓬亦不懼至死貪膏腴舟人敢停棹陸者亦疾趨南北百餘里畏之如虎驅噫嘻天地間萬物各有殊陽者陽為任隂者隂為徒蚊蚋是何物夜後喧墻隅如何正曦赫吞噬當通衢人筋為爾斷人力為爾枯衣襟穢且甚盤饌腥有餘豈好生為德不能使消除豈是有主者此鄉宜毒荼吾聞蛇能螫避之則無虞吾聞蠆有毒見之可疾驅唯是此蚊子逢人皆病諸江南夏景好水木多瀟疏此中震驛路風月彌清虛前後幾來往襟懷未曽舒朝既䝉襞積夜仍局籧蒢雖然好吟詠其奈難踟蹰人生有不便失意當何如誰能假羽翼直上言洪爐吳融平望蚊子多可掬擾擾萬類殊可憎非一族甚哉蚊之微豈足汚簡牘乾坤量寬大善惡皆含育荒茫三王前民物交相黷禹鼎象神姦蛟龍逺濳伏周公驅猛獸人始居川陸邇來千百年天地得清肅大患已云除細微遺不録蠅虻蚤蝨蟣蜂蝎蚖蛇蝮惟爾於其間有形才一粟雖微無奈衆惟小難防毒嘗聞髙郵間猛虎死凌辱哀哉露筋女萬古讎不復水鄉自宜爾可怪窮邊俗晨食下幃幬盛暑泥駒犢我來守窮山地氣尤卑溽官閒懶所便惟睡宜偏足難堪爾類多枕席厭緣撲薰簷苦烟燼燎壁疲照燭荒城繁草樹旱氣飛炎熇羲和驅日車當午不轉轂清風得夕涼如赦脫囚梏掃庭露青天坐月䕃嘉木汝寧無他時忍見此迫促翾翾伺昏黑稍稍出壁屋填忩來若翳聚隙丨丨丨叢身疑陷圍聒耳如遭哭猛攘欲張拳暗中甚飛鏃手足不自救其能營背腹盤飱勞扇拂立寐僵僮僕端能窮百計還坐瞑雙目於吾誠不較在爾誠為酷誰能推物理無乃乖人欲騶虞鳳凰麟千載不一蠾思之不可見惡者無由逐歐陽公憎蚊豈堪數頽陽照窮巷暑退涼風生夫子卧環堵振衣步前楹愁烟起四鄰鳥雀喧空庭餘景藹欲昏衆蚊復薨薨羣飛丨丨丨但厭聲營營抱琴不暇撫揮麈無由停散帙復歸卧詠言聊寫情覆載無巨細善惡皆生成朽木出衆蠧腐草為飛螢書魚長隂溼醯雞由鬱蒸豕鬛固多蝨牛間常聚虻元氣或抑鬱播之為孽腥卑臭乃其類清虛非所經華堂敞髙棟綺疏乃藻扄金釭瑩椒璧玉壺食夜氷終朝事薰袚豈敢近簷甍富貴非茍得抱節居茅衡隂墻百蟲聚下偃衆穢盈何嘗曲肱樂但若聚雷聲江南美山水水木正秋明自古住麗國能助詩人情喧囂不可久片席何時征梅聖俞許巢睫向晚化汙積羣飛來戶庭蟭螟丨丨丨琥珀為留形夜色偏容蔽雷音亦感聽猶矜負山力血食也霑腥梅都官猶撲面江城落木已窮秋病客初寒欲襲裘暗室飛蚊丨丨丨不知天上火西流張文潛秋蚊蟆子噆肌膚蟆子微於蚋朝繁夜則無毫端生羽翼針喙丨丨丨暗毒應難免羸形日漸枮將身逺相就不敢恨非辜通鼻息有口深堪異趨時詎可量誰令丨丨丨何故辨馨香沉水來滄海崇蘭泛露光那能枉焚爇爾衆我微茫並元稹浮塵子有毒無聲可嘆浮塵子纎埃喻此微寧論隔紗幌并解透綿衣丨丨能成痏丨丨不見飛病餘雙眼暗何計辨氛霏並元稹暗囓潛飛但覺皮膚憯安知瑣細來因風吹薄霧向日誤輕埃丨丨堪銷骨丨丨有禍胎能無防備處留待雪霜摧前人蜘蛛格物總論蜘蛛大腹深灰色多於空中作圓網然亦數種在地布網者名土蜘蛛絡羃草上者名草蜘蛛長踦者名蠨蛸小而長腳者名蟢子能於空中作懸網狀如魚罾者亦名䖦蟱然有赤斑者有五色者有大身上有刺毛者有薄小者惟在屋西面有網身長凥大腹內有蒼黃膿者為真其大者身徑數寸而踦長數倍其網羅竹柏盡死事類蟢母長踦河內人謂之丨丨著人衣當有親客至詩疏絡婦有赤斑者名丨新婦本草陶隱居注蝥作網湯出見羅者湯下車命解其三面而置其一面更教之祝曰昔蛛丨丨丨今人學結欲左者左欲右者右欲髙者髙欲下者下吾取其犯命者世紀蛛布網晋公子重耳奔齊與五臣遊乎大澤之中蜘丨丨丨曳繩執象而食之公子重耳乃撫僕之手駐駟而觀之顧其臣咎犯曰此蟲也智之薄者矣猶沒其智布其網曳其繩執象而食之况乎人之有智而不能廓垂天之網布絡地之繩以供方寸之御是曽不知蜘蛛之智孰可謂之人乎咎犯曰公子慎勿言也君終行之則有邦有嗣也符子蜘蛛集樊噲問陸賈曰古帝王人君皆云受命於天皆有瑞應豈然乎賈曰有之夫目瞤得酒食火花得錢財乾鵲噪而行人至丨丨丨而百事喜小故猶徴大亦宜然故目瞤則呪之鵲噪而餧之蜘蛛集則放之况天下大寶人君非天命何以得之西京雜記蜘蛛隱楚國龔舍初隨楚王朝宿未央宫是蜘蛛焉有赤蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能得出焉舍乃嘆曰吾生亦如是耳仕宦人之網羅也豈可淹歲於是桂冠而退時人笑之謂舍為丨丨之丨金樓子害物命王守一自稱終南山人布衣賣藥於洛陽市嘗携一拄杖每見蛛網必以杖毁裂盡淨而後已或問之曰天地之間飛走之屬捕逐搏拏固非一物均為是口腹以養性命獨蜘蛛結網張羅設機巧以丨丨吾是以惡之勝非録中蜂毒處士劉易隱居王屋山嘗於齊中見一大蜂罥於蛛網蛛搏之為蜂所螫墜地俄頃蛛腹欲裂徐行入草蛛囓芋梗微破以瘡就囓處磨之良久腹漸消輕躁如故自後人有為蜂螫者挼芋梗傅之則愈筆談羅隱秋蟲賦秋蟲蜘蛛也身置羅網間實腹亦羅網間愚感其理有得喪因以賦之物之小兮迎網而斃物之大兮兼網而逝網也者繩其小而不繩其大吾不知爾身之危兮腹之餧兮吁李德裕喜徴論陸賈稱蟢子垂而百事喜不徴其故何也凡人捋有喜兆必垂於冠冕余嘗思之蓋以人具圓方之形禀五行之氣有生之最靈者也如景如火忽有歊然感氣發於圓丘之上其榮盛也如陽氣發生烟煴􅉼煦有衰變也如秋氣索然寂寞沉瘁雖不能自覩其鑒明者必可察之唐舉許負疑用此術所以望表而知窮達何以明之淑春愛景必有蟢子垂於簷楹之間室有明燭膏燼必垂於屏幃之際喜氣將盛故集於冠冕之上以此推之無所逃也張文濳蜘蛛賦魚遊假淵鳥棲求木而我所宅獨取諸腹巢于墻屋人不豫取朝蠅暮蚊食人所惡彼殘物所養而無益於世雖名人兮斯蟲是愧詩集長踦蜘蛛天下足巴蜀就中多縫隙容丨丨虛空織橫羅縈纒傷竹柏吞噬及蟲蛾為送佳人喜珠櫳無奈何元稹喜絲稚子憐圓網佳人呪丨丨那知緣暗隙忽復囓柔肌毒腠攻猶易焚心療恐遲看看長襖緒和扁欲漣洏前人爾絲専孽春蠶吐出絲濟世功不絶蜘蛛吐出絲飛蟲成聚血蠶絲何専利丨丨何丨丨映日張網羅遮天亦何别儻居要地門害物可堪說網成雖福已網敗還禍爾小人與君子利害一如此蘇拯汝絲為網萬類皆有性各各禀天和蠶身與汝身汝身何大闕身不為己汝身不為他蠶絲為衣裳丨丨丨丨爾何孟幾無功害物日已多百蟲雖切恨其將奈郊諷反顧爾蠶笑誰謂闕民患謀身一闕曳斯民患寒冽爾為裳與襦斯裸赤爾使且婁餘事及闕木自庇一縷無彼蛛豈無絲結網緣庭除朝昏伺羣飛所得充膏腴丨丨丨丨丨容容乃良圖如何為民害不自安其軀屈平於國智朝錯於身愚石顯以佞寵望之以讒誅須知磊落人死耳不為蛛張藝叟蠶蛛行妨礙小蟲飛靜看簷蛛結網低無端丨丨丨丨丨蜻蜓倒桂蜂兒窘催喚山童為解圍范至能古今合璧事類備要别集卷九十四
