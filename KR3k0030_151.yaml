body:
  text: 古今合璧事類備要續集卷一宋謝維新撰氏族門姓氏歷代源流姓氏之來尚矣古者天子賜姓命氏諸侯賜族其實一也然所以不同者姓統其祖考之所自出雖百世而不變氏别其子孫之所自分凡數世而一變故言姓則在上言氏則在下也至於族訓亦氏之别名也其名雖殊其實未嘗不一故黃帝之子二十五人而得姓者十有四姬姓者二人其十一人曰酉祁已滕臧任荀釐姞嬛衣餘皆德薄不足録然則姓氏族皆不輕矣自是以降堯本姓伊祁其後有别以劉氏范氏者舜本姓姚其後有别以虞氏陳氏者夏本姒姓商夲子姓周本姬姓其後又有别以夏后氏有扈氏有男氏斟尋氏彤城氏褒氏費氏杞氏繒氏辛氏宣氏斟氏戈氏有殷氏來氏宋氏空桐氏雉氏北殷氏目夷氏沈氏閻氏韓氏于氏應氏已不勝其多况裂為侯國而其國又各有命族之典如孟仲季臧東門子叔同出於魯遊國封印公父伯張同出於鄭向華蕩樂鱗魚仲老同出於宋欒髙崔國叔仲東郭同出於齊尤不可勝數矣自秦而降氏族之制出於上之所賜下之所更者亦絶無而僅有至於世守一氏傳千萬年而不變者天下皆是也今散見于後茲不縷敘焉事類别生丨丨分類書舜典注生姓也别其姓族分其類使相從也為祖姓者生也以此丨丨令之相生雖下及百世而此姓不改族者屬也與其子孫共相連屬其旁支别屬則各自為氏左隱八年注同姓豈無他人不如我丨丨詩杕杜異姓周之宗盟丨丨為後左隱十一四姓漢丨丨小子侯漢明帝紀注又凡三世有三公者曰膏粱有令儀者曰華腴尚書領護而上為甲姓九卿若方伯者為乙姓散騎常侍大夫為丙姓吏部正員外郎為丁姓凡得入者謂之丨丨栁芳論五姓以崔盧李鄭為四姓加太原王氏號丨丨六帖又近世乃有丨丨謂宫也商也角也徴也羽也以為天下萬物悉配屬之以處吉凶然言皆不類如張王為商武庾為羽是以音相諧附至栁為宫趙為角則又不然其間一姓而兩屬復姓數字不得所歸是直野人巫師説耳吕才卜宅篇右姓唐貞觀氏族志凡第一等則為丨丨路氏著姓略以盛門為丨丨栁沖姓族系録凡四海望族則為丨丨六帖庶姓髙宗朝太原王范陽盧榮陽鄭清河博陵三崔趙郡隴西二李其族望恥與諸姓為婚髙士亷傳帝王姓五丨三丨自黃帝至舜禹皆同丨而異其國號以章明德故黃帝為有熊顓帝為髙陽帝嚳為髙辛帝堯為陶唐帝舜為有虞禹為夏后而别姓姒氏契為商姓子氏稷為周姓姬氏史舜紀炎黃裔后嘗問諸儒言氏皆本於丨丨之丨則上古乃無有姓乎張説曰古未有姓若夷狄然自炎帝之薑黃帝之姬始因所生地而為之姓詳見後氏族土為氏舜由媯汭故陳為溈姓史封為氏文王丨子時叔於沈其後丨沈丨太公望本姓薑氏封於吕故曰吕尚武王封泰伯曾孫於閻其後為閻氏畢晉穆侯封少子成師於韓其後為韓氏晉獻公封萬於魏其後為魏氏後宋公子段食於禇其後為禇氏為宋太公食於蕭其為蕭氏楚賁皇食於苗其後苗氏晉叔向食於楊其後為楊氏山杞之後食於婁故為婁氏越之後食於歐之陽故為歐陽氏名為氏陳伯袁之後為袁氏齊公子髙之後為髙氏衛公子惠孫之後為孫氏宋公子樂父之後為樂氏宋司冦牛父之後為牛氏魯閔子騫之後為騫氏官為氏祭仲初為祭封人守封疆者後以為氏漢孝文時居官者長子孫以丨丨丨倉氏庫氏則倉庫吏之後也字為氏隱八年無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以丨丨展丨左指樹為姓老子生於李樹下遂丨李丨丨丨因馬為氏馬援其先趙奢為趙將能馭馬號馬服君子孫因以為氏子孫為姓公之子曰公子公子之子曰公孫公孫之子以王父之字為氏公羊傳何休注次第為氏第五倫其先齊諸田徙園陵多以丨丨丨丨推律定姓京房字君明本姓李氏丨丨自丨京氏而丨漢本傳筮易得氏陸羽不知所生或言有僧得之水濱畜之既長以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀遂以陸為氏羽為名而字以鴻漸賜姓氏建德錫土姓注以新生之土賜之為姓故天子丨丨因生以賜姓謂之有德生此地以此地名賜之姓以顯之書注命氏天子賜姓丨丨諸侯命族者氏之别名也姓者所以統系百世使不相别也氏者所以别子孫之所生故世本之篇言姓則在上言氏則在下也史記注賜以氏凡氏之興九事賜氏於國齊魯宋衛也賜氏於諡戴武宣穆也賜氏於號唐虞夏商也賜氏以官則若司冦司馬賜氏以爵則若王孫公孫賜氏以字則若孟孫叔孫因賜以居則若東門西門三烏五鹿以忠賜也巫氏匠陶以事賜也潛夫論賜以族天子因生以賜姓諸侯以字為諡因以為族竊恐諡本氏字先儒隨他錯處解將去義理不通且如舜生於媯汭武王遂賜陳胡公滿為媯姓此即因生以賜姓如鄭之國氏本子國之後駟氏本子駟之後如此之類所謂以字為氏因以為族朱語録為金氏金日磾七世內侍本以休屠作金人祭天故賜丨丨丨為劉氏婁敬勸髙祖都關中後賜姓劉並漢本傳為李氏李績本姓徐後賜姓李封英國公又李抱玉本姓安名重璋玄宗以其戰河西有功改名賜姓李並唐本傳改姓氏去邑氏朱周封髙陽之後於邾後為楚所滅子孫乃丨丨而丨丨去邑氏于周武王子邘叔子孫以國為氏其後丨丨而單丨丨賜趙為趙周穆王使造父攻徐偃王破之乃丨以丨城由此丨丨氏史至陶為陶范蠡泛海出齊易名為鴟夷子後丨丨丨丨朱公稱為馬氏大司徒馬害本姓馬矢遂丨丨丨丨白孔六帖號為張祿范雎變姓名曰張祿先生同上本齊田氏車千秋丨丨丨丨千秋以年老得乘小車出入省中時人謂之車丞相子孫因以為氏漢本傳本齊慶氏賀姓丨丨之公族丨封之後漢侍中慶純避安帝諱改為賀丨以國為郭郭林宗其先出自周王季建國命氏或謂之郭即其後也蔡伯喈作碑以奚為嵇嵇康本奚氏後康易而為嵇避難為束束晢本疏廣後曾祖丨丨去足丨丨避仇為棘棗據丨丨改丨丨民字無上民儀本姓氏孔融嘲之曰氏字丨丨丨可改為民遂改之吳志沈字無旁閩人避王審知諱而沈氏去水而姓尢訛為慕容魏初莫護跋率部落入居西遼時燕代多冠步搖冠諸部因謂之步搖後音丨丨丨丨且以為氏前燕録可為源氏唐源乾曜本秃髮傉檀之子賀入後魏魏太祖謂之曰與卿同源丨丨丨丨乾曜其後也本傳辛莘聲近唐辛替否本夏啓封支子於莘丨丨丨相丨遂為辛氏本傳黃王聲近大冝之川有土田始黃神為人時居其地傳者曰黃神王姓莽之世也莽既死神更號黃氏逃來擇其深峭者潛焉始莽嘗曰余黃虞之後也故號其女曰黃皇室主丨丨丨相丨又有本其所以傳言者益驗栁黃溪記喬改為陳晉元達字長宏本姓丨以生日妨父故丨丨丨籍改為席唐席豫席出安定其先姓丨避項羽名丨丨丨危改為元南中多丨姓有忘其稱者或丨丨丨麈史為蟒為梟唐髙宗廢后王氏及良娣俄為武后所殺改后姓丨丨良娣丨丨從著從支本朝文潞公本姓敬其曾大父避石晉髙祖諱更姓文至漢復姓敬入本朝其大父避翼祖諱又更姓文初敬氏避諱各用其一偏或為文氏或為茍氏然敬氏丨丨非茍也丨丨非文也俱非其一偏也聞見後録冒姓氏冒姓衛氏衛青父鄭季給事陽信公主家奴與衛媪通生青故丨丨丨丨前本傳蒙姓灌氏漢張孟為灌則舍人得幸進之二千石丨丨丨丨孟灌之父也本傳孫本夏侯夏侯嬰為滕公隨母飬外家因姓丨同上駱本安氏李元亮本姓安氏少為駱奉先飬息冒姓為安氏自比伍貟貟半千其先本彭城劉氏十世祖凝之事宋及齊受禪奔元魏丨丨丨丨因姓貟本傳時號魚鄭鄭注本姓魚冒為鄭故當丨丨丨丨及用事人號為水族諸胡帶令令狐相綯以姓氏少族人有投者不吝其族由是逺近趍之至有姓胡冒氏者溫庭筠戲為詞曰自從元老登庸後天下丨丨悉丨丨南部書金陵冒唐金陵李氏始以唐號國錢文穆王問之曰丨丨李氏丨於巨丨不亦駭人乎沈韜文曰此可取譬也且如鄉校間有姓孔氏者人則謂之孔夫子復何怪哉王大笑知逺之劉五代劉丨丨其先沙陀部人冒姓劉敬塘之石石丨丨其父臬捩雞本出於西夷冒姓石並五代史歸宗姓改鮮于歸嚴李叔明本姓嚴少孤養外家冒鮮于姓請還宗詔可叔明初不知意醜之乞宗姓列屬籍代宗從之唐本傳改朱氏歸范本朝范仲淹少孤隨母丨適丨丨遂冒姓朱後丨姓丨栁子厚永州鐵爐步志江之滸凡舟可縻而上下者曰步永州北郭有步曰鐵爐步余乘舟來居九年往來求其所以為鐵爐者無有問之人曰蓋嘗有鍛鐵者居其人去而爐毁者不知年矣獨有其號冒而存余曰嘻世固有事去名存而冒焉若是耶步之人曰子何獨怪是今世有負其姓而立於天下者曰吾門大他不我敵也問其位與德曰久矣其先也然而彼猶曰我大世亦曰某氏大其冒於號有以異於兹步者乎向使有聞兹步之號而不足釡錡錢鎛刀鐵者懷價而來能有得其欲乎則求位與德於彼其不可得亦猶是也位存焉而德無有猶不足以大其門然且樂為之下子胡不怪彼而獨怪於是大者桀冒禹紂冒湯幽厲冒文武以傲天下由不推知其本而姑大其故號以至於敗為世笑僇斯可以甚懼若求兹步之實而不得釡錡錢鎛刀鐵者則去而之他又何害乎子之驚於是未矣余以為古有太史觀民風采民言若是者則有得矣嘉其言可采書以為志吕伯恭論譜諜三代之時曰姓者統其祖考之所自出者也百世而不變者也白氏者别其子孫之所自分者也數世而一變者也天子建德因生以賜姓其得姓雖一而子孫别而為氏者不勝其多焉有以王父之字為氏者矣有以先世之諡為氏者矣有以先世之地為氏者矣有以所居之官為氏者矣有以始封之邑為氏者矣枝分派别千塗萬轍初若參錯紛亂而難考及徐而視之有綱有條猶指諸掌焉孟仲季臧東門子叔同出於魯也遊國封印公父伯張同出於鄭也向華蕩樂鱗魚仲老同出於宋也樂髙崔國叔仲東郭同出於齊也尋其流可以知其源尋其葉可以知其根抑何易耶自秦漢以來氏族之制出於上之所賜下之所更者絶無而僅有至於世守一氏傳千餘年而不變者天下皆是也其變非若古之屢其列非若古之多可謂簡而易知者矣然人罕有能辨氏族之源者王之氏一也吾不知出於元城之王耶宜春之王耶卭城之王耶劉之氏一也吾不知出於陶唐之劉耶奉春之劉耶元海之劉耶其能明辨而不惑者鮮矣氏之馬者未必能辨其為馬服之馬及馬矢之馬也氏之石者未必能辨其周衛之石及後趙之石也右之氏族繁而知之者反多今之氏族簡而知之者反少蓋由譜諜之明與廢而已以是知譜諜之學不可不講也詩集於今為庶將軍魏武之子孫丨丨丨丨為清門英雄割據雖已矣文采風流今尚存杜詩我漢親王丨丨丨丨子成都舊客星相看萬里眼同是一浮萍吾宗孫子丨丨老丨丨質朴古人風耕鑿安時論衣冠與世同並同上賈家門户七嵗神童古所難丨丨丨丨有衣冠賈昌朝集族屬歷代源流族之為言類也即旁支别屬而各自為氏者也故古者有世本録黃帝以來至春秋時諸侯卿大夫名號繼統而周亦有小史定世系辨昭穆之序不惟此也由漢晉而下迄于唐氏族之志尤詳君子皆不可不敬焉事類帝族若稽古帝堯以親九族九族既睦注上至髙祖下至玄孫夏侯歐陽等以為九族者父族四母族三妻族二堯典王族角弓刺幽丨也不親九丨骨肉相怨小雅葛藟王族刺平丨也周室道衰棄其九丨同上公族麟之角振振丨丨詩麟趾又庶子之出於丨丨者教之以孝弟睦友子愛明父子之義長幼之序記文王世子官族官有世功則有丨丨左隱八九族自髙祖至玄孫謂之丨丨書注三族小宗伯掌丨丨之别以辨親疏注父子孫又父族母族妻族漢書注九宗分唐叔懷姓注唐之餘民丨丨一姓為九族散金疏廣棄官歸家日令家具酒食請族人故舊賓客相與娛樂居歲餘廣子孫竊謂廣所愛信老人曰子孫欲及君在時頗立産業今日飲食費且盡願丈人勸説買田宅老人以間為廣言此訃廣曰吾豈老悖不念子孫哉使賢而多財則損其志愚而多財則益其過此金聖主養老臣也宗族共享其賜盡吾餘日不亦可乎共財樊重世善農稼好貨殖三世丨丨上下戮力財利歲倍資至巨萬外孫何氏兄弟爭財重恥之以田二頃解其忿訟後樊宏傳五屬天序五行人親丨丨前漢康衡傳六親三從九親别疏昵之序五服丨丨等衰麻之心北張普惠傳望族先是後魏太和中定四海丨丨以崔寶等為冠其後矜尚門地故民族志一切降附六帖世族太宗詔髙士亷與韋廷岑文本令狐德棻責天下譜課參考史傳檢正真偽進忠賢退悖惡先宗室後外戚退新門進舊望右膏粱左寒畯合九百二十三姓千六百五十一家為九等號曰丨丨志六帖又明世族學見譜系門右族名門丨丨栁玭子孫訓茂族良家丨丨李華寒族見上世族注后族唐章獻皇后弟吳湊為福建觀察使政清美譽四騰唐興丨丨奉朝請者猶以事失職而湊任中外未嘗以罪過罷為世外戚表唐章敬傳名族裴氏自晉魏以來世為丨丨五代裴皥傳南北阮阮咸與籍居道丨諸阮居道北丨丨富而南阮貧東西眷裴皥裴氏自晉魏以來世為名族居燕者號丨眷居涼者號丨丨居河東者號中眷五代史無間言魏楊遁一家之內男女百口緦服同㸑庭丨丨丨北史書忍字唐張公藝九世同居髙宗有事泰山臨幸其居問本末丨丨丨以對唐孝友傳緦麻同㸑博陵崔倕丨丨親三世丨丨貞元以來言家法者以倕為首生六子一登輔相五任大僚太常卿邠太府卿酆外臺尚書郎郾廷尉卿邭執金吾鄯左僕射平章事鄆而邠及郾五知貢舉得七百四十人邠昆仲自貴達亦同居光德里一宅宗屬無間畢諴既貴得祿奉養護丨丨之乏丨丨得田分族蕭瑀關內田宅悉賜勳家至是還給之瑀盡以分宗族本傳假蔭恤孤李懷逺少孤宗人欲以藉髙蔭懷逺退而曰因人之勢髙士之恥假蔭而官吾志邪六帖鳥且爭巢劉君良四世同居隋末荒饉妻勸異居因易置庭樹丨巢令鬬丨鳴妻曰天下亂禽鳥不相容况人耶君良即與兄弟異居月餘知其謀斥去妻召兄弟流涕以告復同居犬亦共牢江州陳氏宗族七百口每食設廣席長幼以次坐而食之有畜丨百餘丨丨一丨食一犬不至諸犬為之不食小學擊鼓會飯裴寬兄弟八人於東都置八院相對甥姪亦有名常丨丨丨丨計口給餉李昉家子孫數世至二百餘口猶同居共㸑田園邸舍所收及有官者俸祿皆聚之一庫丨丨日丨丨絹遺親族范文正公自政府歸姑蘇焚黃搜外庫惟有絹三千匹令掌吏録親戚及閭里知舊自大及小散之皆盡曰宗族親戚見我生長幼學壯仕為我助喜我何以助之哉巵史田濟羣族同上又見後文集劉氏家史劉子玄别撰丨丨丨丨及譜考上推漢為陸終苗裔非堯後彭城叢亭里諸劉出楚孝王嚚魯孫居巢侯殷不承元王按據明審議者髙其博韋氏宗會凡人家法須令每有族人逺來則為一會以合族雖無事亦當一月為之古人有花樹丨丨丨丨法可取也然族人每有吉凶嫁娶之類亦須更相為禮使骨肉之意常相近骨肉日疏者只為不相見情不相接也謝昌國善勸録蘇明允族譜亭記今吾族人猶有服者不過百人而歲時蠟社不能相與盡其歡欣愛洽稍逺者至不相往來是無以告吾鄉黨鄰里也乃作蘇氏族譜立亭於髙祖墓塋之西南而刻石焉既而告之曰凡在此者死必赴冠娶必告少而孤則老者字之貧而無歸則富者牧之而不然者族人之所共誚責也歲正月相與拜奠于墓下既奠列坐于亭錢公輔義田記范文正公平生好施豫擇其親而貧疏而賢者咸施之方貴顯時置負郭常稔之田千畝號曰義田以養濟羣族之人日有食歲有衣嫁娶凶葬皆有贍擇族之長而賢者主其計而時其出給焉日食人一升歲衣人一縑嫁女者五十千再嫁者三十千娶婦者三十千再娶者十五千葬者如再嫁之數葬幼者十千族之聚者九十口歲入給稻八百石以其所入給其所聚沛然有餘而無窮仕而家居俟代者與焉仕而居官者罷其給初公之未責顯也嘗有志於是而力未逮者二十年既為西帥及參大政於是始有祿賜之入而終其志公既殁後世子孫修其業承其志如公之存公雖位充祿厚而貧終其身殁之日身無以為斂子無以為喪惟以施貧活族之義遺其子而已詩集贈族祖長沙公於余為族祖同出大司馬昭穆既逺已為路人經過潯陽臨别丨此同源分流人易世疏慨然悟歎念茲厥初禮服遂悠歲月眇徂感彼行路眷焉躊躇於穆令丨允構斯堂諧氣冬暉映懷圭璋爰采春花載警秋霜我曰欽哉實宗之光伊途云遘在長志同笑言未久逝焉西東遙想湘渚滔滔九江山川阻逺行李時通何以寫心貽茲話言進簣雖微終在為山敬哉離人臨路悽然欵襟或遼音問其先陶潛示從孫平明跨驢出未知適誰門權門多蹲踏且復尋諸孫諸孫貧無事宅舍如荒村堂前自生竹堂後自生萱萱草秋已死竹枝霜不繁陶米少汲水見行汲多井水渾刈葵莫放手放手傷葵根阿翁懶墮久覺步奔所來為宗族亦不為盤飱小人利口實薄俗難具論勿受外嫌猜同姓古所敦杜甫丨丨丨濟宗盟相遇子之竄嶺南道出衡陽見主簿君益陽黃成之問宗派乃同四世祖兄於是出嫂氏子婦相見喟然念髙祖父之兄弟未逺也而殊鄉異井六十歲而後友相識亦可悲也益陽兄之叔父晦甫侍御在家著孝之譽立朝有忠鯁之名不幸年五十有四被召而沒於道上將啓手足自力作疏極論濮園事所謂殁而不忘諫君以德其枝葉必將豐茂有赫赫於世者故作詩道之兩祖門中種隂德名塞四海世有人諸兒莫斷詩書種解有無雙聳縉紳人間卿相何足道胸次詩書要不忘男兒邂逅起屠釣何如林中日月長黃山谷贈成之宗誼浸微陶淵明有贈長沙公詩序云豫於長沙公為族祖同出大司馬昭穆既逺已為路人故其詩云同源分流人易世疏感彼行路眷焉踟蹰蓋深傷之也杜子美訪從孫濟而不免於防猜故其詩云所來為宗族亦不為盤飱勿受外嫌猜同姓古所敦觀長沙公及濟尊祖之義掃地矣詩話古今合璧事類備要續集卷一
