  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_182-1a, image: WYG0940/WYG0940-0626a.png}
body:
  text: 古今合璧事類備要續集卷三十二宋謝維新撰性行門精敏附精察事理發揮文理密察為精材識捷疾為敏精則物來能名敏則事至能應古之君子得之天禀固與庸人不侔也故易曰粹精書曰精一語曰敏惠書曰時敏皆是說也然言精則不言敏言敏則不言精豈精自精敏自敏二者若是其不相關歟蓋惟精故敏亦未有敏而不由於精也茍未能精於理而遽欲敏于事未能精於所學而即欲敏於所行則冒然而為率爾而作未有不敗事者然則先言精而後言敏良有以夫事類純粹剛健中正丨丨精也易乾精一惟丨惟丨允執厥中書密察文理丨丨足以有别也記中庸捷疾材識丨丨釋文不忘敏叔向曰薳罷有後於楚宜哉承君命丨丨丨左加以敏齊國子來聘自郊勞至於贈賄禮成而丨之丨丨同上聞一知十子謂子貢曰女與回也孰愈對曰賜也何敢望回回也丨丨以丨丨賜也聞一以知二子曰弗如也吾與女弗如也語五問一得三陳亢問於伯魚曰子亦有異聞乎對曰未也嘗獨立鯉趨而過庭曰學詩乎對曰未也不學詩無以言鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立鯉退而學禮聞斯二者陳亢退而喜曰丨丨丨丨聞詩聞禮又聞君子之逺其子也語十六告往知來子貢曰貧而無諂富而無驕何如子曰可也未若貧而樂富而好禮者也子貢曰詩云如切如磋如琢如磨其斯之謂歟子曰賜也始可與言詩已矣丨諸丨而丨丨者語一吾道一貫子曰參乎吾道一以丨之曽子曰唯子出門人問曰何謂也曽子曰夫子之道忠恕而已矣同上五行並下漢應奉少聰明自為童時及長凡所經歷莫不暗記讀書丨丨丨丨為郡決曹吏行部四十二縣録囚徒數百千人及還太守備問之奉口說罪繫姓名坐狀輕重無所遺脫舉茂才本𫝊一見能誦王充字仲任㑹稽上虞人少孤鄉里稱孝後到京師受業太學師事班彪好博覽而不守章句家貧無書常游洛陽市肆閲所賣書丨丨輒丨丨憶遂博通衆流百家逆為答記後漢楊修有俊才嘗出行籌曹操有問外事乃丨丨丨丨敕守舍兒若有令出依次通之既而果然操怪其速亷之知狀忌修以為宿構魏王粲纍拜侍中博物多識問無不對觀人圍棋局終粲為覆之棊者不信以帕蓋局使更以他局為之用相比校不誤一道其彊記默識如此善屬文舉筆便成無所改定時人丨丨丨丨繩墨皆應諸葛武侯所至營壘井竈圊溷藩籬障塞皆應繩墨一月之行去如始至履屣當任郗超曰吾嘗與謝𤣥共在桓公府備見其才雖丨丨間亦得其任綜理微密陶侃時造船木屑及竹頭悉令舉掌之咸不解所以正㑹積雪始晴㕔事前餘雪猶濕於是以屑布地及桓溫伐蜀又以所貯竹頭作丁裝船其丨丨丨丨皆此類頃刻便了梁朱异為散騎常侍掌機密其軍旅謀謨方鎮改換朝儀國典詔誥敕書竝典掌之每四方表疏當局簿領咨議詳斷填委於前屬辭落紙覽事下議縱橫敏贍不暫停筆丨丨間諸事丨丨事無壅滯宋劉穆之內總朝政外供軍旅決斷如流丨丨丨丨目覽詞訟手答箋書耳行聽受口竝酬應不相參受事無遺失隋劉炫眸子精明視日不眩左畫方右畫圓口誦目數耳聽五丨同舉丨所丨丨敕吏泚筆岑文本字景仁鄧州人性沈敏善文辭多所貫綜擢中書舍人時顔師古為侍郎自武德以來詔誥或大事皆所草定及得文本號善職而敏速過之或當策令叢遽丨丨六七人丨丨待分口占授成無遺意命吏連紙裴琰永徽中為同州司户參軍丨書丨數人丨丨須臾剖判立畢時謂之霹靂手旁吏不給陸贄從德宗狩奉天機務填總逺道召發奏請報下書詔日數百贄初若不經意逮成皆周盡事情衍繹熟復人人可曉丨丨承寫丨丨他學士閣筆不得下而贄霈然有餘本傅不思以對本朝王禹稱字元之年七嵗已能文畢文簡公為郡從事始知之聞其家以磨麵為生因令作磨詩元之丨丨丨丨生知之才楊億有丨丨丨丨以童子召試太宗嘆異以為祕書省正字制曰汝方在髫齓不煩師訓精爽神助文學生知越景絶塵一日千里豫有望於汝也幼而穎邁綦崇禮字叔厚丨丨丨丨不好嬉弄讀書學文日開月益儔輩莫敢望甫十嵗能作詩屬文比事音節皆中律吕幼而明慧程皓字伯淳丨丨丨丨驚人年數嵗賦酌貪泉詩先達許其志操敏視若流施師㸃字聖與生有異質得書丨丨丨丨十嵗通六經十二能文先儒咸高之史文成誦謝顯道精察秋毫明足以察丨丨之末孟淵魚察見丨丨者不祥繳繞苛察丨丨漢馬遷傳吹求丨毛丨疵中山靖王𫝊咸稱神明米鹽靡密初若煩碎然霸精力能推行之吏民見者語次尋繹問他隂伏以相參考嘗欲有所伺察擇長年亷吏遣行屬令周密吏出不敢舍郵亭食於道旁烏攫其肉民有欲詣府言事者適見之霸與語道此後日吏還謁霸霸見迎勞之曰甚苦食於道旁乃為烏所盜肉以霸知其起居所問毫釐不敢有所隱鰥寡孤獨有死無以葬者鄉部書言霸為區處某所大木可為棺某亭猪可祭吏往皆如言其識事聰明如此吏皆不知所出丨丨丨丨得為耳目趙廣漢為潁川太守教吏為缿筒及得投書削其主名託以豪傑大姓子弟所言其後家家結為仇怨吏民相告訐廣漢丨以丨丨丨漢本傳事狀如一唐武后自徐敬業之反疑天下人多圖已又以久專國事所行不正知宗室大臣怨望心不服欲以威之乃盛開告密之門有胡人索元禮知太后意因告急召見擢為游擊將軍令按判獄每推一人必令引數十百人而周興來俊臣之徒效之紛紛繼起専以告密為事欲陷一人輒令數處供告丨丨丨丨武后紀長短畢知唐邢邵字子才為西兖州刺史守令長短無不知之定陶縣去州五十里縣令妻日暮取人斗酒束脯邵逼夜攝令未明而去責其取受舉州不知所以本𫝊令人察事李輔國置察事數千人濳丨於丨間聽丨細丨即行推按遣人詗事陳敬暄多丨丨歷縣鎮丨丨謂之尋事照日辨補字垂拱中則天監國羅織事起湖州佐史江琛取刺史裴光判書割字合成文理詐為徐敬業反書以告差使推光欵書是光書疑語非光語前後三使推不能決敕令能推事人勘當取實僉曰張楚金可乃使之楚金憂悶仰卧西窗日到向看之字似補作平看則不覺向日則見之喚集州官索一甕水令琛投書于水中字一一解散琛叩頭伏罪敕令斬之賞楚金絹百匹朝野僉記辨宰非換金李汧公勉鎮鳯翔屬邑編氓因耨田得馬蹄金一甕遂送於縣縣宰喜獲兹寶以為珠績慮公藏主守不嚴置於私室信宿開視皆為塊矣以狀聞府僉云姦計換之莫能自白既而遂以易金伏罪結成具獄以案上聞汧公盛怒俄而因有宴㑹語及斯事列座賔客咸共驚嘆以為胠篋穿窬無足怪也時袁相國滋亦在幕中俯首略無詞對李公曰邑宰者非判官懿親乎曰與之無素甚疑此事汧公曰換金之狀極明若未了當非判官莫探情僞袁曰諾乃令閲甕得二百五十塊遂於列肆索金鎔寫與形塊相等始稱其半已及三百斤其負擔人力乃二農夫以竹舁至縣計其金大數非二人以竹擔可舉是即路之時已化成土矣於是羣疑大豁邑宰遂得清雪汧公歎服以為才智不及劇談録俞彥明字序日月星辰之明非不暐也天下不以為驚水涵太虛燈破幽室非不瑩徹也天下不以為驚物之抱負靈曜而埋藏於荒磎塵壤之中寂寞之境抑遏拂蔚終不可沒而時吐光怪衝射天地天下之人始驚以為神奇吾友乃江南豫章人也請以豐城古獄之事為君道牛斗之間河漢之表昔時有異氣紅光紫氣盤薄衝激夾衡璣杓瑶而奪之色此龍泉太阿之精也龍泉太阿者天下神劒也固當決浮雲截流波刺虎南山膾蛟長橋邊城飛塵河角有彗掃戎王之庭斬佞臣之首提㩦四顧問天下事誰有不平者乎此劒之得志而遇英雄之人壯烈之士取決於一時也今沉屈而在敗牢重鑰之下是其氣不得不暴露而憤發非以耀世也乃其不可遏者固如此耳嗚呼士君子得志而在廊廟之上事業昭著天下之人以為當然不以為驚至於懷負利器鬱鬱而不得志時因感慨微見芒刃故其可喜可愕者多發于窮時吾友自未弱冠之初已能飛步上庠取聲名於場屋中今已及壯矣其間坎壈臲􅑶前跋後疐其耀也如有蹶之其哆也如有哽之豈非天欲大感怒君而使之發精煒也豫雖愚弱不靈前日君自執手相許以友又謂曰子其字我而併序其意敢取寶劒鄉閭之舊事聊以相感君其自磨礪無刑于衆豫將見張雷博識之士有為君鑒拔者矣又將見西山北巖之膏華隂之英有以拂拭君者矣皇皇華華奪人精爽其見有日矣晉曰君子以自昭明德惟自昭而進者終不可掩屈故字彥明以晉叔詩集精察穴覷騁丨丨孟聰明離婁豈不明子野豈不聰同上古今合璧事類備要續集卷三十二
