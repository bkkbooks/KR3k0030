body:
  text: 古今合璧事類備要後集卷七十七宋謝維新撰州官門總幕職與前帥幕帥參通用歷代沿革各見後逐官下事類上賔枚乘字叔久為大國丨丨與英俊並遊交友虞翻字仲翔會稽人太守王朗會接以丨丨之禮魏志風幕晉謝安王坦之嘗詣桓溫論事溫令郗超帳中卧聽之丨動帳開安笑曰郗生可謂入丨之賔蓮池王儉用庾髙之為衛將軍長史蕭沔與儉書曰盛府元僚實難其選庾景行泛緑水芙蓉何其麗也時人以入儉府為丨花丨故沔書美之景行杲之名賔筵唐劉三復長於章奏李德裕器之及鎮浙西皆參佐丨丨軍政之餘與之吟詠終日在長安私第别起草院院有精思亭每朝廷用兵詔令别置而獨處亭中凝然握管左右侍者無能預之賔幄公釋褐從事在丨丨之間李文饒作鄒平公資福院記判佐唐書狄仁傑授汴州丨丨從事路嗣恭嶺南節度入覲曰臣丨丨桞渾有出人之見賔席諸侯辟之以佐於丨丨杜牧之李承慶制師禮劉蕡對後七年冇甘露之難令狐楚牛僧孺節度山南東西道皆表蕡幕府以丨丨禮之異席浙西觀察使其所擇從事望幕府盛選材彥觀察判官許鴻謙有學識栖筠嘗丨丨事多咨之名流崔衍遷宣歙池觀察使其所擇從事多得丨丨時有士者侍賔僚率輕傲衍獨加禮敬幕中之士多顯逹賔佐丨丨賔寮賔榮丨丨主禮並六帖賔彥賔采上客並晏類要辟荀孔晉東海越為兖州牧以江統為别駕委以州事與統書曰昔王子師為豫州未下車丨丨慈明參畫幕下車辟丨文舉貴州人士有堪此者否統舉郗鑒阮修程牧時以為知人羅溫石烏重胤鎮河陽之三月以石生為才以禮為羅丨而致之幕下未數月也以丨生為才於是以丨生為媒以禮為羅又羅而致之幕下東都雖信多才士朝取一人焉拔其允暮取一人焉拔其尤韓文與均禮崔咸元和初擢進士第又中宏詞鄭餘慶李夷簡皆表簡幕府丨丨丨主留務徐彥若為清海軍節度使卒于鎮行軍司馬劉隱因丨丨丨方時多難彥若最見信于帝有以事自陳者帝曰汝當問彥若其所倚任如此廊廟之才孫紹字長緒北海人為孔融功曹融稱紹有丨丨丨丨後為相吳録兼人之才南陽公文章稱天下其所辟皆閎辨通敏丨丨丨丨者也韓文南樓談詠庾亮在武昌諸佐史商浩之徒登丨丨不覺亮至將起避之亮曰諸君且少住老子於此興復不淺便據胡床而坐與浩等丨丨本傳昆弟同幕劉崔望字希徒崔安潛帥許及劒南崇望丨丨四人丨丨府世以為才武昌多士晉陶侃鎮武昌軍殷浩庾翼等皆為佐吏時丨丨號為丨丨浙西髙選李棲筠觀察丨丨幕府皆一時丨丨王質字華卿為宣歙觀察使任幕府者若裴夷直趙哲李行方劉蕡皆一時髙選西山爽氣王子猷為桓溫車騎參軍溫謂曰卿在府久此當相料理初不答直髙視以手板拄頥云丨丨朝來致有丨丨河東朝廷唐鄭從趙為丨丨節度表王調劉崇龜崇李渥崔澤等為判官書記支使皆一時選京州士人人比太原為小丨丨得才多也極一時選武元衡字伯蒼節度劒南元衡雅性莊重雖淡於接物而開府丨丨丨丨皆一時選王倕河西節度天實中名聞于邊他所辟舉如王維王縉崔商等丨丨丨丨云皆當時士元禛浙東觀察使所辟幕職丨丨丨之丨皆為顯人韋抗所表劉升卿王倕王燾為僚屬後丨丨丨丨盡理針規劉悟節制鄭滑奏賈直言置幕中悟纎微乖失直言必丨丨丨丨以是美譽日聞咨訪得失唐楊於陵字達夫節度嶺南辟韋臯李翔等在幕府丨丨丨丨博學強記李商隱能為古文從事令狐楚幕丨丨丨丨下筆不能自休行修學進石洪字巨川丨丨丨丨聲號聞四方諸府交辟烏重胤聘為河陽從事治民寬考功奏石洪為天下第一韓退之為石洪墓志博學屬文劉蕡丨丨善丨丨耿介嫉惡文宗時對策極言中官權盛令狐楚在興元牛僧孺在襄陽辟為從事待如師友以文章稱權德輿字載之未冠丨丨丨丨諸儒間韓泗李兼杜佑裴胃交辟之幕中謙謙李藩字叔翰少治談修檢雅容儀好學詩律封在徐州辟為從事居丨丨丨丨未嘗論細微幕中之辨丨丨丨丨人反以汝為叛臺中之評人反以汝為傾韓退之針才略精明李石字中玊初辟李廳幕府從歷四鎮有丨丨為吏丨丨有出人見路嗣恭嶺南節度入覲曰臣從事柳渾丨丨丨之丨禮均奏署張封建字本立治徐州性樂士賢不肖遊其門者其丨必丨故其往如歸許孟容韓愈皆丨丨幕府先奏後聘唐桂管觀察使三拱聞令狐楚之才欲以禮聘召楚不從乃丨聞丨而丨丨待如師友見博學屬文注禮以上賔任為從事丨丨丨丨白帖皆為美瑞足下仁者宜在髙位託在幕下則不為得所足下出類拔萃鳯凰芝草賢愚丨以丨丨丨書青天白日奴𨽻亦知其清明退之上崔羣豈池中物左肅機皇甫公義檢校沛王府長史引韋思謙為同府倉曹謂思謙曰公丨丨丨之丨屈公為數旬之客以望此府舊唐史有事必言幕吏之道丨丨丨丨知無不為杜牧作李知常等制賀得主人近者閣下從事李協律翔到京師馳往省之且先丨其丨賢丨丨退之代張籍與李浙東書掌在賔寮軍府之要丨丨丨丨白居易路貫制表為巡官畢誠辟忠武杜悰幕府琮領度支丨丨丨丨又從辟淮南入拜侍御史以稱席珍漢乾祐元年勑云翹車著詠戔帛垂文式重弓旌以光樽俎允奉幕中之畫丨丨丨上之丨五代會要持刀負棺賈直言署李師道府屬及師道不軌丨丨丨丨入諫曰願前死不見城之破又畫縳載檻車狀而妻子繫纍者以獻師道怒囚之劉悟既入釋其禁辟署義成府後徙潞亦隨府遷穆宗召為諫議一時名士晏元獻延賔客丨丨丨丨多出其門為西京留守幕下王琪張亢最為上客分紀天下名士天聖明道中錢文僖留守西都謝希深為通判歐陽永叔為推官尹師魯為書記梅聖俞為主簿豫籌幕府丨丨丨丨擢參賔謀常毗使軒丨丨丨丨晏公類要大荷盛酒歷城北有使君林魏正始中鄭公慤於三伏之際集賔寮避暑於此取丨丨丨丨簮刺令與柄通屈莖上如象鼻傳吸之名薦筒歷下皆效之酒雜蓮氣勝他酬張君房脞説雪作龍門謝希深歐陽永叔官洛陽同遊嵩山歸暮抵龍門香山雪作留守錢文僖公遣吏以厨傳散妓至且勞之曰山行良苦當少留龍門府事簡無遽歸也聞見録寧久遺於諸侯使吾無一方之憂吾丨丨丨汝丨丨丨白居易韋審規等制以良士贊賢侯丨丨丨而丨丨丨宜乎多成功而鮮敗事矣同上行慮商制韓愈送竇從事序工部侍郎趙植為廣州刺史署從事扶風竇平平以文辭進於其行也昌黎韓愈嘉南海之能得人壯從事之答於知我不憚行之逺也作送竇從事少府平序詩集丹墨胡然落丨丨不坐致公侯陳后山送越朝請赴蘇幕詩鞍馬水北山人得名聲去年來作幕下士水南山人又繼往丨丨僕從塞閭里少至山人索價南兩以諫官微不起韓愈寄盧同詩儒衣赤府從車美丨丨結束輕姚合送徐員外赴河中從事詩油幕從軍古云欒談笑青丨丨燈明夜觀棊月暗秋聞柝何當鑄巨鉟音丕相與歸臺閣銘山子所工插羽余何作策勳封龍額歸騎獵麟腳推選閲羣材薦延搜一鶚韓郾城夜會李正封聨句冰壺乃報南昌令乘馬入郡城同時趨府客此日望塵迎文苑臺中妙丨丨幕下清洛陽相去逺猶使故材榮韋應物寄洪州幕府盧侍御詩金臺燕昭延郭隗遂築黃丨丨李白古風聘琳琅素風傳竹帛髙價丨丨丨楚水多蘭若何人事搴芳劉禹錫送王師魯協律赴湖南侯幕誇玳瑁直道事人男子事異鄉加飯弟兄心還須整頓韋絃佩莫獨吟丨丨丨簮杜牧送顗赴潤州幕芙蓉客暫依桃李蹊空久丨丨丨丨丨注引王仲寶依芙蓉李文饒遊房太尉西湖詩歸路芙蓉府丨丨丨丨丨離堂玳瑁筵劉禹錫送陸侍御歸淮南幕詩天路下征騑丘山仰德輝丨丨丨丨丨夢喜三刀近書嫌五載遲凝情江月落屬思嶺雲飛會入司徒府還邀周椽歸陳后山奉和周文酬柳州侍郎衡江夜泊詩願棲梧桐樹一鳥自北燕飛來向西蜀羣鳯從之遊問之何所欲答云寒鄉子飄飄萬餘里不息惡木枝不飲盜泉水常思稻粱過丨丨丨丨丨盧照鄰贈益府羣官得實翻蒼竹丨丨丨丨丨棲枝把翠梧數論封內事揮發府中趍杜甫别蘇溪赴湖南幕詩幕府制中權廟堂咨上策丨丨丨丨丨髙適信安王幕府詩幕府盛材賢王門髙德業丨丨丨丨丨杜甫呈江陵府諸公早作諸侯客飄飄蘇季子六邙佩何遲丨丨丨丨丨兼工古體詩同上送蘇兵曹白頭趨幕府丨丨丨丨丨深覺負平生杜詩幕府初交辟丨丨丨丨丨郎官幸備員幕府愧羣材扶病垂朱紱歸休步紫苔郊扉存晚計丨丨丨丨丨並同上泉石别幽耳忽騎將軍馬自號報恩子風雲入壯懷丨丨丨丨丨韓愈送石處士赴河陽幕詩清秋井梧寒丨丨幕府丨丨丨獨宿江城蠟炬殘永夜角聲悲自語天中月色好誰看杜詩婉婉幕中畫丨丨丨丨丨謝宣送張子房詩黃金臺貯俊賢多杜詩將軍昔著從事衫丨丨丨丨丨丨丨鐵馬馳突重兩銜杜甫送魏將軍歌幕下今朝又得君荆州勝事衆皆聞丨丨丨丨丨丨丨姚合送陳倜赴江陵從事即日連鏕向闕時城上赤雲呈瑞氣眉間黃色見歸期幕中無事惟須飲丨丨丨丨丨丨丨韓愈示同列詩僉判歷代沿革國朝有兩使防團軍事推判官皆以選人充太平興國中以贊善大夫十五員充諸州節度判官主化基常置武元穎等蓋太宗以諸州戎幕缺官選朝士補之俾分理事且試其才此簽判所由始也蓋選人則為判官京官則為簽判或為簽書判官之名不正政和初改為司録建炎初復舊制馬事類引重唐柳公綽武元衡節度劒南與裴度俱為判官尢相丨丨據理盧坦為鄭滑節度使判官監軍薛盈珍數千政坦每丨丨拒之有善笛者詣帥請為重職坦笑曰大將久在軍積勞亟遷乃及右職奈何與吹笛少年同列耶諸將慙懼天才郭祥正字功父其母夢李太白而生祥正少有詩名梅堯臣曰丨丨如此真太白後身也熙寧中簽書保信軍節度判官事略儒學尹洙字師魯以丨丨知名僉書孟州判官同上佐治才韋亶等初擢第即通判諸州代還太宗以兩使判官得替者尤解故多闕員乃以亶等十五人為之且令綿歷觀其丨丨丨也三朝政要盡心職公字子瞻僉書鳯翔府判官長吏意公文人不以吏事責之公丨丨其丨老吏畏伏子由撰東坡行狀細務盡心明道字伯淳僉書鎮南判官為守者嚴刻多忌先生事之甚恭管庫丨丨無不丨丨事小未安必與之辨相與歡甚屢平反重獄伊川撰程明道行狀事悉委公王休字子美授南康軍僉判郡素號江東道院朱文公熹為守日課諸生講書公亦相與發明丨無巨細丨以丨丨樓攻愧集盛府元僚簽丨丨之丨丨胡文恭行魚周詢制吏事大書張九成字子韶僉書鎮東軍判官在僉廳究心丨丨胥曹建白不能有所欺嘗丨丨于壁曰此身茍一日之間百姓羅無涯之苦言行録召為校理葉清字道卿為簽書平江軍節度判官丨還丨集賢丨丨東都事略投檄而去浙東提刑張宗臣逮婺州平民數十人府官就白宗臣大怒曰此事左相専遣人封來知之否僉書鎮東通判廳公事張九成曰九成但知有聖旨不知有宰相主上今下恤刑之詔惟恐無辜被繫公身為部使者不能上體聖意而觀望宰相耶聞者莫不決意宗臣大慙九成丨丨丨丨中興繫年録陳瓘尋醫丨忠肅公丨字瑩中公為越州僉判蔡卞為帥待公甚厚而公已得其心術常欲疏逺之屢引疾丨丨章不得上會明倅闕俾公攝權公到明遂仲尋醫之諸言行録荆公不屈韓魏公知揚州王荆公初及第為僉判每讀書至達旦日已髙急上府多不及盥潄魏公見荆公少年疑夜飲放逸一日從容謂荆公曰公少年無不廢書不可自棄荆公不答