費素手採掇丨丨丨李白黃葛篇布布帛總論布按釋文亦曰帛然今世俗所謂布者乃用木綿或舊葛麻苧花卉等物為之則又似不可以帛槩論焉恐又粗於帛者也但其間又不無精粗疏密之别要之精密者亦未易為也彼異國又或有織毛者或又有花紋者益奇耳麻枲也可以為布者事類􅀈粗布帛丨丨不中數廣狹不中度不出於市苦良廣狹疏密辨其丨丨並記有幅布帛有幅為之制度使無遷也左有明齊必丨丨衣布語疏布大祭以丨丨為尚又女功之始儀禮大布衛文公丨丨之衣左麻衣丨丨如雪詩曹風紵衣子産以丨丨獻延陵季子左帶其斷晉率諸侯之師伐逼陽環城傅其埭主人懸布堇父登之及逼而絶之蘇而復上者三主人辭焉乃退丨丨丨以徇於軍三日左燔其機公儀休見布好疾出家婦丨丨丨恐奪人之利史語漢相被丨公孫𢎞為丞丨卧布丨漢史孟光裙後丨丨荆叉布丨而嫁梁鴻後漢遺盜布王烈丨丨丨令其改過勸善後漢賜貪布宋諼字宣𢎞太祖以其性貪賜布百匹令負而歸重不能勝乃至僵頓以愧之燕書見蜀布張騫在大夏丨丨丨本傳著越布陸續祖父閎建武中為尚書令丨丨丨單衣世祖見而好之自是常敕會稽獻越布後漢布露積王浣字子良雖有爵祿若不在已秩俸丨帛皆丨丨腐爛布火浣漢時梁冀以火浣布為單衣嘗會賔客冀徉爭酒失杯而汚之偽怒解之曰燒之丨得丨燃如灰及布垢盡火滅燦然潔白若用灰水洗中間久絶魏文帝以火性酷烈而無含蓄之氣必不然之事著典論言必無乃刋石於廟門外與石經並至明帝立西域重譯而來獻之於是大臣乃試以示百僚遂滅此論天下笑之矣魏志火鼠毛南炎丨丨之丨為布浣之於火振之如雪白氏帖水羊毛波西織丨丨丨為布曰海西布白疊草高昌有草名曰丨丨纈花可丨為布吉貝草南蠻環王丨丨丨也緝其花為布粗曰貝精曰疊並孔帖照鄰衣盧丨丨客東龍門山布衣藜羔本傳元稹檄王釗守洛州給土㠿布一端丨丨丨代嵗廪劉悟傳左至蜀都賦布有撞筆又黃潤比筒籝金所過麻蓻麻丨丨如之何衡從其畝漚麻東門之池可以丨丨並詩岱畎禹貢丨丨絲枲注枲麻也書五原後漢五原宜麻枲崔實為太守斥賣儲跱作紡績織絍練緼之具白氏帖爭漚池石勒與李楊丨丨麻丨相歐擊晉史給為緍滕王元嬰帝嘗賜諸王綵五百以元嬰及蔣王貪但下書曰滕叔蔣弟不須賜帛丨麻二車助丨錢丨二王大慙本傳道士屏蔡州紫極宫階前種麻生高如墉丨丨葺為藩丨其醮日霹靂屏下忽有狸迹尋之上屋蹤大如馬劉餗嘉論學士閣梁國相鄭珏與李相國愚同為丨丨一日鄭丨下有一麻生李曰承旨入相矣乃指麻視鄭曰天命也時亢陽其麻茂盛若高丈餘如雨露之偏滋暨霜降成實乃白麻也李賀鄭曰必然矣是夜制出鄭果登庸紀異詩集蜀麻丨丨久不來杜楚麻丨丨四時皆麻丨杜苦寒寂歷夜際秋蟲鳴踈麻方古今合璧事類備要外集卷六十四
