body:
  text: 古今合璧事類備要外集卷六十四宋謝維新撰錦繡門錦附繡布綺麻羅財貨源流錦織文也按説文錦金也作之其用功重價如金故制字從帛與金也然所出之處固多惟出於蜀者為貴或者又以獻於外國者誇之想亦中國所無有云耳繡五色備絺為質刺成故名曰絺繡綺羅皆文繒事類篚貢禹貢濟河惟兖州厥貢絲厥丨織文注織文丨丨之屬書文織周禮典絲凡飾邦器者受丨丨絲組馬天官白氏帖注丨丨錦繡之屬爛兮錦衾丨丨斐兮萋兮丨丨成是貝錦注萋斐錦文也並詩重錦齊侯使歸夫人丨丨三十兩注丨丨錦之熟細者以二丈雙行故曰兩三十兩三十匹也左閔二年美錦子産謂子皮曰子有丨丨不使人學製焉其為丨丨不以多乎左衛人饋丨丨丨叔向羔與一篋錦左宰豫衣孔子謂丨丨曰丨夫錦於女安乎語夫人車漢丨丨出塞以錦丨郎官帳漢丨丨有錦丨錦維舟吳甘寧以丨丨丨去則棄之錦為纜隋慢帝以丨丨丨蘇氏詩竇滔妻丨丨織錦為回文丨以寄滔宛轉循環文甚悽惋新羅頌丨丨真德襲遣子法敏入朝真德織錦為丨以獻作詔書賜封敖武宗使丨丨丨丨以宫錦以詞賦名謝延皓大順丨丨丨擅丨與徐寅不相上下號錦繡堆朝霞錦聘五代阿保機遣使者解俚隨頓以丨丨丨丨梁波斯錦貢吐蕃其所貴丨丨丨丨氷蠶絲織東海有丨丨其繭五色丨丨為文錦入水不濕拾遺記又唐老子嘗賣一錦褥有波斯見之者乃曰此丨丨丨所丨暑月陳於座滿室清涼唐李府錦池蠶絲織大軫國以五色石甃池塘採大柘葉飼蠶于丨中始生如蚊睫及老可五六寸池中有挺荷雖驚風疾吹不能傾動大者可闊三四尺而蠶經十五月即入荷中為繭形如斗自然五色國人繅之以織神錦故謂之靈泉丨孔氏六帖山雞嗉藏見别集丨丨注語山林皆覆吳越錢鏐遊衣錦城晏故老丨丨丨丨以錦池底先鋪文宗論德宗奢靡之問得禁中老宫人每引泉光於丨丨鋪錦王建宫詞云魚藻宫中鎖翠娥先皇行處不曾過只今池底休鋪錦菱角雞頭積漸多是也李石開成録衣錦夜行項羽曰富貴不歸故鄉如丨丨丨丨漢書衣錦晝遊張士貴虢州人授虢州刺史帝曰顧令卿丨丨丨丨耳未嘗求足元德秀視錦繡丨丨丨丨暴陳其上韋堅通漕每成舟署某郡以所産丨丨丨丨若廣陵則錦大食駝載丨丨國有重錦其載二十槖丨乃勝既不可兼負乃裁為三十匹三嵗一餉女蠻魚油宣宗大中初丨丨國獻丨丨綿練水香麻所為也光耀芬馥皆以五色相間而美麗於中國之錦唐南陽編背古錦囊李賀每旦出騎弱馬并小奚奴丨丨丨丨遇所得投囊中每使婢探囊中見所書多怒曰是兒要嘔出心乃已著宫錦袍李白浮遊四方嘗乘月與崔宗之自采石至金陵丨丨丨丨坐舟中旁若無人本傳花樣不同有錦工𨽻宮錦坊祿山亂被人尋其舊坊不收曰如今丨丨與前丨丨遣之盧氏雜説繡絺繡豫欲觀古人之象日月星辰山龍華蟲作繪宗彛藻火粉米黼黻丨丨書文繡令聞廣譽施於身所以不願人之丨丨也孟繡裳周公衮衣丨丨詩繡質魯大弓丨丨公羊傳六幣丨合丨以繡五采丨丨備謂之繡並周禮被牆黼繡古天子之服今富人大賈嘉會召客以丨丨賈誼布地天子以文繡丨丨白氏帖衣馬楚莊王有愛馬丨以文繡史映驄丨丨俱麗為御史之衣孔六帖夫人衣衛侯與夫丨繡丨曰聽於二三子注繡取其文章順序左富人牆見前注暴勝衣前丨丨之繡丨持斧斷斬郡國王忳被丨丨嘗詣京師書於空舍中見一生金諺危困疾病愍而視之生曰我命在須臾腰下有金十斤相贈死後乞藏骸骨已而命絶忳鬻一斤營葬餘置棺下忳後署大度亭長有馬馳入亭中而止大風飄一繡丨復墮忳前後乘馬到雒縣人問所由得馬忳具説其狀并及繡被人曰卿何陰德而致此忳因説葬書生事人驚曰是我子也大恩久不報天以此彰卿德耶杜亞帆唐丨丨拜淮南節度使泛九曲池曵繡為丨詫曰要當稱是林沼李衡曰未有錦纜奈何亞大慙孔帖李晟帽丨丨每與賊戰必錦裘繡丨自表指顧陳前不可以計陳孺每暴衣紈繡丨丨丨丨梁張率繡賦間紅而的紫綺宣州貢丨丨土丨綺地理志敕使貢天子巡狩丨丨令丨其方之實錦繡繒布皆五束為兩唐史馮房帶丨丨父子兄弟三代為侍中並丨青紫羅綺懷慎服盧丨丨丨無文綺之節未嘗衣綺竇建諸妻曹丨丨丨紈丨羅鎮州貢丨丨丨孔雀羅瓜子羅春羅地理志越州貢丨丨丨寶花羅花紋等羅韋堅漕丨丨鑿潭通丨成帝為升樓堅取小斛舟每舟署某郡以所産暴陳其上若會稽則羅鴻漸獻杜丨丨兼成都府入朝丨羅十五匹孔氏帖高麗王冠丨丨丨以白羅製丨大臣青羅冠杜蘭香帕賈知微遇曽城夫人丨丨丨以秋雲羅丨裹丹五十粒與生曰此羅是織女練玉繭織成遇雷雨時密藏之後大雷雨失帕所在麗情集左太沖魏都賦紅羅颯酒綺組綺紛詩集瑞錦丨丨送麒麟杜貝錦丨丨無停織挑字誰家丨錦丨燭滅翠眉顰同上奪袍獸飾丨丨新李白思婦改張丨丨飾元稹送侍御秦川機中織飾丨丨女李白繡芙蓉褥隱繡丨丨杜李監宅芳蓀小襦繡丨丨杜别李義晴文新丨錦繡丨風香丨生錦繡丨並杜黃金縷翡翠丨丨丨織成歌舞衣李白五紋線刺繡丨丨添弱丨杜冬至綺緗綺丨丨為下裳紫錦為上襦古詩紫綺解我丨丨裘且換金魚酒李白金陵留恨别時雙鴛綺丨此千萬丨韋蘇州擬古為贈聞有鴛鴦綺特丨美人丨陳子昂餘霞散丨丨丨成綺杜深紅凂丨丨丨綺羅杜競鞦韆羅綺丨丨丨羅輕春風羅本丨丨丨李白寄逺曵紫煙羅衣丨丨丨同上雙鴛鴦春羅丨丨丨出自寒夜女心精煙霧色指歷千萬緒長安賢豪家妖艷不可數裁吐百日功唯得一朝舞舞罷復裁新豈思勞者苦韋蘇州新體林蛺蝶花羅丨丨丨杜萬草千文線絲須長不須白川羅蜀錦金粟尺象床玉手亂殷紅丨丨丨丨動凝碧杜甫百絲行絹附縑財貨源流絹按釋文縑也然縑又併絲為之者事類苦良凡布絹辨其丨丨比其小大而賈之物書而揭之注别其粗細廣狹書其賈於物也若今時題署絹帛周禮淳制一其丨丨注淳廣大也制長短也禮纎縞厥貢丨丨書魯縞強弩之末不穿丨丨漢色絲黃絹丨丨後楊修傳賜胡千漢丨降丨縑細豫章誤以十為丨遺盜兩陳實見梁上之盜乃遺絹兩匹賜絹萬匹張華以平吳之功丨丨丨丨貨絹百匹魏文帝在東宫嘗從曹洪丨丨丨丨洪不與及洪犯法自分必死既得原上書謝三國志賜絹一匹胡威父質為荆州刺史丨其子威丨丨丨威曰大人清高何故得此父曰俸祿之餘後本傳贈絹數十司空圖王重榮父子雅重之嘗為作碑丨丨丨丨圖置虞卿市人得取之一日盡間遣人遺太宗疾貪吏欲痛懲艾之乃丨丨人遺諸曹一吏受饋縑帝怒詔殺之矩曰吏受賕死固宜然陛下以計給之因即行法所謂罔人以罪非導之以德之誼帝悅何遇我薄皇甫湜為福光寺碑援筆立就度贈以車馬繒綵甚厚湜大怒曰自吾為顧况集序未嘗許人今碑字三千豫三縑丨丨丨丨耶度笑入曰不羇之才也稅入加舊權德輿大歷中一縑直錢四十今止百丨丨丨丨則出於民者五倍其功詩集工織新人丨丨縑故人丨丨素織縑日一匹織素十丈餘持縑將比素新人不如故古詩短裁五十匹縑易一匹縑去馬來無了日縑絲不足女工苦疏織丨丨充匹數藕絲蛛網三丈餘回鶻訴稱無用處白居易陰山道光零亂我有一匹好東絹重之不減錦繡段已令拂拭丨丨丨杜帛附繒練素財帛源流帛繒也繒帛之總名素緻繒練熟之也縞又繒之精者然土宜各有不同焉事類束帛丨丨戔戔易幅帛晏子曰富如布帛之有丨焉為之制度使無遷左實篚又丨幣帛筐丨以將其厚意承筐丨丨是將注筐篚屬所以行幣帛並詩老者衣丨丨丨帛孟大帛冠衛文公丨丨之丨左衣帛妾季孫相魯無丨丨之丨贈先生孔子之郯遇程子於途傾蓋語終日相悅謂子路曰取束帛丨丨丨家語賜方朔東方朔射覆為丨中則丨臣帛本傳鴈足繫帛見别集鴈注鳯集賜帛宣帝時詔曰丨凰丨於新蔡其丨汝南太守丨百匹貴樵賤帛劉義節并州人從平京師為鴻臚卿時傾府庫為軍賞帑財大乏義節曰今京師屯兵多樵貴帛賤丐筆書帛狄仁傑送制獄丨丨丨置褚衣中好謂吏曰方暑請付家徹絮致京師帛馮伉膳部員外郎李抱真卒伉持節臨弔歸之帛不受又丨丨丨伉上表固拒殫太府帛魏知古拜黃門侍郎會造金仙玉真觀諌曰諸司試補員外檢校官嬴二太府之帛為丨賜公藝帛張公藝九世同居高宗有事太山臨奉其居問本來書忍字以對丨縑帛而去似布而細同昌公主一日大會韋氏族暑氣特甚主命取澄水帛以水蘸之挂于南軒良久滿座皆思挾纊澄水帛長八九尺丨丨丨丨明薄可鑒中有龍涎能消暑毒杜陽雜編以疏易良為將者刻薄自入給帛則丨丨丨丨唐突厥傳韓昌黎策問人之仰而生者在榖帛榖帛既豐無飢寒之患繒褒姒裂周幽王后丨丨好丨繒聲史記灌嬰貶丨丨丨繒前本傳素韓愈對丨丨自河南令除職方員外郎歸朝問前後之朝如何丨曰將縑比素南部新書徐堅論開元中張説與丨丨丨近世文章張九齡如輕縑素練實濟時用而窘邊幅唐文藝傳練季孫冠丨丨練丨待罪左王導衣晉丨丨為太保時庫藏竭唯有練千端鬻不售導乃製練布單衣皆效之乃貴也詩集救汝寒那無囊中帛丨丨丨懍凛杜北征詩擎偏重內帛丨丨丨送許拾遺彤庭所分丨丨丨丨帛本自寒女出鞭撻其夫家聚斂貢城闕杜北征素織素見絹注裂素新丨齊紈丨皎潔如霜雪班婕妤扇詩素書呼童烹鯉魚中有尺丨丨古詩素手纎纎濯丨丨古詩匹素寒亦一丨丨夜惜鄰人機杜牧之杜秋娘詩餘素殘工委筐篋丨丨經刀尺韋應物東國染毫丨丨素柳宗元書事長煙丨丨引輕素沈休文練縞練丨丨吹組帳韓愈嶽陽樓素練丨丨風霜起杜甫畫鷹曜輿臺越裳與楚練照丨丨丨軀照楚國組練丨丨丨李白澄江靜丨丨丨如練杜小城搗天晴丨丨丨練急杜秋風搗秋練月出砧杵動家家丨丨丨白公秋霽綾財貨源流綾按釋文云布帛之細者也織之者一絲一躡竒文異變因而作成絲愈多躡愈衆文理愈竒矣事類竹根柿蒂蛇皮馬眼已上四種並今時綾名白氏帖金縷昔秦國以丨丨為縷青衾漢內臣卧丨綾丨十二躡舊綾機五十絲為五十躡先生易以丨丨奇文異變因而作成傅玄鳥先生文十樣花越州土貢丨丨丨紋綾地理志湖州貢丨丨丨鳥眼綾潤州貢丨丨丨水紋方紋魚口繡葉花紋綾蔡州貢丨丨土丨四窠雲地花龜甲鸂鶒等綾理志越州貢見下韋堅陳丨丨鑿潭以通漕二年而成帝為登樓召羣臣臨觀堅豫取洛汴宋山東小斛舟三百首貯之潭每舟署某郡以所産暴陳其上若廣陵則官端綾會稽則吳綾吳郡則方丈綾船皆尾相銜進數十里不絶王峻借五代丨丨請丨左藏庫綾萬匹太祖從之代宗禁丨丨大歷六年六月丨文紗吳綾為龍鳯麒麟天馬辟邪者本紀敬宗索李德裕丨丨立詔丨盤絛繚綾千匹裕奏言立鵝天馬盤絛掬豹文彩怪麗惟乘輿當御今乃廣用千匹臣所未諭方鎮貢奉裴胃拜荆南節度使是時丨丨爭剝下希恩製重錦異綾為丨丨有中使者即悉公帑市觀胃待之有節沙州應幕吐蕃贊普始丨丨刺史周鼎為唐固守贊普使尚綺心兒攻之都知兵馬使閻朝執鼎役之自領州事城守者八年出綾一端萬一斗丨丨者入水不濡貢龍油綾文彩尤異丨丨丨丨濕云有龍油故也杜陽編完封不發韓思復永淳中家益窶嵗饉京兆杜瑾以百綾餉思復思復方併日食而綾丨丨丨丨樂天為質丨丨飛雲履玄綾丨丨樵人直説中官不衣唐丨丨