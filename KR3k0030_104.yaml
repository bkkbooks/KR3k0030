body:
  text: 古今合璧事類備要後集卷三十五宋謝維新撰九卿門司農卿少卿寺簿寺丞歷代沿革少皥氏以九扈為九農正扈通典作􅟾注􅟾鳥也􅟾有九種以為農號舜命棄為后稷播時百穀周禮有太府掌九賦九貢下大夫秦為治粟內史掌榖貨韓信歸漢為治粟內史即其任也景帝更名大農令武帝太初更名大司農掌九榖六蓄之供膳羞者凡郡國諸倉農監都水六十五官皆屬焉通典云屬官有太倉均輸平凖都內籍田五令丞平帝改曰羲和以劉歆為之又改為納言後漢為大司農掌諸錢穀金帛本注及諸貨幣郡國四時上月旦見錢榖簿邊郡諸官請調度者皆為給報損多益寡取租給足郡國鹽官鐵官並屬歷代皆有梁置十二卿以署為寺官為春卿唐有司農卿一人少卿二人龍朔二年改為司稼咸亨復卿掌邦國倉儲委積之事揔四寺諸監謹其出納揔上林六倉鉤盾導官田署京師百官廩祿皆仰給焉朝㑹祭祀共御所頒皆共焉孟春皇帝親籍田之禮事有於先農則奉進耒耜季冬藏冰祭司農以黑牡秬黍仲春啓冰亦如之通典國朝司農寺判寺事二人以兩制或朝官以上充熙寧二年立常平斂散法三年詔以新法付司農寺而農田水利免役保甲等法悉自司農講行元豐官制行寺監不治外事遂循唐典正其職秩司農舊職悉歸戶部右曹續㑹要司農掌倉委積之政令總苑囿庫務之事而謹其出納京都官吏祿廩諸路歲運至京師悉掌焉凡苑囿行幸排北及薦饗進御頒賜植藏之物與造麴蘖給薪炭皆戒有司以時辨具天子親耕籍田則奉耒耜所𨽻宫屬凡五十倉二十有五續㑹要總倉作二十四草場十有二續㑹要作十排岸司四續㑹要園苑四並四朝志建炎三年詔罷司農寺紹興四年復置司農寺卿少各特置一員仲興㑹要事類農正九扈為九丨丨扈民無淫者也左傳藏長太府掌九賦九貢注云王者王治丨之丨若今司農矣太府丨丨下大夫周禮羲和莽改為丨丨六帖治粟奉曰丨丨內史六帖司金惟時大農爰丨丨穀楊雄大司農針又大司農卿一人中二千石掌諸錢穀金帛諸貨幣邊郡諸官請調度者損多益寡取相給足續漢書天倉丨丨者司農也韓揚天文要集國泉司農少府丨之丨也六倉量者籥合升斗斛也職在丨丨司農掌之漢律歷志司均見前注六府乃司大事掌是丨丨崔諼鮑德誄稷粟漢朱邑為大司農張敬與邑書曰足下以清明之德掌周丨之丨稼卿見前注名卿牟融為大司農性明達稱為丨丨東觀漢記治最魏梁習字子虞為并州二十餘年政丨為天下丨召拜大司農農政改授丨丨于彼野王倉盈庾億國富兵强潘安仁楊荆州誄春卿梁曰丨丨見前注掌帛見前司金注典農丨丨六帖不賫糧鄭當時為大司農門下客亡貴賤亡留門者山東諸公翕然稱鄭莊武帝曰吾聞鄭莊行千里丨丨丨漢書諫農桑司馬芝字子華光是魏諸典農氏各求后生以要利司馬芝人丨曰王者之治崇本務農重榖不宜復以商事亂專以丨丨為務明帝從之書抄云納郡租趙元俶轉頴川太守有惠政因人朝㑹司農不時納諸郡租元俶奏之帝謂曰如臣意未過十日帝即日拜元俶為司農卿丨天下丨丨如言而了帝悅曉邊事秋曰為大司農丨丨丨數上便宜事天子器言禁兵唐段秀實為司農卿丨丨丨寡少乃上疏云云職官分紀倒用印唐段秀實傳朱泚反以秀實素有人望使騎迎秀實與子弟訣而入泚喜曰吾事成矣秀實知不可乃陽與合陰結將軍劉海賓姚令言都虞候何明禮欲圖泚三人者皆秀實素所厚源休教泚僞迎太子遣將韓旻領鋭師三千疾馳奉天秀實以為宗廟之危不咨瑞乃遣人諭太史歧靈嶽竊取今言印不獲乃丨丨司農丨追其兵旻至駱驛得符還秀實謂海賓曰旻之來吾等無遺類我當直縳賊繼而令明禮應於外通鑑萬石簸揚陳粟丨丨丨以丨之漢武帝柏梁詩一乘送迎漢鄭𤣥公車召為大司農給安車丨丨所過長史丨丨居處節儉漢朱邑治行第一為大司農丨丨丨丨在位清正後漢鄭衆為司農丨丨以丨丨稱書抄學問博通後漢王孫端丨丨丨丨為大司農續漢書清白方正東漢髙誼字季回以儒學召拜大司農在朝以丨丨丨丨稱東觀漢記漢崇儒學丨丨丨丨選正鄭𤣥白六帖晉寵貞廉丨丨丨丨任先崔氏晉崔洪為司農手不執珠玉口不言貨財非德不交東漢趙典字仲經為大司農閉門却掃非丨丨丨叢劇可濟杜中立遷卿繩吏急反為中傷左遷久之復拜卿入謝帝曰卿用法深信乎答曰輦下百司養名不肯事二司農尤丨丨陛下無遽信流言假臣數月丨丨帝許之本𫝊用制國泉國有九列而司農氏居其一焉前代非牟融之循理康成之儒學不作兹選云云假以秩崇之榮丨丨丨丨之重唐元稹行裴司農制冠儀農扈丨丨丨丨慶元制本藏不給末用漢母將隆君房言大司農錢自供乘不足供養勞賜一出少府蓋丨丨丨丨丨丨人力不供浮費别公私示正略非學不在兹選農天下之夲也故國有九列而司農氏居其一焉前代丨牟融之循理康成之儒丨丨丨丨丨唐元稹行裴武授制風聲大行為司農陳寵為廣漢太守丨丨丨丨入丨大丨丨張播記取錢納帑以為法唐杜中立遷司農卿初度支度六宫飧錢移司農季一出付吏大吏盡舉所給於人權其子錢以給之既不以時黃門來督責慢罵中立丨丨丨丨舍率五百一出吏不得為奸遂丨丨丨唐書司農少卿歷代㳂革後魏北齊司農寺置少卿隋唐因之國朝元豐正名置少卿為卿之二建炎三年省紹興四年後置司農卿少各一員中興㑹要事類賜絹唐韋機拜少卿有宦者於苑中犯法機杖而後奏高宗嗟賞丨丨數十匹唐書貯錢韋機受詔檢校東都營田苑囿之事高宗謂之曰宫館隋代所造漸將摧毁頻修費財力如何機奏曰臣任司農向已十年前後省費今見丨丨三十萬貫可以供葺理上悅同上亞列卿升丨丨丨之位往為庶土之生胡文恭行陳宗元少卿制二農正擢丨丨丨曲阜行韓正彥制奏久任莫濟除少卿自禮部員外郎除魏杞奏曰濟嘗中詞科且掌南宫箋奏恐議者以為蹊徑未是上曰中都官不分清濁如司農責任亦甚重以士人除授亦無害也濟尋丨丨丨責實詔所論甚當國史上親擢高䕫字仲一丨丨丨為司農少卿倉地卑君始梁空敷扳采以不腐周益公集檄奏詳明熊本判司農寺丞神宗曰熊本不傷財不害民一旦去百年之患丨丨丨丨可嘉也東都事略力爭虧食李浩除少卿時朝廷和糴八百萬石而董事者皆有憑恃賤糴濕惡以欺沒官錢戶部不敢詰公視事即奏請下有司治大理附㑹戶部以支為盤公丨丨曰是非徒惠姦且丨軍丨上是其議言行録寺丞歷代㳂革秦治粟內史有兩丞漢司農丞亦二人或謂之中丞通典云耿壽昌為大司農中丞奏設常平倉紿北邊省轉運又桑洪羊為大司農中丞管諸㑹計事平帝又置大司農部丞十三人人部一州勸農桑後漢司農丞一人部丞一人魏晉因之銅印黃綬進賢一梁冠宋齊以墨綬並通典唐有丞六人掌判寺事凡天下租稅及折造轉運于京師皆閲而納之以供國用以祿百官分紀國朝新法行吕惠卿請始置司農寺丞一員以農田水利免役保甲等法付司農熙寧五年增置丞四員仍與簿輪出按察逐州保甲元豐四年舒亶請止留丞一員餘並罷明年改制以司農舊職悉付户部右曹而始循唐典正其秩職續㑹要建炎三年詔罷司農寺紹興三年復置寺丞二員中興㑹要事類給邊見耿壽昌事注管計見桑𢎞羊事注五令丞大司農屬官有太知均輸平準都內藉田丨丨丨漢表參領事少卿為卿二而丞丨丨寺丨四朝志擢二農正丨丨丨丨曲阜行韓正彥制事歸地官大農丨丨丨丨丞事益簡欒城行李執制介通嚴恕真重器葉顒字子昂諡正簡遷司農寺丞在朝三年非公事未嘗至相府樞密王綸知公恬退而未知其德性欲試以事一日官誥院失錦一端命公治之公請寬其慢藏之罪於是綸大喜謂其客曰葉寺丞丨而丨丨而丨丨丨丨也楊誠齊集蹈履繩檢丞農扈厚亦自將其身丨丨丨丨擢丨丨丨以試爾能張于湖吕搢除司農寺丞制寺簿歷代㳂革晉太康中置主簿一人自後無聞梁陳又有北齊亦然唐主簿二人掌印署抄目勾檢稽失出納通典分紀國朝治平中已置主簿熙寧新法行詔增一員五年增至四員後置六員元豐四年舒亶請存三員餘並罷仍與丞輪出逐州按察保甲續㑹要建炎三年罷司農紹興十年復置中興㑹要事類木契置丨丨二十隻應物出納與署合之唐百官志農屬命以丨丨欒城除蔡潛制太府卿少卿寺簿寺丞歷代㳂革周官太府下大夫掌九貢九賦九功之二以受其貨賄之入頒其貨于受藏之府秦漢以下不置然其職在司農少府至梁天監置太府卿掌金帛府帑及關津市肆信視宗正後魏太和改少府為太府卿掌財物庫藏王顯謂楊固曰减百官之祿及贓贖悉入京藏以此充府未足為多北齊兼掌造器物後周太府中大夫掌貢賦貨賄以供國用屬大冡宰隋初與北齊同所掌左右藏及尚方左內右司染等署煬帝分太府寺為少府監管尚方織染等署但管京都市及平準左右藏唐因之卿一人少卿二人掌財貨治藏貿易總京師四市左右藏常平七署凡四方貢賦百官俸秩謹其出納賦物任土所出定精粗之羞祭祀幣帛皆總焉百官志龍朔二年改太府為外府正卿咸亨復武后光宅元年改為司府中宗神龍復曰太府及國朝太府寺判寺事一人以兩制或𢃄職朝官充凡財貨廪藏貿易四方貢賦百官俸秩皆𨽻三司本寺但掌供祠祭香帛帨巾神位席及造斗稱升尺而已元豐改制始正職掌四朝志此據續㑹要而題名乃云國初省部寺監惟以寄祿寺則光祿太常宗正衛尉司農大理或以卿或以二或以丞各寓一階别設主判之官以典事惟太府則否其職悉入三司諸案故主判之任罕置與㑹要或異當考卿掌財貨出納貿易之事凡貢賦之輸於京師者至則别而受之供君之用及待邊費則歸於內藏供國之用及待經費則歸於左藏應所賜以法給厯從有司檢察書其名數鉤覆而後給焉供奉之物則承㫖以進審奏得畫乃聽除之若頒畿內軍衣則前期進樣定其頒日將校部營兵友請月具數以聞凡商賈之賦小賈即門征之大賈則輸於務貨之不售平其價鬻於平凖乘時賖貨以濟民用若質取於官則給用多寡各從其扺歲以香茶鹽鈔募人入豆穀實邊即京都闕用物預報度支凡課入以盈虧定課最行賞罰大祭祀祼則卿置幣奠玉則入陳玉帛元祐三年詔太府寺置長二餘寺監長二互置建炎三年詔罷太府寺撥𨽻金部獨以一丞治鹺茗之質劑凡省五年而後復置卿少卿員初除馬丞家中興㑹要初元豐以在京司局分屬寺監而太府總局二十有四今雖頗省猶劇於他寺以式班內外之廪稍覆其名數而鈎磨之則諸軍諸司糧審四院屬焉頒財用於受藏之府用知入出而㑹之則左藏東西兩軍屬焉時禁省官府之需以償用物則買務屬焉斥幣餘互市之積以便貿易則賣場屬焉比物奠賈俾從其抵則編套兩局屬焉藥石必良以除札瘥則和劑惠民四局屬焉叙財幣以待上之賜好則祇候庫屬焉制劵之短長以通商則鈔引庫屬焉所異於元豐者惟內藏奉宸不外屬榷貨顓𨽻於都司題名事類天府周禮夏卿梁制見總九卿㳂革類又梁天監象四時置十二卿丨丨注云太府少府太僕少序古名丨丨白六帖司府太府曰丨丨鄭氏談綺治藏丨丨之長鄭康成周禮注平物以二法平物一曰度量二曰權衡唐百官志威肅李襲譽召為太府為人嚴慤以丨丨聞本傳精麗楊崇禮開元為少卿雖錢帛充牣丈尺皆躬自省閲時以為前後無與為比擢拜太府卿時太平日