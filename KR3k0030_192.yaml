  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_192-1a, image: WYG0940/WYG0940-0662a.png}
body:
  text: 古今合璧事類備要績集卷四十二宋謝維新撰事為門迎候事理發揮天地不交而萬物不興人道不交而萬事不成禮之於賔主也不往不來而交際之道乖矣其何以厚親戚其何以接賔朋又何以事師長哉故於其始至也則有迎候之禮然其交也必以道其接也必以禮斯可以無愧矣茍徇利而不徇義任勢而不任理則屠沽流耳妾婦輩耳於迎候何取焉事類迎客凡與客入者每門讓於客客至於寢門則主人請入為席然後出丨丨禮肅客主人丨丨而入主人入門而右客入門而左主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階主人與客讓登主人先登客從之拾級聚足連步以上上於東階則先右足上於西階則先左足犒從者寡君聞吾子將步師出於敝邑敢丨丨丨不腆敝邑為從者之淹居則具一日之積行則備一夕之衛襄二十三年輅眇者季孫行父秃晉郤克眇衛孫良夫跛曹公子手僂同時而聘於齊齊使秃者御禿者使眇者丨丨丨使跛者御跛者使僂者御僂者蕭同叔子處臺上而笑之聞於客客不悅而去相與立胥閭而語移日不解齊人有知之者曰齊之患必自此始矣穀梁成公元年迎其家莊子曰陽子居西遊於秦遇老子老子曰而睢睢而盱盱而誰與居大白若辱盛德若不足陽子居蹙然變容其往也舍者將丨丨丨公執席妻執巾櫛舍者避席煬者避竈言其尊形自異故避之其反也舍者與之爭席矣去其矜夸故也迎於衆魏公子信陵君置酒大會賔客坐定從車騎虛左自迎侯生侯生直上載公子上坐不讓公子執轡愈恭侯生曰臣有客在市屠中願枉車騎過之公子引車入市侯生下見其客朱亥故久立語微察公子顔色愈和乃就車酒酣侯生曰今日嬴之為公子亦足矣嬴乃夷門抱關者也公子自丨丨丨人廣坐之中欲就公子之名故久立公子市中人皆以嬴為小人以公子為長者也侯生因進朱亥曰屠者朱亥賢者世莫能知故隱屠問耳史記延上坐酈食其沛公略地至髙陽食其入即長揖不拜曰足下必欲誅無道秦不宜踞見長者於是沛公輟洗起衣丨丨丨謝之本傳遣使者上丨丨丨束帛加璧安車以蒲裹輪駕駟迎申公弟子二人乘軺傳從申公傳擁篲郤行上歸櫟陽五日一朝太公太公丨丨迎門丨丨上大驚下扶太公漢髙帝紀岸幘坐迎隗囂使馬援奉書雒陽援初到良久中黃門引入帝在宣德殿南廡下但丨丨丨丨後漢馬援傳趨拜送迎韓信傳詳見謁見門出入送迎上自勞軍至霸上及棘門軍直馳入將以下騎丨丨丨丨周亞夫傳開閣延請暴勝之素聞雋不疑賢至渤海遣吏請與相見不疑盛服至門上謁勝之丨丨丨丨本傳詳見後暴公威名注負弩前驅漢司馬相如武帝時卭筰君長願為臣妾請吏比南夷上拜相如為郎將建節往使至蜀太守以下郊迎縣令丨丨矢丨丨蜀人以為寵無入我門主父偃為齊相召昆弟賔客散五百金與之曰始貧時昆弟不我內今吾相齊諸君迎我或千里吾與諸君絶矣無復入偃之門大書其門下邽翟公為廷尉賔客填門及廢門外可設雀羅後復為廷尉客欲往翟公丨丨丨丨曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見漢鄭當時傳梁松來候馬援嘗有疾丨丨丨丨之獨拜牀下援不答本傳薛勤來候陳蕃字仲舉汝南平輿人年十五嘗間處一室庭宇蕪穢父友丨丨丨丨之謂蕃曰孺子何不灑掃以待賔客蕃曰大丈夫處世當掃除天下安事一室乎勤知其清世志甚竒之竹馬來迎郭伋事見刺史門導驅出迎范式為荆州刺史友人南陽孔嵩家貧親老乃變姓名傭為新野阿里街卒式行部到新野而縣選嵩為道騶迎式式見而識之呼嵩把臂謂曰非孔仲山耶對之歎息語及平生勑縣代嵩嵩以為先傭未竟不肯去華嶠後漢倒屣出迎蔡雍見王粲而竒之時雍才學顯著貴重朝廷常車騎填巷賔客盈坐聞粲在門丨丨迎之後漢屣履出迎皇甫規歸安定白王符在門規素聞符名乃驚遽而起衣不及帶丨丨丨丨援符手而還與同坐極歡先是雁門太守至規不禮時人為之語曰徒見二千石不如一縫掖乘輿出迎李膺有疾不通客唯陳仲弓來丨丨丨丨之青瑣躡履起迎暴勝之事見慕名門暴公威名注每候賈謐石崇與潘嶽諂事賈謐丨丨其出輒望塵雅拜本傳令候陶潛陶潛字元亮刺史王𢎞每丨人丨之本傳遣衛逢迎康居太子欲降漢丨丨司馬丨丨段會宗傳悉軍迎迋回鶻入朝王鍔丨丨丨丨注迋于放反迎也唐王鍔傳少遊偃蹇竇參按江淮獄揚州節度使陳丨丨丨丨不郊迎遣軍吏致問參厲辭譙責少逰慙往謁參參不顧即去裴皥耿介桑維翰亦丨丨之門生嘗謁皥皥不迎不送或問之答曰皥見翰於中書則庶僚也維翰見皥於私館則門生也何送迎之有人亦重其丨丨郡國間談具舟以候陳瓘遷責以來自天台歸通州道由會稽時王豐甫仲薿為越帥具舟楫為禮候公於郊因共載歸府舍越人聞公赴府會競來觀瞻比肩輿歸館道路遮擁幾不可行為人欽重如此遺事出郊而候陳瓘徙居山陽經由江都時淮帥毛友達或疑其為蔡黨勸公晦迹而過公曰吾無私憾於蔡氏蔡氏之人豈無是非之公乎乃先遣書遺之毛報書加禮有公立朝行已之道願望見而不可得之語即出郊候公語頗輸誠公亦待之無間同上輕輿以迓寇準得罪南行嶠南山水峻絶馬不能進郡縣官有伐竹為丨丨丨丨準者準謝曰吾罪人騎馬足矣冒炎溽捫險阻日行百里左右為之泣行準昻然無隕獲容其度量過人如此旌忠碑陶潛歸去來辭歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟已往之不諌知來者之可追實迷途其未逺覺今是而昨非舟遙遙以輕揚風飄飄而吹衣問征夫以前路恨晨光之熹微乃瞻衡宇載欣載奔僮僕歡迎稚子候門三徑就荒松菊猶存攜幼入室有酒盈樽云云韓愈送鄭尚書序嶺之南其州七十其二十二𨽻嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為大府帥如至四府必使其佐問起居謝守地不得即賀以為禮嵗時必遣賀問致水土物大府帥或道過其府必戎服左握刀右屬弓矢帕首袴鞾迎於郊韓愈送李端公序元年春今相國李公藩為吏部貟外郎愈嘗與偕朝道語幽州司徒公劉濟之賢曰某前年被詔告禮幽州入其地迓勞之使里至每進益恭及郊司徒公紅帕首鞾袴握刀左右雜佩弓韔服矢插房俯立迎道左某禮辭曰公天子之宰禮不可如是及府又以其服即事某又曰公三公不可以將服承命及館又如是卒不得辭云云今李公既朝夕左右端公嵗時來夀其親端公李益也宰相揆之子登進士第幽州劉濟辟為從事其為人佐甚忠意欲司徒公功名流千萬嵗請以愈言為使歸之獻詩集不出客至從嗔丨丨迎杜寡將踈慵丨丨迎柳出郭至家父老喜丨丨壺漿迎坡夾道昔年結客曽逰處今見焚香丨丨迎歐又世人大抵重官榮見我西歸丨丨迎應被華山髙士笑天真喪盡得虛名張復之自成都召還華山寄陳希夷諸將列道左旌旗丨丨丨馬前弓劒六蕃迎歐鄉老邀世人無往復丨丨有丨迎坡古今合璧事類備要續集卷四十二
