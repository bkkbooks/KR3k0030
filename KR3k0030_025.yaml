body:
  text: 古今合璧事類備要前集卷二十五宋謝維新撰親屬門母子事類聖善母氏劬勞母氏丨丨詩凱風壽母魯侯燕喜令妻丨丨魯頌諼堂焉得諼草言樹之背注丨草令人忌憂背北丨也疏堂者房室所居之地總謂之堂房半以北為北堂房半以南為南堂衞風今人用萱堂字慈庭慈母有敗子李斯書今人謂母為丨丨靡依丨丨匪母詩陟岵何恃無母丨丨蓼莪搤臂子歸曾參出薪于野客至其家母即以左手丨右丨臂痛參即馳至問母曰臂何故痛母曰今者客至搤吾臂呼子耳論衡噬指子至蔡順少孤事母孝嘗出求薪有客卒至母望順不至乃丨其丨順即心動棄薪即歸跪間其故母曰有急客來吾噬指以悟汝耳斷機教子見教子類倚門望子王孫賈事閔王王出走失王之處其母曰汝朝出而晚來則吾丨丨而丨女暮出而不歸則吾倚閭而望女今事王王出女不知處尚何歸賈入市曰淖齒亂齊國殺閔王欲與我誅者祖右市人從者四百人遂誅淖齒伏劒語使漢王擊項籍王陵以兵屬漢籍取陵母置軍中陵使至則東鄉坐陵母欲以招陵陵母私送使者曰願為老妾語陵善事漢王漢王長者母以老妾故持二心妾以死送使者遂丨丨而死項王怒烹陵母卒從漢王定天下截髪待賔范逵嘗過陶侃家侃時無以待賔母謂侃曰汝但留客吾自為計乃丨丨為雙髻賣易酒肴極豐從者亦過望逵至京師稱述侃侃遂知名本傳交友升堂後漢范式與張卲為友式曰後將還拜親卲白母為酒饌以待之至期式果到升堂拜母生徒受業晉韋逞母宋氏父世儒學盧壺奏就家立宣講堂置生徒百二十人隔紗幔受業號文君侍婢十人能識貴人潘孟陽母劉晏之女周末坐綠衣少年何人曰補闕杜黄裳夫人曰此人全别必是貴人南部新書令舉孝子晉呉隱之字處黙居喪過禮與韓康伯母隣康伯母聞隱之哭謂其子曰汝舉銓衡當舉此人及康伯為吏部尚書遂舉隱之階清級問子平反雋不疑為京兆尹每行縣錄囚徒還其母問不疑多為所平反母喜笑為飲食言語或亡所出母怒為不食故不疑為吏嚴而不酷聴子處決鄭善果母崔賢明曉政治嘗坐閣内聴善果處決或當理則恱冇不可則引至床下責愧之責子煩苛嚴延年治河南酷刑號屠伯母數責延年云我不意當老見壯子被刑戮也行矣去汝東歸掃墓地耳遂歸後歳餘果弃市東海莫不賢智其母延年兄弟五人皆至大官母號萬石嚴姬厭子放肆嚴武鎮蜀頗放肆及卒母哭曰今而後吾知免為官婢矣助子為政漢崔寔母劉氏博覽書傳寔為五原太守有能政母助也戒子舉兵秦末天下兵起陳嬰亦起衆母曰自吾為汝家婦長見貧賤卒富貴不祥不如以兵屬人事成少受其利勸子起事桓彦範誅二張也初將起事告其母母曰忠孝不並立義先國家可也唐書勉子就獄范滂字孟𫝊桓帝時以鈎黨禁錮靈帝大誅黨人詔下急捕滂聞之自詣獄縣令郭揖解印綬欲與俱亡滂曰滂死則禍塞其母就與之訣滂曰仲博孝敬足以供養惟大人割不忍之恩母曰汝今得與李杜齊名死亦何恨既有令名復求壽考可得兼乎滂受教再拜辭母曰吾欲使汝為惡則惡不可為使汝為善則我不為惡行路聞之為流涕考死詔獄年三十三慮子吟詩李賀母探囊中見所書詩多即怒曰是兒欲嘔出心乃已耳期子成學杜淙牧溰陽宏詞李宣古數陪燕飲戲謔侮慢杜不能容使辱之長林公主出而捄之云尚書不念諸子學文遣易衣而赴中坐長林公為詩兾彌縫也宣古詩云紅燈初上月輸髙照見堂前萬朶桃觱栗夜深抛耍令舞來挼去使人勞杜公賞之後二子裔休儒休皆登第人曰非母賢不能成子雲溪友議知子必貴南史王敬則母為女巫常謂人曰敬則生時胞衣紫色應得鳴鼔角人笑曰汝子得為人吹角可矣及長而兩腋下生乳各長數寸夢騎五色獅子後果然憂子驟顯潘孟陽初為侍郎年未四十其母謂曰以爾之才而位丞郎使吾憂之喜子陰德孫叔敖為小兒出遊見兩頭蛇殺而埋之歸泣白母曰兒聞兩頭蛇見者必死恐後人見乃埋之母曰爾行陰徳必有陽報徳勝不祥又除百禍汝無憂矣叔敖後為楚相新序雜事忿子曠禮文伯之喪敬姜據其床而不哭曰吾有斯子也吾以為賢人也及其死也朋友諸臣未有出涕者而内人皆行哭失聲斯子也必多曠於禮矣記索刀破腹朱廢帝子業性凶悖其母疾篤召之帝曰病人多鬼那可往其母怒謂侍臣將刀來破我腹那得生此寜馨兒南史後傳拔刀逐賊僕固懐恩父子平史朝義舉河朔若拾遣護囘紇歸國過太原為辛雲京所拒閉關不犒軍大怒頓軍汾州遣子瑒攻雲京偏將焦暉等斬瑒首獻閼下懷恩聞以告母母曰我戒汝勿反國家訓汝不淺今衆變禍且及我提刀逐之曰吾為國殺此賊取其心以令軍中懐恩走以部曲三百走靈州詔輦其母歸京師賛曰其母丨丨丨丨烈婦人哉本傳食羮請遺鄭莊公寘姜氏于城潁而誓之曰不及黄泉無相見也既而悔之頴考叔為潁谷封人聞之有獻於公公賜之食食舍肉公問之對曰小人有母皆嘗小人之丨矣未嘗君之丨丨以丨之公曰爾有母遺繄我獨無頴考叔曰何謂也公語之故且告之悔對曰若掘地及泉隧而相見其誰曰不然公從之公入而賦大隧之中其樂也融融姜出而賦大隧之外其樂也洩洩遂為母子如初君子曰潁考叔純孝也愛其母施及莊公隠元年飲酒嘗吐蔡順字召仲有至孝之心少喪父奉養母甘口之物不敢先嘗母至婚家因丨丨變吐順恐中毒乃丨其丨先賢傳汲泉得魚後姜詩事母至孝母好飲江水嗜魚鱠舍側忽湧泉味如江水每日一汲輒獲雙魚北魏陸政性篤孝母呉人好食魚北土魚少政求之苦難後宅側忽泉出而有魚得以供膳時人謂孝魚泉揺竹生筍孟宗母嗜筍冬筍未生宗入竹林哀嘆丨丨而筍出投魚遺母杜孝巴郡人也少失父與母居以至孝稱後在成都母喜食生魚孝於蜀截大竹筒盛魚二頭塞之以草呪曰我母必得此因投中流婦出見筒横來觸岸異而取視有二魚含笑曰此我夫所寄也熟而進之聞者嘆駭蕭廣濟孝子傳作鮓寄母孟仁為監魚池司馬自結網捕魚丨丨丨丨母還之曰汝為魚官以鮓寄母非避嫌疑也呉錄陶侃母湛氏侃少為縣吏嘗監魚池以魚鮓遺母母封鮓責之曰爾以官物遺我不能益我乃増吾憂耳分椹奉母後漢蔡順當王莽末大荒順拾椹以異器盛之赤眉賊見而問之順曰黑者奉母白者自食賊知其孝乃遺米肉故之懷橘遺母呉陸績年七歳謁見袁術登筵丨丨拜而墜地術問其故曰將以丨丨術甚奇之呉志蒲萄歸母陳叔達為納言嘗賜食得丨丨不舉髙祖問之對曰臣母病渴嘗求不能致願丨奉之帝曰卿有丨遺乎因賜之本傳𤓰菓進母滕曇恭年五嵗母患熱病思食寒𤓰土俗不産曇恭歴訪而不得俄遇一桑門曰我有雙𤓰分一相遺舉室驚異南史本傳殷憚生而謹愿七歳喪父哀號毁悴不為戲弄得丨丨可啖之物懷持丨丨未嘗先食孝子傳羅威字德仁八嵗喪父事母至孝耕耘為業勤身苦體以奉供養其菓珍味隨時進前也先賢傳珍饌供母茅容字季偉郭林宗見之請寓宿旦日容殺雞為饌林宗以為為己設既而供其母自以草蔬與客同飯林宗拜之曰卿賢乎哉因勸學以成徳板輿奉母潘岳閑居賦云太夫人在堂有羸老之疾尚何能違膝下色養而屑屑從斗筲之役乎於是覽止足之分庶浮雲之志築室種木逍遥自得池沿足以漁釣春税足以代耕灌園鬻蔬供朝夕之膳牧羊酤酪俟伏臘之資凜秋暑退熙春寒往微雨新晴六合清朗太夫人乃御丨丨升輕軒逺覽王畿近周家園席長筵列孫子柳垂隂車結軌或宴于林或禊于汜昆弟班白兒童稚齒稱萬壽以獻觴或一懼而一喜夀觴舉慈顔和浮杯樂飲絲竹駢羅頓足起舞抗音髙歌人生安樂孰知其他持節侍母晉汝南王亮母伏太妃常有小疾祓於洛水亮兄弟三人侍從並丨丨鼔吹震耀洛濵武帝登凌雲臺望見曰伏妃可謂富貴矣擁笏安母唐曹成王臯為刺史遭誣在冶念其母太妃老將驚而戚出則囚服就辯入則丨丨垂魚退之曹王碑為母導輿崔邠拜太常卿故事太常始視事大閲四部樂都人縱觀邠自第去㡌親導母輿公卿見者皆避道都人榮之為母執轡五代張遂清為淄州刺史迎其母及郊遂親丨丨丨丨行數十里州人以為榮迴候起居唐趙隱輔政它宰相及百官皆詣第升堂慶母懿宗誕曰宴慈恩寺隱侍母以安輿臨觀宰相率百官拜恩於庭丨班丨夫人丨丨縉紳以為榮職官分紀迎還京師陸贄為中書舍人母韋氏在江東帝遣中人丨丨丨丨奉母從軍王緒劉行全南走初以糧少故兼道馳約軍中曰以老孺從者斬王潮與弟審邽審知丨丨以行緒切責潮曰吾聞軍行有法無不法之軍對曰人皆有母不聞無母之人緒怒欲斬其母三子同辭對曰事母猶事将軍也殺其母焉用其子緒殺之迎母遇賊遼西太守趙苞到官遣使丨丨及妻子為賊所刼質載以擊郡苞悲號謂母曰欲以微禄奉養不圖為母作禍昔為母子今為王臣義不得顧私恩遂與賊戰母妻皆被害苞葬訖曰殺母全義非孝也嘔血而死經亂失母杜羔有至性其父河北一尉而卒母非嫡丨丨不知所之會堂兄兼為澤潞判官嘗鞫獄於私第有老婦辨對見兼出入切語人曰此少年狀類吾夫訊之故羔母也自此迎侍而歸又往訪先人之墓邑中故老已盡不知所在館於佛寺日夜悲泣忽視屋柱煤煙之下見數行字拂而視之乃父遺跡云我子孫若求吾墓當於某村家問之羔哭而往梁冇老父年八十餘指其丘壠因得歸葬羔官至工部尚書致仕李肇國史東坡嘗書此事遺朱康叔云被執存母曹操執陳宫謂曰奈卿老母何曰宫聞以孝治天下者不害人之親老母存否在明公不在官也操曰奈卿妻子何曰宫聞宫施仁政於天下者不絶人之祀妻子存否在明公不在也母老被謫劉禹錫出為播州刺史詔下御史中丞裴度為言播極逺猿猱所宅禹錫母八十餘不能往當與其子訣恐傷陛下孝治志乃易連州詳見交友門柳子厚墓母老出使狄仁傑為并州叅軍同府鄭崇質丨丨疾當使絶域仁傑曰君可貽親萬里憂乎詣長史藺仁基請代行時仁基與司馬李孝㢘不平相語曰吾等可少愧矣相待如初取決於母華原令盧摐以公事譙賁邑人齊令詵宦人也銜之結摐罪張鎰案驗摐當免官有司承風以死論鎰不直之乃白其母曰今理摐摐免死而鎰坐貶黙則負官貶則為太夫人憂敢問所安母曰兒無累於道吾所安也遂執正其罪摐得流鎰貶撫州司户問計於母王義方拜御史且疾當世附麗匪人以期朝廷内決劾奏意必得罪丨丨丨丨母曰昔王母伏劒成陵之誼汝能盡忠吾願之死不恨母病下涙南史蕭叡明丨丨風積年叡明晝夜祈禱時寒叡明丨丨為之冰如筯額上叩頭血亦冰不溜後其母遂安孝義集母疾輒病唐張志寛嘗詣縣忽稱丨丨求急歸令問狀答曰母有疾志寛丨丨今疑妄繫於獄馳驗如言本傳失母心亂徐庶母為曹公所得庶謂劉備曰本欲為明公效愚疑今丨老丨方寸亂矣請從此别遂詣曹公亡母指痛梁藏盾冇至性嘗隨父宿直庭尉府母劉夜暴亡盾左手中指忽痛不得寢及旦宅信報凶問刻木為養丁蘭少喪母不及養乃丨丨丨親形事之若生隣人張叔妻從蘭妻有所借蘭妻跪拜木人木人不恱不以借之叔醉罵木人以杖敲其頭蘭歸奮殺張叔郡縣嘉其孝遂上之圖形於靈臺孫盛逸士傳見像輙拜金日磾母死武帝詔圖其形於甘泉宫日磾養馬苑中每率馬過丨遺丨丨丨白鳥集墓林攅母亡作塚屋其右有丨丨來甘露降觀察使李若初遣官屬驗實㑹露晞攅哭曰天所降露禍我耶俄而露復集烏亦回翔詔作二闕於母墓前又表其閭時號闕下林家木傳隣里輟社魏王修年七歳母社日死修每至社日悲慟丨丨為之丨丨捫瘡輒哭寇萊公少時不修小節頗愛飛鷹走犬太夫人性嚴每不勝怒舉秤槌投之中足流血由是折節從學及貴母已亡每丨其丨痕丨丨記聞憂疾不寐司馬池嘗奏名禮部將入試殿庭一日心動不能寐曰吾母素多疾能無恙否及至内門徘徊不能入蓋母亡為友人所匿也因語其友止告以聞有疾池遂號慟而歸詔問其母張齊賢拜中書門下平章事母孫氏年八十餘封晉國太夫人太宗歎其母福夀多賜手詔存問搢紳滎之文祭其母李觀以著作郎知臨江軍清江縣時歐陽文忠公扶護太夫人喪歸廬陵船過清江太守謂公為文以祭之太守以簡率為訝觀曰無深訝也既而公擊節賞之其文曰昔孟軻亞聖母之教也今有子如軻雖死何憾尚享乞郡夫人趙康靖公槩㑹郊祀當進階封且任一子京官乞以曰母封母郡太君宰相謂公曰方為學士擬封不久矣公八十二朝夕不可期願及今以為榮許之後遂以為例賜湯沐邑官誥院敕郡夫人使金花羅紙七張錦縹袋丨以丨丨丨乃奉親之榮也春明退朝録詩集剪髻家貧無供給客位但箕箒俄頃羞頗珍寂寥人散後入怪鬢髪空吁嗟為之久自陳丨丨鬟市易充沽酒上云天下亂宜與英俊厚秦王時在坐真氣驚户牖及乎正觀初尚書踐台斗杜甫送王砅砅音例王珪之後此詩稱珪母之賢縫衣慈母手中線遊子身上衣臨行密密縫意恐遲遲歸誰言寸草心報得三春暉孟郊遊子吟萱草堂丨丨集丨階遊子行天涯慈親倚堂門不見萱草花同上綵衣春衞幕銜恩重潘輿送喜頻濟時瞻上将錫號戴慈親富貴當如此尊榮邁等倫郡依封土舊國與大名新紫誥鸞回紙紫誥紫錦之誥也鸞謂紙上之字有回鸞之勢也清朝燕賀人逺傳冬筍味更覺丨丨丨奕葉班姑史芬芳孟母鄰義方兼有訓詞翰兩如神委曲承顔體騫飛報主身可憐忠與孝雙美畫麒麟杜甫賀衞伯玉母加國太夫人萬里親涙墨灑為書将寄丨丨丨書去魂亦去兀然空一身孟郊歸信吟白髪親門無萬金聘家有丨丨丨歐公堂上慈庶云留汝車慰我丨丨丨荆公詩賀得母朱壽昌少不知母所在刺血冩經求之五十年後得大之蜀中東坡賀之以詩云嗟君七嵗知念母憐君壯心愈苦羨君臨老得相逢喜極無言涙如雨烹龍為炙玉為酒鶴髪初生千萬夀金花詔書錦作囊白藤肩輿亷蹙繡感君離合傷我心此事今無古或聞長陵朅來見大娣仲孺豈意逄将軍開皇苦桃空記面建中天子終不見西河太守誰復譏潁谷封人羞自薦彼集詩諷歸侍王稚川調官京師母老留鼎州久不歸侍嘗閲貴人歌舞有詩云畫堂玉佩萦雲響不及桃源欵乃歌黄山谷和韻諷之云慈母每占鳥鵲喜家人應賦扊扅歌可謂盡朋友責善之義山谷至孝奉母安康君至為親滌溺器未嘗頃刻不供子職繼母伯叔母慈母所生母保母庶母出母乳母事類如母繼母丨丨故孝子不敢殊也儀禮配父傳云繼母同母也當以丨丨之尊居母之位齊杖之制皆如親母柳文曾子不取丨丨出妻終身丨丨其子元請焉曾子曰髙宗以後妻殺孝已尹吉甫以後妻放伯奇吾上不及髙宗中不及吉甫庸非其免於非乎家語孝已見逐殷王中宗之子曰丨丨事親一夜五起中宗用後妻言逐之大舜浚井舜父瞽叟盲舜母死瞽叟更娶妻而生象象傲瞽叟愛後妻子常欲殺舜史記父母使舜完廩捐階瞽叟焚廩使浚井出從而揜之象曰謨盖都君咸我績孟萬章伯奇踐霜丨丨尹吉甫之子吉甫惑於後妻虐伯奇無衣無履而使丨丨挽車伯奇順父之令不敢有辭韓愈著履霜操謂尹吉甫子無罪為後母譛而逐自傷作云父兮兒寒母兮兒饑兒罪當苔逐兒何為兒在中野以宿以處四無人聲誰與兒語兒寒何衣兒飢何食兒行於野履霜以跡母生衆兒有母憐之獨無母憐兒寧不悲蘆花代絮閔子騫為後母所苦冬月以丨丨衣之以丨丨父知之欲出後母子騫曰母在一子單母去三子寒遂止孝子傳蒲麻紵衣晉王延後母以丨丨與延丨丨姑問之不言夏扇枕席冬以身温母愛魚求不得杖之流血延叩凌而哭忽有一魚長五尺出水上延以進母食之積日不盡於是撫之如已子假蜂進讒尹吉甫子伯奇事後母至孝母取蜂去毒繫於衣上伯奇前欲去之母便大呼曰伯奇牽我吉甫見疑伯奇自死列女傳敝衣出譛崔衍父倫繼母李不慈倫使吐蕃歸李丨丨以見問故曰衍不吾給倫怒召衍將祖而鞭之衍涕泣無所陳倫弟敖趍白衍所廩舉送夫人所尚何云倫悟由是譛無入逐子出外薛包字孟常後母憎包分出之包日夜號泣逐不能去被打不得已廬於舍外旦入而洒掃父怒又逐之乃廬於里門晨夜不廢歳餘父母慙而還之後六年服喪過乎哀戚訟子於公安重榮拜成德軍節度有夫婦丨其丨不孝重榮拔劒授其父使自殺之父泣曰不忍也其母從旁詬罵奪其劒而逐之問之乃繼母也重榮叱其母出從後射殺之五代史織屨給子翟方進年十二三失父辭後母至京師母憐其幼隨至長安丨丨以丨方進後十餘年至宰相母尚在調藥飲子程文矩妻穆姜有二男而前妻冇四子以母非所生憎毁日積而穆姜撫字益隆衣食皆兼倍所生文矩卒或謂母曰四子不孝何不分母曰方以義導之使善及前妻子興遇病困母親調藥餌恩情篤密久乃瘳謂三弟曰繼母慈仁我曹過深矣遂將三弟詣南鄭獄陳母之徳狀已之過乞就刑縣言於郡郡表異其母蠲徭遣四子許以脩革出妻自養見後出妻類蒸棃叱狗下注埋子終孝郭道事繼母至孝家貧産子憂不能字謂其妻曰傷慈以終孝吾無恨也遂葬之襄子野志畧奉事甚謹柳公綽事後母薛謹甚雖姻屬不知非薛所生奉事至孝後漢胡廣年八十心力克壯為太傅繼母在堂朝夕省膳傍無几杖言不稱老母卒居喪盡禮三年被毒逾謹後漢馮衍子豹年十二後母惡之因夜行毒而豹敬事逾謹遭誣不怨閻纘後母誣纘盜父時金訟於有司被清議所棄十年無怨色孝謹不怠母意解乃移中正復品天寒卧冰王祥性至孝繼母朱氏不慈數譛之由是失愛於父其母嘗欲得生魚時天寒冰凍祥解衣将剖冰求之氷忽自解雙鯉躍出又思黄雀炙有數鳥飛入幕中庭有丹奈母令守之風雨抱樹而泣井涸禱泉唐宋思禮事繼母孝㑹大旱丨丨母羸疾非泉水不通口思禮憂且丨忽有丨出諸庭味甘寒日不乏汲託疾勸母楊厚字仲植母與前妻子搏不相安厚年九歳思令和親乃丨丨不言不食母知其旨懼然後改意恩養加篤流涕諫母王祥弟覽母朱氏遇祥無道覽數歳見祥被撻輙丨丨抱持及長每丨丨少止祥漸有時􅀢朱深疾欲酖􅖤覽知取酒祥亦爭之不與朱遽翻之後每食覽必嘗之朱意乃止母多偏愛凡庸之性後夫多寵前夫之孤後妻又虐前妻之子非惟婦人懐嫉妬之情丈夫有沉惑之僻亦事勢使之然也前夫之孤不敢與我子爭家提擕鞠養積習生愛故寵之前妻之子每居已生之上宦學昏嫁莫不為防焉故虐之異姓寵則父母被怨繼親虐則兄弟為讎家有此者皆門户之禍也顔氏家訓終不再娶吉甫賢父也伯竒孝子也以賢父御孝子合得終於天性而後妻間之伯竒遂放曾參婦死謂其子曰吾不及吉甫汝不及伯竒王駿喪妻亦謂人曰我不及曾參子不如華元並終身不娶此等足以為誡其後假繼慘虐孤遺離間骨肉傷心腸斷者何可勝數謹之哉謹之哉同上伯叔母世母叔母父之兄妻為丨丨父之弟妻為丨丨爾雅孝事伯母羊祜年十五而孤事伯母蔡氏以孝聞三十國春秋幼依叔母宋謝瞻幼孤叔母撫育有㤙同於至親伯母授經薛播早孤丨丨林通經史善屬文丨丨諸子及播兄弟叔母勸學晉皇甫謐字士安年二十不好學游蕩得𤓰果與叔母任氏曰三牲之養無慰我心昔孟母三徙終身篤學對之流涕謐乃感激帶經而農所生母尋訪得母司農少卿朱壽昌方在襁褓而所生母被出及長仕於四方孜孜丨丨不逮治平中官至正郎矣或傳其母嫁為關中民妻壽昌即棄官入關中丨丨於陜州士大夫嘉其孝節多以歌詩美之蘇子瞻為作詩序且譏激世人之不養者李定見其序大惋恨東軒筆録詩見前母子類後不肯持服蔡延慶所生母已亡不為服久矣聞李定不服所生母為臺所評乃乞追服則知蠏匡蟬緌不獨成人之弟也是時有朱壽昌其所生母三歳拾去長大刺血冩經誓畢生尋訪凡五十年乃得之奉養三年而亡壽昌至毁馬善人惡人相去乃爾逺耶東坡志林庶母不以為姒聲伯之母不聘穆姜曰吾丨丨妾丨丨也左傳雖賤必貴姑布子卿見無恤曰此真將軍也簡子曰此母賤翟婢也子卿日天之所授丨丨丨丨史屈節為妾周顗母李氏字絡秀顗父為安東将軍求絡秀為妾父兄不許絡秀曰門户殄瘁何惜一女子遂與之生顗及嵩謨嘗曰我丨丨丨汝家丨加禮延賔陶侃母湛氏初侃父母聘為妄生侃陶氏貧賤母紡績資之番陽孝廉范逵㝢宿於侃時大雪湛氏乃徹所卧新薦自剉女給其馬又密截髻供饌逵歎曰非此母不生此子列進饌於客裴秀母賤嫡母宣氏不之禮秀叔父徽有盛名賔客甚衆秀年十餘歳有詣徽者出則過秀宣氏使其母丨丨丨丨見者皆起秀母曰㣲賤如此應為小兒故也宣氏知之乃止時人為之語曰後進領袖有裴秀致酒於客崔道固為宋諸王叅軍被遣青州募人長史以下並詣道固道諸兄等逼其所生自丨丨炙丨丨前道固驚起謂人曰家無人力老親自執劬勞諸客皆知其兄所作咸拜其母母謂道固曰我賤不足以報貴汝宜答拜諸客皆歎美道固母子而賤其諸兄南史母即姑婢阮孚之丨丨丨丨也詳見婢妾類巳無外家王符傳安定俗鄙庶孽而符無外家為鄉人所賤隱居著書以譏當世得失又欲章顯其名故號潜夫論乳母乳母犯事漢武帝丨丨嘗於外丨丨帝欲申憲乳母求救東方朔朔曰此非脣舌所爭耳必望濟者将去時但當屢顧帝慎勿言此或可萬一兾耳乳母繼至朔亦侍側因謂曰汝癡耳帝豈復憶汝乳哺時㤙耶帝雖材雄心忍亦深有情戀乃悽然愍之即免罪韓晉公淅西觀察有乳母通求外事公欲殺之密求顧况管救况詣公問之公曰天下皆知某守禮法乳母先犯之况曰公幼時早起夜卧即要乳母今為侯伯乳母焉用哉誠宜殺也公遽捨之史遺乳母被殺見妬婦類注韓氏乳母乳母李氏徐州人號正真為韓氏家乳其兒愈愈生未再周月孤失怙恃李氏憐不忍棄去視保益謹遂老韓氏及見其所乳兒愈舉進土第歴佐汴徐州入朝為御史國子博士尚書都官員外郎河南令娶婦生二男五女時節受慶賀愈輒率婦孫列拜進夀年六十四病卒卒三日葬河南縣十五里愈率婦孫視窆封且刻其語于石納諸墓為銘矣墓銘蘇氏乳母趙郡蘇軾子瞻之乳母任氏名採蓮蜀之眉山人父遂母李氏事先夫人三十有五年工巧勤儉至老不衰乳亡姊八娘與軾養視軾之子邁迨過皆有恩勞從軾官於杭密徐湖謫于黄元豐三年八月壬寅卒于黄之臨臯亭享年七十有二十月壬午葬于黄之東阜黄南縣之北銘曰生有以養之不必其子也死有以葬之不必其里也我祭其從與享之其魂氣無所不之也墓志銘慈母保母以貴父命慈母如母傳曰妾之無子者妾子之無母者父命妾曰女以為子命子曰女以為母若是則生養之終其身如母死則喪之三年如母貴父之命也喪服皆居子室異為孺子室於宫中擇於諸母與可者必求其寛裕慈惠温良恭敬而内寡言者使為子師其次為慈母其次為保母丨丨丨丨則為慈母服昔者魯昭公少喪其母有慈母良及其死也欲喪之有司以聞曰古之慈母無服今君為之服是逆古典公不忍為之練冠自昭公始也銘保母墓先夫人之妾楊氏名金蟬眉山人年三十始隸蘇氏頽然順善也為弟轍子由保母年六十八熙寧十年六月己丑卒葬於徐州屬纊不亂子由官於宋載其柩殯於開元寺後八年軾自黄遷汝過宋葬之於宋東南三里廣夀院之西實元豐八年二月壬子也銘曰百世之後陵谷易位知其為蘇子之保母尚勿毁也東坡出母出母無服為父後者為丨丨丨丨云不敢以私喪廢宗祀之禮禮出母不喪子上之母死而不喪門人問諸子思曰昔者子之先君子喪丨丨乎子思曰為伋也妻者是為白也母不為伋也妻者是不為白也母故孔氏之不喪出母自子思始也莫慰母心凱風美孝子也衛之淫風流行雖有七子之母猶不能安其室故美七子能盡其孝道以慰其母心詩曰凱風自南吹彼棘薪有子七人丨丨丨丨不增母思吳駱統字公緒母改適為華歆小妻統時八歳遂與親客歸㑹稽其母送之拜辭上車面西不顧母泣於後御者曰夫人猶泣統曰丨欲丨丨丨乃不顧也古今合璧事類備要前集卷二十五
