body:
  text: 古今合璧事類備要後集卷六十六宋謝維新撰監司門總監司此條所編與前奉使刺史皆可通用厯代沿革書肇十有二州州十有二牧禹别九州有九牧周禮八命作牧史記黃帝置左右監于萬國職官分紀秦置監察御史漢興省之至惠帝遣御史監三輔郡察事凡九條其後諸州復置監察御史文帝以御史不奉法乃遣丞相史出刺并督察御史武事帝元封五年初置部刺史掌奉詔條察州以六條問秩六百石十二州員十二人居部九歲舉為守相成帝以為刺史位下大夫而臨二千石輕重不相凖乃更為州牧秩真二千石位次九卿哀帝復為刺史元夀復牧後漢光武復刺史乘𫝊周行郡國録囚徒考殿最舊制州牧奏二千石事皆先下三公三公遣掾吏按驗然後黜退光武用法明察不復委三府故權歸舉刺之吏靈帝改為牧是時天下大亂豪傑各欲據州郡州牧之任自此重矣魏晉為刺史持節都督庶姓為單車刺史後魏州置三刺史其後隨時沿革互有不同隋開皇三年罷郡以州統縣自是刺史之名存而職廢後雖有刺史皆太守之互名非舊刺史之職理一郡而已煬帝大業罷州置郡置司𨽻臺大夫一人巡察畿內刺史十四人巡察畿外唐罷郡置州改太守為刺史而雍州置牧神龍二年分天下為十道置巡察使二十人以左右臺內外官堅明清徑者為之景雲改置按察使開元中改置採訪處置使至德之後改採訪使為觀察并領都團練治於所部之大郡國朝監司有轉運使副判官使之按察官吏又有提㸃刑獄有武臣同提刑又有提舉常平茶鹽司轉運置於乾德判官置於開寶使副置於太平興國提刑置於淳化四年省景祐復置天聖六年罷八年置治平罷之逮置於熙寧職遂不廢提舉常平置於熙寧元祐罷繼而隨罷隨復提舉茶鹽置於宣和紹興罷之既而或置或廢至紹興五年常平茶鹽併為一司而後提舉之職定矣事類諏度六轡如絲如濡沃若載馳載驅周爰咨謀咨丨咨丨咨詢詩將明肅肅王命仲山甫丨之邦國若否仲山甫明之同上按部古者通守與刺史丨丨從宜務簡今則合之故任日崇選日重非亷平簡直兼愷悌之德者曾不足以中吾選焉晏類要表率漢何武曰刺史古之方伯上所委任一州丨丨也使指宣其丨丨司馬相如𫝊外臺陳頵曰刺史銜命國之丨丨又謝夷吾荆州刺史第五倫薦之曰尋功簡能為外臺之表聼聲察實為九伯之冠叱馭王尊事見後注巡部後漢之制乘𫝊周行四方秋分丨行所丨録囚徒考殿最亷使韋長任膺丨丨時長為觀察使續通典亷鎮厯居丨丨崔鉉制中憲宜得良帥俾之澄清操郡印而握兵符假左貂而持丨丨晏類要蕩節事見奉使門鼓樓李崇為并州州舊多劫盜崇乃村置一樓遂樓懸一鼓盜發擊之俄頃之間聲布百里多擒獲丨丨自崇始驛騎並使車也六帖真刺史賈逵豫州刺史奏二千石阿縱不法者帝曰丨丨丨也布告天下以豫州為法王獨坐王閔為冀州刺史不畏強禦號曰丨丨丨奉詔條刺舉州事丨丨丨察州漢元帝督郡國丨奏丨丨表漢朱博奏彰有德黃霸揚州刺史治有績宣帝賜車蓋特高一丈以丨丨丨舉不法見前真刺史注分刺諸州位居牧伯丨丨丨丨漢百官表分郡督察丨馳丨國丨丨在位其敷以言録見囚徒漢官解記歲盡奏事漢制部刺史每丨丨則入丨丨於京師何武𫝊歲盡上計凡郡掌治民進賢勸功决訟檢姦常以春行所至縣勸民農桑振救乏絶秋冬遣無害吏案訊問諸囚平其罪法論課殿最丨丨遣吏丨丨司馬彪注史記范睢𫝊云明書户口觀察刺史交代之時丨丨所交丨丨如能增至千户即與超遷如逃亡至七百戶罷晏類要載宣帝即位赦文部録囚徒見前巡部下注行郡國節前終軍事見刺史門為本州榮畢終敬父子相代丨丨丨當世丨之銀印青綬丨丨丨丨漢官表銅印墨綬丨丨丨丨晉官表少府出節丨丨丨丨漢書朱軒就路見奉使門朱軒下注牧伯分刺位居丨丨丨丨諸侯漢百官表牧嶽持綱堯置州丨四丨丨而丨之立有德有能者參而維之運時率指屈伸把握莫不統率桞文正符論决遣如神朱博兾州刺史博本武吏不更文法行部吏民數百遮道自言從事欲以觀試博博丨丨丨丨吏民大驚察條應繩胡廣曰所丨有丨丨丨墨有輒覆問類要百姓歌德郭賀字喬卿荆州刺史有殊政丨丨丨曰厥丨仁明郭喬卿中正朝廷上下平顯宗賜以三公之服黼黻冕旒敇行部去襜帷使百姓見其容服以彰有德百城竦震賈琮兾州刺史之部言曰刺史惟逺聼廣視糾察美惡何有反垂帷裳以自掩塞乎乃命御者褰帷丨丨聞風丨丨其贓過者望風解印綬去我有二天見刺史門行部甘雨百里嵩為徐州刺史境遭旱嵩丨丨𫝊車所往丨丨即注元禮四龍李丨丨祖父修安帝時生子亮叔訓秀號丨丨皆為牧守東觀漢記荀羡年少晉丨丨為徐州刺史時丨二十中興方伯未有如羡丨者覽觀風俗見奉使門分馳督察事見前注張綱埋輪見奉使埋輪注范滂攬轡見奉使攬轡注楊秉清儉後漢丨丨雅素丨丨為刺史二千石計日受俸祿不入私門家室貧寠併日而食髙肇清能丨丨所蒞五州皆以丨丨著稱當時號良刺史同上李恂清約丨丨為兖州刺史丨丨率下席羊皮卧布被東觀漢記徐邈清白丨丨遷凉州刺史皎然丨丨胡質清高晉丨威父丨為荆州刺史威自京師定省父賜絹一匹威曰大人丨丨何得此絹質曰吾俸祿之餘也以為汝行糧受之拜歸行部去帷見前百姓歌德注賈父來晚後賈琮字孟堅交趾屯兵反執刺史及合浦太守靈帝以琮為交州刺史琮到部刺其反狀咸言賦斂過重告寃無所遂為盜賊琮即移書告示各使安業里巷歌曰丨丨丨丨使我先反今見清平吏不敢犯吏民請留种嵩遷凉州刺史甚得百姓歡心被召還丨丨老少詣闕丨丨一年分紀山濤搜才丨濤為冀州刺史州舊無人士自濤居此州丨賢求丨旌命所加三十餘人皆顯名當世冀州之士於是為盛王隱晉書彥夏接士華􅯷字丨丨厯江州刺史甚有威惠州之豪士以友道丨丨甚得江表之歡臧榮緒晉書皇甫賑饑丨丨嵩遷冀州牧奏請一年租以丨丨百姓歌曰天下亂兮市為墟母不任子兮妻失夫賴得皇甫兮復安居續漢書喬元開廩晉丨丨字公祖徙守州刺史年飢元開倉以給之主者以舊典宜先表聞元曰方待奏報民且死丨丨訖乃上聞天子嘉之庾亮談詠晉丨丨鎮武昌諸佐吏殷浩乘月登南樓俄而亮至便據胡床與浩等丨丨劉𢎞手書丨丨遷荆州刺史每有興廢丨丨叮嚀欵密莫不感悅咸曰得劉公一紙書賢於十部從事晉陽秋恩化大行魏太祖以劉頵遷揚州刺史頵單馬到合淝建立州治安集之數年中丨丨丨丨百姓越江山而歸者以萬數於是立學校廣屯田興芍陂七門吳塘以溉稻官民有利魏志威嚴震竦張康遷益州刺史正厲丨丨表善徵惡所部肅然莫不丨丨吳録化行如神崔徴少有竒操為益州刺史丨丨丨丨吳志斷决如流荀晞道練於官事為兖州刺史案簿盈積丨丨丨丨人不敢欺州人去思司馬郎字伯逺為兖州刺史政化大行百姓思之吳人襁負晉羊祜為荆州刺史恩施均洽民不疲勞丨丨丨丨而至者萬數童兒騎馬郭伋字細侯遷并州牧前任并州素結思德及後入界始至行部到西河有丨丨數百各丨竹丨於道路男女出迎始興王淡字僧逺為荆州刺史曹無留事獄無滯囚還朝人歌曰始興王人之父赴民急如水火時復來乳哺我重臨荆州丨丨丨境丨者萬餘人宋書父子相代見前為本州榮下注兄弟並任夏侯逵為南豫州刺史兄亶先經此任並有恩惠百姓歌曰我之有州頻得夏侯前兄後弟布政優優召為大農事見後在州二十年注舉為守相漢武帝時刺史九歲丨丨丨丨職源桴鼓不鳴邢邵除西兖州刺史有善政丨丨丨丨吏人姦伏守令長短無不知也分紀動搖山嶽唐韋思謙曰御史出使不能丨丨丨丨為不任職本州衣繡張既字德容雍州刺史太祖曰君還丨丨可謂丨丨晝行也州人歌政見前兄弟並任下注重授并州梁習字子虞迂并州刺史邉境咸安文帝即位以習有譽并土丨丨丨丨為天下最三臨徐州王懿字仲德為徐州刺史丨丨丨丨威惠宣著在州二十年梁習為并州刺史政治常為天下最太初二年召為大司農習丨丨丨丨丨無方面珍物明帝異之禮賜甚厚在鎮十餘年晉桓宣為梁州刺史丨丨丨丨丨綏撫故舊甚得稱譽五郡三州牧杜熊之延年之子也厯丨丨二千石而丨丨丨刺史有能名晏類備要黜陟察風俗唐德宗遣丨丨使十一人行天下陸贄言使者請以五術丨丨丨御史察風俗唐則天光宅元年遣丨丨丨丨丨舉按八條可行國朝湯思退為相言元祐宰臣司馬光所陳丨丨官吏丨丨詳密丨丨今欲立舉薦四條一曰仁惠二曰公直三曰明敏四曰亷謹按察四條一曰苛酷二曰校佞三曰昏懦四曰貪縱凡監司州軍皆得以此八條舉按從之貪贓望風解去富弼薦楊絃為河東轉運絃常言不法之人不可貸如使縱丨丨於一郡一邑害良民千萬家不若去之不利一家耳聞者丨丨丨丨或及期不敢之官然竟坐苛刻下遷安民要擇監司紹興七年上謂宰執曰丨丨之丨無過丨丨丨可令侍從公舉中書置籍朕亦書之屏風置諸左右議獄必𫝊經典彭汝礪字器資公為監司務大體不事細苛而於丨丨丨丨丨丨故在京西多所全宥言行録得人則一路安紹興十七年上曰監司朝廷耳目之官今天下無事恤民為先丨丨丨丨丨丨丨不可不擇之也不才則一筆勾范文正公為參政取班簿視丨丨監司每見一人姓名丨丨丨丨之以次更易富公曰十二丈則是一録筆勾焉知一家哭矣公曰一家哭何如一路哭耶言行限日條便民事乾道九年命監司各丨丨丨丨丨之丨件以聞為牧當先正事高陽王雍為湘州刺史雍曰丨丨之道亦難亦易其身正不令而行故曰是易其身不正雖令不從故曰是難分記頗務深刻號三虎慶厯中漕司楊絃王綽提刑王鼎丨丨丨丨丨江東丨丨監司耳目號四瞪仁宗時儂智髙執孔宗旦欲任以事宗旦叱賊大罵遂被害宗旦始官江東與李道徐尚同等四人為丨丨丨丨丨丨丨人多憚之為部使者十二任蔣之竒丨丨丨丨丨丨丨所至以治辨稱詩集玉節青絲纜丨丨居分陜金貂總上流麾軍時舉扇作賦且登樓年光遍原隰春色滿汀洲日華三翼舸風轉七星斿向解丨丨丨將移丹桂丹梁元帝别荆州吏民詩皇華御史雄南紀西江闊丨丨丨丨丨截流寧假楫挂席自生風孟浩然和李侍御詩南來兩使星玉節丨丨丨丨丨埋輪折檻有家聲不嫌齊榜名為黨去國當時一葉輕張于湖和張伸欽詩入奏行繡衣丨丨丨丨丨春當霄漢立杜詩古今合壁事類備要後集卷六十六
