舊俗必用服翫相賀朕今各賀君飛白扇二枚庶動清風以增美德唐書要置酒太原國朝太宗征太原行次澶淵有太僕寺丞宋㨗者掌出納行在軍儲迎謁道左太宗見其姓名喜以為我師有必㨗之兆車駕將至令語攻城諸将曰我端午日當丨丨髙會於丨丨城中至癸未繼先降迺五月五日也國朝事實端午誕生田文母五月五日生文父今勿舉母私舉文長以實告之遂啓父曰不舉五月子何也父曰生及户損父文曰受命於天豈受命於户若受命於户何不髙其户誰能至其户耶父知其賢後封孟嘗君俗以五月為惡月故忌異苑唐崔信明五月五日生日方中有異雀鳴集庭柱太史令史良占曰五日為火火主離離為文日中文之盛也雀五色而鳴此兒將以文顯本傳王鎮惡以五月五日生家人欲棄之其祖猛曰昔孟嘗君以此日生卒得相齊此兒必興吾宗以鎮惡名之宋畧王鳳以五月五日生其父欲不舉曰俗諺舉此日子長及户則自害否則害其父母其叔父曰昔田文亦以此日生非不祥也遂舉之西京雜記胡廣本姓黄以五月五日生父母惡之藏之葫蘆棄之河流岸側居人收養及長有盛名父母欲取之廣以為背其所生則害義背其所養則忘恩兩無所歸託葫蘆而生也乃姓胡名廣後登三司有中庸之號小説端午溺死屈原以五月五日投汨羅而死楚人哀之每至此日以竹筒貯米投水祭之續齊諧記漢建武中長沙歐囘白日忽見一人自稱三閭大夫謂曰君常見祭甚善但常所遺苦蛟龍所竊今若有惠可以楝樹葉塞其上仍以五采絲縛之此二物蛟龍所憚也囘依其言世人作粽并帶五色絲及楝葉皆汨羅之遺風也又孝女曹娥者會稽上虞人父盱能弦歌為巫祝漢安二年五月五日於縣江泝濤迎婆娑神溺死不得屍骸娥年十四乃沿江號哭晝夜不絶聲旬有七日遂投江而死三日後與父屍俱出東漢列女傳詩集弔原節分端午候誰言萬古傳聞為屈原堪笑楚江空浩浩不能洗得直臣寃文秀孟君此日鍾英氣王鳳今朝襲源五色呈祥文必顯丙時先誕位非尊蘭湯備浴傳荆俗水馬浮江弔屈魂因笑唐家公主騃預令馳驛剪祗洹黄朝英愍楚身隨綵絲繫心與昌歜苦水餅旣懐鄉飯筒仍丨丨東坡細葛宮衣亦有名端午被恩榮丨丨含風軟香羅疊雪輕自天題處濕當暑著未清意内稱長短終身荷聖情杜甫長絲丨丨表良節金縷應佳辰結廬同楚客採艾異詩人折花競鮮綵試露染芳津含嬌起斜盼歛笑動㣲嚬獻璫依洛浦懐佩似江濱出梁王筠詩浴蘭佳辰共喜沐蘭湯毒冷何須採艾禳但得臯陶調鼎鼐自然灾沴變休祥歐陽上皇帝閣帖子金縷黄龍扇蘭芽翠釜湯王禹玉菖酒朝觴滿蘭湯曉浴温章簡公詩鬬草共丨今朝勝盈䄡百丨香歐詩又章簡公云五蓂開瑞莢百草鬬香苕又云五日㸔花憐並蒂今朝丨丨得宜男艾人王沂公帖子仙艾垂門綠靈絲遶戸長又云百靈扶繡户不假丨為丨章簡公帖子云丨葉成丨後榴花結子初艾虎王沂公帖子釵頭丨丨辟羣邪曉駕祥雲七寶車章簡公云花隂轉午清風細玉燕釵頭丨丨新綵絲歐詩五色雙絲獻女功多因荆楚記遺風又云繡繭誇新巧縈絲喜續年章簡公皇帝閣帖云清曉會披香朱絲續命長一絲増一嵗萬縷獻君王又云繭館初成長命縷珠囊仍帶辟兵繒欒城帖子云飲食祈君千萬壽良辰更上辟兵繒角黍歐詩楚國因讒逐屈原終身無復入君門願因角黍詢遺俗可鑒前王惑巧言張文潜端五詞云水團氷浸砂糖裹透明角黍松兒和刻蒲王沂公帖子云明朝知是天中節旋丨菖丨要辟邪傳粽王沂公皇后閤帖云爭丨九子丨皇祚續千春章簡公帖云九子黏筩玉粽香五絲縈臂寶符光章簡公帖子菖華泛酒堯樽綠菰葉縈絲楚粽香天師艾蘇子由太妃閣帖子太醫爭獻丨丨丨瑞霧長縈堯母門以上並嵗時記赤靈符王沂公夫人閣帖子欲謝君恩却無語心前笑指丨丨丨章簡公帖子云自有百神長侍衛不應須佩丨丨丨歐陽公云五兵消以徳何用丨丨丨章簡公帖子云桃印敞金扉鳴環蠒館歸又云赤符神印穿金縷團扇鮫綃畫鳳文魏牧詩云辟兵書鬼字神印題靈文碎兵已佩靈符小續命仍縈綵縷長千嵗節忠臣諒節今千嵗孝女孤風滿四方東坡三年艾願儲醫國丨丨丨不作沉湘九辯人同上玉壺氷王岐公皇后閣子帖云禁幕無風日正亭侍臣初賜丨丨丨不知翠輦遊何處應在樓臺第一層江心鑑唐世五月五日揚州於江心鑄鏡以進故國朝翰苑撰端午帖子詞多用其事然遣詞命意工拙不同王禹玉云紫閣曈曨隱曉霞瑶墀九節薦菖華何時又進丨丨丨試興君王卻衆邪李邦直云艾葉成人後榴花結子初江心新得鏡龍瑞䕶仙居趙彦若云揚子江中方鑄鏡未央宮裏更飛符菱花欲共朱靈合驅盡神姦又得無又揚子江中百鍊金寶奩疑是月華沉淨如聖后無私鑑明照人間萬善心又丨丨百鍊青銅鑑架上雙紉翠縷衣李士美云何須百鍊丨自勝五兵符傅墨卿云百鍊鑑從江上鑄五時花向帳前施許仲元云江中今日成龍鑑苑外多年廢鷺陂合照乾坤共作鏡放生江海盡為池蘇子由云揚子江中寫龍鏡波如細穀不揺風宮中驚捧秋天月長照人間助至公夫槩如此唯東坡不然曰講餘交翟轉回廊如覺深宮夏日長揚子江心空百鍊只將無逸監興亡其光輝氣燄可敬而仰也若白樂天諷諌百鍊鏡篇云江心波上舟中鑄五月五日日午正背有九五飛天龍人人呼為天子鏡又云太宗嘗以人為鏡監古監今不監容乃知天子别有鏡不是揚州百鍊銅用意正與坡合予亦嘗有一聨云願儲醫國三年艾不博江心百鍊銅然去之逺矣端午故事莫如楚人競渡之的盖以其非吉祥不可施諸祝頌故必用鏡事云客齋隨筆競渡曲沅江五月平堤流邑人相將浮綵舟靈均何年歌已矣哀謡振楫從此起楊枹擊節雷闐闐亂流齊進聲轟然蛟龍得雨鬐鬛動螮蝀飲河形影聨刺史臨流寒翠幃揭竿命爵分雄雌先鳴餘勇爭鼓舞末至銜枚顔色沮勝負本自有前期一飛由来無定所風俗如狂重此時縱觀雲委江之酒綵旗夾岸照蛟室羅韈凌波呈水嬉曲終人散空愁暮招屈亭前水東注劉禹錫競渡歌五月五日天清明楊花繞江啼曉鶯使君未出郡齋外江上早聞齊和聲使君出時皆有準馬前已被紅旗引兩岸羅衣撲鼻香銀釵照日如霜刃鼓聲三下紅旗開兩龍躍出浮水来棹影斡波飛萬劒鼓聲劈浪鳴千雷鼓聲漸急標将近兩龍望標目如瞬波上人呼霹靂驚竿頭綵掛虹霓暈前船搶水已得標後船失却空揮橈瘡眉血首爭不定輸岸一朋心似燒只將輸嬴定功賞兩岸十舟互来徃須臾戯罷各東西競脱文身請書上吾今細觀競渡兒何殊當路權相持不思得所各休去會到摧舟折檝時文苑英華飛鳥棹競渡傳風俗旁觀亦壯哉棹爭飛鳥疾標奪彩龍囘江影渾翻錦歡聲逺震雷輕生一餉樂時序宻相催郭功父治鳬車南方競渡者丨其舟使輕利謂之飛丨又曰水丨又曰水馬州將及土人悉臨水而觀之盖越人以舟為車以檝為馬古詩云蘭湯備浴傳荆俗水馬浮江吊屈魂又章簡公端午帖云絲竹漸髙橈鼔急瑶津亭下競鳬車荆楚嵗時記夏至事類景風夏至丨丨用事京房易占夏至丨丨至蟬始鳴螳蜋生易通卦驗離氣夏至日中赤氣出直丨此正丨也通卦驗三至夏至有三義一以明陽氣之至極二以明隂氣之始至丨以見日行之北丨三禮義宗八風夏至則丨丨之序立萬物之性成前魏相傳極近日道北至東井去北丨丨夏至至於東井此近極故晷短立八尺之表而晷景長尺五寸八分前天文志景短日道歛北去極彌近其丨彌丨近短乃極夏乃至焉漢律厯志日永丨丨星火以正仲夏注夏至之日火蒼龍之中星書堯典隂生夏至一丨丨是隂動用而陽復於靜也復卦疏伯趙鳴伯趙氏司至者也注丨丨伯勞也以夏至丨冬至止左傳昭七年蒼龍見見上日永注候玉律殿中丨用丨丨十二推二至乃候後律厯志刋陽木柞氏夏至丨丨丨而火之垂土炭光至三日丨丨丨於衡兩端輕重適均夏至日隂氣至則土重史天官書寢兵鼓夏至丨丨丨身欲寕志欲靜故不聽事蔡邕獨斷著五綵夏至丨丨丨辟兵題曰游光厲鬼知其名者無瘟疾風俗通陳八音天子常以至日合八能之士丨丨丨聽樂均度占晷景候鍾律權土炭放隂陽夏至隂氣應則樂均調景短極㽔賓中土炭重而衡低後律厯志禮地示大司樂凡樂夏至日於澤中之方丘奏之若樂之八變則地示皆出可得而禮矣禮春官施命令君以夏至之日丨丨丨止四方行者所以助㣲隂也魯恭云伏日隂陽書云夏至後第三庚為初伏第四庚中伏立秋後初庚末伏事類元陽三伏焦暑丨丨重授輕颷不扇纎雲不覆王彪之賦徂暑三伏相仍丨丨肜肜上無纎雲下無㣲風夏侯湛賦金藏伏者何也丨氣伏丨之日也四時代謝皆以相生立春木代水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏於火故至庚日必伏庚者金故也厯忌釋隂伏六月伏日周時無至此乃有之師古曰伏者謂丨氣將起迫於殘陽而未得升故為藏丨因名伏日漢郊祀志酤酪牧羊丨丨以候伏臘之費潘安仁賊炮羔田家作苦嵗時伏臘烹羊丨丨斗酒自勞而呼烏烏楊惲傳薦麥𤓰初伏丨丨丨于祖禰崔寔月令進湯餅伏日丨丨丨名為辟惡荆楚嵗時記作伏祠秦德公二年初丨丨丨社磔狗四門以禦蠱災則祠社用伏日諸侯年表令伏閉後漢和帝永元六年初丨丨丨盡日注漢官舊儀曰伏日萬鬼行故盡日閉不干它事本紀祠黄石前漢張良得黄石於濟北榖城山下後死并葬黄石每伏日丨丨丨本傳封功臣前漢髙祖論功定封每擇伏日本紀賜從官肉伏日丨丨丨丨太官日晏不来東方朔獨拔劍割肉謂同官曰伏日當蚤歸請受賜即懐肉去太官奏之朔入上問之朔免冠謝曰朔来受賜不待詔何無禮也拔劍割肉壹何壯也割之不多又何廉也歸遺細君又何仁也上笑曰使先生自責乃反自譽復賜酒一石肉百斤本傳率賓僚飲魏正始中鄭公慤三伏之隙丨丨丨避暑取荷葉盛酒以簮刺葉令與大柄通屈莖輪囷如象鼻傳噏之名碧筩杯雜爼劉松袁紹以盛夏三伏之際晝夜酣丨以避一時之暑故河朔有避署飲魏文帝典畧琢冰圍席楊氏子弟每至伏中取大氷使匠琢成山周圍於宴帝間座右雖酒酣而各有寒色亦有挾纊者其驕貴如此又以氷鏤鳳獸之狀以送王公家氷以藥固之可數日不消潰天寳遺事交扇流汗郄嘉賓三伏之月詣謝公炎暑重赫雖復當風丨丨猶沾丨丨漓謝著故綃衣食熱白粥晏然無異劉義慶世説詩集驕陽三伏適已過丨丨化為霖欲歸瀼西宅阻此江浦深杜詩畏景南越逢初伏東林越一朝曲池煎卜丨髙閣絶㣲颷王言史詩懐河陽南陸迎修景朱明送末垂初伏啓新節隆暑方赫曦朝想慶雲興夕遲白日移揮汗辭中宇登城臨清池涼風自逺集輕衫隨風吹露圃曜華果通衢列髙椅潘岳嗤褦襶平生三伏時道路無行車閉門避暑卧出入不相過今世褦襶子觸熱到人家主人聞客来嚬蹙奈此何揺扇臂中疼流汗正滂沲傳戒諸髙明熱行宜見訶程覽古今合璧事類備要前集卷十六
