body:
  text: 古今合璧事類備要前集卷十六宋謝維新撰節序門中和節事類三令節唐德宗欲以二月名節李泌請以二月朔為中和節遂詔備丨丨丨時數唐書鄴侯家傳并上匕重陽謂之丨丨丨天正節二月一日為丨丨丨道書祭勾芒村社作中和酒丨丨丨神以祈年榖至今行之廣記賜勲戚唐德宗以中和日丨大臣方鎮丨丨尺謂之裁度鄴侯家傳上春服王公戚里丨丨丨士庶刀尺相問遺唐記獻生子民間以青囊盛百榖𤓰果種相遺號為丨丨丨里閭醸酒謂宜春酒鄴侯家傳進農書德宗令百官丨丨丨獻穜稑之種以示務本廣記作樂詩王襄使褒丨中和丨職丨王褒傳詩集宫詞殿前来日中和節連夜瓊林散舞衣傳報所司分蠟燭監開金鎖放人歸王建春分事類東震震者東方也主春分日出青氣出丨丨此正氣也易通卦驗南極老人一星曰丨丨以春分之夕沒于丁晉天文志中氣春分二月丨丨晝夜五十刻符天纂圖同道日月之行分丨丨也注日夜等故曰丨丨左傳昭二十一年朝日天子常以春分丨丨于東郊禮典瑞注書雲凡分至必丨丨物為備故也左僖五年辨雲保章氏以五雲之物丨吉凶注二分二至觀丨色青為蟲白為喪赤為兵黑為水黄為豐禮逆暑籥章晝擊土鼔吹幽詩以丨丨同上朱雀見日中星鳥注日中春分之日鳥南方丨丨春分之昏星鳥畢丨書堯典元鳥司丨丨氏丨分者也注元鳥燕也以春分来秋分去左昭十二年蟄蟲動日夜分雷乃發聲始電丨丨咸丨啓户始出月令鶗鴂鳴鶗鴂鳥名關西曰巧婦關東曰丨丨春分丨則衆芳生秋分鳴衆芳歇唐韻書夜等一年分為四時時皆九十餘日春之半秋之半丨長短與丨丨晝夜中分百刻故春秋之半稱春秋分左僖五年疏度量同日夜分則同度量鈞衡石角斗角正權槪月今社日事類報功社土地之主故封土為社以丨丨孝經緯反始社供粢盛所以報本丨丨也記郊特牲方壇厚地間靈丨丨崇祀建以風露樹之松梓勾萌旣申芟柞伊始恭祈粢盛孝膺休祉出隋牛𢎞社歌靈主於惟太社官名后土是曰勾龍功著上古德配帝皇實為丨丨克明播殖農政曰柱尊以作稷豐年是與義與社同方神此宇曹植社頌立壇先王建社之制遂蓺樹丨丨湛方生盟文設壝周封人掌丨王之社丨為畿封而樹之禮松栢哀公問社於宰我對曰夏后氏以松殷人以栢周人以栗枌榆髙祖初起禱豐丨丨社四年詔御史治丨丨社春以羊彘祠之通典郊祀志粉榆鄉名結宗社日四鄰並丨丨會社嵗時記授土天子大社以五色土為壇封諸侯者取方面土苴以白茅授之各以其方色以立社於其國故謂之丨茅丨漢舊事方色謂東青南赤之類也三祠後漢建武二年立大社於雒陽無屋有門墻而已二月八月反臘一嵗丨丨皆太牢二祀社實隂祗稷惟榖宗伯德方将時號共工厥有才子實曰勾龍陶唐救災決河疏江棄亦播殖作乂萬邦克配丨丨以報勲庸何承天社頌帗舞周舞師教丨丨帥而舞社稷之祭祀禮瓦罍周鬯人掌共秬鬯而飾之祀社用大罍注丨丨也禮主社神謹按禮傳共工之子曰修好逺遊舟車所至足迹所達靡不窮覽故祀以為社神風俗通共工氏有子曰勾龍能平水土故祀以為社左傳共工氏之霸九州也其子曰后土能平九州故祀以為社又厲山氏之有天下也其子柱能植五穀故祀以為稷禮記周棄播殖百穀以稷百穀之長因以稷名其神蔡邕獨斷祭社日社之在於世尚矣自天子至於庶人莫不咸用有漢卜日丙午魏氏擇用丁未至於大晉社則孟月日則酉日各因其行運三代固有不同雖共奉社而莫議社之所由興也説文云祈清道神為之社有事於道者吉凶偕名晉嵇含社賦序魏帝問何用未社丑臘王肅對曰魏土也土畏木丑之明日便寅寅木也魏以丑臘土成於未故於嵗始未社也魏臺訪議擇元日丨丨丨命民社注為春事興故祭之以祈農事謂近春分前後戊日元吉也禮記月令卜来嵗社之日涖丨丨丨之稼禮載芟春祈丨丨丨籍田而丨社稷也毛詩良耜秋報丨丨丨丨社稷也同上里閈立社丨丨丨丨用洽鄉黨之歡出唐髙祖紀鄰里罷社魏王修七嵗母以社日亡来嵗修哭哀甚丨丨為之丨丨殺祭社猪張端為河南司錄府當祭社買豬已呈尹豬突入端㕔即殺之吏以白尹尹問端對曰按律豬無故夜入人家主人登時殺之勿論尹大笑為别市猪貢父詩話造秋社飯秋社以社餻秋酒相賫送貴戚宮院以猪羊肉腰子妳旁肚肺鴨餅𤓰薑之屬切作棊子片樣滋味調和鋪飯上謂之社飯人家婦女皆歸外家饋問即外舅姨舅皆以新葫蘆兒為遺俗云宜良外甥夢華錄陳平宰社里中社陳平為宰分肉甚均父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如是肉矣本傳方朔懐肉社日詔賜從官肉太官承㫖晏不来朔獨拔劍割肉謂其同官曰社日當早歸請受賜即懐肉去本傳漢以伏日為社又詳見伏門詩集樂神白布長衫紫領巾差科未動是閑人麥苗含穗桑生葚共向田頭丨社丨韓愈祈麥棠梨花開社酒濃南村北村鼔鼕鼕且丨丨熟得飽飯敢説穀賤復傷農陸務觀割肉千尋古櫟笑聲中此日春風屬社公開眼已憐花壓㡌放懐聊喜酒治聾擕刀丨丨餘風在下瓦傳神俚俗同聞説已栽桃李徑隔溪遥認淺深紅李伯時春社出郊九農成德業百祀發光輝報効神如在馨香舊不違南翁巴曲醉北鴈塞聲㣲尚想東方朔詼諧丨丨歸杜甫陳平亦分肉太史竟論功今日江南老他時渭北童歡娱看絶塞涕淚落秋風鵷鷺迴金闕誰憐病峽中同上燒錢社下丨丨鼓似雷日斜扶得醉人迴青枝滿地花狼籍知是兒孫鬭革来范至能田園雜興治聾社翁今日沒心情為乏丨丨酒一瓶惱亂玉堂將欲徧依稀巡到第三㕔李文公談錄吾為翰林學士月給内醖兵部李相濤好滑稽嘗因春社寄此詩盖俗傳社日酒喫丨耳丨兵部小字社翁每於班行呼其名字云海錄碎事扶醉鵝湖山下稻粱肥㹠穽雞棲對掩扉桑柘影斜春社散家家丨得丨人歸張濱村居鳴田鼓玉卵不吞龍嗜肉燕子成兒去華屋老櫪半黄田鼓鳴樹下宰平誰似玉茂陵常説泣秋風王母昔傳雙鬢綠東方伏日思早歸長饑不及侏儒腹豶豕新烹白醪熟奮衣地坐無拘束驪山夜寒坑底哭謾把漆書留冡竹梅聖俞和永叔飲靈壇隣雞未唱曉驂催又向靈壇飲酒囘自笑治聾知不足明年强健更重来王禹玉太社二祭多差近臣王禹玉在兩禁二十年熙寕間為翰林學士復被差遂題詩於齋宮云停針線庭前春鳥啄林鳴紅夾羅𥜗縫未成今朝社日丨丨丨起向朱櫻樹下行今社日婦女不用針線則知自唐已然矣張籍吳楚歌詞撤簠簋升壇預結禮詰早肅分司椒蘭卒清酌簠簋撤香箕李叔逺載牲牢憶昨夾鍾之呂初吹灰社公禮罷元侯迴車丨丨丨甕舁酒並召賓客延鄒枚韓和張十一宴雞豚願為同社人雞豚丨春秋韓愈盍簪共結丨丨社一笑相從萬事休簡齋祝神釐農畝懐嵗功壺漿丨丨丨晦翁嘗春酒田家遭社日邀我丨丨丨出杜甫社甕爾来嘗出杜牧楓林社丨丨丨日鼔茅屋午時雞劉夢得社翁雨幾㸃丨丨丨一畨花信風陸龜䝉俗云社公社母不食舊水故社日必有雨謂之丨丨丨杜詩云社雨報年豐寒食事類禁煙冬至後一百五日有疾風甚雨謂之寒食介子推三月五日為火所焚國人哀之每嵗春暮為不舉火謂之丨丨犯之則雨雹傷田嵗時記斷火丨丨三日謂冬至後一百四日一百五日一百六日也嵗時記冷節齊人呼寒食為丨丨又曰熟食又曰禁煙杜詩注冷食并州俗為子推斷火丨丨乾粥三日鄴中記墓祭唐開元勅寒食上墓禮經無文近代相傳寖以成俗宜許上墓同拜掃禮食柳宗元書近世禮重拜掃今已闕者四年矣每遇寒則北向長號以首頓地想田野道路士女遍滿皂𨽻庸丐皆得上父母邱壠即馬醫夏畦之鬼無不受子孫追養者野祭寒食丨丨而焚紙錢五代後周序折柳江淮間寒食日家家丨丨挿門並同上繡草寒食賜侍臣帖繡綵毬丨丨宣臺盧氏雜記畫鴨寒食日俗皆丨丨子以相餉鄴中記鬬雞此節城市多丨丨之戯玉燭寶典麥酪寒食三日為醴酪又煑粳米及丨為丨擣杏仁煑作粥鄴中記棗糕寒食以麵為蒸餅様團棗附之名曰丨丨藝苑雌黄彩毬寒食賜麥粥帖丨丨鏤雞子鞦韆北方戎狄至寒食為丨丨戯以習輕趫後中國女子學之乃以綵繩懸木立架士女坐立其上推引之謂之丨丨或曰本山戎之戯自齊威公北伐山戎此戯始傳中國一云作千秋字本出漢宫祝壽詞後世誤倒讀為秋千耳古今藝術圖湼槃經謂之罥索嵗時記天寶宮中至寒食節競築丨丨令宫嬪輩嬉笑以為樂帝常呼為半仙之戯遺事酴醿酒寒食内宴宰相賜丨丨丨盧氏雜記桃花粥寒食裝百花輿煑丨丨丨金門嵗節杏酪餳今人煑麥粥研丨仁為丨以丨沃之玉燭寶典青精飯楊桐葉細冬青居人遇寒食採其葉染飯色青而有光食之資陽氣道家謂之丨丨乾石飢音信丨陶隱居登真隱訣有太祖真人青精乾石飢飯法又云取南燭草木葉煑汁漬米炊又名黒飯祭子推辭孫楚祭子推云黍飯一盤醴酪一盂清泉甘水充君之厨今寒食有杏酪麥粥即其類也嵗時記置子推書周舉遷并州刺史初太原一郡舊俗以介子推焚骸有龍忌之禁至其月咸言神靈不樂舉火一月寒食莫敢煙㸑嵗多死者舉到州作弔書置子推之廟言盛寒去火殘損民命非賢者意今則三日而已宣示愚民使還温食風俗頓革陸翽鄴中記周制禁火琴操晉文公與介子綏俱亡子綏割腓股以啖文公文公復國子綏獨無所得作龍蛇之歌而隱文公求之不肯出乃燔左右木子綏抱木而死文公哀之令人五月五日不得舉火及周舉移書魏武明罰令陸翽鄴中記並云寒食斷火起於子推琴操所云子綏即推也又云五月五日與今有異皆因流俗所傳按左傳及史記並無介子推被焚之事然周書司烜氏仲春以木鐸徇火禁於國中注云為季春将出火也今寒食凖節氣是仲春之末清明是三月之初然則禁火並周制也初學記魏禁絶火魏武帝明罰令曰聞太原上黨西河鴈門冬至後百有五日皆絶火食云為介子推且北方沍寒之地老少羸弱将有不堪之患今後人不得寒食若犯者家長半嵗刑主吏百日刑令長奪一月俸出本史為介子推劉向新序始云子推怨於無爵齒去而之介山之上文公待之不肯出以謂焚其山宜出遂不出而焚死先賢云太原舊俗以介子推焚骸一月寒食鄴中記云并州俗冬至後一百五日為子推斷火冷食三日雜記忌大火星龍星木之位也春屬東方心為大火懼火盛故禁火是以寒食有龍忌之禁則所謂禁煙又未必為子推設也丹陽集詩集宮詞初過寒食一百六店舍無烟宮樹緑念奴覔得又連催特勅宮中許燃燭元㣲之連昌宮詞鬼詩流水涓涓芹怒牙織烏雙飛客還家荒村無人作寒食殯宮空對棠梨花酉陽雜俎丘隴寒食家家出古城老人看屋少年行丨丨年年無舊道車徒散行入衰草牧童驅牛下塜頭畏有人家来洒掃逺人無墳水頭祭還引婦姑望鄉拜三日無火燒紙錢紙錢那得到黄泉但㸔隴上無新土此中白骨應無主王建郊原東風芳草長寒食春茫茫人家掩門去雞犬自相将原頭簇簇柳與花行人徃来長嘆嗟舊塜新塜纍纍是裂錢澆酒何人家桑上鳴鳩喚山雨雨脚蕭蕭山日暮歸来門巷正春寒花底殘紅落無數北里悲啼夜未休清弦脆管起南樓古今歌哭何時盡芳草白楊春復秋去年巧笑鞦韆女今年嫁作東家婦綵繩畫柱似當年只有朱顔不如故百人學僊無一成麻姑不見但聞名萬斛春醪須痛飲江邊漁父笑人醒張文潜都門二年寒食住京華寓目春風萬萬家金絡馬銜原上草玉釵人折