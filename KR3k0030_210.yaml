body:
  text: 古今合璧事類備要别集卷四宋謝維新撰宫室門城壁附堵郭雉郛堞壁埤堡隍壘池塹樓門櫓輿地提綱城為保民為之也城之制方丈曰堵三堵曰雉雉之長三丈而髙一丈也古者天子千雉公侯百雉伯七十雉子男五十雉天子周城諸侯軒城大都不過參國之一中五之一小九之一諸侯不得以僭天子大夫不得以擬諸侯其小大廣狹等級至嚴也然城上垣曰堞女牆曰埤樓曰麗譙下有門曰譙門望樓無覆屋曰櫓地外有池池無水曰隍其髙下深淺亦莫不各有稱也然城之小者曰堡或曰鄣曰壘有軍屯處曰壁外城曰郛曰郭皆就易設險亦不聞有他義也然强者攻弱者守困則圍敵則戰不得其道未見其可故公侯扞城在得人也衆心成城在得民也猶未也聖人以道德為城是又不在得人不在得民而在乎建道德以成安强也彼有北築長城西起臨洮東盡遼水非不欲以備胡也然而一旦禍發蕭牆之內以為天下大笑者伊又誰之咎哉事類為固城郭溝池以丨丨記禮運無壞丨俾城丨詩環攻三里之城七里之郭丨而丨之而不勝孟爭戰丨城以丨殺人盈城孟保民城以丨丨為之也民衆城小則益城榖梁盛民城者盛也所以丨受丨物也崔豹古今注鯀作丨丨城淮南子禹始丨丨作城强者攻弱者守敵者戰城郭自禹始博物志文築築城伊淢作豐伊匹淢城溝池築豐之城大小適與淢偶大於諸侯小於天子之制登登乃召司空乃召司徒俾立室家其繩則直束版以載作廟翼翼救之陾陾度之薨薨築之丨丨削屢馮馮百堵皆興鼛鼓弗勝乃立臯門臯門有伉乃立應門應門將將詩綿閣閣築室百堵西南其户約之丨丨椓之槖槖注約謂縮板椓謂築土又丨丨猶歷歷也槖槖用力也詩斯干城謳宋城華元為植巡功丨者丨曰晘其目皤其腹棄甲而復于思于思棄甲復來使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡左宣二鼓倡梁孝王廣睢陽城七十里注晉太康記云城方十三里梁孝王築之丨丨節杵而後下和之者稱睢陽曲今踵以為故今之樂家睢陽曲是其遺音漢梁孝王城朔方王命南仲丨彼丨丨詩采薇城東都周成王七年將營成周居洛邑使召公先相宅三月周公至洛興工築營謂之王城是為東都方千七百二十丈郛方十七里南繫于洛水北因于郟山以為天下之所凑制為郊甸方六百里因西土為千里分為百縣通鑑外紀京不度請京使居之謂之京城太叔祭仲曰都城過百雉國之害也今丨丨丨非制也君將不堪左隱元年梁不處丨伯好土功亟城而丨丨罷而不堪則曰某冦將至遂溝公宮左逼陽固晉荀偃請伐丨丨荀罃曰城小而丨勝之不武弗勝為笑固請圍之弗克左襄十年渠丘惡丨丨城丨衆潰奔莒曰城已惡曰其孰以我為虞左成九子囊城楚囊瓦城郢沈尹戍也曰茍不能衛城無益由于城楚王使丨丨丨麋復命子西問髙厚大小不知子西責之對不能王遇盜雲中余受其戈袒而示之背曰此余所能也城為陷杞梁死其妻哭之丨丨之丨白氏帖城不沒智伯攻趙圍晉陽而灌之丨丨丨者三板沈竈産蛙民無叛意通鑑周威烈王紀取旗以登隱十一年公㑹齊鄭伐許庚辰傅于許潁考叔丨鄭伯之丨蝥弧丨先丨子都自下射之顛瑕叔盈又以蝥弧登周麾而呼曰君登矣鄭師畢登遂入許注傅於許城左縣布而上襄十年諸侯圍逼陽主人丨丨堇父登之及堞而絶之隊則又縣之蘇丨復丨者三主人辭焉乃退帶其斷以徇於軍三日注逼陽人縣布以試城外勇者同上方城為城楚國丨丨以丨丨左僖四年華山為城秦踐丨為城賈誼過秦論沙不可築魏祖征馬超每度渭為超騎所突營不得立又多丨丨丨丨城婁子伯說公曰今天寒可起沙為城以水灌之從之一夜而成白氏六帖土惡亟壞牛僧孺帝欲於鄂州置武昌節度使鄂城丨丨丨丨比嵗增築賦表茅於民吏倚為擾僧孺陶甓以城五年畢鄂人無復嵗費駢筮其名髙丨徙劒南西川節度成都城嵗壞駢易以磚甓陴堞完新負城丘陵悉墾平之以便農桑訖功丨之得大畜駢曰畜者養也濟以剛健篤實輝光日新吉孰大焉文宜去下存上因名大𤣥城章圖以獻王使陳章城衢州工畢以圖獻王視西門樟樹密謂左右曰此樹不入城章終非我畜其後章果叛備史築長連城開寶二年二月上駐蹕潞州壬辰發潞州戍戌次太原庚子觀兵於城南始命丨丨丨丨長編築青澗城种世衡知延州青丨丨世衡言于范仲淹請營故寬州州西南直延安二百里當賊衝右捍延安左可致河東粟北可圖銀夏仲淹為請于朝詔世衡即廢壘興築虜屢出爭世衡且戰且城城成賜名丨丨世衡改秩主之長編西占隴坻本朝慶厯三年陜西四路經略安撫招討使鄭戬言順德軍生户大王家族元寧以水洛城來獻其地丨丨丨丨通秦州往來道路隴之二水環城西流繞帶河渭田肥沃廣數百里雜氐十餘落無所役屬尋遣靜邊寨主劉浥招集其酋長皆願納子質求補漢官今若就其地築城可得畨兵三五萬及弓箭手共捍西賊實為封疆之利從之後城成終賴其利長編南臨定河徐禧與沈括等計議乃言銀州故城雖據明堂川無定河之㑹而城東南已為河水所吞其西北又阻天塹實不如永樂之形勢險要已定議自永樂堞聲塔平移而右堡烏延至長城嶺置六寨自背圍良乜孟乜羅韋囉泊川至布娘堡置六堡塞之大者城圍九百步小者五百步一寨用工略十三萬餘堡之大者城圍三百步小者百步一堡用工略萬三千其非九百步之寨三百步之堡所能包盡地勢處則隨宜增展朝廷是其議即日報可徐禧李舜舉沈括李稷等將步騎四萬及諸路役兵城永樂凡十四日城成永樂與米脂綏德俱在無定河中永樂北倚山丨丨無丨丨三面俱絶崖地勢險要敵騎數來爭之俱敗去後其城竟陷沒於敵同上賊必復來康定元年八月延州都監周美言于范仲淹曰丨新得志其勢丨丨丨金明當邊衝我之蔽也今不亟全將遂失之仲淹因屬美復城如故數日賊果來美領衆力戰㑹募援兵不至乃徙軍山北多設疑兵賊以為救至引去遂募禁兵築萬安城而還長編冦果不爭慶厯四年十月宣撫使范仲淹議築古細腰城於是檄知環州种世衡與知原州蔣階共幹其事世衡即起兵㑹階于細腰使甲士晝夜築城先遣人以計欵丨丨丨丨又召三族酋長犒之諭以官築此城為汝禦冦三族既出不意又亡賊援因遂服從同上修盱眙城嘉定十二年十月丨丨丨軍丨築興元城嘉定十二年十二月丨丨丨丨堵方丈丨丨為堵左隱元年注五板丨丨而堵公羊十一年雉三堵丨丨為雉長三丈髙一丈左隱元注五堵丨丨而雉百雉而城公羊十一年九雉城隅之有丨丨以為都城之制禮考工記百雉見前注又邑無丨丨之城公羊定十一年千雉天子丨丨伯七十雉子男五十雉公羊注萬雉建金城丨丨又金墉鬱其丨丨班固西都賦雉相望韓晃遷浙江東西觀察使聞京都未平築石頭五城自京口抵天山毁上元道佛祠四十區修塢壁起建業抵京峴樓丨丨丨白孔六帖堞聮堞崔神基拜并州長史初州隔汾為東西二城神慶跨水丨丨合而一之省防禦兵嵗數千云建堞王方翼遷肅州刺史州無隄塹冦易以攻方翼乃發卒丨樓丨厮多樂水自環烽邏精明陴隍守陴宣十二年春楚子圍鄭旬有七日鄭人卜行成不吉卜臨于大宮且巷出車吉國人大臨丨丨者皆哭楚子退師鄭人修城進復圍之三月克之注陴城上僻倪皆哭所以告楚窮也左登陴晉伯宗夏陽說衛孫良夫寧相鄭人伊雒之戎陸渾蠻氏侵宋以其辭㑹也師千針衛人不保說欲襲衛曰雖不可入多俘而歸有罪不及死伯宗曰不可衛唯信晉故師在其郊而不設備若襲之是棄信也雖多衛俘而晉無信何以求諸侯乃止師還衛人丨丨左成六年繕隍張建封進濠夀廬觀察使是時四方尚多故丨陴丨增陴顔真卿為平原太守安祿山逆狀未萌真卿度必反陽託霖雨增陴浚隍浚隍曹華宋州楚丘人吳少誠叛留守王翃署華襄城戍將華丨丨陴堞日與賊搏數禽馘池溝池見前湯池金城丨丨孔帖伊淢築城丨丨詩下武實壑溥彼韓城燕師所完云云實墉丨丨詩韓奕河為池秦踐華為城因丨丨丨賈誼過秦論漢為池楚國方城以為城丨水以丨丨左命修城池建炎元年七月丙辰下詔暫於淮甸駐蹕應接四方稍定即還京闕仍命知楊州呂頤浩修城池出聖政浚築城池沈清臣上言陛下志在尅復先為備邉之計經理荆襄兩淮以固吾圉凡丨丨丨丨增修關險教閲民兵興置屯田蓋無所不盡其至出奏議樓櫓無覆屋露上丨丨丨曰櫓說文作髙土邊方備胡冦丨丨丨櫓櫓上作桔橰桔橰頭兜零以薪草置其中常低之有冦即火然舉之以相告漢書文穎注設譙櫓丨一門為丨丨櫓城上守禦樓唐馬燧傳郛郭入宋郛鄭人以王師㑹邾伐宋丨其丨城西郛襄十九年丨丨丨懼齊也注魯西郭城成郛襄十五年季孫宿叔孫豹帥師丨丨丨注備齊故夏城治城郭馬援所過輒為州縣丨丨丨築城郭羅立言宜州人改武陽令以治劇遷河隂立言始丨丨丨地所當者皆豪富大賈所占下令使自築其處吏籍其闊狹號於衆曰有不如約為我更完民憚其嚴數旬畢民無田者不知有役壁張耳壁漢髙祖北渡河宿小修武自稱使者晨馳入丨丨韓信丨而奪之軍乃使張耳北收兵趙地漢髙紀韓信壁漢王還至定陶馳入齊王信壁奪其軍同上開壁而擊韓信從間道望趙軍戒曰趙見我走必空壁逐我若疾入拔趙幟立漢幟乃使萬人先行出背水陳趙軍望見大笑平旦信建大將旗鼓鼓行出井陘口趙開壁擊之大戰良久信耳棄鼓旗走水上軍軍皆殊死戰不可敗趙軍已不能得信耳欲歸壁壁皆漢赤幟大驚遂亂遁走於是漢兵夾擊破虜趙軍斬成安君泜水上擒趙王歇韓信傳深壁而守吳楚反亞夫㑹兵滎陽吳方攻梁梁急請救亞夫引兵東北走昌邑丨丨丨丨梁主使使請亞夫亞夫守便宜不往梁上書言景帝景帝詔使救梁亞夫不奉詔堅壁不出而使輕騎兵弓髙侯等絶吳楚兵後食道吳楚兵乏糧飢欲退數挑戰終不出夜軍中驚內相攻擊擾亂至於帳下亞夫堅卧不起頃之復定吳奔壁東南陬亞夫使備西北已而其精兵果奔西北不得入吳楚既餓乃引而去亞夫出精兵追擊大破吳王濞前漢周亞夫傳堡據堡自守太宗帥精騎擊宋金剛大敗斬首三千級金剛輕騎走出民追之數十里至張難堡樊伯通張德政丨丨丨丨世民免胄示之軍中喜譟且泣築堡以餉李齊運拜京兆尹時李晟壁渭橋齊運發民丨城丨督芻粟丨丨晟白孔六帖壘為壘黃帝以兵師丨營丨史記因壘文王聞崇德亂而伐之軍三旬而不降退修教而復伐之丨丨而降注復往攻之備不改前而崇自服左僖十九徇齊壘齊髙固入晉師桀石以投人禽之而乘之車繫桑木焉以丨丨丨曰欲勇者賈余餘勇左成十二年摩晉壘楚許伯御樂伯攝叔為右以致晉師許伯曰吾聞致師者御靡旌摩壘而還行其所聞而復注摩近也左宣十二年深溝髙壘韓信張耳以兵下井陘口擊趙成安君聞之李左車說曰信耳乘勝逺鬭願足下假臣竒兵從間道絶其輜重足下丨丨丨丨勿與戰彼前不得鬭退不得還兩將之頭可致麾下漢髙帝紀背水為壘諸葛亮至郿軍於渭水之南司馬懿引軍度渭丨丨丨丨而拒之伺知壘處馬仙陴在邊常單身入敵境丨丨壁丨嶮要丨所攻戰多捷通鑑梁武紀宜閉壘待羅睺挑戰太宗堅壁不出曰賊恃勝而驕丨丨丨以丨之通鑑唐髙紀塹入壁深塹楚擊漢軍漢王復丨丨丨丨而守漢髙紀負土填塹太宗自將討髙麗至遼東城下見士卒丨丨丨丨上分其尤重者於馬上持之及克以其城為遼州通鑑唐太宗紀城門壁門士文帝自勞軍至細栁軍士吏被甲鋭兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門丨丨丨謂車騎曰將軍約軍中不得馳驅於是天子乃按轡徐行至營中將軍亞夫揖曰介胄之士不拜請以軍禮見天子為動改容式車使人稱謝皇帝敬勞將軍成禮而去既出軍門羣臣皆驚文帝曰嗟乎此真將軍矣鄉者霸上棘門如兒戲耳其將固可襲而虜也至於亞夫可得而犯邪漢周勃傳中門候後漢郅惲君章為上東門候帝常獵遇夜方駕還惲拒關不開帝乃回從中東門入賜惲布貶丨東丨丨後郅惲傳栁宗元小石城山記自西山道口徑北踰黃茅嶺而下有二道其一西出尋之無所得其一少北而東不過四十丈土斷而川分有積石橫當其垠其上為睥睨梁欐之形其旁出堡塢有若門焉窺之正黑投以小石洞然有水聲其響之激越良久乃已環之可上望甚逺無土壤而生嘉樹美箭益竒而堅其疏數偃仰類智者所設施也噫吾疑造物者之有無久矣及是愈以為誠有又怪其不為之於中州而列在夷狄更千百年不得一售其技是固勞而無用神者儻不宜如是則其果無乎或曰以慰夫賢而辱於此者或曰其氣之靈不為偉人而獨為是物故楚之南少人而多石是二者余未信之華翠微北征讜議夫兵有萬機係乎一將人有四體係乎一心一將不謀則萬機皆失一心不安則四體皆病故三蜀之地人心在關京淮之地人心在城合數十州而為蜀固非一朝可破也然一關茍失則三蜀之民皆無自存之心總數百里而為城固非一夕可虜也然一穴可攻則三軍之衆皆無自守之策此無他人心之所恃者在關與城關之與城既不足恃毋怪其傍徨而無計也二廣之心在於嶺二江之心在於江一夫越嶺則全廣之民皆憂惶而不可禁一舟渡江則江南之民皆潰散而不可止此無他人心之所恃者在嶺與江嶺之與江既不足恃無怪其束手以就擒也故善用兵者必先守其心而不失其所恃焉斯為善守之策矣故古人之用兵不以地為難取而以地為難守不以城為難拔而以城為難據得敵之城而復陷於敵若未害也然敵人之再得則必怒其城中之人前日敢於降我而逞其殲滅之威則他日未下之城豈不為後日計哉强則進取弱則棄去此非素有之物奚足恤也然敵人之既奪則必懲其將帥民旅前日之敢於叛已而極其殺戮之暴則其餘未降之邑豈不為他日計哉此一郡之失則百郡無敢降之心前車之顛則後車有覆轍之戒况夫淮北之地城外平坦無屋可居無營可守賊若突至城下嚴兵拒關不得與戰伺其夜而將卧則密遣一軍邀其腹背遇賊整兵則沿門復反而不與之鬬逮其卸甲偃息則又出一軍以震之由是自昏至曉無時而息則賊軍夜不得以偃卧矣伺其曉而將炊則密遣一軍突其營壘遇賊覺知則挨門復入而不與之戰逮其卷甲釋兵則又出一軍以鼓之由是自曉而午自午而暮無時而已則賊軍盡不得以飲食矣伺其馬之飢而刈草芻於逺所也吾復引兵小出别門以襲其虛則賊兵不能棄營出刈而賊之馬餒矣俟其馬之渴而求飲汲於他澗也吾復引兵急出他道以窺其後則賊兵不能控馬逺飲而賊之馬渴矣吾之兵更出更入而出入不時則賊之兵日夜驚惶而進退無策吾之門或開或闔而開闔不常則賊之兵首尾相結而去留無計欲侵掠於逺郊則懼吾兵之急乘其隙欲奮死於一戰則遇安吾兵之不應其鋒風則飄揚砂石糝塞眼目而賊兵不於曠蕩之場雨則淹淹廬舍漂灑肌膚而賊兵不便於泥塗之地熱則日烘胸背而連宵不睡之卒恍然如醉而手足不能以自舉寒則冰結鬚眉而數日不食之兵僵焉如仆魂魄不能以自全外則驚其糧饋而不使通內則謹其烽燧而不與校近則旬逺則一月至其人倦馬疲晝驚夜畏然後出吾輕鋭之師衝其要徑强徑之弩伏其歸道敵雖聖智亦不戰而成擒矣守城之祕法三十六其要則曰種柴曰貼城曰招箭曰虛幟曰暗塹曰透火曰備灌曰倒揵曰截徑曰密戈曰漏窟曰合洞曰門棧曰歇􅀢之屬最為緊切而今未之設也攻城之祕法四十二而其要則曰流星曰反炮曰透窟曰灌水曰聚沙曰堰板曰飛橋曰灑毒曰採鴿曰風藥曰流火曰去糧之屬最為緊切而今未之曉也吾今盡其所謂守城之法而尤備其所謂攻城之法故勝在我而敗常在敵巧在已而拙常在人然是法之外必求城外通衢可容賊騎往來者為伏筌之法法用批竹成鎗煉之以火埋鎗於地絆之以藤馬足受絆則藤急鎗出而自中其胸臆矣此伏筌也復求吾城外小徑可通賊人出入者為暗穽之法法用掘地成穽廣三寸深一尺破竹成鬚橫用兩圈縱立十刺入足受陷則腳出刺入而自中其脛腫矣此墮穽也恐賊夜至而窺我營寨也為觸網之法法用木樁一張竹檐七片貫樁擔而成弩制如獵具以之觸馬則線髙三尺五寸而馬首可穿以觸人則線髙四尺五寸而人首可貫弩機與一線相通觸線弩機自發賊人遇之必疑吾兵之夜伏而不敢及我矣此觸網也恐賊夜襲而驚我士卒也為伏虎之法法用樁六十枚橫木三十枚縛而為架制如曝竿縛羊三十羫於樁架之上曳鼓三十面於椿架之下羊足與鼓面相及羊怒則雙足擊鼓夜不絶聲賊人聞之必疑吾兵之夜出而不敢以近我矣此伏虎也營壁不堅恐其驚噪為反疑之法法用啞炮藥線炬火鬼燈各穿貫於硫黃焰硝紙撚之上計夜時刻為線短長先用白衣撑立如人數枚置近炬火遇燒藥然至炬火照見白色之衣宛如人立兼啞炮鬼燈之類相間而發賊人見之將謂吾兵暗伏而自遁去矣此反疑也道路阻隘恐為盜劫為逺更之法法用響捧幫子銅鑼隊鼓四件各置撞棰於近水去處立一水車隨水運轉車上安棰或密或疏遇車轉則棰棒自打亦用白衣撑立如有人物木枝隂暗如有庵舍置近金鼓兼響棒幫子之屬相間而發賊人聞之將謂吾軍潜伏而退去矣此逺更也白穽之法內安竹筌鐵針皂角刺之屬上則掩以沙土而隨其地之顔色使賊人止知其為沙土之地而不覺足陷此白穽也青穽之法內亦安竹筌鐵針皂角刺之屬上則掩以麻麥草芥隨其物之種類彼賊人知其為麻麥草芥之地而不覺足陷此青穽也馬拖之法絆索於道繫鎗於索索出於地鎗掩以土遇馬足被絆而走則索尾之鎗悉自戳其腿腹矣此馬拖也馬筒之法掘地一尺口闊三寸內置四鎌中分四旁遇馬足被陷而拔則筒口之鎌悉自中其蹄甲矣此馬筒也若此之類不容遍舉如此則敵兵雖强何術之我加敵衆雖多何禍之能及我將反有以收其按營休士之功而掩覆乎敵人之所不及矣臣故曰得地而反失其心者此也王荆公桂州新城記儂智髙反南方出入十有二州而十有二州州之守吏或死或不死而無一人能守其者豈其材皆不足歟蓋其城郭之不設兵甲之不戒雖有智勇猶不能勝一日之變也唯天子亦以為任其罪者非獨吏故特推恩褒廣死節而一切貸其失職於是遂推選士大夫所論以為能者付之經略而今尚書工部侍郎余公當廣西焉冦平之明年蠻越接和乃大城桂州其木甓瓦石之材以枚數之至四百萬有竒用人之力以工數之至二十餘萬凡所以守之具無一求而不給者焉以至和元年八月始作而以二年之六月成故其為役亦大矣蓋公之信於民也久而費之欲以衛其材勞之欲以休其力以故為是有大費與大勞而人莫或以為勤也古者君臣父子夫婦兄弟朋友之禮失則外裔橫而窺中國方是時中國非無城郭也卒於陵夷毁頓陷滅而不救然則城郭者先王有之而非所恃以為存也及至喟然覺悟興起舊政則城郭之修也又嘗不敢以為後蓋有其患而圖之無其具有其具而守之非其人有其人而治之非其法能以久存而無敗者皆未之聞也故文王之起也有四夷之難則城於朔方而以南仲宣王之起也有諸侯之患則城于東方而以仲山甫此二臣之德惙於其居於其為國之本末與其所先後可謂知之矣慮之以悄悄之勞而發之以赫赫之名乘之以翼翼之勤而續之以明明之功卒所以攘具夷狄而中國之安全者蓋其君臣如此而守衛之有其也今余公亦以文武之材當明天子承平日久欲補弊立廢之時鎮撫一方修扞其民其勤於今與周之南仲仲山甫蓋等矣是宜有記也故其將吏相與謀而來取文將鏤之城隅而以告後之人焉歐陽公築水洛城疏歐陽修言邊將不和用兵大患况狄青劉滬等皆可惜之人事體須要兩全利害最難處置且水洛城自曹瑋以來心知其利患於難得未暇經營今滬能得之則於滬之功不小於秦州之利極多韓琦自陕西來非以水洛為不便但恐難得而成今滬能得之又有以成之正宜責其必成而狄青所見不同遂成釁隙其間利害臣請詳之國家近年邊兵屢敗常患大將無權今若沮狄青而釋劉滬則不惟於青之意不足兼緣邊諸將皆挫其威此其不便一也劉滬經營水洛之初先以奮身力戰然後誘而服從乃是諸蕃族畏滬之威信今忽見滬先得罪帶枷入獄則新降生户豈不驚疑若使翻然復叛則自今邊將欲以威信招諸族誰肯聽從不惟水洛更無可城之期兼沿邊生户永無可招之理此其不便二也自陜西用兵諸將立事者少此城不惟自曹瑋以來未能得之亦聞韓琦在秦州當經營而未暇今滬奮然力取其功垂就而中道獲罪後誰肯於邊防立事者此其不便三也又聞水洛之戍雖能援秦州而須渭州芻糧之助今劉滬既與狄青異議縱使城得成他時狄青怒滬之異已又欲逆其偏見緩急不為之力則必須復失此其不便四也若遂移青於别路則是因一小將易一部署此其不便五也此臣所謂利害最難處置者也近遣魚周詢定奪利害臣謂宜命一中使令周詢密諭狄青曰滬城水洛非擅役衆蓋初有所稟且築城不比行師之際滬見利堅執意在城功不可以違節制加罪今不欲直釋滬以挫卿之威宜自釋之後若出師臨陳而違節制者自當以軍法從事然後又諭滬曰汝違大將令自合有罪今以汝城水洛有功故使青赦爾責爾卒事以自贖俟城成則又戒青不可幸其失城以遂偏見如此則水洛之利可固蕃户之恩信不失邊將立事者不懈大將之威不挫茍不如此未見其可也胡致堂澧州譙門記經世安民之道除其憂而後同其樂既其實而後修其文蓋心志不怡則鏘洋窈眇莫娛於聽聞氣血憊瘁則甘脆芳珍莫適於口體飢寒毒痛交切並至而有彼樂之思則封疆之界不足以域山溪之險不足以固而况於墉乎况於閈閎而扄關乎仁人君子推己及物必有本末先後之序矣古之為城也非曰必可恃也其為門也非曰必可犍也蓋亦立制度焉爾茍得民心雖畫地而守植表而限效死者莫肯去冒死者不能入不然崇城到天嚴扉重閉金鋪而銅鈕鐵扇而石樞無以固結民心至於內攜而外叛曽不若折栁之樊吾圃也故曰國之有城城之有門蓋亦立制度焉爾澧陽舊苦衆溪羡溢嵗築隄防之然後郊與市咸得奠厥居嵗在己酉北盜南騖有守者闕隄召水以自保賊既引去城亦隨陷他日立郡於荆榛瓦礫中遺黎百一喘焉茍活蓬户且未安而何暇議隄之復大水時至沈竈産蛙稚耊病之逾一紀太守羅侯下車訪民疾苦莫先斯事即帥百姓修壞補缺鄉者呻吟今者謳歌豫嘗過其境呼田夫逆旅而問焉往往他邦負耒耜願受一㕓而至者也侯之得此蓋有道矣乃作譙門狥民之欲闕內外謹闔開置壺箭以授時棲角鼓以警軍匠則庸工役則鳩兵材則斬浮屠氏之山泛㳂以來未幾告成而民不與焉侯嘗為髙郵曹椽不拜僣臣僞赦節義上聞即被褒擢及守是邦惠養凋瘵去其害惜其力不惑異端劚其間材歸夷物於公家舉墜典於蕃宣蓋忠君者必愛其民根諸良心必形諸仁術也春秋一門之廢興謹書于䇿謂夫不當為而為之今侯作門而豫乃記焉則見其識本末知先後遵制度非時絀而舉贏異乎屈宜臼之譏者是可傳已侯名薦可字養蒙南劍州沙縣人云詩集烏喧栖丨城上丨梁王筠雀集􅀈墉寒丨丨李白急暮砧白帝城髙丨丨丨杜甫橫强弩城髙鐵甕丨丨丨杜牧潤州詩春雲覆城上丨丨丨苑牆杜甫宿霧深孤城丨丨丨杜萬丈餘大城鐵不如小城丨丨丨杜千萬峰越絶孤城丨丨丨栁宗元烽櫓燔丨丨丨城隅杜更籌急城暗丨丨丨杜雲鳥埤華表丨丨丨杜遼鶴記丨丨丨城闉元稹代曲江老人古今合璧事類備要别集卷四
