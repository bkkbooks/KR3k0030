body:
  text: 古今合璧事類備要續集卷二十六宋謝維新撰類姓門邊隴西徵音古今姓纂子姓宋平公子邊之後以王父字為氏周有邊伯之田近於王宫平王取之事類五經笥漢邊韶字孝先為丨丨丨人詠之曰邊孝先腹便便懶讀書但欲眠宜髙任邊讓字文禮大將軍何進聞其才名召署令史進以禮見之讓善占射能辭對時賔客滿堂莫不羡其風蔡雍深敬之以為丨處丨丨後有邊延邊鳳為京兆尹有能名郡人語曰前有趙張三王丨丨丨丨二君延篤傳佛子菩薩五代邊鎬仕南唐初以都虞候從查文徽克建州凡所俘獲皆全之人謂之邊丨丨及克潭州市不易肆潭人謂之邊丨丨既而為節度使政無綱紀惟日設齋供盛修佛事潭人失望謂之邊和尚見通鑑扈京兆羽音古今姓纂夏有扈氏之後以國為姓風俗通趙有扈􅀈本朝有扈蒙事類闕燕始興羽音古今姓纂召公奭周同姓封燕傳國四十二代至王喜為秦所滅子孫以國為氏又南燕姞姓國亦為燕氏漢功臣宜城侯燕倉後漢中郎將燕瑗事類隂陽讖緯燕鳳字子章代人少好學博綜經史明習丨丨丨丨昭成素聞其名以禮致之拜左長史參決國事北史造車器漏皇朝燕肅字穆之青州人多巧思以創物大智聞天下嘗丨指南丨記里鼓二車及欹丨以獻又作蓮花丨世服其精肅所至刻石以記其法國史冀古今姓纂左傳冀國今晉州冀氏是也又晉大夫郤芮食采冀邑亦為冀氏事類善𨽻工寫儒林冀雋字僧雋性沈謹丨丨書特丨模丨周文引為記室北史郟武陵徵音古今姓纂周成王定鼎于郟鄏世以邑為姓焉事類闕浦京兆羽音古今姓纂闕事類闕尚京兆商音古今姓纂薑姓齊大公之後號太師尚父其支孫因氏焉後漢髙士尚長唐户部尚書尚衡生振總尚長之子又尚獻父衛州汲人又尚可孤東部鮮卑宇文之别種事類闕農雁門宫音古今姓纂闕事類闕溫平原商音古今姓纂唐叔虞之後晉公族受封河內之溫因以命氏又郤至食采于溫亦號溫季漢功臣表溫疥封㮮侯㮮音荀疥孫何始居太原事類世號六龍晉溫羡字長卿兄弟六人並知名於丨丨曰丨丨有棟梁任溫嶠字太真博學能屬文風儀秀整纍遷為中書令丨丨丨之丨是大才士溫子升字鵬舉博覽百家文章清婉常景曰溫生丨丨丨丨孝莊以為主客郎中文章陵顔轢謝含任吐沈北史皆卿相才唐溫大雅字彥𢎞并州祁人性至孝與弟彥博大有皆知名薛道衡見之歎曰三人者丨丨丨丨也髙祖兵興主文檄受禪討定儀典遷黃門侍郎而彥博為中書侍郎對管華近帝嘗曰我起晉陽為卿一門耳進止詳華溫彥博字大臨通書既警悟而辨善辭令每問四方風俗臚布誥命若成誦然丨丨丨丨人皆拭目觀書幣招禮溫造字簡輿性嗜書少所降屈不喜為吏隱王屋山人號其居曰處士墅張建封聞名丨丨丨丨及去造謝歸下邳慨然有髙世心復隱東都烏重胤奏致幕府開渠溉田出為朗州刺史丨後鄉丨百里丨丨二千頃民獲其利號右史渠膽落御史再召侍御史知彈奏李祐拜大金吾違詔進馬造正衙彈劾祐曰吾夜入蔡州擒吳元濟未嘗心動今日丨丨於溫丨丨並同上名號溫李溫庭筠彥博裔孫少敏悟工為辭章與李商隱皆有丨丨丨丨人謂溫寇皇朝溫仲舒字秉陽河南人有應務才與寇準同進丨丨之丨丨國史别京兆徵音古今姓纂闕事類闕莊天水徵音古今姓纂芊姓楚莊王之後以諡為姓楚有大儒莊生六國時為蒙漆園吏莊周著書號莊子齊有莊賈周有莊辛云事類為漆園吏莊子蒙人名周嘗丨丨丨丨其學無所不窺著書十餘萬言詆孔子之徒明老子之術終身不仕厭承明廬漢嚴助會稽吳人本姓莊回避漢諱後改曰嚴為會稽太守𢾗年不聞問賜書曰制詔會稽太守君丨丨丨之丨勞侍從之事還故土出為鄉吏久不聞問具以春秋對助恐上書願奉三年計最晏齊郡宫音古今姓纂左傳晏桓子名弱齊公族也生嬰字平仲晏父戎晏父釐並其族也漢司𨽻校尉晏稱南晏有晏漢事類可謂知禮曽子曰晏子丨丨丨丨也已恭敬之有焉記檀弓善交久敬晏平仲丨與人丨丨而丨之論語以其君顯管仲以其君霸晏子丨丨丨丨孟有道順命丨丨丨丨無道衡命蓋晏平仲之行也家語七嵗神童皇朝晏殊字同叔撫州臨川人也丨丨善屬文號丨丨景德初張知白安撫江西薦之得召試又試詩賦論殊自言臣嘗私習此賦不敢隱真宗異之乃試以它題以為祕書省正字置之祕閣使得悉觀祕閣書明年復獻所為文召試中書為集賢校理因雪設客殊性剛峻遇人以誠雖處富貴奉養如寒士樽酒相對歡如也當世賢士大夫如范仲淹孔道輔歐陽修等皆出其門其擇壻又得富弼楊察慶歷中為宰相官丨丨丨丨歐公預焉時西方用兵歐公有詩云可憐鐵甲冷徹骨四十餘萬屯邊兵次日諌官蔡襄論其事元獻坐是罷相公曰裴度亦曽邀文士飲韓退之但作詩云園林窮勝事鐘鼓樂清時幾曽合鬧如此同上柴平陽商音古今姓纂薑姓齊文公子髙後髙孫奚以王父字為氏十代孫髙柴仲尼弟子孫舉又以王父名為柴氏漢有棘蒲侯柴武裔孫文平陽柴文晉末為晉陽太守因家焉事類妻平陽公主唐柴紹字嗣昌晉州人唐髙祖丨以丨丨丨丨髙祖即位拜大將軍吐谷渾黨項寇邊敇紹討之尚魯國公主本朝柴宗慶字天祐丨太宗女丨丨長丨丨除左千牛衛將軍駙馬都尉瞿松陽徵音古今姓纂晉東海王越參軍瞿莊博陵人又王僧孺譜云河東裴桃兒娶蒼梧瞿寶女事類闕閻太原宫音古今姓纂周太王之胤武王封太伯曽孫虞仲於閻鄉因氏焉一云唐叔虞之後父族有食采於閻邑因氏焉晉有閻嘉又齊有閻職又榮陽狀始晉成公子懿食采於閻因氏焉事類立忠節閻溫字伯儉以涼州别駕守上邽令丨丨丨魏志博文典晉閻纘字續伯丨覽丨丨綏撫士卒閻慶字仁度善於丨丨能盡丨丨死力屢獲勳勞遷驃騎大將軍北史篆書草𨽻子毗丨丨丨丨為當時之妙同上年飢賑恤閻慶胤為敷城太守頻丨丨儉常以家粟千石丨丨貧窮人賴以濟馳譽丹青唐閻立本總章元年拜右相初太宗與侍臣泛舟春苑池見異鳥容與波上悅之詔坐者賦詩而召立本侔狀閣外傳呼畫師閻立本是時已為主爵郎中歸戒其子曰吾少讀書今獨以畫見名與厮役等若曹慎毋習時薑恪以戰功擢左相故時人有左相宣威沙漠右相丨丨丨丨之嘲充贊皇宫音古今姓纂急就章漢有充申仙人充尚之後見仙傳事類闕幕燉煌宫音古今姓纂風俗通舜祖幕支孫以王父字為氏見左傳事類闕連上黨徵音古今姓纂左傳齊大夫連稱之後馮翊白水縣有連氏事類瓜時請代齊侯使連稱管至父戍丨丨而往及瓜而代公問不至丨丨弗許左茹河內羽音古今姓纂河南官氏志普彌茹氏改為茹氏又蠕蠕入中國亦為茹氏事類勢傾天下茹法亮仕齊為中書通事舍人事武帝丨丨丨丨南史口稱詔敕茹法珍齊東昏時為制局監甚見愛幸丨丨丨丨習古今姓纂風俗通云習國名漢有習響為陳相事類才氣文筆晉習鑿齒字彥威襄陽人宗族盛富世為鄉豪少有丨丨以丨丨著稱桑門釋道安與之相見曰彌天釋道安鑿齒曰四海習鑿齒時人以為佳對才學父風習鑿齒子辟強丨丨有丨丨位至驃騎從事中郎官東陽商音古今姓纂闕事類闕艾天水商音古今姓纂晏子春秋齊大夫艾孔之後事類闕魚雁門羽音古今姓纂宋子魚之後子孫以王父氏為姓事類世為左師宋魚氏丨丨丨丨左傳宦者祭酒唐元載秉政用丨丨魚朝恩為丨丨容燉煌宫音古今姓纂春秋南容氏之後子孫以王父氏為姓事類闕向河南宫音書况反古今姓纂宋桓公子向父肹肹孫向戍為左師子孫氏焉向魋宋司馬向戌之曽孫向為人向寧向鄭向宜並其後也事類以靖國人宋向為人為大司空向帶為太宰華元使向戌為左師樂裔為司冦丨丨丨丨左傳侃然正色後漢向栩字甫興徵拜侍中每朝廷大事丨丨丨丨百官憚之八十校書蜀向朗字巨逹襄陽人潛心典籍年踰丨丨猶手自丨丨性行淑均向寵諸葛亮表曰將軍向寵丨丨丨丨曉暢軍事試用於昔先帝稱之曰能愚以為營中之事悉以咨之必能使行陳和睦優劣得所飛白書名皇朝向敏中字常之開封人太宗丨丨丨敏中張詠二丨付中書語宰相曰此二臣者名臣也朕將用之矣拜右諌議大夫同知樞密院事大耐官職真宗拜同平章事東封西祀皆留守京師天禧元年進左僕射真宗使人密覘之云敏中方謝客門闌悄然無一人真宗笑曰向敏中丨丨丨丨目為重德敏中諸子不使當事任雖處大事若已不與避逺賢勢謹於薦拔大任幾三十年時論丨丨丨丨薨諡文簡並同上古新安羽音與前詁姓通古今姓纂闕事類闕易太原徵音古今姓纂齊大夫易來之後魏有易愷晉有易雄左傳事類闕愼天水徵音即真姓古今姓纂戰國時有滑釐字慎子後以字為姓六國時有慎到漢有太尉長史真祐即去從心字以為真也本朝南渡後回避廟諱亦改從真如近世真德秀子景元始以博學宏詞終入參大政卒封文忠者是也今又不從心而從上從真以為慎者非事類闕戈臨海宫音古今姓纂夏時侯國為少康所滅因氏焉事類闕廖武成徵音古今姓纂風俗通古有廖叔安左傳作􅀈蓋其後也事類北郭先生後漢廖扶字文起汝南平興人習詩書教授常數百人尤明天文讖緯風角推步之術號為丨丨丨丨楚之良才魏廖立字公淵年未三十擢長沙太守諸葛亮曰廖立丨丨丨丨當贊興世業中丞名重皇朝廖剛字用中登崇寧進士第紹興九年詔為御史中丞時秦檜當國欲假臺諫之力斥逐異己者公先亦為相所薦及居言路侃然守正無所承望於是廖丨丨之丨丨於天下世綵集傳廖剛纍世以華髮奉養嘗名堂曰世綵諌議陳公播之聲詩緝之盈編宰相忠簡趙公方務推廣上孝愛之意遂以世綵集進奏上他日謂公曰觀丨丨丨誠人間美事也其書至今人間樂丨之庾齊郡羽音古今姓纂堯時掌庾大夫以官命氏至春秋時周有大夫庾皮皮子過邑于緱氏衛有庾公差事類處下徵君漢庾乘字世遊遊學為諸生傭後能講論自以卑第每丨丨坐諸生博士皆就讎問由是學中以下坐為貴後徵不起號丨丨胡床談詠晉庾亮字元規美姿容善談論出鎮武昌佐吏殷浩之徒秋夜登南樓亮至諸人將避亮曰老子於此處興復不淺便據丨丨與浩等丨丨競坐滅胡為任庾翼字稚恭少有經綸大略為都督鎮武昌戎政嚴明經略深逺雅有大志欲以丨丨丨已丨徙鎮襄陽綏來荒逺務盡招納之宜當世令器庾峻字山甫祖乘髙才退讓惟修德行伯父嶷蘇林曰尊伯為丨丨丨丨君兄弟復俊茂此尊祖積德之所由也為世儒宗庾純字謀甫博學有才義丨丨丨丨歷河南尹世號異行庾衮字叔褒事親以孝稱察孝廉舉秀才清白異行皆不降志丨丨之為丨丨淥水芙蓉庾杲之字景行劉勔見而竒之曰見卿足使江漢崇望杞梓發聲王儉用為長史蕭緬曰庾景行泛丨丨依丨丨何其麗也時人以入儉府為蓮花池並同上荆南杞梓庾域字司大梁文帝為郢州辟為主簿嘆美其才曰丨丨丨丨其在斯乎官以人清庾於陵字介拜太子洗馬梁武帝曰丨丨丨丨豈限甲族學士充選庾肩吾字慎之簡文開文德省置丨丨丨肩吾丨丨貞節處士庾詵字彥寶經史百家無不該綜性託夷簡特愛林泉諡丨丨丨丨號徐庾體北史庾信字子山博覽羣書為文綺麗世丨為丨丨丨徐謂徐摛後進競相模範文章辭令盛為鄴下所稱善五言詩庾自直隋授著作佐郎善屬文尤丨丨丨丨終南陽徵音古今姓纂陸終之後以王父字為氏又富父終生之後事類白麟竒木漢終軍字子雲濟南人年十八選為博士弟子太守聞其異材甚竒之與交結軍揖太守而去至長安上書武帝異其文拜為謁者上丨丨丨丨之對入關棄繻終軍丨丨丨丨請受長纓羈南越王年二十餘世謂之終童暨渤海宫音音決又音訖古今姓纂吳暨豔字子休吳郡人為選曹部至尚書唐天寶有暨晃弟昱暨佐時上元中準制改為周氏事類闕居雁門宫音古今姓纂晉大夫先且居之後以王父字為氏漢有來城侯居般事類闕衡平陽商音古今姓纂風俗通伊尹為湯阿衡子孫以衡為氏一云魯公子衡之後以王父字為氏事類闕步平陽羽音古今姓纂左傳晉大夫步楊之先食采於步因氏焉又有郤毅本郤氏仲尼弟子步叔乘齊人河南官氏志步鹿氏改為步氏事類當時英俊吳步隲字子山淮隂人遊吳中著聲名為丨丨丨丨德度規檢纍遷都督西陵在西陵二十年鄰敵敬其威信以丨丨丨丨見器當世同上都黎陽宫音古今姓纂吳興人姓苑云有臨淄侯都稽臨淄人也事類闕耿髙陽宫音古今姓纂殷時侯國為晉所滅因氏焉尚書祖乙圯于耿是也事類有志事成漢耿弇字伯昭扶風茂陵人自請收上谷兵定漁陽取涿郡軍攻張步以平齊地光武謂曰昔韓信破歷下以開基今將軍攻祝阿以發迹獨拔勍敵功難於信前建此大䇿常以為落落難合丨丨者丨競丨纍葉功名耿氏自中興以後大將軍二人將軍九人卿十三人尚公主三人列侯十九人中郎將護羌校尉及刺史二千石數十百人與漢興衰丨丨以丨丨自終同上度遼將軍耿秉字伯初國之子有偉體腰帶八圍博通書記能説司馬法尤好將帥之略拜丨丨丨丨胸奴懷其恩信及卒胸奴舉國號哭或至黎面流血願試治郡耿純字伯山巨鹿人光武時丨丨丨一丨盡力自效乃拜東郡太守盜賊清寧武將無前耿豪本名令貴少粗獷有武藝沙苑之戰血染甲裳盡赤周文歎曰令貴丨丨所向丨丨芒山之戰右手拔刀左手把矟北史滿河東宫音古今姓纂風俗通荆蠻有􅀢氏音舛變為滿氏漢有滿昌事類剛毅有謀魏滿寵字伯寧立志丨丨勇而丨丨後遷為太尉格度知名子偉字公衡以丨丨丨丨官至衛尉偉子長武有寵風同上𢎞太原角音古今姓纂風俗通衛大夫𢎞演之後漢有宦者𢎞恭事類闕古今合璧事類備要續集卷二十六
