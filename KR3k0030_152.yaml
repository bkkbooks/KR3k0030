body:
  text: 古今合璧事類備要續集卷二宋謝維新撰氏族門譜系歷代源流古者受姓受氏以旌有功是時人皆土著故名家望族舉郡國自表而譜系興焉所以推叙昭穆使百代不得相亂故考之史記自黃帝以降迄于秦漢莫不代有諜記之書然自是而至于我國朝作史者推其所從來譜諜尤未始不詳矣事類同姓末屬劉向上疏臣幸得丨丨丨丨聨肺腑漢書異派同根李密與唐髙祖書曰與兄派流雖異根系本同通鑑與通世譜厚待同姓何武為郡吏事太守何壽壽知武有宰相器以其同姓故厚之東漢宗稱太傅謝康樂稱謝太傅為宗衮姑事女巫唐趙彥昭遷中書侍郎同平章事以權幸進中宗時有巫趙挾鬼道出入禁掖彥昭以姑事之其得宰相巫力也乃與通譜張九齡張說為宰相親重之丨丨丨丨系唐本𫝊引與同譜李義甫已貴乃言系出趙郡與諸李叙穆嗜進者往往尊為父兄給事中李崇德丨丨丨丨既謫普州亟削去六帖請附屬籍李績本姓徐氏武德二年李密歸朝廷詔授黎州總管封英國公賜姓附宗正屬籍詔附屬籍韋嗣立與韋后屬疏帝特丨丨丨丨唐書乞列屬籍李叔明本嚴氏少孤養外家冒鮮于姓叔明初不知意醜之丨宗姓丨丨丨代宗從之六帖尊為父兄見前引與同譜下注呼為叔父羅威賦詠甚有情致錢塘人羅隱有詩名威遣使賂遺自叙宗姪丨丨丨丨六帖合為兄弟會稽黃渥與庭堅皆出於婺州之黃由七世以上失其譜以年相望與渥相近復以兄弟合宗山谷作黃育字序不通世譜不許通譜杜正倫求與城南諸杜通譜不許銜之諸杜所居號杜固其地有旺氣故世衣冠正倫既執政建言鑿杜固通水利既鑿川流如血閲十日止自是南杜不振亟削同譜李崇德事見前類注不妄認祖狄青為樞密使有狄梁公之後持梁公畫像及告身十餘通詣青獻之以謂青之逺祖青謝之曰一時遭際安敢自附梁公厚贈而還之比之郭崇韜哭子儀之墓所得多矣妄稱世譜遙遙華胄梁何昌㝢為吏部尚書有姓閔求官者昌㝢問君是誰後對曰閔子騫昌㝢掩口笑曰丨丨丨丨南史悠悠世胙至唐中葉風教又薄譜録都廢公靡常産之向士亡舊德之𫝊言李悉出隴西言劉悉出彭城丨丨丨丨訖無考按冠冕皂𨽻混為一區閔子騫後見上遙遙華胄注郭汾陽派五代唐郭崇韜為樞密使用事自宰相豆盧革等皆附之以其姓丨因問崇韜曰丨丨王本太原人徙華隂公世家鴈門豈其枝丨耶崇韜曰因遭亂亡失譜諜嘗聞先人言上距汾陽四世耳革曰然則固從祖也方相伯父唐有土人姓方好矜門地但姓方貴人必認為親戚戲之曰豐邑公相何親遽曰再從伯父戲者笑曰既是丨丨姪只堪嚇鬼豐坊造凶器出賣所朝野僉載丞相從姪有一故相逺派在姑蘇因嬉遊書其壁曰大丞相再從姪某嘗遊有士人李璋素好訕謔題其傍曰混元皇帝三十七代孫李璋繼至筆談精譜系學晉品達法摯虞字仲治撰族姓昭穆十卷人上疏進之以為足備物廣多聞以為定丨丨丨司徒劾之詔原之本𫝊魏氏族志先是後丨太和中定四海望族以崔寶等為冠其後矜尚門地故丨丨丨一切降之六帖唐人物志李守素王世允平召署天策府倉曹通氏姓學世號肉譜虞世南與論人物始言江左山東尚相酬對至北地則笑而不答歎曰肉譜定可畏許敬宗曰倉曹此名豈雅目邪宜有以更之世南曰昔任彥升通經時稱五經笥今以倉曹為人物志可乎時渭州刺史李淹亦明譜學守素所論惟淹能抗之六帖唐姓氏録髙宗時許敬宗以不叙武后世又李義府恥其家無名更以孔志約楊仁卿等十二人刋定之合二百三十五姓二千二百八十七家帝自叙所以然改為丨丨丨韋述譜學丨丨好丨丨見栁沖所撰姓族系録每私寫懷之還舍則又繕録故於百氏源派為詳乃更撰開元譜十二篇孔至類例丨丨明世族學與韋述蕭頴士栁沖齊名撰百家丨丨以張說等為近世新族别去之說子垍方有寵怒曰天下族姓何䂊若事而妄紛紛邪栁沖姓系丨丨修國史初太宗命諸儒撰氏族志甄差羣姓其後門胄興替不常沖請改修其書帝詔魏元忠等共取功德時望國籍之家等而次之號姓系録敬淳姓系路丨丨兼修國史尤明丨丨自魏晉以降推本其來皆有條序著姓略衣冠系録等百餘篇劉𤣥譜考丨子丨别撰劉氏家史及丨丨上推漢為陸終苗裔非堯後彭城叢亭里諸劉出楚孝王嚚魯孫居巢侯殷不承元王按據明審議者髙其博依漢年表例歐陽文忠世譜丨丨丨丨明允以禮大宗小宗為次雖丨不同皆足以考其世次也然竊怪文忠所謂不知姓之所自而昧昭穆之叙則禽獸不若也其譏切世之人可謂至矣然歐陽氏得姓凡幾年其間文學之士蓋亦多矣文忠始為之譜斯言恐未為得也塵史以禮大小宗蘇明允為世譜見上注歐陽修譜圖序歐陽氏之先本出於夏禹之苗裔自帝少康封其庶子於會稽使守禹祀歷夏商周以世相𫝊至于允常子曰勾踐是為越王越王勾踐傳五世至王無疆為楚威王所滅其諸族子分散爭立皆受封於楚而無疆之子蹄封於烏程歐餘山之陽為歐陽亭侯其後子孫遂以為氏當漢之初有仕為涿郡太守者子孫遂居于此或居青州之千乘或居冀州之渤海千乘之顯者曰生字和伯為漢博士以經名家所謂歐陽尚書者是也渤海之顯者曰建字堅石所謂渤海赫士歐陽堅石者是也建遇趙王倫之亂見殺其兄子質以其族南奔居于長沙其七世孫曰景達仕于齊唐不顯至其孫頠頠子紇仕于陳紇子詢詢子通仕于四世有聞遂顯自通三世生琮為吉州刺史子孫因家于吉州自琮八世生萬又為吉州安福令其後世或居安福或居廬陵或居吉水而修之皇祖始居沙溪至和二年分吉水置永豐縣而沙溪分屬永豐今譜雖著廬陵而實為吉州永豐人也蓋自亭侯蹄因封命氏自别於越其後子孫散亡不可悉紀其可紀者千乘渤海而已千乘之族自生𫝊八世至歙子復無後世絶經不傳家其他子孫亦皆微弱遂不復見而渤海之後獨見于今然中間失其世次者再蓋自質奔長沙至于景達七世而始見自琮至于安福府君又八世而始見其後遂不絶安福府君之九世孫曰修當皇祐至和之問以其家之舊譜問於族人各得其所藏諸本以考正其同異列其世次為譜圖一篇自景達以後始得其次敘蘇明允族譜引譜蘇氏之族也蘇氏出於髙陽而蔓延於天下唐神堯初長史味道刺眉州卒于官一子留於眉眉之有蘇氏自此始而譜不及者親盡也親盡則曷為不及譜為親作也凡子得書而孫不得書者何也以著代也自吾之父以至吾之髙祖仕不仕娶某氏享年幾某日卒皆書而他不書者何也詳吾之所自出也自吾之父以至吾之髙祖皆曰諱某而他則遂名之何也尊吾之所自出也譜為蘇氏作而獨吾之所自出得詳與尊何也譜吾作也嗚呼觀吾之譜者孝悌之心可以油然而生矣情見於親親見於服服始於縗而至於緦麻而至於無服無服則親盡親盡則情盡情盡則喜不慶憂不弔喜不慶憂不弔則塗人也吾所共相視如塗人者其初兄弟也兄弟其初一人之身也悲夫一人之身分而至於塗人吾譜之所以作也其意曰分於塗人者勢也勢吾無如之何也幸其未至於塗人也使其無至於忽忘可也嗚呼觀吾之譜者孝悌之心可以油然生矣系之以詩曰吾父之子今為吾兄吾疾在身兄呻不寧數世之後不知何人彼死而生不為戚欣兄弟之情如足與手其能幾何彼不相能彼獨何心郡望歷代源流附見譜系類事類鼎甲四姓滎陽鄭岡頭盧澤底李土門崔皆為丨丨國火補鈒鏤太原王亦四姓之匹而呼為丨丨喻銀質而金飾同上二崔髙宗朝以太原王范陽盧榮陽鄭清河博陵丨丨趙郡隴西二李其族望恥與諸姓為婚也唐髙士廣𫝊三裴居燕者號東眷居涼者號西眷居河東者號中眷五代史諸杜杜正倫與城南丨丨昭穆素逺求同譜不許正倫銜之六帖二栁栁氏之先自黃帝歷周魯孝公子夷伯展孫無駭生禽為魯士師諡下惠食采于栁下遂姓栁氏楚滅魯仕秦秦并天下栁氏遷河東秦末栁下惠裔孫安始居解縣安孫隗漢齊相六世孫豐後漢光祿勳七世孫軌晉吏部尚書生景猷晉侍中二子耆純耆號西眷純號東眷耆宗元之先栁先生年譜世占涼州李抱玉上言丨丨丨丨恥與逆臣共宗詔賜之姓李系出趙郡李義甫已貴自言丨丨丨丨與諸李叙穆彭城非堯後見前卷族屬類劉氏家史下注金陵非唐族丨丨始以唐號國錢文穆王問之曰金陵冒氏族於巨唐不亦駭人乎沈韜文曰此可取譬也且如鄉校間有稱孔氏者人則謂之孔夫子復何怪哉王大笑賞巵酒名號附命名改名賜名冒名同姓名同名二名隱名改姓名名不録姓歷代源流名者按說文號也自命也字從夕口夕者冥不相見故以口自名也古者諱名不諱姓姓所同也名所獨也自有氏姓以來而名亦未嘗不立焉所以示有别也然命名之義有五以名生為信以德命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以𨼆疾不以畜牲不以器幣故君子名之必可言豈茍云乎哉爰自文籍之既生至于黃帝而始正名焉此名號之所從起也由是而降上而帝王下而臣庶著而為聖為賢微而為愚為不肖雖至於野夫賤𨽻婦人女子莫不有是名號以𫝊焉故名之為義不可以已也如此今採之傳記之間未易殫述姑録其要者古人之名惟所遇焉斯取之矣非擇也商而上迭以甲乙命蓋雜紊而無序至於周諱行而名始尊然曰顛曰夭非美辭也而取之以名春秋之世猶不厚乎名衛有石惡晉有鬷蔑齊有陳逆楚有屈蕩周有史佚夫數辭者皆人之愧焉而至不美者也而取之以名展禽解狐若是者則有取乎物之賤者以自名下而漢晉士方以名相髙唐以來士無陋名名美而人才日卑嗟夫專於其內而不張於其外急乎其外而不勵乎其內古今之異也宜哉止齊文事類名獨姓所同也丨所丨也孟盡心下名同邰侯姜女之生子也始棄之命之曰棄宋芮司徒之生女也始棄之亦命之曰棄邰為稷官蒸民賴之宋棄美而生佐幾移於宋國行之異也奚傷甌覆元宗每命相皆先書其名一日書琳等名覆以金甌㑹太子入帝問之太子曰非崔琳盧從願乎帝曰然筯探五代盧文紀形貌魁偉廢帝竒之及帝立欲擇相悉書清望官姓名內琉璃瓶中夜焚香祝天以丨丨之首得文紀欣然相之女子知後漢韓康伯字伯休賣藥長安市時有丨丨從康買藥康守價不移女子怒曰公是韓伯休耶乃不二價乎康歎曰我本欲避名今小女子皆知我何用藥為外夷問裴度討吳元濟平淮西以功封晉國公名震四夷使外國者其君長必問度年幾狀貌孰似本𫝊草木知德宗徙張萬福為濠州刺史曰先帝改爾名正者所以褒也朕謂江淮丨丨亦丨爾威名因復賜舊名閲表得元宗嘗欲用張嘉貞而忘其名夜詔中書侍郎韋抗曰朕嘗記其風操而今為北方大將張姓而復名卿為我思之抗曰非張齊丘乎今為朔方節度使帝即使作詔為相夜且半因丨大臣丨疏舉一則嘉貞所獻遂丨其名即以為中書侍郎同中書門下平章事唐書焚香探宣宗命相必探中外有人望者三兩人姓名撚之致香案上以物覆之丨丨丨丸以命草麻婦孺知司馬上疏論新法利害曰後當如是行之十餘年無一不如公言者天下𫝊誦以公為真宰相雖田野父老皆號司馬公而丨人丨子丨其為君實也行狀宫禁聞王樞密疇之夫人梅鼎臣之女也景德初樞密副使梅夫人入謝慈壽宫太后問夫人誰家子對曰梅鼎臣女太后笑曰是聖俞家乎由是始知聖俞名聞於宫禁也歸田録外夷起敬遼人夏人遣使入朝與吳使至彼中者彼必問公起居及為相遼人敕其邊吏曰中國相司馬矣慎毋生事開邊隙神道碑醉人不識東坡云得罪以來深自閉塞扁舟草屨放浪山水間與漁樵雜處往往為丨丨所椎罵輒自喜漸丨為人丨平生親友無一字見及有書與之亦不答自幸庶幾免矣回李端叔書命名曰棄周后稷名棄其母有邰氏女曰姜嫄姜嫄為帝嚳元妃出野見巨人跡心欣然悅踐之而身動如孕者居期而生子以為不祥棄之隘巷馬牛過者不踐徙置之林中適㑹山林多人遷之而棄渠中氷上飛鳥以其翼覆薦之姜嫄以為神遂收養長之初欲棄之因名丨丨史周本紀曰甲殷家質直故以生日名子尚書言太甲帝乙武丁是也不以子丑名者何也丨丨乙者幹也子丑者枝也幹者本本實故以甲乙為名也白虎通德命以丨丨為義注若文王名昌武王名發手文唐叔虞生有文在手曰虞遂名虞史書又魯成季生有文在手曰友遂以命之左𫝊曰仇晉穆公伐條之役生太子命之丨丨其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以成禮易則召亂君命太子丨丨弟曰成師始兆亂矣兄其替乎左傳曰同桓六年九月子同生公曰是其生也與吾同物命之丨丨同上寤生鄭武姜生莊公以其丨丨驚姜氏故名丨丨成師見前曰仇注栁樹展禽之家有丨丨身行惠德號曰栁下惠淮南子揚州莒越生子將待事而名之揚州之役獲焉名曰揚州叔孫獲長狄僑如因名子曰僑如莒越欲比之於莬楚子文生而虎乳之楚人謂虎曰菟遂名丨丨左尼丘叔梁紇與顔氏女禱於丨丨生孔子孔子生而首上墟頂故名曰丘字仲尼史魚瑞伯魚之生適有饋孔子丨者喜以為丨故名鯉咳名子生三月妻以子見於父父執子之右手丨而丨之內則錫名朕皇考曰伯庸肇丨豫以嘉之楚詞小同後漢鄭𤣥孫丨丨以丁卯日生而𤣥以丁卯歲生故名丨丨本𫝊充閭晉賈充字公閭父逵晚始生充言後當有丨丨之慶故以為名字依謙杞文舒為其子弟作名皆丨丨以見意故後兄子默字居靜沈字處道子渾字仲𤣥深字道沖遂作書戒之曰以𤣥默沖虛為名欲使汝曹稱名思義也應䜟晉桓壑字郎子聞苻堅國中有謡云誰謂堅石打碎有子二十人皆以石為名以應之敬容梁何敬容為尚書令淺於學術拙於草𨽻署名敬字大作茍小為文容字大為父小為口陸倕見而戲之曰公家茍亦竒大父亦不小丨丨不能答百藥李丨丨隋內史德林之子幼多疾祖母趙氏故以丨丨為名志逺李素立孫丨丨始名鵬而素立方奉使謂家人曰古有待事名子吾此役可命子孫矣遂以名之真宰魏元忠始名丨丨以諸生見髙宗髙宗慰遣不知謝即出儀舉自安帝目送謂薛元起曰是子未習朝廷儀然其名不虛謂丨丨相也前定杜相鴻漸之父名鵬舉父子而似兄弟之名蓋有由也鵬舉嘗夢有所之見一大碑云是宰相碑已作者金填其字未者刋名於柱上因問有杜家兒否曰有任自看之記得柱下有鳥偏旁曵腳而忘其字乃名子為鴻漸而謂之曰汝不為相即汝之名字當鳥旁而曳腳也名字且丨丨况官與壽乎以義楊遺直為蘭陵簿四子發假收嚴皆登進士第收即大拜發已下皆至丞相發丨春為丨假以夏為義收以秋為義嚴以冬為義皆有文學及第賜名象先陸丨丨始名景初睿宗曰子能紹先創是謂象賢者乃賜名焉嗣恭路丨丨始名劒客連徙神烏姑藏二縣令考績為天下最明皇以為可嗣漢魯恭因賜名𤣥佐李希烈攻陳州劉丨丨救之希烈走遂進取汴州詔加汴宋節度使陳州行營都統𤣥佐本名洽至是賜名以尊寵之日華程丨丨始名華德宗以其有功益曰丨丨戰功名李抱玉始名重璋明皇以其丨西河有大丨為改今丨剛正名陸堅初名友悌元宗嘉其丨丨更賜丨同姓名曾參有與曾子同姓名者而殺人人告曾子之母母曰吾子不殺人織自若有頃焉人又曰丨丨殺人其母尚織自若也頃之又一人告之曰曾參殺人其母懼投杼踰垣而走戰國策毛遂野人丨丨墜井而死客以告平原君平原君曰嗟乎天喪豫矣既而知非平原客西京雜記孟公陳遵字丨丨時列侯有與遵同姓字者每至人門曰陳孟公坐中莫不震驚既至而非丨丨唐德宗時制誥闕人上批曰與丨丨時有與翃同姓名者為江淮刺史又具二人同進上復批曰春城無處不飛花寒食東風御栁斜與此丨丨李益丨丨時又有太子庶子丨丨同在朝故世言文章丨丨以辨云六帖同名梁州三明後漢假頴字紀明與皇甫威明然明並知名京師稱丨丨丨丨京師二稚後漢周澤字稚朝孫堪字子稚丨丨號丨丨蔡雍顧雍顧雍字元歎蔡伯喈異之謂曰卿必成名今以吾名與卿故雍與伯喈同名張𤣥謝𤣥吳郡太守丨丨之與丨丨同年名亞於𤣥時稱南北𤣥游肇髙肇後魏丨丨為廷尉時尚書令丨丨宣武之舅以肇名與己同欲令改易肇以孝文所賜守正不許髙肇甚銜之盛度丁度往時學士入劄子不著姓但云學士臣某先朝丨丨丨丨並為學士遂著姓以别之其後遂皆著姓歸田録改姓名陶朱范蠡事越王竟滅吳雪㑹稽之恥稱大將私軍以為大名之下難居乃裝其輕寶與其徒屬浮海出齊變姓名自謂鴟夷子皮耕于海畔居無幾致産數千萬齊人聞其賢以為相蠡喟然曰居家則致千金居官則致卿相此布衣之極也久受尊名不祥乃歸相印盡散其財以與知友懷其重寶問行以去止於陶以為天下之中通為生自號丨丨公張祿范雎事魏中大夫須賈須賈為魏昭王使於齊齊襄王聞雎辨口使人賜雎金十斤及牛酒雎辭謝不受須賈知之大怒以為雎持魏國隂事告齊故得此饋既歸以告魏相魏齊齊大怒使舍人笞擊雎折脅摺齒雎佯死即卷以簀置厠中賓客飲者醉更溺雎乃得出伏匿更名姓曰張祿范雎既相秦號曰張祿而魏不知以為范雎已死久矣魏聞秦且東伐韓魏魏使須賈於秦范雎聞之微行敝衣間步之邸見須賈須賈見之驚曰范叔固無恙乎留與坐飲食乃取一綈袍賜之雎為須賈御入秦相府須賈待門下良久問曰范叔不出何也門下曰吾相張君也須賈大驚自知見賣乃肉袒膝行謝罪雎曰汝罪有三所以得無死者以綈袍戀戀有故人之態盡請諸侯使與坐堂上飲食甚設而坐須賈於堂下置莝豆其側令兩黥徒夾而馬食之數曰為我告魏王急持魏齊頭來不然者我且屠大梁郭禹成汭少無行使酒殺人亡為浮屠後入丨丨中為賊帥假子更姓名為丨丨改名改曰生楚王曰子文無後何以勸善使復其所丨命丨丨注云易其名也更名向劉向本名更生恭顯等誣譛堪猛更生傷之乃著疾讒摘要後丨丨丨慕相如司馬長卿父母愛之不欲稱斥名大子丨藺相如之為人遂改名丨丨慕張綱李綱始名暖丨丨丨為人改焉避難改名後漢趙岐字邠卿初名嘉生御史臺字臺卿後丨丨丨丨因夢改名魏程昱本名立少時夢上天兩手捧日太祖曰卿當為朕腹心乃於立上加日而為昱改武為乂蔣乂初名武憲宗時因進見請曰陛下今日偃武修文羣臣當順承上意請改名乂帝恱時討王承宗兵方罷乂恐天子鋭於武亦因以諷改巖名龑南漢劉龑初名巖白龍見南宫三清殿改元白龍又更名龑以應龍見之祥有胡僧言䜟書滅劉氏者龑也龑乃採周易飛龍在天之義為龑字音儼以名焉冒姓名冒名為商唐康城南曾公大為人持重居官清亷登第之後七年六考赴班授建昌新城縣居家闕期尚隔兩年一日立於門外忽見一人負名牌而至題曰新知建昌軍新城縣事曾宣教公大甚駭少間有一人乘車而至問為何官曰曽知縣也延之上坐間其諱則曰公大問其登第之年又同曾公曰姓同名同官同而年同比其故何也其人起而謝曰某昨於部中見此姓名注授知其履歷故丨姓丨丨丨耳不知為公也今當更之曾公大笑亦不置之詰問真仁人也冒名僣帝王名德宗使人諭陸贄曰苗粲父晉卿往年攝政有不臣之言諸子皆與古帝王同名今不欲明行斥逐兄弟各宜降外官贄奏曰凡是譛訴之輩多非信實之言唐書又真文忠公德秀大學衍義云趙堯李舜未聞為逆於當時王莽曹操不假襲名於前代而讒者以此誣之可謂寃矣使無陸贄庸得免乎雜記竊聖賢名汪台符貽書宋齊丘訐之曰足下齊先聖以立名超亞聖而稱字齊丘慙而改為子嵩後使人誘與飲酒縛其口沉石城下江南野史二名祿父殷武庚一名丨丨尚書注何忌仲忌此丨丨也二名非禮也注難為諱也一字為名難言而易避公羊曼多哀十三年晉魏多帥師侵衛此晉魏丨丨也曷為謂之丨丨譏二名非禮也公羊隱名郭公見春秋莊二十四年晨門子路宿於石門晨門曰奚自語十四丈人子路從而後遇丈人以杖荷蓧語十八荷蕢子擊磬於衛有丨丨而過孔氏之門者語十四接輿楚狂丨丨歌而過孔子語十八屠羊丨丨𨼆名楚王延三旌之位陳章甫與吏部孫員外書牽狗武帝東巡至海上羣臣言見一老父丨丨言我欲見巨公已忽不見漢郊祀志負苓者文中子講道於白牛之溪弟子奉書北面環堂成列講罷程生退省於松下語及周易薛收嘆曰不及伏羲氏乎何辭之多也俄而有丨丨丨皤皤然倚松而見曰吾子何嘆也薛生曰叟何為者而徴吾嘆丨丨丨曰云云負其苓而行追問之居與姓名不答文中子聞之曰隱者也王無功負苓𫝊箍桶者二程侍父入蜀至大慈寺有丨丨丨口吟易數就揖之挽歸質所疑酬答如響問其姓名不答徑去麻衣道者國初時人不著姓名有易解行于世號丨丨易不録姓名不載姓名前漢去古未逺風俗質略故太上皇無名母媪無姓然唐宰相世系表叙劉氏所出云晉士㑹適秦歸晉有子留於秦自為劉氏秦滅魏徙大梁生清徙沛生仁號豐公生煓字執嘉生四子伯仲邦交邦漢髙祖也髙祖之父漢史不載而其名唐史乃載之程泰之演繁露不供姓名李白失意遊華山縣宰方開門決事白乘醉跨驢過門宰怒不知太白也引至庭下曰汝何人輒敢無禮白乞供狀無姓名曰曽用龍巾拭吐御手調羹力士脫靴貴妃捧硯天子殿前尚容吾走馬華隂縣裏不得我騎驢托遺老泉二子名說輪輻蓋軫皆有職乎車而軾獨若無所為者雖然去軾吾未見其為完車也軾乎吾知汝之不外飾也天子之車莫不由轍而言車之功轍不與焉雖然車仆馬斃而患不及轍是轍者禍福之間也轍乎吾知其免也矣止齊美名議人能美名名不能美人淑爾身雖陋爾名人不汝議也爾身之不淑假而以丘軻自號焉天下莫之豫矣是故古之為名姑用是焉别稱道而已矣賢否不係也詩集功曹上丨丨丨其言是日當登石韓走卒知兒童誦君實丨丨丨司馬題臣向宋郊字伯庠在翰林有指公姓名傳以它說者公因請更名嘗移書葉道卿清臣目為同年葉戲答云清臣宋郊榜第六人登第編閲小録無宋庠者不知何許人公答詩云紙尾勤勤問姓名禁林依舊玷華纓莫驚書録丨丨丨便是當時劉更生詩詠古今合璧事類備要續集卷二
