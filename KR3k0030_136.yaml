body:
  text: 古今合璧事類備要後集卷六十七宋謝維新撰監司門總領厯代㳂革總領財賦古無其官靖康末髙宗以大元帥駐軍濟州命隨軍轉運使梁楊祖總領措置財用然未以官名也南渡初嘗命朝臣總領都督府宣撫司財賦建炎末張魏公用趙應祥總領四川財賦始置所繫御總領官自此始朝野雜記又職源紹興三年差户部侍郎姚舜明往建康總領應千都督府錢物糧斛六年都督諸路軍馬張浚言三宣撫司錢糧漕司互相占吝因置闕乏乞於户部長二內差一員來鎮江府置司専一總領詔差户部侍専一總郎劉寧止七年令户部郎官霍蠡前往鄂州置司領嶽飛軍錢糧其後大軍在江上間遣版曹或大府司農卿少調其錢糧皆暫以總領為名而四川改置都轉運司故總領又廢紹興十一年諸將既罷兵乃收諸帥之兵以為御前運屯駐諸處皆置總領以朝臣為之仍帶専一報發御前軍馬文字蓋又使之與聞軍政不猶職餽餉而已叙位在轉運副使之上鎮江諸軍錢糧淮東總領掌之建康池州諸軍錢糧淮西總領掌之鄂州荆南江南諸軍錢糧湖廣總領掌之興元興州金州諸軍錢糧四川總領掌之初以胡紡為司農少卿總領淮東軍馬錢糧吳彥璋為太府少卿總領淮西江東軍馬錢糧曽造為太府卿總領湖廣江西京西路財賦湖北京西軍馬錢糧諸軍不聼節制十六年四川總司以總領四川宣撫司錢糧所為名十八年詔罷宣撫司始改為四川總領中興㑹要孝宗乾道六年詔淮東總領併歸淮西總領所中書門下省言勘㑹淮東總領所廢併司名合行併入詔以總領兩淮浙西江東財賦軍馬錢糧為名仍鑄印繳納兩司元印七年復置淮東總領孝宗㑹要又湖北總領所壁記云國家駐蹕吳㑹形勝控扼之也上下數千里自蜀漢荆襄江鄂逺於兩淮其間列戍數百而大屯不過十數視屯兵若干州之賦入供其軍食其始費用出入悉聽乎主將之所自為己而兵寢乏用紹興五年始命中都官為外領所司農兼總貢賦之入而制其出為四總事類此即唐度支之任今取唐事類近者比附于此鍭糧乃裹丨丨詩餉餽漢給丨丨不絶糧道豐衍唐劉晏移書於元載曰諸將有不遷戎虜有侵盜聞我貢輸錯入軍食丨丨可以震耀夷夏倚辦領租庸使租庸得補署積數百人皆新進鋭敏盡常時之選巡督丨丨故能成功同上制課調晉杜預字元凱拜度支乃奏立籍田處軍國之要興常平倉定榖價較鹽運丨丨丨內以利國外以救邉者五十餘條皆納焉佐軍興劉晏制萬物低昻常操嬴資以丨丨丨雖拏兵數十年斂不及民而用度足唐中僨而振晏有勞焉本贊人不加調李靈耀反河南節帥或不奉法擅征賦州縣益削劉晏常以羡補之丨丨丨丨而所入自如民不加賦丨丨丨丨而國豐饒劉晏事見運使國無橫斂元琇判度支丨丨丨丨而軍旅濟劉晏𫝊軍隨事辦第五琦字禹圭少以吏幹進肅宗駐彭源琦謁見陳今之急在兵兵强弱在賦賦所出以江淮為淵藪假臣一職請悉東南寶資飛餉函洛惟陛下命帝悅命御史勾當江淮租庸使當丨興丨丨趣丨人不益賦而用以饒為本為制論曰劉晏幹萬貨盈虛厥功茂矣君子之治財以仁丨丨以義丨丨其為利害而寓諸法法成矣巧者不敢過拙者不敢不及不怨不乏又曰斂之絲管而丨丨藏之百姓而丨丨同上視賦入供軍國家駐蹕吳㑹形勝控扼之地上下數千里自蜀漢荆襄江鄂達于兩淮其間列戍數百而一屯不過十數丨屯兵若干州之丨丨丨其丨食其始費用出入悉聽主將所自為己而兵寖乏用紹興五年始命中都官為外司農兼總其賦之入而制其出為四總之所國朝湖北總領所壁記得鹽酒膽用凡供軍之物民部計其實下江浙數州水輸陸送無虛旬督其稽逗而勸其能則有薦舉之權頗丨淮丨所算丨盧所榷以丨丨淮總壁記括契佐軍需東南三總領皆仰朝廷科撥獨四川總領専丨丨即有軍興朝廷亦不問故趙應祥榷鹽酒而王瞻叔括白契以丨丨丨云朝野雜記水運給西軍張魏公移軍閬川總領趟開兼都漕號善理財不加賦於民而軍用足宰執奏浚令居閬為丨丨以丨丨丨言行録民部總軍須紹興初孟大參開江淮荆浙都督府請用丨丨長二居建康丨領丨丨於是二卿姚舜明以選行盤洲集東總領石記館職領錢糧諸路總領故事皆帶在內金榖官淳熙中趙溫叔用宇文郎中子震為淮東總領時宇文尚為館職及命以著作郎兼權金部郎官為之以丨丨丨丨丨非舊典也當時皆不以為是朝野雜記王之望總軍賦丨丨丨持節入蜀以王官丨丨丨適金渝平王師十萬攻取郡縣保守關隘纍月不解甲公與將帥議論往復費金榖巨萬而儲偫素備蜀人不知孝宗即位持增置户部侍郎升宣諭使留公子蜀周益公集王之望如蕭何權户部侍郎吳芾入對上因論財賦遂言川陜用兵朕全得一丨丨丨之力大軍十餘萬衆數月與金角敵而蜀人不知之望在蜀幾丨丨丨之在關中候事稍定當大用之洪適就遷少卿洪適以户部郎總淮東軍馬錢糧符離甲申之役緣淮列戍襁負來歸者袂相屬供億之費數倍左支右吾僅逃乏興就丨司農丨丨盤洲老人小𫝊總屬厯代沿革紹興十一年初置四總領官屬有幹辦公事差遣四川有主管文字二員淮東淮西有分差糧料院審計司審計司通判兼榷貨務都茶場御前封椿甲伏庫大軍倉大軍庫贍軍酒庫市易抵當庫惠民藥局湖廣有給納場屬官兼分差糧料院審計以屬官兼御前封椿甲伏庫大軍倉大軍庫贍軍酒庫四川有分差糧料院審計院審計以屬官兼大軍倉大軍庫撥發般運官贖藥庫糴買場中典㑹要事類扈從知名汪大猷字仲和差總領淮西軍馬錢糧所幹辦公事金亮犯邉饋餉王師高宗巡幸供億百出公佐其長以辦羣工丨丨皆丨公丨樓攻愧集一司賴公楊子休字子美調鎮江分司料院職務至簡而少保吳公琚為總領一見期以逺到幕府事為吳公以開心聽可丨丨丨丨為名同上發運使厯代沿革本朝太平興國二年置江淮水陸發運于京師端拱元年罷以其事分𨽻排岸司編年備要至道元年始命洛苑副使楊允恭西京作坊使副李延遂及太子中允王子輿為江淮南兩浙發運使兼知制茶鹽事始就淮南置局三年省咸平二年鹽鐡判官王子輿復為制置淮南茶鹽是年令兼制置礬稅仍領荆湖路三年以子輿充淮南轉運使四年又加都大發運事並以淮南轉運使領其務而無使名景德二年復置一人後亦有二人副使以諸州副使充景德二年置都監天僖二年官崇者或為副使秩輕者為都監副使都監不常備分紀景祐元年罷開元元年復編年備要慶厯七年上命發運副使便不置正使職官分紀置司真州歲漕江湖粟六百萬斛以贍中都渡江後江湖冦盜多發運司第職糴買而已紹興二年罷以其錢帛赴行在八年起居舍人勾龍如淵言户部非生財之道請置諸路水陸度支轉運等使置司蘇杭户部侍郎李彌遜請復置發運使别給糴本錢數百萬緡廣行儲積徽猷閣待制程邁為江淮荆浙閩廣經制發運使専掌糴事九年廢發運司乾道六年虞丞福建等路都大發運使朝論不以為宜汪聖錫黃通老二尚書言之尤力執政不聽其年十二月正志以奏課誕謾遂廢司焉朝野雜記後復置以平江府守臣兼専領糴運之事以餉淮軍事類弊去薛向為江浙等路發運使領均輸之職運舟兵士交相侵盜貿易甚則託風水沉舟以滅迹向始募客舟以官舟運費募寡而物良舊丨悉丨東都事略財足權邦彥為淮浙荆湖等路制置發運使轉輸六路董偷懈檢欺隱核逋亡責稽滯水程陸轍餘五千里丨用湊丨於行在所億萬計有詔嘉嘆楊誠齊集疏漕河魯宗道遷江淮發運使丨真揚丨丨廢三揠舟楫便之歲以八百萬而食京師東都事略開長蘆張綸天禧中為江淮發運副使居二歲增米八十萬疏五渠導太湖入海復租米六十萬丨丨丨西河以避覆舟之患又築髙郵北漕以備非常仁宗謂執政曰發運總六路之廣財貨調用幣帛榖粟歲千百萬宜得其人而久任之擢天章閣待制在職十有三年同上備賑糴本朝大中祥符三年江淮發運使李甫言今年運米六百七十九萬石諸路各留三年以丨丨丨職官分紀惜民力薛簡肅公天禧初為江淮發運使辭王文正公王無他語但云東南民力竭矣薛退謂人曰真宰相之言也言行録鑿灑州渠蔣之竒字頴叔擢江淮荆浙等路發運副使元豐六年始建丨丨丨股丨以避長淮之險自是無覆溺者哲宗朝再為發運使東都事略疏支家河吳處厚紹聖初如蘇州居數月為江淮荆浙等路發運使丨丨丨丨通漕楚海歲漕六百二十萬石至京師又修復泰州捍海堰成復逋户三千六百民為立生祠同上王鼎發八難慶厯中王鼎為淮南江浙荆湖制置發運副使內侍王永德奏請沿汴置鋪挽漕舟歲可省費六萬鼎議以為不可三司判官一員將永德就鼎議丨丨丨永德不復爭鼎因言陛下幸用臣不宜過聽小人有所變更以誤國計於是永德言始不用居二年遂為使耀卿立中制仁宗時都官員外郎吳耀卿景德中江淮漕米歲不過四百五十萬石其後益至六百萬石故江淮之間榖價常貴而民貧請約咸平景德中歲漕之數丨為丨丨上乃詔發運司歲减漕米五十萬石國史歲漕餘百萬許元擢江淮荆大制置發運判官既又為使元曰以六路七十二州之粟不能足京師吾不信也至則治千艘浮江而上不數月京師足食乃考故事明信令發斂轉徙逺近遲速賞罰皆有法凡江湖數千里外談笑治之不擾不勞而用以足丨丨六百二十萬至京師東都事略湖山吳芾論運糧劄臣竊以狂酋授首中外大慶惟是軍食一事不可不慮兵法有之興師十萬出征千里百姓之費公家之奉日費千金內外搖動怠於道路者七十萬家以餉饋之不易辦也若諸葛亮用兵如神每以糧道不繼師出無功東晋乘羣胡之亂舉兵北伐當時皆謂中原指期可復而霸上之師枋頭之役亦以無糧而退則糧者實兵之急務也故雖以逆亮南牧尚且運清河穎口之糧積于兩淮而後深入近者成閔之軍出未十月已以糧乏告急于朝雖曰因糧於敵古亦有之伹聞北方連年飢饉必無豐儲兼近郡所積已為逆亮運之而南所存無幾若我師入境官無見糧勢必取之於民朝廷前日方下十年免租之詔今兵至即奪其食則是中原之民未被其利先受其害將何以慰來蘇之望哉伏願陛下詔大臣講求漕運之策使隨軍有可贍之糧師行無乏食之患則大事濟矣轉運使使副判官同厯代沿革唐先天二年李傑始名務先始為水陸發運使蓋使名之起開元二十一年裴耀卿以侍中充江南淮南轉運使而崔希逸蕭旻為副蓋色副使始此天寶以韋堅充勾當轉運使第五琦充諸轉運使劉晏充諸道轉運使其後韓滉杜悰杜讓能崔昭緯皆以宰相充使而諸道分置巡院皆統於此五代罷巡院始置轉運使唐㑹要職官分紀藝祖開基懲五季之亂藩臣擅有財賦不歸王府自乾德以後僣僞略平始置諸道轉運使以總利權開寶六年廣南平除徐澤為判官蓋轉運判官始此其轉運使之名國初伹曰勾當其路水陸計度轉運事官髙者則曰某路計度轉運使太平興國初皆曰使兩省以上則為都轉運使又置副使與諸路判官焉又置同勾當轉運事俄罷諸路副使真宗每用兵或令都部署兼轉運使王師征討則有隨軍轉運使事畢即停至道中詔曰天下物宜民間利病惟轉運使得以周知令更互赴闕延見詢問焉慶厯中皆帶按察之任六年罷之三年詔諸路轉運使並兼按察使每歲具官吏能否先是歐陽修請遣使按察官吏賈昌朝言轉運以按察官吏故令兼領之六年赦書以為過為煩擾吏