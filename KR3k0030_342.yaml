body:
  text: 古今合璧事類備要外集卷四十二宋謝維新撰香茶門茶瑞草總論茶南方嘉木也其樹低者二尺三尺髙者五尺六尺其巴山峽川有兩人合抱者伐而掇之其樹如瓜蘆葉如梔子花如白薔薇實如栟櫚葉如丁香根如胡桃其字或從草或從木或草木并四曰茗五曰荈其名一名茶二曰檟三曰蔎北苑先春龍焙洪州西山白其土産各有優劣建州露雙井白茅鶴嶺安吉州顧渚紫笋常州義興紫笋陽羡春池陽鳳嶺睦州鳩坑宣州陽坑南劍蒙頂石花露鈠籛牙南康雲居峽州碧澗眀月東川獸目福州方山露芽夀州霍山黃芽皆茶之極品也然上者生爛石中者生礫壤下者生黃土凡藝而不實植而空茂法如種瓜三嵗可採野者上圍者次陽崖隂林紫者上緑者次笋者上芽者次葉捲者上葉舒者次隂山坡谷不堪採掇至於採摘社前者佳其次寒食前又其次穀雨前蒸焙既有法留藏亦有方烹煎亦莫不皆有訣故沫餑者湯之華也花之薄者為沫厚者為餑細者為花茶少湯多則雲腳散湯少茶多則乳面聚此陸羽茶經所由作也茶之為用味至寒若熱渴凝悶腦目澀四肢煩百節不舒聊四五啜與醍醐甘露抗衡也其他如貢茶如榷茶貢茶猶知斯人有愛君之心若夫榷茶利歸於官擾及於民其為害又不一端矣事類茶茗丨丨久服令人冇力悅志神農食經又爾雅注云早取為茶晚取為茗茶餅荆巴間採丨藥作丨葉老者餅成以米膏出之欲煮茗飲先炙令赤色搗末置瓷器中以湯澆覆之加蔥薑橘子芼之其欲醒酒令人不眠茶果陸納為吳興太守時衛將軍謝安常欲詣納納無所備安既至所設惟丨丨而已茶粥傅咸司𨽻教曰聞南方有以困蜀姥作丨丨賣為簾姥事打破其器具又賣餅於市而禁茶粥以蜀姥何哉真茶劉琨與兄子南兖州刺史演書云吾體中潰悶常仰丨丨汝可致之苦茶丨丨久食益思華陀食論又壼居士食忌云若茶久食羽化大茗餘姚人虞洪入山採茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也聞子善具飲常思見惠山中有丨丨可以相給祈子它日有甌犧之餘乞相遺也因立奠祀後常令家人入山獲丨丨焉神異記清茗酉陽武昌廬江昔陵好茗皆東人作丨丨茗有餑飲之宜人别有真茗茶煎飲令人不眠桐君録香茗鮑昭姊令暉著丨丨賦設茶茗新安王子鸞豫章王子尚詣曇濟道人於八公山道人丨丨丨子尚味之曰此甘露也何言茶茗宋録服芳茶芳茶輕身換骨丹丘子黃山君服之陶景𢎞雜録理頭痛峽州石上紫花芽丨生丨丨年貢一斤又有小江明月碧澗茱茰􅀢之名飲消食忠州之南賓有四國一多陵二多婆三羅波四思龍皆方餅惟多陵最上飯後丨之丨丨空腹忌飲多婆次之二國下飲療風瀘州有茶樹夷僚常擕瓢置側登樹採摘芽葉必先含於口中待其止展然後致於瓢中旋塞其竅歸必致暖處其味極佳辛而性熱彼人云丨之丨丨療積瘻丨丨年丨苦茶蜈蚣並炙令香熟搗篩等分煮甘草湯洗以末傅之枕中方令不眠巴東有别真香茗煎飲丨人丨丨又出白茶狀如梔子其色稍白草茶第一丨丨盛於兩浙日注芽一自景祐以來洪州雙井白芽製作尤精逺出日注之上遂為丨丨丨丨坡詩注瑞草稱魁宣州宣城縣有茶山其東為朝口所燭號曰陽坡其茶最勝形如小方餅橫鋪茗芽其上太守薦之京洛題曰陽坡茶杜牧詩云山實東吳地茶稱丨丨丨毛文勝茶譜湖州紫笋袁州界橋其名甚著不若丨丨之研膏丨丨烹之有陸腳垂下故公淑賦云雲垂緑腳同上蒙山露芽蜀雅州丨丨頂有丨丨穀芽皆云大前者言採造於禁火之前也火後者次之又有枳殼芽枸杞芽枇杷芽皆治風疾又有皂策芽槐栁芽皆上春摘其芽和茶作之長洲沙泉湖州長洲縣啄木嶺金沙泉每嵗造茶之所也湖常二郡接界於此厥土有境會亭每茶時二牧畢至斯泉也處沙之中居常無水將造茶太守具儀注拜敕祭泉頃之發源其夕清溢供御者畢水即微減供堂者畢水已半之太守造畢水即涸矣太守或還斾稽期則示風雷之變或見鷙獸毒蛇木魅暘晱之類焉商旅即以顧渚水造之無沾金沙者今之紫笋即顧渚者亦甚佳矣蒙山中頂蜀之雅州名丨丨丨丨山有頂頂有茶圍其中頂曰上清峯昔有僧病冷且久嘗遇老父詬其病僧具告之父曰何不飲茶僧曰本以茶冷豈有能止乎父曰是非常茶仙家有雷鳴茶亦有聞乎僧曰未也父曰蒙之中頂茶常以春分之先後多雇人力俟雷之發聲併手採摘之多為貴至三日乃止若獲一兩以本處水煎服能袪宿疾二兩當眼前無疾三兩因以換骨四兩即為地仙但精潔治之無不效者僧因之中頂築室以俟及期獲一兩餘服未竟而病瘥既不能久及博求但精健至八十餘氣力不衰時到城市觀其貌若年三十餘眉髮紺緑後入青城山不知所終今四頂茶園不廢唯中頂草木繁茂重雲積霧蔽虧日月鷙獸時出人迹希到矣渠江鐡色潭郡之問有渠江中有茶而多毒蛇猛獸鄉人每年採擷不過十五六斤其色如鐡而芳香異常烹之無腳晉原嫩芽蜀州晉原洞口橫原味江青城其黃芽雀舌鳥觜麥顆蓋取其嫩芽所造以牙似之也又有片甲者早春黃茶牙葉相把如片甲也蟬翼者其葉軟薄如蟬翼也皆散茶之最上也建州大片丨丨方山之芽及紫笋片大極硬須湯之方可碾治頭痛江東老人多服之蘄門團黃丨丨丨丨有一旗二搶之號言其一葉三芽也呼為酪奴齊王肅歸魏初不食羊肉及酪漿常食鯽魚羮渴飲茗汁髙帝曰羊肉何如魚羮茗汁何如酪漿肅曰羊陸産之最魚水族之長羊比齊魯大邦魚比邾莒小國惟酪不中與茗為奴彭城王協曰卿不重齊魯大邦而愛邾莒小國眀日為莒之會亦有酪奴因丨茗丨丨丨洛陽伽藍記謂之益蠶江浙間養蠶皆以鹽藏其繭而繅絲恐蠶蛾之生也每繅畢煎茶葉為汁搗未粉搜之篩於茶汁中煮為粥謂之洗􅀈粥聚族以啜之謂益眀年之丨往市鬻茗晉元帝時有一老姥每旦擎一器茗丨丨丨之市人竟買自旦至暮其器不減法曹繫之於獄擎所買茗器自牖飛出廣林耆老傳入山採茗晉孝武世宣城人秦精常丨武昌丨丨丨忽見一人身長一丈遍體生毛牽其腰至山曲聚茗處放之便去須臾復來乃探懷中橘與精甚怖負茗而歸趙贊興稅唐正元丨丨丨茶丨而張滂繼之長慶初王播又增其數大中裴休立十二條之利唐書張滂請稅德宗正元中稅茶先是鹽鐡使張滂奏請稅茶以待水旱之闕詔曰可是嵗得錢四十萬實録鄭注榷法丨丨為丨茶丨詔王涯為𣙜茶使王涯益變茶法益其稅以濟用度下益困本傳嗜茶注經陸羽字鴻漸丨丨丨丨三篇御史大夫李季卿宣慰江南有薦羽者召羽煮茶羽衣野服挈具而入公心鄙之命奴子取錢三十文酬煎茶博士羽愧之更著毁茶論語林嗜茶入租甫里先生陸龜蒙丨丨荈置小園於顧渚山下嵗入茶丨薄為甌蟻之費自為品第書一篇繼茶經茶訣之後茶譜換以自醒白樂天事見甘菊注詳甚以為苦王濛好茶人至輒飲之士大夫丨丨丨丨每欲候濛必云今日有水厄伽監記答使煎茶唐肅宗嘗賜髙士玄真子張志和奴婢各一人玄真配為夫婦名之漁童樵青人問其故丨曰漁童使捧釣收綸盧中鼓枻樵青丨蘇蘭薪桂竹裏丨丨僧唯好茶唐大中三年東都進一僧年一百三十嵗宣宗問服何藥而致僧對曰臣少也賤素不知藥性本好茶至處惟茶是求或遇百碗不以為厭因賜茶五十斤令居保夀寺御史茶瓶丨丨三院一曰臺院其僚曰侍御史二曰殿院其僚曰殿中侍御史三曰察院其僚曰監察御史察院廳居南會昌初監察御史鄭路所葺禮察廳謂之松廳南冇古松也刑察廳謂之魘廳寢於此多魘兵察廳常主院中茶茶必市蜀之佳者貯於陶器以防暑濕御史躬親監啓故謂之丨丨御史臺記驛官茶庫江南有丨丨以幹事自任白太守曰驛中已理請一閲之乃康往初至一室為酒庫諸醖皆熟其外畫神問何也曰杜刺史曰公有餘也又一室曰茶庫諸茗畢備復有神問何也曰陸鴻漸刺史益喜又一室葅庫諸爼畢具復有神問何也曰蔡百喈刺史大笑曰不必置此茶録囊盛餘瀝齊林僧志崇收茶自三等待客以驚莢奉以萱草帶供佛以紫茸香赴茶者以油丨丨丨丨歸茶譜飲至斛二有人善飲茶丨丨丨丨斗一日過量吐如牛肺一物以茶澆之容一斛二斗客云此名斛二瘕太平御覽安得有此世傳陶榖買得黨太尉故妓取雪水烹團茶謂妓曰黨家應不識此妓曰彼粗人丨丨丨丨但能銷金帳下淺斟低唱飲羊羔兒酒耳陶愧其言類苑何至作此是州大龍團始於丁晉公而成於蔡君謨歐陽永叔聞之驚歎曰君謨士人也丨丨丨丨事歐集官將榷茶張詠令崇陽民以茶為業公曰茶利厚丨丨丨之命拔茶以樹桑民以為苦其後榷茶他縣皆失業而崇陽之桑已成其為政知所先後如此言行録人困賜茶故例翰林當直學士春晚丨丨則日丨小龍團丨一餅金鑾密記裴汶茶述茶起於東晉盛於今朝其性精清其味浩潔其用滌煩其功致和參百品而不混越衆飲而獨髙烹之鼎水和以虎形過此皆不得千人服之永永不厭與粗食爭衡得之則安不得則病彼芝术黃精徒云上藥至效在數十年後且多禁忌非此倫也或曰多飲令人體虛病風余曰不然夫物能袪邪必能輔正安有蠲逐藂病而靡保太和哉今宇內為土貢實衆而顧渚蘄陽蒙山為上其次則夀陽義興碧潤灉湖衡山最下有鄱陽浮梁今其精者無以尚焉得其粗者則下里兆庶瓶盎紛揉苟未得則謂百病生矣人嗜之如此者兩晉已前無聞焉至精之味或遺也作茶述陸鴻漸小傳竟陵僧於水濵得嬰兒育為弟子積長自筮得蹇之漸繇曰鴻漸于陸其羽可用為儀乃姓陸氏字鴻漸名羽有文章又嘗精思著茶經鞏縣有瓷偶人號鴻漸買十茶器得一鴻漸市沽若不利輒灌注之羽於江湖稱竟陵子于南越稱桑苧翁羽少事竟陵禪師智積異日羽在它處聞師去世哭之甚哀乃作詩以寄懷其略曰不羡白下杯不羡黃金罍不羡朝入省不羡暮入臺千羡萬羡西江水曽向竟陵城下來至貞元末卒李白茶述余聞荆州玉泉寺近青溪諸山山洞往往有乳窟窟中多玉泉交流中有白蝙蝠大如鴉按仙經蝙蝠一名仙鼠千嵗之後體白如雪棲則倒懸蓋飲乳水而長生也其水邊處處有茗􅒝羅生枝葉如碧玉唯玉泉真公常采而飲之年八十餘嵗顔色如桃李而此茗清香滑熟異於它者所以能還童振枯扶人夀也余遊金陵見宗僧中孚示余仙人掌茶數十片拳然重疊狀如手掌號為仙人掌茶蓋新出乎玉泉之山壙古未覿因持見遺兼贈詩要子答之遂有此作後之髙僧大隱知仙人掌茶發于中孚及李白也常聞玉泉山山洞多乳窟仙人如白鴉倒懸深溪月茗生此石中玉泉流水歇根柯灑芳津採服潤肌骨楚老捲緑葉枝枝相接連曝成仙人掌似拍洪崖肩舉世未見之其名誰得傳宗英乃禪伯投贈有佳篇清鏡燭無鹽顧慙西子妍朝坐有餘興長吟播諸天答僧中孚贈玉泉仙掌茶東坡書品茶要録後物冇畛而理旡方窮天下之辨不能盡一物之理達者寓物以發其辨則一物之變可以盡南山之竹學者觀變之極而遊於物之表則何求而不得故輪扁行年七十而老斫輪庖丁自技而進乎道由此其選也黃君道父諱儒建安人博學而能文淡然精深有道之士也作品茶要録委曲微妙皆陸鴻漸以來論茶者所未及非至靜無求虛中不留焉能察物之真如此其詳哉苦張機有精理而韻不能髙故卒為名醫今道父無所發其辨而寓之茶為世外淡泊之好此以髙韻輔精理者乎豫恐其不幸早亡獨此書傳於世故發其篇末云序童道父茶品要録蔡襄進茶録并序臣前因奏事伏蒙陛下諭臣先任福建運使日所進上品龍茶最為精好臣退念草木之微首辱被陛下知鑒若處之得地則能盡其材昔陸羽茶經不第建安之品丁謂茶圖獨論採造之本至烹煎曽未有聞臣輒條數事簡而易眀勒成二篇名曰茶録伏惟清間之宴或賜觀采臣不勝榮幸上篇謂茶色茶色貴白而餅茶多以珍膏油其面故有青黃紫黑之異善别茶者正如相工之視人氣色也隱然察之於內以肉理潤者為上既已末之黃白者受水昏重青白者受水鮮眀故建安人鬬茶以青白勝黃白茶有真香而入貢者微以龍腦和膏欲助其香建民試茶皆不入香恐奪其真若烹煎之際又雜以珍果香草其奪益甚茶味主於甘滑唯北苑鳳凰山連屬諸焙所産者味佳隔溪諸山雖及時加意製作色味皆重而莫能及又有水泉不甘能損茶味古人論水品者以此藏茶宜蒻葉而畏香藥喜溫燥而忌濕冷故收藏之家以蒻葉封裏入焙三兩日一次用火常如人體溫溫以禦濕潤若火多則茶焦不可食多茶或經年則香色味皆陳於淨器中以沸湯漬之刮去膏油一兩重乃止以鈐箝之微火炙乾然後碎碾若新茶則不用此説碾茶先以淨紙密裹槌碎然後熟碾大要只旋碾則色白若經宿則色昏矣羅茶細則茶浮粗則水浮候湯最難未熟則味浮過熟則茶沉前世謂之蟹眼者過熟湯也况瓶中煮之不可辨故曰候湯最難凡欲點茶先須熁盞令熱冷則茶不浮點茶若茶少湯多則雲腳散湯少茶多則粥靣聚鈔茶一錢七先注湯調之令極勻又添注入環回擊拂湯上盞可四分則止視其靣色鮮白著盞無水䀶為絶佳建安鬬茶水痕先退者為負耐久者為勝故較勝負之説曰相去一水兩水下篇論茶器茶焙編竹為之裹以蒻葉蓋其上以收大也隔其中以有容也納火其下去茶尺許常溫溫然所以養茶色香味也茶籠茶不入焙宜密封裏以蒻籠盛之置髙處砧椎蓋以碎茶砧以木為之椎或金或鐵取於便用茶鈴用金鐡為之用以煮茶茶碾以銀或鐡為之黃金性柔銅及䃋石皆能生􅀈不入用茶羅以絶細為佳用蜀畫絹之密者投湯中揉洗竹師之茶盞茶色白宜黑盞建安所造者紺黑紋如兔毫其坯微厚熁之久熱難冷為要用出他處者或薄或色紫皆不及也闕重擊拂有力黃金為上人間以銀鐡為之竹者輕湯瓶要小者又點茶注湯有凖黃金為上或以銀鐡瓷石為之歐陽公龍茶録後序皇裕中修起居注奏事仁宗皇帝屢承天問以建安貢茶并所以試茶之狀臣謂論茶之舛謬臣追念先帝顧遇之恩攬本流涕輒加正定書之于石以永其傳丁謂進新茶表右件物産異金沙名非紫笋江邊地暖方呈彼茁之形闕下春寒已發其甘之味有以少為貴者焉敢韞而藏諸見謂新茶蓋遵舊例詩集破睡丨丨見茶功禮滌煩為飲丨塵丨韋應物乳花香濃煙穗直茶嫩丨丨團紫餅赤泥開方印丨丨絶團玉歐公槍旗緑共約試新茶丨丨幾時丨同上霞腳碎碧流丨丨丨香泣乳花輕李德裕凝芳乳甌潔丨丨丨羅纎撼縹塵宋景文抽碧芽千萬碧玉枝戢戢丨丨丨李瓏和煙搗嫩芽香且靈吾謂草中英夜白丨丨丨寒爐對雪烹鄭遇帶煙蒸丨丨丨雀舌和露疊龍鱗作貢勝諸道先嘗秪一人丁謂浮緑乳輕甌丨丨丨孤竈散餘煙甘薺非豫敵宫槐讓我先徐鼎臣減夜眠解渴消殘酒清神丨丨丨十漿何足饋百磕盡堪捐同上雀舌龍團凍芽名丨丨賜茗出丨丨曉日雲菴暖春風俗殿寒東坡桂實天葩玉尺鋒稜取銀槽樣度窊月中亡丨丨雲外得丨丨張藝叟香塵玉乳建水正寒清茶民已夙興萌芽先社雨採掇帶春氷碾細香塵起烹新玉乳凝煩襟時一啜寧羡酒如澠丁謂雲芽金餅翠蘂出筠籝祕籥開瑶井甘徹澡霜華芳青碎煙影夜甑煎丨丨晨焙烘丨丨剋日上黼惟烹用龍文鼎龎籍朝掇露芽芳藂翳湘竹零露凝清華復此雪山客晨丨丨丨丨蒸煙俯名瀨咫尺臨丹崖圓芳麗其色圭玉旡纎瑕呼兒爨金鼎餘馥延幽遐滌慮發其照還源蕩昏邪猶同甘露飲佛事薰毗耶咄此蓬瀛客旡為貴疏霞柳子厚夜和燈搗嫩芽香且靈吾謂草中英丨臼丨丨丨寒爐捧雪烹羅憂碧桞散煎覺緑花生最是堪憐處能令睡思清乳花烹出石碾輕飛瑟瑟塵丨丨丨丨建茶新人間絶品應難識間對茶經憶故人林和靖麥粒收來丨丨丨丨品絶倫葵花製出樣爭新一杯永日醒雙眼草木英華信有神曽子固仙人從古栽年年春自東南來建溪先暖水微開溪邊竒茗冠天下武夷丨丨丨丨新雷昨夜發何處家家嬉笑穿雲去露芽錯落一畨榮綴玉含珠散嘉樹終朝采掇未盈襜唯求精粹不敢貪研膏焙乳有誰製方中圭兮圓中蟾北苑將期獻天子林下雄豪先鬬美鼎磨雲外首山銅瓶攜江上中檽水黃金硟畔緑塵飛碧玉甌中素濤起鬬茶味兮輕醍醐鬬茶香兮薄蘭芷其間品第胡能欺十目視而十手指勝君登仙不可攀輸同降將旡窮耻吁嗟天産石上英論功不愧階前蓂衆人之濁我可清千日之醉我可醒屈原試與招魂魄劉伶却得聞雷霆盧同敢不歌陸羽須作經森然萬象中焉知無茶星商山丈人休茹芝首陽先生休采薇長安酒價減千萬成都藥市無光輝不如仙山一啜好冷然便欲乘風飛君莫羡花間女郎只鬬草贏得珠璣滿斗歸歐公鬬茶歌太守急寄我如何建安三千里京師三月嘗新茶人情好先務取勝百物貴早相矜夸年窮臘盡春欲動蟄雷未起驅龍蛇夜聞擊鼓滿山谷千人助呌聲喊呀萬木寒凝睡不醒唯有此樹先萌芽乃知此為最靈物宜其獨得天地之英華終朝採摘不盈掬通尾銙小圓復窊鄙哉榖雨槍與旗多不足貴如刈麻建安丨丨丨丨丨香篛包裹封題斜泉甘氣潔天然好坐中揀擇客亦佳新香嫩色如始造不似來逺從天涯停匙側盞試水路拭目向空看乳花可憐俗夫把金錠猛火炙背如蝦蟆由來真物有真賞坐逄詩老頻咨嗟須臾共起索酒飲何異奏樂終淫哇歐陽嘗新茶歌好客手自煎蟹眼已過魚眼生颼颼欲作松風鳴蒙茸出磨細珠藩眩轉繞甌飛雪生輕銀瓶㵼湯誇第二未識古人煎水意君不見昔時李丨丨丨丨丨貴從活火發新泉又不見今時潞公煎茶學西蜀定州花瓷琢紅玉我今貧病嘗苦飢分無玉碗捧蛾眉且學公家作茗飲博爐石銚行相隨不用撑腸拄腹文字五千卷但願一甌常及睡足日髙時東坡碾香供玉食矞雲從龍小蒼璧元豐至今人不識壑源包貢第一春緗奩丨丨丨丨丨睿思殿東金井闌甘露薦碗天開顔橋山事嚴庀百局補衮諸公省中宿中人傳敕夜未央雨露恩光照宫燭右丞似是李元禮好事風流有涇渭肯憐天祿校書郎親敕家庭遣分似春風飽識太官羊不慣腐儒湯餅腸搜攪十年燈火讀令我胸中書傳香已戒應門老馬走客來問字莫載酒山谷謝送壑源芽我持玄圭與蒼璧以暗投人渠不識城南窮巷有佳人不索賔郎常晏食赤銅茗碗兩班班銀粟翻光解破顔上有龍文下碁局探囊贈君諾已宿此物已是元豐春先皇聖功調玉燭朝子胸中開典禮平生自期莘與渭故用澆君磊礧胸莫令鬢毛雪相似曲几蒲團聽煮湯煎成車聲繞羊腸雞蘇胡麻留渴羌不應亂我官焙香肌如瓠壺鼻雷吼幸君飲此莫飲酒山谷以小龍團及龍涎半挺贈旡咎喚起黃州夢人間風日不到處天上玉堂森寶香想見東坡舊居士揮毫百斛㵼明珠我家江南摘雲腴落磑霏霏雪不如為君丨丨丨丨丨獨載扁舟向五湖山谷以雙井茶送子瞻分送玉川字吳綾縫囊染菊水蠻砂塗印題進字淳熙錫貢新水芽天珍誤落黃茅地故人鸞渚紫薇郎金華講徹花草香宣賜龍焙第一綱殿上走趨明月璫御前啜罷三危露滿袖香煙懷璧去歸來拈出兩蜿蜒雷電晦冥驚破柱北苑龍芽內樣新銅圍銀範鑄瓊塵九天寶月霏五雲玉龍雙舞黃金鱗老夫平生愛煮茗十年燒穿新腳屏下山汲水得甘冷上山摘芽得苦梗何曽夢到龍遊窠何曾夢喫龍芽茶故人丨丨丨丨丨春風來自玉皇家煆圭樵璧調冰水烹龍炮鳳搜肝髓石花紫笋可衙官赤印白泥牛走耳故人氣味茶操清故人風骨茶樣明開緘不但似見面叩之咳唾金玉聲麴生勸人墮巾幘睡魔遣我拋書册老夫七碗病未能一啜猶堪坐秋夕楊誠齋謝木舍人送講筵茶古今合璧事類備要外集卷四十二
