body:
  text: 古今合璧事類備要前集卷三十九宋謝維新撰仕進門座主事類宰相座主李逢吉知貢舉榜未放而入相及第人就中書見座主因話録庶僚門生桑維翰亦裴皥之門生嘗謁皥皥不迎不送或問之答曰皥見翰於中書則丨丨也維翰見皥於私館則丨丨也何送迎之有人亦重其耿介郡國間談好奬善士何武為人仁厚好進士奬人之善為楚內史厚兩龔勝舍在沛郡厚兩唐林遵及為公卿薦之朝廷此人顯於世者何侯力也力絶權貴後史弼為河東守當舉孝廉知多權貴請托豫敕斷絶書屬中常侍侯覽果遣諸生齎書請之弼大怒即付獄考殺之本傳沆瀣一家杜審權知舉放盧處權有戲之曰座主審權門生處權崔沆放崔瀣談者稱座主門生丨丨丨丨南部新書杞梓集門楊嗣復權公集序正元中奉詔考定賢良草澤之士升名者十七人及禮部擢進士第者七十有二鸞鳯丨丨舉丨其丨而公所擢登輔相者十人本傳同入翰林封舜卿武宗朝翰林學士敖之子舜卿登進士第纍遷中書舍人入梁為禮部侍郎知貢舉開元中與門生鄭致雍丨受命丨丨丨致雍有俊才舜卿思拙澀對草綸誥不勝困弊託致雍秉筆時議者謂座主辱門生並坐堂序唐楊嗣復領貢舉父於陵入朝乃率門生出迎置酒第中於陵坐堂上嗣復與諸生坐兩序始於陵在考功擢浙東觀察李師稷及第時亦在焉人謂楊氏上下門生時以為榮並本傳號玉筍班玉筍班不知正出處唐書載李宗敏知舉門生多清秀俊茂唐伸薛庠袁郁輩時謂之玉筍叢話置雲母屏鄭宏字巨君為太尉時舉將第五倫為司空班次在下每正朔朝見宏曲躬自卑帝問其故遂聽置雲母屏風分隔其間由此以為故事東漢不受私謝前漢劉安世嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝本傳晉羊祜凡所薦人皆不知其由祜曰拜爵公朝謝恩私門吾所不取本傳不為私薦唐狄仁傑嘗薦姚元崇桓彥範等數十人率為名臣或謂仁傑曰天下桃李悉在公門仁傑曰薦賢為國非為私也通鑑詩集三主禮闈宦途最重是文衡天與愚夫著盛名丨丨丨丨年八十門生門下見門生裴皥三入承明綴行相送我何榮老鶴乘軒愧谷鶯丨丨丨丨不知舉看人門下放門生王元之春風羽毛二百一十四門生丨丨初長丨丨成衰翁漸老兒孫小他日知誰略有情李文正公玉堂珍玩座主登庸歸鳯沼門生批詔主鰲頭丨丨舊閣多丨丨可作西齋潤筆不玉壺清詀門生互見前座主門事類知自凡號門生而不知恩之所自者非人也栁文同升公叔文子之臣大夫僎與文子丨丨諸公子聞之曰可以為文矣門生殆遍袁氏植恩四世門生舊吏遍於天下魏袁紹傳門生每避胡廣所辭命皆天下名士與故吏陳蕃李咸並為三司蕃等每朝會稱疾避廣時人榮之繼踐台庭尚父之帥河中也咸寧郡王渾公佐之不十年接控數州丨丨丨丨則曹參之代蕭何太叔之嗣子産也郭子儀家傳交合郡符范津初薦傅燮及津為漢陽與燮交代合符而去燮傳不稱門生劉器之晚居南京馬涓巨濟作少尹巨濟廷試日器之作詳定官所取也而巨濟每見器之未嘗修門生之敬器之不平因以語客客以諷巨濟巨濟曰不然凡省闈解送則有主文故所取士得以稱門生殿試蓋天子自為座主豈復可稱門生於他人幸以此謝劉公也客以此告器之歎服其説自是甚愧揮麈録恥與同列唐盧坦為鄭滑判官有善笛者大將等恱之請節度為重職坦曰大將必在軍積勞亟遷乃及右職奈何自薄欲與吹笛少年同列邪諸將慙出就坦謝托言敘謝舉主晏公殊不喜歐陽公故歐公自分鎮敘謝有曰出門館不為不舊受恩知不為不深然足迹不及於賓階書問不通於執事豈非飄流之迹愈逺而彌踈孤拙之心易危而多畏動常得咎舉輒纍人故於退藏非止自便偶因天幸得請郡符問遺老之所思流風未逺瞻大邦之為殿接壤相交晏公得之對賓客占十數語授書吏作報客曰歐公有文聲似太草草晏公曰答一知舉時門生已過矣善事主司蕭遘與王鐸並居相位帝嘗召宰相鐸年髙升階足跌踣勾陳中遘旁掖起帝目之喜曰輔弼之臣和豫之幸也謂遘曰適見卿扶王鐸豫喜卿丨丨長矣遘對曰臣扶王鐸不獨事長臣應舉時鐸為丨丨臣亦中選門生也上笑曰王鐸選進士朕選宰相於卿無負矣遘謝而退云云詩集孤芳東坡送曽子固倅越詩云醉翁門下士雜遝難為賢曽子獨超逸丨丨陋羣妍昔從南方來與翁兩聨翩翁今自憔悴子去亦宜然嘉祐二年永叔知貢舉曽子固兄弟四人同登科醉翁為參政時固亦在館中故云兩聨翩新隂寶歷中楊嗣復具慶下榜時先僕射自東洛入覲嗣復率生徒迎於潼關宴於新昌里第元白俱在焉皆即席賦詩楊汝士詩後成元白覽之失色詩曰隔座須知賜御屏盡將仙翰入髙冥文章舊價留鸞翼桃李丨丨在鯉庭再嵗生徒陳賀宴一時良史盡傳馨當年疏傅雖云盛詎有兹賢醉緑醽汝士是日大醉歸謂諸子曰今日壓倒元白矣西齋李翰於和凝榜及第後與座主同任學士凝作相翰為承旨適當批詔次日於玉堂輒開和相舊閣悉取圖書器玩留詩云座主登庸歸鳳沼門生批詔主鰲頭玉堂舊閣多珍玩可作丨丨潤筆不人笑其疏縱玉壺清話東堂王禹玉乃余為校理時武成王廟所解進士也至此新入翰林與余同院又同知貢舉故禹玉贈余詩云十五年前出門下最榮今日預丨丨余答云昔時叨入武成宫曽看揮毫氣吐虹夢寐間思十年事笑談今日一樽同喜君新賜黃金帶顧我宜為白髮翁歸田録見門生裴皥官至禮部尚書放三榜四人拜相桑維翰竇正固張礪馬裔孫清泰二年馬裔孫知貢舉才放榜謝恩引諸生詣座主宅謁拜裴公以詩示之曰宦途最重是文衡天與愚夫著盛名三主禮闈年八十門生門下丨丨丨世以為榮就師資范文正公以晏元獻薦入館終身以門生事之後雖名位相亞亦不敢少變慶歷末晏公守宛邱文正赴南陽道過特留歡飲數日其書題門狀猶稱門生將别投詩有曽入黃扉陪國論却來絳帳丨丨丨之句聞者歎服石林燕語門下人商山老皓雖休去終是留侯丨丨丨太白集門下士我實丨丨丨力薄蚋與蚊受恩不即報永負湘中墳韓愈送陸暢門下客至今青霄人猶是丨丨丨高達夫故吏事類故吏同列權德輿作杜祐志曰德輿嘗沗府辟晚聨台座每荷同升之義盍陳無愧之辭故吏有聲劉晏為度支鹽鐵轉運使其商𣙜財用之術者皆一時之選故沒後二十餘年韓洄元繡裴腆包佶盧貞李衡相繼分掌財賦其有聲者皆晏之丨丨也故吏按舉蘇章遷冀州刺史丨人為清河太守章行部按其姦贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史按事者公法也遂舉正其罪故吏炎涼大將軍青日退而驃騎日益貴大將軍丨人門下多去事驃騎輒得官爵唯任安不肯坐同朝會蜀楊洪為蜀郡太守舉門下書佐何祗有才策數年祗為廣漢太守而洪尚在蜀郡每朝會祗次洪丨洪曰君馬何駛祗曰故吏馬不敢駛但明府未著鞭耳書戒郎君晏叔原臨淄公晚子監頴昌府許田鎮手寫自作長短句上府帥韓少師少師報丨云得新詞盈卷蓋才有餘而德不足者願郎君捐有餘之才補不足之德不勝門下老吏之望云一監鎮官敢於杯酒間自作長短句示本道大帥以大帥之嚴猶盡門生忠於郎君之禮在叔原為甚厚在韓公為甚德也聞見録相逢輒避王戎故吏多至大官丨丨戎丨下道丨之竹林七賢論略不加禮鞠詠為進士以文受知於王公化基及王公知杭州詠擢第釋褐為大理評事知杭州仁和縣將之官先以書及所作詩寄王公以謝平昔奬進今復為吏得以文字相樂之意王公不答及至任丨丨丨丨課其職事甚急鞠大失望於是不復冀其相知而專修吏幹矣其後王公入為參知政事首以詠薦人或問其故答曰鞠詠之才不患不達所憂者氣俊而驕我故抑之以成其德耳鞠聞之始以王公為真相知也東軒筆録可謂親炙愈博士也始事相公於祭酒分教東都生也事相公於東太學今為郎於都官也又事相公居守三為屬吏經時五年觀道德於前後聽教誨於左右丨丨丨薰而丨之矣韓愈送鄭校理序不宜在後三得為屬吏朝夕不離門下出入五年竊自計較受與報丨丨丨門下諸從事丨韓愈上鄭餘慶書又周子通上知己書如某政術文學誠不足以備執鞭於左右獨念向者抱明轂下實事明公於版曹今典教别都也又事明公居守槩之舊比似非偶然然則受知於今日圖報於異時固不宜在門下諸從事之後也請以是為紹介僚屬事類幕府丨丨者以軍幕為義軍旅無常居止故以張幕言之李膺傳注以文行謀畫雍容於幕府之間白集佐史宜數引見丨丨不數則彼我不親不親無因得盡人情宋太祖紀六翮奮丨丨翔千里以為轅門大府之重栁文一足非惜幕間丨丨地不容也皮日休集典文章竇憲平胸奴班固傅毅之徒皆置幕府以丨丨丨戒談戲陶侃遷都督勤於吏職見諸參佐或以談戲廢事乃取其樗蒲博具悉以投諸江羅致幕下大夫烏公以鈇鉞鎮河陽之三月以石生為才以禮為羅丨而丨之丨丨未數月也以溫生為才於是以石生為媒以禮為羅又丨而丨之丨丨韓文稱小朝廷鄭從讜充河東節度使自擇參佐從讜奏以長安令王調為節度副使前兵部員外郎史館修撰劉崇龜為節度判官前進士崇魯為推官人謂之小朝廷言名士之多也唐僖宗紀寄以腹心薛收與房杜處腹心之丨薛元敬謹畏未嘗申欵曲如晦曰小記室不可得而親不可得而疏委以子孫婁師德調江都尉揚州長史盧承異之曰子台輔器也當以子孫相委詎論僚吏哉杲之泛池王儉用庾丨丨為衛將軍長史蕭緬與儉書盛府元僚每難其選庾景行泛緑水依芙蓉何其麗也時人以儉府為蓮花池故緬書美之郤超入幕却超為桓溫謀主謝安與王坦之見溫溫使超卧帳中聽其言風動帳開安笑曰丨丨可謂丨丨之賓矣陳蕃設榻陳蕃為豫章太守以禮請徐稚為功曹蕃在郡不接賓客惟稚來時特設一榻去則懸之子猷拄笏王徽之字子猷為桓沖騎兵參軍沖謂曰卿在府久此當相料理初不答直髙視以手版拄頥云西山朝來致有爽氣徽之馬曹王徽之為大司馬桓溫將軍蓬首散帶不綜府事又為車騎桓沖騎兵參軍沖問卿署何曹對曰似是馬曹又問管幾馬曰不知馬何由知數又問馬比死多少曰未知生焉知死超宗驢府晉謝丨丨坐失儀出為南郡王司馬人問定是何府超宗怨望曰不知是司馬為是司驢既是丨丨政應為司驢坐禁錮值雨入車王徽之有雋才少為桓沖參軍從沖丨丨便下馬丨沖丨中謂沖曰豈有獨擅一車不容國士乎世説乘醉登牀嚴武鎮成都奏前拾遺杜甫為參謀官武與甫有世舊待遇甚隆甫性褊躁放恣嘗醉登武牀視武曰嚴挺之乃有此兒武雖急暴不以為忤紗籠中人張建封鎮徐州奏李藩為判官有新羅僧能相人公令看取判官有得為相者否僧云並無公不快曰某妙擇賓僚豈無一人至相坐者促召李判官至僧降階迎謂張公曰判官是丨丨丨丨宰相𡨕司必潛以丨丨護之恐為異物所擾餘官不然藩后果為相原化記豈池中物左肅機皇甫公義檢校沛三府長史引韋思謙為同舍倉曹謂思謙曰公丨丨丨之丨屈公為數旬之客以重此府辨論獄詞范文正公以進士釋褐為廣德軍司理日抱具獄與太守爭是非守盛怒臨之公不為屈歸必記其往復辨論之語於屏上比去字無所容貧止一馬鬻馬徒步而歸祠記遣賜厨傳錢希深歐陽永叔官洛陽時同遊嵩山歸暮抵龍門香山雪作留守錢文僖公遣吏以厨傳歌妓至且問勞之曰山行良勞當少留龍門賞雪府事簡無遽歸也聞見録詩集白頭野外堂依竹籬邊水向城蟻浮仍臘味鷗泛已春聲藥許鄰人斸書從稚子擎丨丨趨幕府深覺負平生杜甫青幕從軍古云樂談笑丨油丨燈明夜觀棊月暗秋聞柝韓愈會李正封聨句鳳雛豈知臺閣舊先拂丨凰丨得實翻蒼竹棲枝抱碧梧杜别蘇溪麟閣陳琳書記好王粲從軍樂早晚歸漢庭隨公上丨丨劉長卿詩作詩寓别崆洞小麥熟且願休王師請公問主將焉用窮荒為飢鷹未飽肉側翅隨人飛髙生跨鞍馬有似幽并兒脫身簿尉中始與箠楚辭借問今何官觸熱向武威答云一書記所愧國士知人實不易知更須慎其儀十年出幕府自可持旌麾此行既特達足以慰所思男兒功名遂亦在老大時常恨結歡淺各在天一涯又如參與商中腸安不悲驚風吹鴻鵠不得相追隨黃塵翳沙漠念子何當歸邊城有餘力早寄從軍詩杜送髙書記因詩論薦張詠知成都有録曹參軍老病廢事公責之曰何故不歸明日參軍求去且以詩留别其略曰秋光都似宦情薄山色不如歸興濃公驚歎曰吾過矣同僚能詩而吾不知留而慰薦之言行録交代事類卒更更有三品有丨丨有踐更有過更古者正卒無常人皆迭為之一月一更是為卒更貧者欲得雇更錢者次直者出錢雇之一月二千是謂踐更天下之人皆直戍邊三日亦名為更律所謂徭戍也雖丞相子亦在戍邊之調一嵗一更諸不行者出錢三百入官以給戍者是為過更漢昭紀注及代齊侯使連稱管至父戍葵邱瓜時而往丨瓜而丨左莊八年以政告新子張問曰令尹子文三仕為令尹無喜色三已之無愠色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁為政仍舊謝方明善治郡所至有能名承前代人不易其政必當改者則以次漸移變使無迹可尋晉恭記以寬授政鄭子産疾謂子太叔曰我死子必為政惟有德者能以寬服民其次莫如猛左昭二十年以嚴繼政班超為西域都護年老求還詔以任尚代之尚謂曰小人猥承君後宜有以誨之超曰塞外吏士本非孝子順孫皆以罪過徙補而蠻夷懷鳥獸心難養易動今君性嚴急水清無大魚察政不得下和宜蕩佚簡易寬小過總大綱尚私謂所親曰我以班君當有竒策今所言平平耳尚至數年西域反亂以罪被徵如超所戒此棄彼取晉殷浩既廢桓溫語諸人曰小時與之共騎竹馬我棄去已而浩輒取之故當出我下世説挽來推去鄧攸去郡不受一錢百姓數千人留牽攸船不得進乃小停夜中發去吳人歌之曰紞如打五鼓雞鳴天欲曙鄧侯丨不丨謝令丨不丨代於垂成祖逖為豫州刺史大興攻討北地遂平由是大河以南盡為晉土石勒不敢窺兵河南逖方當椎鋒越河掃清冀朔會朝廷遣戴若思為都督逖意甚怏怏感激發病有妖星見俄卒於雍邱同上新不如故梁江革為廬陵王長史行江州府事正直自居不與典籖趙道智坐道智還都言革惰事好酒以王曇聰代為行事南州為之語曰故人不道智新人佞散騎莫知度不度丨人丨丨丨同上代者交接韓延夀代蕭望之為左馮翊而望之遷御史大夫會御史當問事東郡望之因令并問延夀在東郡時放散官錢千餘萬延夀聞知即部吏按校望之在馮翊時廪犧官錢放散百餘萬上各令窮竟所考望之卒無事實望之遣御史按東郡具得其事延夀竟坐棄市代者相輕王羲之少有美譽與王述齊名而羲之甚輕之述先為會稽以母喪居郡境羲之代述止一弔遂不重詣述每聞角聲謂羲之當候已灑掃以待羲之竟不顧述深以為恨及述為揚州刺史將就徵周行郡界而不過羲之臨發一别而去先是羲之曰懷祖正當作尚書耳投老可得僕射更求會稽便自邈然及述蒙顯授羲之愧歎謂諸子曰吾不減懷祖而位遇懸當由汝等不及坦之故耶述後檢察會稽辨其刑政羲之深恥之遂稱病去郡父母墓前自誓朝廷以其誓苦亦不復徵之蕭規曹隨曹參代蕭何為相國舉事無所變更一遵何之約束百姓歌曰蕭何為法講若畫一曹參代之守而勿失載其清靜民以寧一本傳丨丨丨丨功若太山楊雄傳召父杜母後漢杜詩遷南陽太守治政清平時人方於召信臣為之語曰前有丨丨後有丨丨狗貂相續晉趙王倫篡位至於奴卒厮役亦加以爵位每朝會貂蟬盈坐時人語曰貂不足狗尾續借用粳粃在前孫綽與習鑿齒並行綽在前顧謂鑿齒曰沙之汰之瓦石在後鑿齒曰簸之揚之丨丨丨丨借用各任已長歐陽公知開封府所代者包孝肅公以威嚴御下名震都邑公簡易循理不求赫赫之譽有以包公之政礪公者公曰凡人才性不一強其所短勢必不逮吾亦任吾所長耳神道碑云云不省前怨詹大和堅老來京師省試罷坐微纍下大理李傳正端初為少師堅老哀鳴端初操俚談詬曰子嘴尖如此誠姦人也因困辱之已而榜出奏名在法當釋自此名不相聞後十年端初為淮南轉運副使既及瓜堅老自郎官出為代及再見端初頗省其面目猶不記前事因曰即中若有素者豈嘗邂逅朝路中耶風采堂堂非曩日比也堅老答曰風采堂堂固非某所見但不知比往時嘴不尖否端初愧怍而悟揮麈録詩集調金鼎王文正公曽李文定公迪皆狀元及罷相領青又為交承故文正送文定詩有錦標得雋曽相繼金鼎調元亦踐更之句慶福星楊叔寶郎中典眉州人言須眉守視事後三日作大排樂人獻口號其末句云為報士民須丨賀災星去了丨丨來守喜召優人謂曰大排致語誰做對曰本州自來舊例用此一首湘山録同官事類同僚盡心先蔑奔秦士會從之先蔑之使也荀林父止之曰丨官為丨吾嘗為僚敢不丨丨乎弗聽及亡荀伯盡送其帑及其器用財賄於秦曰為同僚故也文士同官分謗晉卻克將中軍韓厥為司馬韓獻子將斬人郤克馳將救之至則斬之矣卻子使速以徇曰以分謗也左傳年輩相遼陸長源以勳德為宣軍司馬韓愈為巡官同在使幕或戲丨丨丨丨周應曰大蟲老鼠俱是十二相屬何怪之有侯鯖録狷介寡合蕭瑀性狷介與同僚多不合唐太宗紀同列代貶唐竇參為萬年尉同舍當夕直者聞親疾惶遽參為代之會失囚京兆按直簿劾其人參曰彼以不及調而往參當坐遂被貶人皆義之同列相避爰盎素不好朝錯錯所居坐盎輒避盎所居坐錯亦避兩人未嘗同堂語怨位居下劉文靜自以才略功勳在裴寂之右而位居其下意甚不平酒酣怨望拔刀擊柱曰會當斬裴首恥班居上唐尉遲敬德侍宴慶善宫有班其上者敬德云爾何功居我上任城王道宗解喻之敬德勃然擊道宗目幾眇太宗不恱唐書羞列老兵蜀先主為漢中王遣費詩拜關羽為前將軍羽聞黃忠為後將軍怒曰大丈夫終不與老兵同列不肯受拜費詩謂羽曰蕭曹與髙祖少小親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以此為怨君侯不受拜但相為惜此舉恐有後悔耳羽大感悟即受拜恥同新進王仲舒召為中書舍人既至視同列率新進少年居不樂曰豈可復治筆硯於其間哉中書喧競鄭畋盧擕同在中書因議政喧競撲碎硯王繹歎曰不意中書有瓦解之事同列兩罷唐李紳為御史中丞宰相李逢吉忌其剛而韓愈徑直乃以愈為京兆尹兼大夫免臺參以激紳紳愈果不相下詆訐紛然於是兩罷之老韓同傳齊王敬則與王儉齊拜儀同三司徐孝嗣嘲儉曰今日可謂連璧儉曰不意丨子遂與丨非丨丨敬則聞之無恨色絳灌等列唐明皇欲以牛仙客為尚書張九齡執曰不可帝怒曰豈以仙客寒士嫌之耶卿固素有門閥哉九齡曰臣荒陬孤生陛下過聽以文學用仙客擢胥吏日不知書韓淮隂一壯夫羞丨丨丨丨陛下必用仙客臣實恥之周召不疑成王幼周公攝政當國踐阼召公疑之作君奭君陳不恱周公乃稱湯有伊尹格於皇天於是召公乃恱廉藺相避藺相如為上卿居亷頗之右頗曰我為趙將有攻城野戰之大功相如徒以口舌為勞而居上吾羞不忍為之下宣言曰我見必辱之相如聞常稱疾不欲與爭已而相如出望見廉頗相如引車避匿其舍人恥之欲辭去相如曰強秦之不敢加兵於趙者以吾兩人在也今兩虎共鬬其勢不俱生吾之所以為此者先國家後私讎故也頗聞之肉袒負剘謝罪冦賈極歡丨恂拜潁川太守丨復部將殺人恂戮之復以為恥謂左右曰吾與冦恂並列將帥而今為其所陷今見恂必手刃之恂知其謀不欲與相見谷崇曰崇將也得帶劒侍側卒有以變足以相當恂曰不然藺相如不畏秦王而屈於廉頗者為國也吾安可以忘之二人後卒丨丨李郭相勉唐安思順為朔方節度使時郭汾陽李臨淮俱為牙門都將二人不能相維同盤飲食常睇目相視不交一言及汾陽代思順臨淮欲亡去計未決旬日詔臨淮汾陽半兵東出趙魏臨淮入曰一死固甘乞免妻子汾陽趨下持手上堂曰今國亂主遷非公不能東伐豈懷私忿時耶乃别執手涕泣相勉以忠義訖平劇賊實二公之力不失和氣韓魏公慶歷中與范府希文韓彥國同在西上前爭事議論各别下殿各丨丨丨丨如未嘗爭當時相善三人正如推車子蓋其心主於車可行而已不為已也别録云交致其情髙宗朝光世軍在馬家渡張俊軍在采石遂詔光世以兵援世忠且令復移軍建安三大將權相敵兼持私隙莫肯叶心上詔魏矼諭光世曰賊衆我寡合力猶懼不支况軍自為心將何以戰為諸公計當滅怨隙不獨可以報國身亦有利矼勸光世貽書二帥以示無他使為犄角已而二帥皆復書丨丨丨丨詩集乘驄忽報南昌令丨丨入郡城同時趨府客此日望塵迎文苑臺中妙氷壺幕下清洛陽相去逺猶使故林榮韋應物詩追馬憶昨同丨八丨蹄約公投老此山棲公乘白鳳知何處我適新年值白雞王介甫次唐公韻唐公詩云不知今夜歸何處從者皆騎白鳳凰二公仁宗朝同制誥同年事類會宴期集唐進士榜出謝後便往期集院狀元與同年相見請一人為録事其餘主宴主酒主樂探花主茶之類咸以其年辟之托言連轡九衢劉禹錫送張盥赴舉詩序云吾不幸向所謂同年友當其盛時丨丨舉鑣旦絶丨丨若屏風然今來落落如晨星之相望同年有情唐李絳相德宗元義方言其私丨丨許季同德宗問之曰人於丨丨丨丨乎絳曰同年乃九州四海之人偶同科第或登科然後相識於情何有若其果才雖在兄弟子侄之中猶將用之况同年乎唐紀同年逺嫌冦萊公在樞府上欲罷之萊公已知乃遣人告沂公曰遭逢最久今出求一使相幸同年贊之公曰將相之任極人臣之貴茍朝廷有所授亦當懇辭豈得以此私有所干於人也亟往問之萊公不樂後上議凖令出與一甚官公曰冦凖未二十年已登樞府太宗甚器之凖有才望與一使相使當方面其風采足以為朝廷之光上然之翌日降制萊公捧使相誥謝於上前感激流涕曰苟非陛下主張臣安得有此命上曰王某知卿具道其言萊公出謂人曰王丨丨器識非凖所能測也公在相府抑私丨丨皆此類魏公遺事同年父執五代王祐父徹同光初與桑維翰丨丨登第拜左拾遺維翰入相祐以父同門生裁書自陳維翰竒之禮待甚厚自是文價日重同年友壻王懿恪公拱辰與歐陽文忠公丨丨進士文忠自監元省元赴廷試鋭意魁天下明日當唱名夜備新衣一襲懿恪輒先衣以入文忠怪焉懿恪笑曰為狀元者當衣此至唱名果第一懿恪文忠同為薛簡肅公子壻然文忠心少之文忠為參政時吏擬進懿恪僕射文忠曰僕射宰相官也王拱辰非曽任宰相者不可改東宫官以至拜宣徽使終身不至執政蓋懿恪主李文靖文忠主范文正其黨不同聞見録一榜多人尚書張詠嘗謂人曰吾榜中得人最多謹重有雅望無如李文靖深沈有德鎮服天下無如王公面折廷爭素有風采無如冦公當方面寄則詠不敢辭同門三李元祐中舒州有李亮工者以文鳴縉紳間與蘇黃遊兩集中有與其唱和詩時李伯時以善丹青妙絶世且好古博雅多收三代以來鼎彛之類又有李元中字畫之工追鍾王時號龍眠三李同年登進士第出處相若約以先貴無相忘其後位俱不顯揮麈録詩集同座主三朝出入紫微臣頭白金章未在身登第早年丨丨丨題書今日是州人閶門栁色煙中逺茂苑鶯聲雨後新此處吟詩向山寺知君望斷曲江春張籍寄同年共詞場憶昔詞場共著鞭當時鶯谷喜同遷關河契闊三千里音信稀踈二十年司空盻贈鄧詢美同攀枝年來驚喜兩心知髙處丨丨次第丨人倚繡屏間賞夜馬嘶花徑醉歸時聲名本自文章得藩溷曽勞筆硯隨家去恩門四千里只應從此夢旌旗趙嘏得接翅岐路不在天十年行不至一旦公道開青雲在平地枕上數聲鼓衡門已如市白日探得珠不待驪龍睡匆匆出九衢僮僕顔色異故衣未及換尚有去年淚晴陽照花影落絮浮野翠對面時忽驚猶疑夢中事自憐孤飛鳥丨丨鸞鳳丨永懷共濟心莫起秦越意曹鄴同年無恩唐王鐸楊收皆薛逢丨丨收作相逢有詩曰須知金印朝天客同是沙堤避路人威鳳偶時皆瑞聖應龍無水謾通神收聞之怒王鐸作相逢又有詩曰昨日鴻毛萬鈞重今朝山嶽一毫輕鐸又怒之同年俱貴向文簡敏中冦忠愍凖二相同以太平興國五年登第後文簡秉鈞忠愍以使相守長安作詩寄文簡曰玉殿登科四十年當時僚友盡英賢嵗寒唯有公兼我白首猶持將相權忠愍酬之曰九萬鵬霄振翼時與君同折月中枝細思淳化持衡者得到于今更有誰同年貸錢丁晉公初釋褐為饒倅丨丨白稹為判官稹一日以片紙假緡五環於公公笑曰榜下來婚京國富室豈無半千質物耶懼我撓之故矯耳於簡尾書一絶戲之曰欺天行詐吾何有立地機關子太乖五百青蚨兩家闕朱洪崖打白洪崖人以為朱崖之行亦兆於此同年相仇李處邁邯鄲之孫政和初以直祕閣知相州時聶貴逺山為郡博士王將明甫為決曹掾王聶同年生也始甚歡而聶於樂籍中有所屬意王亦昵之每戒不令前聶恨之因而遂成仇怨其後甫改名黼為相聶以蔡元長稱其剛方有立薦之改名昌擢為侍從黼大用事貶聶散官安置衡州益銜黼矣靖康時事大變召登政府黼之誅死聶有力焉而聶以是嵗出使至絳州被害揮麈録窮達不同朝武子云王文穆欽若以故相來守林州錢塘一老尉蒼顔華髮矣文穆初甚不樂之詢其履歷乃同年生惻然哀之遂封章於朝詔特改京秩尉以詩謝之云當年同試大明宫文字雖同命不同我作尉曹君作相東風元沒兩般風同上契分稠疊李摯與李敏同姓同嵗同門同年登第摯詩曰因緣三紀異契合四般同古今合璧事類備要前集卷三十九
