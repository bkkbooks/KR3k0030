body:
  text: 古今合璧事類備要别集卷七宋謝維新撰橋道門橋梁輿地提綱橋梁之設所以濟不通也古之人所以啓閉從時者蓋城郭牆塹以為閉而門户道橋以為啓閉與啓均之為不可緩也然橋梁於道路最為有功天下不可一日而無橋梁猶天下之不可一日而無道路也蓋一日而無橋梁則道路有時而不通矣故凡達川澤之阻濟湟隘之嶮使斯人免褰裳之苦濡軌之病而得以之百里之千里而無留行者雖道路之功亦橋梁之功也彼蠢蠢之氓憧憧之徒曰南而南曰北而北以至於東西唯其所者豈知力將岸爭勢與空鬬乃蒙此利涉之功哉或者不此之急而脫輈以濟人而亦甚勞矣事類造舟丨丨為梁注方言浮梁也達阻司嶮知川澤之阻而達其道路注達道路者川澤之阻則橋梁之禮夏官溠梁楚伐隋令尹鬬祁莫敖屈重除道梁溠注溠水在義陽厥縣西東南入鄖水梁橋也左莊四溴梁㑹于丨丨左襄十六又梁莫大於丨丨爾雅黿鼉周穆王三十七年伐荆東至九江以丨丨為梁而渡紀年牽牛秦始皇并天下都咸陽端門四達以制紫宮渭水貫都以象天河橫橋南渡以法丨丨川不梁單襄公過陳見丨丨丨白六帖河始橋秦昭王四十九年初作河橋史又秦作浮橋于河春秋後傳絶水為梁石丨丨丨丨詩有狐淇梁注鞭石作橋秦始皇作石橋欲通海觀日出處有神人能驅山石下海去不速鞭之流血齊地記獨木曰犳丨丨之橋曰𣙜亦丨丨今謂之略犳廣志小橋曰杠子産聽鄭國之政以其乘輿濟人於溱洧孟子曰惠而不知為政嵗十一月徒杠成十二月輿梁成民未病涉也注徒杠小橋輿梁大橋孟子以弓擊水髙麗國王有侍婢自云氣如雞子來下我故有身後生子名曰東明東明善射王恐害其國欲殺東明東明走至淹水丨丨丨丨魚鰲浮為橋而渡隔洞擲巾崔生入山遇仙女為妻久之還家得隱形符潜游宮禁為衛士所知追捕甚急逃還山中追者在後丨丨見其妻告之丨丨成五色橋度崔與婦人期尾生丨丨丨丨不來水至抱梁而死抱朴子與老父期張良從容步游下邳圯上有一老父衣褐至良所直墮其履圯下顧謂良曰孺子下取履良愕然孺欲歐之為其老乃彊忍下取履因跪進父以足受之曰子可教矣後五日平明與我期此良因怪跪曰諾五日明良往父先在怒曰後何也再往父又先在父怒曰後何也後五日夜半往有頃父方來喜曰當如是出一編書曰讀是則為帝王師後十年興十三年孺子見我濟北榖城山下黃石即我也遂去不見旦日視其書乃太公兵法漢本傳題升仙橋司馬相如往京師過蜀郡丨丨丨題其柱曰不乘駟馬車不復過此橋漢本傳匿中渭橋文帝行出中渭橋有一人走出乘輿馬驚使騎捕之屬廷尉張釋之治問曰縣人來聞蹕匿橋下見車騎即走耳張廷尉奏當罰金漢張釋之傳如從席過趙充國治湟隘以西道橋七十所令可至鮮水左右以制西域信威千里丨丨枕丨上丨師本傳從免冠請薛廣德直言諫諍後帝祭宗廟出便門欲御樓船廣德免冠頓首請曰宜從橋云云上不說光祿大夫張猛曰乘船危就橋安聖主不乘危乃從橋本傳冠蓋圜門後顯宗幸辟雍正坐自講諸儒執經問難於前丨丨縉紳之人丨橋丨而觀聽者蓋億萬計注漢官儀曰辟雍四門外有水以節觀者門外皆有橋觀者水外故云圜橋門也儒林傳序關樓絶水公孫述遣田戎等據荆州虎牙橫江水起浮橋丨丨立攢柱以丨丨道拒漢兵注述傳攢柱叢木以為柱通鑑光武紀飛炬焚橋岑彭令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時東風狂急魯竒船逆流而上直衝浮橋而攢柱有反杷鉤竒船不得去竒等乘勢殊死戰因丨丨丨之風怒火盛丨樓崩燒彭悉軍順風並進所向無前同上據水斷橋蜀先主為曹公所追張飛拒後丨丨丨丨無敢涉者利濟百姓後漢崔亮渭水為橋丨丨丨丨名崔公橋取象三公洛水浮橋三柱折三公象也魏略陷馬斬儀魏伐蜀鍾㑹先命牙將許儀在前理道㑹後行而橋穿丨丨足於是丨丨魏志舉杯勸預杜預建河橋于富平津衆論以為殷周所都經聖賢而不作必不可作也預曰昔造舟為梁則河橋之謂遂作成上臨㑹丨丨丨丨曰非卿此橋不立預曰非陛下聖明不成伐蜀作橋鄧艾丨丨先丨浮丨魏志屯汲造橋晉成都王穎字章度丨丨南阻清水為壘丨浮丨道河北以木函盛石沈之以繫橋名曰石鱉陽羡獺嘷丨丨縣前有大橋下有丨將有兵動獺出穴口西向而嘷周處風土記義興蛟死丨丨郡溪渚長橋下有蒼蛟吞噉人周處執劒橋側伺久之遇出於是處自橋上投下蛟背而刺焉丨丨五丈馬跳慕容垂與劉牢之戰晉大敗車騎慕容德等引兵要牢之于丨丨橋牢之馳丨丨五丈澗㑹救至後燕録立木止車權萬紀族孫懷恩嘗過汴州刺史楊德幹與懷恩名相埒汴橋新成丨丨中涂丨過丨者懷恩適過之示德幹曰民不可邪焉用此德幹慙服孔帖纍石代柱李昭德洛有二橋司農卿韋洪機徙其一直長夏門民利之其一橋廢省巨萬計然洛水嵗淙齧之繕者告勞昭德始丨丨丨丨鋭其前厮殺暴濤水不能怒自是無患築道為梁梁立德從征遼師還至遼澤亘二百里淖不可通立德丨丨丨橋丨無留行維艦為梁李存進晉軍德勝為南北寨每以舟兵來往頗以為勞而河北無竹石存進乃以葦竹下丨大丨丨浮丨莊宗大喜爭橋溺死李密王世充進薄其壘密提敢死士數百邀之世充大潰士丨丨丨丨者數萬洛水為不流斷橋奏捷李訴取吳元濟道分輕兵丨丨以絶洄曲道航橋控賊史思明自魏來王師南潰郭子儀以朔方軍保河陽斷丨丨機橋殲賊康承訓屯海州度賊至作丨丨維以長之絙賊半度絙絶士溺死度者不得戰丨賦一鼓鐵蒲津橋每冬末冰合春泫初解流澌峥嶸綆斷航破無嵗不有開元十闕載授彼有司俾鐵代竹丨晉國之丨丨法周官之六齊結為連鎖鎔為伏牛偶立於兩岸襟帶於中潭鎖以特航牛以縶纜亦將厭水物奠浮梁奔澌不突積凌不隘張說贊用三腳木杜重威朔州人契丹冦真定轉運使李谷教重威丨丨丨丨為橋募敢死士過河擊賊青龍卧其上趙州石橋望之如初月出雲長虹飲澗天后時默啜欲南過至橋上忽馬不進見丨丨丨橋上乃去朝野僉載伏牛立於岸見前東郭大夫橋張志和築室越州丨丨觀察使陳少游往見為終日留先是門阻流水無梁少游為創之人號丨丨丨東都集賢橋裴度立第於丨丨丨丨里有風亭水榭梯丨架閣唐舊史覆車償民粟王周四鎮皆有善政橋壞丨民租丨周曰橋梁不修刺史過也乃丨丨丨為治其橋扼河擊梁兵王建及梁晉戰柏鄉相距鄗邑野河上真定兵丨丨橋梁兵急擊之莊宗登髙望見真定兵將敗顧建及曰橋為梁奪則吾軍危矣奈何建及選二百人馳丨丨丨梁敗解去五代史唐臣傳揣廣狹以濟賈循京兆華原人張守圭北伐次灤河屬凍泮欲濟無梁循丨丨丨為橋丨丨張彧石橋銘閹茂嵗我御史大夫李公晟奉詔總禁戎三萬北定河朔冬十月師次趙郡南石橋者天下之雄勝乃揆厥跡度厥功皆合於自然包我造化僕散客也狀而銘曰汶水伊何斡諸州牙錯秋霖夏潦奔突延袤杼材蕆制朴斫紛揉地泉開盤根玉甃虹舒電拖虎步雲構截險橫包乘流逈透坱軋匠造琳琅簇簉敞作洞門呀為石竇賖莫算盈一紀方就力將岸爭勢與空鬬吞齊跨趙警夜防晝月挂虛梁星羅伏獸謂之鈐鍵撮我宇宙謂之關梁折我賊冦郡國襟帶山河領袖經途者安逸軌者覆東南一尉西北一候萬里書傳三邊檄奏郵亭控逸事物殷富夕發蒯蠕朝趨禁霤心舍水碧文耀藻繡花影全芳苔痕半舊天啓大壯神功罕究勒銘巨橋敢告豪右蔡謨石橋記泉州萬安渡石橋始造於皇祐五年四月庚寅以嘉祐二年四月辛未訖功纍址于淵釃水為四十七道梁空以行其長三千六百丈廣丈有五尺翼以扶欄如其長之數而兩之靡金錢一千四百萬求諸施者行李往來舍舟而徒易危以安民莫不利職其事盧錫王實許忠浮圖義波宗善等十有五人既成太守莆陽蔡襄為之樂合宴飲而落之明年秋蒙召還京道由是出因記所作勒于岸左蘇軾何公橋銘天壤之間水居其多人之往來如鵜在河順水而行雲駛鳥疾惟水之利千里咫尺亂流而涉過膝則止惟水之利咫尺千里沔彼濫觴蛙跳倏游溢而懷山神禹所憂豈無一木支此大壞舞于盤渦冰拆雷解坐使此邦畫為兩州雞犬相聞吳越莫救允毅何公甚勇于仁始作石梁其艱其勤將作復丨更此百難公心如鐵匪石則堅公以身先民以悅使老壯負擔如負其子疏為玉虹隱如金隄直欄橫檻百賈所棲我來與公同載而出歡呼闐道抱其馬足我歎其言視此滔滔未見剛者孰為此橋願公千嵗與橋夀考持節復來以慰父老如朱仲卿食于桐鄉我作銘詩子孫不忘葉適利涉橋記嘉定四年二月黃巖縣浮橋成林􅕔叔和為其知縣楊君言曰橋長千尺籍舟四十欄檻繂索隄其兩旁祵圖狻猊訖三十旬斤鐵九千木石二萬五千夫工六萬餘縣東南車馬擔負而客之途皆達于橋西北樵採攜挈而民之市皆趨於橋諸公跨天台陟雁蕩行過黃巖皆喜曰增一橋矣蓋奔渡爭望舟傾覆蹴踏之患既免而井屋之富屋肆烟火與橋相不絶甚可肚也古無而今有難也橋於江之險又難也台州有橋自唐守始君一縣作之抗其力如州倍難也願子記以為君酬余病未暇也叔和又曰橋以木成為難衆人所知爾以既成為難君所自知也今嵗别一囷以待異日之缺尚懼不足雖然丨籍壞七十年矣君聚田百萬畝算而步折之更二載始得經營之舊君之力雖尤難而承其後者易矣易則思無窮而橋可恃以常存也願并著之余卧水心久往來皆村野人語不到門前不知君材乃若是鄭大夫非異人耶舉鄭國解落整比大效小驗具於春秋至捐一車則天下以為笑彼溱洧之易視今之難奚百倍翅耶豈古人於此則或有故歟世常言極今人所難不足以進古人所易而充古人所易不能為今人所難何哉叔和之論未余質也可無為書余少從叔和兄弟游每為余言縣直北山爽氣浮動花栁之麗雪月之勝無不在江北余間至程頭必徘徊瞻顧輒阻江而屢返矣今既施橋而叔和與邑人日曳杖娛嬉於北山潮生汐落隨江降生悠然如泳漢浴沂以詠歌令君之遺德而余已老不復有四方之志徒慨想而不能從也因附見之亦以志余之不忘斯游爾朱辨橋記造舟為梁見於詩而杠𣙜猗犳雜出於子史若橋之為名則始於商而獨著於周書逮秦漢乃各冠以地或因水而稱詩集搖文蠲水丨丨丨動纜轉錦花縈初學記唐太宗橋詩躡綵虹乘橋丨丨丨太白伐竹為丨丨丨橋結構同褰裳不涉往來通天髙白鶴歸華表日落青龍見水中顧我老非題柱客知君才是濟川功合歡却笑千年事驅石何時到海東杜竹橋驅石架秦皇按寶劍赫怒振威神逐日巡海右丨丨丨滄津徵率空九㝢作橋傷萬人李白古風官桞細市橋丨丨丨杜苦竹前丨丨橋丨屬幽徑栁上駕漢飛橋丨丨丨韓復非船非閣丨丨丨可居兼可過君欲問方橋方橋如此作同上中流蜃氣三江五湖口地與天不隔日月所蔽虧東西渺然白漫漫侵北斗浩浩浮南極誰投此虹霓欲濟兩間厄丨丨雜丨丨欄楯相承翼初疑神所為滅沒在頃刻晨興坐其上傲兀至中昃獨憐造化功不謂因人力今君持酒漿談笑顧賓客頗誇九州物壯麗此無敵熒煌丹砂柱璀璨黃金璧中家不慮始助我皆豪殖喟豫獨不可還當采民力荆公垂虹橋跨海鯨鯢三百欄干鎖畫橋行人波上跨瓊瑶插天螮蝀玉腰闊丨丨丨丨金背髙路直鑿開元氣白影寒壓破大江豪此中自是銀河接不必仙槎八月濤鄭毅垂虹橋龍亦驚逃羣鯨貫鐵索背負橫空霓首搖翻雪浪尾插崩雲溪機牙任信宿漲落隨髙低蟻不敢躋黃橋本千柱掛湖如斷霓浮梁陷積淖破板隨奔溪笑看逺岸沒坐覺孤城低聊因三農隙稍進百步隄炎洲無堅植潦水輕推擠千年誰在者鐵柱羅浮西獨有石鹽木白丨丨丨丨似開銅駝峯如鑿鐵馬蹄岌岌類鞭石山川非㑹稽嗟我久閣筆不書紙尾鷖蕭然無尺箠欲駕飛空梯探囊賴故侯寶錢出金閨父老喜雲集百夫下一杙椓此百尺泥殺散西村雞似聞百嵗前海近湖有犀簞壺無空攜三日飲不散那知陵谷變桂瀆生茭藜後來勿忘今冬涉冰過臍蘇子瞻西新橋紫虹千萬尺老匠鐡手風運斤一挾刃入千山秃明堂有柱不見用此為失地猶濟人西瀦巨澤江海通陽侯利溺驚濤風當道獨能支地險更來安得與天通莫比垂天紳莫比跨地帶渴龍乾死枯無鱗絶海失舟踏鯨背秦帝東游逐仙跡纍重肉多飛不得三洲水隔不到山借得丨丨丨丨丨平時塵土埋英雄吾亦棄劒來游東欲觀水盡朝宗海安得身乘波浪風為約他年可歸處獨倚闌千不思去季膺范蠡不足竒待我為名千古歸王逢原吳江長橋曉風千里渡跨海飛梁疊石成丨丨丨丨丨瑶瓊雄如建業虎城峙勢若常山蛇陳橫腳底江濤時洶湧望中烟嶼晚分明往來利陽橋涉歌遺愛誰復題橋繼長卿劉彥冲洛古今合璧事類備要别集卷七
