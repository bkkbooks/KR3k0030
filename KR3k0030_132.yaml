body:
  text: 古今合璧事類備要後集卷六十三宋謝維新撰節使門承宣使歷代沿革唐中世以後節度使往往自擇將吏號為留後唐兵志本朝㳂唐制方鎮有節度觀察留後職略又官制舊典祖宗時留後惟宗室國馬戚自當叙遷若外官唯馬步軍都指揮使方就除焉軍帶留後步軍帶觀察餘無至者獨內臣任都知久次官至延福宫使景福殿使者方帶留後觀察皆為遙郡其外官遙郡止於防禦使而已政和七年詔觀察留後乃五季藩鎮官以所親信留主後務之稱不可循用可冠以軍名改為承宣使四朝志承宣觀察防禦團練使刺使為正任領他官者為遙郡淳熙重定令遙領者並止本官叙遷正任者次第轉行四朝志靖康元年臣寮言遙郡正任恩數遼絶自遙郡遷正任者合次第轉行今有自遙郡與落階官而授正任直超轉本等正官是皆奸巧希進躐取乞應遙郡承宣使有功勞除正任者止除正任刺史從之事類正任見㳂革亞節留臺之秩實丨丨施龍溪除皇叔祖仲明制延慶拜泰寧劉延慶丨丨丨軍承宣使自延慶始東都事略談稹除威武宣和二年詔兩浙制置使丨丨丨丨丨軍承宣使會要武著之高選夫自刺史而上皆丨丨丨丨丨茍非尤恩不以叙進况承流宣化名秩益顯尚思稱塞無或不祗張于湖陳靖轉遙郡承宣使制觀察使歷代㳂革唐貞觀初遣大使十三人巡省天下諸州水旱則遣使有巡察安撫之名神龍三年以五品以上二十人為十道巡察使察舉州縣再周而代景雲三年置十道按察使道各一人開元二年曰十道按察採訪處置使二十年曰採訪處置使分十五道天寶末入兼黜陟使乾元元年改曰觀察處置使唐職官志又事物紀原以為至道元年置觀察使與志不同當考掌察所部善惡舉大綱凡奏請皆屬於州嵗以八月考具治以豐稔為上考省刑為中考辨稅為下考唐百官志國朝㳂唐制置諸州觀察使凡諸衛將軍及使遙領者其資品並止本官叙防禦團練使刺使亦同祥符中詔觀察使並帶刺史翰林學士陳彭年言檢討唐以來故事觀察使並合帶刺史詔自今除觀察使可兼領之政和中詔承宣觀察使仍不帶持節等四朝志事類軺車以佐丨丨白集察判官制兵符操郡印而握丨丨假左軺而帖中憲同上廉使栁公綽為鄂嶽觀察使至安州刺史李聽以丨丨禮事之良師丨丨澄清白集授觀察使制連師白六帖節使持丨丨分郡節同上察俗觀風丨丨提綱丨丨振領同上廉察周以十聨率諸侯若今之丨丨也白集授觀察判官制又舒信道除皇叔制云進升廉察處置見㳂革採訪黜陟並同上言綾李德裕丨條丨賜鞭張封建為徐州觀察事有威儀唐貞元賜節度觀察使新制時服上曰觀察以鴈銜威儀取其行列有序冀牧人丨丨丨也威儀瑞草也為簡易宣宗時宰相語元和時治民孰第一周墀對曰臣常守江西韋丹有大功德被八州歿四十年老幼思之不忘乃詔上丹功狀刻功於碑後子宿亦丨江西觀察使政丨丨江西以為世官同上設鄉校常衮為福建觀察使閩人未知學衮至丨丨丨使作為文章親加勸導由是俗一變嵗貢士與肉刑等繕陴隍張建封為觀察使是時四方多故乃丨丨丨益治兵四鄙附恱希烈使掌帥捍卒來戰建封皆沮衄之無閉糴崔陵遷湖南觀察使湖南舊法雖豐年貿易不出境陵部災荒不恤陵至謂屬吏曰此豈人情乎丨丨丨以重困民削其禁自是商賈流行資物益饒蠲租錢衛次公為陜虢觀察使丨橫丨丨嵗三百萬詔褒揚李德裕為浙西觀察南方信機巫雖父母癘疾子棄不敢養德裕擇長老可語者諭以孝慈大倫數年惡俗大變又按屬州非經祠者毁千餘所撤私道山房千四百舍冦無所瘦天子丨丨丨表忠節張建封貞元四年為徐泗濠觀察使入覲德宗禮遇加等及還鎮賜詩又令賫所執鞭賜曰卿忠正節義嵗寒不移故以賜卿丨丨丨也闡使威明丨丨丨勤宣王命白六帖求人瘼丨丨丨分國憂同上夜登城吕元膺為御史中丞拜鄂嶽觀察使嘗丨丨丨守者不許左右曰中丞也對曰夜不可元膺乃還明日擢守者為太尉入拜尚書右丞夜决事崔咸遷陜虢觀察使日與賔客僚屬痛飲未嘗醒丨分乃丨丨裁剖精明吏稱為神德裕儉約李德裕為浙西觀察使初潤州承王國清亂竇易直傾府庫賚軍資用空丨丨自丨丨以留州財贍軍雖儉而均故士無怨每朞賦物充牣敬晦儉勤丨丨歷浙西觀察使時南方連饉有詔弛𣙜酒茗官用告乏丨丨丨丨資力遂充吏不敢罔沈𫝊師為江西觀察使徙宣州侍師於吏治明丨丨丨丨謹重刑法每斷獄召募府平處輕重盡合乃論决豪右畏戢韓佽纍遷桂觀察使部二十餘州自參軍至縣令三百員下車一吏持籍請補闕員佽下教曰須按籍取可任二之會春服使至鄉有豪猾厚進賄使者求為縣令佽召鄉豪責以撓法笞其背以令郡中自是丨丨丨丨美譽四騰吳湊為福建觀察使政勤清丨丨丨丨與宰相竇參有憾參數短毁又言湊風痺帝召還驗其疾非是繇是不直參惡俗大變見前詔褒揚下獻丹扆針唐敬宗荒僻日甚大臣罕得進言浙西觀察使李德裕身居廉鎮乃心王室遣使丨丨丨丨六首稱蘭亭唱元積為浙東觀察使遊會稽佳山水所辟職官皆當時文士副使竇鞏海內知名與元稹酬唱至今丨丨丨絶丨廉察諸侯丨丨丨丨糾繩列郡白集澄清郡邑丨丨丨丨鎮撫黎元同上出兵戍湖周墀徙江西觀察使劾齊部刺史剪補據賊丨丨丨彭蠡丨禁止剽劫厲兵睦鄰李勉徙江西觀察使丨丨丨丨平賊屯軍禮迎謁栁公綽丨丨丨丨聲樂不聞薛蘋易三鎮丨丨丨丨於家治第過制范𫝊正丨丨丨丨風績不立唐扶為福州觀察使濫殺人丨丨丨丨會卒奴婢爭財有司按其資至十餘萬宣埋輪之威丨丨丨丨丨布露冕之政白集委廉察之寄當至治之道丨丨丨丨丨同上俾觀風於廉察丨丨丨丨丨丨白集行薛伾制奉詔條以安人勞徠諸部綱紀列城丨丨丨丨丨參戎索以訓旅同上所辟幕職皆文士元稹為浙東觀察使會稽山水竒秀所辟幕職皆當時文士而鏡湖秦望之遊月三四焉舊唐史特系金魚示優恩陳堯咨自龍圗閣學士換觀察使自陳本儒生䝉陛下易以武辨所惜者腰下無金魚袋命丨丨丨丨以丨丨丨詩集犀芾金章稽山鏡水歡遊地丨丨丨丨榮貴身白居易賀元徽之除浙東觀察詩防禦使歷代㳂革唐武后聖厯元年以夏州鎮領防禦使防禦使之名自此始開元二年薛訥為隴右防禦使通監天寶中安祿山犯順大郡要地當賊衝者置防禦守捉使事物紀原又唐職官志云至德後置節度使大郡要害之地置防禦使以治軍事刺史兼之不賜節與紀原不同今兩存當考代宗即位諸州防禦使並停明年授田承嗣魏博等州都防禦使俄遷節度使蓋防禦使之名不廢也唐書大率防禦𨽻所治州嵗以八月考其治否以無虞為上考清苦為中考政成為下考唐職林本朝㳂唐制置諸州防禦使唐防禦使在團練使之下本朝升之於上職略云官制舊典防禦團練刺史均謂之正任外官初除管軍便帶正任刺史或隨其入見帶遙郡就除之其橫行諸司使帶遙郡防禦使者年勞至深邊功優異即落遙郡為正任官其團練使刺史則無法兹遙郡也以上應管軍臣寮因乞改軍職遂以本官出守或領副總管方有帶正印者其宗室國戚除再遷便領正任乃國朝舊制事類干城﨣﨣武夫公侯丨丨詩禦侮豫曰有丨丨詩又荆公除皇姪制宜進國位以稱禦侮重分憂晉天福四年絳州置防禦使額敕宜升禦侮之名以丨丨丨之寄續通典領防任丨丨兵丨之丨荆公除皇姪制朕之腹心唐代宗永泰二年制曰諸道節度觀察都防禦使丨丨丨丨升之軍禦升軍禦之任增使節之華胡文公行李希及制扞防之秩爰畀丨丨丨丨龍溪制間禦之任正名丨丨丨丨欒城除曹評制市馬益軍唐承詝宣宗擢為天德軍防禦使軍中馬乏虜來戰數負承訓罷冗費丨丨丨丨節用約己李景略苦寒地塉鹵邊尸勞瘁丨丨丨丨與士卒同甘苦鑿咸懋永清二渠溉田數萬頃儲廪器械畢具威令肅然聲雄勢彊回紇畏之德政詔撰國初李漢超為齊州防禦使郡人求為立丨丨碑太祖丨徐鉉丨文賜之邊功無敵真宗時楊畋字延昭為防禦使屢有丨丨天下稱為楊丨丨夷狄皆畫其像而事之團練使歷代㳂革肅宗乾元初置團練使守捉使大領十州小者三五州唐職林代宗時元當國令刺史悉帶團練使唐職林李少良𫝊大厯八年晉州男子郇謨欲以三十字上獻多譏切元載其言團者願罷諸州團練使少良尋為載所殺大率團練皆𨽻所治州嵗以八月考其治否以安民為上考懲姦為中考得情為下考唐百官志聖朝㳂唐制置諸州團練使職略事類刺舉仍假符於丨丨常集攝刺史制云重復楊綰奏刺史自有持節諸軍事以掌軍旅司馬古司武所以輔軍即今副使司兵參軍今團練判官官號丨丨可罷天下團練守捉使詔可訓練團結丨丨曲阜除皇叔祖克依制守捉見㳂革無檢操工部侍郎錢昱為鄂州團練使昱淑子也三州無善政至是郊祀進秩上謂宰相曰昱貴家子丨丨丨不宜任丞郎故有是命持軍簿肅綰戎團分丨丨丨詔公賜團練史吉戎團之列丨丨丨丨曲阜除曲珍制中權之御分總戎團蓋參丨丨丨丨王岐公除王道制兵團之制丨丨丨丨以訓練為事曲阜除皇兄制兵團之任甄進丨丨丨丨南豐除景青制團兵重任丨丨丨丨南豐擬制刺史此係載刺史事若內帶守字並見太守門更不重載歷代㳂革此即古太守之任也漢晉以來太守間以刺史稱唐武德元年改太守曰刺史加使持節從三品職同牧尹但有郡刺史亦有州刺史大抵以武臣帶焉本朝㳂唐制置諸州刺史事類嶽牧內有百揆四丨外有州丨侯伯書諸侯刺史古丨丨白六帖褰帷後漢賈琮為冀州刺史𫝊車垂赤帷裳珠升車丨丨曰刺史當逺視廣聽糾察善惡何反垂帷裳以自掩塞乎百姓聞之震栗行春郭伋字細侯為並州刺史丨丨赴竹馬童兒之期露章何武為楊州刺史所舉奏二千石長吏必先丨丨服罪為虧除免之而已墮淚晉羊祐字叔子為荆州刺史常登峴山及祐薨乃立碑峴山百姓見其碑莫不悲感號為丨丨碑廉威舒王元名歷五州刺史治石州二十年徙鄭州境接東畿諸王貴戚為刺史者縱家人暴百姓元名至一革之為治丨丨進加司空恩信姜謨仁杲擢泰州刺史帝曰昔人稱衣錦故鄉今以本州相授所以償功凉州荒凉冝有以靖之謨至撫邊俗以丨丨盜賊衰止廉平劉德威為綿州刺史政號丨丨百姓立石頌德悔過馮元常徙眉州刺史劍南有光火盜夜掠人晝伏山谷元常喻以恩信約丨丨自新賊相率脫甲面縳賴安薛登山為常州刺史屬宣州賊鍾大眼亂百姓潰震登嚴勒守備百姓丨丨卧治王及善神功元年契丹擾山東擢魏州刺史武后勞曰逆虜盜邊公雖病可與妻子行日三十里為朕卧治為屛蔽也嘉贊盧渙出為陜州刺史開元二十四年帝西還次陜丨其善政題丨於㕔事曰尊城之重分陜之雄亦既利物內有匪躬斯為國寶不墜家風褒慰尹思貞檢校洺州刺史會契丹孫璽榮亂朔方震驚思貞撫循境內獨無擾武后敕書丨丨自擇許景先開元十三年帝丨丨刺史景先由吏部侍郎為刺史治號州凡十一人治行詔宰相諸王御史以上袒道洛濵盛具奏太常樂帛舫水嬉命高力士賜許帝親書且給筆札令自賦賚絹三千遣之勞問盧從願下遷豫州刺史政嚴簡奏課為天下第一璽書丨丨賜絹百匹異行劉彚進歙州刺史野媪將為虎噬幼女呼號摶虎俱免觀察使韓滉表贊治有丨丨加金紫異政崔歡纍官至澧州刺史不為煩苛人便安之流亡還歸居二年增户數萬詔特進五階以寵丨丨浚渠李栖筠為常