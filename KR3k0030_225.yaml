body:
  text: 古今合璧事類偹要别集卷十九宋謝維新撰宫室門亭臺宫室舉要按劉熙釋名亭者停也言道路所舍人之所停集也臺者持也言其築土堅髙能自勝持也古人之名物莫不各有義存焉况亭臺乎後人創此以為暇日遊宴登臨之所未必皆能求古人之意惟適其適焉而已事類里亭五丨一短丨十里一長亭街亭洛陽二十街一丨十二丨二城門一亭漢職典泗上漢髙祖及壯試吏為丨丨亭長本紀蕪蔞光武至薊會王子接起兵薊中以應王郎城內擾亂秀促駕而出不敢入城邑舍食道傍至丨丨亭時天寒烈馮異上豆粥後漢馮異傳柯亭蔡雍宿丨丨屋以柯為椽雍盻曰良竹也取以為笛音聲獨絶白帖蘭亭永和九年歲在癸丑暮春之初會于會稽山隂之丨丨修禊事也此地有崇山峻嶺茂林修竹又有清流急湍映帶左右王羲之記采霞天寶時詔兩神策治曲江昆明作丨丨亭詔公卿得列舍堤上孔帖沈香唐元宗一日坐丨丨亭子意有所感欲得李白為樂章召入而白已醉左右以水頮面稍解授筆成文婉麗精切唐白傳芙蓉丨丨亭在永州龍興寺多木丨丨故名桞宗元有詩柳文巽公院五詠賞心唐楊州有丨丨亭今不復見孔帖精思唐李德裕所居安邑里第有丨丨亭每計大事則處其中本傳勞勞丨丨亭在江寧縣南十五里古送别之所一名臨滄觀李白丨丨亭歌注題休休司空圖本居中條山王官谷有先人田遂隱不出作亭觀素室悉圖唐興節士文人名亭曰丨丨作文以見志曰休美也既休而美具故量才一宜休揣分二宜休耄而聵三宜休又少也墮長也率老也迂三者非濟時用則又宜休因自目為耐辱居士其言詭激不常以免當時禍災云唐本傳鈞臺夏啓有丨丨之享注啓禹子河南陽翟縣南有丨丨陂蓋啓享諸侯於此左昭四年靈臺丨丨民始附也云云經始丨丨經之營之庶民攻之不日成之詩瑶臺商紂作丨丨殫百姓之財通鑑外紀鹿臺紂造丨丨為瓊室玉門其大三里髙千尺七年乃成厚賦斂以實丨丨之錢同上新臺丨丨刺衛宣公也納伋之妻作丨丨于河上而要之詩觀臺春王正月辛亥朔日南至公既視朔遂登丨丨以望而書注丨丨臺上搆屋可以逺觀者也左僖五年築郎丨臺于丨注刺奢且非土功之時左莊三十年築薛丨臺于丨注薛魯地築秦丨臺于丨注東平范縣西北有秦亭並同上蛇出文十六年有蛇自泉宫出入于國如先若之數秋八月辛未聲姜薨毁泉臺注魯公以為蛇妖所出而聲姜薨故壞之左鳯集蕭史與弄玉吹簫於臺上感丨丨弄玉秦穆公女也白帖九層晉靈公造丨丨臺三年不成人力困敝出令敢諫者斬荀息進曰臣能纍十二棊子加九卯於上公曰危哉息曰不危公造臺三年不成男不耕女不纎亦甚危矣公遵止事見說苑五仞楚莊王築丨丨之臺同上三休楚王誇客以章華之臺登之丨丨乃至其上白帖彈人晉靈公不君厚斂以雕墻從臺上丨丨而觀其辟丸也左宣二年妨農宋皇國父為平公築臺丨於丨取子罕請俟農功之畢築者謳曰澤門之晢實興我役邑中之黔實慰我心子罕聞之執朴抶其不勉者曰吾儕小人皆有闔廬以避燥涇寒暑今君為一臺而不速成何以為役君子謂子罕能分謗左襄十七年章華楚靈王為丨丨之臺與伍舉登焉曰臺美矣夫對曰先君莊王為匏居之臺髙不過望國氛大不過容燕豆人不廢時務官不易朝常今君為此臺人罷財盡數年而成諸侯莫至若君謂此美楚其殆矣乂曰先王之臺榭也榭不過講軍實臺不過望氛祥故榭度於大卒之居臺度於臨觀之髙𢋫磽之地於是乎為之四時之隙於是乎成之國語楚子成丨丨之臺願與諸侯落之左姑蘇吳王夫差破越越敗乃進西施請退軍歸越吳王許之吳王既得西施甚寵之為築丨丨臺髙三百丈遊宴其上伍子胥諌曰臣恐丨丨臺不久為麋鹿之遊吳王不聽置千金燕昭王丨丨丨於臺上以延天下士謂之黃金臺白帖計百金漢文帝欲起露臺召匠丨之直丨丨曰百金中人十家之産何以臺為本贊望思臺上憐太子無辜乃為歸來丨丨之丨於湖天下聞而悉之注太子死於湖通鑑武帝紀通靈臺鈎弋夫人從至甘泉而卒尸香聞十餘里葬雲陽武帝思之起丨丨丨於甘泉宫有一青鳥集臺上往來至宣帝時乃不至王褒雲陽記相如琴臺在成都府華陽縣市橋西寰宇記在浣花溪云海安寺南今為金花寺城南非其舊成都志子陵釣臺在嚴州嚴光披羊裘釣澤中今釣臺見存多名賢留題狀西白虎曲陽侯王根作漸臺丨丨丨丨白帖相風銅烏長安宫南有靈臺髙十五仞上有丨丨丨丨遇風乃動郭延生述征記鬪雞走狗漢長樂宫有丨丨臺丨丨臺望鵠眺蟾未央宫有丨丨臺丨丨臺並三輔黃圖創文昌臺李昭德武后營神都昭德規丨丨丨丨標置華壯孔帖築望仙臺栁仲郢武宗延方士丨丨丨丨纍諌諄切同上蜚觀聮屬長寧宫主廢永昌縣主丐其治為府以地瀕洛築障之崇臺丨丨相丨丨孔六帖野服蕭散裴度治第東都集賢里作别墅其燠館凉臺號緣野堂激波其下度丨丨丨丨本傳懷古莫測杜甫少與李白齊名嘗從白及髙適遇汴州酒酣登吹臺慷慨丨丨人丨丨也孔帖屬酒為别李軌敗歎曰人心去矣天亡我乎携妻子上玉女臺丨丨丨丨安修仁執送之島上凝霞唐大宗中日本國王子來朝云本國之東三萬里有集真島丨丨有丨丨臺臺上有手談池池中有玉棊子不由制度自然黑白分明杜陽編道旁獻雉唐明宗入汴莊宗與元行欽登丨丨冡置酒相顧江野人丨丨問其冡名曰愁臺因罷酒去五代史賈至秋興亭記在陽而舒在隂而慘性之常也履險而栗涉易而秦情之變也觀揖讓而退臨交戰而競目之感也聞韶濩而和聆鄭衛而靡耳之動也夫其舒則洽慘則悴栗則止泰則通退則無咎競則有悔和則安樂靡則憂危性情耳目優劣若此故君子慎居處謹視聽焉今沔州刺史賈載吾家之良也理馮州未朞月而政和於訟堂之西因髙傋宇不出庭户在雲霄矣却負大别之固附視滄海之浸閲吳蜀樓船之殷鍳荆衛藪澤之大亦有㫖哉性得情適耳虛目開且處動則倦理倦莫若靜處靜則明惟明以理動窮則變變則通通則久今沔州靈府恬而神用爽政以是和觀其前户後牖順開闢之義簡也上棟下宇無雕琢之飾儉也簡近於智儉近於仁仁智居之何陋之有况乎當發生之晨則攢秀木於髙砌見鶯其鳴矣處臺榭之月則納清風於洞户見暑之徂矣在搖落之時則俯皓氣於軒檻見火之流矣值嚴凝之節則棲同雲於扃闥見雪之紛矣政成訟清體安心逸而詩人之興常在常時之興秋興最髙因以命亭焉豫自巴丘徴赴宣室歇鞍棠樹之側解帶竹林之下加其俯仰美其動息乃命進牘抽毫志之李白勞勞亭詩天下傷心處勞勞送客亭春風知别苦不遣栁條青李白姑熟亭序通驛公館南有水亭焉四薨翬飛巉絶浦嶼蓋有前攝今河東薛公棟而宇之今宰隴西李公明化開物成務又橫其梁而閣之畫鳴閒琴夕酌清月蓋為接輶軒祖逺客之佳境也製置既久莫知何名司馬武公長材博古獨映方外因據胡牀岸幘嘯咏而謂前長史李公及諸公曰此亭跨姑熟之水可稱謂姑熟亭焉嘉名勝概自我作也且夫曹官紱冕者大賢處之若遊青山臥白雲逍遙偃傲何適不可小才居之窘而自拘悄若桎梏則清風朗月河英嶽秀皆為棄物安得稱焉所以司馬南鄰當文章之旗鼓翰林客卿揮辭鋒以戰勝名教樂地無非得俊之場也千載一時言詩紀志李白西候亭頌惟十有四載皇帝以歲之驕陽秋五不稔乃慎擇明牧恤南方凋枯伊四月孟夏自淮隂遷我天水趙公作藩于宛陵祗明命也惟公代秉天憲作程南臺洪柯大本聿生懿德宜乎哉橫風霜之秀氣欎王霸之竒略初以鐡冠白筆佐我燕京威雄振肅虜不敢視而後鳴琴二邦天下取則起草三省朝端有聲天子識面宰衡動聽殷南山之雷剖赤縣之劇强項不屈三州所居大化咸列碑頌至於是邦也酌古以訓俗宣風以布和平心理人兵鎮唯靜盡一千里時無莠言退公之暇清眺原隰以此郡東塹巨海西襟長江咽三吳扼五嶺輶軒錯出無旬時而息焉出自西郭蒼然古道道寡列樹行無清隂至有疾雷破山狂颷震壑炎景爍野秋霖灌途馬逼惻於谷口人周章於山頂亭候靡設逢迎闕如自唐有天下作牧百數因循齷齪罔恢永圖及公來思大革前弊實相此土陟降觀之壯其回岡龍盤沓嶺波起勝勢交至可以有作方農之隙廓如是營遂鏟崖堙卑驅石剪棘削汚壤階髙隅以門以墻乃棟乃宇儉則不陋麗而不奢森沈閈閎燥溼有庇若鳬之勇如鵬斯騫縈流鏡轉涵映池底納逺海之餘清㵼蓮峯之積翠信一方雄勝之郊五馬踟蹰之地也長史齊公光艾人倫之儀表司馬武公幼成衣冠之髦彥録事參軍吳鎮宣城令崔欽令德之後良材閒生縱風教之樂地出人倫之髙格卓絶映古清明存躬僉謀僝功不日而就總是役也伊二公之力歟過客沈吟以稱嘆邦人聚舞以相賀僉曰我趙公之亭也羣寮獻議請因謡頌以名之則必與謝公此亭同不朽矣白以為謝公德不及後世亭不留要衝無勿拜之言鮮登髙之賦方之今日我則過矣敢謁耆老而作頌曰張耽耽髙亭趙公所營如鼇背突兀於太清如鵬翼開而欲行趙公之宇千載有覩必恭必敬爰遊爰處瞻而思之罔敢大語趙公來翔有禮有章煌煌鏘鏘如文翁之堂清風洋洋永世不忘韓愈燕喜亭記太原王𢎞中在連州與學佛人景常元慧游異日從二人者行於其居之後丘荒之間上髙而望得異處焉斬茅而嘉樹列發石而清泉激輦糞壤燔椔翳却立而視之出者突然成丘陷者呀然成谷窪者為池而缺者為洞若有鬼神異物隂來相之自是𢎞中與二人者晨往而夕忘歸焉乃立屋以避風雨寒暑既成愈請名之其丘曰俟德之丘蔽於古而顯於今有俟之道也其石谷曰謙受之谷瀑曰振鷺之瀑谷言德瀑言容也其土谷曰黃金之谷瀑曰秩秩之瀑谷言容瀑言德也洞曰寒居之洞志其入時也池曰君子之池虛以鍾其美盈以出其惡也泉之源曰天澤之泉出髙而施下也合而名之以屋曰燕喜之亭取詩所謂魯侯燕喜者頌也於是州民之老聞而相與觀焉曰吾州之山水名天下然而無與燕喜者比經營於其側者相接也而莫直其地凡天作而地藏之以遺其人乎𢎞中自吏部郎貶秩而來次其道途所經自藍田入商洛涉淅湍臨漢水井峴首以望方城出荆門下岷江過洞庭上湘水行衡山之下繇郴踰嶺猿狖所家魚龍所宫極幽遐瑰詭之觀宜其於山水飫聞而厭見也今其意乃若不足傳曰智者樂水仁者樂山𢎞中之德與其所好可謂協矣智以謀之仁以居之吾知其去是而羽儀於天朝也不逺矣遂刻石以記柳宗元茅亭記冬十月作新亭于焉退山之陽因髙丘之阻以面勢無薄櫨節梲之華不斫椽不剪茨不列墻以白雲為藩籬碧山為屏風昭其儉也是山崒然起於蒼莽之中馳奔雲矗亘數十百里尾蟠荒陬首注大溪諸山來朝勢若星拱蒼翠詭狀綺綰繡錯蓋天鍾秀於是不限於遐裔也然以壤接荒服俗參夷徼周王之馬跡不至謝公之屐齒不及巖徑蕭條登探者以為嘆歲在辛卯我仲兄以方牧之命試于是邦夫其德及故信孚信孚故人和人和故政多暇由是嘗徘徊此山以寄勝槩乃塈乃塗作我攸宇於是不崇朝而木工告成每風止雨收煙霞澄鮮輒角巾鹿裘率昆弟友生冠者五六人步山極而登焉於是手揮絲桐目送還雲西山爽氣在我襟袖以極萬類攬不盈掌夫美不自美因人而彰蘭亭也不遭右軍則清湍修竹蕪沒於空山矣是亭也僻介閩嶺佳境罕到不書所作使盛跡鬱堙是貽林澗之愧故志之柳宗元東亭記出州南譙門左行二十六步有棄地在道南南值江西際垂楊傳置東曰東館其內草木猥奧有崖谷傾亞缺圮豕得以為囿蛇得以為藪人莫能居至是始命披刜蠲疏樹以竹箭松柳桂檜柏杉易為堂亭峭為杠梁下上徊翔前出兩翼馮空拒江江化為湖衆山橫環嶛闊瀴灣當邑居之劇而忘乎人間斯亦竒矣乃取館之北宇右闢之以為夕室取傳置之東宇左闢之以為朝室又北闢之以為隂室作屋於北墉下以為陽室作斯亭於中以為中室朝室以夕居之夕室以朝居之中室日中而居之隂室以違溫風焉陽室以違凄風焉若無寒暑也則朝夕復其號既成作石于中室書以告後之人庶勿壞元和十二年九月某日柳宗元記歐陽修豐樂亭記修既治滁之明年夏始飲滁水而甘問諸滁人得於州南百步之近其上則豐山聳然而特立下則幽谷窈然而深藏中有清泉滃然而仰出俯仰左右顧而樂之於是疏泉鑿石闢地以為亭而與滁人往遊其間滁於五代干戈之際用武之地也昔太祖皇帝嘗以舟師破李景兵十五萬於清流山下生擒其將皇甫睴姚鳯於滁東門之外遂以平滁修常考其山川按其圖記升髙以望清流之關欲求暉鳯就擒之所而故老皆無在者蓋天下之平久矣自唐失其政海內分裂豪傑並起而爭所在為敵國何可勝數及宋受命聖人出而四海一向之慿恃險阻剗削消磨百年之間漠然徙見山髙而水清欲問其事則遺老盡矣今滁介於江淮之間舟車商賈四方賔客之所不至民生不見外事而安於畎畝衣食以樂生送死而孰知上之功德休飬生息涵煦百年之深也修之來此樂其地僻而事簡又愛其俗之安閒既得斯泉於山谷之間乃日與滁人仰而望山俯而聽泉掇幽芳而䕃喬木風霜氷雪刻露清秀四時之景無不可愛人幸其民樂其嵗物之豐成而喜與豫遊也因為本其山川道其風俗之美使民知所以安其豐年之樂者幸生無事之時也夫宣上恩德以與民共樂刺史之事也遂書以名其亭歐陽修醉翁亭記環滁皆山也其西南諸峯林壑尤美望之蔚然而深秀者琅琊也山行六七里漸聞水聲潺潺而㵼出于兩峯之間者釀泉也峯回路轉有亭翼然臨于泉上者醉翁亭也作亭者誰山之僧曰智仙也名之者誰太守自謂也太守與客來飲于此飲少輒醉而年又最髙故自號曰醉翁也醉翁之意不在酒在乎山水之間也山水之樂得之心而寓之酒也若夫日出而林霏聞雲歸而巖穴暝晦明變化者山間之朝暮也野芳發而幽香佳木秀而繁隂風霜髙潔水落而石出者山間之四時也朝而往暮而歸四時之景不同而樂亦無窮也至于負者歌于塗行者休于樹前者呼後者應傴僂提擕往來而不絶者滁人遊也臨溪而漁溪深而魚肥釀泉為酒泉香而酒冽山殽野蔌雜然而前陳者太守宴也宴酣之樂非絲非竹射者中奕者勝觥籌交錯起坐而喧譯者衆賔歡也蒼顔白髮頽乎其間者太守醉也已而夕陽在山人影散亂太守歸而賔客從也樹林隂翳鳴聲上下遊人去而禽鳥樂也然而禽鳥知山林之樂而不知人之樂人知從太守遊而樂而不知太守之樂其樂也醉能同其樂醒能述其文者太守也太守謂誰廬陵歐陽修也曽子固醒心亭記滁州之西南泉水之涯歐陽公作亭曰豐樂自為記以見其名之意既又直豐樂之東築亭曰醒心而望以見夫群山之相環雲煙之相滋曠野之無窮草木衆而泉石嘉使目新乎其所覩耳新乎其所聞則其心灑然而醒更欲久而忘歸也故即其所以然而為名取韓子退之北湖之詩云噫其可謂善取樂於山泉之間而名之以見其實又善者已雖然公之樂吾能言之吾君優游而無為於上吾民給足而無憾於下天下之學者皆為材且良夷狄鳥獸草木之生者皆得其宜公樂也一山之隅一泉之旁豈公樂哉乃公之所以寄意於此也若公之賢韓子殁數百年而始有之今同遊之賔客尚未知公之難遇也後百千年有慕公之為人而覽公之迹思欲見之有不可及之嘆然後知公之難遇也則凡同游於此者其可不喜且幸歟而鞏也又得以文辭託名於公文之次其又不喜且幸歟程伯淳顔樂亭銘天之生民是為物則非學非師孰覺孰識聖賢之分古難其明有孔之遇有顔之生聖以道化賢以學行萬世心目破昏為醒周爰闕里惟顔舊止巷汚於榛井堙而圯鄉閭蚩蚩弗視弗履有卓其誰師門之嗣追古念今有惻其心良賈善諭發帑出金巷治以闢井泄而深清泉澤物佳木成隂載基載落亭曰顔樂昔人有心豫忖豫度千載之上顔惟孔學百世之下顔居孔作盛德彌光風流日長道之無疆古今所常水不忍廢地不忍荒嗚呼正學其何可忘楊廷秀山月亭記豫昨日偶出山間入州府友人王信臣迓豫於中路約豫過其家觀所謂山月亭者日已旴未遑也詰朝夙興出永豐門西走九曲謁親舊皆寂寂門未啓則反而南謁信臣門啓矣豫入坐賔階有傾信臣攬衣猝猝而出是時風雨昏昏濘淖沒膝豫語信臣曰今日遂有遺恨鄉也山月亭不逺五十里見我於圖畫之中今也尺有咫乃隔我於風雨之外信臣曰先生毋恨則前行導豫徑其家繞出屋後折而左度修廡陟穹巘有亭若在天半掀然孤巉者山月也豫且喜且喟曰尚有遺恨已識王仲祖未見杜𢎞冶所謂雲端臺者焉在信臣指前簷三十許武石欄屹起階齒層出者曰此是已雨小霽欣然登焉直下百尺壁立如削闤闠數萬家如在井底下視膽悼遐矚神曠乃知此亭面勢宅一城髙絶之地無可與侔其前峭秀而邃蔚者青原也其左突出而翼截者東山也其右首下而凥髙者拜相山也其下橫厲而皎空者白鷺江水也周覽未至驚風歘起林木呌呼大波怒跳翻倒城市前山皆動諸峯相角清寒入骨不可復立亟歸亭上豫蓋喜且喟曰尚有遺恨今夕無月紹熙四年月日誠齊野客楊某記曽子固擬峴臺記尚書司門貟外郎晉國裴君治撫之二年因城之東隅作臺以遊而命之曰擬峴臺謂其山溪之形擬乎峴山也數與其屬與州之寄客者遊而問獨求記於豫初州之東其城因大丘其隍因大溪其隅因客土以出溪上其外連山髙陵野林荒墟逺近髙下壯大閎廓怪竒可喜之觀環撫之東南者可坐而見也然而兩隳潦毁蓋藏棄委於榛襲茀草之間未有即而愛之者也君得之而喜增甓與土易其破缺去榛與草發其亢爽繚以橫檻覆以髙甍因而為臺以脫埃氛絶煩囂出雲氣而臨大風然後溪之平沙漫流微風逺響與夫浪波洶湧破山拔木之奔放至於髙桅徑櫓沙禽水獸下上而浮沈者皆出乎履舄之下山之蒼顔秀壁巔崖拔出挾光景而薄星辰至於平岡長陸虎豹踞而龍蛇走與夫荒蹊聚落樹隂暗曖遊人行旅隱見而繼續者皆出乎袵席之內若夫雲煙開斂日光出沒四時朝莫雨暘明晦變化之不同則雖覽之不厭而雖有智者亦不能窮其狀也或飲者淋漓歌者激烈或靚觀微步旁皇徙倚則得於耳目與得之於心者雖所寓之樂有殊而亦各適其適也撫非通道故貴人冨賈之遊不至多良田故水旱螟􅀈之菑少其民樂於耕桑以自足故牛馬之牧於山谷者不收五榖之積於郊野者不垣而晏然不知枹鼓之驚發召之役也君既因其土俗而治以簡靜故得以休其暇日而寓其樂於此州人士女樂其安且治而又得遊觀之美亦將同其樂也故豫為之記其成也吕祖謙撰釣臺記由東陽江而下徑新定郡五十里得嚴陵瀨蓋東漢嚴先生遁世不屈耕釣於富春山後人因以名其瀨也孫吳折富春為桐廬是瀨亦來屬焉顧野王輿地志曰桐廬縣南有嚴子陵漁釣處石上平可坐十人名為釣壇即今紀之釣臺也獨兩臺對峙野王所不紀蓋亦粗言之耳明道二年范文正公自右司諫守是邦始築屋祠先生而為之記瀨之旁白雲源乃唐詩人方處士故廬文正公之遊釣臺也嘗絶江訪其遺跡以其象置祠之左文正公沒郡人思之遂侑食於右坐焉歲祀浸逺此意弗嗣淳熙五年侍郎蕭公出鎮道祠下慨然曰國家稽用唐武德舊典姓是州為嚴則先生之祠乃名教之首頽圯若是可乎顧急於民瘼未暇也居二年政成化洽以餘錢新之時抱病廢臥旁郡公以書見諉記其成固辭不可乃復於公曰方王氏移國以光武之大志先生之髙氣相與共學夫豈區區呻吟呫嗶之末哉漢官威儀既復薄海內外臣子之責皆塞矣亦何必奮臂其間哉沒身丘壑固先生之素尚也帝眷焉有懷俾以形旁求於天下得非在廷諸臣奉令承教之不給未有當帝意者耶三聘而至車駕即日幸其館勉其相助為理所以處先生不薄矣匪徒屈萬乘之重為故人之光寵也先生雖以巢由自命視一世若不足以浼之觀與侯霸尺牘劆切之意見於言外豈於帝惓惓未能忘邪浩然而歸使人主有終身瞻望不及之嘆施及後世賔友耆俊遂為家法士之聞風興起者堅節正操見危授命項背相望其有益人之國與朝夕獻納雲臺之下者未知其孰多孰少也枝必類本響必報聲使先生微有名於傲世立名一再傳之後且將為西晉之清虛矣而東京之俗久而益勵名檢之外綜理幹略亦往往髙出後世沂其流而尋其源則建武之髙節孰可訾邪至於節義之弊變為亢激特上無建用皇極之君均調消息之爾非造端者之過也後先生千年文正公來主斯地祀典始舉曠百世而相感者固自不常遇耶今公作牧復大葺祠宇以續前人之緒繼自今以往泝江下上者欵門而心開升堂而容肅披清風濯寒泉哦山髙水長之詩政足樂也則公豈專為一邦勸哉祠之前則羊裘軒其東則客星閣招隱堂岸立表以識路繚山作亭以待憩或革或因面勢位置各有思致皆受成於公以非大指所存故不詳列主其役者司户參軍吳桂蘇子瞻九成臺銘自秦并天下滅禮樂韶之不作蓋千三百二十有三年其器存其人亡則韶既已隱矣而况於人器兩亡而不傳雖然韶則亡矣而有不亡者存蓋常與日月寒暑晦冥風雨並行乎天地之間世無南郭子綦則耳未嘗聞地籟也而况得聞天籟使耳聞天籟則凡有形有聲者皆吾羽旄干戚管磬匏絃嘗試與子登夫韶石之上舜峯之下望蒼梧之渺莽九嶷之聨綿覽觀山川之吞吐草木之俯仰鳥獸之鳴號衆竅之呼吸往來唱和非有度數而均節自成者非韶之大全乎蘇子瞻凌虛臺記臺因南山之下宜若起居飲食與山接也四方之山莫髙於終南而都邑之最麗者莫近於扶風以至近求最髙其勢必得而太守之居未嘗知有山焉雖非事之所以損益而物理有不當然者此凌虛之所為築也方其未築也太守陳公杖履逍遙於其下見山之出於林木之上者纍纍如人之旅行於墻外而見其髻也曰是必有異使工鑿其前為方池以其上築臺出於屋之簷而止然後人之至於其上者恍然不如臺之髙而以為山之踊躍奮迅而出也公曰是宜名凌虛以告其從事蘇軾而求為之記軾復於公曰物之廢興成毀不可得而知也昔者荒草野田霜露之所䝉翳狐虺之所竄伏方是時豈知有凌虛臺耶廢興成毁相尋於無窮則臺之復為荒草野田皆不可知也嘗試與公登臺而望其東則秦穆公之祈年槖泉也其南則漢武之長楊五柞而其北則隋之仁夀唐之九成計其一時之盛宏傑詭麗堅固而不可動者豈特百倍於臺而已哉然而數世之後欲求其倣佛而破瓦頽垣無復存者既已化為禾黍荆棘丘墟隴畒矣而况於此臺歟夫臺猶不足恃而况於人事之得喪忽往而忽來者歟而或者欲以誇世而自足則過矣蓋世有足恃者而不在乎臺之存亡也既已言於公退而為之記陳希亮字公弼天資剛正人也嘉祐中知鳯翔府事東坡初擢制科僉書判官事吏呼蘇賢良公弼怒曰府判官何賢良也杖其吏不顧或謁入不得見又為中元節不過㕔罰銅八斤東坡作府齊醮禱祈請小文公弼必塗改至為公作凌虛臺記末云人事得喪數語公弼覽之笑曰吾視蘇明允猶子也某猶孫子也平日故不以辭色假之者以其年少暴得大名懼夫滿而不勝也乃不吾樂耶不易一字亟命刻之石聞見後詩集尋花到元戎小隊出郊坰問柳丨丨丨野亭杜接葉製丨丨丨茅亭杜髙柟到芰荷亭深丨丨丨杜帶蒹葭亭古丨丨丨杜入翠微華亭丨丨丨杜俯朱檻新亭丨丨丨佳木間芙蓉柳芙蓉亭野望時坦腹江亭暖長吟丨丨丨杜人知處自有丨丨丨那無步往蹤莫教安四壁面面看芙蓉韓渚亭臨池好丨丨丨驛亭杜戀月留丨丨丨虛亭韓隨髙下臺亭丨丨丨敞豁當清川杜逈嵳峩臺亭林表丨丨丨賈島倚檻看江郭帶林巒津亭丨丨丨水風蒲葉戰沙雨鷺絲寒晚木初雕柳秋叢欲敗蘭哀猿自相呌鄉淚好無端盧拱盡日坐東亭丨丨丨誰伴寂寥身緑樹為佳客紅蕉當美人笑言雖不接情肰似相親若不悠悠想如何度晚春白居易詩黃鶯久住好是春風湖上亭栁條藤蔓繫離情丨丨丨丨渾相識欲别頻啼四五聲戎昱朱門深鎖丨丨丨丨春池滿岸落薔薇水浸莎畢竟林塘誰是主主人來少客來多白居易折波分瀨激水自山椒丨丨丨淺丨回環疑古篆詰曲如縈帶寧訴羽觴遲唯貪親友會欲知中聖處皎月臨松蓋李德裕流杯亭涼月照窗舉目縱然非我有思量似在故山時鶴盤逺勢投孤嶼蟬曵殘聲過别枝丨丨丨丨欹枕倦澄泉繞石泛觴遲青雲未得平行去夢到江頭身在兹方干新篁添夏影子美寄我滄浪吟邀我共作滄浪篇滄浪有景不可到使我東望心悠然荒灣野水氣象古髙林翠阜相回環丨丨抽笋丨丨丨老枿亂發爭春妍水禽閒暇事髙格山鳥日夕相啾喧不知此地幾興廢仰視喬木皆蒼煙堪嗟人迹到不逺雖有來路曽無緣窮竒極怪誰似子搜索幽隱探神仙初尋一徑入蒙密豁見異境無窮邉風髙月白最宜夜一片瑩淨鋪瓊田清光不辨水與月伹見空碧涵漪漣清風明月本無價可惜祗賣四萬錢又疑此境天乞與壯士憔悴天應憐鴟夷古亦有獨往江湖波濤渺翻天﨑嶇世路欲脫去反似身試蛟龍淵豈如扁舟任飄瓦紅蕖緑浪搖醉眠丈夫身在豈長棄新詩美酒聊窮年雖然不許俗客到莫惜佳句人間傳歐陽永叔滄浪亭詩曉日浮波影水繞山堂竹映橋偶來塵意已潜銷最憐丨丨丨丨丨滿壁煌煌玉電搖劉彥冲臺指中天層臺丨丨丨謝面層陂髙臺丨丨丨杜引細風春臺丨丨丨杜惟種竹古淡亭臺丨丨丨古詩先得月近水樓臺丨丨丨古詩鳯凰遊鳯凰臺上丨丨丨鳯去臺荒江自流李白禾黍繁臺欣丨丨丨李白登金陵冶城白鳥飛瘦藤挂破風煙上乞與遊人眼豁開不知眼界闊多少丨丨丨尺青天回山谷題大雲寺觀臺爽鳩樂寂寞畨君後光華帝子來千年餘故國萬事只空臺日月東西見湖山表裏開從知丨丨丨莫作雍門哀朱元晦登定王臺古今合璧事類偹要别集卷十九
