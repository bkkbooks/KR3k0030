麗華六妃六儀四美人七才人而尚宫尚儀尚服各三參合前號大抵踵周官相損益云唐后妃傳序謡誦楊妃楊貴妃寵幸時謡曰男不封侯女作妃君看女却作門楣楊妃外傳詔立張妃肅宗立張貴妃為后詔曰總紳清禁執纉彤闈柔儀冠於六宮恵問光於四海中㕘鶴鼎嘗親主饋之勞外當熊檻每徇忘軀之節唐書為半面粧梁元帝徐妃無容質以帝眇一目毎知帝將至必丨丨丨丨以俟帝帝見則大怒而出南史號花見羞唐明宗淑妃王氏丨丨丨丨五代史貴妃冊印國朝丨丨丨用竹簡長一尺一寸濶一寸用二十四枚丨用金方一寸龜鈕紫綬會要貴妃服飾服以褕翟之衣青質表紗中單黼領朱褾襈蔽膝大帶以青加革帶青韈青舄玉佩錦綬首飾用花釵寳鈿凖花之數施二博鬢同上宫嬪事類貫寵丨魚以宫人丨無不利象曰以宫人寵終旡尤也易剥卦餘星中宫天極後四星其一為正妃丨三丨後宫之屬史六宫丨丨鄭注前一宫後一宫也五者后一宫三夫人一宫九嬪一宫二十七世婦一宫八十一御妻一宫凡百三十人周禮九御以陰禮教六宫以陰禮教九嬪以婦職之法教丨丨内宰齊多内寵丨桓公丨丨丨有如夫人者六人左傳漢號内職漢因秦制正嫡曰皇后其餘内職有夫人美人良人八子七子長使少使之號武帝加婕妤娙娥容華充衣元帝加昭儀又有五官順常无涓共和娯靈寳林良使夜者之小職漢外戚傳美人綵女光武中興並省前制正嫡之外唯立貴人丨丨丨丨之號范氏後漢書昭華修儀魏武帝因西漢置夫人昭儀婕妤容華美人文帝增貴嬪淑媛修容順成良人明帝增淑妃丨丨丨丨魏志不妄登車齊孝公孟姬葉氏之女從孝公遊車奔姬墮車碎孝公使駟馬立車載姬姬泣曰妾聞妃下堂必從傅母保阿進退則鳴玉佩環今立車无軿非敢受命列女傳能諫遊獵楚莊王夫人樊姬王好獵姬數諫不止乃不食禽獸之肉二年王感之而勤政事列女傳越姬楚昭王之姬越王勾踐女也昭王讌遊越姬從謂姬曰樂乎對曰樂則樂矣而不可久也王曰願與子生死若此姬曰君之樂遊要妾以死不敢聞命列子棄魚自喻魏王與龍陽君共船而釣得十餘魚而棄之泣下曰臣始得魚甚喜後得益多而大欲棄前所得也今臣得拂枕席爵至人君四海之内美人甚多聞臣得幸畢褰裳而趍臣亦同所得魚將棄矣得無涕乎王乃令曰敢言美人者族掩鼻進讒魏王遺楚美人王悦之夫人鄭褏知王之悦之也愛之甚於王王曰婦人所以事夫者色也而妬者其情也今鄭褏知寡人之所悦其愛甚於寡人此孝子所以事親忠臣所以事君也鄭褏既知王以為不妬因謂美人曰王愛子甚矣然惡子之鼻子見王必掩其鼻美人從之王謂鄭褏曰美人見寡人必丨其丨何也對曰似惡聞王之臭王曰悍哉今劓之賜象牙簟武帝以象牙簟丨夫人取玉搔頭武帝過李夫人就丨丨簮丨丨自此宮人搔頭皆用玉焉善舞見幸漢武帝李夫人本以倡進兄延年生知音丨歌丨每為新聲延年侍上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寕不知傾城國佳人不再得帝歎息曰善哉世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是幸生一男是為昌邑哀王漢書圖形遣嫁王嬙字昭君正穣女漢元帝時匈奴入朝詔以昭君配之號寕胡閼氏一説元帝後宫人既多不得常見乃使畫工丨其丨按圖召幸宫人皆賂畫工多者十萬金少者不減五萬金昭君自恃其貌獨不與及匈奴入朝選宫人配之昭君以圖當行入辭光彩射人竦動左右天子重信外國悔恨不及窮案其事有畫工毛延夀為人形老少必得其真安陵陳敞新豐劉白龔寛並工狗馬衆勢人形不逮延夀杜陵楊望樊青尤工布色皆同日棄市籍其資財漢人憐昭君逺嫁為作歌詩後昭君服毒死舉國葬之胡中胡地白草而此草獨青故曰青塜漢書當難直前漢元帝幸虎圏鬪獸熊突出圈攀檻欲上馮婕妤直前當熊而立上問何故對曰猛獸得人而止妾恐熊至御坐故身當之漢書同輦固辭成帝初即位班婕妤選入後宫成帝遊後庭嘗欲與班婕妤同輦載婕妤辭曰觀古圖畫賢聖之君皆有名臣在側三代昏主乃有嬖妾乃欲丨丨得無近似乎上善其言而止為新興髻馮萬金善歌世事江都王王孫女嫁江都中尉趙曼萬金又事曼因與主通曼有疾不能近婦人主有身恐乃稱疾居王宫一産二女歸之萬金長曰宜主次曰合徳遂冒姓趙氏宜主聰悟善行氣術長而纎細舉止翩然謂之飛燕合徳膚滑出浴不濡善歌知音皆絶色也樊嬺進言合徳容貌帝召入宫合徳新沐膏九逥沉水香丨卷髪號丨丨丨為薄眉號逺山黛施小朱號慵來粧左右嘖嘖嗟賞帝謂合徳為温柔鄉曰吾老是鄉矣不能效武帝求白雲鄉也宣帝時披香博士淖方成白髮教授宫中號淖夫人在帝後唾曰此禍水也滅火必矣號留仙裙成帝微行過河陽主家悦歌舞者趙飛燕召入宫大幸有女弟復召入俱為婕妤欲立飛燕為皇后諫大夫劉輔上言里語曰腐木不可以為柱人婢不可以為主書奏收繫獄後論為鬼薪成帝步太液池起瀛洲榭后歌歸風送逺之曲以文犀箸撃玉甌酒酣風起后揚袖曰仙乎仙乎去故而新帝令左右持其裾久之風止裙為之皺后曰帝恩我使仙去不得他日宫姝或襞裙而皺丨丨丨丨外傳丹脂㸃頰呉孫和悦鄧夫人嘗置膝上和弄水精如意誤傷夫人頰血洿袴帶醫者曰得白獺髓雜玉與琥珀屑當滅痕及差有赤㸃更益其妍諸嬖人更以丨丨丨丨以要寵拾遺記絳紗繫臂晉武胡貴嬪名芳鎮軍胡奮女也帝多簡良家子以充内職自擇美者以丨丨丨丨芳既入選下殿號泣左右止之曰陛下聞聲芳曰死且不畏何畏陛下帝每有顧問不飾言辭率爾而答進退方雅始有専房之寵帝嘗與樗蒲争失遂傷上指帝怒曰此固將種也芳曰北伐公孫西距諸葛非將種而何帝慙乗車恣宴晉武帝多内寵平呉之後復納孫皓宫人數千自此掖庭殆將萬計而並寵者甚衆帝莫知其所適常丨羊丨丨其所之至便丨寢宫人乃取竹葉挿户以鹽汁洒地而引帝車聞鍾早起齊武帝以内深隐不聞端門鼓漏聲置鍾於景陽樓上應五鼔及三鼔宫人丨丨聲丨丨粧飾可信六人魏明帝耽于内寵婦官秩名擬百官之數自貴人以下至掖庭洒掃者凡數千人選女子知書丨付丨者丨丨以為女尚書使典外奏事處當畫可最寵四人魏文帝宫中有丨所丨者曰莫瓊樹薛夜來請尚衣收巧笑丨丨日夕在側瓊樹乃製蟬鬢縹緲如蟬翼巧笑以妬錦絲作紫粉拂面尚衣能歌舞夜來善為衣裳一時冠絶古今注增置大儀國朝舊制皇后以下有貴妃徳妃賢妃舊有寳林御女采女國朝不置景徳二年丨丨丨丨會要並從一品祥符二年特置貴人六年詔曰眷言壼教實係國風辨彤管之等威既存舊典益紫庭之位號亦著前聞爰考典章用新班秩今增置淑儀順儀順容婉儀丨丨丨丨在昭儀之上乾興元年置貴儀在淑儀之上同上詩集越女丨丨顔如花越王聞浣紗因㣲不自寵獻作呉王娃山藪半蔵匿苧蘿更蒙遮一行霸勾踐再笑傾夫差艶色奪人常效顰亦相夸一朝還舊都靚粧還若邪鳥驚入松網魚畏沉荷花始覺冶容妄方悟羣心邪宋之問浣紗篇杜牧之詩西子下姑蘇一船逐鴟夷此詩言復還姑蘇阿嬌漢帝重丨丨貯之黃金屋咳唾落九天隨風生珠玉寵極愛還歇妬深情却疎長門一步地不肯漸迴車雨落不上天水覆最難收君情與妾意各自東西流昔日芙蓉花今成斷腸草以色事他人能得幾時好李太白妾薄命李夫人漢武帝初喪丨丨丨夫人病時不肯别死後留得生前恩君恩不盡念未巳甘泉殿裏令冩真丹青畫出竟何益不言不笑愁殺人又令方士合靈藥玉釡煎煉金爐焚九華帳深夜悄悄反䰟香降夫人䰟夫人之䰟在何許香煙引到焚香處既來何苦不須㬰縹緲悠揚還滅去去何速兮來何遲是耶非耶兩不知翠蛾髣髴平生貌不似昭陽寝疾時䰟之不來君心苦䰟之來兮君亦悲背燈隔帳不得詔安用暫來還見違傷心不獨漢武帝自古及今皆若斯君不見穆王三日哭重璧臺前傷盛姬又不見秦陵一掬淚馬嵬坡下念楊妃縱令妍姿豔質化為土此恨長在無銷期生亦惑死亦惑凡物惑人忘不得人非木石皆有情不如不遇傾城色白居易王昭君自矜妖豔色不顧丹青人那知粉繢能相負却使容華翻誤身上馬辭君家驕虜玉顔對人啼不語北風雁急浮雲秋萬里獨見黃河流纎腰不復漢宫寵雙蛾長向胡天愁琵琶絃中苦調多蕭蕭羗笛聲相和誰憐一曲傳樂府能使千秋傷綺羅劉長卿明妃曲漢宫有佳人天子初未識一朝隨漢使逺嫁單于國絶色天下無一失難再得雖然殺畫工於事竟何益耳目所及尚如此萬里安能制夷狄漢計誠已拙女色難自誇明妃去時淚洒向枝上花狂風日暮起飄泊落誰家紅顔勝人多薄命莫怨春風當自嗟歐陽永叔明妃引漢宫有女顔如玉淺畫愁眉逺山緑披香殿裏夜吹笙未央宫中朝理曲絳紗蒙籠雙蠟燭簫鼔聲傳春漏促玉輦三更别院歸夜深月照黃金屋莓苔滿院無行迹摠為君王未相識天上天仙骨格别人間畫工畫不得嫣然一笑金輿側玉貌三千歛顔色羅幃繡户掩香風一朝返嫁單于國金鳯羅衣為誰縷長袖弓彎不堪舞一别昭陽舊院花淚洒臙脂作紅雨囬頭不見雲間闕黃河半渡新氷滑馬蹄已踏遼羯塵天邉尚掛長門月黃沙不似長安道薄暮微雲映衰草胡兒馬上鳴胡笳緑鬢紅顔為君老西風蕭蕭易水寒啼痕不㫁幾闌干年年看盡南飛雁一去天涯竟不還少年將軍健如虎日夕撞鍾搥大鼓寳刀生澁旌旗卷漢宫嫁盡嬋娟女寂寞邉城日將暮三尺角弓調白羽安得猛士霍嫖姚縳取呼韓作編戸邢居實十四嵗作古今合璧事類備要前集卷二十一
