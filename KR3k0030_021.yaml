body:
  text: 古今合璧事類備要前集卷二十一宋謝維新撰帝屬門太上皇事類有尊故雖天子必丨丨也言有父也孝經至養尊親之丨莫大乎以天下丨為天子父尊之至也以天下養養之至也孟萬章尊稱太上極丨之丨皇君也天子之父故號曰皇不預治國不欲言帝也漢紀注懿號強我丨丨不若使我為有道之君加我虛尊不若處我於無過之地唐穆宗詔追尊上皇秦丨丨莊襄王為太丨丨請上尊號漢髙祖詔曰人之至親莫親於父子故父有天下傳歸於子子有天下尊歸於父此人道之極也朕被堅執鋭帥士卒平暴亂立諸侯偃兵息民天下大安此皆太公之教訓也朕為皇帝而太公未有號今上尊太公曰太上皇漢髙紀擁篲迎門上五日一朝太公太公家令曰皇帝雖子人主也太公雖父人臣也奈何令人主拜人臣如此則威重不行後上朝太公丨丨丨丨卻行上大驚下扶太公太公曰帝人主奈何以我亂天下法帝心善家令言同上置酒奉巵淮南王等朝未央宫丨丨前殿上丨玉丨為太上皇夀曰始大人常以臣亡賴不能治産業不如仲力今某之業所就孰與仲多殿上羣臣皆稱萬嵗大笑為樂優遊恭巳魏顯祖傳位於太子詔曰朕希心玄古志存淡泊爰命儲宫踐升大位朕得丨丨丨丨栖心浩然羣臣謹上尊號曰太上皇帝通鑑逍遙晚嵗唐髙祖謂裴寂曰公為宗臣我為太上皇丨丨丨丨不亦善乎奉觴未央太宗從上皇置酒故漢未央宫上命突厥頡利可汗起舞曰胡越一家自古未有帝丨丨上夀曰今四夷入臣皆陛下教誨上皇大説置酒凌煙太宗朝突厥可汗至長安上御順天樓盛陳文物引見上皇聞擒頡利歎曰吾付託得人復何憂哉丨丨丨丨閣公卿迭起為夀諫幸九成太宗詔幸九成宫馬周上疏曰太上皇春秋髙今所幸宫去京三百里萬一太上皇思感欲見陛下何以逮之今兹本為避暑行太上留熱處而陛下走涼處溫清之道臣所未安受朝太極睿宗先天元年立皇子為皇帝以聽大事自尊為太上皇以聽小事五日丨丨於丨丨殿本紀徙居甘露天寶十五載皇太子即位於靈武上號曰太上至道聖皇天帝上元元年丨丨丨丨殿同上迎拜南樓肅宗復兩京上皇自蜀歸至咸陽上備法駕丨上皇丨舞丨丨之下南部新書置酒長慶元宗居興慶宫帝自復道來起居太上皇亦間至大明宫每丨丨丨丨樓南俯大道或父老過之皆拜舞而去本輔國録受賀興慶太上皇於興慶宫丨朝丨皇帝上尊號曰應朝聖夀太上皇韓文順宗實録御德夀宫紹興三十二年六月丙子髙宗降詔內禪上即皇帝位太上皇移丨丨丨丨皇帝攀戀垂泣步出祥曦殿門冒雨扶駕至宫門弗肯止太上麾謝再三令左右扶掖以還國史御重華宫淳熙十六年正月辛亥上宣諭周必大等曰朕年來稍覺倦勤旬日間禪位于皇太子退就休養以畢髙宗三年之制二月壬戍詔皇太子即位朕移丨丨丨丨皇太后事類極域中尊稟靈作合誕聖表祥徽號丨丨丨之丨慈仁為天下之母劉禹錫賀表為天下母丨丨丨之丨育天下之君孫抃赦文帝母星娥帝少昊母曰丨丨處璇宫初學記文母太姒大薑者太王之妃賢而有色生太伯仲雍王季三子皆賢太王有事必咨謀焉太任者王季之妃端慤誠莊唯德之行及其有娠目不視惡色耳不聽淫聲而生文王太姒者文王之妃號曰文母思媚太薑太任旦夕勤勞以進婦道文王理外文母理內古烈女傳思齊太任丨王之丨思媚周薑京室之婦丨丨嗣徽音則百斯男詩大雅秦制稱號漢興因秦之稱號帝母稱皇太后祖母稱太皇太后漢書漢制稱宫帝祖母稱長信宫帝母稱長樂宫漢官儀哀帝尊其祖母帝太太后為皇太太后稱永信宫帝太后稱中安宫而成帝母太皇太后本稱長信宫外戚傳居長信宫成帝母王太后丨丨丨丨即元后也漢書諡光烈后漢世母后無諡至於明帝始建光烈之稱蔡雍益議乘紫罽車太皇太后皇太后法駕皆御金根車玉輅非駕法則丨丨丨軿丨後漢書橫玳瑁簮皇后太后簮以玳瑁長一尺端為花勝左右各一橫簮之續漢書齊蹤虞妃太后丨丨丨丨比迹任姒晉劉毅傳嗣徽太任正位長信丨丨丨丨邦家之光感慰斯至李吉甫賀表受册宫門光膺令典丨丨丨丨歡心始自於內朝孝理遂形於寰海皇太后夙贊先皇弼成至化誕生明聖纘繼鴻休華胥實贊於軒圖文母有光於周道韓文尊臨長樂天慈廣被坤道內寧丨丨丨丨之嚴已光於慈訓養極九州之富未盡於孝心同上建萬安宫本朝咸平二年為皇太后丨宫以丨丨丨萬安殿為名會要太宗明德皇后也為慈夀殿治平元年以皇太后所居丨丨丨宫丨建二宫殿熙寧元年太皇太后居慶夀宫建慶夀萃德二殿皇太后居寶慈宫建寶慈姒徽二殿並同上乘大安輦天聖間帝太后將同幸慈孝寺欲以大安輦前帝行魯宗道曰婦人有三從在家從父嫁從夫夫歿從子太后命輦後乘輿行長編皇太后聽政太后稱制惠帝崩吕丨丨臨朝丨丨乃立兄子吕台祿産台子通四人為王封諸吕六人為列侯太后崩上將軍祿相國産顓兵政恐為大臣所誅因謀作亂女主臨朝自古雖主幼時艱王家多釁必委成冢宰簡求忠賢未有専任婦人斷割重器唯秦芉太后始攝政事故穰侯權重於昭王家富於嬴國漢仍其謬知過莫改東京皇統屢絶權歸丨丨外立者四帝丨丨者六后莫不定䇿帷帟委事父兄貪孩童以久其政抑明賢以専其威後漢后妃紀含飴弄孫後漢明德馬皇后云吾為天下母而身服大練食不求甘欲率下也但吾當丨丨丨丨不能復關政減服撤膳殤帝立和熹鄧后臨朝常以鬼神難徵淫祀無福乃詔有司減大官導官尚方內者服御珍膳靡麗難成之功親嘗稱制長樂太后丨丨丨丨坤育天下陳球傳不許聽政魏文帝著令丨丨母后丨丨黃初三年詔曰夫婦人與政亂之本也自今以後羣臣不得奏事太后后族之家不得當輔政之任又不得橫受茅土之爵以此詔傳後世有背違天丅共誅之三國志宋髙祖遺詔曰後世若有幼主朝事一委宰相母后不煩臨朝抱帝臨軒晉康帝崩穆帝即位時年二嵗皇太后設白紗幃於太極殿丨丨丨丨晉書臨朝改號唐髙宗晚病風不支天下事一付武后進號曰天后中宗即位天后稱皇太后廢帝為廬陵王自丨丨因丨國丨周自稱聖神皇帝欲以武三思為太子賴狄仁傑言卒復唐嗣臨朝決事章聖久不豫莊獻太后欲自丨丨令上居東宫於資善堂丨丨王曾再二鈞軸語惟演曰皇帝幼沖非中宫不得獨立中宫非倚皇儲之重則人心不附矣惟演入白之由是兩宫益親言行録垂簾聽政章獻明肅太后權處分軍國事獨斷儀式久而未定丁謂欲每議大政則皇太后坐後殿朝執政朔望則皇帝坐前殿朝羣臣其餘庶務獨令入內押班雷允恭附奏傳命中書樞密院平決之王沂公曾時判禮儀院乃采用蔡雍獨斷所編東漢故事皇帝在左母后在右同殿丨丨中書樞密院以次奏事如儀人心乃定王文正筆録制令稱豫初丁謂定太后稱豫至是中書議每下丨丨丨丨便殿處分事稱吾詔止稱吾會要輿服見廟明肅太后從謁太祖詔禮官草儀佞者密請曰陛下垂簾尊稱山呼及丨丨皆王者制度豈當以后服丨祖宗耶遂下詔服衮冕諫疏交上薛簡肅公立朝謇諤不文其談簾外口奏曰陛下大謁之日還作漢兒拜耶女兒拜耶明肅無答是夕報罷澠水燕談奏燔儀制章獻明肅太后遺詔尊楊太妃為太后禁中與皇帝同議軍國事閣門促班賀於內東門御史丞蔡文忠公戒臺吏毋追班乃白宰相曰上奉先太后十餘年今始躬親政事豈宜以女后相繼耶上聞遂命刪去同議政語朝廷服其亮皇朝類苑章獻太后崩章惠太后欲踵之臨朝龎籍為殿中侍御史丨丨閣門所掌垂簾丨丨以沮其謀仁宗始専萬幾令撤座簾仁宗晏駕英宗即位以憂得疾大臣議請慈聖光獻太后垂簾聽政及英廟巳安韓魏公琦諷后請還政後數日批出云某日更不御殿魏公亟令搭簾坐乃白上遂别議太后儀制請還御寶曹后稱制日韓琦欲還政天子而御寶在太后閣皇帝行幸即隨駕琦因丨具索狀祈雨比乘輿丨丨丨更不入太后閣即於簾前具述皇帝聖德都人瞻仰無不歡慰且言天下事久煩聖慮太后怒曰教做也由相公不教做也由相公琦獨立簾外不去及得一言有久意即再拜駕起遂促儀鸞司拆簾上自此親政孫公談圃復用舊法英宗母宣仁聖烈皇后髙氏神宗即位尊為皇太后與皇帝御延和殿垂簾聽政當元豐末垂簾聽政保佑哲宗起司馬光為宰相天下歸心臨朝九年復祖宗法每有號令天下人謂之快活條貫華夷稱女中堯舜長編權同聽政哲宗皇帝母曰欽成皇后朱氏神宗寢疾彌留王圭奏請宣仁聖烈皇太后丨丨丨丨神宗首肯太皇太后垂簾於福寧殿立哲宗為皇太子神宗崩奉遺制即位尊皇太后曰太皇太后皇后曰皇太后不御正牙哲宗崩皇太后坐福寧殿垂簾徽宗入即皇帝位於福寧殿奉遺制皇太后權同處分軍國大事元祐二年皇太后詔曰祥禫既終典䇿告具有司遵用章獻明肅皇后故事豫當受册於文德殿顧豫涼薄實有慙德將來受册可止就崇政殿諭執政曰母后臨朝非國家盛事文德殿天子正牙豈女主所當御乎皇后事類陰禮內宰以丨丨教六宫注六宫謂后也周禮內治聽天下之丨丨以明章婦順故天下內和而家理昏義副笄君子偕老丨丨六珈注副者后夫人之首飾彤管靜女其孌貽我丨丨彤管有煒説懌女美注古者后夫人必有史彤管之法史不記過其罪殺之后妃羣妾以禮御於君所女史書其日月授之以環以進退之生子月辰則以金環退之當御者以銀環進之著於左手既御著於右手事無大小記以成法並詩椒房皇后稱丨丨取其實蔓延盈升以椒塗室取溫暖除惡氣也猶天子朱泥殿上曰丹墀漢官儀星軒壺政穆宣宣房昭理坤則順成丨丨潤飾注儀禮有房中樂后夫人諷誦以事君子丨丨軒轅星也顔延之宋文后哀册掌服內司服丨后之六丨禕衣榆狄闕狄鞠衣展衣祿衣周禮親蠶天子親耕以共粢盛王后丨丨以共祭服穀粱傳輔君德丨成丨丨燮理陰政南史后妃論配皇極作丨丨丨齊體紫宸象玉牀之連後宫喻金波之合義璧晉后妃序溈汭作嬪有鰥在下曰虞舜帝曰我其試哉女于時觀厥刑于二女釐降二女于丨丨嬪于虞書關雎正始丨丨后妃之德也所以風天下而正夫婦也周南召南丨丨之道王化之基是以關雎樂得淑女以配君子憂在進賢不淫其色哀窈窕思賢才而無傷善之心焉是關雎之義也詩序葛覃儉節丨丨后妃之本也后妃在父母家則志在於女功之事躬丨丨用服浣濯之衣尊敬師傳化天下以婦道也詩卷耳憂勤丨丨后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險陂私謁之心朝夕思念至于丨丨也曰嬪于京摯仲氏任自彼殷商來嫁于周丨丨丨丨乃及王季維德之行親迎于渭文王初載天作之合在洽之陽在渭之涘文王嘉止大邦有子大邦有子俔天之妹文定厥祥丨丨丨丨造舟為梁不顯其光有命自天命此文王于周于京纘女維莘長子維行篤生武王保佑命爾燮伐大商並同上脫簮待罪周宣王夜卧而晏起薑后既出乃丨丨珥丨丨使其傅母通言於宣王曰妾之淫心見矣至使君王失禮而罪起亂之興從婢子起敢請罪王曰寡人不德實自有過非夫人之罪也遂復薑后而勤於政事早朝晏退卒成中興之名國語拊膝諫王鍾離春者齊無鹽邑之女也為人極醜自詣宣王願乞一見宣王召見之乃舉手丨丨曰殆哉殆哉宣王曰願聞命對曰今西有橫秦之患南有強楚之讐春秋四子壯勇不立一殆也漸臺五層萬民疲困二殆也賢者伏匿山林諂諛