body:
  text: 古今合璧事類備要前集卷六宋謝維新撰地理門石事類氣核土精為石石丨之丨也氣之生石猶人筋絡之生爪牙也物理論隂精周易艮為山為小石隂中之陽陽中之隂丨丨補陽故山含石春秋説題辭地骨丨以石為之丨博物志水沫燒泥為瓦燔木為炭蜂窠為蠟丨丨為石凡此皆其柔脆變為堅剛又曰磁石引針槍朴子暉山石韞玉而山暉文賦攻玉他山之石可以丨丨詩嘉石周禮大司寇以丨丨平罷民有罪者坐于丨丨肺石周禮以丨丨達窮民凡逺近惸獨老幼之欲有復於上而其長弗達者立于丨丨怪石禹貢青州厥貢鉛松丨丨書瑞石樊文進丨丨后暴石朝堂示百官馮元常奏石妄偽不可以示羣臣后怒出為隴州刺史隕石永徽四年丨丨十八于馮翊髙祖問曰此何祥也于志寧曰春秋丨丨千宋五內史過以為是隂陽之事非吉凶所生燃石建城縣出丨丨色黃理踈以水灌之則熱安鼎其上可以炊也酉陽雜爼石鼓晉武帝時吳郡臨平岸崩出一丨丨打之無聲以問張華華曰可取蜀中桐材刻作魚形叩之則鳴于是如言聲聞十里石樹永昌中台州司馬孟詵奏臨海水下馮義得石連理三株皆白石洽聞記帝臺棋桃林在𢎞農湖城縣休馬之山有石焉名曰丨丨之丨五色而文狀如雞卵博物志仙人鏡月林國西南有怪石方數百里光明澄徹可覽人五臟六腑謂之丨丨丨其國人有疾皆輒照之其形遂知六帖松風石武宗會昌元年大食國貢丨丨丨方一丈瑩徹如玉其中有樹形若枮松偃蓋颯颯焉而涼飈生于其間至盛夏上令置諸殿內稍稍秋氣颼飀即令徹去唐杜陽雜編落星石昔有星墜水化為石當彭蠡灣中俗呼為丨丨灣圖經醒酒石李德裕于平泉别墅採天下珍木怪石為園池之玩冇丨丨丨德裕尤所寶貴醉即踞之唐餘録唐莊宗朝張全義為太師尚書令兼四鎮節度有監軍嘗得平泉丨丨丨德裕孫延古託全義復求之監軍忿然曰自黃巢亂後洛陽園宅無復能守豈獨平泉一石哉全義嘗在賊巢中以為譏已大怒笞殺之沃焦石天下之強者東海之沃焦焉水灌而不已丨丨者山丨也海東南方三萬里海水灌之即消玄中記鬱林石陸氏居姑蘇門有巨石逺祖績仕吳為丨丨太守罷歸無裝舟輕不可越海取丨為重人稱其亷號丨丨丨龜蒙傳洛水石李昭德時有人獲丨丨白丨而赤文者獻闕下曰此石赤心故以獻昭德叱之曰洛水餘石豈能盡反耶昆吾石流洲在西海中上多積石名為丨丨丨冶成鐵作劍光明洞照如水精狀割玉物如切泥土十洲記天河石昔人有泛槎至丨丨者得丨歸示嚴君平曰此織女攴機石也詳見河漢類望夫石武昌山北有望夫石狀若人俗傳昔貞婦其夫從役逺赴國難携子餞于此山立丨丨而死化為立丨因名焉神異記飛仙石荆州利水間有二石若闕名曰韶石晉永和中有丨丨衣冠如雪各憩一丨旬日而去人皆見之酉陽雜俎童子石陳倉丨丨化為丨搜神記玉女石蜀王本紀云天為蜀王生五丁力士能徙山秦王獻美女于蜀王蜀王遣五丁迎女見一大蛇出穴中五丁共引蛇山崩秦丨丨皆化為丨翁仲石魏明帝景初二年鑄銅人二列于司馬門外號曰丨丨魏志鄗南千秋亭壇廟之東枕道有兩石翁仲南北相對水經黃公石張良逰下邳見一老人出一編書曰讀是為王者師後三十年見我濟比榖城山下黃石即我也史記晉國石言石言於晉魏榆晉侯問于師曠曰石何故言對曰石不能言或馮焉不然民聽濫也抑臣又聞之曰作事不時怨讟動小民則有非言之物而言昭八年資州石走丨丨有丨方丈丨行數步五行志女媧鍊石丨丨氏丨五色丨以補天史記宋人寶石宋之愚人得燕石而藏之以為寶周客聞而覩焉主人齋七日端冕玄服以發寶革匱千重緹巾十襲客見之掩口而笑曰此燕石也其與瓦甓不殊荀子淵明醉石陶淵明所居栗里有大石丨丨嘗醉眠其上名曰丨丨廬山記樂天盤石洛陽履道里洪農楊正一遺白樂天以盤石方丈平滑可以坐臥丨丨愛而為之銘白集中書盤石薛元超道衡孫也為中書舍人丨丨省一丨丨初道衡為內史侍郎嘗踞而革制元超再見此石未嘗不泫然流涕祕省星石丨丨􅤾落丨丨薛稷畫鶴賀知章草書郎餘令畫鳯相傳號為四絶南部新書鵲化為石常山張皓為梁相時天新雨後有鳥如山丨飛翔市人擲之墜地爭取即收丨丨一員丨皓椎破之得一金印文曰忠孝侯印搜神記燕還為石零陵有石丨得風雨則飛翔如真燕風雨止則丨丨丨湘州記石若龜形唐齊王元吉于晉陽宫獲青丨丨丨丨五有丹書四字曰李淵萬吉元吉遣使獻之髙祖曰不足信也乃令水漬磨以驗之數日浸而紅色磨之其字愈明于是內外畢賀髙祖曰上天明命貺以萬吉孤陋寡薄何堪預此宜以少牢祠石龜而嘏送之神異記石如雞卵崔元亮常侍在洛中嘗間步沙岸得一丨子大丨丨丨黑潤可愛玩之行一里餘忽然而破有鳥大如巧婦飛去叱石成羊黃初平丨丨丨丨射石為虎楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其石也因復射之矢躍無迹韓詩外傳李廣事同見射門昆明刻鯨丨丨池丨石丨魚雷雨則鳴吼蜀都沉犀丨丨水災太守李氷乃刻石丨丨之江浦以厭洪水鞭石為橋秦始皇作石橋欲過海看日出處有神人能驅石下海石去不速神輒鞭之三齊略記聚石為障馬燧表龍洲刺史西山直吐蕃其上有通道狄常所出入者燧丨丨種木障之設二門為譙櫓八日而畢狄不能暴得石如眼蕭餘上元夜於宣陽醒酒盤下得一物如人眼睛其體類美石光影射人每置掌中遊暗處輒光明三尺許後因雨飛去碎石如粉道士談紫霄有鄰僧於溪滸創亭為頑石所礙致工百倍不能平之紫霄見曰斯易爾以指捻印水噀之命斧擊石應手如粉江南野史仰天祝石唐中宗為天后廢於房陵仰天而嘆心祝之因拋一石於空中曰我復帝此石不落其石遂為樹枝勾挂至今猶存獨異記遣使祭石貞觀十七年八月涼州昌松縣鴻池谷有石青質白文成字太宗丨丨丨之曰天有成命表瑞貞石文字昭然厯數惟永五行志戒勿鬻石李德裕平泉山居戒子孫記曰鬻平泉者非吾子孫也以平泉一樹一石與人者非佳子弟也記防取石六一記菱溪石東坡記四菩薩皆寓意防人取去然氣象不類如此朱子語録大石見夢金陵有三大石甚古吳仲庶作守日夜夢三舉子求哀且曰若不垂祐明日當為煨燼矣公甚異之詰旦遍問僚屬莫能原其意既而視其牒見兵馬司狀申乞燒三醜石為灰供修造之用遂悟敕寺僧愛護元祐中毛漸作漕欲移置廨舍掘之極深而石根不斷不能動遂罷楊公筆録竒石當拜米芾好丨知無為軍初入州廨立見丨頗竒喜曰此足以丨吾丨遂命取袍笏拜之每呼曰石丈為言者所彈石林燕語靈壁貢石政和間建艮嶽異花竒石來自東南不可名狀忽丨丨縣丨一巨丨髙二十餘尺周圍稱是舟載至京師毁水門樓以入千夫舁之不動或啓于上云此神物也宜表異之裕陵因親灑宸翰云慶雲萬態竒峯仍以金帶一條挂其上遂即可移省夫半頃刻至苑中揮塵録零陽産石石屏出丨丨白鶴山屈處靜上升之所紹興壬午間有宗子邑居一日艤舟山下于水中得一石光采絢異其紋若峯巒聳秀渾然天成自是石工鑿取益衆煙雲雪月之景波瀾龍鳯之象隱然志可觀大者方廣可四五尺雖巧畫者莫臻其妙零陵詩集眠緑苔山鬼水怪著薜荔天祿辟邪丨丨丨鈎簾坐對心語口曽見漢家池館來黃亞夫怪石擺翠縷寒姿數片竒突兀曽作秋山秋水骨先生應是厭風雷著向池邉塞龍窟我來池上傾酒樽半酣書破青煙䀶參差翠縷擺不落筆頭驚怪粘秋雲我聞吳中頃客水墨有髙價邀得將來倚松下鋪却雙繒直道難掉首空歸不成畫張碧題池上怪石峭頂蟠根錯落復崔嵬蒼然玉一堆峯駢仙掌出罅拆劍門開丨丨髙危矣丨丨下壯哉精神欺竹樹氣色猒亭臺隱起磷磷狀凝成瑟瑟胚亷稜露鋒創清越扣瓊瑰岌嶪形將動嵬峩勢欲摧竒應潛鬼怪靈合蓄風雷黛潤沾新雨斑明點古苔未應棲鳥雀不肯染塵埃尖削琅玕笱窪剜瑪瑙罍海神移碣石畫障簇天台在世為尤物于人負逸才渡江一葦載入洛五丁推出處雖無意升沉亦有媒拔從水府底置向相庭隈對稱吟詩句看宜把酒杯終隨金礪用不學玉山頽踈傅心偏愛園公眼屢回共嗟無此分虛管太湖來白居易詠太湖石竒形怪狀洞庭山下湖波幽碧波中萬古生石鐵索千尋取得來丨丨丨丨誰能識初疑朝家正人立又如戰士方狙擊又如防風死後骨又如於莵活時額又如成人楓又如害癭柏雨過上渟泓風來中有隙想得沉潛水府時興雲出雨蟠蛟螭今來硉矹林庭上長空忽然生白浪用時應不稱媧皇將去也堪隨博望噫嘻爾石好憑依幸有方池并釣磯小山叢桂且為伴鍾阜白雲長自歸何必豪家甲第裏玉闌干畔爭光輝一朝荆棘忽流落何異綺羅雲雨飛吳融太湖石歌雲勢查形震澤生竒石沉潛得地靈初辭水府出猶帶龍宫腥發自江湖國來榮卿相庭從風夏丨丨上漢古丨丨拂拭魚鱗見鏗鏘玉韻聆煙波含宿潤苔蘚助新青嵌穴胡雛貌纎鋩蟲篆銘孱顔傲林薄飛動向雷霆煩熱近還散餘酲見便醒凡禽不敢息浮壒莫能停靜稱垂松蓋鮮宜映鶴翎忘憂常目擊素尚與心𡨕眇小欺湘燕團圎笑落星徒然想融結安可測年齡採取詢鄉老搜求按舊經垂釣入空隙隔浪動晶熒有獲人爭賀歡謡衆共聽一州驚閲寶千里逺揚舲覩物洛陽陌懷人吳御亭寄言垂天翼早晚起滄溟白居易詠太湖石蓮勢錦紋天潢支機罷仙嶺博碁餘零陵舊是燕昆池本學魚雲移丨丨出苔駮丨丨舒還當榖城下别日解兵書隂鏗陳朝三品草沒苔侵棄道周誤恩三品竟何酬國亡今日頑無耻似為當年不預謀王介甫武昌孤石終日望夫夫不歸化為孤石苦相思望來已是幾千歲只是當年初望時劉夢得洞事類大隱洞韋夏卿署其居曰丨丨丨唐書寒居洞韓退之燕喜亭記云洞曰丨丨之丨志其入時韓文寶仙洞玄宗天寶九載十月庚申幸華清宫太白山人王元翼言玄元黃帝降於丨丨丨本紀金星洞洋州有丨丨丨地理志猗玗洞元結作自釋云天下兵興逃難入丨丨丨始稱丨丨子金沙洞丨丨丨在驪山上楊妃傳魚藻洞魚朝恩有洞房四壁夾安琉璃板中貯江水及萍藻諸色魚蝦號丨丨丨南康記含輝洞薛景梅為道州刺史得異境于近郊有石穹然如夏屋囚名其地曰丨丨丨劉禹錫集玉泉乳窟余閫荆州丨丨寺近青溪諸山山洞往往有丨丨窟中多丨丨交流有白蝙蝠如鴉千嵗集之後體如白雪蓋因乳水而長生也李白南山乳洞有人逰丨丨丨丨深數里乳旋滴瀝成飛仙狀洞中已有數十若攻玉石眉目衣服形製精巧一處滴至腰已上其人因手承潄之經年再往見所承滴像已成矣乳不復滴當手承處衣缺二寸不就酉陽雜爼小兒化龍茅山隱士吳綽素擅潔譽神鳯初因採藥于華陽洞口見一丨丨手把大珠三顆其色瑩然戲于松下綽因前詢小兒奔忙入洞綽恐為物害遂連呼相從入欲救之行不三十步見兒丨作丨形手握三珠填耳中綽素剛膽以藥斧斸之落左耳而珠已失所在龍亦不見出十餘步洞門已閉綽後封養素先生龍城録童子刺船婺源縣有張公山洞洞穴如井深不可測咸通末有洞靈觀鄭道士以繩縋下百餘丈乃至底旁視有光往視之路盡阻水隔岸有屋宇花木樹石宛然仙境有一道士方棋使一丨丨丨丨而至問欲渡否答曰當還于是丨丨丨丨而去遂復縋而出明日井中出一石筍塞其口無復入者稽神録詩集興雲雷洞門閉石扇地底丨丨丨李白透溪谷洞門常自起煙霞洞冗旁穿丨丨丨歐陽公無鎖鑰洞門丨丨丨俗客不曽來韓文公鎖樓臺四字丹青萬仞崖神清之洞丨丨丨歐陽公谷事類岱畎丨丨絲枲注谷名書禹貢嵎夷宅丨丨曰暘谷宅西曰昧谷堯典有空大風有隧丨丨大谷詩無底渤海之東有大壑焉實維丨丨之谷列子黍谷鄒衍在燕燕有谷地寒不生五榖衍乃吹律而溫氣至堪黍今謂之丨丨劉向别録駱谷郭子儀子曙德宗幸奉天曙方領家兵獵苑北聞蹕至伏謁道左遂從乘輿入丨丨六帖幽棲谷韋嗣立營别第驪山鸚鵡谷帝臨幸命從官賦詩製序冠篇賜貺優備因封嗣立逍遙公名所居曰清虛源丨丨丨翰林志謙受谷宴喜亭記曰其石谷曰丨丨之丨其土谷曰黃金之谷韓文郎君谷王龜侍父至河中廬中條山朔望一歸省州人號丨丨丨六帖王官谷司空圗居中條山丨丨丨時冦盜所過殘暴獨不入丨丨丨同上石崇金谷丨丨有别館在河陽之丨丨晉書李願盤谷太行之陽有盤谷友人丨丨居之丨丨之間泉甘而土肥草木叢茂居民鮮少是谷也宅幽而勢阻隱者之所盤旋韓文井事類不改改邑丨丨井無喪無得往來井井汔至亦未潏井羸其瓶凶易卦不窮巽乎水而上水井井養而丨丨也冽寒井丨丨泉食同上清潔井清也泉之丨丨者也釋名汲泉短綆不可以丨深井之丨荀子改水夏至日浚井丨丨續漢志象圎川體丨丨丨下貫五仞既處涅而不緇又磨之而不磷孫楚賦穿重壤丨丨丨之千仞兮創玉甃之百節營之不日既浚既泄潛流照照寒泉冽冽含七德以幾道兮盡衆善而莫伐江逌賦掘及泉有為者辟若掘井丨井九仞而不丨丨猶為棄井也孟子坐觀天丨井而丨丨曰天小者非天小也韓文塪井蛙跳子獨不聞丨丨之丨乎丨梁乎井幹之上入休乎缺甃之崖井蛙不可以語于海者拘于墟也並莊子作井龍登伯益丨丨而黃丨丨淮南子鑿井灌畦子貢見一丈人方將為圃畦丨隧而入井搶甕而出灌搰搰然用力甚勞而見功寡莊子為井通水武帝鑿井深者四十餘丈往往丨丨井下相丨行丨史河渠書掘井得砂余祖嘗為臨沅令此縣民夀考或百嵗或八九十嵗疑其井水殊赤乃試丨丨左右丨古人埋丹丨數千斛是以飲其水而得夀抱朴子穿井得鐘晉元帝太興初會稽人于井中得一鐘上有古文十八字郭璞曰王者之作必有靈符晉書又漢龎儉鑿井得銅本傳朱博竭井朱博為御史大夫時御史府舍百餘區井水皆竭長老異之本傳耿恭拜井丨丨于城中穿井十五丈不得水乃整衣向井再丨冇頃水泉奔出後本傳井水療疾蘇仙公辭母曰明年天下疾疫庭中丨丨井邉橘樹可以代養井水一升橘葉一枝可丨一人來年果疫母以井水及橘葉救之無不愈者廣記井水止渴阮瞻嘗羣行冒熱渴甚逆旅有井衆競趍之瞻獨逡巡在後飲者畢乃進晉本傳號韓公井襄州有昭王井傳言服者死人雖渴困不敢視韓朝宗遺書謝神自是飲者無恙人更丨丨丨丨唐韓思復傳名緑珠井緑珠井在白州雙角山下昔梁氏之女有容貌石李倫以真珠三斛買之耆老傳云飲此水者誕女必多美麗閭里以美色無益于時遂以巨石鎮之爾後雖産女端嚴則七竅四體多不完具嶺表録異寶鈿為幹王鉷以丨丨丨井丨引泉激霤號為雨亭本傳雕鏤為盤霍仙鳴别墅在龍門一室之中開七井皆以丨丨木盤覆之夏月坐其上七井生涼不知暑氣雲林異景志玉井金幹河間王琛置丨丨丨丨以五色繢為繩伽藍記玉井綺欄魏明帝九龍殿前為丨丨丨丨魏略詩集銀床玲瓏映玉檻澄徹寫丨丨帝力終何有機心庶可忘蘇味道玉罌丨丨汲水花桐井舊絲沉水如雲影李賀雲崖丨丨有淺井玉醴常半尋歐陽公雪乳晨瓶得丨丨暮甕停冰湍一勺亦天賜曲肱有餘歡同上古今合璧事類備要前集卷六
