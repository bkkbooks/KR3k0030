body:
  text: 古今合璧事類備要别集卷二十宋謝維新撰苑囿門苑囿宫室舉要苑有垣曰囿天子百里公侯八十里伯七十里子男五十里此尊卑大小殊也然古者之創苑囿也必於東方蓋東方乃物所生之地所以飬萬物不特飬物亦未嘗不與民同也故芻蕘者雉兔者皆所不禁至後世窮奢而極欲快要眇之望縱逸游之樂惟知為己之奉豈誠在東之義民有冒禁而入刑僇輒加焉是其於郊關之內有機有穽而視蠢爾之氓曽草木鳥獸之不如嗚呼古之為苑囿也民惟恐其不大後世之為苑囿也民惟恐其不小君子亦安得不太息於斯事類在東苑囿所以在東方者謂飬萬物東方物所生也白虎通有垣苑丨丨曰囿說文植木築土丨丨為苑丨丨為囿說文遭藪值林丨丨為圃丨丨為苑注言林藪非一所在皆為苑囿左太冲吳都賦苑禁山雍氏丨丨為苑令禽獸自得其性禮因野丨原丨以作苑班固東都賦藴薪蒸苑丨也言丨所丨積也風俗通獵禽獸天子秋冬射丨苑中取丨丨漢舊儀注三六所太僕牧師諸苑丨丨丨分布北邉西邉以郎為苑監官奴婢三萬人飬馬三十萬匹飬鳥獸者通名為苑故謂牧馬處為苑漢儀注三百里漢上林苑即秦之舊也武帝建元三年開東南至藍田宜春鼎湖御宿昆吾旁南山而西至長楊五柞北繞黃山瀕渭水而東周袤丨丨丨離宫七十所皆容千乘萬騎三輔黃圖長洲苑修治上林圈守禽獸不如丨丨之丨注服曰吳苑孟曰以江水洲為苑也韋昭曰丨丨在吳東前枚乘說吳王書甘泉苑丨丨丨武帝置緣山谷行至雲陽三百八十一里西入扶風凡周回五百四十里苑中起宫殿臺閣百餘所有仙人觀石闕觀封巒觀鳷鵲觀御宿苑在長安城南三輔黃圖立思賢孝文帝為太子丨丨丨苑以招賔客苑中有堂皇六所三輔黃圖獵廣成後漢靈帝光和五年校丨丨丨苑後漢紀游兔園歲將暮時既昏寒風積愁雲繁梁王不悅丨於丨丨注兔園苑名謝惠連雪賦張圍獵霍雲當朝請數稱病私出多從賔客丨丨丨黃山苑漢書數軍實丨丨丨乎桂林之苑注吳有桂枝苑在建鄴東北里注左太冲吳都賦併劉淵林鴻德靈昆後漢威帝延熹元年置丨丨苑漢記又後漢有丨丨畢土丨丨廣成諸苑徐堅初學記鹿子平樂晉有丨丨丨丨桑梓諸苑徐堅初學記戲九尾狐苑丨丨丨之丨注元命包云天命文王以九尾禽禽狐也張景陽十命獲三白鼠後魏永興三年於北苑丨白鼠剖之腹中丨子盡丨至尊屠肉齊東昏以閲武堂為芳樂苑窮竒極麗苑中立店肆潘妃為市令自為市吏録事將鬪者就妃罰之百姓歌曰閲武堂種楊柳丨丨丨丨潘妃酤酒夫人市寵隋煬帝大業元年五月築西苑周三百里其內為海周十餘里為方丈蓬萊瀛洲諸山髙出水百餘尺臺觀宫殿羅絡山上向背如神海北有龍鱗渠縈紆注海內緣渠十六院門皆臨渠每院以四品夫人主之堂殿樓觀窮極華麗宫樹秋冬雕落則剪綵為花葉綴於枝條色渝則易以新者常如陽春沼內亦剪綵為荷芰菱芡乘輿遊幸則去氷而布之十六院競以殽羞精麗相髙求丨恩丨上好以月夜從宫女數千騎遊西苑作清夜遊曲於馬上奏之隋紀囿域禽囿者築墻為界域故云丨丨獸詩靈臺疏禁獸囿人掌囿游之獸丨收百丨禮地官麟臻二帝三王沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖厨而已不奪百姓膏腴穀土桑柘之地故丨丨其囿前楊雄傳鹿伏王在靈囿麀丨攸丨麀鹿濯濯白鳥鶴鶴詩靈臺原圃鄭有丨丨左僖三十三年具囿秦有丨丨同上築鹿成公十八年秋丨丨囿書不時也左射鴻衛獻公丨丨於囿左傳取蒍圃惠王即位丨丨國之丨以為囿注圃園囿苑也左莊十九蕩公舟齊侯與蔡姬乘舟於囿丨丨丨注蕩搖也囿苑也蓋漁池在苑中左僖三棄田以園堯舜既沒聖人之道衰暴君代作壞公室以為汚池民無所安息丨丨丨為丨囿使民不得衣食邪說暴行又作園囿汚池沛澤多而禽獸至孟滕文公下為阱於國齊宣王問曰文王之囿方七十里有諸孟子對曰於傳有之曰若是其大乎曰民猶以為小也曰寡人之囿方四十里民猶以為大何也曰文王之囿方七十里芻蕘者往焉雉兔者往焉與民同之民以為小不亦宜乎臣始至於境問國之大禁然後敢入臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪則是方四十里丨丨丨丨中民以為大不亦宜乎孟子梁惠王上騶虞麋鹿囿丨丨之珍羣藪丨丨之怪獸前司馬相如封禪書麒麟神爵眩丨丨之囿幸丨丨之林前揚雄校獵賦為獸所傷漢廣陵王胥有勇力常於别囿學格熊後遂能空手摶之莫不絶脰後丨丨丨丨陷腦而死三輔黃圖東方朔諫起上林臣聞謙遜靜慤天表之應應之以福驕溢靡麗天表之應應之以異今陛下纍郎臺恐其不髙也弋獵之處恐其不廣也如天不為變則三輔之地盡可以為苑何必盩厔鄂杜乎奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之阻也南有江淮北有河渭厥壤肥饒此所謂天下陸海之地貧者得以人給家足無饑寒之憂故豐鎬之間號為土膏其賈畝一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五榖其不可一也且盛荆棘之林而長飬麋鹿廣狐兔之苑大虎狼之墟又壞人家墓發人室廬令幼弱懷土而思耆老泣涕而悲其不可二也斥而囿之垣而囿之騎馳東西車騖南北又有深溝大渠夫一日之樂不足以危無隄之輿其不可三也故務苑囿之大不恤農時非所以强國富人也臣願陳泰階六符以觀天變不可不省司馬卿賦獵上林亡是公聽然而笑曰楚則失矣而齊亦未為得也夫使諸侯納貢者非為財幣所以述職也封疆畫界者非為守禦所以禁淫也今齊列為東藩而外私肅慎捐國踰限越海而田其於義固未可也且夫二君之論不務明君臣之義正諸侯之禮徒事爭游戲之樂苑囿之大欲以奢侈相勝荒淫相越此不可以揚名發譽而適足以貶君自損也且夫齊楚之事又焉足道乎君未覩夫巨麗也獨不聞天子之上林乎左蒼梧右西極丹水更其南紫淵徑其北終始灞滻出入涇渭鄷鎬潦潏紆餘委蛇經營乎其內蕩蕩乎八川分流相背而異態東西南北馳騖往來出乎椒丘之闕行乎洲淤之浦經乎桂林之中過乎泱漭之壄汩乎混流順阿而下赴隘狹之口觸穹石激堆崎沸乎暴怒洶涌澎湃滭沸滵汨逼側泌瀄橫流逆折轉騰潎冽滂濞沆溉穹隆雲橈宛灘膠盩踰波趍浥蒞蒞下瀨批巖衝擁奔揚滯沛臨坻注壑瀺灂霣墜沈沈隱隱砰磅訇礚潏潏淈淈湁潗鼎沸馳波跳沫汨濦漂疾悠逺長淮寂漻無聲肆乎永歸然後灝溔潢漾安翔徐回翯乎滈滈東注太湖衍溢陂池於是乎蛟龍赤螭䱎䲛漸離鰅鰫鰬魠禺禺魼鰨揵鰭掉尾振鱗奮翼潜處乎深巖魚鱉歡聲萬物衆夥明月珠子的皪江靡蜀石黃碝水玉磊砢磷磷爛爛采色澔汗叢積乎其中鴻鷫鵠鴇駕鵝屬玉交精旋目煩鶩庸渠針疵鵁盧羣浮其上沈淫泛濫隨風淡淡與波搖蕩掩薄水渚唼喋菁藻咀嚼菱藕於是乎崇山矗矗巃嵸崔巍深林巨木嶄巖㟥嵳九峻嶻嶭南山峩峩巖陀巘錡嶊崣崛﨑振溪通谷蹇産溝瀆谽呀豁閕阜陵别塢嵗磈㟪廆邱虛堀礨𨼆轔鬱㠥登降施陂池貏豸沇溶淫鬻散渙夷陸亭臯千里靡不被築掩以緑蕙被以江籬糅以蘼蕪雜以留夷布結縷攢戾莎揭車蘅蘭槀本射干茈薑蘘荷葴撜若蓀鮮支黃礫蔣苧青薠布濩閎澤延蔓太原離靡廣衍應風披靡吐芳揚烈郁郁菲菲衆香發越肹蠁布寫䁆涖咇茀於是乎周覽泛觀縝紛軋芴芒芒恍忽視之無端察之無聞日出東沼入乎西陂其南則隆冬生長涌水躍波其獸則㺎旄貘㹈沱牛麈麋赤首圜題窮竒象犀其北則盛夏含凍裂地涉氷揭河其獸則麒麟甪端騊駼槖駝蛩蛩驒騱駃騠驢贏於是乎離宫别館彌山跨谷髙廊四注重坐曲閣華榱璧璫輦道纚屬步櫩周流長途中宿夷峻築堂纍臺增成巖窔洞房俯杳眇而無見仰攀橑而捫天奔星更於閨闥宛虹扡於楯軒青龍蚴蟉於東廂象輿婉蟬於西清靈圄燕於間館偓佺之倫暴於南榮醴泉涌於清室通川過於中庭盤石振崖嶔巖倚傾嵯峨㠎嶫刻削崢嶸玫瑰碧琳珊瑚叢生瑉玉旁唐玢豳文鱗赤瑕駁犖雜函其間朝采琬琰和氏出焉於是乎盧橘夏熟黃甘橙榛枇杷橪柿楟奈厚朴梬棗楊梅櫻桃蒲陶隱夫薁棣答遝離羅乎後宫列於北園䝯丘陵下平原楊翠葉杌紫莖發紅花垂朱榮煌煌扈扈照曜巨野沙棠櫟櫧華楓枰櫨留落胥邪仁頻并閭欃檀木蘭豫章女貞長千仞大連抱夸條直暢實葉葰楙攢立叢倚連卷欐佹崔錯發骪坑衡閜砢垂條扶疏落英幡纚紛溶簫蔘猗狔從風瀏蒞卉歙蓋象金石之聲管籥之音偨池茈虒旋還乎後宫雜襲絫輯被山緣谷循坂下隰視之無端究之無窮玃飛􅀈蛭蜩蠼猱獑胡豰蛫棲息乎其間長嘯哀鳴翩幡互經夭蟜枝格偃蹇杪顛踰絶梁騰殊榛揵垂條掉希間牢落陸離爛漫逺遷若此者數百千處娛游往來宫宿館舍庖厨不徒後宫不移百官備具云云揚子雲羽獵賦序孝成帝時羽獵雄從以為昔在二帝三王宫館臺榭沼池苑囿林麓藪澤財足以奉郊廟御賔客充庖厨而已不奪百姓膏腴縠土桑柘之地女有餘布男有餘粟國家殷富上下交足故甘露零其庭醴泉流其唐鳯凰巢其樹黃龍遊其沼麒麟臻其囿神爵棲其林昔者禹任益虞而上下和草木茂成湯好田而天下用足文王囿百里民以為尚小齊宣王囿四十里民以為泰大裕民之與奪民也武帝廣開上林東南至宜春鼎湖御宿昆吾旁南山西至長楊五柞北繞黃山濵渭而東周袤數百里穿昆明池象滇河營建章鳯闕神明馺娑漸臺太液象海水周流方丈瀛洲蓬萊遊觀侈靡窮妙極麗雖頗割其三垂以贍齊民然至羽獵甲車戎馬器械儲偫禁籞所營尚泰奢麗誇詡非堯舜成湯文王三驅之意也又恐後世復修前好不折中以泉臺故聊因校獵賦以風之其辭曰或稱羲農豈或帝王之彌文哉論者云否各亦並時而得宜奚必同條而共貫則泰山之封焉得七十而有二儀是以創業垂統者俱不見其奧遐邇五三孰知其是非乃作頌曰詩集苑遊上苑明朝丨丨丨火急報春知花須連夜發莫待曉風吹下南苑憶昔霓旌丨丨丨苑中萬物生顔色杜梨花落曲水飄香去不歸丨丨丨盡成秋苑李賀芰荷香長洲丨丨丨注長洲苑名杜囿惠風蕩丨丨丨繁囿謝叔源散紅桃虛囿丨丨丨古今合璧事類備要别集卷二十
