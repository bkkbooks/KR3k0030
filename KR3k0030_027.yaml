body:
  text: 古今合璧事類備要前集卷二十七宋謝維新撰親屬門祖孫事類無忝丨丨爾祖詩纘戎丨丨祖考蒸民祖武繩其丨丨下武祖服纘乃丨丨注服行事也書耳孫應劭曰丨丨者元孫之子也言其去髙曾益逺但耳聞之也惠紀注雲孫子之子為孫孫之子為曾孫曾孫之子為玄孫玄孫之子為來孫來孫之子為晜孫晜孫之子為仍孫仍孫之子為丨丨言輕逺如浮雲也爾雅見祖凡父在孫丨於丨祖名之禮率祖自仁率親等而上之至于祖名曰輕自義丨丨順而下之至于禰名曰重一輕一重其義然也注用恩則父母重祖輕用義則祖重父母輕抱孫君子丨丨不抱子此言孫可以為王父尸子不可以為父尸舍孫公儀仲子之喪仲子丨其嫡丨而立其庶子檀弓免焉子服伯子曰昔者文王丨伯邑考而立武王微子丨其丨腯而立衍仲子亦猶行古之道也孔子曰否立孫詳見禮記檀弓貽子孫明明我祖有典有則丨厥丨丨書在子孫陳厲公生敬仲其少也周史有以周易見陳侯陳侯使筮之曰遇觀之否曰是謂觀國之光利用賔于王其代陳有國乎不在此其在異國非在其身丨其丨左丨光逺而自他有耀者也其後陳桓子成得政於齊祖孫繼相伊尹相湯伊陟相太戊祖孫相望召康公奭十六世孫召穆公虎佐宣王平淮夷故江漢之詩曰文武受命召公維翰無曰豫小子召公是似祖孫積學董仲舒子及孫皆以學至大官祖孫封侯漢武帝元狩元年封故鄼侯蕭何曾孫為鄼侯祖孫宰相李栖筠之子吉甫其孫德裕祖孫名將馬璘讀馬援傳至丈夫當死邉野慨然曰使吾祖勳業墜地下乎卒為中興名將裕王猛之孫鎮惡喜論軍國大事或薦鎮惡於劉與語説之曰吾聞將門有將鎮惡信然祖孫彰惡左氏傳秦伯問士鞅曰晉大夫誰先亡對曰其欒氏乎黶汰虐已甚猶可以免其身禍在盈也欒黶死盈之善未能以及人武子之施沒矣而黶之惡實彰將於是乎在後晉果滅欒氏應劭曰晉大夫欒書書子黶黶子盈書賢而覆黶黶惡而害盈曹大家曰天命祐善災惡非有差也然其道廣大雖父子百葉猶若一體也祖孫移山北山愚公年且九十面山而居懲山北之寒出入之迂也遂率子孫荷擔扣石墾壤箕畚運於北海之尾河曲智叟笑而止之愚公長息曰我之死有子在焉子又生孫孫又生子子又生孫子子孫孫無窮匱也而山不加增何苦不平河曲智叟無以應之列子子孫娛目王羲之牽諸子抱弱孫一味之甘割而分之以娛目前子孫燕侍石奮歸老于家丨丨為小吏來歸謁必朝服見之不名子孫有過失不誚讓為便坐對案不食諸子相責肉袒謝罪乃許子孫勝冠者在側雖燕必冠申申如也不辨羣孫後周李遷哲嘗除真州刺史即本州也遷哲妾媵百數男女六十九人緣漢千餘里第宅相次姬媵之有子者分處其中遷哲鳴笳導從往來其間縱酒歡宴子孫參見或忘其年名披簿以審之郭子儀諸孫數十人每羣孫問安丨盡丨頷之而已喜見曾孫周蕭願梁宰相頎之子曽祖警唐僖宗朝入相接客之次願為兒童戲效為傳呼之聲警語諸客曰余不敢以得位為喜所幸者壽考今又有曽孫在吾目前祖不及孫王承昶之孫清虛寡欲不飾文辭論者以為丨丨丨丨本傳子有佳兒許敬宗孫彥伯昂子也頗有文敬宗晚年不復下筆凡大典册悉彥伯為之嘗戲昂曰吾兒不及若兒答曰渠父不及昂父世説張蒼梧乃張憑之祖嘗語其父曰我不如汝憑父未解所以蒼梧曰汝有佳兒憑時年數歲斂手曰阿翁詎宜以子戲父祖不教孫王敬𢎞歲中見兒孫不過一再見見輒刻日未嘗教子孫學問多隨所欲或問之答曰丹朱不應乏教寧越不聞被箠南史祖預期孫衛玠年五歲風神秀異祖父瓘曰此兒有異於衆顧吾年老不見其長成耳陳羣為兒時祖實謂宗人曰此兒必興吾門王晙少孤好學祖有方奇之曰是子必興吾宗與孫命名鄭玄有孫以手文似已名曰小同本傳與孫命字虞詡祖父為縣獄吏多所平理曰于公子孫竟至三公吾雖不及于公子孫何必不為九卿遂字詡曰升卿不留財産衛端木叔子貢世子也籍先資纍千金年六十棄家散庫一年盡丨為子孫丨丨丨散之一國及病無藥石之儲死無瘞埋之所受施者相與反子孫之財列子不立産業漢疏廣歸鄉里以所賜金日與鄉里樂飲子孫因鄉里長纍勸為子孫立産業廣曰此金聖主所賜以惠養老臣故樂與鄉黨共之遺以清白楊震性亷子孫常蔬食步行或欲令開産業震曰使後世稱為清白吏子孫以此遺之不亦厚乎遺之以安龎公未嘗入城府夫妻相敬如賔劉表候之龎公釋耕壠上而妻子耘於前表指而問曰先生君居畎畝而不肯官祿後世何以遺子孫龎公曰世人皆遺之以危今獨丨丨丨丨雖所遺不同未嘗無所遺也表嘆息而去陶侃之孫丨潛丨丨丨賈誼之孫丨丨丨丨賈嘉謝玄有孫謝靈運祖玄晉車騎將軍父㬇生而不慧早亡靈運幼便頴玄甚異之謂親知曰我乃生㬇㬇兒何不及我楊震有孫靈帝謂丨丨孫秉曰卿強項真楊震子孫狄梁公後丨仁傑孫兼謨有祖風遷御史中丞帝曰卿丨丨丨當嗣家聲不可不謹員半千孫丨俶九歲升堂詞辨注射帝異之曰丨丨丨固當然李泌傳孫有祖風李陵之子當戶早死有子陵為侍中善騎射愛人下士帝以為有廣之風起唐文宗以右拾遺魏謨證之裔孫頗奇之謨纍諫轉居舍人紫宸中謝上曰卿家有舊書詔否對曰比多失墜惟簮笏存上曰進來鄭覃曰在人不在笏上曰覃不解朕意此甘棠之義非笏而已宣宗嘗曰謨名臣丨丨丨丨朕心憚之贊曰謨之議論挺挺有祖風烈拜受祖官晉鄧攸祖殷有賜官勑攸受之後太守勸去王官舉為孝廉攸曰先人所賜不敢改也本傳祖勳補官衛次公為兵部侍郎故英公李績孫及大理卿徐有功孫皆以貧不得調次公召見曰子之祖勳在王府寧限常格即優補而遣祖罵為奴苻生幼而無賴丨洪甚惡之生無一目洪戲之曰吾聞瞎兒一淚生怒引刀自刺出血曰此亦一淚洪鞭之生曰性耐刀槊不堪鞭箠洪曰吾將以爾為奴生曰可不如石勒也本傳見石思祖薛元超轉中書舍人省中有磐石祖道衡為侍郎時常據以草制元超每丨輒泫然流涕本傳執硯思祖見祖父母門發明祖書姚珽始曾祖蔡嘗著漢書訓纂而後之注漢書多竊取其義為已説珽著絽訓以丨丨舊義泣拜祖像見祖父母門祖孫三世韓愈撰殿中少監馬君墓志曰始余初冠應進士貢在京師窮不能自存以故人稚弟拜北平王燧於馬前王問而憐之因得見於安邑里第王軫其飢寒賜食與衣召二子使為之主當是時見王於北亭猶髙山深林龍虎變化不測傑魁人也退見少傅即其子暢翠竹碧梧鸞鵠停峙能守其業者也姆抱幼子立側眉眼如畫髮漆黑肌肉玉雪可憐娟好靜秀瑶環瑜珥蘭茁其芽稱其家兒即殿中少監馬君繼祖也嗚呼吾未耄自始至今未四十年而哭其丨子丨丨丨于人世何如也韓文戒子孫訓立己以孝悌為基恭默為本畏怯為務勤儉為法肥家以忍順保交以簡恭廣記如不及求名如儻來蒞官則潔巳省事而後可以言家法家法備然後可以言養人直不近禍亷不沽名憂與禍不偕潔與富不並董生有云吊者在門賀者在閭言憂則恐懼恐懼則福至又曰賀者在門吊者在閭言受福則驕奢驕奢則禍至名門右族莫不由祖考忠孝勤儉以成立之莫不由子孫頑率奢傲以覆墜之成立之難如升天覆墜之易如燎毛夫行道之人德行文學為根株正直剛毅為柯葉有根無葉或可俟時有葉無根膏南所不能活也至於孝慈友悌忠信篤行乃食之醯醬可一日無哉柳玭書戒子孫説上品之人不教而善中品之人教而後善下品之人教亦不善不教而善非聖而何教而後善非賢而何教亦不善非愚而何是知善也者吉之謂也不善也者凶之謂也吉也者目不觀非禮之色耳不聽非禮之聲口不道非禮之言足不踐非禮之地人非善不交物非義不取親賢如就芝蘭避惡如畏蛇蝎或曰不謂之吉人則吾不信也凶也者語言詭譎動止隂險好利飾非貪淫樂禍疾良善如讎隙犯刑憲如飲食小則殞身滅性大則覆宗絶嗣或曰不謂之凶人則吾不信也傳有之曰吉人為善惟日不足凶人為不善亦惟日不足汝等欲為吉人乎欲為凶人乎邵康節詩集長孫枝玉牙珠顆小男兒羅薦蘭湯浴罷時芣茝春來盈女子梧桐老去丨丨丨白樂天峙頭玉朋來四男子大壯泰臨復無官一身輕有子萬事足舉家傳吉夢殊相驚凡目爛爛開眼電磽磽丨丨丨注李賀詩頭玉磽磽眉刷翠杜郎生得真男子東坡賀子由生孫諸父伯父叔父又互見姪門事類諸父既有肥羜以速丨丨疏伯父叔父伐木丨丨兄弟備言燕私楚茨親親則丨丨昆弟不怨中庸世父父之昆弟先生為丨丨後生為叔父爾雅從父父之丨丨昆弟為丨祖丨同上仲父伯把也把持家政也父弟為仲仲中也位在中也丨丨之弟曰叔父叔少也叔父之弟曰季季癸也甲乙之次季在下也釋名伯父棄子活姪晉武康有兄弟妻各有孕弟逺行未反遇歲荒不能兩全丨其丨丨弟之子孔嚴時為吳興守褒薦之六帖棄兒全姪魏張範子陵及弟子戩為山賊所得範直詣賊請二子賊以陵還範範謝曰諸君相還兒厚矣夫人情雖愛其子然吾憐戩之小請以陵易之賊義其志悉以還範晉鄧攸永嘉亂走擔其兒及弟子綏度不能兩全乃謂妻曰吾弟早亡唯有一息理不可絶應自棄我兒妻泣從之晉書叔父卿家癡叔王湛初有隱德人莫能知兄弟宗族皆以為癡兄子濟輕之嘗詣湛見床頭有周易濟請言之因剖析玄理微妙有奇趣嘆曰家有名士三十年而不知濟去叔送出門濟從騎有一馬難乘無能騎者請騎之回䇿如縈濟益嘆其難測既還渾問濟何以暫行纍日曰始得一叔渾問其故具歎述如此渾曰何如我濟曰濟以上人武帝每見濟輒以湛調之曰丨丨丨丨死未濟曰臣叔殊不癡山濤以下魏舒以上由是顯名宗姓叔父羅威賦詠甚有情致錢塘人羅隱有詩名自號江東生威遣使賂遺敘其丨丨推為丨丨威酷嗜其詩目已所為曰偷江東集舊史自乳兄子元德秀兄子襁褓喪親無資得乳媪乃丨丨之數日湩流能食乃止撫育兄子謝幾卿家門篤睦兄才卿卒子早孤幼幾卿丨丨甚厚及長皆幾卿奬訓之力趙宏智撫兄子慈均所生任壤父陳將忠之兄為定逺太守瓌早孤忠撫愛異常曰吾子雖多庸保爾所以寄門戶者瓌也教兄子學後漢淳于恭兄崇卒恭養孤幼教訓學問有不如法反自捶以感悟之兒慙改過視兄子病後漢第五倫字伯魚或問倫有私乎曰余兄子嘗病一夜十起退而安寢余子有病雖不省視而通夕不寢若是可謂無私乎與姪交遊阮咸字仲容任達不拘丨叔籍為竹林之遊諸阮居道北咸居道南南阮富而北阮貧許見宗族門攜姪出遊謝安字安石於東山營墅樓館林木甚盛每丨中外子丨往來遊集肴饌亦屢費百金世頗以此譏焉而安殊不以屑意焚姪香囊謝元嘗佩紫羅香囊叔安惡之而不欲傷其意因戲賭得乃丨之怒姪設饌晉謝安嘗詣陸納納兄子俶密作食供之納設茶果俶下精飯食罷納大丨杖四十曰不能光我叔父而乃穢我素風封姪以縣唐魏證以定五禮當封一子男證請丨孤兄子叔慈帝愴然曰此可以勸俗即許之舉姪督軍謝安兄子玄有經國才略時符堅數侵冦安乃丨玄為前鋒戰于淝水苻堅餘衆棄甲宵遁聞風聲鶴唳以為王師至誡兄子書吾欲汝曹聞人過失如聞父母之名耳可得而聞口不得言也好議論人長短妄是非政法此吾所大惡也寧死不願子孫有此行也龍伯髙敦厚周密口無擇言謙約節儉廉公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂清濁無所