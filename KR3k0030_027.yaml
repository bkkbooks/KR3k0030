至丨丨邠郾鄲凡為禮部五吏部再唐興無有也夾河為郡漢杜周為廷史久任事列三公兩子丨丨丨丨守本傳二龍出守梁簡文帝餞臨海太守劉孝儀蜀郡太守劉孝勝詩曰兩杜昔夾河丨丨今丨丨對管華近溫大雅歷遷黃門侍郎弟彥博為中書侍郎丨丨丨丨識者榮之髙祖從容謂曰我起晉陽為卿一門耳同為幕官西川杜憬辟楊收節度判官弟嚴觀察判官兄弟同幕時人榮之未幾同入為御史大小大夫李光進其先河曲諸部姓阿跌氏王承宗救易定表光進為都將時光顔亦至大夫故軍中呼丨丨丨丨俄為振武軍節度使賜姓以光寵之别詔光顔拜洛州刺史兄弟榮冠當時交換節度涼國李訴自鳯翔隴右節度代其兄願為武寧軍節度使兄弟交換徐岐兩鎮世推顯家孫簡歷河中興元宣武節度使而弟範亦為淄青節度使丨丨丨丨時號列宿韋叔諧正觀中為庫部郎中與弟吏部郎中叔謙兄主爵郎中季武同省丨丨三丨丨舉兄為代見前弟舉兄才以弟為代韋嗣立為萊蕪令太后召問曰卿父嘗言臣有兩兒堪事陛下卿兄弟在官誠如父言朕今以卿代兄即日拜鳯閣舍人唐紀五張髙第張知謇兄弟五人知玄知晦知泰知默皆明經髙第三楊進士楊憑與弟凌凝皆有名大歷中踵擢進士第時號三楊七人擢第薛播兄弟丨丨皆丨進士丨為衣冠光韙並孔帖同榜雙舉同前貢舉兩收立棠棣碑賈敦頤為洛州司馬人為刻碑市傍弟敦實又為長史人復為丨碑其側號丨丨丨稱桐木家韓子華兄弟皆為宰相所居第有梧桐京師丨丨丨韓丨以别康公其家呼子華為三相公持國為五相公兄草弟麻錢希白帷演從兄也惟演拜相希白當制世稱弟拜相兄草麻自古未有惟座主邦相門生草麻前代記之久矣金坡遺事弟草兄制韓子華自鄂州再入相持國在翰苑遂當制縉紳榮之元豐官制行曲阜之除天官南豐為西掖行詞元符末魯公拜相曲阜以學士草制對便殿以親嫌辭上云禁中已檢見韓維故事乃批旨云兄弟迭居詞禁兄行弟辭丨丨丨丨是日以天寧節前二日密院罷散齋筵晉公押筵曲阜居席面會徹宣召鎖院魯公大拜榮耀又非韓公之比同時輔相韓獻肅公綘兄弟天性友愛自忠憲公為兩府大臣至公兄弟同時為真相近輔者三人又皆眉壽公將歸許而兩弟時亦皆七十同時請老朝廷未許其為榮盛前古未有行狀同時榮達陳堯叟堯佐俱拜平章堯咨以儒臣換節度使同時貴顯孫何門孫僅皆以進士冠天下宋祁宋郊號二宋詳見狀元兄弟同難兄弟禦侮兄弟鬩于牆外禦其侮每有良朋蒸也無戎兄弟同讎丨丨之讎不反兵記代死載旌衛宣公與伋子白旄告盜曰見白旄殺壽子聞之載其旄而往盜殺之伋子至曰我之求也彼何罪焉盜又殺之史見危授馬姚襄戰馬中流矢弟萇下馬授襄曰天下可無我不可無兄遇盜爭死薑肱嘗與弟季江俱詣郡夜於道遇盜欲殺之肱曰弟年幼父母所憐又未娶願殺身濟弟季江曰兄年德在前家之珍寶國之英俊乞自受戮以代兄命盜遂兩釋之奪其衣資既至郡中終不言盜盜聞而感悟後乃就精廬求見徵君謝罪趙孝弟禮為賊所得將食之孝自縛詣賊曰禮瘦不如孝肥賊曉其意俱舍之為兄報仇索靖子琳字巨秀舉秀才除郎中嘗報兄之仇手殺三十七人時人莫不壯之兄弟離别行役瞻望陟彼岡兮瞻望兄兮兄曰嗟豫弟行役陟岵永罷歡愈友于兄弟分形共氣兄肥弟瘦無復相見之期讓棗推梨丨丨丨丨之日心乎愛矣書不盡言梁世祖記三荆之變見前分財四鳥之悲孔子聞婦人哭聲謂顔淵曰此非獨哀又有離别之聲何以知之曰昔桓山有鳥生四子羽翼既成將分飛聲類於此問之果然父死賣子以葬白帖兄弟死喪孔懷之戚死喪之威兄弟孔懷原隰裒矣兄弟求矣獨亡之憂司馬牛憂曰人皆有兄弟我獨亡語兄死不衰成人有丨丨而丨為之丨者聞子臯為成宰遂為之衰成人曰蠶則績而蟹有筐范則冠而蟬有緌兄則死而子臯為之縗記兄卒行服後漢馬援丨丨援丨丨期年不離墳墓所漢書兄死受弔周顗被害王敦使人吊焉弟嵩曰亡兄天下有義人為天下無義人所殺何所吊敦甚銜之因事誅嵩嵩事佛臨刑猶誦經兄卒哀慟趙𢎞智父事兄𢎞安俸祿歸之不敢私𢎞安卒哀慟過期弟卒哀毁畢構弟栩大府留司東都聞疾馳歸丨丨丨丨如大喪雖變服未嘗笑天下稱其友弟人琴俱亡王微之與獻之俱病術人曰應終有生人樂代則死者可生徽之曰吾才不如弟請代術人曰凡代死者已年有餘今君與弟俱盡何可代獻之卒徽之奔喪不哭直上靈牀坐取獻之琴彈之久而不調曰嗚呼丨丨丨丨因頓絶月餘亦卒子孫為囑李績弟弼為晉州刺史以績疾召為司衛卿使省視忽語曰我似少愈可置酒相樂於是奏樂宴飲列子孫于下將罷謂弼曰我即死欲有言恐悲哭不得盡故一訣爾我見房元齡杜如晦髙季輔皆辛苦立門户亦望貽後悉為不肖子敗之我子孫今以付汝汝可謹察有不厲言行交非類者急榜殺以聞母令後人笑吾猶吾笑房杜也從兄弟河東三鳯薛元敬隋選部郎邁之子與從兄弟收及族兄德音齊名世號丨丨丨丨收為鵷雛德音為鸑鷟唐書轅門二龍烏承玭與族兄承恩皆為平盧先鋒沈勇而決號丨丨丨丨孔帖三從同居牛敬則與三從兄弟居四十餘年資産無異三世共財蔡雍與從弟同居三世不分財鄉黨髙其義本傳恩猶同産馬稜字伯威少孤依從兄毅共居丨丨丨丨毅卒心喪三年親甚同氣白居易祭文云自古孔懷之痛亦莫我之與劇手足一斷無因重連奇老雖從祖之兄弟甚同氣之天倫念從弟語馬援南擊交趾曰吾從弟少遊常哀吾慷慨多大志曰士生一世但取衣食裁足致求嬴餘但自苦耳當吾在浪泊西里間下潦上霧毒氣薰蒸仰視飛鳶跕跕墮水中卧念少遊平生語何可得也私從弟官王衍雖居宰輔之重不以經國為念而思自全之計乃以弟澄為荆州從弟敦為青州因相謂曰荆州有江漢之固青州有負海之險卿二人在外而吾留此足以為三窟矣識者鄙之弟類其兄白居易從祖弟敏中武宗雅聞居易名欲召用之是時居易年高李德裕言其衰薾不任事即薦敏中文詞類其兄而有器識即日知制誥孔帖弟排其兄許靖字文休汝南人少與從弟劭俱知名而私情不協劭為郡功曹排擯靖不得齒敘馬磨自給遜與弟田李孟元性恭順與叔子就同居就有痼疾孟元推所有田園悉以讓就夫婦紡績自給而已白帖不過兄飯帝問第五倫伯魚曰聞卿為吏丨丨從丨丨有之帖乎對曰臣少遭飢亂實不敢妄過人飯帝大笑白義兄弟兄事子産孔子過鄭與子産如兄弟孔子丨丨丨丨史兄事趙禹漢張湯趙禹共定律令務在深文禹至少府湯為廷尉交歡兄事禹弟畜灌夫季心長事袁絲以兄事之而丨丨丨丨籍孺子白帖兄事同庚孫權母謂權曰公瑾伯符同年小一月耳我視之如子汝可兄事之恩若兄弟關羽張飛為别部司馬先主與二人寢則同牀丨丨丨丨稠人廣坐立侍終日詩集對牀余解郡符去爾為外事牽寧知風雨夜復此丨丨眠始話南池飲更詠西樓篇無將一會夢歲月坐推遷韋應物示全真元常轍幼從子瞻兄讀書未嘗一日相舍既壯宦遊四方讀隼蘇州詩有那知風雨夜復此丨丨眠惻然感之乃相約早退為間居之樂故子瞻始為鳯翔幕官留詩與轍曰夜雨何時聽蕭瑟鄭州馬上作其後熙寧十年二月始會于澶濮之間留百餘日宿于逍遙堂追感前約作二小詩云逍遙堂後十尋木長送中宵風雨聲誤喜丨丨尋舊約不知漂泊在彭城秋來東閣涼如水客去山公醉似泥困睡北忩呼不醒風吹松竹雨凄凄蘇子由子由將赴南都與余會宿于逍遙堂作兩絶句讀之殆不可為懷因和其詩以自解云别期漸近不堪聞風雨蕭蕭已斷魂猶勝相逢不相識形容變盡語音存伹令朱雀長金花此别還同一轉車五百年間誰復在會看銅狄兩咨嗟東坡得書陽翟空知處荆南近丨丨積年仍逺别多難不安居江漢春風起冰霜昨夜除雲天猶錯莫花蕚尚蕭疏對酒都疑夢吟詩正憶渠舊時元日會鄉黨羡吾廬杜第懷弟然萁魏文帝嘗令東阿王七步中作詩不成者行大法應聲曰煮豆丨豆丨豆在釡中泣本是同根生相煎何太急史夢草謝惠連幼有奇才族兄靈運靈每有篇章對惠連輒有佳句運作春詩未就夢見惠連覺而得云池塘生春草之句自以為有神助參商行至上留田孤墳何崢嶸積此萬古恨春草不復生悲風四邊來腸斷白楊聲問是誰家地埋沒蒿里塋故老為余言言是上留田蓬科馬鬛今已平昔之弟在兄不葬他人舉銘旌一鳥死百鳥鳴一獸走百獸驚恆山之禽别離苦欲去回翔不能征田氏倉卒骨肉分青天白日摧紫荆交柯之木本同形東枝憔悴西枝榮無心之物尚如此丨丨胡乃尋天兵孤竹延陵讓國揚名髙風緬邈頽波激清尺布之謡塞耳不能聽李白上留田歸隱八年三郡駕朱輪更沗鴻樞對秉均老去師丹多忘事少之燭武不如人車中顧馬空能數海上逄鷗想見親惟有弟兄丨丨志共將耕鑿報堯仁宋公序寄子京鴻鴈行汝南許文休馬磨自衣食但聞郡功曹滿世名籍籍渠命有顯晦非人作通塞春氏多英俊少遊眉最白頗間丨丨丨篳皆萬人敵吾早知有覯而不知有覿少儀袖詩來剖蚌珠的皪乃能持一鏃與我箭鋒直自吾得此詩三日卧向壁挽之不能寸推去輒數尺才難不其然有亦未相識山谷贈秦少儀鶺鴒原孫僅與兄何齊名有聲場屋何淳化中魁多士僅下第有詩曰來春再就天街試應被人呼小狀元次舉中甲科王元之以詩贈曰病中何事忽開顔憶得詩稱小狀元粉壁已懸龍虎榜錦標爭屬丨丨丨古今詩話二蘇三孔東坡子由孔文仲經甫武仲常甫平仲毅甫俱以才名播天下魯直有詩云二蘇上連壁三孔分立鼎天不墜斯文俱來集臺省四謝四洪魯直甥洪芻駒父洪朋龜父洪炎玉父洪羽鴻父四人俱有名潘邠老作洪氏倦殼軒云封胡羯末謝龜駒玉鴻洪千載望丨丨丨丨天壤同王直方詩話古今合璧事類備要前集卷二十七
