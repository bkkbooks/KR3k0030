body:
  text: 古今合璧事類備要前集卷八宋謝維新撰地理門川事類注瀆丨丨曰川水鍾曰澤禮地官通海川雖曲而丨諸丨則由諸揚子學海百川丨丨而至於海同上歸海天下之水莫大於海百川丨之不知何時止而不盈莊子灌河秋水時至百川丨丨莊秋水篇水通譬之丨也丨之斯為川焉塞之斯為淵焉李蕭逺運命論𣲖别百川丨丨歸海而會左太沖賦爭流客有問顧愷之會稽山川對曰千岩競秀萬壑丨丨本傳不舍子在川上曰逝者如斯夫丨丨晝夜語並流百川丨丨不朝海者不為川谷淮南子異源百川丨丨皆歸于海同上納汙川澤丨丨山藪藏疾左傳導氣古之長民者不防川川氣之丨也國語防川防民之口甚于丨丨川壅而潰傷民必多是故為川者決之使導同上障川丨百丨而東之回狂瀾于既倒韓文道若川丨若塗丨丨車航混混不舍晝夜揚問道辭若川聖人之丨渾渾丨丨順則便逆則否者其惟川乎揚問神九州所别揚州其川三江荆州其川江漢豫州其川滎洛靑州其川淮泗兖州其川河濟雍州其川涇汭幽州其川河泲冀州其川漳并州其川呼沱嘔夷周禮職方氏三王之祭丨丨丨丨川也皆先河而後海記學記虞帝望秩嵗二月東巡守至于岱宗柴望秩于山川注名山大川如其秩次望祭之書舜典傅説作舟若濟巨川用汝作舟楫澤事類澤名魯有大野晉有大陸秦有楊陓宋有孟瀦楚有雲夢吳楚間有區齊有海隅燕有昭餘祈鄭有圃田周有焦護皆丨丨爾雅澤藪揚州丨丨曰具區禮職方氏雷夏兖州丨丨既澤書禹貢雲夢荆州丨土丨作乂注雲夢之澤在江南其中有平土可為耕作畎畝之治同上孟瀦豫州滎波既豬導菏澤被丨丨注菏澤在湖陵丨丨在河東北爾雅作孟諸宋藪澤也彭蠡東匯澤為丨丨又東至于菏注水東回為丨丨在今江南大野徐州丨丨既豬注丨丨澤名大陸北過浲水至于丨丨注澤名震澤丨丨底定並禹貢兊澤麗澤丨君子以朋友講習易湖事類隈都湖都也流瀆四面所丨丨也風俗通巨都受三方之灌溉為百川之丨丨追潮水而往還通蓬萊與瀛洲晉楊泉賦五湖周官揚州其浸丨丨案張勃吳錦丨丨者太湖之别名以其周行五百餘里故以丨丨為名或説以太湖射貴湖上湖洮湖滆湖為丨丨案國語吳越戰於丨丨直在笠澤一湖中戰耳則知或説非也揚州記曰太湖一名震澤一名笠澤一名洞庭荆州記云宫亭即彭蠡澤也一名滙澤青草湖一名洞庭湖雲夢澤一名巴邱湖凡此並昭昭尤著也初學記太湖發湖州長興縣界入常州晉陵縣界又入無錫界晉陵之東入蘇州吳縣界廣三萬六千頃下有地道潛通亡陵龍威丈人之所居也又或稱洞庭禹貢謂之震澤周官謂之具區史謂之丨丨道記重湖嶽州洞庭湖西岸有沙州堆阜隆處即青草廟下一湖之內中有此洲南名青草北名洞庭所謂丨丨也張舜南遷録郎官湖尚書郎張謂出使夏口沔州牧杜公漢陽宰王公觴于江城之南湖方夜水月如練清光可掇張公殊有勝槩四望超然乃顧白曰此湖古來賢豪逰者非一而枉餞佳景寂寞無聞夫子可為我標之嘉名以傳不朽白因舉酒酌水號之曰丨丨丨亦鄭圃之有僕射陂也李白郎官湖序半湯湖句容縣吳瀆塘有丨丨丨湖水半冷半熱可以瀹雞皆有魚魚交入輒死捐珠玉夫差姑蘇臺東有丹湖萬頃內有銀塘陸賈新語曰舜藏黃金于嶄岩之下丨丨丨于五湖之泉以塞淫邪之路杜慆登故臺序出銅船交州有一湖去合流四十里至隂日百姓樵捕見銅船出水上又冇水牛在湖之中劉欣朋交州記臨平出龍禇無量家瀕丨丨湖有龍出人皆走觀無量尚幼讀書若不聞衆異之洞庭飲馬莊宗滅梁馬殷遣子希範修貢京師莊宗問洞庭廣狹希範對曰車駕南史巡才堪丨丨爾莊宗嘉之五代溢水繞山湘江北流至嶽陽達蜀江夏潦後蜀江漲遏住湘波為洞庭丨凡數百里而君山宛在水中秋水歸此山復居于陸惟一條湘川而已北夢瑣言分風舉航東漢時廬山有神與人語言飲酒投杯能令宫亭祠中丨丨船行丨丨相逢欒巴為豫章太守未到十數日廟間神不復作聲欒巴傳陷城為湖今巢湖古巢縣一日江漲港有巨魚取以貨于市合縣食之有一老姥獨不食遇老叟曰此吾子也汝獨不食吾厚報汝若東門石龜目赤城當陷姥日往視有稚子訝之姥以實告稚子欺之以朱傳龜目姥見急出城有青衣童子曰吾龍之子乃引姥登山而免青瑣髙議鑿湖貯水軒轅逰蜀見水多決之下流江湖皆溢丨五丨丨丨今洞庭其一也范蠡泛舟句踐滅吳謂范蠡曰吾將與子分國而有之蠡曰君行令臣行意乃乘扁舟浮五湖終不返先賢傳方朔賣藥漢武時東丨丨為郎後有人見于會稽丨丨而泛五湖列仙傳知章鑑湖賀丨丨請為道士還鄉里詔賜丨丨剡川一曲東坡西湖杭有西湖頴亦有西湖皆為逰賞之勝東坡連守二州其初得穎也有穎人在坐云內翰但只消逰湖中便可了郡事及守杭秦觀再有詩及此意今臨安有蘇公堤東坡所築護水民甚利之因以名焉詩集龍堆鮫室圍青草丨丨擁白沙護堤盤古水迎棹舞神鴉波浪南風正回檣畏日斜湖光與天逺直欲泛仙槎杜甫過洞庭鳥路回艫承𣲖水舉帆逐分風滉漾疑無際飄颻似度空檣鳥排丨丨船影沒河宫孤石滄波裏匡山苦霧中寄謝千金子安知萬里蓬劉刪官亭湖海田三萬六千頃湖侵丨內丨逢山方得地見月始知天南國吞將盡東溟勢欲連何當灑為雨無處不豐年羅處約題太湖水程洞庭猶在目青草續為名宿槳依農事郵籖報丨丨寒氷爭倚薄雲月遞微明湖鴈雙雙起人來故北征杜甫宿青草湖日夜浮昔聞洞庭水今上嶽陽樓吳楚東南拆乾坤丨丨丨親朋無一字老病有孤舟戎馬關山北慿軒涕泗流杜甫登嶽陽樓波濤杳杳杳波濤閲古今四無邉際莫知深潤通曉月為清露氣入霜天作暝隂笠澤魚肥人鱠玉洞庭柑熟客分金風煙觸目相招引聊為停橈一楚吟蘇子美題太湖江連峽洞庭春溜滿平湖錦帆張源水桃花色湘流杜若香冗去茅山逺丨丨巫丨長帶天澄逈碧映日動浮光行舟逗逺樹度鳥息危檣滔滔不可測一葦詎能航隂鏗度青草湖水如山茫茫彭蠡春無地白浪春風濕天際東西捩柂萬舟回千嵗老蛟時出戲少年輕事鎮南來丨怒丨丨帆正開中流蜿蜓見脊尾觀者膽墮豫方咍衣冠今日龍山路廟下沽酒山前往老矣安能學佽飛買田欲棄江湖去王介甫詠彭蠡作鏡湖歌千金不須買畫圖聽我長歌歌鏡湖湖山竒麗説不盡且復為子陳吾廬栁姑廟前魚作市道士莊畔菱為租一彎畫橋出林薄兩岸紅蓼連孤蒲陂南陂北鴉陳黑舍東舍西楓葉赤正當九月十月天放翁艇子無時出船頭一束書船後一壺酒新釣紫鱖魚稚旋洗白蓮藕從渠貴人食萬錢放翁癡腹常便便暮歸子迎我笑遙指一抹西村煙陸務觀思故山鏡湖登嶽陽樓洞庭九州間厥大誰與讓南維羣崖水北注河奔放瀦為七百里吞納各殊狀自古澄不清環混無歸嚮炎風日搜攪幽怪多冗長軒然大波起宇宙溢而放巍峩拔嵩華騰躍較健壯聲音一何宏轟磕車萬兩猶疑帝軒轅張樂就空曠蛟螭露筍簴縞練吹組帳鬼神非人世節奏頗跌蕩陽施見夸麗隂閉咸悽愴朝回宜春口極地缺隄障夜纜巴陵洲叢苪才可傍星河盡涵泳俯仰迷下上餘瀾怒不已喧聒鳴甕盎明丨丨丨丨輝煥朝日亮飛亷戢其威清晏息纎纊泓澄湛凝緑物影巧相况江豚時時出戲驚波忽蕩漾韓愈海事類引晦海晦也主丨丨濁其水黑而晦釋名積流不丨細丨無以成海孫卿子朝宗沔彼流水丨丨于海詩江漢丨丨于海書避礙水丨丨則通于海揚吾子四海天地丨方皆丨水相通地在其中蓋無幾也四海之外皆復有海東海共稱渤海又謂之滄海南海之别有漲海西海之東有青海北海之别有瀚海博物志大瀛中國名曰赤縣神州有丨丨海環其外史記蜃樓海傍有丨氣為丨臺漢書渤澥丨丨百川之大也隋志海眼唐金華子北海縣因發地得五銖錢取之不盡中得一石記云此是丨丨以錢鎮之衆懼復掩海脈天冇五億五萬五千五百五十里地亦如之各以四丨為丨關今內傳東海丨有滄丨溟海貟海􅘵海幼海漲海六帖西海丨有類丨潮海蒲昌海西域傳蒲昌一名壃澤同上碧海東有丨丨廣狹與東海等水石鹹苦正作碧色十洲記紫海南昌國有丨丨水色如爛椹可以染衣其龍魚龜鱉砂石草水無不紫杜陽編海神丨若丨名天吳水伯名靈胥濤神名伍子胥沉尸于江其精魄為濤神六帖海山丨中丨曰嶽海中州曰嶼丨中有三神丨蓬萊方丈瀛洲又大荒中有山名天臺海水入焉同上尾閭秋水時至百川灌河河伯自喜以為天下之美盡在巳順流至于北海東靣而視不見水端望洋向若而嘆曰今睹子之難窮非至子之門吾長見笑于大方之家北海若曰井蛙不可以語於海今爾出于涯涘觀于大海將可與語大理矣天下之水莫大于海萬川歸之丨丨泄之春秋不變水旱不知過江河之流不可為量數計莊子秋水沃焦在碧海之東冇石濶四萬里厚四萬里居百川之下故乂名丨丨山海經桑田麻姑謂王方平曰自接待以來見東海三變為丨丨向到蓬萊水乃淺于往者略半也豈復為陵谷乎方平曰東海行復揚塵耳神仙傳歸墟夏革曰渤海之東有大壑焉實惟無底之谷名曰丨丨八紘九野之水天漢之流莫不注之而無增無減焉列子湯問暗靄闔廟旋艫祥颷送飄旗纛旌旄飛揚丨丨鐃鼓朝轟髙管噭譟武夫奮棹工師倡和穹龜長魚踊躍後先乾端坤倪軒豁呈露韓文扶桑丨丨在碧海中樹長數十丈一千餘圍兩幹同根更相依倚是以名丨丨有大帝宫太真東王所居有蓬萊山周回五十里外有員海繞山其海水色正黑謂之溟海無風而洪波百丈惟飛仙能到山海經及十洲記靈草祖洲在東海中地方五百里上有不死草生丨丨中草似菰苖長三尺許人已死者以草覆之皆活十洲記鱉語蛙東海之丨丨塪井之丨曰千里之逺不足以語其大千仞之髙不足以極其深禹之時十年九潦而水弗加益湯之時八年七旱而崖不加損此東海之大樂也莊秋水篇鯤化鵬北溟冇魚其名為丨丨而為鳥其名為丨其翼若垂天之雲海運則將徙於南溟南溟者天池也莊子大禹掘地洚水者洪水也使禹治之禹掘地而注之海禹疏九河瀹濟漯而注諸海孟子夫子乘桴子曰道不行乘桴浮于海從我者其由與語張騫乘槎注見天河徐衍負石丨丨丨丨入海不容于世義不茍取漢鄒陽上書仁軌失舟劉丨丨運糧丨丨李義甫使袁異式往鞫之具獄以聞義甫言于上曰不斬丨丨無以謝百姓舍人源直心曰海風暴起非人力所及乃除名通鑑陳茂拔劍汝南丨丨嘗為交趾别駕刺史周敞涉海遇風船欲覆沒茂丨丨呵罵水神風即息謝承後漢書管寧自悔丨丨避地遼東過海遇風船人危懼皆叩首悔過寧丨思咎念昔年嘗如厠不冠即便丨言風亦尋靜孝子傳希堯無恐假丨丨使吳越是時江淮不通凡使吳越者皆泛海而多風波之患丨丨過海遭大風左右皆恐懼希堯曰吾平生不欺汝等恃吾可丨丨也已而風亦止五代史元方涉海陸丨丨武后時使嶺外方丨丨風濤驚壯舟人懼元方曰吾受命不私神豈害我趣使濟而風訖息六帖髙駢鑿海交趾以北距南海有水路多覆巨舟丨丨往視之乃有橫石隱然在水中因奏以聞丨丨道之利云人操利楫石根橫津才登一去之舟便作九泉之計時冇詔聼之乃召工者啖以厚利竟去其石民至今賴之北窗瑣言閩人甘棠王審知招蠻夷商賈海上波濤為阻一夕風雨雷電震擊開以為港丨丨以為審知德政所致號丨丨港六帖海州喉襟朱滔王武俊招王日華不不納日華棄城自固參軍李宇謀曰今州十縣濱海有魚鹽利此軍本號橫海將軍能絶易定歸天子自為一州可亢盜襟喉同上大海浴日今夫丨丨其東無東其北無北其南無南旦則丨丨而西之夜則滔列星涵太隂揚隂火珠寶之光以明其塵霾之雜不處也必泊之西噬故其大也深也潔也光明也無我若者栁宗元漲海連天韓愈既至潮以表哀謝曰臣所領州在計廣府極東過海口下惡水濤瀧壯猛難程期颶風鱷魚患禍不測臣州南近界丨丨丨丨韓昌黎文包乾括坤其為器也丨丨之奧丨丨之區惟神是宅亦祗是廬何竒不有何怪不儲茫茫積流含形內虛曠哉坎德卑以自居𢎞往納來以宗以都品物類生何有何無木元虛海賦吐日出星登隂隅以東望兮攬滄海之躰勢丨丨丨丨天與水際其深不測其廣無臬總群流而臣下為百谷之君王王粲海賦渾沌鑿竅南海之帝為倏北海之帝為忽中央之帝為丨丨倏與忽相與過于渾沌待之甚厚倏與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試丨一丨七日而渾沌死莊子精衛填海發鳩之山有鳥名曰丨丨是炎帝之女往逰于東海溺而不反是故精衛常取西山之木石以丨東丨山海經為物不滿諄芒遇苑風于大海之濵苑風曰子將奚之曰將之大壑夫大壑之丨丨也注焉而丨丨酌焉而不及莊天地篇其狀無岸于廓靈海長為委輸丨為丨也則乃浟湙瀲灔浮天丨丨浺瀜沆漾渺瀰湠漫波如連山乍合乍散噓吸百川洗滌淮漢襄陵廣舄㶀㵧浩汗木元虛海賦天吳蝄象海童水獸邀路馬銜當溪丨丨乍見而髣佛丨丨暫曉而閃尸羣妖遘忤眇䁘冶夷決帆摧橦戕風起惡去廓如靈變總恍幽暮氣似天霄靉靅雲布䨹昱絶電百色妖露呵㘈掩鬱矆賧無度黿鼉岑嶅舟人漁子徂南極東或屑沒于丨丨之冗或挂罥于丨丨之峯或掣掣泄泄于裸人之國或泛泛悠悠于黑齒之邦或乃萍流而回轉或因歸風以自反洪濤瀾汗昔在帝媯巨唐之世天綱浡潏為凋為瘵于丨丨丨丨萬里無際長波涾湤迤延八裔是乎禹也乃鏟臨崖之阜陸決陂潢而相沷啓龍門之岝􅩨􅀢陵巒而嶄鑿羣山既略百川潛泄泱渀淡濘騰波赴勢江河既𨗳萬穴俱流掎拔五獄竭涸九州瀝滴滲淫薈蔚雲霧涓流泱瀼莫不來注緑煙䁏眇其垠則有天琛水怪鮫人之室瑕石詭暉鱗甲異質若乃雲錦散文于沙汭之際綾羅被光于螺蚌之節繁采揚華萬色隱鮮陽氷不冶隂火潛然熺炭重燔吹炯九泉朱瀲丨丨丨丨蟬蜎魚則橫海之鯨突杌孤逰戞巖嶅偃髙濤茹鱗甲吞龍舟吸􅀈則洪漣水浪踧蹜吹潦則百川倒流或乃蹭蹬窮波陸死鹽田巨鱗插雲鬐鬛刺天顱骨成嶽流膏為淵並同上賦不揚波阮昌齡作海不楊波賦一筆成文其警句云收碣石之宿霧斂蒼梧之夕雲八月靈槎泛寒光而靜去三山神闕湛清影以遙連名賢詩話賦不道鹽南史張融作海賦文辭詭激以示顧愷之愷之曰此丨實超玄虛但恨丨丨丨耳即注曰漉沙搆白敖波出素積雪中春飛霜暑路本傳風飄海船嘉祐中蘇州崑山縣海上有一船桅折丨丨抵岸船中有三十餘人衣冠如唐人繫紅鞓角帶短皂布衫見人皆慟哭語言不可曉試令書字字亦不可讀行則相綴如鴈行久之自出一書示人乃唐天授中告敇屯羅島首領陪戎副尉制又冇一書乃是上髙麗表亦稱屯羅島皆用漢字蓋東夷之臣屬髙麗者船中有諸榖唯麻子大如蓮的蘇人種之初嵗亦如蓮的次年漸小數年後只如中國麻子時贊善大夫韓正彥知崑山縣事召其人犒以酒食食罷以手捧首而輾意若歡感正彥使人為其治桅桅舊植船木上不可動工人為之造轉軸教其起倒之法其人又喜復捧手而轉筆談舟遇海鰍趙忠簡公鼎謫朱崖自雷州浮海而南越三日方張帆早行風力甚徑顧見洪濤間紅旗靡靡相逐而下極目不斷逺望不可審疑為海寇或外國兵甲呼問舟人舟人遙手令勿語愁怖之色可掬急入舟被髮持刃出蓬背立割其舌出血滴水中戒使臣使閉目坐船􅤾凡經兩時頃聞舟人相呼曰更生更生乃言曰朝來所見蓋巨輶也平生未嘗觀所謂旗者海輶耳夷堅志詩集浮天孟軻敘逰聖枚乘説愈疾逖聽乃前聞臨深驗兹日丨丨回無岸含靈固非一委輸百谷歸朝宗萬川溢分空碧霧晴連洲彩雲密欣同天子觀深愧玄虛筆隋煬帝觀海泛日蒼茫空丨丨四顧絶人煙半浸中華岸旁通異域船島間應有國波外恐無天欲作乘槎客翻然去隔年周繇望海隂霞首夏猶清和芳草亦未歇水宿淹晨暮丨丨屢興沒周覽倦羸壖況乃凌窮髮川后時安流天吳靜不發揚帆采石華挂席拾海月溟漲無端倪虛舟有超越謝靈運逰赤石寒風古來海丨多天丨白波連山倒蓬壺長鯨噴湧不可涉橅心茫茫淚如珠李白雲島風潮登髙臨巨壑不知千萬里丨丨相接連丨丨無極已時看逺鴻度乍見驚鷗起無待送將歸自然傷客子祖孝嚴望海地紀天潢披襟眺滄海憑軾玩春芳積流橫丨丨疏𣲖引丨丨仙氣凝三嶺和風扇八荒拂潮雲布色穿浪日舒光照岸花分彩迷雲鴈斷行洪濤經變野翠島屢成桑之罘思漢帝碣石想秦皇霓裳非本意端拱是圖王唐太宗巨鼇大鵬習坎疏丹壑朝宗合紫微三山丨丨踊九萬丨丨川飛樓寫青雲色珠含明月輝會因添霧露方逐衆歸李嶠文魨老蚌傾騰漢界沃諸巒立望何如畫此看無地不同方覺逺共天無别始知寬丨丨隔霧朝含磬丨丨凌波夜吐丹萬狀千形皆得意長鯨獨自轉身難曹松南海蠻國炎方此别天涯逺孤舟泛海中夜行常認火帆去每因風丨丨人多富丨丨語不同雁飛難度嶺書信若為通賈島送人南逰潮沙花洞凡逰南國者未有不蹉跎到海路難盡挂帆人更多丨丨分象迹丨丨響蠻歌縱有投文處于君能幾何杜荀鶴送人南逰潮説文朝曰潮夕曰汐事類鰌冗丨魚長數千里丨居海底魚入冗則潮上出則潮退出入有莭故潮水有期又名鯢魚風土記牛魚東海中丨丨其形如牛剝其皮懸之潮水至則毛起潮去則復也博物志兩水相合早潮下晚潮上丨丨丨丨謂之沓潮畨禺記三水相蕩縻氏云天河從北極分為兩條至于南極其一經南斗中過其一經東斗中過兩河隨天轉入地下過而下水相得又與海水合丨丨丨丨而天轉之故激湧而成潮水抱朴子地廣道逺濤水者潮取物多者其力盛來逺者其勢大今潮水從東丨丨丨丨陵山觸岸從直赴曲其勢不泄故湧起成濤朝來夕至潮者據丨丨也言夕至也一月之中天再東再西故潮水再大再小又夏時日居南宿隂消陽盛而天髙一萬五千里故夏潮大也冬時日居北宿隂盛陽消而天卑一萬五千里故冬潮小也春日居冬宿天髙一萬五千里故春潮漸起也秋日居西宿天卑一萬五千里故秋漸漸減也抱朴子浙江潮候髙麗圖經云潮汐往來應期不爽天地之至信古人嘗論之在山海經以為海鰌出入之度浮屠書以為神龍之變化竇叔蒙海嶠志以為水隨月之盈虧盧肇海潮賦以謂日出于海衝擊而成王充論衡以為水者地之血脈隨氣進退率未之盡大抵天包水水承地而一元之氣升降于太空之中地乘水力以自持且與元氣升降互為抑揚而人不覺亦猶坐于船中而不知船之自運也方其氣升而地沉則海水溢上而為潮及其氣降而地浮則海水縮而為汐計日十二辰由子至巳其氣為陽而陽之氣又自有升降以運乎晝由午至亥其氣為隂而隂之氣又自有升降以運乎夜一晝一夜合隂陽之氣凡再升再降故一日之間潮汐皆再焉然晝夜之攻擊乘日升降如應乎月日臨于子則陽氣始升月臨于午則隂氣始升故也夕潮之期日皆臨子晝潮之期月皆臨午焉又日行遲月行速以速應遲每二十九度過半而月行及之日月之會謂之合朔故月朔之夜潮日亦臨子月朔之晝潮日亦臨午焉且晝即天上而言之天體西轉日月東行自朔而往月速漸東至于漸遲而潮亦應之以遲于晝故晝潮月朔後迭差而入于夜此所以一日午時二日午末三日未時四日未末五日申時六日申末七日酉時八日酉未也至夜即海下而言之天體東轉日月西行自朔而往月速漸西至于漸遲而潮亦應之以遲于夜故夜潮自朔後迭復而入于晝此所以一日子時二日子末三日丑時四日丑末五日寅時六日寅末七日卯時八日卯末也以時有交變氣有盛衰而浙潮之所至亦因之為大小當卯酉之月則隂陽之交也氣以交而感故潮之大也獨異于餘月當朔望之後則天地之變也氣以變而盛故潮之大也獨異于餘日今海中有魚獸殺取皮而乾之至潮時則毛皆起豈非感而類應之自然歟臨安志浙江潮聲海潮來皆有漸唯浙江濤至則常如山嶽奮如雷電氷岸橫飛雪崖傍射澎騰奔激吁可畏也其湍怒之理可得聞乎曰或云夾岸有山南曰龕北曰赭二山相對謂之海門岸夾勢迫湧而為濤若言狹逼則東溟自定海吞餘姚奉化二江侔之丨丨尤甚狹逼丨來不聞冇丨又何也叢話子胥揚濤吳王既賜丨丨死乃取其尸盛以鴟夷之革浮之江中子胥因流丨波依潮來往蕩激隄岸勢不可禦或有見其乘白馬素車在潮頭者因為之立廟每嵗仲秋既望廟水極大杭人以旗鼓迓之㺯潮之盛蓋始于此然或有沉溺者臨安志又云吳伍子胥死戒其子投尸于江中吾當朝暮乘潮以觀吳之敗自是海門山潮頭髙淘湧數百尺越錢塘漁浦方漸低小朝暮再來其聲震怒雷奔電激聞百餘里論衡云儒書言吳王夫差殺伍子胥煮之于鑊盛以囊投之于江子胥恚恨臨水為濤以溺殺人夫言吳王殺子胥投之于江實也言其恚恨臨水為濤虛也且衛葅子路漢烹彭越子胥之勇不過子路彭越然二人尚不能發怒于鼎鑊之中胥亦自先入鼎鑊後乃入江在鑊之時其神豈怯而湧于江水哉何其怒氣前後之不相副錢王射潮梁開平四年武肅王錢鏐始築捍海塘在候潮通江門之外潮水晝夜衝激版築不就因命強弩數百以射潮頭又致禱于胥山祠既而潮水避錢塘東擊西陵遂成隄岸胥山祠序元和十年冬十月朝散大夫杭州刺史上柱國盧元輔視事三嵗塵天子書上畏羣靈下慙蒸人乃啓真祠銘而序曰惟唐敷祀典于天下廢淫置明資父事君罔冇不舉寢廟既設我命維新有周行人伍公字子胥陪吳之職得死直言國人求忠者之尸禱水星之舍將瞰鴟革遂臨浙江千五百年廟貌不改漢史遷曰胥山今云青山者繆也吁善父為孝記曰父讎不與共戴天諌君為忠經曰諸侯有諍臣不失國當枕于宋鄭絶楚出疆在平為末宦臣在奢為既壯子坎壇伏節乞師于吳軍鼓丁寧于五戰至郢先哲王建邦啓土著以話言戴后惟人人虐惟后成湯用為大義孔子立為大經子胥修為大仇騷人賦為大怨咸令在上慢惡不生則前戈鞭墓非倒行也後戈走昭非逆施也夫差既王宰􅀈受賂二十年內越祀又顛太伯廟血將乾闔閭劔光且失公朝焉宴焉入則諌焉孰謂矢􅧆孰謂刀寒雖言屢出口而車甲巳困于齊矣蟹稻已奪于嵗矣屬鏤之賜竟及其身鴟夷盛尸投于水濱憤排致怒又濤作神迄今一日再至來也海鴟羣飛陽侯夾從聲逺而近聲近而逺奮于吳怫于越夕于楚乃退于是仲秋闕望杭人以旗鼓迓之笳簫和之百城聚觀大耀威靈卷沙墨裂地灰截若岸坼成坑迎潮民格之如吕梁丈人為靈戈威矛瀲浪百里渚塞不先跳檣揭舷再飯之間絶其音聲蕩漭千里洪濤砥平有滑有腯有鹹有腥遙實乎下庭山海梯航雞林扶桑交臂于廊階金狄在户雷鼓在堂魏樽漢豆六代笙簧可謂奉天爵之馨香獲人神之盛禮佐皇震怒驅叱大邪萬里永清人觀叶氣銘曰云云盧元輔戒㺯潮文斗牛之分吳越之中維江濤之最雄乘秋風而益怒乃其習俗于以逰觀厥有善泅之徒競作㺯潮之戲以父母所生之遺體投魚龍不測之深淵自為矜夸時或沉溺精魄永淪于泉下妻孥望哭于水濵生也有涯盍終于天命死而不弔重棄于人倫推豫不忍之心示爾無窮之戒所有今年觀朝並依常例其軍人百姓輒敢㺯潮必行科罰蔡襄詩集卷沙八月濤聲吼地來頭髙數丈觸山回須臾却入海門去丨起丨堆似雪堆劉禹錫噴雪浪打天門石壁開海神來過惡風回浙江八月何如此潮似連山丨丨來李白雷鼓木落霜飛天地清空江百里見潮生鮮颷出海魚龍氣時雪噴山丨丨聲雲日半隂川漸滿客帆皆過浪難平髙樓曉望無窮意丹葉黃花繞郡城朱慶餘雲陳把酒問東溟潮從何代生寧非天吐納長逐月虧盈暴怒中秋勢雄豪半夜聲堂堂丨丨合屹屹雪山行海靣雷霆聚江心雹瀑布橫巨帆連地震羣擑望風迎踊若蛟龍鬬奔如雨驚來知千古信回見百川平破浪功難敵驅山力可并伍胥神不泯憑此發威名范希文銀山海上濤頭一線來樓頭指顧雪成堆從今潮上君須上更看丨丨十二回東坡玉冗樓有章亭號濤來自古今勢連滄海濶色比白雲深怒雪驅寒氣狂雷散大音浪髙風更起波急石難沉鳥懼多遙過龍驚不敢吟坳如開丨丨危似走瓊岑但禠千人魄那知伍相心岸摧連古道洲漲踣叢林跳沫山皆濕當江日半隂天然與禹鑿此理逺難尋姚合杭州觀潮銀河曽過靈隱江邉樹獨宿東樓看海門潮色丨丨鋪碧落日光金柱出紅盆楊巨源組練八月十八潮北觀天下無鯤鵬水擊三千里丨丨長驅十萬夫東坡海若江神河伯兩醯雞丨丨東來氣吐霓安得夫差水犀手三千強弩射潮低同上陽侯怒聲洶洶勢悠悠羅剎江邉地欲浮謾道往來存大信也知翻覆向平流任拋巨浸疑傾蓋猛過西陵似有頭至畢朝昏誰主掌好騎赬尾問丨丨羅隱吳儂浮江萬人鼓噪懾丨丨猶似丨丨老阿童欲識潮頭髙幾許越山無數浪花中東坡吳兒㺯潮何處潮偏盛錢塘無與儔誰能問天意獨此見濤頭海浦㺯來盡江城打欲浮勢雄驅島嶼聲怒戰貔貅萬疊雲才起千尋練不收長風方破浪一氣自橫秋髙岸驚先裂羣源怯倒流騰凌大鯤化浩蕩六鼇逰北客觀猶懼丨丨丨弗憂子胥忠義者無覆巨川舟范希文觀潮古今合璧事類備要前集卷八
