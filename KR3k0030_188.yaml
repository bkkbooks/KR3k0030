body:
  text: 古今合璧事類備要續集卷三十八宋謝維新撰性行門阿附事理發揮阿倚也不能中立有所倚而後立附託也不能自進有所託而後進阿附之人其論語之所謂善柔者歟無挺特之操而專以阿倚為能無鯁介之節而一以附託為事旁籬落而升緣梯階而進其于為人齷齪無能可知已朱子曰志於道義則功名不足道志於功名則富貴不足道吁其富貴不足道之人歟事類阿㫖丨諛順丨嚴光書附勢簡賢丨丨實繁有徒注簡略也賢而無勢則略之不賢有勢則附之若是者繁多有徒衆無道之勢所常書仲虺䑛痔莊子謂宋人曹商曰秦王有病召醫破癰潰疽者得車一乘丨丨者得車五乘子豈能䑛其痔耶悅臭人有大臭者其親戚兄弟妻妾無能與居者自苦而居海上人有丨其丨者晝夜隨而不去吕氏春秋問病丞相丙吉病中二千石上謁問疾遣家丞出謝已皆去陳萬年獨留昏夜乃歸吉病甚上自臨問吉薦萬年竟代于定國為御史大夫為爪牙竇憲既平胸奴威名太盛以耿䕫任尚等丨丨丨鄧疊郭璜為心腹班固傅毅之徒皆置幕府以典文章刺史守令多出其門憲敗固死獄中何面目馬融初應大將軍鄧隲辟乃上廣成頌忤鄧氏後懲於鄧氏不敢復違忤于勢遂為梁冀草奏李固又作大將軍西第頌以此頗為正直所羞吳祐謂融曰李公之罪成於卿手李公即誅卿丨丨丨見天下之人乎不過孟嘉晉士浮虛無實用然其間亦有不然者如孟嘉平生無一事然桓溫謂嘉曰人不可無勢我乃能駕馭卿溫平生輕殷浩豈妄許人者哉乃知孟嘉若遇當作謝安安不遇丨丨如丨丨呼為郭尖後魏郭景尚遷太尉從事中郎善事權貴時丨丨丨丨此海市耳張昌儀兄弟恃易之昌宗之寵請託如市甲第奢侈李湛曰丨丨丨蜃樓比丨豈長久計耶米幾禍及隋唐遺事乃冰山耳楊國忠權傾天下進士張彖者力學有大志或勸謁國忠以速榮顯彖曰爾輩謂楊公之勢可倚如泰山耶吾所見丨丨丨丨皎日大明誤人必耳後果如其言嘗驗糞味唐郭𢎞霸為御史時大夫魏元忠病僚屬省候𢎞霸獨後請視便溺即染指嘗驗疾輕重賀曰味甘者病不瘳今味苦當愈無患元忠惡其媚暴語於朝為奉溺器宋之問𫝊張易之等寵甚之問與閻朝隱沈佺期劉允濟傾心媚附易之所賦詩篇盡之問朝隱所為至丨易之丨丨丨因巫得相趙彥昭本以權幸進中宗時有巫趙挾鬼道出入禁掖彥昭以姑事之常衣婦服乘車與妻皆謁其得宰相巫力也執笏教婢宋之遜為連州參軍刺史聞其善歌使丨丨日丨丨在簾外唱吟自如向火乞兒張九齡見朝士趨附楊國忠以求官語人曰此曹皆丨丨丨丨一旦火盡灰冷當涷裂肌膚暴骨溝中矣天寶遺事冷語冰人孟蜀時潘在廷以財結權要或戒之乃曰非是求援不欲其以丨丨丨丨耳外史檮杌一網打盡蘇舜欽監奏院因十月賽神㑹館中同列御史劉元瑜彈擊下獄坐監主自盜削籍同㑹者皆坐斥劉謂時宰賈昌朝曰為相公丨丨丨丨張師正倦游杜衍壻元結丐論天寶中元子遊長安與丐者為友或曰君友丐者不太下乎對曰古人鄉無君子則與雲山為友里無君子則與松柏為友座無君子則與琴酒為友出遊於國君子則友之丐者今之君子吾恐不得與之友也丐者丐論子能聽乎吾既與丐者相友諭求罷丐友相喻曰子羞吾為丐耶丐宗屬于人丐嫁娶于人丐名位于人丐顔色于人甚者則丐權家奴齒以受邪佞丐權家婢類以容媚惑有自富丐貧自貴丐賤於刑丐命命不可得就死丐時就時丐息至死丐全形而終有不可丐者更有甚者丐家僕於僕圉丐性命于臣妾丐宗廟而不敢丐妻子而不辭有如此者不為羞哉吾所以丐人之棄衣丐人之棄食提罌荷杖在于路途且欲與天下之人為同類耳不然則無顔容行于人間夫丐衣食貧也以貧乞丐心不慙跡與人同示無異也此君子之道君子不欲全道耶幸不在山林亦宜且罌杖隨我作丐者之狀貌學丐者之言辭與丐者之相逢使丐者之無耻庶幾時世始能相容吾子無驕然取不容也於戲丐者言語如斯可為編為丐論以補時規元結惡曲論元子時與鄉里㑹曲全當時之歡以順長老之意歸泉王叔盈問曰向夫子曲全其歡道然也茍為爾乎元子曰叔盈視吾曲其心以狥財利曲其行以希名位當過吾吾茍全一歡於鄉里無惡然可也東邑有全道之士聞元子對叔盈恐曰吾聞元次山約其門人曰無惡我之小曲真惛鄙惡辭也吾輩全直世生未嘗曲氣以轉聲曲辭以達意曲步以便往曲視以回目猶患于古人古人有惡曲者不曲臂以取物不曲膝以便坐見天下有曲于君曲于民曲于鬼神者往劫而死之今元次山茍曲言貌强全一歡以為不䙝其直慁哉若能茍曲于鄰里强全一歡豈不能茍曲于鄉縣以全言行能苟曲于鄉縣豈不能茍曲于邦國以彰名譽能茍曲于邦國豈不能茍曲於天下以揚德義若言行名譽德義偕顯豈有鍾鼎不入門權位不在已乎嗚呼曲為之小為大之漸曲為之也有何不可姦邪凶惡其㘥乎㘥音由元此子聞之頌曰吾以顔貌曲全一歡全直君子之惡我如猶有過于此者何以自免詩集萬事稱好丨丨丨丨司馬公山谷凡事從宜丨丨且丨丨詳見諛佞姦邪事理發揮自古姦邪之人國家不可有也其智足以飾已之非而蔽主之明其謀足以成己之私而塞主之聰其勇足以伸己之欲而中傷君子之類同己者進異己者斥擅威福於冥冥之中專豫奪於覆掌之頃而宗廟社稷之安危皆不暇問也不幸而庸君孱主之中其欺則其惡將無所不至矣吁此共歡之流堯舜之所以必致其察也事類姦宄乃有不吉不迪顛越不恭暫遇丨丨我乃劓殄滅之書盤庚姦回崇信丨丨書泰誓注丨丨昏亂左奇邪去其淫怠與其丨丨之民禮天官回邪毁信廢忠崇飾異言靖譖庸回服讒搜慝以誣盛德天下之民謂之窮奇注丨丨也姦詐如姦丨而詐丨雖有耳目焉得而正諸注姦姦者以姦欺姦詐詐者以詐欺詐揚邪哆述正道而稍丨丨者有矣未有述丨丨而稍正也揚多詐不情公孫𢎞齊人丨丨而丨丨本𫝊傾巧順指周堪張猛為恭顯等所譖元帝無所取信時長安令楊興以材能幸稱譽堪上欲以為助乃問興曰朝臣齗齗不可光祿卿何也興者丨丨士也謂上疑堪因丨丨曰堪非獨不可於朝廷自州里亦不可也上由是疑之外陋內險盧杞有口才體陋甚鬼貌藍色不耻惡衣菲食人未悟其不情郭子儀病甚百官省不屏姬侍及杞至則屏之隱几而待家人怪問其故曰彼丨丨丨丨左右見必笑使後得權吾族無類矣本𫝊外癡內狡以范陽平盧節度使安祿山兼御史大夫祿山體貌充肥腹垂過膝嘗自稱重三百斤丨若丨直丨實丨黠在上前應對敏給雜以恢諧上益信愛之以蠱君心仇士良請老中人與送還第謝曰諸君善事天子能聽老夫語乎天子不可令閒暇閒暇必觀書見儒臣減玩好省游幸吾屬恩且薄而權輕矣莫若殖貨財盛鷹馬日丨毬獵聲色丨其心使不得息則萬幾在我衆再拜與至上前趙憬之入相陸贄實引之既而有憾于贄以贄所譏彈延齡事告延齡故延齡益得為計帝由是信延齡而不直贄已而贄與璟約至上前極論延齡帝怒形于色憬默然無一言贄罷為太子賔客為八風舞景雲元年上宴近臣國子祭酒祝欽明自請丨丨丨丨搖頭轉目備諸醜態上笑欽明素以儒學著為吏部侍郎盧藏用私謂諸學生曰祝公五經掃地盡矣本𫝊為髙麗舞楊再思為宰相阿合取容兄同休請公卿宴其寺酒酣戲曰公靣似髙麗再思欣然翦榖綴巾上反披紫袍丨丨丨丨舉動合節滿座鄙笑昌宗以姿貌幸再思每曰人言六郎似蓮花非也正謂蓮花似六郎耳其巧諛無耻類如此頗多斥詞曽布以翰林學士權三司使坐言市易事落職知饒州舍人許當制丨丨丨丨制下將往見曽曰始得詞頭深欲繳納又思之釁隙如此不過同貶耳於公無所益也遂黽勉為之然其中語言頗經改易公他日當自知也曽曰君不聞宋子京之事乎昔晏元獻公當國子京為翰苑晏愛宋之才雅欲旦夕相見遂稅一地于旁近延居之其親密如此遇中秋啓宴召宋出妓飲酒賦詩達旦方罷翌日罷相宋當草詞頗極詆斥至有廣營産以殖私多役兵而規利之語方子京揮毫之際餘酲猶在觀者亦駭歎蓋此事由來久矣何足較耶許亦憮然而去東軒筆録至有醜語見上文不近人情嘉祐初王介甫名始盛黨友傾一時歐陽修亦善之勸蘇明允與之逰而介甫亦願交于明允明允曰吾知其人矣是丨丨丨丨者鮮不為天下患安石之母死士大夫皆弔明允獨不往作辨姦論一篇以譏之必亂天下吕獻可中丞於熙寧初荆公拜參知政事日力言其姦每指荆公曰亂天下者必此人也又曰天下無事庸人擾之耳溫公初不以為然至荆公虐民亂政溫公悵然曰吕獻可之先見余不及也然明允先生其知荆公又在獻可之前十餘年矣豈溫公不見辨姦也聞見録蘇明允辨姦山巨源見王衍曰誤天下蒼生者必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣自今言之其理固有可見者以吾觀之王衍之為人容貌言語固有以欺世而盜名者然使晉無惠帝雖衍百千何從而亂天下乎盧杞之姦固足以敗國然不學無文非德宗之鄙暗亦何從而用之由是言之二公之料二子亦容有未必然也今有人口誦孔老之言身履夷齊之行收召好名之士不得志之人相與造作言語私立名字以為顔淵孟軻復出而隂賊險狠與人異趣是王衍盧杞合而為一人也其禍可勝言哉夫面垢不忘洗衣垢不忘浣人之至情也今也不然衣垢敝之衣食犬彘之食囚首喪面而談詩書此豈其情也哉凡事之不近人情者鮮不為大姦慝以蓋世之名而濟其未形之惡雖有願治之主好賢之二相猶將舉而用之則其為天下患必然而無疑者非特子之比也詩集猖狂丨丨百怪起冠裾稔回慝闕倐忽熙寧初有人自常調上書迎合宰相意遂丞御史蘇長公戲之曰有甚意頭求富貴沒些把鼻便姦邪某公用事排斥端士矯飾僞行范蜀公詠假山詩丨丨平為險分明假奪真後山詩話嗾鴻豫孟德黠老狐姦言丨丨丨坡沒把鼻見上文諛佞事理發揮言甘曰諛口給曰佞諛者巧于逢迎佞者捷于機變變亂黑白顛倒是非使夫上之人墮其術巾而不自知其後世孔光張禹之徒歟事類巧言何畏乎丨丨令色孔壬書象恭丨丨滔天書利口毋以側言改厥度毋以丨丨亂厥宮書面諛讒諂丨丨之人至矣孟庸違靖言丨丨象恭滔天書阿順丨諛丨旨承意汲黯曰天子置公卿輔弼之臣寧令從諛丨傳丨陷主於不義乎縱不愛身奈辱朝廷何本順指阿諛丨丨要領絶嚴光書入門盡歡樓護字君卿為京兆史王氏五侯兄弟爭名護盡丨其丨咸得丨心滿座皆悅王導為相只周旋人過一生嘗有坐客二十許人逐一稱讚獨不及一胡僧并一台州臨海人二人皆不悅導徐顧臨海人曰自公之來臨海不復有人矣又謂胡僧曰蘭奢蘭奢乃胡語之褒譽者也於是二人亦悅朱語録望塵雅拜石崇與潘嶽諂事賈謐每候其出輒丨丨丨丨本傳每言輒佳司馬徽字德操括囊畏謹有以人物問者不辨其髙下丨丨丨丨其婦諫之曰人質疑問君一皆言佳豈咨君之意乎徽曰如君言亦復佳世說意疑不謬唐太宗嘗止樹下愛之宇文士及從而譽之上正色曰魏徴嘗勸我逺佞人不知為誰丨丨是汝今果丨丨士及叩頭謝模稜兩可蘇味道為鳯閣侍郎同平章事味道前後在位數嵗作阿取容嘗謂人曰處事不宜明白丨丨持丨端丨矣時謂之蘇模稜代犧禱疾武后有疾詔遍祭神廟以祈福消災閻朝隱詣少室山時為給事中因親撰祝文以身丨丨沐浴伏於俎盤令僧道迎至神所觀者如堵㑹后疾愈特加賞賚左司郎中張元一畫代犧圖以進后大笑雖厚賜然亦鄙其為人易齊笑林見鼠亦佞大厯中荆州有馮希樂者善佞丨人家丨穴丨丨嘗到長林謁縣令留宴語令云仁風所感猛獸出境昨初入縣界見虎狼相尾西去有頃村吏來報昨夜大蟲食人令戲詰之馮遽曰是必掠食便過拜子儀墓五代郭崇韜丨丨丨丨稱仁浦甥故相魏仁浦在中書陶僕射榖自言出於魏氏遂拜仁浦為舅每見仁浦望塵輒拜其便佞如此盡是面諛蔡京晚嵗漸覺事勢狼狽亦有隱憂其從子應之自興化來因訪問近日有甚人才應之愕然曰天下人才出在太師陶鑄中某人何敢當此問京曰不然覺得目前丨丨丨丨脫取官職去做底恐山林間有人材欲得知朱語録為時相放生光祿卿鞏申佞而好進老為省判趨附不已王荆公為相每遇生日朝士獻詩頌僧道獻功德疏以為壽皂吏走卒皆籠鴿雀就宅放之謂之放生申不間詩什於是以大籠貯鴿詣客次搢笏開籠每一鴿一雀叩齒祝之曰願相公一百二十嵗時有邊寨之主妻病而虞候割股以獻者天下駭笑之曰或對曰虞候為縣君割股太卿與丞相放生東軒筆録為宰相拂鬚冦萊公為相丁晉公參知政事嘗㑹食都堂羮染公鬚謂起拂之公正色曰身為執政而親丨丨丨丨丨邪謂慙遺事願相公逺佞王荆公初參政因讀晏元獻小詞曰為宰相而作小詞可乎平甫曰彼亦偶然自喜而為耳其事業豈止如是吕吉甫為館職亦在坐曰為政必先放鄭聲况自為之乎平甫正色曰放鄭聲不若逺佞人吕自是與平甫相失柬軒筆録荆公與吕惠卿論新法平甫吹笛于內荆公遣人諭曰請學士放鄭聲平甫即應聲曰丨丨丨丨丨人惠卿深銜之聞見録李蕭運命論凡浮世茍合之士籧篨戚施之人俯仰尊卑之顔逶迤勢利之間意無是非讚之如流言無可否應之如響以關看為精神以向背為變通勢之所集從之如歸市勢之所去棄之如脫遺其言曰名與身孰親也得與失孰賢也榮與辱孰珍也故遂潔其衣服矜其車馬冒其貨賄淫于聲色脈脈然自以為得矣蓋見龍逄比干之亡其身而不推飛廉惡來之滅其族也蓋知伍子之钃鏤于吳而不戒費無忌之誅夷于楚也蓋譏汲黯之白首于主爵而不懲張湯牛車之禍也蓋笑蕭望之跋躓于前而不知石顯之絞縊于後也詩集真乞丐人間所謂好男子我見婦女留鬚眉奴顔婢膝丨丨丨反以正直為狂癡陸休崛强朝以道後來亦附梁師成有一人以詩嘲之曰早赴朱張飰隨賡蔡子詩此回丨丨丨凡事且從宜朱語録古今合璧事類備要續集卷三十八
