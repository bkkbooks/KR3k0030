丨丨丨丨東坡詩衙退卷花軸疏簾丨丨離綱罟政未息風瀾憫物刑多省勞心席少安秖慙無惠政求配古人難陳古靈詩鳬看令尹仙翟表郎官瑞丨丨丨丨丨單父畏多服河陽貴少年杜甫詩官清馬骨髙縣古槐根老丨丨丨丨丨韓駒父詩井上二梧桐吾愛崔秋浦宛然陶令風門前五株柳丨丨丨丨丨山鳥下廳事夜蟾落酒中懷君未盡去惆悵意無窮李白贈崔秋浦舉邑樹桃李牛羊散阡陌夜寢不扃户問此何以然賢人宰吾土丨丨丨丨丨垂隂亦清芬繅絲鳴機杼百里聲相聞李白贈姪清漳明府詩西河共風味衡山雖小邑首唱恢大義因見縣尹心根源舊官聞南紀政波瀾丨丨丨丨丨言如子夏居西河教授地杜甫題衡山夫子廟呈陸宰詩縣令亦風流東陽本是佳山水何况曽經沈隱侯化得邦人解吟咏如今丨丨丨丨丨新開潭洞疑仙境逺寫丹青到雍州落在尋常畫工手猶能三伏凛生秋劉禹錫答東陽令詩連城為寶重見前連城寶注為官不愛錢抱琴時弄月取意任無絃見客但傾酒丨丨丨丨丨杜甫贈崔秋浦詩官間民吏稀丨丨丨丨丨歲晏雪霜盛槐稀庭日多鳥下人語靜張文潛見客似無官憂民如有病丨丨丨丨丨魏野詩青雲一步間腰懸墨綬三年外身去丨丨詩丨丨丨方干贈嘉興許明府函繼三異聲士元應展驥百里聊爾絆丨丨丨丨丨江述憑東觀廖明略和吳可權長官詩參守謁大尹先生結髮憎俗徒閉門不出動一紀至今鄴僧乞米送僕忝縣令能不恥俸錢供給公私餘時置薄少助祭祀勸丨留丨丨丨丨言語才及輒掩耳韓愈丨丨丨曲檻客來聽竹風杜甫詩何時遇操柄君有百鍊刃堪斷七重犀誰開太阿匣特割武城雞竟與尚書佩還應天子持丨丨丨丨丨當使玉如泥張九齡贈豐陽韋明府詩邙鎖經秋䀶琴彈終日得古調丨丨丨丨帶蘚䀶李拱詩訟堂對煙霞丨丨寂寂丨丨丨五相門前聽落鴉流水聲中視公事寒山影裏見人家縣齋髙枕卧丨丨丨丨丨應夢犯天顔許棠送裴拾遺赴畿令詩陶潛一縣令丨丨丨丨丨獨飲仍獨醒猶將公田二傾五十畝種秫作酒不種粳東坡詩身為赤縣令嗟我丨丨丨丨丨操權不用欲何之立召贓曹呼五百盡取鼠輩尸諸市韓愈寄盧同詩古今合璧事類備要後集卷七十九
