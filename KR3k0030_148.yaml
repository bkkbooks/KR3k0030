body:
  text: 古今合璧事類備要後集卷七十九宋謝維新撰縣官門知縣歷代沿革周官有縣正四百里為縣各掌其縣之政令而賞罰之春秋時縣大而郡小故左傳云上大夫受縣下大夫受郡又周書作雒篇曰千里百縣二有四郡縣邑之長曰宰曰尹曰公曰大夫其職一也晉謂之大夫魯衛謂之宰楚謂之令尹戰國郡大而縣小甘茂謂秦武王曰宜陽大縣名曰縣其實郡也漢縣令長皆秦官掌治其縣萬户以上為令秩千石至六百石減萬户為長秩五百石至三百石侯國為相秩亦如之凡縣道國邑千五百八十七列侯所食縣曰國皇太后皇公主所食曰邑有蠻夷曰道後漢今掌治民顯善勸義察姦罰惡理訟平賦恤民時務秋冬集課上計於所屬郡國晉制大縣令有治績官報以大郡不經宰縣不得入為臺郎宋諸縣署令銅印墨綬進賢兩梁冠自晉宋以後令長國相皆如漢制北齊制上中下九等唐制縣有六等之差赤畿望緊上中下京都所治為赤縣旁邑邑為畿縣其餘則以户口多少地美惡為差凡一千五百七十三縣令各一人掌導揚風化撫字黎氓敦四民之業崇五土之利養鰥寡恤孤窮審察寃屈躬親獄訟通典分紀凡民田收受縣令給之每嵗季冬行鄉飲酒禮簿帳揚驛倉庫盜賊隄道雖有専官皆通知縣丞為之二衆曹收率課調百官志五代任官凡齷齪無能者始注為縣令故天下之邑率皆不治甚者誅求刻剝猥近方狀國朝建隆元年應天下諸縣除赤畿外有望緊上中下四千户為望三千户以上為緊二千户以上為上千户以上為中不滿千户為中下五百户以下為下掌總治民政勸課農桑凡户口賦役錢榖賑濟給納之事皆掌之有戍兵則兼兵馬都監或監押三年始以朝臣為知縣其間復參用京官或幕職為之朝臣知縣自大理正奚嶼等始慶厯間詔天下知縣非鞫獄毋得差會要政和二年詔縣令以十二事勸課農桑宜各遵行上副朝廷一曰敦本業二曰興地利三曰戒遊手四曰謹時候五曰戒茍簡六曰厚蓄積七曰備水旱八曰戒宰牛九曰置農器十曰廣栽植十一曰恤田户十二曰無妄訟自政和以來太平盛世人皆重內輕外士大夫皆輕縣令之選吏部兩選不注者甚多事類十室丨丨之邑必有忠信語千室丨丨之邑可使為之宰也語偃室見後武城宰注宓琴記室新書恭敬子路治蒲曰邑壯又難治也孔子曰丨而丨可以攝勇寬而政可以懷強愛而恕可以容困溫而斷可以抑姦則政不難矣明斷子路治蒲三年孔子入其境曰善哉恭敬以信矣入其邑曰忠信以寬矣至其庭曰丨察以丨矣又子路治蒲夫子三嘆其善鳴琴宓子賤治單父彈丨丨身不下堂而單父治巫馬期戴星出戴星入日夜不居以身親之而單父亦治巫期問其故宓曰我之謂任人子之謂任力任力者故勞任人者故逸吕氏春秋製錦鄭子皮使尹何為邑子産曰今吾子愛人則以政猶未能操刀而使割也其傷實多子有美錦不使人學製馬大官大邑身之所庇也而後學者製馬譬如田獵御射貫則獲禽若未嘗登車射御則敗續厭覆是懼何暇思獲左傳鑿渠西門豹丨十二丨引河灌民田至今皆得水利投河西門豹為鄴都令詳見河門生稻魏文侯時西門豹為鄴令有令名至文侯曽孫襄王與羣臣飲為羣臣曰今吾臣皆如豹之為人臣也史起進曰魏氏之行田以百畝鄴獨二百畝是田惡也漳水在旁豹不知用是不智也知而不興是漳不仁也仁知豹水之盡何足法也於是以起為鄴令引水灌鄴以富魏之河內民歌曰鄴有賢令兮為史公決漳水兮灌鄴旁終古舄鹵兮丨丨梁前溝洫志刈麥宓子賤治單父齊冦至魯父老請曰寇將至人不今及田刈請民出丨宓子不許季孫讓之曰宓子曰年無麥明年可種若使不耕者得麥其民樂有寇也灌壇太公望為丨丨令期年風不鳴條博物志蘭陵孫卿子名况時人尊稱曰卿闕烹阿齊威王賞即墨丨丨大夫保鄣趙簡子使尹鐸為晉陽將行請曰為繭絲乎為丨丨乎曰保鄣哉強項後漢董宣為洛陽令湖陽公主家人殺人宣就主車取殺之主訴帝帝欲殺宣宣觸殿流血帝令謝主宣不拜帝令擦伏宣以手據地不俯帝聞曰丨丨令廉幹稽隂大邑久無良宰禇玠丨險有丨用乃除山隂令清白梁樂法才為建康令不受俸秩北去將至百金縣曹啓輸臺庫武帝嘉其丨丨曰居職若斯可謂百城表矣氷玉明二君侯臨下有赫克隆有光惠我咫尺乃丨其清乃丨其白風抗其髙雲垂其澤君有遺愛民有遺思晉江韋襄邑令傅渾頌清潔孔奮守姑藏令長力行丨丨後被徴單車就路清廉沈闕之為丹徒令性疏直在縣丨丨墨綬左雄曰今之丨丨猶古諸侯注墨綬謂令長即古子男之國也軒綏漢官儀曰明帝臨觀見洛陽令車騎意河南尹及至而非尤其太甚勑去丨丨雙鳬王喬顯宗時為葉令有神術每月朔望朝帝怪其來數不見車騎密令太史伺望之言其臨至有丨丨從南飛來於是舉羅張之但得雙舄焉詔尚方視則所賜尚書屬履也三異後魯恭為中牟令専以德化為理郡國螟傷稼不入中牟河南尹袁安聞之使仁恕掾肥親往廉之恭隨行阡陌俱在桑中有雉過旁有兒童親曰何不捕之兒言雉方雛親瞿然起與恭訣曰所以來者察君之政迹爾今蟲不犯境一異也化及鳥獸二異也童子有仁心丨丨也還以白安安因上書言帝異之三惠於穆君侯英才宣朗聲之所振下應如響明斷決疑易於反掌野有寇盜惟侯屏之我有田疇惟侯闢之古人謹獄惟侯平之凡此丨丨如何勿思晉孫楚梁令孫候頌三柳公為虞城令三月政成鄰境取則官宅舊井水清而味苦公下車嘗之莞爾而笑曰既苦且清足以符吾志也遂汲不改變為甘泉蠡丘館東有丨丨焉公往來憩之飲水則去行路勿剪比于甘棠李白去思頌碑髙第朱子元為縣令以丨丨入為長安令邑師治理四科漢以丨丨辟士求多略不惑強明決斷者任三輔令食艾屈突蓋為長安令以威嚴顯時為語曰寧丨三斗丨不見屈突蓋寧食三斗蔥不見屈突通烹鮮宰大邑者如丨小丨人擾則疲魚擾則飥植花潘嶽為河陽令丨桃李丨人號曰河陽一縣花種柳晉陶潛為彭澤令門丨五丨郡遣督郵至吏白應束帶見之潛嘆曰吾不能五斗米折腰事鄉里小人乃解邙綬賦歸去來辭齋馬唐馮元淑歷浚儀始平二縣單騎赴職未嘗以妻子之官所乘馬不與芻豆令作丨丨獲禽見上製錦注慈君北涼張潭為和寧令百姓愛之如父母號曰丨丨仁父崔瑗為汲令開溝溉稻民賴其利長老歌之曰天降神明君作我慈仁父臨民布德澤決渠作甘雨天才宋沈憲為山隂令政聲大著孔圭謂人曰沈令料事特有丨丨當時稱為良吏吏能孔琇之為吳令有丨丨縣中震肅立祠崔瑗字子玉為汲令遷濟北率官吏男女號泣共壘石作壇丨碑頌德而丨之又晉荀朂字公魯為安陽令遺愛在人人為立生祠又狄仁傑字懷英為彭澤令人為丨生丨又李綰除柏人令有仁政縣為丨丨立碑後董詡字漢之除須昌令多異政生為丨丨象雷地方一同雷震百里茂業丨丨注縣令丨丨威震百里絆驥今處此而求大功猶丨良丨之足而責以千里之任答東阿王書中都宰孔子為丨丨丨男女别途市無二價家語武城宰子遊為丨丨丨子曰女得人焉耳乎曰有淡臺滅明者行不由徑非公事未嘗至於偃之室也語憂官政宓子賤為單父有若曰子何瘦焉宓子曰丨丨丨也毋掣肘宓子賤丨使丨其丨能治劇尹賞舉茂才為栗邑令丨丨丨遷滎陽令以病歸汲黯遷滎陽令恥為令丨丨丨田里上聞之召黯為中大夫朝嘆屈夏侯湛為野王令以恤隱為急而緩於公調政清務間優遊多暇居邑纍年丨多丨其丨除中書侍郎市皆哭孔奕為全椒令以母疾去官百姓哭送之及奕卒丨丨丨政無雙吳王覃字世容為武城令宿惡奔送人歌曰王世容丨丨丨省徭役盜賊空吳録治第一魏張暨除新豐令丨為三輔丨丨丨立學校晉范寧字武子為餘杭令丨丨丨勸生徒潔已修禮志行之士莫不宗之期年之間風化大行中興以來崇學敦教未有如寧者也教忠孝辛昻字進君為成都令與諸生祭文翁於學堂丨以丨信丨友父老曰辛君教戒如此不可違也北史有能名傳佐有吏才再為山隂令甚有能名近世令長莫能及也有異政陳球為繁陽令督郵曰魏郡十五城獨繁陽丨丨丨有鸞翔漢王臯為重泉令丨丨丨至止於縣庭十餘日獨不雹韓稜為下邳令一邑內丨丨丨上聞徴拜尚書元魯山元德秀字紫芝為魯山令誠信化人士夫髙其行謂之丨丨丨明府手張巡調真源令士多豪猾大吏華南金恣肆邑中語曰南金口丨丨丨巡下車以法誅之赦餘黨莫不改行遷善政簡民甚宜之紐金章丨丨丨綰墨綬北山移文辭新果閩賈郁遷仙遊縣有邑客遺果丨之曰某家丨丨人衆未知郁曰君有弟子否曰昆仲三人豚犬數輩郁曰古人畏四知今君兄知弟知子攜來者知是倍於古人也客大慙而退賜金帛後董宣為洛陽死家無餘財以布被蓋其尸妻子守哭帝嗟之丨以丨丨賜衣魚唐李頒字德新為武仙令浚溉田懿宗嘉之丨緋丨銀丨賜百縑崔隱甫遷洛陽令梨園弟子胡雛善笛嘗負罪匿禁中帝以他事召隱甫從容指曰就卿丐此人對曰陛下輕臣而重樂工請解官帝遽謝與胡雛隱甫殺之有詔貰死不及矣丨隱甫丨丨賜上考李朝隱遷長安令宦官閭興貴有所干請曳去之睿宗嘉歎後御承天門對百官及期集使褒諭其能使遍聞之進太中大夫一階丨中丨丨絹百匹以旌剛烈為三公後趙申録為廣昌令白烏巢其庭樹甘露降其廳事後丨丨丨為司𨽻蕭育字次君為茂陵令會考課育第六而漆令鄭舜殿見責問育為之請扶風怒曰君課第六裁自脫何暇為左右言令詣曹育曰蕭育杜陵男子詣曹何也遂法官明日升丨丨丨校勘朱輪華轂蒯通説武信君曰令范陽令乘丨丨丨丨本傳銅邙黑綬縣令者皆秦官掌治其縣萬户以上為令皆銀邙青綬秩比六百石以上皆丨丨丨丨前百官表承流宣化縣令所使丨丨丨丨也前仲舒䇿遷官增秩漢焦延夀子貢為小黃令當丨三老丨屬上書請留制又許丨丨留之滿歲為真新改令長皆試小冠丨丨丨丨以次遷别製大冠漢舊儀以法為師薛宣子惠為彭城令宣曰吏道丨丨令丨丨可問而知及能與不能自有資才何可學也治民猶牧卜式為郎牧羊上林中上喜之式曰丨丨亦丨是矣惡者輒去毋令敗羣上竒其言試其治民拜緱氏令視人如子前召信臣遷上蔡長其治丨丨丨丨所居見稱述又卓茂為密令視人如子又鐘離意為堂邑令視百姓如視赤子兩縣皆理漢薛宣字贑君為左馮翊穎陽縣大其令薛恭未嘗理粟邑縣小其令韋賞才有餘宣乃奏賞與恭換縣二人領縣後丨丨丨丨支縣相百縣當刺史治所其難為與丨丨丨丨皇甫持正集輦轂繁要韋抗景雲中為永昌令丨丨丨丨前令無及者遷中丞邑民詣闕留不聽乃立碑著其惠百里卑微奉至尊者然後知丨丨之丨丨答東阿王書尹賞治劇丨丨舉茂材為粟邑令能丨丨遷榮陽令馮元諭蒙丨丨授醴泉令縣民多猾為著丨丨篇大略指明忠孝仁義勸學務農每鄉給一卷俾得傳習民稱番君前吳芮秦時為番陽令甚得江湖間丨心丨曰丨丨人稱賈父後賈彪禁人殺其子丨丨丨丨數年養子千餘人男名賈子女名賈女又鄭潭字文公禁人殺子民皆舉育男女皆以鄭為字三國志潁川四長丨丨丨丨並以仁信篤誠使人不欺謂荀淑為當塗長韓韶為瀛長陳實為太丘長鍾皓為林慮長淑等皆頴川人也循吏傳朝歌儒者虞詡丨丨長太守馬稜勉之曰君丨丨當謀謨廟堂乃在朝歌耶詡曰願寬假轡節勿令有所拘閡而已道不拾遺前何並為長陵令丨丨丨丨又王渙為河陽令丨丨