公師道於公前有貴賤之嫌後無平生之舊公雖可見禮可去乎陳后山答秦少遊書屢召不起晦庵先生龔茂良奏近奉詔旨欲奬用恬退之士有朱某者操行耿介丨丨丨丨宜蒙録用於是詔除祕書郎言行録韓愈送李願歸盤谷序太行之陽有盤谷盤谷之間泉甘而土肥草木叢茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隱者之所盤桓友人李願居之願之言曰人之稱大丈夫者我知之矣利澤施于人名聲昭于時坐于廟堂進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑才俊滿前道古人而譽盛德入耳而不煩曲眉豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而間居妬寵而負恃爭妍而取憐大丈夫之遇知于主上用力于當世者之所為也吾非惡此而逃之是有命焉不可幸而致也窮居而野處升髙而望逺坐茂樹以終日濯清泉而自潔采于山美可茹釣于水鮮可食起居無時惟適之安與其譽於前孰若無毁於其後與其樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趦趄口將言而囁嚅處汙穢而不羞觸刑辟而誅戮僥幸於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌歌曰盤之中維子之宫盤之土維子之稼盤之泉可濯可沿盤之阻誰爭子所窈而深廓而有容繚而曲如往而復嗟盤之樂兮樂且無央虎豹逺迹兮蛟龍遁藏鬼神守護兮呵禁不祥飲且食兮夀而康無不足兮奚所望膏吾車兮秣吾馬從子於盤兮終吾生以徜徉范希文嚴子陵祠堂記先生光武之故人也相尚以人道及帝握赤符乘六龍得聖之時臣妾億兆天下孰加焉惟先生以節髙之既而動星象歸江湖得聖人之清泥塗軒冕天下孰知焉惟光武以禮下之在蠱之上九衆方有為而獨不事王侯髙尚其志先生以之在屯之初九陽德方亨而能以貴下賤大得民也光武以之蓋先生之心出乎日月之上光武之器包乎天地之外微先生不能成光武之大微光武豈能遂先生之髙哉而使貪夫廉懦夫立是有大功于名教也某來守是邦始搆堂而奠焉乃復其為後者四家以奉祀事又從而歌曰雲山蒼蒼江水泱泱先生之風山髙水長詩集長揖功成不受賞丨丨歸田廬左太沖詠史詩拂衣事了丨丨去深藏身與名李白詩甘漁樵嗚呼古人已糞土獨覺志士丨丨丨杜嚴氏溪放歌老柴關雄文英槩比君難二十髙名滿世間飛詔幾回來北闕草玄終不出南山詩篇落處風雷動筆力停時造化間仙術每將丹訣解史才曾把逸書刪家僮只有猿隨從坐客惟聞鶴往還兩制詞臣求識靣九重天子望祗顔處士星孤輕世俗大夫松好賤官班棊殘夜石秦雲斷笭徹秋嵓蜀月彎朝議蒲輪看再降肯教從此丨丨丨孫僅贈种放詩從教年少爭鳯閣鸞臺路丨丨丨丨丨劉賓客詩不如歸興濃秋光一似宦情薄山色丨丨丨丨丨闕乖守蜀有録事參軍老病求去詩古今合璧事類備要後集卷十
