body:
  text: 古今合璧事類備要後集卷十宋謝維新撰臣道門清廉古今源流見前總論餘見官制門逐類下事類廉善太宰以六計敝羣吏之治一曰丨丨二曰廉能三曰廉敬四曰廉正五曰廉法六曰廉辨皆以廉為本周禮直清汝作秩宗丨哉惟丨書懷璧虞叔有玉虞公求旃弗獻既而悔之曰匹夫無罪丨丨其罪吾焉用汝以賈害也左傳辭玉宋人或得玉獻諸子罕子罕丨丨曰我以不貪為寶爾以玉為寶若以與我皆喪寶也同上中清虞仲夷逸身丨丨自清寧廉潔正直以丨丨兮誰知吾之廉貞楚詞布被漢汲黯曰公孫𢎞位在三公俸祿甚多丨丨似詐𢎞曰誠中𢎞病也又洛陽令綦宣卒官詔遣使者臨視惟見丨丨蓋尸妻子對哭帝傷之橐衣王吉世名清廉好車馬衣服鮮明而遷徒去處不過丨丨天下服其廉而怪其奢故世傳王楊能作黃金也酌泉晉吳隱之事載土洪規事並見太守類清節唐宋申錫以丨丨進疾要位者納賕餉敗風俗故自為近臣凡四方賄謝一不受既被罪有司驗劾悉得所還問遺書朝野為咨清德歸崇敬充册立新羅使外國多齎金帛貨舉所無崇敬囊橐惟衾衣東夷傳其丨丨真清陸景倩為扶溝丞按察使覆州縣殿最有吏言狀曰某強清某詐清惟景倩曰丨丨盡清姚璹下遷益州長始蜀吏貪暴璹摘發之無所容貸后聞降詔慰勞謂左右曰為二千石清其身者易使丨丨者難唯璹為兼之廉勤辛讜初事李嶧王錢穀性丨丨遇事不處文法皆與之合廉潔李復已致仕或諫公丨丨無素儲不為子孫謀耶復已笑曰兒曹詎餓死乎不虧義儒有委之以貨財見利丨丨其丨記無私積季文子卒宰庀家備葬無衣帛之妾食粟之馬君子曰季文子相三君而丨丨丨丨可不謂忠乎左心如水前哀帝謂鄭崇曰君門如市何以禁切人主對曰臣門如市臣丨丨丨不自潤後孔奮為姑臧長清儉人或譏之曰奮身處脂膏丨能丨丨畏人知晉胡質事何無知後楊震事並見太守類清自名崔玄褘為陵主簿母盧有賢操常戒曰比見親表仕者務多財以奉親若今為吏不能忠清無以戴天履地故玄褘所守以丨丨丨清可用馬伉為侍讀李抱真卒伉持節臨弔之歸帛不受又致京師伉上表固拒於是醴泉令缺宰相髙選德宗曰前使澤潞不受幣者其人丨丨丨也遂以授伉何以幣為伊尹不以一介與人一介不以取諸人湯三使往聘之既而幡然改曰我丨丨聘丨丨哉與我處畎畝之中孟不食周粟武王伐殷伯夷叔齊叩馬諫及天下歸周二子丨丨丨丨餓死於首陽山史壺飱不食趙襄以丨丨從餒而丨丨言其廉直不忘君也忍渴盜泉孔子丨丨於丨丨家語披絮無氊晉吳隱之為中丞冬月無被嘗浣衣乃丨丨為太常以蓬為屏風坐丨丨席獻魚懸庭後羊續為廬江丞有丨生丨者續丨魚於丨後又獻之乃出所懸魚示之杜其意也飲馬投錢宋陵清者有項仲山丨丨渭水每丨三丨郝廉亦然馬不入廄後張奐為屬國都尉曰使丨如羊丨以丨丨使金如粟不以入懷器物無受後孔奮守姑臧長被徴單車就路姑臧吏民及羌胡相謂曰孔君清亷仁賢舉縣蒙恩如何今去不共報德遂相賦斂牛馬丨丨追送奮一丨所丨珍寶無受李恂後徴拜謁者使持節領西域副校尉西域殷富多丨丨諸國侍子及督使賈胡數遺恂奴婢宛馬金銀香罽之屬一丨所丨清潔疾惡韓滉雖宰相子性節儉衣裘茵袵十年不易居處陋薄取庇風雨門當列戟以父時第門不忍壞乃不請堂先無挾廡弟洄稍增補之滉即撤去曰先君容焉吾等奉之常恐失墜若摧圯繕之則已安敢改作以傷儉德居重位丨丨丨丨不為家人資産自始仕至將相乘五馬無不終櫪下視贓若讎崔復性介潔矜已之清丨丨貨者丨丨受茶一串陸贄夀州刺史張鎰有重名贄往見既行餉錢五萬曰請為母夫人一日費贄不納丨丨丨丨曰敢不承公之賜笥餘一縑元德為魯山令歲滿丨丨丨丨駕柴車去清刻於法鄭餘慶為吏丨而丨丨丨亷不沽名柳玭家訓范官則潔已丨丨丨丨家無厚蓄李翺作盧坦傳坦居丨終始亷白祗入俸錢者雖歷大官亦丨丨丨家無羡財裴均子持萬縑於韋貫之請撰先銘答曰吾寧餓死豈能為是哉平生未嘗通饋遺故丨丨丨丨私藏不取始鄆帥每至以州二百萬入丨丨令狐楚獨辭丨丨資産不殖張鎬起布衣二綦至宰相居身亷丨丨丨丨假官舍居五代崔光鄴雖貴不營産常丨丨丨以丨然僅庇風雨室不庇雨嗣吳王子巘歷官清白居丨丨能丨風丨亷介自持本朝范質以丨丨丨丨未嘗受四方饋遺前後所得祿賜皆給孤遺亷潔自亢杜衍為人尤丨丨丨丨為大臣事上以不欺為心不求恩澤王旦為相家事一無所問務儉約率子弟使在富貴不知驕侈遺表丨丨丨丨有氷蘖聲王素在相門不驕不華以貧為寶終身不貪所至丨丨丨丨分珠不賣唐介謫倅潭州丨丨獄發奏入仁宗謂近侍曰介必丨肯丨覽之果然不殖貨利荆公溫公丨丨丨丨荆公官浸顯俸祿入門任諸弟取盡不問溫公通判太原時月給酒饋待賓客外輒不請居洛買圉宅猶以兄郎中為戶賜貯廳舍劉溫叟清介太宗以五百千丨之溫叟不敢却丨之丨事之西丨太宗曰我送錢猶不受况他人乎貂褥封還司馬光曰劉恕自洛陽南歸無寒具光以舊丨丨假之固辭強與之行至潁川悉丨丨於光不受他人可知矣無地起樓臺寇萊公歷富貴四十年無田宅園邸魏野獻詩曰有官居鼎鼐丨丨丨丨丨無田園居第畢文簡為丞相而丨丨丨丨丨之所市白集為恨蔡襄書小吳箋云李及知杭州丨丨丨一部以丨終身之丨此公清節殊可為世戒買緑野不肯張橫渠言有為范文正丨丨丨堂公丨丨曰在唐如晉公者是可尊一旦取而有之如何得安清畏無求知杜祁公言作官第一以丨丨丨丨人丨清名在四國文彥博守北京遣人入大遼見遼主宴伶人作衣冠見物攖取之有以挺撲之者曰司馬端明耶君實丨丨丨丨丨如此惟圗書數卷太祖命王全斌等伐蜀沈倫為水陸轉運諸將爭取金帛子女倫清潔一無所取東歸之日丨丨丨丨丨不載南海物余靖為廣西體量安撫使廣之番船舊皆取稅公奏罷之以來逺商及公北歸丨丨丨丨一丨言行録詩集照膽清玉壺氷始結循吏政初成既有虛心譽還如丨丨丨盧綸詩徹底清丨丨心丨水共虛元微之詩清如玉壺氷鮑明逺詩興幽松雪見丨丨丨丨丨心苦硯寒知李洞上鄭刑侍秋天澄霽江夫子方寸裏丨丨丨丨丨岑參送楊録事詩官清馬骨髙歐陽詩話千尋見底清李白詩清髙萬丈底江水秋正深丨丨丨丨丨元微之詩清能律貪夫白居易詩清白至今貧家襲韋平身業文素風丨丨丨丨丨劉禹錫送李員外赴邠寧幕詩譽望古今源流見總論事類聞望令丨令丨詩德輿令名丨之丨左終譽以永丨丨詩廣譽令聞丨丨施於身好名丨丨之人能讓千乘之國並孟子近名為善無丨丨老子徇名烈士丨丨史釣名漢汲黯言公孫洪飾非丨丨威名漢暴勝之為直指使衣繡持斧威振州郡雋不疑盛服至門上謁曰竊伏海瀕聞暴公子丨丨舊矣今乃承顔接辭名聲前陸賈遊公卿間丨丨藉甚蕭曹髙祖開基丨丨為冠丙魏宣帝中興丨丨有聲三少李嗣真賀蘭敏之修撰東臺表嗣真直𢎞文館與學士劉獻臣徐昭皆少有名號丨丨二蓋蓋文達宗人文懿亦以儒學稱當時號丨丨四夔翟造與韓會盧東美張正則三人友善居正元好言當世事皆自謂王佐才號丨丨房杜如晦玄齡兩人深相知當世語良相必曰丨丨姚宋開元中前有丨崇後有丨璟崇善應變璟善守文裴馬馬載與裴行儉分掌選事言吏部者稱丨丨婁郝婁師德方酷吏殘鷙人多不免獨能以功名始終與郝處俊相亞世之言長者稱丨丨蘇李蘇味道與里人李嶠俱以文翰顯時號丨丨又蘇頲時李義對掌書命帝曰前世李嶠蘇味道文擅當時號蘇李今朕得頲又何愧前人哉蘇賈賈魯與蘇晉同掌制誥皆以文辭稱時號丨丨曹畢畢諴與曹確同為相俱有雅望世謂丨丨孫孔孔紹安與孫萬夀皆以文辭稱時號丨丨來李李義府與司議郎來濟俱以文翰顯時稱丨丨蕭李蕭頴士所與遊者獨李華與齊名世號丨丨售名杜元頴劾奏李渤賣直丨丨尚名田仁會遷金吾將軍所得祿估有贏輒入之官人以為丨丨失名趙宗儒以治生瑣碎丨丨盜名帝問延英政事孰當記之李珏監修國史對曰臣之職叨陳夷行曰宰相所録恐掩蔽聖德自丨美丨揚嗣復傳又晉殷浩丨丨欺世爭名以下麾上士所甚患然取名最闕又丨丨德則與下丨丨而後有誅夷斥竄事孔稚圭贊者於朝史完名及光弼等畏逼不終而子儀丨丨髙節爛然獨著福祿永終雖齊威晉文比之為劣郭子儀贊虛名王智興財賂交權幸以賈虛名空名魏證曰忠臣已嬰禍誅君陷昏惡喪國夷家祗取丨丨登龍門後李膺字元禮以聲名自髙士有被其容接者名為丨丨丨又晉王衍口中雌黃朝野謂之亦是龍門人中龍晉宋纎字令文少有逺操沉靖不與世交太守馬岌髙尚之士也具威儀造焉纎髙樓重閣拒不可見岌歎曰名可望而身不可見德可仰而形不可觀吾今而後知先生丨丨之丨也銘詩于石壁曰丹崖百丈青壁萬尋竒木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心管夷吾晉溫嶠傳時江左草創綢維未舉嶠殊以為憂及見王導共談歡然曰江左自有丨丨丨吾復何慮又王導傳桓彛初過江見朝廷微弱憂懼不樂往見導劇談世事還謂周覬曰向見管夷吾吾無復憂矣贊皇公唐李栖筠初封贊皇縣子喜奬善而樂人攻已之短為天下士歸重不敢有所斥稱丨丨丨云曲江公張九齡開元後天下稱曰丨丨丨而不名元魯山元德秀天下髙其行謂之丨丨丨韓昌黎丨丨丨之名學者仰之如泰山北斗內宰相王琚眷委特異預大政事時號丨丨丨又陸贄為翰林時號內相蕭夫子蕭頴士客留僕陽尹徴王恆盧士式賈雍趙臣開士和柳并等皆執弟子禮以次按業號丨丨丨塞宇宙美名丨丨丨魏文帝典論垂竹帛名稱丨於丨丨文選自試表養聲譽丨丨丨於衆多之名駱賔王文望聲光後進歸之承丨丨丨一言許可必自矜重杜牧之文流聲實宜乎從事於是府而丨丨丨於天朝也知德音入海際天丨丨丨文粹鄉人皆好丨丨丨丨之何如不如鄉人之善者好之語國人曰賢丨丨皆丨丨而後用之同上沒世不稱君子疾丨丨而名不稱語在邦必聞丨丨丨丨在家必聞同上齊名天地丨丨孚於丨丨並大明於列星楚辭揚聲紫微丨丨丨丨垂光虹霓文選孔文舉荐彌衡表為天下士新垣衍謝魯仲連曰吾今日知丨丨丨丨也史記為漢儒宗董仲舒丨丨丨丨大儒之望盧尚書海內丨丨丨丨也通鑑漢獻帝紀公輔之望晉謝安雖處衡門其名猶出萬人之右自然有丨丨丨丨風流所宗晉殷浩為丨丨丨丨風流稱首晉天下言丨丨者樂廣王衍為丨丨人之領袖晉魏舒堂堂丨丨丨丨少而流聲晉潘嶽丨丨丨丨長而垂名蜚英騰茂丨丨聲丨丨實司馬相如賦麗天紀地昭昭乎三辰之丨乎丨滔滔乎猶四瀆之丨乎丨選齊安陸碑如蒼生何深源不起當丨丨丨丨晉殷浩傳非吾所及隋柳顧博學罕所推謝見虞世基曰海內共推一人丨丨儔丨丨斗南一人唐狄仁傑之賢北丨以丨丨丨而已當世第一李揆門第人物文學皆丨丨丨丨天下歸重杜如晦與房玄齡共掌朝政丨丨浩然丨丨天下準的賈彪遊京師與郭林宗為談論之首一言一行丨丨以為丨丨名震四夷裴度丨丨丨丨使外國者其君長必問度年今幾狀貌孰似天子用否其威名德望比郭汾陽而用與不用常為天下重輕本傳草木知名張萬福江淮丨丨亦丨爾威丨今之人望牛僧孺楊於陵裴垍盧坦此數人者丨丨丨丨天下視其進退以卜