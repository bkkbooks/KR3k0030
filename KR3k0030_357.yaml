body:
  text: 古今合璧事類備要外集卷五十七宋謝維新撰刀劒門劍附劍室劍衣七首器物叢談劍軍器所帶兵按釋名檢也所以防檢非常也劍之所利者在乎刃而刃謂之臘臘廣二寸有半寸則臘兩面各有刃中為脊中高兩旁殺而趍鍔各一寸四分寸之一莖圍與臘廣同而長倍之就莖二寸半以後稍大欲其操執而易制也首廣三分其臘廣而居二而圜之此劍之制為然也然人之用劍者有三等則劍之用於人者亦不無三等之别劍之上制併莖長三尺重三斤十二兩非上士不可服中制長二尺五寸重二斤十四兩三分兩之二非中士不可服下制長二尺重二斤一兩三分兩之一此下士之所服者歟葢人之材力有强而有弱列之而為三等之用則人與器相習而無不安之患矣劍室鞘亦曰鞸鞛劍衣韜亦曰夫襓七首短劍也長只一尺八寸頭類七故名焉事類桃氏為丨丨丨劍禮考工記巧冶鑄丨丨丨干將之劍清水淬其鋒越砥歛其咢水斷蛟龍陸剸犀革忽若汜彗畫塗前王褒頌神氣化豐隆奮椎飛亷扇炭丨丨丨成陽文隂縵張景陽七命精神達有干將之劍柙而藏之丨丨四丨莊刻意刻舟求古人墜劍水中丨丨而丨列子圍棊擊丨丨丨劍反自眩形楊龍虎吟顓頊高陽氏有畫影劍騰空劍若四方有兵此劍則飛赴指其方則尅未用時在匣中常如丨丨丨拾遺記鹿盧形古劍以玉刻丨丨丨昆吾劍周穆王得丨丨丨切玊如泥列子虞叔劍丨丨有寳丨公求旃左勾踐五丨丨有寳劍丨召薛燭示之燭曰客有價者市之鄉三駿馬千疋千户之都二可乎燭曰不可造此劍時赤董山破出錫若耶溪出銅兩師灑塵雷公擊橐天精下歐冶固天之精至其巧一曰純鉤二曰湛盧今赤董山合若耶溪深歐冶死雖城量金珠猶不可得都注蜀志又文選價兼三郷聲貴三蘭子七丨丨以枝干宋君弄丨劍迭而躍之五劍常在空立賜金帛列子莊子三孝文王喜劍劍士日夜相擊死傷者嵗百餘人莊子往見曰臣三劍惟王所用有天子劍諸侯劍庻人劍大王有天子之位而好庻人之劍臣竊薄之於是文王不出宫三月劍士皆服斃其處也莊說劍贈徐君延陵季子帶劍丨丨丨已死季子挂劍於徐君墓上樹而去賜子胥吳王丨丨丨屬鏤劍以死拔而舞子路丨劍丨丨子曰古之君子忠以為質仁以為衛何特劍乎家好生彈而歌馮驩寄食孟嘗門下倚柱丨鋏丨丨曰長鋏歸來乎食無魚闔閭造二楚王召風胡子令之吳見歐子與歐子同師丨丨使丨二劍一干將一鏌鎁鏌鎁者干將之妻也金鐡未流干將夫妻乃㫁髪剪指投於爐中乃濡遂為劍陽干將作龜文隂鏌鎁作縵理干將匿其陽出隂以獻闔閭蜀志楚與漁父丨丨丨劍丨枚曰龍泉曰太阿曰工市晉鄭聞而求之不得與師圍之楚王引太阿登城麾之士卒迷惑流血千里同上必試諸人莒子虐而好劍茍鑄劍丨丨丨丨左以與漁父楚捕子胥子胥至江上有老父乘舟知子胥急故渡之既渡胥解其劍曰直百金丨丨丨丨父曰楚法得子胥賜粟五萬石爵執珪豈徒百金之劍邪辭不受曹子手劍冬公㑹齊侯盟於柯莊公升壇丨丨丨丨而從之請盟桓公下與之盟已盟丨丨摽劍而去之公羊莊十三年毛遂按劍平原君至楚與楚王言合從之利害日出而言日中不決丨丨丨丨厯階而上謂平原君曰從之利害兩言而決耳今日中不決何也楚王怒叱曰胡不下吾與而君言汝何為者也丨丨丨丨而前云云通鑑周赧王紀拔劍斬蛟荆有飲飛者得寳劍渡江中流兩蛟似舟飛丨丨丨之吕春秋拔劍斬蛇漢髙祖丨丨丨丨請劍以舞髙祖見項羽鴻門范增謂項莊汝入以劍舞因擊沛公莊入為夀曰軍中無以為樂丨丨丨丨項伯亦起舞以身翼蔽沛公學劍不成項羽丨丨丨丨乃曰劍一人敵不足學學萬人敵具劍以謁雋不疑帶櫑丨丨丨丨暴勝之拔劍擊柱高帝悉去秦儀法為簡易羣臣飲争功醉或妄呼丨丨丨丨上患之叔孫傳鳴劍抵掌臧宫馬武之徒丨丨丨丨志馳於伊吾之北鑄上方劍韓延夀字長公為東郡取官銅物候月蝕丨作刃劍鈎鐔放傚丨丨以此弃市請尚方劍朱雲丨丨丨斬馬丨斷佞臣頭上問為誰曰張禹並前本傳水見兩龍初吳之未滅也斗牛之間當有紫氣張華聞豫章人雷煥妙達緯象乃要煥宿屏人曰可共尋天文因登樓仰觀煥曰寳劍之精上徹於天耳華曰君言得之吾少時有相者言吾年出六十位登三事當得寳劍佩之斯言豈效歟因問曰何在焕曰在豫章豐城華即補焕為豐城令煥至縣掘獄屋基入地四丈餘得一石函光氣非常中有寳劍並刻題一曰龍泉一曰太阿其夕斗牛間氣不復見焉煥以南昌西山北巖下土以拭劍光芒艷發遣使送一劍並土與華留一自佩或謂煥曰得兩送一張公豈可欺乎煥曰本朝將亂張公當受其禍此劍當繫徐公墓上矣靈異之物終當化去不永為人服也華得劍愛之乃干將也莫邪可復至否雖然天生神物終當合耳因以華隂土一斤致煥煥更以拭劍倍益精明華誅失劍所在煥卒子葉為州從事持劍行經延平津劍忽於腰間躍去墮水使人没水取之不見劍但丨丨丨各長數丈蟠縈有文章没者懼而反須臾光彩照水波浪驚沸於是失劍葉歎曰先君化去之言張公終合之論此其驗乎雷逐一蛇唐開元末武勝之知静江軍忽見灘中丨公踐㣲雲丨丨小廣丨盤繞灘上静江之人戲以石投之中虵鎗然作金聲雷公乃飛去使人往視得一銅劍有文曰許旌陽斬蛟第三劍云廣異記乃知有靈開元中河西騎將宋青春毎陣常運臂大呼執馘而旋未嘗中鋒鏑西戎憚之一軍始賴焉後吐蕃入冦獲生口數千軍帥令譯問衣大蟲皮者爾何不能害青春答曰常見青龍突陣而來兵刃所及若叩銅鐵我為神助將軍也青春丨丨劍之丨丨酉陽雜俎衆以為神王潮衆推劉行全為將軍辭曰我不及潮請以為主潮苦讓不克乃除地剚劍祝曰拜而劍三動者我以為主至審知劍躍於地丨丨丨丨皆拜之審知譲潮自為副唐本傳黑煙屬天成都朱善存家世寳一劍毎生神芝則天下晏清如安史黄巢難作劍皆生丨丨丨丨不差毫髮主塵集黑氣著地鄭雲達少時得一劍鱗鋏星鐔有時而吼常在莊居晴日藉膝玩之忽有一人從庭樹窣然而下紫衣朱糺髮露劍而立丨丨周身狀如重霧其人因言我上界人知公有異劍願借一觀鄭謂曰此凡鐵耳不堪君翫上界豈藉此乎其人求之不已鄭伺便良久疾起斫之不中驚墮丨丨丨丨數日方散雜俎劍遺元翼李愬以寳劍遺牛元翼曰此劍吾先人嘗以剪大盜吾又以平蔡姦今鎮人逆天公宜用此夷之元翼拜辭曰敢不有承而愛其死力六帖劍贈光顔李光顔長從河東軍為禆將節度使馬燧解所佩丨丨之鞘劍室在匣龍吟見前注洗削鼎食質氏以丨丨丨丨前貨殖傳劍衣啓櫝夫橈凡言劍則丨丨丨丨與劍焉注櫝匱也夫襓劍衣劉禹錫砥石賦南方氣泄而雨滛地慝而傷物媪神噫濕渝色壊味雖金之堅亦失常性始予有佩刃甚良至是澁不可拔剖其室乃出遡陽眇眩傅刃蒙脊鱗然如痏痂如黒子如青蠅之惡鋭氣中錮猶人被病然客有聞焉裒密石以遺予沃之草腴雜以鳥膏切劘下上直質焯見躊躇而顧逌爾謝客㣲子之貽㡬喪吾寳客曰吾聞諸梅禰曰爵祿者天下之砥石也高皇帝所以礪世磨鈍有是耶余退感其言作砥石賦我有利金兮以利為佩遭士卑而慝作雄鋩為之潛晦如景昏而蝕既兮與肌漆而為癘顧秋蓬之不可刜兮尚何遊乎髖髀之外利物蒙蔽材人惆悵俾百汏之至精蟠一檢而多恚豈害氣之獨然兮將久不試而然彼屠者之刃兮獵者之鋋不灌不羣兮揉錯銜鉛日鼔月揮兮刲腴擊鮮皖㸌爟以耀芒蓊滛聲而騰膻豈不以涉暑而蒙沴兮日用之而成妍有客自東遺予越砥圭形石質蒼色膩理剗其鱗皴滑以滫瀡如衣澣垢如鼎出否霧盡披天萍開見水拭寒焰以破􅗃擊清音而振耳故態復還寳心冄起既賦形於終用一蒙垢焉何恥感利鈍之有時兮寄雄心於瞪視嗟乎石以砥焉化鈍為利法以砥焉化愚為智武王得之商俗以厚高帝得之傑材奔走得既有自失豈無因漢氏以還三光景分隨道濶狹用之得人五百餘年唐風始振懸乎天砥以礲兆民播生在天成器在君天為物君君為人天安有執礪世之具而患無賢歟劉子翬招劍文五山之精六氣之英鍊為神器電曄霜凝噫此非所謂干將莫耶者乎其隠於豐城也扄以堅珉閉之深瓌劍且静矣何自而氤氤氲氲發為光恠上摩星斗而駭動人耳目哉葢物必有用用必因時射彩騰輝不能自遏非若瓦礫無知朽腐不靈終没没以無聞耳然珠珍上瑞初不茍合孰能感而致之自非厚顧忠信無愧幽明如張茂先者焉劍胡為而來哉惜其逢辰不競怨禍方新忠藎云亡王室淪没嗚呼是劍也茍得其時使劉季用之必揮拂白蛇之卧使朱雲請之必齮齕佞臣之頸付之荆楚之客必喋血虜庭加之晉鄭之敵必三軍白首豈不壯哉觀其凛凛之風熒熒之質必不繞指柔必不自挺出必不為屬鏤以害忠良必不為含光以夸幻惑必不銘金字以䜟姦雄必不飾犀文以資玩好必不潛於魚腹以逞窟室之凶必不舞於鴻門以快沐猴之怒儻不遇焉寜霍然變化蜿蜒於深淵寒瀨之中若將終身耳用則見不用則隠視彼良庖之刀族庖之刃刓敝缺折嵗月而頻更猶冀磨礪鈍澁以希一割之效者豈不萬萬相懸哉昔吳王闔閭鑄劍二陽曰干將作龜文隂曰莫邪作縵理茂先得之於異代欵識宛然跡其顯晦莫知所自豈在在處處隂有神物䕶持耶自吳至晉數百餘年而劍一出出不數十年而化去自晉至今又幾千年矣異彩熒光一何遼落也豈象緯之學精研者寡莫能指縱耶將乾坤偉人世不常有無以召之耶抑神寳去來自有定數非可以嵗月期耶方今風塵澒洞威柄倒置政須此物以畢能事吾聞白水之濱鵞峯之下有異氣焉亘天拂雲久而益耀方與博物之士仰觀俯察表而出之庻幾絶代之珍不陸沈於今日仍招之以辭曰鵜寳劍來流天精百神觀三年成寳劍來光陸離瑩鸊截鮫鯢寳劍來撫七星蔑流英掩青萍寳劍來駮風胡譽傾城價論都寳劍來奉君王定四夷臨八荒寳劍來應時昌時乎時母深藏送劉致中匕首魚中進吳公子光將令専諸殺吳王僚四月丙子光伏甲士於窟室乃請王僚酒酣公子光佯為足疾入窟使専諸置七首於丨腹丨而進王既至前専諸擘魚因以七首刺王僚立死左右亦殺専諸闔閭立乃封専諸子為上卿圖窮見燕太子丹欲使荆軻入秦乃求天下名利七首得趙人徐夫人七首與之百金使工以藥石淬之以試人血濡縷無不立死者提入彊秦秦王謂軻曰取舞陽所持地圖軻既取圖奏之秦王發圖丨丨而七首丨因左手把秦王之袖而右手持七首揕之未至身秦王驚自引而起袖絶拔劍劍長操其室時惶急劍堅故不可立拔荆軻逐秦王秦王環柱而走左右曰王負劍遂拔以擊軻斷其左股荆軻乃引其七首以擿秦王不中中銅柱於是左右殺軻史本傳曹沬投丨丨為魯莊公將與齊戰三敗莊公懼獻遂邑之地莊公與齊桓盟於柯丨丨執七首刼齊桓左右莫敢動問曰子將何欲沬曰齊彊魯弱而大國侵魯亦已甚矣今魯城壊即壓境君其圖之桓公乃許還魯侵地既而丨丨丨七首北面就羣臣之位顔色不變桓公怒欲背其約管仲曰不可書生懐有丨丨張子就李仲文學𨼆術久無所得患之張丨七首刺之仲文笑曰我寜可殺神仙傳魏太子造丨丨丨丨百辟七首二其一理似堅氷名曰清剛其二矅似朝日名曰陽文諸葛亮作丨丨丨丨部匕首五百枚給騎士北帝所佩高駢數月勝獻銅七首吕用之曰此丨丨丨丨也得之者兵不敢犯駢寳祕之常持以坐起云云張載七首銘先民造制戒豫惟謹七首之設應速周近既不忽備亦慙輕忿利以形彰功以道隠詩集出自昆吾我有一寳劍丨丨丨丨溪照人如照水切玉如切泥鍔邉霜凛凛匣上風凄凄寄語張公子何當來見擕梁吳均寳劍飛入楚城雙劍將别離先在匣中鳴雌沈吳江裏雄丨丨丨丨吳江深無底楚闕有崇扄一為天地别豈直限幽明神物終不隔千祀儻還并宋鮑昭雙劍虎吼龍鳴吳山開越溪涸三金合冶成寳鍔淬綠水鑒紅雲五采燄起光氛氲背上銘為萬年字胸中㸃作七星文龜甲參差白蛇色轆轤宛轉黃金飾文犀中㫁寜方利駿馬羣騑未擬直風霜凜凛匣上清精氣遙遙斗間明避災朝穿晉帝屋逃亂夜入楚王城一朝運偶逢大仙丨丨丨丨騰上天東谷顯昇紫㣲座西玉佩下赤城田承平久息干戈事僥倖得充文武備除災辟患宜君王益夀延齡後天地李嶠寳劍篇霓泣魅愁將軍溢價買吳鈎要與中原静㓂讎試掛窻前驚電轉畧抛牀上拍泉流青天露拔雲丨丨黑地潛驚鬼丨丨見說夜深星斗畔等閒期尅月支頭曹唐和周侍御買劍神光截玉先輩匣中三尺水曾入吳潭斬龍子隙月斜明刮露寒練帶平鋪吹不起蛟胎皮老蒺藜刺鸊鵜花淬白鷴尾直是荆軻一片心莫敎照得春坊字挼絲團金懸䍡􅝹丨丨欲丨籃田丨提出西方白帝驚嗷嗷鬼母秋郊哭李賀春坊正字劍子歌光射攙搶寳劍匣中藏暗室常夜明欲知天將雨錚爾劍有聲神龍本一物氣類感則鳴常恐躍匣去有時暫開鋦煌煌七星文照耀三尺冰此劍在人間百妖夜収形奸兇與佞媚膽破骨亦驚試以向星月飛丨丨丨丨藏之武庫中可息天下兵奈何狂胡兒尚敢邀金繒歐陽永叔寳劍湮淪古獄郭元振為通泉縣尉前後掠買所部千餘人以遺賔客百姓苦之武后聞之使籍其家唯有書數百卷后問其資財所在知皆以濟人於是竒而免之召見大愜聖㫖并令口占古劍歌進后竒之命繕寫賜諸學士君不見昆吾藏冶飛炎煙紅光紫氣俱赫然良工鍜鍊經幾年鑄得寳劍名龍泉龍泉顔色如霜雪良工咨嗟嘆竒絶琉璃玉匣吐蓮花錯鏤金環映明月正逄天下無飛塵幸得周防君子身精光黯黯青蛇色文章泛泛綠龜鱗非直結交遊俠子亦嘗親得英雄人可言中路遭棄捐零落丨丨丨丨邉雖復沈埋無所用猶能夜夜氣衝天郭元振古劍歌樂府丈夫手把丨丨丨丨吳鉤能㫁萬人頭如何鐵石打作心肺却為花柔嘗觀項羽併劉季一怒使人愁只因撞着虞姬戚氏豪傑都休辛稼翁詞七首趙七首袖中丨丨丨買自徐夫人玉匣開霜雪經燕復厯秦持此歌投贈與若同患難李贈友人燕匕首笑開丨丨丨拂拭竟無言同上揷吳鴻七首丨丨丨結客少年塲李太白詩刀附寳刀書刀銅刀割刀鈆刀刀室鸞刀剪刀佩刀器物叢談刀兵也所以割之器按釋名到也言以斬伐到其所然所用亦有不同其制不能以不異故有寳刀又有銅刀又有鉛刀鸞刀刀有鸞者佩刀人所佩者書刀以供䥴削割刀以供烹飪刀室又所以藏刀也事類獻刀凡有丨丨則郤刃授穎注卻却也刺刀凡有丨丨者以授人則辟刃並禮赤刀丨丨在西序書顧命又丨丨周之寳器器物志白刀丨丨在古白虎之象春秋繁露黄帝鑄丨丨採首山之金始為刀洞𡨕記阮師作丨丨丨刀受法於金精之靈七月庚辛見金神於冶監之門向而冄拜金神授以水火之齊五精之煉用隂陽之候取剛柔之和三年作千七百七十口其刀干背狹刃方口洪首截輕肥不絶絲髮之系斫堅剛無交動之見楊泉物理志昆吾割玉丨丨丨丨時刀周穆王西胡所獻切玉如泥十洲記孫愽引鏡河東丨丨能丨丨為刀屬刀為鏡神仙傳師盟揚聲丨丨在肆昌何識鼔刀丨丨后乃喜楚辭庖丁奏刀丨丨曰今臣之丨十九年所解數千牛矣而刀刃若新發硎恢恢乎於其游刃必有餘地矣莊養生解牛不頓屠牛坦一朝丨十二丨而芒刃丨丨者非排擊剥割皆衆理解也賈誼策解牛可剃屠牛朝丨九丨而刀丨以丨毛淮南子割雞焉用子之武城聞弦歌之聲夫子筦爾而笑曰丨丨丨丨牛刀論語佩犢何為龔遂為渤海太守令人賣劍買牛賣刀買犢曰何為帶牛丨丨前本傳火精協數古人鑄刀以五月丙午取純丨丨以丨其丨地氣使然鄭之刀宋之斤魯之削遷其見前地不能為良丨丨丨丨也禮劍注賈率數百武帝責楊僕曰君欲請蜀刀問丨幾何對曰丨丨丨武帝怒曰出兵而陽不知注僕行請官蜀刀詔問丨答言丨丨丨價酬十倍郭飜刀墜水人為取之因與其人曰我取此天地神明所責飜終不受又投於水人又為取飜不能逆十倍價與之凌統刀舞丨丨怨甘寜殺其父寜常備統不得與相見於吕蒙舎㑹酒酣統乃用丨丨寜起曰寜能雙㦸舞吳書王濬刀懸丨丨字士治恢廓有大志夜夢懸三丨於屋梁上須臾又益一刀濬惡之主簿李毅賀曰三刀為州字又益者明府其臨益州乎果遷益州刺史晉本傳王粲刀銘陸刺犀鯢水截鯨鯢寳刀魯寳刀孟勞丨之丨丨穀梁吳寳刀蜀費禕使丨孫權以嘗所執丨丨賜之禕曰刀所以討不庭禁暴亂者願大王勉建功業同奬漢室臣雖闇弱不負來願别傳命有司造建安中魏王丨丨丨丨寳刀五枚以龍熊馬雀為飾魏曹植寳刀賦銅刀百鍊赫連勃勃造丨丨銅刀為龍雀大環號曰大夏龍雀一口𫝊威曰尚書舊奏給介士二百人大銅刀各丨丨鈆刀鈆刀為銛鏌鋣為鈍兮丨丨丨丨賈誼鈆刀一割傚丨丨之丨丨鸞刀鸞刀貴割刀之用丨丨之丨記禮器鸞刀啓執其丨丨以丨其毛注刀有鸞者詩佩刀刺史佩徐州刺史吕䖍檄王祥為别駕有佩刀工者相之以為三公之器䖍謂祥曰茍非其人刀或為害卿有公輔之量故以相與位至太保臨薨以刀授弟覽曰汝後必興右衛佩王及善除丨丨將軍帝曰羣臣非搜辟不得至朕所爾丨大横刀在朕側亦知此官貴乎以佩刀贈張文瓘李勣入朝文瓘與屬僚二人皆餞贈二人以佩刀玉帶而不及文瓘文瓘疑以請勣曰子無嫌若某沈豫少決故贈丨刀欲其果於斷也解佩刀賜魏徵帝親丨丨丨丨書刀魯之削丨丨丨見前注詳築氏削丨丨為丨長尺博寸合六而成規欲新而無窮敝盡而無惡注削今之書刀禮金削刀徐齊𣆀太宗召試賜所佩丨丨丨麥芒刀牛僧孺進士時常用丨丨丨字有誤謬隨手刪剖㸃定二賢典畧拆封刀子丨丨丨丨起於郭汾陽書吏也舊但用刀之小者所收文帖既繁刀刃銷折不殘寸餘乃鉆以應急敎愈於全時漸出新意因削木加拆刃之上汾陽喜其用心曰真郭子儀之部吏後用傳之益妙其劑資暇錄李尤金馬書刀銘巧冶鍊剛金馬託形割刀割刀之用丨丨丨丨鸞刀之貴記禮器焉用牛刀割雞丨丨丨丨見前注未能操刀子皮欲使尹何為邑宰子産曰猶丨丨丨丨而使割也刀室鞸䩬丨丨容刀注皆刀鞘飾丨上飾丨下飾琫珌鞸丨有丨注鞸容刀鞸丨上飾丨下飾天子玉丨而珧珌諸侯湯玉丨而璆丨大夫璙丨而璆丨上珕丨而珕丨疏鞸刀室也詩詩集鼓刀朝歌丨丨叟虎變蟠溪中一舉鈞六合遂荒營丘東李白帶刀君不能學哥舒翰横行青海夜丨丨西屠石堡取紫袍李白寒夜獨酌明月環刀開丨丨丨並李白秋水薄見後剪刀註寳刀隠玉匣寳刀丨丨丨銷澁空莓苔李白酬張卿三盃弄酒後競風彩丨丨丨寳刀殺人如剪草劇孟同遊邀白馬篇剪刀春寒入丨丨丨剪刀我家有丨丨丨剪刀人云鬼國鐵裁羅裁綺無鈍時用來三年一股折南中匠人淳用銅冄令盤屈隨手傷改鍜割飛二刀子色迎霽雪鋒含霜兩條神物秋水薄刀淬初蟾鞘金矟越㦸吳鈎不足誇斬犀切玉應懐怍日試曽磨漢水邉掌中佶慓聲泠然神驚魄悸却收得刃頭已吐㣲㣲煙刀乎刀乎何燁燁魑魅須藏恠須懾若非良工變爾形只向裁縫委箱篋盧綸割飛二刀子歌那堪把素手抽針冷丨丨丨剪刀明朝驛使發一夜絮征袍李白子夜吳歌古今合璧事類備要外集卷五十七
