body:
  text: 古今合璧事類備要前集卷五十宋謝維新撰道教門神仙名義事類真人仙道有十二試皆意之所不悟皆太極真人臨見之也試皆過授以真經青鳥公積四百七十二嵗十二試之有三不過太極道君以為仙人不得為丨丨真誥元君男之髙仙曰真人女曰丨丨真宅夫欲修道惟滅動心不滅照心但疑空心不凝住心有事無事常若無心處靜處喧其志惟一制而不著放而不動處喧無惡涉事元惱者皆是真定以無事為丨丨有事為應迹不求惠而惠自生此名真惠定觀經仙館易遷童初二宫是男女丨之堂丨也其中間靜東海青童君一年再遊校此有趙素臺者乃漢趙熙女在易遷宫已四百年化形煉景不肯徙自謂天下無復此樂也真誥積功丨丨滿千雖有過得仙功滿三百而過不足相補者子仙功滿二百者孫仙子無功德有過便得仙其子孫若無志多過者只得冨貴仙不可冀也真誥修道丨丨功深已成者自然享六甲行厨有所須舉意即至若素有北夢瑣言五性上元夫人謂帝曰汝好道乎數招方士登山祠神亦為勤矣然汝胎性暴胎性淫胎性奢胎性酷胎性賊五者常舍於榮衛之中五藏之內若從今捨爾丨丨反諸柔善常為隂德救濟死厄不泄精液齋戒勤儉鳴天鼓飲玉漿蕩華池叩金梁按而行之當有冀爾今阿母迂大道之重下降蟪蛅之窟屈霄虗之靈詣孤鳥之俎子厲之哉漢武帝內傳九患學道者有丨丨有志無時有時元友有友無志有志不遇其師遇師不覺覺師不勤勤不守道或志不固固不能久皆人之九患也七變大洞者神仙也别有三山三山有七宫七宫有七變朝化為金日中化為銀暮化為銅夜化為光或化為山為水為石謂之七變七變有七經有二十一童子隨之故曰大洞真經讀萬過即得真仙誥真誥三等地下主者有丨丨第一散在外舍間亭不受九宫考制不聞練化之業一百四十年許一進耳二等便得仙階丨丨便得出入易遷童初二府入宴東華臺受學化形濯景易氣三十年棺中骨還附神四十年復如生人五十年位補仙階為上仙矣真誥餐霞九華真妃曰日者霞之實霞者日之精惟聞服日實之法未見知丨丨之精丨丨之經甚祕致霞之道甚易此謂體生玉光霞映上清之法又曰眼者身之鏡耳者體之牖視多則鏡昏聽衆則牖閉妾有磨鏡之石決牖之術面者神之庭髮者腦之華心悲則面焦腦減則髮素所以精元內喪丹津損竭妾有童面之經還白之法精者體之神明者身之寶勞多則精散營竟則明消妾有益精之道延明之經服日東華真人丨丨月之象男服日象女服月象一日不廢使人聰明五藏生華太虛真人曰以月五日夜半存日象在心中日從口入使照一心之內去尸欲長生先丨三丨三尸常以月望晦朔上天白人間罪過使人不夀蓋人身中神欲得人生三尸欲人死人死則散而為鬼歆享祭祀故欲人死也凡人夢與惡人鬬乃尸與人神相戰也太平廣記食氣楚詞丨六丨而飲沆瀣注云陵陽子明經云春食朝霞者日始出赤氣也秋食淪漢者日沒後赤黃氣也冬食沆瀣者北方夜半氣也夏食正陽者南方日中氣也司馬相如傳注胎息丨丨者能不以鼻口噓吸如在胞胎中初學行氣鼻中引氣而閉之以心數至一百二十乃以口吐氣出之及引氣皆不欲令自耳聞其氣出入之聲常令入多出少以鴻毛著鼻口之上吐氣而鴻毛不動為度漸習漸增其心數久久可至千則老者更少日還一日矣夫行氣必當以生氣勿以死氣從半夜至日中為生氣從日中至半夜為死氣行死氣無益故行氣或可以入瘟疫或可以禁蛇虎或可以居水中或可以行水上或可以辟飢渴或可以延年噓水水為之逆流噓火火為之滅但行氣不欲多食及食生菜肥鮮之物令人氣強難閉且禁平居恚怒恚怒則氣亂令人發咳葛仙翁每盛暑輒入深淵之底一日許乃出者正以能閉氣胎息故耳抱朴子習閉氣而吞之名曰胎息習漱舌下泉咽之名曰胎食抱朴子曰胎息者能不以鼻口噓吸如在胎中也內傳脈望何諷嘗於書中得一髮捲規四寸許如環之無端用力絶之兩端滴水投於火作髮氣莫知其何物也後與方士言歎曰君不見仙命也此名丨丨蠧魚三食神仙字則化為此夜持向天從規中望星星便立降可求丹度世也酉陽雜俎伐毛東方朔生三日而父母俱亡後遊澤中有一黃眉翁指朔曰此吾兒也吾却食服氣三千年一反骨洗髓二千年一剝皮丨丨吾生已三洗髓三伐毛矣武帝故事易髓漢武中王母求度世之術母曰子但愛精握固閉息吞液氣化為血血化為精精化為液液化為骨行之不倦一年易氣二年易血三年易脈四年易肉五年丨丨六年易筋七年易骨八年易髮九年易形變化則成道武帝內傳遐舉世人學道資一丹一藥之功聊固其命倚以修道未能證就避忌尤多三官巡邏攝入鬼録所以頻改姓名先用尸解然後進取上法或五嶽授事校職仙曹優遊人間或至千嵗功德升聞却朝玉皇往往丨丨世人無由知也今之仙隱有騰空者服金丹也遐舉之事未可希望或延年不死時其冇之尸解凡今之人死必視其形如生乃尸解也足不青皮不皺亦丨丨也目光不毁頭髮不脫不失其形骨者皆丨丨也有未斂而失尸者有人形猶在而無復骨者有衣在形去者有髮脫而形去者白日去謂之上尸解夜半去謂之下尸解向曉暮之際謂之地下主得真仙誥集仙傳王方平謂蔡經曰汝應得度世但氣少肉多唯可丨丨耳此法須臾如過狗竇中耳經忽身熱因失其尸列仙傳鬼試又有丨丨多惑人須定志意熟視其規中珠子濁不明則丨丨也則思七星在頭上以却之若規中方明者仙道人也則拜之不悟則為試不過真誥仙相名在瓊簡者目有緑筋名在赤書者隂有伏骨名在琳札者胸中偃骨名在星書者眼有四規皆上仙也其次鼻如玄山腹有玄丘亦丨丨也真誥河車北方正氣名丨丨又仙經云鉛絶河車空所作皆無功鉛失河車絶萬事旡所出又道訣云脅腹腰曲緑黃河水逆流蓋擊運法也仙源楚莊王時有乞食翁歌曰天庭發雙華丨丨彰隂邪清晨按天馬來詣太真家獨宋來子疑其仙人追逐十二年此翁授以中仙之道乞食翁乃西嶽真人闕延夀也手為天馬鼻為丨丨真誥仙椹扶桑島有木如桑其實如椹九千年一實十洲記靈瓜謝玄卿遇神仙見素麟脂班螭髓玄洲白奈空洞丨丨又有瓊飴酒彈八琅之璈叢霄之笙洞隂之磬又作回鸞轉鳳之舞皆非世間所聞續仙傳金花隂真君歌曰北方正氣為河車東方甲乙成丹砂兩情合飬為一體朱雀調運生丨丨坡詩注瑶草姑射之山帝女死焉化為丨丨山海經又云帝之季女名瑶姬未行而亡封於巫山精神化為草李善注髙唐賦序崑崙山司馬相如傳注丨丨丨去中國五萬里廣邪萬里髙八萬仭層城九重靣有九井以玉為檻旁有五門天帝之下都也又有閬風山在崑崙下閶闔之中又水經云丨丨丨去嵩髙五萬里其髙一萬一千里仙傳拾遺記方諸宫天仙上真之宫室也髙九千丈有大方諸小方諸大方諸對會稽東南七萬里小方諸之上多有奉佛者人皆服五星精讀夏歸藏經用以飛行陶隱居編真誥黃庭經晉魏夫人名華存生二子學道服胡麻散道成景林真人授以黃庭內境經令讀萬過乃得洞觀鬼神天人碑青飢飯楊桐葉細冬青寒食人採其葉染飯色青而光食之資陽氣謂之楊桐飯道家所謂丨丨丨零陵總記又真誥魏夫人碑登真隱訣注云以南燭草木煮汁漬米為之又真誥云有道士鄧伯元者受青精石飯之法交梨火棗晉許穆為護軍長史入華陽洞得道女仙王母第二十女紫微夫人嘗降教之後有書與穆公玉醴金漿丨丨丨丨此飛騰之藥也不比君丹已生君心中以君心中猶有荆棘相雜是以二樹不見又云玉體金漿交生神梨方丈火棗元光靈芝我當與山中許道士不以與人間許長史真誥又出總仙傳冰桃碧藕西王母降周穆王開宴有萬嵗丨丨千嵗丨丨穆天子傳六甲靈飛十二事上元夫人與王母既會武帝謂曰阿母發五嶽真形雖覩妙理而無丨丨丨丨之符太隂六丁玉女之籙太陽六戊之書左乙東象之文右庚攝殺之律壬癸六道隱形之術丙丁之火九赤班符六辛月華之法六已化形之方八稟十訣長生紫書內視中方凡丨丨丨何以總攝萬精驅策百鬼帝曰願賜指教夫人即命侍女出六甲十二事來授王母曰若汝修善後三十年當告汝要道而帝淫色殺伐不休不從王母上元夫人之戒二真遂不復來太初二年柏梁臺災真形圖與丨丨丨丨丨丨丨藏於柏梁臺並燒武帝內傳太上五嶽真形圖西王母與上元夫人降漢武帝殿帝視箱中有小書乞瞻覽母曰此五嶽真形圖也乃三天太上所出豈汝所宜佩乎帝乞不已母遂與帝帝藏之柏梁臺同上詩集火棗土木容形殷七七水雲情性許間間身中丨丨無人會此藥元來便駐顔張天覺詩霞觴許碏登樓飲酒忽作一詩題於棲上云閬苑花前是醉鄉誤翻王母九丨丨羣仙拍手稱輕薄謫向人間作酒狂題畢乘雲而去列仙傳丹法事類調息東坡云人之生死未有不自坎離者坎離交則生分則死離為心坎為腎龍者汞也精也血也出於腎而肝藏之坎之物也虎者鉛也氣也力也出於心而肺主之離之物也不學道者其龍常出於水龍飛而汞輕其虎常出於火故虎走而鉛枯故真人曰龍從火裏出虎向水中生人能正坐瞑目丨丨以久為功則丹田濕而水上行蓊然如雲蒸于泥丸火為水妃熱必從之則所謂龍從火裏出也龍出於火則龍不飛而汞不乾旬日之外腦滿而腰足輕常捲舌上舐懸癰久則汞下入口咽送至丹田久則化為鉛此所謂虎向水中生也東坡志林導引食草木之藥不知房中之法及行氣丨丨服藥無益也若至意感靈亦不須草木之藥若但知房中及導引不知神丹之法亦不得仙也若得神丹立便仙矣若得大洞真經讀之萬過便仙不須金丹矣真誥太極隱芝仙官上下次秩有左右府左右公左右卿左右大夫左右御史明大洞真經者為仙卿服金丹者為大夫服衆芝為御史若得丨丨丨丨服之便為仙公真人矣同上姹女河車河上姹女得火則飛注云河上則真汞也周易參同契又云姹女隱在丹砂中注姹女汞也漢真人丹砂訣河車是水朱雀是火取水一斗鐺中以火炎之百沸致聖石九兩其中初成丨丨次謂之玉液後成紫色謂之紫丨丨白色曰白河車青色曰青河車赤色曰赤河車亦名黃芽出道書蓬萊傳修煉法玉華金液南真夫人謂楊羲曰得道去世或隱或顯託體遺迹鹿皮翁吞丨丨流蟲出尸仇季子咽丨丨而臭聞百里季主服五雲散以潛升猶頭足異處墨秋咽虹丹以投水寧生服石腦而赴火伯成納氣而腸胃三腐真誥雲母雌黃華隂山神告劉根曰汝今髓不滿血不暖氣少聽減筋急肉沮必欲長生必先治病十二年乃可服仙藥藥有上下仙有數品不知房中之事行氣導引并神藥者不能仙也藥上者為九轉還丹太一金液服之皆立登天其次有丨丨丨丨之屬雖不即乘雲亦可役使鬼神次乃草木諸藥止可數百嵗太平廣記鑽木得丹傅先生入焦山七年老君與之木鑽使穿一石厚五尺云穿此便當得道其人晝夜鑽之積四十七年丨盡丨穿遂丨仙丨升天真誥視壁得方帛和入西城山事王君君令熟丨石丨初一年無所見二年漸有文字三年丨神丹丨及五嶽圖乃去神仙傳服丹體輕陶洪景既得神符祕訣以為神丹可成而苦無藥物帝給賜黃金朱砂雌黃等後合飛丹色如霜雪服之體輕梁書服丹尸解髙宗時道士劉合還丹成而上之咸亨中卒唯有空皮而背上開拆有似蟬蛻出真仙傳真人授丹黃真人石晉時為惠州太守棄官入羅浮山水簾洞蘇養直居潤州