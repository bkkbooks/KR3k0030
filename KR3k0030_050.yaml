飛朱孺子幼事道士王元正居大若岩一日汲于溪上見二花犬相趂因逐之入于枸杞叢下掘之根形如二犬烹而食之忽覺身輕飛于峯上雲氣擁之而去元真食其餘亦得不死因號童子峯仙傳赤松少女丨丨子神農時雨師服水玉教神農能入火自燒至崑崙山西王母石室隨風雨上下炎帝少女追之亦得仙俱去髙辛時為雨師列仙傳木公金母丨丨亦云東王父又云東王公蓋青陽元氣也西王母亦云丨丨又云九靈太妙龜山金母一號太虛九光龜臺金母元君皆稱以王者謂天尊之地也昔道氣無為自然先以東華至真之氣化生木公以主陽和之氣又以西華至妙之氣化生金母配西方母養羣品男子得道者名𨽻金母漢時有小兒歌曰揖金母拜木公時人不識惟張子房知而拜之王母所居崑崙之圃閬風之苑有城千里玉樓十二左帶瑶池右環翠水仙傳拾遺老子生世老子姓李名耳字伯陽其母懷之八十一嵗乃生生時剖其母左腋而出出而白首故謂之老子又云母到李樹下而生老子生而能言指李樹曰以此為我姓又有老聃之號老子黃色美眉廣顙長耳大目疏齒方口厚脣額有參牛達理日角月庭鼻骨雙柱耳有三門足蹈三五手把十文以周武王時為柱下史時俗見其久夀故號老子所出度世之法九丹八石玉醴金液治心養性絶穀變化役使鬼神之法列仙傳彭祖長夀彭祖姓籛諱鏗帝顓頊玄孫至殷之末世年已七百餘嵗而不衰凡四十九妻五十二子少好恬靜惟以養神治生為事王聞之以為大夫稱疾不與政事善於補導之術列仙傳葛玄道術葛玄字孝先從左元族受九丹液仙經與客對食並言及變化之事客曰食畢先生作一事特戲者玄曰君得毋促促欲有所見乎乃嗽口飯盡成大蜂數百皆集客身亦不螫人玄乃張口蜂皆飛入口都畢玄嚼食之是故飯也玄指床使行指蝦蟇及諸行蟲飛燕雀龜之屬使舞應節如人也玄以冬為客設生瓜棗夏致冰雪又以數十錢使人散投井中玄以一器於井上呼錢出於是錢一一飛從井出皆向所投也又曰為客設酒無人傳之杯自至前如或不盡杯不去也帝問曰百姓思雨寧可得乎玄曰雨易得耳乃飛待著社中一時之間天地晦冥大雨流潦本傳承禎道骨開元中文靖天師與司馬承禎各就枕忽聞小兒誦經聲汵汵如金玉天師窺之承禎額上有小目如錢光照一席逼而聽之乃承禎腦中聲髙道傳葛洪尸解丨丨字稚川亡時年八十一視其貌如平生體亦軟弱舉尸入棺其輕如空衣時咸以為丨丨得山本傳梅福仙去梅福為南昌尉時王莽專政福一朝棄妻子去九江傳以為仙本傳偓佺食松丨丨采藥父也好丨丨實體毛數寸能飛行逐走馬以松子遺堯堯不服時受而服者皆三百嵗出列仙傳董奉種杏吳丨丨侯官人有道術居山不丨田為人治病亦不取錢重病愈者使栽丨五株輕者一株如此數年計得十餘萬株欎然成林乃使山中百禽羣獸遊戲其下竟不生草常如藝治後杏子大熟於林中作一草倉示時人曰欲買杏者不須報奉但將穀一器置倉中即自往取一器杏去嘗有人置穀少而取杏多者羣虎吼逐之本傳令威鶴柱遼東城門有華表柱忽有一白鶴集柱頭時有少年舉弓欲射之鶴乃飛徘徊空中而言曰有鳥有鳥丁令威去家千年今始歸城郭皆是人民非何不學仙冡纍纍遂髙沖天今遼東諸丁云其先世有升仙者不知名字搜神記蕭史鳳臺丨丨秦繆公時善吹笙能致白鵠孔雀公女字弄玉好之以妻焉遂教弄玉作鳳鳴居數十年鳳凰來止其屋為作丨丨夫婦止其上不下夫婦一旦皆隨鳳凰飛去本傳許君斬蜃許真君名遜字敬之本汝南人後於豫章遇一少年容儀修整自稱慎郎許君與之語知非人類指顧之間少年去君謂門人曰適來年少乃是蛟蜃之精吾念江西纍為洪水所害若非剪戮恐致逃遁蜃精知真君識彼潛於龍沙洲化為黃牛真君以道眼遙觀謂弟子施太玉曰彼之精怪化作黃牛我今化其身為黑牛仍以手巾相縛將以認之汝見牛奔鬬當以劍截彼真君乃化身而去俄頃見黑牛奔趂黃牛而來太玉以劍揮牛中其左股因投入城西井中從此井徑歸潭州却化為人先是蜃精化為美少年以珍寶財貨數萬獲娶潭州刺史賈至女至是真君求見賈使君謂曰聞君有貴壻慎郎乃蛟蜃老魅焉敢遁形蜃精復變本形為吏所殺西山許君傳王喬飛鳬王喬漢顯宗時為葉縣令有神術每月朔望嘗詣京朝帝怪其來數而不見車騎密令太史伺望之言臨至必有雙鳬從南方飛來於是候鳬至舉網羅之但得一舄乃四年時所賜尚書官屬履也後天下玉棺於堂前吏人擁排終不搖動喬曰天帝獨召我耶乃沐浴寢其中蓋便立覆宿昔葬於城東上自成墳漢王喬傳琴髙乘鯉丨丨者趙人也以鼓琴為宋康王舍人後辭入涿水中取龍子與弟子期之曰皆潔齋候於水旁設祠屋果丨赤丨來出祠中且有萬人觀之留月餘復入水去子喬乘鶴王子喬者周靈王太子晉也好吹笙作鳳凰鳴道士浮丘公接以上嵩山後求於山見桓良曰告我家七月七日待我於緱山頭果乘白鶴駐山頂望之不到舉手謝時人數日而去列仙傳子訓遊洛薊子訓不知所來到洛見公卿數十處皆持斗酒片脯候之曰逺來無所有示致微意坐上數百人飲啖終日不盡去後數十處皆白雲起從旦至暮時有百嵗公説小兒時見訓賣藥會稽市顔色如此訓不樂住洛遂遁去正始中長安東霸城中有見之者與一老公摩挲銅人曰適見鑄此已近五百嵗搜神記又云薊子訓有道術至京師諸貴人多邀皆許某日日午當往是日二十三處皆見子訓衣服論議如一老子度關尹喜為函谷關吏忽語其徒曰初冬十月天里星西行貫昴今月以來融風三至東方真氣狀若龍蛇而西度漢此大聖之徵果見老君乘青牛薄板車徐甲為御來度關喜拜之老君教喜鍊氣內修吐納胎元之道并授三宫正一之法道德經五千言而去西升化胡經君達活人封君達隴西人號青牛師服水銀百餘年還鄉里如二十者常乘青牛道上有病死者便以腰間竹管中藥與服或下針應手皆愈不以姓召語人出內傳安期賣藥丨丨生琅琊阜鄉人丨丨海邊時人皆言千嵗公秦始皇始見與語三日三夜賜金璧數萬出阜鄉門皆置而去留書以赤玉舄一兩為報曰後千嵗來求我於蓬萊山下始皇遣使者數人入海未至蓬萊山輒風波而還立祠阜鄉亭列仙傳與壺公遇後漢費長房為汝南市掾市有老翁賣藥挂一壺於肆頭市罷輒入壺中人莫之見惟長房於樓上覩之異焉因往再拜奉酒脯翁乃與俱入壺中惟見玉堂嚴麗旨酒甘肴盈衍其中共飲畢而出曰我神仙之人以過見責今事畢當去子寧能相隨乎後從壺公求道入深山於羣虎中留使獨處長房不恐又卧於空屋以朽索懸萬斤石於心上衆蛇來齧索且斷長房亦不移翁撫之曰子可教矣復令食糞糞中有三蟲臭穢特甚長房意惡之翁曰子幾得道恨於此不成長房辭歸翁與一竹杖曰騎此任所之則自至矣既至可投葛陂中又作一符曰以主地上鬼神長房乘杖須臾來歸以竹杖投葛陂顧視則龍也遂能鞭笞百鬼驅使社公本傳與天師會吕大臨作湯保衡傳嘉祐中京師麻家巷有聚小學者李道太學生湯保衡與之遊一日至學有道士鬚髯與道相接既去保衡問道士居建隆觀他日復見前道士去保衡默從之入觀至西廊而沒保衡尋之不見觀廊壁繪一道士正如所見者題云張天師保衡異之他日具冠帶伺於李道之舍道士外至遂拜之再三叩請道士曰某日會於某地保衡如約道士曰但舉目視日十日可復會保衡視日乃覩道士在日中復還道士曰復視日百日再會保衡如教視之乃見已形亦在日中與道士立道士曰可教矣乃授符籙召攝鬼神一日保衡語友人曰適見婦人頗有容色今夕小飲當召所見婦人生魂至形質皆如生人但語聲似嬰兒問保衡此何所也適既就寢不意至此疑是魂又疑死保衡曰便可歸勿憂也遂欵曲與語遣去後保衡及第為令邵氏聞見録秦皇求仙始皇東遊海上方士徐市等上書請得與童男女入海求三神山不死藥浮江至湘山祠逢大風幾不能渡始皇大怒使伐湘山樹赭其山本記盧遨求仙丨丨遊玄闕在北海至蒙轂之土見一士深目而玄準渠頭而鳶肩軒軒然迎風而舞顧見遨慢然而下其臂遁乎卑下遨往視之方卷龜殼而食蛤蜊遨曰遨少好遊背羣離黨觀於六合之外夫子可與遨為友矣若士傲然笑曰我方南遊乎罔䍚之野北息乎沈默之鄉西窮冥冥之里東貫鴻濛之光其外猶有沈沈之泥下無地上無天吾能往來子處矣吾與汗漫遊於九垓之上乃舉臂聳身入雲中遨仰視曰吾比夫子猶黃鵠與壤蟲也終日行不離咫尺而自以為逺不亦悲哉遨燕人秦始皇召為博士使丨丨出淮南子漢武求仙丨丨帝時方士言蓬萊諸神若將可得上欣然庶幾遇之復至海上望焉上欲自浮海求蓬萊東方朔曰陛下第還宫靜處以須之丨人將自至乃止遂去並海上凡周行萬八千里云本紀少君學道李少君字雲翼好道入泰山採藥修絶穀全身之術遇安期生少君疾困叩頭乞活安期生以神樓散一七與服之即愈乃上言臣能凝澒成白銀飛丹砂成黃金服之白日升天身竦則凌天伏入無間控飛龍而八遐遍乘白鴻而九陔周冥海之棗大如瓜鍾山之李大如瓶臣食之逆生竒光師安期授臣口訣是以保萬物之可成也於是王甚尊敬為立屋第漢武內傳洪崖先生衛叔卿服雲母得仙其子名度世遍遊山海一日山中見之與數人博戲坐白石床度世問博者誰曰丨丨丨丨許由巢父王子晉也我有仙方在所居柱下度世歸掘之得玉函封以飛仙之印乃五色雲母也度世服之果仙去神仙傳碧落侍郎沈羲將飛升忽有白鹿青龍車羽衣持節以青玉界丹玉版拜為丨丨丨丨同上橘中二老有巴邛人不知姓家有橘因霜後諸橘盡收餘二大橘如三四斗盎巴人即令攀摘輕重亦如常橘割開每橘有二老叟鬚眉皤然肌體紅明皆相對象戲身尺餘談笑自若但與決賭訖一叟曰君輸我海龍神第七女髮十兩智瓊額黃十二枝紫絹帔一幅綘臺山霞實散二劑二叟曰君輸我瀛洲玉麈九斛阿母療髓凝酒四鍾阿母女熊盈娘子躋虛龍縞襪八緉後日於先生青城草堂還我耳又有一叟曰王先生許來竟待不得橘中之樂不減商山但不得深根固蒂於橘中耳一叟曰僕飢虛矣須龍根脯食之即於袖中抽出一草根方圓徑寸形狀宛轉如龍毫釐罔不周悉因削食之隨削復滿食訖以水噀之化為一龍四叟共乘之足下泄泄雲起須臾風雨晦冥不知所在搜神記鬼谷先生丨丨丨丨晉平公時人隱居鬼谷在人間數百嵗後不知所之都仙太史許遜汝南人許子阿之後與族子穆俱學道遜為旌陽縣令棄官後得仙唐漢卓異志又晉元帝時忽有仙人瑕丘仲奉玉皇命授許遜九州丨丨丨丨髙明大使家屬四十二口皆乘雲去政和中朝廷册封神功妙濟真君西山十二真君傳東華道君唐司馬承禎隱天台山有弟子焦靜真女人也因精思間有頃導至方文遇二女仙謂曰子欲為真官可謁丨丨青童丨丨授三皇法請氏名則承禎也乃歸而詣承禎雲笈經三茅真君茅濛字初成先是有謡曰神仙得者濛初成繼世而往在我盈濛之孫盈字叔申漢地節中得道於金陵勾曲山受金匱九錫之命為司命真君邦人改勾曲為茅君山洞仙傳又大茅君名盈次名固次名衷老君拜盈為司命真君固為定録真君衷為保生真君故號三茅君托遺又神仙傳有大茅山中茅山小茅山山之峯各秀故曰三秀真誥注五雲閣吏蔡少霞者夢人遣書碑略云昔乘魚車今履端雲觸空仰塗綺輅輪園其末題云丨丨丨丨蔡少霞書神仙傳少室仙伯王知逺師陶隱居善易知人生死作易總十五卷一日雷雨雲霧中一老人叱知逺曰所泄者書何在上帝命吾攝六丁追取逺據地傍有六人青衣已捧書立矣老人責曰上方禁文自有飛仙保衛金科祕藏玄都汝何者輒藏箱帙知逺曰青丘老人傳授也後司命授知逺為丨丨丨丨雲笈經及異人傳蓬萊仙監梁陶𢎞景師事陸修靜弟子孫遊嶽為師入茅山自稱華陽隱居造三層樓棲止身居其上弟子居中接賓客於下修本草遇神仙桓闓謂曰君之隂功極著以所修本草用虻蟲水蛭輩為藥功雖及人而害物命以此一紀後方得解形南史云仙書云眼方者夀十嵗隱居末年一眼有時而方既化為馬樞得道傳隱居授丨丨丨丨南史雲笈經紫陽真人丨丨丨丨周義山聞有藥先生得道在蒙山能讀龍嶠經乃追尋之蒙山遇羡門子乘白鶴執羽蓋佩青毛之節侍從十餘玉女君乃再拜叩頭乞長生要訣羡門子曰子名在丹臺玉室之中何憂不仙逺越江河來登此何索列仙負局先生丨丨丨丨語似燕代間人因磨鏡輒問主人得毋有疾苦者若有疾輒出紫丸藥與之莫不愈數十年後大疫每到户與藥愈者萬計不取一錢後止吳山絶崖世世懸藥與人曰吾欲還蓬萊山為汝曹下神水崖頭一旦有水白色從石間來下服之多所愈神仙傳終南真人吕岩字洞賓關右人唐咸通中舉進士不第值巢賊為梗攜家隱終南山絶世辟穀變易形體尤精劍術雅言雜載華山處士陳摶字圖南隱武當山移居丨丨雲臺觀又止少華石室每寢處多百餘日不起垂拱初謂其弟子賈德升曰汝可於張超谷鑿石為室室成遂化形於蓮花峯下張超谷中卒經七日支體猶溫有五色雲蔽塞洞口纍日不散本傳張天師傳丨丨丨名道陵字輔漢建武十年正月十五日生於天目山得道善以符治病桓帝永夀元年於靈峯白日上升唐天寶七年封丈師子孫散處無聞惟信州龍虎山有族甚盛世世一人襲其號傳其印張道陵伯九聖七真朝王母王母授以瓊華寶耀七晨素經乃歸集仙傳藍采和歌丨丨丨嘗於市上丨曰踏踏歌丨丨丨世界能幾何紅顔一春樹流年一擲梭古人混混去不返今人紛紛來更多朝驂鸞鳳到碧落暮見桑田生白波長景明輝在空際金銀宫闕空嵯峨續仙傳詩集天關鼎湖流水清且間軒轅去時有弓劍古人傳道流其間後宫嬋娟多花顔乘鸞飛煙亦不還騎龍攀天造丨丨造丨丨聞天語長雲河車載玉女載玉女過紫皇紫皇乃賜白兔所持之藥方後天而老凋三光下視瑶池見王母蛾眉蕭颯如秋霜李白蓬瀛五鶴西北來飛飛凌太清仙人緑雲上自道安期生兩兩白玉童雙吹紫鸞笙飄然下倒影倐忽無留行遺我金光草服之四體輕將隨赤松子對博坐丨丨李白聞歌周穆八荒意漢皇萬乘尊淫樂心不極雄豪安足論西海宴王母北宫邀上元瑶水丨遺丨玉杯竟空言靈迹成蔓草徒悲千載魂李白求藥秦皇按寶劍赫怒振威神逐日巡海右驅石架滄津徵卒空九宇作橋傷萬人但丨篷島丨豈思農扈春力盡功不贍千載為悲辛李白采英吾觀龍變化乃知至陽精石林何冥密幽洞無留行古之得仙道信與元化并玄感非象識誰能測淪冥世人拘目見酣酒笑丹經崑崙有瑶樹安得丨其丨陳子昂感遇詩采芝深居觀羣動悱然爭朵頥羣動相啖食利害紛癡癡便便夸毗子榮耀更相持務光讓天下商賈競刀錐已矣行丨丨萬世同一時同上青溪吾愛鬼谷子丨丨無垢氛囊括經世道遺身在白雲七雄方龍鬬天下亂無君浮雲不足貴導養晦斯文舒可彌宇宙卷之不盈分豈徒山木夀空與麋鹿羣白雲荒哉穆天子始與丨丨期宫女多怨曠層城閉蛾眉日晚瑶臺樂豈傷桃李時青苔空萎絶白髮生羅幃滄洲失志墮塵網浩思屬丨丨靈芝不可得嵗月逐江流碧草晚未凋悲風颯已秋仰首鸞鶴期白雲但悠悠朱元晦讀道書蓬萊王喬吹笙去列子御風還至人絶華念出入有無間千年但聞名不見冰玉顔長嘯空宇碧何許丨丨山同上靈泉渴飲丨丨水飢食玉樹枝白虎化坎青龍離鎖禁姹女關嬰兒樓臺十二紅玻璃木公金母相東西純鉛真汞相光輝烏升兔降無年期東坡玉京天上白丨丨十二樓五城仙人撫我頂結髮受長生朗吟吕岩字洞賓沔中府人唐禮部侍郎謂之孫會昌中兩舉進士不第去遊盧山遇異人得長生訣多遊湘潭嶽鄂之間人莫之識嘗題嶽陽樓詩云朝遊北粵暮蒼梧袖有青蛇膽氣粗三入洛陽人不識丨丨飛過洞庭湖風土記橫劍滕宗諒守巴陵有回道人上謁宗諒口占詩贈之曰華州回道士來到嶽陽城别我遊何處秋空一劍橫東軒筆録白酒熙寧間湖州歸安縣之東林有隱君子沈思字持正隱於東林因以東老名焉能釀十八仙丨丨一日有客自稱回道人長揖東老曰知君白酒新熟願求一醉公命之坐徐觀其目碧色粲然光彩射人與之語無不通故知非塵埃中人也因出與飲自日中至暮已飲數斗殊無酒色回曰久不遊浙中今為子有隂德留詩贈子乃擘席上榴皮畫相題詩於菴壁云西鄰已富憂不足東老雖貧樂有餘白酒釀來因好客黃金散盡為收書丹篆符離道士晨興際華嶽先生尸解餘忽見黃庭丨丨字由傳青紙小朱書東坡和前詩藥爐三千里外無家客七百年前雲外身行滿蓬萊為别館道成瓦礫是黃金待賓榼裏常存酒化丨丨中别有春積德求師何患少由來天地不私親吕洞賓詩碁石仙術每將丹訣解史才曽把逸書刪家僮只有猿隨從坐客惟聞鶴往還處士身孤輕世俗大夫松好賤官班丨殘夜丨秦雲斷琴徹秋岩獨月彎孫鄰幾詩古壇肘傳丹篆千年術口誦黃庭內卷經鶴觀丨丨槐影裏悄無人迹户長扃吕仙翁詩仙島千尋練帶新安水萬仭花屏問政山自少雲霞居物外不多塵士到人間壺懸丨丨吞丹罷碗浸星宫呪水間容易煮銀供客用辛勤栽果與猿攀溪童乞火朝􅀈竹山鬼聽琴夜撼􅗚花氣熏心香馥馥澗聲聆耳響潺潺早晚重逢蕭塢客願隨芝蓋出塵寰聶師道詩卧雲下瞰虛空臨絶澗上排煙霧倚山巔四邊險絶無猿鳥獨丨深丨二十年率于連詩跨風華山髙處是吾宫出即凌空丨曉丨臺殿不將金鎖閉來時自有白雲封陳圖南詩長生藥何用燒丹學駐顔閙非城市靜非山時人若覔丨丨丨對景無心是大還馬自然詩黃庭術手種一株松未老爐燒九轉藥新成心上已得丨丨丨頭上應無白髮生寤公玉皇家翠羽旌幢仙子隊紫雲樓閣丨丨丨人間風雨易分散回首武陵空落花王世寧詩茅氏井嘗恨清風千年欎洞天今得恣遊遨松楸古色玉壇靜鸞鶴不來青帝髙丨丨丨寒丹已化玄宗碑斷夢仍勞分明有個長生路休向紅塵嘆二毛許堅鐺煮山川飲海龜兒人不識燒丹符子鬼難看一粒粟中藏世界二升丨裏丨丨丨瓢藏世界青山雲水窟此地是吾家後夜流瓊液凌晨咀綘霞琴彈碧玉調爐煉白朱砂寶鼎存金虎元田養白鴉一丨丨丨丨三尺斬妖邪解造逡巡酒能開頃刻花有人能學我同共看仙葩韓湘記女仙事類王母西丨丨者金女也厥姓緱氏女子之登仙得道者咸𨽻焉集仙録史記云周穆王好神仙常欲使車轍馬迹遍於天下以倣黃帝乃乘八駿之馬奔戎為右造父為御川又觴西丨丨於瑶池之上丨丨謡曰白雲在天道里悠逺山間之將子無死尚能復來祭父自鄭圃來謁諫王以徐偃之亂王乃返國宗社復安又漢武內傳云七月七日上於承華殿齋忽有一青鳥從西方來集殿上問東方朔朔曰此西丨丨欲來也有頃丨丨至乘紫雲之輦駕五色斑龍上殿自設精饌以柈盛桃七枚帝食之甘美母曰此桃三千年一結實又南窗下有人窺看帝驚問何人丨丨曰是我鄰家小兒東方朔性多滑稽曽三來偷桃矣此子昔為太上仙官但務遊戲太上謫斥使在人間又張君房説西丨丨降武帝殿有侍女四人帝問其名曰董雙成許飛瓊婉陵華段安香又武帝內傳云丨丨降武帝殿虛命侍女王子登彈八琅之璈董雙成吹雲和之笙許飛瓊鼓靈之簧命法嬰歌玄靈之曲麻姑王方平既降蔡經家使召丨丨丨丨至年若十七八女子指爪長數寸經見之意其可爬癢忽有鐵鞭鞭其背顔真卿麻姑山仙壇記樊夫人丨丨丨者劉綱妻也鬒翠如雲肥潔如雪女仙録萼緑華丨丨丨者女仙也上下青衣顔色絶整真誥九華真妃紫清上宫丨丨丨丨是太虛上真元君李夫人之少女也昔遣詣龜山學上清道道成受太上玉書署為此號於是賜姓安名欎嬪宇靈蕭與紫微夫人俱降楊羲欲為匹偶有詩與羲同上南嶽夫人魏夫人晉司徒魏舒之女劉幼彥之妻生二子學道服胡麻散茯苓丸忽有太極真人安度明方諸青童扶桑碧河㿩谷神王清虛真人王襲等來降授以太上寶文八素隱身羽玄等書三十一卷位為紫虛元君丨丨丨丨升天而去顔魯公魏夫人碑雲林夫人真誥云王媚蘭為丨丨丨丨主母第十三女玉清娥字愈意為紫微夫人王母第二十女又集仙傳雲華夫人名瑶姬王母第二十三女嘗遊東海過江上有巫山焉留連久之時大禹理水大風卒至禹因拜夫人求助夫人即授禹策檄召鬼神之書禹嘗詣之顧盻之際變化形質千態萬狀禹初甚疑後乃信夫人授以上清寶文理水之策禹拜受遂導陂決川以成功焉集仙傳上元夫人丨丨丨丨是道君弟子總領真精亞於龜臺同上又西王母既降武帝乃遣侍女與丨丨丨丨相聞侍女返云阿環再拜逺隔綘河遂替顔色近五十年時頃夫人至服赤霜之袍戴九靈夜光之冠帶雲仙火玉之佩垂鳳文琳華之綬腰流黃揮精之劍授帝以靈飛十二事乃去漢武內傳九疑山女丨丨丨中得道丨羅郁也梁簡文帝時降黃門郎王權家贈權詩及火浣布金玉條脫各一枚此女已九百嵗矣陶隱居真誥三元夫人魏夫人華存學道久之龜臺金母丨丨丨丨馮雙禮珠來降教以神訣王母擊節而歌馮雙禮珠彈雲璈而答歌顔魯公魏夫人碑嵩山神女魯女生初餌胡麻采藥丨丨見一女人以五嶽真形與之漢武內傳洞庭君女唐栁毅下第歸至涇陽見一婦人牧羊曰妾丨丨丨小丨也嫁涇川次子為婢所惑得罪舅姑毁黜至此聞君將還敢寄尺牘於洞庭之隂有大橘樹君擊樹三當有應者毅如其言見千門萬户曰靈虛殿一人披紫執圭取書進之洞庭君泣曰老夫之罪使孺弱罹害言未畢有赤龍長萬丈擘天飛去俄而祥風慶雲幢節玲瓏紅粧千百中有一人即前寄書者乃宴毅於碧雲宫宴罷辭去後再娶盧氏貌類龍女妻曰豫即洞庭君女也涇上之辱君能救之兹奉閨房永以為報同歸洞庭莫知其迹栁毅傳江妃解佩丨丨二女不知何許人出遊江湄逢鄭交甫不知其神也女遂丨丨與之交甫受而懷之去數十步空懷無佩女亦不見毛女食松丨丨字玉薑在華隂山中山客獵師世世見之形體生毛自言秦皇宫人秦亡入山丨丨葉遂不飢寒列仙傳玄女吞氣三氣八十一萬億嵗後化生玄妙玉女又生後八十一萬億嵗後三氣變化五色玄黃妙玉女口仍即吞之八十一萬億乃化從玄妙玉女左腋而生生而白首故號為老子玄妙內篇經內人服丹開元中丨丨趙雲容問申元之乞延生之藥元之與絳雪丹一粒曰汝服此必死不壞百年復生至元和末百年雲容果再生髙道傳詩集王母歌武皇齋戒承華殿端拱須臾王母見霓裳照耀麒麟車鮮血淋漓孔雀扇手指交梨遺帝食可以長生臨寓縣頭上復載九星冠總領玉童坐南面欲問要言今告汝帝乃焚香請此語若能鍊魄去三尸後當見我天皇所顧謂侍女董雙成酒闌可奏雲和笙紅霞白日儼不動七龍五鳯紛相迎惜哉志驕神不説歎惜馬蹄與車轍復道歌鐘杳將暮深宫桃李花成雪為看青玉五枝燈蟠螭吐火今已絶李頎藍橋詩裴航遇雲翹夫人與詩云一飲瓊漿百感生玄霜搗盡見雲英丨丨便是神仙窟何必區區上玉京後經過丨丨渴一舍有老嫗揖之求漿嫗令雲英與一甌漿水飲之航欲娶雲英嫗曰但得玉杵玉臼當與之後航得杵臼為搗藥遂得娶而仙云太平廣記古今合璧事類備要前集卷五十
