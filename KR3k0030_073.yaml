body:
  text: 古今合璧事類備要後集卷四宋謝維新撰君道門詔令古今源流詔令之名古無有也自書叙三代有訓誥誓命之文其詔令之所由始乎然自三代以下上之告下皆由其心術以見於言詞初不若後世以粉飾潤色為工也自秦始皇以帝稱制漢人因之於是更而名之曰詔然當文景以前詔令皆出於天子之意爰自武帝報淮南王書常召司馬相如視草故一時之間如喻巴蜀擊難蜀父老皆發於相如之筆厥後西掖專命詞臣而代王言者有人至於號稱內相者又掌內制於翰苑者也由是詔令之㫖多不本於天子之𠂻悉出於詞臣之筆而詔令愈非古矣是以唐則有大詔令而燕詐得以擅其名本朝則亦有大詔令在國初專以楊億為之首蓋本朝一詔令之頒皆出於一人之睿意而臣下特奉宣緣飾之而已此其所以與三代同風而非漢唐之世專事於潤飾者所可議也事類設教風行地下觀先王以觀民丨丨周易施命天下有風垢后以丨丨詰四方申命隨風巽君子以丨丨行事渙汗丨丨其大號並同上惟允夙夜出納朕命丨丨夀肅將肅丨王命仲山甫丨之詩如綸王言如絲其出丨丨王言丨丨其出如綍記作命王言惟丨丨書施令發號丨丨罔有不臧同上出話謹爾丨丨詩王言俾萬姓咸曰大哉丨丨書朕志今豫其敷心腹腎腸厯告爾百姓于丨丨又今我既羞告爾于丨丨文命丨丨敷于四海聲教朔南暨丨丨同上仁言丨丨不如仁聲之入人深也孟德音丨丨秩秩又丨丨不已詩辰告訏謨定命逺猷丨丨同上夕修丨以丨令左傳堯言丨丨布天下史文教丨王聞崇德亂而伐之退而修丨布教丨丨于邦國都鄙禮和令命相布德丨丨記王志詔其見丨者之丨乎文中子上意前漢黃霸為穎川守時丨丨於理數下恩澤詔書霸宣布令人知丨丨也紫泥丨丨掛詔書白六帖青紙丨丨紫泥鳯詔丹丨封五色丨並同上寶書盧從願課為天下第一丨丨勞問告萬方誕丨丨丨書進厥民盤更乃登丨丨丨曰明聽朕言無荒失朕命若休命疇敢不祗丨王之丨丨揚休命敢對丨天子之丨丨同上又對揚天子之丕顯休命左傳見德化山東吏布詔令老癃扶杖以聽思丨丨丨之成也漢賈山至言興視聽與民更始丨民丨丨同上發德音陛下丨丨丨下明詔仲舒䇿謂至恩詔書數下民欣然若更生可丨丨丨未可謂本務也王吉疏務悔過武帝輪臺之詔當今丨在丨丨務寬大宣帝黃龍詔丨行丨丨同上存包桑後光武詔報臧宫馬武曰審黃石丨丨丨閉玉門謝西域痛咎悔唐陸贄言今盜遍天下宜丨自丨丨以感人心陛下誠不吝改過以言謝天下掛墻壁陳子昻召見賜筆扎中書省令條上利害子昻言陛下布德澤下詔書必待刺史縣令謹宣奉行之不得其人則委棄有司丨丨丨耳同上切機要鄭畋知制詔㑹討徐州賊龎勛書詔紛委畋思不淹晷成文粲然無不丨丨丨當時推之日數百陸贄從狩奉天機務填總逺近調發奏請報下書詔丨丨丨夜數十劉琢擢翰林學士宣宗始復關隴書詔丨丨丨投筆遽成辭皆允切不如㫖韋宏景召為翰林學士蘇光榮為涇原節度使宏景當草詔書辭丨丨丨罷學士善如意封敖武宗作詔書慰邊將傷痍者傷居爾體痛在朕躬帝丨其丨丨正位凝命君子以丨丨丨丨易先庚後庚丨丨三日丨丨三日伊川解出命更改之道當如是庚者變更之始也出納王命丨丨丨丨王之喉舌詩號令不時朝廷興居無節丨丨丨丨同上徙豫千金秦孝公用商鞅變法著令立木募有能丨之者丨丨丨果有徙者輒豫之令遂行信如四時執此之令丨丨丨丨賈誼䇿詔馬母獻漢文帝鸞旗在前屬車在後朕乘千里馬獨先安之其令郡國母來獻詔耕籍田丨朕親丨丨丨以供粢盛同上詔賜民租十二年丨丨丨今年田丨之半詔與和親後元年丨丨胸奴丨丨詔除肉刑十三年齊太倉令淳于公有罪當刑其少女緹縈上書丨丨丨丨並同上詔減笞令景帝丨其議丨丨法笞五百曰三百笞三百曰二百定著為丨詔復世讐武帝丨曰齊襄丨九丨之丨其後驅胸奴於隂山大漠詔民更始宣帝丨厲精與丨丨丨一札十行光武丨丨丨丨細書成文尺一詔書漢司𨽻校尉楊球為太尉敕尚書令召拜不得稽留丨丨丨丨又魏志許為丨丨丨丨詔令典雅漢丨丨丨丨與三代同風制書感動唐德宗奉天所下丨丨武夫悍卒無不丨丨流涕李抱真入朝為帝言陛下在奉天山南時赦令至山東士卒聞者皆感泣思奮臣是時知賊不足乎雷厲風飛丨丨丨丨韓愈謝表賜詔歡雷丨魏博丨丨聲如丨被詔輒成張九齡㑹賜渤海詔而書命無足為者乃召九齡為之丨丨丨丨薄紙作詔韋澳在河陽宣宗遣使至魏博道出澳所帝以丨丨手丨丨賜澳曰密飭裝秋當見卿蓋將以為相也裒所賜詔郭子儀為肅宗山陵使子儀懼讒且成盡丨肅宗丨丨丨敕十餘篇上之以筆塗詔李藩王諤賂權近求兼宰相密詔中書門下曰諤可兼宰相藩遽取筆滅宰相字書其左曰不可還奏之宰相權德輿失色曰有不可應别為奏何丨丨丨丨邪藩曰勢迫矣出今日便不可止既而事得寢援凖古誼齊幹為中書舍人詰詔皆丨丨丨丨時號解事舍人有典誥風崔元翰竇參秉政引知制誥其訓辭溫厚丨丨丨丨被㫖草詔韋澳為翰林承㫖夜丨丨丨丨書事有不安者即遷延須見帝開陳可否宣考詔詞董晉五月朔天子㑹朝公卿在廷侍中輦羣臣賀竇參中書令當傅詔疾作晉從容進曰攝中書令臣參病不能事臣請代參丨丨丨丨進退甚詳詞㫖中和許景先丨丨豐美得丨丨之氣詔許自新房元齡上疏願陛下下沛然之丨丨髙麗丨丨腕斷麻不草韓偓進承㫖宰相韋貽範母喪詔還位偓當草制學士使馬從皓逼偓求草偓曰丨可丨丨丨可丨詔制馬負載代宗睿真皇后沈氏德宗即位乃先詔贈后曽祖祖父一日封拜百二十七人丨丨皆翠錦池飾以廄丨丨丨賜其家草制謀皆同劉䅡平李德裕以定䇿功進太尉時封敖丨其丨曰丨丨豫丨言不他惑詔令録副本蘇頲自景龍後與張說以文章顯故時號燕許太手筆帝愛其文曰卿所為丨丨别丨丨丨留中書臣某撰後遂為故事李德裕著論曰近世詔誥惟頲序事外自為文章罷統軍用麻鄭絪竇文場恃功隂諷宰相進擬加統軍絪當作制奏言天子封建或用宰相以卑麻書制付中書門下令以命中尉不識陛下特以寵文場邪遂著為令宰臣丨丨丨丨丨稱功道詔語帝令李德裕作詔德裕數辭帝伐劉禎詔王元逵何𢎞敬曰勿謂子孫之謀殆存輔車之勢元逵等情得皆震恐思劾已而三州降賊遂平常每丨魏博丨則顧德裕丨丨丨咨其切於是而能伐謀也德音喜復生自陛下御寓憂勤兆庶屢降丨丨四海之內莫不抗首而長息自丨丨丨於死亡之中也劉蕡䇿作詔請帝署安樂公主光艷動天下侯王將相多出其門嘗丨丨箝其前丨丨丨帝笑從之百官給告身五代唐明宗劉嶽為吏部侍郎故事吏部文武官告身皆輸朱膠紙軸錢然後給其品髙者則賜之貧者不能輸錢但得敕牒五代之亂官卑者無復得告身中書但録其制辭或任其材能或褒其功行或申以訓誡而授官者皆不給告身皆不知受命之所以然非王言所以告詔也請一切賜之由是丨丨皆丨丨丨自嶽始乏食朱書詔同光三年秋天下大水京師丨丨尤甚莊宗以丨丨御記丨百寮上封事李琪上書數千言五代史令不可頻改真宗景德二年知制誥朱巽言朝廷命丨丨丨丨丨自今有陳述利害更張法制者請先付有司議其可否如經久可行者行之不可者止之茍不辨是非一切頒布恐失重謹之道令頻改難從仁宗慶厯元年歐陽修奏言多變則不信丨丨丨則丨丨故每處置之事州縣知朝廷未是一定之命則官吏相謂曰且未要行不久必須更改或曰備禮行下略與應破指揮旦夕之間果然又變降命皆竦視仁宗三年尹洙言命令者人主所以示信於天下異時民間聞朝廷丨一丨令丨丨丨之今則不然時相有請不久當更既而信然此命令日輕於天下也審讀應故事哲宗元祐二年劉安世言朝廷命令變易頗數逺不過一二嵗近則朞月而已甚者朝令而夕改亦有前詔未頒而後令蠲除者蓋由謀議未精思慮未審乞申敕門下無使徒為丨丨如丨丨丨奏乞重命令仁宗慶厯二年范仲淹丨事終曰丨丨丨上言裁制敕范仲淹言有司建立法度率爾頒行旋復釐改請先委政事之臣參改可以久行者丨為丨丨行下元祐快活條哲宗丨丨初范純仁言陛下即位之初聖政鼎新凡有不便於民者即為蠲除每詔令一下民間歡呼鼓舞邸賣傳播謂之丨丨丨貫此事即時聞之夷狄建炎己亥詔髙宗丨丨元年丨丨丨曰惟孝弟可以動天惟憂厪可以成務惟恭儉可以富民惟兢畏可以保國惟大公可以悅人惟至仁可以安衆惟來讜論屏側言可以逹聽惟近正人逺寵佞可以成德庶幾降鑒俾復父母兄弟朕將謹視舊章不以手筆廢朝令不以內侍典兵權非軍功無異賞非戎備無僝功尚慮羣臣狃于故習大臣蔽賢有舉非實臺諫懷慝有言非真必罰無赦東坡重巽以申命論昔聖人之始畫卦也皆有以配乎物者也巽之配於風者以其發而有所動也配於木者以其仁且順也夫發而有所動者不仁則不可以久不順則不可以行故發而仁動而順而巽之道備矣聖人以為不重則不可以不變故因而重之使之動而能變變而不窮故曰重巽以申命言天子之號令如此而後可也天地之化育有可以指而言者有不可以求而得之者今夫日皆知其所以為暖雨皆知其所以為潤雷霆皆知其所以為震雪霜皆知其所以為殺至於風悠然布於天地之間來不知其所自去不知其所入噓而炎吹而冷大而鼓乎太山喬嶽之上細而入乎竅室蔀屋之下發逹萬物而天下不以為德摧敗草木而天下不以為怒故曰天地之化育有不可求而得者此聖人之所法以令天下之術也聖人在上天下之民各得其職士者皆曰吾學而仕農者皆曰吾耕而食工者皆曰吾作而用賈者皆曰吾負而販不知聖人之制命令以鼓舞通變其道而使之安乎此也聖人之在上也天下可由而不可知可言而不可議蓋得乎巽之道也易者聖人之動而卦者動之時也蠱之彖曰先甲三日後甲三日而巽之九五亦曰先庚三日後庚三日而說者謂甲庚皆所以申命而先後者謹之至也聖人憫斯民之愚而不忍使之遽陷於罪戾也故先三日而令之後三日而申之不從而後誅蓋其用心之謹也以至神之化令天下使天下不測其端以至詳之法曉天下使天下明知其所避天下不測其端而明知其所避故靡然相率而不敢議也上令而下不議下從而上不誅順之至也故重巽之道上下順也詩集開闢乾坤王殿稱觴送喜頻德音借與萬方春指揮夷夏無遺䇿丨丨丨丨自有神張于湖辛巳冬聞德音詩恤刑獄空同古今源流刑者古之所不得已自虞帝有欽哉欽哉惟刑之恤之㫖而後之以恤刑為心者則眆乎此故周穆王以慈祥惻怛之意見於吕刑之一書然則尚矣自秦孝公用商鞅變法作為什伍連坐之制而刑於是始重始皇三世之興專用誅戮參夷之法大失古人恤刑之心漢髙入關始約法三章厥後除三族罪除誹謗妖言罪除挾書律除肉刑減笞令皆自髙帝發之惟武帝用張湯趙禹作見知故縱監臨部主之發繼之宣帝以刑名繩下每事勵精而於刑法一事頗甘心焉以漢之七制其公恕仁厚莫甚於髙文而武宣繼之猶不免失於嚴刑峻法之慘況於後代以明帝之苛察繼以章帝之寬厚而一輕一重其大略可睹矣魏晉六朝南北之際益不足道繼隋者唐而唐有天下可稱者三宗惟太宗之用刑最為近古綿綿至于五代是以我宋藝祖之興專以寬仁多恕為本積此一