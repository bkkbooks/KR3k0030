歎前世赦宥之弊莫不幸小人則多而惠良民則寡撫親近則厚而霑幽逺則踈非前朝以精講之則無以丨丨丨丨深得民意再犯不原光宗紹興四年祭天地於明堂赦天下詔徙流罪人經登極赦免罪丨丨者丨丨免爰布湛恩髙宗建炎元年羣臣因請即位其赦文略曰慰民耳目之注敷朕腹心之言丨丨丨丨誕綏區夏可大赦天下聖政惟求民瘼孝宗隆興三年三月臣僚上言皇帝登寶位赦文及續降寬恤十八事而郡縣之間不為宣布繼自今其各洗心滌慮恭爾有官俾豫一人實惠孚於百姓同上盍下新令孝宗即位詔曰春秋法五始之要聿彰受命之符天地之大德曰生丨丨維丨之丨釋囚推恩寧宗慶元五年德音降諸路流以下丨丨杖以下丨丨如慶夀故事歐陽修縱囚論信義行於君子而刑戮施於小人刑入于死者乃罪大惡極此又小人之尤甚者也寧以義死不苟幸死而視死如歸此又君子之尤難者也方唐太宗之六年録大辟囚三百餘人縱使還家約其自歸以就死是以君子之難能期小人之尤者以必能也其囚及期而卒自歸無後者是君子之所難而小人之所易也此豈近於人情或曰罪大惡極誠小人矣及施恩德以臨之可使變而為君子蓋恩德入人之深而移人之速有如是者矣曰太宗之為此所以求此名也然安知夫縱之去也不意其必來以冀免所以縱之乎乂安知夫被縱而去也不意其自歸而必獲免所以復來乎夫意其必來而縱之是上賊下之情也意其必免而復來是下賊上之心也吾見上下交相賊以成此名也烏有所謂施恩德與夫知信義者哉不然太宗施德於天下於茲六年矣不能使小人不為極惡大罪而一日之恩能使視死如歸而存信義此又不通之論也然則何為而可曰縱而來歸殺之無赦而又縱之而又來則可知為恩德之致爾然此必無之事也若夫縱而來歸而赦之可偶一為之爾若屢為之則殺人者皆不死是可為天下之常法乎不可為常者其聖人之法乎是以堯舜三王之治必本於人情不立異以為髙不逆情以干譽湖山吳芾謝肆赦表日月並明欽昊天之成命雷雨作解得萬國之歡心當乾坤清明之時舉天地筮貺之禮既受泰元之䇿爰頒廣宇之春舞干羽於兩階徂維求定開湯網之三面咸與維新詩集雲鵲飛五色丨間丨丨鳴上天來傳聞赦書至却放夜郎回李白詩雷雨解日御臨雙闕天街儼百神丨舒丨丨氣嵗復建寅春張說和張監觀赦詩泥金檢玉大明煌煌天地分六龍負日升天門鳯凰飛來銜帝籙𤣥載萬代金皇孫靈雞鼓舞承天赦髙翔百匹乘朱轓升中告成答𤣥貺丨丨丨丨照鴻恩李益大禮畢皇帝御丹鳯門改元建中大赦詩滌瑕蕩垢赦書一日行千里罪從大辟皆除死途者追回流者還丨丨丨丨清朝班韓愈詩書報天中丨丨丨丨赦人從海上聞沈佺期詩籥動圜狴聖人宥天下幽丨丨丨丨同上九泉開白日丨丨丨丨丨六融起青雲三元降紫泥六甲迎和氣丨丨丨丨丨恩洗萬家春國嚴三嵗禮丨丨丨丨丨舟楫親南斗衣冠拱北辰張舜民詩不日慶釐成萬計損珠寶千章列楝楹秋毫思頰挫丨丨丨丨丨青簡流芳逺丹書霈澤傾䄂人罔恫怨道路沸歡聲蔣之竒上清儲祥宫詩古今合璧事類備要後集卷四
