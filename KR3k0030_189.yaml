body:
  text: 古今合璧事類備要續集卷三十九宋謝維新撰性行門滑稽事理發揮滑稽其多智圓曲之貌乎淳于髠仰天大笑齊威王橫行優孟搖頭而歌負薪者以封優旃臨檻疾呼陛楯得以半更豈亦不偉哉然其應諧也似優其不窮也似哲其正諫也似直其穢德也似隱非夷齊而是柳下惠首陽為拙柱下為工飽食安坐以仕易農依隱玩世詭時不逢東方生其雄乎子夏曰雖小道必有可觀者焉此之謂也然至於言非若是言是若非變亂異同利口覆邦則曽不若噤不能言者之為愈也事類突梯丨丨滑稽楚辭解紛談言徽中亦可丨丨史記滑稽𫝊序亂異同滑亂也稽同也言辨捷之人言非若是言是若非丨丨丨也索隱注不遜讓褚先生曰臣幸得以經術為郎而好讀外家傳語竊丨丨丨復作故事滑稽之語六章編之於左可以覽觀揚意以示後世好事者讀之以游心駭耳以附益上方太史公之三章史記有鳥在庭淳于髠齊贅壻長不滿七尺滑稽多辨數使諸侯未嘗屈辱齊威王喜隱好為淫樂長夜之飲沈湎不治委政卿大夫百官荒亂諸侯並侵國且危亡左右莫敢諫髠說之以隱曰國中有大鳥止王之庭三年不蜚又不鳴王知此鳥何也王曰此鳥不飛則已一飛冲天不鳴則已一鳴驚人於是乃朝諸縣令七十二人賞一人誅一人奮兵而出諸侯震驚皆還齊侵地威行三十六年史記飛鵠空籠齊使髠獻鵠於楚出邑門道飛其鵠徒揭丨丨造詐成辭往見楚王曰齊王使臣來獻鵠過於水上不忍鵠之渴出而飲之去我飛亡吾欲刺腹絞頸而死恐人議王以鳥獸之故令士自傷殺也鵠毛物多相類者欲買而代之是欺王也欲赴他國奔亡痛吾兩主使不通故來服過叩頭受罪楚王曰善有信士若此厚賜之倍鵠在也同上橘葉似枳晏子短小使楚楚人為小門於大門側而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當從狗門入王曰齊無人耶對曰齊之臨淄張袂成帷揮汗成雨何為無人齊使賢者使賢王不肖者使不肖王嬰不肖故使王耳及嬰坐左右縛人王問何為者曰齊人坐盜王視晏子曰齊人善盜乎晏子對曰嬰聞橘生江北則為枳葉徒相似其實味不同水土異也今此人生於齊不為盜入楚則盜得無楚之水土使為盜耶王笑曰寡人反取病焉晏子春秋麋鹿觸冦始皇議欲大苑囿東至函谷關西至雍陳倉優旃曰善多縱禽獸於其中冦從東方來令丨丨丨之足矣始皇以故輟止同上操一豚蹄齊王使淳于髠之趙請救兵齎金百斤車馬十駟淳于髠仰天大笑冠纓索絶曰臣從東方來見道傍有禳田者丨丨丨丨酒一盂祝曰甌窶滿篝汚邪滿車五穀皆熟穰穰滿家臣見其所持者狹而所欲者奢故笑之於是齊威王乃益齎黃金千鎰白璧十雙車馬百駟以六畜葬優孟者楚之樂人也楚莊王有所愛馬死使羣臣喪之欲以棺槨大夫禮葬之優孟曰大夫禮葬之薄請以人君禮葬之諸侯聞之皆知大王賤人而貴馬也王曰寡人之過一至此乎優孟曰請為大王丨丨丨丨之以壠竈為槨銅歷為棺齎以薑棗薦以木蘭祭以粳稻葬衣以火光葬之於人腹腸於是王乃使以馬效孫叔敖優孟楚樂人楚相孫叔敖知其賢善待之叔敖死其子窮困負薪逢優孟曰我叔敖子父死時屬我貧困往見優孟優孟曰若無逺有所之即為叔敖衣冠抵掌談語嵗餘莊王置酒孟前為夀且大驚以為叔敖復生也欲以為相叔敖孟請歸與婦計之三日復來曰婦言慎無為楚相盡忠楚王得以霸今死其子無立錐之地負薪以自衣食如叔敖不如自殺於是莊王謝孟召叔敖子封之寢丘咄老女子武帝時所幸倡郭舍人發言陳辭雖不合大道然令人主和說武帝少時乳母東武侯母也母家奴從橫暴長安聞於中不忍致之法有司請徙之邊奏可母當入至上前面見辭先見郭舍人為下泣舍人曰即入辭去疾步數還顧母如其言舍人疾言罵之曰丨丨丨丨何不疾行陛下已壯矣寧尚須汝乳而活邪尚何還顧於是帝憐焉乃詔止無徙罰譖之者呼陛楯郎優旃者秦倡朱儒也秦始皇時置酒而天雨陛楯者皆苦寒優旃見而哀之謂之曰我即呼汝汝疾應曰諾居有頃殿上上夀呼萬嵗優旃臨檻大丨曰丨丨丨郎曰諾優旃曰汝雖長何益幸雨立我雖短也幸休居於是始皇使陛楯者得半相代紿騶侏儒東方朔待詔公車奉祿薄未得省見久之朔丨丨本廄之御騶也丨丨短人也曰上以若曹無益於縣官徒索衣食今欲盡殺若曹上過朱儒皆號泣頓首上問何為對曰東方朔言上欲盡誅臣等上召問朔對曰臣朔生亦言死亦言朱儒三尺餘奉一囊粟錢二百四十朱儒飽欲死臣朔饑欲死臣言可用幸異其禮不可用罷之無令索長安米上大笑稍得親近號曰智囊秦樗里子滑稽多智丨丨丨丨談類俳優枚臯為郎丨笑丨丨丨為賦頌好嫚戲以故得媟黷貴幸比東方朔郭舍人等本𫝊元子惡圓論元子家有乳母為員轉之器以悅嬰兒嬰兒喜之母使為之聚孩孺助嬰兒之樂友人公植者聞有戲兒之器請見之及見之趍焚之而責元子曰吾聞古之惡圓之士歌曰寧方為皂不圓為卿寧方為汙辱不圎為顯榮其甚者則終身不仰視曰吾惡天圎或有喻之以天大無窮人不能極逺視四垂因謂之圎天不圎也對曰天縱不圎為人稱之我亦惡焉次山奈何任造圎轉之器悉令悅媚嬰兒小喜之長必好之教兒學圎且陷不義躬自戲圓又失方正嗟嗟次山入門愛嬰兒之樂圎出門當愛小人之趨圎吾安知次山異日不言圎行圎動圎靜圎以終身乎吾豈次山之友也元子召季川謂曰吾自嬰兒戲圎公植尚辱我言絶忽乎吾與汝圎以應物圎以趍時非圎不預非圎不為公植其操戈㦸刑我乎嘲謔事理發揮以言相調曰嘲以言相戲曰謔口舌之才人所不能無也故割雞焉用牛刀吾夫子且有於戲言而成王剪桐圭以戲唐叔乃曰吾以此封汝然則其來也尚矣然善戲謔者不見其為虐彼謔浪笑傲何為者邪宜不免終風之痛悼事類戲謔善丨丨兮不為虐兮詩淇澳笑傲謔浪丨丨中心是悼詩終風伊相謔溱洧刺亂也兵革不息男女相棄淫風大行莫之能救焉云云丨其丨丨贈之以芍藥詩溱洧長相優宋華弱與樂轡少相狎丨丨丨又相謗也子蕩怒以弓梏華弱於朝注狎親習也優調戲也子蕩樂轡左襄公于思于思宋城華元為植巡功城者謳曰睅其目皤其腹棄甲而復丨丨丨丨棄甲復來使其驂乘謂之曰牛則有皮犀兕尚多棄甲則那役人曰從其有皮丹漆若何華元曰去之夫其口衆我寡注于思多鬚貌左宣二朱儒朱儒臧紇救鄫侵邾敗於狐駘國人誦之曰臧之狐裘敗我於狐駘我君小子朱儒是使丨丨丨丨使我敗于邾注臧紇短小故曰朱儒左襄四懶讀欲眠後漢邊詔字孝先以文學知名教授數百人有口辨曽晝日假卧弟子私嘲之曰邊孝先腹便便丨丨書但丨丨詔潛聞之應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢靜與孔子同意師而可嘲出何典記嘲者大慙本𫝊相煎何急箕在釜下然豆在釜中泣本是同根生丨丨丨太丨有犬為獨蜀使張奉使於孫權前以姓召啁闞澤澤不能答薛綜下行酒因勸云蜀者何也丨丨丨丨無犬為蜀橫目茍身蟲入其腹奉曰不當復說君吳耶徐應聲曰無口為天有口為吳君臨萬邦天子之都於是衆坐喜笑而奉無對配馬成驢北齊徐之才嘲王昕曰有言則誑近犬便狂加頸足為馬施角尾成羊盧元明戲之才曰卿姓未入人名是字之誤之才答曰卿姓在亡為虐在丘為虗生男則為虜丨丨則丨丨馬矢雞卵吳諸葛恪字元遜吳太子啁恪曰元遜可食丨丨卿使人食丨丨何也恪曰所出同耳權大笑君口狗竇張𤣥祖八嵗齒虧先逹知其不常戲之曰丨丨復何為丨丨答云正使君輩從此中出劉昭幼童𫝊丈夫牽船劉道真遭亂於河側自牽船見一老嫗操櫓劉曰女子何不調機利杼而操櫓女答曰丨丨何不跨馬揮鞭而丨丨裴啓期語林乞兒乘車魏周泰為新城太守司馬宣王使鍾育調曰君釋褐登宰府三十六日擁麾蓋守兵馬郡丨丨丨小丨一何駛乎泰曰君名公之子少有文采故守吏職獼猴騎土牛又何遲也以祖相戲晉庾純為河南尹以賈充姦佞與任愷共舉充鎮關中充由是不平充嘗在純後至充曰君行常居前今何以在後純曰旦有少市井事不了是以來後世言純之先有伍伯者充之先有市魁者充純以此相譏充殊不平及純行酒充不時飲純曰長者為夀何敢爾乎充曰父老不歸供養將何言也純發怒曰賈充天下凶凶由爾一人充曰充輔佐二世蕩平巴蜀有何罪而天下為之凶凶純曰髙貴鄉公何在充慙怒上表解職純懼白劾免官以名相戲晉孫盛子放字齊莊年七八嵗與父俱從庾亮獵亮曰君亦來邪應聲答曰無小無大從公于邁亮又問欲齊何莊放曰欲齊莊周亮曰不慕仲尼邪放曰仲尼生知非希企所及亮大竒之曰王輔嗣弗過也庾翼子爰客嘗候盛見放問曰安國何在曰庾稚恭家爰客笑曰諸孫太盛有如此兒放曰未若諸庾翼翼既而語人曰我故得重呼奴父也犬名為戲晉張天錫嗣位凉州時符堅彊盛天錫遣從事中郎韓博奉表江左尅日大舉博有口才大司馬桓溫甚稱之當大㑹溫使司馬刁彛嘲之曰君是韓盧後溫笑曰刁以君姓韓故相問他自姓刁那得韓盧後邪博曰明公脫未之思短尾者為刁也一坐推歎藥名為戲謝太傅始有東山之志桓公見藥中有逺志公問謝此藥又名小草何以一物二稱謝未即答郝參軍答曰處則為逺志出則為小草謝公殊有愧色世說藥有二稱見上注麥是何姓隋麥鐵杖為汝南太守因朝集考功郎竇威嘲之曰丨丨丨丨鐵杖曰麥豈不殊何忽相怪威赧然無以應之為是幾艾鄧艾口吃語稱艾艾晉文王戲之曰艾艾丨丨丨丨鄧答曰鳳兮鳳兮故是一鳳世說汝是姓荷隋何妥年八嵗游國子學助教顧良戲曰丨丨丨丨葉之荷為河水之河妥曰先生姓顧是眷顧之顧為新故之故衆咸異之柳條通體隋柳調為侍御史楊素見調曰丨丨丨丨弱獨搖不須風調正色曰調信無取公不當以為侍御史調有可取公不應發此言素甚竒之槐子懸樹隋侯白機辨敏捷嘗與楊素並馬路傍有槐樹憔悴欲死素曰侯秀才理道過人能令此樹活否曰取丨丨丨丨枝即活素問其說答曰論語云子在回何敢死啓顔録徐肺沈脾徐晦嗜酒沈𫝊師善餐楊嗣復云丨家丨丨家丨真安穩耶語林亢體琪骨晏元獻公以文章名譽少年居富貴性豪俊所延賔客一時名士多出其門罷樞密副使為南京留守時年三十八幕下王琪張亢最為上客丨丨肥大琪目為牛丨最丨立亢目為猴二人以此自相譏誚琪嘗嘲亢曰張亢觸牆成八字亢應聲曰王琪望月呌三聲一坐為之大笑歸田録馬默驢鳴劉攽性滑稽熙寧中為試官出臨以教思無窮論舉人上請曰此卦大象如何攽曰要見大象當詣南御苑馬默為臺官彈奏攽輕薄不當致在文館攽曰既云丨丨豈合丨丨呂嘉問提舉市易曽布劾其違法反得罪嘉問治事如故攽曰豈意曽子避席望之儼然乎嘉問字望之倦游雜録馬兄驢弟馬㳙舊唐名士雄才奧學登進士第履歷已髙唐帝幸梁洋涓扈蹕焉至漢中詔除眉州刺史赴任至蜀阻兵王氏强縻於幕中性耿槩不屈恃才傲物甚不洽於僞蜀主知王氏有異圖輒不相許或贈繒帛必鎖匱中題云贓物王雖知憐其文藝每强容之時或不可數揖出院欲逼殺之殊無懼色後朱梁遣使致書於蜀命諸從事韋莊輩具草答之皆不愜意左右曰何妨命前察判為之王氏又有慙色梁使將復命不獲已逆請復職便亟修回復㳙一筆而成大稱㫖於是却復前歡因召諸㕔同宴飲次㳙斂袵曰偶記一話欲對大王說可乎主許之曰㳙少年多游謁諸侯每行即必廣齎書策驢亦䭾之馬亦䭾之初戒途驢咆哮跳躑與馬爭路而先莫之能制行半日後抵一坡力疲足憊遍體汗流回顧馬曰丨丨馬兄吾去不得也可為弟搭取文書馬兄喏之遂並在馬上却回顧驢曰丨丨我謂你有多少伎倆畢竟還搭在老兄身上蜀主大笑同幕皆遭凌謔及為蜀開國終不肯居宰輔出王氏聞見録出杖鼓鞚蘇公自黃移汝過金陵見荆公公曰好箇翰林學士某久以此奉待公曰撫州丨丨丨丨淮南豪子以厚價購之而撫人有之保之已數世矣不逺千里登門求售豪子擊之曰無聲遂不售撫人恨怒至河上投之水中吞吐有聲視熟而歎曰你早作聲我不棄汝后山談叢謂避孔塔世以癩疾鼻陷為死證劉貢父晚有此疾子瞻曰少壯讀書頗知故事孔子嘗出顔仲二子行而過市而卒遇其師子路趫捷躍而升木顔淵懦緩顧無所之就市中荆人所經幢避之所謂石幢子者既去市人以賢者所至不可復以故名遂共丨丨丨丨坐者絶倒后山談叢跌石學士石曼卿善戲謔嘗出御者失鞚馬驚曼卿墮地從吏遽扶掖升鞍曼卿曰賴我是丨丨丨若瓦學士豈不跌碎乎百家詩夾注轎子施道民為孫威敏所黥既而復得為民借兩軍人肩輿而出曽子固見之曰好一隻丨丨丨丨聞者絶倒志林頭間安帽張逸密學知成都僧文鑒求見時華陽簿張唐輔同在客次唐輔欲搔首方脫烏巾睥睨文鑒置於其首文鑒大怒欣於張公公問其故唐輔曰某方頭癢取下幞頭無處頓放見大師丨丨遂權頓少時不意其怒也古今詩話頸縮下車祖廣行嘗縮頸詣桓南郡始下車桓曰天甚晴明祖參軍如從屋漏下來續世說膊聳成山長孫無忌嘲歐陽詢曰丨丨丨丨字埋肩不出頭八百九百昔之黠者滑稽以玩世曰彭祖八百嵗而死其婦哭之慟其鄰里共解之曰人生八十不可得而翁八百矣尚何尤婦謝曰汝輩自不喻爾丨丨死矣丨丨猶在也世以癡為九百謂其精神不足也又曰令新視事而不習吏道召胥魁問之魁具道笞十至五十及折杖數令遽止之曰我解矣笞六十為杖十四耶魁笑曰五十尚可六十猶癡耶蘇長公取為偶對曰九百不死六十猶癡后山詩話三千大千潭州試經童試官舉經頭一句曰丨丨丨丨時一閩童誦不通因操南音上請曰覆試官不知下頭有世界耶無世界耶聞者大笑皛飯毳飯文潞公說頃年進士郭震任介皆西蜀豪逸之士一日郭致柬於任曰來日請餐丨丨任不曉厥㫖如約以往將日中方具糲飯一盂蘆蔔鹽各一盤餘更無别物任曰何謂皛飯郭曰白飯白蘆蔔白鹽豈非皛飯耶任勉强食之而退任一日復致柬於郭曰來日請食丨丨郭亦如約而往逮過日中迄無一物郭問之任答曰昨日已曽上聞郭曰何也任曰飯也毛蘆蔔也毛鹽也毛只此便是毳飯郭大噱而退蜀人至今為口談俗呼無曰毛魏王語録下官上官石中立參政滑稽有上官祕郎中勸以慎口對曰丨丨口干丨丨鼻何事續聞録熱熟顔回陳叔和為舉子通率少檢後舉制科驟為質朴時號丨丨丨丨時孔仲舉對制策言天下有可歎息慟哭者既而被斥叔和曰孔生真杜園賈誼也王平甫聞之曰杜園賈誼好對丨丨丨丨倦游録鄙俚孫通司馬溫公之薨當明堂大饗朝臣以致齊不及奠肆赦畢蘇子瞻率同輩以往而程頤固爭引論語子於是日哭則不歌子瞻曰明堂乃吉禮不可謂歌則不哭也頤又喻司馬諸孤不得受弔子瞻戲曰頤可謂燠糟丨丨叔丨丨聞者笑之孫公談圃春秋倚閣歐陽永叔在政府以詩寄潁隂隱士常秩曰笑殺汝隂常處士十年騎馬聽朝雞既而介甫秉政以右正言直史館召秩秩遂起有無名子改前詩曰昔日汝隂常處士却來馬上聽朝雞秩舊治春秋著講解數十卷自謂聖人之意盡在是矣介甫不好春秋秩遂盡諱其所學熙寧六年兩河荒歉詔令所在青苗本錢權行倚閣王平甫戲秩曰公之丨丨亦權丨丨乎倦游録孝經問題有錢塘葉生為太學官無學識有學士假作葉策題云孝經一序義亦難明且如韋昭王是何代之主先儒嶺是何處之山孔子之志四時常有也何以獨言吾志在春孔子之孝四時長行也何以獨言秋行在孝既曰夫子沒而又何以有鯉趨而過庭郁乎文哉宋王彧子絢年五六嵗念論語至周監於二代外祖何尚之曰可改爺爺乎文哉絢曰尊者之名安可戲寧可道草翁之風必舅望之儼然吕嘉問提舉市易務三司使曽布劾其違法荆公惑黨人之說反以罪三司曽既罷朝請而嘉問治事如故攽聞而歎曰豈應曽子避席丨丨丨丨望之嘉問字也乃假蝗蟲賈黃中為相盧多遜作參一日府畿有蝗蟲盧曰某聞所有丨丨丨丨賈曰亦聞不傷稼但蘆多損耳文酒詩話恐李趨兒姚峴滑稽姚南仲廉察陜郊峴以宗從見之忽有投刺者云李過庭南仲曰過庭之名甚新未知誰家子弟峴曰丨是丨丨丨因録八百里湖王荆公好言水利有小人諂曰决梁山湖八百里水以為田其利大矣荆公喜甚徐曰策固善决水何地可容劉貢父在坐中曰自其旁别鑿丨丨丨丨則可容矣荆公笑而止豫以為類優旃滑稽漆城難為䕃室之語故書之聞見録三百甕虀蘇曰王狀元未第時醉墮汴河為水神扶出曰公有三百千料錢若死於此何處消破明年遂登第士有久不第者亦效之陽醉落河河神亦扶出士人喜曰我料錢幾何神曰吾不知也但有丨丨丨黃丨無處消破耳用歇後語有頑民因大旱盜决人水灌田為主者執赴伏罪狀云右某只因天亢律呂調切慮田苗宇宙洪遂偷某人金生麗致得其人寸隂是念某不識始制文今來甘認弔民伐一聽本官忠則盡求得效方艾子事齊宣王一日面有憂色宣王怪而問之對曰臣不幸稚子屬疾欲謁告念王無與圖事者雖在朝班心實係焉王曰盍早言乎寡人有良藥稚子頓服其愈矣遂索以賜艾子拜賜而歸飲其子辰服而已卒他日艾子憂甚戚王問之故愀然曰卿喪子可傷賜卿黃金以助葬艾子曰殤子不足以辱君賜然臣將有所求王曰何求只求前日小兒得效方苜蓿為饋齊地多寒春深未莩甲方立春有村老挈丨丨一筐以饋艾子且曰此物初生未敢嘗謹先以薦艾子喜曰煩汝致新然我享之後次及何人曰獻公罷即割以餧驢也鞋楦為核有人獻木履於齊宣王無刻斫之迹王曰此履豈非生乎艾子曰丨丨乃其核也夜卧蓋薦蘇曰家貧無濶藁薦與其露足寧且露手君觀吾儕有頃刻離筆硯者乎至於困睡猶似筆也小兒子不曉事人問每夜何所蓋輒答云蓋藁薦嫌其太陋撻而戒之曰後有問者但云蓋被一日出見客而薦草挂鬚上兒從後呼曰且除面上被此所謂作僞心勞日拙者耶夜寒著飯蘇曰無糊絹以桑柴灰水煮爛更以清水煮脫灰氣細研如粉酒煮麵糊丸如桐子大空心酒下三五十丸治風壯元此所謂著飯喫衣者也或問飯非可著衣非可喫答云所以著飯不過為窮所以喫衣不過為風正與孫子荆枕流潄石作對或人未喻曰丨丨蓋藁薦豈非丨丨也耶賦中語忌治平中省試大舜善與人同賦一舉人見黜心甚不平其破題云昔有大舜潛心至仁道雖貫於萬世善猶同於衆人或謂之曰以尿罐對油筒宜乎黜落詩中對偶關澥子容推官才俊而容止不揚持服中過南徐客次見一緋魚朝士倨坐關揖而問之彼疑關為攫徒因謔關曰太子洗馬髙垂魚良久復詢關關答以某之官乃是皇后騎牛低釣鱉朝士駭曰是何官位關笑曰且欲與君對偶清切泊宅編新守宴語有太守初視事三日大排樂人口號名為報吏民須慶賀災星退去福星來太守喜問誰所撰對曰本州自有舊例同席酒令有儒道釋吏丨丨丨行丨取句語首尾字一同儒者曰上以風化下下以風刺上道士曰道可道非常道釋曰色即是空空即是色吏曰牒件狀如前謹牒東方解難蘇秦張儀一當萬乘之主而身都卿相之位澤及後世今子大夫修先王之術慕聖人之義自以為智能海內無雙則可謂博聞辨智矣然悉力盡忠以事聖帝曠日持久官不過侍郎位不過執㦸意者尚有遺行耶東方先生仰而應曰蘇秦張儀之時周室大壞諸侯不朝力政爭權相禽以兵得士者强失士者亡故談說得行焉身處尊位今則不然聖帝流德天下震懾諸侯賔服安於覆盂動猶運掌賢不肖何以異哉遵天之道順地之理物無不得其所故綏之則安動之則苦尊之則為將卑之則為虜抗之則在青雲之上抑之則在黃泉之下用之則為虎不用則為鼠欲盡節效情安知前後使蘇秦張儀與僕並生於今之世曽不得掌故安敢望侍郎乎揚雄解嘲客嘲揚子曰吾聞上世之士人綱人紀析人之圭擔人之爵紆青拖紫朱丹其轂今子幸得遭盛明之世處不諱之朝歷金門上玉堂有日矣曽不能畫一竒出一策上說人主下談公卿顧默而作太𤣥五千丈深者入黃泉髙者出蒼天大者含元氣纎者入無間然位不過侍郎擢才給事黃門揚子笑而應之曰客徒欲丹朱吾轂不知一跌將赤吾之族也往者周罔解結羣鹿爭佚士亡常君國亡定臣得士者富失士者貧今大漢左東海右渠搜前畨禺後陶塗散以禮樂風以詩書天下之士雷動而雲合魚鱗雜襲咸營於八區家家自以為稷契人人自以為臯陶戴纚垂纓而談者皆擬於阿衡五尺童子羞比晏嬰與夷吾旦握權則為卿相夕失勢則為匹夫譬若江湖之涯渤澥之島乘雁集不為之多雙鳬飛不為之少向使上世之士處乎今策非甲科行非孝廉舉非方正又安得金紫且吾聞之也攫拏者亡默默者存位極者宗危自守者身全是以知𤣥知默守道之極爰靜爰清游神之廷惟寂惟寞守德之宅世異事變人道不殊彼我易時未知何如故有造蕭何律於唐虞之世則謬矣有作叔孫通儀於夏殷之時則惑矣有建婁敬之策於成周之世則悖矣有談范蔡之說於金張許史之門則狂矣夫蕭規而曹隨留侯畫策陳平出竒功若太山響若塤箎雖其人之贍智哉亦㑹其時之可為也故為可為於可為之時則從為不可為於不可為之時則凶僕誠不能與此數公者並故默然獨守吾太𤣥班固賔戲太上有立德其次有立功是以聖哲之治棲棲遑遑孔席不暖墨突不黔由此言之取舍者昔人之上務著作者前烈之餘事耳今吾子幸遊帝王之世躬𢃄紱冕之服卒不能攄首尾奮翼鱗使見之者景駭聞之者響震徒枕經籍紆體衡門潛神默記亘以年嵗然而器不賈於當己用不效於一世雖馳辨如波濤摛藻如春華猶無益於殿最也主人曰若賔之言斯可謂見勢利之華暗道德之實守突奧之熒燭未仰天庭而覩白日也曩者王塗蕪穢周失其馭侯伯方軌戰國橫騖當此之時榒朽磨鈍鉛刀皆能一斷商鞅挾三術以讚孝公李斯奮時務而要始皇彼皆躡風雲之㑹履顛沛之勢朝為榮華久而憔悴福不盈眦禍溢於世且功不可以虛成名不可以僞立韓設辨而徼君吕行詐以賈國說難既酋其身乃囚秦貨既貴厥宗亦墜方今大漢灑掃羣穢夷險芟荒廓帝紘恢皇綱基隆於羲農規廣於黃唐其君天下也炎之如日威之如神涵之如海養之如春譬猶草木之殖山林魚鳥之育川澤參天地而施化豈云人事之厚薄哉賔曰若夫鞅斯之倫既聞命矣敢問上古之士處身行道輔世成名可述於後者默而已乎主人曰何為其然也昔者咎繇謨虞箕子訪周言通帝王謀合聖神殷說夢發於傅巖周望兆動於渭濵皆俟命而神交匪詞言之所信故能建必然之冊展無窮之勳也若乃牙曠清耳於管絃離婁眇目於豪末逢蒙絶伎於弧矢班輸擢巧於斧斤僕亦不任厠伎於彼列故密邇自娛於斯文孔德璋北山移文周顒字彥倫隱北山後應詔出為海鹽令欲過北山孔稚圭假山神作文以却之鍾山之英草堂之靈馳煙驛路勒移山庭夫以耿介拔俗之標瀟灑出塵之想度白雪以方潔干青雲而直上吾方知之矣若夫亭亭物表皎皎霞外芥千金而不盻屣萬乘其如蛻聞鳳吹於洛浦值薪歌於延瀨固亦有焉豈有終始參差蒼黃翻覆淚翟子之悲慟朱公之哭乍回迹以心染或先貞而後黷何其謬哉嗚呼尚生不存仲氏既往山阿寂寥千載誰賞世有周子雋俗之士既文既博亦𤣥亦史然而學遁東魯顔闔習隱南郭子綦竊吹草堂濫中北嶽誘我松桂欺我雲壑雖假容於江臯乃櫻情於好爵其始至也將欲排巢父拉許由傲百氏蔑王侯風情張日霜氣橫秋或歌幽人長往或怨王孫不游談空空於釋部核𤣥𤣥於道流務光何足比㳙子不能儔及其鳴騶入谷鶴書赴隴形馳魄散志變神動爾乃眉軒席次袂聳筵上焚芰製而裂荷衣抗塵容而走俗狀風雲悽其𢃄憤石泉咽而下愴望林巒而有失顧草木而如喪至其紐金章綰墨綬跨屬城之雄冠百里之首張英風於海甸馳妙譽於浙右道帙長擯法筵久埋敲撲誼嚻犯其慮牒訴倥偬裝其懷琴歌既斷酒賦無續常綢繆於結課每紛綸於折獄籠張趙於往圖架卓魯於前籙希蹤三輔豪馳聲九州牧使我髙霞孤映明月獨舉青松落䕃白雲誰侶澗石摧絶無與歸石徑荒凉徒延佇至於還飇入幕寫霧出楹蕙帳空兮夜鶴怨山人去兮曉猿驚昔聞投簪逸海岸今見解蘭縛塵纓於是南嶽獻嘲北隴騰笑列壑爭譏攢峯竦誚慨游子之我欺悲無人以赴弔故其林慚無盡澗愧不歇秋桂遣風春蘿罷月騁西山之逸議馳東臯之素謁今又促裝下邑浪栧上京雖情投於魏闕或假步於山扄豈可使芳杜厚顔薜荔無恥碧嶺再辱丹崖重滓塵游躅於蕙路汙緑池以洗耳宜扄岫幌掩雲關斂輕霧藏鳴湍截來轅於谷口杜妄轡於郊端於是叢條瞋膽疊頴怒魄或飛柯以折輪乍低枝而掃迹請回俗士駕為君謝逋客詩集中靜初喧或紛爭丨丨惟嘲戲韓忘談一時供坐笑百怪變丨丨坡前言善保千金軀丨丨戲之耳坡談辭丨丨最詼諧發口如有神荆公古今合璧事類備要續集卷三十九
