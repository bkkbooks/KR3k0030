夙承景貺恭展上儀惟肹蠁之垂休乃紛綸而薦瑞宜增美號以報神休泰山天齊王修飾廟宇祭器又封威靈將軍為炳靈公令兖州加葺祠廟封太山酒泉廟為靈𣲖侯亭亭廟為廣禪侯兖州郡縣天山廟為靈巖侯各丨丨致丨丨賜額靈源衛州百門廟門之水出焉神靈所居貌像斯設凡所請禱答以勤誠宜丨丨曰丨丨加號金天豫鎮雄基河神逺迹主純隂而成物介西夏以奠方制不經塗崇蠻在望西嶽金天王宜丨丨順聖丨丨王遣鴻臚少卿裴莊詣祠致告進號顯聖四瀆之雄九河居要夙著浮沉之典式尊正直之神朕展采喬嶽致誠有吳爰厯宣房之地緬懷列聖之功宜丨丨丨丨靈源公遣左誎議大夫薛映往河中府比部員外郎丁顧言就澶州祭告加上帝號峻極之嶽上配圓穹聰直之神助司元化緬惟前代並建王封自祗陟於神房洎親祠於吉壤精一之心克協肹蠁之應沓臻惟彼嵩髙超於衡服爰暨朔庭之鎮實臨代北之區咸茂粹靈以綏黎獻是用昭升帝籙允答神功今丨丨東嶽曰天齊仁聖丨南嶽曰司天昭聖帝西嶽曰金天順聖帝北嶽曰安天元聖帝中嶽曰中天帝仍各遣告詣嶽祠致告擇日備禮奉册命翰林學士李宗諤龍圖直學士陳彭年與禮官詳定儀注加上后號列嶽奠方配天作鎮實憑幽贊至極欽崇其丨丨東嶽帝淑明丨南嶽帝景明后西嶽帝肅明后北嶽帝靖明后中嶽帝正明后之丨仍遣官祭告以懿號薦朕還衡汾壤舍爵大室鴻儀畢舉慶賜大行厯代之文靡有不講百神之祭靡有不崇上以答神禧下以楊盛則眷惟列嶽實輔柔祇設固一方盤根千里向者祼鬯寢園望嵩丘之峻極奉符鄒魯登名岱之鬱蒼祈榖魏雎涉大華之靈異恭丨丨丨丨于嶽神屈原歌湘君君不行兮夷猶蹇誰留兮中洲美要眇兮宜修沛吾乘兮桂舟令沅湘兮無波使江水兮安流望夫君兮歸來吹參差兮誰思駕飛龍兮北征邅吾道兮洞庭薜荔拍兮蕙綢承荃橈兮蘭旌望涔陽兮極浦橫大江兮揚靈揚靈兮未極女嬋媛兮為余大息橫流涕兮潺湲隱思君兮悱惻桂棹兮蘭栧斫氷兮積雪采薜荔兮水中搴芙蓉兮木末心不同兮媒勞恩不甚兮輕絶石瀨兮淺淺飛龍兮翩翩交不忠兮怨長期不信兮告余以不間朝騁騖兮江臯夕弭節兮北渚鳥次兮屋上水周兮堂下捐余玦兮江中遺余珮兮澧浦采芳洲兮杜若將以遺兮下女時不可兮再得聊逍遙兮容與屈原歌湘夫人帝子降兮北渚目眇眇兮愁豫嫋嫋分秋風洞庭波兮本葉下登白蘋兮騁望與佳期兮夕張鳥何萃兮蘋中罾何為兮木上沅有芷兮澧有蘭思公子兮未敢言慌忽兮逺觀觀流水兮潺湲麋何為兮庭中蛟何為水裔朝馳余焉兮江臯夕濟兮西澨聞佳人兮召余將騰駕兮偕堂逝築室兮水中茸之以荷蓋荃璧兮紫壇播芳椒兮成桂棟兮蘭橑辛夷楣兮藥房罔薜荔兮為帷劈蕙榜兮夕張白玉兮為鎮疏石蘭兮以為芳芷葺兮荷屋繚之兮杜蘅合百草兮實庭建芳馨兮廡門九疑繽兮並迎靈之來兮如雲捐余𬒮兮江中遺余褋兮澧浦搴汀州兮杜若將以遺兮逺渚時不可兮驟得聊逍遙兮容與韓愈黃陵廟碑湘旁有廟曰黃陵自前古立以祠堯之二女舜二妃者庭有石碑斷裂分散在地其文剝缺考圖記言漢荆州收劉表景升之立題曰湘夫人碑今驗其文乃晉太康九年又其額曰虞帝之二妃之碑非景升立者秦博士對始皇帝云湘君者堯二女舜妃者也劉向鄭玄亦皆以二妃為湘君而離者騷九歌既有湘君又有湘夫入王逸之解以為湘君自其水神而謂湘夫人乃二妃也從舜南征三苖不及遒死沅湘之間山海經曰洞庭之山帝之二女居之郭璞疑二女者帝舜之后不當降小水為其夫人因以二女為天帝之女以余考之璞與王逸俱失也堯之長女娥皇為舜正妃故曰君其二女女英自宜降曰夫人也故九歌辭謂娥皇為君謂女英帝子各以其盛者推言之也禮有小君君母明其正自得稱君也書曰舜陟方乃死傳謂舜升道南方以死或又曰舜死葬蒼梧二妃從之不及溺死沅湘之間余謂竹書紀年帝王之沒皆曰陟陟升也謂升夭也書曰殷禮陟配天言以道終其德協天也書紀舜之沒云陟者與竹書周書同文也其下言方乃死者所以釋陟為死也地之勢東南下如言舜南巡而死宜言下方不得言陟方也以此謂舜死葬蒼梧於時二妃從之不及而溺者皆不可信二妃既曰以謀語舜脫舜之厄成舜之聖堯死而舜有天下為天子二妃之力宜常為神食民之祭今之渡湖江者莫敢不進禮廟下元和十四年春余以言事得罪黜為潮之刺史其地於漢南海之揭陽厲毒所聚懼不得脫死過廟而禱之其冬移袁州刺史明年九月拜國子祭酒使以私錢十萬抵嶽州願易廟之圯桷腐瓦於刺史王堪長慶元年刺史張愈自京師往與愈故善謂曰丐我一碑石載二妃廟事且令後世知有子名愈曰諾既至州報曰碑謹具遂篆其事俾刻之劉秩祭大濟文惟神泉源清潔浸彼遐逺播通四氣作紀一方玄冬肇節聿修典物韓愈南海神廟碑海於天地間為物最巨自三代聖王莫不祀事考於傳記而南海祠次最貴在北東西三神河伯之上號為祝融天寶中天子以為古爵莫貴於公侯故海嶽之祝犧幣之數放而依之所以致崇極於大神今王亦爵也而禮海嶽尚循公侯之事虛王儀而不用非致崇極之意也由是册尊南海神為廣利王祝號祭式與次俱升因其故廟易而新之在今廣州治之東南海道八十里扶胥之口黃木之灣常以立夏氣至命廣州刺史行事祠下事訖驛聞而刺史常節度五嶺諸軍仍觀察其郡邑於南方事無所不統地大以逺故常選用重人既貴而富且不習海事又當祀時海常多大風將往皆憂戚既進觀顧怖悸故常以疾為解而委事於其副其來已久故明宫齋廬上雨旁風無所蓋障牲酒瘠酸取具臨時水陸之品狼藉籩豆薦祼興俯不中儀式吏酒不供神不顧享盲風怪雨發作無節人蒙其害元和十二年始詔用前尚書左丞國子祭酒魯國孔公為廣州刺史兼御史大夫以殿南服公正直方嚴中心樂易祗慎所職治人以明事神以誠內外殫盡不為表襮至州之明年將夏祝册自京師至吏以時告公乃齋祓視册誓羣有司曰册有皇帝名乃上所自署其文曰嗣天子某謹遣官某敬祭其恭且嚴如是敢有不承明日吾將宿廟下以供晨事明日吏以風雨白不聽於是州府文武吏士凡百數交謁更諫皆揖而退公遂升舟風雨少弛棹夫奏功雲隂解駮日光穿漏波伏不興省牲之夕載暘載隂將事之夜天地開除月星明穊五鼓既作牽牛正中公乃盛服執笏以入即事文武賓屬俯首聽位各執其職牲肥酒香樽爵靜潔降登有數神具醉飽海之百靈祕怪荒忽畢出蜿蜿蛇蛇來享飲食闔廟旋艫祥飈送帆旗纛旄麾飛揚暗藹鐃鼓嘲轟髙管噭噪武夫奮棹工師唱和穹龜長魚踊躍後先乾端坤倪軒豁呈露祀之之嵗風災熄滅人厭魚蟹五穀胥熟明年祀歸又廣廟宫而大之治其庭壇改作東西兩序齋庖之房百用具修明年其時公又固往不懈益虔嵗仍大和耋艾歌詠始公之至盡除他名之稅罷衣食於官之可去者四方之使不以資交以身為帥燕享有時賞與以節公藏私畜上下與足於是免屬州負逋之緡錢草有四萬米三萬二千斛賦金之州耗金一歲八百困不能償皆以丐之加西南守長之俸誅其尤無良不聽令者由是皆自重慎法人士之落南不能歸者與流徙之胄百草八族用其才良而廩其無告者其女子可嫁與之錢財令無失時刑德並流方地數千里不識盜賊山行海宿不擇處所事神治人其可謂備至也矣咸願刻廟石以著厥美而繫以詩乃作詩曰南海隂墟祝融之宅即祀于旁帝命南伯吏惰不恭正自今公明用享錫右我家邦惟明天子惟慎厥使我公在官人人致喜海嶺之陬既足既濡胡不均𢎞俾執事樞公行勿遲公無遽歸匪我私公神人具依柳宗元終南祠堂碑貞元十二年夏洎秋不雨穡人焦勞嘉穀用虞皇帝使中謁者禱于終南申命京兆尹韓府君祗飾祀事考視祠制以為楝宇不稱宜有加飾遂命盩厔令裴均虔承聖謨創制祠堂乃徵土工木工石工備器執用來會祠下斬板幹礱柱礎陶㼨甓築垣墉恢度舊制立三筵六尋既興功玄雲觸石霈澤周被植物擢茂期于豐登神道感而宣靈人心勸而致和喜氣充溢抃蹈布野於是邑令僚吏至于胥徒黃髮耆艾野夫版尹僉曰蓋聞名山之列天下也其有能奠方域産財用興雲雨考于祭法宜在祀典惟終南據天之中在都之南西至于褒斜又西至隴首以臨于戎東至于商顔又東至于太華以距于關實能作固以屏王室其物産之厚器用之出則璆琳琅玕夏書載焉紀堂條枚秦風詠焉今其神又能對于禱祝化荒為穰易沴為和厥功章明宜受大禮俾有憑託而宣其烈也非我后敬神重穀則曷能發大號尊明靈非我公勤人奉上則曷能對休命作新廟人事既備神用時若豐我公田遂及我私粢盛無虞儲峙用充厥猷茂哉遂相與東向蹈舞拜手稽首願頌帝力且宣神得永著終古辭曰皇帝垂德制定統極神道泰寧祀典修飾禳祈禜雩皆有準程顧惟終南祠位庳陋不稱顯名爰降制詔充大厥宇啓寤誠明昭感神衷道宣天休獲此利負篤災愆陽化為豐穰實我粢盛人賴蓄給鼓腹而歌以樂其生巍巍靈山興利産財作固鎬京擁其嘉休眷佑于人永宅厥靈奕奕新廟整頓端莊神位密清後祀承則潔心勤禮導暢純精邑吏嗇夫鮐背鯢齒願垂表經頌宣聖德篆刻金石永世飛聲柳宗元湘源妃廟碑元和九年八月二十日湘源二妃廟災司功掾守令彭城劉知剛主簿安邑衛之武告于州刺史御史中丞清河崔公能祗栗厥戒會羣吏洎衆工發開元詔書懼廢守祀搜考贏羡均節委積咸執牘聿至于祠下稽度既備傭役惟時斬木于上遊陶埴于水涯乃桴乃載工逸事遂作貌顯嚴餐然而威十有一月庚辰陳奠薦辭立石于廟門之宇下惟父子夫婦人道之大大哉二神咸極其會為子而父堯為婦而夫舜齊聖並明弼成授受內若嚚瞽上承輝光克艱以乂德罔不至帝既野死神亦不返食于兹川古有常典驅祓戾孽恢宣淑靈敢或失職以姦天刑有翼其躬有苾其馨沈牲爰告即石是銘銘曰淵懿承聖舜妻堯女德刑媯汭神位湘滸揆兹有初充碩厥宇唐命秩祀兹邑攸主毛牲既疈椒馨爰糈胤子萬年期保伊祐潛火煽孽炖于融風神用播遷時罔克龔邑令羣吏告于君公廉用積餘以就爾功桴木負埴載流于江既夷以成崇宇峻庸潔嚴清間左右率從神樂來歸徒御雍雍神既安止邦人載喜奉其吉玉以對嘉祉南風湑湑湘水如舞將子無歡神聽鍾鼓豐其交報邦邑是與刻此樂歌以極終古歐陽公先河後海賦在祭者必有常典務本者貴乎不忘既先河而告備乃後海以為常幣玉始陳恭視諸侯之瀆牲牢繼列方祠百谷之王探國典之舊文撫禮經之大者以謂河導其𣲖本一勺而始矣海納其會實百川之委也祀容肅設必先有事于靈長望秩並修然後功歸於善下誠以決九川而分導括衆流而混并一則窮本而有自一則兼容而積成是用分禮章而異數昭祭典以推行命祀首陳始則出圖之所祝辭以設方祈紀地之名用能縟乃令儀昭夫重祭利萬物以斯善用五材而並濟無文既秩榮經瀆以領祠羣望既行禱朝宗而用幣外則盡物中惟告虔既義取于源委乃禮分於後先一禱致誠必告榮光之祖大川並走嗣臨重潤之淵得非衆嶽肇乎一拳推輪生乎五輅考厥初之攸在彰返始而為務亦猶文王之祀雖貴不踰后稷之尊齊人之事將行敢起配林之故是知河必居首取發源而肇兹海不自大由積衆以成其導洪流而並注散靈潤以旁滋顧乃濫觴之因必有先也視爾委輸之廣後然從之異哉祭尚潔誠禮惟思反將展報以為義必討源而自逺故夫三王之祭川必務其本朱文公乞修禮書狀據禮諸侯祭名山大川之在其境內者又曰山川之神水旱疫厲之災於是乎崇之蓋也以其崇高深廣能出雲氣為風雨以滋養潤澤乎一方今州郡封域不減占之諸侯而封內名山大川未有望祭之禮其有祠廟亦是民間所立淫誣鄙野非復古制顧乃舍其崇髙深廣能出雲雨之實而傴僂拜伏於土木偶人之前以求其所謂滋養潤澤者於義既無所當又其牲牢器服一切循用流俗褻味燕器於禮又無所稽至於有山川而無祠廟者其歲時祈禱遂不復禜於山川而反求諸異教淫祠之鬼此則先無義理而習俗相承莫知其謬欲乞檢照五禮新儀如已有祭山川禮即與編類行下如有遺闕亦乞討論依於祭社儀禮立定時日壇場方位制度并賜行下詩集秩禮自百王炊吸領地靈鴻洞半炎方南嶽配朱鳥丨丨丨丨丨祝融五峯尊峯峯次低昂紫蓋獨不朝爭長業相望恭聞魏夫人羣仙來翺翔有時五峯氣散風如飛霜杜望嶽古今合璧事類備要外集卷五
