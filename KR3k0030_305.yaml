body:
  text: 古今合璧事類備要外集卷五宋謝維新撰祭祀門祭社稷禮經考索敢問社稷何神曰土穀之神也人非土不立非穀不生祀之所以報本反始也按祭法厲山氏之子曰農能殖百穀夏之衰周棄繼之故祀以為稷共工氏之子曰后土能平九州故祀以為社愚以為非后土農棄之為社與稷也亦以其為有功於土穀特配之食焉爾是則祀社稷之始厯代至今不廢者也然社稷之神一也社壇在東稷壇在西俱北面自天子至郡縣下逮庶人莫不通祭在國曰太社國社王社侯社在官曰官社稷在民曰民社唯天子之社則以五色土各依方色為壇且廣五丈中央數尺冒以黃土諸侯但用當方之色皆立樹以表其處仍别立主以象其神大夫以下則各以地所宜木而立之也此尊卑上下之等也若國有事則以君行祝奉社主以從其名曰軍社國之亡也則屋之使不受天陽其名曰亡國之社此又出入存亡之别也然古者諸侯危社稷則當變置賢君毋使乏祀及犧牲既成粢盛既潔祭祀以時然而旱乾水溢則社稷又不得不為之變置也此所以論古者社稷之大槩也天子諸侯大夫祭禮未暇論今考近代諸里祭儀則前一日社正及諸社人應社者各請齋一日於家正寢應設饌之家先修治神樹之下又為瘞坎於神樹之北座取足容於物掌事者設社正位於稷深西北十步東面諸社人位於其後東西南上設祝奉血豆位於瘞坎之北南面祭器每座尊酒二并勺一以巾覆爼一籩二豆二爵二簠二簋二祭日未明三刻烹牲於厨夙興掌饌者實祭器掌事者以席入設社神之席於神樹之下稷神之席於神樹之西俱北面質明社以下各服其服社正以下皆再拜祝進跪讀祝文曰維年月日某坊社正姓名合社若干人等敢昭告于太社維神載育黎元長兹庶物時屬仲月日維吉戊謹率常禮恭用特牲稷神云太稷維神功協稼穯闡修農政允兹從祀用率舊章上饗云考論至此因怪今人祀社之意殊薄率爾而聚倐爾而散第與醵飲無異求其如近代之禮影響不存又責之以報本反始如古人之祭胡可得也此古人之所以年穀屢豐而今人之所以飢饉荐臻旱乾水溢之間作也又得不思其故乎事類元日仲春擇丨丨命民社注元日謂二分前後戊日記地利先王祀社於國所以别地利也故禮行於社而百貨可殖焉用甲日丨丨用日之始也並記惟戊吉日丨丨注戊日社詩春祈載芟丨籍田而丨社稷也秋報良耜丨丨社稷也並詩泰社王自立社曰丨丨記國社諸侯為國立社曰丨丨侯社侯自立社曰丨丨置社大夫以下成羣立社曰丨丨達氣天子大社必受霜露風雨以丨天地之丨是故喪國之社屋不受天陽也注絶其陽通其隂獻功丨丨于社並記南嚮社祭土而主隂氣也君丨丨於北牖下答隂之義北牗亳社丨丨使隂明也又見上國右凡建丨丨社稷軍行設丨社奉以丨並記田祖以御丨丨又田祖有神詩田主設社稷之壝而樹之丨丨周禮田正后土社稷丨丨也記又稷田正也左血祭以丨丨祭社稷禮犧齊制幣丨丨粢盛庶品注並祭祀之物祈農祥仲春注祀社稷春土興故祀之丨丨丨也賽秋成仲秋注丨丨丨也神地道社所以丨丨之丨也地載萬物天垂象取財於地取法於天是以尊天親地故教民美報焉報地功所以報本反始天子用事於社注丨丨丨也並記五祀本社稷丨丨之丨左傳五色土海岱及淮惟徐州云云厥貢惟土五色注王者封丨丨丨為社建諸侯則各割其方色土與之使立社燾以黃土苴以白茅茅取其潔黃取王者覆四方書戮于社弗用命丨丨丨甘誓遷其社湯勝夏欲丨丨丨不可作夏社注言夏之社不可遷湯誓立冢土綿文王之興本由太王也云云應門將將乃丨丨丨戎醜攸行注冢土大社也起大事動大衆必先有事乎社而後出謂之冝美太王之社遂為大社箋云大社者出大衆將所告而行也詩冝冢土武王豫小子夙夜祗懼云云丨于丨丨以爾有衆底天之罰注祭社曰宜冢土社也詩用太牢成王改宅洛邑云云越翼日戊午乃社于新邑牛一羊一豕一注告立社稷之位丨丨丨也共工氏子曰勾龍能平水土祀以為社周祖后稷能殖百穀祀以為稷社稷共牢書卜來嵗社之日涖丨丨丨之稼禮祭亳社平子伐莒取郊獻俘始用人於亳社注以人祭殷社左昭十盟周社陽虎又盟公及三桓於周社盟國人于亳社定七搜軍實魯莊公如齊觀社注齊因祭社丨丨丨故往觀之祭妖神宋公使邾文公用鄫子于次睢之社欲以屬東夷注睢水受汴東經陳留梁譙沛彭城縣入泗此水次有妖神東夷皆社祠之蓋殺人而用祭並左祓社釁鼓晉將會衛衛使祝他從辭曰云云且夫祝社稷之常𨽻也社稷不動祝不出竟官之制也君以軍行丨丨丨丨祝奉以從於是乎出竟注師出先有事祓禱於社謂之宜社於是殺牲以血塗鼓鼙為釁鼓祝奉社主也左定四年祭社歸脤天王使石尚歸脤注脤祭社之肉盛以脤器以賜同姓與之共福定十四鳥鳴于亳丨丨丨丨社如曰噫噫甲午宋大災襄三十社以松柏哀公問丨於宰我對曰夏后氏丨丨殷人以丨周人以罙語社治枌榆髙祖初起禱豐枌榆丨四年詔御史丨丨丨社漢書變置社稷孟子曰民為貴社稷次之云云諸侯危社稷則變置犧牲既成粢盛既潔祭祀以時然而旱乾水溢則丨丨丨丨盡心下除立社稷漢髙帝二年丨秦社稷丨漢丨丨本紀邑皆立祠漢髙祖入關或言周興而丨丨丨后稷之丨至今血食天下於是髙祖制詔御史其令天下立靈星祠常以歲時祠以牛注有播種功令天下邑皆祠之龍星左角曰天田則農祥也郊祀志里各自裁髙祖十年春有司請令縣常以春二月及臘祠稷以羊彘民丨社丨丨丨以祠制曰可注隨祠具之豐儉平分肉均陳平里中社丨為宰丨丨甚丨朔懷肉出東方朔伏日詔賜從官肉太官承旨日晏不來丨獨拔劍割肉謂其同官曰社日當蚤歸請受晹即丨丨丨本傳作欒公社燕為欒布作社白帖立石相社石慶為齊相舉國皆慕其家行不言而大治為丨丨丨丨縣為公社漢髙令丨丨丨丨有司請言縣常以春二月及臘祠社稷以羊牛四事食配官稷漢龔遂於官社稷以夏禹配丨官社稷丨丨丨丨者配食縣社甄子然孝行早卒北海相孔融恨不及之言丨丨丨丨又陵雲為浚儀令去官百姓追思之圖畫形象丨丨丨丨本傳配食郡社宋登叔陽為汝隂令號神父遷潁川守市無二價路不拾遺汝隂人配食於社本傳取錢為供魏邴原根矩拾遺錢繫於樹因而繫之者逾多原惡其惑衆明日乃丨丨以丨社丨也孔六帖伐樹則移晉阮修宣子伐社樹或止之曰若社而為樹丨丨丨社丨樹而為社伐樹則社亡矣孔白六帖應嫗揮金中興初有丨丨者生四子晝見神光照社試丨之乃得黃丨自是諸子宦學皆有才名搜神記賀瑀取劒丨丨死三日蘇云上天入官府典房有印有劎使瑀唯意取之瑀丨丨出門下問云何得云得劒曰唯使社公耳録異傳鄰為罷社魏王修母以社日亡丨里丨為丨丨三國志里為立社崔郾民即其丨丨丨德星丨白氏帖以戊日祭大唐社稷亦於含光門內之右丨仲春仲秋二時丨丨丨太社太稷禮神之王蓋用兩圭有邸其特玉制云天子祭社稷皆太牢諸侯少牢皆黝色用黑幣日用甲祭日之晨王及尸皆服絺冕通典以吉亥祠韋叔夏張齊賢乃奏言經無先農壇禮曰王自為立社曰王社先儒以為在籍田也永徽中猶曰籍田垂拱後乃為先農然則先農與社惟一神今先農壇請改曰帝社壇以合古王社之義其祭準令丨孟春丨丨丨后土以勾禮氏配於是為帝社壇又立帝稷壇於西如太社太稷而壇不設方色以異於太社唐禮志文琮下教張文琮出為建州刺史州尚淫祀不立社稷丨丨丨丨曰春秋二社本於農今此州廢不立尚何觀比嵗田畝卒荒或未之思乎神在于敬可以致福於是始建祀場民恱從之孔氏六帖曹植社頌於惟大社官名后土是曰勾龍功著上古德配帝皇實為靈生克明播殖農政曰社尊以作稷豐年是與義與社同方神此宇牛𢎞社歌厚地間靈方壇崇祀建以風露樹之松梓勾萌既申芟柞伊始恭祈粢盛水膺休祉牛𢎞稷歌穀食興教播厥有先尊神致潔報本惟虔云云何承天社頌社實隂祗稷惟穀先伯德方將時號共工厥有才子實曰勾龍陶唐救災決河疏江棄以播殖作乂萬邦克配二祀以報勳庸韓文公送楊少尹古之所謂鄉先生沒而可祭於社者其在斯人乎詩集分胙折爼丨歸丨陳叔達同宴願為丨社人雞豚丨春秋韓愈散香萁椒蘭平酒酌簠簋丨丨丨陳叔達禮社嘗春酒步屧隨春風村村自花栁曰翁逼社日邀我丨丨丨杜甫敬逾齊國丨丨丨丨社柳宗元尚想東方九農成德業百祀發光輝報效神如在馨香舊不違南翁巴曲醉北鴈塞聲微丨丨丨丨朔詼諧割肉歸杜甫古基址在丨社丨丨丨人散社不神元稹古禮祭山川禮經考索自有天地即有山川古者四方山林川谷丘陵墳衍原隰能出雲為風雨見怪物者皆曰神民之財用於是乎取辦者非此族不在祀典是則祀之不可闕者也有天下者秩而祭之嵗遍及焉諸侯則惟及其在封內者非其地則不祭是亦崇德報功之義與尊卑上下之差也今考其禮祭山林丘陵於四壇也祭川谷水泉於四坎也牲殺不同也圭幣各異也五嶽視三公四瀆視諸侯其餘莫不冇差也壇者霾之坎者沈之蓋以隂陽出入升降於地中皆順其性以含藏之也禮以義而起古人豈茍乎哉是禮也六經以前無間也自舜望秩于山川厯數千百年未之有改爰自秦人不師古始罷侯置守而後此禮浸廢惟於郊祀明堂僅見望祭焉及漢魏間則又遣官攝事至若守令或有水旱祈禱亦許通祭較以古禮非存一二於十百而然歟嗚呼舜其衰矣事類嵗遍天子祭山川丨丨諸侯方祀祭山川丨丨記曲禮方望天子有丨丨之事無所不通諸侯山川有不在其封內者則不祭公羊僖三十一年嶽瀆天子祭天下名山大川五丨視三公四丨視諸侯諸侯祭在其地者天子諸侯祭因國之在其地而無主後者記王制丘陵山林川谷取丨丨民所財用也非此族也不在祀典注山林川谷丨丨能出雲為風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭記祭法霾沈以丨丨祭山川周禮皮懸祭山曰丨丨爾雅望秩丨丨于山川告至至于岱宗柴注岱宗泰山也柴燎丨丨也旅祭蔡蒙旅平注蔡蒙二山名祭山曰旅又荆岐既旅注已丨丨言治功畢又九山刋旅注刋除其林木而旅祭之奠祭丨髙山大川注奠丨也莫不寧山川鬼神亦丨丨丨秩無文咸丨丨丨注言周始修祀于新邑咸次第祀之不在禮文者亦祀之告所過武王丨皇天后土丨丨名山大川並書河謂已楚子玉自為瓊辨玉纓未之服也先戰夢丨神丨丨曰畀余余賜汝孟諸之麋弗致也其子大心與子西使榮黃諫弗聽榮季曰死而利國猶或為之况瓊玉乎是糞土也而可以濟師將何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也左僖二十八年河為祟楚昭王有疾卜曰丨丨丨王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪也遂弗祭哀六年史莫之知晉侯有疾鄭伯使公孫僑如昔聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟丨丨丨丨敢問此何神也子産曰昔髙辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日相征討后帝不臧遷閼伯於商丘主辰商人是因故辰為商星遷實沈于大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑薑方震太叔夢帝謂已余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封太叔焉故參為