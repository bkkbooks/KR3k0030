body:
  text: 古今合璧事類備要别集卷八十一宋謝維新撰畜産門馬格物總論馬武獸種族最繁􅀈音步青馬騥青驪繁鬛馬駽胡見反青驪馬今之鐵驄驄青白雜毛馬􅀈音朱朱色馬騟音俞紫色馬驪與騮者皆赤馬黑鬛騢赭白色似蝦魚騂赤黃馬鐡馬如鐡赤黑色騧黃脊黑喙馬駓黃白色馬今之桃華騽與驔驪馬黃脊騝騮馬黃脊驙白馬黑脊􅗬䮕皆馬白額驈驪馬白􅀈駱白馬黑鬛駰白馬黑隂今之泥驄䮗白額至唇馰顙白額馬騵騮馬白腹駂驪白雜色今之烏驄驓馬四駮皆白騚四蹄皆白馵馬後左足白騴馬尾本白駩白馬黑唇䮤白額馬􅀈音劬馬後足皆白駺􅀈尾白馬騅蒼白雜毛色馬􅀈乎間反馬一目白驪深黑色騩京媚反淺黑色􅀢亦黑色馬駹黑馬白面驎馬黑唇駯音馬口黑凡此類者皆以色别之也其他曰騄駬曰纎􅀈曰驌騻曰騕裊曰驊騮曰駃騠曰飛黃曰􅀈駼皆古之駿馬名也駑駘款假皆馬之鈍者也驢又一種似馬長耳生子曰􅐒曰􅀈騾驢父馬母駃騠馬父驢母馲􅦢驢父牛母所生子也駃騠生七日超其母駱驒又自一種有肉鞍駒馬事類八尺凡馬丨丨以上者為龍七尺以上為騋六尺為馬周官八歲馬一歲為馬二歲為駒丨丨為􅦩何承天纂文祭祖春丨馬丨注天駟祭牧夏丨先丨注始養馬者馬祖秋祭丨丨注始乘馬者馬步冬祭丨丨注為災害者並周官似狐乘黃亦名飛黃丨丨有五肉角如龍馬丨遊丨後皇后紀良馬驊騮騏驥纎離騄駬古之丨丨也荀子駿馬龍媒騕裊並丨丨名羸馬駑駘欵假並丨丨名並六帖奔踶馬或丨丨而致千里漢武帝紀局促何乃丨丨如轅下駒漢書泛駕夫丨丨之馬亦在御之而已武帝詔伏櫪老驥丨丨志在千里選樂府乘馬黃帝堯舜服牛丨丨引重致逺以利天下歸馬武王丨丨華山之陽書八名駿穆王巡行天下馭八龍之駿一名絶地足不踐土二名翻羽行越飛禽三名奔宵夜行萬里四名超影逐日而行五名踰輝毛色炳耀六名超光一形十影七名騰霧乘雲而行丨丨挂翼身有肉翅拾遺記七名馬秦皇有名馬七追風白兔躡景追電飛翮銅爵晨鳬古今注馬四匹平王錫晉文侯丨丨丨書文侯之命牝三千衛文公秉心塞淵騋丨丨丨詩食我場白駒刺宣王也皎皎白駒丨丨丨苗詩牧于野駉頌僖公也駉駉牧馬云云丨丨坰丨詩智可用齊桓公伐孤竹春往冬還迷惑失道管仲曰老馬之丨丨丨乃放老馬而隨之遂得道韓子力已窮定公問於顔淵曰東野子之善御乎顔淵曰善則善矣雖然其馬將失定公曰何以知之顔淵曰臣以故知之昔造父巧於使馬造父不窮其馬是造父無失馬也今東野畢之馭上車執轡御體正矣步驟馳騁朝禮畢矣歷歷致逺馬力盡矣然有求馬不丨是以知之矣荀子借人乘子曰吾猶及史之闕文也有馬者丨丨丨今亡矣夫語使人養齊景公丨丨丨所愛馬馬病死公怒令人殺養馬者晏子請數之曰爾有三罪使汝養馬殺之一當死也又殺公所最善馬二當死也使公以一馬之故而殺人百姓必怨諸侯輕伐吾國三當死也公喟然赦之失左驂秦穆公東敗丨丨丨自往求馬見岐下野人殺馬將食之穆公笑曰食駿馬肉而不飲酒恐其傷性也遍飲之而後去後聞秦擊晉皆從摧鋒以報德方臯相秦穆公謂伯樂曰子之年長矣子姓有可求馬對曰良馬可以形容筋骨相也天下之馬若滅若沒若亡若失臣之子皆下才也臣有所與九丨丨其於馬非臣之比也穆公見之使行求馬三月而反報曰己得之在沙丘穆公曰何馬對曰牝而黃使人往取之牡而驪公不恱召伯樂曰敗矣子之所求馬者色物牝牡不能知又何馬之能知也伯樂曰若臯之所觀天機也得其精而忘其粗在其內而忘其外馬至果天下之良馬也列子伯樂顧蘇代欲見齊王齊王怨蘇秦欲用蘇代不說見代乃說淳于髠曰人有賣駿馬者比三旦立於市人莫與言及見丨丨還而視之去而丨之一旦而價十倍足下有意為臣伯樂乎春秋後語優孟哭楚莊王有愛馬衣以文繡置華屋下席以露牀啖以棗脯馬死欲以大夫禮葬之樂人丨丨入殿門大丨曰請以君禮葬之以雕玉為鞍文梓為槨豫章為題湊發甲卒為壙老弱負土諸侯聞之皆知賤人而貴馬也王曰為之奈何曰請為王言六畜之葬籠竈為之槨銅瀝為之棺齊以薑桂薦以木蘭衣以火光葬人腹中王乃以馬屬太官無令天下知聞也史塞翁失丨上之人其馬亡入胡中人皆弔之其父曰此何詎知不為福居數月其馬將胡駿馬而歸人皆賀之其父曰此何詎知不為禍家富馬良其子好騎墮而折髀人皆弔之其父曰此何詎知不為福居一年胡夷大入丁狀者皆控弦而戰塞上之人死者十九此子獨以跛故子父相保淮南子五百金郭隗謂燕昭王曰古之人君遣使者齎千金市千里馬於他國未至馬已死買其骨丨丨丨以歸天下知其君之好也於是朞年而千里之馬至者三焉王誠欲致士先從隗始隗且見事況賢於隗者乎戰國䇿一匹練顔回望吳門馬見丨丨丨孔子曰馬也然則馬之光景一匹長耳故後人號馬為一匹家語不問馬廄焚子退朝曰傷人乎丨丨丨語十此何馬田子方出見老馬於野喟然有志問於儒者曰丨丨丨也御者曰故公家畜也罷而不為用故出放之田子方曰少盡其力而老棄其身仁者不為也束帛贖之窮士聞之知所歸心焉韓詩外傳不食粟季文子相魯馬丨丨丨左王良御昔者趙簡子使丨丨與嬖奚乘終日而不獲一禽嬖奚反命曰天下之賤工也或以告王良王良曰請復之強而後可一朝而獲十禽嬖奚反命曰天下之良工也簡子曰我使掌與女乘謂王良良不可曰吾為之範我馳驅終日不獲一為之詭遇一朝而獲十禽詩云不失其馳舍矢如破我不貫與小人乘請辭孟子韓哀附駕囓膝驂乘且王良執靶丨丨輿縱馳騁騖匆如景靡過都歷國蹶如歷塊追奔電逐遺風周流八極萬里一息人馬相得也王褒頌千里騅項羽駿馬名騅常騎及敗於垓下乃歌曰時不利兮騅不逝及至烏江謂亭長曰吾騎此馬五歲所當無敵嘗一日丨丨不忍殺以賜公本傳千里馬孝文皇帝時有獻丨丨丨者詔曰鸞旗在前屬車在後日行五十里朕乘丨丨丨獨先安之於是還馬生余吾元狩二年馬丨丨丨水中生渥窪元鼎四年馬丨丨丨水中大宛馬丨丨冇善丨有二師城匿不肯與漢使天子既好宛馬使壯士持千金以請宛王善馬宛國饒漢物相與謀不肯與漢使怒妄言推金而去宛貴人怒攻漢使取財物天子大怒拜李廣利為二師將軍發屬國騎及郡縣惡少年數萬人以伐宛期至二師城取善馬至廟下韋𤣥成以列侯侍祀當晨入朝天雨淖不駕四馬而騎馬丨丨丨有司劾之數人皆削爵詣府送卓茂為丞相史事孔光嘗出行有人認其馬茂解與之曰若非公馬幸至丞相府歸我乃步挽車去後馬主得亡者乃丨丨丨馬乘驄馬桓典為御史是時宦者執政典無所回避嘗丨丨丨京師畏憚為之語曰行行且止避驄馬御史乘白馬漢張湛為光祿勳帝臨朝或有惰容湛輒諫其失常丨丨丨上每見湛輒言曰白馬生且復諫矣騎黃馬曹操與吕布軍戰敗布得操騎而不知是操問曰曹使君何在答曰丨丨丨者是也因得免獻帝春秋張敞走丨丨為京兆尹罷朝丨馬章臺街自以便面拊馬注便面若今沙門持竹扇不欲人見之也言敞無威儀也梁王墮丨丨丨馬賈生自傷為傳無狀常哭泣後歲餘而死御欵段馬援擊交趾謂官屬曰從弟少遊常哀吾多大志曰士生一世但取衣食足乘下澤車丨丨丨馬為郡吏守墳墓鄉里稱善人斯可矣求盆贏餘但自苦爾謂的顱劉備之初奔劉表屯於樊城左右欲因會取備備覺如厠便御所乘馬走墮襄陽城西檀溪水中滿不得出備急丨丨丨曰今日急不可不努力的顱達備意一踊三丈得過世說權躍馬孫權征合淝馬上津橋橋已撤丈餘無板丨丨丨超之獲免堅墜馬孫丨討董卓失利被創丨丨卧草中軍衆分散馬還營號呼軍人隨馬至草中乃得堅扶還營不利主庾亮所乘馬名的顱殷浩以為丨丨丨勸亮賣之亮曰豈有己之不安而移之他人恐傷人庾嶷遁世不仕牛馬有踶囓者丨丨丨不鬻於市郭璞活馬將軍趙固良馬死惜之丨丨求謁吏不為通璞曰吾能丨丨因出見之乃令三十人持竿東行三十里見丘林社廟以竹竿打樹果得一物似玃持歸此物見死馬噓吸其鼻中頃之馬果起奮迅如故不復見前物續搜神記支遁養馬丨丨字道林嘗丨丨人有譏之者答曰愛其神駿聊復畜耳世說羊祜折臂丨丨叔子人見其先墓當受命者祜斷其山岡相者曰雖斷其岡猶有折臂三公俄而墜馬丨丨後位至三公魏文囓膝宋建平善相馬丨丨將出取馬入建平曰此馬今日死矣及入將乘馬惡香丨帝丨帝怒遣使殺之馬惜障泥王濟乘馬不肯渡水曰丨必是丨連乾丨丨去之乃渡水杜預曰濟有馬癖馬行蟻封牛亨問見蟻門注萬歲馴字唐新造坊於赤岸澤僅得牝牡三千匹命太僕張丨丨傍隴右丨丨之四十年孳育成七十萬六千匹後邠岐等四境分為八坊五在岐州餘在三郡有保樂甘露等坊文粹毛仲牧蓄王丨丨高麗人於丨事尤力蕃息不資從帝東封取丨馬數萬匹每色一隊相間如錦繡天子才之一鳴則黜李林甫居相位凡十九年固寵市權諫官無敢言者謂補闕杜暹曰君等獨不見立仗馬乎終日無聲而飫三品芻豆丨丨丨丨之矣談賔録半道必易安祿山肥每乘驛入朝丨丨丨丨馬號大夫換馬臺不爾馬輒仆故馬必能負五石馳者乃勝載公綽殺馬栁丨丨廄馬害圉人公綽丨之或言良丨可愛曰安有良馬而害人乎承嗣斃馬𤣥宗教舞馬四百蹄分為左右部有名稱曰某家驕其曲曰頃杯樂數十馬皆衣以錦繡絡以金鐸每樂作奮首鼓尾縱橫應節祿山取數十匹歸范陽後為田丨丨所得不知其伎也一日大饗樂作馬聞樂而舞廄人以為妖擊之而丨焉明皇雜録前身作馬奚官養馬之役者劉三復能說三生事自云丨丨丨丨馬渴則望驛而嘶傷蹄則連心痛武帝天馬歌太乙貺兮天馬下霑赤汗兮沫流赭志俶儻兮精權竒籋浮雲兮䁆上馳體容與兮迣萬里今安匹兮龍為友漢武帝神馬歌天馬來從西極涉流沙九夷服天馬來歷無草徑千里循東道天馬來開逺門竦子身逝崑崙天馬來龍之媒遊閶闔觀玉臺韓愈雜說世有伯樂然後有千里馬千里馬常有而伯樂不常有故雖有名馬祗辱於奴𨽻人之手駢死於槽櫪之間不以千里稱也馬之千里者一食或盡粟一石食馬者不知其能千里而食也是馬雖有千里之能食不飽力不足材美不外見欲與常馬等不可得安求其能千里也䇿之不以其道食之不盡其材鳴之不能通其意執策而臨之曰天下無馬嗚呼其真不知馬也耶李伯樂相馬經馬生足墮地無毛行千里尿舉一腳行百里䦨筋竪者千里馬膝如團麴千里馬一歲上下齒二十四歲齒黃三十三歲齒白馬頭為王欲得方目為丞相欲得明脊為將軍欲得強腹為城郭欲得張四下為令欲得長眼欲得髙匡眼睛欲得如懸鈴紫艷光眼下懸蠶懸鑿欲得成鼻孔欲得大鼻頭欲得有王火字口中欲得赤膝骨欲圓而張耳欲相近而竪小而厚伏龍骨欲得成頸欲得長雙趺欲得大而突蹄欲得厚腹下欲得平有八字尾骨欲得高而埀凡相馬之法先除三羸五駑乃相其餘大頭小脛一羸也弱脊大腹二羸也小脛大蹄三羸也大頭緩耳一駑也長頸不折二駑也短上長下三駑也大骼短脅四駑也淺髖薄髀五駑也白莊子載徐無鬼見魏武侯告之以相狗馬荀子論堅同異云曽不如好相雞狗之可以為名也史記褚先生於日者傳後云黃直丈夫陳君夫婦人也以相馬立名天下留長孺以相彘立名榮陽褚氏以相牛立名皆有髙世絶人之風今時相馬者間有之相牛者殆絶所謂雞狗彘者不復聞之矣劉向七略相六畜三十八卷謂骨法之度數今無一存容齊作劉禹錫說驥篇伯氏佐戎于朔陲獲良馬以遺豫豫不知其良也秣之稊秕飲之汚池廄櫪也上痺而下蒸羈絡也綴索而續葦其易之如此子方病且窶求沽于肆肆之駔亦不知其良也評其價六十緍將劑矣有裴氏子贏其二以求謂善價也卒與裴氏裴所李生雅挾相術于馬也尤工覩之周體眙然視聽然笑既而抃隨之且曰久矣吾之不覯于是也是何柔心徑骨奇精妍態宛如鏘如曄如翔如之備耶今夫馬之德也全矣然顧其為駒藏鋭于內且秣之乖方是用不說于常目須其齒備而氣振評則衆美灼見上可以獻帝間次可以鬻千金裴也聞言竦焉遂警其僕蠲其皂篚其惡蜃其溲權以美薦秣以薌粒起之居之澡之挋音震之無分陰之怠斯以馬養馬之至分也居無何果以驥德聞客有唁豫以喪其寶且譏其所貿也微豫灑然曰始豫有是馬也豫常馬蓄之今豫鬻是馬也彼寶馬蓄之寶與常在所遇耳且夫昔之翹陸也謂將蹄將囓抵以撾䇿不知其籋雲也昔之噓吸也謂為疵為療授以藥石不知其噴玉也夫如是則雖曠日歷月將至頓踣曽何寶之有焉繇是而言方之于土則八十其緡也不猶愈於五羖乎客謖而竦豫遂言曰馬之德也存乎形者也可以自取然猶違之若此矧德藴於心者乎斯從古之嘆豫不敢嘆杜子美畫馬贊韓幹畫馬毫端有神驊騮老大腰裊清新魚目瘦腦龍文長身雪垂白肉風蹙蘭筋逸態蕭踈高驤縱動恣四蹄雷雹一日天地御者間敏云何難易愚夫乘騎必顛躓瞻彼駿骨實雖龍媒漢歌燕市已矣茫哉但見駑駘紛然往來良工惆悵落筆雄才蘇子瞻九馬圖贊長安薛君紹彭家藏曹將軍九馬圖杜子美所為作詩也拳毛獅子二駿在焉作九馬贊拳牧者萬歲繪者誰霸甫為作誦偉哉九馬姚宋廟堂李郭治兵帝下毛龍以馭羣英我思開元今為幾日筋骨應圖至三萬匹云何寂寥跬步山川負鹽挽磨淚濕九泉牝牡驪黃自以為至駁其一毛棄我千里􅕭囓是乘脂蠟其鞭道阻且長喟其永嘆秦少游八駿圖序子嘗聞有周穆王八駿之說乃今獲覽厥圖雄凌趫騰彪虎文螭之流與今馬高絶懸異矣其名盜驪蜚黃騕裊白犧之屬也視矯首則若飛雲視舉足則若乘風有待馭之狀有矜羣之姿若日月之所不足至若天地之所不足周軒軒然嶷嶷然言其真也實星降之精思其發也猶神抉其魄軾者如仙御者如夢將變化何别哉世說周穆王駕八駿日會王母於瑤池從羣仙而遊按山海經去中國三萬里非虛說也而不知其從得之厥神是生為之用歟何古書無其匹歟圖之首有褚公遂良題云秦漢傳之降於梁隋至於皇唐不泯厥跡卓入昭然竒哉信乎荀今考之於古則人大笑矣求之於時則曠世矣田是知物有同者不必良有異者不必否或慮觀之者昧故為序以表焉驢竒畜胸奴丨丨也即驢騾也漢胸奴傳名駒聰敏寬祥髙音逺揚真驢氏之丨丨也臧道弔驢文執政如驢後漢靈帝於西園駕四白驢躬自操轡驅馳以為大樂公卿貴戚轉相放效夫驢服重致逺上下山谷野人之所用耳何有帝王君子驂御之乎遲鈍之畜而今貴之天意若曰國且大亂凡丨丨者皆丨丨也五行志長面似驢諸葛恪父瑾丨丨丨丨孫權大會羣臣使人牽一驢入檢其面題曰諸葛子瑜恪跪請筆續兩字其下曰之驢舉坐歡笑乃以驢賜恪騎驢到郡晉文帝大親阮籍願得為東平太守帝從之籍便丨丨丨丨至皆壞府舍諸壁障使內外相望當十餘日便乘驢去文士傳騎驢省入胡威厲操清白父質為荆州太守威自京都省之家貧無車馬僮僕自丨丨單行拜見父十餘日辭歸每至客舍自放驢取樵㸑食晉陽秋王好驢鳴丨仲宣粲丨丨丨既葬文帝臨其喪顧謂同遊曰丨丨丨丨可作一聲送之坐客皆作驢鳴世說卿好驢鳴孫子荆楚有才少所推服唯雅敬王武子濟武子喪名士無不至者子荆後來臨尸慟哭賔客莫不垂涕哭畢白靈床曰丨嘗丨我作丨丨今我為卿作體似聲真賔客皆笑孫舉頭曰使君輩存令此人死同上李白跨驢丨丨失意遊華山縣宰方開門决事白乘醉丨丨過門宰怒不知太白也引至庭下曰汝何人輒敢無禮白乞供狀無姓名曰曽用龍巾拭吐御手調羮力士脫靴貴妃捧硯天子殿前尚容吾走馬華陰縣裏不許我騎驢托遺賈島跨驢丨丨一日見京兆尹丨丨不避呼詰之久乃得釋本傳噀紙成驢張果嘗乘一白驢休則疊之如紙置巾箱中以水丨之復成驢矣續仙傳宋𤣥淑廬山公文若乃三軍陸邁糧運艱難謀臣停算武天吟嘆爾乃長鳴上黨慷慨應邦﨑嶇千里荷囊致餐用大勳歷世不刋斯實爾之功也音隨時興晨夜不默仰契𤣥象俯協漏刻應更長鳴毫分不忒雖挈壺著稱未足比德斯又爾之智也青脊絳身長頭廣額修尾後垂巨耳雙磔斯又爾之形也嘉麥既熟實須精麵負磨回衡迅若轉電惠我衆庶神祗獲薦斯又爾之能也是用遣中大夫閭丘騾加爾使䘖勒大鴻臚斑腳大將軍宫亭侯以楊州之廬江江州之廬陵吳國之桐廬合浦之朱廬封爾為廬山公栁宗元黔之驢黔無驢有好事者船載以入至則無可用放之山下虎見之厖然大物也以為神蔽林間窺之稍出近之愸愸然莫知他日驢一鳴虎大駭以為且噬己也甚恐然往來視之覺無異能者益習其聲又近出前後終不敢摶稍近益狎蕩倚衝冒驢不勝怒蹄之虎因喜計之曰技止此耳跳踉大噉斷其喉盡其肉乃去噫形之厖也類有德聲之宏也類有能向不出其技虎雖猛疑畏卒不敢取也今若是焉悲夫詩集踣鐵腕促蹄髙如丨丨削玉頭上鋭耳如批竹腳下髙蹄丨寒丨並杜一日行千里君家赤驃畫不得一團旋風桃花色紅纓紫鞍珊瑚鞭玉鞍錦韀黃金勒請君鞁出看君騎尾長窣地如紅絲自矜諸馬皆不及却憶百金新買時香街紫陌鳯城內行人見者雖不愛揚鞭驟急白汗流弄影行驕碧蹄碎紫髯胡騶金剪刀平明剪出三􅐢髙櫪上看時獨意氣衆中牽出偏雄豪騎將獵向南山口城南狐兔不復有草頭一㸃疾如飛却使蒼鷹翻向後憶昨看君朝未央鳴珂擁蓋滿路香始知邊將真富貴可憐人馬相輝光男兒志氣得如此駿馬長鳴北風起待君東去歸胡塵為君丨丨丨丨丨岑參衛尚書赤驃馬歌四足無一蹶天馬來出月支窟背為虎文龍翼骨嘶青雲振緑髮蘭筋權奇走滅沒騰崑崙歷西極丨丨丨丨丨雞鳴刷燕晡秣越神行電過躡恍惚天馬呼飛龍趍目明長庚臆雙鳬尾如流星首渴烏口噴紅光汗溝未曽陪時龍躍天衢羈金絡月照皇都逸氣稜稜凌九區白璧如山誰敢沽回頭笑紫燕但覺爾輩愚天馬奔戀君軒竦躍驚矯浮雲翻萬里足躑躅遙瞻閶闔門不逢寒風子誰採逸景孫白雲在天丘陵逺崔嵬鹽車上峻坂倒行逆施畏日晚伯樂剪拂中道遺少盡其力老棄之願逢田子方惻然為我思雖有玉山禾不能療苦飢嚴霜五月凋桂枝伏櫪㗸寃摧兩眉請君贖獻穆天子猶堪弄影舞瑤池李白天馬歌長教覔藥醫此馬堪憐力壯時細均行步恐塵知騎來未省將鞭觸病後丨丨丨丨丨顧主堪擡和汨眼就人輕刷帶瘡皮秪令筋骨渾全在春暖莎青放未遲杜荀鶴傷病馬誰憐棄置久𤣥黃一疲馬筋力盡胡塵驤首北風夕徘徊鳴向人丨丨丨丨丨却與駑駘親猶戀長城外青青塞草春劉長卿疲馬驢衝籬突市丨丨丨丨不逡巡掠面驚風撲眼驚出手推敲寧避尹題門吟詠不逢人陳無已為我䭾書商山老何慘酷喙長於釘利於鏃拾蟲啄卵從爾為安得殘吾負瘡畜我從去歲謫商於行李唯存一蹇驢來登秦嶺又巉絶丨丨丨背百卷丨穿皮露脊痕連腹半年治療將平復老烏昨日忽下來啄破舊瘡取新肉驢號僕呌烏已飛劘觜整毛坐吾屋我驢我僕奈爾何悔不挾彈更張羅賴是商山多鷙鳥便向鄰家借秋鷂鐵爾拳兮鈎爾爪折烏頸兮食烏腦豈惟取爾飢腸飽亦與瘡驢復讐了王元之烏啄瘡驢詞古今合璧事類備要别集卷八十一
