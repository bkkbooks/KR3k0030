body:
  text: 古今合璧事類備要外集卷九宋謝維新撰祭祀門原廟禮經考索胡致堂嘗辨原廟之失以為記禮所載修其祖廟陳其宗器設其裳衣其禮不過如斯而已至漢叔孫通援是以為高帝月出遊之地而作原廟焉原廟之作其殆昉於此乎要之祖宗禘祫既有太廟祧祭又有世室則原廟之作殆後世之褻禮非古人之正禮也明矣自是而後次第相承皆以原廟便於用俗禮而為美觀其去古人重宗廟之意愈逺矣是以唐有上牙盤之儀本朝祖宗以來帝后神御皆寓道釋之館神宗元豐中始倣漢原廟之制即景靈宫之東西為六殿每殿皆有館御前殿以奉宣祖已下御容而後殿以奉母后各揭以美名徽宗崇寧初以景靈之隙地乃以馳道之西立西宫以神宗為館御首哲宗次之號舊宫為景靈東宫東西宫倣於此矣建炎改元之二日即命有司建景靈宫於江寧帝后異殿然不克成洎渡江後自聖祖已下神御皆寓溫州天慶宫以祠部郎官兼知州若官使相則兼景靈宫使典奉神御趙忠簡為相議築宫臨安以奉祖宗神御而留聖祖於東嘉後不果紹興十三年二月始遷於臨安然但通為三殿以奉聖容無復東都之使矣據今景靈宫在新莊橋之西本劉光武賜第也初營三殿聖祖居前宣祖至徽宗居中元天大聖后與祖宗諸后居後掌宫內侍七人道士一人吏卒二百七十六人上元結燈樓寒食設鞦韆七夕設摩睺羅簾幕歲一易歲用酌獻二百四十羊凡帝后忌辰通用僧道士四七人作法事十八年增建道院二十一年韓世忠卒又以其賜第增築之天興殿五楹中殿七楹後殿十七楹齋殿進食殿皆備焉四時朝享莫此為重跽進置盞皆命侍從贊其禮記曰禮時為大又曰禮從宜於是乎見之事類典祀丨丨無豐于昵注傳説戒高宗祭祀不當豐厚于親近之廟書先薦仲春獻羔開氷丨丨寢廟又孟夏薦以含桃丨丨寢廟又孟秋天子嘗新丨丨寢廟又仲秋嘗麻丨丨寢廟記月令出遊孝惠帝定宗廟儀法惠帝為東朝長樂宫及間往所蹕煩民作復道方築武廟南通奏事請間曰子孫奈何乘宗廟道上行哉帝懼曰急壞之通曰人主無過舉今已作願陛下為原廟為高皇帝月丨丨衣冠之地益廣大孝之本乃詔有司立原廟通傳顧成文帝使丨丨之廟稱為太宗賈誼治安策陵廟宣帝諸帝各自居丨旁立丨新宫唐正月一日初見宗祖躬執百禮登降拜俯薦享新宫視瞻梁稆戚見容色淚落入俎侍祠之臣助我惻楚啓聖本朝建隆立丨丨院鴻慶真宗大中祥符七年建丨丨宫詔僝修原廟模修晬容所以伸繼孝之心紀發祥之日夙嚴靖宇以宅仙儀式增壯棟之規仰奉在天之御永光前志益茂神休昭應同上六年玉清丨丨宫奉安畢赦肇營宫館式耀珍圖上真高聖凝三氣之殊姿英祖神宗儼重瞳之粹質應天同上天僖元年丨丨宫安奉畢德音惟洛神定鼎之都實藝祖誕靈之壤興王之氣始兆於丕祥布金之圖聿新於崇構爰備彰施之彩虔圖睟穆之容景靈同上大中祥符五年建丨丨宫詔仙源啓祚鴻慶非常惟文考在潛之宫乃沖人載誕之地宜以錫慶院建丨丨宫朝謁儀祥符三年詔紺宇斯嚴聖容如在兹屆陽春之候虔修丨丨之丨宜用瞻崇以伸欵慕自今朝謁啓聖院太宗皇帝神御殿如饗廟之禮設縟位西向再拜升殿行禮畢歸位俟宰臣奠獻訖就位復再拜永為定式簨簴數同上七年詔朕欽奉真猷載嚴恭館講求茂實昭答上靈維朝享之儀並加申飭而丨丨之丨尚闕討論爰命禮官博詳典故廣以郊廟之制備兹鍾磬之容儼金石之九成庶諧雅意竦熊羆之四列永煥明禋自今玉清昭應景靈宫架並用三十六簴神御殿仁宗景德四年建太祖神御殿詔定鼎名區測圭故壤書淵開奧本庶邦取則之都星渚流祥乃藝祖挺生之地朕虔遵典禮躬謁山園亦既禮成遂茲臨幸載念神宗之舊邸盍恢紹聖之仁祠云云爰就炳靈之地仰圖如在之容宜於西京建太祖丨丨丨一如啓聖院制度會聖宫哲宗元祐二年丨丨丨奉安神宗神御德音顧瞻山陵未忘宫劒之慕益廣宗廟以奉衣冠之遊敞鳳臺之仙宇粲龜洛之仁祠元豐赦神宗丨丨五年原廟奉安丨禮樂未具不足以紹制作之文衣冠出遊不足以殫嚴奉之意乃建上都之名壤是為真祖之殊庭肆營斯宫萃興寶構載差榖旦祇安睟容元祐詔哲宗元祐元年太皇太后立神宗原廟詔原廟之立所從來已久前日神宗皇帝初即祠宇並建寢殿以崇嚴祖考其孝可謂至矣今神宗既已升祔於故事當營神御以奉神靈而宫垣之東密接民里欲加開展則懼成煩擾欲採縉紳之議皆合帝后為一殿則無以稱神宗欽奉祖考之意聞治隆殿後有園地以殿後推之本留以待未亡人也可即其地立神宗原廟吾萬歲後當從英宗皇帝於戲上以寧神明中以成吾子之志下以安居民之心不亦善乎西宫成徽宗崇寧元年景靈丨丨丨德音恭惟神考之聖度越成周之隆憲章修明禮樂備具內輯諸夏外賓四夷更十九年齊天地之化育亘千萬世依日月之照臨乃眷中都之舊壤載營寶構之新宫榖旦肅涓晬容遷奉偉大明之制度恢永佑之規模霜露既降興言悽愴之懷衣冠出遊儼若威靈之在徽猷建同上政和四年丨丨丨殿閣成奉安德音乃即禁庭更新寶構奉睟儀於祕殿閟睿藻於西清河圖洛書粲昭回之在望雲車風馬想謦咳以如聞重光殿同上崇寧元年改名丨丨丨詔景靈西宫哲宗殿名寶慶而萬壽觀聖祖殿亦曰寶慶祖孫同稱於義未允恭念哲宗聰明齊聖外攘驕悍戎狄內修隳廢法度紹述烈祖收功太平其殿額若止以受寶之慶為意實未足昭著前人之光可改為丨丨丨圖配功臣南渡高宗紹興十八年丨景靈宫丨享丨丨柳宗元漢沛國原廟銘昔在帝堯光有四海元首萬邦時則舜禹稷卨佐命垂統股肱天下聖德未衰而內禪元臣繼天而受命四姓承休迭有中邦五神環運炎德復起周道削滅秦德暴戾皇天疇庸審厥保承乃命唐帝之後振而興之又俾元臣之後翊而登之所以紹復丕績不墜厥祀故曲逆起為策士輔成帝圖吐謀洞靈奮竒如神舜之胄也汝陰脫帝密網摧虜暴氣扶乘天休運行嘉謀禹之苖也酇侯保綏三秦控引漢中宏器廓度以大帝業卨之裔也淮陰整齊天兵導揚靈威覆趙夷魏拔齊殄楚平陽破三秦虜魏王綘侯定楚地固劉氏皆稷之裔也克復堯緒昭哉甚明天意若曰建火德者必唐帝之胄故漢氏興焉翼炎運者必唐臣之孫故羣雄登焉是以高帝誕膺聖祚以垂德厚探昊穹之奧旨載幽明之休佑殺白帝於大澤以承其靈建赤旗于沛邑以昭其神假手於嬴以混諸侯慿力於項以離關東奉纘堯之元命而四代之後咸獻其用得乘木之大統而秦楚之盛不既其位既建皇極設都咸陽撫征四方訓齊天下乃樂沛宫以追造邦之本乃歌大風以昭武成之德乃奠舊都以壯王業之基生為湯沐之邑沒為思樂之地且曰萬歲之下魂遊於此惟兹原廟沛宫之舊也祭蚩尤於是庭而赤精降導靈命於是邦而羣雄至登布衣於萬乘而子孫得以纘其緒化環堵為四海而黎元得以安其業基岱嶽之高源洪河之長蓄靈擁休此焉發迹蓋以道備於是而後行之天下制成於是而後廣之宇內天下備其道而神復乎本宇內成其制而心懷於舊宜其正名以表功用成其始俾生靈盡其敬焉陳本以宅神用成其終俾生靈盡其慕焉故高帝定位建兹閟宫惠皇嗣服爰立清廟綿越千祀至今血食此所以成始而成終也且夫以斷蛇之威安知不運其密用佐歲功以流澤歟以約法之仁安知不流其神眷相舊邦之遺黎歟以紹唐之餘慶統天之遺烈安知不奮其神化大祐於下土歟然則展敬乞靈烏可已也銘於舊邑以迪天命其辭曰蕩蕩明德時惟放勛揖讓而退祚于後昆群蛇輔龍以翊天門登翼炎運唐臣之孫秦網既離鹿駭東夏長蛇封豕蹈躍中野天復堯緒鍾祐於劉赫矣漢祖播兹皇猷揚旗沛庭約從諸侯豪暴震疊威聲布流總制虎臣委成良疇勦殄霸楚遂荒神州區宇懷濡黔黎輯柔表正萬國炎靈用休定宅咸陽以都上遊留觀本邦在鎬如周穆穆惠皇宗禋克成崇崇沛宫清廟是慿原念大業肇經兹地乃專元命亦舉嚴祀建旗釁鼓遂據天位魂遊故都永介丕祉煥列唐典嚴恭罔墜勒此休銘以昭本始本集歐陽公會聖宫頌西京留守推官將仕郎試祕書省校書郎臣歐陽修謹齋沐滌慮頓首再拜言臣伏見國家采漢書原廟之制作宫於永安以備園寢欲以盛陵邑之充奉昭祖宗之光靈以耀示於千萬世甚盛德也臣永推古先王者將有受命之符必先興業造功以警動覺悟於元元然後有其位而繼體守文之君又從而顯明丕大以纂修乎舊物故其兢兢勤勤不忘前人是以根深而葉茂德厚而流光子子孫孫承之無疆伏惟皇帝陛下以神聖之德傳有大器乾健而正離繼而明即位以來於兹十年勤邦儉家以修太平日朝東宫示天下孝親執籩豆三見於郊日星軌道光明清潤河不怒溢東南而流四夷承命歡和以賓奔走萬里顧非有干戈告讓之命文移發召之期而犀珠象牙文馬玨玉旅於闕庭納於廄府如司馬令無一後先至德之極上格於天下極於地中浹於人而外冒於四表昆蟲有命之物無不仰戴神威聖功效見如此太祖創造基業克成厥家當天受命之功太宗征服綏來遂一海內睿武英文之業真宗禮樂文物以隆天聲升平告功之典陛下夙夜虔恭嗣固鴻業纂服守成之勤基構纍積顯顯昌昌益大而光稱於三后之意可謂至孝况春秋歲時以禘以祫則有廟祧之嚴配天昭孝以享以告則有郊廟明堂之位篆金刻石則有史氏之官歌功之詩流於樂府象德之舞見乎羽毛惟是邦家之光祖宗之為有以示民而垂無窮者罔不宣著陛下承先烈昭孝思所以奉之以嚴罔不勤備聖人之德謂無以加而猶以為未也乃復因陵園起宫室以望神遊土木之功嚴而不華地爽而潔宇敞而邃神靈杳冥如來如宅合於禮經孝子謦咳思親之義愚以謂宫且成非天子自臨享則不能以來三后之靈然郡國不見治道太僕不先整駕恬然未聞有司之詔豈難於動民而遲其咎耶特以龜筮所考須吉而後行耶不然何獨留意於屋牆構築而至於薦見孝享未之思耶况是宫之制夷山為平外取客土鍛石伐木發兵胥靡調旁近郡如此數年而道路之民徒見興為之功恐愚無以識上意是宜不惜屬車之費無諱數日之勞沛然幸臨因展陵墓退而諭民以孝思之誠遂見守土之臣采風俗以問高年亦堯舜之事也古者天子之出必有采詩之官而道路童兒之言皆得以聞臣是以不勝惓惓之心謹采西人望幸之意作為頌詩以獻闕下辭曰巍峩穹崇奠京之東有山而嵩奫淪道源匯流而淵有洛之川川靈山秀回環左右有高而阜其阜何名太祖太宗真宗之陵惟陵之制因山而起隱隱隆隆惟陵之氣常王而喜鬱鬱蔥蔥帝懷穹旻受命我宋造初于屯帝念先烈用顧余家宣力以勤赫赫三后重基纍構既豐而茂燕翼貽謀是惟永圖其傳在豫曰祖曰宗有德有功豫實嗣之克勤克紹以孝以報豫敢不思惟此園陵先后之宅既宅且安后來遊止弗宫弗室神何以歡乃相川原乃得善地地高惟丘乃以荆灼乃訊寶龜龜告曰猷帝命家臣而職我事而往惟寅一毫一絲給以縣官無取於民伐洛之薪陶洛之土瓦不病窳柯我之斧登我之山木好且堅家臣之來役夫萬名三年有成宫成翼翼在靈之側須后來格有門有宇有廊有廡有庭有序殿兮耽耽黼帷襜襜天威可瞻庭兮殖殖鉤盾虎戟容衛以飭太祖維祖太宗維弟真宗維子三聖嶷嶷有以正位於此而會聖兮在天風馬雲車其來仙仙聖會於此靈威神馭其宫肅然聖既降矣其誰格之惟聖天子聖降當享其誰來薦亦孝天子孝既克祇而來胡遲其下臣修作頌風之王荆公天章閣延昌殿奉安英宗御容祝文伏以相名山於洛宅即兆寢園倣原廟於漢儀將遷館御潔除祕宇嚴奉睟容冀靈蹕之少安副宸情之罔極詩集臥齋房攝事齋居力不強誰憐岑寂丨丨丨青苔點點無人迹緑葉陰陰覆砌涼玉宇清風來處逺仙家白日靜中長却視九衢車馬客自然顔鬢易蒼蒼歐陽公景靈宫致齊夢鈞天干戈不用臻無事朝野多歡樂有年便坐看揮飛白筆侍臣新和柏梁篇衣冠忽見藏原廟簫鼓愁聞向洛川寂寞秋風羣玉殿還同恍惚丨丨丨歐陽公永昭陵挽詞聳崔嵬行殿峩峩出緑槐琳房芝闕丨丨丨管絃飄落人間去幢節疑從天上來基業百年傳聖子黔黎四紀樂春臺孤臣不得同針虎未死心先冷若灰歐集四月十七日景靈宫奉迎仁宗皇帝御容有感藹瑞氛琳館清晨丨丨丨玉旒朝罷奏韶鈞緑槐夾路飛黃蓋翠輦鳴鞘向紫宸金闕日高猶泫露綵旗風細不驚塵自慚白首追時彥行近儲胥忝侍臣歐陽公景靈朝謁從駕還宫清曉去經旬風雨陟新晴一夜蟾光直到明丨丨衣冠原廟丨分明眷祐似平生朱門閉鹵簿蕭蕭鼓吹鳴屬車前導乘輿輕十三殿裏丨丨丨無復傳呼輦路聲朝獻牙盤太室祼將嚴體薦景靈丨丨薦丨丨九重黼座盤盂固四海蒼生奠枕安道旁故老儉慈三十一年主已不自知其至尊時向丨丨逢丨丨但能垂淚不能言禁殿薰風丨丨丨丨傳賜敕宫門曉日緩催班小臣未報君恩重耿耿孤忠入夢間以上並王實齋詩集寧考神御奉安原廟繡雲鹵簿黃繖中間一點紅丨丨丨丨海棠風鈞容聲出雲霄外馬上誰憐有老聾洪平齋正月十九日孟享從駕古今合璧事類備要外集卷九
