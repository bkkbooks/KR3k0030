body:
  text: 古今合璧事類備要别集卷七十四宋謝維新撰飛禽門雀附黃雀鷦鷯格物總論雀小鳥也常依人觜頷皆黑通身毛羽褐尾長二寸許爪趾黃白色一名嘉賓言棲宿人家如賓客故云黃雀體絶肥鷦鷯又微乎微者事類化蛤季秋雀入大水丨為丨記月令抵鷹黃雀不能丨一丨抱朴子穿屋誰謂雀無角何以丨我丨詩賀厦大厦成而燕雀來丨淮南子突决丨丨棟焚燕雀不知吕氏春秋珠彈明丨丨雀貴不當也太𤣥經不及鳳萬雀丨丨一丨張顯折言安知鵠燕雀丨丨鴻丨之志漢陳勝傳雀銜書周武王時有赤丨丨丨之瑞白氏帖反弱􅑹齊景公探雀􅙿􅙿弱丨之晏子再拜曰吾君有聖人之道矣君探􅙿􅙿丨故反之是長幼也禽獸若此而况人乎晏子春秋得黃口孔子見羅雀者所丨皆丨丨小雀曰大雀善驚而難得小雀貪食而易得家語解雀語公冶長丨丨丨得免罪條支獻丨丨國丨大雀白氏帖王孫彈莊辛謂楚王曰夫雀俯啄白粒仰棲茂樹鼓翅奮翼自以為無患不知夫公子丨丨左挾羅右攝丸以加其頸也戰國策門可羅爵前翟公為廷尉賓客填門及廢丨丨設爵丨翟方進傳縣有羣雀楊宣為河西太守行丨丨丨丨鳴桑樹上宣謂吏曰前有覆車粟此雀相隨欲往食行數里果有覆車粟益部耆舊傳爵命之祥圉人魏尚髙帝時為太史有罪繫獄有萬雀集獄棘樹上鳴尚曰雀丨丨丨丨我其復故官也有頃詔復故官陳留耆舊傳富貴之證潘樂初生有一雀止其母左肩占者咸謂丨丨丨丨因字相貴北史執雀而放成敬苛與姚崇親姻崇寢疾敬背造省懷中置生雀數頭請崇丨而放祝云願令公速愈唐新語羅雀以食張巡士多饑死至丨丨丨丨雀見朝堂則天皇后武氏臨朝御史博遊藝請革命改帝氏為武又脅羣臣固請妄言赤丨丨丨丨並孔氏帖雀巢家樹張九齡母喪白丨丨丨丨雀巢其庭張知謇白丨丨丨丨雀集庭樹崔信明五月五日日中坐有異丨丨頭身形甚小五色備丨于丨丨鳴聲清亮太史占之曰五月為大火為離離為文彩日中文之盛也有雀文彩而此兒必文彩聲名播天下雀形既小祿位殆不髙矣及長博文强記下筆成章而官果不違本傳呼知更雀裴耀卿勤於政事夜閲案牘書决獄訟常養一雀每夕自更初有聲至漏盡則急鳴裴丨呼丨丨丨開元遺事貢却火雀順宗即位枸弭國丨丨丨丨純黑大小似燕其聲清置於火中火自散去遂盛於水晶籠懸於寢殿夜則宮人持蠟炬燒之終不能損其羽毛酉陽雜俎釋氏書言雀却火因浴沙塵受卵杜陽編雀食虸蚄開元間幽州長史張守圭界內虸蚄蟲食田稼曼延入平州俄頃有羣丨來丨此蟲一日食盡平州稼穡無有傷害唐書山頭凍雀五代冦彥卿昭宗既出明年太宗以兵至河中遣彥卿奉表迫請遷都昭宗顧瞻陵廟倣徨不忍去謂其左右為俚語曰紇于丨丨丨死丨何不飛去住處樂相與泣下霑襟孔氏帖頸上飛雀周太祖少賤黥其丨丨為丨丨世謂之郭雀兒東漢劉昊傳僧貫休野田雀髙樹風多吹爾巢落蒿深華暖宜爾依泊莫近鶚類蛛網亦惡飲田野之清水食野田之黃粟深花中睡勃土裏浴如此即全勝啄太倉之粟而穿人之屋黃雀名嘉賓黃雀一丨丨丨崔豹古今注常畏人黃雀之為物也日遊於庭日親於人丨丨於丨而人撓之執膠革捕丨丨丨丨黃雀黃雀從而噪之宋子嵩化書事蟲粒養懸雕籠丨丨丨丨黃雀黃雀終不樂同上螳蜋不知吳王欲伐荆有諫者死舍人少孺子懷丸操彈於後園露沾衣王怪之對曰園有榆上有蟬蟬髙居悲鳴飲露不知丨丨在其後螳蜋之捕蟬而丨丨黃雀在其後臣執彈丸欲取黃雀不覺露沾衣如此皆務欲得於前不顧於後患吳乃罷說苑螻蟻所損楊寶年七嵗行於華山見一黃雀被瘡為丨丨丨丨見而憐因收于巾箱內採黃花以餧之經十餘日瘡愈旦去暮來忽一日變為黃衣年少與玉環一雙報曰好掌此環子孫纍世為三公後漢本傳飛入幕中王祥至孝後母朱氏病欲得黃雀炙令祥捕祥思念卒難致須臾有數十黃雀丨丨其丨丨晉書本傳鷦鷯桃蟲肇允彼丨丨疏令鷦鷯微小黃雀也工雀自關而東謂之丨丨一名巧婦爾雅注雞母以鷃為鴽又云鴽丨丨也禮記鄭氏注巧婦丨丨鳥主婦人巧吞其卵小如雀在林藪間為窠窠如小囊袋亦取其窠燒女人多以燻手令巧爾雅云桃蟲鷦注云桃雀也俗呼為巧婦鳥也本草巢枝鷦鷯棲於林不過一枝莊張華鷦鷯賦鷦鷯小鳥也生於蒿萊之間長於藩籬之下翔集尋常之內而生生之理足矣色淺體陋不為人用形微處卑物莫之害繁滋族類乘居匹遊翩翩然有以自得彼鷲鶚鵾鴻孔雀翡翠或凌赤霄之際或託絶垠之外翰舉足以冲天觜距足以自衛然皆負繒嬰繳羽衣入貢何者有用於人也夫言有淺而可以託深類有微而可以喻大故賦之云爾何造化之多端兮播羣形於萬類惟鷦鷯之微形兮亦攝生而受氣育翩翾之陋體兮毋𤣥黃以自貴毛弗施於器用兮肉不登乎爼味鷹鸇之過猶傾翼兮尚何懼於罿罻翳薈蒙蘢是焉遊集飛不飄揚翔不翕習其居易容其求易給巢林不過一枝每食不過數粒棲無所滯遊無所盤匪陋荆棘匪榮茝蘭動翼而逸投足而安委命順理與物無患伊兹禽之無知兮何處身之似智不懷實以賈害兮不自表以招纍靜守約而不驚動因循以簡易任自然以為資無誘慕於世僞鵰鶡介其觜距鴻鵠軼於雲際鵾雞竄於幽險孔翠生乎遐裔彼晨鳬與歸鴈又矯翼而增逝咸美羽而豐肌故無罪而皆斃徒銜蘆以避繳終為戮於此世蒼鷹鷙而受緤鸚鵡慧而入籠屈猛志以服養塊幽縶於九重變音聲以受㫖思摧翮而為庸戀鍾岱之林野慕壠坻之髙松雖蒙幸於今日未若疇昔之從容海烏鶢鶋避風而至條枝巨雀踰嶺自致提挈萬里飄零逼畏夫惟體大妨物而形瑰足瑋也隂陽薰蒸萬品一區巨細舛錯種繁類殊鷦螟巢於蚊睫大鵬彌乎天隅將以上方不足而下比有餘普天壤以遐觀吾又安知其小大之所如詩集嗷嗷丨丨空城雀身計何戚促本與鷦鷯羣不隨鳳凰族提携四黃口飲乳未嘗足食君糠粃餘常恐烏鳶逐恥涉犬行嶮羞營覆車栗天命有定瑞守分絶所欲李白啾啾空城雀何不飛人家住空城無人種禾黍土門生子草門長滿池蓬蒿幸無主近村雖有髙樹枝雨中無食常苦饑八月小兒挾弓箭家家畏我田頭飛但能不出空城裏秋時百草皆有子黃口莫丨丨長爾得成無橫死王建爭枝墜啅雀丨丨丨仰天鳴啾啾窗問雀不知己微瑕舉頭丨丨丨所願晷刻淹不知彈射死却得親炮燖並韓入官倉雀丨丨丨中所食能損幾所往復頻官倉乃害爾魚綱不在天鳥羅不張水飲啄要自然何必空城襄羅𨼆下空庭百千寒雀丨丨丨小集梅稍話晚晴特地作團喧殺我忽然驚散寂無聲楊廷秀黃雀任翩翾黃雀丨丨丨杜秋日夔府解游揚黃雀癡黃雀癡謂言青鷇是我兒一一口㗸食養得成毛衣到大啾啾丨丨丨各自東西南北飛薄暮空巢上羈雌獨自歸鳳凰九雛亦如此慎莫愁思憔悴損光輝王摩詰飽野粟黃雀丨丨丨羣飛動荆榛杜贈賀蘭銛舞囂塵黃雀丨丨丨倚恃主人仁主人匆不仁買彈彈爾身何不逺飛去蓬蒿有正繁新蒿粒無人爭食之足為珍莫覬翻車粟車翻罪因黃雀不知言贈之徒殷勤孟東野黃雀吟蒿蓬下遊莫逐炎洲翠棲莫近吳宮燕炎洲逐丨遭網羅吳宮火起焚燕窠蕭條兩翼丨丨丨縱有鷹鸇奈汝何李白野田黃雀軀體微嘖嘖野田雀不知丨丨丨關穿深蒿裏爭食復爭飛窮老一頽舍棗多桑樹稀無棗猶可食無桑何以衣蕭條空倉暮相引時來歸邪路豈不捷渚田豈不肥水長路且阻惻惻與心違儲光羲野田黃雀行飛蔽空秋風下黃雀飛禾田熟黃雀肥羣丨丨丨日色薄逡巡百頃禾為稀翾翻巧捷多且微精丸妙繳舉輒違乘時席勢不可揮一朝風雨寒霏霏肉多翅重天時非農夫舉網驚合園懸頸繫足膚無衣百箇同缶仍相依頭顱萬里行不歸北方居人厭羔豨咀噍聊發一笑欷蘇子由慳下筯去家十二年黃雀丨丨丨笑開張侯盤湯餅始有助蜀王煎藙法醢以羊彘兔麥餅薄於紙含漿和鹹酢秋霜落場穀一一挾璽絮飛飛蒿艾間入網輒萬數烹煎宜老稚罌缶煩愛護南包解京師至尊所􅎇御玉盤登百十睥睨輕桂蠧五侯噦豢豹見謂美無度瀕河飯食漿爪𦵔己佳茹誰言風沙中鄉味入供具坐令親饌甘更使客得與蒲隂雖窮僻勉作三年住願公且安樂分寄尚能屢黃魯直異竊脂黃雀飛鳴處交交丨丨丨稻梁求易足羅綱去何遲味厚資偏嗜謀疏闕自為韓彭尚𦵔醯么麼爾誠宜朱元晦小道士江夏無雙丨丨丨一丘一壑長避世裁雲縫霧作羽衣蘆花栁綿當裘袂身騎鴻鵠太液池腳踏金蟇攀桂枝渴飲南陽菊潭水饑啄藍田粟玉芝今年天田秋大熟紫皇遣刈神倉穀一雙鳬舄墮雲羅夜隨弋人卧茅屋賣身不直程將軍却與彭越俱策勳解衣戲入玉壺底壺中别是一乾坤水精鹽山兩岐麥身在椒蘭衆香國玉條脫下澡凝脂金叵羅中酌瓊液平生學仙不學禪刳心洗髓糟床邊諸公爼豆驚四筵猶得留侯借箸前昔為飛仙今酒仙更入太史滑稽篇楊廷秀好頭顱黃雀丨丨丨常行萬里餘想因君出守暫得免苞苴王介甫鷦鷯鷦鷯羣見雀詩嗷嗷注古今合璧事類備要别集卷七十四
