body:
  text: 古今合璧事類備要别集卷十宋謝維新撰市井門市井輿地提綱按風俗通市恃也言交易而退恃以不匱也古者日中為市致民而聚貨以其所有者易其所無者使農工商賈通功而易事則其利各有以相資而其業因得以不廢也自世道日降情僞日滋凡物有多寡之不齊則其價有低昂之不定人情有貪亷之不一則其直有增減之不常於是乎不可以無司平之置以智而詐愚則興巧取之謀以壯而淩弱則起豪奪之念於是乎不可以無奸暴之禁夫惟其司平在焉奸暴禁焉然後彼此交易各得其所吾見商歌㕓工歌肆而農亦未嘗不退而歌于野矣此三代之風也彼𢎞羊何為者耶官為九卿令吏坐市列販物以求利是未能平民之欲而已與民爭利也彼霍氏何為者耶身秉國政奴客鬬變而曽莫之禁是未能禦民之暴而已先民為暴也彼唐德宗何為者耶尊居萬乘富有四海乃令宦者主宮市至閲物㕓左而人莫誰何是又未能禁民之奸而奸已自上而出也夫太古逺矣三代不復見矣吁政教之陋一至於斯也事類買賣所市丨丨丨也說文交易處市恃也言丨丨而退恃以不匱也風俗通貨鬻物闤者市之垣闠者市之門肆所以陳丨丨之丨居所以置丨丨之丨崔豹古今注市治教司市掌市之治教刑政量度禁令大市日昃而市百族為主朝市朝時而市商賈為主夕市夕時而市販夫販婦為主禮市禁令司暴掌憲丨之丨丨禁其鬬嚚者與其暴亂者出入相陵犯者以屬游飲食于市者若不可禁則搏而戮之同上刑于市掌戮凡殺人者踣諸市肆三日丨盜丨丨歌于市丨舞丨丨井爾詩商願藏市㕓而不征法而不㕓則天下之丨皆悅而丨丨於其市矣孟童莫欺市不二價雖五尺之丨適市丨之或丨孟有易無古之為市者以其所丨丨其所丨者有賤丈夫焉必求龍斷而登之以左右望而罔市利故從而征之孟財與利市井相與言則以丨丨丨楊立之平一鬨之市必丨丨丨同上謂之㕓市中空地丨丨丨鄭周禮注神農為丨丨氏日中為市致天下之人聚天下之貨交易而退各得其所蓋取諸噬嗑易繫辭祝融修神農氏作市髙陽氏衰市官不修丨丨丨市古史考太王居邠亭丨丨所丨有夜市桓談新論里奚舉百丨丨丨於市孟晏子宅齊景公欲更丨丨之丨曰子之宅近市辭曰小人近市得所求小人之利也左宜僚居熊丨丨丨市南不屈楚國先賢傳舞白鶴吳王葬女丨丨丨於市令萬人觀之因以為殉吳越春秋粥羔豚孔子與聞國政三月丨丨丨者弗飾價吹箎乞食伍子胥出昭關丨丨丨丨於吳市史擊筑和歌高漸離丨丨荆軻丨而丨於市中史殺人避仇聶政丨丨丨丨以屠為事居市井史博徒賣膠毛公薛公遭戰國之亂二人俱以處士𨼆於邯鄲市毛公隱為博徒薛丨丨髙士傳荆軻所飲丨丨既至燕飲於燕市史春申所造吳市君丨丨君丨丨在湖里越絶立木於南秦孝公使公孫鞅定法令法令既具恐人不信乃丨三丈之丨丨國都市丨門募民有能徙置北門者與千全史懸金其上呂不韋著呂氏春秋暴之咸陽市丨千丨丨丨有能增一字者與之千金時無能者史令列販物𢎞羊丨吏坐市丨丨丨求利前食貨志持所出貨元始四年起明堂辟雍長安城南北為㑹市但列其槐樹數百行為隊無牆屋諸生朔望㑹此市各丨郡丨丨丨物及經書傳記笙磬器物相與買賣雍容揖遜或議論槐下三輔黃圖為平陽吏大將軍霍光秉政諸霍在平陽奴客持刀入市鬬變吏不能禁及尹翁歸為市吏莫敢犯者公廉不受饋百賈畏之為吳門卒梅福變姓名丨丨丨市丨賣卜成都蜀嚴君平丨丨於丨丨市依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠閲書洛陽王允家貧無書常遊洛陽市丨所賣丨身自滌器前司馬相如令文君當壚丨丨丨丨於市中口不二價韓康伯賣藥於長安市丨丨丨丨家人犯法光武以祭遵為市令丨丨丨丨遵格殺之百姓相慶呂布殺董卓丨丨相對欣喜抃舞皆賣家中珠環衣服牀榻以買酒食丨丨賀長安酒肉為之踊貴人皆號慟羊祐都督荆州卒州丨正市聞祐卒丨丨丨罷市本傳莫敢誰何德宗時宦者主宮市嘗置數十百人閲物㕓左謂之白望無詔文驗核但稱宮市則丨丨丨丨大率與直十不償一諫臣交章列上皆不納張建封傳墟市虛所丨丨賣之注南越中謂野市曰虛吳賢良曰蓋市之所在有人則滿無人則虛嶺南村市滿時少虛時多謂之為虛不亦宜乎栁童區傳記亥市分寧縣本常州丨丨也嶺南村落有市謂之虛不常㑹多虛日也西蜀曰痎音皆如瘧疾間日復作也江南人惡以疾稱故止曰亥耳又荆吳俗有取寅申巳亥日集于市故謂丨丨徐筠水志滿時少嶺南村市丨丨丨虛時多故謂之虛青箱紀録間旦集蜀有痎市丨丨丨如痎瘧之發其俗又以冷熱發歇為市喻也青箱雜記劉禹錫觀市由命士已上不入於市周禮有焉乃今觀之蓋因也元和二年沅南不雨自季春至于六月毛澤將盡郡守有志于民誠信而雩遂遍山川方社又不雨遂遷市于城門之逵余得自麗譙而俯焉肇令下之日布市籍者咸至夾軌道而介分次焉其左右前後班間錯市如在闤闠制其列區榜揭價名物參外夷之貨馬牛有牽集作緯私屬有間在巾笥者緘文及素焉在几閣者雕彤及質焉在筐筥者黑白巨細焉業于饔者列饔膳集作饎陳䴵餌而苾然業于酒者舉酒旗滌杯盂而懌然鼓刀之人設髙俎解豕羊而􅒂然華實之毛畋漁之生交蜚走錯水陸羣狀夥石入隧而分韞藏而待價者負挈而求沽者乘射其時者竒贏以游者坐賈顒顒行賈遑遑利心中驚貪目不瞬於是質劑之曹較固之倫合彼此而騰躍之易集作冒非良苦於集作之非巧言斁量衡於險手杪忽之差鼓舌傖儜詆欺相髙詭態橫出鼓囂譁坌煙埃奮羶腥壘集作疊巾履集作屨囓而合之異致同歸雞鳴而爭赴日午而駢闐萬足一心恐人我先交易而退陽光西徂幅員不移徑如初中無求隟地俱唯集作為守犬鳥烏樂得腐餘是日倚衡而閲之感其盈虛之相尋也速故著于篇栁宗元童區寄傳栁先生曰越人少恩生男女必貨視之必一本作以自毁齒已上父兄鬻賣以覬其利不足則盜取他室束縛鉗梏之鉗其廉切梏姑沃切至有鬚鬛者力不勝皆屈為僮當道相賊殺以為俗幸得壯大則縛取幼弱者漢官因為己利一本為字上有以字苟得僮恣所為不問以是越中户口滋耗少得自脫惟童區寄以十一嵗勝斯亦竒矣桂部從事杜周士為余言之童寄者郴州蕘牧兒也行牧且蕘二豪賊劫持反接布囊其口去逾四十里之虛所賣之南越中謂野市曰虛寄僞兒啼恐栗為兒恆狀賊易之對飲酒醉一人去為市一人卧植刃道上童微伺其睡以縛背刃力下上得絶因取刃殺之逃未及逺市者還得僮大駭將殺童遽曰為兩郎僮孰若為一郎僮耶彼不我恩也郎誠見完與恩無所不可市者良久計曰與其殺是僮孰若賣之與其賣而分孰若吾得専焉一有然字幸而殺彼甚善即藏其尸持僮抵主人所愈束縛牢甚夜半童自轉以縛即爐火燒絶之雖瘡手勿憚復取刃殺市者因大號一虗皆驚童曰我區氏兒也不當為僮賊二人得我我幸皆殺之矣願以聞於官虛吏白州州白太府太府召視兒幼願耳刺史顔證童云音征又之盛切竒之留為小吏不肯與衣裳吏護還之鄉鄉之行劫縛者側目莫敢過其門皆曰是兒少秦武陽二嵗戰國䇿燕有勇士秦武陽年十三殺人人不敢忤視史記云舞陽而討殺二豪豈可近耶詩集早休山縣丨丨市杜暮宿丨丨淮隂市李燈火丨丨家家市杜童僕丨丨來城市瓶中得酒還杜日中合旗亭出御道遊目暫回車既非隨舞鶴聊思索枯魚因龜識季主傍酒見相如丨丨人已丨黃昏故未踈梁庾肩吾日中集市上丨丨丨於利競錐刀杜常爭米小市丨丨丨杜買束薪糴米丨丨丨百物資之市坡不入襄陽市終身棲郭門丨丨丨丨丨李不爭咸陽市古來賢達人丨丨丨丨丨山谷始得魚菜稍尋羊豕町疃行丨丨村落丨丨市山谷博取魚蝦樵人賣薪不買米滿籃丨丨丨丨歸范逵瀟湘八景山市􅵊嵐墟市趂虛人青箬裹鹽歸洞客緑荷包飯丨丨丨栁峒岷至申洲野橋經亥市山路丨丨丨張祐古今合璧事類備要别集卷十
