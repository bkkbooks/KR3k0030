body:
  text: 古今合璧事類備要别集卷五十一宋謝維新撰衆木門㯃格物總論㯃樹身如柿葉亦近似其汁可以髹物以竹筒釘入木中取之人多種於山谷間云事類樹漆丨之榛栗椅桐梓丨詩有漆山丨丨又阪丨丨同上為傲吏莊子嘗丨漆園吏楚成王聘之欲以為相謂使者曰了去無汚我故曰丨丨為黏散樊阿從華佗求方可服食有益於人者佗以㯃葉丨青丨丨與之後漢方藝傳皆得用樊宏父嘗欲作器物先種梓㯃時人嗤之積以嵗月丨丨其丨向之笑者咸求假焉貲至鉅萬追爵諡為夀張敬侯本傳自謂堅雷義與陳重為友時人語曰膠漆自謂堅不如雷與陳本傳詩集有谷近聞西枝西丨丨杉㯃稠杜數株古人非傲吏自闕經世務偶寄一㣲官婆娑丨丨樹王維樊侯種丨丨丨梓漆坡南華憂舊聞丨丨仙作吏漆園裏應悟見割丨嗒然空隠几朱文公漆園桑附柘格物總論桑樹大者𢾗圍高一二丈許皮麤枝榦修竦春正二月抽條發葉葉大者盈尺有刻缺面深緑而光柘樹高大如桑然枝條婀娜葉大僅如掌耳事類土既蠶濟河惟兖州云云桑丨丨丨是降丘宅土注地高曰丘大水云民下丘居平土就桑書禹貢亳有祥丨丨丨桑榖共生于朝七日而大拱白六帖遵㣲行丨彼丨丨爰求柔桑詩豳七月伐遠揚蚕月條柔取彼斧戕以丨丨丨同上飛鴞食翩彼丨丨集于泮林丨我桑黮懷我好音泮水戴勝降季春之月命野虞無伐桑柘丨丨丨于桑具曲植蘧箱后妃齋戒親東鄉躬桑禁婦女毋觀省婦使以勸蚕事記月令繫苞桑其亡其亡丨于丨丨易否卦有公桑古者天子諸侯必丨丨丨蠶室近川而為之築宫仞有三尺棘墻而外閉夫人世婦之吉者使入蠶室奉種入于川桑于公桑風戾以食之注戾燥也蠶性惡濕記宅植桑宅不毛者有里布注謂不植桑麻也欲令丨丨丨麻則無税賦以勸之不植桑麻之毛者則罰以二十五家之税布周禮墻下桑五畆之宅植丨丨以丨孟子伊尹生丨丨丨於空桑列子舅犯謀晉公子重耳出奔齊齊桓公妻之行將丨丨丨於桑下蠶妾在其上聞之以告姜氏姜氏殺之謂公子曰子有四方之志其聞之者吾殺之矣左傳見桑婦晉文公㑹欲伐衛公子鉏仰而笑公問之曰臣之鄰人有送其妻適私家者道丨丨丨悦而與言然顧其妻亦有招之者矣臣切笑此公悟其言引師還未至而有伐其北鄙者列子採桑女齊瘤女東郭丨丨之丨項有大瘤閔王遊至東郭百姓盡觀惟瘤女採桑如故王恠問之對曰受父母敎採桑不受敎觀王王曰此竒女悦而聘迎之劉向列女傳壤宜桑齊帶山海膏丨千里丨丨庥與千户侯等史貨殖傳畝植桑子產開丨丨丨鄭人訾謗韓非子與餓人食見報徳門注贈美人金魯秋胡子納妻五日而官於陳後歸未至家見路旁有美婦方採桑秋胡悦之下車願託桑隂下婦人採桑不顧胡曰力田不如逢年力桑不如見郎今吾有金願與夫人而婦人不受胡乃歸母呼其婦乃向採桑者也數胡之罪而自投于河列女傳與邉女爭呉公子光伐楚拔之居巢鍾離初楚邉邑卑氏之處女與呉邉邑之女爭桑二家女相怒喧兩國楚邉邑長聞之怒而攻呉之邉邑呉王怒遂伐楚兩都國語作陌上歌邯鄲有美女姓秦名羅敷為邑人王仁妻仁後為趙王家令羅敷出採桑陌上趙王登臺見而悦之因飲酒欲奪焉羅敷善彈箏丨丨丨桑之丨以自明雀豹古今注桑下馴雉魯恭為中牟令雉馴于桑下後漢本傳桑以食蠶汝南尹昆為汝隂縣功曹令新到官問曰園中有丨丨丨丨何如昆曰非初至所當務謝承後漢書取葚異器蔡君仲汝南人至孝王莽亂人相食君仲丨桑丨赤黑丨丨賊問所以荅曰黒者供母赤者自食賊義之遺米二斗後漢書依樹為棟陳留申屠蟠耻無義士遂閉門養志蓬户萊室丨大桑丨以丨棟梁同上探樹得環羊祜五嵗時令乳母於東家桑樹中丨得金環白帖遥望如車蜀先主舍東南角南有桑高丈餘丨丨丨小丨蓋先主曰吾必當乗此羽葆車蓋叔父曰勿望言以滅吾門蜀志横出如蓋齊太祖在武進其宅南有桑樹高三丈丨丨四枝丨車丨太祖年數嵗遊其下從兄謂之曰此桑為汝生也北史徳操採桑龎士元師事司馬徳操不矜少名衆莫知之丨丨蠶月躬採桑後園士元助之因與談世廢興其言如神遂移日忘飱徳操於是異之三國志何祗夢桑何祗丨丨生井中趙直占曰桑字四十八君夀不過此矣後果然史書桑枯復生賈循母亡將𦵏宅有枯桑一夕再生人以為瑞孔帖桑䕃未徙尉遅敬徳丨丨丨丨而大功立本贊設扶桑葚謝𤣥卿遇神仙丨丨丨丹丨續仙傳罵大桑木五代㑹同二年契丹南掠邢洛磁至于安陽河焚掠殆盡契丹見大桑木丨曰吾知紫披襖出自汝身吾豈容汝活耶束薪於木而焚之史上桑條歌中宗庶人韋氏太史迦葉志忠丨丨丨丨十二篇言后當受命六帖作桑木想裴休得桑木根曰若作沉香想更無異想雖對沉水香反丨丨丨丨終不聞香諸相從心起雲仙散録陸機桑賦緑葉興而盈尺崇條蔓而増尋詩集提籠採洛陽城東路桃李生路傍不知誰家子丨丨行丨桑纎手折其枝花落何飄揚高秋八九月白露變為霜終年㑹飄墜安得久馨香何如盛年去䞁如永相忘吾欲竟此曲此曲愁人腸歸來酌美酒挾琴上高堂後漢宋少侯出門望丨自薊北丨遥丨湖池桑枝枝自相值葉葉自相當春色映空來先發院邉梅寄語採桑伴訝今春日短枝高攀不及細葉籠難滿梁簡文帝須葉滿今日開和景處處動春心桂筐丨丨丨息倦重枝隂梁主臺卿連枝痩賤妾愚不堪採桑渭城南帶減丨丨丨髪亂鳯凰簮無由報君信流涕向春蠶梁呉筠但道長野外罕人事窮巷寡輪鞅白日掩荆扉虛室絶塵想時復墟曲中披草共來徃相見無雜言丨丨桑麻丨桑麻日已長土物日以廣常恐霜霰至零落同草莽陶淵明所業在代耕本非望丨丨丨田桑躬親未曽替寒餒嘗糟糠豈期過滿腹但願飽粳糧御冬足大布麤絺以應陽正爾不能得哀哉亦可傷人皆盡獲宜拙生失其方理也可柰何且為陶一觴前人浮滄海種桑長江邉三月望當採枝條始欲茂忽值山河改柯葉自採折根株丨丨丨春蠶既無食寒衣欲誰待本不植高原今日復何悔前人起寒煙桑柘丨丨丨謝眺深雨露桑麻丨丨丨杜緑如雲桑柘丨丨丨葉如雨桑柘丨丨丨飛藿共徘徊並杜低緑枝春桑丨丨丨李白羅平蕪桑柘丨丨丨同上韋曲有自斷此身休問天丨丨幸丨桑麻田杜宅邉有丨丨丨桑葉張籍三年望見前注一村煙丨丨桑柘一村丨張籍野蠶食丨丨丨葉還成繭同上野雉驕桑間葚熟麥齊腰鶯語惺愡丨丨丨張文潜樂府葉齊如沃雨過園林觸處落紅凝緑正桑丨丨丨丨嬌羞只恐人偷目背立牆隂慢展纎纎玉馬聴啼鳩幾聲耳邉相促念蠶饑四眠初熟勸路傍立莫踟蹰是那口裏道秋胡曲錦纒頭張古洲古今合璧事類備要别集卷五十一
