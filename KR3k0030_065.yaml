body:
  text: 古今合璧事類備要前集卷六十五宋謝維新撰喪紀門奔喪事類哭成踊奔喪者齊衰以下入門左中庭北靣哭免麻于東即位袒與主人丨丨丨白氏六帖哭盡哀婦人奔喪升自東階殯東西面坐丨丨丨東髽即位與主人拾踊注婦人髽於東序不髽於房變於室也去縱大紒曰髽拾東也同上聞喪遂行奔喪之禮丨親丨以哭答使者盡哀問故又哭盡哀服布深衣素冠丨丨日行百里不以夜行惟父母之喪見星而行見星而舍若未得奔則成服而後行過州至境則哭盡哀而止哭避市朝望其州境哭此父母之喪也至於家內外哭待於堂上奔喪者入門而左升自西階殯東西面憑殯哭盡哀少退再拜退於序東被髮復殯東西面坐哭人盡哀尊卑撫哭如常訖內外各還其奔喪者乃還厥明坐於殯東如初未成服者三口成服通典奔喪不及聞喪不得奔喪乃為位括髮袒成踊襲絰絞帶即位於次又哭三哭括髮袒成踊若除喪而後歸則先之墓哭成踊東括髮袒絰遂除於家不哭注東即主人位除喪除喪而歸聞逺兄弟之喪既除喪而後聞免袒成踊拜賓則尚左手尚左言拜也白帖使還奔喪王朗使虞翻見豫章太守華歆圖起義兵未至聞孫䇿向會稽翻還遭父憂以奉命冇節不過家追朗至侯官還然後丨丨徒跣奔喪張曲江自徐州被髮丨丨趍喪所負土築塋晨夕號慟棄子奔喪李孝女名妙法瀛州博野人安祿山亂被劫徙他州聞父亡欲間道丨丨一子不忍去割一乳留以行奔喪不哭王獻之卒兄徽之丨丨丨丨直上靈牀坐取獻之琴彈之久而不調歎曰嗚呼子敬人琴俱亡因頓絶月餘亦卒奔喪得罪吉黃為長陵令時科禁長吏擅去官而黃門司徒趙溫薨自以為故吏丨丨為司𨽻鍾𨽻所收遂伏法死魏常林傳孫權詔三年之喪人情之極痛世治無事君子不奔人喪有事則殺禮從宜以義斷恩也顧談議以為奔喪立科輕則不足禁孝子之心重則本非應死之罪胡綜議宜從科以大辟有犯無赦其後吳縣令孟宗奔母喪而自拘於武昌以聽刑陸遜陳其素行減一等三國史不奔母喪吳起家纍千金遊仕不遂出衛郭門與其母别齧臂而盟曰起不為卿相不復入衛遂仕於魏為將母死終不歸曽子以為薄於孝而絶之史不奔父喪漢陳湯丨丨丨丨弔慰附君臨弔君遣弔事類往哭三年之喪雖功哀不弔如有服而將丨丨之則服其服而往即喪大功弔哭而退不聽事焉期之喪未葬弔於鄉人哭而退大功衰弔待事不執事小功緦麻執事不於禮禮奠饋也白帖相引弔賔至掌次者引之次賓著素服相者入告內外縗服丨者丨主人以下立哭於阼階下婦人升哭於殯西相者引賓入立於庭北面西上為首者一人進當主人東靣立云如何不淑主人哭再拜稽顙為首者復北靣位弔者俱哭十餘聲相者引出少頃相者引主人以下各還次通典弔而不傷知生者弔知死者傷知生而不知死丨丨丨丨知死而不知生傷而不弔曲禮死而不弔丨丨丨丨者三謂輕身忘孝也畏人或以非罪攻已不能有以説之死之者厭行止危險溺不乘橋船檀弓弔不飲酒行丨之日丨丨丨食肉馬同上弔不越疆五十無車者不越疆而弔人檀弓婦人不越疆而弔人弔日不樂丨於人是丨丨丨同上哭日不歌子食於有喪者之側木嘗飽也子於是日哭則不歌語上羔裘不弔丨丨玄冠丨以丨語十齊衰往弔子張死曽子有母之喪則丨丨而丨哭之或曰齊衰不以丨曽子曰我弔也與哉記檀弓篇帶絰而入子遊裼裘而弔曾子蓋非之主人既小斂袒括髮子遊襲裘丨丨丨丨曽子曰我過矣夫夫是也注禮主變客乃變練冠以待衛將軍文子之喪既除喪而越人來弔深衣丨丨丨丨於廟垂涕洟子遊曰其庶幾乎動也中號哭老𥅆老𥅆死偃然寢於巨室而我噭噭然隨而哭之人哭亦哭人號亦號慟哭顔淵顔淵死子哭之慟從者曰有慟乎曰非夫人之為慟而誰為受弔中庭孔子哭子路於中庭人有弔者而夫子拜之檀弓出弔東郭孟子將朝王王使人來對口不幸而有疾不能造朝明日丨丨於丨丨公孫丑曰昔者辭以疾今日弔或者不可乎曰昔者疾今日愈如之何不弔公孫丑下弔不踰階公行子有子之喪右師入丨孟子不與右師言右師不悅曰諸君子皆與歡言孟子獨不與歡言是簡歡也孟子聞之曰禮朝廷不歷位而相與言丨丨丨而相揖也我欲行禮子故以我為簡不亦異乎離婁弔不於郊齊侯遇杞梁之妻於郊使弔之辭曰有先人之敝廬在下妾不敢與郊弔齊侯弔於其室襄十三畫宫受弔哀公使人弔蕢尚遇諸道避於路丨丨而丨丨馬曽子曰蕢尚不如杞梁之妻之知禮也檀弓設席行弔衛大經蒲州解人素善魏夏侯乾童聞其母卒盛暑往弔或止之曰方夏涉逺不如致書答曰書能盡意耶比至乾童以事行乃丨丨丨丨禮不詣其家而還孔帖箕踞待弔阮步兵籍喪母裴令公楷往弔之阮方醉散髮坐床丨丨不哭裴至下席哭弔唁畢復去或弔裴凡弔主人哭容乃為禮阮既不哭君何為哭裴曰阮方外之人故不崇禮制我俗輩中人久以儀軌自居時人以為兩得其中廬前受弔齊浣母亡受弔廬前賓客未嘗至柩室語人曰平生非至親不升堂入謁豈以存亡變禮耶及門而反王羲之代王述為會稽太守少齊名而羲之輕述述母喪羲之心止一弔竟不重詣後言往弔入門主人哭不前而反欲以辱之述甚恨也乘醉而入王悅字元逹弱冠知名恃才放酒誕節慕王澄為人婦父嘗有慘悅丨丨弔之婦父哭慟恱與賓客十餘人連臂被髮祼身丨丨繞之三匝而去鼓琴而哭顧榮素好琴張翰哭之上床鼓琴數曲撫琴而歎曰顧彥先能復賞此否因又哭不弔喪主而去致芻而去徐稚字孺子郭林宗有母憂稚往弔之丨生丨一束於廬前丨丨衆怪不知其故林宗曰此必南州髙士徐孺子也詩不云生芻一束其人如玉吾無德以將之弔莫知名漢龔勝死有父老弔之甚哀曰膏以明自煎龔生竟夭其天年人莫知名也弔無雜賓王祥之薨奔赴者非朝廷之賢則親戚故吏而已門無雜弔之賓本傳淚如河注人問顧長康哭桓宣武之狀如何曰鼻如廣莫風眼如懸河決聲如振雷破山丨丨傾丨丨海世説弔作驢鳴王仲宣粲好驢鳴既葬文帝臨其喪顧謂同逰曰王好丨丨可作一聲送之坐客昏作丨丨世説孫子荆楚有才少所推服唯雅敬王武子濟武子喪時名士無不至者子荆後來臨尸慟哭賓客莫不垂涕哭畢白靈床曰卿嘗好我詐丨丨今我為卿作體似聲真賓客皆笑孫舉頭曰使君輩存今此人死青蠅為弔吳虞翻放棄南方云自恨疏節骨體不媚犯上獲罪當長沒海隅生無可與語死以丨丨丨丨客使天下無一人知己者足以不恨雙鶴來弔晉陶侃為江夏太守母憂去職有二客來弔不哭而退化為雙鶴沖天而去百官會弔孔光薨公卿丨丨丨丨本傳百官臨弔畢集孔光之門常衮華州刺史墓志萬里赴弔徐稚有死喪丨丨負笈丨丨後漢書赴者三萬陳實字仲弓卒子家大將軍何進遣使弔祭海內丨丨丨丨餘人制衰麻者以百數共利石立碑諡為文範先生誄者四十郗超死之日貴賤操筆為丨丨丨丨餘人晉中興書痛沒賢子王愆期謂陶侃曰賢子越騎酷沒天下為公痛心况慈父情耶世説獨弔將士秦叔寶始為隋將來護兒遣使襚弔之吏怪曰士卒死喪將軍未有所問今獨弔叔寶何也護兒曰是子才而武忠節完整豈久處卑賤耶感慟致哀衛洗馬玠亡葬南昌城許徴墓東玠之薨謝幼輿發哀於武吕丨丨不自勝人問子何恤而丨丨如是答曰棟梁折矣何得不哀情至過哀唐元德秀死族弟結哭之慟或曰子哭過哀結曰若知哀之過而不知丨之丨大夫弱無固性專老無在死無餘生六十年未嘗識女及未嘗有十畝之地十尺之宅十嵗之僮未嘗完布帛而衣具五味而食吾哀之以戒荒淫貪佞綺紈梁肉之徒念妾嗚咽宋劉德願為孝武狎侮殷貴妃薨上與羣臣至墓謂德願曰卿哭貴妃若悲當厚賞德願應聲號慟上悅以為豫州刺史又令醫術羊志哭殷志亦嗚咽人問卿那得此副悉淚志曰我爾日自哭亡妾耳含辛為淚符后死慕容熙制百僚於宫內哭使有司按驗無淚者罪之羣臣莫不丨丨以丨丨通鑑匍匐往弔陳烈福州人以鄉行稱尤為蔡君謨所知然烈行怪多偽蔡君謨母死烈往弔自其家丨丨而進人問之曰此詩所謂凡民有喪丨丨救之者也其所為類如此石林燕語朝服不弔丁晉公謂言嘗見常武太原王公言先太師傾背時朝賢來相弔朱紫盈門惟徐左省鉉獨擕一麻袍角帶於客位內更易後方入相弔以此知士大夫具朝服臨哀弔問深不可也先太師即兵部侍郎祐也談録君臨弔史鰌尸諫衛靈公時蘧伯玉賢而不用彌子瑕不肖而任事大夫史鰌患之數以諫不聽史鰌病且死謂其子曰我生不能正君者死不當成禮置尸北堂足矣丨丨死靈公住弔問其故具以父言對靈公蹶然易容曰夫子死以丨丨可謂忠不衰矣於是召蘧伯玉而進之以為卿退彌子瑕徙喪正堂成禮談録尼父哀誄魯哀公誄孔丘曰天不遺耆老莫相子位焉嗚呼哀哉尼父車駕臨喪祭遵卒帝愍悼之尤甚喪至河南縣詔遣百官先會葬車駕素服臨之望哭哀慟每嘆曰安得憂國奉公之臣如祭征虜者乎髙士廉卒帝欲臨弔房玄齡以帝餌金石諫不宜近喪帝曰朕有舊故姻戚之重君臣之分卿置勿言即從數百騎出長孫無忌伏馬前陳士亷遺言乞勿臨喪帝猶不許無忌至流涕乃還涕淚成冰羊祐卒武帝素服哭之甚哀是日天寒帝丨丨霑鬚鬢皆丨丨馬南州人征市日聞祜喪皆號慟罷市巷哭者聲相接吳守邉士亦為之哭仁德所感如此君遣弔以詩遣弔白居易卒宣宗以詩弔之遣使會弔楊綰薨帝驚悼詔贈司徒丨丨者册授欲及其未斂也遣百官會苐弔中使設祭張曲江既薨元宗追歎曰自公歿後不聞􅀈言發中使至韶州弔中人臨弔李嗣業卒葬日使丨丨丨丨丨李吉甫卒目大殮至卒哭皆丨丨丨郎中臨弔李惟簡訃至上悼愴罷朝遣丨丨丨丨韓文李志京官赴弔尉遲恭卒髙宗詔丨丨五品以上及朝集使丨第臨弔祭奠附君遣祭事類朝奠丨丨日出夕奠逮日禮記朔奠有薦新如丨丨同上寄酹濁醪一樽丨丨千里汪龍溪寫哀芻靈就列遣奠停軌樽酒丨丨權載之奠以敘哀韓文薦醪泉壞殊途幽明求隔感平生其若斯聊申絮酒儻聰明之不昧式丨簞丨輅賓王奠斚遣使丨丨百酸攪腸音容若生曷日而忘李翺祭文蘋蘩蕰藻茍有明信澗溪沼沚之毛丨丨丨丨之菜可羞于王公可薦于鬼神左傳蕙蘭桂椒丨肴蒸兮丨藉奠丨酒兮丨漿九歌明齊溲酒加薦普淖丨丨丨丨儀禮士虞禮法樽酒簋二丨丨丨丨涕零如雨權載之炙雞往祭徐稚為太尉黃瓊所辟不就及瓊卒歸葬者負糧徒步到江夏哭之設雞酒薄祭哭畢而去不告姓名又云諸公所辟雖不就有死喪負笈赴事嘗於家預炙雞一隻以一兩棉絮漬酒暴乾以裏雞徑到所葬家隧外以水漬綿使有酒氣斗米飲白茅為藉以雞置前酹酒畢則去不見喪主刲股致祭崔從太和六年卒下有刲肉以祭者鳥胤既殁士二千人丨丨丨丨斗酒隻雞曹操感太尉橋玄知己及後經過玄墓自為祭文曰承從容誓約之言殂殁之後路有經由不以丨丨丨丨相沃酹車過三步腹痛勿怨雖臨時戲笑之言非至親之篤好胡肯為此哉白粥生芻呂才母喪以哀毁卒通義郎餘令以丨丨元酒丨丨祭路世人哀之生芻事詳見前弔類設位沃饋李勉嘗引李巡張參在幕府後二人卒至宴餘乃丨虛丨丨丨之過墓祭奠白傳葬龍門山河南尹盧貞刻醉吟先生傳立于墓側今洛陽士庶及四方逰人過其墓者必奠以巵酒冢前方丈之土常成泥濘賈黃中談録祭柳子厚嗟嗟子厚而至然耶自古莫不然吾又何嗟人之生世如夢一覺其間利害竟亦何校當其夢時有樂有悲及其既覺豈足追惟凡物之生不願為材犧樽青黃乃木之災子之中葉天脫弔羈玉佩瓊琚大放厥辭富貴無能磨滅誰紀子之自著表表愈偉不善為斫血指汙顔巧匠旁觀縮手袖間子之文章而不用世乃令吾徒掌帝之制子之視人自以無前一斥不復羣飛刺天嗟嗟子厚今也則亡臨絶之音一何琅琅遍告諸友而寄厥子不鄙謂余亦託以死凡今之交觀世厚薄余豈可保能承子託非我知子子實命我猶為鬼神寧敢遺墮念子永歸無復來期設祭棺前矢心以辭嗚呼哀哉韓文公祭歐文忠嗚呼哀哉公之於世六十有六年民有父母國有蓍龜斯文有傳學者有師君子有所恃而不恐小人有所畏而不為譬如大川喬嶽雖不可見其運動而功利之及於物者蓋不可以數計而周知今公之沒也赤子無所仰庇而朝廷無所稽疑斯文化於異端學者至於用夷君子無與為善而小人沛然自以為得時譬如深山大澤龍亡而虎逝則變怪百出舞鰌鱔而號狐狸昔公之未用也天下以為病而其既用也則又以為遲及其釋位而去也莫不冀其復用至於請老而歸也英不悵然失望而猶庶幾於萬一者幸公之未衰孰謂公無復有意於斯人也奄一去而莫豫追惟厭世之溷濁潔身而逝乎將民之無祿而天莫肯違昔我先君懷寶避世非公則莫能致而不肖無狀寅緣出入受教門下者十有六年於斯聞公之喪義當匍匐而往弔而懷祿不去愧古人以忸怩緘辭千里以寓一哀而已蓋上以為天下慟而下以哭吾私蘇子瞻夫事有人力之可致猶不可期况乎天理之冥漠又安可得而推惟公生有聞於當時死有傳於後世茍能如此足矣而亦又何悲如公器質之深厚智識之俊髙逺而輔以學術之精微故形於文章見於議論豪健偉怪巧瑰琦其積於中者浩如江河之停蓄具發於外者爛如日星之光輝其清音幽韻凄如飄風急雨之驟至其雄辭宏辨快如輕車駿馬之奔馳世之學者無問乎識與不識而讀其文則其人可知嗚呼自公仕官四十年上下往返感世路之﨑嶇雖迍邅困躓竄斥流離而終不可掩者以其公議之是非既壓復起遂顯於世果敢之氣剛正之節至晚而不衰方仁宗皇帝臨朝之末年顧念後事謂如公者可以寄社稷之安危及夫發謀決䇿從容指顧立定大計謂千載而一時功名成就不居而去其出處進退又庶乎英魄靈氣不隨異物腐散而長在乎箕山之側與頴水之湄然天下之無賢不肖且猶為涕泣而欷歔而况朝士大夫乎昔遊從又豫心之所嚮慕而瞻依嗚呼盛衰興廢之理自古如此而臨風想望不能忘情者念公之不可復見而其誰與歸王介甫祭尹師魯嗟夫師魯辨足以窮萬物而不能當一獄吏志可以挾四海而無所措其一身窮山之崖野水之濱猿猱之窟麋鹿之羣猶不容其間兮遂即萬鬼而為鄰嗟乎師魯世之惡子之多未必若愛子者之衆何其窮而至此兮得非命在乎天而不在乎人方其奔顛斥逐困厄艱屯舉世皆寃而語言未嘗以自及以窮至死而妻子不見其悲欣用捨進退屈伸語默夫何能然乃學之力至其握手為訣隱几待終紅顔色不變笑言從容死生之間既已通於性命憂患之至宜其不纍於心胸自子云逝善人宜哀子能自逹豫又何悲惟其師友之益平生之舊情之難忘言不可究嗟夫師魯自古有死皆歸無物惟聖與賢雖埋不沒尤於文章焯若星日子之所為後世師法雖嗣子尚幼未足以付豫而世人藏之庶可無於墜失子於衆人最愛子文寓辭千里侑此一鐏冀以慰子聞乎不聞歐陽永敘祭蘇子美哀哀子美命止斯耶小人之幸君子之嗟子美之心胸蟠龍蛇風雲變化雨雹交加忽然揮斧霹靂轟車人有遭之心驚膽落震仆如麻須臾霽止而回顧百里山川草木開發萌芽子於文章雄豪放肆有如此者吁可怪耶嗟乎世人知此而已貪恱其外不窺其內欲知子心窮達之際金石雖堅尚可破碎子於窮逹始終仁義唯久不知乃窮至此藴而不見遂以沒地獨留文章照耀後世嗟世之愚掩抑毁傷譬如磨鑑不滅愈光一世之短萬世之長其間得失不待較量哀哀子美來舉豫觴歐陽永敘祭司馬公嗚呼百世一人千載一時惟時與人鮮偶竒竒公事仁宗百未一施獨發大議唯天我知厚陵之初先事而規帝欲得民一尊無私母子之間莫如孝慈人所難言我則易之神宗知公敬如蓍龜專談仁義輔以書詩枉尺直尋願公少卑公曰天子舜禹之姿我若言利非天誰欺退居于洛四海是儀化及豚魚名聞乳兒上聖見公口子得師付以衡石惟公所為公亦何為視民所宜有莠則鋤有疾則醫問疾所生師老兵疲和戎上䇿決用無疑此計一定太平可基譬如農夫既闢既舊投種未粒引穫而炊賓客滿門公以疾辭不見十日入哭其帷天為雨泣路人垂洟畫像於家飲食必祠矧我衆僚左右疇咨共載一舟喪其楫維終天之訣寧復來思歌此奠章以侑一巵蘇子瞻祭范蜀公仁宗在位四十二年畦而種之有得皆賢既歷三世悉為名臣今如晨星存者幾人孰知我公碩大先明導日而升燦馬長庚死生契闊公獨夀考天實耆之以殿諸老二聖嗣位仁義是施公昔所言略行無遺維樂未和公寢不寧樂成其薨公往則暝凡百君子願公無極胡不萬年以重三國責難之忠愛莫助之嗟我後來誰復似之吾先君子秉德不耀公輿兄弟一日之少窮逹不齊歡則無間先友善矣我已白髮聞公之喪方食哽噎堂堂我公豈其而亡望公凜然猶舉我觴蘇子由祭張敬夫嗚呼敬夫遽棄子而死也耶我昔求道未獲其友蔽莫子開吝莫豫剖蓋自從公而覿於大業之規模察彼羣臣之紛紏於是相與切磋以究之而又相厲以死守也丙戌之冬風雪南山解袂諸州今十五年公試畿輔公翔禁省公牧豫南我遁巖嶺顯晦殊途心莫興同書疏悃惻鬼神可通公尹江陵我官盧嶽驛騎相望音問愈數去臘之窮有來自西告我公疾手書在擕我觀于時神理或僭是疾雖微已足深念亟遣問訊閲月而歸叩函發書歎吒歔欷時友曽子實同我憂揮涕請行誼不忍留曽行未幾公訃果至張侯適來相向反袂嗚呼敬夫竟棄子而死也耶惟我家傳忠孝學造精微外為軍民之所屬望內為學者之所依歸治民以寬事君以敬正大光明表裏輝映自我觀之非惟十駕之弗及蓋未必終日言而可盡也矧聞公喪痛徹心膂緘詞寄哀不遑他語顧聞公之臨絶手遺疏以納忠召賓佐而與訣委符節而告終蓋所謂得正而斃者又凜乎其有史魚之風此猶足以為吾道而增氣抑又可以卜悟於宸聰又聞公於此時屬其弟以語豫用斯文以為寄意懇懇而無餘顧何德以堪之然敢不竭其庸虛并矢詞以為報尚精爽其鑒兹又具位朱某竊聞故友敬夫張兄右文殿修撰大葬有期謹遣清酌時羞奠于柩前南望拜哭起而言曰嗚呼自孔孟之云逺聖學絶而莫繼得周張與程子道乃抗而不墜然微言之輟響今未及乎百嵗士各私其所聞已不勝其乖異嗟惟我之與兄吻志同而心契或面講而未窮又書傳而不置蓋有我之所是而兄以為非亦有兄之所無而我之所議又有私所共嚮而終悟其遍亦有早所同擠而晚得其味蓋繳紛往反者幾十餘年末乃同歸而一致由是上而天道之微逺而聖言之祕近則進修之方大則行藏之義以兄之明固已洞照而無遺若我之愚亦幸切窺其一二然兄喬木之故家而我衡茅之賤士兄髙明而宏博我狷狹而迂滯故我嘗謂兄宜以是而行之當時兄亦謂我盍以是而傳之來裔蓋雖隱顯之或殊實則交需而共濟不惟相知之甚審抑亦自靖而無愧嗚呼孰謂乃使兄終在外以違其心豫亦見縻於斯而所願將不遂也政使得間以就其書是亦任左肱而失右臂也傷哉吾道之窮豫復何心於此世也惟修身補過以畢餘年庶有以見兄於地下也聞兄之葬而不得臨獨南望長號以寄此酹也惟兄憐而鑒之尚有以輔子之志也嗚呼哀哉朱元晦祭呂伯恭嗚呼哀哉天降割於有德何其酷耶往嵗已奪吾敬夫今者伯恭胡為又至於不淑耶道學將誰使之振君德將誰使之復後生將誰使之誨斯民將誰使之福説經將誰使之繼事記將誰使之續耶若我之愚則病將誰為之針過將誰為之督耶然則伯恭之亡曷為而不使我失聲而驚呼號天而慟哭耶嗚呼伯恭有蓍龜之智而處之若愚有河漢之辨而守之若訥胸有雲夢之富而不以自多詞有黼黻之華而不易其出此固今人之所難而未足以議兄之倣佛也若乃孝友絶人而勉勵如弗及恬淡寡欲而持守不少懈盡言以納忠而羞為訐秉義以飭躬而恥為介是則古之君子尚或難之而吾伯恭猶欿然而未肯以自大也蓋其德宇寬洪識量間廓既海納而淵澄豈澄清而撓濁矧涵濡於先訓紹文獻於厥家又隆師而親友極討論之幽遐所以稟之既厚而養之深取之既博而成之粹宜所立之甚髙亦無求而不備故其講道於家則時雨之化進位於朝則鴻羽之儀造辟陳謨則宣公獨御之對承詔奏篇則右尹祈招之詩上方虛心而聽納衆亦注目其數施何遭時之不遂遽縈疾而言歸慨一卧以三年尚左圖而右書間逍遙以曵杖恍沂上之風雩衆咸喜其有瘳冀卒攄其素藴不則傳道以著書抑亦後來之程凖何此望之難必奄一夕而長終增有邦之殄瘁極吾黨之哀恫嗚呼哀哉我實無似兄辱與遊講摩深切情義綢繆粵前日之枉書尚粲然其手筆始言沉痼之難除猶幸死期之末即中語簡編之次第卒誇草樹之深幽謂昔騰箋而有約盍今命駕以來逰欣此旨之可懷凛計車而偕至考日月之幾何不旦暮之三四嗚呼伯恭而遽死耶吾道之哀乃至此耶既為位以泄哀復緘辭以寓奠冀嗣嵗之有間尚前言之可踐嗚呼哀哉朱元晦祭劉恭父嗚呼哀哉天胡付公以瓌竒後偉之材而不并假以者耋期耄之夀胡位公以樞機藩屏之重而不遂畀以彌綸贊輔之權使公名若極富貴而無欲實則抱憂嘆以終天此中外志義之士所以聞公之薨皆失聲而相弔或雖未識公面而亦不自知其涕泗之流漣者也嗚呼哀哉惟公生有異質早擢巍科退而自葆弗競弗譁屈首受書典學于家內充其美外振厥華暨登王朝遂掌綸綍獻納綢繆訏謨密勿忤權觸要無所回屈帝眷弗渝試以郡紱受鉞于南勦頑踣凶婉孌赤子撫摩哀恫禮賢勸學導和致豐報政三年鄒魯其風帝曰來歸振我兵柄曾不幾時咨以大政公奮其庸帝虛以聽張磔宏綱塞絶僭令道直身危突不暇黔出臨兩鎮咸燀思漸適嬉于堂遽哭于苦恩詔起之有竦其詹公卧弗承帝悉其孝曰究汝哀來覲來教公言益切公守不撓再撫于潭亦顯其效乃遷建業民病以飢公不寢食起坐嗟咨方略既張惠術四施曾是流莩化為充肥帝嘉乃勳加勞進律倚毗萬深遽告以疾忠無隱情諫有遺筆帝驚罷朝悼此良弼嗚呼哀哉我以孤童來託公家公不我鄙勸導有加公姿鸞鵠我性麏麚豈無異同卒莫疵瑕自公進為議論慷慨實始期公髙明光大公之知我亦晚而最逮其永歸手札告戒褒德撫孤古昔所艱并以諉我我其敢安把書長號涕隕闌干還坐以思慨其永歎念昔帝師為國死義亞傳承之夷險一致屏山雖隱亦豈忘世公襲其傳克廣無替衆咸謂公當訖外庸入贊皇極下釐庶工登賢屏姦復境攘戎內繼祖考畢其餘忠天胡難諶而止於此羣邪交慶衆正心死矧豫之懷竊究終始願言思公曷其有已嗚呼哀哉昔誦離騷舉公觴兮今拜以哭酹公堂兮私情公義兩怛傷兮神靈不昧尚克鑒豫之衷腸兮嗚呼哀哉朱元晦祭鄭自明故友台州史君大著鄭兄自明之靈曰比年以來上氣哀弱觀時俯仰徇勢前却其心有一身而無天下其口有唯唯而無諤諤偉哉自明之為人信所謂喧啾百鳥之羣忽見秋天之一鶚者也蓋自其布衣而已有憂天下之心其揖讓人主之前則直欲排佞幸之朋從而折其角其言明白切至磊磊落落憤激峻厲嶢嶢嶽嶽明主所為虛心而嘉嘆羣公所為變容而駭愕善類所為喜幸而心開邪黨所為戚嗟而氣索偉哉自明之為人凛乎其有古爭臣之風求之近世則措之鄒陳之間而無怍者也夫何天命之不延竒禍一朝而遽作使前之悲者喜而喜者悲紛慶吊之交錯嗚呼哀哉君昔過我寒泉之濱一語定交情義日親逮上饒之草次語霄分而更僕謂當擇善以潛心毋以一長而自足粵今兹之秋孟又札書以申之眷子心之悃欵實千載以為期書適往而訃來噭馬號其馬及哦殄瘁之悲詩坌百憂之來集惟平生之忠赤諒雖死而不忘跪陳情於一酹詞與淚以俱揚嗚呼哀哉朱元晦君遣祭食瓜遣奠萊國公杜如晦薨太宗詔虞世南為制碑文後因食瓜美愴然悼之遂輟食丨丨于靈座唐火勑饌往祭髙士亷卒方寒食敕尚宫以食四輿往祭命使弔祠辛雲京卒及葬丨丨丨丨時將相祭奠者至七十餘幄喪車移咎乃得去遣使設祭明皇幸蜀一日登髙山望秦川謂髙力士曰吾聽張九齡言不至此遣使祭之賻贈附君遣賻助喪事類賻賵知生則丨知死則丨賻之為言助也賵之為言覆也輿馬曰賵貨財曰丨玩好曰贈決其意也衣被曰襚養死具也春秋説題辭贈襚贈助也賵赴也所以助生送死追逺思終副至意也丨之為言稱也丨之為言遺也白虎通乘馬曰賵衣衾曰襚具玉曰唅錢財曰賻穀梁傳佐生賻贈所以丨丨贈襚所以送死荀大略贈死丨丨不及尸非禮也注尸未葬之通稱隱元年不問費弔喪弗能賻丨丨其所丨記曲禮無親受賻者既致命坐委之擯者舉之主人丨丨丨也注喪者非尸柩之事不親也贈玄纁魯人之贈也三玄三纁儀禮賓有丨者既祖奠賓立於大門外西廂東面從者以篚奉玄纁立於西南相者受命出西面曰敢請事賓曰某敢賵相者入告出曰某孤須矣執篚者奠取幣以受賓唐志奉束帛使者立於大門外之西東面從者以篚丨玄纁丨丨立於使者之西南俱東面凡賻通貨賵相者入告主人立哭相者進主人前東面受命出詣使者前西面口敢請事使之從者以篚進詣使者前西向以授使者退復位使者曰某封某官某子使某賻相者入告出曰孤某須矣相者引使者入立於內門外之西東面主人止哭使者少進東面曰某封若某官使某賻主人哭再拜使者少進坐委之興復位掌事者進坐舉之興以東使者出主人拜送通典班賻布子栁之母死子碩請其子栁曰何以哉子碩曰請粥庶弟之母子栁曰如之何其粥人之母以葬其母也不可既葬子碩欲以賻布之餘具祭器子栁曰不可吾聞之也君子不家於喪請班諸兄弟之貧者注家於喪謂因死者以為利班分賜之也攝束帛伯髙之喪孔子之使者未至冉子丨丨丨乘馬而將之孔子曰異哉徒使我不誠於伯髙説驂以贈孔子之衛遇舊館人之喪入而哭之哀出使子貢丨丨丨丨之子貢曰於門人之喪未有所説驂説驂於舊館旡乃已重乎夫子曰豫鄉者入而哭之遇於一哀而出涕豫惡夫涕之無從也小子行之懷縑以贈後漢王丹字仲回好周給有喪者則賻給親自營護遭喪者輒待丹為辦河南守陳遵關西之大俠也其友人喪親遵為護喪事賻助甚豐丹乃懷縑一匹陳於主人前曰如丹此縑出自機杼遵聞而有慙色本傳遜還賻送漢原涉祖父為南陽太守死官賦斂送葬皆千萬以上涉讓還之本傳辭却贈賻王溫為涼州刺史卒故吏賻贈數百萬其子戍辭而不受由是顯名本傳不取賵遺陸贄以喪解官客東都諸方賵遺一不取惟韋阜以布衣交先以聞故所致輒稱詔受之悉辭贈賻管寧字幼安喪父中表愍其孤貧咸共贈賻悉辭不受稱財以送終本傳竇建德父卒里中送葬千餘人所贈弔皆讓不受君遣賻祭服以襚衛有太史曰栁莊寢疾公曰若疾革雖當祭必告公再拜稽首請於尸曰有臣栁莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以襚之鄭注不脫君丨丨丨丨臣親賢也記檀弓珠玉以贈季平子卒將以君之璠璵斂贈以珠玉孔子聞之曰送死以寶玉是猶暴尸於中原示人以姦利之端家語給以絹布房元齡薨丨丨丨二千假粟三千斛賜之粟帛孔巢父卒賜其家粟帛存恤之賵禮為縟裴度薨丨丨丨丨厚禮贈恤李績卒帝曰績奉上忠事親孝歷三朝未嘗有過性亷謹不立産業今亡當旡贏資有司其厚贈恤之給俸為賵鄭餘慶卒帝以其貧特丨一月丨料丨丨襚賻布尤厚崔敦禮卒髙宗為舉哀東雲龍門丨丨祕器丨丨賻絹千匹田神功死丨賵丨丨丨布五百端百官弔喪賜屏風茵褥飯千柔門追福賜錢百萬歐陽地餘貴幸至少府戒子曰我死官屬送汝財勿受也子如父命天子嘉之丨丨丨丨助喪助之沐椁孔子之故人原壞母死夫子丨丨丨丨原壞登木曰久矣子之不託於音也歌曰貍首之班然執女手之拳然夫子為弗聞也者而過之注沐治也禮記為之治喪何蕃和州人居太學二十年有死喪旡歸者皆身丨丨丨丨見賻贈類王丹事以俸辦葬何易于為邑昌令民有死喪不能具葬者以俸敕吏為辦之解牛給喪竇建德鄉人喪親貧無以葬建德方耕聞之太息遽丨丨與丨丨事鄉黨異之本傳家資傾送唐郭震字元振年十六與薛稷趙彥昭同為太學生家嘗送資錢四十萬會有縗服者叩門自言五世未葬願假以治喪元振舉與之無少吝亦不質名氏稷等嘆駭河東栁先生仲塗少時縱飲酒肆坐側有書生接語乃以貧未能葬其父母將謁魏守王公祐求資以辦事先生問費幾何曰得錢二十萬可矣先生曰子姑就舍吾且為子謀之整其資得白金百萬錢數萬以遺之議者以郭代公之義不能逺過澠水燕談麥舟為贈本朝范文正公仲淹在睢陽遣堯夫到姑蘇般麥五百斛堯夫時尚少既還舟次丹陽見石曼卿問寄此何久答曰兩月矣三喪在淺土欲葬之而北歸無可與謀者堯夫以所載麥舟付之到家侍立良久文正曰東吳見故舊乎曰曼卿為三喪未舉方滯丹陽時無郭元振旡可告者文正曰何不以麥舟與之堯夫曰已付之矣冷齋夜話詩集以贐分遺同年友李君諱惇字憲仲賢而有文不幸早世軾不及與之逰也而識其子薦有年矣薦自陽翟見余於南京泣曰吾祖母邉母馬前母張與君之喪皆未葬貧不敢以飢寒為戚顧四喪未舉死不暝目矣適故人梁先吉老聞余將歸耕陽羡以絹十匹絲百兩為贐辭之不可乃以遺薦曰此亦仁人之餽也既又作詩以告知君與薦者庶幾皆有以助之薦年二十五其文曄然氣莭不凡此豈終窮也哉大夢行當覺吾年特未滿遑哀已逝人長眠寄孤館念我同年生意長日月短鹽車困騏驥烈火廢圭瓚後生有竒骨出語已精悍蕭然野鶴姿誰復識中散有生寓大塊死者誰不窽嗟君獨久客不識黃土暖推衣助孝子一溉滋湯旱誰能脫左驂大事不可緩蘇子瞻作詩少助章默居士字季明生公侯家才性髙爽棄家求道不蓄妻子與世旡纍而父母與兄之喪貧不能舉以是春眷世間不能旡求於人余深哀其志既有以少助之又取其言為詩以贈其行庶幾有哀之者章子親未葬餘生抱羸疾朝吟噎鄉里夜淚腐茵席前年黑花生今嵗白髮出身隨日月逝恨與天地畢願求不毛田親築長夜室難從王孫祼未忍夏后堲五陵多豪士百萬付一擲心知義財難甘就貧友乞不辭毛髮施行自丘山積此志茍朝遂夕死真不滅誓求無生理不踐有為迹棄身尸陀林烏鳶任狼籍前人古今合璧事類備要前集卷六十五
