body:
  text: 古今合璧事類備要别集卷八十九宋謝維新撰蟲象門蛇格物總論蛇按本草山海經爾雅等書腹行數種或青或赤或黃或白或黑或白黑相間或金色或銀色或黑質白章或方勝白花紋又有頭斑而身赤者有青黑色者有大僅如指者有兩頭者有人面者有當中有約頭毒尾良者有形似鱧魚頭若鼉頭尾圓無鱗者有徑三二圍長十許丈而能吞鹿者有博三寸首大如擘有牙最毒者又有細頸大頭色如文綬紋紋間有毛如豬鬛鼻上有針者遽數之不能終其物也然本毒蟲有無毒者本鱗蟲有無鱗者鼻本皆向下而有鼻向上生者猶未也有所謂蝮有所謂虺有所謂帶有所謂蟒有所謂螣蛇螣蛇龍屬能興雲霧蟒蛇中最大者故曰蟒玊帶小蛇也虺與蝮又自一種蝮黃黑色黃頷尖口毒最烈虺形短而扁毒不減於蝮今一種形一類於蛇浮遊水上不傷人其名曰蛇婆此蛇之大略也事類吞象巴蛇丨丨三嵗而出其骨山海經又一蛇丨丨蛇大若何楚辭吞鹿蚺蛇長十丈嘗丨丨鹿消盡乃繞樹出骨本草注藥性論蚿憐丨丨蛇曰吾以衆足行而不及子之無足莊子蛆甘蝍丨丨帶注蝍蛆吳公也帶小蛇蝍蛆喜食其眼莊子崑崙蛇丨丨山周三萬里丨繞之三周長九萬里玄中記常山蛇率然者丨丨之丨也擊其首則尾至擊其尾則首至擊其中則首尾俱至孫子鷣鳥食巴之蛇百類云云丨丨能丨其小者元稹集吳公禁南人入山皆以竹管盛活丨丨知有蛇之地便動作於管中如此則草中便有蛇也吳公見蛇能以氣丨之蛇即死雄黃辟昔負丘多大蛇又生好藥黃帝將登焉廣成子教之佩丨丨而蛇皆去並抱朴子驅蛇放菹當堯之時水逆行汜濫於中國蛇龍居之民無所定下者為巢上者為營窟云云使禹治之禹掘地而注之海丨丨龍而丨之丨水由地中行江淮河漢是也孟滕文公下夢蛇生女斯干宣王考室也吉丨維何維虺維丨大人占之維虺維蛇女中之祥乃丨丨子載寢之地詩蛇鬬南門內蛇與外丨丨於鄭丨丨中內蛇死六年而鄭厲公入殺鄭子申繻曰妖由人興人無釁焉妖不自作棄常則妖興也左蛇出泉宮有丨丨丨丨出入于國如先君之數秋聲薑薨遂毁泉臺注公以為丨妖所丨而聲薑薨故壞之左文十六擊蛇傷肱逢丑父寢於轏中蛇出於其下以肱丨之傷而匿之故不能推車而及左成二年畫蛇添足見愚拙門為蛇薦食吳丨封豕長丨丨丨上國生蛇禍女叔向之母妒叔虎之母美而不使其子皆諫其母曰深山大澤實生龍蛇彼美余懼其丨龍丨以丨丨女敝族也左襄十二年見兩頭蛇孫叔敖為兒時出遊丨丨丨丨殺而埋之歸泣白母曰兒聞丨丨丨丨者必死恐後人見乃殺而埋之母曰爾有隂德必有陽報德勝不祥仁除百禍汝無憂矣敖後為楚相列子斬當道蛇漢祖夜行至大澤中前行者還曰有大蛇當道髙祖曰壯士行何畏乃拔劔丨之後人至者見一老嫗哭曰吾子白帝子也化為蛇丨丨今為赤帝子所殺嫗忽不見本紀馮緄之祥丨丨發綬笥有二赤蛇分南北走卜云此吉祥也君當為邊將以東為名後果為大將軍遼東太守風俗通竇氏之祥竇武母産武并蛇送之山林後母卒而蛇至以頭叩棺涕泣頃方去人以為丨丨丨丨搜神記寄奴所射宋武帝微時伐荻新洲射大蛇長數丈傷明日復往聞杵臼聲覘數青衣童子搗藥問故答曰我王為劉丨丨丨丨今合藥傅之帝曰王何神不致答帝叱之皆散得藥時人因名此草為劉丨丨白氏帖虞願不殺齊丨丨為晉安太守郡舊出蚺蛇膽可為藥有餉願者願不忍殺放三十里外經宿復來故處願使送他處又復歸論者以為仁心所致也同上見蛇垂頭杜預為荆州刺史時有燕集大醉預閉忩獨眠外聞忩中嘔吐其聲甚苦有小吏開戶看之止丨床上有一丨丨丨床邊吐都不見人世説夢蛇入腹五代范延光為天雄軍節度使延光嘗丨大丨自臍丨其丨半入而掣去之問門下術士張生張生贊曰蛇龍類也龍入腹中王者之兆也由是頗蓄異志如牛而吼隋李密王世充領兵討之夜有斑蛇長丈餘向寢屋作聲丨丨丨丨執杖者斬之明日戰大潰匹馬歸國逐鼠而驚唐太宗屯柏壁常欲覘敵濳軍逺掠騎皆四散太宗與一甲士登丘而睡俄而賊兵四面雲合會有蛇丨丨丨甲士丨起因見賊至遽白太宗遂俱上馬馳百步為賊所及發大羽箭射之殪其驍將賊駭乃退當時以為神異蛇垂楯上魚朝議周詢知安州一日宴於園中園吏見大丨丨欄丨丨就視之乃周詢醉而假寐也于壽亦嘗言周詢於相法為蛇形蛇盤鼓上蔡君謨知福州以疾不視事者纍日每夜中即夢登鼓角樓憑鼓而睡通判有怪鼓角將纍日不打三更者因對數夜有大丨丨據丨丨不敢近君謨既愈與通判言所夢正與鼓角將所説同人遂以為丨精並東齋記事栁宗元捕蛇者説永州之野産異蛇黑質白章觸草木盡死以囓人無禦之者然得而臘之以為餌可以已大風攣閭緣切踠於逺切瘻音漏癘音勵去死肌殺三蟲其始太醫以王命聚之嵗賦其二募有能斬之者當其租入永之人爭奔走焉有蔣氏者専其利三世矣問之則曰吾祖死於是吾父死於是今吾嗣為之十二年幾死者數矣言之貌若甚戚者余悲之且曰若毒之乎余將告於蒞事者更若役復若賦則何如蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久已病矣自吾氏三世居是鄉積於今六十嵗矣而鄉鄰之生日蹙彈其地之出竭其廬之入號呼而轉徙飢渴而頓踣音匐僵也觸風雨犯寒暑呼噓毒癘往往而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二爾三焉與吾居十二年者今其室十無四五焉非死則徙而吾以捕蛇獨存悍吏之來吾鄉呌囂虛嬌切亦作遨乎東西隳突乎南北譁然而駭者雖雞犬不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而卧謹食之時而獻焉退而甘食其土之有以盡吾齒蓋一嵗之犯死者二焉其餘則熙熙而樂豈若吾鄉鄰之旦旦有是哉今雖死乎此比吾鄉鄰之死則已後矣又安敢毒耶余聞而愈悲孔子曰苛政猛於虎也昔嘗疑于是以蔣氏觀之猶信嗚呼孰知賦斂之毒有甚是蛇者乎故為之説以俟夫觀人風者得焉栁宗元宥蝮蛇文吾悲夫天形汝軀絶翼去足無以自扶曲膂屈脅惟行之紆目兼蜂蠆色混泥塗其頸蹙耎其腹次且褰鼻鈎牙穴出榛居蓄怨而蟠含毒而趨志蘄害物隂蠧潛狙汝之稟受若是雖欲為蛙為蚓焉可得已凡汝之為惡非樂乎此緣形役性不可自止草搖風動百毒齊起首拳脊努呥舌搖尾不足其凶若病乎已世皆寒心我獨悲爾吾將剃吾庭葺吾楹窖吾垣嚴吾扃俾奧草不植而冗隟不萌與汝異塗不相交爭雖汝之惡烏得而行噫造物者胡甚不仁而巧成汝質既稟乎此能無危物賊害無辜惟汝之實隂陽為戾假汝忿疾余胡汝尤是戮是抶宥汝于野自求終吉彼樵豎持芟農夫執耒不幸而遇將除其害餘力一揮應手糜碎我雖汝活其惠實大他人異心誰釋汝罪形既不化中焉能悔嗚呼悲乎汝必死乎毒而不知反訟其內今雖寬焉後則誰賚隂陽爾造化爾道烏乎在可不悲歟詩集螫手蝮蛇苦丨丨壯士疾解腕楊貫噴人巴蛇千種毒其最褰鼻蛇掉舌翻紅焰盤身蹙白花丨丨豎毛髮飲浪拂泥沙欲學叔敖瘞其如多似麻元稹大澤多丨丨丨龍蛇李襖霧毒越嶺南濵海武都西陷戎雄黃假名石鷣鳥逺難籠詎有隳腸計應無破腦功巴山晝昏黑丨丨丨濛濛元稹穴我居二物丨丨丨嵗月亦以老一朝雙擒獲蜿蜿出幽草安行免噬囓敢望吐珠報已月不殺蛇昔賢有遺告張文潛所居堂後北廊下獲二蛇一小赤長二尺許一大黑長七尺圍四五寸尾可貫首盡放之蚯蚓格物總論蚯蚓生平土今所在平澤臯壤地中皆有之食細土白頸者是其老且大者也一名螼一名朐蚓一名蜿蟺一名土龍一名螳蚓一名曲蟺䏰皆此物也其屎呼為蚓螻亦能應候而鳴事類蚓出孟夏蚯丨丨蚓結冬至之日蚯丨丨並月令飲黃泉夫蚓上食稿壤下丨丨丨孟食細土其屎呼為蚓螻丨丨丨無砂石本草注大如虹黃帝時蚓丨丨丨世紀黃帝時見大蚓土氣勝故其色尚黃呂氏春秋森如箭陳後主時隋軍至江蚯蚓盡出丨丨植丨陳氏水鄉蚯蚓土蟲象陳氏自稱土德盡出明傾其窟穴以曲歸直是嵗隋平陳五行記改為郡唐以開州盛山郡地多朐䏰蟲丨丨朐䏰丨東方虬蚯蚓賦惟隂陽之播氣實萬類以成形有微蟲之稟質應甲子而適生雨欲垂而乃見暑既至而先鳴乍逶迤而鱔屈或宛轉而蛇行內乏筋骨外無手足任性行止物擊便曲徒進退而皓首竟不知其所欲東西詰屈南北夤緣上食塵塊下飲黃泉應軒轅土德之王入蔡雍勸學之篇其體甚微其用至専墐泥塗以自保觸鹽滋而罔全豈造化之賦命信歸之於自然歐陽永叔雜記蚓食土而飲泉其為生也簡而易足然仰其穴而鳴若號若呼若嘯若歌其亦有所求耶抑其求易足而自鳴其樂耶其生之陋而自悲其不幸耶將自喜其聲而鳴其類耶豈其時至氣作不自知其所以然而不能自止者耶何其聒然而不止耶吾於是乎有感詩集亦蟠鳴蚯蚓在泥穴出縮常自盈龍蟠丨以丨龍丨亦以鳴自謂與龍比恨不頭角生螻蟈似相助草根無停聲聒亂我不寐每夕但欲明天地且容蓄憎惡惟人情梅都官獨清亷藁壤大牢俱有味可能蚯蚓丨丨丨王荆公蝘蜓附蝎虎格物總論蝘蜓似蛇著四足一名蜥蝪一名蠑螈一名守宮一名蛇醫一名石龍子一名山龍子有四種一大形純黃色為蛇醫母一名蛇舅母次似蛇醫小形長尾見人不動名龍子次有小形而五色尾青碧可愛名蜥蝪並不螫人一種喜緣籬壁形小而黑乃言螫人必死亦未嘗聞中人或名蛇師或名蝎虎或名蠑螈或又以為在草澤者名蠑螈在屋壁者名守宮也醫家五月採之事類盂下守宮上嘗使諸數家射覆置守宮丨丨射之皆不能中朔自贊曰臣嘗受易請射之乃别蓍布卦而對曰臣以為龍又無角謂之為蛇又有足是非丨丨即蜥蝪上曰善注原父曰守宮即人家屋壁中蝘蜓蝎虎者是也此物惟在屋壁忩戶間夜亦出蓋用此得名爾前東方朔傳甕內蛇醫王彥威鎮汴夏旱李杞過汴因宴王以旱為言李醉曰欲雨甚易爾可求蛇醫四頭石甕二枚每丨實以水浮二蛇醫以木蓋密泥之置於間所甕前後設席燒香選小兒十嵗以下者十餘令執小青竹晝夜更擊其甕不得少輟王如言試之一日兩夜雨大注酉陽雜俎蝎虎代以蝎虎熙寧中京師久旱按古法令坊巷以甕貯水插栁枝泛蜥蝪小兒呼曰蜥蝪蜥蝪興雲吐霧降雨滂沱放汝歸去時蜥蝪不能盡得往往以蝎虎丨之入水即死小兒更曰寃苦寃苦我是蝎虎似恁昏沉怎得甘雨倦遊雜記詩集伺飛蟲黃雞啄蝎如啄黍忩間守宮稱蝎虎閨中徼尾丨丨丨巧捷工夫在腰膂跂跂脈脈善緣璧陋質從來誰比數今年嵗旱號蜥蝪狂走兒童閙歌舞能銜渠水啖氷雹便向蛟龍覔雲雨守宮努力搏蒼蠅明年嵗旱當求汝坡詩食蠆尾跂跂有足蛇脈脈無角龍為虎君勿笑丨盡丨丨蟲前人蝸牛附天水牛格物總論蝸牛按釋文小螺與爾雅所謂附羸螔蝓者是也有四角背上有肉負圓殼以行彼有二角其身止一假肉而無殼者謂之蛞蝓又别一種也一名陵蠡一名土蝸一名附蝸又海邊有一種大似蝸牛候螺蛤開常自出食螺蛤欲合已還殼中名寄居亦名寄生又一種全似蝸牛黃小雨後好緣桑葉因名曰緣桑螺博者宜辨之天水牛大黑甲蟲皂角木五六月多此呼為天水牛事類國於蝸角有丨丨丨之左丨曰蠻氏右角曰觸氏爭地而戰伏尸數萬逐北旬有五日而後反莊子廬號蝸牛見宅舍卑陋門注詩集蠧梁蝸涎丨畫丨杜牧成字斷墻著雨蝸丨丨歐粘壁枯腥涎不滿腹聊足以自濡升髙不知休竟作丨丨丨蘇子瞻天水牛穴枯桑兩角徒自長空飛不服箱為牛競何事利吻丨丨丨並同上古今合璧事類備要别集卷八十九
