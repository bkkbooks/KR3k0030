body:
  text: 古今合璧事類備要外集卷四十五宋謝維新撰飲膳門飯附粥羮飲膳閒談飯炊榖為之亦曰饌曰食音嗣又曰滫食半蒸曰饋雜􅀈曰粈字亦作飷音揉乾飯曰餱熬稻曰饊飯飱以水和之也饋子旦反以羮澆之也蒸飯氣謂之餾飯壊謂之􅀈飯臭謂之饋所謂饗者設盛禮以飯賓也粥烹榖饘糜􅝚一也羮釋文膤也或又以臛肉羮食一簞羮一豆得之則生不得之則飢而死然苟非其道不可受於人君子之志又不徒在於一飽也事類飯食宰夫掌朝覲㑹同賔客以牢禮之法丨丨飱牽飡饔漿人掌賓客之丨丨摶飯毋丨丨記放飯丨丨流歠孟子蒸榖黄帝始丨丨為飰周書飯糗舜丨丨孟子簞食孟子曰取之而燕民悅則取之古之人有行之者武王是也云云丨丨壺漿以迎王師盤飡僖負覊饋重耳丨丨左亦再飯文王一飯武王亦一飯再飯丨丨丨記先一飯夫差謂句踐曰寡人禮丨丨丨矣注言已齒長矣食魚飱晉趙盾丨丨丨公羊春秋飯疏食孔子曰丨丨丨飲水曲肱而枕之樂亦在其中矣語述而炊飯祭孔子厄於陳蔡從者七日不食子貢以所賫貨寝犯圍而出告糴於野人得米一石焉顔回仲由炊之於壞屋之下有埃墨墮甑中顔回取而食之子貢自井望見之問曰仁人亷士窮改節乎子曰改節即何稱於仁亷哉子貢以所飯告孔子子曰吾將問之召顔淵曰疇昔予夢見先人豈或啓佐我哉子丨而進丨吾將丨焉對曰有埃墨堕飯中欲置之則不潔欲弃之則可惜回即食之不可祭也孔子曰然乎吾亦食之家裹飯徃子輿與子桑為友霖雨十日子輿曰子桑殆病矣丨丨丨食之莊子晏嬰脫粟丨丨相齊食丨丨飯晏子春秋曹交食粟丨丨九尺四寸以長丨丨而已孟子叔敖糲粟孫丨丨為令尹丨丨菜羮漂母設食韓信常數從其下鄉南昌亭長寄食數月亭長患之乃晨炊蓐食信食時往不為具食信亦知其怒竟絶乃釣城下諸母丨有一丨見信飢為丨丨信謂漂母曰吾必有以重報母母怒曰丈夫不能自食吾哀王孫而進食豈望報乎前本傳裨將傳飡韓信令丨丨丨丨破趙會食注食小飯也輒食辭去孟嘗君待客夜食有人蔽火光客怒以為飯不等輟食辭去孟嘗君起自持其飯比之客慙自刎雖老尚善亷頗飯斗米肉十斤被甲上馬以示可用趙使郭開曰亷將軍雖老尚善飯然與臣坐頃時三遺矢矣史記馮異進麥王郎起光武至滹沱河丨丨丨丨飯又見麥門李固食麥丨丨為太尉常丨丨飯後漢雄食乾飯左丨為冀州刺史常丨丨丨苞食漉飯司馬丨為太尉常丨丨丨極飡致飽歩隲避亂江東與廣陵衛旌相善俱以種𤓰自給會稽焦征羌郡之豪族隲與旌寄食其地懼為侵乃共修刺奉𤓰以獻征羌方内卧駐之移時旌欲去隲止之曰本所以來畏其强也今舎去欲以為髙祗怨耳良久征羌開牖見之隠几坐帳中設席致地坐隲旌牖外旌愈耻之隲辭色自若征羌身自享大案殽膳重沓而小盤飯與隲旌惟菜茹而已旌不能食隲極飡致飽乃辭出旌怒隲曰能忍此乎隲曰吾等貧賤故主人以貧賤遇之固其宜也當何所恥吳志成糜自可有客詣陳太丘談鋒甚敏太丘乃令元方季方炊飯太丘問炊何遲留元方長跪曰君與客語乃俱竊聴炊忘着簞今皆成糜太丘曰爾頗有所識否二子長跪俱說言無所遺失太丘曰如此俱丨丨丨丨何必飯耶世說拾粒以㗖殷仲堪在荆州連年饑饉仲堪食常五椀盤餘肴饌飯粒落席間輒拾以㗖之雖欲率物亦縁其性真素也晉書王朗粳飯丨丨會稽敗太祖盛㑹啁之曰不能效君昔在㑹稽折丨米丨朗曰宜適難值如朗者未可折而折眀公可折而不折也魏畧石崇稻飯丨丨家丨米丨在地經宿皆化為螺時人以為族㓕之應含飯哺兒㕁鍳遭永嘉所至窮餓鄉人共飴食鍳嘗携兄子外甥周翼二小兒會食鄊人曰各自窮餒以君之賢共欲存君耳恐不能兼飴鑒於是獨往飯着兩頰還吐與二兒飡精飯食客謝安嘗欲詣陸納納兄子俶宻作食供之納設茶果而已俶下丨丨丨丨納大怒杖四十曰不能光我叔父而穢我素風飯冷復煖孫盛嘗詣殷浩講論對食奮塵尾悉落飯中食冷而復煖傳者數四至暮忘冷理竟不定由是知名本飯録其焦宋陳遺少為縣吏毋好食鍋底飯遺在役恒帶一囊每煑食輙録其焦貽母不敢妄過第五倫字伯魚修行清白常召見上曰聞卿為吏不過從兄飯寜有之耶對曰臣生遭飢饉米石萬錢丨丨丨丨人飯不然難餐唐乾符中有豪士承藉勲籍錦衣玉食極口腹之欲嘗謂門僧聖剛曰凡以炭炊飯先燒一熱謂之煉火方可入㸑不然猶有煙氣難餐及大冦先䧟瀍涤財産剽盡昆仲數人與聖剛同竄潛伏山草不食者三日賊退徒歩往河橋道中小店買脫粟飯於土杯同食美於梁肉僧笑曰此非煉炭所炊但慙恧無對東屛劇談下胡麻飯後眀帝永平中剡縣有劉晨阮肇入天台山採藥迷失道路糧盡望山頭有桃共取食之下山得澗水飲之望見蔓菁菜從山腹出次有一杯流水中有胡麻飯二人相謂曰去人不逺因過水度一山出大溪見二女容顔絶妙便喚劉阮姓名直問郎等來何晚因邀過家丨丨丨丨山羊脯食之甚美續齊諧記得陳米飯南岳僧悟空嶽西原近朱陵洞其處嶮絶僧逰覽累日捫蘿垂踵無幽不跡忽見前岩有道士坐繩床僧告之飢困道士歘起指石地曰此有米乃持钁斸石深𢾗寸遂令僧探之丨丨丨升餘即着於釜承瀑敲火煮丨勸僧食一口未盡辭以未熟道人笑曰君飱止此可謂薄分我當畢之酉陽雜爼與玉屑飯太和中有二人逰嵩山迷路見一人衣潔白枕一樸物方眠二人且問所自因開樸兩褁皆丨丨丨授與二人曰分食此雖不足長生可一生無疾乃起與二人指路同上與壻同飯張文定行安道平生未嘗不衣冠而食嘗暑月丨其丨王鞏丨丨命鞏褫帶而已衫帽自如鞏不敢公曰吾自布衣諸生遭遇至此一飯皆君賜也享君之賜敢不敬乎子自食某之食雖褫衣無害也遇飢索飯章惇少善養生嘗云遇飢雖不相識處亦須索飯若食飽時見爺亦不拜東軒筆録措大喫飯有二丨丨相與言志一云我平生不足惟飯與睡他日得志當飽丨丨飯了便睡睡了便喫飯一云我則異於是喫了又喫何暇復睡耶東坡志林玉汝能飯韓丨丨平生喜餙㕑傳一飯啖可兼𢾗人出師長安錢穆父行詞云喜亷頗之能飯玉汝不悅聞見録粥作粥救饑尹吉甫仕至上卿其家大富食口數百人時嵗大飢曽鼎鑊作粥其聲聞數里食訖失三十人乃在鑊中齕取焦粥而已録異為粥待餓齊大飢黔敖丨丨於路以丨丨者而食之有飢者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰予惟不食嗟來之食以至於斯也從而謝焉終日不食而死曾子聞之曰㣲與其嗟也可去其謝也丨丨記檀弓䘮食飦粥滕定公薨然友之鄒問於孟子孟子曰不亦善乎親䘮固所自盡也諸侯之禮吾未之學也雖然吾嘗聞之矣三年之䘮齊䟽之服飦粥之食自天子達於庶人三代共之及至𦵏四方來觀之弔者大悦孟田公饘粥顔回有負郭之丨五十畝足以供丨丨公孫豆粥光武自薊東頓馳至饒陽蕪蔞亭天寒衆皆飢疲馮異上豆粥眀旦光武曰昨得丨丨丨丨饑寒俱解林宗一啜郭林宗嘗止陳國問學見童子魏徳公知其有異徳公求近其房止供給灑掃作文嘗不佳夜間命作粥丨丨丨丨怒而呵之曰髙眀為長者作粥使砂不可食以杯擲地徳公更進粥三進三呵徳公無變容顔色殊悅林宗曰始見子之面今乃知子之心遂友善之卒為妙士本傳徳公三進見上注何不肉糜晉恵帝時天下荒亂百姓餓死帝曰丨丨食丨丨豫作熟豆石崇事見豆門註詳伏月熱粥㕁嘉賔三丨之丨詣謝公炎暑重赫雖當風交扇猶霑汗流離謝著故衣食丨白丨㕁謂謝曰自非君體幾不堪此世說嵗荒米粥梁任眆為義興太守嵗飢散私俸以米豆為粥活三千餘人嵗飢榆粥陽城丨丨不為隣里屑丨為丨賜防風粥白居易在翰林丨丨丨丨一甌食之口香數日金鑾宻記煮楊花粥洛陽人家寒食丨丨丨丨金門嵗節食粥多時秦少㳺為黄門校勘錢穆父為戸書皆居東華門少游春日有詩遺穆父云三年京國鬢如絲又見新花發故枝日典春衣非為酒家貧食粥已多時穆父以米二石送之韓愈平淮西碑始時蔡人進戰退戮今眠而起左飱右粥羮羮定丨丨注定熟也儀禮鄉飲酒羮齊丨丨視夏時注羮宜熱記内則不和大羮丨丨記不致大羮丨丨左和羮和如丨丨水火醯醢鹽梅以烹魚肉左芼羮丨丨菽麥惟所欲内則作羮若丨和丨書說命雉羮彭鏗斟雉帝和饗王逸注彭鏗彭祖也好滋味盖斟丨丨事帝堯楚辭熊羮紂王怒丨丨不熟而殺庖人劉向新序子羮文王長丨伯邑考紂烹以為丨以賜文王曰聖人不食其丨丨文王得而食之紂曰誰謂西伯聖者與食其丨丨而不知世記又見後菜羮必齊孔子雖蔬食丨丨𤓰祭丨丨如也語䔧羮不糝孔子厄陳蔡之間七日不食丨丨丨丨又見後庾衮注以羊羮敗鄭伐宋宋將戰華元殺羊食士其御者羊斟不與及戰曰昔日之羊子為政今日之事我為政與華元馳入鄭宋師敗績談苑以羊羮亡中山君饗士司馬子期在焉羊羮不遍子期怒走楚說王伐中山中山君亡有二人挈手隨後問之曰臣父嘗餓且死君下壺食哺臣之父故來死君也中山君曰吾丨一椀丨丨丨國以一壺飡得二士死戰國䇿烹猴為羮楚有丨丨者而召其鄰人鄰人以為犬羮而甘之後聞其為猴盡吐㵼其所食此未知味者烹子遺羮樂羊圍中山中山怒丨其丨丨之丨樂羊食之文侯賛曰其子食之其誰不食羊下中山文侯賞其功而疑其心戰國䇿殺翁分羮楚與漢相守羽乃為髙爼置太公其上告漢王曰今不急下吾烹太公漢王曰吾與若俱北面受命懷王約為兄弟吾翁即若翁必欲烹而翁幸分我一杯羮項王怒欲殺之項伯曰且為天下者不顧家雖殺之無益也兄嫂轑羮見釜門注寛婢翻羮劉丨將朝丨丨丨汚其衣遽收之寛曰徐徐羮爛汝手陸機蓴羮丨丨詣王濟濟指羊酪謂機曰吳中何以敵此機曰千里丨丨未下鹽䜴庾衮藜羮丨丨丨丨不糝門人進飯曰已食訖陸績知母丨丨字智伯初繋獄見餉羮丨丨吏怒以為卒通意績曰母羮葱必寸㫁肉必方正以此知之後漢殷孚諱父丨淳子丨有父風嘗與侍中何朂共食孚羮盡朂云益殷蓴羮朂司空無忌子也孚徐輟筯曰何無忌諱帝親調羮李白召見金鑾殿論當世事丨賜金丨為丨丨帝當賜羮李林甫子壻鄭平為户部外郎一日林甫就院省女因邀之見其鬢髮班白謂平曰丨眀日丨丨甘露丨鄭郎其食此羮縱華皓亦必鬢黒明日果有中使至林甫第賜食因以羮與平食一夕鬢黒明皇雜録門若沸羮王低當其黨盛丨皆丨丨丨臣肉為羮魏元忠復舊官固侍宴后曰卿累負謗鑠何邪對曰臣猶鹿也羅織之吏如獵者茍須丨丨丨之丨爾不二羮胾柳玭云余先君兄弟三人皆居清列非速客丨丨丨丨夕食齕蔔瓠而已皆保重名家語韓愈送窮文捩手覆羮詩集滑憶雕胡丨丨丨丨飯杜江閣香舂菰米丨飯丨丨丨柳宗元飯抄雲子丨丨丨丨白飯依他日麤丨丨丨丨與奴白飯丨丨丨丨馬青蒭並杜無母誰飲沙丘丨漂丨丨肯丨王孫李白粥沙瓶煮豆君不見滹沱流凘車折軸公孫倉皇奉豆粥濕薪破竈自燎衣飢寒頓解劉文叔又不見金谷敲氷草木春帳下烹煎皆美人萍虀豆粥不傳法咄嗟而辦石季倫干戈未解身如寄聲色相傳心已醉身心顛倒自不知更識人間有真味豈知江頭千頃雪色蘆茒簷出沒晨煙孤地碓舂秔光似玉丨丨丨丨軟如酥我老此身無着處賣書來問東家住粥卧聴雞鳴粥熱時蓬頭曵履君家去蘓東坡豆轑鐺分口家家臘月二十五淅米如珠和豆粥大杓丨丨丨丨数疫鬼聞香走無處鏤薑屑桂澆蔗糖滑甘無比勝黄粱全家團欒罷晩飯在逺行人亦留分褓中孩子彊教甞餘波得霑獲與臧新元勝氣調玉燭天行已過來萬福物無疵癘年榖熟長向臘殘分豆粥食粥已多時見前注羮香芹丨丨碧澗羮秋蓴羮煮丨丨滑香聞丨丨錦帶羮竝杜鮮沸羣丨丨池羮韓愈聯句玉糝香似龍涎仍釅白味如牛乳更全清莫將南海金虀膾輕比東坡丨丨羮蘇東坡秦烹丨丨惟羊羮坡古今合璧事類備要外集卷四十五
