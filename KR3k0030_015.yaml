body:
  text: 古今合璧事類備要前集卷十五宋謝維新撰節序門元旦附元會事類首祚王羲之月儀書曰日往月來元正丨丨太蔟告辰微陽始布罄無不宜和神養素端月玉燭寶典云元正丨丨三朔正月上日注朔日也書夏以半明為朔殷以雞鳴為朔周以夜半為朔故云丨丨書大傳三朝正月一日為嵗之朝月之朝日之朝漢孔光傳注三元正月一日為元日亦云丨丨嵗之元時之元月之元玉燭寶典三微白虎通謂之丨丨月言陽氣始施萬物始動微而未著天臘正月一日為丨丨五帝校定生人神氣時限長短益添年命其日宜求禱子孕祭祀先亡升達𤣥祖天節正月一日天中節會之辰獻壽之日並出道書决八風漢魏占候正月旦丨丨丨風從南來大旱西南小旱西方有兵西北豆成北方中嵗東北為上嵗東方大水東南疾疫嵗惡八風常與其對課多勝少久勝亟疾勝徐漢天文志養五臟正月元日五薰鍊形注五辛所以丨丨丨氣風土記傳生酒唐長安風俗每至元日已後遞飲酒相邀迎號丨丨丨法苑珠林却邪丸梁武每嵗旦賜羣臣嵗旦酒辟惡散丨丨丨或本作却鬼雜爼膠牙餳元日食丨丨丨取膠固之義荆楚嵗時記粉荔枝金門嵗節曰洛陽人家正旦造絲雞蠟燕丨丨丨上辛盤正旦楚人上五辛盤松柏頌椒花酒周處風土記獻椒頌晉劉臻妻陳氏元日獻椒花頌云璇穹周回三朝肇建青陽散輝澄景載煥美哉靈葩爰採爰獻聖容皎皎永壽於萬出晉書折松枝嵗首丨丨丨男七女二以為藥飲之董勛答問服桃湯元日丨丨丨進敷丁散蓋桃者五行之精厭邪氣制百鬼進椒柏酒正月一日是謂正日潔祀祖禰進酒降神畢乃室家尊卑大小以次列于先祖之前子婦曾孫各上椒酒於家長崔實月令元日丨丨丨丨椒是玉衡星精服之令人身輕能走柏是仙藥進酒次第以年少者為先嵗時記飲屠蘇酒昔有人居草庵之中每嵗除夕遺里閭藥一貼令囊浸井中至元日取水置于酒樽名曰屠蘇酒合家飲之不瘟疫嵗華紀麗丨丨丨丨所以祓瘟禳惡其法必自幼飲何也董勛曰少者得嵗故先酒賀之老者失嵗故後與酒韻語陽秋畫雞帖户正月一日丨丨丨丨上懸葦索於其上插符於旁百鬼畏之嵗時記舊時嵗朔常設葦茭桃梗磔雞于宫及百寺門以禳惡氣沈約宋書獻鳩放生邯鄲之民以正月旦丨丨於簡子簡子大悅厚賞之客問其故簡子曰正旦丨丨示有恩也列子滎陽南原上有厄井父老云漢髙祖曾避項羽於此井為雙鳩所救故漢朝每正旦輒放雙鳩始於此廣記爆竹驚鬼西方深山中有人長尺餘犯人則病寒熱名曰山臊人以竹著火中熚烞有聲而山臊驚憚神異經爆竹燃草起於庭燎嵗時記桃符畫神東海度朔山有大桃樹蟠屈三千里其卑枝向東北曰鬼門萬鬼出入也有二神一曰神荼一曰鬱壘主閲領衆鬼之出入者執以飼虎於是黃帝法而象之因立桃板於門户上畫神荼鬱壘以禦凶鬼此則桃板之制也蓋其起自黃帝故今世畫神像於板上猶於其下書左神荼右鬱壘兄弟二人生能執鬼於度朔山桃樹下簡閲百鬼之無道者縳以葦索執以飼虎張平子東都賦云守以鬱壘神荼副焉風俗通蘇秦說孟嘗君曰土偶人語桃梗梗者更也曰今子東國之木桃削子為人假以丹彩用子以當門户之厲戰國䇿造桃板著户謂之仙木百鬼所畏六帖注祝除貧鬼髙陽氏子好衣弊食糜正月晦日巷死世作糜棄破衣是日丨於巷曰丨丨丨韓文公送窮文亦于正月乙丑晦主人使奴星結柳作車縛草為船載糗與糧三揖窮鬼而告之唐四時寶鑑繫令如願有商人過清湖見清湖君君問所須有人教云但乞如願君許之果得一婢如願即其名也商有所求悉能致之後因正旦如願晚起商人撻之走入糞壤中不見今人正旦以細繩丨偶人投糞掃中云丨丨丨嵗時記鍾馗事迹今人嵗首畫丨丨辟邪俗傳起於唐明皇時皇祐中穿地得碑乃宋宗慤母墓志載其妹名鍾馗又北史堯喧本名鍾葵字辟邪又有于徑者亦字鍾馗以世數考之喧又居前則知不特起於宋也遁齊間覽開元中明皇講武驪山翠華還宫不悅因痁疾作晝夢一小鬼衣絳犢鼻跣一足復一足腰懸一履搢一筠扇盜太真繡香囊及上玉笛繞殿弃戲上前上叱問之小鬼奏曰臣乃虛耗也上曰未聞虛耗之名小鬼奏曰虛者望空虛中盜人物如戲耗即耗人家喜事成憂上怒欲呼武士俄見一大鬼頂破帽衣藍袍繫角帶靸朝靴徑捉小鬼先刳其日然後孹而啖之上問大者曰爾何人也乃奏云臣終南山進士鍾馗也因武德中應舉不捷羞歸故里觸殿階而死是時奉㫖賜緑袍以葬之感恩發誓與我王除天下虛耗妖孽之事言訖夢覺痁疾頓瘳乃詔畫工吳道子曰試與朕如夢圖之道子奉㫖恍若有覩立筆成圖進呈上視久之撫几曰是卿與朕同夢爾賜以百金唐逸史鍾馗繪像昔吳道子所畫一丨丨衣藍衫鞹一足眇一目腰一笏巾裹而蓬髮垂鬢左手捉一鬼以右手第二指捥鬼眼睛筆蹟遒徑實有唐之神妙有得之者以獻僞蜀主甚愛重之常懸於內寢一日召黃筌令看之筌一見稱其精妙謝恩訖昶謂曰此鍾馗若拇指搯鬼眼睛則更有力試為我改之筌曰乃吳道子所畫錘馗一身之力氣色眼貌俱在第二指不在拇指所以不敢輒改筌今别畫雖不及古人一身之力意思併在拇指昶賞筌之能賜以綵段彩器野人間話元會元日始會漢髙帝七年長樂宮成制羣臣朝賀儀武帝改用夏正亦在建寅之朔則元日慶賀始於髙祖也通典正旦不朝丨月丨百官朝賀光祿勳劉嘉廷尉趙世各辭病丨能丨髙陽奏不敬請廷尉治嘉罪河南尹治世罪漢儀酌白獸尊魏武帝用漢儀元日百官上壽設白獸尊於殿廷能獻直言者則發此尊飲酒案禮白獸尊乃北齊之遺式也上施白獸蓋後代所為示忌憚也賜緑醽酒咸康五年十二月丙子正旦㑹百僚丨丨丨丨人一升晉起居注噀酒滅火詳見雨門說經奪席漢光武正旦命羣臣丨丨不通者丨丨戴馮乃獨坐三十餘席東觀紀明燎充庭梁元會於丨庭設丨文物丨丨郡國皆受詔侍中讀五條詔令隋禮儀志設燈會殿漢儀有正會禮正旦夜漏未盡七刻鐘鳴受賀公侯以下執贄來庭二千石以上升殿稱萬壽然後作樂宴享魏文帝都鄴正㑹文昌殿用漢儀又設百華燈晉氏受命武帝更定元會儀晉禮志百官夀酒夜漏未盡七刻謂之辰賀晝漏上三刻丨丨奉丨丨謂之晝會晉禮志宰相火城元日冬至立仗百官皆備珂傘列燭有至五六百炬謂之火城有堂火城丨丨丨丨將至則衆火皆撲滅以避宰相國史補詩集明日春堆盤紅縷細茵陳巧與椒花雨鬬新竹馬異時寧信老土牛丨丨莫辭丨出東坡元旦早丨丨家僮催丨起但搔白髮惜殘眠未將柏子簪新嵗且與梅花叙隔年甥姪拜多身老矣親朋來少屋蕭然人生智力難求處只有稱觴阿母前潜夫銘柏酒正朝辟惡酒新年長命杯柏葉隨銘至椒花逐頌未庾信換桃符爆竹聲中一嵗除春風送暖入屠蘇千門萬户曈曈日總把新桃換舊符出王介甫剪銀幡蕭索東風雨鬢華年年幡勝丨宮花愁聞塞曲吹蘆管喜見春盤得蓼芽東坡朝回兩袖天香滿頭上丨丨笑阿咸同上董勛問禮俗正月一日造華勝相遺夢華録元日賜銀幡圖金燕聊開柏葉酒試奠五辛盤金薄圖神燕朱泥却鬼九庾肩吾飲屠蘇不覺老將春共至更悲擕手幾人全還丹寂寞羞明鏡手把屠蘇讓少年闕名自知年幾偏應少先把屠蘇不讓春倘更數年逢此日還應惆悵羡他人裴夷直戴星先捧祝堯觴鏡裏堪驚雨鬢霜好是燈前偷失笑屠蘇應不得先嘗成文幹才酌屠蘇定年齒坐中皆笑鬢毛斑方干老去怕看新厯日退歸擬學舊桃符煙花已作青春意霜雪偏尋舊客鬚但把窮愁博長健不辭最後丨丨丨東坡酌藍尾嵗盞復推藍尾酒春盤先勸膠牙餳年入手莫嗟一日日催人且喜一年丨丨丨白樂天景呈新年光悲擲舊丨色喜丨丨庾亮祈令終踐元辰延顯融獻羽觴丨丨丨晉元朂保富貴富貴祝來何所遂聰明鞭得轉無機唐元稹早朝係元會千官車馬游龍來晝漏始上閶闔開峩峩左右升龍進昨夜雪飛銀作堆殿前冠劒魚鱗立東風入仗旗腳回黃鐘一奏寶扇掩玳簾捲起香霧排鳴弰未盡霹靂響翠輦已退黃金階聖人端冕御法座大樂旅作聲和諧羣公抃蹈丹墀下尚書奏瑞四夷懷乘輿却入更衣閣通天絳袍升玉榻百拜稱觴萬嵗聞兩廊賜食簪裾匝曲傳大定舞綴疏波旋煙斂飭宮車衛官解嚴多士退日光停午氣象舒梅聖俞帝宮通夕燎天門拂曙開瑞雲生寶鼎榮光上露臺華山不老葉宜城萬壽杯遙見飛鳬下懸知葉縣來隋蕭慤萬㦸凌霜布森森瑞氣間垂衣當曉日上壽對南山濟濟延多士蹮蹮舞百蠻小臣無事諫空愧伴鳴環盧綸觀朝元日爭朝闕奔流若會溟路塵和薄霧騎火接低星門響雙魚鑰車喧百子鈴冕旒當翠殿幢㦸滿彤庭積嵗方編瑞乘春即省刑太官陳禹玉司厯貢堯蓂壽酒三聲退簫韶九奏停太陽開物象霈澤及生靈南陌髙山碧東方逺氣青自憐揚子賤歸草太𤣥經司空曙欲曙九衢人更多千條香燭照星河今朝始見金吾貴車馬縱橫避玉珂釋靈徹朝回天仗宵嚴建羽旄春雲送色曉雞號金爐香動螭頭暗玉佩聲來雉尾髙戎服上趨承北極儒冠列侍映東曹太平時節身難遇郎署何須歎二毛韓愈鳴佩隨鵷鷺登階見冕旒無能禆聖代何事别滄洲閒夜貧還醉浮名老漸羞鳳城春欲晚郎吏一同遊盧綸葦桃猶在户椒柏已稱觴嵗美風先應丨丨日漸長東坡星河猶在整朝衣逺望天門再拜歸杜牧之立春事類條風至立春丨丨丨注曰條達萬物之風通卦驗農祥正丨丨晨丨注曰丨丨房星也晨丨謂晨見南方立春之日也國語迎東郊先立春三日太史謁之天子曰某日立春盛德在木天子乃親帥三公九卿諸侯大夫以丨春於丨丨月令禮蒼帝以青圭禮東方注丨東方以立春謂丨精之丨禮春官立青幡後漢立春之日丨丨丨禮儀志服蒼玉天子衣青衣丨丨丨月令候竹管取冝陽金門竹為管河內葭草為灰以候陽氣玉泉記以葭莩灰實律之端氣至則灰飛續漢書舞雲翹立春之日迎春於東郊車旗服飾皆青歌青陽丨丨丨之舞後漢祭祀志出綵花唐景龍四年正月八日立春上令侍臣迎春內丨丨丨樹人賜一枝令學士賦詩景龍記賜幡勝唐制立春賜三省官綵勝各有差文昌雜録立春日自郎官御史寺監長二以上皆丨春丨丨以羅為之宰執親王近臣皆丨金銀丨丨入賀訖戴歸私第夢華録剪春幡立春之日士夫之家丨綵為小幡謂之丨丨或懸於家人之頭或綴於花枝之下又録剪為春蝶春錢春勝以為戲文昌雜薦春菜東晉李鄂立春日命以蘆蔔芹芽為菜盤相饋貺托遺唐立春日春餅生菜號春盤四時寶鑑齊民月今立春日食生菜取迎新之意安定郡王立春作五辛盤以黃柑釀酒謂洞庭春色夢華録出土牛月令季冬之月丨丨丨以送寒氣出猶作也丑為牛牛可牽止送猶畢也季冬丨丨丨以示農耕之早晚删定月令季冬之月立土牛六頭於國都郡縣城外丑地以送寒氣後漢禮儀志立春前五日並造土牛耕夫犂具於大門之外是日黎明有司為壇以祭先農官吏各具綵仗環擊牛者三所以示勸耕之意夢華録鞭春牛立春前一日開封府進春牛入禁中丨春開封祥符雨縣置丨丨於府前至日絶早府僚打春府前百姓皆賣小春牛夢華録刻龍銜書北朝婦人立春日進春書以青綌為幟刻龍像銜之或為蝦蟇酉陽雜俎芒兒上㕔太平興國二年冬縣司以春牛呈知府就午門外安排薦以香燈酒果其芒兒塑之頗精同判王洗馬晦伯慮有損闕移置㕔上知府程給事見之謂同判曰某雖不才忝為刺史且