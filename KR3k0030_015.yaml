可妄動亟命取用之已而為轉運使所劾時吕汲公為相見之曰帥臣妄用油數千斤何足加罪乎寢其奏不下却掃編燃燈故事上元丨丨或云以漢祠太乙自昏至晝丨丨梁簡文帝有列燈陳後主有光璧殿遙詠山燈詩唐明皇先天中東都設燈文宗開成中以燈迎太后則是唐以前嵗不常設太宗時三元不禁夜上元御乾元門中元下元御東華門而上元游觀獨盛春明退朝録張燈定日上元張燈太平御覽所載史記樂書曰漢家祀太一以昏時祠到明今人正月望日夜游觀燈是其遺事而今史記無此文唐韋述兩京新記曰正月十五夜敕金吾弛禁前後各一日以看燈本朝京師增為五夜俗言錢忠懿納土進錢買兩夜如前史所謂買宴之比初用十二十三夜至崇寧初以兩日皆國忌遂展至十七十八夜豫按國史乾德五年正月詔以朝廷無事區宇乂安令開封府更增十七十八兩夕然則俗云因錢氏及崇寧之展日皆非也太平興國五年十月下元京城始張燈如上元之夕至淳化元年六月始罷中元下元張燈容齊隨筆天官定籍正月十五日上元九氣天官主録百司上詣天闕進呈世人罪福之籍上元十天靈官神仙兵馬與上聖髙真妙行真人下降人間考定罪福上元中元皆大慶之月也長齊誦度人經則福及上世身得神仙並道書舍利放光摩喝陀國正月十五日僧徒俗衆雲集觀佛丨丨丨丨雨花西域記如來闍維訖收舍利龕置金牀上天人散花奏樂繞城步步燃燈十二里涅槃經祭蠶室神吳縣王成夜見一人立宅東南角謂成曰此地是君蠶室我即地神明日月半君宜作白粥泛膏於上以祭我必當令君蠶百倍言訖失所在成如其言年年得蠶也嵗時記迎紫姑仙世有紫姑神古來相傳是人妾為大婦所嫉正月十五日感激而死故世人以其日作其形夜於厠間或猪欄邊捉之祝曰子胥不在其壻名曹姑歸去即其大婦小姑可出戲捉者覺重則是神來可占衆事集異苑詩集傳柑侍史丨丨玉帝傍人間草木盡天漿寄與維摩三十顆不知簷蔔是餘香老病行穿萬馬羣九衢人散月紛紛歸來一㸃殘燈在猶有丨丨遺細君燈花結盡吾猶夢香篆消時汝欲歸回首凄凉十年事丨丨歸遺滿朝衣並東坡卜繭去年上元客三衢衡雨看燈强作娛今年上元家裏住村落無燈惟有雨隔溪叢祠稍簫鼓不知還有遊人否兒女炊玉作繭絲中藏吉語默有祈小兒祝身取官早小女只求蠶事好先生平生笑兒癡逢場亦復作兒嬉不願著腳金華殿不願增巢上林苑只哦少陵七字詩但得長年飽喫飯心知繭卜未必然醉中得丨喜欲癲楊廷秀上元夜里俗粉米為丨絲書吉語置其中以占一嵗之禍福謂之繭卜燈市吳臺今古繁華地偏愛元宵燈影戲春前臘後未好晴已向街頭作丨丨疊玉千絲似鬼工剪羅萬眼人力窮兩品爭先最先出不待三五迎東風兒郎種麥荷鋤倦偷間也向城中看酒壚博塞雜歌呼夜夜長如正月半災傷不及什之三嵗寒民氣如春酣儂家亦幸荒年少始覺城中燈市好范至能星樓連甍珠閣迷仙閬幾處丨丨接絳河寶馬縱橫浮市照香塵撩亂夾春和宋貫之佛火神燈丨丨百輪張刻像圖形七寶裝影裏如開金口說空中似散玉毫光崔液蓮燈午夜朦朧淡月黃夢回猶有暗塵香縱橫滿地霜槐影寂寞丨丨半在亡東坡玉芙蓉丨作丨丨院院明博山香度小崢嶸莫言水北人稀到也有盤姍勃窣行韓子蒼金蓮子天碧銀河欲下來月華如水浸樓臺誰將萬斛丨丨丨撒向皇都午夜開一天星秦樓十二玉梯橫紫府千門夜不扄疑是東君弄春色綵雲移下丨丨丨詩話千門月九陌連燈影丨丨遍丨華傾城出馬騎匝路轉香車爛熳惟愁曉周流不問家更聞清管發處處落梅花郭利正羅綺塵十萬人家玉燭光門門開處見紅粧歌鐘喧夜銅壺永丨丨滿階丨土香星宿列從天上出蓮花不向水中芳張蕭逺燈火市春風米海上明月在江頭丨丨家家丨笙歌處處樓樂天車馬塵薄晚嘯遊人丨丨亂驅丨月光三五夜燈熖一重春長孫貞隱歌舞路星回河漢月將微露灑煙飄燈漸稀猶惜路傍歌舞處踟蹰相顧不能歸崔掖守燈輪三五月華新遨遊逐上春芳宵殊未極隨意丨丨丨陳子昻回步輦月上九門開星河繞露臺君方枕中夢我亦化人來光動星毬縋香餘步輦回相從穿萬馬衰病若為陪東坡御爐香淡月疏星繞建章仙風吹下丨丨丨侍臣鵠立通明殿一朵紅雲捧玉皇出東坡侍飲韶音奏赭黃傘下望龍章不斷惟聞蠟炬香一片韶音歸復道重瞳左右列英皇秦少游次前韻火樹星橋丨丨銀花合丨丨鐵鎖開暗塵隨馬去明月遂人來遊妓皆禮李行歌盡落梅金吾不禁夜玉漏莫相催蘇味道香車寶輦月色燈光滿帝都丨丨丨丨隘通衢身間不覩中興盛羞逐鄉人賽紫姑李人止鳳輦鰲山雪消華月滿仙臺萬燭當樓寶扇開雙丨雲中扶丨下六丨海上駕丨來鎬京春酒霑周宴汾水秋風陋漢才一曲升平人盡樂君王又進紫霞杯是夕以髙麗進樂又進一杯元豐中元夕御樓觀燈有御製詩時王禹玉蔡持正為左右相持正扣禹玉云應制上元詩如何使故事禹玉曰鰲山鳯輦外不可使章子厚為黃門侍郎笑曰此誰不知後兩日登對上獨賞禹玉此詩龍燈鶴焰魚龍曼衍六街呈金鎖通宵啓玉京冉冉遊塵生輦道遲遲春箭入歌聲寶坊月皎丨丨淡紫館風微丨丨平宴罷南端天欲曉回瞻河漢尚盈盈夏英公應制端門魏闕丨丨丨丨欎崢嶸燈火城中輦路平不待上林鶯百囀教坊先已進新聲少游曲巷橫街馬頭乘興尚推先丨丨丨丨一一穿盡道滿城無國艷不知朱户鎖嬋娟王荆公城市春風夜來人散殘更月曉陌猶存舊車轍彩燈丨丨已丨丨寒木人家猶臘雪張文潜人間和氣髙列千峯寶炬森端門方喜翠華臨宸遊不為三元夜樂事還同萬衆心天上清光留此夕丨丨丨丨閣春隂要知盡慶華封祝四十餘年惠愛深蔡君謨仁宗正月十四日御樓遣中使傳宣從官曰朕非好遊觀與民同樂耳見月聞燈玉漏銅壺且莫催鐵關金鎖徹明開誰家丨丨能間坐何處丨丨不看來崔掖賣薪買酒薄雪初銷野未耕丨丨丨丨看升平吾君勤儉倡優拙自是豐年歌笑聲東坡吳中二燈龍綜繅氷繭魚文鏤玉英雨絲風外皺雲網日邊明疊暈重重見分光面面呈不深間裏趣爭識箇中情范至能詠琉璃毬弱骨千絲結輕毬萬錦裝綵雲籠月魄寶氣繞星芒檀㸃紅嬌小梅粧粉細香等間三夕看消費一年忙前人詠萬眼羅吳鄉衆樂斗野豐年屢吳臺樂事并酒壚先疊鼓嵗後即旗亭先擊鼓不已亦迎節意燈市蚤投瓊臘月即有燈市珍竒者數人醵買之相與呼盧彩者得燈價喜膏油賤祥占雨雪晴篔簹仙子洞坊巷以連枝竹縛洞門多處十數重菡蓞化人城蓮花燈最多檣炬疑龍見舟人接竹桅檣之表置一燈望之如星橋星訝鵲成橋川小家厖獨踞犬燈髙閈鹿雙撑鹿燈屏展輝雲母琉璃屏風簾垂晃水精琉璃簾萬忩花眼密萬眼燈以碎羅紅白相間砌成多至萬眼千隙玉虹明琉璃毬燈每一隙映成一花簷蔔丹房掛梔子燈葡萄絲蔓縈蔔萄燈方縑翻史册生綃糊大力燈圖畫文册故事圓魄綴門衡月燈擲燭騰空穩小衮燈時擲空中推毬衮地輕大衮燈映光魚隱見琉璃壺瓶貯水養魚燈映之轉影騎縱橫馬騎燈輕薄行歌過顛狂社舞呈民間皆鼓樂謂之社火村田簔笠野村田樂街市管絃清街市細樂里巷分題句每里門作長燈題好句其上官曹别扁名官府名額多以絹或琉璃映燈旱船遙似泛夾道陸行為競渡之樂謂之划旱船水儡近如生水戲照心燈鉗赭裝牢戶獄燈嘲嗤繪樂棚山棚多畫一時可嘲誚之人堵觀瑶席隘喝道綺叢爭禁鑰通三鼓歸鞭任五更桑蠶春繭勸春繭自臘月即入食次所以為蠶事之兆花蝶夜蛾迎大白蛾花無貴賤悉戴之亦以迎春物也鳬子描丹闕並畫鴨子相餽遺鵝毛剪雪英剪鵝毛為雪花與夜蛾戴寶糖珍粔籹䭔拍吳中謂之寶糖䭔特為至美烏膩美飴餳烏膩糖即白糖俗言能去烏膩燃粉團欒意糰子熬稃腷膊聲炒糯米以卜俗名字婁北人號糯米花筵篿巫志怪香火婢輸誠俗謂正月百草靈故掃葦針箕之屬皆卜馬多婢子之筆為之帚卜拖裙驗弊帚繫裙以卜名掃帚姑箕詩落筆驚即古紫姑今謂之大仙俗名筲箕姑微如針屬尾以針卜伺其尾相屬為兆俗名針姑賤及葦分莖葦莖分合為卜名葦姑末俗難訶止佳辰且放行此時紛僕馬有客靜柴荆幸甚歸長鋏居然照短檠生涯唯病骨節物尚鄉情掎托成俳體咨詢逮里氓誰修吳地志聊以助譏評范至能端門萬枝燈前年侍玉輦丨丨丨丨丨璧月掛罘憲珠星綴觚稜去年中山府老病亦宵興牙旗穿夜市鐵馬響春氷今年江海上雲房寄山僧亦復舉膏火林間見層層散䇿桄榔林林疏月鬅鬙使君置酒罷簫鼓轉松陵狂生來索酒一舉輒數升浩歌出門去我亦歸瞢騰東坡太倉一粒粟富家一碗燈丨丨丨丨丨貧家一碗燈父子相聚哭風流太守知不知惟恨笙歌無妙曲陳季慈紗籠丨丨擎燭逢門入銅葉燒香見客遊東坡火樹九枝丨丨連金狄萬里霜輪上璧璫錢惟演雲車龍闕下丨丨鳳樓前顧况樓臺多少丨丨好風月樂聲香氣更無空石曼卿院落笙歌歸丨丨燈火下樓臺風香天醉笙歌外丨丨羅綺餘曼卿月滿雲歸萬年樹丨丨九重城楊徽之秉燭况遇新春夜何妨丨丨行溫庭筠遺叉寶叉驟馬多遺落依舊明朝在路傍張蕭逺看燈新正圓月夜九里丨丨時韋蟾穿市期人未到情如海丨丨歸來月滿軒坡詩古今合璧事類備要前集卷十五
