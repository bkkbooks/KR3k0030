body:
  text: 古今合璧事類備要後集卷五十七宋謝維新撰閣學門總學士直學士歷代沿革國朝庶官之外别加職名所以厲行義文學之士髙以備顧問其次與論議典校讎得之為榮選擇尤精元豐中修三省寺監之制其職並罷滿嵗補外然後加恩兼職直龍圖閣省郎寺監長二補外或領監司帥臣則除之待制雜學士給諌以上補外則除之係一時恩旨非有必得之理劉忠肅公奏議元祐二年詔增復館職及職事官並許帶職尚書二年加直學士中丞侍郎給舍諫議通及一年加待制石林燕語是時劉忘肅大摰上曰待制學士以侍從顧問為職自祖宗以來極天下之選不為定員今不考治行不察流品幸而給諫以上則計日而得之乞依元豐官制施行王巖叟亦進十不可之説以為待制祖宗之時其選最待出入朝廷讒一二人今立法無定員將一年待制滿朝必有車載斗量之謡朝廷不以為然紹聖二年詔職事官罷帶職非職事官仍舊續會要事類西班宣和三年詔丨丨學士待制員多令中書省具名取旨以班圖觀之學士待制班在西故曰西班續會要極選劉摯上言待制學士以侍從顧問為職自祖宗以來丨天下之丨同上寶儲內閣丨丨促上邃嚴之直夲朝箋表邇聨內閣丨丨同上延閣再濟丨丨之榮同上總待制餘並各見每閣條下歷代沿革唐永徽中命𢎞文館學士一人日待制於武德殿西門文明元年詔京官五品以上清官日一人待制于章善明福門先天末又命朝集使六品以上二人隨仗待制永泰時勳臣罷節制無職事皆待制于集賢門凡十三人崔祐甫為相建議文官一品以上更待制其後著著令正待制官日二人唐職林永泰元年敕裴冕等並集賢待制此始有待制之所然則蓋唐設官也國朝景德元年置龍圖閣待制以杜鎬戚綸充並依舊充職祥符二年詔班視知制誥列其下元祐令從四品掌侍從備顧問有所獻納則請到或奏封續會要事類入閣開成元年勑自今已後每遇丨丨日次對官未要隨班出並於東階松樹下立待宰相奏事退令齊至香案前各奏本司公事左右史待次對官奏事訖同出續通典餐錢永泰初詔裴冕十三人同於集賢院待制特給丨丨以優其禮次對宣宗大中三年勑待制官宜令與刑法官次對候對後唐長興二年勑朔望入閣待制丨丨一依舊規五代會要清官開元中每日以六品以上丨丨兩人待制於衙內唐職林文儒代宗永泰中勳臣罷節制無職事乃令待制於禁門書院間以丨丨公卿寵之備顧問唐德宗建中初自文官六品以上清望官每日二人更置待制以丨丨丨仍以延英南藥院故地為廨咨時政大和元年五月淮南節度檢校司徒平章事王播入見召對於延英殿又召待制官崔郾工部侍郎獨孤朗同對一刻時待制官虗設其名未曽引覿及此屢召丨以丨丨焉續通典創自先天延英待制丨丨丨丨晏類要日於武德紀元云永徽中詔許敬宗每丨待制丨丨丨殿此始有待制之名延英候對憲宗元和九年因武元衡奏正衙待制官詔於丨丨丨丨文班輪充周顯德中詔待制候對官於丨丨內丨丨五代史極天下選學士待制自祖宗以來丨丨丨之丨不為定員今不考治行不察流品幸而給諫以上則計日而得之劉忠肅公奏議置在朝聨朕選通經術有行義之士訪對制閣參掌祕圖丨丨內丨之丨本惟儒者之職胡文恭張升充天章閣待制非口舌任范仲淹徙蘇州為天章閣待制還朝言事愈亟宰相使人喻之曰待制官丨丨丨丨也仲淹曰論思侍臣職也余敢不勉龍圖閣附學士直學士待制歷代沿革龍圖閣國朝大中祥符中建龍圖閣在會慶殿西偏北連禁中閣東曰資政殿西曰述古殿閣上以奉太宗御書御製文集及典籍圖畫寶瑞之物會要及宗正寺所進屬籍世譜四朝志有學士直學士待制直閣學士大中祥符三年置以杜鎬為之班在樞密直學士之上六年詔結銜在本官之上會要直學士景德四年置以杜鎬為之班在樞密直學士之下祥符六年詔結銜在本官之上會要待制景德元年置以杜鎬戚綸為之並依舊充職四年詔班在知制誥之下並赴內殿起居會要自改官制為學士初復之職或知制誥平出除之官制舊典事類西清元祐中蘇轍奏祖宗御集皆於丨丨建重屋號龍圖天章寶文閣以藏其書為不朽計祕閣用進丨丨之拜胡文恭行歐陽修制學士老龍蔣樞密之竒為淮漕求字於徐守信徐書龍字而闕三點蔣曰何書之不全也曰它日當為足此是歲寒計稱旨除龍圖閣直學士及回持前字見徐徐索筆為作三龍未幾遂進丨丨奎象中禁寶儲上應丨璧之丨先朝謨訓逺同河洛之符東坡謝表內閣丨丨深嚴同上淵圖丨丨祕職蔡襄行歐陽公制凝嚴之職見寶文學士門羲圖之序仍進丨丨丨丨賜鄭溫伯辭龍圖學士詔豈如一言孔道輔論廢后事天下聳聞其風采近臣獻詩十首執政請以為龍圖學士上曰千首詩丨丨孔道輔丨丨拜龍圖閣冠於五閣河圖遂在西清朝位丨丨丨丨初寮除龎寅助制龍圖老子范文正公仲淹以龍圖直學士帥邠延涇慶四路威德著聞夷夏竦服熟戶蕃部率稱曰丨丨丨丨中朝人士亦以此呼之言行録學士奉祠淳熙中林安宅以丨丨丨丨書閣之拜丨丨丨丨衆以為宜東坡集直學士貴班延閣祕藏學士丨丨淇水除李承之制峻列河圖寵名增丨班丨曲阜行李南仲辭免不允詔凝嚴丨丨之職見寶文學士制清近知鄧州陳堯咨會赦當復龍圖閣直學士真宗曰學士清近之職非會赦可復祥符八年赴內殿起居景德四年八月以龍圖閣待制杜鎬為龍圖閣直學士班在樞密直學士之下待制知制誥之上並丨丨丨丨丨至閣下撫慰真宗尤禮杜鎬上開樽酒親封題以賜鎬素不飲飲之疾作上親丨丨丨手調藥丨丨令安卧乃歸同上待制美職河圖丨丨曲阜龍圖待制徐鐸制近綴改河圖之丨丨同上除錢待制並命戚綸字仲言時初創待制與杜鎬丨丨物論榮之廣內河圖丨丨之職曲阜除傅堯俞制延閣侍從丨丨丨丨之職行張商英制內閣應對丨丨丨丨之職行王覿制學士初復之職見前沿革詩集羣玉先朝丨丨殿冠珮環羣公神文煥王度喜色見天容御榻誰復登帝書元自公緬懷辨服士酬獻鳴瑽瑢陳后山觀文忠公六一圖書詩紫薇册府藏書在丨丨退朝稽古助論思楊億詩開䇿府羣玉天中丨丨丨神龜溫洛薦圖書楊億龍圖閣觀御書黃閣老龍閣便為丨丨丨周益公賀胡邦衡除龍圖學士天章閣附學士直學士待制歷代沿革國朝天禧四年初建天章閣在會慶殿之西龍圖閣之北明年仁宗即位修天章閣工畢奏真宗御製安於天章閣東曰羣玉殿西曰蘂珠殿北曰夀昌殿南曰延康殿內以桃花文石為柸之所以在位受天書祥符改曰天章取為章于天之義天聖八年置待制慶𩔶七年又置學士直學士會要周益公宏詞編題又有侍講學士慶厯七年初置在龍圖閣學士之下詔曰欽惟聖考濬發宸文百篇森布於寶函三襲肇興於華閣肆豫纂紹之始務闡師儒之隆遂延勸講之臣欽佇論思之益掩玉府藏書之盛延金門待詔之才宜令廣侍從之員抑亦副遹追之念特置天章閣學士直學士學士罕以命人迄仁宗世才王摯一人官制舊典云天章閣只除待制不除學士難稱呼也直學士慶厯七年初置天章閣直學士在龍圖閣直學士之下會要待制天聖八年初置寓直於祕閣與龍圖遞宿尋命范諷鞠詠充職職官分紀詔曰真宗皇帝躬上哲之資據大寧之會受翠媯之瑞籙發谷口之璿源勒銘喬封奠圭方澤烜赫景炎丕隆寶構凡經禮樂之制纘成辰象之篇爰即禁圖肇新層閣榜以天章之號煥乎䇿府之華宜擇推才俾參近著可特置天章閣待制位龍圖閣待制之下會要詔俯近危楹創崇層宇榜以天章之美冠於䇿府之名宜建官聨並置材彥事類西清見龍圖閣䇿府見待制沿革學士不除見沿革注難呼同上玉府藏書見沿革詔金門待詔同上凝嚴之職見寶文閣學士待制西序進職丨丨曲阜行黃履天章閣待制云內閣進聨丨丨王岐公除許亢制禁途延對丨丨王岐公除張友直制延閣丨丨侍從之邃曲阜行范純禮復天章閣待制識大體髙若納言古者三公坐而論道今二府對才數刻安能盡萬機宜賜坐從容如唐延英故事上以兹言丨丨丨擢拜天章閣待制待碩儒萃帝文於寶締以丨丨丨王岐公除張友直制建官之署天聖八年詔煥乎堯言星羅而雲布繳如禹律玉振而金相雖敦稽古之風未立丨丨丨丨詩集鳴玉峩峩天中閣丨丨改新步王荆公送元待制知福州寶文閣附學士直學士待制歷代沿革國朝寶文閣在天章閣之東西序羣玉蘂珠殿之北即舊日夀昌閣慶厯改曰寶文嘉祐八年英宗即位詔以仁宗御書御集藏于寶文閣命王圭撰記立名治平四年神宗即位始置學士直學士待制恩賜依龍圖英宗御書附于閣會要宏詞編題學士治平四年初置以吕公著兼詔曰昔我祖宗咸有制作煥于簡編河漢昭回奎璧相映乃規層宇遂在西清憲上帝藏書之府彰纍朝稽古之盛並揭嘉名以登峻望俾服凝嚴之職因為咨訪之地寶文閣宜置學士直學士待制直學士治平四年初置以邵必為以邵必為之會要職略待制治平四年初置事類西清見龍圖閣門帝府見學士詔鈿軸寶函丨丨丨丨未終翻緑白雲紫氣丨丨丨丨遽遂上賓並同上學士在西清乃規層閣邃丨丨詳見沿革注夢邃殿治平三年豫為知制誥夏六月丨丞相遣朱衣吏召命草某人為丨清丨學士制明年五月丞相遣朱衣吏召當制舍人吕縉叔除邵不疑為寶文閣學士後數日得承旨張公所作詔云乃規層構邃在西清記去嵗之夢與詔文相合若符契焉春明退朝録大訓九歌治平置學士等詔云丨丨丨丨之重垂世其長廣內祕室丨丨丨丨之藏詒謀無極同上直學士嚴職凝丨之丨見前近班西清丨丨曲阜吕嘉問制奎文丨丨寶訓入直禁嚴東坡答李寶文啓寶直丨奎之丨表類待制魁甲章衡知澶州神宗曰卿為仁宗朝丨丨寶文藏御集之處未始除人今處卿禁途延閣丨丨曲阜王汾制近職延閣丨丨范純粹制通籍丨丨延閣同上除王欽若制侍從之班延閣丨丨丨丨除李之純制儒學之選三聖圖書萃在延閣丨丨丨士列職其中諷議討論維時妙選除蔣之竒制並同上顯謨閣附學士直學士待制歷代沿革國朝元符元年曽布鄧洵仁各申請建閣詔翰林學士中書舍人撰閣名五以聞續建閣藏神宗御集以顯謨為名神宗大新政事故以丕顯文王謨徽宗建中靖國元年詔以顯謨閣為熙明閣仍置學士直學士待制詔略曰神宗皇帝言則為文昭如雲漢寶之垂世炳若丹青仙馭升遐泰陵繼序乃眷祖宗之舊悉藏金玉之編邃在西清並崇華宇爰咨邇列俾訪遺文鈿軸未終雲軿忽逺肆沖人之纂紹惟往憲之欽承用揭嘉名乃延俊望詒謀有逺豈徒琬琰之並陳與天無窮是惟奎璧之相照宜以顯謨為熙明閣續奉旨仍以顯謨為額此據周益公宏詞編題而續會要云復顯謨舊名年月無考按次年已詔顯謨閣學士直學士如三閣故事復名顯謨恐在此年崇寧元年詔顯謨閣學士直學士待制如三閣故事序位在寶文閣學士直學士待制之下三年又詔以熙寧元豐功臣圖形於顯謨閣續會要詔略曰神宗御集㧾九千八百餘篇藏于禁閣揭以顯謨所以丕昭聖作也維時功臣宜列于此其熙寧元豐功臣圖形於顯謨閣文學士建中靖國元年置詔如三閣故事序位在寶閣學士之下續會要士直學士建中靖國元年置詔序位在寶文閣直學之下續會要待制建中靖國元年置詔序位在寶文閣待制之下同上事類熙明見沿革邃清見沿革詔注禁閣神宗御集總九千八百餘篇藏于丨