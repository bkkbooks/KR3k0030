body:
  text: 古今合璧事類備要别集卷七十九宋謝維新撰走獸門兔格物總論兔鼠形尾匾彎短大如貓毛色褐耳大而鋭且卓口缺長鬚尻九孔趺居趫捷善走舐雄毛而孕生子從口中出其子婏敷万反或曰䨲奴侯反㕙其狡者毚又其大者也一種前足寸餘後足幾尺行即用後足跳一躍數尺止則蹶然仆地生於東北西北極邊之地謂之蹶兔亦曰跫跫巨驉又一種似兔而大青色象形首與兔同足與鹿同是㲋也亦兔類或謂兔無雄望月而孕當有能辨之者事類明視祭宗廟之禮兔曰丨丨禮記丈人山中卯日稱丨丨兔也抱朴子月精兔者明丨之丨典略星精稟丨丨握斗樞玉衡星發於兔白氏帖躍躍丨丨毚兔遇犬獲之小雅爰爰有兔丨丨國風兔罝肅肅丨丨施于中林周南兔蹄得丨丨待宋人有耕者田中有株兔走觸折頸而死因釋耕丨丨冀復得兔為宋國所笑韓子環闕髠説齊威王曰韓盧者天下之俊犬也東郭㕙者海於也韓盧逐東郭狻騰山者五丨丨者三兔極前大擅其功苦而兔俱疲各死其處田父見而獲之無勞持顧兵弊衆恐強秦大楚乘其後而有田父之功也狡兔死高祖令武士縛信載後車信曰果若人言丨丨丨良狗烹信傳白兔闕種松千株遭母喪負土成墳有丨丨丨其下毛為識梁冀起兔苑刻丨闕如朱漢哀帝建平元年山陽得白兔赤丨丨丨古今注集衆捕見瓜門與闕王武俊嘗丨賔丨丨一日射兔九十五觀者駭伏孔帖目為兔五代周張青州略通儒術闕避吏事唐開成初依翟宜威於為從事滑稽事彥威丨丨姦丨讖言兔闕月朔之明日皆床我生於卯明年歲旅其次二卯也我以其時當即位本傳雕挾兩兔闕韓退之毛頴傳毛頴者中山人也其先明視佐禹治東方土養萬物有功因封於卯地死為十二辰嘗曰吾子孫神明之後不可與物同當吐而生已而果然明視八世孫䨲世傳當殷時居中山得神仙之術能匿光使物竊姮娥騎蟾蜍入月其後代遂隱不仕云居東郭者曰㕙狡而善走與韓盧爭能盧不及盧怒與宋鵲謀而殺之醢其家秦始皇時蒙將軍恬南伐楚次中山將大獵以懼楚召左右庶長與軍尉以連山筮之得天與人文之兆筮者賀曰今者之獲不角不牙衣褐之徒缺口而長鬚八竅而趺居獨取其髦簡牘是資天下其同書秦其遂兼諸侯乎遂獵圍毛氏之族拔其豪載穎而歸獻俘於章臺宫聚其族而加束縛焉秦皇帝使恬賜之湯沐而封諸管城號曰管城子日見親寵任事頴為人強記而便敏自結繩之代以及秦事無不纂録陰陽卜筮占相醫方族氏山經地志字書圖畫九流百家天人之書及至浮屠老子外國之説皆所詳悉又通於當代之務官府簿書市井貨錢注記推上所使自秦皇帝及太子扶蘇胡亥丞相斯中書府令髙下及國人無不愛重又善隨人意正直邪曲巧拙一隨其人雖見廢棄終默不泄惟不喜武士然見請亦時往纍拜中書令與上益狎上嘗呼為中書君上親決事以衡石自程雖宫人不得立左右獨穎與執燭者常侍上休方罷穎與絳人陳玄𢎞農陶泓及會稽楮先生友善相推致其出處必偕上召穎三人者不待詔輒俱往上未嘗怪焉後因進見上將有任使拂拭之因免冠謝上見其髮秃又所謨畫不能稱上意上嘻笑曰中書君老而秃不任吾用吾嘗謂君中書君今不中書耶對曰臣所謂盡心者因不復召歸封邑終於管城其子孫甚多散處中國夷狄皆冒管城惟居中山者能繼父祖業惟太史公曰毛氏有兩族其一姫姓文王之子封於毛所謂魯衛毛聃者也戰國時有毛公毛遂獨中山之族不知其本所在子孫最為蕃昌春秋之成見絶於孔子而非其罪及蒙將軍拔中山之毫始皇封之管城世遂有名而姫姓之毛無聞頴始以俘見卒見任使秦之滅諸侯頴與有功賞不酬勞以老見疏秦真少恩哉學史記詩集天資潔白天冥冥雲濛濛白兔搗藥姮娥宫玉關金鎖夜不閉竄入滁山千萬重滁泉清甘瀉大壑滁草軟翠搖輕風渴飲泉困棲草滁人遇之豐山道網羅百計偶得之千里持為翰林寶翰林酬酢委金璧珠箔花籠玉為食朝隨孔翠伴暮綴鸞鳯翼主人邀客醉籠下京洛風埃不霑席羣詩名貌極豪縱爾兔有意果誰識丨丨丨丨已為纍物性拘囚盡無益上林榮落幾時休回首峰巒斷消息歐陽公白兔天使潔白水晶為宫玉為田姮娥縞衣洗朱鉛宫中老兔非日浴丨丨丨丨宜嬋娟揚鬚弭足桂樹間桂花如霜亂後前赤鴉相望窺不得空凝兩瞳射日月東西跳梁自長久天畢橫施亦何有憑光下視罝網繁衣褐紛紛謾回首去年驚墜滁山雲出入虛莽猶無羣奇毛難藏果見獲千里今以窮歸君空衢險幽不可返食君庭除嗟亦窘今豫得為此兔謀豐草長林且遊衍王介甫白兔拔毛為筆可笑姮娥不了事走却玉兔來人間分寸不落獵人世滁州野叟獲以還霜毛半茸目睛殷紅條金練相繫擐馳獻舊守作異玩况乃已在蓬萊山月中辛勤莫搗藥桂傍杵臼今應間我欲丨丨丨白丨研朱寫詩破公顔梅聖俞永叔白兔赤身謝德毛氏穎出中山中衣白兔褐求文公文公嘗為頴作傳使頴名家傳無窮遍走五嶽都不逢乃至琅琊聞醉翁傳是昌黎之後身文章節行一以同滁人喜其就籠紲遂與提攜來自東見公於巨鼇之峯正草命令辭如虹筆秃願脫穎以從丨丨丨丨歸蒿蓬梅聖俞不如月中宿兔飢食山林兔渴飲川澤與人不瑕疵焉用苦求索天寒草枮死見窘何太迫上有蒼鷹禍下有黃犬厄一死無足悲所恥敗頭額敢期揮金遇倒槖無難色雖非獵者意頗塞仁人責兔兮兔兮聽我言月中仙子最汝憐丨丨亟返丨丨丨休顧商巖井嶽麓秦少遊答裴仲謨放兔行不著煙火香東郭阿㕙駝褐裳清馥丨丨丨丨丨姮娥喚入廣寒殿詔許搗藥不許嘗金丹煉成紫皇喜玉臼自攜銀漢洗偷將缺吻吸瓊漿蛻盡骨毛作仙子鬢絲吸落桂枝風人間封作管城公先生何許得尸解貌如枯蟾帶玄芥麒麟擘脯未必如耶律曬豝差不逮先生錦心氷雪腸銀鈎珠唾千萬章管城奔命困書囿阿㕙漆身嬉醉鄉老夫去年左車脫匙抄爛飯猶戞戞太息再拜謝阿㕙尚堪挂壁縈蛛塵一飯瞻仰齒生津楊廷秀謝陳希顔惠兔豝猴格物總論猴猱也獼也一名王孫一名胡孫楚人謂之沐猴狀類人毛色黃有尾玃大母猴也色蒼黑其老者為獑猢最駿捷鳴噭噭然而悲居懸崖峭壁間善升木啖瓜果黍栗等物亦多智山民苦之或云獼猴八百歲變為猿又五百歲變為貜又一千歲變為蟾蜍然皆􅢈之屬也事類沐猴冠項羽楚人丨丨而丨沐猴舞許伯仁弟為丞相二千石皆賀蓋寬饒為司𨽻不行許伯請之寬饒乃往東嚮獨坐酒酣樂長信少府檀長卿為沐猴與狗鬬坐皆大笑寬饒不恱因劾奏長信少府以列卿而丨丨丨失禮不敬前漢譏周泰魏鍾育事見嘲謔門嘲文樹安西衙將劉文樹善奏對髭生頷下貌類猿猴上令黃幡綽嘲之文樹切惡猴猿之説密貽幡綽祈不言之幡綽進丨曰可憐好丨丨髭鬚共頦頥别住面孔不似猢孫猢孫極似文樹上大笑鄭棨傳信記承象語有人種黍山中患獼猴食之聞介象有道術從之乞避猴之法象曰無他法也明日往黍所望見羣猴便大喚語之曰已白介君教莫侵食黍此人明日視黍遇羣猴適欲下樹丨丨丨獼猴各自還山遂絶迹神仙傳擘鳶翅有人畜一子母胡孫一日鳶飛下搏其子對母啄其腦食其髓胡孫哀鳴三日不食徑於厨中取肉一片戴項上往中庭似有所伺逡巡鳶果來摶肉胡孫兩手扯丨其翅囓腦食髓衆人甚為快意景溪間言號孫供奉唐昭宗播遷隨駕伎藝人止有弄猴者猴頗馴能隨班起居昭宗賜以緋袍丨丨丨丨羅隱下第詩云何如學取孫供奉一笑君王便著緋朱梁篡位取此猴令殿下起居猴望殿陛見全忠徑趨其所跳躍奮擊遂令殺之唐臣愧此猴多矣幕府燕聞録王延壽王孫賦原天地之造化實神偉而崛奇道玄微以密妙信無物而弗為有王孫之狡獸形陋觀而醜儀顔狀類乎老公軀體似乎小兒眼睚崖􅀈五流反以􅴚恤視職睫以映呼悅反睳呼迷反突髙目而曲頞䁵音儇瞁呼久反歷而隳離鼻􅪱許解反齁許侯反以䶋吸􅦃許夾反耳聿役以謫知口嗛呼忝反呥丹以䶨側成反齺鄒唇硤制狹反喟而懾反而􅬯匹卑反􅀈妍卑反齒崖崖以齴齴巘嚼􅰘􅸎而囁唲儲糧食於兩頰稍委輸於胃脾踡兔蹲而狗踞聲歷􅀈而喔咿或嗝嗝而嚇嚇又嘀的嗅歷反其若蹄姿僣傔呼店反而揔贑嗔豁盱間以頊醯胎台腕朡子公反而􅀈覔腸芻朊阮􅀈而兖反愞而踧訾生深山之茂林處嶄岩之嶔崎性􅘀猜而㺕疾態峰出而橫施緣百仞之高木攀窈裊之長枝背牢落之峻壑臨不測之幽溪尋柯條以宛轉或捉腐而登危或羣跳而電透或成懸而瓠垂上觸乎而拏攫下對足而登跂至攀欖以狂接覆縮臂而勇赴時遼落以蕭索乍聛睨以容與或蹂趹以踐遊工咨諏而攢聚扶嶔崟以陳緣躡危臬而騰舞忽涌逸而輊迅羌難得而覼緀伺甘苦於人類好餔糟而啜醨乃設酒於其側竟爭飲而䠝縛緣纓馳顓陋酌以迷醉矇眠睡而無知暫拏鬃以繕遂緌以羈縻歸鎖繫於庭廄觀者吸呷而忘疲栁宗元憎王孫文猿王孫居異山德異性不能相容猿之德靜以恆類仁讓孝慈居相愛食相先行有列飲有序不幸乖離則其鳴哀有難則內其柔弱者不踐稼蔬木實未熟相與視之謹既熟嘯呼羣萃然後食衎衎焉山之小草木必環而行遂其植故猿所居山嘗鬱然王孫之德躁以囂勃諍號呶唶唶疆疆雖羣不相善也食相噬囓行無列飲無序乖離而不思有難推其柔弱者以免好踐稼蔬所過狼籍披攘木實未熟輒齕咬投注竊取人食皆知自實其嗛山之小草木必凌挫折挽使之瘁然後己故王孫之居山恆蒿然以是猿羣衆則逐王孫王孫羣衆亦齚猿棄猿棄去終不與抗然則物之甚可憎莫王孫若也余山間久見其趣如是作憎王孫云詩集緣柱嘗聞養麒驥辟意繫獼猴供奉新教藝將軍舊病偷聊看丨丨杪尚想傍崖頭更祝南州使如拳試為求梅聖俞詠楊高品馬廄猢孫滿山聞説獼猴性頗靈相車來使丨丨迎鞭羸到此何曽見始覺毛蟲更世情程作淳獼猴時山僧云晏元獻來獼猴滿山婢喜奴顚真宜少陵覓未解栁州增丨丨嘗儲果丨丨屢掣繩黃山谷韓駒謝人寄小猢猿猿附狙格物總論猿似猴而大或黃或黑長前臂不踐土石超遙於萬木之間惟通臂脛身故善緣能引氣故得夀天氣澄霽則長嘯霧雨昏暗則無聲人每當其吟嘯之時而捕獲之則亦不復生矣狙狖亦似猿與猴皆􅢈之屬也事類五月生五九四十五故猿丨丨丨也家語三峽鳴巴東丨丨猿長丨至三聲聞者皆淚荆州記君子化猿周穆王南征一軍盡丨丨丨為丨為鵠小人為蟲為沙抱朴子老人化猿越王問范蠡手劒之術蠡曰臣聞趙有處女國人稱之願王請問之於是王乃請女女將北見王道逢丨丨自稱袁公袁公問女曰聞女善為劒願得一觀之處女曰妾不敢有隱也惟公所試公即挽林杪之竹似桔橰末折墮地女接取其末袁公操其本而刺女女因舉杖擊之公即飛上樹丨為白猿抱樹以號養由基楚將善射去楊葉百步射之百發百中楚共王獵見白猿繞樹避箭王命由基射之基始調弓矯矢未發猿乃丨丨丨丨淮南子拔箭塞瘡蜀鄧艾見玄猿抱子在樹上引弩射之中猿母其子為丨丨捲樹葉丨丨艾歎曰吾違物性其將死矣乃投水中白氏帖與績談論王績遊嵩少選一散岩石堂績棲止焉月夜見一胡鬚眉白而瘦稱山公丨丨丨丨往往有異績疑其怪取鏡光出而胡者走失化為猿而殞唐異聞録為魏執㸑魏元忠素強正其微時家貧止一婢厨中方㸑出外汲水還乃見老猿為其守火婢驚白元忠猿執㸑曰猿恐我乏使為我㸑不亦善乎後亦無他廣異志謁巴西侯吳郡張鋋罷秩歸蜀行次巴西有人道左出拜曰吾君奉邀乃巴西侯耳既見飲酒命樂夜將半鋋亦假寐將曉悸而寤見身卧石龕中有一巨猿狀如人醉卧於地張續宣室志娶袁氏女孫恪丨丨丨丨後從南海辟挈家過端州袁欲遊峽山寺云舊老門徒既至若熟其道徑持碧玉環獻僧及齋罷野猿數十聯臂而下袁氏惻然題云不如遂伴歸山去長嘯一聲煙霧深擲筆化為猿追嘯而去恪驚甚詢僧僧乃言為沙彌時所養開元中力士過此憐其慧強以束帛易之歸獻天子後聞馴擾於上陽宫內碧玉環本胡人所施亦當時隨猿者續世説及傳奇覩黑衣郎張長史賃凶屋以居丨丨丨丨樹上擲瓦見擊其弟射殺之乃猿也宣室志見白衣婦穎川陳巖景龍初舉孝廉於京師至渭南縣丨一婦人貌甚殊衣丨丨立於路隅掩袂而泣生扣之丨人乃曰妾楚人也侯氏子家弋陽先人以高尚聞於湘楚間由是隱迹山林雖一女子亦有箕山之志孔氏帖謂報時猿商山隱士髙太素所居曰清心亭每一時至則有猿啼於庭下丨之丨丨丨天寶遺事吳筠玄猿賦前者稱周穆王南征君子變為猿鵠小人變為蟲沙夫神用無方未必不爾筠自入廬嶽則覩斯玄猿嘉其雨昏則無聲景霽則長嘯不踐土石超遙於萬木之間春咀其英秋食其實不犯稼穡深棲逺處獨有君子之性異乎狙狖之倫且多難以來庶品凋敗麋鹿殫於網罟遺氓困於誅求此獨蕭然物莫能患豈不以託迹敻絶不才逺禍昔夫子嘗嘆山梁雌雉曰時哉時哉豫因感之以作賦云耳雖伊玄猿之所育干南國之層岑動不踐地居常在林泛泛而無據亦熙熙而有心氛嵐昏而共默風雨霽而爭吟使幽人之思清暢騷客之涕霑襟何必聆嶰谷之管對雍門之琴哉歷千尋之喬木俯萬仞之危嶠弄遊雲之亂飛嬉落日之橫照連肱澗飲命侣煙嘯或聚而間棲或分而逈趠夀同靈鶴性本君子阻重巖之險非虎豹所履蔭交柯之密豈鶚能視故逢蒙操弓憚高深而止鄧公折箭含惻隱而已何患纍之罕臻不牽物以利己詎若狒狒凌人以就戮猩猩甘酒而送死夫時珍貂裘世寶狐白徒能工於隱伏終見陷於機辟麝懷香以賈害狙伐巧而招射小則翡翠殞於羽毛大則犀象賤於齒革孰能去有用之損取無用之益固棄置於常情永逍遙以自適無威刑以相凌有族類而相親食資諸物衣取諸身不賦不役靡勞靡勤如政教之未施保巢居以還淳匪虞氏之所及何狙公之能馴吾知人為物之貴又焉測元化之所謂大鈞乎李德裕白猿賦此郡多白猿其性馴而仁愛所止榛木不瘁果熟乃取不與玃相狎猴亦畏而避之昔傳奕有猿猴賦但説其變態似優以為戲玩且不言二物殊性豫今作賦以辨之耳昔周穆之南邁將奮旅於湘沅既隻輪而無返化君子以為猿嗟物變而何常故族類而始蕃或哀吟於永夜或清嘯於朝暾峯合沓以連響水潺湲而共喧矧三聲之未絶感行客之銷魂觀其雖為異物而猶喜處動不為暴靜皆擇所柳松鬱而不殘楂梨熟而後取顧狖鼯與猱㹶信莫得而儔侣若乃靈變難測神通有知女試劒而方接舉修邁而止馳養矯矢而未發眄喬柯而已悲凌崚壑而電曜挂長蘿而匏垂避側足而不履尚有畏於阽危施於射則李控弦而盈貫用於道則華養形而不衰彼沐猴之佻巧雖貌同而心異既貪婪而鮮讓亦躁動而不忌嗟斯物之既馴有仁愛而可畏故鄧生以違性興感齊后以望思掩淚嗟乎人之化也實可悲辛或少貴而老賤或始富而終貧中行之後困於畎畝叔敖之子疲於負薪何止鯀化能而為厲哀成虎而不仁變欽鶚於瑤席鳴杜魄於巴氓乃知人世之可厭不足控摶而自珍狙狙伐巧吳王浮於江登於狙之山衆狙見之恂然棄而走有一狙焉委蛇攫搔見巧乎王王射之敏給摶矢王命相者趨射之狙死王顧謂其友顔不疑曰丨之丨丨恃其便以傲豫以至此極也莊子狙賦芋宋有丨公愛養狙而家匱將限其食曰與若芋朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆恱列周公服今取猿狙而衣丨丨之丨彼必齕囓挽裂盡去而後慊莊子詩集擁條吟寒猿丨丨丨文選挂藤飲丨丨疑取丨吟枝似避弓蕭詮飲相喚山猿丨丨丨杜晚成羣猿狖丨丨丨李白啼虛璧裊裊丨丨丨蕭蕭挂冷枝艱難人不免隱見爾如知慣習元從衆全生或用竒前林騰每及父子莫相離杜嘯秋月謝守攜猿東路長裹藤穿竹似瀟湘碧山初瞑丨丨丨紅樹正寒啼曉霜陌上楚人皆駐馬里中巴客半歸鄉心知欲稽南遊侣未到三聲恐斷腸許渾和借猿晴樹為鄰放爾千山萬里身野泉丨丨好丨丨啼時莫近瀟湘岸明月孤舟有旅人吉師老放猿王孫非類岷嶺高無敵來從第幾層攀緣殊不倦趫捷爾誠然晚嘯思危石晴懸憶古藤丨丨丨汝丨只可以文憎文與可時作一聲悲淡雲疏雨濕風枝衡嶽啼猿憶此時回首那無萬里感向人丨丨丨丨丨鍾儀故有南冠恨莊舄猶知舊國思車馬紛紛九城客路傍翻笑斷腸為劉原父月明一長嘯子求稚猿書至閩我説猿意特贈君吾州四扇列巖巘巨木轇葛凌氤氲探窠裁檻走疾置十日可到澄江清嗟憐庶品各有性拘憂適喜無間分彼猿之類宅丘壑愛戀深厚編前文戲禽雖傳古仙者射臂未議原將軍朝棲喬林之蒼莽夕飲幽澗之潺湲山空丨丨丨丨丨商船海上迎風聞君家東園豈不美檜竹翠密蘭茝薰斯猿儻别故時侣舉首隔斷千里雲縱之不遣西得所推大此理惠澤氛今吾郡邑決籠柙蹄者奔逸羽者騫因觀微物通萬化譬諸獻鵠良有云蔡君􅀈答曷公綽求猿遊戲暫人間佳人劒翁孫丨丨丨丨丨忽憶嘯雲侣賦詩留玉環坡古今合璧事類備要别集卷七十九
