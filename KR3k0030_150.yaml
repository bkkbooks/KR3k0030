body:
  text: 古今合璧事類備要後集卷八十一宋謝維新撰監當門總監當州糧料院監鎮錢監作院監倉交引監鹽庫務監酒監門監茶監務監場歷代沿革太平興國三年十月詔諸路轉運使副當體量部內監當京朝官內公勤亷幹顯有勞績者具名聞奏與親民差遣國朝哲宗正史職官志監當官掌場務庫藏出納之事其征榷場務嵗有定額以登耗為殿最賞罰凡課利所入逐日具數申于州四朝志髙宗建炎元年詔諸路州縣監當官有闕令漕臣辟奏一次二年詔監當官以二年為任滿六考許關升四年詔繁劇去處止得添差一員乾道六年詔吏部將監當官闕員依條注識字中興會要錢監國朝自開寶平吳之後因其舊制置錢監千畨易既而江淮荆浙閩廣之地皆有監聖朝職略州糧料院事類趙抃槩平丨清獻公丨字閲道監潭州糧料院出納不限時日丨量丨人便之神宗實録宗愈薦除胡宗愈諡修簡監楚州糧料院伯父宿為樞密副使出守杭陛辭英宗問之曰子弟誰可繼卿者乎宿以丨丨對會曽公亮丨召試學士院丨集賢校理錢監鐘官王莽時主鑄錢官曰丨丨漢官志圜府管錢官稱丨丨之職涖金冶丨丨之職胡文恭行成有宗制司寶冶丨南州丨丨之饒佐縣宫圜府之用宣勞于外興利在公同上行葛源制七福五銖沿挾銅之令以增丨丨因採山之法用廣丨丨同上增十餘萬劉濛叟掌饒州鑄錢監江南舊制鐵錢至是改用銅錢濛叟在職三年丨課丨丨丨真宗實録監倉都尉韓信治粟丨丨倉令漢太丨丨淳于公司倉大父之古祁州丨丨韓文楊燕竒碑掌粟辨榖倉人丨丨之藏丨九丨之物以待邦用若榖不足則止餘法用有餘則藏之以待歲凶而頒之周禮以官為氏前張嘉疏曰孝文時吏居官者或長子孫丨丨丨丨倉氏庫氏則倉庫吏之後也前王嘉傳躬坐庾中傳獻簡公堯俞復起居舍人監衛州黎陽倉草場郡守檄邑官代公治出納公曰不可居其官不可以曠職雖祁寒隆暑必丨丨丨丨治事不懈言行録服勞廪委丨丨丨丨公是行劉誥制庾氏之掌當丨丨丨丨胡文恭行裴士傑制監鹽均輸置丨丨鹽鐵官前食貨志榷束丨丨池鹵生息倍稱元微之行唐慶制領鹽鹵以幹蠱之才丨丨丨之務管榷條制動皆得宜白集裴𢎞泰制修牢盆公倕幹池鹽于蒲丨丨丨謹衡石煎和既精飴散乃盈商通而瀳至吏懼而循法幾不絓網而國用益饒歲秒會其所入贏羡什百詔下褒其能劉禹錫崔公倕碑舉於魚鹽膠鬲丨丨丨丨之中孟子魚鹽富國齊管仲丨丨丨丨局課衍盈丨丨丨丨胡文恭行姚穎制利局饒衍商丨丨者以丨丨名最同上行買程制榷束之籍鹽鐵丨丨丨丨杜牧行李鄠制牢盆之入往幹丨丨丨丨頗增近監之饒胡文恭行劉雍制征算之饒丨丨丨丨衍於局次同上行牛拱辰制復海陵堰范文正公仲淹字希文監泰州西溪鹽稅貽書發運使張綸丨丨丨丨綸表知興化縣仁宗實録築捍海堤范仲淹監泰州西溪鹽稅建白於朝請丨丨丨丨於三州之境長數百里以衛民田言行録目為學士鹽劉忠肅公摯責監衡州鹽倉先是倉吏與綱兵姦利相市雜以偽惡人未嘗食善鹽摯悉意核視且儲其羡以為償弊減十七八父老丨丨丨丨丨四朝國史臨管榷之局丨丨丨丨丨置無遺力沛有羡緍胡文恭行毛維藩制監酒五齊酒正掌酒之政令以式法授酒材辨丨丨之名一曰泛齊二曰醴齊三曰盎齊四曰緹齊五曰沈齊六物仲冬之月乃召大酋秫稻必齊麴糵必時湛熾必潔水泉必香陶器必良火齊必得兼用丨丨大酋監之毋有差貸注大酋者酒宮之長也湛漬也成炊也火齊醒熟之調也記月令榷酤初丨酒丨前漢武帝紀題小詩劉李孫字景文監饒州酒務王荆公為江東提刑巡歷至饒按酒務始至廳事見屏間有丨丨丨曰泥喃燕子語梁間底事來驚夢裡間説與傍人應不解枤藜攜酒到芝山問專知官誰所作答以季孫詩即召與之語嘉嘆升車而去不復問務事既至傳舍適學生持狀請差官攝學事公判監酒殿直一郡大驚遂知名石林詩話上兵論陳執中諡恭公監慶州鹽酒稅丨河西丨丨五篇仁宗實録有史學劉恕字道原丨丨丨司馬光修資治通鑑奏請同編修光出知永興軍恕亦以親老告歸南康乞監酒稅以就養東都事略課嬴升奬慶厯四年詔舊制諸道榷酤滿三萬貫舉官監臨歲滿而丨丨者丨丨之國朝會要召為正言鄒浩字志完監袁州酒稅尋丨還復丨右丨丨東都事略臨榷木之酤丨丨丨丨丨及連敖之掌胡文恭行孫咨制監鎮不行市易蘇軾奏云趙挺之元豐末通判德州黃庭堅監本州德安鎮挺之希合提舉官王景棻意欲於本鎮行市易法庭堅謂鎮小民貧丨堪誅求若丨丨丨必致星散公文往來士夫傳笑長編召為檢討黃庭堅字魯直李常見其詩文以為超逸絶塵獨立萬物之表者由是聲名始震監德安鎮丨丨校書郎為神宗實録丨丨官事略作院兵器為法胡安定公瑗字翼之授監某處作院既之官三日從容與老吏言製作利害吏以誠告曰器不精良由百工皆督其課程趣赴期會每茍簡於事備數而已今欲革此弊莫若使工各盡其能竭其力每事必求精緻仍不使之懈惰然後計其成而定以日力名數可也安定從其説工吏欣然赴功樂事丨丨堅利大非前日比矣至今丨作院丨也言行録交引偽造嚴治孫侍讀甫字之翰監益州交子務蜀用鐵錢民苦轉貿重故設法書紙代錢以便市易轉運行使偽造犯法者多欲廢不用公曰交子可以丨丨錢亦可以私鑄私鑄有犯錢可廢乎但丨丨之不當以小害廢大利卒不能廢言行録庫務籠置廳上滎陽公家孰記范侍郎育作庫務官隨行箱丨只丨丨事丨以防疑謗東萊集監門安上門圖鄭俠字介夫監丨丨丨安石將以為經義局檢討俠辭會時大旱不雨俠於是上疏併丨上之東都事略監茶逾年辭去章望之字表民好學有文監杭州茶庫丨丨丨疾丨東都事略管庫十年吕希哲字原明前後為丨丨者幾丨丨矣同上典臨茗局領算商車丨丨丨丨胡文恭行孫咨制監場好儒稱薦王旦監潭州銀埸何承矩丨丨士形於丨丨同上監稅詞折不動吕希哲字原明熙寧初監陳留稅章樞密楶方知縣事心甚重之一日與公同坐遽峻丨色丨公以事公丨為丨章嘆曰公誠有德者我聊試公爾張橫渠曰雖蠻貊之邦行矣於吕原明見之滎陽公家孰傳監司商算丨丨丨丨胡文恭行段政制詩集監倉分粟平丨太倉丨盡讀鄴侯書陳后山謝監詩發廪校緍閲帑藏丨丨罄斯箱髙適贈司倉詩不世名豈料多才者空垂丨丨丨間曹猶得醉薄俸亦勝耕方干寄普州司倉賈島詩真堪老一官倉庾丨丨丨坐看松根落斷崖東坡泗州南山監倉蕭淵詩公子是監倉但見東軒堪隱几不知丨丨丨丨丨同上庾氏莫言卑身到瀛州須命好官稱丨丨丨丨丨何斯舉寄錢伸監倉詩監酒盆盎裏丨丨三年丨詩篇四海傳簡齋詩糟麴間紛紛丨丨丨欲試佳公子東坡送歐陽辨監澶州酒詩燃薪炙硯我方凍坐酒官曹為公丨丨丨氷丨黃山谷詩晨對梅花落身麴糵盆盎裏丨丨丨丨無酒溫簡齋詩注朝無咎謫監信州酒日和東坡梅詩天橋造樓憶昔洛陽董糟丘為余丨丨橋南丨酒丨李白詩官壚呼酒丨丨丨丨趂春期正是糟漿破鼻時錦綺未聞吟玉按笙歌應且引鴟夷曽存中春日懷陳州監酒徐安中詩寧知是官身端平遊真如子由在酒局丨丨丨丨丨糟麴困薰煮東坡千里不難到丨丨丨丨丨莫遣歷塊蹶同上送歐陽推官赴華州監酒詩驥騄隨蹇步即官向是管庫人乃使丨丨丨丨丨同上庫務有真樂州獄即道場管庫丨丨丨故紙終日翻毛錐幾年閣唐子西作詩自寬古今合璧事類備要後集卷八十一
