body:
  text: 古今合璧事類備要續集卷十五宋謝維新撰類姓門俞河間角音古今姓纂前趙劉聦中常侍俞容天后時有俞文俊江陵人事類秀老俞紫芝揚州人少有髙行不娶得浮屠氏心法所至翛然而工於詩王荆公居鍾山丨丨數相徃來尤愛重之毎見於詩所謂公詩何以解人愁初日芙蕖映碧流未怕元劉争獨歩不妨陶謝與同遊是也又嘗有夜深童子喚不起猛虎一聲山月髙之句尤為荆公所賞和云新詩比舊仍増峭若詩追攀莫太髙丨丨卒於元祐初惜時無𤼵明者不得與林和靖一流㮣見於隐逸清老弟澹字丨丨亦不娶滑稽善諧謔洞曉音律能歌荆公亦喜之晩年作漁家傲等樂府數闋每山行即使澹歌之然澹使酒好罵不若秀老之恬静一日見公云吾欲為浮屠但貧無錢買祠部耳公欣然為置祠部澹約日祝髮既過期寂无耗公問其然澹徐曰吾思僧亦不易為公所贈祠部已送酒家償舊債矣公為之大笑黄魯直贈澹詩其一有云有客夢超俗去髮脫儒冠平明視清鏡正爾良獨難葢述荆公事也任樂安宫音古今姓纂黄帝二十五子十二人以徳為姓一為任氏六代至奚仲封薛魏有任座秦有任鄙事類君仁魏文侯問士大夫曰寡人何如君也羣臣皆曰丨丨翟璜曰君非仁君文侯怒而逐璜至任座曰丨丨君也曰子何以言之對曰臣聞其丨丨者其臣直翟璜之言直是以知丨丨君也文侯曰善復召璜入拜為上卿新序臣直其君仁者其丨丨見上司空後漢任隗字仲和光子所得俸秩常賑䘏宗族位至丨丨以況正見重於世聖童任延字長孫十二明詩易春秋太學號為任丨丨問任安儒林任安字定祖少游太學受孟氏易兼通數經又學圖䜟究極其術時人稱曰欲知仲桓丨丨丨又曰居今行古任定祖辟除皆不視子名任循吏任延字長孫為九真太守其俗不知牛耕乃令鑄作田器教之墾田百姓充給又教駱越之民嫁娶禮法産子者始使種姓曰使我有是子者任君也多名子為任號任君任昉字彦升拜太學博士王儉見其文必三復殷勤以為當時无軰好奬進士友得其延譽者多見升擢時人慕之丨曰丨丨及卒殷芸曰哲人云亡儀表長謝元龜何寄指南何託南史建御書閣本朝任中師字祖聖性樂易家素饒財雖處通顯自奉甚薄仁宗賜飛白書及歸休於里中丨丨丨丨郷人榮之作五知堂任布字應之河南人也後唐宰相圜四世孫慶歴元年召拜樞宻副使歸休洛中丨丨丨丨以知恩知道知命知足知幸也卒謚恭惠大任小任任孜字遵聖眉州人慶歴三年楊宣榜登第與弟師中名于蜀東坡謂之丨丨丨丨大任剛烈世无有惡疾如風朱伯厚小任温毅老更文寛柔慈愛小馮君兩任才行不須說疇昔並友吾先人作任公亭任伋字師中東坡謂之小任通判黄州郡人得之為丨師中菴丨丨丨蘇轍作師中菴記論章蔡詆誣任伯雨字伯翁建中靖國元年論章惇蔡卞等誣謗宣仁崇寧元年坐黨論除名貶通州二年再貶昌化軍紹興五年子申先為起居郎上伯雨手澤論章惇蔡卞誣謗宣仁后有廢立之意上曰朕嘗親承隆祐之訓乃下詔比覽元符諌臣任伯雨疏丨丨丨卞丨丨宣仁聖烈太后欲追廢為庶人誰无母慈何忍至此賴哲宗聖明不從使其言施用豈不蔑太母九年保祐之勲累泰陵終身仁孝之徳不主開邉議任伋知盧州丨丨丨丨之丨東坡詩云任公鎮西南嘗贈繞朝䇿當時若盡用善陣无赫赫袁汝南羽音爰轅同古今姓纂媯姓舜後陳胡公之𦙍胡公生申公申公生靖伯甫甫七代孫莊伯爰諸生濤塗以王父字為氏代為上卿字或作爰轅其實一也今但從袁事類郤坐袁盎漢書作爰盎楚人也字絲諌宦者趙同參乗丨慎夫人同丨亦以數直諌不得久居中丞相申屠嘉引為上客史記問筞前袁盎後為楚王相所言不用病免居家與閭里浮沉闘雞走狗盎雖家居景帝時時使人丨籌丨言詩漢轅固生者齊人也治詩孝景時為博士以固為亷直拜為清河王大傅武帝立復以賢良徵固諸諛儒多疾毁固曰生固老罷歸之時年已九十矣齊之丨丨皆本轅固嚴明後漢袁安字邵公汝南人舉孝亷除隂平長任城令所在吏人畏而愛之為河南尹政號丨丨倚賴袁安為三公漢室中㣲外戚彊盛朝廷之上皆丨丨安以為重漢三公魏袁紹字本初髙祖父安為丨司空自安以下四世居丨丨魏御史袁渙字曜卿丨初為郎中令行丨丨大夫事不為皦察之行時人服其清貌似和柔然其臨大節處危難責育不過也能劇縣晉袁甫字公胄嘗詣何朂自言丨為丨丨朂曰唯欲宰縣不為臺閣職何也曰人各有能有不能乃除松滋令作二賦袁宏丨東征北征丨丨詠史詩袁宏字彦伯有逸才文章絶美曽為丨丨丨是其風情所寄明禮樂晉袁瓌字山甫除國子祭酒上疏請丨丨丨以流後生國學之興自瓌始有才名袁瓌孫山松少丨丨丨著後漢書百篇為吳郡太守扇贈仁風袁山松為東陽郡謝安取一丨以丨行答曰輒當奉揚丨丨慰彼黎庶冠絶人倫齊袁昻字千里容質脩偉丨丨丨丨本名千里齊武帝謂曰昻昻千里之駒在卿有之今改卿名為昻即字千里門號登龍袁昻游處不雜入其丨者丨丨丨門白頭尚書袁昻仕梁為吏部尚書武帝曰齊明帝用卿為黒頭尚書我用卿為丨丨丨丨良以多愧在朝謇諤世號宗臣一代名公袁昻自初及末无虧風範從㣲至著皆為稱職葢丨丨之丨丨也直文學省袁峻字孝髙訥言語工文辭擬官箴獻之梁武帝賜束帛丨丨徳丨士丨陪宴承香袁憲字徳章累遷御史中丞嘗丨丨丨丨閣賔退後陳宣帝留憲與樊俊徙席山亭談宴終日帝謂俊曰袁家故為有人詔為僕射袁憲陳后主曰袁徳章實骨鯁臣即丨丨尚書丨丨詔為二頌袁朗長安人陳後主詔為月賦一篇洒然无留思後主曰謝莊不得獨美於前矣復丨丨芝草嘉蓮丨丨歎賞尤厚呼為清郎袁津修字叔徳為尚書郎十年未曽受升酒之遺邢邵常丨丨丨丨北史復作清卿袁聿修後爲太常少卿出使巡省邢邵送白紬爲信不受邵曰今日丨丨丨丨矣奕葉忠鯁唐袁利貞字敬孫髙宗時為太常博士周王侍讀及王立為太子帝欲大㑹群臣命婦合宴宣政殿利貞上䟽諌以為非命婦宴㑹之所帝納之詔曰卿丨丨丨丨能抗䟽規朕之失不厚賜无以勸能者賜物百叚風操清亮唐袁承序髙宗之為晉王也太宗崇選僚屬問梁陳名臣子弟誰可者岑文本曰昔陳亡百司奔散有袁憲者朝服立後主傍白刃不避也其子承序丨丨丨丨无愧先烈乃拜晉王友歴世名節唐袁誼為蘇州刺史司馬張沛嘗白誼曰州得一長史隴西李亶天下甲門也誼曰夫門户者丨丨丨丨為天下所髙老夫是也山東人尚婚媾求禄利耳至見危受命則无人焉何足尚邪沛大慙是一良臣袁髙徳宗將起盧杞高當草詔奏曰用為相失天下望遣使慰高曰朕惟卿言切至已如奏韋倫曰髙言勁挺自丨陛下丨丨丨宜加優禮不易前政唐袁滋蔡州人憲之後為華州刺史政清簡流民至者給地居之名其里曰義合以慈惠為本民愛向之滋行耆老遮道不得去代者楊於陵使諭曰一不敢易袁公政人皆羅拜乃得去通鑑紀事本朝袁樞字機仲少有聲嘗作竹杖詩有曰送汝為龍到葛陂後官至待制因平原用事十年不調嘗自編丨丨丨丨本末今書行于世號梅巖翁栁河東商音古今姓纂周公孫魯孝公子展展孫無駭以王父字為展氏至展禽食采於栁下遂姓栁氏魯滅仕楚秦并天下栁氏遂遷於河東河東解縣秦末有栁安下惠裔孫也事類社稷臣栁莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷衞獻公再拜稽首請尸曰有臣如栁莊也者非寡人之臣丨丨之丨也記檀弓聖之和孟子曰栁下惠丨丨丨者也故聞栁下恵之風者薄夫敦鄙夫寛襄陽水鏡栁莊字思敬少有噐量博覽墳籍蔡大寳見之歎曰丨丨丨丨復在於兹江漢英靈栁遐字子昇仕梁遷尚書功論郎謝舉與語嘉之曰丨丨丨丨見於此矣栁公雙𤨏栁世隆字彦緒少立功名晩專以談義自業善彈琴世稱丨丨丨丨為士品第一南史栁氏二龍栁惔字文通世隆次子少與兄悦齊名王儉曰丨丨丨丨可謂一日千里仕梁為太子詹事武帝貽惔詩曰爾實冠羣后惟余實念功尋遷左僕射宅南儀表栁惲字文暢惔之弟與謝卄瀹友愛卄瀹曰丨丨栁郎可為丨丨同上衣錦還郷栁慶逺字文和元景弟之子為雍州刺史梁武帝餞於新亭謂曰卿丨丨丨丨朕无西顧矣栁弱獨揺栁調厯侍御史楊素見調因曰丨條通體弱丨丨不須風北史清名第一栁儉字道約仕隋以清明著稱拜𢎞化太守清節愈勵後入朝郡國畢集帝謂吏部尚書牛𢎞曰其中丨丨天下丨丨者為誰乃以儉對賜帛二百匹國之龜寳栁彧字幼文仕隋遷中書侍御史當朝正色甚為百寮敬憚文帝嘉其婞直謂曰栁彧正直之士丨丨丨丨也主聖臣直唐栁範貞觀中為侍御史時吳王恪好田獵範彈治之太宗嘗曰何廷折我兒範謝曰丨丨則丨丨陛下仁明臣敢不盡愚帝乃解和戎難信栁渾字夷曠吐蕃㑹平凉帝語大臣以丨丨息師之便馬燧賀曰今日已往可百年无患渾曰夫夷狄人面獸心丨以丨結帝變色曰渾儒生未逹邉事夜半韓游瓌飛奏吐蕃刼盟帝大驚明日慰之曰卿儒士乃知軍戎萬里情乎益禮異之世為史官栁冕字敬叔芳之子博學富文辭且世史官父子並居集賢院綴輯國史栁芳字仲敷蒲州人肅宗詔芳與韋述丨丨吳兢所次丨丨興髙祖訖乾元凡百三十篇興吾門兒栁公綽字寛京兆人始生三日伯父子華曰丨丨丨者此丨也奏大醫箴栁公綽憲宗數游畋公綽丨丨丨丨以調天子髙其才置之座隅判誅舞文栁公綽拜山南東道節度使行部至鄧縣吏有納賄舞文二人縣令以公綽素持法謂必殺貪者公綽丨曰贓吏犯法法在姦吏壊法法亡丨丨丨者公權筆諫栁公權公綽弟穆宗曰朕嘗於佛廟見卿筆蹟思之久矣即拜侍書學士帝問公權用筆法對曰心正則筆正筆正乃可法時帝荒縱故及之帝改容悟其以丨丨也公權書法公權博經術通音律其丨丨結體勁媚自目一家詩應聲成公權從幸未央宫帝駐輦曰朕有一喜邉戍賜衣久不時今中春衣已給當賀我以丨丨丨丨文婉切而麗詔令再賦復无停思天子甚悦曰子建七步爾乃三焉聨句題壁栁公權文宗嘗召與丨丨帝曰人皆苦炎熱我愛夏日長公權祝曰薰風自南來殿閣生㣲凉帝以詞情俱足命丨於殿丨字率徑五寸歎曰鍾王无以尚也當時大臣家碑誌非其筆人以子孫為不孝外夷入貢者皆别署貨貝曰此購栁書銀盃羽化栁公權嘗貯盃㿻一笥滕識如故而器皆亡奴妄言叵測者公權笑曰丨丨丨丨矣不復詰唯筆研圖籍自鐍祕之彈壓惠養栁仲郢字諭蒙公綽之子拜京兆尹人无敢犯政號嚴明宣宗初復出河南尹以寛惠為政或言不類京兆時答曰輦轂之下先丨丨郡邑之治本丨丨烏可類乎烏集樹㦸栁仲郢咸通中為天平節度使仲郢初為諌議大夫後每遷必丨丨升平第庭丨丨架皆滿五日乃散及是不復集訓戒子孫栁玭仲郢子字直清有父風玭常述家丨以丨丨丨曰夫門地髙者一事墜先訓則異它人雖生可以茍爵位死不可見祖先地下雄深雅健栁宗元字子厚河東人韓愈評其文曰丨丨丨丨似司馬子長崔蔡不足多也既歿栁人懷之廟于羅池愈因碑以實之芒寒正色劉禹錫曰子厚之文丨丨丨丨東郊野夫皇朝栁開字仲塗大名人著書曰丨丨丨丨又號補亡先生作二𫝊以見意屯田郎中栁耆卿仁宗朝累舉不中攻長短句時有薦之於朝召入賦醉蓬萊詞語典麗中犯時諱以不稱㫖後卒官至丨丨丨丨故號曰栁屯田鄷京兆宫音古今姓纂周文王十七子鄷侯之後以國為姓事類文昭畢原邭