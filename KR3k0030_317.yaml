工得不死本紀定為刑統後周世宗以律令文古難知格勑煩雜不一命張湜等訓釋刪丨丨丨丨本紀重定刑統本朝乾德元年判大理寺事竇儀等上丨丨丨丨三十卷編勑四卷詔刋板摹印頒天下先是頗有上書言刑統條目之不便者儀等參酌輕重時稱詳允長編增民事律紹興六年行宫吏部請因民事犯徒已上罪人如今詔自祖宗以來以公私贓罪三等定天下之罪至是始丨丨丨丨繫年録學律張叔學文翁景帝末為蜀郡守選郡縣小吏開敏有材者丨丨等十餘人遣詣京師受業博士或丨律令數歲皆成就還歸以為右職黃霸學丨丨少丨律令喜為吏後為河南太守丞處議當於法合人心太守甚任之陳止齊除挾書律秦人重禁文學不得挾書無道極矣漢髙祖入關約法三章悉除苛法天下既定蕭何次律令韓信申軍法張蒼定章程叔孫通制禮儀日不暇給而挾書之律獨承秦故至惠帝四年始除之以為是髙祖惡聞詩書之習不减於秦也帝王之遺書厯世寶之大訓所以遺子孫開後世也髙祖以為馬上得天下是誠無事乎詩書獨不能寶之以為後世乎聖人以及史之闕文為幸則經術之行世當與日月俱垂不幸脫落而不全豈無可恨者儒林傳言孝文時求能治尚書者天下無有聞濟南伏生治之欲召之時伏生年九十餘老不能行所口授者才二十九篇嗟夫使髙帝入關之初或天下既平之日能弛此禁則諸儒口誦能如伏生必不寡生雖老而全書不亡孔安國言魯共王時壞孔子舊宅於壁中得先人所藏古文尚書以所聞伏生之書考論文義增多二十五篇其餘錯亂磨滅弗可復知嗟夫使髙帝入關之初或天下既平之後能弛此禁則遺書散漫往往復出孔子之壁雖壞而全書不亡然則後世不見百篇之全而至伏生老孔壁壞以其年考之不能不歎於斯焉蓋髙帝之不事詩書其害乃甚於秦之焚棄詩書也令行令令出惟丨弗惟反施令發號丨丨罔有弗欽並書禀令王言惟作命不言臣下罔攸丨丨所制時丨丨為令夫吏者治也當先自正然後正人風俗通所尊君子丨丨者令也令不行是無君也明君謹令議法當依輕申子制度令者尊卑貴賤之等級國家之制度唐刑法志棄灰商君下令步過六尺丨丨於道被刑新序徙木商鞅令既具未布乃立三尺木於市南門募人有丨置北門者與十金人怪莫敢徙復令曰能徙與五十金有一人徙之輒與五十金以明不欺其法史造憲令楚懷王使屈平丨丨丨藁草未定上官大夫欲見奪之不與乃讒曰平為令衆莫不知王怒踈平著甲令吳苪丨乎丨丨而稱忠注甲者令之篇次商鞅易丨丨變法丨令五年而秦人富强史朝錯變孝景即位丨丨為內史貴幸用事諸法令多所請丨前申屠嘉傳陳湯明丨丨丨法令善因事為勢納說多從本傳孔光練丨丨久與尚書丨法令號稱詳平本傳陳咸明東漢記見前律類詳劉邵作丨丨丨新令十八篇州郡令魏明帝制新律十八篇丨丨丨四十五篇尚書令丨丨丨軍中令合百八十篇軍中令見上注上新令梁天監二年蔡法度表丨丨丨三十卷制權令北齊武成河清三年尚書令趙郡王睿等奏上齊律十二篇其不可為定法者别丨丨丨二卷與之並行修律令隋煬帝敕丨丨丨其實不異開皇舊制並見隋志𤣥齡處房丨丨議法丨令務寬平𤣥齡定丨丨增損隋律丨令一千五百四十六條以為令蘇瓌曉丨丨入為尚書右丞明丨法令木傳檢驗格目丨丨丨丨者淳熙初鄭興裔所創也始時檢驗之法甚備其後郡縣玩弛或不即委官或所委官不即至至則不親視甚則以不堪檢覆告由是吏姦得肆寃枉不明獄訟滋熾興裔為浙西提㸃刑獄乃創為格目排立字號分畀屬縣遇有告殺人者即以格目三本付於委官凡告人及所委官屬行吏姓名受狀承牒到檢所時日廨舍去檢所近逺傷損痕數致命因依悉書填之一申所屬州縣一付被害之家一申本司又言於朝乞下刑部鏤板頒之諸路提刑司准此從之遂著為令元年五月十七日也李德裕奏管仲明於治國其語曰國之重器莫重於令令重君尊君尊國安治之本莫要於令故曰虧令者死不行令者死留令者死不從令者死五者無赦又曰令在上而論可否在下是主威不繫於人也韓退之原道是故君者出令者也臣者行君之令而致之民者也民者出粟米絲麻作器皿通貨財以事其上者君不出令則失其所以為君臣不能行君之令而致之民民不出粟米絲麻作器皿通貨財以事其上則誅格常行格者百官有司之所丨丨者也唐志刋定北齊文宣天保元年始命羣臣丨丨魏朝麟趾格别條武成平秦王髙歸彥反須有約罪律無正條於是遂有丨丨權格與律並行並隋志頒新唐髙祖武德三年丨丨格五十三條唯吏受賕犯盜詐冒府庫物赦不原增損髙宗詔長孫無忌丨丨格勑其曹司常務曰留司格頒之天下曰散頒格又房元齡丨丨隋律刪武德以來勑三千餘條為七百條以為格太極格睿宗時岑羲著丨丨丨開元格元宗時盧懷謹著丨丨丨留司格武后時裴居道又刪武德以後至于垂拱詔勑為新格藏于有司曰垂拱丨丨丨散頒格神龍元年韋安石又續其至于神龍為丨丨丨詳定格文宗時狄兼謨為開成丨丨丨開元格勑憲宗時許孟容等刪天寶以後勑為丨丨丨後丨太和格勑文宗命尚書省郎官各刪本司勑而丞與侍郎覆視中書門下參其可否而奏之為丨丨丨後丨開成格勑丨丨三年秋兼謨採開元二十六年以後至于開成制勑刪其繁者為開成詳定格大中格勑宣宗時張戣以刑律分類為門附以格勑為丨丨刑律統類詔頒行之重加刋定哲宗元祐元年三月詔劉摯王覿刑部郎中杜紡等可將元豐勑令格式丨丨丨正對行刪添孝宗淳熙四年臣寮上言乾道新書未底詳盡未免時有申明請重加參訂明年書成有㫖於乾道敕令格式丨丨丨丨冠以淳熙重修為名式正制凡斷獄之官皆舉律令格式丨丨條以結之若正條不見其可出者則舉重以明輕其可入者則舉輕以明重守法式者其所當丨之丨也唐志元豐式見前格詳乾道式見前格詳紹興重修國朝法令大抵法寬政和後始有御筆持斷刑名是蓋多出於三尺之外矣靖康元年九月議者請參用嘉祐斷刑依元豐明年四月復詔政和海行法非御筆修立者許引用建炎三年復辟赦舉行仁宗法度即嘉祐元豐法有不同者賞格聽從重條約聽從輕時吕元直張德逺始為政也明年六月范覺民相乃奏命有司以嘉祐政和勑對修成書紹興元年八月上之其後乾道淳熙慶元之際率十餘歲一修然大槩以丨丨丨丨勑令格式為準淳熙事類丨丨丨丨孝宗時所修也國初但有刑統謂之律後有勑令格式與律並行若不同則從勑令格式然士大夫罕通法律而數書散漫故吏得以舞文上患之淳熙中始命勑局官取勑令格式及申明五書分門來上七年四月乃成為總門三十三别門四百二十詔頒行之賜名丨丨丨丨趙冬曦上書古律目千條隋時姦臣侮法者著律曰律無正條者出罪舉重以明輕入罪舉輕以明重一辭而發條目數百夫法易知則不敢犯而逺機穽文義深則吏乘便而朋附盛律令格式謂宜刋定科條直書其事其以准加减比附量情及舉輕以明重不應為之類皆勿用使愚夫愚婦相率而逺犯罪者雖貴必坐律明則人信法一則主尊科魏武定丨丨帝丨甲子科釱左右趾者易以斗械是時乏鐵故易以木焉又嫌漢律太重故令依律論者聽科半使從半减劉邵定丨丨丨科律注見前伊籍定丨丨與諸前劉巴李嚴共丨蜀科比以例比况漢武帝時招進張湯趙禹之屬條定法令云云其後姦猾以法轉相比况禁罔寖密律令凡三百五十九章大辟四百九條千八百八十二事死罪决事比萬三千四百七十二事文書盈於几閣典者不能遍睹是以郡國承用者駁或罪同而論異姦吏因緣為市所欲活則傳生議所欲陷則豫死比議者咸寃傷之注師古曰比丨丨相丨丨也引類比附成帝河平中詔曰甫刑云五刑之屬三千大辟之罰其屬二百今大辟之刑千有餘條律令煩多百有餘萬言竒請他比日以益滋自明習者不知所由欲以曉喻衆庶不亦難乎於以羅元元之民夭絶亡辜豈不哀哉其與中二千石二千石博士及明習律令者議减死刑及可蠲除約省者令較然易知條奏注竒請謂常文之外主者别有所請以定罪也他比謂丨它丨以丨丨之稍增律條也竒居宜反並前刑法志傅所當比髙帝七年制詔御史獄之疑者吏或不敢决有罪者久而不論無罪者久繫不决自今以來縣道官獄疑者各讞所屬所屬二千石官二千石官以其罪名當報之所不能决者皆移廷尉廷尉亦當報之廷尉所不能决謹具為奏丨丨丨丨律令以聞上恩如此吏猶不能奉宣同上撰决事比獻帝朝應劭丨具律本章句尚書舊事廷尉板令丨丨丨例司徒都目五曹詔書及春秋折獄凡二百五十篇蠲去復重為之節文晉刑法志為决事比後漢陳忠為尚書略依寵意奏上三十三條丨丨丨丨以省請讞之弊事比衆多魏文帝受禪承用秦漢舊律其文起自魏文侯師李悝云丨商君受之以相秦漢承秦制蕭何定律除參夷連坐之罪增部主見知之條益事律興廄户三篇合為九篇云丨司徒鮑公撰嫁娶辭訟决為法比都目凡九百六卷世有增損率皆集類為篇結事為章一章之中或事過數十事類雖同輕重乖異而通條連句上下相蒙雖大體異篇實相探入盜律有賤傷之例賊律有盜章之文興律有上獄之法廄律有逮捕之事若此之比錯糅無常後人生意各為章句言數益繁覽者益難衛覬又奏請置律博士轉相教授事遂施行然而律文煩廣事比丨丨離本依末决獄之吏如廷尉獄吏范洪受囚絹二丈附輕法論之獄吏劉象受屬偏考囚張茂物故附重法論之洪象雖皆棄市而輕枉者相繼晉志古今合璧事類備要外集卷十七
