body:
  text: 古今合璧事類備要外集卷十七宋謝維新撰刑法門法律附律式令科格比刑法總論法者百王不易之令典也古今天下事事皆有法况刑辟獨無可法乎夫以前人創之後人守之可者因之否者革之無非求所以便天下後世者也然世變日下人情日薄而國家之法亦日以密爰自唐虞而降其始也作五刑其後也作九刑蓋至於周律屬三千無非由略而之詳其條目可謂至纎且悉矣秦漢後雖約為五百似已厭其煩矣漢初約為三章未幾而九章作焉延及蕭梁凡一千五百三十條至後周凡定法一千五百三十七條大略滋章條流苛密不勝其繁矣隋唐因之其間屢有沿革所謂律令格式者未易枚舉而縷數也五代時周世宗又集為刑統一書考其條目靡不畢備至我朝相襲增損有可覆者然而古者法踈而犯法者寡後世法密而犯法者衆此其故何哉蓋古者學校之設教化之行人知廉遜恥於為非井地之均衣食之足人知生之可樂死之可惡也後世則不然井地破而榖祿不平學校廢而習俗不美法立而奸生令下而詐起雖刑辟日報而不為沮止此其所以不古若也然則如之何則可井田吾不得而見之矣母亦教化其救世之大務歟謹母曰但求詳於法而已矣事類國章丨丨斯抵人命所懸國紀干丨之丨左國禁入丨問丨記勑法君子以明罰丨丨易作法丨丨於凉其弊猶貪丨丨於貪弊將若之何左倚法無丨丨以削書觸法丨丨抵禁白帖法行徒丨不能以自丨孟離婁法守下無丨丨也同上制用丨而丨之謂之法易通變丨丨天下無弊法文中子惟察丨丨帷法書乃垂正月之吉始和丨丨治教禮政刑象之法于象魏使萬民觀象挾日而斂之禮始成太上無法而治法非所以為治也曰洪荒之世聖人惡之是以法始乎伏羲而成乎堯楊子淫為苖民弗用靈惟作五虐之刑曰法殺戮無事爰始丨丨劓刵琢黥書法經魏文侯師李悝悝撰次諸國法著丨丨以為王者之政莫急於盜賊故其始於盜賊云云商君受之以相秦晉志連坐秦用相丨丨之法造參夷之誅相坐文帝寬惠柔克遭世康平惟省肉刑除丨丨之法後梁統傳約三漢髙帝入關丨法丨章殺人者死傷人及盜抵罪蠲削秦法畫一漢氏作丨丨之歌漢布而觀地官小宰正歲丨法官之屬丨丨治象之法徇以木鐸曰不用法者國有常刑禮屬而讀春官州長正月之吉各丨其州長丨丨法同上法如是文帝上行出中渭橋有一人從橋下走乘輿馬驚於是使騎捕之屬廷尉釋之治問奏當罰金上怒曰此人親驚吾馬馬賴和柔令他馬固不敢傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共今丨丨丨更重之是法不信於民也且方其時上誅之則已今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重上曰廷尉當是也法足矣其後有盜髙廟玉環得下廷尉奏當棄市上怒曰民盜先帝器吾欲致之族而君以法奏之非吾所以承宗廟意也釋之免冠頓首謝曰丨如是丨丨令盜廟器而族之假令愚民取長陵一壞土陛下何以加其法乎帝乃許並張釋之傳參夷連坐漢承秦制蕭何定律除丨丨丨丨之罪增部主見知之條見知故縱孝武徴發煩數人窮犯法遂令張湯趙禹條定法令作丨丨丨丨監臨部主之法緩深故之罪急縱出之誅前志作沈命法武帝丨丨丨丨羣盜起不發覺發覺而捕不滿品者二千石以下至小吏主者皆死本紀為三互法靈帝以州郡相黨丨丨丨丨本紀昭平殺人漢成帝甥丨丨君丨丨以公主子廷尉上請帝垂泣曰法令者先帝之所造也用親故誣先帝法吾何面目入髙廟乎卒下其奏法為隄防王志愔為大理正嘗奏言丨令者人之丨丨不立則無所制今大理多不奉法以縱罪為仁持文為苛臣執典恐且得謗遂上所著應正論以見志又言刑賞二柄惟人主操之故曰以力役法者百姓也以死守法者有司也以道變法者君上也法為權衡劉藏器髙宗時為御史衛尉卿尉遲寶琳脅人為妾藏器劾還之寶琳私請帝止其還凡再劾再止藏器曰丨丨天下丨丨萬民所共陛下用捨繇情法何所施今寶琳私請陛下從之臣公劾陛下亦從之今日從明日改下何所遵彼匹夫匹婦猶憚失信况天子乎帝詔可使天下信孫伏伽東都平欲責賊支黨悉流徙惡地伏伽諫曰今四方已定設法須與人共之法者陛下自作須自守之丨丨丨百姓丨而畏之自為無信欲人之信豈可得哉為天下公戴胄清直即命為大理少卿長孫無忌被召不解佩刀入東上閣封德彛論監門校尉不覺罪死當無忌贖胄曰校尉與無忌罪均若罰無忌殺校尉不可謂刑帝曰法丨丨丨丨朕安得阿親戚詔復議封德彛固執帝將可胄曰校尉緣無忌致罪法當輕若皆誤不得獨死由是與校尉皆免與天下共李乾祐貞觀中為殿中御史鄃今裴仁軌私役門卒太宗欲斬之乾祐曰法令丨丨丨丨之非陛下獨有之仁軌以輕罪致極刑非畫一之制刑罰不中則民無所措手足帝意解由是免死重貨輕法蕭鈞左武侯屬盧文操蹂蹀盜庫財髙宗以其職主幹當自盜罪死鈞曰囚罪誠死然恐天下間謂陛下丨丨丨丨任喜怒殺人帝曰真諫議也詔原死惜罪虧法狄仁傑遷大理丞左司郎中王本立怙寵自肆仁傑劾奏其惡有詔原之仁傑曰朝廷惜之賢如本立者不少陛下丨有丨丨成丨奈何臣願先斥為羣臣戒本立抵死朝廷肅然問法如何張嘉貞祕書監姜皎得罪嘉貞希權幸意請加詔杖已而皎死㑹廣州都督裴伸先抵罪帝丨丨丨丨嘉貞復援皎比張說曰不然刑不上大夫以近君乎士可殺不可辱向皎得罪官三品且有功若罪宜死即殺獨不宜廷辱以卒伍待也况勳貴在八議乎事往不可咎伸先豈容復濫哉帝然之又韓洪為人莊重寡言罪殺人丨丨丨丨不自為輕重據法爭論王彥威與平民上官興殺人亡命吏囚其父興聞自首請罪京兆尹杜悰御史中丞宇文鼎以自臨死免父之囚可勸風俗議减彥威上言殺人者死百王共守原而不殺是教殺人者有詔貸死彥威詣宰相丨丨丨丨下遷河南少尹唐本傳以法當流時有詭資䕃冒牒取調者詔許自首不首罪當死俄有詐得者獄具胄丨丨丨丨帝曰朕詔不首者死而今當流是示天下不以信况賣獄耶卿自守法而使我失信奈何胄曰法者布大信於人言乃一時喜怒所發陛下以一朝忿將殺之既知不可而置於法此忍小忿存大信也若阿忿違信臣為陛下惜之帝感悟於法當死牛僧孺為御史中丞宿州刺史李直臣坐贓當死直臣賂中貴人為之申理僧孺堅執不回穆宗面諭之曰直臣事雖愆失然此人有經度才可委之邊任朕欲貸其法僧孺曰凡人不才止持祿取容爾云云祿山朱泚以才過人濁亂天下况直臣小才又何屈法哉上嘉其守法必置以法韋澳字子斐改京兆尹帝舅鄭光主墅吏豪肆積年不輸官賦澳械繫之他日延英帝問其故澳具道姦狀且言丨丨丨丨帝曰可貸否答曰陛下自內署擢臣尹京兆安可使畫一法獨行於臣下乎帝入白太后曰是不可犯后為輸稅乃免所守者法徐有功與皇甫文備同按獄誣有功縱逆黨久之文備坐事下獄有功出之或曰彼嘗陷君於死今生之何也對曰爾所言者私忿我丨丨丨公丨不可以私害公以絹定罪乾道間刑部狀建康府狀據建康府司法參軍趙善寅申準三月二十三日敕節文今後權將敕律內應丨丨丨丨之法更遞增一貫通四貫足斷罪今來除已將律內丨丨丨丨之法遞增一貫作通四貫足斷罪外有勑內以錢數定罪擬欲一例遞增一貫竊慮奉行抵牾乞備申朝廷以錢定罪又刑部狀據太平州申亦為上件事並送部看詳本部乞將細絹定罪更增一貫通作四貫其丨丨丨丨者未曽申明亦合一體更為遞增一貫詔從之並聖政為政之道任中正代張公治蜀咨以丨丨丨丨公曰如己見解髙於法則捨法而用己如己見解不髙於法則當守法勿徇己見李清臣法原法者何也聖人所以齊天下之動至公大定之制也其原出於道德禮義而其用散於號令賞罰凡有天下之君未嘗有無法而久者也昏世嘗有無法之君矣奈何乎人之多欲而趨亂也如歸市人之多欲而無法以齊之故有臂者攘有足者馳勇者苦怯者而奪其資智者給愚者而兼其聲色耳目之奉紛紛籍籍其去禽獸者間不容一毫故聖人為之法使天下貴賤逺近莫敢不一於法焉由法者安不由法者危由法者得其所欲而生不由法者失其所欲而死如是故法立法立而天下之心定而治道畢矣法為貴君位次之法壞則民亡民亡則君如之何其尊且安也故人主尊法懼法之不立也故以身先之懼天下之慢法而法壞也故舉事而不敢忘法賞罰以法號令以法取豫以法廢置以法殺生以法動靜以法視法如神物而不敢侮如天墜地設不敢輒破壞改易也不以一事小害而損法不以一時茍利而增法使天下無有不由法而自為者故智者不得越法而謀辨者不得越法而議士不得背法而有名臣不得背法而有功我喜可抑我忿可窒而法不可離骨肉可刑親愛可滅而法不可屈也故雖成王之叔不得流言而亂政髙祖之父不得屈君臣之義文帝元帝之子不得越王門絶馳道光武之姊不得保臧獲姦使吏民愛若孝王嬖若韓鄧功若陳湯馮奉世義若郭解不免於有司之議而天下不敢私恐其開亂法之原而後爭以為比也故明王之法左者不為右右者不為左上不奪下職下不侵上事為廷尉者不以才有餘而道禮樂為太常者不以官優寡事而言刑法士者不為工商賈人不為士也今夫大匠之起巨室彈畫一定木之曲直大小長短必皆就吾繩墨規矩焉其參差不齊齟齬不合則斤削燎栝而已矣若毁吾彈畫而從木之情則功勞而事拙紛擾而不可理矣故聖人主立法賢王守法立法者使法必出於道德禮義而後布之天下以為法守法者使賞罰號令必出於法而後以為賞罰號令法不出於道德禮義者弊法也弊法者非法非法者未久而壞賞罰號令不出於法者弊政也弊政者非政非政者法壞而天下不從故法一則威法二則疑法固則君尊法搖則君削法行則要而治多法不行則煩漫而無功今夫一人之寡居深户之中傳盈尺之紙而風驅霆行殺生廢置人於千里之外提癯夫羸老僅勝衣冠之人付之寸印而坐諸帷幄進退萬夫若羊彘然童子據奧室羣湖海之珍怪處女嬰珠玉而立乎衢塗烏獲戾目而不敢動以法在也故天下視法如藩籬守法如疆界强者以攣縮弱者以安全至哉法乎人君之衛天下所恃而生也暗王則不然不能以法制勝私欲不知己亦恃法而後安故從欲而慢法其意若曰法者我之可自出也何有於法哉昵乎所愛而無勞而封爵有罪而不誅或利害僅如毛芥而輒變大法名分不立百職相侵日革月易不知所循下皆知法之易撓而可踰也則險庸詭譎者舞其私意以動法幸諛便僻者倚上之恩以貨法悍暴傑健者奮其亂力以干法如是故法亡法亡而民亡民亡而國亡矣如藩籬然藏獲超履穿穴而主人弗禁安能使盜之不窺而保其室中之所有也如封界障隧然其羊童牛牧已嘗有蹊之徑之之跡矣安能制衆人之不來而全其果蔬稼穡也或曰法之說無乃膠固事而失於圓通徇物之道歟曰不然法者天下之公也千世之守也大道也通者人臣之私也一時之偷便也短術也法同而治異者吏不能舉法也吏之罪也法不可輕立亦不可屢變也立法之主必若禹湯文武漢祖唐宗者也議法之臣必若臯陶伊尹周召蕭張房杜者也朝厝且尚弗克况庸人乎切觀今之世朝廷或弛祖宗之法羣下或慢朝廷之法大臣或率胸臆而輕法庸士或作衆辨而侮法為牧伯者或擊斷於法外以為能臣恐紀綱制度緣是亂法緣是而亡故作法原律造