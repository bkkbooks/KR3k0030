body:
  text: 古今合璧亊類備要續集卷九宋謝維新撰類姓門馮古今姓纂周文王第十五子畢公髙之後畢萬封魏支孫食采於馮城因氏焉代本又云歸姓鄭大夫馮簡子之後漢書云秦末馮亭為上黨太守入趙其宗族或留潞或在趙秦丞相去疾御史大夫劫漢博成侯母擇並亭之後也亊類彈鋏馮驩躡屩而見孟嘗君丨劒丨而歌史論將前漢馮唐以孝著為中郎署長對文帝丨丨帝恱拜為車騎都尉景帝以唐為楚相免竒士武帝求賢良舉唐唐年九十餘不能復為官乃以唐子馮遂為郎孫亦丨丨太史公曰馮公之論將率有味哉語曰不知其人視其友馮之所稱誦可著廊廟馮君馮立字聖卿通春秋徙西河上郡與野王相代為太守民歌之曰大丨丨小馮君詳見太守門出使馮奉世字子明上黨潞人以良家子選為郎學春秋讀兵法丨丨諸國斬莎車王威振西域破賊後馮異字公孫頴川人通左氏春秋孫子兵法號大樹將軍拜征西大將軍丨赤眉丨璽書勞異曰始雖垂翅囘谿終能奮翼黽池可謂失之東隅收之桑榆教麗山馮衍子豹字仲文以詩春秋丨丨丨下鄉里語曰道徳彬彬馮仲文此徤令馮魴拜郟令郟賊圍縣舎魴力戰光武嘉之曰丨丨丨也有大志晉馮素弗跋之長弟慷慨丨丨丨雄傑不羣任俠放蕩不脩小節盛藻竒之曰吾逺求騏驥不知近在東鄰何識子之晚也不受幣唐馮伉魏州人第五經宏辭醴泉令缺宰相髙選徳宗曰前使澤潞丨丨丨者其人清可用也遂以授伉方漢二馮馮定字介夫與宿齊名人丨丨丨丨第進士異等遷太常少卿文宗嘗詔開元霓裳羽衣舞參以雲韶肄于廷定部諸工立縣間端凝若植帝異之召升殿賜禁中瑞錦號孝馮家馮肅字拱之婺州人父子華廬親墓有靈芝白兔丨丨丨丨名播戎夷馮定初源寂使新羅其國人𫝊定墨水碑畫鶴記韋休符使西蕃新館寫定二山記於屏丨丨丨丨如此旌表忠臣馮元常相州人舉明經及第閨門雍睦有禮法神龍中旌其家曰忠臣之門天下髙其節遣内人撫問本朝馮拯字道濟河陽人少時以文謁趙普普見而竒之謂曰子位與壽他日若我也及仁宗即位遷司空兼侍中判河南日我仁宗丨丨丨丨丨還奏其寢處皆儉素無他飾我仁宗因賜以衾稠及錦綺屏然拯平居自奉未極侈靡也卒謚文懿召講易泰卦馮元字道宗舉進士為江隂尉㑹詔擇明經舉學官為國子監直講時真宗丨元丨丨丨丨因推君道至尊臣道至卑而能上下交感所以輔相天地裁成萬物也我真宗恱除直龍圖閣鄉廷俱第一馮京字當世鄂州江夏人人式之子也幼雋邁不羣式常取其所誦書題其後云將作監丞通判荆南軍府亊馮京式既退十一年京舉進士自丨選至丨對丨䇿名丨丨為將作監丞通判荆南如式之言時人謂式為知子宰相富弼京之婦翁也京拜翰林學士知開封府韓琦為相京數月不一見琦謂其傲以語冨弼弼使往見之京謂琦曰公為宰相而京不妄詣公者乃所以重公也豈曰傲哉陳古今姓纂媯姓亦州名本太昊之墟畫八卦之所周武王封舜後胡公蒲於陳後子孫以國為氏出頴川汝南下邳廣陵東海河南六望河南官氏志侯莫陳氏改陳氏事類卜妻陳完字敬仲初懿氏丨丨於敬仲占之曰是謂鳳凰于飛和鳴鏘鏘五世其昌並于正卿恱道陳良楚産也丨周公仲尼之丨北學於中國北方之學者未能或之先也孟子庸耕陳勝字涉陽城人與人丨丨輟耕之壟上悵恨久之曰苟富貴無相忘庸者笑而應之曰若為庸耕何富貴也涉太息曰嗟乎燕雀安知鴻鵠之志哉史記好美前陳平陽武户牗鄉人為人長美色張負以女孫予之曰固有丨丨如陳平而長貧賤者乎震動陳遵字孟公杜陵人為京兆史列侯有與同姓字者毎至人門坐中莫不丨丨既至而非因號其人曰陳驚坐教讇陳萬年字幼公子咸字子康以父任為郎萬年病召咸教戒牀下語至夜半咸捶頭觸屏風萬年欲杖之謝曰具曉所言大要丨咸丨也太丘長陳寔字仲弓頴川人遷丨丨丨行部吏慮有訟者白欲禁之寔曰訟以求直禁之何申其勿有所拘在鄉閭平心率物其有争訟輙求判正至乃歎曰寧為刑罰所加不為陳君所短方外將陳湯字子公山陽瑕丘人以薦為郎數求使外國遷西域副校尉搴歙侯之旗斬郅支之首縣旌萬里之外揚威昆山之西拜為射聲校尉威震百蠻武暢四海漢元以來征伐丨丨之丨未嘗有也當掃除後陳蕃字仲舉汝南人曰大丈夫丨丨丨天下有清世之志從寛恕陳寵字昭公為廣漢太守吏多姦貪訴訟日百数寵顯用良吏以為腹心訟者日减為廷尉議疑獄每附經典務丨丨丨濟活甚衆江表虎臣呉陳武字子烈廬江人累有功勞進偏將軍丨丨之丨丨也三國良史晉陳夀字承祚舉孝亷除著作郎撰丨丨志時人稱其善叙亊有良史之才椒花獻頌劉臻妻陳氏聰辯能属文嘗正旦獻椒花頌蒲萄奉母唐陳叔達字子聰陳宣帝子也武徳初判納言嘗賜丨丨不舉帝問之對曰臣母病渴求不能致願丨之海内文宗陳子昻字伯玉梓州人唐興文章承徐庾餘風天下祖尚陳子昻始變邪正初為感遇詩三十八章王適曰是必為丨丨丨丨乃請交西山吟詠五代陳陶劒浦人幼業儒長結廬於南昌之丨丨以丨丨自適蔡寛夫詩話云陶詩數百篇間有佳語如中原不是無麟鳯自是皇家結網疎可怜無定河邊骨猶是春閨夢裏人之類人多𫝊誦之隠居詩話云李華弔古戰塲文其存其没家莫聞知人或有言將信將疑娟娟心目夢寐見之陳陶襲其意而益工希夷先生本朝陳摶字圖南亳州真源人嘗乗白驢欲入汴中塗聞羽太祖登極大笑墜驢曰天下於是定矣太宗召以服見於延英殿又好讀書自號扶搖子真鹽鐵使陳恕字仲言洪州南昌人少折節讀書王明知洪州見而嘆曰竒士也知代州入為鹽鐵使恕有心計釐去宿弊太祖深器之曰丨丨丨丨也璽書褒美陳從易移廣州三年遠俗嘉靖丨丨丨丨加三品服比還不市南物輦俸金過嶺上聞擢知制誥御飛白書清字以賜之進士第一陳堯叟字唐夫閬州人也父省華終左諫議大夫堯叟舉丨丨丨丨弟堯咨字嘉謨舉進士亦第一賜袍黄衫陳軒字元輿建之建陽人嘉祐中廷試名冠多士有司以賦用韻失次有㫖降第二先是進士賜袍笏例於廷下脫白服緑軒衣如懸鶉上惻然解黄衣賜之至今丨丨笏有淡丨丨自軒始薦授州教陳烈字季慈福州侯官人嘗與鄉薦黜于禮部不復踐埸屋仁宗屢詔不起嘉祐中以近臣丨丨丨學丨授明年歐陽修復薦其行除國子監直講久之致仕復起為郡教授薦為教授陳師道字無逸徐州彭城人少刻苦問學以文謁曽鞏鞏竒之元祐中蘇軾傅堯俞孫覺丨于朝丨徐州丨丨諸生受業陳知柔字體仁温陵人自號休齋居士在天台奉安輿徧游名山歸至㑹稽愛岩􅊤之秀留止二年罷賀州歸留惠陽三年暇日泛豐湖登白鶴峯追和東坡詩陶寫羅浮風物殆盡凡四奉祠丨丨丨丨户屨常滿姪樸模皆登第謂四先生陳襄字述古福州人有學行與陳烈鄭穆周希孟友善閩人丨之丨丨丨賜仙花帶陳睦賢良絳之孫王俊民榜第二人及第元豐間髙麗航海脩貢上以其恭順欲遣使往諭睦即受命自春涉冬而還先是㘅命出疆上遣中使丨以丨丨丨既畢使事即奏言本朝故事惟寳文閣直學士以上職乃服金帶前以使事不敢辭今還朝願上所賜上特㫖令服之尋以直龍圖閣知潭州東坡以詩送之曰華清縹緲浮髙棟上有纈林藏石甕後以寳文閣待制知廣州賦墨梅詩陳與義字去非西洛人命徽宗見所丨丨丨丨善之亟召對有見晚之歎召賦瑞雪陳從易字簡夫温陵人丨對便殿丨丨丨真宗嘉歎面賜緋魚俸餘置義莊陳居仁字安行其先莆田令邁唐武徳中秩滿居莆司直嶠其裔也丨入之丨丨丨丨以給族黨之貧者推其官及孤甥從子人以為難能少傅周益公銘其墓曰士大夫行誼著于家文章顯于朝豈弟布于郡國有一焉足為名臣况兼是三者乎歲儉訪疾苦陳士楚字英仲莆田人江南東路常平茶鹽公事時丨丨民艱食公不憚巡行丨丨丨全活者衆有舊為中執法及治藩聲减公首按懲之一道肅然可謂仁者之勇請改脩日厯陳瓘字瑩中南劒州人章惇蔡卞主紹述上謗宣仁后人不敢輙議瓘因對以謂今日以前既往之迹便為古事道常然而不渝事有弊而必變故堯告舜舜告禹皆曰若稽古若者順而行之稽則考其當否或若或稽必使合於民情所以為帝王之治且論天子之孝與士大夫之孝不同而哲宗感悟焉徽宗即位除右正言論卞脩實録增加王安石實録紊神宗大典請改修以書論日録陳瓘丨丨抵曾布丨丨丨以為尊私史而壓宗廟縁邊費而壞先政題武夷昇真洞陳覺民字達野仙遊柘山人嘗過武夷題詩云昇真洞口接天門靈草丹桃日日春聽説列仙來瑞世三朝徳業在新民章聖出自武夷事見楊大年家集神考哲廟亦皆武夷真君應世故有三朝徳業之句武夷真君應世之異士大夫鮮有知之者奉親作慶老堂陳繹未見傳葛常之韻語陽秋云繹丨丨至孝嘗作丨丨丨以娯其母王介甫贈之詩云種竹嘗疑出冬笋開池故合涌寒泉李伯紀陳襄文序陳襄李綱伯紀序襄之文曰所著文章殆所謂有徳之言而君子之文歟上為人主之所欽嚮下為士大夫之所宗師誦其詩讀其書可以想見其人劉執中為祠堂記亦曰其政先於變俗其仁勤於濟衆故其出入中外裕裕然弗以進退榮辱動其心焉褚古今姓纂子姓殷後宋共公子右為禇師因氏焉漢梁相禇大元成間有禇先生少孫並以儒學稱焉事類二賦晉禇陶字季雅錢塘人以墳典自娯嘗曰聖賢備在黄卷中捨此何求年十三作鷗鳥水磑丨丨見者竒之三禮禇暉字髙明以丨丨學稱於江南北史美儀貌宋禇彦囘幼有清􅀢丨丨丨善容止俯仰進退咸有風則毎朝㑹百寮遠國吏莫不延首目送之明帝嘗歎曰禇彦回能遲行緩步便得宰相矣有器量禇向字景政淹雅丨丨丨位侍中風儀端麗眉目如畫每公庭聚列為衆所瞻望枯樹生枝禇向子翔字世舉為義興太守省繁苛去游費郡西亭有丨丨忽更丨丨葉以為善政所感雲棲木食禇伯玉字元璩錢塘人少有隠操往剡居瀑布山三十餘年隔絶人物滅景丨丨抗髙丨丨南史十八學士唐禇亮字希明杭州人秦王授王府文學士每征伐亮在軍中嘗預祕謀有禆補之益預丨丨丨丨之選帝使為之賛多識君子禇遂良字登善亮子正觀中起居郎博涉文史時雉數集宫中帝問何祥也遂良曰秦文公時有此陛下前本封秦故並見以告明徳帝恱曰人不可以無學遂良所謂丨丨丨丨哉撰翼善記禇無量字𢎞度杭州人刻意墳典𤣥宗為太子丨丨丨丨為造腰輿禇無量太子齒胄于學詔無量升座講勸後以年老丨丨丨丨使黄門舁之衛古今姓纂周文王第八子康叔受封於衞國四十餘代秦末國滅子孫以國為氏事類文昭冨辰曰周封建親戚魯衞毛原丨之丨也左長者衞綰代大陵人也以戯車為郎遷為中郎將醇謹無它文帝属孝景曰綰丨丨善遇之史收江南衞青字仲卿平陽人拜大將軍凡七出擊匈奴丨丨丨地置朔方郡作詩序後衞宏字敬仲受詩學因丨毛丨丨邦俗化衞䬃字子産遷桂陽太守下車修庠序之教設婚姻之禮朞年間丨丨從丨天下珍魏衞臻字公振文帝目曰丨丨之丨當與山陽共之遷吏部尚書一臺二妙晉衞瓘字伯王拜尚書令與尚書郎索靖俱善草書號丨丨丨丨珠玉在側衞玠字叔寳總角乘羊車入市見者皆以為玉人玠舅王濟見之輙歎曰丨丨丨丨覺我形穢又曰冏若明珠之在側朗然照人氷清玉潤衞玠妻父樂廣有重名議者以為婦翁丨丨女婿丨丨賜玉麟符衞𤣥字文昇領京兆尹鎮京師文帝曰關右之任一委於公丨丨丨丨以代銅獸史人謂易聖唐衞大經卓然髙行口無二言䆳于易丨丨之丨丨異曰國器衞次公字從周河中人舉進士潘炎異之曰丨丨也中興獻納臣皇朝衞膚敏字商彦華亭人宣和初以上舎生擢第汪彦章誌其墓曰建炎三年間上自維揚狩臨安慨然思丨丨丨丨之丨一日顧宰臣曰衞膚敏安在其趣以來繼公及上於平江禮上顧中丞張澂鄭㲄曰衛膚敏至矣扈蹕至臨安拜侍廷試魁天下衞瑶平江人丨孝宗淳熈中丨丨丨丨後至參政古今合璧事類備要續集卷九
