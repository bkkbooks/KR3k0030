body:
  text: 古今合璧事類備要别集卷三十八宋謝維新撰花卉門桂花格物叢話桂梫木也一名木犀叢生巖嶺間故因名巖桂花數品或白或黄或紅或紫黄者能着子然不如紅者紫者尤佳也此花四出或五出或重臺徑二三分圓瓣樹高者三二丈低者不下丈餘貫四時青青不改柯易葉花時蘂如金粟㸃綴枝頭比其開也芳塵襲人可愛也另有一種四季着花亦有每月一開者亦有春而着花者香皆不减於秋博物君子試一為之品題事類桂嶺盡香桂陽郡有丨丨放花徧白林嶺丨丨地理志桂木八樹臯塗山有丨丨丨丨在賁禺東八樹成柱言其大也賁禺即畨禺也山海經呉剛伐桂月桂高丈五下有人常斫之樹創隨合人姓丨名丨西河人學仙有過謫令丨樹酉陽雜爼左翁坐桂有丨丨者丨丨樹下以玉盃承其露與呉猛服之廬山記劉安攀桂淮南王丨丨好道感八公共登山丨丨而賦有大小桂山因以自號招隱士者淮南王劉安小山之所作也楚詞注郄桂一枝晉丨生對策第一武帝問之曰臣今為天下第一丨林丨丨晉史竇桂五枝燕山丨諫議五子馮道贈詩曰丹丨丨丨芳鷲山桂子落天竺山昔有梵僧從天竺丨丨飛來八月十五夜甞有丨丨丨故白樂天詩仙花桂子落紛紛東坡詩注小山招隱桂樹叢生兮山之幽偃蹇連蜷兮枝相繚山氣巃嵸兮石嵯峨谿谷嶄巖兮水曾波猿狖羣嘯兮虎豹嘷攀援桂枝兮聊淹留王孫遊兮不歸春草生兮萋萋嵗暮兮不自聊蟪蛄鳴兮啾啾坱兮軋山曲􅔍心淹留兮恫慌忽㒺兮沕憭兮慄虎豹宂叢薄深林兮人上慄嶺岑碕礒兮􅀈磳磈硊樹輪相紏兮林木茂骫青莎雜樹兮薠草靃靡白鹿麏䴥兮或騰或倚狀貎崟崟兮峨峨凄凄兮漇漇獼猴兮熊熊慕類兮以悲攀援桂枝兮聊淹留虎豹闘兮熊羆咆禽獸駭兮亡其曹王孫兮歸來山中兮不可以乆留王績問答問春桂桃李正芳華年光隨處滿何事獨無花春桂荅春華詎能乆風霜揺落時獨秀君知否詩集天香桂子月中落丨丨雲外飄宋之問風枝秋丨生桂丨百氏集異種蟾宫分丨丨人世散清香百氏集芳本謫官去南裔清湘繞靈嶽晨登黄葭岸霜景霽紛濁離披得幽桂丨丨欣盈握火耕因煙燼薪採久摧剝道旁且不顧岑嶺况悠邈傾筐壅故壌棲息期鸞鷟路逺清凉宫一雨悮無學南人始珍重㣲我誰先覺芳意不可傳丹心徒自渥柳子厚移桂珠英瓊葉潤不淍丨丨粲如織李徳裕瓊樹園草笑芳草池草艶春色猶不如槿花㛹娟玊堦側芳榮何太促零落在瞬息豈若丨丨枝終歳正翕赩李白一枝桂折丨丨先許我楊穿三葉盡驚人樂天八樹堂中有丨丨繁華無回時不識風霜苦安知零落期梁范雲吹木香山頭老桂丨丨丨李賀弄芳馥有客賞芳菲移根自空谷為懐山中趣愛此巖下綠曉露秋暉浮清隂藥欄曲更待繁花白邀君丨丨丨歐陽公垂芳根世人種桃李多在金張門攀折爭㨗徑及此春風暄一朝天霜下榮耀難久存安知南山桂綠葉丨丨丨青隂亦可託何惜植君園李白舊榦移新叢入望苑丨丨别層城倩視今丨處如何月裏生庾肩吾餘花落玉堦桂影秋婥約天空為捲浮雲幕嬋娟醉眼水晶殿老蟾不守丨丨丨蒼苔忽生霜月裔仙芬凄冷真珠蕚娟娟石畔為誰妍香霧着人清入膜夜深醉月寒相就荼䕷却作傷心瘦弄雲仙女淡竚衣烟裙不着鴛鴦綉眼中寒香誰同惜冷吟徑召梅花魄小蠻為洗玻璃盃晩來秋甕蒲桃碧毛澤民蒸寒馥天將秋氣丨丨丨月借金波滴小黄張芸叟吝幽香化工丨丨丨斑斑被花木氤氲寒巖桂髙韻盖羣馥無人盡日芳守志何幽獨士介耻求知女貞慙自鬻凄凉椘山秋樛枝吐金粟淺水映輕明㣲炎發含蓄樓端静忽聞馬上遥相逐蜘蹰為延竚但見林巒綠缾罌誰折贈清芬閟廬屋久處不自知乍至稱馥郁客悲芳歳暮夢繞寒溪曲長吟小山詞古意恐難復劉屏山貯萬斛愁天心不求金富媪不復藏居然上同價散作草木芳英英園中葵一心傾太陽采采離下菊令汝壽而康惟此木之犀更丨丨丨丨雄姿傲霜雪鱗甲森青蒼三賢鼎足立正色凛相望豈比桃李徒紅紫紛披昌聊息貪者心來上君子堂歲晚從我游寘汝兄弟行張于湖開萬㸃黄亭亭岩下桂歲晚獨芬芳葉宻千層緑花丨丨丨丨天香生浄想雲影䕶仙粧誰識王孫意空吟招隱章朱文公廣寒宫裏種學仙深媿似吳郎賴有吾廬兩子蒼疑是丨丨丨丨丨一秋三度送天香王梅溪漏泄月中香西風夜入小池塘木犀丨丨丨丨丨一粒粟中香万斛君看一梢幾金粟誠齋樂府直恁芬芬少年痛飲憶向吳江醒明月團圎高樹影十里薔薇水冷染大都一㸃宫黄人間丨丨丨丨怕是秋天風露教世界都香清平樂稼軒剪教恁小月明秋曉翠盖團團好碎丨黄金丨丨丨都着葉兒遮了折來休似年時小䆫能有髙低無頓許香處只消三兩枝兒清平樂前人微裂芳緘秋入微陰涼生平逺小山愁絶天南似聞還斷飛䇿遍千巖葉底輕黄纂纂惱人是丨丨丨丨翛然勝清真冷淡無艶寄塵凡澄潭欹兩岸波光搖動碧影相參任西風十里吹度松杉我自寒灰槁木凝神處不覺醺酣歸來晚飛花無跡明月滿空㴠滿庭芳劉彦冲狀元紅是花則一名種分三色嫩紅妖白姚黄映清秋佳景雨霽風涼郊墟十里飄蘭麝消洒處旖旎非常自然風韻開時不惹蝶亂蜂忙廣携酒獨揖蟾光開花神何屬離兊中央引騷人乘興賦詩章幾多才子爭攀折嫦娥道三種清香丨丨丨丨黄為榜眼白探花郎金菊對芙蓉纎手折來昨夜金風黄葉亂飄堦下聽窻前芭蕉雨打觸處池塘覩風荷凋謝景色凄凉揔閑却舞臺歌榭獨倚闌干惟有木犀幽雅吐清香勝如蘭麝似金壘粧成想丹青難畫丨丨丨丨膽瓶中一枝消洒金錢子佳人笑道沁園秋早到亭臺冷落荒涼池沼西帝晨遊無異勝都把仙花開了金粟玲瓏鵝黄嬌嫩不管霜風悄清香入夢夢魂唯怕天曉丨乘興折取一枝滿身蘭麝不減蟾宫好贈與丨丨因丨休學姮娥空等待約明朝金英滿地莫遣兒童掃相將花上醉眠尤勝芳草念奴嬌古今合璧事類備要别集卷三十八
