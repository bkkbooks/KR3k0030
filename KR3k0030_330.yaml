body:
  text: 古今合璧事類備要外集卷三十宋謝維新撰徭役門差役附雇募義役丁役徭役源流差役古也國初循舊制衙前以主官物里正戶長鄉手以課督租賦耆長弓手壯丁以逐捕盜賊承符人力手力散從官下至雜職院虞候等人各以鄉戶等第差熙寧四年始議使民出錢官為雇役謂之免役錢六年又行保甲法置保正副大小保長察盜七年輪保丁充甲頭催稅罷募戶長壯丁八年罷耆長令保正保長管幹别立庸直雇承帖人𨽻其下元豐八年有言耆壯之役則歸於保甲之正長戶長之役則歸於催稅甲頭是使民出錢免役而復使執役也紹聖元年復雇役法二年以大保長催稅罷差保頭以舊耆長錢支保正戶長錢支保長壯丁錢支承帖人靖國元年拘收大保長雇錢紹興二年拘收耆戶雇錢十二年拘收壯丁雇錢蓋自保正長承帖人雇錢並起發而充役如故民力於是困矣而其患皆起於以保甲代役戶寬狹不均重為民病夫古之征也三而力役與其一自唐楊炎以庸錢均入兩稅而後世差役復不免焉是力役之征既取其二也本朝王安石令民輸錢以免役而紹興以後所謂耆戶長保正雇錢復不給焉是取其三也合丁錢而論之是力役之征蓋取其四也而一有邊事則免夫之令又不得免焉是取其五也孟子曰君子用其一緩其二用其二而民有殍用其三而父子離今於力役一科已五倍而征之斯民不聊生矣譬如張弓誰能弛之通逹國體者豈不為之寒心哉事類輪差宣宗詔以州縣差役不均自今每縣據人貧富及役輕重作差科簿每有役事委令輪差本紀檢察本朝建隆二年五月詔令佐丨丨差役有不平者許民自相糾舉定九等戶太宗太平興國五年京西轉運使程能上言諸道州縣民事徭役者未嘗分等慮有不均欲望下諸路轉運司差官定為九等上四等戶令充役下五等戶並與免詔令轉運使躬親詳定勿復差官置五等簿仁宗至和三年四月罷諸路里正衙前先是知并州韓琦言州縣生民之苦無重於里正衙前自兵興以來殘剝尤甚至有孀母改嫁親族分居或棄田與人以免上等或非命求死以就單丁請自今罷差里正衙前只差鄉戶衙前令轉運司將逐州軍見勾到里正衙前人數立為定額令本縣令佐將五等簿於一縣諸鄉中第一等選一户物最髙者為之以三年一替於是下京畿河北河東陜西京西轉運司相度利害而皆謂琦所議便行五則法知制誥韓絳言請丨鄉戶丨丨之丨遣都官員外郎吳幾復往江東殿中丞蔡往江西與本路長吏轉運使相度因請丨丨丨丨凡差諸州軍鄉戶衙前以産錢與物力從多至少置簿排定戶數分為五則遂更著淮南兩浙荆湖福建之法下三司頒行之其法雖逐路小有不同然大率得免里正衙前之役民甚便之議差役法英宗治平四年丨丨丨丨司馬光言其自罷里正置鄉戶衙前而民愈困復差役法哲宗元祐元年丨丨丨丨惟衙前一役用坊場河渡錢依舊法募人不足計差蘇軾言免役差役各有利害免役先帝本意使民戶専力於農決不可變光不悅軾曰日者魏公刺陜西義勇公為諫官言之甚力豈今日作相不許軾盡言邪差役不便蘇軾范純仁馬默皆以復丨丨為丨丨又蔡京知開封府即用五日限光曰人人如待制何患法不行乎臺諫纍疏罷京又安石在金陵聞變其法夷然不以為意及聞罷役法愕然失聲曰亦罷至此乎此法終不可罷安石與先帝議之二年乃行無不曲盡後果如其言差役不公淳熙八年御筆朕惟丨丨之法為日蓋久近年以來又創限田之令可謂備矣然州縣奉行之丨丨豪貴兼并之大甚隱寄挾公弊端益滋一鄉之中上戶之著役者亡幾貧民下戶畏避棄鬻至不敢蓄頃畝之産甚亡謂也宵旰以思莫若不計官民一例只以等第輪差如此則不惟貧富均一且稅籍之弊不革而自去一舉兩得何待而不為乎可令戶部給舍臺諫等詳議以聞留正役議自井田之政廢而賦役之法弊至於役法之不均未有甚於此時豪右貴戚之家占田踰制雖有限田之法然其田百倍於編民縱能使之服役其何足以救細民之困哉蓋其力既有十家之田而特供一家之役則昔之為役之家九又將栘之於平民矣限田之役誠不足以均之則不役之而限田庶乎其可行聖朝將以寬民而在廷之議論未定豈非有待於今日而行之乎雇募謂之庸唐法用人之力嵗二十日閏加二日不役者日為絹三尺丨丨丨一其制唐楊炎曰河南山東荆襄劒南等處皆厚自奉養王賦所入無幾科斂凡數百名吏因其苛蠶食于人富人多丁者以宦學釋老得免貧人無所入則丁存故課免於上而賦增於下炎疾其敝乃請為兩稅法以丨丨丨凡百役之費一錢之斂先度其數而賦於人量出制入戶無主客以見居人為簿人無丁中以貧富為差不居處而行商者在所州縣稅三十之一免非命仁宗朝至和二年先是知并州韓琦言生民之苦無重於里正衙前至有棄田與人以丨丨丨求死以就單丁國朝置里正主催稅稅役滿更入重難衙前請罷之入重難蔡襄言所差里正衙前有三五年五七年一次者有一百貫十貫皆丨丨丨者請以錢産多少為五則法役法之議成都進士李戒投書余靖謂民苦重役不苦重稅請增天下田稅募人充役靖辭去職韓絳知成都戒以此獻之大以為然上即位絳言害民之弊無甚差役望詔中外具利害以聞詔曰州縣差役仍重勞役不均其令逐路條析以聞丨丨丨丨始乎此實本朝治平四年也雇法之決熙寧元年吳充言當今鄉役之中衙前為重民戶被差之日官吏籍記杯器匕筯皆計資産以應須求至有家資已竭而逋負未除民間規隱重役土地不敢多耕而避戶等骨肉不敢相聚而憚人丁望擇臣庶所言利害施行詔送中書及絳與安石言安石以為善丨丨遂決免役之法荆公言丨丨丨丨出於周官所謂府史胥徒王制所謂庶人在官者免役之弊少遊言丨丨丨法雖民輸僦直以免其身然平估至於室廬檢括及於車馬裒多以為寬剩厚積以為封樁其丨有甚於差役矣難行者五楊繪言一民難得錢二邊州姦細難防三田稅多少不同四耆長非人盜賊難止五専典雇人失陷官物為害有十劉摰言助役之法其丨丨丨落職監衡州鹽蒙不肯議劉丨知湖陽縣初行免役法使者召諸令會議蒙以為不便丨丨丨即投劾去藩不可用東明縣民以縣科助役錢不當相率遮宰相自言凡數百家安石白上曰知東明縣賈丨者范仲淹女壻好附流俗丨丨丨行募役法神宗熙寧四年十月行丨丨丨令人出免役錢官戶女戶單丁末成丁而免役者亦出助役錢皆惠卿所定也行手實法七年惠卿丨丨丨丨言免役出錢不均出於簿書之不善乎手實者令人具其丁口田實之實也隱落者許告和卿第等免役法行民以資産出錢時曲陽縣尉呂和卿較一縣戶之髙下役之輕重第為數等未及行和卿以憂去兄呂惠卿領司農寺取和卿議為手實法師中希有李丨丨知河南府時令民出錢免御師中率先諸州推行希司農旨意多取寬剩洛人怨之拆賣屋木熙寧七年詔定州民有丨丨丨丨納免役錢者令體量以聞貨賣耕牛司馬溫公論役法五害一上戶年年出錢無有休息二下戶不充差役令一例出錢三召募浮浪之人曲法受贓盜用官物四農民所有不過榖帛今欲輸錢不免買耕田牛具桑柘五提舉常平司廣積寬剩希求進用差免利害蘇軾謂司馬光曰丨役丨役各有丨丨免役之害掊斂民財十室九空錢聚於上下有錢荒之患差役之害民常在官不得専力於農而貪吏猾胥得緣為姦此害之輕重蓋略等矣光曰如何軾曰法相因則事易成事有漸則民不驚今欲驟罷免役而行差役正如罷長征而復民兵蓋未易也光不然之軾曰昔韓公刺陜西義勇公爭之甚力今日作相不許軾盡言邪光不悅差雇反覆吳蜀之民以雇役為便秦晉之民以差役為便荆公溫公不能周知四方風俗故荆公主雇役溫公主差役蘇內翰范忠宣溫公門下士復以差役為未便章子厚荆公門下士復以雇役為未盡內翰忠宣子厚雖賢否不同皆知南北風俗所論甚公各不私所主蔡京者知開封府用五日限改雇為丨至政事堂白溫公公喜曰使人人如待制何患法之不行紹聖初子厚入相復議雇役論久不決京白子厚曰取熙豐法行之耳尚何講為子厚信之丨役遂決蔡京前後觀望丨丨賢如子厚暴如子厚皆足以欺之真小人耳二法隨宜李常言上戶富安下戶虛乏富安則以差為病空匱則出力為宜誠不可一法治也輒求差助丨丨丨時所丨條敘梗概望付之有司二法可用秦少遊言士大夫進用嘉祐之前者則以差為是而免為非進用於熙寧之後者則以免為得而差為失私意搖於中公議移於外願詔有司無牽於故新之論毋必於差免之名取丨丨之丨丨於今者别為一書謂之元祐役法則嘉祐熙寧之臣默然而心服矣雇法未便蘇軾言熙寧雇役三等人戶並出役錢上戶以家業髙強出錢無藝下戶昔不充役亦遣出錢二等人戶不免咨嗟至中等昔已差役今又出錢不多最為甚便元祐罷丨丨上下二等欣躍可知惟是中等則反為害雇法未盡轍言嘉祐以前鄉差衙前民間常有破産之患熙寧以後出賣坊場以雇衙前民不復知有衙前之苦及元祐初復差官收坊場之錢民出衙前之費四方驚顧衆議沸騰尋知不可旋又復雇丨丨有所丨丨去年之秋復行差役義役買田助役乾道二年臣僚奏處州松陽縣憚征役之苦隨役戶多寡輸金丨丨遇當役者以田丨之名曰義丨給田充役淳熙七年王希呂等奏昔蘇軾有丨丨募役之請臣伏覩浙西一路有官田百萬餘畝乞均給諸郡以丨義丨官民從便乾道七年臣僚奏知處州松陽縣有一兩都憚充役破産之苦約各出田以助役戶數月之間一縣二十五都悉皆約成大概隨産之多寡量家力之厚薄輸金買田永為衆産遇當役者以田助之又自相評議推排役次以名聞官蓋有排定一二十年者臣又將松陽規約頒之其餘五縣施行近緣朝廷兼行丨戶差役處州之人以義役已成惜其遽壞伏望睿旨行下本州許從丨便依義役規約行使官戶願預者聽其添入七年正月十九日義差從便淳熙十一年臣僚奏伏見去年十月四日臣僚言處州及兩浙有見行助役去處聽從民便官司不得干預如民間自能久行自能息爭止訟仰州縣依見行條法照應物力資次依公差募言者欲差役義役二者並行元不曽盡罷義役欲望指揮諸路監司州縣應有義役與從民便外有不願義役或有爭訟乃行差役奉聖旨依臣僚申請義役劄子臣任處州日訪聞松陽縣有一兩都憚于充役欲各出田以助役風義可取臣因而勸勉數月之間一縣十五都悉皆約成大概隨役戶之多寡量産戶之厚薄輸金買田充為衆産遇當役者以田助之又自相推評排比役次以名聞官蓋排至一二十年者既絶爭論又無破家竭産之患田里雍和幾有古風民間名曰義役臣又將松陽規約頒其餘五縣方施行間臣蒙思召還即以囑交代樓璩節次得報諸縣已皆就緒方今天下苦於爭役而處州六縣之民獨能以義相率輯睦如此實是聖化所漸可以砥礪頽俗近緣朝廷兼行官戶差役處州之人以義役已成惜其遂壞屢有士夫逺來謁臣丏一言于朝廷行下所屬不妨官戶混差指揮存留已結義役并官戶亦自各願結入同饗其利即與新法别無相妨伏望聖慈矜憫此方獨能興於禮義特降睿旨行下本州許從民便依舊循義役規約行使官戶願入者聽其添入仍乞令見知處州胡沂日下將六縣已結義役規約詳細繕寫成册繳送以聞俟塵聖覽或可以風示四方助成美化取進止三省同奉聖旨依仍關牒諸路遵依施行福建提舉使帖當司受詞其間陳訴多有差役不當及義役推排不公推原其故若縣令於差役之際拖照官簿産錢髙下歇役久近參以陪法資次定差安有番訴一緣鄉司縣吏出入産錢走弄作弊遇差一役擾及數家取乞饜足方與改正使下戶困於臺府之陳論重以胥吏之取乞破蕩家産情委可念義役本從民便為役首者若將都內當充之人隨其物力及參陪法公心排定或獨充二年或一年或半年或兩戶共充一年或三戶共充一年其不可充者則出榖助役各隨鄉例立定義約經官印押周而復始亦復何辭只緣役首用心不公與上戶相為表裏或隱寄勢家或分出小戶却將尋常不係差役之人附入數內強之承認弊幸多端詞訴不已委為未便合行下諸縣自後差役必須預期監役案鄉司拖照官簿從實供刷鼠尾單帳參以産錢髙下歇役久近批朱腳次典押結罪保明聚廳點差母墮吏姦仍繳鼠尾單赴司照應其係義役去處亦仰役首盡推排合充役人姓名置規約簿三扇一留本縣一付役首一申發本司照應或有差役不當仰先經縣陳理如已允當本縣即給付鼠尾單許經次第官司陳詞本司將來點檢得定差不公推排不當定追役案人吏鄉司及役首重行責罰如被差人妄訴亦必斷遣押下著役其見役人役次未滿合先期差替及役次已滿或因本郡爭論選差未定難以令其久待即合一面毁劈朱記往役仍先勒役案代充奉提舉臺判知縣之職撫字催科不容偏廢蓋縣事追會必須保正縣道財賦必須耆長一都缺保正則一都之事廢一鄉闕耆長則一鄉之財賦虧理勢必然差役不當催科不行上下煎焦日不暇給撫字之意泯矣大凡作縣差役為急務知縣茍於此究心馬則撫宇催科之政舉矣照行仍備榜義役序天下之事至於義而止義也者公於人而宜於事之謂也捨義而行則人各求其便事各放其利矣且三代之時井地畫而賦役輕而里正之設自友助扶持之外它無所責人亦安焉而為之故義兩立於君民之間其後此意不存役法寖重凡盜賊之警捕文書之奉行向之事屬於官者今皆督之矣至於服勤之方暇不幾數年又復驅役富家巨室猶可焉中産之家百金之室自供輸用度之外蓋無幾矣此誠利害之所關又安能絶其無規避爭競之端耶今之設為丨丨誠可為便利之舉絶楚越肝膽之殊闢爾汝藩籬之隔而有古人相友相助之意是舉也肇於松陽倣於諸縣向者臣僚以此而申請上亦嘉之吾之一都較其産戶不為少要之充役實為難然亦誰可得而茍免者今欲遠則放於松陽近則纘於崇邑上則遵聖旨之所俞下則合人心之所欲非便利歟殆見風義藹然於閭里之間向矣之未入吾義役者亦樂然從之而爭競之風寖古今合璧事類備要外集卷三十
