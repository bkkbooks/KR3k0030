body:
  text: 古今合璧事類備要後集卷三十一宋謝維新撰六部門刑部尚書都官侍郎比部郎中附貟外郎歴代㳂革漢成帝時尚書初置二千石曹主郡國二千石又置三公曹主斷獄光武改三公曹主考課二千石曹掌水火盗賊詞訟亦謂之賊曹魏置尚書都官郎佐督軍事晉以三公尚書掌刑獄宋三公比部主刑法又置都官尚書主軍事刑獄齊梁陳並有都官尚書隋開皇改都官為刑部尚書統都官刑部比部司門四曹唐因之龍朔改司刑太常伯咸亨復故武后改為秋官神龍復故天寳改為憲部至德復故唐職林本朝刑部尚書侍郎郎中止為官階官而刑部判官事二人以御史知雜以上或朝充淳化二年以刑部復大辟案増置審刑院凡四方以具獄來上則讞於審刑院大中祥符二年置紏察在京刑獄司元豐三年並倂歸刑部五年官制行六部各正其職而刑部始得專其官續㑹要國朝尚書刑部掌律法獄訟奏讞叙復之事凡㫁獄本於律而隨時損益以勑令格式若情可矜憫或法不中情者皆其讞閲其按狀傳例擬進應詔獄及按劾命官以程督之審覆京都辟囚其在外已論决則摘按檢察大理開封殿前馬歩司獄則紏正其當否即有所辨訴以法理與奪如朞赦應格則聽其叙復其屬有三曰都官軍大將及徒𨽻名籍之事𨽻焉曰比部鉤攷帳籍及贓罰負欠之事𨽻焉曰司門津梁道路及國門稽察之事𨽻焉神宗正史職官志是時尚書猶未除人職畧事類士師唐虞之時丨丨以正五刑周秋官大司冦掌邦之三典以佐王刑邦國盖其任也通典秋官五曰秋官其屬六十掌邦刑周禮春官又乃立丨丨司㓂使帥其屬而掌邦禁以佐王刑邦國同上秋官司冦丨丨蘇公式敬爾由獄以長我王國書左政詰姦慝司㓂掌邦政丨丨丨刑暴亂書周官聽獄訟司㓂正刑明辟以丨丨丨聽之扵棘木之下以獄之成告于王記王制大司㓂丨丨丨之職掌建邦之三典以佐王刑邦國詰四方周禮秋官卿刑部尚書周禮之丨丨丨也六典不前僧𦙍羊侃為都官尚書宦者張僧𦙍候侃侃曰我牀非閹人所坐竟丨丨之時論美其貞正梁書不屈仙客崔隠甫為刑書帝欲相之也曰牛仙客可與語卿常見否曰未也帝曰可見之隠甫終不詣他日又問對如初帝乃不用賛曰嚴挺之拒宰相不肯見李林甫崔隠甫違詔丨丨牛丨丨信剛者乎二人坐是皆不得相彼亦各申其志也崔隠甫傳覆獄歔欷劉祥道遷司刑太常伯每丨大丨必丨丨累嘆奏決之日為之不食上䟽激切顔真卿為檢校刑書永㤗中元載引用私黨請百官凡欲論事必先白長官長官白宰相然後聞奏真卿丨丨曰天寳後李林甫威權日盛羣臣不先咨宰相輙奏事不過託以他故中傷獨不敢明約百司令先白宰相如今日之事曠古未有陛下不早覺悟漸成孤立矣其丨丨如此扵是中人爭寫内本布扵外屈突固辭丨丨通為刑書自以不習文丨丨改工部並唐書隠甫自守崔丨丨不屈牛仙客潔介丨丨以强正稱分紀晝決公務李適之拜刑部尚書夜則宴賞丨丨丨丨留無庭事李𫝊日為不食見前覆獄歔欷注弼我五教丨丨丨丨掌兹三典常衮制詰彼四方掌其三典丨丨丨丨記室新書秋卿恤刑丨丨丨丨事無枉橈又云紹蔽芾扵謳謡盡侀成扵法里唐大詔令杜審權制士師致理國之二柄在德與刑邦之三典惟清與慎大舜有欽恤之言穆王有哀矜之教爽鳩之為司冦務在澤人臯陶之作丨丨期扵丨丨超司秋典丨丨丨丨盖嘗為憲部尚書顔魯公集馮翊太守謝上表分司臬事設官丨職以丨丨丨中興題名建請讞疑燕肅字穆之知審刑院先是天下疑獄雖聽奏而州郡懼得罪不敢讞故寃獄常多肅丨丨丨路疑獄皆聽有不當者釋其罪自是全活者衆東都事畧建議違制王文正公曽在審刑日丨丨丨丨親被乃坐罪未㡬外郡有以具獄讞聞章聖俾以違制坐之公以制非親被請從違失上可其奏言行録奏命官刑蘇頌字子容神宗朝知審刑院知金州張仲宣受財枉法抵死法官援前比貸死杖脊黥配海島公丨古者刑不上大夫今刑為徒𨽻恐汙辱衣冠耳仲宣由是得免杖黥止流海外自是丨丨丨無杖黥者更盜黨法韓忠獻琦知審刑院先是盗殺同黨既自己就捕例不抵死公曰此但并有其貲或就滅其口非有自新改過之心無足矜者請丨議其法乃詔盗殺其徒而不首者毌得原部以上四事本通用並同上天臺刑官望峻丨丨仍忝丨丨之重歐陽公謝表秋官古卿丨丨丨丨云云中臺八座典司邦禁南豐擬制一人欽恤丹筆平刑爰副丨丨之丨丨牋表類八座典司見上秋官古卿注韓愈與鳳翔刑尚書書今閣下為王爪牙為國藩垣威行如秋仁行如春戎狄棄甲而逺遁朝廷髙枕而不虞是豈負大丈夫平生之志願哉豈負明天子非常之顧遇哉赫赫乎洸洸乎功業逐日以新名聲隨風而流宜乎讙呼海隅髙談之士奔走天下慕義之人使或願馳一𫝊或願操一戈納君扵唐虞收地扵河湟然而未至乎是者盖亦有説云豈非待士之道甚厚遇士之禮未甚優請麄言其事閣下試詳而聴之夫士之來也必有求扵閣下夫以貧賤而求扵富貴正其宜也閣下之財不可以徧施扵天下在擇其人之賢愚而厚薄等級之可也假如賢者至閣下乃一見之愚者至不得見焉則賢者莫不至而愚者日逺矣假如愚者至閣下以千金與之賢者至亦以千金與之則愚者莫不至而賢者日逺矣欲求得士之道盡扵此而已欲求士之賢愚在扵精鍳博采之而已精鍳扵己固已得其十七八矣又博采扵人百無一二遺者也若果能是道愈見天下之竹帛不足書閣下之功德天下之金石不可知閣下之形容矣歐陽脩謝刑部尚書表職清書殿寔為儒者之榮望峻天臺仍忝刑官之重内循謭薄仰玷光華臣某中詌伏念臣禀質迂愚麄知業履因時幸會遂竊寵靈無拾遺補闕之勤常陪法從非大册髙文之手久厠翰林晚綴宰寮俾聞國論荷三朝之眷遇毎察愚忠幸四海之清平得容尸禄居滿盈而不戒積災釁以自貽屬聖統之嗣興赫皇明而繼照誣言詰服已大釋於羣疑危跡保全俾不虧於素守犬馬合思於報效桑榆奈廹於衰遲屢貢懇私上干聦眷遂蒙開允俾觧繁機然而晚節餘生本期避寵清資顯秩益更貪榮被優渥之非常但凌兢而失措此盖伏遇皇帝陛下聖神御極亭育推仁閔孤拙之勢危無容自立謂疲駑之力竭難責逺啚曲軫至慈俯從誠請仍憐舊物特示殊恩顧非木石之頑宜識乾坤之造颯然素領雖難强於筋骸皎若丹心猶自期於塵露刑部侍郎歴代㳂革隋煬帝置刑部侍郎唐因之龍朔改為司刑少常伯光宅中為秋官侍郎天寳中為憲部侍郎掌律令刑名覆按大理及諸司應奏之事通典六典本朝官制㳂革見前刑部尚書門元豐正名除大理卿崔台符為之續㑹要事類五聽小司冦之職以丨丨聽獄訟求民情一曰辭聽二曰色聽三曰氣聽四曰耳聼五曰目聽周禮八辟以丨丨麗邦法附刑罰一曰議政之辟二曰議故之辟三曰議賢之辟四曰議能之辟五曰議功之辟六曰議勤之辟七曰議貴之辟八曰議賔之辟同上小司冦丨丨丨之職掌外朝之政以致萬民而詢焉周禮中大夫周之秋官小司冦丨丨丨也六典掌律令侍郎二人丨丨丨刑法之政徒𨽻校覆讞禁之事其屬有四一曰刑部二曰都官三曰北部四曰司部唐志行制命刑部侍郎一貟掌天下刑法及徒𨽻勾覆關禁之政令其屬有四總其職務丨其丨丨凡中外咸質正焉唐職官志精法律劉瑑轉刑侍丨於丨丨選制勑可用者議其輕重成一家書號大中統類奏行之三司使唐有大獄即命御史中丞刑部侍郎大理卿充謂之大丨丨丨唐職林宰相材狄仁傑薦張柬之丨丨丨召為洛州司馬仁傑曰臣薦宰相而為司馬非用也乃授司刑少卿遷秋官侍郎張柬之𫝊詳決如神王播元和中轉刑侍備舉格條置之座右凡有丨丨疾速丨丨僚屬嘆服唐書剖決如流王播轉刑侍精於法律商處輕重丨丨丨丨妙擇道裕唐太宗時刑部侍郎有闕令執政丨丨其人奏皆不可太宗曰朕得其人矣徃昔李丨丨議張亮云反刑未具此言當矣雖不即從至今追悔遂授道裕唐書宣授栖楚寳歴初宣中書以諫議大夫劉栖楚為刑侍丞郎宣授自此始並同上諫迎佛骨韓愈為刑侍憲宗遣使迎佛骨入禁中愈上表諫擢亞秋官韓愈祭馬總文佐平邦憲秋卿之貳丨丨丨丨類要貳于刑讞唐大詔令劉瑑制予罪勿罪丨曰丨爾丨丨予曰寛爾勿寛杜牧行李從誨制薄亡珠罪吕公孺元祐初為刑侍原廟亡珠繫治甚乆公孺言殿中主者不一前後代者未嘗以服御相授且諱日宫嬪徃還不一有所亡豈可指意吏卒獄雖具顧非聖裁不可上深以為然國史本𫝊原殺人情范百禄字功父除刑部侍郎有以强盗及故殺闘殺情可矜者讞于朝法官援例貸免司馬光曰殺人不死則法廢矣百禄曰謂之殺人則可制刑而以為不疑原情而以為無可憫則不可百禄在刑部用法多所平反遷吏部侍郎東都事畧奏伶人戯元祐中駕幸凝祥池宴從臣丨丨丨以先聖為丨刑部侍郎孔宗翰奏唐文宗時嘗有為此戲者詔斥去之今豈宜有此詔付伶官于理澠水燕談定給使制程大昌權刑部侍郎舊法宰執初除轉㕔皆有給使減年具後用例浸尖法意公請自侍從而執政執政而相則為初除法當與全餘為轉㕔皆減半遂為定制上知公特立不避怨滋欲用之周益公集平反被賜陳魯公康伯諡文正兼刑部侍郎前此有司專用權臣風㫖為獄重輕公丨丨之故家多丨其丨言行録平反辭賞張文忠公九成兼刑侍一日法寺以成案上大辟公閲首末得其情因請覆實囚果誣服者也奏黜之時法官抵罰而朝論欲以丨丨為賞公丨曰職在詳刑而賣衆以邀丨可乎同上上䟽請例范百禄遷刑部侍郎奏獄門下省多駁正當貸者百禄屢以告執政言上有詔例在有司者悉取還中書百禄丨丨論之悉如所丨自是丨復歸刑部矣丁未録執獄引例初刑部有刼殺人獄侍郎彭汝礪引例乞加貸配執政不以為是降特㫖皆殺之汝礪執不可長編不徇執政彭汝礪字器資元祐中遷刑部郎中㑹有巨獄執政以為可殺汝礪以為不可殺與執政異徙禮部東都事畧刑部郎中附貟外郎歴代㳂革漢尚書有三公曹後漢有二千石曹魏有都官曹皆掌刑法獄訟之事晉宋齊並以三公郎曹掌刑獄置郎中一人隋初省三公曹置刑部曹掌刑法置侍郎一人煬帝除侍字又改憲部郎唐因之武德改刑部郎中龍朔改司刑大夫咸亨光宅神龍並隨曹復改六典通典本朝官制見刑部尚書元豐正名初除胡瑗杜絃職畧建炎詔刑郎以二貟為額紹興詔見任郎官依元豐舊法分左右㕔治事從右司汪應辰之請也中興㑹要事類大司冦周禮丨丨丨屬官有士師下大夫盖郎官之任也六典定科郎魏有丨丨丨晉賈充定律令以裴楷為之職類掌刑獄晉宋齊並以三公郎曹丨丨丨置郎中一人通典掌律法郎中貟外郎丨丨丨按覆大理及天下奏讞為尚書侍郎之貳唐書不博前行省中語中行刑户丨丨丨丨駕部國史補又請小秋杜牧頃於宰執求小儀不遂請丨丨又不遂尚書故實分治獄事刑部掌天下刑獄之政令而郎中貟外郎丨丨其事中興題名奏決省事韓晉卿擢刑部郎中天下大辟請讞執政以為煩將劾治不應讞者晉卿適白事省中因曰讞不至矣議者欲天下獄悉從奏決晉卿曰恐罪人之死於獄多于伏辜者皆從之長編進丞郎省宜正秋臺之聫丨丨丨丨之務胡文恭廖詢制參綜制刑刑者所以助治聖人尤謹中臺丨丨丨丨郎選甚髙南豊除韓晉卿制丹筆議刑丨丨丨丨國綱作重白雲司職人命是懸牋表類貟外郎守法不撓唐杜景佺為刑部貟外郎丨丨丨丨本𫝊遺直何加令狐峘大歴中為刑部貟外郎上䟽諫山陵事詔荅曰古之丨丨丨以丨焉小三司使唐有大獄以刑部貟外郎御史大夫理寺官為之以決疑謂之丨丨丨丨通典第一課最韋夏卿以課最第一轉長安令改刑部貟外郎職官分紀温敏静専侍御史王鎰自居殿中能察非法連鞫庶獄多恊平允加以丨丨丨丨可當是選一嵗之獄決在秋冬今方其時宜敬乃職白居易王鎰刑部貟外郎制亟緩深縱丨則失情丨則留獄丨則礙恕丨則生姦惟是四者持刑之權元稹馮宿刑部貟外郎制秩進知州至道初張昱為刑部貟外郎西川安撫奏望授昱諸司使知雅州上以省郎之重不欲換它職故進秩加賜令服而遣通鑑長編例藏刑部元祐元年三省言中書置刑房檢例官從之獨刑部貟外郎劉𢋫上疏言元豐官制以丨丨丨丨可比則取鈔不可則取㫖今非故事詔如所請而例復藏刑部自是中外奏讞無所避矣九朝通畧都官郎中附貟外郎歴代㳂革都官本因漢置司𨽻校尉其屬官有都官從事一人掌中郎官不法事因以名官歴晉宋齊都官郎中並掌京師非違得失事非今都官之任開皇改都官尚書曰刑部其都官郎曹遂改掌簿録配沒官私奴婢唐因之龍朔改曰司僕大夫咸亨復故六典本朝都官判司事一人以無職事朝官充凡俘𨽻簿籍分領於他司本司無所掌元豐改制郎中貟外郎始實行本司事參掌徙流配𨽻及吏籍之事續㑹要初除韓宗良職畧列案四軍大將案吏籍案配籍案知雜案職源建炎三年詔都官郎官以一貟為額供權司門比部中興㑹要事類司𨽻丨丨掌五𨽻之法周禮又司𨽻其奴男子入于罪𨽻女子入于舂槀注鄭司農云謂生為盗賊而為奴者輸於罪𨽻舂人槀人之官也同上司憲裴秀奏事曰都曹二千石曹司國憲内掌京畿詰姦聽訟外緫邉境類要督征戰嵇含牋曰今都官中兵三曹郎晝丨丨丨夜還治事同上掌罪𨽻後周置司𨽻丨諸奴男女男子入於丨丨女子入於舂饎之事此今都官之任六典掌俘𨽻都官郎中貟外郎丨丨丨簿録給衣糧醫藥而理其訴寃唐書入省不數省中司都官屯田虞部主客皆閑簡無事諺曰司門都官屯田水部丨丨丨丨南部新書後行不博丨丨祠屯丨丨中行都門國史補最為清選唐韋溫奏曰國朝以來都官丨丨丨丨不可以賞能吏唐書皆為清秩書曰庶獄庶事予罔敢知此乃周文王之所理天下也惟獄惟事㑹於南宮求郎之難豈敢輕易今者各有所授丨丨丨丨杜牧都官貟外郎制騷雅宗師薛尚書能李貟外頻嘗郎都官皆一時丨丨丨丨都官之曹振盛于此唐鄭谷為都官作詩自賀序余早年請益受知實深今忝此官復正是秩輕微貴胄十倫創制輿臺之號肇興百𨽻裁規僮僕之名斯著蒼頭卑賤匪子宻之封侯㸃面丨丨殊季珪之丨丨張鷟集賞功嚴籍滕庾建炎初擢都官員外郎時庶事草創賞功補副尉者不可計以致是非混淆公於是隨事爬梳聞諸朝丨其丨周益公集擢聯典𨽻丨之秋丨丨我丨士胡文恭行劉杞制進以都𨽻丨秋臺者丨丨丨為峻胡文恭行張士奕等制命爾司僕曲阜行制今有梅都官鄭谷詩名盛於唐末號靈臺編世但稱鄭都官詩梅聖俞官至都官劉原父戯之曰聖俞官至此昔有鄭都官丨丨丨丨丨詩話詩集踐歴曾聞薛許昌都官雖未是名郎丨丨丨丨丨丨丨能復有李公頻陪雅躅豈宜鄭子谷忝餘光榮為後進趍蘭署喜拂前題在粉墻他日節麾如可繼云云鄭谷比部郎中歴代㳂革魏尚書有比部曹晉因之宋比部主法制北齊掌詔書律令勾檢等事後周曰計部中大夫隋為比部侍郎焬帝除侍字唐加中字龍朔改司計大夫通典本朝比部判司事一人以無職事朝官充凡勾㑹内外賦歛經費出納逋欠之政皆歸三司勾院磨勘理欠司本司無所掌两朝國史志自治平至熙寧錢帛芻粟虧損不可勝數遂置提率帳司領之元豊官制行釐其事歸比部郎中貟外郎始實行本司事四朝志初除宇文昌齡職畧列五案勾覆案磨勘案理欠案慿由案知雜案出職源建炎三年詔都官郎官併權比部郎官中興㑹要事類奏賦何損丨許都之丨魏明帝竒之擢為比部郎魏志知名唐徳宗丨武元衡才丨召授比部貟外郎見本𫝊號比􅌉比部得廐下食以飲從者丨丨丨國史補夢昆脚杜牧頃於宰執求小儀小秋皆不遂嘗丨人謂曰辭春不及秋丨丨與皆頭後果得比部貟外尚書故實奏京兆用裴延齡丨丨丨府妄破用錢榖請令比部勾丨覆左藏財唐制天下財賦皆納左藏庫太府四時以數聞尚書比部覆其出入並唐書掌諸司廨丨内外丨丨公丨及公私債負徒役工程贓物帳及勾用度物通典職在勾司位膺列宿丨丨丨丨張鷟集郎于㑹府柳子厚裴令碑碣勾籍天下比部掌丨丨丨丨文帳周官宰夫所謂乗其財用之出入也續㑹要司計中臺進丨丨於丨丨胡文恭行竇平制比計之曹稍升丨丨丨丨胡文恭行吳伸制勾考之司内外經費之任緫于丨丨丨丨南豊擬制㑹計之事惟是丨丨勾考丨丨命汝聽之曲阜吳景淵制詩集藴藉丨丨為郎乆魁梧秉哲尊杜甫贈比部蕭郎中詞華丨丨傾後輩風雅藹孤騫同上古今合璧事類備要後集卷三十一
