body:
  text: 古今合璧事類備要前集卷十三宋謝維新撰時令門春尚書大傳云春出也言萬物之所出也事類陽中春為丨丨萬物以生前漢律厯志嵗始春者丨之丨也公羊傳又後漢明帝紀春者丨之丨也始得其正則三時有成有腳人謂宋璟為丨丨陽春言所至之處如陽春及物也開元遺事為規春蠢也物蠢生乃動運木曲直仁者生生者圜故丨丨也前律厯志四時之首春者丨丨丨丨孔子家語一年之計一日之計在于晨丨丨丨丨在于春纂要養生之首春者開闢之端丨丨丨丨公羊注布德之元方春東作丨丨丨丨陽氣開發養導萬物後郎顗傳青陽開動丨丨丨丨根荄以遂漢郊杞歌木德周行春方生風風生木其德敷和敷和之紀丨丨丨丨陽舒隂布五化宣平素問萬物莩甲方春生養丨丨丨丨丨宜助萌陽以肓時物後章帝紀百卉含英開嵗發春兮丨丨丨丨後日行東陸丨丨丨丨謂之春漢律歷志斗指東方斗柄東指而天下皆春鶡冠子元魏黎季明曰招搖東指天下識其春北史太昊執規東方之神丨丨乘震丨丨司春漢書女夷鼓歌丨丨丨丨以司天和以養百榖禽獸草木女夷主春夏長養之神淮南子龍精戒旦震宫初動木德惟仁丨丨丨丨鳥厯司春隋青帝歌勾芒御辰青陽司侯丨丨丨丨晉律厯志光風轉蕙𤣥鳥司春蒼龍登嵗節物變栁丨丨丨丨出文選遲日采蘩春日遲遲采蘩祁祁毛詩報春作聲顧渚山中有鳥如鴝鵒而小蒼黃色每至正月二月作聲云春起也至三月四月作聲云春去也採茶人呼為報春鳥顧渚山記倉庚有鳴春日載陽有鳴倉庚毛詩夏禹省耕春省耕而補不足夏諺曰吾王不遊吾何以休孟子漢文議貸詔曰方春和時草木羣生皆有以自樂而吾百姓莫之省憂其議所以賑貸之漢文紀武后詔花天授二年臘將遊上苑遣宣詔曰明朝遊上苑火急報春知花須連夜發莫待曉風吹凌晨名花瑞草布苑而開若有神助卓異記明皇判栁唐明王嘗遇二月旦小殿栁杏將吐嘆曰對此景物豈可不與判斷之呼髙力士取羯鼓縱擊一曲名春光好回顧栁杏皆發笑曰不喚我作天公可乎羯鼓録上苑擲錢內庭嬪妃每至春時于禁中結伴擲金錢為戲開元遺事曲江挑餤春逰之家以脂粉作紅餤竿上成雙挑挂夾雜畫帶前引車馬曲江春宴録燕谷吹律丨有寒丨不生黍稷鄒衍丨丨暖氣乃至草木乃生劉向别録隋園剪綵隋煬帝築西苑宫木秋冬凋落剪綵為花葉綴於條常如陽春隋書御史括香唐穆宗宫中花開以重頂帳蒙蔽置惜花丨丨掌之號曰丨丨玉麈集士女鬭花長安士女春時各頂戴插以竒花多者為勝用千金市名花植之中庭以備春時之鬭天寶遺事為探春宴都人士女正月半乘車跨馬郊野中丨丨丨之丨同上作移春檻楊國忠子弟春時移名花植木檻中下設輪腳挽以綵絙所至自號移春檻開元遺事剪花粧獅曲江貴家遊賞丨百丨丨成丨子互相送遺曲江録吞花卧酒虞松方春以謂握月擔風且留後日丨丨丨丨不可過時曲江宴録詩集春寒春雲漢漠雪欲落東風和冷驚羅幕漸看逺水緑生漪未放小桃紅入蕚東坡春暖東風吹暖氣消散入晴天漸變池塘色欲生楊栁煙陳羽春意新年變物華丨丨已堪嘉霽色初含栁餘寒尚勒花風絲飛蕩漾林鳥㺯交加獨有無悰者誰知老可嗟歐陽修春態盡道春多雨傷催花易空不知丨丨度尤在緑隂中饒德操春靜輕花細葉滿林端昨夜春風晚色寒黃鳥不堪愁裏聽緑楊宜向雨中看宋齊春霽一夕輕霄落萬絲霽光浮瓦碧參差有情芍藥含春淚無力薔薇卧曉枝秦觀春晴鳴鳩乳燕寂無聲日射西窗潑眼明午醉醒來無一事只將春睡賞丨丨東坡春曉內人曉起怯春寒輕揭珠簾看牡丹一把栁絲收不得和煙搭在玉闌干徐仲雅春晝東風吹緑原頭草草色雨餘晴更好堂前簾靜燕初忙江上麥齊蠶欲老腐儒飽食欣自傳日長但酣丨丨眠户屢無人足清絶覺來幽響落山泉韓子蒼春夜金爐香燼漏聲殘剪剪輕風陳陳寒春色惱入眠不得月移花影上闌干王介甫春事東風著物猶未驚忽聽林間鳴䲴鳴嫩水生波光泛泛燒㾗破暖漸青青農家且喜春耕足未曉呼兒飲黃犢誰家躍馬來探春却笑瀾翻啼布榖韓子蒼春興雪花初著鴛鴦瓦疊嶂疏竹入圖畫春工不作兩樣心盡遣根荄赴陶冶我昔年少曽買春著盡榆錢不多價春應索價來覔人客氣今猶不相下待領春風歸去家家山却冇療愁花鄰公大假作春計小囿裁花今數世但憎赤腳婢惱人要逐了鬟同拾翠盧驤春感春風小院却來時慿君說與春風知年年嵗嵗無窮已花似去年人老矣明年崔護若重來前度劉郎去千里東坡春閒冉冉春行暮菲菲物競華鶯猶求舊友燕不背貧家室有賢人酒門無長者車醉眠聊自適歸夢到天涯王安石春逰春山多勝事賞玩夜忘歸掬水月在手㺯花香滿衣興來無逺近欲去惜芳菲南望鳴鍾處樓臺深翠微于良史春宴春風東來忽相過金樽緑酒生微波落花紛紛稍覺多美人欲醉朱顔酡李太白春睡春力著人丨丨重葉底黃鸝鳴自送緑幕朱欄日觀眀回廊側户風簾動寇萊公尋春卧聞百舌呼春風起尋花栁村村同城南古寺修竹合小房曲檻欹深紅病眼不羞雲母亂鬢絲强理茶煙中東坡藏春年拋造化甄陶外春在先生杖屨中楊栁長齊低戶暗櫻桃爛熟滴階紅題藏春塢傷春粘天芳草緑䝉茸久客傷心望不窮山色自隨人逺近鶯聲只在水西東俞師郝花木百花開盡牡丹拆十雨初晴太液春梁周翰花栁野棠開未落山櫻發欲然韓持國花濃春寺靜竹細野池幽杜甫梨花院落溶溶月栁絮池塘淡淡風晏殊花明栁暗繞天愁上盡重城更上樓李義山一路翠煙垂栁葉滿川紅雨落花村王元之爐烟添栁重宫漏出花遲楊巨仲栁塘春水漫花塢夕陽遲王維水堤烟報栁山寺雪驚梅蕭遇