body:
  text: 古今合璧事類備要别集卷一宋謝維新撰都邑門帝都附建都遷都不茍遷古今遷建帝都天子之居天子以四海為家豈有常居處哉惟其所在即以為都也故考古以來伏羲都陳今陳州神農都曲阜今兖州黃帝都涿鹿今幽州或云都有熊今鄭少昊都窮桑在魯北顓帝都高陽在周為衛地今濮陽縣帝嚳都亳一曰都高辛今偃師堯都平陽今晉州舜都蒲阪今蒲州禹安邑在蒲州湯亳穀熟號南亳至仲丁遷囂或曰敖今河南敖倉河亶甲居相今相州祖乙居耿在河東即䝉號景亳及盤庚五遷復都亳之殷地即西亳也周文王都鄷武王都鎬今京兆界周公相成王以鄷鎬偏處西方土貢不均乃東營洛邑今東都建明堂朝諸侯復還鄷鎬至幽王為犬戎所殺平王始東遷而居洛邑是為東周矣及敬王又遷成周今洛陽故都城終赧王不遷秦都咸陽漢都長安逮光武中興都洛陽又於南陽置南都三國魏以長安譙許昌鄴洛陽為五都吳都鄂今武昌後遷建鄴今建康蜀都成都今府晉都洛陽至永嘉南都建康宋齊梁陳並居焉梁元帝及後梁蕭察又别居江陵今府晉亂十六國又各建都邑隋都長安煬帝都洛陽唐復都長安五代梁都汴唐晉都洛陽漢周洎乎我宋又皆於汴今東京建都焉大哉汴京其我宋萬世帝王之業也雖中興暫駐吳㑹天開景運行遂回鑾豫日望之矣然天子之居不徒曰居而謂之都都之一字豈無意哉蓋言人所都㑹云爾不寧惟是以衆大而言則謂之京師以所至為家而言則謂之行在所謳歌者歸焉朝覲者往焉獄訟者之焉天命獨不在是乎或者謂立國以險否則以兵愚以為不在險亦不在兵惟顧其君之德何如耳事類冀方惟彼陶唐有此丨丨注堯都冀州統天下四方書五子之歌中國堯崩三年之喪畢舜讓辟丹朱于南河之南諸侯朝覲者不之丹朱而之舜獄訟者不之丹朱而之舜謳歌者不謳歌丹朱而謳歌舜曰天也夫然後之丨丨踐天子位焉注劉熙曰天子之位不可曠年於是遂反格于文祖而當帝位帝王所都為中故曰丨丨史記舜紀甸服五百里丨丨注規方千里之內為丨丨為天子治田事去王城面五百里書禹貢又丨丨之內曰京師世紀邦畿丨丨千里維民所止肇域彼四海詩縣內天子之縣注丨丨夏時天子所居州界名地中商邑翼翼四方之極注商邑京師也禮俗可則效乃四方之中正詩殷武商曰邑夏丨丨丨周為京師白虎通周曰京念彼周京念彼京周詩下泉方千里邦畿丨丨丨禮盛行人乂天子畿丨丨丨曰甸服世紀積百同凡王畿內方千里丨丨丨九百萬夫之地禮載師注待諸侯天子之地方千里不千里不足以丨丨丨孟告子下制萬國王者受命創始建國立都必居中土所以總天地之形據隂陽均統四方旁丨丨丨五經要義有和羮鄉崑崙東南方五千里謂之神州中丨丨丨丨方三千里五嶽之城帝王之宅聖人所生也王嬰古今通論有赤縣州崑崙東南丨丨丨之丨風雨有時寒暑有節茍非此土南則多暑北則多寒束則多隂故聖人不處焉張衡靈志諸夏根本京師者丨丨丨民勞詩注千里邑號京師丨丨之丨丨白虎通居岐之陽庶其鮮原丨丨丨丨在渭之將萬邦之方下民之王詩皇矣篇在豐之東豐邑在豐水之西鎬京丨丨水丨丨文王有聲詩注澗東瀍西周成王將營洛邑云云乃卜丨水丨丨水西惟洛食書􅏖誥崤左隴右夫關中左崤函右隴蜀沃野千里云云此所謂金城千里天府之國漢劉敬傳天下之中唐人都河東商人都河內周人都河南三河在丨丨丨丨若鼎足王者所更居也建國各數百歲前食貨志關中之固始皇踐華為城因河為池據億丈之城臨不測之淵以為固天下已定自以為丨丨丨丨金城千里子孫帝王萬世之業也賈誼過秦論雍土之饒大漢藉丨丨丨丨得御外理內之術後杜篤論都賦關中天府見前崤左隴右注河南帝城丨丨丨丨多近臣後漢洛陽定都建武元年車駕入丨丨遂丨丨焉後光武紀南陽舊都丨丨者真所謂漢之丨丨也張平子南都賦龍盤虎踞孔明謂吳帝曰鍾山丨丨石城丨丨真帝王居也寰宇記蠶叢魚鳬丨丨及丨丨開國何茫然爾來四萬八千歲不與秦塞通人煙李白蜀道難注丨丨丨丨皆古蜀天子輦轂之下畿甸之間丨丨丨丨冇善必聞有惡必見韓潮州謝表衣冠所聚京師丨丨丨丨聲教所出唐張九齡傳命曰東都五代梁太祖以汴州為開封府丨丨丨丨以故東都為西都後梁紀乃建東京後晉高祖以大梁舟車所㑹便於漕運丨丨丨丨於汴州復以汴州為開封府以東都為西京以西都為晉昌軍節度本紀復為東京後漢高祖至大梁丨以汴州丨丨丨丨改國號曰漢本紀詔展外城後周世宗以大梁城中迫隘丨丨丨丨先立標幟令自今葬埋皆出所標之外其標內俟縣官分畫街衢倉場營廨之外聼民隨便築室本紀顯德三年詔復故河本朝汴都仰給漕運故河梁最為急先是嵗調丁夫開浚淤淺糗糧皆民自備詔悉從官給遂若為式時建隆元年也至二年又詔陳承昭于京城之西夾汴河造斗門自榮陽鑿渠百餘里引京索二水通城壕入斗門架流于汴東滙于五丈河以便東北漕運長編移蹕臨安南渡紹興元年詔以㑹稽漕運不繼丨丨丨丨先是吕頥浩言今國步多艱中原隔絶江淮之地尚有巨賊要當先定駐蹕之地使號令易通于川陜將兵順流而可下漕運不至于難阻至是遂定議中興繫年録建都建邦設都明王奉若天道丨丨丨丨書說命上建邦啓土先王丨丨丨丨書武城量地制域凡造都邑丨其丨丨其丨禮地官縣師辨方正位惟王建國丨丨丨丨體國經野設官分職以為民極禮天官置都立邑天下有丨丨丨丨記祭法建國立家師服曰吾聞國家之立也本大而末小是以能固故天子丨丨諸侯丨丨左成二年匠人營國丨丨丨丨方九里旁二門國中九經九緯經涂九軌左祖右社靣朝後市禮冬官量人造邑丨丨掌建國之法以分國為九州營國城郭營后宫量市朝道巷門渠丨都丨亦如之以測土深大司徒掌建邦之土地之圖丨土圭之法丨丨丨正日景以求地中乃建王國焉禮地官以致日景土方氏丨土圭丨丨丨以土地相宅而建邦國都鄙禮夏官乃陟南岡于胥斯原既庶既繁陟則在巘復降在原丨丨丨丨乃觀于京京師之野于時處處于時廬旅既漙既長既景乃岡相其隂陽觀其流泉詩公劉大相東土周公拜手稽首曰云云豫乃嗣保丨丨丨丨其基作民明辟書洛誥又成王使名公先相宅周公至洛興土營築謂之王城是為東都方千七百二十丈郛方十七里南繫于洛水北因于郟山以為天下之所湊制為郊甸方六百里因西土為千里分為百縣縣為四都都有鄙曰此天下之中四方入貢道里均也周公又營成周成王居洛邑遷殷頑民于成周復還歸西都通鑑周紀水象天漢秦皇兼天下都咸陽渭丨貫都以丨丨丨橫橋南渡以法牽牛三輔黃圖城為斗形髙祖七年修長安宫城惠帝元帝初城長安城三年春發長安六百里內男女十四萬六千人三十日罷城髙三丈五尺下闊一丈五六日發徒隸二萬人常役至五年復發十四萬五千人三十日乃罷九日城高三丈五尺下闊一丈五尺上闊九尺雉髙三板周回六十五里城南為南斗形北為北斗形至今人呼漢京城為斗城是也鑿龍首山漢舊儀曰長安城父老傳云盡丨丨丨丨土為之水泉深二十餘丈樹宜槐與榆松柏茂盛為城下有池周繞廣三丈深二丈石橋各六丈與街相宜三輔黃圖營龍首山隋主嫌長安制度狹小詔創造新都於龍首山以太子左庶子宇文愷有巧思領營新都副監通鑑陳宣帝紀乃建東京後晉髙祖以大梁舟車所㑹便於漕運丨丨丨丨於汴州遷都成湯八遷自契至于丨丨丨丨注自契父嚳都亳湯自商丘遷焉書𦙍征盤庚五遷湯始居亳至仲丁遷于嚻至河亶甲遷于相祖乙遷于耿至盤庚復遷于亳從湯所都通鑑外紀周凡五遷后稷始封于邰第三代公劉遷居于邠自此又九代古公亶父而遷于岐是為豐水之西自此又三代武王得天下遷都于鄗是為豐水之東自此第十一代幽王為犬戎所殺而子平王遂遷都于洛邑是為東周又自十二代至敬王因王猛之亂乃遷于成丨是洛陽故都城也邰邠岐豐鄗京洛邑成周前後丨丨丨漢凡一遷西漢髙帝得天下都長安至後丨光武中興遷都洛陽丨丨丨曹魏一遷魏本都鄴文帝即位徙都洛陽通鑑魏文帝紀孫吳再遷吳始自公安徙都鄂更名鄂曰武昌至魏太和三年遷都建鄴建業本楚邑曰金陵漢屬丹陽郡吳改今名後晉武帝泰始元年吳西陵督步闡表請吳王徙都武昌從之楊州之民泝流供給甚苦之然武昌土地危嶮塉確非王者之都且童謡云寧飲建業水不食武昌魚寧還建業死不止武昌居是年十二月還都建業通鑑魏紀并晉紀晉氏一遷晉始得天下都洛陽至永嘉南渡都建業先是元帝以宣帝曽孫琅琊王覲之子嗣封永嘉初以安東將軍都督揚州諸軍事鎮建業建興四年長安不守愍帝蒙塵王乃出師北征後愍帝遇害遂即位通鑑本紀隋氏一遷隋文帝始都長安至煬帝乃遷于洛陽先是隋主楊堅嫌長安城制度狹小又宫內多妖納言蘇威勸遷都帝以初受命難之夜與威及髙熲共建議乃詔熲等創造新都于龍首山至煬帝嗣位章仇大翼言于帝曰陛下木命雍州為破木之衝不可久居又䜟云修治洛陽還晉家帝深以為然十一月幸洛陽留晉王昭守長安通鑑陳宣帝紀隋文帝紀不茍遷一旦示弱晉溫嶠欲遷都豫章王導曰建康王者之宅且北冦伺我之隙丨丨丨丨非良計通鑑成帝紀百世為笑唐髙祖時或說上曰突厥屢冦關中者以子女玉帛在長安故也若焚長安而不都則胡冦自息上以為然遣中書侍郎宇文士及踰南山至樊郡行可居之地將徙都之太子建成齊王元吉裴寂皆贊成其䇿蕭瑀等雖知其不可而不敢諫秦王世民諌曰戎狄為患自古有之陛下以聖武龍興光宅中夏精兵百萬所征無敵奈何以胡冦擾邊遽遷以避之貽四海之羞為百世之笑乎臣忝備藩維願假數年之期請繫頡利之頸致之闕下若其不效遷都未晚上善其言通鑑唐祖紀賈誼過秦論秦孝公據殽函之固擁雍州之地君臣固守以窺周室有席卷天下包舉宇內囊括四海并包八荒之心當是時也商君佐之內立法度務耕織修守戰之具外連衡而鬬諸侯於是秦人拱手而取西河之外孝公既沒惠文武昭襄䝉故業因遺䇿南取漢中西舉巴蜀東割膏腴之地北收要害之郡諸侯恐懼㑹盟而謀弱秦不愛珍器重寶肥饒之地以致天下之士合從締交相與為一當此之時齊有孟嘗趙有平原楚有春申魏有信陵此四君者皆明智而忠信寬厚而愛人尊䝨而重士約從離橫兼韓魏燕趙宋衛中山之衆於是六國之士有寧越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫召滑樓緩翟景蘇厲樂毅之徒通其意吳起孫臏帶他兒良王廖田忌亷頗趙奢之明制其兵嘗以什倍之地百萬之衆仰關而攻秦秦人開關而延敵九國之師遁逃而不敢進秦無亡矢遺鏃之費而天下諸侯已困矣於是從散約解爭割地而賂秦秦有餘力而制其弊追亡逐北伏尸百萬流血漂櫓因利乘便宰制天下分裂山河强國請伏弱國入朝施及孝文王莊襄王享國之日淺國家無事及至始皇奮六世之餘烈振長䇿而御宇內吞二周而亡諸侯履至尊而制六合執敲朴以鞭笞天下威振四海南取百越之地以為桂林象郡百越之君俯首係頸委命下吏乃使蒙銛北築長城而守藩籬却胸奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒匙鑄以為金人十二以弱天下之民然後踐華為城因河為池據億丈之城臨不測之溪以為固良將徑弩守要害之處信臣精卒陳利兵而誰何天下已定始皇自以為關中之固金城千里子孫帝王萬世之業也始皇既沒餘威震于殊俗然而陳陟甕牖繩樞之子氓隸之人而遷徙之徒也材能不及中庸非冇仲尼墨翟之賢陶朱猗頓之冨躡足行伍之間俯起阡陌之中率疲散之卒將數百之衆轉而攻秦斬木為兵揭竿為旗天下雲集而響應贏糧而景從山東豪俊遂並起而亡秦族矣且夫天下非小弱也雍州之地崤函之固自若也陳涉之位不尊於齊楚燕趙韓魏宋衛中山之君也鋤耰棘矜不銛于鉤㦸長鏃也謪戌之衆非抗九國之師也深謀逺慮行軍用兵之道非及曩時之士也然而成敗異變功業相反試使山東之國與陳陟度長潔大比權量力則不可同年而語矣然秦以區區之地致萬乘之權招八州而朝同列百有餘年矣然後以六合為家崤函為宫一夫作難而七廟墮身死人手為天下笑者何也仁義不施而攻守之勢異也婁敬入關議婁敬齊人也漢五年戌隴西過雒陽髙帝在焉敬脫挽輅見齊人虞將軍曰臣願見上言便宜虞將軍入言上上召見敬說曰陛下都雒陽豈欲與周室比隆哉上曰然敬曰陛下取天下與周異周之先自后稷堯封之邰去豳積德纍善十餘世公劉避桀居豳太王以狄伐故杖馬箠去居岐國人爭歸之及文王為西伯斷虞芮訟始受命吕望伯夷自海濵來歸之武王伐紂不期而㑹孟津上八百諸侯遂滅殷成王即位周公之屬傅相焉乃營成周都雒以為此天下中諸侯四方納貢職道里均矣有德則易以王無德則易以亡凡居此者欲務以德致人不欲險阻令後世驕奢以虐民也及周之衰分而為二天下莫朝周周不能制非德薄形勢弱也今陛下起豐沛收卒三千人卷蜀漢定三秦與項籍戰滎陽大戰七十小戰四十使天下之民肝腦塗地傷夷者未起而𣣔比隆成康之時臣竊以為不侔矣且秦地被山帶河四塞以為固秦之故資甚美膏腴之地此所謂天府夫與人鬬不扼其亢拊其背未能全勝今陛下入關而都案秦之故此亦扼天下之亢而拊其背也上疑未能決及留侯明言入關便即日駕西都關中於是敬賜姓劉氏拜為郎中號曰奉春君班固兩都賦序云或曰賦者古詩之流也昔成康沒而頌聲寢王澤竭而詩不作大漢初定日不暇給至於武宣之世乃崇禮官考文章內設金馬石渠之署外興樂府協律之事以興廢繼絶潤色鴻業是以衆庶說豫福應尤盛白麟赤鴈芝房寶鼎之歌薦於郊廟神雀五鳳甘露黃龍之瑞以為年紀故言語侍從之臣若司馬相如虞丘夀王東方朔枚臯王褎劉向之屬朝夕論思日月獻納而公卿大臣御史大夫兒寬太常孔臧太中大夫董仲舒宗正劉德太子太傅蕭望之等時時間作或以抒下情而通諷諭或以宣上德而盡忠孝雍容揄揚著於後嗣抑亦雅頌之亞也故孝成之世論而録之蓋奏御者千有餘篇而後大漢之文章炳焉與三代同風且夫道有夷隆學有粗密因時而建德者不以逺近易則故臯陶歌虞奚斯頌魯同見采於孔氏列于詩書其義一也稽之上古則如彼考之漢室又如此斯事雖細然先臣之舊式國家之遺美不可闕也臣竊見海內清平朝廷無事京師修宫室浚城隍而起苑圃以備制度西土耆老咸懷怨思兾上之眷顧而盛稱長安舊制有陋雒邑之議故臣作兩都賦以極衆人之所昡矅折以今之法度其詞曰西都賦有西都賔問於東都主人曰蓋聞皇漢之初經營也嘗有意乎都河洛矣輟而弗康實用西遷作我上都主人聞其故而覩其制乎主人曰未也願賔攄懷舊之蓄念發思古之幽情慱我以皇道𢎞我以漢京賔曰唯唯漢之西都在于雍州實曰長安左據函谷二崤之阻表以太華終南之山右界衰斜隴首之險帶以洪河涇渭之川衆流之隈汧涌其西華實之毛則九州之上腴焉防禦之阻則天地之隩區焉是故橫被六合三成帝畿周以龍興秦以虎視及至大漢受命而都之也仰悟東井之精俯協河圖之靈奉春建䇿留侯演成天人合應以發皇明乃眷西顧實惟作京於是睎秦嶺睋北阜挾澧灞據龍首圖皇基於億載庚𢎞規而大起肇自高而終平世增飾以崇麗厯十二之延祚故窮奢而極侈建金城之萬雉呀周池而成淵披三條之廣路立十二之通門內則街衢洞逹閭閻且千九市開場貨别隧分人不得顧車不得旋闐城溢郭旁流百㕓紅塵四合煙雲相連於是既庶且富娛樂無疆都人士女殊異乎五方遊士擬于公侯列肆侈于姬姜鄉曲豪舉遊俠之雄節慕原嘗名亞春陵連交合衆騁騖乎其中若乃觀其四郊浮逰近縣則南望杜霸北眺五陵名都對郭邑居相承英俊之域紱冕所興冠蓋如雲七相五公與乎州郡之豪傑五都之貨殖三選七遷充奉陵邑蓋以强幹弱枝隆上都而觀萬國也封畿之內厥土千里逴躒諸夏兼其所有其陽則崇山隱天幽林穹谷陸海珍藏藍田美玉商洛緣其隈鄠户杜濵其足源泉灌注陂池交屬竹林果園芳草甘木郊野之富號為近蜀其隂則冠以九嵕陪以甘泉乃有靈宫起乎其中秦漢之所極觀淵雲之所頌歎於是乎存焉下有鄭白之沃衣食之源提封五萬疆埸綺分溝塍刻鏤桑麻鋪棻東原隰龍鱗決渠降雨荷鍤成雲五榖垂穎郊則有通溝大漕潰渭洞河泛舟山東控引淮湖與海通波西郊則有上囿禁苑林麓藪澤陂池連乎蜀漢繚以周牆四百餘里離宫别館三十六所神池靈沼往往而在其中乃有九真之麟大宛之馬黃支之犀條枝之鳥踰昆崘越巨海殊方異類至于三萬里其宫室也體象乎天地經緯乎隂陽據坤靈之正位倣太紫之圓方樹中天之華闕豐冠山之朱堂因瓌材而䆒竒抗應龍之虹梁列棼橑以布翼荷棟桴而髙驤雕玉瑱以居楹裁金璧以飾璫發五色之渥彩光爓朗以景彰於是左墄右平重軒三階閨房周通門闥洞開列鍾虡於中庭立金人於端闈仍增崕而衡閾臨峻路而啓扉徇以離宫别寢承以崇臺閒館煥若列宿紫宫是環清涼宣溫神仙長年金華玉堂白虎麒麟區宇若兹不可殫論增盤崔嵬登降照爛殊形詭制每各異觀乘茵步輦惟所息宴後宫則有掖庭椒房后妃之室合歡增城安處常寧茝若椒風披香發越蘭林蕙草鴛鸞飛翔之列昭陽特盛隆于孝成屋不呈材墻不露形裛以藻繡絡以綸連隨侯明月錯落其間金釭銜璧是為列錢翡翠火齊流耀含英懸黎垂棘夜光在焉於是𤣥墀扣砌玉階彤庭碝磩綵緻琳珉青熒珊瑚碧樹周阿而生紅羅颯纚綺組繽紛精曜華燭俯仰如神後宫之號十有四位窈窕繁華更盛迭貴處乎斯列者蓋以百數左右庭中朝堂百寮之位蕭曹魏邴謀謨乎其上佐命則垂統輔翼則成化流大漢之愷悌蕩亡秦之毒螫故令斯人揚和樂之聲作畫一之歌功德著乎祖宗膏澤洽乎黎庶又有天祿石渠典籍之府命夫惇誨故老名儒師傅講論乎六藝稽合乎同異又有承明金馬著作之庭大雅宏逹于茲為羣元元本本殫見洽聞啓發篇章校理祕文周以鉤陳之位衛以嚴更之署總禮官之甲科羣百郡之亷孝虎賁綴衣閣尹閽寺陛㦸百重各有典司周廬千列徼道綺錯輦路經營修除飛閣自未央而連桂宫北彌明光而亘長樂陵墱道而超西墉掍建章而連外屬設壁門之鳳闕上觚稜而棲金爵內則别風開闔嶕嶢眇麗巧而聳擢張千門而立萬戶順隂陽以爾乃正殿崔嵬層構厥髙臨乎未央經駘蕩而出馺納娑神洞枵詣以與天梁上反宇以蓋戴激日景而光明欎其特起遂偃蹇而上躋軼雲雨於太半虹霓回帶於棼楣雖輕迅與僄狡猶愕眙而不能階攀井幹而未半目眩轉而意迷捨櫺檻而却倚若顛墜而復稽魂恍恍以失度巡回塗而下低既懲懼於登望降周流以倣徨步甬道以縈紆又杳窱而不見陽排飛闥而上出若逰目于天表似無依而洋洋前唐中而後太液覽滄海之湯湯揚波濤於碣石激神嶽之嶈嶈濫瀛洲與方壺蓬萊起乎中央於是靈草冬榮神木叢生巖峻崷崒金石崢嶸抗仙掌以承露擢雙立之金莖軼埃壒之混濁鮮皓氣之清英騁文成之丕誕馳五利之所刑庶松裔之羣類時逰從乎斯庭實列仙之攸館非吾人之所寧爾乃盛娛逰之壯觀奮泰武乎上囿因兹以威戎夸狄耀威靈而講武事命荆州使起鳥詔梁野而驅獸毛群內闐飛羽上覆接翼側足集禁林而屯聚水衡虞人修其營表種别羣分部曲有署罘網連紘籠山絡野列卒周匝星羅雲布於是乘鸞輿備法駕帥羣臣披飛亷入苑門遂繞鄷鄗厯上蘭六師發逐百獸駭殫震震爚爚雷奔電激草木塗地山淵反覆蹂躪其十二三乃拗怒而少息爾乃期門佽飛列刃鑽鍭要趹追蹤鳥驚觸絲獸駭值鋒機不虛掎弦不再控矢不單殺中必疊雙猋猋猿紛紛矰繳相纒風毛雨血灑野蔽天平原赤勇士厲狖失木豺狼懾竄爾乃移師趨險並蹈潜穢窮虎奔突狂兕觸蹶許少施巧秦城力折制掎僄狡扼猛噬脫角挫脰徙摶獨殺挾師豹拖熊螭曳犀犛頓象羆超洞壑越峻崖蹶嶄巖巨石頺松柏仆叢林摧革木無餘禽獸殄夷於是天子乃登屬玉之館厯長楊之榭覽山川之體勢觀三軍之殺擭原野蕭條目極四裔禽相鎮壓獸相枕藉然後收禽㑹象論功賜胙陳輕騎以行炮騰酒車以斟酌割鮮野食舉烽命爵饗賜畢勞逸齊大路鳴鑾容與徘徊集乎豫章之宇臨乎昆明之池左牽牛而右織女似雲漢之無涯茂樹䕃蔚芳草被隄蘭茝發色曄曄猗猗若摛錦與布繡爥耀乎其陂鳥則𤣥鶴白鷺黃鵠鵁鸛鶬鴰鴇鶂鳬鷖鴻鴈朝發河海夕宿江漢沉浮往來雲集霧散於是後宫乘輚輅登龍舟張鳳蓋建華旗袪黼帷鏡清流靡微風淡淡浮櫂女謳鼓吹震真聲激越謍厲天鳥羣翔魚窺淵招白鷴下雙鵠揄文竿出比目撫鴻量御矰繳方舟並鶩俯仰極樂遂乃風舉雲搖浮遊溥覽前乘秦嶺後越九嵕東薄河華西涉岐雍宫館所厯百有餘區行所朝夕儲不改供禮上下而接山川䆒休祐之所用采遊童之歡謡第從臣之嘉頌于斯之時都都相望邑邑相屬國藉十世之基家承百年之業士食舊德之名氏農服先疇之畎畝商修族世之所鬻工用高曽之規矩粲乎隱隱各得其所若臣者徒觀迹于舊墟聞之乎故老十分未得其一端故不能遍舉也東都賦東都主人喟然而歎曰痛乎風俗之移人也子實秦人矜夸館室保界河山信識昭襄而知始皇矣惡覩大漢之云為乎夫大漢之開元也奮布衣以登皇極繇數朞而創萬代蓋六籍所不能談前聖靡得而言焉當此之時功冇橫而當犬討冇逆而順民故婁敬度藝而獻其說蕭公權宜而拓其制時豈泰而安之哉計不得以已也吾子曽不是睹顧耀後嗣之末造不亦閽乎今將語子以建武之治永平之事監乎泰清以變子之惑志往者王莾作逆漢祚中缺天人致誅六合相滅于時之亂生民幾亡鬼神泯絶壑無完柩郛罔遺室原野厭人之肉川谷流人之血秦項之災猶不克半書契以來未之或紀故下人號而上訴上帝懷而降監乃致命乎聖皇於是聖皇乃握乾符闡坤珍披皇圖稽帝文赫然發憤應若興雲霆擊毗陽憑怒雷震真遂超大河跨北嶽立號高邑建都河洛紹百王之荒屯因造化之蕩滌體元立制繼天而作系唐統接漢緒茂育羣生恢復疆宇勳兼乎在昔事勤乎三五豈特方軌且並迹紛綸后辟治近古之所務蹈一聖之險易云爾哉夫建武之元天地革命四海之內更造夫婦肇有父子君臣初建人倫實始斯乃宓羲氏之所以基皇德也分州土立市朝作舟車造器械斯乃軒轅氏之所以開帝功也龔行天罰應天順人斯乃湯武之所以昭王業也遷都改邑有殷宗中興之則焉即土之中有周成隆平之制焉不階尺土一人之柄同符乎高祖克己復禮以奉終始允恭乎孝文憲章稽古封岱勒成儀炳乎世宗案六經而校德眇古昔而論功仁聖之事既該而帝王之道備矣至于永平之際重熙而纍洽盛三雍之上儀修衮龍之法服鋪鴻藻信仲景鑠揚世廟正雅樂神人之和允洽君臣之序既肅乃動大輅遵皇衢省方巡狩窮覽萬國之有無考聲教之所被散皇明以燭幽然後增周舊修洛邑扇巍巍顯翼翼光漢京于諸夏總八方而為之極是以皇城之內宫室光明闕庭神麗奢不可踰儉不能侈外則因原野以作苑填流泉而為沼發蘋藻以潛魚豐圃草以育獸制同乎梁鄒誼合乎靈囿若乃順時節而搜狩簡車徒以講武則必臨之以王制考之以風雅厯騶虞覽駟鐵嘉車攻采吉日禮官整儀乘輿乃出於是發鯨魚鏗華鐘登玉路乘時龍鳳蓋棽麗和鑾玲瓏天官景從寢威盛容山靈護野屬御方神雨師泛灑風伯清塵千乘雷起萬騎紛紜元戎竟野戈鋋彗雲羽旄掃霓旌旗拂天焱焱炎炎揚光飛文吐爓生風欱野噴山日月為之奪明丘陵為之搖震真遂集乎中囿陳師案屯駢部曲列校隊勒三軍誓將帥然後舉烽伐鼓申命三驅輶車霆發驍騎電鶩由基發射范氏施御弦不睼禽轡不詭遇飛者未及翔走者不及去指顧倐匆獲車已實樂不極般殺不盡物馬踠餘足士怒未㳿先驅復路屬車案節於是薦三犧效五牲禮神祗懷百靈御明堂臨辟雍揚緝熙宣皇風登靈臺考休徵俯仰乎乾坤參象乎聖躬目中夏而布德瞰四裔而抗稜西蕩河源東淡海漘北動幽崖南耀朱垠殊方别區界絶而不鄰自孝武之所不征孝宣之所未臣莫不陸讋水栗奔走而來賔遂綏哀牢開永昌春王三朝㑹同漢京是日也天子受四海之圖籍膺萬國之貢珍內撫諸夏外綏八蠻爾乃盛禮興樂供帳置乎雲龍之庭陳百僚而贊羣后䆒皇儀而展帝容於是庭實千品㫖酒萬鍾列金罍班玉觴嘉珍御太牢饗爾乃食舉雍徹太師奏樂陳金石布絲竹鐘鼓鏗鍧管絃曄煜抗五聲極六律歌九功舞八佾韶武備秦古畢四夷間奏德廣所及禁禁佅賣兜離罔不具集萬樂備百禮暨皇歡浹羣臣醉降烟熅調元氣然後撞鍾告罷百僚遂退於是聖上覩萬方之歡娛又沐浴乎膏澤懼其侈心之將萌而怠於東作也乃申舊章下明詔命有司班憲度昭節儉示太素去後宫之麗飾損乘輿之服御除工商之淫業興農桑之盛務遂令海內棄末而反本背僞而歸真女修織衽男務耕耘器用陶匏服尚素𤣥耻纎靡而不服賤竒麗而不珍捐金於山沉珠於淵於是百姓滌瑕蕩穢而鏡至清形神寂寞耳目不營嗜欲之源滅亷恥之心生莫不優遊而自得玉潤而金聲是以四海之內學校如林庠序盈門獻酬交錯俎豆萃莘下舞上歌蹈德詠仁登降飫宴之禮既畢因相與嗟歎𤣥德讜言𢎞說咸含和而吐氣頌曰盛哉乎斯世今論者但知誦虞夏之書詠殷周之詩講羲文之易論孔氏之春秋罕能精古今之清濁究漢德之所由唯子頗識舊典又徒馳騁乎末流溫故知新已難而知德者鮮矣且夫僻界西戎險阻四塞修其防禦孰與處乎土中平夷洞逹萬方輻湊泰嶺九嵕涇渭之川曷若四瀆五嶽帶河泝洛圖書之淵建章草泉館御列仙孰與靈臺明堂統和天人太液昆明鳥獸之囿曷若辟雍海流道德之富遊俠踰侈犯造義侵禮孰與同履法度翼翼濟濟也子徒習秦阿房之天而不知京洛之有制識函谷之可關而不知王者之然無外也主人之辭未終西都賔矍然失容逡巡降階揲意下捧手欲辭主人曰復位今將授子五篇之詩賔既卒業乃稱曰美哉乎斯詩義正乎揚雄事實乎相如匪唯主人之好學蓋乃遭遇乎斯時小子狂簡不知所裁既聞正道請終身而誦之其詩曰明堂詩於昭明堂明堂孔陽聖皇宗祀穆穆煌煌上帝宴饗五位時序誰其配之世祖光武普天率土各以其職猗與緝熙允懷多福辟雍詩乃流辟雍辟雍湯湯聖皇蒞止造舟為梁皤皤國老乃父乃兄抑抑威儀孝友光明於赫太上示我漢行洪化惟神永觀厥成靈臺詩乃經靈臺靈臺既崇帝勤時登爰考休徵三光宣精五行布序習習祥風祁祁甘雨百榖蓁蓁庶草蕃廡屢惟豐年於皇樂胥寶鼎詩嶽修貢兮川效珍吐金景兮敲浮雲寶鼎見兮色紛緼煥其炳兮被龍文登祖廟兮享聖神昭靈德兮彌億年白雉詩啓靈篇兮披瑞圖獲白雉兮效素烏嘉祥阜兮集皇都發皓羽兮奮翹英容潔朗兮於淳精彰皇德兮侔周成永延長兮膺天慶左思三都賦序云蓋詩有六義焉其二曰賦揚雄曰詩人之賦麗以則班固曰賦者古詩之流也先王採焉以觀土風見緑竹猗猗則知衛地淇澳之産見在其板屋則知秦地西戎之宅故能居然而辨八方然相如賦上林而引盧橘夏熟揚雄賦甘泉而陳玉樹青葱班固賦西都而歎以出比目張衡賦西京而述以游海若假稱珍怪以為潤色若斯之類匪啻于兹考之果木則生非其壤校之神物則出非其所於辭則易為藻飾於義則虛而無徵且夫玉巵無當雖寶非用侈言無驗雖麗非經而論者莫不詆訐其研精作者大抵舉為憲章積習生常有自來矣余既思摹二京而賦三都其山川城邑則稽之地圖鳥獸草木則驗之方志風謡歌舞各附其俗魁梧長者莫非其舊何者發言為詩者詠其所志也升髙能賦者頌其所見也美物者貴依其本讃事者宜本其實匪本匪實覽者奚信且夫任土作貢虞書所著辨物居方周易所慎聊舉其一隅攝其體統歸諸訓詁焉蜀都賦有西蜀公子者言於東吳王孫曰蓋聞天以日月為綱地以四海為紀九土星分萬國錯峙崤函有帝皇之宅河洛為王者之里吾子豈亦曽聞蜀都之事歟請為左右揚摧而陳之夫蜀都者蓋兆基於上世開國於中右廓靈關而為門包玉壘而為宇帶二江之雙流抗峨眉之重阻水陸所湊兼六合而交㑹焉豐蔚所盛茂八區而菴藹焉於前則跨躡犍牂枕輢交趾經途所亘五千餘里山阜相屬含溪懷谷岡巒紏紛觸石吐雲欎葐汾蒀溫以翠微崫巍巍以峩峩干青霄而秀出舒丹氣以為霞龍池􅘝􅀈瀑􅀈􅀈其隈漏江伏流潰其阿汨若湯谷之揚濤沛若濛汜之涌波於是乎卭竹緣嶺菌桂臨崖旁挺龍目側生荔枝布緑葉之萋萋結朱實之離離迎隆冬而不凋常曄曄而猗猗孔翠羣翔犀象競馳白雉朝雊猩猩夜啼金馬騁光而絶景碧雞鯈忽而曜儀火井沈熒於幽泉髙爓飛煽於天垂其間則有琥珀丹青江珠瑕英金沙銀鑠厯符采彪炳暉麗灼爍於後則却背華容北指崑崙緣以劔閣阻以石門流漢湯湯驚浪雷奔望之天回即之雲昏水物殊品鱗介異族或藏蛟螭或隱碧玉嘉魚出于丙穴良木攢于褒谷其樹則有木蘭梫桂杞櫹椅桐棕丫邪楔楩柟幽藹於谷底松柏蓊鬱於山峯擢修幹竦長條扇飛雲拂輕霄羲和假道於峻岐陽烏回翼乎髙標巢居栖翔聿兼鄧林穴宅奇獸窠宿異禽熊羆咆其陽鵰鶚鴪其隂猿狖騰希而競捷虎豹長嘯而永吟於東則左綿巴中百濮所充外負銅梁於宕渠內函要害於膏腴其中則有巴菽巴㦸靈壽桃枝樊以蒩租圃賔以鹽池蜅砂蛦山棲黿龜水處潜龍蟠於沮澤應鳴鼓而興雨丹赩熾出其坂蜜房郁育被其阜山圖采而得道赤斧賨仙服而不朽若乃剛悍生其方風謡尚其武奮之則叢旅玩之則渝舞鋭氣剽於中葉蹻容世於樂府於西則右挾岷山湧漬發川陪以白狼夷歌成章坰野草昧林麓黝䨹叔交讓所植蹲鴟所伏百藥灌叢寒卉冬馥異類衆夥于何不育其中則有青珠黃環碧砮芒消或豐緑荑或蕃丹椒蘪蕪布濩于中阿風連莚神蔓于蘭臯紅葩紫飾柯葉漸苞敷蘂葳蕤落英飄颻農是嘗盧跗是料聊芳追氣邪味蠲癘痟其封域之內則有原隰墳衍通望彌博演以濳沫浸以綿洛溝洫脉散疆里綺錯黍稷油油粳稻莫莫指渠口以為雲門灑滮池而為陸澤雖星畢之滂沱尚未齊其膏液爾乃邑居隱賑夾江傍山棟宇相望桑梓接連家有鹽泉之井戶有橘柚之園其園則有林檎枇杷橙柿梬即楟亭榹斯桃涵列梅李羅生百果甲宅異色同榮朱櫻春熟素奈夏成若乃大火流凉風厲列白露凝微霜結紫梨津潤榛栗罅發蒲桃亂潰石榴競裂甘至自零芬芳酷烈其圃則有蒟來蒻茱茰瓜疇芋區甘蔗辛薑陽蓲隂敷日往菲薇月扶疏任土所麗衆獻而儲其沃瀛則有攢浥蔣叢蒲緑菱紅蓮雜以藴藻糅以蘋蘩揔莖柅柅裛葉蓁蓁蕡實時味王公羞焉其中則有鴻儔鵠侣䳲鷺鵜鶘晨鳬旦至候鴈銜蘆木落南翔氷泮北徂雲飛水宿弄吭清渠其深則有白黿命鱉𤣥獺上祭鱣鮪鱒魴鮷鱧鯊鱨差鱗次色錦質銀章躍濤戲瀨中流相忘於是乎金城石槨兼市中區既麗且崇實號成都關二九之通門畫方軌之廣塗營新宫於爽塏擬承明而起廬結陽城之延閣飛觀榭乎雲中開髙軒以臨山列綺窗而瞰江內則議殿爵堂武義虎威宣化之闥崇禮之闈華闕雙邈重門洞開金鋪交映玉題相暉外則軌躅八達里閈對出比屋連甍千廡萬室亦有甲第當衢向術壇宇顯敞髙門納駟庭扣鍾磬堂撫琴瑟匪葛匪姜疇能是恤亞以小城接乎其西市鄽所㑹萬商之淵列隧百重羅肆巨千賄貨山積纎麗星繁都人士女袨服靚䊋賈貿墆榔鬻舛錯縱橫異物詭譎竒于八方布有橦華麵有桄卭杖傳節于大夏之邑蒟醬流味于畨禺之鄉輿輦雜㳫冠帶混并纍轂疊跡叛衍相傾歡譁鼎沸則嚨聒宇宙嚻塵張天則埃壒曜靈闤闠之裏技巧之家百室離房機杼相和貝錦斐成濯色江波黃潤比筒籝金所過侈侈隆富卓鄭埒名公擅山川貨殖私庭藏鏹巨萬鈲豪摫來時往兼呈亦以財雄翕習邊城三蜀之時養交都邑結儔附黨劇談戲論扼腕抵掌出則連騎歸從百兩若其舊俗終冬始春吉日良辰置酒髙堂以御嘉賔金罍中坐肴核四陳觴以清醥起鮮以紫鱗羽爵執競絲竹乃發巴姬彈弦漢女擊節西音於促柱歌江上之厲紆長袖而屢舞翩躚躚以裔裔合樽促席引滿相罰樂飲今夕一醉纍月若夫王孫之屬卻公之倫從禽于外巷無居人並乘驥子俱服魚文𤣥黃異校結駟繽紛西踰金隄東越玉津朔别期晦匪日匪旬蹴蹈蒙籠涉􅀈寥廓鷹犬倐眒罻羅絡幕毛羣陸離羽族紛泊翕響揮霍中網林薄屠麖麋剪旄麈帶文蛇跨雕虎志未騁時欲晚追輕翼赴絶逺入彭門之闕馳九折之坂經三峽之崢嶸躡五屼之蹇滻㦸食鐵之獸射噬毒之鹿皛貙氓於葽草彈言鳥於森木拔象齒戾江犀角鳥鎩翮獸廢足殆而朅來相與第如滇池集乎洲試水客艤輕舟娉江婓與神游罨翡翠釣鰋鮋下髙鵠出濳蚪吹洞簫發櫂謳感鱏尋魚動陽侯騰波沸涌珠貝汜浮若雲漢含星而光耀洪流將饗繚馬者張帟幕㑹平原酌清酤割芳鮮飲御酣賔旅旋車雷駭轟轟闐闐若風流雨散漫乎數百里之間斯蓋宅土之所安樂觀聽之所踊躍也馬獨三川為世朝市若乃卓犖竒譎俶倜罔已一經神怪一緯人理逺則岷山之精上為井絡天帝運期而㑹昌景福肹蠁而興作碧出萇𢎞之血鳥生杜宇之魄妄變化於非常嗟見偉於疇昔近作江漢炳靈世載其英蔚若相如皭若君乎王裦暐曄而秀發揚雄含章而挺生幽思絢道德摛藻掞天庭考四海而為雋當中葉而擅名是故遊談者以為譽造作者以為程也至乎臨谷為塞因山為障峻岨塍埒長城豁險吞若巨防一人守隘萬夫莫向公孫躍馬而稱帝劉宗下輦而自王由此言之天下孰尚故雖兼諸夏之富有猶未若兹都之無量也吳都賦東吳王孫囅然而咍曰夫上圖景宿辨于天文者也下料物土析於地理者也古先帝世曽覽八紘之洪緒一六合而光宅翔集遐宇鳥䇿篆素玉牒石記鳥聞梁岷有陟方之館行宫之基歟而吾子言蜀都之富禺同之有偉其區域美其林藪矜巴漢之阻則以為襲險之右徇蹲鴟之沃則以為世濟陽九齷齪而算固亦曲士之所歎也旁魄而論都邑抑非大人之所壯觀也何則土壤不足以攝生山川不足以周衛公孫國之而破諸葛家之而滅兹乃喪亂之丘墟顛覆之軌轍安可以儷王公而著風烈也玩其磧礫而不窺玉淵者未知驪龍之所蟠也習其敝邑而不覿上邦者未知英雄之所躔也子獨未聞大吳之巨麗乎且有吳之開國也造自太伯宣於延陵蓋端委之所彰高節之所興建至德而創洪業世無德而顯稱由克讓以立風輕脫屣於千乘若率土而論都而非列國之所觖望也故其經略上當星紀拓土畫疆卓斚兼并包括千越跨躡蠻荆婺女寄其曜翼軫寓其精指衛嶽以鎮野目龍川而帶坰爾其山澤則嵬渺嶷漫嶢湧屼巊溟欎􅔍潰渱泮汗滇田㴐沔渺或川而開瀆或吞江而納漢磈磈䃬䃬滮滮涆涆䃢碒乎數州之間灌注乎天下之半百川𣲖别歸海而㑹控清引濁混濤并瀨濆薄沸騰寂寥長邁濞焉洶洶隱若礚礚出乎大荒之中行乎東極之外經扶桑之中林包暘谷之滂沛潮波汨昧泓澄奫溱澒起回復萬里歊霧漨浡雲蒸昏溶沆漾莫測其深莫究其廣澶湉漠而無涯有流而為長瓌異之所叢育鱗甲之所集往於是乎長鯨吞航修鯢吐浪躍龍騰蛇蛟鯔緇琵琶王鮪鯸鮐怡鮣卬龜鱕翻䱜錯烏賊擁劒􅔢流鼊辟鯖鰐涵泳乎其中葺鱗䱾甲詭類舛錯泝洄順噞候喁造沉浮鳥則鵾雞鸀屬鳿玉鸘鵠鷺鴻鶢鶋避風鴈江雞鶩鷛鶄鶴鶖鶬鸛鴟鷁鸕泛濫乎其上湛淡羽儀隨波參差理翮整翰容與自玩雕琢蔓藻刷蕩漪瀾魚鳥聱䎲萬物蠢生芒芒黖黖慌罔奄歘與神化翕忽函幽育明窮性極形盈虛自然蚌蛤珠胎月虧全巨鼇贔備屓首冠靈山大鵬繽翻翼若垂天振蕩汪流雷抃重淵殷上動宇宙胡可勝源島嶼綿邈洲渚慿隆曠瞻迢遞逈眺冥蒙珍怪麗竒隙充徑路絶風雲通紅桃屈盤丹桂灌叢瓊枝抗莖而敷蘂珊瑚幽茂而玲瓏層岡重阻列真之宇玉堂對霤石室相距藹藹翠幄嫋嫋素女江婓於是往來海童於是宴語斯實神妙之響象嗟難得而覼縷爾乃地勢坱圠夏卉木镺方邁遭藪為圃值林為苑異荂豆蓲育曄冬積志所辨中州所羡草則藿蒳蔻薑彚非一江離之屬海苔之類綸關組紫絳食葛香茅石帆水松東風扶留布濩臯澤蟬聮陵丘夤緣山嶽之㞯羃厯江海之流杌白蒂街朱蕤鬱兮䓲茂曄兮菲菲光色炫晃芬馥肹蠁織貢納其包匭離騷詠其宿莾木則楓柙豫章栟櫚枸木榔綿杬杶櫨文欀楨橿平仲君遷松梓古度楠榴之相思之樹宗生髙岡族茂幽阜擢本千尋垂䕃萬畝攢柯㧝莖重葩暗葉輪困虬蟠㙷鱗接榮色雜揉綢繆縟繡宵露霮䨴旭日暗亮㫲象與風䬙揚笙䬀俱瀏其颼飀鳴條律暢飛音響蓋琴筑并奏竽唱上則有猿父哀吟􅏈子長嘯狖鼯猓然騰趠下飛超梟爭縣接乖競逰逺枝驚透沸亂牢落翬散其則有羊麡狼猰貐貙象於莵之族犀兕之黨鉤爪鋸牙自成鋒穎精若曜星聲若雷霆名載于山經形鏤于夏鼎其竹則篔簹林箊桂箭射筒柚由梧有篁篥橚簩勞有叢苞筍抽節往往縈結緑葉翠莖冒霜停雪矗森萃蓊茸蕭瑟檀欒嬋娟玉潤碧鮮梢雲無以踰嶰谷弗能連鸑鷟食其實鵷雛擾其間其果則丹橘餘甘荔枝之林檳榔無柯椰葉無䕃龍眼橄欖棎芳榴禦霜結根比景之隂列挺衡山之陽素花斐丹秀臨青壁係紫房鷓鴣南翥而中留孔雀綷賂羽而翺翔山雞歸飛而來棲翡翠列巢以重行其琛則琨瑶之阜銅鍇之垠火齊之寶駭雞之珍赬丹明璣金華銀朴紫貝流黃縹碧素玉隱賑雜插幽屏精曜潜穎硩陊山谷崎崴岸為之不枮林采為之潤黷隋侯於是鄙其夜光宋玉于是陋其結緑其荒陬譎詭則有龍穴內蒸雲雨所儲陵鯉若獸浮石若桴雙則比目片則王餘窮陸飲木極沈水居泉室潜織而卷綃淵客慷慨而泣珠開北户以向日齊南冥于幽都其四野則畛畷綴無數膏腴兼倍原隰殊品窊隆異等象耕鳥耘此之自與改穱秀菰穗于是乎在煮海為鹽採山鑄錢國稅再熟之稻鄉貢八蠶之綿徒觀其郊隧之內奧都邑之綱紀霸王之所根柢開國之所基趾郛郭周匝重城結隅通門二八水道陸衢所以經始用纍千祀也憲紫宫以營室廓廣庭之漫漫寒署隔閡於邃宇虹霓回帶于雲館所以跨跱煥炳萬里也造姑蘇之髙臺臨四逺而特建帶朝夕之濬池佩長洲之茂苑窺東山之府則瓌寶溢目䚕業海陵之倉則紅粟流衍起寢廟于武昌作離宫于建闡闔閭之所營采夫差之遺法抗神龍之華殿施榮楯而捷獵崇臨海之崔嵬飾赤烏之暐曄東西膠轕南北崢嶸房櫳對櫎連閣相經閽闥譎詭異出奇名左稱彎崎右號臨硎雕欒鏤楶青瑣丹楹圖以雲氣畫以仙靈雖兹宅之誇麗曽未足以少寧思比屋於傾宫畢結瑶而構瓊髙闈有閌洞門方軌朱闕雙立馳道如砥樹以青槐亘以緑水𤣥䕃耽耽清流亹亹列寺七里挾棟陽路屯營櫛比解署棊布橫塘查下邑窟隆夸長干延屬飛甍舛互其居則有髙門鼎貴魁岸豪傑虞魏之昆顧陸之裔岐嶷繼體老成奕世躍馬疊跡朱輪纍轍陳兵而歸蘭錡之靡輕訬內設冠蓋雲䕃閭閻闐噎其鄰則有任俠之客締交翩翩儐從奕奕出躡珠履動以千百里宴巷飲飛觴舉白翹關扛鼎拼射壺慱鄱陽暴謔中酒而作於是樂只衎而歡飫無匱都輦殷而四奧來暨水浮陸行方舟結駟唱掉轉轂昧旦永日開市朝而並納橫闤闠而流溢混品物而同㕓并都鄙而為一士女佇貽經工賈船駢坒而紵衣絺服雜㳫傱常萃輕輿按轡以隧樓舉帆過肆果布輻湊而然致逺流離與珂珬珠琲用萬端金溢磊珂闌干桃笙象䌖韜賄紛紜器簟於筒中蕉葛升越呷譁喤弱於羅紈澀譶風澩而僇塵交貿相競喧芬葩䕃映揮袖飄紅晝昏流汗霡霂而中逵泥濘富中之氓貨殖之選乘時射利財豐巨萬競其區宇則并疆兼巷矜其宴居則珠服玉饌趫材悍壯此焉比廬捷若慶忌勇若専諸危冠而出竦劒而趍扈帶鮫函扶揄屬鏤閭藏鍦於人去􅚛自閭家有鶴膝户有犀渠軍容蓄用器械兼儲吳鉤越棘純鉤湛盧戎車盈於石城戈船掩乎江湖露往霜來日月其除草木節解鳥獸腯膚觀鷹隼誡征夫坐組甲建祀姑命官帥而擁鐸將校獵乎具區烏滸狼㬻夫南西屠儋耳黑齒之酋金鄰象郡之渠驫方駥車飍􅀢矞靸霅驚捷先區前途俞騎騁路指南司出􅀢檻被練鏘鏘吳王乃巾玉輅軺驌驦旗魚須常重光攝鳥號佩干將羽毛揚蕤雄㦸耀鋩貝胄象弭織文鳥章六軍袀服四騏龍驤峭格周施罿罻普張畢罕瑣結罠蹄連綱阹以九疑禦以沅湘輶軒蓼擾彀騎煒煌袒禓徒摶拔距投石之部猿臂駢脅狂趭與獷躍猤莾鷹瞵鶚視參談殊若離若合者相騰乎䍚之野干鹵殳鋋蟬暘夷勃盧之旅長􅧿者短兵直髮馳騁儇佻之坌並銜枚無聲悠悠斾旌相與聊浪郎乎昧莫坰鉦鼓疊山火烈熛不林飛爓浮煙載霞載隂菈硠郎崩巒㢮岑鳥擇木獸不擇音暴甝擸雷䋶麋麖驀六駮追飛生彈鸞鶁射猱狿柏白雉落黑鴆零陵絶嶛嶕聿越巉嶮跇踰竹㺦猭杞柟齊封狶􅵖䓼徊神螭掩剛鏃潤霜刃染於是弭節頓轡鑣駐徘倘佯寓目幽蔚覽將帥之拳勇與士卒之抑揚羽族以觜距為刀鈹扢毛羣以齒角為矛鋏而皆體著而應卒所以挂而為創痏衝踤斷筋骨莫不衄而鋭挫鋩拉捭虺摧藏雖有石林之岝崿謂攘臂靡之雖有雄之九首將抗足以跐之顛覆巢居剖破窟宅仰攀鵕䴊俯蹴豺獏擒劫􅍛剞几熊羆之室剽掠虎豹之落猩猩啼而就􅍛笑而被格屠巴蛇出象骼斬鵬翼掩廣澤輕禽狡獸周章夷猶狼跋乎紭中忘其所以睒睗失其所以去就魂褫氣懾而自踼錯䟮傾者應弦而飲羽形僨景僵者纍積而增益雜襲繆藪薄倒岬岫巖穴無豜豵翳薈無鷚力走思假道于豐隆披重霄而高狩籠烏兔於日月窮飛之棲宿嶰澗閴岡岵童罾罘滿效獲衆艘回靶乎行睨連觀漁乎三江泛舟航于彭蟸渾萬而既同𢎞舸舳巨檻接艫飛雲蓋海制非常模疊華樓而島峙時髣佛於方壺比鷁首之有裕邁艅艎于往初張組帷搆流蘇開軒幌鏡水區篙工楫師選自閩禺習御長風狎玩靈胥責千里於寸隂聊先期而須史櫂謳唱簫籟鳴洪流響渚禽驚弋磻放稽鷦䳟虞機發留鵁鶄鉤餌縱橫網罟接緒術兼詹公巧傾任父筌䱎䲛鱺鱨鯊罩兩魪窠鰝蝦乘鱟黿鼉同罛轄共羅沈虎潜鹿馽屬雖復侰河束微鯉鯨背中于羣攙搶暴出而相臨而釣無異射鮒于井谷結輕舟而競逐迎潮水而振緡想萍實之復形訪靈䕫于鮫人精衛銜石而遇繳文鰩夜飛而觸綸北山亡其翔翼西海失其遊鱗雕題之士鏤身之卒比飾虬龍蛟螭與對簡其華質則亄費錦繢料其虓勇則鵰悍狼戾相與昧潜險搜瓌奇摸蝳蝟捫觜訖􅏲剖巨蚌于回淵濯明月于漣漪畢天下之至異無索而不臻溪壑為之一罄川瀆為之中晉貧哂淡臺之見謀聊襲海而徇珍載漢女于後舟追賈而同塵汨沛乘流以砰汔宕可翼颸風之䬟䬟直衝濤而上瀨常沛以悠悠休而凱歸揖天吳與陽侯指包山而為期集洞庭而淹留數軍實乎桂林之苑饗戎旅乎落星之樓置酒若淮泗積肴若山丘飛輕軒而酌緑醽方雙轡而賦珍羞飲烽起釂羣鼓震金士遺倦衆懷欣幸乎館娃之宫張女樂而娛臣羅石與絲竹若鈞天之下陳登東歌操南音𦙍陽阿詠韎任荆豔楚舞吳愈越吟翕習容裔靡靡愔愔若此者與夫唱和之隆響動鐘磬之鏗耾有殷坻頽于前曲度難勝皆與謡俗什協律吕相應其奏樂也則木石潤色其吐哀也則凄風暴興或超延露而駕辨或踰緑水而採菱軍馬弭髦而仰秣淵魚竦鱗而上升酣湑半八音并歡情留良辰征魯陽揮戈而高麾回曜靈于太清將轉西日而再中齊既往之精誠昔者夏后氏朝羣臣於兹土而執玉帛者以萬國蓋亦先王之所髙㑹而四方之所軌則春秋之際要盟之主闔閭申其威夫差窮其武內果伍員之謀外騁孫子之奇勝疆楚于柏舉棲徑越于㑹稽闕霤溝乎商魯爭長於黃池江湖嶮陂物産殷充繞未足言其固鄭白未足語其豐士有陷堅之鋭俗有節概之風睚眦則挺劔喑廕嗚則彎弓擁之者龍騰據之者虎視麾城若振槁搴旗若顧指雖帶甲一朝而元功逺致雖纍葉百疊而富强相繼樂湑衎其方域列仙集其土地桂父練形而易色赤須蟬蛻而附麗中夏比焉畢世罕見丹青圖其象珍瑋貴其寶利也舜禹遊焉沒齒而忘歸精靈留其山阿玩其奇麗剖判庶士商榷萬俗國有欎鞅而顯敞邦有湫厄而踡局伊兹都之函𢎞傾神州而韞櫝仰南斗以斟酌兼二儀之優渥由此而揆之西蜀之于東吳小大之相絶也亦猶棘林螢耀而與夫樳木龍燭也否泰之相背也亦猶帝之懸解而與夫桎梏疏屬也庸可共世而論巨細同年而議豐確乎暨其幽遐獨邃元廓間奧耳目之所不該足趾之所不蹈倜儻之極異誳詭之殊事藏理于終古而未寤於前覺也若吾子之所傳孟浪之遺言略舉其梗概而未得其要妙也魏都賦魏國先生有睟其容乃盱衡而誥曰异乎交益之士蓋音有楚夏者土風之乖也情有險易者習俗之殊也雖則生常固非自得之謂也昔市南宜僚弄丸而兩家之難解聊為吾子復玩德音以釋二客競于辨囿也夫泰極剖判造化權輿體兼晝夜理包淸濁流而為江海結而為山嶽列宿分其野荒裔帶其隅巖岡潭淵限蠻隔夷峻危之竅也蠻陬夷落譯導而通者鳥獸之氓也正位居體者以中夏為喉舌不以邊陲為襟帶也長世字氓者以道德為籓不以襲險為屏也而子大夫之賢尚弗曽庶翼等威附麗皇極思稟正朔樂率貢職而徒務於詭隨匪民宴安於絶域榮其文身驕其險棘繆默語之常倫牽膠言而踰侈飾乖離以矜然假倔彊而攘臂非醇粹之方壯謀踳駮於王義孰愈尋靡萍于中逵造沐猴于棘刺劔閣雖嶛憑之者蹶非所以深根固蒂也洞庭雖濬負之者北非所以愛人治國也彼桑榆之末光踰長庚之初暉况河冀之爽塏與江介之湫湄故將語子以神州之略赤縣之畿魏都之卓犖六合之樞機于時運距陽九漢網絶維姧回內贔兵主紫薇翼翼京室耽耽帝宇巢焚原燎變為煨燼故荆棘旅庭殷殷寰內繩繩八區鋒鏑縱橫化為戰場故麋鹿寓城也伊洛榛曠崤函荒蕪臨菑牢落鄢郢丘墟而是有魏開國之日締構之初萬邑譬焉亦猶犨糜之與子都培塿之與方壺也且魏土者畢昂之所應虞夏之餘人先王之桑梓列聖之遺塵考之四隈則八埏之中測之寒署則霜露所鈞卜偃前識而賞其隆吳札聽歌而美其風雖則衰代而盛德形於管絃雖踰千祀而懷舊藴于遐年爾其疆域則旁極齊秦結湊兾道開胸殷衛跨躡燕趙山林幽映恆碣砧􅑇于青霄河汾浩涆而皓溔川澤回繚南瞻淇澳則緑竹純茂北臨漳滏泉則冬夏異沼神鉦迢遞于髙巒靈響時驚於四表溫毖涌而自浪華清蕩邪而難老墨井鹽池𤣥滋素液厥田惟中厥壤惟白原隰畇畇墳衍斥斥或䃬􅤢而復陸或朗而拓落乾坤交泰而烟熅嘉祥徽顯而豫作是以兆朕振古萌柢帝疇昔藏氣䜟緯閟象竹帛逈時世而淵默應期運而光赫暨聖武之龍飛肇受命而光宅爰初自臻言占其良謀龜謀筮亦既允臧修其郛郭繕其城隍經始之制牢籠百王畫豫雍之居寫八都之宇鑒茅茨于陶唐察卑宫于夏禹古公草創而高門有閲宣王中興而築室百堵兼聖哲之軌并文質之狀商豐約而折中拱准當年而為量思重爻摹大壯覽荀卿采蕭相僝木于林衡授全模於梓匠遐邇恱豫而子來工徒擬議而騁巧闡鈎繩之筌緒承二分之正要揆日晷考星耀建社稷作清廟築曽宫以回匝比岡隒起而無陂造文昌之廣殿極棟宇之𢎞規􅦳若崇山崫以崔嵬髧若𤣥雲舒霓以髙垂瓌材巨世􅕜桷㙷布參差枌橑復結欒櫨疊施舟梁虹申以並亘朱森而支離綺井列疏以懸蒂華蓮重葩而倒披齊龍首而涌霤時梗概于滮池旅楹間列暉鑒抰振櫰題黮􅩙階􅀈嶙峋長庭砥平鍾虞夾陳風無纎埃雨無微津巖巖北闕南端攸遵竦峭雙碣方駕比輪西闢延秋東啓長春用覲羣后觀享頤賔左則中朝有赩聽政作寢匪朴匪斫去泰去甚木無雕鎪土無締錦𤣥化所甄國風所禀於前則宣明顯陽順德崇禮重聞洞出鏘鏘濟濟珍樹猗猗竒卉萋萋蕙風如薰甘露如醴禁臺省中連闥對廊直事所繇典型所藏藹藹列侍金蜩齊光詰朝陪幄納言有章亞以柱後執法內侍符節謁者典璽儲吏膳夫有官藥劑有司布醳蘭順時腠理則治於後則椒鶴文石永巷壼術楸梓木次舍甲乙西南有户成之匪日丹青炳煥特有溫室儀形宇宙歷象賢聖圖以百瑞綷則以藻詠茫茫終古此焉則鏡有虞作繢茲亦等競右疏圃曲池下畹髙堂蘭渚莓莓石瀨湯湯弱葼果係實輕葉振芳奔龜躍魚有􅕉吕梁馳道周屈於下延閣𦙍宇以經營飛陛方輦而徑西三臺列峙而崢嶸亢陽臺於隂基擬華山之削成上纍棟而重霤下氷室而沍冥周軒中天丹墀臨猋增構峩峩清塵彯彯雲雀踶籠甍而矯首壯翼摛鏤于青霄雷雨窈冥而未半皎日光于綺寮習步頓以升降御春服而逍遙八極可圍于寸眸萬物可齊於一朝長塗牟首豪徼互經晷漏肅唱明宵有程附以蘭錡堞帶宿以禁兵司衛間邪鉤陳罔驚于是崇墉濬洫嬰涘四門䡾䡾隆厦重起憑太清以混成越埃壒而而資始邈邈標危亭亭峻峙臨焦原而弗恍誰徑捷無􅓥與岡岑而永固非有期乎世祀陽靈停耀于其表隂祗濛霧于其裏菀以𤣥武陪以幽林繚垣開囿觀宇相臨碩果灌叢圍木竦尋篁篠懷風蒲桃結隂回淵漼積水深蒹葭贙頡雚蒻森丹藕凌波而的礫緑茭泛濤而浸潭羽翮頏鱗介浮沉栖者擇木雊者擇咅若咆渤澥與姑餘常鳴鶴而在隂表清籞勒虞針思國恤忘從禽樵蘇往而無忌即鹿縱而匪禁腜腜起坰野奕奕菑畝草荼伊蠢芒種斯阜西門溉其前史灌其後墱流十二同源異口蓄為屯雲泄為行雨水澍廬粳稌陸蒔稷黍黝黝隂桑柘油油麻紵均田畫疇蕃錯列薑芋充茂桃李翳家安其所而服美自恱邑屋相望而隔踰奕世內則街衢輻湊朱闕結隅石杠飛梁出控漳渠疏通溝以濵路羅青槐以䕃塗比滄浪而可濯方步櫊而有踰習習冠蓋萃莘蒸徒斑白不提行旅讓衢設官分職營處署居夾之以府寺班之以里閭其府寺則位副三事官踰六卿太常之號大理之名厦屋一揆華屏齊榮肅肅階䦳重門再扄師尹爰止毗世作禎其閭閻則長壽吉陽永平思忠亦有戚里置宫之東閈出長者巷苞諸公都護之堂殿居綺窗輿騎朝猥蹀㩻起其中營客館以周坊飾賔侣之所集瑋豐樓之閈閎建安而首立葺墻羃室房廡雜襲剞能劂廓罔掇匠斫積習廣成之傳無以儔槀街之邸不及三市而開㕓籍平逵而九達班列肆以兼羅設闤闠以襟帶濟有無之常偏距日中而畢㑹抗旗亭之嶢嶭侈所眺之博大百隧轂擊連軫萬貫慿軾捶馬袖幕紛半一八方而混同極風采之異觀質劑平而交易刀布貿而無算財以工化賄以商通難得之貨此則不容器周用而長務物背窳廋而就攻不鬻邪而豫賈著馴致之醇醲白藏之藏冨有無隄同賑大內控引世資賨底幏燕積墆庫琛幣充牣馬關石之所和鈞財賦之所慎弧盈而委徑冀填廄而駔駿至乎勍旗敵紀紛庶土罔寧聖武興言將曜威靈介胄重襲旌躍莖弓珧解檠矛鋋飄英三屬之甲縵裻胡之纓控弦簡發妙擬更律嬴齊被練而銛戈襲偏以謮列畢出征而中執竒正以四伐碩畫精通日無匪制推鋒積紀鋩氣彌鋭三接三捷既晝亦月剋剪方命吞滅咆咻雲撤叛换席卷䖍劉祲威八絃荒阻率由洗兵海島刷馬江洲振旅䡘䡘喪反斾悠悠凱歸同飲疏爵普疇朝無刓印國無費留亂既弭而能宴武人歸獸而去戰蕭斧所恆戢柯以柙刃虹旌攝麾以就卷卙洪範酌典憲觀通其變上垂拱而司契下緣督而自勸道來斯貴利往則賤囹圄寂寥京庾流衍於是東鯷即序西傾順軌荆南懷憓朔北思韙綿綿逈塗驟山驟水襁負賮贄重譯貢篚髽髙首之豪鐻耳之傑服其荒服斂袵魏闕置酒文昌張宿設其夜未遽庭燎晣晣如冇客祁祁載華載裔澌岌岌冠縱纍纍辮髮清酤濟濁醪如河凍醴流溫酎躍波豐肴衍衍行庖皤皤愔愔醧宴酣湑無譁延廣樂奏九成冠韶夏冒六英傮響起疑震霆天宇駭地廬驚億若大帝之所興作二嬴之所曽聆金石絲竹之恆韻匏土革木之常調干戈戚羽之飾好清謳微吟之要妙世業之所日用耳目之所聞覺雜揉紛錯兼該泛博鞮鞻所掌之音韎邁昧任禁之曲以娛四夷之君以睦八荒之俗既苗既狩爰逰爰豫籍田以禮動大閲以義舉備法駕理秋御顯文武之壯觀邁梁騶之所著林不槎枿澤不伐夭月斧斨以時罾網以道德連木理仁挺芝草皓獸為之藪丹魚為之生沼矞三雲翔龍澤馬于匪阜山圖其石川形其寶莫黑匪烏趾而來儀莫赤狐九尾而自擾嘉穎離合以䔿亦醴泉涌流而浩浩顯禎祥以曲成固觸物而兼造蓋亦明靈之所酬酢休徴之所偉兆旻旻率土遷善罔匱沭浴福應宅心醰命粹餘糧栖畝而弗收頌聲載路而泛溢河洛開奧符用出翩翩黃鳥銜書來訊人謀所尊鬼謀所秩劉宗委馭巽其神器窺玉䇿于金縢案圖録于石室考厯數之所在察五德之所蒞量寸旬㳙吉日陟中壇即帝位改正朔易服色繼絶世修廢職徽幟以變器械以革顯仁翌明藏用𤣥默菲言厚行陶化染學酬校篆籕篇章畢覿優賢著于揚厯匪蘖形于親戚本枝别幹蕃屏皇家勇若任城才若東阿抗旍則威噞驗秋霜摛翰則華縱春葩英哲雄豪佐命帝室相兼二八將猛四七赫赫震震開務有謐故令斯民都泰階之平可比屋而為一算祀有紀天祿有終傳業禪祚髙謝萬邦皇恩綽矣帝德冲矣讓其天下臣至公矣榮操行之獨得超百王之庸庸追亘卷領與結繩眷留重華而比蹤尊盧赫胥羲農有熊雖自以為道洪化以為隆世篤𤣥同奚遽不能與之踵武而齊其風是故料中其建國析其法度咨其考室議其舉厝復之而無斁之而有裕非疏糲之士所能精非鄙俚之言所能具至于山川之倬詭物産之魁殊或名奇而見稱或實異而可書生生之所常厚洵美之所不渝其中則有鴛鴦交谷虎澗龍山掘鯉之淀蓋節之淵􅖬􅖬精衛銜木償怨寃常山平干巨鹿河間列真非一往往出焉昌容練色犢配眉連𤣥俗無影木羽偶仙琴髙沈水而不濡時乘赤鯉而周旋師門使大以驗術故將去而林燔易陽壯容衛之稚質邯鄲屣步趙之鳴瑟真定之梨故安之栗醇酎中山流湎千日淇洹之筍信都之棗雍丘之粱清流之稻錦繡襄邑羅綺朝歌綿曠房子縑總清河若此之屬繁富夥够都之非可單䆒是以抑而未罄也蓋比物以錯辭述清閒麗雖選言以建章徒九復而遺㫖覽大易與春秋判殊隱而一致末上林之隤墻本前修以作系其軍容弗犯信其果毅糾華綏戎以戴公室元勳配管敬之績歌鍾析邦君之肆則魏絳之賢有令聞也閒居隘巷室邇心遐冨仁寵義職競弗羅千乘為之軾廬諸侯為之止戈則干木之德自解紛也貴非吾尊重土踰山親御監門謙謙同軒搦秦起趙威振八蕃則信陵之名若蘭芬也英辨榮枮能濟其厄位加將相窒隙之䇿四海齊鋒一口所敵則張儀張祿亦足云也榷惟庸蜀與鴝鵲同窠句猥吳與蛙黽同穴一自以為禽鳥一自以為魚鱉山阜積而崎嶇泉流迸集而咉咽隰壤瀐宅漏而沮洳林藪石留蓁而蕪穢窮岫泄雲日月恆翳土熇暑封疆障厲莾螫刺昆蟲毒噬漢罪流禦秦餘徙㡂而肖貌蕞陋禀質遳脆巷無杼首里罕耆耋或魋髻左言或鏤膚而鑽髮或明發而嬥殘歌或浮泳而卒歲風俗以韰不惈由為嫿人物以害為藝威儀所不攝憲章所綴重山之束厄因長川之裾勢距逺關以窺𨵦時髙樔而陛制薄戌綿幕無異蛛蝥之網弱卒瑣甲無異螳蜋之衛與先代而常然雖信險而勦絶揆既往之前跡即將來之後轍成都迄已傾覆建業則亦顛沛顧非纍卵於疊棊焉至觀形而懷怛權假日以餘榮比朝華而菴藹覽麥秀與黍離可作謡于吳㑹先生之言未卒吳蜀二客䂄然相顧􅭪然失所有靦瞢容神蘂形茹弛氣離坐㥏墨而謝曰僕黨清狂怵迫閩濮習蓼蟲之忘辛玩進退之惟谷非常寐而無覺不覩皇輿之軌躅過以泛剽之單慧厯執古之醇聽兼重悂以䝯繆偭辰光而罔定先生𤣥識深頌靡測得聞上德之至盛匪同憂於有聖抑若春霆發響而驚蟄飛競潜龍浮景而幽泉高鏡雖星有風雨之好人有異同之性庶覿蔀家與剝廬非蘇世而居正且夫寒谷豐黍吹律以暖之也昏情爽曙針規以顯之也雖明珠兼寸尺璧有盈曜車二六三傾五城未若申錫典章之為逺也亮曰日不雙麗世無兩帝天經地緯理有大歸安得齊給守其小辨也哉楊侃皇畿賦有賦者流欲馳名于當世思著詠于神州忽念前古深懷景慕誦二京于張衡覽兩都于班固於是輟卷意慙閣筆心伏讓而謂臣請書簡牘臣辭不獲已而謂之曰子讀二子之賦而知兩漢都邑之制宫殿之麗而未知大宋畿甸之美政化之始也豫幸得職採風謡官參儒雅千里之郊圻是巡八使之軺車斯假若夫大邑名城神臯沃野畫地可記濡毫可寫至于宫禁之深嚴豫未聞也都城之浩穰衆所覩也是故彼述其內豫言其外蓋萬分之舉一難盡述而備載昔者唐綱不振國鼎將遷俄梁室之革命啓俊都而應天既效法于左崤右隴亦取則于西澗東瀍大矣雄圖昭然聖謨謂陳留天下之衝要謂大梁海內之膏腴漢祖得之則齊楚之敵滅亡相繼咸就擒而即誅梁王守之則七國之師不敢西向盡翦馘而為俘實王氣之長在冝萬世而作都也莫不廣封溝設險固襄平割宋之美田戴邑裂曹之沃土滑分屬邑之二城陳命太康之萬户潁川之鄢陵扶溝榮陽之中牟陽武咸落于州籍升地圖于天府故得雄臨九州陋視三輔經營厯于五代法則垂于萬古皇宋之受命也太祖以神武獨斷太宗以聖文誕敷平江表破蜀都下南越來東吳北定并汾南并荆湖是故七國之雄軍諸侯之陪臣隨其王公與其士民小者十郡之衆大者百州之人莫不去其鄉黨率彼宗親盡徙家于上國何懷土之不聞甲第星羅比屋鱗次坊無廣巷市不通駟於是有出居王畿掛户懸籍興産植業出賦供役者矣豈比夫秦選户口於咸陽漢徙豪傑於陵邑魏將實于河南驅冀民而是入也余聖上之在東宫也尊以皇儲尹兹京邑視政之初民訟雲集莫不察之以情僞辨之以曲直發伏禁姦親剸繁劇既而桴鼓不鳴豪右斂迹吏不敢欺民用懷德若乃龍樓曉出奉法謹身教民以事父也親拜師傅降禮國儲教民以事師也公退則侍講在前出入則四賔是翼尚老尊學與民為則是時王畿之內易俗移風以至正南靣居域中由內及外化行令從是君王德惠素立而正教早崇也若乃鋭旅百營髙城干雉孫武教陳吳起撫士其齊如林其猛如虎手擊利劒足張强弩躍馬奪槊投石拔距入則訓練出無征戰身間賞厚家有餘羡是故擁强兵衛近甸如大郡雄藩為屏為翰者且有九家海縈畿帶甸千倉是興萬天設二渠曰蔡曰汴通江㑹庾是建杜預主計劉晏司漕何貢何輸吳粳楚稻月致百萬猶責其少漢之太倉積粟紅腐使彼粒而計之未及我斗量之數成王之庾萬箱以供未若我千艘往來運江淮而無窮是故備九年之儲充六軍之給當津處要山積雲入者復有五邑星簿既資髙尉若乃惣戎者貴領専城宰邑者上應列亦秩清率兵守戌者五嶺城隍之外逰徼四統騎分巡者兩路桓入城是警布桓是護牧馬爭嘶廄空萬櫪野郊原膴膴春草萋萋邊烽不警散千蹄陂間牧南空原去如霧沙平走西連地廣馬多古一飲空川一齕散來若雲未有焉若乃任土出於民心獻芹比于古俗園茄早實時果先熟瓜重南門笋冝修竹鬻于市兮利既兼倍進於君兮恩必霑沭時或戴勝降桑螻蟈未鳴野人登麥以先至蠶婦貢絲而已成别有襄陵之桃楊夏之柿朱櫻冝於谷林丹杏出於尉池其或陽鄉千樹之梨扶藥千樹之粟比封千户之侯亦何讓於昔日鹹壤冝北鄉之羊野蓑美東邑之豕魚鱉鳬鴈之盛西有陂兮萬頃菱芡蓮藕之美東㳂堤兮百里其或仲冬之月禮尚進鮮介麋素出于逢澤狡兔復多於梁園乃命萊田於虞人選徒于司馬四校畢陳六飛夙駕任千乘萬騎之馳騁滿四通五達之郊野西或過於圃園之藪東或出於平臺之下乃有孟賁之徒鳥穫之類䄠禓而來叱咤而至摶虎兕擊熊豕𤣥豹逆曳白狐生致復有負羽從獵之人控弦伏獸之士落孤鴈於馬首貫雙鵰於雲裏然猶示之以三驅之仁寬之以一靣之網不使獸殫於下禽盡於上何長楊之獵自謂于禽多雲夢之畋敢誇于地廣哉圖書載詳境土斯見開封則漢志之名邑今二赤之首冠祥符則天書之降年易新名于舊縣㥎秸之入斯為近甸若乃百萬衆之分營十二市之環城囂然朝夕異彼郊坰其東則有汴水之陽冝春之苑向日而亭臺最麗迎郊而氣候先暖鶯囀何早花開不晚瞻太一之清宫壯先朝之命工構宇煙霞之外出俗囂塵之中效仙人之樓居慕老氏之𤣥風青靑道邊千畝何田端拱之初藉于此馬黛耜一執青史千年登蓼隄以東望見髙臺之百尺居道之南在岡之北下有廣場可馳可逐我皇帝初即寶位大閲軍旅親乘戎輅習戰于此士馬秋徑甲胄晨整止憑軾以將觀衆無譁而是聽列八陳之形申三令之語肅將帥嚴部伍頗牧擾之以方略韓彭進之以旗鼓失軍容者戮以狥衆有勇敢者賞而裂土彼上林之馳射驪山之講武豈可同日而語哉其南則有崇崇清壇肅肅齊宫卜是吉土龜從筮從永奉禋祀郊見昊穹燔柴展禮萬世無窮别有氣象仙島園名玉津珍果獻夏奇花進春百亭千榭林間水濵珍禽貢兮何方怪獸來兮何鄉郊藪既樂山林是忘則有麒麟含仁騶虞知義神羊一角之祥靈犀三蹄之瑞狡猊來於天竺馴象貢於交趾孔雀翡翠白鷴素雉懷籠暮歸呼侣曉去何毛羽之多奇罄竹素而莫紀也忽斷苑墻又連池禦介族千狀沙禽萬類盡遊泳而往來或浮沉而出處栁籠隂于四􅜌蓮飄香于十里屈曲溝畎髙低稻畦越卒執手吳牛行泥霜早刈速春寒種遲舂紅粳而花綻簸素粒而雪飛何江南之野景來輦下以如移雪擁冬苗雨滋夏穗當新麥以時薦故清蹕而親至輦從千官郊陳萬騎既觀穫以云罷亦宴犒而後已其西則有池鑿金明波寒氷殿鷁首萬艘而􅐦浪虹橋一道而通輦太液元濫湯之深靈沼有潢汙之淺時或薰風時扇晴瀾始暖命樓船之將軍習昆明之水戰天子乃駐翠華開廣宴憑欄檻於中流瞰渺茫于四靣俄而旗影霞爛陳形星羅萬棹如風而倐去千鼓似雷而忽過則有官名佽飛將號伏波驤江中之龍避船下之戈黃頭既衆文身之卒且多類虬龍而似蛟蜃駭鯨鯢而走黿鼉勢震動于山嶽聲沸騰于江河别有浮泛傀儡之戲雕刻魚龍之質應樂鼓舞隨波出沒鑾輿臨賞以盡日士庶縱觀而踰月波池之南有苑何大既瓊林而是名亦玉輦而是待其或桂折天庭花開鳳城則必有聞喜之新宴掩杏園之舊名於是連鑣上苑列席廣庭蓋我朝之盛事為士流之殊榮一𣲖如飛通漕架虛越廣汴湍流之上轉皇城西北之隅貫都注御溝之口轉漕通廣濟之渠京索導源而于彼金水名河而在兹其北則瑞聖新名含芳舊苑四方異花於是乎見百囀好鳥於是乎聞十洲德景三島分春延廄之設是名天駟伐大宛以新求涉渥窪而逺致羣驅八騎隊數萬驥雖挽粟之千車乃嘗秣之一費彼沙臺之崔嵬聳佛剎之千尺岡阜連延於西南原田平坦於東北何沙海之飛揚匆到此而止息莫不地多賢士代出異人何干旄之孑孑向浚郊而雲臻雖梁多于長者非安國而不聞遇信陵之祠宇想英風而若存何侯嬴之白首尚抱關于夷門遇公子之好賢匆枉駕而咨詢既同載而過市謁隱屠而駐輪果嘉謀之斯得救邯鄲而義仲奪晉鄙之十萬終自將而卻秦設守冢而奉祀值漢皇之東巡若乃過陳留之故邑訪地名之所因蓋二留之分别彼彭城而此陳昔赤帝之起義㑹子房而于此始錫賢于上天終受封于兹地既萬户以建侯亦千年而崇祀千屯北縣之郛郭三月南河之鄽市何飛梁之新遷患橫舟之觸柱今之雍丘古曰杞國民厚風俗土繁貨殖縣之西郊山曰谷林其或花迎野望煙禁春深景當妍麗俗重登臨移市景日傾城賞心幄幕蔽野軒蓋成隂暮而忘歸樂不絶音既同歡於萬室罔惜費于千金厥篚織文出于襄邑池濯錦以為名蜀有江而焉及復有咸平大縣我宋新建因紀年以命號詔將作而營繕公宇之制甲于畿甸中有大川通闤𢃄闠貫都邑而北來走江湖而南會何客棹之常喧聚茶商而斯在千舸朝空萬車夕載西出玉關北越紫塞徴尉氏之名本大夫之邑蓋鄭國之上曰俾獄官而世襲何彼樂郊今為畿地爰有仁木應乎嘉瑞二棠合生雙榆連理槐獨秀而通枝木異類而同氣良宰畫圖而來聞大尹飛章而奏異莫不召虎殿之宿儒集麟閣之名士驗彼祥經考乎信史表六合之一家而帝德之光被也加以地多藪澤利有蒲魚晴澗曜皛陂之色山水觀惠民之渠乃有楫師炭商交易往復素衣化緇漆身同色行舟則夏瞻雲雨售貨則冬禱雪霜經宋樓而關征既薄厯朱曲而市稅有常潺潺洎溝渙渙洧水入鄢陵而碧截原田過扶亭而清映閭里珍貨奔馬欄之道豪俠聚建雄之市彼東昏之舊城易美號于新室似興廢之有時而圖䜟之預出何以明而代昏符作畿于聖日考城之人舊俗剛毅鄉出勇夫里多壯士椎埋為姦任俠尚氣睚眦必報杯間刃起今為畿民禮束化被暴虎之徒聞義則畏南徂太康淮陽甚邇地宜琅玕家有蒼翠城過兩扶溝踰二備地既成于上田人不趍于末利桑成隂而春繁棗結實而秋美問中年之耆民歎魯恭之仁宰何三異之善政有千年之遺愛遇我后之盛明西朝拜于園陵瞻路隅之靈廟想前史之嘉名祭以上公之禮爵以太師之榮若夫八澤九溝勝以二池見斗三固雙注吸周流源野表界境土宿萬遙觀門之驚浪以橫來絶長隄而可懼其始也患彼決溢利其填閼溉萬頃之陂澤變千古之舄鹵盡若膏腴咸通耒秬有若決漳灌鄴旁之田鑿涇沃關內之土然後疏導入白溝之流㑹同為漕渠之助彼梁固之在東亦派分于波勢常沿流有一舍之遙則水無寸差之異何一啓而一閉若合于符契始注陂而雷聲終入渠而駟逝散濁浪以澄沙廣良田而濟世桓陽武以北遇涉博浪之長沙岡斷續以千疊塵飛楊而四遮人迷途而莫辨鳥投樹以何賖䇿不進兮我馬輪欲埋兮何車過户牖之名卿乃曲逆之舊里何分社之稱平已宰國而有志經計相之里中思張蒼之善宦屈柱史以事秦榮列侯而佐漢宜二賢之靈祠厯千古而輝煥西望河流經帶二邑髙岸山立回灣箭急蟻壤夏漏衝決莫救基根相扶萬柳千榆與梢畚土常設備禦建營置卒轉粟實庾堅彼金堤鑒乎前古秋防夏捍守以朝暮冬計春修設均編户岸艤連航兵屯兩渡阻浩浩之波抳憧憧之路北棹謳晨南帆落暮惟好是防非利是務右倚太行橫絶雲霧夫雍阻仁崤之險洛慿九河之固方之于是彼若平路過濮水之長渠經封國之舊域寥落兮桐牢之亭湮沒兮黃池之迹何昔也明誓重重諸侯于此而㑹同今也京邑翼翼四方于此以取則涉長垣之塗厯古衛之境城有婦姑之名人恭孝慈之行加孔子之入蒲先宰豫以觀政美大家之東征復農田而發運若乃南瞻潘里北指蘭岡樹新文于二碑易美號于兩鄉因東封之行幸感瑞應之非常忽有鳴唳降于穹蒼丹頂未辨于煙際玉羽已穿于仗旁九其數象君之體陽再而降符常運之重光何德動于上天而道盛于前王也如是哉客既聞臣之說而知漢以宫室壯麗威四夷宋以畿甸風化正萬國彼尚侈而務奢此歌道而詠德乃曰使孟堅可作平子再生讀子之賦不敢復談于漢京詩集帝王居壯哉丨丨丨佳麗殊百城曹植帝王州江南佳麗地金陵丨丨丨逶迤帶緑水迢遞起朱樓飛甍夾馳道垂楊映御溝凝茄翼髙蓋叠鼓送華輈獻納靈臺表功名良可收謝元暉鼓吹曲矜財雄五都丨丨丨三川養聲利百金不市死明經有高位京城十二衢飛甍各鱗次仕子彯華纓逰客竦輕轡明星晨未稀軒蓋已雲至賔御紛颯㳫鞍馬光照地寒暑在一時繁華及春媚君平獨寂寞身世雨相棄鮑明逺詠史塞康莊歌吹喧萬井車馬丨丨丨韋應物壯帝居山河丨丨丨陳后主分魏闕建都丨丨丨杜定鼎地雄都丨丨丨勢據萬國尊河嶽出雲雨土圭酌乾坤帝宅夾清洛丹霞捧朝暾葱蘢瑶臺榭窈窕金闕門韋應物望洛開繡陌長安丨丨丨陳暄龍虎盤地即帝王宅山為丨丨丨李白金陵鳳凰遊鳳凰臺上丨丨丨鳳去臺空江自流同上春色滿丨丨丨皇州杜天文照雄都元壯麗望幸歘威神地利西通蜀丨丨北丨秦杜王氣中天京丨丨丨歐陽集朱家曲車馬九衢都門收宿霧佳氣鬱葱葱曉日寒川上青山白霧中樓臺萬瓦合丨丨丨丨通恨乏登高賦徒知京邑雄歐集徽安門曉望古今合璧事類備要别集卷一
