body:
  text: 古今合璧事類備要外集卷六十一宋謝維新撰財貨門金附藥金膽銅銀鐵水銀錫銅鉛財貨源流金者金銀銅鐵鉛錫之總名按五行地四生金是也惟黃者獨為之長久薶不為之生衣百煉不輕於從革不違西方之行獨以金名之彼銀白金次之也銅赤金又次之也鐵黑金鉛青金錫亦白金鑞也又次之也藥金乃是水銀及銅鐵用藥煮成膽銅乃以鐵片入膽水浸之而成水銀乃是採山石中粗次朱砂作罏置砂於中下承以水上覆以盎器外加以火煆飬則煙飛於上水銀留於下皆非造化自然也然此皆物寶也待人而後寶人或不寶之亦不過土石之比爾事類從革金曰丨丨注金可以改更作辛從革丨丨注金之氣味並洪範水中金之所生處處皆有梁益寧三州出丨沙丨作屑謂之生金石中建平晉安有金沙出丨丨燒鎔鼓鑄為鍋雖被火猶須更煉又陳藏器云常見人取金掘地深丈餘有粉子石石皆一頭黑焦下有金大者如指小猶麻豆色如桑黃咬時極軟即是真金夫匠多竊而吞之又饒信南劍汀州出金處採得金亦多品或有若山石狀者或有若米豆者若此類未經火皆可為生金並本草極多品諸州出金丨丨丨蔡州出瓜子金雲南出顆塊金在山石間採之黔南遂府吉州水中並産麩金山海經二十件凡金有二十件雄黃金雌黃金曽青金硫黃金土中金生鐵金生銅金偷石金砂子金土碌砂子金金母砂子金白錫金黑鉛金朱砂金已上十五件惟祗有還丹金水中金瓜子金青麩金草砂金等五件是真金餘皆是假丹房鏡源色深赤顆塊金即穴山或至百十尺見作金石其色褐一頭如火燒黑之狀此定見金也其金丨丨丨黃色淺黃麩金即在江沙水中淘汰而得其丨丨丨此等皆生金得之皆當銷錬麩金耗折少塊金銷折多毒蛇屎嶺南人云生金是丨丨丨中採之鵝鴨屎廣州洽崖縣有金池彼中居人忽有養丨丨常於丨中見麩金片遂多飬收屎淘之日得一兩或半兩因至富嶺表録高麗金丨丨扶南及西域外國丨已成器皆煉熟可服本草大食金丨丨國出丨最多凡是貨易並記出金錢性多寒生者有毒廣州揚州貢丨丨厥丨惟金三品書麗水生荆南丨丨之中丨金韓子山有薤丨上丨丨下有金酉陽雜俎水多麩麗丨丨金丨唐南蠻傳華山生李林甫謂李適之曰丨丨丨金孔氏帖長川産丨丨諸山往往丨金或披砂得之唐南蠻傳踴躍不祥大冶鑄金丨丨曰我且必為鏌鎁大冶必以為丨丨之金莊大宗師治鍛為器金在礦善丨丨而為器唐魏徴傳琢石取金西域晉河出金精丨丨丨丨孔氏帖披沙揀金丨丨丨丨往往見寶白氏帖金有三等丨丨丨丨黃金為上又造金錫為白金平淮書金有六齊丨丨丨丨注目和金之品數周禮冬官金浮於水麗水水名在益州永昌郡中有丨如糠丨出於其中言此金勝於他金也金鳴於山少昊時丨丨丨丨拾遺藏金嶄巖舜丨丨於丨丨之山以塞淫邪之路新語貢金九牧昔夏之方有德也丨丨丨丨鑄鼎象物左傳方寸而斤周黃金丨丨丨重一丨漢食貨改制以鎰秦幣黃金一寸重一斤以鎰為名注二十兩為鎰丨周之丨更丨丨復周之制漢興黃金一斤注丨丨丨丨以斤名金並食貨志改周之制見前虹飲吐金晉陵薛願有丨丨其釡翕響便竭乃丨丨滿釡異苑虹化為金孔子修春秋製孝經既成孔子齊戒向北斗星辰而拜告備於天乃有赤丨見自上而下丨丨黃丨有刻文孔子受而跪讀之搜神記兼金不受齊王餽孟子丨丨一百而丨丨於宋餽七十鎰而受孟子千金不受楚襄王遣使持丨丨聘莊子丨丨韓詩櫟陽雨金秦獻公十八年丨丨丨丨公自以為金瑞太山見金漢武帝詔曰往者丨丨丨丨又有白麟神馬之瑞以黃金鑄麟趾䮍蹄以協瑞焉本紀物化為金昆田珍丨丨丨黃丨武帝祠首山本紀札變為金宣帝河東立廟告祠有一人騎馬持一尺札賜將作丞曰汝績克成賜金一斤忽不見丨丨丨丨漢武故事破石得金張皓得飛石丨之得金印毁屋得金後漢陳重字仲翁常濟人死罪人密投金於承塵以報重恩重不知後丨丨丨丨訪金主已死乃將金送縣如粟不懷後漢張奐為安定屬國人遺金以酒酬曰使金丨丨丨以入丨本傳與土同價齊高祖曰使我臨天下十年當使黃金丨丨丨丨本紀牛能便金秦惠王欲伐蜀乃刻五石牛置金其後蜀人見之以為丨丨丨丨詳見牛門鳥常吐金魏明帝時昆明國貢嗽金丨丨丨丨屑如粟宫人以金飾叉謂之辟寒金詳見水精注贖苧得金梁甄彬嘗以一束苧就長沙寺庫質錢後丨丨還於苧束中丨五兩丨彬送還寺庫僧驚以金半酬之彬堅不受曰五月披羊裘而負薪豈拾遺金者耶鋤菜擲金管寧華歆丨丨見金管揮鋤與瓦石不異華捉而丨去之賢夫藏金晉隗紹善易臨終謂其妻曰後大荒勿賣宅候有詔使姓龔負吾金賫此書板往取之云云丨丨丨丨其妻掘之果得金詳見前集占卜門埋兒得金郭巨妻産男巨念與兒妨事親一也老人得食喜分男孫减􅍧二也乃於野鑿地欲丨丨丨石蓋下有丨一釡中有丹書鐵劵曰孝子郭巨黃金一釜用以錫汝請罷官采元帝時貢禹言宜罷采珠玊金銀鑄錢之官毋以為幣議者不可食貨志詔任人採唐德宗丨曰朕聞王者不寶遠物所寶惟賢雍州所奏金坑誠為潤國誘人於利非朕素懷方以不貧為寶惟德其物豈尚兹難得之貨生其可欲之心邪其金坑丨丨丨斸官不得占本紀諛墓得金劉義因持韓愈金數斤去云此丨丨中人丨耳不若與劉君為壽愈不能止啓墓出金李勉少貧俠客梁宋與諸生共逆旅諸生疾且死出白金曰左右無知者幸君以此為葬餘則君自取之勉許之既葬密置餘金棺下後其家謁勉共丨丨丨丨付之贈金一車唐尉遲敬德隱太子以書招之丨丨皿丨丨辭曰其敢當賜王曰公之心如山嶽雖積金至斗豈能移之埋金九里雲陽段氏值豐年則盡取金錢丨之九里皆滿曰有得意日遂無用金豐年録買蕨化金王鯨逢賣蕨嫗黃金破結有饑色憫之乃以千文丨丨謝而去及歸蒸於烏豆盡丨成黃丨塗紙成金陳允升好道危全諷有姻禮市黃金郡中少不足用呵責其下允升曰無怒金能為之取厚紙以藥丨之投火中皆成金因以足用孔氏帖黃衣不見陳尚書言某昔在鄉里好為詩里人謂之陳舍人比樂天也性疏簡喜賔客嘗有二道比一黃衣一白衣詣其家求宿舍之㕔事夜聞二客床上鍧然有聲久之若無人秉燭視之見白衣下乃銀人也丨丨丨復丨家遂富稽神録赤幘是誰魏郡張本富買宅與陳應應舉家疾病賣於何文文先獨持大刀暮入北堂梁上一更中有一人長丈餘高冠丨丨呼曰細腰細腰應喏何以有人氣答無便去文因呼細腰問向赤衣冠丨丨答曰金也在西壁下問君是誰答云我杵也今在竈下文掘得金三百斤燒去杵由此大富宅遂清寧黃石皆化侯遹丨丨外見丨丨大如斗收之皆化為金遹貨錢百萬市美妾十餘人大第良田甚多忽一老翁負笈曰吾來求君償債將我金去不記憶乎盡取遹妓妾投於笈亦不覺窄須臾已失所在後數年見老翁携妓游行問之皆笑不言逼之又失所在幽怪録此物必佳本朝太祖因出忽幸趙普第時吳越王俶方遣使遺趙普書及海物十瓶列廡下㑹車駕卒至普亟出迎弗及屏也上顧見問何物普以實對上曰丨海丨丨丨即命啓之皆滿貯瓜子金也普惶恐頓首謝曰臣未發書實不知此若知此當奏聞而却之上笑曰但受之無害彼謂國家事皆由汝書生耳固命普謝而受之長編開寶四年近代難得太宗問杜鎬西漢賜豫悉用黃金丨丨為丨丨之貨也對曰多由是時佛事未興金價甚賤也三朝聖政録可貴惟金太宗曰玉不離石犀不離角丨丨者丨丨創為金夸以賜羣臣詳見腰帶門置場發賣金銀坑冶者湖廣閩浙皆有之湖南廣東江東西金坑湖南廣東西江東西浙東福建銀坑祖宗時除砂石中所産黃金外歲貢銀額至一千八百六十餘兩渡江後停閉金坑一百四十二銀坑八十四紹興七年詔江浙金銀坑冶並依熙豐法召百姓採取自備物料烹煉十分為率官收二分然民間得不償本州縣多責取於民以備上供三十年用提㸃官李植言更不立額饒州舊貢黃金千兩孝宗詔損三之一今諸道止供銀皆丨丨丨丨蜀中銀每法枰一兩用本錢六引而行在左藏庫折交才直三千三百然民間之直又不滿三千高宗嘗諭輔臣以非劉晏懋遷之術欲更革之户部以鐵錢折半為詞而止其實吳蜀錢幣不能相通捨銀帛無以致遠故莫如之何朝野雜記藥金言神仙術淮南王安武帝時招致方術士有中篇丨丨丨黃白之丨典鑄作事劉向父德武帝時治淮南獄得其書向讀以為竒宣帝獻之言黃金可成上令丨尚方丨丨丨費甚多方不驗下吏本傳劉禕試驗孟說遷鳯閣舍人它日至丨丨之家見賜金曰此藥金也燒之火有五色丨之丨全諷足用陳允升事見前塗紙成金注求彔成金本朝張永德字抱一并州人五代為潞帥淳化二年改并州初寓睢陽有書生鄰居卧病永德療之獲愈生一日就永德丨丨五兩即置鼎中煮丨中金永德懇求藥法生曰君當貴吾不吝此慮損君福鍛鐵成金銀工畢升祥符中嘗在禁為方士王捷鍛金以鐵為金凡百餘兩為一餅輻解為八假謂之鴉觜金初自冶中出色尚黑由是言之如此之類乃是水銀及鐵用藥製成非造化所成功治焉烏得不差殊晉郭璞金銀贊惟金三品揚越作貢五材之珍是謂國用唐柳宗元披沙揀金賦沙之為物兮視汙若浮金之為寶兮恥居下流沈其質兮五才或闕耀其光兮六府以修然則抱成器之珍必將有待當慎擇之日則又何求配圭璋而取貴豈滓泥而為儔披而擇之斯焉見寶蕩浸淫而顧盼指炫熀而探討動以愈出幽以即明涅而不緇既堅且好潜雖伏矣獲則取之翻混混之濁質見熠熠之殊􅐾久暗未彰固以將君是望先迷後得孰謂棄豫如遺其隱也則雜昏昏淪浩浩晦英姿兮自保和光同塵兮合於至道其遇也則散奕奕動融融煥美質乎其中明道若昧兮契彼𤣥同儻俯拾而不棄諒致美於無窮欲蓋而彰將炯然而見素不索何獲遂昭然而發蒙觀其振拔汙塗積以錙銖碎清光而競出耀真質而特殊錐處囊而纎光乍比劍拭土而異彩相符用之則行斯為美矣求而必得不亦悅乎豈獨媚旭日以晶熒帶長川之清淺皎如珠吐疑剖蚌之乍分粲若星繁似流雲之初卷是以周德思比而岐昌即詠陸文可侔而昭明是選若然者可以議披沙之所託明揀金之所裁良工何逺善價爰來拂以增光寧謝滿贏之學汰之愈朗詎慙擲地之才客有希採掇於求寶之際庶斯文之在哉銀一流銀重八兩為丨丨爾雅三品見後貢金注山有葱丨上丨丨下有銀酉陽雜俎山出霧銀丨常丨素丨白帖山有燭鍾丨之寶丨銀丨謂有精光如燭爾雅美者錼白金謂之銀其丨丨謂之丨爾雅貢惟金揚州荆州厥丨丨丨三品注金銀銅厥貢銀禹貢梁州丨丨丨書其利銀周禮荆州丨丨丨大司馬職方造銀幣漢建元中又丨丨錫白金其文龍直三千其文馬直五百其文龜直三百盜鑄諸金錢罪死而犯者不可勝數注雜銀錫為白金罷銀官元帝時貢禹言宜丨采珠玉金丨鑄錢之丨毋復以為幣除其販賣租銖之律議者以為交易待錢布帛不可尺寸分裂禹議遂寢食貨志金三等漢有司言曰古者丨有丨丨黃金為上白金為中赤金為下食貨志寶六名王莽即真凡丨貨五物丨丨注金銀龜貝錢布同前以銀為貨蕭梁初唯京師及三吳荆郢江湘梁益用錢其餘州郡則雜以榖帛交易交廣之域丨金丨丨丨隋志採銀以稅唐掌治署令一人丞二人掌範鎔金銀銅鐵及塗飾琉璃玉作銅鐵人得丨而官收以稅百官志規我以我權萬紀為侍御史即奏言宣饒郡可鑿山冶銀歲取數百萬帝責曰公不推賢進善乃丨丨丨丨斥使還第唐本傳過此當掠韋元方外兄裴璞卒元方見武吏躍馬而來乃璞也言曰吾為隴右三州掠剩使生人一飲一酌無非前定況財寶陰司所籍其獲有限過數則陰吏狀來乃掠之子之逢吾亦是前定合得白金二斤丨丨則丨丨故不厚也人生有命不參差以道靜觀無復躁撓勉之哉幽怪録在此已久壽州大將趙璘本州有凶宅人莫敢居璘生居之獨據中室夜有物推床曰我等丨丨丨丨為君所壓甚不快君可速去鬼乃相與移其床於庭下璘亦安寢明日於堂上置床處掘得銀一窖宅遂安稽神録柱石皆銀饒州鄧公場採銀之所山有澗水出山底天祐末銀夫十餘人傍澗鑿地道入數步空闊明朗山頂有穴如天忩日光下照樓閣回繞丨丨丨白丨也采銀者復出持斧而入將斫取之俄而山摧入者盡壓死頃之流血自澗出數日不絶自是無敢下者同前雪冷為銀耿先生有姿色明道術拘制鬼魅保大中召入宫常被碧霞帔手如鳥瓜自稱北大先生能以丨為銀取雪實之削如銀鋌投熾炭中及冷爛然為鋌銀先生後有孕一日謂上曰此夕當産中夜風雷明旦腹已消曰昨夜生子已為神物持去後以疾終異人録白衣求宿詳見前金注術者授方見後水銀注家奴盜銀張文定公齊賢為江南漕日丨宴一丨竊銀器數事于懷中公熟視不問後為宰相厮役多得班行此奴竟不沾祿乘間泣告公曰爾憶江南丨吾丨乎我懷之三十年不以告人汝亦不知也並東軒雜録定州出銀至道二年有司言丨丨丨丨􅑭請置官掌其事上曰地不愛寶當與衆庶共之不許長編水銀水銀泉秦始皇葬驪山起陵高五十丈以丨丨為丨明月珠為日月三輔故事水銀池李蔚咸通十四年春詔迎佛骨京師高資相與集大衝注丨丨為丨孔氏帖得見無恨夏侯嘉正為館職平生好燒銀常曰吾丨丨水銀銀一錢知制誥一日丨丨矣以方并授范文正公仲淹少極貧悴嘗與一術者游病篤告文正曰吾有煉水銀法兒幼不足以付今丨丨授子丨白銀一斤內文正懷中後為諫官術者之子已長呼而告之取其方白金丨之封識宛然銅山有薑丨上丨丨下有銅錫酉陽雜俎物至精凡律度量衡用銅者所以同天下齊風俗也銅為丨丨丨不為燥濕寒暑變其節不為風雨霜露改其形有似乎士君子之行是以用銅也漢書幣為下銅錢識曰半兩重如其文為下丨史平凖書荆州銅丨丨厥貢金三品注金銀丨又荆山其陽多赤金山海經丹陽銅古者金有三品赤金為下注丨丨丨漢食貨志若耶銅丨丨涸而出丨歐冶因為純鈎之體越絶書賜之銅鄭伯朝楚楚子丨丨金既而悔之與之盟曰無以鑄兵使以鑄三鍾注楚金利故古者以丨為兵左僖公䭅以銅秦始皇葬驪山其內丨丨丨賈山至言豫章銅山吳王濞事見後錢注嚴道銅山鄧通事見後錢注探懷得銅扶風張氏之先為郡功曹晨起當朝有鳩從盛塵上飛下几前功曹曰鳩何來為禍飛上盛塵為福飛入我懷開懷待之飛入懷中探得銅鈎帶之官至太守九卿有蜀客至長安私賂張氏婢婢賣鈎與客客喪禍懼而却還張氏得鈎復為二千石後因失鈎張氏遂衰三輔决鈎鑿井得銅龎儉亡其父隨母流宕後居廬里丨丨丨丨遂富云云時人曰廬里龎公丨丨丨丨買奴得翁風俗通詳見奴𨽻門以銅為鑑唐太宗曰朕有三鑑云云丨丨丨丨可正衣冠朕嘗寶此三鑑今一鑑亡矣通鑑取銅和酒定州人崔務墜馬折足醫者令丨丨末丨丨服之遂痊平及亡後十餘年改葬視其脛骨折處有銅束之朝野僉載紅崖冶鑄韓洄上言今商州丨丨丨産銅而洛源監久廢請鑿山取銅即治舊監置十爐丨之歲得錢十萬二千緍孔氏帖滁州鏟鑿韓思復遷丨丨刺史州有銅官人丨丨尤若思復遷賈他郡費省尤多同上銅像鑄錢柳仲郢拜京兆尹㑹廢浮屠法盡壞丨丨丨丨仲郢為鑄錢使吏請以字識錢者不答既淮南鑄㑹昌字久之僧反取為鍾鈸本傳又周世宗是時中國乏錢乃詔悉毁天下丨佛丨以丨丨嘗曰吾聞佛說以身世為妄以利人為急使其真身尚在茍利於世猶欲割截況此丨丨豈其所惜哉由是羣臣皆不敢言五代史銅神激水衡陽唐安縣東有略塘塘有丨丨往往銅聲丨丨為變緑作銅腥魚盡死酉陽雜俎高麗地産丨丨丨丨銀銅周世宗時遣尚書水部員外郎韓彥卿以帛數十匹市銅于丨丨以鑄錢又丨丨貢銅五萬斤孔氏帖天下嵗采凡銀銅鹽鐵之冶一百六十八所元和丨丨丨丨銅二十六萬六千斤及宣宗嵗率銅六十五萬六千斤食貨志江南多出張齊賢初除轉運使辭日太宗皇帝曰丨丨丨丨銅為朕密經營之齊賢乃訪得江南承旨丁釗歷指饒信處州山谷産銅鉛錫之所又求前代鑄法惟饒州永平監用唐元錢料堅實可久由是定取其法嵗鑄三十萬貫凡用銅八十五萬斤鉛三十六萬斤錫十六萬斤齊賢即詣闕面陳其事可之然唐永平錢法肉好周郭精妙齊賢所鑄雖嵗增數倍而稍為磊惡矣長編太平興國八年天下嵗産本朝銅坑冶者閩蜀湖廣江淮浙路皆有之祖宗時丨丨丨丨七百五萬斤有奇渡江後其數日減至紹興末江東西福建廣西湖南潼川府利路十四州嵗産銅二十六萬三千一百六十九斤九兩信州膽銅九萬六千五百斤饒州膽銅二萬三千四百斤韶州膽銅八萬八千九百斤黃銅二百斤潭州膽銅三千四百斤建寧府黃銅八千三百斤連州黃銅二千八百斤池州膽銅四百斤汀州黃銅六十斤卲武軍黃銅二百斤潼州府黃銅六千斤利州黃銅七千斤興州黃銅一千六百斤南劍州黃銅三千六百斤視祖額才及四釐皆弱東南鐵悉輸岑水鉛山永興興利四場浸銅為泉司之用舊婺州銅坑廢凡銅場十四云朝野雜記鳯州銅䤵至道二年有司言丨丨出丨丨請置官掌其事上曰