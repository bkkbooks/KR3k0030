body:
  text: 古今合璧事類備要别集卷五十九宋謝維新撰蔬門蔬格物總論蔬菜也謂草之可食者也名色不可以一言盡或者亦以與百穀之數謂其可以助穀云事類飯蔬孔子曰丨丨食飲水曲肱而枕之樂亦在其中矣擇菜孔子窮於陳蔡之間顏回丨丨莊子常蔬食後漢宣秉丨丨丨瓦器漢書食菜羹崔瑗愛士好賔客盛修肴膳彈極滋味不問餘産居常丨丨丨而已同上挑菜傷指范宣丨丨丨丨大啼曰身體髮膚不敢毁傷故啼事文類聚食菜致飽步隲避亂江東與廣陵衛旌善相俱以種瓜自給會稽焦征羌郡之豪族隲與旌寄食其地懼為所侵乃共修刺奉瓜以獻征羌內卧駐之移時旌欲去隲止之曰本所以來畏其強也今舍去欲以為高秪怨耳良久征羌開牖見之隱几坐帳中設席置地坐隲旌牖外旌愈耻之隲辭色自若征羌身自享大案殽膳重沓而小盤飯與隲旌惟菜茹而已旌不能食隲極飱致飽乃辭出旌怒隲曰能忍此乎隲曰吾等貧賤是以主人以貧賤遇之固其宜也當何所耻吳志燕惟下菜桓溫性儉每丨丨丨七莫柈丨果而已本傳食不過菜吳隱之為廣州清藻愈厲常丨丨丨丨及乾魚而已天茁此徒宋宇種蔬三十品時雨之後按行園圃曰丨丨丨丨助豫鼎爼豫章記日供常膳梁武帝太官丨丨丨丨惟以菜蔬本傳惟食老葉齊江泌性仁孝食葉不食心以其生意丨丨丨丨而已本傳同食苦蕒劉崇龜以清儉自居嘗召同列丨丨丨北夢瑣録設菜數葅盧懷慎為黃門監兼吏部尚書卧病既久宋璟從願嘗相與訪焉懷慎卧於弊簣門無簾箔常器重璟友從願見之甚喜命丨食有蒸豆兩甌丨丨丨而已太平廣記食蔬一盤河陽軍節度烏公為節度之三月求士於從事之賢者有薦石先生者公曰先生何如曰先生居嵩邙瀍榖之間冬一裘夏一葛朝夕飯一盂蔬一盤韓退之送石洪序或如蓮花菜品中蕪菁菘芥之類遇旱其標多結成花丨丨丨丨或作龍蛇之形此常性無足怪者熙寧中李賔客及之知潤州園中菜花悉成荷花仍各有一佛坐于花中形如雕刻莫知其數暴乾之其相依然或云李氏之家奉佛甚謹故有此異筆談咬得菜根汪信民常言人常丨丨丨丨則百事可做胡康侯聞之擊節歎賞聞見録陳去非玊延賦吾聞陽公之田不墾不耕爰播盈斗可獲連城資隂陽之淑氣孕天地之至精蜿蜒赤埴之腴煌扈白虹之英驚山木之潤發冒朝采之餘榮逮百嘉之澤盡候此玊之豐成王公大人方以不貪為寶辭秦王而陋楚珩雖三獻其奚售乃舉贄於老生老生囊中之法未試腹內之雷久鳴搴石鼎以自濯搘豕腹之彭亨春江浩其波濤逺壑颯以松聲俄白雲之漲谷亂雙眼於晦明擅人間之三絶色味勝而香清捧杯盂而笑領映户牖之新晴斥去懶殘之芋盡棄接輿之菁收竒勳於景刻已未落而體輕凌厲八仙掃除三彭見蓬萊之夷路接閶闔於初程彼徇華之大夫含三生之伯酲汙之以蜂蜜辱之以羊羹合堂逸少之炙同傳孝義之鯖喚超然之至味乃陸沉於聾盲豈皆能於我遇亦或卿而或烹起援筆以三呌馳蛇蚓以縱橫吾何與大夫之迷疾蓋以慰此玉之不平也洪舜俞老圃賦嗟余生之刺乖甘偭密而即疏痛虺隤其倦遊羸盤薄乎間居老既怯於山橋窮莫備乎澤車坐玩相牛之經間抄種樹之書五十步兮野園數百步兮破廬一秃翁以自樂羣癡兒而共鉏氷解寒祛霏開日舒濯濯而畦瀏瀏我渠稚角怒長鮮莢蔚扶涉熟成趣歡然忘劬翁放鋤顧兒而言曰汝亦知夫世有遇不遇之蔬乎鴽釀施蓼粗醢侑葅䔩蒲羞鱉食苽薦魚芥醬且胾蔥泄且朐烈有桂椒滑有堇榆已多乎燧人庖犧氏之初而况織翠署蘇殷紅氍毹淋漓觴斚轟豗鍾竿猩唇豹胎之鼎素黿紫駝之厨始饞涎其趍新中便腹而厭餘於是葷臊望風而引郤芳辛候色而應須擷翠苕於崑丘掇瑶穎乎方壺蔗漿盛夏而凍合萍虀祁寒而暖敷行以白玉奉之緑珠五侯鯖兮遜美天酥陀兮失腴此其遇合不啻初識之機雲晚見之嚴徐也若乃巖壑棲逢竹屋槿籬􅐜擅場於秋風空結鱸魚之思韭爭長於春雨末辨黃梁之炊荻生而河豚上橙熟而蟹螯肥指雖動而莫訓腹不負其幾希已而凌寒采薇近陽刈葵祛萱堂負擔芹澗湄饞黃獨之雪苖筐白薤之露蕤茗蘼蕪以滌繁醪枸杞而補羸冷淘煮兮槐茁餛飩斫兮虀滋泫膏鉶兮雹突飫糞火兮蹲鴟酣糟紫薑之掌沭醯青蔯之絲雲蒸罌粟之乳濤洶胡床之糜輪囷鵝鴨之瓠鬱屋龍蛇之芝婆娑熊蟠之菘䰐鬖虬髯之菭鱭孕子兮棕魚鱉解裙兮樹雞竹競綳兮稚子蕨初拳兮小兒以至太華之藕黃河之菰婆羅之波稜大宛之苜蓿南越之鹿角江東之專啼與夫蜀之雞蘇龍鶴栮脯加皮名器紛綸色光陸離性異溫涼氣分王衰芼擇加精調胹得宜香聞爽心味適解眉有舉案之接敬無轑釜之見欺芬芬苾苾雜陳更進可以蘇文園之渴療首陽之飢彼其石芥老而逾徑苦笋少而已竒蔊有拂士之風菊抱幽人之姿回睨蔓菁隨地而易質薯蕷視人而變形曽不滿乎一嗤矧肯數乎惡苣邪蒿臭蒜而穢荽然是蔬也進不榮於珥貂鳴玉之齒退不豪乎灑削胃脯之頥煙雲噴薄乎夜讀之吻風露簸蕩乎朝吟之脾與齋鉢其爭道食方丈乎何期其不遇可知已兒拱而前其然豈然諸葛以姓行元修以字傳玉糝得坡老而重銀茄為涪翁而妍與其見賞於肉食之鄙孰若託名於捽茹之賢蓋窮患姱名之不立而不患併日之食粥達患伯學之不能行而不患一筋之萬錢茍道義之信飽飯蔬食而樂焉翁捧腹一笑長歌振林皎白駒之束芻母金玉兮爾音黃山谷題畫菜不可使士大夫不知此味不可使天下之民有此色虀食寒葅楚惠王丨丨丨而得蛭遂吞之新序投生菜江浙間以大缸貯米泔丨丨丨釀其中作韲羹雜志韭萍是搗石崇為客作豆粥咄嗟便辦每冬得韭萍韲王愷密問其帳下云豆至難熟豫作熟味客來但作白粥投之丨丨虀丨丨韭根雜以豆苖耳晉書鳯胎不及太宗皇帝命蘇易簡講文中子有楊素遺子食經羹藜含糗之説時上因問食品何物最珍對曰物無定味適口者珍臣正知虀汁為美臣憶一夕寒甚擁爐痛飲夜半吻燥中庭月明殘雪中覆一韲盂連咀數根臣此時自謂上界仙厨鸞脯丨丨殆恐丨丨屢欲作氷壺先生傳紀其事因循未果也上笑而然之僧文榮玉壺詩話詩集園中摘摘我丨丨蔬淵明地肥熟耕丨桑柘間丨丨菜常熟為問葵藿資何如廟堂肉馬適鄰舍與丨丨丨園蔬清晨送丨丨丨菜把常荷地主恩媚盤飱畦素繞茅屋自足丨丨丨自鋤稀丨丨丨菜甲小摘為情親並杜吾蜀冬蔬蔓菁宿根已生莢韭芽戴土拳如蕨爛蒸香薺白魚肥碎點青蒿涼餅滑宿酒初消春睡起細履幽畦掇芳辣茵陳甘菊不負渠鱠縷堆盤纎手抹北方苦寒今未已雪底波蓤如鐵甲豈知丨丨富丨丨霜葉露芽柔更茁久拋松葛猶細事苦竹江豚那忍説明年投劾徑須歸莫待齒搖并髮脫坡北方春蔬丨丨丨丨嚼氷雪妍暖思采南山蕨韭苖水餅姑置之苦菜黃雞羹糝滑蓴絲色紫菰首白蔞蒿芽甜蔊頭辣生葅入湯翻手成芼以薑橙誇縷林驚雷菌子出萬釘白鵝截掌鱉解甲琅玕森深未飄籜軟炊香粳煨短茁萬錢自足宰相事一飯且從吾黨説公如端為苦笋歸明日青衫誠可脫山谷與何曽同秋來霜露滿東園蘆蔔生兒芥有孫我丨丨丨丨一飽不知何苦食雞豚坡煮菜映庾郎貧春蔬照丨丨丨丨遣騎持籠佐茹葷却得齋厨厭滋味白鵝存掌鱉留裙谷和孫奉議送菜強為僧舍煮新春階下笋芽生厨裏霜虀倒舊罌時繞麥田求野虀丨丨丨丨丨山羹園無雨潤何須歎身與時違合退耕欲看年華自有處鬢間秋色兩三莖坡和種菜溷煩僚友送南山疇昔從諸父雨甲煙苖手自鋤三徑就荒歸計拙丨丨丨丨丨園蔬山谷野譜渠不識雲白蘆蔔非蘆蔔喫來自是軟底玉花葉蔓菁非蔓菁喫來自是甜底氷三館宰夫傳食籍丨人蔬丨丨丨丨用醢不用酸用鹽不用鹹鹽醓之外别有味薑芽橙子仍相參不甑亦不釡非蒸亦非煮壞盡蔬中腴乃以煙火故霜根露葉細鏤來瓷瓶夕釁朝即開貴人我知不官樣肉食我知無骨相抵合南溪嚼菜根一樽徑醉溪中雲此詩莫續恐咽殺要讀此詩先捉舌誠齋春菜此事今真辦山翁老學圃自笑一向愚磽瘠才三畝勤渠賴兩奴正芳畦畫局微潤土融酥剪闢荆榛盡鋤犂磊磈無過溝橫略犳聚甓起浮屠隱地成苽苑餘功及芋區如絲細生菜似鴨爛蒸壷丨丨丨丨丨東歸不為鱸陸放翁晚餐當肉更宜人未覺間來嵗月頻荷鋤方喜土膏勻連畦已於瑶簮露覆地行看玉本新小摘登盤先餉客丨丨丨丨丨丨丨却憐寂寞公儀子拔盡園葵不歎貧朱文公蔬園虀價千金九月十月屋瓦霜家人共慰畦蔬黃小罌大甕淨滌濯青菘緑葵謹蓄藏天氣初寒手訣妙吳鹽正白山泉香挾書旁觀稚子喜洗刀竭作厨人忙園丁無事卧曝日棄葉狼籍堆空廊泥為緘封粳作火守護不敢非時嘗人生各自有貴賤百花開時促高宴劉伶病酲相如渴長魚大肉何由薦凍虀此際丨丨丨不數狐泉槐葉麵摩娑便腹一欣然作歌聊續氷壺傳陸放翁秋一月庾郎曉菘翡翠茸金城土酥玉雪容如何俱墮瑶甕中却與醯雞同閟宫金井銀床水清泚雪山氷谷鹽輕脆丨風丨丨釀得成字曰受辛非麴生太學徐生朝復暮茹冷啜寒那可度十年雪汁凍蔬賜一夜飢雷聽更鼓不如吏部甕頭醒一逢受辛還一醒畢卓與爾同死生楊露葉霜芽苑薑馨辣最嘉蔬孫芥芳辛不讓渠蟹眼嫩湯微熟了鵝兒新酒正醒初橙香酸釅作三友丨丨丨丨知幾鋤自笑枯腸成破甕一生只解貯寒葅楊誠齋芥虀芥格物總論芥多種有青芥黃芥紫芥白芥白芥似菘而有毛味辣好作葅甚快且辣事類搗芥季郈之雞鬪季氏介其雞注丨丨子播其羽介又作芥左昭二十五拾芥夏侯勝謂諸生曰士病不明經術經術茍明取青紫如丨地丨爾前漢本傳詩集芥有孫秋來霜雪滿東園蘆蔔生兒丨丨丨我與何曽同一飽不知何苦食雞豚東坡芥可虀珍丨丨丨芹可羹晚風咿􅥆桔槔聲白頭孤窅成何事悔不畦蔬過此生放翁辛膳胹丨丨丨薑芥山谷春蔬滿桑下丨丨緑丨畦菘心青嫩芥籉肥溪頭洗擇店頭賣日暮裹鹽沽酒歸石湖菘格物總論菘有二有春菘有秋菘與蔓菁相似菜中有菘最為常食性和利人有以子之北地種之即化為蕪菁蕪菁之南地種之亦然疑若一種也事類秋末晚菘周顒清貧終日長蔬詳見韭門注詩集為種菘奴肥丨丨丨久拋菘丨丨丨蕨猶細事苦笋江豚那忍説坡白菘類羔丨丨丨丨豚冒土出熊蹯坡春菘勝蕨茂盛丨丨甘丨丨谷烹亦甘腴幽居無一事隙地自栽蔬秋雨忽甲坼青青千萬餘江鄉盛菘芥丨咀丨丨丨張文潛味更肥醲撥雨挑來塌地菘丨如蜜藕丨丨丨朱門肉食無風味只作尋常菜把供范石湖今晨薦新周郎愛晚菘對客蒙稱賞丨丨喜丨丨小嚼氷霜響劉屏山九月遲種雨送寒聲滿背蓬如今真是荷鉏翁可憐遇事常遲鈍丨丨丨遲丨晚菘陸放翁芹格物總論芹楚葵也字亦作靳生水中有兩種荻芹取根白色赤芹取莖葉堪作葅事類鄉豪取嘗宋有田父暨春東作自曝於日不知天下之有廣厦隩室綿纊狐貉顧謂其妻曰負日之暄人莫知者以獻吾君當有厚賞也其室告之曰昔人有美戎葵甘枲莖芹萍子對鄉豪稱之丨丨丨丨之蜇於口慘於腹衆哂之列子楊朱篇野人欲獻丨丨有快曝背而美芹子者丨丨之至尊雖有區區之意亦已疏矣嵇叔夜與山巨源絶交書詩集芹英飯稻茹丨丨白樂天芹葉艾心丨丨初生小秪鬭時新不鬬花王建獻芹丨丨則小小杜美芹丨丨由來知野人碧澗羹香芹丨丨丨青泥底煮飯丨丨坊丨芹隨燕觜芹泥丨丨丨剝烏觜盤丨白鴉丨丨芹並杜獻芹心尚有丨丨丨無因見明主高適食芹美丨丨雖云丨獻御固巳凝韓王本一時生晚食寧論肉知君薄世榮建因何日種丨丨丨丨丨白鵷今休誤青泥舊得名收簞還炙背北閟儻關情朱文公溪毛躬自薦幽人本無肉食願岸草丨丨丨丨丨並隄有芹秀晚春采掇歸來待朝膳朱待制蔥格物總論蔥凡四種入藥用山蔥胡蔥食只用東蔥漢蔥狀皆似大蒜而小形圓皮赤稍長而鋭食之消穀事類厭蔥韭徐無鬼見魏武侯武侯曰先生居山林食芋粟丨丨丨以賔寡人久矣夫莊子設蔥食井丹信陽侯隂就使人要劫之丹至就故為丨麥飯丨葉之丨丹推去之曰以君侯能供甘旨故來相遇何其薄乎更置盛饌乃食後漢本傳歸蔥肆梁吕僧珍為冠軍將軍封平國侯其先以飯蔥為業及僧珍貴其兄子棄業求官僧珍不許曰汝等自有常分豈可妄求但當速丨丨丨耳本傳寧食三斗屈突通擢左武衛將軍蒞官徑正有犯法者雖親無所回縱其弟蓋為長安令亦以方嚴顯時為語曰丨丨丨丨艾莫逢屈突蓋丨丨丨丨蔥莫逄屈突通唐本傳詩集芼薑蔥點酒下鹽豉縷橙丨丨丨潑油蔥一杯湯餅丨丨丨並坡煮餅澆已辨丨丨丨油蔥后山芼羹用瓦盆麥羹伴鄰翁黃菌青蔬放筯空一事尚非貧賤分丨丨僣丨太官蔥注鄰圃有太官蔥比常蔥差小陸放翁鮭菜清貧丨丨丨丨只韭蔥韭附􅕖格物總論韭叢生豐本葉青細而長近根處白按本草味辛雖煮食之便出猶熏灼不如蔥薤熟即無氣最是養性者所忌事類韭葅醢人其實丨丨周禮韭茖山丨丨爾雅豐本韭曰丨丨曲禮鍾乳韭是菜丨丨本草薦韭庶人春丨丨以卵王制祭韭獻羔丨丨七月剪韭郭林宗見友人夜冒雨丨丨作炊餅今洛人效之食韭周顒清貧終日長蔬王儉謂顒曰卿山中何所食答曰赤米白鹽緑葵紫蓼文惠太子問顒菜丨何味最勝曰春初早丨秋末晚菘南史三韭庾杲之事見儉門二韭李崇事見儉門薤為歌齊田橫亡門人丨薤露之丨曰薤上露何晞明朝還復落漢書勸種漢龔遂為渤海太守丨民口丨百本薤五十本蔥一畦薤本傳欲吾擊疆後漢龎參為漢陽太守郡人任宗有志節參到先候之堂不與言但以薤一本水一盂置屏前抱兒孫伏户下參思其微旨曰水欲吾清拔薤丨丨丨丨宗抱孫兒當户欲吾開門恤孤也本傳明日必食唐李宗回與客謁華隂令客能知飲食客曰丨丨丨丨椒薤酒果然太平廣記潘安仁賦白薤負霜詩集花初白秋韭丨丨丨白樂天牙戴土薤丨丨丨拳如蕨坡夜雨剪丨丨丨春韭杜春雨足肉食嘲三九終憐氣韻清一畦丨丨丨翠髮剪還生屏山薤露薤隱者柴門內畦蔬繞舍秋盈箱承丨丨不待致書求束此青芻色圜齊玊筋頭衰年關鬲冷味暖併無憂霜薤昔聞丨丨白重惠意如何薤葉露丨丨有朝丨薤白酒酥暖丨丨丨並杜甫古今合璧事類備要别集卷五十九
