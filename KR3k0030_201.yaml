body:
  text: 古今合璧事類備要續集卷五十一宋謝維新撰事為門揚善附隱惡事理發揮善者人之所樂而惡者人之所惡也今有人于此聞人之善如己之善惟恐人之不知見人之惡如己之惡惟恐人之得知善者褒之嘉之從臾而成之惡者痛之悼之又從而隱諱之豈不誠君子長者哉其或彼有善之可嘉也而媢疾生焉彼有惡之可矜也而發擲形焉是固未能盡人也而謂能盡已可乎兹其為薄德也亦甚矣故妬賢害能而忌有功既非所以為項氏之利而國武子好翹人之過亦所以不免于齊也聖人有言君子成人之美不成人之惡小人反是豈欺我哉事類用中舜執兩端丨其丨於民隱惡而揚善記中庸聞言禹丨善丨則拜孟不蔽爾有善朕丨敢丨書湯誥俾慕旌别淑慝表厥宅里彰善疸惡樹之風聲弗率訓典殊厥井疆丨克畏丨注言當識别頑民之善惡表異其居里明其為善病其為惡立其善風揚其善聲其不循教道之常則殊其井居田界使能畏為惡之禍慕為善之福所以沮勸挽推或挽之或推之欲無入得乎左襄十四反和子與人歌而善必使丨之而後丨之語述而大哉問也林放問禮之本子曰丨丨丨丨語富哉言乎語雍之言然子曰丨丨丨丨雍也偃之言是丨丨丨丨也前言戲之耳陽貨君子若人子謂子賤丨丨哉丨丨公冶長尚德若人南宮適出子曰丨丨哉丨丨憲問賢哉回也子曰賢哉回也一簞食一瓢飲在陋巷人不堪其憂回也不改其樂丨丨丨丨雍也孝哉閔子子曰丨丨丨丨騫人不間于其父母昆弟之言先進大哉孔子逹巷黨人曰丨丨丨丨博學而無所成名子罕借譽左右百里奚乞于道路秦繆公委之以政寧戚飯牛車下桓公任之以國此二人者豈素宦于朝丨丨于丨丨然後二王用之漢鄒陽傳數言將軍王曰丞相丨丨丨丨將軍何以教寡人計䇿韓信傳遊揚足下曹丘生曰楚人諺曰得黃金百斤不如得季布一諾足下何以得此聲于梁楚之間哉且僕與足下俱楚人使僕丨丨丨丨名于天下顧不美乎何足下距僕之深也布大悅季布傳稱述多過龎士元性好人倫勤于長養每所丨丨丨丨其才時人怪而問之統答曰當今天下大亂雅道陵夷善人少而惡人多方欲興風俗長道業不美其談則聲名不足企慕而為善者少矣今拔十失伍猶得其半而可以崇邁世教使有志者自厲不亦可乎嗟吟良久謝朓好奬人才會稽孔闓粗有才筆未為時所知孔圭嘗令草讓表以示朓朓丨丨丨丨手自折簡寫之謂圭曰此子聲名未立應共奬成無惜齒牙餘論本傳隱惡不成人丨丨丨之惡小人反是語又榖梁春秋毋攻人攻其惡丨丨丨之惡語顔淵九二包荒丨丨丨丨用馮河不遐遺朋亡得尚于中行注體健居中而用乎泰能包含荒穢受納馮河者也用心𢎞大無所遐棄故曰不遐遺也無私無偏存乎光大故曰朋亡也如此乃可以得尚于中行易泰卦六三包羞丨丨丨丨象曰包羞位不當也注俱用小道以承其上而位不當所以包羞也否卦國君含垢公孫歸父會楚子于宋宋人使樂嬰齊告急于晉晉侯欲救之伯宗曰不可古人有言曰雖鞭之長不及馬腹天方授楚未可與爭雖晉之強能違天乎諺曰高下在心川澤納汙山藪藏疾瑾瑜匿瑕丨丨丨丨天之道也君其待之左宣十五君子諱惡滅項孰滅之齊滅之曷為不言齊滅之為桓公諱也春秋為賢者諱此滅人之國何賢爾丨丨之惡惡也疾始善善也樂終桓公嘗有繼絶存亡之功故丨丨為之諱也公羊僖十七耻言人過漢文帝躬修元默將相皆舊功臣少文多質論議務在寬厚丨丨丨之丨失化行天下告訐之俗易風流篤厚刑志掩匿人過曹參見人有過掩匿覆蓋之本傳俱棄細過今單于新與朕丨丨丨丨偕之大道云云和親以定始于今年漢文帝紀不責小文陳遵入公府日出醉歸曹事數廢西曹請斥之大司徒馬宮重遵謂西曹此人大度士奈何以小文責之當由貧困陳實時嵗飢有盜夜入其室止于梁上實因見呼子弟正色訓之曰夫人不可不自勉不善之人未必本惡習以性成遂至于此梁上之人是矣盜驚投地稽顙歸罪實曰視君狀貌未必惡人丨丨丨丨今遺絹二匹後漢本傳勿使人見宋禇彥回有門生盜其衣彥回遇見謂曰可密藏之丨丨丨丨門生慙而去屏風屈曲齊王僧祐父逺時人為之語曰王逺如丨丨丨丨能蔽風雨甕中文字國初趙普為相于廳事坐屏後置二大甕凡有人投利害文字皆置中滿即焚於通衢聞見録手封文字韓魏公為相見丨丨有攻人隱惡者必丨丨之人未常見别録韓愈送王含序今子之來見我也無所挾吾猶將張之况文與行不失其世守渾然端且厚惜乎吾力不能振之而其言不見信于世也韓愈答楊子書丨丨丨丨丨丨曰東野吃吃説足下不離口故不待相見相信已熟既相見不要約已相親賈誼陳治安䇿古者大臣有坐不亷而廢者不謂不亷曰簠簋不節坐汚穢淫亂男女無别者不曰汚穢曰帷薄不修坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定其有罪矣猶未斥然正以呼之也尚遷就而為之諱故其在大譴大何之域者聞譴何則白冠氂纓盤水加劍造請室而請罪矣上不執縛係引而行也其有中罪者聞命而自弛上不使人頸盩而加也其有大罪者聞命則北靣再拜跪而自裁上不使捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣馬援戒兄子書見姪門詩集滿世名秦少儀好為詩初不甚工既而以所業見山谷山谷贈以詩當時多以為許豫之過然少儀緣此詩思大發汝南許文休馬磨自衣食但聞郡功曹丨丨丨藉藉渠命有顯晦非人作通塞秦氏多英俊少遊眉最白頗聞鴻雁行筆皆萬人敵吾早知有覯而未知有覿少儀袖詩來剖蚌珠的皪乃能持一鏃與我箭鋒直自吾得此詩三日卧向壁挽來不能寸推去忽數尺才難不其然有亦未易識逢人説幾度見詩詩盡好及親標格過于詩平生不解藏人善到處丨丨丨項斯楊敬之贈項斯荷朋友名聲丨丨丨韓送吹噓青冥丨丨丨韓薦士詩無瑕疵順物丨丨丨山谷求庇附求援求哀事理發揮人無特操不能自立必有所庇而後立是故所求乎貴以庇賤未免也所求乎上以庇下未免也所求乎大以庇小未免也始而庇其身繼而庇其宗又繼而庇其親戚庇其所厚善者是庇也皆推其有餘以及彼之不足得其庇者安失其庇者危就其庇者説去其庇者悲趨其庇者榮舍其庇者辱故求庇之情斯人之所不能無也雖然人不能以自立非求庇于人固不可或不能以自免非求哀于人亦不可人未必常安樂而無憂患也亦未必常榮懷而無杌􅑾也人而溺于憂患之中陷于杌􅑾之餘幸而有仁人君子者掀而出之往而救之亦偷生而已矣亦苟免而已矣然或依慿城社妄作威福天日開明氷山銷鑠此乃仁人君子之所共誅者尚復可憐之乎事類蔦蘿丨與女丨施于松柏詩頍辨葛藟樂豫曰公族公室之枝葉也若去之則本根無所庇蔭矣丨丨猶能庇其本根故君子以為比况國君乎此諺所謂庇焉而縱尋斧焉者也必不可君其圖之左文七晉焉依我周之東遷丨鄭丨丨鄭為主燭之武見秦伯曰秦晉圍鄭鄭既知亡矣若亡鄭而有益于君敢以煩執事越國以鄙逺君知其難也馬用亡鄭以陪鄰鄰之厚君之薄也若舍鄭以為東道主行李之往來供其乏困君亦無所害左僖三十年強者庇以待丨丨而丨民焉左襄八身所庇大官大邑丨之丨丨也左襄三十一屬託邑子前尹翁歸拜東海太守過辭廷尉于定國定國欲丨丨丨丨兩人終日不敢見曰此賢將汝不任事也又不可干以私倚為主人彭寵字伯通南陽宛人光武鎮慰河北以書招寵王郎立寵發步騎南及光武于廣阿賜號大將軍丨以丨北道丨丨本傳獨不為地田蚡謂灌夫曰程李俱東西宮衛尉今衆辱程將軍仲孺丨丨丨將軍丨乎我有二天蘇章遷冀州刺史故人為清河太守章行部案其姦贓乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天丨獨丨丨丨章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史案事者公法也遂舉正其罪求哀耄無能為石厚從州吁如陳石蠟使告于陳曰衛國褊小老夫丨矣丨丨丨也此二人者實弒寡君敢即圖之左隱四年孤實不敬宋大水公使弔焉曰天作淫雨害于粢盛若之何不弔對曰丨丨丨丨天降之災又以為君憂拜命之辱莊十一肉袒牽羊楚子圍鄭三月克之鄭伯丨丨丨丨以逆曰孤不天不能事君使君懷怒以及敝邑孤之罪也敢不惟命是聽其俘諸江南以實海濵亦唯命其翦以賜諸侯使臣妾之亦惟命若惠顧前好徼福于厲宣桓武不泯其社稷使改事君夷于九縣君之惠也孤之願也非所敢望也敢布腹心君實圖之左宣十二靣縛銜璧楚子圍許蔡穆侯將許僖公以見楚子于武城許男丨丨丨丨大夫縗絰士輿櫬楚子問諸逢伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而祓之焚其襯禮而命之使復其所楚子從之僖六年舍諸靈臺秦獲晉侯以歸穆姬聞晉侯將至以太子瑩𢎞與女簡璧登臺而履薪焉使以免服縗絰逆且告曰上天降災使我兩君匪以玉帛相見而以興戎若晉君朝以入則婢子夕以死夕以入則朝以死唯君裁之乃丨丨丨丨大夫請以入公曰獲晉侯以厚歸也既而喪歸焉用之大夫其何有焉僖十五依於庭墻吳入郢昭王在隨申包胥如秦乞師曰吳為封豕長蛇以荐食上國虐始于楚寡君失守社稷越在草莽使下臣告急曰夷德無厭若鄰于君疆場之患也逮吳之未定君其取分焉若楚之遂亡君之土也若以君靈撫之世以事君秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏臣下何敢即安立丨丨丨丨而哭日夜不絶聲勺飲不入口七日秦哀公為之賦無衣九頓首而坐秦師乃出定四求渡得脫伍子胥奔吳到昭關昭關欲執之子胥幾不丨丨追者後至江上有一漁父乘船知子胥之急乃渡子胥佯死求脫魏齊笞擊范雎折脅摺齒雎佯死卷以簀置厠中使客醉者更溺之范雎謂守者曰能出我我必有厚謝守者乃請棄簀中死人魏齊醉曰可矣周紀轍中求水莊周家貧貸粟于監河侯監河侯曰諾我將得邑金將貸子三百金可乎莊周曰昨周來有中道而呼者周顧視車丨丨有鮒魚焉周問之對曰我東海之波臣也君豈有升斗之水而活我哉周曰諾我且南遊吳越之王激西江之水而迎子可乎鮒魚曰吾得斗升之水而活耳君乃言此曾不如早索我于枯魚之肆穽中求食猛虎處深山之中百獸震恐及其在陷丨之丨搖尾丨丨前司馬遷傳緹縈上書太倉令淳于公有罪當刑無男有五女當行會逮罵其女曰生女不生男緩急非有益其少女丨丨自傷悲泣乃隨父至長安丨丨曰妾父為吏齊中皆稱其亷平今坐法當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道亡繇妾願沒入為官婢以贖父刑罪使得自新書奏天子悲憐其意乃下詔除肉刑漢刑法志鄒陽上書丨丨齊人也初仕吳後去之梁從孝王遊陽為人有智略慷慨不苟合介于羊勝公孫詭之間勝等疾陽惡之孝王王怒下之吏將殺之陽恐死而負纍乃從獄中丨丨曰云云書奏孝王立出之卒為上客本傳上書請老見餞送上書乞歸班超久在絶域年老思土丨丨丨丨曰臣不敢望到酒泉郡但願生入玉門關通鑑漢和帝紀舉幡救罪鮑宣下廷尉王咸丨丨太學下曰欲丨鮑司𨽻者會此諸生會者千餘人遮丞相孔光車不得行宣減死一等求援求襄屬令晉王襄字偉元城陽人門生為安丘縣所役丨丨丨丨襄曰卿學不足以庇身吾德薄不足以蔭卿且吾不執筆四十年矣乃步簷乾飯兒負鹽豉草屩送所役生到縣門徒從者千餘人安丘令以為詣已出迎之襄乃下道至土牛旁磬折云門生為縣所役故來送别因執手涕泣而去令即放之一縣以為羞呼顗申救王敦舉兵劉隗勸帝盡誅諸王司空導率羣從詣闕請罪值周顗將入導丨丨謂曰伯仁以百口纍卿顗直入不顧既見帝言導忠誠丨丨甚至帝納其言顗出導猶在門又呼顗顗不與言顧左右曰今年殺諸賊奴取金印如斗大繫肘既出又上表明導言甚至導不知救已而甚銜之及敦誅顗而導不言後料檢中書故事見顗表救已流涕告諸子曰我雖不殺伯仁伯仁由我而死幽冥之中負此良友求庇韓愈與孟簡書潮州時有一老僧號曰大顛頗聰明識道理云云及來袁州留衣服為别乃人之情非崇信其法求福田利益也孔子曰丘之禱久矣凡君子行已立身自有法度聖賢事業具在方䇿可效可師仰不愧天俯不怍人內不愧心積善積惡殃慶自各以其類至何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎愷悌君子求福不回傳又曰不為威惕不為利疚假如釋氏能與人為禍福非守道君子之所懼也况萬萬無此理梅聖俞凌霄花賦厥草惟夭厥木惟喬草有柔蔓木有繁條緣根兮附蒂有葉兮敷苖朱華燦兮上覆本幹蔽兮不昭嗟兮此木幾嵗幾年而至于合抱夫何此草一旦一夕而遂曰凌霄是使藜藿蒿艾慕高艷而仰翹翹也安知蘋藻自潔蕙蘭自芳芙蓉出汚而自麗芝蘭不培而自長或紉佩帶或采頃筐或製裳于騷客或登歌于樂章故得為馨為薦為嘉為祥皆無附著亦以名揚奚必託危柯而後昌吾謂本危多枯風高必折當是時將恐摧為朽荄不復萌蘖豈得與百卉並列也耶求哀韓愈與韋舍人書天池之濵大江之濆曰有怪物焉蓋非常鱗凡介之品彚匹儔其得水變化風雨上下于天地不難也其不及水蓋尋常尺寸之間耳無高山大陵曠塗絶險為之關隔也然其窮涸不能自致乎水為獱獺之笑者蓋八九年如有力者哀其窮而運轉之蓋一舉手一投足之勞也然是物也負其異于衆也且曰爛死于沙泥吾寧樂之若俯首帖耳搖尾而乞憐者非我之志也以有力者遇之熟視之若無覩也其死其生固不可知也今又有力者當其前矣聊試仰首一鳴號焉庸詎知有力者不哀其窮而忘一舉手一投足之勞而轉之清波乎其哀之命也其不哀之命也知其有命而且鳴且號者亦命也韓愈救墜者説蹈水火者之求免于人也不唯其父兄子弟之慈愛然後往而全之也將有介于其側者雖其所憎怨茍不至欲其死者則將大聲疾呼而望其人之救也某聞人有行道三塗之難墜千仭之下者仰望于道號以求出過之者日千百人皆去而不顧然哀而顧之者不過攀木俯首深矉太息良久而去耳卒無可奈何然其人猶望而未止也俄而有若烏獲者持長綆千尋徐而過焉其力足為也其器足施也號而不顧顧而曰不能則其人知必死于大壑矣何也是時不可遇而幸遇焉又不逮乎已然後知命之窮勢之極其卒呼憤自斃不復望于上矣某曩者齒少心鋭徑行高步不知道之艱以陷大厄窮躓隕墜發為孤囚日號而望者十四年矣其不顧而去與顧而深矉者俱不乏焉然猶仰首伸吭張目而視曰庶幾乎其有異俗之心非常之力當路而垂仁者耶伏惟閣下念墜者之至窮錫烏獲之餘力舒千尋之綆垂千仞之艱致其不可遇之遇以卒成其幸度號而望者得畢其誠無使呼憤自斃沒有餘恨則士之死于門下者宜無先焉生之通塞決在此舉王子晉論求怨與報仇佐饔得嘗佐鬬得傷此言為善則預為惡則去不與黨人非義之事也凡損于物皆無與焉然而窮鳥入懷仁人所憫况死士歸我當棄之乎伍員之託漁舟季布之入廣栁孔融之藏張儉孫嵩之匿趙岐前代之所貴而吾之所行也以此得罪甘心瞑目至于郭解之代人報仇灌夫之橫怒求地遊俠之徒非君子之所為也如有亂逆之行得罪于君親者亦不足恤焉親友之迫危難也家財已力當無所吝若橫生圖計無理請謁非吾教也墨翟之徒世謂熱腹楊朱之侶世謂冷腸腸不可冷腹不可熱當以仁義為節文耳顔氏家訓詩集附蓬麻兔絲丨丨丨杜依荆榛人生莫依倚依倚事不成君看兔絲蔓丨倚丨與丨荆榛易蒙密百鳥撩亂鳴下有狐兔穴奔走亦縱橫樵童斫將去柔蔓與之并翳薈生可恥束縛死無名桂樹月中出珊瑚石上生俊鶻渡海食應龍升天行靈物本特達不復相纒縈纒縈竟何者荆榛與飛莖依水萍丨丨類浮丨倚松如懸蘿潘安仁向陽花近水樓臺先得月丨丨丨木易為春薛麟一榻偶依丨丨丨丨陳太守羅隱萬間大庇安得廣厦千丨丨丨丨天下寒士俱歡顔風雨不動安如山嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足杜為燕巢君屋願丨雙飛丨銜泥丨丨丨古詩騎馬倚人門但得有錢留客醉誰能丨丨丨丨丨盧東無窮求福人火透皮穿不計春根如頭靣葉如身偶然題作木居士便有丨丨丨丨丨韓愈題木居士惟是欠登門似龍鱗已足丨丨丨丨丨日裏腮猶濕泥中目未昏乞鋤防蟻穴望水㵼金盆他日能為雨公田報此恩姚鵠詩上苗相公只憐無援過吹噓省得蓬蒿修謁初蒙知曽不見生疏侯門數處將書薦帝里經年借宅居未必有詩堪諷誦丨丨丨丨丨丨丨而今足得成持取莫使江湖却釣魚杜荀鶴下第後寄池州鄭員外解紛事理發揮紛者人之爭也解紛者又人之所以救其爭也凡有血氣皆有爭心智者詐愚勇者苦怯衆者暴寡強者凌弱德齊不相尚則較權均不相下則競力敵不相能則鬬于斯時也不有能斷曲直者而聽命焉則小者滅宗大者亡國相刃相劘特紛紛而未已也昔孫子曰夫解雜亂分糾者不控拳救鬭者不搏撠批亢搗虛形格勢禁則自為解耳此解紛説也春秋之功利戰國之從衡秦漢而下之戰鬬三代而上無是也解紛者其誰乎嗚呼世道其衰矣事類和其難調人掌萬民之難而諧和之凡和難父之讐避諸千里之外從父兄弟之讐不同國君之讐視父師長之讐視兄弟主友之讐視從父兄弟禮解其紛丨丨丨老子纓冠救鬪今有同室之人鬪者救之雖被髮丨丨而往救之可也孟子解驂贖罪越石父賢在縲紲間晏子出遭之途丨左丨丨之入為上客為人排難魯仲連遊趙聞魏王使客將軍新垣衍因平原君説趙王欲令趙尊秦為帝仲連見新垣衍言秦稱帝之害新垣衍不敢復言帝秦秦將聞之為却五十里于是平原君欲封魯連魯連辭不受平原乃置酒以千金為魯連夀魯連笑曰所以貴于天下之士者丨丨丨丨解紛亂而無取也即有取者是商賈之事也連不忍為也遂辭平原君而去令家返女蒯通曰里婦亡肉姑以為盜而逐之婦所善里母曰我今丨而丨丨丨矣即束緼請火于亡肉家曰昨暮夜犬爭肉相殺請火治之亡肉家遽追呼其婦翼蔽沛公沛公見羽鴻門羽留飲范增數目羽擊沛公羽不應增出謂項莊莊請以劍舞項伯亦起舞常以身丨丨丨丨樊噲聞事急直入譙羽有頃沛公從間道走軍本紀詐稱漢王楚圍滎陽將軍紀信曰事急矣臣請誑楚可間出信乃乘王車黃屋左纛曰食盡漢王降楚楚皆呼萬歲之城東觀以故漢王得遁去本紀解平城圍上繫韓王信遂往至平城為胸奴圍于白登上自用陳平竒計厚賂單于閼氏乃解圍陳平傳如朱家指季布為項籍將數窘漢王籍滅高祖求布千金魯朱家之雒陽見滕公説曰季布何罪臣各為其主用職耳項氏臣豈可盡誅耶君何不為上言之公許諾果言丨丨丨丨上赦布本傳滕公與語韓信坐法當斬信乃仰視滕公曰上不欲就天下何為斬壯士丨丨竒其言壯其貌釋而不斬丨丨大悅之言于上以為治粟都尉王陵見怪張蒼坐法當斬解衣肥白如瓠時丨丨丨而丨其美士乃言沛公救勿斬後以為代相遷為計相本傳賈復交歡見不修怨注撫筝歌怨謝安為王國寶所讒孝武召桓伊飲宴安侍坐伊丨丨而丨丨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患安泣下霑襟乃越席而就之捋其鬚曰使君于此不凡帝甚有愧色施障申議王凝之妻謝氏字道韞聰識有才辨凝之弟獻之嘗與賔客談論詞理將屈道韞遣婢白獻之曰欲為小郎解圍乃丨青綾步丨自蔽丨獻之前丨客不能屈晉書罪不至死權善才范懷義誤斫昭陵柏罪當除名上特命殺之狄仁傑奏二人丨丨丨丨曰張釋之有言設有盜長陵一抔土陛下何以處之今以一株柏殺二將軍後代謂陛下何如臣不敢奉詔恐陷陛下于不道且羞見釋之于地下故也上怒稍解二人除名流嶺南保其無他議者言韓滉修石頭城隂蓄異志上疑之以問李泌泌對曰滉公忠清儉自車駕在外滉貢獻不絶且鎮撫江東十五州盜賊不起皆滉之賢也滉不附權貴故多謗毁願陛下察之臣敢丨丨丨丨上令滉歸覲百口保君杜兼誣奏李藩于張建封之薨搖動軍情上大怒密詔杜佑使殺之佑素重藩懷詔旬日不忍發因引藩出詔示藩藩神色不變曰此直執也佑曰君謹勿出口吾已密論用丨丨丨丨矣上召藩詣長安望藩儀度安雅乃曰此豈為惡者耶即日授祕書郎一䇿平憾李德裕為兵部尚書初李宗閔與德裕有隙及德裕還自西川上注意甚厚朝夕且為相宗閔百方沮之不能杜悰嘗詣宗閔曰悰有丨丨可丨宿丨恐公不能用宗閔曰何如悰曰德裕有文學而不由科第常用此為嫌若使之知舉必喜矣宗閔默然有間曰更思其次悰曰不則用為御史大夫宗閔曰此則可德裕驚喜曰此大門官小子何足以當之寄謝重沓唐文宗歐陽公辨誣臣伏見杜衍韓琦范仲淹富弼皆是陛下所素委任之臣一旦相繼而罷天下之士皆素知其可用之賢而不聞其可罷之罪臣職雖在外事不審知然臣竊見自古小人讒害忠賢其識不逺欲廣害善良則不過指為朋黨欲搖動大臣則必須誣以專權其故何也夫去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過難為一二求瑕惟指以為朋黨則可一時盡逐至如大臣已被知遇而蒙信任者則不可以他事動搖惟有專權是人主之所惡故須此説方可傾之杜衍為人清慎而謹守規矩仲淹則恢廓自信而不疑韓琦則純正而質直富弼則明敏而果鋭四人為性既各不同雖皆歸于盡忠而其所見則各異平日間居則相稱美之不暇為國議事則公言廷諍而不私以此而言臣見杜衍等真得漢史所謂忠臣有不和之節而小人讒為朋黨可謂誣矣臣聞有國之權誠非臣下之得專也臣切思仲淹等自入兩府以來不見其專權之迹而但見其善避權也陛下開天章閣召而賜坐授以紙筆使條其事弼等遲回近及一月方敢略條數事仲淹老練世事必知凡百難猛更張故其所陳志在逺大而多若迂緩但欲漸而行之以久兾皆有效弼性雖鋭然亦不敢自出意見但舉祖宗故事請陛下擇而行之自古君臣相得一言道合遇事而行更無推避臣方怪弼等蒙陛下如此堅意委任督責丁寧而猶遲緩自疑作事不果然小人巧譖而曰專權者豈不誣哉陛下睿哲聰明有知人之聖親選得此數人驟加擢用今此數人一旦罷去而使羣邪相賀于內四夷相賀于外此臣所以為陛下惜也詩集倉卒解紛酒酣舞長劍丨丨丨漢丨李白不忍乘危丨丨丨其丨韓古今合璧事類備要續集卷五十一
