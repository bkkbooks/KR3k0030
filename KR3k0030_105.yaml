body:
  text: 古今合璧事類備要後集卷三十六宋謝維新撰三監門祕書監祕書省同祕書丞祕書少監祕書郎歴代㳂革周外史掌四方之志三皇五帝之書漢圖籍所在有石渠石室延閣廣内貯之於外府又有御史宋丞居殿中掌簡臺祕書及麒麟天祿二閣藏之於内禁後漢圖書在東觀相帝始置秘書監一人掌典圖書古今文字考合同異屬太常以其掌圖書秘記故曰秘書魏武帝又置秘書令典尚書奏事即中書令之任文帝置中書令而秘書改令為監掌藝文圖籍之事初屬少府自王肅為監乃不屬其蘭臺亦藏書籍而御史掌之魏薛夏云蘭臺為外臺秘書為内閣晉武帝以秘書併入中書省其秘書著作之局不廢恵帝復别置祕書監併統著作局掌三閣圖書自是祕書之府始居於外華嶠為祕書監兩省文章門下撰集皆統之梁曰祕書省後周祕書監亦領著作監掌國史隋祕書省領著作太史二曹後又改監為令唐武徳初改為監龍朔二年改秘書省為蘭臺改監為太史天授初改秘書省為麟閣神龍初復舊掌經籍圖書領著作太史二局通判省事少監為之貳其後國史太史分為别曹而秘書省但主書寫校勘而已通典國朝太平興國二年始建崇文院昭文館史館集賢院皆總為崇文院及端拱初建祕閣擇三館書籍真本并内出古畫墨迹弃藏之亦在崇文院中淳化元年詔秘閣次三館秘書省仍𨽻京百司㑹要時秘書雖有監少監丞郎校書郎正字著作郎佐皆以為寄祿官常𢃄出入秘監即今中大夫也即官至祕書監有特今供職者有以它官兼領者有以判祕閣官兼判者至道中宋以翰林學士承㫖兼祕書監淳化中李至自前執政以禮部侍郎兼祕書監祥符九年楊億以秘書監判秘閣兼秘書省事見麟臺故事凡邦國經籍圖書悉歸祕閣而祕書所掌常祭祀而已兩朝國史志元豐正名以崇文院為祕書省既罷館職麟臺故事云國初三館直館直校勘通謂之館職必試而命不試而命者皆異恩盡以三館職事歸祕書省置秘書省職事官自監少至正字不領它職却掃編麟臺故事初除龍圖閣學士王勝之為秘書監時寄祿官已正議大夫蓋裕陵欲重此選又勝之雅有文學故也吕氏家塾廣記監掌書籍圖史天文厯數之事屬有五著作佐郎秘書校書正字各以職𨽻於長貳惟日厯非編修官不預四朝志元祐中復置館職已而隨官資除授或領内外職任不必專在館中紹聖初罷之却掃編宣和初改元豐之制增定為十八員以倣唐登瀛之數職略建炎三年罷紹興元年復置舊秘書省建於禁中至是權寓臨安府法惠寺中四年建新省於天井巷之左五年立定十八人為額太史局文徳殿鍾漏所直焉中興㑹要隆興元年詔監少丞外以七員為額二年詔依祖宗舊法更不立額事類策府穆天子傳穆天子西登崑崙見王母曰癸巳至於羣玉之山先王所謂丨丨也延閣見後内庫注秘府天下文籍悉在廣内秘府之室謂之秘書漢書藏室學者稱東觀為老氏丨丨道家蓬萊山注云東觀經籍多蓬萊海中神仙為仙府幽經祕錄皆在焉又王融曲水詩記言事於蓬觀謂丨丨也華嶠後漢書内庫漢書府在外則有太常太史博士掌之内則有延閣廣内石渠之藏劉向楊雄典校皆在禁中謂之中書猶令言丨丨書也後漢則藏之東觀亦禁中也六典外臺太和中秘書丞薛夏嘗以公事移蘭臺蘭臺自一臺也而秘書署耳謂夏為不得儀也推使當有坐者夏報之曰蘭臺為丨丨秘書為内閣臺閣一也何不可相移之有蘭臺屈无以折自是之後遂以為常魏志王肅傳注東觀見前内庫注東壁丨丨之星主文籍石氏星經馬庭又有承明金丨著作之丨班固西都賦麟臺漢御史中丞在殿中掌蘭臺祕書圖籍唐以秘書省為蘭臺漢西京未央宫中有麒麟閣亦藏秘書即楊雄校書之處也唐改祕書為丨丨六典木天内諸司舍唯秘閣最宏壯穹窿高敞謂之丨丨六典芸局丨丨覩奥見天下之圖唐陳子昂集封君遺愛碑華省睠彼蘭臺古稱丨丨唐宋廣平集韓國華制病坊唐以望雖清雅而實非要劇權貴子弟及好利誇侈者率不好此職以監為宰相丨丨丞及著作郎為尚書郎丨丨祕書郎及著作佐郎為監察御史病坊類要秘署蘭臺丨書丨耳魚豢魏略内閣見前外臺注御府丨丨秘書外府也韓愈送鄭校理序仙省六帖司典𫝊汝丨丨之後同上修書唐開元中詔祕書官並號丨丨學士蘭臺見前外臺注又後漢儒林序有辟雍東觀丨丨石室宣明鴻都之藏芸臺芸香辟紙魚蠧故稱丨丨魚豢曲要外監唐賀知章授祕書監自號四明狂客及祕書丨丨大蓬祕監曰丨丨鄭氏談綺麟閣唐藏書之地有昭文崇文之館有集賢書院有修文𢎞文司文以至蓬萊書院曰乾元修書院曰祕書外内省曰内庫曰三館曰祕書祕府曰蘭臺麟室六帖石渠唐虞世南薨太宗曰丨丨東觀無復人矣詳見後典圖書見前㳂革内掌祕奥桓帝延熹二年初置祕書監曰國史之興將明得失之迹謂之實錄使一代之典焕然可觀散騎常侍崧文質彬彬思義通博歴位先朝涖事以穆宜丨丨丨宣明史籍東觀漢記撰皇覽魏王象領秘書監丨丨丨著陽秋晉孫盛字于固為秘書監丨三國晉丨丨作石頌西京祕書省㕔事前有隕星石隋自咸陽移署於此王邵丨瑞丨丨以贊美之西京雜記得竹書晉荀朂領祕書監汲郡冢中丨丨丨朂自撰次經傳闕文多所證明為中經晉荀勉與張華依劉向别錄整治書籍以丨丨丨多文士後魏世祖欲用伊馥為尚書馥辭曰中秘二省丨諸丨丨請參其次遂拜中護軍祕書監考古今晉惠帝永平詔曰祕書丨校丨丨監理經籍長圖籍唐國朝已來有魏證虞世南顔籀為祕書監設官之重得賢之盛人到于今稱之以文學博雅丨丨丨長祕府白集許貴同制存規諷唐虞世南為祕書監太宗引之談論及古今帝王行政得失必丨丨丨又太宗謂侍臣曰朕因暇日每與世南商略古今朕有一言之善世南未嘗不悅有一言之失未嘗不恨悵朕嘗戯作豔詩世南進曰聖作雖工體制非雅上之所好下必隨之此文一行恐致風靡不敢奉詔其懇誠若此抗論議世南已衰老屢乞骸骨不聽遷太子右庶子固辭改秘書監外若不勝衣而中丨烈丨丨持正同上太宗嘗出行有司請載副書以從帝曰虞世南在不使朕此行也世南薨帝曰石渠東觀之中無復人矣世南著北堂書抄盛行於代唐訓預朝政唐魏證為祕書監參丨丨丨佩蒼玉六典祕書監一人漢成帝始置祕書監屬太常掌禁中圖書秘記故曰秘書魏文帝以王象領祕書監撰皇覽晉永平元年詔祕書典綜經籍考校古今宜别置祕書寺掌中外三閣圖書晉令云品第五綘朝服銅印墨綬進賢兩梁冠丨水丨丨梁改為省為五少司晉典籍孫伯壓丨丨之丨丨左傳掌皇帝書見前㳂革儀依御史晉武帝初置祕書丨丨丨卜又通典漢初御史中丞掌蘭臺祕書圖籍之事至魏晉其制猶存故歴代營都邑置府寺必以祕書省及御史臺為鄰同上職為近密晉王肅曰祕書丨於王室最丨丨丨官書取正晉張華嘗徙居載書三十乗祕書監摯虞撰定丨丨資華本以丨丨晉書羣籍無遺何憲博涉開通丨丨畢覽天閣寶祕人間散逸丨丨漏焉南史祕閣遺逸晉謝靈運為祕監稱丨丨之丨丨本朝實錄祕閣刋正唐顔師古為祕書監專典丨丨丨丨見後荀崧通博晉温嶠舉荀崧為祕書監曰國史之興將以明得失之迹謂之實錄使一代之典煥然可觀散騎常侍崧文質彬彬思義通博宜掌祕奥章明史籍詳見前師古詳敏唐太宗以顔丨丨體業淹和器用丨丨學該流畧詞兼典麗命為祕書監三入東觀華嶠集詔曰尚書嶠體素𢎞博文雅該通歴覽古今博聞多識著書實錄有良史之志轉為祕書監其加散騎常侍班同中書侍為内臺使中書散騎著作及治亂音律天文數術南省文章門下撰集皆典領之嶠表伏見詔書以臣為祕書監加位常伯昔劉向父子世典史籍馬融通博丨丨丨丨非臣膚淺所敢比迹云云一見祕書李邕見特進李嶠自言讀書未徧願丨丨祕書假直丨丨未幾辭去嶠試問奥篇隠帙了辨如響讚述符命庾峻自司空長史轉祕書監幽丨丨丨丨天文地理因有術焉刋竒正字唐顔師古為祕書監専典刋正所有竒書難字衆所共惑隨疑判折曲盡其源十八學士太宗為秦王銳意經籍於宫城之西門建文學館以待四方之士於是杜如晦房元齡等並以本官兼𢎞文館學士圖其形狀上命褚亮為贊藏之書府故號丨丨丨丨時人謂之登瀛洲四明狂客賀知章授祕書臨自號丨丨丨丨及祕書外監稱其五絶虞世南為祕書監太宗丨丨丨丨一徳行二忠直三博學四文辭五書翰謂之五絶祕書省有落星石薛少保畫鶴賀監草書郎餘令畫鳳相𫝊號為四絶元和中韓公武為祕書郎挾彈中鶴一眼時丨丨丨丨職林經史厯象省内本統丨丨及太史丨丨之職後並分為别曹惟主寫書校勘而已兩京雜記書府圖籍唐魏證遷祕書監奏引學校定四部丨自是祕丨丨丨丨燦然畢備筮易圖籍唐崔羣丨丨丨丨果遷祕書監祕書任重丨丨望華史官丨丨唐顔師古制圖書養性國朝真宗以楊徽之兼祕書監占謝便殿命坐屏左右上勞問乆之且曰丨丨之府清靜無事可以丨丨也羣書中禁朕肇開祕府典掌羣書處中禁以宏開非外司之為比化詔芸香之職丨丨丨丨本表朝楊億代謝羣玉之峯自草紫泥之詔遂違丨丨丨丨才氣秀異張舜明字芸叟元祐初司馬光舉舜明丨丨丨丨剛直敢言召試祕書校理東都事略一見偉竒梅詢字昌言咸平三年考進士於崇政殿真宗過殿廬中丨丨詢丨然以為丨召試中書直集賢院東都事略額倣瀛洲建炎南渡稍置館職紹興定制除監少丞外以著作郎佐郎祕書郎校書正字通十二員為丨丨唐丨丨十八學士之數容齋五筆徑躋清要其遷出它司非郎官即御史自乾道以後有㫖須曽任知縣始得除臺察曽任郡守始得為郎三館之士固無有歴此者於是朝廷欲越次擢用乃以為將作軍器少監既班在郎上則無所不可為欲丨丨丨丨者則由著廷祕郎而拜左右二史不然不過兼權省郎年嵗間求一郡而去而御史之除皆歸六院矣同上更迭補外乾道元年正月詔館職所以招延天下之英俊苟丨不親吏事知民情則將來何以備公卿之任今後丨丨丨孝宗㑹要同在館閣宋綬字公垂年十五召試中書省真宗竒其文聽於祕閣讀書乆之召試學士院為集賢校理與父郊丨丨丨丨世以為榮同上賜御書牌太宗飛帛祕閣二字賜李至高宗丨丨丨右文殿丨仍詔將作監米友仁書道山堂牌賜紫章服淳熙五年宋孝宗幸祕書省御製詩一首賜宰臣史浩以下祕書監陳騤少監鄭丙丨丨丨丨雅有文學元豐初除王益柔為祕書監時寄祿官已正議大夫蓋裕陵欲重此選又勝之丨丨丨丨故也又按㑹要初除王益柔係大中大夫龍圖閣直學士非正議自判將作監除吕氏家塾直昭文館李建中𫝊蘇易簡與太宗論文士因及建中太宗亦素知之命丨丨丨丨東都事略崑庭雲圃朱鸞素鵠羣翔於丨閬之丨神萐丹芸列植於丨霄之丨方丈仙瀛効上清之丹府侔丨丨之丨丨瀛洲通籍祕府藏書雲委簡編之富丨丨丨丨朋來俊乂之游蓬萊育才道家丨丨重踐丨丨之地參華藏室拜貶清都丨丨丨丨入預書林見前叨名仙籍乗槎問漢敢妄意於英躔入館登瀛遽丨丨於丨丨眼窺東觀神經祕牒丨丨丨丨之書二星之躔蘭臺金馬天祿石渠既侔東壁丨丨丨丨又冐上帝羣玉之府四部之學籖𢃄紛紜聚丨丨丨丨以充其内紳綏輝煥擇一時之俊以遊其間禁中之署朕大合天下之書宏持丨丨丨丨當太微帝宇之左擬道家蓬萊之山收集英豪錄藏圖籍精選儒匠分