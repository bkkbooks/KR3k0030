漢武帝聚天下文籍於庫内謂中祕書魏晉之際秘書監中書或分或合故云丨丨丨丨宜居三臺之上丞郎之任與南宫相亞祕書郎壁記性耽文章蜀郗正遷祕書澹於名利丨丨丨丨五歳見竒魏鍾㑹字士貴少敏惠夙成中䕶軍蔣濟著論謂觀其眸子足以知人㑹生丨丨濟濟丨者丨之正始中為祕書郎十五對策王承字安期七嵗通易選補國子生丨丨丨丨髙帝除祕書郎中休沐誦書任敬為祕書郎丨丨闔門丨丨圖籍命郎丨丨之府丨汝為丨白集為别駕後召魏王基字伯與黄初中察孝亷除郎中時青土初定刺史王凌特表請基丨丨丨丨丨為祕書郎凌復請還頃之司徒王郎辟基凌不遣郎書劾州曰凡家臣之良則升于公輔公臣之良則入於王職是故古者侯伯有貢士之禮今州取宿衛之臣留祕閣之吏所希聞也與王綏齊名晉中興書王謐弱冠丨丨丨丨丨除祕書郎持筆入芸香祖欽仁檢校祕書郎丨三丨終入丨丨之閣陳子昂集髙府君墓誌決科登館殿榮陽鄧君諸父兄弟或解巾以司讎校或丨丨而丨丨丨含章筮仕多至於斯猶桓公武公之代為卿士蓋善於其職而冝之義也權徳輿祕書壁記欲觀閣内圖籍晉張纘字伯緒為祕書郎丨編丨丨丨丨丨丨使為草蓮等頌宋袁勤學好屬文在陳釋褐為祕書郎嘗丨丨丨丨丨丨當時以盛作陳後主召入禁中使為月賦袁染翰立成後主曰觀謝希逸不能獨美於前矣又使為芝草嘉蓮二頌深見賞重龜年退率同館彭忠肅公丨丨號止堂除祕書郎時傳召姜特立公白丞相留公恐非虚𫝊既而果然留公引李綘事求丨公丨丨丨論奏且勉樞廷爭之遂寢樓攻媿集張闡老死祕書祕書張闡忠肅公時秦檜用事每除臺諫必以其耳目知闡乆次喜論事一日微諷闡謂當入臺闡曰丞相苟見知丨丨丨丨足矣檜黙然由是罷去中興係年錄柳子厚姜君墓誌祕書郎姜㟧字某開元皇帝外孫也始楚國公皎與上游益貴幸子慶初得尚某公主生㟧㟧生三日上曰他物無以餉吾孫即敇有司以第六品誥與緋衣銀魚得通籍出入凡名是官七十某年終不徙然其間在蜀漢荆楚以大諸侯命守州邑輒以勞稱時缺則復命好游嗜音以生貴富畜妓能傳宫中聲賢豪大夫多與連歡後加老風病手足竒右可用不能就官士有載酒來則出妓摶髀笑戯觀者尚識承平王孫故態元和十四年月日終銘曰始賤終貴於世為遂幼榮老窮在物為㓙均之得䘮誰缺誰豐若君者銀朱於始生鐘鼎以及壯不矍矍於進取不施施於驕伉左絃右壺樂以自放雖老而客死未嘗戚乎已與夫拳拳恐悸蒙諂負義得之拘拘榮不蓋愧以終其身而不能止者不猶優乎詩集蓬山丨丨拓雄筆李白詩玉堂上君白丨丨注曾為祕書郎也杜甫贈故相張九齡詩飛騰策丨丨知有丨意度不無伸杜甫寄李十五祕書詩吐竒芬君詩多態度藹藹春空雲東野動驚俗天葩丨丨丨韓愈贈張祕書徹詩入學詣螟蛉漸階羣振鷺丨丨丨丨丨韓愈荅張徹詩清省宜寒夜丨丨丨丨丨仙才稱獨吟喻坦之和范祕書省中詩丹桂影鳳闕蘼蕪與丨丨竒心復竒骨已蔽蒼龍門又丨丨凰丨吳均贈柳祕書古今合璧事類備要後集卷三十六
