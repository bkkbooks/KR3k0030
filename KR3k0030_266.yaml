body:
  text: 古今合璧事類備要别集卷六十宋謝維新撰蔬門薺格物總論薺類亦多比是今人可食者葉可作葅羮亦佳詩所謂其甘如薺是也食之利五臟云事類草可食緑薺丨丨丨本草葉可葅丨丨作丨羮詩云誰謂茶苦其甘如薺是也同上夏侯湛賦見芳薺之時生彼畦疇而獨繁鑽重冰而獨茂蒙嚴霜而發鮮卞伯玉賦有淒淒之緑薺方滋繁於中丘詩集誰謂苦時危始識不世才丨丨荼丨甘如薺杜爛蒸香丨丨丨薺白魚肥坡煮山羮時澆麥田求野薺強為僧舍丨丨丨坡助滋味小著鹽醢丨丨丨微加薑桂發精神風爐歙鉢窮家活妙訣何曾肯授人陸放翁天所賜舍東種早韭生計似庾郎舍西種小果戲學蠶叢鄉惟薺丨丨丨青青被陵岡珍美屏鹽酪耿介凌雪霜采擷無闕日烹飫有祕方候火地壚暖加糝沙鉢香尚嫌雜笋蕨而況汚膏粱炊梗及煮餅得此生輝光吾饞甚易足捫腹喜欲狂一掃萬錢食終老稽山傍放翁食薺春來美日日思歸飽蕨薇丨丨薺丨忽忘歸傳誇真欲嫌荼苦自笑何時得瓠肥同前蕨附薇格物總論薇蕨也根如紫草莖有青紫色末如小兒拳春二三月採山中人作茹食之事類采西山武王已平殷伯夷叔齊恥之義不食周粟隱于首陽山丨薇而食之及餓且死作歌曰登彼丨丨兮采其薇矣以暴易暴兮不知其非矣神農虞夏忽焉沒兮我安適歸矣吁嗟徂兮命之衰矣遂餓死于首陽山注薇蕨也史伯夷傳采南山晉齊王冏秉政張翰謂顧榮曰天下紛紛未已吾本山林人無望于時久矣宜丨丨丨蕨飲三江水晉書蛇成蕨郤鑒鎮丹徒二月出獵有甲士折一枝食之覺心中淡淡成疾後吐一小丨懸屋前漸乾丨丨遂明此物不可生食搜神記伯夷采薇歌見前詩集疾採山中丨丨薇杜飢採丨捉丨蕨筐白樂天北山蕨秋風吹几杖不厭丨丨丨杜西山蕨飢食丨丨丨山谷爭復茹丨丨丨藜蕨韓思歸飽日日丨丨丨蕨薇放翁小兒拳蕨牙已作丨丨丨百氏集小兒臂庖鳯烹龍世浪傳猩唇熊掌我無緣只逢笋蕨杯盤日便是山林富貴天云云丨丨紫丨未開拳只嫌嶺外無珍饌一味春蔬不直錢楊廷秀採蕨女石間丨丨丨鬻菜輸官曺杜采蕨人西山丨丨丨蓬首尚傾國懷哉逺莫致引脛勢已塞頃筐忽墮前此意豈易得良遇不可遲枯笻有餘力朱文公萵苣格物總論苣數種有苦苣有白苣又有紫苣皆可食葉有白毛為白苣紫色為紫苣苦味為苦苣即野苣也又名褊苣今人家常食者白苣江外嶺南吳人無白苣嘗植野苣以供厨僎生食之所謂萵苣也事類不甲拆既雨已秋堂下小畦植萵苣向二旬矣而萵苣丨丨丨傷時君子或晚得微祿轗軻不進云送菜闕園官丨丨把本丨數日矧苦苣馬齒掩乎嘉蔬傷小人害君子菜不足道也並杜詩序詩集藉以綺苣兮蔬之常隨事宜其子破塊數席間荷鋤功易止兩旬不甲拆空惜埋泥滓野莧迷汝來宗此實于此此輩豈無秋亦蒙寒露委翻然出地連滋蔓户庭毁因知邪干正掩抑至沒齒云云刺如針清晨蒙菜把常荷地主恩守者愆實數略有其名存苦苣丨丨丨云云乃知苦苣輩傾奪蕙草根並杜菠薐格物總論菠薐外國種莖微紫葉圓而長緑色性冷食之利五臟通腸胃與蛆魚同食佳事類頗陵語訛本西國中自丨丨國將其子來丨丨爾劉禹錫録嘉話詩集鐵甲北方苦寒今未已雪底菠薐如丨丨坡金鏃丨丨因形製臨軒發永歡時危思擷佩客客莫紉蘭屏山莧格物總論莧數種有馬齒有鼠齒又有所謂粳莧赤莧白莧紫莧紅莧人莧惟人白二莧入藥用餘皆作􅀢茹事類馬齒野莧丨丨莧也杜詩注鱉化不可以莧菜與鱉同食則生丨癥試以鱉甲如豆片大者以莧菜封裹之置於土坑內上以土蓋之一宿盡變成鱉也圖注禾草齋前自種蔡撙為吳興守丨丨丨丨白莧詔褒其清南史詩集葉亦繁馬齒丨丨丨迷汝來野莧丨丨丨杜全篇見苣門腸肚集三年國子師丨丨丨藜莧韓愈胡顔入莧也無所施丨丨丨筐篚杜蒿格物總論蒿多種一名蔞蒿一名同蒿一名邪蒿邪蒿根葉似青蒿細軟味辛溫作羮食良宜與胡荽同食同蒿不及也事類有不正名北齊邢峙為博士授太子經厨進食有菜曰邪蒿峙命去之曰菜丨丨丨之丨非殿下所宜食顯祖嘉之通鑑詩集煮節澗蔬丨蒿丨坡掇芳爛蒸香薺白魚肥碎點青蒿涼餅滑宿酒初消春睡起細履幽畦丨丨粹滿地竹外桃花三兩枝春江水暖鴨先知蔞蒿丨丨蘆芽短正是河豚欲上時同上胡荽格物總論胡荽根苗莖葉皆細可同邪蒿食及作羮良并人呼為香荽冬蔬也今有一種名石胡荽亦名鵝不食草止堪入藥用非此事類撒一巡沖晦處士李退夫者為事矯怪居京師北郊一日種胡荽俗傳王人口誦猥語則茂皇祐館閣中或談論則曰宜丨胡荽丨丨江南野録詩集闕藜藿格物總論秦荻藜生于菜中最香美生下濕地所在而有藿豆葉也事類藜羮孔子厄於陳蔡丨丨不糝莊子藿食子路事見前米注如七牢吕龜蒙復友生書讀古聖人書每㴠咀義味獨坐日是案上一杯藜羮丨五鼎丨丨饋於左右笠澤叢書太史公自序啜糲粱之食藜藿之羮王子淵得賢頌羮藜含糗者不足與論牢之滋味詩集常乏斟藜羮丨丨丨淵明試問甘丨丨丨藜藿未可羡輕肥飱詎糝盤丨丨丨藜園但蒿寂寞天寶後丨蘆丨丨藜並杜蕪菁格物總論蕪菁即蘿蔔其葉謂之蕪菁一名蔓菁也以菘小董根微辛事類諸葛菜丨丨亮所止必令兵士種蔓菁者取其才出甲生啖一也葉舒可煮食二也久居隨以滋長三也棄去不惜四也回則易尋而采之五也冬有根可煮食六也比諸蔬其利不亦博乎三蜀之人呼蔓菁為丨丨丨劉得夢詩集蕪菁花黃黃丨丨丨韓昌黎蘆蔔根中有丨丨丨尚含曉露清坡苗過茁蕪菁丨丨丨張文潛根生葉蔓菁宿丨已丨丨坡淨如練全城上酥丨丨丨注食之蘆蔔也谷甜底氷雪白蘆蔔非蘆蔔喫來自是辣底玉花葉蔓菁非蔓菁喫來自是丨丨丨楊誠齋近蒂微青密壤深根蒂風霜已飽經如何純白質丨丨染丨丨屛山巢菜格物總論巢蜀菜一名漂搖草一名野蠶豆一名元修菜事類種之東坡下菜之美者有吾鄉之巢故人元修嗜之余亦嗜之元修云使孔北海見當復云吾家菜耶因謂之元修菜余去鄉十有五年思而不可得見元修適自蜀來見余於黃乃作是詩使歸致其子丨丨丨丨之丨坡詩注如在醴泉時蜀蔬有兩巢大巢豌豆之不實者小巢生稻畦中東坡所謂元修菜是也吳中絶多漂搖草草一名野蠶豆但人不知取食耳豫小舟過梅市得之始以作羮風味宛丨丨丨丨蟇頤丨也放翁詩序詩集苗葉彼美君家菜鋪田緑茸茸夏莢圓且小槐芽細而豐種之秋雨餘擢秀繁霜中欲花而未蕚一一如青蟲是時青裙女採擷何匆匆蒸之復湘之香色蔚其􅀈點酒下鹽豉縷橙芼薑蔥那知雞與豚但恐放筯空春盡丨丨老耕翻煙雨叢潤隨甘澤化暖作青泥融始終不我負力與糞壤同我老忘家舍楚音變兒童此物獨嫵媚終年擊余胸君歸致其子囊盛勿函封張騫移苜蓿適用如葵菘馬援載薏苡羅生等蒿蓬懸知東坡下脊鹵化千鍾長使齊安人持此説兩翁豌巢昏昏霧兩暗衡茅兒水隨宜治酒殽便覺此身如在蜀一盤龍餅是豌巢陸放翁蜀中雜彘肉作巢饅頭甚佳風爐煮冷落無人佐客庖庾郎三九困譏嘲此行匆似蟆洋路自繼丨丨丨卜巢苜蓿格物總論苜蓿北人甚重江南人不甚食以其無味也然此菜名外國别有所謂苜蓿草也非此事類張騫採大宛馬嗜苜蓿漢使張騫因採葡萄苜蓿歸種博物志薛令詩閩川長溪縣丨丨之登第開元中為東宫侍讀官作苜蓿詩以自歎元宗至東宫見其詩舉筆續之啄木觜距長鳳凰毛羽短若嫌松桂寒任逐桑榆暖薛遂謝病歸坡詩注詩集天馬􅔷丨丨常丨苜蓿花李白宛馬肥丨丨總丨春苜蓿還同楚客詠江蘺李商隱苜蓿多秋山丨丨丨杜苜蓿長朝日上團團照見先生盤盤中何所有丨丨丨闌干飯澀匙難綰羮稀箸覺寬只宜謀旦夕何由保嵗寒薛令之葵格物總論葵數種此菜葵也葉為百菜主味甘美性滑利夏末種至秋採之者謂之秋葵秋種至冬採之者謂之冬葵至春作子可入藥用事類何所食周顒事見菘注今所食蔡朗事見蓴注詩集香宜配丨丨丨緑葵杜蓴格物總論蓴生水中葉似鳬葵春夏生莖而未葉名雉蓴細長肥滑至八月葉舒長名絲蓴九月至十一月名豬蓴又曰龜蓴又有石蓴絲繁者諸菜之中蓴為第一事類思鱸鱠晉張翰吳人為大司馬東曹掾見秋風起乃丨吳中菰菜蓴羮丨丨曰人生貴適志何能羈官數千里以要名爵乎遂命駕而歸本傳敵羊酪王武子食前有羊酪問陸雲曰吳中何以丨此雲答曰千里蓴羮未下鹽豉世説呼為露有蔡朗者父諱純遂丨蓴菜丨丨丨面牆之徒遞相倣效有士人聘齊主客郎李恕問曰江南有露葵否答曰露葵是蓴菜水鄉所出今所食者緑葵耳顔氏家訓虞贊元西征記蓴羮不糝鱸魚自香詩集蓴絲熟枯豉丨丨丨白樂又豉化丨丨丨杜蓴絲弱弱強飯丨丨丨端居茗續煎杜羮蓴滑丨煮秋丨丨杜羮蓴弱煮丨秋丨丨白樂天還鄉念丨丨丨蓴菜劉長一官輕丨丨已久丨爐蓴坡煮龍涎蓴羮鮮滑丨丨丨盧贊元割龍髯鮫人直下白龍潭丨得丨公滑碧丨曉起相傳蘂珠闕夜來失却水晶簾一杯淡煮宜醒酒千里何須下豉鹽可是士衡殺風景却將羶膩比清纎楊誠齋晚筋落盤空我夢扁舟震澤風蓴羮丨丨丨丨丨那知嶺表炎蒸地也有青絲滿碧籠張于湖瓠格物總論瓠亦瓜也一曰匏藤生數種葉大盈尺實青白色大尺圍長二尺許有毛又一種葫蘆樣皆中有瓤瓤中子不計其數今一種名絲瓜一名天羅絮一名布瓜緑深色有紋及斑斑點子有長二三尺者又一種名稍瓜形稍類絲瓜然色白味不及也又一種名冬瓜大三尺圍長四五尺有毛緑色生自然白粉瓜莫此之大也事類瓠不成仲冬行秋令則瓜丨丨丨月令匏不食吾豈丨瓜也哉焉能繫而丨丨論語七月食瓜詩七月八月斷壺同前魏王遺瓠惠王謂莊子曰丨丨丨我大丨之種注大瓠者言護落無所不容也莊子張蒼如瓠丨丨身長大肥白丨丨如壺不足殺蜀先主以張裔為益州太守徑往至郡雍闓趦趄不賓假鬼教曰張府君如瓠壷外雖澤而內實粗不足殺令縳與吳張裔傳去毛莫拗折盧懷謹為相詐儉召客食曰爛蒸丨丨丨丨丨項客疑鵝鴨已而下栗米飯一器胡蘆一枚而已唐史詩集結白花束薪已零落瓠葉轉蕭疏幸丨丨丨了寧􅀈青蔓除杜子美上它條笑殺桑根甘瓠黃亂他桑葉丨丨丨向人更逞瘦藏巧却到桑梢挂一瓢楊誠齋須上屋匏瓠放他丨丨丨名賢集中有齒溉釜熟輪囷香清味仍美一線醉瓊瑶丨丨佳人丨所山茄格物總論茄叢生枝莖髙二三尺葉大如掌四五月結實大於拳有蒂中有瓤瓤中有子凡三色或青或紫或白本草一名洛蘇事類自種蔡撙為吳興守齋前丨丨白莧紫茄詔褒其清南史改名隋煬帝丨丨茄子為崑崙紫瓜芝用録問故事段成式食茄子偶丨張周封茄子丨丨張云具食療本草雜爼張浮休頌身纍百贅頸附千疣采之不勤茹之頗柔詩集色勝銀藜藿盤中生精神珍蔬長蒂丨丨丨朝來鹽醯飽滋味已覺瓜瓠謾輪囷谷謝送銀茄粟嚼冰白金作顆非椎成中有萬丨丨丨丨戎州夏畦少蔬供感君來􅀈在僧家白銀色君家水茄丨丨丨殊勝埧裹紫彭亨蜀人生踈不下筯吾與北人俱眼明並同前紫皮膚青丨丨丨類宰官光圓頭腦作腮看如何緇俗偏同嗜入口元來總一般鄭安晚濃黛抹映葉乳茄丨丨丨張文潛得銀色畦丁收盡垂露實葉底猶藏十二三待丨丨丨已成殼更當乞種過江南谷謝送銀茄薑格物總論薑苗髙三尺葉似箭竹葉而長兩兩相對苗青根黃無花實八九月採根為茹味辣今所在有之事類孔不撤丨子丨丨薑食不多食論語裴不嘗梁周舍占對辨捷嘗與裴子野語及嗜好子野云從來未嘗食薑舍應聲曰孔稱不撤丨乃丨丨一座皆悅南史到老愈辣秦會之使人諭宴亨復宴答曰為我謝秦公薑桂之性丨丨丨丨長編詩集醃費糟丘名園萬家城千畦等封侯斸當燕去前丨芽丨丨丨無筯偃王笑有味三閭羞寄入翰林席聖以不撒優又寄蓬門下作賦誰肯休唯我廣文舍免為虀鹽仇劉公漢家裔才學歆向儔胸懷飽經史辨論出九州曾不奉權貴但與故人投贈辛非贈甘此意當自求梅聖俞謝劉原父糟薑似勻粧指新芽肌理膩映日淨如空恰丨丨丨丨柔尖淺帶紅屏山論去穢功薑云能損心此謗誰與雪請丨丨丨丨神明看朝撤朱文公古今合璧事類備要别集卷六十
