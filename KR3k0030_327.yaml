丨官治鐡課歲數十萬以便民奏罷金賦李紘知歙縣初縣産金以代賦後金盡而輸賦如初因丨丨之表除牛産吕公綽知鄭州常行春訽民疾苦或言近歲藉民牛為産民懼役重不蓄故田疇多荒嘆曰先朝不征農器正為此爾遽丨丨之奏减口稅蔡襄為福建轉運丨丨閩人五代時丁丨丨之半隱漏以物自占昭紀令人得以律占租不以實家長不自書罰金二斤没入所不自占隱度定辭也武帝時律外取故令家長各丨丨丨丨墾田相方光武時天下墾田多不實帝見陳留吏牘上有書云潁川𢎞農可問河南南陽不可問帝詰吏不服顯宗曰以丨丨丨丨耳河南帝城多近臣南陽帝郷多近親田宅踰制不可准也鈎檢帳符宇文融時天下户版刓隱人多去本藉浮食閭里詭脫徭賦豪弱相并州縣莫能制融由監察御史陳便宜請校天下籍收匿戸羡田佐用度𤣥宗以融為覆田勸農使丨丨丨丨得偽軺車一筭非吏比者三老北邉騎士丨丨丨丨注軺車小車也比例也非為吏人之例非為三老非為北邉騎士而有丨丨皆令出丨丨漢食貨志舟舡一筭舡五丈以上一筭匿不自吿吿不悉戍邉一歲没入緍錢有能告者以其半畀之漢食貨志𢎞羊排商桑丨丨令遠方各其物如異時商賈所轉販者為賦而相灌輸大農諸官盡籠天下諸侯之貨物貴則賣之賤則買之如此冨商大賈亡所牟大利反所物不得騰躍豫立簿注蘇瓌徙同州刺史時十道使括天下亡戸初不立藉人畏搜括即流入比縣旁州更相瘦蔽瓌請罷十道使專責州縣丨丨丨丨天下同日閲正盡一月止使柅奸匿歲一括實檢制租調以免勞弊根檢稅籍南渡紹興十三年倉部員外郎王循友言國家平昔漕發江淮荆浙六路之栗六百二十餘萬和糶之數又在其外而近歲上供之數纔二百八十餘萬除淮南湖北彫殘最甚蠲放之外兩浙號為膏膄沃衍粒米充羡初無不耕之土而較之舊額亦虧五十萬石此盖梲藉欺隱豪强巨室詭名挾戸多端以害之比者兩浙漕臣建議欲正經界朝廷從而行之者若使盡䆒隱田庶㡬供輸可足舊額欲望訓敇諸路漕臣各令丨丨丨丨之失從之李勃上言渭南長源鄉户四百今纔四十閿鄉户三千而今于他州縣大抵類此推其弊始於攤逃人之賦假令十室五逃則均責未逃者若抵石于井不極泉不止誠由聚歛之臣割下媚上願下詔一賜禁止計不三年人必歸于農夫農國之本本立而太平可議矣老泉先生衡論古之稅重乎今之稅重乎周公之制園㕓二十而税一近郊十一遠郊二十而三稍甸縣都皆無過十二漆林之征二十而五盖周之盛時其尤重者至四分而取一其次者乃五而取一然後以次而輕始至於十一而又有輕者也今之稅雖不啻十一然而使縣官無急征無横歛則亦未至乎四而取一與五而取一之為多也是今之稅與周之稅輕重之相去無㡬也雖然當周之時天下之民歌舞以樂其上之盛徳而吾之民反慼慼不樂常若擢筋剥膚以供億其上周之稅如此吾之稅亦如此而其民之哀樂何如此之相遠也其所以然者盖有由矣周之時用井田井田廢田非耕者之所有而有田者不耕也耕者之田資於富民富民之家地大業廣阡陌連接募召浮客分耕其中鞭笞驅役視以奴僕安坐四顧指麾於其間而役屬之民夏為之耨秋為之穫無有一人違其節度以嬉而田之所入已得其半耕者得其半有田者一人而耕者十人是以田者日累其半以至於富强耕者日食其半以至於窮餓而無告夫使耕者至於窮餓而不耕不穫者坐而食富强之利猶且不可而况富强之民輸租於縣官而不免於怨歎嗟憤何則彼以其半而供縣官之稅不若周之民以其全力而供其上之稅也周之十一以其全力而供十一之稅也使以其半供十一之稅猶用十二之稅然也况今之稅又非特止於十一而已則宜乎其怨歎嗟憤之不免也噫貧民耕而不免於饑富民坐而飽且嬉又不免於怨其弊皆起於廢井田蘇東坡榖梁義先王之為天下也不求民以其所不為不强民以其所不能故其民優游而樂易周之盛時其所賦取於民者莫不有法故民不告勞而上不闕用及其衰也諸侯恣行其所以賦取於民者唯其所欲而刑罸隨之故其民至於窮而無告夫民之為農而責之以工也是猶居山者而責之以舟楫也魯成公作丘甲而春秋譏焉榖梁傳曰古者農工各有職甲非人人之所能為也丘作甲非正也而杜預以為古者四丘為甸甸出長轂一乗戎馬四匹牛十二頭甲士三人步卒七十二人而魯使丘出之也夫四丘而後為甸魯雖重斂安至於四倍而取之哉哀公用田賦曰二吾猶不足而夫子譏其殘民之甚未有四倍而取者也且夫變古易常者春秋之所譏也故書作三軍舍中軍初稅畆作丘甲用田賦者皆所以譏政令之所由變也而榖梁杜氏之說如此之相戾安得不辨其失而歸之正哉故愚曰榖梁之說是東坡公羊義古者公田曰藉藉借也言其借民力以治此也詩曰兩我公田遂及我私言民之必先公田也傳曰私田稼不善則非吏公田稼不善則非民言上之必䘏私田也民先其公而上䘏其私故民不勞而上足用也宣公無恩信於民民不肯盡出力於公田故按行擇其善畝而稅之公羊傳曰稅畝者何履畝而稅也夫民不盡力於公田者上之過也宣公不責已悔過而擇其善畝而稅之宜其民之謗而災異之作也稅畝之明年冬蝝生公羊傳曰蝝生不書此何以書幸之也猶曰受之云爾上變古易常應是而有天灾其諸則宜於此焉變矣何休以為宣公懼而復古故大有年愚以為非也春秋書作三軍後又書舍中軍書躋喜公後又書從祀先公事之復正未嘗不書宣公而果復古也春秋當有不稅畝之書故何休之説愚不信也東坡䇿别自兩稅之興因地之廣狹瘠腴而制賦因賦之多少而制役其初盖甚均也責之厚賦則其財足以供責之重役則其力足以堪何者其輕重厚薄一出於地而不可易也戸無常賦視地以為賦人無常役視賦以為役是故貧者鬻田則賦輕而富者加地則役重此所以度民力之所勝亦所以破兼并之門而塞僥倖之源也及其後世歲月既久則小民稍稍為姦度官吏耳目之所不及則雖有法禁公行而不忌今一戸之賦官知其為賦之多少而不知其為地之㡬何也如此則增損出入惟其意之所為官吏雖明法禁雖嚴而其勢無由以止絶且其姦常起於貿易之際夫鬻田者必窮廹之人而所從鬻者必富厚有餘之家富者恃其有餘而邀之貧者廹於饑寒而欲其速售是故多取其地而少入其賦有田者方其窮困之中茍可以緩一時之急則不暇計其他月之利害故富者地日以益而賦不加多貧者地日以削而賦不加少又姦民欲計免於賦役者割數畝之地加之數倍之賦而收其少半之直者或者亦貪其直之㣲而取焉是以數十年來天下之賦大抵淆亂有兼并之族而賦甚輕有貧弱之家而不免於重役以至於破敗流移而不知其所往其賦存而其人亡者天下皆是也夫天下不可以有一倖倖也天下有一人焉僥倖而免則亦必有一人焉不幸而受其弊今天下僥倖者如此之甚則其不幸而受弊者從可知矣三代之賦以什一為輕今之法本不至於什一而取然天下嗷嗷然以賦歛為病者豈其歲久而姦生偏重而不均以至於此歟雖然天下皆知其為患而不能言何者勢不可也今欲按行其地之廣狹瘠腴而更制其賦之多寡則姦吏因縁為賄賂之門其廣狹瘠腴亦將出於其意之喜怒而其患益深是故士大夫畏之而不敢議而臣以為此最易見者頋弗之察耳夫易田者必有契契必有所直之數其所直之數必得其廣狹瘠肥之實而官必據其所直之數而取其易田之稅是故欲知其地之廣狹瘠腴可以其稅推也久遠者不可復知矣其數年之間皆足以推較求之故府猶可得而見茍其稅多者則知其直多其直多者知其田多且羙也如此而其賦少其役輕則夫人亡而賦存者可以有均矣鬻田者皆以其直之多少而給其賦重為之禁而使不敢以不實之直而書之契則夫自今已往者貿易之際為姦者其少息矣要以知凡地之所直與凡賦之所宜多少而以稅參之如此則一持籌之吏坐於帳中足以周知四境之内實不過數月而民得以少蘇不然十數年之後將不勝其弊重者日以輕輕者日以重而未知其所終也詩集盡輸蠶絲丨丨稅機杼空倚璧柳宗元田家歸賣屋姑舂婦檐輸促促輸官不足丨丨丨宗元植田家詞不得食老翁家貧在山住耕種山田二四畝苖疎稅多丨丨丨輸入官食化為土張籍野老歌呌租吏我在山上舍一畝蒿磽田夜雨丨丨丨春聲暗交關李賀督賦鞭撻貢彤庭所分帛本自寒女至丨丨其夫家聚歛丨城闕聖人筐篚恩實欲邦國活杜甫自京赴奉天誅求急亂世丨丨丨黎民糠籺窄杜駈摘蒼耳促戚哀丘凶久相踐徭賦得閑慢丨丨不可丨寛政錢致患韋應物書情詩官索租縣丨急丨丨租稅從何出杜兵車詩吏徴租門外唯有吏日來丨丨更索錢韓重生行薄賦近休明悽惻念誅求薄歛丨丨丨杜甫簡元使君蠲免减賦誰能叩君門下令丨征丨杜寛征田宅樂丨丨杜常免生丨丨租稅名不𨽻征伐杜自京赴奉先縣半减惻惻詔書下丨丨麥與緍半租豈不薄尚竭力與筋元稹旱灾逋負黠吏成索錢多門户䘮亂紛敖敖奈何丨丨徒漁奪丨逋逃杜甫遣遇淍氓積丨丨丨逋稅韋應物逃亡屋二月賣新絲五月糶秋榖醫得眼前瘡剜了心頭肉我願君王心化作光明燭不照綺羅筵偏照丨丨丨聶夷中古今合璧事類備要外集卷二十七
