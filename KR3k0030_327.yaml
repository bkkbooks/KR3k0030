body:
  text: 古今合璧事類備要外集卷二十七宋謝維新撰賦役門賦稅附督賦逋負擅賦不輸重斂蠲免薄賦期限代納預借賦稅總論古之善治其國而愛養斯民者必立經常簡易之法使上愛物以養其下下勉力以事其上上足用而下不困故量人之力而授之田量地之産而取以給公上量其入而出之以為用度之數是三者常相須以濟而不可失失其一則不能守其二及暴君庸主縱其佚欲而茍且之吏從之變制合時以取寵於其上故用於上者無節而取於下者無藝民竭其力而不能供由是上愈不足而下愈困則財利之説興而聚斂之臣用記曰寧畜盜臣盜臣誠可惡然一人之害爾聚斂之臣用則經常之法壞下不勝其弊焉事類時入以時丨之禮歲取倬彼甫田丨丨十千詩夏貢禹别九州隨山濬川任土作貢書又夏后氏五十而貢貢者較數歲之中以為常樂歲粒米狼戾多取之不為虐則寡取之凶年糞其田而不足則必取盈焉注民耕五十畝貢上五畝孟殷助丨人七十而丨注耕七十畝者以七畝助公家周徹丨人百畝而丨注耕百畝者徹取十畝以為賦並孟禹貢九賦冀州厥賦惟上上錯上上第一錯雜出第二之賦兖州厥賦正州第九賦正與九相當青州厥賦中上第四徐州厥賦中中第五揚州厥賦下上上錯第七雜出第六荆州厥貢上下第三豫州厥賦錯上中第二雜出第一梁州厥賦下中三錯第三雜出第七第九三等雍州厥賦中下第六庶土交正底慎財賦咸則三壤成賦中邦周禮九賦太宰以九賦斂財賄一曰邦中之賦在城郭者二十而稅二曰四郊之賦三曰山澤邦甸之賦二百里四曰家削之賦三百里五曰邦縣之賦四百里六曰邦都之賦五百里各有差此已上平民也七曰關市之賦八曰山澤之賦關市山澤謂占會百物九曰敝餘之賦百工之餘什一而徹哀公問於有若曰年飢用不足如之何對曰盍徹乎曰二吾猶不足如之何其徹也注周法丨丨而稅謂之徹徹通也為天下之通法二謂什二而稅語十二九一而助滕文公使畢戰問井地孟子曰子之君將行仁政選擇而使子子必勉之夫仁政必自經界始經界不正井地不均榖祿不平是故暴君汚吏必慢其經界云云夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子請野丨丨丨丨國中什一使自賦精多粗少五百里甸服百里服納總甸服內之百里近王城者禾稿曰總入之供飼國馬二百里納銍銍刈謂禾穗三百里納秸服秸稿也服力役四百里粟五百里米所謂精者少粗者多輕近重遠凡任地國宅無征園㕓二而一近郊十一逺郊二十而三甸稍縣鄙都皆無過十二漆林二十而五按載師職之周禮丨丨而丨丨國多役園㕓輕者利㕓無榖園少始司其征晉惠公賂秦伯以河外列城五東盡虢略南及華山內及解梁城秦始征晉河東置官司焉注征賦也左僖十五使食其征宋武公之世鄋瞞伐宋司徒皇父帥師禦之耐班御皇父充石公子榖甥為石司寇牛父駟乘以敗狄于長丘獲長狄緣斯皇父之二子死焉宋公於是以門賞耐班丨丨丨丨謂之耐門注云門關門征稅也左文十一收所與稅周人與范氏田公孫龎焉注龎范氏臣為范氏丨丨丨田之丨左可使治賦子路千乘之國丨丨丨其丨語更為稅法周顯王二十一年秦鞅丨丨賦丨丨行之十五稅一漢興接秦之敝諸侯並起民亡蓋藏自天子不能具駟而將相或乘牛車上於是於約法省禁輕田租丨丨而丨丨量吏祿度官用以賦民而山澤園池市肆租稅之入自天子以至封君湯沐邑皆各為私奉養不領於天子之經費食貨志三十稅一孝景二年令民半出田租丨丨而丨丨又王莾下令曰漢氏減輕田租丨丨而丨丨常有更賦罷癃咸出而豪民侵陵分田劫假厥名三十實什稅五也同上又後漢光武建武六年詔曰頃者師旅未解用度不足故行十一之稅今軍士屯田糧儲差積其令郡國收見田租丨丨丨丨如舊制本記田輸鄉輸唐食貨志凡授丨者一歲丨粟二斛稻三斛謂之祖丁隨丨所出歲丨絹二匹綾絁二丈布加五之一非蠶鄉則輸銀十四兩謂之調如楊州租調以錢嶺南以米安南以絲益州以羅紬綾絹供春綵後因詔江南亦以布代租夏輸秋輸自開元後天下户籍久不更造丁口轉死田畝賣易貧富升降不實其後國家侈費無節而大盜起兵興財用益屈而租庸調之法弊壞自代宗時始以畝定稅而斂以夏秋至德宗相楊炎遂作兩稅法丨丨無過六月丨丨無過十一月置兩稅使以總之量出制入戶無主客以居者為簿人無丁中以貧富為差商賈稅三十之一與居者均役田稅視大歷十四年墾田之數為定議者以租容調髙祖太宗之法也不可輕改而德宗方信用炎不疑也計錢而輸貞元四年詔天下兩稅審等第髙下三年一定户自初定兩稅貨重錢輕乃計錢而輸綾絹既而物價愈下所納愈多雖賦不增舊而民愈因送使之餘憲宗分天下之賦以為三一曰上供二曰送使三曰留州宰相裴垍又令諸道節度觀察調費出於所治州不足則取於屬州而屬州丨丨丨丨與其上供者皆輸度支釐定常賦裴垍先是天下賦法有三上供曰送使曰留州建中初丨丨丨丨有物重錢輕其後輕重相反民輸率一倍其初而所在以留州送使之入捨公占更實私直以自開之故賦益苛齊民重困垍奏禁勘定兩稅王彥威纍擢諫議大夫李師道既平其十二州賦法未均詔彥威為丨丨丨丨使差量纎息人不為煩置使督察韋堅見宇文融楊謹矜父子以聚斂進乃運江淮租賦所在丨丨丨丨以佐國廩歲終增巨萬玄宗咨其材選官部送崔造同中書門下平章事建言天下兩稅請委本道觀察使刺史丨丨丨丨京師名數不同乾道六年臣僚言郡守下車首請屬邑督責財賦必使點如數方許還邑此之謂獻助錢責委郡丞職幕官下邑檢責下邑官認發錢物抑無為有增少為多此之謂剗刷錢二稅就州輸納既倍收合耗重價折科又率其今零就整一寸納一尺一合納一升謂之寄零錢酒稅不照用祖額止從重數謂之遞年課利錢至於催到上供錢物類申發鈔狀到州多行截留先填舊欠别行催發謂之改鈔錢及當支散春冬衣賜拋降數目拘催謂之軍衣錢又有無額經總制之類不一而足籍為定數按月解發曰板帳曰綱目曰格目又有所謂月樁并青册子數所在州縣丨丨丨丨是皆迫于縣之色目也督賦府遣督賦楊城為道州觀察府遣判官督賦至州怪城不迎以問吏吏曰刺史以為有罪自囚於獄判官驚馳入謁城曰使君何罪我奉命來候安否爾留之數日城不敢歸杜門闔寢館外以待命判官遽辭而去吏白督租韋溫為陜虢觀察使民當輸租而麥未熟吏更白溫督之溫曰使民貨田中穗以供賦可乎為緩期而賦辦俾民自輸韋宙永州刺史縣舊置吏督賦宙丨丨丨丨家十相保常先期不忍催督太宗雍熙二年間上曰近年以來每念百姓寒耕熱耘營求衣食國家若非贍飬軍旅兩稅亦丨丨丨丨而况非理誅求乎擅賦殷侑違制丨丨徙天平節度以餉軍有贏當上送官乃裁制經費歲月錢十五萬緡粟五萬石歸有司御史大夫溫造劾侑丨丨擅賦斂民為無名之獻詔以庾承宣代還茂宗恃恩張茂宗元和中歷間廄使初至德時西戎陷隴西監及七廄皆廢而間廄私其地入寶應初始以其地給貧民丨丨丨丨奏悉收其賦重斂率割夏王丨丨夏邑注謂桀之賦斂重讎斂商紂用乂丨丨召敵讎不怠並尚書碩鼠丨丨刺重斂也魏國之人刺其君重斂蠶食於民不修其政貧而畏人若大鼠也疏蠶食者蠶之食桑漸漸以食使桑盡也猶君重斂漸漸以稅使民困也詩攘雞戴盈之曰什一去關市之征今兹未能請輕之以待來年然後已何如孟子曰今有人日丨其鄰之丨者或告之曰是非君子之道曰請損之月丨一丨以待來年然後已如知其非義斯速已矣何待來年孟聚斂季氏富於周公求也為之丨丨而附益之子曰非吾徒也小子鳴鼓而攻之可也厚斂齊晏平仲曰公丨丨焉陳人厚施人歸之又晉靈公不君丨丨以雕墻左田賦季孫欲作丨丨訪仲尼仲尼曰斂從其薄事舉其中如是丘亦足矣若不度於禮則雖丘賦將不足也左丘賦鄭子産作丨丨國人謗之曰其父死於路已為蠆尾以令於國國將若之何注丘十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦又謂其父子國為尉氏所殺今重賦毒害百姓三分稅二秦人收太半之賦丨丨丨丨分也二千笇一光武時賈人夫作稽積諸物雖物無市籍各以其物自古率錢丨丨而一丨也稅外加斂嚴礪節度東川擅沒吏民田宅百餘丨丨丨丨餘錢籍外過取宇文融為覆田勸農使户部侍郎楊㻛以為丨丨取稅百姓困弊得不酬失額外過取見後人不堪命詳剔屋賣田狄仁傑拜河北安撫大使時民多脅從於賊賊已去懼誅逃匿仁傑上疏曰比緣軍興調發煩重傷破家産丨丨丨丨人不為售鬻苖輸租李實正元二十年旱關輔飢實方務聚斂乃峻責租調人窮無告至徹舍丨丨丨官貞元二十貨穗供賦韋溫為陜虢觀察使民當輸租而麥未熟吏更白督之溫曰使民貨田中穗以供賦可乎為緩期而賦辨鍾傳重斂丨丨拜鎮南節度丨丨商人至棄其貨嚴武峻斂丨丨在蜀用度無藝蜀雖富饒而丨掊亟丨閭里為空巨源下符韋丨丨同平章事丨丨斂克劉餗結恩丨丨為宣州刺史宣既富饒即厚斂以丨丨人不堪命劉晏初州縣取富人督漕挽謂之船頭主郵遞謂之捉驛稅外橫取謂之白著丨丨丨丨皆去為盜賊晏始以官船漕而吏主驛事人不堪求盧徴同州刺史缺用徴為之乃徙華州厚結權近冀進用同華地迫而貧所獻常觳陋至徴厚賦斂有所奉入輒加常數丨丨丨其丨旬輸月送楊炎河南山東荆襄科斂凡數百名廢者不削重者不去新舊仍積不知其涯百姓竭膏血鬻親愛丨丨丨丨無有休息炎疾其敝家至日取吳越錢鏐世常重斂其民以事奢僣下至雞魚卵鷇必丨丨而丨丨每笞一人以責其負則諸案吏各持簿列于庭凡一薄所負唱其多少量為笞數少者猶積數十多者至笞百餘人不堪其苦給耗一斗周顯德上以漕運自晉漢以來不給斗耗綱吏多以虧欠扺死詔自今每斛丨丨丨丨加耗一斗上封者言諸路轉運司廣要出剩求媚於上以民輸賦稅已是大半賦又令加耗謂之潤官江西諸路州軍體例百姓納米一石出剩一斗往往有聚斂之臣丨丨之外更要丨丨且以江西一路歲百萬石為凖若每石耴米一斗以百萬石計之所收已及一十萬石若於民間取十萬石耗米入官則下民必食貴米此且粗引一路之弊况天下之廣賦稅之饒其弊無極臣恐諸路轉運使尚有似此無名刻削願陛下閲其奏目或有橫加收斂名為出剩立賜絀貶詔止絶之桞宗元捕蛇説永州之野産異蛇黑質而白章觸草木盡死以齧人無禦之者然得而臘之以為餌可以已大風攣踠瘻癘去死䏎殺三蟲其始太醫以王命聚之歲賦其二募有能捕之者當其租入永之人爭奔走焉有蔣氏者專其利三世矣問之則曰吾祖言死於是吾父死於是今吾嗣為之十二年幾死者數矣之貌若甚戚者余悲之且曰若毒之乎余將告于蒞事者更若役復若賦則何如蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久已病矣自吾氏三世居是鄉積於今六十歲矣而鄉鄰之生日蹙殫其地之出竭其廬之入號呼而轉徙飢渴而頓踣觸風雨犯寒暑呼噓毒癘往往而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死而徙爾而吾以捕蛇獨存悍吏之來吾鄉呌囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉