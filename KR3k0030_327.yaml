body:
  text: 古今合璧事類備要外集卷二十七宋謝維新撰賦役門賦稅附督賦逋負擅賦不輸重歛蠲免薄賦期限代納預借賦稅總論古之善治其國而愛養斯民者必立經常簡易之法使上愛物以養其下下勉力以事其上上足用而下不困故量人之力而授之田量地之産而取以給公上量其入而出之以為用度之數是三者常相須以濟而不可失失其一則不能守其二及暴君庸主縱其佚欲而茍且之吏從之變制合時以取寵於其上故用於上者無節而取於下者無藝民竭其力而不能供由是上愈不足而下愈困則財利之說興而聚歛之臣用記曰寜畜盜臣盜臣誠可惡然一人之害爾聚歛之臣用則經常之法壊下不勝其弊焉事類時入以時丨之禮歲取倬彼甫田丨丨十千詩夏貢禹别九州隨山濬川任土作貢書又夏后氏五十而貢貢者較數歲之中以為常樂歲粒米狼戾多取之不為虐則寡取之凶年糞其田而不足則必取盈焉注民耕五十畝貢上五畝孟殷助丨人七十而丨注耕七十畝者以七畝助公家周徹丨人百畝而丨注耕百畝者徹取十畝以為賦並孟禹貢九賦冀州厥賦惟上上錯上上第一錯雜出第二之賦兖州厥賦正州第九賦正與九相當青州厥賦中上第四徐州厥賦中中第五揚州厥賦下上上錯第七雜出第六荆州厥貢上下第三豫州厥賦錯上中第二雜出第一梁州厥賦下中三錯第三雜出第七第九三等雍州厥賦中下第六庶土交正底慎財賦咸則三壤成賦中邦周禮九賦太宰以九賦歛財賄一曰邦中之賦在城郭者二十而稅二曰四郊之賦三曰山澤邦甸之賦二百里四曰家削之賦三百里五曰邦縣之賦四百里六曰邦都之賦五百里各有差此已上平民也七曰關市之賦八曰山澤之賦關市山澤謂占會百物九曰敝餘之賦百工之餘什一而徹哀公問於有若曰年饑用不足如之何對曰盍徹乎曰二吾猶不足如之何其徹也注周法丨丨而稅謂之徹徹通也為天下之通法二謂什二而稅語十二九一而助滕文公使畢戰問井地孟子曰子之君將行仁政選擇而使子子必勉之夫仁政必自經界始經界不正井地不均榖禄不平是故暴君汚吏必慢其經界云云夫滕壤地褊小將為君子焉將為野人焉無君子莫治野人無野人莫養君子請野丨丨丨丨國中什一使自賦精多麤少五百里甸服百里服納緫甸服内之百里近王城者禾槀曰緫入之供飼國馬二百里納銍銍刈謂禾穗三百里納秸服秸槀也服力役四百里粟五百里米所謂精者少麤者多輕近重遠凡任地國宅無征園㕓二而一近郊十一逺郊二十而三甸稍縣鄙都皆無過十二漆林二十而五按載師職之周禮丨丨而丨丨國多役園㕓輕者利㕓無榖園少始司其征晉惠公賂秦伯以河外列城五東盡虢略南及華山内及解梁城秦始征晉河東置官司焉注征賦也左僖十五使食其征宋武公之世鄋瞞伐宋司徒皇父帥師禦之耏班御皇父充石公子榖甥為石司㓂牛父駟乗以敗狄于長丘獲長狄縁斯皇父之二子死焉宋公於是以門賞耏班丨丨丨丨謂之耏門注云門關門征稅也左文十一収所與稅周人與范氏田公孫龎焉注龎范氏臣為范氏丨丨丨田之丨左可使治賦子路千乘之國丨丨丨其丨語更為稅法周顯王二十一年秦鞅丨丨賦丨丨行之十五稅一漢興接秦之敝諸侯並起民亡盖藏自天子不能具駟而將相或乗牛車上於是於約法省禁輕田租丨丨而丨丨量吏禄度官用以賦民而山澤園池市肆租税之入自天子以至封君湯沐邑皆各為私奉養不領於天子之經費食貨志三十稅一孝景二年令民半出田租丨丨而丨丨又王莾下令曰漢氏减輕田租丨丨而丨丨常有更賦罷癃咸出而豪民侵陵分田刼假厥名三十實什稅五也同上又後漢光武建武六年詔曰頃者師旅未觧用度不足故行十一之税今軍士屯田糧儲差積其令郡國収見田租丨丨丨丨如舊制本記田輸鄉輸唐食貨志凡授丨者一歲丨粟二斛稻三斛謂之祖丁隨丨所出歲丨絹二匹綾絁二丈布加五之一非蠶鄉則輸銀十四兩謂之調如楊州租調以錢嶺南以米安南以絲益州以羅紬綾絹供春綵後因詔江南亦以布代租夏輸秋輸自開元後天下户籍久不更造丁口轉死田畝賣易貧富升降不實其後國家侈費無節而大盜起兵興財用益屈而租庸調之法弊壞自代宗時始以畝定稅而歛以夏秋至徳宗相楊炎遂作兩稅法丨丨無過六月丨丨無過十一月置兩税使以總之量出制入戸無主客以居者為簿人無丁中以貧富為差商賈稅三十之一與居者均役田税視大歴十四年墾田之數為定議者以租容調髙祖太宗之法也不可輕改而徳宗方信用炎不疑也計錢而輸貞元四年詔天下兩税審等第髙下三年一定户自初定兩稅貨重錢輕乃計錢而輸綾絹既而物價愈下所納愈多雖賦不增舊而民愈因送使之餘憲宗分天下之賦以為三一曰上供二曰送使三曰留州宰相裴垍又令諸道節度觀察調費出於所治州不足則取於屬州而屬州丨丨丨丨與其上供者皆輸度支釐定常賦裴垍先是天下賦法有三上供曰送使曰留州建中初丨丨丨丨有物重錢輕其後輕重相反民輸率一倍其初而所在以留州送使之入捨公佔更實私直以自開之故賦益苛齊民重困垍奏禁勘定兩税王彦威累擢諫議大夫李師道既平其十二州賦法未均詔彦威為丨丨丨丨使差量纎息人不為煩置使督察韋堅見宇文融楊謹矜父子以聚歛進乃運江淮租賦所在丨丨丨丨以佐國廩歲終增巨萬𤣥宗咨其材選官部送崔造同中書門下平章事建言天下兩税請委本道觀察使刺史丨丨丨丨京師名數不同乾道六年臣僚言郡守下車首請屬邑督責財賦必使㸃如數方許還邑此之謂獻助錢責委郡丞職幕官下邑檢責下邑官認發錢物抑無為有增少為多此之謂剗刷錢二稅就州輸納既倍収合耗重價折科又率其今零就整一寸納一尺一合納一升謂之寄零錢酒稅不照用祖額止從重數謂之逓年課利錢至於催到上供錢物類申發鈔狀到州多行截留先填舊欠别行催發謂之改鈔錢及當支散春冬衣賜抛降數目拘催謂之軍衣錢又有無額經總制之類不一而足籍為定數按月解發曰板帳曰綱目曰格目又有所謂月樁并青冊子數所在州縣丨丨丨丨是皆廹于縣之色目也督賦府遣督賦楊城為道州觀察府遣判官督賦至州恠城不迎以問吏吏曰刺史以為有罪自囚於獄判官驚馳入謁城曰使君何罪我奉命來候安否爾留之數日城不敢歸杜門闔寢舘外以待命判官遽辭而去吏白督租韋温為陜虢觀察使民當輸租而麥未熟吏更白温督之温曰使民貨田中穂以供賦可乎為緩期而賦辦俾民自輸韋宙永州刺史縣舊置吏督賦宙丨丨丨丨家十相保常先期不忍催督太宗雍熈二年間上曰近年以來每念百姓寒耕熱耘營求衣食國家若非贍飬軍旅兩稅亦丨丨丨丨而况非理誅求乎擅賦殷侑違制丨丨徙天平節度以餉軍有贏當上送官乃裁制經費歲月錢十五萬緡粟五萬石歸有司御史大夫温造劾侑丨丨擅賦歛民為無名之獻詔以庾承宣代還茂宗恃恩張茂宗元和中歴閑廐使初至徳時西戎䧟隴西監及七廐皆廢而閑廐私其地入寳應初始以其地給貧民丨丨丨丨奏悉収其賦重歛率割夏王丨丨夏邑注謂桀之賦歛重讎歛商紂用乂丨丨召敵讎不怠並尚書碩䑕丨丨刺重歛也魏國之人刺其君重斂蠶食於民不修其政貧而畏人若大䑕也疏蠶食者蠶之食桑漸漸以食使桑盡也猶君重歛漸漸以稅使民困也詩攘雞戴盈之曰什一去關市之征今兹未能請輕之以待來年然後已何如孟子曰今有人日丨其鄰之丨者或告之曰是非君子之道曰請損之月丨一丨以待來年然後已如知其非義斯速已矣何待來年孟聚歛季氏富於周公求也為之丨丨而附益之子曰非吾徒也小子鳴鼓而攻之可也厚歛齊晏平仲曰公丨丨焉陳人厚施人歸之又晉靈公不君丨丨以雕墻左田賦季孫欲作丨丨訪仲尼仲尼曰歛從其薄事舉其中如是丘亦足矣若不度於禮則雖丘賦將不足也左丘賦鄭子産作丨丨國人謗之曰其父死於路已為蠆尾以令於國國將若之何注丘十六井當出馬一匹牛三頭今子産别賦其田如魯之田賦又謂其父子國為尉氏所殺今重賦毒害百姓三分稅二秦人収太半之賦丨丨丨丨分也二千笇一光武時賈人夫作稽積諸物雖物無市籍各以其物自古率錢丨丨而一丨也稅外加歛嚴礪節度東川擅没吏民田宅百餘丨丨丨丨餘錢籍外過取宇文融為覆田勸農使户部侍郎楊㻛以為丨丨取稅百姓困弊得不酬失額外過取見後人不堪命詳剔屋賣田狄仁傑拜河北安撫大使時民多脅從於賊賊已去懼誅逃匿仁傑上䟽曰比縁軍興調發煩重傷破家産丨丨丨丨人不為售鬻苖輸租李實正元二十年旱關輔饑實方務聚歛乃峻責租調人窮無告至徹舍丨丨丨官貞元二十貨穗供賦韋温為陜虢觀察使民當輸租而麥未熟吏更白督之温曰使民貨田中穗以供賦可乎為緩期而賦辨鍾傳重歛丨丨拜鎮南節度丨丨商人至棄其貨嚴武峻歛丨丨在蜀用度無藝蜀雖富饒而丨掊亟丨閭里為空巨源下符韋丨丨同平章事丨丨歛克劉餗結恩丨丨為宣州刺史宣既富饒即厚歛以丨丨人不堪命劉晏初州縣取富人督漕輓謂之船頭主郵逓謂之捉驛税外横取謂之白着丨丨丨丨皆去為盜賊晏始以官船漕而吏主驛事人不堪求盧徴同州刺史缺用徴為之乃徙華州厚結權近冀進用同華地廹而貧所獻常觳陋至徴厚賦歛有所奉入輒加常數丨丨丨其丨旬輸月送楊炎河南山東荆襄科歛凡數百名廢者不削重者不去新舊仍積不知其涯百姓竭膏血鬻親愛丨丨丨丨無有休息炎疾其敝家至日取吳越錢鏐世常重歛其民以事奢僣下至雞魚卵鷇必丨丨而丨丨每笞一人以責其負則諸案吏各持簿列于庭凡一薄所負唱其多少量為笞數少者猶積數十多者至笞百餘人不堪其苦給耗一斗周顯徳上以漕運自晉漢以來不給斗耗綱吏多以虧欠扺死詔自今每斛丨丨丨丨加耗一斗上封者言諸路轉運司廣要出剰求媚於上以民輸賦稅已是大半賦又令加耗謂之潤官江西諸路州軍體例百姓納米一石出剰一斗往往有聚歛之臣丨丨之外更要丨丨且以江西一路歲百萬石為凖若每石耴米一斗以百萬石計之所収已及一十萬石若於民間取十萬石耗米入官則下民必食貴米此且粗引一路之弊况天下之廣賦稅之饒其弊無極臣恐諸路轉運使尚有似此無名刻削願陛下閲其奏目或有横加収歛名為出剰立賜絀貶詔止絶之桞宗元捕虵説永州之野産異蛇黒質而白章觸草木盡死以齧人無禦之者然得而腊之以為餌可以已大風攣踠瘻癘去死䏎殺三蟲其始太醫以王命聚之歲賦其二募有能捕之者當其租入永之人爭奔走焉有蔣氏者專其利三世矣問之則曰吾祖言死於是吾父死於是今吾嗣為之十二年㡬死者數矣之貌若甚慼者余悲之且曰若毒之乎余將告于蒞事者更若役復若賦則何如蔣氏大戚汪然出涕曰君將哀而生之乎則吾斯役之不幸未若復吾賦不幸之甚也嚮吾不為斯役則久已病矣自吾氏三世居是鄉積於今六十歲矣而鄉鄰之生日蹙殫其地之出竭其廬之入號呼而轉徙饑渇而頓踣觸風雨犯寒暑呼嘘毒癘徃徃而死者相藉也曩與吾祖居者今其室十無一焉與吾父居者今其室十無二三焉與吾居十二年者今其室十無四五焉非死而徙爾而吾以捕蛇獨存悍吏之來吾鄉呌囂乎東西隳突乎南北譁然而駭者雖雞狗不得寧焉吾恂恂而起視其缶而吾蛇尚存則弛然而卧謹食之時而獻焉退而甘食其土之有以盡吾齒盖一歲之犯死者二焉其餘則熈熈而樂豈若吾郷鄰之旦旦有是哉今雖死乎此比吾鄉鄰之死則已後矣又安敢毒耶余聞而愈悲孔子曰苛政猛於虎也吾嘗疑乎是今以蔣氏觀之尤信鳴呼孰知賦稅之毒有甚是虵者乎故為之說以俟天觀人風者得焉胡致堂讀史管見受稅而取耗雖非良法誠以給用猶不使民使費今觀世宗之言則知晉漢間取雀䑕耗及省耗未嘗為他用直多取以實倉庫耳比及輸運其當給耗反不與之或責之綱吏或還使所出州縣補其虧數亡身破家不可勝數誰實使之一以法令從事曾無惻隱之心為撫民安國之道也不寧惟是凡輸錢者亦輸運之之直陸曰歩費水曰舟費乂有貫朽之費錢非農民所有既苦之輸矣而重苦之欲農民之無怨而不窮也難矣不宜取而取者省耗靡費是也當與而不與者漕運斗耗是也世宗既與之善矣省耗應罷而未罷豈惟以多事故未及邪明宗潞王可謂窘闕猶放逋祖數百萬世宗誠欲蠲除省耗又何難哉薄賦薄征荒政十二聚萬民二曰丨丨又大札則令邦國丨丨薄歛量力而供事舉其中歛從其薄則有周公之典在尹鐸繭絲趙簡子使丨丨為晉陽鐸曰將為丨丨乎抑為保障乎曰保障哉白圭貉道丨丨曰吾欲二十而取一何如孟子曰子之道丨丨也萬室之國一人陶可乎曰不可器不足用也曰夫貉五榖不生惟黍生之無城郭宫室宗廟祭祀之禮無諸侯幣帛饔飱無百官有司故二十取一而足也今居中國去人倫無君子如之何其可也陶以寡且不可以為國况無君子乎欲輕之於堯舜之道者大貉小貉也欲重之於堯舜之道者大桀小桀也慮其傷民本朝年太祖開寳六初蜀民所輸兩稅皆以疋帛充折其後市價愈髙而官所収止依舊例上丨丨丨丨詔西川諸州凢以匹帛折稅並凖市價代納命代民租錢徽貶江州刺史州有牛田錢百萬刺史以給宴飲贈餉者徽曰此農耕之備可他用哉丨丨貧丨丨入賜貸民賦李絳字深之李錡誅憲宗將輦取其貲絳與裴垍諫曰錡僣侈誅求六州之人怨入骨髓今元惡傳首若因取其財恐非遏亂畧惠綏困窮者願丨今道丨貧丨租丨制可燕樂他用王仲舒水旱民賦不入歎曰我當㓕丨丨丨丨可乎詔出錢二千萬代之本傳詔㫖需索李泌請天下供錢歲百萬給宫中勸不受私獻凡丨丨丨丨即代兩稅則方鎮可以行法而天下紓矣紓下戸賦崔羣處州刺史苖稷進羡錢七百萬羣以受之失信天下請還賜其州以丨丨丨之丨輸下戸租髙承簡遷邢州刺史觀察府責賦尤急承簡代下戸數百丨租逋負檐負輸納倪寛為左内史治民務在得人心表奏開六輔渠定水令以廣溉田収租稅時裁闊狹與民相假貸以故租多不入後有軍發左内史以負租課殿當免民聞皆恐失之大家牛車小家檐負輸租詔書蠲逋張建封會丨丨丨民丨賦帝問如何答曰殘逋積負決無可驗雖蠲除之百姓尚無所益歛畿民逋李實貞元二十年旱關輔饑實方務聚歛乃峻責租調人窮無告詔書蠲人逋租實格詔固丨丨丨大困免屬州負孔戣拜嶺南節度使既至丨丨丨逋丨十八萬緡米八萬斛黄金稅錢八百兩虚額徴率其間人戸逃移田地荒廢乂近河州縣每年河路吞㓎沙宛則近日有砂礫填掩百姓稅額已定皆是丨丨丨丨其間有豪冨廣占阡陌十分田地纔稅二三致稅窮獨逋亡稅賦不辨州縣轉破實在於斯元稹同州均田狀肆誣徴剥貶李實為通州長史政乖恵和務在苛厲特詔逋租悉皆蠲免敢丨丨罔復令丨丨煩紊朝廷之法實惟聚歛之臣朕寜蠧政以害齊人悉蠲逋稅五代徐知誥事吳王盡恭以吳王命丨丨天祐十三年以前丨丨餘俟豊年乃輸之不督逋稅後梁均王貞明二年魏州稅多逋負晉王以讓司録趙季良季良曰殿下何時當平河南王怒曰汝職在督稅職之不修何敢與我軍事季良對曰殿下方謀攻取而不愛百姓一旦百姓離心恐河北亦非殿下之有况河南乎王恱謝之蠲免勿収後唐潞王初帝以劉昫代判三司昫命判官髙延賞鉤考窮覈皆積年逋欠之數姦吏利其徴貴匄取故存之昫具奏其狀且使請察其可徴者急督之必無可償者悉蠲之韓昭嗣極言其便八月詔長興以前户部及諸道逋租三百三十八萬虚煩簿籍咸丨丨丨丨貧民大恱而三司吏怨之其後聞昫罷相三司吏皆相賀蠲放過多本朝至道三年開封府以歲旱蠲十七縣民租時有飛語聞上言按田官司欲収民情所丨丨皆不實太宗不恱詔東西諸州選官閲視亳州當案太康咸平二縣州遣欽若行欽若覆案甚詳按疏言田實旱開封正放七分今乞全放既而他州所遣官並言諸縣放稅丨丨悉追放所収稅物人皆為欽若危之踰年而上即位於是擢用欽若因以其事證輔臣曰當此時朕亦自懼欽若小官獨敢為百姓伸理此臣節也欽若既為三司屬虞部員外郎母賓古謂欽若曰天下宿逋自五代訖今理督未已民病不能勝僕將啓而丨之欽若即夕命吏治其數翌日上之留上大驚曰先帝顧不知邪欽若徐曰先帝固知之殆與陛下收天下心爾上感悟卒從其言按逋欠籍真宗咸平元年上謂宰相曰諸路丨丨先朝毎有赦宥皆令蠲放而有司不認朝㫖尚更理納頗聞細民愁嘆遣使乘傳與諸路轉運使州軍長吏按百姓逋丨文丨悉除之始用王欽若之言也除逋欠凡厚一千餘萬釋繫囚三千餘人上由是眷欽若益引逋負官咸平四年三司都催欠司丨對丨丨丨四人上親按問凡七日釋三千六百餘人蠲所逋負約二百七十餘萬已趣督納而非理者以内庫還之身役者給其家上逋欠數六年判三司催欠司楊覃上蠲放天下逋欠計八百萬請付史館從之諸路積欠神宗熈寧四年詔蠲天下見欠貸糧揔計米一百六十六萬八千五百石