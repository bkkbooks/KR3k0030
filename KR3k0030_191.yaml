body:
  text: 古今合璧事類備要續集卷四十一宋謝維新撰性行門讒毁事理發揮讒毁小人之所為也其禍常加於君子世無明智之君鮮能不為所惑者彼其所以為是讒毁之言者以忠為佞指正為邪乘間以投之浸潤以入之人主一不致其察則小者擯斥大者誅戮而善類空矣故舜之堲讒說禹之慮巧言湯之懼匪彛武王之戒比德良有以也事類異言少皥氏有不才子毁信廢忠崇飾丨丨靖譖庸回服讒搜慝以誣盛德天下之民謂之窮竒左文十八年邇言舜好問而好察丨丨記中庸巧言何憂乎歡兜何遷乎有苗何畏乎丨丨令色孔壬書浮言汝曷弗告朕胥動以丨丨恐沈于衆書流言管叔及其羣弟乃丨丨於國曰公將不利於孺子書金縢聽讒采苓刺晉獻公也獻公好丨丨焉詩懼讒采葛丨丨也詩鬼蜮何人斯蘇公刺暴公也暴公為卿士而譖蘇公焉故蘇作是詩以絶之為丨為丨則不可得有靦面目視人罔極作此好歌以極反側詩貝錦巷伯刺幽王也寺人傷於讒故作是詩也萋兮斐兮成是丨丨彼譖人者亦已太甚詩如或酬君子信讒丨丨丨之君子不惠不舒究之詩小辨出自口蛇蛇碩言丨丨丨矣巧言如簧顔之厚矣巧言無得踰焉叔孫武叔毁仲尼子貢曰仲尼不可毁也他人之賢者丘陵也猶可踰也仲尼日月也丨丨而丨丨語止或尼之魯平公將見孟子嬖人臧倉曰何哉君所為輕身以先於匹夫以為賢乎禮義由賢者出孟子之後喪踰前喪君無見焉曰諾樂正子入見曰克告於君君為來見也嬖人有臧倉者沮君君是以不果來也孟子曰行或使之丨丨丨丨行止非人之所能為也吾之不遇魯侯天也臧氏之子焉能使吾不遇哉孟子浸潤膚受子張問明子曰丨丨之譖丨丨之訴不行焉可謂明也已矣語讒諂面諛夫茍不好善則人將曰訑訑豫既已知之矣訑訑之聲音顔色拒人於千里之外士止於千里之外則丨丨丨丨之人至矣與丨丨丨丨之人居國欲治可得乎孟譖二公子晉獻公以驪姬為夫人生奚齊其娣生卓子及將立奚齊既與中大夫成謀姬謂太子曰君夢齊姜必速祭之太子祭於曲沃歸胙於公公田姬置諸宫六日公至毒而獻之公祭諸地地墳與犬犬斃與小臣小臣亦斃姬泣曰賊由太子太子奔新城遂縊姬遂丨丨丨丨曰皆知之重耳奔蒲夷吾奔屈左僖四年譖諸鄭伯齊轅宣仲怨鄭申侯之反已於召陵故勸之城其賜邑曰美城之大名也子孫不忘吾助子請乃為之請於諸侯而城之美遂丨丨丨丨曰美城其賜邑將以叛也申侯由是得罪左僖五年每一出令屈原楚同姓為懷王左徒入則與王圖議國事以出號令出則接遇賔客應對諸侯王甚任之上官大夫與之同列爭寵而心害其能讒之曰王使屈平為令衆莫不知丨丨丨丨平伐其功曰以為非我莫能為也王怒而疏平史原𫝊然三遺矢趙王思復用廉頗而頗亦思復用於趙王使使者視頗頗之仇郭開多與使者金毁之使還報曰廉將軍雖老尚善飯丨與臣坐頃之丨丨丨矣趙王以為老遂不召本𫝊毁惡蒙氏趙髙親近日夜丨丨丨丨求其罪過舉劾之䝉恬𫝊謀害賈生絳灌東陽侯馮敬之屬丨丨之乃短丨丨曰雒陽之人年少初學賈誼𫝊嫉惡鄒陽鄒陽介於公孫詭羊勝之間勝等嫉陽惡之梁王孝王怒下之吏本𫝊廷毁絳侯絳侯為丞相朝罷趨出意得甚上禮之恭常目送之袁盎進曰陛下以丞相為何如人上曰社稷臣盎曰絳侯所謂功臣非社稷臣云云丞相如有驕主色竊為陛下不取也後朝絳侯望盎曰吾與而兄善令兒廷毁我盎遂不謝袁盎𫝊奏言望之蕭望之與史髙𢎞恭石顯忤上初即位謹讓重改作恭顯奏望之堪更生朋黨相稱舉數譖訴大臣毁離親戚欲以専權擅勢為臣不忠誣上不道請謁者召致廷尉上不省為下獄可其奏本𫝊誣譖張猛石顯丨丨丨丨令自殺於公車更生傷之乃著疾讒摘要劉向𫝊㑹變行譖樊豐丨太史言星丨逆丨遂其丨楊震有詔遣歸本郡震行至城西夕陽亭因飲鴆卒後震傳希㫖虛誣順帝時諸除官多不以次及李固在事奏免百餘人此等既怨又丨望冀丨遂共作飛章丨丨固罪曰大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿後坐策免後李固𫝊誣告李膺河內張成善風角推占遂教弟子殺人河南尹李膺督促收捕競案殺之初成交通宦官帝亦頗信其占成弟子牢修因上書丨丨膺等養太學遊士交接諸郡生徒共為部黨誹訕朝廷於是天子震怒班下郡國逮捕黨獄遂起後黨錮𫝊誣殺杜喬李固見廢羣臣側足而立唯杜喬正色無所回撓及清河王蒜事起為冀所誣死獄中杜喬傳阿黨親戚左右有毁魏徴丨丨丨丨者帝使溫彥博按訊非是彥博曰徴為人臣不能著形迹逺嫌疑而被飛謗唐魏徴𫝊當輔少主劉泊與褚遂良不相中帝征遼東還遂良即誣奏洎曰國家不足慮正丨丨丨丨行伊霍事火臣有異者誅之帝愈問狀洎引馬周為左遂良藝不已帝惑之乃賜死劉洎傳因譖李充陸贄既罷相裴延齡丨丨丨丨張滂李銛黨於贄失勢怨望動搖衆心四月貶贄為忠州别駕充等皆貶長史隂擠裴度裴度在相位知無不言皇甫鏄之黨丨丨之詔度以門下侍郎同平章事充河東節度使並通監德宗紀譖出崔羣初羣臣議上尊號皇甫鏄欲增孝德字同平章事崔羣曰言聖則孝在其中矣鏄乃譖羣於陛下惜孝德二字上怒時鏄給邊軍賜不時得軍欲為亂鏄密言於上曰邊賜如舊人情忽如此由羣鼓扇將以賣直歸怨於上上以為然出羣為湖南觀察使唐憲宗紀譖貶僧孺李德裕怨牛僧孺李宗閔言於上曰劉從諫據上黨十年太和中入朝僧孺宗閔執政不留之加宰相縱去以成今日之患竭天下之力乃能取之皆二人之罪也又求與從諫交通書皆自焚毁上大怒三貶僧孺循州長史宗閔長流封州通監趙玭詆趙普本朝太祖開寶四年前右監門衛將軍丨丨既勒歸私第不勝忿恚一日伺趙普入朝馬前斥普短上聞之召玼及普於便殿而質其事玼大言詆普販木規利聨巨筏至京師治第故玼以為言上怒欲逐普詔問王溥溥附閣門使奏云玼誣罔大臣上意頓解反詰責玼命武士撾之御史鞠於殿廷普力營救上乃特寬其罰長編德超誣曹彬弭丨丨丨丨丨事成期得樞使及副使大失望一日詬王顯曰我度上無執守為汝輩所眩惑顯等告其事上怒德超除名流瓊州長編蒙正不自辨呂丨丨初相時倉部貟外郎張紳知蔡州坐贓免或言於上曰紳洛中豪家安肯受賕乃蒙正未第時丐索於紳不能如意致其罪耳上即命復紳官蒙正終不丨丨未幾罷相㑹考課院得紳舊事實狀乃黜之於是蒙正復相上謂曰張紳果實犯贓蒙正亦不謝長編公著未嘗辨呂正獻公丨丨平生未嘗較曲直聞謗丨丨丨也少時書於座右曰不善加已直為受之蓋其初自懲艾也如此家孰記欽若害寇準契丹既和上待準厚王欽若深害之一日㑹朝準先退上目送準欽若因進曰陛下敬畏寇準為其有社稷功耶上曰然欽若曰臣不意陛下出此言澶淵之役陛下不以為恥而謂準有社稷功何也上愕然曰何故欽若曰城下之盟雖春秋時小國猶恥之澶淵之舉是盟於城下也何恥如之上愀然不能答且曰陛下聞博乎博者輸錢欲盡乃罄所有出之謂之孤注陛下寇準之孤注也由是上顧準稍衰欽若排安仁上議立皇后趙安仁謂劉德妃家世寒微不如沈才人出於相門上雖不樂然察其守正不罪也他日與王欽若從容論方今大臣誰最為長者丨丨欲丨丨丨乃譽之曰無若趙安仁上曰何以言之欽若曰安仁昔為故相沈義倫所知至今不忘舊德常欲報之上默然始有意斥安仁矣欽若毁楊億翰林學士楊億以疾求解退職闕屈原離騷經帝髙陽之苗裔兮朕皇考曰伯庸攝提貞于孟陬兮惟庚寅吾以降皇覽揆余初度兮肇錫余以嘉名名余曰正則兮字余曰靈均紛吾既有此內美兮又重之以修能扈江蘺與薜芷兮紉秋蘭以為佩汨余若將不及兮恐年嵗之不吾與朝搴阰之木蘭兮夕攬洲之宿莽日月忽其不淹兮春與秋其代序惟草木之零落兮恐美人之遲暮撫壯而棄穢兮何不改其此度策騏驥以馳騁兮來吾導夫先路昔三后之純粹兮固衆芳之所在雜申椒與菌桂兮豈惟紉夫蕙茝彼堯舜之耿介兮既遵道而得路何桀紂之昌披兮夫惟捷徑以窘步惟黨人之偷樂兮路幽昧以險隘豈余身之憚殃兮恐皇輿之敗績匆奔走以先後兮及前王之踵武荃不察余之中情兮反信讒而齊怒余固知謇謇之為患兮忍而不能舍也指九天以為正兮夫惟靈修之故也曰黃昏以為期兮羌中道而改路初既與余成言兮後悔遁而有他余既不難夫别離兮傷靈修之數化余既滋蘭之九畹兮又樹蕙之百畝畦蒥荑與揭車兮雜杜衡與芳芷兾枝葉之葰茂兮願俟時乎吾將刈雖萎絶其亦何傷兮哀衆芳之蕪穢衆皆競進以貪婪兮憑不厭乎求索羌內恕巳以量人兮各興心而嫉妬忽馳騖以追逐兮非余心之所急老冉冉其將至兮恐修名之不立朝飲木蘭之墜露兮夕餐秋菊之落英茍余情其信姱以練要兮長䫲頷亦何傷攬木根以結茝兮貫薜荔之落蘂矯菌桂以紉蕙兮索胡繩之纚纚蹇吾法夫前修兮非世俗之所服雖不周於今之人兮願依彭咸之遺則云云楚辭賈誼弔湘賦絳灌東陽侯馮敬之屬毁誼曰雒陽之人年少初學専欲擅權紛亂諸事於是天子後亦踈之不用其議以誼為長沙王太傳誼既謫去意不自得及渡湘水為賦以弔屈原其辭曰恭承嘉惠兮俟罪長沙仄聞屈原兮自湛汨羅造託湘流兮敬弔先生遭世罔極兮乃隕厥身烏呼哀哉逢時不祥鸞鳳伏竄兮鴟梟翺翔闒茸尊顯兮讒諛得志賢聖逆曵兮方正倒植謂隨夷溷兮謂跖蹻廉莫邪為純兮鉛刀為銛于嗟默默生之亡故兮斡棄周鼎寶康瓠兮騰駕罷牛驂蹇驢兮驥垂兩耳服鹽車兮章甫薦屨漸不可久兮嗟若先生獨離此咎兮訊曰已矣國其莫余知兮獨一鬱其誰語鳳縹縹其髙遰兮夫固自引而逺去襲九淵之神龍兮沕深潛以自珍偭蟂獺以隱處兮夫豈從蝦與蛭蚓所貴聖之神德兮逺濁世而自臧使麒麟可係而羈兮豈云異夫夫羊般紛紛其離此尤兮亦夫子之故也歷九州而相其君兮何必懷此都也鳳凰翔于千仞兮覽德輝而下之見細德之險微兮遙增擊而去之彼尋常之汙瀆兮豈容吞舟之魚橫江湖之鱣鯨兮固將制於螻蟻本𫝊詩集衆女妬二桃殺三士詎假劒如霜丨丨丨蛾眉雙花竟春芳魏姝信鄭袖掩袂對懷王一惑巧言子朱顔成死傷行將泣團扇戚戚愁人腸李懼讒羣兒愚李杜文章在光熖萬丈長不知丨丨丨何用故謗傷蚍蜉撼大木可笑不自量韓調張籍古今合璧事類備要續集卷四十一
