body:
  text: 古今合璧事類備要前集卷十宋謝維新撰歲時門歲事類日周日月俱起日行一度積三百六十五度四分度之一而周天一匝名曰歲後律厯志星行郭璞曰歲取丨丨一次祀取四時一終年取禾一熟載取物終歲更始也爾雅注夏曰歲商曰祀周曰年唐虞曰載寒暑寒往則暑來暑往則寒來丨丨相推而歲成焉易係辭春秋春秋二以目歲注孟康曰春萬物生秋萬物成舉丨丨以目一歲前律厯志期日乾之䇿二百一十有六坤之䇿百四十冇四三百有六十當丨之丨係辭閏月咨汝羲暨和期三百六旬有六日以丨丨定四時成歲書堯典一終晉侯曰十二年矣是謂丨丨一星終也歲星十二嵗而一周天左傳十紀春秋緯稱自開闢至於獲麟凡三百二十七萬六千嵗分為丨丨一曰九頭紀二曰五龍紀三曰攝提紀四曰合雒紀五曰連通紀六曰序命紀七曰修飛紀八曰回提紀九曰禪通紀十曰流訖紀史記歲星歲在金穰水毁木飢火旱同上嵗名太隂在寅丨丨攝提格在卯名單閼在辰名執徐在已名大荒落在午名敦牂在未名叶洽在申名涒灘在酉名作鄂在戍名閹荗在亥名大淵獻在子名困敦在丑名赤奮若寅在甲曰閼逢卯在乙曰旃蒙辰在丙曰柔兆巳在丁曰強圉午在戊曰著雍未在己曰屠維申在庚曰上章酉在辛曰重光戌在壬曰元黓亥在癸曰昭陽淮天文訓歲星主丨丨丨嵗事為歲首李尋傳天氣周孔子曰嵗三百六十日而丨丨丨八卦周事各四十五日而備嵗事易乾陽主嵗陽出布施於主而上嵗功使隂伏于下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成嵗為名仲舒傳閏成功立丨定時以丨嵗丨後律厯志太宰受會天官丨丨之職嵗終則令百官府各正其治丨其丨周禮司會質成司會以嵗之成質於天子記正嵗觀治象小宰贊冡宰受嵗會嵗終則令羣吏致事丨丨帥治官之屬而丨丨丨之法禮天官冢宰嵗杪制國用冡宰制國用必于丨之丨五榖皆入然後丨丨丨記王制詩集斗移一别星橋夜三移斗柄春杜詩燭轉三嵗如轉燭同上三聞蟬一入石渠署丨丨宫樹丨劉禹鍚五愁螢一别丨丨丨杜二見草離居在咸陽丨丨秦丨緑李白五落葉丨丨洞庭丨三江逰未還同上月事類繫時春秋以日繫月以月丨丨左序積日丨丨成月後律厯志分至月者所以紀丨丨也前律厯志隂雨丨丨者月之餘魏略鈞象三十斤成丨一月之丨也前律厯志卿士丨丨惟月尚書洪範五紀協用丨丨一曰嵗二曰月同上三微天有丨丨之月十一月陽氣始養黃泉之下萬物始赫赫然感陽之氣也故周為天正十二月萬物始牙故殷為地正正月萬物孚甲而出故夏為人正白虎通月陽丨丨月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰室在辛曰塞在壬曰終在癸曰極爾雅月名正月為陬二月為如三月為寎四月為余五月為臯六月為且七月為相八月為壯九月為玄十月為陽十一月為辜十二月為塗斗指丨正月丨寅二月指卯三月指辰四月指巳五月指午六月指未七月指申八月指酉九月指戌十月指亥十一月指子十二月指丑終而復始準天文訓律中正月丨丨太簇二月律中夾鍾三月律中姑洗四月律中中吕五月律中㽔賓六月律中林鍾七月律中夷則八月律中南吕九月律中旡射十月律中應鍾十一月律中黃鍾十二月律中大吕月令為一嵗以十二月丨丨丨淮南子成百榖嵗月日時無易百榖用成尚書洪範日事類五紀協用丨丨一曰嵗二曰月三曰日注周十二辰為一日書洪範十時日之數十故有丨丨之數亦當十位注日中當王食時為公平旦為卿雞鳴為士夜半為皂人定為輿黃昏為𨽻日入為僚脯時為僕日昳為臺隅中日出關不在第尊王公曠其位昭五年庚甲先丨三日後庚三日易巽卦先甲三日後丨三日蠱卦先甲一日易後甲一日難楊子甲癸凡祭十日十二辰以致之注十日丨至丨國語信次一宿為舍再宿為信過丨為丨左傳旬浹十日曰丨十二日曰丨十日亦曰浹禮在寅一年之計在於春一日之計丨於丨如嵗一日不見如三秋兮一月不見丨三丨兮毛詩剛柔五丨甲丙戊庚壬五丨乙丁己辛癸禮王制注風雨太平瑞應五日一丨十日丨丨王充論衡間暇功之所以能建者以日力也化國之日舒以長故其民丨丨而力餘王符論暴寒一日丨之十日丨之木冇能生者也孟子兢業堯兢丨日行其道舜業丨日致其孝董仲舒策緝熙日就月將學有丨丨干光明詩必葺叔孫所館者雖一日丨丨其墻屋去之如始至左昭勿休日謹一日雖休丨丨唐王觀政要不足吉人為善惟日丨丨書泰誓以漸安者非一日而安也危者非一日而危也皆丨積丨而然前賈誼傳善積不知積善在身猶長日加益而人不知也董仲舒䇿思不如學吾嘗終日不食終夜不寢以丨無益丨丨丨也論語吾嘗終日而思矣不如須臾之所學也荀勸學篇王者敬日故善日者王善時曰霸丨丨丨丨霸者敬時荀強國篇君子愛日孔子愛日又或曰丨丨丨丨揚五百篇周公思事丨丨丨兼三王以施四丨其有不合者仰而思之夜以繼日幸而得之坐以待旦孟離婁下曾子省身丨丨曰吾日三省吾身語學而君子博學而日三省乎已荀子光武視朝丨丨每旦丨丨日昃乃罷朝本紀唐宗放朝丨文丨每延英對宰臣率漏下十一刻唐制天子以隻日視朝乃命輟朝丨丨皆用雙日唐大宗贊詩集半愁把酒直須拚酩酊逢花莫惜暫掩留假如三萬六千日半是悲哀丨是丨杜牧之再見一從身去國丨丨日周天白樂天時事類十二一日一夜揔丨丨時半夜子雞鳴丑平旦寅日出卯食時辰禺中巳日中午日昳未晡時申日入酉黃昏戌人定亥有四子産曰君子丨丨時朝以聽政晝以訪問夕以修令夜以安身左昭偕行終日乾乾與時丨丨乾卦弗失時哉丨可丨書秦誓進德君子丨丨修業欲及時也乾卦習學學而時習之不亦説乎語來遲去速辰乎辰曷丨之丨丨之丨也君子競諸楊問明得難失易聖人不貴尺之壁而重寸之隂時丨丨而丨丨也禹之趨時也履遺而弗取冠挂而弗顧非爭其先也而爭其得時也準原道訓君子而中丨丨丨時丨記中庸孔子之聖丨丨聖之時者也孟朔事類上日正月丨丨受終于文祖注上日朔日也書舜典初吉二月丨丨注云朔日也詩小明月初正謂年始朔謂丨丨周子商丑夏寅是改正朔也周夜半商雞鳴周平旦記大傳正朔疏日交丨月之丨數應在期後鄭興傳月蘇朔者蘇也言丨盡而更丨也尚盡正義眀削月言朔日言朝何朝之言蘇也丨丨更生故言朔白虎通日合度丨月丨丨謂之朔唐一行云云月受符晦至朔旦丨丨丨而復行白虎通縣治象正月之吉始和布治於邦國都鄙乃丨丨丨之法于象魏使萬民觀治象挾日而斂之注太宰以正月朔日布王政之事于天下而于象魏振木鐸以徇之萬民觀焉天官冢宰讀時令武后詔百官議告朔于明堂丨丨丨布政事唐張齊賢傳天子頒朔丨丨丨丨於諸侯諸侯藏之祖廟禮春官注諸侯受朔丨丨丨十二月丨政于天子藏于太廟每月朔朝廟使大夫南靣奉天子命君北靣而受之公羊注每月天子以朔政班于諸侯諸侯受而納之禰廟告朔以羊榖梁注聽朔南門天子丨丨於丨丨之外注南門國門也明堂在國之陽天子每月就而聽朔焉凡聽朔必以特牲告其帝及神記玉藻聽朔太廟諸侯皮辨以丨丨於丨丨疏每月以朔告神謂之告朔則于時聽治此月朔之事謂之聽朔又謂之視朔告朔又謂之告月行此禮天子于明堂諸侯於太祖廟同上子貢去餼丨丨丨欲告朔之丨羊子曰賜也爾愛其羊我愛其禮語許劭論人許劭核論鄉黨人物每月輒更品題故汝南有月旦評焉晦事類月窮日窮於次丨丨于紀月令光盡日月相推日舒月速當其同謂之合朔以速及舒丨丨體伏謂之晦後律厯志提月丨丨六鷁退飛過宋都提月者何僅逮是月晦日也注提月邉也魯人語此是月之幾盡也公羊傳廢隂月者羣隂之本月晦則蚌蛤虛而羣隂廢吕氏春秋堯蓂堯時冇草夾階而生每月朔生一莢月半則生十五莢自十六日一莢落至月晦而盡雕月小盡則餘一莢厭而不落堯視之以為厯帝王世紀莊菌朝菌不知晦朔莊逍遙逰篇弦望事類張弓弦月半之名也若丨丨弦也望月滿之名也日月相望釋名為衡日舒月速舒先速後近一逺三謂之弦相與丨丨平分天下之中謂之望後律厯志上下初七初八謂之上弦二十二二十三謂之下弦世傳虧滿馬光陳晃言厯元不正須以弦望晦朔光魄丨丨可得而見者考之符驗律厯志望西東月未丨則載魄干丨既望則終魄于丨楊子五百篇半晦朔當月之中日月相望故以月丨為望望去丨丨皆不滿十五日也又半此望去晦朔之數名曰弦弦者言其月光正半如弓弦也尚書正義定厯法武帝詔議造漢厯二十八宿四方舉終以定晦朔分至躔離弦望前律厯志為節日每月皆冇弦望以正月為初年時俗重之以為節荆楚嵗時記繩墨君德弦為丨丨望成丨丨前李尋傳綱紀厯數弦望伏見者厯數之紀網也晉律厯志閏事類積分閏月附月之餘日也丨丨而成于月者也左傳歸餘文元年閏三月非禮也先王之正時也履端于始序則不愆舉止于中民則不惑丨丨于終事則不悖左傳閏者嵗之餘後張純傳日窮天終數九地終數十終窮也言閏月亦丨之丨故取二終之數以為義前律厯志陽餘月有閏何周天三百六十五度四分度之一十二月日不匝十二度故三年一閏五年再閏也明隂不足丨有丨閏者陽之餘也白虎通歸竒大衍之數丨丨于扐以象閏五嵗再閏故再扐而後卦易起紀三年一閠以丨丨注紀法也三年加以一閏以會成嵗也春秋元命苞一章凡閏十九年七閏為丨丨易緯候月分成閏閏七而盡其嵗十九名之曰章後律厯志二終合丨丨以紀乎閏餘同上正時閏以丨丨時以作事事以厚生生民之道于是乎在左文六年統嵗朔不得中是謂閏月言隂陽雖交不得中不生故曰法乘閏法是為丨丨前律厯志天道五年再閏丨丨乃備天地之靈猶五載而成其化况人道乎朱浮傳天氣三年一閏丨丨小備五年再閏天氣大備張純傳非常月閏月非丨丨也聽朔于明堂門中還處路寢門終月記玉藻曷為不告朔天無是月也閏月矣何以謂之天旡是月非常月也公羊文六年無中氣閏月丨丨丨而北辰斜指兩辰之間所以異于他月也後律厯志正天地劉歆曰厯數以閏正天地之中以作上事厚生皆所以定命也同考晦朔杜預曰日日行一度月日行十三度十九分度之有畸日官當會集此之遲速以丨成丨丨錯綜以設閏月同上闔左扉天子元端閏月則丨門丨丨立于其中記詔居門太史閏月丨王丨丨終月注月令十二月分在青陽明堂總章元堂之位唯閏月無所居居于門故于文王在門謂之閏禮中朔小大中數曰嵗朔數曰年丨丨丨丨不齊正之以閏禮春官行度疏密武帝元封更造太初厯校中朔所差以正閏分課中星丨丨以考丨丨晉律厯志黃帝建五行太史公曰丨丨考定星厯丨立丨丨起消息正閏餘史天官帝堯定四時厯象日月星辰敬授人時期三百有六旬冇六日以閏月定四時成嵗書詩集樂辭帝重光年重時七十二侯回環推天官王琯灰剩飛今嵗何長來嵗遲王母移桃獻天子羲氏和氏迃龍轡李賀古今合璧事類備要前集卷十
