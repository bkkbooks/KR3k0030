body:
  text: 古今合璧事類備要後集卷六十二宋謝維新撰文武階官門文階歴代㳂革聖朝㳂唐制設文階而等級小異唐階日開府儀同三司從一品特進正二品光禄大夫從二品金紫光禄大夫正三品銀青光禄大夫從三品正議大夫正四品上通議大夫正四品下太中大夫從四品上中大夫從四品下中散大夫正五品上朝議大夫正五品下朝請大夫從五品上朝散大夫從五品下朝議郎正六品上承議郎正六品下奉議郎從六品上通直郎從六品下朝請郎正七品上宣徳郎正七品下朝散郎從七品上從義郎從七品下給事郎正八品上徵事郎正八品下承奉郎從八品上承務郎從八品下儒林郎正九品上登仕凡二郎正九品下文林郎從九品上將仕郎從九品下十九本朝舊階曰開府儀同三司特進以上宰臣使相階光禄大夫金紫光禄大夫正奉大夫以上執政階朝請大夫朝散大夫朝奉郎宣徳郎承事郎承奉郎儒林郎文林郎登仕郎將仕郎以上為京朝官至侍從階凡十有五元豐新制以階易官乃雜取唐及祖宗舊制而損益之定為二十四階號寄禄新格元豐三年詔中書令將使臺省寺監之官實典職事領空名一切罷去而易之以階因以制禄未幾官制以階易寄禄新格今具下項特進金紫光禄大夫銀青光禄大夫光祿大夫正議大夫通議大夫大中大夫中大夫中散大夫朝議大夫朝請大夫朝散大夫朝奉大夫朝請郎朝散郎朝奉郎承議郎奉議郎通直郎宣教郎宣義郎承事郎承奉郎承務郎元祐初三光禄正議中散朝議六階各分左右詞人為左餘人為右元祐三年詔自今朝議中散正議光禄銀青光禄金紫光禄大夫並置左右進上出身及帶職人轉至左朝議中散為三資餘人轉至朝議中散分左右二字為四資以上各理七年磨勘其正議至金紫並分左右字為八資以今官已及此者悉加之實錄既而寄禄官並分左右元祐四年三省言舊制京朝官以上各名分進士出身及餘人自改為寄禄官並多一等改過元差别除朝奉大夫以上置左右兩等外承務郎以上至朝請大夫亦欲分左右兩等進士出身人加左字餘加右字從之實錄元豐董正官制易其稱呼元祐同議者以為無以甄别流品遂詞人加左字餘人加右而着令將詞人有犯貪墨者去左而稱右庶以為戎予時守江夏且以為詞人犯貪而稱右可以為戒然餘人右右者得無恥乎又若餘人犯貪墨則復何以為戒也請應貪墨吏詞人則去左餘人則去右此庶幾有别而有所懲書上不行豈朝廷法令事有未安非外官所得與耶出塵史紹聖罷之紹聖三年詔寄禄轉正議大夫光禄大夫銀青光禄大夫分左右朝請大夫亦仍舊存左右作兩資轉以分有無出身外餘並罷實錄崇寜初換選七階崇寧三年刑部尚書登洵武奏吏部選入自節察判官至主簿尉凡七等宜出自睿㫁造為新名因而寄録今擬下須留守節察判官為承直郎掌書記支使防團判官為儒林郎留守節察推官軍事判官謂之兩使職官為文林郎防團軍事推官軍監判官謂之初等職官為從事郎司録二事參軍縣令為通事郎知録事參軍為登仕郎軍巡判官司理司户司法簿尉為將仕郎奉聖㫖依詔㫖國朝選人寄禄凡四等七資留守節察判官等書記支使防團判官留守節察推官軍事推官為兩使職官防團軍事推官軍監判官為初等職官司録縣令知縣為令録軍廵判官司理司户司法簿尉為判司簿尉其陞遷之序則自判司簿尉舉令録令録舉職官自職令薦書及格皆改京官不及格而有二薦書則遷兩使職官謂之短般以勞叙賞謂之循資崇寜中鄧樞密洵武建言以為名實混淆不正乃改令七等以待選人其一曰三京府判官留守判官節度觀察判官四色今目為承直郎是也其二曰節度掌書記觀察支使今目儒林郎是也其三曰防禦團練軍事判官留守節度觀察判官今日為文林郎是也其四曰防禦團練軍事推官今目為從事郎是也其五曰縣令録事參軍今目為從政郎是也其六曰試階知縣知録事今目為修職郎是也其七曰三京軍廵判官司理司户法曹司法參軍主簿縣尉今目為迪功郎是也祖宗朝以考第資歴無過失而或有勞績者遞遷謂之循資若磨勘應格自縣令録參以上及入考者有出身皆改著作郎無出身及上考者改大理寺丞其有功賞循資者减一等若未該磨勘循資者至支使及入考者有出身改太子中允餘判太子舍其四色判官及九考以上者改祕書丞十三考以上者改太常博士無出身人止於殿中丞而已至仁宗朝議者患以考第改官者其員農多遂詔用帥臣監司通判保薦而以州縣多寡定數以嵗改百員為額元豐肇新官制稍鑴改官之格改觀察判官以上有出身改奉議郎無出身改通直郎掌書記改通直郎支使以下一例改宣徳郎而朝廷每以選人改官為重必命制銓近臣引對便殿上親閱其人材厯在功過降㫖改合入官或令改次等官或令更任一囘改官不自廟堂進擬使此權専出主上也官制舊典大觀初人増置宣奉正奉中奉二直四階大觀二年中書省檢㑹御筆寄錄官在神考時不分左右曩雖釐正猶有存者若盡去之則序爵制録等差終少人易以及今回下項金紫光禄大夫銀青光禄大夫光禄大夫舊係右銀青光禄大夫宣奉大夫舊係左光禄大夫正奉大夫舊係右光禄大夫通議大夫大中大夫中夫大中奉大夫舊係左中散大夫有出身人及帶職人更不轉中散奉直大夫朝議大夫奉直大夫舊係右朝議大夫奉聖㫖依詔㫖官制寄禄銀青光禄大夫與光禄正議中散朝議皆分左右朝議中散有出身人皆超右其餘並以序遷大觀中予為中書舍人奉詔以為非元豐本意下擬定釐正乃參取舊名以奉直易右朝議中奉易右中散通奉易右光禄而左銀青大夫正為光禄大夫遂為定制石林燕語政和未改迪功修職從政三階政和六年御筆假將仕郎可去假字為將仕郎假承務郎承奉承事郎可為通仕郎舊將仕郎為迪功郎登仕郎為修職郎通仕郎為從政郎依舊通為十階而寄禄之制始備紹興舉行元祐之法亦分左右至孝宗時階官並去左右焉特進寄祿官門從一品大散執舊為左右僕射金紫光祿大夫正二品銀青光祿大夫舊為吏部尚書舊為五曹尚書光祿大夫從三品中大夫舊為左右丞帝太初元年秦郎官令屬官有漢氏因之武更名光祿大夫秩比二千石掌論議无員後漢因之自魏以來諸公卿吿老多加其位晉太始初分為左右光禄大夫皆為員唐因之唐六典南齊左右光祿大夫位從公開府置佐史如光祿大夫皆銀章青綬詔加金章紫綬者為金紫光祿大夫南齊百官志又唐六典云魏晉有加金章紫綬者則謂金紫光祿大夫晉則金紫銀青左右四職並置又云晉則銀青光祿大夫王翹之則銀青非南齊始置今並載梁左右光祿大夫並无員以養老疾陳金紫光祿大夫中二千石後齊光祿大夫金紫銀青用人俱以舊徳就閑者居之隋髙祖左右光祿大夫金紫銀青光祿大夫並為散官以加文武官之徳齊者並不理事隋職官志唐為文散官國朝舊階為執政階職略元豐寄祿新格以階易官以吏部尚書為金紫光祿大夫五曹尚書為銀青光祿大夫左右丞為光祿大夫續㑹要宣奉大夫元豐新制未有此階大觀初改左光祿大夫為宣奉大夫元豐正奉大夫此階大觀二年改右光祿大夫為正新制未有奉大夫議大夫正舊為六曹待郎隋煬帝置散官葢取秦大夫掌論議之義通典國朝元豐新制改六曹侍郎為正議大夫六曹侍郎併作一等換正議大夫時論以宰執貪進官作此葢故事丞郎作四轉令又改作兩轉爾官職舊典元祐寄祿習分左右紹聖罷分而執議大夫仍舊存左右作兩資轉大觀初改右正議大夫為通奉大夫而左正議大夫去左字為正議大夫職略通奉大夫元豐新制未有此階大觀初改右正議大夫為通奉大夫隋煬通議大夫葢舊為給事中論議之義通典國朝帝置散官取秦大夫掌元豐新制改給事中為通議大夫職略大中大夫舊為左右諫議大夫秦大中大夫秩比千石掌論議漢氏因之梁班第制一秩千石北齊從第三品唐從散官國朝元豐新改左右諫議大夫為大中大夫神宗以寄祿官等級少遂以大中為宰相官蔡確時任右諫議大夫叅知政事兌换大中大夫及拜相則依前大中大夫守左右僕射遂為定制官制舊典秦置中大夫漢舊為秘書監年改為光祿大夫唐為中大夫武帝太初元散官國朝元豐新制改祕書監為中大夫祕書殿中監為一等元豐三年偶闕在殿中監者故只着祕書監神宗以大中大夫為宰相官故初除執政止授中大夫是時以翰林學士宗孟王安禮為左右二公寄祿官皆未至大夫遂除大夫守之官制舊典中奉大夫大觀新制王莽中散大夫因舊為光祿卿至少府監之齊職儀所置後漢之六百石无員魏晉因品第七綘朝服進賢一梁冠班第一陳秩千石唐為散官六典國朝元祐寄祿官皆分左右詔左右中散大夫以二十員為額紹聖罷分而中散大夫仍存左右作兩資轉大觀初改左中散大夫為中奉大夫其右中散大夫去右字為中散大夫左右司郎中光祿朝議大夫舊為太常少卿漢官少卿夫以上得奉朝議則其義也隋文帝置為儀大從三品散官唐為正五品下同上國朝元豐新制改太常至光祿少卿為朝議大夫少卿監左右司郎中等級最多一換之則清濁莫分舊制從官為左右司郎中當遷者左司轉左諫議大夫右司轉右諫議其太常少卿若自吏兵部郎中轉到者遇特㫖轉行亦遷右諫則是朝議轉大中也崇寜以前從官自轉朝議直轉中大夫乃用元豐故事以中大夫為執政官此舊制大中大夫自増中奉大夫遂用細轉乃由當時執政不知典故爾至庶僚職方郎中轉光祿少卿駕部郎中轉司農少府或將作監次遷衞尉卿則是有出身者三遷至祕書監无出身至殿中監皆中大夫也近制増中大夫奉直大夫兩等乃合舊制官制舊典元祐三年詔左右朝議大夫以五十員為額奉直大夫元豐新制未有此階元祐寄祿官皆分左右紹聖罷分而朝議大夫仍舊存左右作兩資轉大觀初改右朝議大夫為奉直大夫詔有出身及𢃄職人更不轉中散奉直大夫政和中詔朝議奉直大夫今後共以八十員為額夫朝請太舊為前行郎中隋置散官取漢將軍公卿年髙徳重者以列侯就第特進奏朝請之義大唐因之通典國朝元豐新制改六曹前行郎中為朝請大夫朝請大夫換前行郎中朝散大夫換中行郎中朝奉大夫換後行郎中故事曹名雖轉正郎亦不呼郎中只稱曹名以示其出常調也自改大夫更无别焉官制舊典隋置朝散大夫因舊為中行郎中制改六曹中行郎散官大唐之國朝元豐新中為朝散大夫朝奉大夫舊為後行郎中國朝元豐新制改六曹後行郎中為朝奉大夫職略朝請郎舊為前行員外郎侍御史隋置散官葢採晉宋齊梁陳並有奉朝請員為名大唐因之通典國朝元豐新制改六曹前行員外郎為朝請郎朝請郎換前行員外郎朝散郎換起居舎人及中行員外郎朝奉郎換左右司諫及後行員外此三等階混殽尤甚書制狀元登第初將作監求一兩遷右司諫次轉起居舎人兵部員外郎二人及第并制科歴一任回自太常博士遷禮部度支司封員外郎進士出身自太常博士屯田職方員外郎世賞自國子博士轉虞部駕部員外郎雜流自國子博士轉水部司門庫部員外郎祖宗不以名器假人故命其官以别之也官制舊典行員外郎起居舎人朝散郎舊為中隋文帝置通典唐因之國朝元豐新制六曹中行員外郎及起居舎人為朝散郎國朝朝奉郎制舊為後行員外郎左右司諫司諫為元豐新改六曹後行員外郎