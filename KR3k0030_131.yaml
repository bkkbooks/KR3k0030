不隔郊奏薦三也奏子為職官令為從事郎四也乗馬許行馳道五也馬鞍上施紫絲座六也馬前執破木板七也宴殿用金器且朶殿上八也身後許上遺表九也國史立傳十也徐守惇南窻紀談下大夫胡廣云諫議光祿大中大夫中散大夫此四等於古禮皆為天子丨丨丨列國之上卿通典朝議大夫周爵漢官大夫丨丨朝議丨丨曲阜行許將制朝散大夫貴階唐兵部郎中知制誥馮宿等授朝散大夫制云凡品秩之制有九自五品以上謂之丨丨所以為貴者蔭及子命及妻𢃄白金服赤芾從大夫之後而已白居易制特制元微之行王仲舒制云國朝由散官而命為大夫者凡十一等以銀青朝散為名者非我丨丨則不充授葢門户有棨㦸之榮腰佩有龜魚之異也古以為榮丨人丨朝散大夫丨丨是以自矜於歌詠况今由是階者則服色驟加誠足貴矣元微之制承奉郎尸官卑冗承奉丨丨不承奉謫監鹽麴何丨丨可憐關市及南臺留與張生作輕重張商英觀衘上承奉郎戲成武階歴代㳂革國朝㳂唐舊制武選之稱自内客省使至閣門使使各有副為横行自皇城使至供備庫使為諸司正使自皇城副使至供備庫副使為諸司副使自内殿承制至三班借使為使臣元豐肇正文階而武階猶未及改元豐至正官制如武臣易將軍校尉之類竟獨依舊不復更定塵史政和初一切易以新名正使為大夫副使為郎横行十二階正副亦然是以在郎居大夫之上者其後以新名未足又増置宣正履正協忠翊衞親衞大夫郎通為横行政和六年御筆官爵以待勞能今興事造功能者輩出而官名未及何以寵奬多士可増下項右武左武拱衞親衞翊衞中衞中亮中侍協忠履正宣正正侍大侍通舊依此郎亦如之唯不置通侍紹興略雜壓釐正其序郎皆在大夫之下云聖朝職横太尉見使相門行十三階政和通侍大夫内舊為内客省使人自易武階詔不新制國朝客省使未嘗除置通侍葢遵祖宗之意也福宫使正侍大夫舊為延政和新置大夫宣政政和初易武階未有宣正大夫續増置焉履正大夫政和續増置夫協忠大政和續増置夫中侍大舊為景福殿使政和新制以景福殿使為之使中亮大夫舊為客省政和新制大夫中衞舊為引進使政和新制大夫翊衞政和續添置夫親衞大政和續添置夫拱衞大舊為四方館使政和新増大夫左武舊為東上閤門使政和新制大夫右武舊為西上閤門使政和新制階大夫𢃄遥郡仍舊内通事舎人閤門祗右十三候看班祗候仍舊同上政和八年改定制舊諸司使八階政和武功大夫新制舊為皇城使政和武徳大夫新制舊為宫苑左右騏驥内藏庫使武顯大夫武節大夫舊為左藏庫東西作場使舊為莊宅六宅文思使政和新制大夫武畧舊為内園洛苑如京崇儀使政和新制大夫武經舊為西京左藏庫使政和新制大夫武義舊為西京作坊使東西染院使禮政和賔使新制政和武翼大夫新制舊為供備庫使右八階𢃄遥郡仍舊同上政和制武大夫之下右舊横行使十二階正侍郎舊在右武郎舊在武功大夫之上紹興始釐正焉正侍郎宣正郎履正郎協忠郎中侍政和郎増置續政和中亮郎新制舊為客省副使政和中衞郎新制舊為引進副使政和翊衞郎續増置親衞郎政和拱衞郎四方館使為拱衞大夫而四方館舊無新制以副使續置拱衞郎為東閤門使左武郎舊政和新制郎右武舊為西閤門使政和新制副使八階舊諸司政和武功郎新制舊為皇城副使政和武徳郎新制舊為宫苑使左右騏驥副使内藏軍副使武顯郎舊為左藏庫副使東作坊副使西作坊副使政和新制郎武節舊為莊宅副使六宅副使文思副使政和新制郎武畧舊為内園副使洛苑副使如京副使政和新制崇儀副使政和武經郎新制舊為西京西藏庫副使武義郎舊為西京作坊副使東西染院副使禮賓副使政和新制郎武翼舊為供備庫副使政和新制十二階小使臣武訓郎修武郎舊為内殿承制舊為内殿崇班從義郎秉義郎舊為東頭供奉官舊為西頭供奉官忠訓郎忠翊郎舊為左侍禁舊為右侍禁成忠郎保義郎舊為三班殿直舊為右班殿直承節郎承信郎舊為三班奉職舊為三班借職進武校尉進義校尉舊為三班差使舊為三班差使大將等雜官進武副尉進義副尉副尉守闕進義殿侍下班祗應京宗室及外州軍祗應稱殿侍非是新官差在除東西班應奉人依舊外餘令並改作下班祗應政和制事類恩數舊章昔在神考董正治官而武選官稱循㳂末世有志未就以迄于今訓迪厥官自我作古所有武階磨勘遷改請給奏蔭等凡厥丨丨悉如丨丨咨爾有衆祗予詔書政和二年改武選官名詔總横行奬多士官爵以待勞能今興事造功者輩出而舊官名不足非以寵丨丨丨可増下項通依此郎亦如之政和六年増宣正等御筆依武功横行之仕聨職殿陛其選甚髙比歲興事造功夤緣恩賞雜流叨冒浸以混淆無所甄别自今應雜流遷至横行者其應干思數請給奏薦者並只丨丨丨大夫法施行仍舊為令同上古今合璧事類備要後集卷六十二
