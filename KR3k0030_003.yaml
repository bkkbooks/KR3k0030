body:
  text: 古今合璧事類備要前集卷三宋謝維新撰天文門雲事類變化抱日增麗浮空不收既丨丨以無窮亦卷舒而莫定選舒卷丨則彌綸覆四海丨則消液入無形成公綏賦景雲丨丨太平之應晉天文志王者德至山陵則丨丨出又曰天子孝則丨丨見孝經援神契卿雲若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂丨丨卿雲之見喜氣也史記舜時景雲見作歌曰丨丨爛兮糾漫漫兮尚書大傳慶雲唐元宗天寶十三年封太山有丨丨隨馬唐史愁雲舜崩蒼梧山山有九峯常有丨丨浮罩莫辨陵寢所在遂呼為九疑山史記杼軸凡望氣卬而望之陳雲如立垣舒雲類丨丨史記天官書炮車舟人占雲若丨丨起急避之乃大風候也文選宫闕成丨丨百官皆見之後光武封太山山上雲起祭祀志樓閣若層臺高觀重丨疊丨陸士衡浮雲賦五采丨丨備而成文荀况雲賦三素修真祕訣曰以立春日北望有紫緑白雲者為丨丨飛雲三元君以是日上詣天帝當再拜陳乞得給侍輪轂三過見元君之駕者白日升天嵗時廣記五色光華五采丨丨不可遍觀非煙非霧容狀不可盡述韓愈視四方常有雲丨丨見者其下有賢人隱也晉天文志匹皂京房占候曰占雨法有黑雲如一丨丨三日中即雨玉葉金柯分丨丨散陸機浮雲賦金翹星懸玉李雲展丨丨金樓子觸石出雲雲之為言運也丨丨而起謂之雲春秋説題丨丨而丨丨膚寸而合不崇朝而遍雨乎天下者惟泰山耳注側手為膚按指為寸公羊沉璧起雲堯丨丨於河白雲起回風搖落尚書中候云周則為瑞於觀河堯則呈祥於丨丨吳淑雲賦以雲紀官黃帝丨丨丨丨故為雲師而雲名注黃帝受命有雲瑞故丨丨丨事百丨師長皆以雲為號縉雲氏蓋其一官也左傳以雲辨祲周保章氏丨五丨之物丨吉凶水旱豐衰之丨象鄭司農注二分二至觀雲氣青為蟲白為喪赤為兵荒黑為水黃為豐禮雲止帝上黃帝與蚩尤戰于涿鹿之野常有五色丨氣金枝玉葉丨於丨丨因作華蓋史記雲起封中漢武帝至泰山封禪其夜有白丨丨丨丨史封禪書芒碭雲居漢高祖隱於丨丨山澤間吕后與人俱求常得之高祖怪問后曰季所居上常有丨氣漢書高唐雲廟楚襄王逰於雲夢之臺望丨丨觀上有丨氣須臾之間變化無窮王曰此何氣也玉曰所謂朝雲也昔先王嘗逰丨丨晝寢夢一婦人曰妾巫山之女也為高唐之神聞君逰高唐願薦寢席王因幸之去而辭曰妾在巫山之陽也高邱之阻朝為行丨暮為行雨朝朝暮暮陽臺之下旦視之如言故為立丨號曰朝雲文選白雲帝鄉華封人謂堯曰夫聖人鶉衣而鷇食天下有道與物皆昌乘彼丨丨至于丨丨又曰乘雲氣御飛龍而逰乎六合之外蓋神人者乘虛不墜觸實不礙故能狎虎兕貫金石乘雲霧而浮遊如此莊子白雲親舍唐狄仁傑授并州法曹親在河陽仁傑登太行山反顧丨丨孤飛謂左右曰吾丨丨其下瞻悵久之雲移乃去本傳黃雲覆車凡占長吏東耕當視天有丨丨來丨丨五榖大熟東方朔傳青雲圜蓋魏文帝生時有雲氣丨色而圜如車蓋當其上望氣者以為至貴之證非人臣之氣本紀赤雲夾日哀六年吳伐陳楚子救陳將戰王有疾夾庚寅卒于城父是嵗也有雲如衆丨鳥日以飛三日楚子使問周太史周太史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而置諸股肱何益不穀不有大過天其舍諸有罪受罰又焉移之遂弗禜左傳青雲干吕漢武帝時月氐國獻神香使者曰國占東風入律丨丨丨丨意中國有好道之君故來貢東方朔傳披雲見日文王遇薑公于渭陽灼然如丨丨丨白丨恍若開霧而覩青天徐幹中論披雲覩天衛瓘見樂廣而竒之曰此人見之若丨丨霧而丨青丨晉樂廣傳有凌雲氣司馬相如奏大人賦天子大悅飄飄丨丨丨之丨遊天地之間本傳作攓雲篇東坡云余自城中還道中雲氣自山中來如雲馬奔突以手出掇開籠收其中歸家雲盈籠開而放之丨丨丨丨坡文分至書雲僖五年正月朔日南至遂登觀臺以望之而書凡丨丨啓閉必書雲物為備故也左傳氣候占雲冬至初陽雲出箕如樹之狀立春少陽雲出房如積冰春分正陽雲出軫如白鵠穀雨太陽雲出張如車蓋立夏初隂雲出觜赤如珠夏至少隂雲出如氷波莘莘立秋濁隂雲出如赤繒寒露正隂雲出如冠纓霜降太隂雲出上如羊下如磐石易通卦驗韓楚周秦丨雲如布丨雲如日丨雲如輪丨雲如美人史記山水旱涔丨雲草莽丨雲魚鱗丨雲煙火丨雲波水淮南子諸雲總名慶雲曰景雲或曰卿雲雲外赤內青謂之矞雲雨雲曰油雲雪雲曰同雲西京雜記雲師之名離騷云吾令豐隆乘雲兮求宓妃之所在注豐隆丨丨一曰雷師五臣曰雲師屏翳按豐隆或曰雲師或曰雷師屏翳或曰雲師或曰雨師或曰風師歸藏云豐隆筮雲氣而告之則雲師也穆天子傳云天子升崑崙封豐隆之葬郭璞云豐隆筮師御雲得大壯卦遂為雷師按楚辭則以豐隆為雲師飛廉為風伯屏翳為雨師廣雅詩集白雲山中何所有隴上多丨丨只可自怡悅不堪持贈君陶𢎞景孤雲南北各萬里有雲心更間因風離海上伴月到人間洛浦少高樹長安無寸山徘徊不可駐漠漠又東還于鄴片雲一丨孤丨逐處飛東西終日競何依旁人莫道能為雨惟恨青山未得歸王令飛雲片片丨來靜可間樓頭江上復前山飄零盡日不歸去占破青山萬里天鄭準山雲雲本山中來每遮山好處丨好有心力便是教丨住我亦山中人愛山不愛丨雲能作滯雨撩撥田翁嗔入夏多竒峯是雲本無事遮丨不肯散丨亦太造次教人向丨説且自闕張綱遺風逐丨簇去若驅牛羊雲去雨立晴便見火傘庶令百穀堅實我千斯倉盧元贊鍾山雲從丨丨起却入丨丨去借問山中人雲今在何處王安石梁國英英大丨丨郁郁必書臺碧落從龍起青山觸石來官名光邃古蓋影耿塵埃飛感高歌發威加四海回李嶠倚峯丨丨觸石濕苔錢便逐高風離瀑泉深處卧來真隱逸上頭行去是神仙千尋冇影滄江底萬里無蹤碧落邊長憶舊山青壁裏繞庵間伴老僧禪齊已觸石深惹離情靄落暉如車如蓋早依依山頭丨丨應長在天際從龍自不歸莫向隙窗籠夜月好來仙洞濕行衣春風淡蕩無心後見説襄王夢亦稀韓琮為霖得路直丨丨濟物不然間共鶴忘機無端是向陽臺畔長送襄王夢雨歸崔塗蔽月聚散虛空去復還野人間處倚笻看不知身外無根物丨丨遮空作萬端郭震高嶽玄雲起丨丨終朝彌八方魏劉楨陽臺荆王枕上元無夢莫狂丨丨一片雲李義山炮車終日江頭天色惡丨丨雲起風欲作東坡張文潛詩云喜逢山色開眉黛愁對江雲起丨丨王直方詩話玉馬風力引雲行丨丨水光連日動金蛇王介甫白衣天上浮雲如丨丨斯須改變成蒼狗杜甫玉葉丨丨籠殘日金枝襯薄霞山谷抱石幾年嗟丨丨今日喜從龍余濟詩隨風丨丨亂鳥起泛水結魚鱗于季子如車西北有浮雲亭亭丨丨蓋魏文帝覆苑傍花初點綴丨丨更崢嶸崔灝朝飛畫棟丨丨南浦雲珠簾暮捲西山雨王勃暮合日丨碧雲丨佳人殊未來文選沮洳嶺雲春丨丨江月夜晴明杜甫繽紛慘淡天同色丨丨雲共寒景陽去來丨丨皆絶迹隱顯兩忘機司馬光動靜靜即等間藏草木動時頃刻遍乾坤辛寅遜雷事類􅊒􅊒震來丨丨震驚百里易谹谹非雷非霆隱隱丨丨楊子填填雷丨丨兮雨冥冥離騷隱隱雷丨丨而響起兮象君之車音長門賦破山疾雷丨丨風振海而不能驚莊子裂木春夏之有雷霆也或發而震破巨石丨大丨而殘之春木豈有非常之罪哉彼豈有懲於物也柳文驚蟲伊青陽之肇化兮陶萬殊于天壤結鬱蒸以成雷兮鼓訇輘之逸響丨蟄丨于始作兮懼遠邇之異象李顒雷賦動物丨萬丨者莫疾乎雷易開牙雷者所以丨發萌丨郎顗傳拆甲天地解而雷雨作雷雨作而百穀草木皆甲拆易出地雷於天地為長子以其萬物為出入也雷二月丨丨百八十日雷出則萬物出八月入地百八十日雷入則萬物入入則除害出則興利人君之象也王充論衡雷入地則孕育根荄保藏蟄蟲避盛隂之害丨丨則養長華實發揚隱伏宣盛陽之德前五行志發聲仲春之月日夜分雷乃丨丨仲秋之月雷乃收聲記月令金門雷從丨丨起上田旱下田熟師曠占石室凌雲臺有白丨丨名避雷室北征記雷神楊道和夏于田中值雷雨至桑下霹靂下擊之道和以鋤格其肱遂落地不得去色如丹目如鏡毛角長三尺餘狀如六畜頭似獼猴搜神記雷公圖雷之狀纍纍如連鼓形又圖一人若力士謂之丨丨使之左手引連鼓右手椎之論衡雷車柳公權元和末止建州山寺中夜半覺門外喧闐因潛于窗中見數人運斤造丨丨如畫圖者久之一嚏氣忽斗暗失其人兩目遂昏焉酉陽雜爼雷斧雷州每大雷雨多于田野得黳石謂之丨公墨乂于霹靂處得楔如丨謂之霹靂楔小兒佩之辟惡國史補元豐中隨州夏月大雷震一木折有就其下得一楔者凡丨丨多以銅鐵為之楔乃石耳似斧而無孔筆談雷椎丨丨欿口感切􅀢徒感切輿物旁震欿􅀢曲內也正月之初萬物尚在曲內之中雷震驚出也太元經雷火內侍李舜舉家曾為暴雷所震其堂之西室丨丨自窗間出赫然出簷人以為堂屋已焚皆出避之及丨止其舍宛然墻壁窗紙皆黔有一木格其中雜貯諸器其漆器銀扣者銀悉鎔流在地漆器曾不燋灼有一寶刀極堅鋼就刀室中鎔為汁而室亦儼然人必謂丨當先焚草木然後流金石今乃金石皆爍而草木無一燬者非人情所測筆談雷形丨州春夏多雷秋日則伏地中其狀如彘人取而食之國史補雷處邵子謂程子曰子知丨起丨乎子曰某知之堯夫不知也堯夫愕然曰何謂也子曰既知之安用數推之以其不知故待推而後知堯夫曰子以為起于何處子曰起于起處堯夫矍然稱善語録阿香車義興人姓周永和中出都日暮道邊新草小屋有一女子出門望見周曰日已暮周求寄宿向一更中聞外有小兒喚丨丨官喚汝推丨女子辭去忽驟雷雨明朝視宿處乃一新塜搜神記云謝仙火大中祥符間嶽州玉真觀為天火所焚惟留一柱有丨丨丨三字倒書而刻之慶歷中有以此字問何仙姑者輒曰謝仙者雷部中鬼夫婦皆長三尺其色如玉掌行火于世間後有聞其説於道藏中檢之實有謝仙字由是益以仙姑為真仙矣國史借車收麥介休縣百姓常宿于晉祠夜半聞人扣門云介休王丨霹靂丨某日縣界丨丨祠內即應遂見數人持一物如幢環綴幡旗十八葉有光如電至日果然損麥酉陽雜爼攝電取書上元中台州一道士王遠知善易知人生死禍福作易總十五卷一日因暴風雷雨忽至冥霧中一老人叱曰所泄者書何在上帝令吾丨六丁雷丨丨將文丨龍城録震屋出龍吳柴再用為光州一日大震雷家人皆伏匿再用當户坐不動俄見有襦袴四人舁再用坐敗牀出庭中復大震屋折有龍出九國志震人書背長慶中有人雷震而死背上粉書云市中用小斗李用晦芝田録震夷伯廟雷丨丨丨之丨罪之也於是展氏有隱慝焉左傳震憲陵寢後漢建和中雷丨丨丨丨室是時梁太后兄冀用事漢書捕竄匿龍世言乖龍苦于行雨而多竄匿為雷神捕之或在古木及簷楹之內北夢瑣言擊姦黨碑宣和殿所立元祐姦黨碑一夕大風雨為震雷擊碎步里客談蔡順環冡丨丨母平生畏雷自亡後每有雷震順輒丨丨泣曰順在此本傳泰初倚柱夏侯丨丨丨丨作書時霹靂破柱衣服焦然神色無變書亦如故賔客左右皆跌蕩不能住世説帝乙震死丨丨嫚神而丨丨後帝乙為韋囊盛血仰而射之號曰射天遇雷震而死漢志震樹自若劉曜從劉元海獵于西山遇雨止樹下迅雷丨丨旁人莫不顚仆曜神色丨丨元海異之曰此吾家千里駒也雜