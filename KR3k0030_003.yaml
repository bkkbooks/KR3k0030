園林總是春盧次春玉無瑕仙子衣裳雲不染天人顔色丨丨丨月寒桂樹猶藏魄海凍珊瑚未放芽崔德符月半稜斜拖闕角龍千丈淡抹墻腰丨丨丨孔平仲玉千頃吹風飛雨乾散作柳花毬危簷下舞鶴老樹騰蟠虬湖平千頃玉月落漫不收手冷謹勿炙置之鷫鸘裘毛澤民銀世界三千世界丨成色十二樓臺玉作層劉師道玉橫斜三軍喜氣鑠飛花睡起空驚月在沙未集驊騮金腰裊故殘鳷鵲丨丨丨東坡注雪殘之貌也鳷鵲殿名杜詩雪殘鳷鵲亦多時仙人剪水丨丨寧底巧丨丨作花飛陸暢玲瓏剪水空中墜的皪裝春樹上回王介甫白帝振裳寒氣不肯歸雪花一尺圍崩騰相排拶龍鳳交橫飛波濤何飄蕩天風吹幡旗丨丨盛羽衛鬖髿丨丨衣白電光啓途從以萬玉妃韓愈天地無塵風雲快約十絲雨丨丨空丨一點丨曉樹放開花意思夜窗添起月精神何如飛上三軍鬢與惱紅樓歌舞人石敏若乾坤不夜茅君失却三神鶴王母應迷五色麟草木未香花事動丨丨丨丨月華新舒亶薝蔔無香來牟有信迎三白丨丨丨丨散六花東坡天風淅淅吹玉沙詔恩歸沐休早衙遙知清虛堂裏雪正似無香林中花東坡蘆花有聲深粧玉瓦平無瓏亂拂丨丨細丨丨辛寅遜瑶臺玉蕊東風欲辭閶闔殿未向百花枝上見先拂丨丨丨丨叢聯翩時落玲瓏片水晶宫中清曉寒蝴蝶窺簾輕瞑旋素光冷逼翠雲裘玄冰暗結青花妍詩成玉屑帶冰書興隨月繞清溪遍兔園老筆生陽春墨葩不待微和扇明朝當見郢中吟雕尊快覆鵝黃面毛澤民淨界空花清都瓊蕊飛飛下丨丨丨丨種種開洪芻水晶雲母丨丨不動垂千筯丨丨無聲落萬家僧道潛粉翼霜毛夀陽樓畔晴梅落孝武宫中曉露漙越浦爭回乘興棹洛堤欲駐有情鞍蝶遺丨丨輕難拾鶴墜丨丨散未摶崔德符麵市鹽車有田皆種玉無樹不開花班扇難裁素曹衣詎比麻鵝歸逸少宅鶴滿令威家寂寞門扉掩依稀履迹斜人疑迷丨丨馬似困丨丨李義山梅地粉天劉伶醉席丨花丨海客仙槎丨水丨錢惟演玉宇瓊干重重丨丨三千界一一丨丨十二樓晏元憲珠幢玉節斷蓬飄葉卷黃沙只有千林䰒鬆花應為王孫朝上國丨丨丨丨與排衙東坡送人入京排玉疊銀尖峯丨丨笋圓石丨丨盤劉師道剪花飛葉巧丨銀丨亂輕丨玉丨狂辛寅遜隨馬濕衣寒氣先侵玉女扉清光旋繞省郎闈梅花大庾嶺頭發柳絮章臺街裏飛欲舞定丨曹植馬有情應丨謝莊衣龍山萬里無多遠留待行人二月歸李義山捲簾入户丨丨光動山人帳丨丨寒侵坐客氊謝無逸灑篁著柳已訝凌歌扇還來伴舞腰丨丨留直節丨丨送長條舞鏡鸞窺沼行天馬渡橋城險疑懸布砧寒未搗綃韓退之灑松壓竹撩人滕六索題詩賴有支郎為解圍永夜祗宜燋兔上彤雲不見織烏飛少林未許齊腰立青女無端接手歸想得廬山幽絶處丨丨丨丨更增輝洪芻古今合璧事類備要前集卷三
