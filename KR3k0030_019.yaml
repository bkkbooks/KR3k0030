body:
  text: 古今合璧事類備要前集卷十九宋謝維新撰祥瑞門祥瑞事類河圖丨出丨孔安國云河圖即八卦是洛書即九疇是洛書注見上休徵曰丨丨書洪範禎祥國家將興必有丨丨中庸元鳥天命丨丨降而生商詩元鳥飛雉有丨丨升鼎耳而雊書髙宗彤日褚遂良立晉王為皇太子時丨丨數集宫中帝問是何祥也遂良曰昔秦文公時有侲子化為雉雌鳴陳倉雄鳴南陽侲子曰得雄者王得雌者霸文公遂雄諸侯始為寶雞祠漢光武得其雄起南陽有四海陛下本封秦故雌雄並見以告明德帝悅曰人之立身不可以無學遂良所謂多識君子黃龍黃帝得土德丨丨地蚓見前郊祀志文帝時公孫臣言漢當土德土德之應丨丨見後三嵗丨丨見成紀史封禪書章帝元和二年詔曰云云丨丨見髙祖皇后竇氏始太宗生有二龍之符后於諸子中愛視最焉白麟武帝太始二年詔曰往者朕郊見上帝西登隴首獲丨丨以饋宗廟渥窪水出天馬秦山見黃金前本紀孝武符瑞應寶鼎出丨丨獲功德茂盛不能盡宣宣帝紀流烏武王伐紂渡河中流白魚躍入王舟中武王俯取以祭既渡有光自上復于下至于王屋丨為丨其色赤其聲魄云史周紀化蛇漢髙祖夜徑澤中一人行前者曰前有大蛇當徑願還髙祖曰壯士行何畏乃拔劍斬蛇後人至蛇所有老嫗夜哭曰吾子白帝子也丨為丨當道今為赤帝子斬之嫗忽不見本紀朱鴈三年獲赤鴈作丨丨之歌武帝紀黃鵠昭帝始元元年丨丨下建章宫太液池中本紀野蠶丨丨成繭光武時神魚宣帝元康東濟大河天氣清明丨丨舞河本紀唐元宗龍出仙洞而丨丨躍四靈麟鳯龜龍謂之丨丨鳯凰麒麟在郊棷龜龍在宫沼並禮運宣帝元康四年詔南郡獲威鳯神爵二年詔鳯皇集京師本紀五帝三王之理民家給人足無怨望忿怒之患云云鳯皇麒麟遊于郊春秋繁露四瑞凡景雲慶雲為大瑞其名物六十有四白狼赤兔為上瑞其名物三十有八蒼烏朱鴈為中瑞其名物三十有二嘉禾芝草木連理為下瑞其名物十四大瑞則百官詣闕奉賀百官志鼎出孝武符瑞應寶丨丨宣帝紀山呼漢武封梁甫時丨丨萬嵗浪井丨丨不鑿而成清淨則水流有仙人至典略或云神鼎丹甑醴泉丨丨為大瑞汜石李嶠武后時丨水獲瑞丨嶠為御史上皇符一篇為世譏薄赤伏符光武在長安時强華奉丨丨丨曰劉秀發兵捕不道四夷雲集龍鬭野四七之際火為主又䜟記云劉秀發兵捕不道卯金修德為天子光武紀玉册文晉元帝永嘉初有丨丨見於長安白玉麒麟神璽出於江寧其丨曰長夀萬年赤飈起市孔子夢三槐間豐沛市有丨丨起呼顔回子夏往觀之見赤蛇化為黃金上有其文曰卯金刀後髙祖起豐沛金樓子紫雲照屋陛下昔居是州也丨丨在天神光丨丨白鹿來擾黃龍上升龍出仙洞而神魚躍山開祥穴而靈鍾韻謡言令䜟巨迹啓途嘉氣旁運祥蓍自起天子鑄劍漢太上皇微時遊山澤間有冶鑄曰為丨丨丨丨若得腰間佩刀雜冶即成神器可以克天下昴星精為輔以殱三􅀈太上曰此物名匕首遂解投煙熖中劍成授上皇上皇以賜髙祖鉤命决云蕭何為昴星項羽陳勝胡亥為三􅀈真人渡江秦時望氣者云五百年後金陵有天子氣及元帝渡江乃五百三十六年真人之應在於此矣符瑞自神姚璹貶桂州長史后方以丨丨丨丨璹取山間草樹名有武字者以為上應國姓裒類以聞后大悅武氏臨朝新豐有山因震突出后以為美祥赦其縣更名慶山后擅位嘉符瑞事羣臣爭言之岑長侑懼亦間開陳符瑞相誣竇建德冬至大會僚吏有五大鳥集其宫羣鳥從之又宗城人獻元圭一孔德紹曰昔天以授禹今瑞與之侔國宜稱夏建德然之改元五鳯不納祥瑞光武朝羣臣奏言宜令太史撰集祥瑞以傳來世帝不納常自謙無德每郡縣所上抑而不當故史官罕得記焉唐太宗曰夫家給人足而無瑞不害為堯舜百姓愁怨而多瑞不害為桀紂嘗有白鵲巢於寢殿槐上左右稱賀上曰瑞在得賢此何足賀通鑑憲宗奉春秋不書祥瑞今後所有祥瑞不得上聞唐本紀不賀祥瑞王求禮久視一年三月大雨雪鳯閣侍郎蘇味道等以為瑞率羣臣入賀求禮讓曰宰相燮和陰陽而季春雨雪乃灾也果以為瑞則冬月雷可為瑞雷耶味道不從求禮以瑞何感而至崔祜甫㑹朱泚軍中猫鼠同乳表瑞詔示衮衮率羣臣賀祐甫獨曰可弔不可賀詔使問狀對曰臣聞禮迎猫為其食田鼠以其為人去害雖細必録今猫受畜於人不能食鼠而反乳之毋乃失其性耶龍並駕本朝太祖北征王處訥曰庚申嵗太陽躔亢在亢於德剛其獸丨恐與太陽丨丨若果然則聖人利見之時也至庚申嵗旦果有兩日相磨蕩即太祖陳橋啓聖之時也王壺清話蛇入鼻藝祖微時入洛至長夀寺佛殿晝寢有僧見赤丨丨帝丨中邵氏聞見録張說封禪頌乾符坤珍千品萬類又云龍負圖而大舜登狼銜鈎而后殷昌元圭錫於夏禹赤伏歸於漢光應運叶符希代稱寶東封詔張說撰刻栁宗元貞符德紹者嗣道怠者奪於是有聖人曰黃帝遊其兵車交貫乎其內一統類齊制量然猶大公之道不克建於是有聖人曰堯置州收四嶽持而綱之立有德有功有能者參而維之運臂率指屈伸把握莫不統率年老舉舜而禪焉大公乃克建由是觀之厥初罔匪極亂而後稍可為也而非德不樹故仲尼敘書於堯曰克明俊德於舜曰濬哲文明於禹曰文命敷于四海祗承于帝於湯曰克寬克仁彰信兆民於武王曰有道曾孫稽揆典誓貞哉惟兹德實受命之符以奠永祀後之妖淫嚚昏好怪之徒乃始陳大電河圖云少典妃附寶見大電光附寶意感而生黃帝大虹童云大星如虹女節意感而生白帝子即金天氏也𤣥烏詩商頌巨迹詩生民白狼世紀白狼銜劍入般朝白魚流火之烏見前流烏下注以為符斯皆詭譎濶誕其可羞也又云受命不于其天于其人休符不于其祥于其仁惟人之仁匪祥于天匪祥于天兹惟貞符哉未有喪仁而久者也未有恃祥而夀者也商之王以桑穀昌太戊以雉雊大髙宗宋之君以法星夀宋景公疾熒感守心子韋曰君當祭之可移云云子韋曰君善言三熒惑必退三舍鄭以龍哀魯昭公大水龍鬪時門之外魯以麟弱哀公十四年春西狩獲麟白雉亡漢漢平帝越裳氏獻雉黃犀死莽王莽班符命肇命新都受瑞黃支孟康曰獻生犀惡在其為符也栁子厚文景星事類星耀堯時景丨丨于天帝王世紀瑞星曰景星亦曰德星漢書音義星精景星者丨之丨也先後月出於西方王者不私人以官使賢者在位則見孫氏瑞應圖出房帝舜時景星丨丨宋符瑞志出翼堯即政七十載景星丨丨尚書中候精明天腥而見景星注腥丨丨也漢天文志昭衍武帝祠太一贊饗曰德星丨丨厥惟休祥前郊祀志聚井漢王入關五星丨東丨流渚河圖日大星如虹下丨華丨女節感而生白帝連球五星丨丨至德之萌同色五星丨丨天下偃兵六帖徙舍宋景公事見前祥瑞類歸國如星非星如雲非雲必有丨丨六帖合三星有赤方氣與青方氣相連赤方中有兩星青方中有一黃星凡三星合為景星也景星顯星也前天文志如半月瑞星一曰景星丨丨丨生於晦朔助月為明或曰德星大而中空或曰有三星黃色煌煌然所見之國大昌晉天文志出於有道景星者德星也其狀無常常丨丨丨丨之國史天官書見於有德王者德至幽微則景星見孫瑞應圖出號施令叶民心制禮作樂得天意則景星見禮稽命證天子精耀心憤務德則景星見春秋感精符天子舉賢則景星放於天春秋孔演圖神靈滋液百珍寶用有景星孝經援神契天子行孝德則景星見慶雲附景雲事類卿雲若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂丨丨卿雲見喜氣也史天官書景雲王者德至山陵則丨丨出孝經援神契天子孝則丨丨見同上景明也言雲氣光明也禮斗威儀髙宗即位丨丨見樂志白雲漢武封泰山丨丨起封中青雲文帝生有雲氣青色如車蓋其上終日望氣者以為貴之證非人臣之氣黃雲汾陰寶鼎天于祠之丨丨覆焉六帖矞雲丨慶丨也內赤外黃一曰丨丨瑞符志官名黃帝丨丨皆以雲命為雲師注黃帝有景雲之應因以名師與官史本紀工歌舜時慶雲興焉百丨相和而丨帝乃唱之曰慶雲爛兮糾漫尚書大傳作蓋黃帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有花葩之象故因之丨華丨崔豹古今注隨馬元宗封泰山有慶雲丨丨唐天文志抱日代宗即位慶雲見黃雲丨丨酉陽雜俎浮空抱日增麗丨丨不收韓愈慶雲表雲狀丨丨如樹馮智戴傳雲氣丨丨多夀酉陽雜俎丨丨甚嘉吕師周謂禆將綦毋章曰吾與楚人為敵境吾常望其營上丨丨甚嘉未易敗也五色崔希喬轉馮翊令有雲如蓋當其㕔事須臾丨丨雜錯遍於州郭唐新語本朝韓琦唱名日史官奏丨丨雲見雲五色曰慶雲西京雜記氤氲泱漭丨丨呈祥六帖五采有慶雲見丨丨五色非煙非雲抱日增麗浮空不收既變化而無窮亦卷舒而莫定斯為上㙐實應太平栁賀慶雲表丨丨五色光華不可遍觀非雲非煙容狀詎能詳述韓愈慶雲表甘露事類天酒甘露一名膏露一名丨丨孫氏瑞應圖天樞丨丨得甘露濁春秋運斗樞聖德丨丨上及太清下及萬靈則膏露降鶡冠子仁澤甘露者丨丨也凝如脂甘如飴晉中興記政平君治政則軒轅之精散為甘露禮斗威儀人君乘土而王其政太平則甘露降德至王者丨丨於天和氣感則甘露降于松柏瑞應圖降地堯時甘露丨於丨帝王世紀雨壤甘露時丨厥丨可遊滋液滲漉何生不畜司馬相如封禪書人夀甘露者味清而甘降則草木暢茂食之令丨丨物盛甘露者美露也降則丨無不丨白虎通恩順丨及於物丨於人而甘露降春秋繁露敬尊耆老得丨則松柏受甘露丨賢老不失細微則竹葦受甘露瑞應圖天地合丨丨相丨以降甘露人莫之令而自均老子陰陽和天地之和應故丨丨丨甘露降公孫洪傳露降未央宣帝元康元年詔甘丨丨丨丨宫本紀露降京師神爵二年詔甘丨丨丨丨四年詔同露降改元甘露元年詔以甘丨丨丨丨甘露露降祀郊五鳯二年詔朕郊上帝甘露降並同上露降郡國中元元年郡國頻上甘露先建武十三年亦甘露降並光武紀露降甘陵明帝永平十六年甘丨丨於丨丨是嵗仍降本紀甘露宵降章帝元和二年詔甘露屢臻章和元年丨丨丨丨並本紀甘露頻降宋文帝元嘉中丨丨丨丨狀如細雪南史德宗貞元十年西州奏當管甘露降松柏竹叢等二千四百四十二處唐書光武時甘露降四十五日東觀漢記降中華殿唐髙祖武德九年甘露丨於丨丨丨之桐樹沍氷雪以示羣臣唐史降崑崙山崑崙山有甘露著草木皎然如霜雪器承之如飴拾遺記建承露盤魏明帝詔曰昔甘露屢降於仁夀殿自吾巳丨丨丨丨甘露復降芳林園三國志本紀立甘露亭陳宣帝大建中甘露降樂遊苑丨丨丨丨本紀紫宸露禍唐文宗御丨丨殿韓約奏甘露降李訓等奏甘露近在禁中陛下宜親往以承天祉即輦如含元殿訓奏言非甘露帝顧中尉仇士良魚志𢎞等驗之訓因欲閉上諸宦人使無逸者將盡殺之宦人至仗所㑹風動廡幕見執兵者士良等驚走出曰李訓反帝於是下詔暴訓等罪李訓傳盱城露怪本朝熙寧六年建昌軍城北甘露事詳見露類鑄銅盤氣之清者莫如露承之安者莫如盤乃詔有司丨丨建承露丨于芳林園曹植銘承瓊爵甘露以降蜜醇氷凝覩陽弗晞瓊爵是承獻之帝朝以明聖徵同上魏德論詩集陰陽凝梢梢兩竹枝甘露葉間垂草木有靈液丨丨丨以時深山與窮谷往往嘗有之幸當君子軒得為衆人知物生隨所托晦顯各有宜聊以助歌詠兼堪飲童兒歐陽公草木香金莖甘露薦齊房潤及邉城丨