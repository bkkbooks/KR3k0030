body:
  text: 古今合璧事類備要續集卷四十九宋謝維新撰事為門投贄事理𤼵揮贄之為言至也所以為執以至見之禮也凡贄天子以鬯諸侯以圭卿以羔大夫以鴈士以雉庶人以鶩童子委贄而退婦人椇榛脯脩棗栗皆客禮之常也蓋天子無客禮惟用告神為至故以鬯童子未成人委贄而退者不與為禮也惟婦人無外事故以羞物見而已古人制禮豈無意哉若夫野外軍中草次之間怱遽之頃既非為禮之處也則不過用時物以相禮非贄也無因而前則起按劍之疑此古人所以以纓拾矢可也雖然貧者不以貨財為禮今之君子或贄以所業亦不可不遇知音而已矣事類修贄丨五禮五玉三帛二生一死丨如五器卒乃復注修吉凶賓軍嘉之禮五等諸侯執其玊及帛諸侯世子執纁公之孤執𤣥附庸之君執黄二生卿執羔大夫執鴈一死士執雉玉帛生死所以為贄以見之器謂圭璧如五器禮終則還之三帛生死則否書舜典執贄周公謂伯禽之𫝊曰我文王之為子武王之為弟成王之為叔父吾于天下不賤矣然而吾所丨丨而見者十人還贄而見者三十人貌執之士百有餘人欲言而請畢事者千有餘人于是吾僅得三士焉以正吾身以定天下荀堯問還贄見上文凡贄丨丨天子鬯諸侯圭卿羔大夫鴈士雉庶人之贄匹音鶩曲禮士贄丨相見之禮丨冬用雉夏用腒儀禮男贄丨丨大者玉帛小者禽魚以章物也注公侯伯子男執玊諸侯世子附庸孤卿執帛卿執羔大夫執鴈士執雉章所執之物以别貴賤左荘二十四女贄丨丨不過榛栗棗脩以告䖍也注榛小栗脩脯䖍敬也皆取其名以示敬鍜脯加薑桂曰脩同前童子贄丨丨委丨而退曲禮婦人贄丨丨之丨棋榛脯脩棗栗同上同贄俱見荘二十四年大夫宗婦覿用幣注宗婦同姓大夫之婦禮小君至大夫執贄以見明臣子之道荘公欲奢夸夫人故使大夫宗婦丨丨丨丨春秋杜預注同贄無别今男女丨丨是丨丨也男女之别國之大節也而由夫人亂之無乃不可乎左荘二十四出疆必載孔子三月無君則皇皇如也丨丨丨丨贄孟庶人不𫝊萬章問曰敢問不見諸候何義也孟子曰在國曰市井之臣在野曰草莽之臣皆謂庶人丨丨丨丨質為臣不敢見於諸候禮也孟操瑟而往齊王好竽有求仕于齊者丨丨丨丨立王之門三年不得入叱曰吾瑟鼓之而能使鬼神上下為鼓瑟合軒轅氏之律呂客罵之曰王好竽而子鼔瑟瑟雖工如王不好何是所謂工于瑟不工于求齊也韓文抱璞而獻卞和者楚野民得玉獻懷王使樂正子占之言非玉以為欺謾斬其一足懷王死子平王立和復獻之平王又以為欺斬其一足平王死子立為荆王和復欲獻之恐復見害乃抱其玉而哭晝夜不止涕盡續之以血荆王遣問之于是和隨使獻王王使剖之中果有玉乃封和為陵陽侯卞和辭不就而去投梅花賦劉禹錫上權舎人書曰昔宋廣平之沉下僚也蘇公味道時為綉衣直指使者廣平丨以丨丨丨蘇盛稱之自是乃列於文人之目披芳草詩樂天未冠以文謁顧况况覩姓名熟視曰長安米貴居大不易乃丨卷讀其丨丨丨野火燒不盡春風吹又生嘆曰吾謂斯文遂絶今復得子矣前言戲之耳問柏板名韓愈皇甫湜一代龍門牛僧孺携所業謁之其首篇説樂即捲未嘗開卷丨曰且以丨丨為甚麽僧孺曰樂句二公大稱賞由此丨振詩話每寄以詩樂天不為贊皇公所喜丨丨詩文李緘之一篋未嘗開詩話嘗投其文牛僧孺赴舉之秋丨丨贄于劉補闕禹錫對客展卷飛筆塗竄丨丨歴二十餘嵗劉轉汝州牛出鎮漢南枉道汝州駐旌信宿酒酣賦詩劉方悟往年改公文卷僧孺詩曰粉署為郎四十春今來名輩更無人休論世上升沉事且鬬樽前見在身珠玉㑹應成咳唾山川猶覺露精神莫嫌恃酒輕言語曾把文章謁後塵禹錫和云昔年曾忝漢朝臣晚嵗空餘老病身初見相如成賦日後為丞相掃門人追思往事咨嗟久幸喜清光笑語頻猶有當時舊冠劍待公三日拂埃塵牛公吟和詩前意稍解曰三日之事何敢當焉宰相三朝後主印可以升降百司也于是移宴竟夕方整前駈後劉乃戒其子咸久承雍曰吾成人之志豈料為非汝輩進修以中為上古今詩話以所業贄王沂公曾為布衣時丨丨丨丨呂文穆蒙正中有早梅詩其警句云而今未論和羮事且向百花頭上開文穆云此生次第已安排作状元了作宰相矣已而果然湘山野録上所著書蘇公洵字明允至和嘉祐間歐陽文忠公丨其丨丨丨二十二篇韓忠獻復薦之召試舎人院言行録太白上韓荆州書見慕名門唐子西上任清翁序薛郡任公之敎授通義也士之曳長裾服方領抱書束帶優㳺于泮宮者數百人英俊豪傑往往輩出有少年書生曰唐某者誦書不甚多屬文不甚工碌碌落落無可稱者一日持一軸書掉三寸舌草衣麻屨攘袂登門危言高論不顧忌諱公一見而嗟異之再見而禮貌之三見而憐恤之勸戒勤篤敎諭欵宻某處之而不能自安退而諮之于客曰公于我厚矣吾将圖報矣吾欲脅肩謟笑巧言令色以順適其意以是報公可乎客曰不可是小人之報也吾将抱長劍挾匕首有惡聲至者以血濺其襟以是報公可乎客曰是俠客之報也吾将淬文鋒礪詞鍔庶幾起騰奮躍高飛逺舉于天下使天下之人指之曰斯人也出于任公之門以是報之可乎客曰唯唯是國士之報也某因書以為序謁見附不告謁先容不受謁事為𤼵揮謁見之禮古也詩不云乎未見君子憂心惙惙亦既見止我心則説君子者其有德有位者歟彼其所以不逺而來自潔以進者豈有他哉葢惟欲以瞻望道德之光耀親聆仁義之謦欬雷霆其聾聵日月其晦㝠得以自抜于庸人之中是所願也故儀封人以請見孔子為榮而曹交亦以得見于鄒君為幸夫豈若後世無恥之輩哉炙手于權門揺尾于勢家足将進而趦趄口将言而囁嚅處汚穢而不知羞觸刑辟而不免于戮辱其于為人賢不肖何如也故孔子寧不從仕而毋寧喪節于陽貨孟子寧不為卿而毋寧枉道于諸侯不事王侯高尚其志嗚呼此其賢于人也一等矣事類願聞命聞始見子者辭曰某固丨丨丨於将命者敵者曰某固願見罕見曰聞名亟見曰朝夕注亟數也于君子則曰某願朝夕聞名于将命者于敵者則曰某願朝夕見于将命者記少儀不寧居子産曰敝邑丨敢丨丨來會時事逢執事之不閒而未得見又不獲聞命未知見時左襄三十一年封人請見儀丨丨丨丨曰君子之至于斯也吾未嘗不得見也從者見之出曰二三子何患于喪乎天下之無道也久矣天将以夫子為木鐸語三陽貨欲見丨丨丨丨孔子孔子不見饋孔子豚孔子時其亡也而往拜之遇諸塗曰來予與爾言語十七孺悲欲見丨丨丨丨孔子孔子辭以疾将命者出户取瑟而歌使之聞之語十七齊王就見孟子将朝王王使人來曰寡人如就見者也有寒疾不可以風朝将視朝不識可使寡人得見乎孟公孫丑夷之求見墨者丨丨因徐辟而丨丨孟子孟子曰吾固願見今吾尚病病愈我且往見夷子不來他日又求見孟子孟子曰吾今則可以見矣不直則道不見我且直之文公上陳賈請見燕人畔王曰吾甚慙于孟子丨丨曰王無患焉云云賈請見而解之見孟子公孫丑下大王肯臨漢韓信為淮隂侯居常鞅鞅羞與綘灌等列嘗過樊将軍噲噲趨拜送迎曰丨丨乃丨丨臣信出門笑曰生乃與噲等伍丈夫相知爵禄不相責以禮同類之逰不以逺近為故東方先生居蓬户空穴之中魏公子以百騎造之大丨丨丨丨何必接塵而逰垂髪齊年哉東方朔與公孫洪書乃幸肯臨将軍丨丨丨丨况魏其田蚡𫝊乃幸左顧子高丨丨丨丨注猶言枉顧淮南憲傳掃門求見魏勃欲求見齊相曹參家貧無以自通常獨早丨齊相舎人丨外舎人怪之以為物而伺之得勃勃曰願見相君無因故為子掃欲以丨丨于是舎人見勃曹參因以為舎人漢書内謁逕入前翟方進丨丨丨丨注猶今之通名也不避寒暑張湯造請諸公丨丨丨丨本𫝊不避風雨朱博字子元稍遷為功曹伉俠好交隨從士大夫丨丨丨丨時蕭育陳咸以公卿子著材知名博皆友之本𫝊乃彌信宿郭林宗至汝南造袁奉高車不停軌鸞不輟軛詣黄叔度丨丨丨丨人問其故林宗曰叔度汪汪如萬頃之波澄之不清撓之不濁世説曳裾王門鄒陽曰今臣盡智畢議易精極慮則無國不可奸飾固陋之心則何王之門不可曳長裾乎住車閭巷漢樓護家居長安時成都侯商為大司馬衛将軍輔政罷朝欲候護主簿諫将軍至尊不宜入閭巷商不聽遂至護家家狹小官屬立車下久住移時天欲雨主簿謂西曹諸椽曰不肯彊諫反雨立閭巷或白主簿語商恨以他職事去主簿終身廢錮求見曹參魏勃事見前注往見薛宣漢朱雲成帝時不復仕常居鄠田時出乘牛車從諸生所過皆敬事焉薛宣為丞相雲丨丨之宣備賔主禮因留雲宿從容謂曰在田野亡事且留我東閤可以觀四方竒士雲曰小生乃欲相吏耶宣不復敢言追至東海後漢趙咨字丈楚東郡人靈帝時拜東海相之官道經滎陽令敦煌曹暠咨之故孝亷也迎路候謁咨不為留暠送至亭次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄印綬丨丨丨丨謁咨畢辭歸家為時所重如此嘗詣彭城後漢書應奉字世叔年二十時丨丨丨丨相袁賀賀時出行閉門造車匠于内開扇出半靣視奉後數十年于路見車匠識而呼之裁刺盈車郭林宗名益顯士爭歸之丨丨常丨丨本傳造門叙舊孔融丨李膺丨語門者曰我是李君通家子弟獨拜牀下後漢龎德公諸葛孔明每至德公家丨丨丨丨德公初不令止司馬德操嘗詣德公值其渡沔上先人墓德操徑入堂呼德公妻子使速作黍徐元直向云當來就我與德公談其妻子皆羅拜堂下奔走供設德公還直入不知何者是客也羅拜堂下見上文白符在門後漢王符字節信安定人度遼将軍皇甫規解官歸安定鄉人有以貨得鴈門太守者亦去職還家書刺謁規規卧不迎既入問卿前在鴈門食鴈美乎有頃白王丨丨丨規素聞符名驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖言書生道義之為貴也聞粲在門魏王粲蔡邕見而竒之邕嘗賔客盈坐丨丨丨丨倒屣迎之粲至年既幼弱容短小一坐盡驚外有狂生後漢禰衡字正平孔融愛其才數稱于曹操言衡欲詣操操大喜敕門者有客便通待之極厚衡着布单衣疎巾手持三尺棁杖坐大營門以杖捶地大罵吏曰丨丨丨丨言語悖逆操怒謂融曰禰衡竪子孤殺之如雀鼠直顧此人素有虚名逺近将謂孤不能容之今送與劉表視當何如衡臨發衆人為之祖道乃更相戒曰衡悖虐無禮今因其後至咸以不起折之也及衡至衆人莫肯興衡大號衆問其故衡曰坐者為塚卧者為屍屍塚之間能不悲乎宜先家君劉驎之尚書質素好道車騎将軍桓冲聞好辟為長史固辭冲嘗到其家驎之于樹條令使者致命驎之曰使君既枉駕先臨丨丨詣丨丨冲愧詣其父下車公謁後种拂拜宛令時南陽郡吏各因休沐㳺戲市里拂出逄之必丨丨丨丨以愧其心約來相見躡履問訊謝遏夏月嘗愛卧謝公清晨卒來不暇衣跣出屋外方丨丨丨丨公曰汝可謂前倨而後恭人奏一刺魏王候淵七歲能屬文誦書日千言文帝聞而詣焉賔客百餘人丨丨丨丨書其鄉里姓名世所謂爵里刺也客示之一寓目使之遍談不謬一人帝深竒之君負一刺孟宗為豫章太守謂倉掾曰丨昔丨太守丨丨寧識之否掾曰不識宗曰吾昔家貧親老為官資運以刺詣君感見𤼵遣何乃久屈耶呉録趨時致損晉范汪字𤣥平初為桓温安西長史温征蜀還復署為長史江州刺史皆不就自請還朝求為東陽太守温甚恨之後為安北将軍温北伐汪以失期免為庶人汪屏居呉郡後至姑熟見温時方起屈滯以傾朝廷謂汪詣已傾身引望曰范公來可作太常邪汪至温謝其逺來意汪實來造温恐以丨丨丨丨乃曰亡兒瘞故來視之温殊望望而止終日造謁何思澄天監閒整徐勉舉學士入華林撰遍畧勉舉思澄顧叶劉杳王子雲鍾嶼等五人以應選思澄重交結分書與諸賔朋校定而丨丨丨丨每宿昔作名刺一束曉便命駕朝賢無不悉與狎處即命食有人方之婁護欣然當之投晚還家所齎名刺必盡南史欲求司馬劉綜欲候司馬徽先使左右問其存亡徽耡園左右問馬君所徽曰我是徽頭靣醜陋聞者罵之曰即丨丨丨丨公何等田奴而稱徽更刷頭飾服而出左右叩頭謝之别傳誤通尚書齊張融欲詣吏部尚書何戢丨丨丨丨劉澄下車入門乃曰非是至户望澄又曰非是既造度視澄曰都自非是乃去行閽者杖昔者周公一沐三握髪一飯三吐餐以接白屋之士一日所見七十餘人晉文公以沐辭豎頭須致有圖反之誚門不停賔古所貴也失敎之家閽寺無禮或以王君寝食嗔怒拒客未通江南深以為耻黄門侍郎裴之禮好待賔客或有此輩對賔杖之童僕引接折旋俯仰莫不肅敬與主無别顔氏家訓遺閽者縑唐潘炎為翰林學士時京兆尹有故候炎累日不得見乃丨丨丨三百丨炎妻劉知之曰豈有京尹願一見遺以三百縑其危可知也乃勸炎避位願見将軍王適聞李将軍喜士乃蹐門曰天下善士王適丨丨丨丨白事請見祭酒高士亷備禮丨丨朱桃椎與之語不答瞪目而去士亷再拜曰丨丨其使我以無事治蜀耶乃簡條目州遂大治坐間和氣謝顕道云明道先生坐如泥塑人及至接人則渾是一團和氣門外積雪㳺定夫楊中立來見伊川一日先生坐而瞑目二子立侍不敢去久之先生乃顧曰二子猶在此乎日暮矣姑就舎二子退則丨丨雪深尺餘矣侯仲良語録坐上春風朱公掞見明道于汝州踰月而歸語人曰光庭在春風中坐了一月同上但視𫝊舎東坡在黄州邀一隱士相見丨丨丨丨不言而去坡曰豈非以身世為𫝊舎耶終不交談劉元城與人相見丨坐丨肯丨丨欲起屢留之然終不交談或問之曰人坐久必傾仄久而不傾仄必貴人也朱語録兩及吾門諫議大夫張師德謁向文簡敏中曰師德兩詣王相公門皆不得見恐為人輕毁望公從容明之一日方議知制誥公曰可惜張師德向公曰何謂公累于上前説張師德名家子有士行不意丨丨丨丨状元及第榮進素定但當靜以待之耳若奔競使無階而進者當何如也向公方以師德之意啓之公曰某處安得有人敢輕毁人但師德後進待我淺也向公自稱師德知有闕望公弗遺公曰第緩之使師德知聊以戒貪進警薄俗也名臣遺事始縁職事王沂公公軸尤抑奔競張師德久次館閣魯簡肅公盛稱張才德沂公以未識為解魯屢諷張見沂公丨丨丨丨一往沂公辭不見張大悔恨他日中書復議知制誥魯曰無以易張矣沂公曰張公器識德行足以當此但尚有請謁耳逾年方命掌誥澠水燕談次見如儀元豐間文潞公以太尉留守西京未交印先就第廟坐見監司府官唐介參政之子義問為轉運判官退謂其客尹煥曰先公為臺官嘗言潞公今豈挾以為恨耶某當避之煥曰潞公所為必有理姑聽之明日公交府事以丨丨監司府官丨常丨或以問公公曰吾未視府事三公見庶僚也既交印河南知府見監司矣義問聞之復謂煥曰微君殆有失于潞公也謁見抗禮宰相自唐以來謂之禮絶百寮見者無長幼皆拜宰相平立少垂手扶之送客未嘗下階客坐稍久則吏從旁唱相公尊重客踧踖起退及富鄭為相雖微官布衣丨丨皆與之丨丨送之及門視其上馬乃還自是羣公稍效之記聞見客問事李昉為相每丨丨必丨三丨民間有何疾苦為政有何術業時政有何闕失李宗諤索遊上謁范文正在睢陽掌學有孫秀才者丨丨丨丨文正贈錢一千明年孫生復謁文正又贈一千因問何為汲汲于道路孫生戚然動色曰母老無以養若日得百錢則甘旨足矣文正曰吾觀子詞色非乞客也吾今補子為學職月可得三千以供養子能安于學乎孫生大喜于是授以春秋後十年有孫明復先生以春秋敎授學者道德高邁朝廷召至乃昔日索遊孫秀才也東軒談論逾時劉忠定公見賔客丨丨丨丨體無欹側肩背竦直身不少動至手足亦不移拜跪有禮王貽孫字象賢溥之子太祖嘗問趙普丨禮何以男子丨婦人不跪徧問禮官無丨知者貽孫曰古詩云長跪問故夫即婦人亦跪也唐天后朝始拜而不跪普問其所出對曰太和中幽州從事張建章渤海國記以溥藏書萬卷貽孫遍覧之類苑不造謁亦闞其亡陽貨欲見孔子闞孔子之亡也而饋孔子蒸豚孔子丨丨丨丨也而往拜之孟滕文公下不能造朝孟子将朝王王使人來曰寡人如就見者也有寒疾不可以風朝将視朝不識可使寡人得見乎對曰不幸而有疾丨丨丨丨孟公孫下未嘗候謁井丹字大春博學故京師為之語曰五經紛綸井大春丨丨書刺丨丨人梁松請友丹不肯見後遂隱遁不耐造請張敷曰臣性丨丨丨丨不候陳寔後漢許劭字子将嘗到潁川多長者之逰唯丨丨丨丨不造陳蕃又陳蕃喪妻還葬劭獨不往或問之曰太丘道廣廣則難周仲舉性峻峻則少通故丨丨也覆刺遺書後漢高彪嘗從馬融欲問大義融疾不見乃丨丨丨融丨曰聞高風為日久矣故不待介者造君子之門兾一見龍光叙腹心之願不圖辭之以疾昔者周公兄父文武九命作伯以居華夏猶握沐吐飱以接白屋之士天下歸德歴載邈矣今君不能相見宜哉融省書大慙遣人辭謝追請徑去不還取刺勿通北齊李元忠初神武東出元忠乘露車載素箏濁酒奉迎神武聞其酒客未即見之元忠下車獨酌擘脯食之謂門者曰本言公招延賢雋今國士到門不能吐哺輟洗其人可知還吾丨丨復丨門者以告神武遽見之引入觴再行元忠上車取箏鼔之長歌慷慨謂神武曰天下形勢可見明公猶欲事爾朱乎神武曰富貴皆由他安敢不盡節元忠曰非英雄也因進從横之䇿深見嘉納雞跖集漫刺無遇禰衡尚氣剛傲好矯時慢物建安初自荆州北遊許都書一刺懐之丨滅而丨所丨或問之曰何不從陳長文司馬達乎衡曰卿欲使我從屠沽兒輩耶不見州尊劉璋時王商與秦宓書曰貧賤困苦何可終身宜一來與州尊相見宓荅曰僕曝背乎壠畝之中誦顔氏之簟瓢詠原憲之蓬户翺翔林澤聽𤣥猿之悲吟察鶴鳴于九臯斯乃僕得志之秋何困苦之戚哉宓𫝊不詣京尹唐韋貫之為長安丞或薦之京兆尹李實實舉笏示所記曰此其姓名也與我同里素聞其賢願識之而進於上或告曰子今日詣實明日賀者至矣貫之唯唯不往不見刺史唐王績字元功絳州人刺史崔喜請見答曰奈何坐致嚴君平邪卒不詣杜之松故人也為刺史請績講禮荅曰吾不能揖讓邦君門談糟粕棄醇醪也不受謁取瑟而歌見前踰垣而避古者不為臣不見段干木丨丨丨丨之閉門不納泄栁丨丨而丨丨是皆已甚迫斯可以見矣並孟子滕文公下徒亂人國穰侯謂王稽謁君得無與諸侯客子俱來乎無益丨丨丨丨耳如見天帝蘇秦曰楚國之食貴于玉薪貴于桂謁者難見如鬼戰國王難得丨丨丨丨今令臣食玉炊桂因鬼見帝戰國䇿不行報謝張禹公卿相造請禹終丨丨丨丨過而不存呉虞翻年十三客有候其兄者不過翻翻與書曰琥珀不取腐芥磁石不受曲鍼丨丨丨丨不亦宜乎客竒之了不相盼宋闗康之隱居南平昌顔延之等候見散髪被黄布帕席松葉枕白石一塊而卧丨丨丨丨延之等咨嗟而退不敢干也題門作鳯嵇康與呂安善毎一相思千里命駕後來值康不在嵇喜出户延之不入丨丨上丨丨而去喜不覺猶以為欣作鳯字凡鳥也刻木為人魏常林傳注時苗字德胄為夀春令蒋濟為治中苗初至謁濟濟素嗜酒適會其醉不能見苗恚恨丨丨丨丨書曰酒徒蒋濟置之墻下旦夕射之便鞭門幹桓𤣥嘗詣王忱通人未出乗轝直進忱對立丨丨丨丨元怒去之忱亦不留忱傳為忍俄頃桓温謀不軌㕁超為之謀主謝安嘗與王文度共詣㕁超日旰未得前文度便欲去安曰不能丨性命丨丨丨其權重當時如此超傳據床曬髪王導子恬性傲誕不拘禮法謝萬嘗造恬既坐少頃恬便入内萬以為必厚待已殊有喜色恬久之乃沐頭被髪而出丨胡丨于庭中丨丨神氣傲邁竟無賔主之禮萬悵然而還登牀捧手後魏任城王澄子順為給事中時尚書令高肇帝舅權重天下順曾懐刺詣肇門門者以其年少答云在坐大有賔客不肯為通順叱之曰任城王兒可是賤也及見直往丨丨丨丨抗禮王公先達莫不怪懼而順辭吐傲然若無所覩謂衆曰此兒豪氣尚爾况其父乎澄聞之大怒杖順數十不喜俗交甫里先生陸龜蒙性丨丨與丨人丨雖詣門不得見也不置車馬不務慶弔内外姻黨伏臘喪祭未嘗及時往或寒暑得中體佳無事時則乘小舟設蓬席賫一束書茶竈筆床釣具擢船郎而已所詣小不會意徑還不留雖水禽决去山鹿駭走之不若自作傳謁見貶秩唐令狐峘為吉州刺史時齊映觀察江西按部及州峘輕映後出至迎謁頗怏怏語其妻妻曰君自視何如人以白頭走小生前君雖不以此黜死我憾映至峘入見從容步進不抹首屬戎器映以為恨擿峘事貶衢州司馬往見奪官五代唐趙鳯與于嶠俱在翰林相善鳯後為相嶠以才名出鳯上而不用數非斥時政尤訿鳯鳯銜之因事左遷嶠秘書少監嶠因醉酒丨丨鳳鳳知其必不遜辭以沐髪嶠詬直吏又溺于從者直廬而去吏白嶠溺于客次且詬鳯鳯以聞明宗丨嶠丨長流乃留一絶蔡文忠公宋大中祥符登進士第為状元山東人賈同亦名士也與公同州部累往謁公值公飲酣不得見賈丨丨詩丨丨云聖君寵厚龍頭選慈母恩深鶴髪隨君寵母賢猶未報酒如為患悔何追公因此戒酒大書午字李安義者謁富人鄭生辭以出安義于門上丨丨丨丨而去或問其故荅曰牛不出頭耳此亦昔人題鳳之意遯齋閑話忘見勿訝文潞公判北京有汪輔之者新除運判為人辨急初入謁潞公方坐㕔事閲謁刺置案上不問入宅久之乃出輔之已不堪既見公禮之甚簡謂曰家人頃令沐髪丨丨運判丨丨輔之沮甚舊例監司至之三日府必作會公故罷之輔之移文定日檢按府庫通判見徳有人先游而枯木朽株樹功而不㤀今天下布衣窮居之士身在貧羸雖蒙堯舜之術挾伊管之辨龍逢比干之意而素無根柢之容雖竭精神開忠于當世之君則人主必襲按劍相朌之迹是使布衣之士不得為枮木朽株之資也是以聖王制世御俗獨化于陶鈞之上而不牽乎卑辭之語不奪于衆多之口秦皇任中庶子蒙之言以信荆軻而匕首切𤼵周文王獵涇渭載呂尚歸以王天下以其能越攣拘之語馳域外之議獨觀乎昭曠之道也今人主沉謟諛之辭率帷廧之制使不羈之士與牛驥同皂此鮑焦所以憤于世也盛飾入朝者不以私汚義砥礪名號者不以利傷行故里名勝母曾子不入邑號朝歌墨子回車欲使天下寥廓之士籠于威重之權脅于位勢之貴回靣汙行以事謟諛之人而求親近于左右則士有伏死堀穴岩藪之中安有盡信而趨闕下者哉古今合璧事類備要續集卷四十九
