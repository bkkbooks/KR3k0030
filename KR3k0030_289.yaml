body:
  text: 古今合璧事類備要别集卷八十三宋謝維新撰畜産門羊格物總論羊褐白黑三色亦有青者南人所罕見牡一歲曰䍮雉矯瓦三歲曰羝牝一歲曰牸三歲曰牂吳羊犗曰䍸羖羊犗曰羯羖羊毛長尺餘北人引羊以此為羣首北地河西陜西河東羊最佳其次淮南州郡亦有佳者閩廣不及也羔羊子也羜五月生􅧌務六月生它達反七月生事類羸角羝羊觸藩丨其丨易墳首牂羊丨丨詩苕之華柔毛凡祭宗廟之禮羊曰丨丨曲禮長髯羊一名丨丨主簿古今注不殺羊大夫無故丨丨丨曲禮不畜羊伐冰之家丨丨牛丨大學使羊備堯丨其子九男二女百官牛丨倉廩丨以事舜於畎畝之中孟爾羊來宣王考牧誰謂爾無羊三百維羣丨丨丨思其角濈濈或降於河或飲於池證父攘葉公語孔子曰吾黨有直躬者其父攘羊而子丨之告朔餼子貢欲去丨丨之丨羊子曰賜也爾愛其羊我愛其禮並語土之怪季桓子穿井獲如圡缶其中有羊焉使問仲尼曰吾穿井得羊也對曰丘聞之丨丨丨羵羊也家語嶽之精太山失金雞西嶽玉羊鄭玄注曰二丨丨丨也周易謀類堯舜不前楊朱見梁惠王言治天下如運諸掌王曰先生有一妻一妾而不能治三畝之園而不能耘言治天下何也曰君見乎牧羊者乎百羊之羣使五尺童子荷箠而隨之欲東而東欲西而西使丨牽一羊丨荷箠而隨則丨能丨也列子臧榖俱亡丨與丨二人相與牧羊而丨丨其羊問臧奚事則挾册讀書問榖奚事則慱塞以遊莊子多歧亡羊揚子之鄰人亡羊既率其黨又請楊子之竪追之楊子曰嘻亡一羊何追之者衆鄰人曰丨丨既返問獲羊乎曰丨之矣曰奚亡之曰歧路之中又有歧焉吾不知所之所以反也列子肉袒牽牛楚子圍鄭鄭伯丨丨丨丨以逆曰孤不天不能事君使懷怒以及敝邑孤之罪也左傳羊斟非人宋華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政今日之事我為政與入鄭師故敗君子謂丨丨丨丨也以其私憾敗國殄民宣二年羊舌為氏昔有攘羊者以羊頭遺晉叔向向母埋之不食後三年攘羊事發追捕向家撿羊頭肉都盡惟有舌在國人異之遂以丨丨丨丨説亦屠羊屠羊説楚人隱於屠肆昭王失國説往從王王反國欲將賞説説曰大王失國説失屠羊大王反國丨丨丨丨臣之爵祿亦復矣又何賞之有使司馬子綦延之以三圭之位説曰願長反屠羊之肆耳遂不受高士傳鬼化為羊南陽宗定伯年少時夜行逢鬼問鬼所忌唯不喜人唾定伯便擔丨著頭上急持行徑至市中下著地丨丨一丨唾之恐其變化賣之得錢五千雄異傳卜式牧羊丨丨有少弟出分獨取畜産百餘田宅財物盡與弟式入山丨十餘歲丨千餘上曰吾有羊在上林中乃拜式為郎布衣草蹻牧羊歲餘羊肥息上見其羊問之式曰非獨羊也治民亦猶是也惡者輒去無令敗羣上以式為奇拜緱氏令本傳蘇武牧羝丨丨往使胸奴胸奴知武不可降使北海上無人處丨丨羊羝乳乃得歸武至海上廩食已盡乃掘野鼠草荄而食武仗漢節牧羊卧起常操持節旄盡脫本傳爛羊都尉更始劉聖功納趙萌女為夫人故委政於萌日夜飲宴後庭羣臣欲言事輒醉不能前以至羣小膳夫皆濫授官爵長安為之話曰竈下養中郎將丨丨胄騎丨丨爛羊頭關內侯通鑑瘦羊博士甄宇北海人建武中青州從事徴拜博士每臘詔賜博士羊人一頭羊有大小肥瘦時博士祭酒議欲殺羊稱分其肉宇曰不可義欲投鉤宇復恥之宇因先取其最瘦者後召問丨丨丨丨所在京師因以為號東觀漢記左慈化羊丨丨字元放曹操嘗出近郊從者百許人慈為齎酒一升脯一斤手自斟酌百官醉飽操怪之使行視諸壚悉亡其酒脯操懷不喜欲因坐上殺之慈郤入壁中霍然不知所在或見於市又捕之市人皆變形與慈同莫知誰是後人逢慈於陽城山頭因復遂之遂走入羊羣操知不可得令就羊中告之曰不復相殺本試君術耳匆一老羝屈前膝人立言曰遽如許即競往赴之羣羊數百皆變為羝並屈膝人立言曰遽如許遂莫知所取初平化羊黃初平年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年匆然不復念家其兄初起行索初平歷年不得後見市中有道士乃問之道士曰金華山中有牧羊兒姓黃字丨丨兄乃隨道士與初平相見語畢問羊何在曰在山東兄往視但見白石不見羊初平曰羊在耳兄自不見初平乃往呪羊羊起於是白石皆起成羊數萬頭神仙傳牧羊學書事見蒲門牧羊讀書楊俊同郡王象少孤特為人僕𨽻年十七八見使丨丨即私丨丨因獲捶楚俊美其才質即贖象回家婚娶立屋然後與别象官至散騎常侍魏志宫人引車晉丨丨以鹽塗竹葉丨羊丨衛玠乘車丨丨總角丨羊丨入市見者皆以為玉人女曰非羊栁毅遇洞庭女牧羊曰吾不知子之牧羊何所用哉神祗豈宰殺乎丨丨丨丨雨工也何謂雨工曰雷霆之類也毅復視之則皆矯顧拏步飲齕甚異而大小毛角則與羊無别焉當食萬羊唐相國李德裕為太子少保分司東都嘗召一僧問已之休咎僧曰公災當萬里南去曰南去遂不還乎僧曰當還耳公訊其事對曰相國平生丨丨丨丨今食九千五百矣所以當還者未盡五百羊耳公慘然而嘆曰吾師果至人且我元和十三年為丞相張公從事於北都嘗夢行晉山見山上盡目皆羊有牧羊者十數迎拜我我因問牧者牧者曰此侍御平日所食羊吾嘗識此夢不泄於人今者果如師之説耶後旬日振武節度使米暨遣使至書於公且饋四百羊公大驚即召告其事僧嘆曰萬羊將蒲公其不還乎公曰吾不食之亦可免耶曰羊至此已為相國所有公戚然不悅旬日貶潮州司馬連貶崖州司户竟沒於荒裔太平廣記望為羣羊王處存以輕兵三千蒙羊皮夜布之野李全忠軍丨丨丨丨爭趨之李茂勳傳思食燒羊仁宗性仁恕一日晨興語近臣曰昨夕因不寐而甚飢丨丨丨丨侍臣曰何不降旨取索仁宗曰比聞禁中每有取索外面遂以為例誠恐自此逐夜宰殺以備非時供應則歲月之久害物多矣豈不忍一夕之餒而啓無窮之殺也時左右皆呼萬歲至有感泣者魏泰記蘇子瞻贊畫黃初平牧羊圖先生養生如牧羊放之無何有之鄉止者自止行者行先生超然坐其旁挾册讀書羊不亡化而為石起復僵流涎磨牙笑虎狼先生指呼羊服箱號稱雨工行四方莫隨上林芒屩郎嗅門舐地尋鹽湯詩集仙人騎畨禺五丨丨丨羊各一色手持六秬穗翺翔繞城壁翩然去乘雲諸羊化為石至今留空祠異像猶可識曽聞經猛火毫髮無痕迹五仙寧復來三説頗難測只憂風雨至半夜隨霹靂君不見匡廬劉越之洞天萬象森羅無一尺郭功甫五仙謠兒童駕細肋柔毛飽卧沙煩公遣騎送寒家忍令無罪充庖宰留與丨丨丨小車黃魯直戲答張祕監饋羊豕格物總論豕豨豬之總名生三月曰豯六月曰豵二歲曰豜豝牝豕豭牡豕老豬曰􅀈小豬曰豚小母豬曰䝒七俱反老母豬曰􅀈山甲反求子豬曰䝏䝕之涉反良豬也野豬謂之貒音猯事類剛鬛凡祭祀之禮豕曰丨丨豚曰腯肥記曲禮長喙一名丨丨將軍古今注白蹢有豕丨丨蒸涉波矣詩漸漸之石黑面桂林風俗日食蛙曰豈不勝於丨丨郎哉丨丨郎謂豬也承平舊纂饋豚陽貨欲見孔子孔子不見而丨丨丨丨語佩豭子路性鄙好勇力冠雄雞丨丨豚史祭先晏平仲儉丨丨人豚肩不掩豆禮記啖子孟子少時聞東家殺豬問母何為曰欲丨汝既而母悔曰吾嘗教以割不正不食席不正不坐今適有知而欺之是教之不信也乃買鄰豬肉以食之韓詩外傳伯封貪昔有仍氏生女樂正后夔取之生丨丨實有豕心丨婪無厭謂之封豕左昭七彭生見齊無知殺其君十二月齊侯遊於姑棼遂田於貝丘見大豕從者曰公子彭生也公怒曰丨丨敢丨射之豕人立而啼公懼墜於車傷足喪屨遇賊於門遂殺之而立無知左莊八野人歌衛靈公夫人南子與宋朝通衛太子使齊至宋宋丨丨以婁豬刺而丨之云既定爾婁豬盍反吾艾豭左昭七朔人獻丨丨丨燕昭王以大豕曰養奚若使曰豕也非大圊不居非人便不餮今年百二十矣人謂豕仙王乃命豕宰養之大如沙豶足如不勝其體甚巨無用燕相謂王曰奚不享之王乃命宰夫膳之夕見夢於燕相曰造化勞我以豕形食我以人穢吾患其生久矣仗君之靈得化吾生始得為魯津之伯燕相遊乎魯津有赤龜奉璧而獻符子項羽賜丨丨丨樊噲巵酒彘肩公孫牧丨丨𢎞少時為獄吏有罪家貧丨豕海上並本傳持兵救郅都為中郎將從景帝入上林賈妃在厠野彘入厠上目都都不行上欲自丨丨丨賈妃都曰亡一妃復亦妃進天下所少寧妃等耶陛下縱自輕奈宗廟太后何上還彘亦不傷妃利兵刺竇太后好老子書召轅固問老子固曰此家人言耳太后怒曰安得司空城旦書乎使固下圈擊豕景帝知太后怒而固直言無罪乃假固丨丨下圈丨豕正中其心應手而倒太后默然乃罷之遼東獻朱浮責彭寵書曰伯通自伐以功為髙天下往時丨丨有豕生子白頭異而丨之行至河東見羣豕皆白懷慙而還若以子功諭於朝廷則為遼東豕也橋東養襄陽橋曰大蘭橋者今之豬蘭橋也劉𢎞季以此橋近荻有蕺菜於丨丨火丨豬襄陽太守府君曰依此豬尿當易名作蘭橋耳復大蘭橋也初如戲之而百姓遂易其名也白氏帖送豕謝萌曹萌以仁厚稱鄰人有亡豕者與萌豕相類詣門認之萌不與爭後所亡豕自還其主大慙丨所認丨以丨丨萌笑而受之以豬還徽司馬徽嘗有人妄認徽豬豬與之後得亡豬丨丨丨丨叩頭自責徽厚謝之常買輒得關仲叔居安邑家貧不能得錢買肉安邑令候之問諸子何飲食對曰但食豬肝屠者或不肯與之令出敕市後丨丨丨丨仲叔怪問其子道狀如此乃嘆曰仲叔豈以口腹纍安邑耶遂去半直以還宋穆嘗養豬有病使人賣之於市買豬者售不言病且直過多穆怪其貴故丨丨丨丨買豬者辭不取穆棄錢而去梁鴻牧豕丨丨家貧丨丨上林苑中曽誤遺火燒及他舍乃以豕償之其主猶以為少鴻願以身居作主人許因為執勤不懈耆老見鴻非常人乃共責讓主人於是悉還其豕鴻不受乃去馬氏賣豬丨丨兄弟五人共作客舍養豬丨丨故氏謂之曰苑中三公門下二卿五門嚄嚄但聞豬聲三輔決録以乳蒸豚晉王濟性豪侈帝幸其家供饌盛豐蒸豚尤美上問其故對曰丨人丨丨之上色不平食未畢而去拔劒斷豕唐獵洛陽苑羣豕突出於林帝射四發輒殪四豕一豕躍及鐙投馬摶之帝丨丨丨丨顧笑曰天䇿長史不見上將擊賊耶何懼之甚佺對曰陛下神武定四方豈復快心於一獸耶安祿山化丨丨丨嘗夜宴醉卧丨為黑豬而龍首左右遂言之玄宗曰豬龍也無能為者祿山事迹烏將軍娶郭元振開元中下第自晉之汾夜行失道有宅門宇甚峻堂上燈燭而悄無人俄聞女子哭聲公曰人耶鬼耶曰妾鄉有丨丨丨能禍福人每歲鄉人擇美女嫁焉父利鄉人之金潛以應選醉置此室而去將軍二更當來公大憤曰吾力救不當殺身以徇女未久車馬駢闐紫衣吏入復走曰相公在此既而將軍入公出揖曰聞今夕嘉禮願為小相將軍喜而延坐公取佩刀斫其腕而斷之將軍失聲而走天明視其手乃豬蹄也俄聞哭聲漸近乃父母舁櫬而來將收其尸公具告焉乃令鄉人執弓矢尋血而行入大冡中見大豬無前蹄走出而斃公納其女為側室幽怪録豕為民患盧杞為虢州刺史奏言虢有官丨三千丨丨丨德宗曰徙之沙苑杞曰同州亦陛下百姓臣謂食之便帝曰守虢而憂他州宰相才也詔以豕賜貧民遂有意柄任矣豬入録廳張端為河南司録府當祭社買豬已呈尹突丨丨丨即殺之吏以白尹尹問端對曰按律諸無故夜入人家主人登時殺之勿論尹大笑為别市豬貢父詩話誣告豬肉經筵官會食資善堂東坡盛稱河豚之美吕原明問其味曰直那一死再會又稱豬肉之美范淳甫曰奈發風何東坡笑曰淳甫丨丨丨丨訴失豭豬淳化中京畿民牟睴擊登聞鼓院丨家奴丨丨丨一詔令賜千錢償其直因謂宰相曰似此細事悉訴於朕亦為聽決大可笑然此推心以臨天下可以無寃民矣餽蒸豬頭王中令既平蜀飢甚入一村寺主僧醉甚箕踞公欲斬之僧應對不懼公奇之公求蔬食云有肉無蔬丨丨丨丨甚美公喜問止能飲酒食肉耶為有技也僧言能詩公言賦蒸豚詩立成云觜長毛短淺含臕久向山中食藥苗蒸處已將蕉葉裹熟時兼用杏漿澆紅鮮雅稱金盤飣軟熟真堪玉筯挑若把氊根來比並氊根日合喫藤條公大喜與紫衣師號仇池筆記袁淑大蘭王九錫文大亥十年九月乙亥朔十三日丁亥北燕伯使使者豪豨册命大蘭王曰惟君稟太隂之沉精標羣形於玄質體肥腯而洪茂長無心以遊逸資豢養於人主雖無爵而有秩此君之純也君昔封國殷商號曰豕氏業隆當時名垂後世此君之美也白蹢彰於周詩涉波應乎天象歌詠垂於人口經千載而流響此君之德也君相與野遊唯君為雄顧數百自西徂東俯噴沫則成霧仰奮鬛則生風猛毒必噬有敵必攻長驅直突陳無全鋒此君之勇也詩集司原豢豨丨丨丨俗丨目見容隂昵喜此為白麟惟憂不豐湓烈飈澤雨作真聲向人出司原悔何由肝膽空駭栗梅都官先生饋肉老夫畏熱飯不能丨丨丨丨香傾城霜刀削下黃水精月斧斫出紅松明君家豬紅蠟前作是時雪後吳山腳公子彭生初解縛糟丘挽上凌煙閣却將一臠配兩螯世間真有楊州鶴楊廷秀吳春卿餉臘豬肉戲作古句古今合璧事類備要别集卷八十三
