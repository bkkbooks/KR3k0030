body:
  text: 古今合璧事類備要前集卷二十宋謝維新撰災異門日蝕事類陰蔽陽明日者衆陽之宗人君之表至尊之象君德衰微丨道盛强侵丨丨丨則日食應之孔光傳陽微陰盛杜欽曰日食地震丨丨丨丨也漢書男教不修丨丨丨丨陽事不得謫見於天日為之食故日食則天子素服而修六宫之職蕩天下之陽事禮記大中不立丨丨之道丨丨則咎徴荐臻六極屢降皇之不極是為丨丨丨丨其傳曰時則有日月亂行謂朓側匿甚則薄蝕是也史記臣壅君明唐一行日食議曰小雅十月之交朔日辛卯虞􅒠以厯推之在幽王六年開元厯定交分四萬三千四百二十九入食限加時在晝交㑹而食數之常也詩云彼月而食則維其常此日而食于何不臧日君道也無朏魄之變月臣道也逺日益明近日益虧望與日軌相會則徙而浸逺逺極又徙而近交所以著人臣之象也望而正於黃道是謂臣干君明則陽斯食矣朔而正於黃道是謂丨丨丨丨則陽為之食矣且十月之交於厯當食君子猶以為變詩人悼之然則古之太平日不食星不孛蓋有之矣若過至未分月或變行而避之或五星潜在日下禦侮而救之或涉交數淺或在陽厯陽盛陰微則不食或德之休明而有小青焉則天為之隱雖交而不食此四者皆德教之所由生也唐書天見災異乃正月辛丑朔日有食之變見三朝之會上天聰明茍無其事變不虛生臣聞師曰天右與王者故災異數見以譴告之若不畏懼有以塞除而輕忽簡誣則凶罰加焉漢書孔光傳朔月之食十月之交朔日辛卯日有食之亦孔之醜詩晦日之食乃十一月丨丨有食之適見于天災孰大焉漢文紀分至不災昭公二十一年秋七月日有食之公問於梓慎曰是何物也禍福何為對曰二至二分日有食之不為灾日月之行也分同道也至相過也其他月則為災陽不克也故常為水左傳交會則食日月之㑹自有常數每一百七十三日有餘日月之道一交則日月必食春秋正義當食不食開元十二年七月戊午朔於厯丨丨半强自交趾至朔方候之丨丨十二月庚戌朔於厯食大半時束封泰山還次梁宋間皇帝徹膳不舉樂不蓋素服日亦不食時羣臣與八荒君長之來助祭者降物以需不可勝數皆奉夀稱慶肅然臣服雖算術乖舛不宜如此然後知德之動天不俟終日矣唐史應虧不虧開元二年二月庚寅朔太史奏太陽丨丨丨丨姚崇表賀請書之史冊同上如月之初黃琬祖父瓊為魏郡太守建和元年正月日食京師不見而瓊以狀聞詔問所食多少瓊思其對而未知所况琬年七嵗在傍曰何不言日食之餘丨丨丨丨後漢如鈎不盡征和四年八月辛酉晦日有食之不盡如鉤漢五行志梁武帝太清元年正月朔日有食之不盡丨丨開元十七年冬十月戊午朔日有食之丨丨如鉤通鑑伐鼓于朝莊公二十五年六月辛未朔日有食之鼓用牲于社丨丨丨丨左傳以絲禜社日有食之丨朱丨丨丨公羊瞽奏鼓乃季秋月朔辰弗集于房丨丨丨嗇夫馳庶人走注辰日月所㑹房所舍之次集合也不合則日食可知凡日食天子伐鼓于社責公瞽樂官進鼓則伐之嗇夫主幣之官馳幣禮天神衆人走供救日月之百役也尚書士擊柝天子救日置五麾陳五兵五鼓諸侯置三麾陳三兵三鼓大夫擊門丨丨丨言充其陽也麾旌幡也五兵戈㦸鉞弓矢也榖梁麒麟鬬丨丨丨而日食慱物志春秋書丨丨二百四十二年日食三十有六正陽月仁宗景祐元年四月日有食之正陽之月自古所忌歸田録正旦日仁宗康定元年嘉祐四年神宗熙寧元年丨丨丨食同上詩集月蝕歌赫赫初出咸池中浴光洗跡生天東不覺有物來晦昧團團一片如頑銅前時蝦蟆闕盧妃天下戢戢無有忠責罵四方誰膽大仰頭憤憤唯同欲持寸刃去其害氣力雖有天難通是時了無毫芒益徒有文字辨且雄同死于今百餘載日月幾度遭遮蒙衆人見之如不見誰肯開口咨天公老鴉居處已自穩三足鼎峙何乖慵而今有嘴不能噪而今有爪不能攻任看怪物翳天眼方且省事保爾躬日月與物固無惡應由此烏招禍凶吾意髣佛料此鳥定亦閃避離日宫安逢后羿不乖暴直與審慤彎强弓射此賈怨鳥以謝惡毒蟲二曜各安次災害無由逢南不尤赤鳥東不誚蒼龍北龜勿吐氣西虎勿嘯風五行不汨陳虞舜生重瞳我今作此詩可與同比功梅聖俞月蝕事類維常彼月而食則丨其丨詩不食天下太平五星循軌日丨丨朔月丨丨望出漢史士女擊鑑長安城中每月食丨丨取鑑向月丨之云救月食開元遺事詩集癡蝦蟇爛銀盤從海底出出來照我茅屋東天色紺滑凝不流水光交貫寒朣朧初疑白蓮花浮出龍王宫八月十五夜比並不可雙此時怪事發有物吞食來輪中輪如壯士斧所壞桂似雪山風拉摧百錬鏡照見膽平地埋寒灰火龍珠飛出腦却入蚌蛤胎捶環破璧眼看盡當天一搭如煤炲磨蹤滅跡須臾間便似萬古不可開又聞古老說蝕月蝦蟇精徑圓千里入汝腹如此癡騃阿誰生須臾癡蟇精兩吻自决拆初露半箇璧漸吐滿輪魄衆星盡原赦一蟇獨誅磔腹肚忽脫落依舊挂穹碧光彩未蘇來慘淡一片白奈何萬里光受此吞吐厄盧同黑水精天如青玻瓈月若丨丨丨時當十分圓只見一寸明主婦煎餅去小兒敲鏡聲此雖淺近意乃重補救情夜深兔窟出衆星隨西傾古詩星變又詳見前星類事類妖星丨丨一曰彗星所謂掃星本類星末類彗小者數寸長或竟天二曰孛星彗之屬也偏指曰彗星芒氣四出曰孛三曰天棓夲類星末鋭長四丈四曰天搶五曰天攙本類星末鋭六曰蚩尤旗類彗而後曲象旗七曰天衝出如人蒼衣赤頭不動八曰國皇大赤類老人星九曰昭明象如太白光芒不行十曰司危如太白有目十一曰天讒彗出西北狀如劍長四五丈十二曰五殘出正東東方星之狀類辰可去地六七丈十三曰六賊出正南去地可六丈大而赤動有光十四曰獄漢出正北去地可六丈大而赤動有光十五曰旬始出斗北旁如雄雞十六曰天鋒彗象矛鋒十七曰爝星如太白其出也不行見則不久而滅十八曰蓬星大如二斗器色白十九曰長庚如一匹布著天二十曰四填星出四隅去地六丈餘二十一曰地維藏光出四隅晉天文志流星丨丨天使也自上而降曰流自下而上曰飛大者曰奔奔亦流星也同上天狗星丨丨狀如犬奔丨色黃有聲其止地類狗所墜望之如火光炎炎衝天其上鋭其下圓或曰星有毛旁其短彗下有狗形者狀赤白有光下即為天狗一曰流星有光見人而墜無音若有足者同上營頭星有雲如壞山墮謂丨丨丨所墮其下覆軍流血千里亦曰流星晝隕名營頭同上彗以除穢齊有彗星齊侯使禳之晏子曰無益也且天之有彗丨丨丨也君無穢德又何禳焉若德之穢禳之何損左傳軫則起兵軫星明則兵大起晉天文志長星竟天始皇時十五年間彗星四見久者八十日長或竟天漢天文志武帝建元六年八月長星出于東方長終天占曰是為蚩尤旗見則王者征伐四方漢書隕星如雨莊七年四月常星不見夜明也星隕如雨與雨偕也左傳星孛北斗有丨丨入于丨丨孛者何彗星也公羊文公十四年七月有丨丨于丨丨董仲舒以為孛者惡氣所生也謂之孛者言其孛孛有所妨蔽暗亂不明之貌也劉向以為君臣亂於朝政令虧於外則上濁三光之精五星嬴縮變色逆行甚則為孛北斗人君象孛星亂臣類傳曰魁者貴人之牢天彗星較然在北斗中天之示人顯矣漢五行志星孛西方宣帝地節元年正月有丨丨于丨丨去太白二丈許劉向以為太白為大將彗孛加之掃滅象也明年霍光薨復二年家夷滅同上彗星西指開成元年二月丙午有丨丨在危長七尺餘丨丨南斗戊申在危西南芒耀愈甚癸丑在虛辛酉長丈餘西行稍南指壬戌在婺女長二丈餘廣三尺癸亥愈長且澗三月甲子在南斗乙丑長五丈其末兩岐指氐二度掩房丙寅長六丈無岐北指在元七度丁卯西北行東指己巳長八丈餘在張癸亥長三尺在軒轅不見凡彗星晨出則西指夕出則東指乃常也未有遍指四方凌犯如此之甚者唐志枉矢晝見永元二年春丨丨丨丨西方長十餘丈王騫曰此除舊布新之象也及梁武起兵騫曰天時人事其在此乎南史折木指星漢武帝嘗見彗星東方朔丨指星丨以授帝以丨彗丨應時而沒廣記舉杯屬星太元末長星見孝武心甚惡夜華林園中飲酒丨丨丨丨云長星勸爾一杯酉自古何時有萬嵗天子世說詩集旄頭丨丨彗紫微杜甫雹事類毁瓦人君信讒殺無罪則雹丨丨破車殺牛馬唐五行志傷稼韓陵為下邽令鄰縣皆雹丨丨陵境獨無本傳陰脅陽盛陽雨水溫暖而陽熟丨丨丨不相入則為雹洪範五行傳風角日丨丨丨徴動羽有雹霜瑣録常寒之罰大雨雹隕霜殺榖皆丨丨丨丨前五行志脅君之象昭公三年大雨雹是時季氏専權丨丨丨丨見左傳蜥蜴吐雹劉居中至嵩山頂有大蜥蜴數百皆長三四尺人以食食之撫摩其身滋膩如脂一日聚繞水盆邉各就取水才入口即丨丨已圓潔如彈丸積之于側俄頃纍纍滿地忽震雷一聲起彈丸皆失去明日人來言昨午雨雹大作乃知蜥蜴所為夷堅志雷霆流丸有大人生北邉近之有尖銅雹注唯可遙看不可到下到下則丨丨丨銅鐵之九以擊人云凉州異物志雹不為災昭四年大雨雹季武子問申豐曰雹可禦乎對曰聖人在上無丨雖有丨丨丨左傳凡雹皆冬之愆陽夏之伏陰聖人在上不為災五行志雹豫告勝熙寧中河州雨雹大者如雞卯小者如蓮芡或如人頭耳目口鼻皆具無異鐫刻次年王師平河州蕃戎授首者甚衆豈克勝之符豫告耶編年歷代雹災漢文帝後元元年雨雹如桃李深三尺風俗通景帝二年秋雨雹大者五寸永初三年夏河西縣大雨雹如杯棬大或如斗殺畜生雉兔折樹木孔叢子成帝河平二年雨雹大如斧漢書又大如釜通鑑漢武帝元封三年冬雨雹大如馬首宣帝地節四年夏山陽雨雹大如雞子深二尺五寸殺人飛鳥皆死本紀後漢安帝延光元年夏四月河西雹大如斗晉穆帝永和五年鄴中雨雹大如盂升並通鑑唐乾符六年雨雹如鳥卵唐五行志隋帝雹戲丨煬丨南幸時陰雲驟作俄雨氷雹忽降擊作龍舟之蓋既晴上思雹虞世基請令宫女撒珠璣於舟中以應雹聲又拋龍腦於錦帆之上以象霰雪關河記詩集銀彈水晶堅疑丨丨小圓訝丨丨明劉原父雞子馬頭丨丨方凝地丨丨初墜雲黃夷陽愆陰脅丨丨時少異丨丨氣初凝韋莊車破稼傷遊子驚丨丨農人念丨丨吕殊火災事類人天凡火丨火曰火丨火曰灾左傳火正古之丨丨或食於心或食於咮是故咮為鶉火心為大火陶唐氏之丨丨閼伯居商邱祀大火而火紀時焉相土因之故商主大火遷閼伯於商邱主辰辰大火也國史八人為火翟乾祐因入夔州市謂人曰今夜有八人過此宜善待之是夕火燒百餘家八人乃火字也廣記童子撲火糜笁資貨如邱山忽有青衣童子云君當有火厄賴君能惻愍枯骨故來禳却使君財物不盡旬日火起燒其珠玉十分得一火盛之時見數十青衣丨丨來丨丨有青氣如雲覆之火上童子又云多聚燕雀之類以禳災燕能聚水巢上也家人乃收集鵁鶄數十養於池渠之中厭火拾遺禆竈言火宋衛陳鄭災丨丨曰不用吾丨鄭又將丨鄭人請用之子産不可曰天道逺人道邇竈焉知天道遂不與亦不復災左傳子産禳火前年禆竈欲用瓘斚及火子産使司馬司冦列居火道行火所焮城下之人五列登城郊人助祝史除于國北禳火于𤣥冥回祿使行人告於諸侯同上子猷避火王子猷子敬曾俱坐一室上忽發火子猷遽走避不遑取履子敬神色恬然徐喚左右扶憑而出不異尋常世以此定二王神宇世說利用救火彭丨丨里舍灾其