配某所守臣犯贓不當死宰相以嫌卒死之翌日上為罷宰相天即大雨緑衣者冦萊公也麈史術人遺書涒灘嵗越垠曠旱塞諸陽遷市不雨祈山川庶神又不雨觴上龍舞巫覡愈不雨或言邦有丨丨能捕退龍而譟之昔嵗嘗然農剩其澤及召術人至而旱色如故太守怒亟命擒之術人遁去矣其丨囊有丨一幅目曰旱有三曰天旱國旱人旱曷為犬旱蹇陽肆凶下土祗慎雖六七嵗黎人不饑曷為國旱君道熾災德涸仁枯貪風暴氣蒸為時癘曷為人旱邦燬其政吏賊其行千里人心燥不為陰夫天旱求諸仁仁洽而時豐國旱求諸德德潤而澤流人旱求諸政政清而俗阜貪貨遊于上刑黷于下百姓焦愁結成狠暑所謂人旱也邦守不清其政而逮龍貨雨是猶乘攆適海豢羊望翼於何可冀乎太守得書增怒是嵗正月不雨至五月明年殍死者數千人而太守亦以財禍盛均文粹詩集旱詩昔嵗歉無年今麥仍荐饑罷民去南􅒪賤價捐東菑籍籍道路間餓者何纍纍藜藿不充腸薾然旄與倪郊原赤如赫乘穗無孑遺􅚄藝不可分四旁生蒺藜劉貢父旱謡十月不雨井水渾孤城烈日風揚塵楚天萬里無纎雲旱氣塞空白晝昏土龍蜥蜴竟無神田中水車聲相聞努力踏車莫厭勤但憂水勢傷禾根道傍執送者何人搯塍爭水殺厥鄰五湖七澤水不貧正賴老龍一屈仲張文潜春旱丨丨天地昏日色赤如血安得鞭雷公滂沱洗吳越杜甫蝗事類蝝蝗蟲也一名蝻一名丨說文宣公十五年冬丨生劉歆以為丨螕蠧音蚍蜉之有翼者食穀為災董仲舒劉向以為丨螟始生也漢五行志􅏑桓公五年丨左氏傳作螽公羊作丨蜚負丨丨蠜蟲也左傳注螟螣去其丨丨及其蟊賊無害我田稚田祖有神秉畀炎火注云食心曰螟食葉曰螣食根曰蟊食節曰賊毛詩梵字蝗蟲腹下有丨丨雜俎魚子蝗是丨丨在水中化為之蔡伯喈云茅茨食盡文公三年雨螽于宋穀梁傳曰災甚也其甚奈何茅茨盡矣春秋草木食盡晉懷帝永嘉四年幽井等六州大蝗食丨丨牛馬毛皆盡晉書蝗飛入海馬援為武陵太守郡連有蝗援振貧羸薄賦稅丨丨丨丨化為魚蝦東觀漢記蝗不入境魯恭為中牟令飛蝗避境宋均為九江守山陽楚沛多蝗至九江輒四散並本傳太宗吞蝗唐太宗貞觀二年畿內有蝗上入苑中見蝗掇數枚祝之曰民以穀為命而汝食之寧食吾之肺肝舉手欲吞之左右曰惡物或成疾上曰朕為民受災何疾之避遂吞之是嵗蝗不為災唐史姚崇捕蝗開元間山東大蝗丨丨奏詩云秉畀炎火此除蝗之義也乃出御史為丨丨使分道殺蝗倪若水上言除天災者當以德昔劉聰除蝗不克而害愈甚崇遺書誚之曰僞僞主德不勝妖今妖不勝德若水懼乃縱捕得蝗十四萬石時議者喧譁崇曰討蝗縱不能盡不愈於養以遺患乎帝然之盧懷慎曰天災安可以人力制且殺蟲多必戾和氣願公思之崇曰昔楚王吞蛭而厥疾瘳叔敖斷蛇而福乃降今蝗幸可驅若縱之穀且盡如百姓何殺蟲救之禍歸於崇不以諉公也蝗害訖息同上捕蝗得錢漢平帝時蝗詔使者丨丨人能捕蝗詣吏者以石斗受錢漢史捕蝗易粟五代晉出帝天福間募民丨丨丨以丨備史蝗以申警景德中大旱蝗上以問李迪迪對曰陛下祀汾亳以來土木之役不可勝紀旱丨之起殆天意所丨丨丨也願罷諸不急之務國史蝗死不賀祥符九年飛蝗過京城上詣玉清宫靈感塔焚香祈禱禁宫城音樂三日先是上出死蝗示大臣翌日執政有袖死蝗以進者請示於朝率百官賀王旦曰蝗出於災災弭幸也又何賀焉固不可乃止於是二府方奏事飛蝗蔽天上曰使百官方賀而蝗若此豈不為天下笑耶同上飛蝗蔽日東坡上韓相書近在錢塘見丨丨自西北來聲亂浙江之濤上丨丨月下掩草木遇其所落彌望蕭然此東京餘波及江浙者耳東坡集飛蝗墮水趙抃守青州時山東旱有蝗自青齊及境遇風退飛墮水而盡言行録詩集答捕蝗詩捕蝗之術世所非欲究此語興於誰或云豐凶嵗有數天孽未可人力支或言蝗多不易捕驅民入野踐其畦因之姦民恣貪擾户到頭斂無一遺蝗災食苗民自苦吏虐民苗皆被之吾嗟此語秪知一不究其本論其皮驅雖不盡勝養患昔人固已决不疑秉蟊投火况舊法古之去惡猶如斯既多而捕誠未易其失安在常由遲詵詵最說子孫衆為腹所孕多蜫蚳始生朝畝暮巳頃化一為百無根涯口含鋒刃疾風雨毒腸不滿疑常飢髙原下隰不知數進退整若隨金鼙嗟兹羽孽物共惡不知造化其誰尸大凡萬事悉如此禍當早絶防其微蠅頭出土不急捕羽翼巳就功難施只驚羣飛自天下不究生子由山陂官書立法空太峻吏愚畏罰反自欺蓋藏十不敢申一上心雖惻何由知不如寬法擇良令告蝗不隱捕以時今苗因捕雖踐死明嵗猶免為蝝災吾嘗捕蝗見其事較以利害曾深思官錢二十買一斗示以明信民爭馳斂微成衆在人力頃刻露積如京坻乃知孽蟲雖甚衆嫉惡茍鋭無難為往時姚崇用此議誠哉賢相得所宜因吟君贈廣其說為我持之告採詩歐陽修答朱寀詩刺荆公荆公罷相出鎮金陵時飛蝗自北而南江東諸郡皆有之百官餞荆公於城外劉貢父後至追之不及見其行榻上冇一書屏因書一絶以寄云青苗助役兩防農天下嗷嗷怨相公惟有蝗蟲偏感德又隨台斾過江東泊宅編如蠶始自兩河及三輔荐食丨丨飛似魚樂天捕蝗入地遺蝗丨丨應千尺東坡詠雪凶荒事類大侵一穀不升謂之歉二穀不升謂之飢三榖不升謂之饉四穀不升謂之荒五榖不升謂之丨丨大侵之禮君食不兼味臺榭不塗弛候迎道不除百官修而不制鬼神禱而不祀榖梁一穀不收謂之饉二穀不收謂之旱三穀不收謂之凶四穀不收謂之餽五穀不收謂之饑墨子穀不熟曰飢蔬不熟為饉果不熟為荒仍飢為荐飢爾雅荒政以丨丨十有二聚萬民一曰散利二曰薄征三曰緩刑四曰弛力五曰舍禁六曰去幾七曰省禮八曰殺哀九曰蕃樂十曰多婚十一曰索鬼神十二曰除盜賊周禮鵠形侯景之亂所在荒飢其絶粒久者鳥面丨丨骸㸑敝邑易子而食析丨以丨宣十五年泛舟役晉荐飢使乞糴于秦秦伯謂百里與諸乎對曰救災恤鄰道也丕豹請伐晉秦伯曰其君是惡其民何罪秦於是乎輸粟于晉自雍及絳相繼命之曰丨丨之丨出左氏傳續命田元嘉末青州飢荒劉善明家有積粟開倉以救鄉里百姓呼其家田為丨丨丨齊書采竹花唐天復甲子嵗自隴西而亢陽民多流散山中竹皆放花結子飢民采之㫪米而食珍於粳􅟙其子粒顔色紅纎與今紅粳不殊其味尤更馨香數州之民皆挈纍入山就食之可謂百萬圓顱活於貞筠之下玉堂清話煮木酪王莽時洛陽以來米石二千莽分遣大夫竭者教民丨丨為丨酪不可食重為煩擾者木實為酪漢書就蒲螺越大夫種曰今吳大荒其民必移丨丨丨於東海之濵蒲螺蚌蛤之屬國語採鳬茈王莽末年南方飢饉人庶羣之野澤掘鳬茈而食之後漢掘蘆根自更始敗後掖庭宫中女為閉殿內丨庭中丨蔔丨捕池魚而食之同上造芋塹閣􅀢山一寺僧種芋多杵之如泥造塹以度凶嵗玉堂間話作糜活饑漢獻帝興平元年穀一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使侍御史侯汶出太倉米豆為飢人作糜經日而死者無數帝疑賑恤有虛乃親於御座前量試作糜乃知非實後漢挼穗供軍寶應中新承兵戈之後中外艱食京師米價斗至一千畿縣百姓乃丨丨以丨禁丨舊唐書增價通米盧恆為宣歙觀察使到官值旱飢穀價日增或請抑其價恆曰宣歙土狹穀少所仰四方之米若價賤則商船不來益困矣既而斗米二百商旅輻輳民賴以生通鑑餉錢賑饑荆州年飢衡陽王義季慮凝之餒丨丨十萬凝之大喜將錢至市門觀飢者悉分之劉凝之傳矯詔發粟漢河內失火武帝使汲黯視之還報曰家人失火屋比延燒不足憂臣過河內河內傷水旱萬餘家臣以便宜持節發倉粟以振貧民請伏矯制罪上賢而釋之本傳勸令開倉唐員半千為武陽尉嵗旱丨丨發倉振民令不從及令謁州半千悉發之下賴以濟太守怒囚于獄會薛元超持節渡河讓太守曰君有民不能恤使惠出一尉尚何罪釋之唐書禁止酒酤蜀大旱先主禁酒有釀具並坐之詳見禁釀類唐初無酒禁乾元元年京師酒貴肅宗以廪食方屈乃禁京城酤酒期以麥熟如初二年飢復禁酤出唐書賑恤鄉里唐張萬福為泗州刺史魏州飢父子相食萬福曰魏州吾鄉里安忍其困令兄子將米百車餉之本傳趙公振饑熙寧九年夏吳越大旱知越州趙公抃前民之未飢為書問屬縣所被菑者二萬一千九百餘人公斂富人所輸及僧道食之羡者得粟四萬八千餘石又為之出官粟得五萬二千餘石或給或糶又僦民完城四千一百丈南豐作救菑記范公惠饑景祐二年吳中大飢范仲淹鎮浙西發粟募民給餉為術甚備監司奏劾公於杭州不恤荒公乃自為條敘所以宴游又興造皆欲以有餘之財以惠貧者貿易飲食工技服力之人仰食於公私日無慮萬數荒政之施莫此為大筆談蘇公療饑杭州大旱蘇軾請于朝免本路上供米三之一故米不翔貴復得賜度牒百易米以救飢者又立病坊作饘粥藥劑遣吏挾醫分坊治病活者甚衆出言行録陳公活饑陳文惠公堯佐知夀州遭嵗大飢公自出米為糜以食餓者吏民以公故皆爭出米其活數萬人公曰吾豈以是私惠耶蓋以令率人不若身先而使其從之樂也神道碑通商販米趙清獻知越州兩浙旱蝗米價踴貴餓死者十五六諸州皆榜衢路立賞禁人增米價公獨榜衢路令有米者任增價糶之於是諸州米商輻湊詣越米價更賤民無飢死者記聞以薪易米吳遵路明道末天下旱蝗遵路知通州乘民未飢募富者得錢幾萬貫分遣衙校航海糴米於蘇秀使物價不增又使民採薪芻官為收置以為直糴官米至冬大雪取以元價易薪芻與民官不傷財民且蒙利厚德録不俟朝㫖范公堯夫知慶州餓莩滿路官無穀以賑恤公欲發常平封樁粟麥濟之州縣皆欲俟奏請得㫖而後散公曰人七日不食即死何可待報諸公但勿預吾寧獨坐罪言行録特寬鹽禁張忠定公詠知杭州是時嵗飢民冒禁販鹽捕獲者數百人公悉寬其罰官屬執言不可公曰錢塘十萬家餓殍如此若鹽禁益嚴則聚而為盜患益甚矣俟秋成敢爾當痛以法繩之境內卒以無擾神道碑區處得宜富公弼知鄆州自鄆移青㑹河朔大水民流京東擇所部豐稔者三州勸民出粟得十五萬斛益以官廪隨所在貯之得公私廬舍十餘萬間散處其人以便薪水山林河渡之利有可取以為生者聽流民取之其主不得禁凡活五十萬人募而為兵者又萬餘人上聞之即拜禮部侍郎公曰救菑守臣職也辭不受前此救災者皆聚民城郭中煮粥食之聚為疾疫或待次數日不食得粥皆僵仆名為救之而實殺之自公立法簡便天下傳以為法神道碑賑濟無術王荆公參政方得君鋭意於政事多不待奏者淮浙大飢人相食朝堂督安撫監司賑濟李溥為發運使移檄郡縣以厚朴炒豆為屑開飢民胃多造紙襖以衣貧民榜勸諭富民施錢以種福田或謂曰東南之民胃口既開又得紙襖為衣兼得福田居之不須慮也監司大慙臺章上聞盡行降黜聞見别録建立社倉乾道間朱文公作社倉於建使貧民嵗以中夏受粟於倉冬則加息什二以償嵗小不收則弛其息之半大侵則盡弛之期以數年子什其母則惠足以廣而息遂捐以豫民行之纍年人以為便社倉記嚴出文榜或言卒幼安帥湖南賑濟榜文只用八字曰劫禾者斬閉糶者配先生曰這便是他有才此八字做兩榜便亂道又曰要之只是粗法朱語録真君接禮張忠定公詠在成都府嘗夜夢謁紫府丨丨丨語未久吏忽報請到西門黃兼濟承事以幅巾道服而趍真君降階接之丨頗隆盡且揖張公坐承事之下詢顧詳欵似有欽嘆之意公翌旦即遣典客詣西門請黃承事者戒令具常所衣服來比至果如夢中所見公即以所夢告之問平日有何陰德蒙真君厚遇如此且居某之上座耶兼濟云無他長惟每嵗遇禾麥熟時以錢三萬緍收糴至明年禾麥未熟小民艱食之際價直不增升斗亦無髙下在我者初無所損而小民得濟所急公曰此承事所以坐某之上也令索公裳二吏掖之使端受四拜黃公後裔蕃衍至今在仕路者比比青紫厚德録大帝告喻三川飢險丨丨謂王法進曰世人厭擲五穀不貴衣服之本我已勑太華之府收五穀之神所種不成下民飢餓因示罰責以懲其心然大道好生今且汝丨丨下民使其悔罪命侍女以靈寶清齊告謝天地儀一軸付之使傳行于世廣記詩集採鳬茈朝擕一筐出暮擕一筐歸十指欲流血且急眼前飢官倉豈無粟粒粒藏珠璣一粒不出倉倉中羣鼠肥鄭毅夫糴官粟持錢丨丨丨日夕擁公門官價雖不髙官倉常苦貧兼井閉囷廪一粒不肯分伺待官粟空騰價邀吾民坐視既不可禁之亦紛紜擾擾田􅒪中果腹才幾人我欲究其原宏濶未易陳哀哉天地間生民常苦辛張文潜換米城中斗米換衾稠杜甫勸分民貧更丨丨山谷古今合璧事類備要前集卷二十
