body:
  text: 古今合璧事類備要别集卷六十五宋謝維新撰飛禽門鷹附隼鶚鶻鸇鷂尾雕魚格物總論鷹鷙鳥爾雅云鷞鳩生一嵗為黃鷹二嵗為撫鷹三嵗為青鷹月令云七月鳩化金眼鉤觜鐵爪劒翮善櫻摶軍中多養之其類則有隼鶻鷂雕鶚鸇皆鷙猛者也鸇晨風鳥雕王睢所謂鷙也黃頭赤目五色皆備相頗類於鷹但尾長翅短差異耳鶚食魚摯而有别者鷂與鶻相類然鶻小於鷂惟隼古人以為摯擊之鳥通呼曰隼又一種曰魚鷹亦鷹之别此其辨也事類祭鳥鷹乃丨丨記月令化鳩仲春鷹丨為丨同上制鵬大鵬雛之始飛為鷹所丨孔氏帖爽鳩氏少皥鳥師而鳥名丨丨丨司冦者也注爽鳩鷹鷙鳥也故為司冦主盜賊左師尚父維丨丨丨惟時鷹揚詩摶鵬雛楚文王少時雅好田獵天下快狗名鷹畢聚焉有人獻一鷹曰非王鷹之儔俄而雲際有一物翺翔飄颻鮮白而不辨其形鷹見於是竦翮而升矗若飛雪須臾羽墮如雪血灑如雨良久而一大鳥墮地而死其兩翅廣數十里啄邊有黃衆莫能知有博物君子曰曰此大鵬雛也文王乃厚賞之幽明録逐鳥雀子産始知然明問為政對曰視民如子見不仁者誅之如鷹鸇之丨丨丨也左臂蒼鷹李斯為趙髙所誣謀反具五刑論腰斷咸陽市斯出獄與其中子俱執過謂中子曰吾欲與汝復牽黃犬丨丨丨俱出上蔡東門逐狡兔豈可得乎遂父子相哭而夷三族史記號蒼鷹郅都為中尉嚴酷行避不避貴戚列候側目丨曰丨丨漢本傳飢則為用魏吕布因陳登求徐州牧不得布怒登喻之曰登見曹公言待將軍譬如義丨當飽其肉不則噬人公曰不如卿言譬如養鷹丨丨丨飽則揚去布乃解飽則髙飛慕容垂猶鷹也飢則附人丨丨丨丨遇風塵之會必有凌霄之志唯宜急其羈絆不可任其所欲載記出常數百元坦為冀州刺史不恤人事専為聚斂性好佃漁無日不丨鷹犬丨丨丨頭器網十餘車自云寧三日不食不能一日不獵典略先者為真北齊廣陵王孝珩於廳壁畫蒼鷹丨丨以丨丨白帖縱失白鷹源乾曜京兆尹留守京師伏內白鷹因丨丨之詔京兆督捕獲於野絓榛死吏懼得罪乾曜曰上仁明不以畜玩置罪遂入自劾帝一不問諷獻名鷹李大涼州都督有臺使見名鷹丨大亮丨丨之密表曰陛下絶畋獵久矣而使者求鷹信陛下意乃乖昔旨如是擅求是使非其才太宗曰有臣如此朕何憂飛天得所西域髙昌遣使謝帝引責麴文泰猥曰鷹丨於丨各丨其丨孔帖得霜俊捷蘇味道才學識度物望攸歸王方慶體質卑陋言辭魯鈍俱為鳳閣侍郎或問郎中張元一曰蘇王孰賢答曰蘇九月得霜鷹王十月被凍蠅或問其故答曰丨丨鷹丨丨被凍蠅頑鈍時人服其能體物朝野僉載臂鷹馳逐崔𢎞禮至宣武從玄佐獵夷門玄佐丨丨與𢎞禮丨丨孔帖呼鷹為樂姚元崇曰臣年二十居廣成澤以丨丨逐獸丨丨進以蠱帝心安祿山月丨牛橐駝鷹狗竒禽異物丨丨丨丨孔帖目為決雲兒申王有髙麗赤獵置駕前丨丨丨丨丨同上辭維翰不見契丹破欒城杜重威等大軍隔絶桑維翰曰事急矣乃求見帝帝乃調鷹苑中不暇見維翰退而嘆曰晉不血食矣桑維翰傳懼克用翻覆李克用討王行瑜表李翰之副都統行瑜誅罕之功功多嘗私克用愛將蓋寓求一鎮寓為請克用不許曰飢鷹飽則去我丨其丨丨也孔帖魏彥深鷹賦惟兹禽之化育實鍾山之所生資金方之猛氣擅火德之炎精何虞者之多端運橫羅以羈束綴輕絲於雙臉結長繩於兩足飛不遂於本情食不充于所欲逸翰由而暫斂雄心為之自局若乃貌非不一相乃多途指重十字尾貴合盧立如植木望似愁胡觜同鉤利腳等荆梧亦有白如散花赤如血點大文若錦細斑似襭眼類明珠毛猶霜雪身重若金爪剛如鐵或復頂平似削頭圓如卵臆濶頭長筋粗脛短翅厚羽徑髀寬肉緩求之事用俱為絶伴或如鶉頭或似鴟首赤精黃足細骨小肘懶而易驚好而難誘住不可呼飛不及走若斯之輩不如勿有若夫疾食速消此則有命鴛脛猴立是為無病厠門忌大結肚惡軟絛不欲絶皆不宜喘生於窟者則好眼巢於木者則常立雙骹長者則起遲六翮短者則飛急毛衣屢改厥生無常寅生酉就總號為黃二周作鴇千日成蒼雖曰排盧性殊衆鳥雌則體大雄則形小遇犬則驚猜得人則馴擾養雛則少病野羅則多巧察之為易調之實難格必髙迥室必華寬薑以取熱酒以排寒韝須溫暖肉不陳乾近之令狎靜之使安晝不離手夜便火宿微加其毛少減其肉肌肥腸瘦心和性熟今絶雲霄志在馳逐蘇頲白鷹賦開元乙卯嵗東夷右長曰肅賚扶餘而貢白鷹一隻皆皓如練色斑若綵章積雪全映飛花碎點所謂金氣之英瑶光之精髙髻偉臆長距秀頸奮發而鋭堅剛則厲摩天絶海雷擊飈逝觀其行時令順秋殺指揮應捷顧盻餘容當落鵬之賞蔑仇鷂之敵實稀代之尤也况此鳥猛過于衆重倍於凡禮于君則勸忠祭于祖則立敬壯其體則用武綷其翼則成文彼寵而服之鶡也能果榮而戴之蟬也能潔矧乎職命司寇師惟尚父聞針刺姦擇善為吏蓋選士之是式匪從禽之足云此謂備于圖而警在位也微臣奉制敢稱贊曰鷹之大者精明竦俊徑而橫絶雄則逺振錦文素綵珠聫玉潤往乃奮威將軍所徇鷹之次者勇鋭光芒截海而至乘風載揚絡以紅點文具綵章下韝必中惟吏之良吕次儒義鷹記盱南陸氏世雄於資子弟矜玩好往往以之易學問售竒訪異以為常他日遇山夫賣猴雛取而畜之甚馴縱其遊息門內外毋復羈檢嵗久矣猴益老意向類姦然猴牝猴也見婦女必跳梁悚忭如將近之陸氏患焉謀掊之死未施手而猴先驚畏登屋避去以避禍彈石不得中人力不能追凡夜寂猴輒潛下取飲食人動則引遁無如之何會少年自虔來臂俊蒼鷹陸氏子弟往從之郊視其搏攝無虛向因就與語薄告以猴害少年許諾為擒之即俱還據髙隅發鷹韝已發則逞逞摩空下瞰得猴去猴猶坐不動伺鷹垂近急舉瓦以扞身鷹不能得也奮焉穿雲以逝漸眇默不可見於是主客不知所為方相慰以壺饌未敢議所以謝少年也明日忽聞空中有鈴聲少年色動意其鷹也捨杯噦嚼疾趍昨日立處仰瞻之果鷹來也方復搏翔下擊猴仍用前計以自全鷹失攫楊翮以過後一鷹繼至猴不擬也遂中其擒少年招得所臂鷹而遂擒者委猴而去蓋少年之鷹往招之而來助者也吕南公曰羽毛之居生也縱橫乎林莽之間而順適乎天地之內同而異異而同彼其鷹類非一種聚而已矣何少年之所養適當攫􅀈之不勝而遂能招夫助己者耶夫以通晝夕之奔遁蓋不知經經涉幾千萬里之逺而幾十百之羣隊彼豈有詬詬之語言沾沾之勢貌以相諷動者耶至其見助者又未必同棲共育者也而輒相從乎所未如之何之害彼曾人之與耶今人生同州聚同鄉上之人防之以政刑而端良博厚之士尸其教勸其平居束冠衣媚聲氣以相翕習有謂之為無志氣行義則起不平之色亦從而恨之惟其一旦攫介患害則人人自若也曰吾愛髮膚又曰吾力不能也理頭縮手背嗟而斜眤以浮陽於畏慎之名此一門之內有之矣況姻族即姻族固有此況州閭知識耶是曾二鷹之無知奚志氣行義之得耶嗚呼人禽之所以異者形名而已矣就形名以索安吾豈敢知治平之木年余初出山延陵劉縣尉扶為余道此余耿歎焉劉君謂余合歌之如少陵所詩鶻報蛇余辭以未能也姑志之所書其所歎於後矜玩好者可以戒不如鷹者可以慚及其戒且慚歟劉君與余皆幸矣是夏六月志隼飛隼戻天鴧彼丨丨其飛丨丨詩射隼髙墉丨丨丨丨之上易當順秋氣漢孫寶立秋日署侯文為椽曰今日鷹隼始擊丨丨丨丨成嚴霜之誅白氏帖縱八民家三坊朱超晏王志忠丨鷹隼丨丨丨榜二百奪職劉貞亮傳鶻爾如鶻上洛王思宗弟思孝以騎射事文宣文宣悅其驍勇謂曰丨擊賊如鶻八鴉羣宜思好事因改名思好北齊書目為鶻王素升臺憲風力愈勵嘗與同列奏事上前事有不合衆皆引去公方論列是非俟得旨方退上曰真御史議者丨丨獨擊丨言行録攀棲鶻東坡逰赤壁丨丨丨之危巢赤壁賦栁宗元鶻説有鷙曰鶻者巢於長安薦福浮圖有年矣浮圗之人室于其下者伺之甚熟為余説之曰冬日之夕是鶻也必取鳥之盈握者完而致之以燠其爪掌左右易日之則執而上浮圖之跂焉者縱之延其首以望極其所如往必背而去之焉茍東矣則是日也不東逐西南北亦然嗚呼孰謂爪吻毛翮之物而不為仁義器耶張九齡鷹鶻圖序鳥之鷙者曰鷹曰鶻鷹也者名揚於尚父義見於詩鶻也者迹隱於占人史闕其載豈昔之多識物亦有遺將今而嘉生材無不出為所呼之變與所記不同者耶然於羽族之中絶有豪傑之表氣感剛悍體侔銛鋒顧視之間偉如也夫授以徑翮意不羣飛資其利觜義在鮮食生有自然之㩲用無可抑之勢古之武士法吏齊名比義者以其嚴若郅都飛若李廣委質於所事報功於所養不憚摧翼以虧勇不立垂枝而屈節是鳥也向鶴之擬議不亦宜乎夫鸞與鳯將感於仁所不及也雞與雖較其德彼何有焉况其餘雖飛雖鳴几者怪者肉非登爼才非下韝威力不敵羣噪無益然後知二禽之為角衆鳥之絶倫者也故君子韙其然工人圗其狀以象武備以彰才美雖未極其天姿而有以見其風骨矣昔支遁常養名馬自云重其神駿斯圖也非彼人之徒歟鷂鷣負丨丨法鷂也善捉雀爾雅􅀈肩丨丨鷸子籠脫鷂也廣雅晨風鴧彼丨丨注今之鷂小雅飛隼鴧彼丨丨為隼鷂也濟人謂之題肩或曰雀鷹春化布穀此屬數種皆為隼同上至籠上魏公子無忌方食有鳩飛入案下公子使人顧望見一鷂在屋上飛去公子乃縱鳩令出鷂逐而殺之公子暮為不食曰鳩避患歸無忌竟為鷂所得吾負之為吾捕得此鷂者無忌無所愛於是左右宣公子慈聲旁國左右捕得鷂三百餘頭以奉公子欲盡殺恐無辜乃自按劒丨其丨丨曰誰獲罪無忌者耶一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲流布天下歸焉烈士傳匿懷中唐太宗嘗得佳鷂自臂之望見魏證來丨丨丨徴奏事固久不覺鷂竟死懷中通鑑本紀豈捕鷂人劉齊賢出為晉州司馬帝以其方直尊憚之時將軍史興宗從獵苑中言晉州出佳鷂可捕取齊賢丨丨丨丨邪卿安得以此待之孔子帖雕一箭雙雕後魏秦王幹善弓馬太宗出遊白登之東北幹以騎從有雙雕幹以二箭而下雙雕軍中號射雕都尉一發雙雕長孫晟與突厥共遊獵嘗有雙雕飛而爭肉因以兩箭與晟曰請射取之晟乃彎弓馳往遇雕相攫一發而雙貫焉隋書又髙駢有二雕並飛駢曰我且貴當之丨丨貫丨丨本傳杜甫雕賦進表臣甫言臣之近代陵夷公侯之貴磨滅鼎銘之勳不復照耀於明時自先君恕預以降奉儒守官未隳素業矣亡祖故尚書膳部貟外郎先臣某修文於中宗之朝髙視於藏書之府故天下學士到於今而師之臣幸賴先臣緒業自七嵗所綴詩筆向四十載矣約有千餘篇今賈馬之徒得排舍門上玉堂者甚衆矣唯臣衣不蓋體常寄食於人奔走不暇祇恐轉死溝壑女敢望仕進乎伏惟明主哀憐之儻使執先祖之故事拔泥途之久辱則臣之述作雖不足以鼓吹六經先鳴數子至於沉鬱頓挫隨時敏捷而楊雄枚皋之流庶可跂及也有臣如此陛下其舍諸伏惟明主哀憐之無令役鳴至於衰老也臣甫誠惶誠恐頓首頓首死罪死罪臣以為雕者鷙鳥之特殊摶擊而不可當豈但壯觀於旌門發狂於原隰引以為類是大臣正色立朝之義臣切重其有英雄之姿故作此賦實望以此達於聖聰耳不揆蕪淺謹投延恩匭進表獻賦上以聞謹言氣當九秋之清淒見一鶚之直上以雄才為己任橫殺而獨往捎捎徑翩肅肅遺響杳不可追後無留賞彼何鄉之性命當白日之指掌伊鷙鳥之纍百敢同年而爭長此雕之大略也若乃虞人之所得也必以氣稟玄宜陰乘甲子河海蕩潏風雲亂起雪沍山陰冰纒樹死迷向背於八極絶飛走於萬里朝無所充腸夕違其所止頗愁呼而蹭蹬信求食而依倚用此時而椓杙待弋者而綱紀表狎羽而潛窺順雄姿之所擬欻捷來於森木固先擊於利觜解騰攫而竦神開網羅而有喜獻禽之課數備而已及乎閩𨽻受之也則擇其清質列在周坦揮拘攣之掣曳挫豪梗之飛翻識畋逰之所使登馬上而孤騫然後綴以珠節呈於至尊摶風搶纍用壯旌門乘輿或幸别館獵乎原寒蕪空濶霜仗喧繁觀其夾翠華而上下卷毛血之崩奔隨意氣而電落引塵沙而晝昏豁堵牆之榮觀棄功效而不論斯亦足重也至如千年孽狐三窟狡兔恃古塜之荆棘飽荒城之霜露回惑我往來趦趄我場圃雖青骹戴角白鼻如匏蹙奔蹄而俯臨飛迅翼以遐寓而料全於果見迫寧遽屢攬之而脫頴便有若於神助是以嘵哮其音颯爽其慮續下韝而繚繞尚投迹而容與奮威逐北施巧無據方蹉跎而就擒以造次而難去一竒卒獲百勝照著夙昔多端蕭條可處斯文足稱也爾其鶬鴰䲮鸆之倫莫益於物空生此身聮拳拾穗長大如人肉多奚有味乃不珍輕鷹隼而自若託鴻鵠而為鄰彼壯夫之慷慨假強敵而逡巡拉先鳴之異者及將起而復臻忽翮天路終辭水濵寧掩羣而盡取且快意而驚新此又一時之俊也夫其降精於金立骨如鐵目通於腦筋入於節架軒楹之上純漆光芒掣梁棟之間寒風凜冽雖趾蹻千變林嶺萬穴擊叢薄之不開突杈丫而皆折此乂有觸邪之義也久而服勤是可吁畏必使烏攫之黨罷鈔盜而潛飛梟怪之羣想英靈而遽墜豈比乎虛陳其力叨竊其位等摩天而自安與槍榆而無事者矣故不見其用也則晨飛絶壑暮起長汀來雖自負去若無形置巢嶻嵲養子青冥倐爾年嵗茫然闕庭莫試鈎瓜空回斗星衆雛儻割鮮於金殿此鳥已將老於巖扃鶚百鳥不如孔融薦禰衡疏曰竊見處士禰衡年二十四淑質卓亮英才卓礫云云鷙鳥纍百不如一鶚使衡立朝必有可觀後本傳衆禽豈偶唐韋思謙進御史大夫往蹇諤顔色莊重不可犯見王公未嘗屈禮或以為譏答曰耳目官固當特立雕鶚鷹鸇豈丨丨之偶奈何屈以狎之本傳鸇逐鳥見前鷹注驅爵為叢丨丨者鸇也為湯武驅民者桀與紂也孟為布榖鷂之為鸇鸇之丨丨丨又為之鴰摶鸚鵡見後鸚鵡注詩集取向背性十月鷹出籠草枯雉兔肥下韝隨指顧百擲無一遺鷹翅疾如風鷹爪利如錐本為鳥所設今為人所資孰能使了然不術甚易知丨其丨丨丨制在飢飽時不可使長飽不可使長飢飢則力不足飽則背人飛乘飢縱摶擊未飽須縶維所以爪翅功而人坐收之聖明馭英雄其術亦如斯鄙語不可棄吾聞諸獵師白居易放鷹資擊鮮力義鷹非龍形所丨丨丨丨少年昧其理日日哺不息探雛網黃口日暮有餘食寧不下韝時翅重飛不得毰毸上林表狡兔自南北飲啄既已盈安能勞羽翼劉禹鍚養鷹詞驅出六谷悲臺蕭颯石巃嵸哀壑杈丫浩呼洶中有萬里之長江回風陷日孤光動角鷹翻倒壯士臂將軍玉帳軒翠氣二鷹猛腦絛徐墜自如愁胡視天地杉雞竹兔不自惜雞虎野羊俱碎易韝上鋒稜十二翮將軍勇鋭與之敵將軍樹勳起安西崑崙虞泉八馬蹄白羽魚肉三狻猊敢決空水與之齊荆南芮公得將軍亦如角鷹下翔雲惡鳥飛飛啄金屋安得爾輩同其羣丨丨丨丨梟鸞分杜甫王兵馬使二角鷹獨立四顧凄風淅瀝飛嚴霜蒼蒼上擊翻曙光雲披霧裂虹霓斷霹靂掣電捎平岡砉然徑翮剪荆棘下攫狐免騰蒼茫瓜毛吻血百鳥逝丨丨丨丨時激昂栁宗元籠鷹詞孤飛片雪八月西風髙胡鷹白羽毛丨丨一丨丨百里見秋毫李白萬里碧霄天邊心膽案頭身欲擬飛騰未有因丨丨丨丨終一去不知誰是解絛人崔鉉玄略之子也為兒時隨父訪韓晉公滉滉指架上鷹令詠焉滉此此兒可謂前程萬里也後登第久居廊廟三擁節麾玉觜金爪毛羽斒斕白苧裁馬前擎出不輕猜輕拋一點八雲去喝殺三聲掠地來絲丨丨啖雞腦破玄丨丨臂兔心開都緣解搦生靈物所以人人道俊哉劉禹錫白鷹星眸雪毛丨丨未放瞥秋毫頻掣金鈴試丨丨會使老拳供口腹莫辭親手啖腥臊穿雲自怪身如電殺兔誰知吻勝刀可惜忍飢寒日暮向人啄斷碧絲絛章孝標劒翎鈎瓜八月穫黍霜野空蒼鷹羽齊初出籠丨丨丨丨目如電利吻新淬龍泉鋒少年臂爾平郊去草動人呼躍寒兔竦身下擊霹靂忙毛逐奔風血濡距爾能摶兔不能食未飽中腸行復擊主人厭免爾尚飢一生不悟為人役蒿間黃雀鳴啾啾飢啄野粟心無求賦形雖小技能薄不受羈縻却自由張文潛籠鷹詞隼雀紛拏走章馳驛在得賢燕丨丨丨要鷹隼韓愈贈崔立之詩鶻鷙鳥最陰崖有蒼鷹養子巢柏顛白蛇登其巢吞噬恣朝餐雄飛逺求食雌者鳴辛酸力強不可制黃口無半存其父從西歸翻身入長煙斯須領健鵲痛憤寄所宣斗上捩孤影噭哮來九天修鱗脫逺枝巨顙坼老拳髙空得蹭蹬短草辭蜿蜒折尾能一棹飢腸皆已穿生雖減衆雛死已垂千年物情有報復決意遺目前兹實丨丨丨急難心茫然功成失所往用舍何其賢近經潏水湄此是樵夫傳飄蕭覺素髮凜欲衝儒冠人生許與分亦在顧盻間聊為義鶻行永激壯士肝杜皂雕前病鶻卑飛俗眼醜每夜江邊宿衰栁清秋落月已側身過雁歸鴻錯回首緊腦雄姿迷所向疏翮稀毛不可狀強神迷復丨丨丨俊才早在倉鷹上風濤颯颯寒山陰熊羆欲縶龍蛇深念爾此時有一擲失聲濺血非其心杜呀鶻行老鴟恨怯我新稅居見寺閣金璧照我破屋前日看閣上聚鳩鴒巢棲飲哺忘窮年雕簷畫壁屎汚遍以及像塑頭與肩寺僧不敢施彈射忽有蒼鶻張毒拳鴉鳴鵲噪鸜鵒呌怒鶻遭此窺腥膻鳥心決裂不畏衆瞥碎一腦驚後先死鳥墮空未及地支翅下取如風旋獨當屋脊恣扯磔啄肉披肝腸棄捐丨丨無藝又丨丨盤飛欲近飢目穿逡巡鶻飽自飛去爭殘不辨烏與鳶羣兒指點路人笑我方吟憶秋江邊梅聖俞腐鼠相隨依倚秋風氣象豪似欺燕雀在蓬蒿不知羽翼青𡨕上丨丨丨丨勢亦髙王介甫鷂鶉驚省窘白晳少年子秋郊臂蒼隼日暖飢目開風微雙翅緊草際鳴丨丨蒿間黃丨丨不韝誠必獲得雋還虛哂碎腦此非辜食肉爾何忍取樂在須臾我心良惻憫梅聖俞觀放鷂雕獸驚雁盡騰凌千里見纎毫徑翮梢梢度海濤霜草丨丨斜電落水天丨丨片雲髙間聲帶晚飛無敵鋭氣橫秋轉不毛得奉長楊帝王事願將餘力逞平皋石曼卿雕鶚在秋天雕鶚丨丨丨離風塵雕鶚丨丨丨乘時去雕鶚丨丨丨鸇天賦爾才上丨丨丨丨若不受羈紲失身偶見獲羞與家禽列秋風半夜起鴻鵠兩飄瞥物生各自適聽爾歸寥沉白雲八雙眸尺地肯自屑慎勿逐鷃爵鷃爵不足絶不至倉廪中朋黨為盜竊鵲鴂最堪憎擅使芳草歇勉力霜霰期方為鳥中傑劉原父魚鷹不憚風湍翩然下林表丨丨丨丨急得雋輒髙飛為君羞擊摶司馬溫公豈畏風湍日色弄晴川時時錦鱗躍輕飛若下韝丨丨丨丨惡人歸晚渚靜獨傍漁舟落歐陽文忠公古今合璧事類備要别集卷六十五
