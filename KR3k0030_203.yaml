body:
  text: 古今合璧事類備要續集卷五十三宋謝維新撰恩讎門報讎附快讎事理發揮與施恩同事類君之讎丨丨丨視父禮調人父之讎丨丨丨不與共戴天兄弟之讎不反兵交遊之讎不同國記師長之讎丨丨丨丨視兄弟禮調人交友之讎丨丨丨丨視從父兄弟同上昆弟之仇子夏請問丨丨丨丨如之何子曰仕弗與共國銜君命而使雖遇之不鬬記讎不同國從父昆仲之丨丨丨丨禮調人仇不為魁子夏請問居從父昆弟之仇如之何曰丨丨丨矣人能則執兵而陪其後記九世猶可齊襄公享乎周紀侯譛之襄公將復讎乎紀遠祖九世矣丨丨丨丨以復讎雖百代可也三年拜賜晉敗秦於殽獲孟明釋之孟明曰君之惠不以纍臣釁鼓使歸即戮寡君之以為戮死且不朽若從君惠而謂免之丨丨將丨君丨文二年戰於彭衙秦師敗績晉人秦拜賜之師左僖公三年乃報夫差使人立於庭茍出入必謂已曰夫差而忘越王之殺而父乎則對曰唯不敢丨丨丨丨越定十四年報東門役宋公陳侯蔡人衛人圍其東門鄭人侵衛牧以丨丨丨之丨隱五年報㑹稽恥呉夫差敗越於夫椒報檇李也遂入越越子以甲楯五千保於㑹稽使大夫種因呉太宰嚭以行成伍員諫弗聼退而告人曰越十年生聚而十年教訓二十年之外呉其為沼乎十三年越人入呉哀元年雪夫椒恥勾踐反國乃苦身焦思置膽於坐卧即仰膽飲食必嘗膽也史記越王念欲復怨夏則握火寒則抱氷呉越春秋卧薪嘗膽以丨丨丨之丨坡文鞭荆平墓楚平王有太子名建使伍奢為太傅費無忌為少傅無忌讒太子建及伍奢王怒太子建奔呉楚并殺奢及其子伍尚次子伍貟奔呉及闔廬立使伍貟迎撃大破楚軍遂至郢楚昭王出奔子胥即貟也求昭王不得乃掘楚平王墓出尸鞭之三百申包胥曰子之報讎其已甚乎子固平王之臣親北靣而事之今至於僇死人此豈無天道之極乎書龐㳙死龐㳙自以能不及孫臏以法斷臏兩足㳙為魏將軍伐韓韓請救於齊齊以田忌為將而孫子為師居輜重中坐為計謀㳙倍日并行逐之孫子度其行暮富至馬陵馬陵道狹而旁多險阻可伏兵乃斫大樹白而書之曰龐㳙死於此樹之下龐㳙夜至斫樹下見白書乃鑚火燭之讀其書未畢齊軍萬弓俱發魏軍大亂龐㳙乃自剄曰遂成竪子之名願請君衣豫讓事智伯甚見尊寵趙襄子滅智伯讓變姓名入宮塗厠欲刺襄子襄子如厠心動就問則豫讓襄子曰義人也釋之讓又漆身為癩吞炭為啞行乞於市頃之襄子出讓伏橋下襄子至橋馬驚曰是必豫讓也襄子數之曰子不嘗事范中行氏乎智伯盡滅之子不為報讎反臣於智伯今何報讎之深也讓曰范中行氏衆人遇我我故衆人報之智伯國士遇我我故國士報之今日臣固伏誅丨丨丨之丨而擊之以致報讎之意雖死不恨襄子大義之持衣與讓抜劔三躍而擊之曰可以下報智伯遂伏劒自殺且盗若城張儀嘗從楚相飲已而楚相亡璧門下意張儀執張儀笞掠數百下不服釋之儀旣相秦為文檄告楚相曰始吾從若飲我不盗而璧若笞我若善守汝國我丨丨丨丨為燕報讎燕太子丹怨秦王欲報之聞衛人荆軻之賢卑辭厚禮請見之謂軻曰今諸侯服秦莫若合從丹之私計愚以為誠得天下之勇士使於秦刼秦王使悉反諸侯侵地不可因而刺殺之唯卿畱意荆軻許之軻曰行而無信則秦未可親也誠得樊將軍首與燕督亢之地圗奉獻秦王王必恱見臣乃有以報乃私見於樊於期曰聞購將軍首金十斤邑萬家今願得將軍之首以獻秦王王必喜見臣臣左手把其袖右手揕其脅則將軍之仇報而燕見陵之愧除矣樊於期曰此臣之日夜切齒腐心也遂自刎以函盛其首太子豫求天下之利匕首使工以藥焠之以試人血濡縷無不立死者乃裝為遣荆軻入秦荆軻至咸陽王大喜見之荆軻奉圖以見於王圖窮而匕首見因把王袖而揕之袖絶荆軻逐王王環柱而走王負劒㧞以擊荆軻斷其左股遂解體以徇為韓報仇見勇力門内快讎殺子玉喜城濮之役晉師三日榖文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬬况國相乎及楚殺子玉得臣也公喜而後可知也宣十二殺王甫喜王甫父子應時馘截路人士女莫不稱善若除父母之讎漢靈紀置炷於臍呂布刺董卓百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者填滿街肆守尸吏為火炷置卓臍中燃之光明逹曙如是積日漢獻紀爭啖其肉來俊臣棄市時人無不快俊臣仇家丨丨俊臣之肉斯須而盡抉眼剥靣披腹出心騰踏成泥士民皆相賀於路曰自今眠者始貼席矣唐武紀罷璀相賀吐突承璀首唱用兵疲弊天下上丨承丨中尉降為軍器使中外丨丨貶鏄相賀丨皇甫丨為崖州司戸市井皆丨丨唐穆紀韓愈復讎議右伏奉今月五日勑復讎據禮經則義不同天徴法令則殺人者死禮法二事皆王教之端有此異同必資論辨宜令都省集議聞奏者韓愈議曰子復讎見於春秋見於禮記又見於周官又見諸子史不可勝數未有非而罪之者也最宜詳於律而律無其條非闕文也蓋以為不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣夫律雖本於聖人然執而行之者有司也經之所明者制有司者也丁寧其義於經而深沒其文於律者其意特使法吏一斷於法而經術之士得引經而議也周官曰凢殺人而義者令勿讎讎之則死義宜也明殺人而不得其宜者子得復讎也此百姓之相讎者也公羊傳曰父不受誅子復讎可也不受誅者官罪不當誅也誅者上施下之辭非百姓之相殺也又周曰凢報仇讎者書於士殺之無罪言將復讎必先言於官則無罪也今陛下垂意思立定制惜有司之守憐孝子之心示不自專訪議羣下臣愚以為復仇之名雖同而其事各異或百姓相讎如周官所稱可議於今者或為官吏所誅如公羊所稱不可行於今者又周官所稱將復讎先告於上則無罪者若孤稚羸弱抱微志而伺敵人之便恐不能自言於官未可以為斷於今也然則殺之與赦不可一例宜定其制曰凢復父讎者事發具其事申尚書省尚書省集議奏聞矣酌其宜而處之則經律無失其㫖朱元晦讜議序君臣父子之大倫天之經地之義而所謂民彛也故臣之於君子之於父生則敬養之死則哀送之所以致其忠孝之誠者無所不用其極而非虛加之也以為不如是則無以盡乎吾心云爾然則其有君父不幸而罹於横逆之故則夫為臣子所以痛憤怨疾而求為之必報其仇者其志豈有窮哉故記禮有曰君父之讎不與共戴天寢苫枕戈不與共天下也而為之說曰復讎者可盡五世則又明夫雖不當其臣子之身而茍未及五世之外則猶在乎必報之域也雖然此特庶民之事耳若夫有天下者承萬世無疆之統則亦有萬世必報之讎非若庶民五世則自高祖以至𤣥孫親盡服窮而遂已也國家靖康之禍二帝北狩而不還臣子之所痛憤怨疾雖萬世而必報其仇者蓋有在矣太上皇帝受命中興誓雪父兄之辱雖其間亦或為姦謀之所前却而聖志益堅至於紹興之初賢才並用綱紀復張諸將之兵屢以㨗報恢復之勢蓋已什八九成矣北人於是始露和親之議以阻吾計而宰相秦檜歸自北庭力主其事當此之時人倫尚明人心尚正天下之人無賢愚無貴賤交口合辭以為不可獨士大夫之頑鈍嗜利無恥者數軰起而和之清議不容詬罵唾斥欲食其肉而寢處其皮則其於檜可知矣而檜乃獨以梓宮長樂藉口攘却衆謀熒惑上聽然後所謂和議者翕然以定而不可破自是以來二十餘年國家忘仇敵之事而懷宴安之樂檜亦因是藉外權以專寵利竊主柄以遂姦謀而向者冐犯清議希意迎合之人無不夤縁驟至通顯或乃踵檜用事而君臣父子之大倫天之經地之義所謂民彛者不復聞於搢紳之間矣士大夫狃於積衰之俗徒見當時國家無事而檜與其徒皆享成功無後患顧以忘讎忍辱為事理之當然主議者慕為檜㳺說者慕其徒一雄唱之百雌和之癸未之議發言盈庭其曰金世讎不可和者尚書張公闡左史胡公銓而止耳自餘蓋亦有謂不可和者而其為說不出乎利害之間又其餘則雖平時號賢士大夫慨然有六千里為讎人役之嘆者一旦進而立乎廟堂之上顧乃惘然如醉如幻而忘其疇昔之言厥或告之曰此處士之大言耳嗚呼秦檜之罪所以上通於天萬死而不足以贖者正以其始則唱邪謀以誤國中則挾敵勢以要君使人倫不明人心不正而末流之弊遺君後親至於如此之極也夫惟三綱不立是以衆志無所統繫而上之人亦無所慿藉以為安斯乃有識之士所為長慮却顧而凜然以寒心者而說者猶曰姑以衆論之從違而卜事理之可否則今日士大夫是和者之多蓋不下前日非和者之衆也獨安得以前日之不可而害今日之可哉嗚呼是未知前日人倫之明而今日人倫之不明前日人心之正而今日人心之不正也且若必以人之衆寡為勝負則夫所謂士大夫是和之多者又孰若六軍萬姓之多耶今六軍萬姓之言則是二公之言而已蓋君臣父子之大倫天之經地之義而所謂民彛者其於世也有明晦其在人也無存亡是以雖當頽壞廢弛之餘邪議四起無復忌憚而不能斬伐銷鑠使之無作也奈何不聼於此顧反决得失於前日所謂頑鈍嗜利無恥者之餘謀此已墜之三綱所以未能復振已隳之萬事所以未能復理而上之人終亦未能有所慿藉以成安强之勢也今南北甫驩中外無事迂愚左見所謂萬世必報之讎者固無所復發其口矣竊伏世間不勝憤嘆因讀魏元履所以叙次戊午讜議為之慨然流涕蓋傷其禍殃之自始也懐不能已姑論其始終槩梗如此以發明元履所為叙次之意并以致草野孤臣畢義願忠之誠當國者儻有取焉則猶足以禆廟謨之萬一而非區區之所敢望也胡明仲豫讓論君子為名譽而為善則其善必不誠人臣為利禄而効忠則其忠必不盡雖然滔滔皆是也之人也殆庶幾乎羙觀而不足於夷攷矣使智伯有後而豫子為之奮不顧身其報仇之心未可知也智伯無後矣氣勢無可倚富貴無可求矣子孫無所可託矣而讓也不忘國士之遇以死許之至再至三而愈篤則無所為而為之者故曰真義士也此非特可以為委質事人之法無所為而為善雖大學之道不過如是也襄子知其如此獨無以勉而旌之乎而終於殺之何以為人臣而不懐二心之勸哉前史列讓於俠士非也詩集雪恥除兇丨丨酬百王丨丨報千古唐太宗挺身張目丨丨艱難際丨丨視冦讎杜甫詩古今合璧事類備要續集卷五十三
