body:
  text: 古今合璧事類備要後集卷十四宋謝維新撰道揆門左右丞相下國朝沿革唐制以三公至列曹侍郎同平章事為宰相神宗新官置於三省置侍中中書尚書二令虛而不除以尚書左右僕射兼門下中書侍郎為兩相然中書揆而議之門下審而覆之尚書承而行之則是首相不復與朝廷議論矣元祐初司馬公相乃請令三省合班奏事分省治事自紹聖以後皆因之時議者謂門下相凡事既同進呈則不應自駁以行之命是省審之職可廢也蔡京以太師總領三省號公相因廢尚書與侍中中書令為左輔右弼亦虛而不除改左右僕射闕仍兼兩省侍郎靖康中何文縝將拜相乃先闕吕為僕射吳正仲當制闕更為丞相不從建炎三年元直初相議者請併三省為一於是元直解中書侍郎改同中書門下平章事乾道二年十二月詔改尚書左右僕射為左右丞相初虞雍公獨相上眷禮極厚既又以梁叔子靖重欲遂相之而名不正欲采周漢舊制改為左右丞相令學士院史官討論先是已有㫖令百官依舊制服靴虞公不樂曰近已易履為靴今又易相名與北狄奚辨蓋金人以改左右僕射為尚書左右丞相故也有司知其意不敢遽上至八年正月僅條具厯代宰相官稱申尚書省禁中即聞之翼日遣中使至學士院云問緩故學士周子充以其事奏後二十日御筆付院尚書左右僕射可依漢制改作左右丞相學士院降詔後五日上自德夀宫還召子充對選德殿上袖出御筆云比來一二大臣同心輔政夙夜匪懈漸革茍且之風以副綜核之意深可嘉尚今因除授宜示褒典虞允文可特進左丞相梁克家可正奉大夫右丞相辛亥百官集文德殿初謂改易相名耳及雙制出在廷愕然朝野雜記事類大雅昔王文正公居宰府僅二十年未嘗見愛惡之迹天下謂之丨丨范文正公集大忠冦萊公當國真宗有澶淵之幸而能左右天子不動如山却夷狄保宗廟天下謂之丨丨同上持重吕端為相丨丨識大體每奏對同列多異議公罕所建明一日內出手札戒曰令中書事必經吕端詳酌乃得聞奏言行録無隱呂蒙正為相遇事敢言上嘉其丨丨長編燮正丨丨辰階除徐執申制燮調擢正階符丨丨鼎味同上善處大中祥符九年上謂左右曰王旦丨丨大事真宰相也長編能斷元祐元年司馬光言切見文彥博沉敏有謀略知國家治體丨丨大事功效顯著此天下所共知也同上沉敏注見上文訪國事至道二年宰相吕端加右僕射上御崇政殿丨以軍丨大丨端陳當世急務皆有條理上甚嘉納惜民力薛簡肅公天禧中為江淮轉運使辭王文正公公無他語但云東南民力竭矣薛退而謂人曰真宰相之言也事略戒用兵熙寧初富弼再相神宗首問邊事公曰臣愚以為首當推恩惠布德澤二十年未可道著用兵二字上問所當先如何公曰阜安宇內為先言行録戒𣙜利張士遜出為江西轉運使辭王文正公於政事堂且求教公從容曰朝廷𣙜利至矣士遜後迭更是職未嘗求錐刀之利同上戒貪進王文正公曰可惜張師德向文簡曰何謂公曰纍於上前說師德名家子有士行不意兩及吾門狀元及第榮進素定若復奔競使無階而進者當如何向公稱適有闕望公弗遺公曰第緩之使師德知聊以丨丨丨激薄俗也長編焚投獻趙公普為相屏後設一大甕凡有投獻利害文字貯其中蒲則焚之通衢因此得謗聞見録却例簿景德三年冦凖在中書喜用寒雋舉措多自任同列忌之嘗除官同列屢目吏持例簿以進凖曰宰相所以器百官若用例非所謂進賢退不肖也卻而不視長編抑求請宋琪在內府每百執事謁見有所求請皆面折之以是人咸怨焉同上守格法富公弼之為相丨丨丨行故事而附以公議無心於其間故百官稱職言行録得宰相體韓魏公琦為相曾公為亞相趙康靖歐陽公為參政凡事該政令則曰問集賢該典故則曰問東㕔該文學則曰問西㕔至於大事則自决之人以為丨丨丨丨同上有賢相稱王旦在相位久外無夷狄之虞兵革不用海內富實羣工百司各得其職故天下稱為賢相王旦傳沉毅果斷趙普初以吏道寡聞學術太祖嘗勸以讀書晚年手不釋卷其為宰相以天下事為己任丨丨丨丨當世無比靜重明敏陳康伯傳太上宣諭曰自卿除用朝野翕然無聞言卿丨丨丨丨一言不妄發真宰相也言行録文武大政景德元年上每得邊奏必先送中書謂畢士安冦凖曰軍旅之事雖屬樞密院然中書總丨丨丨丨卿等當詳閲邉奏共參利害勿以事干樞密院而有所隱也危疑大節韓魏公琦為相十年當仁宗之末英宗之初朝廷多故公臨大節處危疑茍利國家知無不為故能光輔三后大濟艱難坐置天下於大寧公之力也並同上身佩安危王曽毅然大節丨丨丨丨事略大濟艱難注見上危疑大節下奏陳水旱真宗初即位李沆為相王旦為參知政事沆日取四方水旱盜賊奏之旦以為細事不足煩上聽沆曰人主少年當使知四方艱難不然血氣方剛不留意聲色則土木甲兵禱祀之事作矣言行録奏辨災異富弼傳神宗朝有於上前言災異皆天數非人事得失所至者弼曰人君所畏惟天若不畏天何事不可為者去亂亡無幾矣即上書明其决不然者事略論語一半趙韓王普傳太宗時普曰臣用丨丨丨丨佐太祖定天下一半佐陛下致太平長編論語兩句李沆嘗喜論語或問之沆曰為宰相如丨丨中節用而愛人使民以時丨丨尚未能行聖人之言終身誦之可也同上用讀書人太祖云作宰相須用儒者又云宰相須丨丨丨丨會要問釣漁人吕正惠公參知政事多獨召便殿語必移晷時呂䝉正為相會曲宴後苑上作釣魚詩斷章云欲餌金鈎深未逹磻溪須丨丨丨丨意以屬端後數日罷䝉正而相端言行録不殖資産上因講求輔弼謂左右曰朕聞范質居第之外丨丨丨丨真宰相也太宗亦素重質嘗對近臣稱纍朝宰相以為循規矩重名器持廉節無出質右長編不徼寵澤吕文穆公䝉正為相國三入中書惟公與趙韓王爾未嘗以姻戚徼寵澤言行録不愛苞苴慶歷中杜衍為相苞苴貨賄不敢到其門時號清白宰相事略不為驕侈王旦以儉約率子弟使在富貴丨丨丨丨兄子睦欲舉進士旦曰吾嘗以太盛為懼其可與寒士爭進言行録封還內降寶元四年吏部侍郎杜衍依前官平章事兼樞密使衍務裁僥幸每內降恩率寢格不行積詔皆至十數輒納上前諫官歐陽修見上曰外人知杜衍丨丨丨丨耶凡有求于朕每以衍不可告之而止者多於所封還也長編奏格內降趙忠簡公鼎遷左僕射平章事公以政事之先後及人材之所當召用者密條置座右一一奏禀行之凡內降恩澤多丨丨不行號為賢相言行録補綴復進韓王趙普嘗欲用某人為某官不合太祖意不用明日普復奏之又不用明日又奏之太祖怒取其奏壞裂投地普徐拾歸丨丨明日丨丨之上乃悟其後果稱其職長編事不密啓真宗問李沆曰人皆有密啓卿何獨無沆曰臣待罪宰相公事則公言之何用密啓人臣有密啓非讒則佞臣常惡之抑求使相李沆為相石保吉求為使相仁宗以問公公曰保吉因緣戚里無攻戰之勞台席之拜恐騰物論遂寢其事抑求節度王文正公旦為相宦者劉承規求為節度使真宗以語公公堅執以為不可曰他日將有求為樞密使者奈何至今內臣不過留後士夫相慶文彥博富弼並命是日宣制上遣小黃門覘於庭丨大丨丨丨得人後數日歐陽修奏事上以語修且曰古人求相者或得於夢卜今朕用二相人情如此豈不賢於夢卜哉並長編中外鼓舞陳康伯時北兵再犯淮甸人情大駭望公復用上親札遣中使即家居召公復拜尚書左僕射制出丨丨丨丨言行録甚副下望龎籍改知并州過京師入對上新相文彥博富弼意甚自得謂籍曰朕用二相何如籍曰二臣皆朝廷髙選陛下拔之丨丨天丨丨上曰誠如卿言文彥博猶多私富弼萬口一詞皆曰賢相也長編甚慰人望蘇頌自至和中入館居京師閭巷之人皆聞頌名至是登用朝野相慶明日上語執政曰蘇頌丨丨丨丨同上都民遮留司馬公過闕廷衛士見公入皆以手加額曰此司馬相公也丨丨丨道呼曰公毋歸洛丨相天子活百姓所在數千人聚觀之言行録走卒知誦司馬公作相蘇東坡以詩賀之曰兒童誦君實走卒識司馬同上元老不名真宗初即位對宰相皆不呼名吕端等再拜懇請帝曰公等顧命元老朕何敢比先帝乎長編常朝不名淳熙七年上宣諭曰每日丨丨可同後殿之儀丨必呼丞相丨趙雄奏君前臣名禮也臣豈敢當陛下欲少更朝儀須俟他日有碩德在位施行未晚不可自微臣始孝宗聖政吾社稷臣開寶九年雷德驤言趙普强市人第宅聚斂財貨上怒叱之曰鼎鐺尚有耳汝不聞趙普丨之丨丨丨乎長編得大臣體元城先生論本朝名相最丨丨丨丨者惟李沆每謂人曰沆在政府無以補報國家但諸處有人上利害一切不行耳言行録細務闊略紹興二年吕頥浩曰昔唐太宗諭房杜聞公聽受詞訟日不暇給安能助朕求賢乎卿自今凡事繫大體者裁决其餘丨丨丨丨可也中興會要細務進狀治平三年上謂宰臣曰朕日與卿等相見每欲從容講論治道但患進呈文字頗多不暇及中書常務有可付有司者悉以付之自是中書丨丨止丨熟丨及事有定制者歸有司中書降敕而已長編大事自决韓魏公琦為相曽公為亞相趙康靖歐陽公為參政凡事該政令則曰問集賢該典故則曰問東㕔該文學則曰問西㕔至於丨丨則丨丨以為得宰相體言行録利害共參見前文武大政注戒勿面從端拱元年上諭趙普曰朕若有過卿勿面從詳見趙吕並命注不失和氣韓魏公言慶厯中與范希文富彥國同在兩府上前爭事各别下殿丨丨丨丨如未嘗爭也當時正如推車子其心主於行而已魏王别録决親征䇿澶淵之役冦公首乞親征時陳堯叟請幸蜀王欽若請幸江南上召公問之公曰誰為此謀者臣欲得獻䇿之人斬以釁鼓然後北伐上悟遂决澶淵之行公在澶淵每夕與楊億飲博謳歌諧謔喧呼逹旦或就寢則鼻息如雷上使人視之喜曰得渠如此吾復何憂時人比之謝安長編陳當急務至道二年吕端加右僕射上御崇政殿訪端等以軍國大事端丨丨世丨丨皆有條理上甚嘉納可方安世元豐二年神宗嘗謂輔臣曰曽公亮謹審周密內外無間受遺輔政有始有卒丨丨漢張丨丨並長編逺過周公韓公既解相印王丞相遺公書謂過周勃霍光姚崇宋璟又曰為古人所未嘗任大臣所不敢為天下以為名言歐陽公亦曰進退之際從容有餘德業兩全謗讒自止過周公逺矣言行録領官總計嘉祐七年司馬光上疏食貨天下之急務今窮乏如是宰相不以為憂意者以為非己之職故也臣願復置總計之官使宰相總之議者以相不當領錢榖是皆不知治體之言長編置局稽財韓絳之入相奏古者冡宰制國用今天下財出入宰相乃不預聞始丨丨中書丨天下丨用之數量入以為出分領三館乾德三年趙普監修國史國朝因唐及五代之故事命相丨丨丨丨首相為昭文大學士其次為監修國史其次為集賢院大學士兼判院事慶歷二年上曰軍國之事當悉歸中書樞密非古官然未欲遽改故止令中書同議樞密院事及張方平請廢樞密院上乃命平章事吕夷簡丨丨丨丨而章得象兼使並同上宣撫就視韓獻肅公絳熙寧二年為陜西丨丨使詔兼河東宣撫丨丨同中書門下平章事言行録都督出視紹興七年金人與劉豫合兵入冦以右僕射張浚為江淮丨丨丨丨師長編名聞外國富弼早有公輔之望天下皆稱曰富公丨丨丨丨遼使每至必問其出處安否言行録狄問起居司馬光為政逾年而病居其半既沒其家得遺奏八紙上之皆手札論當世急務御篆表其墓道曰忠清粹德之碑光在相位遼人遣使入朝與吾使至彼中者丨必丨光丨丨而遼人敕其邊吏曰中國相司馬矣切母生事開邊隙長編諫諍之任至和元年馬遵上言自古丨丨乃大臣丨丨不獲已而後至於言責之人若大臣不能正之於前而使小臣救之於已然之後其難易不侔矣選舉之職司馬光言臣備位宰相謹丨百官乃其職業而智識淺陋見聞褊狹莫若使在位達官人丨所知然後克協至公野無遺賢矣欲乞朝廷設十科取士夾袋疏賢吕蒙正嘗問諸子曰我為相外議如何諸子云大人為相天下無事善甚但人言無能為事權多為同列所爭公曰我但有一能善用人耳此真宰相事也公丨丨中有册子每四方人替罷謁見必問其有何人才隨即丨之朝廷求丨取之囊中故公為相文武百官各稱職者以此密籍記名王文正公為相賓客滿坐無敢以私干之者公察其可與言者召與語詢問四方利病觀其才之所長丨丨丨其丨設科舉士見上文選舉之職下注權衡人才神宗謂執政曰吕公著之於人才其言不欺如丨丨之稱物並同上不用浮薄真宗初即位李沆為相帝嘗問治道所宜先沆曰丨丨丨丨新進喜事之人此最為先帝問其人如梅詢曽致堯是也帝深然之故終帝世數人皆不進用言行録稍旌亷退文潞公為相因進對言嘗聞德音以搢紳奔競非裁抑之無以厚風俗莫若丨丨丨丨之人則躁競者知愧乃薦王安世韓維張瓌皆擢用焉薦人不知王文正公所薦人未嘗知冦凖私公求為使相公驚曰將相之任豈可求耶已而制出除凖武勝軍節度使同中書門下平章事凖入見泣曰非陛下知臣何以至此真宗具道公所以薦凖者凖始愧歎薦姪大用吕文穆致仕真宗幸其宅問曰卿諸子孰可用公對曰臣諸子皆豚犬不足用有姪夷簡任頴州推官宰相材也遂至大用不市私恩李沆為相有求差遣見其才可取必正色拒之已而擢用或不足收用必和顔溫語以待之子弟問其故公曰用賢人主之事我若受其請是市私恩也故峻絶之若其不用者既失所望又無善辭此取怨之道也未嘗市恩范忠宣公純仁在相位所薦士未嘗知出於公公亦丨丨丨丨意於人或謂公曰身為宰相豈可不牢籠天下士使知出於門下公曰但願朝廷進用不失正人何必須使知出我門下耶屬意相端注見上文凡事問旦真宗朝王旦拜平章事外撫四夷內和百姓官吏得職天下富庶祥符之間頌聲洋溢旦之力也兩府丨有大丨真宗曰曽與王旦議否且以為可即可其委任如此陜郊處士魏野以詩寄旦曰聖朝宰相年年出公在中書十四秋西祀東封俱已畢好來相伴赤松遊旦感悟遂求退分紀趙呂並命端拱元年參知政事呂䝉正為中書侍郎兼户部尚書平章事上諭丨普曰卿勿以位髙多縱勿以權勢自驕但能謹賞罰舉賢良弭愛憎何憂軍國之不治朕若有過卿勿面從古人耻其君不堯舜卿其念哉䝉正質厚寬簡有重望不結黨與遇事敢言上嘉其無隱故與普俱重長編文富並命見前士夫相慶注三相當國國初范魯公王祁公魏僕射當國咸平中吕文穆李文靖向文簡當國又至和中文潞公富鄭公劉丞相當國退朝録又嘉熙初喬行簡平章事李宗勉史嵩之為左右相邸報三居相位國朝以來丨丨丨丨惟趙普與吕蒙正事略再世宰相國朝丨丨父子丨丨二家許吕公申公韓魏公儀公朝野雜記三世宰相國朝丨丨丨丨一家吕文穆從子文靖從孫正獻朝野雜記又南渡以來史越王浩子衛王彌逺從孫嵩之三代為相兄弟宰相丨丨丨丨一家韓康公莊敏祖孫宰相丨丨丨丨一家曽魯公欽道並同上相三十年端拱元年五月普常戒其子弟曰吾受寵逾分固當以身許國私家之事我無預焉爾等各宜勉勵勿重吾過故自宥命升宰丨出入丨丨餘丨未始為其親屬求恩澤者長編未四十相本朝丨丨丨丨者范覺民三十一吳元忠何文縝皆三十張魏公三十九朝野雜記輔政十年王曽姿質端厚人莫敢干以私其名重天下前後丨丨丨丨其所進退士人莫有知者范仲淹嘗以問曽曽曰夫執政恩欲歸已怨使誰當仲淹伏其言長編為相一紀王旦登柄用凡十八年丨丨者凡丨丨國史兩入中書李文正以司空致仕於家燈夕以安與就其宅召至賜坐親酌飲之曰昉丨丨丨丨未嘗傷人害物宜所享如此言行録又吕許公張鄧公仁宗朝皆再入退朝録三入中書國朝丨丨丨丨惟吕文穆趙韓王同上三遷至相宋琪興國八年正月以兵部員外郎為右諫議大夫同判三司參知政事十一月拜平章事大耐官職向文簡除右僕射上謂李昌武曰朕即位以來未嘗除僕射敏中應甚喜賔客必多卿往觀之明日却對昌武往見丞相方謝客門無一人昌武入見之賀曰今日聞降麻士大夫莫不歡慰公但唯唯又曰自上即位未嘗除端揆自非眷倚殊絶何以至此公復唯唯又歷陳前世為僕射者勳業之盛禮命之重公亦唯唯使人至厨中問有飲宴者亦寂無一人明日再對乃具以所見對上笑曰向敏中丨丨丨丨言行録召至賜坐見上文兩入中書注兩司對持慶厯五年宰相賈昌朝陳執中言軍民之任自古則同有唐别命樞臣専主兵務五代始令相輔亦帶使名至於國初尚緣舊制乾德以後其職遂分是謂丨丨丨丨大柄向以闢陜未寧兵議須一復兹兼領適合權宜今西夏來廷防邉有序願罷兼樞密使從之長編百官班迎至和二年詔凡宰相召自外者令丨丨丨丨之自內拜者聽行上事儀疾辭賜鬚吕夷簡以丨丨仁宗剪鬚賜之命坐賜茶先是宰相見天子必丨丨丨丨有大政事則面議之其餘號令刑賞但入熟狀猶有坐而論道之遺意焉范質等自以前朝舊臣稍存形迹每事輒具劄子進呈退即批所得聖㫖而同列書字以志之後遂為定式蓋自質等始也並同上賜商霖字張文忠公商英傳時久旱不雨彗出天心商英拜相之夕大雨如注彗星不見上喜親書商霖二大字賜之實録賜車攻詩趙鼎為相上御書車攻詩宣示宰執鼎入謝上曰車攻宣王中興之詩今當與卿等夙夜勉勵以修政事攘夷狄言行録死蝗不賀李沆為相時天下大蝗真宗使人於野得丨丨以示大臣明日它宰相請率百官賀公獨以為不可後數日方奏事飛蝗蔽天長編老鳯不去曽魯公公亮自嘉祐秉政至熙寧中尚在雖年甚髙而精力不衰故臺諫無非之者惟李復圭以為不可作詩云丨丨池邊蹲丨丨饑烏臺上噤無聲未幾曽公亦去東軒筆録乘舟偏重紹聖初章子厚召入相與陳瓘同舟因論國事陳瓘曰譬如此舟移置之左則左重移置之右則右重俱不可也熙寧未必全是元祐未必全非邵氏聞見録推車主行見前文不失和氣注兒童皆知誦施㸃字聖與誠齊楊先生以書遺公曰若盛德大業丕績宏謨丨丨走卒丨丨公而丨之至於斟酌元氣調和胾羔恢然有所兼容慨然無所顧慕用力勞而收效博者某知之天知之非兒童走卒所與知也言行録宦官不知名仁宗問王素孰可命以相事者素曰臣何敢言上曰姑言之素曰惟丨丨宫妾丨丨丨者可充其選仁宗曰如此則富弼可素曰陛下得人矣長編王元之待漏院記天道不言而品物亨歲功成者何謂也四時之吏五行之佐宜宣其氣矣聖人不言而百姓親萬邦寧者何謂也三公六道六卿分職宜張其教矣是知君逸於上臣勞於下法乎天也古之善相天下者自臯䕫至於房魏可數也是亦不獨有其德亦皆務其勤耳况夙興夜寐以事一人卿大夫尚爾况宰相乎朝廷自國初因舊制設宰相待漏院于丹鳳門之右示勤政也至若北闕向曙東方未明相君啓行煌煌火城相君至止噦噦鸞聲金門未闢玉漏未滴撤蓋下車于焉以息待漏之際相君得不有思乎其或兆民未安思使泰之四夷未附思使來之兵革未息何以弭之田疇多荒何以闢之賢人在野思使進之佞臣在朝思使黜之六氣不和災眚荐至仍避位以禳之五刑未措欺詐曰生請修德以釐之憂心冲冲待旦而入九門未啓四聰甚邇相君言焉時君納焉皇風於是以清夷蒼生以之而富庶若然者總百官食萬錢非幸也宜也其或私讎未復思所遂之舊恩未報恩所榮之子女玉帛何以致之車馬器玩何以取之奸人附勢我將陟之直士抗言我將黜之三時告災君有憂色搆巧辭以說之羣吏弄法君聞怨言進諂言以媚之私心慆慆假寐而坐九門既開重瞳屢回相君言焉時君惑焉政柄於是乎隳哉帝位以之而危矣若然則死下獄投逺方非不幸也亦宜也是知一國之政萬人之命懸于宰相可不慎哉復有無毁無譽旅進旅退竊位而茍祿備貪而全身哉亦無所取焉棘寺小吏禹稱偶為文請志院壁用示于執政者歐陽公晝錦堂記仕宦而至將相富貴而歸故鄉此人情之所榮而今昔之所同也蓋士方窮時困厄閭里庸人孺子皆得易而侮之若季子不禮于其嫂買臣見棄于其妻一旦髙車駟馬旗旄導前而騎卒擁後夾道之人相與駢肩纍迹瞻望咨嗟而所謂庸夫愚婦者奔走駭汗羞愧俯伏以自悔罪於車塵馬足之間此一介之士得志當時而意氣之盛昔人比之衣錦之榮者也惟大丞相衛國公韓琦也則不然世有令德為時名卿自公少時已擢髙科登顯仕海內之士聞下風而望餘光者蓋亦有年矣所謂將相而富貴皆公所宜有非如窮厄之人僥幸得志於一時出於庸夫愚婦之不意以驚駭而誇耀之也然則髙牙大纛不足為公榮桓圭衮裳不足為公貴惟德被生民而功施社稷勒之金石播之聲詩以耀後世而垂無窮此公之志而士亦以此望於公也豈止誇一時榮一鄉哉公在至和中嘗以武康之節來治于相乃作畫錦之堂於後圃既又刻詩于石以遺相人其言以快恩讐矜名譽為可薄蓋不以昔人所誇者為榮而以為戒於此見公之視富貴為如何而其志其言有曰前輩為大官不過持循法度主張公道知無不言復君以德公行賞罰進賢退不肖而已今日事有至難風俗敗壞官吏苟且强敵在前邉備未立如之何其可為也熹愚不肖深有所疑蓋凡明公之所易者皆古人之所難而明公之所難者乃古人之所易也反復思慮不得其說將以質之左右而未暇也今者敢因修慶而冒以為請伏惟明公試反諸心而以事理之輕重本末權之誠知夫真難易之所在而有以用其心焉則亦無難之不易矣詩曰伐柯伐柯其則不逺願明公留意則天下幸甚詩集待堯舜富公阮爰立士夫皆相慶王逄原有詩云直須丨見為丨丨未敢輕浮作頌聲吕氏廣記一䕫契惟仲淹弼丨丨一丨慶厯聖德詩赤松遊聖朝宰相年年出公在中書十四秋西祀束封俱已畢好來相伴丨丨丨魏野寄王旦詩青春好朝廷有道丨丨丨門館無私白日長本朝詩廟堂端委但令丨丨坐丨丨北狄西戎談笑了歐公詩門館無私見上注無地樓臺有官居鼎鼐丨丨起丨丨魏野上冦萊公春圃桔橰風定曉園蝴蝶閙雨餘丨丨丨丨閒王荆公詩收斂成功須臾慰滿三農望丨丨丨丨寂似無韓魏公雪詩且看晚節不羞老圃秋容淡丨丨黃花丨丨香韓魏公重陽詩古今合璧事類備要後集卷十四
