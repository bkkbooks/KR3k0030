弟三人皆有才學盛名彭年善舞鶴年丨丨丨丨特承顧遇於東都大起第宅制度甲於都下其後流落江南每遇良辰勝賞為人歌數闋聞之莫不感泣罷酒杜甫嘗贈詩所謂岐王宅裏尋常見崔九堂前幾度聞正值江南好風景落花時節又逢君崔九即殿中監雀滌中書令湜之弟也明皇録荔枝名曲天寶十四載楊妃誕辰上令小部音聲於長生殿奏新曲未有名會南海進丨丨因丨為荔枝香邊地名曲天寶中樂章多以丨丨為丨若涼州甘州伊州之類其丨遍繁聲名入破後其地盡為西蕃所沒破其兆矣傳載播皇猷曲宣宗每宴羣臣備白戲帝製新曲教女伶數十百人衣珠翠緹緑連袂而歌其樂丨丨丨之丨樂志作緑珠怨武后時補闕喬知之有妾曰碧玉美而善歌舞武承嗣借教歌僮納之不還知之丨丨丨丨曲密寄之其末云辭君去君終不忍欲勞掩袂傷鉛粉百年離恨在高樓一代容華為君盡碧玉得詩飲泣而卒承嗣聞之遂殺喬知之朝野僉載為雨霖鈴明皇幸蜀初入邪谷霖雨彌旬棧道中聞鈴聲帝方悼念貴妃因採其聲丨丨丨丨曲以寄恨焉時梨園弟子唯張野狐一人善篳􅀢因使吹之遂傳於世皆合絃管李賀樂府數十篇雲韶諸工丨丨之丨丨求被聲歌李益於詩尤所長每一篇成樂工爭以賂丨取之丨丨丨供奉天子教婢唱吟宋縣為連州參軍刺史聞其善歌使丨丨日執笏簾外丨丨自如為我訪來明皇初自巴蜀回夜闌登勤政樓倚欄南望煙月滿目因歌曰庭前琪樹巳堪攀塞北征人尚未還蓋盧思道之詩也歌畢里中隱隱如有歌者謂力士曰得非梨園舊人乎遲明丨丨丨丨翌日力士乃求於里中召至果是其夜復乘月登樓左右惟力士及妃子侍者紅桃在焉遂命歌涼州涼州即貴妃所製親御玉笛為衙樓曲曲罷無不掩泣因廣其曲傳於人間明皇雜録響傳九陌唐開元中內人許子和永新縣樂伶女也入宫因名永新能變新聲高秋明月喉轉一聲丨丨丨丨一日大酺於勤政樓萬衆喧譁莫得聞魚龍百戲之音永新乃撩鬢舉袂狂奏謾聲廣揚寂寂若無一人漁陽之亂六宫星散永新為士人所得韋青避地廣陵月夜憑欄舟中唱水調者曰此永新歌也登舟省之相與對泣後士人卒遂落塵臨終謂其母曰阿母錢樹子倒矣樂府雜録歌直千金宫妓永新者善歌明皇寵愛每對奏歌則絲竹之聲莫能遏帝嘗謂左右曰此妾丨丨丨丨嘗大酺勤政樓萬衆喧譁上命宫女永新歌一曲樓下皆竦聽寂無人聲曲嘆百年僖宗薄於德耽寵優人李可及可及者能新聲自度曲詞調捷巧京師偷薄少年爭慕之號為拍彈同昌公主喪畢帝與郭淑妃悼念不已可及為帝造丨曰丨丨丨歌舞者數百皆珠翠緣飾刻畫魚龍地衣度用繒五十倚曲作詞衣思裴回聞者皆涕下舞闋珠寶覆地帝以為天下之至悲愈寵之李衮善歌丨丨丨丨放江外名動京師崔昭入朝密載而至乃廣延賓客請第一部樂及京邑之名倡以為盛會昭言表弟欲登末座衮弊衣而出滿座嗤笑少頃命酒昭曰請表弟歌至皆笑及喉轉一聲樂人皆大驚曰是李八郎也羅拜之國史補嘉榮善唱歌曲之妙其來久矣元和中國有米嘉榮何戡近有彈行不嫌不嫌子意奴一二十年來絶不聞善唱以拍於世拍彈起李可及懿宗朝有恩澤曲子别趙十哭趙十之名劉尚書禹錫與米嘉榮詩云三朝供奉米嘉榮能變新聲作舊聲如今後輩輕前輩好遣先生事後生又自貶所歸京聞何戡歌云二十年來别帝京重聞大樂不勝情舊人只有何戡在更請殷勤唱渭城盧氏雜録有賀方回賀方回工於詞東坡嘗有詩曰能道江南斷腸句只今惟丨丨丨丨有符存審五代符存審少微賤嘗犯法當死臨刑指旁壞垣顧主者曰願就死於彼冀得垣土覆尸主者哀而許之為徙垣下而主將方飲酒顧其愛妓思得善歌者佐酒妓言丨丨丨丨嘗為妾歌甚善主將馳騎召存審而存審已徙垣下故未加刑因往飲所召使歌而悅之得不死作還鄉曲吳越錢鏐遊衣錦軍丨丨丨歌曰三節還鄉兮挂錦衣父老逺來兮相追隨吳越一主兮駟馬歸作檀來歌南唐世宗取泗州舟師步騎數百水陸並進軍士丨丨丨之丨聞數十里滿庭芳慢宣上元錫宴左丞范致虛進丨丨丨丨一闋上賡其韻序之上元賜公卿宰執觀燈御筵遵故事也卿初獲預坐以滿庭芳詞來上因俯同其韻以賜舜韶新慢政和二年得玄圭三年聖旨平江府進士曹棐撰徵招調丨丨丨丨曲文理可采特補將仕郎充大晟樂府製撰復雅歌詞賦鷓鴣天慶厯中開封府並棘寺同日奏獄空仁宗大喜宫中宴集遣中使宣晏叔原作詞丨丨丨丨令一首進入大稱上意本事詞作瑞鶴仙紹興上元康伯可應制丨丨丨丨髙宗皇帝稱賞風柔夜暖已下至末章宣賜甚厚樂府解題詞播中都元豐間蔡敏肅公挺子正自西掖出鎮平陽府經數歲意欲歸作喜遷鶯一闋云云丨丨丨丨遂徹聖聽上因語吕丞相曰蔡挺欲歸遂以西掖詔還揚是詞詁詞塵乙覽熙寧丙辰中秋東坡居士歡飲達旦大醉作水調歌頭兼懷子由云云元豐七年都下傳唱此丨神宗垂問內侍因得上丨丨丨讀至又恐瓊樓玉宇髙處不勝寒之句上曰蘇軾終是愛君乃命量移汝州雲麓雜記作明妃曲本朝歐陽修丨丨丨丨曰漢宫有佳人天子初未識一朝隨漢使逺嫁單于國絶色天下無一失難再得縱能殺畫工於事竟何益耳目所及尚如此萬里安能制夷狄漢計已誠拙女色難自誇明妃去時淚灑向枝上花江風日暮起飄泊到誰家紅顔勝人多薄命莫怨春風當自嗟作塞上曲黃庭堅丨丨丨丨十月北風燕草黃燕人馬飽弓力強虎皮裁鞍雕羽箭射殺山陰雙白狼青氊帳髙雪不濕擊鼓傳觴令行急戎王半醉擁貂裘昭君猶抱琵琶泣曲不稱旨柳耆卿善詞曲纍不第仁宗召之令作醉蓬萊曲首云漸庭皋葉下末云太液波翻皆犯時忌不稱旨後為屯田郎中詞特免解寶和間信之貴溪連仲宣者石臺仲舉之兄也少不事科舉留意觴詠客於京師適遇元宵徽宗御宣德樓錫宴近臣與民同樂仲宣進念奴嬌一闋稱旨丨丨文丨丨本事詞復雅歌詞序略孟子嘗謂今之樂猶古之樂論者以謂今之樂鄭衛之音也烏可與韶夏濩武比哉孟子之言不得無過此説非也詩三百五篇商周之歌亂也其言止乎禮義聖人刪取以為經因衰鄭衛之音作詩之聲律廢矣漢興制氏猶傳其鏗鏘至元成間倡樂大盛貴戚五侯定陵富平外戚之家淫侈過度至與人主爭女樂而制氏所傳遂泯絶無聞焉文選所載樂府詩晉志所載碭石等篇古樂府所載其名三百秦漢以下之歌亂也其源出於鄭衛蓋一時文人有所感發隨世俗容態而有作也其意趄格劣猶以近古而高健更五胡之亂北方分裂元魏高齊宇文氏之周咸以戎狄強種雄據中夏故其謳謡淆糅華夷焦殺急促鄙俚俗下無復節奏而古樂府之聲律不傳周武帝時龜兹琵琶工蘇祇婆者始言七均牛𢎞鄭譯因而演之八十四調始見萌芽唐張文收祖孝孫討論郊廟之歌其數於是乎大備迄於開元天寶間君臣相與為淫樂而明宗尤溺於夷音天下薰然成俗於時才士始依樂工拍彈之聲被之以辭句之長短各隨曲度而愈失古之聲依永之理也溫李之徒率然抒一時情致流為淫艷猥褻不可聞之語我宋之興宗工臣儒文力妙天下者猶祖其遺風蕩而不知所止脫於芒端而四方傳唱敏若風雨人人歆艷咀味於朋遊樽俎之間以是為相樂也其韞騷雅之趣者百一二而已以古推今更千數百歲其聲律亦必亡無疑屬靖康之變天下不聞和樂之音者一十有六年紹興壬戌誕敷詔旨弛天下樂禁黎民歡忭始知有生之快謳歌載道遂為化國由是知孟子以今樂猶古樂之言不妄矣胡明仲酒邊集序略風雅亡而騷雅作六義之道寖寖以衰逮漢武帝采天下歌謡於樂府文士各自名家其律既殊去古益逺氣喪於南朝俗習薰蒸卒為靡曼輕便之態紛紜泛濫餘風屢變黜根幹獵英華鐫鎪脂粉以相夸尚安在好色而不淫也自唐以來其或登山臨水嘯月吟風外感時景自傷羇旅弔古興亡遣使勞歸託物聨事燕樂之盛别離之愁魂往神交目成心授金屋椒房之怨桑間濮上之音寫纎艷難道之情為參差不齊之句惟其舉首高歌而逸懷浩氣超然乎塵垢之外於是花間為皂𨽻而柳氏為輿臺矣歐陽炯花間集序略鏤玉雕瓊凝化工而迥巧裁花剪葉奪春艷以爭妍是以唱雲謡則金母詞清挹霞醴則穆王心醉名高白雪聲聲自叶鸞歌響遏青雲字字偏諧鳯律楊柳大堤之句樂府相傳芙蓉曲渚之篇豪家自製莫大爭高門下三千玳瑁之簪競富尊前數十珊瑚之樹則有綺筵公子繡幌佳人遞葉葉之花箋文抽麗錦舉纎纎之玉指拍案香檀不無清絶之辭用助嬌嬈之態自南朝之宫體扇百里之倡風何止言之不文所謂秀而不實有唐已降家家之香徑春風寧尋越艷處處之紅樓夜月自鎖姮娥明皇則有李太白應制詞近代則有溫飛卿金筌集將使西園英哲用資羽蓋之權南國嬋姢休唱蓮舟之引詩集悲歌丨丨吐清響陸機行歌丨丨非隱淪杜緣雲丨丨清切歌聲上杜穿雲繁雲迸門軸寒管裂員蘆衆音不能逐裊裊丨丨衢杜牧之迷宫徵玉杯久寂寞金管丨丨丨杜有鬼神但覺高歌丨丨丨杜曲絶碧天玉顔上哀轉絶耳非世有孤雲忽無色邊馬為回首丨丨丨丨高餘聲散秋草韋蘇州擬古響下清虛滿堂慘不樂丨丨丨丨裏江城帶素月况乃清夜起老夫悲暮年壯士淚如水杜甫聽楊氏歌鼓秦人盆歌丨丨丨丨杜貽華陽柳少府詩贈天馬錦丨之丨丨丨副以水犀梳同上唱後庭花煙籠寒水月籠沙夜泊秦淮賣酒家商女不知亡國恨隔江猶丨丨丨丨杜牧之吹玉樹花陳國機權未有涯如何後主便驕奢不如即入宫前井猶自聽丨丨丨丨胡曾惟數米嘉榮惟有賀方回並見前古今合璧事類備要外集卷十一
