body:
  text: 古今合璧事類備要外集卷十一宋謝維新撰音樂門樂章附樂府樂曲樂章源流樂章即樂府之本樂歌即樂府之流自成周制為頌聲二十一篇厥後鄭康成箋其每篇皆為樂歌由此言之周之樂章即後世之樂歌也特周人之樂章純乎正後世之樂歌純乎淫唯其正也可以告神明可以祀天地唯其淫也則雖詠及日月星辰霜露山川草木蟲魚之變而其情則終流於淫靡而與古樂章之情不同也自周人制為樂章而漢世則有樂府如武帝郊祀等歌班固明堂等詩皆漢人之樂府也然當漢之世作為詩歌猶可以質諸鬼神告於祖宗也及樂府之一變於是晉宋之際又有所謂古樂府之章如釋子蘭釋貫休等作雖托物以寓興而其辭終入於鄙俚又與漢人之樂府不可同日語也又孰知樂府之變又變而為隋唐五代之際之樂歌乎夫當唐之世如賀白闕之所述猶足以發越性情而時寓諷譏也豈知樂歌又變而為本朝之長短句乎世率謂今之詞曲即樂府之異名也然今世之所謂詞曲者其方唐人之樂歌則又愈降而愈下矣自詞曲之變又轉而為巷陌市井之歌則又樂府之所不足道云事類永言歌丨丨書長言歌之為言丨丨之也記登歌丨丨者五帝三王之聲善歌丨丨者使人繼其聲人聲歌者在上貴丨丨也合聲丨丨習歌於國學也同上樂語大司樂以樂德丨丨教國子樂歌教六詩曰風曰賦曰比曰興曰雅曰頌注丨丨並禮八闋葛天氏之樂三人操牛尾提足以歌丨丨吕氏春秋五絃神農丨丨隋志雲門丨丨軒轅氏之樂歌也其義蓋言雲之出潤益萬物如帝之德無所不施咸池丨丨陶唐氏之樂歌也其義蓋稱堯德至大無不備全元化油油兮孰知其然至德汩汩兮順之以先元化浘浘兮孰知其能至道泱泱兮曲之以全五莖丨丨顓頊之樂歌也其義蓋稱顓頊得丨德之根丨大韶丨丨有虞氏之樂歌也其義蓋稱帝舜能紹先聖之德勑命帝庸作歌曰丨天之丨惟時惟幾乃歌曰股肱喜哉元首起哉百工熙哉皋陶拜手揚言曰念哉率作興事謹乃憲欽哉屢省乃成欽哉乃賡載歌曰元首明哉股肱良哉庶事康哉又歌曰元首叢脞哉股肱惰哉萬事隳哉帝拜曰俞往欽哉述戒太康尸位以逸豫滅厥德畋于有洛之表厥弟五人御其母以從徯于洛之汭丨大禹之丨以作歌其一曰皇祖有訓民可近不可下民惟邦本本固邦寧豫視天下愚夫愚婦一能勝豫一人三失怨豈在明不見是圖豫臨兆民若朽索之御六馬為人上者奈何不敬其二曰云云其三曰云云其四曰云云其五曰云云南風昔者舜彈五弦之琴造丨丨之詩其詩曰丨丨之薰兮可以解吾民之愠兮南風之時兮可以阜吾民之財兮唯修此化故其興也勃焉德如泉流至於今王公大人述而弗忘家語慶雲帝舜時景星出房地出乘黃之馬和氣普應丨丨興焉若煙非煙若雲非雲郁郁紛紛蕭索輪囷百工相和而歌慶雲帝乃唱之曰丨丨爛兮糾漫漫兮日月光華旦復旦兮羣后咸進稽首曰明明上天爛然星陳日月光華洪豫一人帝乃載歌曰日月有常星辰有行四時順經萬物允誠於豫論樂配天之靈遷于聖賢莫不咸聽鼚乎鼓之軒乎舞之精華以竭褰裳去之宋符瑞志景星見上大夏丨丨有夏氏之樂歌也其義蓋稱禹治水其功能大中國茫茫下土兮乃生九州山有長岑兮川有深流茫茫下土兮乃均四方國有人民兮野有封疆茫茫下土兮乃歌萬年上著茂功兮下載人天大濩丨丨有殷氏之樂歌也其義蓋稱湯救天下濩然得所萬姓苦兮怨且哭不有聖人兮誰護育聖人生兮天下和萬物熙熙兮舞且歌以上並見元結樂詩商頌丨丨自那至殷武皆當時之樂歌詩疏周頌丨丨自清廟至般詩凡三十一篇皆當時之樂歌同上歌北鄙紂丨丨丨而殷王滅隋志歌黃竹穆天子遊黃臺之丘獵於平澤有降雨天子乃休日中大寒北風雨雪有凍人天子作黃竹歌以哀之穆天子傳穆叔拜晉侯享魯丨丨金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三丨韓獻子使行人子貢問之曰子以君命辱於敝邑先君之禮藉之以樂以辱吾子吾子舍其大而重拜其細敢問何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必咨於周臣聞之訪聞於善為咨咨親為詢咨禮為度咨事為􅓪咨難為謀臣獲五善敢不重拜師曹請孫蒯入使公飲之酒使太師歌巧言之卒章太師辭丨丨丨為之初公有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百故師曹欲歌之以怒孫子以報公公使歌之遂誦之左襄十四季札觀吳丨丨聘魯請丨於周樂使工為之歌周南召南曰美哉始基之矣猶未也然勤而不怨矣為之歌邶鄘衛曰美哉淵乎憂而不困者也吾聞衛康叔武公之德如是是其衛風乎為之歌王曰美哉思而不懼其周之東乎為之歌鄭曰美哉其細已甚民弗堪也是其先亡乎為之歌齊曰美哉泱泱乎大風也哉表東海者其太公乎國未可量也為之歌豳曰美哉蕩乎樂而不淫其周公之東乎為之歌秦曰此之謂夏聲夫能夏則大大之至也其周之舊乎為之歌魏曰美哉渢渢乎大而婉險而易行以德輔此則明主也為之歌唐曰思深哉其有陶唐氏之遺風乎不然何憂之深也非令德之後誰能若是為之歌陳曰國無主其能久乎自鄶以下無譏焉為之歌小雅曰美哉思而不二怨而不言其周德之衰乎猶有先王之遺民焉為之歌大雅曰廣哉熙熙乎曲而有直體其文王之德乎為之歌頌曰至矣哉直而不倨曲而不屈邇而不逼逺而不攜遷而不淫復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪處而不底行而不流五聲和八風平節有度守有序盛德之所同也云云觀止矣若有他樂吾不敢請已歌南風師曠曰吾驟丨丨丨又歌北風南風不競楚必無功左歌白雪有丨於郢中和者不過數人唱彌高而和彌寡陽春丨丨之歌也宋玉扣角歌寧戚飯牛丨丨而丨曳杖歌孔子蚤作負手丨丨消搖扣門丨曰云云記檀弓取瑟歌孔子孺悲出丨丨而丨使之聞之歌而善子與人丨丨丨必使反之而後和之歌而過楚狂接輿丨丨丨孔子曰鳳兮鳳兮何德之衰往者不可諫來者猶可追已而已而今之從政者殆而雉朝飛齊犢沐作丨丨丨思歸引衛女作丨丨丨子貢聞聲丨丨見師乙而問焉曰賜丨丨歌各有宜也師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉夫歌者直已而陳德也直而靜柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風肆直而慈愛者宜歌商溫良而能斷者宜歌齊記曾子曳縱丨丨居衛丨丨而歌商頌聲滿天地若出金石莊子秦青撫節薛談學謳於丨丨未窮青之旨自謂盡之矣遂辭去歸秦亦弗止餞於郊衢丨丨悲歌聲振林木響遏行雲薛談乃謝求返終身不敢言歸張華博物志韓娥餘響昔丨丨東之齊糧匱鬻歌假食既去而丨丨繞梁三日不絶左右以其不去過逆旅人辱之韓娥因漫聲哀哭一里老幼悲愁涕泣三日不食娥復漫聲長歌一里老幼歡忭舞蹈不能自樂乃厚賂而遣之故雍門之人至今善歌哭效娥之遺聲也同上莫愁善謳石城有女子名丨丨丨歌丨石城樂和中有忘愁聲因有此歌古今樂録虞公發聲漢興以來善歌魯人丨丨丨丨清哀拂動梁塵學者莫能及也劉向别録齊右善歌昔者王豹處於淇而河西善謳綿駒處於髙唐而丨丨丨丨孟鼓枻而歌屈原既放遊於江潭行吟澤畔漁父見而問之云云漁父莞爾而笑丨丨丨去乃丨曰滄浪之水清兮可以濯我纓滄浪之水濁兮可以濯我足遂去不復言文選漁父辭歌滄浪清有孺子丨曰丨丨之水丨兮可以濯我纓滄浪之水濁兮可以濯我足孔子曰小子聽之清斯濯纓濁斯濯足矣自取之也孟歌易水寒荆軻至燕愛燕之狗屠及善擊築者高漸離軻嗜酒日與狗屠及漸離飲於燕市酒酣漸離擊築軻和而歌於市中相樂也已而相泣旁若無人者後為燕太子丹報讎於秦太子及賓客知其事者皆白衣冠以送之至易水上既祖取道高漸離擊築荆軻和而歌為變徵之聲士皆流淚涕泣又前而為丨曰風蕭蕭兮丨丨丨壯士一去兮不復還復為羽聲慷慨士皆瞑目髮盡上指冠於是荆軻就車而去史記本傳為歌數曲項羽軍少食盡諸侯兵圍之數重乃起飲帳中有美人姓虞氏常幸從駿馬名騅常騎乃悲歌慷慨自丨丨詩曰力拔山兮氣蓋世時不利兮騅不逝騅不逝兮可奈何虞兮虞兮奈若何歌丨丨美人和之為歌寄哀田橫秦末自立為齊王後居海島高帝得天下召橫不至遂自剄從者不敢哭而不勝哀故丨丨以丨丨情今之挽歌自橫始也作大風歌漢高祖過沛置酒飲酣擊築自歌曰大風起兮雲飛揚威加海內兮歸故鄉安得猛士兮守四方令兒皆和習之作秋風詞武帝丨丨丨丨曰秋風起兮白雲飛草木黃落兮鴈南歸蘭有秀兮菊有芳懷家人兮不能忘泛樓船兮濟汾河橫中流兮揚素波簫鼓鳴兮發棹歌歡樂極兮哀情多少壯幾時兮奈老何合八音調武帝定郊祀之禮乃立樂府采詩夜誦以李延年為協律都尉多舉司馬相如等造為詩賦略論律吕以丨丨丨之丨作十九章之歌以正月上辛用事甘泉圜丘使童男女七十人俱歌昏詞至明夜常有神光如流星止集于祠壇天子自竹宫而望拜百官侍祠者皆肅然動心焉安世房中歌曰磑磑即即師象山則嗚呼孝哉案撫戎國蠻夷竭歡象來致福兼臨是愛終無兵革郊祀歌練時日侯有望􅌊膋蕭延四方首桂酒賓入鄉帝臨清和六合制數以五海內安寧興文偃武后王富媪昭明三光穆穆優遊嘉服上黃青陽青陽開動根荄以逐靈聲發榮壧處傾聽枯藁復産乃成厥命衆庶熙熙施及夭胎羣生啿啿惟春之祺天馬天馬徠從西極涉泫沙九夷服天馬徠龍之媒遊閶闔觀玉臺天門天門開詄蕩蕩月穆穆以金波日華曜以宣明景星景星顯見信星彪列象載昭庭日親以察齋房齋房産草九莖連葉宫童效異披圖按牒玄氣之精回復此都夔夔日茂芝成靈華前禮樂志制氏樂聲漢興樂家有丨丨以雅丨丨律世世在大樂官但能紀其鏗鏘鼓舞而不能言其義竇公樂章六國時魏文侯最為好古漢文時得其樂人丨丨獻其書乃周官大宗伯大司丨之丨也孫通樂曲叔丨丨因秦樂人制宗廟樂大祝迎神於廟門奏嘉至猶古降神之樂也皇帝入廟奏永至為行步節猶古采齊肆夏也乾豆上奏登歌不以管絃亂人聲欲在位褊聞之猶古清廟之歌也再終下奏休成樂美神明既享也皇帝就於東廂坐室奏永安之樂成禮也戚夫人歌漢丨丨丨丨入塞之曲聲入雲霄李延年歌丨丨丨善丨多變新聲號協律聲也依鹿鳴聲宣帝神爵五鳳之間天下殷富數有嘉應上頗作歌詩欲興協律之事丞相魏相奏言知音善鼓琴者渤海趙定梁國龔德皆召見待詔於是益州刺史王襄欲宣風化於衆庶聞王褒有俊材請與相見使褒作中和樂職宣布詩選好事者令丨丨丨之丨習而歌之時汜鄉侯何武為僮子選在歌中久之武等學長安歌太學下轉而上聞宣帝召見武等觀之皆賜帛謂曰此盛德之事吾何足以當之漢王褒傳下太樂官漢安世樂房中歌十七章又郊祀歌十九章其餘巡狩福應之事不序郊廟故弗論是時河間獻王有雅材亦以為治道非禮樂不成因獻所集雅樂天子丨丨丨丨常存𨽻之前禮樂志無渡河曲見樂器箜篌注悲翁戰曲樂曲有丨丨丨城南門東有賢女童和三年中樂久長殿前生桂樹並曲名也前志烏生子曲凡樂章古辭今之存者前漢世街陌謡謳江南採蓮丨丨八九丨白頭吟之屬是也鳳將雛