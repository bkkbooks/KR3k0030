body:
  text: 古今合璧事類備要後集卷五十六宋謝維新撰殿學門觀文殿大學士附總殿學士歷代㳂革總學士國朝殿學士有觀文殿大學士學士資政殿大學士學士端明殿學士殿學士資望極峻無吏守無典掌惟出入侍從備顧問而已觀文殿大學士非曽為宰相不除觀文殿學士資政殿大學士及學士並以寵輔臣之去位者端明殿學士惟學士久次者始除兩朝國史志近歲以待簽樞云職略又觀文本朝觀文殿即舊日延恩殿也慶厯七年以文明殿學士稱呼同真宗諡號乃改名紫宸殿後又以紫宸殿非人臣所可稱呼乃以延恩殿更名觀文殿㑹要皇祐元年詔置觀文殿大學士寵待舊相今後須曽任宰相乃得除授時賈昌朝由使相右僕射觀文殿大學士判尚書都省觀文殿置大學士自昌朝始詔略見事類注三年詔班在觀文殿學士之前六尚書之上㑹要自是嘗任宰相者出必為大學士熙寧中韓絳宣撫陜西河東得罪罷守本官四年用明堂赦授觀文殿學士宰相不為大學士自絳始續㑹要事類延恩皇祐詔置觀文殿大學士略曰因丨丨之别殿觀前代之祕文榜以嘉名置諸禁職訪道且為丨丨之所以延稽古之臣猶慮哲乂之姿嘗居台宰之任或因均逸姑務親仁備經術之咨詢廣政機之延訪同上祕殿惟兹丨丨之嚴歐陽修除劉沆制書殿又賜龎籍詔云丨丨之職號為清優自謝表亦曰職清丨丨觀文殿學士歷代㳂革觀文殿乃隋煬帝殿名本朝觀文殿即舊延恩殿初為文明殿學士四朝國史慶厯七年宋庠言文明殿學士正同真宗諡號兼禁中無此殿額其學士理自當罷乞擇見今正朝或祕殿以名學士易之乃詔改為紫宸殿學士以參知政事丁度為之㑹要時學士多以殿名為官稱丁遂稱曰丁紫宸歸田録八年御史何郯以為紫宸不可為官稱於是改延恩殿為觀文殿歐陽公云觀文乃隋煬帝殿名理宜避之蓋當時不知然則朝廷之上果不可以無學也即殿名置學士㑹要詔略曰仍建崇儒之秩且為備問之榮又吕氏家孰廣記云觀文殿學士位資政殿學士上蓋初置觀文殿學士職時已有為大資政者故於上加此美職朝廷亦知不當以學士壓大學士但常有人充此二職者故久而不能革正可因無人為此二職時正之也以丁度為之東齊記事自後非曽任執政者弗除續㑹要熙寧中王韶以熙河功元豐中王陶以宫僚雖未歷二府亦除是職蓋異思也然韶猶兼端明殿龍圖學士云續㑹要官制舊典事類美職見前㳂革下注華資宗澤贈觀文殿學士誥詞升觀殿之丨丨集瑞之庭慶厯八年詔略曰惟延恩之寶殿乃丨丨丨祕丨福况所開深嚴莫二矧先聖齊心之地資冲人覽古之懷㑹要崇儒之秩詔略仍建丨丨丨丨且為備問之榮宜以舊延恩殿為觀文兼改紫宸殿學士為觀文殿學士同上資政殿大學士歷代㳂革國朝資政殿在龍圖閣之東序景德二年王欽若參政真宗特置資政殿學士以寵之在翰林學士下欽若不悅訴於上曰臣向自翰林學士拜參知政事今無罪而罷班反在下是貶也真宗特為置大學士以處之十二月復以欽若為資政殿大學士班在文明殿學士之下翰林學士承㫖之上資政殿置大學士皆自欽若始自冀公班翰林承㫖上一時以為殊寵祥符初向文簡公以前宰相再入為東宫留守復加此職自是訖天聖末二十餘年不以除人明道元年李文定公知河陽召還始再命之景祐四年王沂公罷相復除三十年間除三人而皆前宰相也宋宣獻公罷參知政事仁宗眷之厚因加此職自冀公後非宰相而除者惟宣獻一人而已康定二年右正言梁適請遵先朝故事定以員數於是詔大學士置二員學士三員並㑹要事類特授舊制資政殿大學士並以寵輔臣之去位者元豐中韓維陳薦皆以東宫舊臣故丨丨焉續㑹要賜㑹向敏中為資政殿大學士敏中赴上丨丨于祕閣兩制與焉資政殿學士歷代㳂革國朝康定二年詔學士置三員㑹要餘見前大資類事類月殿增秩秋曹兼榮丨丨楊億代表書殿進丨丨之寵名頒真宫之優秩曲阜除孫永制禁庭異選祕殿宏開皇墳允集又曰著作丨丨特丨深嚴之丨楊億代表祕殿隆名丨丨丨丨欒城除李易制兼華祕殿丨丨丨丨吕正獻謝表書殿儒班丨丨崇丨之丨曲阜行蔡卞制班在承㫖之上景祐元年詔資政殿學士薛奎丨丨翰林丨丨丨丨實録職寵名儒之賢胡文恭行富弼制云設别殿之丨丨丨丨丨丨端明殿學士歷代㳂革端明殿即西京正衙殿也退朝録後唐天成元年明宗即位之初四方書奏命樞密使安重誨進讀懵於文義孔循獻議始置端明殿學士命馮道趙鳳俱以翰林學士充班在翰林學士上後有轉改止於翰林學士內選任初如三館例職在官下趙鳳轉侍郎諷任圜特移職在官上後遂為故事晉天福五年廢開運元年復五代史國朝太宗時程侍郎羽為之後隨殿名改為文明殿學士慶厯中改文明為紫宸後改紫宸為觀文其改置本末見觀文殿學士類明道二年改承明殿為端明殿復置端明殿學士以翰林侍讀學士宋綬為之詔略曰方奬拔於名儒特增新於近職俾參顧問益廣謀猷在翰林學士之下自明道訖元豐無前執政為之者近來以待學士之久次者元豐中以前執政為之自曾孝寬始孝寬前為簽書樞密院以見任執政為之自王安禮始安禮自尚書左丞為之知江寧並見續㑹要政和中嘗改為延康殿職略建炎二年都省言延寧殿學士舊係端明殿學士闕中興㑹要近拜簽樞者多領焉事類拜相後唐長興四年劉昫入相中謝是日大祠明宗不御中興殿而坐於端明殿昫至中興殿門閣門使曰舊禮宰臣謝恩須於正殿通喚請俟來日趙延壽曰命相之制下已三日中謝豈宜後時即奏聞昫遂中謝於端明殿廷昫自端明殿學士丨丨復謝於本殿人士榮之續㑹要升殿天成元年端明殿學士馮道趙鳳制擢自玉堂丨於紫丨常親顧問每預論思位既溢於深嚴禮合加於優異宜令班在翰林學士上續通典只兩人天下儒生僅餘萬數殿前學士丨有丨丨馮道笏記才兩人端明殿學士國朝尤多以翰林學士兼之其不以翰林兼職及換職者百年間特拜丨丨丨程勘王素是也歸田録本緣麟趾以殿名官丨丨丨丨之舊東坡謝表首建儲議范蜀公鎮韓維上言公在仁宗朝丨開丨丨之丨其後大臣繼有論奏追録其言存沒皆推恩而鎮未嘗以語人悉以公十九疏上之拜端明殿學士言行録非直翰墨英宗四年忽召王圭至蘂珠殿專詔令兼端明殿學士錫之盤龍金盆諭之曰祕殿之職丨丨器卿于丨丨間二府缺員即出命矣四朝史以備顧問端明之職蓋自五代時通班右府侍立殿中專丨丨丨丨寵儒臣者也汪應辰制又方奬拔於名儒特增新於近職俾參顧問益廣謀猷明道詔期奬擢於名儒明道置學士詔丨丨丨丨丨丨益增華於近職丨丨丨丨丨丨同上古今合璧事類備要後集卷五十六
