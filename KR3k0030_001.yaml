body:
  text: 古今合璧事類備要前集卷一宋謝維新撰天文門天事類羣物之祖天者丨丨丨丨也故遍覆包含而無所殊建日月風雨以和之經隂陽寒暑以成之前漢董仲舒傳羣陽之精天丨丨精也合為太一分為殊名故立字一大為天春秋說題高目下耳敢問天聰明曰昭昭乎惟天為聰惟天為明夫能丨其丨而丨其丨者匪天也夫揚問明積氣成形杞國有憂天地崩墜者曉之曰天積氣耳亡處亡形奈何憂其崩列子道猶張弓天之丨其丨丨丨乎高者抑之下者舉之有餘者損之不足者補之老子形如倚蓋周髀家云天丨南高而北下日出高故見日入下故不見天之居丨丨丨故極在人北是其證也極在天之中而今在人北所以知天之丨丨丨丨晉天文志行如蟻磨天員如倚蓋地方如棊局天旁轉半在地上半在地下日月本東丨天西旋入于海牽之以西丨丨行丨上磨左旋蟻右行磨疾蟻遲不得不西同上運如車轂天形如雞子天大地小表裏有水地乘氣而立載水而浮天丨丨丨丨之運渾天儀天有四時春秋冬夏風雨霜露無非教也孔子間居天有六氣隂陽風雨晦冥也左無為而成哀公曰敢問何貴乎天道也子曰貴其不已如日月東西相從而不已是天道也不閉其久是天道也丨丨丨丨是天道也已成而明是天道也哀公問不言而信天聰明也聖人得之天垂象也聖人則之丨丨丨丨不怒而威驗之以衡軸考之以樞軸六帖四時天名春為蒼天夏為昊天秋為旻天冬為上天於春言色於夏言氣於秋言情於冬言位相備也爾雅九方天名九天東方皥天東南方陽天南方赤天西南方朱天西方成天西北方幽天北方𤣥天東北方變天中央鈞天楚辭注五方天神天神之大者曰昊天上帝即耀魄寶也亦曰天皇大帝亦曰太一其佐曰五帝東方青帝威靈仰南方赤帝赤熛怒西方白帝白招拒北方黑帝汁光紀中央黃帝含樞紐云出五經通義六天欲界黃㑹天玉完天何童天平育天文舉天摩夷天凡丨丨為丨丨也護命經注十二天界越衡天濛翳天和陽天恭華天宗飄天皇笳天堂曜天端靜天恭慶天極瑶天元載天孔升天皇崖天合丨丨丨為色丨同上十四天界極風天孝芒天翁重天江由天阮樂天曇誓天霄度天元洞天妙成天禁上天常融天玉隆天梵度天賈奕天合是丨丨丨為無色丨同上周天行度紀星二十八宿布於四方東方蒼龍七宿其屬三十二星七十五度北方𤣥武七宿其屬三十五星九十八度四分度之一西方白虎七宿其屬五十一星八十度南方朱雀七宿六十四星一百一十二度丨丨三百六十五度四分度之一每一度二千九百三十二里周天積一百七萬九百一十三里徑三十五萬六千九百七十一里後地理志注天地相去晉書天文志曰日去地常八萬里又曰地上去丨八萬一千三百餘里又地理志丨東西南北丨丨二億三萬餘里自地至天半八極之數酉陽雜爼云自地至天十一萬餘里學林天在西方吳使張溫來聘溫曰丨有頭乎在何方秦宓川人曰有丨丨丨詩曰乃眷西顧以此推之溫曰天有耳乎宓曰天處高聽卑詩曰鶴鳴于九臯聲聞于天無耳何以聽之溫曰天有足乎宓曰天步艱難無足何以步之溫曰天有姓乎宓曰姓劉天子姓劉以此知之蜀志號玉皇君木公亦曰東王公蓋青陽之氣萬神之先也亦丨丨丨丨居於雲房紫雲為蓋青雲為城直僚仙官皆禀其命漢有小兒歌曰著青裙入天門揖金母拜公乃木公之玉童也太平廣記放狀元榜范仲淹倅陳州時郡守召道士奏章五更乃起守問今夕奏章何其久也曰方出天門遇丨明年進士榜觀者駢道以故稽留公問丨丨何姓曰姓王二名下一字黑塗旁注一字遠不可辨及明春狀元乃王拱夀御筆改為拱辰括異志夢翼登天陶侃丨生八丨飛而上天見天門九重比丨其八唯一門不得入閽者以杖擊之因墜地折其左翼及寤左腋猶痛倦游録以手捧天韓魏公知泰州卧疾數日忽曰適夢丨丨丨丨者再其後援英宗於藩邸翼神宗於東宫同上鍊五色石昔者女媧氏丨丨丨丨以補天闕斷鰲足以立四極列子記白玉樓李賀夢人持版告之曰天帝新白玉樓請君為記賀遂卒李賀傳鈞天廣樂秦穆公夢至帝所觀丨丨丨丨帝錫之以䇿秦遂大昌史書紅雲帝居玉帝所居常有丨丨擁之雖真仙亦不得見其面翼聖傳天門千騎君之來兮丨丨空從丨丨兮駕飛龍云云坡上清辭玉臺羣仙君之去兮天門開欵閶闔兮朝丨丨丨丨迎兮塞雲漢儼前導兮紛後陪同上虎豹九關丨丨丨丨兮啄害下人些楚辭天皇瓊宫呌帝閽使闢扉兮覿丨丨于丨丨出張衡賦詩集玉京黃闕王素嘗夢至丨丨丨丨有紺服翠冠者曰吾東門侍郎公則西門侍郎昔以奏牘訐責于世晚嵗思玉京之夢作詩曰碧虛中藏白玉京夢魂飛入黃金城何時再步煙霞外皓齒青童已掃㕔古今詩話紅雲玉殿侍臣鵠立通明殿一朵丨丨擁丨皇通明丨玉京殿名常有紅雲擁之古詩一中造化一物其來有一身一身還有一乾坤能知萬物備於我肯把三才别立根天向丨丨分丨丨人從心上起經綸天人焉有兩般義道不虛行正在人邵堯夫萬物根源氣體蒼蒼故曰天其中有理是為乾渾然氣理流行際丨丨同丨此一丨朱文公圓蓋無私人欲天從竟不疑莫言丨丨便丨丨商隱萬里雲羅玉璫緘札何由達丨丨丨丨一鴈飛李義山日事類陽宗日者衆丨之丨輝光所燭萬里同晷故日將旦清風起羣隂伏李尋傳君象日者人丨之表至尊之丨孔光論羲和丨丨東方國名日所由過也每日出二國人為御推而升太虛唐堯取以名官山海經又曰有女子名曰丨丨浴日於甘泉丨丨者帝俊之妻是生十日扶桑丨丨在碧海中樹長數千丈一千餘圍兩幹同根更相依倚是以名丨丨十洲記紅輪有客登岱嶽絶頂行四十里以伺日出久之星斗漸稀東望如平地天際已明其下則暗又久之明處有山數峯如卧牛車蓋之狀星斗盡不見其下尚暗初意日自明處出又久之自大暗中日輪湧出正紅色騰起數十丈至明處全無光其下亦尚暗邵氏聞見録黃道日有中道中道者丨丨一曰光道前天文志桑榆西日垂景在樹端謂之丨丨淮南子葵藿若丨丨之傾陽雖不回光然向之者誠也曹植表赤暈永明五年十一月丁亥日出三竿朱色黃色丨丨南齊天文志朱明日名丨丨一名靈耀一名東方一名大明亦名陽烏廣雅圓羅耀方諸山真人皆呼日為丨丨丨外國人呼日為濯羅耀真誥鬱儀仙鬱華又名丨丨鬱儀奔日之丨故曰鬱儀赤文與日同居雞跖集六螭龍日乘車駕以丨丨六螭即丨丨也淮南子三足烏淮南子云日中有踆烏踆趾也謂丨丨丨也日者陽精之宗積而成鳥象烏而三距陽之類其數竒漢天文志又五行通義赤烏精赫赫丨丨惟日之丨朱羽丹質希代而生薛琮頌白駒隙人生一世間如丨丨過丨注白駒日景也魏豹傳燭龍照鍾山之神名曰燭隂視為晝瞑為夜吹為冬呼為夏身長千里人靣蛇身赤色又名丨丨天不足西北無隂陽消息故有龍銜火精以丨天門也出山海經天雞鳴桃都山有大樹有丨丨日出即丨天下雞皆鳴咸池蒙谷日出于暘谷浴于丨丨拂于扶桑是謂晨鳴薄于虞淵是謂黃昏淪于丨丨是謂定昏日入于虞淵之地曙于蒙谷之浦行九州七舍有五億萬七千三百九里淮南子若木崦嵫灰野之山有樹青葉赤華名曰丨丨日所出處生崑崙山鳥鼠山同穴山西南曰丨丨淮南子云日入崦嵫經細柳崦嵫日所入山也山海經化國舒長丨丨之日丨以丨故民間暇而有餘力潛夫論蒼生仰照晉帝命王導共坐導辭曰若太陽下同萬物丨丨何由丨丨晉史小兒辨日孔子逰見小兒鬬辨問其何故一兒曰我以日始出去人近日中時遠日初出天時如車輪其中時如盤蓋此不為遠者小而近者大乎一兒曰日初出蒼蒼凉凉及其中時如探湯此不為近者熱而遠者凉乎孔子不能決列子晉元問日晉明帝幼而聰哲元帝寵愛之年數嵗常置膝前屬長安使來帝因問之曰日與長安孰近對曰長安近不聞人從日邊來居然可知也明日宴羣臣又問之對曰日近帝失色曰何乃異間者之言乎對曰舉目則見日未聞舉目而見長安也帝竒之日者人君之象故有是對本紀羲和寅日分命羲仲宅嵎夷曰暘谷寅賔出日分命和仲宅西曰昧谷寅餞納日堯典虞公指日虞公與夏戰日欲落公以劒指日日退不落淮南子羿射九日堯時十日並出草木燋枯堯命羿仰射十日中其九烏皆死墮羽翼淮南子魯麾三舍丨陽公與韓構難戰酣日暮援戈而丨之日反丨丨云云同上負暄田夫宋有田夫自曝於日顧其妻曰丨日之丨人莫知之以獻吾君將獲重賞列子重光太子漢明帝為太子樂人作歌四章以贊太子之德一曰日宣重光本紀學士八磚唐李程為翰林丨丨程性懶日過丨丨乃至號八磚學士本傳聖人寸隂晉陶侃語人曰大禹丨丨乃惜丨丨至於凡俗當惜分隂晉書逐日嵎谷夸父不量力欲返日景逐之於嵎谷之際道渴而死列子洗光咸池取日虞淵丨丨丨丨潛授五龍夾日以飛狄仁傑贊詩集羲馭丨和冬丨近愁畏日車翻杜甫火輪丨丨飛出客心驚韓愈銅鉦嶺上晴雲如擘絮樹頭初日掛丨丨東坡金雅夜半起下視溟波銜日輪丨丨既騰翥六合俄清新韓愈湧金輪咿喔天雞鳴扶桑色昕昕赤波千萬里丨出黃丨丨劉禹錫飛金烏金烏海底初飛來韓愈冬日負暄杲杲丨丨出照我屋南隅丨丨閉目坐和風生肌膚初似飲醇醪又如蟄者蘇外融百骸暢中適一念無曠然忘所在心與空虛俱劉詩夜見海日朝逰碧峯三十六夜向天壇月邊宿仙人擕我搴玉英壇上夜半東方明仙鐘撞撞迎海日海中離離三山出霞梯赤城遙可分霓旌絳節倚彤雲八鸞五鳳紛在御王母欲上朝元君李益御製日詩王師圍金陵唐使徐鉉來朝盛稱其主秋月之篇天下誦傳之云云太祖大笑曰寒士語爾吾不道也吾微時自秦中歸道華山下醉臥田間覺而日出有句云未離海底千山暗才到中天萬國明鉉大驚殿上稱夀月事類彈丸月與星辰隂者也有形無光日照之乃有光先師以為日似丨丨月似鏡體或以為月亦似丨丨日照處則明不照處則暗京房云偃瓦新月占雨說月如懸弓少雨多風月如丨丨不求自下侯鯖録結鄰七聖記丨丨奔月之仙故曰丨丨黃文與月同居雞跖集望舒月御曰丨丨亦曰纎阿淮南子丨丨弭轡揚子雲賦纎阿按轡束晳補詩影娥池漢武於望鶴臺西起俯月臺臺下穿丨丨丨每登臺眺月影入池中如仙人乘舟笑弄月影因名丨丨丨亦曰眺蟾臺洞冥記廣寒府唐明皇八月望日逰月宫見天府榜曰丨丨清虛之丨少前見素娥十餘人皓衣乘白鸞舞于桂下龍城集冬至後月養魄于廣寒宫方朔十洲記山河影謂月中有物婆娑者乃丨丨丨也其空處海水影淮南子閻扶樹釋氏書言須彌山南有丨丨丨月過樹影入月中唐假成式修月斧鄭仁本表弟逰嵩山見一人枕幞呼之其人曰君知月乃七寶合成乎月勢如丸其日影爍其凹處也常有八萬二千户修之豫即數也因開幞有斤斧鑿數事兩裹玉屑酉陽書搗藥兔張衡靈憲序云日者隂宗之精積而成獸象兔兔隂之類其數耦杜詩注月桂子丨丨丨今江東諸處每至四五月後每于衢路得之大如狸豆破之辛香古老相傳是月中下也洞冥記云有遠飛雞朝往夕還常銜桂實歸於南土所以北方無南方當月路所以有也本草月中蟾兔丨丨有兔與蟾蜍何月隂也丨蜍陽也而與丨並明隂係陽也五經通義乾鑿度曰月三日成魄八日成光蟾蜍體就穴鼻始明穴決也決鼻兔也羿妻姮娥竊藥奔月託身于月是為蟾蜍後漢天文志注月中樓宇𤣥洲之南以水精為月刻瑶為