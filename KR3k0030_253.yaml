body:
  text: 古今合璧事類備要别集卷四十七宋謝維新撰果門橙子格物總論橙橘屬橘高枝葉不類於橘亦有刺大者如杯苞黃皮厚蹙衄如沸香氣馥郁可以熏衣可以芼鮮可以漬蜜嗅之則香食之則美事類襄橙丨丨鄧橘蜀都賦北橙在南稱柑在丨則丨文選詩集雨移細丨更丨橙杜霜壓丨橙丨香橘前人鵠殼丨丨攢瓌橙韓人見後金毬鮮明百數見秋實錯綴衆葉傾霜柯翠羽流酥出天仗黃丨丨戲相蕩摩南實纍纍清霜夜漠漠佳丨曉丨丨鵠殼攢修幹金華耀暖曦張右史樹團團嘉丨丨丨俯可攀壓枝秋實漸斕斑朱欄碧瓦清霜曉粲粲繁星緑葉間歐公搗香虀金橙縱復里人知不見鱸魚價自低須是松江煙雨裏小船燒薤丨丨丨坡真黃色天將金闕丨丨丨借與洞庭霜後橙松滋解作逡巡麴壓倒江南好事僧山谷詠橙麴透甲香西風初作十分涼喜見新橙丨丨丨坡憑驛去洞庭朱橘未弄色襄水錦棖已多黃玉臼搗虀憐鱠美金盤按酒助杯香雖生南土名猶重未信中州客厭常欲寄百苞丨丨丨只因佳味怯風霜梅聖俞抱遺才歎棖橘甘香各效能南苞錫貢不同升果中亦丨丨丨丨有客攀條氣拂膺劉屏山有貴人色尚懷細雨初移日著子已見清霜澘絶憐面丨丨丨丨偶致吾儕樽俎間前人金橘格物藂話金橘子大徑寸黃金色苞光滑味甘香瓤微帶酸食之者多去其瓤用蜜煎造尤佳也事類價重京師金橘産於江西以逺難致都人初不識明道景祐初始與竹子俱至竹子味酸京師人不喜後遂不至而金橘香清味美置之樽俎光彩的皪如金彈珍果也都人初不甚貴後溫成皇后尤好食之由是丨丨丨丨余世家江西吉州人甚惜此果若欲久留著於緑豆中藏之可經時不變蓋橘性熱豆涼故能久也歸田録詩集小木奴金丸丨丨丨元稹幾瓣香霜苞丨丨丨梅聖俞具體微丨丨橘苞丨元稹畫圖傳苑臣初摘置雕盤口敕宣恩賜近官氣味豈同淮枳變皮膚不作楚梅酸參差翠葉藏珠琲錯落黃金鑄彈丸安得一株擎雨露丨丨丨與世人看李清臣襞露囊誦句丨丨丨霜甘冷尉齒梅聖俞帶霜葉越橘如金彈爛然已盈篋誰傳嶺外信尚丨丨前丨前人落細盤黃欺晚菊垂金砌圓並明珠丨丨丨王岐公奉華俎韓彈有輕薄楚萍知是非甘香丨丨丨咀嚼破明璣梅聖俞珠顆垂圓小香黃丨丨丨結成洛邑重霜時相公和氣陶羣物不是寒暄變土宜溫公金彈子風餐露飲橘洲仙胸次清於月樣圓仙谷偶遺丨丨丨蜂王撚作菊花鈿楊誠齋蜜金橘黃金彈禪客入秋無氣息想依紅袖醉毰毸霜枝遙落丨丨丨許送筠籠殊未來山谷寄歐從道黃金丸誠齋老子不耐靜偶拄烏藤出苔徑獨遊無伴却成愁羣從同行還起興槿籬竹户重復重雞鳴犬吠青霞中蓬萊老仙出迎客朱顔緑髮仍方瞳餐菊為糧露為醑染霧作巾雲作屨欣然領客到仙家行盡蓬萊日未斜更傾仙瓢酌仙酒酒外瓢邊亦何有偶看山中雙團欒碧琉璃樹丨丨丨主人忍喫不忍摘笑道未霜猶帶酸小童隨我旁過我不管仙翁惜仙果爭挽風枝㨂霜顆爭獻滿盤來飣坐隔水蓬萊看絶竒蓬萊看水海如池主人勸客對絶境不飲令人怒生癭何如寄下未盡瓢留待於海伴疏影楊誠齋同諸弟訪叔祖於蓬萊摘金橘小酌甘蔗附蔗氷蔗漿糖霜格物藂話蔗叢生畦而種之身似竹而實大者四五寸圍長六七尺有紫色者有青色者初出地面節密自此一節疏一節及末抽葉如蘆葉而大長三四尺許扶疏四垂八九月方取去皮斷而食之脆而味甘滋有查滓笮取其汁過樟木槽取而煎之即可成飴今砂糖氷糖是也又一法曝數日成飴入口即消彼人謂之石蜜即此事類崑崙赤者名丨丨白者名荻蔗本草荻蔗節疏而皮厚者謂之丨丨吳志又見上丈三節扶南蔗一丨丨丨見日即消思風即折世説圍數寸交趾所生者丨丨丨長丈餘取其汁曝之數日成餳入口即消彼人謂之石蜜吳録愷之食蔗顧丨丨為虎頭將軍每丨丨自尾至中或問曰漸入佳境世説太武求蔗元嘉二十七年魏丨丨引兵攻彭城丨甘丨於武陵王駿駿命與之魏史有蔗分惠魏王致意逺來瘦乏若丨甘丨及酒可以丨丨世祖答曰知行路多乏今付酒三器甘蔗百挺沈約宋書以蔗為杖平虜將軍劉勳奮威鄧展等共飲聞展有手臂曉五兵與論劍良久謂將軍怯也求與對酒酣寧熱方食蔗即以為杖下殿數交三中其臂左右大笑魏典論遂貽數挺盧綘中痁疾逾年既乏資給疲瘵且極忽夢一白衣婦人頗有姿色謂之曰子之疾當食蔗即愈既詰朝見鬻蔗絳揣囊中且乏一鏹唯有唐山一册遂詣易之其人曰吾乃負販者將此安用哀君欲之丨丨丨丨絳喜而食之至旦疾愈野史所謂庶出神宗問吕惠卿曰何草不庶獨於蔗庶何也對曰凡草種之則正生此嫡出也甘蔗以橫丨丨丨丨也同上蔗氷交州獻孫亮使黃門持玉碗於上厨中藏吏取丨丨所丨甘蔗餳黃門先恨藏吏以鼠屎投餳中啓言吏不謹亮呼吏持餳器入問曰此器既蓋之有油覆何緣有此黃門將有恨汝邪吏叩頭曰嘗從某求官莞席有數不敢與亮曰必是此也問之具服江表揚州上唐太宗遣使西域取熬糖法即詔丨丨丨諸蔗榨瀋如其劑色味逾西域唐史蔗漿和以為飲臑鱉包羔有柘漿注蔗漿丨其汁丨丨丨宋玉招魂賦取以為飲泰尊柘漿丨柘漿丨丨丨也漢郊祀志王灼譜唐大厯間有僧號鄒和尚不知所從來跨白驢登繖山結茅以居雖鹽菜薪米之屬即書寸紙繫錢緡遣驢負至市區人知為鄒也取平直挂物于鞍從驢歸一日驢犯山下黃氏蔗苖黃請償於鄒鄒曰汝未知因蔗糖為霜利當十倍吾語汝塞責可乎試之果信自是流傳其法鄒末年北走通泉縣靈鷲山龕中其徒追及之但見一文殊石像始知大士化身而白驢者乃獅子也張叶都賦挫斯蔗而療渴若漱醒而含密清滋津於紫梨流液豐於朱橘容齋隨筆甘蔗只生於南方北人嗜之而不可得魏太武至彭城遣人求酒及蔗於武陵王郭汾陽在汾上代宗賜甘蔗二十條子虛賦所云薯柘也且薯柘者甘蔗也蓋相如指言楚雲之物漢郊祀歌泰尊柘漿亦謂取甘蔗汁以為飲容齋又有糖霜譜云糖霜之名唐以前無所見自古食蔗者始為柘漿宋玉招魂所謂胹鱉包羔有柘漿是也其後為蔗餳如孫亮者是也後又為石蜜南中八郡志云榨甘蔗汁曝成飴謂之石蜜本草亦云煉糖和乳為石蜜是也後又為蔗酒唐赤土國用甘蔗作酒雜以紫瓜根是也唐太宗遣使至摩揭它國取熬糖法即詔揚州上諸蔗榨瀋如其劑色味愈於西域然只是今之砂糖蔗之拔盡於此不言作霜非古也厯世詩人模寄寫異亦無一章一句及之惟東坡過金山寺作詩送遂寧僧圓寶云涪江與中冷共此一味水氷盤薦琥珀何似糖霜美山谷在戎州作頌答梓州雍熙長老寄糖霜云逺寄蔗霜知有味勝如崔子水晶盤正宗掃地從誰説我舌猶能及鼻尖則遂寧糖霜見之文字者實始二公甘蔗所在皆植獨福唐四明畨禺廣漢遂寧有糖氷而遂寧為冠四郡所産甚微而顆碎色淺味薄才比遂之最下者亦皆起於近世唐大厯中有鄒和尚者始來白溪之繖山教民黃氏以造霜之法繖山在縣北二十里凡前後為蔗田者十之四糖霜户十之三蔗有四色曰杜蔗曰西蔗曰芳蔗本草所謂荻蔗也曰紅蔗本草所謂崑崙蔗也紅蔗止堪生噉芳蔗可為砂糖西蔗可作霜色淺土不甚貴杜蔗緑嫩味極厚專用作霜凡蔗最因地力今年為蔗田者明年改種五穀以息之霜户器用曰蔗削曰蔗鎌曰蔗凳曰榨斗曰漆甕各有制度凡霜一甕中品色亦自不同惟疊如假山為上團枝次之甕鑑次之小顆塊又次之沙腳為下紫為上深琥珀次之淺黃又次之淺白為下宣和初王黼創應奉司遂寧常貢外嵗别進數千斤是時所産益竒墻壁或方寸應奉司罷乃不再見當時因之大擾敗本業者大半久而未復遂寧王灼作糖霜詩七篇具載其説豫悉取之以廣聞見云詩集雨餘春丨丨甘蔗杜節調漿甜蔗丨丨白樂天消殘醉甘蔗丨丨丨元稹自超羣挺挺丨丨丨稜稜類此君傍湖田薑蔗丨丨丨韋應物對松筠偶然存蔗芋幸各丨丨丨杜初味猶啖丨丨丨丨蔗韓合張微老境如啖丨丨清間丨丨蔗坡吳刀截斷瑶池宴罷王母仙九芝飛入三仙山空餘絳節留人間雲封露洗無時間節旄落盡何斕斑野翁提攜出茅菅丨丨戞戛鳴雙環丨丨寒氷何潺潺相如賦就空上林倦遊渴病長相侵劉伶愛酒真荒淫狂來欲倒滄溟深此時一嚼輕千金壚邊何用文君琴五斗一石安足斟坐想毛髮生清陰蕭瑟甘滋欲誰釀樝梨橘柚紛殊狀冷氣相射杯盤上顧即不見休惆悵佳境到時還不妄詩成雖愧陽春唱全勝乞與將軍杖舒信道氷刀切下丨丨丨丨水晶團堅節人將冷眼看笑殺愷之顛倒甚我於甜淡不相干柘漿金碗凍柘漿歸厨丨丨丨杜人奏行金盤冷垂栁陰陰日初永柘漿和粉丨丨丨坡析朝酲百味旨酒布蘭生泰尊柘漿丨丨丨郊祀歌糖霜不待蜀客寄糖霜丨丨丨丨丨坡嚼成板橋聲亦非崖蜜亦非餳青女吹霜凍作氷透骨清寒輕著齒丨丨人迹丨丨丨楊誠齋古今合璧事類備要別集卷四十七
