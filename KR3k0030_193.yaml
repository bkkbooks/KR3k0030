body:
  text: 古今合璧事類備要續集卷四十三宋謝維新撰事為門餞送事理發揮於其將行也則有餞送之禮然餞人以物不若餞人以文送人以酒不若送人以言蓋物之意有盡而文之意無盡酒之味有窮而言之味無窮也自非仁人君子愛人以德者何足與語此事類犯軷大馭掌馭王路以祀及丨丨禮夏官舍軷祖而丨丨飲酒於其側曰餞重始有事於道也左行神黃帝之子纍祖好逺遊而死於道故後人祭以為丨丨也祖祭因饗飲也漢臨江王𫝊祖神共工氏曰修好逺遊祀以為丨丨漢以午日祖荀彧𫝊餞于襧泉水衛女思歸也云云出宿于泲飲丨丨丨女子有行逺父母兄弟詩送于野燕燕衛莊姜送歸妾也燕燕于飛差池其羽之子于歸逺丨丨丨瞻望弗及泣涕如雨詩餞于屠韓侯出祖出宿于屠顯父餞之清酒百壺注祖將去而犯軷也既覲而反國必祖者尊其所往去則如始行焉祖於國外畢乃出宿韓奕餞于郊鄭六卿丨宣子丨丨昭十六淇之上桑中刺奔也云云送我乎丨丨丨矣詩渭之陽渭陽康公念母也云云穆公納文公康公時為太子贈送文公于丨丨丨念母之不見也詩送人以言孔子適周見老子辭去老子曰吾聞富貴者送人以財仁人者丨丨丨丨吾不能富貴竊仁人之號聰明深察而近於死者好議人者也博辨廣大而危其身好發人之惡者也為人子者不可以有巳為人臣者不可以有巳史記行逺以贐孟子曰當在宋也豫將有逺行行者必以贐辭曰餽贐豫何為不受公孫丑下漸離擊筑荆軻將行大子及賔客知其事者二十餘人皆白衣冠以送之至易水之上既祖取道髙丨丨丨丨荆軻和歌為濮上聲士皆流涕春秋後語商陵鼓琴丨丨牧子娶妻無子父母欲改娶妻聞夜起悲嘯牧子援琴鼓之痛恩愛以永離歎别鶴以舒情蔡雍琴操攜手河梁李陵為將失利降胸奴别蘇武詩曰丨丨上丨丨游子暮何之徘徊蹊路側悢悢不能辭晨風鳴北林耀耀東南飛浮雲日千里安知客心悲文選祖道東門疏廣字仲翁東海蘭陵人與兄子受字公子並為師傅宣帝時上疏乞骸骨皆許之加賜黃金二十斤皇太子贈以五十斤公卿大夫設丨丨供張丨都丨外送者車數百兩辭決而去道路觀者皆曰賢哉二大夫或歎息為之下泣本𫝊送不出郭陳蕃為豫章太守性峻不接賔客徴為尚書令丨者丨丨丨送到前亭王奐為漢陽太守范丹於道候别之奐曰可共到前亭宿息以敘分隔謝承後漢書送祜出界郭奕字大業為野王令羊祜嘗過之奕歎曰羊叔子何必減郭大業少選復往又歎曰羊叔子去人逺矣遂丨丨丨丨數百里坐此免官晉史送人作郡羅友答桓溫曰旦出門逢一鬼大揶揄云我祗見汝丨丨丨丨何以不見人送汝作郡世說傾朝送别宋何尚之字彥德為吏部郎告休定省丨丨丨丨其父叔度曰此是送吏部郎耳非關何彥德也賦詩祖道張柬之授襄州刺史中宗為丨丨丨丨又詔羣臣餞定鼎門外送不越閫齊沈覬不尚浮華從叔勃仕宋貴顯每還吳興賔客填茵覬不至其門勃就之覬丨迎丨丨丨勃曰吾今乃知貴不如賤也送不出門城陽太守梁柳皇甫謐從姑子也之官有勸謐餞之謐曰柳為布衣丨迎丨丨丨食不過鹽菜貧不以酒肉為禮今作郡送之是貴城陽太守而賤柳豈中古之人情非吾心所安也非關彥德見前傾朝送别注不負臨賀唐楊憑為京兆尹御史中丞李夷簡劾之貶臨賀尉獨所善客徐晦至藍田慰餞權德輿曰君送臨賀誠厚無乃為纍乎晦曰方布衣時臨賀知我今忍遽棄耶有如公異時為姦邪譖斥又可爾乎夷簡聞之表為御史曰君丨丨楊丨丨肯負國乎百官班餞李光顔復還忠武宰相丨丨丨丨帝御通化門臨送羣公追餞柳宗元送苑論登第歸序丨丨丨丨於灞陵列筵而觴送逺之賦圭璋交映南京送别東坡出知杭州道由南京后山時為徐州教授告徐守孫覺願往見而覺不之許乃託疾謁告來丨丨丨丨同舟東下至宿而歸後為劉安世所彈岐州告别萊公在岐張忠定在蜀還不留既别顧萊公曰曽讀霍光𫝊否曰未也更無他語萊公歸取其𫝊讀之至不學無術笑曰此張公誚我矣談叢李太白餞二翁尋桃源序昔祖龍滅古道嚴威刑煎熬生人若墜大火三墳五典散為寒灰築長城建阿房并諸侯殺豪俊自謂功髙羲皇國可萬世思欲陵雲氣求仙人登封泰山風雨暴作雖五松受職草木有知而萬象乖度禮刑將弛則綺皓不得不遁於南山魯連不得不蹈於東海則桃源之避世者可謂超升先覺夫指鹿之儔連頸而同死非吾黨之謂乎二翁耽老氏之言繼少卿之作文以述大雅道以通至精卷舒天地之心脫落神仙之境武陵遺跡可得而窺焉問津利往水引漁者苑藏仙溪春風不知從來落英何許流出石洞來入晨光盡開有良田名池竹果森列三十六洞别為一天耶今扁舟而行笑謝人世阡陌未改古人依然白雲何時而歸來青山一去而誰往諸公賦桃源以美之柳子厚送薛存義序河東薛存義將行柳子載肉於爼崇酒於觴追而送之江之滸飲食之且告曰凡吏於土者若知其職乎蓋民之役非以役民而已也凡民之食於土者出其十一傭乎吏使司平於我也今受其直怠其事者天下皆然豈唯怠之又從而盜之向使傭一夫於家受若直怠若事又盜若貨器則必甚怒而黜罰之矣以今天下多類此而民莫敢肆其怒與黜罰何哉勢不同也勢不同而理同如吾民何有達於理者得不恐而畏乎存義假令零陵二年矣蚤作而夜思勤力而勞心訟者平賦者均老弱撫懷詐暴不作其不虛取直也的矣其知恐而畏也審矣吾賤且辱不得與考績幽明之說於其往也故賞以酒肉而重之以辭馬子才送陳自然西上序朔風驚沙枯稍號寒子行亦良苦聞之京師曰米如買珠薪如束桂膏肉如玉酒樓如登天驟雨至矣黑潦滿道則馬如游龍清霜激風客衣無襦抱膝而苦調則火如紅金子之遊京師所以待此具者其挾幾何豈子之家位髙金子多父母兄弟渠渠欵欵厚撫以遺子乎曰無有也豈之鄰里鄉黨相悅以義出門辭東家而西家待贐矣寧有是乎曰無有也豈子之昵親狹友入室握手說無說有把酒相别飲酣氣張有解劒而指廩者乎見吳志魯肅𫝊曰無有也然則子之此逰挾何術而往曰吾視囊中不見乎有物視吾胸中耿耿者尚在也以吾之耿耿者遊天地間庶幾必有合乎豫聞其言而壯之曰今人適百里必宿舂而淅乃敢出門戶見莊子逍遙篇今子有數千里之役徒手以往浩然無憂豫因驚怪子矣果如子言豫來春於江南林石之下聞北方有熖熖者必子也夫歐陽修送徐無黨南歸序草木禽獸之為物衆人之為人其為生雖異而為死則同一歸於腐壞澌盡泯滅而已而衆人之中有聖賢者固亦生且死於其間而獨異於草木鳥獸衆人者雖死而不朽愈逺而彌存也其所以為聖賢者修之於身施之於事見之於言是三者所以能不朽而存也修於身者無所不獲施於事者有得有不得焉其見於言者則又有能有不能也施於事矣不見於言可也自詩書史記所傳其人豈必皆能言之士哉修於身矣而不施於事不見於言亦可也孔子弟子有能政事者矣有能言者矣若顔回者在陋巷曲肱饑餓而已其羣居則默然終日如愚人然自當時羣弟子皆推尊之以為不敢望而及而後世更百千嵗亦未有能及之者其不朽而存者固不待施於事况於言乎豫讀班固藝文志唐四庫書目見其所載自三代秦漢以來著書之士多者至百餘篇少者猶三四十篇其人不可勝數而散亡磨滅百不一二存焉豫切悲其人文章麗矣言語工矣無異草木榮華之飄風鳥獸好音之過耳也方其用心與力之勞亦何異衆人之汲汲營營而忽焉以死者雖有遲有速而卒與三者同歸於泯滅夫言之不可恃也蓋如此今之學者莫不慕古聖賢之不朽而勤一世以盡心於文字之間者皆可悲也東陽徐生少從豫學為文章稍稍見稱於人既去而與羣士試於禮部得髙第由是知名其文辭日進如水涌而山出豫欲摧其盛氣而勉其思也故於其歸告以是言然豫固亦喜為文辭者亦因以自警焉詩集追餞傾城逺丨送丨我千里道孫子荆征西詩開餞二天丨寵丨五馬爛生光杜祖帳六樂陳廣坐丨丨揚春風鮑明逺清歌鳴笛急吹催落日丨丨緩送感行人韓祖道衣冠列丨丨劉長卿連歌日色促歸人丨丨倒芳樽李白出苦語臨分丨丨丨願子書之笏坡到吾廬惟應故山夢隨子丨丨丨坡無故人渭城朝雨裛輕塵客舍青青桞色新勸君更盡一杯酒西出陽關丨丨丨王維陽關三疊獨歸人如何風雪裏更送丨丨丨坡南尋禹穴丨丨丨丨見李白道甫問訊今何如杜若見孟公丨丨丨丨投轄飲莫忘衝雪送君時坡早寄千詩南雁正北來丨丨丨首丨山谷莫愛一醉青燈白酒留故人丨丨丨丨至曉角山谷曉日都門丨丨丨丨揚斾旌晚風鐃吹入三城知公再為蒼生起不是尋常刺史行程伯淳送吕晦叔赴河陽今日都門二龍閒卧洛波清丨丨丨丨獨餞行願得賢人均出處始知深意在蒼生程伯淳送司馬君實古今合璧事類備要續集卷四十三
