body:
  text: 古今合璧事類備要前集卷三十二宋謝維新撰嗣續門誕子附誕女孽子雙生前身遺腹事類設弧射人以桑弧蓬矢六射天地四方又子生男子設弧于門左女子設帨于門右内則弄璋下莞上簟乃安斯寢乃寢乃興乃占我夢吉夢維何維熊維羆維虺維蛇大人占之維熊維羆男子之祥維虺維蛇女子之祥乃生男子載衣之裳載丨之丨乃生女子載寢之地載衣之裼載弄之瓦注半圭曰璋臣之職也瓦紡塼也斯干剪髮三月之末擇曰丨丨為鬌男角女羈是日也妻以子見於父姆先相曰母某敢用時日祇見孺子夫對曰欽有帥父執子之名手咳而名之内則生齒男子八月丨丨七嵗而齓家語彌月誕丨厥丨先生如達注誕大也又發語辭達羊子言易産也生民三年子生丨丨然後免於父母之懐論螽斯衆多言若丨丨不妬忌則子孫丨丨也螽斯羽宜爾子孫詵詵兮周南椒聊繁衍丨丨之實丨丨盈升椒聊且逺條且唐風芣苢有子丨丨婦人樂丨丨也采采芣苢薄言采之周南石榴多子元魏安徳王延宗納李祖收女為妃後帝幸李宅宴而妃母薦二石榴於帝前人莫知其意魏収曰丨丨房丨丨王新婚其母欲子孫衆多也帝大悦收傳剖胸生契修巳背拆而生禹簡秋胸剖而生契六帖踐跡生棄姜嫄丨巨人丨而孕丨子以為不祥棄于水上故名丨即后稷也尹生空桑伊尹母居伊水上既孕夢神人告曰日出水而東走明日視日出水告其隣東走十里而顧其邑盡為水身化為空桑有莘氏女採桑得嬰兒於桑中命曰伊尹獻其君令庖人養之是為湯相列女傳申降崧嶽嵩髙維嶽峻極于天維嶽降神生甫及申詩嵩髙乗鹿入胎老子丨白丨丨母丨既生廣顙大囙疎齒方口耳有三門鼻有雙柱足蹈五字手把十文商芸小説紱麟應瑞孔子生之夜有二蒼龍自天而下有二神女擎香霧於空中以沐徴在先是有五老列於庭則五星之精又有麟吐玉書於闕里人家云水精之子系襄周而素王故二龍遶室五星降庭㣲在以繡紱繫麟角及夫子将終抱麟解紱而泣拾遺記寤生驚母鄭武公娶于申曰武姜生莊公及共叔段莊公寤生驚姜氏因名寤生左傳生日同父魯子同生公曰是其生也與吾同物命之曰同注同日生也左桓公有文在手魯成季之生也丨丨丨其丨曰友遂以命之宋武公生仲子丨丨丨其丨曰為魯夫人故仲子歸于我邑姜方娠大叔夢帝謂己子名曰虞乃生丨丨丨丨曰虞遂以名之並左傳及堂聞聲叔向欲娶申公巫臣氏其母止之曰甚羙必有甚惡叔向懼不敢娶平公强使娶之生子伯石始生子容之母走謁諸姑曰長叔姒生男姑視之丨丨丨其丨而還曰豺狼之聲非是莫喪羊舌氏矣遂弗視昭二十八虎狀豺聲楚子良生子越椒子文子良之兄曰熊丨之丨而丨狼之丨弗殺必滅若敖矣子良不可子文以為大感及將死聚其族曰椒也知政乃速行矣旡及於難且泣曰鬼猶求食若敖氏之鬼不其餒而子文卒子越為司馬攻王王遂滅若敖氏宣四鳶肩牛腹叔魚生其母視之曰是子虎目豕喙丨丨而丨丨谿壑可盈是不可壓又叔向曰晉有羊舌鮒者叔魚之母弟瀆貨無厭亦將及矣夢天與蘭鄭文公有賤妾燕姞丨丨使丨已丨曰以是為而子以蘭有國香人服媚之如是既而文公與之蘭而御之曰妾幸而有子敢徴蘭乎夢虜脱衣索充丨丨丨上丨索紞曰虜字去上男也夷狄隂類也君婦當生男果然夢應長庚李白欲生其母夢長庚星遂生白本傳夢懐日精陶隠居初生母夢日精在懐二天人手執金香爐降雲笈經陶𢎞景母夢兩天人手執香爐來至其所已而有孕生𢎞景本傳夢鳳集身南史王曇逸母晝寢丨靈丨丨丨因有娠又聞腹中啼聲僧寶誌曰生子當為神仙宗伯雞跖集唐王知逺母晝寢丨丨丨丨因有娠本傳夢鳳集肩徐陵母臧氏丨五色雲化為丨丨左丨上已而誕陵焉時有寶誌上人者世稱有道年數嵗家人攜以候之寶誌摩其頂曰天上石麒麟也夢燕投懐張説母丨玉丨丨丨遂生說定命録夢鶴集庭張九齡丨九丨自天而下飛丨于丨遂生齡九齡家傳旗蓋墜天梁任昉母晝卧夢五綵旗蓋四角懸鈴自天而墜其一鈴落入懐中心悸因而有孕占曰必生才子遂生昉本傳印綬登樓魏張奐為武威太守妻方孕夢丨丨丨丨而歌奐占曰夫人生男復臨此郡必死官乎及生子猛後果然腸遶吳門孫堅母姙堅夢丨出丨丨昌丨寢而懼告隣母曰安知非吉證曰遂生堅吳紀注楓生腹上唐張志和母夢丨丨丨丨遂生志和本傳白鵠聳雲吳時張承家有丨丨丨丨占者曰鵠是延年之物從室入雲自卑升髙之象當使子孫位極人臣名擅江表若生子可以名曰鵠後承生昭至輔吳將軍王子年拾遺庭鳩集樹唐王廷湊始生有鳩數十朝丨庭丨暮宿簷户長駢脇歴居戎職值亂殺田洪正推為留後子孫相繼藩鎮一百年唐年補録匹練升天後漢虞升初生有物若丨丨上丨於丨占以為吉後至太尉神光照社後漢應嫗生四子見丨丨丨丨樞見光以問丨者曰此天符也子孫其興乎乃探得黄金自是諸子宦學有名至瑒七世通顯孝子傳銅盆墜星桓𤣥温之孽子母馬氏嘗與同輩夜坐於月見一流星墜銅盆中水忽如二寸火珠烱然明淨以飄接取馬氏得而吞之遂有孕生𤣥晉傳泗濵得石髙琳母嘗褉丨丨見一石光彩可愛遂持歸是夕夢人謂曰此浮磬之精若保之必生令子俄而有孕生琳北史藍田生玉諸葛恪少有名孫權見其父瑾曰丨丨丨丨真不虛也老蚌出珠後漢韋元將弟誕仲將孔融與其父書曰前日元將來淵才亮茂雅度𢎞毅世之器也昨日仲將來文敏篤誠保家之主也不意雙珠近出老蚌有孕生卵徐君宫人丨丨而丨丨弃於水濵有大􅀈頡銜卵歸其母母腹煖之遂生兒宫人聞之乃取為己子是為偃王産子并蛇竇武母丨丨丨産一丨戎婦生子蘇武留匈奴十九嵗年老子前坐事死宣子閔之問左右武在匈奴久豈有子乎武因平恩侯白前發匈奴時戎婦適産一子通國有聲問來願因使者致金帛贖之上許焉通國至上以為郎翁子無影陳留有富翁年九十娶田客女為妾一交接而死後生男大男謂其母曰我父年尊無復人道一宿斯須何因有子汝小家淫泆反欲惡我種類乎爭財數年州郡不决丞相丙吉思惟良久言曽聞真人旡影老丨丨亦丨丨又不耐寒可共試之時八月取同年小兒俱解裸之此兒獨啼言寒又並日中行後獨旡影人咸服風俗通五月誕生見端午類注及期不産北齊竇太母有娠期而不産大懼有巫云渡子河湔裙必易生因至水所忽一人云當生貴還家生秦北史子慰人心王渾妻鍾氏琰太𫝊繇曽孫博覽記籍美容止善嘯詠既適渾生子濟渾嘗與琰坐濟趍庭而過渾欣然曰生丨如此足丨丨丨琰笑曰若使新婦得配參軍生子故不翅如此參軍謂渾中弟淪也兒有英骨桓温生未期温嶠見之曰此丨丨丨丨可試使啼及聞其聲曰真英物也以其為嶠所賞故名之曰温本傳命字為塼范曄母如厠産曄額為塼所傷故以塼為小字取義充閭賈充始生父達曰後當充閭之慶故名充字公閭本傳名曰添丁盧仝生子丨丨丨丨欲為國持役也本傳字曰緇郎崔慎由鎮西川有異人曰君四十旡子為公求之終南翠微寺有僧絶粒五十年君遺以服玩受之則其嗣也果受之僧尋卒遂生子丨丨丨丨即崔微也南部新書生子美并五代和現晉宰相和凝之子現生㑹凝入翰林加金紫知貢舉凝喜曰我平生大事三者并集此子宜於我矣且名曰三美范蜀公蒙求生子分定范雲與梁武帝宿顧暠之舍暠妻方産有鬼在門曰此中有王有相雲起曰王當仰屬相以見歸南史魏舒微時嘗詣野王主人妻夜産俄聞車馬之聲相問曰男也女也曰男答云十五以兵死復問寢者為誰曰魏公舒後十五年詣主人問所生兒曰因條桑為斧傷而死魏自知當為公矣後果位至司徒禁人殺子賈彪為新息令人貧困多不養子彪嚴為至於殺人同罪賜民生子勾踐令有娩者以告公令醫守之生男壺酒一犬生女壺酒一豚生三人公與之乳母二人與之餼里中羊酒盧綰與漢髙祖同里廬親與太上皇相愛及生男同日丨丨持丨丨賀兩家漢書生日湯餅唐明皇王后恩寵日衰不自安一日訴曰三郎獨不記阿忠脱新半臂換一斗麫為生日湯餅耶上戚然閔之錯寫弄璋太常少卿姜度誕子李林甫手書慶之有曰聞有弄麞之喜客視之掩口職林深愧無勲晉元帝生子普賜羣臣殷羨謝曰臣無勲猥蒙頒賚帝笑曰此事豈可使卿有勲世説南唐時宫中嘗賜洗兒果有近臣謝表云猥蒙寵數深媿無功李主曰此事卿安得有功夢賜貴子竇禹鈞家甚豐年三十旡子夜夢亡祖亡父聚謂之曰汝早修行縁汝旡子又壽數不永禹鈞唯諾後十年復夢其祖父告之曰汝自數年以來名掛天曹隂府以汝有隂徳延算三紀賜五子各榮顯范文正公述夢賜玉童相國王公丙申嵗為譙幕值亡者數千户公奏乞貸種粒牛糧懇訴甚切朝廷可之一夕次驛舍夢中有人召公出拜見一人紫綬象簡如牧守之儀遣一緑衣緋童曰以汝有憂民之心上帝嘉之賜此童為宰相子授訖寤是夕夫人亦有祥兆而孕焉後果生一字慶之器格清粹談紫府間事祥符壬子嵗謂所親曰上元夫人命我為玉童只為吾父未受相印受則吾去矣不數日公果正拜及踰月慶之卒湘山野録武夷仙君楊大年初生母章氏夢羽人自言丨丨君託化既生乃一鶴雛盡室驚駭弃之江叔父曰吾聞間世之人其生必異追視之則鶴蜕而嬰兒具焉體尚有毳經月乃落詩序懷玉山人楊大年父文逸為唐玉山令大年將生一道士袖刺來謁自稱丨丨丨丨冠褐秀爽斯須遽失公遂生後三十七為學士晝寢于玉堂忽夢道士來謁稱丨丨丨丨故出一牒閲之寫三十七字大年驚曰得非數乎許添乎道士命筆一㸃為四十一字至其數果卒王壺清話道士弈棊李泰伯母初無子祈禱無所不至祥符二年夢二丨丨丨丨户外往觀之其一人取局之一子授焉遂孕生泰伯道士贈龜梅聖俞生男前一日夢丨丨丨丨一枚詳見詩集黄鶴樓光王欽若父仲華侍祖郁任官鄂渚欽若母有孕值江水暴溢亟遷丨丨丨始免身生公時隔岸漢陽居人望樓上若有丨景青箱記慈烏庭集邵康節母李氏其姑張氏遇之甚嚴一夕欲自盡夢神人令以玉筯食羮一盃告曰旡自盡當生佳兒後李夫人因山行於雲霞間見大黑猿有感遂孕臨蓐時丨丨滿丨人以為瑞是生康節七嵗戲於庭蟻穴中别見天日雲氣往來也本傳有貛入室富獻簡公曰王荆公之生也丨丨丨其丨俄失所在故小名貛郎大蛇壓帳崇寧中大將劉法欲生其母幃帳忽墮壓而下視之一丨丨蜿蜒母怖甚避之他所法生再視之但見蛇蜕耳其後法為將有賢稱帥熙河童貫俾用老弱策應遂䧟邵氏録誕女設佩巾女子生丨帨於門右帨丨丨也禮作門楣唐楊貴妃寵幸時有謡曰男不封侯女作妃君㸔女却丨丨丨楊妃外傳翠雞飛下西子母浣帛於溪有明珠射體感而孕又夢有丨丨五色自空丨丨久而化為鶚飛去翰府名談雌鶴飛來歐陽公在夷陵目遊姜嫄廟潛禱續嗣家人夢一鶴飛來自云是丨丨果得女八嵗忽驚魘曰夢一鶴丨去數日卒聞見録雙生後生居上古人尚質雙生以丨丨者丨丨取以為兄公羊傳孿子相似丨丨之丨丨唯其母知之孿雙生也戰國策一臣一妾晉惠公之在梁也梁伯妻之梁嬴孕過期十云將生一男一女男為人臣女為人妾故名男曰圉名女曰妾僖十七一弟一兄霍將軍妻産二子疑所為兄弟或曰前生為兄後生為弟或曰居上者宜為兄居下者宜為弟居下前生今宜以前生為弟時霍光聞之曰昔殷王祖甲一産二子曰囂曰良以卯生囂以巳生良則以囂為兄以良為弟並以前生者為長霍氏亦以前生為兄焉西京雜記三左三右陸終娶鬼方國君之妹謂之女嬪孕而不育三年啟其母左脅三人出右脅三人出帝系遺腹存趙孤兒趙朔為屠岸賈攻滅朔有遺腹子朔夫人置兒袴中得脱朔客公孫杵臼程嬰二人謀取嬰兒負之以文褓匿山中嬰謬謂諸將曰吾知趙氏孤處諸將發兵隨之公孫杵臼謬呼曰趙氏孤兒何罪請活之諸將殺杵臼與孤兒然趙氏真孤乃反在程嬰為匿十五年因韓厥復立之是為趙武程嬰自殺曰我將下報宣孟與公孫杵臼武為服齊衰三年為之祭邑史記有祖風烈李廣子當户早卒有遺腹生子陵有廣之風烈立為嗣王漢泗水王戴前薨旡嗣國除後宫有遺腹子煖相内史不奏言上聞而憐之立煖為泗水王相内史皆下獄名曰小同鄭𤣥子為孔融吏舉孝亷融被圍往赴難被賊害有遺腹子以丁卯日生𤣥以丁卯嵗生故丨丨丨丨繼父不容杜祁公衍越州人父早卒遺腹生公前母有二子不孝其母改適河南錢氏公年十五六其二兄以為其母匿私財以適人就公索之不得引劍斫之傷腦走投其姑姑匿其重橑上出血數升僅而得免乃詣河南歸其母丨丨丨之丨往來孟洛間貧甚傭書以自資東軒筆録叔父收養范忠文公鎮兄鎡卒于隴城旡子聞其有遺腹子在外公時未仕徒步求之兩蜀間二年乃得之曰吾兄異於人體有四乳是兒亦未然驗之果然名之曰百常春誌銘闕子事類並見前庶母類前身探取金環羊祜年五嵗令乳母取所弄金環乳母曰汝先旡此物祜即詣隣人李氏東垣桑木中探得之主人驚曰此吾亡兒所失物也去可持去乳母具言之知李氏子則祜前身也索取香囊後蜀文澹生五嵗謂母曰有五色香囊在杏林中往取得之乃澹前生五嵗失足落井今再生也記弄刀時向靖有女數嵗而亡始病時弄小刀子母奪取不與傷母手後又産一女年四嵗曰前時刀子何在母曰旡也女曰昔爭刀子故傷母手云何旡也靖覔數刀合置一處令女自識女見大喜即取先者𡨕祥記言墮井事晉鮑靜字太原年五嵗語父母云本是李家兒九嵗墮井而死父母訪之皆驗彌勒後身御史郭𢎞霸稱武后乃丨丨佛丨丨張仁愿傳沙門前身中書令王珉有一胡沙門瞻珉風采曰使我後生得為此人作子願亦足矣後珉生一子始能言便解外國語及絶國硃貝生所未見即識其名咸謂丨丨丨丨洞冥記永師前身唐房琯為盧氏宰與道士邢和璞出遊過夏口村入發寺坐古松下和璞使人鑿地得甕中所藏劉師徳與丨禪丨書謂琯曰頗憶此耶因悵然悟丨丨之為永禪師也東坡詩序張衡後身後漢張衡死日蔡邕母始懐孕二人才貌甚相類人云邕是丨丨丨丨商芸小説靈運來謁江南邊鎬初生父忽夢前永嘉守謝丨丨丨丨願託君為父子鎬生貌類夢中者小字康樂及冠頴秀嗣主累甲之平建州克湘潭號為邊羅漢玉壺清話僧孺來見劉沆曽祖景洪事楊行宻為江西牙將有彭盱者稱太守脅景洪附湖南偽許之復以歸行宻遂不仕初景洪曰我不從彭盱當活萬餘人後必隆因名所居山曰復隆山山有牛僧孺讀書堂沆母夢牛相公來而生沆鄧禹復生范祖禹母夢一丈夫被金甲至寢曰吾故漢將丨丨也祖禹是日生公遂以名初字夢得温公以傳稱鄧禹篤行淳備改字淳夫家傳太白現夢郭祥正母夢李丨丨而生祥正少有詩名梅堯臣曰天才如此真太白後身也詩集麟兒君不見徐卿二子生絶竒感應吉夢相追隨孔子釋氏親抱送盡是天上麒丨丨大兒九齡色清徹秋水為神玉為骨小兒五嵗氣食牛滿堂賓客皆回頭吾知徐公百不憂積善衮衮生公侯丈夫生兒有如此二雛者名位豈肯卑微休杜甫徐卿二子歌驥子骨秀已知麒丨丨性仁端坐鳳凰雛不騰渥水稱神俊應出岐山作瑞符漸指家人知姓氏試㸔屏上識之無乃翁㫁獄多隂徳徑作髙門待汝車黄魯直賀叔父㓜子睟日添丁行年已合識頭顱舊學屠龍意轉疎有子丨丨助征戍肯令辛苦更冠儒朱喬年洗兒舉子丨丨三朝夀一壺百年歌笑好掀鬚厭兵已識天公意不忍回頭更指渠同上生珠舊聞老蚌丨明丨未省老兎生於莵老兎自謂月中物不騎快馬騎蟾蜍蟾蜍爬沙不肯行坐令清衫垂白鬚於莵駿猛不類渠指揮黄熊駕黑貙丹沙紫麝不用塗眼光百步走妖狐妖狐莫誇智有余不勞搖牙咀爾徒東坡賀子由生子子由卯生其子名虎兒峙玉今日散幽憂彈冠及新沐况聞萬里孫已報三日浴朋來四男子大壯泰臨復開書喜見面未飲春生腹無官一身輕有子萬事足舉家傳好夢殊相驚凡目爛爛開眼電磽磽丨頭丨但今强筋骨可以耕衍沃不湏富文章端解耗紙竹君歸定何日我計久已熟長留五車書要使九子讀簞瓢有内樂軒冕無流矚人言迨似我窮達已可十早謀二頃田莫待八州督蘇子瞻賀子由生第四孫我有長頭兒角頰丨犀丨四嵗不知行抱負煩背腹師來為摩頂起走趂奔鹿蘇子瞻東坡中子生四嵗不能行請辨材禪師為落髮摩頂祝之不數日能行東坡集頭玉嶢嶢眉刷翠骨重神寒天廟器一雙瞳子剪秋水竹馬梢梢搖翠尾李賀望聰明人皆養子丨丨丨我被聰明誤一生惟願孩兒愚且魯無災無難到公卿蘇子瞻洗兒係賢愚我今行年四十五生男方始為人父鞠育教誨誠在我夀天賢愚係於汝我若夀年七十嵗眼前見汝二十五我欲願汝成大賢未必天意肯從否邵堯夫子秀眉夜夢有人衣帔􅀈水邊授我黄龜兒明朝我婦忽在蓐乃生男丨實丨丨梅聖俞詩龜事見前兒豐角未得豐盈犀角兒先逢玉雪王郎子蘇子瞻眼中犀角真吾子身後牛衣愧老妻同上鄭語云史伯言幽王惡犀角豐盈而近頑童窮困賀客湯餅鬱葱佳氣夜充閭始見徐卿第二雛剰欲去為湯餅客惟愁錯寫弄麞書參軍新婦賢相敵阿大中郎喜有餘我亦從來識英物試教啼㸔定何如蘇子瞻賀述古弟憶食湯餅日余為坐上賔舉筯食湯餅祝辭天麒麟劉禹錫利市錢果犀錢玉果利市平分霑四座自愧旡功此亊如何得到儂東坡賀洗兒前身金粟如來湖州司馬問李白是何人白以詩答曰青蓮居士謫仙人江肆藏名四十春湖州司馬如相問丨丨丨丨是後身白詩玉源道君劉沆赴舉有老人贈一聮云今年且跨窮驢去異日當乗寶馬歸公曰何以知之叟曰公自是羅浮山丨丨丨丨公愧謝而去青𤨏金闕侍郎待制王素常夢至玉京黄闕殿上有紺服翠冠者曰吾東門侍郎公則西門侍郎昔以奏牘語訏責于世公夢回題詩曰似去華胥國裏來雲霞深處見樓臺月明泠落雞牕急驚覺浮仙夢一回晚嵗復思王京之夢詩曰虚碧中藏白玉京夢魂飛入鳳凰城何時再步雲霞外皓齒青童已掃􅈦古今詩話玉華侍郎莆田方朝散政和中為歙縣宰病熱蹷三日而蘇厯言所見聞天樂聲冇女童迎至一城樓閣明煥金字書其門曰大華之宫正中殿設榻使就坐俄有道士直前再拜曰碧落㓊玉華宫莫真君敬問先生云先生昔有隂功帝召見白玉樓試文一首帝覽之大喜拜為丨丨丨丨有過下遷羣玉外監與侍女宋道華泛舟有人間夫婦之想責墮人世生閩中莫真君乃代先生為侍郎者夷堅志李白後身梅聖俞贈郭功甫詩以為丨丨丨丨云在昔孰識汾陽王納官貰死義難忘今觀郭氏竒俊郎眉目真似攻文章死生往復猶康莊樹穴探環知姓羊苕溪漁話樂天後身白樂天晚極喜李義山詩文嘗謂我死得為爾子足矣義山生子遂以白老字之既長畧旡文性温庭筠嘗戯之云以爾為丨丨丨丨不亦忝乎然義山有衮師我嬌兒美秀乃旡匹之譽何也蔡寛夫云亡兒再生顧况字逋翁暮年一子即非熊前身也非熊暴亡况追悼哀切乃吟曰老人喪愛子日暮泣成血老人年七十不作多時别非熊在冥間聞之以情告𡨕官皆憫之却令生况家三嵗能言𡨕間父苦吟之事無子附喪子立嗣遺孤祈嗣事類不孝丨丨有三後為大孟離婁無告老而無子曰獨天下之窮民而丨丨者梁惠下後當有人商瞿年老無子其母為取室孔子曰無憂瞿年四十後當有五丈夫已而果然家語子自晚生梁鱣年三十未有子欲出其妻商瞿曰吾恐丨丨丨丨耳未必妻之過從之二年而有子並家語老而無子楚靈王聞羣公子之死自投於車下曰人之愛其子亦如子乎侍者曰甚焉小人丨丨丨丨知擠于溝壑矣絳縣人丨丨丨左傳丨預於城杞之食辱在泥塗趙孟謝之善而無後王思子文之治楚國也曰子文無後何以勸善使復其所改命曰生宣四成季之勲宣孟之忠而旡後為善者懼矣成八無男有女齊太倉令淳于公無子有女五人有罪當行罵曰生女不生男緩急非益其幼女緹縈自傷泣上書願没入為官婢以贖父罪書奏文帝憐之除肉刑無子依人樓䕶字君卿故人吕公無子歸䕶䕶養之終身饋妾不受後漢祭遵為征戎將軍同産兄于以遵無子取妾以送遵不受曰自以身任於國不敢慮繼嗣之計出妻改娶陵穆子娶妻五年無子父母欲其改娶其妻聞之中夜悲嘯陵穆子感之而作别鶴操韓文仲宣無後魏王粲死後二子犯法誅絶後時太祖在漢中聞粲子死歎曰孤若在彼不使丨丨丨丨三國志伯道無兒鄧攸字伯道後石勒過泗水攸以牛馬負妻子而逃遇賊掠其牛馬步走擔其兒及弟子綏度不能兩全乃謂其妻曰吾弟早亡唯有一息理不可絶但當自絶我兒耳幸而得存我後當有子妻泣而從之乃棄之其子朝棄而暮及明日攸繫之於樹而去後妻不復孕過江納妾甚寵之訊其家屬説是遭亂憶父母姓名乃攸之甥攸素有徳行聞之感恨遂不復畜妾卒以無嗣時人哀之為之語天道無知使鄧丨丨丨丨贊曰攸棄子存姪以義㫁恩若力所不能自可割情忍痛何至預加徽纆絶其奔走者乎斯豈慈父仁人之用心也卒以絶嗣宜哉勿謂天道無知乃有知矣喪子子死不憂魏人有東門吳者年四十有一子喪之而不憂其相室曰公之愛子也天下旡有今丨丨丨丨何也東門吳曰吾嘗旡子之時不憂今子死乃與向日旡子同吾何憂焉列子子溺不葬澹臺滅明之子溺死於江弟子欲收而葬之明止之曰螻蟻何親魚鼈何仇弟子曰何夫子之不慈乎對曰生為吾子死非吾鬼遂不收葬博物志葬於嬴博延陵季子適齊其長子死丨丨丨丨之間還封且號者三曰骨肉復于土命也夫瘞于路側天赤子於新安坎路側而瘞之亭有千秋之號子旡七旬之期雖勉勵於延吳實潛慟於予慈注岳子以三月壬寅五月甲辰天六十餘日也潘岳西征賦喪明之戚子夏喪其子而丨其丨曽子弔而怒之曰喪爾子而喪其明爾罪三也子夏投其杖而拜之曰吾過矣䑛犢之愛後漢王彪位至太尉見漢祚將終稱腳攣不復行積十年後子修為曹操所殺操見彪問曰公何瘦之甚答曰悔旡日磾先見之明猶懐老牛丨丨丨丨操為之改容我輩鍾情王衍嘗喪幼子山簡弔之衍悲不自勝簡曰孩抱中物何至於此衍曰聖人忘情最下不及情然則情之所鍾正在我輩簡服其言更為之慟天下痛心王愆期謂陶侃曰賢子越騎酷没丨丨為公丨丨况慈父乎世説囑令出書郄超字嘉賓將亡出其所與桓温宻謀之書一篋囑其門生曰若家君眠食大減即出此書方回見之曰是子死已晩矣乃不復念不忍開篋王導還臺其子悦未嘗不送又為襞斂箱篋中物悦亡導還臺至常送處哭至臺其母封篋丨丨丨之一人來見王導子悦為中書郎先導卒導先夢人以百萬錢買悦潛為祈禱者備矣尋掘地得錢百萬意甚惡之一一皆藏閉及悦疾篤導憂念特至不食積日忽見一人形狀甚偉被甲持刀導問是何人曰僕蔣侯也公兒不佳欲為請命故來耳導因與之食食至數斗食畢謂導曰中書命盡非可救也言訖不見悦亦殞絶二子同亡王祥丨丨烈芳丨時而丨將死烈欲還葬舊土芳欲留葬京邑祥流涕曰不忘故鄉人也不戀本土達也二子俱有焉不及莊生晉魏舒子混元卒舒每哀慟退而歎曰丨丨丨丨逺矣豈以旡益自損歎無延陵豫章太守顧邵雍之子也在郡卒雍時盛集賓客自與客棊而讀至旡兒書雖神色不變而心了其故以爪搯掌流血沾襟客散方丨已丨丨丨之髙豈有喪明之痛世説遺孤負薪於楚孫叔敖死旡立錐之地其子丨丨丨丨牧豕於澤陳祐年二十而孤家貧丨丨丨長垣丨中其父之友謂曰子二千石子而牧豕縱子旡恥柰何先君抱啼于朝穆嬴日丨太子丨丨丨出朝則抱以適趙氏頓首於宣子曰先君奉此子也而屬諸子曰此子也才吾受子之賜不才吾唯子之怨今君雖終言猶在耳而棄之若何左文公收養於宫吳凌統卒二子皆孫權丨丨丨丨中愛遇與諸子同賓客進見呼之曰此吾虎子八嵗令讀書十日一令乗馬及長追録統功封亭侯還其故兵張禹有託安昌侯丨丨疾病罷侯帝車駕親臨令幼子拜於床下稽紹不孤丨康臨刑謂子丨曰山公在汝丨丨晉史立嗣移根以繼移根繼絶六帖式糓爾似螟蛉有子果臝負之教誨爾子式糓似之詩恭繼黯後後漢伏恭字叔髙湛之兄子湛弟黯字雉文位至光禄旡子以恭為嗣喬為亮嗣蜀諸葛喬字伯松瑾第三子本字冲真亮未有子求喬為後瑾啟吳王而遣之以為嫡故改其字喬子舉亮後自有子舉還復為瑾後少繼叔父宋謝𢎞微本名宻年十嵗出繼從叔父峻長還本生晉皇甫謐字士安漢太尉嵩之曽孫出繼叔父徙居新安謐年四十叔父有子謐喪本生遂還其父兄子為後唐戴胃旡子以丨丨丨丨杜正倫旡子以丨丨志靜丨丨姪孫為後白樂天旡子以丨丨阿新丨之丨墓誌外孫奉後詔以丨丨韓謐丨賈充丨曰外孫骨肉至近推恩繼情合於人心也以甥為嗣司空圖旡人丨丨丨丨嘗為御史所劾昭宗不責也祈嗣祠于郊禖時維姜嫄克禋克祀以弗旡子履帝武敏歆載生載育時維后稷箋云祀郊禖之時有天神之迹姜嫄履之足不能滿拇指之處心體歆歆然於是生子曰棄詩生民禱于尼山叔梁紇娶顔氏女徵在少而旡子丨丨丨丨生孔子頂象尼丘因名焉家語祈于龍門劉元海父劉豹妻丨子丨丨丨有大魚二角躍麟而出其夜夢所見魚變為人把一物授其妻曰此是日精服之生貴子自是十三月生元海載記祈西門祠符堅母荀氏丨子於丨丨豹丨其夜夢與神交有孕生堅有神光自天燭其庭背有赤文隠起成字曰草符臣載記及符堅傳禱軋犖山安禄山母丨子于丨丨丨狄所謂戰鬬神者既而姙及生有光照穹廬野獸盡鳴望氣者言其祥范陽節度張仁愿遣搜欲殺之匿而免母以神所命遂字軋犖隨母嫁狄將安延偃遂冐姓安歸國更名禄山遂亂天下本傳詩集仙菓遲莫嗟華髮與無兒却是人間久逺期雪裏髙山頭白早海中丨丨子生丨于公必有髙門慶謝守何煩曉鏡悲幸免如新分非淺祝君長詠夢熊詩劉禹錫贈白蘇州瓊樹折吟君苦調我霑纓能使無情盡有情四望車中心未釋千秋亭下賦初成庭梧已有雛棲處池鶴今旡子和聲從此期君比丨丨一枝吹丨一枝生劉禹錫吟白居易哭崔兒詩淚先垂書報微之晦叔知欲題崔字丨丨丨文章十帙官三品身後傳誰庇䕃誰白居易喪子崔兒泣成血老人喪愛子日夜丨丨丨老人年七十不作多時别顧况啄母腦鴟梟丨丨丨母死子始蕃蝮蛇生子時坼裂腸與肝好子雖云好未還恩與勤惡子不可説鴟梟蝮蛇然有子且勿喜旡子固勿嘆東野連産三子不數日數失之㡬老念無後以悲友人韓愈推天假其命以喻之割老腸我淚猶可拭日逺當日忘母哭不可聞欲與汝俱亡故衣尚懸架漲乳已流床仍將恩愛刃丨此衰丨丨蘇子瞻古今合璧事類備要前集卷三十二
