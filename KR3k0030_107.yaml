body:
  text: 古今合璧事類備要後集卷三十八宋謝維新撰三監門軍器監少監監簿監丞歷代㳂革後周武帝四年初置軍器監隋百官志隋少府監統鎧甲弓弩等局唐武德初有武器監一人正四品上掌繕甲弩以時輸武庫揔四署二一曰弩坊二曰甲坊少監一人掌兵仗厩牧七年廢軍器監八年復九年又廢開元以前軍器各𨽻少府右尚署三年分少府甲鎧弓弩置軍器監十一年廢唐百官志職林十六年復移向北都監掌繕造甲弩之屬辨其名物審其制度以時納於武庫少監為之二六典又國朝軍器領於三司胄案官無專職熙寧六年廢胄案乃按唐令置監擇侍從官總判增勾當以為之屬元豐中復正官名分案五設吏十有三總局五掌繕治兵械什物之事續㑹要凡製器以法式授衆工其弓矢干戈甲胄諸戰守之具則因其能而分任之量用給財旬㑹其數以考其課程而輸於受藏之府若知規創裁制工作之利者聽其自言以類參驗令殿前馬步司覆按可否以聞建炎三年併歸工部紹興十一年復置長二一員中興㑹要事類武庫見上㳂革注兵仗注同上欄錡唐張鷟云丨丨分司武庫是藏兵之處注受兵曰丨受甲曰丨戎械繕治丨丨訓工程作之任置監典領禮秩甚隆南豐擬制羽衛森森丨丨鶴膝皎而含霜注鶴膝矛也唐張鷟集旌麾凜凜丨丨犀渠光而奪日同上九石弓齊宣王用丨丨丨百辟刀魏武帝作丨丨丨彊弩神刀唐張鷟集萬人丨丨動黃間而連機百辟丨丨輝丹霞而吐鍔機弩牙也西京賦云黃間機張屬甲石弓三丨之丨自合堅牢九丨之丨固宜良徑同上邊備修舉唐韋湊遷太原尹兼北都軍器監丨丨丨丨本𫝊武備精巧神考稽古創法留神丨丨器械丨丨朕承先志申嚴制作惟是邦之戎器藏于武庫尓典監事俾長厥屬初寮鄧之綱制武庫工程至治之世安不忘危丨丨甲兵之備豈易忽也訓丨丨作置監統之曲阜李士京制軍器制度熙寧三年置軍器監以兩制二人領焉遣著作佐郎朱伯虎等齎精利丨丨付逐州為式製造六年以吕惠卿曾孝寬充判監丨丨皆著為式淡然無求陳魯公康伯諡文正為軍器監康伯與秦檜有舊及在朝路丨丨丨丨檜稱其靖重焉中興系年録益知上眷蕭正蕭燧權司封進擬軍器監玉音以為允諸公丨丨丨丨周益公集添修弓弩式神宗留意於軍器設監命侍臣董之講究精緻卒著為式合一百二十卷辨材一卷軍器七十四卷什物二十一卷雜物四卷丨丨及造丨丨丨一十卷塵史獻製剋敵弓韓世忠丨丨丨丨丨詔工部下軍器監選良工製之言行録軍器少監歷代㳂革唐武德少監一人専令掌繕造甲弩之屬少監為之二事類少事武備精鋭之器置監揔之輟尓郎曹往服丨丨曲阜韓歧制二職在昔熙豐留神武備器械增巧規模具存朕親選才良典領監事爾丨厥丨其既乃心初寮除趙士實制軍器監丞歷代㳂革唐武德初武器監置丞二人正觀六年廢武器監開元三年置軍器監丞掌判監事凡材掌出納之類工徒衆寡之役皆督課焉唐百官志又國朝神宗時置丞二人初除沈叔通職略建炎三年省紹興三年復置中興㑹要事類丞二至治之世安不忘危武庫甲兵之備豈易忽也訓工程作置監董之而丨為之丨曲阜除季士卿制參釐朕因時治安申嚴武備丨丨監事罔非遴選初寮除葉勸制軍器監簿歷代㳂革唐武德初武器監置主簿一人正觀六年廢武器監開元三年置軍器監有主簿掌印及勾檢稽失唐百官志六典又國朝神宗時置主簿一人初除錢長卿職略建炎三年併歸工部紹興三年復置中興㑹要事類勾稽見㳂革注列屬朕親定規模俾除戎器丨於監丨尤在得人初寮除張鎮制將作監少監監簿監丞歷代㳂革秦有將作少府掌治宫室漢因之景帝更為將作大匠秩二千石中六年改光武省常以謁者兼之章帝建初元年又置初以任隗為之掌修作宗廟路寢宫室陵園土木之功魏晉因之江左至宋齊皆有事則置無事則省梁天監七年置十二卿改將作大匠為大匠卿是為秋卿陳因之後魏亦有之北齊有將作寺其官曰大匠後周有匠師中大夫掌城郭宫室之制又有司木中大夫掌木工之政令隋與北齊同至開皇二十年改寺為監大匠為大監初加置副監煬帝十三年改為大令唐復為匠龍朔二年改為繕工監咸亨元年復光宅改為營繕監神龍復天寶十一載改大匠為大監少匠曰少監監一人少監二人掌土木工匠之政六典通典唐職林揔左校右校中校甄官等署百丁等監大明畏廢上陽宫中書門下六軍仗舍間廄謂之內作郊廟城門省寺臺監十六衛東宫王府諸廨謂之外作自十月距二月休治功自冬至距九月休土功北治宫廟太常擇日以聞百官志又國朝判監事一人以朝官以上充凡土木工匠之政𨽻三司修造案本監但掌祠祀供省牲碑鎮石炷香盥手焚版幣之事續㑹要熙寧初以嘉慶院為監上重其任使統修造之政㑹要四年以范子竒判監向宗儒同判元豐乃正名焉職略掌土木工匠之事凡出納籍帳嵗受而㑹之上工部分案五設吏二十有七總局九宫城繕完則歸修內司辨其工作因能任事則歸東西八作司乘時儲積以待給用則歸竹木務窑務丹粉所麥􅀈場前期朴斫以應緩急則歸事務場斂其餘材無所遺棄則歸退材場續㑹要中興以來將作少府未置監建炎三年始併歸工部紹興三年復置將作監少府事總焉中興㑹要事類共工垂汝丨丨書舜典飭化太宰以九職任萬民五曰百工丨丨八材周禮用省漢英仲華為大匠度丨丨費六帖躬親後漢陳伯直為將作大匠桓帝崩營陵寢皆丨丨作工為士卒先同上推賢李固遷大匠常丨丨貢士續漢書相地姜師度為將作大匠師度喜渠漕所至徭役不便然所就必為後世利時太史令博孝忠以知星顯時語曰孝忠知仰天師度知丨丨大匠漢以監為丨丨白帖將作曰丨丨鄭氏談綺繕監見前㳂革注吏稱職技工巧匠自元成間鮮能及之亦足以知丨丨其丨民安其業也前漢宣帝紀工無虛鄧豹遷大匠丨丨丨張之繕徒無飢寒之色經宫室開閉將作丨搆丨丨墻以禦風宇以蔽日寒暑攸除鳥鼠攸去主有宫殿民有宅居前漢楊雄將作大匠針除藻飾應大匠發擲佞伏丨丨丨之無用浮費所省息十億餘萬汝南先賢𫝊省宫人楊阜字義山為將作大監明帝時治宫室發美女充後庭阜上疏欲丨丨丨諸不見幸者乃召御府吏問後宫人數吏守舊令對曰禁密不得宣露阜怒杖吏一百數之曰國家不與九卿為密乎帝聞愈敬憚魏志讓輔臣尹思貞為將作大匠僕射竇懷貞獲作金仙玉真觀廣調工匠思貞數有損節懷貞丨之答曰公丨丨也不能宣贊正化而土木是興今不可事公矣乃拂衣去秩二千石馬延年為將作大匠成帝以勤苦賜丨中丨丨丨前漢書受一大錢劉寵自㑹稽太守徴為將作大匠有老叟五六人人持一百錢送寵寵闕為選丨丨丨受之後漢書諸苑蘌以幹力稱多所賚賞淤幸無不從魏證恐寢起丨丨勸帝斥之唐史麗漸楊務廉為少監以工巧進宰相袁恕已恐啓游娛侈丨之丨言於中宗曰務廉忠言嘉謨不聞而專營下以媚上不斥之無以昭德同上掌工匠監一員少監二人丨土木丨丨之事唐百官志總尚方丨丨丨工巧之物置監揔之輟爾郎曹往服少事曲阜除韓純彥制來二繕工丨丨丨丨初寮除侯益制實司營繕少匠之職丨丨丨丨初寮除賈諲制將作監丞歷代㳂革漢將作有丞二人後漢一人魏晉因之東晉宋齊有事則置無事則罷梁天監七年置大匠丞一人陳因之隋將作丞三人唐四人六典掌判監事凡內外繕造百司供給大事則聽制敕小事則俟省符以咨大臣而下於置監以供其職同上國朝熙寧四年以灾靖國知將作監丞續㑹要元豐正名初除吳處厚職略事類姑試汝能大匠之屬丨丨丨丨曲阜除余中制察其不阿李大有除監丞營繕不奢忤用事者意奪一官上丨丨丨丨詔勿奪西北用兵朝廷置司講議以漁利詔天下計稅輸免夫錢公極言不可胡淡庵集薦對改官本朝翁挺字士特有詩名靖康中何文縝丨丨丨丨除少府監丞將作監簿歷代㳂革晉將作置主簿員江左有事則置無事則省梁天監七年復置將作主簿隋二人唐因之掌印勾檢稽失六典國朝熙寧四年初以殿中丞楊增將作主簿公事續㑹要元豐正名初除孫覺職略事類掌印唐六典將作監主簿丨丨勾檢稽失官吏之申請糧料俸食差遣假使必由之諸司之應供四署三監之財物器用違闕隨而舉焉升聨丨丨匠序公是行楊中正制匠屬往祇丨丨胡文恭行將作監簿制匠員試秩丨丨同上行監簿制勾匠稽祕丨丨丨胡文恭行張繼制稽匠屬俾勾丨於丨丨同上行吳承規制匠屬之稽勾丨丨丨丨同上行裴士傑制匠簿是升丨丨丨丨同上行祁咸亨制古今合璧事類備要後集卷三十八
