body:
  text: 古今合璧事類備要續集卷二十九宋謝維新撰類姓門危汝南商音古今姓纂闕事類闕遲太原徵音古今姓纂殷賢人遲任有言曰人惟求舊器非求舊惟新晉有遲昭事類闕商汝南宫音古今姓纂殷或號曰商以國為氏魯有商瞿字子木仲尼弟子孔子傳易於瞿秦有衛鞅本衛公子也受封於商子孫氏焉事類闕歸京兆徵音古今姓纂春秋晉有歸生婦人也子孫因之以為姓事類多識容典唐歸崇敬字正禮蘇州吳縣人治禮家學丨丨丨丨擢明經天寶中舉博通墳典科對䇿第一有詔舉才可宰百里者復策髙等授左拾遺使傳清德大厯初充弔祭册立新羅丨囊橐惟衾衣東夷丨其丨丨同上竄名雷霆歸登字沖之裴延齡得幸德宗欲遂以相右補闕熊執易疏論之以示登登曰願丨吾丨丨丨之下君難獨處故同列有所諫正輒署無所回避獻龍樓針歸登為皇太子諸王侍讀丨丨丨丨以諷鹿扶風徴音古今姓纂趙大夫食采五鹿因氏焉漢有巴郡太守鹿旗子孫因家巴事類賜馬加服北史鹿悆字永吉父生再為濟南太守有政績獻文嘉其能特徵赴季秋馬射丨以驄丨丨以青丨彰其廉潔布衣糲食鹿悆好兵書隂陽釋氏學後為黃門侍郎雖任通顯志在謙退丨丨丨丨孝莊嘉其清潔時復賜以錢帛晉平陽徵音古今姓纂周武王第三子叔虞封唐唐有晉水因改為晉傳二十代子孫以國為姓魏有晉鄙事類武穆左富辰曰昔周公封建親戚邘晉應韓丨之丨也續鴈門羽音古今姓纂晉大夫狐鞠居又姓續氏是為續簡伯事類闕隨與隋姓同河內羽音古今姓纂周同姓國也又杜伯曽孫晉大夫食采於隨亦曰隨會漢有博士隨何又有右扶風隨蕃事類闕敬平陽商音古今姓纂陳厲公子敬仲之後以諡為姓姓苑云黃帝孫少康之後秦有敬丕子教為平陽太守子孫因家平陽又本朝避廟諱凡從茍姓或從文姓皆敬姓之分也事類誅二張封王唐敬暉字仲曄絳州平陽人以丨丨丨功丨平陽郡王掇要治漢書敬播蒲州人房玄齡稱陳壽之流玄齡患漢書文繁令丨其丨為四十篇當時丨丨丨者非其授以為無法云祭側界反太康徵音古今姓纂左周公之支子祭伯子孫以國為氏鄭大夫祭仲字仲足始為祭封人因以為氏事類周公之胤左凡蔣邢茅胙祭丨丨丨丨也雅歌投壺後祭遵字弟孫潁川人對酒設樂必丨丨丨丨在軍旅不忘俎豆縣課第一祭彤字次孫為偃師長丨無盜賊丨為丨丨臨守偏海政移獷俗至卧鼓邊亭滅烽幽障者將三十年貟音運平涼宫音古今姓纂前涼巨有安夷人貟平金城人貟敞大夏人貟倉貟景唐吏部郎中貟嘉靜華隂人蓋其後也又平涼水部員外郎貟半干狀云本姓劉氏彭城輿里人宋宗室營陵侯劉遵考子起部郎中凝之後宋之禪因留北魏太武以忠諫比伍貟改姓貟氏賜名懷逺官至荆州刺史懷逺六代孫半千唐右諭德陜州刺史自隋末又居臨汾事類五百嵗賢唐貟半千字榮期齊州人羈丱通書史舉童子對詔髙第能講易老子長事王義方以邁秀見賞義方常曰丨丨丨一丨者生子宜當之因改今名凡舉八科皆中有清白節半千不專任吏常以文雅粉澤故所至禮化大行半千事五君丨丨丨丨年老不衰樂山水自放卒吏民哭野中同上扁南陽羽音古今姓纂闕事類禁方能生人史記扁鵲渤海郡鄭人姓秦名越人少時為人舍長舍客長桑君知其非常人也以丨丨傳之虢太子死扁鵲生而起之天下盡以扁鵲為丨丨死丨木吳興宫音古今姓纂端木賜之後因避仇改姓木氏晉文章志有木華字玄虛作海賦為太傅楊駿主簿本朝淳熙中木待問始以姓名魁天下今子孫始家於永嘉事類闕京東都角姓古今姓纂漢京房之後本姓李推律定姓自改為京氏由是以降京姓不顯至我孝宗朝京鏜父子始顯焉與改哀為京者不同事類推律定姓前漢京房字君明東郡頓丘人本姓李丨丨丨丨自改為京氏治易事梁人焦延壽延壽常曰得我道以亡身者京生也分卦直日京房易説長於災變丨六十四丨更丨丨用事以風雨寒溫為侯各有占驗房用之尤精上封言災房以孝廉為郎帝數召問對曰古帝王以功舉賢則萬化成瑞應著末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息諷用石顯三丨丨丨丨異質金獨免本朝京鏜字仲逺豫章人漢魏郡太守房之後父衛國公祖和建炎間金陷豫章恐人圖已家質一子衛公同産四人莫敢往衛公請行後金盡戮質子衛公獨免州閭稱之治縣有聲鏜生而翹秀年三十登進士第主撫州臨川簿轉南康軍星子令改秩知江州瑞昌縣丨丨丨丨部使者薦章交上參政龔茂良薦于孝宗擢主管官誥院議論通明孝宗方鋭意恢復因極言州縣俱困民貧兵驕士氣頽靡上曰卿丨丨丨丨有用才也建明大體除監察御史公嘗言求才不如儲才又言非任守臣勿除監司又乞招逃卒以銷盜賊所丨丨皆關丨丨大朝會攝殿中監上謂宰相曰京鏜有公輔器在汴執禮值髙宗憂金遣使來弔祭假公禮部尚書往報謝故事至汴當受宴請免宴不免請徹樂不從及期趣即席公曰若不徹樂死不敢即席可取吾頭以往請先拜酒果之賜公拜受間金儐者厲聲曰北朝宴南使敢不即席公趨退甲士露刃拒户公命吾掌儀者叱之排闥出就館以聞金主竟徹樂上謂宰臣曰京鏜在汴死執不聽樂其節可嘉及見勞曰卿丨丨為朕丨丨即除工部侍郎在蜀蠲征成都謀帥上曰京鏜人才磊落可用除敷文閣待制四川安撫制置使肅綱維逐貪墨輯將士節用度以裕民力閲詞訟以達下情為蜀蠲鹺酒芻米之征二百七十餘萬緍又請加數年蠲減之期且濳弭威黎瀘州蠻人叛兵之變丨丨四年召為刑部尚書進讀坦明寧宗御極公進四事曰敬曰公曰勤曰儉兼侍讀上語講官曰京鏜丨丨義理丨丨兼吏部尚書除參知政事知樞密院事在廷相慶慶元二年正月拜右丞相白麻出丨丨丨丨先是韓托胄浸用事朱文公於經筵首言之托胄怒請御批除熹宫觀宰相執奏托胄令內侍王德謙徑遣付下未幾逐忠定公趙汝愚于永州群憸附和倡偽學之名以空善類公於其間極力調護嘗抗疏論救偏用中之道踰二千言秉鈞月餘首乞復汝愚官許歸葬朱熹乞致仕又開陳從其請松坡自號為相一守祖宗成憲有戚畹命從中出貟外置幕僚者有屬籍近親增秩三等者有禁中藥省超為遙刺者公皆執不行王德謙除節度極言其不可力請裂麻卒詘德謙及韓托胄盜權益甚黨與益衆求去之章六上竟不許遂薨于位其賻贈近世鮮儷晚得宋齊丘宅址古松百章自號丨丨居士誠齋志墓楊萬里志其墓曰夷狄以一死怖士大夫然畏死者未必不死正使不死其辱有甚於死不畏死者未必死正使必死其榮有甚於不死弟子曰敢問人道孰為大孔子曰禮為大弟子問何如斯可謂之士孔子曰使於四方不辱君命可謂士矣公惟得孔子論禮之意是以見禮大而夷狄小惟得孔子論士之意是以見君命重而身輕孰謂一死能動之乎並同上右一十四姓並依見今書市百家姓續添者摘其顯姓依次第編入若百家所載不及者則是隱僻之姓不復通上下之用也古今合璧事類備要續集卷二十九
