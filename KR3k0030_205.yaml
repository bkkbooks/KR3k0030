body:
  text: 古今合璧事類備要續集卷五十五宋謝維新撰禍福門禍福附致禍避禍嫁禍防患樂禍畏患事理發揮禍福善惡之報也然人皆知求福而不知所以為善皆知避禍而不知所以去惡往往求福而福不應避禍而禍不免是非天之不仁也而所以感召之者未善也故禍每加於小人而福常歸於君子善惡之報昭昭矣或者為善未必福應而反得禍為惡未必禍應而或得福則以為天理有時而或爽也愚謂善有時而得禍惡有時而獲福者天之未定也善積而禍必滅惡盈而福必消者天之終定也書曰惟吉凶不僣在人惟天降災祥在德焉可厚誣哉事類善不善作丨降之百祥作丨丨降之百殃書能不能丨者飬之以之福丨丨者敗以取禍左成十三年自求福丨丨多丨詩自求禍是丨丨丨也禍福無不自己求之者孟子不懼不喜君子禍至丨丨福至丨丨家語所倚所伏禍兮福丨丨福兮禍丨丨老子德福之基夫丨丨丨丨也無德而福猶無基而厚墉也其壞無日矣晉語言禍之門多丨多敗是丨丨丨也家語牛生白犢宋人有好行仁義者三年不懈家無故黑丨丨丨丨以問孔子曰此吉祥也以薦上帝居一年父無故而盲其牛復生白犢又問孔子曰吉祥也復教以祭居一年其子復無故而肓其後楚攻宋圍其城丁壯者皆乘城而戰死者大半此人以父子有疾皆免及解圍而疾俱復列子鳶墮腐鼠虞氏者梁富人也登高樓臨大路設樂陳酒擊博其上而遊俠相隨行樓下博者射中而笑丨丨丨丨而中之遊俠相與語曰虞氏富久矣常有輕人之志乃辱我以腐鼠請滅其家夜乃攻虞氏大滅之列子何不為福勾踐之困於會稽喟然歎曰吾終於此乎種曰湯繫夏臺文王囚羑里晉重耳奔翟齊小白奔莒其卒王霸由是觀之何遽不為福乎史越世家安知非禍北叟塞上之翁也馬無故亡入胡人弔之翁曰安知非福乎後其馬將胡駿馬而歸人賀之翁曰丨丨丨丨乎其子騎墮而折臂人弔之曰安知非福乎後胡兵大出丁壯者戰死唯子以跛故得父子相保故以北叟知禍福相因倚而生也淮南子包藏禍心趙孟曰楚使子圉聘於鄭鄭使行人子羽與之言曰大國無乃丨丨丨丨以圖之毋為禍梯史記趙武靈王時公子章欲作亂李兊謂相國肥義曰子胡不稱疾傳政毋為怨府丨丨丨丨致禍虞叔有玉見前貪濁門子罕辭玉宋人有得玉獻諸丨丨子罕弗受曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶稽首告曰小人懷璧不可以越鄉納此以請死也使玉人攻之富而後使復其所左襄十五年直言必及晉伯宗每朝其妻必戒之曰子好丨丨丨丨於難後晉三卻害伯宗成十五年小才見殺盆成括仕於齊孟子曰死矣盆成括盆成括見殺門人問曰夫子何以知其將見殺曰其為人也小有才未聞君子之大道也則亦足以殺其軀而已矣勇死知困子路以丨丨萇𢎞以丨丨淮南子俊死辨亡酆舒以丨丨鄧析以丨丨唐元載傳錯以智死朝丨丨丨丨桓談傳舜以言死張敞椽絮舜私歸其家曰五日京兆耳安能復案事敞聞舜語收繫獄死好煆見憾晉嵇康性絶巧而丨丨宅中有一桞樹甚茂激水環之每夏月居其下以煆鍾會貴公子也精練有才辨故往造焉康不為之禮而煆不輟良久會去康曰何所聞而來何所見而去會曰聞所聞而來見所丨而去以此丨之言於文帝曰嵇康卧龍不可起公無憂天下顧以康為慮耳帝既昭信會遂害之料事見忌後楊修有俊才為丞相曹操主簿嘗出行籌操有問外事乃逆為答記勑守舍兒若有令出依此通之既而果然操怪其速亷之知狀忌修後因事殺之遊説被刑李陵降胸奴上問太史令司馬遷盛言陵事親孝與士信奮不顧身以徇國家之急今舉事一不幸全軀保妻子之臣隨而媒蘖其短上以遷誣罔為陵丨丨下遷腐刑誹謗遭誅孔融以對孫權使有丨丨之言坐棄世東漢驕慢被殺許攸恃功丨丨嘗於衆坐呼曹操小字曰某甲卿非我不得冀州也操笑曰汝言是也然內不樂後竟殺之瞪視欲殺杜甫嘗醉登嚴武牀丨丨曰嚴挺之乃有此兒武䘖之一日丨丨甫集吏於門武將出冠鈎於簾者三左右白其母奔救得止嫁禍吾皆不欲季氏將伐顓臾冉有曰夫子欲之丨二臣者丨丨丨也論語此非得為孟子之平陸謂其大夫曰子之持戟之士一日而三失伍則去之否乎曰不待三然則子之失伍也亦多矣曰丨丨距心之所丨丨也孟公孫丑下欲反其讎楚殺伍奢其子貟如吳言伐楚之利公子光曰是宗為戮而丨丨丨丨不可從也左昭二十欲嫁其禍趙豹曰韓氏所以不入秦者丨丨丨丨於趙也趙世家言陵所誤公孫敖深入胸奴迎李陵敖軍無功還因曰捕得生口丨李丨教單于為兵以備漢兵故臣無所得上於是族陵家通鑑欲上自將七國反錯丨令丨丨丨兵而已居守漢景帝紀樂禍偏舞樂禍王子頺享五大夫樂及丨丨鄭伯曰王子頺歌舞不倦丨丨也左莊二十年背施幸災秦飢乞糴於晉晉人弗與慶鄭曰丨丨無親丨丨不仁丨丨丨丨民所棄也左僖十四年利人之難丨丨丨丨昭五年利人之幾丨丨丨丨宣十二年樂人之禍王宏素與司𨽻校尉胡种有隙及宏下獄种遂迫促殺之宏臨命詬曰胡种丨丨丨丨禍將及之後漢王允傳乘人之弊周伯仁好丨丨丨丨避禍括囊無咎丨丨丨丨象曰慎不害也易坤卦勿藥有喜九五旡妄之疾丨丨丨丨注非妄而藥之則凶全身遠害丨丨丨丨詩見幾不俟君子丨丨而作丨丨終日易繫結茅表井楚子伐蕭王遂圍蕭蕭潰申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊遂傳於蕭還無社蕭大夫與司馬卯言呼申叔展皆楚大夫叔展曰有麥麴乎曰無有山麴窮乎曰無二物所以禦濕使無社逃泥水中無社不解故曰無軍中不敢正言故謬語河魚腹疾奈何叔展言無禦濕藥將病曰目於眢烏丸切廢井也井而拯之若為茅絰哭井則已叔展又教丨丨以丨丨須哭乃應以為信明日蕭潰申叔視其井則茅絰存焉號而出之浮舟泛海范蠡與勾踐既滅吳為書辭王乘丨丨丨自齊遺大夫種書曰蜚鳥盡良弓藏狡兔死走狗烹越王為人長頸鳥喙可與共患難不可共安樂子何不去種見書稱病不朝人或讒種作亂越王乃賜種劒種遂自殺鼓箎乞食伍子胥載槖而出昭關夜行晝伏至於陵水無以糊其口膝行蒲伏稽首肉袒丨丨丨丨於吳市范雎傳髠鉗布衣季布為任俠有名項籍使將兵數窘漢王籍滅髙祖購求千金布匿濮陽周氏乃丨丨丨丨褐置廣桞車中喪車也解裸刺船漢陳平自楚間行仗劒亡渡河船人見其美丈夫獨行疑其亡將要下有寶器金玊目之欲殺平平心恐丨衣丨而佐丨丨船人知其無有乃止亡抵於褎山陽張儉為中常侍侯覽所怨覽為刋章下州郡捕儉儉與融兄褎有舊丨丨丨丨不遇時融年十六儉少之不告融見其有窘謂曰兄雖在外吾獨不能為君主耶因留舍之後事泄儉得脫走遂并收褎融送獄獄人未知所坐融曰保納舍藏者融也當坐之褎曰彼來求我非弟之過請甘其罪吏問其母母曰家事任長妾當其辜一門爭死後竟坐褎焉逃歸於嵩後漢趙岐字邠卿為京兆郡曹時中常侍康衡兄琦為虎牙都尉郡人以進不由德卿侮之岐又數為貶議琦後為京兆尹果盡殺岐家屬岐逃難四方自匿姓名賣餅北海市中時孫嵩年二十餘察岐非常人呼與共載岐懼失色嵩密問曰視子非賣餅者又相問而色動不有重怨即亡命乎我北海孫賔石闔門百口勢能相濟岐以實告之遂以俱歸藏岐復壁中數年作厄屯歌三十三章諸康死滅因赦乃免捷步完免後漢任文公曉天官風星祕要為司空掾平帝即位稱疾歸家王莾篡後文公推數知當大亂乃課家人負物百斤環舍趍走日數十倒時人莫知其故後兵冦並起其逃亡者少能自脫惟文公大小負糧丨丨悉得丨丨詐死逃竄杜根和熹鄧后臨朝根以安帝年長宜親政事乃上書直諫太后大怒收根囊盛撲殺之執法者私語行事人使不加力既而載出城外根丨丨三日目中生蛆因丨丨及鄧氏誅根方歸徴拜侍御史毋重吾禍范滂以鈎黨坐繫獄後事釋南歸南陽士大夫迎之者數千兩同囚鄉人殷陶黃穆衛侍於滂應對賔客滂謂陶曰今子相隨是重吾禍也遂遣還鄉里本傳每輒言佳司馬徽字德操括囊畏謹有以人物問者不辨其高下丨丨丨丨婦諫之曰人質疑問君一皆言佳豈咨君之意乎徽曰如君言亦復佳世説詐醉免疑晉王允之字景猷揔角從伯敦謂無似已恆以自隨出則同輿入則共寢敦嘗夜飲允之辭醉先卧敦與錢鳯謀逆允之悉聞其言慮王敦疑已便於卧處大吐衣靣並汚鳯出敦果照視見允之卧吐中以為大醉不復疑之時父舒為廷尉允之還都定省以敦鳯謀議白舒與王導俱啓明帝命駕見幾晉張翰字季鷹吳人縱任不拘時號江東步兵會稽賀循入洛經吳閶門於船中彈琴翰初不相識就循言談知其入洛翰曰吾亦有事北京便同載去不告家人齊王囧尉為大司馬掾囧時執權翰謂同郡顧榮曰天下紛紛禍難未已夫有四海之名者求退良難吾本無望於時子善以明防前以智慮後榮執手愴然曰吾亦與子採南山蕨飲三江水耳翰因秋風起思吳中菰菜蓴羔鱸魚鱠曰人生何能羈宦數千里以要名爵乎遂丨丨歸俄而囧敗人皆謂之丨丨把酒相歡裴度晚莭頗浮沉為自安計不復有經濟意乃治第東都野服蕭散與白居易劉禹鍚為文章丨丨窮晝夜丨丨不問人間事本傳闔戶避謗陸贄既放荒遠常丨丨人不識其靣丨丨不著書本傳買田自汚乖崖在陳一日方食進奏報至且食且讀既而抵案慟哭久之哭止復彈指久之彈止罵詈久之乃丁晉公逐萊公也乖崖知其禍必及已乃延三大户於便坐與之博袖間出私骰子勝其一坐乃者丨丨宅為歸計以丨丨晉公聞之亦不害也余謂此智為之賢者不為也賢者有義而已寧避禍哉禍豈可避耶談叢防患見兔顧犬莊辛謂楚襄王曰丨丨而丨丨亡羊而補牢未為晚也戰國䇿曲突徙薪見前為長太息臣竊惟天下事勢可為痛哭者一可為流涕者二可丨丨丨丨者六云云賈誼治安䇿著恐不知漢息夫躬數危言高論自恐遭害丨丨丨丨略云玄靈泱欎將安歸兮鷹集橫厲鸞徘徊兮矰若浮焱動則機兮叢棘棧棧曷可棲兮發忠忘身自繞罔兮宛頸折翼容得往兮涕泣流兮汍蘭心胸結兮傷肝仰天光兮自列昭上帝兮我察秋風為我吟行雲為我隂嗟若是兮欲我留撫神龍兮攬其須遊曠逈兮反亡期雄失據兮世我思後數年誅如其言重關復璧李林甫自以多結怨常虞刺客出則步騎百餘人為左右翼金吾靜街前區在數百步外公卿走避居則丨丨丨丨以石甃地墻中置板如防大敵一夕屢徙牀雖家人莫知其處被甲衣袍向敏中除平章事坐事出知永興駕幸澶淵密詔盡付西鄙得便宜從事會邦人大儺有告禁卒欲倚儺為亂者密使麾兵丨丨丨丨伏廡下幕中明日盡召賔僚兵官置酒縱閲無一人預知者命儺入先令馳騁於中門外後召至階公振袂一揮伏卒齊出盡擒之果懷短刃即席誅之勦訖屏尸亟命灰沙掃庭張樂宴飲賔從股栗歸田録思患無忘檻車管仲將兵遮莒道射桓公中鈎後魯桎梏管仲而送於齊齊以為相謂桓公曰願君無忘射鈎臣丨丨丨丨不忘巾車馮異朝京師引見帝謂公卿曰是我起兵時主簿也為吾披荆棘定關中既罷賜以珍寶衣服錢帛詔曰倉卒蕪蔞亭豆粥滹沱河麥飯厚意久不報異稽首謝曰臣願國家無忘河北之難小臣丨丨丨丨之恩尤武獲異於巾車故云巾車鄉名也方謹守文唐太宗嘗問創業守文孰難玄齡曰方時草昧羣雄角逐攻破乃降戰勝乃尅創業則難魏徴曰王者之興必乘衰亂覆昏暴殆天授人與者既得天下則安於驕逸人欲靜徭役毒之世方敝衰刻窮之國繇此衰則守文為難帝曰玄齡從我定天下冒萬死遇一生見創業之難徵與我安天下畏富貴則驕驕則怠怠則亡守文之為不異然創業之不昜既往矣守文之難方與公等謹之通鑑本紀無忘創業唐莊宗患宮中暑濕不可居遣宮苑使王允平營樓郭崇韜曰願陛下丨丨丨丨之難常如河上則可使繁暑坐變清涼莊宗默然終遣允平起樓禍福陸龜蒙雜説邰侯薑女之生子也始棄之命之曰棄宋苪司徒之生女也始棄之亦命之曰棄邰棄為稷官蒸民賴之宋棄美而生佐幾移宋國名之同也奚傷舜重瞳子項羽亦重瞳子形之類也奚病擇其道如何耳季札以樂卜趙孟以詩卜襄仲歸父以言卜子遊子夏以威儀卜沈尹氏以政卜孔成子以禮卜其應也如響無他圖在精誠而已不精誠者不能自卜况吉凶他人乎元次山出規元子門人叔將出逰三年及還元子問之曰爾去我久矣何以異乎對曰叔將始自山中至長安見權貴之盛心憤然竊悔比年於空山窮谷與夫子甘飢寒愛水木而已不數月王公大人卿相近臣之門無有至者及一年有向與歡宴過之可弔有始拜侯已聞就誅豈不裂封疆土未識豈無印綬懷之未暖其客得祿位者隨死得金玉者皆孥參逰宴者或刑或免叔將之身如犬逃者五六似鼠藏者八九當其時環望天地如置在杯土之中元子聞之歎曰叔將汝何思而為乎汝若思為社稷之臣則非正道不進非忠信不言雖手足斧鉞口能出聲猶拯忠言與氣偕絶汝若思為祿位之臣猶當避赫赫之路顯顯之機如下廄粟馬齒食而已汝忽然望權勢而往自致身於刑禍之方得筋骨載肉而歸幸也大矣二三子以叔將為戒乎歐陽公史贊夫吉凶之於人猶影響也而為善者得吉常多其不幸而罹於凶者有矣為惡者未始不及於凶其幸而免者亦有時焉而小人之慮遂以為天道難知為善未必福而為惡未必禍也避禍王藹風詐禮法不可斯須而去有以禮法而為災忠信不可斯須而去有以忠信而為禍禮法非災人之端忠信非禍人之本理或有害則禮法忠信為禍人之萌狂瞽人之所惡也效之則恐不及其真荒酗人之所恥也履之則恐不自其性狂瞽誠可惡也荒酗誠可恥也臨難而保全則狂瞽荒酗為藏身之藪禮法忠信直也狂瞽荒酗詐也以之保全則直不如詐之功嗚呼三皇之前無所用五帝之後無所不用桞子敵戒皆知敵之仇而不知為益之尤皆知敵之害而不知為害之大秦有六國兢兢以強六國既除􅑲􅑲乃亡晉敗楚鄢范文為患厲之否圗舉國造怨孟孫惡臧孟死臧恤藥石去矣吾忘無日智能知之猶卒以危矧今之人曽不是思敵存而懼敵去而舞廢備自盈秪益為愈敵存滅禍敵去召過有能知此道大名播懲病克壽矜壯死暴縱欲不戒匪愚伊耄我作戒詩思者無咎皮日休鹿門隱書序醉醉隱於鹿門不醉則遊不遊則息息於道思其所未至息於文慙其所未周故復草隱書焉嗚呼古聖王能旌山夫谷民之喜者意在斯乎或曰仲尼修春秋紀災異近乎怪言虎賁之勇近乎力行衰國之政近乎亂立祠祭之禮近乎神將聖人之道多岐而難通也奚有不語之意也曰夫山鳴鬼哭天裂地坼怪甚也聖人謂一君之暴災挻天地故諱耳然後世之君猶有窮凶以召災拯暴以市異者矣夫桀紂之君握鈎伸鐡撫梁易柱手格熊羆走及虎兕力甚也聖人隱而不言懼有力而虐物貪勇而喪生然後世之君猶有喜角抵而忘政愛拔距而過賢者寒浞竊寶子頑通母亂甚也聖人隱而不言懼來世之君為蛇豕民為淫蜮然後世之君猶有易內以亂國通室以亂邦者夏啓乘龍周穆宴瑤池神甚也聖人隱而不言懼來世之君以幻化致其物以左道成其樂後世之君猶有黷封禪以求生恣祠祀以祈欲者嗚呼聖人發一言為當世師行一行為來世軌豈易容而傳哉當仲尼之時茍語怪力亂神也吾恐後世之君怪者不在於妖祥而在於政教也力者不在於角抵而在於侵陵也亂者不在於祍席而在於天下也神者不在於機鬼而在於宗廟也若然者其道也豈多岐哉陳靖彭祖觀井圖銘淳化中豫將命之狄丘道由彭門有客得彭祖觀井圖以為貺中有臺榭人物山水森森然蓋狀其佳象幽致表繪事之工豫無取所慕者惟彭氏靣井而覆之以輪背樹而纜之以繩憑杖斂躬局蹐而迎視兢然若將墜也嗚呼古人臨事而懼之有若是檢身遠害之有若是後之君子得無效歟豫實好古者歷考其迹於傳記雖敻而難信且夫子云竊比於我老彭亦其驗也故作銘於座右曰至哉古人遠害全身戰戰兢兢慎若履氷朽索之馭納隍是慮天子則之鴻休永據存而懼亡係於苞桑諸侯則之其國必昌若舟弗濟夕惕而厲大夫則之其家孔熾直哉惟清執虛如盈士子則之其道元亨不爭在醜無愧屋漏庶人則之其食孔阜吾省豫行吾慎豫守竊比老彭式介眉壽司馬君實保身説天下有道君子揚於王庭以正小人之罪而莫敢不服天下無道君子括囊不言以避小人之禍而猶或不免倘人生昏亂之世不在其位四海橫流而欲以口舌救之臧否人物激濁揚清撩蛇虺之頭踐虎狼之尾以至身被淫刑禍及朋友士類殱滅而國隨以亡不亦悲乎夫惟郭泰既明且哲以保其身申屠蟠見幾而作不俟終日卓爾其不可及也詩集行文天合知君丨君丨丨丨丨見君如此我傷悲祗殘三日兵戈後才到孤村雨雪時著卧衣裳難辦洗旋求糧食莫供炊地爐不暖柴枝濕猶把蒙求授小兒杜荀鶴贈李鐔鐔自維揚避亂東入中山善惡理如此顔回飲瓢水陋巷枕曲肱盜跖猒人肝九州恣橫行回仁而短命跖壽死免兵愚夫仰天呼禍福豈足慿跖身一腐鼠死朽化無形萬世尚遭戮筆誅甚刀刑思其生得所豹犬飽臭腥顔子聖人徒生知自誠明惟其生之樂豈減跖所榮死也至今在光輝如日星譬如埋金玉不耗精與英生死得失間較量難重輕丨丨丨丨丨毋尤天不平歐陽永叔顔跖切勿恃何妨仁者難逢思有常平居丨丨丨丨丨爭先徑路機關惡近厚語言滋味長爽口物多須作病快心事過必為傷與其病後能求藥不若病前能自防邵堯夫詩何為亦窮辱黃雀死彈丸厥罪在啄粟翡翠不近人丨丨丨丨丨臨川舉足畏逢仇丨丨丨丨丨低頭惟避謗歐古今合璧事類備要續集卷五十五
