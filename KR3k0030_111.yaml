body:
  text: 古今合璧事類備要後集卷四十二宋謝維新撰史館門史館史官提舉國史國史修撰監修國史國史檢討歴代沿革歴代史官自黄帝有之夏商太史周大史小史内史外史而侯國亦置秦有太史令漢至武帝始置以司馬談為之談卒尸遷嗣宣帝以其官為令行太史公文書修撰之職以它官領於是太史之官唯知占候而已王莽改置柱下五史後漢至隋唯魏明太和中史職𨽻中書其餘多𨽻秘書唐武徳初因隋制屬秘書省著作局貞觀移史館於門下省宰相監修唐李元紘奏曰太宗别置史館於禁中所以重其職而秘其事自是著作局始罷史職其修撰史事以他官兼領或品卑而有才者亦宜焉至本朝監修國史一人以宰相為之修撰直館檢討無常員修撰以朝官充直館檢討以京官以上充掌修日厯及典司圖籍之事凡置史别置院於宣徽北院之東以藏之謂之編修院東京記云編修俗呼為史院天聖修真宗史欲重其任降勅宰相為提舉參知政事樞宻副使為修史其同修史則以殿閣學士以上為之編修官以三館秘閣枝理以上及京官充史畢即停續㑹要元豐改官制日厯𨽻國史案毎修前朝國史實録則别置國史實録院以首相提舉翰林學士以上為修國史餘侍從官為同修國史庶官為編修官實録院提舉官如國史從官為修撰餘官為檢討麟臺故事元祐復置國史院𨽻門下省明年又置國史院修撰兼知院事紹聖復以國史院歸秘書省宰輔三館題名中興即秘書省復建史館以修神宗哲宗兩朝實録選本省官兼檢討校勘以侍從官充修撰紹興五年乂移史館於省之側别為一所以増重其事至九年余徽宗實録乃即史館開實録院明年以未修正史詔罷史館併為實録院紹興初實録國史皆寓史館後罷史館遇修實録即置實録院遇修國史即置修國史院著作局唯修纂日厯中興㑹要宰相監修但提大綱檢討官捜閲校對惟修撰實専史職只據所送到時政記唐長夀中姚璹請仗下所言宰相撰録號時政記自璹始五代以來中書樞宻院皆致時是記樞宻院自學士編録太平興國八年蘇易簡為參政自是中書皆參政編録唯吕䝉正嘗以宰相領其事端拱以後撰宻院中皆送中書問修為一書及王欽若陳堯叟始乞别撰不闗事書直送史館起居注唐文宗每開延英召大臣論事必命起居郎起居舍人執筆螭頭以記時政淳化中張秘請别置起居院及左右史之職别致言動為起居注銓次其事排以日用為日厯聖朝職畧紹興二十八年詔置修國史院修神哲徽宗三朝正史事類國史丨丨明乎得失之迹詩外史丨丨掌四方之志周禮小史丨丨掌邦國之志同上良史董狐古之丨丨也書法不隠左傳太史太史公謂子遷曰予先周室之丨丨也上世嘗顯功名於虞夏汝復為太史則續吾祖矣遷悉論先人所次舊聞不敢闕卒三嵗而遷為太史紬史記石室金匱之書述唐以來至于麟止太史公自序史通封遷後為丨丨子注云以遷世為丨官丨於古今司司遷𫝊青史漢藝文志云丨丨注古史官紀事之書史才陳夀撰三國志叙事有良丨丨晉本𫝊良筆蔣偕乂三世踵修國史世稱丨丨柱下見沿華注南山唐韋述居史職二十年禄山亂述抱國史蔵於丨丨能在國史實録自劉向楊雄博極羣書皆稱遷有良史之才服其善叙事理辨而不華質而不俚其文直其事該不虚美不隠惡故謂丨丨遷𫝊直筆吳兢修國史丨丨五難袁崧云書之為難也有五煩而不整一難也俗而不典二難也書不實録三難也賞罰不中四難也文不勝質丨丨也五志荀恱云立典有丨丨焉達道義彰法式通古今著功勲表賢能干寳釋云體國經治之言則書之用兵征伐之權則書之忠臣烈士孝子貞婦之節則書之文告専對之辭則書之才力伎藝殊異則書之三長劉知幾曰史才須有丨丨謂才也學也識也乂唐鄭惟忠嘗聞古文士多史才少何耶子元曰史有丨丨才學識世罕兼之故史才少本𫝊三恨薛中書元起謂所親曰吾不才富貴過人然平生有丨丨不以進士擢第一恨也不娶五姓女二恨也不得修國史丨丨也述作見後注良直懲勸致化在於春秋錯綜裁成必歸丨丨齊抗制不論載予為太史而丨丨丨司馬遷𫝊善叙事晉陳夀除著作郎撰三國志凡六十五篇時人稱其丨丨丨有良史才可懲勸荀悦紀叙曰丨以丨惡而丨善典籍有國之明訓不虚美唐太宗謂監修國史房元齡曰前世史官所記皆不令人主見之何也對言史官丨丨丨不隠惡若人主見之必怒故不敢獻紬微烈丨史策之丨丨唐太詔令蕭暠修國史制總微婉丨史官之丨丨蕭鄴監修國史制依大義子謂陳夀有志於史丨丨丨而削異端總簡書孫偓制遷紫微黄極之位丨丨丨刋集之司唐大詔令信疑實録春秋之義丨以𫝊信丨以𫝊疑明丨丨也㑹要文憲足徴魯史以來丨丨之實丨丨孔子因而修之同上百國春秋吾見丨丨丨丨墨子千載勸懼得失一朝而榮辱丨丨善人丨焉淫人丨焉類要記繁志寡史之失自遷固始丨丨而丨丨文中子辭約事詳後漢獻帝以班書文繁難省命荀悅依左氏傳體為漢紀三十篇丨丨丨丨論辨多美本𫝊網羅舊聞司馬遷丨丨天下放失丨丨史記精研就業班固以父彪所續前史未詳乃濳丨丨思以丨其丨班固𫝊貫穿經𫝊班固言馬遷作史丨丨丨丨馳聘古今裁成帝墳二班懷文丨丨丨丨比良遷董兼麗卿雲二班𫝊土版金匱刻於丨丨蔵於丨丨與天地相終始晁錯策學海詞林明乎國史所以𢎞闡大猷觀乎人文所以化成天下自非鈎深丨丨囊括丨丨盛周公之典謨志仲尼之日月則何以纂叙鴻業唐太詔令蕭嵩修國史制序事瞻詳論曰司馬遷班固父子議者咸稱二子有良史之才遷文直而事核固文丨丨丨丨若固之序事贍而不穢詳而有體使讀者亹亹不厭信其能成名也叙事簡要唐吳兢直史館居職殆三十年丨丨丨丨又吳兢丨丨丨核號良史一代之典晉温嶠表國史之興將明得失丨丨丨丨煥然可觀一家之言唐長安三年令左吏劉知幾直史館吳兢等修唐史採四方之志成丨丨丨丨父子史籍晉華嶠謝秘書監表劉向丨丨世典丨丨父子史官唐劉知幾父子三人更涖丨丨直筆東觀魏收曰願得丨丨丨丨早出魏書北齊本傳權重宰相朱敬則兼修國史乃請髙史官選以求名才韋安石閲其藁嘆曰董狐何以加世人不知中官丨丨丨丨宰相能制生人史官兼制生死本傳相視含毫劉知幾字子元領史事時宰相韋臣源任至忠等皆領監修子元奏記求罷因為至忠言五不可曰古之國史皆出一家未聞籍功于衆今史司取士滋多人自為荀袁家自為政駿毎記事載言則閣筆丨丨丨丨不㫁頭白可期汗青無日本𫝊宜置座右子元著史通内外四十九篇徐堅讀之嘆曰為史氏者丨丨此丨丨也同上兾為帝典晉天福四年史館奏職居刋削爰舉舊章丨丨丨丨續通典瑩奏歴覽天福六年兼修國史趙丨丨丨丨故事文册之重委在正人編修之官擇諸毛事同上典籍淵林丨丨有國之明訓丨丨荀悦序善惡軌範唐劉元濟修國史嘗曰史官丨丨必書言成丨丨使驕主賊臣懼此權顧輕哉而班生受金陳夀求米僕乃視如浮雲爾本𫝊允資藎臣王猷以穆在於宰政君舉必書所願史館典領重者丨丨丨丨委在正人見前瑩奏歴覽注在於春秋王道之端人事之紀懲戒教化丨丨丨丨錯綜必歸良直以中樞之餘力得東觀之全材比良遷董丨丨丨丨蕭制鄴監修國史聖朝大典唐至徳一年史館于休烈奏國史實録丨丨丨丨東觀陽秋掌丨丨丨丨之重蕭鄴監修國史制皆出一家劉知幾以監修者多為國史之弊奏記於蕭至忠曰古之國國史丨丨自丨丨如魯漢之丘明子長之董狐南史皆本起居史官掌修國史凡天地日月之祥山川封域之分昭穆繼代之序禮樂師旅之事殊賞興廢之政丨丨於丨丨六典為公作佳𫝊丁儀丁廙有盛名於魏夀謂其子曰可覓千斛米見與當丨尊丨丨丨丨丁不與之竟不為立𫝊又北齊魏收修國史得楊休之助因曰無以謝徳當為卿作佳𫝊衆口號穢史爾朱榮於魏為賊魏收以髙氏出自爾朱旦納榮子金故減其惡而増其善於是丨丨喧然丨為丨丨北齊史本𫝊撰武徳國史韋述丨丨丨以來丨丨文納事詳蕭穎士以為譙周陳夀之流本𫝊撰建中實録沈既濟丨丨丨丨丨體裁精髙本𫝊遷固而下紛乎吾觀丨丨丨丨述作何其紛丨丨文中子子謂荀悦史矣丨丨丨丨史乎丨丨同上召禹偁直史館王丨丨字元之端拱初年太宗聞其名丨丨丨丨獻端拱箴東都事畧薦劉邠擬校勘丨丨字戅父趙槩丨攽可備史館召試入優等當除直史館與言者有憾執政乃丨丨丨同上召試秘閣入三等蘇軾字子瞻學通經史屬文日數干言丨丨丨丨丨丨丨得直史館召試史館入優等劉攽事見上召至試皆直史館羅處約與王禹偁丨丨京師太宗自定顯以丨之以禹偁為右拾遺處約為著作郎丨丨丨丨以近臣薦充史館呉俶字正儀丨丨丨丨丨丨丨編修太平御覽太平廣記授著作除直史館呉育字春卿丨丨丨郎丨丨丨丨文詞雅正天下推之治詳州入為史館楊徽之字仲猷丨丨丨丨丨丨丨脩撰時太宗謂宰相曰徽之儒雅之士也宜置之館殿遂判集賢院父修通鑑為檢閲司馬康字公休丨光丨資治丨丨奏丨丨丨文字並同上二十年不能贊述范蜀公鎮字景仁少與栁耆卿同年愛其才美聞作樂嘗嗟曰繆其用心謝事之後親舊聞盛唱栁詞後歎曰當仁庿四十二年太平吾身為史官丨丨丨丨丨丨丨而耆卿能盡形容之漢太史公自序昔在顓頊命南正重司天北正黎司地唐虞之際紹重黎之後史復典之至于夏商故重黎氏世序天地談為太史公太史公父子天官於唐都太史公既掌天官不治民有子曰遷遷生龍門仕為郎中奉使西征還報命是嵗天子始建漢家之封太史公留滯周南不得與從事發憤且卒而子遷適使返見父於河雒之間太史公執遷手而泣曰予先周室之太史也自上世嘗顯功名虞夏典天官事後世中衰絶於予乎有復為太史則續吾祖矣予死爾必為太史為太史毋忘吾所論者且夫自獲麟以來四百有餘嵗而諸侯相兼史記放絶今漢興海内一統明主賢君忠臣死義之士予為太史而不論載廢天下之史文予甚懼焉遷曰小子不敏請悉論先人所次舊聞弗敢闕卒亡而遷為太史今紬史記石室金匱之書五年而當太初元年十一月甲子朔旦冬至天厯始改建於明堂諸神受紀太史公曰先人有言自周公卒五百嵗而有孔子孔子至於今五百嵗有能經而明之正易博記春秋本詩書禮樂之際意在斯乎小子何敢讓焉於是論次其文十年而遭李陵之禍退而深惟欲遂其志卒述陶唐以來至于麟止天下遺文古事靡不畢集太史公仍父子相繼纂其職罔羅天下放失舊聞王迹所興原始察終見盛觀衰論考之行事畧惟三代録秦紀漢上紀軒轅下至于兹著本紀十二十表八書三十世家七十列𫝊凡百三十篇五十二萬六千五百字為太史公書序畧以拾遺補藝成一家書藏之名山副在京師以俟後世君子韓愈答劉秀才書凡史氏褒貶大法春秋已備之矣後之作者在據事跡實録實録則善惡自見矣然此非淺陋偷惰者所能就况褒貶耶孔子作春秋卒不遇而死齊太史兄弟幾盡左丘明紀春秋時事以失明司馬遷作史記刑殊班固庾死陳夀起乂廢王隠謗退死家習鑿齒無一足崔浩范曄赤於誅魏收天絶宋孝王誅死足下所稱吳兢亦不聞身貴而後有聞也夫為史者不有人禍則有天刑豈可不畏懼而輕為之哉唐有天下二百年矣聖君賢相相踵其餘文武之士立功名跨越前後者不可勝數豈一人卒能紀而傳之耶僕年志