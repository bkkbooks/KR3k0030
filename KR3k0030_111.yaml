謨藻字彦章公言自元符以來並無日厯此國史重事願留聖心上納之既而宰執請擇所付上曰丨丨丨丨矣出知湖州詔領日厯如故辟官屬二員且賜史館修撰餐錢言行録訪求事迹李益能撰綦宗禮行状重修神仁哲宗兩朝正史公奏仁宗實録墨本元祐所修已是成書朱本蔡卞重修多所増損而元祐史官語言不無過失實乞將朱墨本參照修定哲宗實録蔡京提舉編修多是増飾語言變易是非殆非實録之體乞於舊臣之家丨丨當時文字丨丨參照上悉如所請參較得失徐勣字元功為中書舍人修神宗正史上言宜取當時輔相字記録以丨丨丨丨則一代大畧可信矣東都事畧祁獨秉筆宋祁字子京賈昌朝建議修唐書命祁與王堯臣楊察張方平為修撰又命范鎮邵必宋敏求吕夏卿為編修而以昌朝提舉後相繼出外丨遂獨丨史丨東都事畧首獨委重綦北海宗禮行狀云主上採議臣之言肇置史官時紹興三年為史官修撰以復承平之舊筆削之任丨丨丨丨士絶其榮集官重修太祖語宰相曰太祖朝事耳目相接今實録中多有漏畧可集史官重加修撰命琳追修程琳宗天球舉服勤詞學科中選仁宗時修真宗實録而起居注闕丨丨丨丨書成遂修起居注東都事畧摭實愛憎太史曰史才甚難在乎善惡必書務丨丨而去丨丨斯為良史討論善惡丨丨一代之丨丨而撰次之荆公行范鎮制有良史才國中淳化元年以左司諌梁周翰為史館修撰從翰林學士宋白薦丨丨丨之丨記歴代史吕夏卿字縉叔博覽强丨而於丨丨丨尤該洽與修仁宗實録同修起居注東都事畧中丞令修撰哲宗實録學士王珪奏丨丨賈黯前以學士修仁宗實録自領臺憲不復及院望令依舊供職從之黯乞以實録就臺修撰有議事即赴院詔丨丨三五日一赴院丨丨丨諫議充修撰范祖禹字淳甫命丨丨大夫丨實録院丨丨時申公已薨遂就職言行録修太宗實録楊憶真宗即位拜右正言丨丨丨丨丨凡八十篇獨成五十六卷東都事畧上長編舉要李文簡公燾號巽巖時權同修國史得㫖長編或有増損依熙寧修三經義法至是丨四千四百五十餘條又以一百六十八年事散在丨丨乙覽難周别為丨丨六十八卷總日五卷修換事目十卷上曰卿宿徳耆儒宜在左右任史職言行録擢史館修撰李若谷子淑獻臣天聖中丨丨丨丨丨東都事畧充史館修撰范鎮字景仁英宗即位遷翰林學士丨丨丨丨丨論濮安懿王稱號出知陳州屬刋集國典丨丨丨於丨丨楊億表歐陽修論日厯劄子臣伏以史者國家之典法也自君臣善惡功過與其百事之廢置可以垂勸戒示後世皆得直書而不隠故自前世有國者莫不以史職為重臣伏見國朝之史以宰相監修學士修撰乂以兩史之大臣撰時政記選三館之士當陞擢者乃命修起居注如此不為不重矣近年以來員具而職廢其所撰述簡畧而不存以至於事闗大體者皆没而不書此實史官之罪而臣之責也然其弊在於修撰之官惟據諸司供報而不敢言所見聞故也今時政記雖是兩府臣僚修纂然聖君言動有所宣諭臣下奏議事闗得失者皆不備録惟書除目辭見之類至於起居注亦然與諸司供報公文無異修撰官只㨿此銓次繫以日月謂之日厯而已是以朝廷之事史官雖欲書而不得書也自古人君皆不自閲史今撰述既成必録本進呈則事有諱避雖欲書而又不敢書也加以日厯時政記起居注例皆承前積帶相因故纂録者常務追修累年前事而嵗月既逺遺失莫存至於事在日前可以詳於見聞者又以追修積滯不暇及之若不革其弊則前後相因史官永無舉職之時使聖朝典法遂幾於廢墜矣臣切聞趙元夷自初僣叛至復稱臣終始一宗事節皆不曽書亦聞修撰官甚欲紀述以修撰後時追求莫得故也其於他事又可知焉臣今欲乞特詔修時政起居注之官並以徳音宣諭臣下奏對之語書之其修撰官不得依前只據諸司供報編次除目辭見並須考驗事實至於其他大事並許史院據所聞見書之如聞見未詳者直牒諸處㑹問及臣寮奏議異同朝廷裁置處分並書之並令修撰官逐時旋據所得録為草卷標題月分於史院躬親入櫃封鎖候諸司供報齊足修為日厯仍乞毎嵗令監修宰相親至史院檢㸃修撰官紀録事迹内有不勤其事隳官失職者請罷其日厯時政記起居注並乞更不進本所貴少修史職上存聖朝典法此乃臣之職事不敢不言詩集窺金匱逺取南明貴公子重修東觀帝王書當時載筆丨丨丨暇日登臨到石渠劉禹錫送分司陳郎中祇召直史館詩似六經丁語初與孫何齊名翰林學士王禹偁嘗與詩曰二百年來六不振直從韓栁到孫丁而今更合教修史二子之才丨丨丨成鴻業宸殿丨丨丨猿岩題鳳賦張説修書學士奉勅宴梁王宅詩誅姦彊十年閑坐樂憂獨百金購書收散亡朅來東觀弄丹墨聊借舊史丨丨丨東坡送劉道原國史院檢討官歴代沿革本朝淳化二年以殿中丞敦延澤人子右賛善大夫董元亨並為史館檢討紹興九年詔史館見修徽宗實録以實録院為名檢討官無定員今提舉秦檜辟墓近制檢討官六員嘉定二年曽君鍚自起居郎兼檢討官除權侍郎當陞帶修撰而員數已溢乃降㫖權以檢討官繫銜俟將來有闕日陞帶以從官為檢討官盖自曽君錫始也朝野雜記事類子垕同典見修撰門李燾首命丨丨乞刋定徽宗實録疎舛言臣方修進治平後長編若就加討論它時可助正史詔開實録院丨丨公為檢討官言行録不得試館職至秋二年詔令後檢討更丨丨舉丨丨丨分紀詔並兼檢討嘉祐八年監修國史韓琦奏史記日厯未修者積十餘年今將修先朝實録而日厯未備檢討闕官請以直秘閣吕夏卿秘閣校理韓維兼職丨夏維卿丨丨史館丨丨㑹要古今合璧事類備要後集卷四十二
