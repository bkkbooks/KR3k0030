body:
  text: 古今合璧事類備要前集卷三十八宋謝維新撰科舉門武舉事類舉剛毅後順帝丨丨丨武猛有謀謨任將帥者本紀舉猛勇晉武帝詔丨丨丨秀異本紀置武舉武舉蓋起於武后之時長安二年始丨丨丨其制有長垜馬射步射筒射又有馬槍翹關負重身材之選唐選舉志取絶藝下至軍謀將略翹關拔山絶藝竒技莫不兼取同上補左衛史唐郭子儀以武舉異等丨丨丨長丨後為大臣以身為天下安危者二十年校中書令考二十四本傳擢宏逺科樊宗師丨軍謀丨丨丨本傳詩集文武雙捷向年擢桂儒生業今日分茅聖主恩旌斾仍將過鄉路軒車爭出看都門人間丨丨能丨丨天下安危待一論布惠宣威大夫事不妨詩思許琴樽楊巨源送胡大夫特科事類推恩條制富鄭公當國一舉三十年丨丨之法蓋公與河南進士段希元魏升平同場屋相善公作相不欲私之故為天下之制至今行之聞見録特奏格法丨丨名第一等第一名附正奏第五甲餘並登仕郎第二等京府助教第三等上州文學第四等下州文學並候郊恩出官第五等諸州助教云云出國朝事實絳縣老人丨丨人七十有三年矣趙孟仕之使為君復陶主衣服之官也以為絳縣師左傳襄公二年白頭郎舍漢獻帝詔曰今耆儒年踰八十去離本土結童入學白首空歸長委農野永絶榮望朕甚憫焉其依科罷者聽為太子舍人時長安中為之謡曰頭白皓然食不充糧裹衣褰裳當還故鄉聖主愍念悉用補郎舍是布衣被服元黃詩集白髮青衫丨丨丨丨晚得官瓊林頓覺酒腸寬平康夜過無人問留得宫花醒後看徐道宴罷下第事類丹池交州記有龍門水深百尋大魚登此化成龍不得過曝腮點額血流此水恆如丨丨後漢地理志注又云龍門今在絳州後李膺傳注綱官蜀人石揚休屢拔鄉薦常屈春官蜀人比之丨丨蓋謂牙校部土貢入京師只空歸也續歸田録飲墨水梁試進士不中程者丨以丨丨又北齊選舉濫者丨丨丨一斗坡詩注打眊矂進士籍而入選謂之春關不捷而飲謂之丨丨丨托言白蠟明經張鷟號青錢學士謂萬選萬中時有董方九舉不第號曰丨丨丨丨與鷟為對朝野僉載錦衣貼月沈彬嘗夢著丨丨丨丨飛識者謂身不入月不及第果然雅言參述宋五坦率唐德宗微行西明寺宋濟葛巾方抄書上曰茶請一碗濟曰鼎水方煎自可潑之上曰作何事業是何姓名濟曰姓宋第五應進士舉須臾聞呼官家濟惶懼上曰丨丨丨丨後聞禮部放榜上令探濟無名上曰丨丨又丨丨也盧氏雜記宗諤世家雍熙二年三月己未親試進士梁皓以下賜及第始唱名內有李宗諤宰相昉之子吕蒙亨參政吕蒙正之弟王衭鹽鐵使明之子許待問度支仲宣之子上曰斯並世家與孤寒爭路縱以藝升天下亦謂朕有私也並下第聖政編年詩集失水龍唐張曙與崔昭緯同赴舉問卜者卜者殊不顧曙曙有愠色卜者曰郎君亦及第但崔家郎君拜相當於此時過堂既而張果不第崔首冠曙以詩别之曰千里江山陪驥尾五更風丨丨丨鱗昨夜浣紗溪上雨緑楊芳草為何人後七年崔大拜曙果於裴公下及第於崔公下過堂托言無栖燕章孝標下第為歸燕詩獻庾庚承宣曰積纍危巢泥已落今年故向社前歸連天大厦無栖處更傍誰家門户飛唐元和中罷生兒翰苑何時休嫁女文章早晚丨丨丨上林新桂年年發不許凡人折一枝胡曽賺英雄唐制進士科甚重其老死文場者亦無恨故有補詩云太宗皇帝真長策丨得丨丨盡白頭國史兩淚長安兩渡長安陌空將淚見花孟郊九泣都門曹鄴未第時詩云一辭巖桂叢丨丨丨丨月年年孟春至看花不如雪雅言參述曽到蓬山張濆陳商下狀元及第翰林覆落趙嘏以詩貽之曰莫向春風訴酒杯謫仙真個是仙才猶堪與世為祥瑞丨丨丨丨頂上來托言不怨東風髙蟾未第有詩云天上碧桃和露種日邊紅杏倚雲栽芙蓉生在秋江上不向春風怨未開同上名慙桂苑六載辛勤九陌中却尋岐路五湖東丨丨丨丨一枝緑膾憶松江滿筯紅浮世到頭須適性男兒何必盡成功唯應鮑叔深知我他日蒲帆百尺風羅隱夢入桐花泉州劉昌言作下第詩云唯有夜來蝴蝶丨翩翩飛入刺丨丨青箱雜記初學織錦盧同不及第出都投逆旅有一人附火吟曰學織錦綾工未多亂投機杼錯拋梭莫教宫錦行家見把似文章笑殺他因問之云舊𨽻宫錦坊近以薄技投本行云如今花樣不同且東歸也盧氏雜記為作嫁衣年去年來來去忙丨他人丨丨丨裳仰天大笑出門去獨對東風舞一場石曼卿情如傷劔棄置復棄置丨丨刀丨丨孟郊味如中酒氣丨丨丨丨情懷似别人唐詩五舉不及第孟賓于每年下第有詩第一年云蟾宫空手下澤國有誰來第二年云水國二親應探榜龍門三月又傷春三年云仙島却回空説夢清朝未達自嫌身四年云雲僧不見城中事問是今年第幾人五年云因逢日者教重應忍被雲僧勸却歸天福九年符下及第出郡國雅談一生不得力石曼卿下第集句云丨丨丨丨文章丨欲上青天未有因聖主不勞千里召嫦娥何惜一枝春鳳凰詔下須沾命豺虎叢中也立身啼得血流無著處朱衣騎馬是何人西清詩話杜羔得妻詩杜羔妻劉氏善詩羔纍舉不第將至家妻先寄詩曰良人的的有竒才何事年年被放回如今妾面羞郎面郎若來時近夜來羔見詩即回去尋登第又寄詩曰長安此去無多地鬱鬱蔥蔥佳氣浮良人得意正年少今夜醉眠何處樓南部新書孫山答友書孫山應舉綴名榜末朋儕以書問山得失答曰解名盡處是孫山餘人更在孫山外覽者大笑詩話考官事類得才唐孫逖為考功郎選貢士三年多丨俊丨罰俸唐大中中天官奏文星暗後三科覆試復落考官皆丨丨朝野僉載請託皆黜李昻主俊秀科集貢士曰如有丨丨當悉黜之唐史畏忌不取昌平間劉蕡對策詆宦官考官馮宿等見劉蕡策歎服而丨宦官丨丨丨詔下物論喧然李郃曰劉蕡下第我輩登科能無厚顔由是不得仕於朝唐書擺袖却金韋執誼從祖兄夏卿為吏部侍郎執誼為翰林學士愛財為人求科第夏卿不應乃探出懷中金以內夏卿袖夏卿擺袖引身而去實録投宿避甓謝史館泌解國學舉子黜落甚衆羣言沸搖懷甓以伺其出泌知潛由他途投史館避宿數日太宗聞之笑謂左右曰泌職在考校豈敢濫收小人不自揣分反怨主司然固須防避又問曰何官職騶導雄偉都人斂避左右奏曰唯臺省知雜呵擁難近遂授知雜以避擲甓之患名臣遺事獻阿房宫賦唐崔偃試進士東都吳武陵謂偃曰公方為天子求竒才敢獻所益因出袖中書偃讀之乃杜牧阿房宫詞坐客皆驚武陵曰牧方試有司請以第一人處之偃謝已得其人至第五偃未應間武陵勃然曰不爾宜以賦見還偃曰如教牧果異等吳武陵傳呈五色日賦李程正元中試日五色賦先已榜落初出試場楊於陵遇程詢其所賦程示之其破題曰德動天鑒祥開日華於陵覽之謂程曰公今須作狀元翌日無名於陵深不平乃於故册子末繕寫而斥其名字擕之以謁主文主文歎賞不已於陵曰當今場中若有此賦侍郎何以待之主文曰非狀元不可也於陵曰茍如此侍郎已遺賢矣此乃李程所作亟命取程所納卷對之一字不差遂擢為狀元國史歐公懲險怪嘉祐中士人劉幾纍為國學第一人驟為險怪之語學者翕然效之遂成風俗歐陽公深惡之會公主文決意痛懲凡為新文者一切棄黜時體為之一變歐陽之功也有一舉人論曰天地軋萬物茁聖人發公曰此劉幾也戲續曰秀才刺試官刷乃以大朱筆橫抹之自首至尾謂之紅勒帛判大紕繆字榜之既而果幾也後數年公為御試考官而幾在廷公曰除惡務本今必痛斥輕薄子以除文章之害有一士人論曰主上收精藏明於冕旒之下公曰吾已得劉幾矣既黜乃吳人蕭稷也是時試堯舜性仁賦有曰故得靜而延年獨髙五帝之夀動而有勇形為四罪之誅公大稱賞擢為第一人及唱名乃劉輝人有識之者曰此劉幾也易名矣公愕然久之因欲成就其名小賦有內積安行之德蓋稟於天公以為積近於學改為藴人莫不以公為知言主司或夢火山軍得名後歐公所取卷乃劉輝也筆談文正黜穿鑿景德二年御試得李迪以下先是迪與賈邊皆有名場屋禮部奏名皆不與取其文觀之迪賦落韻邊論當仁不讓於師以師為衆特令就御試王旦議落韻者失於不詳審舍注疏而立異論將令後生務為穿鑿遂取迪而黜邊國史詩集添蠟燭八月十五夜月色隨處好不擇茅簷與市樓况我官居似蓬島鳳咮堂前野橘香劔潭橋畔秋荷老八月十八潮壯觀天下無鵾鵬水擊三千里組練長驅十萬夫紅旗青蓋互明滅黑沙白浪相吞屠人生會合古難必此景此行那兩得願君聞此丨丨丨門外白袍如立鵠蘇子瞻催試官考校著麻衣我本山中人寒苦盜寸廪文詞雖少作勉強非天稟既得旋廢忘懶惰今十稔麻衣如再著墨水真可飲每聞科詔下白汗如流瀋此邦東南會多士敢題品芻蕘盡蘭蓀香不數葵荏貧家見珠貝眩晃自難審緬懷嘉祐初文格變已甚千金碎全璧百衲收寸錦調和椒桂釅咀嚼沙礫磣廣眉成半額舉步歸踔踸維時老宗伯氣壓羣兒凜蛟龍不世出魚鮪初驚淰至音久乃信知味猶食椹至今天下士微管幾左衽謂當千載後石室祠髙朕爾來又一變此學初誰諗權衡破舊法芻豢笑凡飪高言追衛樂篆刻鄙曹沈先生周孔出弟子淵鶱寢却顧老鈍軀頑朴謝鐫鋟諸君况才傑容我懶且噤聊欲廢書眠秋濤喧午枕東坡監試劉虛白昔與裴令公同硯席及公主文虛白猶是舉子試雜文日簾前獻一絶云二十年前此夜中一般燈燭一般風不知嵗月能多少猶丨丨丨待至公得蕉中鹿篝燈時見語驚人更覺揮毫捷有神學問此來多可喜文章非特巧爭新蕉中得鹿初疑夢牖下窺龍梢眩真邂逅兩賢時所服坐令孤朽得相因王介甫見玉花驄儀鸞供帳叨蝨行翰林濕薪爆竹聲風簾官燭淚縱橫木穿石槃未渠透坐窗不遨令人瘦貧馬百菆逢一豆眼明丨此丨丨丨徑思著鞭隨詩翁城西野桃尋小紅黃魯直禮部院作廟堂衣鉢從此丨丨添故事登庸丨丨亦相傳邵氏録春官桃李一旦聲名遍天下滿城桃李屬春官古詩焚香撤幕丨丨答進士丨丨待諸生同上要主賣公取他權勢丨明丨落却親情丨至丨陳彭年眼迷五色平生浪説古戰場過丨空丨日丨丨坡詩頭太冬烘主司丨腦丨丨丨錯認顔標作魯公同上知舉事類師旦風雅正觀中考功員外郎王師旦知貢舉時冀州進士張昌齡王公瑾並有俊才聲振京邑而丨丨考其文策全下舉朝不知所以及奏等第太宗怪無昌齡等名因召師旦問之對曰此輩誠有詞華然體性輕薄文章浮艷必不成令器臣若擢之恐後生相效有變陛下丨丨帝以為名言後並如其言崔羣美莊丨丨知舉歸其妻勸令求田羣曰豫有丨丨三十新榜所放三十人是也妻曰君非陸贄門生乎君掌文柄約其子簡札不令就試如以君為良田則陸氏一莊荒矣羣無以答唐餘録密扣私號楊大年為翰林學士適禮部試天下士一日會鄉里待試者咸云學士必持文衡幸預有以教之大年乃作色拂衣而入則曰丕休哉大年果知貢舉凡程文之用丕休哉皆中選而當時坐中之客亦半有不以為意而不用者聞見後録戒用疑事世傳歐公掌貢闈舉子問堯舜是幾種事公曰疑事不用使此乃南陽湯恱楊鸞問答見鄭文寶江表志詩集朱衣點頭歐陽公知貢舉日每遇考試卷坐後常覺一丨丨人時復丨丨然後其文入格不爾則無復與考始疑侍吏及回視之一無所見因語其事於同列為之三歎嘗有句云唯願丨丨一丨丨侯鯖録戰場迷眼李方叔為東坡客東坡知貢舉欲私之既而下第作詩送之曰與君相從非一日筆勢翩翩疑可識平生漫説古戰場過眼空迷日五色我慙不出君大笑行止皆天子何責青袍白苧幾千人知子無怨亦無德買羊沽酒謝玉川為我醉倒春風前歸家但草凌雲賦我相夫子非臞仙東坡遂失此人驥子墮地追風日未試千里誰能識習之實録葬皇祖斯文如女有玉色今年持槖佐春官丨丨丨丨誰塞責雖然一閧有竒偶博懸於投不在德君看巨浸朝百川此豈有意潢潦前願為霧豹懷文隱莫愛風蟬蛻骨仙山谷次前韻不負初心唐人知貢舉者有詩云梧桐葉落井亭隂鎖閉朱門試院深嘗是昔年辛苦地丨將今日丨丨丨後為下第者改為五言末云今日負初心中嵐齋記古今合璧事類備要前集卷三十八
