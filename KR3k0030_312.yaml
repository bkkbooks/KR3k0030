body:
  text: 古今合璧事類備要外集卷十二宋謝維新撰樂舞門樂舞樂舞發揮樂之用舞所以彰樂之文也自舜有干羽之舞説者用干羽武舞也用籥文舞也蓋用之於武事則為武舞用之於文事則謂之文舞故夫子論韶樂亦曰樂則韶舞則韶舞即文舞也厥後成周大司樂教國子以六代之樂舞而自帗舞以至於人舞又各别其所用之文然則尚矣然三代盛時用之於郊廟賓客朝覲之間皆有舞焉然又有天子之舞有諸侯士大夫之舞自禮樂不自天子出而春秋之季氏乃僣天子八佾之舞此夫子所以深為當世之嘆如此自是而後漢興奏之宗廟猶有以象德歌功為舞者此猶不失古者樂舞之本旨自漢魏以至於隋唐愈降而愈失所謂古人屈伸俯仰綴兆疾舒之文徒施之於燕飲酣歌之間甚而無威儀節度自創為淫俗之舞唐有天下如七德九功上元之舞本猶可以發揮一代制作之盛極其弊也縉紳之間如祝欽明之八風宫庭之內如天寶之霓裳羽衣胡旋等舞果何取其為舞哉當唐之盛時猶且若是則五代沈酣昏濁之際其事益可知哉天開我宋文明聚奎藝祖初興首陳樂本自竇儀文德武功之舞一定於創始於是三百年之間施之於宗廟朝廷祭祀燕饗而樂舞各有其制焉無他我朝之所重者唯在於太常也太常即古樂之流也間有用之於宫中之排當率用後代之舞雖近於舞之褻眤而所謂合乎禮樂法度威儀文辭之舞亦曷嘗因彼而廢此耶事類樂容舞者丨之丨注屈伸俯仰綴兆舒疾丨之丨也樂文舞者丨之丨也並記節音夫舞者以丨八丨而行八風左知德諸侯德盛而教奠賞之以樂故其治民勞者其舞行綴逺治民逸者其舞行綴短故觀其舞丨其丨左氏象功舞者丨丨白虎通蹲蹲丨丨舞我詩洋洋萬舞丨丨同上婆娑市也丨丨注丨丨舞也詩周旋丨丨象風雨樂記舞羽帝乃誕敷文德丨干丨于兩階七旬而有苗格注干楯羽翳也皆舞者所執修闡文教舞文舞于賓主階間抑武事書舞干賓牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已久何也對曰病不得其衆也咏嘆之淫液之何也對曰恐不逮事也發揚蹈厲之已蚤何也對曰及時事也武坐致右憲左何也對曰非武坐也聲淫及商何也對曰非武音也云云子曰夫樂者象成者也總干而山立武王之事也發揚蹈厲太公之志也武亂皆坐周召之法也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子夾振之而駟伐盛威於中國也分夾而進事蚤濟也久立於綴以待諸侯之至也樂記又昔者周公旦有勳勞於天下成王康王賜之以重祭朱干玉戚以舞大武八佾以舞大夏此天子之樂也記祭統舞教周禮大司樂以樂丨丨國子舞雲門大卷大咸大㲈大夏大濩大武注此周所存六代之樂黃帝曰雲門大卷言其德如雲之所出大咸咸池堯樂也言其德無所不施大㲈舜樂也言其德能大中國也大濩湯樂也言其德能使天下得其所也大武武王樂也言其德能成武功舞有樂師掌國學之政以教國子小舞凡丨丨帗舞有羽舞有皇舞有旄舞有干舞有人舞注鄭司農云帗舞者全羽羽舞析羽皇舞者以羽覆冒頭上衣飾翡翠之羽旄舞者氂牛之尾干舞者兵舞人舞者手舞社稷以祓宗廟以羽四方以皇辟雍以旄兵事以干星辰以人玄謂帗析五采繒今靈星舞手持之是也皇雜五采羽如鳳凰色持以舞人舞無所執以手袖為威儀四方以羽宗廟以人山川以干旱暵以皇並禮春官韎舞丨師下士一人府一人史一人舞者十有六人徒四十人掌教丨樂祭祀則帥其屬而舞之大饗亦如之旄舞丨人下士四人丨者衆寡無數府二人史二人胥二人徒二十人掌教舞散樂舞夷樂凡四方之以舞仕者屬焉凡祭祀賓客舞其燕樂籥舞丨師掌教國子丨羽吹籥祭祀則鼓羽丨之丨賓客饗食亦如之舞器司干掌丨丨祭祀舞者既陳則授丨丨既丨則受之賓饗亦如之並禮舞數隱公五年九月考仲子之宫將萬焉公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之於是初獻六羽始用六佾也左醉舞衛武公刺幽王飲酒無度天下化之沈湎淫液云云籥舞笙鼓又云曰既丨止屢丨仙仙賓之初筵歌舞幽王淫荒風化所行男女亟會於道路丨丨於市井爾東門之枌秉翟衛之賢者仕於伶官皆可以承事王者也簡兮簡兮方將萬舞日之方中在前上處碩人俁俁公庭萬舞云云左手執籥右手丨丨赫如渥赭公言錫爵值翿幽王淫荒遊蕩無度焉云云坎其擊鼓宛丘之下無冬無夏值其鷺羽又曰丨其鷺丨宛丘遍舞壬子頽饗五大夫樂及丨丨鄭伯聞之見虢叔曰寡人聞之哀樂失時殃咎必至今王子頽歌舞不倦樂祻也左莊公二十年萬舞魯宣公八年有事於太廟仲遂卒于垂壬午猶繹丨入去籥左題以旌宋公饗穆侯于楚丘請以桑林荀罃辭荀偃士丐曰諸侯宋魯於是觀禮魯有禘樂賓祭用之宋以桑林饗君不亦可乎舞師丨丨丨夏晉侯懼而退入於房去旌卒饗而還及著雍疾卜桑林見荀偃士丐欲奔請禱焉荀罃不可曰我辭禮矣彼則以之猶有鬼神於彼加之晉侯有間左襄十年詩必類晉平公與諸侯宴於溫使諸大夫舞曰歌丨丨丨齊高厚之詩不類荀偃怒且曰諸侯有異志矣左襄十六年吳札見丨公子丨來聘請觀於周樂丨舞象簡南籥者曰美哉猶有憾見舞大舞者曰美哉周之盛也見舞韶濩者曰聖人之𢎞也而猶有慙德聖人之難也見舞大夏者曰美哉勤而不德非禹其誰能修之見舞韶簫者曰德至矣哉如天之無不幬也如地之無不載也雖甚盛德其蔑以加於此矣觀止矣若有他樂吾不敢請已左襄公二十九年昭公僭丨丨謂子家駒曰吾何丨哉答曰朱干玉戚以舞大夏八佾以舞大武此皆天子之禮也公羊昭二十五季氏忍孔子謂丨丨八佾舞於庭是可丨也孰不可忍也語顔淵問丨丨丨為邦子曰樂則韶舞語陽阿舞夫足陳丨丨之丨淮南子又激楚清風丨丨之丨注高誘曰丨丨古之名倡也傳武神舞賦項莊舞沛公見羽鴻門羽留飲范增數目羽擊沛公羽不應增出謂丨丨曰汝入以劒丨因擊沛公莊入為壽畢曰軍中無以為樂請以劒舞因拔劒舞項伯亦起舞常以身翼蔽沛公有頃沛公從間道走軍巴渝舞高祖作丨丨丨長沙王舞袖不面舉上問之對曰臣地狹人微不足以回轉賓旅舞丨丨巴渝之丨白氏六帖高廟奏丨丨丨武德文始五行之舞文廟奏孝丨丨丨盛德文始四時五行之舞柸柈舞漢世唯有柈舞而晉世加之以柸反覆之也手以接丨丨反覆之也公莫舞丨丨丨相傳云項莊劒舞項伯以袖隔之使不得害漢高祖且語項莊云丨丨古人相呼曰公言公莫害漢王也今之用巾蓋像項伯衣袖之遺式晉樂志沭猴舞平恩侯許伯入第長信以府檀長卿起舞為沭猴與狗鬭司𨽻蓋寬饒劾長卿以列卿而丨丨丨失禮不敬許伯為謝良久乃解飛燕舞趙丨丨體輕能為掌上丨本傳河間王獻武帝時丨丨獻丨好儒與毛生等共采周官及諸子言樂事者以作樂記丨八佾之舞與制氏不相逺也平陽主言李延年侍上歌曰北方有佳人云云丨丨丨因丨延年女弟上召見實妙麗而善舞詔樂府習巴郡善歌舞高祖愛其舞丨丨丨丨之今巴渝舞是也晉樂志詔學士習沈佺期兼修文館直學士既侍宴帝丨丨丨舞回沈佺期為弄辭悅帝作俳優舞武帝撞萬石之鍾擊雷霆之鼓丨丨丨丨鄭女東方朔化民有道對破曹公舞袁談丨丨丨馬上丨三巴也七德九序宋元嘉元年文帝始定圓丘明堂及宗廟樂五年詔劉平張崔定南北郊及明堂儀注改天嘉中所用齊樂盡以韶為名工就位定協律校尉舉麾大樂令跪贊云奏懋韶之樂降神奏通韶牲入出奏潔韶帝入壇及還便殿奏穆韶帝初再拜舞丨丨工執干楯曲終復綴出就懸東繼舞丨丨工執羽籥獻爵於天神及太祖之座奏登歌帝飲福酒奏嘉韶就望燎奏報韶其鼓吹雜伎取晉宋之舊微更附益隋書治康凱安初隋有文舞武舞至祖孝孫定樂更文舞曰丨丨武舞曰丨丨舞者各六十四人文舞左籥右翟武舞左干右戚唐書遍舞六代宋齊代祀天地祭宗廟惟漢祠太一后土盡用室懸又太常任昉亦據王肅議云周官以六律五聲八音六舞大合樂以致鬼神以和邦國以諧兆庶以安賓客以悅逺人是謂六同一時皆作今六代舞獨分用之不懕人心遂依肅議祀祭郊廟備六代樂不舞六代隋文帝曰周官分樂享祀虞書止鳴兩懸求之於古無室懸之議何事人禮縟事神禮簡也云云推驗載籍初無郊禋宗廟遍舞六代之文於是不備室懸不遍舞六代被銀甲舞七德舞本名秦王破陳樂太宗為秦王破劉武周軍中相作樂曲及即位宴會必奏之謂侍臣曰雖發揚蹈厲異乎文容然功業由之被之樂章亦不忘本也封德彛曰陛下以聖武戡難陳樂象德文容豈足道哉帝矍然曰朕雖以武德興終以文德綏海內謂文容不如蹈厲斯過矣乃製舞圖仍命吕才以教樂工百二十八人丨丨丨執戟而丨舞初成蕭瑀曰樂所以美盛德形容而有所未盡帝曰方四海未定攻伐以平禍亂製樂陳其梗槩而已冠進德舞九功舞本名功成慶善樂太宗生於慶善宫正觀六年幸之宴從臣賞賜閭里同漢沛宛帝歡甚賦詩起居郎吕才被之管絃以童兒六十四人丨丨丨冠袴褶長褎漆髻屐履而丨號九功舞進蹈安徐以象文德並唐史舞象元氣高宗作上元丨舞者百八十人衣畫雲五色衣以丨丨丨其樂有上元二儀三才四時五行六律七政八風九官十洲得一慶雲之曲祠享皆用之舞播皇猷宣宗明於音律嘗製曲曰播皇猷皆方履高冠連袂而丨有曰蔥西踏歌隊者大率其詞言蔥嶺之西樂河湟故曰歸為唐民又有執幡節者如翔雲飛鶴之勢大中遺事命製舞圖太宗製舞圖命吕才以教樂工百二十八人詳見前畫按舞圖元宗與諸王按舞萬歲樓下命丨之謂丨丨丨明皇雜録求學士舞崔日用驟拜兵部侍郎宴內殿酒酣起為回波舞丨丨丨作鸜鵒舞晉王導補謝尚為掾導有勝會謂之曰聞君能丨丨丨丨一座傾想尚便著衣幘而舞令座上擊節為應俯仰有中旁若無人五經掃地祝欽明帝與羣臣宴欽明自言能八風舞帝許之欽明體肥醜據地搖頭睆目左右顧盻帝大笑吏部侍郎盧藏用嘆曰是舉丨丨丨丨矣長竿入神元宗御勤政樓張樂百伎羅列教坊女優王大娘善戴竿舞頭戴長竿施木山狀如瀛洲方丈命小兒持絳節立其上而舞中音節時劉晏以神童召見樓上帝命賦詩立進一絶曰樓前百戲競爭新只有丨丨妙丨丨誰謂綺羅畨有力猶自嫌輕更著人妃子甚嘉置晏於膝上為傅脂粉明皇雜録劒器冠時大厯中見臨頴李十二娘舞丨丨壯其蔚跂問其所師曰余公孫大娘弟子也開元三載余尚童稚觀公孫大娘舞劒器渾脫瀏灕頓挫獨出丨丨一人而已詩云昔有佳人公孫氏一舞丨丨動四方觀者如山色沮喪天地為之久低昂耀如羿射九日落矯如羣帝驂龍翔來如雷霆牧震怒罷如江海凝清光綘唇朱袖兩寂寞况有弟子傳芬芳臨頴美人在白帝妙舞此曲神揚揚與余問答既有以感時撫事增惋傷先帝侍女八十人公孫劒器初第一五十年間似反掌風塵澒洞皆王室梨園弟子散如煙女樂餘姿映寒白金粟堆南木已拱瞿塘石城草蕭瑟杜甫舞闢四門舞人十六執羽翟以四百列舞南子歌聖主無為化詔字歌南詔朝天樂奉字歌海宇修文化聖字歌雨露覃無外樂字歌闢土丁零塞字舞畢又丨丨丨丨之舞舞終皆稽首稱臣又一人舞億萬壽之舞南蠻傳又見下注舞為五字南蠻西舍利請獻夷中歌曲且令驃國進樂人工十二人服南詔服立闢四門舞筵四隅節拜合樂又舞人服南詔衣絳裙襦黑頭囊金袪直畫皮靴首飾抹額冠金寶花鬘襦上復加畫半臂執羽翟舞俯仰以象朝拜裙襦畫鳥獸草木文以五采雜華以象庶物或遂羽葆四垂以象天無不覆正方布位以象地無不載分四列以象四氣丨丨丨丨以象五行舞億萬壽見前帝詔遍為丨昵宴近臣及修文學士丨丨丨舞伎工部尚書張錫為談容娘舞將作大監宗晉卿為渾脫舞左衛將軍張治為黃麞舞帝常立視裴守真是時破陳慶善二舞舞入丨丨丨以丨頃樂闋乃坐守真并言二舞誠祖宗盛德然古無天子立觀者化育詒庇孰非厥功不應鼓舞别申嚴奉詔可聲態雄侈于頔嘗制孫吳順聖樂舞獻諸朝又教女伎為八佾丨丨丨丨號孫吳順聖樂軒舉自如王翰張嘉貞為本州長史偉其人厚遇之翰自歌以舞屬嘉貞神氣丨丨丨丨端凝若植馮常再遷太常少卿元宗常詔開元霓裳羽衣舞參以雲韶𨽻于庭定部諸工立縣間丨丨丨丨為高麗舞楊再思丨丨丨丨作胡旋舞安祿山晚益肥腹緩及膝奮兩眉若牽挽者乃能行丨丨丨丨帝前其疾如風復文武舞五代崔棁遷太常高祖詔太常丨丨丨二丨冬至高祖會朝崇元殿庭設宫縣之舞在北登歌在上文舞郎八佾六十有四人冠進賢冠黃紗袍白中單白練􅜵襠白布大口袴革帶覆左執籥右秉翟執縣引者二人武舞郎八佾六十有四人服平巾幘緋絲在大袖繡襠甲金飾白練􅜵錦騰蛇起梁帶豹文大口袴馬靴左執干右執戚執旌引者二人加鼓吹十二按負以態豹以象百獸率舞按設羽葆鼓一大鼓一金錞一歌蕭笳各二人王公上壽天子舉爵奏玄同三舉登歌登歌文同舉食文舞舞昭德武舞舞成功之曲禮畢高祖大悅賜梲金帛羣臣左右觀者皆嗟嘆之史改文武舞建隆元年判大卿寺竇儼上言三王之興禮樂不相沿襲洪惟聖宋建極一代之樂宜乎正名禋享燕會樂章固當易以新詞即詔儼專其事儼請丨周樂丨舞崇德之舞為文德舞丨丨衆成之舞為武功之舞詔行之復請禧祖室奏大善之舞順祖大寧翼祖大順宣祖大慶並從之修文武舞乾德四年十月詔太常寺自今大朝會復用二舞先是晉天福末戊虜亂華中原多故禮樂之器浸以淪廢上始命太常寺和峴講求丨復之皆如舊制云改二舞名淳化三年正月和㠓上言兄峴於乾德中丨丨丨之丨有六變之象每變各有樂章歌詠太祖功業今覩來歲正會之儀登歌五瑞之曲已從改制則文武二舞亦當更定其名望改文舞為化成天下之舞武舞為威加海內之舞又大中祥符五年有司言唐太清宫樂章皆明皇所作今崇奉玉皇聖祖及祖宗配位樂請上自為之壬子內出樂章十六篇示輔臣文舞曰發祥流慶武舞曰降真觀德備二舞人數治平二年李育言國家三年而躬一郊同殿而饗八室而舞者闕如名曰二舞實一舞也且如大朝會所以燕臣下而舞者丨其數郊廟所以薦天地配祖考而舞者減其半殊未為稱伏請南郊太廟文武丨丨各用六十四丨以備帝王之禮樂以明祖考之功德奏可長編定二舞容節楊傑奏本朝郊廟之樂先奏文舞次奏武舞武無容節六變一變象六師初舉所向宜北二變象上黨克平所向宜北三變象維揚底定所向宜東南四變象荆湖來歸所向宜南五變象卭蜀納欵所向宜西六變象兵還振旅所向宜北而南今舞者差失所向又文舞容節殊無法度乞丨丨丨丨丨及改所向以稱成功盛德傅武仲舞賦楚襄王既遊雲夢使宋玉賦高唐之事將置酒宴飲謂宋玉曰寡人欲觴羣臣何以娛之玉曰臣聞歌以詠言舞以盡意是以論其詩不如聽其聲聽其聲不如察其形激楚結風陽阿之舞材人之窮觀天下之至妙噫可以進乎王曰其如鄭何玉曰小大殊用鄭雅異宜弛式氏張之度聖哲所施是以樂記干戚之容推美蹲蹲七旬之舞禮設三爵之制頌有醉歸之歌夫咸池六英所以陳清廟協神人也鄭衛之樂所以娛密坐接歡欣也餘日怡蕩非以風民也其何害哉王曰試為寡人賦之玉曰唯唯夫何皎皎之間夜兮明月列以施光朱火曄其延起兮耀華屋而熺虛宜洞房黼帳袪而結組兮鋪首炳以焜煌陳茵席而設坐兮溢金罍而列玉觴騰觚爵之斟酌兮漫既醉其樂康嚴顔和而怡懌兮幽情形而外揚文人不能懷其藻兮武毅不能隱其剛簡惰跳狄聊踃消般紛拏文如兮淵塞沈蕩改恆常兮於是鄭女出進二八徐侍姣服極麗姁許于偷致態貌嫽妙以妖蠱兮紅顔曄其揚華眉連姢伊去以增繞兮自流睇而橫波珠翠的皪而照耀兮華圭飛髾所交而雜纎羅顧形影自整裝順微風揮若芳動朱唇紆清陽亢音高歌為樂之方歌曰攄豫意以𢎞觀兮繹精靈之所束弛緊急之絃張兮慢末事之委曲舒恢炱徒夾之廣度兮闊細體之苛縟嘉關雎之不淫兮哀蟋蟀之局促啓泰真之否隔兮超遺物而度俗揚激徴騁清角贊舞操奏均曲形態和神意協從容得志不劫於是躡節鼓陳舒意自廣遊心無垠逺思長想其始興也若俯若仰若來若往雍容惆悵不可為象其少進也若翾若行若竦若傾兀動赴度指顧應聲羅衣從風長袖交橫駱驛飛散颯蘇合沓徒合合并鶣􅝎燕居拉力合㧺徒合鵠驚綽約間靡機迅體輕姿絶倫之妙態懷慤素之潔清修儀操以顯志兮獨馳思乎杳冥在山峨峨在水湯湯傷與志遷化容不虛生明詩表指嘳息激昂氣若浮雲志如秋霜觀者增嘆諸工莫當於是合場遞進案次而俟埒材角妙夸容乃理軼態橫出瑰姿譎起盻般鼓則騰清眸吐哇烏佳咬烏交則發皓齒摘齊行列經營切擬仿佛神動回翔竦峙擊不致爽蹈不頓趾翼爾悠往暗復輟已及至回身還入迫於急節浮騰纍跪毁跗方無踏徒躐摩跌徒結紆形赴逺漼七罪似摧折纎穀蛾飛紛猋必遙若絶超􅦇鳥集縱弛武氏殟鳥骨殁沒蜲紆為蛇移姌冉嫋若雲轉飄曶體如遊龍袖如素霓五結􅱏力帝􅵚而拜曲度究畢遷延微笑退復次列觀者稱麗莫不怡悅於是歡洽宴夜命遣諸客擾而沼攘就駕僕夫正策車騎並狎巃力孔嵸則孔逼迫良駿逸足搶七良捍凌越龍驤橫舉揚鑣飛沫馬材不同各相傾奪或有踰埃赴轍霆駭電滅跖地逺羣暗跳獨絶或有宛絶鬱怒般桓不發後往先至遂為逐末或有矜容愛儀洋洋習習遲速承意控御緩急車音若雷驚驟相及駱漠而歸雲散城邑天子燕胥樂而不泆娛神遺老永年之術優哉遊哉聊以永日詩集舞館丨丨識餘基選舞袖低回丨丨翻杜佩玉丨丨鳴鑾罷歌舞王勃翳袖青娥丨長丨韓自笑丨丨燈前舞醉從丨丨趙女舞歲時新歌舞丨丨丨並杜甫煙霧散中堂舞神仙丨丨丨玉質樂曲裝腰佩琥珀裝腰佩龍香入領巾只因飛燕是前身共看剝蔥纎手舞凝神柳絮風前轉梅花雪裏春鴛鴦翡翠兩爭新但得周郎一顧勝珠珍東坡南歌子古今合璧事類備要外集卷十二
