body:
  text: 古今合璧事類備要别集巻七十三宋謝維新撰飛禽門鸎格物總論鶯大勝鴝鵒黑眉觜尖紅脚青遍身甘草黄色羽及尾有黑毛相間三四月間鳴聲音圓滑一名倉庚一名商庚一名鵹黄一名鸝鶹一名鸝鷓或謂黄粟留或謂之楚雀或謂之黄袍或謂之搏黍或謂之黄鳥皆此物也當椹熟時來在桑樹鳴則蠶熟應節趍時之鳥云事類有鳴春日載陽丨丨倉庚十月于飛倉庚丨丨熠熠其羽東山睍睆丨丨黄鳥載好其音凱風綿蠻丨丨黄鳥止于丘阿綿蠻集灌木黄鳥于飛丨于丨丨葛草出幽谷伐木燕朋友故舊也伐木丁丁鳥鳴嚶嚶丨自丨丨遷于喬木嚶其鳴矣求其友聲詩金衣公子明皇於禁苑中見黄鶯呼為丨丨丨丨天寳遺事詩腸皷吹戴顒春日携雙柑斗酒人問何之曰往聽黄鸝聲此俗耳砭針丨丨丨丨知之乎髙𨼆外書謂傳信鳥處士元藏機有二鳥大小類黄鸝每翔翥空中藏機呼之即至或令銜珠或令授人語丨之丨丨丨本出滄洲孔氏帖賈至秋興亭記當發生之晨則攢秀木於高砌見鶯其鳴矣潘炎林亭宴集序鶯出幽谷而初囀詩集恰恰啼自在嬌鶯丨丨丨杜日日啼東方欲曙花㝠㝠鶯啼相喚亦可聽乍去乍來時近逺纔聞南陌又東城或似上林翻下苑綿綿蠻蠻如有情欲囀不囀意自嬌羌兒弄笛曲未調前聲後聲不相及秦女學筝指猶澁須臾風暖朝日暾流音變作百鳥喧誰家少婦驚殘夢何處愁人憶故園伯勞飛過聲跼促戴勝下時桑田緑不及流鶯丨丨丨花間能使萬家春意閒有時斷續聽不了花去花枝猶裊裊還棲碧樹鎻千門春漏方殘一聲曉韋應物繞上林新鶯飛丨丨丨苑願入蕭韶雜鳳笙李白囀柔枝新鶯傍簷曉更悲孤音清吟丨丨丨口邊血出語未盡豈是怨恨人不知不食枯桑椹不㗸苦李花偶然弄樞機宛轉凌烟霞衆雛飛鳴何跼促自覘遊鱗啄枯木𤣥猿何事朝夜啼白鷺長在汀洲宿黑鵰黄鶴豈不髙金籠玉鈎傷羽毛三江七澤去不得風烟日暮生波濤飛去來莫上髙城頭莫下空園裏城頭饑烏拾腥羶空園燕雀争泥滓願為結舌含白雲五月六日一聲不可聞僧瑩徹妬歌童早晚飛來入錦城誰人教解百般鳴春風紅樹驚眠處似丨丨丨作艷聲韓愈和武相公早春聞鶯繫仙籍春雲薄薄日輝輝宮樹烟深隔水飛應為能歌丨丨丨麻姑乞與女真衣鄭谷深樹鳴上有黄鸝丨丨丨新澗隔葉音丨丨黄鸝空好丨杜蜀相髙枝抛過最好音聲最好聽似調歌舌更叮嚀丨丨丨丨低枝立金羽修眉黑染翎梅聖俞何處飛來四月田間麥穗稠桑枝生葚鳥啁啾鳳城綠樹知多少丨丨丨丨黄栗留歐陽永叔不知緣底事野花吹盡竹娟娟尚有黄鸝最可憐婭姹丨丨丨丨丨背人飛過北山前似欲訴芳菲醉裏春空盡江邊客未歸可憐鳴睍睆丨丨丨丨丨珍樹移時語殘花入眼稀離居亦幽獨求友莫相遲劉原父何處轉新哢丨丨丨丨丨間關出建章至清無奈玉更巧莫如簧谷口凄寒甚花隂淑景長上林棲處穏慎勿競雕梁石舍人何時雛脱􅙿仰聽金衣語偶窺鶯婦巢深穿喬木裏危挂弱枝梢啄􅀢雙雙子經營寸寸茅丨丨丨丨丨新哢響交交楊廷秀已過花時亦何恨好音終在恥争先谷外寒多故後遷丨丨丨丨丨丨丨不妨夏木綠參天張文潛臨汝四月聞鶯飛入栁隂多去處曉寒頋影惜金衣著意聽時不肯啼丨丨丨丨丨丨丨數聲只怕落花知楊廷秀樂府數聲嬌巧芳春天曉聽綠樹丨丨黄鸝丨丨粉蝶雙雙飛小橋邊尤待賣花人到艷歌妙舞陌上是處遊人歡笑對媚景嘆韶華倐忽相催年少情悄深院靜争奈玉人一去無音耗水逺山遙鱗鴻誰託思愛負我多少畫樓倚紅偎翠忘却枕前低告怎得固巧唇舌底説與花殘鶯老喜遷鶯燕格物總論燕𤣥鳥也齊曰燕梁曰乙大如雀而長布翅歧尾巢於屋梁間春社來秋社去故謂之社燕二種紫胷輕小者是越燕胷斑黒聲大者是絹胡燕俗呼胡燕為夏候其作窠喜長人言有容一匹者令家富窠户有北向及尾倔而色白者是數百嵗燕也名乙者取其鳴自呼亦象形字或從鳥事類差池燕燕于飛丨丨其羽注燕燕􅜈也差池謂舒張其羽翼詩邶國風燕燕詩啁啾至於燕雀猶有丨丨之頃焉作巢丨丨避戊巳日説文賀厦大厦成而燕雀相丨淮南子石化雲陵有石燕風雨則飛翔如貞燕湘中記火焚燕雀爭處於一屋之下子母相哺姁姁焉相樂以為安矣突决上焚棟宇燕雀顔色不變是何也不知禍之將及也吕氏春秋禖候𤣥鳥至至之日以太牢祠於髙禖注𤣥鳥燕也燕以施生時來巢人堂宇而孚乳嫁娶之象也丨氏之官以為丨記月令天女山見白燕則其君生貴女今俗呼燕為丨丨京房易司分少昊時𤣥鳥氏丨丨者也左昭十八遺卵秦之先顓帝之苗孫曰女修女修織𤣥鳥隕卵脩吞之生大業又髙辛氏娶有娀國是為簡狄祠於髙禖有𤣥鳥丨丨吞之生契並史記立祠髙辛氏之世𤣥鳥遺卵云云後王以為禖官嘉祥而丨其丨焉記月令注巢幕季札謂孫林父曰夫子在此如燕之丨於丨上左留爪呉宫燕呉宫人丨丨以記更來白氏帖照窟始皇時呉宫守吏以火丨燕丨誤燒其宫同上燕尾漢成帝時謡曰燕丨丨涎涎飛燕來啄皇孫皇孫矢燕啄矢注涎涎光净貌喻趙飛燕害皇子也燕頷人相班超丨丨飛而食肉萬里侯相也後封定逺侯本傳又呉元濟繫紅縷宋末有女姚玉京室有雙燕一秋為鷙鳥所獲其一孤不離庭户風起獨啾啾翔集玉京之臂似告别玉京以紅縷丨足明年丨丨如舊凡六七嵗玉京遇疾終明年燕來窺室間訝其無人周回累夕姚氏族泣語墳在南郭可往燕遂悲鳴至墳所亦死唐李公佐燕女墳記食蒺䔧沛國周氏生三子不語有一人就門乞食曰君有罪可還内思前愆其人曰昔為小兒時燕有三子試以指内巢中燕子開口乃以蒺䔧丨之吞之即死其母尋迴不見其子徘徊悲啼而去今甚悔之客曰此即是也續捜神記更巢共乳崔𤣥暐居父喪廬有燕丨丨丨丨孔氏帖入懷有孕張説母夢玉燕自東飛投丨丨中已而丨丨生説果為相開元遺事燕蟄井底或言丨丨於丨丨舊説燕不入室是井虛也取桐為男女各一投井中燕必來酉陽雜俎燕蟄河岸世言丨子至秋社乃去仲春復來昔年因京東開河岸崩見蟄燕無數晉郄鑒為兖州刺史鎮鄢山百姓饑餓或掘野鼠丨燕而食之乃知燕亦蟄爾驚蟄後中氣乃出非渡海也文昌雜錄燕蟄石穴余曩嵗冬間於呉興山中營先隴闢一山路路傍有數巨石其宂頗深試令僕輩斸之見鶯丨丨於其問者甚衆急掩之曰騐文昌之言為是而摭遺之説為非也苕溪集詩詒林甫張九齡為歸燕丨以丨丨丨其詩曰海燕何微眇乗春亦暫來豈羞泥滓賤只見玉堂開棲户時雙入華軒日㡬回無心與物競鷹隼莫相猜林甫賢之詩寄任宗長安富商任宗妻郭紹蘭能詩宗賈販湖海久之未歸紹蘭視堂任中雙燕祝之曰我聞爾海東來必曾經湘中為我附詩郎可乎燕即飛下止於膝紹蘭寫丨一絶繫于燕足燕徑去宗在荆州忽有燕繞身而飛止於肩足有小封視之乃妻所書也遺事此國烏衣唐王榭居金陵以航海為業遇風舟破榭附一板抵一洲見翁媪皆皂服曰此吾主人郎也引至宮室見王坐大殿左右皆婦人王皂袍烏冠金花閃閃翁以女妻榭榭問女曰丨丨何名曰丨丨國也王召宴於寶墨殿器皿俱黑命以玉盃勸榭曰入吾國漢有梅城今有足下王命作詩卒章云恨不此身生羽翼王曰雖不能與君生羽翼亦可令君跨煙霧宴歸女曰君詩尾句何相譏也王不悦遣人曰某日當回女取靈丹以崑崙玉合盛之遺榭曰此丹可召人神魂死未踰月者可使更生王命取飛雲軒既至乃烏氊兠子耳令榭入其中閉目少息已至其家梁上雙燕呢喃下視榭乃悟所止燕子國也至秋二燕將去悲鳴庭户榭書一絶繫燕尾曰誤到華胥國裏來玉人終日苦憐才雲軒飄去無消息淚灑春風㡬百回來春燕至尾有小柬乃所寄詩曰昔日相逢㝠數合如今暌逺是生離來春縱有相思字三月天南無鴈飛明年燕果不來拾遺舊時王謝楊德逢號湖隂先生丹陽陳輔浙西佳士也每嵗清明過金陵上冡事畢則至蔣山過湖隂先生之居清談終日嵗率以為常元豐辛酉癸亥頻嵗訪之不遇題一絶于門云北山松粉未飄花白下風輕日脚斜身似丨丨丨丨燕一年一度到君家湖隂歸見其詩吟賞久之曾稱於荆公公笑曰此正戲君為尋常百姓耳湖隂亦大笑王直方雜記詩集飛無力一燕海上來一燕髙堂息一朝相途遇依然舊相識問爾來何遲山川幾紆直荅言海路長風駃丨丨丨梁呉筠呼不歸梁上有雙燕翩翩雄與雌銜泥兩椽間一巢生四兒四兒日夜長索食聲孜孜青蟲不易捕黄口無飽期觜爪雖欲弊心力不知疲須臾十往來猶恐巢中饑辛勤三十日母瘦雛漸肥喃喃教語言一一刷毛羽一旦羽翼成引上庭樹枝舉翅不回顧隨風四散飛雌雄空中鳴聲盡丨丨丨却入空巢裏啁啾終夜悲燕燕爾勿悲爾當反自思思爾為雛日髙飛背母時當時父母念今日爾應知白居易燕詩示劉叟叟有愛子背叟逃去叟甚念之叟少年時亦嘗如是故作此以諭之聲窶窶銜泥燕丨丨丨尾涏涏秋去何所歸春還復相見豈不解决絶髙飛碧雲裏何為地上銜泥滓銜泥雖賤意有營杏梁朝日巢欲成不見百鳥畏人林野宿翻遭羅網俎其肉未若銜泥入華屋燕銜泥百鳥之智莫與齊韋應物語雙雙漢宫一百四十五多下珠簾閉鎻窻何處營巢夏將半茅簷烟裏丨丨丨杜牧村舍燕舊巢燕花開蝶滿枝花謝蝶還稀惟有丨丨丨主人貧亦歸武瓘初投巻知舉蕭倣賞其有存故之意遂及第舊時燕朱雀橋邊野草花烏衣巷口夕陽斜丨丨王謝堂前丨飛入尋常百姓家劉禹錫烏衣巷詩屋嫌低我丨汝丨丨不住雕梁畫閣也知寛大須穏擇安巢處莫到巢成却不安杜荀鶴社方見上國丨丨丨此鄉秋不歸為矜皇后舞猶著羽人衣拂水斜文亂銜花片影微盧家文杏好試近莫愁飛李商𨼆越燕傍誰飛舊壘危巢泥已墮今年故向社前歸連雲大厦無棲處更丨丨家門户丨章孝標歸燕詩獻庾侍郎傍主飛不獨避霜雪其如儔佀稀四時無失序八月自知歸春色豈相訪衆雛還識機故巢儻未毁會丨丨人丨杜甫歸燕嫌叢棘何許乗春燕多知辯夏䑓三時欲併盡雙影未嘗來食蘂丨丨丨衘泥怯死灰不如黄雀語能雪冶長猜揀杏梁年去年來來去忙春寒烟暝渡瀟湘低飛綠岸和梅雨亂入紅樓丨丨丨閒几硯中窺水淺落花徑裏得泥香千言萬語無人會又逐流鶯過短墻帶錦書馬上逢歸燕知從何處來貪尋舊巢去不丨丨丨回王荆公拂玉琴雙燕衘泥日深堂丨丨丨不教開閣户乃見主人心掠水飛殊捷迎風去已禁短書猶可寄聊爾託微吟梅聖俞依許待制送行詩韻咏燕以寄銜泥和草前村春社畢今日燕來飛將補舊巢闕不嫌貧屋歸丨丨丨丨梗側翅過柴扉豈比驚丸雀迎人欲拂衣梅聖俞飾釵伴鳳翬簷文杏暖蘭橑舊巢空石冷休翻雨簷開且待風丨丨聊丨丨傳信肯饒鴻欲問張公子蒼琅掩漢宫宋公景文古今合璧事類備要别集巻七十三
