body:
  text: 古今合璧事類備要别集卷八十四宋謝維新撰畜産門狗格物總論狗家畜以吠守種類不一犬懸蹄者尨多毛者獫長喙者􅀈獢短喙者猈步買反短脰者㺧黃色犬往之句反黃身黑頭犬㹿濁猛犬猘狂犬㹱宋良犬獹韓駿犬􅜏晏反獟犬能逐虎㹪所姦反惡健犬獒犬高四尺知人心可使者其名色之衆如此事類名槃瓠槃瓠者本高辛氏宫中老婦人有耳疾醫者挑治之有物如繭以瓠離盛之以槃覆之有頃化為犬其文五色因丨丨丨搜神記妻槃瓠昔高辛氏有犬戎之冦帝患其侵暴而征伐不克乃訪募天下有能得犬戎之將吳將軍者賜黃金千鎰邑萬家又妻以少女有畜狗其毛五彩名曰槃瓠下令之後槃瓠俄銜人頭詣闕下羣臣怪而診之乃吳將軍首也帝大喜且謂槃瓠不可妻之以女又無封官之道議欲報之而未知所宜女聞皇帝下令不可違信因請行帝不得已以女丨丨丨槃瓠得女負而走入南山石室中險絶人迹不至經三年生六男六女槃因自夫妻好色衣服製裁皆有尾其母復以狀白帝於是迎諸子衣裳斕斑言語侏􅍣好山壑不樂平曠帝順其意賜以名山廣澤其後滋蔓號曰蠻夷今長沙武陵蠻是也後漢南蠻傳少康逐犬丨丨丨丨而顛隕厥首注言丨丨因獵放犬丨獸於是舍所宿也楚辭西旅獻獒丨丨丨丨太保作旅獒尚書犬名鵠倉徐國宫人妊娠而産卵以為不祥棄於水邊孤獨老母有丨丨丨丨獵於水濵得所棄卵䘖以來歸獨母以為異覆暖之遂􅭨螂成小兒生時正偃故以為名徐君宫中聞之乃更收養長而仁智襲徐君國鵠倉臨死更生角而九尾實黃犬也偃王葬之今名狗壠偃王志犬曰善噬尹文子曰康衢長者字僮曰善搏丨丨丨丨賔客不過其門三年長者怪而問之以實對於是改之賔客復往狗死而埋仲尼畜狗死使子貢埋之曰吾聞弊帷不棄為埋狗也丘也貧無蓋於其封也亦與之席毋使其首陷焉記狗迎而吠楊朱之弟曰布衣素衣而出天雨解素衣衣黑衣而返其丨丨丨丨之楊布怒將撲狗楊朱曰子無撲矣子亦猶是也向者使汝狗白而往黑而來豈能無怪哉列子公嗾失獒晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下丨丨丨丨焉明搏而殺之盾曰棄人用犬雖猛何為鬬而出提彌明死之左人逐瘈狗國丨丨丨丨瘈狗入於華臣氏國人從之華臣皆遂奔陳左氏有犬欲噬晉仲將死謂桓公曰丨丨嘊嘊丨丨我假而不使也君必去之言易牙竪貂必為亂也管子求犬弗與秦伯有囓犬弟針欲請之秦伯不與針以百兩金易之又不聽因逐針而奪其爵左昭元年牽出上蔡李斯為趙髙所誣謀反具五刑論腰斷咸陽市斯出獄與其中子俱執顧謂中子曰吾欲與若復丨黃犬臂蒼鷹俱丨丨丨東門逐狡兔豈可得乎遂父子相哭而夷三族放之新豐漢髙祖以太上皇思豐沛故作新豐如豐沛道路人家雞犬丨丨皆識家白氏帖狡兔走狗范蠡之齊遺大夫種書曰丨丨死丨丨烹逐獸者狗漢髙祖曰諸公知獵乎為人丨丨丨丨也發迹指人者人也蕭何功人也屠狗為事樊噲以丨丨丨丨本傳走狗為樂宣帝好鬬雞紀丨丨丨丨本母前叱狗鮑永養後母至孝妻嘗於丨丨丨丨永即去其妻臺中三狗丁謐外似疏濫而內明慧雖與何晏鄧揚等同列而皆少之唯以聲勢屈於曹爽爽亦敬之言無不從故于時謗書謂丨丨丨丨啀􅀈不可當一狗憑默作蛆囊三狗謂何鄧丁也默者爽小字也其意言三狗皆欲囓人而畜蛆也上略怪狗上臺公孫淵未亡家數有丨丨冠幘絳衣丨丨魏志白犬自天王敦敗京都之後夢丨丨丨丨而下噬之孫盛晉春秋書繫犬頸陸機好獵在吳豪客獻一犬名黃耳機後仕洛戲語犬曰我家絶無書汝能馳往否犬搖尾作聲應之機為書盛以竹筒丨之丨丨犬出驛路走向吳飢則入草噬肉取飽每經大水輒依渡者弭毛掉尾向之其人憐愛因呼上船裁近岸即騰上速去及到機家開筒取書看畢犬又伺人作聲如有所求其家作答丨內筒復丨丨丨犬既得答仍馳還洛計人行五程犬往還才半月後犬死示之遣還葬去機冡二百步呼黃耳冡述異記瓠繫狗頸杜預初攻吳吳人憚其智以丨丨丨丨示之預恨之及平盡殺之本傳犬銜其衣諸葛恪元遜蘇峻謀害恪將出丨丨丨丨恪曰不欲我行出乘入坐少頃又㗸衣令從者逐之升車果被害犬救其主晉太和中楊生養狗甚愛之後生飲酒行大澤草中眠冬月野火起風又猛狗報喚生不覺前有一坑水狗便走往水中還以身灑生左右草沾水得著地火尋過去他日又暗行墮於空井中狗呻吟徹曉有人過怪之往視見生生曰君可出我當厚報君人曰以此狗相與便當相出生曰此狗曽活我於己死不得相與餘即無惜人曰若爾便不相出狗因下頭向井生知其意乃語路人以狗相輿人乃出之繫狗而去後五日狗夜走歸續搜神記狗報婦姦會稽勾章氏張然滯役在都經年不得歸家有少婦遂與奴私通然在都養一狗甚快名烏龍後假歸奴與婦謀欲得殺然然及妻作飯食共坐下食未得噉奴當户倚張弓括箭拔刀然以盤中肉飯與狗狗不取唯注睛舐唇視奴然亦覺之奴催食轉急然決計拍髀大喚曰龍狗應聲傷奴奴失刀伏倒地狗咋奴頭然因取刀斬奴以婦付官殺之搜神記狗如人立桂陽太守汝南韋叔堅少時為從事丨丨丨丨行家人皆言當即殺之叔堅云犬馬諭君子狗見人行效之何傷叔堅為縣送解冠榻上狗戴而走家人驚愕復云誤觸冠冠之挂著耳狗又於竈前畜火家益怔營復云兒婦在田中狗助畜火幸可不煩鄰里此又何怪遂不肯殺後數日狗自暴死卒無他異叔堅終享大位風俗通羣犬競走北齊徐之才與朝士出遊遙望丨丨丨丨諸士令目之之才應聲曰為是宋㹱為是韓盧為逐李斯東走為負帝女南征羣犬驚吠梁徐勉為侍中時師方侵魏候驛填委勉參軍書動經數旬一還家丨丨丨丨勉曰吾憂國忘家乃至於此吾亡後亦是傳中一事也郡無吠狗岑熙為魏郡太守人歌曰吠狗不驚足下生氂里無吠犬李栖筠為常州刺史丨丨丨丨蜀犬吠日庸丨之南常雨少日日出則犬吠栁越犬吠雪大雪踰嶺被南丨中數州數州之丨皆蒼黃丨噬狂走者纍日至無丨乃止並栁宗元書生男為狗北狗國人身狗首長毛不衣手搏猛獸語為犬皥其妻皆人能漢語丨丨丨丨生女為人自相婚嫁穴居食生而妻女人食熟嘗有中國人至其國其妻憐之使逃歸與其筯十餘隻教其每走十餘里遺一筯狗失追之見其家物必銜歸則不能追矣五代史不禁殺狗東坡云今日廂界有殺狗公事司法言近新書丨丨丨丨問其説出於禮鄉飲酒烹狗於東方不禁然則禮云賔客之牛角尺亦不當殺牛乎孔子曰敝帷不棄為埋馬也敝蓋不棄為埋狗也死猶不忍食其肉況可殺乎志林烹食寺狗膝元發少居鄉里寺中修業丨寺犬丨之僧笑曰能作滕先生偷狗賦即不申埋其破題僧惟不淨狗也宜偷餅餌引來猶擺續貂之尾索綯牽去難四顧兔之眸又云既欲思於實腹遂乃設於空喉取狗器也侯鯖録詩集桃花宫中有犬丨丨名絳繒圍頸懸金鈴先皇為愛馴且異指顧之間知上意珠簾未捲扇未開桃花搖尾長先至夜靜不離香砌眠朝飢只傍御床餧彩雲路熟不勞牽瑶草風微有時吠無何軒后鑄鼎成匆遺弓箭棄寰瀛迢迢松闕伊州上逺逐龍輴十數程兩目漣漣似垂淚骨見寒毛頓憔悴萬人見者倐傷心微物感恩猶若是韓盧備獵何足嘉西旅充庭空為瑞聞君奉詔修實録一字為褒應不曲白魚赤鴈且勿書願君書此懲浮俗李呈桃花犬歌呈修史錢侍郎烏喙丨丨本海獒幸我為之主食餘已瓠肥終不憂鼎爼晝馴識賔客夜悍為門户知我當北還掉尾喜欲舞跳踉趂僮僕吐舌喘汙雨長橋不肯躡徑度清深浦怕浮似鵝鴨登岸劇虓虎盜肉亦小疵鞭箠當貫汝再拜謝恩厚天不遣言語何當寄家書黃耳定乃祖蘇子瞻豫來儋耳得吠狗名烏喙甚猛而馴墮豫遷合浦過澄邁泅而濟路人皆驚戲作此詩貓格物總論貓能捕鼠獸或黑斑紋或赤斑紋或黃斑紋或黑白相間或黃白相雜非一色也目睛旦暮圓及午堅斂如線其鼻端常冷唯夏至一日暖俗言貓洗面過耳則客至一名蒙貴一名烏圓事類死願為髙宗后王氏及良娣俄為武后所殺良娣罵曰我後為貓使武后為鼠吾當扼其喉以報武后后聞之不恱詔六宫母畜貓因獻議崔祐甫為中書舍人朱泚軍中貓鼠相乳表其瑞宰相常衮率羣臣賀祐甫曰可弔不可賀代宗問故丨丨貓鼠丨來鵠貓虎説農民將有事於原野其老曰遵故實以全其秋庶可望矣乃具所嗜為獸之羞祝而迎曰鼠者吾其貓乎豕者吾其虎乎其幼戚曰迎貓可也迎獸可乎豕盜於田逐之而去虎來無豕餒將若何抑又聞虎者不可與之全物恐其決之之怒也不可與之生物恐其殺之之怒也如得其豕生而且全其怒滋甚射之穫胡化反之猶畏其來況迎之耶噫吾亡無日矣或有決於鄉先生先生欣然而笑曰為鼠迎貓為豕迎虎皆為害乎食也然而貪吏奪之又迎何物焉由是知不免乃撤所嗜不復議貓虎崔祐甫貓鼠議臣聞天生萬物剛柔有性聖人因之垂範作則禮記郊特牲篇曰迎貓為食田鼠也然則貓之食鼠載在禮經以其除害利人雖微必録今此貓對鼠不食仁則仁矣無乃失其性乎鼠之為物晝伏夜動詩人賦之曰相鼠有體人而無禮又曰碩鼠碩鼠無食我黍其序曰貪而畏人若大鼠也臣旋觀之雖云動物異於麋鹿麏兔彼皆以時殺獲為國之用貓受人養育職既不修亦何異於法吏不勤觸邪疆吏不勤扞敵又按禮部式具列三瑞無貓不食鼠之日以茲稱慶臣所未詳伏以國家化洽治平天符薦至紛綸雜沓史不絶書今兹貓鼠若以劉向五行傳論之正須申命憲司察聽貪臾誡諸邊候無失檄巡貓能致功鼠不為害韓愈貓相乳説司徒北平王馬燧家貓有生子同日者其一母死焉有二子飲于死母母且死其嗚咿咿其一方乳其子若聞之起而若聽之走而若救之銜其一置於其棲又往如之反而乳之若其子然噫亦異之大者夫貓畜也非性於仁義者也其感於所畜者乎北平王牧人以康罰罪以平理隂陽以得其宜國事既畢家道乃行父父子子兄兄弟弟雍雍如也愈愈如也視外猶視中一家猶一人夫如是其所感應召致其亦可知矣易曰信及豚魚亦其類也因敘之為貓相乳説詩集卧花陰纎鉤時得小溪魚飽丨丨丨興有餘自是鼠嫌貧不到莫慙尸素在吾廬林和靖籍錦茵白玉狻猊丨丨丨寫經湖上淨名軒吾方大謬求前定爾亦何知不少喧出沒任從倉內鼠鑽窺寧似檻中猿髙眠永日長相對更約冬衾共足溫張無盡鼠輩欺秋來丨丨丨貓死窺甕翻盆攪夜眠聞道貍奴將數子買魚穿栁聘含蟬黃魯直乞貓詩魚餐薄養得貓奴立戰功將軍細栁有家風一簞未厭丨丨丨四壁常令鼠穴空黃魯直謝周元之送貓兒護山房裹鹽近得小貍奴盡護山房萬卷書慙愧家貧䇿勳薄寒無氊坐食無魚陸務觀贈貓古今合璧事類備要别集
