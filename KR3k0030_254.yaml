  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_254-1a, image: WYG0941/WYG0941-0271a.png}
body:
  text: 古今合璧事類備要別集卷四十八宋謝維新撰果門柿附椑格物總論柿朱果也數種大者如楪圓八稜稍匾次者如拳又有如牛心者有如鴨卵雞卵者又有名鹿心者又一種至小如折二錢大號為猴柿然皆以少核者為佳皆八九月後方熟有如南劍尤溪柿處州松陽柿最為竒品其餘皆不及之事類嘉實俗謂柿有七絶一壽二多陰三無鳥巢四無蟲五霜葉可玩六丨丨七落葉肥大雜俎被實椑柿丨丨於長浦謝靈運賦鴻柿丨丨若瓜七欵烏柿梁侯丨椑之丨潘嶽賦鄭虔書丨丨好丨苦無紙慈恩寺貯柿葉數屋虔日取𨽻書嵗久殆遍小説退之詩韓丨丨青龍寺丨終篇言赤色莫曉其故嘗見小説云云九月柿葉赤而實紅則退之詩乃謂此也坡集椑梁園丨侯丨有烏椑八稜地理志又見前長浦前椑注詩集霜熟丨天丨柿栗韓愈陰合柿林緑丨丨白樂天石蜜與想見氷盤中丨丨丨柿霜韓愈金烏啄秋灰初吹季月琯日出卯南暉景短友生招我佛寺行正植萬株紅葉滿光華閃壁見神鬼赫赫炎官張火傘然雲燒樹大實駢丨丨下丨赬虬卵魂翻眼暈忘處所赤氣沖融無間斷有如流傳上古時九龍照耀乾坤旱二三道士席其間靈液屢進玻璃􅀢前人滋殊絶垂賁華林園柿味丨丨丨劉恭義味獨兼秋林黃葉晚霜嚴熟蒂甘香丨丨丨火傘赬虬浪褒拂風標却似色中黔劉屛山椑擅場紅葉曽題字烏椑昔丨丨凍乾千顆蜜尚帶一林霜核有都無底吾衰喜細嘗慙無瓊玖句報惠不相當楊誠齋樂府二寸紅珠味過華林芳蒂色兼陽井沉朱輕勻絳蠟裹團酥不比人間甘露神鼎十分火棗龍盤丨丨丨丨清含氷蜜洗雲腴只恐身輕飛去張仲殊棗格物總論棗實大者如雞卵小者亦如雞心大赤核小者為佳初淺碧色微白七八月方熟漸紅生噉清甘且脆取以日乾香味尤勝然其種不一所産亦有土宜又有一種可入藥用嘉實也事類酸棗樲丨丨孟注壺棗今江東棗大而鋭上者呼為丨丨棗猶瓠也細腰者今鹿盧棗爾雅細腰棗有狗牙雞心牛尾羊角獮猴丨丨之名廣雅赤心又有丨丨之名鄴中記籩實饋食之丨其丨棗周禮婦贄丨人之丨椇榛脯修棗栗記八月剝丨丨丨棗詩豳七月千户等安邑千樹棗其人與丨丨侯丨漢貨殖傳曽晳嗜丨丨丨羊棗曽子不忍食羊棗注實小而圓紫黑色俗呼羊矢棗孟子王母食尹喜共老子西遊省太真丨丨共丨玉文之棗其實如瓶尹傳漢武設七月七日西王母當下帝設玉門之棗內傳期生食李少君以却老方見上少君曰臣嘗遊海上見安期生食臣棗大如瓜漢郊祀志黃布裹蒸景公曰東海中有棗華而不實何也晏子曰昔秦繆公乘舟理天下丨丨丨丨棗至海而投其布故華而不實公曰吾佯問對曰嬰聞佯問者亦當佯對晏子春秋篋中何物漢武時上林獻棗上以杖擊未央前殿檻呼朔曰叱來先生知此丨丨丨丨朔曰上林之棗四十九枚上曰何以知之對曰呼朔者上也以杖擊檻者兩木也曰朔來朔來者棗也叱叱者四十九也上大笑賜帛千匹外傳取棗啖吉王吉少時學問居長安其東家有棗樹垂吉庭中吉婦丨丨以丨丨吉後知之乃去婦東家聞而欲伐其木鄰里共止之因請吉令還婦本傳以棗投琛蕭琛預御筵醉伏梁武帝丨丨丨丨琛乘取栗擲上正中面御史中丞在座動色曰此中有人不得如此豈有説耶琛答曰陛下投臣以赤心臣敢不報以戰栗上笑悅本傳圍棊啖棗魏文帝忌任在城王驍壯因卞太后所共丨丨並丨丨帝密以毒著諸棗中太后索水救之不及本史如厠食棗王敦尚武帝舞陽公主丨丨見漆箱中盛棗本以塞鼻敦謂厠上下果遂丨之羣婢莫不笑之本傳竊無核棗鄧太師仙去永樂有無核棗人不可得永樂道士侯道華丨食之神仙傳食無核棗河中永樂縣得無核棗有蘇氏女自少獲而食之不食五穀年五十嫁顔如處子自亂離後莫知其所同上檽棗異常石晉朝趙令公瑩家庭有丨丨婆娑丨丨四逺俱見望氣者訪其鄰里問人云此家今有登宰輔者不在其人在其子孫後令公由太原大拜北窗瑣言潘嶽笙賦棗下纂纂朱實離離宛其死矣化為枯枝人生不能行樂何以虛謐為詩集雞心浮華齊水麗垂彩鄭都竒白紛英靡靡紫色褾離離風搖羊角樹日映丨丨枝榖城踰石蜜蓬嶽表仙儀已聞安邑美永茂玉門垂梁簡文帝龜手皮皺似丨丨葉小如鼠耳君去作大車輪軸材須此白樂天坐自零黃葉離高柯丹棗丨丨丨不惜棗自零念我少弟兄傳玄從人打棗熟丨丨丨杜棗落青丨圃丨丨璣韓棗垂紅出籬大丨丨丨淺李賀壓枝繁秋來紅棗丨丨丨堆向君家白玉盤歐移根逺彼美秪園果珍同玉井船後期千嵗熟今日萬珠員地潤仍依信欄深自帶煙結花雖最晚藏核莫如堅大食丨丨丨畨禺託蒂連舊名稽藥録新實著詩篇甜出諸餳上香居百果前黑腰虛羡爾紅皺豈為然邂逅為公壽婆娑與世延暮鐘催酒散嘶馬引旗旋今作中州瑞元從異國傳何當廣栽植欲以慰飢年郭功父千嵗棗風落盡樹頭陽鳥飢啄棗破紅繞地青蠅老青蠅雨濕驚不飛殘棗入泥人不掃西丨丨丨鳥亦歸晉客齒黃空懊惱梅聖俞日曝乾丨顆丨丨紅玉軟風枝牽動緑羅鮮黃山谷赤心投種桃昔所傳種棗豫所欲在實為美果論材為良木餘甘入鄰家尚得饞婦逐况於秋盤中快噉取饜足風包墜朱繒日顆皺紅玉贄享古已然豳詩自宜録緬懷青齊間萬樹蔭平陸誰云食之昏慮智乃成俗廣庭觴聖壽以此參肴䔩願比丨丨丨聖明儻豫燭荆公栗子附榛格物總論栗子苞生大不止如杯刺多如蝟毛每枝不下五七個其中著實或單或雙或三或四數之少者其實大多者其實小苞青黃赤三色苞內實有殼殼紫黑色殼內膜黃白膜內肉亦然九月方收成熟時苞自發罅而實隨隕矣榛二種圓實壯下鋭上大者徑寸小者中指大味甘勝於栗也事類隰有丨丨栗詩山有樞山有丨丨嘉卉侯栗侯梅東門丨丨之栗韓詩楚室定之方中云云作于丨丨云云樹之榛栗詩女贄丨丨不過榛栗棗修籩實饋食之丨其丨栗周禮千樹燕秦丨丨栗其人與千户侯等漢書數升人有腳弱啖栗丨丨遂能行本草注中山丨丨好栗何晏論諸暨丨丨産如拳之栗地理志晝拾古者獸多民少皆巢居以避之丨丨橡栗暮棲樹上故命曰有巢氏莊子朝三宋有狙公者養狙成羣曰與若茅栗也丨丨而暮四足乎衆狙皆怒曰朝四而暮三足乎衆狙皆喜列子以栗擲柱宋劉秀之為丹陽尹先是秀之從叔穆之為丹陽與子弟廳事上宴廳事柱有一穿穆之謂曰汝等試丨丨遙丨丨入穿者必得此郡惟秀之入焉後果驗世説散栗於床王泰之幼敏悟年數嵗時祖母丨丨丨丨羣兒競之泰之獨不取人問其故答曰不取當自得賜人皆異之同上栗正中面蕭琛事見前棗類注栗綴於鼻殷七七名文祥能造須臾酒開頃刻花嘗於一官寮處飲酒取栗散於官妓皆聞異香惟笑七七者丨丨丨丨不可脫但聞臭氣須臾狂舞粉黛狼籍人為陳過栗方墜小説蔡雍作賦人有折蔡氏祠前栗者故丨丨丨栗丨云何根莖之豐美嗟夭折與摧傷詩集隨狙公嵗收橡栗丨丨丨杜元猿窟採栗丨丨丨韋應物不全貧園收芋栗丨丨丨杜不妨遲霜天熟柿栗收拾丨丨丨韓送張道士山果多丨丨丨瑣細羅生雜橡栗杜山家蒸丨丨丨栗暖杜栗過拳穰多丨丨丨栗似拳山丨丨丨應自飽穎濵芡苞同金莖氣已徑霜實繁林梢尺素走下𨽻一奩來逺郊中黃比玉質外刺同丨丨梅聖俞蒺䔧大天師攜此種至自上饒逺當時十七樹高幹寄孤巘蒼蓬丨丨丨紫殼檳榔軟蜀郡名果中推之為上選文與可來訪栗園遊困歸丨丨丨丨栗園樹老再生孫莫驚頭上見髮白拾栗兒童長幾畨石守道笑指栗香榾柮無煙雪夜長地爐煨酒熱如湯莫嗔老婦無盤飣丨丨灰中芋丨丨范石湖山翁服栗方老去自添腰腳病丨丨丨丨舊傳丨客來為説朝和晚三咽徐收白玉漿穎濵古今合璧事類備要别集卷四十八
