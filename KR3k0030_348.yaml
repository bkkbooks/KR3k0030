body:
  text: 古今合璧事類備要外集卷四十八宋謝維新撰珍羞門肉附鮓脯脩巴炙鱠海錯珍羞紀要肉食始於何代乎鴻荒之世茹毛飲血其漸也然義禮之家以為古者一為籩豆二為賓客三為充君之庖故非祭祀不肉非燕饗不肉非玉食不肉非不肉也葢肉食所難得之食不可得而常有也外此則惟年老者氣體浸衰非肉食不足以滋養故不肉則未見其能飽後世口體之欲横流不察古人之意惟務豪奢相尚所欲必濟以至一筯萬錢雖多殺物命不顧也其或肉食之不足者豈果天性之所安葢亦不能致之者矣然終亦耻其惡食之不如人也彼肉食者且不自知其已之非乃恃其膏粱氣習從旁而竊笑之亦惑之甚矣惟夫君子者有餘不求飽不足不自慊理義之悅我心甚於芻豢之悅我口故然耳以是而諗諸肉食者盍亦退而念之哉鮓菹也以米釀魚肉為之脯與巴腊肉炙燔肉鱠細切肉脩脯加薑桂其中海物惟錯併及之事類濡肉丨丨齒决乾肉丨丨不齒决記雜肉肴丨丨也漬肉腌丨丨也熟肉燔宗廟丨丨也並說社肉脤者爼實祭肉也生曰脹熱曰膰葢丨丨也殽胾熟肉有骨曰丨大臠曰丨釋文膾軒肉腥細者為丨大者為丨内則豆肉觴酒丨丨坊記藿肉醬酒丨丨鮑宣傳肉美丨之丨者猩猩之唇燕髀猩唇髦殘又封熊之掌翰音之跖象口又紫駞之峯見駞注肉飽六十非丨不丨孟登爼鳥獸之肉不丨於丨則公不射左窴堇丨丨於肉注堇烏頭毒藥也食者鄙齊師伐我公將戰曹劌請見其鄉人曰肉食者謀之又何間焉劌曰肉丨丨丨未能逺謀乃入見左莊十敗不食孔子魚餒而肉丨丨丨語不知味子在齊聞韶三月丨丨肉丨語如聞味人聞長安樂出門西向笑丨丨肉丨美則對屠門而嚼桓譚新論肉不至孔子為魯司㓂不用從而祭燔丨丨丨不稅冕而行不知者以為為肉也知之者以為為無禮也孟肉不受孟子曰繆公之於子思也亟問亟饋鼎丨子思不恱於卒也摽使者出諸大門之外北面稽首再拜而丨丨曰今而後知君之犬馬畜伋蓋自是䑓無饋也恱賢不能舉又不能養也可謂恱賢乎曰敢問國君欲養君子如何斯可謂養矣曰以君命將之再拜稽首而受其後廪人繼粟庖人繼肉不以君命將之子思以為鼎肉使已僕僕爾亟拜也非養君子之道也孟蒲作肉秦趙髙為丞相指鹿為馬持丨丨丨山為肉願舉秦山以丨丨曹植為呉質書䑕盗肉張湯為兒守舎丨丨丨烏攫肉黃霸使吏食於道旁丨丨其丨吏還霸迎勞曰乃為丨丨丨吏大驚以為霸知其起居不敢有隠也遺細君東方朔伏日詔賜從官肉太官日晏不來朔獨拔劒割肉謂同官曰伏日當蚤歸請受賜即懐肉去太官奏之朔入上曰昨賜肉不待詔以劍割肉而去何也朔免冠謝上曰先生起自奏朔再拜曰朔來受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何廉也歸遺丨丨又何仁也上笑曰使先生自責乃反自譽復賜酒肉本傳還逐婦蒯通曰里婦夜亡肉姑以為盗逐之諸母束藴請火於亡肉家曰犬暮得肉遽呼婦丨食惟一公孫𢎞丞相丨丨丨肉食無兼劉虞為上公丨丨丨肉分肉甚均陳平里中社平為宰丨丨丨丨本傳分肉取痩甄宇拜愽士毎臘詔賜愽士羊羊有大小肥瘦博士祭酒議殺羊秤分其丨又欲投鈎宇耻之云傷偶因丨丨者不復爭壁下三斤趙達嘗過故知取盤中隻著再從橫之乃言鄉東丨丨有美酒一斛又有鹿肉丨丨何以辭無呉永項上一臠晉元帝始鎮建業毎得一豚以為珍膳丨丨丨丨尤美輙以薦帝羣下未甞敢食時呼為禁臠肉謝琨傳王肅不食齊王肅歸魏初不丨羊肉及酪漿嘗食鯽魚羮渇飲茶茗汁髙帝曰羊肉何如魚羮茶茗何如酪漿肅曰羊陸産之最魚水族之長羊比齊魯大邦魚比茱莒小國惟酪不中與茗作奴彭城王勰曰卿不重齊魯大邦而愛邾莒小國明日為卿設邾莒之會亦有酪奴因呼茗為酪奴洛陽伽藍記建德不喜竇丨丨性約素丨丨食肉飯脫粟加蔬具得第可食楊收字藏之以母奉浮圖法自㓜不食母約曰爾丨進士丨乃丨丨勤學以干五代劉賛父玭為縣令賛始就冬衣以青布初襦毎食則玭自肉食而别以蔬食食賛於牀下謂之曰肉食君之禄也爾欲之則丨丨問丨丨禄吾肉非爾之食也由是賛益力學可割以啖秦叔寳破尉遲敬德功多帝勞曰使朕肉可食丨丨丨丨爾况子女玉帛乎不畏其食張說慰安羅拔野固等直詣其部宿帳下副使李憲以虜難信不可涉不測說報曰吾肉非黄羊丨丨丨丨唐史彊詔食肉李泌字長源初泌不食肉帝乃丨丨丨丨没身不肉歸登性甚慳嗇常爛一羊脾旋割旋噉封其殘者一日登妻誤於封處割食登大怒其内由是丨丨丨食丨比夢瑣言妾必粱肉隴西王愽義有妓丨數百人皆衣羅綺食丨丨丨母亦品肉頡利子疊羅支有至性旣舎京師諸婦得供品肉羅支預焉其母最後至不得給羅支不毁嘗品肉帝聞嘆曰天禀仁孝詎限華夷哉遂給母肉嗜肥猪肉張齊賢僕射毎丨丨丨丨數斤詳見胡餅注皮日休食箴并序皮子少且賤至於食自甘粢糲而已未甞食於鄉里食於親戚食於州鄙有鄧邑大夫嚮皮子之名曾未相贄具厚羞以賓之皮子辭大夫訂之曰子自甘粢糲則可矣於鄉里親戚州鄙何有皮子曰一杯之食至鮮矣茍專其味必不能自抑旣不能自抑日須豐其羞旣日須豐其羞則貧也不能無不足因是妄求茍欲之心生窮貪極嗜之名生且大夫不能見前世之味禍乎故羊斟不及華元受其謀黿羮不均子家肆其禍熊蹯不熟殺宰夫而趙穿弑雙雞易鶩饋子雅而慶舎死嗚呼吾如何者乎誠賴其用所欲不可求所嗜不可得方自甘粢糲而已使我生於鍾鼎之家膏粱之門日縱異嗜年成竒欲未必不為御者之奔華元也子家之伐靈公也晉靈之殺宰夫也盧蒲癸之殺慶舎也此猶之貪獸爭食而死者矣故食於天子者則死其天下食於諸侯者則死其國食於大夫者則死其邑食於下者則死其家又焉能以鄉里親戚州鄙為讓乎大夫曰善自惟食之性不能自節亦由酒之性也復箴以自符箴曰寧能我食不食於人旣食於人是食其身蘇子瞻老饕賦庖丁鼓刀易牙烹熬水欲新而釡欲潔火惡陳而薪惡勞九蒸暴而日燥百上下而湯鏖嘗項上之一臠嚼霜前之兩螯爛櫻珠之煎蜜滃杏酪之蒸羔蛤半熟而含酒蟹㣲生而帶糟葢聚物之妖美以養吾之老饕婉彼姬姜顔如李桃彈湘妃之玊瑟鼔帝子之雲璈命仙人之蕚綠華舞古曲之欝輪袍引南海之玻瓈酌凉州之蒲萄願先生之考夀分餘瀝於兩髦候紅潮於玉頰驚暖響於檀槽忽纍珠之妙唱抽獨繭之長繰閔手倦而少休疑吻燥而當膏倒一缸之雪乳列百柂之瓊艘各眼灔於秋水咸骨醉於春醪美人告去已而雲散先生方兀然而襌逃響松風於蟹眼浮雪花於兎毫先生一笑而起𣺌海濶而天髙鮓蛟鮓漢昭帝時釣得丨長三丈帝曰此魚鱔之類命太官為丨骨青肉紫食之甚美帝更求之不獲龍鮓陸機餉張華鮓華曰此丨肉也遂以苦酒沃鮓鮓中有五色光機還問鮓主果曰園中茅積下得一白魚狀殊常以作鮓過美魚鮓孟宗字武恭為監魚池司馬自結網取丨作丨寄母母曰汝為丨官而獲丨奈何不避嫌也遂還之蚶鮓陶侃作漁吏遺母丨丨封母以書責侃云云鮀鮓王瑩代謝超宗為義興太守與謝交惡超宗到都後父懋往超宗處超宗設精白丨美丨獐巴懋問那得佳味超宗詭言瑩始見餉佯驚曰大人豈應不得邪懋大忿言於朝廷稱瑩供養不足坐失廢棄乆之茂貞食唐昭宗至鳯翔帝輟所御膳賜全誨等丨丨丨鮓美帝曰此後池魚茂貞曰臣養魚以候天子聞者皆駭韓全誨傳陳陶嗜丨丨所居不與俗接唯丨鮓一㗖或至十臠江南野史蘆菔鮓白樂天方齋劉禹鍚饋蘆丨丨文傳含風鮓房夀六月調羊酪造丨丨丨叩頭録鱘魚鮓潤州土貢丨丨丨地理志野猪鮓安禄山恩寵莫此其所賜品自有丨丨丨雜爼齊王融謝司馬賜魚鮓啓東越水差寔鏧乘時之美西荆任土方揖鮓魚之最云云脯噬腊肉乾肉脯丨丨脩脯也說文又腊人掌丨丨凡田獸之脯腊膴胖之摶縮脯丨也乾燥相摶着也脩丨也乾燥縮也釋名腒鱐丨乾雉丨乾魚禮注婦贄丨之丨脯脩記女贄丨丨不過榛栗棗脩以告䖍也注脩脯朐䏞旣以脯脩置左丨右丨注取便也屈中曰朐音衢禮尹祭祭宗廟之禮脯曰丨丨腵脩並禮設脯一束楚成王聞子文朝不及夕毎朝丨丨丨丨國語賜脯二束趙宣子將之絳見翳桑之下有餓人宣子與脯二朐拜受而不敢食問其故曰臣有母持以遺之宣子更丨之丨丨丨而去以脯遺公魯昭公奔齊齊使髙子丨丨丨丨公衽受賣脯連騎濁氏以丨丨而丨丨注以湯燖羊胃以椒薑也市脯不食孔子丨丨丨丨束脩以上孔子曰自行丨丨丨丨吾未嘗無誨焉並語待客以脯陳蕃丨丨拌飯丨鹿丨芼羮以牛脯未嘗别為異饌董謹續豫章記犒師以脯劉表出軍左慈詣劉表請犒軍有酒一器丨一盤萬人皆周而酒器如故脯亦不減神仙傳疑虞為盗桑虞嘗行宿寄逆旅同舎客失脯丨丨丨丨丨黙然便解衣哺帝傷指代宗睿真皇后沈氏河南為史思明所没遂失后所在德宗即位令州縣物色咨訪髙力士女頗能言禁中事與女官李真一嘗從后㳺年狀差似后甞削脯丨丨丨左丨髙亦剖𤓰傷指孔氏六帖膳擗麟脯王逺至蔡經家與麻姑共設肴丨丨丨丨而行之神仙傳饌有虬脯周昌公主上贈御丨丨紅丨丨非虬也但貯於盤中則虬健如虬絲髙一尺唐杜陽編巴那得佳味王瑩事見前鮓注膾細者為肉腥丨丨丨膾大者為軒記内則聶而切牛與羊魚之腥丨丨丨之為膾上文注膾非芥魚丨丨丨丨醬不食記鱠用薤凡丨春用葱秋丨丨禮膾不厭孔子丨丨丨細語膾所同曽晢嗜羊棗而曾子不忍食羊棗公孫丑問曰膾炙與羊棗孰美孟子曰膾炙哉公孫丑曰然則曾子何為食膾炙而不食羊棗曰丨炙丨丨也羊棗所獨也孟盡心下鯉魚供膾姜詩母好生魚及江水其妻取水不及時詩乃棄妻妻棄鄰家甞作鱠請鄰母送之詩感之乃呼妻還其舍中庭忽有湧泉味如江水水中毎日躍丨丨一雙以丨母丨其孝感如此後本傳鯔魚作鱠介象字元則與吳王論膾何者最美象曰海中鯔魚為上美也令於殿前庭中作方坎汲水滿之象垂綸於坎中食頃得丨丨丨丨盤中魚鱠左慈字元放以銅丨盛水釣水丨引出丨丨皆長三尺以作丨呉中鱸鱠張翰事見蓴菜註詳鱠化為魚呉王行江中食丨有餘棄於水丨丨丨今有王餘魚是也亦名丨骨也鱠化為蝶進士段碩常識南孝廉者善斫鱠縠絲縷輕可吹起操刀響捷若合節奏因㑹客衒技先起魚架之怱暴風雨雷震一聲丨悉丨丨胡丨飛去南驚懼遂折刀誓不復作潘岳西征賦華魴躍鱗素鱮揚鬐饔人縷切鸞刀若飛應刀落爼霍霍霏霏紅鱗粉其初載賓客聳而遲遲云云張景陽七命命支離飛霜鍔紅肌綺散素膚雪落婁子之毫不能厠其細秋蟬之翼不足擬其薄張景陽七發累如疊縠離若散雪輕隨風飛刄不轉切炙無嘬丨丨注謂一舉盡臠近貪禮處外鱠炙丨丨同上馬行紂宫九市車行酒丨丨炙帝王記魚薦屈建曰祭典庶人有丨炙之丨無異嗜孟子曰嗜秦人之炙丨以丨於丨吾炙夫物則亦有然者也然則丨炙亦有外歟孟告子何為食曾子事見前鱠吳女爭丨王闔閭丨嬌恣嘗與王丨食魚炙怨恚而死風土記欒寧食丨丨行爵丨炙將欲飲酒炙未熟顧榮啖丨丨與同僚宴飲見執炙者狀貌不凡有欲炙之色榮割炙啖之曰豈有終日執之而不知其味及趙王倫敗榮被執其人為督率救榮得免重牛炙王羲之年十二周顗異之曰丨丨心丨座客來未噉先割啖羲之乃知名饋牛炙杜甫字子美客耒陽㳺岳祠大水遽至涉旬不得食縣令具舟迎之令嘗丨丨丨白酒駞峯炙將軍曲良翰能為驢騣丨丨丨唐酉陽雜爼蛤蜊炙吐突承璀嗜丨丨丨傳芳畧記炙鼃炙飲食有丨丨丨丨雜爼柳宗元嶺南節度饗軍堂記燔炰胾炙之物均飫于卒士詩集厭梁肉甲第紛紛丨丨丨杜鮓飯兼蘆香飯丨苞丨杜脯修有熊腊秦烹惟羊羮隴饌丨丨丨坡炙冷炙殘杯與丨丨到處潜悲辛杜將炙丨丨啖朱亥李白峽客行羅酒炙絲竹丨丨丨韓縣齋羞雞炙竹筯丨丨丨並韓鱠盤雪饔子左右揮霜刀鱠飛金丨白丨髙杜觀魚歌庖霜丨丨膾𤣥鯽韓銀絲鮮鯽丨丨鱠杜錦縷膾長抽丨丨白居易飽魴魚魴魚肥美知第一旣懽娯亦蕭瑟杜工部鱠長鯨意在斬巨鼇何論丨丨丨李放筯金盤空落椹何曾白紙濕丨丨未覺丨丨丨杜拂机霜刄揮雙鰓呀呷鬐鬛張䟦剌銀盤欲飛去呼兒丨丨丨丨丨紅肥花落白雪飛李白酬雙魚見贈海錯珍莫踰舊聞通印名海錯丨丨丨大氣爍鱗鬛齒香泛庖厨泥泥子盈胞鮮美禍所區生如粒芥㣲多若囊粟儲他年想吞舟勿輕此錙銖一咀命千百雖甘汝安旡窮冬孚乳時罩麗海為虚含凍體猶濕得暍味已渝虐戯等刳孕淫刑㡬戮孥人深襁褓㤙在物愛豈殊聞風易殺子盥水沉其軀詎有惻怛心旁推及豚魚相殘人餮徒自殘獸不如哦詩化蠻僚因警饕劉彦冲詠子魚古今合璧事類備要外集卷四十八
