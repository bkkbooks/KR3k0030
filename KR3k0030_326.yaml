body:
  text: 古今合璧事類備要外集卷二十六宋謝維新撰法令門詞訟附兄弟婚姻田土告訐詞訟明戒詞訟所以訴不平於有司者也人之情不能無曲直然曲者求以掩夫直而直者又未能有以自白此訟之所由以興也然為之有司者將欲以公其是非正其曲直必使直者伸而曲者不得以校設使有司者胸中無學術與見識不審其理之是非不察其情之曲直則將是非貿亂曲直倒植姦偽滋生競訟紛起乂欲嚴刑禁之不可得矣况又胥吏舞文旁緣為欺者哉况又賄賂行權私情囑託者哉嗚呼訟者所以訴不平於有司者也而有司者又所以平其不平者也今若此是使直者終無所伸曲者終有所曲惟見其訴于縣者為不足而訴于州訴于州者之為不足而訴于監司否則又訴于臺部訴于朝廷至煩上之人處分將焉用彼哉夫柝人之圭儋人之爵食人之祿則必任人之事而視民間事以為凂巳者已為可誅然有志在於慕溫飽貪榮進當愁醉醲當飢飽鮮囊金匱帛笑與秩終思所以為進身計思所以為田宅計思所以為子孫計而於斯民事不啻如越人視秦人肥瘠忽焉不加喜戚於其心善民怵而為姦邪願民陷而之刑戮泯泯棼棼何時已耶易曰訟有孚窒惕中吉終凶利見大人蓋惟見大德之人則吾之曲直是非可得而明白矣則亦可以使斯人之無訟矣否則吾未見其可也事類赴訴天下之欲疾其君者皆欲丨丨於王孟子梁惠王上紛爭丨丨辨訟非禮不決記曲禮中吉訟有孚窒惕丨丨終凶利見大人不利涉大川下險彖曰訟上剛丨丨險而健訟小有言初六不永所事丨丨丨終吉象曰不永所事訟不可長也雖丨丨丨其辨明也歸逋竄九二不克訟歸而逋其邑人三百戶無眚象曰不克訟丨丨丨也自下訟上患至掇也復即命九四不克訟丨丨丨渝安貞吉訟元吉九五丨丨丨以中正也訟受服上九以丨丨丨不足敬也並易信而止司市掌市之治教政刑量度禁令以質劑結丨手丨丨訟注質劑謂兩書一札而别之也若今下書言保物要還矣禮治其爭古之為市也以其所有易其所無者有司者治之耳注古者市置有司丨丨丨訟不征稅也速我訟誰謂鼠無牙何以穿我墉誰謂汝無家何以丨丨丨雖丨丨丨亦不汝從詩內自訟吾未見能見其過而丨丨丨者也論語禁民訟以兩造丨丨丨入束矢於朝然後聽之注訟謂以財貨相造者造至也使訟者兩至既兩至使入束矢乃治之不入束矢則是自服不直者也入矢者取其直也曲禮以邦典定凡諸侯之獄訟丨丨丨丨之以邦法斷凡卿大夫之獄訟丨丨丨丨之以邦成弊凡庶民之獄訟以丨丨丨之以五聲聽丨丨丨丨獄訟求民情一曰辭聽二曰色聽三曰氣聽四曰耳聲五曰目聽以三刺斷丨丨丨丨庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民聽萬民之所刺宥以施上服下服之刑並禮秋官嗣子嚚訟放齊曰丨丨朱啓明帝曰吁丨丨可乎注言不忠信為嚚又好爭訟召伯聽訟行露丨丨丨丨也詩僖公無訟泮水頌丨丨也不告于訩在泮獻功注僖公還在泮宫又丨爭丨之事告者乎詩家父究訩丨丨作誦以丨王丨注家父大夫箋云究窮也作此詩而為王誦之以窮極王之政所以致多訟之本意詩節南山孔子猶人丨丨曰聽訟吾丨丨也必也使無訟乎語夢訟弗勝中行獻子將伐齊丨與厲公丨丨丨公以戈擊之首墜於前跪而戴之奉以走見梗陽之巫臯他日見諸道與之言同巫曰今兹主必死若有事於東年方則可以逞獻子許諾左襄十七夢訟而爭鄭人有薪於野者遇駭鹿御而擊之斃之恐人見之也遽而藏諸隍中覆之以蕉不勝其喜俄而遺其所藏之處遂以為夢焉順塗而詠其事傍人有聞者用其言而取之既歸告其室人曰向薪者夢得鹿而不知其處吾今得之彼直真夢者矣室人曰若將是夢見薪者之得鹿邪詎有薪者邪今真得鹿是若之夢真邪夫曰吾據得鹿何用知彼夢我夢邪薪者之歸不厭失鹿其夜真夢藏之之處義夢得之之主爽且案所夢而尋得之遂訟而爭之歸之士師士師曰若初真得鹿妄謂之夢真夢得夢妄謂之實彼真取若鹿而與若爭鹿室人又謂夢認人鹿無人得鹿今據有此鹿請二分之以聞鄭君鄭君曰嘻士師將復夢分人鹿乎訪之國相相曰夢與不夢臣所不能辨也欲辨竟夢唯黃帝孔丘今亡黃帝孔丘孰辨之哉且徇士師之言可也列子周穆王篇衛侯不勝衛侯與元咺訟寧武子為輔針莊子為坐士榮為大士丨丨丨丨殺士榮刖針莊子謂寧俞忠而免之執衛侯歸之子京師置諸深室八寧子職納槖饘焉左僖二十子豐欲訴鄭丨丨丨丨鄭僖公於晉而廢之子罕止之襄七王叛孫蘇周公將與丨丨丨丨訟于晉王叛王孫蘇而使尹氏與聃啓訟周公于晉趙宣子平王室而復之文十四晉執陳生王使王叔陳生訴戎于晉晉人執之襄四郤犫取貨會于沙隨宣伯貨丨丨訴公于晉侯晉侯不見公成十六獻子求貨邾人城翼魯取邾師邾人訴于晉晉執叔孫婼使與邾大夫坐叔孫曰列國之卿當小國之君固周制也邾又夷也寡君之命介子服回在請使當之不敢廢周制也乃不果坐使各居一館士伯聽其辭而訴諸宣子乃皆執之士伯御叔孫從者四人過邾館以如吏先歸邾子范丨丨丨丨於叔孫申豐以貨如晉叔孫曰見我吾告女所得貨見而不出昭二十三聽於士丐王叔陳生與伯輿爭政王右伯輿陳生怒出奔及河王復之殺史狡説焉不入遂處之晉侯使士丐平王室王叔與伯輿訟焉王叔之宰與伯輿之大夫瑕禽坐獄於王庭士丐聽之王叔之宰曰蓽門圭竇之人而皆陵其上其難為上矣瑕禽曰昔平王束遷吾七姓從王牲用備具王賴之而賜之騂旌之盟曰世世無失職若蓽門圭竇其能來東底乎且王何賴焉今自王叔之相也政以賄成而刑放於寵官之師旅不勝其富吾能無蓽門圭竇乎唯大國圖之下而無直則何謂正矣范宣子曰天子所右寡君亦右之所左亦左之使王叔與伯輿合要王叔氏不能舉其契王叔奔晉襄十正於州犂楚侵鄭至城麋穿封戍囚鄭皇頡公子圍與之爭之丨丨伯丨丨犂曰請問於囚乃立囚曰所爭君子也其何不知上其手曰夫子為王子圍寡君之貴介弟也下其手曰此子為穿封戍方城外之縣尹也誰獲子囚曰頡遇王子弱焉戍怒抽戈逐王子圍弗及楚人以皇頡歸襄二十六欒祁訴盈欒桓子娶於范宣子生懷子范鞅以其亡也怨欒氏故與欒盈為公族大夫而不相能桓子卒丨丨與其老州賓通幾亡室矣懷子患之祁懼其討也丨諸宣子曰丨將為亂云云其謀如是懼害一於主吾不敢不言范鞅為之證遂逐之襄二十季姒訴展季公鳥娶妻於齊鮑文子生申公鳥死季公亥與公思展與公鳥之臣申夜姑相其室及丨丨與饔人檀通而懼乃使其妾抶巳以示秦遄之妻曰公若欲使余余不可而抶余又訴於公甫曰展與夜姑將要余秦姫以告公之公之與公甫告平子平子拘展於市而執夜姑遂殺之昭二十五南子訴戍衛公叔文子卒衛侯始惡其子公叔戍以其富也戍又將去夫人之黨夫人丨丨丨曰丨將為亂明年逐之莒訴于晉莒牟夷以牟婁及防兹來奔丨人丨丨丨晉侯欲止公范獻子曰不可請間而以師討焉昭五又如晉至河乃復取郠之役丨人丨丨丨晉有平公之喪未之治也故辭公昭十二邾訴于晉會于平丘丨莒人丨丨丨曰魯朝夕伐我幾亡矣我之不共魯故之以晉侯不見公子服惠伯對曰君信蠻夷之訴以絶兄弟之國棄周公之後亦唯君寡君聞命矣叔向曰云云魯人懼聽命昭十三朱訴于楚蔡人出朱而立東國丨丨丨丨楚人將討蔡費無極取賂居東國曰云云昭二十一訟而赦罪鄭𢎞字巨君師焦貺楚王英反引貺貺被收疾病於道亡殁妻子禁制獄諸生懼連及乃皆變姓名逃罪𢎞獨髠頭負鑽訟貺罪顯宗赦其家𢎞躬送貺喪及妻子還鄉里訟以求直陳實為太邱長修德清靜百姓以安鄰縣民歸附者實輒訓導譬解發遣各令還本司行部吏慮民有訟者白欲禁之實曰丨丨丨丨禁之理將何申之勿有所拘司官聞而歎息曰陳君所言若是豈有寃於人乎亦竟無訟者劉陶上書宦者趙忠喪父僣為玉匣朱穆下郡案驗吏遂發墓剖棺帝聞之大怒徴穆詣廷尉太學生丨丨等數千詣闕丨丨訟穆帝覽其奏而赦之虞詡上書于公劾奏丨丨盛夏多拘繫無辜為吏民患詡丨丨自訟云云帝省其章乃不罪詡訟詣衍決蔡衍孟嘉以謹讓化鄉里有爭丨者輒丨丨丨其所爭者皆無怨訟從虞決劉虞常降身隱約與邑黨州閭同樂共恤等齊有無鄉曲宗之有辨丨丨丨丨之以情理論判之劉曠曉理隋劉丨為平鄉令人有爭訟丁寧丨以義丨七年獄中無繫囚獄訟絶息杜畿陳義魏丨丨為河東守有訟者為丨大丨令歸諦里之自後少有訟者魏志章駿授經唐丨景丨為貴鄉令有母子相訟景駿鳴咽付丨孝丨於是子母感義撾登聞鼓隋文帝詔申勑四方敦理辭訟有枉屈縣不理者令以次經郡及州省仍不理乃詣闕申訴有所未愜聽丨丨丨丨有司録詞奏之上隋志置登聞鼓唐武后垂拱元年制朝堂所丨丨丨丨受肺石不須防守有捶鼓立石者令御史狀以聞衙官訴寃太和初李回任京兆府參軍主試不送魏謨謨深銜之會昌中回為刑部侍謨為御史中丞常與次對官三數人候對於閣門謨曰某頃歲府解蒙明公不送何事今日同集於此回應聲答曰經音頸如今也不送謨為之色變益懷憤恚後回謫刺建州謨大拜回有啓狀謨悉不納既而回怒一衙官決杖勒停建州丨丨能庇徭役求𨽻籍者所費不下數十萬其不恚於杖止恨停廢耳因亡命至京師接時相丨丨諸相皆不問會停午憩於槐陰顔色憔悴旁人察其有故私詰之其人具述本意於是誨之曰建陽相公素與中書相公有隙子盍詣之言訖見魏導騎自中書而下其人常懷文狀即如所誨望塵而拜導從問之對曰建州百姓訴寃魏聞之倒持塵尾敲擔子門令止及覽狀所論事二十餘件第一件取同姓子女入宅於是為魏極力煆成大獄時李巳量移鄧州刺史行次九江遇御史鞫獄却回建陽竟坐貶撫州司馬終於貶所托言孔目訴寃陸象先為馮翊太守其量非凡可以測度房琯嘗尉馮翊象先下丨丨官黨芬於廣衢相遇避馬遲官拽芬下決眷杖干下芬訴之象先曰汝何處人芬曰馮翊人又問房琯何處官人芬曰馮翊尉象先曰馮翊尉決馮翊百姓告我何也琯又入見訴其事請去官象先曰如黨芬所犯打亦得不打亦得官人打了去亦得不去亦得後數年到闕力薦琯為監察御史乾􅀈子出緡評訟顔詡季父非理據黨人桑牙諸邑求治時令尹下翊因私評之私丨已丨償之其訟遂息江南野史飲乳輟訟韓至彥事見兄弟門曉指枉直何易于為益昌令凡鬭民在庭易于丁寧丨丨丨丨杖楚遣之不以付吏先歷縣州五代後周太祖廣順二年􅎁民有訴訟必丨丨丨丨及觀察使處決不直乃聽詣臺省或自不能書牒倩人書者何書所倩姓名居處若無可倩聽執素紙所訴必須已事毋得挾私妄訴訴劉洎寃髙宗朝劉洎之子訟其父寃稱正觀末為褚遂良所譛而死李義府復脅之上以問近臣衆希義府之旨皆言其枉給事中樂彥璋獨曰劉洎大臣人主暫有不豫豈得遽自比伊霍令雪洎之罪謂先帝用刑不當乎上聽其言遂寢其事訟遂良寃韓瑗上疏為褚遂良訟寃上謂瑗曰遂良之情朕亦知之然其悖戾好犯上故以此責之卿何言之深也對曰遂良社稷忠臣為讒詖所毁陛下無故棄逐舊臣恐非國家之福上不納李白供狀丨丨失意遊華山縣宰方開門決事白乘醉跨驢過門宰怒不知太白也引至庭下曰汝何人輒敢無禮白乞丨丨無姓名曰曾用龍巾拭吐御手調美力士脫靴貴妃捧硯天子殿前尚容走馬華陰縣裏不許騎驢托遺張造判牒貞元中度支欲取兩京道中槐樹為薪更栽小樹先下符牒華陰尉丨丨丨丨曰召伯所憩尚勿剪除先皇舊遊豈冝斬伐乃止國史補以牛還壻張允濟仕隋為武陽令元武民依婦家者久之孳牛十餘犢將歸而婦家不與牛民訴於縣縣不能決乃詣允濟允濟曰若自有令吾何預為民泣訴其抑允濟因令左右縳民蒙其首過婦家云捕盜牛者命盡出民家牛質其從來婦家不知遽曰此壻家牛我無豫即遣左右撤家曰以此還壻婦家叩頭伏罪元武吏大慙以牛還甥衛州新鄉縣令裴子雲好竒䇿部民王敬戍邉留牸牛六頭於舅李進處養五年産犢三十頭敬還索牛兩頭已死只還四頭老牛並非汝牛生總不肯還敬忿之經縣陳牒于雲令送敬付獄禁教追盜牛賦李進進惶怖至縣叱之曰賊引汝同盜牛三十頭藏於汝宅上唤賊共對乃以布衫籠敬頭立南墻下進急乃吐欵云三十頭牛總外甥牸牛所生實非盜得雲遣去布衫進見是敬曰此外甥也曰若是即遣牛還進默然雲曰五年養牛辛苦與數頭餘並還敬一縣服其精察朝野僉載破雞得粟傳琬字季圭為山陰令齊二野父爭雞問雞何食一云豆乃丨丨丨丨乃罪言豆者一縣稱其神子壻分財張詠公在杭有富民病將死子方三歲乃命其壻主其資移書云他日分財即以十之三與子而以七與壻子長果以財為訟壻持其遺書詣府公閲之曰汝婦翁智人也時以子幼故以此屬服公汝不然子死汝手乃命以其財三與壻而子與其七皆明斷戚里分財張齊賢真宗丨丨有爭丨丨不均者更相訴訟又因入宫自理於上前更十餘斷不能服宰相張齊賢坐相府召訟者曰汝非以彼所分財少乎皆曰然即命各供狀結實乃召兩吏取歸其家令甲入乙舍乙入甲舍貨財皆按堵如故分書則交易之訟者乃止明日奏上上大悅曰朕固知非卿莫能定者訴割牛舌張詠知永興有父老丨牛舌為人所割詠曰爾於鄰伍誰是最隙曰有甲氏嘗貸粟於某不遂怨之深者詠遣去云至家徑解其牛貨之父老如教翌日有人訴擅屠牛詠叱曰爾丨某氏丨丨以償貸粟之怨而返致訟邪其人伏罪詐市牛皮髙徹為滄牧有人牛黑牛背上有白毛瀲乃丨為州縣丨丨丨倍酬其直使宣認之因獲得賊訴所藏錢程皓字伯淳任京兆􅫃縣簿民有借其兄宅以居者發地中藏錢兄之子訴曰父所藏也令曰此無證佐何以決之先生曰此易辨爾問兄之子曰爾父藏錢幾何時曰四十年矣彼借宅居幾何年曰二十年矣即遣吏取錢十千視之謂借宅者曰今官所鑄錢不五六年即遍天下此錢皆爾未藏數十年所鑄何也其人遂服令大竒之訴欲亂卒坡公知密州有盜竊發而未獲安撫轉運司憂之遣三班使臣領悍卒數十人入境捕之卒凶暴恣行以禁物誣民入其家爭鬬至殺人畏罪驚散欲為亂民丨之公投其書不視曰必不至此潰卒聞之少安徐使人招出戮之墓志望之訟寃蔡襄忮刻用刑殘酷知泉州時嘗以叔母喪在式假通判黃泪攝州事與晉江令章拱之置酒作樂襄陰怒之即捃托其事械送獄栱之坐是除名竄流其弟望之纍詣闕訟寃久之乃得雪朝廷不直其所為而士亦以此少之言行録訟輒自止韓忠獻公守安陽人將鬬丨丨丨丨曰吾非畏汝慙見侍中耳郡幾至無事吕氏家孰記訟至於無彭思永字季長南海分寧素號難治前令皆以罪去民化公之誠相戒以母犯法至於無訟明道先生撰行狀韓昌黎訟風伯維兹之旱兮其誰之由我知其端兮風伯是尤山升雲兮澤上氣雷鞭車兮電搖幟雨寖寖兮將墜風伯怒兮雲不得止暘烏密兮念此下民悶其元兮不鬬其神嗟風伯兮其獨謂何我於爾兮豈有其他求其時兮修祀事羊其肥兮酒甚旨食足飽兮飲足醉風伯之怒兮誰使雪屏屏兮吹使醨之氣將交兮吹使離之鑠之使氣不得化蹇之使雲不得施嗟爾風伯兮欲逃其罪又何辭上天孔明兮有紀有綱我今上訟兮其罪誰當天誅加兮不可悔風伯雖死兮誰汝傷胡致堂論越訴所貴乎治世者上下之分嚴而民志定也以情逹之故徹去階級使百姓陵父母之官畏刺史之權自赴于天子此所謂以善為之而召禮之道也夫以四方萬里之逺而皆得自赴于天子是天子以一人之聰明而兼十百州縣之職元首叢􅴵而庶事墮廢矣然則奈何曰擇官師簡法令輕徭賦抑姦猾而民之寃無告者寡矣故自古善為治者必禁越訴夫越訴者敢於陵亂不顧階級非豪宗強姓則舞文狡吏相為表裏姦言亂政欺惑朝政者也其力能自遠於朝廷使變移是非顛倒獄訟必如其志而非善良貧丁敬畏三尺者之所能也百姓得訴長吏而去之則守令得訴觀察使而廢之藩鎮得訴宰相而黜之上侵不已於是有訴人王於蠻夷如楊光遠者矣然而越訴之門竟莫肯閉是何也宰相不擇守令案察肆於民上以供吾征求則以越訴説百姓之心曰吾旁通幽隱下酌民情彼百姓之寃無告者皆得聞於吾君之聽而不恤其亂名犯分無所顧忌之為大害也故以越訴為是則令甲不當禁以禁而非則赦令不當許許之非也禁之是也惟官得其人法令易守去民之病者豈惟越訴自息等聞之訴亦可無矣兄弟兄弟訴財張詠知杭州有沈章訟兄彥均割家貨不平公撻而遣之復半載公因過其所居下馬丨章與彥丨曰汝弟訟汝治家掌財伊幼小不知貨多少汝又分之不均果乎彥曰均平章曰不均公曰兄之族入於弟室弟之族入於兄家即時對換人莫不服兄弟訟息蘇瓊除南清河太守有百姓乙普明丨丨爭田瓊召普明兄弟諭曰云云兄弟門因而下淚乞外更思分異十年遂還同住詳見兄弟兄弟訟鬩韋保衡以妾為妻鬻田宅至丨丨丨丨家法遂替兄弟相遜韓延壽為左馮翊行縣至髙陵有丨丨爭田者延壽曰是吾化不行閉閣思過又告將解即訟者慙以田相遜願終身不爭田地以地比正地官小司冦凡民訟丨丨丨丨之注鄭司農云以田畔所與比正斷其訟以版圖決小宰聽閭里聽版圖注版戶籍圖地圖丨土丨之丨丨其訟並禮久而不平文王時虞芮之君相與爭田久而不平乃相謂曰西伯仁人也盍往質之乃相與朝周入其境則耕者遜畔行者遜路二圖之君感而相謂曰我等小人不可以履君子之庭乃相遜以其所爭田為聞田而退史周記久而無成晉邢侯與雍子爭鄐田丨丨丨丨詳見鬻獄注鄭許爭田鄭公孫申帥師疆許田許人敗諸展陂鄭伯伐許取鉏任泠敦之田晉救許伐鄭取汜祭楚子反救鄭鄭伯與許男訟焉皇戍攝鄭伯之辭子文不能決也曰君若辱在寡君寡君與其二三臣共聽兩君之所欲成其可知也不然側不足以知二國之成明年許靈公訴鄭伯于楚六月鄭悼公如楚訟不勝楚人執皇戍及子國注以鄭不直故成四周晉爭田晉郤至與周爭鄇田王命劉康公單襄公訟諸晉郤至曰溫吾故也故不敢失劉子單子曰昔周克商使諸侯撫封蘇忿生以溫為司冦與檀伯逹封于河蘇氏即狄又不能於狄而奔衛襄王勞文公而賜之溫狐氏陽氏先處之而後及子若治其故則王官之邑也閻子安得之晉侯使郤至勿敢爭成十一又周甘人與丨嘉丨閻丨王使詹桓伯辭於晉曰我自夏以后稷魏駘芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也吾何邇封之有今戎制之不亦難乎伯父圖之叔向謂宣子曰王辭直子其圖之宣子使趙成致閻田于晉昭九邢雍爭田晉丨侯與丨子丨鄐丨久而無成士景伯如楚叔魚攝政韓宣子命斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪邢侯昭十五秀實牒免段秀實初為營田判官涇大將焦令諶取人田自占給與農約熟歸其半是歲大旱農告無入令諶曰我知入不知旱也責之急農無以償往訴秀實丨丨署丨丨之仲方申理張仲方為金州刺史宦人奪民田丨丨三疏丨丨卒與民直能直吾屈李惟簡改户部尚書金吾大將軍有長尚萬國俊者以軍勢奪興平人田地吏憚莫敢治及公為金吾興平人曰久聞李將軍為人公平庶丨丨丨丨即賫縣牒求見公發視立杖國俊廢之以地還興平人劾發其私姚合景給事中奉先馮翊二縣民訴牛羊使奪其田詔美原主簿朱儔覆按偎以田歸使合丨丨丨丨以地還民民訴涇水昭懿公主大歷末寰內丨丨丨丨為磑壅不得溉田京兆尹黎幹以請詔撤磑以水與民人退自責後魯恭為中牟令訟丨爭曰恭為平理曲直皆丨而丨丨訴括其隱王章周太祖用兵四方章供饋軍旅未嘗乏絶然征利剝下民甚苦之川縣民丨田者必至川縣覆之以丨丨丨田天下由此重困五代史漢臣傳訟子與錢簡肅公奎知益州里婦丨其丨不孝詰之乃曰貧無以為養奎因出俸錢以與之厚德録訟婦給衣王待制質權知荆南府有媪訴其婦薄於養婦曰舅姑家既窮而歸且奉事無不謹質曰姑雖不良獨不顧若夫耶取家人衣媪又給以廩粟使歸養之皆感泣而去李華復練塘頌序潤州練湖幅員四十里其傍大姓強家泄流為田專利上膄畝收倍鍾富劇淫衍旱則懸耜水則具舟人罹其害九十餘祀凡經上司紛紜與奪八十一斷曲能掩直強者以得之韋公素知截湖申戒縣吏率徒闢之所潤者遠原隰皆春耕者飽憂者泰劉夢得髙陵令頌涇水東行注白渠灑而為三以沃關中故秦人常得善歲涇陽人擁而顓之私開四竇澤不及下涇田獨肥他邑為枯地力既移地征如初人或赴訴泣迎尹馬而占涇之膄皆權幸家榮勢足以破理訴者復得罪由是咋舌不敢言吞怨御忍公乃循故事考式文暨前後詔條更水道入于我里請杜私竇使無棄流請遵田令使無越制京兆具事以聞詔許訖役吕東萊左氏博議昔者文王聽虞芮之訟而商道始衰聽訟非文王之心也東氷西炭凍者不得不東左淵右陸溺者不得不右虞芮之訟文王未嘗招之使來蓋麾之不能去也文王雖不與虞芮期而虞芮自至故議者以二國之向背筮商周之興亡也舜避朱禹避均益避啓其辭其受未嘗不視獄訟之所歸以為決虞芮之訟近捨朝歌而遠趍豐鎬彼紂雖屈強於酒池肉林間真寄坐焉耳吾嘗持是而觀後世隆替之由權在則昌權去則亡未有失其權而國不隨亡者也周道既降孱王僕臣不能主方下之柄儕於列國至共王之世則殆甚焉周公大臣也王孫蘇卿士也二臣有訟不之王而之晉君天下者尚將照臨萬國大明淑慝外薄海表咸得其職今至不能尸階戺之訟則國之置王將何用乎虞芮介然遠國矣其質成於周議者尚為商危之向若飛亷惡來內相忿競棄紂而即文紂雖無道亦未必能堪也正王怡然自視不惟不駭反使人於晉助所厚者之訟惴惴然恐其不伸巍然被衮號稱天子顧乃企足矯首待晉之豫奪以為輕重何其衰也是周之危過於商而共王之無耻甚於紂也周之頽敝甚於商季何為當亡而不亡晉侯之小心不及於文王何為可取而不取蓋嘗思其故矣紂之李雖三分失其二然威令上行境內凶虐尚能及人故民不堪其暴而共亡之晚周之微門內小訟猶不得專雖淫侈誰聽其掊克雖殘酷誰受其指令具起其仆近不係斯民之休戚遠不係諸侯之強弱吾雖陽尊貌敬不過以邾莒遇之耳何嫌何疑而遽欲墟之哉故周非不亡無可亡也晉非不取不足取也大抵能害人者必能利人能殺人者必能生人紂雖下愚不移然操柄猶未盡失使其移比干之戮於崇侯移崇侯之寵于比干朝發鹿臺之財暮發巨橋之粟烏知其不祈天永命編名六七君之列乎至於共王枵然建空名於六服之上禮樂刑政舉不在已雖欲自奮其道何由是將價之商猶有復起之望未墜之周已如既隕之時也左支廢右支緩奄奄餘息綿百世而閲千齡樂乎哉周云過其歷之言吾未敢信婚姻亦不女從行露召伯聽訟也衰亂之俗微貞信之教興強暴之男不能侵陵貞女也厭浥行露豈不夙夜謂行多露誰謂雀無角何以穿我屋誰謂女無家何以速我獄雖速我獄室家不足誰謂鼠無牙何以穿我墉誰謂女無家何以速我訟雖速我訟丨丨丨丨注言召伯聽斷男女室家之訟也由文王之時被化日久故強暴之男不能侵陵貞女也勢雖侵陵貞女不從是以貞女被訟而召伯聽斷之詩余不女殺徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晳盛服入布幣而出子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也適子南氏子晳怒既而櫜甲以見子南欲殺之而取其妻子南知之執戈逐之及衝擊之以戈子晳傷而歸告大夫曰我好見之不知其有異志也故傷大夫皆謀之子産曰直鈎幼賤有罪罪在楚也乃執子南而數之曰國之大節有五女皆姦之畏君之威聽其政尊其貴事其長養其親五者所以為國也今君在國女用兵焉云云君曰丨丨丨忍丨宥汝以遠勉速行乎五月鄭放遊楚於吳左昭元貧而求離顔真卿為撫州刺史邑人有楊志堅者嗜學而居貧鄉人未之知也其妻以資給不充索書求離志堅以詩送之曰當年立志早從師今日翻成鬢有絲落托自知求仕晚蹉跎甘道出身遲金叉恁意撩新鬢鸞鏡從他别畫睂此去便同行路客相逄即是下山時其妻持詩詣州投牒以求别適真卿判其牘曰楊志堅早親儒教頗負詩名心雖慕於髙科身未沾於寸祿愚妻覩其未遇曾不少留靡追冀缺之妻贊成好事專學買臣之婦厭棄良人汚辱鄉閭傷敗風教若無懲戒孰遏浮囂妻可笞二十任自改嫁楊志堅秀才餉粟帛仍署隨軍四遠聞之無不恱服自是江表婦人無敢棄其夫者雲溪友議老不成親陳晟知隆興府奉新縣百冨人王允升老而娶妻為結諸寵所沮當夜丨丨丨而成訟判云兩家老夫婦方同心一夜惡姻緣遽成反目這場公案好入笑林王允升白髮皤然自謂力微而心在凃氏女青春過了亦須華落而色衰始焉草草婚姻終也忽忽聚散鴛鴦小小思珍偶輸與少年鳯凰寥寥不復聞遂成一夢再唤審責却與休離詩集田地膏腴利倍丨丨丨丨起訟爭斯人怨抑痛無聲韋公正直劾神靈百年遊淀為澄清李華復練塘婚姻貧富難易天下無正聲恱耳即為娛人間無正色恱目即為妹聲色非相遠丨丨則有殊貧為時所棄冨為時所趨紅樓冨家女金綏繡羅襦見人不斂手嬌癡二八初母兄未開口已嫁不須臾緑窗貧家女寂寞二十餘荆叉不直錢衣上無真珠幾回人欲聘臨日又踟蹰主人會良媒置酒滿玉壺四座且勿飲聽我歌兩途富貴女易嫁嫁早輕其夫貧家女丨嫁嫁晚孝於姑聞君欲娶婦娶婦意何如白居易議婚告訐附匿名詞訴明誡訐者面相斥罪攻發人之陰私也人不陰私不切於我而攻發之彼之惡不容掩而在我亦未為善也古者厚德君子隱人之惡揚人之善豈復有此等事哉後世風俗薄惡而後發伏之風作矣是皆薄德者之所為也吁事類惡訐子貢丨丨以為直者語許訐趙廣漢為頴川惡相朋黨乃丨相丨或匿名相告罪者置鋸筒令投書於其中缿筒乃瓦器請告者魏典農劉龜竊於禁內射兔其曹張京投書言之帝匿京名送龜付獄髙柔字文惠為廷尉丨丨丨名帝怒曰吾豈妄收龜邪柔曰廷尉天下之平不敢毁法帝乃下京名各當其罪得罪人魏時有投書誹謗太祖欲得其主國淵字子尼請其本其書多引二京賦淵乃募讀二京賦者果丨丨其丨許上變則天武氏畏天下有謀反逆者詔丨丨丨在所給輕傳供五品食送京師即日召見厚餌爵賞飲動之凡言變吏不得訶詰雖蕘夫耘子必親延見票之官館敢㮷留不送者以所告罪之故上變者遍天下人人屏息無敢議按無狀張嘉貞武后朝為天兵使明年入朝或告其反丨丨丨帝令坐告者嘉貞辭曰國之重兵利器皆在邉今告者一不當即罪之臣恐塞言路且為未來之患昔天子聽政於上瞍賦矇誦百工諫庶人謗今特坐之後無由聞天下事遂得減死奏無罪武后時告密者皆誘人奴婢告其主以求功賞皇嗣竇德妃父孝諶為潤州刺史有奴妄為妖異以恐德妃母龐氏龐氏懼奴請夜祠禱因發其事下監察御史薛季昶按之季昶誣奏以為與德妃同祝詛龐氏當斬其子希咸詣侍御史徐有功訟寃有功牒所司停刑上奏論之以為無罪季昶奏有阿黨惡逆請付法司法司處有功罪當絞令史以白有功有功曰云云後流嶺南紹興懲艾本朝紹興二十五年執政進呈刑部狀開具到前後告訐人上曰此事須痛與徴艾近目如此行遣想人情大恱感召和氣於是並除名勒停編管詔除名勒停人並放令逐便長編開禧申嚴寧宗開禧元年丨丨告訐之禁程大章論文帝漢承秦之餘舊染猶在文帝一以君子長者待之鎮之以淵默示之以質朴行之以椎魯重厚之人及其久也昔之告訐無行誶語無親者人人自重耻言人過大漢之世蕩然與泰和同風乃知書可焚儒可坑是古者可禁而民生可厚者不銷鑠也古今合璧事類備要外集卷二十六
