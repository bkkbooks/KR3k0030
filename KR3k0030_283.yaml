body:
  text: 古今合璧事類備要别集卷七十七宋謝維新撰走獸門虎附彪豹貘音貊格物總論虎山獸之君屬陽狀如猫而大如黃牛黑章鈎爪鋸牙舌不大於掌生倒刺鬚硬尖而光夜視一目放光一目看物獵人候而射之光墜於地成白石兩脅閒及尾端皆有骨如乙字長一二寸許者即其威也破肉取之可得能令人有威帶之臨官佳若無官者帶之必為人所憎橫行而妥尾其怒而吼也聲如雷百獸為之震恐而風從之生矣彪特似虎而非真虎豹肉毛赤黃其紋黑如錢而中空比比相次又有土豹其形小毛更無紋色亦不赤又一種𤣥豹其猛健皆不減於虎而甚稀有貘似熊小頭痺腳黑白駁文能䑛食銅鐵及竹骨節强直中實少髓或亦云豹之白者事類履尾丨虎丨不嘻人亨易蹈尾心之憂危若丨虎丨書羊質或問質曰丨丨而虎皮見草而悅見豺而戰忘其皮之虎也楊子狐威江乙言於楚莊王曰丨假虎丨國語豹變丨丨則虎楊子鼉為丨之丨虎抱朴子驅而逺周公丨虎豹犀象丨丨之孟闞如虓丨丨丨虎詩江漢蒙臯北齊宋師次于郎公子偃自雩門竊出丨丨丨而先犯之大敗宋師左莊十謂於莵令尹子文初生棄於夢澤虎乳之楚人謂乳榖虎丨丨命之曰鬬榖於莵左宣四大叔暴虎丨丨段袒裼丨丨獻於公所云云馮婦搏虎昔人有丨丨者善丨丨則之野有衆逐虎虎負嵎莫之敢攖望見馮婦趨而迎之丨丨攘臂下車衆皆悅之孟苛猛於虎孔子過泰山見一女人哭問之曰吾舅死於虎吾夫死於虎今吾子又死焉子曰何為不去曰無苛政孔子曰苛政丨丨丨也記檀弓爭獲兩虎卞莊子刺虎管堅子止之曰兩虎方共食一牛牛甘而必丨鬪鬪則大者傷小者亡從而刺之一舉必兩獲從之果丨丨丨史記走料虎頭孔子遇栁下季季曰今者闕然數日不見車馬有行色得微往見跖邪孔子仰天而歎曰然栁下季曰跖得無逆汝意若前乎孔子曰然丘所謂無病而自灸也疾丨丨丨丨編虎鬚幾不脫虎口哉莊盜跖辨劘虎牙或問茅焦歷井幹而死使始皇奉虛左之乘云云曰焦逆訐而順守之雖丨丨丨丨矣楊子言市有虎龎共與太子質於邯鄲謂魏王曰今一人丨丨丨丨王信乎曰否二人言王信乎曰否三人言王信乎曰寡人信之龎共曰夫市無虎明矣而三人言成市虎願王察之韓子刻玉為虎始皇三年畫工名列裔丨兩白丨虎其毛如生不㸃爾目始皇使餘工夜往㸃之化成虎去明年南郡獻白虎二視之乃玉虎也拾遺記射石為虎李廣為右北平太守嘗出獵見草中石以為虎而射之中沒矢視之石也他日射之終不能入矣本傳因病化虎牛哀病七日化而為虎其兄啓户而入虎搏而殺之方其為虎不知其嘗為人也方其為人不知其且為虎也淮南子瞋目視虎秦召公子無忌不行使朱亥奉璧一雙秦王大怒將朱亥著虎圈中亥丨丨丨丨眥裂血出濺虎終不敢動本傳為虎所食東海人黃公少時能幻制蛇御虎常佩赤金刀及衰老飲酒過度有白虎見於東海黃公以赤刀往厭之術不行遂丨丨丨丨西京雜記為虎所齧楊豐丨丨丨丨有女年十四手無刀刃直扼虎頭免父難異苑相與渡江宋均遷九江太守事負子渡河劉昆為𢎞農太守事並見太守門斬虎除害周處丨南山白額丨以丨丨搏虎免害楊香其父為虎噬忿憤丨之父免害孝子傳張口求活晉郭文嘗有虎匆丨丨向文文視其口有橫骨乃以手探去之虎至明日乃獻一鹿於堂前白氏帖垂頭伏罪童恢者字漢宗為太守有虎害人檻捕生得二虎恢祝曰殺人者當丨丨丨丨非者當號吼稱寃於是一虎丨丨攀欄而吼魏明帝於宣武場上斷虎爪縱百姓觀之時王戎方十歲亦看虎虎乘間丨丨丨丨其聲震地觀者無不辟易顛仆戎湛然無恐色據地大吼斐旻守北平善射一日得虎三十一父老曰此彪也稍北有真虎必敗旻怒馬趨之有虎小而猛丨丨丨丨旻馬辟易弓矢墮自是不復射遇虎與鬬唐鍾傳少醉丨丨丨丨搏其肩傳亦持虎不置會人斬虎得免既貴悔之戒諸子曰士尚智與謀勿效吾暴虎也格虎自贖元德秀為魯山令事見縣令門入元載廟大厯四年虎丨京師長夀坊宰臣丨丨家丨射死之唐五行志到石人前尋陽山上有石人髙丈餘虎至此輒丨丨丨丨酉陽雜爼蹲龍瑞宫王以錦城兵冦命閭丘方逺建下元金籙齊於東府龍瑞宫有黑虎一丨宫前醮罷失之吳越備史入仙鶴觀天寶中河南緱氏縣仙鶴觀每年九月二日夜有一道士得仙其夜皆不扃户以求上升之應後張竭忠攝令疑之至時乃令二勇者以兵器濳覘之至三更後見一黑虎丨丨丨丨銜一道士出二人射之不中棄而往竭忠申府請弓矢大獵于大子陵東石穴中格殺數虎有金籙玉簡及冠帔人髮甚多傳異志目為白虎李克用年十五從征摧鋒陷陳出諸將之右軍中丨丨飛丨丨白帖號為羣虎五代鄭元弼父昌士博學有子八人皆以詞學丨丨鄭家丨丨謂之虎子五代吳越林建徽稜子也治軍嚴整纍從征伐未嘗介甲所至輒有功軍中丨丨丨丨並孔帖名以虎子五代吳周本少倜儻有猛虎為暴本與二兄往視之遇於篁竹間奮躍前扼虎喉二兄同擊之虎敗死於穴由是知名初仕宣州趙鍠常衣緋衫褌持劍出入行陳軍中壯之後與楊行密戰被執行密曰吾聞周虎子之丨恨見之晚釋縛以為裨將十國紀年李賀猛虎行長戈莫舂強弩莫抨乳孫哺子教得生獰舉頭為城掉尾為旌東海黃公愁見夜行道逢獨虎牛哀不平何用尺刀壁上雷鳴泰山之下婦人哭聲官家有程吏不敢聽符載畋獲虎頌六年冬十二月臘日甲辰莭度使御史大夫樊公畋於郢城修軍禮先是里人之訟乳虎為暴肆毒貪婪白晝族行圈皂無豕牛材麓絶樵蘇老幼愁恐極於兵冦既卜其穴乃大搜而取之爽氣凌厲士拗餘怒思與鬬死莫有異慮敲扣拍撲芟殺䇿䃗洞篁篠之冥密劃蒙蔓之纍絡勢窮則搏鬬於莾下觀其怒氣之所狡憤迅軀之所騰跱踞牙之所噉齚鈎爪之所拏攫傑作人立呀若箕張聲吼暴雷目爍燃炬有一人烏獲之倫威鬱喬傑標狡獷决憑髯奮怒毛竪眥裂鐏長㦸以撑拒乃匐身而掩刃勢傾力絶四偃在地穿喉貫背瓜有餘搏於是騰氣射虹霓酣噪破山林耋老慶童稚抃淋漓贔屓獻於公所於是回鑣返斾校能計獲發府庫行飲勞賞功也因知公之師可以振文經可以翊皇威可以截不庭可以攝四夷豈獨躪荒山殪猛獸馳騁觸蹶左旋右抽而已哉載目覩盛烈敢愛文字使其暗然而不章乎乃作頌曰𤣥隂凝兮殺氣厲揚三軍兮頥時殺鋋㦸羅兮山谷隘飛走殫兮林莾壞有虎勃起兮萬夫駭闞呀夭蹻兮雷霆喝紆沉慮兮振明戒干一奮兮傾五害旋勝軍兮翻大斾空臯數兮樂幼艾勇毅之師無與對可誅不王截海外李翺裴射虎圖贊世稱裴將軍射虎而不及見駕部郎中兼侍御史榮陽鄭公博物好古旌能尚藝于裴氏子得其先人射虎圖傳以示豫壯哉古今之未有倫也夫弧矢之用所以服猛除暴而威夷狄彼彀弓鳥下拾矢猿號工則工矣是射之末節開元中山戎冦邊𤣥宗命將軍守北平州以捍薊之北門公嘗率偏車橫絶漢策匹馬陷重圍搖轆轤而百萬洞開驅槖駝而沙場一掃威稜大矣而北平連山廣野地實多虎擇肉於人如有飛翼荐食邊鄙甚於戎狄公於是屏車徒去矛鏃馳單騎彀白羽挑之使來翼之而回從容反視咫尺旋玩心即其度手張其機左射右拂榮之疊四中皆沒羽倒必應弦毛分血灑腋洞心穿或叱之而弭伏或箠之而却走將威有所勝氣有所全情專於中志正於內故能以一人之力戰羣虎之命雖有矯牙冠羣亦垂頭􅒽尾應鏑而斃如此者凡三十有一矣其餘竄匿不敢復出大漢之南鳥獸咸若胡人畏威不敢南牧兹所謂剛健除暴而戎狄格昔漢飛將軍亦為北平守擊胡有困辱之事射虎有騰傷之患其與將軍神勇非為侔矣鄭公既寫其圖俾余贊之詞曰若慢彼山戎噬我封略有羣者虎載肆騰搏邊毗凜凜崩厥角將軍出塞屏出車騎進馬前當挺身以餌威有所服精有所聚氣全以難力果而取震驚矍矍虎反如鼠威武桓桓人反如虎徑弓雷霹長矢電激中口穿胸貫心洞腋視如空皮劃若破的應發連斃紛紜枕籍據鞍遙叱揮箠逆擊閉目沉冥喪精辟易三軍駭呼萬靈動魄海波為騰塞草皆赤卞莊俟方聞兩獲漢將如飛幾為所扼將軍神勇冠世超昔猿號未工飲羽非敵弧矢之設以威四方羣虎既夷狄人來降收闥罷扃山川以寧至今北荒猶畏其靈彪此彪斐旻守北平善射一日得虎三十一父老曰丨丨也詳見前據地大吼注豹谷山多幽都即丨丨上丨𤣥豹瑞應西方美丨丨之丨有文蔚之皮焉爾雅穽中食虎豹在檻丨之丨搖尾而求丨管中窺此即管中窺豹見其一班晉書王羲之傳千鍾得武王侈靡命貂檐豹裘方得入廟故豹皮曰千金功臣之家以丨丨米丨一豹皮管子百蠻獻溥彼韓城燕師所完以先祖受命因時丨丨王錫韓侯其追其貊奄受北國因以其伯實墉實壑實畝實籍丨其貔皮赤豹黃羆詩韓奕皮為罪狄人獻𤣥豹皮於秦秦文公受皮而歎之曰以丨之美自以丨丨也韓子毛成文陶大夫妻曰聞南山有𤣥豹霧雨七日不下食欲以澤其丨衣而丨其丨章列女傳后妹辟邪韋丨丨嘗為豹枕以丨丨五行志三豹御史王旭時為監察御史李嵩李全交皆為所取名與旭埒京師號丨丨嵩為赤全交為白旭為黑里閭相詛曰若違教值三豹孔氏六帖五豹將軍出唐宣室志豹死留皮五代王彥章嘗謂人曰丨丨丨丨人死留名韓退之守戒鹿之為豹非不巍然大矣然而卒為之禽者爪牙之材不同猛怯之質殊也栁宗元囚山賦攢林麓以為叢棘兮虎豹咆闞貘賜貘皮薛萬均卒後嘗丨羣臣丨丨及萬徹而誤呼萬均愴然曰萬均朕勳舊忽口其名豈死者有知冀此賜乎因命取焚之孔帖畫貘屏唐世多丨丨作丨誑俚俗貘齒骨極堅以刀斧槌煆鐡皆碎落火亦不能燒人得之詐為佛牙佛骨以丨丨丨並本草白居易貘屏贊貘者象鼻犀目牛尾虎足生南方山谷中寢其皮辟溫圖其形辟邪豫舊病頭風每寢息常以小屏衛其首適遇畫工合寫之按山海經此獸食鐡與銅不食他物因有所感遂為贊云邈哉竒獸生於南國其名曰貘非鐵不食昔在上古人心忠質征伐教令自天子出劒㦸省用銅鐡羡溢貘當是時飽食終日三代以降王法不一鑠鐡為兵範銅為佛佛像日益兵刃日滋何山不剗何谷不隳銖銅寸鐡罔有孑遺悲哉彼貘毋乃餒而嗚呼匪貘之悲惟時之悲詩集響窮山咆虎丨丨丨嘯深谷虎嘯丨丨丨底慿林嘯猛虎丨丨丨並選當谷眠猛虎雖云惡亦各有匹儔羣行深谷間百獸望風低身食黃熊父子食赤豹麛擇肉於熊羆肯視兔與貍正晝丨丨丨眼有百步威自矜無當對氣性縱以乖朝怒殺其子暮還食其妃匹儕四散走猛獸還孤棲狐鳴門四旁出逐猴入居烏鵲從噪之虎不知所歸誰云猛虎惡中路正悲啼豹來銜其尾熊來攫其頥猛虎死不辭但慙前所為虎兕無助死況知汝細微故當結以信親當結以私親故且不保人誰信汝為韓愈猛虎行贈李宗閔宗閔初為裴度所引後度薦德裕相宗閔怨之故作繞村行南山北山樹冥冥猛虎白日丨丨丨向曉一身當道食此中麋鹿盡無聲年年養子在深谷雌雄上下常相逐谷中近窟有山村長向林中取黃犢五陵年少不敢射空來林下看行跡張籍猛虎行妥尾不畏逐壯哉非熊亦非貙目光夾鏡當坐隅橫行丨丨丨丨丨顧盻欲去仍躊躇卒然一見心為動熟視稍稍摩其鬚固知畫者巧為此此物安肯來庭除想當䃲礴欲畫時睥睨衆史如庸奴神閒意定始一掃功與造化論錙銖悲風颯颯吹黃蘆上有黃雀驚相呼槎丫死樹鳴老烏向之俯噣如哺雛山墻野壁黃昏後馮婦遙看亦下車王荆公虎圖行韓魏公知楊州王為僉判以魏公非知我者每曰韓公但形相好耳作此譏之垂頭若微顧平生射虎裴將軍馬獰如龍弓百鈞手撚白羽傍無人注虎使虎不敢奔須臾叢薄斕斑出人馬不知俱辟易矢如蓬蒿弓減力將軍得歸幾敗績徐行爪牙無不露耽耽丨丨丨丨丨尾剪霜風林葉飛倐忽山頭日光暮包家畫出真於莵我尚不敢編其鬚昔人作詩譏畫圖吁嗟畫圖今亦無游子明畫虎圖豹學豹且丨南山丨李白贈崔宣城煮豹歸來丨丨胎杜牧愁雨豹隱深丨丨杜甫澤霧壯哉南山豹不畏白額虎丨丨毛雖雜鼮鼠朝捋其鬚暮飲乳文章子雲久已詐還笑大夫費五羖天子仗中儀物舉尾與斾常願看取梅聖俞文豹篇贈黃介夫熊附羆格物總論熊大似豕而性輕健山居能攀緣上高樹見人則顛倒投地而下行數千里悉有跧伏之所亦不迷失道路冬多入穴而藏蟄始春而出掌至為珍味羆似熊長白紋長頭髙腳亦猛憨而多力也事類蟄獸丨丨熊羆之屬周禮逸才丨丨之獸相如諫獵鯀化昔堯殛丨于羽山其神丨為黃熊以入于羽淵實為夏郊三代祀之左禹化丨治水通轘轅山丨為熊謂塗山氏曰欲餉必聞鼓聲乃來禹排石誤中鼓塗山氏往見禹方卧熊慙而去武帝紀注非熊見前龍注維熊斯干宣王考室也云云乃寢乃興乃占我夢其夢維何丨丨維羆云云男子之祥毛詩曰何厲晉侯夢黃熊入寢門子産丨其丨丨也詳見前鯀化欲攫我趙簡子病五日及寤曰我之帝所見一熊丨丨丨帝令射之中熊羆死滅二卿之象史記食熊蹯楚太子以宫甲圍成王王請丨丨丨而死不聽乃縊死熊蹯難熟兾外救也胹熊蹯昔晉靈公使宰夫丨丨丨不熟殺之置諸畚遂使婦人載以過朝並左越椒之狀楚司馬子丨丨熊虎丨丨左孟軻所欲孟子曰魚我所欲也熊掌亦我所欲也二者不可得兼舍魚而取熊掌也孟子當熊而立前漢元帝馮昭儀拜婕妤上幸虎圈鬬獸後宫皆坐熊佚出圈攀檻欲上殿婕妤直前丨丨丨丨上問何故前當熊對曰妾恐熊至御座故以身當之上嗟嘆倍敬重焉漢史抱熊以出晉升平中有人入山射鹿忽墮一坎內有數頭熊子須臾有大熊來入瞪視此入人謂必害己良久出藏果分與諸子末後作一分著此人此人饑久於是冒死取噉之既轉相狎習熊母每旦覓食還輒分果此人賴以支命後熊子大其母一一負將出子既盡人分死坎中窮無出路熊母尋復還入座人邊人解意便丨丨之足於是丨丨遂得無他續搜神記和熊膽丸栁仲郢母韓善訓子故仲郢幼嗜學嘗丨丨丨丨使夜咀咽以助勤孔氏帖戴熊皮冠南蠻東謝蠻貞觀三年其酋元深入朝冠烏熊皮同上六雄將軍張鋋歸蜀次己西有人拜曰巴西侯奉邀既見置酒邀丨丨丨丨至有六人皆黑衣贔然其狀天將曉鋋悸寤見巨熊卧於前者所謂丨丨丨丨也張續宣室志靈光殿賦𤣥熊蚺䗊齗齗却負戴而蹲􅀈齊首目以瞪盻徒腋腋而獼獼招北客文寒熊孔顧登樹自擲見人則擘羆公侯兆文王事見前龍注男子祥見前維熊注當道卧齊神武遣韓軓司馬子如從河東宵濟華州襲王羆羆不覺比曉䡄衆已乘梯入城羆尚卧未起聞外洶洶有聲但袒身露髻徒跣持一白挺大呼而詬曰老羆丨丨丨貛子那敢過敵見驚退北史陳無己羆說晉人以大獵以五犬逐一羆羆鷙而力長於用大所與敵者皆天下強有力也犬弱而健巧於用小顧左而右逐前而後羆不能搏也行不數十里羆敗而犬伏更前而殺之獸之鷙者爪莫如虎齒莫如象而羆食之故稱勇力必曰羆羆而受制於犬者遇非其敵困於羣也詩云憂心悄悄愠於羣小羆之謂矣詩集咆深林熊羆丨丨丨守翠微熊羆丨丨丨向我啼青兕黃熊丨丨丨深叢見丨丨丨孤羆並杜古今合璧事類備要别集卷七十七
