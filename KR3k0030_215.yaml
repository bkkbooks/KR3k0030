  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3k0030_WYG_215-1a, image: WYG0941/WYG0941-0091a.png}
body:
  text: 古今合璧事類備要别集卷九宋謝維新撰闗津門津堠輿地提綱按説文津水渡也堠小津也天下不能無江河故行旅不能無津堠津堠之置必有非橋梁所能盡通之者也故有風濤之嶮而車馬無阻於行色有天限之分而徒從不至於迷途彼此皆利濟之人往來無病涉之子此其為功亦次於橋梁者事類黄龍負舟禹濟江丨丨丨丨舟中人懼禹仰天而歎曰吾受命於天竭力而勞萬民生寄也死歸也余何憂於龍焉視龍猶蝘蜓禹顔色不變須臾龍俛耳低尾而逝通鑑外紀白魚入舟武王伐紂兵至于盟津渡河中流丨丨躍丨王丨中武王俯取以祭時乃有火自上伏於下至于王屋流為烏其色赤其聲魄諸侯不期而㑹盟津者八百同上漁父乗船楚欲殺伍胥胥奔吴幾不得脱追者在後至江江上有一丨丨丨丨知伍胥之急乃渡胥胥解劒以謝之漁父不受女子持檝趙簡子南擊楚津吏醉卧不能渡簡子召欲殺之津吏丨丨丨丨而前曰妾父聞君東渡不測之水恐風波之起故禱九江三淮之神不勝至祝杯酌餘􅅹醉至於此妾願以鄙軀易父之命簡子将渡少一人乃備員持檝遂與渡中流發激櫂之歌簡子説以為夫人列女傳焚舟遂濟秦伯伐晉濟河丨丨取王官及郊晉人不出丨自茅津丨封殽尸而還注茅津在河東大陽縣西左文三年執輿是知長沮桀溺耦而耕孔子過之使子路問津焉長沮曰夫丨丨者為誰曰為孔丘曰丨丨津矣語解衣佐刺詳見疑惑注艤船以待項羽垓下之敗遂引兵欲渡烏江烏江亭長丨丨丨丨謂羽曰江東雖小亦足王也願大王急渡羽曰縱江東父兄憐而王我我何面目見之哉以示形制漢王欲捐成臯以東屯鞏洛以距楚酈食其曰云云願足下急進兵收取滎陽據倉敖之粟塞成臯之險杜太行之道距飛狐之口守白馬之津丨丨諸侯丨丨之勢則天下知所歸矣王從之髙祖紀令持布錢王莽丨吏民出入丨丨丨以副符傳不持者厨傳勿舍闗津苛留注問是何人而停留之佩劒化龍雷煥佩劍至延平津劒忽躍入水使人沒水求之遂見兩龍而退晉張華傳鑄鐵為牛蒲津河橋天下之要津也唐明皇詔丨丨牛八頭柱二十四條連鏁一十二條山架八所牧人八枚於中間分立亭亭有虹霓之狀實萬代之竒絶也紀異記又見橋梁注聞杜鵑不樂邵康節步天津橋丨丨丨丨丨客問其故曰洛陽舊無杜鵑不十年必用南人為相天下多事矣邵氏聞見錄栁宗元鐵爐步志見前吳處淳青箱雜錄韓退之羅池廟碑言步有新船蓋嶺南謂水涯為步故罾步即漁者施罾處船步即衆人渡船處楊州瓜步洪州觀步閩中謂水涯為溪步詩集輟棹問我行倦風湍丨丨将丨津高適囘首過丨丨丨津口而多楓木林江欲平二月頻送客東津丨丨丨杜海闊無滄丨丨丨津杜擬欲乗槎明河可望不可親丨丨丨丨一問津更将織女支機石還訪成都賣卜人宋之問明河篇戱問垂綸春江不可渡二月已風濤舟楫欹斜處魚龍偃卧髙渚花張素錦江草亂青袍丨丨丨丨客悠悠見汝曹杜渡江詩北固京口丨丨臨丨丨夷山近海瀕江風白浪起愁殺渡江人孟浩然楊子津望京口郡城樓下丨丨丨丨接通津栁峒岷楊子江頭丨丨丨丨楊栁春楊花愁殺渡江人數聲風笛離亭晚君嚮瀟湘我嚮秦鄭谷瓜洲渡風顛當㫁渡明日丨丨丨丨丨坡日暮閱過船河西猛士無人識丨丨津亭丨丨丨路人但覺聰馬瘦不知鐵槊大如椽因言西方久不戰截髪願作萬騎先我當憑拭與寓目看君飛矢射蠻氊蘇石硊小渡五里强峩橋小渡十里長丨丨丨丨丨丨丨斜風細雨寒蘆裏下有深潭黒無底渡船劣似紙半張五里都城一千里中流風作浪如山前進不得後退難隔溪市井只咫尺安得飛墮於其間大江風濤堪著力小渡風濤更無格咫尺性命輕如毛只恐一毛猶不直楊廷秀過石砲滄浪千頃片時間天将天塹護吴山不數殽函百二闗萬里銀河瀉瓊海一雙玉塔表金山旌旗隔岸淮南近鼓角吹霜塞北閑多謝江神風色好丨丨丨丨丨丨丨過楊子江古今合璧事類備要别集卷九
