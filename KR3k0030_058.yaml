body:
  text: 古今合璧事類備要前集卷五十八宋謝維新撰夀典門生辰附同庚生日事又詳見誕子類事類誕月丨彌厥丨先生如達詩生民初度帝髙陽之苗裔兮朕皇考曰伯庸攝提貞於孟陬兮惟庚寅吾以降皇覽揆余以丨丨兮肇錫余以嘉名名余曰正則兮字余曰靈均屈原離騷璋瓦乃寢乃興乃占我夢吉夢維何維熊維羆男子之祥維虺維蛇女子之祥乃生男子載衣之裳載弄之璋乃生女子載衣之裼載弄之瓦詩斯干桑蓬男子生丨弧丨矢以射天地四方射義子生男子設弧於門右内則陸地生花關令尹喜生時其家丨丨自丨􅘟丨光色鮮盛關令内傳天星孕秀蕭何昴星精張良感弧星生樊噲感狼星生李白之生母夢長庚星生甲子朔晉絳縣人曰臣丨之嵗正月丨丨丨四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰七十三年矣左傳生丙子嵗唐張果常言我丨堯之丨丨丨獻范蠡圖陳恭公判亳州遇生日親戚多獻老人星圖姪世脩獨丨丨丨遊五湖丨且贊曰賢哉陶朱伯越平呉召遂身退扁舟五湖公即日納節明日乞致仕倦遊録畫老子圖見詩集注進士獻曲元符三年十二月十九日東坡生日置酒赤壁下酒酣笛聲起江上使人問之即丨丨李委聞坡生日作鶴南飛曲以丨奏丨嘹唳有穿雲裂石之聲玉局文大卿放生光禄卿鞏申佞而好進老為省判趍附不已王荆公為相毎遇生日朝士獻詩頌僧道獻功德疏以為夀皂吏走卒皆籠雀鴿就宅放之謂之放生申不閑詩什又不能誦經於是以大籠貯雀鴿詣客次搢笏開籠每放一雀鴿叩齒祝之曰願相公一百二十嵗時有邊塞之王妻病而虞候割股以獻者天下駭笑或對曰虞候為縣君割股丨丨與丞相丨丨東軒筆録生日不樂伊川先生曰人無父母生日當倍悲痛更安忍置酒張樂以為樂若具慶者可矣生日大宴寇萊公在藩鎮時因丨丨造山棚丨丨又服用僭侈為人所奏上怒甚謂王旦曰寇準每事欲效朕可乎旦徐對曰凖誠賢能無如騃何上意遂解不問同庚同日相賀高祖盧綰事見誕子類同年先老顧悦與簡文丨丨而早白簡文問曰卿何以丨丨答曰蒲栁之質望秋先零松栢之姿經霜轉茂世説同庚齊名鍾瑾與李膺同年俱有聲名漢質紀升堂拜母呉周瑜字公瑾舒人初孫堅興義兵䇿字伯符將母從居舒與瑜同年友善瑜推道南大宅舎䇿丨丨丨丨有無通共敬事如兄曹公責孫權質子張昭等猶豫不能决權引周瑜詣母前定議權母曰公瑾議是也公瑾與伯符同年小一月耳汝其兄事之三國史許逺與張巡同年生月日後於巡呼之為兄韓愈作張巡傳是雌甲辰裴晉公有遺以槐癭者郎中庾威在坐曰此是雌樹生者公問郎中年甲對云與公同是甲辰公笑曰郎中便丨丨丨丨雞跖為小戊子程文惠與龎公同戊子生程已貴龎尚為小官常戯龎曰君乃小戊子矣後龎大拜文惠曰今日大戊子却丨丨丨丨矣東軒録同年皆窮馬正卿字夢得作太學生清苦有氣節余偶至其齋書杜子美秋風歎一篇初無意也正卿即日辭歸至今白首窮餓守節如故又曰夢得與僕同嵗月生少僕八日是嵗生者無富貴人而僕與夢得為窮之冠即吾二人而觀之當推夢得為首東坡志材同庚俱顯王仲儀與吕寶臣俱以丁未生申公在相位仲儀三十餘嵗龍圖閣待制知渭州時西方有警令三帥選差神龍衛千兵送行更候迓吏騶御之盛前此未有往别申公申公顧左右喚十二郎來即寶臣也公曰仲儀今擁千兵擢帥汝猶為筦庫也仲儀既去申公徐曰汝無羨後十年却於汝手作差遣治平初寶臣擢樞宻院副使仲儀復以端明殿學士為渭帥聞見録同甲相類李濬與李宗諤同宗丨丨後一日而生平日休戚一同宗諤死濬後一日卒王壺清話同庚作會文潞公保洛日年七十八同時中散大夫程珦朝議大夫司馬旦司封郎中致仕席汝言年皆七十八嘗為同甲之會事類三星行我生之辰月宿南斗牛奮其角箕張其口牛不見服箱斗不挹酒漿箕獨有神靈無時停簸揚無善名以聞無惠聲以攘名聲相乘除得少失有餘丨丨各在天什伍東西陳嗟汝牛與斗汝獨不能神昌黎文南極歌淡溪居士登九齡朱顔緑鬢如後生横拖仙人緑玉杖倒誦上帝黄庭經璇霄仙籍書姓名丹霞染誥金花綾近來便覺雙眼明夜抄蠅頭窻下燈登山臨水兩脚輕御風騎氣不用行何人有筆筆無塵鵞溪一幅我寫真烏紗白苧坐鼓琴上有千嵗長松青令威旁舞𤣥夫聽夲是活底丨丨老人星楊廷秀夀叔父關中老錢穆父尹天府生日楊次公畫老子出關圖作詩以獻曰祕藏凾谷丨丨子來獻蓬萊閣上仙願得鬚眉如此老却教龜鶴羨長年雲齊録商嶺僊四人三百二十嵗況是同生甲午年占得梁園為賦客合成丨丨採芝丨清談亹亹風生席素髪蕭蕭雪滿肩此會從來誠未有洛中應作畫圖傳文潞公作同庚會詩夀事類五福丨丨一曰夀書洪範萬年君子丨丨以介景福詩小雅介眉為此春酒以丨丨夀豳風兒齒既多受祉黄髮丨丨魯頌難老永錫丨丨同上彌高年丨丨而德彌劭揚子久視是謂長生丨丨之道老子全生縁督以為經可以丨丨可以盡年注縁順督中經常也養生岡陵三夀作朋如丨如丨閟宫松栢如南山之夀如丨丨之茂天保龜龍或問丨丨鴻鵠不亦夀乎曰夀曰人可夀乎曰物以其性人以其仁揚子龜鶴丨千年乃遊於蓮葉之上丨千嵗乃栖於偃葢之松史記廣成長生丨丨子曰無勞爾形無揺爾精乃可以丨丨故我修身千二百嵗形未嘗衰彭祖久夀丨丨堯臣封於彭城歴虞夏至商年七百嵗故以久夀聞述而注魯侯耆艾閟宫頌僖公俾爾昌而大俾爾耆而艾萬有千嵗眉夀無有害天錫公純嘏眉夀保魯居常與許復周公之宇魯侯燕喜令妻夀母宜大夫庶士邦國是有詩老子脩養丨丨二百餘嵗以其丨道而丨夀也史遇黄眉翁東方朔元封中游鴻濛之澤忽丨老母采桑於白海之濵俄而有丨丨丨指毋以語朔曰昔為吾妻託形於太白之精今汝亦此精也吾却食吞氣已九千餘嵗目中瞳子皆有青光能見幽隠之物三千年一返骨洗髓三千年一剥皮伐毛吾生來已三冼髓一伐毛矣摩銅狄人後漢薊子訓與一老翁共丨挲丨丨丨相謂曰適見鑄此物而已近五百嵗香山九老白居易暮節惑浮屠至經月不食葷稱丨丨居士常與胡杲等燕樂皆高年不仕者人慕之繪為九老圖洛陽耆英元豐五年文潞公以太尉留守西都時富韓公以司徒致仕潞公慕唐白樂天九老會乃集洛中公卿大夫年德高者為耆英會以洛中風俗尚齒不尚官就資聖院建大厦曰耆英堂命閩人鄭奥繪像堂中共十三人時宣徽使王拱辰留守北京貽書潞公願與其會年七十一獨司馬温公年未七十潞公素重其人用唐九老狄兼謩故事請入會温公辭以晚進不敢班文富二公之後潞公不從令鄭奥自幕後傳温公像又之北京傳王公像於是預其會者凡十三人潞公以地主㩦鼓樂就富公宅作第一會至富公會送羊酒不出餘皆次為會洛陽多名園古刹有水竹林亭之勝諸老鬚眉皓白衣冠甚偉每宴集都人隨觀之潞公又為同甲會司馬郎中旦程太中垧席司封汝言皆丙午也亦繪像於資聖院其後司馬温公與數公又為真率會有約酒不過五行食不過五味唯菜無限楚正議違約増飲食之數罰一會皆洛陽太平盛事也洛之士庶又生祠潞公於資聖院温公取神宗送公判河南詩隸於榜曰竚瞻堂塑公像其中冠劍偉然都人事之甚肅聞見録九老詩序會昌五年三月二十四日胡吉劉鄭盧張等六賢皆多年夀子亦次焉於東都弊居履道坊合尚齒之會七老既醉相顧且歡静而思之此㑹希有因各賦詩以記之或傳諸好事者其年夏又有一老年貌絶倫同歸故鄉亦來斯會續命書姓名年齒寫其形貌附於圖右仍以一絶贈之云雪作鬚眉雲作衣遼東華表暮雙歸當時一鶴尤希有何況今逢兩令威洛中遺老李元爽年一百三十六禪僧如滿歸洛年九十五又云時祕書狄兼謨河南尹盧貞以年未及七十雖與會而不及列白居易五老圖序夫蹈榮名而保終吉都貴勢而躋遐耉白首一節人生所難今致政宫師相國杜公雅度敏識圭璋巖廟清德令望龜準當世功成自引得謝君門視所難得者則安享之謂所難行者則恬居之燕申睢陽與賔客太原王公故衛尉河東畢卿兵部沛國朱公駕部始平馮公咸以耆年掛冠優游鄉梓暇日宴集為五老㑹賦詩酬唱怡然相得宋人形於繪事以紀其盛昔唐白樂天居洛陽為九老會於今圖識相傳以為勝事距兹數百載無能紹者以今况昔則休烈鉅美過之明逸游公之門久矣以鄉閭世契倍厚常品今假守留鑰日登翹館因得圖像占述序引以代鄉校詠謡之萬一至和丙申中秋日錢明逸序耆英會序昔白樂天在洛與高年者八人遊時人慕之圖傳於世宋興洛中諸公繼而為之者再矣皆圖形普明僧舎樂天之故第也元豐中潞國文公留守西都韓國富公致政在里第皆自逸於洛者潞國謂韓國公曰凡所為慕於樂天者以其志趣高逸也奚必文與地之襲焉一日悉集士大夫老而賢者於韓公之第買酒相樂賔主凡十有二人圖形妙覺僧舍時人謂之洛陽丨丨丨孔子曰好賢如緇衣取其敝又改為樂善無厭也二公寅亮三朝為國元老入贊萬機出綏四方上則固社稷尊宗廟下則熙百工和萬民為天子腹心股肱耳目天下所取安所取乎其勲業閎大顯庸豈樂天所能庶幾然猶效慕樂天所為汲汲如恐不及豈非樂善無厭者歟人洛中舊俗燕私相聚尚齒不尚官自樂天之會已然是日復行之斯乃風化之本可頌也宣徽王公方留守北都聞之以書請於潞公曰今家洛位與年不居數家之後顧以官守不得執巵酒在坐席良以為恨願寓名其間幸為我遊其為諸公嘉羨如此光未七十用狄監盧尹故事亦預於會潞公命光序其事光不敢辭時元豐五年正月端明殿學士兼翰林侍讀學士太中大夫提舉崇福宫司馬光序夀域碑記古聖人之營夀域也非土木非版築不金乎城不湯乎池晝無鍵而開夜無柝而擊東西不吾戎夷南北不吾蠻狄五嶽其雉堞四溟其溝湟天地離合我其扃鐍春秋啓閉我其門户入是域也㓜者蚩蚩壯者怡怡老者熙熙悉無中絶咸躋上夀故謂之丨丨焉得非道為土木德為版築仁乎城義乎池慈乎雉堞愛乎溝湟恭乎扃鐍儉乎門户使風雨不能毁矢石不能攻高低侔老氏之臺廣狹法華胥之國崇崇焉屹屹焉信善建而不拔者也洎霸道既昌皇風不競則必洒法令為風雨以驅之興賦役為矢石以攻之夀域之基忽然委地於乎域之壤也若民命何於是賤榖帛費金玉盜賊蠭起􅼈敓角長刑巢蔽空憲綱絡野夀域之民有以法而死者開拓疆塲肆放侵伐鋒鏑霜瑩卒乘鱗集蚊吞鼓穎蠶食張吻夀域之民有以兵而死者烟蒸霧障發癘成妖夀域之民有以夭而死者山貙搏人石䖝射影夀域之民有以横而死者王者患民之無夀也舉引年之典行養老之禮乞言於東序展禮於南庠又謂老者非帛不煖於是乎錫之以繒綵非肉不飽於是乎錫之以殽胾非車不安於是乎錫之以几杖斯亦得其末而失其本矣殊不知民之夀夭繫君之政教其猶影響爾其或捐金於山沉珠於泉禁不急之務棄難得之貨君德尚儉人心反淳則無法死者矣干羽舞階戈矛倒載謹不祥之器崇止敵之基我國無外斯民不争則無兵死者矣爕調律厯端正節候舉授時之典興除害之利五氣斯順兆人克寧則無夭死者矣貢金於逺方鑄鼎於中夏示不寶之物免逢㫋之患彼怪斯露厥人用康則無横死者矣夫如是則域不築而自成人不憂而自夀矣今我后道德慈愛行之於上法兵夭横絶之於下游游乎蕩蕩乎見夀域復成於今世某亦夀域中之一民耳知我帝力得無述焉碑者悲也悲域之中廢頌域之再興也其辭曰古之域築道樹德民欲夭兮安得後之域基奸址賊民欲夀兮不獲我聖人兮復於古昔王元之古今合璧事類備要前集卷五十八
