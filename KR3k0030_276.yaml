body:
  text: 古今合璧事類備要别集卷七十宋謝維新撰飛禽門雉格物總論雉大如家雞母按爾雅數種青質五色者曰鷂雉長尾走且鳴者曰鷮雉黃色鳴自呼者曰鳴雉似山雞而小冠者曰鷩雉五色皆備成章者曰翬此左傳所謂五雉者也然又有白者有黑者白者為中瑞黑者為下瑞也事類華蟲豫欲觀古人之象山龍丨丨注雉也尚書疏趾祭宗廟之雉曰丨丨記曲禮求其牡雉鳴丨丨丨詩求其雌雉之朝雊尚丨丨丨同上五工正少皥氏以鳥名官五雉為丨丨丨左一死贄舜修五禮五玉三帛二生丨丨丨注丨丨士丨雉書調羮進彭祖姓籛名鏗帝顓項之玄孫善養性能丨鼎進雉丨於堯饗食之以夀考神仙傳升鼎雊髙宗祭成湯有飛雉丨丨耳而丨祖已曰雉野鳥也今升鼎逺方將有求朝者乎尚書大傳羽畎貢羽畎夏翟注丨丨谷名夏翟鳥名中旌旗故丨之書禹貢越裳獻周成王時丨丨丨白雉去京師三萬里孝經援神契野雞雊季冬丨丨始丨山雌時丨梁丨雉丨哉時哉子路共之三嗅而作語童子化秦穆公時陳倉人掘地得物若羊非羊若豬非豬牽以獻諸公道逢二童子童子曰此名為媪常在地食死人腦若欲殺之以柏倕其首媪復曰彼二童名為陳寶得雄者王得雌者霸陳倉人捨媪逐二童子丨丨丨為雉飛入平林陳倉人告穆公穆公大獵果得其雉又化為石置之汧渭之間至文公為立祠名陳寶祠時流星集祠若雄雉列仙傳獨沐見齊丨丨子七十燕妻丨雉雌雄相隨感之撫琴而歌大夫射賈丨丨娶妻三年不言不笑後以如臯丨雉獲之其妻始言始笑左婦人獻丨丨丨雉於叔孫穆子穆子問其姓對曰子年長矣能捧雉以從我乎左作琴操衛侯女嫁於齊太子中道太子死傅母曰且往臨喪哀畢不肯歸終之以死傅母悔之取女所自操琴於塜上鼓之又有二雉俱出墓中傳母悲痛援琴作雉朝飛操以金買楚人擔雉雛路人問之對曰鳳凰乃丨丨丨之而獻楚王王感其意重之白氏帖對曰鳳凰見上注改曰野雞吕后名雉丨丨丨丨漢書注翔集郎車蕭望之為郎有雉數十常隨車丨丨本傳旁有童子魯恭為中牟令翟雉馴於桑丨丨丨丨不捕之曰雉方將雛曰童子有仁心三異也本傳見於西河桓帝永康七年白雉丨丨丨丨出於孟山白雉熊宗之精丨丨丨丨典略魏文射雉丨辛毗從丨帝丨丨帝曰樂哉毗曰於陛下甚樂於羣下甚苦帝後為稀出孫權射雉丨丨數丨丨潘濬諫權棹曰時特暫出耳不復如往日也濬曰天下未定萬機務多射雉非急弦絶指破皆能為害乃手自撤壞雉翳由是遂絶不復射雉登銘柱頭雄雉飛來丨王𢎞直內丨丨丨令管輅作卦曰至五月必遷時三月也至時果為渤海守魏志雊武庫中晉武庫閉甚密中忽聞雉丨張華曰必是蛇化也開視則有蛇蛻也雉集宫中褚遂良晉王為皇太子時飛丨數丨丨丨雉集縣署咸通十一年夏丨丨河內丨丨遍遺幕府假成式侍父於蜀以雉兔丨丨丨丨並孔氏帖不忌禁衛開元十三年十一月雄雉馴飛泰山齋宫內封禪所以告成功祀事無重於此者而野鳥馴飛丨丨丨丨不祥五行志駢孔述庭孔述睿下除武成令雉丨於庭雊髙駢寢髙駢進東面都統會二雉丨寢占者曰軍府將空駢惡之縣吏捕雉光啓三年新安丨丨家丨得丨養之月餘相鬪死野人獻雉五代元行欽明宗入汴州莊宗至萬勝鎮不得進與行欽登道旁冡置酒相顧泣下有丨丨丨丨問其冡名野人曰愁臺也孔氏帖鄭愔雉伏丨丨丨丨權門朝野僉載文泰雉竄西域髙昌遣使謝帝引責之丨丨猥曰丨丨千蒿各得其所豈不快邪西域使者入貢而主悉拘梗之孔氏帖畫對雉圖竇師綸丨丨丨丨一卷藝文志潘嶽射雉賦涉青林以遊覽兮樂羽族之羣飛聿采毛之英麗兮有五色之名翬厲耿介之専心兮奓雄艷之姱姿巡丘陵以經略兮畫墳衍而分畿於是青陽告謝朱明肇授靡木不滋無草不茂初莖蔚其曜新陳柯槭以改舊天泱泱以垂雲泉涓涓而吐溜麥漸漸以擢芒雉鷕鷕而朝鴝眄箱籠以揭驕睨驍媒之變態奮徑骹以角搓瞵悍目以旁睞鶯綺翼而赬撾灼繡頸而衮背鬱軒翥以餘怒思長鳴以效能爾乃搬揚拄翳停僮蔥翠緑柏參差文翮鱗次蕭森繁茂婉轉輕利𠂻料戾以徹鑒表厭躡以密緻恐吾遊之晏起慮原禽之罕至甘疲心於企想分倦目以寓視何調翰之喬桀邈儔類而殊才候扇舉而清叫野聞聲而應媒褰微罟以長眺已踉蹡而徐來摛朱冠之赩赫思藻翰之陪鰓首藥緑素身拖黼繪青鞦莎靡丹臆蘭綷或蹶或啄時行時止斑尾揚翹雙角特起良遊厄喔引之規裏應叱愕立擢身竦峙捧黃間以密彀屬剛挂以潛擬倒禽紛以迸落機聲振而未己山鷩悍害焱迅己甚越壑凌岑飛鳴薄廩擎牙低鏃心平望審毛體推落霍若碎錦逸羣之雋擅揚挾兩擽雌妬異倐來倐往忌上風之餮切畏映日之儻朗屏發布而纍息徒心煩而技癢伊義鳥之應機啾穫地以厲響彼聒音而徑進忽交距以接壤彤盈窗以美發紛首頽而臆仰或乃崇墳夷靡農不易隴稊菽叢糅翳薈菶茸鳴雄振羽依于其冡掞降丘以馳敵雖形隱而革動瞻挺穟之傾掉意淰躍以振踊暾出苗以入場愈情駭而神悚望黶合而翳皛雉脥肩而旋踵俽余志之精鋭擬青顱而點項亦有目不步體邪眺旁剔靡聞而驚無見自䳮周環回復繚繞盤辟戾翳旋把縈隨所歷彳亍中輟馥焉中鏑前捩重膺旁截疊翮若夫多疑少決膽劣心狷內無固守出不交戰來若處子去如激電窺􅀢葉慏歷乍見於是算分銖商逺邇揆懸力騁絶伎如輊如軒不髙不埤當味值胸裂嗉破觜夷險殊地馴粗異變昃不暇食夕不告倦昔賈氏之如臯始解顔於一箭醜夫為之改貌憾妻為之擇怨彼遊田之致獲咸乘危以馳驚何斯藝之安逸嗟禽徒其已豫清道而行擇地而住尾飾鑣而在服肉登爼而永御豈惟早𨽻此焉君舉若乃耽盤流遁放心不移忘其身恤司其雄雌桀而無節端操或虧此則老氏之所誡而君子之所不為詩集錦簷繡檔丨丨䄖丨丨襦強強啄食哺爾雛壟東卧穟滿風雨莫良媒壟西去齊人織網如素空張在野田平碧中綱緑漠漠無形影誤爾觸之傷首紅艾葉緑花誰剪刻中藏禍機不可測李賀其如張錦衣綺翼麥隴青青二月時白雉朝飛挾兩雌丨丨丨丨何離褷犢牧採薪感之悲春天和白日暖啄食飲泉勇氣滿爭雄鬪死繡頸斷雉子班奏急管絃心傾酒美盡玉碗枯楊枯楊爾生荑我獨七十而孤棲彈絃寫意恨不盡瞑目歸黃泥李白雉朝飛行旋母腳雉咿喔雛出殼毛斑斑觜啄啄學飛未得一尺髙還逐母丨丨丨丨麥壠淺淺難蔽身逺去戀雛低怕人時時土中張兩翅引雛食蟲不相離王建雉將雛令誘同族雙雉在野時可憐同嗜欲一雉獨先飛暗被潛羈束啖養能幾時返與他心腹置在芳草中翻丨丨丨丨前時相失者思君意彌篤逺見爾文章知君草中伏和鳴忽相召又啄翳前粟斂翅逺投君飛馳勢奔蹙罥挂在君前向君聲促促信君決無疑不道君相覆元稹雉五色離披原頭火燒盡兀兀野雉畏鷹出復沒將軍欲以巧服人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿徑箭加衝人決起百餘尺紅翎白鏃隨傾斜將軍仰笑軍吏賀丨丨丨丨馬前墮韓文公雉帶箭山雞附吐綬雞格物總論山雞鵕鸃一名錦雞有美毛其色鮮明五采炫耀自愛其毛終日影水目眩則溺又利距善鬪人以家雞鬪之則可擒吐綬雞一名真珠雞如人家雞母羽毛有白圓點嗉藏肉綬長闊數寸紅碧相間極為煥爛常時不見須遇晴日則向陽擺之頂上先出兩角肉亦二寸許然後徐舒其綬踰時悉斂於嗉下披其毛不復見或有死者割其頸臆間亦無所覩事類冠鵕鸃惠帝時郎中戴丨丨冠漢服輿志鑑山雞魏武帝時南方獻山雞帝欲其鳴舞而無由公子蒼舒今以大鏡著其前雞丨形而舞不知止遂至死韋仲將為之賦異苑文彩可愛焦君以錦雞為贈丨丨丨丨性復馴狎然終日為家貓所困遂復挈還仍嗣短句張藝叟集詩集繡翎紅觜石壑動晴景山禽陵翠微丨丨翻草去丨丨啄花歸巢暖碧雲色影孤青鏡輝不知春樹畔何處又分飛溫庭筠金冠綵衣髙原濯濯弄春輝丨碧丨纓丨繪丨石溜寫煙晴自照岩枝橫月夜相依有時勃窣盤跚舞忽地鈎輈格磔啼寄語人間用矰繳瑶臺鸞鳳好同歸文與可清唳相呼蠻荆鮮人秀厥美為物怪禽鳥得之多山雞稟其粹衆彩爛成文真色不可繪仙衣霓紛披女錦花綷繚輝光日華亂眩轉目晴憊髙田啄秋栗下澗飲泉瀨丨丨或丨丨舞影還自愛豈知文章纍遂使網羅挂及禍誠其媒求友反遭賣有身乃吾患斷尾亦前戒不羣世所驚甚美衆之害稻粱雖云厚樊縶豈為泰山林歸無期羽翮日已鍛用晦有前言書之可為誡歐陽修有文堪悅魯恭感物性能馴因把華蟲贈里仁雖丨丨章丨丨目却無言語解媒身只愁貓犬常窺汝胡不山林逺避人好在舊籠還舊主便當歸放澗之濱張藝叟吐綬雞盤花絛越山有鳥翔寥廓嗉中夭綬光若若越人偶見而竒之因名吐綬江南知四明天姥神仙地朱鳥星精鍾異氣赤玉雕成彪炳毛紅綃剪出玲瓏翅湖煙始開山日髙迎風吐綬丨丨丨臨波似染琅玕草映葉凝開王母桃花紅草緑人間事未若靈禽自然貴鶴吐明珠暫報恩鵲銜金印空為瑞春和秋霽野花開玩景尋芳處處來翠幕雕籠非所慕珠丸柘彈莫相猜棲月啼煙凌縹眇髙林先見金霞曉三山仙路寄遙情刷羽揚翹欲上征不學碧雞依井絡願隨青鳥向層城太液池中有黃鵠憐君長向卑枝宿何如一借羊角風來聽簫韶九成曲劉禹錫仰稻梁雲飛水宿永相忘却向雕籠丨丨丨春草滿山歸不得對人猶復吐文章張藝叟詠薛判官吐綬雞組麗深藏樊籠寄食老低摧丨丨丨丨肯自媒天日清明聊一吐兒童初見互驚猜荆公鷓鴣附竹雞格物總論鷓鴣大如小野雞臆前有白圓點背上間紫赤毛其飛也皆東南回翔然開翅之始必先南翥多對啼自呼鈎輈格磔者是有鳥相似不為此鳴者非也竹雞比之差小毛羽褐多斑赤紋自呼泥滑滑所在山谷有之事類樂餘年零陵李宗古居士唯一妻一女垂老病足養鷓鴣鸚鵡以丨丨丨黃山谷戲詠詩二首山谷詩見後詩集黃茅岡山鷓鴣朝朝暮暮啼復啼啼時白露風凄凄丨丨丨頭秋日晚苦竹嶺下寒月低畬田有粟何不啄石楠有枝何不棲迢迢不緩復不急樓上舟中聲暗入夢鄉仙客展轉卧抱兒寡婦倣徨立山鷓鴣爾本此鄉鳥生不辭巢不别羣何苦聲聲啼到曉啼到曉唯能愁北人南人慣聞如不聞白樂天苦竹嶺丨丨丨頭秋月輝苦竹南枝鷓鴣飛嫁得燕山胡鴈壻欲銜我向鴈門歸山雞翟雉來相勸南禽多被北禽欺紫塞嚴霜如劍戟蒼梧故巢難背違我心誓死不能去哀鳴驚叫淚沾衣李太白同類相呼楚越有鳥甘且腴嘲嘲自鳴為鷓鴣徇媒得食不復慮機械潛發罹置罦羽毛摧折觸籠籞煙火煽赫驚庖厨鼎前芍藥調五味膳夫攘腕左右視齊王不忍觳􅑌牛簡子亦放邯鄲鳩二子得意猶念此况我萬里為孤囚破籠展翅當逺去丨丨丨丨莫相顧栁宗元放鷓鴣詞數聲相應書中曽見曲中聞不是傷情即斷魂北客南來心未穩丨丨丨丨過前村張復之懊惱澤家南禽無似似相依錦翅雙雙傍馬飛孤竹廟前啼暮雨汨羅祠畔弔殘暉秦人只解歌為曲越女空能畫作衣丨丨丨丨非有恨年年長憶鳳城歸韋莊鈎輈磔格落照蒼茫秋草明鷓鴣啼處逺人行正穿屈曲崎嶇路更聽丨丨丨丨聲曾泊桂江深岸雨亦於松嶺阻歸程此時為爾腸干斷乞放今宵白髮生李羣玉相呼相應暖戲煙蕪錦翼齊品流應是近山雞雨昏青草湖邊過花落黃陵廟裏啼遊子乍聞征袖濕佳人才唱翠眉低丨丨丨丨湘江闊苦竹叢深春日西鄭谷報晴報雨山雌之弟竹雞兄乍入雕籠便不驚此鳥為公行不得丨丨丨丨總同聲黃魯直戲詠零陵李宗古居士家馴鷓鴣為唱愁辭江天梅雨濕江籬此處煙香是此時苦竹嶺頭歸去日海棠花落舊棲枝春宵思極蘭燈暗曉月啼多錦幕垂唯有佳人憶南國殷勤丨爾丨丨丨鄭谷應是鼻亭真人夢出大槐宮萬里蒼梧一洗空終日憂兄行不得鷓鴣丨丨丨丨公山谷竹雞雨瀟瀟泥滑滑苦竹罔丨丨丨馬上郎馬蹄凌兢雨又急此鳥為君應斷腸梅聖俞泥滑滑春日正晴明滿園花盛發勸爾竹下雞莫啼丨丨丨文與可又雪丨丨丨到山郭提壺勸君亦不惡林中解道不如歸家人應念思歸樂山谷又山行三日厭泥行幸自今朝得一晴又聽數聲丨丨丨情知浪語也心驚楊廷秀樂府啼傍黃昏見竹古今合璧事類備要别集卷七十
