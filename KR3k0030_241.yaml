body:
  text: 古今合璧事類備要别集卷三十五宋謝維新撰花卉門荷花附旱蓮花格物叢話荷芙蕖也其莖茄其葉葭其本蔤其花菡蓞其實蓮其根藕其中的的子也的中薏薏子中心也的薂即蓮實然又有别名或曰水芸或曰水華或曰草芙蓉又有三色有白花者有紅花者有碧花者且不止此又有千葉花者千葉佳矣未為竒也又有重臺者䨇頭者䨇頭不常有世人指以為瑞應猶未也又有曉起朝日夜低入水者人又目之為睡蓮此花皆不生於髙原陸地而生於卑濕淤泥之中彼另有一種出於陸而不出於水亦名旱蓮識者之所宜必辨也事類芙蕖隰有荷華注荷華丨丨也詩山有扶蘇菡蓞彼澤之陂有蒲與荷云云有蒲丨丨詩澤陂紫芙蓉漢昭帝逰栁池有丨色丨丨大如斗花素葉甘可食芬氣襲人其實如珠拾遺記草芙蓉芙蓉園魏文帝所開園有池種蓮其中芙蓉即蓮花也産扵陸者曰木芙蓉産於水者曰丨丨丨杜詩注白蓮社逺法師居廬山東林寺有丨丨花與陶潜十八人同修浄土號為白蓮丨晉書紅蓮幕庾杲之字景行王儉用為衛將軍長史蕭緬與儉書曰盛府元僚實難其選庾景行泛綠水依芙蓉何其麗也時人以入儉府為蓮花池故緬書美之本傳儀仗生花王敦在武昌鈴下丨丨丨蓮丨五六日而落捜神記衣傘皆花無錫湖陂雨初止陂吏見一小婦人着青衣戴傘呼之不得自投陂中是大蒼獺丨丨丨是荷丨同上二蓮同榦宋文帝元嘉間合跗同莖㤗始中嘉蓮一雙並實丨丨丨丨生豫州鯉湖以詞采名謝靈運丨丨丨丨鮑照曰謝詩如初發芙蓉晉書以姿貎幸張昌宗丨丨丨見丨楊再思每曰人言六郎似荷花非也正謂荷花似六郎爾蓮生擔湖宋文帝元嘉中丨丨建東額丨丨一莖兩華朱書蓮號相府于頔因瑞丨制曲丨丨丨蓮唐史此歩歩花南齊東昏侯鑿金為蓮花貼地令潘妃行其上曰丨丨丨生蓮丨也南史此解語花太液池千葉白蓮開帝與妃子共賞指妃謂左右曰何如丨丨丨丨邪天寳遺事採以爲飾滄州金蓮華州人研之如泥竹間綵繪光彩煥爛與真金無異但不能入火而已更有莖出其花如蝶每微風則揺蕩如飛婦人競丨之丨丨首丨語曰不戴金蓮花不得到仙家甘陽編服之通仙華山頂有池池中生千葉蓮丨丨丨丨因名華山華山記夜低入水南海有睡蓮丨則花丨丨丨屯田韋郎中從事南海親見酉陽雜爼近忽變碧麻姑壇東南池中有紅蓮丨丨丨丨今又白矣壇記芳氣竟谷九疑山過半路皆行松竹下狹路有清澗澗中有黄色蓮丨丨丨丨王歆之神記宋之問秋蓮賦天授元年勑學士楊炯與之問分直於洛城西入閣每雞鳴後至羽林仗閽人奏名請龜契佇命拱立于御橋之西玉池清泠紅蕖菡蓞謬履扃闥自春徂秋見其生視其長覩其盛惜其衰得終天年而無夭折者良以隔礙仙禁人莫由窺向若生於瀟湘洞庭溱洧淇澳即有呉姫越客鄭女衛童芳心未成採擷都盡今委以白露順以凉風榮落有期私分畢矣斐然願歌其事久之乃述秋蓮賦焉其辭曰若夫西城於大千臣某獲覩昇平濫居榮寵聞瑞應而稱慶仰繢事而增歡無任抃蹈喜躍之至為京兆王權周茂叔愛蓮說水陸草木之華可愛者甚蕃陶淵明獨愛菊自李唐來世人甚愛牡丹余獨愛蓮出於淤泥而不染濯於清漣而不妖中通外直不蔓不枝香逺益也清亭亭浄植可逺觀而不可䙝玩焉余謂菊花之隱逸牡丹花之富貴也蓮花之君子也噫菊之愛陶後鮮有聞蓮之愛同予者何人牡丹之愛宜乎衆矣歐陽公蓮花賦歩蓮塘以清暑兮颯蘋風以中人擷杜若之春榮兮搴芙蓉於水濱嘉丹葩之耀質出淥水之含新䕃曲池之清泚漾波紋之奫淪披紅衣而耀彩寄清流以託根挺無華之淺艶靡競麗乎先春抱生意以自得兮及薫時之嘉辰若夫夏畹蘭褰夢池草宻慘羣芳之已銷獨斯蓮之迥出可以嗅清香以析酲可以玩芳華而自逸况其晩浦煙霞水亭風日投文竿而餌垂泳萍莖而波溢絲縈藕以全折杯卷荷而半側墜紫菂以欹煙歛紅芳而向夕可憐影兮相顧列金葩而返植清風遏以似起碧霧合而乍失或兩兩以相扶漸亭亭而獨出發燕脂於此土生異香於西域匪江妃之小腰即廣陵之清骨爾乃曲沼㣲陽横塘細雨逐横上之歸鞍笑堤邊之㳺女墮虹梁而窺影倚風臺而欲舞覆翠被以薫香然犀燈而照浦雙心並根千株泣露湛月白而風清香池平而樹古送艇子於西州聞棹謳於北渚迎桃根而待檝逄宓妃而未度廹而視之靚若星妃臨水而脉脉盈盈逺而望之杳如峽女行雲而朝朝暮暮其妖麗也其閒麗也香荃橈兮木蘭舟澹容與兮悵夷猶東西隨葉隱上下逐波浮已見雙魚能比目應笑鴛鴦會白頭昔聞妃子貴東鄰池上金花不染塵空留此日田田葉不見當時歩歩人詩集香逺荷丨風送丨梁元帝紅膩丨丨小池蓮杜甫霜倒丨丨半池蓮同上露洗曉丨丨紅蓮韋蘇州雨過丨丨亂紅蕖杜甫朱華冐丨丨丨綠池曺子建碧圜傾蓮折丨丨丨白樂天芙蓉發丨丨始丨池謝靈運菡蓞溢丨丨丨金塘劉公幹長洲足丨丨丨芰荷杜甫别浦落丨丨丨紅蕖同上揺白羽江蓮丨丨丨杜甫蓋明鏡紅蕖丨丨丨白樂天野池紅丨丨蓮欲丨杜甫江天足丨丨丨芰荷同上嬌欲語荷花丨丨丨愁殺盪舟人李白淨如拭荷花丨丨丨杜詩艶且鮮碧荷生幽泉朝日丨丨丨李白始發池芙蓉丨丨丨謝靈運方出水白蓮丨丨丨劉夢得葉如規荷生綠泉中碧丨齊丨丨張華絲作縷藕丨牽丨丨荷葉捧成盃隋殷英童越女歌丨丨丨採蓮李白宫娃採闔閭丨丨能丨蓮明珠作佩龍為船杜牧之雙影共一莖孤引綠丨丨丨分紅隋松公瞻一蔕卷圓花丨丨丨交葉坐心開欣隨玉露㸃不逐金風摧梁簡之摘未稀晩日照空磯採蓮承晩暉風起湖難渡蓮多丨丨丨棹動芙蓉亂船移白鷺飛前人無可並都無色丨丨不柰此香何李義山去採蓮錦帶雜花鈿羅衣垂綠川問子今何去丨丨江南丨梁吳筠戲採蓮金槳木蘭船丨丨江南丨蓮香隔浦渡荷美滿江鮮梁劉孝威納凉時荷凈丨丨丨杜竒特處佛愛我亦愛清香蝶不偷一般竒特處不上婦人頭鄭谷花十丈太華峯頭玉井蓮開丨丨丨藕如船韓文公蕚一倍水國煙鄉足芰荷就中芳瑞此難過風情為許呉王近紅丨猶教丨丨多陸龜蒙詠重臺蓮銀槖破洩香丨丨丨瀉露玉盤傾我慙塵垢眼見此瓊瑶英白樂天玉冠鮮素房含露丨丨丨紺葉揺風鈿扇圎夲是呉中經進藕今為伊水寄生蓮同上泛紅衣煙開翠扇清風曉水丨丨丨白露秋許渾清香溽彩新帝俯朱檻嘉木開芙蓉丨丨晨風逺丨丨寒露濃瀟洒出人世低昂多異容甞聞色空喻造物難為工留連秋月宴迢遞東山鍾柳子厚柔姿冶態綠荷舒卷凉風橈紅蕚開縈紫菂重雙女漢臯爭笑臉二妃湘浦並愁容自憐秋露丨丨結不曉春妖丨丨濃終恐玉京仙子識却將歸種碧蓮峯李紳雙蔕兩花日分丨丨影風合丨丨香梁朱超詠同心蓮共妍分艶芙蓉池裏葉田田一本雙枝照碧泉濃艶丨丨香共散東西丨丨帶相連姚合㣲根出浪勿言草卉賤幸宅天地中丨丨纔丨丨短榦未揺風寕知寸心裏蓄紫復含紅沈約清香滿面全紅開似鏡半綠卷如杯誰謂囘風力丨丨丨丨來杜雨浥紅蕖丨丨丨丨冉冉香杜風揺紫蕚㣲丨丨丨丨輕露拂朱房中池所以綠待我泛紅粧沈約玉皇謫墮似說丨丨親丨丨至今猶看水霜枹李白西子多情真妃無力半酣後丨丨丨丨欲歩時百氏集王儉歸來白公去後禪林在丨丨丨丨幕府非張芸叟楊妃未醒雲歸巫女粧猶潤浴出丨丨睡丨丨杜衍湘浦妃嬪漢宫姊妹爭新寵丨丨丨丨望所思歐陽公水宫仙子平池碧玉秋波瑩綠雲擁扇青揺柄丨丨丨丨闘紅粧輕歩凌波踏明鏡張文潜淨色比天女蓮花生淤泥丨丨丨丨丨空明世無匹銀缾送佛所蔫然落寳床應返梵天去頴濵風流似六郎露華晞别渚煙雨漲横塘容態天然别丨丨丨丨丨百氏集卷却雲錦段貪看翠盖擁紅粧不覺湖邊一夜霜丨丨天機丨丨丨從教匹練寫秋光坡亂剪素羅粧司花手法我能知說破當知未大竒丨丨丨丨丨一樹略將数朶蘸燕支楊誠齋嬋娟雙姊妹漢苑丨丨丨丨丨天台縹緲両神仙當時盡有風流格謫向人間作瑞蓮邵堯夫雙頭蓮紅白開共塘丨丨蓮花丨丨丨兩般顔色一般香宫娥梳洗爭先後半是濃粧半淡粧楊誠齋白紅各一家芙蓉照水弄嬌斜白丨紅丨丨丨丨近日司花出新巧一枝能着兩般花牧之旱蓮光彩射晴暉初對庭除似浦池寳陀丨丨丨丨丨等閑遊女來攀折免使蘭橈水濺衣百氏集樂府將花寄恨一曲天香金粉膩蓮子心中自有深深意意宻蓮深秋正媚丨丨丨丨無人㑹荷橋上少年橋下水小棹歸時不許牽紅袂浪濺心圓又碎無端欲伴相思淚漁家傲歐陽公無人知苦妖艶秋蓮生别浦紅臉青腰舊識凌波女照影弄粧嬌欲語西風豈是繁華主可恨良辰天不與纔過斜陽又值黄昏雨朝落暮開空自許竟丨丨觧丨心丨蝶恋花晏叔原温泉試浴雨過蒲萄新漲綠蒼玉盤傾墮碎珠千斛姫㜮擁前紅簇簇温泉初試真妃浴驛使南來丹荔熟故剪輕綃一色頒時服嬌汙易晞凝醉玉清香不用香綿撲漁家傲宋景文公波間粧影雨過横塘圓荷嫰綠新抽越女輕盈畵橈穩泛蘭舟波光艶粉紅相間脉脉嬌羞菱歌隱隱漸遥依約凝眸隄上郎心丨丨丨丨遲留不覺歸時暮天碧襯蟾鈎風蟬噪晩餘霞映幾㸃沙鷗漁笛不道有人獨倚危樓新荷葉晁无咎古今合璧事類備要别集卷三十五
