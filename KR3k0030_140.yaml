body:
  text: 古今合璧事類備要後集卷七十一宋謝維新撰守臣門京尹歴代沿革秦分天下為三十六郡京師為内史漢因之景帝分左右内史武帝置京兆尹右扶風左馮翊為三輔後漢都洛為河南尹魏晉因之歴代所都皆為尹江左為丹陽尹北齊為清都尹後周及隋復為京兆尹唐武徳元年雍州置牧一人以親王為之然常以别駕領州事永徽中改尹曰長史開元元年改京兆府長史復為尹通判府務牧缺則行其事百官志五代都汴為開封尹國朝牧尹不常置太宗真宗皆嘗尹京後親王無繼者權知府一人以待制以上充掌尹正畿甸之事中都之獄訟皆受而聽焉小事則裁決大事則禀奏若承㫖已斷者刑部御史臺無輒糾察典司轂下建隆以來為要劇之任崇寜三年蔡京乞罷權知府置牧尹各一員專總府事牧以皇子領尹以文臣充四朝志尹以親王為之號判南衙凡命知府必帶權字以翰林為之翰林學士及雜學士若待制則權𤼵遣而已所選皆人望蓋四方取則之地也聖朝職畧中興駐蹕杭州建炎三年改杭州為臨安府守臣帶浙西安撫多卿監從臣兼紹興三年詔臨安府有奏禀事許不隔班上殿乾道七年皇太子領臨安府尹就東京為廨廢臨安府通判簽判職官置少尹判官推官少尹依淳化判官例差侍從以上判官依天聖令用郎官以上餘曹掾依舊府官庭參仍拜小事少尹裁決徒流以上具案判準表奏則係皇太子銜申中書以下文移則少尹簽書九年皇太子辭免臨安府尹其知通簽判推判官並復置中興㑹要孝宗㑹要事類佩玉景帝分置左右内史武帝更名京兆尹服銀章青綬丨水蒼丨漢書執版典職曰京兆秩中二千石見尚書令僕射丨丨揖之思過韓延夀為左馮翊嵗餘不出行縣丞掾請之至髙陵有昆弟訟延夀傷之曰骨肉爭訟是吾教不行也乃入傳舍閉閤自丨丨於是訟者遞相責讓皆肉袒願以田相移至死不爭延夀恩信周二十四縣無訟者吏不敢欺平反雋不疑為京兆尹每錄囚徒其母問以丨丨則喜而食若無所出則母怒而不食故不疑為吏嚴而不殘鈎距趙廣漢為京兆尹善為丨丨捕治盜賊如神人皆稱伏搏擊翟方進為京兆尹丨丨豪强京兆畏之浩穰張敞傳丨丨於三輔尤劇注丨大丨盛言人衆多也並同上表則況屬休明之朝宜尊丨丨之位白六帖明府漢侯文謂孫寳曰丨丨素著威名職尹唐嚴郢大歴末進拜京兆尹嚴明持法令疾惡撫躬敢誅殺賊盜衰減隸宫匠丁數百人號稱丨丨脂韋唐張仲方為京兆時軍人横恣仲方丨丨坐不稱職出為華州刺史具瞻李叔明遷京兆尹長安歌曰前尹赫赫丨丨允若後尹熙熙丨丨允斯並唐師表唐憲宗時京兆尹柳公綽口奏云京兆為輦轂丨丨彈壓柳仲郢先為京兆尹政號嚴明後為河南尹以寬惠為政或言不類京師時仲郢曰輦轂之下丨丨為先東都之治惠愛為本長史見沿革京尹職司丨丨韓賀兩表都輦宜紆朝綬用清丨丨唐大詔令相王雍州牧制京轂徳宗諡册左翊丨丨之地近入黄圖幸新豐勑左馮晉天福四年廢長春宫勑曰丨丨故地三輔舊名續通典尹王都芒芒天區畫冀為京商邑翼翼四方之經爰作卿士以丨丨丨風化所興萬國承流揚雄河東尹箴清都輦宜紆朝紱用丨丨丨唐大詔令相王雍州牧制司輦轂唐許孟容為京兆尹神䇿軍自興元後日驕恣軍吏李昱貸富人錢八百萬三嵗不肯歸憲宗詔以昱付軍治之奏曰臣職丨丨丨當為陛下抑豪强帝嘉其守正京師豪右大震尹右輔丨丨丨而輔西郊白集崔陵制尹京輦自丨丨丨人甚便安白集盧士致制管神州京兆郡國之首所丨丨丨赤縣韓文答友人書尚寬簡顧少連改京兆尹政丨丨丨不為灼灼名承大化柳渾為相曰陛下當擇臣輩以輔聖徳臣當選京兆尹以丨丨丨抑豪右唐劉栖楚改京兆尹摧丨丨丨甚有鈎距人多比之趙廣漢威掾部孫寳召為京兆尹以立秋日署侯文東部督郵入見勑曰今日鷹隼始擊當順天氣以丨嚴霜之誅丨丨詎有其人乎文即曰無其人不敢輕受職寳曰誰也文曰霸陵杜穉季寶曰其次文曰豺狼横道不宜復問狐狸寶黙然竟無所譴無所獻李峴進京兆尹元宗幸温陽甸内巧供億以媚上峴獨丨丨丨帝異之出為零陵太守時京師米翔貴百姓謡曰欲榖賤追李峴以治稱黎幹遷京兆尹頗丨丨丨嚴肅為治京師苦樵薪乏幹度開漕渠興南山谷口尾入于苑以便運載幹密具􅔓船作倡優水嬉冀以媚帝久之渠不就父子為唐柳仲郢丨丨更九鎮五丨京兆再遷河東兄弟繼唐李仲通天寶末丨為京兆尹丨叔明丨之内署擢韋渙帝舅鄭光莊主吏豪肆積年不輸官賦渙係之且言必寘以法曰陛下自丨丨丨臣尹京邑安可使畫一法獨行於貧下乎帝入白太后曰是不可犯后為輸租乃免頭上尹劉栖楚改京兆尹峻誅罰不避權豪宿奸老蠧斂迹一日軍士乘醉有所凌突諸少年從旁譟曰癡男子不記丨丨丨耶分陜以主丨丨丨東周公丨之丨丨丨西召公丨之史記三亳版尹丨丨丨丨書保釐東郊命畢公丨丨丨丨尹兹東郊君陳丨丨丨丨並同上吏民稱口前漢趙廣漢行京兆尹滿嵗為真以和顔接下事推功善歸之於下京兆政清丨丨丨之而不容口長安𫝊以為自漢興以來治京兆者莫能及其𤼵摘奸伏如神廉明威制豪强小民得職百姓追思歌之至今枹鼓稀鳴張敞為京兆長安市偷盜尤多一日捕數百人丨丨丨丨市無偷盜又記室新書赭衣盡獲丨丨丨丨表賢顯善張敞治京兆一一依廣漢之迹方畧耳目𤼵伏禁奸不如廣漢然敞以經術自輔其政頗雜儒雅往往丨丨丨丨不醇用誅罰以此能自全接士推功趙廣漢遷京兆尹和顔丨丨丨丨歸於吏曰某掾所為非二千石所及吏見之皆自寫心腹無所隠匿三輔課最尹翁歸為右扶風京師畏其威嚴扶風大治盜賊常為丨丨丨丨並同上京師肅然張輔遷河南尹丨丨丨丨東觀漢記出試政事前王駿為少府成帝欲大用之丨王為京尹丨以丨丨明出自然後延篤字叔堅為京兆尹視民如赤子正身率下民不忍欺也其聽訟理寃發摘奸伏丨丨丨丨滿嵗稱職韓延夀丨丨丨丨為真五日京兆張敞被劾使吏絮舜有所案問舜以敞被劾當不久在職遂慢其事曰丨丨丨丨尹耳何足畏敞聞殺舜書簡示曰丨丨丨丨尹如何竟免邪朝許政能丨丨丨丨任先廣漢白氏六帖時推明察丨丨丨丨選在不疑同上美譽能名邊延丨丨趙張丨丨延篤邊鳳趙廣漢張敞異才爽氣丨丨間出丨丨殊倫杜甫贈鮮于京兆趙張三王漢自孝武置左馮翊右扶風京兆尹而吏民為之語曰前有丨丨後有丨丨謂趙廣漢張敞王尊王章王駿職官分紀邊延二君後漢延篤為京兆尹其政用寬仁愛䘏民黎郡中歡愛三輔咨嗟先是陳留邊鳳為京兆尹亦有能名郡人為之語曰前有趙張三王後有丨丨丨丨同上髙第入守京兆尹京師長安中浩穰於三輔尤為劇國郡國二千石丨丨丨丨京兆不過二三年近者數月一年輒危失名以罪過罷唯趙廣漢張敞為久任也治行人守前黄霸以丨丨第一丨丨京兆聲重朝廷前漢始元中有男子自謂衛太子京兆尹雋不疑叱吏收縛曰昔蒯聵違命出奔輒距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄由是丨丨於丨丨在位者皆自以為不及名重朝廷袁安為河南尹政號嚴明在職十年京師肅然丨丨丨丨條敎可觀趙廣漢聰明下不能欺延夀厲善所居移風翁歸抱公潔已為近表張敞緣儒雅刑罰必行丨丨丨丨類要大體不苛劉晏子士安為京兆尹總丨丨丨丨號稱職剪治强宗漢華松丨丨丨丨北堂書抄檢御貴戚尹當整頓京師丨丨丨丨李郃别𫝊政號嚴明唐柳仲郢為京兆尹北司吏入粟違約仲郢殺而尸之自是人無敢犯丨丨丨丨法簡不犯晉傅瑕持丨丨而丨丨書抄民安盜息鄭渾字文公為京兆尹以百姓新集為制移居之法使兼復者與單輕者相伍溫信與孤老為比勤稼穡明禁令以發奸由是丨丨於農而丨賊丨魏志豪右大震楊於陵字達夫器量方峻為京兆尹京師丨丨丨丨忠亮篤誠晉武帝咸寧詔河南北郡之首其風教宜為遐方所模以導齊之奉車都尉王恂丨丨丨丨才兼内外明於治化以恂為河南尹寬明簡恵政非一軌俗備五方内樹丨丨外符丨丨神臯載穆轂下以清任昉齊竟陵王行狀四方表則晉庾純𫝊詔曰河南京畿大都丨丨丨丨庾純精粹中正才經治亂以純為河南尹廉謹足稱魏少遊以吏幹知名四為京尹有規模久任無赫赫之名而丨丨有丨丨也代宗實錄留冬日愛晉元帝丹陽𫝊序曰尹者正也廣漢和顔接下子髙自輔經術孫寳行嚴霜之誅袁安丨丨丨之丨晉書我恩如春李爕履潔白之節秉執忠良吏民愛敬作歌曰丨府君道教舉丨丨丨威如虎愛如母訓如父幢蓋鼔吹李燮拜京兆尹加丨丨丨丨李燮别𫝊玉麟銅虎樊子蓋檢校河南内史屢有理績隋文帝曰今為公别造丨丨符以代丨丨職官分紀侍宴出安張曄為京兆尹入丨丨樂丨丨京邑時人以為寵然自以幹治稱舉政有名王播亦遷京兆尹自李諒後政條隳斁奸豪浸不職播修丨丨丨丨負望少衰薛洪遷京兆尹㑹大旱奏滻水入某中者取十九溉民田仇士良使盜擊宰相李石於親仁里迹出禁軍洪坐不能捕以為丨丨丨丨以息衆讙吳湊為人彊力勤儉未嘗擾民上下愛向京師苦宫市彊帖取物有司附媚之湊見便殿因言中人所市不便責臣可辦若不欲外吏與聞禁中事宜科中官髙年謹信者為宫市令平價和售丨丨丨丨京兆之號名存内史之榮寵貴丨丨丨丨記室新書岳牧之首馮翊吾左輔也故其選任冠四方丨丨丨丨白集張正甫制乾曜寬簡唐源丨丨為京兆尹政存丨丨元賞威風黎幹以嚴肅為治韋渙公正方嚴吏不敢欺薛丨丨丨丨甚嚴唐武宗鎮撫畿甸丨丨丨丨肅清京師白六帖監臨三輔表則四方丨丨丨丨同上驂乘駟馬梁元帝去丹陽尹尹荆州曰丨駕丨丨丨謁帝朝承明聞挽鈴鵶温彰遷京兆尹一日丨丨丨者視之乃丨也尹曰是必訴其人採子命吏視之果得採雛者布徳忠孝韓愈上李實大尹曰閤下赤心事上條理鎮服丨宣天子威丨丨於君丨於親非徳不為杜牧曰尹坐堂上階下拜二赤縣令屬官將百人悉可笞辱丨有丨者丨可丨公正方嚴唐韋澳為京兆尹丨丨丨丨吏不敢欺職畧決斷無差唐徳宗時吳湊為京兆尹湊以勤儉為務人樂其政掾吏凡有疑獄難決之事多候湊將出時呈冀免摘瑕病湊雖倉卒必指其奸倖之處下筆丨丨丨毫釐之丨吏非大過不行笞責吏尤惕厲庶務咸舉河南二尹京兆五守西漢難追丨丨丨丨東平罕繼梁邵陵王辭丹陽尹表京兆三王唐中宗以張仁亶為洛州長史初賈敦頤為長史頗有政績故時為之語曰洛州有前賈後張可敵京兆三王也牧民天府丨丨丨丨緫京邑之浩穰楊億代謝表召典京師丨丨丨丨淇水除蔡延慶制委司京都丨丨丨丨胡文恭行錢明逸制尹正畿甸丨丨丨丨曲阜知開封謝景温制尹釐神甸丨丨丨丨舒信道上王府尹啓進尹神畿丨丨丨丨聖朝職畧京兆郡國首丨丨丨丨丨賈捐之𫝊統千里封畿丨丨丨之丨丨領萬户之版籍白六帖又封畿千里統以京兆西京賦願代京兆死趙廣漢坐罪吏人守闕訴號泣曰臣生無益縣官丨丨趙丨丨丨使牧養小民竞坐腰斬息譽於京邑晉袁甫曰人各有能有不能黄霸馳名於州郡而丨丨丨丨丨分水入金光韓朝宗天寳初召為京兆尹丨渭丨丨丨丨門匯為潭以通西市林木不脩具朝恩李勉為京兆尹兼御史大夫魚朝恩領國子監威寵宸赫前尹黎幹諂事之須其入敕吏治數百人具以餉至是吏請勉丨從曰吾候太學彼當見享軍容幸過府即