不少懈帝數丨丨丨丨賜詔寵異開成中東都留守牛僧孺徵拜左僕射上令左軍副使賷告身宣賜舊例留守入朝無中使丨丨上特丨丨之唐㑹要主鑰東門丨丨丨丨杜牧舉周復自代狀統禦都邑丨丨丨丨總持紀綱賈耽東都留守制列晨衙見崔從寳歴初為東都留守故事留司官入宫城門丨丨丨丨留守吏誔謾久廢至是復行君無迴顧房喬居守聖丨丨丨丨之憂類要行留悉總房元齡為相㑹伐遼留守京師詔曰公當蕭何之任朕無西顧之憂凡糧械飛輸軍伍丨丨丨裁丨之開府居留明皇東狩命丨丨以丨丨罕用武臣故事東都留守丨丨丨丨或用舊徳唐故事居守之任丨丨丨丨或用故相未嘗以武將而當保釐之重長慶二年以浚郊有事地逼封圻以前義武軍節度使陳楚為東都留守既非舊制尋亦改焉續通典團結民兵葉夢得字少藴號石林先生公留守建康丨丨沿江丨丨數萬至是呼集分據江津乃遣其内機宜官模領數千人守馬家渡虜果遣吾叛將酈瓊以輕兵來犯覺有備而去言行錄位置營壘洪文安公遵知建康徧走郊野丨丨丨丨民居及冢墓無相涉諸將不能易上賜手札曰寨地異同卿挺身任責非乃心王室疇克爾全活數千王沂國公文正公曽留守洛陽属嵗歉里有困積者飢者聚黨脅取鄰郡以强盜論公但重笞而釋之逺近聞以為法丨丨丨丨計並同上條具十事公知建康府赴闕奏事建康東南巨鎮南渡以來行宫在焉兼掌留鑰選用尤重公對于内殿敷陳時務當先定其規模為不可勝以待敵之可勝又丨丨丨丨上嘉納之鄭克撰吕尚書祉行狀輦下清肅李沆字太初諡文靖真宗朝戎人寇邊幸鄴沆以宰臣為東京留守不戮一人而丨丨丨丨賊鋒大敗劉錡領兵赴東京副留守任抵順昌府得報金已入東京公曰某本赴留司今東京既䧟幸全軍至此有城池可守當同心力以死報國公親於城上督衆設戰具凡六日而賊至公遣擊之頗殺金衆既而烏珠親擁兵至公登城㑹諸將問䇿或謂宜具舟全師而歸公曰朝廷養兵正欲為緩急之用況已挫丨丨軍聲稍振雖多寡不侔然有進無退公遣數百人出西門敵來接戰俄以數千人出南門士殊死鬬金丨丨横屍盈野遂拔寨遁去言行錄畫像以事王沂公再涖大名治政益信於俗民居軍伍咸丨丨丨丨之時虜使每往復入境皆云此府王公在焉必沐浴潔服後入陛辭特宴范成大淳熙中帥江東兼行宫留守丨丨詔明日辭選徳殿丨設几開丨酒三行命侍行過西小軒曰此朕清坐處也再坐上曰勸卿一盃且有以為侑公飲訖二内侍捧縑素來上有石湖二大字公拜賜進謝上為滿引復袖御書蘇軾詩一軸以賜聘使書名韓魏公鎮北門北門為丨丨道舊與京尹丨皆押字不名及公留守則丨且遣其副使成禹錫來仍諭來介曰以侍中在此故特名及公去後留守引前比欲得其名强之不可社稷所重景徳元年駕幸澶淵真宗謂王旦曰京師丨丨丨丨非公不可並同上宫鑰之嚴守丨丨丨謹丨文彦博謝表特許張蓋紹興六年中書門下省言秦檜孟庾並係兼行宫留守詔丨丨丨丨長於彈壓紹興八年召呂頤浩付以建康頤浩入辭趙鼎曰頤浩之政丨丨丨丨建康名郡頗望其來上曰繁劇固以彈壓為先若不動聲色使百姓隂受其賜小人却不知也中興係年錄詩集一品髙天上中台正人間丨丨丨休明值堯舜勲業過蕭曹始擅文三捷終兼武六韜動人名赫赫憂國意忉忉寵重移宫籥恩新換閫旄保釐東宅靜守䕶北門牢豹尾交牙㦸虬髯捧佩刀通天白犀帶照地紫麟袍白居易寄北都留守裴令公詩賜上公星使出關東兵符丨丨丨山河歸舊國管籥煥離宫行色旌旗動軍聲鼓角雄愛棠餘故吏騎竹見新童漢壘三秋靜胡沙萬里空其如天下望旦夕詠清風劉禹錫送裴司徒令留守太原詩藩方任更雄除書東守洛陽宫恩比丨丨丨丨丨拜表出時𫝊七刻排班衙日有三公旌旗嚴重臨關外侍府洪深接禁中姚合寄東都留守令狐相公詩副國威名重丨丨丨丨丨春卿禮樂崇賜珪推拜下分命遂居東髙斾翻秋日清鐃奏曉風教用儒門雅兵維武庫雄誰云千載後周呂獨為公耿湋送薛尚書兼御史大夫東都留守詩古今合璧事類備要後集卷七十一
