箒遂創意焉雞跖集八分書上谷王次中所作書斷八分篆法二分𨽻文佩觿集勢如八字有偃波之文又二說皆非也書有八體蔡伯喈於八體之後又分此法故云八分三品書書有十體其優劣之差為神妙能三品居神品者二十有五妙品九十有八能品一𨽻百有七古今善書盡在是矣書斷張旭草入神品八分入妙品入能品出書訣墨藪三體書真生行行生草真如立行如行草如走未有未能立能行而能走者也東坡志林八體書秦燒焚先典廢古文更用八體一曰大篆周宣王史籀作也二曰小篆始皇時李斯趙髙胡母敬所作也大小篆並簡册用也三曰刻符篆也四曰摹印施於印璽也五曰䖝書為虫鳥之形施於幡信也六曰署書門題所用也七曰殳書銘於戈㦸也八曰𨽻書始皇時程邈所定說文六文書蕭子良古今篆𨽻文體有藁書楷書蓬書懸針書垂露書飛帛書填書莫書鴈書虎爪書偃波書鶴頭書象形篆尚方大篆鳳鳥書科斗虫書龍虎書仙人書芝英書倒薤書龜書麒麟書金錯書旼脚書凡数十種皆出於六文八體之書而因事生變者也文體五雲體韋陟封郇公性侈縱常以五彩箋為書記使侍妾主之其裁答受意而已陟惟署名自謂所書陟字若五朶雲時人慕之號郇公丨丨丨本傳連錦書唐呂向工草𨽻能一筆環寫百字若縈髪然世號丨丨丨本傳賜綵牋唐明皇師韓澤木嘗於彩牋上八分書賜張説唐史給絹素唐裴行儉工草𨽻唐中宗嘗丨丨丨詔冩文選袐愛其法毎曰褚遂良非精筆佳墨未嘗輙書不擇筆墨而妍㨗者余與世南耳行儉傳印貞觀字唐太宗求書凡得王羲之真行二百九十紙又得獻之張芝等以貞觀字為印草迹命褚遂良楷書小字以影之開元五年元宗又書開无字為印唐書本紀題凌雲牓晉太元中新起太極殿謝安欲王獻之題牓而難之試謂曰魏時凌雲殿榜木題而匠者誤釘之不可下乃使韋仲將懸橙書之比訖鬢鬚盡白裁餘氣息獻之揣知其㫖正色曰使其若此所以知魏徳之不長出王羲之傳錢上寫經應用善寫細字微如毛髮嘗於一丨丨丨心丨又於粒麻上寫國泰民安四字出江南野史被中畫腹虞世南事見後硯池筆刀丨者城丨也丨者丨稍也墨者兵甲也心意者將帥也書訣墨藪紙田墨稼蔡洪赴洛人問吳中舊業曰丨為良丨筆為鉏耒丨為丨穡義理為豐年文房四寳劉氏小說印泥畫沙墨藪云張長史曰禇河南論書云用筆如丨丨丨丨始不悟後於江岸以錐畫字始信長史之言貴藏鋒也韋續書訣秃筆磨墨筆成冢墨成池不及羲之即獻之筆秃千枝墨磨萬挺不作張芝作索靖出東坡志林百嵗枯藤鍾繇弟子宋翼毎畫一波三折筆作一戈如百釣弩作一㸃如髙峯墜石作一牽如丨丨丨丨作一放縱如驚蛇入草此三折筆法志林隆冬枯樹獻之字勢疎瘦如丨丨之丨丨拘束如嚴家之餓𨽻其枯樹雖槎枿而无屈伸其餓𨽻飢羸而不放縱本傳賛雲鵠游天鍾繇書如丨丨丨丨羣鵞戲海王羲之書如龍跳天門虎卧鳳閣張芝如漢武好道憑虚欲仙蔡邕骨氣洞達如有神氣蕭子雲如危風阻日孤松一枝羊欣如大家婢為夫人舉止羞澁終不似真王獻之如河間少年皆悉光恱索靖如飄風忽舉鷙鳥乍飛王僧䖍如王謝子弟之爽自有一種風流袁松如深山道士見人便退縮出書斷隼尾擊石草書須緩前速後字有㸃者字竟乃安𨽻書有擊石波八分書有隼尾波最為難作墨藪家雞野鶩王僧䖍庾翼少時書與右軍齊名右軍後進庾猶不忿與都下人書云小兒輩厭家雞愛野鶩皆學逸少書又云庾征西初亦不服逸少有丨丨丨丨之論後以為伯英復生南史怒猊渴驥唐涂浩工書嘗書四十二輻屏八體皆備草𨽻尤工世狀其法三丨丨抉石丨丨奔泉唐本傳結體遵麗貞觀永徽間虞世南褚遂良以書専家薛稷外祖魏家家多藏虞禇書故稷銳情臨倣丨丨丨丨遂以書名天下唐本傳形貌魁梧歐陽詢初學羲之書後險勁過之因自名體尺牘所傳人以為法髙麗嘗遣使求之髙祖嘆曰彼觀其書謂丨丨丨丨耶本草筆跡精妙蔡有鄰濟陽人官至胄曹叅軍善八分始拙弱至天寳中遂精妙相衛間多其筆跡字勢遵勁翰林院自五代以來丨丨輕弱筆體无法太宗即賜筆札求善書許自言首得蜀人王著即召為持書著善草𨽻獨步一時初以紙一番令書八字又令書六字四字至一字皆極丨丨上稱善自是詔書體一變粲然可觀談苑飄揚嚴重真書難於丨丨草書難於丨丨大字難於結密小字難於寛綽志林勁徤肥厚東軒筆録云唐初字舉丨丨得晉宋風開元後變為丨丨元和後桞沈之徒復尚清勁五代楊凝式國初李建中妙絶一時行草亦主肥厚李昌式不免於重濁山谷嘗論三家法以為楊少師如散僧入聖學西臺如法師叅禪王著如小禪縛律南昌集籠道士鵝王右軍好鵞山隂道士有羣鵞求之其入邀右軍寫道徳經書畢即籠去本傳假黄仙鶴李邕善書仍自刻多假立刻字人名如茯苓芝黄仙鶴之類是也法書苑學李衛書王羲之字逸少為㑹稽右軍長史初丨丨丨夫人丨及渡江北見李斯等書之許見鍾繇梁鵠書之濟見蔡邕書人見張岳碑始知學衛夫人書徒費日月出墨藪傳知永法虞世南學書於浮屠智永宛其法為世秘愛太宗稱其五絶五曰書翰唐書本傳號歐陽體歐陽通早孤母教以父書使希父遺跡數年大進亞於詢父子齊名丨大小丨丨丨唐本傳辨羲之帖遂良工𨽻楷太宗令侍帝帝方求羲之帖莫質真偽遂良獨論所出唐書本傳紹宗積習王紹宗工草𨽻嘗與人書曰鄙夫書旡工者將由水墨積習耳常精心率意虚神空思以取之吳中陸大夫常以余比虞世南以不臨寫故也開世南被中畫腹與余正同本傳羲之變格李嗣真論右軍書不同以變格難儔書樂毅論太史箴體皆正直有忠臣烈士之象告誓文曹娥碑其容憔悴冇孝子順孫之象逍遥篇孤鴈賦迹逺趣髙有抜俗抱素之象畫像贊洛神賦姿儀雅麗有矜莊嚴肅之象皆見義以成字非得意以獨妍出書法苑仲將三具韋誕字仲將諸書並善鄴都宫觀始成詔丨丨題署御筆墨不佳因奏苦用張芝筆左伯紙臣墨兼此丨丨又得臣手然後可以逞徑丈之勢書斷堯佐八分陳文惠丨丨變古之法自成一家雖㸃畫肥重而筆力勁徤為方丈字謂之堆墨丨丨湖山小録伯英筋肉衛瓘索靖俱善書時謂瓘得丨丨之丨靖得伯英之丨出史本傳曼卿筋骨范文正公祭石丨丨文云曼卿之筆顔丨桞丨散落人間寶為神物志林王涯鑿垣唐丨丨居永寧里蓄名書畫以金玉為匳軸丨丨貯之重復固祕及被誅為人破垣剔取金玉而棄其書畫唐書崇韜發壙舊傳樂毅論乃羲之親書於石其他皆紙素所傳唐太宗聚二王墨迹惟樂毅論石本在其後隨太宗入昭陵朱梁時耀州節度使郭丨丨丨昭陵得之因復傳人開或曰公主以偽本易之元不曽入壙本入髙紳學士家筆談鍾繇嘔血丨丨見蔡邕筆法椎胸三日田丨丨墨藪衛夫人流涕王羲之年十二見前代筆說於其父沈中竊而讀之父因與之不旬日書便大進又學丨丨丨書夫人見其書丨丨曰此子必蔽吾名羊欣筆陣圖秃筆十八瓮孫智永善書以百本散於江南諸寺各留一本其所居吳興學書積乆有丨丨丨丨丨尚書故實飛帛三百㸃仁宗飛帛書尤為精妙至和中有待詔李唐卿撰丨丨丨丨丨以進上頗嘉之乃特為清淨二字以賜之其六㸃尢竒絶又出三百㸃之外歸田録詩集洒墨空餘小來翰墨塲松烟兔影傍明窓偶隨兒戲丨丨汁衆人許在崔杜行晚學長沙小三昧幻出萬物真成狂龍蛇起陸雷破柱自許竒觀繞繩床家人罵笑寧有道汗染黄素敗粉墻黄山谷集畫地元章作書日千紙平生自若誰與美丨丨為餅未必似要令癡兒出毚水錦囊玉軸來无趾粲然奪真疑聖智忍飢看書淚如洗至今魯公餘乞米東坡次朱元章跋王書揭雲管城脫帽為微笑便覺金光走龍尾試較鵞經拂硬黄傳此寳書十餘紙紙光葉葉丨丨膜字工戢戢行凍螘僧惠洪書破地中郎石經後八分盖顦顇顧候運爐錘筆力破餘地昔在開元中韓蔡同贔屭𤣥宗妙其書是以數子至御札早流傳榆楊非造次三人並入直恩澤各不二顧於韓蔡内辨眼工小字分日侍諸王鈎深法更秘杜詩鶩雞三館曝書防蠧毁得見來禽與青李春蛇秋蚓久相雜野丨家丨定誰美玉函金鑰天上來紫交勑使親臨啓紛綸過眼未易識磊落掛壁空雲委歸來妙意獨追求坐想蓬山二十秋怪君何處得此本上有桓𤣥寒具油巧偷豪奪古來有一笑誰死癡虎頭君不見長安永寧里王家破垣誰復修東坡次韻蛇蚓異時長笑王㑹稽野鶩腥膻汗刀机暮年却得庾安西自厭家雞題六紙二子風流冠當代顧與兒童爭愠喜秦王十八已龍飛嗜好晚將蛇蚓比坡詩把栗尾蘭亭蠒紙入昭陵世間遺墨猶雲騰顔公變法出新意細筋入骨如秋鷹徐家父子亦秀絶字外出力中藏稜嶧山傳刻典型在千載筆法留陽氷杜陵評書貴瘦硬此論未公吾不憑短長肥瘦各有態玉環飛燕誰敢憎吳興太守真好古購買斷缺揮縑繒龜跌入坐螭隠壁空齋晝靜聞登登竒蹤散出走吳越勝事傳說誇友朋書來乞詩要自寫為丨丨丨書溪藤後來視今猶視昔過眼百世如同燈他年劉郎憶賀監還道同時須服膺東坡墨妙亭書紙背劉連州寄桞子厚詩丨成欲寄庾安西丨丨應勞手自題聞道近來諸子弟臨池尋已厭家雞注云家有右軍書每紙背庾翼題云王㑹稽六紙二月三十日本集元和脚桞子厚酬劉禹錫家雞之贈云日日臨池弄小雛還思寫字付官奴桞家新様丨丨丨且盡薑芋斂手徒本集元祐脚徐清字靜之蓬萊女官也下西里玉氏詩作謝體書效魯直妍妙可喜陳无已詩云蓬萊仙子補天手筆妙詩清萬世功肯學黄家丨丨丨信知人厄匪天窮陳后山集開一笑遥怜醉常侍一笑開天容坡詩唐太宗嘗作飛帛書賜羣臣散騎常侍劉垍登御床引手得之帝笑曰昔聞婕妤辭醉輦今見常侍登御床唐書知八分阿買不識字頗丨書丨丨韓詩銀鈎蠒紙丨丨玉唾明丨丨松箑輕凉􅀢送仙山谷玉堂翰手收散丨丨揮丨丨歐集小試丨丨揮丨丨后山詩古今合璧事類備要前集卷四十四
