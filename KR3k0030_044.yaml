body:
  text: 古今合璧事類備要前集卷四十四宋謝維新撰儒業門經學事類五經指南王元感為四門博士撰書紏繆春秋振滯禮繩愆等凡數十篇魏知古見其書歎曰丨丨丨丨也本傳五經無對陸乂聰敏博學於五經最精熟館中謂之石經人為之語曰丨丨丨丨有陸乂北史本傳殿中無䨇肅宗詔丁鴻與諸儒論定五經同異於北京白虎觀帝親稱制臨决丁以才高論難最明諸儒稱之帝數嗟美焉時人歎曰殿中無䨇丁孝公唐書本傳當世大儒丁㳟習公羊嚴氏春秋㳟學義精明教授數百人州郡請召不應建武中遷少府諸生自逺方至者著録千人當世稱為丨丨本傳論易折角朱雲魯人也五鹿充宗為梁丘易元帝令與諸家論充宗乘貴辯口諸儒莫能抗有薦朱雲者召入論難連拄五鹿君故諸儒為之語曰五鹿嶽嶽朱雲折其角繇是為博士本傳語詩觧頥匡衡好學家貧傭作以資供用尤精力過絶人諸儒語曰無説詩匡鼎來匡丨丨丨人丨衡射策甲科調補平原文學本傳丁寛易説景帝時丨丨為梁孝王將軍距吴楚號丅將軍作丨丨三萬言訓詁舉大義而已今小章句是也漢史本傳王式詩諫丨丨為昌邑王師王以滛亂廢昌邑羣臣皆下獄誅惟王吉龔遂以數諫減死論式繫獄當死治事使者責問曰師何以亡諫書式對曰臣以詩三百五篇日夕授王至於忠臣孝子之篇未嘗不為王反覆誦之也至於危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇詩是以亡諫書使者以聞亦得以減死論本傳洼丹研易丨丨世傳孟氏易建武初為大鴻臚作易通論七篇世號洼君通丹學義丨深丨家宗之稱為大儒本傳曼卿善詩初九江謝丨丨丨毛丨廼為其訓衛宏從曼卿受學因作毛詩序善得風雅之㫖至今傳於世本傳一家詩學申公卒以詩春秋授之瑕丘江公盡能傳之徒衆最盛又魯許生免中謝公皆守學授韋賢治詩事太江及許生又治禮至丞相傳子𤣥成由是魯詩有韋氏學本傳二子春秋嚴彭祖與顔安樂俱事睦孟孟弟子百餘人唯彭祖安樂為明質問疑誼各持所見孟曰春秋之意在二子矣孟死彭祖安樂各專門教授由是公羊春秋有嚴氏顔氏之學本傳楊政説經丨丨字子行少好學從代郡范升受梁丘易善丨丨書京師為之語曰説經鏗鏗楊子行本傳張𤣥講問丨丨少習春秋顔氏建武初遷陳倉縣丞清淨無欲專心經書方其丨丨乃不食終日及有難者輙為張數家之説令擇從所安諸儒皆服其多通本傳詞賦事類麗則或問景差唐勒宋玉枚乗之賦也益乎曰必也淫淫則奈何曰詩人之賦丨以丨辭人之賦麗以淫揚子瀏亮賦體物而丨丨陸士衡文賦序雕蟲或問吾子少而好賦曰然童子丨丨篆刻俄而曰壯夫不為也或曰霧縠之組麗曰女工之蠧矣揚子吐鳳揚雄夢丨白丨詳見前文章類八义手温庭筠二賦每入試凡丨丨丨而八韵成北夢瑣言又庭筠未嘗起草作賦一吟一韻場中號温韻吟摭言八寸日眉州人朱台符敏博少有賦名同軰課試以尺度日晷八寸而台符一賦已就玉壺清話一片宫商沈光有洞庭樂賦韋岫云此賦乃丨丨丨丨也北史五經鼔吹見前文章類有陵雲氣前司馬相如奏大人賦天子大悦曰飄飄然丨丨丨之丨漢書本傳作擲金聲晉孫綽作天台賦辭致甚工范榮期曰卿試擲地當作金玉聲本傳賦述高堂宋玉高唐賦楚襄王與宋玉㳺雲夢之臺望高堂之觀其上有雲氣王問曰何氣也玉曰朝雲也王曰試為賦之文選賦吊湘水賈誼為長沙王太傅既謫去意不自得及湘水為賦以吊屈原本傳賦五色日見前狀元類賦阿房宫見前考官類著子虛賦司馬相如丨丨丨丨上讀而善之召問相如相如曰此乃諸侯之事未足觀請為天子游獵之賦以推天下諸侯之苑囿卒章歸之於節儉因以諷諫奏之天子天子大悦以為郎漢書本傳獻大禮賦唐元宗朝杜甫獻太清享廟及郊丨三丨丨丨帝竒之杜甫傳援筆立就陳留王植字子建善屬文時鄴銅臺新成太祖悉將諸子登䑓使各為賦植丨丨丨丨可觀魏志受詔輙成枚臯從行至甘泉雍河東上有所感輙使賦之為文疾丨丨丨丨故所賦者多前漢本傳文不加㸃禰衡有才辨黄祖時㑹賔客有獻鸚鵡者祖曰願先生賦之衡攬筆而作丨丨丨丨本傳賦以見志桑維翰初舉進士主司惡其名以為桑與䘮同音人有勸其不必舉進士可以從他求仕維翰乃著日出扶桑丨丨丨丨又鑄鐡硯以示人曰硯弊即改卒以進士及第五代史洛陽傳寫晉左思字太冲造齊都賦一年乃成復欲賦三都遂締思十稔門庭藩溷皆着紙筆遇得一句即便疏之自以其作不謝班張張華見而歎曰班張之流也於是豪貴之家競相傳冩洛陽為之紙貴初陸機入洛欲為此賦聞思作與弟書曰湏其成當以覆酒􅑥及思賦成機絶歎服以為不能加也遂輟筆焉本傳江東獨秀詔羣臣賦赤鸚鵡袁淑文冠當時賦畢示謝莊及見莊賦嘆曰丨丨無我君當獨秀我若無卿亦一時之傑遂隐其賦南史謝莊傳賦擬班固時自王侯以下莫不踰侈張衡乃擬班固兩都作二京賦因以諷諫精思博㑹十年乃成後張衡傳文似相如前武帝時客有薦揚雄丨丨丨丨者上方郊祠甘泉太時汾隂后土以求繼嗣召雄待詔承明之廬還奏甘泉賦以風天子異焉又上臨長楊射熊館雄從還上長楊賦本傳賈誼升堂如孔氏之門田賦也則丨丨丨丨相如入室矣其如不用何揚子仲宣獨歩王粲字仲宣文帝書與呉質曰丨丨丨丨於詞賦惜其體弱至於所善古人無以逺過也魏志詩集敵揚雄賦料揚雄敵杜甫詩愧相如白頭受簡焉能賦丨似丨丨為丈夫奏明光丨賦入丨丨賦河東揚雄更有河東賦唯應吹嘘送上天並同詩律事類詩史杜甫善陳時事律切精深至千言不少衰時號丨丨本傳詩豪劉禹錫好詩晚節尤精白居易嘗推為丨丨本傳詩城劉長卿與秦系為詩相贈答權徳輿丨曰長卿自謂五言長城系以偏師攻之秦系詩詩嚢李賀工詞章毎旦出騎欵叚馬從小奚奴背古錦囊遇所得投囊中日萃如山賀集詩窖髙仁裕著詩萬首號丨丨後史補詩筒樂天元微之唱和以筒著詩往來謂之丨丨林逋集注奪袍武后遊龍門命羣臣賦詩先成者賜錦袍左史東方虬詩成拜賜坐未安宋之問詩成文理兼美乃就丨丨衣之寵卓異記擊鉢竟陵王子良嘗夜坐刻燭為詩四韻則刻寸燭蕭文琰曰燒一寸燭而成四韻詩何難之有乃與江拱等共丨銅丨立韻響滅詩成南史蹉對九歌云蕙殽蒸兮蘭藉奠桂酒兮椒漿今倒用之謂之丨丨筆談假對自朱邪之狼狽至赤子之流離朱邪李克用祖姓狼狽獸名流離亦禽名又如厨人具雞黍稚子摘楊梅此乃丨丨格筆談八句法賀方囬學詩於前軰得丨丨丨平淡不流於澆俗竒古不流於恠僻題詠不窘於物象叙事不用於聲律比興深通於物理用事工者如已出格見於成篇渾然不可涯氣出於言外浩然不可屈王直方詩話百家衣山谷以集句為丨丨丨注云小兒文襁也本傳集大成東坡謂杜詩韓文顔書左史皆極其至丨丨丨文集號小杜杜牧於詩情致豪邁丨為丨丨以别於杜甫唐本傳六義之餘詩之流二十四名賦頌銘賛文誄箴行吟詠題怨嘆章篇操引謡謳歌曲詞調皆詩人丨丨丨丨元稹樂府占題序七言之始七言詩始於漢栢梁體武帝作栢梁臺成詔羣臣二千石能為七言詩者乃得上坐凡七言毎句用韻各述其志云詩話樂工爭求李益長於詩毎一篇出丨丨丨丨之至征人早行等篇天下皆施之圖繪唐書本傳諸作不及蘇武李陵之詩長於高妙曹植劉公榦之詩長於豪逸陶潜阮籍之詩長於冲淡謝靈運鮑昭之詩長於峻潔徐陵庾信之詩長於藻麗子羙窮髙妙之格極豪逸之氣包冲淡之趣兼峻潔之姿備藻麗之態而諸家之作所不及焉秦少游論老杜簡古淡泊李杜之後詩人雖有逺韻而才不逮意獨韋應物桞子厚發纎穠於丨丨寄至味於淡泊非餘子所及也東坡志林諷諭感傷居易自叙言關羙刺者謂之丨丨詠情性者謂之閑適傷事而發謂之丨丨其他雜律詩為世人所愛唐白居易傳渾涵汪洋唐興詩人承陳隋風流浮麋相矜至宋之問沈佺期等研揣聲音浮切不差而號詩律競相沿襲開元間稍裁以雅正然持華者質反好麗者壯違人得一槩皆自名所長至杜甫丨丨丨丨千彚萬狀兼古今而有之他人不足甫乃厭餘殘膏賸馥沾丐後人多矣故元稹謂詩人以來未有如子羙者本傳悲懽窮泰王荆公論杜甫之詩丨丨丨丨發歛抑揚旡施不可故其有平淡簡易者有綿宻精殻者有嚴重威武若三軍之師者有奮迅馳驟苦泛駕之馬者有淡泊閑静若山谷隠士者有風流藴藉苦貴介公子者盖緒宻而思深所以光掩前人而後者無繼也遯齋閒覽刻削情狀吾聞滛畋漁者謂之暴天物天物不可暴又可抉摘丨丨露其情狀乎使自萌芽至於槁死不能隠天能不致罸耶長吉天東野窮王浚坐官不掛朝籍而死正坐是耳苙澤叢書鋪列錦繡鮑昭曰謝靈運五言如初綻芙蓉自然可愛顔延之詩若丨丨丨丨雕繢滿眼南史劌目鉥心孟郊為詩丨丨丨丨物迎縷觧鈎章棘句慆擢胃腎神施鬼設間見層出唯其大翫於詞而與世推移之孟郊銘升堂入室鍾嶸品曹子建詩羣倫之有龍鳳五音之有笙竽孔氏之門則公榦丨丨陳思丨丨潘陸自可坐廊廡之門也詩評落花飛草丘遲文辭麗逸時有鍾嶸著詩評云范雲婉轉清便如流風囬雪丘遲㸃綴映媚似丨丨丨丨南史本傳剪紅刻翠長沙徐東野詩浮脆輕艶皆鉛華歌舞媚一時樽爼其句不過牡丹宿醉蘭蕙春悲霞宫日城丨丨丨丨而已玉壺清話風檣陣馬唐皇諧孫賀字長吉元和中韓吏部亦頗取其歌詩雲煙綿聨不足為其態也水之迢迢不足為其情也春之盎盎不足為其和也秋之明潔不足為其格也丨丨丨丨不足為其勇也瓦棺篆鼎不足為其古也時花羙女不足為其色也荒國侈殿梗莾丘隴不足為其怨恨悲愁也鯨呿鼇擲牛鬼蛇神不足為其虛荒誕幻也盖騷之苖裔理雖不及詞或過也賀生年二十七死矣使賀少加以理雖奴䧤命騷可也杜牧之序李長吉詩歌氷柱雪車劉义作丨丨丨丨二詩見韓愈出盧仝孟郊右韓愈詩得句呉江隺信明嘗矜其文過李百藥鄭世翼遇信民江中謂曰聞公有楓落呉江泠之句願見其餘信明多出衆篇世翼覧未終曰所見不逮所聞投諸水中引舟而去南史本傳賦詩别墅王維别墅在輞川地竒勝有華子岡欹湖竹里館桞浪茱萸洲辛夷島與裴廸逰其中賦詩相酬為樂本傳𤣥都看花劉禹鍚既貶還宰相欲任省郎而禹鍚作丨丨觀丨丨君子詩話譏忿當路不喜出為播州刺史入為主客郎中復作逰𤣥都觀詩且言始謫十年還京師道士檀桃甚盛若霞又十四年過之無復一存唯兔葵燕麥動揺春風耳以詆權近聞者為薄其行唐本傳西堂夢草謝靈運丨丨思詩不就忽丨惠連即得池塘生春草之句大以為工南史蘭陵絶唱元稹在越時壁竇鞏鞏工詩與之酬答故鏡湖秦望之竒益傳時號丨丨丨丨本傳鷄林爭售白居易最工詩當時人爭傳鷄林價售其國相率篇易一金其偽者相輙能辨之居易傳神物護持劉禹鍚善詩晚節尤精白居易言其詩在處應有丨丨丨丨本傳江山得助張説謫并州刺史詩愈悽惋人謂得江山助本傳錦繡成文建安後詩律屢變至沈約以音韻相婉附及宋之問沈佺期文加靡麗囬忌聲病如丨丨丨丨學者宗之本傳纎豔不逞杜牧謂白居易詩丨丨丨丨非莊士雅人所為流傳人間子父女母交口教擾滛言媟語入人肌骨殆不可去盖救所失不得不云爾詩話太宗宫體丨丨嘗作丨丨詩虞世南曰聖作雖工然體非雅正上之所好下必有甚焉臣恐此詩一𫝊天下風靡不敢