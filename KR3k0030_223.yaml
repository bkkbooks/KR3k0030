body:
  text: 古今合璧事類備要别集卷十七宋謝維新撰宫室門堂宇宫室紀要宇以堂名除地而屋也按劉熙釋名以為堂堂髙顯之貌架斯堂也寧非欲便觀覽逺眺望而使人風物態一舉目而盡在是耶然或託寬閒之野或依寂寞之濵或據康莊之會惟其適焉而已事類弗肯若考作室既底法厥子乃丨堂矧肯搆書大誥不趨堂上丨丨記堂除丨丨十二分禮考工記堂髙丨丨數仞榱題數尺孟子攝齊丨丨升堂鞠躬如也論語接武堂上丨丨堂下布武記曲禮聲必揚將上堂丨丨丨同上遜而升兩君相見揖丨丨丨堂而樂闋記孔子間居髙三尺堯舜堂丨丨丨土階二等遷史自序彈五弦舜丨丨丨之琴不下堂而天下治吳步隲疏威公讀書丨丨丨丨於堂上輪扁斫輪於堂下莊大道篇叔向聞言叔向適鄭鬷蔑惡立於堂下一言而善丨丨丨之曰必鬷明也執其手以上曰子若無言吾幾失子矣言之不可以已也如是左昭十八倨堂而應老子見孔子丨丨丨丨白帖下堂而見夷王丨丨丨丨諸侯栁封建論王坐於堂齊宣丨丨丨丨上有牽牛而過堂下者王見之曰牛何之對曰將以釁鐘王曰舍之吾不忍其轂􅑌若無罪而就死地對曰然則廢釁鐘與曰不可廢也以羊易之孟子王又升堂魯共丨丨丨孔子丨聞金石絲竹之音乃不壞宅起白玉堂漢武帝丨丨丨丨在太液池南造萬金臺漢靈帝丨丨丨丨於西園建斬御史漢胡丨為軍正丨監察丨丨於皇堂上融授生徒漢馬丨常坐髙堂施絳紗帳前丨丨丨世稱其麗顧彥暉梓有鏡堂丨丨丨丨彥暉嘗繪諸將堂上孔帖帝榜其額馬燧起義堂丨丨丨丨以寵之同上堂如偃月李林甫有丨丨丨丨號月堂每欲排斥大臣即居之思所以中傷者若喜而出即其家碎矣堂號德星見齊門注費緡千萬貴妃楊氏諸姨等舍聨亘率一堂丨丨丨丨孔帖貯瑟三斗虢國堂成以金盆丨丨丨丨以賞匠者明皇雜録結草為廬盧鴻廬嵩山官營草堂孔帖以藝塗癖元載末年造藝暉堂於私第藝暉香草也出于闐國其香潔白如玉入土不朽為屑以塗壁故號藝暉焉更以沉檀為梁棟飾金銀為户牖唐杜陽編柱生槐枝孫偓始家堂丨丨丨丨朞而茂既而偓秉政孔帖手植三槐太祖與符彥卿有舊俾知大名府有告其謀反者以王晉公祐為代且委密訪其事戒曰得實當以趙普所居官命汝靣授㫖徑使上道祐到察知其妄數月無所聞驛召靣問因力為辨曰臣請以百口保之太祖不樂徙祐知襄州競亦無他祐後創居第於其門外丨丨丨丨於庭曰吾雖不為趙普後世子孫必有登三公者已而魏公果為太保石林燕語不為生客蘇子由作棲賢堂記讀之便如在堂中見水石陰森草木膠轕也僕當為書之刻石堂上且欲與廬山結緣他日入山丨丨丨丨志林韓退之溪堂詩憲宗之十四年始定東平三分其地以華州刺史禮部尚書兼御史大夫扶風馬公為鄆曹濮節度觀察等使鎮其地既一年褒其軍號曰天平軍上即位之二年召公入且將用之以其人之安公也復歸之鎮上之三年公為政於鄆曹濮也適四年矣治成制定衆志大固惡絶於心仁形於色竱心一力以供國家之職于時沂密始分而殘其帥其後幽鎮魏不恱於政相扇繼變復歸於舊徐亦乘勢逐帥自置同於三方惟鄆也截然中居四鄰望之若防之制水恃以無恐然而皆曰鄆為虜巢且六十年將彊卒武曹濮於鄆州大而近軍所根柢皆驕以易怨而公承死亡之後掇拾之餘剝膚椎髓公私掃地赤立新舊不相保持萬目睽睽公於此時能安以治之其功為何若幽鎮魏徐之亂不扇而變此功反小何也公之始至衆未熟化以武則忿以憾以恩則橫而肆一以為赤子一以為龍蛇憊心罷精磨以嵗月然後致之難也及教之行衆皆戴公為親父母夫叛父母親讎仇非人之情故曰易於是天子以公為尚書右僕射封扶風縣開國伯以褒嘉之公亦樂政之和知人之恱而侈上之賜也於是為堂於其居之西北隅號曰溪堂以饗士大夫通上下之志既饗其從事陳曾謂其衆言公之畜此邦其勤不亦至乎此邦之人纍公之化惟所令之不亦順乎上勤下順遂濟登茲不亦休乎昔者人謂斯何今者人謂斯何雖然斯堂之作意其有謂而喑旡詩歌是不考引公德而接邦人於道也乃使來請其詩曰一帝奠九壥有葉有年有荒有條河岱之間乃我憲考收正之視邦選侯以公來尸公來尸之人始未信公不飲食以訓以狥孰飢無食孰呻孰嘆孰寃不問而得分願孰為邦蟊節根之螟羊狠狼貪以口覆城吹之煦之摩手拊之針之石之膊而磔之凡公四封既富以强謂公吾父孰違公令可以師征不寧守邦公作溪堂播播流水淺有蒲蓮深有蒹葦公以賓燕其鼓駭駭公燕溪堂賔校醉飽流有跳魚岸有集鳥既歌以舞其鼓考考公在溪堂公御琴瑟公暨賔贊稽經諏律施用不差人用不屈溪有薲苽有龜有魚公在中流右詩左書無我斁遺此邦是休栁宗元新堂記將為穹谷嵁巖淵池於郊邑之中則必輦山石溝澗壑凌絶嶮阻疲極人力乃可以有為也然而求天作地生之狀或無得焉逸其人因其地全其天昔之所難今於是乎在永州實惟九疑之麓其始度土者環山為城有石焉翳于奧草有泉焉伏于土塗蛇虺之所蟠狸鼠之所游茂樹惡木嘉葩毒卉亂雜而爭植號為穢墟韋公之來既逾月理甚無事望其地且異之始命芟其蕪行其塗積之丘如蠲之瀏如既焚既釃竒勢迭出清濁辨質美惡異位觀其植則青秀敷舒視其畜則溶漾紆餘怪石森然周于四隅或列或跪或立或仆竅穴逶邃堆阜突怒乃作棟宇以為觀游凡其物類莫不合形輔勢效伎於堂廡之下外之連山髙原林麓之崖間厠隱顯邇延野緑逺混天碧咸會於譙門之內已乃延客入觀繼以宴娛或贊且賀曰見公之作知公之志公之因土而得勝豈不欲因俗以成化公之釋惡而取美豈不欲除殘而佑仁公之蠲濁而流清豈不欲廢貪而立廉公之居髙以望逺豈不欲家撫而户曉夫然則是堂也豈獨草木土石水泉之適歟山原林麓之觀歟將使繼公之理者視其細知其大也宗元請志諸石措諸壁編以為二千石楷法歐陽修有美堂記嘉祐二年龍圖閣直學士尚書吏部郎中梅公出守於杭於其行也天子寵之以詩於是始作有美之堂蓋取賜詩之首章而名之以為杭人之榮然公之甚愛斯堂也雖去而不忘今年自金陵遣人走京師命豫志之其請至六七而不倦豫乃為之言曰夫舉天下之至美與其樂有不得而兼焉者多矣故窮山水登臨之美者必之乎寬閒之野寂寞之鄉而後得焉覽人物之盛麗誇都邑之雄冨者必據乎四達之衝舟車之會而後足焉蓋彼放心於物外而此娛意於繁華二者各有適焉然其為樂不得而兼也今夫所謂羅浮天台衡嶽廬阜洞庭之廣三峽之險號為東南竒偉秀絶者乃皆在乎下州小邑僻陋之邦此幽潜之土窮愁放逐之臣之所樂也若乃四方之所聚百貨之所交物盛人衆為一都會而又能兼有山水之美以資富貴之娛者惟金陵錢塘然二邦皆僣竊於亂世及聖宋受命海內為一金陵以後服見誅今其江山雖在而頽垣廢趾荒烟野草過而覽者莫不為之躊躇而悽愴獨錢塘自五代時知尊中國效臣順及其亡也頓首請命不煩干戈今其民幸富完安樂又其俗習工巧邑屋華麗蓋十萬餘家以湖山左右映帶而閩商海賈風帆浪舶出入於江濤浩渺煙雲杳靄之間可謂盛矣而臨是邦者必皆朝廷公卿大臣若天子之侍從又有四方遊士為之賓客故喜占形勝治亭榭相與極遊覽之娛然其於所取有得於此者必有遺於彼獨所謂有美堂者山水登臨之美人物居邑之繁一寓目而盡得之蓋錢塘兼有天下之美而斯堂者又盡得錢塘之美焉冝乎公之甚愛而難忘也梅公清慎好學君子也視其所好可以知其人焉四年八月丁亥廬陵毆陽修記梅公作此堂最得登臨佳處歐公為之作記人謂公未嘗至杭而所記如目覽坐堂上者使之為記未必能如是之詳也見文集張文潜氷玉堂記熙寧中余為臨淮主簿始得拜劉公道原於汴上是時道原方修資治通鑑而執政有素髙其才者將用以為屬道原義不屈遂以絶復以親老求為南康酒官故書未成而去余既慕公之義而望其眉宇聽其議論其是非豫奪之際凜然可畏而服也士大夫皆曰劉君之賢非獨其信道篤立心剛博學洽問之所至是蓋得父之風烈公之父諱煥字凝之有詞學為小官數以事屈在勢者節髙不能容於世年五十餘為穎上令即致仕歸隱於廬山築室種蔬而食之無求於物人皆師尊焉於是既老矣公歸廬山無幾何得疾以元豐元年九月卒公諱恕道原蓋其字後十餘年而當元祐元年余受詔校資治通鑑於祕書省是時公同時修史之人往往而在道公之事本末尤詳皆曰道原亷介剛直其仕必欲達其道不以一毫挫於人者也方其激於義而作雖足蹈坎井手攬虎兕視之若無見雖古烈士或愧焉平居自負經濟大略而視其為吏則嚴簿書束胥吏撫鰥寡繩豪猾纎悉曲當皆可為後法其學自書契以來以至于今國家治亂君臣世系廣至於郡國山川之名物詳至於嵗月日時之後先問焉必知考焉必信有疑焉必决其言滔滔汩汩如道其鄰里族黨之事也其著書有疑年譜年略譜通監外紀十國紀年惟十國紀年先成世傳之世以比遷固歆向公亦自以不愧而自范曄以降不論也當時司馬君實歐陽文忠號通史學貫穿古今亦自以不及而取正焉疑之晚善養性篤行老益壯年八十二後道原數年卒纍官至屯田員外郎其終也未嘗疾沐浴正冠而絶嗚呼亦異矣元符中佘補官廬陵道原之子羲仲主簿於德安叙其大父與父之事示豫且曰頃眉山蘇子由嘗道廬山拜我大父於牀下出而歎曰凜乎非今世之士也其卒為詞以哭曰疑之為父與道原之為子潔亷不撓氷清而王剛鄉人是其言名吾大父所居之堂曰氷玉君為我實記之余曰昔司馬談能推明孔子作春秋之意欲為史未成以授其子遷而遷遂能網羅三代放逸舊聞馳騁上下數千載成一家之書與六經並傳父子之於文學美矣節無聞焉疏廣受於宣帝有師傳恩而父子一旦棄去視捨冨貴如棄塵垢骨月之際風節同矣而文學無傳焉孰如君家父子文學風節輝輝並著名立於父而顯於子千載之逺四海之廣而一家擅之嗟乎世固未嘗有也余始應舉時與道原之弟格遊愛其學博而論正是蓋得其兄之餘而羲仲敏於學而健於文屹然好名而立節者也余知氷玉堂之灑掃有繼矣其爵里世系與其行事之詳則既有志之者矣故不復出因為詞以系之曰而我所思之人兮嗟可想而不可見意其人兮俯青雲下睨矚九日而不眩超然不知其何之兮遺此空山之故居豈訪重華而陳誼兮父唱子和與仙聖乎為徒紓為雲霓兮注為江湖偉為哲人兮我言在書超駕言而從之兮指廬山乎休吾車耕山而食兮梁溪而漁儼頓轡而不敢留兮恐其尚謂我汚也朱元晦氷玉堂記南康使君曾侯致虛既葺屯田劉公之墓明年乃訪得其故居遺趾於郡治之東暇日屏騶馭披荆棘而往觀焉問其北隱然以髙者則劉公所賦之東臺也顧其南窊然以下者則詩序所指之蓮池也蓋自兵亂以來蕪廢日久唯是僅存而其他則皆漫滅不可復識矣曾侯為之躊躇四顧喟然而嘆曰凝之之為父道原之為子其髙懷徑節有如歐馬蘇黃諸公之所道是亦可謂一世之人豪矣想其平日之居此林塘館宇之邃詩書圖史之盛既有以自適其適而一時遊且宦於此邦者亦得以叩門避席而考德問業焉何其盛也顧今百年之外臺傾沼平鞠為灌莽而使樵兒牧子皆得以嘯歌躅躑於其上又何其可悲也雖然此吾事也不可以不勉乃出少府羡錢贖之民間垣而塈之以合於郡圃纍石以崇其臺引流以深其池遂作氷玉之堂於臺之西北而繪劉公父子之象於其上且聞陳忠肅公之嘗館于是也則又繪其象以侑焉既而所謂是二堂漫浪閣者亦以次舉而皆復其舊既成使人以圖及書來屬豫記豫惟異時承乏此邦亦嘗有意於斯而不克就今披圖考驗尚能憶其倣佛固喜曾侯之敏於事而能有成矣抑豫又有感焉近嵗以來人心不正行身者以同流合汚為至行任事者以便私適己為長策其聞劉氏父子之風不唾而詈之者幾希矣欲其能如曾侯一以表賢善俗為心而不奪於世豈可得哉於是既書其事而適有以陳令舉騎牛詩畫為寄者因并以遺曾侯請刻堂上以補一時故事之缺云蘇子瞻醉白堂記故魏國忠獻韓公作堂於私第之池上名之曰醉白取樂天池上之詩以為醉白堂之歌意若有羡於樂天而不及者天下之士聞而疑之以為公既已無愧於伊周矣而猶有羡於樂天何哉軾聞而笑曰公豈有羡於樂天而已乎且願為尋常無聞之人而不可得者天之生是人也將使任天下之重則寒者求衣飢者求食凡不獲者求得茍有以與之將不勝其求是以終身處乎患難之域而行乎利害之途豈其所欲哉夫忠獻公既已相三帝安天下矣浩然將歸老於家而天下共挽而留之者莫釋也當是時其有羡於樂天無足怪者然以樂天之平生而求之於公較其所得之厚薄淺深孰有孰無則後世之論有不可欺者矣文致太平武定亂略謀安宗廟而不自以為功急賢才輕爵祿而士不知其恩殺伐果敢而六軍安之四夷八蠻想聞其風采而天下以其身為安危此公之所有而樂天之所無也乞身於强健之時退居十有五年日與其朋友賦詩飲酒盡山水園池之樂府有餘帛廩有餘財而家有聲妓之奉此樂天之所有而公之所無也忠言嘉謨妓於當時而文采表於後世死生窮達不易其操而道德髙於古今此公與樂天之所同也公既不以其所有自多亦不以其所無自少將推其同者而自託焉方其寓形於一醉也齊得失忘禍福混貴賤等賢愚同乎萬物而與造物者遊非獨自比於樂天而已古之君子其處已也厚其取名也廉是以實浮於名而世誦其美不厭以孔子之聖而自比於老彭自同於丘明自以為不如顔淵後之君子實則不至而皆有侈心焉臧武仲自以為聖白圭自以為禹司馬長卿自以為相如楊雄自以為孟軻崔浩自以為子房然後世終莫之許也由此觀之忠獻公之賢於人也逺矣昔公嘗告其子忠彥將求文於軾以為記而未果公薨既葬忠彥以告軾以為義不得辭也乃泣而書之詩集鸞栖丨鳯丨堂廡潘尼燕入舊時王榭堂前丨飛丨尋常百姓家劉禹錫依竹野外堂丨丨杜䕃茅背廓堂成丨白丨杜宿霧披公堂丨丨丨西郊向時出碧雞坊丨丨丨草堂並同上風露入丨丨氣丨秋堂涼韓達者升遊夏三千志丨丨得丨堂杜髙且新中堂丨丨丨韓開襟豁丨丨野堂丨杜古今合璧事類備要别集卷十七
